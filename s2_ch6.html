be drawn.\n- Step 2: The sampling units are the individual patients over 65 — each patient is one unit that could be selected and given a health check.\n\nTakeaway: frame = the list used; unit = what a single draw represents.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "How does the sampling-distribution concept unify sample size, population variability, and reliability of conclusions? (4 steps)", "answer": "- Step 1: For a given statistic (say the sample mean), the sampling distribution's spread measures how much the statistic varies from sample to sample.\n- Step 2: A narrow sampling distribution (small variance) means any single sample's estimate will be close to the true parameter — high reliability. A broad distribution means any single estimate is untrustworthy.\n- Step 3: That spread shrinks as $$n$$ grows (e.g. $$\\operatorname{Var}(\\bar{X}) = \\sigma^{2}/n$$) and grows with population variability $$\\sigma^{2}$$.\n- Step 4: So \"larger samples give more accurate estimates\" and \"more variable populations require larger samples\" are both direct consequences of how $$n$$ and $$\\sigma^{2}$$ jointly set the sampling distribution's spread.\n\nTakeaway: the sampling distribution unifies the practical intuitions about sample size and variability into one precise mathematical object.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "For a sample of size 3 from a 3-value population, explain why ties in the mode are possible — and why the textbook often prefers the median over the mode in such cases. (3 steps)", "answer": "- Step 1: With 3 observations spread over 3 categories, counts of each category must sum to 3. The possible partitions are $$(3,0,0)$$, $$(2,1,0)$$, $$(1,1,1)$$.\n- Step 2: $$(3,0,0)$$ and $$(2,1,0)$$ have a unique maximum count, so the mode is well-defined. But $$(1,1,1)$$ — one of each value — has a three-way tie, making the mode undefined (or multi-valued).\n- Step 3: The median is always well-defined (the middle of three sorted values), so textbooks prefer it when the mode risks ambiguity in small samples.\n\nTakeaway: the mode is a cleaner statistic for very few categories or majority-dominated populations; it can break down when observations are evenly spread.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "A drawer contains coins of various values in known proportions. For a random sample of 2, describe the conceptual procedure for finding the sampling distribution of the sample mean $$\\bar{X}$$. (4 steps)", "answer": "- Step 1: Identify the population distribution: list each coin value and its probability.\n- Step 2: Enumerate all ordered samples of size 2. For $$k$$ distinct values, there are $$k^{2}$$ ordered samples (with replacement).\n- Step 3: For each ordered sample, compute the mean $$\\bar{X} = (X_1 + X_2)/2$$, and compute its probability as the product of the two draw probabilities.\n- Step 4: Group samples by equal mean value and sum their probabilities — that table *is* the sampling distribution of $$\\bar{X}$$. The probabilities across distinct mean values must sum to 1.\n\nTakeaway: the same three-step recipe (distribution → enumerate → evaluate statistic → sum) works for any statistic, not just the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A bag has counters valued 6 (probability 0.6) and 10 (probability 0.4). For a random sample of 3, why will the mode be 6 more often than 10, and how does this manifest in the sampling distribution? (3 steps)", "answer": "- Step 1: With only two values, the mode in a sample of 3 is whichever value appears at least twice. So $$P(\\text{mode}=6) = P(\\text{at least two 6's})$$.\n- Step 2: Since 6 has the higher single-draw probability (0.6 vs 0.4), \"at least two 6's in 3 draws\" is more likely than \"at least two 10's.\" Let $$K \\sim B(3, 0.6)$$ count the number of 6's; then $$P(K\\geq 2) > P(K\\leq 1)$$.\n- Step 3: Concretely, $$P(K=2) + P(K=3) = 3(0.6)^{2}(0.4) + (0.6)^{3} \\approx 0.432 + 0.216 = 0.648$$, vs about 0.352 for mode = 10. The sampling distribution of the mode is skewed toward the majority population value.\n\nTakeaway: the mode of a small sample usually matches the most probable population value, amplifying the population's asymmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "In what sense is taking a sample \"different from\" simply repeating a single measurement several times with the same instrument? (3 steps)", "answer": "- Step 1: Repeating measurements on the *same* physical item reduces measurement error but does not capture population variability — all replicates come from one unit.\n- Step 2: A sample draws *different* units from the population, so each observation reflects unit-to-unit variation — exactly the variability we want to estimate to make population-level claims.\n- Step 3: Consequently, a sample statistic (like $$\\bar{X}$$) estimates a *population parameter*; an averaged replicate measurement estimates one unit's true value. Confusing the two massively underestimates uncertainty.\n\nTakeaway: samples are informative about the population; repeated measurements are informative about a single unit.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A supermarket sells 3-litre and 2-litre milk cartons in ratio 3:2. Describe conceptually how the sampling distribution of the median of a sample of 3 cartons is built. (4 steps)", "answer": "- Step 1: Population proportions: $$P(X=3) = 3/5$$ and $$P(X=2) = 2/5$$.\n- Step 2: Enumerate all $$2^{3} = 8$$ ordered samples. Each has probability equal to the product of draw probabilities.\n- Step 3: For each sample, find the median (middle value when sorted). With only two values:\n+ at least two 2's ⇒ median is 2.\n+ at least two 3's ⇒ median is 3.\n- Step 4: Sum the probabilities in each category. Because 3 is the more common value, \"at least two 3's\" is the higher-probability event, so $$P(N=3) > P(N=2)$$. Writing $$P(N=2)$$ and $$P(N=3)$$ in a table gives the sampling distribution.\n\nTakeaway: with two categories, the median of a 3-sample follows the majority — the same combinatorial logic as for the mode.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why is the binomial model sometimes inappropriate even when each outcome is 0/1? (3 steps)", "answer": "- Step 1: The binomial model requires a fixed number of independent trials, a constant success probability, and two outcomes per trial.\n- Step 2: Independence fails if sample members influence each other — e.g., students asked in a group where opinions spread. Constant probability fails if $$p$$ changes between trials — e.g., sampling without replacement from a small finite population, where the remaining proportion shifts after each draw.\n- Step 3: In such cases the count of successes follows a different distribution (hypergeometric when sampling without replacement; other models under dependence). Treating it as binomial systematically misleads probability calculations.\n\nTakeaway: 0/1 outcomes ≠ binomial; the independence and constant-p assumptions are non-negotiable.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why is the size of the *population* much less important than the size of the *sample* for a statistic's precision? (3 steps)", "answer": "- Step 1: The variance of the sample mean (for a simple random sample, with replacement) is $$\\sigma^{2}/n$$ — it depends on the population's spread $$\\sigma^{2}$$ and sample size $$n$$, but not on the population size $$N$$.\n- Step 2: Intuitively, once you have a sample that captures the spread of the population, having \"more of the population out there\" doesn't degrade your estimate. A sample of size 1000 from 10,000 has roughly the same precision as a sample of 1000 from 10 million.\n- Step 3: (A finite-population correction applies when the sample is a substantial fraction of the population, but usually a minor effect.) The key driver of precision is $$n$$ and $$\\sigma^{2}$$, not $$N$$.\n\nTakeaway: sample size, not population size, is the primary lever for precision.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why can't we compute an exact sampling distribution of the sample mean from a continuous population (like weights or heights) by enumeration — and what replaces enumeration? (3 steps)", "answer": "- Step 1: A continuous distribution has uncountably many possible values, so \"listing all samples\" is impossible — there are infinitely many.\n- Step 2: Instead, we derive the distribution analytically: for a normal population, $$\\bar{X} \\sim N(\\mu,\\ \\sigma^{2}/n)$$ by properties of linear combinations of normal variables.\n- Step 3: For non-normal populations and large $$n$$, the Central Limit Theorem gives an approximate normal sampling distribution for $$\\bar{X}$$ without knowing the exact population form. In general: enumeration is for finite discrete cases; continuous cases need theorem-based derivation.\n\nTakeaway: enumeration works for finite discrete problems; probability theorems generalise to continuous ones.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "A common misconception is that \"a large sample guarantees correct conclusions.\" Why is this wrong? (3 steps)", "answer": "- Step 1: A large sample size reduces sampling variability — the statistic will be close to its expected value with high probability. But \"expected value\" depends on how the sample was drawn.\n- Step 2: If the sampling method is biased — e.g. a non-random frame that under-covers some subgroup — a large sample merely gives a very precise estimate of the *biased* quantity, not of the true population parameter.\n+ Example: 10,000 online survey responses about internet habits would precisely describe internet users, not the general population.\n- Step 3: So both large $$n$$ AND representative sampling are required. Bias cannot be \"fixed\" by increasing $$n$$ — only variance can.\n\nTakeaway: sample size cures variance; design cures bias. They're not interchangeable.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "If the statistic $$Y = \\sum X_i$$ has sampling distribution $$B(15, p)$$, how does the sampling distribution of $$\\hat{p} = Y/15$$ relate to it? (3 steps)", "answer": "- Step 1: $$Y$$ takes values $$0, 1, 2, \\ldots, 15$$ with binomial probabilities.\n- Step 2: $$\\hat{p} = Y/15$$ is just a linear rescaling of $$Y$$ — same probabilities, but the possible values become $$0,\\ 1/15,\\ 2/15,\\ \\ldots,\\ 1$$.\n- Step 3: So the two sampling distributions carry the same information in different units. The shape and probabilities are identical; only the x-axis labels change.\n\nTakeaway: a scalar transformation doesn't alter information content — just how we read the scale.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Why is the mode generally considered a \"less informative\" statistic than the mean or median for a small sample? (3 steps)", "answer": "- Step 1: The mode collapses the whole sample into a single category label — it uses only the \"which value appears most often\" information, discarding how often each appears and by how much.\n- Step 2: The mean uses every observation *and* their magnitudes, making it sensitive to every data point. The median uses the *ordering* of observations, giving a central-tendency summary that resists outliers.\n- Step 3: In small samples from multi-valued populations, the mode can also be undefined (ties) or unstable (flipping with little data). The mean and median are always defined and carry richer information.\n\nTakeaway: the mode is a summary of majority, not of magnitude or order — it is informationally minimal.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}], "count": 58}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In statistics, what is meant by the term \"population\"? (3 steps)", "answer": "- Step 1: A population is the **complete, exhaustive set of items** (or people, or observations) that are of interest to an investigation.\n- Step 2: \"Population\" doesn't mean people — it's domain-specific. It could be all plums in a delivery, all light bulbs made by a factory, all households in a town, or all exam scripts in a school.\n- Step 3: The investigator defines the population based on the question being asked. Once defined, it is fixed: the population is the entire universe of things we want to learn about.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "What is a census, and how does it differ from a sample in terms of coverage? (3 steps)", "answer": "- Step 1: A census observes or measures **every single member** of the population — 100% coverage, no one left out.\n- Step 2: A sample, by contrast, measures only a **subset** of the population — not everyone is observed.\n- Step 3: Conceptually: a census gives the full, exact truth about the population (up to measurement error), whereas a sample gives only an **estimate** of the truth, with some inherent uncertainty.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What is a sample in statistics, and what is its purpose? (3 steps)", "answer": "- Step 1: A sample is a selection of observations drawn from a subset of the population.\n- Step 2: Its purpose is to use information in the subset to **infer or estimate** something about the whole population.\n- Step 3: The implicit hope is that the sample is *representative* — patterns in the sample reflect patterns in the population. Sampling trades perfect accuracy (census) for practical feasibility (smaller, cheaper, faster data collection).", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What is meant by \"raw data\"?", "answer": "Raw data refers to the direct, unprocessed observations or measurements gathered from the population (or sample). It's the data *as collected*, before any summarisation, averaging, or analysis has been applied. For example, if you measure the height of every tree in a forest, the list of individual heights is the raw data; computing the mean height would then be a derived statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "What is the principal *advantage* of conducting a census over taking a sample?", "answer": "A census should give a **completely accurate result** because every member of the population is observed. There is no sampling variability to worry about — what you measure *is* the population parameter. Any remaining inaccuracy comes only from measurement error, not from having missed part of the population.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "State three key disadvantages of conducting a census. (3 steps)", "answer": "- Step 1: **Time-consuming and expensive** — you must reach every member of the population, requiring enormous labour, money, and logistics (think of a national census taking years to plan and execute).\n- Step 2: **Cannot be used when testing destroys the item** — e.g., testing climbing ropes to breaking, cutting plums in half, or burning out microswitches. A census would leave nothing to sell or use.\n- Step 3: **Hard to process a large quantity of data** — even if you collect everything, analysing millions of records is computationally and practically difficult.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Give three advantages of taking a sample rather than a full census. (3 steps)", "answer": "- Step 1: **Less time-consuming and expensive** — only a small fraction of the population is measured, drastically cutting cost and effort.\n- Step 2: **Fewer respondents needed** — useful in surveys where cooperation is difficult or access is limited.\n- Step 3: **Less data to process** — analysis is quicker and smaller datasets are more manageable.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "What are the main disadvantages of sampling compared to a census? (2 steps)", "answer": "- Step 1: **The data may not be as accurate** — because you're looking only at a portion, sample statistics differ from true population parameters by some amount (sampling error).\n- Step 2: **Small subgroups may be missed or under-represented** — if the sample isn't large enough, rare categories may not appear at all, so you can't make inferences about them.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why, in general, does a larger sample give a more accurate estimate of a population parameter? (3 steps)", "answer": "- Step 1: Each additional observation adds information; random fluctuations above and below the true value tend to cancel out with more data.\n- Step 2: Quantitatively, the \"typical error\" (standard error) of a sample statistic shrinks as sample size grows. For the sample mean, it scales like $$\\frac{1}{\\sqrt{n}}$$.\n- Step 3: So doubling $$n$$ doesn't halve the error — it shrinks it by $$\\sqrt{2}$$. To halve the error you'd need $$4n$$. \"Bigger is better, but with diminishing returns.\"\n\nTakeaway: more data dilutes noise, but accuracy gains slow as $$n$$ grows.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "If a population is highly varied (high variance), how should this change the sample size you choose, and why? (2 steps)", "answer": "- Step 1: You should take a **larger** sample. With high variability, individual observations swing widely, so a small sample can easily land biased high or low by chance.\n- Step 2: A larger sample dilutes the influence of any single extreme observation, letting the statistic settle near the true population value. Contrast: if the population were uniform (everyone identical), a sample of one would be perfectly informative.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why can two different random samples drawn from the same population produce different conclusions? (2 steps)", "answer": "- Step 1: Each random sample is a different subset of the population. By chance, one might contain more high values and another more low values.\n- Step 2: Sample statistics (mean, proportion, etc.) therefore fluctuate from sample to sample. This fluctuation is **sampling variability** — the central phenomenon that sampling distributions aim to quantify. It's not a mistake; it's an inherent feature of random sampling.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Define a \"sampling unit\" and give a concrete example. (2 steps)", "answer": "- Step 1: A sampling unit is an **individual member** of the population — the basic \"thing\" that can be selected when drawing a sample.\n- Step 2: Examples: if the population is \"all patients over 65 at a surgery,\" each patient is a sampling unit; if the population is \"all plums in today's delivery,\" each plum is a sampling unit.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "What is a sampling frame, and how does it relate to the population? (3 steps)", "answer": "- Step 1: A sampling frame is a **list** of sampling units — typically a register, database, or enumeration that names or numbers each member.\n- Step 2: It is the *practical* representation of the population from which samples are actually drawn (e.g., a list of patient IDs, an employee register).\n- Step 3: The sampling frame is only as good as its completeness. If out of date, incomplete, or biased, so is any sample drawn from it.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Give a reason why a sampling frame and a population might not be exactly the same. (2 steps)", "answer": "- Step 1: A sampling frame is a practical list, and lists get outdated — some population members may be missing (newly joined, homeless, unlisted), and some on the list may no longer belong (deceased, moved, left the organisation).\n- Step 2: So the frame is an imperfect approximation of the target population. Any sample drawn from the frame inherits this mismatch — a subtle source of bias separate from random sampling error.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A supermarket wants to test a delivery of plums for ripeness by cutting each one in half. Why is a census inappropriate here?", "answer": "Cutting a plum in half destroys it as a sellable product. A census — testing every plum — would mean the entire delivery is cut open, leaving nothing to sell. This is the classic case where the testing process destroys the item: only a sample can be tested, and the results are extrapolated to the rest under the assumption that untested plums behave similarly.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A factory tests 5 microswitches for reliability, getting lifetimes (in cycles): 23150, 25071, 19480, 22921, 7455. The company claims switches last 20 000 cycles on average. Comment on this claim conceptually, and suggest an improvement. (3 steps)", "answer": "- Step 1: The sample mean is roughly 19 620 — slightly *below* the claimed 20 000. On face value, the data modestly contradict the claim.\n- Step 2: But the sample size is only 5, and one observation (7455) is a large outlier pulling the mean down. With so few data points, a single unusual switch has huge influence — we cannot reliably conclude much.\n- Step 3: To improve: test a **larger sample** (e.g., 30 or more). The influence of outliers shrinks, and the sample mean becomes a more stable estimate of the true average lifetime.\n\nTakeaway: don't over-interpret a single suspicious number in a tiny sample.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "A city council wants to survey residents about a recycling centre. Why would a census be impractical, and what would be a suitable sampling frame and sampling unit? (3 steps)", "answer": "- Step 1: **Why not a census?** Asking every resident would be prohibitively expensive and slow, and many wouldn't respond. A sample captures opinion at a fraction of the cost.\n- Step 2: **Sampling frame:** the electoral register, or a list of all households in the city — any enumeration of residents.\n- Step 3: **Sampling unit:** each individual resident (or each household, depending on survey design) — the entity randomly selected from the frame.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "A manager of a garage (10 mechanics) wants to know their views on a new savings scheme, and asks all of them. Why is this census reasonable? (3 steps)", "answer": "- Step 1: With only 10 mechanics, the population is **small and accessible** — asking all is quick, cheap, and low-effort.\n- Step 2: A census captures **every opinion**, ensuring no view is missed — especially important if some mechanics have strong or unusual concerns a sample might miss.\n- Step 3: With such a small population, any sample would cover a large fraction anyway — so the \"saving\" from sampling is minimal, and the benefit of full coverage dominates.\n\nTakeaway: small populations + non-destructive testing ⇒ census often best.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "What is a \"population parameter\", and why is it typically estimated rather than known? (2 steps)", "answer": "- Step 1: A population parameter is any **measurable numerical characteristic of the whole population** — e.g., population mean $$\\mu$$, population variance $$\\sigma^2$$, population proportion $$p$$.\n- Step 2: Parameters are usually unknown because populations are too large to measure completely. We draw a sample and use sample statistics to *estimate* parameters. By convention, **Greek letters** denote parameters, **Roman letters** denote sample statistics — notation keeps the two clearly distinct.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What is a statistic, in the precise statistical sense? (3 steps)", "answer": "- Step 1: A statistic is a quantity calculated **only** from the observations in a sample.\n- Step 2: Crucially, it must **not involve any unknown population parameter**. If a formula contains $$\\mu$$, $$\\sigma$$, or $$p$$, it is *not* a statistic — because you couldn't actually compute it from sample data alone.\n- Step 3: A statistic is therefore a function of sample data only: something you can always evaluate numerically once the sample is collected.\n\nTakeaway: \"statistic = computable purely from the sample.\" No unknowns allowed.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "For a random sample $$X_1, \\ldots, X_n$$ from a population with unknown mean $$\\mu$$, classify each expression as a statistic or not: (a) $$\\frac{X_2 + X_5 + X_8}{3}$$; (b) $$\\frac{\\sum X^2}{n} - \\left(\\frac{\\sum X}{n}\\right)^2$$; (c) $$\\frac{\\sum X}{n} - \\mu^2$$. (3 steps)", "answer": "- Step 1: **(a) Yes**, a statistic. It's just the mean of three specific sample values — uses sample observations only, no unknown parameter. Computable directly.\n- Step 2: **(b) Yes**, a statistic. This is the \"mean of squares minus square of mean\" form of sample variance. All pieces are sample quantities.\n- Step 3: **(c) No**, not a statistic. The expression contains $$\\mu^2$$ — an unknown population quantity — so you can't compute this value from the sample alone.\n\nRule of thumb: scan for Greek letters ($$\\mu, \\sigma, p, \\ldots$$). Any appearance disqualifies.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why is $$\\frac{\\sum (X_i - \\mu)^2}{n-1}$$ NOT a statistic, even though it resembles a variance formula? (2 steps)", "answer": "- Step 1: The formula explicitly contains $$\\mu$$, the population mean. Since $$\\mu$$ is unknown in practice, this expression cannot be evaluated from the sample alone.\n- Step 2: The proper sample variance replaces the unknown $$\\mu$$ with its sample estimate $$\\bar{X}$$: $$S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$$. This substitution makes it computable, and hence a statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why do we conventionally use Greek letters for population parameters and Roman letters for sample statistics? (2 steps)", "answer": "- Step 1: The convention creates an instant visual distinction between \"what we want to know\" (population: $$\\mu, \\sigma, p$$) and \"what we compute\" (sample: $$\\bar{X}, S, \\hat{p}$$).\n- Step 2: This prevents confusion. In any formula, you can glance at the symbols and tell whether a quantity is known (sample) or unknown (population). Especially useful when reading estimators: $$\\bar{X}$$ (Roman) estimates $$\\mu$$ (Greek).", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "What is the sampling distribution of a statistic? (3 steps)", "answer": "- Step 1: If you repeatedly draw fresh samples of a fixed size and compute the same statistic each time, you get a *range* of values — the statistic varies from sample to sample.\n- Step 2: The sampling distribution is the **probability distribution** of those values: it lists all possible values the statistic can take and the probability of each.\n- Step 3: Formally: the sampling distribution of statistic $$T$$ gives pairs $$(t, P(T = t))$$ for every achievable value $$t$$. It's the bridge between sample data and probability theory, enabling hypothesis tests and confidence intervals.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Conceptually, what steps are required to construct a sampling distribution from a small population? (4 steps)", "answer": "- Step 1: Enumerate all **possible samples** of the given size (respecting whether sampling is with or without replacement, and whether order matters).\n- Step 2: For each possible sample, compute the **value of the statistic** (mean, mode, median, etc.).\n- Step 3: Compute the **probability of each sample** using the population's probability structure (product of individual-draw probabilities if independent).\n- Step 4: **Group samples by the statistic's value** and sum the probabilities within each group. The result — value vs. probability — is the sampling distribution.\n\nTakeaway: enumerate → evaluate → group → tabulate.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A school defines $$X = 1$$ if a student supports a new uniform and $$X = 0$$ otherwise. A random sample of 15 students is taken. Why does $$Y = \\sum_{i=1}^{15} X_i$$ follow a binomial distribution? (3 steps)", "answer": "- Step 1: Each $$X_i$$ is a **Bernoulli trial**: the student either supports (1) or doesn't (0). Each trial has the same success probability $$p$$ (the population proportion of supporters).\n- Step 2: Because the sample is random, each $$X_i$$ is **independent** of the others, and $$p$$ is **constant** across all 15 observations.\n- Step 3: The sum of $$n$$ independent Bernoulli trials with constant probability is, by definition, binomial: $$Y \\sim B(15, p)$$. All binomial conditions (fixed $$n$$, independence, constant $$p$$, two outcomes) are satisfied.\n\nTakeaway: yes/no questions on a random sample ⇒ binomial sum.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "A receptionist makes spelling mistakes at 5 per 10 pages. What's a suitable sampling distribution for mistakes in a 6-page document? (3 steps)", "answer": "- Step 1: Mistakes occur at a **constant average rate** over pages and are (approximately) independent of each other — these are the defining conditions for a **Poisson** distribution.\n- Step 2: The rate is $$\\frac{5}{10} = 0.5$$ mistakes per page, so over 6 pages the expected count is $$6 \\times 0.5 = 3$$.\n- Step 3: Hence the number of mistakes $$X \\sim \\text{Po}(3)$$. Probabilities like $$P(X < 2) = P(X=0) + P(X=1)$$ can then be read off from Poisson tables.\n\nTakeaway: constant rate over a continuous medium (pages, time, area) ⇒ Poisson model.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "When listing all possible samples of size 3 from a population, why do we treat ordered samples like $$(60, 60, 100)$$, $$(60, 100, 60)$$, and $$(100, 60, 60)$$ as distinct? (3 steps)", "answer": "- Step 1: Each position in the sample corresponds to an **independent draw**. The first draw's outcome is independent of the second's, and so on.\n- Step 2: The probability of each ordered outcome is a **product of individual-draw probabilities**, e.g., $$P(60) \\times P(100) \\times P(60)$$. Different orderings can yield the same unordered combination but still count as separate atomic events in the probability space.\n- Step 3: That's why we list them all: each ordered triple is one distinct event. We group them *afterwards* by the value of the statistic to find its sampling distribution. If we only listed unordered combinations, we'd underestimate the probability of mixed samples.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "For a sample of size 3 drawn (with replacement) from a population with 2 possible values, how many ordered samples are possible, and how many distinct sample means result? (3 steps)", "answer": "- Step 1: Each of the 3 positions has 2 independent choices: $$2^3 = 8$$ ordered samples total.\n- Step 2: Distinct sample means correspond to how many of each value appear. With values $$a$$ and $$b$$, the count of $$a$$s can be 0, 1, 2, or 3 — **four** distinct means.\n- Step 3: Multiple ordered samples can give the same mean (e.g., the 3 arrangements with \"two $$a$$s and one $$b$$\" all give the same average). Their probabilities combine when grouping.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "A store sells 60W and 100W bulbs in ratio 3:1. What is the intuition for the population mean being 70W? (3 steps)", "answer": "- Step 1: The population consists of $$\\tfrac{3}{4}$$ of 60W bulbs and $$\\tfrac{1}{4}$$ of 100W bulbs.\n- Step 2: Population mean is the weighted average: $$\\mu = 60 \\times \\tfrac{3}{4} + 100 \\times \\tfrac{1}{4} = 45 + 25 = 70$$.\n- Step 3: Intuitively: the mean is close to 60 but pulled up by the 25% of 100W bulbs. If the ratio were 1:1, the mean would be exactly 80. Because 60s dominate 3 to 1, the mean sits closer to 60.\n\nTakeaway: weighted average is pulled toward the more frequent value.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "For the same 60W/100W-in-3:1 bulb population with sample size 3, what values can the **mode** take, and why does it have a simpler distribution than the mean? (3 steps)", "answer": "- Step 1: With only two population values, the mode is whichever appears more often. Sample size 3 is odd, so one value always appears at least twice — no tie, mode is unique.\n- Step 2: The mode can only be **60 or 100** — those are the only values present.\n- Step 3: So the mode has only 2 outcomes, while the mean has 4 distinct values. The mode's distribution is coarser because it collapses many samples into just \"which value dominated.\" The mean preserves more information.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "For a sample of size 3, how is the median defined in terms of the ordered observations? (2 steps)", "answer": "- Step 1: Sort the 3 observations in increasing order. The median is the **middle** observation — the 2nd smallest (equivalently, 2nd largest).\n- Step 2: Unlike the mean, the median uses only the **rank** of the middle value, not the numerical values of the extremes. This makes the median resistant to outliers, but also means its distribution is discrete and takes only values already present in the population.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "For a sample of 3 counters from a population with values $$\\{0, 1, 2\\}$$ having probabilities $$\\{0.1, 0.4, 0.5\\}$$, what values can the median take, and intuitively which is most likely? (3 steps)", "answer": "- Step 1: The median of 3 sorted values is the middle one, which must be one of the population values: **0, 1, or 2**.\n- Step 2: Median = 2 requires at least 2 of the 3 draws to be 2 (since the middle can only be 2 if at least 2 of the sample are 2). Since $$P(2) = 0.5$$ is large, this is quite likely.\n- Step 3: Median = 0 requires at least 2 draws to be 0, but $$P(0) = 0.1$$ is small — very unlikely. So median = 2 is most probable, median = 0 is least, median = 1 is intermediate.\n\nTakeaway: the median's distribution gravitates toward the most probable population value.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For a population taking values 60 or 100 with probabilities $$\\tfrac{3}{4}$$ and $$\\tfrac{1}{4}$$, what's the probability of drawing the ordered sample $$(100, 60, 60)$$ with replacement? (2 steps)", "answer": "- Step 1: Draws are independent, so $$P(100, 60, 60) = P(100) \\times P(60) \\times P(60) = \\tfrac{1}{4} \\times \\tfrac{3}{4} \\times \\tfrac{3}{4} = \\tfrac{9}{64}$$.\n- Step 2: Any of the 3 arrangements with exactly one 100 gives the same probability. So the total probability of \"exactly one 100 in 3 draws\" is $$3 \\times \\tfrac{9}{64} = \\tfrac{27}{64}$$ — which is the probability that the sample mean equals $$73\\tfrac{1}{3}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why does the sampling distribution of $$\\bar{X}$$ typically include values *not* present in the population? (3 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ is an **average** — it pools information from all $$n$$ draws.\n- Step 2: If observations in a sample are mixed (some at value $$a$$, some at $$b$$), the mean lies strictly between $$a$$ and $$b$$. E.g., sample $$(60, 60, 100)$$ has mean $$73\\tfrac{1}{3}$$ — a value not in the population.\n- Step 3: Only a pure-one-value sample has $$\\bar{X}$$ equal to a population value. So the sampling distribution of $$\\bar{X}$$ lives on a **finer grid** than the population's values. This is why the mean is \"smoother\" than the mode or median.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why is finding a sampling distribution important for hypothesis testing? (3 steps)", "answer": "- Step 1: A hypothesis test compares an observed sample statistic against what the statistic would do **if a particular hypothesis about the population were true**.\n- Step 2: To make this comparison, you need to know how the statistic behaves under that hypothesis — that is, you need its sampling distribution.\n- Step 3: Given the sampling distribution, you can compute how extreme the observed value is (the p-value) and decide whether the data are consistent with the hypothesis. Without the sampling distribution, you have no yardstick for \"extreme.\"\n\nTakeaway: sampling distribution = yardstick for judging sample results.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why is the sample mean $$\\bar{X}$$ a \"good\" estimator of the population mean $$\\mu$$? What property makes it reliable? (3 steps)", "answer": "- Step 1: Under random sampling, $$E(\\bar{X}) = \\mu$$ exactly. This is called being an **unbiased estimator** — on average across all possible samples, the sample mean hits $$\\mu$$.\n- Step 2: The variance of $$\\bar{X}$$ is $$\\frac{\\sigma^2}{n}$$ — shrinking as $$n$$ grows. Individual estimates may be off, but they cluster around $$\\mu$$ ever more tightly with larger $$n$$.\n- Step 3: Unbiased + shrinking variance ⇒ **consistent** estimator: as $$n \\to \\infty$$, $$\\bar{X} \\to \\mu$$ in probability. That's why we trust sample means for large samples.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Show that $$E(\\bar{X}) = \\mu$$ when $$X_1, \\ldots, X_n$$ are independent observations each with mean $$\\mu$$. (3 steps)", "answer": "- Step 1: By definition, $$\\bar{X} = \\frac{1}{n}(X_1 + X_2 + \\cdots + X_n)$$.\n- Step 2: Expectation is linear, so $$E(\\bar{X}) = \\frac{1}{n}[E(X_1) + E(X_2) + \\cdots + E(X_n)]$$.\n- Step 3: Each $$E(X_i) = \\mu$$ (identical distributions), so $$E(\\bar{X}) = \\frac{1}{n}(n\\mu) = \\mu$$. The sample mean is unbiased for $$\\mu$$.\n\nTakeaway: unbiasedness follows directly from linearity of expectation + identical population means.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For $$n = 3$$ independent observations each with variance $$\\sigma^2$$, show that $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{3}$$. (4 steps)", "answer": "- Step 1: $$\\bar{X} = \\frac{1}{3}(X_1 + X_2 + X_3)$$.\n- Step 2: Variance scales quadratically with a multiplicative constant: $$\\text{Var}(aY) = a^2 \\text{Var}(Y)$$. So $$\\text{Var}(\\bar{X}) = \\frac{1}{9} \\text{Var}(X_1 + X_2 + X_3)$$.\n- Step 3: For independent variables, variance of a sum is the sum of variances: $$\\text{Var}(X_1 + X_2 + X_3) = \\sigma^2 + \\sigma^2 + \\sigma^2 = 3\\sigma^2$$.\n- Step 4: Combining: $$\\text{Var}(\\bar{X}) = \\frac{1}{9} \\times 3\\sigma^2 = \\frac{\\sigma^2}{3}$$.\n\nTakeaway: averaging $$n$$ independent observations shrinks variance by a factor of $$n$$ — *that's* why larger samples are more accurate.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why does testing a larger sample of plums (say 30 instead of 5) typically give a better estimate of the proportion of ripe plums? (3 steps)", "answer": "- Step 1: With only 5 plums, each single plum swings the estimated proportion by $$\\tfrac{1}{5} = 20\\%$$. One misleading observation shifts the estimate dramatically.\n- Step 2: With 30 plums, each one swings the proportion by only $$\\tfrac{1}{30} \\approx 3\\%$$. The estimate is much less sensitive to any individual plum.\n- Step 3: Formally, the standard error of a sample proportion is $$\\sqrt{\\frac{p(1-p)}{n}}$$, shrinking like $$\\frac{1}{\\sqrt{n}}$$. Going from $$n = 5$$ to $$n = 30$$ reduces the typical error by a factor of about $$\\sqrt{6} \\approx 2.4$$.\n\nTakeaway: individual observations have less leverage as $$n$$ grows.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A bag of coins contains 5p, 10p, 20p coins in ratio 3:2:1. What's the population mean value, and a quick sanity check? (3 steps)", "answer": "- Step 1: Probabilities from the ratio: $$P(5) = \\tfrac{3}{6} = \\tfrac{1}{2}$$, $$P(10) = \\tfrac{2}{6} = \\tfrac{1}{3}$$, $$P(20) = \\tfrac{1}{6}$$.\n- Step 2: Population mean $$\\mu = 5 \\times \\tfrac{1}{2} + 10 \\times \\tfrac{1}{3} + 20 \\times \\tfrac{1}{6} = 2.5 + 3.\\overline{3} + 3.\\overline{3} \\approx 9.17$$ pence.\n- Step 3: Sanity check: the mean sits between 5 and 20, dominated by 5p (50%-weighted) but pulled up by the rarer but larger-valued coins. The answer is plausibly close to 5–10p.\n\nTakeaway: the weighted mean must lie between min and max population values, biased toward more frequent ones.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A population of toasters costs $16 (40%), $20 (50%), $30 (10%). What are the possible sample mean prices for a sample of 2, and intuitively where should $$\\mu$$ sit? (3 steps)", "answer": "- Step 1: Population mean: $$\\mu = 0.4 \\times 16 + 0.5 \\times 20 + 0.1 \\times 30 = 6.4 + 10 + 3 = 19.4$$.\n- Step 2: For a sample of 2, possible price pairs (unordered): $$\\{16,16\\}, \\{16,20\\}, \\{16,30\\}, \\{20,20\\}, \\{20,30\\}, \\{30,30\\}$$. Sample means: $$16, 18, 23, 20, 25, 30$$ — 6 distinct values.\n- Step 3: Intuition for $$\\mu = 19.4$$: the dominant prices are $16 (40%) and $20 (50%), so the mean should be close to their midpoint ($18), slightly nudged up by the 10% chance of the expensive $30 toaster.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "How do you compute the population variance $$\\sigma^2$$ using the identity $$\\sigma^2 = E(X^2) - \\mu^2$$, for the 60W/100W population (3:1 ratio)? (3 steps)", "answer": "- Step 1: Compute $$E(X^2) = \\sum x^2 P(X=x) = 60^2 \\times \\tfrac{3}{4} + 100^2 \\times \\tfrac{1}{4} = 2700 + 2500 = 5200$$.\n- Step 2: We already have $$\\mu = 70$$, so $$\\mu^2 = 4900$$.\n- Step 3: Variance: $$\\sigma^2 = 5200 - 4900 = 300$$ watts$$^2$$. The formula is a clean shortcut: \"average of squares minus square of average,\" avoiding the computation of individual deviations.\n\nTakeaway: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ — a universally useful identity.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "For a sample of size 3 drawn with replacement, how many ordered samples are possible if the population has 2 values? 3 values? (2 steps)", "answer": "- Step 1: Each of 3 positions is independent, and each can take any population value.\n- Step 2: For 2 values: $$2^3 = 8$$ ordered samples. For 3 values: $$3^3 = 27$$ ordered samples. General formula: $$k^n$$ ordered samples for $$k$$ population values and sample size $$n$$ — grows rapidly in both.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "After listing all possible ordered samples and their probabilities, how do you collapse them into the sampling distribution of a specific statistic? (3 steps)", "answer": "- Step 1: Compute the statistic's value for each ordered sample. Multiple distinct samples may map to the same value (e.g., $$(60, 60, 100)$$, $$(60, 100, 60)$$, $$(100, 60, 60)$$ all give mean $$73\\tfrac{1}{3}$$).\n- Step 2: **Group samples by the statistic's value** and **sum** the probabilities within each group.\n- Step 3: The resulting table $$(t, P(T=t))$$ is the sampling distribution of the statistic $$T$$. Check: probabilities should sum to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "The probabilities in a sampling distribution must always sum to 1. Why is this a useful verification? (2 steps)", "answer": "- Step 1: Every possible sample contributes to exactly one statistic value, and every sample has some probability. Summing probabilities over all statistic values covers the entire probability space — total must equal 1.\n- Step 2: If your computed sampling distribution doesn't sum to 1, you've missed a sample, miscounted arrangements, or miscomputed a probability. It's a free, self-checking sanity test — also catches double-counting.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Why does the sampling distribution of the *median* (for $$n=3$$, 3-valued population) typically have *fewer* possible values than the sampling distribution of the *mean*? (3 steps)", "answer": "- Step 1: The median for an odd-sized sample is literally one of the observations — so it can only take values from the discrete population set (e.g., $$\\{0, 1, 2\\}$$): only 3 possible values.\n- Step 2: The mean takes averages of 3 draws, producing many more possible outcomes (e.g., $$0, \\tfrac{1}{3}, \\tfrac{2}{3}, 1, \\tfrac{4}{3}, \\ldots$$) — a finer grid.\n- Step 3: More granularity means the mean spreads probability thinly across many values; the median concentrates mass on a few. So the median's distribution looks \"lumpy\" while the mean's is smoother.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Can the sample mode from a size-3 sample always be predicted from the population mode? (3 steps)", "answer": "- Step 1: No — even if a population has a clear mode (say, value 2 with probability 0.5), individual samples can produce a different mode by chance. A sample $$(0, 1, 1)$$ has mode 1 regardless of what's most common overall.\n- Step 2: The sample mode is itself a statistic with its own sampling distribution, and it *tends to* favour the population mode, but doesn't guarantee it.\n- Step 3: For large samples, the sample mode almost certainly matches the population mode. But for $$n = 3$$, there's meaningful probability of disagreement — a reflection of sampling variability.\n\nTakeaway: sample statistics estimate population characteristics, never equalling them with certainty in a single sample.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "A student claims: \"Since $$X_1, X_2, X_3$$ are independent with mean $$\\mu$$, the sample mean $$\\bar{X}$$ must equal $$\\mu$$.\" What's the error? (3 steps)", "answer": "- Step 1: The statement confuses **expected value** with **actual value**. We have $$E(X_i) = \\mu$$ for each $$i$$, hence $$E(\\bar{X}) = \\mu$$ — but an expected value is a *long-run average*, not a guarantee for any single sample.\n- Step 2: For any specific sample, $$\\bar{X}$$ is some actual number that will usually *differ* from $$\\mu$$ — sometimes higher, sometimes lower. That's sampling variability.\n- Step 3: The correct statement: $$\\bar{X}$$ is an *unbiased estimator* of $$\\mu$$ — meaning on average over all possible samples, it hits $$\\mu$$. Any single sample mean is a random draw from a distribution *centred* on $$\\mu$$.\n\nTakeaway: don't conflate \"$$E(\\bar{X}) = \\mu$$\" with \"$$\\bar{X} = \\mu$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "\"Because samples are smaller than censuses, sample-based estimates must be less accurate for small subgroups too — just proportionally less accurate.\" What's the deeper issue? (2 steps)", "answer": "- Step 1: The deeper issue isn't just \"smaller = proportionally noisier.\" It's that **small subgroups may not appear at all** or appear very rarely in a sample, so there is simply no data to estimate from for those subgroups.\n- Step 2: With a census, even rare subgroups are represented at their true proportion. With a sample, you need a large enough $$n$$ to capture rare strata — otherwise, estimates about them are impossible, not just imprecise. This is a qualitative limitation, not just a quantitative one.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "You have two options: (a) census of 30 people in a village, (b) random sample of 30 from a city of 300 000. Compare the accuracy of each for its respective population. (3 steps)", "answer": "- Step 1: **For the village:** the census covers 100% of the 30 people — perfect information about the village population, zero sampling error.\n- Step 2: **For the city:** 30 out of 300 000 is a tiny fraction (0.01%). The sample mean has real sampling error, with magnitude depending on the city's variability.\n- Step 3: So (a) gives perfect info about its population; (b) gives a noisy estimate. But the comparison is apples-to-oranges: different populations. Both have the same sample size, but the villaged population is dramatically smaller. If the goal is \"accurate info about a city of 300k,\" 30 is clearly inadequate.\n\nTakeaway: accuracy depends on sample-to-population ratio *and* population variability, not just absolute sample size.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "You draw a random sample of size $$n$$ with $$\\bar{X}$$ as the estimator. If you want to halve the standard error of $$\\bar{X}$$, by what factor must you increase $$n$$? (3 steps)", "answer": "- Step 1: Standard error of $$\\bar{X}$$ is $$\\text{SE} = \\frac{\\sigma}{\\sqrt{n}}$$.\n- Step 2: To halve SE: $$\\frac{\\sigma}{\\sqrt{n'}} = \\frac{1}{2} \\times \\frac{\\sigma}{\\sqrt{n}}$$, giving $$\\sqrt{n'} = 2\\sqrt{n}$$.\n- Step 3: Squaring: $$n' = 4n$$. You need **4× the sample size** to halve the SE.\n\nTakeaway: precision grows like $$\\sqrt{n}$$, so cutting error in half costs 4× the data. Diminishing returns of sampling.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "What happens to the sampling distribution of the sample mean when the population variance is 0? (2 steps)", "answer": "- Step 1: Variance 0 means every population member has the same value $$\\mu$$. Any sample drawn must consist entirely of $$\\mu$$s.\n- Step 2: So $$\\bar{X}$$ is always exactly $$\\mu$$ — no variability. The sampling distribution is a single-point distribution: $$P(\\bar{X} = \\mu) = 1$$. In this limiting case, sampling gives certainty after a single observation.\n\nIntuition: uniform population ⇒ no value in sampling more than once.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "In the bulb population (60W 75%, 100W 25%), which sample mean is most likely for $$n = 3$$, and what's the intuition? (3 steps)", "answer": "- Step 1: The possible means with their probabilities: $$60 \\to \\tfrac{27}{64}$$, $$73\\tfrac{1}{3} \\to \\tfrac{27}{64}$$, $$86\\tfrac{2}{3} \\to \\tfrac{9}{64}$$, $$100 \\to \\tfrac{1}{64}$$.\n- Step 2: The most likely means (tied) are **60 and $$73\\tfrac{1}{3}$$**, each at $$\\tfrac{27}{64}$$. The pure-60 sample is highly probable because 60W dominates. Mixed samples with exactly one 100W (3 arrangements) combine to the same total probability.\n- Step 3: Intuition: sampling distributions reflect underlying population proportions. Pure 100W samples have probability only $$\\tfrac{1}{64}$$ — the 100W bulb being a minority means all-100 samples are rare.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "For $$n = 3$$ draws from a 3-valued population (0: 10%, 1: 40%, 2: 50%), what's the conceptual reason $$P(\\text{median} = 1)$$ is relatively high (around 47%)? (3 steps)", "answer": "- Step 1: The median equals 1 whenever the middle-sorted value is 1. This happens in several scenarios — all three 1s; two 1s plus any other; or one 1 flanked by a 0 and a 2 (sorted as 0,1,2).\n- Step 2: Many arrangements contribute:\n+ $$(1,1,1)$$: 1 ordering\n+ Two 1s + one other: 6 orderings (3 positions for the odd one × 2 choices of value)\n+ One of each {0,1,2}: 6 orderings (3! permutations)\n- Step 3: Because 1 has moderate probability (0.4) and \"can be in the middle\" of many mixed configurations, its contributions add up. The median = 1 isn't as extreme as requiring two 0s (very rare) or as constrained as pure-2 dominance. Intuitively, 1 is a natural \"middle\" value and often ends up in the median slot.\n\nTakeaway: the median favours central values that can sit between extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why is it more useful to know the *full sampling distribution* of a statistic, rather than just its mean and variance? (3 steps)", "answer": "- Step 1: Mean and variance summarise the statistic's **centre** and **spread**, but not its full shape. Two statistics can have the same mean and variance but very different distributions (e.g., symmetric vs. skewed).\n- Step 2: Hypothesis testing needs probabilities of extreme values — e.g., \"What's the chance of observing a value this large if $$H_0$$ is true?\" That requires the full distribution, not just summaries.\n- Step 3: The sampling distribution also reveals other features: multiple modes, boundary constraints (e.g., proportions between 0 and 1), discrete support. These shape interpretation of sample results.\n\nTakeaway: full distribution > summary statistics, especially for tail probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "A fair coin is tossed 3 times and $$H$$ = number of heads. Write down the distribution of $$H$$. (3 steps)", "answer": "- Step 1: Each toss is independent with $$P(H) = P(T) = 0.5$$. There are $$2^3 = 8$$ equally likely outcomes.\n- Step 2: Counts by number of heads:\n+ 0 heads (TTT): 1 outcome\n+ 1 head (HTT, THT, TTH): 3 outcomes\n+ 2 heads (HHT, HTH, THH): 3 outcomes\n+ 3 heads (HHH): 1 outcome\n- Step 3: Probabilities: $$P(H=0) = \\tfrac{1}{8}$$, $$P(H=1) = \\tfrac{3}{8}$$, $$P(H=2) = \\tfrac{3}{8}$$, $$P(H=3) = \\tfrac{1}{8}$$. This is $$B(3, 0.5)$$ — symmetric around 1.5.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "Given a sample $$X_1, \\ldots, X_{20}$$ from a population with mean $$\\mu$$, std deviation $$\\sigma$$, classify each as a statistic or not: (a) $$\\frac{X_1 + X_{20}}{3}$$; (b) $$\\frac{\\sum X}{20}$$; (c) $$\\sum X^2 + \\mu$$; (d) $$\\frac{\\sum X^2}{20} - \\sigma^2$$. (4 steps)", "answer": "- Step 1: **(a) Statistic ✓** — divisor is odd but no population parameter appears. Computable from sample values alone.\n- Step 2: **(b) Statistic ✓** — this is the sample mean $$\\bar{X}$$, a canonical example.\n- Step 3: **(c) Not a statistic ✗** — contains $$\\mu$$, the unknown population mean. Can't evaluate from sample alone.\n- Step 4: **(d) Not a statistic ✗** — contains $$\\sigma^2$$, the unknown population variance. Even though $$\\frac{\\sum X^2}{20}$$ is sample-based, subtracting $$\\sigma^2$$ makes the whole expression uncomputable.\n\nRule: any Greek letter (parameter) disqualifies.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "A forester measures heights of 50 randomly selected trees and computes the mean. Is this mean a statistic? Why? (3 steps)", "answer": "- Step 1: Yes — the mean of the 50 tree heights is $$\\bar{X} = \\frac{1}{50}\\sum X_i$$, computed entirely from sample observations.\n- Step 2: No unknown population parameter appears in the formula — only the sample data.\n- Step 3: Therefore it qualifies as a statistic. It serves as an estimate of the population mean $$\\mu$$ (the true mean of all trees in the forest), though the two are not equal in general.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "A doctor's surgery will offer health checks to all patients over 65. To estimate the time needed, a random sample of 20 such patients is checked. What's a suitable sampling frame and sampling unit? (2 steps)", "answer": "- Step 1: **Sampling frame:** the list (register) of all patients registered at the surgery who are over 65. This is the practical enumeration from which the sample is drawn.\n- Step 2: **Sampling unit:** each individual patient over 65 — the entity that might be randomly selected. Choosing 20 sampling units at random from the frame gives the sample of 20 patients.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "A call centre manager times a random sample of 30 of 400 operators to estimate mean call duration. What are two advantages and one disadvantage of using a sample here? (3 steps)", "answer": "- Step 1: **Advantage 1:** Less time-consuming — timing 30 operators is feasible in a day; timing all 400 would take much longer and require many observers.\n- Step 2: **Advantage 2:** Less data to process — 30 people's worth of call data is much more manageable than 400 people's worth.\n- Step 3: **Disadvantage:** The sample mean is only an **estimate** of the true population mean. Different random samples give different values, so the manager can't know the true average exactly without timing all 400.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "A factory tests every 200th light bulb from an assembly line. Why can't they test every bulb, and what is the sampling unit? (2 steps)", "answer": "- Step 1: Testing a bulb means running it until it fails — a **destructive test**. A full census would destroy every bulb, leaving none to sell.\n- Step 2: The sampling unit is **each individual bulb**. The sampling frame is effectively the assembly-line sequence, and picking every 200th is a form of systematic sampling — a practical compromise between cost and coverage.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "What's the essential distinction between a *population*, a *sample*, a *sampling frame*, and a *sampling unit*? (4 steps)", "answer": "- Step 1: **Population** — the entire universe of items of interest (e.g., all 400 call-centre operators).\n- Step 2: **Sampling frame** — the practical list of sampling units, used to draw a sample from (e.g., the employee register).\n- Step 3: **Sampling unit** — an individual member of the population (e.g., one operator). This is what gets selected.\n- Step 4: **Sample** — the actual selected subset (e.g., the 30 chosen operators). It's a collection of sampling units drawn from the frame.\n\nRelationship: population (ideal target) ≈ frame (practical list) ⟶ select sampling units ⟶ sample (actual data).", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "Could a sample from a population ever be *more accurate* than a census of the same population? (2 steps)", "answer": "- Step 1: In pure theory, no — the census captures every member exactly, leaving no room for sampling error. The sample, being a subset, has some uncertainty.\n- Step 2: **In practice, yes** — if a census is so large and error-prone that measurement mistakes accumulate, a smaller, more carefully measured sample can be more accurate overall. Data-entry errors, non-response, and coverage gaps can outweigh the theoretical precision advantage of a census. This is one reason modern statistical offices often prefer well-designed samples to massive censuses.\n\nTakeaway: accuracy depends on both sampling error and measurement quality.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "In a sample of 2 coins drawn from a bag with only 10p and 20p coins (each 50%), what values can the sample mean take, and why can't it take 12p or 15p-ish irrational values? (3 steps)", "answer": "- Step 1: Possible pair outcomes: (10, 10), (10, 20), (20, 10), (20, 20). Means: 10, 15, 15, 20. Distinct values: **10, 15, 20**.\n- Step 2: 12p can't arise because there's no way to average 10 and 20 to get 12 — the only mixtures achievable are all-10s, all-20s, or a single each.\n- Step 3: More generally, with only 2 population values and a sample of size 2, the sample mean is restricted to the two values themselves or their midpoint. Finer grids come from larger samples or more population values.\n\nTakeaway: the sample mean's support is determined by the population values and sample size — it doesn't invent new values.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "A gym's 300 members are to be surveyed about new opening hours. Thirty are asked. Why didn't the owners ask everyone, and what's a suitable sampling frame? (2 steps)", "answer": "- Step 1: **Why not ask all:** 300 members is too many to reach efficiently — surveying all would take a lot of time and effort, and response rates are often low. A sample is cheaper, faster, and usually sufficient for the decision.\n- Step 2: **Sampling frame:** the membership register (the list of all current gym members, with their contact info). Each individual member is a sampling unit, and 30 are drawn at random from the frame.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}], "count": 66}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 8124, "out_tokens": 11357, "reasoning_chars": 25919, "cost_eur": 0.0444, "elapsed_s": 452, "content_chars": 17089}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 8124, "out_tokens": 9876, "reasoning_chars": 21535, "cost_eur": 0.0396, "elapsed_s": 235, "content_chars": 15816}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/gl const SK='s2_ch6';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
