tion: P(M = 6) = 0.648, P(M = 10) = 0.352. Check: 0.648 + 0.352 = 1 ✓\n\nThe mode reflects the underlying population proportions — 6 is more likely because it's more common in the population.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A call center has 400 operators. The manager times a random sample of 30 operators over one day to estimate average call handling time. The manager calculates the sample mean from this data. Is this sample mean a statistic? Give a reason. (2 steps)", "answer": "- Step 1: Yes, the sample mean is a statistic — it's calculated entirely from the observations in the sample (the 30 timed calls).\n- Step 2: It uses only sample data (the actual times recorded from those 30 operators) with no reference to any unknown population parameter, so it meets the definition of a statistic.\n\nThis is true regardless of whether the quantity will be used to estimate a population parameter.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the difference between a parameter and a statistic? Give an example of each using the same context. (2 steps)", "answer": "- Step 1: A parameter is a numerical characteristic of the population (usually unknown), while a statistic is a numerical characteristic calculated from sample data.\n- Step 2: For example, if studying heights of adult men in a city: the true average height of ALL adult men in that city (which we typically don't know) is a parameter (μ), while the average height of the 100 men we actually measured ($$\\bar{x}$$) is a statistic.\n\nWe use statistics to estimate parameters.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A teacher wants to estimate the average test score in their class of 30 students. They could use a census (ask all 30) or a sample (ask some). What are the advantages and disadvantages of each approach in this specific context? (2 steps)", "answer": "- Step 1: Census advantage: with only 30 students, it's quick and inexpensive to collect all data, giving the exact class average (the parameter) with no sampling error. Disadvantage: slightly more time to collect all responses.\n- Step 2: Sample advantage: less data to process. Disadvantage: with such a small population, sampling provides minimal time savings, and the sample may not represent the class well due to high sampling variability with small n.\n\nFor small populations like this, a census is usually preferable since the extra effort is minimal.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In the context of sampling distributions, what does it mean for a statistic to be an \"unbiased\" estimator of a population parameter? (2 steps)", "answer": "- Step 1: An unbiased estimator means that if you took many, many samples and calculated the statistic each time, the long-run average of those statistics would equal the true population parameter.\n- Step 2: Symbolically, E($$\\hat{\\theta}$$) = θ, where $$\\hat{\\theta}$$ is the estimator and θ is the parameter being estimated. The sample mean $$\\bar{X}$$ is an unbiased estimator of the population mean μ.\n\nUnbiasedness doesn't guarantee any single sample estimate is exactly correct — it guarantees correctness on average.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}], "count": 40}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Explain the difference between a census and a sample, and state one specific situation where a census would be inappropriate to use. (2 steps)", "answer": "- Step 1: A census is a method of data collection where every single member of the population is measured or observed. A sample, by contrast, is when we observe only a subset of the population and use that information to make conclusions about the whole population.\n- Step 2: A census would be inappropriate when the testing process destroys the item being tested. For example, if testing the breaking strength of safety ropes, cutting each rope to test it would destroy the entire inventory, leaving nothing to sell. Similarly, taste-testing all food products would destroy the entire stock.\n- This is why quality assurance testers often use samples rather than testing every single item.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A company wishes to estimate the proportion of defective items in their production line. They are considering using a sample of 50 items rather than testing all 10,000 items produced daily. State two advantages and two disadvantages of using a sample instead of a census in this scenario. (1 step)", "answer": "- Advantages of using a sample:\n  + Much less time-consuming and cheaper than examining every single item\n  + Fewer personnel needed to conduct the testing\n  + Less data to process and analyze, making results available faster\n  + If testing is destructive, samples are the only practical option\n\n- Disadvantages of using a sample:\n  + Results may be less accurate — the sample might not perfectly represent the population\n  + The sample may not be large enough to detect small subgroups or rare defects\n  + Different samples could lead to different conclusions due to natural variation", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "What is meant by a sampling frame, and why might a sampling frame not exactly match the target population? Provide an example. (2 steps)", "answer": "- Step 1: A sampling frame is a list of all the sampling units (individual members) from which a sample will be drawn. It serves as the practical tool for selecting observations in a study.\n- Step 2: The sampling frame may not exactly match the population because:\n  + Some members of the population may not be included in the available list (e.g., people without fixed addresses missing from an electoral register)\n  + The list may include individuals who are no longer part of the target population (e.g., people who have moved away)\n- Example: If studying opinions of \"all residents in a city,\" the sampling frame might only include those registered to vote or those with listed phone numbers, excluding certain groups like recent movers or homeless residents.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A researcher wants to survey opinion about a new government policy. Explain what is meant by sampling units in this context, and how the choice of sampling frame could introduce bias. (2 steps)", "answer": "- Step 1: Sampling units are the individual members or items of the population that can be selected for the sample. In this survey, each individual person would be a sampling unit.\n- Step 2: Bias can be introduced if the sampling frame does not represent the true population. For example:\n  + Using a phone directory as a sampling frame would exclude people without phones\n  + Using an online survey would exclude those without internet access\n  + Using a membership list of a specific organization would exclude non-members\n- This means certain groups in the population have zero chance of being selected, leading to unrepresentative results.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A supermarket tests a sample of 5 plums from a delivery and finds 4 are ripe, estimating 80% are ripe. If they tested 30 plums instead, explain why this would likely give a more accurate estimate of the proportion of ripe plums. (2 steps)", "answer": "- Step 1: Larger samples reduce the impact of random variation inherent in any single sample. When you take a small sample, the observed proportion can deviate significantly from the true population proportion purely by chance.\n- Step 2: With n = 5 plums, finding 4 ripe gives 80%, but if the true proportion were 70%, getting 4 out of 5 is quite likely to happen by chance. With n = 30, if 24 are ripe (80%), this provides stronger evidence because getting 24 out of 30 by chance when the true proportion is lower is much less probable.\n- Conceptually, larger samples give more \"information\" about the population, narrowing the confidence interval around our estimate.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Define what a population parameter is, and explain why we typically cannot calculate population parameters directly in practice. Give two examples of population parameters. (2 steps)", "answer": "- Step 1: A population parameter is a numerical value that describes a characteristic of an entire population. Examples include the population mean (μ), population variance (σ²), and population proportion (p).\n- Step 2: We typically cannot calculate parameters directly because:\n  + The population may be infinite or extremely large\n  + Measuring every member may be impractical (time, cost, or destructive testing)\n  + The data may not yet exist (e.g., future manufacturing outcomes)\n- Notation: We use Greek letters (μ, σ², p) to denote population parameters, distinguishing them from sample statistics (x̄, s²).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Define what a statistic is in statistics, and explain why it is different from a population parameter. (1 step)", "answer": "- A statistic is a numerical value calculated entirely from the observations in a sample, without involving any unknown population parameters. It is a property of the sample itself.\n- Key distinction: A statistic uses only sample data that we actually observe, while a parameter describes the (usually unknown) true population. For example, the sample mean x̄ is a statistic, while the population mean μ is a parameter.\n- Once we calculate a statistic from actual sample data, it becomes a known fixed number for that particular sample.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A random sample of five observations is taken: X₁ = 3, X₂ = 8, X₂ = 32, X₄ = 38, X₅ = 43, X₆ = 44. For each of the following, state whether it is a statistic and explain why: (i) the sample mean, (ii) the expression (ΣX²/n) - (ΣX/n)², (iii) (ΣX/n) - μ² where μ is the population mean. (2 steps)", "answer": "- Step 1: (i) The sample mean x̄ = (3+8+32+38+43+44)/6 = 28 is a statistic because it is calculated entirely from sample observations with no unknown parameters.\n- Step 2: (ii) This expression equals the sample variance s² = [ΣX²/n] - [x̄]², which is also a statistic — it uses only sample values. (iii) This is NOT a statistic because it contains μ, the population mean, which is an unknown parameter. To be a statistic, the expression must be calculable from sample data alone.\n- This distinction matters because statistics can be computed from actual data, while parameters are unknown quantities we estimate using statistics.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "A factory produces light bulbs. A quality control engineer takes a random sample of 10 light bulbs and tests how long they last before failing. State what the sampling units are and what would be a suitable sampling frame in this situation. (1 step)", "answer": "- The sampling units are the individual light bulbs produced by the factory — each bulb is a distinct unit that could be selected for testing.\n- A suitable sampling frame could be:\n  + A list of all bulbs produced during a specific time period, with each bulb assigned a unique identifier\n  + Alternatively, a list of batch numbers or production timestamps that uniquely identify each bulb\n- The sampling frame must provide a practical way to select random samples from the population of all bulbs produced.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What is meant by the sampling distribution of a statistic? Explain why understanding sampling distributions is fundamental to statistical inference. (2 steps)", "answer": "- Step 1: The sampling distribution of a statistic is the probability distribution that describes all possible values the statistic could take and the probability of each value occurring when we repeatedly draw samples from the population.\n- Step 2: For example, if we take many different samples of size n from a population and calculate the sample mean each time, the distribution of these sample means is the sampling distribution of the sample mean.\n- This is fundamental to statistical inference because it tells us how the statistic behaves in repeated sampling — we can quantify how likely different values are, which allows us to make probability statements about population parameters and conduct hypothesis tests.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A school wants to find the proportion of students who support introducing a uniform. They define X = 1 if a student supports it and X = 0 otherwise. In a random sample of 15 students, Y = ΣXᵢ represents the number who support it. What is the sampling distribution of Y? Explain your reasoning. (2 steps)", "answer": "- Step 1: Since each student is asked independently, with constant probability p of supporting (success) and (1-p) of not supporting (failure), and there are exactly n = 15 trials, this satisfies the conditions for a binomial distribution.\n- Step 2: The sampling distribution is Y ~ B(15, p), where p is the (unknown) true proportion of all students who support the uniform.\n- The key insight is that Y counts the number of \"successes\" (supporters) in the sample, which follows the binomial distribution when sampling with replacement or from a very large population.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A bag contains 60-watt and 100-watt light bulbs in the ratio 3:1. If we randomly select 3 bulbs, find: (a) the mean and variance of the wattage in the population, (b) the probability that the sample mean equals exactly 60 watts. (3 steps)", "answer": "- Step 1: Population distribution: P(X=60) = 3/4, P(X=100) = 1/4\n  Population mean μ = 60 × (3/4) + 100 × (1/4) = 45 + 25 = 70 watts\n  Population variance σ² = [60² × (3/4) + 100² × (1/4)] - 70² = [10800 + 2500] - 4900 = 13300 - 4900 = 400 watts²\n- Step 2: For the sample mean to equal exactly 60 watts, all three selected bulbs must be 60-watt bulbs.\n- Step 3: P(all three are 60-watt) = (3/4)³ = 27/64 ≈ 0.422\n- This makes sense: the only way to get a sample mean of 60 is if every bulb in the sample is 60 watts.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Using the same light bulb population (60W and 100W in ratio 3:1), find the sampling distribution of the sample mean when taking samples of size 3. Show all possible values and their probabilities. (4 steps)", "answer": "- Step 1: There are 8 possible samples (with replacement): (60,60,60), three samples with exactly one 100W, three samples with exactly two 100W, and (100,100,100)\n- Step 2: Sample mean = 60 when all three are 60W: P = (3/4)³ = 27/64\n- Step 3: Sample mean = 73⅓ when exactly one is 100W (three arrangements): P = 3 × (1/4) × (3/4)² = 27/64\n- Step 4: Sample mean = 86⅔ when exactly two are 100W: P = 3 × (1/4)² × (3/4) = 9/64\n  Sample mean = 100 when all three are 100W: P = (1/4)³ = 1/64\n- The distribution sums to (27+27+9+1)/64 = 64/64 = 1 ✓", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A bag contains counters labeled 0 (probability 0.1), 1 (probability 0.4), and 2 (probability 0.5). If we draw 3 counters, find the probability that the median equals 0. Show your reasoning. (3 steps)", "answer": "- Step 1: The median is 0 only when all three draws are 0, or when exactly two are 0 (the third can be 0, 1, or 2).\n- Step 2: Cases where median = 0:\n  + All three are 0: p³ = (0.1)³ = 0.001\n  + Exactly two are 0: 3 × p² × q for each of q = 0.1, 0.4, 0.5 = 3 × (0.1)² × 0.1 + 3 × (0.1)² × 0.4 + 3 × (0.1)² × 0.5 = 3 × 0.01 × (0.1+0.4+0.5) = 3 × 0.01 × 1 = 0.03\n- Step 3: Total P(median = 0) = 0.001 + 0.03 = 0.031 = 7/250\n- This is the probability that the middle value (when sorted) is 0.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A population has values 60 and 100 in ratio 3:1. Find the sampling distribution of the mode M when taking samples of size 3. (2 steps)", "answer": "- Step 1: The mode can only be 60 or 100 (no mode if all three are different, but this can't happen with only two distinct values).\n- Step 2: P(mode = 60) = P(all three are 60) + P(exactly two are 60) = (3/4)³ + 3 × (3/4)² × (1/4) = 27/64 + 27/64 = 54/64 = 27/32\n  P(mode = 100) = P(exactly two are 100) + P(all three are 100) = 3 × (1/4)² × (3/4) + (1/4)³ = 9/64 + 1/64 = 10/64 = 5/32\n- The mode is 60 most of the time (84%+) because 60-watt bulbs are more common in the population.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Explain why the sample variance s² = Σ(Xᵢ - x̄)²/(n-1) is considered a statistic, while Σ(Xᵢ - μ)²/(n-1) is not a statistic, even though they both estimate the same population parameter. (2 steps)", "answer": "- Step 1: The sample variance s² uses x̄ (the sample mean), which is calculated from the same sample data. Everything needed to compute s² comes from observations we actually have.\n- Step 2: The expression Σ(Xᵢ - μ)²/(n-1) uses μ, the population mean, which is typically unknown. Since it requires knowledge of a population parameter that we don't have, it cannot be calculated from sample data alone.\n- The use of (n-1) in the denominator rather than n is intentional — this makes s² an unbiased estimator of the population variance σ², a concept you'll explore further in later chapters.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A call center with 400 operators wants to estimate the average time operators spend on each call. The manager times a random sample of 30 operators. Explain why the sample mean time is a statistic, and why the manager chose to use a sample rather than a census. (2 steps)", "answer": "- Step 1: The sample mean is a statistic because it is calculated entirely from the observations in the sample — the 30 timing measurements. No population parameters are involved in its calculation.\n- Step 2: The manager chose a sample because:\n  + Timing 400 operators would be extremely time-consuming and expensive\n  + The data from 400 calls would be difficult to process\n  + The manager doesn't need to time every single operator to get a good estimate — a well-chosen sample of 30 can provide sufficient accuracy\n- A census would be wasteful if a sample can provide adequate information at much lower cost.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A gym wants to know if members will be happy with new opening hours. They survey 30 randomly selected members. Give two reasons why they used a sample rather than a census, and identify what would be a suitable sampling frame. (2 steps)", "answer": "- Step 1: Reasons for using a sample:\n  + Surveying all members would be time-consuming and expensive\n  + Members might be annoyed at being asked to give their opinion repeatedly\n  + A sample provides adequate information without needing 100% participation\n- Step 2: A suitable sampling frame could be:\n  + The gym's membership list/database, with each member having a unique membership number\n  + This list would serve as the practical tool for selecting random members to survey\n- The sampling units would be the individual members of the gym.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A company tests every 200th light bulb coming off the production line to estimate how long they last. Explain why this is systematic sampling rather than random sampling, and state one potential disadvantage of this approach. (2 steps)", "answer": "- Step 1: This is systematic sampling because the company selects items at fixed intervals (every 200th item) rather than giving each item an equal chance of selection through random selection.\n- Step 2: A potential disadvantage is that if there is any periodic pattern in the production process (e.g., the machine calibrates every 200 items), the sample could be systematically biased and not represent the population well.\n- True random sampling would assign each bulb an equal probability of selection using random number generators, avoiding such systematic patterns.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A drawer contains 5p, 10p, and 20p coins in the ratio 3:2:1. If you randomly select 2 coins, list all possible samples and find the probability that the sample mean equals 10p. (4 steps)", "answer": "- Step 1: Population: P(5p) = 3/6 = 1/2, P(10p) = 2/6 = 1/3, P(20p) = 1/6\n- Step 2: Possible samples (with replacement): (5,5), (5,10), (10,5), (5,20), (20,5), (10,10), (10,20), (20,10), (20,20) — nine combinations\n- Step 3: Sample mean = 10p when: (5,15) averages to 10 — but we don't have 15p coins, so we need combinations that sum to 20: (10,10), (5,15 doesn't exist), so only (10,10) gives mean exactly 10\n- Wait, let me reconsider: sample mean = (5+15)/2 = 10 requires one 5p and one 15p, which doesn't exist. Actually: (10,10) = 10, (5,15) impossible, so P(mean=10) = P(both are 10p) = (1/3)² = 1/9\n- Actually the possible pairs that give mean 10 are: (5,15) - impossible, (10,10) - yes. Also (15,5) - impossible. So only (10,10).\n- Wait, I need to list all properly: (5,5), (5,10)×2, (5,20)×2, (10,10), (10,20)×2, (20,20). The probability is (1/3)² = 1/9.\n- More carefully: mean = 10 requires sum = 20. Only (10,10) works. P = (1/3)² = 1/9 ≈ 0.111", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In the context of sampling distributions, what does it mean for a statistic to be an \"unbiased estimator\" of a population parameter? Explain with an example from this chapter. (2 steps)", "answer": "- Step 1: An unbiased estimator is a statistic whose expected value (mean of its sampling distribution) equals the population parameter it estimates. In other words, on average, the statistic hits the true parameter value.\n- Step 2: For example, the sample mean x̄ is an unbiased estimator of the population mean μ — the expected value of x̄ equals μ. Similarly, the sample variance s² (using n-1 in denominator) is an unbiased estimator of the population variance σ².\n- If we used n in the denominator instead, the estimator would be biased (it would systematically underestimate σ²), especially for small samples.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A population has 60% counters with value 6 and 40% with value 10. If we draw a sample of 3 counters, find the sampling distribution of the median. (3 steps)", "answer": "- Step 1: Let p = P(6) = 0.6, q = P(10) = 0.4. The median is the middle value when sorted.\n- Step 2: Median = 6 when at least two of the three are 6:\n  + Three 6s: p³ = 0.6³ = 0.216\n  + Exactly two 6s: 3 × p² × q = 3 × 0.36 × 0.4 = 0.432\n  + Total: 0.648\n- Step 3: Median = 10 when at least two are 10:\n  + Three 10s: q³ = 0.4³ = 0.064\n  + Exactly two 10s: 3 × q² × p = 3 × 0.16 × 0.6 = 0.288\n  + Total: 0.352\n- Check: 0.648 + 0.352 = 1 ✓", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain the concept of sampling variation. Why do different samples of the same size from the same population typically give different values for the same statistic? (1 step)", "answer": "- Sampling variation occurs because each sample is a random subset of the population, and different subsets naturally contain different combinations of individuals. When we randomly select samples, we're essentially letting chance determine which population members we include.\n- For example, if a population has 60% supporters of a policy, one random sample of 10 people might contain 7 supporters (70%) while another might contain only 5 supporters (50%). This variation is natural and expected — it's not an error, but rather a fundamental feature of random sampling that we can quantify through sampling distributions.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A researcher wants to estimate the average height of all trees in a forest. They select 50 trees at random and measure each. Explain how they would use this sample to estimate the population mean height, and why this estimate might differ from the true population mean. (2 steps)", "answer": "- Step 1: The researcher calculates the sample mean x̄ by adding all 50 tree heights and dividing by 50. This sample mean is used as the point estimate for the population mean μ.\n- Step 2: This estimate likely differs from the true population mean because:\n  + The sample is only 50 trees out of potentially thousands in the forest\n  + By chance, the selected trees might include more tall trees or more short trees than the population as a whole\n  + This difference is sampling error — it's not a mistake, but rather the natural variation that occurs when estimating population parameters from samples", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A company manufactures three sizes of toasters: 40% sell for $16, 50% for $20, and 10% for $30. Find the mean and variance of the toaster prices in the population. (3 steps)", "answer": "- Step 1: Population distribution: P(16) = 0.4, P(20) = 0.5, P(30) = 0.1\n- Step 2: Mean μ = Σ[x × P(X=x)] = 16×0.4 + 20×0.5 + 30×0.1 = 6.4 + 10 + 3 = 19.4 dollars\n- Step 3: Variance σ² = Σ[x² × P(X=x)] - μ² = [16²×0.4 + 20²×0.5 + 30²×0.1] - 19.4² = [256×0.4 + 400×0.5 + 900×0.1] - 376.36 = [102.4 + 200 + 90] - 376.36 = 392.36 - 376.36 = 16 dollars²\n- The standard deviation would be √16 = $4.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "From the toaster population (40% at $16, 50% at $20, 10% at $30), find the sampling distribution of the sample mean when selecting 2 toasters. What is P(x̄ = 20)? (4 steps)", "answer": "- Step 1: Possible samples: (16,16), (16,20)×2, (16,30)×2, (20,20), (20,30)×2, (30,30)\n- Step 2: Calculate probabilities using multiplication (assuming independent selections):\n  + P(16,16) = 0.4² = 0.16\n  + P(16,20) + P(20,16) = 0.4×0.5 + 0.5×0.4 = 0.40\n  + P(16,30) + P(30,16) = 0.4×0.1 + 0.1×0.4 = 0.08\n  + P(20,20) = 0.5² = 0.25\n  + P(20,30) + P(30,20) = 0.5×0.1 + 0.1×0.5 = 0.10\n  + P(30,30) = 0.1² = 0.01\n- Step 3: Sample means: 16, 18, 23, 20, 25, 30\n- Step 4: P(x̄ = 20) = P(20,20) = 0.25\n- We could also get mean 20 from (16,24) or (24,16) if 24 existed, but we only have 16, 20, 30.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A large box of coins contains 5p, 10p, and 20p coins in the ratio 3:2:1. If we take a random sample of 2 coins, find the sampling distribution of the sample mean. (4 steps)", "answer": "- Step 1: Probabilities: P(5p) = 3/6 = 0.5, P(10p) = 2/6 ≈ 0.333, P(20p) = 1/6 ≈ 0.167\n- Step 2: Mean values:\n  + 5p with 5p: mean = 5 (prob = 0.5² = 0.25)\n  + 5p with 10p: mean = 7.5 (prob = 2 × 0.5 × 0.333 ≈ 0.333)\n  + 5p with 20p: mean = 12.5 (prob = 2 × 0.5 × 0.167 ≈ 0.167)\n  + 10p with 10p: mean = 10 (prob = 0.333² ≈ 0.111)\n  + 10p with 20p: mean = 15 (prob = 2 × 0.333 × 0.167 ≈ 0.111)\n  + 20p with 20p: mean = 20 (prob = 0.167² ≈ 0.028)\n- Step 3: Verify probabilities sum to 1: 0.25 + 0.333 + 0.167 + 0.111 + 0.111 + 0.028 ≈ 1 ✓\n- This shows how the sample mean varies depending on which coins happen to be selected.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Explain why taking a larger sample generally leads to a more accurate estimate of a population parameter. What are the practical limits on sample size? (2 steps)", "answer": "- Step 1: Larger samples tend to be more representative of the population because the law of large numbers kicks in — extreme values get \"diluted\" by the many more typical values. The sampling distribution of the sample mean becomes narrower (has smaller variance) as n increases.\n- Practically, doubling the sample size doesn't necessarily double accuracy — there's a square root relationship. To halve the sampling variability, you need four times the sample size.\n- Practical limits include: cost (larger samples cost more), time (longer to collect and process), and sometimes the population is simply not large enough. Also, beyond a certain point, the marginal gain in accuracy doesn't justify the additional cost.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A school has 500 students. The principal wants to know the average time students spend on homework. Instead of surveying all students, a sample of 50 is selected. What are the sampling units and what would be a suitable sampling frame? (1 step)", "answer": "- The sampling units are the individual students at the school — each student is a distinct unit that could potentially be selected for the sample.\n- A suitable sampling frame could be:\n  + The school's student register or enrollment list, with each student having a unique ID number\n  + A class list compiled for administrative purposes\n  + The school database containing student records\n- The sampling frame provides the practical mechanism for selecting which students will be in the sample.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A manufacturer claims their light bulbs last an average of 20000 switches. A sample of 5 switches is tested with results: 23150, 25071, 19480, 22921, 7455. Comment on the manufacturer's claim using the sample data. (3 steps)", "answer": "- Step 1: Calculate the sample mean: x̄ = (23150 + 25071 + 19480 + 22921 + 7455) / 5 = 98077 / 5 = 19615.4 switches\n- Step 2: Compare to claim: The sample mean of ~19615 is slightly below the claimed 20000, but this could easily be due to sampling variation.\n- Step 3: However, the sample is very small (n=5) and shows high variability (one switch lasted only 7455 cycles, much lower than others). This extreme value suggests either:\n  + The sample is not representative (one defective item)\n  + More data is needed to make a reliable conclusion\n- The company could improve their prediction by testing a much larger sample to get a more reliable estimate of the true mean lifetime.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A city council wants to know what residents think about a new recycling center. They decide to conduct a sample survey rather than a census. Give one reason why a census would be inappropriate and suggest a suitable sampling frame. (2 steps)", "answer": "- Step 1: Reasons why a census would be inappropriate:\n  + The population of a city could be hundreds of thousands of people — surveying everyone would be extremely time-consuming and expensive\n  + Processing millions of responses would be impractical\n  + Many residents might not respond, making a \"census\" actually incomplete anyway\n- Step 2: A suitable sampling frame could be:\n  + The electoral register (list of registered voters)\n  + A commercial database of household addresses\n  + A list of residents who have previously engaged with council services\n- The sampling units would be the individual residents of the city.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Explain why the sampling distribution of the sample mean from a population with mean μ and variance σ² has mean μ but variance σ²/n. (2 steps)", "answer": "- Step 1: The expected value (mean) of the sampling distribution of x̄ equals μ because:\n  + E(x̄) = E[(X₁ + X₂ + ... + Xₙ)/n] = (1/n)[E(X₁) + E(X₂) + ... + E(Xₙ)] = (1/n)[μ + μ + ... + μ] = (nμ)/n = μ\n- Step 2: The variance of x̄ equals σ²/n because:\n  + Var(x̄) = Var[(X₁ + ... + Xₙ)/n] = (1/n²)[Var(X₁) + ... + Var(Xₙ)] (assuming independent samples)\n  + = (1/n²)[σ² + σ² + ... + σ²] = (1/n²)(nσ²) = σ²/n\n- This shows that as sample size n increases, the sampling distribution becomes narrower (more concentrated around μ), which is why larger samples give more precise estimates.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the context of this chapter, distinguish clearly between a population parameter and a sample statistic, giving one example of each and explaining why they are represented using different notation. (1 step)", "answer": "- A population parameter is a fixed (though usually unknown) value that describes some characteristic of the entire population. Examples include the population mean μ, population variance σ², and population proportion p. We use Greek letters to denote parameters.\n- A sample statistic is a value calculated from sample data that serves as an estimate of the population parameter. Examples include the sample mean x̄, sample variance s², and sample proportion p̂. We use Roman letters to denote statistics.\n- The different notation helps us immediately recognize whether we're talking about a known sample value (statistic) or an unknown population value (parameter) that we're trying to estimate.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A quality control manager tests a random sample of 10 items from a production batch and finds 2 defective items. The manager estimates the proportion of defective items in the whole batch as 20%. Explain why this estimate might not exactly equal the true proportion in the population. (2 steps)", "answer": "- Step 1: The sample proportion 2/10 = 0.2 (20%) is only an estimate of the true population proportion. The true proportion could be higher or lower.\n- Step 2: This discrepancy occurs because:\n  + The sample is only a subset of the population — by chance, it might contain slightly more or fewer defective items than the population as a whole\n  + With a small sample of only 10, there's substantial sampling variability — getting exactly 2 defectives when the true proportion is 15% is plausible, as is getting 2 when it's actually 25%\n  + The sample proportion is a random variable that varies from sample to sample\n- To get a more reliable estimate, a larger sample would reduce the sampling variability.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A supermarket sells 3-liter and 2-liter milk cartons in the ratio 3:2. If a random sample of 3 cartons is selected, derive the sampling distribution of the sample mean. (4 steps)", "answer": "- Step 1: Population: P(3L) = 3/5 = 0.6, P(2L) = 2/5 = 0.4. Mean = 3×0.6 + 2×0.4 = 1.8 + 0.8 = 2.6 liters\n- Step 2: Possible samples of size 3 and their means:\n  + (3,3,3): mean = 3, prob = 0.6³ = 0.216\n  + Two 3s, one 2: mean = 8/3 ≈ 2.67, prob = 3 × 0.6² × 0.4 = 0.432\n  + One 3, two 2s: mean = 7/3 ≈ 2.33, prob = 3 × 0.6 × 0.4² = 0.288\n  + (2,2,2): mean = 2, prob = 0.4³ = 0.064\n- Step 3: Check: 0.216 + 0.432 + 0.288 + 0.064 = 1 ✓\n- Step 4: The sampling distribution shows that sample means cluster around the population mean of 2.6 L, but can take values from 2 to 3 liters depending on which cartons are selected.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "For the same milk carton population (3L and 2L in ratio 3:2), find the sampling distribution of the median for samples of size 3. (3 steps)", "answer": "- Step 1: For samples of size 3, the median is the middle value when sorted.\n- Step 2: Median = 3L when at least two are 3L:\n  + All three 3L: 0.6³ = 0.216\n  + Exactly two 3L: 3 × 0.6² × 0.4 = 0.432\n  + Total: 0.648\n- Step 3: Median = 2L when at least two are 2L:\n  + All three 2L: 0.4³ = 0.064\n  + Exactly two 2L: 3 × 0.4² × 0.6 = 0.288\n  + Total: 0.352\n- The median has a higher probability of being 3L (0.648) because 3L cartons are more common in the population.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Why is it important in statistics to understand that a statistic itself is a random variable? What practical implications does this have when making inferences about populations? (2 steps)", "answer": "- Step 1: Because a statistic is calculated from a random sample, it varies each time we take a different sample. This means the statistic has its own probability distribution (the sampling distribution), and any value we calculate is just one possible outcome from that distribution.\n- Step 2: Practical implications:\n  + We can never be 100% certain about our estimate — there's always sampling error\n  + We can quantify our uncertainty using probability statements (e.g., confidence intervals)\n  + We can design studies to control the amount of variability in our estimates (larger samples = less variability)\n  + When comparing statistics from different samples, we must account for the fact that differences might be due to sampling variation rather than real population differences\n- This understanding is fundamental to all of statistical inference, including hypothesis testing and confidence intervals.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A researcher defines a random variable X where X = 1 if a person supports a new policy and X = 0 otherwise. If a random sample of n people is selected, what is the sampling distribution of the sum ΣXᵢ? What parameter does this involve? (2 steps)", "answer": "- Step 1: The sum ΣXᵢ represents the number of people in the sample who support the policy (the count of \"successes\").\n- Step 2: This follows a binomial distribution: ΣXᵢ ~ B(n, p), where p is the true population proportion of supporters.\n- The parameter of interest is p (the population proportion), which is typically unknown and what the researcher wants to estimate.\n- The sampling distribution tells us the probability of getting different numbers of supporters in our sample, given the true (unknown) population proportion p.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A factory makes safety ropes that must withstand at least 250 kg. They test 4 ropes and record breaking loads: 320, 260, 240, 180 kg. Use this sample to comment on the claim that ropes are safe for 250 kg loads. (3 steps)", "answer": "- Step 1: Calculate sample statistics: mean = (320+260+240+180)/4 = 1000/4 = 250 kg; sample values are 320, 260, 240, 180\n- Step 2: The sample mean equals exactly 250 kg, but looking at individual values:\n  + One rope broke at only 180 kg (below 250 kg)\n  + One broke at 240 kg (below 250 kg)\n  + Two broke above 250 kg (260 and 320)\n- Step 3: Comment: The claim that ropes are \"safe for 250 kg\" is questionable because 50% of the sample (2 out of 4) actually broke below 250 kg. The sample is small, but it provides evidence that some ropes may not meet the 250 kg standard.\n- The company should test more ropes to get a better estimate of the true proportion that can handle 250 kg.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In statistical terminology, what exactly constitutes a \"population,\" and why is this term much broader than its everyday meaning?", "answer": "In statistics, a population is the whole set of items of interest for a particular investigation — not just people. It could be every plum in a delivery, every light bulb produced by a factory, every tree in a forest, or every call passing through a call centre. The key idea is \"complete set of things we want to make statements about.\" The word is misleading in everyday use (where it implies humans), but statistically it refers to any well-defined collection of units that share whatever characteristic we wish to study.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What defines a census, and what is the one property that distinguishes it from every sampling procedure? (2 steps)", "answer": "- Step 1: A census is the procedure where we observe or measure every single member of the population — nothing is omitted.\n- Step 2: The distinguishing property is zero omission. Any method that measures fewer than all members is, by definition, a sample — even if 99% of the population is measured.\n\nTakeaway: census = completeness; sample = selectivity.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does a census, despite giving the most accurate possible result, often turn out to be impractical or impossible in real investigations? (3 steps)", "answer": "- Step 1: A census requires examining every unit, so effort and cost scale directly with population size. For large populations this becomes prohibitively time-consuming and expensive.\n- Step 2: If the test itself destroys the item — cutting a plum to check ripeness, loading a rope until it breaks, operating a switch until failure — a full census would annihilate the entire population, including what you wanted to sell or use.\n- Step 3: Even if data could be collected, processing enormous volumes of observations is logistically hard, and personnel and record-keeping costs can dwarf any gain in accuracy.\n\nTakeaway: accuracy comes at the price of feasibility; censuses are ideal in theory but often irrational in practice.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What is the difference between a \"sampling unit\" and a \"sampling frame\"? (2 steps)", "answer": "- Step 1: A sampling unit is an individual member of the population — the smallest item that could potentially be selected and measured (e.g. one plum, one rope, one student).\n- Step 2: A sampling frame is a list or register of those units, usually individually named or numbered, from which the sample is actually drawn (e.g. a membership list, a serial-number register, an electoral roll).\n\nTakeaway: sampling unit = the \"what\"; sampling frame = the \"catalogue of whats.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why might a sampling frame fail to match the true population exactly, and what does this imply for the validity of conclusions? (3 steps)", "answer": "- Step 1: The sampling frame is a practical proxy — it is only as complete as the list used. For a city, for example, an electoral roll would miss non-registered residents, children, and recently-moved people.\n- Step 2: Members of the population not on the frame have zero chance of being selected, which biases any sample toward whoever the frame covers.\n- Step 3: So conclusions drawn technically describe the frame's population, not the underlying one. The gap between the two must be considered when interpreting results, and poor frame design can make even a \"random\" sample systematically misleading.\n\nTakeaway: the frame defines who *could* be picked; the population defines who we *wanted*.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "List the main advantages of a census versus a sample, and pair each with an example of when it matters. (3 steps)", "answer": "- Step 1: The primary advantage of a census is completeness — it should produce a fully accurate result because no member is excluded.\n+ Matters most when: the population is small, the decision is critical, or partial data could seriously mislead (e.g. a company surveying its own 10 employees).\n- Step 2: Advantages of a sample instead:\n+ much cheaper and faster than a census;\n+ fewer people/items need to respond or be tested;\n+ far less data to process and store.\n- Step 3: A sample is the natural choice when testing is destructive, resources are limited, or the population is enormous (e.g. testing breaking loads of climbing ropes).", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why does a more variable (less uniform) population require a larger sample to reach the same level of accuracy? (3 steps)", "answer": "- Step 1: If every unit in the population were identical, a single observation would already characterise the whole — no variability means no uncertainty.\n- Step 2: When units differ substantially, any small sample could by chance contain mostly extreme or mostly typical items. The sample statistic can therefore swing widely depending on which items happen to be picked.\n- Step 3: Increasing the sample size averages over this variability so that extreme values cancel out. The more varied the population, the more observations we need before the sample statistic settles close to the true population parameter.\n\nTakeaway: sample size must scale with the \"spread\" you're trying to pin down.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why can two equally-sized random samples drawn from the same population lead to different conclusions about that population? (2 steps)", "answer": "- Step 1: A random sample captures only a subset of the variability present in the population, and different random draws hit different combinations of units.\n- Step 2: So a statistic calculated from the sample (mean, proportion, etc.) will genuinely take different values across different samples. This isn't an error — it's inherent \"sampling variability,\" and it's precisely why a statistic has a *sampling distribution* rather than a fixed value.\n\nTakeaway: variability between samples is a feature of sampling, not a flaw to be eliminated.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "A factory tests climbing ropes by loading them until they break, and claims ropes are safe up to 250 kg. Their four-rope sample gave breaks at 320, 260, 240, 180 kg. Why is a census inappropriate here, and what weakness does the 4-rope sample expose? (3 steps)", "answer": "- Step 1: Testing a rope destroys it — a census would break all 3000 ropes, leaving none to sell. A sample is forced by the destructive nature of the test.\n- Step 2: Two of the four ropes (240 and 180 kg) broke below the claimed safe load of 250 kg. So the sample already directly contradicts the safety claim, casting serious doubt on it.\n- Step 3: However, four ropes is a tiny sample; the proportion of weak ropes cannot be reliably estimated from only four. The weakness is not that the test is wrong, but that the evidence base is too small to distinguish a few unlucky ropes from a systemic problem.\n\nImprovement: test a substantially larger sample.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "When a company estimates the average lifetime of its microswitches by operating them until they fail, why is a sample — not a census — essentially the only option? (2 steps)", "answer": "- Step 1: A census would require operating every microswitch until it fails. Since the quantity being measured is lifetime-to-failure, every unit tested is destroyed.\n- Step 2: A destroyed population has no products left to ship; the census would bankrupt the very investigation it was meant to support. A sample lets us estimate typical lifetime while sacrificing only a small fraction of production.\n\nTakeaway: whenever the measurement process destroys the item, sampling is not just preferred — it is mandatory.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "What is \"raw data,\" and how does it relate to summary statistics?", "answer": "Raw data is the information obtained directly from a population or sample, before any processing, summarisation or statistical calculation. It is the collection of individual observations or measurements as they were recorded. The term emphasises that the numbers have not yet been reduced to summary form — means, variances, proportions, etc. are *derived from* the raw data, not equivalent to it. A sample is essentially a subset of the population's raw data, from which statistics are then computed.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What is a \"population parameter,\" and why do we usually use Greek letters to denote it? (2 steps)", "answer": "- Step 1: A population parameter is a measurable numerical property of the whole population — for example the population mean $$\\mu$$, population variance $$\\sigma^{2}$$, or population proportion $$p$$.\n- Step 2: Greek letters are used to visually distinguish them from sample-based quantities (for which Roman letters like $$\\bar{X}$$ or $$S^{2}$$ are used). The Greek/Roman split lets readers see at a glance whether a number describes the whole population (usually unknown) or a sample (calculated and known).\n\nTakeaway: $$\\mu, \\sigma, p$$ = population (often unknown); $$\\bar{X}, S, \\hat{p}$$ = sample (known).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "What precisely is a \"statistic,\" and what property must any expression have to qualify as one? (3 steps)", "answer": "- Step 1: A statistic is a quantity calculated using *only* the observations in a sample — it is itself a numerical property of the sample.\n- Step 2: The critical requirement is that *no unknown population parameter* may appear anywhere in the formula. Known constants and the sample size $$n$$ are allowed; unknown $$\\mu$$, $$\\sigma$$, or $$p$$ are not.\n- Step 3: Reason: if an expression required an unknown parameter to evaluate, we couldn't compute it from the sample alone, so it couldn't serve as an estimator of anything.\n\nTakeaway: a statistic is computable from the sample with no external information about the population.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Explain why the sample mean $$\\bar{X}$$ and sample variance $$S^{2}$$ are statistics, but why $$\\dfrac{\\sum (X_i - \\mu)^{2}}{n-1}$$ is not. (3 steps)", "answer": "- Step 1: The sample mean uses only the observations $$X_i$$ and $$n$$. No unknown parameters appear, so it is computable from the sample — it qualifies as a statistic.\n- Step 2: The sample variance $$S^{2} = \\dfrac{\\sum (X_i - \\bar{X})^{2}}{n-1}$$ uses the $$X_i$$, their own mean $$\\bar{X}$$ (itself a statistic), and $$n-1$$. Again no unknown parameter enters — so it too is a statistic.\n- Step 3: The third expression contains $$\\mu$$, the population mean. If $$\\mu$$ is unknown, the expression cannot be evaluated from the sample. It fails the \"no unknown parameters\" test and is therefore not a statistic.\n\nTakeaway: replacing $$\\bar{X}$$ by $$\\mu$$ in a formula usually destroys the \"statistic\" property.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Given a random sample from a population with unknown mean $$\\mu$$, decide which are statistics: (i) $$\\dfrac{X_2+X_5+X_8}{3}$$, (ii) $$\\dfrac{\\sum X^{2}}{n} - \\left(\\dfrac{\\sum X}{n}\\right)^{2}$$, (iii) $$\\dfrac{\\sum X}{n} - \\mu^{2}$$. (3 steps)", "answer": "- Step 1: Expression (i) uses three specific observations and the constant 3. No unknown parameters appear, so it is a statistic — an average of three chosen sample values.\n- Step 2: Expression (ii) can be recognised as $$\\overline{X^{2}} - \\bar{X}^{2}$$ — a valid sample-variance-like formula. It uses only the $$X_i$$ and $$n$$, so it is also a statistic.\n- Step 3: Expression (iii) contains $$\\mu^{2}$$. Since $$\\mu$$ is unknown, it cannot be computed from the sample alone — it is *not* a statistic.\n\nTakeaway: scan every expression for Greek parameters; if they're unknown, the expression isn't a statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why is the notation distinction between uppercase $$X_i$$ and lowercase $$x_i$$ important in sampling theory? (2 steps)", "answer": "- Step 1: Uppercase letters (like $$X_i$$) denote random variables — the observations thought of *before* they have values, capable of taking any outcome the distribution allows.\n- Step 2: Lowercase letters (like $$x_i$$) denote the specific numerical values the random variables took once the sample was actually drawn.\n+ Example: $$P(X = x) = 0.3$$ uses both — $$X$$ is the random variable, $$x$$ is a particular value it could equal.\n+ Writing $$\\bar{X}$$ vs $$\\bar{x}$$ signals whether we're treating the mean as a random quantity with a distribution, or as a computed number.\n\nTakeaway: uppercase = random, before observation; lowercase = realised value, after observation.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "What is a \"sampling distribution,\" and in what sense does every statistic have one? (3 steps)", "answer": "- Step 1: Imagine repeating the sampling procedure many times — drawing a fresh random sample of the same size from the population — and computing the same statistic (say the sample mean) each time.\n- Step 2: Because different samples contain different items, the computed statistic takes different values. Collecting all possible values together, weighted by how often each occurs by chance, forms a probability distribution — the sampling distribution of that statistic.\n- Step 3: Formally, the sampling distribution lists every possible value the statistic can take, together with the probability of each. Every statistic — mean, mode, median, variance, proportion — has its own sampling distribution, determined by the underlying population and the sample size.\n\nTakeaway: a statistic is not a single number but a random variable — and its distribution is called the sampling distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why is understanding the sampling distribution central to hypothesis testing? (3 steps)", "answer": "- Step 1: A hypothesis test compares a sample statistic to what the statistic \"should\" look like *if* some claim about the population were true.\n- Step 2: \"Should look like\" is made precise by the sampling distribution under the hypothesis: it tells us the range of values the statistic naturally takes and with what probabilities.\n- Step 3: If our observed statistic lies far out in the tails of that sampling distribution, the hypothesis becomes implausible; if near the centre, the data is consistent with the hypothesis. Without a sampling distribution, there's no way to decide what counts as \"far\" versus \"typical,\" and no objective hypothesis test is possible.\n\nTakeaway: the sampling distribution = the reference ruler against which sample evidence is judged.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "In a survey where each student either supports a new uniform ($$X_i = 1$$) or does not ($$X_i = 0$$), and 15 students are asked, why does the statistic $$Y = \\sum_{i=1}^{15} X_i$$ follow a binomial distribution? (3 steps)", "answer": "- Step 1: $$Y$$ is the total number of supporters — the count of \"successes\" out of 15 trials.\n- Step 2: For a binomial distribution we need: a fixed number of independent trials, a constant probability of success, and two outcomes per trial.\n+ Random sampling makes the 15 observations independent.\n+ The population proportion $$p$$ of supporters is constant across trials.\n+ Each $$X_i$$ is either 0 or 1 — two outcomes.\n- Step 3: All three binomial conditions are met, so $$Y \\sim B(15, p)$$. This is the sampling distribution of the count statistic.\n\nTakeaway: counts of \"successes\" in independent yes/no trials are always binomial.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "What's the conceptual difference between the population parameter $$p$$ and the sample statistic $$\\hat{p} = Y/n$$, and why is the latter the usual estimator of the former? (2 steps)", "answer": "- Step 1: $$p$$ is the true, fixed (but unknown) proportion of the population with the property of interest. $$\\hat{p}$$ is the fraction of sampled units with that property — it changes from sample to sample.\n- Step 2: Because the sample is drawn randomly, $$\\hat{p}$$ centres around $$p$$ on average (it is unbiased), and as $$n$$ grows its sampling distribution tightens around $$p$$. So $$\\hat{p}$$ is our best sample-based guess of $$p$$, and refining the estimate just requires increasing $$n$$.\n\nTakeaway: $$\\hat{p}$$ is the observable shadow of the unobservable $$p$$.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "When listing all possible samples of size 3 from a population, why do we count $$(2,2,1)$$ and $$(2,1,2)$$ as *different* samples even though they contain the same values? (3 steps)", "answer": "- Step 1: Each sample is a sequence of observations $$(X_1, X_2, X_3)$$ drawn in order. The position of each draw matters because the draws are independent random events.\n- Step 2: Probabilities of sequences are computed by multiplying probabilities at each position, and different orderings each independently contribute to the total probability of the same multiset of values.\n+ If $$P(2)=r$$ and $$P(1)=q$$, then $$(2,2,1)$$, $$(2,1,2)$$ and $$(1,2,2)$$ each have probability $$r \\cdot r \\cdot q$$, together contributing $$3r^{2}q$$.\n- Step 3: Listing ordered samples (not multisets) ensures every pathway to an outcome is counted, which matters when computing the probability of a statistic like the mean, median or mode.\n\nTakeaway: sampling distributions are built from ordered outcomes; identical multisets with different orderings each count.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A manufacturer sells 60 W and 100 W bulbs in a 3:1 ratio. Without doing the arithmetic, walk through the conceptual steps to find the sampling distribution of the sample mean $$\\bar{X}$$ for a sample of 3 bulbs. (4 steps)", "answer": "- Step 1: Identify the underlying population distribution: $$P(X=60) = 3/4$$, $$P(X=100) = 1/4$$.\n- Step 2: Enumerate all ordered samples of size 3 — there are $$2^{3}=8$$ of them, from $$(60,60,60)$$ to $$(100,100,100)$$.\n- Step 3: For each sample, compute the mean. Different samples produce means in $$\\{60,\\ 73\\tfrac{1}{3},\\ 86\\tfrac{2}{3},\\ 100\\}$$ depending on how many 60's and 100's it contains.\n- Step 4: Compute the probability of each distinct mean by summing the probabilities of all ordered samples producing it (e.g. three orderings give mean $$73\\tfrac{1}{3}$$, contributing $$3 \\cdot (3/4)^{2}(1/4)$$). The resulting table of (mean, probability) pairs *is* the sampling distribution.\n\nTakeaway: sampling-distribution construction = enumerate samples + evaluate statistic + sum probabilities by outcome.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "For a sample of size 3 from a two-value population, why does the sampling distribution of the sample mean $$\\bar{X}$$ have 4 possible values, while the sampling distribution of the mode has only 2? (3 steps)", "answer": "- Step 1: With three draws from $$\\{60, 100\\}$$, the number of 60's can be 0, 1, 2 or 3. Each count corresponds to a distinct mean — hence 4 possible means.\n- Step 2: The mode is the most frequent value. In a sample of three from two categories, the majority value is either one or the other — there's no tie possible between two categories in three draws. So the mode always equals one of the two category values.\n- Step 3: The mean \"sees\" every combination; the mode only \"sees\" which side won the majority. The mode collapses several distinct sample compositions into the same outcome, shrinking the outcome set to 2.\n\nTakeaway: different statistics summarise the sample differently — so they have different sampling distributions even from the same raw samples.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "When computing the sampling distribution of the median of 3 observations from a 3-category population $$\\{0,1,2\\}$$, why is listing ordered samples essential rather than just listing distinct value-multisets? (3 steps)", "answer": "- Step 1: Each ordered sample has a single probability given by the product of the three category probabilities in order (e.g. $$P(0,1,2) = p \\cdot q \\cdot r$$).\n- Step 2: Different orderings of the same multiset (say $$\\{0,1,2\\}$$) share the same multiplied probability but represent distinct draw pathways. There are $$3! = 6$$ orderings for $$\\{0,1,2\\}$$, each with probability $$pqr$$, summing to $$6pqr$$.\n- Step 3: The median of $$\\{0,1,2\\}$$ is 1 regardless of order, so we'd add $$6pqr$$ to $$P(N=1)$$. If we'd listed the multiset only once, we'd understate that probability by a factor of 6. Listing ordered samples guarantees every pathway counts.\n\nTakeaway: the number of orderings is the combinatorial multiplier — missing it skews the sampling distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "A small bag has counters valued 0, 1, 2 with probabilities $$\\tfrac{1}{10}, \\tfrac{4}{10}, \\tfrac{5}{10}$$. Without computing every term, explain why the probability the median of 3 counters equals 2 is by far the largest. (3 steps)", "answer": "- Step 1: The median of 3 observations equals 2 when at least two of the three counters are 2's (since 2 is the largest value, the median can't be 2 otherwise).\n- Step 2: The value 2 is the most common single outcome ($$P=0.5$$), so in a sample of 3 we expect roughly 1.5 counters equal to 2. Having at least two 2's is therefore the most likely scenario among the three possible medians.\n- Step 3: For contrast: to get median 0 we'd need at least two 0's, but $$P(0)=0.1$$ is rare, making two-or-more 0's very unlikely. So intuitively $$P(N=2) \\gg P(N=0)$$ and in fact $$P(N=2) = \\tfrac{1}{2}$$ dominates the distribution.\n\nTakeaway: the median of a small sample is usually near the mode of the population.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "For a sample of size 2, why is it incorrect to compute the probability of sample mean $$\\bar{X} = \\tfrac{a+b}{2}$$ (for $$a \\neq b$$) as simply $$P(X=a) \\cdot P(X=b)$$? (3 steps)", "answer": "- Step 1: The product $$P(X=a) \\cdot P(X=b)$$ counts only one specific ordered outcome — first draw $$a$$, second draw $$b$$.\n- Step 2: But the same mean $$\\bar{X} = \\tfrac{a+b}{2}$$ arises equally from the ordered draw $$(b,a)$$, with probability $$P(X=b) \\cdot P(X=a)$$. Both orderings occur in real draws, so both must be counted.\n- Step 3: The correct probability for $$a \\neq b$$ is $$2 \\cdot P(X=a) \\cdot P(X=b)$$. Missing the factor of 2 (or, in general, the multinomial coefficient) systematically underestimates probabilities whenever the sample values are not all identical.\n\nTakeaway: distinct values → multiply by the number of orderings; identical values → only one ordering exists.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why is the sampling distribution of any statistic always a valid probability distribution — in the sense that its probabilities sum to 1? (2 steps)", "answer": "- Step 1: Every possible sample of the chosen size from the population produces some value of the statistic. So partitioning all possible samples by the statistic's value puts each sample in exactly one group.\n- Step 2: Summing the probabilities of all samples (which total 1) across these groups gives the total probability across all values of the statistic — also 1. Hence the sampling distribution is a legitimate probability distribution.\n\nTakeaway: completeness in enumeration ⇒ probabilities sum to 1; the sampling distribution isn't invented — it is inherited from the probability structure of the sample.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Walk through the reasoning that $$E(\\bar{X}) = \\mu$$ for a random sample $$X_1, \\ldots, X_n$$ from a population with mean $$\\mu$$. (3 steps)", "answer": "- Step 1: Start from the definition $$\\bar{X} = \\dfrac{1}{n}\\sum_{i=1}^{n} X_i$$.\n- Step 2: Take expectations on both sides, using linearity of expectation:\n$$E(\\bar{X}) = \\dfrac{1}{n}\\sum_{i=1}^{n} E(X_i).$$\n- Step 3: Each $$X_i$$ has expectation $$\\mu$$, so the sum is $$n\\mu$$; dividing gives $$E(\\bar{X}) = \\dfrac{n\\mu}{n} = \\mu$$.\n\nTakeaway: the sample mean is an unbiased estimator of the population mean — its sampling distribution centres exactly on $$\\mu$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "For a sample of size 3 of independent observations from a population with variance $$\\sigma^{2}$$, walk through the argument that $$\\operatorname{Var}(\\bar{X}) = \\tfrac{\\sigma^{2}}{3}$$. (4 steps)", "answer": "- Step 1: Write $$\\bar{X} = \\dfrac{1}{3}(X_1 + X_2 + X_3)$$.\n- Step 2: Use the rule $$\\operatorname{Var}(aY) = a^{2}\\operatorname{Var}(Y)$$ to factor out the constant: $$\\operatorname{Var}(\\bar{X}) = \\dfrac{1}{9}\\operatorname{Var}(X_1+X_2+X_3)$$.\n- Step 3: Because the $$X_i$$ are independent, variances add: $$\\operatorname{Var}(X_1+X_2+X_3) = 3\\sigma^{2}$$.\n- Step 4: Combining, $$\\operatorname{Var}(\\bar{X}) = \\dfrac{3\\sigma^{2}}{9} = \\dfrac{\\sigma^{2}}{3}$$.\n\nTakeaway: the sample mean spreads less than individual observations — variance divided by $$n$$ is the precision gain from averaging.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Conceptually, why does $$\\operatorname{Var}(\\bar{X}) = \\sigma^{2}/n$$ decrease as $$n$$ grows — even though each individual observation has variance $$\\sigma^{2}$$? (3 steps)", "answer": "- Step 1: Averaging is a specific kind of smoothing: when independent random variables are summed, their high fluctuations and low fluctuations partly cancel.\n- Step 2: The cancellation isn't perfect because fluctuations are random, but in a sum of $$n$$ independent terms the total variance is only $$n\\sigma^{2}$$ (variances add) — not $$n^{2}\\sigma^{2}$$.\n- Step 3: Dividing by $$n$$ (to form the mean) shrinks the standard deviation by a factor of $$n$$ *after* variance has grown by $$n$$, giving net variance $$\\sigma^{2}/n$$. So precision of $$\\bar{X}$$ improves like $$\\sqrt{n}$$.\n\nTakeaway: cancellation in sums is why large samples are informative — but the gain is $$\\sqrt{n}$$, not linear in $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A receptionist makes typing mistakes at a rate of 5 per 10 pages. What sampling distribution models the number of mistakes in a 6-page document, and why? (3 steps)", "answer": "- Step 1: Mistakes occur randomly and independently at a roughly constant rate over the pages — the conditions for a Poisson process.\n- Step 2: The Poisson parameter $$\\lambda$$ is the expected number of events in the chosen interval. At 5 mistakes per 10 pages, the rate is 0.5 per page, so for 6 pages $$\\lambda = 6 \\times 0.5 = 3$$.\n- Step 3: Therefore the number of mistakes $$X \\sim \\text{Po}(3)$$. To find $$P(X<2)$$ we would compute $$P(X=0) + P(X=1)$$ using the Poisson PMF.\n\nTakeaway: constant-rate, independent events in a fixed interval ⇒ Poisson; the parameter scales linearly with the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why is \"a statistic has a sampling distribution\" a more powerful idea than \"a statistic is just a formula\"? (2 steps)", "answer": "- Step 1: Treating the statistic as a formula gives one number per sample, with no framework for assessing how reliable or how typical that number is.\n- Step 2: Recognising the statistic as a random variable with its own distribution lets us answer questions like: \"How likely is this estimate off by more than 5%? How does precision grow with $$n$$? Is the observed value unusual enough to reject a hypothesis?\" None of those are answerable from a single realised value.\n\nTakeaway: statistics aren't numbers — they're random variables. That shift in viewpoint unlocks all of inferential reasoning.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Suppose someone asserts: \"If I double my sample from 100 to 200, my estimate becomes twice as precise.\" Is this correct, and why or why not? (3 steps)", "answer": "- Step 1: Precision for the sample mean is measured by the standard error $$SE = \\sigma/\\sqrt{n}$$.\n- Step 2: Going from $$n=100$$ to $$n=200$$ changes $$SE$$ from $$\\sigma/10$$ to $$\\sigma/\\sqrt{200} \\approx \\sigma/14.1$$ — a factor of only $$\\sqrt{2} \\approx 1.41$$, not 2.\n- Step 3: So doubling the sample size reduces the standard error by $$\\sqrt{2}$$, not 2. To *halve* the standard error one must *quadruple* $$n$$. The assertion is wrong — the improvement is only about 41%, not 100%.\n\nTakeaway: precision grows like $$\\sqrt{n}$$; diminishing returns are built into sampling.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why is the sample variance $$S^{2} = \\tfrac{1}{n-1}\\sum (X_i-\\bar{X})^{2}$$ defined with $$n-1$$ rather than $$n$$ in the denominator? (3 steps)", "answer": "- Step 1: When measuring deviations from the true population mean $$\\mu$$, every observation contributes a \"fresh\" piece of information — dividing by $$n$$ would then be natural.\n- Step 2: But since $$\\mu$$ is unknown we substitute $$\\bar{X}$$, which is itself computed from the same data. The sample values are already \"pulled toward\" $$\\bar{X}$$, so deviations from $$\\bar{X}$$ are systematically smaller than deviations from $$\\mu$$.\n- Step 3: Dividing by $$n-1$$ instead of $$n$$ compensates for this \"lost\" degree of freedom, making $$S^{2}$$ an unbiased estimator of $$\\sigma^{2}$$. Intuitively: we used one piece of data to compute $$\\bar{X}$$, leaving only $$n-1$$ independent residuals.\n\nTakeaway: $$n-1$$ is a degrees-of-freedom correction that unbiases $$S^{2}$$ after estimating $$\\mu$$ from the same sample.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A coin is tossed 3 times and $$H$$ is the number of heads. What is the sampling distribution of $$H$$, and why can we recognise this without enumeration? (3 steps)", "answer": "- Step 1: Each toss is independent with $$P(\\text{Head}) = 0.5$$, and we're counting heads across a fixed number of identical independent trials with two outcomes. These are exactly the conditions for $$B(3, 0.5)$$.\n- Step 2: By pattern recognition we write $$H \\sim B(3, 0.5)$$, giving\n+ $$P(H=0) = 1/8$$\n+ $$P(H=1) = 3/8$$\n+ $$P(H=2) = 3/8$$\n+ $$P(H=3) = 1/8$$\n- Step 3: The symmetry $$P(H=0) = P(H=3)$$ and $$P(H=1) = P(H=2)$$ reflects $$p = 0.5$$, and the binomial coefficients (1, 3, 3, 1) count orderings producing each outcome.\n\nTakeaway: the binomial distribution encodes both the number of success-paths and the trial probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "In what sense is the mean of a sample still a \"random variable\" even after you've calculated it from actual data? (3 steps)", "answer": "- Step 1: The computed mean is a single number for that specific sample. But that number was obtained by applying the mean formula to a random sample; a different random sample would have yielded a different number.\n- Step 2: Thinking of \"the sample mean\" as a function of the random sample makes it a random variable: its value depends on the random outcome of the sampling process.\n- Step 3: This dual perspective — a realised number after sampling, a random variable before sampling — is what makes inference possible. We use the distribution of the random variable to judge the plausibility of the realised number.\n\nTakeaway: the sample mean lives in both worlds — concrete after the fact, random before it.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "For a population of two values 0 and 1 with $$P(1) = p$$, explain why the sample proportion equals the sample mean — and why this lets us estimate $$p$$ directly via $$\\bar{X}$$. (3 steps)", "answer": "- Step 1: For a 0/1-valued sample, the sum $$\\sum X_i$$ counts the number of 1's. Dividing by $$n$$ gives the proportion of 1's, i.e. the sample proportion $$\\hat{p}$$.\n- Step 2: But $$\\sum X_i / n = \\bar{X}$$ by definition of the sample mean. So $$\\hat{p} = \\bar{X}$$ in this setting.\n- Step 3: Since $$E(\\bar{X}) = E(X) = p$$ for a Bernoulli population, the sample proportion is an unbiased estimator of $$p$$. Computing $$\\bar{X}$$ therefore gives a direct, justified estimate of the population proportion.\n\nTakeaway: sample proportions and sample means coincide for 0/1 populations — a useful bridge between the two concepts.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "A city council wants to learn residents' opinions on a recycling centre. Why would they use a sample rather than a census, what is a plausible sampling frame, and what are the sampling units? (3 steps)", "answer": "- Step 1: A census of a whole city would be prohibitively expensive and time-consuming, and not all residents would respond — a sample gives good information much more cheaply.\n- Step 2: A suitable sampling frame is a list identifying residents — for example, the electoral register or a council-maintained register of adult residents.\n- Step 3: The sampling units are the individual residents — the smallest indivisible members of the population being sampled.\n\nTakeaway: reasoning order: population → frame (practical list) → unit (individual item selected).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Why are \"population\" and \"sampling frame\" sometimes not identical, using the city-recycling survey as an example? (2 steps)", "answer": "- Step 1: The population is the target group we really want opinions from — typically all residents of the city. The sampling frame is the list we use in practice, like the electoral roll.\n- Step 2: The electoral roll misses non-citizens, non-registered residents, recently-moved people, and so on. So the frame is an imperfect proxy — anyone not on the frame cannot be sampled and is silently excluded, systematically biasing conclusions toward whoever the frame does cover.\n\nTakeaway: the frame defines who *could* be picked; the population defines who we *wanted*.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "A flower shop has 10 employees and the owner asks all of them about flower quality. Why is this a census rather than a sample, and why is it reasonable here? (2 steps)", "answer": "- Step 1: \"All 10\" means every member of the population is observed — by definition, that is a census, not a sample.\n- Step 2: With only 10 employees, census cost and effort are trivial; data processing is simple; and the result is completely accurate rather than estimated. The usual disadvantages of census don't apply when the population is tiny.\n\nTakeaway: for very small populations, a census is often the sensible choice — disadvantages scale with size.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A company tests every 200th light bulb off an assembly line. Why is this necessarily a sample and not a census, and what's the sampling unit? (2 steps)", "answer": "- Step 1: \"Every 200th\" means 199 out of every 200 bulbs are not tested — most of the population is unobserved. Since fewer than all bulbs are examined, it's a sample.\n- Step 2: The sampling unit is the individual light bulb — the smallest separable item being selected and tested.\n\n(Note: this is a specific *systematic* sampling method, where units are selected at fixed intervals.)", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "A call-centre manager with 400 operators times only 30 randomly chosen operators over one day. Identify two advantages of sampling over a census here, one disadvantage, and whether the computed mean time is a statistic. (3 steps)", "answer": "- Step 1: Advantages of the sample:\n+ Much faster and cheaper — timing 30 operators for a day is manageable; timing all 400 would require huge resources.\n+ Far less data to process and analyse; inference can be drawn quickly.\n- Step 2: Disadvantage:\n+ The estimate of average call time is not perfectly accurate — it carries sampling variability and could mislead if the 30 chosen operators happen to be atypical.\n- Step 3: The mean time *is* a statistic, because it is calculated only from sample observations with no unknown parameters involved.\n\nTakeaway: sample vs census is a trade-off of speed and cost against accuracy; any quantity computed only from sample data qualifies as a statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "A forester estimates the mean height of trees in a forest by measuring 50 randomly selected trees and averaging. Is this sample mean a statistic? (2 steps)", "answer": "- Step 1: A statistic is any quantity calculated only from sample observations, with no unknown population parameters in the formula.\n- Step 2: The sample mean $$\\bar{H} = \\dfrac{1}{50}\\sum_{i=1}^{50} H_i$$ uses only the 50 measured heights and the known sample size 50. No population parameter appears — so yes, it is a statistic.\n\nTakeaway: a quantity is a statistic by virtue of what it *doesn't* contain (unknown parameters), not just what it does.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A random sample $$M_1, \\ldots, M_n$$ is drawn from a population with unknown mean $$\\mu$$. Classify each: (i) $$\\dfrac{M_3+M_8}{2}$$, (ii) $$\\dfrac{\\sum M}{n}$$, (iii) $$\\dfrac{\\sum M}{n} - \\mu^{2}$$. (3 steps)", "answer": "- Step 1: (i) uses only two sample observations and a constant. No unknown parameter ⇒ **statistic**.\n- Step 2: (ii) is the sample mean, computed purely from observations and $$n$$. No unknown parameter ⇒ **statistic**.\n- Step 3: (iii) contains $$\\mu^{2}$$, an unknown population parameter. The expression cannot be evaluated from the sample alone ⇒ **not a statistic**.\n\nTakeaway: spot the unknown parameters — their presence disqualifies an expression from being a statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Tomato weights $$X_1, \\ldots, X_{20}$$ are sampled from a population with mean $$\\mu$$ and sd $$\\sigma$$. Classify each: (a) $$\\dfrac{X_1+X_{20}}{3}$$, (b) $$\\dfrac{\\sum X}{20}$$, (c) $$\\sum X^{2} + \\mu$$, (d) $$\\dfrac{\\sum X^{2}}{20} - \\sigma^{2}$$. (4 steps)", "answer": "- Step 1: (a) uses only $$X_1$$, $$X_{20}$$ and a known constant 3. No unknown parameters ⇒ **statistic**, even though the formula is unusual.\n- Step 2: (b) is the sample mean; denominator is known. No unknown parameters ⇒ **statistic**.\n- Step 3: (c) contains $$\\mu$$ (population mean), unknown. Cannot be evaluated from the sample ⇒ **not a statistic**.\n- Step 4: (d) contains $$\\sigma^{2}$$ (population variance), unknown. Cannot be evaluated from the sample ⇒ **not a statistic**.\n\nTakeaway: the defining test is always \"can I compute this from the sample alone?\" If yes ⇒ statistic; if any unknown parameter is involved ⇒ no.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "A doctor plans to offer health checks to patients over 65, but first tests a sample of 20 to estimate the time needed. What is a suitable sampling frame and what are the sampling units? (2 steps)", "answer": "- Step 1: A suitable sampling frame is the list of all patients at the surgery aged over 65 — the names or IDs from which the 20-person random sample will
