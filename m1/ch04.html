it's doing vertically.\" Here, horizontal = accelerating; vertical = in equilibrium.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "If a particle of mass $$m$$ kg is acted upon by a resultant force $$\\mathbf{F} = (p\\mathbf{i} + q\\mathbf{j})$$ N, how do you find the acceleration vector $$\\mathbf{a}$$? Can you apply F=ma component-wise? (3 steps)", "answer": "- Step 1: Write Newton's Second Law in vector form: $$\\mathbf{F} = m\\mathbf{a}$$.\n- Step 2: To find the acceleration vector, divide the force vector by the mass: $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$.\n- Step 3: Yes, you can apply it component-wise. This means $$p\\mathbf{i} + q\\mathbf{j} = m(a_x\\mathbf{i} + a_y\\mathbf{j})$$, so the $$\\mathbf{i}$$ component of acceleration is $$a_x = \\frac{p}{m}$$ and the $$\\mathbf{j}$$ component is $$a_y = \\frac{q}{m}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A common misconception is that Newton's Third Law action-reaction pairs cancel each other out, so there can never be a resultant force. Why is this wrong? (3 steps)", "answer": "- Step 1: Newton's Third Law pairs act on *different* objects. For example, if A pushes B, B pushes A. The force on B and the force on A are the pair.\n- Step 2: To find the resultant force on an object, you only sum the forces acting *on that single object*. You do not include forces that the object exerts on other objects.\n- Step 3: Therefore, the action-reaction pair never appears in the same force diagram for a single object, so they do not cancel out when calculating the acceleration of that specific object.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "Why can horizontal and vertical forces be resolved independently without \"interfering\" with each other? (2 steps)", "answer": "- Step 1: Horizontal and vertical directions are **perpendicular** (orthogonal). A vector has components along each axis, and these components are independent of one another.\n- Step 2: A force purely horizontal produces no vertical effect, and vice versa. This is why we can write two separate equations (one for $$\\mathrm{R}(\\rightarrow)$$ and one for $$\\mathrm{R}(\\uparrow)$$) and solve them separately. In 2D, any vector equation reduces to two scalar equations along perpendicular axes.\n\nThis decomposition principle is the foundation for solving almost every 2D mechanics problem.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "A train (6400 kg) pushes a carriage (1600 kg) via a light rod (shunt). Engine drives with 12000 N forward; resistances are $$R\\,\\text{N}$$ on train, 2000 N on carriage. System accelerates at 0.5 m/s². Explain how to find $$R$$ and the rod's state (tension/thrust). (5 steps)", "answer": "- Step 1: Whole-system: total mass = 8000 kg. External forces: 12000 N forward, $$R + 2000$$ backward.\n- Step 2: Equation: $$12000 - R - 2000 = 8000 \\times 0.5 = 4000$$, giving $$R = 6000\\,\\text{N}$$.\n- Step 3: For the carriage alone: forward = thrust from rod (call it $$T$$), backward = 2000 N resistance. $$T - 2000 = 1600 \\times 0.5 = 800 \\Rightarrow T = 2800\\,\\text{N}$$.\n- Step 4: In this setup (train pushes carriage), the rod is being compressed between them — it's in THRUST, not tension. The 2800 N represents the rod's thrust.\n- Step 5: Check on train: $$12000 - 6000 - 2800 = 3200 = 6400 \\times 0.5$$. ✓\n\nWhen a vehicle PUSHES another, the connecting rod is in thrust. When it PULLS, the rod is in tension.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "In a pulley problem, why are the speeds of the two particles always equal in magnitude (even after several phases)? (3 steps)", "answer": "- Step 1: While the string is taut, both particles must move with the same magnitude of velocity (from inextensibility — same displacement means same speed).\n- Step 2: When the string is slack, each particle moves independently — speeds can differ.\n- Step 3: If the string re-becomes taut, an impulsive tension instantly re-equalizes the speeds along the string's direction (often modeled as a \"jerk\" or discontinuity in velocity).\n\nSo the equality of speeds is GUARANTEED whenever the string is taut and inextensible. If string goes slack, the constraint is temporarily released.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "What is the key conceptual difference between \"tension in a connected system\" and \"the reaction force between stacked objects\"? (3 steps)", "answer": "- Step 1: Both are **internal forces** (Newton-3 pairs between two connected bodies) that emerge when you separate the bodies for analysis.\n- Step 2: Tension: applies through a string or rod — the force pulls the two bodies TOWARD each other. Same magnitude on both, opposite directions.\n- Step 3: Reaction (contact) force between stacked objects: applies through direct surface contact — the top pushes DOWN on the bottom, the bottom pushes UP on the top with the same magnitude.\n\nCommon feature: both are internal, both obey Newton 3, both disappear when you treat the system as one particle. You expose them only when you isolate one body.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A block rests on a horizontal table. What is the \"normal reaction\" force, and why must it exist if the block is not accelerating vertically? (2 steps)", "answer": "- Step 1: The normal reaction ($$R$$) is the upward force exerted by the surface on the block. It is called \"normal\" because it acts perpendicular to the surface of contact.\n- Step 2: It must exist to balance the block's weight ($$mg$$) acting downward. If $$R$$ did not exist, there would be a resultant downward force, and the block would accelerate downwards through the table. Since the block is stationary vertically, $$R$$ must exactly equal $$mg$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "In the 2m/3m pulley system, what is the tension in the string once you know $$a = g/5$$, and why is it between the two weights?", "answer": "Substitute $$a = g/5$$ into the equation of motion for $$P$$ (the ascending mass): $$T - 2mg = 2m \\cdot g/5$$, giving $$T = 2mg + \\frac{2mg}{5} = \\frac{12mg}{5}$$. This is between $$2mg$$ (weight of $$P$$) and $$3mg$$ (weight of $$Q$$): it must exceed the lighter weight to lift $$P$$ upward, but fall short of the heavier weight so $$Q$$ still descends. Tension always lies between the two weights in a simple Atwood-style pulley — a useful sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why might you solve a dynamics problem by computing acceleration first (via kinematics) and then using $$F = ma$$ to find a force? (3 steps)", "answer": "- Step 1: Many problems give you kinematic data (initial speed, final speed, distance, time) but ask for a force.\n- Step 2: First use SUVAT to extract acceleration from the kinematic data (e.g., $$v^2 = u^2 + 2as$$ gives $$a$$ from $$u$$, $$v$$, $$s$$).\n- Step 3: Then apply $$F = ma$$ to find the required force, given the mass.\n\nPattern: kinematics → acceleration → dynamics → force. This reverses the more common \"dynamics → acceleration → kinematics → motion\" workflow. Problem-solving flexibility requires recognising which direction to go.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "For particles connected by a string over a pulley, why is the tension less than the weight of a hanging mass?", "answer": "- Step 1: **Net force**: If the system accelerates, $T < mg$ for the descending mass because $mg - T = ma$.  \n- Step 2: **Acceleration dependence**: Tension equals weight only if acceleration is zero (equilibrium).  \n- Step 3: **Contrast with equilibrium**: In equilibrium, $T = mg$, but acceleration alters this relationship.  \n\n**Takeaway:** Tension adjusts to provide net force for acceleration, deviating from weight unless in equilibrium.", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "In vector form, why does $$\\mathbf{F} = m\\mathbf{a}$$ yield two independent scalar equations in 2D? (3 steps)", "answer": "- Step 1: Write the vector equation in component form: $$F_x \\mathbf{i} + F_y \\mathbf{j} = m(a_x \\mathbf{i} + a_y \\mathbf{j})$$.\n- Step 2: Equate corresponding components:\n+ i-component: $$F_x = m a_x$$.\n+ j-component: $$F_y = m a_y$$.\n- Step 3: These are two independent scalar equations — solvable separately because the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ axes are orthogonal (dynamically independent).\n\nImplication: a purely horizontal force produces NO vertical acceleration, and vice versa. Each axis lives its own dynamic life.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "In modelling assumptions, why is it important to state \"the string is inextensible\" when finding the acceleration in a connected-particle problem?", "answer": "Without inextensibility, the two particles could have DIFFERENT accelerations — the string could stretch, allowing one particle to accelerate faster than the other, and you'd have two unknowns ($$a_1$$ and $$a_2$$) instead of one ($$a$$). Inextensibility enforces a kinematic constraint: both ends of the string move identically, so both particles share the same $$|a|$$. This reduces the problem to a solvable form.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "What is the key difference between how we analyze connected particles moving in the same straight line versus particles connected by a pulley (moving in different directions)? (2 steps)", "answer": "- Step 1: For particles connected in a straight line (same direction), we can treat them as a single particle with total mass, because they all have the same acceleration magnitude and direction. This gives one equation F_total = (m_total)a.\n- Step 2: For pulley systems, particles accelerate in opposite directions. We cannot treat them as one particle. Instead, we write separate equations for each particle, eliminating the tension to find acceleration, then finding tension from either equation.", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "Why must a force diagram include **all external forces** acting on an object, but not internal forces?", "answer": "- **External forces** (e.g., weight, tension, friction) cause motion/acceleration.  \n- **Internal forces** (e.g., forces between molecules in a rigid block) cancel out by Newton’s Third Law (equal and opposite within the system).  \n- Example: A car’s engine produces internal forces, but the driving force from the road (external) is what accelerates it.  \n\n**Key takeaway**: Force diagrams model interactions with the environment, not internal dynamics.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "In the scenario from the previous question, if you treat P and Q as a single particle to find the acceleration, why must you then consider P or Q *separately* to find the tension in the string? (2 steps)", "answer": "- Step 1: When you treat the whole system, internal forces like tension act in opposite directions on P and Q, so they sum to zero and are eliminated from the whole-system equation.\n- Step 2: To find the tension, you must isolate one of the particles (e.g., P) so that the tension becomes an *external* force acting on it. You then apply $$F = ma$$ to that single particle, where $$F$$ includes the tension, allowing you to solve for it.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "Why is the force exerted on a fixed pulley by the string equal to $$2T$$ (not $$T$$)? (3 steps)", "answer": "- Step 1: The string hangs over the pulley with tension $$T$$ on each side.\n- Step 2: On each side, the string pulls **downward** on the pulley (since the string goes down from the pulley's top on both sides). Both pulls have magnitude $$T$$.\n- Step 3: Total downward force on the pulley = $$T + T = 2T$$.\n\nConsequence: whatever supports the pulley (e.g., a ceiling beam) must provide an upward force of $$2T$$. For the 2m/3m example, the pulley support feels $$2 \\times \\frac{12mg}{5} = \\frac{24mg}{5}$$ downward — significantly more than either individual weight.\n\nVisual key: the pulley feels TWO string segments, each pulling it with tension $$T$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "State Newton's second law of motion and write the equation, explaining each symbol. Why is $$F$$ specifically the RESULTANT force? (3 steps)", "answer": "- Step 1: Newton's second law: the force needed to accelerate a particle equals the product of its mass and its acceleration: $$F = ma$$.\n- Step 2: Symbols:\n+ $$F$$ = the **resultant** (net) force in Newtons (N) — a vector.\n+ $$m$$ = mass in kilograms (kg) — a positive scalar.\n+ $$a$$ = acceleration in $$\\text{m/s}^2$$ — a vector, **in the same direction** as $$F$$.\n- Step 3: Why \"resultant\"? Because if you used only one individual force (say, just the pulling force, ignoring friction), you'd overestimate the acceleration. It is the NET effect of all forces that determines how the particle actually accelerates — friction, gravity, normal, applied, all combined.\n\nMisconception probe: \"force causes acceleration\" must be understood as \"net force causes acceleration.\" Balanced forces give zero acceleration despite being individually non-zero.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Newton's second law is given by $$F = ma$$. Explain the intuitive relationship between force, mass, and acceleration that this equation represents. (3 steps)", "answer": "- Step 1: The equation states that the force needed to accelerate an object is proportional to both the mass of the object and the acceleration desired.\n- Step 2: For a fixed mass, a larger force is needed to produce a larger acceleration (e.g., pushing a car harder makes it speed up faster). This is the $$F \\propto a$$ relationship.\n- Step 3: For a fixed acceleration, a larger mass requires a larger force (e.g., it's harder to accelerate a lorry than a bicycle at the same rate). Mass is the measure of an object's resistance to acceleration (inertia). This is the $$F \\propto m$$ relationship.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A common misconception is that the normal reaction is always equal to the weight ($$R = mg$$). Give an example where this is NOT true and explain why. (3 steps)", "answer": "- Step 1: This is only true if the object is on a horizontal surface with no other vertical forces acting, and there is no vertical acceleration.\n- Step 2: Consider a box on the floor with a rope attached, pulling upwards at an angle. The vertical component of the rope's pull supports some of the weight.\n- Step 3: Resolving vertically: $$R + T\\sin\\theta - mg = 0$$. Here, $$R = mg - T\\sin\\theta$$, which is less than $$mg$$. The normal reaction only balances the net downward force, which is no longer the full weight.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "Two connected boats have forces acting. Boat A's engine thrust is $$(-7\\mathbf{i} + 2\\mathbf{j})\\,\\text{N}$$ and boat B's is $$(k\\mathbf{i} + \\mathbf{j})\\,\\text{N}$$. A current provides $$3\\mathbf{i}\\,\\text{N}$$ on each. They accelerate in perpendicular directions. Conceptually find $$k$$. (4 steps)", "answer": "- Step 1: Resultant force on A = thrust + current = $$(-7 + 3)\\mathbf{i} + 2\\mathbf{j} = -4\\mathbf{i} + 2\\mathbf{j}\\,\\text{N}$$.\n- Step 2: Resultant force on B = $$(k + 3)\\mathbf{i} + \\mathbf{j}\\,\\text{N}$$.\n- Step 3: Perpendicular vectors have a zero dot product: $$(-4)(k+3) + (2)(1) = 0$$.\n- Step 4: Solve: $$-4k - 12 + 2 = 0 \\Rightarrow -4k = 10 \\Rightarrow k = -\\frac{5}{2}$$.\n\nSince mass is a positive scalar, acceleration direction = resultant force direction. \"Accelerating in perpendicular directions\" = resultant forces are perpendicular.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What does Newton's First Law state about an object moving with constant velocity, and what is a common misconception about the forces acting on it? (2 steps)", "answer": "- Step 1: Newton's First Law states that an object at rest will stay at rest, and an object moving with constant velocity will continue to move with constant velocity, unless acted upon by an unbalanced (resultant) force.\n- Step 2: A common misconception is that a moving object *must* have a driving force acting on it to keep it moving. In reality, if velocity is constant (meaning both speed and direction are unchanged), the resultant force is exactly zero; any driving force is perfectly balanced by resistive forces like friction.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "What condition must the forces satisfy for an object to be in equilibrium, and does being in equilibrium mean the object is necessarily at rest? (2 steps)", "answer": "- Step 1: For an object to be in equilibrium, the resultant force acting on it must be zero. This means all forces are perfectly balanced in every direction, so there is no net push or pull.\n- Step 2: No, equilibrium does not mean the object is at rest. It means the acceleration is zero. An object in equilibrium can be stationary, but it can also be moving with constant velocity (constant speed in a straight line).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "When resolving forces acting on a particle in a specific direction, what is the systematic process to calculate the resultant force in that direction? (2 steps)", "answer": "- Step 1: Choose the direction you are resolving in as the \"positive\" direction. This is typically the direction of acceleration, or simply rightward/upward for convenience. Notation like $$R(\\rightarrow)$$ indicates resolving horizontally to the right.\n- Step 2: Add all the force components acting in the positive direction, and subtract all the force components acting in the opposite (negative) direction. The result is the net force (resultant force) acting in that specific direction.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A block rests on a horizontal table. What is the \"normal reaction\" force, and why must it exist if the block is not accelerating vertically? (2 steps)", "answer": "- Step 1: The normal reaction ($$R$$) is the upward force exerted by the surface on the block. It is called \"normal\" because it acts perpendicular to the surface of contact.\n- Step 2: It must exist to balance the block's weight ($$mg$$) acting downward. If $$R$$ did not exist, there would be a resultant downward force, and the block would accelerate downwards through the table. Since the block is stationary vertically, $$R$$ must exactly equal $$mg$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "A block is pulled across a rough horizontal plane at constant velocity by a force $$P$$. How does the magnitude of the friction force $$F$$ relate to the pulling force $$P$$, and what would happen to the block's motion if $$P$$ was slightly increased? (2 steps)", "answer": "- Step 1: Since the block moves at constant velocity, it is in equilibrium horizontally. Therefore, the driving force $$P$$ must be exactly equal in magnitude to the friction force $$F$$ (they act in opposite directions).\n- Step 2: If $$P$$ is slightly increased, the forces are no longer balanced. There is now a resultant force in the direction of $$P$$, so by Newton's Second Law, the block will accelerate in the direction of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "Two forces acting on a particle are given as vectors: $$\\mathbf{F}_1 = (p\\mathbf{i} + q\\mathbf{j})$$ N and $$\\mathbf{F}_2 = (r\\mathbf{i} + s\\mathbf{j})$$ N. Conceptually, how do you find the resultant vector $$\\mathbf{R}$$, and what does each component of $$\\mathbf{R}$$ represent physically? (2 steps)", "answer": "- Step 1: To find the resultant vector, you add the vectors component by component: $$\\mathbf{R} = \\mathbf{F}_1 + \\mathbf{F}_2 = ((p+r)\\mathbf{i} + (q+s)\\mathbf{j})$$ N. You can also add column vectors by adding the top numbers and bottom numbers separately.\n- Step 2: The $$\\mathbf{i}$$-component of $$\\mathbf{R}$$ represents the net force acting in the horizontal (or East/x) direction, and the $$\\mathbf{j}$$-component represents the net force acting in the vertical (or North/y) direction.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A particle is in equilibrium under the action of three forces. If two of the forces are $$\\mathbf{F}_1 = (4\\mathbf{i} - 2\\mathbf{j})$$ N and $$\\mathbf{F}_2 = (-\\mathbf{i} + 5\\mathbf{j})$$ N, how would you determine the third force $$\\mathbf{F}_3$$, and what must its vector form be? (2 steps)", "answer": "- Step 1: Since the particle is in equilibrium, the resultant of all three forces must be the zero vector: $$\\mathbf{F}_1 + \\mathbf{F}_2 + \\mathbf{F}_3 = 0\\mathbf{i} + 0\\mathbf{j}$$.\n- Step 2: Rearranging gives $$\\mathbf{F}_3 = -(\\mathbf{F}_1 + \\mathbf{F}_2)$$. Adding the first two gives $$((4-1)\\mathbf{i} + (-2+5)\\mathbf{j}) = (3\\mathbf{i} + 3\\mathbf{j})$$ N. Therefore, $$\\mathbf{F}_3$$ must be exactly $$(-3\\mathbf{i} - 3\\mathbf{j})$$ N to cancel out the resultant of the other two and maintain equilibrium.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Given a resultant force vector $$\\mathbf{R} = (3\\mathbf{i} + 4\\mathbf{j})$$ N, where $$\\mathbf{i}$$ is due East and $$\\mathbf{j}$$ is due North, how do you find the magnitude and the bearing of this force? (3 steps)", "answer": "- Step 1: The magnitude is found using Pythagoras' theorem, treating the components as legs of a right-angled triangle. $$|\\mathbf{R}| = \\sqrt{3^2 + 4^2} = 5$$ N.\n- Step 2: To find the bearing, first find the angle $$\\theta$$ the vector makes with the positive $$\\mathbf{i}$$ (East) axis using trigonometry: $$\\tan(\\theta) = \\frac{\\mathbf{j}\\text{-component}}{\\mathbf{i}\\text{-component}} = \\frac{4}{3}$$.\n- Step 3: Bearings are measured clockwise from North. Since the angle $$\\theta$$ is measured from East, the bearing is $$90^\\circ - \\theta$$. (For this example, it would be roughly $$90^\\circ - 53.1^\\circ = 036.9^\\circ$$).", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "What does Newton's Second Law ($$F = ma$$) state, and why does a resultant force of 1 N acting on a 1 kg mass produce an acceleration of 1 m/s²? (2 steps)", "answer": "- Step 1: Newton's Second Law states that the force needed to accelerate a particle is equal to the product of the mass of the particle and the acceleration produced: $$F = ma$$. The acceleration is in the same direction as the resultant force.\n- Step 2: By definition, 1 Newton is the amount of force required to accelerate a mass of 1 kilogram at a rate of 1 metre per second squared. Substituting into $$F = ma$$ gives $$1 = 1 \\times 1$$, which holds true by this fundamental definition.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "How is the weight of an object calculated from its mass, and why is weight considered a force while mass is not? (2 steps)", "answer": "- Step 1: Weight ($$W$$) is calculated using the equation $$W = mg$$, where $$m$$ is mass in kg and $$g$$ is the acceleration due to gravity ($$9.8$$ m/s²). Weight acts vertically downward.\n- Step 2: Mass is a scalar measure of the amount of matter in an object and remains constant regardless of location. Weight is a vector force caused by gravity pulling on that mass; it varies depending on the local gravitational field strength (e.g., weight on the Moon is less than on Earth because $$g$$ is smaller).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A body of mass 5 kg is on a rough horizontal surface, pulled by a horizontal force of 20 N, with a friction force of 4 N opposing the motion. How do you set up the equation of motion to find the acceleration, and what is the resultant force? (2 steps)", "answer": "- Step 1: Resolve forces in the direction of motion (horizontal). Take the pulling force as positive and the opposing friction as negative. The resultant force $$F = 20 - 4 = 16$$ N.\n- Step 2: Apply Newton's Second Law: $$F = ma$$, so $$16 = 5a$$. The equation of motion is set up by equating the net force in a direction to the mass times the acceleration in that direction. The acceleration would be $$a = 3.2$$ m/s².", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A block of mass $$m$$ slides along a smooth horizontal surface with acceleration $$a$$. Even though it's moving and accelerating horizontally, why is the vertical equation of motion $$R - mg = 0$$, and what does this tell us about the normal reaction $$R$$? (2 steps)", "answer": "- Step 1: The block is not moving vertically (it doesn't lift off the surface or sink into it), so its vertical acceleration is zero ($$a_v = 0$$).\n- Step 2: By Newton's Second Law in the vertical direction, $$F_{vertical} = m \\times a_v = m \\times 0 = 0$$. Therefore, the upward normal reaction $$R$$ must perfectly balance the downward weight $$mg$$, meaning $$R = mg$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A person of mass 70 kg stands in a lift. If the lift is accelerating upwards, how does the normal reaction force (the force the floor exerts on the person) compare to the person's weight, and why? (2 steps)", "answer": "- Step 1: If the lift accelerates upwards, the person must also accelerate upwards. By Newton's Second Law, there must be a net upward force on the person: $$R - mg = ma$$, where $$R$$ is the normal reaction and $$mg$$ is the weight.\n- Step 2: Rearranging gives $$R = mg + ma$$. Since $$ma$$ is positive (upward acceleration), the normal reaction $$R$$ must be *greater* than the person's weight $$mg$$ to provide the extra upward force needed for the acceleration. This makes the person feel \"heavier\".", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "If a resultant force $$\\mathbf{F} = (6\\mathbf{i} + 4\\mathbf{j})$$ N acts on a particle of mass 2 kg, how do you calculate the acceleration vector $$\\mathbf{a}$$, and what does this imply about the relationship between the direction of the resultant force and the direction of the acceleration? (2 steps)", "answer": "- Step 1: Use the vector form of Newton's Second Law: $$\\mathbf{F} = m\\mathbf{a}$$, which means $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$. Divide each component of the force by the mass: $$\\mathbf{a} = \\left(\\frac{6}{2}\\mathbf{i} + \\frac{4}{2}\\mathbf{j}\\right) = (3\\mathbf{i} + 2\\mathbf{j})$$ m/s².\n- Step 2: Since the acceleration vector is just a scaled version of the force vector (by a positive scalar factor $$1/m$$), the acceleration always points in the *exact same direction* as the resultant force.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Two particles P and Q are connected by a light inextensible string and pulled along a smooth horizontal plane by a horizontal force F applied to P. Under what condition can you treat P and Q as a single particle, and what is the advantage of doing so? (2 steps)", "answer": "- Step 1: You can treat them as a single particle if all parts of the system are moving in the same straight line (i.e., they remain in contact or are connected by an inextensible string so they share the same acceleration).\n- Step 2: The advantage is that internal forces (like the tension in the string between P and Q) cancel out by Newton's Third Law. By treating the whole system, you can find the acceleration directly using $$F = (m_P + m_Q)a$$ without needing to know the tension.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In the scenario from the previous question, if you treat P and Q as a single particle to find the acceleration, why must you then consider P or Q *separately* to find the tension in the string? (2 steps)", "answer": "- Step 1: When you treat the whole system, internal forces like tension act in opposite directions on P and Q, so they sum to zero and are eliminated from the whole-system equation.\n- Step 2: To find the tension, you must isolate one of the particles (e.g., P) so that the tension becomes an *external* force acting on it. You then apply $$F = ma$$ to that single particle, where $$F$$ includes the tension, allowing you to solve for it.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "What are the physical implications of the modelling assumptions that a connecting string is \"light\" and \"inextensible\" when solving connected particle problems? (2 steps)", "answer": "- Step 1: \"Light\" means the mass of the string is negligible compared to the masses of the particles. This implies the tension is the same throughout the entire length of the string; we don't have to account for the weight of the string pulling down on parts of it.\n- Step 2: \"Inextensible\" means the string cannot stretch. This is crucial because it guarantees that if one particle moves a certain distance, the other particle moves the exact same distance, meaning both particles have the *same acceleration* at all times.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "State Newton's Third Law of motion, and explain how it applies when a book rests on a table. Specifically, identify the two equal and opposite forces and the bodies they act upon. (3 steps)", "answer": "- Step 1: Newton's Third Law states that for every action, there is an equal and opposite reaction. If body A exerts a force on body B, body B exerts a force on body A that is equal in magnitude but opposite in direction.\n- Step 2: When a book rests on a table, the book exerts a downward force on the table (the action). This force is equal to the weight of the book.\n- Step 3: The table exerts an upward normal reaction force on the book (the reaction). These two forces are equal in magnitude, opposite in direction, and act on *different* bodies (one on the table, one on the book).\n+ Note: The book's weight (Earth pulling book down) and the table's reaction (Table pushing book up) are NOT a Newton's 3rd Law pair because they both act on the *same* body (the book). The true pair for the book's weight is the book pulling the Earth upward.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why can you NOT treat a pulley system (where one mass hangs on each side of a smooth pulley) as a single particle moving in one straight line, unlike two particles pulled along a horizontal plane? (2 steps)", "answer": "- Step 1: In a pulley system, the two particles are moving in different directions—one is moving upwards while the other is moving downwards.\n- Step 2: The rule for treating a system as a single particle requires all parts of the system to be moving in the *same straight line*. Because the directions of motion are different (even if along the same vertical line but opposite), you cannot simply add their masses and forces together as one particle.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "What is the significance of the assumption that a pulley is \"smooth\" in calculations involving connected particles, and what would happen if the pulley were rough? (2 steps)", "answer": "- Step 1: A \"smooth\" pulley assumption means there is no friction between the string and the pulley. This allows us to assume that the tension in the string is the same on both sides of the pulley.\n- Step 2: If the pulley were rough, friction would oppose the slipping of the string over the pulley. This would cause the tension on the side pulling the string up (the side with the heavier, descending mass) to be greater than the tension on the other side, complicating the equations significantly.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A light inextensible string passes over a small smooth fixed pulley. The tension in the string is T. If the string hangs vertically on both sides of the pulley, how do you calculate the force exerted on the pulley by the string? What if one side is horizontal and one side is vertical? (2 steps)", "answer": "- Step 1: The string exerts a pulling force T on the pulley from both sides. If both sides are vertical, the two tension forces both act vertically downward, so the total force on the pulley is simply $$2T$$ downward.\n- Step 2: If one side is horizontal and the other vertical (e.g., a pulley at the edge of a table), the horizontal string pulls the pulley horizontally with force T, and the vertical string pulls it vertically with force T. The total force is the vector sum $$T\\mathbf{i} + T\\mathbf{j}$$, with magnitude $$\\sqrt{T^2 + T^2} = T\\sqrt{2}$$ acting at $$45^\\circ$$ to the horizontal.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "In a pulley system where a heavier mass B descends and pulls a lighter mass A horizontally across a table, what happens to the tension and the acceleration of A once B hits the ground, and why? (3 steps)", "answer": "- Step 1: When B hits the ground, it stops and the string becomes slack (no longer taut). Since the string is slack, it cannot exert a pulling force, so the tension instantly drops to zero.\n- Step 2: With tension gone, mass A no longer has the forward pulling force. However, A is still on a rough table, so it still experiences the frictional force opposing its motion.\n- Step 3: The resultant force on A is now just the friction force (acting backwards against its direction of motion). By Newton's Second Law, A will decelerate and eventually come to rest.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Two forces, $$\\mathbf{F}_1$$ and $$\\mathbf{F}_2$$, act on a particle. The resultant force $$\\mathbf{R}$$ is known to act in a direction parallel to the vector $$(-\\mathbf{i} + 4\\mathbf{j})$$. How does this constraint allow you to set up an equation relating the components of $$\\mathbf{F}_1$$ and $$\\mathbf{F}_2$$? (2 steps)", "answer": "- Step 1: If $$\\mathbf{R}$$ is parallel to $$(-\\mathbf{i} + 4\\mathbf{j})$$, then $$\\mathbf{R}$$ can be written as a scalar multiple of this vector: $$\\mathbf{R} = k(-\\mathbf{i} + 4\\mathbf{j}) = (-k\\mathbf{i} + 4k\\mathbf{j})$$ for some constant $$k$$.\n- Step 2: Since $$\\mathbf{R} = \\mathbf{F}_1 + \\mathbf{F}_2$$, you can equate the components: the total $$\\mathbf{i}$$-component must equal $$-k$$, and the total $$\\mathbf{j}$$-component must equal $$4k$$. You can eliminate $$k$$ by noting that $$\\frac{\\mathbf{j}\\text{-component}}{\\mathbf{i}\\text{-component}} = \\frac{4k}{-k} = -4$$, creating an equation linking the sum of the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components of the forces.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Two particles P and Q are connected by a light *rod* (not a string) and pushed from behind Q towards P, causing them to accelerate. How does the force in the rod (thrust) differ from tension in a string, and how does this affect the force diagram for P? (2 steps)", "answer": "- Step 1: A string can only pull (tension); it goes slack if pushed. A rod can both pull and push. When pushed, the rod exerts a \"thrust\" (or compression), which is a force pushing the particles apart.\n- Step 2: In the force diagram for the front particle P, a thrust from the rod acts *away* from Q (pushing P forward), whereas a tension would act *towards* Q (pulling P backward). In the equation of motion for P, thrust appears on the same side as the driving force.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A satellite orbits the Earth at constant speed. A student claims there is no resultant force acting on it because its speed is constant. Why is this claim incorrect? (2 steps)", "answer": "- Step 1: The student is confusing constant *speed* with constant *velocity*. Velocity includes direction. As the satellite orbits, its direction of motion is continuously changing.\n- Step 2: Since the direction is changing, the velocity is not constant, meaning the satellite is accelerating. By Newton's Second Law, an accelerating object must have a non-zero resultant force acting on it (in this case, the force of gravity pulling it towards the Earth).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A lift of mass 500 kg contains passengers of total mass 300 kg. The lift accelerates upwards from rest, reaching a speed of 3 m/s after moving 5 m. Without doing the full calculation, estimate whether the acceleration is closer to 0.1 m/s², 1 m/s², or 10 m/s², and explain your reasoning. (2 steps)", "answer": "- Step 1: Use the conceptual relationship $$v^2 = u^2 + 2as$$. Starting from rest ($$u=0$$), we have $$v^2 = 2as$$, so $$a = \\frac{v^2}{2s}$$.\n- Step 2: Plugging in the approximate values: $$a = \\frac{3^2}{2 \\times 5} = \\frac{9}{10} = 0.9$$ m/s². This is closest to 1 m/s². It makes sense that accelerating to a moderate speed (3 m/s) over a short distance (5 m) requires a moderate, not extreme, acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Masses of 2m and 3m are attached to a string over a smooth pulley. When released, what is the acceleration of the system in terms of g, and why is it less than g? (2 steps)", "answer": "- Step 1: Consider the whole system conceptually. The total mass is $$2m + 3m = 5m$$$. The driving force comes from the difference in their weights: $$3mg - 2mg = mg$$.\n- Step 2: Using $$F = ma$$, the acceleration is $$a = \\frac{mg}{5m} = \\frac{1}{5}g$$. The acceleration is less than $$g$$ because the net force ($$mg$$) only has to accelerate the *total* mass ($$5m$$), not just the heavier mass. The heavier mass is \"dragged down\" by having to pull the lighter mass up.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "A force vector is given by $$\\mathbf{F} = (-3\\mathbf{i} + 7\\mathbf{j})$$ N. Estimate the magnitude of this force and the quadrant in which it points. (2 steps)", "answer": "- Step 1: To find the quadrant, look at the signs: the $$\\mathbf{i}$$-component is negative (West/left) and the $$\\mathbf{j}$$-component is positive (North/up). This places the vector in the second quadrant (North-West).\n- Step 2: To estimate the magnitude, use Pythagoras: $$|\\mathbf{F}| = \\sqrt{(-3)^2 + 7^2} = \\sqrt{9 + 49} = \\sqrt{58}$$. Since $$7^2 = 49$$ and $$8^2 = 64$$, the magnitude is between 7 and 8 N (roughly 7.6 N).", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "A particle A of mass 4 kg rests on a rough horizontal table attached to a string that passes over a smooth pulley at the edge. Particle B of mass 3 kg hangs on the other end. The system is released from rest. B descends 2 m and then hits the ground. Describe the two distinct phases of motion for particle A, and for each phase, state what forces are acting on A horizontally. (3 steps)", "answer": "- Step 1: Phase 1: B is descending. A is being pulled by the string. Horizontally, A experiences the tension T pulling it towards the pulley, and the friction force F opposing its motion. A accelerates.\n- Step 2: Phase 2: B has hit the ground. The string goes slack, so tension T becomes zero. Horizontally, A only experiences the friction force F opposing its motion.\n- Step 3: Because the only horizontal force on A in Phase 2 is friction, A decelerates. It will continue to slide for a bit, slowing down until it eventually comes to rest.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "A woman of mass 60 kg stands on scales inside a lift. The lift accelerates downwards at 2 m/s². If her normal weight is 588 N (60g), will the scales read more than 588 N, less than 588 N, or exactly 588 N during this downward acceleration? Explain using Newton's Second Law. (2 steps)", "answer": "- Step 1: The scales measure the normal reaction force R between the woman and the scales. Resolving vertically for the woman: $$R - mg = ma$$, where $$a$$ is the lift's acceleration.\n- Step 2: Since the lift accelerates downwards, $$a = -2$$ m/s² (taking upward as positive). The equation becomes $$R - 588 = 60 \\times (-2) = -120$$, so $$R = 588 - 120 = 468$$ N. The scales will read less than her normal weight (468 N), making her feel \"lighter\".", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}], "count": 30}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A block is being pulled to the right by force P across a rough horizontal plane. What are the four forces acting on the block, and in what direction does each act? (4 steps)", "answer": "- Step 1: Identify the force pulling the block: $$P$$, acting horizontally to the right.\n- Step 2: Identify the force due to gravity: Weight ($$W$$), acting vertically downward.\n- Step 3: Identify the force from the surface: Normal reaction ($$R$$), acting perpendicular to the plane (vertically upward), opposing the weight.\n- Step 4: Identify the force opposing the motion: Friction ($$F$$), acting horizontally to the left, opposing the pulling force $$P$$.\nEvery force must have a corresponding agent; these four cover the pull, gravity, the surface's normal push, and the surface's frictional resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "A particle is moving with constant velocity. What is the resultant force acting on it, and which of Newton's laws explains this? (3 steps)", "answer": "- Step 1: Recall that constant velocity means neither speed nor direction is changing.\n- Step 2: Newton's First Law states that an object at rest stays at rest, and an object moving with constant velocity continues at constant velocity, unless acted upon by an unbalanced (resultant) force.\n- Step 3: Therefore, if the velocity is constant, the acceleration is zero, meaning the resultant force acting on the particle must be zero (it is in equilibrium).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A satellite orbits the Earth at constant speed. Is the resultant force on it zero? Why or why not? (4 steps)", "answer": "- Step 1: Distinguish between \"constant speed\" and \"constant velocity\". Velocity is a vector, meaning it has both magnitude (speed) and direction.\n- Step 2: As the satellite orbits, its direction is continuously changing as it moves in a circular path.\n- Step 3: Since the direction is changing, the velocity is NOT constant, meaning there is an acceleration (centripetal).\n- Step 4: By Newton's Second Law, a non-zero acceleration requires a non-zero resultant force. Therefore, a resultant force (gravity) is acting on the satellite toward the Earth.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "When resolving forces in a chosen direction (e.g., horizontally to the right), how do you determine the sign (positive or negative) of each force component? (3 steps)", "answer": "- Step 1: The direction you choose to resolve in becomes the positive direction.\n- Step 2: Any force component acting in this positive direction is added.\n- Step 3: Any force component acting in the opposite direction is subtracted.\n+ For example, if resolving to the right R($$\\rightarrow$$), a force of 10 N to the right is +10 N, and a force of 4 N to the left is -4 N, giving a resultant of $$10 - 4 = 6$$ N.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "If the resultant force acting on a particle points due north, what can be said about the direction of the particle's acceleration? Does this mean the particle is moving north? (3 steps)", "answer": "- Step 1: A resultant force acting on an object will cause the object to accelerate in the same direction as the resultant force.\n- Step 2: Therefore, the acceleration must point due north.\n- Step 3: However, acceleration is the rate of change of velocity, not the velocity itself. The particle could be moving in any direction initially (e.g., east) and simply be turning northwards while slowing down in its original direction. It does not mean the particle is currently moving north.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Two forces, $$(3\\mathbf{i} - 2\\mathbf{j})$$ N and $$(-1\\mathbf{i} + 5\\mathbf{j})$$ N, act on a particle. How do you find the resultant force, and what does it mean if the particle is in equilibrium? (2 steps)", "answer": "- Step 1: To find the resultant force, add the vectors component-wise. Add the $$\\mathbf{i}$$ components together and the $$\\mathbf{j}$$ components together: $$(3 - 1)\\mathbf{i} + (-2 + 5)\\mathbf{j} = 2\\mathbf{i} + 3\\mathbf{j}$$ N.\n- Step 2: If the particle is in equilibrium, the resultant vector force must be zero. This means the resultant must be $$0\\mathbf{i} + 0\\mathbf{j}$$. If these were the only two forces, the particle would not be in equilibrium because the resultant is non-zero.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Given a resultant force of $$(4\\mathbf{i} + 3\\mathbf{j})$$ N where $$\\mathbf{i}$$ is East and $$\\mathbf{j}$$ is North, conceptually walk through how to find its magnitude and bearing. (3 steps)", "answer": "- Step 1: To find the magnitude, use Pythagoras' theorem. The $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components form the two shorter sides of a right-angled triangle, so magnitude is $$\\sqrt{4^2 + 3^2} = \\sqrt{25} = 5$$ N.\n- Step 2: To find the angle $$\\theta$$ from the East direction (the positive $$\\mathbf{i}$$ axis), use trigonometry: $$\\tan\\theta = \\frac{\\text{Opposite (j)}}{\\text{Adjacent (i)}} = \\frac{3}{4}$$. This gives an angle of roughly $$36.9^\\circ$$.\n- Step 3: Bearings are measured clockwise from North. Since the vector is in the first quadrant (East and North), the bearing is $$90^\\circ - \\theta \\approx 90^\\circ - 36.9^\\circ = 053.1^\\circ$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "State Newton's Second Law and explain why a force of 1 N accelerating a mass of 1 kg at 1 m/s² is not just a coincidence but a definition. (2 steps)", "answer": "- Step 1: Newton's Second Law states that the force needed to accelerate a particle is equal to the product of the mass of the particle and the acceleration produced: $$F = ma$$.\n- Step 2: The Newton (N) is actually defined using this law. 1 N is specifically defined as the exact amount of force required to accelerate a mass of 1 kg at a rate of 1 m/s². Thus, $$1 \\text{ N} = 1 \\text{ kg} \\times 1 \\text{ m/s}^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "What is the difference between mass and weight, and what equation connects them? Why would an astronaut's weight change on the moon but not their mass? (3 steps)", "answer": "- Step 1: Mass is a scalar measure of the amount of matter in an object (measured in kg). Weight is a vector force due to gravity acting on that mass (measured in N).\n- Step 2: They are connected by the equation $$W = mg$$, where $$g$$ is the acceleration due to gravity ($$9.8 \\text{ m/s}^2$$ on Earth).\n- Step 3: On the moon, $$g$$ is smaller (about $$1.6 \\text{ m/s}^2$$), so the gravitational pull (weight) is smaller. However, the amount of matter (mass) remains unchanged because mass is an intrinsic property, independent of gravitational field strength.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A box of mass $$m$$ kg is on a horizontal plane. It is accelerating horizontally but not moving vertically. Write the equation of motion for the vertical direction and deduce the normal reaction $$R$$. (3 steps)", "answer": "- Step 1: Resolve vertically, taking upward as the positive direction: $$R(\\uparrow)$$. The upward force is $$R$$, and the downward force is the weight $$mg$$.\n- Step 2: Apply Newton's Second Law: Resultant force = mass $$\\times$$ acceleration. Vertically, the acceleration is 0 because it's not moving up or down.\n- Step 3: Therefore, $$R - mg = m \\times 0$$, which simplifies to $$R = mg$$. The normal reaction exactly balances the weight.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If a particle of mass $$m$$ kg is acted upon by a resultant force $$\\mathbf{F} = (p\\mathbf{i} + q\\mathbf{j})$$ N, how do you find the acceleration vector $$\\mathbf{a}$$? Can you apply F=ma component-wise? (3 steps)", "answer": "- Step 1: Write Newton's Second Law in vector form: $$\\mathbf{F} = m\\mathbf{a}$$.\n- Step 2: To find the acceleration vector, divide the force vector by the mass: $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$.\n- Step 3: Yes, you can apply it component-wise. This means $$p\\mathbf{i} + q\\mathbf{j} = m(a_x\\mathbf{i} + a_y\\mathbf{j})$$, so the $$\\mathbf{i}$$ component of acceleration is $$a_x = \\frac{p}{m}$$ and the $$\\mathbf{j}$$ component is $$a_y = \\frac{q}{m}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "A resultant force $$\\mathbf{R}$$ is parallel to the vector $$(-2\\mathbf{i} + 3\\mathbf{j})$$. What does this tell you about the relationship between the i and j components of $$\\mathbf{R}$$? (2 steps)", "answer": "- Step 1: If two vectors are parallel, one is a scalar multiple of the other. This means $$\\mathbf{R} = k(-2\\mathbf{i} + 3\\mathbf{j})$$ for some constant $$k$$.\n- Step 2: Expanding this gives $$\\mathbf{R} = -2k\\mathbf{i} + 3k\\mathbf{j}$$. This means the ratio of the $$\\mathbf{j}$$-component to the $$\\mathbf{i}$$-component must be exactly the same as in the direction vector.\n+ Specifically, if $$\\mathbf{R} = x\\mathbf{i} + y\\mathbf{j}$$, then $$\\frac{y}{x} = \\frac{3}{-2}$$, or $$3x + 2y = 0$$. You don't need to know $$k$$ to find the relationship between the components.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "Two particles P and Q are connected by a light inextensible string on a smooth horizontal plane. A force pulls P. Under what condition can you treat P and Q as a single particle, and what is the advantage of doing so? (2 steps)", "answer": "- Step 1: You can treat connected particles as a single particle if all parts of the system are moving in the same straight line (e.g., they remain in contact or are connected by a taut inextensible string or rod).\n- Step 2: The advantage is that the internal forces (like the tension in the string) cancel out due to Newton's Third Law (equal and opposite). By considering the whole system, you can find the acceleration directly using $$F = (m_P + m_Q)a$$ without needing to solve simultaneous equations involving the tension.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "For a string connecting two particles, explain the physical implications of the modelling assumptions \"light\" and \"inextensible\" on the tension and acceleration. (2 steps)", "answer": "- Step 1: \"Light\" means the mass of the string is negligible. This implies that the tension is the same throughout the entire length of the string. If it had mass, the tension would vary (e.g., more tension is needed to pull the string's own mass).\n- Step 2: \"Inextensible\" means the string cannot stretch. This implies that if one particle accelerates, the other particle must accelerate at the exact same rate (magnitude and direction along the string). They are kinematically linked.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Particle A rests on top of particle B. If A exerts a downward force of 10 N on B, what force does B exert on A? Name the law that justifies this. (3 steps)", "answer": "- Step 1: Newton's Third Law states that for every action, there is an equal and opposite reaction.\n- Step 2: If body A exerts a force on body B, then body B exerts a force on body A that is equal in magnitude but opposite in direction.\n- Step 3: Therefore, B exerts an upward force of 10 N on A.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A light rod connects two particles P and Q. P is pushed from behind. Is the force in the rod a tension or a thrust, and how does the direction of this force act on P and Q? (3 steps)", "answer": "- Step 1: Since the rod is being pushed (compressed) rather than pulled, the force in the rod is a thrust (or compression), not a tension.\n- Step 2: A thrust pushes outwards from the rod. Therefore, the rod pushes Q forward (in the direction of motion) and pushes P backward (opposite to the direction of motion).\n- Step 3: Contrast this with a string, which can only pull (tension); a rod can both pull (tension) and push (thrust).", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "In a pulley system where one mass hangs on the left and another on the right, why can you NOT treat the whole system as a single particle using F=ma directly? (3 steps)", "answer": "- Step 1: To treat a system as a single particle, all parts must be moving in the same straight line.\n- Step 2: In a pulley system, one mass moves upward and the other moves downward. They are moving in different directions.\n- Step 3: Because they are moving in different directions, you cannot just add their masses and apply $$F = ma$$ for the whole system. You must consider each particle separately, writing an equation of motion for each.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "What is the physical implication of the modelling assumption that a pulley is \"smooth\"? (3 steps)", "answer": "- Step 1: A smooth pulley means there is no friction between the string and the pulley.\n- Step 2: Because there is no friction to resist the string's motion or alter the force, the tension in the string remains constant as it passes over the pulley.\n- Step 3: Thus, the tension on one side of the pulley is exactly equal to the tension on the other side.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "In a simple pulley system with a light inextensible string and tension T, the string hangs vertically on both sides of the pulley. What is the magnitude and direction of the force exerted on the pulley by the string? (4 steps)", "answer": "- Step 1: The string exerts a force of magnitude $$T$$ on the pulley on the left side, pulling it down and slightly left. It also exerts a force of magnitude $$T$$ on the right side, pulling it down and slightly right.\n- Step 2: Because the string hangs vertically on both sides, these two tension forces are symmetrically angled.\n- Step 3: The horizontal components of the two tension forces cancel each other out. The vertical components add up.\n- Step 4: Therefore, the resultant force on the pulley is straight downward. Since the vertical components each equal $$T$$ (assuming vertical string), the total force exerted on the pulley by the string is $$2T$$ downward.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In a pulley system, the heavier mass hits the ground and stays at rest. Describe the subsequent motion of the lighter mass and the tension in the string. (3 steps)", "answer": "- Step 1: When the heavier mass hits the ground, the string goes slack. This means the tension in the string instantly becomes zero.\n- Step 2: The lighter mass, which was moving upwards, now has no tension pulling it up. It is only acted upon by gravity (its weight).\n- Step 3: Therefore, the lighter mass will continue moving upwards under gravity, decelerating at $$g$$ until it comes to rest, and then it will fall back down.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A person of mass $$m$$ stands in a lift accelerating upwards at $$a$$. Walk through how to find the normal reaction force $$R$$ the lift floor exerts on the person. (4 steps)", "answer": "- Step 1: Draw a diagram for the person. The forces acting are weight $$mg$$ downwards and normal reaction $$R$$ upwards.\n- Step 2: Choose the positive direction to be the direction of acceleration (upwards). Resolve vertically: $$R - mg$$.\n- Step 3: Apply Newton's Second Law: Resultant force = mass $$\\times$$ acceleration. So $$R - mg = ma$$.\n- Step 4: Rearrange to find $$R$$: $$R = m(g + a)$$. Notice that if the lift accelerates upwards, $$R$$ is greater than the person's weight (they feel heavier).", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Mass A is on a rough horizontal table, connected by a light inextensible string over a smooth pulley at the edge to mass B hanging freely. Walk through how to set up the equations to find the acceleration of the system and the tension. (3 steps)", "answer": "- Step 1: For mass A (on the table), resolve horizontally in the direction of acceleration (towards the pulley). The pulling force is tension $$T$$, and the opposing force is friction $$F$$. Equation: $$T - F = m_A a$$.\n- Step 2: For mass B (hanging), resolve vertically in the direction of acceleration (downwards). The downward force is weight $$m_B g$$, and the upward force is tension $$T$$. Equation: $$m_B g - T = m_B a$$.\n- Step 3: You now have two simultaneous equations with two unknowns ($$T$$ and $$a$$). Add the equations to eliminate $$T$$: $$(T - F) + (m_B g - T) = m_A a + m_B a$$, which simplifies to $$m_B g - F = (m_A + m_B)a$$, allowing you to solve for $$a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "A particle of weight 10 N is at rest on a horizontal plane. What is the magnitude of the normal reaction? (3 steps)", "answer": "- Step 1: Since the particle is at rest, it is in equilibrium, meaning the resultant force is zero.\n- Step 2: Resolve vertically. The downward force is weight (10 N). The upward force is the normal reaction $$R$$.\n- Step 3: For equilibrium, upward forces equal downward forces, so $$R = 10$$ N.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "If a force vector is given as $$(x\\mathbf{i} + y\\mathbf{j})$$ where both $$x$$ and $$y$$ are positive, describe the quadrant it lies in, and explain how you would find the angle it makes with the positive $$\\mathbf{i}$$ direction (East). (3 steps)", "answer": "- Step 1: Since both components are positive, the vector points East and North, placing it in the first quadrant (North-East).\n- Step 2: You can find the angle $$\\theta$$ it makes with the East direction using trigonometry. The $$x$$-component is adjacent, and the $$y$$-component is opposite.\n- Step 3: Therefore, $$\\tan\\theta = \\frac{y}{x}$$. To find the bearing from North, you would calculate $$90^\\circ - \\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A resultant force of 15 N acts on a mass of 3 kg. What is the acceleration? (3 steps)", "answer": "- Step 1: Use Newton's Second Law: $$F = ma$$.\n- Step 2: Substitute the known values: $$15 = 3 \\times a$$.\n- Step 3: Solve for $$a$$: $$a = \\frac{15}{3} = 5 \\text{ m/s}^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Two boxes, 5 kg and 3 kg, are pushed from behind on a smooth surface with 32 N. Find the contact force between the 3 kg box (at the front) and the 5 kg box. (2 steps)", "answer": "- Step 1: Treat the whole system first to find the acceleration. Total mass = $$5 + 3 = 8$$ kg. Using $$F = ma$$, $$32 = 8a \\Rightarrow a = 4 \\text{ m/s}^2$$.\n- Step 2: Consider the front box (3 kg) alone. The only force pushing it forward is the contact force $$C$$ from the 5 kg box. Using $$F = ma$$ for just the 3 kg box: $$C = 3 \\times 4 = 12$$ N.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "In a simple vertical pulley system with masses $$m_1$$ and $$m_2$$ ($$m_1 > m_2$$), how does the acceleration of the system depend on the difference in their weights versus their total mass? (3 steps)", "answer": "- Step 1: The force causing the system to accelerate is the difference in the weights of the two masses: $$(m_1 - m_2)g$$.\n- Step 2: The mass that this net force must accelerate is the total mass of the system: $$(m_1 + m_2)$$.\n- Step 3: By Newton's Second Law, $$F = ma$$, the acceleration is $$a = \\frac{(m_1 - m_2)g}{m_1 + m_2}$$. The acceleration is proportional to the difference in weights and inversely proportional to the total mass.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A common misconception is that the normal reaction is always equal to the weight ($$R = mg$$). Give an example where this is NOT true and explain why. (3 steps)", "answer": "- Step 1: This is only true if the object is on a horizontal surface with no other vertical forces acting, and there is no vertical acceleration.\n- Step 2: Consider a box on the floor with a rope attached, pulling upwards at an angle. The vertical component of the rope's pull supports some of the weight.\n- Step 3: Resolving vertically: $$R + T\\sin\\theta - mg = 0$$. Here, $$R = mg - T\\sin\\theta$$, which is less than $$mg$$. The normal reaction only balances the net downward force, which is no longer the full weight.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "Two particles are connected by a string. One particle is pushed towards the other, causing the string to go slack. What is the tension in the string, and how does this affect the motion of the particles? (3 steps)", "answer": "- Step 1: A string can only pull, not push. If the string is slack, it means it is not taut and therefore cannot exert any force.\n- Step 2: Thus, the tension in a slack string is zero.\n- Step 3: Because the tension is zero, the particles are no longer connected in terms of forces; they will move independently according to whatever other forces act on them, and they may have different accelerations.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "In a vertical pulley system with tension $$T$$, the string goes up from mass A to the pulley, over the pulley, and down to mass B. Why is the force exerted on the pulley by the string exactly $$2T$$ downward? (4 steps)", "answer": "- Step 1: The string exerts a force on the pulley wherever they are in contact. On the left side, the string pulls the pulley down and slightly left with force $$T$$. On the right side, it pulls the pulley down and slightly right with force $$T$$.\n- Step 2: Since the string is vertical on both sides, the angle of the string to the vertical at the top of the pulley is usually small or considered vertical in simple models.\n- Step 3: The horizontal components of the two tension forces cancel out (one pulls left, one pulls right). The vertical components both point downward. If the strings are perfectly vertical, each vertical component is exactly $$T$$.\n- Step 4: Adding the vertical components gives a total downward force of $$T + T = 2T$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Three forces $$(2\\mathbf{i}+3\\mathbf{j})$$ N, $$(4\\mathbf{i}-\\mathbf{j})$$ N, and $$(-3\\mathbf{i}+2\\mathbf{j})$$ N act on a particle. A fourth force $$\\mathbf{F}$$ is added and the particle is now in equilibrium. Conceptually, how do you find $$\\mathbf{F}$$? (4 steps)", "answer": "- Step 1: For the particle to be in equilibrium, the resultant of all four forces must be the zero vector ($$0\\mathbf{i} + 0\\mathbf{j}$$).\n- Step 2: This means the fourth force $$\\mathbf{F}$$ must exactly cancel out the resultant of the first three forces.\n- Step 3: Find the resultant of the first three: $$(2+4-3)\\mathbf{i} + (3-1+2)\\mathbf{j} = 3\\mathbf{i} + 4\\mathbf{j}$$ N.\n- Step 4: Therefore, $$\\mathbf{F}$$ must be the exact opposite of this resultant: $$\\mathbf{F} = -3\\mathbf{i} - 4\\mathbf{j}$$ N.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "When a particle of mass $$m$$ is acted upon by several forces with unknown components, and you know its acceleration vector, how do you find the unknown components? (3 steps)", "answer": "- Step 1: Add all the force vectors together, grouping the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components, including the unknowns (like $$p$$ and $$q$$).\n- Step 2: Calculate the resultant force on the right side of $$\\mathbf{F} = m\\mathbf{a}$$ by multiplying the mass by the acceleration vector.\n- Step 3: Equate the $$\\mathbf{i}$$ components from both sides to form one equation, and the $$\\mathbf{j}$$ components to form a second equation. You can then solve these simultaneous equations for the unknowns.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A car is towing a trailer. The car's engine is turned off and the brakes are applied, causing the system to decelerate. Is the force in the tow-bar a tension or a thrust? Why? (3 steps)", "answer": "- Step 1: Since the car is braking and slowing down, the trailer also needs to slow down.\n- Step 2: The trailer has no brakes of its own (in this model), so the only way it decelerates is if the car pushes back on it.\n- Step 3: Therefore, the tow-bar must be in compression, exerting a thrust. The car pushes backward on the trailer (thrust), and by Newton's Third Law, the trailer pushes forward on the car.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "A common misconception is that Newton's Third Law action-reaction pairs cancel each other out, so there can never be a resultant force. Why is this wrong? (3 steps)", "answer": "- Step 1: Newton's Third Law pairs act on *different* objects. For example, if A pushes B, B pushes A. The force on B and the force on A are the pair.\n- Step 2: To find the resultant force on an object, you only sum the forces acting *on that single object*. You do not include forces that the object exerts on other objects.\n- Step 3: Therefore, the action-reaction pair never appears in the same force diagram for a single object, so they do not cancel out when calculating the acceleration of that specific object.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "In a pulley system, mass B is released from rest and hits the ground after 2 seconds. If the acceleration is $$a$$, what kinematic equation would you use to find the distance it fell, and what would it be in terms of $$a$$? (3 steps)", "answer": "- Step 1: Identify the knowns: initial velocity $$u = 0$$, time $$t = 2$$, acceleration $$= a$$, distance $$s = ?$$.\n- Step 2: Use the kinematic equation $$s = ut + \\frac{1}{2}at^2$$.\n- Step 3: Substitute the known values: $$s = 0 \\times 2 + \\frac{1}{2}a(2)^2 = 2a$$. The distance fallen is $$2a$$ meters.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}], "count": 35}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "An object is moving at a constant speed in a straight line. What can be said about the resultant force acting on the object, and why does this not contradict the idea that forces cause motion? (3 steps)", "answer": "- Step 1: The resultant force acting on the object must be zero. According to Newton's first law, an object in motion will continue moving at a constant velocity unless acted upon by an unbalanced (resultant) force.\n- Step 2: Constant velocity means both constant speed and constant direction. Since neither is changing, the state of motion is not changing, hence no net force is required to \"maintain\" it.\n- Step 3: Forces cause *changes* in motion (acceleration), not motion itself. A common misconception is that a forward force is needed to keep something moving; in reality, a forward force is only needed to overcome resistance (like friction) to maintain a *balance* of forces, resulting in zero resultant force and thus constant velocity.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A car is traveling around a circular track at a constant speed of $$20 \\text{ m s}^{-1}$$. Is the car in equilibrium? Explain your reasoning. (2 steps)", "answer": "- Step 1: No, the car is not in equilibrium. Equilibrium requires the resultant force to be zero, which means the object must be at rest or moving with constant *velocity*.\n- Step 2: Velocity is a vector quantity (speed + direction). Since the car is moving in a circle, its direction is constantly changing, meaning its velocity is constantly changing. Therefore, there must be a non-zero resultant force acting towards the center of the circle to cause this continuous acceleration.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When resolving forces in a specific direction (e.g., horizontally), what convention is used for the signs of the forces, and what does a positive vs. negative resultant indicate? (2 steps)", "answer": "- Step 1: You choose one direction along the line of resolution as the positive direction (usually the direction of acceleration, or simply rightwards/upwards). Forces acting in this direction are added, and forces acting in the opposite direction are subtracted.\n- Step 2: A positive resultant force means the net force acts in the chosen positive direction, causing acceleration in that direction. A negative resultant means the net force acts in the opposite direction, causing acceleration in the opposite direction.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Two forces act on a particle: $$\\mathbf{F}_1 = (2\\mathbf{i} + 3\\mathbf{j}) \\text{ N}$$ and $$\\mathbf{F}_2 = (-5\\mathbf{i} + 4\\mathbf{j}) \\text{ N}$$. Explain conceptually how to find the resultant force $$\\mathbf{R}$$ and what its components represent. (2 steps)", "answer": "- Step 1: The resultant force $$\\mathbf{R}$$ is the vector sum of all forces acting on the particle. Since vectors can be added component-wise, you add the $$\\mathbf{i}$$-components together and the $$\\mathbf{j}$$-components together: $$\\mathbf{R} = (2-5)\\mathbf{i} + (3+4)\\mathbf{j} = -3\\mathbf{i} + 7\\mathbf{j} \\text{ N}$$.\n- Step 2: The components represent the net effect of the forces in the perpendicular directions (e.g., East/West and North/South). The $$-3\\mathbf{i}$$ means there is a net force of 3 N acting in the negative $$\\mathbf{i}$$ direction (West), and the $$7\\mathbf{j}$$ means there is a net force of 7 N acting in the positive $$\\mathbf{j}$$ direction (North).", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A particle is in equilibrium under the action of several forces given in $$\\mathbf{i}-\\mathbf{j}$$ notation. What condition must the resultant force satisfy, and how does this translate to the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components? (2 steps)", "answer": "- Step 1: For a particle to be in equilibrium, the resultant force acting on it must be zero. This means no acceleration occurs.\n- Step 2: Since the resultant force is zero, both the $$\\mathbf{i}$$-component and the $$\\mathbf{j}$$-component of the resultant must independently be zero. If the resultant is $$R\\mathbf{i} + S\\mathbf{j}$$, then for equilibrium, $$R = 0$$ and $$S = 0$$. This allows you to set up two separate equations to solve for unknowns.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A resultant force is given by $$\\mathbf{R} = (4\\mathbf{i} + 3\\mathbf{j}) \\text{ N}$$, where $$\\mathbf{i}$$ is East and $$\\mathbf{j}$$ is North. How do you find the magnitude and bearing of this force? (3 steps)", "answer": "- Step 1: Magnitude is found using Pythagoras' theorem on the components: $$|\\mathbf{R}| = \\sqrt{4^2 + 3^2} = 5 \\text{ N}$$. This represents the overall \"strength\" of the force.\n- Step 2: To find the bearing, first find the angle $$\\theta$$ the vector makes with the $$\\mathbf{i}$$ (East) direction using $$\\tan\\theta = \\frac{|\\mathbf{j}|}{|\\mathbf{i}|} = \\frac{3}{4}$$. So $$\\theta = 36.9^\\circ$$.\n- Step 3: Bearings are measured clockwise from North. Since the vector is in the first quadrant (East and North), the bearing is $$90^\\circ - \\theta = 90^\\circ - 36.9^\\circ = 053.1^\\circ$$. (Note: if the vector were in a different quadrant, you would adjust accordingly to find the clockwise angle from North).", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Newton's second law is given by $$F = ma$$. Explain the intuitive relationship between force, mass, and acceleration that this equation represents. (3 steps)", "answer": "- Step 1: The equation states that the force needed to accelerate an object is proportional to both the mass of the object and the acceleration desired.\n- Step 2: For a fixed mass, a larger force is needed to produce a larger acceleration (e.g., pushing a car harder makes it speed up faster). This is the $$F \\propto a$$ relationship.\n- Step 3: For a fixed acceleration, a larger mass requires a larger force (e.g., it's harder to accelerate a lorry than a bicycle at the same rate). Mass is the measure of an object's resistance to acceleration (inertia). This is the $$F \\propto m$$ relationship.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "What is the difference between the mass and the weight of an object, and how are they related mathematically? (3 steps)", "answer": "- Step 1: Mass is a scalar quantity that measures the amount of matter in an object and its resistance to acceleration (inertia). It is constant regardless of location.\n- Step 2: Weight is a vector quantity that measures the gravitational force acting on the object. It acts vertically downwards and varies depending on the gravitational field strength $$g$$.\n- Step 3: They are related by $$W = mg$$, where $$W$$ is weight in Newtons, $$m$$ is mass in kg, and $$g$$ is acceleration due to gravity (approx $$9.8 \\text{ m s}^{-2}$$ on Earth). This is simply an application of $$F = ma$$ where the force is gravity and the resulting acceleration is $$g$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A lift of mass $$m$$ is accelerating upwards with acceleration $$a$$. Write the equation of motion for the lift, explaining the sign of each term. (3 steps)", "answer": "- Step 1: The forces acting on the lift are the tension $$T$$ in the cable (upwards) and the weight $$mg$$ (downwards).\n- Step 2: Taking the direction of acceleration (upwards) as positive, the resultant force is $$T - mg$$.\n- Step 3: Using Newton's second law $$F = ma$$, the equation of motion is $$T - mg = ma$$. The tension must overcome the weight AND provide the upward accelerating force.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "A resultant force $$\\mathbf{F} = (6\\mathbf{i} + 4\\mathbf{j}) \\text{ N}$$ acts on a particle of mass $$2 \\text{ kg}$$. Explain how to find the acceleration vector $$\\mathbf{a}$$ and why acceleration is always in the same direction as the resultant force. (3 steps)", "answer": "- Step 1: Newton's second law in vector form is $$\\mathbf{F} = m\\mathbf{a}$$. To find $$\\mathbf{a}$$, you divide the force vector by the mass: $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$.\n- Step 2: Dividing a vector by a positive scalar ($$m$$) changes its magnitude but not its direction. So, $$\\mathbf{a} = \\frac{1}{2}(6\\mathbf{i} + 4\\mathbf{j}) = (3\\mathbf{i} + 2\\mathbf{j}) \\text{ m s}^{-2}$$.\n- Step 3: The acceleration is always in the same direction as the resultant force because mass is a positive scalar. The force vector and acceleration vector are parallel and point in the exact same direction.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Two particles are connected by a taut, light inextensible string and pulled along a smooth surface. When is it valid to treat the system as a single particle, and what advantage does this provide? (3 steps)", "answer": "- Step 1: You can treat the system as a single particle if all parts of the system are moving in the same straight line (i.e., they have the same acceleration magnitude and direction).\n- Step 2: This is valid because the internal forces (like tension in the string) are equal and opposite (Newton's 3rd Law), so they cancel out when considering the whole system.\n- Step 3: The advantage is that it eliminates the need to find the internal tension force, allowing you to find the acceleration directly using $$F_{external} = m_{total}a$$. You can then use the acceleration to find the tension by considering one particle individually.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In a connected particle problem, explain the physical implications of the assumptions that the string is \"light\" and \"inextensible\". (3 steps)", "answer": "- Step 1: \"Light\" means the mass of the string is negligible (assumed to be zero). This implies that the tension is the same throughout the entire length of the string; it doesn't vary to accelerate the string itself.\n- Step 2: \"Inextensible\" means the string cannot stretch. This implies that if one end of the string moves, the other end must move at the exact same rate.\n- Step 3: Consequently, the magnitude of the acceleration of both connected particles is exactly the same at all times. If the string were extensible, one particle could accelerate while the other momentarily stayed still.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A book rests on a table. Identify the Newton's Third Law pair for the normal reaction force exerted by the table on the book. Why is this NOT the weight of the book? (3 steps)", "answer": "- Step 1: The Newton's Third Law pair for the normal reaction (table pushing book up) is the force the book exerts on the table (book pushing table down).\n- Step 2: Newton's Third Law pairs must act on *different* bodies, be of the same type (both contact forces or both gravitational), and be equal and opposite.\n- Step 3: The weight of the book is the gravitational pull of the Earth on the book. It acts on the *book*, whereas the normal reaction also acts on the *book*. Therefore, they cannot be a Third Law pair (they are a First Law equilibrium pair). The Third Law pair for the weight is the gravitational pull of the *book* on the *Earth*.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Two particles are connected by a light *rod* (not a string) and pushed from one end. Explain the difference between tension and thrust in the connecting object, and which applies here. (3 steps)", "answer": "- Step 1: Tension occurs when the connecting object (like a string or tow-rope) is being *pulled* or stretched. A string can only experience tension; it goes slack if compressed.\n- Step 2: Thrust (or compression) occurs when the connecting object (like a rigid rod or shunt) is being *pushed* or compressed.\n- Step 3: In this scenario, since the particles are being pushed, the rod is compressed. Therefore, the force within the rod is a thrust. If they were being pulled, it would be a tension.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "In a pulley system where one mass hangs on the left and another on the right, why can you NOT treat the whole system as a single particle to find the acceleration? (2 steps)", "answer": "- Step 1: Treating a system as a single particle requires all parts of the system to move in the same straight line.\n- Step 2: In a pulley system, the masses are moving in different directions (e.g., one moves up, the oth
