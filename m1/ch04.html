er moves down). Therefore, you cannot combine them into a single particle moving in one direction. You must write separate equations of motion for each mass.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "In pulley problems, the pulley is often modelled as \"smooth\". How does this assumption affect the tension in the string, and what would happen if the pulley were rough? (2 steps)", "answer": "- Step 1: A smooth pulley means there is no friction between the pulley and the string. Because there is no friction to oppose the string's motion or vary the pull, the tension in the string is the same on both sides of the pulley.\n- Step 2: If the pulley were rough, friction would act on the string. This would cause the tension to be different on either side of the pulley (the side pulling the pulley would have higher tension than the side being pulled).", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A light inextensible string passes over a smooth pulley with tension $$T$$ on both sides. Both sections of string hang vertically. What is the force exerted on the pulley by the string, and in what direction does it act? (2 steps)", "answer": "- Step 1: The string exerts a force of magnitude $$T$$ downwards on each side of the pulley.\n- Step 2: Since the two sections of string are vertical and on opposite sides, the horizontal components of the force cancel out. The vertical components add up. Therefore, the total force exerted on the pulley by the string is $$2T$$ acting vertically downwards.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "In a pulley system, the heavier mass hits the ground and stops. Describe the subsequent motion of the lighter mass, assuming the string is light and inextensible, and it doesn't reach the pulley. (3 steps)", "answer": "- Step 1: When the heavier mass hits the ground, it stops and the string becomes slack. This means the tension $$T$$ drops to zero instantly.\n- Step 2: The lighter mass is now moving upwards (due to the previous acceleration) but is no longer pulled by the string. The only force acting on it is its weight, acting downwards.\n- Step 3: Therefore, the lighter mass will continue to move upwards, decelerating under gravity at $$g \\text{ m s}^{-2}$$, until its velocity reaches zero. It will then fall back down under gravity.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A mass $$m_1$$ rests on a rough horizontal table, connected by a string over a smooth pulley at the edge to a hanging mass $$m_2$$. When writing the equation of motion for $$m_1$$ horizontally, what forces must be included, and how does friction act? (3 steps)", "answer": "- Step 1: The horizontal forces on $$m_1$$ are the tension $$T$$ pulling it towards the pulley, and the friction $$F$$ opposing its motion.\n- Step 2: Assuming $$m_1$$ moves towards the pulley, friction acts in the opposite direction (away from the pulley). The equation of motion is $$T - F = m_1 a$$.\n- Step 3: For the hanging mass $$m_2$$, the forces are its weight $$m_2 g$$ downwards and tension $$T$$ upwards. The equation of motion is $$m_2 g - T = m_2 a$$. Note that we assume the same magnitude of $$T$$ and $$a$$ for both due to the light, inextensible string and smooth pulley.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "A particle of mass $$3 \\text{ kg}$$ is acted upon by a force $$\\mathbf{F} = (9\\mathbf{i} - 6\\mathbf{j}) \\text{ N}$$. Find the acceleration vector $$\\mathbf{a}$$ and describe its direction relative to the positive $$\\mathbf{i}$$ direction. (3 steps)", "answer": "- Step 1: Use Newton's second law in vector form: $$\\mathbf{F} = m\\mathbf{a}$$, which rearranges to $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$.\n- Step 2: Substitute the values: $$\\mathbf{a} = \\frac{1}{3}(9\\mathbf{i} - 6\\mathbf{j}) = (3\\mathbf{i} - 2\\mathbf{j}) \\text{ m s}^{-2}$$.\n- Step 3: The direction is below the positive $$\\mathbf{i}$$ axis (in the 4th quadrant). The angle $$\\theta$$ below the $$\\mathbf{i}$$ axis is given by $$\\tan\\theta = \\frac{2}{3}$$, so $$\\theta \\approx 33.7^\\circ$$ below the positive $$\\mathbf{i}$$ direction.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Two particles A (mass 5kg) and B (mass 3kg) are connected by a light inextensible string on a smooth horizontal surface. A force of 24N is applied to A, pulling the system. Find the acceleration of the system and the tension in the string between A and B. (3 steps)", "answer": "- Step 1: Treat the whole system to find acceleration. Total mass = $$5 + 3 = 8 \\text{ kg}$$. Using $$F = ma$$, $$24 = 8a$$, so $$a = 3 \\text{ m s}^{-2}$$.\n- Step 2: To find tension, consider particle B alone (the one being pulled). The only horizontal force on B is the tension $$T$$.\n- Step 3: Apply $$F = ma$$ to B: $$T = m_B a = 3 \\times 3 = 9 \\text{ N}$$. The tension is 9 N.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Two masses, $$4 \\text{ kg}$$ and $$2 \\text{ kg}$$, are connected by a light inextensible string over a smooth fixed pulley. Explain conceptually why the acceleration of the system is less than $$g \\text{ (9.8 m s}^{-2}\\text{)}$$, and set up the equations to find it. (3 steps)", "answer": "- Step 1: The net driving force of the system is the difference in weights $$(4g - 2g)$$, because the heavier mass pulls down while the lighter mass resists. However, this net force must accelerate the *total* mass of the system $$(4 + 2) \\text{ kg}$$.\n- Step 2: Because the total mass being accelerated is greater than the mass difference creating the driving force, the acceleration will be proportionally less than $$g$$.\n- Step 3: Equations: For 4kg (down positive): $$4g - T = 4a$$. For 2kg (up positive): $$T - 2g = 2a$$. Adding them gives $$2g = 6a$$, so $$a = \\frac{2g}{6} = \\frac{g}{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}], "count": 22}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is a force diagram essential in analyzing the motion of a particle? Explain with reference to Newton's first and second laws.", "answer": "- Step 1: **Newton's first law** states that an object remains at rest or in uniform motion unless acted upon by a net force. A force diagram visually identifies all forces acting on the particle, allowing determination of whether equilibrium (balanced forces) exists.  \n- Step 2: **Newton's second law** ($F = ma$) relates the *resultant force* to acceleration. A force diagram helps resolve forces into components to calculate the net force, which directly informs the particle's acceleration.  \n- Step 3: Without a force diagram, it is easy to overlook or misrepresent forces (e.g., friction, normal reaction), leading to incorrect conclusions about motion or equilibrium.  \n\n**Takeaway:** Force diagrams provide a foundation for applying Newton's laws by clarifying all forces acting on a system.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "A particle is in equilibrium. What can you conclude about:  \n1. The vector sum of all forces acting on it?  \n2. Its velocity?  \n3. The relationship between individual forces (e.g., weight and normal reaction)?", "answer": "- Step 1: **Vector sum**: By Newton’s first law, the resultant force must be zero ($\\sum \\mathbf{F} = 0$).  \n- Step 2: **Velocity**: The particle is either at rest or moving with constant velocity (no acceleration).  \n- Step 3: **Individual forces**: Forces like weight and normal reaction must balance each other component-wise (e.g., vertical forces cancel, horizontal forces cancel).  \n\n**Takeaway:** Equilibrium implies both no net force and no acceleration, but the particle could still be moving at constant velocity.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "Why is the tension in a light, inextensible string the same on both sides of a smooth pulley?", "answer": "- Step 1: A **smooth pulley** introduces no friction, so there’s no opposing torque to create a difference in tension.  \n- Step 2: The string is **light**, meaning its mass is negligible, so tension doesn’t vary to support its own weight.  \n- Step 3: The string is **inextensible**, ensuring both particles move with the same acceleration, maintaining constant tension.  \n\n**Takeaway:** These assumptions simplify problems by allowing a single tension value to model the system.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "A satellite orbits Earth at constant speed. Is there a resultant force acting on it? Why or why not?", "answer": "- Step 1: **Circular motion requires a centripetal force** to continuously change direction, even at constant speed.  \n- Step 2: The satellite’s velocity direction changes, implying **acceleration toward Earth’s center** (Newton’s second law).  \n- Step 3: **Resultant force**: Gravitational pull provides the centripetal force. No tangential force acts (no speed change).  \n\n**Takeaway:** Constant speed in circular motion still requires a net force due to directional acceleration.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "When resolving forces for a particle in motion, why must you specify a direction for resolving (e.g., horizontal or vertical)?", "answer": "- Step 1: **Newton’s second law is direction-dependent**: Acceleration occurs in the direction of the net force.  \n- Step 2: **Component separation**: Forces perpendicular to the chosen direction cancel out and do not contribute to acceleration in that direction.  \n- Step 3: **Consistency**: Choosing a direction simplifies calculations by decoupling motion into independent axes (e.g., x and y).  \n\n**Takeaway:** Directional resolution ensures accurate application of $F = ma$ by aligning forces with the axis of interest.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "If a horizontal force $P$ pulls a particle across a rough horizontal plane at constant velocity, what does this imply about $P$ and the frictional force $F$?", "answer": "- Step 1: **Equilibrium**: Constant velocity means $\\sum F = 0$ (Newton’s first law).  \n- Step 2: **Horizontal forces**: $P = F$ (applied force equals opposing friction).  \n- Step 3: **Vertical forces**: Normal reaction $R = mg$ (no vertical acceleration).  \n\n**Takeaway:** Constant velocity implies forces balance in the direction of motion and perpendicular to it.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How does resolving forces into $\\mathbf{i}$ and $\\mathbf{j}$ components facilitate finding the resultant force?", "answer": "- Step 1: **Vector addition**: Forces are vectors; their components add linearly along independent axes.  \n- Step 2: **Independent resolution**: Resolve all $\\mathbf{i}$-components and $\\mathbf{j}$-components separately.  \n- Step 3: **Resultant**: Combine resolved components using $\\mathbf{R} = (\\sum F_x)\\mathbf{i} + (\\sum F_y)\\mathbf{j}$.  \n\n**Takeaway:** Component-wise resolution simplifies vector addition into scalar operations, avoiding geometric complexity.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the weight of an object calculated as $W = mg$ even though the gravitational field strength $g$ varies with location?", "answer": "- Step 1: **Local approximation**: For Earth’s surface problems, $g \\approx 9.8 \\, \\text{m/s}^2$ is constant.  \n- Step 2: **Mass independence**: $g$ represents acceleration due to gravity; weight is mass times local $g$.  \n- Step 3: **Variation**: At high altitudes or other celestial bodies, $W = mg$ still holds, but $g$ changes.  \n\n**Takeaway:** $W = mg$ is universally valid, but $g$ itself depends on context (e.g., Moon vs. Earth).", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How does Newton’s third law apply to two particles connected by a string over a pulley?", "answer": "- Step 1: **Action-reaction pairs**: The tension in the string pulling particle $A$ upward is met by an equal downward force on the string by $A$.  \n- Step 2: Similarly, the string pulls particle $B$ downward, and $B$ exerts an upward force on the string.  \n- Step 3: The pulley experiences forces from both sides of the string, but tension remains equal due to Newton’s third law (action = reaction).  \n\n**Takeaway:** Newton’s third law ensures forces between particles and the string are mutual and equal in magnitude.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "If two particles of masses $m_1$ and $m_2$ are connected by a light inextensible string over a pulley, why is their acceleration the same in magnitude?", "answer": "- Step 1: **Inextensible string**: The displacement of both particles must be equal over time.  \n- Step 2: **Same speed**: If one moves a distance $s$, the other does too.  \n- Step 3: **Same acceleration**: Differentiating displacement twice, $a_1 = a_2$ in magnitude (directions may differ).  \n\n**Takeaway:** The inextensibility ensures kinematic constraints, linking their accelerations directly.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "A particle accelerates in two dimensions under a resultant force $\\mathbf{F} = (3\\mathbf{i} + 4\\mathbf{j}) \\, \\text{N}$. What is the direction of its acceleration?", "answer": "- Step 1: **Newton’s second law**: $\\mathbf{a} = \\mathbf{F}/m$; acceleration is in the direction of $\\mathbf{F}$.  \n- Step 2: **Vector direction**: Calculate the angle $\\theta = \\tan^{-1}(F_y/F_x) = \\tan^{-1}(4/3)$.  \n- Step 3: **Bearing**: If $\\mathbf{i}$ and $\\mathbf{j}$ are east and north, bearing = $90^\\circ - \\theta$.  \n\n**Takeaway:** Acceleration direction is determined by the resultant force vector, not individual components.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "A car accelerates forward. The driving force is $F$, and total resistance is $R$. What is the net force causing acceleration?", "answer": "- Step 1: **Resultant force**: $F_{\\text{net}} = F - R$ (opposite directions).  \n- Step 2: **Application of $F = ma$**: $F - R$ determines the car’s acceleration.  \n- Step 3: **Equilibrium misconception**: If $F = R$, $F_{\\text{net}} = 0$, and the car moves at constant velocity.  \n\n**Takeaway:** Net force, not driving force alone, dictates acceleration per Newton’s second law.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is the normal reaction force not always equal to an object’s weight on a horizontal surface?", "answer": "- Step 1: **Equilibrium case**: If vertical forces balance (no acceleration), $R = mg$.  \n- Step 2: **Non-equilibrium case**: If an external vertical force (e.g., upward pull) acts, $R = mg - F_{\\text{vertical}}$.  \n- Step 3: **Accelerated frames**: In a lift accelerating upward, $R = m(g + a)$.  \n\n**Takeaway:** Normal reaction adjusts to balance net vertical forces, not just weight.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": true}, {"question": "A particle of mass $m$ is pulled at an angle $\\theta$ to the horizontal by a force $F$. How does this affect the normal reaction?", "answer": "- Step 1: **Vertical component**: $F \\sin\\theta$ reduces the effective weight.  \n- Step 2: **Normal reaction**: $R = mg - F \\sin\\theta$ (if no vertical acceleration).  \n- Step 3: **Limit case**: If $F \\sin\\theta = mg$, $R = 0$, and the particle loses contact with the surface.  \n\n**Takeaway:** Pulling upward decreases normal reaction; pushing downward increases it.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "For particles connected by a string over a pulley, why is the tension less than the weight of a hanging mass?", "answer": "- Step 1: **Net force**: If the system accelerates, $T < mg$ for the descending mass because $mg - T = ma$.  \n- Step 2: **Acceleration dependence**: Tension equals weight only if acceleration is zero (equilibrium).  \n- Step 3: **Contrast with equilibrium**: In equilibrium, $T = mg$, but acceleration alters this relationship.  \n\n**Takeaway:** Tension adjusts to provide net force for acceleration, deviating from weight unless in equilibrium.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "How does the acceleration of a system of connected particles change if the string is replaced by a heavier rope?", "answer": "- Step 1: **Mass of string/rope**: A heavy rope contributes to total mass, reducing acceleration ($a = F_{\\text{net}}/(m_{\\text{total}})$).  \n- Step 2: **Tension variation**: In a heavy rope, tension increases along the rope’s length, complicating analysis.  \n- Step 3: **Light string assumption**: Light strings have negligible mass, keeping tension uniform and simplifying $a = F_{\\text{net}}/(m_1 + m_2)$.  \n\n**Takeaway:** Real ropes add complexity; the light string assumption is a pedagogical tool for simplicity.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": true}, {"question": "A particle moves in two dimensions under forces $\\mathbf{F}_1 = 2\\mathbf{i} + 3\\mathbf{j}$ and $\\mathbf{F}_2 = -1\\mathbf{i} + 4\\mathbf{j}$. What is the direction of its acceleration?", "answer": "- Step 1: **Resultant force**: $\\mathbf{F}_{\\text{net}} = (2-1)\\mathbf{i} + (3+4)\\mathbf{j} = 1\\mathbf{i} + 7\\mathbf{j}$.  \n- Step 2: **Acceleration direction**: Same as $\\mathbf{F}_{\\text{net}}$. Angle with $\\mathbf{i}$: $\\theta = \\tan^{-1}(7/1) = 81.9^\\circ$.  \n- Step 3: **Bearing**: $90^\\circ - 81.9^\\circ = 008.1^\\circ$ (if $\\mathbf{i}$ is east, $\\mathbf{j}$ is north).  \n\n**Takeaway:** Acceleration direction follows the vector sum of all forces, independent of individual magnitudes.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Why is the driving force in a car’s engine not the sole factor determining its acceleration?", "answer": "- Step 1: **Net force**: Acceleration depends on $F_{\\text{net}} = F_{\\text{drive}} - R$, where $R$ is resistance (air drag, friction).  \n- Step 2: **Mass dependence**: $a = F_{\\text{net}}/m$; heavier cars accelerate slower for the same net force.  \n- Step 3: **Equilibrium**: At top speed, $F_{\\text{drive}} = R$, so $a = 0$.  \n\n**Takeaway:** Acceleration is determined by the balance between driving force and resistive forces, scaled by mass.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": true}, {"question": "A box slides down a frictionless slope. How does the angle of the slope affect its acceleration?", "answer": "- Step 1: **Component of weight**: Resolve weight into $mg \\sin\\theta$ (parallel to slope) and $mg \\cos\\theta$ (perpendicular).  \n- Step 2: **Net force**: Only $mg \\sin\\theta$ drives motion; $F_{\\text{net}} = mg \\sin\\theta$.  \n- Step 3: **Acceleration**: $a = g \\sin\\theta$. Steeper angles ($\\theta$) increase $a$, with $\\theta = 90^\\circ$ giving free fall ($a = g$).  \n\n**Takeaway:** Slope angle directly determines the effective gravitational acceleration component.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "A pulley system has two particles of masses $m$ and $2m$. Why is the acceleration less than $g/2$?", "answer": "- Step 1: **Net force**: $F_{\\text{net}} = 2mg - mg = mg$.  \n- Step 2: **Total mass**: $m + 2m = 3m$.  \n- Step 3: **Acceleration**: $a = F_{\\text{net}}/m_{\\text{total}} = mg/3m = g/3$.  \n- Step 4: **Dependency**: Acceleration depends on the **difference in weights** and **total mass**, not just the ratio of masses.  \n\n**Takeaway:** Acceleration is always less than $g$ due to the inertia of the total system resisting motion.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain how to determine if an object is in equilibrium based on its force diagram. (2 steps)", "answer": "- Step 1: **Resolve forces in all directions** (horizontal and vertical) separately.  \n  - Add forces acting in the positive direction and subtract forces acting in the opposite direction.  \n- Step 2: **Check for balance**  \n  - If the resultant force in **every** direction is zero (e.g., ΣF_horizontal = 0 and ΣF_vertical = 0), the object is in equilibrium.  \n  - Example: A box on a table has weight $ W $ downward and normal reaction $ R $ upward. If $ R = W $, vertical forces balance.  \n\n**Key takeaway**: Equilibrium requires *all* force components to cancel, not just forces in one direction.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does a particle with **constant velocity** imply no resultant force acts on it? (2 steps)", "answer": "- Step 1: **Recall Newton’s First Law**  \n  - An object at rest stays at rest, and an object in motion continues with constant velocity **unless** a resultant force acts.  \n- Step 2: **Apply to constant velocity**  \n  - Constant velocity means **no acceleration**. Since $ F = ma $, if $ a = 0 $, $ F_{\\text{resultant}} = 0 $.  \n  - Misconception: Some think a force is needed to maintain motion, but inertia suffices in the absence of unbalanced forces.  \n\n**Key takeaway**: Resultant force causes acceleration, not motion itself.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you resolve forces to find the resultant in a specific direction?", "answer": "- To resolve forces in a direction (e.g., horizontal right):  \n  1. Assign a positive direction (e.g., →).  \n  2. Add forces in the positive direction, subtract forces in the opposite direction.  \n  3. Example: If forces are 20 N →, 10 N ←, and 5 N ↑, resolving horizontally: $ 20 - 10 = 10 $ N →.  \n  4. Vertical forces (like 5 N ↑) are resolved separately.  \n\n**Key takeaway**: Resolving isolates forces along one axis; perpendicular components don’t interfere.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What is the physical significance of a **resultant force** acting on a particle?", "answer": "- A resultant force causes **acceleration** in the direction of the resultant.  \n  - From Newton’s Second Law: $ F_{\\text{resultant}} = ma $.  \n  - Example: If a 10 N → and 6 N ← act on a 2 kg particle, the resultant is 4 N →, so acceleration $ a = 4/2 = 2 \\, \\text{m/s}^2 $ →.  \n\n**Key takeaway**: Resultant force determines acceleration, not velocity or displacement directly.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why must a force diagram include **all external forces** acting on an object, but not internal forces?", "answer": "- **External forces** (e.g., weight, tension, friction) cause motion/acceleration.  \n- **Internal forces** (e.g., forces between molecules in a rigid block) cancel out by Newton’s Third Law (equal and opposite within the system).  \n- Example: A car’s engine produces internal forces, but the driving force from the road (external) is what accelerates it.  \n\n**Key takeaway**: Force diagrams model interactions with the environment, not internal dynamics.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "How do you add two force vectors to find the resultant? (3 steps)", "answer": "- Step 1: **Express vectors in components** (e.g., $ \\mathbf{F}_1 = 3\\mathbf{i} + 4\\mathbf{j} $, $ \\mathbf{F}_2 = -2\\mathbf{i} + 5\\mathbf{j} $).  \n- Step 2: **Add corresponding components**:  \n  - $ \\mathbf{F}_{\\text{resultant}} = (3-2)\\mathbf{i} + (4+5)\\mathbf{j} = 1\\mathbf{i} + 9\\mathbf{j} \\, \\text{N} $.  \n- Step 3: **Find magnitude and direction**:  \n  - $ |\\mathbf{F}| = \\sqrt{1^2 + 9^2} = \\sqrt{82} \\, \\text{N} $, angle $ \\theta = \\tan^{-1}(9/1) $ from the x-axis.  \n\n**Key takeaway**: Vector addition is component-wise; direction matters via signs.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What condition must hold for particles to be in equilibrium when multiple forces act?", "answer": "- The **vector sum of all forces** must be zero:  \n  - $ \\sum F_x = 0 $ and $ \\sum F_y = 0 $.  \n- Example: If $ \\mathbf{F}_1 + \\mathbf{F}_2 + \\mathbf{F}_3 = 0 $, particles are in equilibrium.  \n- Misconception: Forces must cancel *in every direction*, not just pairwise.  \n\n**Key takeaway**: Equilibrium requires both horizontal and vertical components to balance.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does a bearing differ from a standard angle in vector direction?", "answer": "- **Bearing**: Measured clockwise from **north**, 3-digit number (e.g., 053°).  \n- **Standard angle**: Measured counterclockwise from **east** (positive x-axis).  \n- Example: A force at bearing 053° has angle $ 90° - 53° = 37° $ from the x-axis.  \n\n**Key takeaway**: Bearings use north as 0°, while standard angles use east as 0°.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why is the weight of an object always considered downward in a force diagram?", "answer": "- Weight $ W = mg $ is the **gravitational force** exerted by Earth, which acts **vertically downward** toward Earth’s center.  \n- Even on inclined planes, weight points straight down, not perpendicular to the surface.  \n\n**Key takeaway**: Weight’s direction is independent of the object’s orientation.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How do you resolve forces when they act at an angle to the direction of motion? (3 steps)", "answer": "- Step 1: **Resolve each force into components** parallel and perpendicular to motion.  \n- Step 2: **Sum parallel components** (use cosine for angle θ with motion).  \n- Step 3: **Apply Newton’s Second Law**: $ \\sum F_{\\text{parallel}} = ma $.  \n- Example: A 10 N force at 30° to horizontal → horizontal component = $ 10\\cos(30°) $, vertical = $ 10\\sin(30°) $.  \n\n**Key takeaway**: Only the component in the direction of motion contributes to acceleration.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is Newton’s Second Law in vector form?", "answer": "- $ \\sum \\mathbf{F} = m\\mathbf{a} $, where $ \\mathbf{F} $ and $ \\mathbf{a} $ are vectors.  \n- This means:  \n  - Each component (x, y) of force causes acceleration in the same direction:  \n    $ F_x = ma_x $, $ F_y = ma_y $.  \n- Example: A particle with $ \\mathbf{F} = 6\\mathbf{i} + 16\\mathbf{j} \\, \\text{N} $ and $ m = 2 \\, \\text{kg} $ has $ \\mathbf{a} = 3\\mathbf{i} + 8\\mathbf{j} \\, \\text{m/s}^2 $.  \n\n**Key takeaway**: Force and acceleration vectors are directly proportional, component-wise.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you calculate the **tension in a string** connecting two particles on a smooth horizontal plane?", "answer": "- Step 1: **Treat the system as a single particle** to find acceleration:  \n  $ F_{\\text{applied}} = (m_1 + m_2)a $.  \n- Step 2: **Analyze one particle** to find tension:  \n  - For particle 1: $ F_{\\text{applied}} - T = m_1a $ → solve for $ T $.  \n- Example: Two masses (4 kg and 2 kg) with 12 N applied → acceleration $ a = 2 \\, \\text{m/s}^2 $, tension $ T = 8 \\, \\text{N} $.  \n\n**Key takeaway**: Tension exists only if the string is taut and particles are connected.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why is the tension the same on both sides of a **smooth pulley**?", "answer": "- A smooth pulley **does not change** the tension in the string.  \n- Frictionless bearings mean no energy loss, so tension remains equal on both sides.  \n- If the pulley were rough, tension would differ.  \n\n**Key takeaway**: Smooth pulley → equal tension; rough pulley → unequal tension.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you model motion in a pulley system where one particle accelerates upward and the other downward?", "answer": "- Step 1: **Assign consistent acceleration direction**:  \n  - If mass A > mass B, A accelerates down, B up.  \n- Step 2: **Write equations for each mass**:  \n  - For A (downward): $ m_Ag - T = m_Aa $.  \n  - For B (upward): $ T - m_Bg = m_Ba $.  \n- Step 3: **Solve simultaneously** for $ a $ and $ T $.  \n- Example: $ m_A = 3m $, $ m_B = 2m $ → $ a = \\frac{1}{5}g $, $ T = \\frac{12}{5}mg $.  \n\n**Key takeaway**: Acceleration direction depends on mass difference; equations are linked via tension.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the difference between **thrust** and **tension** in connected particles?", "answer": "- **Tension** occurs when particles are pulled (string is stretched).  \n- **Thrust** (or compression) occurs when particles are pushed (rod is compressed).  \n- Example: A rod between two cars pushing forward → thrust; pulling → tension.  \n\n**Key takeaway**: Thrust implies pushing, tension implies pulling.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How does a **light string** assumption affect calculations in connected particles?", "answer": "- **Mass of the string is negligible**, so tension is same throughout.  \n- If the string had mass, tension would vary along its length.  \n\n**Key takeaway**: Light string → uniform tension; heavy string → variable tension.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why is the acceleration of connected particles the same when the string is **inextensible**?", "answer": "- Inextensible string means particles move the same distance in the same time.  \n- Therefore, their speeds and accelerations are equal ($ a_1 = a_2 $).  \n- Example: Two boxes on a trolley → motion is synchronized.  \n\n**Key takeaway**: Inextensible string ensures identical acceleration for all connected particles.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How do you handle motion in two dimensions using Newton’s Second Law? (3 steps)", "answer": "- Step 1: **Resolve forces into x and y components**.  \n- Step 2: **Apply $ F = ma $** separately to each direction:  \n  - $ \\sum F_x = ma_x $, $ \\sum F_y = ma_y $.  \n- Step 3: **Use vector equations** or magnitude/direction for acceleration.  \n- Example: A 5 kg particle with $ \\mathbf{F} = 10\\mathbf{i} + 15\\mathbf{j} $ N has $ \\mathbf{a} = 2\\mathbf{i} + 3\\mathbf{j} \\, \\text{m/s}^2 $.  \n\n**Key takeaway**: 2D motion is two 1D motions combined via vector addition.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "What is the physical meaning of a **bearing of 020.6°** for an acceleration vector?", "answer": "- The acceleration is $ 20.6° $ clockwise from north.  \n- Convert to standard angle: $ 90° - 20.6° = 69.4° $ counterclockwise from east.  \n- Example: Acceleration vector $ 6\\mathbf{i} + 16\\mathbf{j} $ → bearing ≈ 020.6°.  \n\n**Key takeaway**: Bearings describe direction relative to north, while standard angles use east.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "How do you calculate the **greatest height** reached by a particle in vertical motion after the string goes slack?", "answer": "- Step 1: **Find speed when string goes slack** using $ v = u + at $.  \n- Step 2: **Use SUVAT** to find height gained post-slack ($ v^2 = u^2 + 2as $, with final $ v = 0 $).  \n- Example: If speed = 2.42 m/s upward → $ s = (2.42)^2 / (2g) ≈ 0.3 \\, \\text{m} $.  \n\n**Key takeaway**: After the string slackens, motion becomes projectile-type under gravity.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "State Newton's first law of motion and explain what it means about objects with balanced forces. (2 steps)", "answer": "- Step 1: Newton's first law states that an object at rest will stay at rest, and an object moving with constant velocity will continue to move with constant velocity, unless an unbalanced force acts on the object.\n- Step 2: This means that when forces acting on an object are balanced (resultant force is zero), the object will either remain at rest or continue moving with constant velocity — there is no acceleration.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A particle has horizontal forces of 20 N to the right and 15 N to the left, and vertical forces of 10 N upward and 25 N downward. Describe the motion of this particle. (3 steps)", "answer": "- Step 1: Resolve horizontally: Resultant horizontal force = 20 - 15 = 5 N to the right.\n- Step 2: Resolve vertically: Resultant vertical force = 10 - 25 = 15 N downward.\n- Step 3: Since there is a non-zero resultant force (5 N right, 15 N down), the particle will accelerate in the direction of this resultant force — diagonally downward to the right.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What does it mean when we say an object is \"in equilibrium\"? (1 step)", "answer": "An object is said to be in equilibrium when the forces acting upon it are balanced, meaning the resultant force is zero. This results in the object either remaining at rest or moving with constant velocity (no acceleration).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain why constant velocity means there is no resultant force acting on an object. (2 steps)", "answer": "- Step 1: Constant velocity means neither the speed nor the direction is changing.\n- Step 2: Any change in motion (including changing speed or direction) requires a resultant force. Therefore, if velocity is constant (including zero), the resultant force must be zero.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A block weighing 5 N sits at rest on a horizontal table. What is the value of the normal reaction force? Explain your reasoning. (2 steps)", "answer": "- Step 1: The block is at rest, so by Newton's first law, the forces must be balanced vertically.\n- Step 2: Since weight acts downward (5 N) and the block is stationary, the normal reaction must equal the weight: R = 5 N upward to balance the weight.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "When resolving forces in a particular direction, how do you determine which forces to add and which to subtract? (2 steps)", "answer": "- Step 1: Choose a positive direction (the direction you are resolving in). Forces acting in this positive direction are added.\n- Step 2: Forces acting in the opposite direction are subtracted. The result is the resultant force in that direction.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Two forces are given as vectors: F₁ = (2i + 3j) N and F₂ = (4i - j) N. Find the resultant force. (2 steps)", "answer": "- Step 1: Add the i-components: 2 + 4 = 6i. Add the j-components: 3 + (-1) = 2j.\n- Step 2: The resultant force is R = (6i + 2j) N.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If a particle is in equilibrium under the action of three forces F₁, F₂, and F₃, what must be true about these forces? (1 step)", "answer": "When a particle is in equilibrium, the resultant force is zero, so F₁ + F₂ + F₃ = 0. This means the three force vectors form a closed triangle when placed tip-to-tail.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Three forces (2i + 7j) N, (-3i + j) N, and F₃ act on an object in equilibrium. Find F₃. (3 steps)", "answer": "- Step 1: For equilibrium, the sum of all forces must equal zero: (2i + 7j) + (-3i + j) + F₃ = 0\n- Step 2: Simplify the sum of the known forces: (2 - 3)i + (7 + 1)j = (-i + 8j)\n- Step 3: Therefore F₃ must be the negative of this: F₃ = (i - 8j) N", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "The force F = (3i + 4j) N acts on a particle. Find its magnitude and the angle it makes with the i-direction. (3 steps)", "answer": "- Step 1: Magnitude = √(3² + 4²) = √(9 + 16) = √25 = 5 N\n- Step 2: The angle with the i-direction (horizontal) is given by tan θ = opposite/adjacent = 4/3\n- Step 3: θ = tan⁻¹(4/3) ≈ 53.1° above the horizontal (i-direction)", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In vector mechanics, if i represents east and j represents north, what bearing does the force (4i + 3j) N act on? (3 steps)", "answer": "- Step 1: Find the angle from the east (i) direction: tan θ = 3/4, so θ = 36.9°\n- Step 2: Bearings are measured clockwise from north (0° = north, 90° = east)\n- Step 3: Bearing = 90° - 36.9° = 053.1° (or approximately 053°)", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A particle begins at rest and is acted on by three forces: (2i + j) N, (3i - 2j) N, and (-i + 4j) N. Describe the motion of the particle. (3 steps)", "answer": "- Step 1: Find the resultant: (2+3-1)i + (1-2+4)j = (4i + 3j) N\n- Step 2: Since the particle starts from rest and there is a non-zero resultant force, by Newton's second law, the particle will accelerate.\n- Step 3: The particle accelerates in the direction of the resultant force (4i + 3j), which is northeast.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "State Newton's second law of motion and explain what each symbol in F = ma represents. (2 steps)", "answer": "- Step 1: Newton's second law states that the force needed to accelerate a particle is equal to the product of the mass and the acceleration produced: F = ma\n- Step 2: F is the resultant force in newtons (N), m is the mass in kilograms (kg), and a is the acceleration in meters per second squared (m s⁻²)", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A particle of mass 1.5 kg is acted on by a resultant force of 6 N. Find the acceleration. (2 steps)", "answer": "- Step 1: Use F = ma: 6 = 1.5 × a\n- Step 2: Solve: a = 6/1.5 = 4 m s⁻² in the direction of the resultant force", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Explain why the weight of an object is given by W = mg, and state the value of g. (2 steps)", "answer": "- Step 1: Weight is the force due to gravity acting on an object. By F = ma, with a = g (acceleration due to gravity), we get W = mg\n- Step 2: In standard models, g = 9.8 m s⁻² (often taken as 10 m s⁻² in simplified problems)", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A 4 kg particle has a weight of 39.2 N. What is the acceleration due to gravity in this case? (2 steps)", "answer": "- Step 1: Use W = mg: 39.2 = 4 × g\n- Step 2: g = 39.2/4 = 9.8 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A horizontal force X acts on a 2 kg particle causing it to accelerate at 2 m s⁻² to the right. There is also a 4 N force acting to the left. Find X. (3 steps)", "answer": "- Step 1: Take right as positive. The resultant force = X - 4\n- Step 2: Using F = ma: X - 4 = 2 × 2 = 4\n- Step 3: Solve: X = 8 N", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A 5 kg body is pulled along a rough horizontal table by a 20 N horizontal force against a 4 N friction force. Find the acceleration. (2 steps)", "answer": "- Step 1: Resultant force in the direction of motion = 20 - 4 = 16 N\n- Step 2: Using F = ma: 16 = 5a, so a = 3.2 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A 5 kg body moves across a horizontal table. If there is no vertical acceleration, what is the normal reaction force? (2 steps)", "answer": "- Step 1: With no vertical acceleration, a = 0, so the forces must balance vertically.\n- Step 2: R - mg = 0, so R = mg = 5 × 9.8 = 49 N upward", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "An object moving on a rough surface experiences a constant frictional force of 30 N and decelerates at 1.2 m s⁻². Find the mass of the object. (2 steps)", "answer": "- Step 1: The friction force causes deceleration. Using F = ma: 30 = m × 1.2\n- Step 2: m = 30/1.2 = 25 kg", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "An astronaut weighs 735 N on Earth. Given g = 9.8 m s⁻² on Earth, what is the astronaut's mass? (2 steps)", "answer": "- Step 1: Weight W = mg, so mass m = W/g\n- Step 2: m = 735/9.8 = 75 kg", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "An astronaut weighs 120 N on the Moon. If g on Earth is 9.8 m s⁻², find g on the Moon. (3 steps)", "answer": "- Step 1: First find mass: m = 735/9.8 = 75 kg (from previous question)\n- Step 2: On the Moon, weight = mg_moon: 120 = 75 × g_moon\n- Step 3: g_moon = 120/75 = 1.6 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A horizontal force of 10 N acts on a 3 kg particle on a rough horizontal plane, causing acceleration of 2 m s⁻². Calculate the frictional force. (2 steps)", "answer": "- Step 1: Resultant force in direction of motion = 3 × 2 = 6 N\n- Step 2: Since applied force is 10 N and net is 6 N, friction = 10 - 6 = 4 N (opposing motion)", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Explain why you should usually take the positive direction as the direction of acceleration when setting up equations of motion. (1 step)", "answer": "Taking the positive direction as the direction of acceleration simplifies the mathematics because you can directly substitute the acceleration value into F = ma without needing to worry about negative signs for the acceleration term.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A resultant force (3i + 8j) N acts on a 0.5 kg particle. Find the acceleration in vector form. (2 steps)", "answer": "- Step 1: Using F = ma in vector form: (3i + 8j) = 0.5 × a\n- Step 2: Divide both components by 0.5: a = (6i + 16j) m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A particle of mass 3 kg is acted on by forces F₁ = (2i + 4j) N, F₂ = (-5i + 4j) N, and F₃ = (6i - 5j) N. Find the acceleration. (3 steps)", "answer": "- Step 1: Find resultant: R = (2-5+6)i + (4+4-5)j = (3i + 3j) N\n- Step 2: Use F = ma: (3i + 3j) = 3a\n- Step 3: a = (i + j) m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "The acceleration of a particle is (7i - 3j) m s⁻² and its mass is 3 kg. Find the resultant force acting on it. (2 steps)", "answer": "- Step 1: Using F = ma: F = 3 × (7i - 3j)\n- Step 2: F = (21i - 9j) N", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Find the magnitude and bearing of the acceleration (6i + 16j) m s⁻². (3 steps)", "answer": "- Step 1: Magnitude = √(6² + 16²) = √(36 + 256) = √292 ≈ 17.1 m s⁻²\n- Step 2: Angle from i-direction: tan θ = 16/6 = 2.667, θ = 69.4°\n- Step 3: Bearing = 90° - 69.4° = 020.6° (or approximately 021°)", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A boat of mass 60 kg has forces F₁ = (80, 50) N, F₂ = (10p, 20q) N, and F₃ = (-75, 100) N acting on it. If it accelerates at (0.8, -1.5) m s⁻², find p and q. (3 steps)", "answer": "- Step 1: Resultant = (80 + 10p - 75, 50 + 20q + 100) = (5 + 10p, 150 + 20q) N\n- Step 2: Using F = ma: (5 + 10p, 150 + 20q) = 60 × (0.8, -1.5) = (48, -90)\n- Step 3: Solve: 5 + 10p = 48 → p = 4.3; 150 + 20q = -90 → q = -12", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Two forces (2i + 3j) N and (pi + qj) N act on a particle. The resultant is parallel to (-i + 4j). Show that 4p + q + 11 = 0. (3 steps)", "answer": "- Step 1: Resultant R = ((2+p)i + (3+q)j) N. Since R is parallel to (-i + 4j), we can write R = k(-i + 4j) = (-k, 4k)\n- Step 2: Equating components: 2 + p = -k and 3 + q = 4k\n- Step 3: From first: k = -(2+p). Substitute into second: 3 + q = 4(-2-p) = -8 - 4p. Rearranging: 4p + q + 11 = 0", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What does it mean for particles to be \"connected\" in mechanics problems, and how does this affect how we solve problems? (2 steps)", "answer": "- Step 1: Particles are connected when they are in contact or linked by an inextensible string or rod, meaning they move together and must have the same acceleration (if the connection is rigid).\n- Step 2: This allows us to either consider the whole system as a single particle (finding one acceleration for all) or consider particles individually (which introduces tension as an unknown).", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Two particles P and Q of masses 5 kg and 3 kg are connected by a light inextensible string. A force of 40 N pulls P. Friction on P is 10 N and on Q is 6 N. Find the acceleration of the system. (2 steps)", "answer": "- Step 1: Treat the system as a single particle. Total mass = 5 + 3 = 8 kg. Resultant force = 40 - 10 - 6 = 24 N\n- Step 2: Using F = ma: 24 = 8a, so a = 3 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the previous question, find the tension in the string. (2 steps)", "answer": "- Step 1: Consider particle P alone. Forces: 40 N right, friction 10 N left, tension T left.\n- Step 2: 40 - T - 10 = 5 × 3 → 30 - T = 15 → T = 15 N", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Explain how the assumption that the string is \"light\" is used in connected particle problems. (1 step)", "answer": "A light string has negligible mass, meaning the tension is the same throughout the entire length of the string. This allows us to use the same tension value on both sides of a pulley or between connected particles.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Explain how the assumption that the string is \"inextensible\" is used in connected particle problems. (1 step)", "answer": "An inextensible string cannot stretch, which means all particles connected by the string must have the same acceleration (they move the same distance in the same time).", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "State Newton's third law of motion. (1 step)", "answer": "Newton's third law states that for every action there is an equal and opposite reaction. When body A exerts a force on body B, body B exerts an equal and opposite force on body A.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A 400 g mass A rests on top of a 600 g mass B on a scale-pan. The system accelerates upward at 0.5 m s⁻². Find the tension in the string. (3 steps)", "answer": "- Step 1: Total mass = 0.4 + 0.6 = 1 kg. Take upward as positive.\n- Step 2: T - (0.4g + 0.6g) = 1 × 0.5 → T - 9.8 = 0.5 → T = 10.3 N\n- Step 3: To 2 s.f., T = 10 N", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the previous situation, find the force exerted by mass A on mass B. (3 steps)", "answer": "- Step 1: Consider mass A alone. Forces: force from B upward (R), weight downward = 0.4g\n- Step 2: R - 0.4g = 0.4 × 0.5 → R - 3.92 = 0.2 → R = 4.12 N upward\n- Step 3: By Newton's third law, B experiences a force of 4.1 N downward from A", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In the previous situation, find the force exerted by the scale-pan on mass B. (3 steps)", "answer": "- Step 1: Consider the scale-pan (mass = 0). Upward forces: tension T. Downward: force from B on pan.\n- Step 2: T - R_pan = 0 → R_pan = T = 10.3 N downward\n- Step 3: By Newton's third law, B experiences 10.3 N upward from the scale-pan", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Two particles P and Q of masses 8 kg and 2 kg are connected by a light inextensible string on a smooth horizontal plane. A force F is applied to P away from Q, producing acceleration 0.4 m s⁻². Find F. (2 steps)", "answer": "- Step 1: Total mass = 10 kg. Using F = ma for the system: F = 10 × 0.4 = 4 N\n- Step 2: F = 4 N", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "In the previous question, find the tension in the string. (2 steps)", "answer": "- Step 1: Consider particle Q (mass 2 kg): T = 2 × 0.4 = 0.8 N\n- Step 2: The tension is 0.8 N (or you could consider P: F - T = 8 × 0.4 → 4 - T = 3.2 → T = 0.8 N)", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Two particles P and Q of masses 20 kg and m kg are connected by a light inextensible rod on a smooth horizontal plane. A 60 N force applied to Q toward P produces acceleration 2 m s⁻². Find m. (2 steps)", "answer": "- Step 1: Total mass = 20 + m. Using F = ma: 60 = (20 + m) × 2\n- Step 2: 60 = 40 + 2m → 2m = 20 → m = 10 kg", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In the previous question, find the thrust in the rod. (2 steps)", "answer": "- Step 1: Consider particle P alone. The rod pushes P forward with thrust T.\n- Step 2: T = 20 × 2 = 40 N (thrust is the force transmitted through the rod)", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Why can we NOT treat a pulley system as a single particle? (1 step)", "answer": "In pulley systems, particles move in different directions (one up, one down), so they have different directions of motion even if they have the same magnitude of acceleration. This means we cannot combine them into a single particle moving in one direction.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Two particles of masses 2m and 3m are connected by a string over a pulley. Find the acceleration of the system. (3 steps)", "answer": "- Step 1: For the lighter particle (2m): T - 2mg = 2m × a (upward, taking upward as positive)\n- Step 2: For the heavier particle (3m): 3mg - T = 3m × a (downward as positive)\n- Step 3: Adding: 3mg - 2mg = 5ma → mg = 5ma → a = g/5 (the heavier particle descends)", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In the previous pulley system, find the tension in the string. (2 steps)", "answer": "- Step 1: From the equation for the lighter particle: T - 2m(g/5) = 2m × (g/5)\n- Step 2: T = 2m(g/5) + 2m(g/5) = 4m(g/5) = (4/5)mg = 0.8mg", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In a pulley system, what force does the string exert on the pulley? (2 steps)", "answer": "- Step 1: The string exerts a downward force of magnitude 2T on the pulley (one T from each side of the string).\n- Step 2: This is because the tension pulls down on both sides of the pulley.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Explain why the pulley being \"smooth\" is important in pulley problems. (1 step)", "answer": "A smooth pulley means there is no friction between the string and the pulley, so the tension in the string is the same on both sides of the pulley. If the pulley had friction, the tension would be different on each side.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A 4 kg particle A and 3 kg particle B are connected by a string over a pulley. Find the tension when released from rest. (3 steps)", "answer": "- Step 1: Let a be acceleration (B descends, A ascends). For A: T - 4g = 4a (upward)\n- Step 2: For B: 3g - T = 3a (downward). Adding: 3g - 4g = 7a → -g = 7a → a = -g/7\n- Step 3: Substituting: T - 4g = 4(-g/7) → T = 4g - 4g/7 = (28g - 4g)/7 = 24g/7 ≈ 33.6 N", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "In a pulley system, particle A (4 kg) on a table is connected to particle B (3 kg) hanging. If A is 4.5 m from the pulley and B is 0.5 m above the ground, find the time for B to reach the ground. (3 steps)", "answer": "- Step 1: From previous, acceleration a = 0.6g ≈ 5.88 m s⁻² (B descending)\n- Step 2: B travels s = 0.5 m from rest. Using s = ut + ½at²: 0.5 = 0 + 0.5 × 5.88 × t²\n- Step 3: t² = 0.5/(2.94) = 0.17 → t ≈ 0.412 s", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "In the previous question, after B hits the ground, A continues moving and eventually stops due to friction. If friction force is 0.08mg, find how far A travels after B hits the ground. (3 steps)", "answer": "- Step 1: Find speed of A when B hits ground: v = at = 5.88 × 0.412 ≈ 2.42 m s⁻¹\n- Step 2: After B hits, string is slack, so only friction acts: -0.08mg = 4a' → a' = -0.08g = -0.784 m s⁻²\n- Step 3: Using v² = u² + 2as: 0 = (2.42)² + 2(-0.784)s → s = 5.86/1.568 ≈ 3.74 m? Wait - correct calculation: s = 2.42²/(2×0.784) = 5.8564/1.568 ≈ 3.73 m. Total from start: 0.5 + 3.73 = 4.23 m? Let me recalculate - actually A moved 0.5m while B moved 0.5m, so A's position = 4.5 - 0.5 = 4m from pulley when B hits. After B hits, A travels ~1.5m more before stopping.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "A car tows a trailer. The car has mass 1400 kg, trailer 700 kg. Driving force is 2380 N, resistances are 630 N (car) and 280 N (trailer). Find the acceleration. (2 steps)", "answer": "- Step 1: Total mass = 2100 kg. Total driving force = 2380 N. Total resistance = 630 + 280 = 910 N.\n- Step 2: Resultant = 2380 - 910 = 1470 N. Using F = ma: 1470 = 2100a → a = 0.7 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In the previous question, find the tension in the tow-rope. (2 steps)", "answer": "- Step 1: Consider the trailer: Forces are tension T forward, resistance 280 N backward.\n- Step 2: T - 280 = 700 × 0.7 = 490 → T = 770 N", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "A train engine of mass 6400 kg pulls a carriage of mass 1600 kg. Driving force is 12000 N, resistances are R (engine) and 2000 N (carriage). Acceleration is 0.5 m s⁻². Find R. (3 steps)", "answer": "- Step 1: Total mass = 8000 kg. Total resultant = 8000 × 0.5 = 4000 N\n- Step 2: Total resistance = R + 2000. So 12000 - (R + 2000) = 4000 → 10000 - R = 4000 → R = 6000 N\n- Step 3: Check: Engine force 12000, resistances 6000 + 2000 = 8000, net = 4000 = 8000 × 0.5 ✓", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "In the previous question, find the tension in the shunt (connector). (2 steps)", "answer": "- Step 1: Consider the carriage: T - 2000 = 1600 × 0.5 = 800\n- Step 2: T = 2800 N", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "A 500 kg lift descends with constant acceleration 2 m s⁻². Find the tension in the cable. (2 steps)", "answer": "- Step 1: Taking downward as positive: Weight - T = ma → 500g - T = 500 × 2\n- Step 2: T = 500g - 1000 = 4900 - 1000 = 3900 N (using g = 9.8)", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "If the same lift ascends with the same acceleration, find the new tension. (2 steps)", "answer": "- Step 1: Taking upward as positive: T - Weight = ma → T - 500g = 500 × 2\n- Step 2: T = 500g + 1000 = 4900 + 1000 = 5900 N", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "A particle is in equilibrium under forces (3a i + 4b j) N, (5b i + 2a j) N, and (-15i - 18j) N. Find a and b. (3 steps)", "answer": "- Step 1: For equilibrium, sum of i-components = 0: 3a + 5b - 15 = 0 → 3a + 5b = 15\n- Step 2: Sum of j-components = 0: 4b + 2a - 18 = 0 → 2a + 4b = 18 → a + 2b = 9\n- Step 3: Solve: From a = 9 - 2b. Substitute: 3(9-2b) + 5b = 15 → 27 - 6b + 5b = 15 → 27 - b = 15 → b = 12, then a = 9 - 24 = -15", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "In the previous question, after removing (-15i - 18j) N, find the magnitude and direction of the resulting acceleration of the 2 kg particle. (3 steps)", "answer": "- Step 1: The remaining forces are (3a i + 4b j) + (5b i + 2a j) = with a = -15, b = 12: (3(-15) + 5(12))i + (4(12) + 2(-15))j = (-45 + 60)i + (48 - 30)j = 15i + 18j\n- Step 2: Using F = ma: (15i + 18j) = 2a → a = (7.5i + 9j) m s⁻²\n- Step 3: Magnitude = √(7.5² + 9²) = √(56.25 + 81) = √137.25 ≈ 11.7 m s⁻². Direction: tan θ = 9/7.5 = 1.2, θ = 50.2° from i (east), bearing = 039.8°", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "A 0.8 kg block is pushed with 7 N on a rough floor. Speed increases from 2 to 4 m/s over 4.8 m. Find the frictional force. (3 steps)", "answer": "- Step 1: Find acceleration using v² = u² + 2as: 4² = 2² + 2a(4.8) → 16 = 4 + 9.6a → 12 = 9.6a → a = 1.25 m s⁻²\n- Step 2: Using F = ma: Resultant force = 0.8 × 1.25 = 1 N\n- Step 3: Applied force is 7 N, net is 1 N, so friction = 7 - 1 = 6 N (opposing motion)", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "A van of mass 400 kg moving at 16 m/s has engine cut out. A constant resistive force of 200 N brings it to rest. Find the time taken. (2 steps)", "answer": "- Step 1: Using F = ma: -200 = 400a → a = -0.5 m s⁻² (deceleration)\n- Step 2: Using v = u + at: 0 = 16 + (-0.5)t → t = 16/0.5 = 32 s", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "In the previous question, find the distance traveled before stopping. (2 steps)", "answer": "- Step 1: Using v² = u² + 2as: 0 = 16² + 2(-0.5)s → 0 = 256 - s → s = 256 m\n- Step 2: Alternatively, s = ut + ½at² = 16(32) + 0.5(-0.5)(32)² = 512 - 256 = 256 m", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "A 3 kg particle and m kg particle (m < 3) are on a pulley. The system has acceleration (3/7)g. Find the tension and m. (3 steps)", "answer": "- Step 1: For heavier (3 kg) descending: 3g - T = 3 × (3/7)g = (9/7)g → T = 3g - (9/7)g = (21/7 - 9/7)g = (12/7)g\n- Step 2: For lighter (m kg) ascending: T - mg = m × (3/7)g → (12/7)g - mg = (3/7)mg → (12/7)g = mg + (3/7)mg = (7m/7 + 3m/7)g = (10m/7)g\n- Step 3: 12/7 = 10m/7 → 12 = 10m → m = 1.2 kg. Tension = (12/7)g ≈ 16.8 N", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "What is the key difference between a \"thrust\" in a rod and a \"tension\" in a string? (1 step)", "answer": "Both are forces transmitted through a connection, but tension is a pulling force (the string pulls on the particles), while thrust is a pushing force (the rod pushes the particles). Both are treated the same mathematically in F = ma equations.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "A satellite orbits Earth at constant speed. Is there a resultant force acting on it? Explain. (2 steps)", "answer": "- Step 1: Yes, there is a resultant force acting on the satellite — the gravitational force from Earth.\n- Step 2: The satellite is accelerating because its direction is constantly changing (circular motion). The resultant force (gravity) provides the centripetal acceleration needed to keep it in orbit, even though its speed is constant.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "Why is it important to specify the positive direction when resolving forces? (1 step)", "answer": "The positive direction defines which forces are added and which are subtracted when calculating the resultant. Changing the positive direction would change the sign of the resultant force, which affects the direction of acceleration.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "What assumption allows us to treat two connected particles as a single particle in F = ma calculations? (1 step)", "answer": "The particles must be moving in the same straight line (same direction of motion) and be connected by an inextensible string or rod. This ensures they have the same acceleration, allowing us to combine their masses.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "A car accelerates at 2 m/s². The driving force is three times the resistance force. Find the driving force given car mass = 1200 kg. (3 steps)", "answer": "- Step 1: Let resistance = R, driving force = 3R. Net force = 3R - R = 2R\n- Step 2: Using F = ma: 2R = 1200 × 2 = 2400 N\n- Step 3: So R = 1200 N, and driving force = 3 × 1200 = 3600 N", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "Forces (3i + 2j) N and (4i - j) N act on a 0.25 kg particle. Find the acceleration. (2 steps)", "answer": "- Step 1: Resultant = (3+4)i + (2-1)j = (7i + j) N\n- Step 2: Using F = ma: (7i + j) = 0.25a → a = (28i + 4j) m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "Forces (2, -1) N, (3, -1) N, and (a, -2b) N act on a 2 kg particle causing acceleration (3, 2) m s⁻². Find a and b. (3 steps)", "answer": "- Step 1: Sum of forces = 2 + 3 + a = a + 5 in i-direction, and -1 - 1 - 2b = -2 - 2b in j-direction\n- Step 2: Using F = ma: (a+5, -2-2b) = 2 × (3, 2) = (6, 4)\n- Step 3: So a + 5 = 6 → a = 1; -2 - 2b = 4 → -2b = 6 → b = -3", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "A sled of mass 2 kg is acted on by force (2i + 4j) N for 3 seconds. Find the magnitude of acceleration. (2 steps)", "answer": "- Step 1: Using F = ma: (2i + 4j) = 2a → a = (i + 2j) m s⁻²\n- Step 2: Magnitude = √(1² + 2²) = √5 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_70", "judge_pick": false}, {"question": "In the previous question, find the distance traveled in 3 seconds. (2 steps)", "answer": "- Step 1: Initial velocity = 0. Acceleration = (i + 2j) m s⁻². After 3s, velocity = 3(i + 2j) m s⁻¹\n- Step 2: Distance s = ut + ½at² = 0 + ½ × (i + 2j) × 9 = 4.5(i + 2j) m. Magnitude = √(4.5² + 9²) = √(20.25 + 81) = √101.25 ≈ 10.1 m", "source": "MiniMax ①", "_id": "minimax_1_71", "judge_pick": false}, {"question": "A 4 kg particle starts from rest and is acted on by force (6i + bj) N on a bearing of 045°. Find b. (3 steps)", "answer": "- Step 1: A bearing of 045° means 45° east of north. The direction vector is (sin45°, cos45°) = (√2/2, √2/2) in (i,j) coordinates where i=east, j=north.\n- Step 2: The force direction is proportional to (√2/2, √2/2) which is equivalent to (1, 1) direction. So (6, b) must be proportional to (1, 1): 6/b = 1/1 → b = 6\n- Step 3: Or using tan(45°) = 1 = b/6 → b = 6", "source": "MiniMax ①", "_id": "minimax_1_72", "judge_pick": false}, {"question": "In the previous question, find the magnitude of the acceleration. (2 steps)", "answer": "- Step 1: Force magnitude = √(6² + 6²) = √72 = 6√2 N\n- Step 2: Using F = ma: a = F/m = (6√2)/4 = 1.5√2 ≈ 2.12 m s⁻²", "source": "MiniMax ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "A particle has mass 0.5 kg. Forces are F₁ = -4i N and F₂ = (ki + 2kj) N. Given acceleration magnitude is 8√17 m s⁻², find k. (3 steps)", "answer": "- Step 1: Resultant = (-4 + k)i + (0 + 2k)j = (k-4, 2k) N\n- Step 2: Using F = ma: (k-4, 2k) = 0.5a → a = 2(k-4, 2k) = (2k-8, 4k) m s⁻²\n- Step 3: Magnitude = √((2k-8)² + (4k)²) = 8√17 → Square: (2k-8)² + 16k² = 64 × 17 = 1088 → 4k² - 32k + 64 + 16k² = 1088 → 20k² - 32k - 1024 = 0 → Divide by 4: 5k² - 8k - 256 = 0 → Using quadratic formula: k = (8 ± √(64 + 5120))/10 = (8 ± √5184)/10 = (8 ± 72)/10 → k = 8 (positive) or k = -6.4. Since k > 0, k = 8", "source": "MiniMax ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "Two boats experience current force (3i) N. Boat A has motor force (-7i + 2j) N, boat B has (ki + j) N. If boats accelerate in perpendicular directions, find k. (3 steps)", "answer": "- Step 1: Total force on A = (3 + (-7), 0 + 2) = (-4, 2) N\n- Step 2: Total force on B = (3 + k, 0 + 1) = (k+3, 1) N\n- Step 3: For perpendicular acceleration, the force directions must be perpendicular. Dot product = 0: -4(k+3) + 2(1) = 0 → -4k - 12 + 2 = 0 → -4k = 10 → k = -2.5", "source": "MiniMax ①", "_id": "minimax_1_75", "judge_pick": false}, {"question": "When solving connected particle problems, when should you treat the system as a single particle versus considering particles individually? (1 step)", "answer": "Treat as a single particle when you only need the common acceleration (not the tension). Consider particles individually when you need to find the tension or thrust in the connecting string or rod.", "source": "MiniMax ①", "_id": "minimax_1_76", "judge_pick": true}, {"question": "Explain why the normal reaction force on a horizontal surface equals the weight of the object (when there's no vertical acceleration). (1 step)", "answer": "Since there is no vertical acceleration, the vertical forces must balance. The upward normal reaction must equal the downward weight (mg) to give zero resultant vertical force.", "source": "MiniMax ①", "_id": "minimax_1_77", "judge_pick": false}, {"question": "A platform is lifted at constant velocity. If the weight is 1000 N, what is the tension in each rope? (1 step)", "answer": "- Step 1: At constant velocity, acceleration = 0, so resultant force = 0.\n- Step 2: Total upward tension must equal total weight. With two ropes, each rope has tension = 1000/2 = 500 N.", "source": "MiniMax ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "If the tension in each rope is reduced by 50 N (from the previous question), describe the resulting motion. (2 steps)", "answer": "- Step 1: New total tension = 1000 - 100 = 900 N (two ropes each reduced by 50 N).\n- Step 2: Resultant force = 900 - 1000 = -100 N (downward). The platform will accelerate downward.", "source": "MiniMax ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "What is the difference between resolving a force horizontally versus writing it in i-j vector notation? (1 step)", "answer": "Resolving horizontally means finding the horizontal component of a force (using cos of the angle). Writing in i-j notation means expressing the force as a combination of horizontal (i) and vertical (j) components — these are two ways of representing the same vector information.", "source": "MiniMax ①", "_id": "minimax_1_80", "judge_pick": false}, {"question": "A particle is in equilibrium. What can you say about the sum of the i-components and the sum of the j-components of all forces? (1 step)", "answer": "Both sums must equal zero. For equilibrium, the resultant force is the zero vector (0i + 0j), so each component separately must sum to zero.", "source": "MiniMax ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "Why might it be easier to find the tension in a pulley system by considering the lighter particle rather than the heavier one? (1 step)", "answer": "Both methods give the same answer, so neither is inherently easier. However, sometimes one particle's equation has fewer terms (e.g., less friction), making it slightly quicker to solve.", "source": "MiniMax ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "When a car tows a trailer, where is the tension in the tow-bar greatest — at the car end or the trailer end? (1 step)", "answer": "The tow-bar transmits force between car and trailer. For a light, inextensible tow-bar, the tension is the same throughout — it pulls on both the car and the trailer with equal force.", "source": "MiniMax ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "A box A (110 kg) rests on box B (190 kg), which sits on the floor of a lift (1700 kg). The lift descends with acceleration 1.8 m s⁻². Find the force exerted by B on A. (3 steps)", "answer": "- Step 1: Consider A: Forces are weight (110g) downward and normal reaction from B upward (R_BA).\n- Step 2: Taking downward as positive: 110g - R_BA = 110 × 1.8 → R_BA = 110g - 198 = 1078 - 198 = 880 N\n- Step 3: By Newton's third law, B exerts 880 N upward on A (and A exerts 880 N downward on B)", "source": "MiniMax ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "In the previous question, find the force exerted by the floor of the lift on box B. (3 steps)", "answer": "- Step 1: Consider B: Weight = 190g, plus weight of A = 110g (total 300g), plus normal from floor R_floor upward, minus R_BA from A downward.\n- Step 2: Taking downward as positive: 300g - R_floor - R_BA = (190+110) × 1.8 → 300g - R_floor - 880 = 300 × 1.8 = 540\n- Step 3: R_floor = 300g - 880 - 540 = 2940 - 1420 = 1520 N upward", "source": "MiniMax ①", "_id": "minimax_1_85", "judge_pick": false}, {"question": "A lorry of mass m tows a trailer of mass 3m. Driving force is 50000 N, lorry resistance 4000 N, trailer resistance 10000 N, acceleration 5 m s⁻². Find m. (3 steps)", "answer": "- Step 1: Total mass = m + 3m = 4m. Total resistance = 4000 + 10000 = 14000 N. Net force = 50000 - 14000 = 36000 N\n- Step 2: Using F = ma: 36000 = 4m × 5 = 20m → m = 1800 kg\n- Step 3: Trailer mass = 3m = 5400 kg", "source": "MiniMax ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "In the previous question, find the tension in the tow-bar. (2 steps)", "answer": "- Step 1: Consider the trailer: T - 10000 = 5400 × 5 = 27000 N\n- Step 2: T = 37000 N = 37 kN", "source": "MiniMax ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "What would happen in a pulley system if the string were extensible (elastic)? (1 step)", "answer": "If the string were elastic, the two particles could have different accelerations (the string would stretch, storing energy). The assumption of inextensibility ensures both particles have the same acceleration.", "source": "MiniMax ①", "_id": "minimax_1_88", "judge_pick": true}], "count": 89}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "State Newton's first law of motion and explain what it implies about the relationship between balanced forces and motion. (2 steps)", "answer": "- Step 1: Newton's first law states that an object at rest will stay at rest, and an object moving with constant velocity will continue to move with constant velocity, unless an unbalanced (resultant) force acts on the object.\n- Step 2: This law implies that when all forces acting on an object are balanced (resultant force = 0), the object is in equilibrium—it will not accelerate. This means constant velocity (including rest) requires no net force.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "When a particle is stationary on a horizontal plane, what can you say about the normal reaction force acting on it? Explain using equilibrium principles. (2 steps)", "answer": "- Step 1: When a particle is stationary on a horizontal plane, it is in equilibrium. This means the resultant force in any direction must be zero.\n- Step 2: Vertically, the weight W = mg acts downward and the normal reaction R acts upward. Since there is no vertical acceleration, these forces balance: R - mg = 0, so R = mg. The normal reaction equals the weight.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Explain what is meant by \"resolving forces\" in a given direction, and why is this technique useful? (2 steps)", "answer": "- Step 1: Resolving forces means breaking a force into components along a specified direction (typically horizontal or vertical). The direction you resolve in becomes the positive direction—you add forces acting in this direction and subtract forces acting in the opposite direction.\n- Step 2: This technique is useful because it allows you to find the resultant force in any direction by considering only the components along that direction, which is essential for applying Newton's second law in specific directions.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A particle has forces 20 N to the right and 20 N to the left acting on it, plus 30 N upward and 10 N downward. Describe the motion of this particle. (3 steps)", "answer": "- Step 1: Resolve horizontally: 20 - 20 = 0 N. The horizontal forces are balanced.\n- Step 2: Resolve vertically: 30 - 10 = 20 N upward. There is a resultant upward force of 20 N.\n- Step 3: Since there is an unbalanced upward force, the particle will accelerate upward (not move at constant velocity). The acceleration direction is upward.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A satellite orbits the Earth at constant speed. Is there a resultant force acting on it? Explain with reference to Newton's first law. (2 steps)", "answer": "- Step 1: Although the satellite moves at constant speed, it is continuously changing direction as it orbits (circular motion). This means its velocity vector is changing.\n- Step 2: Since there is a change in velocity (specifically, direction), there must be a resultant force. This is the gravitational force providing the centripetal acceleration. The common misconception that \"constant speed means no force\" only applies to straight-line motion.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What does it mean for a force to be written in i-j notation, and how do you find the resultant of multiple forces given in this form? (2 steps)", "answer": "- Step 1: In i-j notation, i represents the unit vector in the horizontal direction (usually east or positive x), and j represents the unit vector in the vertical direction (usually north or positive y). A force like (3i + 4j) N has a 3 N horizontal component and a 4 N vertical component.\n- Step 2: To find the resultant of multiple forces, you add the i-components together and the j-components separately. For forces (p₁i + q₁j), (p₂i + q₂j), etc., the resultant is ((p₁ + p₂ + ...)i + (q₁ + q₂ + ...)j).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "The forces (2i + 3j) N, (4i - j) N, (-3i + 2j) N, and (ai + bj) N act on an object in equilibrium. Find the values of a and b. (3 steps)", "answer": "- Step 1: For equilibrium, the resultant force must be zero: (2 + 4 - 3 + a)i + (3 - 1 + 2 + b)j = 0i + 0j\n- Step 2: This gives two equations: (3 + a) = 0 and (4 + b) = 0\n- Step 3: Solving: a = -3 and b = -4. The missing force (-3i - 4j) N exactly cancels the other three forces.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "How do you find the magnitude and bearing of a force given in i-j notation? (3 steps)", "answer": "- Step 1: For a force (pi + qj) N, the magnitude is found using Pythagoras: |F| = √(p² + q²)\n- Step 2: To find the angle with the horizontal (i direction), use tan θ = |q/p|, giving θ = arctan(|q/p|)\n- Step 3: Bearings are measured clockwise from north. If the force is in the first quadrant (positive i and j), the bearing = 90° - θ. More generally, you draw a diagram and measure clockwise from north.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Three forces act on a particle: (2i + j) N, (3i - 2j) N, and (-i + 4j) N. The particle starts from rest. Find the resultant force, describe the subsequent motion, and find the magnitude and bearing of this resultant. (4 steps)", "answer": "- Step 1: Add the i-components: 2 + 3 + (-1) = 4. Add the j-components: 1 + (-2) + 4 = 3. Resultant R = (4i + 3j) N.\n- Step 2: Magnitude |R| = √(4² + 3²) = √25 = 5 N\n- Step 3: tan θ = 3/4, so θ = 36.9°. Bearing = 90° - 36.9° = 053.1°\n- Step 4: Since there is a resultant force and the particle starts from rest, it will accelerate in the direction of the resultant (bearing 053.1°). This is not constant velocity motion.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "State Newton's second law of motion in both words and equation form, and explain what each symbol represents. (2 steps)", "answer": "- Step 1: Newton's second law states that the force needed to accelerate a particle is equal to the product of the mass of the particle and the acceleration produced. The equation is F = ma, where F is the resultant force in newtons (N), m is the mass in kilograms (kg), and a is the acceleration in meters per second squared (m s⁻²).\n- Step 2: This means 1 N of force will accelerate 1 kg of mass at 1 m s⁻². The direction of F is always the same as the direction of a.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A particle of mass 1.5 kg is acted on by a resultant force of 6 N. Find the acceleration. (2 steps)", "answer": "- Step 1: Apply Newton's second law: F = ma\n- Step 2: Substitute: 6 = 1.5 × a, so a = 6/1.5 = 4 m s⁻². The particle accelerates at 4 m s⁻² in the direction of the force.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Define weight and explain how it relates to mass. How do you calculate weight using F = ma? (2 steps)", "answer": "- Step 1: Weight is the force due to gravity acting on an object. It acts vertically downward toward the Earth's center. Weight is a force (measured in newtons), while mass is a scalar property of matter (measured in kilograms).\n- Step 2: Using F = ma with a = g (acceleration due to gravity, approximately 9.8 m s⁻²), the weight W = mg. For example, a 4 kg object has weight W = 4 × 9.8 = 39.2 N.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "An astronaut weighs 735 N on Earth. Given that g = 9.8 m s⁻² on Earth, calculate the astronaut's mass. If the same astronaut weighs 120 N on the moon, what is the acceleration due to gravity on the moon? (3 steps)", "answer": "- Step 1: On Earth, W = mg, so 735 = m × 9.8, giving m = 75 kg.\n- Step 2: On the moon, the same mass applies: 120 = 75 × g_moon\n- Step 3: Solving: g_moon = 120/75 = 1.6 m s⁻². The moon's gravity is about 1/6th of Earth's.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A body of mass 5 kg is pulled along a rough horizontal table by a 20 N horizontal force against a 4 N friction force. The body starts from rest. Find: (a) the acceleration, (b) the distance traveled in 4 seconds, (c) the normal reaction. (4 steps)", "answer": "- Step 1: (a) Resolve horizontally: Resultant force = 20 - 4 = 16 N. Using F = ma: 16 = 5a, so a = 3.2 m s⁻².\n- Step 2: (b) Using s = ut + ½at² with u = 0, t = 4: s = 0 + ½ × 3.2 × 16 = 25.6 m.\n- Step 3: (c) Resolve vertically: R - mg = 5 × 0 = 0 (no vertical acceleration), so R = 5 × 9.8 = 49 N.\n- Step 4: The normal reaction equals the weight because there is no vertical acceleration, confirming R = mg.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Why is the normal reaction on a horizontal surface typically equal to the weight of the object? Under what conditions might this not be true? (2 steps)", "answer": "- Step 1: On a horizontal surface with no vertical acceleration, the vertical forces must balance: R - mg = 0, so R = mg. The normal reaction equals the weight.\n- Step 2: This is NOT true when: (1) There is vertical acceleration (e.g., in an accelerating lift), (2) Additional vertical forces act (e.g., someone pushes down on the object), or (3) The surface is inclined.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": true}, {"question": "A lift of mass 500 kg carries passengers of total mass 300 kg. The lift accelerates from rest to 3 m s⁻¹ over a distance of 5 m. Find: (a) the acceleration, (b) the tension when moving downward, (c) the tension when moving upward. (4 steps)", "answer": "- Step 1: (a) Using v² = u² + 2as: 3² = 0 + 2a(5), so 9 = 10a, a = 0.9 m s⁻² (downward is positi
