weight, and nothing would accelerate.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "Why is the acceleration in a pulley system always LESS than $$g$$ (for non-zero tension)? (3 steps)", "answer": "- Step 1: For the heavier particle descending, the equation is $$Mg - T = Ma$$, giving $$a = g - T/M$$.\n- Step 2: Since tension $$T > 0$$ (string is taut), the term $$T/M > 0$$, so $$a < g$$.\n- Step 3: Physically: if there were no string (free fall), $$a = g$$. The string provides resistance (tension) that slows the descent; some of gravity is \"diverted\" to accelerate the other particle. Therefore the coupled system always accelerates less than free fall.\n\nLimiting case: if the other particle's mass → 0, the tension → 0, and $$a \\to g$$ (no restraint).", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "If a lift cable tension equals the total weight inside (lift + passengers), what can be said about the motion of the lift? (3 steps)", "answer": "- Step 1: Net vertical force on the lift = Tension (up) − Weight (down) = 0.\n- Step 2: By $$F = ma$$, acceleration $$a = 0$$.\n- Step 3: Zero acceleration means constant velocity — which includes two cases: (a) the lift is at rest, or (b) the lift is moving with constant velocity (up or down).\n\nThe tension equalling weight is the defining condition for no acceleration, NOT for being stationary.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "A horizontal force of 10 N acts on a 3 kg particle on a ROUGH horizontal plane, producing an acceleration of 2 m/s². Conceptually find the frictional force. (3 steps)", "answer": "- Step 1: Net horizontal force = $$10 - F_{\\text{friction}}$$ (friction opposes motion).\n- Step 2: By $$F = ma$$: $$10 - F = 3 \\times 2 = 6$$.\n- Step 3: Solve: $$F = 10 - 6 = 4\\,\\text{N}$$.\n\nInsight: the applied force does two things — one part accelerates the mass (6 N worth), the other part overcomes friction (4 N worth). If there were no friction, all 10 N would go into acceleration, giving $$a \\approx 3.33\\,\\text{m/s}^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "A train (6400 kg) pushes a carriage (1600 kg) via a light rod (shunt). Engine drives with 12000 N forward; resistances are $$R\\,\\text{N}$$ on train, 2000 N on carriage. System accelerates at 0.5 m/s². Explain how to find $$R$$ and the rod's state (tension/thrust). (5 steps)", "answer": "- Step 1: Whole-system: total mass = 8000 kg. External forces: 12000 N forward, $$R + 2000$$ backward.\n- Step 2: Equation: $$12000 - R - 2000 = 8000 \\times 0.5 = 4000$$, giving $$R = 6000\\,\\text{N}$$.\n- Step 3: For the carriage alone: forward = thrust from rod (call it $$T$$), backward = 2000 N resistance. $$T - 2000 = 1600 \\times 0.5 = 800 \\Rightarrow T = 2800\\,\\text{N}$$.\n- Step 4: In this setup (train pushes carriage), the rod is being compressed between them — it's in THRUST, not tension. The 2800 N represents the rod's thrust.\n- Step 5: Check on train: $$12000 - 6000 - 2800 = 3200 = 6400 \\times 0.5$$. ✓\n\nWhen a vehicle PUSHES another, the connecting rod is in thrust. When it PULLS, the rod is in tension.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "In a lift descending at constant velocity, how does the force a person feels on their feet compare with their normal weight? (3 steps)", "answer": "- Step 1: Constant velocity = zero acceleration.\n- Step 2: On the person: forces are weight $$mg$$ down and normal reaction $$N$$ up. Equation: $$N - mg = m \\times 0 = 0$$, giving $$N = mg$$.\n- Step 3: The person feels exactly their normal weight — no sensation of heavier or lighter. This is why lifts \"feel normal\" when moving at constant speed; you only feel something during acceleration or deceleration phases.\n\nWhy: the \"feeling of weight\" is really the normal reaction, which equals the weight only when there's no vertical acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "When solving a problem with multiple forces in 2D, why is it usually better to split into i- and j-components rather than using magnitudes and angles? (3 steps)", "answer": "- Step 1: Components obey linear addition: $$\\sum F_x = \\sum (F_i)_x$$ — just add numbers.\n- Step 2: Magnitudes do NOT simply add: $$|F_1 + F_2| \\neq |F_1| + |F_2|$$ in general (only if they're parallel).\n- Step 3: By splitting into components, complex 2D problems become two independent 1D problems on perpendicular axes. Once you have the component resultants, you can always reconstruct magnitude and direction via Pythagoras and $$\\tan$$ if needed.\n\nComponent arithmetic is the workhorse of 2D force and kinematics problems.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "A 2 kg sled initially at rest is acted on by $$(2\\mathbf{i} + 4\\mathbf{j})\\,\\text{N}$$ for 3 seconds. Conceptually find the magnitude of acceleration and distance traveled. (4 steps)", "answer": "- Step 1: Apply $$\\mathbf{F} = m\\mathbf{a}$$: $$\\mathbf{a} = \\mathbf{F}/m = (1\\mathbf{i} + 2\\mathbf{j})\\,\\text{m/s}^2$$.\n- Step 2: Magnitude: $$|\\mathbf{a}| = \\sqrt{1^2 + 2^2} = \\sqrt{5}\\,\\text{m/s}^2$$.\n- Step 3: From rest, distance $$s = \\frac{1}{2}|\\mathbf{a}|t^2 = \\frac{1}{2} \\times \\sqrt{5} \\times 9 = \\frac{9\\sqrt{5}}{2}\\,\\text{m}$$.\n- Step 4: The motion is along the direction of the acceleration (since starting from rest) — so this is the straight-line distance traveled.\n\nExact-form answer in surd form is common when values aren't \"nice.\"", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Why does a car moving at constant velocity on a horizontal road require the driving force to EXACTLY balance the resistances? (3 steps)", "answer": "- Step 1: Constant velocity = zero acceleration. By Newton's first law, this requires zero resultant force.\n- Step 2: Horizontally: driving force forward = resistances backward. Otherwise there'd be a net horizontal force and acceleration.\n- Step 3: Vertically: normal reaction balances weight. Driving force and resistance are horizontal, so they don't affect vertical balance.\n\nInsight: this is why a moving car still needs fuel at steady speed — the engine's job isn't to maintain velocity (Newton's first law does that for free!) but to COMPENSATE for resistances (rolling friction, air drag). Without resistances, a moving car would coast forever.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "In an equilibrium problem, three force components along a direction sum to $$a + (-2a) + 3 = 0$$. What structural insight lets you write this equation? (3 steps)", "answer": "- Step 1: Equilibrium in a given direction means the ALGEBRAIC sum of the force components along that direction is zero.\n- Step 2: Each force contributes either positively (along the direction) or negatively (against it). The sum equals zero at equilibrium — no net component in that direction.\n- Step 3: This gives a scalar equation per direction. If you resolve along two perpendicular directions, you get two independent equations — enough to solve for two unknowns.\n\nEquilibrium is thus a condition that generates a system of equations from a vector condition.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Why might you solve a dynamics problem by computing acceleration first (via kinematics) and then using $$F = ma$$ to find a force? (3 steps)", "answer": "- Step 1: Many problems give you kinematic data (initial speed, final speed, distance, time) but ask for a force.\n- Step 2: First use SUVAT to extract acceleration from the kinematic data (e.g., $$v^2 = u^2 + 2as$$ gives $$a$$ from $$u$$, $$v$$, $$s$$).\n- Step 3: Then apply $$F = ma$$ to find the required force, given the mass.\n\nPattern: kinematics → acceleration → dynamics → force. This reverses the more common \"dynamics → acceleration → kinematics → motion\" workflow. Problem-solving flexibility requires recognising which direction to go.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "In a pulley problem, why are the speeds of the two particles always equal in magnitude (even after several phases)? (3 steps)", "answer": "- Step 1: While the string is taut, both particles must move with the same magnitude of velocity (from inextensibility — same displacement means same speed).\n- Step 2: When the string is slack, each particle moves independently — speeds can differ.\n- Step 3: If the string re-becomes taut, an impulsive tension instantly re-equalizes the speeds along the string's direction (often modeled as a \"jerk\" or discontinuity in velocity).\n\nSo the equality of speeds is GUARANTEED whenever the string is taut and inextensible. If string goes slack, the constraint is temporarily released.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "A scale pan of mass 0 kg supports masses A (0.4 kg) on top of B (0.6 kg). The string attached to the pan pulls it up with acceleration 0.5 m/s². Outline how to find the force A exerts on B. (4 steps)", "answer": "- Step 1: Isolate the top mass A. Forces on A: weight $$0.4g$$ down, reaction $$R$$ from B up. Equation (up positive, acceleration 0.5 up): $$R - 0.4g = 0.4 \\times 0.5 \\Rightarrow R = 0.4(g + 0.5) \\approx 4.12\\,\\text{N}$$.\n- Step 2: By Newton's third law, A exerts a force on B equal in magnitude, opposite in direction — so A pushes DOWN on B with $$\\approx 4.1\\,\\text{N}$$.\n- Step 3: Note: this is MORE than A's static weight ($$0.4g = 3.92\\,\\text{N}$$), because B must not only support A's weight but also accelerate A upward.\n- Step 4: Newton 3 gives the switch: \"what B exerts on A\" is the internal reaction force $$R$$; \"what A exerts on B\" is its Newton-3 partner, same magnitude, opposite direction.\n\nKey move: isolate ONE body (usually the top), find the contact force, then use Newton 3 to flip direction.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "What is the \"thrust\" or \"compression\" in a tow-bar, and how does its value relate to the relative accelerations and resistances of the car and trailer?", "answer": "Thrust in a tow-bar arises when the bar is compressed (pushed inward at both ends) — typically during deceleration where the trailer \"pushes forward\" into the car. To find it, isolate the trailer: the net backward force on the trailer is the thrust (pushing it backward) plus its own resistance. Equation of motion for the trailer (backward positive, since it's decelerating): $$\\text{thrust} + \\text{resistance} = m_{\\text{trailer}} \\times |\\text{deceleration}|$$. So thrust = $$m_{\\text{trailer}} \\cdot |a| - \\text{resistance}$$. If resistance alone is already enough to decelerate the trailer at the given rate, thrust = 0. If less, the tow-bar must push the trailer back (thrust > 0).", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "Why are \"action\" and \"reaction\" sometimes confused with \"balanced forces\"? What's the critical distinction? (3 steps)", "answer": "- Step 1: Balanced forces act on the SAME body and cancel each other's effect, leading to equilibrium. Example: weight of a book (from Earth) and normal reaction (from table) — both act on the book.\n- Step 2: Newton-3 action-reaction pairs act on DIFFERENT bodies. Example: table pushes book up (on book); book pushes table down (on table). These are a Newton-3 pair, but they do NOT cancel each other's motion effect because they're on separate bodies.\n- Step 3: The defining question: \"Do these two forces act on the same object?\"\n+ Yes → balanced forces (contribute to equilibrium of that object).\n+ No → Newton-3 pair (each contributes to its own object's motion).\n\nIf action-reaction truly cancelled motion, nothing could ever accelerate — but they act on different objects, so each \"unbalanced\" force drives the motion of its own body.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "A particle in 2D experiences three forces $$\\mathbf{F}_1 = \\binom{3}{-1}\\,\\text{N}$$, $$\\mathbf{F}_2 = \\binom{2}{-5}\\,\\text{N}$$, $$\\mathbf{F}_3 = \\binom{-1}{0}\\,\\text{N}$$, with mass 8 kg. Conceptually find its acceleration and how long it takes to travel 20 m from rest. (4 steps)", "answer": "- Step 1: Resultant force: $$\\binom{3+2-1}{-1-5+0} = \\binom{4}{-6}\\,\\text{N}$$.\n- Step 2: Acceleration: $$\\mathbf{a} = \\mathbf{F}/m = \\binom{0.5}{-0.75}\\,\\text{m/s}^2$$.\n- Step 3: Magnitude: $$|\\mathbf{a}| = \\sqrt{0.5^2 + 0.75^2} = \\sqrt{0.8125} \\approx 0.9\\,\\text{m/s}^2$$.\n- Step 4: From rest, distance traveled: $$s = \\frac{1}{2}|\\mathbf{a}|t^2$$, so $$t = \\sqrt{\\frac{2s}{|\\mathbf{a}|}} = \\sqrt{\\frac{40}{0.9}} \\approx 6.67\\,\\text{s}$$.\n\nPattern: vector sum → vector acceleration → magnitude → kinematics. Direction of motion is along the direction of $$\\mathbf{a}$$ (from rest).", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": false}, {"question": "What key qualitative conclusion can you draw from the fact that in $$F = ma$$, $$F$$ and $$a$$ are vectors while $$m$$ is a positive scalar? (3 steps)", "answer": "- Step 1: Multiplying a vector ($$\\mathbf{a}$$) by a positive scalar ($$m$$) yields a vector in the same direction but with magnitude scaled.\n- Step 2: So $$\\mathbf{F}$$ and $$\\mathbf{a}$$ point in the SAME direction, always. Force and the resulting acceleration are parallel.\n- Step 3: Consequence: to accelerate a particle in a certain direction, you must apply a net force in that direction. The particle \"obeys\" the net force direction-wise; mass only controls the magnitude of response (more mass = less acceleration for the same force).\n\nThis explains why \"pulling on something pulls it toward you\" — simple as it sounds, this is Newton's second law at work.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": false}, {"question": "In a connected-particle problem with a hanging particle $$A$$ (above) and $$B$$ (below), connected by a light string, and a force $$F$$ pulling $$A$$ upward, explain why $$A$$ and $$B$$ accelerate together. (3 steps)", "answer": "- Step 1: The string is light and inextensible, so its length is fixed and tension is transmitted through. If $$A$$ moves up by some distance, $$B$$ must move up by the same distance (they're rigidly connected via the string).\n- Step 2: Same displacement in the same time means same velocity and same acceleration — both in magnitude and direction.\n- Step 3: So treating the system as a single particle of mass $$m_A + m_B$$ with total external force $$F - (m_A + m_B)g$$ upward works: acceleration is $$a = \\frac{F - (m_A + m_B)g}{m_A + m_B}$$.\n\nThe string's role: ensuring kinematic connection. Its tension emerges as an internal force that equalizes the acceleration of both particles.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "What must happen if the \"F\" in \"F=ma\" turns out to have a magnitude of zero despite individual forces being present?", "answer": "The resultant force being zero means the individual forces BALANCE — they cancel each other out vectorally. By Newton's first law (a special case of $$F = ma$$ with $$a = 0$$), the particle either remains at rest or continues to move with constant velocity. There is no acceleration. This is equilibrium: the particle's motion state is preserved. Zero $$F$$ does NOT mean zero forces exist; it means their vector sum is zero. A tightrope walker in mid-air has tension, gravity, and normal forces, yet can be in equilibrium if they all balance.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": true}], "count": 82}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 21106, "out_tokens": 17361, "reasoning_chars": 37534, "cost_eur": 0.0763, "elapsed_s": 296, "content_chars": 28083}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 21106, "out_tokens": 18029, "reasoning_chars": 37355, "cost_eur": 0.0784, "elapsed_s": 520, "content_chars": 29430}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 21106, "out_tokens": 11791, "reasoning_chars": 23205, "cost_eur": 0.0584, "elapsed_s": 508, "content_chars": 21510}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 19319, "out_tokens": 12454, "reasoning_chars": 1836, "cost_eur": 0.0162, "elapsed_s": 118, "content_chars": 36026}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 19319, "out_tokens": 10669, "reasoning_chars": 3130, "cost_eur": 0.0144, "elapsed_s": 106, "content_chars": 31487}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 31384, "out_tokens": 54089, "reasoning_chars": 0, "cost_eur": 4.1652, "elapsed_s": 722, "content_chars": 77337}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 21851, "out_tokens": 5168, "reasoning_chars": 6621, "cost_eur": 0.0097, "elapsed_s": 81, "content_chars": 14229}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 21851, "out_tokens": 4760, "reasoning_chars": 5283, "cost_eur": 0.0093, "elapsed_s": 74, "content_chars": 12567}}};
const SK='m1_ch4';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
