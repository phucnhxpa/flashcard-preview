ve for this calculation).\n- Step 2: Total mass = 800 kg. When moving downward with acceleration 0.9 m s⁻²: 800g - T = 800 × 0.9, so T = 800(g - 0.9) = 800 × 8.9 = 7120 N.\n- Step 3: When moving upward with the same acceleration: T - 800g = 800 × 0.9, so T = 800(g + 0.9) = 800 × 10.7 = 8560 N.\n- Step 4: Tension is greater when lifting upward because the cable must support weight plus provide additional upward force for acceleration.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A resultant force (3i + 8j) N acts on a 0.5 kg particle. Find the acceleration vector, magnitude, and bearing. (4 steps)", "answer": "- Step 1: Using F = ma in vector form: (3i + 8j) = 0.5 × a, so a = (6i + 16j) m s⁻².\n- Step 2: Magnitude: |a| = √(6² + 16²) = √(36 + 256) = √292 = 2√73 ≈ 17.1 m s⁻².\n- Step 3: Angle with horizontal: tan θ = 16/6 = 8/3, so θ = arctan(8/3) = 69.4°.\n- Step 4: Bearing (clockwise from north): 90° - 69.4° = 020.6°. The particle accelerates northeast.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Forces F₁ = (2i + 4j) N, F₂ = (-5i + 4j) N, and F₃ = (6i - 5j) N act on a 3 kg particle. Find the acceleration. (3 steps)", "answer": "- Step 1: Find the resultant force: R = F₁ + F₂ + F₃ = (2 - 5 + 6)i + (4 + 4 - 5)j = (3i + 3j) N.\n- Step 2: Apply F = ma: (3i + 3j) = 3a, so a = (i + j) m s⁻².\n- Step 3: The acceleration has equal components in both i and j directions (45° or bearing 045°), with magnitude √2 ≈ 1.41 m s⁻².", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A boat of mass 60 kg is acted on by forces F₁ = (80, 50) N, F₂ = (10p, 20q) N, and F₃ = (-75, 100) N. Given the boat accelerates at (0.8, -1.5) m s⁻², find p and q. (3 steps)", "answer": "- Step 1: Resultant = F₁ + F₂ + F₃ = (80 + 10p - 75, 50 + 20q + 100) = (5 + 10p, 150 + 20q) N.\n- Step 2: Using F = ma: (5 + 10p, 150 + 20q) = 60 × (0.8, -1.5) = (48, -90).\n- Step 3: Solving: 5 + 10p = 48 → p = 4.3; 150 + 20q = -90 → q = -12.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Why can't you treat a pulley system as a single particle when applying Newton's second law? (2 steps)", "answer": "- Step 1: In pulley problems, the connected particles move in different directions—one goes up while the other goes down. Since they have accelerations in different directions, they cannot be treated as a single particle moving as one unit.\n- Step 2: However, for particles connected by a light inextensible string, the magnitude of acceleration is the same for both particles (though directions differ), and the tension in the string is the same on both sides (for a smooth, light pulley).", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "State Newton's third law of motion. If body A exerts a force of 10 N on body B, what force does B exert on A? (2 steps)", "answer": "- Step 1: Newton's third law states that for every action there is an equal and opposite reaction. When two bodies are in contact, if body A exerts a force on body B, then body B exerts a force on A that is equal in magnitude and opposite in direction.\n- Step 2: If A exerts 10 N on B, then B exerts 10 N on A (in the opposite direction). These forces act on different bodies, so they do not cancel each other.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Two particles P (5 kg) and Q (3 kg) are connected by a light inextensible string. P is pulled by 40 N, with friction 10 N on P and 6 N on Q. Find: (a) acceleration, (b) tension in string. (3 steps)", "answer": "- Step 1: (a) Treat as single system: 40 - 10 - 6 = 8a, so a = 24/8 = 3 m s⁻².\n- Step 2: (b) For P: 40 - T - 10 = 5 × 3, so 30 - T = 15, giving T = 15 N.\n- Step 3: Check with Q: T - 6 = 3 × 3 gives 9 = 9 (consistent). The string being \"light\" means we ignore its mass, and \"inextensible\" means both particles have the same acceleration.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain how the modeling assumptions of a string being \"light\" and \"inextensible\" are used in connected particle problems. (2 steps)", "answer": "- Step 1: \"Light\" means the string has negligible mass, so the tension is the same throughout its entire length (no mass to accelerate).\n- Step 2: \"Inextensible\" means the string doesn't stretch, so both particles attached to it have the same magnitude of acceleration (if they move in a straight line). This allows you to relate their motions and form simultaneous equations.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A light scale-pan carries two masses: A (0.4 kg) on top of B (0.6 kg). The system is raised with acceleration 0.5 m s⁻². Find: (a) tension in string, (b) force exerted on B by A, (c) force exerted on B by the scale-pan. (4 steps)", "answer": "- Step 1: (a) For whole system: T - 0.4g - 0.6g = (0.4 + 0.6) × 0.5, so T - g = 0.5, T = g + 0.5 = 9.8 + 0.5 = 10.3 N ≈ 10 N.\n- Step 2: (b) For A: R - 0.4g = 0.4 × 0.5, so R = 0.4(g + 0.5) = 4.12 N. This is the force on A from B (upward). By Newton's 3rd law, B experiences 4.12 N downward from A.\n- Step 3: For scale-pan: It has mass 0, so all forces on it balance. The force from B on scale-pan = T = 10.3 N upward.\n- Step 4: By Newton's 3rd law, the force on B from the scale-pan is 10.3 N upward (equal and opposite to the force on the scale-pan from B).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Two particles P (8 kg) and Q (2 kg) on a smooth horizontal plane are connected by a string. A force F is applied to P away from Q, producing acceleration 0.4 m s⁻². Find F and the tension. (3 steps)", "answer": "- Step 1: Treat as system: F = (8 + 2) × 0.4 = 10 × 0.4 = 4 N.\n- Step 2: For Q: T = 2 × 0.4 = 0.8 N.\n- Step 3: Check with P: F - T = 8 × 0.4 → 4 - 0.8 = 3.2 (not quite right—let's recalculate). Actually, F - T = 8a gives 4 - T = 3.2, so T = 0.8 N. ✓", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Particles A (10 kg) and B (5 kg) are connected by a string, with B hanging below A. A force of 180 N is applied to A upward. Find: (a) acceleration, (b) tension in string. (3 steps)", "answer": "- Step 1: For the system: 180 - (10 + 5)g = 15a (taking upward as positive). So 180 - 147 = 15a, giving 33 = 15a, a = 2.2 m s⁻² upward.\n- Step 2: For B: T - 5g = 5a, so T = 5(g + a) = 5(9.8 + 2.2) = 5 × 12 = 60 N.\n- Step 3: Alternatively, for A: 180 - T - 10g = 10a gives 180 - T - 98 = 22, so T = 60 N. ✓", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A lorry tows a trailer. The lorry mass is m kg, trailer is 3m kg. Driving force is 50000 N, acceleration is 5 m s⁻². Resistances are 4000 N (lorry) and 10000 N (trailer). Find: (a) mass of lorry and trailer, (b) tension in tow-bar. (4 steps)", "answer": "- Step 1: Total mass = m + 3m = 4m. Net force = 50000 - 4000 - 10000 = 36000 N. Using F = ma: 36000 = 4m × 5 = 20m, so m = 1800 kg.\n- Step 2: Mass of lorry = 1800 kg, trailer = 3 × 1800 = 5400 kg.\n- Step 3: For trailer: T - 10000 = 5400 × 5 = 27000, so T = 37000 N.\n- Step 4: Check with lorry: 50000 - 4000 - T = 1800 × 5 = 9000 gives T = 37000 N. ✓", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Two particles of masses 2m and 3m are connected by a string over a smooth pulley. Find the acceleration, tension, and force on the pulley. (4 steps)", "answer": "- Step 1: For the heavier mass (3m): 3mg - T = 3ma (downward positive).\n- Step 2: For the lighter mass (2m): T - 2mg = 2ma (upward positive, but opposite direction).\n- Step 3: Adding: 3mg - T + T - 2mg = 3ma + 2ma gives mg = 5ma, so a = g/5 (downward for heavier mass).\n- Step 4: From T - 2mg = 2m(g/5): T = 2m(g + g/5) = 12mg/5. The force on pulley is 2T = 24mg/5 downward.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Particles A (0.4 kg) on a rough table and B (0.8 kg) hanging are connected over a pulley. Friction on A is 0.08g N. Find acceleration and time for B to fall 0.5 m. (3 steps)", "answer": "- Step 1: For A: T - 0.08g = 0.4a (rightward). For B: 0.8g - T = 0.8a (downward). Adding: 0.8g - 0.08g = 1.2a, so 0.72g = 1.2a, a = 0.6g = 5.88 m s⁻².\n- Step 2: Using s = ut + ½at² with s = 0.5, u = 0: 0.5 = ½ × 5.88 × t², so t² = 0.17, t = 0.412 s.\n- Step 3: The acceleration is constant (0.6g), so we can use standard constant acceleration formulas.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In a pulley system, particle A (on table) hits the ground. What happens to particle B (hanging), and how do you analyze its subsequent motion? (2 steps)", "answer": "- Step 1: When A hits the ground and stops, the string becomes slack (no longer taut). Particle B is now no longer constrained by the string.\n- Step 2: After this moment, B behaves as a free particle under gravity alone. It will continue moving upward (if still moving) but decelerate under gravity, reach a maximum height, then fall back down. You analyze this using the equations of motion under constant acceleration g.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why is it important that the pulley in a pulley system is \"smooth\"? What would happen if it weren't? (2 steps)", "answer": "- Step 1: A smooth pulley means there is no friction between the string and the pulley. This ensures the tension is the same on both sides of the pulley.\n- Step 2: If the pulley had friction, the tension would be different on each side, and the simple analysis using equal tensions would not apply. You'd need additional equations to account for the frictional forces in the pulley mechanism.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A car tows a trailer. Car mass = 1400 kg, trailer = 700 kg. Resistances = 630 N (car) and 280 N (trailer). Driving force = 2380 N. Find: (a) acceleration, (b) tension in tow-rope. (3 steps)", "answer": "- Step 1: (a) Total mass = 2100 kg. Net force = 2380 - 630 - 280 = 1470 N. a = 1470/2100 = 0.7 m s⁻².\n- Step 2: (b) For trailer: T - 280 = 700 × 0.7 = 490, so T = 770 N.\n- Step 3: Check with car: 2380 - 630 - T = 1400 × 0.7 = 980 gives T = 770 N. ✓", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A train engine (6400 kg) pulls a carriage (1600 kg). Driving force = 12000 N, resistances = R (engine) and 2000 N (carriage). Acceleration = 0.5 m s⁻². Find R and show tension = 2800 N. (3 steps)", "answer": "- Step 1: Total: 12000 - R - 2000 = (6400 + 1600) × 0.5 = 8000 × 0.5 = 4000. So 10000 - R = 4000, giving R = 6000 N.\n- Step 2: For carriage: T - 2000 = 1600 × 0.5 = 800, so T = 2800 N. ✓\n- Step 3: Check with engine: 12000 - 6000 - 2800 = 6400 × 0.5 = 3200 gives 3200 = 3200. ✓", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Two particles of masses km and 3m (with k < 3) are connected over a pulley. Q descends with acceleration ⅓g. Find tension and show k = 1.5. (3 steps)", "answer": "- Step 1: For Q (3m): 3mg - T = 3m × (g/3) = mg, so 3mg - T = mg, giving T = 2mg.\n- Step 2: For P (km): T - kmg = km × (g/3) = (k/3)mg. Substituting T = 2mg: 2mg - kmg = (k/3)mg.\n- Step 3: Dividing by mg: 2 - k = k/3, so 2 = k + k/3 = 4k/3, giving k = 1.5. ✓", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A 5 kg box A rests on top of 190 kg box B, inside a lift of mass 1700 kg descending with acceleration 1.8 m s⁻². Find: (a) tension in cable, (b) force on A from B, (c) force on B from floor. (4 steps)", "answer": "- Step 1: Total mass = 1700 + 190 + 5 = 1895 kg. Taking downward as positive: 1895g - T = 1895 × 1.8. T = 1895(g - 1.8) = 1895 × 8 = 15160 N.\n- Step 2: (b) For A: mg - R_AB = ma. 5g - R_AB = 5 × 1.8 = 9, so R_AB = 49 - 9 = 40 N. This is B pushing up on A. By Newton's 3rd law, A pushes down on B with 40 N.\n- Step 3: (c) For B and A together: (190 + 5)g - R_Bfloor - R_AB = 195 × 1.8. 195g - R_Bfloor - 40 = 351. R_Bfloor = 1911 - 40 - 351 = 1520 N (upward).", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A horizontal force of 10 N acts on a 3 kg particle on a rough horizontal plane, producing acceleration 2 m s⁻². Find the frictional force. (2 steps)", "answer": "- Step 1: Using F = ma: Net force = 3 × 2 = 6 N in the direction of acceleration.\n- Step 2: The applied force is 10 N, so friction must oppose motion: 10 - F_friction = 6, giving F_friction = 4 N.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A van of mass 400 kg moving at 16 m s⁻¹ has engine cut out. Resistance = 200 N. Find: (a) time to stop, (b) distance traveled. (3 steps)", "answer": "- Step 1: Using F = ma: -200 = 400a, so a = -0.5 m s⁻² (deceleration).\n- Step 2: (a) Using v = u + at: 0 = 16 - 0.5t, so t = 32 s.\n- Step 3: (b) Using v² = u² + 2as: 0 = 256 + 2(-0.5)s, so s = 256/1 = 256 m.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A sled of mass 2 kg is pulled by force (2i + 4j) N for 3 seconds from rest. Find: (a) magnitude of acceleration, (b) distance traveled (in surd form). (3 steps)", "answer": "- Step 1: Using F = ma: (2i + 4j) = 2a, so a = (i + 2j) m s⁻². Magnitude |a| = √(1² + 2²) = √5 m s⁻².\n- Step 2: The acceleration is constant, so after 3 s: v = a × t = 3(i + 2j) m s⁻¹.\n- Step 3: Distance s = ½at² = ½ × 3² × √5 = (9/2)√5 m. (Note: magnitude of s = ½|a|t² = ½ × √5 × 9 = (9/2)√5.)", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A car of mass 800 kg has speed reduced from 18 m s⁻¹ to 12 m s⁻¹ in 2.4 s by a constant retarding force F. Find: (a) the value of F, (b) the distance traveled. (3 steps)", "answer": "- Step 1: (a) First find acceleration: a = (v - u)/t = (12 - 18)/2.4 = -6/2.4 = -2.5 m s⁻². Using F = ma: F = 800 × (-2.5) = -2000 N. The retarding force magnitude is 2000 N.\n- Step 2: (b) Using s = ut + ½at²: s = 18 × 2.4 + ½ × (-2.5) × (2.4)² = 43.2 - 7.2 = 36 m.\n- Step 3: Alternatively, using s = (u + v)t/2 = (18 + 12)/2 × 2.4 = 15 × 2.4 = 36 m. ✓", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A block of mass 0.8 kg is pushed by 7 N on a rough floor. Speed increases from 2 m s⁻¹ to 4 m s⁻¹ over 4.8 m. Find: (a) acceleration, (b) frictional force. (3 steps)", "answer": "- Step 1: (a) Using v² = u² + 2as: 4² = 2² + 2a(4.8), so 16 = 4 + 9.6a, giving a = 12/9.6 = 1.25 m s⁻².\n- Step 2: Net force = ma = 0.8 × 1.25 = 1 N in direction of motion.\n- Step 3: Applied force is 7 N, so friction must oppose: 7 - F_friction = 1, giving F_friction = 6 N.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Two forces (2i + 3j) N and (pi + qj) N act on a particle. Their resultant R is parallel to (-i + 4j). Show that 4p + q + 11 = 0. (3 steps)", "answer": "- Step 1: Resultant R = (2 + p)i + (3 + q)j. Since R is parallel to (-i + 4j), we can write R = k(-i + 4j) = (-k)i + (4k)j for some k.\n- Step 2: Equating components: 2 + p = -k and 3 + q = 4k.\n- Step 3: From first: k = -(2 + p). Substitute into second: 3 + q = 4[-(2 + p)] = -8 - 4p. So q = -11 - 4p, or 4p + q + 11 = 0. ✓", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Why does a particle moving in a circle at constant speed still experience a resultant force, even though its speed is constant? (2 steps)", "answer": "- Step 1: Velocity is a vector quantity—it has both magnitude (speed) and direction. Constant speed in a circle means the direction is continuously changing.\n- Step 2: Since velocity is changing (due to changing direction), there must be acceleration (by definition). This is centripetal acceleration, directed toward the center of the circle. By Newton's second law, this requires a resultant force (centripetal force) in the same direction.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "What is the key difference between how we analyze connected particles moving in the same straight line versus particles connected by a pulley (moving in different directions)? (2 steps)", "answer": "- Step 1: For particles connected in a straight line (same direction), we can treat them as a single particle with total mass, because they all have the same acceleration magnitude and direction. This gives one equation F_total = (m_total)a.\n- Step 2: For pulley systems, particles accelerate in opposite directions. We cannot treat them as one particle. Instead, we write separate equations for each particle, eliminating the tension to find acceleration, then finding tension from either equation.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "A car accelerates at 2 m s⁻². The driving force is three times the resistance force. Show that driving force = 3600 N. (3 steps)", "answer": "- Step 1: Let resistance = R. Then driving force = 3R.\n- Step 2: Net force = 3R - R = 2R. Using F = ma: 2R = 1200 × 2 = 2400 N.\n- Step 3: So 2R = 2400, giving R = 1200 N. Therefore driving force = 3 × 1200 = 3600 N. ✓", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Explain why, when finding the normal reaction on an object on a horizontal surface, you often don't need to use F = ma vertically. When would you need to use it? (2 steps)", "answer": "- Step 1: On a horizontal surface with no vertical acceleration, vertical forces balance: R = mg. This is often stated without calculation because it's obvious from equilibrium.\n- Step 2: You need to use F = ma vertically when there IS vertical acceleration, such as: objects in accelerating lifts, objects being pushed down/upward, or when additional vertical forces are applied. In these cases, R ≠ mg.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "In a pulley system with a heavy particle descending, which particle experiences greater tension—the ascending one or the descending one? Explain using the equations of motion. (3 steps)", "answer": "- Step 1: Both particles experience the SAME tension (assuming light, smooth pulley). The tension is not \"greater\" for one particle—it's the same magnitude throughout the string.\n- Step 2: For the descending mass (heavier): 3mg - T = 3ma. For the ascending mass (lighter): T - 2mg = 2ma.\n- Step 3: Since both equations contain T and a, solving gives T = 12mg/5. The tension is the same for both ends of the string, but the net forces (and hence accelerations) differ because the weights differ.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": true}, {"question": "A particle is in equilibrium under three forces. What does this tell you about the vector sum of these forces? If two of the forces are (3i + 2j) N and (4i - j) N, what must the third force be? (2 steps)", "answer": "- Step 1: For equilibrium, the resultant force must be zero: the vector sum of all forces = 0i + 0j.\n- Step 2: If two forces are (3i + 2j) and (4i - j), their sum is (7i + j). For equilibrium, the third force must be -(7i + j) = (-7i - j) N. This exactly cancels the other two forces.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": true}, {"question": "When analyzing a system with a rough horizontal table and a hanging mass over a pulley, what are the typical forces acting on the particle on the table? (2 steps)", "answer": "- Step 1: On the table: weight (mg) downward, normal reaction (R) upward, tension from string (T) toward the pulley, and friction (F) opposing the direction of motion.\n- Step 2: The weight and normal reaction are perpendicular to the table surface and don't affect horizontal motion. The net horizontal force is T - F (if moving toward pulley), which equals ma.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A box on a rough table is connected to a hanging sphere. After the sphere descends and hits the ground, what happens to the box on the table? How do you analyze this two-stage motion? (3 steps)", "answer": "- Step 1: When the hanging mass hits the ground, the string becomes slack (T = 0). The box continues moving due to its inertia but now decelerates due to friction only.\n- Stage 1: Both connected, analyze with pulley equations. Find speed at moment of impact.\n- Stage 2: After impact, box has initial speed v₀. With friction only (no tension), find deceleration a' = -F/m. Then use kinematic equations to find how far it travels before stopping.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}], "count": 49}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is a force diagram, and why is drawing one the essential first step in any dynamics problem? (3 steps)", "answer": "- Step 1: A force diagram is a labelled sketch showing **every force** acting on an object, each drawn as an arrow whose direction represents the force's line of action and whose label represents its magnitude.\n- Step 2: It transforms a verbal description into a visual, exhaustive inventory of forces. Without it, you risk omitting a force (e.g., forgetting friction or a normal reaction) or misidentifying directions.\n- Step 3: Only after the diagram is complete can you resolve forces along a chosen axis to apply $$F = ma$$ or check for equilibrium. Skipping this step is the single most common source of errors in mechanics.\n\nTakeaway: the diagram is not decoration — it's the model.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "State Newton's first law of motion precisely, and explain what the phrase \"unbalanced force\" really means. (3 steps)", "answer": "- Step 1: Newton's first law: an object at rest stays at rest, and an object moving with constant velocity continues to move with constant velocity, unless an **unbalanced force** acts on it.\n- Step 2: \"Unbalanced\" = the vector sum of all forces is **non-zero**. If every force is cancelled by an opposite one (e.g., weight balanced by normal reaction), the net force is zero and motion does not change.\n- Step 3: The deep idea: matter has **inertia** — it resists changes in its state of motion. A force is required to *change* velocity, not to *maintain* it. This overturns the intuitive (but wrong) Aristotelian view that \"constant motion requires constant force.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "What does it mean for a particle to be \"in equilibrium\"? Why does equilibrium NOT imply the particle is at rest? (3 steps)", "answer": "- Step 1: Equilibrium means the **resultant force is zero** — all forces balance.\n- Step 2: By Newton's first law, zero resultant force means zero acceleration, so the velocity is constant.\n- Step 3: Constant velocity includes two sub-cases:\n+ The particle is at rest (velocity = 0 is a constant).\n+ The particle is moving uniformly (constant speed AND constant direction).\n\nTakeaway: equilibrium is about \"not accelerating,\" not about \"not moving.\" A truck cruising at 60 km/h on a flat road is in equilibrium just as much as a box on a shelf.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "A satellite orbits the Earth at constant speed. Explain why a resultant force still acts on it, despite its \"uniform\" motion. (3 steps)", "answer": "- Step 1: The satellite's **speed** (a scalar) is constant, but its **velocity** (a vector) changes continuously because its direction of motion changes as it curves around the Earth.\n- Step 2: Newton's first law applies to constant velocity (direction included), not just speed. A changing direction means the velocity vector is changing, which is acceleration.\n- Step 3: Therefore there IS a resultant force — Earth's gravity — which acts centripetally (toward the Earth's centre) and continuously redirects the satellite into its curved path.\n\nKey contrast: constant speed ≠ constant velocity. Any change in direction requires a resultant force.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "When you \"resolve forces\" in a chosen direction, what are you doing mathematically, and what is the sign convention? (3 steps)", "answer": "- Step 1: You pick a direction of interest (e.g., horizontal to the right, or vertical upward) and declare it the **positive direction**.\n- Step 2: Forces pointing **along** the positive direction contribute their magnitude with a **+** sign; forces pointing **opposite** contribute with a **−** sign.\n- Step 3: Mathematically this is vector addition along one axis: you project each force onto the chosen axis and sum the components. Since this chapter only uses horizontal/vertical forces, components are just the full magnitudes (no trigonometry needed yet).\n\nThe notation $$\\mathrm{R}(\\rightarrow)$$ or $$\\mathrm{R}(\\uparrow)$$ serves as a reminder of which direction you chose as positive — it prevents sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "A block of weight $$W$$ is pulled to the right by a horizontal force $$P$$ across a rough horizontal plane. List ALL forces acting on the block, with their directions, and explain what each represents. (4 steps)", "answer": "- Step 1: **Weight $$W$$** — acts vertically downward. Gravity always pulls objects toward the Earth's centre; for horizontal surfaces this is \"straight down.\"\n- Step 2: **Normal reaction $$R$$** — acts vertically upward, from the plane on the block. It exists because the plane prevents the block sinking into it (Newton's 3rd law in action).\n- Step 3: **Applied force $$P$$** — acts horizontally to the right (the direction of the pull).\n- Step 4: **Friction $$F$$** — acts horizontally to the **left**, opposing the motion (or tendency of motion). Present because the plane is described as \"rough.\"\n\nTotal: 4 forces. Two vertical ($$W$$ down, $$R$$ up), two horizontal ($$P$$ right, $$F$$ left). The word \"rough\" is the crucial trigger for friction; \"smooth\" would eliminate it.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "A particle of weight 5 N rests on a horizontal plane. State the magnitude of the normal reaction and justify why it equals the weight — and why this is NOT always the case.", "answer": "The normal reaction is $$5\\,\\text{N}$$, directed upward. The particle is at rest, so vertically the forces must balance (Newton's first law). The only vertical forces are weight (5 N down) and normal reaction $$R$$ (up), so $$R - 5 = 0 \\Rightarrow R = 5\\,\\text{N}$$. However, this equality is a coincidence of the horizontal setup — if there were an additional vertical force (e.g., a rope pulling upward, or the surface were inclined), $$R$$ would adjust accordingly. Normal reaction is not a \"set\" force equal to weight; it's whatever magnitude is required to prevent penetration of the surface, given all other vertical forces.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Describe the difference between a \"smooth\" and a \"rough\" surface, and explain how each affects the force diagram.", "answer": "A **smooth** surface has no friction — the only force between the surface and the particle is the normal reaction (perpendicular to the surface). A **rough** surface additionally exerts a friction force parallel to the surface, opposing the motion (or tendency of motion). In force diagrams, a smooth surface gives you one contact force (normal), a rough surface gives two (normal + friction). The word is a modelling keyword — always check for it before drawing the diagram.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "A particle has 20 N to the right, 20 N to the left, 30 N upward, and 10 N downward acting on it. Describe its resultant and resulting motion. (4 steps)", "answer": "- Step 1: Resolve horizontally: $$20 - 20 = 0$$. Horizontal forces are balanced.\n- Step 2: Resolve vertically: $$30 - 10 = 20\\,\\text{N}$$ upward.\n- Step 3: Resultant force is 20 N directed vertically upward.\n- Step 4: By Newton's second law, the particle **accelerates** in the direction of the resultant — so it accelerates upward. It is NOT necessarily moving upward right now; it could be momentarily at rest, or moving downward and slowing, or moving upward and speeding up.\n\nSubtlety: the resultant determines acceleration, not velocity. Never confuse the two.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why can horizontal and vertical forces be resolved independently without \"interfering\" with each other? (2 steps)", "answer": "- Step 1: Horizontal and vertical directions are **perpendicular** (orthogonal). A vector has components along each axis, and these components are independent of one another.\n- Step 2: A force purely horizontal produces no vertical effect, and vice versa. This is why we can write two separate equations (one for $$\\mathrm{R}(\\rightarrow)$$ and one for $$\\mathrm{R}(\\uparrow)$$) and solve them separately. In 2D, any vector equation reduces to two scalar equations along perpendicular axes.\n\nThis decomposition principle is the foundation for solving almost every 2D mechanics problem.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Distinguish clearly between the concepts of \"mass\" and \"weight.\" Why is this distinction essential in Newtonian mechanics? (4 steps)", "answer": "- Step 1: **Mass** is the quantity of matter in an object — a scalar, measured in kilograms (kg). It quantifies the object's inertia (resistance to acceleration).\n- Step 2: **Weight** is the gravitational FORCE acting on the object — a vector, measured in Newtons (N), directed toward the gravitating body's centre.\n- Step 3: They are related by $$W = mg$$, where $$g$$ is the local gravitational acceleration. On Earth, $$g \\approx 9.8\\,\\text{m/s}^2$$; on the Moon, $$g \\approx 1.6\\,\\text{m/s}^2$$.\n- Step 4: Consequence: mass is **invariant** (same on Earth, Moon, or in space); weight **depends on location**. An astronaut's mass is constant across missions, but their weight changes dramatically.\n\nConfusing mass with weight is one of the most common conceptual errors. Always check the units (kg vs N) and the context (is this a \"quantity\" or a \"force\"?).", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "How do you find the resultant of two forces given as vectors $$(p\\mathbf{i} + q\\mathbf{j})\\,\\text{N}$$ and $$(r\\mathbf{i} + s\\mathbf{j})\\,\\text{N}$$, and why does this rule work? (2 steps)", "answer": "- Step 1: Add component-wise: resultant = $$((p+r)\\mathbf{i} + (q+s)\\mathbf{j})\\,\\text{N}$$.\n- Step 2: Why this works: each force is a vector sum of an $$\\mathbf{i}$$-component and a $$\\mathbf{j}$$-component. Because $$\\mathbf{i}$$ and $$\\mathbf{j}$$ are perpendicular unit vectors, adding forces along each axis is independent (the i-direction can't interfere with the j-direction). So you literally add the i-parts separately from the j-parts.\n\nThis is just vector addition, expressed in component form. Graphically, it's the \"tip-to-tail\" rule for adding vectors.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Why does equilibrium of a particle under vector forces force BOTH the i-components and the j-components to sum to zero separately? (3 steps)", "answer": "- Step 1: Equilibrium means the resultant force is the zero vector: $$\\mathbf{R} = 0\\mathbf{i} + 0\\mathbf{j}$$.\n- Step 2: Two vectors are equal if and only if their corresponding components are equal. So if $$\\left(\\sum F_x\\right)\\mathbf{i} + \\left(\\sum F_y\\right)\\mathbf{j} = 0\\mathbf{i} + 0\\mathbf{j}$$, then $$\\sum F_x = 0$$ AND $$\\sum F_y = 0$$.\n- Step 3: The vector equation thus splits into two scalar equations, each solvable independently. This is extremely useful for finding multiple unknowns (typically two) in equilibrium problems.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "How do you find the magnitude and bearing of a resultant force $$4\\mathbf{i} + 3\\mathbf{j}\\,\\text{N}$$, where $$\\mathbf{i}$$ is east and $$\\mathbf{j}$$ is north? (4 steps)", "answer": "- Step 1: Magnitude via Pythagoras (components are perpendicular): $$|\\mathbf{R}| = \\sqrt{4^2 + 3^2} = \\sqrt{25} = 5\\,\\text{N}$$.\n- Step 2: The angle $$\\theta$$ with the east direction (i): $$\\tan\\theta = \\frac{\\text{north comp}}{\\text{east comp}} = \\frac{3}{4}$$, giving $$\\theta \\approx 36.9°$$.\n- Step 3: Bearings are measured **clockwise from north**. East corresponds to bearing 090°. The resultant is $$\\theta = 36.9°$$ **above** east (north of east), so the bearing is $$90° - 36.9° \\approx 053.1°$$.\n- Step 4: Always draw the vector in its correct quadrant to check that subtraction (rather than addition) of $$\\theta$$ is appropriate. Bearings are 3-digit numbers by convention (e.g., 053°, not 53°).", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "State Newton's second law of motion and write the equation, explaining each symbol. Why is $$F$$ specifically the RESULTANT force? (3 steps)", "answer": "- Step 1: Newton's second law: the force needed to accelerate a particle equals the product of its mass and its acceleration: $$F = ma$$.\n- Step 2: Symbols:\n+ $$F$$ = the **resultant** (net) force in Newtons (N) — a vector.\n+ $$m$$ = mass in kilograms (kg) — a positive scalar.\n+ $$a$$ = acceleration in $$\\text{m/s}^2$$ — a vector, **in the same direction** as $$F$$.\n- Step 3: Why \"resultant\"? Because if you used only one individual force (say, just the pulling force, ignoring friction), you'd overestimate the acceleration. It is the NET effect of all forces that determines how the particle actually accelerates — friction, gravity, normal, applied, all combined.\n\nMisconception probe: \"force causes acceleration\" must be understood as \"net force causes acceleration.\" Balanced forces give zero acceleration despite being individually non-zero.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Explain why \"1 Newton = 1 kg·m/s²\" is a DEFINITION rather than a discovery. (3 steps)", "answer": "- Step 1: Newton's second law says force is proportional to mass × acceleration. In principle, this could be $$F = k \\cdot ma$$ for some proportionality constant $$k$$.\n- Step 2: We are free to choose the unit of force such that $$k = 1$$. The SI unit \"Newton\" was defined precisely so that a force of 1 N accelerates a 1 kg mass at 1 m/s². In other words, $$1\\,\\text{N} \\equiv 1\\,\\text{kg} \\cdot \\text{m/s}^2$$.\n- Step 3: This is a clever unit choice that makes the equation of motion clean: no ugly constant appears. Units such as kilograms-force or pounds-force would force a proportionality constant to appear, making calculations clumsier.\n\nThis is an instance of physics \"cleanliness\" by definition — similar to how temperature scales are chosen.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Derive the relationship $$W = mg$$ from Newton's second law. Why is $$g$$ the same for all freely falling objects? (3 steps)", "answer": "- Step 1: Consider a body in free fall (no air resistance, no other forces). The only force acting is gravity, called its **weight** $$W$$, directed downward.\n- Step 2: Apply Newton's second law in the downward direction: resultant force = weight, acceleration = $$g$$ (empirically measured as ≈ 9.8 m/s² on Earth). So $$W = mg$$.\n- Step 3: Why the same $$g$$ regardless of mass? Because gravity exerts a force **proportional to mass** ($$W = mg$$), AND inertia (resistance to acceleration) is also proportional to mass. The two effects cancel, giving mass-independent acceleration. This is the \"equivalence principle\" — Galileo's famous observation from the Leaning Tower of Pisa.\n\nDoubling the mass doubles the gravitational force AND doubles the inertia, so the acceleration is unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "A 5 kg body is pulled horizontally by a 20 N force on a rough table with a 4 N friction force. Conceptually determine the acceleration and the normal reaction. (3 steps)", "answer": "- Step 1: **Horizontal** (direction of motion): net force = $$20 - 4 = 16\\,\\text{N}$$ forward. Apply $$F = ma$$: $$a = 16/5 = 3.2\\,\\text{m/s}^2$$ in the pulling direction.\n- Step 2: **Vertical**: the body moves horizontally only, so its vertical acceleration is zero. Forces balance vertically.\n- Step 3: Vertical forces: normal reaction $$R$$ up, weight $$mg = 5 \\times 9.8 = 49\\,\\text{N}$$ down. So $$R - 49 = 5 \\times 0 = 0$$, giving $$R = 49\\,\\text{N}$$.\n\nKey insight: separating the problem into two axes decouples \"what the body is doing horizontally\" from \"what it's doing vertically.\" Here, horizontal = accelerating; vertical = in equilibrium.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Why should you choose the direction of acceleration as the positive direction when setting up an equation of motion? (2 steps)", "answer": "- Step 1: If you pick the positive direction to match the acceleration, then $$a$$ on the right side of $$F = ma$$ is positive. Forces aiding the motion appear as positive terms; forces opposing appear as negative. This matches physical intuition cleanly.\n- Step 2: If you pick the opposite direction, $$a$$ becomes negative — mathematically valid, but you must track signs carefully and interpret the negative result correctly. Consistency within the problem matters more than which direction you picked; pick the helpful one and stick with it.\n\nGood habit: write $$\\mathrm{R}(\\rightarrow)$$ or $$\\mathrm{R}(\\uparrow)$$ at the start of every equation to signal your convention.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "A lift moves upward at constant velocity. What does this imply about the tension in the cable versus the weight of the lift? (3 steps)", "answer": "- Step 1: Constant velocity means zero acceleration — the lift is in equilibrium.\n- Step 2: Vertical forces: cable tension $$T$$ up, total weight $$W$$ down. Net vertical force = 0: $$T - W = 0$$.\n- Step 3: Therefore $$T = W$$. The tension exactly balances the weight.\n\nExtension:\n+ If the lift accelerates upward: $$T > W$$ (cable must support weight AND provide upward push).\n+ If it accelerates downward: $$T < W$$ (cable does not fully support; gravity wins partially).\n\nThe tension \"adjusts\" based on the motion state.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "When a lift accelerates upward, does a person inside feel heavier or lighter than normal? Explain using the normal reaction. (4 steps)", "answer": "- Step 1: Isolate the person (mass $$m$$). Forces on them: weight $$mg$$ downward, normal reaction $$N$$ from floor upward.\n- Step 2: Person shares lift's acceleration $$a$$ upward. Equation of motion: $$N - mg = ma$$.\n- Step 3: Therefore $$N = m(g + a) > mg$$. The floor pushes the person HARDER than just their weight — this increased normal reaction is what they physically *feel*.\n- Step 4: They feel heavier by a factor of $$\\frac{N}{mg} = 1 + \\frac{a}{g}$$.\n\nContrast cases:\n+ Lift accelerates downward: $$N = m(g - a) < mg$$ — feels lighter.\n+ Lift in free fall ($$a = g$$ down): $$N = 0$$ — weightless!\n\nThe \"feeling of weight\" is really the feeling of the normal reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "An astronaut weighs 735 N on Earth and 120 N on the Moon. Conceptually describe how to find the Moon's gravitational acceleration. (3 steps)", "answer": "- Step 1: Mass is invariant (same on Earth and Moon); weight changes with gravity. First, use Earth data to find mass: $$m = W/g = 735 / 9.8 = 75\\,\\text{kg}$$.\n- Step 2: On the Moon: $$W_{\\text{moon}} = m \\cdot g_{\\text{moon}}$$, so $$g_{\\text{moon}} = W_{\\text{moon}}/m = 120/75 = 1.6\\,\\text{m/s}^2$$.\n- Step 3: This is about $$g/6$$, matching observations — the Moon has about 1/6 of Earth's surface gravity.\n\nKey pattern: whenever gravity changes between two locations, use the invariant mass as the bridge.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "In vector form, why does $$\\mathbf{F} = m\\mathbf{a}$$ yield two independent scalar equations in 2D? (3 steps)", "answer": "- Step 1: Write the vector equation in component form: $$F_x \\mathbf{i} + F_y \\mathbf{j} = m(a_x \\mathbf{i} + a_y \\mathbf{j})$$.\n- Step 2: Equate corresponding components:\n+ i-component: $$F_x = m a_x$$.\n+ j-component: $$F_y = m a_y$$.\n- Step 3: These are two independent scalar equations — solvable separately because the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ axes are orthogonal (dynamically independent).\n\nImplication: a purely horizontal force produces NO vertical acceleration, and vice versa. Each axis lives its own dynamic life.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "A resultant force $$(3\\mathbf{i} + 8\\mathbf{j})\\,\\text{N}$$ acts on a 0.5 kg particle. Conceptually find the acceleration vector. (3 steps)", "answer": "- Step 1: Apply $$\\mathbf{F} = m\\mathbf{a}$$, so $$\\mathbf{a} = \\mathbf{F}/m$$.\n- Step 2: Divide each component by the mass (0.5 kg, equivalent to multiplying by 2):\n+ i-component: $$3 / 0.5 = 6$$.\n+ j-component: $$8 / 0.5 = 16$$.\n- Step 3: Acceleration = $$(6\\mathbf{i} + 16\\mathbf{j})\\,\\text{m/s}^2$$.\n\nConceptual note: dividing a vector by a scalar = dividing each component by that scalar. The direction is preserved (since mass > 0); only the magnitude changes.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Three vector forces act on a particle in equilibrium: $$(-3\\mathbf{i}+7\\mathbf{j})$$, $$(\\mathbf{i}-\\mathbf{j})$$, and $$(p\\mathbf{i}+q\\mathbf{j})$$. Conceptually find $$p$$ and $$q$$. (3 steps)", "answer": "- Step 1: Equilibrium ⟹ total resultant = $$\\mathbf{0}$$. So sum of all i-components = 0, and sum of all j-components = 0.\n- Step 2: i-equation: $$-3 + 1 + p = 0 \\Rightarrow p = 2$$.\n- Step 3: j-equation: $$7 - 1 + q = 0 \\Rightarrow q = -6$$.\n\nThe unknown force is $$(2\\mathbf{i} - 6\\mathbf{j})\\,\\text{N}$$ — it precisely cancels the sum of the other two.\n\nPattern: any force \"making a system equilibrium\" is the negative of the sum of all other forces.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why might the magnitude of acceleration be related to the magnitude of force via $$|F| = m|a|$$ regardless of direction? (3 steps)", "answer": "- Step 1: $$\\mathbf{F} = m\\mathbf{a}$$ is a vector equation. Taking magnitudes of both sides: $$|\\mathbf{F}| = |m\\mathbf{a}| = m|\\mathbf{a}|$$ (since $$m > 0$$).\n- Step 2: This works because the mass scales the vector uniformly — it multiplies the length without changing direction.\n- Step 3: Useful when you know the magnitude of acceleration (e.g., \"accelerates at 7 m/s²\") but not its direction. Combine all forces into a resultant vector, take its magnitude, and equate with $$m \\cdot |a|$$.\n\nThis trick dodges the need to match component-by-component when only magnitudes are given.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "State Newton's third law of motion and give a careful example that highlights the \"different bodies\" subtlety. (4 steps)", "answer": "- Step 1: Newton's third law: for every action there is an equal and opposite reaction.\n- Step 2: Interpretation: if body $$A$$ exerts a force on body $$B$$, then body $$B$$ exerts a force on body $$A$$ that is equal in magnitude and opposite in direction.\n- Step 3: Key subtlety: action-reaction pairs act on **different bodies**. This is often missed. Example:\n+ A book on a table. The book's weight (Earth pulls book down) and the normal reaction (table pushes book up) are both forces **on the book**, so they are NOT a Newton-3 pair — they're equal only because the book is in equilibrium.\n+ The Newton-3 pair of \"Earth pulls book down\" is \"book pulls Earth up\" (with the same tiny force!).\n+ The Newton-3 pair of \"table pushes book up\" is \"book pushes table down.\"\n- Step 4: Each \"contact\" between two objects produces a mutual force pair. Newton 3 is universal — it applies to ALL interactions, not just contact forces.\n\nMisconception probe: if Newton-3 always balances things, why does anything ever accelerate? Answer: because the pair acts on different bodies. The \"book pushes table down\" doesn't cancel \"table pushes book up\" on the book's motion — they're on different objects.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "When can you treat a system of connected particles as a SINGLE particle? When must you treat them separately? (4 steps)", "answer": "- Step 1: Treat as a single particle IF AND ONLY IF all parts move in the same straight line with the same velocity and acceleration.\n+ Examples: connected masses on a horizontal surface, a train with carriages, a stack of boxes in a lift.\n- Step 2: When treated as single particle, **internal forces** (string tension, rod thrust, contact forces between components) cancel in Newton-3 pairs and DISAPPEAR from the system equation. Only external forces matter.\n- Step 3: Must treat separately when:\n+ You want to find an internal force (e.g., the tension in the connecting string).\n+ The parts move in different directions (e.g., particles on opposite sides of a pulley).\n- Step 4: Typical strategy: use the \"whole-system\" view to quickly find the common acceleration (no tensions needed); then isolate one particle to expose the internal force.\n\nPower move: two equations from two particles share $$T$$ and $$a$$, solvable simultaneously; whole-system collapses this to one equation.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Explain what \"light and inextensible\" mean for a string, and why each assumption simplifies the analysis. (3 steps)", "answer": "- Step 1: **Light** = mass of the string is negligible. Consequence:\n+ Tension is the SAME throughout the string's length (no string section needs to \"support\" other sections).\n+ The string contributes no weight to the system.\n- Step 2: **Inextensible** = the string does not stretch. Consequence:\n+ If one end moves, the other end moves the same distance at the same time.\n+ Connected particles share the SAME magnitude of velocity and acceleration.\n- Step 3: Together: both ends of the string are rigidly linked with a single common tension $$T$$ — so two connected particles give two equations of motion with just ONE $$T$$ and ONE $$a$$ to solve for. Without these idealisations, you'd have different tensions at each end and potentially different accelerations — much harder.\n\nReal strings have mass and stretch, but these effects are negligible for typical physics problems.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Particles $$P$$ (5 kg) and $$Q$$ (3 kg), joined by a string on a rough horizontal plane, are pulled by a 40 N force on $$P$$. Friction on $$P$$ = 10 N, on $$Q$$ = 6 N. Why is the \"whole-system\" approach quickest to find acceleration? (4 steps)", "answer": "- Step 1: Treat as a single particle: total mass = $$5 + 3 = 8\\,\\text{kg}$$. External forces along motion: 40 N pull, 10 N friction on P, 6 N friction on Q.\n- Step 2: Tension is internal: it pulls $$P$$ backward and $$Q$$ forward with equal magnitudes (Newton 3), so it cancels out in the system equation.\n- Step 3: Equation: $$40 - 10 - 6 = 8a \\Rightarrow a = 3\\,\\text{m/s}^2$$.\n- Step 4: Alternative (separate particles): two equations, $$40 - T - 10 = 5a$$ and $$T - 6 = 3a$$. Adding eliminates $$T$$ — same result, more work.\n\nThe whole-system approach buys you the acceleration \"for free\" without touching the unknown tension.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "In the same setup (P=5 kg pulled by 40 N, friction 10 N; Q=3 kg, friction 6 N, connected), how do you find the tension? Check with both particles. (4 steps)", "answer": "- Step 1: To find tension, SPLIT the system — consider one particle in isolation. The common acceleration is known to be $$a = 3\\,\\text{m/s}^2$$.\n- Step 2: For $$P$$ alone: forward force 40 N, backward forces = friction (10 N) + tension $$T$$. Equation: $$40 - T - 10 = 5 \\times 3 \\Rightarrow T = 15\\,\\text{N}$$.\n- Step 3: For $$Q$$ alone: forward force = tension $$T$$, backward force = friction (6 N). Equation: $$T - 6 = 3 \\times 3 \\Rightarrow T = 15\\,\\text{N}$$. ✓\n- Step 4: Both agree (they must — the tension is one physical quantity). Using both is a useful self-check: if they disagree, you've made an error somewhere.\n\nPattern: whole-system → acceleration; individual particle → internal force.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "What is the difference between TENSION and THRUST in a connecting rod, and when does each arise? (4 steps)", "answer": "- Step 1: A **rod** (unlike a string) is rigid and can both push and pull.\n- Step 2: **Tension**: the rod is being stretched — pulled inward at both ends. Each particle at the ends is pulled toward the other. Arises when something tries to separate the two connected particles.\n- Step 3: **Thrust** (a.k.a. compression): the rod is being compressed — pushed inward at both ends. Each particle is pushed away from the other. Arises when something tries to push the particles together.\n- Step 4: In a tow-bar between a car and a trailer:\n+ Car accelerates → trailer \"lags\" → tow-bar in TENSION (pulls trailer forward, car backward).\n+ Car brakes → trailer \"catches up\" → tow-bar in THRUST (pushes trailer backward, car forward).\n\nStrings can only be in tension (they can't push). Rods can be in either. This distinction matters enormously in braking and collision problems.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A lift contains stacked boxes $$A$$ (on top) and $$B$$ (below), with total mass $$M$$. The lift accelerates upward. Why is the force that $$B$$ exerts on $$A$$ NOT simply the weight of $$A$$? (3 steps)", "answer": "- Step 1: If the lift were in equilibrium (constant velocity), $$A$$ would need only its weight balanced — so $$B$$ would push up on $$A$$ with force $$m_A g$$.\n- Step 2: But the lift accelerates upward. $$A$$ must ALSO share this acceleration. Isolate $$A$$: forces on it are weight $$m_A g$$ down and reaction $$R$$ from $$B$$ up. Equation: $$R - m_A g = m_A a \\Rightarrow R = m_A(g + a)$$.\n- Step 3: So $$R > m_A g$$: $$B$$ pushes $$A$$ harder than just its weight, by an extra factor that accounts for the upward acceleration. By Newton 3, $$A$$ pushes DOWN on $$B$$ with the same force $$R$$.\n\nIntuition: to accelerate $$A$$ upward, $$B$$ must provide not only weight-support but also the extra push for acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Why CAN'T a pulley system with two hanging masses be treated as a single particle, even though both are connected? (3 steps)", "answer": "- Step 1: The \"single particle\" shortcut requires all parts to move in the SAME straight line with the same velocity.\n- Step 2: In a pulley, one mass goes UP while the other goes DOWN — these are opposite directions. \"Forward\" is different for each.\n- Step 3: Summing their momenta or forces as if they were one particle would be meaningless — opposite directions would partially cancel and give a nonsensical result.\n\nSo you MUST treat each particle separately with its own equation of motion. However, the string's inextensibility guarantees both have the same MAGNITUDE of acceleration, and a smooth, light pulley guarantees the same tension — so you get two equations in two unknowns ($$T$$ and $$a$$), solvable simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "For a smooth, light pulley, why is the tension the same on both sides of the string? What would change if the pulley were rough? (3 steps)", "answer": "- Step 1: **Smooth** pulley = no friction between the pulley and the string. The string slides over the pulley without losing force to friction.\n- Step 2: **Light** pulley = negligible mass (zero rotational inertia in this simple model). The pulley doesn't require net torque to change its spin. Combined with smoothness, tension is transmitted through unchanged from one side to the other.\n- Step 3: If the pulley were rough, friction between the rope and pulley would dissipate some tension: the \"driving\" side would have higher tension than the \"receiving\" side. The difference is called the \"belt friction\" — and the two sides would have DIFFERENT tensions.\n\nIn this chapter's problems, always assume smooth pulleys — tensions on both sides are equal.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Particles $$P$$ (mass $$2m$$) and $$Q$$ (mass $$3m$$) hang from a smooth pulley via a light inextensible string. Derive their common acceleration from first principles. (5 steps)", "answer": "- Step 1: $$Q$$ is heavier, so $$Q$$ descends and $$P$$ ascends. Both have the same magnitude of acceleration $$a$$ (inextensible string). Tension $$T$$ is the same throughout (light, smooth pulley).\n- Step 2: Equation of motion for $$P$$ (upward positive): $$T - 2mg = 2ma$$. $$\\quad$$ (1)\n- Step 3: Equation of motion for $$Q$$ (downward positive for $$Q$$): $$3mg - T = 3ma$$. $$\\quad$$ (2)\n- Step 4: Add (1) and (2) to eliminate $$T$$: $$3mg - 2mg = (3m + 2m)a$$, giving $$mg = 5ma$$.\n- Step 5: Therefore $$a = \\frac{g}{5} \\approx 1.96\\,\\text{m/s}^2$$.\n\nIntuition: the system is driven by the weight DIFFERENCE ($$mg$$) and slowed by the TOTAL inertia ($$5m$$). The \"net gravity fraction\" $$1/5$$ determines the acceleration. If masses were equal, the system wouldn't accelerate.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "In the 2m/3m pulley system, what is the tension in the string once you know $$a = g/5$$, and why is it between the two weights?", "answer": "Substitute $$a = g/5$$ into the equation of motion for $$P$$ (the ascending mass): $$T - 2mg = 2m \\cdot g/5$$, giving $$T = 2mg + \\frac{2mg}{5} = \\frac{12mg}{5}$$. This is between $$2mg$$ (weight of $$P$$) and $$3mg$$ (weight of $$Q$$): it must exceed the lighter weight to lift $$P$$ upward, but fall short of the heavier weight so $$Q$$ still descends. Tension always lies between the two weights in a simple Atwood-style pulley — a useful sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why is the force exerted on a fixed pulley by the string equal to $$2T$$ (not $$T$$)? (3 steps)", "answer": "- Step 1: The string hangs over the pulley with tension $$T$$ on each side.\n- Step 2: On each side, the string pulls **downward** on the pulley (since the string goes down from the pulley's top on both sides). Both pulls have magnitude $$T$$.\n- Step 3: Total downward force on the pulley = $$T + T = 2T$$.\n\nConsequence: whatever supports the pulley (e.g., a ceiling beam) must provide an upward force of $$2T$$. For the 2m/3m example, the pulley support feels $$2 \\times \\frac{12mg}{5} = \\frac{24mg}{5}$$ downward — significantly more than either individual weight.\n\nVisual key: the pulley feels TWO string segments, each pulling it with tension $$T$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A mass on a rough table is connected via a pulley to a hanging mass. When the hanging mass hits the ground, what happens to the motion of the table mass, and WHY does the analysis change? (4 steps)", "answer": "- Step 1: Before ground contact: both masses are coupled by the string. Tension pulls the table mass forward; hanging mass's weight pulls it down. They share the same magnitude of acceleration.\n- Step 2: When the hanging mass hits the ground, it stops (usually assumed to not rebound). The string goes SLACK — tension drops to zero.\n- Step 3: The table mass, now with NO forward force (only friction backward), decelerates. New equation of motion: $$-F_{\\text{friction}} = m_{\\text{table}} \\cdot a'$$, giving $$a' < 0$$ (deceleration).\n- Step 4: The table mass continues sliding, slowing down, until friction brings it to rest. Use kinematics (e.g., $$v^2 = u^2 + 2as$$) to find how much further it slides.\n\nTwo-phase problem: Phase 1 = coupled motion; Phase 2 = deceleration under friction only. Always identify the transition event to split phases correctly.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "In a pulley-table problem where the hanging mass hits the ground and then the table mass eventually stops, how do you compute the total distance the table mass travels? (3 steps)", "answer": "- Step 1: Phase 1: table mass travels from start position to position where hanging mass hits ground. This distance equals the initial height of the hanging mass above the ground (both move the same distance due to inextensibility).\n- Step 2: Phase 2: after string goes slack, table mass decelerates under friction only. Find the speed at the transition (equal to the speed just before hanging mass hit the ground), then apply $$v^2 = u^2 + 2a's$$ with $$v = 0$$ to find additional distance $$s$$.\n- Step 3: Total distance = phase 1 distance + phase 2 distance.\n\nCritical: remember to use the CORRECT acceleration in each phase. Phase 1 has coupled acceleration; phase 2 has friction-only deceleration. Mixing them gives wrong answers.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "What does it mean for a string to be \"taut\" vs \"slack,\" and why does it matter physically?", "answer": "A **taut** string is under tension — it is straight, pulled from both ends, and transmits force. A **slack** string is loose, drooping, and carries NO tension (it cannot push). Physically, this means a slack string cannot constrain the relative motion of two connected particles — each moves independently under its own forces. After a string goes slack (e.g., one end suddenly stops), the other particle becomes \"free\" of the string's constraint. In pulley problems, this often marks the transition between phases of motion.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "In a pulley system where one mass hits the ground and then the string becomes slack, what governs the subsequent motion of the OTHER mass? (3 steps)", "answer": "- Step 1: Before: the other mass is moving (up or down) at some speed $$v$$ determined by the phase 1 motion.\n- Step 2: After the string goes slack, only gravity acts on the hanging other mass (assuming it hasn't reached a pulley or obstacle). It becomes a projectile moving under gravity alone.\n- Step 3: Apply standard free-fall kinematics: $$v$$ (initial velocity at transition) and $$a = g$$ (downward) determine its future motion — rising, decelerating, coming to rest, then falling back.\n\nOften asked: \"greatest height reached\" — use $$v^2 = u^2 - 2gs$$ with final velocity $$v = 0$$ at apex. The string might even become taut again when the mass falls back to the string's original length.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why is it valid to use SUVAT equations AFTER finding the acceleration from $$F = ma$$? (3 steps)", "answer": "- Step 1: $$F = ma$$ gives you the instantaneous acceleration from the current net force.\n- Step 2: SUVAT equations (like $$s = ut + \\frac{1}{2}at^2$$ or $$v^2 = u^2 + 2as$$) apply **when acceleration is constant**.\n- Step 3: If the forces don't change during the motion (i.e., no new forces appearing, no forces vanishing, no direction changes), the acceleration is constant — and SUVAT applies.\n\nMany problems have this structure: (1) use $$F = ma$$ to find $$a$$; (2) use SUVAT to find displacement, velocity, or time. Two-tool workflow.\n\nWatch out: if a force changes mid-problem (e.g., a string becoming slack), you have to re-solve the phase with a NEW constant acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "In modelling assumptions, why is it important to state \"the string is inextensible\" when finding the acceleration in a connected-particle problem?", "answer": "Without inextensibility, the two particles could have DIFFERENT accelerations — the string could stretch, allowing one particle to accelerate faster than the other, and you'd have two unknowns ($$a_1$$ and $$a_2$$) instead of one ($$a$$). Inextensibility enforces a kinematic constraint: both ends of the string move identically, so both particles share the same $$|a|$$. This reduces the problem to a solvable form.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "A 900 kg car pulls a 300 kg trailer via a tow-bar. Engine drives with 1200 N; resistances are 200 N (car) and 100 N (trailer). Conceptually find the acceleration and tow-bar tension. (4 steps)", "answer": "- Step 1: Whole-system: total mass = $$900 + 300 = 1200\\,\\text{kg}$$. External forces along motion: 1200 N forward, 200 N + 100 N = 300 N backward. Net = $$1200 - 300 = 900\\,\\text{N}$$.\n- Step 2: Acceleration: $$a = 900/1200 = 0.75\\,\\text{m/s}^2$$.\n- Step 3: Isolate the trailer (or the car). For trailer: only forces are tow-bar tension $$T$$ forward and 100 N resistance backward. Equation: $$T - 100 = 300 \\times 0.75 = 225 \\Rightarrow T = 325\\,\\text{N}$$.\n- Step 4: Check with car: $$1200 - T - 200 = 900 \\times 0.75 = 675 \\Rightarrow T = 1200 - 200 - 675 = 325\\,\\text{N}$$. ✓\n\nThe trailer's tow-bar tension has to do two jobs: overcome the trailer's resistance AND accelerate its mass forward.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "When a car brakes and the tow-bar transitions from tension to thrust, what has changed physically about the tow-bar's state? (3 steps)", "answer": "- Step 1: Before braking: the car accelerated forward, dragging the trailer along. The tow-bar pulled the trailer forward and the car backward — it was stretched (in tension).\n- Step 2: During braking: the car decelerates rapidly. If the trailer's own resistance is insufficient to slow it at the same rate, the trailer tends to \"push forward\" into the car. The tow-bar must now PUSH the trailer backward to share the deceleration.\n- Step 3: The tow-bar is now being compressed at both ends (car pushing back, trailer pushing forward) — this is THRUST.\n\nIn terms of math, thrust and tension have opposite signs for internal force in the equations. A negative tension in your solution means the rod is actually in thrust.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Explain the concept of \"modelling assumptions\" in mechanics problems, and why we often state assumptions explicitly.", "answer": "Modelling assumptions are idealisations that simplify reality to make the problem tractable — e.g., \"treat the car as a particle\" (no size, no rotation), \"assume the string is light and inextensible,\" \"the surface is smooth/rough,\" \"neglect air resistance.\" Each assumption is a trade-off: it sacrifices realism for mathematical simplicity. Stating them explicitly is critical because: (1) your final answer is only valid within those assumptions; (2) it prompts you to identify what is being neglected and what real-world effects might change the answer. A problem's \"correct\" answer is only correct *given* its assumptions.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Two forces $$(2\\mathbf{i} + 3\\mathbf{j})\\,\\text{N}$$ and $$(p\\mathbf{i} + q\\mathbf{j})\\,\\text{N}$$ act on a particle. Their resultant is parallel to the vector $$(-\\mathbf{i} + 4\\mathbf{j})$$. What equation relates $$p$$ and $$q$$, and why? (4 steps)", "answer": "- Step 1: The resultant is $$(2+p)\\mathbf{i} + (3+q)\\mathbf{j}$$.\n- Step 2: \"Parallel to $$-\\mathbf{i} + 4\\mathbf{j}$$\" means the resultant equals $$k(-\\mathbf{i} + 4\\mathbf{j})$$ for some scalar $$k$$ (could be positive or negative).\n- Step 3: Equate components: $$2 + p = -k$$ and $$3 + q = 4k$$.\n- Step 4: Eliminate $$k$$: from the first, $$k = -(2+p)$$. Substitute: $$3 + q = -4(2+p) = -8 - 4p$$, giving $$4p + q + 11 = 0$$.\n\nKey technique: \"parallel to a vector $$\\mathbf{v}$$\" means \"equals some scalar multiple of $$\\mathbf{v}$$\" — introduce that scalar and eliminate it.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A mass on a rough horizontal table is connected via a smooth pulley at the table's edge to a mass hanging freely. Explain why the string's direction changes at the pulley and what this implies about the tension.", "answer": "The string runs horizontally on the table (connecting the table mass to the pulley) and vertically below the pulley (to the hanging mass). At the pulley, the string's direction is redirected from horizontal to vertical. Because the pulley is smooth and the string is light, the tension remains the same magnitude on both sides — no energy is lost to friction at the pulley. The pulley's only role is to redirect the force: what pulls the table mass horizontally (toward the pulley) is the same tension that pulls the hanging mass upward. Without the pulley, the hanging mass's weight couldn't accelerate the table mass — the pulley converts vertical weight into horizontal pull.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why do we treat the weight of the lift, boxes, and passengers as acting at single points when analysing forces, despite them being extended objects? (3 steps)", "answer": "- Step 1: In A-Level mechanics, we model objects as **particles** — point-like entities with mass but no extent, no rotation.\n- Step 2: For translational motion (movement without rotation), an extended rigid body behaves exactly as if all its mass were concentrated at its centre of mass. This follows from Newton's second law applied to the body's centre of mass.\n- Step 3: So treating weight as a single force at a point is an approximation that's EXACT for translational problems, and it dramatically simplifies the analysis. In later topics (moments, rigid bodies), this approximation is partially relaxed.\n\nThis is why you draw a single arrow labelled $$W$$ at the centre of a block — that arrow captures the full gravitational effect on its translation.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "If a lift of mass 500 kg with passengers (total 300 kg) accelerates from rest to 3 m/s over 5 m while moving DOWN, what tension must the cable provide? Outline the approach. (4 steps)", "answer": "- Step 1: Find the acceleration using kinematics: $$v^2 = u^2 + 2as$$ with $$u = 0$$, $$v = 3$$, $$s = 5$$. So $$9 = 10a \\Rightarrow a = 0.9\\,\\text{m/s}^2$$ (downward).\n- Step 2: Total mass = 800 kg. Forces: tension $$T$$ up, weight $$800g$$ down. Taking down as positive (matching acceleration): $$800g - T = 800 \\times 0.9$$.\n- Step 3: Solve: $$T = 800g - 720 = 800 \\times 9.8 - 720 = 7840 - 720 = 7120\\,\\text{N}$$.\n- Step 4: Since the lift accelerates downward, $$T < 800g$$ — cable supports LESS than the static weight. Makes physical sense: if it accelerates down, gravity wins partially.\n\nPattern: kinematics gives acceleration; dynamics then gives the force.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "A resultant force acts on a particle for a known time, causing it to travel a known distance from rest. Why does this information allow you to find the mass? (4 steps)", "answer": "- Step 1: From rest ($$u = 0$$), kinematics: $$s = \\frac{1}{2}at^2 \\Rightarrow a = \\frac{2s}{t^2}$$. Acceleration is known once distance and time are known.\n- Step 2: Compute magnitude of resultant force $$|\\mathbf{F}|$$ from the vector sum.\n- Step 3: Apply $$|\\mathbf{F}| = m|\\mathbf{a}|$$: solve for $$m = |\\mathbf{F}|/|\\mathbf{a}|$$.\n- Step 4: This combines kinematics (to get $$a$$) with dynamics (to get $$m$$) — a very common two-step pattern.\n\nKey realization: dynamics ($$F = ma$$) ties force to motion; SUVAT ties motion to position/time. Together they're a complete toolkit.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "A van moving at 16 m/s has its engine cut and decelerates under a constant 200 N resistance. Its mass is 400 kg. Conceptually, how long does it take to stop, and how far does it travel? (4 steps)", "answer": "- Step 1: Force: only 200 N resistance backward (engine off). By $$F = ma$$: $$-200 = 400a \\Rightarrow a = -0.5\\,\\text{m/s}^2$$ (deceleration).\n- Step 2: Time to stop: use $$v = u + at$$ with $$v = 0$$, $$u = 16$$: $$0 = 16 - 0.5t \\Rightarrow t = 32\\,\\text{s}$$.\n- Step 3: Distance to stop: $$v^2 = u^2 + 2as$$: $$0 = 256 - s \\Rightarrow s = 256\\,\\text{m}$$.\n- Step 4: Comment on modelling: assuming constant resistance is unrealistic — real air drag increases with speed squared, so the van would decelerate faster at high speed and slower at low speed. Total distance would likely be less than predicted.\n\nThis question shows WHY assumptions affect the answer, and how to critique a model.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "In a pulley problem where one particle ascends from rest and you are asked for \"the greatest height reached by the ascending particle after the other particle hits the ground,\" what is the strategy? (4 steps)", "answer": "- Step 1: Phase 1: both particles move together with coupled acceleration $$a$$. Find the speed $$v$$ of the ascending particle when the other hits the ground (use SUVAT with known $$a$$ and distance fallen).\n- Step 2: Phase 2: when the descending particle hits the ground, the string goes slack. The ascending particle now moves freely upward under gravity alone (deceleration $$g$$).\n- Step 3: Use $$v^2 = u^2 - 2gs$$ with $$u = v$$ (speed at transition), $$v = 0$$ (at apex): $$s = \\frac{v^2}{2g}$$ = extra height gained after string goes slack.\n- Step 4: Total greatest height above starting position = (height gained during phase 1) + (height gained during phase 2). Add the ground-to-starting-position height if the question asks above ground.\n\nTwo-phase motion is the classic trap: remember to switch from coupled acceleration to gravity-only.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "What is the key conceptual difference between \"tension in a connected system\" and \"the reaction force between stacked objects\"? (3 steps)", "answer": "- Step 1: Both are **internal forces** (Newton-3 pairs between two connected bodies) that emerge when you separate the bodies for analysis.\n- Step 2: Tension: applies through a string or rod — the force pulls the two bodies TOWARD each other. Same magnitude on both, opposite directions.\n- Step 3: Reaction (contact) force between stacked objects: applies through direct surface contact — the top pushes DOWN on the bottom, the bottom pushes UP on the top with the same magnitude.\n\nCommon feature: both are internal, both obey Newton 3, both disappear when you treat the system as one particle. You expose them only when you isolate one body.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why does treating a connected two-particle system as a single particle automatically cancel out all internal forces? (3 steps)", "answer": "- Step 1: Consider writing $$F = ma$$ for each particle separately, then adding the equations. Each internal force appears twice — once as an action on one particle, once as its reaction (with opposite sign) on the other.\n- Step 2: When summed, each internal force contributes $$+F$$ from one equation and $$-F$$ from the other, which cancel exactly (Newton's third law guarantees this).\n- Step 3: Only external forces survive the summation. The system equation is $$\\sum F_{\\text{external}} = M_{\\text{total}} a$$, a single equation without any internal unknowns.\n\nThis is why the whole-system view is SO powerful — it's not a trick, it's the logical consequence of Newton 3 applied to all internal pairs.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "Why can a string hold a hanging mass (supporting its weight) but cannot push the mass upward if left slack?", "answer": "A string can only exert a **pulling** force along its length — it resists being stretched but cannot resist being compressed. When a mass hangs from a taut string, the string pulls up on the mass (tension) and the mass pulls down on the string (Newton 3). If the string is slack (not pulled taut), it simply crumples rather than pushing back. This is the fundamental asymmetry between strings and rods: rods are rigid and can push (thrust) as well as pull (tension), while strings can only pull.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "In problem setups involving a pulley, why does the common acceleration have the same MAGNITUDE but opposite DIRECTIONS for the two particles? (3 steps)", "answer": "- Step 1: The string is inextensible — when one particle moves a distance $$d$$ toward the pulley, the other must move $$d$$ away from it (string can't stretch or compress).\n- Step 2: So if one goes up by $$d$$, the other goes down by $$d$$. Same magnitude of displacement; opposite directions.\n- Step 3: Consequently, same magnitudes of velocity and acceleration, but opposite directions. This gives us ONE scalar $$a$$ in our equations (the magnitude), with the direction handled by the sign convention for each particle.\n\nPulley = kinematic constraint linking two particles via the string's length.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Given particles of masses $$km$$ and $$3m$$ on a smooth pulley (with $$k < 3$$), it is observed that the heavier descends with acceleration $$\\frac{1}{3}g$$. Conceptually find $$k$$. (4 steps)", "answer": "- Step 1: The heavier ($$3m$$) descends, lighter ($$km$$) ascends, both with magnitude $$\\frac{g}{3}$$.\n- Step 2: For heavier (down positive): $$3mg - T = 3m \\cdot \\frac{g}{3} = mg \\Rightarrow T = 2mg$$.\n- Step 3: For lighter (up positive): $$T - kmg = km \\cdot \\frac{g}{3} \\Rightarrow 2mg - kmg = \\frac{kmg}{3}$$.\n- Step 4: Solve: $$2 - k = \\frac{k}{3} \\Rightarrow 6 - 3k = k \\Rightarrow k = 1.5$$.\n\nConsistency check: $$k = 1.5 < 3$$ ✓ (lighter particle).\n\nTakeaway: given any two facts (mass ratio, acceleration, tension), you can determine the third.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "What assumption is implicitly being used when we say \"the pulley system settles\" or \"the string becomes taut again after going slack\"?", "answer": "We implicitly assume that when the string re-becomes taut, a sudden **impulsive tension** is generated that instantaneously enforces the inextensibility constraint — re-equalizing velocities of the two particles along the string. In simple A-Level problems, this is often idealized by saying \"impact brings the descending mass to rest\" (for one mass hitting the ground) or modelled as a collision. The detail of what happens during that instant of re-tautening is complex, but the \"before\" and \"after\" states are well-defined.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "A 4 kg particle $$A$$ on a rough horizontal table, connected by a light inextensible string over a smooth pulley to a 3 kg hanging particle $$B$$, with 24.5 N friction on $$A$$. Conceptually find the acceleration and tension. (4 steps)", "answer": "- Step 1: For hanging particle $$B$$ (down positive): $$3g - T = 3a$$, i.e., $$T = 3g - 3a$$.\n- Step 2: For table particle $$A$$ (horizontally toward pulley positive): tension $$T$$ forward, friction 24.5 N backward: $$T - 24.5 = 4a \\Rightarrow T = 4a + 24.5$$.\n- Step 3: Wait, question says mass is 5 kg not 4 kg. Let me recompute for standard values. Equating the two expressions for $$T$$: $$3g - 3a = 4a + 24.5 \\Rightarrow 3g - 24.5 = 7a$$. With $$g = 9.8$$: $$7a = 29.4 - 24.5 = 4.9$$, so $$a = 0.7\\,\\text{m/s}^2$$.\n- Step 4: Tension: $$T = 4 \\times 0.7 + 24.5 = 27.3\\,\\text{N}$$ (or equivalently from $$B$$'s equation).\n\nPattern: two-particle pulley problems reduce to two linear equations in $$T$$ and $$a$$, solvable by elimination.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Why, after a hanging mass hits the ground in a pulley problem, does the table mass continue to move for a while before stopping? (3 steps)", "answer": "- Step 1: Just before impact, both particles were moving together at some speed $$v$$ (found from phase 1 kinematics).\n- Step 2: When the hanging mass hits and stops, the string goes slack — but the table mass still has its velocity $$v$$. It's now a particle moving forward with kinetic energy, subject only to friction.\n- Step 3: Friction decelerates it until it stops. This is inertia at work: the table mass \"wants\" to continue moving; only friction acts to change that.\n\nSo the total distance travelled by the table mass = (phase 1 distance during coupled motion) + (phase 2 distance while decelerating alone). The two phases have different accelerations.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Two connected boats have forces acting. Boat A's engine thrust is $$(-7\\mathbf{i} + 2\\mathbf{j})\\,\\text{N}$$ and boat B's is $$(k\\mathbf{i} + \\mathbf{j})\\,\\text{N}$$. A current provides $$3\\mathbf{i}\\,\\text{N}$$ on each. They accelerate in perpendicular directions. Conceptually find $$k$$. (4 steps)", "answer": "- Step 1: Resultant force on A = thrust + current = $$(-7 + 3)\\mathbf{i} + 2\\mathbf{j} = -4\\mathbf{i} + 2\\mathbf{j}\\,\\text{N}$$.\n- Step 2: Resultant force on B = $$(k + 3)\\mathbf{i} + \\mathbf{j}\\,\\text{N}$$.\n- Step 3: Perpendicular vectors have a zero dot product: $$(-4)(k+3) + (2)(1) = 0$$.\n- Step 4: Solve: $$-4k - 12 + 2 = 0 \\Rightarrow -4k = 10 \\Rightarrow k = -\\frac{5}{2}$$.\n\nSince mass is a positive scalar, acceleration direction = resultant force direction. \"Accelerating in perpendicular directions\" = resultant forces are perpendicular.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "What is the physical meaning of the tension being \"less than\" the weight of the hanging mass in a pulley system with a table? (3 steps)", "answer": "- Step 1: For the hanging mass: $$T < mg$$ means the tension up is less than the weight down, so the NET force is downward, and the mass accelerates down.\n- Step 2: The tension can't fully support the weight because the string is also being used to drag the table mass forward (against friction). Some of the hanging mass's \"gravitational pull\" goes into pulling the table mass.\n- Step 3: Conservation of force: the hanging mass's weight is \"shared\" between (a) its own downward acceleration, and (b) pulling the table mass forward via the string.\n\nIf the table were infinitely heavy (immovable), the hanging mass couldn't descend — the tension would equal the
