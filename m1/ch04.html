<script>
const DATA={"selected": [{"question": "In the same setup (P=5 kg pulled by 40 N, friction 10 N; Q=3 kg, friction 6 N, connected), how do you find the tension? Check with both particles. (4 steps)", "answer": "- Step 1: To find tension, SPLIT the system — consider one particle in isolation. The common acceleration is known to be $$a = 3\\,\\text{m/s}^2$$.\n- Step 2: For $$P$$ alone: forward force 40 N, backward forces = friction (10 N) + tension $$T$$. Equation: $$40 - T - 10 = 5 \\times 3 \\Rightarrow T = 15\\,\\text{N}$$.\n- Step 3: For $$Q$$ alone: forward force = tension $$T$$, backward force = friction (6 N). Equation: $$T - 6 = 3 \\times 3 \\Rightarrow T = 15\\,\\text{N}$$. ✓\n- Step 4: Both agree (they must — the tension is one physical quantity). Using both is a useful self-check: if they disagree, you've made an error somewhere.\n\nPattern: whole-system → acceleration; individual particle → internal force.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A 900 kg car pulls a 300 kg trailer via a tow-bar. Engine drives with 1200 N; resistances are 200 N (car) and 100 N (trailer). Conceptually find the acceleration and tow-bar tension. (4 steps)", "answer": "- Step 1: Whole-system: total mass = $$900 + 300 = 1200\\,\\text{kg}$$. External forces along motion: 1200 N forward, 200 N + 100 N = 300 N backward. Net = $$1200 - 300 = 900\\,\\text{N}$$.\n- Step 2: Acceleration: $$a = 900/1200 = 0.75\\,\\text{m/s}^2$$.\n- Step 3: Isolate the trailer (or the car). For trailer: only forces are tow-bar tension $$T$$ forward and 100 N resistance backward. Equation: $$T - 100 = 300 \\times 0.75 = 225 \\Rightarrow T = 325\\,\\text{N}$$.\n- Step 4: Check with car: $$1200 - T - 200 = 900 \\times 0.75 = 675 \\Rightarrow T = 1200 - 200 - 675 = 325\\,\\text{N}$$. ✓\n\nThe trailer's tow-bar tension has to do two jobs: overcome the trailer's resistance AND accelerate its mass forward.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A resultant force $$\\mathbf{F} = (6\\mathbf{i} + 4\\mathbf{j}) \\text{ N}$$ acts on a particle of mass $$2 \\text{ kg}$$. Explain how to find the acceleration vector $$\\mathbf{a}$$ and why acceleration is always in the same direction as the resultant force. (3 steps)", "answer": "- Step 1: Newton's second law in vector form is $$\\mathbf{F} = m\\mathbf{a}$$. To find $$\\mathbf{a}$$, you divide the force vector by the mass: $$\\mathbf{a} = \\frac{\\mathbf{F}}{m}$$.\n- Step 2: Dividing a vector by a positive scalar ($$m$$) changes its magnitude but not its direction. So, $$\\mathbf{a} = \\frac{1}{2}(6\\mathbf{i} + 4\\mathbf{j}) = (3\\mathbf{i} + 2\\mathbf{j}) \\text{ m s}^{-2}$$.\n- Step 3: The acceleration is always in the same direction as the resultant force because mass is a positive scalar. The force vector and acceleration vector are parallel and point in the exact same direction.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "A book rests on a table. Identify the Newton's Third Law pair for the normal reaction force exerted by the table on the book. Why is this NOT the weight of the book? (3 steps)", "answer": "- Step 1: The Newton's Third Law pair for the normal reaction (table pushing book up) is the force the book exerts on the table (book pushing table down).\n- Step 2: Newton's Third Law pairs must act on *different* bodies, be of the same type (both contact forces or both gravitational), and be equal and opposite.\n- Step 3: The weight of the book is the gravitational pull of the Earth on the book. It acts on the *book*, whereas the normal reaction also acts on the *book*. Therefore, they cannot be a Third Law pair (they are a First Law equilibrium pair). The Third Law pair for the weight is the gravitational pull of the *book* on the *Earth*.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "A particle is in equilibrium. What can you conclude about:  \n1. The vector sum of all forces acting on it?  \n2. Its velocity?  \n3. The relationship between individual forces (e.g., weight and normal reaction)?", "answer": "- Step 1: **Vector sum**: By Newton’s first law, the resultant force must be zero ($\\sum \\mathbf{F} = 0$).  \n- Step 2: **Velocity**: The particle is either at rest or moving with constant velocity (no acceleration).  \n- Step 3: **Individual forces**: Forces like weight and normal reaction must balance each other component-wise (e.g., vertical forces cancel, horizontal forces cancel).  \n\n**Takeaway:** Equilibrium implies both no net force and no acceleration, but the particle could still be moving at constant velocity.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "A mass on a rough table is connected via a pulley to a hanging mass. When the hanging mass hits the ground, what happens to the motion of the table mass, and WHY does the analysis change? (4 steps)", "answer": "- Step 1: Before ground contact: both masses are coupled by the string. Tension pulls the table mass forward; hanging mass's weight pulls it down. They share the same magnitude of acceleration.\n- Step 2: When the hanging mass hits the ground, it stops (usually assumed to not rebound). The string goes SLACK — tension drops to zero.\n- Step 3: The table mass, now with NO forward force (only friction backward), decelerates. New equation of motion: $$-F_{\\text{friction}} = m_{\\text{table}} \\cdot a'$$, giving $$a' < 0$$ (deceleration).\n- Step 4: The table mass continues sliding, slowing down, until friction brings it to rest. Use kinematics (e.g., $$v^2 = u^2 + 2as$$) to find how much further it slides.\n\nTwo-phase problem: Phase 1 = coupled motion; Phase 2 = deceleration under friction only. Always identify the transition event to split phases correctly.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "What does it mean for a string to be \"taut\" vs \"slack,\" and why does it matter physically?", "answer": "A **taut** string is under tension — it is straight, pulled from both ends, and transmits force. A **slack** string is loose, drooping, and carries NO tension (it cannot push). Physically, this means a slack string cannot constrain the relative motion of two connected particles — each moves independently under its own forces. After a string goes slack (e.g., one end suddenly stops), the other particle becomes \"free\" of the string's constraint. In pulley problems, this often marks the transition between phases of motion.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "In a pulley system where one mass hits the ground and then the string becomes slack, what governs the subsequent motion of the OTHER mass? (3 steps)", "answer": "- Step 1: Before: the other mass is moving (up or down) at some speed $$v$$ determined by the phase 1 motion.\n- Step 2: After the string goes slack, only gravity acts on the hanging other mass (assuming it hasn't reached a pulley or obstacle). It becomes a projectile moving under gravity alone.\n- Step 3: Apply standard free-fall kinematics: $$v$$ (initial velocity at transition) and $$a = g$$ (downward) determine its future motion — rising, decelerating, coming to rest, then falling back.\n\nOften asked: \"greatest height reached\" — use $$v^2 = u^2 - 2gs$$ with final velocity $$v = 0$$ at apex. The string might even become taut again when the mass falls back to the string's original length.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When solving connected particle problems, when should you treat the system as a single particle versus considering particles individually? (1 step)", "answer": "Treat as a single particle when you only need the common acceleration (not the tension). Consider particles individually when you need to find the tension or thrust in the connecting string or rod.", "source": "MiniMax ①", "_id": "minimax_1_76"}, {"question": "Why is it valid to use SUVAT equations AFTER finding the acceleration from $$F = ma$$? (3 steps)", "answer": "- Step 1: $$F = ma$$ gives you the instantaneous acceleration from the current net force.\n- Step 2: SUVAT equations (like $$s = ut + \\frac{1}{2}at^2$$ or $$v^2 = u^2 + 2as$$) apply **when acceleration is constant**.\n- Step 3: If the forces don't change during the motion (i.e., no new forces appearing, no forces vanishing, no direction changes), the acceleration is constant — and SUVAT applies.\n\nMany problems have this structure: (1) use $$F = ma$$ to find $$a$$; (2) use SUVAT to find displacement, velocity, or time. Two-tool workflow.\n\nWatch out: if a force changes mid-problem (e.g., a string becoming slack), you have to re-solve the phase with a NEW constant acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "A car is traveling around a circular track at a constant speed of $$20 \\text{ m s}^{-1}$$. Is the car in equilibrium? Explain your reasoning. (2 steps)", "answer": "- Step 1: No, the car is not in equilibrium. Equilibrium requires the resultant force to be zero, which means the object must be at rest or moving with constant *velocity*.\n- Step 2: Velocity is a vector quantity (speed + direction). Since the car is moving in a circle, its direction is constantly changing, meaning its velocity is constantly changing. Therefore, there must be a non-zero resultant force acting towards the center of the circle to cause this continuous acceleration.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "What would happen in a pulley system if the string were extensible (elastic)? (1 step)", "answer": "If the string were elastic, the two particles could have different accelerations (the string would stretch, storing energy). The assumption of inextensibility ensures both particles have the same acceleration.", "source": "MiniMax ①", "_id": "minimax_1_88"}, {"question": "In a pulley system with a heavy particle descending, which particle experiences greater tension—the ascending one or the descending one? Explain using the equations of motion. (3 steps)", "answer": "- Step 1: Both particles experience the SAME tension (assuming light, smooth pulley). The tension is not \"greater\" for one particle—it's the same magnitude throughout the string.\n- Step 2: For the descending mass (heavier): 3mg - T = 3ma. For the ascending mass (lighter): T - 2mg = 2ma.\n- Step 3: Since both equations contain T and a, solving gives T = 12mg/5. The tension is the same for both ends of the string, but the net forces (and hence accelerations) differ because the weights differ.", "source": "MiniMax ②", "_id": "minimax_2_45"}, {"question": "What is the difference between mass and weight, and what equation connects them? Why would an astronaut's weight change on the moon but not their mass? (3 steps)", "answer": "- Step 1: Mass is a scalar measure of the amount of matter in an object (measured in kg). Weight is a vector force due to gravity acting on that mass (measured in N).\n- Step 2: They are connected by the equation $$W = mg$$, where $$g$$ is the acceleration due to gravity ($$9.8 \\text{ m/s}^2$$ on Earth).\n- Step 3: On the moon, $$g$$ is smaller (about $$1.6 \\text{ m/s}^2$$), so the gravitational pull (weight) is smaller. However, the amount of matter (mass) remains unchanged because mass is an intrinsic property, independent of gravitational field strength.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why is the weight of an object calculated as $W = mg$ even though the gravitational field strength $g$ varies with location?", "answer": "- Step 1: **Local approximation**: For Earth’s surface problems, $g \\approx 9.8 \\, \\text{m/s}^2$ is constant.  \n- Step 2: **Mass independence**: $g$ represents acceleration due to gravity; weight is mass times local $g$.  \n- Step 3: **Variation**: At high altitudes or other celestial bodies, $W = mg$ still holds, but $g$ changes.  \n\n**Takeaway:** $W = mg$ is universally valid, but $g$ itself depends on context (e.g., Moon vs. Earth).", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "If the resultant force acting on a particle points due north, what can be said about the direction of the particle's acceleration? Does this mean the particle is moving north? (3 steps)", "answer": "- Step 1: A resultant force acting on an object will cause the object to accelerate in the same direction as the resultant force.\n- Step 2: Therefore, the acceleration must point due north.\n- Step 3: However, acceleration is the rate of change of velocity, not the velocity itself. The particle could be moving in any direction initially (e.g., east) and simply be turning northwards while slowing down in its original direction. It does not mean the particle is currently moving north.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "State Newton's Second Law and explain why a force of 1 N accelerating a mass of 1 kg at 1 m/s² is not just a coincidence but a definition. (2 steps)", "answer": "- Step 1: Newton's Second Law states that the force needed to accelerate a particle is equal to the product of the mass of the particle and the acceleration produced: $$F = ma$$.\n- Step 2: The Newton (N) is actually defined using this law. 1 N is specifically defined as the exact amount of force required to accelerate a mass of 1 kg at a rate of 1 m/s². Thus, $$1 \\text{ N} = 1 \\text{ kg} \\times 1 \\text{ m/s}^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "In a pulley problem where one particle ascends from rest and you are asked for \"the greatest height reached by the ascending particle after the other particle hits the ground,\" what is the strategy? (4 steps)", "answer": "- Step 1: Phase 1: both particles move together with coupled acceleration $$a$$. Find the speed $$v$$ of the ascending particle when the other hits the ground (use SUVAT with known $$a$$ and distance fallen).\n- Step 2: Phase 2: when the descending particle hits the ground, the string goes slack. The ascending particle now moves freely upward under gravity alone (deceleration $$g$$).\n- Step 3: Use $$v^2 = u^2 - 2gs$$ with $$u = v$$ (speed at transition), $$v = 0$$ (at apex): $$s = \\frac{v^2}{2g}$$ = extra height gained after string goes slack.\n- Step 4: Total greatest height above starting position = (height gained during phase 1) + (height gained during phase 2). Add the ground-to-starting-position height if the question asks above ground.\n\nTwo-phase motion is the classic trap: remember to switch from coupled acceleration to gravity-only.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "A van moving at 16 m/s has its engine cut and decelerates under a constant 200 N resistance. Its mass is 400 kg. Conceptually, how long does it take to stop, and how far does it travel? (4 steps)", "answer": "- Step 1: Force: only 200 N resistance backward (engine off). By $$F = ma$$: $$-200 = 400a \\Rightarrow a = -0.5\\,\\text{m/s}^2$$ (deceleration).\n- Step 2: Time to stop: use $$v = u + at$$ with $$v = 0$$, $$u = 16$$: $$0 = 16 - 0.5t \\Rightarrow t = 32\\,\\text{s}$$.\n- Step 3: Distance to stop: $$v^2 = u^2 + 2as$$: $$0 = 256 - s \\Rightarrow s = 256\\,\\text{m}$$.\n- Step 4: Comment on modelling: assuming constant resistance is unrealistic — real air drag increases with speed squared, so the van would decelerate faster at high speed and slower at low speed. Total distance would likely be less than predicted.\n\nThis question shows WHY assumptions affect the answer, and how to critique a model.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Why is the normal reaction force not always equal to an object’s weight on a horizontal surface?", "answer": "- Step 1: **Equilibrium case**: If vertical forces balance (no acceleration), $R = mg$.  \n- Step 2: **Non-equilibrium case**: If an external vertical force (e.g., upward pull) acts, $R = mg - F_{\\text{vertical}}$.  \n- Step 3: **Accelerated frames**: In a lift accelerating upward, $R = m(g + a)$.  \n\n**Takeaway:** Normal reaction adjusts to balance net vertical forces, not just weight.", "source": "Qwen 3 ①", "_id": "qwen_1_12"}, {"question": "What assumption is implicitly being used when we say \"the pulley system settles\" or \"the string becomes taut again after going slack\"?", "answer": "We implicitly assume that when the string re-becomes taut, a sudden **impulsive tension** is generated that instantaneously enforces the inextensibility constraint — re-equalizing velocities of the two particles along the string. In simple A-Level problems, this is often idealized by saying \"impact brings the descending mass to rest\" (for one mass hitting the ground) or modelled as a collision. The detail of what happens during that instant of re-tautening is complex, but the \"before\" and \"after\" states are well-defined.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "In a pulley system where one mass hangs on the left and another on the right, why can you NOT treat the whole system as a single particle using F=ma directly? (3 steps)", "answer": "- Step 1: To treat a system as a single particle, all parts must be moving in the same straight line.\n- Step 2: In a pulley system, one mass moves upward and the other moves downward. They are moving in different directions.\n- Step 3: Because they are moving in different directions, you cannot just add their masses and apply $$F = ma$$ for the whole system. You must consider each particle separately, writing an equation of motion for each.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In an equilibrium problem, three force components along a direction sum to $$a + (-2a) + 3 = 0$$. What structural insight lets you write this equation? (3 steps)", "answer": "- Step 1: Equilibrium in a given direction means the ALGEBRAIC sum of the force components along that direction is zero.\n- Step 2: Each force contributes either positively (along the direction) or negatively (against it). The sum equals zero at equilibrium — no net component in that direction.\n- Step 3: This gives a scalar equation per direction. If you resolve along two perpendicular directions, you get two independent equations — enough to solve for two unknowns.\n\nEquilibrium is thus a condition that generates a system of equations from a vector condition.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "Why is the tension in a light, inextensible string the same on both sides of a smooth pulley?", "answer": "- Step 1: A **smooth pulley** introduces no friction, so there’s no opposing torque to create a difference in tension.  \n- Step 2: The string is **light**, meaning its mass is negligible, so tension doesn’t vary to support its own weight.  \n- Step 3: The string is **inextensible**, ensuring both particles move with the same acceleration, maintaining constant tension.  \n\n**Takeaway:** These assumptions simplify problems by allowing a single tension value to model the system.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "Why should you choose the direction of acceleration as the positive direction when setting up an equation of motion? (2 steps)", "answer": "- Step 1: If you pick the positive direction to match the acceleration, then $$a$$ on the right side of $$F = ma$$ is positive. Forces aiding the motion appear as positive terms; forces opposing appear as negative. This matches physical intuition cleanly.\n- Step 2: If you pick the opposite direction, $$a$$ becomes negative — mathematically valid, but you must track signs carefully and interpret the negative result correctly. Consistency within the problem matters more than which direction you picked; pick the helpful one and stick with it.\n\nGood habit: write $$\\mathrm{R}(\\rightarrow)$$ or $$\\mathrm{R}(\\uparrow)$$ at the start of every equation to signal your convention.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "If two particles of masses $m_1$ and $m_2$ are connected by a light inextensible string over a pulley, why is their acceleration the same in magnitude?", "answer": "- Step 1: **Inextensible string**: The displacement of both particles must be equal over time.  \n- Step 2: **Same speed**: If one moves a distance $s$, the other does too.  \n- Step 3: **Same acceleration**: Differentiating displacement twice, $a_1 = a_2$ in magnitude (directions may differ).  \n\n**Takeaway:** The inextensibility ensures kinematic constraints, linking their accelerations directly.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "Describe the difference between a \"smooth\" and a \"rough\" surface, and explain how each affects the force diagram.", "answer": "A **smooth** surface has no friction — the only force between the surface and the particle is the normal reaction (perpendicular to the surface). A **rough** surface additionally exerts a friction force parallel to the surface, opposing the motion (or tendency of motion). In force diagrams, a smooth surface gives you one contact force (normal), a rough surface gives two (normal + friction). The word is a modelling keyword — always check for it before drawing the diagram.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "A car is towing a trailer. The car's engine is turned off and the brakes are applied, causing the system to decelerate. Is the force in the tow-bar a tension or a thrust? Why? (3 steps)", "answer": "- Step 1: Since the car is braking and slowing down, the trailer also needs to slow down.\n- Step 2: The trailer has no brakes of its own (in this model), so the only way it decelerates is if the car pushes back on it.\n- Step 3: Therefore, the tow-bar must be in compression, exerting a thrust. The car pushes backward on the trailer (thrust), and by Newton's Third Law, the trailer pushes forward on the car.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "A block of mass $$m$$ slides along a smooth horizontal surface with acceleration $$a$$. Even though it's moving and accelerating horizontally, why is the vertical equation of motion $$R - mg = 0$$, and what does this tell us about the normal reaction $$R$$? (2 steps)", "answer": "- Step 1: The block is not moving vertically (it doesn't lift off the surface or sink into it), so its vertical acceleration is zero ($$a_v = 0$$).\n- Step 2: By Newton's Second Law in the vertical direction, $$F_{vertical} = m \\times a_v = m \\times 0 = 0$$. Therefore, the upward normal reaction $$R$$ must perfectly balance the downward weight $$mg$$, meaning $$R = mg$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "What is the difference between TENSION and THRUST in a connecting rod, and when does each arise? (4 steps)", "answer": "- Step 1: A **rod** (unlike a string) is rigid and can both push and pull.\n- Step 2: **Tension**: the rod is being stretched — pulled inward at both ends. Each particle at the ends is pulled toward the other. Arises when something tries to separate the two connected particles.\n- Step 3: **Thrust** (a.k.a. compression): the rod is being compressed — pushed inward at both ends. Each particle is pushed away from the other. Arises when something tries to push the particles together.\n- Step 4: In a tow-bar between a car and a trailer:\n+ Car accelerates → trailer \"lags\" → tow-bar in TENSION (pulls trailer forward, car backward).\n+ Car brakes → trailer \"catches up\" → tow-bar in THRUST (pushes trailer backward, car forward).\n\nStrings can only be in tension (they can't push). Rods can be in either. This distinction matters enormously in braking and collision problems.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why is the driving force in a car’s engine not the sole factor determining its acceleration?", "answer": "- Step 1: **Net force**: Acceleration depends on $F_{\\text{net}} = F_{\\text{drive}} - R$, where $R$ is resistance (air drag, friction).  \n- Step 2: **Mass dependence**: $a = F_{\\text{net}}/m$; heavier cars accelerate slower for the same net force.  \n- Step 3: **Equilibrium**: At top speed, $F_{\\text{drive}} = R$, so $a = 0$.  \n\n**Takeaway:** Acceleration is determined by the balance between driving force and resistive forces, scaled by mass.", "source": "Qwen 3 ①", "_id": "qwen_1_17"}, {"question": "Why does a car moving at constant velocity on a horizontal road require the driving force to EXACTLY balance the resistances? (3 steps)", "answer": "- Step 1: Constant velocity = zero acceleration. By Newton's first law, this requires zero resultant force.\n- Step 2: Horizontally: driving force forward = resistances backward. Otherwise there'd be a net horizontal force and acceleration.\n- Step 3: Vertically: normal reaction balances weight. Driving force and resistance are horizontal, so they don't affect vertical balance.\n\nInsight: this is why a moving car still needs fuel at steady speed — the engine's job isn't to maintain velocity (Newton's first law does that for free!) but to COMPENSATE for resistances (rolling friction, air drag). Without resistances, a moving car would coast forever.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "When resolving forces for a particle in motion, why must you specify a direction for resolving (e.g., horizontal or vertical)?", "answer": "- Step 1: **Newton’s second law is direction-dependent**: Acceleration occurs in the direction of the net force.  \n- Step 2: **Component separation**: Forces perpendicular to the chosen direction cancel out and do not contribute to acceleration in that direction.  \n- Step 3: **Consistency**: Choosing a direction simplifies calculations by decoupling motion into independent axes (e.g., x and y).  \n\n**Takeaway:** Directional resolution ensures accurate application of $F = ma$ by aligning forces with the axis of interest.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "State Newton's first law of motion precisely, and explain what the phrase \"unbalanced force\" really means. (3 steps)", "answer": "- Step 1: Newton's first law: an object at rest stays at rest, and an object moving with constant velocity continues to move with constant velocity, unless an **unbalanced force** acts on it.\n- Step 2: \"Unbalanced\" = the vector sum of all forces is **non-zero**. If every force is cancelled by an opposite one (e.g., weight balanced by normal reaction), the net force is zero and motion does not change.\n- Step 3: The deep idea: matter has **inertia** — it resists changes in its state of motion. A force is required to *change* velocity, not to *maintain* it. This overturns the intuitive (but wrong) Aristotelian view that \"constant motion requires constant force.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "What must happen if the \"F\" in \"F=ma\" turns out to have a magnitude of zero despite individual forces being present?", "answer": "The resultant force being zero means the individual forces BALANCE — they cancel each other out vectorally. By Newton's first law (a special case of $$F = ma$$ with $$a = 0$$), the particle either remains at rest or continues to move with constant velocity. There is no acceleration. This is equilibrium: the particle's motion state is preserved. Zero $$F$$ does NOT mean zero forces exist; it means their vector sum is zero. A tightrope walker in mid-air has tension, gravity, and normal forces, yet can be in equilibrium if they all balance.", "source": "Opus 4.7 ②", "_id": "opus_2_81"}, {"question": "A particle of weight 5 N rests on a horizontal plane. State the magnitude of the normal reaction and justify why it equals the weight — and why this is NOT always the case.", "answer": "The normal reaction is $$5\\,\\text{N}$$, directed upward. The particle is at rest, so vertically the forces must balance (Newton's first law). The only vertical forces are weight (5 N down) and normal reaction $$R$$ (up), so $$R - 5 = 0 \\Rightarrow R = 5\\,\\text{N}$$. However, this equality is a coincidence of the horizontal setup — if there were an additional vertical force (e.g., a rope pulling upward, or the surface were inclined), $$R$$ would adjust accordingly. Normal reaction is not a \"set\" force equal to weight; it's whatever magnitude is required to prevent penetration of the surface, given all other vertical forces.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "When a car brakes and the tow-bar transitions from tension to thrust, what has changed physically about the tow-bar's state? (3 steps)", "answer": "- Step 1: Before braking: the car accelerated forward, dragging the trailer along. The tow-bar pulled the trailer forward and the car backward — it was stretched (in tension).\n- Step 2: During braking: the car decelerates rapidly. If the trailer's own resistance is insufficient to slow it at the same rate, the trailer tends to \"push forward\" into the car. The tow-bar must now PUSH the trailer backward to share the deceleration.\n- Step 3: The tow-bar is now being compressed at both ends (car pushing back, trailer pushing forward) — this is THRUST.\n\nIn terms of math, thrust and tension have opposite signs for internal force in the equations. A negative tension in your solution means the rod is actually in thrust.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "A lift of mass $$m$$ is accelerating upwards with acceleration $$a$$. Write the equation of motion for the lift, explaining the sign of each term. (3 steps)", "answer": "- Step 1: The forces acting on the lift are the tension $$T$$ in the cable (upwards) and the weight $$mg$$ (downwards).\n- Step 2: Taking the direction of acceleration (upwards) as positive, the resultant force is $$T - mg$$.\n- Step 3: Using Newton's second law $$F = ma$$, the equation of motion is $$T - mg = ma$$. The tension must overcome the weight AND provide the upward accelerating force.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Why might the magnitude of acceleration be related to the magnitude of force via $$|F| = m|a|$$ regardless of direction? (3 steps)", "answer": "- Step 1: $$\\mathbf{F} = m\\mathbf{a}$$ is a vector equation. Taking magnitudes of both sides: $$|\\mathbf{F}| = |m\\mathbf{a}| = m|\\mathbf{a}|$$ (since $$m > 0$$).\n- Step 2: This works because the mass scales the vector uniformly — it multiplies the length without changing direction.\n- Step 3: Useful when you know the magnitude of acceleration (e.g., \"accelerates at 7 m/s²\") but not its direction. Combine all forces into a resultant vector, take its magnitude, and equate with $$m \\cdot |a|$$.\n\nThis trick dodges the need to match component-by-component when only magnitudes are given.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "When a lift accelerates upward, does a person inside feel heavier or lighter than normal? Explain using the normal reaction. (4 steps)", "answer": "- Step 1: Isolate the person (mass $$m$$). Forces on them: weight $$mg$$ downward, normal reaction $$N$$ from floor upward.\n- Step 2: Person shares lift's acceleration $$a$$ upward. Equation of motion: $$N - mg = ma$$.\n- Step 3: Therefore $$N = m(g + a) > mg$$. The floor pushes the person HARDER than just their weight — this increased normal reaction is what they physically *feel*.\n- Step 4: They feel heavier by a factor of $$\\frac{N}{mg} = 1 + \\frac{a}{g}$$.\n\nContrast cases:\n+ Lift accelerates downward: $$N = m(g - a) < mg$$ — feels lighter.\n+ Lift in free fall ($$a = g$$ down): $$N = 0$$ — weightless!\n\nThe \"feeling of weight\" is really the feeling of the normal reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "A satellite orbits the Earth at constant speed. Explain why a resultant force still acts on it, despite its \"uniform\" motion. (3 steps)", "answer": "- Step 1: The satellite's **speed** (a scalar) is constant, but its **velocity** (a vector) changes continuously because its direction of motion changes as it curves around the Earth.\n- Step 2: Newton's first law applies to constant velocity (direction included), not just speed. A changing direction means the velocity vector is changing, which is acceleration.\n- Step 3: Therefore there IS a resultant force — Earth's gravity — which acts centripetally (toward the Earth's centre) and continuously redirects the satellite into its curved path.\n\nKey contrast: constant speed ≠ constant velocity. Any change in direction requires a resultant force.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "A scale pan of mass 0 kg supports masses A (0.4 kg) on top of B (0.6 kg). The string attached to the pan pulls it up with acceleration 0.5 m/s². Outline how to find the force A exerts on B. (4 steps)", "answer": "- Step 1: Isolate the top mass A. Forces on A: weight $$0.4g$$ down, reaction $$R$$ from B up. Equation (up positive, acceleration 0.5 up): $$R - 0.4g = 0.4 \\times 0.5 \\Rightarrow R = 0.4(g + 0.5) \\approx 4.12\\,\\text{N}$$.\n- Step 2: By Newton's third law, A exerts a force on B equal in magnitude, opposite in direction — so A pushes DOWN on B with $$\\approx 4.1\\,\\text{N}$$.\n- Step 3: Note: this is MORE than A's static weight ($$0.4g = 3.92\\,\\text{N}$$), because B must not only support A's weight but also accelerate A upward.\n- Step 4: Newton 3 gives the switch: \"what B exerts on A\" is the internal reaction force $$R$$; \"what A exerts on B\" is its Newton-3 partner, same magnitude, opposite direction.\n\nKey move: isolate ONE body (usually the top), find the contact force, then use Newton 3 to flip direction.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "In a connected-particle problem with a hanging particle $$A$$ (above) and $$B$$ (below), connected by a light string, and a force $$F$$ pulling $$A$$ upward, explain why $$A$$ and $$B$$ accelerate together. (3 steps)", "answer": "- Step 1: The string is light and inextensible, so its length is fixed and tension is transmitted through. If $$A$$ moves up by some distance, $$B$$ must move up by the same distance (they're rigidly connected via the string).\n- Step 2: Same displacement in the same time means same velocity and same acceleration — both in magnitude and direction.\n- Step 3: So treating the system as a single particle of mass $$m_A + m_B$$ with total external force $$F - (m_A + m_B)g$$ upward works: acceleration is $$a = \\frac{F - (m_A + m_B)g}{m_A + m_B}$$.\n\nThe string's role: ensuring kinematic connection. Its tension emerges as an internal force that equalizes the acceleration of both particles.", "source": "Opus 4.7 ②", "_id": "opus_2_80"}, {"question": "A block is being pulled to the right by force P across a rough horizontal plane. What are the four forces acting on the block, and in what direction does each act? (4 steps)", "answer": "- Step 1: Identify the force pulling the block: $$P$$, acting horizontally to the right.\n- Step 2: Identify the force due to gravity: Weight ($$W$$), acting vertically downward.\n- Step 3: Identify the force from the surface: Normal reaction ($$R$$), acting perpendicular to the plane (vertically upward), opposing the weight.\n- Step 4: Identify the force opposing the motion: Friction ($$F$$), acting horizontally to the left, opposing the pulling force $$P$$.\nEvery force must have a corresponding agent; these four cover the pull, gravity, the surface's normal push, and the surface's frictional resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "When you \"resolve forces\" in a chosen direction, what are you doing mathematically, and what is the sign convention? (3 steps)", "answer": "- Step 1: You pick a direction of interest (e.g., horizontal to the right, or vertical upward) and declare it the **positive direction**.\n- Step 2: Forces pointing **along** the positive direction contribute their magnitude with a **+** sign; forces pointing **opposite** contribute with a **−** sign.\n- Step 3: Mathematically this is vector addition along one axis: you project each force onto the chosen axis and sum the components. Since this chapter only uses horizontal/vertical forces, components are just the full magnitudes (no trigonometry needed yet).\n\nThe notation $$\\mathrm{R}(\\rightarrow)$$ or $$\\mathrm{R}(\\uparrow)$$ serves as a reminder of which direction you chose as positive — it prevents sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "A mass on a rough horizontal table is connected via a smooth pulley at the table's edge to a mass hanging freely. Explain why the string's direction changes at the pulley and what this implies about the tension.", "answer": "The string runs horizontally on the table (connecting the table mass to the pulley) and vertically below the pulley (to the hanging mass). At the pulley, the string's direction is redirected from horizontal to vertical. Because the pulley is smooth and the string is light, the tension remains the same magnitude on both sides — no energy is lost to friction at the pulley. The pulley's only role is to redirect the force: what pulls the table mass horizontally (toward the pulley) is the same tension that pulls the hanging mass upward. Without the pulley, the hanging mass's weight couldn't accelerate the table mass — the pulley converts vertical weight into horizontal pull.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why, after a hanging mass hits the ground in a pulley problem, does the table mass continue to move for a while before stopping? (3 steps)", "answer": "- Step 1: Just before impact, both particles were moving together at some speed $$v$$ (found from phase 1 kinematics).\n- Step 2: When the hanging mass hits and stops, the string goes slack — but the table mass still has its velocity $$v$$. It's now a particle moving forward with kinetic energy, subject only to friction.\n- Step 3: Friction decelerates it until it stops. This is inertia at work: the table mass \"wants\" to continue moving; only friction acts to change that.\n\nSo the total distance travelled by the table mass = (phase 1 distance during coupled motion) + (phase 2 distance while decelerating alone). The two phases have different accelerations.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "Derive the relationship $$W = mg$$ from Newton's second law. Why is $$g$$ the same for all freely falling objects? (3 steps)", "answer": "- Step 1: Consider a body in free fall (no air resistance, no other forces). The only force acting is gravity, called its **weight** $$W$$, directed downward.\n- Step 2: Apply Newton's second law in the downward direction: resultant force = weight, acceleration = $$g$$ (empirically measured as ≈ 9.8 m/s² on Earth). So $$W = mg$$.\n- Step 3: Why the same $$g$$ regardless of mass? Because gravity exerts a force **proportional to mass** ($$W = mg$$), AND inertia (resistance to acceleration) is also proportional to mass. The two effects cancel, giving mass-independent acceleration. This is the \"equivalence principle\" — Galileo's famous observation from the Leaning Tower of Pisa.\n\nDoubling the mass doubles the gravitational force AND doubles the inertia, so the acceleration is unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "How do you find the magnitude and bearing of a resultant force $$4\\mathbf{i} + 3\\mathbf{j}\\,\\text{N}$$, where $$\\mathbf{i}$$ is east and $$\\mathbf{j}$$ is north? (4 steps)", "answer": "- Step 1: Magnitude via Pythagoras (components are perpendicular): $$|\\mathbf{R}| = \\sqrt{4^2 + 3^2} = \\sqrt{25} = 5\\,\\text{N}$$.\n- Step 2: The angle $$\\theta$$ with the east direction (i): $$\\tan\\theta = \\frac{\\text{north comp}}{\\text{east comp}} = \\frac{3}{4}$$, giving $$\\theta \\approx 36.9°$$.\n- Step 3: Bearings are measured **clockwise from north**. East corresponds to bearing 090°. The resultant is $$\\theta = 36.9°$$ **above** east (north of east), so the bearing is $$90° - 36.9° \\approx 053.1°$$.\n- Step 4: Always draw the vector in its correct quadrant to check that subtraction (rather than addition) of $$\\theta$$ is appropriate. Bearings are 3-digit numbers by convention (e.g., 053°, not 53°).", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "A light inextensible string passes over a small smooth fixed pulley. The tension in the string is T. If the string hangs vertically on both sides of the pulley, how do you calculate the force exerted on the pulley by the string? What if one side is horizontal and one side is vertical? (2 steps)", "answer": "- Step 1: The string exerts a pulling force T on the pulley from both sides. If both sides are vertical, the two tension forces both act vertically downward, so the total force on the pulley is simply $$2T$$ downward.\n- Step 2: If one side is horizontal and the other vertical (e.g., a pulley at the edge of a table), the horizontal string pulls the pulley horizontally with force T, and the vertical string pulls it vertically with force T. The total force is the vector sum $$T\\mathbf{i} + T\\mathbf{j}$$, with magnitude $$\\sqrt{T^2 + T^2} = T\\sqrt{2}$$ acting at $$45^\\circ$$ to the horizontal.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "Explain the concept of \"modelling assumptions\" in mechanics problems, and why we often state assumptions explicitly.", "answer": "Modelling assumptions are idealisations that simplify reality to make the problem tractable — e.g., \"treat the car as a particle\" (no size, no rotation), \"assume the string is light and inextensible,\" \"the surface is smooth/rough,\" \"neglect air resistance.\" Each assumption is a trade-off: it sacrifices realism for mathematical simplicity. Stating them explicitly is critical because: (1) your final answer is only valid within those assumptions; (2) it prompts you to identify what is being neglected and what real-world effects might change the answer. A problem's \"correct\" answer is only correct *given* its assumptions.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "A block is pulled across a rough horizontal plane at constant velocity by a force $$P$$. How does the magnitude of the friction force $$F$$ relate to the pulling force $$P$$, and what would happen to the block's motion if $$P$$ was slightly increased? (2 steps)", "answer": "- Step 1: Since the block moves at constant velocity, it is in equilibrium horizontally. Therefore, the driving force $$P$$ must be exactly equal in magnitude to the friction force $$F$$ (they act in opposite directions).\n- Step 2: If $$P$$ is slightly increased, the forces are no longer balanced. There is now a resultant force in the direction of $$P$$, so by Newton's Second Law, the block will accelerate in the direction of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Why does treating a connected two-particle system as a single particle automatically cancel out all internal forces? (3 steps)", "answer": "- Step 1: Consider writing $$F = ma$$ for each particle separately, then adding the equations. Each internal force appears twice — once as an action on one particle, once as its reaction (with opposite sign) on the other.\n- Step 2: When summed, each internal force contributes $$+F$$ from one equation and $$-F$$ from the other, which cancel exactly (Newton's third law guarantees this).\n- Step 3: Only external forces survive the summation. The system equation is $$\\sum F_{\\text{external}} = M_{\\text{total}} a$$, a single equation without any internal unknowns.\n\nThis is why the whole-system view is SO powerful — it's not a trick, it's the logical consequence of Newton 3 applied to all internal pairs.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "A block of weight $$W$$ is pulled to the right by a horizontal force $$P$$ across a rough horizontal plane. List ALL forces acting on the block, with their directions, and explain what each represents. (4 steps)", "answer": "- Step 1: **Weight $$W$$** — acts vertically downward. Gravity always pulls objects toward the Earth's centre; for horizontal surfaces this is \"straight down.\"\n- Step 2: **Normal reaction $$R$$** — acts vertically upward, from the plane on the block. It exists because the plane prevents the block sinking into it (Newton's 3rd law in action).\n- Step 3: **Applied force $$P$$** — acts horizontally to the right (the direction of the pull).\n- Step 4: **Friction $$F$$** — acts horizontally to the **left**, opposing the motion (or tendency of motion). Present because the plane is described as \"rough.\"\n\nTotal: 4 forces. Two vertical ($$W$$ down, $$R$$ up), two horizontal ($$P$$ right, $$F$$ left). The word \"rough\" is the crucial trigger for friction; \"smooth\" would eliminate it.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "A resultant force $$\\mathbf{R}$$ is parallel to the vector $$(-2\\mathbf{i} + 3\\mathbf{j})$$. What does this tell you about the relationship between the i and j components of $$\\mathbf{R}$$? (2 steps)", "answer": "- Step 1: If two vectors are parallel, one is a scalar multiple of the other. This means $$\\mathbf{R} = k(-2\\mathbf{i} + 3\\mathbf{j})$$ for some constant $$k$$.\n- Step 2: Expanding this gives $$\\mathbf{R} = -2k\\mathbf{i} + 3k\\mathbf{j}$$. This means the ratio of the $$\\mathbf{j}$$-component to the $$\\mathbf{i}$$-component must be exactly the same as in the direction vector.\n+ Specifically, if $$\\mathbf{R} = x\\mathbf{i} + y\\mathbf{j}$$, then $$\\frac{y}{x} = \\frac{3}{-2}$$, or $$3x + 2y = 0$$. You don't need to know $$k$$ to find the relationship between the components.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "How does Newton’s third law apply to two particles connected by a string over a pulley?", "answer": "- Step 1: **Action-reaction pairs**: The tension in the string pulling particle $A$ upward is met by an equal downward force on the string by $A$.  \n- Step 2: Similarly, the string pulls particle $B$ downward, and $B$ exerts an upward force on the string.  \n- Step 3: The pulley experiences forces from both sides of the string, but tension remains equal due to Newton’s third law (action = reaction).  \n\n**Takeaway:** Newton’s third law ensures forces between particles and the string are mutual and equal in magnitude.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Why is the normal reaction on a horizontal surface typically equal to the weight of the object? Under what conditions might this not be true? (2 steps)", "answer": "- Step 1: On a horizontal surface with no vertical acceleration, the vertical forces must balance: R - mg = 0, so R = mg. The normal reaction equals the weight.\n- Step 2: This is NOT true when: (1) There is vertical acceleration (e.g., in an accelerating lift), (2) Additional vertical forces act (e.g., someone pushes down on the object), or (3) The surface is inclined.", "source": "MiniMax ②", "_id": "minimax_2_14"}, {"question": "A force vector is given by $$\\mathbf{F} = (-3\\mathbf{i} + 7\\mathbf{j})$$ N. Estimate the magnitude of this force and the quadrant in which it points. (2 steps)", "answer": "- Step 1: To find the quadrant, look at the signs: the $$\\mathbf{i}$$-component is negative (West/left) and the $$\\mathbf{j}$$-component is positive (North/up). This places the vector in the second quadrant (North-West).\n- Step 2: To estimate the magnitude, use Pythagoras: $$|\\mathbf{F}| = \\sqrt{(-3)^2 + 7^2} = \\sqrt{9 + 49} = \\sqrt{58}$$. Since $$7^2 = 49$$ and $$8^2 = 64$$, the magnitude is between 7 and 8 N (roughly 7.6 N).", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "What does Newton's First Law state about an object moving with constant velocity, and what is a common misconception about the forces acting on it? (2 steps)", "answer": "- Step 1: Newton's First Law states that an object at rest will stay at rest, and an object moving with constant velocity will continue to move with constant velocity, unless acted upon by an unbalanced (resultant) force.\n- Step 2: A common misconception is that a moving object *must* have a driving force acting on it to keep it moving. In reality, if velocity is constant (meaning both speed and direction are unchanged), the resultant force is exactly zero; any driving force is perfectly balanced by resistive forces like friction.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "State Newton's third law of motion and give a careful example that highlights the \"different bodies\" subtlety. (4 steps)", "answer": "- Step 1: Newton's third law: for every action there is an equal and opposite reaction.\n- Step 2: Interpretation: if body $$A$$ exerts a force on body $$B$$, then body $$B$$ exerts a force on body $$A$$ that is equal in magnitude and opposite in direction.\n- Step 3: Key subtlety: action-reaction pairs act on **different bodies**. This is often missed. Example:\n+ A book on a table. The book's weight (Earth pulls book down) and the normal reaction (table pushes book up) are both forces **on the book**, so they are NOT a Newton-3 pair — they're equal only because the book is in equilibrium.\n+ The Newton-3 pair of \"Earth pulls book down\" is \"book pulls Earth up\" (with the same tiny force!).\n+ The Newton-3 pair of \"table pushes book up\" is \"book pushes table down.\"\n- Step 4: Each \"contact\" between two objects produces a mutual force pair. Newton 3 is universal — it applies to ALL interactions, not just contact forces.\n\nMisconception probe: if Newton-3 always balances things, why does anything ever accelerate? Answer: because the pair acts on different bodies. The \"book pushes table down\" doesn't cancel \"table pushes book up\" on the book's motion — they're on different objects.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "A horizontal force of 10 N acts on a 3 kg particle on a ROUGH horizontal plane, producing an acceleration of 2 m/s². Conceptually find the frictional force. (3 steps)", "answer": "- Step 1: Net horizontal force = $$10 - F_{\\text{friction}}$$ (friction opposes motion).\n- Step 2: By $$F = ma$$: $$10 - F = 3 \\times 2 = 6$$.\n- Step 3: Solve: $$F = 10 - 6 = 4\\,\\text{N}$$.\n\nInsight: the applied force does two things — one part accelerates the mass (6 N worth), the other part overcomes friction (4 N worth). If there were no friction, all 10 N would go into acceleration, giving $$a \\approx 3.33\\,\\text{m/s}^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "How do you find the resultant of two forces given as vectors $$(p\\mathbf{i} + q\\mathbf{j})\\,\\text{N}$$ and $$(r\\mathbf{i} + s\\mathbf{j})\\,\\text{N}$$, and why does this rule work? (2 steps)", "answer": "- Step 1: Add component-wise: resultant = $$((p+r)\\mathbf{i} + (q+s)\\mathbf{j})\\,\\text{N}$$.\n- Step 2: Why this works: each force is a vector sum of an $$\\mathbf{i}$$-component and a $$\\mathbf{j}$$-component. Because $$\\mathbf{i}$$ and $$\\mathbf{j}$$ are perpendicular unit vectors, adding forces along each axis is independent (the i-direction can't interfere with the j-direction). So you literally add the i-parts separately from the j-parts.\n\nThis is just vector addition, expressed in component form. Graphically, it's the \"tip-to-tail\" rule for adding vectors.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Two forces act on a particle: $$\\mathbf{F}_1 = (2\\mathbf{i} + 3\\mathbf{j}) \\text{ N}$$ and $$\\mathbf{F}_2 = (-5\\mathbf{i} + 4\\mathbf{j}) \\text{ N}$$. Explain conceptually how to find the resultant force $$\\mathbf{R}$$ and what its components represent. (2 steps)", "answer": "- Step 1: The resultant force $$\\mathbf{R}$$ is the vector sum of all forces acting on the particle. Since vectors can be added component-wise, you add the $$\\mathbf{i}$$-components together and the $$\\mathbf{j}$$-components together: $$\\mathbf{R} = (2-5)\\mathbf{i} + (3+4)\\mathbf{j} = -3\\mathbf{i} + 7\\mathbf{j} \\text{ N}$$.\n- Step 2: The components represent the net effect of the forces in the perpendicular directions (e.g., East/West and North/South). The $$-3\\mathbf{i}$$ means there is a net force of 3 N acting in the negative $$\\mathbf{i}$$ direction (West), and the $$7\\mathbf{j}$$ means there is a net force of 7 N acting in the positive $$\\mathbf{j}$$ direction (North).", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Given particles of masses $$km$$ and $$3m$$ on a smooth pulley (with $$k < 3$$), it is observed that the heavier descends with acceleration $$\\frac{1}{3}g$$. Conceptually find $$k$$. (4 steps)", "answer": "- Step 1: The heavier ($$3m$$) descends, lighter ($$km$$) ascends, both with magnitude $$\\frac{g}{3}$$.\n- Step 2: For heavier (down positive): $$3mg - T = 3m \\cdot \\frac{g}{3} = mg \\Rightarrow T = 2mg$$.\n- Step 3: For lighter (up positive): $$T - kmg = km \\cdot \\frac{g}{3} \\Rightarrow 2mg - kmg = \\frac{kmg}{3}$$.\n- Step 4: Solve: $$2 - k = \\frac{k}{3} \\Rightarrow 6 - 3k = k \\Rightarrow k = 1.5$$.\n\nConsistency check: $$k = 1.5 < 3$$ ✓ (lighter particle).\n\nTakeaway: given any two facts (mass ratio, acceleration, tension), you can determine the third.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "A woman of mass 60 kg stands on scales inside a lift. The lift accelerates downwards at 2 m/s². If her normal weight is 588 N (60g), will the scales read more than 588 N, less than 588 N, or exactly 588 N during this downward acceleration? Explain using Newton's Second Law. (2 steps)", "answer": "- Step 1: The scales measure the normal reaction force R between the woman and the scales. Resolving vertically for the woman: $$R - mg = ma$$, where $$a$$ is the lift's acceleration.\n- Step 2: Since the lift accelerates downwards, $$a = -2$$ m/s² (taking upward as positive). The equation becomes $$R - 588 = 60 \\times (-2) = -120$$, so $$R = 588 - 120 = 468$$ N. The scales will read less than her normal weight (468 N), making her feel \"lighter\".", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "In a pulley-table problem where the hanging mass hits the ground and then the table mass eventually stops, how do you compute the total distance the table mass travels? (3 steps)", "answer": "- Step 1: Phase 1: table mass travels from start position to position where hanging mass hits ground. This distance equals the initial height of the hanging mass above the ground (both move the same distance due to inextensibility).\n- Step 2: Phase 2: after string goes slack, table mass decelerates under friction only. Find the speed at the transition (equal to the speed just before hanging mass hit the ground), then apply $$v^2 = u^2 + 2a's$$ with $$v = 0$$ to find additional distance $$s$$.\n- Step 3: Total distance = phase 1 distance + phase 2 distance.\n\nCritical: remember to use the CORRECT acceleration in each phase. Phase 1 has coupled acceleration; phase 2 has friction-only deceleration. Mixing them gives wrong answers.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Particles $$P$$ (5 kg) and $$Q$$ (3 kg), joined by a string on a rough horizontal plane, are pulled by a 40 N force on $$P$$. Friction on $$P$$ = 10 N, on $$Q$$ = 6 N. Why is the \"whole-system\" approach quickest to find acceleration? (4 steps)", "answer": "- Step 1: Treat as a single particle: total mass = $$5 + 3 = 8\\,\\text{kg}$$. External forces along motion: 40 N pull, 10 N friction on P, 6 N friction on Q.\n- Step 2: Tension is internal: it pulls $$P$$ backward and $$Q$$ forward with equal magnitudes (Newton 3), so it cancels out in the system equation.\n- Step 3: Equation: $$40 - 10 - 6 = 8a \\Rightarrow a = 3\\,\\text{m/s}^2$$.\n- Step 4: Alternative (separate particles): two equations, $$40 - T - 10 = 5a$$ and $$T - 6 = 3a$$. Adding eliminates $$T$$ — same result, more work.\n\nThe whole-system approach buys you the acceleration \"for free\" without touching the unknown tension.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What is a force diagram, and why is drawing one the essential first step in any dynamics problem? (3 steps)", "answer": "- Step 1: A force diagram is a labelled sketch showing **every force** acting on an object, each drawn as an arrow whose direction represents the force's line of action and whose label represents its magnitude.\n- Step 2: It transforms a verbal description into a visual, exhaustive inventory of forces. Without it, you risk omitting a force (e.g., forgetting friction or a normal reaction) or misidentifying directions.\n- Step 3: Only after the diagram is complete can you resolve forces along a chosen axis to apply $$F = ma$$ or check for equilibrium. Skipping this step is the single most common source of errors in mechanics.\n\nTakeaway: the diagram is not decoration — it's the model.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why is the acceleration in a pulley system always LESS than $$g$$ (for non-zero tension)? (3 steps)", "answer": "- Step 1: For the heavier particle descending, the equation is $$Mg - T = Ma$$, giving $$a = g - T/M$$.\n- Step 2: Since tension $$T > 0$$ (string is taut), the term $$T/M > 0$$, so $$a < g$$.\n- Step 3: Physically: if there were no string (free fall), $$a = g$$. The string provides resistance (tension) that slows the descent; some of gravity is \"diverted\" to accelerate the other particle. Therefore the coupled system always accelerates less than free fall.\n\nLimiting case: if the other particle's mass → 0, the tension → 0, and $$a \\to g$$ (no restraint).", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "If a lift of mass 500 kg with passengers (total 300 kg) accelerates from rest to 3 m/s over 5 m while moving DOWN, what tension must the cable provide? Outline the approach. (4 steps)", "answer": "- Step 1: Find the acceleration using kinematics: $$v^2 = u^2 + 2as$$ with $$u = 0$$, $$v = 3$$, $$s = 5$$. So $$9 = 10a \\Rightarrow a = 0.9\\,\\text{m/s}^2$$ (downward).\n- Step 2: Total mass = 800 kg. Forces: tension $$T$$ up, weight $$800g$$ down. Taking down as positive (matching acceleration): $$800g - T = 800 \\times 0.9$$.\n- Step 3: Solve: $$T = 800g - 720 = 800 \\times 9.8 - 720 = 7840 - 720 = 7120\\,\\text{N}$$.\n- Step 4: Since the lift accelerates downward, $$T < 800g$$ — cable supports LESS than the static weight. Makes physical sense: if it accelerates down, gravity wins partially.\n\nPattern: kinematics gives acceleration; dynamics then gives the force.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Three vector forces act on a particle in equilibrium: $$(-3\\mathbf{i}+7\\mathbf{j})$$, $$(\\mathbf{i}-\\mathbf{j})$$, and $$(p\\mathbf{i}+q\\mathbf{j})$$. Conceptually find $$p$$ and $$q$$. (3 steps)", "answer": "- Step 1: Equilibrium ⟹ total resultant = $$\\mathbf{0}$$. So sum of all i-components = 0, and sum of all j-components = 0.\n- Step 2: i-equation: $$-3 + 1 + p = 0 \\Rightarrow p = 2$$.\n- Step 3: j-equation: $$7 - 1 + q = 0 \\Rightarrow q = -6$$.\n\nThe unknown force is $$(2\\mathbf{i} - 6\\mathbf{j})\\,\\text{N}$$ — it precisely cancels the sum of the other two.\n\nPattern: any force \"making a system equilibrium\" is the negative of the sum of all other forces.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "What does it mean for a particle to be \"in equilibrium\"? Why does equilibrium NOT imply the particle is at rest? (3 steps)", "answer": "- Step 1: Equilibrium means the **resultant force is zero** — all forces balance.\n- Step 2: By Newton's first law, zero resultant force means zero acceleration, so the velocity is constant.\n- Step 3: Constant velocity includes two sub-cases:\n+ The particle is at rest (velocity = 0 is a constant).\n+ The particle is moving uniformly (constant speed AND constant direction).\n\nTakeaway: equilibrium is about \"not accelerating,\" not about \"not moving.\" A truck cruising at 60 km/h on a flat road is in equilibrium just as much as a box on a shelf.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "When can you treat a system of connected particles as a SINGLE particle? When must you treat them separately? (4 steps)", "answer": "- Step 1: Treat as a single particle IF AND ONLY IF all parts move in the same straight line with the same velocity and acceleration.\n+ Examples: connected masses on a horizontal surface, a train with carriages, a stack of boxes in a lift.\n- Step 2: When treated as single particle, **internal forces** (string tension, rod thrust, contact forces between components) cancel in Newton-3 pairs and DISAPPEAR from the system equation. Only external forces matter.\n- Step 3: Must treat separately when:\n+ You want to find an internal force (e.g., the tension in the connecting string).\n+ The parts move in different directions (e.g., particles on opposite sides of a pulley).\n- Step 4: Typical strategy: use the \"whole-system\" view to quickly find the common acceleration (no tensions needed); then isolate one particle to expose the internal force.\n\nPower move: two equations from two particles share $$T$$ and $$a$$, solvable simultaneously; whole-system collapses this to one equation.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "How does the acceleration of a system of connected particles change if the string is replaced by a heavier rope?", "answer": "- Step 1: **Mass of string/rope**: A heavy rope contributes to total mass, reducing acceleration ($a = F_{\\text{net}}/(m_{\\text{total}})$).  \n- Step 2: **Tension variation**: In a heavy rope, tension increases along the rope’s length, complicating analysis.  \n- Step 3: **Light string assumption**: Light strings have negligible mass, keeping tension uniform and simplifying $a = F_{\\text{net}}/(m_1 + m_2)$.  \n\n**Takeaway:** Real ropes add complexity; the light string assumption is a pedagogical tool for simplicity.", "source": "Qwen 3 ①", "_id": "qwen_1_15"}, {"question": "Why can a string hold a hanging mass (supporting its weight) but cannot push the mass upward if left slack?", "answer": "A string can only exert a **pulling** force along its length — it resists being stretched but cannot resist being compressed. When a mass hangs from a taut string, the string pulls up on the mass (tension) and the mass pulls down on the string (Newton 3). If the string is slack (not pulled taut), it simply crumples rather than pushing back. This is the fundamental asymmetry between strings and rods: rods are rigid and can push (thrust) as well as pull (tension), while strings can only pull.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "A particle is in equilibrium under three forces. What does this tell you about the vector sum of these forces? If two of the forces are (3i + 2j) N and (4i - j) N, what must the third force be? (2 steps)", "answer": "- Step 1: For equilibrium, the resultant force must be zero: the vector sum of all forces = 0i + 0j.\n- Step 2: If two forces are (3i + 2j) and (4i - j), their sum is (7i + j). For equilibrium, the third force must be -(7i + j) = (-7i - j) N. This exactly cancels the other two forces.", "source": "MiniMax ②", "_id": "minimax_2_46"}, {"question": "Particles $$P$$ (mass $$2m$$) and $$Q$$ (mass $$3m$$) hang from a smooth pulley via a light inextensible string. Derive their common acceleration from first principles. (5 steps)", "answer": "- Step 1: $$Q$$ is heavier, so $$Q$$ descends and $$P$$ ascends. Both have the same magnitude of acceleration $$a$$ (inextensible string). Tension $$T$$ is the same throughout (light, smooth pulley).\n- Step 2: Equation of motion for $$P$$ (upward positive): $$T - 2mg = 2ma$$. $$\\quad$$ (1)\n- Step 3: Equation of motion for $$Q$$ (downward positive for $$Q$$): $$3mg - T = 3ma$$. $$\\quad$$ (2)\n- Step 4: Add (1) and (2) to eliminate $$T$$: $$3mg - 2mg = (3m + 2m)a$$, giving $$mg = 5ma$$.\n- Step 5: Therefore $$a = \\frac{g}{5} \\approx 1.96\\,\\text{m/s}^2$$.\n\nIntuition: the system is driven by the weight DIFFERENCE ($$mg$$) and slowed by the TOTAL inertia ($$5m$$). The \"net gravity fraction\" $$1/5$$ determines the acceleration. If masses were equal, the system wouldn't accelerate.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Explain what \"light and inextensible\" mean for a string, and why each assumption simplifies the analysis. (3 steps)", "answer": "- Step 1: **Light** = mass of the string is negligible. Consequence:\n+ Tension is the SAME throughout the string's length (no string section needs to \"support\" other sections).\n+ The string contributes no weight to the system.\n- Step 2: **Inextensible** = the string does not stretch. Consequence:\n+ If one end moves, the other end moves the same distance at the same time.\n+ Connected particles share the SAME magnitude of velocity and acceleration.\n- Step 3: Together: both ends of the string are rigidly linked with a single common tension $$T$$ — so two connected particles give two equations of motion with just ONE $$T$$ and ONE $$a$$ to solve for. Without these idealisations, you'd have different tensions at each end and potentially different accelerations — much harder.\n\nReal strings have mass and stretch, but these effects are negligible for typical physics problems.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why does equilibrium of a particle under vector forces force BOTH the i-components and the j-components to sum to zero separately? (3 steps)", "answer": "- Step 1: Equilibrium means the resultant force is the zero vector: $$\\mathbf{R} = 0\\mathbf{i} + 0\\mathbf{j}$$.\n- Step 2: Two vectors are equal if and only if their corresponding components are equal. So if $$\\left(\\sum F_x\\right)\\mathbf{i} + \\left(\\sum F_y\\right)\\mathbf{j} = 0\\mathbf{i} + 0\\mathbf{j}$$, then $$\\sum F_x = 0$$ AND $$\\sum F_y = 0$$.\n- Step 3: The vector equation thus splits into two scalar equations, each solvable independently. This is extremely useful for finding multiple unknowns (typically two) in equilibrium problems.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Explain why, when finding the normal reaction on an object on a horizontal surface, you often don't need to use F = ma vertically. When would you need to use it? (2 steps)", "answer": "- Step 1: On a horizontal surface with no vertical acceleration, vertical forces balance: R = mg. This is often stated without calculation because it's obvious from equilibrium.\n- Step 2: You need to use F = ma vertically when there IS vertical acceleration, such as: objects in accelerating lifts, objects being pushed down/upward, or when additional vertical forces are applied. In these cases, R ≠ mg.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "A box on a rough table is connected to a hanging sphere. After the sphere descends and hits the ground, what happens to the box on the table? How do you analyze this two-stage motion? (3 steps)", "answer": "- Step 1: When the hanging mass hits the ground, the string becomes slack (T = 0). The box continues moving due to its inertia but now decelerates due to friction only.\n- Stage 1: Both connected, analyze with pulley equations. Find speed at moment of impact.\n- Stage 2: After impact, box has initial speed v₀. With friction only (no tension), find deceleration a' = -F/m. Then use kinematic equations to find how far it travels before stopping.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "When solving a problem with multiple forces in 2D, why is it usually better to split into i- and j-components rather than using magnitudes and angles? (3 steps)", "answer": "- Step 1: Components obey linear addition: $$\\sum F_x = \\sum (F_i)_x$$ — just add numbers.\n- Step 2: Magnitudes do NOT simply add: $$|F_1 + F_2| \\neq |F_1| + |F_2|$$ in general (only if they're parallel).\n- Step 3: By splitting into components, complex 2D problems become two independent 1D problems on perpendicular axes. Once you have the component resultants, you can always reconstruct magnitude and direction via Pythagoras and $$\\tan$$ if needed.\n\nComponent arithmetic is the workhorse of 2D force and kinematics problems.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "A particle A of mass 4 kg rests on a rough horizontal table attached to a string that passes over a smooth pulley at the edge. Particle B of mass 3 kg hangs on the other end. The system is released from rest. B descends 2 m and then hits the ground. Describe the two distinct phases of motion for particle A, and for each phase, state what forces are acting on A horizontally. (3 steps)", "answer": "- Step 1: Phase 1: B is descending. A is being pulled by the string. Horizontally, A experiences the tension T pulling it towards the pulley, and the friction force F opposing its motion. A accelerates.\n- Step 2: Phase 2: B has hit the ground. The string goes slack, so tension T becomes zero. Horizontally, A only experiences the friction force F opposing its motion.\n- Step 3: Because the only horizontal force on A in Phase 2 is friction, A decelerates. It will continue to slide for a bit, slowing down until it eventually comes to rest.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "In problem setups involving a pulley, why does the common acceleration have the same MAGNITUDE but opposite DIRECTIONS for the two particles? (3 steps)", "answer": "- Step 1: The string is inextensible — when one particle moves a distance $$d$$ toward the pulley, the other must move $$d$$ away from it (string can't stretch or compress).\n- Step 2: So if one goes up by $$d$$, the other goes down by $$d$$. Same magnitude of displacement; opposite directions.\n- Step 3: Consequently, same magnitudes of velocity and acceleration, but opposite directions. This gives us ONE scalar $$a$$ in our equations (the magnitude), with the direction handled by the sign convention for each particle.\n\nPulley = kinematic constraint linking two particles via the string's length.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "A lift contains stacked boxes $$A$$ (on top) and $$B$$ (below), with total mass $$M$$. The lift accelerates upward. Why is the force that $$B$$ exerts on $$A$$ NOT simply the weight of $$A$$? (3 steps)", "answer": "- Step 1: If the lift were in equilibrium (constant velocity), $$A$$ would need only its weight balanced — so $$B$$ would push up on $$A$$ with force $$m_A g$$.\n- Step 2: But the lift accelerates upward. $$A$$ must ALSO share this acceleration. Isolate $$A$$: forces on it are weight $$m_A g$$ down and reaction $$R$$ from $$B$$ up. Equation: $$R - m_A g = m_A a \\Rightarrow R = m_A(g + a)$$.\n- Step 3: So $$R > m_A g$$: $$B$$ pushes $$A$$ harder than just its weight, by an extra factor that accounts for the upward acceleration. By Newton 3, $$A$$ pushes DOWN on $$B$$ with the same force $$R$$.\n\nIntuition: to accelerate $$A$$ upward, $$B$$ must provide not only weight-support but also the extra push for acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Why are \"action\" and \"reaction\" sometimes confused with \"balanced forces\"? What's the critical distinction? (3 steps)", "answer": "- Step 1: Balanced forces act on the SAME body and cancel each other's effect, leading to equilibrium. Example: weight of a book (from Earth) and normal reaction (from table) — both act on the book.\n- Step 2: Newton-3 action-reaction pairs act on DIFFERENT bodies. Example: table pushes book up (on book); book pushes table down (on table). These are a Newton-3 pair, but they do NOT cancel each other's motion effect because they're on separate bodies.\n- Step 3: The defining question: \"Do these two forces act on the same object?\"\n+ Yes → balanced forces (contribute to equilibrium of that object).\n+ No → Newton-3 pair (each contributes to its own object's motion).\n\nIf action-reaction truly cancelled motion, nothing could ever accelerate — but they act on different objects, so each \"unbalanced\" force drives the motion of its own body.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "A particle has 20 N to the right, 20 N to the left, 30 N upward, and 10 N downward acting on it. Describe its resultant and resulting motion. (4 steps)", "answer": "- Step 1: Resolve horizontally: $$20 - 20 = 0$$. Horizontal forces are balanced.\n- Step 2: Resolve vertically: $$30 - 10 = 20\\,\\text{N}$$ upward.\n- Step 3: Resultant force is 20 N directed vertically upward.\n- Step 4: By Newton's second law, the particle **accelerates** in the direction of the resultant — so it accelerates upward. It is NOT necessarily moving upward right now; it could be momentarily at rest, or moving downward and slowing, or moving upward and speeding up.\n\nSubtlety: the resultant determines acceleration, not velocity. Never confuse the two.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "A mass $$m_1$$ rests on a rough horizontal table, connected by a string over a smooth pulley at the edge to a hanging mass $$m_2$$. When writing the equation of motion for $$m_1$$ horizontally, what forces must be included, and how does friction act? (3 steps)", "answer": "- Step 1: The horizontal forces on $$m_1$$ are the tension $$T$$ pulling it towards the pulley, and the friction $$F$$ opposing its motion.\n- Step 2: Assuming $$m_1$$ moves towards the pulley, friction acts in the opposite direction (away from the pulley). The equation of motion is $$T - F = m_1 a$$.\n- Step 3: For the hanging mass $$m_2$$, the forces are its weight $$m_2 g$$ downwards and tension $$T$$ upwards. The equation of motion is $$m_2 g - T = m_2 a$$. Note that we assume the same magnitude of $$T$$ and $$a$$ for both due to the light, inextensible string and smooth pulley.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "Why do we treat the weight of the lift, boxes, and passengers as acting at single points when analysing forces, despite them being extended objects? (3 steps)", "answer": "- Step 1: In A-Level mechanics, we model objects as **particles** — point-like entities with mass but no extent, no rotation.\n- Step 2: For translational motion (movement without rotation), an extended rigid body behaves exactly as if all its mass were concentrated at its centre of mass. This follows from Newton's second law applied to the body's centre of mass.\n- Step 3: So treating weight as a single force at a point is an approximation that's EXACT for translational problems, and it dramatically simplifies the analysis. In later topics (moments, rigid bodies), this approximation is partially relaxed.\n\nThis is why you draw a single arrow labelled $$W$$ at the centre of a block — that arrow captures the full gravitational effect on its translation.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What is the physical meaning of the tension being \"less than\" the weight of the hanging mass in a pulley system with a table? (3 steps)", "answer": "- Step 1: For the hanging mass: $$T < mg$$ means the tension up is less than the weight down, so the NET force is downward, and the mass accelerates down.\n- Step 2: The tension can't fully support the weight because the string is also being used to drag the table mass forward (against friction). Some of the hanging mass's \"gravitational pull\" goes into pulling the table mass.\n- Step 3: Conservation of force: the hanging mass's weight is \"shared\" between (a) its own downward acceleration, and (b) pulling the table mass forward via the string.\n\nIf the table were infinitely heavy (immovable), the hanging mass couldn't descend — the tension would equal the weight, and nothing would accelerate.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "Mass A is on a rough horizontal table, connected by a light inextensible string over a smooth pulley at the edge to mass B hanging freely. Walk through how to set up the equations to find the acceleration of the system and the tension. (3 steps)", "answer": "- Step 1: For mass A (on the table), resolve horizontally in the direction of acceleration (towards the pulley). The pulling force is tension $$T$$, and the opposing force is friction $$F$$. Equation: $$T - F = m_A a$$.\n- Step 2: For mass B (hanging), resolve vertically in the direction of acceleration (downwards). The downward force is weight $$m_B g$$, and the upward force is tension $$T$$. Equation: $$m_B g - T = m_B a$$.\n- Step 3: You now have two simultaneous equations with two unknowns ($$T$$ and $$a$$). Add the equations to eliminate $$T$$: $$(T - F) + (m_B g - T) = m_A a + m_B a$$, which simplifies to $$m_B g - F = (m_A + m_B)a$$, allowing you to solve for $$a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "If a lift cable tension equals the total weight inside (lift + passengers), what can be said about the motion of the lift? (3 steps)", "answer": "- Step 1: Net vertical force on the lift = Tension (up) − Weight (down) = 0.\n- Step 2: By $$F = ma$$, acceleration $$a = 0$$.\n- Step 3: Zero acceleration means constant velocity — which includes two cases: (a) the lift is at rest, or (b) the lift is moving with constant velocity (up or down).\n\nThe tension equalling weight is the defining condition for no acceleration, NOT for being stationary.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "A 5 kg body is pulled horizontally by a 20 N force on a rough table with a 4 N friction force. Conceptually determine the acceleration and the normal reaction. (3 steps)", "answer": "- Step 1: **Horizontal** (direction of motion): net force = $$20 - 4 = 16\\,\\text{N}$$ forward. Apply $$F = ma$$: $$a = 16/5 = 3.2\\,\\text{m/s}^2$$ in the pulling direction.\n- Step 2: **Vertical**: the body moves horizontally only, so its vertical acceleration is zero. Forces balance vertically.\n- Step 3: Vertical forces: normal reaction $$R$$ up, weight $$mg = 5 \\times 9.8 = 49\\,\\text{N}$$ down. So $$R - 49 = 5 \\times 0 = 0$$, giving $$R = 49\\,\\text{N}$$.\n\nKey insight: separating the problem into two axes decouples \"what the body is doing horizontally\" from \"what
