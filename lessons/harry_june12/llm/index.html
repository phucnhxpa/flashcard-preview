answer without using a piece of information (like a right angle or specific side length), it was likely a decoy. Conversely, if your answer doesn't match the options, you probably missed using essential information. The problem is designed so that using all essential facts leads to an option, while decoys test whether you can identify what's actually needed.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "When simplifying the algebraic fraction $$4 + \\frac{4-x^2}{x^2-2x}$$, what is the critical sign error that commonly occurs, and why does it happen? (3 steps)", "answer": "- Step 1: The error occurs when distributing the minus sign in front of a fraction. Students often write $$4 - \\frac{x+2}{x} = 4 - \\frac{x}{x} + \\frac{2}{x}$$, making the x term positive.\n- Step 2: The correct distribution is $$4 - \\frac{x+2}{x} = 4 - \\frac{x}{x} - \\frac{2}{x} = 4 - 1 - \\frac{2}{x} = 3 - \\frac{2}{x}$$.\n- Step 3: This happens because the minus sign must multiply every term in the numerator, not just the first term. The fraction $$-\\frac{x+2}{x}$$ equals $$-\\frac{x}{x} - \\frac{2}{x}$$, not $$-\\frac{x}{x} + \\frac{2}{x}$$.\n\nAlways bracket the entire fraction when subtracting: $$4 - \\left(\\frac{x+2}{x}\\right)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What is the reversed-factor relationship, and why is it crucial for algebraic fraction simplification?", "answer": "The reversed-factor relationship states that $$a - b = -(b - a)$$, which means $$\\frac{a-b}{b-a} = -1$$. This is crucial because when you see the same two terms in opposite order in numerator and denominator (like $$2-x$$ and $$x-2$$), you can immediately factor out $$-1$$ instead of trying to factor normally. For example, $$4-x^2 = -(x^2-4) = -(x-2)(x+2)$$, and when this appears over $$x^2-2x = x(x-2)$$, the $$(x-2)$$ terms cancel, leaving the $$-1$$ coefficient that affects the final sign.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "In quadratic inequalities, explain the conceptual difference between \"inside the roots\" and \"outside the roots\" solutions, and how the parabola's orientation determines which you keep. (3 steps)", "answer": "- Step 1: For a quadratic $$ax^2 + bx + c$$ with roots $$r_1$$ and $$r_2$$, \"inside the roots\" means $$r_1 < x < r_2$$ (between the roots), while \"outside the roots\" means $$x < r_1$$ or $$x > r_2$$ (beyond the roots on both sides).\n- Step 2: If $$a > 0$$, the parabola opens upward, so it's positive outside the roots and negative inside. If $$a < 0$$, the parabola opens downward, so it's positive inside the roots and negative outside.\n- Step 3: For $$\\geq 0$$ or $$> 0$$, keep the positive regions. For $$\\leq 0$$ or $$< 0$$, keep the negative regions. The inequality sign determines which regions you want, and the parabola's orientation tells you where those regions are.\n\nTwo separated regions always connect with \"OR\", never \"AND\".", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why do students often confuse \"AND\" versus \"OR\" in quadratic inequality solutions, and what visual cue prevents this error?", "answer": "Students confuse them because they focus on the boundary numbers rather than the solution regions. The visual cue is to always sketch the parabola: if your solution consists of two separated intervals on the number line (like $$x \\leq -4$$ or $$x \\geq 2$$), these are disjoint sets that require \"OR\" because a number cannot simultaneously be less than -4 AND greater than 2. If your solution is one connected interval (like $$-1 \\leq x \\leq 3$$), that's a single condition requiring \"AND\" (greater than -1 AND less than 3). Separated regions = OR; connected regions = AND.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "For the reciprocal function $$y = \\frac{1}{x} + 1$$, explain what happens to each asymptote and why. (2 steps)", "answer": "- Step 1: The horizontal asymptote moves from $$y = 0$$ to $$y = 1$$ because as $$x \\to \\pm\\infty$$, $$\\frac{1}{x} \\to 0$$, so $$\\frac{1}{x} + 1 \\to 1$$. The vertical translation $$+1$$ shifts all y-values up by 1 unit.\n- Step 2: The vertical asymptote remains at $$x = 0$$ because the transformation doesn't affect what makes the function undefined. The expression $$\\frac{1}{x} + 1$$ is still undefined when $$x = 0$$, regardless of the added constant.\n\nVertical translations move horizontal asymptotes but never move vertical asymptotes.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "When counting intersections between $$y = \\tan(ax)$$ and $$y = \\frac{1}{x} + 1$$, what is the systematic branch-counting procedure? (4 steps)", "answer": "- Step 1: Identify the period of $$\\tan(ax)$$, which is $$\\frac{\\pi}{|a|}$$, and mark all vertical asymptotes within the given interval.\n- Step 2: Mark the interval endpoints clearly on your graph and identify how the asymptotes divide the interval into separate branches.\n- Step 3: On each complete branch of the tangent function, determine visually whether $$y = \\frac{1}{x} + 1$$ intersects it once (typically yes for full monotonic branches) or not at all.\n- Step 4: Count each branch individually, paying special attention to partial branches at the interval endpoints and near $$x = 0$$ where the reciprocal function has its own asymptote.\n\nNever use \"periods × solutions-per-period\" shortcuts because $$\\frac{1}{x} + 1$$ is not periodic.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "For the cosine equation $$\\cos(2x) = p$$ on $$0 \\leq x \\leq 225°$$, why is the endpoint $$x = 225°$$ a potential trap when finding values of $$p$$ that give exactly two solutions?", "answer": "The endpoint $$x = 225°$$ is a trap because $$\\cos(2 \\cdot 225°) = \\cos(450°) = \\cos(90°) = 0$$. This means the point $$(225°, 0)$$ lies on the curve. If you're looking for $$p$$ values giving exactly two solutions and you choose $$p = 0$$, you get intersections at $$x = 45°, 135°$$ (from the main curve) plus $$x = 225°$$ (the endpoint), giving three solutions instead of two. You must test endpoint values separately because they can add an unexpected extra solution, changing your count and making $$p = 0$$ incorrect for \"exactly two.\"", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "In the cosine transformation $$y = A\\cos(kx) + C$$, explain how each parameter affects the range and period, and why understanding this helps count solutions systematically. (3 steps)", "answer": "- Step 1: The amplitude $$|A|$$ stretches the oscillation vertically, the period becomes $$\\frac{360°}{|k|}$$, and the midline shifts to $$y = C$$. The range becomes $$[C - |A|, C + |A|]$$.\n- Step 2: When solving $$\\cos(kx) = p$$, you need $$p$$ to be within the range $$[-1, 1]$$ for solutions to exist. The number of solutions depends on how many times the horizontal line $$y = p$$ intersects the cosine curve in your interval.\n- Step 3: Systematic counting requires identifying: the curve's maximum ($$p = 1$$), minimum ($$p = -1$$), zeros ($$p = 0$$), and how many complete periods fit in your interval. Values at extremes give fewer intersections; values between extremes typically give more.\n\nEach period contributes a predictable number of intersections for most $$p$$ values.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What is the conceptual difference between solving $$\\cos(2x) = p$$ on $$[0°, 225°]$$ versus $$[0°, 360°]$$, and why does this affect the answer for \"exactly two solutions\"? (2 steps)", "answer": "- Step 1: On $$[0°, 225°]$$, the curve $$\\cos(2x)$$ completes 1.25 periods, ending at a zero. On $$[0°, 360°]$$, it completes exactly 2 full periods, ending at a maximum. The different endpoints change which $$p$$ values are viable.\n- Step 2: For \"exactly two solutions,\" the shorter interval $$[0°, 225°]$$ allows $$p = 1$$ (hitting peaks at $$x = 0°, 180°$$) and $$-1 < p < 0$$ (avoiding the endpoint trap at $$x = 225°$$). The longer interval $$[0°, 360°]$$ makes $$p = 1$$ give three solutions ($$x = 0°, 180°, 360°$$) because both endpoints are maxima, so only $$p = -1$$ works reliably.\n\nThe interval length and endpoint positions are part of the question, not just details.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Explain why the \"homework as diagnostic\" approach is more effective than treating homework as required busywork. (3 steps)", "answer": "- Step 1: Homework serves as a mistake-detection system rather than a completion requirement. Its primary value is revealing error patterns you haven't yet identified from lessons alone.\n- Step 2: The optimal sequence is: consolidate lesson mistakes into guides and flashcards first, then redo lesson questions cold to test retention, and only then do homework to surface new mistake types.\n- Step 3: This approach prevents homework from becoming mechanical repetition of known methods. Instead, it becomes targeted practice that expands your error database and reveals gaps in understanding that lessons didn't expose.\n\nHomework finds the mistakes you don't know you're making.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "In Phuc's lesson-to-flashcard workflow, what are the two types of flashcards he creates, and why is each type valuable for different aspects of learning? (2 steps)", "answer": "- Step 1: Q&A flashcards test conceptual understanding (definitions, methods, why formulas work) while \"redo\" flashcards present the original question image and require complete re-solving without notes.\n- Step 2: Q&A cards build theoretical knowledge and prevent formula memorization without understanding. Redo cards test practical application and ensure you can execute complete solutions under exam conditions, bridging the gap between knowing concepts and solving problems.\n\nThe combination ensures both conceptual depth and procedural fluency.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "When factoring the quadratic $$x^2 - x - 2$$, explain the systematic approach for finding factors and the common error to avoid. (3 steps)", "answer": "- Step 1: Find two numbers that multiply to the constant term (-2) and add to the coefficient of x (-1). The pairs that multiply to -2 are: (1, -2) and (-1, 2).\n- Step 2: Test which pair adds correctly: $$1 + (-2) = -1$$ ✓, so the factors are $$(x + 1)(x - 2)$$.\n- Step 3: The common error is confusing the signs or the order. Always verify by expanding: $$(x + 1)(x - 2) = x^2 - 2x + x - 2 = x^2 - x - 2$$ ✓.\n\nFor $$ax^2 + bx + c$$, you need factors of $$c$$ that sum to $$b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why is it essential to check that your geometry answer matches one of the given options, and what should you do if it doesn't? (2 steps)", "answer": "- Step 1: ESAT problems are designed so that correct application of all essential information yields one of the provided options. If your answer doesn't match, it indicates either a calculation error or, more commonly, that you've missed using a crucial piece of given information.\n- Step 2: Stop calculating and re-read the problem to identify unused facts. Look for conditions like \"midpoint,\" \"parallel,\" \"right angle,\" or numerical ratios that you haven't incorporated. The missing information usually provides the key relationship needed to reach the correct option.\n\nYour answer not being an option is a built-in error detection system.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "For the inequality $$x^2 \\geq 8 - 2x$$, walk through the complete solution process emphasizing the key decision points. (4 steps)", "answer": "- Step 1: Rearrange to standard form: $$x^2 + 2x - 8 \\geq 0$$.\n- Step 2: Factor the quadratic: Find factors of -8 that sum to 2, which are 4 and -2, giving $$(x + 4)(x - 2) \\geq 0$$.\n- Step 3: Identify roots $$x = -4$$ and $$x = 2$$, then sketch the upward-opening parabola. It's positive (above x-axis) outside the roots and negative between them.\n- Step 4: Since we want $$\\geq 0$$ (positive regions), the solution is $$x \\leq -4$$ or $$x \\geq 2$$. Use \"OR\" because these are separated intervals.\n\nThe parabola's orientation and inequality direction determine which regions to keep.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What is the mathematical significance of the period $$\\frac{\\pi}{|a|}$$ for $$\\tan(ax)$$, and how does this help in intersection counting?", "answer": "The period $$\\frac{\\pi}{|a|}$$ represents how quickly the function repeats its pattern. For $$\\tan(ax)$$ with $$a > 1$$, the function oscillates $$a$$ times faster than $$\\tan(x)$$, creating $$a$$ times as many vertical asymptotes and branches in the same interval. This helps intersection counting because you can determine how many complete periods fit in your interval, then count intersections per period systematically. However, you must still check partial periods at the boundaries and be careful near $$x = 0$$ where the reciprocal function $$\\frac{1}{x} + 1$$ has its own asymptote that disrupts the regular pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Explain the conceptual reason why $$\\frac{4-x^2}{x^2-2x}$$ simplifies to $$-\\frac{x+2}{x}$$ rather than $$\\frac{x+2}{x}$$. (3 steps)", "answer": "- Step 1: Factor both parts: $$4-x^2 = (2-x)(2+x) = -(x-2)(x+2)$$ and $$x^2-2x = x(x-2)$$.\n- Step 2: The fraction becomes $$\\frac{-(x-2)(x+2)}{x(x-2)} = -\\frac{(x-2)(x+2)}{x(x-2)}$$.\n- Step 3: Cancel the common factor $$(x-2)$$ to get $$-\\frac{x+2}{x}$$. The negative sign comes from the reversed-factor relationship: $$2-x = -(x-2)$ const SK='harry_june12_llm';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually)
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
