<script>
const DATA={"selected": [{"question": "What is the single most important meta-skill Harry kept returning to across the lesson, and what is the recurring failure mode it counters?", "answer": "**The meta-skill:** Treat every question as a structure-reading exercise first. Before calculating, assign a role to every given fact (ratio / midpoint / right angle / interval / parallel / asymptote / endpoint).\n\n**The recurring failure mode this counters:** Using only some of the given information and grinding out a number — or, conversely, failing to spot a decoy that is not needed at all. Both errors come from not explicitly mapping each fact to a role before starting to calculate.\n\n**Concrete check:** If your answer is not in the options, the cause is almost always one of: (a) an unused given, or (b) a decoy you didn't recognize.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "The lesson spans 5 different topics (geometry, fractions, inequalities, reciprocal/tangent graphs, cosine). What single meta-skill connects them, and what is the corresponding failure mode? (2 steps)", "answer": "- **The meta-skill:** Read the structure before calculating. For each problem, identify the given facts and assign each one a role (essential fact vs decoy; which determines the answer vs which is decoration). Then choose the right method.\n- **The failure mode it counters:** Pattern-matching to a familiar method and using only some of the givens, then grinding out a number without checking whether all facts have been used or whether the answer is even plausible.\n\n**Concrete manifestations in this lesson:** Not using the \"midpoint\" fact in geometry (got 90/7 instead of 15); missing the minus sign on a fraction (got $$5 - 2/x$$ instead of $$3 - 2/x$$); including $$p = 0$$ in the cosine answer (got 3 solutions instead of 2); confusing horizontal/vertical asymptote axes.", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "Outline the 6-step algorithm for solving a quadratic inequality ax² + bx + c ⋛ 0, with no specific numbers. (6 steps)", "answer": "- Step 1: Rearrange so one side is zero: $$ax^2 + bx + c \\gtrless 0$$.\n- Step 2: Solve $$ax^2 + bx + c = 0$$ to find the boundary roots.\n- Step 3: Sketch a small parabola — opens up if $$a > 0$$, down if $$a < 0$$.\n- Step 4: Decide the sign. For $$a > 0$$: positive OUTSIDE the roots, negative INSIDE.\n- Step 5: Translate that sign region into x-values. Two separated pieces ⇒ \"or\"; one middle piece ⇒ \"and\".\n- Step 6: Apply inclusivity. $$\\geq, \\leq$$ include the roots; $$>, <$$ exclude them.\n\n**Why this works:** The parabola's shape is fully determined by a and the roots, so once you have the roots, the sign on every interval is forced.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "When counting solutions of cos(kx) = p on a closed interval, what is the universal rule about the interval endpoints, and why? (2 steps)", "answer": "- **The rule:** Test the value of p that the curve takes at each endpoint as a SEPARATE CASE. If the endpoint's y-value lies on a peak/trough/x-axis, $$p = (\\text{that value})$$ gains or loses solutions.\n- **Why:** The endpoint is a solution iff its y-value equals p. So $$p = (\\text{endpoint y-value})$$ either includes or excludes that solution. An endpoint on a maximum means $$p = \\max$$ gives that point as a solution — and if the curve also hits max elsewhere, you may get 2 or 3 solutions, not 1.\n\n**Concrete example from the lesson:** $$R = (225°, 0)$$ is the right endpoint. Setting $$p = 0$$ includes R as a solution, raising the count from 2 to 3 on $$[0°, 225°]$$.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "What does \"the number of solutions of tan(ax) = g(x) on interval I\" really mean geometrically, and how do you turn it into a counting problem? (2 steps)", "answer": "- Step 1: Geometrically, a solution of $$\\tan(ax) = g(x)$$ is an x where the two curves meet. So the number of solutions equals the number of intersections of $$y = \\tan(ax)$$ and $$y = g(x)$$ on I.\n- Step 2: To count, draw both curves on the same axes. Mark the interval endpoints, then mark every asymptote of $$\\tan(ax)$$ inside the interval — these split the curve into monotone branches. On each branch, decide whether the second curve crosses the tangent branch (usually once if both are monotone there). Add them up.\n\n**Why not just multiply periods × solutions-per-period?** Because $$g(x)$$ is often not periodic (e.g., $$1/x + 1$$ has its own asymptote at $$x = 0$$), so the count near $$x = 0$$ and at the interval ends must be done by eye, not by formula.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "Why does the minus sign in front of a fraction affect every term in the numerator, and what is the most common slip when simplifying 4 − (x+2)/x? (3 steps)", "answer": "- Step 1: A minus sign in front of a bracket is multiplication by −1. So 4 − (x+2)/x means 4 + [−1·(x+2)/x] = 4 + (−x−2)/x.\n- Step 2: Splitting: 4 + (−x/x) + (−2/x) = 4 − 1 − 2/x = 3 − 2/x. The minus distributes to BOTH x and 2.\n- Step 3: The common slip is to write 4 − (x+2)/x = 4 − x/x + 2/x = 3 + 2/x. This is wrong because the minus hits the +2, not just the x.\n\n**Fix:** Always bracket a subtraction first: 4 − [(x+2)/x]. Then distribute the minus to both terms.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "In the inequality −x² + 4x + 5 ≥ 0, what is the double-flip trap, and what is the safe procedure? (2 steps)", "answer": "- Step 1: The double-flip trap. When you multiply an inequality by $$-1$$, you must (a) flip the inequality sign, AND (b) the leading coefficient flips from negative to positive, so the inside/outside rule flips. Doing only (a) is the first trap. Forgetting (b) is the second.\n- Step 2: Safe procedure — rewrite the inequality with positive leading coefficient FIRST, then apply the standard rule. So $$-x^2 + 4x + 5 \\geq 0$$ becomes $$x^2 - 4x - 5 \\leq 0$$ (inequality flipped, a is now positive). Now the rule is simple: $$\\leq 0$$ with $$a > 0$$ means INSIDE the roots.\n\n**Why this is safer:** It separates the \"flip the sign\" step from the \"decide inside/outside\" step, so you don't have to think about both simultaneously.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "What is the conceptual difference between solving $$\\cos(2x) = p$$ on $$[0°, 225°]$$ versus $$[0°, 360°]$$, and why does this affect the answer for \"exactly two solutions\"? (2 steps)", "answer": "- Step 1: On $$[0°, 225°]$$, the curve $$\\cos(2x)$$ completes 1.25 periods, ending at a zero. On $$[0°, 360°]$$, it completes exactly 2 full periods, ending at a maximum. The different endpoints change which $$p$$ values are viable.\n- Step 2: For \"exactly two solutions,\" the shorter interval $$[0°, 225°]$$ allows $$p = 1$$ (hitting peaks at $$x = 0°, 180°$$) and $$-1 < p < 0$$ (avoiding the endpoint trap at $$x = 225°$$). The longer interval $$[0°, 360°]$$ makes $$p = 1$$ give three solutions ($$x = 0°, 180°, 360°$$) because both endpoints are maxima, so only $$p = -1$$ works reliably.\n\nThe interval length and endpoint positions are part of the question, not just details.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why do students often confuse \"AND\" versus \"OR\" in quadratic inequality solutions, and what visual cue prevents this error?", "answer": "Students confuse them because they focus on the boundary numbers rather than the solution regions. The visual cue is to always sketch the parabola: if your solution consists of two separated intervals on the number line (like $$x \\leq -4$$ or $$x \\geq 2$$), these are disjoint sets that require \"OR\" because a number cannot simultaneously be less than -4 AND greater than 2. If your solution is one connected interval (like $$-1 \\leq x \\leq 3$$), that's a single condition requiring \"AND\" (greater than -1 AND less than 3). Separated regions = OR; connected regions = AND.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "When a geometry problem says \"M is the midpoint of segment PR,\" what does this immediately tell you about the ratio PM/PR, and why does this matter for parallel lines?", "answer": "\"M is the midpoint of PR\" immediately pins PM/PR = 1/2. This is never decoration in a geometry problem — it is a fixed ratio constraint you can use directly.\n\n**Why this matters for parallel lines:** If a line through M is parallel to another side of the triangle (say MX ∥ RQ), then triangle PMX is similar to triangle PRQ with scale factor 1/2. So any corresponding length on the small triangle is half the corresponding length on the big triangle. This unlocks the answer in one step: MX = RQ/2.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "When does a quadratic inequality solution use \"and\" versus \"or\", and why is \"and\" the wrong choice for separated regions?", "answer": "- **\"And\"** is for a single connected interval (e.g., $$0 < x < 2$$). The value of x must satisfy both bounds simultaneously.\n- **\"Or\"** is for a union of separated intervals (e.g., $$x < 0 \\text{ or } x > 2$$). The value of x can be in either piece, but not both — no number can be simultaneously less than 0 and greater than 2.\n\n**Why \"and\" is wrong for separated regions:** A number cannot be in two disjoint sets at once. Writing \"x < 0 and x > 2\" gives an empty solution set.\n\n**Quick test:** Look at your solution set on a number line. If the highlighted regions are connected ⇒ \"and\". If they are separated (gap in between) ⇒ \"or\".", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "If the graph of $$y = \\frac{1}{x}$$ is transformed to $$y = \\frac{1}{x} + c$$, why does the horizontal asymptote change to $$y = c$$ while the vertical asymptote remains $$x = 0$$? Explain using limits and domain restrictions. (2 steps)", "answer": "- Step 1: Consider the vertical asymptote, which is dictated by domain restrictions (where the function is undefined). The denominator is still $$x$$, so the function is still undefined at $$x = 0$$. Adding a constant $$c$$ does not change the domain, so the vertical asymptote stays at $$x = 0$$.\n- Step 2: Consider the horizontal asymptote, which is dictated by the end behavior as $$x \\to \\pm\\infty$$. As $$x$$ grows infinitely large, $$\\frac{1}{x} \\to 0$$. Therefore, the entire expression $$\\frac{1}{x} + c \\to 0 + c = c$$. The graph shifts vertically by $$c$$, moving the horizontal asymptote from $$y = 0$$ to $$y = c$$.\n\nVertical translations affect the output (y-values and horizontal asymptotes) but leave the input restrictions (x-values and vertical asymptotes) unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "What is the reversed-factor relationship, and why is it crucial for algebraic fraction simplification?", "answer": "The reversed-factor relationship states that $$a - b = -(b - a)$$, which means $$\\frac{a-b}{b-a} = -1$$. This is crucial because when you see the same two terms in opposite order in numerator and denominator (like $$2-x$$ and $$x-2$$), you can immediately factor out $$-1$$ instead of trying to factor normally. For example, $$4-x^2 = -(x^2-4) = -(x-2)(x+2)$$, and when this appears over $$x^2-2x = x(x-2)$$, the $$(x-2)$$ terms cancel, leaving the $$-1$$ coefficient that affects the final sign.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "You computed MX = 90/7 ≈ 12.86 for the video geometry problem, but the options were 6, 8, 12, 15, 18. What should your next move be, and what did the right answer turn out to be? (3 steps)", "answer": "- Step 1: Stop. Do not pick the closest option. The answer not being in the list is a signal that you have not used all the given information.\n- Step 2: Re-read the problem and list every given fact. Cross off those you have used; identify the unused one.\n- Step 3: Ask what the unused fact implies.\n\n**In the video problem:** The unused fact was \"M is the midpoint of PR.\" This forces PM/PR = 1/2, which (with MX ∥ RQ) gives MX/RQ = 1/2, so MX = 30/2 = 15. That IS an option. The 90/7 came from a similar-triangles approach that ignored the midpoint — a classic \"use only some of the givens\" trap.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "Outline the reliable 4-step procedure for counting intersections of y = tan(ax) and a non-periodic curve like y = 1/x + 1 on a given interval. (4 steps)", "answer": "- Step 1: Mark the interval endpoints on the x-axis.\n- Step 2: Mark every tangent asymptote inside the interval (these split tan into monotone branches).\n- Step 3: On each full branch, decide whether the non-periodic curve crosses the tangent branch (usually once if both are monotone there).\n- Step 4: Check the partial branches at each interval endpoint and the region near $$x = 0$$ (where $$1/x + 1$$ has its own asymptote) separately by eye.\n\n**Why this beats a formula:** A non-periodic curve changes the count near its own asymptotes, so any \"periods × per-period\" shortcut will be off near $$x = 0$$ and at the ends.", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "Without doing any calculation, how can you visually determine whether the solution to a quadratic inequality $$ax^2 + bx + c > 0$$ lies \"inside\" or \"outside\" the roots, based purely on the sign of $$a$$ and the inequality symbol? (2 steps)", "answer": "- Step 1: Look at the leading coefficient $$a$$ to determine the parabola's shape. If $$a > 0$$, it opens upwards (U-shape); if $$a < 0$$, it opens downwards (n-shape).\n- Step 2: Match the shape to the inequality. For $$> 0$$, you want the parts of the graph above the x-axis.\n+ If $$a > 0$$ (U-shape), the graph is above the axis on the far left and far right, meaning the solution is \"outside\" the roots.\n+ If $$a < 0$$ (n-shape), the graph is above the axis only between the roots, meaning the solution is \"inside\" the roots.", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "Explain why the \"homework as diagnostic\" approach is more effective than treating homework as required busywork. (3 steps)", "answer": "- Step 1: Homework serves as a mistake-detection system rather than a completion requirement. Its primary value is revealing error patterns you haven't yet identified from lessons alone.\n- Step 2: The optimal sequence is: consolidate lesson mistakes into guides and flashcards first, then redo lesson questions cold to test retention, and only then do homework to surface new mistake types.\n- Step 3: This approach prevents homework from becoming mechanical repetition of known methods. Instead, it becomes targeted practice that expands your error database and reveals gaps in understanding that lessons didn't expose.\n\nHomework finds the mistakes you don't know you're making.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "In the Slack Q1 figure (QX/PX = 1/6, QX/XR = 2/3, M the midpoint of PR, ∠QXR = 90°), the right angle at X is a \"decoy.\" Why is it not needed to compute QX/MX?", "answer": "Look at what you actually need: the ratio QX/MX. The right angle would let you apply Pythagoras to triangle QXR, but QX cancels out of the ratio QX/MX. Both PX and XR are determined purely from the ratio facts involving QX, and the midpoint fact pins PM at half of PR. The right angle would only matter if you needed an absolute length; the ratio QX/MX never uses it.\n\n**General lesson:** A \"given\" in a geometry problem is either essential or a decoy. You decide which by writing down its role, not by reflexively using everything. Always check: would removing this fact change my answer? If not, it is a decoy.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "When finding the values of $$p$$ for which $$\\cos(kx) = p$$ has \"exactly two solutions\" on a restricted domain like $$0 \\le x \\le 225^\\circ$$, why is it dangerous to assume the answer is simply a strict inequality like $$-1 < p < 0$$ without testing the boundary values $$p = 0$$ and $$p = \\pm 1$$ separately? (2 steps)", "answer": "- Step 1: The number of solutions changes precisely when the horizontal line $$y = p$$ crosses a local maximum, a local minimum, or an endpoint of the restricted domain. These critical $$y$$-values act as boundaries between different solution counts.\n- Step 2: If an interval endpoint happens to sit exactly on the x-axis (e.g., the curve ends at $$y = 0$$), then $$p = 0$$ will include that endpoint as a valid solution. This can unexpectedly add a third solution, turning a \"two solution\" region into a \"three solution\" point. Testing boundaries separately prevents falling into this endpoint trap.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "Outline a 3-step error-checking procedure you can apply to any problem from this lesson BEFORE finalising your answer. (3 steps)", "answer": "- Step 1: **Have I used every given fact?** List all given information and tick off those used. If any are unticked, you have a problem.\n- Step 2: **Is my answer in the option list / a \"nice\" form?** If 90/7 is not an option, you have a problem. If you got $$5 - 2/x$$ when the options are all integers or $$3 - 2/x$$, you have a problem.\n- Step 3: **Did I test the interval endpoints and special values separately?** Inequalities, cosine solution counts, and tangent branch counts are all sensitive to endpoints and to values of p near the extremes. Always test $$p = 0$$, $$p = \\pm \\max$$, and the boundary x-values of the interval.\n\n**Why this works:** Most errors in this lesson were caught by one of these three checks. Building them in as habits catches the most common traps before they cost marks.", "source": "MiniMax ①", "_id": "minimax_1_32"}, {"question": "What is the \"reversed factors\" identity, and what does it tell you about the value of (x−y)/(y−x)? (2 steps)", "answer": "- Step 1: The identity is a − b = −(b − a). The same two terms in reversed order differ by a sign.\n- Step 2: So (x−y)/(y−x) = (x−y)/[−(x−y)] = −1, provided x ≠ y.\n\n**Why this matters:** Whenever you see the same two terms in reversed order (2 − x vs x − 2, or x − y vs y − x), pull out the −1 immediately. This is a frequent trick in option lists designed to catch students who cancel \"the same\" terms without noticing the sign flip.", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "For cos(2x) = p on 0 ≤ x ≤ 225°, which values of p give exactly two solutions, and which is the surprising endpoint trap? (2 steps)", "answer": "- **The values:** $$-1 < p < 0$$ (strict) or $$p = 1$$.\n  + $$p = 1$$: hit at $$x = 0$$ and $$x = 180$$ (Two solutions.)\n  + $$-1 < p < 0$$: hit once on piece A and once on piece B. Piece C is too short to reach negative y, so it adds nothing.\n- **The trap:** $$p = 0$$. It is tempting to include $$p = 0$$, but $$\\cos(2x) = 0$$ gives $$x = 45°, 135°$$, AND $$x = 225°$$ — three solutions, because $$R = (225°, 0)$$ lies on the curve.\n\n**General rule:** Whenever an interval endpoint sits on the x-axis (or on a peak/trough), test that endpoint's p-value separately. The boundary must be strict.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "For tan(4x) = 1/x + 1 on [0, 4π], why is it wrong to count as if it were tan(x), and what is the correct period-based first step? (3 steps)", "answer": "- Step 1: $$\\tan(4x)$$ is not $$\\tan(x)$$ — it repeats 4 times more often. The period is $$\\pi/4$$, not $$\\pi$$. If you count on a $$\\pi$$-period you will undercount by a factor of 4.\n- Step 2: First step: compute the new period. Period of $$\\tan(4x) = \\pi/|4| = \\pi/4$$.\n- Step 3: Then count branches on the exact interval $$[0, 4\\pi]$$. Number of full periods in $$[0, 4\\pi]$$ is $$4\\pi / (\\pi/4) = 16$$. Then verify the count by eye, especially near $$x = 0$$ and the interval ends.\n\n**General rule:** Always recompute the period of the transformed trig function BEFORE counting intersections.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "Compare \"exactly two solutions\" of cos(2x) = p on [0°, 225°] vs on [0°, 360°]. Why does the interval change the answer so much? (2 steps)", "answer": "- **On $$[0°, 225°]$$:** The curve makes 1.25 cycles. Piece C is a half-branch from $$(180°, 1)$$ to $$(225°, 0)$$, so it only reaches $$y \\in [0, 1]$$. Answer: $$-1 < p < 0$$ or $$p = 1$$.\n- **On $$[0°, 360°]$$:** The curve makes a full 2 cycles: down-up-down-up. For a generic $$p \\in (-1, 1)$$, each cycle contributes 2 intersections, so 4 total. To get exactly 2, you need an extreme value where cycles \"collapse\" to one intersection: $$p = -1$$ (at $$x = 90°, 270°$$). At $$p = 1$$, both endpoints ($$x = 0°, 360°$$) are maxima, giving 3 solutions — $$p = 1$$ is excluded.\n\n**Why the interval matters:** The same curve, but a different number of branches covered, gives a completely different count. The interval is part of the question, never a detail.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "Why is counting solutions of tan(x) = 1/x + 1 near x = 0 more delicate than counting solutions of tan(x) = 1 (a constant)? (2 steps)", "answer": "- Step 1: $$\\tan(x) = 1$$ (constant) — the right side is a horizontal line. Each branch of $$\\tan(x)$$ crosses $$y = 1$$ exactly once (since tan is monotone on each branch and the line is constant). Counting is uniform: period × 1.\n- Step 2: $$\\tan(x) = 1/x + 1$$ — the right side has its own vertical asymptote at $$x = 0$$ and a horizontal asymptote at $$y = 1$$. Near $$x = 0$$, $$1/x + 1$$ shoots to $$±\\infty$$, so the behaviour on the first tangent branch is different from the behaviour on later branches. The count near $$x = 0$$ must be done by eye on the graph, not by formula.\n\n**Why this matters:** This is exactly why the lesson's three cases had to be solved by careful branch-by-branch drawing, not by \"periods × 1.\"", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "For the cosine equation $$\\cos(2x) = p$$ on $$0 \\leq x \\leq 225°$$, why is the endpoint $$x = 225°$$ a potential trap when finding values of $$p$$ that give exactly two solutions?", "answer": "The endpoint $$x = 225°$$ is a trap because $$\\cos(2 \\cdot 225°) = \\cos(450°) = \\cos(90°) = 0$$. This means the point $$(225°, 0)$$ lies on the curve. If you're looking for $$p$$ values giving exactly two solutions and you choose $$p = 0$$, you get intersections at $$x = 45°, 135°$$ (from the main curve) plus $$x = 225°$$ (the endpoint), giving three solutions instead of two. You must test endpoint values separately because they can add an unexpected extra solution, changing your count and making $$p = 0$$ incorrect for \"exactly two.\"", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does a > 0 imply the quadratic is positive OUTSIDE the roots, but negative INSIDE? Sketch the intuition in words. (2 steps)", "answer": "- Step 1: A parabola opening up (a > 0) has its minimum point on the x-axis (touching zero at the roots) and rises to +∞ on both sides. Between the two roots, the parabola dips below the x-axis, so y is negative.\n- Step 2: Outside the roots, the parabola has risen back above the x-axis on both sides, so y is positive. The roots themselves are exactly zero.\n\n**Mirror case:** If $$a < 0$$ (parabola opens down), the roles reverse — positive INSIDE, negative OUTSIDE.\n\n**The trap:** Students often pick \"the interval between the roots\" just because the roots are the salient numbers. The sign of a (or the inequality sign) decides which side you keep.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "How does adding +1 to 1/x change the graph, the asymptotes, and the shape? Specifically, what are the asymptotes of y = 1/x + 1? (3 steps)", "answer": "- Step 1: Shape: $$y = 1/x + 1$$ is a vertical translation of $$y = 1/x$$ by 1 unit up. Every point $$(x, y)$$ on the original becomes $$(x, y + 1)$$.\n- Step 2: Vertical asymptote: UNCHANGED at $$x = 0$$. A vertical shift does not affect the x-values where the function is undefined.\n- Step 3: Horizontal asymptote: moves from $$y = 0$$ to $$y = 1$$. As $$x \\to \\pm\\infty$$, $$1/x \\to 0$$, so $$1/x + 1 \\to 1$$.\n\n**The trap:** Confusing the asymptotes' axes. The vertical asymptote is a vertical line ($$x = \\text{constant}$$); the horizontal asymptote is a horizontal line ($$y = \\text{constant}$$). They are perpendicular.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "A common error in algebraic simplification is evaluating $$4 - \\frac{x + 2}{x}$$ as $$4 - 1 + \\frac{2}{x}$$. What is the conceptual rule being violated here, and what is the correct mental model for subtracting a fraction? (2 steps)", "answer": "- Step 1: The violation is failing to distribute the subtraction (negative sign) across all terms in the numerator. The fraction bar acts as a grouping symbol, so $$-\\frac{x + 2}{x}$$ means $$-( \\frac{x}{x} + \\frac{2}{x} )$$.\n- Step 2: The correct mental model is to bracket the entire fraction before splitting it: $$4 - (\\frac{x}{x} + \\frac{2}{x}) = 4 - (1 + \\frac{2}{x}) = 4 - 1 - \\frac{2}{x} = 3 - \\frac{2}{x}$$. \n+ Always treat the minus sign as multiplying every term in the numerator by $$-1$$.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [], "count": 0}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "In a geometry problem involving multiple ratios (e.g., $$\\frac{A}{B} = \\frac{1}{3}$$ and $$\\frac{A}{C} = \\frac{2}{5}$$), what is the conceptual advantage of assigning a convenient numerical value to the shared segment $$A$$ rather than setting up a system of algebraic equations? (2 steps)", "answer": "- Step 1: Assigning a value (like the lowest common multiple of the numerators) turns abstract ratios into concrete lengths, eliminating fractions and decimals from the diagram.\n- Step 2: This allows you to immediately calculate adjacent segments by simple multiplication, making it easier to spot additive relationships (like $$PR = PX + XR$$) without getting bogged down in algebraic manipulation.\n\nAssigning a concrete scale bridges the gap between abstract proportions and physical segment addition.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "When solving a triangle problem, you are given that $$M$$ is the midpoint of side $$PR$$, and a line $$MX$$ is parallel to $$RQ$$. You are also given that $$\\angle QXR = 90^\\circ$$. How do you determine whether the $$90^\\circ$$ angle is an essential fact or a \"decoy\"? (2 steps)", "answer": "- Step 1: Write down the geometric role of every given fact. The midpoint and parallel line trigger the Midpoint Theorem (or similar triangles with a $$1:2$$ scale factor), which directly links the length of $$MX$$ to $$RQ$$.\n- Step 2: Check if the target variable can be found using only the essential facts. Since $$MX = \\frac{1}{2} RQ$$ relies solely on the midpoint and parallel lines, the $$90^\\circ$$ angle is a decoy—it provides extra structural information that isn't needed for the specific ratio being asked.\n\nAlways assign a \"job\" to every given fact; if the problem is solved before a fact is used, that fact is likely a decoy.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does the algebraic fraction $$\\frac{a - b}{b - a}$$ always simplify to $$-1$$ (assuming $$a \\neq b$$), and how should this be applied when simplifying rational expressions? (2 steps)", "answer": "- Step 1: Recognize that subtraction is not commutative; reversing the order of terms changes the sign of the result, meaning $$a - b = -(b - a)$$.\n- Step 2: Substitute this into the fraction to get $$\\frac{-(b - a)}{b - a}$$. The common factor $$(b - a)$$ cancels out, leaving exactly $$-1$$.\n+ When simplifying, always factor fully first. If you see reversed binomials like $$(2 - x)$$ and $$(x - 2)$$, immediately factor out $$-1$$ from one of them to reveal the common factor and carry the negative sign to the numerator or denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A common error in algebraic simplification is evaluating $$4 - \\frac{x + 2}{x}$$ as $$4 - 1 + \\frac{2}{x}$$. What is the conceptual rule being violated here, and what is the correct mental model for subtracting a fraction? (2 steps)", "answer": "- Step 1: The violation is failing to distribute the subtraction (negative sign) across all terms in the numerator. The fraction bar acts as a grouping symbol, so $$-\\frac{x + 2}{x}$$ means $$-( \\frac{x}{x} + \\frac{2}{x} )$$.\n- Step 2: The correct mental model is to bracket the entire fraction before splitting it: $$4 - (\\frac{x}{x} + \\frac{2}{x}) = 4 - (1 + \\frac{2}{x}) = 4 - 1 - \\frac{2}{x} = 3 - \\frac{2}{x}$$. \n+ Always treat the minus sign as multiplying every term in the numerator by $$-1$$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "Why is it mathematically invalid to \"cancel\" the $$x^2$$ terms in the expression $$\\frac{x^2 + 4}{x^2 - 2x}$$ to get $$\\frac{4}{-2x}$$, and what is the correct condition required for cancellation in rational expressions? (2 steps)", "answer": "- Step 1: Cancellation in fractions is only valid for common *multiplicative factors*, not additive terms. The expression consists of terms joined by addition and subtraction, meaning $$x^2$$ is not a factor of the numerator or the denominator.\n- Step 2: To cancel, you must first factor the numerator and denominator completely into products. Since $$x^2 + 4$$ cannot be factored over the reals and shares no common product factors with $$x(x - 2)$$, the expression is already in its simplest form and no cancellation can occur.\n\nYou can only cancel factors, never terms separated by $$+$$ or $$-$$.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "When solving a quadratic inequality like $$(x - a)(x - b) \\ge 0$$ (where $$a < b$$ and the parabola opens upwards), the solution consists of two separated regions: $$x \\le a$$ and $$x \\ge b$$. Why must these regions be joined by the logical connective \"OR\" rather than \"AND\"? (2 steps)", "answer": "- Step 1: Analyze the meaning of the connectives in set theory. \"AND\" represents the intersection of sets (values that satisfy both conditions simultaneously), while \"OR\" represents the union of sets (values that satisfy at least one condition).\n- Step 2: Since a single number $$x$$ cannot be simultaneously less than $$a$$ and greater than $$b$$ (where $$a < b$$), the intersection is empty. The solution set is the union of the two disjoint intervals, so any valid $$x$$ must belong to the left region OR the right region.\n\nSeparated regions on a number line always imply a union (OR); connected regions imply an intersection (AND).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Without doing any calculation, how can you visually determine whether the solution to a quadratic inequality $$ax^2 + bx + c > 0$$ lies \"inside\" or \"outside\" the roots, based purely on the sign of $$a$$ and the inequality symbol? (2 steps)", "answer": "- Step 1: Look at the leading coefficient $$a$$ to determine the parabola's shape. If $$a > 0$$, it opens upwards (U-shape); if $$a < 0$$, it opens downwards (n-shape).\n- Step 2: Match the shape to the inequality. For $$> 0$$, you want the parts of the graph above the x-axis.\n+ If $$a > 0$$ (U-shape), the graph is above the axis on the far left and far right, meaning the solution is \"outside\" the roots.\n+ If $$a < 0$$ (n-shape), the graph is above the axis only between the roots, meaning the solution is \"inside\" the roots.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "If the graph of $$y = \\frac{1}{x}$$ is transformed to $$y = \\frac{1}{x} + c$$, why does the horizontal asymptote change to $$y = c$$ while the vertical asymptote remains $$x = 0$$? Explain using limits and domain restrictions. (2 steps)", "answer": "- Step 1: Consider the vertical asymptote, which is dictated by domain restrictions (where the function is undefined). The denominator is still $$x$$, so the function is still undefined at $$x = 0$$. Adding a constant $$c$$ does not change the domain, so the vertical asymptote stays at $$x = 0$$.\n- Step 2: Consider the horizontal asymptote, which is dictated by the end behavior as $$x \\to \\pm\\infty$$. As $$x$$ grows infinitely large, $$\\frac{1}{x} \\to 0$$. Therefore, the entire expression $$\\frac{1}{x} + c \\to 0 + c = c$$. The graph shifts vertically by $$c$$, moving the horizontal asymptote from $$y = 0$$ to $$y = c$$.\n\nVertical translations affect the output (y-values and horizontal asymptotes) but leave the input restrictions (x-values and vertical asymptotes) unchanged.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How does the horizontal compression in $$y = \\tan(ax)$$ (where $$a > 1$$) affect the number of intersections with a non-periodic function like $$y = \\frac{1}{x} + 1$$ over a fixed interval, and why can't you just multiply the original intersection count by $$a$$? (2 steps)", "answer": "- Step 1: The compression reduces the period of the tangent function from $$\\pi$$ to $$\\frac{\\pi}{a}$$, meaning it completes $$a$$ times as many cycles in the same interval. This creates more branches, generally increasing the number of intersections.\n- Step 2: You cannot simply multiply the original count by $$a$$ because the other function ($$\\frac{1}{x} + 1$$) is not periodic and has its own asymptote at $$x = 0$$. The behavior of the reciprocal function changes across the interval (e.g., it drops rapidly near $$0$$ and flattens out later), so the number of intersections per tangent branch will vary depending on where the branch is located relative to the reciprocal curve.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "When counting the number of solutions to $$\\tan(ax) = f(x)$$ over a large interval, what is the reliable step-by-step graphical procedure to ensure no intersections are missed or double-counted near the boundaries and asymptotes? (3 steps)", "answer": "- Step 1: Mark the exact interval endpoints and draw the non-periodic function $$f(x)$$, noting its own asymptotes and general shape.\n- Step 2: Draw the vertical asymptotes of $$\\tan(ax)$$ inside the interval. These split the domain into distinct \"branches\" where the tangent function is continuous and strictly increasing from $$-\\infty$$ to $$\\infty$$.\n- Step 3: Evaluate each branch individually. A full monotone branch usually intersects $$f(x)$$ exactly once. Carefully check partial branches at the interval endpoints and near $$x = 0$$ (where $$f(x)$$ might have an asymptote) by eye, as the standard \"one intersection per branch\" rule may fail there.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "When finding the values of $$p$$ for which $$\\cos(kx) = p$$ has \"exactly two solutions\" on a restricted domain like $$0 \\le x \\le 225^\\circ$$, why is it dangerous to assume the answer is simply a strict inequality like $$-1 < p < 0$$ without testing the boundary values $$p = 0$$ and $$p = \\pm 1$$ separately? (2 steps)", "answer": "- Step 1: The number of solutions changes precisely when the horizontal line $$y = p$$ crosses a local maximum, a local minimum, or an endpoint of the restricted domain. These critical $$y$$-values act as boundaries between different solution counts.\n- Step 2: If an interval endpoint happens to sit exactly on the x-axis (e.g., the curve ends at $$y = 0$$), then $$p = 0$$ will include that endpoint as a valid solution. This can unexpectedly add a third solution, turning a \"two solution\" region into a \"three solution\" point. Testing boundaries separately prevents falling into this endpoint trap.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "Explain conceptually why the equation $$\\cos(2x) = p$$ might have exactly two solutions for $$p = 1$$ on the interval $$0 \\le x \\le 225^\\circ$$, but three solutions for $$p = 1$$ on the closed interval $$0 \\le x \\le 360^\\circ$$. (2 steps)", "answer": "- Step 1: Analyze the peaks of the function. $$\\cos(2x)$$ reaches its maximum value of $$1$$ at $$x = 0^\\circ, 180^\\circ, 360^\\circ$$, etc. The number of times it hits $$p = 1$$ depends entirely on how many of these peaks fall within the given interval.\n- Step 2: On $$0 \\le x \\le 225^\\circ$$, the peaks at $$0^\\circ$$ and $$180^\\circ$$ are included (2 solutions). On the closed interval $$0 \\le x \\le 360^\\circ$$, the peaks at $$0^\\circ, 180^\\circ$$, and $$360^\\circ$$ are all included (3 solutions). The interval boundaries dictate whether the endpoints of the cycles are captured.\n\nThe interval is part of the question, never just a detail; always check if the boundaries land on critical points.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "In a geometry problem, you find that a segment length is represented by the algebraic expression $$\\frac{4 - x^2}{x^2 - 2x}$$. If $$x = 2$$, the expression is undefined. What is the geometric interpretation of this algebraic singularity, and how does simplifying the expression resolve it? (2 steps)", "answer": "- Step 1: An undefined algebraic expression in a geometric context usually implies a degenerate case—such as a triangle collapsing into a line, a denominator representing a zero length, or points coinciding. Here, $$x=2$$ makes the denominator zero, meaning the geometric configuration breaks down at that exact value.\n- Step 2: Simplifying the expression (factoring to $$\\frac{-(x-2)(x+2)}{x(x-2)} = -\\frac{x+2}{x}$$) reveals a \"removable discontinuity.\" Geometrically, this means the length approaches a well-defined limit as the configuration approaches the degenerate state, even though the exact state $$x=2$$ is physically impossible.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "(Exercise) In triangle $$ABC$$, point $$D$$ lies on $$AB$$ such that $$AD:DB = 3:2$$. $$M$$ is the midpoint of $$AB$$. Without using complex algebra, what is the ratio of $$DM$$ to $$AB$$? (2 steps)", "answer": "- Step 1: Use shared-segment scaling. Let the total length $$AB = 5$$ units. This makes $$AD = 3$$ units and $$DB = 2$$ units.\n- Step 2: Since $$M$$ is the midpoint, $$AM = 2.5$$ units. The distance $$DM$$ is the difference between $$AD$$ and $$AM$$: $$3 - 2.5 = 0.5$$ units. The ratio $$DM : AB$$ is therefore $$0.5 : 5$$, which simplifies to $$1:10$$.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "(Exercise) Simplify the expression $$5 - \\frac{x^2 - 9}{x^2 - 3x}$$ conceptually, identifying the key algebraic traps to avoid. (3 steps)", "answer": "- Step 1: Factor the numerator and denominator completely. The numerator is a difference of squares: $$(x-3)(x+3)$$. The denominator has a common factor: $$x(x-3)$$.\n- Step 2: Cancel the common factor $$(x-3)$$, remembering that $$x \\neq 3$$. The fraction simplifies to $$\\frac{x+3}{x}$$.\n- Step 3: Subtract this from 5, ensuring the minus sign distributes across the fraction if you split it: $$5 - (1 + \\frac{3}{x}) = 4 - \\frac{3}{x}$$. The trap to avoid is failing to distribute the negative sign or cancelling terms across the subtraction.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "(Exercise) Conceptually solve the inequality $$-x^2 + 4x + 5 > 0$$ without just memorizing a rule, by walking through the graphical reasoning. (3 steps)", "answer": "- Step 1: Make the leading coefficient positive to easily visualize the parabola. Multiply by $$-1$$ and flip the inequality: $$x^2 - 4x - 5 < 0$$.\n- Step 2: Find the roots of $$x^2 - 4x - 5 = 0$$. The factors are $$(x-5)(x+1) = 0$$, giving roots at $$x = -1$$ and $$x = 5$$.\n- Step 3: Sketch the U-shaped parabola opening upwards. We want the region where it is strictly less than zero (below the x-axis). This occurs strictly between the roots, so the solution is $$-1 < x < 5$$.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "(Exercise) If the graph of $$y = \\frac{2}{x-3} - 4$$ is drawn, what are the equations of its vertical and horizontal asymptotes, and how do the transformations dictate this? (2 steps)", "answer": "- Step 1: Identify the horizontal shift. The $$x-3$$ in the denominator shifts the vertical asymptote from $$x=0$$ to $$x=3$$.\n- Step 2: Identify the vertical shift. The $$-4$$ outside the fraction shifts the horizontal asymptote from $$y=0$$ to $$y=-4$$. The numerator $$2$$ causes a vertical stretch but does not affect the location of the asymptotes.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "(Exercise) How many solutions does $$\\tan(2x) = 1$$ have on the interval $$0 \\le x \\le 2\\pi$$? Explain using the period and branch counting. (2 steps)", "answer": "- Step 1: Determine the period of $$\\tan(2x)$$, which is $$\\frac{\\pi}{2}$$. The interval $$2\\pi$$ contains exactly $$\\frac{2\\pi}{\\pi/2} = 4$$ full periods.\n- Step 2: In each full period of the tangent function, the graph goes from $$-\\infty$$ to $$\\infty$$ exactly once, crossing any horizontal line (like $$y=1$$) exactly once. Therefore, 4 periods yield exactly 4 solutions.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "(Exercise) For the function $$f(x) = 3\\cos(x) + 1$$ on $$0 \\le x \\le 2\\pi$$, how many solutions exist for $$f(x) = p$$ if $$p = 4$$? What if $$p = -2$$? (2 steps)", "answer": "- Step 1: Determine the range of the function. The amplitude is 3 and the midline is $$y=1$$, so the maximum is $$1+3=4$$ and the minimum is $$1-3=-2$$.\n- Step 2: Evaluate the specific $$p$$ values.\n+ For $$p=4$$, the line touches the absolute maximum. On $$0 \\le x \\le 2\\pi$$, $$\\cos(x)$$ reaches its maximum only at $$x=0$$ and $$x=2\\pi$$. Thus, there are 2 solutions.\n+ For $$p=-2$$, the line touches the absolute minimum. $$\\cos(x)$$ reaches its minimum only at $$x=\\pi$$. Thus, there is exactly 1 solution.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}], "count": 19}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the \"shared-segment scaling\" technique for handling ratio geometry problems where the same length appears in several ratios? (3 steps)", "answer": "- Step 1: Identify the segment that appears in multiple ratios in the problem (e.g., QX appears in both QX/PX and QX/XR in Slack Q1).\n- Step 2: Set that shared segment to a convenient numerical value, usually chosen so all other lengths become whole numbers (e.g., the LCM of the ratio denominators).\n- Step 3: Use each ratio in turn to compute the other lengths as concrete integers, then add/subtract them on the diagram directly.\n\n**Why this works:** It converts abstract fractional ratios into a concrete integer diagram, eliminating decimals and removing the need to juggle fractions throughout the problem.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "When a geometry problem says \"M is the midpoint of segment PR,\" what does this immediately tell you about the ratio PM/PR, and why does this matter for parallel lines?", "answer": "\"M is the midpoint of PR\" immediately pins PM/PR = 1/2. This is never decoration in a geometry problem — it is a fixed ratio constraint you can use directly.\n\n**Why this matters for parallel lines:** If a line through M is parallel to another side of the triangle (say MX ∥ RQ), then triangle PMX is similar to triangle PRQ with scale factor 1/2. So any corresponding length on the small triangle is half the corresponding length on the big triangle. This unlocks the answer in one step: MX = RQ/2.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "In the Slack Q1 figure (QX/PX = 1/6, QX/XR = 2/3, M the midpoint of PR, ∠QXR = 90°), the right angle at X is a \"decoy.\" Why is it not needed to compute QX/MX?", "answer": "Look at what you actually need: the ratio QX/MX. The right angle would let you apply Pythagoras to triangle QXR, but QX cancels out of the ratio QX/MX. Both PX and XR are determined purely from the ratio facts involving QX, and the midpoint fact pins PM at half of PR. The right angle would only matter if you needed an absolute length; the ratio QX/MX never uses it.\n\n**General lesson:** A \"given\" in a geometry problem is either essential or a decoy. You decide which by writing down its role, not by reflexively using everything. Always check: would removing this fact change my answer? If not, it is a decoy.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "You computed MX = 90/7 ≈ 12.86 for the video geometry problem, but the options were 6, 8, 12, 15, 18. What should your next move be, and what did the right answer turn out to be? (3 steps)", "answer": "- Step 1: Stop. Do not pick the closest option. The answer not being in the list is a signal that you have not used all the given information.\n- Step 2: Re-read the problem and list every given fact. Cross off those you have used; identify the unused one.\n- Step 3: Ask what the unused fact implies.\n\n**In the video problem:** The unused fact was \"M is the midpoint of PR.\" This forces PM/PR = 1/2, which (with MX ∥ RQ) gives MX/RQ = 1/2, so MX = 30/2 = 15. That IS an option. The 90/7 came from a similar-triangles approach that ignored the midpoint — a classic \"use only some of the givens\" trap.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "What is the single most important meta-skill Harry kept returning to across the lesson, and what is the recurring failure mode it counters?", "answer": "**The meta-skill:** Treat every question as a structure-reading exercise first. Before calculating, assign a role to every given fact (ratio / midpoint / right angle / interval / parallel / asymptote / endpoint).\n\n**The recurring failure mode this counters:** Using only some of the given information and grinding out a number — or, conversely, failing to spot a decoy that is not needed at all. Both errors come from not explicitly mapping each fact to a role before starting to calculate.\n\n**Concrete check:** If your answer is not in the options, the cause is almost always one of: (a) an unused given, or (b) a decoy you didn't recognize.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "AB = 20, point C on AB with AC:CB = 3:2, M the midpoint of AB. Find CM without heavy calculation. (2 steps)", "answer": "- Step 1: AC = (3/5)·20 = 12, so CB = 8. M is the midpoint of AB, so M is 10 from A.\n- Step 2: CM = |AC − AM| = |12 − 10| = 2.\n\n**Takeaway:** Same \"midpoint ⇒ 1/2\" trigger applies; you compute a position and then take a difference.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Why does the minus sign in front of a fraction affect every term in the numerator, and what is the most common slip when simplifying 4 − (x+2)/x? (3 steps)", "answer": "- Step 1: A minus sign in front of a bracket is multiplication by −1. So 4 − (x+2)/x means 4 + [−1·(x+2)/x] = 4 + (−x−2)/x.\n- Step 2: Splitting: 4 + (−x/x) + (−2/x) = 4 − 1 − 2/x = 3 − 2/x. The minus distributes to BOTH x and 2.\n- Step 3: The common slip is to write 4 − (x+2)/x = 4 − x/x + 2/x = 3 + 2/x. This is wrong because the minus hits the +2, not just the x.\n\n**Fix:** Always bracket a subtraction first: 4 − [(x+2)/x]. Then distribute the minus to both terms.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "What is the \"reversed factors\" identity, and what does it tell you about the value of (x−y)/(y−x)? (2 steps)", "answer": "- Step 1: The identity is a − b = −(b − a). The same two terms in reversed order differ by a sign.\n- Step 2: So (x−y)/(y−x) = (x−y)/[−(x−y)] = −1, provided x ≠ y.\n\n**Why this matters:** Whenever you see the same two terms in reversed order (2 − x vs x − 2, or x − y vs y − x), pull out the −1 immediately. This is a frequent trick in option lists designed to catch students who cancel \"the same\" terms without noticing the sign flip.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "What is the difference-of-squares identity, and how does it apply when factorising 4 − x²?", "answer": "The identity is $$a^2 - b^2 = (a - b)(a + b)$$. It applies to any expression written as (something)² − (something else)².\n\nFor $$4 - x^2$$: this is $$2^2 - x^2$$, so $$4 - x^2 = (2 - x)(2 + x)$$. Equivalently, since $$2 - x = -(x - 2)$$, we can also write $$4 - x^2 = -(x - 2)(x + 2) = (x - 2)(-(x + 2))$$.\n\n**Why it matters:** Difference of squares is one of the cleanest factorisations in algebra and is heavily used in rational simplification. Always check whether a binomial can be written as a² − b² before doing anything else.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "To factorise a quadratic x² + bx + c as (x + p)(x + q), what conditions must p and q satisfy, and how do you apply this to x² − x − 2? (3 steps)", "answer": "- Step 1: p and q must multiply to c and add to b. So $$p \\cdot q = c$$ and $$p + q = b$$.\n- Step 2: For $$x^2 - x - 2$$, you need two numbers that multiply to $$-2$$ and add to $$-1$$. The pair is $$p = -2$$, $$q = +1$$ (or vice versa).\n- Step 3: Check: $$(-2)(+1) = -2$$ ✓, and $$-2 + 1 = -1$$ ✓. So $$x^2 - x - 2 = (x - 2)(x + 1)$$.\n\n**Sanity check (always do this):** Expand your answer. $$(x - 2)(x + 1) = x^2 + x - 2x - 2 = x^2 - x - 2$$ ✓.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Simplify 7 + (1 − x²)/(x² − x) by hand, using the identities from the lesson. (3 steps)", "answer": "- Step 1: Factor. $$1 - x^2 = (1 - x)(1 + x) = -(x - 1)(1 + x)$$. And $$x^2 - x = x(x - 1)$$.\n- Step 2: So $$\\frac{1 - x^2}{x^2 - x} = \\frac{-(x - 1)(1 + x)}{x(x - 1)} = -\\frac{1 + x}{x} = -1 - \\frac{1}{x}$$.\n- Step 3: $$7 + \\left(-1 - \\frac{1}{x}\\right) = 6 - \\frac{1}{x}$$.\n\n**The trap to avoid:** Forgetting the minus sign when $$1 - x^2$$ becomes $$-(x - 1)(1 + x)$$. The expression is NOT $$(x - 1)(1 + x)$$; it has a leading $$-1$$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Outline the 6-step algorithm for solving a quadratic inequality ax² + bx + c ⋛ 0, with no specific numbers. (6 steps)", "answer": "- Step 1: Rearrange so one side is zero: $$ax^2 + bx + c \\gtrless 0$$.\n- Step 2: Solve $$ax^2 + bx + c = 0$$ to find the boundary roots.\n- Step 3: Sketch a small parabola — opens up if $$a > 0$$, down if $$a < 0$$.\n- Step 4: Decide the sign. For $$a > 0$$: positive OUTSIDE the roots, negative INSIDE.\n- Step 5: Translate that sign region into x-values. Two separated pieces ⇒ \"or\"; one middle piece ⇒ \"and\".\n- Step 6: Apply inclusivity. $$\\geq, \\leq$$ include the roots; $$>, <$$ exclude them.\n\n**Why this works:** The parabola's shape is fully determined by a and the roots, so once you have the roots, the sign on every interval is forced.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "Why does a > 0 imply the quadratic is positive OUTSIDE the roots, but negative INSIDE? Sketch the intuition in words. (2 steps)", "answer": "- Step 1: A parabola opening up (a > 0) has its minimum point on the x-axis (touching zero at the roots) and rises to +∞ on both sides. Between the two roots, the parabola dips below the x-axis, so y is negative.\n- Step 2: Outside the roots, the parabola has risen back above the x-axis on both sides, so y is positive. The roots themselves are exactly zero.\n\n**Mirror case:** If $$a < 0$$ (parabola opens down), the roles reverse — positive INSIDE, negative OUTSIDE.\n\n**The trap:** Students often pick \"the interval between the roots\" just because the roots are the salient numbers. The sign of a (or the inequality sign) decides which side you keep.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "When does a quadratic inequality solution use \"and\" versus \"or\", and why is \"and\" the wrong choice for separated regions?", "answer": "- **\"And\"** is for a single connected interval (e.g., $$0 < x < 2$$). The value of x must satisfy both bounds simultaneously.\n- **\"Or\"** is for a union of separated intervals (e.g., $$x < 0 \\text{ or } x > 2$$). The value of x can be in either piece, but not both — no number can be simultaneously less than 0 and greater than 2.\n\n**Why \"and\" is wrong for separated regions:** A number cannot be in two disjoint sets at once. Writing \"x < 0 and x > 2\" gives an empty solution set.\n\n**Quick test:** Look at your solution set on a number line. If the highlighted regions are connected ⇒ \"and\". If they are separated (gap in between) ⇒ \"or\".", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "Solve −x² + 4x + 5 ≥ 0. Show the key moves without full calculation. (3 steps)", "answer": "- Step 1: Multiply by $$-1$$ (flip the inequality): $$x^2 - 4x - 5 \\leq 0$$.\n- Step 2: Factor: $$(x - 5)(x + 1) \\leq 0$$. Roots $$-1$$ and $$5$$.\n- Step 3: $$a > 0$$ with $$\\leq 0$$, so keep the INSIDE (negative part) and include the roots: $$-1 \\leq x \\leq 5$$.\n\n**Takeaway:** Multiplying an inequality by $$-1$$ flips BOTH the direction of the inequality AND the role of inside/outside (because a flips sign). Always re-derive from the new form; do not mechanically flip \"outside\" to \"inside\" alone.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For y = 1/x, what are the asymptotes, and in which quadrants do the branches lie? Why is the curve undefined at x = 0?", "answer": "- **Vertical asymptote:** $$x = 0$$ (the y-axis). $$1/x$$ is undefined at $$x = 0$$ because division by zero is undefined.\n- **Horizontal asymptote:** $$y = 0$$ (the x-axis). As $$x \\to \\pm\\infty$$, $$1/x \\to 0$$.\n- **Branches:** In Quadrant 1 ($$x > 0, y > 0$$) and Quadrant 3 ($$x < 0, y < 0$$). The branches never cross an axis (they only approach them).\n\n**Shape:** A hyperbola with two disjoint branches, symmetric about the origin.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "How does adding +1 to 1/x change the graph, the asymptotes, and the shape? Specifically, what are the asymptotes of y = 1/x + 1? (3 steps)", "answer": "- Step 1: Shape: $$y = 1/x + 1$$ is a vertical translation of $$y = 1/x$$ by 1 unit up. Every point $$(x, y)$$ on the original becomes $$(x, y + 1)$$.\n- Step 2: Vertical asymptote: UNCHANGED at $$x = 0$$. A vertical shift does not affect the x-values where the function is undefined.\n- Step 3: Horizontal asymptote: moves from $$y = 0$$ to $$y = 1$$. As $$x \\to \\pm\\infty$$, $$1/x \\to 0$$, so $$1/x + 1 \\to 1$$.\n\n**The trap:** Confusing the asymptotes' axes. The vertical asymptote is a vertical line ($$x = \\text{constant}$$); the horizontal asymptote is a horizontal line ($$y = \\text{constant}$$). They are perpendicular.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "For y = 1/(x − a) + c, state the vertical and horizontal asymptotes, and explain why each behaves as it does. (2 steps)", "answer": "- **Vertical asymptote:** $$x = a$$. The function is undefined where its denominator is zero, i.e., $$x - a = 0$$.\n- **Horizontal asymptote:** $$y = c$$. As $$x \\to \\pm\\infty$$, $$1/(x - a) \\to 0$$, so $$1/(x - a) + c \\to c$$.\n\n**Sanity rule:** The vertical asymptote always sits where the denominator vanishes. The horizontal asymptote is the limit at infinity, which is the constant outside the fraction.\n\n**For multi-effect transformations:** $$y = k/(x - a) + c$$: same asymptotes (the multiplier k does not move them, only stretches/reflects the curve).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A common mistake is to say \"the horizontal asymptote of y = 1/x + 1 is x = 1.\" Why is this wrong, and what is the correct form? (2 steps)", "answer": "- Step 1: \"Horizontal\" and \"vertical\" describe the orientation of the asymptote line. A horizontal asymptote is a HORIZONTAL line, which has the form $$y = \\text{constant}$$. A vertical asymptote is a VERTICAL line, which has the form $$x = \\text{constant}$$.\n- Step 2: For $$y = 1/x + 1$$, the horizontal asymptote is $$y = 1$$ (a horizontal line at height 1). The vertical asymptote is $$x = 0$$ (the y-axis). Writing \"$$x = 1$$\" describes a vertical line, which is not horizontal.\n\n**Mnemonic:** The y-value is fixed on a horizontal line, so its equation is $$y = \\ldots$$. The x-value is fixed on a vertical line, so its equation is $$x = \\ldots$$.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "For y = tan(ax), state the period and the equations of the asymptotes, in terms of a. Why does each behave as it does? (2 steps)", "answer": "- Step 1: Period = $$\\pi / |a|$$. The base period of $$\\tan x$$ is $$\\pi$$, and replacing $$x$$ with $$ax$$ compresses/stretches the graph horizontally by a factor of $$1/|a|$$, so the period shrinks (or grows) by the same factor.\n- Step 2: Asymptotes occur where tan is undefined: $$ax = \\pi/2 + k\\pi$$ for integer k. Solving for x: $$x = \\pi/(2a) + k\\pi/a$$.\n\n**Special case:** $$\\tan(4x)$$ has period $$\\pi/4$$ and asymptotes at $$x = \\pi/8 + k\\pi/4$$. $$\\tan(2x)$$ has period $$\\pi/2$$ and asymptotes at $$x = \\pi/4 + k\\pi/2$$.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What does \"the number of solutions of tan(ax) = g(x) on interval I\" really mean geometrically, and how do you turn it into a counting problem? (2 steps)", "answer": "- Step 1: Geometrically, a solution of $$\\tan(ax) = g(x)$$ is an x where the two curves meet. So the number of solutions equals the number of intersections of $$y = \\tan(ax)$$ and $$y = g(x)$$ on I.\n- Step 2: To count, draw both curves on the same axes. Mark the interval endpoints, then mark every asymptote of $$\\tan(ax)$$ inside the interval — these split the curve into monotone branches. On each branch, decide whether the second curve crosses the tangent branch (usually once if both are monotone there). Add them up.\n\n**Why not just multiply periods × solutions-per-period?** Because $$g(x)$$ is often not periodic (e.g., $$1/x + 1$$ has its own asymptote at $$x = 0$$), so the count near $$x = 0$$ and at the interval ends must be done by eye, not by formula.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "Outline the reliable 4-step procedure for counting intersections of y = tan(ax) and a non-periodic curve like y = 1/x + 1 on a given interval. (4 steps)", "answer": "- Step 1: Mark the interval endpoints on the x-axis.\n- Step 2: Mark every tangent asymptote inside the interval (these split tan into monotone branches).\n- Step 3: On each full branch, decide whether the non-periodic curve crosses the tangent branch (usually once if both are monotone there).\n- Step 4: Check the partial branches at each interval endpoint and the region near $$x = 0$$ (where $$1/x + 1$$ has its own asymptote) separately by eye.\n\n**Why this beats a formula:** A non-periodic curve changes the count near its own asymptotes, so any \"periods × per-period\" shortcut will be off near $$x = 0$$ and at the ends.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "For tan(4x) = 1/x + 1 on [0, 4π], why is it wrong to count as if it were tan(x), and what is the correct period-based first step? (3 steps)", "answer": "- Step 1: $$\\tan(4x)$$ is not $$\\tan(x)$$ — it repeats 4 times more often. The period is $$\\pi/4$$, not $$\\pi$$. If you count on a $$\\pi$$-period you will undercount by a factor of 4.\n- Step 2: First step: compute the new period. Period of $$\\tan(4x) = \\pi/|4| = \\pi/4$$.\n- Step 3: Then count branches on the exact interval $$[0, 4\\pi]$$. Number of full periods in $$[0, 4\\pi]$$ is $$4\\pi / (\\pi/4) = 16$$. Then verify the count by eye, especially near $$x = 0$$ and the interval ends.\n\n**General rule:** Always recompute the period of the transformed trig function BEFORE counting intersections.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "For y = A cos(kx) + C (in degrees), state the amplitude, midline, period, and range. Why does each behave as it does? (4 steps)", "answer": "- Step 1: Amplitude = $$|A|$$. The amplitude is half the total vertical spread, and $$|A|$$ measures how far the curve deviates from the midline.\n- Step 2: Midline: $$y = C$$. The constant C shifts the whole graph up by C; the cosine's \"centre of oscillation\" is at $$y = C$$.\n- Step 3: Period = $$360° / |k|$$. The base cosine has period $$360°$$; replacing $$x$$ with $$kx$$ compresses horizontally by $$1/|k|$$, so the period becomes $$360°/|k|$$.\n- Step 4: Range = $$[C - |A|, C + |A|]$$. The curve oscillates $$|A|$$ above and below the midline, so the maximum is $$C + |A|$$ and the minimum is $$C - |A|$$.\n\n**For $$y = \\cos(2x)$$:** $$A = 1, k = 2, C = 0$$, so amplitude 1, midline $$y = 0$$, period $$180°$$, range $$[-1, 1]$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "On 0 ≤ x ≤ 225°, the curve y = cos(2x) passes through (0°, 1) → (45°, 0) → (90°, −1) → (135°, 0) → (180°, 1) → (225°, 0). How many monotone pieces does this split into, and what is the y-range on each? (3 steps)", "answer": "- Step 1: Three monotone pieces: A is down on $$[0°, 90°]$$ (y from 1 down to $$-1$$), B is up on $$[90°, 180°]$$ (y from $$-1$$ up to 1), C is down on $$[180°, 225°]$$ (y from 1 down to 0 — only a partial piece).\n- Step 2: y-ranges: A covers $$y \\in [-1, 1]$$; B covers $$y \\in [-1, 1]$$; C covers $$y \\in [0, 1]$$ only.\n- Step 3: This asymmetry of piece C (it doesn't reach down to $$-1$$) is exactly what makes \"exactly two solutions\" sensitive to the value of p. It costs C the ability to hit $$p \\in (-1, 0)$$ at all.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For cos(2x) = p on 0 ≤ x ≤ 225°, which values of p give exactly two solutions, and which is the surprising endpoint trap? (2 steps)", "answer": "- **The values:** $$-1 < p < 0$$ (strict) or $$p = 1$$.\n  + $$p = 1$$: hit at $$x = 0$$ and $$x = 180$$ (Two solutions.)\n  + $$-1 < p < 0$$: hit once on piece A and once on piece B. Piece C is too short to reach negative y, so it adds nothing.\n- **The trap:** $$p = 0$$. It is tempting to include $$p = 0$$, but $$\\cos(2x) = 0$$ gives $$x = 45°, 135°$$, AND $$x = 225°$$ — three solutions, because $$R = (225°, 0)$$ lies on the curve.\n\n**General rule:** Whenever an interval endpoint sits on the x-axis (or on a peak/trough), test that endpoint's p-value separately. The boundary must be strict.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "Compare \"exactly two solutions\" of cos(2x) = p on [0°, 225°] vs on [0°, 360°]. Why does the interval change the answer so much? (2 steps)", "answer": "- **On $$[0°, 225°]$$:** The curve makes 1.25 cycles. Piece C is a half-branch from $$(180°, 1)$$ to $$(225°, 0)$$, so it only reaches $$y \\in [0, 1]$$. Answer: $$-1 < p < 0$$ or $$p = 1$$.\n- **On $$[0°, 360°]$$:** The curve makes a full 2 cycles: down-up-down-up. For a generic $$p \\in (-1, 1)$$, each cycle contributes 2 intersections, so 4 total. To get exactly 2, you need an extreme value where cycles \"collapse\" to one intersection: $$p = -1$$ (at $$x = 90°, 270°$$). At $$p = 1$$, both endpoints ($$x = 0°, 360°$$) are maxima, giving 3 solutions — $$p = 1$$ is excluded.\n\n**Why the interval matters:** The same curve, but a different number of branches covered, gives a completely different count. The interval is part of the question, never a detail.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "When counting solutions of cos(kx) = p on a closed interval, what is the universal rule about the interval endpoints, and why? (2 steps)", "answer": "- **The rule:** Test the value of p that the curve takes at each endpoint as a SEPARATE CASE. If the endpoint's y-value lies on a peak/trough/x-axis, $$p = (\\text{that value})$$ gains or loses solutions.\n- **Why:** The endpoint is a solution iff its y-value equals p. So $$p = (\\text{endpoint y-value})$$ either includes or excludes that solution. An endpoint on a maximum means $$p = \\max$$ gives that point as a solution — and if the curve also hits max elsewhere, you may get 2 or 3 solutions, not 1.\n\n**Concrete example from the lesson:** $$R = (225°, 0)$$ is the right endpoint. Setting $$p = 0$$ includes R as a solution, raising the count from 2 to 3 on $$[0°, 225°]$$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "On 0 ≤ x ≤ 225°, how many solutions does cos(2x) = 0.5 have? Justify using the three monotone pieces A, B, C. (2 steps)", "answer": "- Step 1: $$0.5 \\in (0, 1)$$. On piece A (down, $$y \\in [-1, 1]$$): 1 solution. On piece B (up, $$y \\in [-1, 1]$$): 1 solution. On piece C (down, $$y \\in [0, 1]$$): 1 solution.\n- Step 2: Total = 3 solutions.\n\n**Contrast:** On $$[0°, 180°]$$ (no piece C), the same $$p = 0.5$$ would give only 2 solutions (one each on A and B). Adding even a partial piece C adds an extra solution.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Describe the lesson-to-revision workflow you showed Harry, and what was his verdict? (2 steps)", "answer": "- Step 1: The workflow — for each lesson: (a) timestamped notes of the key formulas and methods; (b) screenshots of the exact question statements; (c) Q&A flashcards for concepts; (d) \"redo\" flashcards (question image front, blank back, solution back) for full questions; (e) a revision PDF that replaces the need to re-watch the video.\n- Step 2: Harry's verdict (transcript 02:27, 02:52): \"That's really excellent... if you keep that up, you will definitely see the benefits.\" He endorsed the workflow and noted that the redo flashcards (image front, blank back) force active problem-solving, not just reading.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "How should homework be treated, per Harry's advice at the end of the lesson, and what is the 4-step order of operations? (4 steps)", "answer": "Homework is a DIAGNOSTIC, not busywork. It is \"not strictly required but valuable\" because it exposes your mistakes.\n- Step 1: Turn each lesson mistake into a guide entry + a flashcard (the watch-list on page 2 of the guide).\n- Step 2: Redo the exact lesson questions cold, no notes.\n- Step 3: Do the homework to surface fresh mistakes.\n- Step 4: Add only the new mistake patterns to the watch-list.\n\n**Why this order matters:** Lesson consolidation must happen FIRST. Homework done before consolidation surfaces mistakes you cannot yet interpret, so you cannot extract general lessons from them.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "The lesson spans 5 different topics (geometry, fractions, inequalities, reciprocal/tangent graphs, cosine). What single meta-skill connects them, and what is the corresponding failure mode? (2 steps)", "answer": "- **The meta-skill:** Read the structure before calculating. For each problem, identify the given facts and assign each one a role (essential fact vs decoy; which determines the answer vs which is decoration). Then choose the right method.\n- **The failure mode it counters:** Pattern-matching to a familiar method and using only some of the givens, then grinding out a number without checking whether all facts have been used or whether the answer is even plausible.\n\n**Concrete manifestations in this lesson:** Not using the \"midpoint\" fact in geometry (got 90/7 instead of 15); missing the minus sign on a fraction (got $$5 - 2/x$$ instead of $$3 - 2/x$$); including $$p = 0$$ in the cosine answer (got 3 solutions instead of 2); confusing horizontal/vertical asymptote axes.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "Outline a 3-step error-checking procedure you can apply to any problem from this lesson BEFORE finalising your answer. (3 steps)", "answer": "- Step 1: **Have I used every given fact?** List all given information and tick off those used. If any are unticked, you have a problem.\n- Step 2: **Is my answer in the option list / a \"nice\" form?** If 90/7 is not an option, you have a problem. If you got $$5 - 2/x$$ when the options are all integers or $$3 - 2/x$$, you have a problem.\n- Step 3: **Did I test the interval endpoints and special values separately?** Inequalities, cosine solution counts, and tangent branch counts are all sensitive to endpoints and to values of p near the extremes. Always test $$p = 0$$, $$p = \\pm \\max$$, and the boundary x-values of the interval.\n\n**Why this works:** Most errors in this lesson were caught by one of these three checks. Building them in as habits catches the most common traps before they cost marks.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": true}, {"question": "Simplify (x+3) − (6 − x²)/x². (3 steps)", "answer": "- Step 1: Bracket the subtraction: $$(x+3) - \\frac{6 - x^2}{x^2}$$.\n- Step 2: Distribute: $$(x+3) - \\frac{6}{x^2} + \\frac{x^2}{x^2} = (x+3) - \\frac{6}{x^2} + 1$$.\n- Step 3: Combine constants: $$(x+3+1) - \\frac{6}{x^2} = x + 4 - \\frac{6}{x^2}$$.\n\n**The trap:** Writing $$(x+3) - \\frac{6}{x^2} + \\frac{x^2}{x^2} = (x+3) - \\frac{6}{x^2} - 1$$ (sign error on the $$x^2/x^2$$ term). The minus sign flips the sign of BOTH terms of $$\\frac{6 - x^2}{x^2}$$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In a triangle ABC, point D is on AB, DE is parallel to BC, AD:DB = 1:3, and ∠AED = 60°. You are asked to find the ratio AE/EC. Which given fact is most likely a decoy, and why? (2 steps)", "answer": "- Step 1: The ratio $$AD:DB = 1:3$$ lets you use the parallel-line property: $$AD/AB = AE/AC$$. So $$AE/AC = 1/4$$, which means $$AE:EC = 1:3$$.\n- Step 2: The 60° angle at E is a decoy. It does not affect the parallel-line ratio, which is purely a similarity (AAA) result and doesn't need any angle measure. If you reflexively use the 60°, you'll be solving a trig problem that wasn't asked.\n\n**General lesson:** In a ratio problem about parallel lines, the given angle is often a decoy. The ratio depends only on the segment ratio, not on the actual angle.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Why is counting solutions of tan(x) = 1/x + 1 near x = 0 more delicate than counting solutions of tan(x) = 1 (a constant)? (2 steps)", "answer": "- Step 1: $$\\tan(x) = 1$$ (constant) — the right side is a horizontal line. Each branch of $$\\tan(x)$$ crosses $$y = 1$$ exactly once (since tan is monotone on each branch and the line is constant). Counting is uniform: period × 1.\n- Step 2: $$\\tan(x) = 1/x + 1$$ — the right side has its own vertical asymptote at $$x = 0$$ and a horizontal asymptote at $$y = 1$$. Near $$x = 0$$, $$1/x + 1$$ shoots to $$±\\infty$$, so the behaviour on the first tangent branch is different from the behaviour on later branches. The count near $$x = 0$$ must be done by eye on the graph, not by formula.\n\n**Why this matters:** This is exactly why the lesson's three cases had to be solved by careful branch-by-branch drawing, not by \"periods × 1.\"", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "On [0°, 360°], the answer to \"exactly two solutions\" of cos(2x) = p is p = −1. Why is p = 1 also tempting but actually wrong? (2 steps)", "answer": "- Step 1: $$\\cos(2x) = 1$$ on $$[0°, 360°]$$ gives $$x = 0, 180, 360$$. That's three solutions, not two. The right endpoint $$x = 360°$$ is a closed-interval point, so it counts.\n- Step 2: To get exactly two at $$p = 1$$, you would need to exclude one of these. Harry's note: $$p = 1$$ is \"exactly two\" only if the right end $$x = 360°$$ is excluded (e.g., on $$[0°, 360°)$$). On the closed interval, $$p = 1$$ gives 3 solutions and is NOT an answer.\n\n**Takeaway:** When the interval is closed, both endpoints count. The \"exactly two\" answer must hold on the stated interval, not on a slightly different one.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the inequality −x² + 4x + 5 ≥ 0, what is the double-flip trap, and what is the safe procedure? (2 steps)", "answer": "- Step 1: The double-flip trap. When you multiply an inequality by $$-1$$, you must (a) flip the inequality sign, AND (b) the leading coefficient flips from negative to positive, so the inside/outside rule flips. Doing only (a) is the first trap. Forgetting (b) is the second.\n- Step 2: Safe procedure — rewrite the inequality with positive leading coefficient FIRST, then apply the standard rule. So $$-x^2 + 4x + 5 \\geq 0$$ becomes $$x^2 - 4x - 5 \\leq 0$$ (inequality flipped, a is now positive). Now the rule is simple: $$\\leq 0$$ with $$a > 0$$ means INSIDE the roots.\n\n**Why this is safer:** It separates the \"flip the sign\" step from the \"decide inside/outside\" step, so you don't have to think about both simultaneously.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "Where does y = 1/x + 1 pass through y = 2, and why is it not defined at x = 0? (2 steps)", "answer": "- Step 1: Setting $$1/x + 1 = 2$$ gives $$1/x = 1$$, so $$x = 1$$. The point is $$(1, 2)$$. Equivalently, the original $$y = 1/x$$ passes through $$(1, 1)$$, and translating up by 1 gives $$(1, 2)$$.\n- Step 2: The function is undefined at $$x = 0$$ because $$1/0$$ is undefined, and adding 1 does not change that. The vertical asymptote $$x = 0$$ stays put under a vertical translation.\n\n**General rule:** Vertical translation moves points up/down and shifts the horizontal asymptote, but it cannot \"create\" a defined value at the vertical asymptote.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "What is the period of y = tan(3x), and what is the equation of its first positive asymptote? (2 steps)", "answer": "- Step 1: Period = $$\\pi / |3| = \\pi/3$$.\n- Step 2: Asymptotes at $$3x = \\pi/2 + k\\pi$$ ⇒ $$x = \\pi/6 + k\\pi/3$$. The first positive one is at $$x = \\pi/6$$.\n\n**Sanity check:** $$\\tan(3x)$$ repeats 3 times more often than $$\\tan x$$, so its period should be 1/3 of $$\\pi$$, i.e., $$\\pi/3$$. ✓", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}], "count": 40}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In an ESAT geometry problem, you're given several facts about a triangle with ratios and a midpoint. What is the key strategic principle for using this information effectively? (2 steps)", "answer": "- Step 1: Assign a role to every given fact before starting calculations. Each piece of information (ratio, midpoint, right angle, parallel lines) must serve a specific purpose in the solution - either as essential data or as a deliberate decoy to test your understanding.\n- Step 2: When one length appears in multiple ratios, use shared-segment scaling by setting that length to a convenient whole number. This makes all other lengths concrete and eliminates fractions, revealing the geometric relationships more clearly.\n\nThe moment your calculated answer doesn't match any option, stop and identify which given fact you haven't used yet.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does the \"midpoint\" condition in triangle problems often act as a trigger for a specific ratio, and what ratio does it typically create?", "answer": "When M is the midpoint of side PR in a triangle, it immediately establishes that $$PM : MR = 1 : 2$$ and $$\\frac{PM}{PR} = \\frac{1}{2}$$. This becomes a trigger because of the midpoint theorem: if a line through the midpoint of one side is parallel to another side, it creates similar triangles with a fixed scale factor of $$\\frac{1}{2}$$. This means corresponding lengths in the similar triangles will also have the ratio $$1:2$$, making midpoint problems highly predictable once you recognize the pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "In the geometry problem where $$\\frac{QX}{PX} = \\frac{1}{6}$$ and $$\\frac{QX}{XR} = \\frac{2}{3}$$, explain the shared-segment scaling technique step by step. (3 steps)", "answer": "- Step 1: Identify that QX appears in both ratios, so set $$QX = 2$$ (chosen to make both denominators work cleanly with whole numbers).\n- Step 2: Use the ratios to find the other lengths: From $$\\frac{QX}{PX} = \\frac{1}{6}$$, we get $$PX = 12$$. From $$\\frac{QX}{XR} = \\frac{2}{3}$$, we get $$XR = 3$$.\n- Step 3: Now all lengths are concrete numbers, making subsequent calculations with midpoints, similar triangles, or other geometric relationships straightforward without fraction arithmetic.\n\nThis technique transforms abstract ratios into a concrete numerical diagram.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What is the conceptual difference between essential information and decoy information in ESAT geometry problems, and how do you distinguish them?", "answer": "Essential information directly contributes to finding the unknown quantity, while decoy information is given but not needed for the solution. To distinguish them: after solving, check if every given fact was used. If you found the correct
