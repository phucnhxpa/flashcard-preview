cess rate\n- Step 2: (a) P(X = 10) = (0.5)^10 = 0.0009766 ≈ 0.001\n- Step 3: (b) P(X ≥ 8) = P(X = 8) + P(X = 9) + P(X = 10)\n= 0.0439 + 0.0098 + 0.0010 = 0.0547 ≈ 0.055\n\nOnly about 5.5% chance of passing by guessing.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A dice is biased so P(5) is twice as likely as any other number. All other numbers equally likely. Find P(first 5 on 6th throw) and P(exactly three 5s in first 8 throws). (4 steps)", "answer": "- Step 1: Total probability = 1 = 2x + 5x = 7x, so x = 1/7, P(5) = 2/7\n- Step 2: Let X = number of 5s in 8 throws, X ~ B(8, 2/7)\n- Step 3: P(first 5 on 6th throw) = P(5 failures in first 5) × P(success on 6th)\n= (5/7)^5 × (2/7) ≈ 0.0178\n- Step 4: P(X = 3) = $$\\binom{8}{3} (2/7)^3 (5/7)^5$$ ≈ 0.278", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A test has 50 questions with 4 options each. A student got 32 correct for sure and guessed the remaining 18. They need 43 correct to pass. Find probability of passing. (4 steps)", "answer": "- Step 1: They already have 32 correct. Need 11 more from 18 guessed (since 43 - 32 = 11)\n- Step 2: Each guessed question has p = 1/4 chance of being correct\n- Step 3: Let Y = number of correct guesses from 18, Y ~ B(18, 0.25)\nNeed Y ≥ 11 to pass\n- Step 4: P(Y ≥ 11) = 1 - P(Y ≤ 10)\nFrom tables or calculator: P(Y ≤ 10) ≈ 0.9988\nSo P(pass) ≈ 0.0012\n\nVery low chance of passing — about 0.12%.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "An archer hits bullseye with probability 0.6. She shoots 20 arrows. Find P(at least 50% bullseyes). (3 steps)", "answer": "- Step 1: X ~ B(20, 0.6), need at least 50% = at least 10 bullseyes\n- Step 2: P(X ≥ 10) = 1 - P(X ≤ 9)\n- Step 3: Using tables or calculator: P(X ≤ 9) ≈ 0.2445, so P(X ≥ 10) ≈ 0.7555\n\nApproximately 75.6% chance of hitting at least 10 bullseyes out of 20 shots.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A genetic marker occurs in 4% of the population. In a sample of 50 people, find P(exactly 6 have the marker). (2 steps)", "answer": "- Step 1: X ~ B(50, 0.04)\n- Step 2: P(X = 6) = $$\\binom{50}{6} (0.04)^6 (0.96)^{44}$$ ≈ 0.0034\n\nThe probability is approximately 0.0034 (0.34%).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A switch has 0.08 probability of being faulty. In a sample of 10 switches, find: (a) P(exactly 4 faulty), (b) P(at least 1 faulty). (3 steps)", "answer": "- Step 1: X ~ B(10, 0.08)\n- Step 2: (a) P(X = 4) = $$\\binom{10}{4} (0.08)^4 (0.92)^6$$ ≈ 0.0054\n- Step 3: (b) P(X ≥ 1) = 1 - P(X = 0) = 1 - (0.92)^10 ≈ 1 - 0.4344 = 0.5656", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A hospital finds 3 out of 10 patients wait over 30 minutes. For 12 patients, find: (a) P(none wait over 30 min), (b) P(more than 2 wait over 30 min). (3 steps)", "answer": "- Step 1: X ~ B(12, 0.3), where \"success\" = waiting over 30 min\n- Step 2: (a) P(X = 0) = (0.7)^12 ≈ 0.0138\n- Step 3: (b) P(X > 2) = 1 - P(X ≤ 2) = 1 - 0.2528 ≈ 0.7472", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What is a Bernoulli trial? How does it relate to the binomial distribution? (2 steps)", "answer": "- Step 1: A Bernoulli trial is a single experiment with exactly two outcomes: success (probability p) and failure (probability q = 1-p)\n- Step 2: A binomial distribution B(n, p) is the sum of n independent Bernoulli trials: X = X₁ + X₂ + ... + Xₙ\n\nThe binomial distribution is essentially repeated Bernoulli trials counted together.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the expansion of (p + q)^n, what does the term containing p^r q^(n-r) represent in the binomial distribution? (2 steps)", "answer": "- Step 1: The term is $$\\binom{n}{r} p^r q^{n-r}$$\n- Step 2: This equals P(X = r) where X ~ B(n, p), because $$\\binom{n}{r}$$ gives the number of ways to arrange r successes in n trials, p^r is the probability of r successes, and q^(n-r) is the probability of the remaining failures\n\nThe binomial pmf comes directly from the binomial theorem expansion.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "Why is the binomial distribution considered a discrete probability distribution? (2 steps)", "answer": "- Step 1: A discrete random variable can only take specific, separate values (typically integers)\n- Step 2: For X ~ B(n, p), X can only take integer values from 0 to n (inclusive), not continuous values\n\nThe values X can take are countable: 0, 1, 2, ..., n.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "A salesman has probability 0.65 of getting a reply at each house. For 10 houses, find: (a) P(exactly 5 replies), (b) P(at least 5 replies). (3 steps)", "answer": "- Step 1: X ~ B(10, 0.65)\n- Step 2: (a) P(X = 5) = $$\\binom{10}{5} (0.65)^5 (0.35)^5$$ ≈ 0.1532\n- Step 3: (b) P(X ≥ 5) = 1 - P(X ≤ 4) = 1 - 0.0692 ≈ 0.9308", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A manufacturer knows 15% of chairs are green. In a sample of 10 chairs, find P(at least 5 green) and P(exactly 2 green). (3 steps)", "answer": "- Step 1: X ~ B(10, 0.15)\n- Step 2: P(X ≥ 5) = 1 - P(X ≤ 4) = 1 - 0.9902 ≈ 0.0098\n- Step 3: P(X = 2) = $$\\binom{10}{2} (0.15)^2 (0.85)^8$$ ≈ 0.2759", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In a sample of 120 damaged seeds, probability of growing is 0.075. Find mean and variance. (2 steps)", "answer": "- Step 1: X ~ B(120, 0.075)\n- Step 2: Mean = np = 120 × 0.075 = 9\nVariance = np(1-p) = 120 × 0.075 × 0.925 = 8.325", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A hotel receptionist has probability 0.02 of connecting a call to the wrong room. For 500 calls per day, find mean and variance of wrongly connected calls. (2 steps)", "answer": "- Step 1: X ~ B(500, 0.02)\n- Step 2: Mean = np = 500 × 0.02 = 10\nVariance = np(1-p) = 500 × 0.02 × 0.98 = 9.8", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A disease occurs in 2.5% of population. For a sample of 10 people, find P(exactly 2 have disease). For sample of 120, find mean and variance. (3 steps)", "answer": "- Step 1: For n = 10: P(X = 2) = $$\\binom{10}{2} (0.025)^2 (0.975)^8$$ ≈ 0.0206\n- Step 2: For n = 120: Mean = 120 × 0.025 = 3\n- Step 3: Variance = 120 × 0.025 × 0.975 = 2.925", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Let X ~ B(2n, 0.25). Find smallest n such that P(X ≥ n) ≤ 0.1. (3 steps)", "answer": "- Step 1: We need P(X ≥ n) ≤ 0.1, which means P(X ≤ n-1) ≥ 0.9\n- Step 2: Try values: for n = 4, X ~ B(8, 0.25), P(X ≤ 3) = 0.886 < 0.9 ✗\nFor n = 3, X ~ B(6, 0.25), P(X ≤ 2) = 0.932 > 0.9 ✓\n- Step 3: Since 2n = 6 → n = 3 is too small. Need 2n trials, so smallest n = 4 (2n = 8 trials)\n\nAnswer: n = 4", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A company produces components with 5% defective rate. In a sample of 50, find P(more than 5 defective). The company stops production if defectives exceed d. For P(stop) < 0.05, find smallest d. (4 steps)", "answer": "- Step 1: X ~ B(50, 0.05), want P(X > 5) = 1 - P(X ≤ 5)\n- Step 2: P(X ≤ 5) ≈ 0.9942, so P(X > 5) ≈ 0.0058\n- Step 3: For stopping: need P(X > d) < 0.05, or P(X ≤ d) > 0.95\n- Step 4: From tables: P(X ≤ 4) = 0.9764, P(X ≤ 5) = 0.9942\n+ d = 4 gives P(X > 4) = 1 - 0.9764 = 0.0236 < 0.05 ✓\n+ Smallest d = 4", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A spinner has p = 0.3 red. In 12 spins, what number of reds should be required to win a prize if the win probability must be less than 0.05? (3 steps)", "answer": "- Step 1: X ~ B(12, 0.3), need smallest r such that P(X ≥ r) < 0.05\n- Step 2: From tables: P(X ≤ 6) = 0.9614, P(X ≤ 7) = 0.9905\n- Step 3: P(X ≥ 7) = 1 - P(X ≤ 6) = 1 - 0.9614 = 0.0386 < 0.05\nSo need r = 7 or more reds to win\n\n7 reds needed to win.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "An archer with p = 0.6 shoots 12 sets of 20 arrows. Find P(at least 50% bullseyes in exactly 7 of the 12 sets). (4 steps)", "answer": "- Step 1: For one set of 20: P(at least 10) = 0.7555 (from earlier)\n- Step 2: Let Y = number of sets with at least 50% bullseyes, Y ~ B(12, 0.7555)\n- Step 3: Want P(Y = 7) = $$\\binom{12}{7} (0.7555)^7 (0.2445)^5$$\n- Step 4: ≈ 0.1587\n\nApproximately 15.9% chance of achieving at least 50% in exactly 7 out of 12 sets.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Why might using a binomial distribution to model the number of red cars in the first 15 new cars of a certain manufacturer be inappropriate? The manufacturer produces 12% red, 8% blue, 15% white, rest other colors. (3 steps)", "answer": "- Step 1: There are more than two outcomes: red, blue, white, and \"other\" — that's 4 categories\n- Step 2: A binomial requires exactly two outcomes (success/failure)\n- Step 3: This would require either: (a) defining \"success\" as just one color (e.g., red vs. not red), or (b) using a different distribution like multinomial\n\nTo use binomial, you'd need to consider \"red\" vs \"not red\" (12% vs 88%).", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "A door-to-door salesman has p = 0.05 success probability. Find: (a) P(at least 2 successes in first 10 visits), (b) minimum visits needed for P(at least 1 success) > 0.99. (4 steps)", "answer": "- Step 1: (a) X ~ B(10, 0.05), want P(X ≥ 2) = 1 - P(X ≤ 1)\nP(X ≤ 1) = P(X=0) + P(X=1) = 0.5987 + 0.3151 = 0.9138\nSo P(X ≥ 2) = 1 - 0.9138 = 0.0862\n- Step 2: (b) Want smallest n such that P(X ≥ 1) > 0.99\nP(X ≥ 1) = 1 - P(X = 0) = 1 - (0.95)^n > 0.99\n- Step 3: (0.95)^n < 0.01\n- Step 4: Taking logs: n ln(0.95) < ln(0.01), n > ln(0.01)/ln(0.95) ≈ 90.4\n\nSo need at least 91 visits.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A biased dice is thrown 5 times, 500 times. Data shows frequencies: 0 sixes: 163, 1 six: 208, 2 sixes: 98, 3 sixes: 28, 4 sixes: 3, 5 sixes: 0. Estimate p and compare expected vs observed frequencies. (4 steps)", "answer": "- Step 1: Total sixes = 0×163 + 1×208 + 2×98 + 3×28 + 4×3 = 466\nMean = 466/500 = 0.932\n- Step 2: For B(5, p), E(X) = 5p, so p ≈ 0.932/5 = 0.1864\n- Step 3: Expected frequencies for B(5, 0.1864):\nP(0) = 0.323 → 161.5, P(1) = 0.369 → 184.7\nP(2) = 0.203 → 101.5, P(3) = 0.087 → 43.5\nP(4) = 0.017 → 8.5, P(5) = 0.001 → 0.5\n- Step 4: The model fits reasonably for 0, 1, 2 sixes but overestimates 3, 4, 5. The zero observed for 5 sixes is particularly unlikely (expected 0.5). Some deviation from binomial may exist.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "How can the variance of observed data support the use of a binomial distribution? (2 steps)", "answer": "- Step 1: For binomial B(n, p), theoretical variance = np(1-p)\n- Step 2: Calculate sample variance from data and compare to np(1-p) using estimated p\n+ If close, supports binomial assumption\n+ If significantly different, suggests binomial may not be appropriate\n\nIn the dice example: sample variance ≈ 0.932 (from mean), theoretical = 5 × 0.1864 × 0.8136 ≈ 0.76 — reasonably close, supporting binomial.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A fair coin is tossed 8 times. Find: (a) P(no heads), (b) P(at least 2 heads), (c) P(more heads than tails). (3 steps)", "answer": "- Step 1: X ~ B(8, 0.5)\n- Step 2: (a) P(X = 0) = (0.5)^8 = 0.0039\n(b) P(X ≥ 2) = 1 - P(X ≤ 1) = 1 - (0.0039 + 0.0313) = 0.9648\n- Step 3: (c) More heads than tails means X > 4 (since 8 is even)\nP(X > 4) = P(X ≥ 5) = P(X = 5,6,7,8) = 0.5 - P(X = 4)/2 = 0.5 - 0.21875 = 0.28125\n\nDue to symmetry of p = 0.5, P(X > 4) = (1 - P(X = 4))/2 = (1 - 0.2734)/2 = 0.3633", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In a tray of 15 plants, 25% have blue flowers. Find P(exactly 4 blue), P(at most 3 blue), P(between 3 and 6 inclusive). (3 steps)", "answer": "- Step 1: X ~ B(15, 0.25)\n- Step 2: P(X = 4) = $$\\binom{15}{4} (0.25)^4 (0.75)^{11}$$ ≈ 0.225\nP(X ≤ 3) ≈ 0.461\n- Step 3: P(3 ≤ X ≤ 6) = P(X ≤ 6) - P(X ≤ 2) = 0.943 - 0.236 = 0.707", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A test has n questions with 4 options. A student guesses all. Given E(X) = 4.8 and Var(X) = 2.88, find n and p. (3 steps)", "answer": "- Step 1: E(X) = np = 4.8, Var(X) = np(1-p) = 2.88\n- Step 2: Divide: Var/E = (np(1-p))/(np) = 1-p = 2.88/4.8 = 0.6\nSo p = 0.4\n- Step 3: n = 4.8/0.4 = 12 questions, p = 0.4 (but this is for guessing — contradiction!)\n\nActually, for guessing p should be 0.25. The expected values given correspond to p = 0.4, suggesting either the model isn't pure guessing or there's an error. The math shows n = 12, p = 0.4.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "For X ~ B(12, 0.7), find E(X) and Var(X). (2 steps)", "answer": "- Step 1: E(X) = np = 12 × 0.7 = 8.4\n- Step 2: Var(X) = np(1-p) = 12 × 0.7 × 0.3 = 2.52", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "For X ~ B(n, 0.4) with E(X) = 3.2, find n, P(X = 5), and P(X ≤ 2). (3 steps)", "answer": "- Step 1: np = 3.2, so n × 0.4 = 3.2 → n = 8\n- Step 2: X ~ B(8, 0.4), P(X = 5) = $$\\binom{8}{5} (0.4)^5 (0.6)^3$$ ≈ 0.1239\n- Step 3: P(X ≤ 2) = P(0) + P(1) + P(2) = 0.1678 + 0.3356 + 0.2936 = 0.797", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A box of 48 biscuits has probability 0.04 of each biscuit being broken. Find P(at least 2 broken in a box). (3 steps)", "answer": "- Step 1: X ~ B(48, 0.04)\n- Step 2: P(X ≥ 2) = 1 - P(X ≤ 1) = 1 - [P(0) + P(1)]\nP(0) = (0.96)^48 ≈ 0.141\nP(1) = 48 × 0.04 × (0.96)^47 ≈ 0.281\n- Step 3: P(X ≥ 2) ≈ 1 - 0.422 = 0.578", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For a binomial distribution X ~ B(n, p), write the formula for P(X = r) in terms of n, p, and r. Explain what each component represents. (3 steps)", "answer": "- Step 1: The formula is $$\\mathrm{P}(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$ where $$\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$$\n- Step 2: The term $$\\binom{n}{r}$$ represents the number of different ways to arrange r successes among n trials (the number of different sequences that give exactly r successes)\n- Step 3: The term $$p^r$$ accounts for the probability of getting r successes, and $$(1-p)^{n-r}$$ accounts for the probability of getting (n-r) failures\n\nThe sum of all probabilities for r = 0 to n equals 1 because $$(p + (1-p))^n = 1^n = 1$$", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In your own words, explain why the binomial probability formula contains the term $$\\binom{n}{r}$$. What does this term actually count? (2 steps)", "answer": "- Step 1: When conducting n independent trials with probability p of success, there are many different sequences that can produce exactly r successes. For example, if n = 4 and r = 2, the sequences SSFF, SFSF, SFFS, FSSF, FSFS, and FFSS all give exactly 2 successes\n- Step 2: The term $$\\binom{n}{r}$$ counts these distinct arrangements — it tells you how many different ways you can choose which r of the n trials will be the \"successes\"\n\nThis is why the formula multiplies $$\\binom{n}{r}$$ by $$p^r(1-p)^{n-r}$$ — to account for all possible arrangements that yield r successes.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "If X ~ B(5, 0.3), write down all the individual probabilities P(X = 0), P(X = 1), ..., P(X = 5) in simplified form without calculating numerical values. (3 steps)", "answer": "- Step 1: Using the formula P(X = r) = C(5,r) × (0.3)^r × (0.7)^(5-r):\n- Step 2: P(X = 0) = C(5,0) × (0.3)^0 × (0.7)^5 = 1 × 1 × 0.7^5 = 0.7^5\n+ P(X = 1) = C(5,1) × (0.3)^1 × (0.7)^4 = 5 × 0.3 × 0.7^4\n+ P(X = 2) = C(5,2) × (0.3)^2 × (0.7)^3 = 10 × 0.3^2 × 0.7^3\n+ P(X = 3) = C(5,3) × (0.3)^3 × (0.7)^2 = 10 × 0.3^3 × 0.7^2\n+ P(X = 4) = C(5,4) × (0.3)^4 × (0.7)^1 = 5 × 0.3^4 × 0.7\n+ P(X = 5) = C(5,5) × (0.3)^5 × (0.7)^0 = 1 × 0.3^5 × 1 = 0.3^5\n- Step 3: Notice the binomial coefficients 1, 5, 10, 10, 5, 1 correspond to the 5th row of Pascal's triangle", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Explain why for X ~ B(n, p), we always have p + q = 1 where q = 1 - p. What does this mean for the sum of all probabilities P(X = 0) + P(X = 1) + ... + P(X = n)? (2 steps)", "answer": "- Step 1: Since each trial has only two outcomes (success with probability p and failure with probability q), and these are mutually exclusive and exhaustive, p + q must equal 1\n- Step 2: The sum of all probabilities equals $$(p+q)^n = 1^n = 1$$ by the binomial theorem. This confirms the distribution is properly normalized — total probability equals 1, as required for any valid probability distribution\n\nThis property is a consistency check that confirms the binomial formula produces valid probabilities.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the difference between the \"index\" n and the \"parameter\" p in a binomial distribution X ~ B(n, p)? (1 step)", "answer": "- In X ~ B(n, p), the index n represents the fixed number of trials (a positive integer like 10, 20, 50), while the parameter p represents the fixed probability of success for each trial (a number between 0 and 1). Together, these two values completely specify a binomial distribution.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A biased coin has probability 0.4 of landing heads. The coin is flipped 10 times. Let X be the number of heads. Write this in correct binomial notation and identify the values of n and p. (1 step)", "answer": "- The correct notation is $$X \\sim \\mathrm{B}(10, 0.4)$$ where n = 10 (the number of trials/flips) and p = 0.4 (the probability of success, i.e., getting heads)", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For each situation below, state whether a binomial distribution is appropriate. If not, explain why.\na) Counting how many times you need to flip a coin until you get 4 heads in a row\nb) Selecting 20 bolts from a large batch and checking how many are faulty (with 1% fault rate)\nc) Recording the number of red cars observed in the first 15 new cars of a certain make (with 12% red, 8% blue, 15% white, 65% other) (3 parts)", "answer": "- a) NOT binomial — the number of trials is not fixed (it depends on when you get 4 heads); this is a negative binomial or geometric situation\n- b) Binomial is appropriate — fixed number of trials (20), two outcomes (faulty/not faulty), fixed probability (0.01), and assuming large batch makes trials independent: X ~ B(20, 0.01)\n- c) NOT binomial — there are more than two possible outcomes (red, blue, white, other = 4 categories), so binomial does not apply; this would be multinomial", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "A student claims that if you flip a fair coin 3 times, P(X = 2) = 3 × (1/2)^2. Explain why this is incorrect and write the correct calculation. (2 steps)", "answer": "- Step 1: The student's formula is missing the probability of the failures — they only accounted for getting 2 heads but forgot to account for getting 1 tail\n- Step 2: The correct formula is $$\\mathrm{P}(X=2) = \\binom{3}{2} \\times (0.5)^2 \\times (0.5)^1 = 3 \\times 0.5^3 = 3 \\times \\frac{1}{8} = \\frac{3}{8}$$\n\nThe exponent on (0.5) must add to 3 — both successes AND failures matter in the probability calculation.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "For a binomial distribution, what does it mean to calculate a cumulative probability P(X ≤ k)? How does this differ from P(X = k)? (2 steps)", "answer": "- Step 1: P(X = k) is the probability of exactly k successes — a single point on the distribution (one specific value)\n- Step 2: P(X ≤ k) is the cumulative probability — the probability of getting k or fewer successes, which equals P(X = 0) + P(X = 1) + ... + P(X = k)\n\nCumulative probabilities \"add up\" all the probability mass up to a certain point.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For X ~ B(20, 0.4), calculate P(X ≤ 7) using the cumulative probability concept. Write out the full expression. (2 steps)", "answer": "- Step 1: P(X ≤ 7) = P(X = 0) + P(X = 1) + P(X = 2) + P(X = 3) + P(X = 4) + P(X = 5) + P(X = 6) + P(X = 7)\n- Step 2: Each term uses the formula C(20,r)(0.4)^r(0.6)^(20-r), so:\n$$= \\binom{20}{0}0.4^0 0.6^{20} + \\binom{20}{1}0.4^1 0.6^{19} + ... + \\binom{20}{7}0.4^7 0.6^{13}$$\n\nThis equals approximately 0.4159 from tables or calculator.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Convert the following probability statements into the form P(X ≤ ...) for a binomial distribution:\na) P(X is greater than 5)\nb) P(X is at least 7)\nc) P(X is fewer than 10)\nd) P(X is at most 8) (4 parts)", "answer": "- a) P(X > 5) = 1 - P(X ≤ 5)\n- b) P(X ≥ 7) = 1 - P(X ≤ 6)\n- c) P(X < 10) = P(X ≤ 9)\n- d) P(X ≤ 8) = P(X ≤ 8) (already in correct form)\n\nThese conversions are essential because binomial tables typically give cumulative probabilities P(X ≤ x).", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "If X ~ B(10, 0.7), explain why we cannot directly use binomial tables with p = 0.7. How can we solve this problem? (3 steps)", "answer": "- Step 1: Standard binomial tables typically only include values of p up to 0.5 (or sometimes 0.5 and below)\n- Step 2: When p > 0.5, we can redefine the problem by swapping what we call \"success\" and \"failure\"\n- Step 3: Let Y = number of failures. If X ~ B(10, 0.7) counts successes with p = 0.7, then Y ~ B(10, 0.3) counts failures with p = 0.3, and we can use the relationship:\n$$\\mathrm{P}(X \\leq 6) = \\mathrm{P}(Y \\geq 4) = 1 - \\mathrm{P}(Y \\leq 3)$$\n\nThis transformation allows us to use tables with p ≤ 0.5.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For X ~ B(12, 0.3), calculate P(X ≥ 5) using the cumulative probability approach. Write out the full calculation. (2 steps)", "answer": "- Step 1: Since P(X ≥ 5) = 1 - P(X ≤ 4), we need to compute:\n$$\\mathrm{P}(X \\leq 4) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\mathrm{P}(X=2) + \\mathrm{P}(X=3) + \\mathrm{P}(X=4)$$\n- Step 2: This equals:\n$$= \\binom{12}{0}0.3^0 0.7^{12} + \\binom{12}{1}0.3^1 0.7^{11} + \\binom{12}{2}0.3^2 0.7^{10} + \\binom{12}{3}0.3^3 0.7^9 + \\binom{12}{4}0.3^4 0.7^8$$\n\nThen P(X ≥ 5) = 1 - this sum = approximately 0.2763", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Explain what a Bernoulli trial is. What are the expected value and variance of a single Bernoulli trial with probability of success p? (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single experiment with exactly two possible outcomes: success (with probability p) or failure (with probability 1-p)\n- Step 2: For a Bernoulli random variable X:\n$$\\mathrm{E}(X) = 0 \\times (1-p) + 1 \\times p = p$$\n- Step 3: The variance is:\n$$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 = (0^2 \\times (1-p) + 1^2 \\times p) - p^2 = p - p^2 = p(1-p)$$\n\nA Bernoulli trial is the building block of the binomial distribution.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Derive the mean E(X) = np for X ~ B(n, p) from the concept of summing n independent Bernoulli trials. (3 steps)", "answer": "- Step 1: A binomial distribution X ~ B(n, p) can be thought of as the sum of n independent Bernoulli trials: X = X₁ + X₂ + ... + Xₙ, where each Xᵢ = 1 if trial i is a success, 0 otherwise\n- Step 2: Using the linearity of expectation:\n$$\\mathrm{E}(X) = \\mathrm{E}(X_1 + X_2 + ... + X_n) = \\mathrm{E}(X_1) + \\mathrm{E}(X_2) + ... + \\mathrm{E}(X_n)$$\n- Step 3: Since each Xᵢ has E(Xᵢ) = p (from the Bernoulli trial), we get:\n$$\\mathrm{E}(X) = p + p + ... + p = np$$\n\nThis derivation shows the mean is simply the number of trials multiplied by the probability of success per trial.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Derive the variance Var(X) = np(1-p) for X ~ B(n, p) from the concept of summing n independent Bernoulli trials. (3 steps)", "answer": "- Step 1: Since the n Bernoulli trials are independent, the variance of their sum equals the sum of their variances:\n$$\\mathrm{Var}(X) = \\mathrm{Var}(X_1 + X_2 + ... + X_n) = \\mathrm{Var}(X_1) + \\mathrm{Var}(X_2) + ... + \\mathrm{Var}(X_n)$$\n- Step 2: For each Bernoulli trial, Var(Xᵢ) = p(1-p) (as derived earlier)\n- Step 3: Therefore:\n$$\\mathrm{Var}(X) = p(1-p) + p(1-p) + ... + p(1-p) = np(1-p)$$\n\nThis shows variance increases with both n and the product p(1-p), which is maximum when p = 0.5.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "If X ~ B(20, 0.2), find the mean and standard deviation. Explain what these values tell you about the distribution. (2 steps)", "answer": "- Mean: E(X) = np = 20 × 0.2 = 4\n- Variance: Var(X) = np(1-p) = 20 × 0.2 × 0.8 = 3.2, so standard deviation σ = √3.2 ≈ 1.79\n- Step 2: On average, we expect 4 successes in 20 trials, with typical deviations from this mean of about 1.79. Most values will fall within roughly 4 ± 1.79, i.e., between about 2 and 6.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "For a binomial distribution, when is the variance maximized? What is the maximum variance for n trials? (2 steps)", "answer": "- Step 1: The variance formula is Var(X) = np(1-p) = n[p - p²]. This is a quadratic in p that opens downward, with maximum at p = 0.5 (the vertex of the parabola)\n- Step 2: At p = 0.5, the maximum variance is: Var(X) = n × 0.5 × 0.5 = n/4\n\nSo when p = 0.5 (fairest outcome), the distribution is most \"spread out\"; when p is near 0 or 1, outcomes are more predictable (lower variance).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Given that X ~ B(n, p) with E(X) = 4.8 and Var(X) = 2.88, find the values of n and p. Show your reasoning. (3 steps)", "answer": "- Step 1: From E(X) = np = 4.8, we have n = 4.8/p\n- Step 2: From Var(X) = np(1-p) = 2.88, substitute n: (4.8/p) × p × (1-p) = 2.88 → 4.8(1-p) = 2.88\n- Step 3: Solve: 4.8 - 4.8p = 2.88 → 4.8p = 4.8 - 2.88 = 1.92 → p = 1.92/4.8 = 0.4\nThen n = 4.8/0.4 = 12\nSo n = 12 and p = 0.4", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A spinner has probability 0.3 of landing on red. If spun 12 times, what is the probability of getting no more than 2 reds? Write this in correct binomial notation and identify the phrase \"no more than 2\". (2 steps)", "answer": "- Let X = number of reds in 12 spins, so X ~ B(12, 0.3)\n- \"No more than 2\" means X ≤ 2, so we need P(X ≤ 2) = P(X = 0) + P(X = 1) + P(X = 2)\n\nThis equals C(12,0)(0.3)^0(0.7)^12 + C(12,1)(0.3)^1(0.7)^11 + C(12,2)(0.3)^2(0.7)^10 ≈ 0.2528", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A factory produces components with 5% being faulty. If a random sample of 50 components is taken, what is the probability of finding fewer than 2 faulty components? Set up the problem fully. (2 steps)", "answer": "- Let X = number of faulty components in the sample, X ~ B(50, 0.05)\n- \"Fewer than 2\" means X < 2, which equals X ≤ 1, so we need:\n$$\\mathrm{P}(X \\leq 1) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1)$$\n$$= (0.95)^{50} + \\binom{50}{1}(0.05)(0.95)^{49}$$\n\nThis calculates to approximately 0.0764", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Explain why we can sometimes use a binomial distribution even when sampling without replacement, such as selecting sweets from a large bag. What assumption is needed? (2 steps)", "answer": "- Step 1: Normally, without replacement, the probability changes after each selection. However, if the population (bag) is \"large enough,\" the change is negligible\n- Step 2: The assumption needed is that the population is sufficiently large that the probability of success remains approximately constant. The textbook states \"large\" means large enough to make the assumption that the probability of success is constant\n\nFor example, selecting 5 sweets from a bag with thousands follows binomial reasonably well, but selecting 5 from a bag of 10 would not.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A bag contains strawberry and apple sweets in ratio 1:4. If 5 sweets are chosen \"at random without replacement,\" why might a binomial model still be appropriate? What are we really assuming? (2 steps)", "answer": "- The ratio 1:4 means P(strawberry) = 1/(1+4) = 0.2\n- We assume the bag contains a \"large number\" of sweets, so even though we're technically sampling without replacement, the probabilities change so minimally they can be treated as constant\n- Under this assumption, X = number of strawberry sweets in 5 picks follows B(5, 0.2)\n\nThe binomial model is an approximation when the population is large; it's exact only with replacement or infinite population.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Find the largest k such that P(X ≤ k) < 0.05 for X ~ B(50, 0.4). Explain the approach without doing the full calculation. (2 steps)", "answer": "- Step 1: We need to find the smallest k where the cumulative probability exceeds or equals 0.05, then subtract 1\n- Step 2: Using tables or calculator, we find:\nP(X ≤ 0) ≈ very small\nP(X ≤ 1) ≈ very small\n... continue checking until P(X ≤ 14) < 0.05 but P(X ≤ 15) > 0.05\n\nThe answer is k = 14. This type of problem asks for a percentile or critical value in the distribution.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A binomial random variable X has mean 6 and variance 3.6. Find n and p. Explain the two possible approaches. (3 steps)", "answer": "- Step 1: We have equations: np = 6 and np(1-p) = 3.6\n- Step 2: From first equation: p = 6/n. Substitute into second:\nn × (6/n) × (1 - 6/n) = 3.6 → 6(1 - 6/n) = 3.6\n- Step 3: 6 - 36/n = 3.6 → 36/n = 2.4 → n = 15\nThen p = 6/15 = 0.4\n\nAlternatively, solve the quadratic: p - p² = 3.6/n = 3.6/15 = 0.24 → p² - p + 0.24 = 0 → p = 0.4 or p = 0.6\n\nSince np = 6, if p = 0.6 then n = 10; if p = 0.4 then n = 15. Both are mathematically valid solutions.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why is the binomial distribution considered a good model for \"successes\" in a fixed number of independent trials? What makes it mathematically tractable? (2 steps)", "answer": "- Step 1: The binomial distribution is mathematically tractable because it has a simple closed-form formula: P(X = r) = C(n,r)p^r(1-p)^(n-r)\n- Step 2: This formula comes directly from the binomial theorem (p+q)^n, making it easy to compute probabilities, cumulatives, mean, and variance. The simplicity of these formulas — np for mean and np(1-p) for variance — is what makes the binomial distribution so widely applicable and easy to use\n\nThe connection to the binomial expansion is not coincidental; it's the mathematical foundation.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "A biased coin has probability p of heads (p > 0.5). You flip it 20 times. Let X be the number of heads. If you want to find P(X ≤ 8), explain how you would set up the calculation differently than if p < 0.5. (2 steps)", "answer": "- Step 1: Since p > 0.5, you could either calculate directly using the formula with p, or transform to use tables for p < 0.5\n- Step 2: The transformation approach: Let Y = number of tails, where Y ~ B(20, 1-p) with (1-p) < 0.5. Then P(X ≤ 8) = P(at least 12 tails) = P(Y ≥ 12) = 1 - P(Y ≤ 11)\n\nBoth approaches give the same answer, but the transformation lets you use tables designed for smaller p values.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In the context of binomial distributions, what does it mean to \"redefine the random variable\"? Give a specific example with X ~ B(10, 0.7). (2 steps)", "answer": "- Step 1: Redefining the random variable means switching what we consider to be a \"success\" versus a \"failure\"\n- Step 2: For X ~ B(10, 0.7) counting heads with p = 0.7, define Y = number of tails. Then Y ~ B(10, 0.3). The relationship is: X = 10 - Y\n- So P(X ≤ 6) = P(Y ≥ 4) = 1 - P(Y ≤ 3)\n\nThis transformation allows us to use cumulative binomial tables that only cover p ≤ 0.5.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A study finds that 15% of a population is left-handed. A sample of 20 people is selected. Let X be the number of left-handed people. What is a suitable model? Justify your answer by checking each binomial condition. (3 steps)", "answer": "- Step 1: Model: X ~ B(20, 0.15)\n- Step 2: Checking conditions:\n+ Fixed number of trials: Yes, n = 20 people\n+ Two outcomes: Yes, left-handed (success) or not left-handed (failure)\n+ Fixed probability: Yes, p = 0.15 (assumed constant for the population)\n+ Independence: Yes, assuming each person is selected independently (random sample)\n- Step 3: All four conditions are satisfied, so binomial is appropriate", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Why can't we use a binomial distribution to model the number of trials needed to get the first success? What type of distribution would be appropriate instead? (2 steps)", "answer": "- Step 1: In binomial, the number of trials n is fixed in advance. When counting \"how many trials until first success,\" the number of trials is random and depends on when the first success occurs\n- Step 2: This is a geometric distribution (or negative binomial for \"r successes\"), not binomial. The key difference: binomial counts successes in a FIXED number of trials; geometric counts trials needed for the first success\n\nThis is a common misconception — make sure the number of trials is predetermined, not data-dependent.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "If you increase n while keeping p constant, what happens to:\na) the mean of the distribution?\nb) the standard deviation of the distribution? (2 steps)", "answer": "- a) Mean = np increases linearly with n. Double n, mean doubles\n- b) Standard deviation = √(np(1-p)) increases with √n. Double n, standard deviation increases by factor of √2, not 2\n\nThis shows that as you do more trials, the absolute spread increases (more total successes possible), but relative spread actually decreases (standard deviation grows slower than mean).", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "For X ~ B(n, p), if p is very small (close to 0) and n is moderate, describe the shape of the distribution. What does this imply about the probability of getting any successes? (2 steps)", "answer": "- Step 1: When p is very small (e.g., p = 0.01) with moderate n, the distribution is highly skewed to the right — most probability is concentrated at 0, with rapidly decreasing probabilities for higher values\n- Step 2: This means P(X = 0) = (1-p)^n will be very high (close to 1), while P(X ≥ 1) will be very low. The mean np will also be small\n\nFor example, X ~ B(100, 0.01) has mean = 1, and P(X = 0) ≈ 0.366 — almost 37% of the time you get zero successes.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "A driving test has a 60% pass rate. If 10 students take the test, use the binomial model to find the probability that at least 8 pass. Set up the calculation. (2 steps)", "answer": "- Let X = number of students who pass, X ~ B(10, 0.6)\n- \"At least 8\" means X ≥ 8 = P(X = 8) + P(X = 9) + P(X = 10)\n$$= \\binom{10}{8}0.6^8 0.4^2 + \\binom{10}{9}0.6^9 0.4^1 + \\binom{10}{10}0.6^{10} 0.4^0$$\n\nThis equals approximately 0.1673", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a binomial distribution, what is the relationship between the mean, variance, and standard deviation? If you know any two, can you find the third? (2 steps)", "answer": "- Step 1: Mean = E(X) = μ = np\n- Variance = Var(X) = σ² = np(1-p)\n- Standard deviation = σ = √(np(1-p))\n- Step 2: Given mean μ and variance σ², we can find p: p = 1 - (σ²/μ), then n = μ/p\n- Given mean and standard deviation, similar approach applies\n\nThe variance is always less than or equal to the mean (since 1-p ≤ 1), with equality only when p = 0.5.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A basketball player has a 70% free-throw success rate. In 25 attempts, what is the expected number of successful shots? What is the standard deviation? (2 steps)", "answer": "- Let X = number of successful free throws, X ~ B(25, 0.7)\n- Mean: E(X) = np = 25 × 0.7 = 17.5\n- Variance: Var(X) = np(1-p) = 25 × 0.7 × 0.3 = 5.25, so standard deviation = √5.25 ≈ 2.29\n\nOn average, expect about 17-18 successful shots out of 25, with typical variation of about 2 shots.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Explain why P(X = r) = P(X = n-r) when p = 0.5 for X ~ B(n, p). What symmetry does this reveal? (2 steps)", "answer": "- Step 1: When p = 0.5, we have P(X = r) = C(n,r)(0.5)^n and P(X = n-r) = C(n, n-r)(0.5)^n\n- Step 2: Since C(n, r) = C(n, n-r), these probabilities are equal. The distribution is symmetric about the mean np = n/2\n\nThis symmetry means P(X < n/2) = P(X > n/2), and the distribution looks the same on both sides of the center.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "If you flip a fair coin 5 times, what is the probability of getting exactly 2 heads OR exactly 3 heads? Set up the calculation. (2 steps)", "answer": "- \"Exactly 2 heads OR exactly 3 heads\" means P(X = 2) + P(X = 3), where X ~ B(5, 0.5)\n- P(X = 2) = C(5,2)(0.5)^2(0.5)^3 = 10 × (0.5)^5 = 10/32 = 5/16\n- P(X = 3) = C(5,3)(0.5)^3(0.5)^2 = 10 × (0.5)^5 = 10/32 = 5/16\n- Sum = 10/32 = 5/16 ≈ 0.3125\n\nThese are mutually exclusive events, so we add the probabilities.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A test has 10 true-false questions. A completely unprepared student guesses randomly on all questions. What is the probability of getting exactly 6 correct? What is the probability of getting at least 8 correct (passing threshold)? (2 steps)", "answer": "- Let X = number of correct answers, X ~ B(10, 0.5)\n- P(exactly 6 correct) = C(10,6)(0.5)^6(0.5)^4 = 210 × (0.5)^10 ≈ 0.205\n- P(at least 8 correct) = P(X = 8) + P(X = 9) + P(X = 10)\n= C(10,8)(0.5)^10 + C(10,9)(0.5)^10 + C(10,10)(0.5)^10\n= (45 + 10 + 1)/1024 = 56/1024 ≈ 0.0547", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In the binomial distribution formula P(X = r) = C(n,r)p^r(1-p)^(n-r), what happens to each term as r increases from 0 to n? Specifically, what happens to p^r and (1-p)^(n-r)? (2 steps)", "answer": "- As r increases:\n+ p^r increases (since p < 1, raising to higher power gives smaller numbers, but it's being multiplied by fewer failures)\n+ (1-p)^(n-r) decreases (fewer failures to raise to power)\n- The binomial coefficients C(n,r) first increase, reach a maximum near the mean np, then decrease\n- The product C(n,r)p^r(1-p)^(n-r) reflects this combination — highest probabilities are near the mean\n\nThis interplay between increasing p^r, decreasing (1-p)^(n-r), and the binomial coefficients creates the characteristic bell shape (or skewed shape when p ≠ 0.5).", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "A manufacturing process produces items with a 2% defect rate. In a batch of 100 items, what is the expected number of defects? What is the standard deviation? (2 steps)", "answer": "- Let X = number of defects, X ~ B(100, 0.02)\n- Mean: E(X) = np = 100 × 0.02 = 2\n- Variance: Var(X) = np(1-p) = 100 × 0.02 × 0.98 = 1.96, so standard deviation ≈ 1.4\n\nOn average, expect 2 defective items per batch, with typical variation of about 1-2 items.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Why is it important to check the assumptions before using a binomial model in real-world problems? What could go wrong if assumptions are violated? (2 steps)", "answer": "- Step 1: If assumptions are violated, the binomial model gives incorrect probabilities. For example, if trials are not independent (probability changes), predictions will be off\n- Step 2: Common violations:\n+ Probability not constant (e.g., sampling without replacement from small population)\n+ More than two outcomes (e.g., three traffic light colors)\n+ Fixed number of trials not predetermined (e.g., until first success)\n+ Trials not independent (e.g., sampling without replacement from small group)\n\nChecking assumptions is the first step in any modelling problem — without valid assumptions, the model's predictions are meaningless.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "For X ~ B(n, p), prove that E(X) = np using the definition of expectation for a discrete random variable. (3 steps)", "answer": "- Step 1: By definition, E(X) = Σ from r=0 to n of r × P(X = r)\n- Step 2: Substitute the binomial formula:\n$$= \\sum_{r=0}^n r \\binom{n}{r} p^r (1-p)^{n-r}$$\n- Step 3: Using combinatorial identity r × C(n,r) = n × C(n-1, r-1), this simplifies to:\n$$= n p \\sum_{r=1}^n \\binom{n-1}{r-1} p^{r-1} (1-p)^{n-r} = np(p + (1-p))^{n-1} = np$$\n\nThis derivation confirms the mean formula from first principles.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": true}, {"question": "For X ~ B(n, p), prove that Var(X) = np(1-p) using the definition of variance for a discrete random variable. (3 steps)", "answer": "- Step 1: Var(X) = E(X²) - [E(X)]². We already know E(X) = np\n- Step 2: Compute E(X²): E(X²) = Σ r² × P(X=r). Using the identity r(r-1)C(n,r) = n(n-1)C(n-2, r-2), we get:\n$$E[X(X-1)] = n(n-1)p^2$$\n- Step 3: So E(X²) = E[X(X-1)] + E(X) = n(n-1)p² + np\nTherefore: Var(X) = n(n-1)p² + np - (np)² = np(1-p)\n\nThis confirms the variance formula from first principles.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "A weather model predicts that each day has a 30% chance of rain independently. For a 7-day week, what is the probability it rains on exactly 3 days? What is the probability it rains on more days than not? (2 steps)", "answer": "- Let X = number of rainy days, X ~ B(7, 0.3)\n- P(exactly 3 rainy days) = C(7,3)(0.3)³(0.7)⁴ = 35 × 0.027 × 0.2401 ≈ 0.2269\n- \"More days than not\" means X > 3.5, i.e., X ≥ 4\n- P(X ≥ 4) = P(X = 4) + P(X = 5) + P(X = 6) + P(X = 7)\n= 1 - P(X ≤ 3) = 1 - 0.873 = 0.127 (approximately)", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the context of binomial distributions, explain what is meant by a \"cumulative probability function.\" How is it different from the probability mass function? (2 steps)", "answer": "- Step 1: The probability mass function (PMF) gives P(X = r) — the probability of exactly r successes\n- Step 2: The cumulative distribution function (CDF) gives P(X ≤ k) — the probability of getting k or fewer successes, which is the sum of PMF values from 0 to k\n\nThe CDF is useful for calculating probabilities involving inequalities like \"at most,\" \"no more than,\" \"at least,\" etc.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A company claims 95% of their products don't fail. You buy 20 of these products. What is the probability that exactly 2 fail? Set up the problem completely with notation. (2 steps)", "answer": "- Let X = number of products that fail, so success = \"doesn't fail\" with p = 0.95, failure = \"fails\" with p = 0.05\n- X ~ B(20, 0.05)\n- P(exactly 2 fail) = P(X = 2) = C(20,2)(0.05)²(0.95)¹⁸\n\nThis equals 190 × 0.0025 × 0.3972 ≈ 0.1887", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "If X ~ B(8, 1/3), calculate P(X ≤ 1) by adding the individual probabilities. Write out each term. (2 steps)", "answer": "- P(X ≤ 1) = P(X = 0) + P(X = 1)\n- P(X = 0) = C(8,0)(1/3)⁰(2/3)⁸ = 1 × 1 × (2/3)⁸ = 256/6561 ≈ 0.0390\n- P(X = 1) = C(8,1)(1/3)¹(2/3)⁷ = 8 × (1/3) × (2/3)⁷ = 8 × 128/2187 × 1/3 = 1024/6561 ≈ 0.1561\n- Sum ≈ 0.1951", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "What is the relationship between the binomial distribution and Pascal's triangle? How does this help you verify your calculations? (2 steps)", "answer": "- Step 1: The binomial coefficients C(n,0), C(n,1), ..., C(n,n) form the nth row of Pascal's triangle. For n = 3: 1, 3, 3, 1; for n = 4: 1, 4, 6, 4, 1; for n = 5: 1, 5, 10, 10, 5, 1\n- Step 2: These coefficients appear in the binomial probability formula. You can use Pascal's triangle to quickly verify the coefficients in your probability calculations\n\nFor example, for X ~ B(5, p), the probabilities should have coefficients 1, 5, 10, 10, 5, 1.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "A radar system detects aircraft with probability 0.8. If 10 aircraft approach, what is the probability that at least 9 are detected? Write this in binomial notation and identify the relevant probability phrase. (2 steps)", "answer": "- Let X = number of aircraft detected, X ~ B(10, 0.8)\n- \"At least 9\" means X ≥ 9 = P(X = 9) + P(X = 10)\n- = C(10,9)(0.8)⁹(0.2)¹ + C(10,10)(0.8)¹⁰(0.2)⁰\n= 10 × 0.1342 × 0.2 + 1 × 0.1074 × 1 ≈ 0.3758", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "In a binomial distribution, if someone tells you \"the probability of getting 3 successes in 8 trials is 0.15,\" how could you quickly verify if this is approximately correct for p = 0.5? (2 steps)", "answer": "- Step 1: For n = 8, p = 0.5, the exact probability is:\nP(X = 3) = C(8,3)(0.5)³(0.5)⁵ = 56 × (0.5)⁸ = 56/256 ≈ 0.21875\n- Step 2: The claimed 0.15 is not correct. This quick check shows the value should be around 0.22, not 0.15. Using the known fact that C(8,3) = 56 and (0.5)⁸ = 1/256 gives the exact answer immediately\n\nThis demonstrates how knowing the formula and simple calculations helps verify claims.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": true}, {"question": "A survey finds that 40% of people prefer tea over coffee. If you randomly select 15 people, what is the probability that between 4 and 8 (inclusive) prefer tea? Write the full expression. (2 steps)", "answer": "- Let X = number who prefer tea, X ~ B(15, 0.4)\n- \"Between 4 and 8 inclusive\" means 4 ≤ X ≤ 8 = P(X = 4) + P(X = 5) + P(X = 6) + P(X = 7) + P(X = 8)\n- This equals:\n$$\\sum_{r=4}^8 \\binom{15}{r} (0.4)^r (0.6)^{15-r}$$\n\nUsing cumulative: = P(X ≤ 8) - P(X ≤ 3) ≈ 0.966 - 0.350 ≈ 0.616", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "What does it mean when we say a binomial distribution is \"memoryless\"? Is it actually memoryless? Explain. (2 steps)", "answer": "- Step 1: The binomial distribution is NOT memoryless. Memoryless means P(X > m + n | X > m) = P(X > n), which applies to geometric and exponential distributions\n- Step 2: In binomial, knowing that you haven't succeeded in the first m trials does affect the distribution of remaining successes — the number of successes in n trials given 0 successes so far is still B(n,p), but this is not the memoryless property\n\nThis is a common misconception — don't confuse binomial with geometric distribution's memoryless property.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "Explain why the binomial distribution approaches a normal distribution as n becomes large. What is this theorem called? (2 steps)", "answer": "- Step 1: By the Central Limit Theorem, as n increases, the binomial distribution B(n, p) can be approximated by a normal distribution with mean np and variance np(1-p)\n- Step 2: This approximation works well when np > 5 and n(1-p) > 5 (some say np > 10 and n(1-p) > 10)\n\nThe normal approximation to binomial is useful for large n when calculating binomial probabilities manually using z-scores.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "In the binomial formula, what does it mean if p = 0 or p = 1? What are the probabilities in these edge cases? (2 steps)", "answer": "- Step 1: If p = 0 (never succeed), then X always equals 0:\nP(X = 0) = 1, P(X = r) = 0 for r > 0\n- Step 2: If p = 1 (always succeed), then X always equals n:\nP(X = n) = 1, P(X = r) = 0 for r < n\n- In both cases, variance = np(1-p) = 0 — there's no randomness\n\nThese edge cases represent degenerate distributions with no variance.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "A quality control process accepts a batch if fewer than 3 items are defective in a sample of 20. If the true defect rate is 10%, what is the probability of accepting a batch? Set up the calculation. (2 steps)", "answer": "- Let X = number of defective items, X ~ B(20, 0.1)\n- \"Fewer than 3\" means X < 3 = X ≤ 2\n- P(accept) = P(X ≤ 2) = P(X = 0) + P(X = 1) + P(X = 2)\n= (0.9)²⁰ + 20(0.1)(0.9)¹⁹ + 190(0.1)²(0.9)¹⁸\n\nThis equals approximately 0.391 + 0.348 + 0.152 ≈ 0.891", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "If X ~ B(n, p) and you know that P(X = 0) = 0.0069 and P(X = 1) = 0.0311, how could you find n and p? (3 steps)", "answer": "- Step 1: P(X = 0) = (1-p)^n = 0.0069\n- Step 2: P(X = 1) = n p (1-p)^(n-1) = 0.0311\n- Step 3: Divide P(X=1) by P(X=0): (n p (1-p)^(n-1)) / ((1-p)^n) = n p / (1-p) = 0.0311/0.0069 ≈ 4.507\nSo n p ≈ 4.507(1-p). Try integer n values... if n = 10, p ≈ 0.4 gives (1-p)^n = 0.6^10 ≈ 0.0060 close to 0.0069\n\nThis illustrates how to work backwards from probabilities to parameters.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "For X ~ B(12, p), given that P(X ≥ 1) = 0.83193, find the value of p. Explain the approach. (3 steps)", "answer": "- Step 1: P(X ≥ 1) = 1 - P(X = 0) = 1 - (1-p)¹² = 0.83193\n- Step 2: So (1-p)¹² = 1 - 0.83193 = 0.16807\n- Step 3: Take 12th root: 1-p = 0.16807^(1/12) ≈ 0.85, so p ≈ 0.15\n\nThis shows how to solve for p when given cumulative information.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "A binomial random variable has variance 2.4 and n = 10. Find the two possible values of p. Explain why there are two solutions. (2 steps)", "answer": "- Step 1: Using Var(X) = np(1-p) = 10p(1-p) = 2.4\n- Step 2: So p(1-p) = 0.24 → p - p² = 0.24 → p² - p + 0.24 = 0\n- Using quadratic formula: p = [1 ± √(1 - 0.96)]/2 = [1 ± 0.2]/2 = 0.6 or 0.4\n\nThere are two solutions because p and (1-p) can swap roles — getting 60% successes 10 times gives same variance as getting 40% failures 10 times.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "In the context of hypothesis testing with binomial, what does it mean if observed data has a much lower variance than what the binomial model predicts? (2 steps)", "answer": "- Step 1: If observed variance is much lower than np(1-p), it suggests the binomial model may not be appropriate\n- Step 2: Low variance could indicate: the probability p is not constant (maybe some items are systematically different), or the trials are not independent (there's correlation/clustering)\n\nThis is a diagnostic check — comparing theoretical variance to observed variance helps validate model assumptions.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": true}], "count": 59}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 12907, "out_tokens": 28930, "reasoning_chars": 51091, "cost_eur": 0.1056, "elapsed_s": 338, "content_chars": 42720}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 12907, "out_tokens": 10319, "reasoning_chars": 19070, "cost_eur": 0.0457, "elapsed_s": 182, "content_chars": 15997}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 12907, "out_tokens": 12129, "reasoning_chars": 22387, "cost_eur": 0.0515, "elapsed_s": 156, "content_chars": 15606}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 11807, "out_tokens": 10338, "reasoning_chars": 2486, "cost_eur": 0.0126, "elapsed_s": 81, "content_chars": 25706}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 11807, "out_tokens": 12333, "reasoning_chars": 1910, "cost_eur": 0.0147, "elapsed_s": 100, "content_chars": 37017}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 13251, "out_tokens": 7432, "reasoning_chars": 12834, "cost_eur": 0.0106, "elapsed_s": 112, "content_chars": 13273}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 13251, "out_tokens": 7656, "reasoning_chars": 18746, "cost_eur": 0.0109, "elapsed_s": 124, "content_chars": 14660}}};
const SK='s2_ch01';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
