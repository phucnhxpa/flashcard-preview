))^n = 1^n = 1$$, the sum of all probabilities is 1, as required. The name \"binomial\" reflects this connection to the binomial expansion.\n\nThus, the distribution arises naturally from the binomial theorem applied to probabilities of two outcomes.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "A binomial distribution has $$n=10, p=0.2$$. Without computing exact probabilities, determine whether $$\\mathrm{P}(X=3)$$ is greater than or less than $$\\mathrm{P}(X=2)$$. Explain your reasoning. (2 steps)", "answer": "- Step 1: The mean is $$\\mu = np = 2$$. For $$p=0.2$$, the distribution is skewed to the right (since $$p<0.5$$). The mode (most likely value) for binomial is at $$\\lfloor (n+1)p \\rfloor = \\lfloor 11 \\times 0.2 \\rfloor = \\lfloor 2.2 \\rfloor = 2$$.\n- Step 2: Since the mode is 2, $$\\mathrm{P}(X=2)$$ is the highest probability, and probabilities decrease as you move away from the mode. Therefore, $$\\mathrm{P}(X=3) < \\mathrm{P}(X=2)$$.\n\nThis reasoning uses the property that for binomial with $$p<0.5$$, the distribution peaks at or near $$np$$ and is right-skewed.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "For a binomial distribution, what is the mode (most probable value)? Give the formula and explain how it is derived. (3 steps)", "answer": "- Step 1: The mode is the value of $$x$$ that maximizes $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$.\n- Step 2: Consider the ratio $$\\frac{\\mathrm{P}(X=x)}{\\mathrm{P}(X=x-1)} = \\frac{(n-x+1)p}{x(1-p)}$$. This ratio is greater than 1 when $$x < (n+1)p$$, equal to 1 when $$x = (n+1)p$$ (if integer), and less than 1 when $$x > (n+1)p$$.\n- Step 3: Therefore, probabilities increase while $$x < (n+1)p$$ and decrease after $$x > (n+1)p$$. Hence the mode is the integer $$\\lfloor (n+1)p \\rfloor$$. If $$(n+1)p$$ is an integer, then both $$(n+1)p$$ and $$(n+1)p - 1$$ are modes (two equal maxima).\n\nThis gives a quick way to find the most likely number of successes.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "A random variable $$X \\sim \\mathrm{B}(n, p)$$ has variance $$np(1-p)$$. If $$n$$ is doubled and $$p$$ is halved, what happens to the mean and variance? (2 steps)", "answer": "- Step 1: Original mean $$\\mu_1 = np$$. New mean $$\\mu_2 = (2n)(p/2) = np = \\mu_1$$. So the mean stays the same.\n- Step 2: Original variance $$\\sigma_1^2 = np(1-p)$$. New variance $$\\sigma_2^2 = (2n)(p/2)(1 - p/2) = np(1 - p/2)$$. Compare to original: $$np(1 - p/2)$$ vs $$np(1-p)$$. Since $$p/2 < p$$, we have $$1 - p/2 > 1 - p$$, so the new variance is larger.\n\nSpecifically, $$\\sigma_2^2 = np - np^2/2$$, while $$\\sigma_1^2 = np - np^2$$. So variance increases by $$np^2/2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "In a binomial experiment, explain why the probability of exactly $$x$$ successes does not depend on the order of successes and failures. (2 steps)", "answer": "- Step 1: Because each trial is independent and the probability of success $$p$$ is constant, the probability of any specific sequence with $$x$$ successes and $$n-x$$ failures is always $$p^x(1-p)^{n-x}$$, regardless of order.\n- Step 2: The total probability of exactly $$x$$ successes is the sum over all such sequences, which is the number of sequences (i.e., $$\\binom{n}{x}$$) times the common probability. Hence the order does not matter; only the count matters.\n\nThis is a key feature of the binomial model: it \"forgets\" order.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "A survey finds that 30% of residents listen to local radio. Ten residents are chosen at random. Find the smallest value $$s$$ such that $$\\mathrm{P}(X \\ge s) < 0.01$$, where $$X$$ is the number who listen. Outline the method. (3 steps)", "answer": "- Step 1: Model $$X \\sim \\mathrm{B}(10, 0.3)$$. We need the smallest integer $$s$$ with $$\\mathrm{P}(X \\ge s) < 0.01$$.\n- Step 2: Convert to cumulative form: $$\\mathrm{P}(X \\ge s) = 1 - \\mathrm{P}(X \\le s-1) < 0.01 \\Rightarrow \\mathrm{P}(X \\le s-1) > 0.99$$.\n- Step 3: Look up cumulative probabilities for $$x=0,1,2,\\dots$$ in the binomial table for $$n=10, p=0.3$$ until you find the first $$x$$ where $$\\mathrm{P}(X \\le x) > 0.99$$. Then set $$s = x+1$$. For example, if $$\\mathrm{P}(X \\le 6) = 0.9894$$ and $$\\mathrm{P}(X \\le 7) = 0.9984$$, then $$s = 8$$ because $$\\mathrm{P}(X \\le 7) > 0.99$$, so $$\\mathrm{P}(X \\ge 8) = 1 - 0.9984 = 0.0016 < 0.01$$.\n\nThis systematic approach avoids trial and error.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Explain why, for a binomial distribution, the sum of probabilities $$\\sum_{x=0}^{n} \\binom{n}{x} p^x (1-p)^{n-x} = 1$$. What theorem guarantees this? (2 steps)", "answer": "- Step 1: The sum is exactly the binomial expansion of $$[p + (1-p)]^n = 1^n = 1$$.\n- Step 2: The binomial theorem states that $$(a+b)^n = \\sum_{x=0}^{n} \\binom{n}{x} a^x b^{n-x}$$. Here, $$a = p$$ and $$b = 1-p$$, so the sum equals $$(p + (1-p))^n = 1$$.\n\nThus, the binomial theorem ensures the probabilities sum to 1, a necessary condition for any probability distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A factory produces components with a 5% fault rate. An employee checks a random sample of 50 components. The employee will stop production if the number of faulty components exceeds a threshold $$d$$, and this happens less than 5% of the time. Find the smallest $$d$$. Outline the steps. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(50, 0.05)$$ be the number of faulty components. We need the smallest integer $$d$$ such that $$\\mathrm{P}(X > d) < 0.05$$, i.e., the probability of exceeding $$d$$ is less than 5%.\n- Step 2: Rewrite as $$\\mathrm{P}(X > d) = 1 - \\mathrm{P}(X \\le d) < 0.05 \\Rightarrow \\mathrm{P}(X \\le d) > 0.95$$.\n- Step 3: Use cumulative binomial tables (or calculator) for $$n=50, p=0.05$$ to find the smallest $$d$$ where $$\\mathrm{P}(X \\le d) > 0.95$$. For instance, if $$\\mathrm{P}(X \\le 4) = 0.949$$ and $$\\mathrm{P}(X \\le 5) = 0.986$$, then $$d = 5$$ because $$\\mathrm{P}(X \\le 5) > 0.95$$, and $$\\mathrm{P}(X > 5) = 1 - 0.986 = 0.014 < 0.05$$.\n\nThus, the threshold is 5 faulty components.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "What is the difference between $$\\mathrm{P}(X < k)$$ and $$\\mathrm{P}(X \\le k-1)$$ for a binomial random variable? Are they equal? (2 steps)", "answer": "- Step 1: Since $$X$$ is a discrete random variable taking integer values, the event $$X < k$$ means $$X$$ takes values less than $$k$$, i.e., $$X \\le k-1$$ (because the next integer below $$k$$ is $$k-1$$).\n- Step 2: Therefore, $$\\mathrm{P}(X < k) = \\mathrm{P}(X \\le k-1)$$. They are exactly equal.\n\nThis is a key point when using cumulative tables: always convert strict inequalities to $$\\le$$ form.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "For a binomial distribution with parameters $$n$$ and $$p$$, what is the probability of at least one success? Express it in a simple form. (2 steps)", "answer": "- Step 1: \"At least one success\" means $$X \\ge 1$$.\n- Step 2: $$\\mathrm{P}(X \\ge 1) = 1 - \\mathrm{P}(X = 0) = 1 - (1-p)^n$$.\n\nThis is often easier to compute than summing many terms, especially when $$n$$ is large.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A biased coin has probability $$p$$ of heads. It is tossed until a head appears. Is the number of tosses a binomial random variable? Why or why not? (2 steps)", "answer": "- Step 1: No, the number of tosses until the first success does **not** follow a binomial distribution. The binomial distribution counts the number of successes in a **fixed** number of trials, whereas here the number of trials is random.\n- Step 2: Additionally, the trials are not fixed in number; we continue until the first success, so the number of trials is not predetermined. This scenario follows a geometric distribution instead.\n\nThis highlights the importance of the \"fixed number of trials\" condition for the binomial model.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A box contains 10 balls, 3 red and 7 blue. Three balls are drawn without replacement. Let $$X$$ be the number of red balls drawn. Can $$X$$ be modelled by a binomial distribution? Explain. (2 steps)", "answer": "- Step 1: The draws are without replacement from a small population, so the probability of drawing a red ball changes after each draw. Hence the probability of success is not constant.\n- Step 2: Also, the draws are not independent because the composition of the box changes. Therefore, $$X$$ does **not** follow a binomial distribution. It actually follows a hypergeometric distribution.\n\nHowever, if the box had a large number of balls and we drew a small sample, the binomial could be an approximation.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "In a binomial distribution, if $$p = 0.5$$, what symmetry property does the distribution have? How can this simplify calculations? (2 steps)", "answer": "- Step 1: When $$p=0.5$$, the distribution is symmetric about the mean $$\\mu = n/2$$. That is, $$\\mathrm{P}(X = k) = \\mathrm{P}(X = n - k)$$ for all $$k$$.\n- Step 2: This symmetry can simplify calculations: for example, $$\\mathrm{P}(X \\le a) = \\mathrm{P}(X \\ge n - a)$$. Also, the cumulative probabilities for values above the mean can be deduced from those below the mean.\n\nThis property is useful when tables are only given for $$p \\le 0.5$$, but for $$p=0.5$$ we can often use symmetry directly.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "The random variable $$X \\sim \\mathrm{B}(n, p)$$ has $$\\mathrm{E}(X) = 4.8$$ and $$\\mathrm{Var}(X) = 2.88$$. Find $$n$$ and $$p$$. (3 steps)", "answer": "- Step 1: We have $$np = 4.8$$ and $$np(1-p) = 2.88$$.\n- Step 2: Divide variance by mean: $$\\frac{np(1-p)}{np} = 1-p = \\frac{2.88}{4.8} = 0.6$$. So $$p = 0.4$$.\n- Step 3: Then $$n = \\frac{4.8}{0.4} = 12$$. Hence $$X \\sim \\mathrm{B}(12, 0.4)$$.\n\nThis is a standard method for recovering parameters from mean and variance.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "For a binomial distribution, what happens to the shape as $$p$$ approaches 0? Describe the distribution of successes. (2 steps)", "answer": "- Step 1: As $$p \\to 0$$, successes become rare. The distribution becomes highly right-skewed, with most of the probability mass concentrated at $$X=0$$ and a rapidly decreasing tail for higher values.\n- Step 2: The mean $$np$$ becomes small, and the variance $$np(1-p) \\approx np$$ also becomes small. The distribution approximates a Poisson distribution with parameter $$\\lambda = np$$ when $$n$$ is large and $$p$$ is small.\n\nThis is the basis for the Poisson approximation to the binomial.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A binomial random variable $$X \\sim \\mathrm{B}(25, 0.2)$$. Find $$\\mathrm{P}(X \\ge 8)$$ using cumulative probabilities. Express the calculation in terms of cumulative probabilities without computing the final number. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\ge 8) = 1 - \\mathrm{P}(X \\le 7)$$.\n- Step 2: Look up $$\\mathrm{P}(X \\le 7)$$ in the cumulative binomial tables for $$n=25, p=0.2$$, or compute using a calculator, and subtract from 1.\n\nThe key is to correctly convert \"at least 8\" to a cumulative form.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Explain why the variance of a binomial distribution is always less than or equal to its mean (for $$0 < p < 1$$). When does equality hold? (2 steps)", "answer": "- Step 1: Variance $$\\sigma^2 = np(1-p)$$ and mean $$\\mu = np$$. Since $$0 < p < 1$$, we have $$1-p < 1$$, so $$np(1-p) < np$$, i.e., $$\\sigma^2 < \\mu$$.\n- Step 2: Equality $$\\sigma^2 = \\mu$$ would require $$1-p = 1$$, i.e., $$p=0$$, but then the distribution is degenerate (all failures). In the limit as $$p \\to 0$$, the variance approaches the mean (since $$1-p \\approx 1$$), which is the Poisson limit.\n\nThus, for non-degenerate binomial distributions with $$p>0$$, variance is strictly less than mean.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "A student claims that if $$X \\sim \\mathrm{B}(n, p)$$ then $$n - X \\sim \\mathrm{B}(n, 1-p)$$. Is this correct? Explain why. (2 steps)", "answer": "- Step 1: Yes, this is correct. If we redefine \"success\" as \"failure\" in the original experiment, then the number of failures $$n-X$$ counts the number of successes in this new definition.\n- Step 2: The new success probability is $$1-p$$, and the number of trials is still $$n$$, with independent trials and constant probability. Therefore, $$n-X \\sim \\mathrm{B}(n, 1-p)$$.\n\nThis symmetry is useful for calculations, especially when $$p > 0.5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "In a binomial distribution, what is the probability of getting exactly the mean number of successes? Is it usually high or low? Explain. (2 steps)", "answer": "- Step 1: The mean is $$\\mu = np$$, which may not be an integer. If $$np$$ is an integer, then $$\\mathrm{P}(X = np)$$ is the probability at the mode (or near it). If $$np$$ is not integer, the probability at the nearest integers may be considered.\n- Step 2: Even at the mode, the probability is typically not very high, especially for large $$n$$, because the distribution spreads out. For example, with $$n=100, p=0.5$$, $$\\mathrm{P}(X=50) \\approx 0.08$$, which is the highest but still only 8%. So getting exactly the mean is not very likely; the distribution has dispersion.\n\nThis highlights that the mean is an average, not a highly probable single outcome.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "A fair dice is rolled 10 times. What is the probability of getting at least one 6? Use the complement method. (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of 6s in 10 rolls. Then $$X \\sim \\mathrm{B}(10, 1/6)$$.\n- Step 2: $$\\mathrm{P}(X \\ge 1) = 1 - \\mathrm{P}(X = 0) = 1 - (5/6)^{10} \\approx 1 - 0.1615 = 0.8385$$.\n\nThe complement method is efficient for \"at least one\" problems.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is $$\\mathrm{P}(X = n)$$? Under what condition is this probability non-zero? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X = n) = p^n$$, since all $$n$$ trials must be successes.\n- Step 2: This probability is non-zero as long as $$p > 0$$. If $$p = 0$$, then $$\\mathrm{P}(X=n)=0$$ (impossible). As $$n$$ grows, $$p^n$$ becomes extremely small for $$p<1$$.\n\nThus, getting all successes is very unlikely unless $$n$$ is small or $$p$$ is close to 1.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "A test has 10 true/false questions. A student guesses all answers. What is the probability they get exactly 5 correct? Compute mentally using $$\\binom{10}{5}(0.5)^{10}$$. (2 steps)", "answer": "- Step 1: $$\\binom{10}{5} = 252$$, and $$(0.5)^{10} = 1/1024 \\approx 0.0009766$$.\n- Step 2: $$252 \\times 0.0009766 \\approx 0.246$$. So probability about 24.6%.\n\nMental math: $$252/1024 \\approx 0.246$$.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{B}(8, 0.5)$$, find $$\\mathrm{P}(X \\le 3)$$ using symmetry (without tables). (2 steps)", "answer": "- Step 1: Since $$p=0.5$$, the distribution is symmetric: $$\\mathrm{P}(X \\le 3) = \\mathrm{P}(X \\ge 5)$$ because $$8-3=5$$.\n- Step 2: Also, $$\\mathrm{P}(X \\le 3) + \\mathrm{P}(X = 4) + \\mathrm{P}(X \\ge 5) = 1$$, and by symmetry $$\\mathrm{P}(X \\le 3) = \\mathrm{P}(X \\ge 5)$$. So $$2\\mathrm{P}(X \\le 3) + \\mathrm{P}(X=4) = 1$$. Compute $$\\mathrm{P}(X=4) = \\binom{8}{4}(0.5)^8 = 70/256 = 0.2734$$. Then $$\\mathrm{P}(X \\le 3) = (1 - 0.2734)/2 = 0.3633$$.\n\nAlternatively, one could sum directly, but symmetry simplifies.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}], "count": 52}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What are the four conditions required to model a situation with a binomial distribution, and what happens if the \"fixed probability\" condition is violated? (3 steps)", "answer": "- Step 1: The four conditions are: a fixed number of trials ($$n$$), two possible outcomes (success and failure), a fixed probability of success ($$p$$), and independent trials.\n- Step 2: If the probability of success is not fixed (e.g., drawing cards without replacement from a small deck), the probability changes with each trial.\n- Step 3: This breaks the binomial model because the formula $$P(X=r)$$ assumes the same $$p$$ is multiplied $$r$$ times. However, if the population is very large, the change in probability is negligible, allowing us to approximate it as fixed.\n\nTakeaway: The binomial model requires a stable environment where the chance of success never wavers across the $$n$$ trials.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "If you write $$X \\sim B(n, p)$$, what do the symbols $$X$$, $$n$$, and $$p$$ represent in the context of an experiment? Why is $$X$$ called a discrete random variable?", "answer": "$$X$$ represents the random variable, which is the count of successful outcomes in the experiment. It is discrete because it can only take isolated integer values from $$0$$ up to $$n$$ (you can't have 2.5 successes). It is random because the exact number of successes varies each time you run the $$n$$ trials. $$n$$ is the index (the fixed total number of trials), and $$p$$ is the parameter (the fixed probability of success on any single trial).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "How does the binomial probability formula $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$ naturally emerge from the binomial expansion of $$(p + q)^n$$ where $$q = 1-p$$? (3 steps)", "answer": "- Step 1: In a sequence of $$n$$ trials, every specific outcome can be represented as a string of successes (S) and failures (F). The probability of any specific string with exactly $$r$$ successes and $$n-r$$ failures is $$p^r (1-p)^{n-r}$$.\n- Step 2: There are multiple distinct ways to arrange $$r$$ successes within $$n$$ trials. The number of such combinations is the binomial coefficient $$\\binom{n}{r}$$.\n- Step 3: Summing the probabilities of all these mutually exclusive arrangements gives $$\\binom{n}{r} p^r (1-p)^{n-r}$$. This exactly mirrors the general term in the binomial expansion of $$(p + q)^n$$, which is why the sum of all probabilities from $$r=0$$ to $$r=n$$ equals $$(p+q)^n = 1$$.\n\nTakeaway: The binomial distribution is just the binomial theorem applied to probability, where each term represents the likelihood of a specific count of successes.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "In the formula $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$, what does the $$\\binom{n}{r}$$ term physically represent in the context of the experiment? Why would the formula be incorrect without it?", "answer": "$$\\binom{n}{r}$$ represents the number of distinct ways (combinations) to choose which $$r$$ trials out of $$n$$ will be successes. Without it, $$p^r (1-p)^{n-r}$$ only calculates the probability of *one specific sequence* of successes and failures (e.g., S-S-F-F), rather than *any sequence* with $$r$$ successes. Since all these sequences are mutually exclusive events that lead to the same count $$r$$, their probabilities must be added together, which multiplication by $$\\binom{n}{r}$$ accomplishes.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How do you translate the phrases \"no more than 5\", \"at least 3\", and \"fewer than 7\" into mathematical inequalities for a discrete random variable $$X$$, and how does this affect your cumulative probability calculation? (3 steps)", "answer": "- Step 1: \"No more than 5\" means $$X \\leq 5$$. This directly uses the cumulative function: $$P(X \\leq 5)$$.\n- Step 2: \"At least 3\" means $$X \\geq 3$$. Since cumulative tables give $$P(X \\leq x)$$, you must use the complement rule: $$P(X \\geq 3) = 1 - P(X \\leq 2)$$.\n- Step 3: \"Fewer than 7\" means $$X < 7$$. Because $$X$$ is discrete (integer-valued), $$X$$ can be at most 6, so this is strictly equivalent to $$P(X \\leq 6)$$. A common misconception is to look up $$P(X \\leq 7)$$, which incorrectly includes 7.\n\nTakeaway: Always convert descriptive phrases into strict inequalities first, then adjust for the discrete nature of the variable to use cumulative tables correctly.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "A test requires a score in the top 5% to pass. If $$X \\sim B(10, 0.4)$$, explain the logical steps to find the minimum score $$r$$ needed to pass. (3 steps)", "answer": "- Step 1: \"Top 5%\" means the probability of achieving this score or higher is less than 0.05. We need the smallest integer $$r$$ such that $$P(X \\geq r) < 0.05$$.\n- Step 2: Rewrite the inequality using complements to use standard cumulative tables: $$1 - P(X \\leq r-1) < 0.05$$, which rearranges to $$P(X \\leq r-1) > 0.95$$.\n- Step 3: Look at the cumulative probabilities for $$B(10, 0.4)$$. Find the first value of $$x$$ where $$P(X \\leq x) > 0.95$$. Once you find this $$x$$, the passing score $$r$$ is simply $$x + 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "If $$X \\sim B(10, 0.7)$$, cumulative tables for $$p=0.7$$ might not be available. How can you redefine the random variable to use tables for $$p=0.3$$ to find $$P(X \\leq 6)$$? (3 steps)", "answer": "- Step 1: If the probability of \"success\" is 0.7, then the probability of \"failure\" is $$1-0.7 = 0.3$$. Define a new random variable $$Y$$ as the number of failures.\n- Step 2: Since each failure is just a success in disguise for the complement, $$Y \\sim B(10, 0.3)$$.\n- Step 3: The event \"6 or fewer successes\" ($$X \\leq 6$$) is exactly the same as \"4 or more failures\" ($$Y \\geq 4$$). So, $$P(X \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3)$$, which can be found in standard tables for $$p=0.3$$.\n\nTakeaway: When $$p > 0.5$$, swap your definition of success and failure to work with a parameter less than 0.5.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "When sampling without replacement from a finite population, the probability of success changes with each draw. Why can we still use the binomial distribution if the population is \"large\", and what is the risk if it is small? (2 steps)", "answer": "- Step 1: If the population is very large, removing one item changes the proportion of successes by a negligible amount. For example, if there are 1000 items and 100 are successes, the probability is 0.1. Removing one success makes it 99/999 ≈ 0.0991, which is close enough to 0.1 to assume a constant $$p$$.\n- Step 2: If the population is small, the probability shifts significantly after each draw (e.g., 2 successes out of 10 items). Assuming constant $$p$$ would over- or under-estimate the probabilities, making the binomial model inappropriate and inaccurate.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "A single Bernoulli trial has outcomes 1 (success with probability $$p$$) and 0 (failure with probability $$1-p$$). Derive the expected value $$E(X_1)$$ and variance $$Var(X_1)$$ for this single trial. (3 steps)", "answer": "- Step 1: The expected value is the sum of outcomes weighted by their probabilities: $$E(X_1) = (1 \\times p) + (0 \\times (1-p)) = p$$. This makes intuitive sense: the average result is just the probability of success.\n- Step 2: To find the variance, first find $$E(X_1^2)$$. Since $$1^2 = 1$$ and $$0^2 = 0$$, this is $$(1 \\times p) + (0 \\times (1-p)) = p$$.\n- Step 3: Use the variance formula $$Var(X_1) = E(X_1^2) - [E(X_1)]^2 = p - p^2 = p(1-p)$$. This shows that the spread of a single trial depends on the balance between success and failure; it's maximized when $$p=0.5$$ (maximum uncertainty).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A binomial variable $$X$$ is the sum of $$n$$ independent Bernoulli trials: $$X = X_1 + X_2 + \\dots + X_n$$. How does this sum property lead to the formulas $$E(X) = np$$ and $$Var(X) = np(1-p)$$? (3 steps)", "answer": "- Step 1: By linearity of expectation, the expected value of a sum is the sum of expected values, regardless of independence: $$E(X) = E(X_1) + E(X_2) + \\dots + E(X_n) = p + p + \\dots + p = np$$.\n- Step 2: For variance, the sum rule $$Var(X_1 + X_2) = Var(X_1) + Var(X_2)$$ holds *only if the variables are independent*. Since binomial trials are independent, we can sum the variances directly without worrying about covariance terms.\n- Step 3: Summing the identical variances of the Bernoulli trials gives $$Var(X) = Var(X_1) + \\dots + Var(X_n) = p(1-p) + \\dots + p(1-p) = np(1-p)$$. If trials were dependent, the variance formula would require extra covariance terms, breaking the binomial model.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "If you are given that $$X \\sim B(n, p)$$ with $$E(X) = 4.8$$ and $$Var(X) = 2.88$$, explain how to systematically find the values of $$n$$ and $$p$$. (3 steps)", "answer": "- Step 1: Use the relationship between the mean and variance formulas. You know $$\\mu = np = 4.8$$ and $$\\sigma^2 = np(1-p) = 2.88$$.\n- Step 2: Divide the variance by the mean to isolate $$1-p$$: $$\\frac{np(1-p)}{np} = \\frac{2.88}{4.8}$$, which simplifies to $$1-p = 0.6$$, so $$p = 0.4$$.\n- Step 3: Substitute $$p = 0.4$$ back into the mean equation: $$n(0.4) = 4.8$$, giving $$n = 12$$. The distribution is fully identified as $$B(12, 0.4)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "An experiment is run 500 times where a biased dice is thrown 5 times. The theoretical variance of a binomial model is $$np(1-p)$$. If the observed variance of the data is significantly *larger* than this theoretical value, what does this suggest about the independence of the trials? (2 steps)", "answer": "- Step 1: The theoretical variance $$np(1-p)$$ assumes that all trials are completely independent. If trials are positively correlated (e.g., success on one trial makes success on another more likely), the outcomes will cluster at the extremes (all successes or all failures) more than a binomial model predicts.\n- Step 2: This clustering increases the spread of the data. Therefore, an observed variance much larger than $$np(1-p)$$ suggests the trials are not independent, violating a core binomial condition.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "Consider the edge cases where $$p = 0$$ or $$p = 1$$ in a $$B(n, p)$$ distribution. What are the mean, variance, and shape of the distribution in these limiting cases? (2 steps)", "answer": "- Step 1: If $$p = 0$$, success is impossible. The random variable $$X$$ is always 0. The mean is $$n(0) = 0$$, and the variance is $$n(0)(1) = 0$$. The distribution is a single spike at $$X=0$$ with probability 1.\n- Step 2: If $$p = 1$$, success is certain. The random variable $$X$$ is always $$n$$. The mean is $$n(1) = n$$, and the variance is $$n(1)(0) = 0$$. The distribution is a single spike at $$X=n$$. In both cases, there is no uncertainty, so the variance collapses to 0.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "A common mistake when finding the probability of \"at least one success\" in $$n$$ trials is to try to sum $$P(X=1) + P(X=2) + \\dots + P(X=n)$$. What is the much simpler way to calculate this, and why? (2 steps)", "answer": "- Step 1: The complement of \"at least one success\" ($$X \\geq 1$$) is \"zero successes\" ($$X = 0$$). These two events cover the entire sample space and are mutually exclusive.\n- Step 2: Since total probability is 1, $$P(X \\geq 1) = 1 - P(X = 0)$$. The term $$P(X = 0)$$ is simply the probability of failing every single trial, which is $$(1-p)^n$$. This is much faster and less error-prone than summing an infinite-looking series of terms.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "A fair coin is tossed 3 times. Using the binomial formula, what is the probability of getting exactly 2 heads? (2 steps)", "answer": "- Step 1: Define the variable: Let $$X$$ be the number of heads. $$X \\sim B(3, 0.5)$$. We want $$P(X=2)$$.\n- Step 2: Apply the formula: $$P(X=2) = \\binom{3}{2} (0.5)^2 (0.5)^1 = 3 \\times 0.25 \\times 0.5 = 0.375$$. Conceptually, there are 3 ways to arrange 2 Heads and 1 Tail (HHT, HTH, THH), and each specific sequence has a probability of $$1/8$$, so $$3/8 = 0.375$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A fair dice is rolled 4 times. Let $$X$$ be the number of sixes rolled, so $$X \\sim B(4, \\frac{1}{6})$$. Without full calculation, explain how you would find the probability of rolling \"at least 3 sixes\". (2 steps)", "answer": "- Step 1: \"At least 3 sixes\" means $$X \\geq 3$$. Since $$n=4$$, the only possible values for $$X$$ in this range are $$X=3$$ and $$X=4$$.\n- Step 2: You would calculate $$P(X \\geq 3) = P(X=3) + P(X=4)$$. Alternatively, you could use the complement: $$1 - P(X \\leq 2)$$. For such small values of $$r$$ near $$n$$, summing the individual probabilities is usually faster than using the complement rule.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A multiple choice test has 20 questions, each with 4 options. A student guesses every answer. What is the expected number of correct answers and the variance? (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of correct answers. Guessing gives a probability of success $$p = 1/4 = 0.25$$. So $$X \\sim B(20, 0.25)$$.\n- Step 2: The mean is $$E(X) = np = 20 \\times 0.25 = 5$$. The variance is $$Var(X) = np(1-p) = 20 \\times 0.25 \\times 0.75 = 3.75$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}], "count": 17}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What are the four conditions that must be met for a random variable $$X$$ to be modelled by a binomial distribution $$\\mathrm{B}(n, p)$$? (4 steps)", "answer": "- Step 1: There must be a **fixed number of trials**, denoted $$n$$. The experiment must have a clear, predetermined end.\n- Step 2: Each trial must have exactly **two possible outcomes**, typically classified as 'success' and 'failure'.\n- Step 3: The **probability of success**, $$p$$, must be **constant** for each and every trial.\n- Step 4: The trials must be **independent** of each other; the outcome of one trial must not affect the probability of success in any other trial.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A bag contains 5 red and 5 blue marbles. You draw 3 marbles without replacement and count the red ones. Can this strictly be modelled as $$X \\sim \\mathrm{B}(3, 0.5)$$? Why or why not? (2 steps)", "answer": "- Step 1: No, this cannot be strictly modelled as a binomial distribution.\n- Step 2: The condition of a constant probability of success is violated. Since we are drawing without replacement from a small population, the probability of drawing a red marble changes after each draw. For example, if the first marble is red, the probability of drawing a red marble on the second draw drops to $$4/9$$, not $$0.5$$. Therefore, the trials are also not independent.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When sampling without replacement, what condition must the population size satisfy for the binomial model to be a reasonable approximation, and conceptually why does this work? (2 steps)", "answer": "- Step 1: The population size must be **large** relative to the sample size (often quoted as the sample size being less than 10% of the population).\n- Step 2: When the population is large, removing an item changes the probability of success for the next draw by such a tiny fraction that it can be assumed to be **effectively constant**. This effectively satisfies the binomial conditions of constant probability and independence.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In the binomial probability formula $$\\mathrm{P}(X=r)=\\binom{n}{r} p^{r}(1-p)^{n-r}$$, what does the term $$p^{r}(1-p)^{n-r}$$ represent, and why do we need to multiply it by $$\\binom{n}{r}$$? (2 steps)", "answer": "- Step 1: The term $$p^{r}(1-p)^{n-r}$$ represents the probability of **one specific sequence** of outcomes occurring in a fixed order — for example, getting successes on the first $$r$$ trials followed by failures on the remaining $$n-r$$ trials.\n- Step 2: Since the successes can occur in **any** positions among the $$n$$ trials, we must multiply by the number of ways to choose which $$r$$ trials are the successes. This is exactly what the combination $$\\binom{n}{r}$$ counts, ensuring we account for all possible orderings of $$r$$ successes.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "How does the binomial expansion of $$(p + q)^n$$ (where $$q = 1-p$$) directly relate to the probability distribution table for $$X \\sim \\mathrm{B}(n, p)$$? (2 steps)", "answer": "- Step 1: The expansion $$(p+q)^n = \\binom{n}{n}p^nq^0 + \\binom{n}{n-1}p^{n-1}q^1 + \\dots + \\binom{n}{0}p^0q^n$$ generates a series of terms where the powers of $$p$$ and $$q$$ sum to $$n$$.\n- Step 2: Each term in the expansion exactly matches the formula for a specific probability: the $$k$$-th term corresponds to $$\\mathrm{P}(X = k) = \\binom{n}{k}p^{k}q^{n-k}$$. Because $$p+q=1$$, the sum of all probabilities evaluates to $$1^n = 1$$, confirming it is a valid probability distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Using the properties of probability and algebra, show that the sum of all probabilities in a binomial distribution $$X \\sim \\mathrm{B}(n, p)$$ equals 1. (2 steps)", "answer": "- Step 1: Write the sum of all probabilities from $$r=0$$ to $$r=n$$: $$\\sum_{r=0}^{n} \\mathrm{P}(X=r) = \\sum_{r=0}^{n} \\binom{n}{r} p^{r}(1-p)^{n-r}$$.\n- Step 2: Recognize this as the standard binomial expansion of $$[p + (1-p)]^n$$. Since $$p + (1-p) = 1$$, the entire sum evaluates to $$1^n = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Translate the phrases \"at least 5 successes\" and \"fewer than 10 successes\" into cumulative probability statements of the form $$\\mathrm{P}(X \\le k)$$ or $$1 - \\mathrm{P}(X \\le k)$$. (2 steps)", "answer": "- Step 1: \"At least 5 successes\" means 5 or more. Since we want the upper tail, we use the complement: $$\\mathrm{P}(X \\ge 5) = 1 - \\mathrm{P}(X \\le 4)$$.\n- Step 2: \"Fewer than 10 successes\" means strictly less than 10. Since X is discrete (integer values), this is equivalent to 9 or fewer. So we write $$\\mathrm{P}(X < 10) = \\mathrm{P}(X \\le 9)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Why is $$\\mathrm{P}(X < 5)$$ NOT equal to $$1 - \\mathrm{P}(X \\le 5)$$ for a discrete binomial random variable? What is the correct complement of $$\\mathrm{P}(X < 5)$$? (2 steps)", "answer": "- Step 1: The complement of the event \"$$X < 5$$\" (which means $$X$$ can be 0, 1, 2, 3, or 4) is \"$$X \\ge 5$$\" (which means $$X$$ can be 5, 6, 7, etc.). The expression $$1 - \\mathrm{P}(X \\le 5)$$ actually equals $$\\mathrm{P}(X > 5)$$, leaving out the probability of exactly 5.\n- Step 2: The correct complement is $$\\mathrm{P}(X < 5) = 1 - \\mathrm{P}(X \\ge 5) = 1 - (1 - \\mathrm{P}(X \\le 4)) = \\mathrm{P}(X \\le 4)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "You need to find the smallest integer $$r$$ such that $$\\mathrm{P}(X \\ge r) < 0.05$$. Explain the logical steps to find $$r$$ using cumulative probability tables. (3 steps)", "answer": "- Step 1: Convert the inequality to a cumulative form. $$\\mathrm{P}(X \\ge r) < 0.05$$ is equivalent to $$1 - \\mathrm{P}(X \\le r-1) < 0.05$$.\n- Step 2: Rearrange the inequality to get $$\\mathrm{P}(X \\le r-1) > 1 - 0.05 = 0.95$$.\n- Step 3: Look down the cumulative table to find the **first** value of $$x$$ where the probability exceeds 0.95. If this value is $$x_{max}$$, then $$r-1 = x_{max}$$, so $$r = x_{max} + 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "If $$X \\sim \\mathrm{B}(10, 0.7)$$, tables for $$p=0.7$$ might not be available. Define a new variable $$Y$$ using $$p=0.3$$ and express $$\\mathrm{P}(X \\le 6)$$ in terms of $$Y$$. (3 steps)", "answer": "- Step 1: Define $$Y$$ as the number of **failures** in the 10 trials. Since the probability of failure is $$1 - 0.7 = 0.3$$, we have $$Y \\sim \\mathrm{B}(10, 0.3)$$.\n- Step 2: Establish the relationship between X and Y. Every success for X is a failure for Y, so $$Y = 10 - X$$ (or $$X = 10 - Y$$).\n- Step 3: Substitute into the probability statement: $$\\mathrm{P}(X \\le 6) = \\mathrm{P}(10 - Y \\le 6) = \\mathrm{P}(Y \\ge 4) = 1 - \\mathrm{P}(Y \\le 3)$$. You can now look up $$\\mathrm{P}(Y \\le 3)$$ in the $$p=0.3$$ tables.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "A single Bernoulli trial $$X_1$$ has outcomes 0 (failure) and 1 (success) with probability $$p$$. Calculate the p)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Why does the variance formula $$\\mathrm{Var}(X) = np(1-p)$$ reach its maximum when $$p=0.5$$? Conceptually, what does this mean for the spread of outcomes? (2 steps)", "answer": "- Step 1: The variance depends on the term $$p(1-p) = p - p^2$$, which is a downward-opening parabola. Its maximum occurs at the vertex $$p = 0.5$$. At this point, the variance is $$0.25n$$.\n- Step 2: Conceptually, when $$p=0.5$$, success and failure are equally likely, leading to the **maximum uncertainty** in the outcome. If $$p$$ is close to 0 or 1, the outcome is highly predictable (almost all failures or almost all successes), so the spread (variance) is smaller.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "If $$X_1 \\sim \\mathrm{B}(n, p)$$ and $$X_2 \\sim \\mathrm{B}(n, 1-p)$$, how do their means and variances compare? (2 steps)", "answer": "- Step 1: The means are $$\\mathrm{E}(X_1) = np$$ and $$\\mathrm{E}(X_2) = n(1-p)$$. They are generally different (unless $$p=0.5$$), but they always sum to $$n$$ because counting successes with probability $$p$$ is the same as counting failures with probability $$1-p$$.\n- Step 2: The variances are identical: $$\\mathrm{Var}(X_1) = np(1-p)$$ and $$\\mathrm{Var}(X_2) = n(1-p)(1-(1-p)) = n(1-p)p$$. The spread of the distribution is the same whether you are tracking successes or failures.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "Given $$X \\sim \\mathrm{B}(n, p)$$ with $$\\mathrm{E}(X) = 4.8$$ and $$\\mathrm{Var}(X) = 2.88$$, explain conceptually how to find $$n$$ and $$p$$ without solving complex equations. (3 steps)", "answer": "- Step 1: We know $$\\mathrm{E}(X) = np = 4.8$$ and $$\\mathrm{Var}(X) = np(1-p) = 2.88$$.\n- Step 2: Divide the variance by the mean to isolate $$(1-p)$$: $$\\frac{np(1-p)}{np} = \\frac{2.88}{4.8}$$. This gives $$1-p = 0.6$$, so $$p = 0.4$$.\n- Step 3: Substitute $ tement? If so, what is it?", "answer": "Yes, they mean the exact same thing. Both translate to $$\\mathrm{P}(X \\le 3)$$, which encompasses the probabilities of getting 0, 1, 2, or 3 successes. In everyday language, both phrases set an upper boundary of 3, explicitly including 3 as a valid outcome, which is crucial in discrete probability where boundary conditions often trip people up.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}], "count": 20}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the four requirements for a binomial distribution to be appropriate? (4 steps)", "answer": "- Step 1: There must be a fixed number of trials, denoted as $n$\n- Step 2: Each trial must have exactly two possible outcomes, often labeled as \"success\" and \"failure\"\n+ Example: Heads/tails in coin flips, pass/fail in tests\n- Step 3: The probability of success $p$ must be constant across all trials\n+ Example: A fair coin always has $p=0.5$\n- Step 4: The trials must be independent of each other\n+ Example: One coin flip doesn't affect the next flip", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How is the probability mass function for the binomial distribution derived? (3 steps)", "answer": "- Step 1: Recognize that each specific sequence with $x$ successes and $n-x$ failures has probability $p^x(1-p)^{n-x}$\n- Step 2: Calculate the number of ways to arrange $x$ successes among $n$ trials, which is $\\binom{n}{x}$\n- Step 3: Combine these to get the binomial probability formula:\n$$P(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$\n+ This comes from the binomial expansion of $(p+q)^n$ where $q=1-p$", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "What does the cumulative probability $P(X \\leq x)$ represent in a binomial distribution? (2 steps)", "answer": "- Step 1: It's the sum of all probabilities from 0 successes up to $x$ successes\n$$P(X \\leq x) = \\sum_{k=0}^{x} \\binom{n}{k}p^k(1-p)^{n-k}$$\n- Step 2: This represents the probability of getting at most $x$ successes in $n$ trials\n+ Example: If $X \\sim B(20, 0.4)$, $P(X \\leq 5)$ means the probability of getting 5 or fewer successes in 20 trials", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you calculate the mean and variance of a binomial distribution? (3 steps)", "answer": "- Step 1: Recognize the binomial distribution as the sum of $n$ independent Bernoulli trials\n- Step 2: For a single Bernoulli trial:\n$$E(X_1) = p$$\n$$Var(X_1) = p(1-p)$$\n- Step 3: For the binomial distribution $X \\sim B(n,p)$:\n$$E(X) = np$$\n$$Var(X) = np(1-p)$$\n+ This comes from the properties of sums of independent random variables", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How can you determine if a situation can be modeled with a binomial distribution? (2 steps)", "answer": "- Step 1: Check if the situation satisfies the four binomial conditions:\n+ Fixed number of trials\n+ Two outcomes per trial\n+ Constant probability of success\n+ Independent trials\n- Step 2: Think about potential violations:\n+ Example: Sampling without replacement from a small population violates independence\n+ Example: A changing probability environment (like improving skill over time) violates constant probability", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "Why does the binomial distribution formula include the combination term $\\binom{n}{x}$? (2 steps)", "answer": "- Step 1: The combination term $\\binom{n}{x}$ accounts for the number of ways to arrange $x$ successes among $n$ trials\n+ Example: For 3 coin flips, there are $\\binom{3}{2} = 3$ ways to get 2 heads\n- Step 2: Without this term, we'd only calculate the probability of one specific sequence of successes and failures\n+ The binomial distribution considers all such sequences that have the specified number of successes", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What is the relationship between the binomial distribution and the Bernoulli distribution? (3 steps)", "answer": "- Step 1: A Bernoulli random variable represents a single trial with two outcomes\n- Step 2: A binomial distribution is the sum of $n$ independent Bernoulli trials\n+ If $X_i \\sim \\text{Bernoulli}(p)$ for $i=1,2,\\ldots,n$ then $\\sum_{i=1}^{n} X_i \\sim B(n,p)$\n- Step 3: The Bernoulli distribution is a special case of the binomial distribution with $n=1$\n+ This relationship helps derive the mean and variance of the binomial distribution", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How does the shape of the binomial distribution change with different values of $n$ and $p$? (3 steps)", "answer": "- Step 1: As $n$ increases, the distribution becomes more spread out\n+ The possible range of values (from 0 to $n$) expands\n- Step 2: When $p=0.5$, the distribution is symmetric\n+ Example: Tossing a fair coin 20 times\n- Step 3: When $p$ is close to 0 or 1, the distribution becomes skewed\n+ $p < 0.5$: Right-skewed\n+ $p > 0.5$: Left-skewed", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How do you calculate $P(a < X < b)$ for a binomial distribution? (3 steps)", "answer": "- Step 1: Understand that $P(a < X < b)$ means the probability of getting more than $a$ but less than $b$ successes\n- Step 2: Convert this to cumulative probabilities:\n$$P(a < X < b) = P(X \\leq b-1) - P(X \\leq a)$$\n- Step 3: Use binomial tables or calculator to find the cumulative probabilities\n+ Example: For $X \\sim B(20, 0.4)$, $P(5 < X < 10) = P(X \\leq 9) - P(X \\leq 5)$", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why can't the binomial distribution be used for sampling without replacement from a small population? (3 steps)", "answer": "- Step 1: For small populations, the trials are not independent\n+ Removing one item changes the probability of success for the next trial\n- Step 2: The binomial distribution assumes constant probability of success\n+ In sampling without replacement, this assumption is violated\n- Step 3: However, if the population is large relative to the sample size, the binomial distribution is still a good approximation\n+ Example: Sampling 10 items from a population of 10,000 is approximately binomial", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "How can you calculate $P(X \\geq x)$ for a binomial distribution? (2 steps)", "answer": "- Step 1: Recognize that $P(X \\geq x) = 1 - P(X \\leq x-1)$\n- Step 2: Use binomial tables or calculator to find $P(X \\leq x-1)$ and subtract from 1\n+ Example: For $X \\sim B(20, 0.4)$, $P(X \\geq 5) = 1 - P(X \\leq 4)$", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why do we use the binomial coefficient $\\binom{n}{x}$ in the binomial probability formula? (2 steps)", "answer": "- Step 1: The binomial coefficient $\\binom{n}{x}$ accounts for the number of ways to choose $x$ successes from $n$ trials\n+ This gives the multiplicative factor for the probability of $x$ successes and $n-x$ failures\n- Step 2: Without this term, we'd only get the probability of a specific sequence of $x$ successes and $n-x$ failures\n+ The binomial distribution considers all possible sequences with exactly $x$ successes", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "When might you need to redefine a binomial random variable to use tables or calculators? (3 steps)", "answer": "- Step 1: When the probability of success $p$ is greater than 0.5 and your tables only go up to $p=0.5$\n- Step 2: Redefine the random variable to consider \"failure\" as the new \"success\"\n+ If $X \\sim B(n,p)$ with $p > 0.5$, let $Y = n - X$ and use $Y \\sim B(n,1-p)$\n- Step 3: Translate the original question into terms of the new random variable\n+ Example: For $X \\sim B(10,0.7)$, $P(X \\leq 6) = P(Y \\geq 4) = 1 - P(Y \\leq 3)$ where $Y \\sim B(10,0.3)$", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why does the mean of a binomial distribution equal $np$? (3 steps)", "answer": "- Step 1: The binomial distribution is the sum of $n$ independent Bernoulli trials\n- Step 2: Each Bernoulli trial has an expected value of $p$\n- Step 3: By the linearity of expectation:\n$$E(X) = E(X_1 + X_2 + \\ldots + X_n) = E(X_1) + E(X_2) + \\ldots + E(X_n) = np$$", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does the variance of a binomial distribution equal $np(1-p)$? (3 steps)", "answer": "- Step 1: The binomial distribution is the sum of $n$ independent Bernoulli trials\n- Step 2: Each Bernoulli trial has a variance of $p(1-p)$\n- Step 3: For independent random variables, the variances add:\n$$Var(X) = Var(X_1) + Var(X_2) + \\ldots + Var(X_n) = np(1-p)$$", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How can you calculate $P(a \\leq X \\leq b)$ for a binomial distribution? (3 steps)", "answer": "- Step 1: Understand that $P(a \\leq X \\leq b)$ means the probability of getting between $a$ and $b$ successes, inclusive\n- Step 2: Convert this to cumulative probabilities:\n$$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a-1)$$\n- Step 3: Use binomial tables or calculator to find the cumulative probabilities\n+ Example: For $X \\sim B(20, 0.4)$, $P(5 \\leq X \\leq 10) = P(X \\leq 10) - P(X \\leq 4)$", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What happens to a binomial distribution as $n$ becomes large? (3 steps)", "answer": "- Step 1: As $n$ increases, the binomial distribution becomes more bell-shaped\n+ This is due to the Central Limit Theorem\n- Step 2: When $np$ and $n(1-p)$ are both greater than 5, the binomial distribution can be approximated by a normal distribution\n+ This is useful for calculations when $n$ is large\n- Step 3: The shape of the binomial distribution is approximately normal with mean $np$ and variance $np(1-p)$", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How can you handle binomial probability questions with large $n$ and small $p$? (3 steps)", "answer": "- Step 1: When $n$ is large and $p$ is small such that $np$ is moderate, the binomial distribution can be approximated by a Poisson distribution\n+ This is useful when calculating binomial probabilities becomes computationally intensive\n- Step 2: The Poisson approximation uses $\\lambda = np$\n- Step 3: The approximation is given by:\n$$P(X=x) \\approx \\frac{e^{-\\lambda} \\lambda^x}{x!}$$\n+ This is particularly useful for rare events in large populations", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": true}, {"question": "Why is it sometimes necessary to adjust the binomial distribution for sampling without replacement? (3 steps)", "answer": "- Step 1: The binomial distribution assumes independent trials with a constant probability of success\n- Step 2: In sampling without replacement, the trials are not independent, and the probability of success changes with each draw\n- Step 3: For small populations, this adjustment is significant and the hypergeometric distribution should be used\n+ However, if the population is large relative to the sample size, the binomial distribution is still a good approximation", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "Intuitively, why does the binomial distribution peak around $np$?", "answer": "- Step 1: The binomial distribution represents the number of successes in $n$ trials with probability $p$\n- Step 2: On average, we expect to see $np$ successes\n- Step 3: The distribution is centered around this expected value, so it makes sense that the probability is highest near $np$\n+ The distribution is symmetric when $p=0.5$ and skewed otherwise, but always concentrates around $np$", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": true}, {"question": "How does the variance of a binomial distribution change with different values of $p$? (2 steps)", "answer": "- Step 1: The variance of a binomial distribution is $np(1-p)$\n- Step 2: The variance is maximized when $p=0.5$ and decreases as $p$ approaches 0 or 1\n+ Intuitively, when $p$ is near 0 or 1, there's less uncertainty in the number of successes\n+ When $p=0.5$, the outcome is most uncertain", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "Why does the binomial distribution become more spread out as $n$ increases? (2 steps)", "answer": "- Step 1: As $n$ increases, the range of possible values (from 0 to $n$) expands\n- Step 2: The standard deviation increases as $\\sqrt{np(1-p)}$\n+ While the standard deviation increases, the coefficient of variation (standard deviation relative to the mean) decreases\n+ This means that relative to the mean, the spread becomes smaller as $n$ increases", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": true}], "count": 22}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the four key conditions that must be satisfied for a random variable to have a binomial distribution? (3 steps)", "answer": "- Step 1: There must be a **fixed number of trials** (n). Each trial should be conducted under the same conditions, and the number of trials should be predetermined.\n- Step 2: Each trial must have **two possible outcomes** (often labeled as \"success\" and \"failure\"). For example, heads/tails in coin flips or pass/fail in quality control.\n+ These outcomes must be mutually exclusive and collectively exhaustive.\n- Step 3: There must be a **constant probability of success** (p) across all trials. This means the probability of success doesn't change from trial to trial.\n+ The trials must be **independent** of each other. The outcome of one trial doesn't affect the probability of success in subsequent trials.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is the formula for calculating the probability of getting exactly r successes in n trials for a binomial distribution? Explain each component. (4 steps)", "answer": "- Step 1: The binomial probability formula is:\n\n$$\n\\mathrm{P}(X=r)=\\binom{n}{r} p^{r}(1-p)^{n-r}\n$$\n\n- Step 2: $\\binom{n}{r}$ is the **binomial coefficient**, which represents the number of ways to choose r successes out of n trials. It's calculated as:\n\n$$\n\\binom{n}{r} = \\frac{n!}{r!(n-r)!}\n$$\n\n- Step 3: $p^r$ is the probability of getting r successes. Since trials are independent, we multiply the probability of success p by itself r times.\n- Step 4: $(1-p)^{n-r}$ is the probability of getting n-r failures. Again, since trials are independent, we multiply the probability of failure (1-p) by itself n-r times.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why do we multiply by the binomial coefficient in the binomial probability formula? (2 steps)", "answer": "- Step 1: The binomial coefficient $\\binom{n}{r}$ represents the number of ways to arrange r successes among n trials. It accounts for the different sequences that result in exactly r successes.\n\n- Step 2: For example, in 5 coin flips, there are multiple ways to get exactly 3 heads (HHHTT, HHTHT, HTHTH, etc.). The binomial coefficient counts all these combinations to give the total probability of r successes regardless of order.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What is a cumulative probability in the context of the binomial distribution? (2 steps)", "answer": "- Step 1: A cumulative probability is the sum of individual probabilities up to a certain value. For a binomial distribution, it's represented as P(X ≤ x), which is the probability that the random variable X takes on a value less than or equal to x.\n\n- Step 2: Cumulative probability helps us answer questions like \"What is the probability of getting at most 7 heads in 10 coin flips?\" or \"What's the chance of fewer than 3 defective items in a batch of 20?\"", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How do we interpret phrases like \"at least\", \"no more than\", \"fewer than\", and \"more than\" in binomial probability questions? (4 steps)", "answer": "- Step 1: \"At least x successes\" means x or more, which translates to P(X ≥ x) = 1 - P(X ≤ x-1)\n- Step 2: \"No more than x successes\" means x or fewer, which is simply P(X ≤ x)\n- Step 3: \"Fewer than x successes\" means x-1 or fewer, which is P(X < x) = P(X ≤ x-1)\n- Step 4: \"More than x successes\" means x+1 or more, which is P(X > x) = 1 - P(X ≤ x)", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the formula for the mean (expected value) of a binomial distribution? How is it derived? (3 steps)", "answer": "- Step 1: The mean (expected value) of a binomial distribution is given by:\n\n$$\n\\mu = \\mathrm{E}(X) = np\n$$\n\n- Step 2: This is derived from the fact that a binomial distribution is the sum of n independent Bernoulli trials, each with expected value p.\n- Step 3: Since the expected value of the sum is the sum of the expected values, we get E(X) = p + p + ... + p (n times) = np.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What is the formula for the variance of a binomial distribution? How is it derived? (4 steps)", "answer": "- Step 1: The variance of a binomial distribution is:\n\n$$\n\\sigma^2 = \\operatorname{Var}(X) = np(1-p)\n$$\n\n- Step 2: This derives from the variance of a Bernoulli trial, which is Var(X₁) = p(1-p)\n- Step 3: Since the binomial distribution is the sum of n independent Bernoulli trials, the variances add up directly (unlike standard deviations)\n+ Var(X) = Var(X₁) + Var(X₂) + ... + Var(Xₙ) = np(1-p)\n- Step 4: The standard deviation is the square root of the variance: $\\sigma = \\sqrt{np(1-p)}$", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is independence crucial for applying a binomial distribution? Provide an example of a situation where independence is violated. (2 steps)", "answer": "- Step 1: Independence is crucial because the probability of success in each trial must remain constant. If trials are dependent, the outcome of one trial affects the probability in subsequent trials, violating the binomial distribution assumptions.\n\n- Step 2: An example of a violation is selecting cards from a deck without replacement to count aces. The probability of drawing an ace changes after each draw, making the trials dependent. This would require using a hypergeometric distribution instead of a binomial one.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "How does the binomial distribution relate to the binomial expansion? (3 steps)", "answer": "- Step 1: The binomial distribution arises from the binomial expansion of $(p + q)^n$ where p is the probability of success and q = 1-p is the probability of failure.\n\n- Step 2: Each term in the expansion $\\binom{n}{r} p^r q^{n-r}$ corresponds to the probability of getting exactly r successes in n trials.\n\n- Step 3: The sum of all these probabilities equals 1, as $(p + q)^n = 1^n = 1$, which must be true for any probability distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How can we approximate a situation with a binomial distribution even if the population is changing rather than fixed? (2 steps)", "answer": "- Step 1: We can often approximate situations with a binomial distribution even when the population is changing if the population is large enough that removing one item doesn't significantly change the probabilities.\n\n- Step 2: For example, when selecting a small random sample from a large population (like choosing 10 people from a city of millions), the change in probabilities after each selection is negligible, and the binomial distribution remains a good approximation.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How do we use binomial tables to calculate cumulative probabilities? Provide an example. (3 steps)", "answer": "- Step 1: Binomial tables typically provide cumulative probabilities P(X ≤ x) for various values of n and p. You locate the row for your n (number of trials) and p (probability of success).\n\n- Step 2: For example, to find P(X ≤ 2) for X ~ B(10, 0.3), you'd look at the row for n=10, p=0.3, and x=2 in the table.\n\n- Step 3: If the table doesn't have the exact value of p you need, you can interpolate between values or use a calculator or software that can compute binomial probabilities directly.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How can we handle situations where p > 0.5 when using binomial tables that only include p ≤ 0.5? (3 steps)", "answer": "- Step 1: When p > 0.5, we can redefine our problem by considering failures instead of successes. Let Y = n - X be the number of failures, and Y ~ B(n, 1-p).\n\n- Step 2: Since 1-p < 0.5 in this case, we can use the binomial tables with parameter q = 1-p to calculate probabilities for Y.\n\n- Step 3: We then convert probabilities for Y back to probabilities for X using the relationship P(X ≥ r) = P(Y ≤ n-r) and P(X ≤ r) = P(Y ≥ n-r).", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How do we calculate the probability of a range of outcomes, such as P(a ≤ X ≤ b), for a binomial distribution? (2 steps)", "answer": "- Step 1: To calculate P(a ≤ X ≤ b) for a binomial distribution, we use the cumulative distribution function: P(a ≤ X ≤ b) = P(X ≤ b) - P(X ≤ a-1)\n\n- Step 2: This works because P(X ≤ b) includes all probabilities up to and including b, and subtracting P(X ≤ a-1) removes the probabilities we don't want, leaving us with the range from a to b.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do we determine if a situation can reasonably be modeled by a binomial distribution? Provide an example of a situation that can and cannot be modeled this way. (3 steps)", "answer": "- Step 1: To determine if a situation can be modeled as binomial, check if it meets the four criteria: fixed number of trials, two possible outcomes, constant probability of success, and independent trials.\n\n- Step 2: An example that can be modeled: Counting the number of heads in 20 flips of a fair coin. Fixed number of trials (20), two outcomes (heads/tails), constant probability of heads (0.5), and independent trials.\n\n- Step 3: An example that cannot: Counting the number of aces drawn from a standard deck when drawing without replacement. While there are a fixed number of trials and two outcomes, the probability of success changes with each draw, and the trials are not independent.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the difference between a binomial distribution and a Bernoulli distribution? (2 steps)", "answer": "- Step 1: A Bernoulli distribution is a special case of the binomial distribution where there's only one trial (n=1). It has two possible outcomes - 1 for success with probability p, and 0 for failure with probability 1-p.\n\n- Step 2: The binomial distribution generalizes this to n independent Bernoulli trials, counting the number of successes in those trials. So the binomial distribution is essentially the sum of n independent Bernoulli random variables.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": true}, {"question": "How do we estimate parameters from data using the binomial distribution? (4 steps)", "answer": "- Step 1: If we have data and want to estimate p (the probability of success) assuming a binomial distribution, we can use the sample proportion of successes.\n\n- Step 2: For example, if we observe 30 successes out of 100 trials, our estimate of p would be 30/100 = 0.3.\n\n- Step 3: We can also check if the data fits a binomial distribution by comparing the observed frequencies to the expected frequencies using the estimated value of p.\n\n- Step 4: If the observed data significantly deviates from the expected binomial distribution, we may need to consider a different model or investigate if any assumptions of the binomial distribution are violated.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How do we use the binomial distribution to model real-world situations? Provide an example. (3 steps)", "answer": "- Step 1: We use the binomial distribution to model situations with a fixed number of independent trials, two possible outcomes, and a constant probability of success.\n\n- Step 2: An example is quality control in manufacturing: Suppose a factory produces bolts and 1% are defective. We can model the number of defective bolts in a sample of 200 using a binomial distribution B(200, 0.01).\n\n- Step 3: This model allows us to calculate probabilities like the likelihood of finding exactly 3 defective bolts or fewer than 5 defective bolts in a sample, which is useful for quality control decisions.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "What are some common misconceptions about the binomial distribution? (3 steps)", "answer": "- Step 1: One misconception is that the binomial distribution can be used when the probability of success changes from trial to trial. In reality, the probability must be constant for all trials.\n\n- Step 2: Another misconception is that the trials can be dependent. For the binomial distribution to apply, each trial must be independent of the others.\n\n- Step 3: Some people incorrectly assume the binomial distribution is only used for rare events (like the Poisson distribution). In truth, it's used whenever the binomial conditions are met, regardless of how common or rare the success probability is.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": true}, {"question": "How does the shape of the binomial distribution change with different values of n and p? (3 steps)", "answer": "- Step 1: For fixed p, as n increases, the binomial distribution becomes more bell-shaped and approaches a normal distribution (Central Limit Theorem). This is especially useful for approximations.\n\n- Step 2: For fixed n, when p is close to 0 or 1, the distribution is skewed (right-skewed for p close to 0, left-skewed for p close to 1). When p = 0.5, the distribution is symmetric.\n\n- Step 3: The distribution is spread out more when p is close to 0.5 and becomes more concentrated when p is close to 0 or 1. The variance reaches its maximum at p = 0.5.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "What is the relationship between the mean, variance, and standard deviation of a binomial distribution? (2 steps)", "answer": "- Step 1: The mean of a binomial distribution is $\\mu = np$, and the variance is $\\sigma^2 = np(1-p)$. The standard deviation is the square root of the variance: $\\sigma = \\sqrt{np(1-p)}$.\n\n- Step 2: These measures show how the expected number of successes (mean) and the spread around this expectation (variance and standard deviation) depend on both the number of trials and the probability of success.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For a binomial distribution X ~ B(n, p), write down the formula for P(X = r) and explain what each symbol represents. (3 steps)", "answer": "- Step 1: The formula is $$\\mathrm{P}(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$\n- Step 2: Here, n is the number of trials, r is the number of successes (where 0 ≤ r ≤ n), p is the probability of success, and (1-p) = q is the probability of failure\n+ The binomial coefficient $$\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$$ represents the number of ways to choose r successes from n trials\n+ The term p^r represents the probability of getting r successes\n+ The term (1-p)^{n-r} represents the probability of getting (n-r) failures\n- Step 3: All probabilities sum to 1: $$\\sum_{r=0}^{n} \\mathrm{P}(X=r) = (p + 1-p)^n = 1^n = 1$$", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A biased coin has probability p = 0.3 of landing heads. The coin is tossed 5 times. Let X be the number of heads. Write down the probability distribution table for X. (4 steps)", "answer": "- Step 1: X ~ B(5, 0.3), so n = 5, p = 0.3, q = 1-p = 0.7\n- Step 2: Use the formula P(X = r) = $$\\binom{5}{r} (0.3)^r (0.7)^{5-r}$$\n+ P(X = 0) = (0.7)^5 = 0.16807\n+ P(X = 1) = 5(0.3)(0.7)^4 = 0.36015\n+ P(X = 2) = 10(0.3)^2(0.7)^3 = 0.30870\n+ P(X = 3) = 10(0.3)^3(0.7)^2 = 0.13230\n+ P(X = 4) = 5(0.3)^4(0.7) = 0.02835\n+ P(X = 5) = (0.3)^5 = 0.00243\n- Step 3: Verify sum: 0.16807 + 0.36015 + 0.30870 + 0.13230 + 0.02835 + 0.00243 = 1.00000 ✓\n- Step 4: This table shows all possible values of X from 0 to 5 with their corresponding probabilities", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A factory produces light bulbs where 8% are defective. A random sample of 10 bulbs is selected. Let X be the number of defective bulbs. Write X in binomial notation and find P(X = 3). (3 steps)", "answer": "- Step 1: X ~ B(10, 0.08) because there are fixed 10 trials (sample size), two outcomes (defective or not), constant probability p = 0.08, and assuming independence\n- Step 2: Using the formula P(X = r) = $$\\binom{n}{r} p^r (1-p)^{n-r}$$:\n$$\\mathrm{P}(X=3) = \\binom{10}{3} (0.08)^3 (0.92)^7$$\n- Step 3: Calculate: 120 × 0.000512 × 0.557 = 0.0343 (approximately)\n\nThe probability of finding exactly 3 defective bulbs in a sample of 10 is about 0.034 (3.4%).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain why selecting 5 sweets from a bag containing many sweets in ratio 1:4 (strawberry:apple) can be modeled as binomial, even though sweets are drawn without replacement. (3 steps)", "answer": "- Step 1: Normally, without replacement changes probabilities, so binomial would not apply\n- Step 2: However, the key phrase is \"a large number\" of sweets — when the total is very large relative to the sample size, removing a few sweets doesn't meaningfully change the ratios\n- Step 3: The probability of picking strawberry remains approximately constant at p = 1/(1+4) = 0.2 for each draw, satisfying the \"constant probability\" condition for binomial\n\nThis is an approximation that becomes more accurate as the population size increases relative to the sample.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is the difference between P(X ≤ x) and P(X < x) in a binomial distribution? How do you calculate each? (2 steps)", "answer": "- Step 1: For discrete random variables:\n+ P(X ≤ x) includes the probability of getting exactly x: P(X = 0) + P(X = 1) + ... + P(X = x)\n+ P(X < x) excludes x: P(X = 0) + P(X = 1) + ... + P(X = x-1) = P(X ≤ x-1)\n- Step 2: So P(X < x) = P(X ≤ x-1), which is one less than P(X ≤ x) in the cumulative table\n\nThis distinction matters greatly when interpreting probability phrases in word problems.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "A spinner has probability 0.3 of landing on red. It is spun 12 times. Find P(X ≤ 2) where X is the number of reds. (2 steps)", "answer": "- Step 1: X ~ B(12, 0.3). \"No more than 2 reds\" means X ≤ 2, which equals P(X = 0) + P(X = 1) + P(X = 2)\n- Step 2: Using tables or calculator: P(X ≤ 2) = 0.2528 (from the tables for n=12, p=0.3)\n\nThe probability of getting 2 or fewer reds in 12 spins is approximately 0.253 (25.3%).", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Translate these phrases into probability expressions for X ~ B(n, p): (a) at least 5 successes, (b) fewer than 3 successes, (c) more than 7 successes, (d) at most 4 successes. (4 steps)", "answer": "- Step 1: (a) \"At least 5\" means X ≥ 5 = P(X ≥ 5) = 1 - P(X ≤ 4)\n- Step 2: (b) \"Fewer than 3\" means X < 3 = P(X ≤ 2)\n- Step 3: (c) \"More than 7\" means X > 7 = 1 - P(X ≤ 7)\n- Step 4: (d) \"At most 4\" means X ≤ 4 = P(X ≤ 4)\n\nThese transformations are essential for using binomial cumulative probability tables correctly.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For X ~ B(20, 0.4), calculate: (a) P(X ≥ 15), (b) P(X < 6), (c) P(3 ≤ X ≤ 7). (4 steps)", "answer": "- Step 1: (a) P(X ≥ 15) = 1 - P(X ≤ 14) = 1 - 0.9984 = 0.0016\n- Step 2: (b) P(X < 6) = P(X ≤ 5) = 0.1256\n- Step 3: (c) P(3 ≤ X ≤ 7) = P(X ≤ 7) - P(X ≤ 2)\n+ = 0.4159 - 0.0440 = 0.3719 (or directly from tables)\n- Step 4: Note that P(X < 6) = P(X ≤ 5) because X can only take integer values", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why can't you use binomial tables directly when p > 0.5? How do you overcome this? (3 steps)", "answer": "- Step 1: Standard binomial tables typically only provide values for p ≤ 0.5 (the tables show p from 0.05 to 0.5)\n- Step 2: To overcome this, redefine what constitutes a \"success\" — if p > 0.5, let q = 1-p < 0.5\n- Step 3: If X ~ B(n, p) with p > 0.5, define Y = n - X, then Y ~ B(n, 1-p) where 1-p < 0.5\n+ P(X ≤ a) = P(Y ≥ n - a)\n+ Use the relationship to find the required probability from tables\n\nFor example, P(X ≤ 6) for X ~ B(10, 0.7) equals P(Y ≥ 4) for Y ~ B(10, 0.3).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For a binomial distribution X ~ B(n, p), prove that the mean E(X) = np. (4 steps)", "answer": "- Step 1: A binomial distribution is the sum of n independent Bernoulli trials: X = X₁ + X₂ + ... + Xₙ\n- Step 2: Each Bernoulli trial Xᵢ has E(Xᵢ) = p (since P(Xᵢ = 1) = p, P(Xᵢ = 0) = q = 1-p)\n- Step 3: Using linearity of expectation: E(X) = E(X₁ + X₂ + ... + Xₙ) = E(X₁) + E(X₂) + ... + E(Xₙ)\n- Step 4: = p + p + ... + p (n times) = np\n\nThe mean tells us the expected number of successes in n trials.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "For a binomial distribution X ~ B(n, p), prove that the variance Var(X) = np(1-p). (4 steps)", "answer": "- Step 1: Again, X = X₁ + X₂ + ... + Xₙ, the sum of n independent Bernoulli trials\n- Step 2: For a Bernoulli trial: Var(Xᵢ) = E(Xᵢ²) - [E(Xᵢ)]² = p - p² = p(1-p)\n- Step 3: For independent random variables, variances add: Var(X) = Var(X₁) + Var(X₂) + ... + Var(Xₙ)\n- Step 4: = p(1-p) + p(1-p) + ... + p(1-p) (n times) = np(1-p)\n\nVariance measures spread — it's largest when p = 0.5 and decreases as p approaches 0 or 1.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A fair five-sided spinner (numbered 1-5) is spun 20 times. Let X be the number of 5s obtained. Find E(X) and Var(X). (3 steps)", "answer": "- Step 1: Each spin has two outcomes (5 or not 5), n = 20 trials, p = probability of 5 = 1/5 = 0.2, and assuming independence\n- Step 2: E(X) = np = 20 × 0.2 = 4\n- Step 3: Var(X) = np(1-p) = 20 × 0.2 × 0.8 = 3.2\n\nOn average, you'd expect 4 fives in 20 spins, with a variance of 3.2.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A biased coin has probability p of heads. In 20 tosses, the variance of number of heads is found to be 4.2. Estimate p. (3 steps)", "answer": "- Step 1: For X ~ B(20, p), Var(X) = np(1-p) = 20p(1-p) = 4.2\n- Step 2: Divide by 20: p(1-p) = 0.21\n- Step 3: p - p² = 0.21 → p² - p + 0.21 = 0\nUsing quadratic formula: p = [1 ± √(1 - 4×0.21)]/2 = [1 ± √0.16]/2 = [1 ± 0.4]/2\nSo p = 0.7 or p = 0.3. Since p < 1/2 for a \"biased coin towards heads\" (implied), p ≈ 0.3\n\nTwo solutions exist because p and (1-p) give the same variance — this is expected.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Given X ~ B(10, p) with Var(X) = 2.4, find the two possible values of p. (3 steps)", "answer": "- Step 1: Var(X) = np(1-p) = 10p(1-p) = 2.4\n- Step 2: p(1-p) = 0.24 → p - p² = 0.24 → p² - p + 0.24 = 0\n- Step 3: Using quadratic formula: p = [1 ± √(1 - 4×0.24)]/2 = [1 ± √0.04]/2 = [1 ± 0.2]/2\nSo p = 0.6 or p = 0.4\n\nBoth values give the same variance because p and 1-p are symmetric in the formula.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A test has n questions, each with 4 options (only 1 correct). A student guesses all answers. If the expected number of correct answers is 4.8, how many questions are in the test? (3 steps)", "answer": "- Step 1: For guessing, p = probability of correct = 1/4 = 0.25\n- Step 2: E(X) = np = 4.8, so n × 0.25 = 4.8\n- Step 3: n = 4.8 ÷ 0.25 = 19.2 ≈ 20 questions\n\nThe test has approximately 20 questions.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A company produces components with 5% defective rate. In a sample of 50 components, find the probability of fewer than 2 defectives. (3 steps)", "answer": "- Step 1: X ~ B(50, 0.05), we want P(X < 2) = P(X = 0) + P(X = 1)\n- Step 2: P(X = 0) = (0.95)^50 ≈ 0.0769\nP(X = 1) = 50 × 0.05 × (0.95)^49 ≈ 0.2025\n- Step 3: Total = 0.0769 + 0.2025 = 0.2794 ≈ 0.279\n\nThere's about a 28% chance of finding fewer than 2 defectives in a sample of 50.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In a class of 14 students, 15% of the population is Rhesus negative. Find the probability that exactly 3 students are Rh⁻. Can this be modeled as binomial? (3 steps)", "answer": "- Step 1: Yes, this can be modeled as binomial B(14, 0.15)\n- Step 2: Conditions: fixed 14 trials, two outcomes (Rh⁻ or not), constant p = 0.15, students are independent\n- Step 3: P(X = 3) = $$\\binom{14}{3} (0.15)^3 (0.85)^{11}$$ ≈ 0.1638\n\nThe probability is approximately 0.164 (16.4%).", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "You keep flipping a fair coin until you get 4 heads in a row. Can this be modeled with a binomial distribution? Explain. (2 steps)", "answer": "- Step 1: No, this cannot be modeled with a binomial distribution\n- Step 2: The number of trials is not fixed — you keep flipping until a condition is met (geometric distribution scenario)\n+ Binomial requires a fixed number of trials n\n+ Here the number of flips needed is random and unbounded\n\nThis is an example of a geometric distribution, not binomial.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A bag contains red (45%) and yellow (55%) beads. A sample of 20 beads is taken. Find: (a) P(fewer than 12 yellow), (b) P(exactly 12 yellow). (3 steps)", "answer": "- Step 1: Let X = number of yellow beads, X ~ B(20, 0.45)\n- Step 2: (a) P(X < 12) = P(X ≤ 11) — use tables or calculator = 0.7381\n- Step 3: (b) P(X = 12) = $$\\binom{20}{12} (0.45)^{12} (0.55)^8$$ ≈ 0.1200", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "For X ~ B(50, 0.4), find: (a) the largest k such that P(X ≤ k) < 0.05, (b) the smallest r such that P(X > r) < 0.01. (4 steps)", "answer": "- Step 1: (a) We need the smallest k where cumulative probability exceeds 0.05, so find largest k where P(X ≤ k) < 0.05\n- Step 2: From tables: P(X ≤ 13) = 0.0193, P(X ≤ 14) = 0.0555\n+ So k = 13 gives 0.0193 < 0.05, k = 14 gives 0.0555 > 0.05\n+ Answer: k = 13\n- Step 3: (b) P(X > r) < 0.01 means 1 - P(X ≤ r) < 0.01, so P(X ≤ r) > 0.99\n- Step 4: From tables: P(X ≤ 30) = 0.9863, P(X ≤ 31) = 0.9944\n+ So r = 30 is the smallest where P(X > 30) < 0.01\n+ Answer: r = 30", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A student takes a 10-question true/false test, guessing randomly. Find: (a) P(all correct), (b) P(pass - getting at least 8 correct). (3 steps)", "answer": "- Step 1: X ~ B(10, 0.5), each guess has p = 0.5 suc
