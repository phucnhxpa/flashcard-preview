<script>
const DATA={"selected": [{"question": "Explain why the variance of a binomial distribution is always less than or equal to its mean (for $$0 < p < 1$$). When does equality hold? (2 steps)", "answer": "- Step 1: Variance $$\\sigma^2 = np(1-p)$$ and mean $$\\mu = np$$. Since $$0 < p < 1$$, we have $$1-p < 1$$, so $$np(1-p) < np$$, i.e., $$\\sigma^2 < \\mu$$.\n- Step 2: Equality $$\\sigma^2 = \\mu$$ would require $$1-p = 1$$, i.e., $$p=0$$, but then the distribution is degenerate (all failures). In the limit as $$p \\to 0$$, the variance approaches the mean (since $$1-p \\approx 1$$), which is the Poisson limit.\n\nThus, for non-degenerate binomial distributions with $$p>0$$, variance is strictly less than mean.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Why is the binomial distribution called \"binomial\"? Connect it to the binomial theorem. (2 steps)", "answer": "- Step 1: The probabilities $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$ for $$x=0,1,\\dots,n$$ are exactly the terms in the expansion of $$(p + (1-p))^n$$ via the binomial theorem.\n- Step 2: Since $$(p + (1-p))^n = 1^n = 1$$, the sum of all probabilities is 1, as required. The name \"binomial\" reflects this connection to the binomial expansion.\n\nThus, the distribution arises naturally from the binomial theorem applied to probabilities of two outcomes.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "If $$X \\sim \\mathrm{B}(10, 0.7)$$, tables for $$p=0.7$$ might not be available. Define a new variable $$Y$$ using $$p=0.3$$ and express $$\\mathrm{P}(X \\le 6)$$ in terms of $$Y$$. (3 steps)", "answer": "- Step 1: Define $$Y$$ as the number of **failures** in the 10 trials. Since the probability of failure is $$1 - 0.7 = 0.3$$, we have $$Y \\sim \\mathrm{B}(10, 0.3)$$.\n- Step 2: Establish the relationship between X and Y. Every success for X is a failure for Y, so $$Y = 10 - X$$ (or $$X = 10 - Y$$).\n- Step 3: Substitute into the probability statement: $$\\mathrm{P}(X \\le 6) = \\mathrm{P}(10 - Y \\le 6) = \\mathrm{P}(Y \\ge 4) = 1 - \\mathrm{P}(Y \\le 3)$$. You can now look up $$\\mathrm{P}(Y \\le 3)$$ in the $$p=0.3$$ tables.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "For a binomial distribution X ~ B(n, p), prove that the mean E(X) = np. (4 steps)", "answer": "- Step 1: A binomial distribution is the sum of n independent Bernoulli trials: X = X₁ + X₂ + ... + Xₙ\n- Step 2: Each Bernoulli trial Xᵢ has E(Xᵢ) = p (since P(Xᵢ = 1) = p, P(Xᵢ = 0) = q = 1-p)\n- Step 3: Using linearity of expectation: E(X) = E(X₁ + X₂ + ... + Xₙ) = E(X₁) + E(X₂) + ... + E(Xₙ)\n- Step 4: = p + p + ... + p (n times) = np\n\nThe mean tells us the expected number of successes in n trials.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "A fair coin is tossed 8 times. What is the probability of getting more heads than tails? Hint: use symmetry. (2 steps)", "answer": "- Step 1: For a fair coin, $$p=0.5$$, so the distribution is symmetric about the mean $$np=4$$. The event \"more heads than tails\" means $$X > 4$$ (since 8 trials, more heads means at least 5 heads).\n- Step 2: By symmetry, $$\\mathrm{P}(X > 4) = \\mathrm{P}(X < 4) = \\mathrm{P}(X \\le 3)$$. Also, $$\\mathrm{P}(X = 4)$$ is the middle probability. Since total probability is 1, we have $$2\\mathrm{P}(X > 4) + \\mathrm{P}(X=4) = 1$$, so $$\\mathrm{P}(X > 4) = \\frac{1 - \\mathrm{P}(X=4)}{2}$$.\nCompute $$\\mathrm{P}(X=4) = \\binom{8}{4}(0.5)^8 = 70/256 \\approx 0.2734$$. Then $$\\mathrm{P}(X > 4) = (1 - 0.2734)/2 = 0.3633$$.\n\nAlternatively, directly sum probabilities for 5,6,7,8.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Why is the binomial distribution considered a good model for \"successes\" in a fixed number of independent trials? What makes it mathematically tractable? (2 steps)", "answer": "- Step 1: The binomial distribution is mathematically tractable because it has a simple closed-form formula: P(X = r) = C(n,r)p^r(1-p)^(n-r)\n- Step 2: This formula comes directly from the binomial theorem (p+q)^n, making it easy to compute probabilities, cumulatives, mean, and variance. The simplicity of these formulas — np for mean and np(1-p) for variance — is what makes the binomial distribution so widely applicable and easy to use\n\nThe connection to the binomial expansion is not coincidental; it's the mathematical foundation.", "source": "MiniMax ②", "_id": "minimax_2_25"}, {"question": "For X ~ B(n, p), prove that E(X) = np using the definition of expectation for a discrete random variable. (3 steps)", "answer": "- Step 1: By definition, E(X) = Σ from r=0 to n of r × P(X = r)\n- Step 2: Substitute the binomial formula:\n$$= \\sum_{r=0}^n r \\binom{n}{r} p^r (1-p)^{n-r}$$\n- Step 3: Using combinatorial identity r × C(n,r) = n × C(n-1, r-1), this simplifies to:\n$$= n p \\sum_{r=1}^n \\binom{n-1}{r-1} p^{r-1} (1-p)^{n-r} = np(p + (1-p))^{n-1} = np$$\n\nThis derivation confirms the mean formula from first principles.", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "Given $$X \\sim \\mathrm{B}(n, p)$$ with $$\\mathrm{E}(X) = 4.8$$ and $$\\mathrm{Var}(X) = 2.88$$, explain conceptually how to find $$n$$ and $$p$$ without solving complex equations. (3 steps)", "answer": "- Step 1: We know $$\\mathrm{E}(X) = np = 4.8$$ and $$\\mathrm{Var}(X) = np(1-p) = 2.88$$.\n- Step 2: Divide the variance by the mean to isolate $$(1-p)$$: $$\\frac{np(1-p)}{np} = \\frac{2.88}{4.8}$$. This gives $$1-p = 0.6$$, so $$p = 0.4$$.\n- Step 3: Substitute $$p = 0.4$$ back into the mean equation: $$n(0.4) = 4.8$$, which means $$n = 4.8 / 0.4 = 12$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "What is the relationship between the binomial distribution and Pascal's triangle? How does this help you verify your calculations? (2 steps)", "answer": "- Step 1: The binomial coefficients C(n,0), C(n,1), ..., C(n,n) form the nth row of Pascal's triangle. For n = 3: 1, 3, 3, 1; for n = 4: 1, 4, 6, 4, 1; for n = 5: 1, 5, 10, 10, 5, 1\n- Step 2: These coefficients appear in the binomial probability formula. You can use Pascal's triangle to quickly verify the coefficients in your probability calculations\n\nFor example, for X ~ B(5, p), the probabilities should have coefficients 1, 5, 10, 10, 5, 1.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "A binomial variable $$X$$ is the sum of $$n$$ independent Bernoulli trials: $$X = X_1 + X_2 + \\dots + X_n$$. How does this sum property lead to the formulas $$E(X) = np$$ and $$Var(X) = np(1-p)$$? (3 steps)", "answer": "- Step 1: By linearity of expectation, the expected value of a sum is the sum of expected values, regardless of independence: $$E(X) = E(X_1) + E(X_2) + \\dots + E(X_n) = p + p + \\dots + p = np$$.\n- Step 2: For variance, the sum rule $$Var(X_1 + X_2) = Var(X_1) + Var(X_2)$$ holds *only if the variables are independent*. Since binomial trials are independent, we can sum the variances directly without worrying about covariance terms.\n- Step 3: Summing the identical variances of the Bernoulli trials gives $$Var(X) = Var(X_1) + \\dots + Var(X_n) = p(1-p) + \\dots + p(1-p) = np(1-p)$$. If trials were dependent, the variance formula would require extra covariance terms, breaking the binomial model.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "In the context of hypothesis testing with binomial, what does it mean if observed data has a much lower variance than what the binomial model predicts? (2 steps)", "answer": "- Step 1: If observed variance is much lower than np(1-p), it suggests the binomial model may not be appropriate\n- Step 2: Low variance could indicate: the probability p is not constant (maybe some items are systematically different), or the trials are not independent (there's correlation/clustering)\n\nThis is a diagnostic check — comparing theoretical variance to observed variance helps validate model assumptions.", "source": "MiniMax ②", "_id": "minimax_2_58"}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is $$\\mathrm{P}(X = 0)$$? How does this probability behave as $$n$$ increases if $$p$$ is fixed and $$0<p<1$$? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X=0) = (1-p)^n$$, since all trials must be failures.\n- Step 2: As $$n$$ increases, $$(1-p)^n$$ decays exponentially to 0 because $$1-p < 1$$. So the probability of zero successes becomes vanishingly small for large $$n$$.\n\nThis makes intuitive sense: with many trials, it becomes extremely unlikely to have no successes at all (unless $$p$$ is extremely small).", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "A binomial distribution has $$n=10, p=0.2$$. Without computing exact probabilities, determine whether $$\\mathrm{P}(X=3)$$ is greater than or less than $$\\mathrm{P}(X=2)$$. Explain your reasoning. (2 steps)", "answer": "- Step 1: The mean is $$\\mu = np = 2$$. For $$p=0.2$$, the distribution is skewed to the right (since $$p<0.5$$). The mode (most likely value) for binomial is at $$\\lfloor (n+1)p \\rfloor = \\lfloor 11 \\times 0.2 \\rfloor = \\lfloor 2.2 \\rfloor = 2$$.\n- Step 2: Since the mode is 2, $$\\mathrm{P}(X=2)$$ is the highest probability, and probabilities decrease as you move away from the mode. Therefore, $$\\mathrm{P}(X=3) < \\mathrm{P}(X=2)$$.\n\nThis reasoning uses the property that for binomial with $$p<0.5$$, the distribution peaks at or near $$np$$ and is right-skewed.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "How does the binomial probability formula $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$ arise from considering sequences of successes and failures? (3 steps)", "answer": "- Step 1: In $$n$$ independent trials, each with success probability $$p$$, the probability of any specific sequence containing exactly $$x$$ successes and $$n-x$$ failures (in a particular order) is $$p^x(1-p)^{n-x}$$ because the probabilities multiply due to independence.\n- Step 2: The number of distinct sequences (orderings) that produce exactly $$x$$ successes is the number of ways to choose which $$x$$ of the $$n$$ trials are successes. This is the binomial coefficient $$\\binom{n}{x} = \\frac{n!}{x!(n-x)!}$$.\n- Step 3: Since each such sequence has the same probability and the sequences are mutually exclusive, the total probability of exactly $$x$$ successes is the sum of the probabilities of all sequences, i.e., $$\\binom{n}{x}$$ times $$p^x(1-p)^{n-x}$$.\n\nThis also explains why the sum of all probabilities equals $$(p + (1-p))^n = 1^n = 1$$, connecting to the binomial theorem.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "What are the four conditions required to model a situation with a binomial distribution, and what happens if the \"fixed probability\" condition is violated? (3 steps)", "answer": "- Step 1: The four conditions are: a fixed number of trials ($$n$$), two possible outcomes (success and failure), a fixed probability of success ($$p$$), and independent trials.\n- Step 2: If the probability of success is not fixed (e.g., drawing cards without replacement from a small deck), the probability changes with each trial.\n- Step 3: This breaks the binomial model because the formula $$P(X=r)$$ assumes the same $$p$$ is multiplied $$r$$ times. However, if the population is very large, the change in probability is negligible, allowing us to approximate it as fixed.\n\nTakeaway: The binomial model requires a stable environment where the chance of success never wavers across the $$n$$ trials.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "In the binomial probability formula, what does the term $$\\binom{n}{x}$$ represent intuitively? Why is it needed? (2 steps)", "answer": "- Step 1: $$\\binom{n}{x}$$ counts the number of ways to choose which $$x$$ trials out of $$n$$ are successes, without regard to order. For example, with $$n=4$$ and $$x=2$$, the successes could occur in trials (1,2), (1,3), (1,4), (2,3), (2,4), or (3,4) — 6 ways, which equals $$\\binom{4}{2}=6$$.\n- Step 2: Without this factor, $$p^x(1-p)^{n-x}$$ would only give the probability of one specific ordering (e.g., first $$x$$ successes then $$n-x$$ failures). Since all orderings are equally likely and mutually exclusive, we must multiply by the number of orderings to account for all possible ways to achieve $$x$$ successes.\n\nThus, $$\\binom{n}{x}$$ ensures we count all possible sequences.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "A single Bernoulli trial has outcomes 1 (success with probability $$p$$) and 0 (failure with probability $$1-p$$). Derive the expected value $$E(X_1)$$ and variance $$Var(X_1)$$ for this single trial. (3 steps)", "answer": "- Step 1: The expected value is the sum of outcomes weighted by their probabilities: $$E(X_1) = (1 \\times p) + (0 \\times (1-p)) = p$$. This makes intuitive sense: the average result is just the probability of success.\n- Step 2: To find the variance, first find $$E(X_1^2)$$. Since $$1^2 = 1$$ and $$0^2 = 0$$, this is $$(1 \\times p) + (0 \\times (1-p)) = p$$.\n- Step 3: Use the variance formula $$Var(X_1) = E(X_1^2) - [E(X_1)]^2 = p - p^2 = p(1-p)$$. This shows that the spread of a single trial depends on the balance between success and failure; it's maximized when $$p=0.5$$ (maximum uncertainty).", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "In the binomial probability formula $$\\mathrm{P}(X=r)=\\binom{n}{r} p^{r}(1-p)^{n-r}$$, what does the term $$p^{r}(1-p)^{n-r}$$ represent, and why do we need to multiply it by $$\\binom{n}{r}$$? (2 steps)", "answer": "- Step 1: The term $$p^{r}(1-p)^{n-r}$$ represents the probability of **one specific sequence** of outcomes occurring in a fixed order — for example, getting successes on the first $$r$$ trials followed by failures on the remaining $$n-r$$ trials.\n- Step 2: Since the successes can occur in **any** positions among the $$n$$ trials, we must multiply by the number of ways to choose which $$r$$ trials are the successes. This is exactly what the combination $$\\binom{n}{r}$$ counts, ensuring we account for all possible orderings of $$r$$ successes.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A student claims that the number of red cars among the next 10 cars passing a toll booth can be modelled by a binomial distribution. What assumption might be violated if the toll booth is on a road leading from a car exhibition showcasing only red cars? (2 steps)", "answer": "- Step 1: The binomial model requires a constant probability of success for each trial. If many red cars are leaving the exhibition, the probability that a given car is red may be higher than usual and may change over time as the exhibition traffic thins out.\n- Step 2: Additionally, if the cars are traveling in convoys from the exhibition, the colors of consecutive cars may not be independent; seeing one red car makes it more likely the next is also red. Both constant probability and independence could be violated.\n\nThus the binomial model may not be appropriate without checking these assumptions.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "Using the same sum of independent Bernoulli trials $$X = X_1 + X_2 + \\dots + X_n$$, derive the formula for the variance $$\\mathrm{Var}(X)$$. Why is independence crucial here? (2 steps)", "answer": "- Step 1: For **independent** random variables, the variance of their sum is equal to the sum of their variances: $$\\mathrm{Var}(X) = \\mathrm{Var}(X_1) + \\mathrm{Var}(X_2) + \\dots + \\mathrm{Var}(X_n)$$. (If they were not independent, covariance terms would appear, making the math much more complex).\n- Step 2: Since each independent Bernoulli trial has a variance of $$p(1-p)$$, summing $$n$$ of them gives $$\\mathrm{Var}(X) = p(1-p) + p(1-p) + \\dots + p(1-p) = np(1-p)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why can't the binomial distribution be used for sampling without replacement from a small population? (3 steps)", "answer": "- Step 1: For small populations, the trials are not independent\n+ Removing one item changes the probability of success for the next trial\n- Step 2: The binomial distribution assumes constant probability of success\n+ In sampling without replacement, this assumption is violated\n- Step 3: However, if the population is large relative to the sample size, the binomial distribution is still a good approximation\n+ Example: Sampling 10 items from a population of 10,000 is approximately binomial", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "In a binomial distribution, what is the probability of getting exactly the mean number of successes? Is it usually high or low? Explain. (2 steps)", "answer": "- Step 1: The mean is $$\\mu = np$$, which may not be an integer. If $$np$$ is an integer, then $$\\mathrm{P}(X = np)$$ is the probability at the mode (or near it). If $$np$$ is not integer, the probability at the nearest integers may be considered.\n- Step 2: Even at the mode, the probability is typically not very high, especially for large $$n$$, because the distribution spreads out. For example, with $$n=100, p=0.5$$, $$\\mathrm{P}(X=50) \\approx 0.08$$, which is the highest but still only 8%. So getting exactly the mean is not very likely; the distribution has dispersion.\n\nThis highlights that the mean is an average, not a highly probable single outcome.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "Consider the edge cases where $$p = 0$$ or $$p = 1$$ in a $$B(n, p)$$ distribution. What are the mean, variance, and shape of the distribution in these limiting cases? (2 steps)", "answer": "- Step 1: If $$p = 0$$, success is impossible. The random variable $$X$$ is always 0. The mean is $$n(0) = 0$$, and the variance is $$n(0)(1) = 0$$. The distribution is a single spike at $$X=0$$ with probability 1.\n- Step 2: If $$p = 1$$, success is certain. The random variable $$X$$ is always $$n$$. The mean is $$n(1) = n$$, and the variance is $$n(1)(0) = 0$$. The distribution is a single spike at $$X=n$$. In both cases, there is no uncertainty, so the variance collapses to 0.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In a binomial experiment, explain why the probability of exactly $$x$$ successes does not depend on the order of successes and failures. (2 steps)", "answer": "- Step 1: Because each trial is independent and the probability of success $$p$$ is constant, the probability of any specific sequence with $$x$$ successes and $$n-x$$ failures is always $$p^x(1-p)^{n-x}$$, regardless of order.\n- Step 2: The total probability of exactly $$x$$ successes is the sum over all such sequences, which is the number of sequences (i.e., $$\\binom{n}{x}$$) times the common probability. Hence the order does not matter; only the count matters.\n\nThis is a key feature of the binomial model: it \"forgets\" order.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "What is the difference between $$\\mathrm{P}(X < k)$$ and $$\\mathrm{P}(X \\le k-1)$$ for a binomial random variable? Are they equal? (2 steps)", "answer": "- Step 1: Since $$X$$ is a discrete random variable taking integer values, the event $$X < k$$ means $$X$$ takes values less than $$k$$, i.e., $$X \\le k-1$$ (because the next integer below $$k$$ is $$k-1$$).\n- Step 2: Therefore, $$\\mathrm{P}(X < k) = \\mathrm{P}(X \\le k-1)$$. They are exactly equal.\n\nThis is a key point when using cumulative tables: always convert strict inequalities to $$\\le$$ form.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "A student claims that if you flip a fair coin 3 times, P(X = 2) = 3 × (1/2)^2. Explain why this is incorrect and write the correct calculation. (2 steps)", "answer": "- Step 1: The student's formula is missing the probability of the failures — they only accounted for getting 2 heads but forgot to account for getting 1 tail\n- Step 2: The correct formula is $$\\mathrm{P}(X=2) = \\binom{3}{2} \\times (0.5)^2 \\times (0.5)^1 = 3 \\times 0.5^3 = 3 \\times \\frac{1}{8} = \\frac{3}{8}$$\n\nThe exponent on (0.5) must add to 3 — both successes AND failures matter in the probability calculation.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "Why does the variance formula $$\\mathrm{Var}(X) = np(1-p)$$ reach its maximum when $$p=0.5$$? Conceptually, what does this mean for the spread of outcomes? (2 steps)", "answer": "- Step 1: The variance depends on the term $$p(1-p) = p - p^2$$, which is a downward-opening parabola. Its maximum occurs at the vertex $$p = 0.5$$. At this point, the variance is $$0.25n$$.\n- Step 2: Conceptually, when $$p=0.5$$, success and failure are equally likely, leading to the **maximum uncertainty** in the outcome. If $$p$$ is close to 0 or 1, the outcome is highly predictable (almost all failures or almost all successes), so the spread (variance) is smaller.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Why can't we use a binomial distribution to model the number of trials needed to get the first success? What type of distribution would be appropriate instead? (2 steps)", "answer": "- Step 1: In binomial, the number of trials n is fixed in advance. When counting \"how many trials until first success,\" the number of trials is random and depends on when the first success occurs\n- Step 2: This is a geometric distribution (or negative binomial for \"r successes\"), not binomial. The key difference: binomial counts successes in a FIXED number of trials; geometric counts trials needed for the first success\n\nThis is a common misconception — make sure the number of trials is predetermined, not data-dependent.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "In the expansion of (p + q)^n, what does the term containing p^r q^(n-r) represent in the binomial distribution? (2 steps)", "answer": "- Step 1: The term is $$\\binom{n}{r} p^r q^{n-r}$$\n- Step 2: This equals P(X = r) where X ~ B(n, p), because $$\\binom{n}{r}$$ gives the number of ways to arrange r successes in n trials, p^r is the probability of r successes, and q^(n-r) is the probability of the remaining failures\n\nThe binomial pmf comes directly from the binomial theorem expansion.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "How can you handle binomial probability questions with large $n$ and small $p$? (3 steps)", "answer": "- Step 1: When $n$ is large and $p$ is small such that $np$ is moderate, the binomial distribution can be approximated by a Poisson distribution\n+ This is useful when calculating binomial probabilities becomes computationally intensive\n- Step 2: The Poisson approximation uses $\\lambda = np$\n- Step 3: The approximation is given by:\n$$P(X=x) \\approx \\frac{e^{-\\lambda} \\lambda^x}{x!}$$\n+ This is particularly useful for rare events in large populations", "source": "Qwen 3 ①", "_id": "qwen_1_17"}, {"question": "A random variable $$X \\sim \\mathrm{B}(n, p)$$ has variance $$np(1-p)$$. If $$n$$ is doubled and $$p$$ is halved, what happens to the mean and variance? (2 steps)", "answer": "- Step 1: Original mean $$\\mu_1 = np$$. New mean $$\\mu_2 = (2n)(p/2) = np = \\mu_1$$. So the mean stays the same.\n- Step 2: Original variance $$\\sigma_1^2 = np(1-p)$$. New variance $$\\sigma_2^2 = (2n)(p/2)(1 - p/2) = np(1 - p/2)$$. Compare to original: $$np(1 - p/2)$$ vs $$np(1-p)$$. Since $$p/2 < p$$, we have $$1 - p/2 > 1 - p$$, so the new variance is larger.\n\nSpecifically, $$\\sigma_2^2 = np - np^2/2$$, while $$\\sigma_1^2 = np - np^2$$. So variance increases by $$np^2/2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "For X ~ B(n, p), if p is very small (close to 0) and n is moderate, describe the shape of the distribution. What does this imply about the probability of getting any successes? (2 steps)", "answer": "- Step 1: When p is very small (e.g., p = 0.01) with moderate n, the distribution is highly skewed to the right — most probability is concentrated at 0, with rapidly decreasing probabilities for higher values\n- Step 2: This means P(X = 0) = (1-p)^n will be very high (close to 1), while P(X ≥ 1) will be very low. The mean np will also be small\n\nFor example, X ~ B(100, 0.01) has mean = 1, and P(X = 0) ≈ 0.366 — almost 37% of the time you get zero successes.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "A fair dice is rolled 10 times. What is the probability of getting at least one 6? Use the complement method. (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of 6s in 10 rolls. Then $$X \\sim \\mathrm{B}(10, 1/6)$$.\n- Step 2: $$\\mathrm{P}(X \\ge 1) = 1 - \\mathrm{P}(X = 0) = 1 - (5/6)^{10} \\approx 1 - 0.1615 = 0.8385$$.\n\nThe complement method is efficient for \"at least one\" problems.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "Why is $$\\mathrm{P}(X < 5)$$ NOT equal to $$1 - \\mathrm{P}(X \\le 5)$$ for a discrete binomial random variable? What is the correct complement of $$\\mathrm{P}(X < 5)$$? (2 steps)", "answer": "- Step 1: The complement of the event \"$$X < 5$$\" (which means $$X$$ can be 0, 1, 2, 3, or 4) is \"$$X \\ge 5$$\" (which means $$X$$ can be 5, 6, 7, etc.). The expression $$1 - \\mathrm{P}(X \\le 5)$$ actually equals $$\\mathrm{P}(X > 5)$$, leaving out the probability of exactly 5.\n- Step 2: The correct complement is $$\\mathrm{P}(X < 5) = 1 - \\mathrm{P}(X \\ge 5) = 1 - (1 - \\mathrm{P}(X \\le 4)) = \\mathrm{P}(X \\le 4)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Why does the binomial distribution become more spread out as $n$ increases? (2 steps)", "answer": "- Step 1: As $n$ increases, the range of possible values (from 0 to $n$) expands\n- Step 2: The standard deviation increases as $\\sqrt{np(1-p)}$\n+ While the standard deviation increases, the coefficient of variation (standard deviation relative to the mean) decreases\n+ This means that relative to the mean, the spread becomes smaller as $n$ increases", "source": "Qwen 3 ①", "_id": "qwen_1_21"}, {"question": "Explain why P(X = r) = P(X = n-r) when p = 0.5 for X ~ B(n, p). What symmetry does this reveal? (2 steps)", "answer": "- Step 1: When p = 0.5, we have P(X = r) = C(n,r)(0.5)^n and P(X = n-r) = C(n, n-r)(0.5)^n\n- Step 2: Since C(n, r) = C(n, n-r), these probabilities are equal. The distribution is symmetric about the mean np = n/2\n\nThis symmetry means P(X < n/2) = P(X > n/2), and the distribution looks the same on both sides of the center.", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "What are some common misconceptions about the binomial distribution? (3 steps)", "answer": "- Step 1: One misconception is that the binomial distribution can be used when the probability of success changes from trial to trial. In reality, the probability must be constant for all trials.\n\n- Step 2: Another misconception is that the trials can be dependent. For the binomial distribution to apply, each trial must be independent of the others.\n\n- Step 3: Some people incorrectly assume the binomial distribution is only used for rare events (like the Poisson distribution). In truth, it's used whenever the binomial conditions are met, regardless of how common or rare the success probability is.", "source": "Qwen 3 ②", "_id": "qwen_2_17"}, {"question": "A common mistake when finding the probability of \"at least one success\" in $$n$$ trials is to try to sum $$P(X=1) + P(X=2) + \\dots + P(X=n)$$. What is the much simpler way to calculate this, and why? (2 steps)", "answer": "- Step 1: The complement of \"at least one success\" ($$X \\geq 1$$) is \"zero successes\" ($$X = 0$$). These two events cover the entire sample space and are mutually exclusive.\n- Step 2: Since total probability is 1, $$P(X \\geq 1) = 1 - P(X = 0)$$. The term $$P(X = 0)$$ is simply the probability of failing every single trial, which is $$(1-p)^n$$. This is much faster and less error-prone than summing an infinite-looking series of terms.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A student claims that if $$X \\sim \\mathrm{B}(n, p)$$ then $$n - X \\sim \\mathrm{B}(n, 1-p)$$. Is this correct? Explain why. (2 steps)", "answer": "- Step 1: Yes, this is correct. If we redefine \"success\" as \"failure\" in the original experiment, then the number of failures $$n-X$$ counts the number of successes in this new definition.\n- Step 2: The new success probability is $$1-p$$, and the number of trials is still $$n$$, with independent trials and constant probability. Therefore, $$n-X \\sim \\mathrm{B}(n, 1-p)$$.\n\nThis symmetry is useful for calculations, especially when $$p > 0.5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "What is the difference between a binomial distribution and a Bernoulli distribution? (2 steps)", "answer": "- Step 1: A Bernoulli distribution is a special case of the binomial distribution where there's only one trial (n=1). It has two possible outcomes - 1 for success with probability p, and 0 for failure with probability 1-p.\n\n- Step 2: The binomial distribution generalizes this to n independent Bernoulli trials, counting the number of successes in those trials. So the binomial distribution is essentially the sum of n independent Bernoulli random variables.", "source": "Qwen 3 ②", "_id": "qwen_2_14"}, {"question": "What is the difference between P(X ≤ x) and P(X < x) in a binomial distribution? How do you calculate each? (2 steps)", "answer": "- Step 1: For discrete random variables:\n+ P(X ≤ x) includes the probability of getting exactly x: P(X = 0) + P(X = 1) + ... + P(X = x)\n+ P(X < x) excludes x: P(X = 0) + P(X = 1) + ... + P(X = x-1) = P(X ≤ x-1)\n- Step 2: So P(X < x) = P(X ≤ x-1), which is one less than P(X ≤ x) in the cumulative table\n\nThis distinction matters greatly when interpreting probability phrases in word problems.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "An experiment is run 500 times where a biased dice is thrown 5 times. The theoretical variance of a binomial model is $$np(1-p)$$. If the observed variance of the data is significantly *larger* than this theoretical value, what does this suggest about the independence of the trials? (2 steps)", "answer": "- Step 1: The theoretical variance $$np(1-p)$$ assumes that all trials are completely independent. If trials are positively correlated (e.g., success on one trial makes success on another more likely), the outcomes will cluster at the extremes (all successes or all failures) more than a binomial model predicts.\n- Step 2: This clustering increases the spread of the data. Therefore, an observed variance much larger than $$np(1-p)$$ suggests the trials are not independent, violating a core binomial condition.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "For each situation below, state whether a binomial distribution is appropriate. If not, explain why.\na) Counting how many times you need to flip a coin until you get 4 heads in a row\nb) Selecting 20 bolts from a large batch and checking how many are faulty (with 1% fault rate)\nc) Recording the number of red cars observed in the first 15 new cars of a certain make (with 12% red, 8% blue, 15% white, 65% other) (3 parts)", "answer": "- a) NOT binomial — the number of trials is not fixed (it depends on when you get 4 heads); this is a negative binomial or geometric situation\n- b) Binomial is appropriate — fixed number of trials (20), two outcomes (faulty/not faulty), fixed probability (0.01), and assuming large batch makes trials independent: X ~ B(20, 0.01)\n- c) NOT binomial — there are more than two possible outcomes (red, blue, white, other = 4 categories), so binomial does not apply; this would be multinomial", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "If you increase n while keeping p constant, what happens to:\na) the mean of the distribution?\nb) the standard deviation of the distribution? (2 steps)", "answer": "- a) Mean = np increases linearly with n. Double n, mean doubles\n- b) Standard deviation = √(np(1-p)) increases with √n. Double n, standard deviation increases by factor of √2, not 2\n\nThis shows that as you do more trials, the absolute spread increases (more total successes possible), but relative spread actually decreases (standard deviation grows slower than mean).", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "How does the binomial probability formula $$P(X=r) = \\binom{n}{r} p^r (1-p)^{n-r}$$ naturally emerge from the binomial expansion of $$(p + q)^n$$ where $$q = 1-p$$? (3 steps)", "answer": "- Step 1: In a sequence of $$n$$ trials, every specific outcome can be represented as a string of successes (S) and failures (F). The probability of any specific string with exactly $$r$$ successes and $$n-r$$ failures is $$p^r (1-p)^{n-r}$$.\n- Step 2: There are multiple distinct ways to arrange $$r$$ successes within $$n$$ trials. The number of such combinations is the binomial coefficient $$\\binom{n}{r}$$.\n- Step 3: Summing the probabilities of all these mutually exclusive arrangements gives $$\\binom{n}{r} p^r (1-p)^{n-r}$$. This exactly mirrors the general term in the binomial expansion of $$(p + q)^n$$, which is why the sum of all probabilities from $$r=0$$ to $$r=n$$ equals $$(p+q)^n = 1$$.\n\nTakeaway: The binomial distribution is just the binomial theorem applied to probability, where each term represents the likelihood of a specific count of successes.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "For a binomial distribution, what is the relationship between the mean $$\\mu = np$$ and the variance $$\\sigma^2 = np(1-p)$$? What does this imply about the spread when $$p$$ is close to 0 or 1? (2 steps)", "answer": "- Step 1: The variance can be written as $$\\sigma^2 = \\mu(1-p)$$. Since $$0 < p < 1$$, we have $$\\sigma^2 < \\mu$$ when $$p>0$$, and $$\\sigma^2 = 0$$ when $$p=0$$ or $$p=1$$ (all outcomes are certain).\n- Step 2: When $$p$$ is close to 0 or 1, the distribution is highly skewed, with most probability mass concentrated near 0 or near $$n$$. The variance is small because outcomes are almost deterministic. The variance is maximised when $$p=0.5$$, giving $$\\sigma^2 = n/4$$, which corresponds to the most spread-out, symmetric distribution.\n\nThus, the binomial distribution is most variable when successes and failures are equally likely.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "For X ~ B(n, p), prove that Var(X) = np(1-p) using the definition of variance for a discrete random variable. (3 steps)", "answer": "- Step 1: Var(X) = E(X²) - [E(X)]². We already know E(X) = np\n- Step 2: Compute E(X²): E(X²) = Σ r² × P(X=r). Using the identity r(r-1)C(n,r) = n(n-1)C(n-2, r-2), we get:\n$$E[X(X-1)] = n(n-1)p^2$$\n- Step 3: So E(X²) = E[X(X-1)] + E(X) = n(n-1)p² + np\nTherefore: Var(X) = n(n-1)p² + np - (np)² = np(1-p)\n\nThis confirms the variance formula from first principles.", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "Why might using a binomial distribution to model the number of red cars in the first 15 new cars of a certain manufacturer be inappropriate? The manufacturer produces 12% red, 8% blue, 15% white, rest other colors. (3 steps)", "answer": "- Step 1: There are more than two outcomes: red, blue, white, and \"other\" — that's 4 categories\n- Step 2: A binomial requires exactly two outcomes (success/failure)\n- Step 3: This would require either: (a) defining \"success\" as just one color (e.g., red vs. not red), or (b) using a different distribution like multinomial\n\nTo use binomial, you'd need to consider \"red\" vs \"not red\" (12% vs 88%).", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "If $$X_1 \\sim \\mathrm{B}(n, p)$$ and $$X_2 \\sim \\mathrm{B}(n, 1-p)$$, how do their means and variances compare? (2 steps)", "answer": "- Step 1: The means are $$\\mathrm{E}(X_1) = np$$ and $$\\mathrm{E}(X_2) = n(1-p)$$. They are generally different (unless $$p=0.5$$), but they always sum to $$n$$ because counting successes with probability $$p$$ is the same as counting failures with probability $$1-p$$.\n- Step 2: The variances are identical: $$\\mathrm{Var}(X_1) = np(1-p)$$ and $$\\mathrm{Var}(X_2) = n(1-p)(1-(1-p)) = n(1-p)p$$. The spread of the distribution is the same whether you are tracking successes or failures.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "Why is independence crucial for applying a binomial distribution? Provide an example of a situation where independence is violated. (2 steps)", "answer": "- Step 1: Independence is crucial because the probability of success in each trial must remain constant. If trials are dependent, the outcome of one trial affects the probability in subsequent trials, violating the binomial distribution assumptions.\n\n- Step 2: An example of a violation is selecting cards from a deck without replacement to count aces. The probability of drawing an ace changes after each draw, making the trials dependent. This would require using a hypergeometric distribution instead of a binomial one.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "Why does the binomial distribution become more symmetric as $$n$$ increases, for a fixed $$p$$? (2 steps)", "answer": "- Step 1: By the Central Limit Theorem, the sum (or average) of independent identically distributed random variables tends to a normal distribution as $$n$$ grows large. The binomial is a sum of Bernoulli trials, so it approximates a normal distribution with mean $$np$$ and variance $$np(1-p)$$.\n- Step 2: Even for moderate $$n$$, if $$p$$ is not too close to 0 or 1, the distribution looks roughly bell-shaped and symmetric around the mean. The skewness decreases as $$n$$ increases because the distribution spreads out and the relative asymmetry diminishes.\n\nHowever, if $$p$$ is extreme (near 0 or 1), a much larger $$n$$ is needed for the distribution to appear symmetric.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "If you write $$X \\sim B(n, p)$$, what do the symbols $$X$$, $$n$$, and $$p$$ represent in the context of an experiment? Why is $$X$$ called a discrete random variable?", "answer": "$$X$$ represents the random variable, which is the count of successful outcomes in the experiment. It is discrete because it can only take isolated integer values from $$0$$ up to $$n$$ (you can't have 2.5 successes). It is random because the exact number of successes varies each time you run the $$n$$ trials. $$n$$ is the index (the fixed total number of trials), and $$p$$ is the parameter (the fixed probability of success on any single trial).", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "How is the probability mass function for the binomial distribution derived? (3 steps)", "answer": "- Step 1: Recognize that each specific sequence with $x$ successes and $n-x$ failures has probability $p^x(1-p)^{n-x}$\n- Step 2: Calculate the number of ways to arrange $x$ successes among $n$ trials, which is $\\binom{n}{x}$\n- Step 3: Combine these to get the binomial probability formula:\n$$P(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$\n+ This comes from the binomial expansion of $(p+q)^n$ where $q=1-p$", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "In a binomial distribution, if $$p = 0.5$$, what symmetry property does the distribution have? How can this simplify calculations? (2 steps)", "answer": "- Step 1: When $$p=0.5$$, the distribution is symmetric about the mean $$\\mu = n/2$$. That is, $$\\mathrm{P}(X = k) = \\mathrm{P}(X = n - k)$$ for all $$k$$.\n- Step 2: This symmetry can simplify calculations: for example, $$\\mathrm{P}(X \\le a) = \\mathrm{P}(X \\ge n - a)$$. Also, the cumulative probabilities for values above the mean can be deduced from those below the mean.\n\nThis property is useful when tables are only given for $$p \\le 0.5$$, but for $$p=0.5$$ we can often use symmetry directly.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "How can you determine if a situation can be modeled with a binomial distribution? (2 steps)", "answer": "- Step 1: Check if the situation satisfies the four binomial conditions:\n+ Fixed number of trials\n+ Two outcomes per trial\n+ Constant probability of success\n+ Independent trials\n- Step 2: Think about potential violations:\n+ Example: Sampling without replacement from a small population violates independence\n+ Example: A changing probability environment (like improving skill over time) violates constant probability", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "In the binomial distribution formula P(X = r) = C(n,r)p^r(1-p)^(n-r), what happens to each term as r increases from 0 to n? Specifically, what happens to p^r and (1-p)^(n-r)? (2 steps)", "answer": "- As r increases:\n+ p^r increases (since p < 1, raising to higher power gives smaller numbers, but it's being multiplied by fewer failures)\n+ (1-p)^(n-r) decreases (fewer failures to raise to power)\n- The binomial coefficients C(n,r) first increase, reach a maximum near the mean np, then decrease\n- The product C(n,r)p^r(1-p)^(n-r) reflects this combination — highest probabilities are near the mean\n\nThis interplay between increasing p^r, decreasing (1-p)^(n-r), and the binomial coefficients creates the characteristic bell shape (or skewed shape when p ≠ 0.5).", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "Using the properties of probability and algebra, show that the sum of all probabilities in a binomial distribution $$X \\sim \\mathrm{B}(n, p)$$ equals 1. (2 steps)", "answer": "- Step 1: Write the sum of all probabilities from $$r=0$$ to $$r=n$$: $$\\sum_{r=0}^{n} \\mathrm{P}(X=r) = \\sum_{r=0}^{n} \\binom{n}{r} p^{r}(1-p)^{n-r}$$.\n- Step 2: Recognize this as the standard binomial expansion of $$[p + (1-p)]^n$$. Since $$p + (1-p) = 1$$, the entire sum evaluates to $$1^n = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is $$\\mathrm{P}(X = n)$$? Under what condition is this probability non-zero? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X = n) = p^n$$, since all $$n$$ trials must be successes.\n- Step 2: This probability is non-zero as long as $$p > 0$$. If $$p = 0$$, then $$\\mathrm{P}(X=n)=0$$ (impossible). As $$n$$ grows, $$p^n$$ becomes extremely small for $$p<1$$.\n\nThus, getting all successes is very unlikely unless $$n$$ is small or $$p$$ is close to 1.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "Why is the binomial distribution considered a discrete probability distribution? (2 steps)", "answer": "- Step 1: A discrete random variable can only take specific, separate values (typically integers)\n- Step 2: For X ~ B(n, p), X can only take integer values from 0 to n (inclusive), not continuous values\n\nThe values X can take are countable: 0, 1, 2, ..., n.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "How does the shape of the binomial distribution change with different values of $n$ and $p$? (3 steps)", "answer": "- Step 1: As $n$ increases, the distribution becomes more spread out\n+ The possible range of values (from 0 to $n$) expands\n- Step 2: When $p=0.5$, the distribution is symmetric\n+ Example: Tossing a fair coin 20 times\n- Step 3: When $p$ is close to 0 or 1, the distribution becomes skewed\n+ $p < 0.5$: Right-skewed\n+ $p > 0.5$: Left-skewed", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "For a binomial distribution, what is the mode (most probable value)? Give the formula and explain how it is derived. (3 steps)", "answer": "- Step 1: The mode is the value of $$x$$ that maximizes $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$.\n- Step 2: Consider the ratio $$\\frac{\\mathrm{P}(X=x)}{\\mathrm{P}(X=x-1)} = \\frac{(n-x+1)p}{x(1-p)}$$. This ratio is greater than 1 when $$x < (n+1)p$$, equal to 1 when $$x = (n+1)p$$ (if integer), and less than 1 when $$x > (n+1)p$$.\n- Step 3: Therefore, probabilities increase while $$x < (n+1)p$$ and decrease after $$x > (n+1)p$$. Hence the mode is the integer $$\\lfloor (n+1)p \\rfloor$$. If $$(n+1)p$$ is an integer, then both $$(n+1)p$$ and $$(n+1)p - 1$$ are modes (two equal maxima).\n\nThis gives a quick way to find the most likely number of successes.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Do the phrases \"no more than 3 successes\" and \"at most 3 successes\" translate to the same probability statement? If so, what is it?", "answer": "Yes, they mean the exact same thing. Both translate to $$\\mathrm{P}(X \\le 3)$$, which encompasses the probabilities of getting 0, 1, 2, or 3 successes. In everyday language, both phrases set an upper boundary of 3, explicitly including 3 as a valid outcome, which is crucial in discrete probability where boundary conditions often trip people up.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Why is it important to check the assumptions before using a binomial model in real-world problems? What could go wrong if assumptions are violated? (2 steps)", "answer": "- Step 1: If assumptions are violated, the binomial model gives incorrect probabilities. For example, if trials are not independent (probability changes), predictions will be off\n- Step 2: Common violations:\n+ Probability not constant (e.g., sampling without replacement from small population)\n+ More than two outcomes (e.g., three traffic light colors)\n+ Fixed number of trials not predetermined (e.g., until first success)\n+ Trials not independent (e.g., sampling without replacement from small group)\n\nChecking assumptions is the first step in any modelling problem — without valid assumptions, the model's predictions are meaningless.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "In a binomial distribution, if someone tells you \"the probability of getting 3 successes in 8 trials is 0.15,\" how could you quickly verify if this is approximately correct for p = 0.5? (2 steps)", "answer": "- Step 1: For n = 8, p = 0.5, the exact probability is:\nP(X = 3) = C(8,3)(0.5)³(0.5)⁵ = 56 × (0.5)⁸ = 56/256 ≈ 0.21875\n- Step 2: The claimed 0.15 is not correct. This quick check shows the value should be around 0.22, not 0.15. Using the known fact that C(8,3) = 56 and (0.5)⁸ = 1/256 gives the exact answer immediately\n\nThis demonstrates how knowing the formula and simple calculations helps verify claims.", "source": "MiniMax ②", "_id": "minimax_2_49"}, {"question": "A biased coin has probability $$p$$ of heads. It is tossed until a head appears. Is the number of tosses a binomial random variable? Why or why not? (2 steps)", "answer": "- Step 1: No, the number of tosses until the first success does **not** follow a binomial distribution. The binomial distribution counts the number of successes in a **fixed** number of trials, whereas here the number of trials is random.\n- Step 2: Additionally, the trials are not fixed in number; we continue until the first success, so the number of trials is not predetermined. This scenario follows a geometric distribution instead.\n\nThis highlights the importance of the \"fixed number of trials\" condition for the binomial model.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "A box contains 10 balls, 3 red and 7 blue. Three balls are drawn without replacement. Let $$X$$ be the number of red balls drawn. Can $$X$$ be modelled by a binomial distribution? Explain. (2 steps)", "answer": "- Step 1: The draws are without replacement from a small population, so the probability of drawing a red ball changes after each draw. Hence the probability of success is not constant.\n- Step 2: Also, the draws are not independent because the composition of the box changes. Therefore, $$X$$ does **not** follow a binomial distribution. It actually follows a hypergeometric distribution.\n\nHowever, if the box had a large number of balls and we drew a small sample, the binomial could be an approximation.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "How do you translate the phrases \"no more than 5\", \"at least 3\", and \"fewer than 7\" into mathematical inequalities for a discrete random variable $$X$$, and how does this affect your cumulative probability calculation? (3 steps)", "answer": "- Step 1: \"No more than 5\" means $$X \\leq 5$$. This directly uses the cumulative function: $$P(X \\leq 5)$$.\n- Step 2: \"At least 3\" means $$X \\geq 3$$. Since cumulative tables give $$P(X \\leq x)$$, you must use the complement rule: $$P(X \\geq 3) = 1 - P(X \\leq 2)$$.\n- Step 3: \"Fewer than 7\" means $$X < 7$$. Because $$X$$ is discrete (integer-valued), $$X$$ can be at most 6, so this is strictly equivalent to $$P(X \\leq 6)$$. A common misconception is to look up $$P(X \\leq 7)$$, which incorrectly includes 7.\n\nTakeaway: Always convert descriptive phrases into strict inequalities first, then adjust for the discrete nature of the variable to use cumulative tables correctly.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "When sampling without replacement from a finite population, the probability of success changes with each draw. Why can we still use the binomial distribution if the population is \"large\", and what is the risk if it is small? (2 steps)", "answer": "- Step 1: If the population is very large, removing one item changes the proportion of successes by a negligible amount. For example, if there are 1000 items and 100 are successes, the probability is 0.1. Removing one success makes it 99/999 ≈ 0.0991, which is close enough to 0.1 to assume a constant $$p$$.\n- Step 2: If the population is small, the probability shifts significantly after each draw (e.g., 2 successes out of 10 items). Assuming constant $$p$$ would over- or under-estimate the probabilities, making the binomial model inappropriate and inaccurate.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is the range of possible values that $$X$$ can take? Why? (2 steps)", "answer": "- Step 1: $$X$$ can take any integer value from $$0$$ up to $$n$$ inclusive. This is because $$X$$ counts the number of successes in $$n$$ trials; you cannot have fewer than 0 successes or more than $$n$$ successes.\n- Step 2: The probability of values outside this range is zero, which is consistent with the formula: $$\\binom{n}{x}$$ is defined as zero for $$x<0$$ or $$x>n$$, and the powers of $$p$$ and $$(1-p)$$ would not make sense for non-integer or out-of-range $$x$$.\n\nEdge case: if $$n=0$$, the only possible value is $$X=0$$ with probability 1.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Intuitively, why does the binomial distribution peak around $np$?", "answer": "- Step 1: The binomial distribution represents the number of successes in $n$ trials with probability $p$\n- Step 2: On average, we expect to see $np$ successes\n- Step 3: The distribution is centered around this expected value, so it makes sense that the probability is highest near $np$\n+ The distribution is symmetric when $p=0.5$ and skewed otherwise, but always concentrates around $np$", "source": "Qwen 3 ①", "_id": "qwen_1_19"}, {"question": "A company tests samples of 4 components and finds that the probability of at least one faulty component is 0.3439. They produce 600 components per day. Find the mean and variance of the number of faulty components per day. (3 steps)", "answer": "- Step 1: Let $$X$$ be the number of faulty components in a sample of 4. Then $$X \\sim \\mathrm{B}(4, p)$$. We have $$\\mathrm{P}(X \\ge 1) = 0.3439$$, so $$\\mathrm{P}(X=0) = 1 - 0.3439 = 0.6561$$.\n- Step 2: $$\\mathrm{P}(X=0) = (1-p)^4 = 0.6561$$. Taking the fourth root: $$1-p = 0.6561^{1/4} = 0.9$$ (since $$0.9^4 = 0.6561$$). Hence $$p = 0.1$$.\n- Step 3: Now for daily production, let $$Y$$ be the number of faulty components out of 600. Then $$Y \\sim \\mathrm{B}(600, 0.1)$$. Mean $$= np = 600 \\times 0.1 = 60$$. Variance $$= np(1-p) = 600 \\times 0.1 \\times 0.9 = 54$$.\n\nThus, on average 60 faulty components per day with variance 54.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A bag contains 5 red and 5 blue marbles. You draw 3 marbles without replacement and count the red ones. Can this strictly be modelled as $$X \\sim \\mathrm{B}(3, 0.5)$$? Why or why not? (2 steps)", "answer": "- Step 1: No, this cannot be strictly modelled as a binomial distribution.\n- Step 2: The condition of a constant probability of success is violated. Since we are drawing without replacement from a small population, the probability of drawing a red marble changes after each draw. For example, if the first marble is red, the probability of drawing a red marble on the second draw drops to $$4/9$$, not $$0.5$$. Therefore, the trials are also not independent.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What are the four conditions that must be satisfied for a random variable to be modelled by a binomial distribution B(n, p)? (4 steps)", "answer": "- Step 1: There must be a **fixed number of trials**, denoted $$n$$. The experiment consists of repeating the same process a set number of times.\n- Step 2: Each trial must have exactly **two possible outcomes**, typically labelled \"success\" and \"failure\". The random variable counts the number of successes.\n- Step 3: The probability of success, $$p$$, must be **constant** for each trial. It does not change from trial to trial.\n- Step 4: The trials must be **independent**; the outcome of one trial does not affect the outcome of any other trial.\n\nThese four conditions ensure that the probability of any particular sequence of successes and failures is $$p^x(1-p)^{n-x}$$, and the number of such sequences is counted by the binomial coefficient.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Why is the condition of independence between trials necessary for the binomial model? What would go wrong if trials were dependent? (2 steps)", "answer": "- Step 1: Independence guarantees that the probability of any specific sequence of outcomes (e.g., success, failure, success, ...) equals the product of the probabilities for each trial: $$p \\times (1-p) \\times p \\times \\dots$$.\n- Step 2: If trials were dependent, the probability of a given number of successes would depend on the order and conditional probabilities, not simply on the total count. The simple formula $$\\binom{n}{x}p^x(1-p)^{n-x}$$ would no longer hold because the probability of each sequence would not be the same.\n\nFor example, drawing cards without replacement from a small deck changes the probability of success each time, so the binomial model fails unless the population is large enough that the change is negligible.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student claims that the number of red cars among the next 10 cars passing a toll booth can be modelled by a binomial distribution. What assumption might be violated if the toll booth is on a road leading from a car exhibition showcasing only red cars? (2 steps)", "answer": "- Step 1: The binomial model requires a constant probability of success for each trial. If many red cars are leaving the exhibition, the probability that a given car is red may be higher than usual and may change over time as the exhibition traffic thins out.\n- Step 2: Additionally, if the cars are traveling in convoys from the exhibition, the colors of consecutive cars may not be independent; seeing one red car makes it more likely the next is also red. Both constant probability and independence could be violated.\n\nThus the binomial model may not be appropriate without checking these assumptions.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "When sampling without replacement from a finite population, under what condition can we still use the binomial distribution as an approximation? Explain why. (2 steps)", "answer": "- Step 1: If the population size is **large** compared to the sample size, the change in probability of success from one draw to the next is very small, so the probability remains approximately constant.\n- Step 2: For example, if a bag contains a large number of sweets in ratio 1:4 strawberry to apple, drawing 5 sweets without replacement changes the composition very little. We assume the probability of drawing a strawberry sweet stays approximately 0.2 for each draw, and the draws can be treated as independent for practical purposes.\n\nThe rule of thumb is that the sample size should be less than 10% of the population (for sampling without replacement from a finite population) to safely ignore the dependence.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How does the binomial probability formula $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$ arise from considering sequences of successes and failures? (3 steps)", "answer": "- Step 1: In $$n$$ independent trials, each with success probability $$p$$, the probability of any specific sequence containing exactly $$x$$ successes and $$n-x$$ failures (in a particular order) is $$p^x(1-p)^{n-x}$$ because the probabilities multiply due to independence.\n- Step 2: The number of distinct sequences (orderings) that produce exactly $$x$$ successes is the number of ways to choose which $$x$$ of the $$n$$ trials are successes. This is the binomial coefficient $$\\binom{n}{x} = \\frac{n!}{x!(n-x)!}$$.\n- Step 3: Since each such sequence has the same probability and the sequences are mutually exclusive, the total probability of exactly $$x$$ successes is the sum of the probabilities of all sequences, i.e., $$\\binom{n}{x}$$ times $$p^x(1-p)^{n-x}$$.\n\nThis also explains why the sum of all probabilities equals $$(p + (1-p))^n = 1^n = 1$$, connecting to the binomial theorem.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "In the binomial probability formula, what does the term $$\\binom{n}{x}$$ represent intuitively? Why is it needed? (2 steps)", "answer": "- Step 1: $$\\binom{n}{x}$$ counts the number of ways to choose which $$x$$ trials out of $$n$$ are successes, without regard to order. For example, with $$n=4$$ and $$x=2$$, the successes could occur in trials (1,2), (1,3), (1,4), (2,3), (2,4), or (3,4) — 6 ways, which equals $$\\binom{4}{2}=6$$.\n- Step 2: Without this factor, $$p^x(1-p)^{n-x}$$ would only give the probability of one specific ordering (e.g., first $$x$$ successes then $$n-x$$ failures). Since all orderings are equally likely and mutually exclusive, we must multiply by the number of orderings to account for all possible ways to achieve $$x$$ successes.\n\nThus, $$\\binom{n}{x}$$ ensures we count all possible sequences.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A random variable $$X$$ is distributed as $$X \\sim \\mathrm{B}(n, p)$$. What do the parameters $$n$$ and $$p$$ represent?", "answer": "The parameter $$n$$ represents the fixed number of trials, and $$p$$ represents the constant probability of success on each trial. Together they fully specify the binomial distribution: the possible values of $$X$$ are $$0,1,2,\\dots,n$$, and the probability of any value $$x$$ is given by $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$. The notation $$X \\sim \\mathrm{B}(n, p)$$ is read as \"$$X$$ follows a binomial distribution with parameters $$n$$ and $$p$$.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is the range of possible values that $$X$$ can take? Why? (2 steps)", "answer": "- Step 1: $$X$$ can take any integer value from $$0$$ up to $$n$$ inclusive. This is because $$X$$ counts the number of successes in $$n$$ trials; you cannot have fewer than 0 successes or more than $$n$$ successes.\n- Step 2: The probability of values outside this range is zero, which is consistent with the formula: $$\\binom{n}{x}$$ is defined as zero for $$x<0$$ or $$x>n$$, and the powers of $$p$$ and $$(1-p)$$ would not make sense for non-integer or out-of-range $$x$$.\n\nEdge case: if $$n=0$$, the only possible value is $$X=0$$ with probability 1.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "How do you compute a cumulative probability $$\\mathrm{P}(X \\le x)$$ for a binomial distribution? (2 steps)", "answer": "- Step 1: The cumulative probability $$\\mathrm{P}(X \\le x)$$ is the sum of the individual probabilities for all values from $$0$$ up to $$x$$: $$\\mathrm{P}(X \\le x) = \\sum_{r=0}^{x} \\mathrm{P}(X=r) = \\sum_{r=0}^{x} \\binom{n}{r}p^r(1-p)^{n-r}$$.\n- Step 2: In practice, you can use binomial cumulative distribution tables (for certain $$n$$ and $$p$$ values) or the cumulative binomial function on a calculator. For values not in tables, you may need to compute the sum manually or use technology.\n\nNote: $$\\mathrm{P}(X < x) = \\mathrm{P}(X \\le x-1)$$ because $$X$$ is discrete.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Translate the phrase \"at most 5 successes\" into a probability statement involving $$X$$, and explain how to compute it using cumulative probabilities. (2 steps)", "answer": "- Step 1: \"At most 5\" means $$X \\le 5$$. It includes the outcomes 0, 1, 2, 3, 4, and 5 successes.\n- Step 2: To compute, use the cumulative probability $$\\mathrm{P}(X \\le 5)$$, which can be found directly from tables or calculator, or by summing $$\\mathrm{P}(X=r)$$ for $$r=0$$ to $$5$$.\n\nSimilarly, \"no more than 5\" also means $$X \\le 5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "How would you compute $$\\mathrm{P}(X > k)$$ for a binomial random variable? Express it in terms of a cumulative probability. (2 steps)", "answer": "- Step 1: The event $$X > k$$ is the complement of $$X \\le k$$, because $$X$$ cannot equal a non-integer and the only other possibilities are values greater than $$k$$.\n- Step 2: Therefore, $$\\mathrm{P}(X > k) = 1 - \\mathrm{P}(X \\le k)$$.\n\nBe careful: $$\\mathrm{P}(X > k)$$ does **not** include $$k$$ itself. If you need $$\\mathrm{P}(X \\ge k)$$, that equals $$1 - \\mathrm{P}(X \\le k-1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "For a binomial distribution with $$p > 0.5$$, the standard tables (which only list $$p \\le 0.5$$) cannot be used directly. Describe a strategy to still use the tables by redefining the random variable. (3 steps)", "answer": "- Step 1: Define a new random variable $$Y = n - X$$, which counts the number of failures. Since success and failure are symmetric, $$Y$$ follows a binomial distribution with parameters $$n$$ and $$(1-p)$$, where $$(1-p) < 0.5$$ (because $$p > 0.5$$).\n- Step 2: Now $$Y \\sim \\mathrm{B}(n, 1-p)$$, and the tables can be used for $$Y$$ because its probability of \"success\" (i.e., failure in the original) is less than 0.5.\n- Step 3: Translate the desired probability for $$X$$ into a probability for $$Y$$. For example, $$\\mathrm{P}(X \\le a) = \\mathrm{P}(Y \\ge n - a) = 1 - \\mathrm{P}(Y \\le n - a - 1)$$, or more directly, $$\\mathrm{P}(X \\le a) = \\mathrm{P}(Y \\ge n - a)$$. Similarly, $$\\mathrm{P}(X \\ge a) = \\mathrm{P}(Y \\le n - a)$$.\n\nThis trick exploits the symmetry of the binomial distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Suppose $$X \\sim \\mathrm{B}(10, 0.7)$$. Use the redefinition method to express $$\\mathrm{P}(X \\le 6)$$ in terms of a cumulative probability for a variable $$Y \\sim \\mathrm{B}(10, 0.3)$$. (3 steps)", "answer": "- Step 1: Let $$Y = 10 - X$$, so $$Y$$ counts the number of failures. Then $$Y \\sim \\mathrm{B}(10, 0.3)$$ because the probability of failure is $$1-0.7 = 0.3$$.\n- Step 2: The event $$X \\le 6$$ means at most 6 successes, which is equivalent to at least 4 failures (since $$Y = 10 - X \\ge 10 - 6 = 4$$). So $$\\mathrm{P}(X \\le 6) = \\mathrm{P}(Y \\ge 4)$$.\n- Step 3: Compute $$\\mathrm{P}(Y \\ge 4) = 1 - \\mathrm{P}(Y \\le 3)$$. Now $$\\mathrm{P}(Y \\le 3)$$ can be looked up in the binomial cumulative tables for $$n=10, p=0.3$$.\n\nThus, $$\\mathrm{P}(X \\le 6) = 1 - \\mathrm{P}(Y \\le 3)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is a Bernoulli trial? Give its probability distribution, and derive its mean and variance. (3 steps)", "answer": "- Step 1: A Bernoulli trial is a single random experiment with exactly two outcomes: success (with probability $$p$$) and failure (with probability $$1-p$$). The random variable $$X_1$$ takes value 1 for success and 0 for failure.\n- Step 2: The probability distribution is: $$\\mathrm{P}(X_1=0)=1-p$$, $$\\mathrm{P}(X_1=1)=p$$.\n- Step 3: The mean is $$\\mathrm{E}(X_1) = 0 \\cdot (1-p) + 1 \\cdot p = p$$. The variance is $$\\mathrm{Var}(X_1) = \\mathrm{E}(X_1^2) - [\\mathrm{E}(X_1)]^2 = (0^2 \\cdot (1-p) + 1^2 \\cdot p) - p^2 = p - p^2 = p(1-p)$$.\n\nThus, a Bernoulli trial is the building block of the binomial distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Explain how a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$ can be expressed as a sum of independent Bernoulli trials. Then use this representation to derive the mean of $$X$$. (3 steps)", "answer": "- Step 1: Let $$X_i$$ be the Bernoulli trial for the $$i$$-th trial, where $$X_i = 1$$ if success, 0 if failure. Then the total number of successes $$X = X_1 + X_2 + \\dots + X_n$$.\n- Step 2: The $$X_i$$ are independent and identically distributed with $$\\mathrm{E}(X_i) = p$$.\n- Step 3: By linearity of expectation, $$\\mathrm{E}(X) = \\mathrm{E}(X_1) + \\mathrm{E}(X_2) + \\dots + \\mathrm{E}(X_n) = p + p + \\dots + p = np$$.\n\nThis derivation shows why the mean of a binomial distribution is $$np$$, without needing to sum over the distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Using the representation $$X = X_1 + X_2 + \\dots + X_n$$ where the $$X_i$$ are independent Bernoulli($$p$$) trials, derive the variance of $$X$$. (3 steps)", "answer": "- Step 1: For each Bernoulli trial, $$\\mathrm{Var}(X_i) = p(1-p)$$, as derived earlier.\n- Step 2: Because the trials are independent, the variance of the sum is the sum of the variances: $$\\mathrm{Var}(X) = \\mathrm{Var}(X_1) + \\mathrm{Var}(X_2) + \\dots + \\mathrm{Var}(X_n)$$.\n- Step 3: Therefore, $$\\mathrm{Var}(X) = p(1-p) + p(1-p) + \\dots + p(1-p) = n p(1-p)$$.\n\nNote: Independence is crucial; if trials were dependent, covariances would appear.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "For a binomial distribution, what is the relationship between the mean $$\\mu = np$$ and the variance $$\\sigma^2 = np(1-p)$$? What does this imply about the spread when $$p$$ is close to 0 or 1? (2 steps)", "answer": "- Step 1: The variance can be written as $$\\sigma^2 = \\mu(1-p)$$. Since $$0 < p < 1$$, we have $$\\sigma^2 < \\mu$$ when $$p>0$$, and $$\\sigma^2 = 0$$ when $$p=0$$ or $$p=1$$ (all outcomes are certain).\n- Step 2: When $$p$$ is close to 0 or 1, the distribution is highly skewed, with most probability mass concentrated near 0 or near $$n$$. The variance is small because outcomes are almost deterministic. The variance is maximised when $$p=0.5$$, giving $$\\sigma^2 = n/4$$, which corresponds to the most spread-out, symmetric distribution.\n\nThus, the binomial distribution is most variable when successes and failures are equally likely.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "A binomial random variable $$X$$ has mean 6 and variance 4.2. Find the values of $$n$$ and $$p$$. (3 steps)", "answer": "- Step 1: We know $$\\mu = np = 6$$ and $$\\sigma^2 = np(1-p) = 4.2$$.\n- Step 2: Divide the variance by the mean: $$\\frac{np(1-p)}{np} = 1-p = \\frac{4.2}{6} = 0.7$$. Hence $$p = 1 - 0.7 = 0.3$$.\n- Step 3: Then $$n = \\mu / p = 6 / 0.3 = 20$$. So $$X \\sim \\mathrm{B}(20, 0.3)$$.\n\nThis method works whenever you are given mean and variance for a binomial; solving the two equations yields $$p$$ and $$n$$ (provided $$n$$ is an integer).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why does the binomial distribution become more symmetric as $$n$$ increases, for a fixed $$p$$? (2 steps)", "answer": "- Step 1: By the Central Limit Theorem, the sum (or average) of independent identically distributed random variables tends to a normal distribution as $$n$$ grows large. The binomial is a sum of Bernoulli trials, so it approximates a normal distribution with mean $$np$$ and variance $$np(1-p)$$.\n- Step 2: Even for moderate $$n$$, if $$p$$ is not too close to 0 or 1, the distribution looks roughly bell-shaped and symmetric around the mean. The skewness decreases as $$n$$ increases because the distribution spreads out and the relative asymmetry diminishes.\n\nHowever, if $$p$$ is extreme (near 0 or 1), a much larger $$n$$ is needed for the distribution to appear symmetric.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "A multiple-choice test has 5 questions, each with 4 options. A student guesses all answers randomly. What is the probability they get exactly 2 correct? (Mental math: use simple numbers) (2 steps)", "answer": "- Step 1: Each question is a Bernoulli trial with success probability $$p = 1/4 = 0.25$$, and there are $$n=5$$ independent trials. So $$X \\sim \\mathrm{B}(5, 0.25)$$.\n- Step 2: $$\\mathrm{P}(X=2) = \\binom{5}{2}(0.25)^2(0.75)^3 = 10 \\times 0.0625 \\times 0.421875 = 10 \\times 0.0263671875 \\approx 0.2637$$.\n\nThe mental calculation: $$10 \\times 0.0625 = 0.625$$, times $$0.421875$$ gives about 0.264.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{B}(5, 0.25)$$, compute $$\\mathrm{P}(X \\le 2)$$ using the cumulative approach (you may use the fact that $$\\mathrm{P}(X=0)=0.2373$$, $$\\mathrm{P}(X=1)=0.3955$$, $$\\mathrm{P}(X=2)=0.2637$$ approximately). (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\le 2) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\mathrm{P}(X=2)$$.\n- Step 2: Adding the given values: $$0.2373 + 0.3955 + 0.2637 = 0.8965$$.\n\nThus, there is about a 90% chance of getting 2 or fewer correct answers by random guessing.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A fair coin is tossed 8 times. What is the probability of getting more heads than tails? Hint: use symmetry. (2 steps)", "answer": "- Step 1: For a fair coin, $$p=0.5$$, so the distribution is symmetric about the mean $$np=4$$. The event \"more heads than tails\" means $$X > 4$$ (since 8 trials, more heads means at least 5 heads).\n- Step 2: By symmetry, $$\\mathrm{P}(X > 4) = \\mathrm{P}(X < 4) = \\mathrm{P}(X \\le 3)$$. Also, $$\\mathrm{P}(X = 4)$$ is the middle probability. Since total probability is 1, we have $$2\\mathrm{P}(X > 4) + \\mathrm{P}(X=4) = 1$$, so $$\\mathrm{P}(X > 4) = \\frac{1 - \\mathrm{P}(X=4)}{2}$$.\nCompute $$\\mathrm{P}(X=4) = \\binom{8}{4}(0.5)^8 = 70/256 \\approx 0.2734$$. Then $$\\mathrm{P}(X > 4) = (1 - 0.2734)/2 = 0.3633$$.\n\nAlternatively, directly sum probabilities for 5,6,7,8.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "In a binomial distribution with $$n=20, p=0.4$$, what is $$\\mathrm{P}(X \\ge 15)$$? Express your answer in terms of a cumulative probability without computing the number. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\ge 15) = 1 - \\mathrm{P}(X \\le 14)$$, because the complement of \"at least 15\" is \"14 or fewer\".\n- Step 2: You would then look up $$\\mathrm{P}(X \\le 14)$$ in the cumulative binomial tables for $$n=20, p=0.4$$, or compute via calculator, and subtract from 1.\n\nNo need to compute the numeric value here; the key is the correct translation.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A spinner lands on red with probability 0.3. Sakiya spins it 12 times. She wants the probability of winning a prize to be less than 0.05. Winning requires getting at least $$r$$ reds. Explain how to find the smallest such $$r$$ using cumulative probabilities. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(12, 0.3)$$. We need the smallest integer $$r$$ such that $$\\mathrm{P}(X \\ge r) < 0.05$$.\n- Step 2: Since $$\\mathrm{P}(X \\ge r) = 1 - \\mathrm{P}(X \\le r-1)$$, the condition becomes $$1 - \\mathrm{P}(X \\le r-1) < 0.05$$, i.e., $$\\mathrm{P}(X \\le r-1) > 0.95$$.\n- Step 3: Look up cumulative probabilities in the table (or compute) for increasing values of $$x$$ until you find the first $$x$$ where $$\\mathrm{P}(X \\le x) > 0.95$$. Then set $$r = x+1$$. For example, if $$\\mathrm{P}(X \\le 6) = 0.9614 > 0.95$$, then $$r = 7$$, and indeed $$\\mathrm{P}(X \\ge 7) = 1 - 0.9614 = 0.0386 < 0.05$$.\n\nThis method efficiently finds the threshold using the cumulative table.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A bag contains a large number of sweets in ratio 1:4 strawberry to apple. Five sweets are drawn without replacement. Explain why we can still model the number of strawberry sweets as binomial despite the lack of replacement. (2 steps)", "answer": "- Step 1: Because the bag contains a **large** number of sweets, removing a few sweets does not significantly change the proportion of strawberry sweets remaining. Thus, the probability of drawing a strawberry sweet remains approximately constant at $$1/(1+4) = 0.2$$ for each draw.\n- Step 2: The draws can be treated as approximately independent because the composition of the bag changes negligibly. Therefore, the conditions for a binomial model are approximately satisfied, and we can use $$X \\sim \\mathrm{B}(5, 0.2)$$.\n\nIf the bag were small, the changing probabilities would violate the constant $$p$$ and independence assumptions, making the binomial model inappropriate.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For a binomial distribution, what happens to the mean and variance if $$p = 0$$ or $$p = 1$$? Explain conceptually. (2 steps)", "answer": "- Step 1: If $$p=0$$, every trial results in failure with certainty. Then $$X$$ is always 0, so mean $$\\mu = n \\times 0 = 0$$ and variance $$\\sigma^2 = n \\times 0 \\times 1 = 0$$. There is no variability.\n- Step 2: If $$p=1$$, every trial results in success with certainty. Then $$X$$ is always $$n$$, so mean $$\\mu = n \\times 1 = n$$ and variance $$\\sigma^2 = n \\times 1 \\times 0 = 0$$. Again, no variability.\n\nThese edge cases show that the binomial distribution degenerates to a deterministic outcome when $$p$$ is 0 or 1.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A company tests samples of 4 components and finds that the probability of at least one faulty component is 0.3439. They produce 600 components per day. Find the mean and variance of the number of faulty components per day. (3 steps)", "answer": "- Step 1: Let $$X$$ be the number of faulty components in a sample of 4. Then $$X \\sim \\mathrm{B}(4, p)$$. We have $$\\mathrm{P}(X \\ge 1) = 0.3439$$, so $$\\mathrm{P}(X=0) = 1 - 0.3439 = 0.6561$$.\n- Step 2: $$\\mathrm{P}(X=0) = (1-p)^4 = 0.6561$$. Taking the fourth root: $$1-p = 0.6561^{1/4} = 0.9$$ (since $$0.9^4 = 0.6561$$). Hence $$p = 0.1$$.\n- Step 3: Now for daily production, let $$Y$$ be the number of faulty components out of 600. Then $$Y \\sim \\mathrm{B}(600, 0.1)$$. Mean $$= np = 600 \\times 0.1 = 60$$. Variance $$= np(1-p) = 600 \\times 0.1 \\times 0.9 = 54$$.\n\nThus, on average 60 faulty components per day with variance 54.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "For a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$, what is $$\\mathrm{P}(X = 0)$$? How does this probability behave as $$n$$ increases if $$p$$ is fixed and $$0<p<1$$? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X=0) = (1-p)^n$$, since all trials must be failures.\n- Step 2: As $$n$$ increases, $$(1-p)^n$$ decays exponentially to 0 because $$1-p < 1$$. So the probability of zero successes becomes vanishingly small for large $$n$$.\n\nThis makes intuitive sense: with many trials, it becomes extremely unlikely to have no successes at all (unless $$p$$ is extremely small).", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "A student rolls a biased dice (probability of six = 0.3) 15 times. Find the probability that the number of sixes is within one standard deviation of the mean. Outline the steps conceptually without heavy calculation. (3 steps)", "answer": "- Step 1: Compute the mean $$\\mu = np = 15 \\times 0.3 = 4.5$$. Compute the variance $$\\sigma^2 = np(1-p) = 15 \\times 0.3 \\times 0.7 = 3.15$$, so standard deviation $$\\sigma = \\sqrt{3.15} \\approx 1.77$$.\n- Step 2: The interval \"within one standard deviation of the mean\" is $$\\mu - \\sigma \\approx 2.73$$ to $$\\mu + \\sigma \\approx 6.27$$. Since $$X$$ is integer, we need $$\\mathrm{P}(3 \\le X \\le 6)$$ (because 2.73 rounds up to 3, and 6.27 rounds down to 6).\n- Step 3: Compute $$\\mathrm{P}(3 \\le X \\le 6) = \\mathrm{P}(X \\le 6) - \\mathrm{P}(X \\le 2)$$. Use cumulative binomial probabilities (tables or calculator) to find the difference.\n\nThe conceptual point: for discrete distributions, the interval must be interpreted in terms of integer values.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why is the binomial distribution called \"binomial\"? Connect it to the binomial theorem. (2 steps)", "answer": "- Step 1: The probabilities $$\\mathrm{P}(X=x) = \\binom{n}{x}p^x(1-p)^{n-x}$$ for $$x=0,1,\\dots,n$$ are exactly the terms in the expansion of $$(p + (1-p))^n$$ via the binomial theorem.\n- Step 2: Since $$(p + (1-p
