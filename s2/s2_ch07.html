hat we couldn't find evidence against it.\n- Step 3: This is a fundamental principle: absence of evidence is not evidence of absence. There might be a real effect we're too insensitive to detect, or we might need more data.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "For a binomial hypothesis test B(n, p), what does the test statistic represent, and why must we clearly define it in every hypothesis test? (2 steps)", "answer": "- Step 1: The test statistic is the **observed value from our sample or experiment**—the number of \"successes\" we actually observed out of n trials. For example, if we flip a coin 20 times and get 14 heads, the test statistic is X = 14.\n- Step 2: We must define it because the entire test hinges on calculating the probability of getting a value at least as extreme as our observation, **assuming H₀ is true**. Without specifying the test statistic, we cannot determine what we're measuring.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "In hypothesis testing, what is the fundamental difference between a one-tailed test and a two-tailed test in terms of the alternative hypothesis? (2 steps)", "answer": "- Step 1: A **one-tailed test** has a directional alternative hypothesis: either H₁: p > value (testing for an increase) or H₁: p < value (testing for a decrease). We're only interested in one direction of deviation from H₀.\n- Step 2: A **two-tailed test** has H₁: p ≠ value—we're testing whether the parameter has changed in *either* direction, without specifying whether it's higher or lower. The claim is simply \"it's different.\"", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A researcher claims a new drug improves recovery rates. She conducts a clinical trial. Write appropriate null and alternative hypotheses in terms of the probability parameter p. (2 steps)", "answer": "- Step 1: The null hypothesis represents \"no effect\" or the status quo. If the standard recovery probability is 0.6, then H₀: p = 0.6—this is what we assume until proven otherwise.\n- Step 2: The researcher claims improvement, so she's testing for an *increase*. Thus H₁: p > 0.6. This is a one-tailed test because she has a specific directional belief.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A quality manager suspects a machine is producing more defective items than the acceptable standard of 10%. If she samples 50 items and wants to test at 5% significance, what are H₀ and H₁? Explain why this is one-tailed. (3 steps)", "answer": "- Step 1: H₀: p = 0.1 (the machine is performing at the acceptable standard—no change)\n- Step 2: H₁: p > 0.1 (the machine is producing MORE defects than acceptable)\n- Step 3: This is one-tailed because the manager specifically suspects an *increase* in the defect rate. She's not interested in whether it's lower (which would be good news). The direction of concern matters.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A market researcher wants to test whether customer preference for a product has changed from the historical 40%. She surveys 50 customers. Why is this a two-tailed test, and what would H₁ look like? (2 steps)", "answer": "- Step 1: This is two-tailed because the researcher is testing for *any change*—preference could have increased OR decreased. She has no specific directional prediction.\n- Step 2: H₀: p = 0.4 (no change from historical proportion), H₁: p ≠ 0.4 (preference has changed in some direction). The ≠ symbol captures both possibilities.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the significance level in hypothesis testing, and what does it represent conceptually? (2 steps)", "answer": "- Step 1: The significance level (commonly α = 0.05, 0.01, or 0.10) is the **threshold probability** below which we deem an observed result too unlikely to have occurred by chance if H₀ were true.\n- Step 2: It represents the maximum risk we're willing to take of **incorrectly rejecting H₀** (a Type I error). If α = 0.05, we're saying: \"If there's only a 5% or less chance of seeing this result when H₀ is true, I'll reject H₀.\"", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What does it mean practically when we reject the null hypothesis at the 5% significance level? (3 steps)", "answer": "- Step 1: It means our observed data would be **extremely surprising** if the null hypothesis were actually true—surprising enough that we'd only see such extreme data 5% of the time (or less) by pure chance.\n- Step 2: We're not saying H₀ is definitely false—just that we have statistically significant evidence against it. There's still a 5% chance we're making a Type I error.\n- Step 3: In context, we would conclude there's evidence supporting H₁ (e.g., the treatment works, the coin is biased, etc.).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Define what is meant by a \"critical region\" in hypothesis testing, and explain its relationship to the significance level. (2 steps)", "answer": "- Step 1: The critical region (or rejection region) is the set of test statistic values that would lead us to **reject the null hypothesis**. If our observed value falls in this region, the result is \"statistically significant.\"\n- Step 2: The significance level determines the critical region: it's the *total probability* of the test statistic falling in the critical region, assuming H₀ is true. For α = 0.05, we choose values where P(X falls in critical region | H₀) ≤ 0.05.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is a critical value, and how does it differ from the critical region? (2 steps)", "answer": "- Step 1: The **critical value** is the **boundary** (a specific number)—the first value that falls inside the critical region. It's the \"cutoff point\" for decision-making.\n- Step 2: The **critical region** is the entire set of values that lead to rejection. For example, if X ≥ 8 is the critical region, then 8 is the critical value. Think: critical value = boundary point, critical region = the extreme area beyond that boundary.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For a test with H₀: p = 0.3, H₁: p > 0.3, n = 10, using α = 0.05, the critical region is X ≥ 5. What does this mean in plain English? (3 steps)", "answer": "- Step 1: If we observe 5 or more \"successes\" out of 10 trials, we will reject H₀ and conclude p > 0.3.\n- Step 2: The probability of getting X ≥ 5 when p = 0.3 is approximately 0.047 (less than 0.05), so this is our cutoff.\n- Step 3: If we observe exactly 4 successes, we \"fail to reject\" H₀—not because we proved p = 0.3, but because 4 successes isn't unusual enough to warrant rejecting our assumption.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is the \"acceptance region\" in hypothesis testing, and what does being in this region imply? (2 steps)", "answer": "- Step 1: The acceptance region is the complement of the critical region—it's where test statistic values lead us to **not reject H₀**. If our observed value falls here, we maintain (don't reject) the null hypothesis.\n- Step 2: Being in the acceptance region doesn't prove H₀ is true; it simply means our data is **consistent with what we'd expect** if H₀ were true. The result could easily occur by random chance.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What is meant by the \"actual significance level\" of a test, and why might it differ from the nominal significance level? (3 steps)", "answer": "- Step 1: The **actual significance level** is the true probability of rejecting H₀ when H₀ is actually true—the actual Type I error rate of our specific test.\n- Step 2: It differs from the **n nominal 5% because discrete distributions force us to \"jump\" between achievable probabilities.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "When conducting a one-tailed hypothesis test using the p-value method (Method 1 in the textbook), what are the four steps to follow? (4 steps)", "answer": "- Step 1: **Formulate hypotheses** – state H₀ and H₁ clearly in terms of the parameter (p or λ).\n- Step 2: **State the model and find the observed value** – define X ~ B(n, p) under H₀, and state what we actually observed.\n- Step 3: **Calculate the p-value** – find the probability of getting a value at least as extreme as our observation, assuming H₀ is true. For H₁: p > value, this is P(X ≥ observed). For H₁: p < value, this is P(X ≤ observed).\n- Step 4: **Compare and conclude** – if p-value < α, reject H₀; otherwise fail to reject. Write a conclusion in context.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "When using the critical region method (Method 2 in the textbook) for a one-tailed binomial test, what are the steps? (3 steps)", "answer": "- Step 1: **Find the critical region** – work backward from the significance level to find which values of X would lead to rejection. Find the smallest k where P(X ≥ k) < α (for H₁: p > value).\n- Step 2: **Compare observed value to critical region** – if the observed test statistic falls in the critical region (e.g., observed ≥ critical value), reject H₀.\n- Step 3: **Conclude in context** – state what this means practically (e.g., \"there is evidence that p has increased\").", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A doctor tests a new treatment claiming it improves the 40% success rate. She treats 20 patients and gets 11 successes. Using Method 1 at α = 0.05, what is the p-value and what should she conclude? (3 steps)", "answer": "- Step 1: H₀: p = 0.4, H₁: p > 0.4. Under H₀, X ~ B(20, 0.4). We observed X = 1 r* direction from the hypothesized value. Extreme values in *both* tails would be surprising if H₀ were true.\n- Step 2: We split α evenly because we want the total probability of Type I error to be α. Each tail gets α/2. So for α = 0.05, each tail gets 0.025.\n- Step 3: We find **two critical regions**: one in the lower tail (very small values) and one in the upper tail (very large values). Both together should have total probability ≈ α.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "For a two-tailed test with H₀: p = 0.5, H₁: p ≠ 0.5, n = 10, α = 0.05, the critical regions are X ≤ 1 and X ≥ 9. What is the actual significance level? (3 steps)", "answer": "- Step 1: We need to find P(X ≤ 1 or X ≥ 9) when p = 0.5. This is P(X ≤ 1) + P(X ≥ 9).\n- Step 2: From binomial tables with n = 10, p = 0.5: P(X ≤ 1) = 0.0107, P(X ≥ 9) = P(X = 9) + P(X = 10) = 0.0098 + 0.0010 = 0.0108.\n- Step 3: Actual significance = 0.0107 + 0.0108 = 0.0215 or about 2.15%. This is less than the nominal 5% because discrete distributions don't allow exact targeting.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In a two-tailed test, if the observed value falls between the two critical regions, what should we conclude, and why? (2 steps)", "answer": "- Step 1: We **fail to reject H₀**. The observed value is in the acceptance region—it's not unusually high or unusually low given H₀ is true.\n- Step 2: For example, with critical regions X ≤ 2 and X ≥ 9, if we observe X = 5, this is completely plausible under H₀. We have no evidence of any change in either direction.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "When carrying out a two-tailed test, how do you determine which tail to calculate the p-value from? (2 steps)", "answer": "- Step 1: Compare your observed value to the **expected value under H₀** (which is np). If your observed value is *less than* np, calculate the **lower tail** ": "- Step 1: The two conditions are: (1) **n is large** (typically n ≥ 50, though n ≥ 30 is often used), and (2) **p is not too close to 0 or 1** (typically np > 5 and n(1-p) > 5, or p is reasonably close to 0.5).\n- Step 2: When these conditions hold, X ~ B(n, p) can be approximated by X ~ N(np, np(1-p)), and we can use normal probability calculations instead of enumerating all binomial probabilities.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "When using the normal approximation for a binomial hypothesis test, why do we need a continuity correction? (2 steps)", "answer": "- Step 1: The binomial distribution is **discrete** (only integer values), while the normal distribution is **continuous** (any value). Without correction, we'd systematically underestimate or overestimate probabilities.\n- Step 2: The continuity correction adjusts for this: for P(X ≥ k), we use P(X > k - 0.5) in the normal approximation. For P(X ≤ k), we use P(X < k + 0.5). This \"spreads\" the discrete probability across a small interval to better approximate the continuous curve.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A manager claims 45% of customers make a purchase. In a sample of 100 customers, 35 made purchases. Test at α = 0.05 using normal approximation. What are the hypotheses and what do you conclude? (4 steps)", "answer": "- Step 1: H₀: p = 0.45, H₁: p ≠ 0.45 (two-tailed test). Under H₀, X ~ B(100, 0.45) ≈ N(45, 24.75).\n- Step 2: Observed value is X = 35. Since 35 < 45 (expected), calculate lower tail probability: P(X ≤ 35) with continuity correction = P(X < 35.5).\n- Step 3: Standardize: Z = (35.5 - 45) / √24.75 = -9.5 / 4.974 = -1.91. From normal tables, P(Z < -1.91) ≈ 0.0281.\n- Step 4: Since this is two-tailed, p-value = 2 × 0.0281 = 0.0562. This is > 0.05, so we **fail to reject H₀**. There's insufficient evidence that the manager's claim is wrong.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What conditions must be satisfied to use the Poisson approximation to the binomial distribution? (2 steps)", "answer": "- Step 1: The conditions are: (1) **n is large**, and (2) **p is small** (typically p ≤ 0.1, and more specifically np < 5 or p < 0.1).\n- Step 2: When these hold, B(n, p) ≈ Po(np). This is useful because Poisson calculations are often simpler than binomial when p is very small and n is large.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "For testing the mean λ of a Poisson distribution, explain how the hypothesis is structured in terms of the rate parameter. (3 steps)", "answer": "- Step 1: In Poisson hypothesis testing, we're testing the **rate parameter** λ. For example, if calls arrive at an average rate of 6 per hour, we might test H₀: λ = 6 against H₁: λ > 6.\n- Step 2: If we observe over a different time period, we must **scale λ proportionally**. If the null rate is 0.325 per minute and we observe a 20-minute interval, then under H₀: λ = 20 × 0.325 = 6.5 for that interval.\n- Step 3: The test statistic X is the count observed in the given time interval, and we use X ~ Po(λ) under H₀ to find probabilities or critical regions.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "An office receives calls at a rate of 0.325 per minute. In a 20-minute period, they observe 12 calls. Test at α = 0.05 whether the rate has increased using a one-tailed test. What are the hypotheses and what do you conclude? (4 steps)", "answer": "- Step 1: Scale the rate: under H₀, the expected number in 20 minutes is λ = 20 × 0.325 = 6.5. So H₀: λ = 6.5, H₁: λ > 6.5.\n- Step 2: We observed X = 12. Calculate p-value = P(X ≥ 12) when X ~ Po(6.5).\n- Step 3: From Poisson tables or calculator: P(X ≥ 12) = 1 - P(X ≤ 11). P(X ≤ 11) from tables (λ = 6.5): ≈ 0.9957 (interpolating), so P(X ≥ 12) ≈ 0.0043.\n- Step 4: Since 0.0043 < 0.05, we **reject H₀**. There's significant evidence that the call rate has increased.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "When testing a Poisson mean with a two-tailed test, how do we find the critical regions, and what should we consider about the expected value? (3 steps)", "answer": "- Step 1: For two-tailed Poisson test at significance α, each tail gets α/2. We find lower critical values where P(X ≤ c_lower) ≤ α/2, and upper critical values where P(X ≥ c_upper) ≤ α/2.\n- Step 2: Always consider the **expected value** (the mean under H₀) to determine which tail your observation falls in. If observed < expected, focus on the lower tail; if observed > expected, focus on the upper tail.\n- Step 3: The critical regions may not be symmetric! For a Poisson with small mean, you might get critical region X = 0, 1 in the lower tail and X ≥ some high number in the upper tail, depending on the distribution shape.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "A taxi company averages 3 calls per hour. In a particular hour they receive 8 calls. Test at α = 0.10 whether this indicates a change in the rate using a two-tailed test. (4 steps)", "answer": "- Step 1: H₀: λ = 3, H₁: λ ≠ 3 (two-tailed at α = 0.10, so each tail gets 0.05). Observed X = 8.\n- Step 2: Since 8 > 3 (expected), focus on upper tail. Need to find c where P(X ≥ c) ≤ 0.05. From Poisson tables: P(X ≥ 7) = 1 - P(X ≤ 6) = 1 - 0.9885 ≈ 0.0115 > 0.05. P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.9965 ≈ 0.0035 < 0.05.\n- Step 3: Upper critical region is X ≥ 8. For the lower tail: P(X ≤ 0) = e^(-3) ≈ 0.0498 < 0.05, so lower critical region is X ≤ 0.\n- Step 4: Observed X = 8 is in the upper critical region (8 ≥ 8), so we **reject H₀** at the 10% level. There's evidence the call rate has changed.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What is the key difference between testing a binomial proportion and testing a Poisson mean, in terms of what parameter we're testing? (2 steps)", "answer": "- Step 1: For binomial, we're testing the **probability p** of success in each trial. The question is: \"Has the probability of success changed?\" Example: Has the coin's bias changed?\n- Step 2: For Poisson, we're testing the **rate λ** (mean number of events per interval). The question is: \"Has the average rate of events changed?\" Example: Has the number of phone calls per hour changed? Both use count data but frame the question differently.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "Why might we use an approximation (normal or Poisson) instead of exact binomial/Poisson calculations in hypothesis testing? What are the trade-offs? (3 steps)", "answer": "- Step 1: When n is large (like 100, 500, or 1000), calculating exact binomial probabilities becomes computationally intensive and impractical without technology. Approximations simplify this.\n- Step 2: **Trade-off**: Approximations introduce some error. The normal approximation error is small when conditions are met, but if conditions aren't satisfied, results can be inaccurate. The Poisson approximation is accurate when p is very small and n is large.\n- Step 3: In exams, approximations save time. For n = 100, using binomial would require summing 101 terms; normal approximation gives the answer in one standardized calculation.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "In hypothesis testing, what is the relationship between the p-value and the significance level? How do we use this relationship to make a decision? (2 steps)", "answer": "- Step 1: The **p-value** is the probability of observing data at least as extreme as what we got, **assuming H₀ is true**. The **significance level (α)** is our predetermined threshold.\n- Step 2: Decision rule: If **p-value < α**, we reject H₀ (statistically significant result). If **p-value ≥ α**, we fail to reject H₀ (not statistically significant). Think: \"p is low, reject the null.\"", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A researcher conducts 20 tests at α = 0.05 and finds statistically significant results in 2 of them. Why should she be cautious about claiming she has discovered 2 real effects? (2 steps)", "answer": "- Step 1: With α = 0.05, even when H₀ is TRUE in all 20 tests, we'd expect 1 false positive on average (5% of 20 = 1). Getting 2 significant results could easily be due to chance alone.\n- Step 2: This illustrates why we need **replication** and **careful interpretation**. Statistical significance doesn't guarantee practical significance or that the effect is real—it just means the result is unlikely under the null hypothesis by chance.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": true}, {"question": "What is the difference between a Type I error and a Type II error in hypothesis testing? Which one is controlled by the significance level? (3 steps)", "answer": "- Step 1: **Type I error** (false positive): Rejecting H₀ when it's actually true. This is a \"crying wolf\" error—we claim an effect that doesn't exist.\n- Step 2: **Type II error** (false negative): Failing to reject H₀ when it's actually false. This is missing a real effect—we let a true discovery go undetected.\n- Step 3: The **significance level α controls Type I error** risk. Choosing α = 0.05 means we're willing to accept a 5% chance of wrongly rejecting a true H₀. Type II error risk (β) is controlled by sample size—larger samples have more power to detect real effects.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "How does increasing the sample size affect both Type I and Type II errors in hypothesis testing? (2 steps)", "answer": "- Step 1: **Type I error risk (α)** is set by the researcher and doesn't directly change with sample size (though larger samples make it easier to hit exact significance targets).\n- Step 2: **Type II error risk (β) decreases** with larger samples—more data gives more **statistical power** to detect a real effect if one exists. Larger samples reduce β, making it less likely we'll miss a real discovery. This is why \"more data is better\" is generally true in hypothesis testing.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A company tests whether a new process reduces the defect rate from 10%. They sample 100 items and find 6 defects. Conduct the test at α = 0.05. (4 steps)", "answer": "- Step 1: H₀: p = 0.1, H₁: p < 0.1 (testing for reduction). This is one-tailed. Under H₀, X ~ B(100, 0.1).\n- Step 2: Observed X = 6. Calculate p-value = P(X ≤ 6) when p = 0.1.\n- Step 3: Using Poisson approximation (since n is large, p is small): λ = np = 10. P(X ≤ 6) = P(Po(10) ≤ 6). From Poisson tables: P(X ≤ 6) ≈ 0.1301 (for λ = 10, need to interpolate between λ = 9 and λ = 10... actually let's use normal approximation: mean = 10, variance = 9, SD = 3).\n- Step 4: Using normal: Z = (6.5 - 10)/3 = -3.5/3 = -1.17. P(Z < -1.17) ≈ 0.121. Since 0.121 > 0.05, we **fail to reject H₀**. Not enough evidence that the defect rate has reduced.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "When is it appropriate to use the Poisson distribution to approximate the binomial in hypothesis testing, and why does this work? (2 steps)", "answer": "- Step 1: When n is large (typically ≥ 50) and p is small (typically ≤ 0.1), such that np < 5 (or sometimes np < 10). The classic example is testing for rare events: defective items, accidents, etc.\n- Step 2: It works because when p is very small, the binomial distribution approaches the Poisson distribution mathematically. Both model \"rare events\" occurring independently, and the Poisson with λ = np becomes nearly indistinguishable from B(n, p) under these conditions.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A hospital knows that 20% of patients experience complications from a certain procedure. In a new sample of 20 patients, 8 experience complications. Test whether the complication rate has changed at α = 0.05 using a two-tailed test. (4 steps)", "answer": "- Step 1: H₀: p = 0.2, H₁: p ≠ 0.2. Under H₀, X ~ B(20, 0.2). Expected value = 20 × 0.2 = 4.\n- Step 2: Observed X = 8, which is greater than expected 4, so we focus on the upper tail. Calculate P(X ≥ 8).\n- Step 3: From binomial tables: P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.9680 = 0.032. Since this is two-tailed, we need to consider both directions, but we found the tail where our observation lies.\n- Step 4: For two-tailed test, we need to check if the tail probability is < α/2 = 0.025. P(X ≥ 8) = 0.032 > 0.025, so the result is NOT significant at the 5% level. We **fail to reject H₀**. The complication rate hasn't significantly changed.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Explain why the statement \"the probability that H₀ is true is less than 5%\" is incorrect, and what the p-value actually represents. (2 steps)", "answer": "- Step 1: The p-value is NOT the probability that H₀ is true! It cannot tell us the probability of any hypothesis being true. It only tells us how unusual our data would be *if H₀ were true*.\n- Step 2: The p-value = P(observed data or more extreme | H₀ is true). A p-value of 0.03 means: \"If nothing is going on (H₀ true), we'd only see data this extreme 3% of the time by chance.\" It says nothing directly about whether H₀ is actually true or false.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "What is \"statistical power\" in hypothesis testing, and what factors affect it? (2 steps)", "answer": "- Step 1: **Statistical power** is the probability of correctly rejecting H₀ when H₁ is true (i.e., detecting a real effect). Power = 1 - β, where β is the Type II error rate.\n- Step 2: Power increases with: (1) **larger sample size** (more data gives more information), (2) **larger effect size** (bigger differences are easier to detect), (3) **higher significance level** (α = 0.10 gives more power than α = 0.01), and (4) **one-tailed tests** have more power than two-tailed tests for the same effect direction.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In hypothesis testing, when might you choose to use a one-tailed test instead of a two-tailed test, and what are the ethical implications? (2 steps)", "answer": "- Step 1: Use one-tailed when you have a strong **directional theory** or when changes in the opposite direction would be meaningless or impossible. For example, testing if a safety feature reduces injuries—you'd only care if it increases safety, not decreases it.\n- Step 2: **Ethical consideration**: One-tailed tests are more likely to find significant results in the predicted direction, which could be used to manipulate outcomes. Some argue one-tailed tests should only be used when a result in the opposite direction would have no practical relevance or would be theoretically impossible.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A manufacturer claims their lightbulbs last 1000 hours on average. You suspect they last less. You test 50 bulbs and find average lifespan of 980 hours with standard deviation 80 hours. Why can't you use this data directly in the hypothesis testing methods from this chapter? (2 steps)", "answer": "- Step 1: This chapter covers hypothesis tests for **discrete distributions** (binomial counts, Poisson counts). The data here is **continuous** (lifespan in hours) with a sample mean.\n- Step 2: Testing a population mean with continuous data requires different methods—typically a **t-test** or **z-test** for the population mean, which are covered in different topics. The binomial/Poisson tests in Chapter 7 are specifically for count data.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "Why is it important to state the practical conclusion of a hypothesis test in plain English rather than just saying \"reject H₀\" or \"fail to reject H₀\"? (2 steps)", "answer": "- Step 1: The technical decision is meaningless to non-statisticians. Saying \"we reject the null hypothesis at the 5% level\" doesn't tell a manager, doctor, or policymaker what to *do*.\n- Step 2: A practical conclusion like \"there's evidence the new treatment reduces recovery time\" or \"the machine appears to be producing more defects than acceptable\" leads to actionable decisions. Statistics serves practical ends—the conclusion should communicate the meaning clearly.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A test has H₀: p = 0.5, H₁: p > 0.5 with α = 0.05. The critical region is X ≥ 9. If you observe X = 8, what do you conclude? Explain the logic. (2 steps)", "answer": "- Step 1: With X = 8, we **fail to reject H₀**. The result is not statistically significant at the 5% level.\n- Step 2: However, 8 is *close* to the critical value of 9. This illustrates that the \"significance\" cutoff is somewhat arbitrary—there's little practical difference between X = 8 and X = 9. We might want to collect more data or consider the practical importance of the effect, not just the statistical decision.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "In the context of hypothesis testing, what does it mean for a result to be \"statistically significant\" versus \"practically significant\"? (2 steps)", "answer": "- Step 1: **Statistical significance** means the result is unlikely to have occurred by chance (given α). It tells us about the data, not about the real-world importance.\n- Step 2: **Practical significance** asks: \"Even if the effect is real, does it matter in practice?\" With large samples, tiny effects can be statistically significant but practically meaningless. For example, a new drug might statistically improve recovery rates by 0.1%—significant but clinically irrelevant. Both types of significance matter in interpretation.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}, {"question": "For a binomial test, when checking conditions for the normal approximation, you find np = 4.5 and n(1-p) = 5.5. Is this sufficient for a good approximation? Explain. (2 steps)", "answer": "- Step 1: The rule of thumb is typically np > 5 AND n(1-p) > 5 for a reasonable normal approximation. Here np = 4.5 is just under 5, and n(1-p) = 5.5 is just over.\n- Step 2: This is a **borderline case**—the approximation might be reasonable but not ideal. The approximation will likely be acceptable but could have noticeable error. If precision matters, either use exact binomial calculations or increase sample size. This is why some texts use > 5 strictly; others accept ≥ 5 as \"marginal.\"", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": true}, {"question": "A scientist tests whether a chemical spill increases the average number of bacteria in water samples. She collects 100 samples and finds on average 8.2 bacteria per liter, compared to the normal 5 per liter. How would you set up this hypothesis test? (3 steps)", "answer": "- Step 1: This is testing a **Poisson rate**. H₀: λ = 5 (normal rate), H₁: λ > 5 (increased due to spill). This is one-tailed.\n- Step 2: The test statistic is the count in each sample. If she analyzed 100 samples of 1 liter each, or one large sample representing 100 liters, we'd need to know how the data was collected to properly set up X ~ Po(λ).\n- Step 3: The key is scaling: if normal rate is 5 per liter and she observed 820 bacteria in 100 liters, then observed rate = 8.2 per liter. We'd test whether this increase is statistically significant using Poisson methods.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "When finding critical values for a Poisson hypothesis test with a non-standard λ (like λ = 3.25), why might you need to use a calculator rather than tables? (2 steps)", "answer": "- Step 1: Standard Poisson tables only provide values for specific λ values (typically integer or common values like 0.5, 1.0, 1.5, ..., 10.0).\n- Step 2: For non-standard λ like 3.25, tables won't have exact values, so you'd need to use a calculator's cumulative Poisson function or compute probabilities directly using the formula P(X = k) = e^(-λ)λ^k/k!. This is more accurate but requires technology.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "Why do we use the **smallest** critical value that makes P(X in critical region | H₀) < α, rather than the largest value? (2 steps)", "answer": "- Step 1: We want the test to be as **powerful** as possible while maintaining the significance level. Using the smallest value gives us the largest possible critical region that still has probability < α.\n- Step 2: If we used a larger value, we'd have a smaller critical region and less power to detect a real effect. Using the smallest ensures we're not being unnecessarily strict—we reject H₀ for any value that's definitely surprising enough, maximizing our ability to detect real effects.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "In hypothesis testing, what is the difference between the \"level of significance\" and the \"significance level\" of a test? (2 steps)", "answer": "- Step 1: In practice, these terms are used interchangeably to mean α, the threshold we set for rejecting H₀ (typically 0.05 or 5%).\n- Step 2: However, technically \"significance level\" can refer to the **nominal** (stated) level, while \"level of significance\" might refer to the **actual** (achieved) level. The actual significance level is the true probability of rejecting H₀ when it's true, which may differ from our target α due to discrete distribution constraints.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "A researcher obtains a p-value of 0.03 and rejects H₀ at α = 0.05. Later, she runs the same experiment again and gets a p-value of 0.07, failing to reject H₀. Explain why both outcomes could be correct. (2 steps)", "answer": "- Step 1: Both outcomes are consistent with randomness. With α = 0.05, we'd expect about 5% of true null hypotheses to be rejected by chance (Type I error). With p = 0.03 and p = 0.07, both are reasonably close to the boundary.\n- Step 2: This illustrates that p-values are **random variables**—they vary from sample to sample. One sample might give p = 0.03 (significant), another p = 0.07 (not significant). Neither is \"wrong\"—they reflect natural sampling variability. This is why replication and considering effect size matters.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": true}, {"question": "Why might a researcher choose α = 0.01 instead of α = 0.05 for a hypothesis test? What are the trade-offs? (2 steps)", "answer": "- Step 1: Choosing a **lower α** (like 0.01) makes us more stringent—we're less likely to make a Type I error (false positive). This is appropriate when the consequences of falsely claiming an effect are severe (e.g., medical trials, safety claims).\n- Step 2: The **trade-off** is increased Type II error risk (β)—we're less likely to detect a real effect. It's harder to achieve statistical significance, so we might miss genuine discoveries. The choice depends on the relative costs of Type I vs Type II errors in context.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "In hypothesis testing, what does it mean for a test to be \"conservative\" versus \"liberal\"? (2 steps)", "answer": "- Step 1: A **conservative** test has an actual significance level *lower* than the nominal level. It's harder to reject H₀ than advertised. This reduces Type I error but increases Type II error.\n- Step 2: A **liberal** test has an actual significance level *higher* than nominal—it's easier to reject than we claim. This increases Type I error but has more power. In binomial/Poisson tests, we're often conservative because discrete distributions can't hit exact α targets.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "When setting up a binomial hypothesis test, why must we clearly state both the distribution assumed under H₀ AND the observed test statistic value? (2 steps)", "answer": "- Step 1: Under H₀, we assume a specific distribution. For example, if testing p = 0.4 with n = 20, we assume X ~ B(20, 0.4). This tells us what probabilities to calculate.\n- Step 2: The observed test statistic is what we actually saw in the data. Without knowing both, we cannot calculate the p-value or determine if the observation is unusual. The entire test hinges on comparing what we observed to what we'd expect under the assumed distribution.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A quality control test finds that 15 out of 200 items are defective. The acceptable defect rate is 5%. Test whether the process has worsened at α = 0.05. Use an approximation method. (4 steps)", "answer": "- Step 1: H₀: p = 0.05, H₁: p > 0.05 (one-tailed test for increase). Under H₀, X ~ B(200, 0.05).\n- Step 2: Check approximation conditions: np = 200 × 0.05 = 10 (> 5 ✓), n(1-p) = 200 × 0.95 = 190 (> 5 ✓). Normal approximation is appropriate: X ≈ N(10, 9.5).\n- Step 3: Observed X = 15. With continuity correction: P(X ≥ 15) ≈ P(Z > 14.5). Z = (14.5 - 10) / √9.5 = 4.5 / 3.082 = 1.46.\n- Step 4: P(Z > 1.46) ≈ 0.072. Since 0.072 > 0.05, we **fail to reject H₀**. There's insufficient evidence that the defect rate has increased above 5%.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In hypothesis testing, why is the null hypothesis (H₀) called the \"status quo\" or assumption we start with, and what does the alternative hypothesis (H₁) represent? (2 steps)", "answer": "- Step 1: The null hypothesis H₀ represents what we assume to be true before collecting evidence — it's the default position or status quo. For instance, if testing whether a new drug works, H₀ might be that the success rate equals the standard treatment (p = 0.4).\n- Step 2: The alternative hypothesis H₁ represents what we conclude if the sample evidence contradicts H₀ — it captures the \"interesting\" outcome we're investigating (e.g., the new drug is better: p > 0.4).", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain why a one-tailed test (like H₁: p > 0.5) has more power to detect an increase than a two-tailed test (H₁: p ≠ 0.5), and when would you choose each type? (3 steps)", "answer": "- Step 1: In a one-tailed test, the entire significance level (e.g., 5%) is concentrated in one tail of the distribution. This means the critical region is larger, making it easier for the test statistic to fall into it.\n- Step 2: In a two-tailed test, the significance level is split between both tails (2.5% each), so the critical regions are smaller, requiring stronger evidence to reject H₀.\n+ Choose one-tailed when you have a specific directional belief (e.g., \"the new method improves results\").\n+ Choose two-tailed when you only suspect a change but don't know the direction (e.g., \"the proportion may be different\").", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A researcher tests H₀: p = 0.3 against H₁: p > 0.3 at 5% significance and obtains a test statistic of 12 successes out of 20 trials. Explain why she calculates P(X ≥ 12) rather than P(X = 12) when evaluating the evidence. (2 steps)", "answer": "- Step 1: We're asking whether the observed result is \"extreme enough\" to reject H₀. Getting exactly 12 successes is unusual, but getting 12 OR MORE is even more compelling evidence against H₀.\n- Step 2: Since H₁ says p > 0.3 (greater than), we want the probability of getting a value at least as extreme as observed in that direction. We sum P(12) + P(13) + ... + P(20) to get the p-value. If this total is less than 0.05, we reject H₀.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the difference between the \"significance level\" (also called the \"level of significance\") and the \"actual significance level\" of a hypothesis test? (2 steps)", "answer": "- Step 1: The significance level (e.g., 5%) is the threshold we choose BEFORE the test — it's the maximum probability of incorrectly rejecting H₀ that we're willing to accept. This is what we compare the p-value against.\n- Step 2: The actual significance level is the true probability of rejecting H₀ when it's actually true (i.e., the probability of the test statistic falling in the critical region). This often differs from our chosen level because discrete distributions don't allow exact 5% — for example, the actual might be 3.2% or 7.1%.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For a binomial test with n = 10 and H₀: p = 0.4, H₁: p > 0.4 at 5% significance, the critical region is X ≥ 8. Why is 8 called the \"critical value\" rather than the boundary between acceptance and rejection? (2 steps)", "answer": "- Step 1: The critical value is defined as the FIRST value that falls inside the critical region — the smallest value that leads to rejecting H₀.\n- Step 2: Here, X = 8 is the smallest value where P(X ≥ 8) < 0.05. X = 7 has P(X ≥ 7) = 0.0548 which exceeds 5%, so it's in the acceptance region. Thus the critical value is 8, and the critical region is {8, 9, 10}.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When testing H₀: p = 0.5 against H₁: p ≠ 0.5 (two-tailed test) at 5% significance, why do we use 2.5% for each tail rather than 5%? (2 steps)", "answer": "- Step 1: A two-tailed test checks for change in EITHER direction — we need to allow for the possibility that p could be either greater than OR less than 0.5.\n- Step 2: If we used 5% in each tail, the total probability of incorrectly rejecting H₀ would be 10%, not 5%. To maintain the overall 5% significance level, we split it equally: 2.5% in the lower tail and 2.5% in the upper tail. Each tail gets significance level/2.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A student obtains a test statistic value that falls just outside the critical region but has a p-value slightly greater than 0.05. Explain why we \"accept H₀\" (or \"fail to reject H₀\") rather than \"proving H₀ is true.\" (2 steps)", "answer": "- Step 1: Hypothesis testing doesn't prove anything — it only measures whether the sample data provides sufficient evidence against H₀. Failing to find evidence against H₀ is NOT the same as proving H₀ is true.\n- Step 2: There could be many reasons we didn't reject: the effect might be too small to detect with our sample size, or we simply got unlucky with this particular sample. We should say \"there is insufficient evidence to reject H₀\" rather than \"H₀ is true.\"", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Why is it inappropriate to use the normal approximation to the binomial when n = 20 and p = 0.05, but appropriate when n = 50 and p = 0.3? (2 steps)", "answer": "- Step 1: The normal approximation requires BOTH np > 5 AND n(1-p) > 5 (some texts use 3 or 10, but 5 is common for reasonable accuracy).\n- Step 2: For n = 20, p = 0.05: np = 1 (fails), n(1-p) = 19 (passes) — approximation is NOT suitable. For n = 50, p = 0.3: np = 15 (passes), n(1-p) = 35 (passes) — approximation IS suitable. The distribution must be roughly symmetric around its mean.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When approximating a Poisson(λ) distribution with a normal distribution for hypothesis testing, why do we apply a continuity correction? (2 steps)", "answer": "- Step 1: The Poisson is discrete (can only take integer values 0, 1, 2, ...) while the normal is continuous (can take any value). This creates a mismatch.\n- Step 2: To approximate P(X ≥ k) for discrete X, we use P(W ≥ k - 0.5) where W is normal. For example, P(X ≥ 8) ≈ P(W ≥ 7.5). This \"shifts\" by 0.5 to account for all integer values from k upward. Without this, we'd systematically underestimate probabilities.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In Example 8 of the textbook, a shop normally sells 10 cars per week (Poisson with λ = 10). After a promotion, they sold 75 cars in 6 weeks. Explain why we set up the test as H₀: λ = 10, H₁: λ > 10, with X ~ Po(60) for the 6-week period. (3 steps)", "answer": "- Step 1: The rate we're testing is per week (10/week). But we have data for 6 weeks, so we multiply: expected = 6 × 10 = 60. This is our parameter under H₀.\n- Step 2: The null hypothesis states no change in the weekly rate: H₀: λ = 10. The alternative tests if the promotion increased sales: H₁: λ > 10.\n+ If the weekly rate increased, the 6-week total would be greater than 60.\n- Step 3: We model X ~ Po(60) for total sales in 6 weeks. Observing 75 is quite high — we check if P(X ≥ 75) < 0.05 to reject H₀.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A manufacturer claims 85% of patients recover from a treatment. A hospital samples 30 patients and finds 20 recovered. When testing H₀: p = 0.85 against H₁: p < 0.85 at 5% significance, why do we calculate P(X ≤ 20) rather than P(X = 20)? (2 steps)", "answer": "- Step 1: The hospital suspects the claim is an overestimate — they believe the actual recovery rate is LOWER than 0.85. This is a left-tailed test (p < 0.85).\n- Step 2: We need the probability of getting 20 or FEWER recoveries if the true rate were actually 0.85. If P(X ≤ 20) is very small (< 0.05), then observing 20 or fewer would be extremely unlikely under H₀, giving us evidence to reject the claim.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In a Poisson hypothesis test for the rate of incoming calls, the textbook uses a two-tailed test with critical regions X ≤ 1 and X ≥ 12 for testing H₀: λ = 6.5 against H₁: λ ≠ 6.5. Why does the lower critical region start at 0 (i.e., {0, 1}) rather than just {0}? (2 steps)", "answer": "- Step 1: We need P(X ≤ c_lower) to be as close as possible to α/2 = 0.025 without exceeding it. Looking at Poisson(6.5) cumulative probabilities: P(X ≤ 0) = 0.0015, P(X ≤ 1) = 0.0113.\n- Step 2: P(X ≤ 0) = 0.0015 is less than 0.025 but if we include X = 1, P(X ≤ 1) = 0.0113 which is closer to 0.025. Similarly for upper tail, P(X ≥ 12) = 0.0339 is closer to 0.025 than P(X ≥ 13) = 0.0160. We choose the values closest to the target in each tail.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "Why might we prefer to use the Poisson approximation to binomial (rather than the exact binomial calculation) when testing H₀: p = 0.001 with n = 1000? (2 steps)", "answer": "- Step 1: With p = 0.001 and n = 1000, the exact binomial B(1000, 0.001) has expected value np = 1. Computing exact binomial probabilities for each value from 0 to 1000 would be extremely tedious and impractical.\n- Step 2: Since n is large and p is small (np = 1 < 5), the Poisson approximation with λ = np = 1 gives excellent accuracy. We can quickly look up P(X ≥ k) using Poisson tables or calculator functions rather than summing thousands of binomial terms.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "A test statistic follows B(20, p) and we're testing H₀: p = 0.15 against H₁: p < 0.15 at 5% significance. The critical region is X = 0 only. What is the actual significance level, and why might a researcher be concerned about it? (2 steps)", "answer": "- Step 1: The actual significance level is P(X = 0) when X ~ B(20, 0.15). Using binomial: P(0) = (0.85)²⁰ ≈ 0.035. This is 3.5%, less than 5%.\n- Step 2: The concern is that our test is \"conservative\" — we might miss real effects because the critical region is very small (only X = 0). With a larger sample size, we could get a critical region like {0, 1, 2} with actual significance closer to 5%. The chosen threshold limits the test's power to detect a real decrease in p.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "In hypothesis testing, what is the difference between a Type I error and a Type II error, and which one is controlled by the significance level? (2 steps)", "answer": "- Step 1: Type I error = rejecting H₀ when it's actually true (false positive). Type II error = failing to reject H₀ when it's actually false (false negative).\n- Step 2: The significance level (α) directly controls Type I error probability — it's the probability of rejecting H₀ when it's true. By choosing α = 0.05, we accept a 5% chance of Type I error. Type II error probability (β) depends on the sample size and the true parameter value; reducing α typically increases β.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A quality control engineer tests whether a machine has increased its defect rate. She samples n = 50 items and finds 7 defects. Set up the appropriate hypothesis test, stating the distribution of the test statistic under H₀, the hypotheses in terms of p, and identify whether this is a one-tailed or two-tailed test. (3 steps)", "answer": "- Step 1: The test statistic is X = number of defective items in the sample. Under H₀, if the defect rate hasn't changed (say historical rate is p₀ = 0.1), then X ~ B(50, 0.1).\n- Step 2: The engineer suspects the rate has INCREASED, so this is a one-tailed test:\n  + H₀: p = 0.1 (no change)\n  + H₁: p > 0.1 (increase)\n+ This is upper-tailed since we're testing for an increase.\n- Step 3: With 7 defects observed, we'd calculate P(X ≥ 7) when X ~ B(50, 0.1). If this probability < 0.05 (or whatever significance level), we reject H₀ and conclude the defect rate has increased.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "When testing H₀: λ = 4 against H₁: λ > 4 for a Poisson distribution at 5% significance, the critical region is X ≥ 7. Explain how we determine this critical value from Poisson tables. (2 steps)", "answer": "- Step 1: We need the smallest value k such that P(X ≥ k) < 0.05, or equivalently, P(X ≤ k-1) > 0.95.\n- Step 2: From Poisson(4) cumulative tables:\n  + P(X ≤ 5) = 0.785, so P(X ≥ 6) = 0.215 > 0.05 (not extreme enough)\n  + P(X ≤ 6) = 0.889, so P(X ≥ 7) = 0.111 > 0.05 (still not)\n  + P(X ≤ 7) = 0.949, so P(X ≥ 8) = 0.051 ≈ 0.05\n  + P(X ≤ 8) = 0.979, so P(X ≥ 9) = 0.021 < 0.05\n  \n  Actually, checking: P(X ≥ 7) = 1 - P(X ≤ 6) = 1 - 0.889 = 0.111; P(X ≥ 8) = 1 - 0.949 = 0.051. Since 0.051 is closest to 0.05, the critical region is X ≥ 8. The textbook answer may differ slightly based on which cumulative is used.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A researcher wants to test whether a coin is fair. She flips it 20 times and gets 14 heads. Should she use a one-tailed or two-tailed test? Set up the hypotheses and explain your reasoning. (3 steps)", "answer": "- Step 1: Since the researcher has NO prior belief about which direction the coin might be biased (could be more heads OR more tails), this requires a TWO-TAILED test.\n- Step 2: The hypotheses are:\n  + H₀: p = 0.5 (coin is fair)\n  + H₁: p ≠ 0.5 (coin is biased in either direction)\n- Step 3: With 20 flips and 14 heads, we'd check if P(X ≤ 14) or P(X ≥ 14) is extreme enough (at 2.5% level for each tail). The observed 14 heads could indicate bias toward heads (p > 0.5) OR we could check the lower tail (but 14 > 10 = expected, so we focus on upper tail). Since 14 > 10, we check P(X ≥ 14) = 1 - P(X ≤ 13). If this < 0.025, we reject H₀.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Why is it incorrect to use the binomial distribution to model the number of red balls when drawing balls FROM AN URN WITHOUT REPLACEMENT, even though each draw has two outcomes? (2 steps)", "answer": "- Step 1: The binomial distribution requires INDEPENDENT trials — the probability of success must stay constant across all trials. Without replacement, drawing one ball changes the composition of the urn, affecting subsequent probabilities.\n- Step 2: For example, drawing 2 red from 10 balls (where 4 are red) without replacement: P(first red) = 4/10 = 0.4, but P(second red | first red) = 3/9 ≈ 0.33. These probabilities differ, violating the binomial assumption. The hypergeometric distribution is the correct model here.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "In the context of hypothesis testing with the binomial distribution, explain why we always state the model as \"X ~ B(n, p)\" where p comes from H₀, not from the observed sample data. (2 steps)", "answer": "- Step 1: Hypothesis testing works by asking: \"IF H₀ were true (with p = value from H₀), how likely would we be to observe data this extreme?\" We're testing against a SPECIFIC hypothetical value.\n- Step 2: Using the observed sample proportion to set p would be circular reasoning — we'd be testing whether data differs from itself! We calculate the probability of our OBSERVED data assuming H₀ is TRUE. For example, if testing H₀: p = 0.4 with 11 successes in 20, we calculate P(X ≥ 11) with X ~ B(20, 0.4), NOT with p estimated from the sample.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "A medical researcher tests a new drug against a placebo. Under the standard treatment, 40% of patients recover. In a trial of 20 patients, 11 recover with the new drug. Set up the complete hypothesis test at the 5% significance level, including the test statistic, model, hypotheses, critical region, and conclusion. (4 steps)", "answer": "- Step 1: Test statistic = X = number of patients who recover. Model under H₀: X ~ B(20, 0.4).\n- Step 2: Hypotheses:\n  + H₀: p = 0.4 (new drug no better than standard)\n  + H₁: p > 0.4 (new drug is an improvement)\n  + This is a one-tailed (upper) test.\n- Step 3: Find critical region. Need smallest k where P(X ≥ k) < 0.05:\n  + P(X ≥ 13) = 1 - P(X ≤ 12) = 1 - 0.979 = 0.021 < 0.05\n  + P(X ≥ 12) = 1 - P(X ≤ 11) = 1 - 0.944 = 0.056 > 0.05\n  + Critical region: X ≥ 13 (critical value = 13)\n- Step 4: Observed X = 11, which is NOT in critical region (11 < 13). Conclusion: At 5% significance, there is INSUFFICIENT evidence to reject H₀. The new drug has not been shown to be better than the standard treatment.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A restaurant owner believes that 20% of customers choose pasta. After changing the recipe, she surveys 25 customers and finds only 1 chose pasta. Test at 5% significance whether the proportion has changed. (4 steps)", "answer": "- Step 1: Test statistic = X = number choosing pasta. Under H₀: X ~ B(25, 0.2).\n- Step 2: Hypotheses:\n  + H₀: p = 0.2 (proportion unchanged)\n  + H₁: p ≠ 0.2 (proportion changed — could be higher OR lower)\n  + This is two-tailed at 2.5% each tail.\n- Step 3: Lower tail: P(X ≤ c₁) ≤ 0.025. P(X ≤ 0) = 0.003, P(X ≤ 1) = 0.027. So c₁ = 0.\n  Upper tail: P(X ≥ c₂) ≤ 0.025. P(X ≥ 9) = 1 - P(X ≤ 8) = 1 - 0.982 = 0.018 < 0.025. So c₂ = 9.\n  Critical regions: X ≤ 0 or X ≥ 9.\n- Step 4: Observed X = 1. This is NOT in critical region (1 > 0 AND 1 < 9). At 5% significance, there is INSUFFICIENT evidence to conclude the proportion changed.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain the concept of \"power\" of a hypothesis test. If a test has only 20% power to detect a particular effect size, what does this mean in practical terms? (2 steps)", "answer": "- Step 1: Power = 1 - β = probability of correctly rejecting H₀ when H₁ is TRUE. It's the probability of detecting a real effect if one exists.\n- Step 2: With only 20% power, if the true parameter differs from H₀ as specified, we'd only detect this difference 20% of the time (and fail to detect it 80% of the time). This means the test is very likely to miss real effects — we need a larger sample size or less stringent significance level to increase power.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A factory produces components with a historical defect rate of 10%. A manager suspects the rate has changed and inspects a random sample. Why might she choose a two-tailed test rather than assuming the direction of change? (2 steps)", "answer": "- Step 1: Unless there's strong prior evidence about the direction (e.g., they recently changed suppliers and expect either improvement OR worsening), we should use two-tailed tests.\n- Step 2: Using a one-tailed test when the direction is wrong dramatically reduces power. If the rate actually decreased but she tested for increase (or vice versa), she'd likely fail to detect the real change. The two-tailed approach is more conservative and avoids the \"researcher's bias\" of assuming what they want to find.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "When performing a two-tailed binomial test with n = 20 and H₀: p = 0.4, the textbook shows the critical region is X ≤ 3 or X ≥ 13. Calculate the actual significance level of this test. (2 steps)", "answer": "- Step 1: The actual significance level = P(X ≤ 3) + P(X ≥ 13) when X ~ B(20, 0.4).\n- Step 2: From binomial tables with n = 20, p = 0.4:\n  + P(X ≤ 3) = 0.0160 (from tables)\n  + P(X ≥ 13) = 1 - P(X ≤ 12) = 1 - 0.978 = 0.022\n  + Actual significance = 0.016 + 0.022 = 0.038 = 3.8%\n  \n  The actual significance is less than the target 5%, making this a conservative test.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In hypothesis testing with the Poisson distribution, why do we sometimes need to adjust the time interval when testing the rate parameter λ? (2 steps)", "answer": "- Step 1: The Poisson rate λ is typically defined per unit time/space. If our data covers a different interval, we must adjust.\n- Step 2: For example, if calls arrive at λ = 0.325 per minute but we observe for 20 minutes, the expected number is 20 × 0.325 = 6.5. We test using X ~ Po(6.5), not Po(0.325). The parameter scales proportionally with the observation interval.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A scientist checks whether a chemical spill has increased the average number of bacteria in water samples. The normal level is 10 bacteria per liter. She collects 20 one-liter samples and finds 64 total bacteria. Set up and perform the hypothesis test using an appropriate approximation. (3 steps)", "answer": "- Step 1: Let X = total bacteria in 20 samples = sum of 20 independent Po(10) = Po(200). Hypotheses:\n  + H₀: λ = 10 per liter (no change)\n  + H₁: λ > 10 (increased)\n  + This is one-tailed.\n- Step 2: Using normal approximation: X ~ Po(200) ≈ N(200, 200). With continuity correction, P(X ≥ 64) ≈ P(W ≥ 63.5) where W ~ N(200, 200).\n  + Z = (63.5 - 200) / √200 = -136.5 / 14.14 ≈ -9.65\n- Step 3: This gives an extremely small p-value (essentially 0), far less than 0.05. Conclusion: Strong evidence that the average bacteria count has INCREASED — the chemical spill has polluted the water.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why is it important to check the assumptions of a hypothesis test before performing it? What are the key assumptions for binomial and Poisson tests? (2 steps)", "answer": "- Step 1: If assumptions are violated, the test results may be meaningless — we might draw incorrect conclusions.\n- Step 2: Key assumptions:\n  + Binomial: fixed n independent trials, constant p, two outcomes\n  + Poisson: events occur independently, at constant average rate, singly in any interval\n  + For approximations: need np > 5 and n(1-p) > 5 for normal; np < 5 for Poisson approximation\n  + Random sampling should be ensured", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In a hypothesis test, the p-value is found to be 0.03. However, the researcher used a significance level of 1%. Explain whether she should reject H₀ and why. (2 steps)", "answer": "- Step 1: The p-value (0.03) is the probability of observing data as extreme as (or more extreme than) what was observed, ASSUMING H₀ is true.\n- Step 2: Since 0.03 > 0.01 (the chosen significance level), she should NOT reject H₀. The evidence is not strong enough at the 1% level, even though it would be sufficient at 5%. Using a stricter threshold requires stronger evidence. The 1% significance level demands more convincing proof before rejecting H₀.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "A company claims their machine produces only 5% defective items. A quality inspector samples 50 items and finds 6 defects. Perform the hypothesis test at the 5% significance level to determine if the defect rate has changed. (3 steps)", "answer": "- Step 1: Let X = number of defects. Under H₀: X ~ B(50, 0.05). With n large and p small, np = 2.5, so we could use Poisson approximation Po(2.5) or exact binomial.\n  + H₀: p = 0.05 (no change)\n  + H₁: p ≠ 0.05 (changed — could be more OR less)\n  + Two-tailed test\n- Step 2: Expected value = 50 × 0.05 = 2.5. Observed = 6, which is HIGHER than expected, so we check upper tail.\n  + Using Poisson(2.5): P(X ≥ 6) = 1 - P(X ≤ 5) = 1 - 0.958 = 0.042\n  + Each tail gets 0.025. Since 0.042 > 0.025, not significant in upper tail.\n  + Check lower tail just in case: P(X ≤ 6) ≈ 0.98+, very high.\n- Step 3: At 5% significance (2.5% each tail), we do NOT reject H₀. The observed 6 defects could reasonably occur by chance even if the true rate is 5%. There is insufficient evidence to conclude the defect rate has changed.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A university claims that 60% of applicants get an offer. An education researcher suspects this proportion has changed and surveys 30 applicants, finding 12 offers. Perform the test at 10% significance. (3 steps)", "answer": "- Step 1: Test statistic: X = number of offers out of 30. Under H₀: X ~ B(30, 0.6).\n  + H₀: p = 0.6 (proportion unchanged)\n  + H₁: p ≠ 0.6 (proportion changed)\n  + Two-tailed at 5% each tail (10% total)\n- Step 2: Expected = 30 × 0.6 = 18. Observed = 12 (< 18), so check lower tail: P(X ≤ 12).\n  + From binomial tables: P(X ≤ 12) ≈ 0.049 (actually need to check exact value)\n  + At 5% level for lower tail: P(X ≤ c) ≤ 0.05\n- Step 3: Since P(X ≤ 12) ≈ 0.049 < 0.05, 12 falls in the lower critical region. At 10% significance, we REJECT H₀ — there is evidence the offer proportion has changed (decreased from 60%).", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why might a researcher choose a 1% significance level over a 5% level, and what is the trade-off? (2 steps)", "answer": "- Step 1: A lower significance level (e.g., 1% vs 5%) makes it HARDER to reject H₀ — we require stronger evidence. This reduces the chance of a Type I error (false positive).\n- Step 2: The trade-off is increased Type II error risk (β). Being more conservative means we're more likely to miss real effects when they exist. We choose 1% when the consequences of wrongly rejecting H₀ are severe (e.g., approving a dangerous drug), accepting that we may miss some real discoveries.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the context of hypothesis testing, what does it mean to say a test is \"conservative,\" and what is the practical implication? (2 steps)", "answer": "- Step 1: A conservative test has an actual significance level LOWER than the nominal (stated) level. For example, a test claiming 5% significance but actually having 3% is conservative.\n- Step 2: This means the test has lower power — it's less likely to detect real effects because the critical region is smaller. We might miss genuine discoveries. The trade-off is reduced Type I error at the cost of increased Type II error.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "A company tests whether a new website design increases conversion rate. They randomly show the new design to 100 visitors and 18 make a purchase. Historically, the conversion rate is 15%. Perform the test at 5% significance using normal approximation. (3 steps)", "answer": "- Step 1: Let X = conversions. Under H₀: X ~ B(100, 0.15). Expected = 15.\n  + H₀: p = 0.15 (no improvement)\n  + H₁: p > 0.15 (increase)\n  + One-tailed test\n- Step 2: Check approximation validity: np = 15 > 5, n(1-p) = 85 > 5. Normal approximation suitable.\n  + X ≈ N(15, 12.75) = N(15, 12.75)\n  + Using continuity correction: P(X ≥ 18) ≈ P(W ≥ 17.5)\n  + Z = (17.5 - 15) / √12.75 = 2.5 / 3.57 ≈ 0.70\n- Step 3: P(Z ≥ 0.70) ≈ 0.24, which is > 0.05. We do NOT reject H₀. At 5% significance, 18 conversions is not significantly higher than expected. Insufficient evidence that the new design improved conversion rate.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A biologist studies fruit fly mutations. Normally, 2% of flies have a particular mutation. In a sample of 200 flies, she finds 8 with the mutation. Test whether the mutation rate has changed at 5% significance using Poisson approximation. (3 steps)", "answer": "- Step 1: Under H₀: X ~ B(200, 0.02) ≈ Po(4) (since np = 4 < 5).\n  + H₀: p = 0.02 (rate unchanged)\n  + H₁: p ≠ 0.02 (rate changed — could be more OR less)\n  + Two-tailed test\n- Step 2: Expected = 4. Observed = 8. Since 8 > 4, check upper tail: P(X ≥ 8).\n  + Poisson(4): P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.9489 = 0.0511\n  + Each tail gets 0.025. P(X ≥ 8) = 0.051 > 0.025\n- Step 3: At 5% significance, 0.051 > 0.025, so we do NOT reject H₀. The observed 8 mutations is not significantly different from expected. There is insufficient evidence of a change in mutation rate.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}], "count": 35}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In hypothesis testing, what is the conceptual difference between a *hypothesis* and a *test statistic*, and why do we need both? (3 steps)", "answer": "- Step 1: A **hypothesis** is a *statement* about the value of a population parameter — for instance, claiming $$p = 0.4$$ for a binomial proportion, or $$\\lambda = 6.5$$ for a Poisson rate. It's a guess about the *underlying truth* of the population we cannot directly observe.\n- Step 2: A **test statistic** is a *number* calculated from a sample or experiment — for instance, the count $$X$$ of heads in 8 coin flips. We can actually observe and measure this; it gives us a window into the population.\n- Step 3: We need both because a hypothesis lives in the realm of the population (unobservable) while a test statistic lives in the realm of the sample (observable). The whole point of hypothesis testing is to use the *observable* (test statistic) to make an inference about the *unobservable* (population parameter).\n\nThe bridge is built by asking: *\"If the hypothesis were true, how likely would we observe a test statistic this extreme?\"*", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is the null hypothesis $$H_0$$ always written as an *equality* (e.g. $$p = 0.4$$) rather than an inequality? (3 steps)", "answer": "- Step 1: The whole machinery of hypothesis testing requires us to *calculate probabilities* of observing the test statistic. To do that, we must have a fully specified distribution.\n- Step 2: A specific value like $$p = 0.4$$ gives us exactly one distribution: $$X \\sim B(n, 0.4)$$. We can compute every probability from this.\n+ If we tried $$H_0: p > 0.4$$, we would have infinitely many distributions to consider and no single probability calculation would be possible.\n- Step 3: $$H_0$$ is the \"anchor\" — it pins down a precise distribution so we can ask \"given this assumed truth, how unusual is what we saw?\" The alternative $$H_1$$ is then deliberately *vague* (e.g. $$p > 0.4$$, $$p < 0.4$$, or $$p \\neq 0.4$$) because it represents the direction we'd believe in if $$H_0$$ fails.\n\nThe asymmetry between $$H_0$$ (precise) and $$H_1$$ (a region) is structural, not arbitrary.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "When testing a coin for bias, a student writes $$H_1: p = 0.6$$. Explain conceptually why this is wrong, and what they should write instead. (3 steps)", "answer": "- Step 1: The alternative hypothesis is meant to capture *all* possibilities that conflict with $$H_0$$ in a particular direction. Writing $$H_1: p = 0.6$$ picks one specific value, but bias toward heads could mean $$p = 0.55$$, $$p = 0.7$$, $$p = 0.9$$, etc.\n- Step 2: $$H_1$$ should describe a *region* of parameter values, not a single point. The correct forms are:\n+ $$H_1: p > 0.5$$ (bias toward heads)\n+ $$H_1: p < 0.5$$ (bias toward tails)\n+ $$H_1: p \\neq 0.5$$ (bias either direction — two-tailed)\n- Step 3: Conceptually, $$H_1$$ must be broad because we're not testing a competing specific theory; we're testing whether $$H_0$$ is implausible *in some direction*. Rejection of $$H_0$$ tells us only \"the parameter is probably on this side of the assumed value,\" not exactly where.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What distinguishes a one-tailed test from a two-tailed test in terms of the *question being asked*? (3 steps)", "answer": "- Step 1: A **one-tailed test** asks a directional question: \"Has the parameter *increased*?\" or \"Has the parameter *decreased*?\" The researcher has a prior belief about *which way* the parameter has moved.\n+ Form: $$H_1: p > p_0$$ or $$H_1: p < p_0$$\n- Step 2: A **two-tailed test** asks a non-directional question: \"Has the parameter *changed at all*?\" The researcher doesn't care or doesn't know which direction; any deviation from $$H_0$$ is of interest.\n+ Form: $$H_1: p \\neq p_0$$\n- Step 3: The choice has real consequences: a two-tailed test is \"harder to pass\" because you must split the rejection probability across both tails — each tail gets only half the significance level. A one-tailed test concentrates all the rejection probability on the side you suspect, making it more sensitive *if your direction is correct*, but useless if the truth lies the other way.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Why do we *assume the null hypothesis is true* when carrying out a hypothesis test, even though we may suspect it's wrong? (3 steps)", "answer": "- Step 1: Assuming $$H_0$$ is true gives us a complete, calculable probability distribution. Under $$H_0: p = 0.4$$ with $$n = 20$$, we know $$X \\sim B(20, 0.4)$$ and can compute any probability we want.\n- Step 2: With that calculable distribution in hand, we can ask the key question: *\"How surprising would the observed data be, if $$H_0$$ were true?\"*\n+ If extremely surprising (probability below the significance level), we conclude $$H_0$$ is likely false → reject.\n+ If not surprising, we have no compelling reason to abandon $$H_0$$ → do not reject.\n- Step 3: This is a \"proof by contradiction\" style of reasoning. We don't try to prove $$H_0$$ true; we try to see if it can be ruled out by the evidence. The asymmetry is deliberate: $$H_0$$ is the \"default\" assumption that takes evidence to overturn.\n\nThis is why we never \"accept\" $$H_0$$ — failing to reject doesn't mean it's true, only that we don't have enough evidence against it.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "A researcher tests $$H_0: p = 0.4$$ vs $$H_1: p < 0.4$$ at the 5% level. The observed test statistic gives a probability of 0.06 under $$H_0$$. State the decision and explain the logic. (3 steps)", "answer": "- Step 1: The probability of observing data this extreme (or more extreme) under $$H_0$$ is 0.06, i.e. 6%.\n- Step 2: Compare this to the significance level of 5%. Since $$0.06 > 0.05$$, the observation is not extreme enough to cross our threshold.\n- Step 3: Decision: **Do not reject $$H_0$$**. There is insufficient evidence at the 5% level to support $$H_1$$.\n\nConceptually: 6% means \"if $$H_0$$ were true, this observation (or worse) would happen about 6% of the time\" — that's uncommon but not unusual enough to declare $$H_0$$ implausible by our chosen standard.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "What does the significance level of a hypothesis test (e.g. 5%) actually represent? (3 steps)", "answer": "- Step 1: The significance level is the *threshold probability* at which we decide an observation is \"too extreme\" to be consistent with $$H_0$$.\n- Step 2: Equivalently, it's the *maximum probability of incorrectly rejecting $$H_0$$* that we are willing to tolerate. A 5% significance level means: \"I'll accept up to a 5% chance of falsely concluding $$H_0$$ is wrong, when actually it's right.\"\n- Step 3: Conceptually, it controls a kind of false-alarm rate. Smaller significance levels (1%) are stricter — they require stronger evidence to reject $$H_0$$, reducing false alarms but making true effects harder to detect. Larger levels (10%) are more permissive.\n\nThe choice of significance level reflects how much you fear a \"false positive\" conclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Define the *critical region* of a hypothesis test in terms of what role it plays in the decision process. (2 steps)", "answer": "- Step 1: The **critical region** is the set of values of the test statistic that, if observed, lead us to *reject* $$H_0$$. It's effectively a pre-computed \"rejection zone\" in the distribution.\n- Step 2: Constructing it once means you don't need to compute probabilities for every new observation — you just check: *does the observed value land in this zone?* If yes, reject $$H_0$$; if no, do not reject.\n\nThe critical region encodes the entire decision rule of the test.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What is the *critical value*, and how does it relate to the critical region? (2 steps)", "answer": "- Step 1: The **critical value** is the *first* (boundary) value to fall *inside* the critical region — the smallest \"extreme enough\" value to trigger rejection.\n- Step 2: For an upper-tail test, if the critical value is $$x = 8$$, the critical region is $$\\{8, 9, 10, \\ldots\\}$$, i.e. $$X \\geq 8$$. The critical value is the gateway: cross it, and you're in rejection territory.\n\nIt's a single anchor point that defines where the rejection zone begins.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why does the *actual significance level* of a discrete-distribution test almost never equal the nominal level (e.g. 5%)? (3 steps)", "answer": "- Step 1: For a discrete distribution like $$B(n, p)$$, the test statistic only takes integer values. The cumulative probabilities $$P(X \\geq k)$$ jump in steps as $$k$$ varies — there are no in-between values.\n- Step 2: We choose the critical region by finding the largest set of extreme outcomes whose total probability is *at most* the nominal significance level. So we land just below the threshold, not exactly on it.\n+ E.g. $$P(X \\geq 7) = 0.0548$$ exceeds 5%, so we can't reject at 7.\n+ But $$P(X \\geq 8) = 0.0132$$ is below 5%, so the critical region is $$X \\geq 8$$.\n- Step 3: The actual significance level is then 0.0132 (1.32%), not 5%. It's the *true* probability of incorrectly rejecting $$H_0$$ given the test design — strictly less than the nominal target.\n\nThis conservatism is unavoidable for discrete distributions — you can't fine-tune the rejection probability to be exactly 5%.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "A test using $$X \\sim B(10, 0.4)$$ gives $$P(X \\geq 7) = 0.0548$$ and $$P(X \\geq 8) = 0.0132$$. For a 5% one-tailed upper test, what is the critical region and actual significance level? (3 steps)", "answer": "- Step 1: We need the smallest $$k$$ such that $$P(X \\geq k) < 0.05$$.\n+ At $$k = 7$$: probability is 0.0548 — too large, exceeds 5%.\n+ At $$k = 8$$: probability is 0.0132 — comfortably below 5%.\n- Step 2: So 7 is *not* in the critical region but 8 is. The critical value is 8 and the critical region is $$X \\geq 8$$.\n- Step 3: The actual significance level equals $$P(X \\geq 8) = 0.0132 = 1.32\\%$$. This is the \"real\" false-positive rate of this test, much lower than the 5% nominal target — a consequence of discrete jumps.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Conceptually, why is a two-tailed test's significance level typically *halved* between the two tails? (3 steps)", "answer": "- Step 1: The total probability of falsely rejecting $$H_0$$ (the actual false-positive rate) must stay within the significance level — say 5%.\n- Step 2: A two-tailed test rejects $$H_0$$ if the test statistic is *too low* OR *too high*. Both ends contribute to the total false-positive rate.\n+ If we put 5% probability in *each* tail, the total false-positive rate would be 10% — exceeding the budget.\n- Step 3: To keep the total at 5%, we split it evenly: 2.5% in each tail. Each tail contributes its share, summing to the agreed total significance level.\n\nThe intuition: you have a fixed \"error budget\" of 5%, and you must spend it across however many directions of rejection you've allowed.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "For a two-tailed test on $$X \\sim B(n, p)$$ with observed value $$x$$, how do you decide *which tail* to test in? (3 steps)", "answer": "- Step 1: Compute the expected value under $$H_0$$: $$E(X) = np$$. This is what we'd \"expect\" to see if $$H_0$$ were true.\n- Step 2: Compare the observed $$x$$ to $$np$$:\n+ If $$x < np$$, the observation is on the *lower* tail — compute $$P(X \\leq x)$$.\n+ If $$x > np$$, the observation is on the *upper* tail — compute $$P(X \\geq x)$$.\n- Step 3: You only test the tail in which the observation actually lies. The other tail is irrelevant for deciding whether *this* observation is extreme; we only need to ask \"how unusual is the deviation in the direction it actually occurred?\"\n\nThis is why even though the test is two-tailed, the practical computation involves only one tail.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "For $$X \\sim B(50, 0.02)$$, the expected value is 1, but a researcher observes $$x = 4$$. In a two-tailed test at 2% significance, which tail do they consider, and why is this counterintuitive at first glance? (3 steps)", "answer": "- Step 1: It might seem that $$x = 4$$ is \"small\" because 4 is a small number. But the *expected* value under $$H_0$$ is only $$50 \\times 0.02 = 1$$, so 4 is actually 4 times the expected value — quite large *relative to expectation*.\n- Step 2: Since $$4 > 1$$, the observation lies in the *upper* tail. We compute $$P(X \\geq 4)$$ to assess how unusual this is.\n- Step 3: The lesson: \"small\" or \"large\" must be judged relative to the distribution under $$H_0$$, not in absolute terms. With a low-probability event, small absolute counts can still be high deviations from expectation.\n\nThis is a common misconception trap in low-probability scenarios.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick":
