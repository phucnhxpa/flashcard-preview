 true}, {"question": "A test gives $$P(X \\geq 11) = 0.1275$$ when testing $$H_0: p = 0.4$$ vs $$H_1: p > 0.4$$ at 5%. What conclusion follows, and what does this mean in plain language? (3 steps)", "answer": "- Step 1: We compare the observed-tail probability 0.1275 (12.75%) to the significance level 0.05 (5%). Since $$0.1275 > 0.05$$, we do not reject $$H_0$$.\n- Step 2: In context: an observation \"this extreme or more\" would happen about 13% of the time even if $$H_0$$ were true. That's not unusual enough to make us doubt $$H_0$$.\n- Step 3: Plain language: *\"The data is consistent with the assumed value; we have no compelling reason to abandon it.\"* Note: this is *not* the same as proving $$H_0$$ is true — it just means the evidence isn't strong enough to overturn it.\n\nFailing to reject ≠ accepting; it means \"verdict not guilty,\" not \"verdict innocent.\"", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why is hypothesis testing for the Poisson rate $$\\lambda$$ structurally similar to testing for the binomial proportion $$p$$? (3 steps)", "answer": "- Step 1: Both binomial and Poisson are *discrete* distributions with a single parameter ($$p$$ or $$\\lambda$$) describing the rate at which \"events of interest\" occur.\n- Step 2: The hypothesis testing logic is identical:\n+ Set up $$H_0$$ specifying the parameter value.\n+ Compute probabilities of observed data under $$H_0$$.\n+ Compare to the significance level.\n+ Reject or fail to reject based on the comparison.\n- Step 3: The only difference is which distribution we use to compute the probabilities — Poisson tables/formulas instead of binomial. The conceptual machinery, including critical regions, one/two-tailed splits, and significance comparisons, is the same.\n\nThis is why mastering the binomial case transfers almost directly to Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "When testing a Poisson rate, why must you adjust $$\\lambda$$ to match the *interval length* over which the data was collected? (3 steps)", "answer": "- Step 1: The Poisson rate $$\\lambda$$ describes the *expected number of events per unit interval*. If the original rate is \"0.325 calls per minute,\" that's per-minute.\n- Step 2: If you collect data over a different interval (e.g. 20 minutes), the expected number of events scales linearly: $$\\lambda_{20} = 20 \\times 0.325 = 6.5$$ for the 20-minute window.\n- Step 3: The hypothesis test uses the appropriate $$\\lambda$$ for the *observation window*. Forgetting this scaling is a common error: you'd be comparing observed counts (over a longer window) against a rate parameter for a shorter window.\n\nThe Poisson distribution's defining property — independence and constant rate — is what makes this linear scaling work.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "When can a binomial $$B(n, p)$$ distribution be *approximated* by a Poisson distribution for hypothesis testing purposes? (3 steps)", "answer": "- Step 1: Two conditions must hold:\n+ $$n$$ is large (typically $$n > 50$$).\n+ $$p$$ is small (typically $$p < 0.1$$, or equivalently $$np$$ moderate).\n- Step 2: Under these conditions, the binomial behaves almost like a Poisson with $$\\lambda = np$$, because rare events in many trials approximate a Poisson process.\n- Step 3: Why approximate at all? With large $$n$$, exact binomial calculations get cumbersome (factorials and powers). The Poisson approximation gives accurate results with far less computation, especially when binomial tables don't extend to large $$n$$.\n\nThis is one of two main approximations used in hypothesis testing for tractability.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "When can a binomial $$B(n, p)$$ distribution be approximated by a *normal* distribution for hypothesis testing? (3 steps)", "answer": "- Step 1: The conditions are:\n+ $$n$$ is large.\n+ $$p$$ is close to 0.5 (so $$np$$ and $$n(1-p)$$ are both reasonably large).\n- Step 2: The binomial is approximately $$N(np, np(1-p))$$ in this regime — the central limit theorem kicks in because each Bernoulli trial contributes a small additive piece, and a sum of many such pieces tends to normal.\n- Step 3: This is useful when neither exact binomial calculation nor Poisson approximation works (because $$p$$ is not small). Normal approximation has the bonus of letting you use $$z$$-scores for any threshold, not just tabulated values.\n\nThe key is that the binomial distribution is *symmetric and bell-shaped* when $$p \\approx 0.5$$, matching the normal shape.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "When approximating a binomial by a normal in a hypothesis test, what is the *continuity correction* and why is it needed? (3 steps)", "answer": "- Step 1: The binomial is discrete (takes integer values), but the normal is continuous. Each integer value $$k$$ in the binomial corresponds to a region $$[k - 0.5, k + 0.5]$$ in the continuous approximation.\n- Step 2: When computing probabilities like $$P(X \\geq 75)$$ (binomial), we use $$P(W \\geq 74.5)$$ (normal), not $$P(W \\geq 75)$$ — the boundary shifts by 0.5.\n+ For $$P(X \\leq 35)$$ → $$P(W \\leq 35.5)$$.\n+ For $$P(X = k)$$ → $$P(k - 0.5 \\leq W \\leq k + 0.5)$$.\n- Step 3: Without the correction, you'd systematically misallocate probability mass at boundaries, leading to inaccurate test conclusions — especially near critical thresholds.\n\nThe 0.5 shift may seem small, but it can change a \"reject\" into a \"do not reject\" in borderline cases.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "When approximating a Poisson by a normal in a hypothesis test, what are the conditions and the parameters of the normal? (3 steps)", "answer": "- Step 1: Condition: $$\\lambda$$ should be reasonably large (typically $$\\lambda > 10$$ or so). When $$\\lambda$$ is small, the Poisson is heavily skewed and the normal approximation fails badly.\n- Step 2: Parameters: if $$X \\sim Po(\\lambda)$$ and $$\\lambda$$ is large, then approximately $$X \\sim N(\\lambda, \\lambda)$$ — both mean and variance equal $$\\lambda$$.\n- Step 3: Continuity correction is still needed because Poisson is discrete. So $$P(Y \\geq 75)$$ in Poisson becomes $$P(W \\geq 74.5)$$ in normal, where $$W \\sim N(\\lambda, \\lambda)$$.\n\nThis is useful when Poisson tables don't go high enough or when calculations involve unwieldy factorials.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is the actual significance level of a hypothesis test sometimes called the \"probability of incorrectly rejecting $$H_0$$\"? (3 steps)", "answer": "- Step 1: The critical region is the set of test statistic values that lead to rejection. The probability of the test statistic landing there, *computed under the assumption that $$H_0$$ is true*, equals the actual significance level.\n- Step 2: If $$H_0$$ is in fact true, then any rejection is a false rejection — an error. The probability of this error happening is exactly the probability of being in the critical region under $$H_0$$.\n- Step 3: So the actual significance level *is* the probability that a test wrongly rejects $$H_0$$. It directly quantifies the false-alarm rate of the test design.\n\nThis is why it's also called the \"Type I error rate\" — it's the rate of falsely flagging a true $$H_0$$ as wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Set up the test statistic and hypotheses for: \"An election candidate claims 40% support; a researcher believes she's overestimating.\" (3 steps)", "answer": "- Step 1: The researcher believes the true support is *less than* 40%. So we are testing whether the actual proportion has been overstated — a directional, one-tailed test.\n- Step 2: Test statistic $$X$$ = number of people in a sample (e.g. of 20) who say they support the candidate. Modelled as $$X \\sim B(20, p)$$ where $$p$$ is the true population proportion of supporters.\n- Step 3: Hypotheses:\n+ $$H_0: p = 0.4$$ (the candidate's claimed support level)\n+ $$H_1: p < 0.4$$ (the researcher's suspicion that support is lower)\n\nThe test rejects $$H_0$$ if the observed count is unusually low, indicating less support than claimed.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why must you write a *conclusion in context* after a hypothesis test, not just \"reject $$H_0$$\" or \"do not reject $$H_0$$\"? (3 steps)", "answer": "- Step 1: The statistical conclusion (\"reject\" or \"fail to reject\") is meaningless without translating back to the real-world question. A reader who isn't a statistician needs to understand what the result *means*.\n- Step 2: The contextual conclusion should:\n+ State whether there's evidence of the effect (e.g. \"the new drug is better than the old\" or \"there is no evidence that the proportion has changed\").\n+ Reference the parameter being tested in real-world terms (proportion of supporters, rate of calls, etc.).\n- Step 3: Conceptually, the test only provides probabilistic evidence; the conclusion translates that probabilistic evidence into a real-world claim with appropriate caution. Saying \"we have insufficient evidence at the 5% level\" is fundamentally different from \"the claim is wrong.\"\n\nStatistics serves real-world decisions — the contextual interpretation is the whole point.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A test rejects $$H_0$$ at the 5% level. Can you say \"the probability that $$H_0$$ is false is 95%\"? (3 steps)", "answer": "- Step 1: No — this is a classic misinterpretation. The 5% (or 95%) refers to a *long-run frequency* under repeated testing, not a probability about the truth of $$H_0$$ in this specific case.\n- Step 2: What we *can* say: \"If $$H_0$$ were true, observations this extreme would occur in less than 5% of repeated samples.\" So we treat $$H_0$$ as implausible *given the data*.\n- Step 3: The probability that $$H_0$$ is true or false is, in classical (frequentist) statistics, not a meaningful concept — $$H_0$$ is either true or false, full stop. The significance level is a property of the *testing procedure*, not the *hypothesis*.\n\nThis is a deep philosophical point: $$p$$-values measure how surprising data is, not how likely a hypothesis is.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Conceptually, why might a one-tailed test detect a real effect that a two-tailed test misses? (3 steps)", "answer": "- Step 1: A one-tailed test puts the *entire* significance budget (e.g. 5%) into one tail. The critical region in that single direction is therefore *larger* (further from extreme), making rejection easier.\n- Step 2: A two-tailed test splits the budget — say 2.5% in each tail. The critical region in each direction is *smaller* (more extreme threshold), making rejection harder for any single direction.\n- Step 3: So if the true effect is on the side you predicted with the one-tailed test, you have more statistical power to detect it. But if you guess the wrong direction, the one-tailed test will miss it entirely while a two-tailed test would still catch it.\n\nThe trade-off: one-tailed = more power if your guess is right, no chance if wrong. Two-tailed = less power but covers both bases.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Explain why \"$$P(X \\geq 8) = 0.0132 < 0.05$$\" supports rejecting $$H_0$$ in a one-tailed upper test. (3 steps)", "answer": "- Step 1: $$P(X \\geq 8) = 0.0132$$ means: under $$H_0$$, an outcome of 8 or higher would occur only 1.32% of the time.\n- Step 2: That's less than the 5% threshold we set. In other words, an observation of 8 (or worse) is *more extreme than our 5% bar of plausibility*.\n- Step 3: So observing $$X = 8$$ provides strong enough evidence to declare $$H_0$$ implausible. We reject $$H_0$$ — the data is unusual enough that the assumed parameter value seems wrong.\n\nNumerically: we crossed the threshold from \"could happen by chance\" into \"very unlikely under $$H_0$$\" territory.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A two-tailed test at 5% on $$X \\sim B(40, 0.25)$$ gives critical regions $$X \\leq 3$$ and $$X \\geq 18$$. The observed value is $$x = 12$$. State the conclusion and the reasoning. (3 steps)", "answer": "- Step 1: The critical region is the rejection zone: $$\\{0, 1, 2, 3\\} \\cup \\{18, 19, \\ldots, 40\\}$$. Outside of this zone (i.e. $$4 \\leq X \\leq 17$$) we do not reject $$H_0$$.\n- Step 2: Observed value $$x = 12$$ falls in the range $$\\{4, \\ldots, 17\\}$$, the acceptance region.\n- Step 3: Conclusion: do not reject $$H_0$$. There is insufficient evidence at the 5% level to conclude that $$p \\neq 0.25$$.\n\nThe data is consistent with the null hypothesis — not extreme enough in either direction to overturn it.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why might a researcher prefer to *find the critical region first* and then check the observed value, rather than computing the tail probability for each new test? (3 steps)", "answer": "- Step 1: Once the critical region is computed, applying the test is just a comparison: \"Is the observed value in the region?\" — a yes/no check.\n- Step 2: This is especially useful when:\n+ Multiple observations need to be checked against the same hypothesis.\n+ A study is being designed and you want to know in advance what observations would lead to rejection.\n+ You want a clean decision rule to communicate to others.\n- Step 3: Computing the tail probability for each observation works but requires a fresh calculation each time. The critical region approach front-loads the work, then makes decisions cheap.\n\nBoth methods are equivalent in conclusion — just different in workflow.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "In a Poisson hypothesis test, the rate is 0.325 calls per minute. The researcher records 1 call in 10 minutes. Explain the setup conceptually. (3 steps)", "answer": "- Step 1: The 10-minute observation window means the relevant Poisson parameter is $$\\lambda_{10} = 10 \\times 0.325 = 3.25$$. The expected number of calls in 10 minutes under $$H_0$$ is 3.25.\n- Step 2: Observed value is 1 call. Since $$1 < 3.25$$, the observation is in the *lower* tail. For a one-tailed test that the rate has decreased, we test $$H_1: \\lambda < 3.25$$.\n- Step 3: We compute $$P(Y \\leq 1)$$ under $$Y \\sim Po(3.25)$$ and compare to the significance level. If small enough, reject $$H_0$$ and conclude the rate has decreased.\n\nThis shows how to scale $$\\lambda$$ to match the observation window before testing.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A researcher tests 100 customers and finds 35 made purchases, against a claim of 45% conversion. Why is a *normal approximation* appropriate here? (3 steps)", "answer": "- Step 1: The exact distribution under $$H_0$$ is $$X \\sim B(100, 0.45)$$. Computing exact probabilities like $$P(X \\leq 35)$$ involves summing many binomial terms with large factorials — cumbersome.\n- Step 2: We check the conditions for normal approximation:\n+ $$n = 100$$ is large. ✓\n+ $$p = 0.45$$ is close to 0.5. ✓\n- Step 3: So $$X \\approx N(np, np(1-p)) = N(45, 24.75)$$. We then standardize: $$Z = \\frac{35.5 - 45}{\\sqrt{24.75}}$$ (using continuity correction), and use the standard normal tables.\n\nThe approximation is fast, accurate, and avoids tedious binomial summation.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "During a flu outbreak with 4% population infection rate, a manager tests whether her factory's 12 absences (out of 100) indicate above-average infection. Why use a Poisson approximation here? (3 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(100, 0.04)$$. Conditions for approximation:\n+ $$n = 100$$ is large. ✓\n+ $$p = 0.04$$ is small (well below 0.1). ✓\n+ $$np = 4$$ is moderate.\n- Step 2: This means a Poisson approximation is appropriate: $$X \\approx Po(4)$$. We can use Poisson tables for $$\\lambda = 4$$ to compute $$P(X \\geq k)$$ for various $$k$$.\n- Step 3: The normal approximation would be poor here because $$p$$ is far from 0.5 and $$np = 4$$ is too small for the bell-shape to emerge.\n\nChoosing approximation method depends on which conditions ($$n$$ large + $$p$$ small vs $$n$$ large + $$p \\approx 0.5$$) are best met.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Compare the conceptual difference between using a normal approximation and a Poisson approximation for binomial hypothesis testing. (3 steps)", "answer": "- Step 1: Both approximations replace tedious binomial calculations with easier ones. They differ in *when they work well*:\n+ Poisson: $$n$$ large, $$p$$ small (rare events).\n+ Normal: $$n$$ large, $$p$$ close to 0.5 (symmetric, bell-shaped).\n- Step 2: Each captures a different \"limiting behavior\" of the binomial:\n+ Poisson captures rare-event behavior — many trials, few successes, skewed shape.\n+ Normal captures aggregate behavior — many small contributions adding up to a bell curve.\n- Step 3: For hypothesis testing, the choice affects which tables/distributions you use:\n+ Poisson tables for Poisson approximation.\n+ Standard normal tables (with continuity correction) for normal approximation.\n\nBoth involve some loss of accuracy compared to exact binomial calculations, but enable practical computation in cases where exact methods are infeasible.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "What does it mean to say a test has a particular \"actual significance level\" (e.g. 4.52%), and why might it differ from the nominal 5%? (3 steps)", "answer": "- Step 1: The actual significance level is the *true probability* that the test rejects $$H_0$$ when $$H_0$$ is true, given the specific critical region you chose.\n- Step 2: For discrete distributions, you can't usually pick a critical region with probability *exactly* 5%. You pick the largest set whose probability is *at most* 5%, falling somewhere below.\n+ E.g. critical regions might give $$P(\\text{reject}) = 0.0452 = 4.52\\%$$, the closest under the 5% limit.\n- Step 3: This means in practice the test is *slightly more conservative* than the nominal level suggests — false-positive rate is a bit lower than the target. For two-tailed tests, the actual level is the sum of probabilities in *both* tails.\n\nReporting the actual significance level provides an honest measure of how the test really behaves.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "When choosing critical regions for a two-tailed Poisson test where each tail should be \"as close to 2.5% as possible,\" what's the principle for picking critical values in each tail? (3 steps)", "answer": "- Step 1: For each tail independently, find the value where the cumulative probability is *closest* to 2.5%, even if slightly above or below.\n+ Lower tail: pick $$c_1$$ such that $$P(X \\leq c_1)$$ is closest to 0.025.\n+ Upper tail: pick $$c_2$$ such that $$P(X \\geq c_2)$$ is closest to 0.025.\n- Step 2: \"Closest\" allows the value to be slightly above 0.025 (e.g. 0.0339) if that's nearer than going lower (e.g. 0.0160). The instruction is \"closest,\" not \"no greater than.\"\n- Step 3: This means the two tails don't always exactly add to 5%. The actual significance level is the sum of the two tail probabilities, computed once values are chosen.\n\nThe exact wording of the question (e.g. \"closest to\" vs \"no more than\") matters and changes which values you pick.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A simple test: Coin tossed 10 times, lands on heads 9 times. Conceptually, what's the binomial setup for testing if the coin is biased? (3 steps)", "answer": "- Step 1: Under \"fair coin\" assumption: $$X \\sim B(10, 0.5)$$, with $$X$$ = number of heads.\n+ $$H_0: p = 0.5$$ (fair).\n+ $$H_1: p \\neq 0.5$$ (biased — direction unspecified).\n- Step 2: Observed value $$x = 9$$. Expected value $$np = 5$$. So 9 is in the *upper* tail. Compute $$P(X \\geq 9)$$ under $$H_0$$.\n- Step 3: For a 5% two-tailed test, compare $$P(X \\geq 9)$$ to 2.5%. From tables, $$P(X \\geq 9) = 1 - P(X \\leq 8) = 1 - 0.9893 = 0.0107$$. Since $$0.0107 < 0.025$$, reject $$H_0$$ — the coin appears biased.\n\nThis shows the standard pipeline applied to a clean numerical example.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What's the *purpose* of computing the actual significance level of a hypothesis test, given that we already know the nominal level? (3 steps)", "answer": "- Step 1: The nominal level (e.g. 5%) is what we *aimed for*. The actual level is what we *got* given the discreteness of the distribution.\n- Step 2: Reporting it serves several functions:\n+ Honesty: tells the reader the true false-positive rate of the test.\n+ Comparison: lets you compare different test designs (e.g. \"this test is at 4.52% actual vs 4.7% actual\").\n+ Insight: a much-lower-than-nominal actual level suggests your test is being unduly conservative — you might want to redesign with a different sample size.\n- Step 3: It's the difference between \"I aimed at 5%\" and \"I actually shot at 4.52%.\" Both are useful pieces of information, especially when fine-tuning a study or comparing tests.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "When would using a *Poisson* hypothesis test be more appropriate than a *binomial* test, even though both deal with counts? (3 steps)", "answer": "- Step 1: Use Poisson when:\n+ Events occur in a *continuous interval* (time, space) at some rate per unit interval.\n+ There's no fixed \"number of trials\" — you observe whatever happens in a period.\n+ Events are independent and rare per very small subinterval.\n- Step 2: Use binomial when:\n+ There's a *fixed number* of independent trials, each with two outcomes.\n+ Each trial has the same probability $$p$$ of success.\n- Step 3: Examples:\n+ Number of phone calls in a 20-minute window → Poisson (continuous time, no fixed \"trials\").\n+ Number of heads in 10 coin flips → Binomial (10 fixed trials).\n\nThe structural difference is whether the sample size is fixed (binomial) or whether you're just counting events in an interval (Poisson).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Why must we be careful with the wording when interpreting \"no evidence to reject $$H_0$$\" vs \"evidence to support $$H_0$$\"? (3 steps)", "answer": "- Step 1: \"No evidence to reject $$H_0$$\" means the data is consistent with $$H_0$$, but doesn't prove it true. The data simply isn't extreme enough to overturn the assumption.\n- Step 2: \"Evidence to support $$H_0$$\" wrongly implies the test gives positive backing for $$H_0$$. But a hypothesis test is *asymmetric*: it can only provide evidence *against* $$H_0$$, not for it.\n- Step 3: Failure to reject can mean:\n+ $$H_0$$ is true.\n+ $$H_0$$ is false but the test wasn't powerful enough to detect the difference (small sample, small effect, etc.).\n+ The data was just unlucky to land in the acceptance region.\n\nSo \"no evidence to reject\" is a careful, honest statement; \"evidence to support\" overclaims the result.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "A test gives $$P(X \\leq 1) = 0.10404$$ under $$H_0: p = 1/3$$ in a two-tailed test at 5%. What is the conclusion? (3 steps)", "answer": "- Step 1: The test is two-tailed at 5%, so each tail gets 2.5% (0.025).\n- Step 2: Observed-tail probability is 0.10404, well above 0.025. The observation is not extreme enough in this tail.\n- Step 3: Do not reject $$H_0$$. There is insufficient evidence at the 5% level to conclude $$p \\neq 1/3$$. In context, this would mean: no evidence that the proportion has changed from the assumed value.\n\nNotice we compare to 0.025 (the per-tail allocation), not 0.05 (the total significance level), because we're in a two-tailed test.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Explain why the statement \"rejecting $$H_0$$ at 5%\" is *stronger* than \"rejecting $$H_0$$ at 10%\" but *weaker* than \"rejecting $$H_0$$ at 1%\". (3 steps)", "answer": "- Step 1: A smaller significance level means a stricter rejection threshold — only very extreme observations cross the bar. Rejecting at 1% requires more evidence than rejecting at 5%, which requires more than rejecting at 10%.\n- Step 2: So if a test rejects at 1%, it would also reject at 5% and at 10% (since the data is even more clearly in the rejection zone of those weaker thresholds).\n- Step 3: Conversely, rejecting at 10% might not reject at 5%, and rejecting at 5% might not reject at 1%. Stronger evidence overturns more thresholds.\n\nThis is why scientific papers often report multiple significance levels — a result significant at 1% is much more convincing than one significant at 10%.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Describe the conceptual flow of a complete hypothesis test from start to finish. (3 steps)", "answer": "- Step 1: **Set up:**\n+ Identify the population parameter being tested ($$p$$ or $$\\lambda$$).\n+ State $$H_0$$ (specific value) and $$H_1$$ (direction or \"not equal\").\n+ Choose significance level (5%, 1%, etc.).\n+ Identify the test statistic and its distribution under $$H_0$$.\n- Step 2: **Compute and compare:**\n+ Method 1: Calculate the probability of observed data (or more extreme) under $$H_0$$. Compare to significance level.\n+ Method 2: Find the critical region. Check if observed value falls in it.\n- Step 3: **Conclude:**\n+ Reject $$H_0$$ if data is in the critical region (or probability < significance level).\n+ Do not reject $$H_0$$ otherwise.\n+ Translate the statistical decision into a contextual conclusion.\n\nThe flow embodies the logic: assume $$H_0$$ → see if data contradicts it → decide.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "A simple example: 10 patients given a new drug, 7 recover. Standard recovery rate is 30%. Set up the test and explain the qualitative conclusion. (3 steps)", "answer": "- Step 1: Test statistic: $$X$$ = number who recover, $$X \\sim B(10, p)$$ under hypothesis.\n+ $$H_0: p = 0.3$$ (drug is no better than standard).\n+ $$H_1: p > 0.3$$ (drug is better).\n- Step 2: Compute $$P(X \\geq 7)$$ under $$H_0$$. From tables, $$P(X \\geq 7) = 1 - P(X \\leq 6) = 1 - 0.9894 = 0.0106 = 1.06\\%$$.\n- Step 3: At 5% level, $$0.0106 < 0.05$$, so reject $$H_0$$. There is significant evidence the drug improves recovery rate.\n\nQualitatively: 7/10 is far above the expected 3/10, so the result is surprising under the null and points to a real improvement.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Why does the binomial cumulative table list $$P(X \\leq x)$$ rather than $$P(X = x)$$ or $$P(X \\geq x)$$? (3 steps)", "answer": "- Step 1: Hypothesis tests typically need *cumulative* probabilities — the chance of seeing \"$$X$$ at or below\" or \"$$X$$ at or above\" a value, not just exactly equal to.\n- Step 2: $$P(X \\leq x)$$ is the most fundamental cumulative form. From it, we can derive:\n+ $$P(X \\geq x) = 1 - P(X \\leq x - 1)$$.\n+ $$P(X = x) = P(X \\leq x) - P(X \\leq x - 1)$$.\n+ $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a - 1)$$.\n- Step 3: Tabulating $$P(X \\leq x)$$ allows efficient computation of all these forms with simple arithmetic. Listing $$P(X = x)$$ would require summing many entries; listing $$P(X \\geq x)$$ would just be a re-encoding.\n\nThe choice reflects what's most useful for hypothesis testing.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "When using approximations in hypothesis testing, what's the *trade-off* between accuracy and computational ease? (3 steps)", "answer": "- Step 1: Exact methods (binomial, Poisson) give precise probabilities but can be computationally intensive — large factorials, many terms to sum, and tables that don't extend far enough.\n- Step 2: Approximations (Poisson for binomial, normal for binomial or Poisson) give faster, more accessible calculations but at the cost of some accuracy. The error is typically small when the approximation conditions are well met.\n- Step 3: For hypothesis testing near the significance threshold, this trade-off matters: an approximation might shift a borderline test from \"reject\" to \"do not reject\" or vice versa. So:\n+ Use exact methods when conditions are marginal or stakes are high.\n+ Use approximations when conditions are clearly met and computational ease matters.\n\nModern calculators have shifted the balance toward exact methods, but approximations remain useful for understanding and communication.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "A two-tailed Poisson test gives lower critical region $$X \\leq 1$$ and upper critical region $$X \\geq 12$$. Observed value is $$x = 5$$. What's the conclusion and why? (3 steps)", "answer": "- Step 1: The acceptance region is $$\\{2, 3, \\ldots, 11\\}$$ — values not in either critical region.\n- Step 2: Observed value 5 is in the acceptance region.\n- Step 3: Do not reject $$H_0$$. The observed count is not extreme enough in either direction to declare the rate significantly different from the assumed value.\n\nIn context: the data is consistent with the assumed Poisson rate.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Explain why a hypothesis test is sometimes called a \"test of significance.\" (3 steps)", "answer": "- Step 1: \"Significance\" here means *statistical significance* — the result is unusual enough that we don't believe it occurred by random chance under $$H_0$$.\n- Step 2: The test asks: \"Is the observed effect *significantly* different from what $$H_0$$ predicts?\" — i.e., does it stand out from random variation?\n- Step 3: A \"significant\" result lets us reject $$H_0$$ in favor of $$H_1$$. A \"non-significant\" result means the effect (if any) could plausibly be just noise. Note: statistical significance ≠ practical importance — a tiny effect can be \"statistically significant\" with a huge sample but matter little in real terms.\n\nThe vocabulary highlights the test's role in separating signal from noise.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "In testing $$H_0: \\lambda = 6.5$$ vs $$H_1: \\lambda \\neq 6.5$$, the upper critical region is $$X \\geq 12$$ giving $$P(X \\geq 12) = 0.0339$$. The lower critical region is $$X \\leq 1$$ giving $$P(X \\leq 1) = 0.0113$$. What is the actual significance level? (2 steps)", "answer": "- Step 1: For a two-tailed test, the actual significance level is the sum of the probabilities in both critical regions. This equals the total probability of falsely rejecting $$H_0$$ (in either direction).\n- Step 2: Actual level $$= 0.0113 + 0.0339 = 0.0452 = 4.52\\%$$.\n\nThis is below the nominal 5% (since each tail is below 2.5%), reflecting the discrete-distribution conservatism. The test is slightly stricter than its nominal level.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "A factory tests 2000 lightbulbs and finds 12 faulty. Old machine had 0.3% fault rate. Why is this a good candidate for a Poisson approximation in hypothesis testing? (3 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(2000, 0.003)$$. Direct binomial computation would involve $$\\binom{2000}{12}$$ — a huge number. Tables don't typically go to $$n = 2000$$.\n- Step 2: Conditions for Poisson approximation:\n+ $$n = 2000$$ is very large. ✓\n+ $$p = 0.003$$ is very small. ✓\n+ $$np = 6$$ is moderate.\n- Step 3: So we approximate $$X \\approx Po(6)$$. This makes the calculations tractable using Poisson tables. The error is negligible because $$n$$ is very large and $$p$$ very small — exactly the conditions where Poisson is an excellent approximation.\n\nThe shift from binomial to Poisson reduces computation while preserving accuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why is hypothesis testing often described as making a \"decision\" rather than a \"discovery\"? (3 steps)", "answer": "- Step 1: Hypothesis testing produces a binary outcome: reject or do not reject $$H_0$$. This is a decision rule based on a pre-specified threshold (the significance level).\n- Step 2: The \"decision\" framing emphasizes that we're operating under uncertainty, with controlled error rates. We're not literally discovering whether the parameter equals a value; we're making a procedural choice that's calibrated to be wrong only some specified fraction of the time.\n- Step 3: This is different from \"discovery\" because:\n+ A real discovery would prove or disprove $$H_0$$.\n+ A test only provides probabilistic evidence — never certainty.\n+ The decision can be wrong (Type I or Type II error) even if all rules are followed.\n\nSo hypothesis testing is a *principled decision procedure*, not a truth-finding mechanism.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 46977, "out_tokens": 3972, "reasoning_chars": 2279, "cost_eur": 0.0582, "elapsed_s": 116, "content_chars": 13127}, "glm_2": {"run": 2, "provider": "glm", "mode const SK='s2ch07';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
