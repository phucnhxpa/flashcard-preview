<script>
const DATA={"selected": [{"question": "How does the formulation of $$H_1$$ determine whether a test is one-tailed or two-tailed? Provide an example of each for testing a coin's bias. (3 steps)", "answer": "- Step 1: The formulation of $$H_1$$ dictates the direction of the test. If $$H_1$$ specifies a direction (e.g., $$H_1: p > 0.5$$ or $$H_1: p < 0.5$$), it is a one-tailed test because we only look for extreme values in one tail of the distribution.\n- Step 2: If $$H_1$$ does not specify a direction, only that the parameter has changed (e.g., $$H_1: p \\neq 0.5$$), it is a two-tailed test because extreme values in either tail would lead us to reject $$H_0$$.\n- Step 3: For example, testing if a coin is biased towards heads ($$H_1: p>0.5$$) is one-tailed. Testing if a coin is simply biased in any direction ($$H_1: p \\neq 0.5$$) is two-tailed.\n\nOne-tailed tests look for \"better\" or \"worse\"; two-tailed tests look for \"different\".", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "For a two-tailed test on $$B(40, 0.25)$$ at the 2% level, the upper tail critical value is found to be 18 because $$P(X \\ge 18) = 0.0116$$, which is closer to 0.01 than $$P(X \\ge 19) = 0.0017$$. However, 0.0116 is greater than 0.01. Is it valid to include 18 in the critical region? Explain why. (2 steps)", "answer": "- Step 1: Yes, it is valid according to the standard convention for finding critical regions in these exams. The instruction \"as close as possible to\" takes precedence over the \"less than\" rule when they conflict.\n- Step 2: The discrete nature of the distribution means 0.0116 is the best available approximation to the 1% tail probability. 0.0017 is too far away and would make the test far too conservative. So, 18 is the critical value, and the actual significance level will simply be slightly higher than the nominal 2%.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "What is the fundamental difference between the \"significance level\" and the \"actual significance level\" of a hypothesis test? (2 steps)", "answer": "- Step 1: The significance level (often 5% or 1%) is the *threshold* probability you set before conducting the test. It defines the maximum acceptable risk of incorrectly rejecting a true null hypothesis that you are willing to tolerate.\n- Step 2: The actual significance level is the *exact* probability of falling into the critical region given that $$H_0$$ is true. Because discrete distributions (like Binomial or Poisson) cannot hit the threshold probability exactly, the actual significance level is usually slightly less than the threshold set, representing the true probability of a false positive for the chosen critical region.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Conceptually, what does the critical region represent in the probability distribution of the test statistic under $$H_0$$? (3 steps)", "answer": "- Step 1: The critical region is a range of values for the test statistic that are so extreme that they are very unlikely to occur if the null hypothesis ($$H_0$$) were true.\n- Step 2: If the observed test statistic falls into this region, the probability of observing such a value (or more extreme) under $$H_0$$ is less than the significance level.\n- Step 3: Conceptually, it represents the \"rejection zone\" where the evidence against $$H_0$$ is strong enough to discard the assumption that $$H_0$$ is correct.\n\nIt is the threshold of \"surprisingness\" that convinces us to change our minds.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "For a binomial test B(10, p), H₀: p = 0.4, H₁: p > 0.4 at α = 0.05, the critical region is X ≥ 8. Calculate the actual significance level and explain what it represents. (3 steps)", "answer": "- Step 1: Assuming H₀ is true (p = 0.4), calculate P(X ≥ 8) = P(X = 8) + P(X = 9) + P(X = 10).\n- Step 2: From binomial tables or calculator: P(X = 8) ≈ 0.0106, P(X = 9) ≈ 0.0016, P(X = 10) ≈ 0.0001. Sum ≈ 0.0123 or 1.23%.\n- Step 3: This 1.23% is the **actual significance level**—the true probability of incorrectly rejecting H₀ when it's actually true. It's much lower than our nominal 5% because discrete distributions force us to \"jump\" between achievable probabilities.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "In a Poisson hypothesis test for the rate of incoming calls, the textbook uses a two-tailed test with critical regions X ≤ 1 and X ≥ 12 for testing H₀: λ = 6.5 against H₁: λ ≠ 6.5. Why does the lower critical region start at 0 (i.e., {0, 1}) rather than just {0}? (2 steps)", "answer": "- Step 1: We need P(X ≤ c_lower) to be as close as possible to α/2 = 0.025 without exceeding it. Looking at Poisson(6.5) cumulative probabilities: P(X ≤ 0) = 0.0015, P(X ≤ 1) = 0.0113.\n- Step 2: P(X ≤ 0) = 0.0015 is less than 0.025 but if we include X = 1, P(X ≤ 1) = 0.0113 which is closer to 0.025. Similarly for upper tail, P(X ≥ 12) = 0.0339 is closer to 0.025 than P(X ≥ 13) = 0.0160. We choose the values closest to the target in each tail.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "A manufacturer claims their lightbulbs last 1000 hours on average. You suspect they last less. You test 50 bulbs and find average lifespan of 980 hours with standard deviation 80 hours. Why can't you use this data directly in the hypothesis testing methods from this chapter? (2 steps)", "answer": "- Step 1: This chapter covers hypothesis tests for **discrete distributions** (binomial counts, Poisson counts). The data here is **continuous** (lifespan in hours) with a sample mean.\n- Step 2: Testing a population mean with continuous data requires different methods—typically a **t-test** or **z-test** for the population mean, which are covered in different topics. The binomial/Poisson tests in Chapter 7 are specifically for count data.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "Why must we be particularly careful when interpreting a \"fail to reject\" conclusion in hypothesis testing? (2 steps)", "answer": "- Step 1: \"Fail to reject\" doesn't mean H₀ is true—it could mean either (a) H₀ is actually true, or (b) H₀ is false but our test lacked sufficient **statistical power** to detect the effect.\n- Step 2: With a small sample or high variability, even a genuine effect might not produce significant results. We might need a larger sample to detect a real difference. This is why sample size matters enormously in hypothesis testing.", "source": "MiniMax ①", "_id": "minimax_1_19"}, {"question": "When approximating a binomial by a normal in a hypothesis test, what is the *continuity correction* and why is it needed? (3 steps)", "answer": "- Step 1: The binomial is discrete (takes integer values), but the normal is continuous. Each integer value $$k$$ in the binomial corresponds to a region $$[k - 0.5, k + 0.5]$$ in the continuous approximation.\n- Step 2: When computing probabilities like $$P(X \\geq 75)$$ (binomial), we use $$P(W \\geq 74.5)$$ (normal), not $$P(W \\geq 75)$$ — the boundary shifts by 0.5.\n+ For $$P(X \\leq 35)$$ → $$P(W \\leq 35.5)$$.\n+ For $$P(X = k)$$ → $$P(k - 0.5 \\leq W \\leq k + 0.5)$$.\n- Step 3: Without the correction, you'd systematically misallocate probability mass at boundaries, leading to inaccurate test conclusions — especially near critical thresholds.\n\nThe 0.5 shift may seem small, but it can change a \"reject\" into a \"do not reject\" in borderline cases.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Without using mathematical notation, explain the conceptual difference between a one-tailed test and a two-tailed test in the context of testing a factory's defect rate. (2 steps)", "answer": "- Step 1: A one-tailed test is used when you are specifically looking for a change in *one direction*. For a defect rate, you might only care if the rate has *increased* (things got worse), or if it has *decreased* (a new process improved things). You are not interested in the other direction.\n- Step 2: A two-tailed test is used when you are looking for *any* change, either an increase or a decrease. For example, if you change the factory settings and just want to know if the defect rate is *different* from before, without a prior belief about whether it went up or down.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "Why does the *actual significance level* of a discrete-distribution test almost never equal the nominal level (e.g. 5%)? (3 steps)", "answer": "- Step 1: For a discrete distribution like $$B(n, p)$$, the test statistic only takes integer values. The cumulative probabilities $$P(X \\geq k)$$ jump in steps as $$k$$ varies — there are no in-between values.\n- Step 2: We choose the critical region by finding the largest set of extreme outcomes whose total probability is *at most* the nominal significance level. So we land just below the threshold, not exactly on it.\n+ E.g. $$P(X \\geq 7) = 0.0548$$ exceeds 5%, so we can't reject at 7.\n+ But $$P(X \\geq 8) = 0.0132$$ is below 5%, so the critical region is $$X \\geq 8$$.\n- Step 3: The actual significance level is then 0.0132 (1.32%), not 5%. It's the *true* probability of incorrectly rejecting $$H_0$$ given the test design — strictly less than the nominal target.\n\nThis conservatism is unavoidable for discrete distributions — you can't fine-tune the rejection probability to be exactly 5%.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Why is the actual significance level of a hypothesis test sometimes called the \"probability of incorrectly rejecting $$H_0$$\"? (3 steps)", "answer": "- Step 1: The critical region is the set of test statistic values that lead to rejection. The probability of the test statistic landing there, *computed under the assumption that $$H_0$$ is true*, equals the actual significance level.\n- Step 2: If $$H_0$$ is in fact true, then any rejection is a false rejection — an error. The probability of this error happening is exactly the probability of being in the critical region under $$H_0$$.\n- Step 3: So the actual significance level *is* the probability that a test wrongly rejects $$H_0$$. It directly quantifies the false-alarm rate of the test design.\n\nThis is why it's also called the \"Type I error rate\" — it's the rate of falsely flagging a true $$H_0$$ as wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "When would using a *Poisson* hypothesis test be more appropriate than a *binomial* test, even though both deal with counts? (3 steps)", "answer": "- Step 1: Use Poisson when:\n+ Events occur in a *continuous interval* (time, space) at some rate per unit interval.\n+ There's no fixed \"number of trials\" — you observe whatever happens in a period.\n+ Events are independent and rare per very small subinterval.\n- Step 2: Use binomial when:\n+ There's a *fixed number* of independent trials, each with two outcomes.\n+ Each trial has the same probability $$p$$ of success.\n- Step 3: Examples:\n+ Number of phone calls in a 20-minute window → Poisson (continuous time, no fixed \"trials\").\n+ Number of heads in 10 coin flips → Binomial (10 fixed trials).\n\nThe structural difference is whether the sample size is fixed (binomial) or whether you're just counting events in an interval (Poisson).", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In the context of hypothesis testing, what does it mean to say a test is \"conservative,\" and what is the practical implication? (2 steps)", "answer": "- Step 1: A conservative test has an actual significance level LOWER than the nominal (stated) level. For example, a test claiming 5% significance but actually having 3% is conservative.\n- Step 2: This means the test has lower power — it's less likely to detect real effects because the critical region is smaller. We might miss genuine discoveries. The trade-off is reduced Type I error at the cost of increased Type II error.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "In hypothesis testing, what is the conceptual difference between a *hypothesis* and a *test statistic*, and why do we need both? (3 steps)", "answer": "- Step 1: A **hypothesis** is a *statement* about the value of a population parameter — for instance, claiming $$p = 0.4$$ for a binomial proportion, or $$\\lambda = 6.5$$ for a Poisson rate. It's a guess about the *underlying truth* of the population we cannot directly observe.\n- Step 2: A **test statistic** is a *number* calculated from a sample or experiment — for instance, the count $$X$$ of heads in 8 coin flips. We can actually observe and measure this; it gives us a window into the population.\n- Step 3: We need both because a hypothesis lives in the realm of the population (unobservable) while a test statistic lives in the realm of the sample (observable). The whole point of hypothesis testing is to use the *observable* (test statistic) to make an inference about the *unobservable* (population parameter).\n\nThe bridge is built by asking: *\"If the hypothesis were true, how likely would we observe a test statistic this extreme?\"*", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What is the *critical value*, and how does it relate to the critical region? (2 steps)", "answer": "- Step 1: The **critical value** is the *first* (boundary) value to fall *inside* the critical region — the smallest \"extreme enough\" value to trigger rejection.\n- Step 2: For an upper-tail test, if the critical value is $$x = 8$$, the critical region is $$\\{8, 9, 10, \\ldots\\}$$, i.e. $$X \\geq 8$$. The critical value is the gateway: cross it, and you're in rejection territory.\n\nIt's a single anchor point that defines where the rejection zone begins.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "How do you apply the continuity correction when calculating $$P(X \\ge 15)$$ for a discrete variable approximated by a continuous Normal variable? (3 steps)", "answer": "- Step 1: We are dealing with a discrete variable $$X$$ approximated by a continuous variable $$W$$.\n- Step 2: The discrete probability $$P(X \\ge 15)$$ includes the entire bar at $$x=15$$.\n- Step 3: To capture this entire area under the continuous curve, we must start slightly below 15. Therefore, we apply the continuity correction by calculating $$P(W > 14.5)$$.\n\nWe \"scoop\" 0.5 into the region to include the full bar at the boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Why might we prefer to use the Poisson approximation to binomial (rather than the exact binomial calculation) when testing H₀: p = 0.001 with n = 1000? (2 steps)", "answer": "- Step 1: With p = 0.001 and n = 1000, the exact binomial B(1000, 0.001) has expected value np = 1. Computing exact binomial probabilities for each value from 0 to 1000 would be extremely tedious and impractical.\n- Step 2: Since n is large and p is small (np = 1 < 5), the Poisson approximation with λ = np = 1 gives excellent accuracy. We can quickly look up P(X ≥ k) using Poisson tables or calculator functions rather than summing thousands of binomial terms.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "When can a binomial $$B(n, p)$$ distribution be approximated by a *normal* distribution for hypothesis testing? (3 steps)", "answer": "- Step 1: The conditions are:\n+ $$n$$ is large.\n+ $$p$$ is close to 0.5 (so $$np$$ and $$n(1-p)$$ are both reasonably large).\n- Step 2: The binomial is approximately $$N(np, np(1-p))$$ in this regime — the central limit theorem kicks in because each Bernoulli trial contributes a small additive piece, and a sum of many such pieces tends to normal.\n- Step 3: This is useful when neither exact binomial calculation nor Poisson approximation works (because $$p$$ is not small). Normal approximation has the bonus of letting you use $$z$$-scores for any threshold, not just tabulated values.\n\nThe key is that the binomial distribution is *symmetric and bell-shaped* when $$p \\approx 0.5$$, matching the normal shape.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "In hypothesis testing, why do we say we \"fail to reject\" the null hypothesis rather than \"accepting\" it? (3 steps)", "answer": "- Step 1: The null hypothesis H₀ represents what we assume to be true before collecting data. We only have evidence against it, not proof that it's false.\n- Step 2: When we \"fail to reject\" H₀, it means the data we observed is consistent with what we'd expect if H₀ were true—it doesn't prove H₀ is correct, just that we couldn't find evidence against it.\n- Step 3: This is a fundamental principle: absence of evidence is not evidence of absence. There might be a real effect we're too insensitive to detect, or we might need more data.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "A factory tests 2000 lightbulbs and finds 12 faulty. Old machine had 0.3% fault rate. Why is this a good candidate for a Poisson approximation in hypothesis testing? (3 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(2000, 0.003)$$. Direct binomial computation would involve $$\\binom{2000}{12}$$ — a huge number. Tables don't typically go to $$n = 2000$$.\n- Step 2: Conditions for Poisson approximation:\n+ $$n = 2000$$ is very large. ✓\n+ $$p = 0.003$$ is very small. ✓\n+ $$np = 6$$ is moderate.\n- Step 3: So we approximate $$X \\approx Po(6)$$. This makes the calculations tractable using Poisson tables. The error is negligible because $$n$$ is very large and $$p$$ very small — exactly the conditions where Poisson is an excellent approximation.\n\nThe shift from binomial to Poisson reduces computation while preserving accuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "A test statistic $$X \\sim B(25, 0.3)$$ is used to test $$H_0: p = 0.3$$ against $$H_1: p \\neq 0.3$$ at the 5% level. An observed value of $$x = 10$$ is recorded. Why must we calculate $$P(X \\ge 10)$$ rather than $$P(X \\le 10)$$? (2 steps)", "answer": "- Step 1: In a two-tailed test, you must test in the direction of the observed value relative to the expected value. The expected value under $$H_0$$ is $$E(X) = np = 25 \\times 0.3 = 7.5$$.\n- Step 2: Since the observed value (10) is greater than the expected value (7.5), it lies in the upper half of the distribution. Therefore, we look for extreme values in the upper tail by calculating $$P(X \\ge 10)$$. We then compare this to half the significance level (2.5%).", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "Why does the binomial cumulative table list $$P(X \\leq x)$$ rather than $$P(X = x)$$ or $$P(X \\geq x)$$? (3 steps)", "answer": "- Step 1: Hypothesis tests typically need *cumulative* probabilities — the chance of seeing \"$$X$$ at or below\" or \"$$X$$ at or above\" a value, not just exactly equal to.\n- Step 2: $$P(X \\leq x)$$ is the most fundamental cumulative form. From it, we can derive:\n+ $$P(X \\geq x) = 1 - P(X \\leq x - 1)$$.\n+ $$P(X = x) = P(X \\leq x) - P(X \\leq x - 1)$$.\n+ $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a - 1)$$.\n- Step 3: Tabulating $$P(X \\leq x)$$ allows efficient computation of all these forms with simple arithmetic. Listing $$P(X = x)$$ would require summing many entries; listing $$P(X \\geq x)$$ would just be a re-encoding.\n\nThe choice reflects what's most useful for hypothesis testing.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "When carrying out a one-tailed hypothesis test, there are two common methods: the probability method and the critical region method. Conceptually, how do these two approaches differ in the way they use the observed test statistic? (2 steps)", "answer": "- Step 1: The probability method works \"backwards\" from the observation. You assume $$\\mathrm{H}_0$$ is true, then calculate the probability of observing a value as extreme as, or more extreme than, your test statistic. You then compare this probability directly to the significance level.\n- Step 2: The critical region method works \"forwards\" from the significance level. You first determine the critical region (the set of extreme values that would trigger a rejection) using the significance level. Then, you simply check if your observed test statistic falls inside or outside this pre-defined region.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Why might we use an approximation (normal or Poisson) instead of exact binomial/Poisson calculations in hypothesis testing? What are the trade-offs? (3 steps)", "answer": "- Step 1: When n is large (like 100, 500, or 1000), calculating exact binomial probabilities becomes computationally intensive and impractical without technology. Approximations simplify this.\n- Step 2: **Trade-off**: Approximations introduce some error. The normal approximation error is small when conditions are met, but if conditions aren't satisfied, results can be inaccurate. The Poisson approximation is accurate when p is very small and n is large.\n- Step 3: In exams, approximations save time. For n = 100, using binomial would require summing 101 terms; normal approximation gives the answer in one standardized calculation.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "If two independent observations of the test statistic both fall inside the critical region, how does the probability of incorrectly rejecting $$H_0$$ change compared to just one observation? (3 steps)", "answer": "- Step 1: Let the probability of one observation falling in the critical region (and thus incorrectly rejecting $$H_0$$ for that single observation) be $$\\alpha$$ (the actual significance level).\n- Step 2: If two independent observations are taken, the probability of *both* falling in the critical region is $$\\alpha \\times \\alpha = \\alpha^2$$.\n- Step 3: Since $$\\alpha$$ is typically a small number (like 0.05), $$\\alpha^2$$ (0.0025) is much smaller. The probability of incorrectly rejecting $$H_0$$ based on two independent observations both being in the critical region is significantly reduced.\n\nMultiple pieces of extreme evidence make a false positive much less likely.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "Why is it incorrect to write a null hypothesis as $$H_0: p > 0.5$$? What does this reveal about the nature of $$H_0$$? (3 steps)", "answer": "- Step 1: The null hypothesis must always be a statement of equality (e.g., $$p=0.5$$) because we need a specific value for the population parameter to calculate probabilities.\n- Step 2: If $$H_0$$ were an inequality like $$p > 0.5$$, we wouldn't know which specific value of $$p$$ to use to set up our distribution (e.g., $$B(n, p)$$).\n- Step 3: Therefore, $$H_0$$ provides the exact parameter value needed to construct the test statistic's distribution under the assumption that $$H_0$$ is true.\n\nWithout an exact value in $$H_0$$, we cannot calculate the probability of the observed outcome, which is the core mechanism of the test.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "When testing a Poisson rate, why must you adjust $$\\lambda$$ to match the *interval length* over which the data was collected? (3 steps)", "answer": "- Step 1: The Poisson rate $$\\lambda$$ describes the *expected number of events per unit interval*. If the original rate is \"0.325 calls per minute,\" that's per-minute.\n- Step 2: If you collect data over a different interval (e.g. 20 minutes), the expected number of events scales linearly: $$\\lambda_{20} = 20 \\times 0.325 = 6.5$$ for the 20-minute window.\n- Step 3: The hypothesis test uses the appropriate $$\\lambda$$ for the *observation window*. Forgetting this scaling is a common error: you'd be comparing observed counts (over a longer window) against a rate parameter for a shorter window.\n\nThe Poisson distribution's defining property — independence and constant rate — is what makes this linear scaling work.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Why is it important to \"write a conclusion in the context of the question\" rather than just saying \"reject $$H_0$$\"? (3 steps)", "answer": "- Step 1: Statistical jargon like \"reject $$H_0$$\" is precise but meaningless to non-statisticians.\n- Step 2: A conclusion must relate the statistical finding back to the original real-world question.\n- Step 3: For example, instead of \"reject $$H_0$$\", saying \"there is sufficient evidence to suggest the dice is biased towards landing on 6\" directly answers the research question in plain language.\n\nThe math serves the real-world problem; the conclusion bridges the gap.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Why must we be careful with the wording when interpreting \"no evidence to reject $$H_0$$\" vs \"evidence to support $$H_0$$\"? (3 steps)", "answer": "- Step 1: \"No evidence to reject $$H_0$$\" means the data is consistent with $$H_0$$, but doesn't prove it true. The data simply isn't extreme enough to overturn the assumption.\n- Step 2: \"Evidence to support $$H_0$$\" wrongly implies the test gives positive backing for $$H_0$$. But a hypothesis test is *asymmetric*: it can only provide evidence *against* $$H_0$$, not for it.\n- Step 3: Failure to reject can mean:\n+ $$H_0$$ is true.\n+ $$H_0$$ is false but the test wasn't powerful enough to detect the difference (small sample, small effect, etc.).\n+ The data was just unlucky to land in the acceptance region.\n\nSo \"no evidence to reject\" is a careful, honest statement; \"evidence to support\" overclaims the result.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "A student observes a value of 4 in a $$\\mathrm{B}(50, 0.02)$$ test for $$\\mathrm{H}_0: p=0.02$$ vs $$\\mathrm{H}_1: p \\neq 0.02$$. They calculate $$\\mathrm{P}(X \\le 4)$$ because 4 is a small number. Why might this be the wrong tail to check? (2 steps)", "answer": "- Step 1: You must compare the observed value to the expected value, which is $$np = 50 \\times 0.02 = 1$$. \n- Step 2: The observed value of 4 is actually *greater* than the expected value of 1. Therefore, 4 lies in the upper tail of the distribution, and the student should be calculating $$\\mathrm{P}(X \\ge 4)$$, not $$\\mathrm{P}(X \\le 4)$$. Always check the expected value, not just the magnitude of the number!", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "Why do we *assume the null hypothesis is true* when carrying out a hypothesis test, even though we may suspect it's wrong? (3 steps)", "answer": "- Step 1: Assuming $$H_0$$ is true gives us a complete, calculable probability distribution. Under $$H_0: p = 0.4$$ with $$n = 20$$, we know $$X \\sim B(20, 0.4)$$ and can compute any probability we want.\n- Step 2: With that calculable distribution in hand, we can ask the key question: *\"How surprising would the observed data be, if $$H_0$$ were true?\"*\n+ If extremely surprising (probability below the significance level), we conclude $$H_0$$ is likely false → reject.\n+ If not surprising, we have no compelling reason to abandon $$H_0$$ → do not reject.\n- Step 3: This is a \"proof by contradiction\" style of reasoning. We don't try to prove $$H_0$$ true; we try to see if it can be ruled out by the evidence. The asymmetry is deliberate: $$H_0$$ is the \"default\" assumption that takes evidence to overturn.\n\nThis is why we never \"accept\" $$H_0$$ — failing to reject doesn't mean it's true, only that we don't have enough evidence against it.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "A student observes 8 heads out of 10 coin tosses and defines their test statistic as \"the probability of getting a head, which is 0.8\". Explain why this is a misunderstanding of what a test statistic is, and provide the correct definition. (2 steps)", "answer": "- Step 1: The probability of getting a head ($$p$$) is a *population parameter*, not a test statistic. A population parameter is a fixed (but often unknown) true value for the whole population, whereas a test statistic is derived from the observed sample data.\n- Step 2: A test statistic is the random variable whose value is calculated from the sample or experiment. In this case, the test statistic is the *number of heads* observed in the 10 tosses. We use the observed value of the test statistic (8) to make inferences about the population parameter ($$p$$).", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "In the context of hypothesis testing, what does it mean for a result to be \"statistically significant\" versus \"practically significant\"? (2 steps)", "answer": "- Step 1: **Statistical significance** means the result is unlikely to have occurred by chance (given α). It tells us about the data, not about the real-world importance.\n- Step 2: **Practical significance** asks: \"Even if the effect is real, does it matter in practice?\" With large samples, tiny effects can be statistically significant but practically meaningless. For example, a new drug might statistically improve recovery rates by 0.1%—significant but clinically irrelevant. Both types of significance matter in interpretation.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Why is hypothesis testing often described as making a \"decision\" rather than a \"discovery\"? (3 steps)", "answer": "- Step 1: Hypothesis testing produces a binary outcome: reject or do not reject $$H_0$$. This is a decision rule based on a pre-specified threshold (the significance level).\n- Step 2: The \"decision\" framing emphasizes that we're operating under uncertainty, with controlled error rates. We're not literally discovering whether the parameter equals a value; we're making a procedural choice that's calibrated to be wrong only some specified fraction of the time.\n- Step 3: This is different from \"discovery\" because:\n+ A real discovery would prove or disprove $$H_0$$.\n+ A test only provides probabilistic evidence — never certainty.\n+ The decision can be wrong (Type I or Type II error) even if all rules are followed.\n\nSo hypothesis testing is a *principled decision procedure*, not a truth-finding mechanism.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "A test statistic has distribution $$\\mathrm{B}(50, p)$$. Given $$\\mathrm{H}_0: p = 0.7$$ and $$\\mathrm{H}_1: p \\neq 0.7$$, we find the critical region at the 10% level is $$X \\le 29$$ and $$X \\ge 41$$. The probability of a single observation falling in this region is 8.8%. If Chloe takes two observations and *both* fall in the critical region, she rejects $$\\mathrm{H}_0$$. What is the probability she has incorrectly rejected $$\\mathrm{H}_0$$? (3 steps)", "answer": "- Step 1: The probability of incorrectly rejecting $$\\mathrm{H}_0$$ is the probability of falling into the critical region when $$\\mathrm{H}_0$$ is actually true. For a single observation, this probability is given as 0.088 (the actual significance level).\n- Step 2: Since the two observations are independent, the probability of *both* falling in the critical region (assuming $$\\mathrm{H}_0$$ is true) is the product of their individual probabilities.\n- Step 3: Probability = $$0.088 \\times 0.088 = 0.007744$$, or about 0.77%. This shows that requiring multiple observations to fall in the critical region drastically reduces the chance of a Type I error.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "Why is hypothesis testing for the Poisson rate $$\\lambda$$ structurally similar to testing for the binomial proportion $$p$$? (3 steps)", "answer": "- Step 1: Both binomial and Poisson are *discrete* distributions with a single parameter ($$p$$ or $$\\lambda$$) describing the rate at which \"events of interest\" occur.\n- Step 2: The hypothesis testing logic is identical:\n+ Set up $$H_0$$ specifying the parameter value.\n+ Compute probabilities of observed data under $$H_0$$.\n+ Compare to the significance level.\n+ Reject or fail to reject based on the comparison.\n- Step 3: The only difference is which distribution we use to compute the probabilities — Poisson tables/formulas instead of binomial. The conceptual machinery, including critical regions, one/two-tailed splits, and significance comparisons, is the same.\n\nThis is why mastering the binomial case transfers almost directly to Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "What distinguishes a one-tailed test from a two-tailed test in terms of the *question being asked*? (3 steps)", "answer": "- Step 1: A **one-tailed test** asks a directional question: \"Has the parameter *increased*?\" or \"Has the parameter *decreased*?\" The researcher has a prior belief about *which way* the parameter has moved.\n+ Form: $$H_1: p > p_0$$ or $$H_1: p < p_0$$\n- Step 2: A **two-tailed test** asks a non-directional question: \"Has the parameter *changed at all*?\" The researcher doesn't care or doesn't know which direction; any deviation from $$H_0$$ is of interest.\n+ Form: $$H_1: p \\neq p_0$$\n- Step 3: The choice has real consequences: a two-tailed test is \"harder to pass\" because you must split the rejection probability across both tails — each tail gets only half the significance level. A one-tailed test concentrates all the rejection probability on the side you suspect, making it more sensitive *if your direction is correct*, but useless if the truth lies the other way.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "For a two-tailed test on $$X \\sim B(n, p)$$ with observed value $$x$$, how do you decide *which tail* to test in? (3 steps)", "answer": "- Step 1: Compute the expected value under $$H_0$$: $$E(X) = np$$. This is what we'd \"expect\" to see if $$H_0$$ were true.\n- Step 2: Compare the observed $$x$$ to $$np$$:\n+ If $$x < np$$, the observation is on the *lower* tail — compute $$P(X \\leq x)$$.\n+ If $$x > np$$, the observation is on the *upper* tail — compute $$P(X \\geq x)$$.\n- Step 3: You only test the tail in which the observation actually lies. The other tail is irrelevant for deciding whether *this* observation is extreme; we only need to ask \"how unusual is the deviation in the direction it actually occurred?\"\n\nThis is why even though the test is two-tailed, the practical computation involves only one tail.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Edge case: If finding a critical region for a lower-tailed test $$B(10, 0.1)$$ at 5%, and $$P(X \\le 0) = 0.3487$$, what does this imply about the critical region and the test's ability to detect a decrease in $$p$$? (3 steps)", "answer": "- Step 1: If $$P(X \\le 0) = 0.3487$$, this means that even the most extreme possible value for the test statistic (0) is not unlikely enough under $$H_0$$ (it happens ~35% of the time).\n- Step 2: This implies that the critical region is empty (or consists only of impossible values) for the given significance level.\n- Step 3: Consequently, the test has virtually no power to detect a decrease in $$p$$ at this significance level with this sample size; it is impossible to reject $$H_0$$ even if the observed value is as small as it can possibly be.\n\nWith too small a sample or too strict a significance level, a test may be unable to detect any effect.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "What does the significance level of a hypothesis test (e.g. 5%) actually represent? (3 steps)", "answer": "- Step 1: The significance level is the *threshold probability* at which we decide an observation is \"too extreme\" to be consistent with $$H_0$$.\n- Step 2: Equivalently, it's the *maximum probability of incorrectly rejecting $$H_0$$* that we are willing to tolerate. A 5% significance level means: \"I'll accept up to a 5% chance of falsely concluding $$H_0$$ is wrong, when actually it's right.\"\n- Step 3: Conceptually, it controls a kind of false-alarm rate. Smaller significance levels (1%) are stricter — they require stronger evidence to reject $$H_0$$, reducing false alarms but making true effects harder to detect. Larger levels (10%) are more permissive.\n\nThe choice of significance level reflects how much you fear a \"false positive\" conclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "A test rejects $$H_0$$ at the 5% level. Can you say \"the probability that $$H_0$$ is false is 95%\"? (3 steps)", "answer": "- Step 1: No — this is a classic misinterpretation. The 5% (or 95%) refers to a *long-run frequency* under repeated testing, not a probability about the truth of $$H_0$$ in this specific case.\n- Step 2: What we *can* say: \"If $$H_0$$ were true, observations this extreme would occur in less than 5% of repeated samples.\" So we treat $$H_0$$ as implausible *given the data*.\n- Step 3: The probability that $$H_0$$ is true or false is, in classical (frequentist) statistics, not a meaningful concept — $$H_0$$ is either true or false, full stop. The significance level is a property of the *testing procedure*, not the *hypothesis*.\n\nThis is a deep philosophical point: $$p$$-values measure how surprising data is, not how likely a hypothesis is.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A test statistic is what we calculate from our sample to perform the test. If we are testing whether the rate of calls to a call centre has increased, what would be the test statistic, and why is it crucial that its distribution can be modelled under the assumption that $$\\mathrm{H}_0$$ is true? (2 steps)", "answer": "- Step 1: The test statistic would be the number of calls observed in the given time interval. It is the random variable whose value we observe from the experiment.\n- Step 2: It is crucial to know its distribution under $$\\mathrm{H}_0$$ because we need a baseline to measure how \"extreme\" our observed result is. If we assume $$\\mathrm{H}_0$$ is true (e.g., the rate is exactly 5 calls per hour), we can calculate the probability of observing our test statistic (or something more extreme). If that probability is tiny, it suggests our assumption ($$\\mathrm{H}_0$$) might be wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Conceptually, why might a one-tailed test detect a real effect that a two-tailed test misses? (3 steps)", "answer": "- Step 1: A one-tailed test puts the *entire* significance budget (e.g. 5%) into one tail. The critical region in that single direction is therefore *larger* (further from extreme), making rejection easier.\n- Step 2: A two-tailed test splits the budget — say 2.5% in each tail. The critical region in each direction is *smaller* (more extreme threshold), making rejection harder for any single direction.\n- Step 3: So if the true effect is on the side you predicted with the one-tailed test, you have more statistical power to detect it. But if you guess the wrong direction, the one-tailed test will miss it entirely while a two-tailed test would still catch it.\n\nThe trade-off: one-tailed = more power if your guess is right, no chance if wrong. Two-tailed = less power but covers both bases.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Explain why the statement \"the probability that H₀ is true is less than 5%\" is incorrect, and what the p-value actually represents. (2 steps)", "answer": "- Step 1: The p-value is NOT the probability that H₀ is true! It cannot tell us the probability of any hypothesis being true. It only tells us how unusual our data would be *if H₀ were true*.\n- Step 2: The p-value = P(observed data or more extreme | H₀ is true). A p-value of 0.03 means: \"If nothing is going on (H₀ true), we'd only see data this extreme 3% of the time by chance.\" It says nothing directly about whether H₀ is actually true or false.", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "Conceptually, why is a two-tailed test's significance level typically *halved* between the two tails? (3 steps)", "answer": "- Step 1: The total probability of falsely rejecting $$H_0$$ (the actual false-positive rate) must stay within the significance level — say 5%.\n- Step 2: A two-tailed test rejects $$H_0$$ if the test statistic is *too low* OR *too high*. Both ends contribute to the total false-positive rate.\n+ If we put 5% probability in *each* tail, the total false-positive rate would be 10% — exceeding the budget.\n- Step 3: To keep the total at 5%, we split it evenly: 2.5% in each tail. Each tail contributes its share, summing to the agreed total significance level.\n\nThe intuition: you have a fixed \"error budget\" of 5%, and you must spend it across however many directions of rejection you've allowed.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "In a hypothesis test, the p-value is found to be 0.03. However, the researcher used a significance level of 1%. Explain whether she should reject H₀ and why. (2 steps)", "answer": "- Step 1: The p-value (0.03) is the probability of observing data as extreme as (or more extreme than) what was observed, ASSUMING H₀ is true.\n- Step 2: Since 0.03 > 0.01 (the chosen significance level), she should NOT reject H₀. The evidence is not strong enough at the 1% level, even though it would be sufficient at 5%. Using a stricter threshold requires stronger evidence. The 1% significance level demands more convincing proof before rejecting H₀.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "For $$X \\sim B(50, 0.02)$$, the expected value is 1, but a researcher observes $$x = 4$$. In a two-tailed test at 2% significance, which tail do they consider, and why is this counterintuitive at first glance? (3 steps)", "answer": "- Step 1: It might seem that $$x = 4$$ is \"small\" because 4 is a small number. But the *expected* value under $$H_0$$ is only $$50 \\times 0.02 = 1$$, so 4 is actually 4 times the expected value — quite large *relative to expectation*.\n- Step 2: Since $$4 > 1$$, the observation lies in the *upper* tail. We compute $$P(X \\geq 4)$$ to assess how unusual this is.\n- Step 3: The lesson: \"small\" or \"large\" must be judged relative to the distribution under $$H_0$$, not in absolute terms. With a low-probability event, small absolute counts can still be high deviations from expectation.\n\nThis is a common misconception trap in low-probability scenarios.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "What is the key difference between testing a binomial proportion and testing a Poisson mean, in terms of what parameter we're testing? (2 steps)", "answer": "- Step 1: For binomial, we're testing the **probability p** of success in each trial. The question is: \"Has the probability of success changed?\" Example: Has the coin's bias changed?\n- Step 2: For Poisson, we're testing the **rate λ** (mean number of events per interval). The question is: \"Has the average rate of events changed?\" Example: Has the number of phone calls per hour changed? Both use count data but frame the question differently.", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "What is the difference between a Type I error and a Type II error in hypothesis testing? Which one is controlled by the significance level? (3 steps)", "answer": "- Step 1: **Type I error** (false positive): Rejecting H₀ when it's actually true. This is a \"crying wolf\" error—we claim an effect that doesn't exist.\n- Step 2: **Type II error** (false negative): Failing to reject H₀ when it's actually false. This is missing a real effect—we let a true discovery go undetected.\n- Step 3: The **significance level α controls Type I error** risk. Choosing α = 0.05 means we're willing to accept a 5% chance of wrongly rejecting a true H₀. Type II error risk (β) is controlled by sample size—larger samples have more power to detect real effects.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "In hypothesis testing, we form two hypotheses: the null ($$\\mathrm{H}_0$$) and the alternative ($$\\mathrm{H}_1$$). Conceptually, what is the fundamental difference in the role each plays in the testing process? Why do we write them in terms of a population parameter rather than a sample statistic? (2 steps)", "answer": "- Step 1: The null hypothesis $$\\mathrm{H}_0$$ is the default assumption or status quo that we presume to be true unless evidence strongly suggests otherwise. The alternative hypothesis $$\\mathrm{H}_1$$ represents the research claim or the change we are investigating; it only becomes accepted if the data provides sufficient evidence against $$\\mathrm{H}_0$$.\n+ Think of $$\\mathrm{H}_0$$ as \"innocent until proven guilty\" and $$\\mathrm{H}_1$$ as the \"prosecution's charge.\"\n- Step 2: We write them in terms of population parameters (like $$p$$ or $$\\lambda$$) because hypothesis testing is about making inferences for the entire population, not just the observed sample. The sample statistic (like the observed count) is the evidence we use to test the hypothesis, not the hypothesis itself.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "A researcher obtains a p-value of 0.03 and rejects H₀ at α = 0.05. Later, she runs the same experiment again and gets a p-value of 0.07, failing to reject H₀. Explain why both outcomes could be correct. (2 steps)", "answer": "- Step 1: Both outcomes are consistent with randomness. With α = 0.05, we'd expect about 5% of true null hypotheses to be rejected by chance (Type I error). With p = 0.03 and p = 0.07, both are reasonably close to the boundary.\n- Step 2: This illustrates that p-values are **random variables**—they vary from sample to sample. One sample might give p = 0.03 (significant), another p = 0.07 (not significant). Neither is \"wrong\"—they reflect natural sampling variability. This is why replication and considering effect size matters.", "source": "MiniMax ①", "_id": "minimax_1_54"}, {"question": "Compare the conceptual difference between using a normal approximation and a Poisson approximation for binomial hypothesis testing. (3 steps)", "answer": "- Step 1: Both approximations replace tedious binomial calculations with easier ones. They differ in *when they work well*:\n+ Poisson: $$n$$ large, $$p$$ small (rare events).\n+ Normal: $$n$$ large, $$p$$ close to 0.5 (symmetric, bell-shaped).\n- Step 2: Each captures a different \"limiting behavior\" of the binomial:\n+ Poisson captures rare-event behavior — many trials, few successes, skewed shape.\n+ Normal captures aggregate behavior — many small contributions adding up to a bell curve.\n- Step 3: For hypothesis testing, the choice affects which tables/distributions you use:\n+ Poisson tables for Poisson approximation.\n+ Standard normal tables (with continuity correction) for normal approximation.\n\nBoth involve some loss of accuracy compared to exact binomial calculations, but enable practical computation in cases where exact methods are infeasible.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A hypothesis test for a Poisson rate is conducted with $$H_0: \\lambda = 5$$ and $$H_1: \\lambda < 5$$. The observed value is 2, and $$P(X \\le 2) = 0.125$$. A student concludes \"We accept $$H_0$$ because 0.125 is large\". Critique the language used in this conclusion. (2 steps)", "answer": "- Step 1: In statistics, we never \"accept\" the null hypothesis; we only \"fail to reject\" it or \"do not reject\" it. Accepting implies we have proven it true, which a hypothesis test cannot do.\n- Step 2: The correct interpretation is that there is \"insufficient evidence\" to reject $$H_0$$ at the given significance level. The data is consistent with $$H_0$$, but does not prove it. Furthermore, \"large\" is vague; the correct reasoning is that 0.125 is greater than the significance level (e.g., 0.05).", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "When testing a Poisson mean with a two-tailed test, how do we find the critical regions, and what should we consider about the expected value? (3 steps)", "answer": "- Step 1: For two-tailed Poisson test at significance α, each tail gets α/2. We find lower critical values where P(X ≤ c_lower) ≤ α/2, and upper critical values where P(X ≥ c_upper) ≤ α/2.\n- Step 2: Always consider the **expected value** (the mean under H₀) to determine which tail your observation falls in. If observed < expected, focus on the lower tail; if observed > expected, focus on the upper tail.\n- Step 3: The critical regions may not be symmetric! For a Poisson with small mean, you might get critical region X = 0, 1 in the lower tail and X ≥ some high number in the upper tail, depending on the distribution shape.", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "When using approximations in hypothesis testing, what's the *trade-off* between accuracy and computational ease? (3 steps)", "answer": "- Step 1: Exact methods (binomial, Poisson) give precise probabilities but can be computationally intensive — large factorials, many terms to sum, and tables that don't extend far enough.\n- Step 2: Approximations (Poisson for binomial, normal for binomial or Poisson) give faster, more accessible calculations but at the cost of some accuracy. The error is typically small when the approximation conditions are well met.\n- Step 3: For hypothesis testing near the significance threshold, this trade-off matters: an approximation might shift a borderline test from \"reject\" to \"do not reject\" or vice versa. So:\n+ Use exact methods when conditions are marginal or stakes are high.\n+ Use approximations when conditions are clearly met and computational ease matters.\n\nModern calculators have shifted the balance toward exact methods, but approximations remain useful for understanding and communication.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "What is the fundamental difference in the logical roles of the null hypothesis ($$H_0$$) and the alternative hypothesis ($$H_1$$) in a hypothesis test? (3 steps)", "answer": "- Step 1: The null hypothesis ($$H_0$$) is the \"status quo\" or the assumption we hold as true unless evidence strongly suggests otherwise. It is a specific statement about a population parameter (e.g., $$p=0.5$$).\n- Step 2: The alternative hypothesis ($$H_1$$) represents the research claim or the change we are testing for. It tells us about the parameter if $$H_0$$ is shown to be wrong (e.g., $$p>0.5$$).\n- Step 3: The test assumes $$H_0$$ is true to build a probability model, and then checks if the observed data is sufficiently unlikely under that model to favor $$H_1$$.\n\nThe null is the \"innocent until proven guilty\" assumption; the alternative is the \"guilty\" verdict we seek evidence for.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A researcher tests $$H_0: p = 0.4$$ vs $$H_1: p < 0.4$$ at the 5% level. The observed test statistic gives a probability of 0.06 under $$H_0$$. State the decision and explain the logic. (3 steps)", "answer": "- Step 1: The probability of observing data this extreme (or more extreme) under $$H_0$$ is 0.06, i.e. 6%.\n- Step 2: Compare this to the significance level of 5%. Since $$0.06 > 0.05$$, the observation is not extreme enough to cross our threshold.\n- Step 3: Decision: **Do not reject $$H_0$$**. There is insufficient evidence at the 5% level to support $$H_1$$.\n\nConceptually: 6% means \"if $$H_0$$ were true, this observation (or worse) would happen about 6% of the time\" — that's uncommon but not unusual enough to declare $$H_0$$ implausible by our chosen standard.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "When finding the critical region for a two-tailed test, the textbook says \"the probability in each tail should be as close as possible to\" half the significance level. Does this mean we can allow the probability in a tail to slightly exceed half the significance level if it is closer to it? Explain why or why not. (2 steps)", "answer": "- Step 1: No, the probability in a tail must never exceed half the significance level. The strict rule of hypothesis testing is that the probability of a Type I error (incorrectly rejecting $$\\mathrm{H}_0$$) must be kept at or below the stated significance level.\n- Step 2: \"As close as possible\" means we choose the critical value that brings the tail probability closest to the target (e.g., 0.025) *without going over it*. If $$\\mathrm{P}(X \\le 3) = 0.016$$ and $$\\mathrm{P}(X \\le 4) = 0.028$$, we must choose 3 as the critical value. Even though 0.028 is closer to 0.025, it violates the maximum allowable probability constraint.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "When testing $$H_0: p=0.3$$ against $$H_1: p>0.3$$ with an observed value of $$x$$, why do we calculate $$P(X \\ge x)$$ rather than $$P(X = x)$$? (3 steps)", "answer": "- Step 1: In hypothesis testing, we are assessing the likelihood of observing our data, or something more extreme, given that $$H_0$$ is true.\n- Step 2: The probability of observing exactly one specific value, $$P(X = x)$$, in a discrete distribution is usually very small, even if $$H_0$$ is true.\n- Step 3: Therefore, we calculate the cumulative probability $$P(X \\ge x)$$ (for an upper-tail test) to capture the probability of the observed value and all values that would provide even stronger evidence against $$H_0$$.\n\nWe care about the \"rarity\" of the evidence, not just the probability of one specific outcome.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "A researcher conducts 20 tests at α = 0.05 and finds statistically significant results in 2 of them. Why should she be cautious about claiming she has discovered 2 real effects? (2 steps)", "answer": "- Step 1: With α = 0.05, even when H₀ is TRUE in all 20 tests, we'd expect 1 false positive on average (5% of 20 = 1). Getting 2 significant results could easily be due to chance alone.\n- Step 2: This illustrates why we need **replication** and **careful interpretation**. Statistical significance doesn't guarantee practical significance or that the effect is real—it just means the result is unlikely under the null hypothesis by chance.", "source": "MiniMax ①", "_id": "minimax_1_36"}, {"question": "A test has H₀: p = 0.5, H₁: p > 0.5 with α = 0.05. The critical region is X ≥ 9. If you observe X = 8, what do you conclude? Explain the logic. (2 steps)", "answer": "- Step 1: With X = 8, we **fail to reject H₀**. The result is not statistically significant at the 5% level.\n- Step 2: However, 8 is *close* to the critical value of 9. This illustrates that the \"significance\" cutoff is somewhat arbitrary—there's little practical difference between X = 8 and X = 9. We might want to collect more data or consider the practical importance of the effect, not just the statistical decision.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "For a binomial test, when checking conditions for the normal approximation, you find np = 4.5 and n(1-p) = 5.5. Is this sufficient for a good approximation? Explain. (2 steps)", "answer": "- Step 1: The rule of thumb is typically np > 5 AND n(1-p) > 5 for a reasonable normal approximation. Here np = 4.5 is just under 5, and n(1-p) = 5.5 is just over.\n- Step 2: This is a **borderline case**—the approximation might be reasonable but not ideal. The approximation will likely be acceptable but could have noticeable error. If precision matters, either use exact binomial calculations or increase sample size. This is why some texts use > 5 strictly; others accept ≥ 5 as \"marginal.\"", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "What is the significance level of a test, and conceptually, what kind of error does it control the probability of committing? If the significance level is 5%, does this mean there is a 5% chance the null hypothesis is true? (2 steps)", "answer": "- Step 1: The significance level is the threshold probability we set before the test (e.g., 5% or 0.05). It controls the probability of a Type I error, which is incorrectly rejecting a true null hypothesis.\n- Step 2: No, it does not mean there is a 5% chance $$\\mathrm{H}_0$$ is true. The 5% significance level means that *if* $$\\mathrm{H}_0$$ were true, there is a 5% chance of observing a test statistic extreme enough to make us wrongly reject it. It is a conditional probability: $$\\mathrm{P}(\\text{Reject } \\mathrm{H}_0 \\mid \\mathrm{H}_0 \\text{ is true}) \\le 0.05$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "A doctor tests if a new medicine improves the cure rate from 40%. They observe 11 cures out of 20 patients. A student calculates $$P(X = 11)$$ under $$H_0$$ and compares it to 5%. Explain the flaw in this calculation. (2 steps)", "answer": "- Step 1: The student has only calculated the probability of getting *exactly* 11 cures. In hypothesis testing, we care about the probability of observing data *as extreme or more extreme* than what was observed, because we are looking for evidence against the null hypothesis in a whole tail of the distribution.\n- Step 2: The correct calculation is $$P(X \\ge 11)$$, which includes the probabilities of 11, 12, 13, ... up to 20. This cumulative probability represents the total chance of seeing evidence this strong or stronger against $$H_0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Explain why \"$$P(X \\geq 8) = 0.0132 < 0.05$$\" supports rejecting $$H_0$$ in a one-tailed upper test. (3 steps)", "answer": "- Step 1: $$P(X \\geq 8) = 0.0132$$ means: under $$H_0$$, an outcome of 8 or higher would occur only 1.32% of the time.\n- Step 2: That's less than the 5% threshold we set. In other words, an observation of 8 (or worse) is *more extreme than our 5% bar of plausibility*.\n- Step 3: So observing $$X = 8$$ provides strong enough evidence to declare $$H_0$$ implausible. We reject $$H_0$$ — the data is unusual enough that the assumed parameter value seems wrong.\n\nNumerically: we crossed the threshold from \"could happen by chance\" into \"very unlikely under $$H_0$$\" territory.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Explain why the statement \"rejecting $$H_0$$ at 5%\" is *stronger* than \"rejecting $$H_0$$ at 10%\" but *weaker* than \"rejecting $$H_0$$ at 1%\". (3 steps)", "answer": "- Step 1: A smaller significance level means a stricter rejection threshold — only very extreme observations cross the bar. Rejecting at 1% requires more evidence than rejecting at 5%, which requires more than rejecting at 10%.\n- Step 2: So if a test rejects at 1%, it would also reject at 5% and at 10% (since the data is even more clearly in the rejection zone of those weaker thresholds).\n- Step 3: Conversely, rejecting at 10% might not reject at 5%, and rejecting at 5% might not reject at 1%. Stronger evidence overturns more thresholds.\n\nThis is why scientific papers often report multiple significance levels — a result significant at 1% is much more convincing than one significant at 10%.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "In a Poisson hypothesis test, the rate is 0.325 calls per minute. The researcher records 1 call in 10 minutes. Explain the setup conceptually. (3 steps)", "answer": "- Step 1: The 10-minute observation window means the relevant Poisson parameter is $$\\lambda_{10} = 10 \\times 0.325 = 3.25$$. The expected number of calls in 10 minutes under $$H_0$$ is 3.25.\n- Step 2: Observed value is 1 call. Since $$1 < 3.25$$, the observation is in the *lower* tail. For a one-tailed test that the rate has decreased, we test $$H_1: \\lambda < 3.25$$.\n- Step 3: We compute $$P(Y \\leq 1)$$ under $$Y \\sim Po(3.25)$$ and compare to the significance level. If small enough, reject $$H_0$$ and conclude the rate has decreased.\n\nThis shows how to scale $$\\lambda$$ to match the observation window before testing.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Why is the null hypothesis $$H_0$$ always written as an *equality* (e.g. $$p = 0.4$$) rather than an inequality? (3 steps)", "answer": "- Step 1: The whole machinery of hypothesis testing requires us to *calculate probabilities* of observing the test statistic. To do that, we must have a fully specified distribution.\n- Step 2: A specific value like $$p = 0.4$$ gives us exactly one distribution: $$X \\sim B(n, 0.4)$$. We can compute every probability from this.\n+ If we tried $$H_0: p > 0.4$$, we would have infinitely many distributions to consider and no single probability calculation would be possible.\n- Step 3: $$H_0$$ is the \"anchor\" — it pins down a precise distribution so we can ask \"given this assumed truth, how unusual is what we saw?\" The alternative $$H_1$$ is then deliberately *vague* (e.g. $$p > 0.4$$, $$p < 0.4$$, or $$p \\neq 0.4$$) because it represents the direction we'd believe in if $$H_0$$ fails.\n\nThe asymmetry between $$H_0$$ (precise) and $$H_1$$ (a region) is structural, not arbitrary.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "When testing a coin for bias, a student writes $$H_1: p = 0.6$$. Explain conceptually why this is wrong, and what they should write instead. (3 steps)", "answer": "- Step 1: The alternative hypothesis is meant to capture *all* possibilities that conflict with $$H_0$$ in a particular direction. Writing $$H_1: p = 0.6$$ picks one specific value, but bias toward heads could mean $$p = 0.55$$, $$p = 0.7$$, $$p = 0.9$$, etc.\n- Step 2: $$H_1$$ should describe a *region* of parameter values, not a single point. The correct forms are:\n+ $$H_1: p > 0.5$$ (bias toward heads)\n+ $$H_1: p < 0.5$$ (bias toward tails)\n+ $$H_1: p \\neq 0.5$$ (bias either direction — two-tailed)\n- Step 3: Conceptually, $$H_1$$ must be broad because we're not testing a competing specific theory; we're testing whether $$H_0$$ is implausible *in some direction*. Rejection of $$H_0$$ tells us only \"the parameter is probably on this side of the assumed value,\" not exactly where.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "What's the *purpose* of computing the actual significance level of a hypothesis test, given that we already know the nominal level? (3 steps)", "answer": "- Step 1: The nominal level (e.g. 5%) is what we *aimed for*. The actual level is what we *got* given the discreteness of the distribution.\n- Step 2: Reporting it serves several functions:\n+ Honesty: tells the reader the true false-positive rate of the test.\n+ Comparison: lets you compare different test designs (e.g. \"this test is at 4.52% actual vs 4.7% actual\").\n+ Insight: a much-lower-than-nominal actual level suggests your test is being unduly conservative — you might want to redesign with a different sample size.\n- Step 3: It's the difference between \"I aimed at 5%\" and \"I actually shot at 4.52%.\" Both are useful pieces of information, especially when fine-tuning a study or comparing tests.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why might a researcher choose α = 0.01 instead of α = 0.05 for a hypothesis test? What are the trade-offs? (2 steps)", "answer": "- Step 1: Choosing a **lower α** (like 0.01) makes us more stringent—we're less likely to make a Type I error (false positive). This is appropriate when the consequences of falsely claiming an effect are severe (e.g., medical trials, safety claims).\n- Step 2: The **trade-off** is increased Type II error risk (β)—we're less likely to detect a real effect. It's harder to achieve statistical significance, so we might miss genuine discoveries. The choice depends on the relative costs of Type I vs Type II errors in context.", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "A test statistic follows B(20, p) and we're testing H₀: p = 0.15 against H₁: p < 0.15 at 5% significance. The critical region is X = 0 only. What is the actual significance level, and why might a researcher be concerned about it? (2 steps)", "answer": "- Step 1: The actual significance level is P(X = 0) when X ~ B(20, 0.15). Using binomial: P(0) = (0.85)²⁰ ≈ 0.035. This is 3.5%, less than 5%.\n- Step 2: The concern is that our test is \"conservative\" — we might miss real effects because the critical region is very small (only X = 0). With a larger sample size, we could get a critical region like {0, 1, 2} with actual significance closer to 5%. The chosen threshold limits the test's power to detect a real decrease in p.", "source": "MiniMax ②", "_id": "minimax_2_13"}, {"question": "When using a Normal approximation for a Binomial hypothesis test, why is the continuity correction essential? What happens if you omit it? (3 steps)", "answer": "- Step 1: The Normal distribution is continuous, meaning it assigns zero probability to any exact single value. The Binomial distribution is discrete.\n- Step 2: When approximating a discrete distribution with a continuous one, the discrete bars (e.g., at $$x=15$$) must be represented by a continuous area.\n- Step 3: The continuity correction adjusts the boundaries by 0.5 to ensure the area under the Normal curve matches the height of the discrete bars. Omitting it leads to a systematic error in the calculated probability, often making it harder to reject $$H_0$$ (or easier, depending on the tail).\n\nIt compensates for the \"gaps\" between discrete integer values.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "A test statistic $$X \\sim \\mathrm{B}(10, 0.4)$$ is used to test $$\\mathrm{H}_0: p=0.4$$ against $$\\mathrm{H}_1: p>0.4$$ at the 5% level. We find $$\\mathrm{P}(X \\ge 7) = 0.0548$$ and $$\\mathrm{P}(X \\ge 8) = 0.0132$$. What is the critical value and critical region? Explain why we don't include 7 in the critical region even though 0.0548 is close to 0.05. (2 steps)", "answer": "- Step 1: The critical value is 8 and the critical region is $$X \\ge 8$$. \n- Step 2: We do not include 7 because the probability of observing 7 or more ($$0.0548$$) exceeds our significance level of 0.05. If we included 7, the probability of incorrectly rejecting $$\\mathrm{H}_0$$ would be $$5.48\\%$$, which is greater than the $$5\\%$$ limit we set. Therefore, we must go one step further to 8, where the probability ($$1.32\\%$$) is safely below the threshold.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "When finding the critical region for a two-tailed test, the rule is to find the probability in each tail \"as close as possible\" to half the significance level. Why do we choose the probability *closest* to the target rather than just *less than* the target? (2 steps)", "answer": "- Step 1: In discrete distributions, we cannot usually hit the exact target probability (like 0.025) because the random variable jumps from integer to integer. We are forced to choose a probability that is either slightly above or slightly below the target.\n- Step 2: We choose the probability \"as close as possible\" to maintain the integrity of the test's power. If we always chose the probability strictly less than the target, we might make the critical region too small, making it overly difficult to reject $$H_0$$ even when it is false. Choosing the closest value ensures the actual significance level is the best possible approximation to the intended level.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Explain why a hypothesis test is sometimes called a \"test of significance.\" (3 steps)", "answer": "- Step 1: \"Significance\" here means *statistical significance* — the result is unusual enough that we don't believe it occurred by random chance under $$H_0$$.\n- Step 2: The test asks: \"Is the observed effect *significantly* different from what $$H_0$$ predicts?\" — i.e., does it stand out from random variation?\n- Step 3: A \"significant\" result lets us reject $$H_0$$ in favor of $$H_1$$. A \"non-significant\" result means the effect (if any) could plausibly be just noise. Note: statistical significance ≠ practical importance — a tiny effect can be \"statistically significant\" with a huge sample but matter little in real terms.\n\nThe vocabulary highlights the test's role in separating signal from noise.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why is it incorrect to use the binomial distribution to model the number of red balls when drawing balls FROM AN URN WITHOUT REPLACEMENT, even though each draw has two outcomes? (2 steps)", "answer": "- Step 1: The binomial distribution requires INDEPENDENT trials — the probability of success must stay constant across all trials. Without replacement, drawing one ball changes the composition of the urn, affecting subsequent probabilities.\n- Step 2: For example, drawing 2 red from 10 balls (where 4 are red) without replacement: P(first red) = 4/10 = 0.4, but P(second red | first red) = 3/9 ≈ 0.33. These probabilities differ, violating the binomial assumption. The hypergeometric distribution is the correct model here.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "In the context of hypothesis testing with the binomial distribution, explain why we always state the model as \"X ~ B(n, p)\" where p comes from H₀, not from the observed sample data. (2 steps)", "answer": "- Step 1: Hypothesis testing works by asking: \"IF H₀ were true (with p = value from H₀), how likely would we be to observe data this extreme?\" We're testing against a SPECIFIC hypothetical value.\n- Step 2: Using the observed sample proportion to set p would be circular reasoning — we'd be testing whether data differs from itself! We calculate the probability of our OBSERVED data assuming H₀ is TRUE. For example, if testing H₀: p = 0.4 with 11 successes in 20, we calculate P(X ≥ 11) with X ~ B(20, 0.4), NOT with p estimated from the sample.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "A doctor claims a new drug is better than the old one (success rate > 40%). In a trial of 20 patients, 11 are cured. The p-value is 12.75%. What is the correct conclusion, and why is the phrasing \"the new drug is no better than the old one\" technically a slight overstatement? (2 steps)", "answer": "- Step 1: The correct conclusion is \"There is insufficient evidence to reject $$\\mathrm{H}_0$$.\" Because 12.75% > 5%, the result is not statistically significant.\n- Step 2: Saying \"the new drug is no better\" implies we have proven $$\\mathrm{H}_0$$ to be true. Hypothesis testing cannot prove $$\\mathrm{H}_0$$; it can only fail to find enough evidence against it. A lack of evidence against the status quo does not mean the status quo is definitively true—it might just mean our sample was too small or the effect is too small to detect. We simply \"do not reject\" it.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Why do we use the **smallest** critical value that makes P(X in critical region | H₀) < α, rather than the largest value? (2 steps)", "answer": "- Step 1: We want the test to be as **powerful** as possible while maintaining the significance level. Using the smallest value gives us the largest possible critical region that still has probability < α.\n- Step 2: If we used a larger value, we'd have a smaller critical region and less power to detect a real effect. Using the smallest ensures we're not being unnecessarily strict—we reject H₀ for any value that's definitely surprising enough, maximizing our ability to detect real effects.", "source": "MiniMax ①", "_id": "minimax_1_52"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In hypothesis testing, we make an assumption about a population parameter and then use sample data to test it. What is the fundamental difference between the null hypothesis ($$H_0$$) and the alternative hypothesis ($$H_1$$) in terms of what they represent? (2 steps)", "answer": "- Step 1: The null hypothesis $$H_0$$ represents the \"status quo\" or the assumed state of the population parameter (like $$p$$ or $$\\lambda$$) before any testing occurs. It is the baseline assumption we take as true unless evidence strongly suggests otherwise.\n+ For example, if a coin is assumed fair, $$H_0: p = 0.5$$.\n- Step 2: The alternative hypothesis $$H_1$$ represents the research claim or the change in the parameter that we are testing for. It is what we conclude if the sample data provides sufficient evidence to reject the baseline assumption.\n+ For example, if we suspect the coin is biased towards heads, $$H_1: p > 0.5$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A researcher wants to test if a new drug increases the recovery rate from 60%. A colleague suggests writing $$H_0: p > 0.6$$ and $$H_1: p = 0.6$$. Explain the conceptual flaw in this setup. (2 steps)", "answer": "- Step 1: The null hypothesis $$H_0$$ must always contain the equality sign ($$=$$). This is because we need a specific, fixed value for the parameter to calculate the probability distribution under the assumption that $$H_0$$ is true. An inequality like $$p > 0.6$$ does not give a single specific probability to work with.\n- Step 2: The alternative hypothesis $$H_1$$ should represent the direction of the test (the claim being investigated). Since the researcher wants to test if the rate has *increased*, the alternative should capture this increase ($$H_1: p > 0.6$$), leaving the baseline as the null ($$H_0: p = 0.6$$).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student observes 8 heads out of 10 coin tosses and defines their test statistic as \"the probability of getting a head, which is 0.8\". Explain why this is a misunderstanding of what a test statistic is, and provide the correct definition. (2 steps)", "answer": "- Step 1: The probability of getting a head ($$p$$) is a *population parameter*, not a test statistic. A population parameter is a fixed (but often unknown) true value for the whole population, whereas a test statistic is derived from the observed sample data.\n- Step 2: A test statistic is the random variable whose value is calculated from the sample or experiment. In this case, the test statistic is the *number of heads* observed in the 10 tosses. We use the observed value of the test statistic (8) to make inferences about the population parameter ($$p$$).", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "Without using mathematical notation, explain the conceptual difference between a one-tailed test and a two-tailed test in the context of testing a factory's defect rate. (2 steps)", "answer": "- Step 1: A one-tailed test is used when you are specifically looking for a change in *one direction*. For a defect rate, you might only care if the rate has *increased* (things got worse), or if it has *decreased* (a new process improved things). You are not interested in the other direction.\n- Step 2: A two-tailed test is used when you are looking for *any* change, either an increase or a decrease. For example, if you change the factory settings and just want to know if the defect rate is *different* from before, without a prior belief about whether it went up or down.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "Why does a hypothesis test never \"prove\" that the null hypothesis is true, even when we fail to reject it? (2 steps)", "answer": "- Step 1: A hypothesis test is designed to measure the strength of evidence *against* the null hypothesis. It calculates the probability of observing the sample data assuming $$H_0$$ is true. A high probability just means the data is consistent with $$H_0$$, not that $$H_0$$ is definitely true.\n- Step 2: Failing to reject $$H_0$$ simply means we do not have sufficient evidence to discard it. The true parameter could still be slightly different from the null value, but our sample wasn't large enough or extreme enough to detect that difference (a Type II error scenario). Thus, we \"do not reject\" rather than \"accept\".", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What is the fundamental difference between the \"significance level\" and the \"actual significance level\" of a hypothesis test? (2 steps)", "answer": "- Step 1: The significance level (often 5% or 1%) is the *threshold* probability you set before conducting the test. It defines the maximum acceptable risk of incorrectly rejecting a true null hypothesis that you are willing to tolerate.\n- Step 2: The actual significance level is the *exact* probability of falling into the critical region given that $$H_0$$ is true. Because discrete distributions (like Binomial or Poisson) cannot hit the threshold probability exactly, the actual significance level is usually slightly less than the threshold set, representing the true probability of a false positive for the chosen critical region.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "In a binomial distribution $$B(n, p)$$, the critical region for a one-tailed test ($$H_1: p > 0.2$$) at the 5% level is found to be $$X \\ge 8$$. Why is $$X = 7$$ not included in the critical region even though $$P(X \\ge 7)$$ is close to 5%? (2 steps)", "answer": "- Step 1: The critical region must consist of values where the probability of observing them (or more extreme values) is *less than or equal to* the significance level. If $$P(X \\ge 7)$$ is, say, 6%, including 7 would mean there is a 6% chance of incorrectly rejecting a true null hypothesis, which exceeds the 5% threshold.\n- Step 2: Therefore, we must exclude 7 and move to more extreme values until the cumulative probability drops below the threshold. $$X = 8$$ becomes the critical value because $$P(X \\ge 8)$$ is the first probability that satisfies the condition of being $$\\le 5\\%$$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A student finds the critical region for a two-tailed test at the 5% significance level by finding values where $$P(X \\le c_1) \\le 0.05$$ and $$P(X \\ge c_2) \\le 0.05$$. Explain the conceptual error in this approach. (2 steps)", "answer": "- Step 1: For a two-tailed test, the total significance level (5%) must be spl
