it between the two tails of the distribution. This is because we are looking for extreme values in *either* direction.\n- Step 2: Therefore, the probability in each tail must be as close as possible to half the total significance level. For a 5% test, the student should be looking for $$P(X \\le c_1) \\le 0.025$$ and $$P(X \\ge c_2) \\le 0.025$$. Using 0.05 in each tail would result in a total actual significance level of up to 10%, which is far too lenient.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "When finding the critical region for a two-tailed test, the rule is to find the probability in each tail \"as close as possible\" to half the significance level. Why do we choose the probability *closest* to the target rather than just *less than* the target? (2 steps)", "answer": "- Step 1: In discrete distributions, we cannot usually hit the exact target probability (like 0.025) because the random variable jumps from integer to integer. We are forced to choose a probability that is either slightly above or slightly below the target.\n- Step 2: We choose the probability \"as close as possible\" to maintain the integrity of the test's power. If we always chose the probability strictly less than the target, we might make the critical region too small, making it overly difficult to reject $$H_0$$ even when it is false. Choosing the closest value ensures the actual significance level is the best possible approximation to the intended level.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "For a two-tailed test on $$B(40, 0.25)$$ at the 2% level, the upper tail critical value is found to be 18 because $$P(X \\ge 18) = 0.0116$$, which is closer to 0.01 than $$P(X \\ge 19) = 0.0017$$. However, 0.0116 is greater than 0.01. Is it valid to include 18 in the critical region? Explain why. (2 steps)", "answer": "- Step 1: Yes, it is valid according to the standard convention for finding critical regions in these exams. The instruction \"as close as possible to\" takes precedence over the \"less than\" rule when they conflict.\n- Step 2: The discrete nature of the distribution means 0.0116 is the best available approximation to the 1% tail probability. 0.0017 is too far away and would make the test far too conservative. So, 18 is the critical value, and the actual significance level will simply be slightly higher than the nominal 2%.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "In a one-tailed hypothesis test, what is the conceptual difference between using the \"probability method\" and the \"critical region method\" to reach a conclusion? (2 steps)", "answer": "- Step 1: The probability method calculates the exact probability of observing the test statistic (or more extreme) under $$H_0$$, and then compares this single probability value directly against the significance level (e.g., is $$0.03 < 0.05$$?).\n- Step 2: The critical region method pre-defines a range of \"extreme\" values (the critical region) based on the significance level. You then simply check if your observed test statistic falls inside this range. Both methods are logically equivalent; one compares probabilities, the other compares values of the test statistic.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A doctor tests if a new medicine improves the cure rate from 40%. They observe 11 cures out of 20 patients. A student calculates $$P(X = 11)$$ under $$H_0$$ and compares it to 5%. Explain the flaw in this calculation. (2 steps)", "answer": "- Step 1: The student has only calculated the probability of getting *exactly* 11 cures. In hypothesis testing, we care about the probability of observing data *as extreme or more extreme* than what was observed, because we are looking for evidence against the null hypothesis in a whole tail of the distribution.\n- Step 2: The correct calculation is $$P(X \\ge 11)$$, which includes the probabilities of 11, 12, 13, ... up to 20. This cumulative probability represents the total chance of seeing evidence this strong or stronger against $$H_0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A test statistic $$X \\sim B(25, 0.3)$$ is used to test $$H_0: p = 0.3$$ against $$H_1: p \\neq 0.3$$ at the 5% level. An observed value of $$x = 10$$ is recorded. Why must we calculate $$P(X \\ge 10)$$ rather than $$P(X \\le 10)$$? (2 steps)", "answer": "- Step 1: In a two-tailed test, you must test in the direction of the observed value relative to the expected value. The expected value under $$H_0$$ is $$E(X) = np = 25 \\times 0.3 = 7.5$$.\n- Step 2: Since the observed value (10) is greater than the expected value (7.5), it lies in the upper half of the distribution. Therefore, we look for extreme values in the upper tail by calculating $$P(X \\ge 10)$$. We then compare this to half the significance level (2.5%).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "When testing the mean of a Poisson distribution, why is it crucial to ensure the parameter $$\\lambda$$ matches the time or space interval of the observed test statistic? (2 steps)", "answer": "- Step 1: The Poisson distribution is defined by its rate over a specific interval. If the null hypothesis states a rate of 0.5 calls per minute, but you observe the number of calls over a 20-minute interval, you cannot use $$\\lambda = 0.5$$ directly.\n- Step 2: You must scale the rate to match the observation interval. For a 20-minute interval, the parameter under $$H_0$$ becomes $$\\lambda = 20 \\times 0.5 = 10$$. Using the unscaled rate would result in testing against the completely wrong distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A hypothesis test for a Poisson rate is conducted with $$H_0: \\lambda = 5$$ and $$H_1: \\lambda < 5$$. The observed value is 2, and $$P(X \\le 2) = 0.125$$. A student concludes \"We accept $$H_0$$ because 0.125 is large\". Critique the language used in this conclusion. (2 steps)", "answer": "- Step 1: In statistics, we never \"accept\" the null hypothesis; we only \"fail to reject\" it or \"do not reject\" it. Accepting implies we have proven it true, which a hypothesis test cannot do.\n- Step 2: The correct interpretation is that there is \"insufficient evidence\" to reject $$H_0$$ at the given significance level. The data is consistent with $$H_0$$, but does not prove it. Furthermore, \"large\" is vague; the correct reasoning is that 0.125 is greater than the significance level (e.g., 0.05).", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "When using a Normal approximation for a Binomial hypothesis test, why is a continuity correction necessary, and which direction do you adjust for an upper-tailed test ($$H_1: p > p_0$$)? (2 steps)", "answer": "- Step 1: A continuity correction is necessary because we are using a continuous distribution (Normal) to approximate a discrete one (Binomial). In a discrete distribution, $$P(X \\ge x)$$ includes the whole block of probability at $$x$$, whereas the continuous probability $$P(X \\ge x)$$ starts exactly at $$x$$.\n- Step 2: For an upper-tailed test ($$P(X \\ge x)$$), to include the block of probability at $$x$$ using the continuous curve, we must extend the boundary slightly to the left to capture the area under the curve corresponding to that discrete block. Thus, we adjust the boundary down by 0.5, using $$P(X", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}], "count": 16}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In hypothesis testing, we form two hypotheses: the null ($$\\mathrm{H}_0$$) and the alternative ($$\\mathrm{H}_1$$). Conceptually, what is the fundamental difference in the role each plays in the testing process? Why do we write them in terms of a population parameter rather than a sample statistic? (2 steps)", "answer": "- Step 1: The null hypothesis $$\\mathrm{H}_0$$ is the default assumption or status quo that we presume to be true unless evidence strongly suggests otherwise. The alternative hypothesis $$\\mathrm{H}_1$$ represents the research claim or the change we are investigating; it only becomes accepted if the data provides sufficient evidence against $$\\mathrm{H}_0$$.\n+ Think of $$\\mathrm{H}_0$$ as \"innocent until proven guilty\" and $$\\mathrm{H}_1$$ as the \"prosecution's charge.\"\n- Step 2: We write them in terms of population parameters (like $$p$$ or $$\\lambda$$) because hypothesis testing is about making inferences for the entire population, not just the observed sample. The sample statistic (like the observed count) is the evidence we use to test the hypothesis, not the hypothesis itself.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "A researcher wants to test if a coin is biased towards heads. They toss the coin 8 times and count the number of heads $$X$$. They write $$\\mathrm{H}_0: X = 4$$ and $$\\mathrm{H}_1: X > 4$$. Explain the conceptual error in their hypotheses and state the correct form. (2 steps)", "answer": "- Step 1: The error is that hypotheses must be stated in terms of the population parameter, not the test statistic or an expected count. $$X$$ is the test statistic (the result from the sample), not the underlying probability of the coin.\n- Step 2: The correct form should use the parameter $$p$$, which represents the probability of landing on heads. The correct hypotheses are $$\\mathrm{H}_0: p = 0.5$$ (the coin is fair) and $$\\mathrm{H}_1: p > 0.5$$ (the coin is biased towards heads).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "How do you distinguish between a one-tailed and a two-tailed test based solely on the wording of the alternative hypothesis $$\\mathrm{H}_1$$? What does the phrasing \"testing if the proportion has changed\" imply about the tails? (2 steps)", "answer": "- Step 1: A one-tailed test has an alternative hypothesis with a specific direction, using $$>$$ or $$<$$ (e.g., $$\\mathrm{H}_1: p > 0.2$$ or $$\\mathrm{H}_1: \\lambda < 5$$). A two-tailed test has an alternative hypothesis with a \"not equal to\" inequality, $$\\neq$$ (e.g., $$\\mathrm{H}_1: p \\neq 0.5$$).\n- Step 2: The phrasing \"testing if the proportion has changed\" implies a two-tailed test because we are not specifying the direction of the change; the proportion could have increased or decreased. Therefore, we must check both extremes (tails) of the distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A test statistic is what we calculate from our sample to perform the test. If we are testing whether the rate of calls to a call centre has increased, what would be the test statistic, and why is it crucial that its distribution can be modelled under the assumption that $$\\mathrm{H}_0$$ is true? (2 steps)", "answer": "- Step 1: The test statistic would be the number of calls observed in the given time interval. It is the random variable whose value we observe from the experiment.\n- Step 2: It is crucial to know its distribution under $$\\mathrm{H}_0$$ because we need a baseline to measure how \"extreme\" our observed result is. If we assume $$\\mathrm{H}_0$$ is true (e.g., the rate is exactly 5 calls per hour), we can calculate the probability of observing our test statistic (or something more extreme). If that probability is tiny, it suggests our assumption ($$\\mathrm{H}_0$$) might be wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "What is the significance level of a test, and conceptually, what kind of error does it control the probability of committing? If the significance level is 5%, does this mean there is a 5% chance the null hypothesis is true? (2 steps)", "answer": "- Step 1: The significance level is the threshold probability we set before the test (e.g., 5% or 0.05). It controls the probability of a Type I error, which is incorrectly rejecting a true null hypothesis.\n- Step 2: No, it does not mean there is a 5% chance $$\\mathrm{H}_0$$ is true. The 5% significance level means that *if* $$\\mathrm{H}_0$$ were true, there is a 5% chance of observing a test statistic extreme enough to make us wrongly reject it. It is a conditional probability: $$\\mathrm{P}(\\text{Reject } \\mathrm{H}_0 \\mid \\mathrm{H}_0 \\text{ is true}) \\le 0.05$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Define the \"critical region\" and the \"critical value.\" How are they related, and where does the \"acceptance region\" fit into this picture? (2 steps)", "answer": "- Step 1: The critical region is the range of values for the test statistic that would lead us to reject the null hypothesis. The critical value is the boundary value—the first value that falls inside this critical region.\n+ For example, if the critical region is $$X \\ge 8$$, then 8 is the critical value.\n- Step 2: The acceptance region is the complement to the critical region; it is the set of values for the test statistic that do not provide sufficient evidence to reject $$\\mathrm{H}_0$$. If the observed test statistic falls in the acceptance region, we \"do not reject\" $$\\mathrm{H}_0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why does the actual significance level of a test often differ from the stated significance level (e.g., testing at 5% but getting an actual level of 3.2%)? Use the discrete nature of the binomial distribution in your explanation. (2 steps)", "answer": "- Step 1: The stated significance level (like 5%) is a threshold we aim for, but with discrete distributions like the binomial, the test statistic can only take integer values. We cannot fine-tune the critical region to give exactly a 5% probability.\n- Step 2: We must choose the critical region such that the probability of falling within it (assuming $$\\mathrm{H}_0$$ is true) is *less than or equal to* the stated significance level. Because we have to jump to the next available integer for our critical value, the resulting probability is usually strictly less than 5%, making the actual significance level smaller than the nominal 5% threshold.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A test statistic $$X \\sim \\mathrm{B}(10, 0.4)$$ is used to test $$\\mathrm{H}_0: p=0.4$$ against $$\\mathrm{H}_1: p>0.4$$ at the 5% level. We find $$\\mathrm{P}(X \\ge 7) = 0.0548$$ and $$\\mathrm{P}(X \\ge 8) = 0.0132$$. What is the critical value and critical region? Explain why we don't include 7 in the critical region even though 0.0548 is close to 0.05. (2 steps)", "answer": "- Step 1: The critical value is 8 and the critical region is $$X \\ge 8$$. \n- Step 2: We do not include 7 because the probability of observing 7 or more ($$0.0548$$) exceeds our significance level of 0.05. If we included 7, the probability of incorrectly rejecting $$\\mathrm{H}_0$$ would be $$5.48\\%$$, which is greater than the $$5\\%$$ limit we set. Therefore, we must go one step further to 8, where the probability ($$1.32\\%$$) is safely below the threshold.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "For a two-tailed test at the 5% significance level, how do you split the critical regions, and consequently, what significance level do you use when finding the critical value for a single tail? (2 steps)", "answer": "- Step 1: For a two-tailed test, the critical region is split into two parts, one at each end of the distribution. This accounts for extreme values in either direction (significantly higher or significantly lower).\n- Step 2: You must halve the overall significance level for each tail. So, for a 5% two-tailed test, you look for a critical region in the lower tail with a probability of $$\\le 2.5\\%$$ and a critical region in the upper tail with a probability of $$\\le 2.5\\%$$. You use 0.025 as the threshold when checking cumulative probabilities for each tail individually.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When finding the critical region for a two-tailed test, the textbook says \"the probability in each tail should be as close as possible to\" half the significance level. Does this mean we can allow the probability in a tail to slightly exceed half the significance level if it is closer to it? Explain why or why not. (2 steps)", "answer": "- Step 1: No, the probability in a tail must never exceed half the significance level. The strict rule of hypothesis testing is that the probability of a Type I error (incorrectly rejecting $$\\mathrm{H}_0$$) must be kept at or below the stated significance level.\n- Step 2: \"As close as possible\" means we choose the critical value that brings the tail probability closest to the target (e.g., 0.025) *without going over it*. If $$\\mathrm{P}(X \\le 3) = 0.016$$ and $$\\mathrm{P}(X \\le 4) = 0.028$$, we must choose 3 as the critical value. Even though 0.028 is closer to 0.025, it violates the maximum allowable probability constraint.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "You are performing a two-tailed test with $$\\mathrm{H}_0: p=0.4$$ and a sample size of 10. The observed test statistic is 3. To find the p-value, do you calculate $$\\mathrm{P}(X \\le 3)$$ or $$2 \\times \\mathrm{P}(X \\le 3)$$? Explain the reasoning. (2 steps)", "answer": "- Step 1: You calculate $$2 \\times \\mathrm{P}(X \\le 3)$$ because it is a two-tailed test. \n- Step 2: In a two-tailed test, we are looking for evidence of a difference in either direction. An observation of 3 is on the lower tail. However, an observation on the upper tail that is equally extreme would also count against $$\\mathrm{H}_0$$. Since we only observed one tail, we must double the one-tailed probability to account for the possibility of an equally extreme result in the opposite tail.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "When carrying out a one-tailed hypothesis test, there are two common methods: the probability method and the critical region method. Conceptually, how do these two approaches differ in the way they use the observed test statistic? (2 steps)", "answer": "- Step 1: The probability method works \"backwards\" from the observation. You assume $$\\mathrm{H}_0$$ is true, then calculate the probability of observing a value as extreme as, or more extreme than, your test statistic. You then compare this probability directly to the significance level.\n- Step 2: The critical region method works \"forwards\" from the significance level. You first determine the critical region (the set of extreme values that would trigger a rejection) using the significance level. Then, you simply check if your observed test statistic falls inside or outside this pre-defined region.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "A doctor claims a new drug is better than the old one (success rate > 40%). In a trial of 20 patients, 11 are cured. The p-value is 12.75%. What is the correct conclusion, and why is the phrasing \"the new drug is no better than the old one\" technically a slight overstatement? (2 steps)", "answer": "- Step 1: The correct conclusion is \"There is insufficient evidence to reject $$\\mathrm{H}_0$$.\" Because 12.75% > 5%, the result is not statistically significant.\n- Step 2: Saying \"the new drug is no better\" implies we have proven $$\\mathrm{H}_0$$ to be true. Hypothesis testing cannot prove $$\\mathrm{H}_0$$; it can only fail to find enough evidence against it. A lack of evidence against the status quo does not mean the status quo is definitively true—it might just mean our sample was too small or the effect is too small to detect. We simply \"do not reject\" it.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "In a two-tailed test, how do you determine which tail to investigate when calculating the probability for your observed test statistic? (2 steps)", "answer": "- Step 1: You compare your observed test statistic to the expected value of the distribution under the null hypothesis. For a binomial $$\\mathrm{B}(n, p)$$, the expected value is $$np$$.\n- Step 2: If the observed value is less than the expected value, you investigate the lower tail (calculating $$\\mathrm{P}(X \\le x)$$). If the observed value is greater than the expected value, you investigate the upper tail (calculating $$\\mathrm{P}(X \\ge x)$$). You then double this probability to get the two-tailed p-value.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student observes a value of 4 in a $$\\mathrm{B}(50, 0.02)$$ test for $$\\mathrm{H}_0: p=0.02$$ vs $$\\mathrm{H}_1: p \\neq 0.02$$. They calculate $$\\mathrm{P}(X \\le 4)$$ because 4 is a small number. Why might this be the wrong tail to check? (2 steps)", "answer": "- Step 1: You must compare the observed value to the expected value, which is $$np = 50 \\times 0.02 = 1$$. \n- Step 2: The observed value of 4 is actually *greater* than the expected value of 1. Therefore, 4 lies in the upper tail of the distribution, and the student should be calculating $$\\mathrm{P}(X \\ge 4)$$, not $$\\mathrm{P}(X \\le 4)$$. Always check the expected value, not just the magnitude of the number!", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "When testing the mean of a Poisson distribution, what is the population parameter we use in our hypotheses, and how do we handle the time or space interval in the calculation? (2 steps)", "answer": "- Step 1: The population parameter is the rate $$\\lambda$$ (the mean number of events in a given interval). The hypotheses are written as $$\\mathrm{H}_0: \\lambda = \\text{value}$$ and $$\\mathrm{H}_1: \\lambda >, <, \\text{or} \\neq \\text{value}$$.\n- Step 2: You must adjust the rate $$\\lambda$$ to match the interval over which the test statistic was observed. If the rate is given per minute, but the observation is over 20 minutes, the expected mean under $$\\mathrm{H}_0$$ becomes $$20 \\times \\lambda$$. The test statistic is then modelled as $$\\mathrm{Po}(20\\lambda)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "An office manager tests if the call rate has changed from 0.325 per minute. They observe calls over a 20-minute interval. Why must they use a Poisson distribution, and what is the parameter for their test statistic under $$\\mathrm{H}_0$$? (2 steps)", "answer": "- Step 1: They must use a Poisson distribution because the scenario involves events (calls) occurring randomly, independently, and at a constant average rate over a continuous interval of time.\n- Step 2: The parameter under $$\\mathrm{H}_0$$ must reflect the 20-minute interval. If the rate is 0.325 per minute, then over 20 minutes, the expected number of calls is $$20 \\times 0.325 = 6.5$$. So the test statistic is modelled as $$X \\sim \\mathrm{Po}(6.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "When performing a hypothesis test using a Normal approximation for a Binomial or Poisson distribution, what crucial adjustment must be made to the observed test statistic before standardizing it (calculating the z-value), and why? (2 steps)", "answer": "- Step 1: You must apply a continuity correction. This means adjusting the boundary of the observed value by 0.5 (e.g., changing $$X \\ge 15$$ to $$W > 14.5$$).\n- Step 2: This is necessary because we are using a continuous distribution (Normal) to approximate a discrete one (Binomial/Poisson). In a discrete distribution, $$\\mathrm{P}(X \\ge 15)$$ includes 15 exactly. In a continuous distribution, the probability of hitting exactly 15 is zero. To capture the area equivalent to 15 and above, we must start from 14.5, the continuous boundary that best represents the discrete bar at 15.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A shop sells cars at a rate of 10 per week. To test if sales increased during a 6-week sale period, 75 cars were sold. We approximate $$\\mathrm{Po}(60)$$ with $$\\mathrm{N}(60, 60)$$. To find $$\\mathrm{P}(X \\ge 75)$$, what exact Normal probability do we calculate? (2 steps)", "answer": "- Step 1: First, apply the continuity correction. Because 75 is an integer and we want $$\\mathrm{P}(X \\ge 75)$$, we must include the entire \"bar\" for 75 in our area. The continuous equivalent is $$W > 74.5$$.\n- Step 2: Therefore, we calculate $$\\mathrm{P}(W > 74.5)$$ where $$W \\sim \\mathrm{N}(60, 60)$$. We then standardize this to find the z-score: $$z = \\frac{74.5 - 60}{\\sqrt{60}}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A manager thinks 45% of customers buy something. She samples 100 customers and 35 buy something. We use a Normal approximation. What are the mean and variance of the approximating Normal distribution? (2 steps)", "answer": "- Step 1: The model is $$X \\sim \\mathrm{B}(100, 0.45)$$. The mean of a binomial distribution is given by $$\\mu = np$$. Here, $$\\mu = 100 \\times 0.45 = 45$$.\n- Step 2: The variance of a binomial distribution is $$\\sigma^2 = np(1-p)$$. Here, $$\\sigma^2 = 100 \\times 0.45 \\times (1 - 0.45) = 100 \\times 0.45 \\times 0.55 = 24.75$$. So the approximation is $$W \\sim \\mathrm{N}(45, 24.75)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "When is it appropriate to use a Poisson approximation for a Binomial distribution in hypothesis testing, and what is the parameter of the approximating Poisson distribution? (2 steps)", "answer": "- Step 1: It is appropriate when $$n$$ is large and $$p$$ is small (a rule of thumb is $$n > 50$$ and $$p < 0.1$$). This is because the Binomial distribution becomes increasingly skewed and hard to tabulate, while the Poisson distribution is designed for rare events with a large number of trials.\n- Step 2: The parameter of the approximating Poisson distribution is $$\\lambda = np$$. For example, if testing $$\\mathrm{B}(100, 0.04)$$, you would approximate it using $$\\mathrm{Po}(4)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A factory tests if the fault rate has increased from 4%. They sample 100 items and find 12 faults. They approximate $$\\mathrm{B}(100, 0.04)$$ with $$\\mathrm{Po}(4)$$. They find the critical region for the 5% level is $$X \\ge 9$$. Why did they use a Poisson approximation instead of a Normal one? (2 steps)", "answer": "- Step 1: They used a Poisson approximation because $$n$$ is large (100) and $$p$$ is small (0.04), which perfectly fits the criteria for a Poisson approximation. \n- Step 2: A Normal approximation would be inappropriate here because $$p$$ is far from 0.5. The binomial distribution $$\\mathrm{B}(100, 0.04)$$ is heavily right-skewed, and a Normal distribution (which is symmetric) would be a very poor fit. The Poisson distribution, which is also right-skewed for small $$\\lambda$$, provides a much better approximation.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A test statistic has distribution $$\\mathrm{B}(50, p)$$. Given $$\\mathrm{H}_0: p = 0.7$$ and $$\\mathrm{H}_1: p \\neq 0.7$$, we find the critical region at the 10% level is $$X \\le 29$$ and $$X \\ge 41$$. The probability of a single observation falling in this region is 8.8%. If Chloe takes two observations and *both* fall in the critical region, she rejects $$\\mathrm{H}_0$$. What is the probability she has incorrectly rejected $$\\mathrm{H}_0$$? (3 steps)", "answer": "- Step 1: The probability of incorrectly rejecting $$\\mathrm{H}_0$$ is the probability of falling into the critical region when $$\\mathrm{H}_0$$ is actually true. For a single observation, this probability is given as 0.088 (the actual significance level).\n- Step 2: Since the two observations are independent, the probability of *both* falling in the critical region (assuming $$\\mathrm{H}_0$$ is true) is the product of their individual probabilities.\n- Step 3: Probability = $$0.088 \\times 0.088 = 0.007744$$, or about 0.77%. This shows that requiring multiple observations to fall in the critical region drastically reduces the chance of a Type I error.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Exercise: A coin is tossed 10 times and 8 heads are observed. Test, at the 5% significance level, if the coin is biased towards heads. State your hypotheses clearly. (3 steps)", "answer": "- Step 1: Define the parameter and hypotheses. Let $$p$$ be the probability of getting a head. $$\\mathrm{H}_0: p = 0.5$$, $$\\mathrm{H}_1: p > 0.5$$. The test statistic is $$X \\sim \\mathrm{B}(10, 0.5)$$.\n- Step 2: Calculate the probability. Assuming $$\\mathrm{H}_0$$ is true, we find $$\\mathrm{P}(X \\ge 8)$$. $$\\mathrm{P}(X \\ge 8) = 1 - \\mathrm{P}(X \\le 7) = 1 - 0.9453 = 0.0547$$.\n- Step 3: Compare and conclude. Since $$0.0547 > 0.05$$, the result is not significant. There is insufficient evidence at the 5% level to reject $$\\mathrm{H}_0$$. There is no evidence the coin is biased towards heads.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Exercise: A typist makes errors at a rate of 2 per page. After a training course, they make 1 error in 10 pages. Test, at the 5% significance level, if the error rate has decreased. (3 steps)", "answer": "- Step 1: Define the parameter and hypotheses. Let $$\\lambda$$ be the mean number of errors per 10 pages. Under $$\\mathrm{H}_0$$, the rate is 2 per page, so for 10 pages, $$\\lambda = 20$$. $$\\mathrm{H}_0: \\lambda = 20$$, $$\\mathrm{H}_1: \\lambda < 20$$. The test statistic is $$X \\sim \\mathrm{Po}(20)$$.\n- Step 2: Calculate the probability. We observed 1 error, so we need the lower tail probability: $$\\mathrm{P}(X \\le 1)$$. $$\\mathrm{P}(X \\le 1) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) \\approx 0 + 0$$ (using tables/calculator, it is a very small number, $$\\approx 0.00000005$$).\n- Step 3: Compare and conclude. Since this probability is much less than 0.05, the result is significant. Reject $$\\mathrm{H}_0$$. There is sufficient evidence that the error rate has decreased.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}], "count": 25}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the fundamental difference in the logical roles of the null hypothesis ($$H_0$$) and the alternative hypothesis ($$H_1$$) in a hypothesis test? (3 steps)", "answer": "- Step 1: The null hypothesis ($$H_0$$) is the \"status quo\" or the assumption we hold as true unless evidence strongly suggests otherwise. It is a specific statement about a population parameter (e.g., $$p=0.5$$).\n- Step 2: The alternative hypothesis ($$H_1$$) represents the research claim or the change we are testing for. It tells us about the parameter if $$H_0$$ is shown to be wrong (e.g., $$p>0.5$$).\n- Step 3: The test assumes $$H_0$$ is true to build a probability model, and then checks if the observed data is sufficiently unlikely under that model to favor $$H_1$$.\n\nThe null is the \"innocent until proven guilty\" assumption; the alternative is the \"guilty\" verdict we seek evidence for.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "Why is it incorrect to write a null hypothesis as $$H_0: p > 0.5$$? What does this reveal about the nature of $$H_0$$? (3 steps)", "answer": "- Step 1: The null hypothesis must always be a statement of equality (e.g., $$p=0.5$$) because we need a specific value for the population parameter to calculate probabilities.\n- Step 2: If $$H_0$$ were an inequality like $$p > 0.5$$, we wouldn't know which specific value of $$p$$ to use to set up our distribution (e.g., $$B(n, p)$$).\n- Step 3: Therefore, $$H_0$$ provides the exact parameter value needed to construct the test statistic's distribution under the assumption that $$H_0$$ is true.\n\nWithout an exact value in $$H_0$$, we cannot calculate the probability of the observed outcome, which is the core mechanism of the test.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A student observes 8 heads out of 10 coin tosses and writes the test statistic as $$p = 0.8$$. Why is this incorrect, and what should the test statistic be? (3 steps)", "answer": "- Step 1: A test statistic must be a value calculated from the sample or experiment, not a population parameter.\n- Step 2: The probability $$p$$ is a population parameter (unknown, which we are testing). The number of heads (e.g., 8) is a statistic because it comes from the observed sample.\n- Step 3: The correct test statistic is the count of the observed event (e.g., the number of times the coin lands on heads), which we then use to assess the likelihood of $$H_0$$.\n\nThe test statistic is the evidence from the sample; the parameter is what we are trying to make an inference about.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "How does the formulation of $$H_1$$ determine whether a test is one-tailed or two-tailed? Provide an example of each for testing a coin's bias. (3 steps)", "answer": "- Step 1: The formulation of $$H_1$$ dictates the direction of the test. If $$H_1$$ specifies a direction (e.g., $$H_1: p > 0.5$$ or $$H_1: p < 0.5$$), it is a one-tailed test because we only look for extreme values in one tail of the distribution.\n- Step 2: If $$H_1$$ does not specify a direction, only that the parameter has changed (e.g., $$H_1: p \\neq 0.5$$), it is a two-tailed test because extreme values in either tail would lead us to reject $$H_0$$.\n- Step 3: For example, testing if a coin is biased towards heads ($$H_1: p>0.5$$) is one-tailed. Testing if a coin is simply biased in any direction ($$H_1: p \\neq 0.5$$) is two-tailed.\n\nOne-tailed tests look for \"better\" or \"worse\"; two-tailed tests look for \"different\".", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "Conceptually, what does the critical region represent in the probability distribution of the test statistic under $$H_0$$? (3 steps)", "answer": "- Step 1: The critical region is a range of values for the test statistic that are so extreme that they are very unlikely to occur if the null hypothesis ($$H_0$$) were true.\n- Step 2: If the observed test statistic falls into this region, the probability of observing such a value (or more extreme) under $$H_0$$ is less than the significance level.\n- Step 3: Conceptually, it represents the \"rejection zone\" where the evidence against $$H_0$$ is strong enough to discard the assumption that $$H_0$$ is correct.\n\nIt is the threshold of \"surprisingness\" that convinces us to change our minds.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Why is the \"actual significance level\" often different from the nominal significance level (e.g., 5%) when using a discrete distribution like the Binomial? (3 steps)", "answer": "- Step 1: The nominal significance level (e.g., 5%) is the threshold we set. The actual significance level is the exact probability of the test statistic falling within the critical region, assuming $$H_0$$ is true.\n- Step 2: In discrete distributions like the Binomial, we cannot choose just any probability value; we are restricted to the probabilities of integer outcomes.\n- Step 3: We find the critical value such that the probability is as close as possible to the nominal level without exceeding it (e.g., $$P(X \\ge c) \\le 0.05$$). Because we must include the entire probability of the critical value, the actual probability is usually less than the nominal level (e.g., 4.2% instead of 5%).\n\nDiscrete distributions force us to \"jump\" over the exact significance level, resulting in a stricter test.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "For a two-tailed test at the 5% significance level, how should the significance level be distributed between the two tails, and why? (3 steps)", "answer": "- Step 1: For a two-tailed test, the alternative hypothesis is non-directional ($$H_1: \\theta \\neq \\theta_0$$), meaning we reject $$H_0$$ if the test statistic is either too high or too low.\n- Step 2: To maintain the overall significance level (e.g., 5%), we must split this probability between the two tails of the distribution.\n- Step 3: Typically, the significance level is halved for each tail (e.g., 2.5% in each tail for a 5% test) so that the total probability of incorrectly rejecting $$H_0$$ in either direction sums to the nominal level.\n\nThis ensures the total risk of a false positive (Type I error) does not exceed 5%.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Edge case: If finding a critical region for a lower-tailed test $$B(10, 0.1)$$ at 5%, and $$P(X \\le 0) = 0.3487$$, what does this imply about the critical region and the test's ability to detect a decrease in $$p$$? (3 steps)", "answer": "- Step 1: If $$P(X \\le 0) = 0.3487$$, this means that even the most extreme possible value for the test statistic (0) is not unlikely enough under $$H_0$$ (it happens ~35% of the time).\n- Step 2: This implies that the critical region is empty (or consists only of impossible values) for the given significance level.\n- Step 3: Consequently, the test has virtually no power to detect a decrease in $$p$$ at this significance level with this sample size; it is impossible to reject $$H_0$$ even if the observed value is as small as it can possibly be.\n\nWith too small a sample or too strict a significance level, a test may be unable to detect any effect.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "When testing $$H_0: p=0.3$$ against $$H_1: p>0.3$$ with an observed value of $$x$$, why do we calculate $$P(X \\ge x)$$ rather than $$P(X = x)$$? (3 steps)", "answer": "- Step 1: In hypothesis testing, we are assessing the likelihood of observing our data, or something more extreme, given that $$H_0$$ is true.\n- Step 2: The probability of observing exactly one specific value, $$P(X = x)$$, in a discrete distribution is usually very small, even if $$H_0$$ is true.\n- Step 3: Therefore, we calculate the cumulative probability $$P(X \\ge x)$$ (for an upper-tail test) to capture the probability of the observed value and all values that would provide even stronger evidence against $$H_0$$.\n\nWe care about the \"rarity\" of the evidence, not just the probability of one specific outcome.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Compare the two methods of performing a hypothesis test (Probability method vs. Critical Region method). What is the logical equivalence between them? (3 steps)", "answer": "- Step 1: Method 1 (Probability method) calculates the probability of obtaining a value as extreme as, or more extreme than, the observed value, and compares this probability to the significance level.\n- Step 2: Method 2 (Critical Region method) determines the range of values that would lead to rejection (the critical region) based on the significance level, and then checks if the observed value lies within this region.\n- Step 3: They are logically equivalent because the critical region is defined as the set of values whose individual probabilities sum to a value less than the significance level. If $$x$$ is in the critical region, then $$P(X \\ge x)$$ must be less than the significance level.\n\nBoth methods are just different ways of checking if the observed data falls in the \"unlikely\" zone of the $$H_0$$ distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A dice is rolled 5 times. We want to test if it's biased towards 6 ($$H_1: p > 1/6$$) at 5%. If we observe 3 sixes, qualitatively determine if this is significant without exact calculation. (3 steps)", "answer": "- Step 1: Define the expected value under $$H_0$$. If $$p=1/6$$ and $$n=5$$, the expected number of sixes is $$E[X] = 5 \\times (1/6) \\approx 0.83$$.\n- Step 2: The observed value is 3. This is significantly higher than the expected value of 0.83 (almost 4 times higher).\n- Step 3: While exact calculation is needed for certainty, qualitatively, observing 3 or more sixes out of 5 rolls when expecting less than 1 is quite rare. It is highly likely that $$P(X \\ge 3) < 0.05$$, so we would likely reject $$H_0$$.\n\nIntuition: Observing an event that is 3-4 times the expected rate in a small sample usually indicates significance.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Why is it important to \"write a conclusion in the context of the question\" rather than just saying \"reject $$H_0$$\"? (3 steps)", "answer": "- Step 1: Statistical jargon like \"reject $$H_0$$\" is precise but meaningless to non-statisticians.\n- Step 2: A conclusion must relate the statistical finding back to the original real-world question.\n- Step 3: For example, instead of \"reject $$H_0$$\", saying \"there is sufficient evidence to suggest the dice is biased towards landing on 6\" directly answers the research question in plain language.\n\nThe math serves the real-world problem; the conclusion bridges the gap.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "In a two-tailed test, if the observed value is *lower* than the expected value $$np$$, which probability ($$P(X \\le x)$$ or $$P(X \\ge x)$$) do you calculate, and what significance level do you compare it to? (3 steps)", "answer": "- Step 1: If the observed value is lower than the expected value $$np$$, the data suggests the true parameter might be smaller than the $$H_0$$ value.\n- Step 2: Therefore, you calculate the lower-tail probability $$P(X \\le x)$$.\n- Step 3: For a two-tailed test at significance level $$\\alpha$$, you compare this probability to $$\\alpha/2$$ (e.g., 2.5% for a 5% test) because the total significance level is split between the two tails.\n\nYou only need to test the tail that corresponds to the direction of your observed data.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Why does a two-tailed test split the significance level? What would be the consequence of not splitting it (i.e., using the full 5% for one tail) on the Type I error rate? (3 steps)", "answer": "- Step 1: If you used the full 5% significance level for one tail in a two-tailed test, you would be allowing a 5% chance of rejecting $$H_0$$ in that direction.\n- Step 2: However, a two-tailed test allows for rejection in *either* direction. If you used 5% for the lower tail and 5% for the upper tail, the total probability of a Type I error (incorrectly rejecting a true $$H_0$$) would be 10%.\n- Step 3: To maintain the overall significance level at 5%, the probability must be split (usually 2.5% in each tail), ensuring the total risk of a false positive is 5%.\n\nSplitting ensures the strictness of the test matches the specified significance level.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "If the rate of an event is 2 per minute, and you are testing over a 30-minute interval, how must you adjust the parameter in your hypotheses? (3 steps)", "answer": "- Step 1: The Poisson parameter $$\\lambda$$ represents the mean number of events in a given interval. It is proportional to the length of the interval.\n- Step 2: If the rate is 2 per minute, then for a 30-minute interval, the expected number of events is $$2 \\times 30 = 60$$.\n- Step 3: Therefore, the hypotheses must reflect the new interval. Instead of $$H_0: \\lambda = 2$$, the hypotheses become $$H_0: \\lambda = 60$$ for the 30-minute interval.\n\nAlways ensure $$\\lambda$$ matches the interval of the observed test statistic.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Why is it necessary to define the interval length (e.g., 1-minute vs. 20-minute interval) explicitly when setting up hypotheses for a Poisson distribution? (3 steps)", "answer": "- Step 1: The Poisson distribution models events occurring in a fixed interval of time, space, or volume.\n- Step 2: The parameter $$\\lambda$$ is intrinsically linked to the size of this interval ($$\\lambda = \\text{rate} \\times \\text{interval size}$$).\n- Step 3: If the interval is not defined, $$\\lambda$$ is undefined. A rate of 0.5 per minute is different from a rate of 30 per hour, even though the underlying rate is the same; the specific distribution and probabilities depend on the interval used for observation.\n\nThe interval defines the scale of the problem; without it, we cannot calculate probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A shop gets 1 customer per hour on average. In a 3-hour period, they get 0 customers. Test at 5% if the rate has decreased. (4 steps)", "answer": "- Step 1: Define the hypotheses. $$H_0: \\lambda = 3$$ (for a 3-hour period). $$H_1: \\lambda < 3$$.\n- Step 2: We need to find $$P(X \\le 0)$$, which is just $$P(X=0)$$ since $$X$$ cannot be negative.\n- Step 3: Calculate $$P(X=0) = \\frac{e^{-3} 3^0}{0!} = e^{-3} \\approx 0.0498$$.\n- Step 4: Since $$0.0498 < 0.05$$, the result is significant. Reject $$H_0$$. There is evidence the rate has decreased.\n\nThis edge case shows that even a single observation of 0 can be significant if the expected rate is low enough.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When approximating a Binomial distribution $$B(n, p)$$ for a hypothesis test, what are the conditions for using a Normal approximation vs. a Poisson approximation? (3 steps)", "answer": "- Step 1: Use a Normal approximation when $$n$$ is large and $$p$$ is close to 0.5 (typically $$n > 50$$ and $$p$$ not near 0 or 1). This ensures the distribution is roughly symmetric and continuous.\n- Step 2: Use a Poisson approximation when $$n$$ is large and $$p$$ is small (typically $$n > 50$$ and $$p < 0.1$$). This accounts for the skewed, discrete nature of the data when successes are rare.\n- Step 3: The choice depends on the shape of the Binomial distribution: if symmetric, use Normal; if skewed right (rare events), use Poisson.\n\nThe approximation must mimic the shape of the original distribution to provide accurate probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "When using a Normal approximation for a Binomial hypothesis test, why is the continuity correction essential? What happens if you omit it? (3 steps)", "answer": "- Step 1: The Normal distribution is continuous, meaning it assigns zero probability to any exact single value. The Binomial distribution is discrete.\n- Step 2: When approximating a discrete distribution with a continuous one, the discrete bars (e.g., at $$x=15$$) must be represented by a continuous area.\n- Step 3: The continuity correction adjusts the boundaries by 0.5 to ensure the area under the Normal curve matches the height of the discrete bars. Omitting it leads to a systematic error in the calculated probability, often making it harder to reject $$H_0$$ (or easier, depending on the tail).\n\nIt compensates for the \"gaps\" between discrete integer values.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "How do you apply the continuity correction when calculating $$P(X \\ge 15)$$ for a discrete variable approximated by a continuous Normal variable? (3 steps)", "answer": "- Step 1: We are dealing with a discrete variable $$X$$ approximated by a continuous variable $$W$$.\n- Step 2: The discrete probability $$P(X \\ge 15)$$ includes the entire bar at $$x=15$$.\n- Step 3: To capture this entire area under the continuous curve, we must start slightly below 15. Therefore, we apply the continuity correction by calculating $$P(W > 14.5)$$.\n\nWe \"scoop\" 0.5 into the region to include the full bar at the boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "If we approximate $$B(100, 0.2)$$ with $$N(20, 16)$$, and we observe $$x=25$$, conceptually walk through the standardization step including the continuity correction for an upper-tailed test. (4 steps)", "answer": "- Step 1: Identify the observed discrete value $$x=25$$. For $$P(X \\ge 25)$$, the continuity correction requires us to find $$P(W > 24.5)$$.\n- Step 2: Under $$H_0$$, the approximating Normal distribution is $$N(\\mu, \\sigma^2)$$ where $$\\mu = np = 20$$ and $$\\sigma^2 = np(1-p) = 16$$, so $$\\sigma = 4$$.\n- Step 3: Calculate the Z-score: $$Z = \\frac{W - \\mu}{\\sigma} = \\frac{24.5 - 20}{4} = \\frac{4.5}{4} = 1.125$$.\n- Step 4: We then compare this Z-value to the critical Z-value (e.g., 1.6449 for a 5% one-tailed test) to determine if it falls in the critical region.\n\nThis converts the raw score into a standardized measure of extremeness.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A factory claims 2% of items are faulty. We test 200 items and find 9 faulty. Should we use Binomial, Poisson, or Normal approximation? Justify your choice based on $$n$$ and $$p$$. (3 steps)", "answer": "- Step 1: Analyze the parameters: $$n=200$$ and $$p=0.02$$.\n- Step 2: Check conditions: $$n$$ is large (200 > 50), but $$p$$ is small (0.02 < 0.1).\n- Step 3: Because $$p$$ is small, the Binomial distribution will be skewed, not symmetric. Therefore, a Poisson approximation is appropriate, with $$\\lambda = np = 200 \\times 0.02 = 4$$.\n\nA Normal approximation would be inaccurate here because the distribution is not bell-shaped.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Using the scenario in Q22, $$H_0: \\lambda=4$$. The observed value is 9. Qualitatively, is 9 in the critical region for a 5% one-tailed test? (4 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim Po(4)$$. We want to test $$H_1: \\lambda > 4$$ at 5%.\n- Step 2: Qualitatively, the mean and variance are both 4. A value of 9 is 5 units above the mean.\n- Step 3: For a Poisson distribution with mean 4, values of 9 or more are quite rare (the distribution is concentrated around 4).\n- Step 4: Therefore, qualitatively, 9 is very likely in the critical region, suggesting we would reject $$H_0$$.\n\n9 is more than double the mean, which is a strong signal in a low-variance distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "What is a Type I error in the context of the actual significance level? (3 steps)", "answer": "- Step 1: A Type I error occurs when we reject the null hypothesis when it is actually true (a \"false positive\").\n- Step 2: The actual significance level is defined as the probability of incorrectly rejecting the null hypothesis.\n- Step 3: Therefore, the actual significance level *is* the probability of making a Type I error given the specific critical region chosen.\n\nIt quantifies the risk of crying wolf when there is no wolf.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "If two independent observations of the test statistic both fall inside the critical region, how does the probability of incorrectly rejecting $$H_0$$ change compared to just one observation? (3 steps)", "answer": "- Step 1: Let the probability of one observation falling in the critical region (and thus incorrectly rejecting $$H_0$$ for that single observation) be $$\\alpha$$ (the actual significance level).\n- Step 2: If two independent observations are taken, the probability of *both* falling in the critical region is $$\\alpha \\times \\alpha = \\alpha^2$$.\n- Step 3: Since $$\\alpha$$ is typically a small number (like 0.05), $$\\alpha^2$$ (0.0025) is much smaller. The probability of incorrectly rejecting $$H_0$$ based on two independent observations both being in the critical region is significantly reduced.\n\nMultiple pieces of extreme evidence make a false positive much less likely.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}], "count": 25}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define the **null hypothesis (H₀)** and **alternative hypothesis (H₁)** in hypothesis testing. How do they relate to population parameters? (3 steps)", "answer": "- Step 1: The **null hypothesis** is the assumption made about the population parameter (e.g., proportion $ p $, rate $ \\lambda $) being true until evidence suggests otherwise.  \n- Step 2: The **alternative hypothesis** describes how the parameter behaves if H₀ is false. It defines the test as one-tailed (directional: $ p < \\ldots $ or $ p > \\ldots $) or two-tailed (non-directional: $ p \\neq \\ldots $).  \n- Step 3: Together, H₀ and H₁ partition the parameter space. For example, if testing $ p $, H₀ might be $ p = 0.4 $, and H₁ could be $ p > 0.4 $ (one-tailed) or $ p \\neq 0.4 $ (two-tailed).  \n\n[Takeaway: H₀ is the status quo, H₁ challenges it by specifying direction or change.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is a **test statistic** essential in hypothesis testing? Provide an example from a binomial distribution.", "answer": "A test statistic is the observed value (from a sample or experiment) used to evaluate H₀. For example:  \n- If testing a coin’s fairness via 10 tosses, the test statistic is the number of heads.  \n- If H₀ states $ p = 0.5 $, the test statistic’s distribution under H₀ is $ X \\sim B(10, 0.5) $.  \n- The test statistic’s position in the distribution determines whether to reject H₀.  \n\n[Takeaway: It quantifies the evidence against H₀.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you determine the **critical region** for a one-tailed binomial test? Use $ X \\sim B(10, 0.4) $ and a $ 5\\% $ significance level. (3 steps)", "answer": "- Step 1: Assume H₀ is true: $ X \\sim B(10, 0.4) $.  \n- Step 2: For H₁: $ p > 0.4 $, find the smallest $ x $ where $ P(X \\geq x) < 0.05 $.  \n  + Example: $ P(X \\geq 7) = 1 - P(X \\leq 6) = 1 - 0.945 = 0.055 $, which exceeds $ 5\\% $.  \n  + $ P(X \\geq 8) = 1 - 0.989 = 0.011 $, which is below $ 5\\% $.  \n- Step 3: The critical region is $ X \\geq 8 $, as it’s the first value where the cumulative probability drops below $ 5\\% $.  \n\n[Takeaway: Critical region is the extreme values that lead to rejecting H₀.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why might the **actual significance level** differ from the given significance level? Provide an example.", "answer": "- The actual significance level is the *exact* probability of the critical region under H₀, which may not match the given threshold (e.g., $ 5\\% $) due to discrete distributions like binomial.  \n- Example: For $ X \\sim B(10, 0.4) $, if the critical region is $ X \\geq 8 $, the actual significance level is $ P(X \\geq 8) = 0.011 $, not $ 5\\% $.  \n- This happens because discrete distributions have gaps in possible probabilities (unlike continuous distributions).  \n\n[Takeaway: Discreteness forces the actual level to be ≤ the given level.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you adjust significance levels for a **two-tailed test**? Use $ X \\sim B(20, p) $ and $ 10\\% $ significance. (2 steps)", "answer": "- Step 1: Split the significance level equally between both tails. For $ 10\\% $, each tail uses $ 5\\% $.  \n- Step 2: Find critical values where cumulative probabilities in each tail are closest to $ 5\\% $.  \n  + Example: If $ P(X \\leq 3) = 0.031 $ and $ P(X \\geq 17) = 0.048 $, the critical regions are $ X \\leq 3 $ and $ X \\geq 17 $, with actual significance $ 0.031 + 0.048 = 7.9\\% $.  \n\n[Takeaway: Two-tailed tests split the significance level to detect deviations in *either* direction.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "When is a **Poisson distribution** used in hypothesis testing? How do you test for a rate $ \\lambda $?", "answer": "- Poisson is used for counts of events in a fixed interval (e.g., calls per hour, defects per unit).  \n- To test $ \\lambda $:  \n  1. Define H₀: $ \\lambda = \\text{assumed rate} $, H₁: $ \\lambda $ is higher, lower, or different.  \n  2. Calculate $ P(X \\geq x) $ or $ P(X \\leq x) $ using Poisson tables or formulae.  \n  3. Compare to significance level to decide rejection.  \n- Example: If H₁: $ \\lambda > 6.5 $, and observed $ X = 12 $, check $ P(X \\geq 12) $ under $ \\lambda = 6.5 $.  \n\n[Takeaway: Poisson tests focus on rates, not proportions.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is a **normal approximation** used in hypothesis testing for binomial distributions? What conditions justify it?", "answer": "- Normal approximation simplifies calculations when $ n $ is large and $ p $ is not extreme (e.g., $ np \\geq 5 $, $ n(1-p) \\geq 5 $).  \n- Steps:  \n  1. Approximate $ B(n, p) $ with $ N(np, np(1-p)) $.  \n  2. Apply continuity correction (e.g., $ P(X \\geq 7) $ becomes $ P(X \\geq 6.5) $).  \n  3. Use Z-scores to find probabilities.  \n- Example: Testing $ H₀: p = 0.45 $ with $ n = 100 $, $ X = 35 $. Approximate $ N(45, 24.75) $, calculate $ P(X \\leq 35.5) $.  \n\n[Takeaway: Approximations trade precision for computational feasibility.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is a **continuity correction**, and why is it necessary when using normal approximations?", "answer": "- Continuity correction adjusts discrete data (e.g., binomial) to continuous (normal) by adding/subtracting $ 0.5 $.  \n- Example: When testing $ X \\geq 7 $ with normal approximation, use $ X \\geq 6.5 $.  \n- Without correction, the normal distribution underestimates/overestimates probabilities for discrete jumps.  \n\n[Takeaway: Bridges the gap between discrete and continuous distributions.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you interpret the **conclusion** of a hypothesis test in context? Use Olav’s coin example (page 114).", "answer": "- If the test statistic falls in the critical region, reject H₀.  \n- Example: Olav’s coin tosses ($ H₀: p = 0.5 $, H₁: $ p > 0.5 $, significance $ 5\\% $).  \n  + Observed 7 heads in 10 tosses. $ P(X \\geq 7) = 1 - P(X \\leq 6) = 1 - 0.8281 = 0.1719 > 5\\% $.  \n  + Conclusion: Insufficient evidence to suggest the coin is biased toward heads.  \n- Always reference H₀ and the real-world implication (e.g., \"no evidence of bias\").\n\n[Takeaway: Contextualize statistical conclusions.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why might a **two-tailed test** for a proportion use different critical values in each tail?", "answer": "- Because the binomial distribution is discrete, the closest probabilities to $ \\alpha/2 $ may not be symmetric.  \n- Example: For $ X \\sim B(20, 0.3) $, testing $ p \\neq 0.3 $ at $ 5\\% $:  \n  + Lower tail: $ P(X \\leq 2) = 0.035 $, $ P(X \\leq 1) = 0.010 $ → critical value $ 2 $.  \n  + Upper tail: $ P(X \\geq 10) = 1 - P(X \\leq 9) = 0.048 $, $ P(X \\geq 11) = 0.017 $ → critical value $ 10 $.  \n- The actual significance level is $ 0.035 + 0.048 = 8.3\\% $, not $ 5\\% $.  \n\n[Takeaway: Asymmetry in discrete distributions requires tail-specific critical values.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you test a **Poisson rate** with a large time interval (e.g., 6 weeks of car sales)?", "answer": "- Step 1: Scale $ \\lambda $ by the interval. For $ \\lambda = 10 $ per week and 6 weeks, new $ \\lambda = 60 $.  \n- Step 2: Use normal approximation (since $ \\lambda \\geq 10 $): $ X \\sim N(60, 60) $.  \n- Step 3: Apply continuity correction. For observed $ X = 75 $, test $ P(X \\geq 74.5) $.  \n  + $ Z = \\frac{74.5 - 60}{\\sqrt{60}} = 1.87 $, $ P(Z \\geq 1.87) = 0.0307 < 5\\% $.  \n- Reject H₀: Evidence supports an increase in the rate.  \n\n[Takeaway: Time scaling affects $ \\lambda $, and normal approximation is used for large $ \\lambda $.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the **difference between actual significance level** and the given significance level?", "answer": "- The **given significance level** (e.g., $ 5\\% $) is the threshold for rejecting H₀.  \n- The **actual significance level** is the exact probability of the critical region under H₀, which may be less than or equal to the given level.  \n- Example: If H₀: $ p = 0.4 $, $ n = 10 $, and critical region $ X \\geq 8 $, actual significance is $ P(X \\geq 8) = 0.011 $, even though the given level was $ 5\\% $.  \n\n[Takeaway: Actual level reflects the true Type I error risk.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How do you test if a **Poisson distribution** is appropriate for modeling?", "answer": "- Conditions:  \n  1. Events occur independently.  \n  2. Events have a constant rate.  \n  3. Events occur singly.  \n- Example: Testing car accidents per week. If accidents cluster (non-independent) or rates vary (seasonal), Poisson is invalid.  \n- Use goodness-of-fit tests (e.g., compare observed vs expected frequencies).  \n\n[Takeaway: Poisson requires independence and constant rate.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "When is a **Poisson approximation** to binomial valid?", "answer": "- Valid when $ n $ is large ($ n \\geq 10 $) and $ p $ is small ($ np \\leq 10 $).  \n- Example: Testing faulty lightbulbs in 2000 samples ($ p = 0.003 $). Approximate with $ \\lambda = np = 6 $.  \n- Why? For rare events, binomial probabilities approach Poisson as $ n \\to \\infty $, $ p \\to 0 $, $ np $ fixed.  \n\n[Takeaway: Useful for rare events in large samples.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is a **two-tailed test** used for Agnetha’s carrot fertiliser claim?", "answer": "- Agnetha claims the fertiliser \"changed\" the probability (no direction).  \n- H₁: $ p \\neq 0.25 $, so test both tails for deviations above or below $ 0.25 $.  \n- Example: If observed $ X = 13 $ out of $ 30 $, check $ P(X \\geq 13) $ and $ P(X \\leq \\text{lower}) $.  \n- Conclusion: Reject H₀ if either tail’s probability < $ \\alpha/2 $.  \n\n[Takeaway: Two-tailed tests detect *any* change, not just direction.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define the null hypothesis (H₀) and alternative hypothesis (H₁). Why are they crucial in hypothesis testing? (3 steps)", "answer": "- Step 1: **H₀** is the default assumption (e.g., \"no effect\" or \"no difference\").  \n- Step 2: **H₁** is the statement that contradicts H₀ (e.g., \"there is an effect\").  \n- Step 3: These hypotheses frame the test. H₀ is assumed true, and sample data determines if H₁ is statistically supported.  \n**Takeaway:** Hypotheses define the question being tested. H₀ represents the status quo, while H₁ challenges it using evidence.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you determine if a hypothesis test is one-tailed or two-tailed? (2 steps)", "answer": "- Step 1: **One-tailed** tests specify direction (e.g., H₁: p > 0.5 or p < 0.5).  \n- Step 2: **Two-tailed** tests look for any change (e.g., H₁: p ≠ 0.5).  \n**Misconception Probe:** A two-tailed test is *not* a combination of two one-tailed tests but splits the significance level equally in both tails.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is a test statistic? How does it relate to the population parameter? (2 steps)", "answer": "- Step 1: A **test statistic** is a value calculated from sample data used to test H₀.  \n- Step 2: It estimates the population parameter (e.g., sample proportion for binomial p or rate λ for Poisson).  \n**Edge Case:** If the sample size is too small, the test statistic might not reliably reflect the population parameter.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you find critical values for a binomial distribution using tables? (3 steps)", "answer": "- Step 1: Assume H₀ is true (e.g., X ~ B(10, 0.3)).  \n- Step 2: Use tables to find the smallest x where P(X ≥ x) or P(X ≤ x) ≤ significance level (e.g., 5%).  \n- Step 3: The **critical region** includes all x values in the tail beyond the critical value.  \n**Example:** For X ~ B(10, 0.3), P(X ≥ 5) = 0.1503 (too high), but P(X ≥ 6) = 0.0106 (≤5%). Critical value = 6.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the actual significance level often less than the stated threshold (e.g., 5%)? (3 steps)", "answer": "- Step 1: The actual significance level is the *exact* probability of rejecting H₀ when it’s true.  \n- Step 2: Binomial probabilities are discrete, so exact P(X ≥ x) or P(X ≤ x) may not match the threshold.  \n- Step 3: We choose the largest x where cumulative probability is ≤ threshold, resulting in an actual level ≤ stated.  \n**Example:** If 5% threshold leads to critical value x=6 with P(X ≥ 6)=2.1%, the actual significance level is 2.1%.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you handle two-tailed tests for binomial p? (3 steps)", "answer": "- Step 1: Split the significance level (e.g., 5% becomes 2.5% per tail).  \n- Step 2: Find critical values for lower and upper tails where P(X ≤ c₁) and P(X ≥ c₂) ≤ 2.5%.  \n- Step 3: Combine both regions as the critical area for rejecting H₀.  \n**Edge Case:** If cumulative probabilities don’t exactly match 2.5%, choose the closest values (e.g., 0.0247 instead of 0.025).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What role does sample size play in hypothesis testing? (2 steps)", "answer": "- Step 1: Larger samples reduce variability, making it easier to detect small effects (e.g., a slight bias in a coin).  \n- Step 2: For binomial tests, increasing n makes the distribution more normal, enabling normal approximation use.  \n**Takeaway:** Larger n increases test power but may require computational tools (e.g., calculators or software).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How do you test the rate λ of a Poisson distribution? (3 steps)", "answer": "- Step 1: Define H₀ (e.g., λ = 10) and H₁ (e.g., λ ≠ 10).  \n- Step 2: Adjust λ for the test’s time frame (e.g., if testing over 2 weeks, λ = 20).  \n- Step 3: Use Poisson cumulative tables to find critical regions for both tails (≤2.5% and ≥2.5% for a 5% test).  \n**Example:** For H₀: λ = 6.5 (Example 7), P(X ≤ 1)=0.0113 and P(X ≥ 12)=0.0339. Combined actual significance level = 0.0452.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When should you use a normal approximation for binomial or Poisson distributions? (3 steps)", "answer": "- Step 1: **Binomial** if n is large and p ≈ 0.5 (np ≥ 5, n(1-p) ≥ 5).  \n- Step 2: **Poisson** if λ ≥ 10.  \n- Step 3: Apply continuity correction (e.g., convert discrete P(X ≥ 5) to P(X ≥ 4.5) for normal approximation).  \n**Takeaway:** Approximations simplify calculations but require checking conditions (n large, p ≈ 0.5, λ ≥ 10).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How do you interpret the conclusion of a hypothesis test in context? (3 steps)", "answer": "- Step 1: If the test statistic falls in the critical region, reject H₀.  \n- Step 2: State the conclusion using H₁ (e.g., \"There is sufficient evidence to suggest the coin is biased\").  \n- Step 3: Avoid definitive claims (e.g., \"This proves the coin is biased\" is incorrect; hypothesis tests provide statistical evidence, not proof).  \n**Misconception:** Failing to reject H₀ does *not* confirm H₀ is true; it means there’s insufficient evidence to support H₁.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why are critical values at the extremes of the distribution? (2 steps)", "answer": "- Step 1: Extreme values (very low or very high) are improbable under H₀, signaling deviation.  \n- Step 2: If observed x falls in the critical region (extreme values), H₀ is rejected.  \n**Intuition:** Hypothesis tests prioritize Type I error (incorrectly rejecting H₀), so critical regions are conservative (only extreme deviations count).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How does the critical region differ for one-tailed and two-tailed tests? (2 steps)", "answer": "- Step 1: **One-tailed** has a single critical region (e.g., X ≥ c for H₁: p > 0.5).  \n- Step 2: **Two-tailed** splits the significance level (e.g., X ≤ c₁ or X ≥ c₂ for H₁: p ≠ 0.5).  \n**Takeaway:** Two-tailed tests are more conservative because they require evidence in both directions to reject H₀.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What is the purpose of halving the significance level in two-tailed tests? (3 steps)", "answer": "- Step 1: Two-tailed tests compare the observed value to *both* tails of the distribution.  \n- Step 2: Halving ensures the total probability of rejecting H₀ when true is ≤ α (e.g., 2.5% per tail for 5% α).  \n- Step 3: Prevents inflating the Type I error rate by testing both directions.  \n**Edge Case:** If one tail’s probability is slightly over half α, the other can be under, balancing the total (e.g., 2.47% + 2.5% = 4.97%).", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you use a calculator to find critical values for binomial tests? (3 steps)", "answer": "- Step 1: Input n and p from H₀ into the calculator’s binomial distribution.  \n- Step 2: Use cumulative probability functions (e.g., P(X ≤ x) to find the smallest x where P(X ≥ x) ≤ α.  \n- Step 3: Verify the critical value’s P(X ≥ x) or P(X ≤ x) is as close as possible to α.  \n**Example:** For n=20, p=0.4, α=5%, find x where P(X ≥ x) ≤ 0.05. Critical value is x=11 (P=0.0307).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How do you test for a proportion p using a Poisson approximation? (3 steps)", "answer": "- Step 1: Use Poisson when n is large and p is small (e.g., n=100, p=0.01 → λ=np=1.0).  \n- Step 2: Convert binomial probabilities to Poisson (e.g., P(X ≥ 4) for λ=1.0).  \n- Step 3: Compare to the significance level (e.g., 5% → reject H₀ if P ≤ 0.05).  \n**Watch Out:** The Poisson approximation works poorly for p ≈ 0.5, even with large n.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How do you find critical regions for a Poisson distribution using tables? (3 steps)", "answer": "- Step 1: Use the Poisson table for λ under H₀.  \n- Step 2: For one-tailed tests, find the smallest x where P(X ≥ x) ≤ α.  \n- Step 3: For two-tailed tests, split α (2.5% per tail) and find x for both lower and upper regions.  \n**Example:** For λ=3.5, find x where P(X ≤ 1)=0.1359 (not extreme) but P(X ≥ 7)=0.0016 (Example 3). Critical region is X ≥ 7.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why is the critical value the first value in the critical region? (2 steps)", "answer": "- Step 1: The critical region must be the smallest range of x values where P(X in critical region) ≤ α.  \n- Step 2: The critical value is the *first* x where the cumulative probability drops below α.  \n**Visual Intuition:** Imagine a bell curve. The critical value is the point where the tail area (shaded) first meets α (e.g., 5%).", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How do you calculate the actual significance level for a two-tailed test? (2 steps)", "answer": "- Step 1: Add probabilities for both critical regions (e.g., P(X ≤ c₁) + P(X ≥ c₂)).  \n- Step 2: The sum is the actual significance level (e.g., 0.0247 + 0.0253 = 0.05 for Example 4).  \n**Takeaway:** The actual significance level accounts for both tails but may not exactly equal the stated α (e.g., 1.63% vs. 2% in Example 4).", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "How do you test if a coin is biased (e.g., H₁: p ≠ 0.5)? (4 steps)", "answer": "- Step 1: Define H₀: p=0.5 and H₁: p≠0.5.  \n- Step 2: Determine the critical regions (e.g., lower tail P(X ≤ 2)=0.0548, upper tail P(X ≥ 8)=0.0548 for n=10, α=10%).  \n- Step 3: Calculate P(X in critical region) and compare to α.  \n- Step 4: Conclude (e.g., \"There is insufficient evidence to reject H₀ at 10% significance\").  \n**Visual:** A symmetric binomial distribution around the expected value (e.g., X=5 for n=10, p=0.5).", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Why are hypothesis tests important in real-world applications (e.g., biology)? (3 steps)", "answer": "- Step 1: They provide a structured way to infer population parameters from sample data.  \n- Step 2: They quantify the risk of Type I errors (e.g., falsely claiming a new drug is effective).  \n- Step 3: Results guide decisions (e.g., adopting a new treatment if H₁ is supported).  \n**Example:** In Example 1, Olav uses hypothesis testing to determine if coin bias exists, avoiding subjective interpretations of chance.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "What is the acceptance region, and how does it relate to the critical region? (2 steps)", "answer": "- Step 1: The **acceptance region** includes all x values where H₀ is not rejected (e.g., 0 ≤ X ≤ 7 in Example 3).  \n- Step 2: The critical region is mutually exclusive; if x falls in the critical region, H₀ is rejected.  \n**Takeaway:** Acceptance and critical regions partition the distribution. x in the critical region means H₀ is unlikely.", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "How do you test if a Poisson rate λ has increased (e.g., Example 7)? (4 steps)", "answer": "- Step 1: Define H₀: λ=6.5 and H₁: λ≠6.5.  \n- Step 2: For two-tailed test, critical regions are X ≤ 1 and X ≥ 12.  \n- Step 3: Calculate actual significance level (0.0113 + 0.0339 = 0.0452).  \n- Step 4: Compare observed x (e.g., 1) to critical regions. Since 1 is in the lower critical region, reject H₀.  \n**Misconception:** A single observed x=1 might seem rare, but the actual significance level (4.52%) determines rejection, not intuition alone.", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "How do you test if a process is improving (e.g., seedlings surviving with new fertiliser)? (4 steps)", "answer": "- Step 1: H₀: p=1/3 (old survival rate), H₁: p>1/3 (new fertiliser improves it).  \n- Step 2: Find critical value for one-tailed test. For n=40, α=10%, critical region is X ≥ 17.  \n- Step 3: Calculate actual significance level (e.g., P(X ≥17)=5.84%).  \n- Step 4: If observed x (e.g., 21) is in the critical region, reject H₀.  \n**Takeaway:** The critical region is determined by the null hypothesis and significance level, not the observed data.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "What is the role of the significance level (e.g., 5%) in hypothesis testing? (3 steps)", "answer": "- Step 1: The significance level (α) is the threshold for rejecting H₀ (e.g., 5% → 5% risk of Type I error).  \n- Step 2: Lower α makes rejecting H₀ harder (e.g., α=1% requires stronger evidence).  \n- Step 3: α balances Type I/II error risks; too low might miss true effects (low power).  \n**Example:** In Example 3, α=1% requires critical region P(X ≥4)=1.78% (Example 3 uses α=5%).", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "How do you test if a new medicine is less effective than claimed (e.g., Example 8)? (4 steps)", "answer": "- Step 1: H₀: p=0.65 (standard treatment), H₁: p<0.65 (new is less effective).  \n- Step 2: Use binomial tables to find critical region (e.g., X ≤ 3 for n=10, α=5%).  \n- Step 3: Calculate P(X ≤ observed x) and compare to α.  \n- Step 4: For x=3, P(X ≤3)=0.037 (Example 8). Reject H₀ at 5% significance.  \n**Conclusion:** There’s sufficient evidence the new medicine is worse than standard (p=0.65 is rejected for p<0.65).", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}, {"question": "How do you test if a proportion differs from a national average (e.g., hospital infections)? (4 steps)", "answer": "- Step 1: H₀: p=0.3 (national rate), H₁: p≠0.3.  \n- Step 2: For two-tailed test, split α=5% into 2.5% per tail.  \n- Step 3: Find critical values (e.g., X ≤1 and X ≥8 for n=20, α=5%).  \n- Step 4: If observed x=8, reject H₀. The hospital’s infection rate differs from the national average.  \n**Takeaway:** Always state conclusions in context, linking to the critical region’s boundaries.", "source": "Qwen 3 ②", "_id": "qwen_2_25", "judge_pick": false}, {"question": "How do you use a normal approximation for a binomial test (e.g., manager’s claim of 45% support)? (4 steps)", "answer": "- Step 1: Check n is large and p≈0.5 (e.g., n=100, p=0.45 → μ=45, σ=√(100×0.45×0.55)=4.975).  \n- Step 2: Apply continuity correction (e.g., X ≥28 → Y ≥27.5 for normal Y ~ N(45, 4.975²)).  \n- Step 3: Calculate Z = (27.5 - 45)/4.975 ≈ -3.52. P(Z ≤ -3.52)=0.0002 (Example 9).  \n- Step 4: Since 0.0002 < 5%, reject H₀. Support is less than 45%.  \n**Takeaway:** Continuity correction adjusts for approximating discrete (binomial) with continuous (normal) distributions.", "source": "Qwen 3 ②", "_id": "qwen_2_26", "judge_pick": false}, {"question": "How do you interpret the actual significance level? (2 steps)", "answer": "- Step 1: The actual significance level is the exact probability of incorrectly rejecting H₀.  \n- Step 2: It’s calculated as the sum of probabilities in the critical region (e.g., Example 3’s 1.78% + 5.84% = 7.62%).  \n**Misconception:** The actual level isn’t the same as α. It’s the real risk of Type I error given the test’s critical region.", "source": "Qwen 3 ②", "_id": "qwen_2_27", "judge_pick": false}, {"question": "Why is hypothesis testing not a proof of H₁? (2 steps)", "answer": "- Step 1: Hypothesis testing quantifies evidence against H₀, not H₁.  \n- Step 2: Rejecting H₀ means H₁ is plausible, but it doesn’t confirm H₁ is true (e.g., Example 1’s 1.2% risk of incorrectly rejecting H₀).  \n**Conclusion:** Hypothesis tests are about statistical evidence, not absolute certainty.", "source": "Qwen 3 ②", "_id": "qwen_2_28", "judge_pick": false}, {"question": "How do you use a calculator for two-tailed Poisson tests? (3 steps)", "answer": "- Step 1: Input λ under H₀ (e.g., λ=4.5).  \n- Step 2: For two-tailed test (α=5%), find x where P(X ≤ c₁) and P(X ≥ c₂) ≤ 2.5% per tail.  \n- Step 3: Critical regions are X ≤2 and X ≥8. Actual significance level = 0.118 + 0.051 = 16.9% (Example 10).  \n**Watch Out:** Poisson’s actual significance level can be much higher than α if λ is small.", "source": "Qwen 3 ②", "_id": "qwen_2_29", "judge_pick": false}], "count": 30}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In hypothesis testing, why do we say we \"fail to reject\" the null hypothesis rather than \"accepting\" it? (3 steps)", "answer": "- Step 1: The null hypothesis H₀ represents what we assume to be true before collecting data. We only have evidence against it, not proof that it's false.\n- Step 2: When we \"fail to reject\" H₀, it means the data we observed is consistent with what we'd expect if H₀ were true—it doesn't prove H₀ is correct, just t
