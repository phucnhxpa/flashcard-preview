e. It doesn't change because it represents the true state of the entire population, even if we don't know its exact value.\n- Step 2: A **statistic** (like the sample mean $$\\bar{X}$$) is a random variable because its value depends on which specific individuals are randomly selected for the sample. Before the sample is drawn, the statistic can take multiple possible values according to its sampling distribution; it only becomes a fixed number after the sample is observed.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "A researcher wants to study the population of all residents in a city, but their sampling frame is the city's telephone directory. Why might this sampling frame not perfectly represent the population? (2 steps)", "answer": "- Step 1: A sampling frame is the list of units from which the sample is actually drawn. If the sampling frame differs from the population, some members of the population have zero chance of being selected.\n- Step 2: In this case, residents without a landline or those not listed in the directory (e.g., new residents, those with only mobile phones) are in the population but not in the sampling frame. This creates a coverage bias, meaning the sample cannot represent the entire population accurately.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A sample $$X_1, X_2, X_3$$ is taken from a population with unknown mean $$\\mu$$ and unknown variance $$\\sigma^2$$. Which of the following are statistics?\ni) $$X_1 + X_2 - X_3$$\nii) $$\\frac{X_1 + X_2 + X_3}{3} - \\mu$$\niii) $$\\frac{\\sum X_i}{3}$$ (2 steps)", "answer": "- Step 1: Recall that a statistic is a quantity calculated *only* from the observations in a sample, without using any unknown population parameters.\n- Step 2: Evaluate each expression:\n+ i) $$X_1 + X_2 - X_3$$ uses only sample observations, so it **is** a statistic.\n+ ii) $$\\frac{X_1 + X_2 + X_3}{3} - \\mu$$ includes the unknown population mean $$\\mu$$, so it is **not** a statistic.\n+ iii) $$\\frac{\\sum X_i}{3}$$ is the sample mean, calculated only from sample observations, so it **is** a statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}], "count": 25}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In statistical analysis, what defines a 'population', and how does a 'sample' fundamentally differ from it?", "answer": "- Step 1: A population is defined as the entire set of individual items (people, objects, measurements) that are of interest in a particular study. It is the complete group we want to learn about.\n- Step 2: A sample, on the other hand, is a subset or selection of observations taken from the population. \n- Step 3: The fundamental difference lies in scope and purpose: the population is the theoretical whole we wish to understand, while the sample is the practical, smaller group we actually observe to make inferences about that whole. We rarely observe the entire population due to constraints like time and cost.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "What is a census, and what is its main theoretical advantage compared to using a sample? (2 steps)", "answer": "- Step 1: A census is a study that observes or measures every single member of a population.\n- Step 2: Its main theoretical advantage is that, because it includes the entire population, it should give a completely accurate result (no sampling error). Unlike a sample, a census eliminates the natural variation that occurs when only a subset is chosen.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A manufacturer tests the lifetime of light bulbs by running them until they fail. Explain why a census would be disastrous here. (2 steps)", "answer": "- Step 1: In a census, every member of the population must be measured. For the light bulb manufacturer, this means testing every single light bulb until it fails.\n- Step 2: Because the testing process destroys the item (the bulb burns out), conducting a census would leave the manufacturer with zero light bulbs left to sell. This is a classic scenario where a sample is the only viable option.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Beyond destructive testing, what are the primary practical disadvantages of conducting a census instead of a sample? (2 steps)", "answer": "- Step 1: A census is highly time-consuming and expensive. Contacting, measuring, or surveying every individual in a large population requires immense resources that are often unavailable.\n- Step 2: Even if the data is collected, processing a massive quantity of data is cumbersome. Additionally, if the population is large, it can be extremely difficult to process and analyze the data efficiently compared to a manageable sample.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is a key disadvantage of using a sample instead of a census, particularly regarding the accuracy and representation of the data? (2 steps)", "answer": "- Step 1: The data from a sample may not be as accurate as data from a census due to sampling error. Because you are only observing a subset, the sample's characteristics might naturally differ from the population's true characteristics.\n- Step 2: The sample may not be large enough to give reliable information about small subgroups of the population. If a minority group is very small, they might be entirely missed in a small sample, leading to biased conclusions about the population as a whole.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "How does the natural variation within a population affect the required sample size for accurate conclusions? (2 steps)", "answer": "- Step 1: Natural variation refers to how spread out or diverse the values in the population are. \n- Step 2: If a population is very varied (high variance), you need a larger sample size to capture that diversity accurately. If the population is uniform (low variance), a smaller sample will suffice because almost any selection will look like the whole.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is a 'sampling unit', and how does it relate to a 'sampling frame'? (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item of the population that could be selected in a sample. For example, if studying student opinions, each student is a sampling unit.\n- Step 2: A sampling frame is a list of all the sampling units in the population, often with each unit named or numbered. It is the practical mechanism from which a sample is drawn (e.g., a student register). Note that a sampling frame might not perfectly match the population if the list is outdated or incomplete.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "A city council wants to survey residents about a new park. The population is all city residents. The council uses the local telephone directory as their sampling frame. What is a potential mismatch between the population and this sampling frame? (2 steps)", "answer": "- Step 1: A sampling frame should ideally list every member of the population. Here, the population is \"all city residents\".\n- Step 2: The telephone directory will miss residents who do not have a landline (e.g., those who only use mobile phones) and will include businesses or people who have moved away. This creates a mismatch where certain population members have zero chance of being selected, leading to undercoverage bias.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "What defines a 'population parameter', and what notation convention is typically used for it? (2 steps)", "answer": "- Step 1: A population parameter is a numerical characteristic or measurable property of an entire population (such as the true population mean or variance).\n- Step 2: By convention, Greek letters are typically used to denote population parameters. For example, $$\\mu$$ represents the population mean, and $$\\sigma^2$$ represents the population variance.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is the strict definition of a 'statistic' in statistics, and what critical rule distinguishes it from other calculations? (2 steps)", "answer": "- Step 1: A statistic is a quantity calculated only from the observations in a sample. It is a numerical property of the sample, such as the sample mean $$\\bar{X}$$ or sample variance $$S^2$$.\n- Step 2: The critical rule is that a statistic must not involve any unknown population parameters. For example, $$\\frac{\\sum X_i}{n}$$ is a statistic, but $$\\frac{\\sum (X_i - \\mu)}{n}$$ is not a statistic because it depends on the unknown population mean $$\\mu$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "You are given a sample $$X_1, X_2, \\ldots, X_n$$ from a population with unknown mean $$\\mu$$ and variance $$\\sigma^2$$. Is the expression $$\\frac{\\sum X_i^2}{n} - \\mu^2$$ a statistic? Explain why or why not. (2 steps)", "answer": "- Step 1: To determine if an expression is a statistic, we check if it relies only on sample observations and known constants, with no unknown population parameters.\n- Step 2: The term $$\\frac{\\sum X_i^2}{n}$$ uses only sample observations, but the term $$\\mu^2$$ involves the unknown population mean $$\\mu$$. Because the calculation involves this unknown parameter, the expression is NOT a statistic.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A sample $$X_1, X_2, \\ldots, X_n$$ is taken from a population. Is the expression $$\\frac{X_1 + X_5 + X_{10}}{3}$$ a statistic? Explain your reasoning. (2 steps)", "answer": "- Step 1: We apply the rule that a statistic must be calculated only from the observations in the sample, without any unknown population parameters.\n- Step 2: The expression $$\\frac{X_1 + X_5 + X_{10}}{3}$$ is formed entirely from sample observations ($$X_1, X_5, X_{10}$$) and known constants. It does not require any knowledge of $$\\mu$$ or $$\\sigma^2$$. Therefore, it IS a statistic.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Why is the sample variance formula $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$ considered a statistic, while $$\\frac{\\sum(X_i - \\mu)^2}{n}$$ is not? (2 steps)", "answer": "- Step 1: The formula $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$ uses only the sample values $$X_i$$ and the sample mean $$\\bar{X}$$ (which is itself calculated from the sample). It contains no unknown population parameters, so it is a statistic.\n- Step 2: The formula $$\\frac{\\sum(X_i - \\mu)^2}{n}$$ requires the value of the population mean $$\\mu$$. Since $$\\mu$$ is generally unknown and cannot be calculated from the sample alone, this expression is not a statistic.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Conceptually, what is a 'sampling distribution' of a statistic? What two things must it specify? (2 steps)", "answer": "- Step 1: A sampling distribution is the probability distribution of a given statistic. If you were to repeatedly take samples of the same size from a population and calculate the same statistic each time, the statistic would take on a range of different values. The sampling distribution describes this variation.\n- Step 2: It must specify all possible values the statistic can take, and the probability that each value would occur by chance alone. It transforms a deterministic sample calculation into a random variable with its own distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A school asks 15 students if they support uniforms (1 = support, 0 = oppose). The parameter of interest is $$p$$, the proportion supporting it. What is the sampling distribution of the statistic $$Y = \\sum_{i=1}^{15} X_i$$, and why? (2 steps)", "answer": "- Step 1: The statistic $$Y$$ represents the total number of students in the sample who support the idea (the count of 'successes'). \n- Step 2: Because the sample is random, each observation is independent, the probability $$p$$ is constant, and the outcomes are binary (1 or 0), these are the exact conditions for a Binomial distribution. Therefore, the sampling distribution of $$Y$$ is $$Y \\sim \\text{B}(15, p)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A population consists of items with only two possible values, 60 and 100, in a 3:1 ratio. A sample of 3 items is taken. To find the sampling distribution of the sample mean $$\\bar{X}$$, what is the first conceptual step regarding the possible samples? (2 steps)", "answer": "- Step 1: The first conceptual step is to recognize that because we are taking a sample of size 3, each sample will consist of 3 values. We must consider all possible combinations of these 3 values.\n- Step 2: Since each item can be either 60 or 100, there are $$2 \\times 2 \\times 2 = 8$$ possible samples (e.g., (60,60,60), (60,60,100), etc.). We must list these samples and calculate the mean $$\\bar{X}$$ for each one.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In a population with values 60 (probability 3/4) and 100 (probability 1/4), a sample of 3 is taken. For the sample (60, 60, 100), what is the sample mean $$\\bar{X}$$ and the probability of selecting this specific sample? (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ is the sum of the sample values divided by the sample size. Here, $$\\bar{X} = \\frac{60 + 60 + 100}{3} = \\frac{220}{3} = 73\\frac{1}{3}$$.\n- Step 2: Since the sampling is random, the probability of selecting this specific ordered sample is the product of the individual probabilities: $$\\text{P}(60) \\times \\text{P}(60) \\times \\text{P}(100) = \\frac{3}{4} \\times \\frac{3}{4} \\times \\frac{1}{4} = \\frac{9}{64}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When calculating the probability of getting a sample mean of $$73\\frac{1}{3}$$ from a population of 60s (p=3/4) and 100s (p=1/4) in a sample of 3, why must we consider multiple different sample arrangements? (2 steps)", "answer": "- Step 1: A sample mean of $$73\\frac{1}{3}$$ corresponds to exactly two 60s and one 100. However, there are multiple ways this can occur in an ordered sample: (60, 60, 100), (60, 100, 60), and (100, 60, 60).\n- Step 2: Each of these specific arrangements has a probability of $$\\frac{9}{64}$$. To find the total probability of the mean being $$73\\frac{1}{3}$$, we must add the probabilities of all mutually exclusive arrangements that result in this mean. Thus, $$\\text{P}(\\bar{X} = 73\\frac{1}{3}) = 3 \\times \\frac{9}{64} = \\frac{27}{64}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In a sample of 3 from a population of 60s and 100s (3:1 ratio), what is the only possible sample that yields a mode $$M = 100$$, and what is its probability? (2 steps)", "answer": "- Step 1: The mode is the most frequent value in the sample. For the mode to be 100, there must be at least two 100s in the sample of 3. The only way this can happen is if all three values are 100: the sample (100, 100, 100).\n- Step 2: The probability of selecting a 100 three times in a row is $$\\text{P}(100) \\times \\text{P}(100) \\times \\text{P}(100) = \\frac{1}{4} \\times \\frac{1}{4} \\times \\frac{1}{4} = \\frac{1}{64}$$. Any sample with two or fewer 100s will have 60 as the mode.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A bag has counters labeled 0 (10%), 1 (40%), and 2 (50%). A sample of 3 is taken. For the median of the sample to be 0, what must be true about the sample values, and what is the only ordered sample that achieves this if no 1s or 2s are allowed? (2 steps)", "answer": "- Step 1: The median of 3 values is the middle value when ordered. For the median to be 0, at least two of the three values must be 0 (so the middle value is forced to 0). This means the sample can have at most one value greater than 0.\n- Step 2: The only ordered sample with no 1s or 2s is (0, 0, 0). Its probability is $$0.1 \\times 0.1 \\times 0.1 = 0.001$$. (Other samples like (0,0,1) also have a median of 0, but (0,0,0) is the extreme case).", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "To find the sampling distribution of the median for a sample of 3 from a population of 0s, 1s, and 2s, why can't we simply use a binomial distribution like we do for a sum? (2 steps)", "answer": "- Step 1: A binomial distribution counts the total number of \"successes\" and relies on a binary outcome (success/failure). Here, the population has three distinct outcomes (0, 1, 2), so it is not binary.\n- Step 2: The median is a positional statistic (the middle value of an ordered set), not a simple sum of indicator variables. Its value depends on complex interactions between the counts of 0s, 1s, and 2s, requiring us to enumerate the possible ordered samples and their specific probabilities (using the multinomial principle) rather than applying a simple binomial formula.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "Let $$X_1, X_2, \\ldots, X_n$$ be independent observations from a distribution with mean $$\\mu$$ and variance $$\\sigma^2$$. Intuitively, why do we expect the sample mean $$\\bar{X}$$ to have the same expected value as the population mean $$\\mu$$? (2 steps)", "answer": "- Step 1: Each individual observation $$X_i$$ is drawn from the population, so by definition, $$\\text{E}(X_i) = \\mu$$ for every single observation.\n- Step 2: The sample mean is $$\\bar{X} = \\frac{X_1 + X_2 + \\ldots + X_n}{n}$$. By the linearity of expectation, $$\\text{E}(\\bar{X}) = \\frac{\\text{E}(X_1) + \\text{E}(X_2) + \\ldots + \\text{E}(X_n)}{n} = \\frac{n\\mu}{n} = \\mu$$. Averaging unbiased observations of $$\\mu$$ still gives an unbiased estimate of $$\\mu$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Let $$X_1, X_2, \\ldots, X_n$$ be independent observations from a distribution with variance $$\\sigma^2$$. Conceptually, why does the variance of the sample mean, $$\\text{Var}(\\bar{X})$$, decrease as the sample size $$n$$ increases? (3 steps)", "answer": "- Step 1: The sample mean is $$\\bar{X} = \\frac{1}{n}\\sum X_i$$. The variance of a constant multiple is $$\\text{Var}(aX) = a^2\\text{Var}(X)$$, so the $$\\frac{1}{n}$$ factor will contribute $$\\frac{1}{n^2}$$ to the variance of the sum.\n- Step 2: Because the observations are independent, the variance of the sum is the sum of the variances: $$\\text{Var}(\\sum X_i) = \\sum \\text{Var}(X_i) = n\\sigma^2$$.\n- Step 3: Combining these, $$\\text{Var}(\\bar{X}) = \\text{Var}\\left(\\frac{1}{n}\\sum X_i\\right) = \\frac{1}{n^2} \\times n\\sigma^2 = \\frac{\\sigma^2}{n}$$. As $$n$$ gets larger, the denominator grows, so the variance shrinks. This reflects the intuition that larger samples give more precise, less variable estimates of the true mean.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "Exercise: A drawer contains a large number of coins: 50% are 50-cent coins and 50% are 10-cent coins. A random sample of 2 coins is taken. Find the probability that the sample mean $$\\bar{X}$$ is 30 cents. (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ will be 30 cents only if one coin is a 50-cent coin and the other is a 10-cent coin. The sum would be $$50 + 10 = 60$$, and the mean is $$60 / 2 = 30$$.\n- Step 2: There are two ways this can happen: (50, 10) and (10, 50). The probability of (50, 10) is $$0.5 \\times 0.5 = 0.25$$. The probability of (10, 50) is also $$0.25$$. Adding these gives $$\\text{P}(\\bar{X} = 30) = 0.25 + 0.25 = 0.5$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Exercise: A population consists of 60% 6s and 40% 10s. A sample of 3 is drawn. What is the probability that the mode of the sample is 6? (3 steps)", "answer": "- Step 1: The mode will be 6 if the majority of the sample values are 6s. In a sample of 3, this means we must have either two 6s and one 10, or three 6s.\n- Step 2: The probability of exactly two 6s (and one 10) follows a binomial pattern for the count of 6s: $$\\binom{3}{2} \\times (0.6)^2 \\times (0.4)^1 = 3 \\times 0.36 \\times 0.4 = 0.432$$.\n- Step 3: The probability of exactly three 6s is $$(0.6)^3 = 0.216$$. The total probability that the mode is 6 is the sum: $$0.432 + 0.216 = 0.648$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "If you take a sample of 4 items from a population with mean $$\\mu$$ and variance $$\\sigma^2$$, what is the variance of the sample mean $$\\bar{X}$$? What does this tell you about the spread of sample means compared to the spread of the population? (2 steps)", "answer": "- Step 1: The variance of the sample mean is given by $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{n}$$. For a sample of size $$n=4$$, this is $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{4}$$.\n- Step 2: This tells us that the spread (variance) of the distribution of sample means is only a quarter of the spread of the individual population values. The sample means are clustered much more tightly around the true mean $$\\mu$$ than the individual data points are.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A company tests every 200th light bulb coming off the assembly line. Why is this technically a sample and not a census, even though they are testing bulbs continuously? (2 steps)", "answer": "- Step 1: A census requires observing or measuring *every* member of the population. Here, the population is all light bulbs manufactured, but the company is only testing a subset (1 out of every 200).\n- Step 2: Because the vast majority of the population is not measured, this is a sample. Specifically, it is a systematic sample, but it still suffers from the general disadvantages of a sample, such as the potential for sampling error if the interval happens to align with a pattern in the manufacturing process.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A gym owner asks all 10 of their florists for their views on flower quality. What is a key reason the owner chose a census over a sample here, relating to the size of the population? (2 steps)", "answer": "- Step 1: The population here is extremely small (only 10 florists). One of the main disadvantages of a census is that it is time-consuming and expensive, but with a population of 10, these disadvantages are negligible.\n- Step 2: By using a census, the owner avoids the main disadvantage of a sample: inaccuracy or missing minority views. With a population this small, it is efficient to get the complete picture and achieve a completely accurate result.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "If a sampling distribution for a statistic is heavily skewed, what does that tell you about the statistic as an estimator for the population parameter? (2 steps)", "answer": "- Step 1: A heavily skewed sampling distribution means that the statistic is more likely to fall on one side of the true parameter value than the other.\n- Step 2: This suggests that the statistic might be a biased estimator, or that the sample size is too small for the Central Limit Theorem to normalize the distribution. It means a single sample calculation is less likely to be close to the true parameter, and the direction of error is predictable.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Why is $$\\frac{\\sum X^2}{n} - \\left(\\frac{\\sum X}{n}\\right)^2$$ considered a statistic, even though it looks complex? (2 steps)", "answer": "- Step 1: A statistic is defined as any quantity calculated *only* from the observations in a sample, without using unknown population parameters.\n- Step 2: Looking at the expression, $$\\sum X^2$$ and $$\\sum X$$ are both sums of sample observations, and $$n$$ is the known sample size. There are no Greek letters or unknown population parameters like $$\\mu$$ or $$\\sigma^2$$ involved. It is simply a computational formula for the sample variance, making it a perfectly valid statistic.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}], "count": 30}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define \"population,\" \"sample,\" and \"census\" in statistics. (3 steps)", "answer": "- Step 1: A **population** is the entire set of individuals or items of interest in a study. It’s the complete group from which data could be collected.\n- Step 2: A **sample** is a subset of the population selected for analysis. It’s used to estimate characteristics of the population when studying the entire population is impractical.\n- Step 3: A **census** involves collecting data from every member of the population. It provides complete accuracy but is often resource-intensive.\n\nWhy is this important?  \n- Populations are often too large to study fully.  \n- Samples allow efficient data collection but risk sampling error.  \n- Censuses are ideal for accuracy but may be destructive or cost-prohibitive.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why might a census be inappropriate for testing product quality when testing destroys the item? (3 steps)", "answer": "- Step 1: A census requires measuring every item in the population.  \n- Step 2: If testing destroys the item (e.g., breaking a rope to test strength), a census would eliminate the entire product stock.  \n- Step 3: This makes the product unsellable or unusable, rendering the census counterproductive.\n\nWhy else?  \n- **Destruction risk**: Testing every unit ruins the inventory.  \n- **Cost-benefit**: A sample provides usable insights without total loss.  \n- **Practicality**: Even small samples can estimate reliability with statistical confidence.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What are three advantages of using a sample instead of a census? (3 steps)", "answer": "- Step 1: **Cost-effectiveness**: Sampling reduces expenses compared to studying the entire population.  \n- Step 2: **Time efficiency**: Data collection and analysis are faster with smaller datasets.  \n- Step 3: **Feasibility**: Some populations are too large, infinite, or inaccessible for a census.\n\nEdge case:  \n+ A sample may miss rare subgroups if underrepresented.  \n+ The trade-off is balancing accuracy against resource constraints.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Define \"statistic\" and explain why a formula involving an unknown population parameter is NOT a statistic. (2 steps)", "answer": "- Step 1: A **statistic** is a quantity calculated solely from sample data (e.g., sample mean $\\bar{X}$).  \n- Step 2: A formula involving unknown parameters (e.g., $\\frac{\\sum X}{n} - \\mu^2$) is not a statistic because $\\mu$ (population mean) is unknown and must be estimated, not calculated from the sample alone.\n\nMisconception:  \n+ Confusing statistics (sample-derived) with parameters (population values).  \n+ Example: $\\bar{X}$ is a statistic; $\\mu$ is a parameter.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the sample variance $S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$ a statistic, but $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ is not? (2 steps)", "answer": "- Step 1: $S^2$ uses $\\bar{X}$ (calculated from the sample), not $\\mu$ (unknown population parameter).  \n- Step 2: The second formula depends on $\\mu$, which is not derived solely from the sample, disqualifying it as a statistic.\n\nContrast:  \n+ $S^2$ is sample-based; $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ is not.  \n+ Statistics must be computable without external parameters.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "What is a sampling distribution, and why is it important for hypothesis testing? (3 steps)", "answer": "- Step 1: A **sampling distribution** is the probability distribution of a statistic (e.g., sample mean) over many samples from the same population.  \n- Step 2: It shows all possible values of the statistic and their probabilities, enabling probabilistic inference.  \n- Step 3: In hypothesis testing, it helps determine if observed results are statistically significant by comparing them to expected distributions under the null hypothesis.\n\nExample:  \n+ The sampling distribution of $\\bar{X}$ for a binomial population becomes normal as sample size increases (CLT).  \n+ Without it, we couldn’t calculate p-values or confidence intervals.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "For a binary population (e.g., 15 students supporting a school uniform), why is the sampling distribution of $Y = \\sum X_i$ binomial? (3 steps)", "answer": "- Step 1: Each trial (student) has two outcomes: support (1) or not (0).  \n- Step 2: Trials are independent (random sampling) with constant success probability $p$.  \n- Step 3: The number of successes $Y$ follows $Y \\sim \\text{Bin}(n=15, p)$.  \n\nKey conditions:  \n+ Independence: Sampled students don’t influence each other.  \n+ Constant $p$: Probability of support is the same for all students.  \n+ Fixed $n$: 15 students are sampled.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How does sample size affect the accuracy of estimating a population parameter? (3 steps)", "answer": "- Step 1: Larger samples reduce **sampling variability** (spread of the sampling distribution).  \n- Step 2: Larger samples better approximate the population, reducing the risk of outliers skewing results.  \n- Step 3: Accuracy plateaus as sample size increases due to diminishing returns (e.g., CLT applies at ~n=30).\n\nTrade-off:  \n+ Larger samples require more resources but improve reliability.  \n+ Smaller samples risk Type II errors (failing to detect true effects).", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why might a sample of size 3 from a population of light bulbs (60W and 100W in ratio 3:1) have a sampling distribution with mean 70W but variance 300W²? (3 steps)", "answer": "- Step 1: The population is a Bernoulli trial with values 60W (75%) and 100W (25%).  \n- Step 2: Population mean $\\mu = 60 \\cdot 0.75 + 100 \\cdot 0.25 = 70$W.  \n- Step 3: Population variance $\\sigma^2 = (60^2 \\cdot 0.75 + 100^2 \\cdot 0.25) - 70^2 = 300$W². The sample mean’s variance is $\\frac{\\sigma^2}{n} = \\frac{300}{3} = 100$W².\n\nVisual intuition:  \n+ The sampling distribution of $\\bar{X}$ is centered at 70W but narrower than the population distribution.  \n+ Variance shrinks as $n$ increases.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does the sampling distribution of the **mode** differ from that of the **mean** in a sample of 3 light bulbs? (3 steps)", "answer": "- Step 1: The **mode** (most frequent value) has discrete probabilities (e.g., 60W or 100W only).  \n- Step 2: The **mean** can take fractional values (e.g., $73\\frac{1}{3}$W) due to averaging.  \n- Step 3: The mode’s distribution is skewed by the population ratio (3:1), while the mean’s distribution is continuous and symmetric for balanced populations.\n\nExample:  \n+ Mode: $P(M=60) = 27/32$ vs. $P(M=100) = 5/32$.  \n+ Mean: Probabilities depend on combinations of 60s and 100s.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define population, sample, and census in statistics. What is a key practical reason why a census might not be feasible in some cases? (3 steps)", "answer": "- Step 1: **Population** is the entire set of items/individuals under study. A **sample** is a subset of the population used to infer properties of the whole. A **census** involves collecting data from every member of the population.  \n- Step 2: **Key practical limitation**: A census is often impractical due to time, cost, or destructive testing. For example, testing all plums for ripeness would destroy the entire shipment, leaving none to sell.  \n+ Example: Testing ropes for breaking strength (Exercise 6A Q2) would destroy all ropes, making a census impossible.  \n- Step 3: **Trade-off**: While a census gives perfect accuracy, it’s often replaced by sampling due to resource constraints or ethical concerns (e.g., destructive testing).  \n\n**Takeaway:** A census is ideal but often impractical; sampling balances accuracy with feasibility.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "Why might a larger sample size improve the accuracy of conclusions about a population? (3 steps)", "answer": "- Step 1: Larger samples reduce sampling variability. By including more individuals, the sample better represents the population’s diversity.  \n- Step 2: Central Limit Theorem intuition: Larger samples make the sampling distribution of the mean more normally distributed, reducing skew.  \n+ Analogy: Imagine flipping a coin 10 vs. 1000 times – the proportion of heads stabilizes closer to 0.5 with larger trials.  \n- Step 3: **Limitation**: Larger samples don’t eliminate bias. If the sampling method is flawed (e.g., selecting only ripe plums), accuracy isn’t improved.  \n\n**Takeaway:** Larger samples reduce random error but not systematic bias.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "A manufacturer tests 4 ropes for breaking strength (loads: 320kg, 260kg, 240kg, 180kg). The factory claims ropes are safe for 250kg. How might sampling variability affect the validity of this claim?", "answer": "A statistic (e.g., sample mean) is a random variable. Here, the sample mean is $ \\bar{x} = \\frac{320+260+240+180}{4} = 250kg $. However:  \n+ The sample is tiny (n=4), so variability is high.  \n+ One rope (180kg) fails below 250kg, suggesting potential inconsistency.  \n- Conclusion: The claim might be misleading because the sample size is too small to reliably estimate the population mean or variability.  \n\n**Takeaway:** Small samples may not capture extreme values or true population parameters.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "What defines a **statistic**, and why is $ \\frac{\\sum X}{n} - \\mu^2 $ not a statistic? (2 steps)", "answer": "- Step 1: A **statistic** is a quantity calculated **only from sample data** (no unknown parameters).  \n- Step 2: $ \\frac{\\sum X}{n} - \\mu^2 $ includes $ \\mu $, the population mean, which is unknown in practice. Thus, it depends on an unobservable parameter and violates the definition.  \n+ Contrast: $ \\frac{\\sum X}{n} $ is a statistic (sample mean), but subtracting $ \\mu^2 $ makes it invalid.  \n\n**Takeaway:** Statistics must be computable solely from observed data.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "A random sample of 15 students is asked about school uniform support (1 = support, 0 = oppose). Why is $ Y = \\sum X_i $ a statistic, and what distribution does it follow? (3 steps)", "answer": "- Step 1: $ Y $ is a statistic because it’s derived solely from the sample (sum of 1s and 0s).  \n- Step 2: Conditions for binomial:  \n+ Binary outcome (support/oppose)  \n+ Independent trials (random sampling)  \n+ Constant probability $ p $ (proportion supporting)  \n- Step 3: $ Y \\sim \\text{Binomial}(n=15, p) $. The sampling distribution depends on $ p $, which is a population parameter.  \n\n**Takeaway:** Sums of binary variables often follow binomial distributions.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "A population has light bulbs in a 3:1 ratio of 60W to 100W. What is the population mean and variance? (3 steps)", "answer": "- Step 1: Define probabilities: $ P(60W) = 0.75 $, $ P(100W) = 0.25 $.  \n- Step 2: Compute mean:  \n$$\n\\mu = 60 \\times 0.75 + 100 \\times 0.25 = 70 \\text{ watts}\n$$  \n- Step 3: Compute variance:  \n$$\n\\sigma^2 = (60^2 \\times 0.75 + 100^2 \\times 0.25) - 70^2 = 300 \\text{ watts}^2\n$$  \n+ Intuition: Variance measures spread of wattage around the mean of 70W.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How does the sampling distribution of the sample median work? Use the example of counters labeled 0 (10%), 1 (40%), 2 (50%) and samples of size 3.", "answer": "- Step 1: The **sampling distribution of the median** lists all possible median values and their probabilities. For size-3 samples, the median is the middle value.  \n- Step 2: Enumerate all possible samples (e.g., [0,0,0], [0,0,1], ..., [2,2,2]) and compute their medians.  \n- Step 3: Calculate probabilities by summing the probabilities of samples that share the same median.  \n+ Example: Median=1 occurs for samples like [0,1,2] or [1,1,2], leading to $ P(N=1) = \\frac{59}{125} $.  \n\n**Takeaway:** The median’s distribution depends on the ordering of values in the sample.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the sample variance formula $ S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1} $ instead of dividing by $ n $?", "answer": "- Step 1: Dividing by $ n-1 $ makes $ S^2 $ an **unbiased estimator** of the population variance $ \\sigma^2 $.  \n- Step 2: Using $ \\bar{X} $ (a statistic estimated from the data) reduces degrees of freedom by 1.  \n+ If $ \\mu $ were known, we’d divide by $ n $, but typically $ \\mu $ is unknown.  \n- Step 3: Bias correction: Dividing by $ n-1 $ adjusts for the fact that $ \\bar{X} $ is closer to the data points than the true $ \\mu $.  \n\n**Takeaway:** $ n-1 $ accounts for uncertainty in estimating the mean.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "A light bulb manufacturer tests 5 switches for lifespan. The sample mean is 21,215 cycles. Why might this not confirm the claim of \"20,000 average cycles\"? (3 steps)", "answer": "- Step 1: The sample mean is a **point estimate**, not the true population mean. Variability exists even if the true mean is 20,000.  \n- Step 2: Compute the standard error: With small $ n=5 $, the standard error $ SE = \\frac{s}{\\sqrt{n}} $ could be large, making 21,215 statistically insignificant.  \n+ Example: If individual lifespans vary widely (e.g., 7k to 25k cycles), the sample mean might not be reliable.  \n- Step 3: **Hypothesis testing** is needed to determine if the observed difference is likely due to chance.  \n\n**Takeaway:** A statistic alone doesn’t confirm a claim without context about variability.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the sampling distribution of the sample mean for samples of size 3 from a population of 3-liter and 2-liter milk cartons (3:2 ratio)? (4 steps)", "answer": "- Step 1: Define probabilities. $ P(3L) = 0.6 $, $ P(2L) = 0.4 $.  \n- Step 2: Enumerate all $ 2^3 = 8 $ possible samples (e.g., [3,3,3], [3,3,2], ..., [2,2,2]).  \n- Step 3: Compute the mean for each sample (e.g., [3,3,2] → $ \\frac{8}{3} \\approx 2.67 $).  \n- Step 4: Assign probabilities by multiplying individual probabilities and sum for each unique mean.  \n+ Example: Mean of 3L occurs only for [3,3,3], probability $ 0.6^3 = 0.216 $.  \n\n**Takeaway:** Sampling distributions are derived by aggregating probabilities from all possible samples.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is a census, and why might it be impractical or impossible to use a census in certain situations? (2 steps)", "answer": "- Step 1: A census is the process of observing or measuring every single member of the entire population.\n- Step 2: Reasons a census may be impractical include: (1) the population is too large to feasibly measure all members, (2) the testing process destroys the items being tested (e.g., testing every light bulb by running it until it breaks would leave nothing to sell), (3) it is extremely time-consuming and expensive, and (4) processing massive amounts of data becomes unwieldy.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Explain what a \"sample\" is in statistics, and contrast it with a census. Why might a researcher choose a sample over a census? (3 steps)", "answer": "- Step 1: A sample is a selection of observations taken from a subset of the population, used to make inferences about the population as a whole.\n- Step 2: Unlike a census (which examines every member), a sample examines only a portion.\n- Step 3: Researchers choose samples because they are: less time-consuming and expensive, require fewer personnel, produce less data to process, and are the only option when testing destroys the items.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is a \"sampling unit\"? Give an example from a specific population context. (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item within a population — the smallest distinct element that can be selected.\n- Step 2: For example: if the population is all students at a school, each individual student is a sampling unit. If the population is all light bulbs manufactured, each individual light bulb is a sampling unit.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is a sampling frame, and how does it relate to the population being studied? Provide a practical example. (2 steps)", "answer": "- Step 1: A sampling frame is a practical list of sampling units used to select samples from a population. It's the \"list\" from which samples are actually drawn.\n- Step 2: Example: If studying opinions of gym members, the sampling frame might be the会员登记册 (membership register). The population is all current members, but the sampling frame is the actual list available for selection. ⚠️ Important: The sampling frame may not exactly match the population — it might be outdated or incomplete.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A researcher wants to survey opinions of residents in a city. The sampling frame is the electoral register (list of registered voters). Explain one situation where the sampling frame and population would differ. (2 steps)", "answer": "- Step 1: The population includes all residents, but the electoral register only includes registered voters.\n- Step 2: This creates coverage bias: unregistered residents (perhaps non-citizens, felons, or those who chose not to register) cannot be selected, so the sample won't truly represent the entire resident population.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Complete the following table comparing census and sample methods:", "answer": "| | Census | Sample |\n|---|---|---|\n| Main advantage | Should give completely accurate results (no sampling error) | Less time-consuming, expensive, and fewer people needed |\n| Main disadvantage | Time-consuming, expensive, cannot be used when testing destroys items, hard to process large data | Data may be less accurate; sample may not be large enough for small subgroups; different samples can yield different conclusions |", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A supermarket tests 5 plums from a delivery and finds 4 are ripe, estimating 80% are ripe. A critic says this estimate is unreliable. Explain why, and what could improve it. (2 steps)", "answer": "- Step 1: With only 5 plums, the sample is extremely small. The natural variation in the population means different samples of 5 could yield very different proportions (from 0% to 100% ripe).\n- Step 2: Increasing the sample size (e.g., testing 30 plums) would provide a more reliable estimate because: larger samples better capture the true population proportion, reduce the impact of outliers, and narrow the confidence interval around the estimate.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is a population parameter? How is it typically denoted, and why might we need to estimate it from a sample? (3 steps)", "answer": "- Step 1: A population parameter is a measurable characteristic of the entire population — a numerical property. Examples include the population mean (μ) and population variance (σ²).\n- Step 2: We use Greek letters (μ, σ, ρ) to denote population parameters.\n- Step 3: We often cannot measure every member of the population (due to cost, time, or destruction), so we take a random sample and calculate a statistic to estimate the parameter.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Define what a \"statistic\" is in statistics. How does it differ from a parameter? (2 steps)", "answer": "- Step 1: A statistic is a quantity calculated only from observations in a sample. It uses sample data alone — no unknown population parameters.\n- Step 2: Unlike a parameter (which describes the whole population and uses Greek letters), a statistic describes the sample and uses Roman letters (e.g., x̄ for sample mean, s² for sample variance).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A random sample of observations is given by X₁, X₂, ..., Xₙ. For each of the following, state whether it is a statistic and explain why:\n$$\\text{(i)} \\frac{X_2 + X_5 + X_8}{3} \\quad \\text{(ii)} \\frac{\\sum X^2}{n} - \\left(\\frac{\\sum X}{n}\\right)^2 \\quad \\text{(iii)} \\frac{\\sum X}{n} - \\mu^2$$ (3 steps)", "answer": "- Step 1: (i) This is a statistic — it's calculated purely from sample observations X₁,...,X₈ with no unknown parameters involved.\n- Step 2: (ii) This is a statistic — it's the sample variance formula (or close to it), computed entirely from the Xᵢ values in the sample.\n+ This formula is actually the population variance formula applied to the sample; it's equivalent to s² when using n in the denominator.\n- Step 3: (iii) This is NOT a statistic — it involves μ (the population mean), which is an unknown parameter. A statistic cannot involve any unknown population parameters.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the context of Example 2, explain why the sample mean x̄ can be used to estimate the population mean μ, but the sample variance formula depends on whether we divide by n or (n-1). (2 steps)", "answer": "- Step 1: The sample mean x̄ = ΣXᵢ/n is a statistic — it's calculated entirely from sample data.\n- Step 2: Using n-1 in the denominator (creating the unbiased estimator s² = Σ(Xᵢ - x̄)²/(n-1)) gives an unbiased estimate of the population variance σ². Using n would systematically underestimate σ². Both are statistics since neither involves μ.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "What is a sampling distribution? Explain the key idea by contrasting \"population distribution\" with \"sampling distribution.\" (2 steps)", "answer": "- Step 1: A sampling distribution is the probability distribution of a statistic obtained from all possible samples of a given size from a population.\n- Step 2: The key distinction: the population distribution describes how individual observations vary, while the sampling distribution describes how the statistic (like sample mean) varies from sample to sample. If you took ALL possible samples and computed the statistic for each, the distribution you'd observe is the sampling distribution.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A school wants to know student support for introducing a uniform. Let X = 1 if a student supports, 0 otherwise. In a random sample of 15 students, what is the sampling distribution of Y = ΣXᵢ (the number who support)? Explain. (3 steps)", "answer": "- Step 1: The population consists of 1's (support) and 0's (don't support), with unknown proportion p supporting.\n- Step 2: For each sampled student: the observation is either 1 (success) or 0 (failure), with probability p of success. The observations are independent.\n- Step 3: These are exactly the conditions for a binomial distribution. Therefore Y ~ B(15, p), meaning the sampling distribution is Binomial with n=15 and probability p.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A population has 60W and 100W bulbs in ratio 3:1. For a sample of 3 bulbs, verify that P(Ē = 73⅓) = 27/64. Show the reasoning. (3 steps)", "answer": "- Step 1: P(60W) = 3/4, P(100W) = 1/4.\n- Step 2: The sample mean 73⅓ occurs when we have exactly one 100W bulb and two 60W bulbs. The possible orderings are: (100,60,60), (60,100,60), (60,60,100) — that's 3 ways.\n- Step 3: Each specific ordering has probability (1/4)(3/4)(3/4) = 9/64. So total probability = 3 × 9/64 = 27/64.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "From the light bulb example, what is the expected value of the sample mean E(X̄)? Show conceptually why this result makes sense. (2 steps)", "answer": "- Step 1: From the sampling distribution we computed: E(X̄) = 60×(27/64) + 73⅓×(27/64) + 86⅔×(9/64) + 100×(1/64).\n- Step 2: Working through: = (60×27 + 73⅓×27 + 86⅔×9 + 100×1)/64 = (1620 + 1980 + 780 + 100)/64 = 4480/64 = 70, which equals the population mean μ.\n+ This illustrates the general result: the expected value of the sample mean equals the population mean: E(X̄) = μ.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A population has values 60 and 100 in ratio 3:1. Find the population variance. Show your working. (3 steps)", "answer": "- Step 1: First find the mean: μ = 60×(3/4) + 100×(1/4) = 45 + 25 = 70.\n- Step 2: Compute E(X²): 60²×(3/4) + 100²×(1/4) = 3600×(3/4) + 10000×(1/4) = 2700 + 2500 = 5200.\n- Step 3: Variance = E(X²) - μ² = 5200 - 70² = 5200 - 4900 = 300.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For the light bulb population (60W and 100W in ratio 3:1), a sample of size 3 is taken. Find Var(X̄) from the sampling distribution and verify it equals σ²/n. (4 steps)", "answer": "- Step 1: From the sampling distribution: P(X̄ = 60) = 27/64, P = 73⅓ = 27/64, P = 86⅔ = 9/64, P = 100 = 1/64.\n- Step 2: Compute E(X̄²): 60²×(27/64) + (73⅓)²×(27/64) + (86⅔)²×(9/64) + 100²×(1/64)\n= (3600×27 + 5377.78×27 + 7511.11×9 + 10000×1)/64\n= (97200 + 145200 + 67600 + 10000)/64 = 320000/64 = 5000.\n- Step 3: E(X̄) = 70 (from before), so E(X̄)² = 4900.\n- Step 4: Var(X̄) = E(X̄²) - [E(X̄)]² = 5000 - 4900 = 100. Since σ² = 300 and n = 3, indeed σ²/n = 300/3 = 100. ✓", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "What is the sampling distribution of the mode M for the light bulb example? Show how to find P(M = 60). (3 steps)", "answer": "- Step 1: The mode can only be 60 (if at least two bulbs are 60W) or 100 (if at least two bulbs are 100W).\n- Step 2: P(M = 60): This occurs in all cases with at least two 60W bulbs. These are: (60,60,60) with 2+ 60s: probability (3/4)³ = 27/64; (100,60,60), (60,100,60), (60,60,100): each has probability (1/4)(3/4)² = 9/64, total = 27/64.\n- Step 3: Total P(M = 60) = 27/64 + 27/64 = 54/64 = 27/32. Similarly P(M = 100) = 1 - 27/32 = 5/32.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In the counters example (values 0, 1, 2 with probabilities 0.1, 0.4, 0.5), find P(median = 0). Explain why the median can only be 0, 1, or 2 for a sample of size 3. (3 steps)", "answer": "- Step 1: For a sample of 3, the median is the middle value when sorted. It must be one of the three values in the sample.\n- Step 2: For median = 0, we need at least two 0's (so 0 is the middle value when sorted). The cases are: (0,0,0), (0,0,1) in all orders, and (0,0,2) in all orders.\n- Step 3: Calculating: p³ + 3p²q + 3p²r = (0.1)³ + 3(0.1)²(0.4) + 3(0.1)²(0.5) = 0.001 + 0.012 + 0.015 = 0.028 = 28/1000 = 7/250.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain why the sampling distribution of the sample median is NOT the same as the population distribution. Use the counters example to illustrate. (2 steps)", "answer": "- Step 1: The population distribution gives P(X = 0) = 0.1, P(X = 1) = 0.4, P(X = 2) = 0.5 — this is about individual observations.\n- Step 2: The sampling distribution of the median (from samples of size 3) gives different probabilities: P(median = 0) = 7/250 ≈ 0.028, P(median = 1) = 59/125 ≈ 0.472, P(median = 2) = 1/2 = 0.5. The median is a statistic that summarises the sample, so its distribution is derived from the sampling process, not the original population directly.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A random sample of 20 hairdressers is asked if they're happy wearing aprons (Y = 1 if unhappy, 0 if happy). What is the sampling distribution of X = ΣYᵢ? Explain the conditions required. (3 steps)", "answer": "- Step 1: X follows a binomial distribution: X ~ B(20, p), where p is the true population proportion of hairdressers who are unhappy.\n- Step 2: The conditions required are: (1) each hairdresser is independent of others, (2) the probability p of being unhappy is constant for all hairdressers, (3) each outcome is either \"unhappy\" (1, success) or \"happy\" (0, failure).\n- Step 3: This is exactly the same structure as Example 3 — we're counting the number of \"successes\" (unhappy workers) in n = 20 trials.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "A forester measures heights of 50 randomly selected trees and calculates the mean height. Is this mean a statistic? Explain with reasoning. (2 steps)", "answer": "- Step 1: Yes, this is a statistic. The mean is calculated entirely from observations in the sample (the 50 trees).\n- Step 2: It does not involve any unknown population parameters. The forester doesn't need to know the true population mean μ to calculate this sample mean — they only use the 50 measured values.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A manager times a random sample of 30 operators and computes the mean time per call. Is this mean a statistic? Would it be a statistic if the manager used the population standard deviation σ instead of calculating it from the sample? (3 steps)", "answer": "- Step 1: Yes, the mean time from the sample is a statistic — it's calculated purely from the 30 observations.\n- Step 2: Even if the manager used σ (the known population standard deviation) in a formula, the mean itself remains a statistic because the mean value comes from the sample.\n- Step 3: However, if a formula explicitly includes σ (like (ΣX²/n) - σ²), it would NOT be a statistic since it involves the population parameter σ. A statistic must involve only sample data, not unknown population values.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A company tests every 200th light bulb coming off the assembly line. What type of sampling is this? Explain why the company uses this method rather than testing every bulb. (2 steps)", "answer": "- Step 1: This is systematic sampling — selecting every kth item (in this case, every 200th) from the production line.\n- Step 2: The company cannot test every bulb because testing to failure destroys the bulb. Using systematic sampling (every 200th) is efficient, reduces costs, and still provides a representative sample across the production period.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Explain why taking a larger sample generally leads to more accurate predictions about a population, but may require more resources. (2 steps)", "answer": "- Step 1: Larger samples reduce sampling variability — the distribution of the sample mean becomes narrower (variance σ²/n decreases as n increases). This means the statistic is more likely to be close to the true population parameter.\n- Step 2: However, larger samples require more time, money, personnel, and processing effort. There's a trade-off between accuracy and resource availability. Additionally, if the population is highly variable, you need an even larger sample to capture that diversity.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What is the difference between a simple random sample and a stratified sample? When would you choose one over the other? (2 steps)", "answer": "- Step 1: A simple random sample gives every member of the population an equal chance of being selected. A stratified sample divides the population into subgroups (strata) based on characteristics, then randomly samples from each stratum proportionally.\n- Step 2: Use stratified sampling when the population has distinct subgroups (e.g., different age groups in a city) and you want to ensure representation from each group. Use simple random sampling when the population is relatively homogeneous or you don't have clear strata.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A gym wants to change opening hours. They ask a random sample of 30 members instead of all members. Give two likely reasons why they used a sample, and one potential disadvantage. (3 steps)", "answer": "- Step 1: Reason 1: It would be too time-consuming and expensive to contact every member (potentially thousands).\n- Step 2: Reason 2: Processing responses from thousands of members would be cumbersome and unnecessary for statistical purposes.\n- Step 3: Disadvantage: The sample may not accurately represent all member opinions, especially small subgroups (e.g., members who only use the gym at certain times).", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In the Challenge problem, let X₁, X₂, ..., Xₙ be n independent observations from X ~ N(μ, σ²). Show that E(X̄) = μ. (3 steps)", "answer": "- Step 1: The sample mean is X̄ = (X₁ + X₂ + ... + Xₙ)/n.\n- Step 2: Using linearity of expectation: E(X̄) = E[(X₁ + ... + Xₙ)/n] = (1/n)[E(X₁) + ... + E(Xₙ)].\n- Step 3: Since each Xᵢ comes from the same distribution with mean μ, E(Xᵢ) = μ for all i. Therefore E(X̄) = (1/n)(n×μ) = μ.\n\nThis shows the sample mean is an unbiased estimator of the population mean — on average, it hits the true value.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For n = 3 independent observations from X ~ N(μ, σ²), show that Var(X̄) = σ²/3. (3 steps)", "answer": "- Step 1: X̄ = (X₁ + X₂ + X₃)/3.\n- Step 2: Since the observations are independent: Var(X̄) = Var[(X₁ + X₂ + X₃)/3] = (1/3²) × Var(X₁ + X₂ + X₃) = (1/9)[Var(X₁) + Var(X₂) + Var(X₃)].\n- Step 3: Each Xᵢ has variance σ², so Var(X̄) = (1/9)(σ² + σ² + σ²) = (1/9)(3σ²) = σ²/3.\n\nThis confirms that the variance of the sample mean decreases as sample size increases — the sampling distribution becomes tighter around μ.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why is the sample variance formula dividing by (n-1) preferred over dividing by n when estimating the population variance? (2 steps)", "answer": "- Step 1: Using n-1 in the denominator (s² = Σ(Xᵢ - X̄)²/(n-1)) gives an unbiased estimator of σ² — on average, it equals the true population variance.\n- Step 2: Using n in the denominator would systematically underestimate σ² (biased downward). The reason is that the sample variance uses X̄ (which is estimated from the same data), introducing a slight downward bias. Using (n-1) corrects for this lost degree of freedom.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A coin is tossed 3 times. Let H be the number of heads. Write down the sampling distribution of H (the probability of each outcome). (2 steps)", "answer": "- Step 1: H follows a binomial distribution B(n=3, p=0.5) assuming a fair coin.\n- Step 2: The distribution is:\n| h | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| P(H=h) | 1/8 | 3/8 | 3/8 | 1/8 |\n\nThis comes from: P(H=0) = (0.5)³ = 1/8; P(H=1) = ³C₁(0.5)³ = 3/8; P(H=2) = ³C₂(0.5)³ = 3/8; P(H=3) = (0.5)³ = 1/8.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A receptionist makes spelling mistakes at a rate of 5 per 10 pages. For a 6-page document, write down the sampling distribution for the number of mistakes and find P(< 2 mistakes). (3 steps)", "answer": "- Step 1: Rate = 5 mistakes per 10 pages = 0.5 mistakes per page. For 6 pages, expected mistakes = 6 × 0.5 = 3.\n- Step 2: Using Poisson distribution (rare events, constant rate): X ~ Po(λ = 3).\n- Step 3: P(X < 2) = P(X = 0) + P(X = 1) = e⁻³ + 3e⁻³ = 4e⁻³ ≈ 4 × 0.0498 = 0.199.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the coins example (50% 50p, 25% 20p, 25% 10p), find the population mean μ and variance σ². Show your working. (3 steps)", "answer": "- Step 1: Population distribution: P(50) = 0.5, P(20) = 0.25, P(10) = 0.25.\n- Step 2: Mean μ = 50×0.5 + 20×0.25 + 10×0.25 = 25 + 5 + 2.5 = 32.5p.\n- Step 3: E(X²) = 50²×0.5 + 20²×0.25 + 10²×0.25 = 1250 + 100 + 25 = 1375. Variance = 1375 - (32.5)² = 1375 - 1056.25 = 318.75 pence².", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "From the coins example with two coins sampled, list all possible samples and verify the probability of getting a sample mean of 35p. (3 steps)", "answer": "- Step 1: Possible samples (50,50), (50,20), (50,10), (20,50), (20,20), (20,10), (10,50), (10,20), (10,10).\n- Step 2: For mean = 35p, we need combinations summing to 70p: (50,20) and (20,50). Each has probability 0.5×0.25 = 0.125. Total = 0.25.\n- Step 3: Using combinations: 2 × (0.5)(0.25) = 0.25. Alternatively, from the sampling distribution table: P(X̄ = 35) = 1/4.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A bag contains 60% counters with value 6, 40% with value 10. For a sample of 3 counters, write down all possible samples. (2 steps)", "answer": "The possible samples (accounting for order) are:\n- Three 6's: (6,6,6)\n- Two 6's, one 10: (6,6,10), (6,10,6), (10,6,6)\n- One 6, two 10's: (6,10,10), (10,6,10), (10,10,6)\n- Three 10's: (10,10,10)\n\nWith probabilities determined by the binomial expansion: P(6) = 0.6, P(10) = 0.4.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "From the counters (60% value 6, 40% value 10) with sample size 3, find the sampling distribution of the median N. What is P(N = 6)? (3 steps)", "answer": "- Step 1: Median = 6 when at least two counters are 6 (so the middle value is 6).\n- Step 2: Cases: (6,6,6): probability (0.6)³ = 0.216; (6,6,10) in any order: 3 × (0.6)²(0.4) = 3 × 0.36 × 0.4 = 0.432.\n- Step 3: Total P(N = 6) = 0.216 + 0.432 = 0.648. Similarly P(N = 10) = 1 - 0.648 = 0.352.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "From the same counters example, find the sampling distribution of the mode M. What is P(M = 6)? (2 steps)", "answer": "- Step 1: Mode = 6 when there are more 6's than 10's in the sample (i.e., 2 or 3 sixes). Mode = 10 when there are more 10's than 6's (2 or 3 tens).\n- Step 2: P(M = 6) = P(2 or 3 sixes) = P(3 sixes) + P(2 sixes) = (0.6)³ + 3(0.6)²(0.4) = 0.216 + 0.432 = 0.648. P(M = 10) = 0.352.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A doctor wants to estimate time needed for health checks on patients over 65. She selects 20 random patients. What is the sampling frame and what are the sampling units? (2 steps)", "answer": "- Step 1: The sampling frame could be the doctor's patient registration list (or database of all registered patients).\n- Step 2: The sampling units are the individual patients over age 65 — each patient is a distinct member of the population that could be selected.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "An owner asks all 10 florists for their views on flower quality. This is described as a census. Explain why this is a census, and give two advantages of doing this when the population is small. (3 steps)", "answer": "- Step 1: This is a census because every member of the population (all 10 florists) was asked — no one was left out.\n- Step 2: Advantages: (1) No sampling error — you get the exact truth about all 10 florists' opinions. (2) Small population makes census practical — 10 people is quick and cheap to survey. (3) The data is complete and representative of the entire population with no concerns about small subgroups.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Why might different samples from the same population lead to different conclusions? How does increasing sample size help address this? (2 steps)", "answer": "- Step 1: Due to natural variation in the population, different random samples will have different compositions. A sample of 5 people might have 4 supporting a proposal while another sample of 5 might have 0 supporting — both are possible by chance.\n- Step 2: Larger samples reduce this variability. The law of large numbers means the sample statistic converges to the population parameter as n increases. With n = 1000, you're much less likely to get a wildly unrepresentative sample than with n = 5.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "A manufacturer tests 4 ropes and records breaking loads: 320, 260, 240, 180 kg. The company claims ropes are safe for 250 kg. Use the sample to comment on this claim. (2 steps)", "answer": "- Step 1: The sample mean is (320+260+240+180)/4 = 1000/4 = 250 kg. The sample minimum is 180 kg.\n- Step 2: While the mean meets the 250 kg claim, the sample minimum (180 kg) is below 250 kg, meaning at least one rope in the sample failed below the claimed safe load. The sample is very small (n=4), so we can't be confident about the population. A larger sample would provide better evidence — we'd want to see most or all ropes exceeding 250 kg.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Explain the key difference between a population distribution and a sampling distribution. If you were to actually create a sampling distribution in practice, what would you need to do? (2 steps)", "answer": "- Step 1: The population distribution shows how individual values vary in the population (e.g., heights of people). The sampling distribution shows how a statistic (e.g., sample mean) varies from sample to sample.\n- Step 2: To create a sampling distribution in practice, you would: (1) take many samples of the same size from the population, (2) calculate the statistic for each sample, (3) plot the distribution of these statistics. In theory, it includes ALL possible samples of that size.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In the toaster example (40% at $16, 50% at $20, 10% at $30), find the population mean and variance. (3 steps)", "answer": "- Step 1: Distribution: P(16) = 0.4, P(20) = 0.5, P(30) = 0.1.\n- Step 2: Mean μ = 16×0.4 + 20×0.5 + 30×0.1 = 6.4 + 10 + 3 = $19.40.\n- Step 3: E(X²) = 16²×0.4 + 20²×0.5 + 30²×0.1 = 102.4 + 200 + 90 = 392.4. Variance = 392.4 - (19.4)² = 392.4 - 376.36 = 16.04.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "For the milk cartons example (3-litre and 2-litre in ratio 3:2), find the population mean and variance. (3 steps)", "answer": "- Step 1: P(3L) = 3/5 = 0.6, P(2L) = 2/5 = 0.4.\n- Step 2: Mean μ = 3×0.6 + 2×0.4 = 1.8 + 0.8 = 2.6 litres.\n- Step 3: E(X²) = 3²×0.6 + 2²×0.4 = 9×0.6 + 4×0.4 = 5.4 + 1.6 = 7.0. Variance = 7.0 - (2.6)² = 7.0 - 6.76 = 0.24 litres².", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A call centre has 400 operators. The manager times a random sample of 30 operators over one day and computes the mean time per call. Is this mean a statistic? Give a reason. (2 steps)", "answer": "- Step 1: Yes, the mean time calculated from the 30 operators is a statistic.\n- Step 2: It is calculated purely from the sample observations (the 30 operators timed). It does not involve any unknown population parameters — the manager doesn't need to know the true population mean μ to compute this sample mean.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A light bulb manufacturer tests switches until they break. They test 5 switches and get results: 23150, 25071, 19480, 22921, 7455. They claim switches average 20000 operations. Comment on this claim using the sample data. (2 steps)", "answer": "- Step 1: Sample mean = (23150+25071+19480+22921+7455)/5 = 98077/5 ≈ 19615.4, which is close to 20000.\n- Step 2: However, the sample has huge variation: one switch (7455) failed well below 20000, while others exceeded it. With only n=5, the sample is too small to be confident. One extremely low outlier pulls the mean down substantially. A larger sample would give a more reliable estimate of the true average lifetime.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What is the relationship between the sample size n, the population variance σ², and the variance of the sample mean Var(X̄)? Why does this relationship make intuitive sense? (2 steps)", "answer": "- Step 1: The relationship is Var(X̄) = σ²/n.\n- Step 2: This makes intuitive sense because: as you average more observations, extreme values get \"diluted\" by other values. The variation in the average is reduced by a factor of n. With n=1, Var(X̄) = σ² (no reduction). With n=100, Var(X̄) = σ²/100 — very small variation around the true mean. Larger samples produce more precise (less variable) estimates.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "In the context of hypothesis testing (mentioned in the chapter introduction), explain why understanding sampling distributions is essential for carrying out hypothesis tests. (2 steps)", "answer": "- Step 1: Hypothesis tests compare observed sample data to what we'd expect if a certain hypothesis about the population were true.\n- Step 2: The sampling distribution tells us the probability of observing our sample statistic (or more extreme) by chance alone, if the null hypothesis were true. Without knowing the sampling distribution, we can't determine whether an observed result is unusual or simply due to random sampling variation.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "A student says: \"Since the population mean is 70, the sample mean from any sample will also be 70.\" What is wrong with this statement? Explain using the concept of sampling variation. (2 steps)", "answer": "- Step 1: The statement is incorrect. The population mean μ = 70 is a fixed (though unknown) parameter. The sample mean X̄ is a random variable that varies from sample to sample.\n- Step 2: Different samples give different sample means. Only on average (in expectation) does X̄ equal μ. Any particular sample mean will likely deviate somewhat from 70 due to sampling variation. This is precisely why we need to study sampling distributions — to understand how much X̄ varies around μ.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}, {"question": "A researcher wants to estimate the proportion of students who walk to school. She selects a simple random sample of 100 students. What is the sampling distribution of the sample proportion p̂? Under what conditions is this approximately normal? (3 steps)", "answer": "- Step 1: The sample proportion p̂ follows an approximately normal distribution for large n: p̂ ~ N(p, p(1-p)/n), where p is the true population proportion.\n- Step 2: This is essentially the normal approximation to the binomial distribution (since p̂ is the proportion of \"successes\" in n Bernoulli trials).\n- Step 3: The normal approximation is good when np ≥ 5 and n(1-p) ≥ 5 (some use 10 instead of 5). For p̂ = X/n where X ~ B(n,p), as n increases, the distribution of p̂ becomes increasingly concentrated around p with variance p(1-p)/n.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}], "count": 50}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is the difference between a census and a sample? In what situation would a census be inappropriate to use? (2 steps)", "answer": "- Step 1: A census observes or measures every single member of the entire population. A sample, on the other hand, selects only a subset (a portion) of the population to represent the whole.\n- Step 2: A census would be inappropriate when the testing process destroys the item being tested. For example, testing every light bulb by running it until it breaks would leave nothing left to sell.\n\nThis is why destructive testing (like testing rope breaking points or checking if plums are ripe by cutting them open) always requires sampling rather than a census.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": true}, {"question": "A factory tests 4 ropes from a batch of 3000 ropes by stretching each until it breaks. The breaking loads are: 320 kg, 260 kg, 240 kg, 180 kg. The factory claims the ropes are safe for loads up to 250 kg. What can you comment on this claim based on the sample? (3 steps)", "answer": "- Step 1: Calculate the sample mean: (320 + 260 + 240 + 180) ÷ 4 = 1000 ÷ 4 = 250 kg\n- Step 2: Notice that one rope broke at 180 kg, which is significantly below the claimed safe limit of 250 kg. This represents 25% of the sample (1 out of 4) failing below the claimed safe load.\n- Step 3: The sample is too small to draw reliable conclusions. With only 4 ropes tested, we cannot confidently say all ropes can handle 250 kg. The sample shows that at least some ropes fail below this level, so the claim is questionable. A larger sample would be needed to make a valid prediction.\n\nKey takeaway: Small samples can be misleading due to natural variation—one failure below the claimed limit is concerning but not conclusive with such a tiny sample.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "State two advantages and two disadvantages of using a census instead of a sample. (1 step)", "answer": "**Advantages of a census:**\n- Should give a completely accurate result (since every member is measured)\n- No sampling error since all members are included\n\n**Disadvantages of a census:**\n- Time-consuming and expensive to conduct\n- Cannot be used when testing destroys the item (destructive testing)\n- Hard to process a large quantity of data\n\n**Advantages of a sample:**\n- Less time-consuming and expensive\n- Fewer people/items needed to respond or test\n- Less data to process than a census\n\n**Disadvantages of a sample:**\n- The data may not be as accurate as a census\n- The sample may not be large enough to give information about small subgroups of the population\n- Different samples can lead to different conclusions due to natural variation", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is a sampling unit and what is a sampling frame? How are they related? (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item from a population—the basic unit that is selected when taking a sample. For example, each student in a school, each light bulb in a factory, or each person in a town.\n- Step 2: A sampling frame is a practical list of all sampling units. It's the \"shopping list\" used to actually select participants. For example, a school might use its student register as a sampling frame, or a company might use a customer database.\n\nIn practice, you need a sampling frame to select sampling units. However, the sampling frame may not perfectly match the population (e.g., some people may be missing from the register).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A city council wants to know what residents think about a recycling centre. They decide to carry out a sample survey rather than a census. Explain one reason why a census would be unsuitable in this situation, and suggest a suitable sampling frame. (2 steps)", "answer": "- Step 1: One key reason to avoid a census here is impracticality—if the city has thousands or millions of residents, collecting data from everyone would be extremely time-consuming and expensive. Additionally, there may be no need for such precise data when a well-designed sample can provide sufficient accuracy.\n- Step 2: A suitable sampling frame could be the electoral register (list of registered voters), the council tax register, or a list of all households in the city. These lists provide names and addresses that can be used to select a random sample of residents to survey.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "Explain three factors that affect the appropriate size of a sample. (2 steps)", "answer": "- Step 1: The required accuracy—generally, larger samples produce more accurate predictions about a population. If you need highly precise estimates, you need a larger sample.\n- Step 2: Available resources—larger samples require more time, money, and effort. There's a trade-off between accuracy and resources.\n- Step 3: Population variability—if the population is very diverse or varied, you need a larger sample to capture that diversity. If the population is relatively uniform, a smaller sample may suffice.\n\nA key principle: Different samples can lead to different conclusions due to natural variation in a population, so sample size matters for reliability.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the difference between a population parameter and a statistic? Use appropriate notation to illustrate your answer. (2 steps)", "answer": "- Step 1: A population parameter is a numerical property of the entire population—things like the population mean (μ) and population variance (σ²). Parameters are typically denoted by Greek letters because we rarely know their exact values.\n- Step 2: A statistic is a quantity calculated only from observations in a sample. It does not involve any unknown parameters. For example, the sample mean X̄ = (ΣXᵢ)/n and sample variance S² = Σ(Xᵢ - X̄)²/(n-1) are statistics.\n\nThe key distinction: A statistic is calculated from sample data alone; a parameter describes the entire population. We use uppercase letters (like X, X̄) to represent distributions/statistics, and lowercase letters to represent specific values.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A random sample X₁, X₂, ..., Xₙ is taken from a population with unknown mean μ. For each of the following, state whether it is a statistic and give a reason. (i) (X₂ + X₅ + X₈)/3 (ii) ΣX²/n - (ΣX/n)² (iii) (ΣX/n) - μ² (3 steps)", "answer": "- Step 1: (i) (X₂ + X₅ + X₈)/3 — This IS a statistic. It uses only observations from the sample (X₂, X₅, X₈) and performs a simple calculation. No population parameters are involved.\n- Step 2: (ii) ΣX²/n - (ΣX/n)² — This IS a statistic. This is actually the formula for population variance calculated from a sample (though it's the biased version using n rather than n-1). Either way, it uses only sample values.\n- Step 3: (iii) (ΣX/n)
