<script>
const DATA={"selected": [{"question": "A random sample of 20 hairdressers is asked if they're happy wearing aprons (Y = 1 if unhappy, 0 if happy). What is the sampling distribution of X = ΣYᵢ? Explain the conditions required. (3 steps)", "answer": "- Step 1: X follows a binomial distribution: X ~ B(20, p), where p is the true population proportion of hairdressers who are unhappy.\n- Step 2: The conditions required are: (1) each hairdresser is independent of others, (2) the probability p of being unhappy is constant for all hairdressers, (3) each outcome is either \"unhappy\" (1, success) or \"happy\" (0, failure).\n- Step 3: This is exactly the same structure as Example 3 — we're counting the number of \"successes\" (unhappy workers) in n = 20 trials.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "Why does the appearance of a population parameter (like $$\\mu$$ or $$\\sigma$$) disqualify an expression from being a statistic?", "answer": "Because the defining requirement of a statistic is that it can be **computed from the sample alone**. If the formula contains $$\\mu$$ — which is unknown — you cannot evaluate it from the data; the value is unobservable. So even though $$\\sum (X_i - \\mu)^2/(n-1)$$ resembles the sample variance, it is **not a statistic** because $$\\mu$$ does not appear in the sample. The replacement formula $$\\sum (X_i - \\bar{X})^2/(n-1)$$ uses $$\\bar{X}$$ (computable from data), so it *is* a statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A student says: \"Since the population mean is 70, the sample mean from any sample will also be 70.\" What is wrong with this statement? Explain using the concept of sampling variation. (2 steps)", "answer": "- Step 1: The statement is incorrect. The population mean μ = 70 is a fixed (though unknown) parameter. The sample mean X̄ is a random variable that varies from sample to sample.\n- Step 2: Different samples give different sample means. Only on average (in expectation) does X̄ equal μ. Any particular sample mean will likely deviate somewhat from 70 due to sampling variation. This is precisely why we need to study sampling distributions — to understand how much X̄ varies around μ.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Why is a census almost never appropriate when testing a manufactured product like climbing ropes or light bulbs?", "answer": "Because the test is **destructive** — loading a rope until it snaps, burning a bulb until it fails, or operating a switch until it breaks. A census would destroy the entire output, leaving nothing to sell. Sampling sacrifices only a few units to estimate the reliability of the whole batch, which is the only commercially viable approach.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Why are Greek letters used for population parameters and Roman letters for sample statistics?", "answer": "It's a notational convention to **visually separate \"the truth we don't know\" from \"the estimate we computed.\"** Greek letters ($$\\mu$$, $$\\sigma$$, $$p$$, $$\\lambda$$) refer to fixed but unknown population quantities — what we're trying to learn. Roman letters ($$\\bar{X}$$, $$S$$, $$\\hat{p}$$) refer to quantities computed from observed data — random variables whose values we know once the sample is drawn. The convention prevents confusion in formulas.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "What does the formula $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$ tell us intuitively about why bigger samples are better? (4 steps)", "answer": "- Step 1: $$\\sigma^2$$ is the variance of one observation — fixed by the population, beyond our control.\n- Step 2: Dividing by $$n$$ means that as the sample size grows, the **variance of the sample mean shrinks proportionally**.\n- Step 3: The standard deviation $$\\sigma/\\sqrt{n}$$ shrinks as $$1/\\sqrt{n}$$: doubling $$n$$ reduces sd by $$\\sqrt{2}$$; quadrupling $$n$$ halves it.\n- Step 4: So bigger samples produce more **concentrated, more reliable** estimates of $$\\mu$$ — but with **diminishing returns** (need 100× the data for 10× more precision in sd).\n\nThis is the precise mathematical statement of \"sample mean stabilises as sample size grows.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "A school asks 15 randomly chosen students whether they support a uniform; let $$Y$$ = number who support. Why is $$Y \\sim \\text{Bin}(15, p)$$? (4 steps)", "answer": "- Step 1: Each student's response is binary — support (1) or not (0). That's a Bernoulli trial.\n- Step 2: Sampling is random and the population is large, so the 15 responses can be treated as **independent**.\n- Step 3: The probability $$p$$ that a randomly chosen student supports the uniform is **constant** for every student (the population proportion).\n- Step 4: $$Y$$ is the **sum of 15 i.i.d. Bernoulli$$(p)$$** variables, which by definition has a $$\\text{Bin}(15, p)$$ distribution.\n\nSo the sampling distribution of \"number of supporters\" inherits a binomial form from the sampling setup.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Is $$\\sum X^2 + \\mu$$ a statistic, where $$X_i$$ are sample observations and $$\\mu$$ is the population mean?", "answer": "No. Although $$\\sum X^2$$ is a perfectly good function of the sample, **adding $$\\mu$$ contaminates the expression with an unknown population parameter**. To evaluate this from a sample alone, you'd need $$\\mu$$ — which you don't have. So the combined quantity is not a statistic. Pattern: any single Greek-letter intruder ruins it.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "For a population with values $$v_1, v_2, \\ldots$$ and probabilities $$p_1, p_2, \\ldots$$, why is the sampling distribution of $$\\bar{X}$$ for size $$n$$ generally different in shape from the population distribution?", "answer": "Because $$\\bar{X}$$ averages multiple independent observations, and **averaging concentrates probability around the population mean $$\\mu$$**. Extreme values are still possible but require all (or most) draws to be extreme — far less likely than just one extreme draw. By the central limit phenomenon, as $$n$$ grows the sampling distribution of $$\\bar{X}$$ approaches a bell shape (normal), regardless of the population's shape — even bimodal or skewed populations give roughly normal sample-mean distributions for moderately large $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "What defines a **statistic**, and why is $ \\frac{\\sum X}{n} - \\mu^2 $ not a statistic? (2 steps)", "answer": "- Step 1: A **statistic** is a quantity calculated **only from sample data** (no unknown parameters).  \n- Step 2: $ \\frac{\\sum X}{n} - \\mu^2 $ includes $ \\mu $, the population mean, which is unknown in practice. Thus, it depends on an unobservable parameter and violates the definition.  \n+ Contrast: $ \\frac{\\sum X}{n} $ is a statistic (sample mean), but subtracting $ \\mu^2 $ makes it invalid.  \n\n**Takeaway:** Statistics must be computable solely from observed data.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "A population has 60W and 100W bulbs in ratio 3:1. For a sample of 3 bulbs, verify that P(Ē = 73⅓) = 27/64. Show the reasoning. (3 steps)", "answer": "- Step 1: P(60W) = 3/4, P(100W) = 1/4.\n- Step 2: The sample mean 73⅓ occurs when we have exactly one 100W bulb and two 60W bulbs. The possible orderings are: (100,60,60), (60,100,60), (60,60,100) — that's 3 ways.\n- Step 3: Each specific ordering has probability (1/4)(3/4)(3/4) = 9/64. So total probability = 3 × 9/64 = 27/64.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "A manufacturer tests 4 ropes for breaking strength (loads: 320kg, 260kg, 240kg, 180kg). The factory claims ropes are safe for 250kg. How might sampling variability affect the validity of this claim?", "answer": "A statistic (e.g., sample mean) is a random variable. Here, the sample mean is $ \\bar{x} = \\frac{320+260+240+180}{4} = 250kg $. However:  \n+ The sample is tiny (n=4), so variability is high.  \n+ One rope (180kg) fails below 250kg, suggesting potential inconsistency.  \n- Conclusion: The claim might be misleading because the sample size is too small to reliably estimate the population mean or variability.  \n\n**Takeaway:** Small samples may not capture extreme values or true population parameters.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "A census provides completely accurate results, so why might a researcher still choose not to use one? (2 steps)", "answer": "- Step 1: A census observes every member, guaranteeing accuracy, but it comes with severe practical constraints. It is highly time-consuming and expensive to conduct.\n- Step 2: Additionally, there are two critical situations where a census is impossible or undesirable:\n+ When the testing process destroys the item (e.g., testing the breaking point of safety ropes leaves no ropes to sell).\n+ When the population is so large that processing the sheer volume of data becomes unmanageable.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "A factory produces items with a known defect rate of 10%. A quality control officer takes a sample of 50 items and calculates the sample proportion of defects $$\\hat{p}$$. Will $$\\hat{p}$$ exactly equal 10%? Explain using the concept of sampling distributions. (2 steps)", "answer": "- Step 1: It is highly unlikely that $$\\hat{p}$$ will exactly equal 10% (0.1) for any single sample.\n- Step 2: The sample proportion $$\\hat{p}$$ is a statistic, and like all statistics, it has a sampling distribution. Due to natural sampling variation, different samples of 50 will yield different values of $$\\hat{p}$$ distributed around 0.1. While $$E(\\hat{p}) = 0.1$$, a specific sample's result will fluctuate around this value.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "What is the relationship between the sample size n, the population variance σ², and the variance of the sample mean Var(X̄)? Why does this relationship make intuitive sense? (2 steps)", "answer": "- Step 1: The relationship is Var(X̄) = σ²/n.\n- Step 2: This makes intuitive sense because: as you average more observations, extreme values get \"diluted\" by other values. The variation in the average is reduced by a factor of n. With n=1, Var(X̄) = σ² (no reduction). With n=100, Var(X̄) = σ²/100 — very small variation around the true mean. Larger samples produce more precise (less variable) estimates.", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "A forester randomly selects 50 trees and computes the mean height. Is this mean a statistic, and why?", "answer": "Yes. It is computed solely from the observed sample of 50 heights — no population parameter (the unknown true mean tree height) appears in the formula. So by definition it is a statistic, and it can serve as an estimator of the true population mean. The fact that it estimates an unknown is precisely *why* statistics are useful — but it doesn't disqualify the computed quantity from being one.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "If you take a sample of size $$n=1$$ from a population, what is the sampling distribution of the sample mean $$\\bar{X}$$? (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ for a sample of size 1 is simply the single observed value $$X_1$$.\n- Step 2: Therefore, the sampling distribution of $$\\bar{X}$$ when $$n=1$$ is exactly the same as the original population distribution. It has the same shape, the same mean $$\\mu$$, and the same variance $$\\sigma^2$$.\n+ This makes sense because with only one observation, there is no \"averaging\" effect to reduce the variance; the statistic just reflects the raw population.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "What is a 'sampling unit', and how does it relate to a 'sampling frame'? (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item of the population that could be selected in a sample. For example, if studying student opinions, each student is a sampling unit.\n- Step 2: A sampling frame is a list of all the sampling units in the population, often with each unit named or numbered. It is the practical mechanism from which a sample is drawn (e.g., a student register). Note that a sampling frame might not perfectly match the population if the list is outdated or incomplete.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A population has an unknown mean $$\\mu$$. You take a sample $$X_1, X_2, \\dots, X_n$$. One student calculates $$\\frac{\\sum(X_i - \\mu)^2}{n}$$ and another calculates $$\\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Which of these is a statistic and why? (2 steps)", "answer": "- Step 1: The second expression, $$\\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$, is the statistic. A statistic must be calculated *only* from the observations in the sample.\n- Step 2: The first expression involves $$\\mu$$, which is an unknown population parameter. Because it relies on information outside of the sample data, it cannot be computed from the sample alone and is therefore not a statistic.\n\nTakeaway: If the formula contains a population parameter (like $$\\mu$$ or $$\\sigma$$), it is not a statistic.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "A sample of 20 tomatoes has weights represented by X₁, X₂, ..., X₂₀. State whether each of the following is a statistic and explain why: (a) (X₁ + X₂₀)/3 (b) ΣX/20 (c) ΣX² + μ (d) (ΣX²/20) - σ² (2 steps)", "answer": "- Step 1: (a) (X₁ + X₂₀)/3 — YES, it's a statistic. Uses only sample values X₁ and X₂₀, no parameters.\n  (b) ΣX/20 — YES, it's a statistic. This is the sample mean, uses only sample data.\n  \n- Step 2: (c) ΣX² + μ — NO, not a statistic. Contains μ, the unknown population mean.\n  (d) (ΣX²/20) - σ² — NO, not a statistic. Contains σ², the unknown population variance.\n\nThe key test: if any Greek letter (representing a parameter) appears, it's not a statistic.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "In statistical analysis, what defines a 'population', and how does a 'sample' fundamentally differ from it?", "answer": "- Step 1: A population is defined as the entire set of individual items (people, objects, measurements) that are of interest in a particular study. It is the complete group we want to learn about.\n- Step 2: A sample, on the other hand, is a subset or selection of observations taken from the population. \n- Step 3: The fundamental difference lies in scope and purpose: the population is the theoretical whole we wish to understand, while the sample is the practical, smaller group we actually observe to make inferences about that whole. We rarely observe the entire population due to constraints like time and cost.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A city council wants to know what residents think about a recycling centre. They decide to carry out a sample survey rather than a census. Explain one reason why a census would be unsuitable in this situation, and suggest a suitable sampling frame. (2 steps)", "answer": "- Step 1: One key reason to avoid a census here is impracticality—if the city has thousands or millions of residents, collecting data from everyone would be extremely time-consuming and expensive. Additionally, there may be no need for such precise data when a well-designed sample can provide sufficient accuracy.\n- Step 2: A suitable sampling frame could be the electoral register (list of registered voters), the council tax register, or a list of all households in the city. These lists provide names and addresses that can be used to select a random sample of residents to survey.", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "What is the sample mean $$\\bar{X}$$ as a random variable?", "answer": "$$\\bar{X} = (X_1 + X_2 + \\cdots + X_n)/n$$, the arithmetic average of the sample observations. The crucial point is that **before the sample is drawn**, $$\\bar{X}$$ is itself a random variable: its value depends on which sample turns out to be drawn. Different samples give different $$\\bar{X}$$'s, and the probability distribution of $$\\bar{X}$$ is its **sampling distribution** — an object of central importance in inference.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "A company tests a sample of 5 switches and gets lifetimes: 23150, 25071, 19480, 22921, 7455 cycles. The company claims switches last an average of 20000 cycles. What can you comment on this claim? (3 steps)", "answer": "- Step 1: Calculate the sample mean: (23150 + 25071 + 19480 + 22921 + 7455) / 5 = 98077 / 5 = 19615.4 cycles\n- Step 2: The sample mean is very close to 20000 (about 2% lower). However, look at the sample values—one switch (7455) failed dramatically early, less than half the claimed average!\n- Step 3: With only 5 switches, we cannot be confident about the true population mean. The extreme value (7455) might be an outlier or indicate quality control issues. A larger sample would be needed to make a reliable claim. The presence of one very low lifetime suggests either the claim is optimistic or there's significant variability the company should investigate.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "Why might different samples from the same population lead to different conclusions? How does increasing sample size help address this? (2 steps)", "answer": "- Step 1: Due to natural variation in the population, different random samples will have different compositions. A sample of 5 people might have 4 supporting a proposal while another sample of 5 might have 0 supporting — both are possible by chance.\n- Step 2: Larger samples reduce this variability. The law of large numbers means the sample statistic converges to the population parameter as n increases. With n = 1000, you're much less likely to get a wildly unrepresentative sample than with n = 5.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "Why is the assumption of independence essential when deriving $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$?", "answer": "Because the rule \"variance of a sum equals sum of variances\" only holds for **independent** random variables (or, more weakly, uncorrelated ones). If the observations were correlated — say, the second draw is influenced by the first — then $$\\operatorname{Var}(X_1 + X_2)$$ would include a covariance term and could be larger or smaller than $$2\\sigma^2$$. The clean result $$\\sigma^2/n$$ depends entirely on the i.i.d. setup that random sampling provides.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "If a sampling distribution for a statistic is heavily skewed, what does that tell you about the statistic as an estimator for the population parameter? (2 steps)", "answer": "- Step 1: A heavily skewed sampling distribution means that the statistic is more likely to fall on one side of the true parameter value than the other.\n- Step 2: This suggests that the statistic might be a biased estimator, or that the sample size is too small for the Central Limit Theorem to normalize the distribution. It means a single sample calculation is less likely to be close to the true parameter, and the direction of error is predictable.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Why might a sampling frame fail to match the population it's meant to represent? (3 steps)", "answer": "- Step 1: The frame may be **incomplete** — some members of the population are simply missing from the list.\n- Step 2: The frame may be **out of date** — people have left or joined since the list was compiled.\n- Step 3: Some population members may be **unreachable or unlistable** (e.g., the homeless on an electoral roll).\n\nThis mismatch is a hidden source of bias: a sample drawn carefully and randomly from a flawed frame still inherits the frame's gaps.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "When listing all possible samples of size $$n$$, why must $$(60, 100, 60)$$ and $$(100, 60, 60)$$ be listed as two distinct samples?", "answer": "Because the sample is an **ordered tuple** of independent draws $$X_1, X_2, \\ldots, X_n$$ — each draw is its own random variable. Two different orderings are two different events of the random sampling process, even if they contain the same multiset of values. Treating them as one would undercount the probability of \"two 60s and one 100.\" The probabilities of all distinct orderings (each equal here) must be summed to get the total.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "In Example 5 of the study material, with counters labelled 0 (p=0.1), 1 (p=0.4), 2 (p=0.5), the probability P(N=0) for the median was calculated as 7/250. Verify this calculation by listing the samples that give median = 0. (3 steps)", "answer": "- Step 1: Median = 0 requires that when the three values are ordered, the middle value is 0. This happens when at least two of the three counters are 0 (since the third can be anything and 0 would still be in the middle).\n- Step 2: The cases are: (0,0,0), (0,0,1), (0,1,0), (1,0,0), (0,0,2), (0,2,0), (2,0,0)\n- Step 3: Probabilities:\n  + (0,0,0): 0.1³ = 0.001\n  + (0,0,1) + (0,1,0) + (1,0,0): 3 × 0.1² × 0.4 = 3 × 0.01 × 0.4 = 0.012\n  + (0,0,2) + (0,2,0) + (2,0,0): 3 × 0.1² × 0.5 = 3 × 0.01 × 0.5 = 0.015\n  + Total = 0.001 + 0.012 + 0.015 = 0.028 = 28/1000 = 7/250 ✓", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Decide which of these are statistics for a sample $$X_1, \\ldots, X_n$$ from a population with unknown mean $$\\mu$$, and explain: (i) $$\\frac{X_2 + X_5 + X_8}{3}$$, (ii) $$\\frac{\\sum X^2}{n} - \\left(\\frac{\\sum X}{n}\\right)^2$$, (iii) $$\\frac{\\sum X}{n} - \\mu^2$$. (3 steps)", "answer": "- Step 1: **(i) is a statistic** — it's just an average of three observations; no parameter appears.\n- Step 2: **(ii) is a statistic** — both terms are functions of the sample (this is, in fact, the biased sample variance formula). No $$\\mu$$ or $$\\sigma$$ inside.\n- Step 3: **(iii) is not a statistic** — it contains $$\\mu^2$$, the unknown population mean squared, which can't be computed from the data alone.\n\nThe diagnostic test: scan for any Greek letter representing a population quantity; if present, it's not a statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Synthesis: a manufacturer makes toasters at \\$16 (40%), \\$20 (50%), \\$30 (10%). Without explicit calculation, explain why the sampling distribution of the mean of a random pair is concentrated near \\$19. (4 steps)", "answer": "- Step 1: The population mean is $$\\mu = 16(0.4) + 20(0.5) + 30(0.1) = 6.4 + 10 + 3 = 19.4$$. This is where the sampling distribution centres.\n- Step 2: The most likely individual values are \\$16 and \\$20 (90% of toasters between them).\n- Step 3: Pairs drawn from these dominant categories yield means like \\$16, \\$18, \\$20 — all near \\$19.\n- Step 4: Pairs containing \\$30 (10% per draw) are rare, so means at the extremes (\\$23, \\$25, \\$30) are low-probability tails.\n\nSo the distribution is concentrated around the population mean, with thinner tails near the extremes — exactly the behaviour predicted by $$E(\\bar{X}) = \\mu$$ and the variance shrinking with $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Let $$X_1, X_2, X_3$$ be independent observations from a population with variance $$\\sigma^2$$. Walk through the steps to show that $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{3}$$. (3 steps)", "answer": "- Step 1: Start with the sample mean $$\\bar{X} = \\frac{X_1 + X_2 + X_3}{3}$$. We want to find its variance. When a random variable is multiplied by a constant $$\\frac{1}{3}$$, its variance is multiplied by the square of that constant: $$\\text{Var}(cY) = c^2\\text{Var}(Y)$$.\n- Step 2: Because the observations are independent, the variance of their sum is the sum of their variances: $$\\text{Var}(X_1 + X_2 + X_3) = \\text{Var}(X_1) + \\text{Var}(X_2) + \\text{Var}(X_3) = \\sigma^2 + \\sigma^2 + \\sigma^2 = 3\\sigma^2$$.\n- Step 3: Combine these rules for the sample mean: $$\\text{Var}(\\bar{X}) = \\text{Var}\\left(\\frac{1}{3}(X_1 + X_2 + X_3)\\right) = \\left(\\frac{1}{3}\\right)^2 \\text{Var}(X_1 + X_2 + X_3) = \\frac{1}{9} \\times 3\\sigma^2 = \\frac{3\\sigma^2}{9} = \\frac{\\sigma^2}{3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Define the sampling distribution of a statistic.", "answer": "It is the **probability distribution of the statistic itself** — listing every value the statistic can take, with the probability of each. Imagine repeating the entire sampling process many times: each repetition gives a fresh sample and a recomputed statistic, and the long-run frequencies of those values form the sampling distribution. It tells us how the statistic varies just because of the randomness of which sample we draw.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Define population, sample, and census in statistics. What is a key practical reason why a census might not be feasible in some cases? (3 steps)", "answer": "- Step 1: **Population** is the entire set of items/individuals under study. A **sample** is a subset of the population used to infer properties of the whole. A **census** involves collecting data from every member of the population.  \n- Step 2: **Key practical limitation**: A census is often impractical due to time, cost, or destructive testing. For example, testing all plums for ripeness would destroy the entire shipment, leaving none to sell.  \n+ Example: Testing ropes for breaking strength (Exercise 6A Q2) would destroy all ropes, making a census impossible.  \n- Step 3: **Trade-off**: While a census gives perfect accuracy, it’s often replaced by sampling due to resource constraints or ethical concerns (e.g., destructive testing).  \n\n**Takeaway:** A census is ideal but often impractical; sampling balances accuracy with feasibility.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "In the context of sampling distributions, why do we write $$\\bar{X}$$ using an uppercase letter, but $$\\bar{x}$$ using a lowercase letter? (2 steps)", "answer": "- Step 1: **Uppercase** $$\\bar{X}$$ represents the *random variable* of the sample mean before the sample is taken. It has a probability distribution (the sampling distribution) because different samples will yield different means.\n- Step 2: **Lowercase** $$\\bar{x}$$ represents a *specific observed value* of the sample mean after the data has been collected from one particular sample. It is a fixed, known number, not a random variable.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "For samples of size 3 from {60 (¾), 100 (¼)}, why can the mode $$M$$ only take the values 60 or 100?", "answer": "The mode is the most frequent value in the sample. Since the population only contains the values 60 and 100, every observation is one of these — so the mode must be 60 or 100. With $$n = 3$$ (odd), one value must appear at least twice, so there's always a clear mode. The mode collapses information: it ignores ties and intermediate values that the mean would capture.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why must we usually assume sampling **with replacement** (or equivalently, a very large population) when listing samples and multiplying probabilities?", "answer": "Because the standard rule \"probability of $$(x_1, x_2, \\ldots, x_n) = P(x_1) P(x_2) \\cdots P(x_n)$$\" requires the draws to be **independent and identically distributed**. If you sampled without replacement from a small population, removing an item changes the proportions for the next draw — destroying the constant-$$p$$ assumption. The chapter's setup (\"a large bag,\" \"fixed manufacturing proportions\") tacitly assumes the population is large enough that removal doesn't appreciably change probabilities, so draws are effectively independent.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What's the conceptual difference between the *population distribution* of $$X$$ and the *sampling distribution* of $$\\bar{X}$$? (3 steps)", "answer": "- Step 1: The **population distribution** of $$X$$ describes the spread of values in the population itself — what a single random observation looks like.\n- Step 2: The **sampling distribution** of $$\\bar{X}$$ describes the spread of the sample mean across many hypothetical samples — what an averaged sample summary looks like.\n- Step 3: Their relationships:\n+ both have the same mean: $$E(X) = E(\\bar{X}) = \\mu$$.\n+ but the spreads differ: $$\\operatorname{Var}(X) = \\sigma^2$$, while $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$ — much narrower for large $$n$$.\n+ shape can differ: the sampling distribution becomes more bell-shaped as $$n$$ grows, even if the population is skewed.\n\nSo the sampling distribution is a \"tightened, more symmetric\" version of the population distribution centred on the same place.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A factory makes safety ropes for 3000 climbers. Why is a census not appropriate, and how would you comment on a \"safe up to 250 kg\" claim from a sample of $$\\{320, 260, 240, 180\\}$$ kg? (3 steps)", "answer": "- Step 1: **No census** because testing a rope to its breaking point destroys it; testing all 3000 leaves nothing to deliver.\n- Step 2: **The claim is dubious**: the smallest break load in the sample is 180 kg — well below 250 kg. So at least one rope failed before reaching the claimed safe load.\n- Step 3: Improvement: test a **larger sample** to better estimate the proportion of ropes that fail below 250 kg, and reconsider the claim if even a small proportion are weaker.\n\nThe sample evidence directly contradicts the claim, even with only 4 ropes.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Why is the sampling distribution of the mode generally simpler (fewer possible values) than the sampling distribution of the mean?", "answer": "Because the mode can only take values that **already appear in the population** — it inherits the support of the parent distribution. The mean, on the other hand, can take any **average** of the possible values, producing many more distinct outcomes. With population $$\\{60, 100\\}$$ and sample size 3, the mean has 4 possible values $$\\{60, 73\\tfrac{1}{3}, 86\\tfrac{2}{3}, 100\\}$$ but the mode has only 2 $$\\{60, 100\\}$$. The mode coarse-grains the sample; the mean preserves more granular information.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "In the bulb sampling distribution of $$\\bar{X}$$ (size 3 from {60 (¾), 100 (¼)}), why does the probability decrease as the mean rises from 60 toward 100? (3 steps)", "answer": "- Step 1: Higher means require **more 100's** in the sample.\n- Step 2: Each 100 in the sample contributes a factor of $$1/4$$ instead of $$3/4$$ — making outcomes with more 100's **multiplicatively rarer**.\n- Step 3: So $$P(\\bar{X} = 60) = 27/64$$ but $$P(\\bar{X} = 100) = 1/64$$ — a 27-fold drop, mirroring the 3:1 population ratio cubed.\n\nThe sampling distribution of the mean inherits and amplifies the skew of the population.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "In the context of hypothesis testing (mentioned in the chapter introduction), explain why understanding sampling distributions is essential for carrying out hypothesis tests. (2 steps)", "answer": "- Step 1: Hypothesis tests compare observed sample data to what we'd expect if a certain hypothesis about the population were true.\n- Step 2: The sampling distribution tells us the probability of observing our sample statistic (or more extreme) by chance alone, if the null hypothesis were true. Without knowing the sampling distribution, we can't determine whether an observed result is unusual or simply due to random sampling variation.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "A call centre has 400 operators. The manager times a random sample of 30 operators over one day to work out the mean time per call. Is this mean a statistic? Explain your answer. (2 steps)", "answer": "- Step 1: Yes, this mean IS a statistic. A statistic is defined as a quantity calculated only from observations in a sample, and it does not involve any unknown population parameters.\n- Step 2: The manager calculated the mean from their sample data (30 operators). They did not use any population parameters like the true population mean μ. Even if the manager wanted to compare this to some known standard or claim, the calculation itself uses only sample data, so it is a statistic.\n\nThe sampling units here are individual operators, and a suitable sampling frame would be the list of all 400 operators.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "A population parameter is described as 'fixed', while a statistic is described as a 'random variable'. Explain why this distinction exists. (2 steps)", "answer": "- Step 1: A **population parameter** (like the true mean $$\\mu$$) is a fixed, constant value. It doesn't change because it represents the true state of the entire population, even if we don't know its exact value.\n- Step 2: A **statistic** (like the sample mean $$\\bar{X}$$) is a random variable because its value depends on which specific individuals are randomly selected for the sample. Before the sample is drawn, the statistic can take multiple possible values according to its sampling distribution; it only becomes a fixed number after the sample is observed.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "For the light bulb population (60W and 100W in ratio 3:1), a sample of size 3 is taken. Find Var(X̄) from the sampling distribution and verify it equals σ²/n. (4 steps)", "answer": "- Step 1: From the sampling distribution: P(X̄ = 60) = 27/64, P = 73⅓ = 27/64, P = 86⅔ = 9/64, P = 100 = 1/64.\n- Step 2: Compute E(X̄²): 60²×(27/64) + (73⅓)²×(27/64) + (86⅔)²×(9/64) + 100²×(1/64)\n= (3600×27 + 5377.78×27 + 7511.11×9 + 10000×1)/64\n= (97200 + 145200 + 67600 + 10000)/64 = 320000/64 = 5000.\n- Step 3: E(X̄) = 70 (from before), so E(X̄)² = 4900.\n- Step 4: Var(X̄) = E(X̄²) - [E(X̄)]² = 5000 - 4900 = 100. Since σ² = 300 and n = 3, indeed σ²/n = 300/3 = 100. ✓", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Show that $$E(\\bar{X}) = \\mu$$ for a sample of $$n$$ independent observations from a population with mean $$\\mu$$. (4 steps)", "answer": "- Step 1: Write $$\\bar{X} = \\frac{X_1 + X_2 + \\cdots + X_n}{n}$$.\n- Step 2: Apply linearity of expectation: $$E(\\bar{X}) = \\frac{1}{n}\\bigl[E(X_1) + E(X_2) + \\cdots + E(X_n)\\bigr]$$.\n- Step 3: Each $$X_i$$ is drawn from the population with mean $$\\mu$$, so $$E(X_i) = \\mu$$ for every $$i$$. The sum equals $$n\\mu$$.\n- Step 4: $$E(\\bar{X}) = \\frac{1}{n}(n\\mu) = \\mu$$.\n\n**Conclusion:** $$\\bar{X}$$ is an **unbiased estimator** of $$\\mu$$ — on average, it lands exactly on the population mean.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Using the same bag (6 with p=0.6, 10 with p=0.4), find the sampling distribution for the mode M for samples of 3 counters. (2 steps)", "answer": "- Step 1: Mode = 6 when at least two counters are 6. From the 8 possible samples, this includes:\n  (6,6,6), (6,6,10), (6,10,6), (10,6,6)—exactly the same as median = 6!\n  P(mode = 6) = p³ + 3p²q = 0.216 + 0.432 = 0.648\n- Step 2: Mode = 10 when at least two counters are 10:\n  (6,10,10), (10,6,10), (10,10,6), (10,10,10)—same as median = 10\n  P(mode = 10) = 3pq² + q³ = 0.288 + 0.064 = 0.352\n\nInterestingly, for n = 3 with only two possible values, the median and mode distributions are identical! This is because with 3 items, \"at least 2\" means the same for both median and mode.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "Why does a statistic — a single number computed from one sample — have a \"distribution\"? (3 steps)", "answer": "- Step 1: For any one specific sample, the statistic is just a number with no randomness left.\n- Step 2: But **before** the sample is drawn, the value of the statistic is uncertain — different possible samples give different values.\n- Step 3: Treating \"the sample we will get\" as random, the statistic is itself a **random variable**, and like any random variable it has a probability distribution.\n\nSo the distribution describes \"what value would this statistic take, in the abstract, before we collect data?\"", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Explain why, in practice, we can almost never know the exact population parameters (like μ and σ²). What do we do instead? (1 step)", "answer": "In practice, populations are usually too large (or infinite) to measure every single member. Even if we could, it would be time-consuming, expensive, and sometimes impossible (e.g., destructive testing).\n\nInstead, we take a random sample from the population and use observations from the sample to calculate statistics (like sample mean X̄ and sample variance S²). These statistics serve as estimates for the unknown population parameters. This is the fundamental idea of inferential statistics—we use sample information to make inferences about the population.", "source": "MiniMax ②", "_id": "minimax_2_21"}, {"question": "A flower shop has 10 florists; the owner asks all of them about flower quality. Why is using a census reasonable here? (3 steps)", "answer": "- Step 1: The population is **tiny** (just 10 florists), so the cost of a census is negligible — no resource constraint to push toward sampling.\n- Step 2: Asking everyone gives a **complete view** — small subgroups (perhaps a dissatisfied minority) cannot be missed.\n- Step 3: There's **no destruction or perishability** — opinions don't get \"used up\" by being asked, unlike physical product testing.\n\nSo a sample of 5 from 10 would lose half the data needlessly. **Census wins when the population is small, accessible, and non-destructive to test.**", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What is the difference between a census and a sample? In what situation would a census be inappropriate to use? (2 steps)", "answer": "- Step 1: A census observes or measures every single member of the entire population. A sample, on the other hand, selects only a subset (a portion) of the population to represent the whole.\n- Step 2: A census would be inappropriate when the testing process destroys the item being tested. For example, testing every light bulb by running it until it breaks would leave nothing left to sell.\n\nThis is why destructive testing (like testing rope breaking points or checking if plums are ripe by cutting them open) always requires sampling rather than a census.", "source": "MiniMax ②", "_id": "minimax_2_0"}, {"question": "A population has mean $$\\mu$$ and variance $$\\sigma^2$$. If you take a sample of size $$n$$, how does the expected value of the sample mean $$E(\\bar{X})$$ relate to $$\\mu$$, and what does this imply about $$\\bar{X}$$ as an estimator? (2 steps)", "answer": "- Step 1: The expected value of the sample mean is exactly the population mean: $$E(\\bar{X}) = \\mu$$.\n- Step 2: This implies that $$\\bar{X}$$ is an **unbiased** estimator of $$\\mu$$. On average, across all possible samples, the sample mean will equal the true population mean, even though any single sample's mean might be higher or lower.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "Let $$X_1, X_2, \\ldots, X_n$$ be independent observations from a distribution with variance $$\\sigma^2$$. Conceptually, why does the variance of the sample mean, $$\\text{Var}(\\bar{X})$$, decrease as the sample size $$n$$ increases? (3 steps)", "answer": "- Step 1: The sample mean is $$\\bar{X} = \\frac{1}{n}\\sum X_i$$. The variance of a constant multiple is $$\\text{Var}(aX) = a^2\\text{Var}(X)$$, so the $$\\frac{1}{n}$$ factor will contribute $$\\frac{1}{n^2}$$ to the variance of the sum.\n- Step 2: Because the observations are independent, the variance of the sum is the sum of the variances: $$\\text{Var}(\\sum X_i) = \\sum \\text{Var}(X_i) = n\\sigma^2$$.\n- Step 3: Combining these, $$\\text{Var}(\\bar{X}) = \\text{Var}\\left(\\frac{1}{n}\\sum X_i\\right) = \\frac{1}{n^2} \\times n\\sigma^2 = \\frac{\\sigma^2}{n}$$. As $$n$$ gets larger, the denominator grows, so the variance shrinks. This reflects the intuition that larger samples give more precise, less variable estimates of the true mean.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "In the context of Example 2, explain why the sample mean x̄ can be used to estimate the population mean μ, but the sample variance formula depends on whether we divide by n or (n-1). (2 steps)", "answer": "- Step 1: The sample mean x̄ = ΣXᵢ/n is a statistic — it's calculated entirely from sample data.\n- Step 2: Using n-1 in the denominator (creating the unbiased estimator s² = Σ(Xᵢ - x̄)²/(n-1)) gives an unbiased estimate of the population variance σ². Using n would systematically underestimate σ². Both are statistics since neither involves μ.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "A factory tests 4 ropes from a batch of 3000 ropes by stretching each until it breaks. The breaking loads are: 320 kg, 260 kg, 240 kg, 180 kg. The factory claims the ropes are safe for loads up to 250 kg. What can you comment on this claim based on the sample? (3 steps)", "answer": "- Step 1: Calculate the sample mean: (320 + 260 + 240 + 180) ÷ 4 = 1000 ÷ 4 = 250 kg\n- Step 2: Notice that one rope broke at 180 kg, which is significantly below the claimed safe limit of 250 kg. This represents 25% of the sample (1 out of 4) failing below the claimed safe load.\n- Step 3: The sample is too small to draw reliable conclusions. With only 4 ropes tested, we cannot confidently say all ropes can handle 250 kg. The sample shows that at least some ropes fail below this level, so the claim is questionable. A larger sample would be needed to make a valid prediction.\n\nKey takeaway: Small samples can be misleading due to natural variation—one failure below the claimed limit is concerning but not conclusive with such a tiny sample.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "What's the general strategy to compute the sampling distribution of the median (or mode, or any statistic) for a small sample? (4 steps)", "answer": "- Step 1: List all possible **ordered** samples (or unordered, weighted by their multiplicities).\n- Step 2: For each, compute the value of the statistic.\n- Step 3: **Group samples by statistic value**, summing their probabilities.\n- Step 4: Verify the total probability is 1 — a built-in sanity check.\n\nFor independent draws, the probability of any ordered sample is the product of individual draw probabilities, which makes step 1 mechanical.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A common confusion: \"Sample variance $$S^2$$ and the formula $$\\sum(X_i - \\mu)^2/(n-1)$$ both measure spread, so they're basically the same.\" Why is the second NOT a statistic?", "answer": "They use **different anchors**. $$S^2$$ uses the sample mean $$\\bar{X}$$ — computable directly from data. The other formula uses the population mean $$\\mu$$ — an unknown parameter. Even though both expressions describe spread, only the first can be evaluated from a sample. The second is a theoretical quantity, useful in derivations but not a statistic. The lesson: \"looks like a statistic\" isn't enough — every symbol in the formula must be data-derivable.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "For a sample of size 3 with possible values 0, 1, 2, what conditions on the three observations give a median of 1? (3 steps)", "answer": "- Step 1: All three are 1 — trivially median 1.\n- Step 2: Two are 1 and the third is 0 or 2 — the middle of $$\\{0,1,1\\}$$ or $$\\{1,1,2\\}$$ is 1.\n- Step 3: One is 1 and the other two straddle it (one 0, one 2) — the sorted sample $$(0,1,2)$$ has median 1.\n\nIn every case, the sample contains at least one observation $$\\le 1$$ and at least one $$\\ge 1$$, with 1 itself sitting in the middle. Concrete examples: $$(0,1,2)$$, $$(1,1,2)$$, $$(0,1,1)$$, $$(1,1,1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "To find the sampling distribution of the median for a sample of 3 from a population of 0s, 1s, and 2s, why can't we simply use a binomial distribution like we do for a sum? (2 steps)", "answer": "- Step 1: A binomial distribution counts the total number of \"successes\" and relies on a binary outcome (success/failure). Here, the population has three distinct outcomes (0, 1, 2), so it is not binary.\n- Step 2: The median is a positional statistic (the middle value of an ordered set), not a simple sum of indicator variables. Its value depends on complex interactions between the counts of 0s, 1s, and 2s, requiring us to enumerate the possible ordered samples and their specific probabilities (using the multinomial principle) rather than applying a simple binomial formula.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why does using a sample sometimes beat conducting a \"perfect\" census in real-world investigations? (4 steps)", "answer": "- Step 1: A census of a large dynamic population is so **slow** that the population may shift before it's complete (people leave, new items are produced).\n- Step 2: A census is often **prohibitively expensive** — the cost may not be feasible at all.\n- Step 3: A well-designed sample, completed quickly, captures a **fresher snapshot** with only modest sampling error.\n- Step 4: So in many practical contexts, **\"fast and approximately right\" beats \"slow and stale-but-precise.\"**\n\nIn short: sampling isn't always second-best to a census — sometimes it's actually more accurate in the timeframe that matters.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "When finding the sampling distribution of the mean $$\\bar{X}$$ for a small sample (e.g., size 3) drawn from a discrete population, why is it essential to list all possible ordered samples rather than just the unique combinations? (2 steps)", "answer": "- Step 1: Ordered samples account for the different ways a combination can occur. For example, drawing (60, 100, 60) is distinct from drawing (60, 60, 100) in the sampling process.\n- Step 2: Each ordered sample may have the same mean, but they are separate events with their own probabilities. To find the correct probability for a specific value of $$\\bar{X}$$, we must sum the probabilities of *all* ordered samples that yield that mean, not just count the combinations.\n\nTakeaway: Probability depends on the frequency of ordered outcomes, so we must list them all to weight the means correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "A population of light bulbs has wattages of 60W and 100W in a 3:1 ratio. A sample of 3 bulbs is taken. Without doing full calculations, what is the most likely value of the sample mean $$\\bar{X}$$, and why? (2 steps)", "answer": "- Step 1: Since 60W bulbs make up $$\\frac{3}{4}$$ of the population, the most likely sample is one consisting entirely of 60W bulbs (probability $$(\\frac{3}{4})^3$$).\n- Step 2: Therefore, the most likely value of the sample mean is simply 60W, because the sample that yields $$\\bar{X} = 60$$ has the highest individual probability of occurring.\n\nTakeaway: The most probable sample reflects the most common elements of the population, pulling the mode of the sampling distribution toward the majority value.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "What does it mean to say \"the sample mean is an unbiased estimator of $$\\mu$$\"? Does it equal $$\\mu$$?", "answer": "No — the sample mean from any one specific sample will rarely equal $$\\mu$$ exactly. **\"Unbiased\" is a long-run property:** if you imagine taking infinitely many samples and computing $$\\bar{X}$$ each time, the *average* of all those $$\\bar{X}$$ values would equal $$\\mu$$. Formally, $$E(\\bar{X}) = \\mu$$. So each individual $$\\bar{X}$$ wanders around $$\\mu$$, but the wandering is **centred** on $$\\mu$$ — not systematically biased upward or downward.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "If a population has variance $$\\sigma^2$$, how does the variance of the sample mean $$\\text{Var}(\\bar{X})$$ change as the sample size $$n$$ increases, and intuitively, why? (3 steps)", "answer": "- Step 1: The variance of the sample mean is given by $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{n}$$.\n- Step 2: As the sample size $$n$$ increases, the variance $$\\frac{\\sigma^2}{n}$$ decreases. This means the sampling distribution becomes narrower and more concentrated around the mean $$\\mu$$.\n- Step 3: Intuitively, a larger sample provides more information about the population. With more data points, extreme values are more likely to be balanced out by others, so the sample mean is less likely to stray far from the true population mean.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Is the claim \"a larger sample is always more accurate\" actually true? (3 steps)", "answer": "- Step 1: **Generally yes** — sampling error shrinks as $$n$$ grows; the sample mean's standard deviation falls like $$\\sigma/\\sqrt{n}$$.\n- Step 2: **But only for unbiased samples** — a large but biased sample is worse than a small unbiased one. Size doesn't fix bias.\n- Step 3: **Diminishing returns**: doubling $$n$$ improves precision only by $$\\sqrt{2}$$, not 2. Beyond a point, extra accuracy isn't worth the extra cost.\n\nSo \"bigger is generally better\" is a useful slogan, but unbiasedness and efficient design matter just as much as sheer size.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why is the sample variance $S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$ a statistic, but $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ is not? (2 steps)", "answer": "- Step 1: $S^2$ uses $\\bar{X}$ (calculated from the sample), not $\\mu$ (unknown population parameter).  \n- Step 2: The second formula depends on $\\mu$, which is not derived solely from the sample, disqualifying it as a statistic.\n\nContrast:  \n+ $S^2$ is sample-based; $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ is not.  \n+ Statistics must be computable without external parameters.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "A supermarket tests only 5 plums and reports \"80% of the delivery is ripe.\" Why is this estimate weak, and how can it be improved?", "answer": "With only 5 plums, the proportion can swing by 20% (one plum) at a time — the estimate has huge variability and could easily be very different on a re-test. A larger sample (say 30 plums) averages out random variation, giving a much more reliable estimate of the true proportion. The principle: when the underlying quantity is a proportion, the precision of the estimate scales like $$1/\\sqrt{n}$$, so small $$n$$ means little reliability.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A factory produces matches and tests them by striking them to see if they light. Why is a census completely inappropriate here, and what is the general term for this type of testing limitation? (2 steps)", "answer": "- Step 1: A census requires measuring every single member of the population. If the factory tests every match by striking it, the entire population of matches is destroyed in the process, leaving nothing to sell or use.\n+ This is known as **destructive testing**, where the measurement process itself destroys the item.\n- Step 2: Therefore, when testing is destructive, a sample is the only viable option because it limits the destruction to a small, manageable subset of the population, preserving the vast majority of the items for their intended use.\n\nTakeaway: Never use a census when the act of measurement destroys the item.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A researcher wants to study the average income of a city's residents. They decide to use a sample instead of a census. Aside from cost and time, what is a practical disadvantage of using a sample in this scenario? (2 steps)", "answer": "- Step 1: A sample, by definition, only captures a subset of the population. If the city has a very small subgroup (e.g., a specific rare profession with exceptionally high or low income), a random sample might completely miss this subgroup.\n- Step 2: As a result, the data may not accurately represent these small subgroups, leading to skewed or incomplete conclusions about the population as a whole. A census would capture every individual, including those in small subgroups.\n\nTakeaway: Samples can miss minority subgroups, reducing the validity of conclusions about those specific subsets.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "How does the natural variation within a population affect the required sample size to achieve a certain level of accuracy? (2 steps)", "answer": "- Step 1: Natural variation refers to how spread out or diverse the values in the population are. If a population is very uniform (low variation), even a small sample will likely capture the true nature of the population.\n- Step 2: Conversely, if the population is highly varied (high variation), a small sample might only capture an extreme end of the distribution by chance. Therefore, to achieve the same level of accuracy, a more varied population requires a larger sample size.\n\nTakeaway: Higher population variance demands a larger sample size for reliable estimates.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "What is the difference between a sampling unit and a sampling frame, and why might a sampling frame not perfectly match the population? (3 steps)", "answer": "- Step 1: A **sampling unit** is an individual member of the population (e.g., a person, a light bulb, a tree).\n- Step 2: A **sampling frame** is a practical list of all the sampling units (e.g., an electoral roll, a phone directory) from which the sample is actually drawn.\n- Step 3: They might not match because populations are dynamic—people move, are born, or die between when the frame is created and when the sample is drawn. Thus, a sampling frame is often slightly outdated or incomplete compared to the true population.\n\nTakeaway: The sampling frame is the practical proxy for the population, but it rarely achieves perfect 1-to-1 correspondence.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A population has an unknown mean $$\\mu$$. You take a sample $$X_1, X_2, \\dots, X_n$$. One student calculates $$\\frac{\\sum(X_i - \\mu)^2}{n}$$ and another calculates $$\\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Which of these is a statistic and why? (2 steps)", "answer": "- Step 1: The second expression, $$\\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$, is the statistic. A statistic must be calculated *only* from the observations in the sample.\n- Step 2: The first expression involves $$\\mu$$, which is an unknown population parameter. Because it relies on information outside of the sample data, it cannot be computed from the sample alone and is therefore not a statistic.\n\nTakeaway: If the formula contains a population parameter (like $$\\mu$$ or $$\\sigma$$), it is not a statistic.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "Why do we use Greek letters (like $$\\mu$$, $$\\sigma^2$$) for some values and Latin letters (like $$\\bar{X}$$, $$S^2$$) for others in statistics? (2 steps)", "answer": "- Step 1: Greek letters are reserved for **population parameters**—these are fixed, true (but usually unknown) numerical properties of the entire population.\n- Step 2: Latin letters are used for **sample statistics**—these are values calculated from sample data and are used to estimate the corresponding population parameters. Because samples vary, statistics are random variables, whereas parameters are constants.\n\nTakeaway: Greek = Population (constant, usually unknown); Latin = Sample (random variable, calculated from data).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A survey asks 20 people if they support a new policy (Yes=1, No=0). Let $$p$$ be the true proportion of supporters in the population. Why is the sum of their responses, $$Y = \\sum_{i=1}^{20} X_i$$, modeled by a binomial distribution? (3 steps)", "answer": "- Step 1: To use a binomial distribution, we need a fixed number of trials. Here, the 20 people surveyed represent $$n = 20$$ fixed trials.\n- Step 2: Each trial must be independent and have a constant probability of success. Since it's a random sample, one person's response doesn't affect another's, and the true proportion $$p$$ is constant for each person.\n- Step 3: The outcome for each trial must be binary (success/failure). The random variable $$X_i$$ is defined as 1 (support) or 0 (no support), fitting the binary requirement. Thus, $$Y \\sim \\mathrm{B}(20, p)$$.\n\nTakeaway: Sums of independent, identical binary indicators naturally form a binomial distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When finding the sampling distribution of the mean $$\\bar{X}$$ for a small sample (e.g., size 3) drawn from a discrete population, why is it essential to list all possible ordered samples rather than just the unique combinations? (2 steps)", "answer": "- Step 1: Ordered samples account for the different ways a combination can occur. For example, drawing (60, 100, 60) is distinct from drawing (60, 60, 100) in the sampling process.\n- Step 2: Each ordered sample may have the same mean, but they are separate events with their own probabilities. To find the correct probability for a specific value of $$\\bar{X}$$, we must sum the probabilities of *all* ordered samples that yield that mean, not just count the combinations.\n\nTakeaway: Probability depends on the frequency of ordered outcomes, so we must list them all to weight the means correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "A population of light bulbs has wattages of 60W and 100W in a 3:1 ratio. A sample of 3 bulbs is taken. Without doing full calculations, what is the most likely value of the sample mean $$\\bar{X}$$, and why? (2 steps)", "answer": "- Step 1: Since 60W bulbs make up $$\\frac{3}{4}$$ of the population, the most likely sample is one consisting entirely of 60W bulbs (probability $$(\\frac{3}{4})^3$$).\n- Step 2: Therefore, the most likely value of the sample mean is simply 60W, because the sample that yields $$\\bar{X} = 60$$ has the highest individual probability of occurring.\n\nTakeaway: The most probable sample reflects the most common elements of the population, pulling the mode of the sampling distribution toward the majority value.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "A sample of 3 items is taken from a population with values 0, 1, and 2. Why is finding the sampling distribution of the median generally more complex than finding the distribution of the mean? (2 steps)", "answer": "- Step 1: The mean takes a unique value for every possible sample, spreading probabilities across many distinct outcomes. The median, however, can only take the values of the population items (0, 1, or 2), meaning many different samples collapse into the same median value.\n- Step 2: To find the probability of a specific median, you must carefully identify and sum the probabilities of all ordered samples that produce that middle value, which requires tracking many more combinations than the mean (where you only care about the sum).\n\nTakeaway: The median is less sensitive to extreme values, but its sampling distribution requires aggregating many more distinct sample paths.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A drawer contains a large number of coins: 50% are 50¢, 25% are 20¢, and 25% are 10¢. A sample of 2 coins is drawn. Conceptually, how would you find the sampling distribution of the mean $$\\bar{X}$$? (3 steps)", "answer": "- Step 1: First, identify all possible ordered samples of size 2: (50,50), (50,20), (20,50), (50,10), (10,50), (20", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}], "count": 11}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In data collection, what distinguishes a 'population' from a 'sample', and how does a 'census' relate to them? (3 steps)", "answer": "- Step 1: A **population** is the entire set of items that are of interest in a study (e.g., all the trees in a forest). It represents the complete group we want to learn about.\n- Step 2: A **sample** is a selection of observations taken from a subset of the population. We use it to find out information about the population as a whole when studying every item is impractical.\n- Step 3: A **census** is the process of observing or measuring every single member of the population. It bridges the two by gathering data on the entire population, rather than just a subset.\n\nTakeaway: Population = the whole; Sample = a piece; Census = measuring the whole.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A census provides completely accurate results, so why might a researcher still choose not to use one? (2 steps)", "answer": "- Step 1: A census observes every member, guaranteeing accuracy, but it comes with severe practical constraints. It is highly time-consuming and expensive to conduct.\n- Step 2: Additionally, there are two critical situations where a census is impossible or undesirable:\n+ When the testing process destroys the item (e.g., testing the breaking point of safety ropes leaves no ropes to sell).\n+ When the population is so large that processing the sheer volume of data becomes unmanageable.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "What are the primary trade-offs when choosing to use a sample instead of a census? (2 steps)", "answer": "- Step 1: The main advantages of a sample are practicality: it is much less time-consuming and expensive than a census, requires fewer respondents, and yields less data to process.\n- Step 2: The trade-offs (disadvantages) are that the data may not be as accurate, and the sample might not be large enough to represent small subgroups of the population, potentially leading to unrepresentative or biased conclusions.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A factory manufactures 10,000 fireworks and wants to test their ignition reliability. Explain why a sample is strictly necessary here rather than a census. (3 steps)", "answer": "- Step 1: Testing a firework's reliability requires igniting it, which destroys the item.\n- Step 2: If a census were conducted, every single firework would be ignited to verify it works, resulting in zero fireworks left to sell.\n- Step 3: Therefore, in any scenario involving destructive testing, a sample is the only viable method to estimate the population parameter without destroying the entire product batch.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "What is the difference between a 'sampling unit' and a 'sampling frame', and how do they work together in practice? (2 steps)", "answer": "- Step 1: A **sampling unit** is an individual member of the population (e.g., a single person, a single rope).\n- Step 2: A **sampling frame** is a practical list or database of all the sampling units in the population, often with names or numbers (e.g., a register of students, a list of product serial numbers).\n+ We need the sampling frame to actually select our sample from the population in a structured way. If the frame is incomplete, some units have zero chance of being sampled.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "How do 'population parameters' differ from 'statistics', and what is the standard notation convention for each? (3 steps)", "answer": "- Step 1: A **population parameter** is a fixed, often unknown numerical property of the entire population (like the true population mean or variance).\n- Step 2: A **statistic** is a quantity calculated *only* from the observations in a sample. It does not involve any unknown population parameters.\n- Step 3: The notation convention uses Greek letters for population parameters (e.g., $$\\mu$$ for population mean, $$\\sigma^2$$ for population variance) and Latin/Roman letters for statistics (e.g., $$\\bar{X}$$ for sample mean, $$S^2$$ for sample variance).\n\nTakeaway: Parameters are the unknown truths of the population; statistics are the calculable estimates from the sample.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A random sample $$X_1, X_2, \\dots, X_n$$ is taken from a population with unknown mean $$\\mu$$. Is the quantity $$\\frac{\\sum(X_i - \\mu)^2}{n-1}$$ a statistic? Why or why not? (2 steps)", "answer": "- Step 1: This quantity is **not** a statistic.\n- Step 2: By definition, a statistic must be calculated *only* from the observations in the sample. The expression $$\\frac{\\sum(X_i - \\mu)^2}{n-1}$$ includes $$\\mu$$, which is an unknown population parameter.\n+ Because $$\\mu$$ is not a sample observation and is unknown, we cannot calculate this value from the sample alone, disqualifying it from being a statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Given a random sample $$X_1, X_2, \\dots, X_n$$, determine whether $$\\frac{X_2 + X_5}{2}$$ and $$\\frac{\\sum X_i^2}{n} - \\left(\\frac{\\sum X_i}{n}\\right)^2$$ are statistics. (2 steps)", "answer": "- Step 1: Both expressions **are** statistics.\n- Step 2: A statistic is any quantity calculated solely from sample observations. \n+ $$\\frac{X_2 + X_5}{2}$$ uses only two specific sample values.\n+ $$\\frac{\\sum X_i^2}{n} - \\left(\\frac{\\sum X_i}{n}\\right)^2$$ is actually the formula for sample variance; it only uses the sample values $$X_i$$ and the sample size $$n$$, without relying on any unknown population parameters like $$\\mu$$ or $$\\sigma^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "In the context of sampling distributions, why do we write $$\\bar{X}$$ using an uppercase letter, but $$\\bar{x}$$ using a lowercase letter? (2 steps)", "answer": "- Step 1: **Uppercase** $$\\bar{X}$$ represents the *random variable* of the sample mean before the sample is taken. It has a probability distribution (the sampling distribution) because different samples will yield different means.\n- Step 2: **Lowercase** $$\\bar{x}$$ represents a *specific observed value* of the sample mean after the data has been collected from one particular sample. It is a fixed, known number, not a random variable.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "If you repeatedly take samples of size $$n$$ from a population and calculate the sample mean $$\\bar{X}$$ each time, why does $$\\bar{X}$$ have a 'distribution' rather than a single fixed value? (2 steps)", "answer": "- Step 1: Due to natural variation in the population, different random samples will contain different individuals with different values.\n- Step 2: Because each sample is different, the calculated statistic (like the mean) will vary from sample to sample. The **sampling distribution** maps out all possible values this statistic can take and the probability of each occurring by chance alone.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A survey asks 20 people a yes/no question. Let $$Y_i = 1$$ for 'yes' and $$Y_i = 0$$ for 'no'. What is the sampling distribution of the statistic $$T = \\sum_{i=1}^{20} Y_i$$, and why? (2 steps)", "answer": "- Step 1: The sampling distribution of $$T$$ is a **Binomial distribution**, specifically $$T \\sim \\text{B}(20, p)$$, where $$p$$ is the true population proportion of 'yes' answers.\n- Step 2: This is because the conditions for a binomial distribution are met:\n+ There is a fixed number of trials ($$n = 20$$ people).\n+ Each trial has two outcomes (yes = 1, no = 0).\n+ The probability of success $$p$$ is constant for each person.\n+ Each observation is independent.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A population consists of values {1, 3} with equal probability of 0.5. A random sample of size 2 is taken. What is the sampling distribution of the sample mean $$\\bar{X}$$? (3 steps)", "answer": "- Step 1: List all possible samples of size 2: (1,1), (1,3), (3,1), (3,3).\n- Step 2: Calculate the sample mean $$\\bar{x}$$ for each:\n+ (1,1) $$\\rightarrow$$ $$\\bar{x} = 1$$\n+ (1,3) and (3,1) $$\\rightarrow$$ $$\\bar{x} = 2$$\n+ (3,3) $$\\rightarrow$$ $$\\bar{x} = 3$$\n- Step 3: Calculate the probability for each mean value. Since each of the 4 samples is equally likely (probability $$0.5 \\times 0.5 = 0.25$$):\n+ $$P(\\bar{X} = 1) = 0.25$$\n+ $$P(\\bar{X} = 2) = 0.5$$ (from two samples)\n+ $$P(\\bar{X} = 3) = 0.25$$", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A population has values {A, B} where P(A) = 0.6 and P(B) = 0.4. A random sample of 3 is taken. What is the sampling distribution of the mode $$M$$? (3 steps)", "answer": "- Step 1: The mode of a sample of size 3 is simply the value that appears at least twice. The possible modes are A or B.\n- Step 2: Calculate the probability that the mode is A. This happens if A appears 2 or 3 times:\n+ P(A appears 3 times) = $$0.6^3 = 0.216$$\n+ P(A appears exactly 2 times) = $$3 \\times (0.6^2 \\times 0.4) = 0.432$$\n+ Total $$P(M = A) = 0.216 + 0.432 = 0.648$$\n- Step 3: Calculate the probability that the mode is B. This happens if B appears 2 or 3 times:\n+ P(B appears 3 times) = $$0.4^3 = 0.064$$\n+ P(B appears exactly 2 times) = $$3 \\times (0.4^2 \\times 0.6) = 0.288$$\n+ Total $$P(M = B) = 0.064 + 0.288 = 0.352$$ (Alternatively, $$1 - 0.648 = 0.352$$).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A large bag has counters with values 0 and 1, where P(0) = 0.2 and P(1) = 0.8. A sample of 3 counters is drawn. What is the sampling distribution of the median $$N$$? (3 steps)", "answer": "- Step 1: For a sample of size 3, the median is the middle value when sorted. It equals 0 only if at least two counters are 0. It equals 1 if at least two counters are 1.\n- Step 2: Find $$P(N = 0)$$. This requires two or three 0s.\n+ P(three 0s) = $$0.2^3 = 0.008$$\n+ P(exactly two 0s) = $$3 \\times (0.2^2 \\times 0.8) = 0.096$$\n+ $$P(N = 0) = 0.008 + 0.096 = 0.104$$\n- Step 3: Find $$P(N = 1)$$. This requires two or three 1s.\n+ $$P(N = 1) = 1 - P(N = 0) = 1 - 0.104 = 0.896$$.\n(Alternatively, $$0.8^3 + 3(0.8^2 \\times 0.2) = 0.512 + 0.384 = 0.896$$).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A population has mean $$\\mu$$ and variance $$\\sigma^2$$. If you take a sample of size $$n$$, how does the expected value of the sample mean $$E(\\bar{X})$$ relate to $$\\mu$$, and what does this imply about $$\\bar{X}$$ as an estimator? (2 steps)", "answer": "- Step 1: The expected value of the sample mean is exactly the population mean: $$E(\\bar{X}) = \\mu$$.\n- Step 2: This implies that $$\\bar{X}$$ is an **unbiased** estimator of $$\\mu$$. On average, across all possible samples, the sample mean will equal the true population mean, even though any single sample's mean might be higher or lower.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "If a population has variance $$\\sigma^2$$, how does the variance of the sample mean $$\\text{Var}(\\bar{X})$$ change as the sample size $$n$$ increases, and intuitively, why? (3 steps)", "answer": "- Step 1: The variance of the sample mean is given by $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{n}$$.\n- Step 2: As the sample size $$n$$ increases, the variance $$\\frac{\\sigma^2}{n}$$ decreases. This means the sampling distribution becomes narrower and more concentrated around the mean $$\\mu$$.\n- Step 3: Intuitively, a larger sample provides more information about the population. With more data points, extreme values are more likely to be balanced out by others, so the sample mean is less likely to stray far from the true population mean.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "A factory produces items with a known defect rate of 10%. A quality control officer takes a sample of 50 items and calculates the sample proportion of defects $$\\hat{p}$$. Will $$\\hat{p}$$ exactly equal 10%? Explain using the concept of sampling distributions. (2 steps)", "answer": "- Step 1: It is highly unlikely that $$\\hat{p}$$ will exactly equal 10% (0.1) for any single sample.\n- Step 2: The sample proportion $$\\hat{p}$$ is a statistic, and like all statistics, it has a sampling distribution. Due to natural sampling variation, different samples of 50 will yield different values of $$\\hat{p}$$ distributed around 0.1. While $$E(\\hat{p}) = 0.1$$, a specific sample's result will fluctuate around this value.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "A bag contains a large number of coins: 50% are 10-cent coins and 50% are 20-cent coins. What is the population mean $$\\mu$$ and population variance $$\\sigma^2$$ for the value of a single coin? (3 steps)", "answer": "- Step 1: Calculate the mean $$\\mu = \\sum x P(X=x) = (10 \\times 0.5) + (20 \\times 0.5) = 15$$ cents.\n- Step 2: Calculate $$E(X^2) = \\sum x^2 P(X=x) = (10^2 \\times 0.5) + (20^2 \\times 0.5) = 50 + 200 = 250$$.\n- Step 3: Calculate the variance $$\\sigma^2 = E(X^2) - \\mu^2 = 250 - 15^2 = 250 - 225 = 25$$ cents$$^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Using the coin population from the previous question (50% 10-cent, 50% 20-cent), a sample of 2 coins is taken. What is the sampling distribution of the sample mean $$\\bar{X}$$? (3 steps)", "answer": "- Step 1: List the possible samples of size 2: (10, 10), (10, 20), (20, 10), (20, 20). Each has a probability of $$0.5 \\times 0.5 = 0.25$$.\n- Step 2: Calculate the sample mean $$\\bar{x}$$ for each:\n+ (10, 10) $$\\rightarrow \\bar{x} = 10$$\n+ (10, 20) and (20, 10) $$\\rightarrow \\bar{x} = 15$$\n+ (20, 20) $$\\rightarrow \\bar{x} = 20$$\n- Step 3: Determine the probabilities:\n+ $$P(\\bar{X} = 10) = 0.25$$\n+ $$P(\\bar{X} = 15) = 0.25 + 0.25 = 0.5$$\n+ $$P(\\bar{X} = 20) = 0.25$$", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "If you take a sample of size $$n=1$$ from a population, what is the sampling distribution of the sample mean $$\\bar{X}$$? (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ for a sample of size 1 is simply the single observed value $$X_1$$.\n- Step 2: Therefore, the sampling distribution of $$\\bar{X}$$ when $$n=1$$ is exactly the same as the original population distribution. It has the same shape, the same mean $$\\mu$$, and the same variance $$\\sigma^2$$.\n+ This makes sense because with only one observation, there is no \"averaging\" effect to reduce the variance; the statistic just reflects the raw population.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "Let $$X_1, X_2, X_3$$ be independent observations from a population with mean $$\\mu$$. Walk through the steps to show that the expected value of the sample mean, $$E(\\bar{X})$$, is equal to $$\\mu$$. (3 steps)", "answer": "- Step 1: Write down the definition of the sample mean for $$n=3$$: $$\\bar{X} = \\frac{X_1 + X_2 + X_3}{3}$$.\n- Step 2: Apply the expectation operator $$E$$ to both sides. Using the linearity of expectation (the expectation of a sum is the sum of expectations), we get: $$E(\\bar{X}) = E\\left(\\frac{X_1 + X_2 + X_3}{3}\\right) = \\frac{1}{3} [E(X_1) + E(X_2) + E(X_3)]$$.\n- Step 3: Since each $$X_i$$ is drawn from the same population, each has an expected value of $$\\mu$$. Substituting this in: $$E(\\bar{X}) = \\frac{1}{3} [\\mu + \\mu + \\mu] = \\frac{3\\mu}{3} = \\mu$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Let $$X_1, X_2, X_3$$ be independent observations from a population with variance $$\\sigma^2$$. Walk through the steps to show that $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{3}$$. (3 steps)", "answer": "- Step 1: Start with the sample mean $$\\bar{X} = \\frac{X_1 + X_2 + X_3}{3}$$. We want to find its variance. When a random variable is multiplied by a constant $$\\frac{1}{3}$$, its variance is multiplied by the square of that constant: $$\\text{Var}(cY) = c^2\\text{Var}(Y)$$.\n- Step 2: Because the observations are independent, the variance of their sum is the sum of their variances: $$\\text{Var}(X_1 + X_2 + X_3) = \\text{Var}(X_1) + \\text{Var}(X_2) + \\text{Var}(X_3) = \\sigma^2 + \\sigma^2 + \\sigma^2 = 3\\sigma^2$$.\n- Step 3: Combine these rules for the sample mean: $$\\text{Var}(\\bar{X}) = \\text{Var}\\left(\\frac{1}{3}(X_1 + X_2 + X_3)\\right) = \\left(\\frac{1}{3}\\right)^2 \\text{Var}(X_1 + X_2 + X_3) = \\frac{1}{9} \\times 3\\sigma^2 = \\frac{3\\sigma^2}{9} = \\frac{\\sigma^2}{3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "A population parameter is described as 'fixed', while a statistic is described as a 'random variable'. Explain why this distinction exists. (2 steps)", "answer": "- Step 1: A **population parameter** (like the true mean $$\\mu$$) is a fixed, constant valu
