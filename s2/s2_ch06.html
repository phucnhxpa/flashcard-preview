 - μ² — This is NOT a statistic because it involves μ, which is the unknown population mean. Since μ is an unknown parameter, any expression containing it cannot be a statistic.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A random variable X is defined as: X = 1 if a student supports school uniform, and X = 0 otherwise. In a random sample of 15 students, what is the sampling distribution of Y = Σᵢ₌₁¹⁵ Xᵢ? What distribution does Y follow? (2 steps)", "answer": "- Step 1: Y represents the number of students in the sample who support school uniform. Since this is counting \"successes\" (students who support) in a fixed number of independent trials (the 15 students), with constant probability p of success, Y follows a binomial distribution.\n- Step 2: Specifically, Y ~ B(15, p), where p is the true proportion of all students in the population who support the idea. This is the sampling distribution—it tells us all possible values Y could take (0 to 15) and the probability of each, based on the parameter p.\n\nThe key insight: The sampling distribution of a sum (or count) of independent binary (0/1) variables follows a binomial distribution.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A bag contains counters labelled 0 (10%), 1 (40%), and 2 (50%). If you take a random sample of 3 counters, what are the possible values the sample median can take? (2 steps)", "answer": "- Step 1: When you select 3 counters, you order them from smallest to largest. The median is the middle value. Since the counters can be 0, 1, or 2, the median can only take values 0, 1, or 2.\n- Step 2: Specifically:\n  + Median = 0 when all three counters are 0 (or two are 0 and one is 1, as long as the middle value is 0)\n  + Median = 1 when at least one counter is 1 and 1 is the middle value when ordered\n  + Median = 2 when at least two counters are 2 (or one is 2 and the others are ≥ 2 in a way that makes 2 the middle value)\n\nThe probabilities would be calculated by listing all possible samples of size 3 and finding which have median 0, 1, or 2.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is meant by the \"sampling distribution\" of a statistic? Why is understanding sampling distributions important for hypothesis testing? (2 steps)", "answer": "- Step 1: The sampling distribution of a statistic gives all the possible values that the statistic can take, along with the probability of each occurring. If you repeatedly take samples from a population and calculate the same statistic each time, there is a range of values the statistic can take—that range and the probabilities constitute the sampling distribution.\n- Step 2: For hypothesis testing, we need to know what values a statistic would typically take by chance alone if a certain condition were true. The sampling distribution tells us this. We can then compare an observed statistic to this distribution to determine whether the result is likely or unlikely, helping us decide whether to reject a hypothesis.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A manufacturer makes light bulbs: 60W bulbs (probability 3/4) and 100W bulbs (probability 1/4). If you take a random sample of 3 bulbs, what is the probability that the sample mean equals 60? What is the probability it equals 100? (3 steps)", "answer": "- Step 1: The sample mean equals 60 only when all three bulbs are 60W bulbs. This is the case (60, 60, 60).\n- Step 2: The probability of this occurring is: (3/4) × (3/4) × (3/4) = (3/4)³ = 27/64\n- Step 3: The sample mean equals 100 only when all three bulbs are 100W bulbs: (100, 100, 100). The probability is: (1/4)³ = 1/64\n\nThe other possible sample means (73⅓ and 86⅔) occur from mixed combinations. This illustrates how the sampling distribution is built by considering all possible samples and their probabilities.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In the light bulb example (60W with p=3/4, 100W with p=1/4), find the sampling distribution of the mode M for samples of size 3. What is P(M = 60)? (3 steps)", "answer": "- Step 1: The mode is the value that appears most frequently. For samples of 3 bulbs, the mode can only be 60 or 100 (or no mode if all three are different, but that can't happen here with only two values).\n- Step 2: Mode = 60 occurs when at least two of the three bulbs are 60W. This includes: (60,60,60) [probability (3/4)³ = 27/64], plus the three cases with exactly two 60s [3 × (1/4) × (3/4)² = 27/64]. Total: 27/64 + 27/64 = 54/64 = 27/32.\n- Step 3: Mode = 100 occurs when at least two are 100W. This includes: (100,100,100) [probability (1/4)³ = 1/64] plus three cases with exactly two 100s [3 × (1/4)² × (3/4) = 9/64]. Total: 1/64 + 9/64 = 10/64 = 5/32.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A population has values 60 (probability 3/4) and 100 (probability 1/4). Find the population mean μ and variance σ². (3 steps)", "answer": "- Step 1: The population mean μ = E(X) = Σ[x × P(X=x)] = 60 × (3/4) + 100 × (1/4) = 45 + 25 = 70 watts\n- Step 2: First find E(X²): 60² × (3/4) + 100² × (1/4) = 3600 × 0.75 + 10000 × 0.25 = 2700 + 2500 = 5200\n- Step 3: Variance σ² = E(X²) - [E(X)]² = 5200 - 70² = 5200 - 4900 = 300 watts²\n\nThis gives us the population parameters that we'd normally never know in practice—we'd use samples to estimate them.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A drawer contains 50% 50-cent coins, 25% 20-cent coins, and 25% 10-cent coins. Find the mean and variance of this population of coin values. (3 steps)", "answer": "- Step 1: Population distribution: P(X=50) = 0.5, P(X=20) = 0.25, P(X=10) = 0.25\n- Step 2: Mean μ = Σ[x × P(X=x)] = 50×0.5 + 20×0.25 + 10×0.25 = 25 + 5 + 2.5 = 32.5 cents\n- Step 3: E(X²) = 50²×0.5 + 20²×0.25 + 10²×0.25 = 2500×0.5 + 400×0.25 + 100×0.25 = 1250 + 100 + 25 = 1375\n  Variance σ² = E(X²) - μ² = 1375 - (32.5)² = 1375 - 1056.25 = 318.75 cents²\n\nThis population has moderate variability since there's a decent spread between 10 and 50 cents.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "You have a population of coins (50c with p=0.5, 20c with p=0.25, 10c with p=0.25). If you randomly select 2 coins, list all possible samples and find P(mean = 50). (3 steps)", "answer": "- Step 1: Possible samples of size 2 (order matters for listing):\n  (50,50), (50,20), (20,50), (50,10), (10,50), (20,20), (20,10), (10,20), (10,10)\n- Step 2: The sample mean equals 50 only when both coins are 50-cent coins: (50,50)\n- Step 3: P(mean = 50) = P(50,50) = 0.5 × 0.5 = 0.25\n\nThis is one example of building a sampling distribution—identifying all samples and their probabilities, then finding which satisfy our condition.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why is the sample variance formula S² = Σ(Xᵢ - X̄)²/(n-1) preferred over using n in the denominator when calculating variance from a sample? (2 steps)", "answer": "- Step 1: Using (n-1) in the denominator rather than n makes S² an unbiased estimator of the population variance σ². This means that if you took many samples and calculated S² for each, the average of all those S² values would equal the true population variance.\n- Step 2: If you used n in the denominator, the estimator would be biased (systematically underestimate the population variance). The (n-1) corrects for the fact that we're estimating the population mean (X̄) from the same data, which reduces the degrees of freedom by 1.\n\nThis is a key theoretical property: we use n-1 to get an unbiased estimator.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A company tests every 200th light bulb coming off the assembly line. What type of sampling is this? Why might they use this method rather than random sampling? (2 steps)", "answer": "- Step 1: This is systematic sampling—they select every kth item (in this case, every 200th) from the production line.\n- Step 2: This method is practical when items are produced in a continuous stream and numbered or ordered. It's easier to implement than random sampling in a production setting. However, it assumes the production process is stable; if there's any cyclical pattern in the production (e.g., every 200th bulb comes from the same machine setting), systematic sampling could be biased.\n\nIn the context of the chapter, the sampling units are individual light bulbs, and the sampling frame could be the production line position numbers.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A gym with many members wants to know if members support changing opening hours. They ask a random sample of 30 members instead of all members. Give two advantages and one disadvantage of this approach. (2 steps)", "answer": "- Step 1: Advantages:\n  + Much less time-consuming and expensive than contacting all members\n  + Less data to process and analyze\n  + If the sample is properly random, it can give a good estimate of overall opinion without needing everyone to respond\n  \n- Step 2: Disadvantage:\n  + The sample may not be large enough to represent small subgroups (e.g., members who only use the gym at certain times)\n  + Different random samples could give different results due to natural variation\n\nA suitable sampling frame could be the membership list, and sampling units would be individual members.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In Example 5 of the study material, with counters labelled 0 (p=0.1), 1 (p=0.4), 2 (p=0.5), the probability P(N=0) for the median was calculated as 7/250. Verify this calculation by listing the samples that give median = 0. (3 steps)", "answer": "- Step 1: Median = 0 requires that when the three values are ordered, the middle value is 0. This happens when at least two of the three counters are 0 (since the third can be anything and 0 would still be in the middle).\n- Step 2: The cases are: (0,0,0), (0,0,1), (0,1,0), (1,0,0), (0,0,2), (0,2,0), (2,0,0)\n- Step 3: Probabilities:\n  + (0,0,0): 0.1³ = 0.001\n  + (0,0,1) + (0,1,0) + (1,0,0): 3 × 0.1² × 0.4 = 3 × 0.01 × 0.4 = 0.012\n  + (0,0,2) + (0,2,0) + (2,0,0): 3 × 0.1² × 0.5 = 3 × 0.01 × 0.5 = 0.015\n  + Total = 0.001 + 0.012 + 0.015 = 0.028 = 28/1000 = 7/250 ✓", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "A call centre has 400 operators. The manager times a random sample of 30 operators over one day to work out the mean time per call. Is this mean a statistic? Explain your answer. (2 steps)", "answer": "- Step 1: Yes, this mean IS a statistic. A statistic is defined as a quantity calculated only from observations in a sample, and it does not involve any unknown population parameters.\n- Step 2: The manager calculated the mean from their sample data (30 operators). They did not use any population parameters like the true population mean μ. Even if the manager wanted to compare this to some known standard or claim, the calculation itself uses only sample data, so it is a statistic.\n\nThe sampling units here are individual operators, and a suitable sampling frame would be the list of all 400 operators.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "Explain why, in practice, we can almost never know the exact population parameters (like μ and σ²). What do we do instead? (1 step)", "answer": "In practice, populations are usually too large (or infinite) to measure every single member. Even if we could, it would be time-consuming, expensive, and sometimes impossible (e.g., destructive testing).\n\nInstead, we take a random sample from the population and use observations from the sample to calculate statistics (like sample mean X̄ and sample variance S²). These statistics serve as estimates for the unknown population parameters. This is the fundamental idea of inferential statistics—we use sample information to make inferences about the population.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "The owner of a flower shop asks all 10 florists for their views on flower quality. Is this a census or a sample? Give two reasons why the owner might have chosen this approach. (2 steps)", "answer": "- Step 1: This is a census—asking all 10 florists means the owner is collecting data from the entire population (all florists in the shop).\n- Step 2: Possible reasons:\n  + The population is very small (only 10 people), so it's practical to ask everyone\n  + The small population size makes sampling unnecessary—a census is easy to conduct\n  + The owner wants complete information about all employees rather than an estimate\n  + It's quick and cheap to ask just 10 people\n\nWith such a small population, the advantages of sampling (reduced time and cost) are minimal, while the accuracy benefit of a census is significant.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For a sample of n independent observations X₁, X₂, ..., Xₙ from a normal distribution N(μ, σ²), prove that E(X̄) = μ. (3 steps)", "answer": "- Step 1: The sample mean is X̄ = (X₁ + X₂ + ... + Xₙ)/n\n- Step 2: Using the linearity of expectation:\n  E(X̄) = E[(X₁ + X₂ + ... + Xₙ)/n] = (1/n)[E(X₁) + E(X₂) + ... + E(Xₙ)]\n- Step 3: Since each Xᵢ comes from the same normal distribution with mean μ, E(Xᵢ) = μ for all i. Therefore:\n  E(X̄) = (1/n)[μ + μ + ... + μ] (n times) = (1/n)(nμ) = μ\n\nThis shows that the sample mean is an unbiased estimator of the population mean—the expected value of the sample mean equals the true population mean.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "For n = 3 independent observations from N(μ, σ²), show that Var(X̄) = σ²/3. (3 steps)", "answer": "- Step 1: For n = 3, X̄ = (X₁ + X₂ + X₃)/3\n- Step 2: Since the observations are independent, the variance of their sum is the sum of their variances:\n  Var(X₁ + X₂ + X₃) = Var(X₁) + Var(X₂) + Var(X₃) = σ² + σ² + σ² = 3σ²\n- Step 3: Using the property that Var(aY) = a²Var(Y):\n  Var(X̄) = Var[(X₁ + X₂ + X₃)/3] = (1/3)² × Var(X₁ + X₂ + X₃) = (1/9) × 3σ² = σ²/3\n\nThis confirms that the variability of the sample mean decreases as sample size increases—inversely proportional to n. Larger samples give more precise estimates.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A bag contains counters with value 6 (60% of the time) and 10 (40% of the time). For a sample of 3 counters, list all possible samples and find the sampling distribution for the median N. (3 steps)", "answer": "- Step 1: Let p = P(6) = 0.6, q = P(10) = 0.4. With 3 counters, possible samples (ordered):\n  (6,6,6), (6,6,10), (6,10,6), (10,6,6), (6,10,10), (10,6,10), (10,10,6), (10,10,10)\n- Step 2: Median = 6 when at least two 6s appear: (6,6,6), (6,6,10), (6,10,6), (10,6,6)\n  P(median = 6) = p³ + 3p²q = 0.6³ + 3(0.6)²(0.4) = 0.216 + 3(0.36)(0.4) = 0.216 + 0.432 = 0.648\n- Step 3: Median = 10 when at least two 10s appear: (6,10,10), (10,6,10), (10,10,6), (10,10,10)\n  P(median = 10) = 3pq² + q³ = 3(0.6)(0.4)² + 0.4³ = 3(0.6)(0.16) + 0.064 = 0.288 + 0.064 = 0.352\n\nCheck: 0.648 + 0.352 = 1.0 ✓", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Using the same bag (6 with p=0.6, 10 with p=0.4), find the sampling distribution for the mode M for samples of 3 counters. (2 steps)", "answer": "- Step 1: Mode = 6 when at least two counters are 6. From the 8 possible samples, this includes:\n  (6,6,6), (6,6,10), (6,10,6), (10,6,6)—exactly the same as median = 6!\n  P(mode = 6) = p³ + 3p²q = 0.216 + 0.432 = 0.648\n- Step 2: Mode = 10 when at least two counters are 10:\n  (6,10,10), (10,6,10), (10,10,6), (10,10,10)—same as median = 10\n  P(mode = 10) = 3pq² + q³ = 0.288 + 0.064 = 0.352\n\nInterestingly, for n = 3 with only two possible values, the median and mode distributions are identical! This is because with 3 items, \"at least 2\" means the same for both median and mode.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "A supermarket sells 3-litre and 2-litre milk cartons in the ratio 3:2. If you take a sample of 3 cartons, what is the probability that the sample mean equals 2 litres? (3 steps)", "answer": "- Step 1: P(3-litre) = 3/5 = 0.6, P(2-litre) = 2/5 = 0.4\n- Step 2: The sample mean equals 2 only when all three cartons are 2-litre: (2,2,2)\n- Step 3: P(mean = 2) = (2/5)³ = 8/125 = 0.064\n\nThis is analogous to the light bulb example—getting all the smaller values in your sample gives you the minimum possible mean.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A large box of coins contains 5p, 10p, and 20p coins in the ratio 3:2:1. Find the population mean μ and variance σ². (3 steps)", "answer": "- Step 1: Probabilities: P(5) = 3/6 = 0.5, P(10) = 2/6 = 1/3 ≈ 0.333, P(20) = 1/6 ≈ 0.167\n- Step 2: Mean μ = 5×0.5 + 10×(1/3) + 20×(1/6) = 2.5 + 10/3 + 20/6 = 2.5 + 3.333 + 3.333 = 9.167 pence (approximately)\n- Step 3: E(X²) = 5²×0.5 + 10²×(1/3) + 20²×(1/6) = 25×0.5 + 100/3 + 400/6 = 12.5 + 33.333 + 66.667 = 112.5\n  Variance σ² = 112.5 - (9.167)² ≈ 112.5 - 84.03 = 28.47 (pence)²\n\nThis population is heavily weighted toward 5p coins (50%), with fewer high-value coins.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A doctor's surgery wants to estimate the time needed for health checks on patients over 65. They plan to check a random sample of 20 patients. Identify (a) a suitable sampling frame, (b) the sampling units, and (c) whether the mean time from this sample would be a statistic. (2 steps)", "answer": "- Step 1: (a) A suitable sampling frame could be the patient register/database listing all patients over 65. (b) The sampling units are individual patients over 65.\n- Step 2: (c) Yes, the mean time calculated from the 20 patients is a statistic—it's calculated purely from sample data without involving any unknown population parameters. The true population mean (average time for all patients over 65) would be the parameter, but we're estimating it using a sample statistic.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Explain why we use different notation (Greek letters vs. Roman letters) for population parameters versus sample statistics. Give two examples of each. (1 step)", "answer": "We use Greek letters (μ, σ, σ², ρ) for population parameters because these represent fixed but unknown true values in the population. We use Roman/letters for sample statistics (X̄ for sample mean, S² for sample variance) because these are calculated from sample data and vary from sample to sample.\n\nExamples:\n- Parameters: μ (population mean), σ² (population variance), ρ (population correlation)\n- Statistics: X̄ (sample mean), S² (sample variance), p̂ (sample proportion)\n\nThis notation reminds us whether we're dealing with a known/calculated value from a sample or an unknown true population value.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A sample of 20 tomatoes has weights represented by X₁, X₂, ..., X₂₀. State whether each of the following is a statistic and explain why: (a) (X₁ + X₂₀)/3 (b) ΣX/20 (c) ΣX² + μ (d) (ΣX²/20) - σ² (2 steps)", "answer": "- Step 1: (a) (X₁ + X₂₀)/3 — YES, it's a statistic. Uses only sample values X₁ and X₂₀, no parameters.\n  (b) ΣX/20 — YES, it's a statistic. This is the sample mean, uses only sample data.\n  \n- Step 2: (c) ΣX² + μ — NO, not a statistic. Contains μ, the unknown population mean.\n  (d) (ΣX²/20) - σ² — NO, not a statistic. Contains σ², the unknown population variance.\n\nThe key test: if any Greek letter (representing a parameter) appears, it's not a statistic.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "A company tests a sample of 5 switches and gets lifetimes: 23150, 25071, 19480, 22921, 7455 cycles. The company claims switches last an average of 20000 cycles. What can you comment on this claim? (3 steps)", "answer": "- Step 1: Calculate the sample mean: (23150 + 25071 + 19480 + 22921 + 7455) / 5 = 98077 / 5 = 19615.4 cycles\n- Step 2: The sample mean is very close to 20000 (about 2% lower). However, look at the sample values—one switch (7455) failed dramatically early, less than half the claimed average!\n- Step 3: With only 5 switches, we cannot be confident about the true population mean. The extreme value (7455) might be an outlier or indicate quality control issues. A larger sample would be needed to make a reliable claim. The presence of one very low lifetime suggests either the claim is optimistic or there's significant variability the company should investigate.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Why might a sampling frame not be exactly the same as the population? Give an example. (1 step)", "answer": "A sampling frame is a practical list used to select units, but it may not include everyone in the population. This creates a mismatch.\n\nExample: If you're studying \"all residents in a city,\" your sampling frame might be the electoral register. However, not everyone registers to vote (some ineligible, some choose not to), so the register is incomplete. Similarly, a company's customer database might be outdated (people who moved away still on the list) or exclude non-customers.\n\nThis discrepancy between the sampling frame and actual population can lead to sampling bias if not accounted for.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What is the relationship between sample size and accuracy of estimates? Explain why simply taking the largest possible sample isn't always the best strategy. (2 steps)", "answer": "- Step 1: Generally, larger samples produce more accurate estimates because they better capture the true population characteristics and have smaller sampling variability. However, accuracy improves with the square root of sample size—at some point, doubling the sample doesn't double the accuracy.\n- Step 2: Taking the largest possible sample isn't always best because of diminishing returns and resource constraints:\n  + Larger samples cost more (more time, money, effort)\n  + There's a trade-off: beyond a certain size, the small gain in accuracy doesn't justify the additional cost\n  + If the population is relatively uniform, a smaller sample suffices\n  + Practical considerations: sometimes you can't test more items (e.g., limited resources, time pressure)\n\nThe goal is an optimal sample size that balances accuracy needs with available resources.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the context of the study material, explain why understanding sampling distributions is essential for carrying out hypothesis tests. (2 steps)", "answer": "- Step 1: Hypothesis testing involves making claims about population parameters (like μ or p). We don't know these parameters, so we take a sample and calculate a statistic.\n- Step 2: To determine whether our observed sample result is unusual or likely occurred by chance, we need to know what the sampling distribution of that statistic would look like if a certain hypothesis were true. This tells us how probable our observed result would be under that hypothesis.\n\nFor example, if we're testing whether a coin is fair, we need to know the sampling distribution of the number of heads to determine if our observed number of heads is unusually high or low. Without the sampling distribution, we can't make probabilistic statements about our data.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A company manufactures three sizes of toasters selling for $16 (40%), $20 (50%), $30 (10%). Find the population mean and variance. (3 steps)", "answer": "- Step 1: Distribution: P(16) = 0.4, P(20) = 0.5, P(30) = 0.1\n- Step 2: Mean μ = 16×0.4 + 20×0.5 + 30×0.1 = 6.4 + 10 + 3 = $19.40\n- Step 3: E(X²) = 16²×0.4 + 20²×0.5 + 30²×0.1 = 256×0.4 + 400×0.5 + 900×0.1 = 102.4 + 200 + 90 = 392.4\n  Variance σ² = 392.4 - (19.4)² = 392.4 - 376.36 = 16.04 (dollars)²\n\nThis population is centered around $19-20, with most mass at $16 and $20, and a small tail at $30.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "If you randomly select 2 toasters from the manufacturer in Q38, what is P(sample mean = $16)? List all samples that give this result. (3 steps)", "answer": "- Step 1: Mean = $16 only when both toasters cost $16, i.e., the sample (16, 16).\n- Step 2: Probability = P(16) × P(16) = 0.4 × 0.4 = 0.16\n- Step 3: The only sample giving mean = $16 is (16, 16), representing both toasters being the $16 model. Any sample with at least one $20 or $30 toaster will have a higher mean.\n\nThis is the smallest possible sample mean since $16 is the minimum price.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A receptionist makes spelling mistakes at a rate of 5 per 10 pages. For a 6-page document, (a) what is a suitable sampling distribution for the number of mistakes, and (b) find P(fewer than 2 mistakes). (3 steps)", "answer": "- Step 1: The rate is 5 mistakes per 10 pages, so for 6 pages the expected number is (5/10) × 6 = 3 mistakes. This is a binomial situation: each page has a constant probability of errors, with n = 6 trials.\n- Step 2: Probability of a mistake per page = 5/10 = 0.5. So X ~ B(6, 0.5)\n- Step 3: P(X < 2) = P(X = 0) + P(X = 1)\n  = (0.5)⁶ + 6(0.5)⁵(0.5) = (1/64) + 6/64 = 7/64 ≈ 0.109\n\nSo there's about an 11% chance of having fewer than 2 mistakes in a 6-page document.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does \"population\" mean in statistics, and what is \"raw data\"?", "answer": "A population is the whole set of items that are of interest in an investigation — every plum in a delivery, every patient over 65 at a doctor's surgery, every light bulb produced by a factory. The information directly obtained from the population (measurements or observations of its members) is called **raw data**. The population is defined by the question being asked: change the question, change the population.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What does it mean to take a census, and how does it differ from a sample?", "answer": "A census **observes or measures every single member** of the population — a complete enumeration with no one left out. A sample, by contrast, measures only a subset. So if a call centre has 400 operators and you time all 400, that's a census; timing only 30 of them is a sample. The defining property of a census is \"no member excluded,\" not just \"a lot of data.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Define a sample, and explain its purpose.", "answer": "A sample is a selection of observations taken from a subset of the population. Its purpose is to **infer information about the whole population** without measuring every member. Because the sample only contains a fraction of the population, it carries inherent uncertainty (sampling error), but the trade-off in cost and time is usually worth it.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What is the chief advantage of a census, and why? (2 steps)", "answer": "- Step 1: Because every member of the population is included, there is **no sampling error** — you've literally observed the population.\n- Step 2: So in principle, a census gives a **completely accurate result**: any quantity you compute from a census equals the population truth by construction (no need to \"estimate\"; you have it).\n\nThis is the main — really the only — substantial advantage.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What are the main disadvantages of conducting a census? (3 steps)", "answer": "- Step 1: **Time-consuming and expensive** — measuring every item in a large population demands huge resources.\n- Step 2: **Not usable when testing destroys the item** — e.g. testing the breaking load of climbing ropes destroys them; a census would leave nothing to sell.\n- Step 3: Even if you collect the data, **processing the volume** is hard and error-prone.\n\nSo a census is impractical for large populations and impossible for destructive tests.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What are the main advantages of using a sample over a census? (3 steps)", "answer": "- Step 1: **Cheaper and faster** — fewer items to measure, so less time and money required.\n- Step 2: **Fewer respondents needed** — easier to organise and complete.\n- Step 3: **Less data to process** — analysis is more tractable.\n\nThese advantages are why sampling is the default in real-world investigations, even though it sacrifices some accuracy.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "What are the main disadvantages of using a sample? (2 steps)", "answer": "- Step 1: **Data may be less accurate** — the sample mean isn't usually exactly the population mean (sampling error is unavoidable).\n- Step 2: **Small subgroups can be missed** — if only 2% of the population is left-handed, a sample of 30 might contain none, so you learn nothing about that subgroup.\n\nSo accuracy and coverage of minorities both suffer, even though the trade-off in cost usually favours sampling.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why is a census almost never appropriate when testing a manufactured product like climbing ropes or light bulbs?", "answer": "Because the test is **destructive** — loading a rope until it snaps, burning a bulb until it fails, or operating a switch until it breaks. A census would destroy the entire output, leaving nothing to sell. Sampling sacrifices only a few units to estimate the reliability of the whole batch, which is the only commercially viable approach.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What three factors should influence how large a sample you take? (3 steps)", "answer": "- Step 1: **Required accuracy** — more accuracy demands a larger sample (sampling error shrinks as $$n$$ grows).\n- Step 2: **Available resources** — time, money, manpower; bigger samples cost more.\n- Step 3: **Variability of the population** — a uniform population can be characterised with few observations, but a highly varied population needs a bigger sample to pick up the variation.\n\nSo sample size is a trade-off, not a fixed rule.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why do different random samples from the same population often lead to different conclusions?", "answer": "Because of the **natural variation** present in any real population. Two random samples will pick up different individual members, yielding slightly different means, modes, etc. This is **sampling variability** — and it is exactly the reason sampling distributions of statistics exist as objects of study. It's not a flaw of the sampling process; it's an inherent feature.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Define a sampling unit and give an example.", "answer": "A sampling unit is an **individual member of the population** — the basic \"thing\" being sampled. For a survey of school students, each student is a sampling unit; for a quality test on a delivery of plums, each plum is a sampling unit; for a study of call durations, each call (or each operator, depending on the question) is the sampling unit.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Define a sampling frame.", "answer": "A sampling frame is a **list of sampling units**, typically labelled or numbered, that is used in practice to represent the population. For instance, a school's list of student IDs is a sampling frame for the student population; the electoral roll is a sampling frame for adult voters in a town. Random samples are drawn from the frame, not directly from the unobservable population.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why might a sampling frame fail to match the population it's meant to represent? (3 steps)", "answer": "- Step 1: The frame may be **incomplete** — some members of the population are simply missing from the list.\n- Step 2: The frame may be **out of date** — people have left or joined since the list was compiled.\n- Step 3: Some population members may be **unreachable or unlistable** (e.g., the homeless on an electoral roll).\n\nThis mismatch is a hidden source of bias: a sample drawn carefully and randomly from a flawed frame still inherits the frame's gaps.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Is the claim \"a larger sample is always more accurate\" actually true? (3 steps)", "answer": "- Step 1: **Generally yes** — sampling error shrinks as $$n$$ grows; the sample mean's standard deviation falls like $$\\sigma/\\sqrt{n}$$.\n- Step 2: **But only for unbiased samples** — a large but biased sample is worse than a small unbiased one. Size doesn't fix bias.\n- Step 3: **Diminishing returns**: doubling $$n$$ improves precision only by $$\\sqrt{2}$$, not 2. Beyond a point, extra accuracy isn't worth the extra cost.\n\nSo \"bigger is generally better\" is a useful slogan, but unbiasedness and efficient design matter just as much as sheer size.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "A supermarket tests only 5 plums and reports \"80% of the delivery is ripe.\" Why is this estimate weak, and how can it be improved?", "answer": "With only 5 plums, the proportion can swing by 20% (one plum) at a time — the estimate has huge variability and could easily be very different on a re-test. A larger sample (say 30 plums) averages out random variation, giving a much more reliable estimate of the true proportion. The principle: when the underlying quantity is a proportion, the precision of the estimate scales like $$1/\\sqrt{n}$$, so small $$n$$ means little reliability.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Define a population parameter, and give classic examples.", "answer": "A population parameter is **any measurable characteristic of the population** — a numerical property of the whole population. Classic examples are the population mean $$\\mu$$, the population variance $$\\sigma^2$$, and the population proportion $$p$$. We almost never know parameters exactly, because we usually can't observe the whole population — so we estimate them.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why are Greek letters used for population parameters and Roman letters for sample statistics?", "answer": "It's a notational convention to **visually separate \"the truth we don't know\" from \"the estimate we computed.\"** Greek letters ($$\\mu$$, $$\\sigma$$, $$p$$, $$\\lambda$$) refer to fixed but unknown population quantities — what we're trying to learn. Roman letters ($$\\bar{X}$$, $$S$$, $$\\hat{p}$$) refer to quantities computed from observed data — random variables whose values we know once the sample is drawn. The convention prevents confusion in formulas.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Define a statistic.", "answer": "A statistic is a **quantity calculated only from the observations in a sample**, with no unknown population parameter appearing in the formula. It is therefore a numerical property of the sample, and crucially, **always computable from the data**. The whole machinery of inference — estimators, hypothesis tests, confidence intervals — rests on quantities that can actually be evaluated, i.e. statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why does the appearance of a population parameter (like $$\\mu$$ or $$\\sigma$$) disqualify an expression from being a statistic?", "answer": "Because the defining requirement of a statistic is that it can be **computed from the sample alone**. If the formula contains $$\\mu$$ — which is unknown — you cannot evaluate it from the data; the value is unobservable. So even though $$\\sum (X_i - \\mu)^2/(n-1)$$ resembles the sample variance, it is **not a statistic** because $$\\mu$$ does not appear in the sample. The replacement formula $$\\sum (X_i - \\bar{X})^2/(n-1)$$ uses $$\\bar{X}$$ (computable from data), so it *is* a statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Decide which of these are statistics for a sample $$X_1, \\ldots, X_n$$ from a population with unknown mean $$\\mu$$, and explain: (i) $$\\frac{X_2 + X_5 + X_8}{3}$$, (ii) $$\\frac{\\sum X^2}{n} - \\left(\\frac{\\sum X}{n}\\right)^2$$, (iii) $$\\frac{\\sum X}{n} - \\mu^2$$. (3 steps)", "answer": "- Step 1: **(i) is a statistic** — it's just an average of three observations; no parameter appears.\n- Step 2: **(ii) is a statistic** — both terms are functions of the sample (this is, in fact, the biased sample variance formula). No $$\\mu$$ or $$\\sigma$$ inside.\n- Step 3: **(iii) is not a statistic** — it contains $$\\mu^2$$, the unknown population mean squared, which can't be computed from the data alone.\n\nThe diagnostic test: scan for any Greek letter representing a population quantity; if present, it's not a statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Is the sample mean $$\\bar{X} = \\sum X_i / n$$ a statistic, and what is it commonly used for?", "answer": "Yes. It depends only on the observed values; no unknown parameter appears. So $$\\bar{X}$$ is a statistic, and it's the standard estimator of the population mean $$\\mu$$. The fact that we use $$\\bar{X}$$ to estimate $$\\mu$$ doesn't change its nature — every estimator is a statistic; that's the whole point.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Is the sample variance $$S^2 = \\sum (X_i - \\bar{X})^2 / (n-1)$$ a statistic? Why?", "answer": "Yes. Although the formula looks complex, it is built only from the observations $$X_i$$ and the sample mean $$\\bar{X}$$, both of which are computable from the data. No population parameter ($$\\mu$$, $$\\sigma$$) appears. So $$S^2$$ is a statistic, and it estimates the population variance $$\\sigma^2$$. The $$(n-1)$$ divisor (instead of $$n$$) is what makes $$S^2$$ unbiased.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Define the sampling distribution of a statistic.", "answer": "It is the **probability distribution of the statistic itself** — listing every value the statistic can take, with the probability of each. Imagine repeating the entire sampling process many times: each repetition gives a fresh sample and a recomputed statistic, and the long-run frequencies of those values form the sampling distribution. It tells us how the statistic varies just because of the randomness of which sample we draw.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "Why does a statistic — a single number computed from one sample — have a \"distribution\"? (3 steps)", "answer": "- Step 1: For any one specific sample, the statistic is just a number with no randomness left.\n- Step 2: But **before** the sample is drawn, the value of the statistic is uncertain — different possible samples give different values.\n- Step 3: Treating \"the sample we will get\" as random, the statistic is itself a **random variable**, and like any random variable it has a probability distribution.\n\nSo the distribution describes \"what value would this statistic take, in the abstract, before we collect data?\"", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "A school asks 15 randomly chosen students whether they support a uniform; let $$Y$$ = number who support. Why is $$Y \\sim \\text{Bin}(15, p)$$? (4 steps)", "answer": "- Step 1: Each student's response is binary — support (1) or not (0). That's a Bernoulli trial.\n- Step 2: Sampling is random and the population is large, so the 15 responses can be treated as **independent**.\n- Step 3: The probability $$p$$ that a randomly chosen student supports the uniform is **constant** for every student (the population proportion).\n- Step 4: $$Y$$ is the **sum of 15 i.i.d. Bernoulli$$(p)$$** variables, which by definition has a $$\\text{Bin}(15, p)$$ distribution.\n\nSo the sampling distribution of \"number of supporters\" inherits a binomial form from the sampling setup.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "A bulb manufacturer sells 60 W and 100 W bulbs in ratio 3:1. Find the population mean $$\\mu$$.", "answer": "Use $$\\mu = \\sum x \\, P(X=x)$$. The probabilities are $$P(60) = 3/4$$ and $$P(100) = 1/4$$, so $$\\mu = 60 \\times \\tfrac{3}{4} + 100 \\times \\tfrac{1}{4} = 45 + 25 = 70$$ W. Notice $$\\mu$$ is closer to 60 than to 100 — the mean is pulled toward the more probable value, since the 60 W bulbs have three times the weight.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "For the same population (60 W with prob 3/4, 100 W with prob 1/4), find the population variance $$\\sigma^2$$. (3 steps)", "answer": "- Step 1: Use $$\\sigma^2 = E(X^2) - \\mu^2$$. We already have $$\\mu = 70$$.\n- Step 2: $$E(X^2) = 60^2 \\times \\tfrac{3}{4} + 100^2 \\times \\tfrac{1}{4} = 2700 + 2500 = 5200$$.\n- Step 3: $$\\sigma^2 = 5200 - 4900 = 300$$ W$$^2$$.\n\nThe variance is large (in W$$^2$$) because the two values are 40 W apart and the distribution is concentrated at neither — there's substantial gap between the possible outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "When listing all possible samples of size $$n$$, why must $$(60, 100, 60)$$ and $$(100, 60, 60)$$ be listed as two distinct samples?", "answer": "Because the sample is an **ordered tuple** of independent draws $$X_1, X_2, \\ldots, X_n$$ — each draw is its own random variable. Two different orderings are two different events of the random sampling process, even if they contain the same multiset of values. Treating them as one would undercount the probability of \"two 60s and one 100.\" The probabilities of all distinct orderings (each equal here) must be summed to get the total.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "For independent draws from {60 (prob 3/4), 100 (prob 1/4)}, what is $$P(\\text{sample} = (60, 60, 60))$$?", "answer": "Since each draw is independent, multiply the individual probabilities: $$P = (3/4)^3 = 27/64$$. This is also $$P(\\bar{X} = 60)$$, since all three values being 60 forces the mean to 60. It's the most likely single outcome because 60 is the more probable individual value.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "For samples of size 3 from {60 (3/4), 100 (1/4)}, why are there exactly 3 ordered samples whose mean equals $$73\\tfrac{1}{3}$$?", "answer": "Mean $$= 73\\tfrac{1}{3}$$ means the sample contains exactly two 60's and one 100 (since $$(60+60+100)/3 = 73\\tfrac{1}{3}$$). The single 100 can occur in position 1, 2, or 3 — giving three orderings: $$(100,60,60)$$, $$(60,100,60)$$, $$(60,60,100)$$. Each has probability $$(3/4)^2(1/4)$$, so total $$P(\\bar{X} = 73\\tfrac{1}{3}) = 3 \\times (9/16)(1/4) = 27/64$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "In the bulb sampling distribution of $$\\bar{X}$$ (size 3 from {60 (¾), 100 (¼)}), why does the probability decrease as the mean rises from 60 toward 100? (3 steps)", "answer": "- Step 1: Higher means require **more 100's** in the sample.\n- Step 2: Each 100 in the sample contributes a factor of $$1/4$$ instead of $$3/4$$ — making outcomes with more 100's **multiplicatively rarer**.\n- Step 3: So $$P(\\bar{X} = 60) = 27/64$$ but $$P(\\bar{X} = 100) = 1/64$$ — a 27-fold drop, mirroring the 3:1 population ratio cubed.\n\nThe sampling distribution of the mean inherits and amplifies the skew of the population.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "For samples of size 3 from {60 (¾), 100 (¼)}, why can the mode $$M$$ only take the values 60 or 100?", "answer": "The mode is the most frequent value in the sample. Since the population only contains the values 60 and 100, every observation is one of these — so the mode must be 60 or 100. With $$n = 3$$ (odd), one value must appear at least twice, so there's always a clear mode. The mode collapses information: it ignores ties and intermediate values that the mean would capture.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "For samples of size 3 from {60 (¾), 100 (¼)}, find $$P(M = 100)$$. (3 steps)", "answer": "- Step 1: $$M = 100$$ requires at least **two 100's** in the sample.\n- Step 2: That covers two cases:\n+ exactly two 100's and one 60 — three orderings, each with probability $$(1/4)^2 \\times (3/4) = 3/64$$.\n+ all three 100's — one ordering, probability $$(1/4)^3 = 1/64$$.\n- Step 3: Total $$P(M=100) = 3 \\times 3/64 + 1/64 = 10/64 = 5/32$$.\n\nThe mode strongly favours the more common value: $$P(M=60) = 27/32$$, far higher than $$5/32$$.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why is the sampling distribution of the mode generally simpler (fewer possible values) than the sampling distribution of the mean?", "answer": "Because the mode can only take values that **already appear in the population** — it inherits the support of the parent distribution. The mean, on the other hand, can take any **average** of the possible values, producing many more distinct outcomes. With population $$\\{60, 100\\}$$ and sample size 3, the mean has 4 possible values $$\\{60, 73\\tfrac{1}{3}, 86\\tfrac{2}{3}, 100\\}$$ but the mode has only 2 $$\\{60, 100\\}$$. The mode coarse-grains the sample; the mean preserves more granular information.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A bag has counters with values 0 (10%), 1 (40%), 2 (50%). For a sample of size 3, what values can the median $$N$$ take, and why?", "answer": "The median of three sorted values is the middle one. Since the underlying values are only 0, 1, or 2, the median itself must be one of these: $$N \\in \\{0, 1, 2\\}$$. Specifically, $$N = 0$$ requires at least two 0's in the sample, $$N = 2$$ requires at least two 2's, and $$N = 1$$ covers everything in between. The median, like the mode, cannot \"interpolate\" — it can only return values that physically appeared.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "For a sample of size 3 with possible values 0, 1, 2, what conditions on the three observations give a median of 1? (3 steps)", "answer": "- Step 1: All three are 1 — trivially median 1.\n- Step 2: Two are 1 and the third is 0 or 2 — the middle of $$\\{0,1,1\\}$$ or $$\\{1,1,2\\}$$ is 1.\n- Step 3: One is 1 and the other two straddle it (one 0, one 2) — the sorted sample $$(0,1,2)$$ has median 1.\n\nIn every case, the sample contains at least one observation $$\\le 1$$ and at least one $$\\ge 1$$, with 1 itself sitting in the middle. Concrete examples: $$(0,1,2)$$, $$(1,1,2)$$, $$(0,1,1)$$, $$(1,1,1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "What's the general strategy to compute the sampling distribution of the median (or mode, or any statistic) for a small sample? (4 steps)", "answer": "- Step 1: List all possible **ordered** samples (or unordered, weighted by their multiplicities).\n- Step 2: For each, compute the value of the statistic.\n- Step 3: **Group samples by statistic value**, summing their probabilities.\n- Step 4: Verify the total probability is 1 — a built-in sanity check.\n\nFor independent draws, the probability of any ordered sample is the product of individual draw probabilities, which makes step 1 mechanical.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "What is the sample mean $$\\bar{X}$$ as a random variable?", "answer": "$$\\bar{X} = (X_1 + X_2 + \\cdots + X_n)/n$$, the arithmetic average of the sample observations. The crucial point is that **before the sample is drawn**, $$\\bar{X}$$ is itself a random variable: its value depends on which sample turns out to be drawn. Different samples give different $$\\bar{X}$$'s, and the probability distribution of $$\\bar{X}$$ is its **sampling distribution** — an object of central importance in inference.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Show that $$E(\\bar{X}) = \\mu$$ for a sample of $$n$$ independent observations from a population with mean $$\\mu$$. (4 steps)", "answer": "- Step 1: Write $$\\bar{X} = \\frac{X_1 + X_2 + \\cdots + X_n}{n}$$.\n- Step 2: Apply linearity of expectation: $$E(\\bar{X}) = \\frac{1}{n}\\bigl[E(X_1) + E(X_2) + \\cdots + E(X_n)\\bigr]$$.\n- Step 3: Each $$X_i$$ is drawn from the population with mean $$\\mu$$, so $$E(X_i) = \\mu$$ for every $$i$$. The sum equals $$n\\mu$$.\n- Step 4: $$E(\\bar{X}) = \\frac{1}{n}(n\\mu) = \\mu$$.\n\n**Conclusion:** $$\\bar{X}$$ is an **unbiased estimator** of $$\\mu$$ — on average, it lands exactly on the population mean.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "For $$n=3$$ independent observations from a population with variance $$\\sigma^2$$, show that $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/3$$. (4 steps)", "answer": "- Step 1: Write $$\\bar{X} = (X_1 + X_2 + X_3)/3$$.\n- Step 2: Use $$\\operatorname{Var}(aY) = a^2 \\operatorname{Var}(Y)$$: $$\\operatorname{Var}(\\bar{X}) = \\frac{1}{9}\\operatorname{Var}(X_1 + X_2 + X_3)$$.\n- Step 3: For **independent** variables, the variance of a sum is the sum of variances. Each $$\\operatorname{Var}(X_i) = \\sigma^2$$, so $$\\operatorname{Var}(X_1 + X_2 + X_3) = 3\\sigma^2$$.\n- Step 4: $$\\operatorname{Var}(\\bar{X}) = \\frac{1}{9}(3\\sigma^2) = \\frac{\\sigma^2}{3}$$.\n\nThe same logic with general $$n$$ gives $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "What does the formula $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$ tell us intuitively about why bigger samples are better? (4 steps)", "answer": "- Step 1: $$\\sigma^2$$ is the variance of one observation — fixed by the population, beyond our control.\n- Step 2: Dividing by $$n$$ means that as the sample size grows, the **variance of the sample mean shrinks proportionally**.\n- Step 3: The standard deviation $$\\sigma/\\sqrt{n}$$ shrinks as $$1/\\sqrt{n}$$: doubling $$n$$ reduces sd by $$\\sqrt{2}$$; quadrupling $$n$$ halves it.\n- Step 4: So bigger samples produce more **concentrated, more reliable** estimates of $$\\mu$$ — but with **diminishing returns** (need 100× the data for 10× more precision in sd).\n\nThis is the precise mathematical statement of \"sample mean stabilises as sample size grows.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Why is the assumption of independence essential when deriving $$\\operatorname{Var}(\\bar{X}) = \\sigma^2/n$$?", "answer": "Because the "Why does using a sample sometimes beat conducting a \"perfect\" census in real-world investigations? (4 steps)", "answer": "- Step 1: A census of a large dynamic population is so **slow** that the population may shift before it's complete (people leave, new items are produced).\n- Step 2: A census is often **prohibitively expensive** — the cost may not be feasible at all.\n- Step 3: A well-designed sample, completed quickly, captures a **fresher snapshot** with only modest sampling error.\n- Step 4: So in many practical contexts, **\"fast and approximately right\" beats \"slow and stale-but-precise.\"**\n\nIn short: sampling isn't always second-best to a census — sometimes it's actually more accurate in the timeframe that matters.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "A factory makes safety ropes for 3000 climbers. Why is a census not appropriate, and how would you comment on a \"safe up to 250 kg\" claim from a sample of $$\\{320, 260, 240, 180\\}$$ kg? (3 steps)", "answer": "- Step 1: **No census** because testing a rope to its breaking point destroys it; testing all 3000 leaves nothing to deliver.\n- Step 2: **The claim is dubious**: the smallest break load in the sample is 180 kg — well below 250 kg. So at least one rope failed before reaching the claimed safe load.\n- Step 3: Improvement: test a **larger sample** to better estimate the proportion of ropes that fail below 250 kg, and reconsider the claim if even a small proportion are weaker.\n\nThe sample evidence directly contradicts the claim, even with only 4 ropes.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "What's the conceptual difference between the *population distribution* of $$X$$ and the *sampling distribution* of $$\\bar{X}$$? (3 steps)", "answer": "- Step 1: The **population distribution** of $$X$$ describes the spread of values in the population itself — what a single random observation looks like.\n- Step 2: The **sa const SK='s2_ch06';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
