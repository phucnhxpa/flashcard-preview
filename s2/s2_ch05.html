 k for a ≤ x ≤ b. How do you find the value of k? (2 steps)", "answer": "- Step 1: Use the normalization condition: the total area under the pdf must equal 1.\n- Step 2: Area = k × (b - a) = 1, so k = 1/(b - a). This is why the pdf equals 1/(b-a).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the notation for a random variable X that follows a continuous uniform distribution on the interval [a, b]? (1 step)", "answer": "X ~ U[a, b]\n\nThe tilde (~) means \"is distributed as,\" and U stands for uniform.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Derive E(X) for X ~ U[a, b] from first principles. (3 steps)", "answer": "- Step 1: By definition, E(X) = ∫[a to b] x f(x) dx = ∫[a to b] x × (1/(b-a)) dx\n- Step 2: = (1/(b-a)) × [x²/2] evaluated from a to b = (1/(b-a)) × (b² - a²)/2\n- Step 3: Since b² - a² = (b-a)(b+a), this simplifies to (b+a)/2 = (a+b)/2\n\nThe mean is simply the midpoint of the interval — intuitive since all values are equally likely!", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is E(X) for X ~ U[a, b]? (1 step)", "answer": "E(X) = (a + b) / 2\n\nThis is the midpoint of the interval [a, b]. Since every value is equally likely, the expected value is the center of the interval.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Derive Var(X) for X ~ U[a, b] from first principles. (4 steps)", "answer": "- Step 1: Var(X) = ∫(x - μ)² f(x) dx from a to b, where μ = (a+b)/2\n- Step 2: = ∫[a to b] (x - (a+b)/2)² × (1/(b-a)) dx\n- Step 3: Using the integration formula ∫(x+c)ⁿ dx = (x+c)^(n+1)/(n+1), this becomes [(x - (a+b)/2)³ / (3(b-a))] evaluated from a to b\n- Step 4: = [(b - (a+b)/2)³ - (a - (a+b)/2)³] / [3(b-a)] = [(b-a)/2]³ × 2 / [3(b-a)] = (b-a)²/12\n\nThe variance depends only on the width of the interval, not on where it's centered.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What is Var(X) for X ~ U[a, b]? (1 step)", "answer": "Var(X) = (b - a)² / 12\n\nThe variance increases with the square of the interval width — a wider interval means more spread.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Find E(X) and Var(X) for X ~ U[4, 7]. (2 steps)", "answer": "- Step 1: E(X) = (4 + 7)/2 = 5.5\n- Step 2: Var(X) = (7 - 4)²/12 = 3²/12 = 9/12 = 3/4 = 0.75", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is the cumulative distribution function (CDF) F(x) for X ~ U[a, b]? (3 steps)", "answer": "- Step 1: For x < a, no probability has accumulated, so F(x) = 0\n- Step 2: For a ≤ x ≤ b, F(x) = ∫[a to x] (1/(b-a)) dt = [t/(b-a)] from a to x = (x-a)/(b-a)\n- Step 3: For x > b, all probability is accumulated, so F(x) = 1\n\nSo:\n$$\nF(x) = \\begin{cases} 0 & x < a \\\\ \\frac{x-a}{b-a} & a \\leq x \\leq b \\\\ 1 & x > b \\end{cases}\n$$", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Write down the CDF for X ~ U[4, 7] for all x. (1 step)", "answer": "$$\nF(x) = \\begin{cases} 0 & x < 4 \\\\ \\frac{x-4}{3} & 4 \\leq x \\leq 7 \\\\ 1 & x > 7 \\end{cases}\n$$", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "If F(x) = (x+3)/7 for -3 ≤ x ≤ 4, what is the pdf? What type of distribution is this? (2 steps)", "answer": "- Step 1: The pdf is the derivative of the CDF: f(x) = dF/dx = 1/7 for -3 ≤ x ≤ 4\n- Step 2: This is a continuous uniform distribution U[-3, 4], with height = 1/(4-(-3)) = 1/7", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is the CDF for continuous uniform distribution linear between a and b? (1 step)", "answer": "Because the pdf is constant (equal to 1/(b-a)) between a and b. Integrating a constant function produces a linear function — geometrically, as x increases, we're accumulating a constant \"rate\" of probability, creating a straight line from 0 to 1.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "If X ~ U[a, b], what is the distribution of Y = cX + d, where c and d are constants? (2 steps)", "answer": "- Step 1: A linear transformation of a uniform distribution is also uniform.\n- Step 2: Y ~ U[ca + d, cb + d]. The new interval is the old interval scaled by c and shifted by d.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "If X ~ U[2, 8], what is the distribution of Y = 2X + 5? (1 step)", "answer": "Y ~ U[2(2) + 5, 2(8) + 5] = U[9, 21]", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "For X ~ U[2, 8], find P(12 < Y < 20) where Y = 2X + 5. (2 steps)", "answer": "- Step 1: Transform the inequality: 12 < 2X + 5 < 20 means 7 < 2X < 15, so 3.5 < X < 7.5\n- Step 2: P(3.5 < X < 7.5) = (7.5 - 3.5)/(8 - 2) = 4/6 = 2/3\n\nAlternatively: Since Y is uniform on [9, 21], P(12 < Y < 20) = (20 - 12)/(21 - 9) = 8/12 = 2/3", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "If Y = 12 - 3X and X ~ U[3, 8], what is the distribution of Y? (2 steps)", "answer": "- Step 1: When X = 3, Y = 12 - 3(3) = 3. When X = 8, Y = 12 - 3(8) = -12\n- Step 2: Since Y is a linear transformation of X, Y ~ U[-12, 3]", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "For X ~ U[3, 8], find E(Y) where Y = 12 - 3X. (2 steps)", "answer": "- Step 1: Use the linear property of expectation: E(aX + b) = aE(X) + b\n- Step 2: E(Y) = E(12 - 3X) = 12 - 3E(X) = 12 - 3 × ((3+8)/2) = 12 - 3 × 5.5 = 12 - 16.5 = -4.5", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "For X ~ U[3, 8], find P(Y > 0) where Y = 12 - 3X. (2 steps)", "answer": "- Step 1: Y > 0 means 12 - 3X > 0, so X < 4\n- Step 2: P(X < 4) = (4 - 3)/(8 - 3) = 1/5 = 0.2", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What is the key insight when solving conditional probability problems with continuous uniform distributions? (2 steps)", "answer": "- Step 1: Given that X > c (where c is within [a, b]), the value of X is uniformly distributed on the restricted interval [c, b].\n- Step 2: This means P(A | X > c) can be calculated by considering only the reduced sample space — you find the probability on the sub-interval and divide by the length of the sub-interval.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For X ~ U[2, 4] with pdf as shown (height 0.4), find P(X > 3 | X > 2). (3 steps)", "answer": "- Step 1: P(X > 3 | X > 2) = P(X > 3)/P(X > 2) using conditional probability formula\n- Step 2: P(X > 3) = 0.4 × (4 - 3) = 0.4; P(X > 2) = 0.4 × (4 - 2) = 0.8\n- Step 3: = 0.4/0.8 = 1/2 = 0.5\n\nAlternatively: Given X > 2, X is uniform on [2, 4], so P(X > 3 | X > 2) = (4 - 3)/(4 - 2) = 1/2", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "For X ~ U[3, 8], find P(X < 7 | Y < 0) where Y = 12 - 3X. (3 steps)", "answer": "- Step 1: Y < 0 means 12 - 3X < 0, so X > 4\n- Step 2: We need P(X < 7 | X > 4) = P(4 < X < 7)/P(X > 4)\n- Step 3: P(4 < X < 7) = (7-4)/(8-3) = 3/5 = 0.6; P(X > 4) = (8-4)/(8-3) = 4/5 = 0.8; So probability = 0.6/0.8 = 3/4", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Given Y ~ U[a, b] with E(Y) = 1 and Var(Y) = 16/3, find a and b. (4 steps)", "answer": "- Step 1: From E(Y) = (a+b)/2 = 1, so a + b = 2\n- Step 2: From Var(Y) = (b-a)²/12 = 16/3, so (b-a)² = 64, giving b - a = ±8\n- Step 3: Since a < b, b - a = 8. Solving a + b = 2 and b - a = 8 simultaneously: adding gives 2b = 10, so b = 5\n- Step 4: Then a = 2 - b = 2 - 5 = -3", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Given R ~ U[α, β] with E(R) = 5 and Var(R) = 4/3, find α and β. (2 steps)", "answer": "- Step 1: E(R) = (α+β)/2 = 5, so α + β = 10. Var(R) = (β-α)²/12 = 4/3, so (β-α)² = 16, giving β - α = 4\n- Step 2: Solving: α + β = 10 and β - α = 4 gives β = 7, α = 3", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A continuous random variable X has pdf f(x) = 1/6 for -1 ≤ x ≤ 5. Given that Y = 4X - 6, find E(Y) and Var(Y). (2 steps)", "answer": "- Step 1: X ~ U[-1, 5], so E(X) = ( -1 + 5)/2 = 2, Var(X) = (5 - (-1))²/12 = 6²/12 = 3\n- Step 2: E(Y) = 4E(X) - 6 = 4(2) - 6 = 2; Var(Y) = 4² Var(X) = 16 × 3 = 48", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A continuous random variable Y has pdf f(y) = 1/8 for -2 ≤ y ≤ 6. Find E(Y) and Var(Y). (2 steps)", "answer": "- Step 1: E(Y) = ( -2 + 6)/2 = 2\n- Step 2: Var(Y) = (6 - (-2))²/12 = 8²/12 = 64/12 = 16/3", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "For X ~ U[4, 7], find E(X²). (2 steps)", "answer": "- Step 1: We can use E(X²) = Var(X) + [E(X)]²\n- Step 2: E(X) = 5.5, Var(X) = 0.75, so E(X²) = 0.75 + 5.5² = 0.75 + 30.25 = 31\n\nAlternatively: E(X²) = ∫[4 to 7] x² × (1/3) dx = [x³/(9)] from 4 to 7 = (343/9 - 64/9) = 279/9 = 31", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "For X ~ U[-3, 5], use integration to find Var(X). (3 steps)", "answer": "- Step 1: E(X) = (-3 + 5)/2 = 1\n- Step 2: E(X²) = ∫[-3 to 5] x² × (1/8) dx = [x³/24] from -3 to 5 = (125/24) - (-27/24) = 152/24 = 19/3\n- Step 3: Var(X) = E(X²) - [E(X)]² = 19/3 - 1 = 16/3", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Why can P(X = c) for a continuous random variable X never be a positive number? (1 step)", "answer": "For continuous distributions, probability at a single point is zero because it represents the area under a single vertical line, which has no width. Only intervals have positive probability. Mathematically: P(X = c) = ∫[c to c] f(x) dx = 0.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "For X ~ U[-2, 5], find P(X = 4). (1 step)", "answer": "P(X = 4) = 0\n\nFor any continuous distribution, the probability of exactly any single value is zero.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "For X ~ U[-2, 5], find P(3.5 < X < 5.5). (2 steps)", "answer": "- Step 1: The interval (3.5, 5.5) extends beyond the support [-2, 5]\n- Step 2: Only the portion from 3.5 to 5 is within the distribution. So P = (5 - 3.5)/(5 - (-2)) = 1.5/7 = 3/14 ≈ 0.214", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "For X ~ U[-2, 5], find P(X > 0 | X < 2). (3 steps)", "answer": "- Step 1: This is a conditional probability: P(X > 0 AND X < 2) / P(X < 2)\n- Step 2: P(0 < X < 2) = (2 - 0)/(5 - (-2)) = 2/7; P(X < 2) = (2 - (-2))/(5 - (-2)) = 4/7\n- Step 3: P(X > 0 | X < 2) = (2/7) / (4/7) = 1/2\n\nGiven X < 2, X is uniformly distributed on [-2, 2], so P(X > 0) = (2 - 0)/(2 - (-2)) = 2/4 = 1/2", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "For X ~ U[-2, 5], find P(X > 3 | X > 0). (3 steps)", "answer": "- Step 1: Given X > 0, X is uniform on [0, 5]\n- Step 2: P(X > 3 | X > 0) = (5 - 3)/(5 - 0) = 2/5 = 0.4\n- Step 3: Check: P(X > 3)/P(X > 0) = (5-3)/(5-(-2)) ÷ (5-0)/(5-(-2)) = 2/7 ÷ 5/7 = 2/5 ✓", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A drinks machine pours coffee randomly between 175 ml and 215 ml. If X ~ U[175, 215], what is the pdf? Find P(X < 187). (2 steps)", "answer": "- Step 1: f(x) = 1/(215-175) = 1/40 = 0.025 for 175 ≤ x ≤ 215\n- Step 2: P(X < 187) = (187 - 175)/(215 - 175) = 12/40 = 0.3", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A machine cuts rods with error X ~ U[-3, 3] mm. Find P(|X| > 2). (2 steps)", "answer": "- Step 1: |X| > 2 means X < -2 or X > 2\n- Step 2: P(X < -2) = (-2 - (-3))/(3 - (-3)) = 1/6; P(X > 2) = (3 - 2)/(3 - (-3)) = 1/6; Total = 1/6 + 1/6 = 1/3", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the interquartile range (IQR) for X ~ U[a, b]? (2 steps)", "answer": "- Step 1: Q1 is at F(x) = 0.25, so (x-a)/(b-a) = 0.25, giving x = a + 0.25(b-a)\n- Step 2: Q3 is at F(x) = 0.75, so x = a + 0.75(b-a). IQR = Q3 - Q1 = 0.75(b-a) - 0.25(b-a) = 0.5(b-a) = (b-a)/2\n\nFor uniform distribution, IQR is half the total width.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "For X ~ U[175, 215] ml, find the interquartile range. (1 step)", "answer": "IQR = (215 - 175)/2 = 40/2 = 20 ml\n\nQ1 = 175 + 0.25 × 40 = 185 ml; Q3 = 175 + 0.75 × 40 = 205 ml; IQR = 205 - 185 = 20 ml", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "For X ~ U[175, 215], find x such that P(X ≥ x) = 0.65. (2 steps)", "answer": "- Step 1: P(X ≥ x) = (b - x)/(b - a) = (215 - x)/40 = 0.65\n- Step 2: 215 - x = 26, so x = 189", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A tree trunk has radius R ~ U[1, 5] cm (cut at random point). Find E(area of cross-section). (3 steps)", "answer": "- Step 1: Area A = πR². We need E(A) = πE(R²)\n- Step 2: For R ~ U[1, 5]: E(R) = (1+5)/2 = 3; Var(R) = (5-1)²/12 = 16/12 = 4/3\n- Step 3: E(R²) = Var(R) + [E(R)]² = 4/3 + 9 = 31/3, so E(A) = π × 31/3 = 31π/3 cm²", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Why is E(R²) not equal to [E(R)]²? (1 step)", "answer": "E(R²) ≠ [E(R)]² in general. This is because variance is defined as Var(R) = E(R²) - [E(R)]², so E(R²) = Var(R) + [E(R)]². Only when Var(R) = 0 (degenerate case) are they equal. The expectation of a square is not the square of the expectation.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "A pencil is measured to the nearest cm as 20 cm. What distribution models the rounding error? Why? (2 steps)", "answer": "- Step 1: The true length could be anywhere from 19.5 cm to just under 20.5 cm (the rounding interval)\n- Step 2: The error = true length - recorded length ranges from -0.5 to +0.5. Assuming any value in this range is equally likely, the error R ~ U[-0.5, 0.5]\n\nThis is a key modelling application: rounding errors are uniformly distributed over the rounding interval.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "What distribution would you recommend to model: (a) the difference between true height and height measured to nearest cm, (b) the actual heights of 18-year-old females? (2 steps)", "answer": "- Step 1: (a) The measurement error (difference between true and recorded) would be uniform on [-0.5, 0.5] cm — this is the rounding error model.\n- Step 2: (b) Actual heights would NOT be uniform — they follow a normal distribution (bell curve). Uniform would be inappropriate here because heights cluster around a mean, not spread evenly across a range.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "Trains leave hourly. You arrive at a random time. If X is waiting time in minutes, what is the distribution of X? (1 step)", "answer": "X ~ U[0, 60]\n\nSince you have no information about where in the hour you arrived, any waiting time from 0 to 60 minutes is equally likely.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "A wooden rod of length 20 cm is cut at a random point. The longer piece X ~ U[10, 20]. Find the expected area of a rectangle with sides X and (20-X). (3 steps)", "answer": "- Step 1: Area A = X(20-X) = 20X - X²\n- Step 2: E(A) = 20E(X) - E(X²). For X ~ U[10, 20]: E(X) = (10+20)/2 = 15; Var(X) = (20-10)²/12 = 100/12 = 25/3; E(X²) = Var + [E]² = 25/3 + 225 = 700/3\n- Step 3: E(A) = 20(15) - 700/3 = 300 - 700/3 = (900 - 700)/3 = 200/3 ≈ 66.67 cm²", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "Given X ~ U[a, b] with E(X) = 7.5 and P(X > 10.5) = 0.25, find a and b. (3 steps)", "answer": "- Step 1: E(X) = (a+b)/2 = 7.5, so a + b = 15\n- Step 2: P(X > 10.5) = (b - 10.5)/(b - a) = 0.25, so b - 10.5 = 0.25(b - a), giving 0.75b - 0.25a = 10.5\n- Step 3: From a + b = 15, b = 15 - a. Substituting: 0.75(15-a) - 0.25a = 10.5 → 11.25 - 0.75a - 0.25a = 10.5 → 11.25 - a = 10.5 → a = 0.75, b = 14.25", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For X ~ U[a, b] with E(X) = 7.5 and a = 0.75, b = 14.25, find c such that P(X < c) = 1/3, and then find P(c < X < 9). (3 steps)", "answer": "- Step 1: P(X < c) = (c - a)/(b - a) = 1/3. Since b - a = 13.5, (c - 0.75)/13.5 = 1/3, so c - 0.75 = 4.5, giving c = 5.25\n- Step 2: P(c < X < 9) = (9 - c)/(b - a) = (9 - 5.25)/13.5 = 3.75/13.5 = 5/18 ≈ 0.278", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A spinner with angle θ ~ U[0, 2π] has tip horizontal distance X = r sin(θ). Find E(X). (3 steps)", "answer": "- Step 1: Since sin(θ) is equally likely to be positive and negative over a full cycle, the distribution is symmetric about 0.\n- Step 2: By symmetry, E(sin(θ)) = 0\n- Step 3: Therefore E(X) = r × E(sin(θ)) = r × 0 = 0", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "How could you use the spinner experiment to estimate π? (2 steps)", "answer": "- Step 1: The horizontal distance X = r sin(θ) where θ ~ U[0, 2π]. One could simulate or physically conduct many trials, record X values, and use the relationship between the uniform distribution and geometric properties.\n- Step 2: More directly, the expected value of |X| or the distribution of X² could be compared to theoretical expectations involving π, allowing estimation of π from experimental proportions. Alternatively, the proportion of times |X| > r/√2 relates to π through geometry.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "Given prior knowledge: discrete random variable X has P(X=x) = k(x-1) for x=2,3,4,5 and P(X=6) = 1/2. Find k. (2 steps)", "answer": "- Step 1: Sum of probabilities must equal 1: k(2-1) + k(3-1) + k(4-1) + k(5-1) + 1/2 = 1\n- Step 2: k(1+2+3+4) + 0.5 = 1 → 10k + 0.5 = 1 → 10k = 0.5 → k = 0.05", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "Given prior knowledge: Y has E(Y) = 2 and E(Y²) = 7. Find Var(Y). (1 step)", "answer": "Var(Y) = E(Y²) - [E(Y)]² = 7 - 2² = 7 - 4 = 3", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "Given prior knowledge: Y has E(Y) = 2. Find E(2Y). (1 step)", "answer": "E(2Y) = 2E(Y) = 2 × 2 = 4", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "Given prior knowledge: Y has Var(Y) = 3. Find Var(4Y - 2). (1 step)", "answer": "Var(4Y - 2) = 4² × Var(Y) = 16 × 3 = 48\n\nThe -2 shifts the mean but doesn't affect variance; the 4 scales the variance by 4² = 16.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "Given prior knowledge: ∫[a to 2a] (3x + 1) dx = 168, where a > 0. Find a. (2 steps)", "answer": "- Step 1: ∫(3x+1)dx = (3/2)x² + x. Evaluate from a to 2a: [(3/2)(2a)² + 2a] - [(3/2)a² + a] = [6a² + 2a] - [1.5a² + a] = 4.5a² + a\n- Step 2: 4.5a² + a = 168 → Multiply by 2: 9a² + 2a - 336 = 0. Using quadratic formula: a = [-2 ± √(4 + 12096)]/18 = [-2 ± √12100]/18 = [-2 ± 110]/18. Since a > 0, a = 108/18 = 6", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "For X ~ U[a, b], find P(X < (3/7)a + (4/7)b). What is this point called? (2 steps)", "answer": "- Step 1: The point (3/7)a + (4/7)b is a weighted average (3/7 from a, 4/7 from b), lying 3/7 of the way from a to b.\n- Step 2: P(X < weighted point) = (weighted point - a)/(b-a) = [(3/7)a + (4/7)b - a]/(b-a) = [(3/7 - 1)a + (4/7)b]/(b-a) = [(-4/7)a + (4/7)b]/(b-a) = (4/7)(b-a)/(b-a) = 4/7\n\nThis is at the 4/7 quantile of the distribution.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "For X ~ U[a, b], find P(X > (2/5)a + (3/5)b). (2 steps cost_eur": 0.0071, "elapsed_s": 74, "content_chars": 8615}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 11645, "out_tokens": 4633, "reasoning_chars": 5240, "cost_eur": 0.0073, "elapsed_s": 73, "content_chars": 8646}}};
const SK='s2_ch05';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
