 is a decent approximation, sparing you the binomial coefficient calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "A maintenance department gets 3 light-bulb replacement requests per week. What is the distribution of requests over a 2-week period, and why? (2 steps)", "answer": "- Step 1: Because the Poisson rate is constant per unit time, the rate over 2 weeks is double: $$\\lambda_{2\\text{wk}} = 2 \\times 3 = 6$$ requests per 2 weeks.\n- Step 2: So $$Y \\sim \\text{Po}(6)$$, where $$Y$$ is the number of requests in a 2-week period. Note we **don't** stay at $$\\text{Po}(3)$$ — that would describe one week, not two.\n\nThe principle: any Poisson rate is **rate per chosen unit**; if you change the unit (interval), you rescale $$\\lambda$$ in direct proportion.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "A clinic sees patients with a Poisson rate of 3 per day. The clinic needs an extra doctor if at least 4 days out of 5 have more than 4 patients. Describe the structure of the calculation without computing exact numbers. (4 steps)", "answer": "- Step 1: This is a **two-layer problem**. First find the daily probability $$p$$ of \"more than 4 patients\", using Poisson with $$\\lambda = 3$$.\n- Step 2: $$p = P(X > 4) = 1 - P(X \\leq 4)$$ where $$X \\sim \\text{Po}(3)$$. This $$p$$ is just a number — an ordinary daily probability.\n- Step 3: Now consider 5 independent days. Let $$Y$$ = number of days in the 5-day period with more than 4 patients. Then $$Y \\sim \\text{B}(5, p)$$ — a **Binomial distribution**, because each day is a Bernoulli trial: success = \"more than 4 patients\", with probability $$p$$.\n- Step 4: We want $$P(Y \\geq 4) = P(Y=4) + P(Y=5) = \\binom{5}{4}p^4(1-p) + \\binom{5}{5}p^5$$.\n\nThe key pattern: **Poisson computes the per-trial probability; Binomial counts the number of \"extreme\" trials**. Recognising this two-stage architecture is essential for compound problems.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "When is the Poisson model a *poor* fit for real data? Give scenarios where each of the three conditions might fail. (4 steps)", "answer": "- Step 1: **Independence fails**: customers entering a cinema as families — one person's arrival predicts others'. Or accidents on a road during a sudden storm — they cluster together in time.\n- Step 2: **Singly fails**: passengers arriving on a bus, where dozens disembark together. Or people entering a stadium when the gates open.\n- Step 3: **Constant rate fails**: emergency room visits (more at night/weekends), website traffic (peaks during waking hours), restaurant arrivals (lunch and dinner spikes). The rate varies systematically with time.\n- Step 4: When any of these fails, the model's predictions diverge from reality. The diagnostic: empirical mean $$\\neq$$ empirical variance. Overdispersion (variance $$>$$ mean) often signals clustering or rate-variation; underdispersion (variance $$<$$ mean) signals regularity (e.g., scheduled events).\n\nAlways sanity-check against the three conditions before applying Poisson — don't just trust that \"events happen randomly\" suffices.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "$$X$$ and $$Y$$ are independent Poissons with $$X \\sim \\text{Po}(\\lambda)$$, $$Y \\sim \\text{Po}(\\mu)$$. Let $$Q = X + Y$$. Show that $$P(Q = 0) = e^{-(\\lambda + \\mu)}$$. (3 steps)", "answer": "- Step 1: $$Q = 0$$ requires both $$X = 0$$ **and** $$Y = 0$$ simultaneously (the only way for the sum to be zero with non-negative integers).\n- Step 2: By independence, $$P(X = 0, Y = 0) = P(X=0) \\cdot P(Y=0) = e^{-\\lambda} \\cdot e^{-\\mu}$$.\n- Step 3: Multiplying exponents: $$e^{-\\lambda} \\cdot e^{-\\mu} = e^{-(\\lambda + \\mu)}$$, which matches $$P(Q = 0)$$ for $$Q \\sim \\text{Po}(\\lambda + \\mu)$$. \n\nThis is one tiny piece of the full proof that $$Q \\sim \\text{Po}(\\lambda + \\mu)$$ — but it confirms the parameter is right at the boundary $$x = 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "$$X$$ and $$Y$$ are independent Poissons. Show that $$P(Q = 1) = (\\lambda + \\mu)e^{-(\\lambda + \\mu)}$$, where $$Q = X + Y$$. (4 steps)", "answer": "- Step 1: $$Q = 1$$ in two mutually exclusive ways: $$(X = 1, Y = 0)$$ or $$(X = 0, Y = 1)$$.\n- Step 2: By independence, $$P(X=1, Y=0) = (\\lambda e^{-\\lambda})(e^{-\\mu}) = \\lambda e^{-(\\lambda+\\mu)}$$, and similarly $$P(X=0, Y=1) = \\mu e^{-(\\lambda + \\mu)}$$.\n- Step 3: Summing: $$P(Q=1) = \\lambda e^{-(\\lambda+\\mu)} + \\mu e^{-(\\lambda+\\mu)} = (\\lambda + \\mu)e^{-(\\lambda + \\mu)}$$.\n- Step 4: This matches the formula for $$P(Z = 1)$$ when $$Z \\sim \\text{Po}(\\lambda + \\mu)$$, namely $$\\frac{e^{-(\\lambda+\\mu)}(\\lambda+\\mu)^1}{1!} = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$. ✓\n\nThe full additive property follows by extending this argument to all $$k$$, using the binomial theorem on the convolution sum — but checking the first two cases gives strong confidence in the result.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "A company receives 3 emails every 5 minutes. What is $$\\lambda$$ for a 10-minute period, and why must we rescale even though the rate is \"given\"? (2 steps)", "answer": "- Step 1: The rate \"3 per 5 minutes\" is shorthand for \"0.6 per minute\". For 10 minutes, $$\\lambda = 0.6 \\times 10 = 6$$, or equivalently $$\\frac{10}{5} \\times 3 = 6$$.\n- Step 2: Even though the problem already gives a rate, we must check the **interval being asked about** matches. If the question says \"in a 10-minute period\", we need $$\\lambda$$ for 10 minutes, regardless of how the original rate was packaged. Always anchor $$\\lambda$$ to the **target interval**, not the source description.\n\nHabitual error: using $$\\lambda = 3$$ for 10 minutes because the question gave \"3 per 5 minutes\". Always double the parameter when the interval doubles.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why is $$P(X \\leq 0)$$ for a Poisson the same as $$P(X = 0)$$, but $$P(X < 0) = 0$$? (2 steps)", "answer": "- Step 1: $$X$$ takes only non-negative integer values $$0, 1, 2, \\ldots$$. So \"$$X \\leq 0$$\" includes only $$X = 0$$ (since $$X = -1, -2, \\ldots$$ are impossible). Hence $$P(X \\leq 0) = P(X = 0) = e^{-\\lambda}$$.\n- Step 2: \"$$X < 0$$\" requires $$X$$ to be negative, but no Poisson value is negative — so $$P(X < 0) = 0$$.\n\nThe lesson: integer support means strict inequalities at the boundary $$0$$ behave differently from non-strict ones. $$P(X \\leq 0) = P(X = 0) \\neq P(X < 0)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "An estate agent sells 1.8 houses per week. Define the random variable for a 4-week period and explain whether you can directly find $$P(\\text{at least 2 sales per week, in exactly 1 of 4 weeks})$$ from a single Poisson. (3 steps)", "answer": "- Step 1: For a single week, $$X \\sim \\text{Po}(1.8)$$. We can find $$p = P(X \\geq 2)$$ from this — a single-week probability.\n- Step 2: But \"at least 2 sales in **exactly 1** of the 4 weeks\" is a Binomial question: each of the 4 weeks is a trial, with success probability $$p$$. Let $$Y$$ = number of weeks with at least 2 sales. Then $$Y \\sim \\text{B}(4, p)$$.\n- Step 3: We want $$P(Y = 1) = \\binom{4}{1} p^1 (1-p)^3$$.\n\nTwo things going on: Poisson gives the probability of \"weekly target hit\", Binomial counts how many weeks hit the target. Don't try to use one Poisson with $$\\lambda = 4 \\times 1.8 = 7.2$$ — that would tell you about *total* sales over 4 weeks, not the count of \"target weeks\".", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why must we use a Binomial (and not another Poisson) when asking \"in how many of $$n$$ independent intervals does some event happen\"? (3 steps)", "answer": "- Step 1: A Poisson over $$n$$ intervals would total events over the whole stretch — it doesn't distinguish \"10 events all in week 1\" from \"2 events in each of 5 weeks\". It loses the *per-interval* structure.\n- Step 2: Counting \"how many intervals satisfy a condition\" treats each interval as a Bernoulli trial: success (condition met) or failure (not met). A fixed number $$n$$ of trials with two outcomes each is exactly the **Binomial** setup.\n- Step 3: So the architecture is: **Poisson computes per-interval probability $$p$$; Binomial counts how many intervals \"succeed\"**. The two are doing fundamentally different jobs.\n\nThe deeper reason: Poisson tracks *event counts*; Binomial tracks *interval outcomes*. When the question shifts from \"how many events\" to \"how many intervals\", we shift distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "$$Y \\sim \\text{Po}(\\lambda)$$. What's the largest integer value of $$\\lambda$$ for which $$P(Y > 10) < 0.1$$, given a cumulative table for Poisson? (3 steps)", "answer": "- Step 1: We need $$P(Y > 10) = 1 - P(Y \\leq 10) < 0.1$$, which means $$P(Y \\leq 10) > 0.9$$.\n- Step 2: From the table, scan $$P(X \\leq 10)$$ for various $$\\lambda$$: as $$\\lambda$$ grows, $$P(X \\leq 10)$$ shrinks (more probability mass moves above 10). We want the **largest** $$\\lambda$$ where this probability still exceeds 0.9.\n- Step 3: Conceptually, this finds the rate at which \"more than 10 events\" becomes likely (probability ≥ 0.1). The answer requires looking up, but the idea is: integer $$\\lambda$$ values give discrete steps, and we pick the largest one still satisfying the inequality.\n\nThe flavour of these problems: **invert a tail probability** — given a target probability, find the parameter. Use the cumulative table backwards.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A bus company hires out boats at 9 per hour and wants to be 99% sure of meeting all demand in a 30-minute period. How would you find the minimum number of boats needed? (4 steps)", "answer": "- Step 1: Rescale: in 30 minutes, $$\\lambda = 9 \\times 0.5 = 4.5$$ boats demanded on average.\n- Step 2: Let $$X \\sim \\text{Po}(4.5)$$ be the demand. We want the smallest integer $$n$$ such that $$P(X \\leq n) \\geq 0.99$$ — i.e., the chance that demand stays at or below $$n$$ is at least 99%.\n- Step 3: From the cumulative table for $$\\lambda = 4.5$$, scan upward: find the smallest $$n$$ where $$P(X \\leq n)$$ first crosses 0.99.\n- Step 4: The minimum number of boats is then $$n$$. In words: we need enough capacity that we serve everyone in 99% of half-hour windows.\n\nThis is the \"service-level\" pattern: **invert a cumulative probability to find the minimum capacity** that meets a coverage target.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "What is the shape of the Poisson distribution as $$\\lambda$$ varies, and why? (3 steps)", "answer": "- Step 1: For **small $$\\lambda$$** (e.g., 0.5), the distribution is heavily skewed right with most mass at $$x = 0$$. As $$\\lambda$$ grows past 1, the mode shifts away from 0.\n- Step 2: For **moderate $$\\lambda$$** (e.g., 2–5), the distribution is right-skewed with a clear peak near $$\\lambda$$, tapering off slowly to the right.\n- Step 3: For **large $$\\lambda$$** (e.g., 20+), the distribution becomes nearly symmetric and bell-shaped, approximating a Normal distribution with $$\\mu = \\lambda$$ and $$\\sigma^2 = \\lambda$$. This is because at large counts, the discreteness washes out and the variance grows enough to spread mass smoothly.\n\nThis shape evolution is why for very large $$\\lambda$$, statisticians often switch to a Normal approximation rather than working with Poisson directly.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Two independent companies order taxis: A at 1.25/day, B at 0.75/day. What is the probability the **total** is exactly 2 cars on a given day? Set up but don't compute. (3 steps)", "answer": "- Step 1: Let $$T = A + B$$ be total taxis. By the additive property (same day, independent), $$T \\sim \\text{Po}(1.25 + 0.75) = \\text{Po}(2)$$.\n- Step 2: $$P(T = 2) = \\frac{e^{-2} \\cdot 2^2}{2!} = 2e^{-2}$$.\n- Step 3: This is the elegant payoff: rather than enumerating every $$(A, B)$$ pair giving total 2 — namely $$(0,2), (1,1), (2,0)$$ — we collapse to a single Poisson with combined rate, instantly giving the answer.\n\nThis pooling principle is what makes Poisson the workhorse of applied probability.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Customers arrive at a café at one every 4 minutes on average. What is the probability that **fewer than 3 customers arrive in 20 minutes**? Set up the parameter and explain. (3 steps)", "answer": "- Step 1: Rate is \"1 per 4 minutes\" $$=$$ \"0.25 per minute\". In 20 minutes: $$\\lambda = 0.25 \\times 20 = 5$$, or equivalently $$\\frac{20}{4} \\times 1 = 5$$.\n- Step 2: Let $$X \\sim \\text{Po}(5)$$ be the number of customers in 20 minutes. We want $$P(X < 3) = P(X \\leq 2)$$, again using the integer-support shift.\n- Step 3: $$P(X \\leq 2) = P(X=0) + P(X=1) + P(X=2)$$, all read from a table or computed from the PMF with $$\\lambda = 5$$.\n\nThe structural pattern: **rescale → identify inequality type → look up cumulative → done**. This three-step routine handles most modelling problems.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why doesn't $$\\lambda$$ have to be an integer in the Poisson distribution? (3 steps)", "answer": "- Step 1: $$\\lambda$$ represents the **average rate** — an expectation, not an actual count. Averages are routinely non-integer (e.g., \"1.8 sales per week\"), even though counts themselves are integers.\n- Step 2: The PMF $$\\frac{e^{-\\lambda}\\lambda^x}{x!}$$ is well-defined for any non-negative real $$\\lambda$$, including 1.8 or 4.5, because the exponential and power functions handle real values fluently.\n- Step 3: So you can have $$X \\sim \\text{Po}(2.7)$$ even though $$X$$ itself only takes values $$0, 1, 2, \\ldots$$ — there's no contradiction. The mean is 2.7; individual realisations are integers; over many trials the average will be 2.7.\n\nThis non-integer-$$\\lambda$$ flexibility is what lets us scale to any interval length: 5 minutes might give $$\\lambda = 0.25$$, perfectly valid.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "What's the conceptual difference between $$\\lambda$$ in Poisson and $$np$$ in Binomial? (3 steps)", "answer": "- Step 1: Both are the **mean** of the respective distribution. $$E(X) = \\lambda$$ for Poisson, $$E(X) = np$$ for Binomial.\n- Step 2: But in Binomial, the mean is *built up* from two parameters: $$n$$ (number of trials, an integer) and $$p$$ (per-trial probability). In Poisson, $$\\lambda$$ stands alone — it isn't built from a count and a probability.\n- Step 3: Conceptually, Poisson abandons the trial structure entirely. There's no \"$$n$$\" to point to. The events arrive in a continuous interval, and $$\\lambda$$ summarises the whole arrival process in one number.\n\nThis is why for $$n$$ large and $$p$$ small with $$np = \\lambda$$, the trial structure becomes invisible and Binomial collapses into Poisson — the discreteness of trials is no longer detectable.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "When we collect data and find sample mean = 2.0 but sample variance = 4.5, what does this suggest about modelling with a Poisson? (3 steps)", "answer": "- Step 1: For a true Poisson, the population mean and variance are equal. The sample mean and sample variance should therefore be approximately equal in a reasonably-sized sample.\n- Step 2: A sample variance more than twice the mean signals **overdispersion** — the data are more spread out than Poisson predicts. Likely causes: events clustering in time/space, or rate varying across the observation window (heterogeneity).\n- Step 3: This rules out a simple Poisson model. Alternatives: a \"negative binomial\" (which adds a parameter for dispersion), or a \"compound Poisson\" allowing for clustering. The data is telling us the underlying mechanism violates one of the three Poisson conditions.\n\nOverdispersion is the most common Poisson failure in real data. Always check before committing.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "A company has buses available only on Sunday. The mean number of requests is 5 per Sunday. They want to be 99% sure they can fulfil all requests. Conceptually describe how to find the minimum number of buses needed. (4 steps)", "answer": "- Step 1: Model: $$X \\sim \\text{Po}(5)$$, the number of requests on a Sunday.\n- Step 2: To fulfil all requests, the number of buses $$n$$ must satisfy: demand stays $$\\leq n$$ with probability at least 99%. Mathematically, $$P(X \\leq n) \\geq 0.99$$.\n- Step 3: From the cumulative table for $$\\lambda = 5$$, find the smallest $$n$$ such that this inequality holds.\n- Step 4: The minimum number of buses is that $$n$$. Conceptually: we're finding the **99th percentile** of the demand distribution and rounding up to the nearest integer.\n\nThe same logic applies to any \"capacity to handle worst-case demand X% of the time\" problem — invert the cumulative.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A photocopier breaks down at a rate of 8 per year. What is $$\\lambda$$ for a single month, and what's the probability of exactly 2 breakdowns in a month? (3 steps)", "answer": "- Step 1: Rescale: 1 month is $$\\frac{1}{12}$$ of a year, so $$\\lambda_{\\text{month}} = 8/12 = 2/3 \\approx 0.67$$.\n- Step 2: With $$X \\sim \\text{Po}(2/3)$$, $$P(X=2) = \\frac{e^{-2/3}(2/3)^2}{2!} = \\frac{2}{9}e^{-2/3}$$.\n- Step 3: Numerically, $$e^{-2/3} \\approx 0.51$$, so $$P(X=2) \\approx \\frac{2}{9} \\times 0.51 \\approx 0.11$$. About 11% chance of exactly 2 breakdowns in a month.\n\nThe mental model: at a rate of 0.67 per month, 2 breakdowns is somewhat unusual but not implausible — captured by the \"$$\\lambda^2/2!$$\" factor being moderate.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why does the factorial $$x!$$ appear in the denominator of the Poisson PMF? Conceptual intuition. (3 steps)", "answer": "- Step 1: When $$x$$ events occur in an interval, they happen at distinct moments — but the *order* in which they're labelled doesn't matter for counting. There are $$x!$$ ways to arrange $$x$$ events.\n- Step 2: The unnormalised \"weight\" $$\\lambda^x$$ in some sense counts ordered arrangements; dividing by $$x!$$ collapses these into unordered counts (the actual quantity of interest).\n- Step 3: This parallels the binomial coefficient $$\\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$: in both cases, factorials remove the overcounting from ordered enumeration. In Poisson, it's the limit of $$\\binom{n}{k}p^k(1-p)^{n-k}$$ as $$n \\to \\infty$$, where the $$\\binom{n}{k}$$ collapses to $$\\frac{n^k}{k!}$$ and combines with $$p^k = (\\lambda/n)^k$$ to give $$\\lambda^k/k!$$.\n\nThe factorial is doing combinatorial work even though there are no explicit \"trials\" — it's a remnant of the underlying discrete structure.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "A company gets emails of three types — personal (1.8/hr), business (3.7/hr), advertising (1.5/hr). What's the distribution of total emails per hour, and why is summing rates valid? (3 steps)", "answer": "- Step 1: Each email type is independent (different sources) and individually Poisson. Both conditions for the additive property are satisfied: independence and same interval.\n- Step 2: Therefore total $$T \\sim \\text{Po}(1.8 + 3.7 + 1.5) = \\text{Po}(7)$$ per hour. The additive property generalises from two to any finite number of independent Poissons by repeatedly applying it pairwise.\n- Step 3: The combined rate is just the rate at which **any** email arrives — pooling independent streams gives a stream with the pooled rate, and the Poisson structure is preserved because the union of independent Poisson processes is itself a Poisson process.\n\nThis is also why \"all phone calls\" can be modelled as Poisson even if calls come from many different demographic sources — superposition of independent Poissons is Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Define what's meant by the **Poisson process** intuitively (the model behind the Poisson distribution). (3 steps)", "answer": "- Step 1: A Poisson **process** is a stream of events arriving in continuous time (or space), where events occur randomly at rate $$\\lambda$$ per unit, independently, and singly.\n- Step 2: The Poisson **distribution** $$\\text{Po}(\\lambda t)$$ describes the count of events in any interval of length $$t$$ for this process.\n- Step 3: Crucially: counts in **disjoint intervals** are **independent**. The number of events in $$[0,1]$$ tells you nothing about the count in $$[1,2]$$. This independence-of-intervals property is what makes the Poisson process so analytically tractable and is why scaling and adding work the way they do.\n\nThe Poisson distribution is best understood as a snapshot of a Poisson process — viewing the process through one fixed-length window.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "$$X \\sim \\text{Po}(\\lambda)$$. Given $$P(Y = 5) = 1.25 \\times P(Y = 3)$$, find $$\\lambda$$ using the recurrence. (4 steps)", "answer": "- Step 1: We know $$\\frac{P(Y=k+1)}{P(Y=k)} = \\frac{\\lambda}{k+1}$$, so two steps up: $$\\frac{P(Y=5)}{P(Y=3)} = \\frac{\\lambda}{4} \\cdot \\frac{\\lambda}{5} = \\frac{\\lambda^2}{20}$$.\n- Step 2: Set this equal to 1.25: $$\\frac{\\lambda^2}{20} = 1.25$$.\n- Step 3: Solve: $$\\lambda^2 = 25$$, so $$\\lambda = 5$$ (taking the positive root since $$\\lambda > 0$$).\n- Step 4: Sanity check: with $$\\lambda = 5$$, the mode of the distribution is at 4–5 (since mode $$\\approx \\lfloor \\lambda \\rfloor$$), so $$P(Y=5)$$ being larger than $$P(Y=3)$$ is consistent.\n\nThis recurrence trick turns these \"ratio of probabilities\" problems into simple algebra without computing exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Given that exactly 10 planes landed at an airport between 2pm and 3pm, where the rate is 1 per 4 minutes, what's the conceptual setup for finding the probability that exactly 5 landed before 2:30pm? (4 steps)", "answer": "- Step 1: Total arrivals in [2pm, 3pm] are fixed at 10 (given). We want the distribution of arrivals in the first half-hour, conditional on this total.\n- Step 2: A key property of Poisson processes: conditional on the total number of events in an interval, **each event's location is uniformly distributed** over the interval, and locations are independent. So each of the 10 planes lands in [2pm, 2:30pm] independently with probability $$\\frac{30}{60} = 0.5$$.\n- Step 3: This makes the count of planes in the first half-hour a **Binomial $$B(10, 0.5)$$** — not Poisson! The conditioning on a fixed total has changed the distribution.\n- Step 4: $$P(\\text{5 planes in first half}) = \\binom{10}{5}(0.5)^5(0.5)^5 = \\binom{10}{5}/2^{10}$$.\n\nThis is a beautiful Poisson-process property: conditional on the total, locations are uniform — so subdivisions of intervals become Binomial problems, not Poisson ones.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Compare and contrast: Binomial $$B(n, p)$$ vs. Poisson $$\\text{Po}(\\lambda)$$ — when do you choose which? (4 steps)", "answer": "- Step 1: **Binomial** when there's a fixed, known number $$n$$ of independent trials, each with the same success probability $$p$$. Examples: 50 tossed coins, 100 surveyed people, 5 attempts at a basketball shot.\n- Step 2: **Poisson** when events arrive randomly over a continuous interval (time or space) at a constant rate $$\\lambda$$, with no fixed cap on the count. Examples: calls per hour, raisins per cake.\n- Step 3: Mean equals variance? Poisson. Mean greater than variance? Binomial. (For Binomial, $$\\text{Var}/\\text{Mean} = 1 - p < 1$$, so variance $$<$$ mean.)\n- Step 4: When $$n$$ is large and $$p$$ is small with $$np$$ moderate, the distinction blurs and Binomial $$\\approx$$ Poisson with $$\\lambda = np$$ — both describe rare events accumulating over many opportunities.\n\nThe choice often comes down to whether you can identify natural \"trials\" (Binomial) or only a continuous interval with arrivals (Poisson).", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "The number of patients arriving at A&E follows $$\\text{Po}(5)$$ per hour. A patient just arrived at 11:00am. What's the probability the next patient arrives before 11:15am? (3 steps)", "answer": "- Step 1: This is a **waiting time** question. In a Poisson process with rate $$\\lambda$$ per hour, the probability of **no arrival** in a fixed window of length $$t$$ is $$e^{-\\lambda t}$$ (since count in window $$\\sim \\text{Po}(\\lambda t)$$ and we want count = 0).\n- Step 2: For 15 minutes = 0.25 hours, with $$\\lambda = 5$$ per hour, the rate over 15 minutes is $$\\lambda t = 1.25$$. So $$P(\\text{no arrival in 15 min}) = e^{-1.25}$$.\n- Step 3: Therefore $$P(\\text{next arrival within 15 min}) = 1 - e^{-1.25} \\approx 1 - 0.287 = 0.713$$, about 71%.\n\nThe deeper insight: waiting times between Poisson events are exponentially distributed with mean $$1/\\lambda$$. This is the dual perspective on a Poisson process: counts are Poisson, gaps are exponential.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "When the textbook says the relative frequencies \"0.04, 0.17, 0.25, ...\" compare well to Poisson probabilities \"0.063, 0.175, 0.241, ...\", what's the underlying argument supporting Poisson as a model? (3 steps)", "answer": "- Step 1: The empirical relative frequencies in the data table closely match the theoretical Poisson probabilities computed using the sample mean as $$\\lambda$$. Bar by bar, the predictions are reasonable.\n- Step 2: This visual/numerical fit is **goodness-of-fit evidence**. Combined with the structural argument (calls are independent, single, at constant rate), it gives both empirical and theoretical reasons to choose Poisson.\n- Step 3: A formal goodness-of-fit test (like chi-square) can quantify the match; the textbook is doing a more qualitative version. If the relative frequencies wildly diverged from Poisson predictions, that would discredit the model regardless of structural arguments.\n\nModelling is always a dialogue: structural reasoning suggests Poisson; data validates or rejects.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Two coffee machines $$C$$ and $$D$$ break down independently at rates 0.1 and 0.05 per week. What's the rate at which **either machine** breaks down in a 12-week period, and what is the rate of **both** breaking down? Be careful with the second part. (4 steps)", "answer": "- Step 1: For \"either machine\" — i.e., total breakdowns from both: by additivity, rate = $$0.1 + 0.05 = 0.15$$ per week, so over 12 weeks, $$\\lambda_{\\text{total}} = 0.15 \\times 12 = 1.8$$.\n- Step 2: For \"both machines breaking at least once\": this is **not** a sum-of-rates question. It asks $$P(C \\geq 1 \\text{ AND } D \\geq 1)$$, which by independence factors into $$P(C \\geq 1) \\cdot P(D \\geq 1)$$.\n- Step 3: Compute each: over 12 weeks, $$C \\sim \\text{Po}(1.2)$$, $$D \\sim \\text{Po}(0.6)$$. Then $$P(C \\geq 1) = 1 - e^{-1.2}$$, $$P(D \\geq 1) = 1 - e^{-0.6}$$.\n- Step 4: Multiply for the joint probability: $$P(\\text{both} \\geq 1) = (1 - e^{-1.2})(1 - e^{-0.6})$$.\n\nThe lesson: \"either\" combines via additivity of rates; \"both\" combines via multiplication of individual probabilities (under independence). Don't confuse the two.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why is the Poisson distribution sometimes called the \"law of rare events\"? (3 steps)", "answer": "- Step 1: It arises as the limiting distribution of a Binomial $$B(n, p)$$ where $$n \\to \\infty$$ and $$p \\to 0$$ but $$np = \\lambda$$ stays fixed. Each \"trial\" has vanishingly small probability of success (rare), but there are many trials, accumulating to a moderate average.\n- Step 2: This describes any setting where individual chances are tiny but opportunities are abundant — radioactive atoms (each one rarely decays in a given second, but trillions exist), website hits (each individual user is unlikely to visit, but millions could), accidents at intersections.\n- Step 3: The \"rarity\" justifies modelling assumptions like independence (rare events don't interact) and singly-occurring (rare events rarely overlap exactly), explaining why so many real-world counts naturally follow Poisson.\n\nThe name encodes a deep insight: Poisson isn't just a formula — it's the universal pattern for \"many opportunities, each tiny\" situations.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "A textbook sets up: $$X \\sim \\text{Po}(\\lambda)$$, with $$P(X = 4) = 3 \\times P(X = 2)$$. Walk through the algebra to find $$\\lambda$$. (4 steps)", "answer": "- Step 1: Use the PMF: $$P(X=4) = \\frac{e^{-\\lambda}\\lambda^4}{4!}, \\quad P(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$.\n- Step 2: Set up the ratio: $$\\frac{P(X=4)}{P(X=2)} = \\frac{\\lambda^4/4!}{\\lambda^2/2!} = \\frac{\\lambda^2 \\cdot 2!}{4!} = \\frac{\\lambda^2 \\cdot 2}{24} = \\frac{\\lambda^2}{12}$$.\n- Step 3: Set this equal to 3: $$\\frac{\\lambda^2}{12} = 3 \\implies \\lambda^2 = 36$$.\n- Step 4: $$\\lambda = 6$$ (positive root).\n\nQuicker via recurrence: $$\\frac{P(X=4)}{P(X=2)} = \\frac{\\lambda}{3} \\cdot \\frac{\\lambda}{4} = \\frac{\\lambda^2}{12}$$. Either way, $$\\lambda = 6$$. Recognising recurrence patterns saves time.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "What is the probability that an event happens **exactly once** in an interval where $$\\lambda$$ is the rate, and how does this depend on $$\\lambda$$? (3 steps)", "answer": "- Step 1: $$P(X = 1) = \\frac{e^{-\\lambda}\\lambda^1}{1!} = \\lambda e^{-\\lambda}$$.\n- Step 2: As a function of $$\\lambda$$: it starts at 0 (when $$\\lambda = 0$$, no events expected), rises, peaks at $$\\lambda = 1$$ (where $$P(X=1) = 1/e \\approx 0.368$$), and then falls again as $$\\lambda$$ grows large.\n- Step 3: Intuition: when $$\\lambda$$ is small, even one event is unlikely; when $$\\lambda$$ is large, having *exactly* one is unlikely because typically you'd get many. The maximum chance of \"exactly one\" occurs at the rate $$\\lambda = 1$$.\n\nThis non-monotonicity is a feature of all Poisson PMFs viewed as functions of $$\\lambda$$: each $$P(X=k)$$ as a function of $$\\lambda$$ peaks at $$\\lambda = k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "$$X \\sim \\text{Po}(2.5)$$ and $$Y \\sim \\text{Po}(3.5)$$ independently. What's the probability that **both** $$X$$ and $$Y$$ are greater than 2? Set up only. (3 steps)", "answer": "- Step 1: $$P(X > 2 \\text{ AND } Y > 2)$$ — this is a joint event, **not** about $$X + Y$$. Independence is the key.\n- Step 2: By independence: $$P(X > 2, Y > 2) = P(X > 2) \\cdot P(Y > 2)$$.\n- Step 3: Compute each individually: $$P(X > 2) = 1 - P(X \\leq 2)$$ where $$X \\sim \\text{Po}(2.5)$$, and $$P(Y > 2) = 1 - P(Y \\leq 2)$$ where $$Y \\sim \\text{Po}(3.5)$$. Multiply the two values.\n\nCritical distinction: \"both greater than 2\" $$\\neq$$ \"$$X+Y > 4$$\". The first counts joint events; the second pools the totals. They give different probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Why doesn't summing two Poisson **distributions** give you the distribution of just one of them again? (Why doesn't $$\\text{Po}(\\lambda) + \\text{Po}(\\mu)$$ equal $$\\text{Po}(\\lambda)$$?) (3 steps)", "answer": "- Step 1: Adding random variables $$X + Y$$ produces a new random variable whose mean is $$E(X) + E(Y) = \\lambda + \\mu$$. Since for Poisson the mean fully determines the distribution, the sum has rate $$\\lambda + \\mu$$, not $$\\lambda$$.\n- Step 2: The conceptual leap: \"adding distributions\" sometimes gets confused with \"mixing\" or \"averaging\". The additive property here is about **sums of samples** from independent sources, not about combining distribution shapes.\n- Step 3: A useful analogy: two coin flips together produce a \"two-coin\" outcome with mean count $$2p$$, not $$p$$. The number of heads scales with the number of trials, regardless of distribution family.\n\nSumming increases the parameter; mixing (which we don't do here) would create a non-Poisson distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "In what sense is the Poisson distribution \"memoryless\" in the context of waiting for the next event? (3 steps)", "answer": "- Step 1: The waiting time between events in a Poisson process has an exponential distribution, which is memoryless: $$P(T > s + t \\mid T > s) = P(T > t)$$. Having waited time $$s$$ already doesn't change the distribution of remaining wait.\n- Step 2: For the **count** Poisson distribution, this manifests as: the count in a future interval is independent of past counts. Knowing that 5 events happened in the last hour gives no information about the count in the next hour (assuming constant rate).\n- Step 3: Practical consequence: in a true Poisson scenario, if you've just witnessed an event, the wait until the next is statistically the same as if you'd just arrived — there's no \"overdue\" event accumulation. This is the property students find most counterintuitive.\n\nIf the events have any \"schedule\" or memory (like trains running every 10 minutes), the process is not Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Explain why we use the cumulative Poisson tables for tail probabilities like $$P(X > d) \\leq 0.005$$, and how to invert them. (3 steps)", "answer": "- Step 1: The tables give $$P(X \\leq x)$$ for various $$x$$. For tail probabilities, convert: $$P(X > d) = 1 - P(X \\leq d)$$. So $$P(X > d) \\leq 0.005$$ becomes $$1 - P(X \\leq d) \\leq 0.005$$, i.e., $$P(X \\leq d) \\geq 0.995$$.\n- Step 2: Now scan the table for the chosen $$\\lambda$$ and find the **smallest** $$d$$ where $$P(X \\leq d)$$ first reaches or exceeds 0.995. This is the smallest $$d$$ satisfying the constraint.\n- Step 3: The result tells you a \"rare-tail threshold\": values exceeding $$d$$ have at most 0.5% probability. Useful for safety margins, refund triggers, and capacity planning where you want to bound the chance of an extreme outcome.\n\nThe pattern: rare-tail problems become inverse-cumulative problems via complementing the inequality.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "A fishing angler catches fish at a rate of 2 per hour. Find conceptually the probability that on **exactly 3 of 5** two-hour trips, she catches at least 5 fish. (4 steps)", "answer": "- Step 1: First, single-trip probability. Per 2 hours, $$\\lambda = 2 \\times 2 = 4$$. Let $$X \\sim \\text{Po}(4)$$ be fish per 2-hour trip. Compute $$p = P(X \\geq 5) = 1 - P(X \\leq 4)$$.\n- Step 2: Now treat each trip as an independent Bernoulli trial with success probability $$p$$ (the trip \"succeeds\" if she catches $$\\geq 5$$ fish).\n- Step 3: Over 5 trips, let $$Y \\sim \\text{B}(5, p)$$. We want $$P(Y = 3) = \\binom{5}{3}p^3(1-p)^2$$.\n- Step 4: This is the standard Poisson→Binomial compound: Poisson computes $$p$$ once, Binomial counts how many trips succeed. Don't try to use a single Poisson with $$\\lambda = 5 \\times 4 = 20$$ — that would tell you about *total* fish caught, not the *number of successful trips*.\n\nAlways identify whether you're counting events (Poisson) or successful intervals (Binomial). The compound structure is the giveaway.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "What is the *total* number of breakdowns in 6 weeks if the rate is 1.5 per week? And how does this differ from \"at most 2 breakdowns each week for 6 weeks\"? (3 steps)", "answer": "- Step 1: Total over 6 weeks: by scaling, $$T \\sim \\text{Po}(1.5 \\times 6) = \\text{Po}(9)$$. We can directly read off $$P(T \\leq n)$$ from a cumulative table.\n- Step 2: \"At most 2 each week\" is different — it asks each of 6 weekly counts to satisfy the same constraint individually. Let $$p = P(X \\leq 2)$$ where $$X \\sim \\text{Po}(1.5)$$ is the weekly count. Then by independence across weeks, $$P(\\text{all 6 weeks satisfy}) = p^6$$.\n- Step 3: These are different scenarios: \"total $$\\leq 12$$ over 6 weeks\" allows uneven distribution (e.g., 0 + 0 + 0 + 0 + 6 + 6); \"$$\\leq 2$$ each week\" forbids any single-week excess. The first uses pooled Poisson; the second uses repeated independent Poisson trials.\n\nAlways ask: are we pooling counts, or constraining each interval separately? Different question, different math.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "Why does the Poisson distribution require a **continuous** interval (time or space), even though the count itself is discrete? (3 steps)", "answer": "- Step 1: The Poisson model arises from \"events sprinkled randomly throughout a continuum at a constant rate\". The continuum lets us apply rate × length scaling smoothly: any sub-interval gets a proportionally smaller $$\\lambda$$.\n- Step 2: If the underlying domain were discrete (say, a fixed list of trials), there'd be no natural \"scaling\" — you'd be back in Binomial territory. The continuum is what makes \"rate per unit time\" or \"rate per m²\" meaningful.\n- Step 3: That said, many practical problems treat the continuum loosely (e.g., \"calls per day\" implicitly assumes the day is continuous). The math doesn't require strict continuity, just that scaling makes sense over the chosen units.\n\nThis is why Poisson handles \"raisins per cake\" (volumetric) and \"calls per hour\" (temporal) identically — both have continuous domains where rate-times-length yields the local mean.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "$$X \\sim \\text{Po}(\\lambda)$$. Sketch the qualitative behaviour of $$P(X \\leq k)$$ as $$\\lambda$$ varies, for fixed $$k$$. (3 steps)", "answer": "- Step 1: For very small $$\\lambda$$ (say $$\\lambda \\ll k$$), almost all probability mass is at $$0, 1, \\ldots, k$$, so $$P(X \\leq k)$$ is close to 1.\n- Step 2: As $$\\lambda$$ grows past $$k$$, the distribution's centre shifts past $$k$$ and probability mass leaks into $$X > k$$. So $$P(X \\leq k)$$ decreases — and does so increasingly steeply.\n- Step 3: For very large $$\\lambda$$ ($$\\lambda \\gg k$$), almost all mass is above $$k$$, so $$P(X \\leq k) \\to 0$$.\n\nVisually: $$P(X \\leq k)$$ vs. $$\\lambda$$ is a smooth, monotone-decreasing curve from 1 down to 0, with the steepest drop around $$\\lambda \\approx k$$. This is the fundamental shape behind all \"find $$\\lambda$$ such that $$P(X \\leq k)$$ equals some target\" problems.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Why is it important for the Poisson model that the rate $$\\lambda$$ is **the same** before and after we observe data, and how does this manifest in problems like \"given that 10 planes landed in an hour, what's the probability...?\" (3 steps)", "answer": "- Step 1: For an unconditional Poisson process, $$\\lambda$$ is a fixed property of the world — it doesn't depend on observations. This \"stationarity\" is what gives Poisson its predictive structure.\n- Step 2: But when we **condition** on an observation (e.g., \"given that 10 planes landed\"), the *unconditional* Poisson distribution is no longer relevant for that interval. Instead, given the total, the **locations of the 10 events become uniformly and independently distributed** across the interval.\n- Step 3: So the conditional sub-counts (e.g., events in the first half) become **Binomial** with $$n = 10$$ and $$p = $$ (length of sub-interval / total length). The Poisson \"becomes Binomial\" under conditioning on totals.\n\nThis is one of the most beautiful properties of the Poisson process — and a key trick in problems where you're told a total and asked about sub-intervals.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}], "count": 65}}, "meta": {"glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 14062, "out_tokens": 9974, "reasoning_chars": 15343, "cost_eur": 0.0457, "elapsed_s": 200, "content_chars": 21505}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 12946, "out_tokens": 14113, "reasoning_chars": 10032, "cost_eur": 0.0579, "elapsed_s": 303, "content_chars": 43451}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 12963, "out_tokens": 11210, "reasoning_chars": 1569, "cost_eur": 0.0137, "elapsed_s": 97, "content_chars": 31022}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 12963, "out_tokens": 12283, "reasoning_chars": 2209, "cost_eur": 0.0148, "elapsed_s": 92, "content_chars": 35197}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 20757, "out_tokens": 34467, "reasoning_chars": 0, "cost_eur": 2.6647, "elapsed_s": 443, "content_chars": 65558}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 14357, "out_tokens": 2521, "reasoning_chars": 2913, "cost_eur": 0.0054, "elapsed_s": 45, "content_chars": 6537}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 14357, "out_tokens": 3707, "reasoning_chars": 6828, "cost_eur": 0.0067, "elapsed_s": 68, "content_chars": 7891}}};
const SK='s2-ch02';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
