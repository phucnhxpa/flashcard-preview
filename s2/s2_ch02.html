: radioactive decay events, rare diseases, equipment failures in a short period.\n\nSmall $$\\lambda$$ → most probability at 0 and 1 → the model describes rare, isolated events.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "Why can’t you add two dependent Poisson variables and expect the result to follow a Poisson distribution?", "answer": "The additive property $ X+Y \\sim \\text{Po}(\\lambda + \\mu) $ requires independence. If $ X $ and $ Y $ are dependent (e.g., one causes the other), their covariance isn’t zero, violating the Poisson assumption of independent events.  \n+ Example: If $ X $ is incoming calls and $ Y $ is calls to the same line (same events), dependence invalidates the sum.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, what are the values of $$E(X)$$ and $$\\text{Var}(X)$$, and why is this property notable? (3 steps)", "answer": "- Step 1: $$E(X) = \\lambda$$ and $$\\text{Var}(X) = \\lambda$$ — the mean and variance are **equal**, both equal to the rate parameter.\n- Step 2: This is unusual: in most distributions, mean and variance are independent quantities. In a Binomial $$B(n, p)$$, the mean is $$np$$ but variance is $$np(1-p)$$, which is always *less* than the mean.\n- Step 3: The fact that mean ≈ variance is therefore a **diagnostic fingerprint** for the Poisson: when you compute the sample mean and sample variance of empirical data and find them roughly equal, that supports a Poisson model. If the variance is much bigger (overdispersion) or much smaller (underdispersion), Poisson is probably the wrong choice.\n\nThis \"mean = variance\" identity is the practical test you apply to data before committing to a Poisson model.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "The Poisson model requires events to occur at a \"constant average rate.\" Give a scenario where this condition is **violated**, and explain the consequence for modelling. (3 steps)", "answer": "- Step 1: Consider **phone calls to a school office**. The rate is much higher during morning drop-off (8–9 am) and much lower during lunch or after school. The rate varies by time of day.\n- Step 2: If you model the full day with a single $$\\lambda$$, you're averaging a high-rate period and a low-rate period. The resulting Poisson would predict a moderate, steady flow — but reality has bursts and lulls. The observed data would show **more variance than mean** (overdispersion), because the mixing of different rates increases variability.\n- Step 3: To model this properly, you could either: restrict analysis to a sub-period where the rate is approximately constant, or use a more sophisticated model that allows the rate to vary (like a Poisson process with time-varying $$\\lambda(t)$$).\n\nNon-constant rate → mixing of rates → overdispersion → Poisson is inappropriate unless you isolate a constant-rate sub-interval.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "If the mean number of events per interval is λ, why does the variance also equal λ in a Poisson distribution? Provide an intuitive explanation. (2 steps)", "answer": "- Step 1: The Poisson distribution arises as a limiting case of the binomial distribution when $n \\to \\infty$ and $p \\to 0$ while keeping $np = \\lambda$ constant. In a binomial distribution, variance is $np(1-p)$. As $p \\to 0$, this becomes $np = \\lambda$.\n- Step 2: Intuitively, when events are rare and independent, the uncertainty (variance) in the count equals the average count. If events are very rare, the distribution is heavily skewed toward zero, and the spread (variance) is determined by how frequently events typically occur (the mean).", "source": "MiniMax ②", "_id": "minimax_2_29"}], "models": {"glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "How does the fundamental setup of a Poisson distribution differ from a Binomial distribution in terms of the number of trials and the possible values of the random variable? (2 steps)", "answer": "- Step 1: A Binomial distribution models the number of successes in a **fixed number of trials** ($$n$$), meaning there is an upper limit to the random variable ($$X \\leq n$$). In contrast, a Poisson distribution models the number of events occurring in a **fixed interval of time or space**, where there is no fixed number of trials.\n+ Binomial example: Flipping a coin 10 times (max 10 heads).\n+ Poisson example: Number of emails received in an hour (theoretically infinite upper limit).\n- Step 2: Because there is no fixed number of trials in a Poisson process, the random variable $$X$$ can theoretically take any non-negative integer value from $$0, 1, 2, \\ldots$$ to infinity, whereas a Binomial random variable is bounded above by $$n$$.\n\nThe Poisson deals with \"counts over a continuum\" rather than \"successes out of a fixed set.\"", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What are the three essential conditions that must be met for a Poisson distribution to be a suitable model for events occurring within a given interval? Provide an example where one of these conditions is violated. (3 steps)", "answer": "- Step 1: The events must occur **independently**. The occurrence of one event must not affect the probability of another event occurring.\n+ Violation example: Spread of a contagious disease, where one infection increases the chance of others.\n- Step 2: The events must occur **singly** (one at a time) in space or time. They cannot occur simultaneously.\n+ Violation example: Customers entering a store in groups of 5, rather than one by one.\n- Step 3: The events must occur at a **constant average rate**, meaning the mean number of events in an interval is proportional to the length of that interval.\n+ Violation example: Traffic accidents that peak during rush hour rather than occurring at a steady rate throughout the day.\n\nIf these conditions hold, the randomness is perfectly suited for the Poisson model.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "Misconception probe: If a call centre receives calls at a constant average rate of $$\\lambda = 4$$ calls per hour, does the Poisson model assume that exactly 4 calls happen every hour? Explain what \"constant average rate\" actually implies. (2 steps)", "answer": "- Step 1: No, the Poisson model absolutely does **not** assume exactly 4 calls occur every hour. If that were true, there would be no randomness and the variance would be zero.\n- Step 2: \"Constant average rate\" implies that over a long period, the average number of calls per hour settles to 4. However, in any *specific* hour, the actual number of calls is a random variable that can be 0, 1, 5, or even 10. The \"constant rate\" means the underlying probability of a call arriving in any tiny fraction of time remains the same, not that the observed count is constant.\n\nThe variance in a Poisson distribution is equal to its mean, confirming that there is natural fluctuation around the average $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Derive why the sum of all probabilities in a Poisson distribution equals 1, starting from the probability mass function $$P(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}$$. (4 steps)", "answer": "- Step 1: Write out the sum of probabilities from $$x=0$$ to infinity: $$\\sum_{x=0}^{\\infty} P(X=x) = P(X=0) + P(X=1) + P(X=2) + \\ldots$$\n- Step 2: Substitute the Poisson formula into the sum: $$\\frac{e^{-\\lambda} \\lambda^0}{0!} + \\frac{e^{-\\lambda} \\lambda^1}{1!} + \\frac{e^{-\\lambda} \\lambda^2}{2!} + \\ldots$$\n- Step 3: Factor out the common term $$e^{-\\lambda}$$, leaving the series $$(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots)$$ inside the brackets.\n- Step 4: Recognize that the series inside the brackets is the Maclaurin series expansion for $$e^{\\lambda}$$. Therefore, the total sum is $$e^{-\\lambda} \\times e^{\\lambda} = e^0 = 1$$.\n\nThis elegant mathematical property confirms that the Poisson formula is a valid probability distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "For a Poisson distribution with parameter $$\\lambda$$, what happens to the probability of observing exactly 0 events, $$P(X=0)$$, as $$\\lambda$$ increases? Explain both mathematically and intuitively. (2 steps)", "answer": "- Step 1: Mathematically, $$P(X=0) = \\frac{e^{-\\lambda} \\lambda^0}{0!} = e^{-\\lambda}$$. As $$\\lambda$$ increases, the exponent $$-\\lambda$$ becomes a larger negative number, meaning $$e^{-\\lambda}$$ shrinks rapidly towards 0.\n- Step 2: Intuitively, if the average rate of events ($$\\lambda$$) becomes very large, it becomes incredibly unlikely that you would observe absolutely zero events. For example, if a intersection averages 50 accidents a year ($$\\lambda=50$$), the chance of seeing 0 accidents is virtually nonexistent.\n\nThe probability of zero events is highest when $$\\lambda$$ is very small (i.e., rare events).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "When calculating probabilities like $$P(X \\geq 1)$$ for a Poisson distribution, why is it a critical strategy to use the complement rule rather than summing the infinite series? (2 steps)", "answer": "- Step 1: The direct approach requires summing an infinite number of terms: $$P(X \\geq 1) = P(X=1) + P(X=2) + P(X=3) + \\ldots$$, which is impossible to calculate exactly by hand and prone to rounding errors on calculators.\n- Step 2: The complement of \"$$X \\geq 1$$\" is \"$$X < 1$$\", which for a discrete non-negative integer variable means exactly \"$$X = 0$$\". Since $$P(X=0) = e^{-\\lambda}$$ is a single, easy-to-calculate term, we can find $$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-\\lambda}$$. \n\nAlways look for the complement to turn an infinite sum into a single subtraction.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "Poisson cumulative distribution tables typically give values for $$P(X \\leq x)$$. How would you use these tables to calculate a strict inequality like $$P(2 < X \\leq 5)$$? (2 steps)", "answer": "- Step 1: Translate the strict inequality into cumulative boundaries. $$P(2 < X \\leq 5)$$ means $$X$$ can be 3, 4, or 5. This is equivalent to finding the probability of $$X$$ being 5 or less, minus the probability of $$X$$ being 2 or less.\n- Step 2: Use the table to look up $$P(X \\leq 5)$$ and subtract the value of $$P(X \\leq 2)$$. Mathematically, $$P(2 < X \\leq 5) = P(X \\leq 5) - P(X \\leq 2)$$. \n\nSubtracting the lower cumulative boundary removes the unwanted values (0, 1, and 2) from the upper cumulative boundary.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Simple exercise: If $$X \\sim Po(1)$$, calculate $$P(X=2)$$ using the formula and basic mental math approximations (recall $$e \\approx 2.718$$). (3 steps)", "answer": "- Step 1: Write down the Poisson formula and substitute $$\\lambda = 1$$ and $$x = 2$$: $$P(X=2) = \\frac{e^{-1} \\times 1^2}{2!}$$.\n- Step 2: Simplify the algebraic terms: $$1^2 = 1$$ and $$2! = 2$$, so the expression becomes $$\\frac{e^{-1}}{2}$$.\n- Step 3: Calculate the value: $$e^{-1} \\approx 0.368$$. Dividing by 2 gives approximately $$0.184$$. \n\nThis mental math confirms that for a process averaging 1 event per interval, seeing exactly 2 events happens roughly 18% of the time.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If events occur at a constant average rate of $$\\lambda$$ per hour, how do you find the Poisson parameter for a different time interval, such as 30 minutes? What fundamental property of the Poisson distribution allows this? (2 steps)", "answer": "- Step 1: The Poisson parameter for the new interval is found by scaling $$\\lambda$$ proportionally to the length of the new interval. Since 30 minutes is half an hour, the new parameter is $$0.5\\lambda$$.\n- Step 2: This scaling is valid because of the \"constant average rate\" condition, which dictates that the mean number of events in an interval is directly proportional to the length of that interval. \n\nIf the rate weren't constant (e.g., events clustered in certain hours), this simple proportional scaling would fail.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Edge case: A printer jams at a rate of 2 times per 8-hour workday. Can we model the number of jams in a 10-minute interval using a Poisson distribution? What must we assume, and what is the parameter? (3 steps)", "answer": "- Step 1: Yes, we can model it, provided we assume the jams occur independently, singly, and at a constant average rate across the entire day (including the assumption that the rate doesn't change just because it's a short 10-minute window).\n- Step 2: Convert the rate to match the desired interval. 8 hours is 480 minutes. The rate is 2 jams per 480 minutes.\n- Step 3: Find the rate for 10 minutes by scaling: $$\\lambda_{10 \\text{ min}} = 2 \\times \\frac{10}{480} = \\frac{20}{480} = \\frac{1}{24} \\approx 0.042$$.\n\nThe parameter $$\\lambda$$ must always match the time or space interval you are analyzing.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Synthesis: In a two-stage problem, you first use a Poisson distribution to find the probability that a \"successful\" day occurs (e.g., more than 4 events). You then want to find the probability of having exactly 3 successful days in a week. What distribution do you use for the second stage, and why? (3 steps)", "answer": "- Step 1: The second stage requires counting the number of \"successes\" (successful days) out of a fixed number of trials (7 days in a week).\n- Step 2: Each day is a trial with two outcomes: it is either a \"successful day\" or it isn't. The probability of success ($$p$$) is the fixed value calculated from the Poisson distribution in stage 1.\n- Step 3: Therefore, the second stage follows a **Binomial distribution**, $$B(n, p)$$, where $$n=7$$ (days) and $$p$$ is the probability found from the Poisson model.\n\nThe Poisson model defines the event; the Binomial model counts how many times that event occurs over multiple independent trials.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Simple exercise: A Poisson process determines that a factory has a \"high demand\" day with probability $$p = 0.2$$. Over 3 independent days, what is the probability of having exactly 2 \"high demand\" days? (2 steps)", "answer": "- Step 1: Recognize this as a Binomial problem where $$n=3$$ (days) and $$p=0.2$$. We want $$P(Y=2)$$.\n- Step 2: Use the Binomial formula: $$P(Y=2) = \\binom{3}{2} (0.2)^2 (0.8)^1 = 3 \\times 0.04 \\times 0.8 = 0.096$$.\n\nThis demonstrates how a probability derived from a Poisson process becomes the parameter for a subsequent Binomial calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "If $$X \\sim Po(\\lambda)$$ and $$Y \\sim Po(\\mu)$$ are independent, what is the distribution of $$X+Y$$? Explain intuitively why the parameters add up. (2 steps)", "answer": "- Step 1: The distribution of $$X+Y$$ is $$Po(\\lambda + \\mu)$$. This is the additive property of Poisson distributions.\n- Step 2: Intuitively, if one source produces events at an average rate $$\\lambda$$ and an entirely independent source produces events at an average rate $$\\mu$$, the combined average rate of events from both sources is simply $$\\lambda + \\mu$$. Since the combined events still meet the Poisson conditions (independent, singly, constant rate), the sum is also Poisson.\n\nYou cannot add Poisson variables this way if they are not independent or if they do not cover the same interval of time/space.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Misconception probe: $$X$$ models cars passing in a 5-minute interval ($$X \\sim Po(2)$$), and $$Y$$ models vans passing in a 15-minute interval ($$Y \\sim Po(3)$$). Can you say $$X+Y \\sim Po(5)$$? How must you handle this? (3 steps)", "answer": "- Step 1: No, you cannot simply add the parameters to get $$Po(5)$$ because the additive property requires both variables to model events over the **same interval of time or space**.\n- Step 2: You must scale one of the variables to match the other's interval. For example, scale $$X$$ to a 15-minute interval: $$X_{15} \\sim Po(2 \\times 3) = Po(6)$$.\n- Step 3: Now you can add the parameters: $$X_{15} + Y \\sim Po(6 + 3) = Po(9)$$.\n\nAlways ensure the time/space intervals match before adding independent Poisson variables.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Simple exercise: $$X \\sim Po(2)$$ and $$Y \\sim Po(3)$$ are independent. What is $$P(X+Y = 0)$$? (2 steps)", "answer": "- Step 1: By the additive property, $$X+Y \\sim Po(2+3) = Po(5)$$.\n- Step 2: We want the probability of 0 events for a $$Po(5)$$ distribution. Using the formula for $$P(Q=0)$$: $$P(Q=0) = e^{-5}$$.\n\nSince $$e^{-5} \\approx 0.0067$$, it is very unlikely to see zero total events when the combined average rate is 5.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "What is the relationship between the mean and variance of a Poisson distribution? How does this compare to a Binomial distribution? (2 steps)", "answer": "- Step 1: For a Poisson distribution $$Po(\\lambda)$$, the mean and the variance are **equal**: $$E(X) = \\lambda$$ and $$Var(X) = \\lambda$$.\n- Step 2: In a Binomial distribution $$B(n, p)$$, the variance is $$np(1-p)$$, which is always strictly less than the mean $$np$$ (since $$1-p < 1$$). The equality of mean and variance in Poisson is a unique and defining characteristic.\n\nThis equality implies that as the average number of events increases, the spread of the data increases at the exact same rate.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Why is the equality of the mean and variance a useful diagnostic tool for deciding if a Poisson model is appropriate for a dataset? (2 steps)", "answer": "- Step 1: The Poisson model mathematically assumes that the underlying process has a spread (variance) equal to its average (mean). If real-world data dramatically violates this, the model does not fit the reality of the process.\n- Step 2: By calculating the sample mean ($$\\bar{x}$$) and sample variance ($$s^2$$) from the data, you can check if they are close in value. If they are, it supports using Poisson; if they are vastly different, the Poisson model is likely inappropriate.\n\nIt acts as a quick \"sanity check\" before applying the model to make predictions.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "If a dataset has a sample mean of 4.1 and a sample variance of 12.3, would a Poisson distribution be a good model? What does a variance much larger than the mean suggest about the real-world process? (2 steps)", "answer": "- Step 1: No, a Poisson distribution would be a very poor model because the variance (12.3) is roughly three times the mean (4.1), violating the Poisson requirement that mean $$\\approx$$ variance.\n- Step 2: A variance much larger than the mean indicates **overdispersion**. In the real world, this suggests the events are not independent (they cluster together) or the average rate is not constant (e.g., there are \"busy\" and \"quiet\" periods mixing together).\n\nOverdispersion means the data is more spread out than the Poisson model can account for.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Under what conditions can a Binomial distribution $$B(n, p)$$ be approximated by a Poisson distribution $$Po(\\lambda)$$? What is $$\\lambda$$ in terms of $$n$$ and $$p$$, and why does this make intuitive sense? (3 steps)", "answer": "- Step 1: The approximation is valid when the number of trials $$n$$ is **large** and the probability of success $$p$$ is **small** (typically $$n > 50$$ and $$p < 0.1$$).\n- Step 2: The Poisson parameter is $$\\lambda = np$$, which is the expected value (mean) of the Binomial distribution.\n- Step 3: Intuitively, a large $$n$$ and small $$p$$ describe \"rare events\" occurring across many opportunities. This mirrors the Poisson setup, which models rare events occurring randomly over a continuous interval. Furthermore, the Binomial variance $$np(1-p)$$ approaches $$np$$ (which is $$\\lambda$$) as $$p$$ approaches 0, satisfying the Poisson mean=variance property.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "If $$X \\sim Po(\\lambda)$$ and you are given that $$P(X=2) = P(X=3)$$, how can you find the value of $$\\lambda$$? (3 steps)", "answer": "- Step 1: Set up the equation using the Poisson formula: $$\\frac{e^{-\\lambda} \\lambda^2}{2!} = \\frac{e^{-\\lambda} \\lambda^3}{3!}$$.\n- Step 2: Cancel out the common terms on both sides. $$e^{-\\lambda}$$ cancels out, and $$\\lambda^2$$ cancels from the numerator of both sides (assuming $$\\lambda \\neq 0$$). This leaves $$\\frac{1}{2} = \\frac{\\lambda}{6}$$.\n- Step 3: Solve for $$\\lambda$$ by cross-multiplying: $$6 = 2\\lambda$$, so $$\\lambda = 3$$.\n\nThis logic works for any probability equality; just cancel the common factorial and exponential terms to isolate $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "If $$X \\sim Po(\\lambda)$$ and $$Y \\sim Po(\\mu)$$ are independent, and $$Q = X+Y$$, derive the formula for $$P(Q=0)$$ and $$P(Q=1)$$ from first principles. (4 steps)", "answer": "- Step 1: For the sum of two non-negative integers to be 0, both must be 0. So, $$P(Q=0) = P(X=0 \\text{ and } Y=0)$$. By independence, this is $$P(X=0) \\times P(Y=0) = e^{-\\lambda} \\times e^{-\\mu} = e^{-(\\lambda + \\mu)}$$.\n- Step 2: For the sum to be 1, one variable must be 1 and the other must be 0. There are two mutually exclusive scenarios: ($$X=1$$ and $$Y=0$$) OR ($$X=0$$ and $$Y=1$$).\n- Step 3: Calculate the probability of the first scenario: $$P(X=1) \\times P(Y=0) = (\\lambda e^{-\\lambda}) \\times e^{-\\mu} = \\lambda e^{-(\\lambda + \\mu)}$$.\n- Step 4: Calculate the probability of the second scenario: $$P(X=0) \\times P(Y=1) = e^{-\\lambda} \\times (\\mu e^{-\\mu}) = \\mu e^{-(\\lambda + \\mu)}$$. Add them together: $$(\\lambda + \\mu)e^{-(\\lambda + \\mu)}$$.\n\nNotice these are exactly the formulas for $$P(Q=0)$$ and $$P(Q=1)$$ of a $$Po(\\lambda + \\mu)$$ distribution, proving the additive property for these initial cases.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "How does the visual shape of the Poisson distribution change as the parameter $$\\lambda$$ increases from a very small value (e.g., 0.5) to a larger value (e.g., 10)? (3 steps)", "answer": "- Step 1: For very small $$\\lambda$$ (like 0.5), the distribution is heavily right-skewed. The highest probability is at $$X=0$$, and the probabilities drop off rapidly as $$X$$ increases.\n- Step 2: As $$\\lambda$$ increases to moderate values (around 3 to 5), the distribution becomes less skewed. The peak shifts to the right (near the mean), and the tail extends further.\n- Step 3: For larger $$\\lambda$$ (above 10), the distribution begins to look symmetric and bell-shaped, closely approximating a Normal distribution. \n\nThis visual shift occurs because as the average rate rises, the relative fluctuation (standard deviation relative to the mean) decreases, centering the distribution around $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}], "count": 22}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "The binomial distribution models the number of successes in a fixed number of trials. What fundamentally different type of real-world scenario does the Poisson distribution model, and why does this mean the Poisson has no upper limit on its values? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **number of times an event occurs within a fixed interval of time or space** — things like phone calls per hour, flaws per metre of cloth, or radioactive emissions per minute. Unlike the binomial, there is no concept of \"trials\" or \"success/failure\" per trial.\n- Step 2: Because we are simply *counting occurrences* in a continuous interval, there is no natural upper bound. In theory, an arbitrarily large number of phone calls could arrive in an hour (even if extremely unlikely). The Poisson variable $$X$$ can take any non-negative integer value: $$x = 0, 1, 2, 3, \\ldots$$\n- Step 3: The parameter $$\\lambda$$ controls the average rate, and probabilities for large $$x$$ values decay rapidly (due to the $$\\frac{\\lambda^x}{x!}$$ term where $$x!$$ grows faster than $$\\lambda^x$$), so high counts are practically negligible — but theoretically possible.\n\nThe Poisson counts *events in a continuum*, not *successes in a finite trial set* — this is why its range is unbounded above.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "Write the probability mass function (PMF) for a Poisson random variable $$X \\sim \\operatorname{Po}(\\lambda)$$, and identify what each symbol in the formula represents.", "answer": "The Poisson PMF is:\n\n$$\\mathrm{P}(X = x) = \\frac{e^{-\\lambda} \\lambda^{x}}{x!}$$, where $$x = 0, 1, 2, 3, \\ldots$$\n\n+ $$e$$: the base of natural logarithms (~2.718), arising from the continuous-time nature of the process\n+ $$\\lambda$$: the **mean rate parameter** — the average number of events expected in the given interval\n+ $$x$$: the specific count of events we are finding the probability for (must be a non-negative integer)\n+ $$x!$$: the factorial of $$x$$, which ensures probabilities decrease for larger counts and makes the distribution sum to 1\n+ $$e^{-\\lambda}$$: a scaling factor that ensures all probabilities sum to 1 (it's the probability of zero events)\n\nThe formula gives the probability of observing exactly $$x$$ events when the average rate is $$\\lambda$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A valid probability distribution must satisfy $$\\sum \\mathrm{P}(X = x) = 1$$ over all possible values. Walk through why the Poisson PMF satisfies this, identifying the key mathematical identity used. (3 steps)", "answer": "- Step 1: Write out the sum of all Poisson probabilities:\n\n$$\\sum_{x=0}^{\\infty} \\mathrm{P}(X = x) = e^{-\\lambda} + \\frac{e^{-\\lambda}\\lambda}{1!} + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\cdots$$\n\n- Step 2: Factor out the common term $$e^{-\\lambda}$$:\n\n$$\\sum \\mathrm{P}(X = x) = e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$\n\nThe bracketed series is exactly the **Taylor/Maclaurin series expansion** of $$e^{\\lambda}$$.\n\n- Step 3: Substitute the series with $$e^{\\lambda}$$:\n\n$$\\sum \\mathrm{P}(X = x) = e^{-\\lambda} \\cdot e^{\\lambda} = e^{0} = 1$$\n\nThis is why $$e^{-\\lambda}$$ appears in every term — it's the \"normalising constant\" that compensates for the exponential series, ensuring the total probability is exactly 1.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In the Poisson distribution $$X \\sim \\operatorname{Po}(\\lambda)$$, what does the single parameter $$\\lambda$$ represent in terms of real-world meaning, and why is having only one parameter (instead of two, like the binomial's $$n$$ and $$p$$) significant? (3 steps)", "answer": "- Step 1: $$\\lambda$$ represents the **average rate** — the mean number of events expected to occur in the given interval. If phone calls arrive at 2.82 per day, then $$\\lambda = 2.82$$.\n- Step 2: Having only one parameter is significant because for the Poisson, **the mean equals the variance**: both are $$\\lambda$$. In the binomial, mean $$= np$$ and variance $$= np(1-p)$$, which are generally different and require two parameters. The Poisson's mean-variance equality means knowing the average rate automatically determines the spread.\n- Step 3: This reflects a deep property: when events occur independently at a constant rate in continuous time, the average rate completely determines the distribution's shape. There's no separate \"spread\" parameter — the variability is locked to the mean.\n\nOne parameter suffices because mean = variance = $$\\lambda$$; the rate determines everything.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "Three conditions must hold for the Poisson distribution to be a valid model for a real-world process. Name all three, and for each, give a one-sentence explanation of what it means practically.", "answer": "The three conditions are:\n\n1. **Events occur independently** — the occurrence of one event does not affect the probability of another event happening. (e.g., one phone call arriving doesn't make the next call more or less likely)\n\n2. **Events occur singly** — events cannot happen simultaneously at the same instant; they occur one at a time in the interval. (e.g., two phone calls can't arrive at the exact same moment on a single line)\n\n3. **Events occur at a constant average rate** — the mean number of events per unit of time/space is steady, so the mean count in any interval is proportional to the interval's length. (e.g., the rate of calls per hour doesn't change depending on which hour you observe)\n\nAll three must hold simultaneously; violating any one makes the Poisson an inappropriate model.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "The Poisson model requires events to occur \"singly.\" Give a concrete real-world scenario where this condition is **violated**, and explain what distributional consequence this violation would produce. (3 steps)", "answer": "- Step 1: Consider **car accidents at an intersection**. Sometimes multiple cars are involved in the same accident simultaneously (a multi-car pile-up). This means events can occur in \"batches\" or clusters, not singly.\n- Step 2: When events arrive in batches, the observed distribution will have **more variance than a Poisson with the same mean**. The Poisson assumes each occurrence is separate, so counts spread in a specific way. Batching increases variability — you get more 0s (no accident at all) and more high counts (big pile-ups) than Poisson would predict.\n- Step 3: This leads to **overdispersion**: the sample variance exceeds the sample mean. A Poisson model would underestimate the probability of both very low and very high counts. A negative binomial distribution (which allows for clustering) would be more appropriate.\n\nViolating \"singly\" causes overdispersion (variance > mean), making Poisson a poor fit.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "The Poisson model requires events to occur at a \"constant average rate.\" Give a scenario where this condition is **violated**, and explain the consequence for modelling. (3 steps)", "answer": "- Step 1: Consider **phone calls to a school office**. The rate is much higher during morning drop-off (8–9 am) and much lower during lunch or after school. The rate varies by time of day.\n- Step 2: If you model the full day with a single $$\\lambda$$, you're averaging a high-rate period and a low-rate period. The resulting Poisson would predict a moderate, steady flow — but reality has bursts and lulls. The observed data would show **more variance than mean** (overdispersion), because the mixing of different rates increases variability.\n- Step 3: To model this properly, you could either: restrict analysis to a sub-period where the rate is approximately constant, or use a more sophisticated model that allows the rate to vary (like a Poisson process with time-varying $$\\lambda(t)$$).\n\nNon-constant rate → mixing of rates → overdispersion → Poisson is inappropriate unless you isolate a constant-rate sub-interval.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "The Poisson model requires events to occur \"independently.\" Give a scenario where this condition is **violated**, and explain what happens to the variance. (3 steps)", "answer": "- Step 1: Consider **disease outbreaks in a population**. If one person gets infected, they can infect others nearby. The occurrence of one event (infection) directly increases the probability of further events — events are positively correlated, not independent.\n- Step 2: Positive dependence causes **clustering**: infections come in waves rather than scattered uniformly. This means you observe more periods with zero infections and more periods with many infections than Poisson predicts.\n- Step 3: The consequence is again **overdispersion** (variance > mean). The Poisson would underestimate the probability of large outbreaks. For contagious processes, models incorporating dependence (like chain-binomial or SIR models) are needed.\n\nViolating independence (positive correlation) → clustering → overdispersion → Poisson fails to capture the bursty pattern.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "How does the Poisson distribution differ from the binomial distribution in terms of: (a) the type of scenario it models, (b) the number of parameters, and (c) the range of possible values? Walk through each difference. (3 steps)", "answer": "- Step 1: **Scenario type**: Binomial models a *fixed number of discrete trials* ($$n$$ trials) each with two outcomes (success/failure). Poisson models *events occurring in a continuous interval* of time or space — there are no \"trials,\" just a flowing process where events appear.\n+ Binomial example: \"Flip 20 coins, count heads\"\n+ Poisson example: \"Count radio emissions in 5 minutes\"\n\n- Step 2: **Parameters**: Binomial has two parameters $$n$$ (number of trials) and $$p$$ (success probability per trial). Poisson has just one parameter $$\\lambda$$ (average rate). This is because in Poisson, mean = variance = $$\\lambda$$, whereas in binomial, mean $$= np$$ and variance $$= np(1-p)$$ are generally different.\n\n- Step 3: **Range**: Binomial values are bounded: $$X \\in \\{0, 1, 2, \\ldots, n\\}$$ — you can't get more successes than trials. Poisson values are **unbounded**: $$X \\in \\{0, 1, 2, 3, \\ldots\\}$$ — there's no theoretical maximum, though very large values have negligible probability.\n\nPoisson: continuous-time counting, one parameter, unbounded range. Binomial: discrete trials, two parameters, bounded range.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, what is $$\\mathrm{P}(X = 0)$$? Give the simplified expression and explain intuitively what this probability represents. (2 steps)", "answer": "- Step 1: Substituting $$x = 0$$ into the Poisson PMF:\n\n$$\\mathrm{P}(X = 0) = \\frac{e^{-\\lambda} \\lambda^{0}}{0!} = \\frac{e^{-\\lambda} \\cdot 1}{1} = e^{-\\lambda}$$\n\nThis is the simplest Poisson probability — no factorial or power of $$\\lambda$$ to compute (since $$\\lambda^0 = 1$$ and $$0! = 1$$).\n\n- Step 2: Intuitively, $$e^{-\\lambda}$$ is the probability that **no events occur** in the interval. When $$\\lambda$$ is small (rare events), $$e^{-\\lambda} \\approx 1$$ — it's very likely nothing happens. When $$\\lambda$$ is large, $$e^{-\\lambda}$$ becomes very small — it's extremely unlikely to see zero events when the average rate is high.\n\n$$\\mathrm{P}(X = 0) = e^{-\\lambda}$$ — the probability of a completely quiet interval, which shrinks exponentially as the rate increases.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, how can you compute $$\\mathrm{P}(X \\geq 1)$$ efficiently without summing an infinite series? Walk through the logic. (2 steps)", "answer": "- Step 1: The event $$X \\geq 1$$ is the **complement** of the event $$X = 0$$. Since all probabilities must sum to 1:\n\n$$\\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0)$$\n\n- Step 2: We already know $$\\mathrm{P}(X = 0) = e^{-\\lambda}$$, so:\n\n$$\\mathrm{P}(X \\geq 1) = 1 - e^{-\\lambda}$$\n\nThis is a powerful shortcut: instead of computing $$\\mathrm{P}(X=1) + \\mathrm{P}(X=2) + \\cdots$$ (an infinite sum), we use the complement with the simplest Poisson probability. This trick works because the Poisson range starts at 0, so the complement of \"at least 1\" is exactly \"zero.\"\n\nComplement trick: $$\\mathrm{P}(X \\geq 1) = 1 - e^{-\\lambda}$$ — avoids infinite summation entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "For a Poisson variable $$X$$, what values of $$x$$ satisfy the inequality $$1 < X \\leq 4$$? Explain why you must be careful about which integers to include. (2 steps)", "answer": "- Step 1: Since $$X$$ is a discrete random variable taking values $$0, 1, 2, 3, \\ldots$$, the inequality $$1 < X \\leq 4$$ means: strictly greater than 1, and at most 4. The integers satisfying this are $$x = 2, 3, 4$$.\n+ $$x = 1$$ is excluded because $$X$$ must be *strictly* greater than 1\n+ $$x = 5$$ is excluded because $$X$$ must be *at most* 4\n\n- Step 2: The probability is then:\n\n$$\\mathrm{P}(1 < X \\leq 4) = \\mathrm{P}(X=2) + \\mathrm{P}(X=3) + \\mathrm{P}(X=4)$$\n\nCommon mistake: including $$x = 1$$ (confusing $$<$$ with $$\\leq$$) or including $$x = 5$$ (confusing $$\\leq$$ with $$<$$). Always translate inequalities to exact integer lists for discrete variables.\n\nFor discrete variables, always convert inequalities to the exact set of qualifying integers: $$1 < X \\leq 4$$ means $$\\{2, 3, 4\\}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What probability do Poisson cumulative distribution tables directly provide, and how does this differ from what the PMF formula gives? (2 steps)", "answer": "- Step 1: The cumulative tables directly provide $$\\mathrm{P}(X \\leq x)$$ — the probability that the count is **at most** $$x$$, i.e., the sum of probabilities from 0 up to $$x$$:\n\n$$\\mathrm{P}(X \\leq x) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\cdots + \\mathrm{P}(X=x)$$\n\nThe PMF formula gives individual probabilities $$\\mathrm{P}(X = x)$$ for a single value.\n\n- Step 2: The tables are organised by $$\\lambda$$ (rows, in steps of 0.5 from 0 to 10) and $$x$$ (columns, from 0 to 10). To find other probabilities, you combine table values:\n+ $$\\mathrm{P}(X \\geq k) = 1 - \\mathrm{P}(X \\leq k-1)$$ (complement)\n+ $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(X \\leq b) - \\mathrm{P}(X \\leq a-1)$$ (difference of cumulative values)\n+ $$\\mathrm{P}(X = k) = \\mathrm{P}(X \\leq k) - \\mathrm{P}(X \\leq k-1)$$ (difference of adjacent cumulative values)\n\nTables give $$\\mathrm{P}(X \\leq x)$$ directly; all other probability forms are built from differences and complements of these.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Given $$X \\sim \\operatorname{Po}(7.5)$$ and $$\\mathrm{P}(X \\leq a) = 0.2414$$, walk through how to find the value of $$a$$ using cumulative tables. (3 steps)", "answer": "- Step 1: Look up the cumulative table for $$\\lambda = 7.5$$. The table lists $$\\mathrm{P}(X \\leq x)$$ for each integer $$x$$ from 0 upward.\n- Step 2: Scan down the column for $$\\lambda = 7.5$$, looking for the cumulative probability 0.2414. You find:\n\n$$\\mathrm{P}(X \\leq 5) = 0.2414$$\n\n- Step 3: Since $$\\mathrm{P}(X \\leq a) = 0.2414$$ matches $$\\mathrm{P}(X \\leq 5) = 0.2414$$, we conclude $$a = 5$$.\n\nNote: $$a$$ must be an integer (since $$X$$ is discrete and the table gives cumulative probabilities at integer boundaries). You're matching a given probability to a table entry, not solving a continuous equation.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Given $$X \\sim \\operatorname{Po}(7.5)$$ and $$\\mathrm{P}(X < b) = 0.5246$$, why must you convert this to $$\\mathrm{P}(X \\leq b-1)$$ before using cumulative tables, and what is $$b$$? (3 steps)", "answer": "- Step 1: The cumulative tables give $$\\mathrm{P}(X \\leq x)$$, not $$\\mathrm{P}(X < x)$$. For a **discrete** variable, $$X < b$$ means $$X$$ takes values $$0, 1, \\ldots, b-1$$ (strictly less than $$b$$), which is exactly the event $$X \\leq b-1$$.\n+ If $$b = 8$$, then $$X < 8$$ means $$X \\in \\{0,1,2,\\ldots,7\\}$$, which is $$X \\leq 7$$.\n\n- Step 2: Convert: $$\\mathrm{P}(X < b) = \\mathrm{P}(X \\leq b-1) = 0.5246$$. Now look up the table for $$\\lambda = 7.5$$ and find where the cumulative probability equals 0.5246. You find:\n\n$$\\mathrm{P}(X \\leq 7) = 0.5246$$\n\n- Step 3: So $$b - 1 = 7$$, giving $$b = 8$$.\n\nFor discrete variables, strict inequality $$X < b$$ is equivalent to $$X \\leq b-1$$ — this conversion is essential for using cumulative tables correctly.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Given $$X \\sim \\operatorname{Po}(7.5)$$ and $$\\mathrm{P}(X \\geq c) = 0.3380$$, walk through the steps to find $$c$$. (3 steps)", "answer": "- Step 1: Convert the \"at least\" inequality to a cumulative form using the complement rule:\n\n$$\\mathrm{P}(X \\geq c) = 1 - \\mathrm{P}(X \\leq c - 1)$$\n\nSo $$1 - \\mathrm{P}(X \\leq c-1) = 0.3380$$, which gives:\n\n$$\\mathrm{P}(X \\leq c-1) = 1 - 0.3380 = 0.6620$$\n\n- Step 2: Look up the cumulative table for $$\\lambda = 7.5$$ and find where $$\\mathrm{P}(X \\leq x) = 0.6620$$:\n\n$$\\mathrm{P}(X \\leq 8) = 0.6620$$\n\n- Step 3: So $$c - 1 = 8$$, giving $$c = 9$$.\n\nCheck: $$\\mathrm{P}(X \\geq 9) = 1 - \\mathrm{P}(X \\leq 8) = 1 - 0.6620 = 0.3380$$. ✓\n\nFor $$X \\geq c$$, use complement: find $$c-1$$ such that $$\\mathrm{P}(X \\leq c-1) = 1 - \\mathrm{P}(X \\geq c)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A Poisson process has rate $$\\lambda = 4$$ events per hour. If you observe the process over a 2-hour period, what is the parameter of the Poisson distribution for the total count, and why? (3 steps)", "answer": "- Step 1: The \"constant average rate\" condition means the expected number of events is **proportional to the interval length**. If the rate is 4 per hour, then in 2 hours the expected count is $$4 \\times 2 = 8$$.\n- Step 2: The new parameter is $$\\lambda_{\\text{new}} = 4 \\times 2 = 8$$, so the total count $$Y$$ in 2 hours follows $$Y \\sim \\operatorname{Po}(8)$$.\n- Step 3: This proportionality works because the Poisson process splits cleanly: the first hour contributes $$\\operatorname{Po}(4)$$ and the second hour independently contributes $$\\operatorname{Po}(4)$$, so by the additive property, the total is $$\\operatorname{Po}(4+4) = \\operatorname{Po}(8)$$.\n\n$$\\lambda$$ scales with interval length: $$\\lambda_{\\text{new}} = \\lambda \\times \\frac{\\text{new interval}}{\\text{original interval}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why does the Poisson parameter $$\\lambda$$ scale proportionally with the observation interval length? Connect this to both the \"constant rate\" condition and the additive property. (3 steps)", "answer": "- Step 1: The **constant average rate** condition states that events occur at a steady rate over time. This means if you see an average of $$\\lambda$$ events in 1 unit of time, you expect $$2\\lambda$$ in 2 units, $$3\\lambda$$ in 3 units, etc. The mean count grows linearly with interval length.\n- Step 2: The **additive property** provides the mathematical justification. A longer interval can be split into sub-intervals. If each sub-interval of length 1 has count $$\\sim \\operatorname{Po}(\\lambda)$$, and these are independent (by the Poisson conditions), then the total over $$k$$ sub-intervals is $$\\operatorname{Po}(k\\lambda)$$ by repeated addition.\n- Step 3: Together, these give us confidence that scaling $$\\lambda$$ is valid: if the rate is truly constant, any interval of length $$t$$ has parameter $$\\lambda t$$ (where $$\\lambda$$ is the rate per unit time). This is why, for example, a rate of 4 per hour becomes $$\\lambda = 6$$ for 90 minutes: $$4 \\times \\frac{90}{60} = 6$$.\n\nProportionality of $$\\lambda$$ to interval length follows from constant rate (physical justification) and additive property (mathematical justification).", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Internet connection failures occur at an average rate of 4 per hour. What distribution models failures in a 90-minute period, and what is its parameter? Walk through the scaling. (2 steps)", "answer": "- Step 1: The rate is 4 per hour (60 minutes). For a 90-minute period, scale proportionally:\n\n$$\\lambda_{90\\text{min}} = 4 \\times \\frac{90}{60} = 4 \\times 1.5 = 6$$\n\n- Step 2: Let $$Y$$ = number of failed connections in 90 minutes. Then $$Y \\sim \\operatorname{Po}(6)$$.\n\nThe key insight: always express the new interval as a fraction/multiple of the original interval for which the rate is given, then multiply $$\\lambda$$ by that ratio.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y \\sim \\operatorname{Po}(\\mu)$$ are independent, what is the distribution of $$X + Y$$? State the result and explain the key requirement for this to be valid. (2 steps)", "answer": "- Step 1: The result is:\n\n$$X + Y \\sim \\operatorname{Po}(\\lambda + \\mu)$$\n\nThe parameters simply add. This is the **additive property** of independent Poisson distributions.\n\n- Step 2: The key requirement is that **$$X$$ and $$Y$$ must be independent AND must model events occurring within the same type of interval** (same time period, same spatial region, etc.). You can't add \"calls in 1 hour\" to \"calls in 15 minutes\" directly — you must first adjust the intervals to match, then add.\n\nIndependence + matching intervals → parameters add: $$\\operatorname{Po}(\\lambda) + \\operatorname{Po}(\\mu) = \\operatorname{Po}(\\lambda + \\mu)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Intuitively, why does adding two independent Poisson variables produce another Poisson with parameter $$\\lambda + \\mu$$? Explain without heavy algebra. (3 steps)", "answer": "- Step 1: Think of two independent streams of events merging into one. Stream A produces events at rate $$\\lambda$$, Stream B at rate $$\\mu$$. The combined stream has events arriving at rate $$\\lambda + \\mu$$ (the rates add because events from both streams flow into the same timeline).\n- Step 2: The combined stream still satisfies all Poisson conditions: events occur independently (since A and B are independent), singly (two events from different streams can't arrive at the exact same instant in continuous time), and at a constant rate (the total rate $$\\lambda + \\mu$$ is steady).\n- Step 3: Since the merged stream satisfies the Poisson conditions and has rate $$\\lambda + \\mu$$, the total count must follow $$\\operatorname{Po}(\\lambda + \\mu)$$.\n\nTwo independent Poisson streams merge into one Poisson stream — rates add just like merging two lanes of traffic increases the total flow rate.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "Cars pass a point at mean rate 2 per 5 minutes, and other vehicles pass at mean rate 3 per 15 minutes. Before adding these to find the total vehicle count in a 10-minute interval, what crucial step must you take? (3 steps)", "answer": "- Step 1: The additive property requires both variables to cover the **same time interval**. Here, cars are counted over 5 minutes and other vehicles over 15 minutes — these intervals don't match, so you can't add parameters directly.\n- Step 2: Adjust both to the target interval of 10 minutes:\n+ Cars in 10 min: $$\\lambda_{\\text{cars}} = 2 \\times \\frac{10}{5} = 4$$, so $$X_1 \\sim \\operatorname{Po}(4)$$\n+ Other vehicles in 10 min: $$\\lambda_{\\text{other}} = 3 \\times \\frac{10}{15} = 2$$, so $$Y_1 \\sim \\operatorname{Po}(2)$$\n\n- Step 3: Now add: $$X_1 + Y_1 \\sim \\operatorname{Po}(4 + 2) = \\operatorname{Po}(6)$$.\n\nNever add Poisson parameters until you've adjusted both variables to the **same interval** — this is the most common error in Poisson addition problems.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "If $$X \\sim \\operatorname{Po}(3)$$ and $$Y \\sim \\operatorname{Po}(4)$$ are independent, can you find $$\\mathrm{P}(X = 2 \\text{ and } Y = 2)$$ directly from the distribution of $$X + Y \\sim \\operatorname{Po}(7)$$? Explain why or why not. (3 steps)", "answer": "- Step 1: No, you cannot. The distribution of $$X + Y$$ tells you about the **total** count, not the **individual** counts that compose it. $$\\mathrm{P}(X + Y = 4)$$ includes all ways to get a total of 4: $$X=0,Y=4$$, $$X=1,Y=3$$, $$X=2,Y=2$$, $$X=3,Y=1$$, $$X=4,Y=0$$.\n- Step 2: To find $$\\mathrm{P}(X = 2 \\text{ and } Y = 2)$$, you must use the **independence** of $$X$$ and $$Y$$ directly:\n\n$$\\mathrm{P}(X=2 \\text{ and } Y=2) = \\mathrm{P}(X=2) \\times \\mathrm{P}(Y=2)$$\n\nCompute each Poisson probability separately and multiply.\n\n- Step 3: The additive property gives the distribution of the **sum**, which is useful for questions about totals. But questions about individual components require working with the original distributions separately.\n\nThe sum's distribution doesn't encode how the total was split between $$X$$ and $$Y$$ — for joint events, use independence directly.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, state the mean and variance, and explain why mean = variance is a distinctive and useful property. (3 steps)", "answer": "- Step 1: For $$X \\sim \\operatorname{Po}(\\lambda)$$:\n+ Mean: $$\\mathrm{E}(X) = \\lambda$$\n+ Variance: $$\\operatorname{Var}(X) = \\lambda$$\n\nBoth are equal to the same parameter.\n\n- Step 2: This is distinctive because most distributions have different mean and variance. For binomial: mean $$= np$$, variance $$= np(1-p) < np$$. For Poisson, the spread grows in lockstep with the centre — a higher mean automatically means more variability.\n- Step 3: This is **useful as a diagnostic tool**: when analysing real data, if the sample mean is approximately equal to the sample variance, this suggests a Poisson model might be appropriate. If variance >> mean (overdispersion) or variance << mean (underdispersion), Poisson is likely unsuitable.\n\nMean = Variance = $$\\lambda$$ is both a mathematical fact and a practical diagnostic: check if sample mean ≈ sample variance to assess Poisson suitability.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "Why does mean = variance in a Poisson distribution make sense intuitively? Think about what happens to the spread of counts as the average rate increases. (3 steps)", "answer": "- Step 1: When $$\\lambda$$ is small (say 0.5), most of the probability mass is concentrated near 0 and 1 — the distribution is tightly clustered with low variability. The variance (0.5) is small, matching the small mean.\n- Step 2: When $$\\lambda$$ is large (say 10), counts can range widely — you might see 6 or 14 events even though the average is 10. The distribution spreads out. The variance (10) is large, matching the large mean.\n- Step 3: This makes sense because in a random counting process, higher rates mean more \"room\" for random fluctuation. If you expect 10 events, random variation might add or subtract a few; if you expect 0.5, there's barely room to vary. The variability scales with the rate itself, hence variance = mean.\n\nHigher average rate → more potential for random fluctuation → variance grows with mean. This is the natural behaviour of random counting processes.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Data is collected and the sample mean is 3.69 with sample variance 3.73. How does this support choosing a Poisson model, and what value of $$\\lambda$$ would you use? (3 steps)", "answer": "- Step 1: For a Poisson distribution, the theoretical mean and variance are both $$\\lambda$$, so they should be approximately equal. Here, mean (3.69) and variance (3.73) are very close — differing by only 0.04. This near-equality supports the Poisson as a reasonable model.\n- Step 2: If the variance were much larger (say 12) or much smaller (say 1), this would indicate overdispersion or underdispersion, ruling out Poisson. The close match is the key evidence.\n- Step 3: For the model parameter, use a value that represents both the mean and variance. A sensible choice is $$\\lambda = 3.7$$ (rounding the mean to 1 decimal place, which also approximates the variance well). Then $$X \\sim \\operatorname{Po}(3.7)$$ for subsequent probability calculations.\n\nMean ≈ Variance → Poisson plausible. Use $$\\lambda$$ ≈ their common value (here 3.7) as the model parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "If you collect data and find the sample mean is 5 but the sample variance is 12, would a Poisson model be appropriate? Explain what this discrepancy tells you about the underlying process. (3 steps)", "answer": "- Step 1: For Poisson, mean ≈ variance. Here, variance (12) is more than double the mean (5). This is **overdispersion** — the data is much more spread out than a Poisson distribution with $$\\lambda = 5$$ would predict.\n- Step 2: Overdispersion suggests one or more Poisson conditions are violated. Likely causes:\n+ Events occur in clusters/batches (violating \"singly\") — e.g., customers arriving in groups\n+ The rate varies across the observation periods (violating \"constant rate\") — e.g., busier and quieter periods mixed\n+ Events are positively correlated (violating \"independence\") — e.g., contagion effects\n\n- Step 3: A Poisson model with $$\\lambda = 5$$ would underestimate the probability of extreme values (both very low and very high counts). A negative binomial distribution, which has variance > mean, would be more appropriate.\n\nVariance >> Mean → overdispersion → Poisson conditions violated → Poisson is unsuitable; consider alternative models.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "Given $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$\\mathrm{P}(X = 2) = \\mathrm{P}(X = 3)$$, walk through finding $$\\lambda$$ algebraically. (3 steps)", "answer": "- Step 1: Write out both probabilities using the PMF:\n\n$$\\mathrm{P}(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$ and $$\\mathrm{P}(X=3) = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n\n- Step 2: Set them equal and simplify. The $$e^{-\\lambda}$$ cancels on both sides:\n\n$$\\frac{\\lambda^2}{2!} = \\frac{\\lambda^3}{3!}$$\n\n$$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6}$$\n\nCross-multiply: $$6\\lambda^2 = 2\\lambda^3$$, so $$3 = \\lambda$$ (dividing both sides by $$\\lambda^2$$, assuming $$\\lambda \\neq 0$$).\n\n- Step 3: Verify: $$\\lambda = 3$$ means $$\\mathrm{P}(X=2) = \\frac{e^{-3}\\cdot 9}{2}$$ and $$\\mathrm{P}(X=3) = \\frac{e^{-3}\\cdot 27}{6} = \\frac{e^{-3}\\cdot 9}{2}$$ — they match. ✓\n\nWhen two consecutive Poisson probabilities are equal, the ratio $$\\frac{\\mathrm{P}(X=k+1)}{\\mathrm{P}(X=k)} = \\frac{\\lambda}{k+1}$$ must equal 1, so $$\\lambda = k+1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Given $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$\\mathrm{P}(X = 4) = 3 \\times \\mathrm{P}(X = 2)$$, walk through finding $$\\lambda$$. (3 steps)", "answer": "- Step 1: Write out both probabilities:\n\n$$\\mathrm{P}(X=4) = \\frac{e^{-\\lambda}\\lambda^4}{4!}$$ and $$\\mathrm{P}(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$\n\n- Step 2: Set up the equation $$\\mathrm{P}(X=4) = 3\\mathrm{P}(X=2)$$ and simplify (cancel $$e^{-\\lambda}$$):\n\n$$\\frac{\\lambda^4}{24} = 3 \\times \\frac{\\lambda^2}{2}$$\n\n$$\\frac{\\lambda^4}{24} = \\frac{3\\lambda^2}{2}$$\n\nCross-multiply: $$2\\lambda^4 = 72\\lambda^2$$, so $$\\lambda^4 = 36\\lambda^2$$, giving $$\\lambda^2 = 36$$ (dividing by $$\\lambda^2$$), hence $$\\lambda = 6$$.\n\n- Step 3: Check: with $$\\lambda = 6$$, $$\\mathrm{P}(X=4) = \\frac{e^{-6}\\cdot 1296}{24} = 54e^{-6}$$ and $$3\\mathrm{P}(X=2) = 3 \\times \\frac{e^{-6}\\cdot 36}{2} = 54e^{-6}$$ — they match. ✓\n\nThe ratio of consecutive Poisson probabilities is $$\\frac{\\lambda}{k+1}$$; use this ratio structure to set up equations when given probability relationships.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "An estate agent sells houses at rate 1.8 per week. The problem asks: \"Find the probability that over 4 consecutive weeks she meets her weekly target exactly once.\" Why does this problem require **both** a Poisson and a binomial calculation? (3 steps)", "answer": "- Step 1: First, use the **Poisson** to find the probability of meeting the weekly target in a single week. If \"at least 3 houses\" is the target, compute $$\\mathrm{P}(X \\geq 3)$$ where $$X \\sim \\operatorname{Po}(1.8)$$. This gives a single probability value, call it $$p$$.\n- Step 2: Second, use the **binomial** to model \"how many weeks out of 4 meet the target.\" Each week is an independent trial with success probability $$p$$. The number of successful weeks $$Y \\sim \\operatorname{B}(4, p)$$.\n- Step 3: The final answer is $$\\mathrm{P}(Y = 1) = \\binom{4}{1}p^1(1-p)^3$$, using the binomial with the Poisson-derived $$p$$.\n\nThe Poisson gives the per-week success probability; the binomial counts how many weeks succeed. This two-stage structure appears whenever you're counting \"how many intervals satisfy a condition.\"", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "In a two-stage problem (Poisson → Binomial), what is the conceptual role of the Poisson probability in the binomial calculation? Why can't you skip the Poisson step? (2 steps)", "answer": "- Step 1: The Poisson step computes the **per-interval probability** $$p$$ — the chance that a single time period (e.g., one day, one week) satisfies whatever condition is specified (e.g., \"more than 4 patients,\" \"at least 3 houses sold\"). This probability $$p$$ is not given directly; it must be derived from the Poisson model.\n- Step 2: This $$p$$ then becomes the **success probability** in the binomial model. The binomial counts how many out of $$n$$ independent intervals have the condition satisfied, with each interval being a \"trial\" and $$p$$ being the success rate per trial. You can't skip the Poisson step because without it, you don't know what $$p$$ is.\n\nPoisson → compute $$p$$ (per-interval condition probability) → Binomial with parameter $$p$$ → answer about multiple intervals.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "Given $$X \\sim \\operatorname{Po}(2.1)$$, walk through setting up the calculation for $$\\mathrm{P}(X = 3)$$ using the PMF formula. Identify each component. (2 steps)", "answer": "- Step 1: The Poisson PMF is $$\\mathrm{P}(X = x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. With $$\\lambda = 2.1$$ and $$x = 3$$:\n\n$$\\mathrm{P}(X=3) = \\frac{e^{-2.1} \\times 2.1^3}{3!}$$\n\n- Step 2: Identify each component:\n+ $$e^{-2.1}$$ ≈ 0.1225 — the normalising factor (also equals $$\\mathrm{P}(X=0)$$)\n+ $$2.1^3 = 9.261$$ — the rate raised to the power of the target count\n+ $$3! = 6$$ — the factorial, which dampens the probability for higher counts\n+ Result: $$\\frac{0.1225 \\times 9.261}{6} ≈ 0.1890$$\n\nThe factorial in the denominator ensures that as $$x$$ increases beyond $$\\lambda$$, probabilities decrease — the distribution peaks near $$\\lambda$$ and tails off.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Flaws occur in material at a mean rate of 1.5 per 50m. The material is sold in 200m rolls. What is the Poisson parameter for a single 200m roll, and why? (2 steps)", "answer": "- Step 1: The rate is 1.5 per 50m. For a 200m roll, the length is 4 times the base interval, so by proportionality:\n\n$$\\lambda_{200\\text{m}} = 1.5 \\times \\frac{200}{50} = 1.5 \\times 4 = 6$$\n\n- Step 2: Let $$X$$ = number of flaws in a 200m roll. Then $$X \\sim \\operatorname{Po}(6)$$.\n\nThe rate per unit length multiplied by the total length gives the expected count, which is the Poisson parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y \\sim \\operatorname{Po}(\\mu)$$ are independent, and $$Q = X + Y$$, show that $$\\mathrm{P}(Q = 0) = e^{-(\\lambda+\\mu)}$$. Walk through the derivation. (3 steps)", "answer": "- Step 1: $$Q = 0$$ means both $$X = 0$$ and $$Y = 0$$ (since both are non-negative). By independence:\n\n$$\\mathrm{P}(Q=0) = \\mathrm{P}(X=0) \\times \\mathrm{P}(Y=0)$$\n\n- Step 2: Using the Poisson PMF with $$x = 0$$:\n\n$$\\mathrm{P}(X=0) = e^{-\\lambda}$$ and $$\\mathrm{P}(Y=0) = e^{-\\mu}$$\n\n- Step 3: Multiply:\n\n$$\\mathrm{P}(Q=0) = e^{-\\lambda} \\times e^{-\\mu} = e^{-\\lambda - \\mu} = e^{-(\\lambda+\\mu)}$$\n\nThis matches the PMF of $$\\operatorname{Po}(\\lambda + \\mu)$$ evaluated at $$x = 0$$: $$\\frac{e^{-(\\lambda+\\mu)}(\\lambda+\\mu)^0}{0!} = e^{-(\\lambda+\\mu)}$$. ✓ — confirming the additive property for the case $$Q = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y \\sim \\operatorname{Po}(\\mu)$$ are independent, and $$Q = X + Y$$, show that $$\\mathrm{P}(Q = 1) = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$. Walk through the derivation. (3 steps)", "answer": "- Step 1: $$Q = 1$$ means either $$X = 1, Y = 0$$ or $$X = 0, Y = 1$$ (the only ways to get a total of 1 from two non-negative integers). By independence:\n\n$$\\mathrm{P}(Q=1) = \\mathrm{P}(X=1)\\mathrm{P}(Y=0) + \\mathrm{P}(X=0)\\mathrm{P}(Y=1)$$\n\n- Step 2: Compute each term:\n+ $$\\mathrm{P}(X=1)\\mathrm{P}(Y=0) = \\frac{e^{-\\lambda}\\lambda}{1!} \\times e^{-\\mu} = \\lambda e^{-\\lambda-\\mu}$$\n+ $$\\mathrm{P}(X=0)\\mathrm{P}(Y=1) = e^{-\\lambda} \\times \\frac{e^{-\\mu}\\mu}{1!} = \\mu e^{-\\lambda-\\mu}$$\n\n- Step 3: Add:\n\n$$\\mathrm{P}(Q=1) = \\lambda e^{-(\\lambda+\\mu)} + \\mu e^{-(\\lambda+\\mu)} = (\\lambda + \\mu)e^{-(\\lambda+\\mu)}$$\n\nThis matches the PMF of $$\\operatorname{Po}(\\lambda+\\mu)$$ at $$x = 1$$: $$\\frac{e^{-(\\lambda+\\mu)}(\\lambda+\\mu)^1}{1!} = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$. ✓\n\nThe two ways to get a total of 1 correspond to the two terms, and their sum gives exactly the Poisson PMF for the combined parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A Poisson distribution with very small $$\\lambda$$ (say $$\\lambda = 0.5$$) — qualitatively, where is most of the probability mass concentrated, and what does this mean practically? (3 steps)", "answer": "- Step 1: With $$\\lambda = 0.5$$, $$\\mathrm{P}(X=0) = e^{-0.5} \\approx 0.607$$ — over 60% of the time, no events occur at all. $$\\mathrm{P}(X=1) \\approx 0.303$$, so about 30% of the time exactly one event occurs.\n- Step 2: Together, $$\\mathrm{P}(X \\leq 1) \\approx 0.91$$ — the distribution is heavily concentrated at 0 and 1. Values of 2, 3, or more are rare (about 9% combined).\n- Step 3: Practically, a small $$\\lambda$$ means the event is rare. Most intervals are \"quiet\" (zero events), and when events do occur, they almost always appear alone. This is why Poisson with small $$\\lambda$$ is used to model rare phenomena: radioactive decay events, rare diseases, equipment failures in a short period.\n\nSmall $$\\lambda$$ → most probability at 0 and 1 → the model describes rare, isolated events.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "A Poisson distribution with large $$\\lambda$$ (say $$\\lambda = 10$$) — qualitatively, what shape does the distribution have, and what does this connect to? (3 steps)", "answer": "- Step 1: With $$\\lambda = 10$$, the distribution is **approximately symmetric and bell-shaped**, centred around 10. The mode (most probable value) is near $$\\lambda$$, and probabilities decrease smoothly on both sides.\n- Step 2: The standard deviation is $$\\sqrt{\\lambda} = \\sqrt{10} \\approx 3.16$$, so most values fall within roughly 10 ± 6 (two standard deviations). The spread is moderate relative to the mean.\n- Step 3: For large $$\\lambda$$, the Poisson distribution approximates a **Normal distribution** with mean $$\\lambda$$ and variance $$\\lambda$$ (i.e., $$N(\\lambda, \\lambda)$$). This is why, for high-rate processes, you can sometimes use Normal approximations to simplify Poisson calculations.\n\nLarge $$\\lambda$$ → bell-shaped, approximately Normal → connects Poisson to the Normal distribution for high-rate scenarios.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "Under what conditions can the Poisson distribution approximate a binomial distribution, and why? Walk through the logic. (3 steps)", "answer": "- Step 1: The Poisson approximates the binomial $$\\operatorname{B}(n, p)$$ when $$n$$ is **large** and $$p$$ is **small**, with the product $$np$$ being moderate (not too large or too small). The approximation uses $$\\lambda = np$$.\n- Step 2: Why this works: when $$n$$ is large, there are many trials; when $$p$$ is small, successes are rare events occurring sporadically among many trials. This mimics the Poisson scenario — rare events happening independently in a large \"space\" of opportunities. The probability of multiple successes in a small subset of trials becomes negligible (events occur \"singly\"), and trials are independent.\n- Step 3: The rule of thumb: the approximation is good when $$n \\geq 50$$ and $$p \\leq 0.1$$, with $$np$$ not too large (say $$np < 10$$). As $$np$$ grows larger, the Normal approximation becomes more appropriate instead.\n\nLarge $$n$$, small $$p$$ → rare successes in many trials → mimics Poisson conditions → $$\\operatorname{B}(n,p) \\approx \\operatorname{Po}(np)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Left-handed people comprise 8% of a population. A random sample of 50 people is taken. Why might a Poisson approximation be suitable for the number of left-handed people in the sample, and what would $$\\lambda$$ be? (2 steps)", "answer": "- Step 1: The exact model is binomial: $$X \\sim \\operatorname{B}(50, 0.08)$$, with $$n = 50$$ (fairly large) and $$p = 0.08$$ (small). Since $$n \\geq 50$$ and $$p < 0.1$$, the Poisson approximation conditions are satisfied.\n- Step 2: The Poisson parameter is $$\\lambda = np = 50 \\times 0.08 = 4$$. So the approximation is $$X \\approx \\operatorname{Po}(4)$$.\n\nThis lets you use Poisson tables and the simpler PMF instead of computing binomial probabilities, which is especially helpful when cumulative probabilities are needed.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "A clinic treats insect-bite patients at rate 3 per day ($$X \\sim \\operatorname{Po}(3)$$). An extra doctor is needed if at least 4 of 5 days have more than 4 patients. Walk through the two-stage structure of this problem conceptually — what is computed at each stage? (3 steps)", "answer": "- Step 1: **Stage 1 (Poisson)**: Compute the probability that a single day has more than 4 patients. $$\\mathrm{P}(X > 4) = 1 - \\mathrm{P}(X \\leq 4)$$ where $$X \\sim \\operatorname{Po}(3)$$. This gives a probability $$p \\approx 0.1847$$ — the per-day \"success\" rate (where \"success\" = busy day).\n- Step 2: **Stage 2 (Binomial)**: Model the number of busy days out of 5. Each day is an independent trial with success probability $$p$$. Let $$Y$$ = number of busy days in 5 days, so $$Y \\sim \\operatorname{B}(5, p)$$.\n- Step 3: Find $$\\mathrm{P}(Y \\geq 4) = \\mathrm{P}(Y=4) + \\mathrm{P}(Y=5)$$ using the binomial formula with $$n=5$$ and $$p \\approx 0.1847$$.\n\nStage 1: Poisson → per-day probability. Stage 2: Binomial → count of days satisfying condition over multiple periods.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A company receives emails at rate 3 per 5 minutes. For a 10-minute period, what is the Poisson parameter, and conceptually, what probability are you computing when asked \"at least 8 emails\"? (2 steps)", "answer": "- Step 1: Scale the rate: 3 per 5 minutes means 6 per 10 minutes ($$\\lambda = 3 \\times \\frac{10}{5} = 6$$). So $$X \\sim \\operatorname{Po}(6)$$ for the 10-minute period.\n- Step 2: \"At least 8 emails\" means $$\\mathrm{P}(X \\geq 8) = 1 - \\mathrm{P}(X \\leq 7)$$, using the complement. With $$\\lambda = 6$$, the mean is 6, so asking for 8+ is asking for counts above the mean — this probability will be modest but not tiny (the distribution spreads around 6 with SD ≈ 2.45).\n\nScale rate to match interval, then use complement for \"at least\" probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What is the recursive relationship between consecutive Poisson probabilities? That is, express $$\\mathrm{P}(X = k+1)$$ in terms of $$\\mathrm{P}(X = k)$$, and explain why this is useful. (3 steps)", "answer": "- Step 1: Write out the ratio:\n\n$$\\frac{\\mathrm{P}(X=k+1)}{\\mathrm{P}(X=k)} = \\frac{\\frac{e^{-\\lambda}\\lambda^{k+1}}{(k+1)!}}{\\frac{e^{-\\lambda}\\lambda^k}{k!}} = \\frac{\\lambda^{k+1}}{(k+1)!} \\times \\frac{k!}{\\lambda^k} = \\frac{\\lambda}{k+1}$$\n\n- Step 2: So the recursive relationship is:\n\n$$\\mathrm{P}(X = k+1) = \\frac{\\lambda}{k+1} \\times \\mathrm{P}(X = k)$$\n\n- Step 3: This is useful for:\n+ Quickly computing successive probabilities from $$\\mathrm{P}(X=0) = e^{-\\lambda}$$ without recalculating the full formula each time\n+ Finding the mode: probabilities increase while $$\\lambda > k+1$$ (i.e., while $$k < \\lambda - 1$$) and decrease after — the peak is near $$\\lambda$$\n+ Setting up equations when probability ratios are given (e.g., $$\\mathrm{P}(X=2) = \\mathrm{P}(X=3)$$ implies $$\\frac{\\lambda}{3} = 1$$, so $$\\lambda = 3$$)\n\n$$\\mathrm{P}(X=k+1) = \\frac{\\lambda}{k+1} \\cdot \\mathrm{P}(X=k)$$ — a powerful recursive shortcut for computation and analysis.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, where is the mode (most probable value) of the distribution, and why? Use the recursive ratio to explain. (3 steps)", "answer": "- Step 1: From the recursive relation, $$\\mathrm{P}(X=k+1) > \\mathrm{P}(X=k)$$ when $$\\frac{\\lambda}{k+1} > 1$$, i.e., when $$k < \\lambda - 1$", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}], "count": 43}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the three conditions required for a situation to be modeled by a Poisson distribution, and why are they necessary? (3 steps)", "answer": "- Step 1: **Events occur independently**. The occurrence of one event does not affect the probability of another. This ensures no clustering or repulsion between events.  \n- Step 2: **Events occur singly in time/space**. Only one event can happen at a time. This avoids simultaneous events, which would violate the model’s assumptions.  \n- Step 3: **Constant average rate (λ)**. The mean number of events per interval must be proportional to the interval length. This ensures λ is scalable (e.g., doubling the time doubles λ).  \n\n**Why important?** Violating these conditions (e.g., dependent events, bursts of activity, or variable rates) invalidates the model.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the Poisson distribution a suitable model for the number of emails arriving in an inbox? Explain using the three conditions. (3 steps)", "answer": "- Step 1: **Independence**. Emails arrive independently; one email’s arrival doesn’t affect another’s.  \n- Step 2: **Singly**. Emails arrive one at a time (no two emails can arrive simultaneously).  \n- Step 3: **Constant rate**. If the average rate (λ) of emails per hour is stable (e.g., 10 emails/hour), the model applies.  \n+ Example: If spam campaigns cause bursts (violating constant rate), Poisson is unsuitable.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "How does the Poisson distribution’s formula $ \\mathrm{P}(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!} $ ensure that probabilities sum to 1? (3 steps)", "answer": "- Step 1: Sum over all x:  \n$$\n\\sum_{x=0}^\\infty \\mathrm{P}(X=x) = e^{-\\lambda} \\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!}\n$$  \n- Step 2: Recognize the Taylor series for $ e^\\lambda $:  \n$$\n\\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!} = e^\\lambda\n$$  \n- Step 3: Substitute back:  \n$$\ne^{-\\lambda} \\cdot e^\\lambda = 1\n$$  \n+ This derivation confirms the Poisson distribution is a valid probability model.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "If $ X \\sim \\text{Po}(\\lambda) $, why are the mean and variance both equal to $ \\lambda $? (3 steps)", "answer": "- Step 1: **Mean (E[X])**. Derived from the expectation formula:  \n$$\n\\mathrm{E}[X] = \\sum_{x=0}^\\infty x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\lambda\n$$  \n- Step 2: **Variance (Var[X])**. Calculated using $ \\mathrm{E}[X^2] - (\\mathrm{E}[X])^2 $:  \n$$\n\\mathrm{E}[X^2] = \\lambda + \\lambda^2 \\Rightarrow \\mathrm{Var}(X) = \\lambda + \\lambda^2 - \\lambda^2 = \\lambda\n$$  \n- Step 3: **Implication**. This equality is a unique property of the Poisson distribution. If data shows variance ≠ mean, Poisson is a poor fit.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you adjust the parameter $ \\lambda $ for a Poisson process when changing the time interval (e.g., from 1 hour to 3 hours)?", "answer": "Multiply $ \\lambda $ by the scaling factor of the interval. For example:  \n- If $ \\lambda = 4 $ per hour, over 3 hours, the new $ \\lambda = 4 \\times 3 = 12 $.  \n+ This assumes a constant rate and independence between intervals.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why can’t you add two dependent Poisson variables and expect the result to follow a Poisson distribution?", "answer": "The additive property $ X+Y \\sim \\text{Po}(\\lambda + \\mu) $ requires independence. If $ X $ and $ Y $ are dependent (e.g., one causes the other), their covariance isn’t zero, violating the Poisson assumption of independent events.  \n+ Example: If $ X $ is incoming calls and $ Y $ is calls to the same line (same events), dependence invalidates the sum.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "When is it appropriate to use Poisson tables instead of the formula $ \\mathrm{P}(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!} $?", "answer": "Use tables for:  \n1. Cumulative probabilities (e.g., $ \\mathrm{P}(X \\leq 3) $) to avoid summing individual terms.  \n2. Large $ \\lambda $ or $ x $, where manual calculations become tedious.  \n3. Exam settings where calculators are restricted, and tables are provided.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How does the Poisson distribution model rare events better than the binomial distribution in certain cases?", "answer": "- Step 1: **Binomial limitations**. Requires fixed trials (n) and known success probability (p). Rare events (small p, large n) lead to computational infeasibility.  \n- Step 2: **Poisson as an approximation**. When $ n \\to \\infty $, $ p \\to 0 $, and $ \\lambda = np $ is constant, Poisson approximates binomial:  \n$$\n\\mathrm{P}(X=x) \\approx \\frac{e^{-\\lambda} \\lambda^x}{x!}\n$$  \n- Step 3: **Practical use**. E.g., modeling meteor strikes (rare, independent, constant rate) without tracking every possible impact moment.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "What is the probability that no events occur in a Poisson process with $ \\lambda = 2 $? Derive it from the formula.", "answer": "- Step 1: Plug $ x = 0 $ into the formula:  \n$$\n\\mathrm{P}(X=0) = \\frac{e^{-2} \\cdot 2^0}{0!} = e^{-2}\n$$  \n- Step 2: Simplify:  \n$$\ne^{-2} \\approx 0.1353 \\text{ (or 13.53%)}\n$$  \n+ This represents the probability of zero events (e.g., no flaws in a material sample).", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you model the total number of events from two independent Poisson processes with rates $ \\lambda_1 = 3 $ and $ \\lambda_2 = 5 $?", "answer": "- Step 1: **Add parameters**: $ \\lambda_{\\text{total}} = \\lambda_1 + \\lambda_2 = 8 $.  \n- Step 2: **Resulting distribution**: $ X+Y \\sim \\text{Po}(8) $.  \n+ Example: Total customer calls from two independent call centers.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the formula for the Poisson distribution, and what does each component represent? (3 steps)", "answer": "- Step 1: **Formula**: $ P(X = x) = \\frac{e^{-\\lambda} \\lambda^x}{x!} $, where $ x = 0, 1, 2, \\dots $.  \n- Step 2: **Components**:  \n  + $ \\lambda $: The mean (expected) number of events in the interval.  \n  + $ e $: Euler’s number (~2.71828), base of natural logarithms.  \n  + $ x! $: Factorial of $ x $, normalizes the probability.  \n- Step 3: **Role**:  \n  + $ e^{-\\lambda} $: Scales the distribution to ensure total probability = 1.  \n  + $ \\lambda^x $: Models the rate of events raised to the number of observed events.  \n\n**Takeaway**: The formula balances the exponential decay $ e^{-\\lambda} $ with the growth of $ \\lambda^x $, normalized by $ x! $ to account for overcounting.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the Poisson distribution require events to occur independently and singly in time/space? (4 steps)", "answer": "- Step 1: **Independence**: Ensures no clustering or repulsion between events. If events were dependent (e.g., one event causes another), the model would fail.  \n- Step 2: **Singly**: Prevents multiple events coinciding (e.g., two phone calls at the exact same moment). This avoids overcounting and aligns with discrete counts.  \n- Step 3: **Constant rate**: $ \\lambda $ must scale linearly with interval length. For example, if the rate is 4/hour, it’s 8/2 hours.  \n- Step 4: **Consequence**: These conditions ensure the distribution’s validity and match real-world scenarios like radioactive decay or call arrivals.  \n\n**Takeaway**: Violations (e.g., dependent events) invalidate the model; Poisson assumes no memory or interaction between events.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why is the mean equal to the variance in the Poisson distribution, and how does this affect modeling? (3 steps)", "answer": "- Step 1: **Derivation insight**: For $ X \\sim \\text{Po}(\\lambda) $, $ \\text{E}(X) = \\lambda $ and $ \\text{Var}(X) = \\lambda $, proven via probability generating functions.  \n- Step 2: **Modeling implication**: If real data has $ \\text{Var}(X) \\gg \\text{Mean} $, Poisson is unsuitable (e.g., overdispersion).  \n- Step 3: **Example**: In the phone call example, mean = 2.82 and variance = 2.8276, justifying Poisson use.  \n\n**Takeaway**: Mean-variance equality is a diagnostic tool; deviations suggest alternative models (e.g., negative binomial).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you use the additive pr
