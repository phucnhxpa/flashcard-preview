<script>
const DATA={"selected": [{"question": "If $$X \\sim \\operatorname{Po}(3)$$ and $$Y \\sim \\operatorname{Po}(4)$$ are independent, can you find $$\\mathrm{P}(X = 2 \\text{ and } Y = 2)$$ directly from the distribution of $$X + Y \\sim \\operatorname{Po}(7)$$? Explain why or why not. (3 steps)", "answer": "- Step 1: No, you cannot. The distribution of $$X + Y$$ tells you about the **total** count, not the **individual** counts that compose it. $$\\mathrm{P}(X + Y = 4)$$ includes all ways to get a total of 4: $$X=0,Y=4$$, $$X=1,Y=3$$, $$X=2,Y=2$$, $$X=3,Y=1$$, $$X=4,Y=0$$.\n- Step 2: To find $$\\mathrm{P}(X = 2 \\text{ and } Y = 2)$$, you must use the **independence** of $$X$$ and $$Y$$ directly:\n\n$$\\mathrm{P}(X=2 \\text{ and } Y=2) = \\mathrm{P}(X=2) \\times \\mathrm{P}(Y=2)$$\n\nCompute each Poisson probability separately and multiply.\n\n- Step 3: The additive property gives the distribution of the **sum**, which is useful for questions about totals. But questions about individual components require working with the original distributions separately.\n\nThe sum's distribution doesn't encode how the total was split between $$X$$ and $$Y$$ — for joint events, use independence directly.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "How does the Poisson distribution model rare events better than the binomial distribution in certain cases?", "answer": "- Step 1: **Binomial limitations**. Requires fixed trials (n) and known success probability (p). Rare events (small p, large n) lead to computational infeasibility.  \n- Step 2: **Poisson as an approximation**. When $ n \\to \\infty $, $ p \\to 0 $, and $ \\lambda = np $ is constant, Poisson approximates binomial:  \n$$\n\\mathrm{P}(X=x) \\approx \\frac{e^{-\\lambda} \\lambda^x}{x!}\n$$  \n- Step 3: **Practical use**. E.g., modeling meteor strikes (rare, independent, constant rate) without tracking every possible impact moment.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "Edge case: A printer jams at a rate of 2 times per 8-hour workday. Can we model the number of jams in a 10-minute interval using a Poisson distribution? What must we assume, and what is the parameter? (3 steps)", "answer": "- Step 1: Yes, we can model it, provided we assume the jams occur independently, singly, and at a constant average rate across the entire day (including the assumption that the rate doesn't change just because it's a short 10-minute window).\n- Step 2: Convert the rate to match the desired interval. 8 hours is 480 minutes. The rate is 2 jams per 480 minutes.\n- Step 3: Find the rate for 10 minutes by scaling: $$\\lambda_{10 \\text{ min}} = 2 \\times \\frac{10}{480} = \\frac{20}{480} = \\frac{1}{24} \\approx 0.042$$.\n\nThe parameter $$\\lambda$$ must always match the time or space interval you are analyzing.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "$$X \\sim \\text{Po}(7.5)$$. You're told $$P(X < b) = 0.5246$$ and need to find $$b$$ from a table that gives $$P(X \\leq x)$$. Walk through. (3 steps)", "answer": "- Step 1: Convert the strict inequality: for integer $$X$$, $$P(X < b) = P(X \\leq b - 1)$$. So we need $$P(X \\leq b - 1) = 0.5246$$.\n- Step 2: Look up the table for $$\\lambda = 7.5$$: find the value of $$x$$ where $$P(X \\leq x) = 0.5246$$. Suppose this gives $$x = 7$$.\n- Step 3: Then $$b - 1 = 7$$, so $$b = 8$$. Always do the inequality conversion **before** looking up the table to avoid an off-by-one error.\n\nInverse table problems amplify off-by-one errors because the conversion happens first, before the lookup. Be deliberate.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Derive why the sum of all probabilities in a Poisson distribution equals 1, starting from the probability mass function $$P(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}$$. (4 steps)", "answer": "- Step 1: Write out the sum of probabilities from $$x=0$$ to infinity: $$\\sum_{x=0}^{\\infty} P(X=x) = P(X=0) + P(X=1) + P(X=2) + \\ldots$$\n- Step 2: Substitute the Poisson formula into the sum: $$\\frac{e^{-\\lambda} \\lambda^0}{0!} + \\frac{e^{-\\lambda} \\lambda^1}{1!} + \\frac{e^{-\\lambda} \\lambda^2}{2!} + \\ldots$$\n- Step 3: Factor out the common term $$e^{-\\lambda}$$, leaving the series $$(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots)$$ inside the brackets.\n- Step 4: Recognize that the series inside the brackets is the Maclaurin series expansion for $$e^{\\lambda}$$. Therefore, the total sum is $$e^{-\\lambda} \\times e^{\\lambda} = e^0 = 1$$.\n\nThis elegant mathematical property confirms that the Poisson formula is a valid probability distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "If a phone line receives calls at a rate of 4 per hour, what is $$\\lambda$$ for a 90-minute interval, and why? (3 steps)", "answer": "- Step 1: Because the Poisson assumes a **constant average rate**, the mean number of events is proportional to the interval length.\n- Step 2: 90 minutes is $$\\frac{90}{60} = 1.5$$ times one hour, so $$\\lambda_{90\\text{min}} = 4 \\times 1.5 = 6$$.\n- Step 3: We then model the count as $$Y \\sim \\text{Po}(6)$$, **not** $$\\text{Po}(4)$$. The original $$\\lambda = 4$$ is tied to the original interval length; if we change the interval, we must rescale.\n\nKey principle: **always rescale $$\\lambda$$ to match the interval you're asking about** before computing any probability.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A clinic sees patients with a Poisson rate of 3 per day. The clinic needs an extra doctor if at least 4 days out of 5 have more than 4 patients. Describe the structure of the calculation without computing exact numbers. (4 steps)", "answer": "- Step 1: This is a **two-layer problem**. First find the daily probability $$p$$ of \"more than 4 patients\", using Poisson with $$\\lambda = 3$$.\n- Step 2: $$p = P(X > 4) = 1 - P(X \\leq 4)$$ where $$X \\sim \\text{Po}(3)$$. This $$p$$ is just a number — an ordinary daily probability.\n- Step 3: Now consider 5 independent days. Let $$Y$$ = number of days in the 5-day period with more than 4 patients. Then $$Y \\sim \\text{B}(5, p)$$ — a **Binomial distribution**, because each day is a Bernoulli trial: success = \"more than 4 patients\", with probability $$p$$.\n- Step 4: We want $$P(Y \\geq 4) = P(Y=4) + P(Y=5) = \\binom{5}{4}p^4(1-p) + \\binom{5}{5}p^5$$.\n\nThe key pattern: **Poisson computes the per-trial probability; Binomial counts the number of \"extreme\" trials**. Recognising this two-stage architecture is essential for compound problems.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "How does the visual shape of the Poisson distribution change as the parameter $$\\lambda$$ increases from a very small value (e.g., 0.5) to a larger value (e.g., 10)? (3 steps)", "answer": "- Step 1: For very small $$\\lambda$$ (like 0.5), the distribution is heavily right-skewed. The highest probability is at $$X=0$$, and the probabilities drop off rapidly as $$X$$ increases.\n- Step 2: As $$\\lambda$$ increases to moderate values (around 3 to 5), the distribution becomes less skewed. The peak shifts to the right (near the mean), and the tail extends further.\n- Step 3: For larger $$\\lambda$$ (above 10), the distribution begins to look symmetric and bell-shaped, closely approximating a Normal distribution. \n\nThis visual shift occurs because as the average rate rises, the relative fluctuation (standard deviation relative to the mean) decreases, centering the distribution around $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "In what sense is the Poisson distribution \"memoryless\" in the context of waiting for the next event? (3 steps)", "answer": "- Step 1: The waiting time between events in a Poisson process has an exponential distribution, which is memoryless: $$P(T > s + t \\mid T > s) = P(T > t)$$. Having waited time $$s$$ already doesn't change the distribution of remaining wait.\n- Step 2: For the **count** Poisson distribution, this manifests as: the count in a future interval is independent of past counts. Knowing that 5 events happened in the last hour gives no information about the count in the next hour (assuming constant rate).\n- Step 3: Practical consequence: in a true Poisson scenario, if you've just witnessed an event, the wait until the next is statistically the same as if you'd just arrived — there's no \"overdue\" event accumulation. This is the property students find most counterintuitive.\n\nIf the events have any \"schedule\" or memory (like trains running every 10 minutes), the process is not Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Left-handed people comprise 8% of a population. A random sample of 50 people is taken. Why might a Poisson approximation be suitable for the number of left-handed people in the sample, and what would $$\\lambda$$ be? (2 steps)", "answer": "- Step 1: The exact model is binomial: $$X \\sim \\operatorname{B}(50, 0.08)$$, with $$n = 50$$ (fairly large) and $$p = 0.08$$ (small). Since $$n \\geq 50$$ and $$p < 0.1$$, the Poisson approximation conditions are satisfied.\n- Step 2: The Poisson parameter is $$\\lambda = np = 50 \\times 0.08 = 4$$. So the approximation is $$X \\approx \\operatorname{Po}(4)$$.\n\nThis lets you use Poisson tables and the simpler PMF instead of computing binomial probabilities, which is especially helpful when cumulative probabilities are needed.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "The Poisson model requires events to occur \"independently.\" Give a scenario where this condition is **violated**, and explain what happens to the variance. (3 steps)", "answer": "- Step 1: Consider **disease outbreaks in a population**. If one person gets infected, they can infect others nearby. The occurrence of one event (infection) directly increases the probability of further events — events are positively correlated, not independent.\n- Step 2: Positive dependence causes **clustering**: infections come in waves rather than scattered uniformly. This means you observe more periods with zero infections and more periods with many infections than Poisson predicts.\n- Step 3: The consequence is again **overdispersion** (variance > mean). The Poisson would underestimate the probability of large outbreaks. For contagious processes, models incorporating dependence (like chain-binomial or SIR models) are needed.\n\nViolating independence (positive correlation) → clustering → overdispersion → Poisson fails to capture the bursty pattern.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, state the mean and variance, and explain why mean = variance is a distinctive and useful property. (3 steps)", "answer": "- Step 1: For $$X \\sim \\operatorname{Po}(\\lambda)$$:\n+ Mean: $$\\mathrm{E}(X) = \\lambda$$\n+ Variance: $$\\operatorname{Var}(X) = \\lambda$$\n\nBoth are equal to the same parameter.\n\n- Step 2: This is distinctive because most distributions have different mean and variance. For binomial: mean $$= np$$, variance $$= np(1-p) < np$$. For Poisson, the spread grows in lockstep with the centre — a higher mean automatically means more variability.\n- Step 3: This is **useful as a diagnostic tool**: when analysing real data, if the sample mean is approximately equal to the sample variance, this suggests a Poisson model might be appropriate. If variance >> mean (overdispersion) or variance << mean (underdispersion), Poisson is likely unsuitable.\n\nMean = Variance = $$\\lambda$$ is both a mathematical fact and a practical diagnostic: check if sample mean ≈ sample variance to assess Poisson suitability.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "What is the key difference between the notation P(X ≤ x) and P(X < x) when using Poisson tables? Why does this matter? (2 steps)", "answer": "- Step 1: P(X ≤ x) includes x, while P(X < x) = P(X ≤ x-1) does NOT include x.\n- Step 2: When solving problems, you must convert strict inequalities (<, >) to non-strict (≤, ≥) using +1 or -1 adjustments. For example, P(X < 5) = P(X ≤ 4), and P(X > 3) = 1 - P(X ≤ 3).\n+ This is a common source of errors in exam questions. Always check whether your inequality is strict.", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "A researcher is studying cell divisions in a petri dish. The number of divisions follows a Poisson distribution. Over 50 observations, the average number of divisions per hour is 3.2, with variance 3.5. What would the researcher conclude about using a Poisson model? (2 steps)", "answer": "- Step 1: For a Poisson distribution, mean = variance = λ. Here, mean = 3.2 and variance = 3.5, which are very close.\n- Step 2: The small difference (0.3) suggests that a Poisson model is appropriate. The close agreement between mean and variance is a key diagnostic for Poisson. The slight difference could be due to random sampling variation.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "Why is independence essential for the additive property $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$ to hold? (2 steps)", "answer": "- Step 1: If $$X$$ and $$Y$$ are positively correlated (e.g., both spike during peak hours together), the variance of $$X+Y$$ would exceed $$\\lambda + \\mu$$ because the spikes reinforce each other. Recall that for Poisson, mean equals variance — so a violation of variance equality immediately disqualifies Poisson as the distribution of $$X+Y$$.\n- Step 2: Independence ensures the streams of events are entirely separate, so combining them just gives a stream with the pooled rate. Conceptually: independent flips of two coins remain governed by their own probabilities; correlated flips don't.\n\nIf two phone lines share a single cause (e.g., one alarm system triggers both), they aren't independent — and the sum isn't Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "How do you use the additive property of Poisson distributions, and why does it work? (3 steps)", "answer": "- Step 1: **Property**: If $ X \\sim \\text{Po}(\\lambda) $ and $ Y \\sim \\text{Po}(\\mu) $, then $ X + Y \\sim \\text{Po}(\\lambda + \\mu) $.  \n- Step 2: **Conditions**:  \n  + $ X $ and $ Y $ must be independent.  \n  + Events must be counted over the same interval (e.g., calls/hour).  \n- Step 3: **Why it works**: Independence ensures no overlap, and summed rates preserve the Poisson structure. For example, two independent Poisson processes (e.g., calls to two lines) combine into a single process with summed rate.  \n\n**Takeaway**: Additive property simplifies modeling aggregated processes, but only if intervals and independence align.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "The Poisson model requires events to occur \"singly.\" Give a concrete real-world scenario where this condition is **violated**, and explain what distributional consequence this violation would produce. (3 steps)", "answer": "- Step 1: Consider **car accidents at an intersection**. Sometimes multiple cars are involved in the same accident simultaneously (a multi-car pile-up). This means events can occur in \"batches\" or clusters, not singly.\n- Step 2: When events arrive in batches, the observed distribution will have **more variance than a Poisson with the same mean**. The Poisson assumes each occurrence is separate, so counts spread in a specific way. Batching increases variability — you get more 0s (no accident at all) and more high counts (big pile-ups) than Poisson would predict.\n- Step 3: This leads to **overdispersion**: the sample variance exceeds the sample mean. A Poisson model would underestimate the probability of both very low and very high counts. A negative binomial distribution (which allows for clustering) would be more appropriate.\n\nViolating \"singly\" causes overdispersion (variance > mean), making Poisson a poor fit.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "How do you model the probability of detecting at least $ n $ events in a binomial-Poisson hybrid scenario (e.g., Example 5b)? (4 steps)", "answer": "- Step 1: **Two-stage model**: First, use Poisson to find the probability of a single event (e.g., $ P(X > 4) $), then use binomial for repeated trials.  \n- Step 2: **Example 5b**:  \n  + Define $ Y \\sim \\text{Bin}(5, 0.1847) $, where $ 0.1847 $ is the daily Poisson probability.  \n  + Calculate $ P(Y \\geq 4) = P(Y=4) + P(Y=5) $.  \n- Step 3: **Justification**: Binomial applies because each day is an independent trial with success probability $ p = P(X > 4) $.  \n- Step 4: **Calculation**: Use binomial coefficients and probabilities:  \n  $ P(Y=4) = \\binom{5}{4} (0.1847)^4 (0.8153) $, etc.  \n\n**Takeaway**: Hybrid models combine Poisson (individual rates) and binomial (repeated trials) for complex scenarios.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, how do you compute $$P(a \\leq X \\leq b)$$ from cumulative tables? (2 steps)", "answer": "- Step 1: $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a-1)$$ — read off the upper tail through $$b$$ and subtract everything strictly below $$a$$.\n- Step 2: For example, $$P(1 \\leq X \\leq 4) = P(X \\leq 4) - P(X \\leq 0)$$, where we subtract $$P(X \\leq 0)$$ (which is just $$P(X=0)$$) to remove the part below 1.\n\nThe same logic governs $$P(a < X \\leq b) = P(X \\leq b) - P(X \\leq a)$$ — note the subtle shift when the lower bound is strict vs. non-strict.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Synthesis: In a two-stage problem, you first use a Poisson distribution to find the probability that a \"successful\" day occurs (e.g., more than 4 events). You then want to find the probability of having exactly 3 successful days in a week. What distribution do you use for the second stage, and why? (3 steps)", "answer": "- Step 1: The second stage requires counting the number of \"successes\" (successful days) out of a fixed number of trials (7 days in a week).\n- Step 2: Each day is a trial with two outcomes: it is either a \"successful day\" or it isn't. The probability of success ($$p$$) is the fixed value calculated from the Poisson distribution in stage 1.\n- Step 3: Therefore, the second stage follows a **Binomial distribution**, $$B(n, p)$$, where $$n=7$$ (days) and $$p$$ is the probability found from the Poisson model.\n\nThe Poisson model defines the event; the Binomial model counts how many times that event occurs over multiple independent trials.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Intuitively, why does adding two independent Poisson variables produce another Poisson with parameter $$\\lambda + \\mu$$? Explain without heavy algebra. (3 steps)", "answer": "- Step 1: Think of two independent streams of events merging into one. Stream A produces events at rate $$\\lambda$$, Stream B at rate $$\\mu$$. The combined stream has events arriving at rate $$\\lambda + \\mu$$ (the rates add because events from both streams flow into the same timeline).\n- Step 2: The combined stream still satisfies all Poisson conditions: events occur independently (since A and B are independent), singly (two events from different streams can't arrive at the exact same instant in continuous time), and at a constant rate (the total rate $$\\lambda + \\mu$$ is steady).\n- Step 3: Since the merged stream satisfies the Poisson conditions and has rate $$\\lambda + \\mu$$, the total count must follow $$\\operatorname{Po}(\\lambda + \\mu)$$.\n\nTwo independent Poisson streams merge into one Poisson stream — rates add just like merging two lanes of traffic increases the total flow rate.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why must we use a Binomial (and not another Poisson) when asking \"in how many of $$n$$ independent intervals does some event happen\"? (3 steps)", "answer": "- Step 1: A Poisson over $$n$$ intervals would total events over the whole stretch — it doesn't distinguish \"10 events all in week 1\" from \"2 events in each of 5 weeks\". It loses the *per-interval* structure.\n- Step 2: Counting \"how many intervals satisfy a condition\" treats each interval as a Bernoulli trial: success (condition met) or failure (not met). A fixed number $$n$$ of trials with two outcomes each is exactly the **Binomial** setup.\n- Step 3: So the architecture is: **Poisson computes per-interval probability $$p$$; Binomial counts how many intervals \"succeed\"**. The two are doing fundamentally different jobs.\n\nThe deeper reason: Poisson tracks *event counts*; Binomial tracks *interval outcomes*. When the question shifts from \"how many events\" to \"how many intervals\", we shift distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "For a Poisson distribution with parameter $$\\lambda$$, what happens to the probability of observing exactly 0 events, $$P(X=0)$$, as $$\\lambda$$ increases? Explain both mathematically and intuitively. (2 steps)", "answer": "- Step 1: Mathematically, $$P(X=0) = \\frac{e^{-\\lambda} \\lambda^0}{0!} = e^{-\\lambda}$$. As $$\\lambda$$ increases, the exponent $$-\\lambda$$ becomes a larger negative number, meaning $$e^{-\\lambda}$$ shrinks rapidly towards 0.\n- Step 2: Intuitively, if the average rate of events ($$\\lambda$$) becomes very large, it becomes incredibly unlikely that you would observe absolutely zero events. For example, if a intersection averages 50 accidents a year ($$\\lambda=50$$), the chance of seeing 0 accidents is virtually nonexistent.\n\nThe probability of zero events is highest when $$\\lambda$$ is very small (i.e., rare events).", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "In a two-stage problem (Poisson → Binomial), what is the conceptual role of the Poisson probability in the binomial calculation? Why can't you skip the Poisson step? (2 steps)", "answer": "- Step 1: The Poisson step computes the **per-interval probability** $$p$$ — the chance that a single time period (e.g., one day, one week) satisfies whatever condition is specified (e.g., \"more than 4 patients,\" \"at least 3 houses sold\"). This probability $$p$$ is not given directly; it must be derived from the Poisson model.\n- Step 2: This $$p$$ then becomes the **success probability** in the binomial model. The binomial counts how many out of $$n$$ independent intervals have the condition satisfied, with each interval being a \"trial\" and $$p$$ being the success rate per trial. You can't skip the Poisson step because without it, you don't know what $$p$$ is.\n\nPoisson → compute $$p$$ (per-interval condition probability) → Binomial with parameter $$p$$ → answer about multiple intervals.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Why is the Poisson distribution a suitable model for the number of emails arriving in an inbox? Explain using the three conditions. (3 steps)", "answer": "- Step 1: **Independence**. Emails arrive independently; one email’s arrival doesn’t affect another’s.  \n- Step 2: **Singly**. Emails arrive one at a time (no two emails can arrive simultaneously).  \n- Step 3: **Constant rate**. If the average rate (λ) of emails per hour is stable (e.g., 10 emails/hour), the model applies.  \n+ Example: If spam campaigns cause bursts (violating constant rate), Poisson is unsuitable.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "When calculating probabilities like $$P(X \\geq 1)$$ for a Poisson distribution, why is it a critical strategy to use the complement rule rather than summing the infinite series? (2 steps)", "answer": "- Step 1: The direct approach requires summing an infinite number of terms: $$P(X \\geq 1) = P(X=1) + P(X=2) + P(X=3) + \\ldots$$, which is impossible to calculate exactly by hand and prone to rounding errors on calculators.\n- Step 2: The complement of \"$$X \\geq 1$$\" is \"$$X < 1$$\", which for a discrete non-negative integer variable means exactly \"$$X = 0$$\". Since $$P(X=0) = e^{-\\lambda}$$ is a single, easy-to-calculate term, we can find $$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-\\lambda}$$. \n\nAlways look for the complement to turn an infinite sum into a single subtraction.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Define what's meant by the **Poisson process** intuitively (the model behind the Poisson distribution). (3 steps)", "answer": "- Step 1: A Poisson **process** is a stream of events arriving in continuous time (or space), where events occur randomly at rate $$\\lambda$$ per unit, independently, and singly.\n- Step 2: The Poisson **distribution** $$\\text{Po}(\\lambda t)$$ describes the count of events in any interval of length $$t$$ for this process.\n- Step 3: Crucially: counts in **disjoint intervals** are **independent**. The number of events in $$[0,1]$$ tells you nothing about the count in $$[1,2]$$. This independence-of-intervals property is what makes the Poisson process so analytically tractable and is why scaling and adding work the way they do.\n\nThe Poisson distribution is best understood as a snapshot of a Poisson process — viewing the process through one fixed-length window.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Misconception probe: If a call centre receives calls at a constant average rate of $$\\lambda = 4$$ calls per hour, does the Poisson model assume that exactly 4 calls happen every hour? Explain what \"constant average rate\" actually implies. (2 steps)", "answer": "- Step 1: No, the Poisson model absolutely does **not** assume exactly 4 calls occur every hour. If that were true, there would be no randomness and the variance would be zero.\n- Step 2: \"Constant average rate\" implies that over a long period, the average number of calls per hour settles to 4. However, in any *specific* hour, the actual number of calls is a random variable that can be 0, 1, 5, or even 10. The \"constant rate\" means the underlying probability of a call arriving in any tiny fraction of time remains the same, not that the observed count is constant.\n\nThe variance in a Poisson distribution is equal to its mean, confirming that there is natural fluctuation around the average $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Why does the Poisson distribution allow $$x$$ to range over all non-negative integers $$0, 1, 2, \\ldots$$ with no upper bound, even though real-world counts are surely bounded? (3 steps)", "answer": "- Step 1: Mathematically, the formula $$P(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$ assigns positive probability to every $$x \\geq 0$$, so the support is unbounded.\n- Step 2: But in practice, for any fixed $$\\lambda$$, the probabilities of large $$x$$ become negligibly small very quickly because $$x!$$ grows faster than $$\\lambda^x$$. So although \"an infinite number of calls per minute\" is technically allowed, its probability is essentially zero.\n- Step 3: This unboundedness is actually a feature: it means we don't have to know in advance the maximum possible count (unlike Binomial, which needs $$n$$). The model handles rare extreme values gracefully — the 12-call day among mostly 0–6-call days fits the model without forcing an artificial cap.\n\nThe model trades realism (allowing $$\\infty$$) for flexibility (no cap needed) — the realism is restored because high counts are so improbable.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Data is collected and the sample mean is 3.69 with sample variance 3.73. How does this support choosing a Poisson model, and what value of $$\\lambda$$ would you use? (3 steps)", "answer": "- Step 1: For a Poisson distribution, the theoretical mean and variance are both $$\\lambda$$, so they should be approximately equal. Here, mean (3.69) and variance (3.73) are very close — differing by only 0.04. This near-equality supports the Poisson as a reasonable model.\n- Step 2: If the variance were much larger (say 12) or much smaller (say 1), this would indicate overdispersion or underdispersion, ruling out Poisson. The close match is the key evidence.\n- Step 3: For the model parameter, use a value that represents both the mean and variance. A sensible choice is $$\\lambda = 3.7$$ (rounding the mean to 1 decimal place, which also approximates the variance well). Then $$X \\sim \\operatorname{Po}(3.7)$$ for subsequent probability calculations.\n\nMean ≈ Variance → Poisson plausible. Use $$\\lambda$$ ≈ their common value (here 3.7) as the model parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "The number of patients arriving at A&E follows $$\\text{Po}(5)$$ per hour. A patient just arrived at 11:00am. What's the probability the next patient arrives before 11:15am? (3 steps)", "answer": "- Step 1: This is a **waiting time** question. In a Poisson process with rate $$\\lambda$$ per hour, the probability of **no arrival** in a fixed window of length $$t$$ is $$e^{-\\lambda t}$$ (since count in window $$\\sim \\text{Po}(\\lambda t)$$ and we want count = 0).\n- Step 2: For 15 minutes = 0.25 hours, with $$\\lambda = 5$$ per hour, the rate over 15 minutes is $$\\lambda t = 1.25$$. So $$P(\\text{no arrival in 15 min}) = e^{-1.25}$$.\n- Step 3: Therefore $$P(\\text{next arrival within 15 min}) = 1 - e^{-1.25} \\approx 1 - 0.287 = 0.713$$, about 71%.\n\nThe deeper insight: waiting times between Poisson events are exponentially distributed with mean $$1/\\lambda$$. This is the dual perspective on a Poisson process: counts are Poisson, gaps are exponential.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, where is the mode (most probable value) of the distribution, and why? Use the recursive ratio to explain. (3 steps)", "answer": "- Step 1: From the recursive relation, $$\\mathrm{P}(X=k+1) > \\mathrm{P}(X=k)$$ when $$\\frac{\\lambda}{k+1} > 1$$, i.e., when $$k < \\lambda - 1$", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "Why is $$P(X \\leq 0)$$ for a Poisson the same as $$P(X = 0)$$, but $$P(X < 0) = 0$$? (2 steps)", "answer": "- Step 1: $$X$$ takes only non-negative integer values $$0, 1, 2, \\ldots$$. So \"$$X \\leq 0$$\" includes only $$X = 0$$ (since $$X = -1, -2, \\ldots$$ are impossible). Hence $$P(X \\leq 0) = P(X = 0) = e^{-\\lambda}$$.\n- Step 2: \"$$X < 0$$\" requires $$X$$ to be negative, but no Poisson value is negative — so $$P(X < 0) = 0$$.\n\nThe lesson: integer support means strict inequalities at the boundary $$0$$ behave differently from non-strict ones. $$P(X \\leq 0) = P(X = 0) \\neq P(X < 0)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why does the Poisson distribution have only **one parameter**, $$\\lambda$$, while distributions like Normal need two? (3 steps)", "answer": "- Step 1: For most distributions, mean and variance can be set independently, so they need separate parameters (Normal needs $$\\mu, \\sigma^2$$; Binomial needs $$n, p$$).\n- Step 2: For Poisson, **mean = variance = $$\\lambda$$**, so once you know the rate, you know the spread automatically. There's no additional information to specify.\n- Step 3: This single-parameter simplicity is a direct consequence of the structural assumptions: independent, singly-occurring events at a constant rate. The dispersion is locked to the mean by the random arrival mechanism itself.\n\nGeometrically: the Poisson family is a one-dimensional curve in the space of all distributions, parametrised by $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why is the Poisson distribution inappropriate for modeling events that occur in clusters (e.g., earthquakes followed by aftershocks)? (3 steps)", "answer": "- Step 1: **Cluster violation**: Clusters violate the independence assumption. Aftershocks are dependent on main quakes.  \n- Step 2: **Variance inflation**: Clustering increases variance beyond $ \\lambda $, breaking the mean-variance equality.  \n- Step 3: **Alternative models**: Use negative binomial (overdispersed counts) or compound Poisson processes.  \n\n**Takeaway**: Poisson assumes no interaction; clustered events require richer models to account for dependency.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "What probability do Poisson cumulative distribution tables directly provide, and how does this differ from what the PMF formula gives? (2 steps)", "answer": "- Step 1: The cumulative tables directly provide $$\\mathrm{P}(X \\leq x)$$ — the probability that the count is **at most** $$x$$, i.e., the sum of probabilities from 0 up to $$x$$:\n\n$$\\mathrm{P}(X \\leq x) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\cdots + \\mathrm{P}(X=x)$$\n\nThe PMF formula gives individual probabilities $$\\mathrm{P}(X = x)$$ for a single value.\n\n- Step 2: The tables are organised by $$\\lambda$$ (rows, in steps of 0.5 from 0 to 10) and $$x$$ (columns, from 0 to 10). To find other probabilities, you combine table values:\n+ $$\\mathrm{P}(X \\geq k) = 1 - \\mathrm{P}(X \\leq k-1)$$ (complement)\n+ $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(X \\leq b) - \\mathrm{P}(X \\leq a-1)$$ (difference of cumulative values)\n+ $$\\mathrm{P}(X = k) = \\mathrm{P}(X \\leq k) - \\mathrm{P}(X \\leq k-1)$$ (difference of adjacent cumulative values)\n\nTables give $$\\mathrm{P}(X \\leq x)$$ directly; all other probability forms are built from differences and complements of these.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "A bus company hires out boats at 9 per hour and wants to be 99% sure of meeting all demand in a 30-minute period. How would you find the minimum number of boats needed? (4 steps)", "answer": "- Step 1: Rescale: in 30 minutes, $$\\lambda = 9 \\times 0.5 = 4.5$$ boats demanded on average.\n- Step 2: Let $$X \\sim \\text{Po}(4.5)$$ be the demand. We want the smallest integer $$n$$ such that $$P(X \\leq n) \\geq 0.99$$ — i.e., the chance that demand stays at or below $$n$$ is at least 99%.\n- Step 3: From the cumulative table for $$\\lambda = 4.5$$, scan upward: find the smallest $$n$$ where $$P(X \\leq n)$$ first crosses 0.99.\n- Step 4: The minimum number of boats is then $$n$$. In words: we need enough capacity that we serve everyone in 99% of half-hour windows.\n\nThis is the \"service-level\" pattern: **invert a cumulative probability to find the minimum capacity** that meets a coverage target.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A fishing angler catches fish at a rate of 2 per hour. Find conceptually the probability that on **exactly 3 of 5** two-hour trips, she catches at least 5 fish. (4 steps)", "answer": "- Step 1: First, single-trip probability. Per 2 hours, $$\\lambda = 2 \\times 2 = 4$$. Let $$X \\sim \\text{Po}(4)$$ be fish per 2-hour trip. Compute $$p = P(X \\geq 5) = 1 - P(X \\leq 4)$$.\n- Step 2: Now treat each trip as an independent Bernoulli trial with success probability $$p$$ (the trip \"succeeds\" if she catches $$\\geq 5$$ fish).\n- Step 3: Over 5 trips, let $$Y \\sim \\text{B}(5, p)$$. We want $$P(Y = 3) = \\binom{5}{3}p^3(1-p)^2$$.\n- Step 4: This is the standard Poisson→Binomial compound: Poisson computes $$p$$ once, Binomial counts how many trips succeed. Don't try to use a single Poisson with $$\\lambda = 5 \\times 4 = 20$$ — that would tell you about *total* fish caught, not the *number of successful trips*.\n\nAlways identify whether you're counting events (Poisson) or successful intervals (Binomial). The compound structure is the giveaway.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "If you collect data and find the sample mean is 5 but the sample variance is 12, would a Poisson model be appropriate? Explain what this discrepancy tells you about the underlying process. (3 steps)", "answer": "- Step 1: For Poisson, mean ≈ variance. Here, variance (12) is more than double the mean (5). This is **overdispersion** — the data is much more spread out than a Poisson distribution with $$\\lambda = 5$$ would predict.\n- Step 2: Overdispersion suggests one or more Poisson conditions are violated. Likely causes:\n+ Events occur in clusters/batches (violating \"singly\") — e.g., customers arriving in groups\n+ The rate varies across the observation periods (violating \"constant rate\") — e.g., busier and quieter periods mixed\n+ Events are positively correlated (violating \"independence\") — e.g., contagion effects\n\n- Step 3: A Poisson model with $$\\lambda = 5$$ would underestimate the probability of extreme values (both very low and very high counts). A negative binomial distribution, which has variance > mean, would be more appropriate.\n\nVariance >> Mean → overdispersion → Poisson conditions violated → Poisson is unsuitable; consider alternative models.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "What is the recurrence relation between $$P(X = k+1)$$ and $$P(X = k)$$ for a Poisson distribution, and why is it useful? (3 steps)", "answer": "- Step 1: From the PMF: $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{e^{-\\lambda}\\lambda^{k+1}/(k+1)!}{e^{-\\lambda}\\lambda^k/k!} = \\frac{\\lambda}{k+1}$$\n- Step 2: So $$P(X = k+1) = P(X = k) \\cdot \\frac{\\lambda}{k+1}$$.\n- Step 3: This is useful because: \n+ It lets you compute consecutive probabilities iteratively without recomputing factorials.\n+ It instantly tells you the **mode** of the distribution: probabilities increase while $$\\frac{\\lambda}{k+1} > 1$$ (i.e., $$k < \\lambda - 1$$) and decrease afterwards. The mode is roughly $$\\lfloor \\lambda \\rfloor$$.\n+ It solves equations like \"$$P(X=k_1) = c \\cdot P(X=k_2)$$\" almost instantly.\n\nFor example, $$P(X = 4) = 3 P(X = 2)$$ becomes $$\\frac{\\lambda^2}{12} = 3$$, giving $$\\lambda^2 = 36$$, so $$\\lambda = 6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{Var}(X) = \\lambda$. (4 steps)", "answer": "- Step 1: We know $\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$. We already know $\\mathrm{E}(X) = \\lambda$, so we need to find $\\mathrm{E}(X^2)$.\n- Step 2: $\\mathrm{E}(X^2) = \\sum_{x=0}^{\\infty} x^2 \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$. This can be rewritten using the identity $x^2 = x(x-1) + x$: $\\mathrm{E}(X^2) = \\sum_{x=0}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} + \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$\n- Step 3: For the first sum, the $x=0$ and $x=1$ terms are zero, so starting from $x=2$: $\\sum_{x=2}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\sum_{x=2}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{(x-2)!} = \\lambda^2 e^{-\\lambda} \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!} = \\lambda^2$\n- Step 4: The second sum is $\\mathrm{E}(X) = \\lambda$. So $\\mathrm{E}(X^2) = \\lambda^2 + \\lambda$. Therefore: $\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 = (\\lambda^2 + \\lambda) - \\lambda^2 = \\lambda$", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "What's the conceptual difference between $$\\lambda$$ in Poisson and $$np$$ in Binomial? (3 steps)", "answer": "- Step 1: Both are the **mean** of the respective distribution. $$E(X) = \\lambda$$ for Poisson, $$E(X) = np$$ for Binomial.\n- Step 2: But in Binomial, the mean is *built up* from two parameters: $$n$$ (number of trials, an integer) and $$p$$ (per-trial probability). In Poisson, $$\\lambda$$ stands alone — it isn't built from a count and a probability.\n- Step 3: Conceptually, Poisson abandons the trial structure entirely. There's no \"$$n$$\" to point to. The events arrive in a continuous interval, and $$\\lambda$$ summarises the whole arrival process in one number.\n\nThis is why for $$n$$ large and $$p$$ small with $$np = \\lambda$$, the trial structure becomes invisible and Binomial collapses into Poisson — the discreteness of trials is no longer detectable.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Planes land at 1 every 4 minutes (during normal operations). Given that exactly 10 planes landed between 2pm and 3pm, find probability exactly 5 landed between 2pm and 2:30pm. (3 steps)", "answer": "- Step 1: This is a conditional probability problem. Total in 1 hour = 10. Let the number in first half-hour be K, in second half-hour be L. We want P(K = 5 | K + L = 10)\n- Step 2: Given constant rate, the arrival times are uniformly distributed. Conditional on total n, the number in the first half follows a binomial distribution: K | (K+L=10) ~ B(10, 0.5)\n- Step 3: P(K = 5) = C(10,5)(0.5)¹⁰ = 0.2461\n+ This is a \"conditional Poisson\" or \"splitting\" problem — useful for understanding Poisson processes further.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "$$X \\sim \\text{Po}(\\lambda)$$. Sketch the qualitative behaviour of $$P(X \\leq k)$$ as $$\\lambda$$ varies, for fixed $$k$$. (3 steps)", "answer": "- Step 1: For very small $$\\lambda$$ (say $$\\lambda \\ll k$$), almost all probability mass is at $$0, 1, \\ldots, k$$, so $$P(X \\leq k)$$ is close to 1.\n- Step 2: As $$\\lambda$$ grows past $$k$$, the distribution's centre shifts past $$k$$ and probability mass leaks into $$X > k$$. So $$P(X \\leq k)$$ decreases — and does so increasingly steeply.\n- Step 3: For very large $$\\lambda$$ ($$\\lambda \\gg k$$), almost all mass is above $$k$$, so $$P(X \\leq k) \\to 0$$.\n\nVisually: $$P(X \\leq k)$$ vs. $$\\lambda$$ is a smooth, monotone-decreasing curve from 1 down to 0, with the steepest drop around $$\\lambda \\approx k$$. This is the fundamental shape behind all \"find $$\\lambda$$ such that $$P(X \\leq k)$$ equals some target\" problems.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "Why does mean = variance in a Poisson distribution make sense intuitively? Think about what happens to the spread of counts as the average rate increases. (3 steps)", "answer": "- Step 1: When $$\\lambda$$ is small (say 0.5), most of the probability mass is concentrated near 0 and 1 — the distribution is tightly clustered with low variability. The variance (0.5) is small, matching the small mean.\n- Step 2: When $$\\lambda$$ is large (say 10), counts can range widely — you might see 6 or 14 events even though the average is 10. The distribution spreads out. The variance (10) is large, matching the large mean.\n- Step 3: This makes sense because in a random counting process, higher rates mean more \"room\" for random fluctuation. If you expect 10 events, random variation might add or subtract a few; if you expect 0.5, there's barely room to vary. The variability scales with the rate itself, hence variance = mean.\n\nHigher average rate → more potential for random fluctuation → variance grows with mean. This is the natural behaviour of random counting processes.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "Why doesn't summing two Poisson **distributions** give you the distribution of just one of them again? (Why doesn't $$\\text{Po}(\\lambda) + \\text{Po}(\\mu)$$ equal $$\\text{Po}(\\lambda)$$?) (3 steps)", "answer": "- Step 1: Adding random variables $$X + Y$$ produces a new random variable whose mean is $$E(X) + E(Y) = \\lambda + \\mu$$. Since for Poisson the mean fully determines the distribution, the sum has rate $$\\lambda + \\mu$$, not $$\\lambda$$.\n- Step 2: The conceptual leap: \"adding distributions\" sometimes gets confused with \"mixing\" or \"averaging\". The additive property here is about **sums of samples** from independent sources, not about combining distribution shapes.\n- Step 3: A useful analogy: two coin flips together produce a \"two-coin\" outcome with mean count $$2p$$, not $$p$$. The number of heads scales with the number of trials, regardless of distribution family.\n\nSumming increases the parameter; mixing (which we don't do here) would create a non-Poisson distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "$$X \\sim \\text{Po}(2.5)$$ and $$Y \\sim \\text{Po}(3.5)$$ independently. What's the probability that **both** $$X$$ and $$Y$$ are greater than 2? Set up only. (3 steps)", "answer": "- Step 1: $$P(X > 2 \\text{ AND } Y > 2)$$ — this is a joint event, **not** about $$X + Y$$. Independence is the key.\n- Step 2: By independence: $$P(X > 2, Y > 2) = P(X > 2) \\cdot P(Y > 2)$$.\n- Step 3: Compute each individually: $$P(X > 2) = 1 - P(X \\leq 2)$$ where $$X \\sim \\text{Po}(2.5)$$, and $$P(Y > 2) = 1 - P(Y \\leq 2)$$ where $$Y \\sim \\text{Po}(3.5)$$. Multiply the two values.\n\nCritical distinction: \"both greater than 2\" $$\\neq$$ \"$$X+Y > 4$$\". The first counts joint events; the second pools the totals. They give different probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "Why doesn't $$\\lambda$$ have to be an integer in the Poisson distribution? (3 steps)", "answer": "- Step 1: $$\\lambda$$ represents the **average rate** — an expectation, not an actual count. Averages are routinely non-integer (e.g., \"1.8 sales per week\"), even though counts themselves are integers.\n- Step 2: The PMF $$\\frac{e^{-\\lambda}\\lambda^x}{x!}$$ is well-defined for any non-negative real $$\\lambda$$, including 1.8 or 4.5, because the exponential and power functions handle real values fluently.\n- Step 3: So you can have $$X \\sim \\text{Po}(2.7)$$ even though $$X$$ itself only takes values $$0, 1, 2, \\ldots$$ — there's no contradiction. The mean is 2.7; individual realisations are integers; over many trials the average will be 2.7.\n\nThis non-integer-$$\\lambda$$ flexibility is what lets us scale to any interval length: 5 minutes might give $$\\lambda = 0.25$$, perfectly valid.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Why can’t you add Poisson distributions from different time intervals without adjusting $ \\lambda $? (3 steps)", "answer": "- Step 1: **Interval mismatch**: If $ X \\sim \\text{Po}(\\lambda_1) $ over $ t_1 $ and $ Y \\sim \\text{Po}(\\lambda_2) $ over $ t_2 \\neq t_1 $, rates aren’t comparable.  \n- Step 2: **Adjustment needed**: Scale $ \\lambda $ to a common interval (e.g., $ \\lambda_{\\text{hour}} = 2 \\times \\lambda_{\\text{30-min}} $).  \n- Step 3: **Example**: Example 7a scales car rates (2/5 min to 10 min: $ \\lambda = 4 $) and truck rates (3/15 min to 10 min: $ \\lambda = 2 $) before adding.  \n\n**Takeaway**: Always align intervals to the same time/space unit before applying the additive property.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "A textbook sets up: $$X \\sim \\text{Po}(\\lambda)$$, with $$P(X = 4) = 3 \\times P(X = 2)$$. Walk through the algebra to find $$\\lambda$$. (4 steps)", "answer": "- Step 1: Use the PMF: $$P(X=4) = \\frac{e^{-\\lambda}\\lambda^4}{4!}, \\quad P(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$.\n- Step 2: Set up the ratio: $$\\frac{P(X=4)}{P(X=2)} = \\frac{\\lambda^4/4!}{\\lambda^2/2!} = \\frac{\\lambda^2 \\cdot 2!}{4!} = \\frac{\\lambda^2 \\cdot 2}{24} = \\frac{\\lambda^2}{12}$$.\n- Step 3: Set this equal to 3: $$\\frac{\\lambda^2}{12} = 3 \\implies \\lambda^2 = 36$$.\n- Step 4: $$\\lambda = 6$$ (positive root).\n\nQuicker via recurrence: $$\\frac{P(X=4)}{P(X=2)} = \\frac{\\lambda}{3} \\cdot \\frac{\\lambda}{4} = \\frac{\\lambda^2}{12}$$. Either way, $$\\lambda = 6$$. Recognising recurrence patterns saves time.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Why is it important for the Poisson model that the rate $$\\lambda$$ is **the same** before and after we observe data, and how does this manifest in problems like \"given that 10 planes landed in an hour, what's the probability...?\" (3 steps)", "answer": "- Step 1: For an unconditional Poisson process, $$\\lambda$$ is a fixed property of the world — it doesn't depend on observations. This \"stationarity\" is what gives Poisson its predictive structure.\n- Step 2: But when we **condition** on an observation (e.g., \"given that 10 planes landed\"), the *unconditional* Poisson distribution is no longer relevant for that interval. Instead, given the total, the **locations of the 10 events become uniformly and independently distributed** across the interval.\n- Step 3: So the conditional sub-counts (e.g., events in the first half) become **Binomial** with $$n = 10$$ and $$p = $$ (length of sub-interval / total length). The Poisson \"becomes Binomial\" under conditioning on totals.\n\nThis is one of the most beautiful properties of the Poisson process — and a key trick in problems where you're told a total and asked about sub-intervals.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "Cars pass a point at mean rate 2 per 5 minutes, and other vehicles pass at mean rate 3 per 15 minutes. Before adding these to find the total vehicle count in a 10-minute interval, what crucial step must you take? (3 steps)", "answer": "- Step 1: The additive property requires both variables to cover the **same time interval**. Here, cars are counted over 5 minutes and other vehicles over 15 minutes — these intervals don't match, so you can't add parameters directly.\n- Step 2: Adjust both to the target interval of 10 minutes:\n+ Cars in 10 min: $$\\lambda_{\\text{cars}} = 2 \\times \\frac{10}{5} = 4$$, so $$X_1 \\sim \\operatorname{Po}(4)$$\n+ Other vehicles in 10 min: $$\\lambda_{\\text{other}} = 3 \\times \\frac{10}{15} = 2$$, so $$Y_1 \\sim \\operatorname{Po}(2)$$\n\n- Step 3: Now add: $$X_1 + Y_1 \\sim \\operatorname{Po}(4 + 2) = \\operatorname{Po}(6)$$.\n\nNever add Poisson parameters until you've adjusted both variables to the **same interval** — this is the most common error in Poisson addition problems.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "$$X \\sim \\text{Po}(\\lambda)$$. Given that $$P(X = 2) = P(X = 3)$$, find $$\\lambda$$. (4 steps)", "answer": "- Step 1: Write both probabilities using the PMF: $$P(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}, \\quad P(X=3) = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 2: Set them equal: $$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 3: Cancel $$e^{-\\lambda}$$ from both sides and divide by $$\\lambda^2$$ (assuming $$\\lambda > 0$$): $$\\frac{1}{2} = \\frac{\\lambda}{6}$$\n- Step 4: Solve: $$\\lambda = 3$$.\n\nA nice insight: the ratio $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{\\lambda}{k+1}$$. So $$P(X=2) = P(X=3)$$ means $$\\frac{\\lambda}{3} = 1$$, giving $$\\lambda = 3$$. This recurrence is a powerful shortcut for these problems.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Suppose cars arrive at a road point at 24 per minute and vans at 8 per minute, both Poisson and independent. What is the distribution of the **total number of vehicles** in a 15-second interval? (3 steps)", "answer": "- Step 1: First, rescale both rates to 15 seconds. 15 seconds is $$\\frac{1}{4}$$ of a minute, so:\n+ Cars: $$\\lambda = 24 \\times \\tfrac{1}{4} = 6$$ per 15 seconds.\n+ Vans: $$\\mu = 8 \\times \\tfrac{1}{4} = 2$$ per 15 seconds.\n- Step 2: Both car-count and van-count over a 15-second interval are independent Poissons.\n- Step 3: By the additive property, total vehicles $$\\sim \\text{Po}(6 + 2) = \\text{Po}(8)$$.\n\nThe lesson: **rescale first, add second**. Both must be expressed for the same interval before summing.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "In the Poisson distribution $$X \\sim \\operatorname{Po}(\\lambda)$$, what does the single parameter $$\\lambda$$ represent in terms of real-world meaning, and why is having only one parameter (instead of two, like the binomial's $$n$$ and $$p$$) significant? (3 steps)", "answer": "- Step 1: $$\\lambda$$ represents the **average rate** — the mean number of events expected to occur in the given interval. If phone calls arrive at 2.82 per day, then $$\\lambda = 2.82$$.\n- Step 2: Having only one parameter is significant because for the Poisson, **the mean equals the variance**: both are $$\\lambda$$. In the binomial, mean $$= np$$ and variance $$= np(1-p)$$, which are generally different and require two parameters. The Poisson's mean-variance equality means knowing the average rate automatically determines the spread.\n- Step 3: This reflects a deep property: when events occur independently at a constant rate in continuous time, the average rate completely determines the distribution's shape. There's no separate \"spread\" parameter — the variability is locked to the mean.\n\nOne parameter suffices because mean = variance = $$\\lambda$$; the rate determines everything.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A Poisson distribution with large $$\\lambda$$ (say $$\\lambda = 10$$) — qualitatively, what shape does the distribution have, and what does this connect to? (3 steps)", "answer": "- Step 1: With $$\\lambda = 10$$, the distribution is **approximately symmetric and bell-shaped**, centred around 10. The mode (most probable value) is near $$\\lambda$$, and probabilities decrease smoothly on both sides.\n- Step 2: The standard deviation is $$\\sqrt{\\lambda} = \\sqrt{10} \\approx 3.16$$, so most values fall within roughly 10 ± 6 (two standard deviations). The spread is moderate relative to the mean.\n- Step 3: For large $$\\lambda$$, the Poisson distribution approximates a **Normal distribution** with mean $$\\lambda$$ and variance $$\\lambda$$ (i.e., $$N(\\lambda, \\lambda)$$). This is why, for high-rate processes, you can sometimes use Normal approximations to simplify Poisson calculations.\n\nLarge $$\\lambda$$ → bell-shaped, approximately Normal → connects Poisson to the Normal distribution for high-rate scenarios.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, what is the probability that $X$ takes an odd value? Express your answer in terms of e and λ. (3 steps)", "answer": "- Step 1: $\\mathrm{P}(X \\text{ is odd}) = \\mathrm{P}(X = 1) + \\mathrm{P}(X = 3) + \\mathrm{P}(X = 5) + ... = e^{-\\lambda}(\\lambda + \\frac{\\lambda^3}{3!} + \\frac{\\lambda^5}{5!} + ...)$\n- Step 2: Recall that $e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + ...$ and $e^{-\\lambda} = 1 - \\lambda + \\frac{\\lambda^2}{2!} - \\frac{\\lambda^3}{3!} + ...$\n- Step 3: The sum of odd terms of $e^\\lambda$ minus the sum of odd terms of $e^{-\\lambda}$, all multiplied by $e^{-\\lambda}$, gives: $\\mathrm{P}(X \\text{ is odd}) = \\frac{1 - e^{-2\\lambda}}{2}$", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "Why does $$\\sum_{x=0}^{\\infty} P(X = x) = 1$$ for the Poisson distribution? Walk through the argument. (4 steps)", "answer": "- Step 1: Write out the sum explicitly: $$\\sum_{x=0}^\\infty \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda} + e^{-\\lambda}\\lambda + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\cdots$$\n- Step 2: Factor out the common $$e^{-\\lambda}$$: $$= e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$\n- Step 3: Recognise the bracketed expression as the **Taylor series for $$e^\\lambda$$**: $$e^\\lambda = \\sum_{k=0}^\\infty \\frac{\\lambda^k}{k!}$$\n- Step 4: Therefore $$\\sum P(X=x) = e^{-\\lambda} \\cdot e^\\lambda = e^0 = 1$$, as required.\n\nThis is the elegance of Poisson: the $$e^{-\\lambda}$$ in the PMF is precisely the inverse of the series expansion that the rest of the formula generates.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "If $$X \\sim Po(\\lambda)$$ and $$Y \\sim Po(\\mu)$$ are independent, and $$Q = X+Y$$, derive the formula for $$P(Q=0)$$ and $$P(Q=1)$$ from first principles. (4 steps)", "answer": "- Step 1: For the sum of two non-negative integers to be 0, both must be 0. So, $$P(Q=0) = P(X=0 \\text{ and } Y=0)$$. By independence, this is $$P(X=0) \\times P(Y=0) = e^{-\\lambda} \\times e^{-\\mu} = e^{-(\\lambda + \\mu)}$$.\n- Step 2: For the sum to be 1, one variable must be 1 and the other must be 0. There are two mutually exclusive scenarios: ($$X=1$$ and $$Y=0$$) OR ($$X=0$$ and $$Y=1$$).\n- Step 3: Calculate the probability of the first scenario: $$P(X=1) \\times P(Y=0) = (\\lambda e^{-\\lambda}) \\times e^{-\\mu} = \\lambda e^{-(\\lambda + \\mu)}$$.\n- Step 4: Calculate the probability of the second scenario: $$P(X=0) \\times P(Y=1) = e^{-\\lambda} \\times (\\mu e^{-\\mu}) = \\mu e^{-(\\lambda + \\mu)}$$. Add them together: $$(\\lambda + \\mu)e^{-(\\lambda + \\mu)}$$.\n\nNotice these are exactly the formulas for $$P(Q=0)$$ and $$P(Q=1)$$ of a $$Po(\\lambda + \\mu)$$ distribution, proving the additive property for these initial cases.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, what is $$\\mathrm{P}(X = 0)$$? Give the simplified expression and explain intuitively what this probability represents. (2 steps)", "answer": "- Step 1: Substituting $$x = 0$$ into the Poisson PMF:\n\n$$\\mathrm{P}(X = 0) = \\frac{e^{-\\lambda} \\lambda^{0}}{0!} = \\frac{e^{-\\lambda} \\cdot 1}{1} = e^{-\\lambda}$$\n\nThis is the simplest Poisson probability — no factorial or power of $$\\lambda$$ to compute (since $$\\lambda^0 = 1$$ and $$0! = 1$$).\n\n- Step 2: Intuitively, $$e^{-\\lambda}$$ is the probability that **no events occur** in the interval. When $$\\lambda$$ is small (rare events), $$e^{-\\lambda} \\approx 1$$ — it's very likely nothing happens. When $$\\lambda$$ is large, $$e^{-\\lambda}$$ becomes very small — it's extremely unlikely to see zero events when the average rate is high.\n\n$$\\mathrm{P}(X = 0) = e^{-\\lambda}$$ — the probability of a completely quiet interval, which shrinks exponentially as the rate increases.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{E}(X) = \\lambda$. You may use the fact that $\\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{x!} = 1$. (4 steps)", "answer": "- Step 1: By definition, $\\mathrm{E}(X) = \\sum_{x=0}^{\\infty} x \\cdot \\mathrm{P}(X=x) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$\n- Step 2: The term for $x = 0$ is zero (since $0 \\times anything = 0$), so we start from $x = 1$: $\\mathrm{E}(X) = \\sum_{x=1}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\sum_{x=1}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{(x-1)!}$\n- Step 3: Let $k = x-1$, then as $x$ goes from 1 to ∞, $k$ goes from 0 to ∞: $\\mathrm{E}(X) = \\sum_{k=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^{k+1}}{k!} = \\lambda e^{-\\lambda} \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!}$\n- Step 4: Using the series expansion $e^\\lambda = \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!}$, we get: $\\mathrm{E}(X) = \\lambda e^{-\\lambda} \\cdot e^\\lambda = \\lambda$", "source": "MiniMax ②", "_id": "minimax_2_3"}, {"question": "What does it mean for events to \"occur singly\" in a Poisson context, and what real-world situation would *violate* this?", "answer": "\"Occurring singly\" means at any given instant, only one event can happen — events don't come in clusters or pairs. Mathematically, the probability of two events at exactly the same moment is zero. A violation example: cars arriving at a toll booth as part of a tour bus convoy — they arrive in groups, not individually. Or modelling the number of people entering a cinema, where families arrive together. In both cases events are correlated in time, so the \"singly\" assumption fails and Poisson becomes a poor fit.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Two coffee machines $$C$$ and $$D$$ break down independently at rates 0.1 and 0.05 per week. What's the rate at which **either machine** breaks down in a 12-week period, and what is the rate of **both** breaking down? Be careful with the second part. (4 steps)", "answer": "- Step 1: For \"either machine\" — i.e., total breakdowns from both: by additivity, rate = $$0.1 + 0.05 = 0.15$$ per week, so over 12 weeks, $$\\lambda_{\\text{total}} = 0.15 \\times 12 = 1.8$$.\n- Step 2: For \"both machines breaking at least once\": this is **not** a sum-of-rates question. It asks $$P(C \\geq 1 \\text{ AND } D \\geq 1)$$, which by independence factors into $$P(C \\geq 1) \\cdot P(D \\geq 1)$$.\n- Step 3: Compute each: over 12 weeks, $$C \\sim \\text{Po}(1.2)$$, $$D \\sim \\text{Po}(0.6)$$. Then $$P(C \\geq 1) = 1 - e^{-1.2}$$, $$P(D \\geq 1) = 1 - e^{-0.6}$$.\n- Step 4: Multiply for the joint probability: $$P(\\text{both} \\geq 1) = (1 - e^{-1.2})(1 - e^{-0.6})$$.\n\nThe lesson: \"either\" combines via additivity of rates; \"both\" combines via multiplication of individual probabilities (under independence). Don't confuse the two.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "What is the probability that an event happens **exactly once** in an interval where $$\\lambda$$ is the rate, and how does this depend on $$\\lambda$$? (3 steps)", "answer": "- Step 1: $$P(X = 1) = \\frac{e^{-\\lambda}\\lambda^1}{1!} = \\lambda e^{-\\lambda}$$.\n- Step 2: As a function of $$\\lambda$$: it starts at 0 (when $$\\lambda = 0$$, no events expected), rises, peaks at $$\\lambda = 1$$ (where $$P(X=1) = 1/e \\approx 0.368$$), and then falls again as $$\\lambda$$ grows large.\n- Step 3: Intuition: when $$\\lambda$$ is small, even one event is unlikely; when $$\\lambda$$ is large, having *exactly* one is unlikely because typically you'd get many. The maximum chance of \"exactly one\" occurs at the rate $$\\lambda = 1$$.\n\nThis non-monotonicity is a feature of all Poisson PMFs viewed as functions of $$\\lambda$$: each $$P(X=k)$$ as a function of $$\\lambda$$ peaks at $$\\lambda = k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "State the additive property of the Poisson distribution and the conditions under which it holds. (3 steps)", "answer": "- Step 1: **Statement**: If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$, and $$X$$ and $$Y$$ are **independent**, then $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$.\n- Step 2: **Conditions**: \n+ The two variables must be **independent** (one doesn't influence the other).\n+ They must count events over the **same interval** of time/space.\n- Step 3: Intuition: if cars arrive at rate $$\\lambda$$ and vans arrive at rate $$\\mu$$, both independently, then total vehicles arrive at rate $$\\lambda + \\mu$$ — the rates simply combine because the streams don't interact.\n\nThis is what makes Poisson so practical for modelling: you can pool independent event streams together cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why does the factorial $$x!$$ appear in the denominator of the Poisson PMF? Conceptual intuition. (3 steps)", "answer": "- Step 1: When $$x$$ events occur in an interval, they happen at distinct moments — but the *order* in which they're labelled doesn't matter for counting. There are $$x!$$ ways to arrange $$x$$ events.\n- Step 2: The unnormalised \"weight\" $$\\lambda^x$$ in some sense counts ordered arrangements; dividing by $$x!$$ collapses these into unordered counts (the actual quantity of interest).\n- Step 3: This parallels the binomial coefficient $$\\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$: in both cases, factorials remove the overcounting from ordered enumeration. In Poisson, it's the limit of $$\\binom{n}{k}p^k(1-p)^{n-k}$$ as $$n \\to \\infty$$, where the $$\\binom{n}{k}$$ collapses to $$\\frac{n^k}{k!}$$ and combines with $$p^k = (\\lambda/n)^k$$ to give $$\\lambda^k/k!$$.\n\nThe factorial is doing combinatorial work even though there are no explicit \"trials\" — it's a remnant of the underlying discrete structure.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does the Poisson parameter $$\\lambda$$ scale proportionally with the observation interval length? Connect this to both the \"constant rate\" condition and the additive property. (3 steps)", "answer": "- Step 1: The **constant average rate** condition states that events occur at a steady rate over time. This means if you see an average of $$\\lambda$$ events in 1 unit of time, you expect $$2\\lambda$$ in 2 units, $$3\\lambda$$ in 3 units, etc. The mean count grows linearly with interval length.\n- Step 2: The **additive property** provides the mathematical justification. A longer interval can be split into sub-intervals. If each sub-interval of length 1 has count $$\\sim \\operatorname{Po}(\\lambda)$$, and these are independent (by the Poisson conditions), then the total over $$k$$ sub-intervals is $$\\operatorname{Po}(k\\lambda)$$ by repeated addition.\n- Step 3: Together, these give us confidence that scaling $$\\lambda$$ is valid: if the rate is truly constant, any interval of length $$t$$ has parameter $$\\lambda t$$ (where $$\\lambda$$ is the rate per unit time). This is why, for example, a rate of 4 per hour becomes $$\\lambda = 6$$ for 90 minutes: $$4 \\times \\frac{90}{60} = 6$$.\n\nProportionality of $$\\lambda$$ to interval length follows from constant rate (physical justification) and additive property (mathematical justification).", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Given that exactly 10 planes landed at an airport between 2pm and 3pm, where the rate is 1 per 4 minutes, what's the conceptual setup for finding the probability that exactly 5 landed before 2:30pm? (4 steps)", "answer": "- Step 1: Total arrivals in [2pm, 3pm] are fixed at 10 (given). We want the distribution of arrivals in the first half-hour, conditional on this total.\n- Step 2: A key property of Poisson processes: conditional on the total number of events in an interval, **each event's location is uniformly distributed** over the interval, and locations are independent. So each of the 10 planes lands in [2pm, 2:30pm] independently with probability $$\\frac{30}{60} = 0.5$$.\n- Step 3: This makes the count of planes in the first half-hour a **Binomial $$B(10, 0.5)$$** — not Poisson! The conditioning on a fixed total has changed the distribution.\n- Step 4: $$P(\\text{5 planes in first half}) = \\binom{10}{5}(0.5)^5(0.5)^5 = \\binom{10}{5}/2^{10}$$.\n\nThis is a beautiful Poisson-process property: conditional on the total, locations are uniform — so subdivisions of intervals become Binomial problems, not Poisson ones.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why is it that for small $$\\lambda$$, $$P(X \\geq 1) \\approx \\lambda$$, and what does this mean intuitively? (3 steps)", "answer": "- Step 1: $$P(X \\geq 1) = 1 - e^{-\\lambda}$$. Using the Taylor series $$e^{-\\lambda} = 1 - \\lambda + \\frac{\\lambda^2}{2!} - \\cdots$$, we get $$P(X \\geq 1) = \\lambda - \\frac{\\lambda^2}{2!} + \\cdots \\approx \\lambda$$ for small $$\\lambda$$.\n- Step 2: Intuitively: when events are rare, the probability of \"exactly one\" is much larger than \"two or more\" (which is order $$\\lambda^2$$), so \"at least one\" is dominated by \"exactly one\", whose probability $$\\lambda e^{-\\lambda} \\approx \\lambda$$.\n- Step 3: This means $$\\lambda$$ has a clean physical interpretation — for small rates, $$\\lambda$$ is essentially the probability of an event happening at all in the interval. As $$\\lambda$$ grows, multiple events become likely and this approximation breaks down.\n\nThis is also why Poisson is the natural limit of Binomial when $$n$$ is large and $$p$$ is small: each individual \"trial\" has small probability, but there are many trials.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "What are the three essential conditions that must be met for a Poisson distribution to be a suitable model for events occurring within a given interval? Provide an example where one of these conditions is violated. (3 steps)", "answer": "- Step 1: The events must occur **independently**. The occurrence of one event must not affect the probability of another event occurring.\n+ Violation example: Spread of a contagious disease, where one infection increases the chance of others.\n- Step 2: The events must occur **singly** (one at a time) in space or time. They cannot occur simultaneously.\n+ Violation example: Customers entering a store in groups of 5, rather than one by one.\n- Step 3: The events must occur at a **constant average rate**, meaning the mean number of events in an interval is proportional to the length of that interval.\n+ Violation example: Traffic accidents that peak during rush hour rather than occurring at a steady rate throughout the day.\n\nIf these conditions hold, the randomness is perfectly suited for the Poisson model.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "When the textbook says the relative frequencies \"0.04, 0.17, 0.25, ...\" compare well to Poisson probabilities \"0.063, 0.175, 0.241, ...\", what's the underlying argument supporting Poisson as a model? (3 steps)", "answer": "- Step 1: The empirical relative frequencies in the data table closely match the theoretical Poisson probabilities computed using the sample mean as $$\\lambda$$. Bar by bar, the predictions are reasonable.\n- Step 2: This visual/numerical fit is **goodness-of-fit evidence**. Combined with the structural argument (calls are independent, single, at constant rate), it gives both empirical and theoretical reasons to choose Poisson.\n- Step 3: A formal goodness-of-fit test (like chi-square) can quantify the match; the textbook is doing a more qualitative version. If the relative frequencies wildly diverged from Poisson predictions, that would discredit the model regardless of structural arguments.\n\nModelling is always a dialogue: structural reasoning suggests Poisson; data validates or rejects.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Why does the Poisson distribution require a **continuous** interval (time or space), even though the count itself is discrete? (3 steps)", "answer": "- Step 1: The Poisson model arises from \"events sprinkled randomly throughout a continuum at a constant rate\". The continuum lets us apply rate × length scaling smoothly: any sub-interval gets a proportionally smaller $$\\lambda$$.\n- Step 2: If the underlying domain were discrete (say, a fixed list of trials), there'd be no natural \"scaling\" — you'd be back in Binomial territory. The continuum is what makes \"rate per unit time\" or \"rate per m²\" meaningful.\n- Step 3: That said, many practical problems treat the continuum loosely (e.g., \"calls per day\" implicitly assumes the day is continuous). The math doesn't require strict continuity, just that scaling makes sense over the chosen units.\n\nThis is why Poisson handles \"raisins per cake\" (volumetric) and \"calls per hour\" (temporal) identically — both have continuous domains where rate-times-length yields the local mean.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "Write the probability mass function (PMF) for a Poisson random variable $$X \\sim \\operatorname{Po}(\\lambda)$$, and identify what each symbol in the formula represents.", "answer": "The Poisson PMF is:\n\n$$\\mathrm{P}(X = x) = \\frac{e^{-\\lambda} \\lambda^{x}}{x!}$$, where $$x = 0, 1, 2, 3, \\ldots$$\n\n+ $$e$$: the base of natural logarithms (~2.718), arising from the continuous-time nature of the process\n+ $$\\lambda$$: the **mean rate parameter** — the average number of events expected in the given interval\n+ $$x$$: the specific count of events we are finding the probability for (must be a non-negative integer)\n+ $$x!$$: the factorial of $$x$$, which ensures probabilities decrease for larger counts and makes the distribution sum to 1\n+ $$e^{-\\lambda}$$: a scaling factor that ensures all probabilities sum to 1 (it's the probability of zero events)\n\nThe formula gives the probability of observing exactly $$x$$ events when the average rate is $$\\lambda$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "The binomial distribution models the number of successes in a fixed number of trials. What fundamentally different type of real-world scenario does the Poisson distribution model, and why does this mean the Poisson has no upper limit on its values? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **number of times an event occurs within a fixed interval of time or space** — things like phone calls per hour, flaws per metre of cloth, or radioactive emissions per minute. Unlike the binomial, there is no concept of \"trials\" or \"success/failure\" per trial.\n- Step 2: Because we are simply *counting occurrences* in a continuous interval, there is no natural upper bound. In theory, an arbitrarily large number of phone calls could arrive in an hour (even if extremely unlikely). The Poisson variable $$X$$ can take any non-negative integer value: $$x = 0, 1, 2, 3, \\ldots$$\n- Step 3: The parameter $$\\lambda$$ controls the average rate, and probabilities for large $$x$$ values decay rapidly (due to the $$\\frac{\\lambda^x}{x!}$$ term where $$x!$$ grows faster than $$\\lambda^x$$), so high counts are practically negligible — but theoretically possible.\n\nThe Poisson counts *events in a continuum*, not *successes in a finite trial set* — this is why its range is unbounded above.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A company gets emails of three types — personal (1.8/hr), business (3.7/hr), advertising (1.5/hr). What's the distribution of total emails per hour, and why is summing rates valid? (3 steps)", "answer": "- Step 1: Each email type is independent (different sources) and individually Poisson. Both conditions for the additive property are satisfied: independence and same interval.\n- Step 2: Therefore total $$T \\sim \\text{Po}(1.8 + 3.7 + 1.5) = \\text{Po}(7)$$ per hour. The additive property generalises from two to any finite number of independent Poissons by repeatedly applying it pairwise.\n- Step 3: The combined rate is just the rate at which **any** email arrives — pooling independent streams gives a stream with the pooled rate, and the Poisson structure is preserved because the union of independent Poisson processes is itself a Poisson process.\n\nThis is also why \"all phone calls\" can be modelled as Poisson even if calls come from many different demographic sources — superposition of independent Poissons is Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "What is the *total* number of breakdowns in 6 weeks if the rate is 1.5 per week? And how does this differ from \"at most 2 breakdowns each week for 6 weeks\"? (3 steps)", "answer": "- Step 1: Total over 6 weeks: by scaling, $$T \\sim \\text{Po}(1.5 \\times 6) = \\text{Po}(9)$$. We can directly read off $$P(T \\leq n)$$ from a cumulative table.\n- Step 2: \"At most 2 each week\" is different — it asks each of 6 weekly counts to satisfy the same constraint individually. Let $$p = P(X \\leq 2)$$ where $$X \\sim \\text{Po}(1.5)$$ is the weekly count. Then by independence across weeks, $$P(\\text{all 6 weeks satisfy}) = p^6$$.\n- Step 3: These are different scenarios: \"total $$\\leq 12$$ over 6 weeks\" allows uneven distribution (e.g., 0 + 0 + 0 + 0 + 6 + 6); \"$$\\leq 2$$ each week\" forbids any single-week excess. The first uses pooled Poisson; the second uses repeated independent Poisson trials.\n\nAlways ask: are we pooling counts, or constraining each interval separately? Different question, different math.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{P}(X = x+1) = \\frac{\\lambda}{x+1} \\times \\mathrm{P}(X = x)$. What is the practical use of this recurrence relation? (2 steps)", "answer": "- Step 1: $\\mathrm{P}(X = x+1) = \\frac{e^{-\\lambda} \\lambda^{x+1}}{(x+1)!} = \\frac{e^{-\\lambda} \\lambda^x \\cdot \\lambda}{x!(x+1)} = \\frac{\\lambda}{x+1} \\times \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\frac{\\lambda}{x+1} \\mathrm{P}(X = x)$\n- Step 2: This recurrence relation allows efficient computation of Poisson probabilities sequentially without calculating factorials each time. Starting from $\\mathrm{P}(X = 0) = e^{-\\lambda}$, we can compute $\\mathrm{P}(X = 1)$, $\\mathrm{P}(X = 2)$, etc. by multiplying by $\\frac{\\lambda}{1}$, $\\frac{\\lambda}{2}$, etc. This is particularly useful when using calculators or writing computer programs.", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "Give three real-world examples where a Poisson distribution would naturally apply.", "answer": "- Step 1: **Radioactive emissions** — particles emitted by a source in a 5-minute period; each emission is essentially independent at low intensity, occurs singly, and at a roughly constant average rate.\n- Step 2: **Telephone calls to a switchboard** in a 10-minute interval — calls from independent customers, arriving one at a time, at a roughly steady rate during a given period.\n- Step 3: **Spelling mistakes per page of a newspaper**, **cars passing a school in 3-minute intervals**, or **raisins in a fruitcake** (here the \"interval\" is volume of cake, not time, but the same logic applies).\n\nThe common thread: counts of independent, single, randomly-scattered events over a continuous interval at a steady average rate.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A Poisson distribution with very small $$\\lambda$$ (say $$\\lambda = 0.5$$) — qualitatively, where is most of the probability mass concentrated, and what does this mean practically? (3 steps)", "answer": "- Step 1: With $$\\lambda = 0.5$$, $$\\mathrm{P}(X=0) = e^{-0.5} \\approx 0.607$$ — over 60% of the time, no events occur at all. $$\\mathrm{P}(X=1) \\approx 0.303$$, so about 30% of the time exactly one event occurs.\n- Step 2: Together, $$\\mathrm{P}(X \\leq 1) \\approx 0.91$$ — the distribution is heavily concentrated at 0 and 1. Values of 2, 3, or more are rare (about 9% combined).\n- Step 3: Practically, a small $$\\lambda$$ means the event is rare. Most intervals are \"quiet\" (zero events), and when events do occur, they almost always appear alone. This is why Poisson with small $$\\lambda$$ is used to model rare phenomena
