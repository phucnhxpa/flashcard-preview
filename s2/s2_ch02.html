operty of Poisson distributions, and why does it work? (3 steps)", "answer": "- Step 1: **Property**: If $ X \\sim \\text{Po}(\\lambda) $ and $ Y \\sim \\text{Po}(\\mu) $, then $ X + Y \\sim \\text{Po}(\\lambda + \\mu) $.  \n- Step 2: **Conditions**:  \n  + $ X $ and $ Y $ must be independent.  \n  + Events must be counted over the same interval (e.g., calls/hour).  \n- Step 3: **Why it works**: Independence ensures no overlap, and summed rates preserve the Poisson structure. For example, two independent Poisson processes (e.g., calls to two lines) combine into a single process with summed rate.  \n\n**Takeaway**: Additive property simplifies modeling aggregated processes, but only if intervals and independence align.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Given cumulative distribution tables, how do you calculate $ P(X \\geq a) $? Use Example 2b to explain. (2 steps)", "answer": "- Step 1: **Complement rule**: $ P(X \\geq a) = 1 - P(X \\leq a - 1) $.  \n- Step 2: **Example 2b**:  \n  + For $ X \\sim \\text{Po}(5) $, $ P(X \\geq 2) = 1 - P(X \\leq 1) = 1 - 0.0404 = 0.9596 $.  \n  + Tables provide $ P(X \\leq x) $, so use the complement for upper tail probabilities.  \n\n**Takeaway**: Tables are efficient for direct $ P(X \\leq x) $, but require algebraic manipulation for inequalities like $ \\geq $ or $ > $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why can’t you add Poisson distributions from different time intervals without adjusting $ \\lambda $? (3 steps)", "answer": "- Step 1: **Interval mismatch**: If $ X \\sim \\text{Po}(\\lambda_1) $ over $ t_1 $ and $ Y \\sim \\text{Po}(\\lambda_2) $ over $ t_2 \\neq t_1 $, rates aren’t comparable.  \n- Step 2: **Adjustment needed**: Scale $ \\lambda $ to a common interval (e.g., $ \\lambda_{\\text{hour}} = 2 \\times \\lambda_{\\text{30-min}} $).  \n- Step 3: **Example**: Example 7a scales car rates (2/5 min to 10 min: $ \\lambda = 4 $) and truck rates (3/15 min to 10 min: $ \\lambda = 2 $) before adding.  \n\n**Takeaway**: Always align intervals to the same time/space unit before applying the additive property.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How do you model the probability of detecting at least $ n $ events in a binomial-Poisson hybrid scenario (e.g., Example 5b)? (4 steps)", "answer": "- Step 1: **Two-stage model**: First, use Poisson to find the probability of a single event (e.g., $ P(X > 4) $), then use binomial for repeated trials.  \n- Step 2: **Example 5b**:  \n  + Define $ Y \\sim \\text{Bin}(5, 0.1847) $, where $ 0.1847 $ is the daily Poisson probability.  \n  + Calculate $ P(Y \\geq 4) = P(Y=4) + P(Y=5) $.  \n- Step 3: **Justification**: Binomial applies because each day is an independent trial with success probability $ p = P(X > 4) $.  \n- Step 4: **Calculation**: Use binomial coefficients and probabilities:  \n  $ P(Y=4) = \\binom{5}{4} (0.1847)^4 (0.8153) $, etc.  \n\n**Takeaway**: Hybrid models combine Poisson (individual rates) and binomial (repeated trials) for complex scenarios.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Why is the Poisson distribution inappropriate for modeling events that occur in clusters (e.g., earthquakes followed by aftershocks)? (3 steps)", "answer": "- Step 1: **Cluster violation**: Clusters violate the independence assumption. Aftershocks are dependent on main quakes.  \n- Step 2: **Variance inflation**: Clustering increases variance beyond $ \\lambda $, breaking the mean-variance equality.  \n- Step 3: **Alternative models**: Use negative binomial (overdispersed counts) or compound Poisson processes.  \n\n**Takeaway**: Poisson assumes no interaction; clustered events require richer models to account for dependency.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "How does the Poisson distribution approximate the binomial distribution, and when is this valid? (3 steps)", "answer": "- Step 1: **Approximation**: When $ n $ is large and $ p $ is small, $ \\text{Bin}(n, p) \\approx \\text{Po}(\\lambda = np) $.  \n- Step 2: **Conditions**:  \n  + $ n \\geq 50 $, $ p \\leq 0.1 $, and $ np $ moderate.  \n  + Rare events (e.g., defective items in a batch).  \n- Step 3: **Example**: For $ \\text{Bin}(50, 0.02) $, use $ \\text{Po}(1) $, as $ np = 1 $.  \n\n**Takeaway**: Poisson simplifies calculations for rare events, avoiding binomial coefficient complexity.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the probability of observing exactly 0 events in a Poisson distribution, and how does this relate to the mean $ \\lambda $? (2 steps)", "answer": "- Step 1: **Formula**: $ P(X=0) = \\frac{e^{-\\lambda} \\lambda^0}{0!} = e^{-\\lambda} $.  \n- Step 2: **Intuition**: As $ \\lambda $ increases, $ P(X=0) $ decreases exponentially. For $ \\lambda = 3 $, $ P(X=0) = e^{-3} \\approx 0.05 $.  \n\n**Takeaway**: Zero probabilities decay rapidly with higher rates, useful for modeling \"rare events\" like equipment failures.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write down the probability mass function for a Poisson distribution and explain what each symbol represents. (2 steps)", "answer": "- Step 1: The probability that the random variable X takes the value x is: $$\\mathrm{P}(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}$$ where x = 0, 1, 2, 3, ...\n- Step 2: Here, λ (lambda) is the single parameter representing both the mean and variance of the distribution. It represents the average rate at which events occur in the given interval. The term e^(-λ) is the exponential constant (approximately 2.718), and x! is the factorial of x.\n+ For example, if λ = 3, then P(X=2) = e^(-3) × 3² / 2! ≈ 0.224", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why does the Poisson distribution have only one parameter (λ) while the binomial distribution has two (n and p)? (2 steps)", "answer": "- Step 1: In the binomial distribution, we have n independent trials, each with probability p of success. The mean is np and the variance is np(1-p), so we need both parameters to fully describe the distribution.\n- Step 2: In the Poisson distribution, the key property is that the mean equals the variance (E(X) = Var(X) = λ). Since these two moments are tied together, only one parameter is needed. This directly follows from the Poisson's derivation as the limit of a binomial as n → ∞ and p → 0 while keeping np = λ constant.\n+ This also means that if you observe data where the sample mean is approximately equal to the sample variance, a Poisson model may be appropriate.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Show, using the series expansion of e^λ, that the Poisson probabilities sum to 1. (3 steps)", "answer": "- Step 1: Starting with the sum of all probabilities: $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = \\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{x!}$$\n- Step 2: Factor out e^(-λ): $$= e^{-\\lambda} \\sum_{x=0}^{\\infty} \\frac{\\lambda^x}{x!}$$\n- Step 3: The series in the bracket is the Maclaurin expansion of e^λ: $$e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + ... = \\sum_{x=0}^{\\infty} \\frac{\\lambda^x}{x!}$$\n+ Therefore: $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = e^{-\\lambda} \\times e^\\lambda = 1$$\n+ This confirms it's a valid probability distribution.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "For a Poisson distribution, what is the relationship between the mean and variance? How does this property help us decide whether Poisson is a suitable model for real data? (2 steps)", "answer": "- Step 1: For X ~ Po(λ): $$\\mathrm{E}(X) = \\lambda \\quad \\text{and} \\quad \\mathrm{Var}(X) = \\lambda$$ The mean and variance are exactly equal.\n- Step 2: In practice, we collect data, calculate the sample mean (x̄) and sample variance (s²). If x̄ ≈ s² (they are close in value), this suggests a Poisson distribution may be appropriate. If they differ substantially, Poisson may not be suitable.\n+ Example: If mean = 3.69 and variance = 3.73 (from the botanist daisies example), the close agreement supports using Poisson.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "If X ~ Po(2.1), calculate P(X = 3) using the formula. (2 steps)", "answer": "- Step 1: Using P(X=x) = e^(-λ) × λ^x / x! with λ = 2.1 and x = 3: $$\\mathrm{P}(X=3) = \\frac{e^{-2.1} \\times 2.1^3}{3!}$$\n- Step 2: Computing: = e^(-2.1) × 9.261 / 6 = 0.1224... × 1.5435... = 0.1890 (4 d.p.)\n+ This can be verified using calculator functions or Poisson tables.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "If X ~ Po(2.1), find P(X ≥ 1). Why is this calculated as 1 - P(X = 0) rather than directly? (2 steps)", "answer": "- Step 1: P(X ≥ 1) = 1 - P(X = 0), which equals 1 - e^(-2.1)\n- Step 2: Computing: = 1 - 0.1224... = 0.8775 (4 d.p.)\n+ We use this complement approach because directly summing P(X=1) + P(X=2) + ... would require infinitely many terms. The complement is much simpler since P(X = 0) = e^(-λ) has a simple form.\n+ This is a key technique for \"at least 1\" type problems.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For X ~ Po(5), use the cumulative distribution tables to find P(X ≥ 2). Explain why this requires calculating 1 - P(X ≤ 1). (2 steps)", "answer": "- Step 1: P(X ≥ 2) is the complement of P(X ≤ 1). From tables with λ = 5: P(X ≤ 1) = 0.0404\n- Step 2: Therefore: P(X ≥ 2) = 1 - 0.0404 = 0.9596\n+ We cannot read P(X ≥ 2) directly from cumulative tables because tables give P(X ≤ x). The inequality X ≥ 2 means X = 2, 3, 4, ..., which is 1 minus everything up to X = 1.\n+ This is a common exam technique.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For X ~ Po(5), find P(1 ≤ X ≤ 4) using the cumulative distribution tables. (2 steps)", "answer": "- Step 1: Using the identity: P(a ≤ X ≤ b) = P(X ≤ b) - P(X ≤ a-1)\n- Step 2: Therefore: P(1 ≤ X ≤ 4) = P(X ≤ 4) - P(X ≤ 0) = 0.4405 - 0.0067 = 0.4338\n+ From tables: P(X ≤ 4) = 0.4405 and P(X ≤ 0) = 0.0067 (for λ = 5)\n+ The lower bound 1 means we subtract everything up to X = 0.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For X ~ Po(7.5), find the value of a such that P(X ≤ a) = 0.2414. How do you interpret the result? (2 steps)", "answer": "- Step 1: Using the Poisson cumulative tables with λ = 7.5, we look for the value where cumulative probability = 0.2414\n- Step 2: From tables: P(X ≤ 5) = 0.2414, therefore a = 5\n+ This reverse lookup is common — finding the x-value given a probability. This is useful for determining percentiles or thresholds.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For X ~ Po(7.5), find the value of b such that P(X < b) = 0.5246. Why is the answer b = 8, not b = 7? (2 steps)", "answer": "- Step 1: P(X < b) means P(X ≤ b-1). From tables with λ = 7.5, we need P(X ≤ b-1) = 0.5246\n- Step 2: P(X ≤ 7) = 0.5246, so b-1 = 7, giving b = 8\n+ The subtlety: P(X < b) is strictly less than b, so the largest integer satisfying this is b-1. For b = 8, this means X ≤ 7, which matches the table value.\n+ This is a common source of errors if not careful about strict vs. non-strict inequalities.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "An internet provider averages 4 failed connections per hour. If failures follow a Poisson distribution, what is the probability of more than 6 failures in one hour? What about in a 90-minute period? (3 steps)", "answer": "- Step 1: For 1 hour: X ~ Po(4). P(X > 6) = 1 - P(X ≤ 6)\n- Step 2: From tables: P(X ≤ 6) = 0.8893..., so P(X > 6) = 1 - 0.8893 = 0.1107\n+ Step 3: For 90 minutes: λ scales proportionally. 90 minutes = 1.5 hours, so λ = 1.5 × 4 = 6. Let Y ~ Po(6). P(Y > 6) = 1 - P(Y ≤ 6) = 1 - 0.6063 = 0.3937\n+ The key insight: λ is proportional to the time interval. If the rate is 4 per hour, then for t hours, λ = 4t.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A clinic receives 3 patients per day for insect bites. What's the probability that in a 5-day period, at least 4 days have more than 4 patients? (3 steps)", "answer": "- Step 1: First find p = P(X > 4) for one day. X ~ Po(3), so P(X > 4) = 1 - P(X ≤ 4) = 1 - 0.8153 = 0.1847\n- Step 2: Let Y = number of days with >4 patients in 5 days. Y ~ B(5, 0.1847)\n- Step 3: P(Y ≥ 4) = P(Y=4) + P(Y=5) = C(5,4)(0.1847)⁴(0.8153) + C(5,5)(0.1847)⁵ = 0.00496 (approx)\n+ This combines Poisson (for daily patient counts) with binomial (for counting days with certain outcomes). This is a common exam problem structure.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Weeds grow at a rate of 1.3 per m². What's the probability of fewer than 3 weeds in a 4 m² plot? Explain why we multiply 1.3 by 4. (2 steps)", "answer": "- Step 1: Since weeds occur at a constant rate per unit area, we scale λ proportionally. For 4 m²: λ = 4 × 1.3 = 5.2. So X ~ Po(5.2)\n- Step 2: P(X < 3) = P(X ≤ 2). From tables or calculator: = 0.0350 (approx)\n+ The constant rate property means if the average is 1.3 per m², then in 4 m² we expect 4 × 1.3 = 5.2 on average. The rate scales linearly with the interval size.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "If X ~ Po(λ) and P(X = 2) = P(X = 3), find the value of λ. (2 steps)", "answer": "- Step 1: Setting the probabilities equal: $$\\frac{e^{-\\lambda} \\lambda^2}{2!} = \\frac{e^{-\\lambda} \\lambda^3}{3!}$$\n- Step 2: Cancelling common terms: $$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6}$$ Multiplying by 6: 3λ² = λ³\n+ Since λ ≠ 0 (otherwise probabilities would be zero), divide by λ²: 3 = λ\n+ Therefore λ = 3. This can be verified: P(X=2) = 0.224, P(X=3) = 0.224 when λ = 3.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "If X ~ Po(λ) and P(X = 4) = 3 × P(X = 2), find λ. (2 steps)", "answer": "- Step 1: Setting up the equation: $$\\frac{e^{-\\lambda} \\lambda^4}{4!} = 3 \\times \\frac{e^{-\\lambda} \\lambda^2}{2!}$$\n- Step 2: Cancelling e^(-λ) and rearranging: $$\\frac{\\lambda^4}{24} = 3 \\times \\frac{\\lambda^2}{2}$$ = $$\\frac{\\lambda^4}{24} = \\frac{3\\lambda^2}{2}$$\n+ Multiply by 24: λ⁴ = 36λ². Since λ ≠ 0: λ² = 36, so λ = 6.\n+ Check: P(X=4)/P(X=2) = (e^-6 × 6⁴/24) / (e^-6 × 6²/2) = (1296/24)/(36/2) = 54/18 = 3 ✓", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "If X ~ Po(3.6) and Y ~ Po(4.4) are independent, what distribution does X + Y follow? Find P(X + Y = 7). (2 steps)", "answer": "- Step 1: The additive property: If X ~ Po(λ) and Y ~ Po(μ) are independent, then X + Y ~ Po(λ + μ). Here λ + μ = 3.6 + 4.4 = 8, so X + Y ~ Po(8)\n- Step 2: P(X + Y = 7) = e^(-8) × 8⁷ / 7! = 0.1396 (4 d.p.)\n+ Key requirement: the Poisson variables must be independent AND relate to events in the same interval.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Cars pass a point at 24 per minute, vans at 8 per minute. What's the probability that in any 15-second period, at least 4 of each type pass? (3 steps)", "answer": "- Step 1: Convert to the same time interval. 15 seconds = 0.25 minutes. For cars: λ = 24 × 0.25 = 6. For vans: λ = 8 × 0.25 = 2\n- Step 2: Let C ~ Po(6), V ~ Po(2). We need P(C ≥ 4 AND V ≥ 4). Since independent: = P(C ≥ 4) × P(V ≥ 4)\n- Step 3: P(C ≥ 4) = 1 - P(C ≤ 3) = 1 - 0.1512 = 0.8488; P(V ≥ 4) = 1 - P(V ≤ 3) = 1 - 0.9473 = 0.0527\n+ Product: 0.8488 × 0.0527 ≈ 0.0447\n+ Note: P(V ≥ 4) is very small because the van rate is low.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Two independent Poisson variables X ~ Po(2.5) and Y ~ Po(3.5). Find: (a) P(X = 2 and Y = 2), (b) P(both X and Y are greater than 2), (c) P(X + Y = 5). (3 steps)", "answer": "- Step 1 (a): P(X = 2 and Y = 2) = P(X=2) × P(Y=2) (independence) = 0.2562... × 0.2518... = 0.0645 (4 d.p.)\n- Step 2 (b): P(X > 2) × P(Y > 2) = [1 - P(X ≤ 2)] × [1 - P(Y ≤ 2)] = (1 - 0.5438) × (1 - 0.3234) = 0.4562 × 0.6766 = 0.3087\n- Step 3 (c): X + Y ~ Po(2.5 + 3.5) = Po(6). P(X + Y = 5) = e^(-6) × 6⁵ / 5! = 0.1606\n+ Distinguish between: (a) joint probability of specific values (product), (b) both exceed threshold (product of complements), (c) sum equals value (use additive property).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "An office worker receives internal calls at 1 per 5 minutes (12 per hour) and external calls at 2 per 5 minutes (24 per hour). Find the probability of exactly 3 total calls in a 4-minute period. (3 steps)", "answer": "- Step 1: Convert rates to 4-minute intervals. Internal: 1 per 5 min = 0.8 per 4 min. External: 2 per 5 min = 1.6 per 4 min\n- Step 2: Let I ~ Po(0.8), E ~ Po(1.6). Total T = I + E ~ Po(0.8 + 1.6) = Po(2.4)\n- Step 3: P(T = 3) = e^(-2.4) × 2.4³ / 3! = 0.2090 (4 d.p.)\n+ Key: both rates must be expressed for the SAME time interval before adding.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Machine C breaks down at 0.1 per week, machine D at 0.05 per week. Over 12 weeks, what's the probability that each machine breaks down at least once? (2 steps)", "answer": "- Step 1: For 12 weeks: λ_C = 12 × 0.1 = 1.2, λ_D = 12 × 0.05 = 0.6. Let C ~ Po(1.2), D ~ Po(0.6)\n- Step 2: P(C ≥ 1) = 1 - P(C = 0) = 1 - e^(-1.2) = 1 - 0.3010 = 0.6990; P(D ≥ 1) = 1 - e^(-0.6) = 1 - 0.5488 = 0.4512\n+ Since independent: P(both at least once) = 0.6990 × 0.4512 = 0.3154", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is the equality of mean and variance a useful diagnostic for checking if Poisson is an appropriate model? What would you conclude if mean = 5.2 and variance = 12.1? (2 steps)", "answer": "- Step 1: For a true Poisson distribution, mean exactly equals variance. When fitting Poisson to real data, if the sample mean and sample variance are approximately equal, this supports the Poisson assumption.\n- Step 2: If mean = 5.2 but variance = 12.1, the variance is more than double the mean. This \"overdispersion\" suggests Poisson is NOT appropriate. The data shows more variability than Poisson can account for.\n+ Overdispersion often indicates that the independence assumption is violated or there's heterogeneity (different groups with different rates).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A botanist counts daisies in 80 squares: Σx = 295, Σx² = 1386. Calculate the mean and variance, and explain why this suggests Poisson is suitable. (3 steps)", "answer": "- Step 1: Mean = 295/80 = 3.69 (2 d.p.)\n- Step 2: Variance = Σx²/n - x̄² = 1386/80 - 3.69² = 17.325 - 13.6161 = 3.71 (2 d.p.) [or using formula: (Σx² - (Σx)²/n)/(n-1) gives similar]\n- Step 3: Mean = 3.69, variance = 3.71. These are very close (both ≈ 3.7 to 1 decimal place), supporting the use of a Poisson model.\n+ This is the key diagnostic: when observed mean ≈ observed variance, Poisson is appropriate.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Given that mean = variance = 3.7 for daisy counts, estimate the probability of finding exactly 3 daisies in a randomly selected square. (2 steps)", "answer": "- Step 1: Use λ = 3.7 (the mean/variance from the data). Let X ~ Po(3.7)\n- Step 2: P(X = 3) = e^(-3.7) × 3.7³ / 3! = 0.2087 (4 d.p.)\n+ Once we've established Poisson is suitable (mean ≈ variance), we use the calculated mean as λ to estimate probabilities.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A call-centre handles 15 calls per hour. Find the probability of exactly 4 calls in a 20-minute interval, and more than 8 calls in a 30-minute interval. (3 steps)", "answer": "- Step 1 (20 mins): 20 mins = 1/3 hour. λ = 15 × (1/3) = 5. Let X ~ Po(5). P(X = 4) = 0.1755\n- Step 2 (30 mins): 30 mins = 0.5 hour. λ = 15 × 0.5 = 7.5. Let Y ~ Po(7.5). P(Y > 8) = 1 - P(Y ≤ 8)\n- Step 3: From tables: P(Y ≤ 8) = 0.6620, so P(Y > 8) = 0.3380\n+ Key: always scale λ proportionally to the time interval.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A taxi company supplies two organisations. A orders at 1.25/day, B orders at 0.75/day. Find probability that total orders = 2 on a given day, and in a 5-day week total < 10. (3 steps)", "answer": "- Step 1 (one day): Combined λ = 1.25 + 0.75 = 2. Let T ~ Po(2). P(T = 2) = e^(-2) × 2² / 2! = 0.2707\n- Step 2 (5-day week): λ for 5 days = 5 × 2 = 10. Let W ~ Po(10). P(W < 10) = P(W ≤ 9)\n- Step 3: From tables: P(W ≤ 9) = 0.4579\n+ Note: We can either combine and scale, or scale then combine — both give the same result.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Emails arrive: personal 1.8/hr, business 3.7/hr, advertising 1.5/hr. Find probability of at least one of each type in 30 minutes. (3 steps)", "answer": "- Step 1: Scale to 30 minutes (0.5 hr): λ_personal = 1.8 × 0.5 = 0.9; λ_business = 3.7 × 0.5 = 1.85; λ_advertising = 1.5 × 0.5 = 0.75\n- Step 2: Let P ~ Po(0.9), B ~ Po(1.85), A ~ Po(0.75). Need P(P ≥ 1) × P(B ≥ 1) × P(A ≥ 1)\n- Step 3: P(P ≥ 1) = 1 - e^(-0.9) = 0.5934; P(B ≥ 1) = 1 - e^(-1.85) = 0.8429; P(A ≥ 1) = 1 - e^(-0.75) = 0.5276\n+ Product = 0.5934 × 0.8429 × 0.5276 = 0.2640", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A road has accidents at 0.7 per month. Find probability of exactly 2 accidents in a 3-month period. (2 steps)", "answer": "- Step 1: Scale λ to 3 months: λ = 0.7 × 3 = 2.1. Let X ~ Po(2.1)\n- Step 2: P(X = 2) = e^(-2.1) × 2.1² / 2! = 0.2700 (4 d.p.)\n+ This is a straightforward scaling problem: multiply the rate by the number of time units.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Using the Poisson distribution, show that if X ~ Po(λ), then E(X) = λ. (Hint: Use the definition E(X) = Σ x × P(X=x) and the series expansion of e^λ) (3 steps)", "answer": "- Step 1: E(X) = Σ_{x=0}^∞ x × (e^(-λ)λ^x/x!)\n- Step 2: For x = 0, the term is 0. For x ≥ 1: x × λ^x/x! = λ × λ^(x-1)/(x-1)!. So:\nE(X) = Σ_{x=1}^∞ e^(-λ) × λ × λ^(x-1)/(x-1)! = e^(-λ)λ × Σ_{k=0}^∞ λ^k/k! where k = x-1\n- Step 3: The sum is e^λ (the series expansion). So E(X) = e^(-λ)λ × e^λ = λ\n+ This is a formal proof showing why the mean of a Poisson equals λ.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Using the Poisson distribution, show that Var(X) = λ. (3 steps)", "answer": "- Step 1: We need E[X(X-1)] first. E[X(X-1)] = Σ_{x=0}^∞ x(x-1) × e^(-λ)λ^x/x!\n- Step 2: For x = 0,1, this is 0. For x ≥ 2: x(x-1)λ^x/x! = λ² × λ^(x-2)/(x-2)!. So:\nE[X(X-1)] = Σ_{x=2}^∞ e^(-λ)λ² × λ^(x-2)/(x-2)! = e^(-λ)λ² × Σ_{k=0}^∞ λ^k/k! = λ²\n- Step 3: Now Var(X) = E(X²) - [E(X)]². Since E[X(X-1)] = E(X²) - E(X), we have E(X²) = λ² + λ. So Var(X) = (λ² + λ) - λ² = λ\n+ This confirms the key property that makes Poisson unique: mean = variance.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A company receives emails at 3 per 5 minutes. What's the probability of at least 8 emails in a 10-minute period? (2 steps)", "answer": "- Step 1: Scale to 10 minutes: 10 mins = 2 × 5 mins. λ = 3 × 2 = 6. Let X ~ Po(6)\n- Step 2: P(X ≥ 8) = 1 - P(X ≤ 7). From tables: P(X ≤ 7) = 0.7440, so P(X ≥ 8) = 0.2560\n+ This tests the complement technique with scaled λ.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "If X ~ Po(5.5), use tables to find: (a) P(X ≤ 3), (b) P(X ≥ 6), (c) P(3 ≤ X ≤ 7). (3 steps)", "answer": "- Step 1 (a): From tables with λ = 5.5: P(X ≤ 3) = 0.1186\n- Step 2 (b): P(X ≥ 6) = 1 - P(X ≤ 5) = 1 - 0.4159 = 0.5841\n- Step 3 (c): P(3 ≤ X ≤ 7) = P(X ≤ 7) - P(X ≤ 2) = 0.6728 - 0.0880 = 0.5848\n+ Practice reading from and manipulating the cumulative tables.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A shop sells desktops at 2.4/day and laptops at 1.6/day. Find probability of selling at least 2 of each on a particular day. (3 steps)", "answer": "- Step 1: Let D ~ Po(2.4), L ~ Po(1.6). Need P(D ≥ 2) × P(L ≥ 2)\n- Step 2: P(D ≥ 2) = 1 - P(D ≤ 1) = 1 - (0.0907 + 0.2177) = 1 - 0.3084 = 0.6916; P(L ≥ 2) = 1 - P(L ≤ 1) = 1 - (0.2019 + 0.3230) = 1 - 0.5249 = 0.4751\n- Step 3: Product = 0.6916 × 0.4751 = 0.3286\n+ These are independent events, so we multiply.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A photocopier breaks down 8 times per year. Find probability of exactly 2 breakdowns in the next month, and at least 2 breakdowns in 3 of the next 4 months. (3 steps)", "answer": "- Step 1: Monthly rate = 8/12 = 2/3 ≈ 0.667. Let X ~ Po(0.667). P(X = 2) = e^(-0.667) × 0.667²/2! = 0.1183\n- Step 2: For one month, p = P(X ≥ 2) = 1 - P(X ≤ 1) = 1 - (0.5134 + 0.3428) = 1 - 0.8562 = 0.1438\n- Step 3: Over 4 months, let Y ~ B(4, 0.1438). P(exactly 3 months with ≥2) = C(4,3)(0.1438)³(0.8562) = 0.0122\n+ This combines Poisson (for breakdowns per month) with binomial (for counting months).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A website receives 240 visits per hour. State a suitable model for visits in a one-minute interval, and find probability of at least 10 visits in 2 minutes. (3 steps)", "answer": "- Step 1 (model): For 1 minute (240 per 60 mins = 4 per minute), visits ~ Po(4). Poisson is suitable because visits occur independently, singly, at a constant average rate.\n- Step 2 (2 minutes): λ = 4 × 2 = 8. Let X ~ Po(8). Need P(X ≥ 10)\n- Step 3: P(X ≥ 10) = 1 - P(X ≤ 9). From tables: P(X ≤ 9) = 0.7166, so P(X ≥ 10) = 0.2834\n+ The rate per minute (4) is found by dividing 240 by 60.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "An elevator breaks down at 3 times per 4-week period. Find probability of at least once in one week, and exactly twice in one week. (2 steps)", "answer": "- Step 1: Weekly rate = 3/4 = 0.75. Let X ~ Po(0.75). P(X ≥ 1) = 1 - e^(-0.75) = 1 - 0.4724 = 0.5276\n- Step 2: P(X = 2) = e^(-0.75) × 0.75² / 2! = 0.1323\n+ After observing 2 breakdowns in one week, the probability of at least one in the next week is still 0.5276 — memoryless property, past doesn't affect future if rate is constant.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "What is the key difference between the notation P(X ≤ x) and P(X < x) when using Poisson tables? Why does this matter? (2 steps)", "answer": "- Step 1: P(X ≤ x) includes x, while P(X < x) = P(X ≤ x-1) does NOT include x.\n- Step 2: When solving problems, you must convert strict inequalities (<, >) to non-strict (≤, ≥) using +1 or -1 adjustments. For example, P(X < 5) = P(X ≤ 4), and P(X > 3) = 1 - P(X ≤ 3).\n+ This is a common source of errors in exam questions. Always check whether your inequality is strict.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "A car salesman sells at 6 per week. What's the probability that in 4 weeks, exactly 2 weeks have exactly 5 sales? (3 steps)", "answer": "- Step 1: First find p = P(exactly 5 sales in a week). Let S ~ Po(6). P(S = 5) = e^(-6) × 6⁵/5! = 0.1606\n- Step 2: Over 4 weeks, number of weeks with 5 sales follows B(4, 0.1606)\n- Step 3: P(exactly 2 weeks with 5 sales) = C(4,2)(0.1606)²(0.8394)² = 6 × 0.02579 × 0.7046 = 0.1090\n+ This is a Poisson-then-Binomial problem: Poisson for weekly sales, binomial for counting successful weeks.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Aisha receives 1.2 letters/day, Biyu receives 0.8 letters/day. Find probability they receive exactly 3 letters total on a particular day. (2 steps)", "answer": "- Step 1: Combined rate = 1.2 + 0.8 = 2.0 per day. Let T ~ Po(2)\n- Step 2: P(T = 3) = e^(-2) × 2³/3! = 0.1804\n+ The additive property makes this straightforward: combine the rates and compute one probability.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "If observed data has mean 4.2 and variance 2.1, would a Poisson distribution be appropriate? Explain your reasoning. (2 steps)", "answer": "- Step 1: For Poisson, mean MUST equal variance. Here mean = 4.2 but variance = 2.1.\n- Step 2: The variance is only about half the mean. This \"underdispersion\" suggests Poisson is NOT appropriate. The data is less variable than Poisson would predict.\n+ In practice, some variation is expected, but a variance less than half the mean is a strong red flag against Poisson.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Flaws occur at 1.5 per 50m of material. For a 200m roll, find probability of fewer than 4 flaws. If 5 such rolls are bought, find probability at least 2 rolls have fewer than 4 flaws. (3 steps)", "answer": "- Step 1 (one roll): 200m = 4 × 50m, so λ = 4 × 1.5 = 6. Let F ~ Po(6). P(F < 4) = P(F ≤ 3) = 0.1512\n- Step 2 (5 rolls): Let Y = number of rolls with <4 flaws. Y ~ B(5, 0.1512)\n- Step 3: P(Y ≥ 2) = 1 - P(Y ≤ 1) = 1 - [(0.8488)⁵ + 5×0.1512×(0.8488)⁴] = 1 - (0.3773 + 0.2668) = 0.3559\n+ This tests the two-step process: Poisson first, then binomial over multiple units.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Chocolate chip biscuits have mean 5 chips. One biscuit: probability of fewer than 3 chips? A packet of 6: probability exactly half (3) have fewer than 3 chips? (3 steps)", "answer": "- Step 1 (one biscuit): Let C ~ Po(5). P(C < 3) = P(C ≤ 2) = 0.1247\n- Step 2 (6 biscuits): Each biscuit is independent. Let K = number with <3 chips in 6. K ~ B(6, 0.1247)\n- Step 3: P(K = 3) = C(6,3)(0.1247)³(0.8753)³ = 20 × 0.001937 × 0.6704 = 0.0260\n+ The binomial parameter p comes from the Poisson probability.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A hospital receives 5 patients per hour. Find probability of exactly 4 in 30 minutes, and at least 3 in 30 minutes. (2 steps)", "answer": "- Step 1: 30 minutes = 0.5 hours. λ = 5 × 0.5 = 2.5. Let X ~ Po(2.5)\n- Step 2: P(X = 4) = e^(-2.5) × 2.5⁴/4! = 0.1336; P(X ≥ 3) = 1 - P(X ≤ 2) = 1 - 0.5438 = 0.4562\n+ Simple scaling with λ adjusted for half-hour.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Why can't we always use Poisson to model events that happen relatively rarely? What condition must be met? (2 steps)", "answer": "- Step 1: Poisson is the limiting case of binomial as n → ∞ and p → 0 with np = λ fixed.\n- Step 2: For Poisson to be appropriate, the number of potential events (trials) must be large, and the probability of each event must be small. The events must also be independent and occur at a constant rate.\n+ In practical terms, if you can identify distinct \"trials\" with a small but fixed p, Poisson may work. But if there's dependence or varying rates, Poisson fails.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "The number of policies sold over 150 weeks has mean 2.87 and variance 2.94. Does this support using Poisson? What's the estimated probability of selling 3 policies in a week? (3 steps)", "answer": "- Step 1: Mean = 2.87, variance = 2.94. These are very close (difference = 0.07), so yes, Poisson appears suitable.\n- Step 2: Use λ ≈ 2.87. Let X ~ Po(2.87)\n- Step 3: P(X = 3) = e^(-2.87) × 2.87³/3! = 0.2184 (approx)\n+ The close agreement between mean and variance is the key diagnostic for Poisson.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "An estate agent sells 1.8 houses per week. Find probability of selling no houses, exactly 3 houses, and at least 3 houses in a week. Over 4 weeks, find probability of meeting target (≥3) exactly once. (3 steps)", "answer": "- Step 1: Let S ~ Po(1.8). P(S = 0) = e^(-1.8) = 0.1653; P(S = 3) = e^(-1.8) × 1.8³/3! = 0.1607; P(S ≥ 3) = 1 - P(S ≤ 2) = 1 - 0.7306 = 0.2694\n- Step 2: Over 4 weeks, let T = number of weeks with ≥3 sales. T ~ B(4, 0.2694)\n- Step 3: P(T = 1) = C(4,1)(0.2694)(0.7306)³ = 4 × 0.2694 × 0.3899 = 0.4202\n+ Classic two-stage problem: Poisson for the weekly sales, binomial for counting successful weeks.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Planes land at 1 every 4 minutes (during normal operations). Given that exactly 10 planes landed between 2pm and 3pm, find probability exactly 5 landed between 2pm and 2:30pm. (3 steps)", "answer": "- Step 1: This is a conditional probability problem. Total in 1 hour = 10. Let the number in first half-hour be K, in second half-hour be L. We want P(K = 5 | K + L = 10)\n- Step 2: Given constant rate, the arrival times are uniformly distributed. Conditional on total n, the number in the first half follows a binomial distribution: K | (K+L=10) ~ B(10, 0.5)\n- Step 3: P(K = 5) = C(10,5)(0.5)¹⁰ = 0.2461\n+ This is a \"conditional Poisson\" or \"splitting\" problem — useful for understanding Poisson processes further.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "What is the main limitation of using Poisson tables provided in exams? How do you handle values of λ or x not in the tables? (2 steps)", "answer": "- Step 1: The tables typically give cumulative probabilities P(X ≤ x) for λ = 0 to 10 (in steps of 0.5) and x = 0 to 10.\n- Step 2: For λ > 10 or x > 10, or for non-tabulated λ values, use the formula P(X = x) = e^(-λ)λ^x/x! with a calculator. Also use the relationship P(X > a) = 1 - P(X ≤ a) for any a.\n+ Exam questions may require interpolation or calculator use for values not in tables.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A bank receives on average 3 emails every 5 minutes. Find probability of exactly 7 emails in a 10-minute period, and at least 8 emails in the same period. (2 steps)", "answer": "- Step 1: 10 minutes = 2 × 5 minutes. λ = 3 × 2 = 6. Let X ~ Po(6)\n- Step 2: P(X = 7) = e^(-6) × 6⁷/7! = 0.1377; P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.7440 = 0.2560\n+ Straightforward scaling followed by formula or table lookup.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A restaurant has coffee machines C (0.1 breakdowns/week) and D (0.05 breakdowns/week). Over 12 weeks, find probability of total exactly 3 breakdowns. (2 steps)", "answer": "- Step 1: For 12 weeks: λ_C = 12 × 0.1 = 1.2, λ_D = 12 × 0.05 = 0.6. Total T ~ Po(1.2 + 0.6) = Po(1.8)\n- Step 2: P(T = 3) = e^(-1.8) × 1.8³/3! = 0.1607\n+ Simple application of the additive property with scaling.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A call center receives an average of 6 calls per hour. If the number of calls follows a Poisson distribution, what is the probability of receiving exactly 4 calls in a randomly selected hour? (3 steps)", "answer": "- Step 1: Identify the parameters: $X \\sim \\mathrm{Po}(6)$ where $\\lambda = 6$, and we want $P(X = 4)$.\n- Step 2: Apply the formula: $$\\mathrm{P}(X=4) = \\frac{e^{-6} \\times 6^4}{4!} = \\frac{e^{-6} \\times 1296}{24}$$\n- Step 3: Calculate: $= 0.1339... \\approx 0.1339$ (4 d.p.)", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "State the three conditions that must be satisfied for a Poisson distribution to be an appropriate model for a real-world situation. (1 step)", "answer": "- Step 1: The events must occur: (1) independently of each other, (2) singly (one at a time) in space or time, and (3) at a constant average rate so that the mean number in an interval is proportional to the length of the interval.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A shop assistant records the number of customers entering a store each hour over 100 hours. The mean number of customers per hour is 8.2, and the variance is 8.5. Does this data support using a Poisson model? Explain why or why not. (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mean and variance are equal (both equal to λ).\n- Step 2: Here the mean (8.2) and variance (8.5) are very close in value (difference of only 0.3), which strongly supports using a Poisson distribution as a model. This equality of mean and variance is a defining characteristic of the Poisson distribution.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{E}(X) = \\lambda$. You may use the fact that $\\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{x!} = 1$. (4 steps)", "answer": "- Step 1: By definition, $\\mathrm{E}(X) = \\sum_{x=0}^{\\infty} x \\cdot \\mathrm{P}(X=x) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$\n- Step 2: The term for $x = 0$ is zero (since $0 \\times anything = 0$), so we start from $x = 1$: $\\mathrm{E}(X) = \\sum_{x=1}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\sum_{x=1}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{(x-1)!}$\n- Step 3: Let $k = x-1$, then as $x$ goes from 1 to ∞, $k$ goes from 0 to ∞: $\\mathrm{E}(X) = \\sum_{k=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^{k+1}}{k!} = \\lambda e^{-\\lambda} \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!}$\n- Step 4: Using the series expansion $e^\\lambda = \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!}$, we get: $\\mathrm{E}(X) = \\lambda e^{-\\lambda} \\cdot e^\\lambda = \\lambda$", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": true}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{Var}(X) = \\lambda$. (4 steps)", "answer": "- Step 1: We know $\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$. We already know $\\mathrm{E}(X) = \\lambda$, so we need to find $\\mathrm{E}(X^2)$.\n- Step 2: $\\mathrm{E}(X^2) = \\sum_{x=0}^{\\infty} x^2 \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$. This can be rewritten using the identity $x^2 = x(x-1) + x$: $\\mathrm{E}(X^2) = \\sum_{x=0}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} + \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!}$\n- Step 3: For the first sum, the $x=0$ and $x=1$ terms are zero, so starting from $x=2$: $\\sum_{x=2}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\sum_{x=2}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{(x-2)!} = \\lambda^2 e^{-\\lambda} \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!} = \\lambda^2$\n- Step 4: The second sum is $\\mathrm{E}(X) = \\lambda$. So $\\mathrm{E}(X^2) = \\lambda^2 + \\lambda$. Therefore: $\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 = (\\lambda^2 + \\lambda) - \\lambda^2 = \\lambda$", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "If $X \\sim \\mathrm{Po}(2.3)$, calculate $\\mathrm{P}(X \\geq 1)$ using the complement rule. (3 steps)", "answer": "- Step 1: $\\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0)$ (since $X$ can only take non-negative integer values)\n- Step 2: Calculate $\\mathrm{P}(X = 0)$: $$\\mathrm{P}(X=0) = \\frac{e^{-2.3} \\times 2.3^0}{0!} = e^{-2.3} \\approx 0.1003$$\n- Step 3: Therefore, $\\mathrm{P}(X \\geq 1) = 1 - 0.1003 = 0.8997$ (4 d.p.)", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For $X \\sim \\mathrm{Po}(3.5)$, calculate $\\mathrm{P}(2 < X \\leq 5)$. What values of $x$ are included in this probability? (3 steps)", "answer": "- Step 1: The inequality $2 < X \\leq 5$ means $X$ is strictly greater than 2 and less than o Max ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What is the key difference between the binomial distribution and the Poisson distribution? In what situations would you choose one over the other? (2 steps)", "answer": "- Step 1: The binomial distribution counts the number of successes in a fixed number of independent trials, each with the same probability of success. It has two parameters: $n$ (number of trials) and $p$ (probability of success). The Poisson distribution models the number of events occurring in a fixed interval of time or space, with events occurring independently and at a constant average rate. It has one parameter: λ (the mean/variance).\n- Step 2: You would use Poisson when: events occur singly, independently, and at a constant rate; when $n$ is large and $p$ is small in a binomial situation (Poisson can approximate binomial when $n \\geq 50$ and $np < 5$); or when there's no fixed number of trials but rather events occur randomly in continuous time/space.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "If the mean number of events per interval is λ, why does the variance also equal λ in a Poisson distribution? Provide an intuitive explanation. (2 steps)", "answer": "- Step 1: The Poisson distribution arises as a limiting case of the binomial distribution when $n \\to \\infty$ and $p \\to 0$ while keeping $np = \\lambda$ constant. In a binomial distribution, variance is $np(1-p)$. As $p \\to 0$, this becomes $np = \\lambda$.\n- Step 2: Intuitively, when events are rare and independent, the uncertainty (variance) in the count equals the average count. If events are very rare, the distribution is heavily skewed toward zero, and the spread (variance) is determined by how frequently events typically occur (the mean).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "A insurance company receives claims at a rate of 3 per day. In a week (7 days), what is the probability of having exactly 2 days with no claims? (4 steps)", "answer": "- Step 1: First find the probability of no claims in a single day: for one day, λ = 3, so $\\mathrm{P}(0) = e^{-3} = 0.0498$\n- Step 2: Let $Y$ be the number of days with no claims in a week. Then $Y \\sim \\mathrm{B}(7, 0.0498)$\n- Step 3: We want $\\mathrm{P}(Y = 2) = \\binom{7}{2} (0.0498)^2 (0.9502)^5$\n- Step 4: $= 21 \\times 0.00248 \\times 0.7738 = 0.0403$ (approximately)", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A machine produces widgets with defects occurring at a rate of 2 per hour. A quality inspector checks the machine every 30 minutes. What is the probability of finding at least 1 defect in a 3-hour period? What is the probability of finding exactly 5 defects in total across three consecutive 1-hour inspections? (4 steps)", "answer": "- Step 1: For 3 hours: λ = 2 × 3 = 6, so $X \\sim \\mathrm{Po}(6)$. $\\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0) = 1 - e^{-6} = 1 - 0.00248 = 0.9975$\n- Step 2: For three 1-hour inspections: each hour has λ = 2. Let $H_1, H_2, H_3$ be the counts for each hour, each ~ Po(2) and independent.\n- Step 3: The total across three hours: $T = H_1 + H_2 + H_3 \\sim \\mathrm{Po}(2+2+2) = \\mathrm{Po}(6)$\n- Step 4: $\\mathrm{P}(T = 5) = \\frac{e^{-6} \\times 6^5}{5!} = 0.1606$ (4 d.p.)", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A bank receives credit card transactions at a rate of 12 per minute. What is the probability that in a random minute, exactly 10 transactions occur? What is the probability of having more than 15 transactions in a 2-minute period? (3 steps)", "answer": "- Step 1: For 1 minute: λ = 12, so $X \\sim \\mathrm{Po}(12)$. $\\mathrm{P}(X = 10) = \\frac{e^{-12} \\times 12^{10}}{10!} = 0.1048$ (using calculator)\n- Step 2: For 2 minutes: λ = 12 × 2 = 24, so $Y \\sim \\mathrm{Po}(24)$\n- Step 3: $\\mathrm{P}(Y > 15) = 1 - \\mathrm{P}(Y \\leq 15)$. From tables or calculator: $\\mathrm{P}(Y \\leq 15) = 0.0517$, so $\\mathrm{P}(Y > 15) = 0.9483$", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a Poisson process with rate λ per hour, the probability of no events in 1 hour is 0.1353. What is the value of λ? (2 steps)", "answer": "- Step 1: $\\mathrm{P}(X = 0) = e^{-\\lambda} = 0.1353$\n- Step 2: Taking natural logs: $-\\lambda = \\ln(0.1353) = -2.001$ (approximately), so λ ≈ 2.0", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A website receives visits at 240 per hour. What distribution models visits per minute? What is the probability of exactly 8 visits in a given minute? (3 steps)", "answer": "- Step 1: Since visits occur independently at a constant average rate, a Poisson distribution is appropriate. For 1 minute: λ = 240/60 = 4 visits per minute. So $X \\sim \\mathrm{Po}(4)$.\n- Step 2: $\\mathrm{P}(X = 8) = \\frac{e^{-4} \\times 4^8}{8!}$\n- Step 3: $= \\frac{e^{-4} \\times 65536}{40320} = 0.0291$ (4 d.p.)", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, what is the probability that $X$ takes an odd value? Express your answer in terms of e and λ. (3 steps)", "answer": "- Step 1: $\\mathrm{P}(X \\text{ is odd}) = \\mathrm{P}(X = 1) + \\mathrm{P}(X = 3) + \\mathrm{P}(X = 5) + ... = e^{-\\lambda}(\\lambda + \\frac{\\lambda^3}{3!} + \\frac{\\lambda^5}{5!} + ...)$\n- Step 2: Recall that $e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + ...$ and $e^{-\\lambda} = 1 - \\lambda + \\frac{\\lambda^2}{2!} - \\frac{\\lambda^3}{3!} + ...$\n- Step 3: The sum of odd terms of $e^\\lambda$ minus the sum of odd terms of $e^{-\\lambda}$, all multiplied by $e^{-\\lambda}$, gives: $\\mathrm{P}(X \\text{ is odd}) = \\frac{1 - e^{-2\\lambda}}{2}$", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "A call center has two independent Poisson processes: one for sales calls (average 3 per hour) and one for service calls (average 2 per hour). What is the probability that in a given hour, there are more sales calls than service calls? (4 steps)", "answer": "- Step 1: Let $S \\sim \\mathrm{Po}(3)$ and $T \\sim \\mathrm{Po}(2)$ be independent. We want $\\mathrm{P}(S > T)$.\n- Step 2: This requires summing over all possible values: $\\mathrm{P}(S > T) = \\sum_{s=1}^{\\infty} \\mathrm{P}(S = s) \\times \\mathrm{P}(T < s)$\n- Step 3: Compute a few terms: when s = 0: P(S=0) × P(T < 0) = 0. The first non-zero term is s = 1: $\\mathrm{P}(S=1) \\times \\mathrm{P}(T=0) = (3e^{-3}) \\times (e^{-2}) = 3e^{-5}$\n- Step 4: Continuing this sum or using the complement: $\\mathrm{P}(S > T) = \\frac{1}{2}(1 - e^{-5}) = 0.0332$ (approximately). Actually, a more careful calculation gives: $\\mathrm{P}(S > T) = \\frac{3^0 \\times 2^1 + 3^1 \\times 2^2 + ...}{5!}e^{-5} = 0.4019$", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why is the Poisson distribution considered a good model for rare events? What happens to the Poisson distribution as λ increases? (2 steps)", "answer": "- Step 1: The Poisson distribution models rare events that occur independently in time or space. When events are rare (small λ), the distribution is heavily skewed right. The single parameter λ captures both the average occurrence and the variability, which for truly rare independent events are equal.\n- Step 2: As λ increases, the Poisson distribution becomes more symmetric and approaches a normal distribution (specifically, $X \\sim \\mathrm{Po}(\\lambda)$ is approximately $\\mathrm{N}(\\lambda, \\lambda)$ for large λ by the central limit theorem).", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A factory produces chips with an average of 5 chips per biscuit. What is the probability that a randomly selected biscuit has fewer than 3 chips? If 6 biscuits are selected at random, what is the probability that exactly half (3) have fewer than 3 chips? (4 steps)", "answer": "- Step 1: Let $X \\sim \\mathrm{Po}(5)$ be the number of chips in one biscuit. $\\mathrm{P}(X < 3) = \\mathrm{P}(X \\leq 2)$. From tables: $\\mathrm{P}(X \\leq 2) = 0.1247$\n- Step 2: Let $Y$ be the number of biscuits with fewer than 3 chips out of 6. Then $Y \\sim \\mathrm{B}(6, 0.1247)$\n- Step 3: We want $\\mathrm{P}(Y = 3) = \\binom{6}{3} (0.1247)^3 (0.8753)^3$\n- Step 4: $= 20 \\times 0.001937 \\times 0.6706 = 0.0260$ (approximately)", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "If $X \\sim \\mathrm{Po}(\\lambda)$, prove that $\\mathrm{P}(X = x+1) = \\frac{\\lambda}{x+1} \\times \\mathrm{P}(X = x)$. What is the practical use of this recurrence relation? (2 steps)", "answer": "- Step 1: $\\mathrm{P}(X = x+1) = \\frac{e^{-\\lambda} \\lambda^{x+1}}{(x+1)!} = \\frac{e^{-\\lambda} \\lambda^x \\cdot \\lambda}{x!(x+1)} = \\frac{\\lambda}{x+1} \\times \\frac{e^{-\\lambda} \\lambda^x}{x!} = \\frac{\\lambda}{x+1} \\mathrm{P}(X = x)$\n- Step 2: This recurrence relation allows efficient computation of Poisson probabilities sequentially without calculating factorials each time. Starting from $\\mathrm{P}(X = 0) = e^{-\\lambda}$, we can compute $\\mathrm{P}(X = 1)$, $\\mathrm{P}(X = 2)$, etc. by multiplying by $\\frac{\\lambda}{1}$, $\\frac{\\lambda}{2}$, etc. This is particularly useful when using calculators or writing computer programs.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "A hospital receives emergency cases at a rate of 5 per hour. What is the probability that the time between two consecutive emergency cases is less than 15 minutes? (3 steps)", "answer": "- Step 1: While this is an exponential distribution problem, we can solve it using the Poisson distribution. The probability that the time between events is less than 15 minutes is equivalent to the probability of at least one event in a 15-minute period.\n- Step 2: In 15 minutes (0.25 hours), λ = 5 × 0.25 = 1.25\n- Step 3: $\\mathrm{P}(\\text{at least 1 event}) = 1 - \\mathrm{P}(\\text{no events}) = 1 - e^{-1.25} = 1 - 0.2865 = 0.7135$", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "What is the relationship between the Poisson distribution and the binomial distribution? Under what conditions can Poisson approximate binomial? (2 steps)", "answer": "- Step 1: The Poisson distribution can be derived as a limiting case of the binomial distribution when $n \\to \\infty$ and $p \\to 0$ while keeping $np = \\lambda$ constant.\n- Step 2: Poisson is a good approximation to binomial when $n \\geq 50$ and $np < 5$ (or equivalently, $p < 0.1$). This is useful because computing binomial probabilities for large $n$ is computationally intensive, while Poisson with small λ is easier to calculate.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A teacher marks exam papers and makes mistakes at a rate of 0.5 per paper on average. If she marks 20 papers, what is the probability of making exactly 3 mistakes total? What is the probability of making mistakes in exactly 3 papers (assuming at most 1 mistake per paper)? (3 steps)", "answer": "- Step 1: For total mistakes across 20 papers with λ_total = 0.5 × 20 = 10: $T \\sim \\mathrm{Po}(10)$, so $\\mathrm{P}(T = 3) = \\frac{e^{-10} \\times 10^3}{3!} = 0.0076$\n- Step 2: For the number of papers with mistakes (assuming at most 1 mistake per paper, which is unrealistic but hypothetical): each paper has $\\mathrm{P}(\\text{mistake}) = 1 - e^{-0.5} \\approx 0.3935$\n- Step 3: Let $Y \\sim \\mathrm{B}(20, 0.3935)$. $\\mathrm{P}(Y = 3) = \\binom{20}{3} (0.3935)^3 (0.6065)^{17} = 0.0027$ (approximately)", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "A taxi company has two independent branches. Branch A receives orders at 1.25 per day, Branch B at 0.75 per day. What is the probability that on a given day, the total number of orders is exactly 2? What about in a 5-day week, total orders less than 10? (4 steps)", "answer": "- Step 1: For one day: $A \\sim \\mathrm{Po}(1.25)$, $B \\sim \\mathrm{Po}(0.75)$, so $T = A + B \\sim \\mathrm{Po}(2)$\n- Step 2: $\\mathrm{P}(T = 2) = \\frac{e^{-2} \\times 2^2}{2!} = \\frac{2e^{-2}}{2} = e^{-2} = 0.1353$\n- Step 3: For 5 days: λ_total = 2 × 5 = 10, so $W \\sim \\mathrm{Po}(10)$\n- Step 4: $\\mathrm{P}(W < 10) = \\mathrm{P}(W \\leq 9)$. From tables: $\\mathrm{P}(W \\leq 9) = 0.4579$", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In a Poisson distribution with λ = 4, what is the most likely value (the mode)? How does this change as λ increases? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mode is the integer part of λ (i.e., $\\lfloor \\lambda \\rfloor$). When λ is not an integer, there are two modes at $\\lfloor \\lambda \\rfloor$ and $\\lfloor \\lambda \\rfloor + 1$. When λ is an integer, there are two modes at λ and λ - 1.\n- Step 2: For λ = 4 (an integer), the modes are 3 and 4. As λ increases, the distribution becomes more symmetric and the mode increases proportionally to λ. For large λ, the Poisson approaches a normal distribution centered at λ.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A website experiences crashes at a rate of 2 per month. What is the probability of having exactly 2 crash-free months in a 6-month period? (3 steps)", "answer": "- Step 1: For one month: λ = 2, so $\\mathrm{P}(\\text{no crash}) = e^{-2} = 0.1353$\n- Step 2: Let $Y$ be the number of crash-free months in 6 months. Then $Y \\sim \\mathrm{B}(6, 0.1353)$\n- Step 3: $\\mathrm{P}(Y = 2) = \\binom{6}{2} (0.1353)^2 (0.8647)^4 = 15 \\times 0.0183 \\times 0.5584 = 0.1534$", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Explain why the Poisson distribution has only one parameter while the binomial has two. What does this imply about the relationship between mean and variance? (2 steps)", "answer": "- Step 1: In the binomial distribution $B(n, p)$, we need to know both the number of trials $n$ and the probability of success $p$ to fully describe the distribution. In the Poisson distribution with parameter λ, the mean is λ, and the variance is also λ - they're the same.\n- Step 2: This means the Poisson distribution is completely determined by its mean (or equivalently, its variance). This is a consequence of the Poisson being a limiting case of binomial where $n$ is infinite and $p$ is infinitesimal while $np = \\lambda$ remains constant. The single-parameter nature makes it parsimonious but also restrictive - it can only model situations where mean equals variance.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A library receives book return requests at a rate of 8 per hour. What is the probability that in a random hour, the number of requests is within 2 of the mean? That is, find $\\mathrm{P}(|X - 8| \\leq 2)$. (3 steps)", "answer": "- Step 1: We want $\\mathrm{P}(6 \\leq X \\leq 10)$ where $X \\sim \\mathrm{Po}(8)$\n- Step 2: $\\mathrm{P}(X \\leq 10) = 0.8159$, $\\mathrm{P}(X \\leq 5) = 0.1912$ (from tables or calculator)\n- Step 3: $\\mathrm{P}(6 \\leq X \\leq 10) = \\mathrm{P}(X \\leq 10) - \\mathrm{P}(X \\leq 5) = 0.8159 - 0.1912 = 0.6247$", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A researcher is studying cell divisions in a petri dish. The number of divisions follows a Poisson distribution. Over 50 observations, the average number of divisions per hour is 3.2, with variance 3.5. What would the researcher conclude about using a Poisson model? (2 steps)", "answer": "- Step 1: For a Poisson distribution, mean = variance = λ. Here, mean = 3.2 and variance = 3.5, which are very close.\n- Step 2: The small difference (0.3) suggests that a Poisson model is appropriate. The close agreement between mean and variance is a key diagnostic for Poisson. The slight difference could be due to random sampling variation.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What kind of phenomenon does the Poisson distribution model, and what makes its setup conceptually different from a Binomial distribution? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **number of times an event occurs** within a fixed continuous interval — a stretch of time (calls per hour) or a region of space (weeds per m², raisins in a cake). The count itself is discrete, but the \"container\" (the interval) is continuous.\n- Step 2: In a Binomial setup you have a **fixed number $$n$$ of trials**, each with two outcomes (success/failure), and you count successes. In Poisson, there are **no discrete trials** and **no upper bound** — events sprinkle randomly through the interval, and in principle $$X$$ could take any non-negative integer value $$0, 1, 2, \\ldots$$\n- Step 3: Conceptually: Binomial counts successes among a fixed roster; Poisson counts arrivals over a continuous interval, governed only by an average rate.\n\nThe mental picture: Binomial = ticking off slots in a checklist; Poisson = watching a stream and counting arrivals.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "State the Poisson probability mass function for $$X \\sim \\text{Po}(\\lambda)$$, and explain what each component means. (4 steps)", "answer": "- Step 1: The PMF is $$P(X = x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}, \\quad x = 0, 1, 2, \\ldots$$\n- Step 2: $$\\lambda$$ is the **average number of events per interval** — the rate parameter. It's the only parameter the distribution needs.\n- Step 3: $$\\lambda^x$$ grows the probability when more events are likely; $$x!$$ in the denominator suppresses it because there are many ways to arrange $$x$$ events along the interval, and we want the probability for a specific count, not arrangements.\n- Step 4: $$e^{-\\lambda}$$ is the normalising factor that ensures all probabilities sum to 1 (it pairs with the series expansion of $$e^\\lambda$$ to give 1 overall).\n\nThink of $$\\lambda^x / x!$$ as encoding \"how many events\" and $$e^{-\\lambda}$$ as the constant that makes the whole infinite sum behave like a probability distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What are the three conditions an event must satisfy for the Poisson distribution to be a good model? (3 steps)", "answer": "- Step 1: **Independence** — the occurrence of one event does not affect the probability of another event happening. (One phone call doesn't make the next call more or less likely.)\n- Step 2: **Singly** — events occur one at a time in space or time. There can't be two events happening at the exact same instant; no \"bursts\" of two simultaneous arrivals.\n- Step 3: **Constant average rate** — the mean number of events in an interval is **proportional to the length of that interval**. The rate doesn't shift across time or space.\n\nMnemonic: **I-S-C** — Independent, Singly, Constant rate.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What does it mean for events to \"occur singly\" in a Poisson context, and what real-world situation would *violate* this?", "answer": "\"Occurring singly\" means at any given instant, only one event can happen — events don't come in clusters or pairs. Mathematically, the probability of two events at exactly the same moment is zero. A violation example: cars arriving at a toll booth as part of a tour bus convoy — they arrive in groups, not individually. Or modelling the number of people entering a cinema, where families arrive together. In both cases events are correlated in time, so the \"singly\" assumption fails and Poisson becomes a poor fit.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What does \"constant average rate\" mean for a Poisson model, and what is its key consequence? (3 steps)", "answer": "- Step 1: It means the long-run rate $$\\lambda$$ at which events occur **does not depend on when or where you look** within the interval. For example, calls arrive at the same average rate at 9am as at 3pm.\n- Step 2: The crucial consequence: the mean number of events is **proportional to the interval length**. If $$\\lambda = 4$$ per hour, then in 30 minutes you expect $$\\lambda_{30\\text{min}} = 2$$, in 90 minutes you expect $$\\lambda_{90\\text{min}} = 6$$, and so on.\n- Step 3: This proportionality is what lets us **rescale** the parameter for any interval length — it's the engine behind every \"convert per-hour rate to per-minute\" calculation.\n\nA scenario where this fails: customers arriving at a restaurant — far more arrive at lunch and dinner than at 3pm. Rate is time-dependent, so a single Poisson with one $$\\lambda$$ over the whole day would be wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Give three real-world examples where a Poisson distribution would naturally apply.", "answer": "- Step 1: **Radioactive emissions** — particles emitted by a source in a 5-minute period; each emission is essentially independent at low intensity, occurs singly, and at a roughly constant average rate.\n- Step 2: **Telephone calls to a switchboard** in a 10-minute interval — calls from independent customers, arriving one at a time, at a roughly steady rate during a given period.\n- Step 3: **Spelling mistakes per page of a newspaper**, **cars passing a school in 3-minute intervals**, or **raisins in a fruitcake** (here the \"interval\" is volume of cake, not time, but the same logic applies).\n\nThe common thread: counts of independent, single, randomly-scattered events over a continuous interval at a steady average rate.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, what are the values of $$E(X)$$ and $$\\text{Var}(X)$$, and why is this property notable? (3 steps)", "answer": "- Step 1: $$E(X) = \\lambda$$ and $$\\text{Var}(X) = \\lambda$$ — the mean and variance are **equal**, both equal to the rate parameter.\n- Step 2: This is unusual: in most distributions, mean and variance are independent quantities. In a Binomial $$B(n, p)$$, the mean is $$np$$ but variance is $$np(1-p)$$, which is always *less* than the mean.\n- Step 3: The fact that mean ≈ variance is therefore a **diagnostic fingerprint** for the Poisson: when you compute the sample mean and sample variance of empirical data and find them roughly equal, that supports a Poisson model. If the variance is much bigger (overdispersion) or much smaller (underdispersion), Poisson is probably the wrong choice.\n\nThis \"mean = variance\" identity is the practical test you apply to data before committing to a Poisson model.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why does $$\\sum_{x=0}^{\\infty} P(X = x) = 1$$ for the Poisson distribution? Walk through the argument. (4 steps)", "answer": "- Step 1: Write out the sum explicitly: $$\\sum_{x=0}^\\infty \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda} + e^{-\\lambda}\\lambda + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\cdots$$\n- Step 2: Factor out the common $$e^{-\\lambda}$$: $$= e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$\n- Step 3: Recognise the bracketed expression as the **Taylor series for $$e^\\lambda$$**: $$e^\\lambda = \\sum_{k=0}^\\infty \\frac{\\lambda^k}{k!}$$\n- Step 4: Therefore $$\\sum P(X=x) = e^{-\\lambda} \\cdot e^\\lambda = e^0 = 1$$, as required.\n\nThis is the elegance of Poisson: the $$e^{-\\lambda}$$ in the PMF is precisely the inverse of the series expansion that the rest of the formula generates.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "What is the simplest probability you can compute for $$X \\sim \\text{Po}(\\lambda)$$, and why is the formula so clean? (3 steps)", "answer": "- Step 1: $$P(X = 0) = \\frac{e^{-\\lambda}\\lambda^0}{0!} = e^{-\\lambda}$$ — the probability of \"no events at all\" in the interval.\n- Step 2: It's clean because $$\\lambda^0 = 1$$ and $$0! = 1$$, leaving just the normalising factor exposed.\n- Step 3: This gives a useful trick: $$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-\\lambda}$$ — **the probability of at least one event**, which is the complement.\n\nFor example, if $$\\lambda = 1$$, then $$P(X=0) = e^{-1} \\approx 0.37$$, so $$P(X \\geq 1) \\approx 0.63$$. A surprising amount of \"no event\" probability persists even when the average is 1.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why does the Poisson distribution allow $$x$$ to range over all non-negative integers $$0, 1, 2, \\ldots$$ with no upper bound, even though real-world counts are surely bounded? (3 steps)", "answer": "- Step 1: Mathematically, the formula $$P(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$ assigns positive probability to every $$x \\geq 0$$, so the support is unbounded.\n- Step 2: But in practice, for any fixed $$\\lambda$$, the probabilities of large $$x$$ become negligibly small very quickly because $$x!$$ grows faster than $$\\lambda^x$$. So although \"an infinite number of calls per minute\" is technically allowed, its probability is essentially zero.\n- Step 3: This unboundedness is actually a feature: it means we don't have to know in advance the maximum possible count (unlike Binomial, which needs $$n$$). The model handles rare extreme values gracefully — the 12-call day among mostly 0–6-call days fits the model without forcing an artificial cap.\n\nThe model trades realism (allowing $$\\infty$$) for flexibility (no cap needed) — the realism is restored because high counts are so improbable.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "If a phone line receives calls at a rate of 4 per hour, what is $$\\lambda$$ for a 90-minute interval, and why? (3 steps)", "answer": "- Step 1: Because the Poisson assumes a **constant average rate**, the mean number of events is proportional to the interval length.\n- Step 2: 90 minutes is $$\\frac{90}{60} = 1.5$$ times one hour, so $$\\lambda_{90\\text{min}} = 4 \\times 1.5 = 6$$.\n- Step 3: We then model the count as $$Y \\sim \\text{Po}(6)$$, **not** $$\\text{Po}(4)$$. The original $$\\lambda = 4$$ is tied to the original interval length; if we change the interval, we must rescale.\n\nKey principle: **always rescale $$\\lambda$$ to match the interval you're asking about** before computing any probability.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why must we be careful to **rescale $$\\lambda$$** before applying the additive property $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$? (3 steps)", "answer": "- Step 1: The additive property requires $$X$$ and $$Y$$ to count events **in the same interval**. If $$X$$ counts cars in 5 minutes and $$Y$$ counts vans in 15 minutes, they're not measured over comparable timeframes — adding them is meaningless.\n- Step 2: To combine them properly, first convert both to the **same target interval**. For example, if you want a 10-minute total: rescale the 5-minute car rate to a 10-minute rate, rescale the 15-minute van rate to a 10-minute rate, then add the rescaled parameters.\n- Step 3: Only then can you apply $$X + Y \\sim \\text{Po}(\\lambda_{\\text{rescaled}} + \\mu_{\\text{rescaled}})$$.\n\nThe trap students fall into: blindly adding parameters without checking the intervals match. The additive property is a statement about random variables on the same domain, not different ones.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "State the additive property of the Poisson distribution and the conditions under which it holds. (3 steps)", "answer": "- Step 1: **Statement**: If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$, and $$X$$ and $$Y$$ are **independent**, then $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$.\n- Step 2: **Conditions**: \n+ The two variables must be **independent** (one doesn't influence the other).\n+ They must count events over the **same interval** of time/space.\n- Step 3: Intuition: if cars arrive at rate $$\\lambda$$ and vans arrive at rate $$\\mu$$, both independently, then total vehicles arrive at rate $$\\lambda + \\mu$$ — the rates simply combine because the streams don't interact.\n\nThis is what makes Poisson so practical for modelling: you can pool independent event streams together cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Suppose cars arrive at a road point at 24 per minute and vans at 8 per minute, both Poisson and independent. What is the distribution of the **total number of vehicles** in a 15-second interval? (3 steps)", "answer": "- Step 1: First, rescale both rates to 15 seconds. 15 seconds is $$\\frac{1}{4}$$ of a minute, so:\n+ Cars: $$\\lambda = 24 \\times \\tfrac{1}{4} = 6$$ per 15 seconds.\n+ Vans: $$\\mu = 8 \\times \\tfrac{1}{4} = 2$$ per 15 seconds.\n- Step 2: Both car-count and van-count over a 15-second interval are independent Poissons.\n- Step 3: By the additive property, total vehicles $$\\sim \\text{Po}(6 + 2) = \\text{Po}(8)$$.\n\nThe lesson: **rescale first, add second**. Both must be expressed for the same interval before summing.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Why is independence essential for the additive property $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$ to hold? (2 steps)", "answer": "- Step 1: If $$X$$ and $$Y$$ are positively correlated (e.g., both spike during peak hours together), the variance of $$X+Y$$ would exceed $$\\lambda + \\mu$$ because the spikes reinforce each other. Recall that for Poisson, mean equals variance — so a violation of variance equality immediately disqualifies Poisson as the distribution of $$X+Y$$.\n- Step 2: Independence ensures the streams of events are entirely separate, so combining them just gives a stream with the pooled rate. Conceptually: independent flips of two coins remain governed by their own probabilities; correlated flips don't.\n\nIf two phone lines share a single cause (e.g., one alarm system triggers both), they aren't independent — and the sum isn't Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Express $$P(X \\geq k)$$ in terms of cumulative probabilities for $$X \\sim \\text{Po}(\\lambda)$$, and explain the off-by-one carefully. (3 steps)", "answer": "- Step 1: Cumulative tables give $$P(X \\leq x)$$ for various $$x$$. To find $$P(X \\geq k)$$, we use the complement: $$P(X \\geq k) = 1 - P(X < k) = 1 - P(X \\leq k-1)$$\n- Step 2: The subtle point: $$X < k$$ for a discrete variable means $$X \\leq k-1$$, since $$X$$ takes integer values. So $$P(X \\geq 2) = 1 - P(X \\leq 1)$$, **not** $$1 - P(X \\leq 2)$$.\n- Step 3: A common mistake is to write $$P(X \\geq k) = 1 - P(X \\leq k)$$ — this would *also* exclude $$X = k$$, undercounting by one term. Always think: \"$$\\geq k$$ is the complement of $$\\leq k - 1$$\" because of the integer step.\n\nFor inequalities involving discrete random variables, the off-by-one shift is your friend — handle it deliberately.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, how do you compute $$P(a \\leq X \\leq b)$$ from cumulative tables? (2 steps)", "answer": "- Step 1: $$P(a \\leq X \\leq b) = P(X \\leq b) - P(X \\leq a-1)$$ — read off the upper tail through $$b$$ and subtract everything strictly below $$a$$.\n- Step 2: For example, $$P(1 \\leq X \\leq 4) = P(X \\leq 4) - P(X \\leq 0)$$, where we subtract $$P(X \\leq 0)$$ (which is just $$P(X=0)$$) to remove the part below 1.\n\nThe same logic governs $$P(a < X \\leq b) = P(X \\leq b) - P(X \\leq a)$$ — note the subtle shift when the lower bound is strict vs. non-strict.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "$$X \\sim \\text{Po}(7.5)$$. You're told $$P(X < b) = 0.5246$$ and need to find $$b$$ from a table that gives $$P(X \\leq x)$$. Walk through. (3 steps)", "answer": "- Step 1: Convert the strict inequality: for integer $$X$$, $$P(X < b) = P(X \\leq b - 1)$$. So we need $$P(X \\leq b - 1) = 0.5246$$.\n- Step 2: Look up the table for $$\\lambda = 7.5$$: find the value of $$x$$ where $$P(X \\leq x) = 0.5246$$. Suppose this gives $$x = 7$$.\n- Step 3: Then $$b - 1 = 7$$, so $$b = 8$$. Always do the inequality conversion **before** looking up the table to avoid an off-by-one error.\n\nInverse table problems amplify off-by-one errors because the conversion happens first, before the lookup. Be deliberate.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why does the Poisson distribution have only **one parameter**, $$\\lambda$$, while distributions like Normal need two? (3 steps)", "answer": "- Step 1: For most distributions, mean and variance can be set independently, so they need separate parameters (Normal needs $$\\mu, \\sigma^2$$; Binomial needs $$n, p$$).\n- Step 2: For Poisson, **mean = variance = $$\\lambda$$**, so once you know the rate, you know the spread automatically. There's no additional information to specify.\n- Step 3: This single-parameter simplicity is a direct consequence of the structural assumptions: independent, singly-occurring events at a constant rate. The dispersion is locked to the mean by the random arrival mechanism itself.\n\nGeometrically: the Poisson family is a one-dimensional curve in the space of all distributions, parametrised by $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "A botanist counts daisies in 80 squares of a field, getting sample mean 3.69 and sample variance 3.73. How does this support choosing a Poisson model? (3 steps)", "answer": "- Step 1: For any Poisson distribution, the **theoretical mean equals the theoretical variance** (both equal $$\\lambda$$). So if the underlying process really is Poisson, the sample mean and sample variance should be approximately equal in a large sample.\n- Step 2: Here $$3.69$$ and $$3.73$$ differ by only about $$1\\%$$ — they are essentially the same to one decimal place. This empirical near-equality is consistent with the Poisson hypothesis.\n- Step 3: We then estimate $$\\lambda$$ by the sample mean (or the variance, or an average — they're nearly identical here, e.g. $$\\lambda \\approx 3.7$$) and use this in the model.\n\nCaveat: equality of mean and variance doesn't *prove* Poisson — it's a necessary but not sufficient indicator. Other distributions could give the same equality. But strong inequality (variance much bigger or smaller than mean) would *rule out* Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "$$X \\sim \\text{Po}(\\lambda)$$. Given that $$P(X = 2) = P(X = 3)$$, find $$\\lambda$$. (4 steps)", "answer": "- Step 1: Write both probabilities using the PMF: $$P(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}, \\quad P(X=3) = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 2: Set them equal: $$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 3: Cancel $$e^{-\\lambda}$$ from both sides and divide by $$\\lambda^2$$ (assuming $$\\lambda > 0$$): $$\\frac{1}{2} = \\frac{\\lambda}{6}$$\n- Step 4: Solve: $$\\lambda = 3$$.\n\nA nice insight: the ratio $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{\\lambda}{k+1}$$. So $$P(X=2) = P(X=3)$$ means $$\\frac{\\lambda}{3} = 1$$, giving $$\\lambda = 3$$. This recurrence is a powerful shortcut for these problems.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "What is the recurrence relation between $$P(X = k+1)$$ and $$P(X = k)$$ for a Poisson distribution, and why is it useful? (3 steps)", "answer": "- Step 1: From the PMF: $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{e^{-\\lambda}\\lambda^{k+1}/(k+1)!}{e^{-\\lambda}\\lambda^k/k!} = \\frac{\\lambda}{k+1}$$\n- Step 2: So $$P(X = k+1) = P(X = k) \\cdot \\frac{\\lambda}{k+1}$$.\n- Step 3: This is useful because: \n+ It lets you compute consecutive probabilities iteratively without recomputing factorials.\n+ It instantly tells you the **mode** of the distribution: probabilities increase while $$\\frac{\\lambda}{k+1} > 1$$ (i.e., $$k < \\lambda - 1$$) and decrease afterwards. The mode is roughly $$\\lfloor \\lambda \\rfloor$$.\n+ It solves equations like \"$$P(X=k_1) = c \\cdot P(X=k_2)$$\" almost instantly.\n\nFor example, $$P(X = 4) = 3 P(X = 2)$$ becomes $$\\frac{\\lambda^2}{12} = 3$$, giving $$\\lambda^2 = 36$$, so $$\\lambda = 6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "A radioactive source emits particles. In a 1-minute period, what is the value of $$\\lambda$$ if the source emits on average 0.3 particles per minute? Compute $$P(X = 0)$$ in your head. (2 steps)", "answer": "- Step 1: $$\\lambda = 0.3$$ for a 1-minute interval (no rescaling needed).\n- Step 2: $$P(X = 0) = e^{-\\lambda}\\lambda^0/0! = e^{-0.3}$$. Since $$e^{-0.3} \\approx 1 - 0.3 + 0.045 - \\ldots \\approx 0.74$$, the probability of \"no emission in a minute\" is about $$74\\%$$.\n\nThe mental shortcut: for small $$\\lambda$$, $$e^{-\\lambda} \\approx 1 - \\lambda$$, so $$P(X=0) \\approx 1 - \\lambda$$ and $$P(X \\geq 1) \\approx \\lambda$$. This reflects the intuition that for a small rate, the probability of \"at least one event\" is roughly equal to the rate itself.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why is it that for small $$\\lambda$$, $$P(X \\geq 1) \\approx \\lambda$$, and what does this mean intuitively? (3 steps)", "answer": "- Step 1: $$P(X \\geq 1) = 1 - e^{-\\lambda}$$. Using the Taylor series $$e^{-\\lambda} = 1 - \\lambda + \\frac{\\lambda^2}{2!} - \\cdots$$, we get $$P(X \\geq 1) = \\lambda - \\frac{\\lambda^2}{2!} + \\cdots \\approx \\lambda$$ for small $$\\lambda$$.\n- Step 2: Intuitively: when events are rare, the probability of \"exactly one\" is much larger than \"two or more\" (which is order $$\\lambda^2$$), so \"at least one\" is dominated by \"exactly one\", whose probability $$\\lambda e^{-\\lambda} \\approx \\lambda$$.\n- Step 3: This means $$\\lambda$$ has a clean physical interpretation — for small rates, $$\\lambda$$ is essentially the probability of an event happening at all in the interval. As $$\\lambda$$ grows, multiple events become likely and this approximation breaks down.\n\nThis is also why Poisson is the natural limit of Binomial when $$n$$ is large and $$p$$ is small: each individual \"trial\" has small probability, but there are many trials.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "What conditions allow the Poisson distribution to approximate the Binomial distribution, and why does this work? (3 steps)", "answer": "- Step 1: Conditions: \n+ $$n$$ is **large** (many trials).\n+ $$p$$ is **small** (each trial unlikely to succeed).\n+ $$np = \\lambda$$ is moderate (the mean is well-defined, neither tiny nor enormous).\n- Step 2: The intuition: in a Binomial $$B(n, p)$$ with large $$n$$ and small $$p$$, successes are rare and effectively independent of each other (since $$p$$ doesn't change). Under these conditions the discrete-trial structure becomes essentially indistinguishable from a continuous arrival process at rate $$\\lambda = np$$.\n- Step 3: Mathematically, $$\\binom{n}{k} p^k (1-p)^{n-k} \\to \\frac{e^{-\\lambda}\\lambda^k}{k!}$$ as $$n \\to \\infty$$, $$p \\to 0$$, $$np \\to \\lambda$$.\n\nA practical use: for $$n = 50$$ and $$p = 0.08$$, $$np = 4$$ — small enough that Poisson with $$\\lambda = 4$$
