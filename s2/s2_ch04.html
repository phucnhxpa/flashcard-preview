thrm{F}(x)$$ fully, why must you define it for all $$x \\in \\mathbb{R}$$ — including regions where $$\\mathrm{f}(x)=0$$? What values does $$\\mathrm{F}(x)$$ take in those regions? (2 steps)", "answer": "- Step 1: The c.d.f. must be defined for all real $$x$$ because it represents $$\\mathrm{P}(X \\leqslant x)$$, which is a meaningful question for any $$x$$ — even values outside the range of $$X$$. If the p.d.f. is zero for all $$x$$ below some value $$a$$ (meaning $$X$$ never takes values less than $$a$$), then $$\\mathrm{P}(X \\leqslant x)=0$$ for any $$x < a$$, so $$\\mathrm{F}(x)=0$$ for $$x < a$$.\n- Step 2: Similarly, if the p.d.f. is zero for all $$x$$ above some value $$b$$, then all the probability has already been accumulated by the time we reach $$b$$, so $$\\mathrm{F}(x)=1$$ for $$x > b$$. A fully specified c.d.f. always has the structure:\n+ $$\\mathrm{F}(x)=0$$ for $$x$$ below the range\n+ $$\\mathrm{F}(x)$$ is some increasing function within the range (from 0 to 1)\n+ $$\\mathrm{F}(x)=1$$ for $$x$$ above the range\n\nOmitting the \"0 below\" and \"1 above\" parts is incomplete — exam marks are lost for this.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "Given a p.d.f. $$\\mathrm{f}(x)=\\frac{1}{4}x$$ for $$1 \\leqslant x \\leqslant 3$$ and 0 otherwise, describe two methods for finding the c.d.f. $$\\mathrm{F}(x)$$ in the region $$1 \\leqslant x \\leqslant 3$$, and explain the logic behind each. (3 steps)", "answer": "- Step 1: **Method 1 (Definite integral):** Use the definition $$\\mathrm{F}(x)=\\int_{-\\infty}^{x}\\mathrm{f}(t)\\,\\mathrm{d}t$$. Since $$\\mathrm{f}(t)=0$$ for $$t<1$$, the integral starts at 1: $$\\mathrm{F}(x)=\\int_{1}^{x}\\frac{1}{4}t\\,\\mathrm{d}t=\\left[\\frac{t^2}{8}\\right]_{1}^{x}=\\frac{x^2}{8}-\\frac{1}{8}$$ for $$1 \\leqslant x \\leqslant 3$$. The lower limit is the start of the non-zero region, and we verify: $$\\mathrm{F}(1)=\\frac{1}{8}-\\frac{1}{8}=0$$ ✓ and $$\\mathrm{F}(3)=\\frac{9}{8}-\\frac{1}{8}=1$$ ✓.\n- Step 2: **Method 2 (Indefinite integral + constant):** Integrate without limits: $$\\mathrm{F}(x)=\\int\\frac{1}{4}x\\,\\mathrm{d}x=\\frac{x^2}{8}+c$$. Then find $$c$$ using a boundary condition. Since $$\\mathrm{F}(1)=0$$ (no probability accumulated at the start of the range): $$\\frac{1}{8}+c=0$$, so $$c=-\\frac{1}{8}$$, giving $$\\mathrm{F}(x)=\\frac{x^2}{8}-\\frac{1}{8}$$.\n- Step 3: Both methods yield the same result. Method 1 is more direct (the definite integral automatically handles the constant), while Method 2 requires you to find the constant separately but can be easier when the lower limit is complicated. The key insight: the c.d.f. at the **start** of the non-zero range must be 0, and at the **end** must be 1 — these are your boundary conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "When a p.d.f. is piecewise (e.g., different formulas on different intervals), how do you construct the c.d.f. for each subsequent piece — and why must you \"add on\" the accumulated probability from previous pieces? (3 steps)", "answer": "- Step 1: The c.d.f. is **cumulative** — it represents the total probability accumulated from the left. When you move from one piece of the p.d.f. to the next, the probability from the first piece has already been \"banked.\" For example, if the first piece covers $$1<x<2$$ and contributes area $$\\mathrm{F}(2)$$, then for the second piece covering $$2 \\leqslant x \\leqslant 4$$:\n$$\\mathrm{F}(x)=\\mathrm{F}(2)+\\int_{2}^{x}\\mathrm{f}(t)\\,\\mathrm{d}t$$\n- Step 2: You cannot simply integrate the second piece starting from zero — that would ignore all the probability already accumulated in the first region. The c.d.f. must be **continuous and increasing**, so each section starts from where the previous section ended. If the first section gives $$\\mathrm{F}(2)=\\frac{1}{5}$$, then the second section's formula must equal $$\\frac{1}{5}$$ at $$x=2$$ and increase toward 1.\n- Step 3: Practical approach: compute each section's integral separately, then **add the value of $$\\mathrm{F}$$ at the boundary** from the previous section. Alternatively, use the indefinite integral method for each piece and determine the constant by matching the value at the boundary with the end of the previous piece. Either way, the c.d.f. must be continuous — no jumps (since $$\\mathrm{P}(X=\\text{exact value})=0$$ for a continuous RV).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Given a c.d.f. $$\\mathrm{F}(x)=\\left\\{\\begin{array}{cc}0 & x<0 \\\\ \\frac{1}{5}x+\\frac{3}{20}x^2 & 0 \\leqslant x \\leqslant 2 \\\\ 1 & x>2\\end{array}\\right.$$ how do you find $$\\mathrm{P}(0.5 \\leqslant X \\leqslant 1.5)$$ using the c.d.f., and why is this faster than using the p.d.f.? (2 steps)", "answer": "- Step 1: The key identity is: $$\\mathrm{P}(a \\leqslant X \\leqslant b)=\\mathrm{F}(b)-\\mathrm{F}(a)$$ for a continuous random variable. This works because $$\\mathrm{F}(b)=\\mathrm{P}(X \\leqslant b)$$ includes all probability up to $$b$$, and $$\\mathrm{F}(a)=\\mathrm{P}(X \\leqslant a)$$ includes all probability up to $$a$$. Subtracting removes the \"up to $$a$$\" portion, leaving exactly the probability between $$a$$ and $$b$$.\n+ $$\\mathrm{P}(0.5 \\leqslant X \\leqslant 1.5)=\\mathrm{F}(1.5)-\\mathrm{F}(0.5)$$\n+ $$\\mathrm{F}(1.5)=\\frac{1}{5}(1.5)+\\frac{3}{20}(1.5)^2=0.3+0.3375=0.6375$$\n+ $$\\mathrm{F}(0.5)=\\frac{1}{5}(0.5)+\\frac{3}{20}(0.5)^2=0.1+0.0375=0.1375$$\n+ Answer: $$0.6375-0.1375=0.5$$\n- Step 2: Using the p.d.f. would require differentiating $$\\mathrm{F}(x)$$ to get $$\\mathrm{f}(x)$$, then integrating $$\\mathrm{f}(x)$$ from 0.5 to 1.5 — two extra steps! The c.d.f. bypasses integration entirely: just **evaluate at two points and subtract**. This is why the c.d.f. is practically useful — it saves computational effort.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Given a c.d.f., how do you recover the p.d.f.? And what does a constant section of the c.d.f. (e.g., $$\\mathrm{F}(x)=1$$ for $$x>2$$) tell you about the p.d.f. in that region? (2 steps)", "answer": "- Step 1: The p.d.f. is the **derivative** of the c.d.f.: $$\\mathrm{f}(x)=\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$ for all $$x$$ where $$\\mathrm{F}(x)$$ is differentiable. For the region $$0 \\leqslant x \\leqslant 2$$ where $$\\mathrm{F}(x)=\\frac{1}{5}x+\\frac{3}{20}x^2$$, we differentiate: $$\\mathrm{f}(x)=\\frac{1}{5}+\\frac{3}{10}x$$.\n- Step 2: For $$x>2$$, $$\\mathrm{F}(x)=1$$ (a constant). The derivative of a constant is 0, so $$\\mathrm{f}(x)=0$$ for $$x>2$$. This makes perfect sense: if all probability has already been accumulated by $$x=2$$, then no additional probability density exists beyond that point — the random variable simply cannot take values greater than 2. Similarly, $$\\mathrm{F}(x)=0$$ for $$x<0$$ gives $$\\mathrm{f}(x)=0$$ there.\n\nThe rule: **flat sections of the c.d.f. → zero sections of the p.d.f.**. Increasing sections of the c.d.f. → positive p.d.f. values.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "What is $$\\mathrm{P}(X=1)$$ for a continuous random variable, and why? How does this contrast with a discrete random variable? (2 steps)", "answer": "- Step 1: For a **continuous** random variable, $$\\mathrm{P}(X=1)=0$$ always. This follows from the fact that probability is computed as area under the p.d.f., and the \"area\" over a single point (an interval of width 0) is zero: $$\\mathrm{P}(X=1)=\\int_{1}^{1}\\mathrm{f}(x)\\,\\mathrm{d}x=0$$.\n- Step 2: For a **discrete** random variable, $$\\mathrm{P}(X=1)$$ can be any non-negative value (up to 1) — it's directly given by the probability function. This is the fundamental operational difference: with discrete RVs you read off point probabilities; with continuous RVs you can only compute interval probabilities. Asking \"what's the probability the height is exactly 170.0000... cm?\" is meaningless — but \"probability the height is between 169 and 171 cm\" is meaningful.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A c.d.f. is given as $$\\mathrm{F}(x)=\\left\\{\\begin{array}{cc}0 & x<2 \\\\ \\frac{1}{6}x^p+q & 2 \\leqslant x \\leqslant 4 \\\\ 1 & x>4\\end{array}\\right.$$ How do you find the constants $$p$$ and $$q$$, and what boundary conditions of the c.d.f. do you exploit? (2 steps)", "answer": "- Step 1: The c.d.f. must satisfy two boundary conditions at the edges of its active range:\n+ At the **lower bound**: $$\\mathrm{F}(2)=0$$ (no probability accumulated yet). So $$\\frac{1}{6}(2^p)+q=0$$.\n+ At the **upper bound**: $$\\mathrm{F}(4)=1$$ (all probability accumulated). So $$\\frac{1}{6}(4^p)+q=1$$.\n- Step 2: These give two simultaneous equations:\n+ $$\\frac{2^p}{6}+q=0$$ → $$q=-\\frac{2^p}{6}$$\n+ $$\\frac{4^p}{6}+q=1$$ → $$\\frac{4^p}{6}-\\frac{2^p}{6}=1$$ → $$\\frac{4^p-2^p}{6}=1$$ → $$4^p-2^p=6$$\n\nSince $$4^p=(2^2)^p=2^{2p}=(2^p)^2$$, let $$u=2^p$$: then $$u^2-u=6$$, so $$u^2-u-6=0$$, giving $$u=3$$ or $$u=-2$$. Since $$u=2^p>0$$, $$u=3$$, so $$2^p=3$$, meaning $$p=\\log_2 3=\\frac{\\ln 3}{\\ln 2}$$ (exact). Then $$q=-\\frac{3}{6}=-\\frac{1}{2}$$.\n\nThe key insight: **$$\\mathrm{F}$$ at the lower limit = 0 and $$\\mathrm{F}$$ at the upper limit = 1** are always your two anchor points.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "How is the mean (expected value) of a continuous random variable defined, and why does the formula $$\\mathrm{E}(X)=\\int_{-\\infty}^{\\infty}x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ mirror the discrete formula $$\\mathrm{E}(X)=\\sum x\\,\\mathrm{P}(X=x)$$? (2 steps)", "answer": "- Step 1: For a discrete RV, the mean is $$\\mathrm{E}(X)=\\sum x\\,\\mathrm{P}(X=x)$$ — each possible value $$x$$ multiplied by its probability, summed over all values. For a continuous RV, each specific value has probability 0, so we can't use point probabilities. Instead, we use the probability **density** $$\\mathrm{f}(x)$$ and **integrate** (which is the continuous analogue of summing): $$\\mathrm{E}(X)=\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$.\n- Step 2: The conceptual parallel: $$\\sum \\to \\int$$ (discrete sum becomes continuous integral), and $$\\mathrm{P}(X=x) \\to \\mathrm{f}(x)\\,\\mathrm{d}x$$ (point probability becomes the infinitesimal probability in a tiny interval of width $$\\mathrm{d}x$$ around $$x$$). So $$x \\cdot \\mathrm{f}(x)\\,\\mathrm{d}x$$ is the contribution to the mean from values near $$x$$, and integrating over all $$x$$ collects all contributions. The mean is the **balance point** of the probability distribution — the center of mass of the area under the p.d.f. curve.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "The variance of a continuous random variable can be written in two forms: $$\\operatorname{Var}(X)=\\int(x-\\mu)^2\\mathrm{f}(x)\\,\\mathrm{d}x$$ and $$\\operatorname{Var}(X)=\\mathrm{E}(X^2)-\\mu^2$$. Why are these equivalent, and which is typically easier to compute? (3 steps)", "answer": "- Step 1: The first form is the direct definition: the average squared deviation from the mean, weighted by probability density. It's analogous to the discrete $$\\operatorname{Var}(X)=\\sum(x-\\mu)^2\\mathrm{P}(X=x)$$.\n- Step 2: To see equivalence, expand $$\\int(x-\\mu)^2\\mathrm{f}(x)\\,\\mathrm{d}x$$:\n$$\\int(x^2-2\\mu x+\\mu^2)\\mathrm{f}(x)\\,\\mathrm{d}x=\\int x^2\\mathrm{f}(x)\\,\\mathrm{d}x-2\\mu\\int x\\mathrm{f}(x)\\,\\mathrm{d}x+\\mu^2\\int\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ The first term is $$\\mathrm{E}(X^2)$$\n+ The second term is $$2\\mu \\cdot \\mathrm{E}(X)=2\\mu \\cdot \\mu=2\\mu^2$$\n+ The third term is $$\\mu^2 \\cdot 1=\\mu^2$$ (since the total integral of $$\\mathrm{f}(x)$$ is 1)\n- Step 3: Combining: $$\\mathrm{E}(X^2)-2\\mu^2+\\mu^2=\\mathrm{E}(X^2)-\\mu^2$$. The second form is **easier to compute** because you just need two integrals ($$\\mathrm{E}(X)$$ and $$\\mathrm{E}(X^2)$$) rather than computing the mean first and then integrating $$(x-\\mu)^2\\mathrm{f}(x)$$, which involves an awkward shifted integrand.\n\nThe formula $$\\operatorname{Var}(X)=\\mathrm{E}(X^2)-(\\mathrm{E}(X))^2$$ is the go-to computational tool.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "If $$\\mathrm{E}(X)=\\mu$$ and you want $$\\mathrm{E}(2X-3)$$, you can use the shortcut $$\\mathrm{E}(aX+b)=a\\mathrm{E}(X)+b$$. Why does this work — what's the intuitive reasoning? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(2X-3)=\\int(2x-3)\\mathrm{f}(x)\\,\\mathrm{d}x=2\\int x\\mathrm{f}(x)\\,\\mathrm{d}x-3\\int\\mathrm{f}(x)\\,\\mathrm{d}x=2\\mathrm{E}(X)-3\\cdot 1=2\\mu-3$$. The constant 3 gets multiplied by the total probability (which is 1), so it just shifts the mean by -3. The factor 2 scales every value, so it scales the mean by 2.\n- Step 2: Intuitively: if you double every outcome and then subtract 3, the average outcome also doubles and then subtracts 3. The expectation is a **linear operator** — it respects addition and scalar multiplication. This is true for both discrete and continuous random variables. The key: $$\\mathrm{E}$$ \"distributes\" over linear combinations just like ordinary arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "For $$\\operatorname{Var}(2X-3)$$, the result is $$4\\operatorname{Var}(X)$$, not $$4\\operatorname{Var}(X)-3$$ or $$4\\operatorname{Var}(X)+9$$. Why does the constant $$-3$$ vanish, and why does the factor of 2 become $$2^2=4$$? (3 steps)", "answer": "- Step 1: Variance measures **spread** — how far values deviate from their mean. Adding a constant $$-3$$ shifts all values by the same amount, which shifts the mean by $$-3$$ too. The deviations from the (shifted) mean are unchanged: if $$X$$ deviates by $$X-\\mu$$, then $$2X-3$$ deviates by $$2X-3-(2\\mu-3)=2(X-\\mu)$$ — the $$-3$$ cancels out completely.\n- Step 2: Multiplying by 2 **scales** all deviations by 2, so the squared deviations scale by $$2^2=4$$:\n$$\\operatorname{Var}(2X-3)=\\mathrm{E}[(2X-3-2\\mu+3)^2]=\\mathrm{E}[(2(X-\\mu))^2]=\\mathrm{E}[4(X-\\mu)^2]=4\\operatorname{Var}(X)$$\n- Step 3: General rule: $$\\operatorname{Var}(aX+b)=a^2\\operatorname{Var}(X)$$.\n+ The constant $$b$$ disappears because it doesn't affect spread (only shifts location).\n+ The coefficient $$a$$ gets squared because variance involves squared deviations.\n\nThink of it like rescaling a ruler: changing from cm to mm (factor 10) makes all measurements 10× bigger, but the *variance* of measurements becomes $$10^2=100$$× bigger.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A p.d.f. is symmetric about $$x=1$$, e.g., $$\\mathrm{f}(x)=\\frac{3}{32}(3+2x-x^2)$$ on $$-1 \\leqslant x \\leqslant 3$$. How can you immediately write down $$\\mathrm{E}(X)$$ without any integration? (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about a point $$x=a$$, then the distribution has a \"mirror balance\" at $$a$$: for every tiny strip of probability at $$a+\\delta$$, there's an equal strip at $$a-\\delta$$. When you compute the mean (the center of mass), these symmetric strips balance each other, and the balance point is exactly $$a$$.\n- Step 2: For this p.d.f., the domain is $$[-1,3]$$ and the midpoint is $$\\frac{-1+3}{2}=1$$. The quadratic $$3+2x-x^2=-(x^2-2x-3)=-(x-1)^2+4$$ is symmetric about $$x=1$$. Therefore $$\\mathrm{E}(X)=1$$ without any calculation.\n\nCaution: symmetry gives you the mean, but **not** the variance — you still need to compute $$\\mathrm{E}(X^2)$$ for that. Also, symmetry about $$x=a$$ means $$\\mathrm{E}(X)=a$$, but the mode and median also equal $$a$$ for symmetric unimodal distributions.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A piecewise p.d.f. has $$\\mathrm{f}(x)=\\frac{2}{15}x$$ for $$0 \\leqslant x < 3$$ and $$\\mathrm{f}(x)=\\frac{1}{5}(5-x)$$ for $$3 \\leqslant x \\leqslant 5$$. When computing $$\\mathrm{E}(X)$$, why must you split the integral into two parts with different limits? (2 steps)", "answer": "- Step 1: The p.d.f. has **different formulas** on different intervals, so you can't write a single integrand $$x\\mathrm{f}(x)$$ that works everywhere. On $$[0,3)$$, $$x\\mathrm{f}(x)=\\frac{2}{15}x^2$$; on $$[3,5]$$, $$x\\mathrm{f}(x)=\\frac{1}{5}x(5-x)=\\frac{1}{5}(5x-x^2)$$. These are different functions, so you integrate each over its own interval.\n- Step 2: $$\\mathrm{E}(X)=\\int_{0}^{3}\\frac{2}{15}x^2\\,\\mathrm{d}x+\\int_{3}^{5}\\frac{1}{5}(5x-x^2)\\,\\mathrm{d}x$$ — the total expectation is the **sum** of the contributions from each piece. This works because the integral over the whole range is the sum of the integrals over the sub-ranges (additivity of integration). Each piece contributes its own \"partial mean,\" and they add up.\n\nThe same splitting applies to $$\\mathrm{E}(X^2)$$ and any $$\\mathrm{E}(g(X))$$ for piecewise p.d.f.s.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "The expected volume of a cube with side length $$X$$ is $$\\mathrm{E}(X^3)$$, not $$[\\mathrm{E}(X)]^3$$. Why are these different, and which is larger for a typical distribution? (3 steps)", "answer": "- Step 1: Volume = $$X^3$$, so the expected volume is $$\\mathrm{E}(X^3)=\\int x^3\\mathrm{f}(x)\\,\\mathrm{d}x$$ — the average of the cubed side lengths. This uses the general rule $$\\mathrm{E}(g(X))=\\int g(x)\\mathrm{f}(x)\\,\\mathrm{d}x$$ with $$g(x)=x^3$$.\n- Step 2: $$[\\mathrm{E}(X)]^3$$ would be: first find the average side length, then cube that average. These are fundamentally different operations. **You cannot pull the cube out of the expectation** — $$\\mathrm{E}(X^3)\\neq[\\mathrm{E}(X)]^3$$ in general, because expectation is a linear operator (preserves addition and scalar multiplication) but not a \"power-preserving\" operator.\n- Step 3: For most distributions, $$\\mathrm{E}(X^3)>[\\mathrm{E}(X)]^3$$ because cubing is a convex function for positive $$x$$ — by Jensen's inequality, $$\\mathrm{E}(g(X))\\geqslant g(\\mathrm{E}(X))$$ for convex $$g$$. Intuitively: large values of $$X$$ get \"super-amplified\" by cubing (e.g., $$X=40$$ gives volume 64,000 while $$X=20$$ gives 8,000), so the high-volume outcomes disproportionately pull $$\\mathrm{E}(X^3)$$ above $$[\\mathrm{E}(X)]^3$$.\n\nThe trap: never substitute $$\\mathrm{E}(X)$$ into a nonlinear function and call it $$\\mathrm{E}$$ of that function. Always integrate $$g(x)\\mathrm{f}(x)$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "What is the mode of a continuous random variable, and how does its definition differ from the mode of a discrete random variable? (2 steps)", "answer": "- Step 1: For a **continuous** random variable, the mode is the value of $$x$$ at which the p.d.f. $$\\mathrm{f}(x)$$ reaches its **maximum**. This is the value where the probability density is highest — the \"most crowded\" or \"most likely region\" of the distribution. You find it by solving $$\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{f}(x)=0$$ and verifying a maximum (or by inspecting a sketch).\n- Step 2: For a **discrete** random variable, the mode is the value of $$x$$ with the highest probability $$\\mathrm{P}(X=x)$$ — you just look for the largest entry in the probability table. The continuous version replaces \"highest probability\" with \"highest probability density\" because individual point probabilities are all 0. The mode is a **location** measure, not a probability value — it tells you *where* the distribution is most dense, not *how much* probability is there.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{g}(y)=2y$$ on $$0 \\leqslant y \\leqslant 1$$ and 0 elsewhere. Where is the mode, and why isn't it at the \"middle\" of the range? (2 steps)", "answer": "- Step 1: The function $$\\mathrm{g}(y)=2y$$ is **strictly increasing** on $$[0,1]$$ (its derivative is 2, always positive). So the maximum value of $$\\mathrm{g}(y)$$ occurs at the **right endpoint** $$y=1$$, where $$\\mathrm{g}(1)=2$$.\n- Step 2: The mode is $$y=1$$ — the rightmost point of the range, not the middle ($$y=0.5$$). This demonstrates that the mode does **not** need to be at or near the center of the distribution. It simply goes wherever the density is highest. For a linear increasing p.d.f., the density piles up toward the right, so the mode is at the right boundary. Always sketch the p.d.f. — the mode is visually obvious as the highest point on the curve.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=12x^2(1-x)$$ on $$0 \\leqslant x \\leqslant 1$$ (a Beta distribution). How do you find the mode, and why must you verify it's a maximum rather than a minimum? (3 steps)", "answer": "- Step 1: To find the mode, set $$\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{f}(x)=0$$. First expand: $$\\mathrm{f}(x)=12x^2-12x^3$$. Then differentiate: $$\\mathrm{f}'(x)=24x-36x^2=12x(2-3x)=0$$.\n- Step 2: Solving: $$x=0$$ or $$2-3x=0 \\Rightarrow x=\\frac{2}{3}$$. These are the **critical points** — candidates for maximum or minimum.\n- Step 3: Check which is the maximum:\n+ At $$x=0$$: $$\\mathrm{f}(0)=0$$ (boundary, minimum)\n+ At $$x=\\frac{2}{3}$$: $$\\mathrm{f}(\\frac{2}{3})=12\\cdot\\frac{4}{9}\\cdot\\frac{1}{3}=\\frac{48}{27}=\\frac{16}{9}\\approx 1.78$$ (positive, clearly the peak)\n+ At $$x=1$$: $$\\mathrm{f}(1)=0$$ (boundary, minimum)\n\nThe mode is $$x=\\frac{2}{3}$$ — the interior critical point where $$\\mathrm{f}$$ is maximized. Always verify: setting the derivative to zero finds *all* critical points (maxima, minima, or saddle points), and you must confirm which is the actual maximum, often by checking values or using a sketch.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "What is the median of a continuous random variable, and how is it defined in terms of the c.d.f.? Why is it called the \"50th percentile\"? (2 steps)", "answer": "- Step 1: The median $$m$$ is defined by $$\\mathrm{F}(m)=0.5$$ — it's the value where the cumulative probability reaches exactly 0.5. Half the probability lies below $$m$$ and half above. You find it by setting $$\\mathrm{F}(x)=0.5$$ and solving for $$x$$.\n- Step 2: The median is the **50th percentile** because it splits the distribution into a lower 50% and an upper 50%. The concept generalizes: the $$n$$th percentile $$P_n$$ satisfies $$\\mathrm{F}(P_n)=\\frac{n}{100}$$ — the value below which $$n$$% of the probability lies. The median is just the special case $$n=50$$.\n\nFor a symmetric distribution, the median equals the mean (and often the mode too). For skewed distributions, these three measures typically differ.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "The c.d.f. of $$X$$ is $$\\mathrm{F}(x)=2x^2-x^4$$ for $$0 \\leqslant x \\leqslant 1$$ (with $$\\mathrm{F}(x)=0$$ for $$x<0$$ and $$\\mathrm{F}(x)=1$$ for $$x>1$$). To find the median, you solve $$2m^2-m^4=0.5$$, which gives a quadratic in $$m^2$$. Walk through the conceptual steps of solving this. (3 steps)", "answer": "- Step 1: Set $$\\mathrm{F}(m)=0.5$$: $$2m^2-m^4=0.5$$. Rearrange: $$m^4-2m^2+0.5=0$$. This is a **quadratic in $$m^2$$** — let $$u=m^2$$, then $$u^2-2u+0.5=0$$.\n- Step 2: Solve using the quadratic formula: $$u=\\frac{2\\pm\\sqrt{4-2}}{2}=\\frac{2\\pm\\sqrt{2}}{2}=1\\pm\\frac{\\sqrt{2}}{2}$$.\n+ $$u=1+\\frac{\\sqrt{2}}{2}\\approx 1.707$$ → $$m=\\sqrt{1.707}\\approx 1.31$$ — but this exceeds the range $$[0,1]$$, so reject it.\n+ $$u=1-\\frac{\\sqrt{2}}{2}\\approx 0.293$$ → $$m=\\sqrt{0.293}\\approx 0.541$$ — within range, valid.\n- Step 3: Always check that your solution lies within the valid range of $$x$$. The c.d.f. is only defined by the given formula on $$0 \\leqslant x \\leqslant 1$$; values outside this range don't correspond to the distribution. The median is $$m\\approx 0.541$$.\n\nThe trick of substituting $$u=m^2$$ to reduce a quartic to a quadratic is standard for medians of polynomial c.d.f.s.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "When a c.d.f. is piecewise, how do you determine which piece to use when finding the median or quartiles? Describe the strategy. (3 steps)", "answer": "- Step 1: First, **evaluate $$\\mathrm{F}$$ at each boundary point** between pieces. This tells you how much probability has been accumulated at each transition. For example, if the c.d.f. has pieces on $$[1,2]$$ and $$[2,4]$$, compute $$\\mathrm{F}(2)$$ to see where the 0.5 mark might fall.\n- Step 2: Compare these boundary values with your target:\n+ If $$\\mathrm{F}(2)=0.2$$, then only 20% of probability is accumulated by $$x=2$$. The median (50%) must lie in the **second piece** (above $$x=2$$), because we need to accumulate more probability.\n+ If $$\\mathrm{F}(2)=0.7$$, then 70% is accumulated by $$x=2$$, and the median lies in the **first piece** (below $$x=2$$).\n- Step 3: Once you've identified the correct piece, set $$\\mathrm{F}(x)=0.5$$ (for median), $$\\mathrm{F}(x)=0.25$$ (for $$Q_1$$), or $$\\mathrm{F}(x)=0.75$$ (for $$Q_3$$) using the formula from that piece only, and solve.\n\nThis \"boundary checking\" step is essential — using the wrong piece gives a meaningless answer.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "The lower quartile $$Q_1$$ and upper quartile $$Q_3$$ are defined by $$\\mathrm{F}(Q_1)=0.25$$ and $$\\mathrm{F}(Q_3)=0.75$$. What is the **interquartile range**, and what does it measure conceptually? (2 steps)", "answer": "- Step 1: The interquartile range (IQR) is $$Q_3-Q_1$$ — the difference between the upper and lower quartiles. It's the range of the **middle 50%** of the distribution: 25% of probability lies below $$Q_1$$, 50% lies between $$Q_1$$ and $$Q_3$$, and 25% lies above $$Q_3$$.\n- Step 2: Conceptually, the IQR measures **spread** — how wide the central portion of the distribution is. It's a robust measure of dispersion (unaffected by extreme values in the tails), analogous to how the IQR works for data sets. A narrow IQR means the \"typical\" values are tightly clustered; a wide IQR means they're spread out. Compare this to variance, which also measures spread but is sensitive to tails.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "The 15th percentile of a distribution satisfies $$\\mathrm{F}(P_{15})=0.15$$. If the c.d.f. on $$0 \\leqslant x < 2$$ is $$\\mathrm{F}(x)=\\frac{x^2}{20}$$, and $$\\mathrm{F}(2)=0.2$$, how do you find the 15th percentile, and why must you check which piece it falls in? (3 steps)", "answer": "- Step 1: We need $$\\mathrm{F}(a)=0.15$$ for the 15th percentile. First check: $$\\mathrm{F}(2)=0.2>0.15$$, so the 15th percentile falls in the **first piece** ($$0 \\leqslant x < 2$$), where $$\\mathrm{F}(x)=\\frac{x^2}{20}$$.\n- Step 2: Set $$\\frac{a^2}{20}=0.15$$, so $$a^2=3$$, giving $$a=\\sqrt{3}\\approx 1.73$$ (rejecting the negative root since $$a$$ must be in $$[0,2]$$).\n- Step 3: The check was necessary because if $$\\mathrm{F}(2)$$ had been less than 0.15 (say 0.10), the 15th percentile would have been in the second piece, and using the first piece's formula would have given no solution or an out-of-range solution. Always verify your answer is within the domain of the piece you used.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "For a p.d.f. that is a triangular shape (linear increasing then linear decreasing), like $$\\mathrm{f}(x)=\\frac{1}{9}x$$ on $$0<x<3$$ and $$\\mathrm{f}(x)=\\frac{1}{9}(6-x)$$ on $$3 \\leqslant x \\leqslant 6$$, where is the mode and why? (2 steps)", "answer": "- Step 1: Sketch the p.d.f.: it's a triangle peaking at $$x=3$$, where both pieces meet with value $$\\mathrm{f}(3)=\\frac{1}{9}\\cdot 3=\\frac{1}{3}$$ on the left side and $$\\mathrm{f}(3)=\\frac{1}{9}(6-3)=\\frac{1}{3}$$ on the right side. The function increases from 0 to $$\\frac{1}{3}$$ on $$[0,3]$$ and decreases from $$\\frac{1}{3}$$ to 0 on $$[3,6]$$.\n- Step 2: The mode is $$x=3$$ — the apex of the triangle, the point of maximum density. For piecewise-linear p.d.f.s, the mode is typically at a corner or junction point where the function changes direction. You can find it by sketching rather than differentiating (since the derivative is constant on each piece — +$$\\frac{1}{9}$$ on the left, -$$\\frac{1}{9}$$ on the right — the switch from positive to negative slope identifies the peak).", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=\\frac{3}{8}(x^2+1)$$ on $$-1 \\leqslant x \\leqslant 1$$ and 0 elsewhere. This is symmetric about $$x=0$$. What can you immediately say about the mode, median, and mean — and what caution applies to the mode? (3 steps)", "answer": "- Step 1: **Mean:** By symmetry, $$\\mathrm{E}(X)=0$$ (the balance point of a symmetric distribution centered at 0).\n- Step 2: **Median:** By symmetry, the median is also 0. The c.d.f. at $$x=0$$ must be 0.5 because the left half and right half contain equal probability.\n- Step 3: **Mode:** This is where caution is needed. $$\\mathrm{f}(x)=\\frac{3}{8}(x^2+1)$$ is a U-shaped (bimodal) function — it's **minimized** at $$x=0$$ (where $$\\mathrm{f}(0)=\\frac{3}{8}$$) and **maximized** at the endpoints $$x=\\pm 1$$ (where $$\\mathrm{f}(\\pm 1)=\\frac{3}{8}\\cdot 2=\\frac{3}{4}$$). So the distribution has **two modes**: $$x=-1$$ and $$x=1$$. The mode is NOT at the center, and there isn't a unique mode.\n\nSymmetry guarantees mean = median, but says nothing about the mode — it could be at the center, at the boundaries, or at multiple points.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "Why can the following NOT be a valid c.d.f.? $$\\mathrm{F}(x)=\\left\\{\\begin{array}{cc}0 & x<5 \\\\ \\frac{1}{5}(16x-x^2-55) & 5 \\leqslant x \\leqslant 10 \\\\ 1 & x>10\\end{array}\\right.$$ (3 steps)", "answer": "- Step 1: A valid c.d.f. must satisfy $$\\mathrm{F}(x) \\geqslant 0$$ for all $$x$$ (probabilities can't be negative) and must be **non-decreasing** (cumulative probability can only go up or stay flat, never decrease).\n- Step 2: Check the boundary conditions: $$\\mathrm{F}(5)=\\frac{1}{5}(80-25-55)=\\frac{1}{5}(0)=0$$ ✓. $$\\mathrm{F}(10)=\\frac{1}{5}(160-100-55)=\\frac{1}{5}(5)=1$$ ✓. So the endpoints are fine.\n- Step 3: But check intermediate values. At $$x=8$$: $$\\mathrm{F}(8)=\\frac{1}{5}(128-64-55)=\\frac{1}{5}(9)=1.8>1$$. A c.d.f. value exceeding 1 is impossible — it would mean more than 100% cumulative probability. The quadratic $$16x-x^2-55$$ reaches a maximum between $$x=5$$ and $$x=10$$ that pushes $$\\mathrm{F}(x)$$ above 1, violating the constraint $$0 \\leqslant \\mathrm{F}(x) \\leqslant 1$$.\n\nA c.d.f. must always stay between 0 and 1 and be non-decreasing — any violation disqualifies it.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. $$\\mathrm{f}(x)$$, the general formula for the expectation of any function $$g(X)$$ is $$\\mathrm{E}(g(X))=\\int g(x)\\mathrm{f}(x)\\,\\mathrm{d}x$$. How does this unify all the specific formulas we've seen ($$\\mathrm{E}(X)$$, $$\\mathrm{E}(X^2)$$, $$\\mathrm{E}(X^3)$$)? (2 steps)", "answer": "- Step 1: Each specific formula is just the general rule with a particular choice of $$g$$:\n+ $$\\mathrm{E}(X)$$: use $$g(x)=x$$ → $$\\mathrm{E}(X)=\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ $$\\mathrm{E}(X^2)$$: use $$g(x)=x^2$$ → $$\\mathrm{E}(X^2)=\\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ $$\\mathrm{E}(X^3)$$: use $$g(x)=x^3$$ → $$\\mathrm{E}(X^3)=\\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n- Step 2: This general principle means: **to find the expected value of any function of $$X$$, multiply that function by the p.d.f. and integrate**. This works for any $$g$$ — polynomials, exponentials, logarithms, etc. For example, $$\\mathrm{E}(\\ln X)=\\int \\ln(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. The only constraint is that the integral must converge (exist as a finite number).\n\nThis is the continuous analogue of $$\\mathrm{E}(g(X))=\\sum g(x)\\mathrm{P}(X=x)$$ for discrete RVs.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "How does the probability of a continuous random variable taking a specific exact value differ from a discrete random variable, and why? (3 steps)", "answer": "- Step 1: For a discrete random variable, probabilities are assigned to distinct, separate points (e.g., $$P(X=4)$$), so a specific value can have a non-zero probability.\n- Step 2: For a continuous random variable, there are infinitely many possible values in any given range. If each specific value had a non-zero probability, the total probability over the infinite set would sum to infinity, violating the rule that total probability must be 1.\n- Step 3: Therefore, for a continuous random variable $$X$$, the probability of it taking any one specific exact value is always exactly zero: $$P(X = x) = 0$$.\n+ Because of this, we only measure probabilities over *ranges* or *intervals*, like $$P(a < X < b)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What are the two essential mathematical conditions that a function $$f(x)$$ must satisfy to be a valid probability density function (p.d.f.)? (2 steps)", "answer": "- Step 1: The function must be non-negative everywhere: $$f(x) \\geq 0$$ for all real $$x$$. This is because probability can never be negative.\n- Step 2: The total area under the curve of $$f(x)$$ must equal exactly 1: $$\\int_{-\\infty}^{\\infty} f(x) dx = 1$$. This represents the fact that the random variable must take *some* value in the real numbers with certainty (probability 1).\n+ In practice, because $$f(x)$$ is often zero outside a specific interval $$[a, b]$$, the integral simplifies to $$\\int_{a}^{b} f(x) dx = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "For a continuous random variable $$X$$, does $$P(X < 5)$$ differ from $$P(X \\leq 5)$$? Why or why not? (2 steps)", "answer": "- Step 1: No, they do not differ; they are exactly equal. $$P(X < 5) = P(X \\leq 5)$$.\n- Step 2: The probability of taking an exact value is zero: $$P(X = 5) = 0$$. Since the interval $$X \\leq 5$$ is just the interval $$X < 5$$ combined with the single point $$X = 5$$, we have $$P(X \\leq 5) = P(X < 5) + P(X = 5) = P(X < 5) + 0$$.\n+ This means for continuous variables, strict inequalities ($$<, >$$) and non-strict inequalities ($$\\leq, \\geq$$) are completely interchangeable.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A proposed p.d.f. is defined as $$f(x) = kx(5-x)$$ for $$0 \\leq x \\leq 6$$. Even before checking if the total area is 1, how can you immediately tell this cannot be a valid p.d.f. for any positive constant $$k$$? (2 steps)", "answer": "- Step 1: A valid p.d.f. must satisfy $$f(x) \\geq 0$$ for all $$x$$ in its defined range.\n- Step 2: The roots of the function $$x(5-x)$$ are at $$x=0$$ and $$x=5$$. For any $$x$$ greater than 5 (up to the domain limit of 6), the term $$(5-x)$$ becomes negative, making $$f(x)$$ negative (e.g., at $$x=6$$, $$f(6) = -6k$$, which is negative since $$k$$ is positive).\n+ A probability density cannot dip below the x-axis; doing so implies a negative probability, which is physically and mathematically meaningless.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "Visually and conceptually, what does the cumulative distribution function $$F(x)$$ represent for a continuous random variable? (2 steps)", "answer": "- Step 1: Visually, $$F(x)$$ represents the total area under the p.d.f. curve to the *left* of the vertical line $$x$$.\n- Step 2: Conceptually, it gives the probability that the random variable takes a value less than or equal to $$x$$: $$F(x) = P(X \\leq x)$$.\n+ As $$x$$ increases, you accumulate more area, so $$F(x)$$ is always a non-decreasing function that starts at 0 (for very negative $$x$$) and ends at 1 (for very positive $$x$$).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "State the fundamental calculus relationship connecting the p.d.f. $$f(x)$$ and the c.d.f. $$F(x)$$. (2 steps)", "answer": "- Step 1: To get the c.d.f. from the p.d.f., you integrate. The c.d.f. is the integral of the p.d.f. up to the limit $$x$$: $$F(x) = \\int_{-\\infty}^{x} f(t) dt$$.\n+ Note that we use a dummy variable $$t$$ inside the integral to avoid confusion with the upper limit $$x$$.\n- Step 2: To get the p.d.f. from the c.d.f., you differentiate. The p.d.f. is the derivative of the c.d.f.: $$f(x) = \\frac{d}{dx} F(x)$$.\n+ If $$F(x)$$ is flat (constant) on an interval, its derivative is 0, meaning $$f(x) = 0$$ there (no probability density in that region).", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "How do you calculate the probability $$P(a < X < b)$$ using the cumulative distribution function $$F(x)$$? (2 steps)", "answer": "- Step 1: Recognize that $$P(a < X < b)$$ is the area under the p.d.f. between $$a$$ and $$b$$, which is the probability accumulated up to $$b$$ minus the probability accumulated up to $$a$$.\n- Step 2: Therefore, $$P(a < X < b) = F(b) - F(a)$$.\n+ This is much faster than integrating the p.d.f. every time, which is exactly why we calculate the c.d.f. in the first place!", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Using the c.d.f. $$F(x)$$, explain mathematically why $$P(X = x) = 0$$ for a continuous random variable. (3 steps)", "answer": "- Step 1: The probability of landing in a tiny interval around $$x$$ is $$P(x \\leq X \\leq x + \\delta x) = F(x + \\delta x) - F(x)$$.\n- Step 2: The exact probability at the point $$x$$ is the limit of this probability as the interval width $$\\delta x$$ shrinks to zero: $$P(X = x) = \\lim_{\\delta x \\to 0} [F(x + \\delta x) - F(x)]$$.\n- Step 3: This limit is the definition of the derivative, which gives the p.d.f. $$f(x)$$. However, the area of a line (width zero) under a curve is zero. Thus, $$P(X = x) = 0$$.\n+ The p.d.f. $$f(x)$$ gives the *density* of probability at $$x$$, not the probability itself.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "When constructing a c.d.f. $$F(x)$$ from a piecewise p.d.f., why must you add the cumulative area from previous intervals to the integral of the current interval? (3 steps)", "answer": "- Step 1: The c.d.f. $$F(x)$$ measures the *total* accumulated probability from the very left of the distribution up to $$x$$.\n- Step 2: When you move to a new piece of the p.d.f. (say, for $$x > c$$), the random variable doesn't \"reset\". It still carries all the probability from the previous intervals.\n- Step 3: Therefore, for a new interval starting at $$c$$, you must calculate $$F(x) = F(c) + \\int_{c}^{x} f(t) dt$$, where $$F(c)$$ is the total probability accumulated up to the boundary $$c$$.\n+ Think of it like filling a bucket: if you've already poured in 0.2 liters in the first minute, and then change the pouring rate, the total water is still 0.2 liters plus whatever the new rate adds.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "If a random variable $$X$$ is only defined with non-zero probability density on the interval $$[2, 5]$$, what must be the values of $$F(2)$$ and $$F(5)$$, and why? (2 steps)", "answer": "- Step 1: $$F(2) = 0$$. Since there is no probability density (no area) for any $$x < 2$$, the total accumulated probability at $$x=2$$ is zero.\n- Step 2: $$F(5) = 1$$. Since there is no probability density for any $$x > 5$$, all the probability must have been accumulated by the time we reach $$x=5$$.\n+ These boundary conditions are crucial for finding unknown constants in either the p.d.f. or the c.d.f.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Given a c.d.f. $$F(x)$$ with unknown parameters, what boundary conditions do you use to solve for them? (2 steps)", "answer": "- Step 1: Use the fact that at the lower bound of the domain $$a$$, the c.d.f. must equal zero: $$F(a) = 0$$.\n- Step 2: Use the fact that at the upper bound of the domain $$b$$, the c.d.f. must equal one: $$F(b) = 1$$.\n+ If you set up the equations $$F(a) = 0$$ and $$F(b) = 1$$, you create a system of simultaneous equations that can be solved for the unknown parameters.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Write down the formula for the expected value $$E(X)$$ of a continuous random variable and explain its physical intuition. (2 steps)", "answer": "- Step 1: The formula is $$E(X) = \\int_{-\\infty}^{\\infty} x f(x) dx$$.\n- Step 2: Physically, this is the center of mass (balance point) of the probability density curve. You are multiplying each position $$x$$ by its \"weight\" (density $$f(x)$$) and summing them up via integration.\n+ This is the continuous analogue of the discrete mean $$\\sum x P(X=x)$$, where sums are replaced by integrals and probability mass is replaced by probability density.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Write down the two equivalent formulas for the variance $$Var(X)$$ of a continuous random variable. Which one is typically easier to use? (2 steps)", "answer": "- Step 1: The defining formula is $$Var(X) = \\int_{-\\infty}^{\\infty} (x-\\mu)^2 f(x) dx$$, and the computational formula is $$Var(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: The computational formula $$E(X^2) - \\mu^2$$ is almost always easier because it avoids squaring terms with $$\\mu$$ inside the integral, which creates messy algebra.\n+ Here, $$E(X^2) = \\int_{-\\infty}^{\\infty} x^2 f(x) dx$$, which is straightforward to calculate.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "If you need to find the expected value of a function of $$X$$, say $$E(g(X))$$, what integral do you calculate? (2 steps)", "answer": "- Step 1: You replace the $$x$$ in the standard mean formula with the function $$g(x)$$.\n- Step 2: The formula is $$E(g(X)) = \\int_{-\\infty}^{\\infty} g(x) f(x) dx$$.\n+ For example, to find $$E(X^3)$$, you calculate $$\\int x^3 f(x) dx$$ over the valid domain.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A common mistake is assuming that $$E(X^2) = [E(X)]^2$$. Explain why this is false by connecting it to the concept of variance. (3 steps)", "answer": "- Step 1: Variance measures the spread of the distribution. If $$E(X^2)$$ were equal to $$[E(X)]^2$$, then the variance would be zero.\n- Step 2: A variance of zero means the distribution has no spread at all—meaning the random variable is actually a constant, not a variable.\n- Step 3: For any actual random variable with variation, $$E(X^2)$$ will be strictly greater than $$[E(X)]^2$$ because squaring the values before averaging them gives more weight to values far from the mean.\n+ This is a direct consequence of Jensen's inequality for the convex function $$g(x) = x^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "State the linear coding rules for expectation and variance: $$E(aX + b)$$ and $$Var(aX + b)$$. (2 steps)", "answer": "- Step 1: For expectation, $$E(aX + b) = aE(X) + b$$. Both the scaling factor $$a$$ and the shift $$b$$ affect the mean.\n- Step 2: For variance, $$Var(aX + b) = a^2 Var(X)$$. The shift $$b$$ disappears because variance measures spread from the mean; shifting the whole distribution doesn't change how spread out it is.\n+ Scaling by $$a$$ scales the spread by $$|a|$$, and since variance is a squared measure, it scales by $$a^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Why does adding a constant $$b$$ to a random variable not change its variance? Give a conceptual and algebraic reason. (3 steps)", "answer": "- Step 1: Conceptually, variance measures how far values are spread from their average. If you add 10 to every possible outcome, the average goes up by 10, but the *distances between the values and the average* remain exactly the same.\n- Step 2: Algebraically, the new mean is $$\\mu' = a\\mu + b$$. The new deviations are $$(aX+b) - \\mu' = aX + b - (a\\mu + b) = a(X - \\mu)$$.\n- Step 3: When you square these deviations to find variance, the $$b$$ terms have completely cancelled out, leaving only the $$a^2$$ factor: $$Var(aX+b) = a^2 Var(X)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "If the graph of a p.d.f. $$f(x)$$ is perfectly symmetric about the vertical line $$x = a$$, what is the value of $$E(X)$$? (2 steps)", "answer": "- Step 1: The expected value $$E(X)$$ is the center of mass (balance point) of the p.d.f.\n- Step 2: If the shape is perfectly symmetric about $$x = a$$, the center of mass must lie exactly on the line of symmetry.\n+ Therefore, $$E(X) = a$$. This symmetry shortcut can save you from doing a long integral!", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "A cube has a random side length $$X$$. Why is the expected volume $$E(X^3)$$ not equal to $$[E(X)]^3$$? (3 steps)", "answer": "- Step 1: $$E(X^3)$$ is the average of the *cubed* side lengths: $$\\int x^3 f(x) dx$$.\n- Step 2: $$[E(X)]^3$$ is the cube of the *average* side length: $$(\\int x f(x) dx)^3$$.\n- Step 3: Because $$g(x) = x^3$$ is a convex function for $$x>0$$, by Jensen's inequality, the average of the function is greater than the function of the average: $$E(X^3) > [E(X)]^3$$.\n+ The distribution of volumes is skewed by the cubing effect on larger side lengths, pulling the expected volume higher than the volume of the average side.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "How is the mode of a continuous random variable defined, and what is the procedure to find it? (3 steps)", "answer": "- Step 1: The mode is the value of $$x$$ at which the probability density function $$f(x)$$ reaches its maximum. It is the \"peak\" of the distribution.\n- Step 2: To find it algebraically, set the derivative of the p.d.f. to zero: $$f'(x) = 0$$, and solve for $$x$$.\n- Step 3: You must verify it is a maximum (e.g., using the second derivative $$f''(x) < 0$$ or by sketching the graph) and ensure the answer lies within the valid domain of $$x$$.\n+ For piecewise linear p.d.f.s, the mode is simply the $$x$$-value at the \"corner\" or highest point of the shape.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "What if the p.d.f. is strictly increasing on its interval (e.g., $$f(x) = 2x$$ on $$[0,1]$$)? Where is the mode? (2 steps)", "answer": "- Step 1: Setting the derivative to zero won't work here because the maximum doesn't occur at a flat spot; it occurs at the boundary of the domain.\n- Step 2: Since the function is strictly increasing, the highest point (maximum density) is at the rightmost edge of the valid domain.\n+ Therefore, the mode is the upper bound of the domain (in this example, mode = 1).", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "How is the median of a continuous random variable defined using the c.d.f. $$F(x)$$? (2 steps)", "answer": "- Step 1: The median is the value $$m$$ that splits the total probability exactly in half.\n- Step 2: Therefore, it is the value $$m$$ such that $$F(m) = 0.5$$.\n+ Visually, it's the $$x$$-value where the area to the left is exactly 0.5 and the area to the right is exactly 0.5.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "When finding the median or quartiles from a piecewise c.d.f., what is the crucial first step before solving equations? (3 steps)", "answer": "- Step 1: Calculate the c.d.f. values at the boundary points between the pieces (e.g., find $$F(2)$$ if the function changes at $$x=2$$).\n- Step 2: Compare the target probability (like 0.5 for the median) to these boundary values.\n- Step 3: This tells you which \"piece\" of the c.d.f. the median falls inside, ensuring you set up and solve the correct equation.\n+ For example, if $$F(2) = 0.2$$ and $$F(4) = 1$$, the median (0.5) must lie in the interval $$(2, 4)$$, so you use the equation for that specific piece.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "How is the $$n$$-th percentile $$P_n$$ defined using the c.d.f.? (2 steps)", "answer": "- Step 1: A percentile divides the distribution such that $$n$$ percent of the data falls below it.\n- Step 2: Therefore, the $$n$$-th percentile is the value $$a$$ such that $$F(a) = \\frac{n}{100}$$.\n+ For example, the 15th percentile satisfies $$F(a) = 0.15$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Define the interquartile range (IQR) of a continuous random variable. (1 step)", "answer": "- Step 1: The interquartile range is the difference between the upper quartile $$Q_3$$ and the lower quartile $$Q_1$$, representing the spread of the middle 50% of the distribution.\n+ Mathematically, $$IQR = Q_3 - Q_1$$, where $$F(Q_1) = 0.25$$ and $$F(Q_3) = 0.75$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "For a positively skewed distribution, what is the typical order of the mode, median, and mean? Explain why. (3 steps)", "answer": "- Step 1: The typical order is Mode < Median < Mean.\n- Step 2: The mode is at the peak (the hump) of the distribution. The positive skew means there is a long tail to the right.\n- Step 3: The extreme high values in the right tail pull the mean (balance point) towards them the most. The median (area split) is pulled slightly, and the mode (peak) is unaffected by the tail.\n+ Thus, the mean is dragged furthest right, the median sits in the middle, and the mode remains at the peak on the left.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "Is it possible for a symmetrical distribution to have a mode that is not equal to the median? (2 steps)", "answer": "- Step 1: Yes, it is possible. A symmetric distribution must have its mean equal to its median (the center of mass is the center of symmetry).\n- Step 2: However, a distribution could be bimodal (have two peaks) symmetrically placed around the median. In this case, the median is a single point at the center, but there are two modes away from the center.\n+ A rectangular (uniform) distribution is also symmetric, but has no unique mode (every point is a mode), yet has a well-defined median.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Exercise: The continuous random variable $$X$$ has p.d.f. $$f(x) = kx$$ for $$0 \\leq x \\leq 4$$, and 0 otherwise. Find the value of $$k$$ and find $$P(X > 2)$$. (3 steps)", "answer": "- Step 1: For $$f(x)$$ to be a valid p.d.f., the total area must be 1. Set up the integral: $$\\int_{0}^{4} kx dx = 1$$.\n- Step 2: Integrate to get $$k[\\frac{x^2}{2}]_{0}^{4} = k(8 - 0) = 8k$$. Since $$8k = 1$$, we find $$k = \\frac{1}{8}$$.\n- Step 3: To find $$P(X > 2)$$, integrate the valid p.d.f. from 2 to 4: $$\\int_{2}^{4} \\frac{1}{8}x dx = [\\frac{x^2}{16}]_{2}^{4} = \\frac{16}{16} - \\frac{4}{16} = \\frac{12}{16} = \\frac{3}{4}$$.\n+ Alternatively, the shape is a triangle with base 4 and height $$4k = 0.5$$. The area is $$\\frac{1}{2} \\times 4 \\times 0.5 = 1$$. The area past $$x=2$$ is a smaller triangle with base 2 and height 0.5, area $$\\frac{1}{2} \\times 2 \\times 0.5 = 0.5$$... wait, height at 2 is $$2/8 = 0.25$$. Area is $$\\frac{1}{2} \\times 2 \\times 0.5 = 0.5$$? No, height at 4 is 0.5, height at 2 is 0.25. The area of the trapezium is $$\\frac{1}{2}(0.5 + 0.25) \\times 2 = 0.75$$. Yes, $$\\frac{3}{4}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Exercise: The continuous random variable $$X$$ has p.d.f. $$f(x) = \\frac{1}{2}x$$ for $$0 \\leq x \\leq 2$$, and 0 otherwise. Find $$E(X)$$ and $$Var(X)$$. (3 steps)", "answer": "- Step 1: Find $$E(X)$$ using $$\\int_{0}^{2} x f(x) dx = \\int_{0}^{2} \\frac{1}{2}x^2 dx = [\\frac{x^3}{6}]_{0}^{2} = \\frac{8}{6} = \\frac{4}{3}$$.\n- Step 2: Find $$E(X^2)$$ using $$\\int_{0}^{2} x^2 f(x) dx = \\int_{0}^{2} \\frac{1}{2}x^3 dx = [\\frac{x^4}{8}]_{0}^{2} = \\frac{16}{8} = 2$$.\n- Step 3: Calculate $$Var(X) = E(X^2) - [E(X)]^2 = 2 - (\\frac{4}{3})^2 = 2 - \\frac{16}{9} = \\frac{18-16}{9} = \\frac{2}{9}$$.\n+ Always find $$E(X^2)$$ first; never try to integrate $$(x-\\mu)^2 f(x)$$ directly unless forced to, as it is algebraically much harder.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Exercise: The continuous random variable $$X$$ has c.d.f. $$F(x) = \\frac{x^2}{9}$$ for $$0 \\leq x \\leq 3$$. Find the median of $$X$$. (2 steps)", "answer": "- Step 1: Set the c.d.f. equal to 0.5 to find the median $$m$$: $$F(m) = 0.5 \\implies \\frac{m^2}{9} = 0.5$$.\n- Step 2: Solve for $$m$$: $$m^2 = 4.5 \\implies m = \\sqrt{4.5}$$. Since $$2^2 = 4$$ and $$3^2 = 9$$, we know $$m$$ is between 2 and 3. (Exact answer is $$\\frac{3}{\\sqrt{2}}$$).\n+ We ignore the negative root because the domain of $$X$$ is $$[0, 3]$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}], "count": 30}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "For a continuous random variable, the probability of it taking any one specific exact value is always a particular number. What is that number, and why does this make a table-based probability definition impossible? (2 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for any specific value $$x$$. This is because there are infinitely many possible values, so the \"share\" of probability allocated to any single point collapses to zero — analogous to how a single point has zero length on a number line.\n- Step 2: Because every individual value has probability 0, you cannot define the distribution by listing values and their probabilities in a table (as you do for discrete random variables). Instead, you must define probability over *ranges* of values using a probability density function $$\\mathrm{f}(x)$$, where $$\\mathrm{P}(a < X < b) = \\int_a^b \\mathrm{f}(x)\\,\\mathrm{d}x$$.\n\nThis is the fundamental reason continuous and discrete random variables require different treatment.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A function is proposed as a probability density function. What two conditions must it satisfy to be valid? Explain the physical/geometric intuition behind each. (2 steps)", "answer": "- Step 1: **Non-negativity**: $$\\mathrm{f}(x) \\geq 0$$ for all $$x \\in \\mathbb{R}$$. Intuitively, probabilities can never be negative, and since probability over a range equals the area under the curve, the curve must sit on or above the $$x$$-axis everywhere. A negative region would represent \"negative probability,\" which is meaningless.\n- Step 2: **Total area equals 1**: $$\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,\\mathrm{d}x = 1$$. The total probability over all possible outcomes must be exactly 1 (certainty). Geometrically, the entire area under the p.d.f. curve must equal 1. In practice, you only integrate over the range where $$\\mathrm{f}(x)$$ is non-zero.\n\nBoth conditions are necessary; violating either one makes the function invalid as a p.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A function is defined as $$\\mathrm{f}(x) = \\begin{cases} kx(5-x) & 0 \\leq x \\leq 6 \\\\ 0 & \\text{otherwise} \\end{cases}$$ where $$k$$ is a positive constant. Even without computing the integral, why can this NOT be a valid p.d.f.? (2 steps)", "answer": "- Step 1: The condition $$\\mathrm{f}(x) \\geq 0$$ must hold for all $$x$$ in the defined range $$[0, 6]$$. But the function $$x(5-x)$$ changes sign: it equals zero at $$x = 0$$ and $$x = 5$$, is positive for $$0 < x < 5$$, and is *negative* for $$5 < x \\leq 6$$.\n- Step 2: Since $$k$$ is positive, $$\\mathrm{f}(x) = kx(5-x) < 0$$ for all $$x$$ in $$(5, 6]$$. This violates the non-negativity condition. No value of $$k$$ can fix this — the problem is the shape of the function itself, not the scaling.\n\nThis is a common trap: always check that the function stays non-negative across its *entire* stated domain, not just part of it.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A p.d.f. is given as $$\\mathrm{f}(x) = \\begin{cases} k(2-x) & -2 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$. What value of $$k$$ makes this a valid p.d.f.? Walk through the logic. (3 steps)", "answer": "- Step 1: First, verify non-negativity. For $$-2 \\leq x \\leq 2$$, the factor $$(2-x) \\geq 0$$ (since $$x \\leq 2$$). So $$\\mathrm{f}(x) \\geq 0$$ when $$k > 0$$. ✓\n- Step 2: Apply the total-area-equals-1 condition: $$\\int_{-2}^{2} k(2-x)\\,\\mathrm{d}x = 1$$. The integral of $$(2-x)$$ from $$-2$$ to $$2$$ is $$\\left[2x - \\frac{x^2}{2}\\right]_{-2}^{2} = (4-2) - (-4-2) = 2 - (-6) = 8$$. So $$8k = 1$$.\n- Step 3: Therefore $$k = \\frac{1}{8}$$. Geometrically, the area under the triangle (base 4, height $$k \\cdot 4 = \\frac{1}{2}$$) is $$\\frac{1}{2} \\times 4 \\times \\frac{1}{2} = 1$$. ✓\n\nAlways verify *both* conditions before concluding a function can be a p.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{16}(4x - x^2) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$$. To find $$\\mathrm{P}(2.5 < X < 3)$$, what operation do you perform, and does it matter whether you use strict ($$<$$) or non-strict ($$\\leq$$) inequalities? (2 steps)", "answer": "- Step 1: You compute $$\\mathrm{P}(2.5 < X < 3) = \\int_{2.5}^{3} \\frac{3}{16}(4x - x^2)\\,\\mathrm{d}x$$. This gives the area under the p.d.f. curve between $$x = 2.5$$ and $$x = 3$$.\n- Step 2: For a continuous random variable, it does *not* matter whether you use strict or non-strict inequalities. Since $$\\mathrm{P}(X = a) = 0$$ for any single point $$a$$, we have $$\\mathrm{P}(2.5 < X < 3) = \\mathrm{P}(2.5 \\leq X \\leq 3) = \\mathrm{P}(2.5 \\leq X < 3) = \\mathrm{P}(2.5 < X \\leq 3)$$. Adding or removing single points doesn't change the area under the curve.\n\nThis is a key difference from discrete random variables, where $$\\mathrm{P}(X = a)$$ can be nonzero.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A p.d.f. has two pieces: a constant part and a linearly increasing part. When finding the constant $$k$$, you can either integrate or use geometry. If the first piece forms a rectangle of width 1 and the second forms a trapezium with parallel sides of length $$k$$ and $$3k$$ and width 2, what is $$k$$? (2 steps)", "answer": "- Step 1: Calculate the total area using geometry. The rectangle has area $$1 \\times k = k$$. The trapezium has area $$\\frac{1}{2}(k + 3k) \\times 2 = 4k$$. Total area = $$k + 4k = 5k$$.\n- Step 2: Set the total area equal to 1: $$5k = 1$$, so $$k = \\frac{1}{5}$$. This matches the integration approach but is often faster when the p.d.f. consists of simple shapes (rectangles, triangles, trapezia).\n\nGeometry is a powerful shortcut — always sketch the p.d.f. first to see if simple shapes can replace integration.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the cumulative distribution function (c.d.f.) $$\\mathrm{F}(x)$$, and how does it relate geometrically to the p.d.f. $$\\mathrm{f}(x)$$? (2 steps)", "answer": "- Step 1: The c.d.f. is defined as $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. It gives the probability that the random variable takes a value less than or equal to $$x$$.\n- Step 2: Geometrically, $$\\mathrm{F}(x)$$ equals the area under the p.d.f. curve to the *left* of $$x$$. As $$x$$ increases, more area accumulates, so $$\\mathrm{F}(x)$$ is a non-decreasing function that starts at 0 (for very small $$x$$) and ends at 1 (for very large $$x$$).\n\nThe c.d.f. converts probability calculations from integration into simple evaluation: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{F}(b) - \\mathrm{F}(a)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "How do you convert between the p.d.f. $$\\mathrm{f}(x)$$ and the c.d.f. $$\\mathrm{F}(x)$$? State both directions. (2 steps)", "answer": "- Step 1: **From p.d.f. to c.d.f.**: Integrate. $$\\mathrm{F}(x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. You accumulate area from the left. In practice, if $$\\mathrm{f}(x) = 0$$ for $$x < a$$, then the lower limit becomes $$a$$.\n- Step 2: **From c.d.f. to p.d.f.**: Differentiate. $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$. The p.d.f. is the slope (gradient) of the c.d.f. at each point. Where the c.d.f. is flat (constant), the p.d.f. is zero.\n\nThese are inverse operations: integration builds up the c.d.f. from the p.d.f., and differentiation recovers the p.d.f. from the c.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "When writing the c.d.f. $$\\mathrm{F}(x)$$ fully, you must define it for all real $$x$$, typically as a piecewise function. What are the three regions, and what is $$\\mathrm{F}(x)$$ in each? (3 steps)", "answer": "- Step 1: **Below the range** ($$x < a$$, where $$a$$ is the lower bound of the p.d.f.): $$\\mathrm{F}(x) = 0$$. No area has accumulated yet, so the probability of being below any value in this region is zero.\n- Step 2: **Within the range** ($$a \\leq x \\leq b$$): $$\\mathrm{F}(x) = \\int_a^x \\mathrm{f}(t)\\,\\mathrm{d}t$$. This is the accumulated area from the start of the distribution up to $$x$$. It is a function of $$x$$ that increases from 0 to 1.\n- Step 3: **Above the range** ($$x > b$$): $$\\mathrm{F}(x) = 1$$. All the area has been accumulated, so the probability of being below any value above the entire distribution is certainty (1).\n\nForgetting the $$\\mathrm{F}(x) = 0$$ and $$\\mathrm{F}(x) = 1$$ regions is a common exam error.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Given a p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}x & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$, find the c.d.f. using the indefinite integral method. How do you find the constant of integration? (3 steps)", "answer": "- Step 1: Integrate without limits: $$\\mathrm{F}(x) = \\int \\frac{1}{4}x\\,\\mathrm{d}x = \\frac{x^2}{8} + c$$.\n- Step 2: Use a boundary condition to find $$c$$. Since $$\\mathrm{F}(1) = 0$$ (at the lower bound of the range, no area has accumulated): $$\\frac{1}{8} + c = 0$$, so $$c = -\\frac{1}{8}$$.\n- Step 3: Therefore $$\\mathrm{F}(x) = \\frac{x^2}{8} - \\frac{1}{8}$$ for $$1 \\leq x \\leq 3$$. Verify: $$\\mathrm{F}(3) = \\frac{9}{8} - \\frac{1}{8} = 1$$. ✓ Write the full piecewise: $$\\mathrm{F}(x) = 0$$ for $$x < 1$$, $$\\frac{x^2}{8} - \\frac{1}{8}$$ for $$1 \\leq x \\leq 3$$, and $$1$$ for $$x > 3$$.\n\nYou could also use $$\\mathrm{F}(3) = 1$$ to find $$c$$; both boundary conditions give the same answer.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A p.d.f. is piecewise: constant on one interval and linear on another. When finding the c.d.f. for the second (linear) piece, what crucial step must you remember that you don't need for a single-piece p.d.f.? (2 steps)", "answer": "- Step 1: You must *add on the accumulated probability from the first piece*. For the second interval, $$\\mathrm{F}(x) = \\mathrm{F}(\\text{boundary value}) + \\int_{\\text{boundary}}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. The c.d.f. is *cumulative* — it includes all the area from previous sections.\n- Step 2: For example, if the first piece (constant $$\\frac{1}{5}$$ on $$1 < x < 2$$) gives $$\\mathrm{F}(2) = \\frac{1}{5}$$, then for the second piece (on $$2 \\leq x \\leq 4$$), you compute: $$\\mathrm{F}(x) = \\frac{1}{5} + \\int_2^x \\frac{1}{5}(t-1)\\,\\mathrm{d}t$$. Without adding $$\\frac{1}{5}$$, your c.d.f. would restart from 0 at $$x = 2$$, which is wrong.\n\nThe word \"cumulative\" is the key: the c.d.f. always builds on what came before.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Given the c.d.f. $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{1}{5}x + \\frac{3}{20}x^2 & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$$, find $$\\mathrm{P}(0.5 \\leq X \\leq 1.5)$$. (2 steps)", "answer": "- Step 1: Use the c.d.f. property: $$\\mathrm{P}(0.5 \\leq X \\leq 1.5) = \\mathrm{F}(1.5) - \\mathrm{F}(0.5)$$. This replaces the need for integration — just evaluate the c.d.f. at two points.\n- Step 2: Compute: $$\\mathrm{F}(1.5) = \\frac{1.5}{5} + \\frac{3(1.5)^2}{20} = 0.3 + 0.3375 = 0.6375$$. And $$\\mathrm{F}(0.5) = \\frac{0.5}{5} + \\frac{3(0.5)^2}{20} = 0.1 + 0.0375 = 0.1375$$. So the probability is $$0.6375 - 0.1375 = 0.5$$.\n\nThis is the main advantage of the c.d.f.: probability calculations become subtraction instead of integration.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Given the same c.d.f. as Q12, what is $$\\mathrm{P}(X = 1)$$? Explain why. (1 step)", "answer": "For a continuous random variable, $$\\mathrm{P}(X = 1) = 0$$. The probability of a continuous variable taking any single exact value is always zero, because a single point has zero \"width\" and hence zero area under the p.d.f. curve. This is why we only talk about probabilities over *intervals* for continuous variables.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Given the c.d.f. $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{1}{5}x + \\frac{3}{20}x^2 & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$$, how do you recover the p.d.f. $$\\mathrm{f}(x)$$? (2 steps)", "answer": "- Step 1: Differentiate the c.d.f. in the active region: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\left(\\frac{1}{5}x + \\frac{3}{20}x^2\\right) = \\frac{1}{5} + \\frac{3}{10}x$$ for $$0 \\leq x \\leq 2$$.\n- Step 2: Where the c.d.f. is constant, the p.d.f. is zero. So $$\\mathrm{f}(x) = 0$$ for $$x < 0$$ and $$x > 2$$ (since $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(0) = 0$$ and $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(1) = 0$$). Full answer: $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} + \\frac{3}{10}x & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$.\n\nDifferentiation undoes integration — the p.d.f. is the rate of change (slope) of the c.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "A c.d.f. has the form $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 2 \\\\ \\frac{1}{6}x^p + q & 2 \\leq x \\leq 4 \\\\ 1 & x > 4 \\end{cases}$$. How many equations can you form to find the unknowns $$p$$ and $$q$$, and from what conditions? (2 steps)", "answer": "- Step 1: Use the boundary conditions of the c.d.f. At the lower bound: $$\\mathrm{F}(2) = 0$$, giving $$\\frac{2^p}{6} + q = 0$$. At the upper bound: $$\\mathrm{F}(4) = 1$$, giving $$\\frac{4^p}{6} + q = 1$$.\n- Step 2: These are two simultaneous equations in two unknowns ($$p$$ and $$q$$). Subtracting: $$\\frac{4^p - 2^p}{6} = 1$$, so $$4^p - 2^p = 6$$. Trying $$p = 2$$: $$16 - 4 = 12 \\neq 6$$. Trying $$p = 1$$: $$4 - 2 = 2 \\neq 6$$. Note $$4^p = (2^p)^2$$; let $$u = 2^p$$: $$u^2 - u - 6 = 0$$, so $$u = 3$$ (taking positive root), giving $$2^p = 3$$, so $$p = \\log_2 3$$. Then $$q = -\\frac{2^p}{6} = -\\frac{3}{6} = -\\frac{1}{2}$$.\n\nThe c.d.f. must equal 0 at its lower boundary and 1 at its upper boundary — these are powerful constraints.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "State the formulas for the mean (expected value) and variance of a continuous random variable $$X$$ with p.d.f. $$\\mathrm{f}(x)$$. How do these compare to the discrete case? (2 steps)", "answer": "- Step 1: **Mean**: $$\\mathrm{E}(X) = \\mu = \\int_{-\\infty}^{\\infty} x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. **Variance**: $$\\operatorname{Var}(X) = \\sigma^2 = \\int_{-\\infty}^{\\infty} x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x - \\mu^2$$. The second form (using $$\\mathrm{E}(X^2) - \\mu^2$$) is usually easier to compute.\n- Step 2: These are the continuous analogues of the discrete formulas. Replace $$\\sum$$ with $$\\int$$, and replace the probability mass function $$\\mathrm{P}(X = x)$$ with the p.d.f. $$\\mathrm{f}(x)\\,\\mathrm{d}x$$. The logic is identical: weight each value by its probability (density) and sum/integrate.\n\nThe parallel between discrete (sums) and continuous (integrals) is a deep pattern in probability theory.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{32}(3 + 2x - x^2) & -1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Without doing any integration, how can you immediately write down $$\\mathrm{E}(X)$$? (2 steps)", "answer": "- Step 1: Examine the p.d.f. The function $$3 + 2x - x^2 = -(x^2 - 2x - 3) = -(x-3)(x+1)$$, which is a parabola opening downward with its axis of symmetry at $$x = 1$$. The range $$[-1, 3]$$ is also symmetric about $$x = 1$$.\n- Step 2: Since the p.d.f. is symmetric about $$x = 1$$, the mean equals the centre of symmetry: $$\\mathrm{E}(X) = 1$$. No integration needed! This symmetry shortcut works whenever the p.d.f. is symmetric about a point — the mean equals that point.\n\nSymmetry is a powerful time-saver. Always check for it before computing integrals.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A p.d.f. is piecewise over two intervals. When computing $$\\mathrm{E}(X)$$, what must you do differently compared to a single-interval p.d.f.? (2 steps)", "answer": "- Step 1: You must split the integral into separate parts for each interval. $$\\mathrm{E}(X) = \\int_0^3 x \\cdot \\frac{2}{15}x\\,\\mathrm{d}x + \\int_3^5 x \\cdot \\frac{1}{5}(5-x)\\,\\mathrm{d}x$$. Each piece uses its own formula for $$\\mathrm{f}(x)$$.\n- Step 2: Compute each integral separately and add the results. The same splitting applies for $$\\mathrm{E}(X^2)$$ when computing variance. You cannot integrate across a boundary where the formula for $$\\mathrm{f}(x)$$ changes.\n\nThink of it as computing the \"weighted average\" over each segment separately, then combining.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "If $$X$$ is a continuous random variable and you want the expected value of some function $$g(X)$$, what formula do you use? Give a concrete example with $$g(X) = X^3$$. (2 steps)", "answer": "- Step 1: The general formula is $$\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. You multiply the function $$g(x)$$ by the p.d.f. and integrate.\n- Step 2: For example, if you need the expected volume of a cube with random side length $$X$$, then $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. Crucially, $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$$ in general. You must integrate $$x^3 \\mathrm{f}(x)$$ — you cannot just cube the mean.\n\nThis is a common misconception: $$\\mathrm{E}(g(X)) \\neq g(\\mathrm{E}(X))$$ except when $$g$$ is a *linear* function.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "State the linearity rules for expectation and variance of $$aX + b$$. Then explain *why* the variance rule has $$a^2$$ but no $$b$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(aX + b) = a\\,\\mathrm{E}(X) + b$$. Shifting by $$b$$ shifts the mean by $$b$$; scaling by $$a$$ scales the mean by $$a$$.\n- Step 2: $$\\operatorname{Var}(aX + b) = a^2\\,\\operatorname{Var}(X)$$. Scaling by $$a$$ scales the spread by $$|a|$$, and since variance involves squaring, the factor becomes $$a^2$$.\n- Step 3: The constant $$b$$ disappears from variance because variance measures *spread* (how far values are from the mean), not *location*. Adding a constant shifts every value (and the mean) by the same amount, so the deviations from the mean are unchanged. Only scaling affects spread.\n\nIntuitively: translating a dataset doesn't change how spread out it is; only stretching/compressing does.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "A random variable $$Y$$ has $$\\mathrm{E}(Y) = \\frac{13}{6}$$ and $$\\operatorname{Var}(Y) = \\frac{11}{36}$$. Find $$\\mathrm{E}(2Y - 3)$$ and $$\\operatorname{Var}(2Y - 3)$$ using the linearity rules — no integration needed. (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(2Y - 3) = 2\\,\\mathrm{E}(Y) - 3 = 2 \\times \\frac{13}{6} - 3 = \\frac{13}{3} - 3 = \\frac{13 - 9}{3} = \\frac{4}{3}$$.\n- Step 2: $$\\operatorname{Var}(2Y - 3) = 2^2\\,\\operatorname{Var}(Y) = 4 \\times \\frac{11}{36} = \\frac{44}{36} = \\frac{11}{9}$$. The $$-3$$ vanishes from variance because adding a constant doesn't change spread.\n\nThese rules let you compute expectations and variances of transformed variables instantly, without re-integrating.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Define the mode of a continuous random variable. Is the mode always in the \"middle\" of the distribution? Give a counterexample. (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ for which the p.d.f. $$\\mathrm{f}(x)$$ is a maximum. It is the \"most likely\" region — the point of greatest probability density.\n- Step 2: The mode is *not* always in the middle. For example, if $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$, the mode is at $$x = 1$$ (the right endpoint), not the middle. For a triangular p.d.f. with peak at one end, the mode is at that end. The mode can even be at a boundary, far from the mean or median.\n\nThe mode is purely about where the density is highest — it has no obligation to be central.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "To find the mode of a continuous random variable, you set $$\\mathrm{f}'(x) = 0$$ and solve. What additional checks must you perform to confirm the answer is actually the mode? (2 steps)", "answer": "- Step 1: Check that the solution is within the valid range of $$x$$. If $$\\mathrm{f}'(x) = 0$$ gives a value outside the domain where $$\\mathrm{f}(x) > 0$$, it's not the mode.\n- Step 2: Check that this critical point is a *maximum*, not a minimum. You can verify this by sketching the p.d.f., or by checking that $$\\mathrm{f}''(x) < 0$$ at the critical point. Also check the boundary values — if the p.d.f. is strictly increasing on its domain, the mode is at the upper boundary (even though $$\\mathrm{f}'(x) \\neq 0$$ there).\n\nA common error: finding where $$\\mathrm{f}'(x) = 0$$ and declaring it the mode without checking it's a maximum or checking endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$. Where is the mode? Note that $$\\mathrm{f}'(x) = 2 \\neq 0$$ anywhere. Explain. (2 steps)", "answer": "- Step 1: Since $$\\mathrm{f}'(x) = 2 > 0$$, the p.d.f. is strictly increasing on $$[0, 1]$$. There is no interior critical point.\n- Step 2: The maximum value of $$\\mathrm{f}(x)$$ occurs at the right boundary: $$x = 1$$, where $$\\mathrm{f}(1) = 2$$. So the mode is $$x = 1$$. This shows that the mode can occur at a boundary even when the derivative is never zero.\n\nAlways check boundaries when the p.d.f. is monotonic (strictly increasing or decreasing) on its domain.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Define the median of a continuous random variable in terms of the c.d.f. Why is the median sometimes more informative than the mean? (2 steps)", "answer": "- Step 1: The median $$m$$ satisfies $$\\mathrm{F}(m) = 0.5$$, meaning $$\\mathrm{P}(X \\leq m) = 0.5$$. Half the probability (area under the p.d.f.) lies to the left of $$m$$, and half to the right.\n- Step 2: The median is more robust than the mean for skewed distributions. A long tail on one side pulls the mean toward it, but the median stays at the 50% probability point. For example, in income distributions, the median income better represents the \"typical\" person than the mean, which is inflated by very high earners.\n\nThe median splits the area in half; the mean is the \"balance point\" of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "How do you find the median when the c.d.f. is defined piecewise? What preliminary step saves you from solving the wrong equation? (3 steps)", "answer": "- Step 1: Evaluate $$\\mathrm{F}(x)$$ at each boundary point of the piecewise definition. This tells you the c.d.f. value at the transition between pieces.\n- Step 2: Determine which piece contains $$\\mathrm{F}(x) = 0.5$$ by checking which interval of c.d.f. values contains 0.5. For example, if $$\\mathrm{F}(2) = 0.2$$ and $$\\mathrm{F}(4) = 1$$, then the median lies in the second piece (since $$0.2 < 0.5 < 1$$).\n- Step 3: Set the appropriate piece of $$\\mathrm{F}(x)$$ equal to 0.5 and solve for the median. If you picked the wrong piece, you'd get an answer outside its valid $$x$$-range.\n\nThis boundary-checking step is essential and frequently tested in exams.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "The c.d.f. of $$X$$ is $$\\mathrm{F}(x) = 2x^2 - x^4$$ for $$0 \\leq x \\leq 1$$. Set up the equation for the median and explain why you reject one of the two algebraic solutions. (3 steps)", "answer": "- Step 1: Set $$\\mathrm{F}(m) = 0.5$$: $$2m^2 - m^4 = 0.5$$, which rearranges to $$m^4 - 2m^2 + 0.5 = 0$$, or equivalently $$2m^4 - 4m^2 + 1 = 0$$.\n- Step 2: This is a quadratic in $$m^2$$. Using the quadratic formula: $$m^2 = \\frac{4 \\pm \\sqrt{16 - 8}}{4} = 1 \\pm \\frac{\\sqrt{2}}{2}$$. So $$m^2 \\approx 1.707$$ or $$m^2 \\approx 0.293$$.\n- Step 3: Since $$0 \\leq m \\leq 1$$, we need $$m^2 \\leq 1$$. The solution $$m^2 \\approx 1.707$$ gives $$m \\approx 1.31$$, which is outside the range. The valid solution is $$m^2 \\approx 0.293$$, giving $$m \\approx 0.541$$.\n\nAlways check that your solution lies within the domain of the random variable.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Define the lower quartile $$Q_1$$ and upper quartile $$Q_3$$ in terms of the c.d.f. What is the interquartile range, and what does it measure? (2 steps)", "answer": "- Step 1: The lower quartile $$Q_1$$ satisfies $$\\mathrm{F}(Q_1) = 0.25$$, and the upper quartile $$Q_3$$ satisfies $$\\mathrm{F}(Q_3) = 0.75$$. These are the 25th and 75th percentiles respectively.\n- Step 2: The interquartile range (IQR) is $$Q_3 - Q_1$$. It measures the spread of the middle 50% of the distribution. Like the median, it is robust to outliers and skew — it captures where the \"bulk\" of the data lies, ignoring extreme tails.\n\nThe IQR is to the median what standard deviation is to the mean: a measure of spread that pairs naturally with its corresponding measure of location.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "The $$n$$th percentile $$P_n$$ of a continuous random variable is defined by what equation? If you need the 15th percentile, what equation do you solve? (2 steps)", "answer": "- Step 1: The $$n$$th percentile $$P_n$$ satisfies $$\\mathrm{F}(P_n) = \\frac{n}{100}$$. It is the value below which $$n\\%$$ of the distribution lies.\n- Step 2: For the 15th percentile, solve $$\\ma
