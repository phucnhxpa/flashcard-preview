thrm{F}(P_{15}) = 0.15$$. First determine which piece of the c.d.f. contains the value 0.15 (by checking boundary values), then solve the appropriate equation.\n\nPercentiles generalize quartiles: $$Q_1 = P_{25}$$, median $$= P_{50}$$, $$Q_3 = P_{75}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A p.d.f. has a triangular shape: rising linearly from 0 to some peak, then falling linearly. The mode is at the peak. Is the median above, below, or equal to the mode? Explain using the concept of area balance. (2 steps)", "answer": "- Step 1: The median splits the total area in half. The mode is at the peak (the highest point of the density). For a symmetric triangle, median = mode. But for a skewed triangle (peak not at the midpoint of the base), they differ.\n- Step 2: If the triangle is right-skewed (long tail to the right, peak to the left), the median is to the *right* of the mode, because the thin right tail requires more horizontal distance to accumulate 50% of the area. If left-skewed, the median is to the *left* of the mode.\n\nIn general, for skewed distributions: the mean is pulled furthest toward the tail, the median is between the mode and mean, and the mode stays at the peak.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A student proposes the c.d.f. $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 5 \\\\ \\frac{1}{5}(16x - x^2 - 55) & 5 \\leq x \\leq 10 \\\\ 1 & x > 10 \\end{cases}$$. Explain why this cannot be a valid c.d.f. (2 steps)", "answer": "- Step 1: Check the boundary conditions. $$\\mathrm{F}(5) = \\frac{1}{5}(80 - 25 - 55) = \\frac{1}{5}(0) = 0$$ ✓. $$\\mathrm{F}(10) = \\frac{1}{5}(160 - 100 - 55) = \\frac{1}{5}(5) = 1$$ ✓. So far so good.\n- Step 2: Check that $$\\mathrm{F}(x)$$ is non-decreasing. Differentiate: $$\\mathrm{F}'(x) = \\frac{1}{5}(16 - 2x)$$. This is positive when $$x < 8$$ and *negative* when $$x > 8$$. So $$\\mathrm{F}(x)$$ decreases for $$8 < x \\leq 10$$, meaning the p.d.f. would be negative there. This violates the non-negativity condition.\n\nA valid c.d.f. must be non-decreasing everywhere — if it ever goes down, the implied p.d.f. is negative, which is impossible.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "For a continuous random variable, explain why $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$ in general. When would they be equal? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X^2) = \\int x^2 \\mathrm{f}(x)\\,\\mathrm{d}x$$ is the average of $$x^2$$ weighted by the p.d.f. Meanwhile, $$(\\mathrm{E}(X))^2 = \\left(\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x\\right)^2$$ is the square of the average of $$x$$. By Jensen's inequality, for a convex function like squaring, $$\\mathrm{E}(g(X)) \\geq g(\\mathrm{E}(X))$$, so $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$.\n- Step 2: Equality holds only when $$\\operatorname{Var}(X) = 0$$, i.e., when $$X$$ is a constant (degenerate distribution with all probability at one point). Since $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$, and variance is zero only for a constant, the two are almost always unequal for any non-trivial random variable.\n\nThis is precisely why variance is defined as $$\\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 \\geq 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} kx & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find $$k$$ and then determine whether the mean is closer to 1, 2, or 3 — using only a symmetry/spread argument, no full integration. (2 steps)", "answer": "- Step 1: Find $$k$$: $$\\int_1^3 kx\\,\\mathrm{d}x = k\\left[\\frac{x^2}{2}\\right]_1^3 = k\\left(\\frac{9}{2} - \\frac{1}{2}\\right) = 4k = 1$$, so $$k = \\frac{1}{4}$$.\n- Step 2: The p.d.f. $$\\frac{1}{4}x$$ is increasing on $$[1, 3]$$, so more probability weight is concentrated toward the right (near 3) than the left (near 1). The mean is therefore pulled to the right of the midpoint (2). So the mean is closer to 3 than to 1, but not as extreme as 3. It's between 2 and 3. (Exact answer: $$\\mathrm{E}(X) = \\frac{7}{3} \\approx 2.33$$.)\n\nFor an increasing p.d.f., the mean is above the midpoint; for a decreasing p.d.f., it's below.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "The p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{8}(1 + x^2) & -1 \\leq x \\leq 1 \\\\ 0 & \\text{otherwise} \\end{cases}$$ is symmetric about $$x = 0$$. What are $$\\mathrm{E}(X)$$ and the mode? (2 steps)", "answer": "- Step 1: By symmetry about $$x = 0$$, $$\\mathrm{E}(X) = 0$$. The distribution has equal weight on both sides of zero.\n- Step 2: The p.d.f. $$\\frac{3}{8}(1 + x^2)$$ is minimized when $$x^2$$ is minimized, i.e., at $$x = 0$$ where $$\\mathrm{f}(0) = \\frac{3}{8}$$. It's maximized at the boundaries $$x = \\pm 1$$ where $$\\mathrm{f}(\\pm 1) = \\frac{3}{8}(2) = \\frac{3}{4}$$. So the distribution is bimodal with modes at $$x = -1$$ and $$x = 1$$.\n\nThis is a striking example: the mean is 0, but the modes are at the edges. Symmetry doesn't mean the mode is at the centre.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A student says: \"For a symmetric distribution, the mean, median, and mode are always equal.\" Is this true? Give a counterexample or confirm. (2 steps)", "answer": "- Step 1: This is *almost* true but not always. For a symmetric *unimodal* (single-peaked) continuous distribution, the mean, median, and mode are all at the centre of symmetry. This is the common case (e.g., normal distribution).\n- Step 2: Counterexample: The p.d.f. $$\\mathrm{f}(x) = \\frac{3}{8}(1+x^2)$$ on $$[-1,1]$$ is symmetric about 0, so mean = median = 0. But the modes are at $$x = \\pm 1$$ (bimodal), not at 0. So the mode differs from the mean/median despite symmetry.\n\nSymmetry guarantees mean = median, but the mode depends on the shape of the peak(s).", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A continuous random variable has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}x & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find the c.d.f. using the definite integral method. (3 steps)", "answer": "- Step 1: For $$x < 1$$: $$\\mathrm{F}(x) = 0$$. For $$x > 3$$: $$\\mathrm{F}(x) = 1$$.\n- Step 2: For $$1 \\leq x \\leq 3$$: $$\\mathrm{F}(x) = \\int_1^x \\frac{1}{4}t\\,\\mathrm{d}t = \\left[\\frac{t^2}{8}\\right]_1^x = \\frac{x^2}{8} - \\frac{1}{8}$$.\n- Step 3: Full c.d.f.: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 1 \\\\ \\frac{x^2}{8} - \\frac{1}{8} & 1 \\leq x \\leq 3 \\\\ 1 & x > 3 \\end{cases}$$. Verify: $$\\mathrm{F}(1) = \\frac{1}{8} - \\frac{1}{8} = 0$$ ✓ and $$\\mathrm{F}(3) = \\frac{9}{8} - \\frac{1}{8} = 1$$ ✓.\n\nUsing definite integrals with the lower limit as the start of the range avoids needing to find a constant of integration.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{x \\ln 7} & 1 \\leq x \\leq 7 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Verify this is a valid p.d.f. by checking both conditions, and find the c.d.f. (3 steps)", "answer": "- Step 1: Non-negativity: For $$1 \\leq x \\leq 7$$, $$x > 0$$ and $$\\ln 7 > 0$$, so $$\\mathrm{f}(x) = \\frac{1}{x \\ln 7} > 0$$. ✓\n- Step 2: Total area: $$\\int_1^7 \\frac{1}{x \\ln 7}\\,\\mathrm{d}x = \\frac{1}{\\ln 7}\\left[\\ln x\\right]_1^7 = \\frac{1}{\\ln 7}(\\ln 7 - \\ln 1) = \\frac{\\ln 7}{\\ln 7} = 1$$. ✓\n- Step 3: C.d.f.: $$\\mathrm{F}(x) = \\int_1^x \\frac{1}{t \\ln 7}\\,\\mathrm{d}t = \\frac{\\ln x}{\\ln 7}$$ for $$1 \\leq x \\leq 7$$. Full form: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 1 \\\\ \\frac{\\ln x}{\\ln 7} & 1 \\leq x \\leq 7 \\\\ 1 & x > 7 \\end{cases}$$.\n\nThis is a special distribution where the c.d.f. involves logarithms — it arises from the reciprocal p.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "The lifetime of a light bulb is modelled by $$\\mathrm{f}(t) = 1.25e^{-1.25t}$$ for $$t \\geq 0$$. Find the c.d.f. and then the probability the bulb lasts between 1 and 2 years. (3 steps)", "answer": "- Step 1: C.d.f.: $$\\mathrm{F}(t) = \\int_0^t 1.25e^{-1.25s}\\,\\mathrm{d}s = \\left[-e^{-1.25s}\\right]_0^t = 1 - e^{-1.25t}$$ for $$t \\geq 0$$.\n- Step 2: Probability between 1 and 2 years: $$\\mathrm{P}(1 < T < 2) = \\mathrm{F}(2) - \\mathrm{F}(1) = (1 - e^{-2.5}) - (1 - e^{-1.25}) = e^{-1.25} - e^{-2.5}$$.\n- Step 3: Numerically: $$e^{-1.25} \\approx 0.2865$$ and $$e^{-2.5} \\approx 0.0821$$, so the probability is approximately $$0.204$$.\n\nThis is the exponential distribution — a common model for lifetimes and waiting times.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A p.d.f. involves $$\\sin(\\pi x)$$ on $$[0, 1]$$. What value of $$k$$ makes $$\\mathrm{f}(x) = k\\sin(\\pi x)$$ a valid p.d.f.? (2 steps)", "answer": "- Step 1: Set the total area to 1: $$\\int_0^1 k\\sin(\\pi x)\\,\\mathrm{d}x = 1$$. Compute: $$k\\left[-\\frac{\\cos(\\pi x)}{\\pi}\\right]_0^1 = k\\left(-\\frac{\\cos \\pi}{\\pi} + \\frac{\\cos 0}{\\pi}\\right) = k\\left(\\frac{1}{\\pi} + \\frac{1}{\\pi}\\right) = \\frac{2k}{\\pi}$$.\n- Step 2: Set $$\\frac{2k}{\\pi} = 1$$, so $$k = \\frac{\\pi}{2}$$. Also verify non-negativity: $$\\sin(\\pi x) \\geq 0$$ for $$0 \\leq x \\leq 1$$ ✓.\n\nThe $$\\sin$$ p.d.f. is symmetric about $$x = 0.5$$, so the mean and median are both 0.5 and the mode is at 0.5.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. $$\\mathrm{f}(x)$$, what is the formula for $$\\mathrm{E}(X^2)$$, and how does it relate to variance? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X^2) = \\int_{-\\infty}^{\\infty} x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. This is the expected value of the squared random variable — the mean of the squares.\n- Step 2: Variance is computed as $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$. You compute $$\\mathrm{E}(X^2)$$ by integrating $$x^2\\mathrm{f}(x)$$, then subtract the square of the mean. This is usually easier than integrating $$(x - \\mu)^2\\mathrm{f}(x)$$ directly.\n\nThe formula $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - \\mu^2$$ is the continuous analogue of the discrete shortcut.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A student claims: \"For a continuous random variable, $$\\mathrm{P}(X > a) = 1 - \\mathrm{F}(a)$$.\" Is this correct? Justify using the definition of the c.d.f. (2 steps)", "answer": "- Step 1: Yes, this is correct. By definition, $$\\mathrm{F}(a) = \\mathrm{P}(X \\leq a)$$. Since $$\\mathrm{P}(X \\leq a) + \\mathrm{P}(X > a) = 1$$ (the events are complementary), we get $$\\mathrm{P}(X > a) = 1 - \\mathrm{F}(a)$$.\n- Step 2: Note that for a continuous random variable, $$\\mathrm{P}(X > a) = \\mathrm{P}(X \\geq a)$$ since $$\\mathrm{P}(X = a) = 0$$. So $$1 - \\mathrm{F}(a) = 1 - \\mathrm{P}(X \\leq a) = \\mathrm{P}(X > a) = \\mathrm{P}(X \\geq a)$$.\n\nThis is one of the most useful c.d.f. shortcuts for quickly computing tail probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "The length of telephone calls has p.d.f. $$\\mathrm{f}(t) = \\frac{k}{t^3}$$ for $$t \\geq 1$$. Given that $$\\int_1^{\\infty} \\frac{1}{t^3}\\,\\mathrm{d}t = \\frac{1}{2}$$, find $$k$$ and then $$\\mathrm{P}(T < 3)$$, i.e., the probability a call lasts less than 3 minutes. (3 steps)", "answer": "- Step 1: Total area: $$\\int_1^{\\infty} \\frac{k}{t^3}\\,\\mathrm{d}t = k \\cdot \\frac{1}{2} = 1$$, so $$k = 2$$.\n- Step 2: C.d.f.: $$\\mathrm{F}(t) = \\int_1^t \\frac{2}{s^3}\\,\\mathrm{d}s = 2\\left[-\\frac{1}{2s^2}\\right]_1^t = 1 - \\frac{1}{t^2}$$ for $$t \\geq 1$$.\n- Step 3: $$\\mathrm{P}(T < 3) = \\mathrm{F}(3) = 1 - \\frac{1}{9} = \\frac{8}{9} \\approx 0.889$$. Most calls are short — the distribution is heavily right-skewed.\n\nThis distribution has an infinite upper limit but most probability is concentrated near 1 — a \"heavy tail\" model.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "For the telephone call distribution in Q42 ($$\\mathrm{f}(t) = \\frac{2}{t^3}$$, $$t \\geq 1$$), find the probability that a call lasts more than 20 minutes. Is this likely? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(T > 20) = 1 - \\mathrm{F}(20) = 1 - \\left(1 - \\frac{1}{400}\\right) = \\frac{1}{400} = 0.0025$$.\n- Step 2: This is very unlikely (0.25% chance). The distribution decays as $$t^{-3}$$, so long calls are extremely rare. This makes intuitive sense for a customer service line.\n\nThe rapid decay of the p.d.f. means the tail probability becomes negligible quickly — consistent with real-world call durations.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A student reasons: \"The mode is the most probable value, so $$\\mathrm{P}(X = \\text{mode})$$ must be the largest single probability.\" What's wrong with this reasoning for a continuous random variable? (2 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for *every* value of $$x$$, including the mode. So $$\\mathrm{P}(X = \\text{mode}) = 0$$, the same as for any other value.\n- Step 2: The mode is where the probability *density* is highest, not where the probability mass is highest. It's the point where the p.d.f. curve reaches its peak — meaning values *near* the mode are more likely than values near any other point. The correct interpretation: for a small interval $$\\delta$$ around the mode, $$\\mathrm{P}(\\text{mode} - \\delta < X < \\text{mode} + \\delta)$$ is larger than the same-width interval around any other point.\n\n\"Most probable\" for continuous variables means \"highest density,\" not \"highest point probability.\"", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{10}(3x - x^2) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find the mode by differentiation and confirm it's a maximum. (3 steps)", "answer": "- Step 1: Set $$\\mathrm{f}'(x) = 0$$: $$\\frac{3}{10}(3 - 2x) = 0$$, giving $$x = \\frac{3}{2}$$.\n- Step 2: Check it's a maximum: $$\\mathrm{f}''(x) = \\frac{3}{10}(-2) = -\\frac{3}{5} < 0$$, confirming concavity (maximum). Also, $$\\mathrm{f}\\left(\\frac{3}{2}\\right) = \\frac{3}{10}\\left(\\frac{9}{2} - \\frac{9}{4}\\right) = \\frac{3}{10} \\cdot \\frac{9}{4} = \\frac{27}{40} = 0.675$$, which is greater than $$\\mathrm{f}(0) = 0$$ and $$\\mathrm{f}(2) = \\frac{3}{10}(6-4) = 0.6$$.\n- Step 3: The mode is $$x = \\frac{3}{2} = 1.5$$. This is inside the range $$[0, 2]$$ and is indeed the global maximum of the p.d.f.\n\nAlways verify: (1) the critical point is in range, (2) it's a maximum not a minimum, (3) it beats the boundary values.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{10}x & 0 \\leq x < 2 \\\\ \\frac{1}{4} - \\frac{1}{40}x & 2 \\leq x < 10 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Where is the mode? (Hint: sketch it mentally.) (2 steps)", "answer": "- Step 1: The first piece is linear and increasing (slope $$\\frac{1}{10}$$), reaching $$\\mathrm{f}(2) = \\frac{2}{10} = 0.2$$. The second piece is linear and decreasing (slope $$-\\frac{1}{40}$$), starting at $$\\mathrm{f}(2) = \\frac{1}{4} - \\frac{2}{40} = 0.25 - 0.05 = 0.2$$ and falling to $$\\mathrm{f}(10) = 0$$.\n- Step 2: The function increases to $$x = 2$$, then decreases. The peak is at the junction point $$x = 2$$. So the mode is $$x = 2$$. (Note: $$\\mathrm{f}(x)$$ is continuous here, but the mode can also occur at a junction even if there's a discontinuity.)\n\nFor piecewise-linear p.d.f.s, the mode is typically at a peak or a boundary — sketching is the fastest method.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "A continuous random variable has c.d.f. $$\\mathrm{F}(x) = \\frac{x^2}{100}$$ for $$0 \\leq x \\leq 10$$. Find $$\\operatorname{Var}(X)$$ by first finding $$\\mathrm{E}(X)$$ and $$\\mathrm{E}(X^2)$$. (3 steps)", "answer": "- Step 1: Find the p.d.f.: $$\\mathrm{f}(x) = \\mathrm{F}'(x) = \\frac{2x}{100} = \\frac{x}{50}$$ for $$0 \\leq x \\leq 10$$.\n- Step 2: $$\\mathrm{E}(X) = \\int_0^{10} x \\cdot \\frac{x}{50}\\,\\mathrm{d}x = \\frac{1}{50}\\int_0^{10} x^2\\,\\mathrm{d}x = \\frac{1}{50} \\cdot \\frac{1000}{3} = \\frac{20}{3}$$. And $$\\mathrm{E}(X^2) = \\int_0^{10} x^2 \\cdot \\frac{x}{50}\\,\\mathrm{d}x = \\frac{1}{50} \\cdot \\frac{10000}{4} = 50$$.\n- Step 3: $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 = 50 - \\frac{400}{9} = \\frac{450 - 400}{9} = \\frac{50}{9}$$.\n\nGoing from c.d.f. to p.d.f. (by differentiation) and then computing moments is the standard workflow.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A student wants to find the expected volume of a cube with random side length $$X$$. They compute $$(\\mathrm{E}(X))^3$$. Is this correct? If not, what should they compute? (2 steps)", "answer": "- Step 1: This is incorrect. $$(\\mathrm{E}(X))^3$$ is the cube of the expected side length, not the expected volume. In general, $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$$ because the cubing function is non-linear, and expectation doesn't commute with non-linear transformations.\n- Step 2: The correct computation is $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. This integrates $$x^3$$ weighted by the p.d.f., giving the true average volume. The discrepancy between $$\\mathrm{E}(X^3)$$ and $$(\\mathrm{E}(X))^3$$ is related to the higher moments of the distribution.\n\nOnly for linear functions $$g(X) = aX + b$$ does $$\\mathrm{E}(g(X)) = g(\\mathrm{E}(X))$$ hold.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "For the exponential distribution $$\\mathrm{f}(x) = \\lambda e^{-\\lambda x}$$ ($$x \\geq 0$$), the c.d.f. is $$\\mathrm{F}(x) = 1 - e^{-\\lambda x}$$. Find the median in terms of $$\\lambda$$. (2 steps)", "answer": "- Step 1: Set $$\\mathrm{F}(m) = 0.5$$: $$1 - e^{-\\lambda m} = 0.5$$, so $$e^{-\\lambda m} = 0.5$$.\n- Step 2: Take natural logs: $$-\\lambda m = \\ln(0.5) = -\\ln 2$$, so $$m = \\frac{\\ln 2}{\\lambda}$$. Notice the median is less than the mean $$\\frac{1}{\\lambda}$$ (since $$\\ln 2 \\approx 0.693 < 1$$), reflecting the right-skew of the exponential distribution.\n\nFor right-skewed distributions: mode < median < mean. The exponential distribution exemplifies this ordering.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "The exponential distribution has the \"memoryless property\": $$\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$$. Explain what this means in plain language, using the example of a light bulb's lifetime. (2 steps)", "answer": "- Step 1: In plain language: given that the light bulb has already lasted $$a$$ hours, the probability it lasts another $$b$$ hours is the same as the probability that a brand-new bulb lasts $$b$$ hours. The bulb doesn't \"age\" — its future lifetime distribution is the same as when it was new.\n- Step 2: Mathematically: $$\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)} = \\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$$. The exponential is the *only* continuous distribution with this property, which is why it's used to model \"time until next event\" in Poisson processes.\n\nThis property is both the strength and weakness of the exponential model: it's analytically convenient but unrealistic for things that genuinely wear out.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}, {"question": "A p.d.f. is defined as $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x < 1 \\\\ k(x-1)^2 & 1 \\leq x < 2 \\\\ k(3-x) & 2 \\leq x < 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. When finding $$k$$, how many separate integrals do you need to compute, and what equation do you set up? (2 steps)", "answer": "- Step 1: You need three separate integrals, one for each piece of the p.d.f.: $$\\int_0^1 k\\,\\mathrm{d}x + \\int_1^2 k(x-1)^2\\,\\mathrm{d}x + \\int_2^3 k(3-x)\\,\\mathrm{d}x = 1$$.\n- Step 2: Factor out $$k$$: $$k\\left[\\int_0^1 1\\,\\mathrm{d}x + \\int_1^2 (x-1)^2\\,\\mathrm{d}x + \\int_2^3 (3-x)\\,\\mathrm{d}x\\right] = 1$$. Each integral gives the area of its respective piece. Compute each and solve for $$k$$.\n\nThe total area is the sum of the areas of all pieces — each piece contributes its share to the total probability of 1.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}(4-x) & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find the c.d.f. and then the median. (3 steps)", "answer": "- Step 1: C.d.f. for $$1 \\leq x \\leq 3$$: $$\\mathrm{F}(x) = \\int_1^x \\frac{1}{4}(4-t)\\,\\mathrm{d}t = \\frac{1}{4}\\left[4t - \\frac{t^2}{2}\\right]_1^x = \\frac{1}{4}\\left(4x - \\frac{x^2}{2} - 4 + \\frac{1}{2}\\right) = \\frac{1}{4}\\left(4x - \\frac{x^2}{2} - \\frac{7}{2}\\right)$$.\n- Step 2: Simplify: $$\\mathrm{F}(x) = x - \\frac{x^2}{8} - \\frac{7}{8} = \\frac{8x - x^2 - 7}{8} = \\frac{-(x^2 - 8x + 7)}{8} = \\frac{-(x-1)(x-7)}{8}$$. Verify: $$\\mathrm{F}(1) = 0$$ ✓ and $$\\mathrm{F}(3) = \\frac{-(2)(-4)}{8} = 1$$ ✓.\n- Step 3: Median: set $$\\mathrm{F}(m) = 0.5$$: $$\\frac{8m - m^2 - 7}{8} = \\frac{1}{2}$$, so $$8m - m^2 - 7 = 4$$, giving $$m^2 - 8m + 11 = 0$$. Using the quadratic formula: $$m = \\frac{8 \\pm \\sqrt{64-44}}{2} = \\frac{8 \\pm \\sqrt{20}}{2} = 4 \\pm \\sqrt{5}$$. Since $$1 \\leq m \\leq 3$$, we take $$m = 4 - \\sqrt{5} \\approx 1.76$$.\n\nThe decreasing p.d.f. means the median is to the left of the midpoint (2), as expected.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has $$\\mathrm{f}(x) = \\begin{cases} 2(x-2) & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Without computing, is the mean closer to 2 or 3? (2 steps)", "answer": "- Step 1: The p.d.f. is increasing on $$[2, 3]$$ (from 0 at $$x=2$$ to 2 at $$x=3$$). More probability weight is concentrated near $$x = 3$$ than near $$x = 2$$.\n- Step 2: The mean is therefore pulled toward 3, so it's closer to 3. (Exact: $$\\mathrm{E}(X) = \\frac{8}{3} \\approx 2.67$$, which is closer to 3 than to 2.)\n\nAn increasing p.d.f. always pulls the mean above the midpoint; a decreasing one pulls it below.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "A c.d.f. is $$\\mathrm{F}(x) = 4x^3 - 3x^4$$ for $$0 \\leq x \\leq 1$$. Find the p.d.f. and the mode. (3 steps)", "answer": "- Step 1: p.d.f.: $$\\mathrm{f}(x) = \\mathrm{F}'(x) = 12x^2 - 12x^3 = 12x^2(1-x)$$ for $$0 \\leq x \\leq 1$$.\n- Step 2: Find the mode: set $$\\mathrm{f}'(x) = 0$$: $$24x - 36x^2 = 12x(2 - 3x) = 0$$, giving $$x = 0$$ or $$x = \\frac{2}{3}$$.\n- Step 3: At $$x = 0$$: $$\\mathrm{f}(0) = 0$$ (minimum). At $$x = \\frac{2}{3}$$: $$\\mathrm{f}\\left(\\frac{2}{3}\\right) = 12 \\cdot \\frac{4}{9} \\cdot \\frac{1}{3} = \\frac{48}{27} = \\frac{16}{9} \\approx 1.78$$. At $$x = 1$$: $$\\mathrm{f}(1) = 0$$. The mode is $$x = \\frac{2}{3}$$.\n\nThis is a Beta distribution — the mode is not at 0 or 1 but at the interior maximum.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "A continuous random variable has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{c}{x(3-x)} & 1 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Explain why partial fractions are needed to find $$c$$, and set up (don't fully compute) the integral. (2 steps)", "answer": "- Step 1: The integral $$\\int_1^2 \\frac{c}{x(3-x)}\\,\\mathrm{d}x$$ involves a rational function. To integrate, decompose $$\\frac{1}{x(3-x)}$$ using partial fractions: $$\\frac{1}{x(3-x)} = \\frac{A}{x} + \\frac{B}{3-x}$$. Solving: $$1 = A(3-x) + Bx$$, giving $$A = \\frac{1}{3}$$ and $$B = \\frac{1}{3}$$.\n- Step 2: So the integral becomes $$c \\int_1^2 \\left(\\frac{1}{3x} + \\frac{1}{3(3-x)}\\right)\\,\\mathrm{d}x = \\frac{c}{3}\\left[\\ln x - \\ln(3-x)\\right]_1^2 = \\frac{c}{3}\\left[(\\ln 2 - \\ln 1) - (\\ln 1 - \\ln 2)\\right] = \\frac{c}{3} \\cdot 2\\ln 2 = \\frac{2c\\ln 2}{3}$$. Set equal to 1: $$c = \\frac{3}{2\\ln 2} = \\frac{3}{\\ln 4}$$.\n\nPartial fractions are the standard tool for integrating rational p.d.f.s.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "You are given a p.d.f. with $$\\mathrm{f}(x) = \\begin{cases} \\frac{k}{x+2} & -1 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$$. What integration technique is needed, and what is the resulting form of the c.d.f.? (2 steps)", "answer": "- Step 1: The integral $$\\int \\frac{k}{x+2}\\,\\mathrm{d}x = k\\ln|x+2| + C$$ uses the standard logarithmic integration rule $$\\int \\frac{1}{u}\\,\\mathrm{d}u = \\ln|u|$$.\n- Step 2: The c.d.f. will have the form $$\\mathrm{F}(x) = k\\ln\\left(\\frac{x+2}{1}\\right)$$ for $$-1 \\leq x \\leq 4$$ (after applying boundary conditions). Specifically: $$\\mathrm{F}(x) = k[\\ln(x+2) - \\ln 1] = k\\ln(x+2)$$, with $$k$$ determined by $$\\mathrm{F}(4) = k\\ln 6 = 1$$, so $$k = \\frac{1}{\\ln 6}$$.\n\nWhenever the p.d.f. involves $$\\frac{1}{\\text{linear}}$$, the c.d.f. will involve natural logarithms.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "The delay $$T$$ in flight departure has p.d.f. $$\\mathrm{f}(t) = \\frac{1}{72}(6-t)^2$$ for $$0 \\leq t \\leq 6$$. Without full computation, determine: is the median closer to 0, 3, or 6? (2 steps)", "answer": "- Step 1: The p.d.f. at $$t = 0$$ is $$\\frac{36}{72} = 0.5$$, and at $$t = 6$$ it is 0. The function is decreasing (since $$(6-t)^2$$ decreases as $$t$$ increases from 0 to 6). Most probability weight is concentrated near $$t = 0$$.\n- Step 2: Since the distribution is heavily left-weighted (short delays are most common), the median is closer to 0 than to 6. It will be less than the midpoint (3). (Exact: the median is approximately 1.76.)\n\nFor a rapidly decreasing p.d.f., the median is much closer to the start of the range than the end.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "A student's model gives c.d.f. $$\\mathrm{F}(y) = 13y - 4y^2 - 9$$ for $$1 \\leq y \\leq 2$$. Explain two different ways to show this is invalid. (2 steps)", "answer": "- Step 1: Check boundary values: $$\\mathrm{F}(1) = 13 - 4 - 9 = 0$$ ✓, but $$\\mathrm{F}(2) = 26 - 16 - 9 = 1$$ ✓. Boundaries are fine, so the problem lies elsewhere.\n- Step 2: Check monotonicity: $$\\mathrm{F}'(y) = 13 - 8y$$. This is positive for $$y < \\frac{13}{8} = 1.625$$ but *negative* for $$y > 1.625$$. So the c.d.f. decreases on $$(1.625, 2]$$, meaning the implied p.d.f. is negative there. Alternatively, check a value: $$\\mathrm{F}(1.7) = 13(1.7) - 4(2.89) - 9 = 22.1 - 11.56 - 9 = 1.54 > 1$$. A c.d.f. exceeding 1 is invalid.\n\nA valid c.d.f. must be non-decreasing and stay within $$[0, 1]$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x \\leq 2 \\\\ \\frac{k}{x^2} & 2 < x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Explain why this p.d.f. is discontinuous at $$x = 2$$, and why that's perfectly acceptable. (2 steps)", "answer": "- Step 1: At $$x = 2$$, the first piece gives $$\\mathrm{f}(2) = k$$, while the second piece gives $$\\mathrm{f}(2) = \\frac{k}{4}$$. These are different values (since $$k > 0$$), so the p.d.f. has a jump discontinuity at $$x = 2$$.\n- Step 2: This is perfectly acceptable because the p.d.f. does not need to be continuous. It only needs to be non-negative and integrate to 1. The probability at the exact point $$x = 2$$ is zero anyway ($$\\mathrm{P}(X = 2) = 0$$ for a continuous variable), so the jump doesn't affect any probability calculations.\n\nA p.d.f. can have jumps, gaps, or corners — only the *area* under it matters for probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "Sketch the p.d.f. of a distribution that is symmetrical but where mode $$\\neq$$ median. Is this possible? (2 steps)", "answer": "- Step 1: For a *unimodal* (single-peaked) symmetric distribution, the mode, median, and mean are all equal (at the centre of symmetry). So for mode $$\\neq$$ median, we need a different shape.\n- Step 2: A symmetric *bimodal* distribution works. Imagine a p.d.f. shaped like a \"W\" — two equal peaks with a valley between them. The modes are at the two peaks, but the median is at the centre (by symmetry), which is the *minimum* of the p.d.f., not a mode. For example, $$\\mathrm{f}(x) = \\frac{3}{8}(1 + x^2)$$ on $$[-1, 1]$$ has modes at $$\\pm 1$$ but median at 0.\n\nSymmetry guarantees mean = median, but says nothing about the mode unless the distribution is also unimodal.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$. Find $$\\mathrm{E}(\\ln X)$$, the expected value of the natural logarithm of $$X$$. (2 steps)", "answer": "- Step 1: Use the general formula: $$\\mathrm{E}(\\ln X) = \\int_0^1 (\\ln x) \\cdot 2x\\,\\mathrm{d}x = 2\\int_0^1 x\\ln x\\,\\mathrm{d}x$$.\n- Step 2: Integrate by parts with $$u = \\ln x$$, $$\\mathrm{d}v = x\\,\\mathrm{d}x$$: $$\\int x\\ln x\\,\\mathrm{d}x = \\frac{x^2}{2}\\ln x - \\int \\frac{x^2}{2} \\cdot \\frac{1}{x}\\,\\mathrm{d}x = \\frac{x^2}{2}\\ln x - \\frac{x^2}{4}$$. Evaluating from 0 to 1: at $$x = 1$$: $$0 - \\frac{1}{4} = -\\frac{1}{4}$$. At $$x \\to 0^+$$: $$\\frac{x^2}{2}\\ln x \\to 0$$ (since $$x^2\\ln x \\to 0$$) and $$-\\frac{x^2}{4} \\to 0$$. So the integral is $$-\\frac{1}{4}$$, and $$\\mathrm{E}(\\ln X) = 2 \\times (-\\frac{1}{4}) = -\\frac{1}{2}$$.\n\nThis is negative, as expected: $$\\ln X < 0$$ for $$0 < X < 1$$, so the expected value of the log must be negative.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} ax + b & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$, with $$\\mathrm{E}(X) = \\frac{9}{8}$$. How many equations can you form, and from what conditions, to solve for $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: Two unknowns ($$a$$ and $$b$$) require two equations. From the p.d.f. conditions: (1) Total area = 1: $$\\int_0^2 (ax + b)\\,\\mathrm{d}x = 1$$, giving $$\\left[\\frac{a}{2}x^2 + bx\\right]_0^2 = 2a + 2b = 1$$. (2) The given mean: $$\\int_0^2 x(ax + b)\\,\\mathrm{d}x = \\frac{9}{8}$$, giving $$\\left[\\frac{a}{3}x^3 + \\frac{b}{2}x^2\\right]_0^2 = \\frac{8a}{3} + 2b = \\frac{9}{8}$$.\n- Step 2: Solve the system: From equation 1, $$b = \\frac{1-2a}{2}$$. Substituting into equation 2: $$\\frac{8a}{3} + 2 \\cdot \\frac{1-2a}{2} = \\frac{9}{8}$$, so $$\\frac{8a}{3} + 1 - 2a = \\frac{9}{8}$$, giving $$\\frac{2a}{3} = \\frac{1}{8}$$, so $$a = \\frac{3}{16}$$ and $$b = \\frac{5}{16}$$.\n\nNote: We should also verify $$\\mathrm{f}(x) \\geq 0$$ on $$[0, 2]$$. With $$a = \\frac{3}{16}$$ and $$b = \\frac{5}{16}$$: $$\\mathrm{f}(0) = \\frac{5}{16} > 0$$ and $$\\mathrm{f}(2) = \\frac{11}{16} > 0$$ ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4} & 0 \\leq x < 1 \\\\ \\frac{x^3}{5} & 1 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$. To find the median, which piece should you use? (2 steps)", "answer": "- Step 1: Find the c.d.f. at the boundary $$x = 1$$: $$\\mathrm{F}(1) = \\int_0^1 \\frac{1}{4}\\,\\mathrm{d}x = \\frac{1}{4} = 0.25$$. Since $$0.25 < 0.5$$, the median is not in the first piece.\n- Step 2: Check the second piece: $$\\mathrm{F}(2) = 1$$, and $$\\mathrm{F}(1) = 0.25$$, so $$0.25 < 0.5 < 1$$. The median lies in the second piece ($$1 \\leq x \\leq 2$$). Set $$\\mathrm{F}(m) = 0.5$$ using the c.d.f. formula for the second piece and solve.\n\nAlways evaluate the c.d.f. at piece boundaries to determine which piece contains the target percentile.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "The 90th percentile of a distribution is the value $$P_{90}$$ such that $$\\mathrm{F}(P_{90}) = 0.9$$. If the c.d.f. at the boundary between pieces is 0.75, which piece contains the 90th percentile? (2 steps)", "answer": "- Step 1: Since $$\\mathrm{F}(\\text{boundary}) = 0.75 < 0.9$$, the 90th percentile has not been reached by the end of the first piece.\n- Step 2: Therefore, the 90th percentile lies in the second piece (or later), where the c.d.f. continues to increase from 0.75 toward 1. You would set the c.d.f. formula for the second piece equal to 0.9 and solve.\n\nThe c.d.f. values at boundaries act as \"checkpoints\" telling you where to look for any given percentile.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "For the exponential distribution with rate $$\\lambda$$, the mean is $$\\frac{1}{\\lambda}$$ and the variance is $$\\frac{1}{\\lambda^2}$$. What is the standard deviation, and what does the relationship $$\\text{mean} = \\text{standard deviation}$$ tell you about the shape of the distribution? (2 steps)", "answer": "- Step 1: The standard deviation is $$\\sigma = \\sqrt{\\frac{1}{\\lambda^2}} = \\frac{1}{\\lambda}$$. So the mean equals the standard deviation: $$\\mu = \\sigma$$.\n- Step 2: This means the spread is as large as the typical value itself. The distribution is highly right-skewed — values can range from 0 to very large, with a long right tail. This is characteristic of \"time until event\" distributions where most events happen quickly but some take much longer.\n\nThe equality of mean and standard deviation is a unique signature of the exponential distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} k\\sec^2(\\pi x) & 0 \\leq x \\leq 0.25 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find $$k$$. (Hint: what is $$\\int \\sec^2(\\pi x)\\,\\mathrm{d}x$$?) (2 steps)", "answer": "- Step 1: The antiderivative of $$\\sec^2(\\pi x)$$ is $$\\frac{\\tan(\\pi x)}{\\pi}$$. So $$\\int_0^{0.25} k\\sec^2(\\pi x)\\,\\mathrm{d}x = \\frac{k}{\\pi}\\left[\\tan(\\pi x)\\right]_0^{0.25} = \\frac{k}{\\pi}\\left(\\tan\\frac{\\pi}{4} - \\tan 0\\right) = \\frac{k}{\\pi}(1 - 0) = \\frac{k}{\\pi}$$.\n- Step 2: Set $$\\frac{k}{\\pi} = 1$$, so $$k = \\pi$$. This is a valid p.d.f. since $$\\sec^2(\\pi x) \\geq 1 > 0$$ on $$[0, 0.25]$$.\n\nTrigonometric p.d.f.s appear in directional/angle problems. The key is knowing the standard integral $$\\int \\sec^2 u\\,\\mathrm{d}u = \\tan u$$.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "Conceptual synthesis: For a right-skewed continuous distribution, what is the typical ordering of mode, median, and mean? Explain *why* this ordering holds. (3 steps)", "answer": "- Step 1: The typical ordering is: **mode < median < mean**. The mode is at the peak (left side for right-skewed), the median splits the area in half, and the mean is the balance point.\n- Step 2: The mean is pulled rightward by the long right tail — extreme values in the tail contribute disproportionately to the balance point. The median only cares about counting 50% of the area, so it's less affected by the tail. The mode is at the peak, the most \"popular\" value, unaffected by the tail at all.\n- Step 3: For left-skewed distributions, the ordering reverses: **mean < median < mode**. The long left tail pulls the mean leftward. For symmetric unimodal distributions, all three coincide.\n\nThis ordering is a powerful diagnostic: if you know the skew direction, you can predict the relative positions of mode, median, and mean.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{6}x & 0 \\leq x < 3 \\\\ 2 - \\frac{1}{2}x & 3 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Find the 10th-to-90th percentile range conceptually: first identify which pieces contain $$P_{10}$$ and $$P_{90}$$. (3 steps)", "answer": "- Step 1: Find $$\\mathrm{F}(3)$$: $$\\int_0^3 \\frac{1}{6}x\\,\\mathrm{d}x = \\left[\\frac{x^2}{12}\\right]_0^3 = \\frac{9}{12} = 0.75$$. So 75% of the probability is in the first piece.\n- Step 2: $$P_{10}$$: Since $$\\mathrm{F}(0) = 0$$ and $$\\mathrm{F}(3) = 0.75$$, and $$0 < 0.10 < 0.75$$, the 10th percentile lies in the *first* piece. Solve $$\\frac{m^2}{12} = 0.1$$, giving $$m = \\sqrt{1.2} \\approx 1.095$$.\n- Step 3: $$P_{90}$$: Since $$\\mathrm{F}(3) = 0.75 < 0.9$$, the 90th percentile lies in the *second* piece. Use the c.d.f. for the second piece and set it equal to 0.9 to find $$P_{90}$$.\n\nThe 10th-to-90th percentile range = $$P_{90} - P_{10}$$, which captures the \"middle 80%\" of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "Exercise check: A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{2}(x-1) & 1 \\leq x < 2 \\\\ \\frac{1}{6}(5-x) & 2 \\leq x \\leq 5 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Verify this is valid by checking the total area equals 1 (use geometry: triangle + triangle). (2 steps)", "answer": "- Step 1: First piece: $$\\frac{1}{2}(x-1)$$ on $$[1,2]$$ is a triangle with base 1 and height $$\\mathrm{f}(2) = \\frac{1}{2}$$. Area = $$\\frac{1}{2} \\times 1 \\times \\frac{1}{2} = \\frac{1}{4}$$.\n- Step 2: Second piece: $$\\frac{1}{6}(5-x)$$ on $$[2,5]$$ is a triangle with base 3 and height $$\\mathrm{f}(2) = \\frac{3}{6} = \\frac{1}{2}$$. Area = $$\\frac{1}{2} \\times 3 \\times \\frac{1}{2} = \\frac{3}{4}$$. Total area = $$\\frac{1}{4} + \\frac{3}{4} = 1$$ ✓.\n\nGeometry often beats integration for piecewise-linear p.d.f.s — sketch first, compute areas of simple shapes.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": true}, {"question": "The c.d.f. of $$X$$ is $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 3 \\\\ \\frac{1}{49}(x^2 - 6x + 9) & 3 \\leq x \\leq 10 \\\\ 1 & x > 10 \\end{cases}$$. Find $$\\mathrm{P}(X > 7)$$ and $$\\mathrm{P}(X > 8 \\mid 4 < X < 9)$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X > 7) = 1 - \\mathrm{F}(7) = 1 - \\frac{1}{49}(49 - 42 + 9) = 1 - \\frac{16}{49} = \\frac{33}{49}$$.\n- Step 2: For the conditional probability: $$\\mathrm{P}(X > 8 \\mid 4 < X < 9) = \\frac{\\mathrm{P}(8 < X < 9)}{\\mathrm{P}(4 < X < 9)}$$.\n- Step 3: $$\\mathrm{P}(4 < X < 9) = \\mathrm{F}(9) - \\mathrm{F}(4) = \\frac{1}{49}(81 - 54 + 9) - \\frac{1}{49}(16 - 24 + 9) = \\frac{36}{49} - \\frac{1}{49} = \\frac{35}{49} = \\frac{5}{7}$$. $$\\mathrm{P}(8 < X < 9) = \\mathrm{F}(9) - \\mathrm{F}(8) = \\frac{36}{49} - \\frac{1}{49}(64 - 48 + 9) = \\frac{36}{49} - \\frac{25}{49} = \\frac{11}{49}$$. So the conditional probability is $$\\frac{11/49}{35/49} = \\frac{11}{35}$$.\n\nConditional probabilities with c.d.f.s use the standard formula: divide the probability of the joint event by the probability of the condition.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}], "count": 70}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why can't a probability density function (pdf) $ f(x) $ have negative values? (3 steps)", "answer": "- Step 1: Probabilities must be non-negative. For any interval $ [a, b] $, $ P(a \\leq X \\leq b) = \\int_a^b f(x)\\,dx \\geq 0 $.  \n- Step 2: If $ f(x) < 0 $ on some interval, integrating over that interval would yield a negative probability, which violates the axioms of probability.  \n- Step 3: Thus, $ f(x) \\geq 0 $ for all $ x \\in \\mathbb{R} $ is a necessary condition for a valid pdf.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you find the constant $ k $ for a valid pdf $ f(x) = kx $ on $ 0 \\leq x \\leq 2 $? (3 steps)", "answer": "- Step 1: Use the total area under the pdf: $ \\int_{-\\infty}^\\infty f(x)\\,dx = 1 $.  \n- Step 2: Compute the integral: $ \\int_0^2 kx\\,dx = k \\left[ \\frac{x^2}{2} \\right]_0^2 = 2k $.  \n- Step 3: Solve $ 2k = 1 $ → $ k = \\frac{1}{2} $.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you compute $ P(a < X < b) $ for a continuous random variable with pdf $ f(x) $?", "answer": "- Integrate the pdf over the interval $ [a, b] $:  \n  $$\n  P(a < X < b) = \\int_a^b f(x)\\,dx.\n  $$  \n  This gives the area under the pdf curve between $ a $ and $ b $, representing the probability.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What is the cumulative distribution function (cdf) $ F(x) $, and how is it related to the pdf $ f(x) $? (3 steps)", "answer": "- Step 1: $ F(x) = P(X \\leq x) = \\int_{-\\infty}^x f(t)\\,dt $. It accumulates probability up to $ x $.  \n- Step 2: The pdf is the derivative of the cdf: $ f(x) = \\frac{d}{dx}F(x) $.  \n- Step 3: For any interval $ [a, b] $, $ P(a < X < b) = F(b) - F(a) $.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you find the mean $ \\mu = \\mathbb{E}(X) $ of a continuous random variable with pdf $ f(x) $?", "answer": "- Compute the integral:  \n  $$\n  \\mu = \\mathbb{E}(X) = \\int_{-\\infty}^\\infty x f(x)\\,dx.\n  $$  \n  For a pdf defined on $ [a, b] $, integrate $ x f(x) $ over $ [a, b] $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is the mode of a pdf $ f(x) $ the value of $ x $ where $ f(x) $ is maximized?", "answer": "- The mode is the most probable value of $ X $. Since $ f(x) $ represents the \"density\" of probability, the peak of $ f(x) $ corresponds to the highest concentration of probability, making it the most likely value.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "How do you find the median $ m $ from the cdf $ F(x) $?", "answer": "- Solve $ F(m) = 0.5 $. The median is the value where half the probability lies to the left and half to the right.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is $ P(X = a) = 0 $ for a continuous random variable?", "answer": "- For a continuous variable, the probability is the integral over an interval. The integral from $ a $ to $ a $ is zero:  \n  $$\n  P(X = a) = \\int_a^a f(x)\\,dx = 0.\n  $$  \n  The probability is spread over infinitely many possible values, making the chance of hitting any exact point zero.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you find the variance $ \\text{Var}(X) $ of a continuous random variable? (3 steps)", "answer": "- Step 1: Compute $ \\mathbb{E}(X^2) = \\int_{-\\infty}^\\infty x^2 f(x)\\,dx $.  \n- Step 2: Compute $ \\mu = \\mathbb{E}(X) $.  \n- Step 3: Use the formula:  \n  $$\n  \\text{Var}(X) = \\mathbb{E}(X^2) - \\mu^2.\n  $$", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does a linear transformation $ Y = aX + b $ affect the mean and variance of $ X $? (3 steps)", "answer": "- Step 1: $ \\mathbb{E}(Y) = a\\mathbb{E}(X) + b $. Scaling scales the mean, shifting adds $ b $.  \n- Step 2: $ \\text{Var}(Y) = a^2 \\text{Var}(X) $. Shifting does not affect variance.  \n- Step 3: Example: If $ Y = 2X + 3 $, $ \\mathbb{E}(Y) = 2\\mu + 3 $, $ \\text{Var}(Y) = 4\\sigma^2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you find the interquartile range (IQR) from the cdf?", "answer": "- Step 1: Find the lower quartile $ Q_1 $ where $ F(Q_1) = 0.25 $.  \n- Step 2: Find the upper quartile $ Q_3 $ where $ F(Q_3) = 0.75 $.  \n- Step 3: Compute $ \\text{IQR} = Q_3 - Q_1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why can't the cdf $ F(x) $ be decreasing?", "answer": "- $ F(x) $ is cumulative probability. As $ x $ increases, $ F(x) $ adds more probability mass and must be non-decreasing. A decreasing $ F(x) $ would imply negative probabilities when differentiating to get the pdf.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "How do you derive the pdf from a piecewise cdf? (3 steps)", "answer": "- Step 1: Differentiate each piece of $ F(x) $ with respect to $ x $.  \n- Step 2: Ensure continuity at boundaries (e.g., $ F(x) $ must be smooth).  \n- Step 3: Example: If $ F(x) = \\frac{x^2}{4} $ for $ 0 \\leq x \\leq 2 $, then $ f(x) = \\frac{d}{dx}F(x) = \\frac{x}{2} $.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do you handle integrating a piecewise pdf to find $ \\mathbb{E}(X) $?", "answer": "- Split the integral at the boundaries of each piece:  \n  $$\n  \\mathbb{E}(X) = \\int_{a_1}^{a_2} x f_1(x)\\,dx + \\int_{a_2}^{a_3} x f_2(x)\\,dx + \\cdots.\n  $$  \n  Example: If $ f(x) $ has two pieces, compute each integral separately and sum.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is the median not necessarily the midpoint of a symmetric pdf?", "answer": "- For symmetric distributions, the median equals the mean, which is the midpoint. However, if the pdf is symmetric about a point $ a $, then $ \\text{median} = a $, even if the range isn't symmetric around $ a $. Example: A triangular pdf symmetric about $ a = 1 $ has median $ 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How do you find the 90th percentile $ P_{90} $ from the cdf?", "answer": "- Solve $ F(P_{90}) = 0.9 $. The 90th percentile is the value $ a $ such that 90% of the probability lies to the left of $ a $.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "Why is the mode of a symmetric pdf equal to the mean and median?", "answer": "- In a symmetric pdf, the peak (mode), midpoint (median), and average (mean) all coincide. The symmetry ensures equal weight on both sides, pulling the mean and median to the center.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How do you check if a function $ f(x) $ is a valid pdf? (3 steps)", "answer": "- Step 1: Verify $ f(x) \\geq 0 $ for all $ x \\in \\mathbb{R} $.  \n- Step 2: Check that the total area under $ f(x) $ is 1: $ \\int_{-\\infty}^\\infty f(x)\\,dx = 1 $.  \n- Step 3: Ensure $ f(x) $ is defined piecewise correctly (e.g., zero outside the specified range).", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "How does the pdf of a continuous uniform distribution look?", "answer": "- A constant function over the interval $ [a, b] $:  \n  $$\n  f(x) = \\frac{1}{b - a} \\quad \\text{for } a \\leq x \\leq b.\n  $$  \n  The height $ \\frac{1}{b - a} $ ensures the area under the curve is 1.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How do you find the cdf of a continuous uniform distribution on $ [a, b] $?", "answer": "- For $ a \\leq x \\leq b $:  \n  $$\n  F(x) = \\int_a^x \\frac{1}{b - a}\\,dt = \\frac{x - a}{b - a}.\n  $$  \n  For $ x < a $, $ F(x) = 0 $; for $ x > b $, $ F(x) = 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why must the integral of a probability density function (p.d.f.) over its entire domain equal 1? (3 steps)", "answer": "- Step 1: The total probability for all possible values of a random variable must sum to 1, as per probability axioms.  \n- Step 2: For a continuous random variable, this is expressed as $$\\int_{-\\infty}^{\\infty} f(x) dx = 1$$.  \n- Step 3: This ensures the sample space (all outcomes) is exhaustive and probabilities are normalized.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How to verify if a function $f(x)$ is a valid p.d.f.? (3 steps)", "answer": "- Step 1: Check $f(x) \\geq 0$ for all $x$ in its domain.  \n- Step 2: Ensure the integral over all real numbers equals 1: $$\\int_{-\\infty}^{\\infty} f(x) dx = 1$$.  \n- Step 3: If both conditions hold, it is a valid p.d.f.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Given $f(x) = kx$ for $0 \\leq x \\leq 2$, find $k$. (3 steps)", "answer": "- Step 1: Integrate $kx$ from 0 to 2: $$\\int_0^2 kx dx = k \\left[\\frac{x^2}{2}\\right]_0^2 = 2k$$.  \n- Step 2: Set equal to 1: $2k = 1$.  \n- Step 3: Solve for $k$: $k = \\frac{1}{2}$.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How to derive the cumulative distribution function (c.d.f.) from a p.d.f.? (3 steps)", "answer": "- Step 1: Integrate the p.d.f. from the lower bound to $x$: $$F(x) = \\int_{-\\infty}^x f(t) dt$$.  \n- Step 2: For piecewise p.d.f.s, integrate each segment separately, ensuring continuity at boundaries.  \n- Step 3: Define $F(x)$ for all $x$, with $F(x) = 0$ for $x < a$ and $F(x) = 1$ for $x > b$.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How to calculate $E(X)$ for a continuous random variable with p.d.f. $f(x)$? (3 steps)", "answer": "- Step 1: Compute $$E(X) = \\int_{-\\infty}^{\\infty} x f(x) dx$$.  \n- Step 2: For piecewise functions, split the integral into intervals where $f(x)$ is defined.  \n- Step 3: Evaluate each integral and sum results.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is the mode of a p.d.f. found by maximizing $f(x)$? (2 steps)", "answer": "- Step 1: The mode is the value of $x$ where $f(x)$ is maximum, indicating the highest probability density.  \n- Step 2: Take derivative $f'(x)$, solve $f'(x) = 0$, and verify maxima using second derivative or boundary checks.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How to find the median of a continuous random variable using the c.d.f.? (2 steps)", "answer": "- Step 1: Solve $F(m) = 0.5$ for $m$, where $F(x)$ is the c.d.f.  \n- Step 2: The solution $m$ divides the distribution into two equal probability halves.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does the c.d.f. relate to the p.d.f. via differentiation? (2 steps)", "answer": "- Step 1: By the Fundamental Theorem of Calculus, the derivative of the c.d.f. $F(x)$ is the p.d.f.: $$f(x) = \\frac{d}{dx} F(x)$$.  \n- Step 2: This implies $F(x)$ is the antiderivative of $f(x)$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How to calculate the variance of a continuous random variable? (3 steps)", "answer": "- Step 1: Compute $E(X^2) = \\int_{-\\infty}^{\\infty} x^2 f(x) dx$.  \n- Step 2: Use $ \\text{Var}(X) = E(X^2) - [E(X)]^2 $.  \n- Step 3: For piecewise functions, split integrals appropriately.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How to find the 90th percentile of a distribution? (2 steps)", "answer": "- Step 1: Solve $F(P_{90}) = 0.90$, where $P_{90}$ is the 90th percentile.  \n- Step 2: The solution $P_{90}$ satisfies $P(X \\leq P_{90}) = 0.90$.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why can't a function with negative values be a valid p.d.f.? (2 steps)", "answer": "- Step 1: The p.d.f. must satisfy $f(x) \\geq 0$ for all $x$, as probabilities cannot be negative.  \n- Step 2: Any negative value in $f(x)$ violates this condition, disqualifying it as a p.d.f.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How to handle piecewise p.d.f.s when computing the c.d.f.? (3 steps)", "answer": "- Step 1: Integrate each piece separately.  \n- Step 2: Add previous area to the next segment's integral to maintain continuity.  \n- Step 3: Combine results into a piecewise c.d.f. with defined intervals.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How to find $P(a < X < b)$ using the p.d.f. and c.d.f.? (2 steps)", "answer": "- Step 1: Using the p.d.f.: $$P(a < X < b) = \\int_a^b f(x) dx$$.  \n- Step 2: Using the c.d.f.: $$P(a < X < b) = F(b) - F(a)$$.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why is the probability at a single point $P(X = c) = 0$ for a continuous variable? (2 steps)", "answer": "- Step 1: Continuity implies infinitely many possible values, making the probability of any exact value infinitesimally small.  \n- Step 2: $P(X = c) = \\int_c^c f(x) dx = 0$.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How to find the interquartile range (IQR) using the c.d.f.? (3 steps)", "answer": "- Step 1: Find $Q_1$ such that $F(Q_1) = 0.25$.  \n- Step 2: Find $Q_3$ such that $F(Q_3) = 0.75$.  \n- Step 3: Calculate $IQR = Q_3 - Q_1$.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How does the median relate to the mean in a symmetric distribution? (2 steps)", "answer": "- Step 1: In a symmetric distribution, the median equals the mean ($m = \\mu$).  \n- Step 2: This symmetry implies the distribution balances at its center.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How to derive the c.d.f. for $f(x) = \\frac{3}{16}(4 - x^2)$ on $-2 \\leq x \\leq 2$? (3 steps)", "answer": "- Step 1: Integrate: $$F(x) = \\int_{-2}^x \\frac{3}{16}(4 - t^2) dt$$.  \n- Step 2: Compute: $$F(x) = \\frac{3}{16}\\left[4t - \\frac{t^3}{3}\\right]_{-2}^x = \\frac{3}{16}\\left(4x - \\frac{x^3}{3} + \\frac{16}{3}\\right)$$.  \n- Step 3: Define $F(x) = 0$ for $x < -2$ and $F(x) = 1$ for $x > 2$.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How to find the mode of $f(x) = 12x^2(1 - x)$ on $0 \\leq x \\leq 1$? (3 steps)", "answer": "- Step 1: Differentiate: $f'(x) = 24x - 36x^2$.  \n- Step 2: Solve $24x - 36x^2 = 0 \\rightarrow x = 0$ or $x = \\frac{2}{3}$.  \n- Step 3: Confirm maximum at $x = \\frac{2}{3}$ (second derivative test or endpoint comparison).", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "How to calculate $P(X > \\mu)$ for a given p.d.f.? (3 steps)", "answer": "- Step 1: Compute mean $\\mu = E(X)$.  \n- Step 2: Find $P(X > \\mu) = 1 - F(\\mu)$.  \n- Step 3: Use the c.d.f. or integrate $f(x)$ from $\\mu$ to the upper bound.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "How to handle improper integrals when normalizing a p.d.f.? (2 steps)", "answer": "- Step 1: For $f(x) = ke^{-x}$ on $x \\geq 0$, integrate: $$\\int_0^\\infty ke^{-x} dx = 1$$.  \n- Step 2: Solve: $k = 1$ since the integral converges to 1.  \n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Continuous random variable** | Takes any value in an interval; probability at a point is 0. |\n| **Probability density function (p.d.f.)** | $f(x)$ where $P(a < X < b) = \\int_a^b f(x) dx$. |\n| **Cumulative distribution function (c.d.f.)** | $F(x) = P(X \\leq x) = \\int_{-\\infty}^x f(t) dt$. |\n| **Mode** | Value of $x$ where $f(x)$ is maximized. |\n| **Median** | Value $m$ where $P(X \\leq m) = 0.5$. |\n| **Variance** | $\\text{Var}(X) = E(X^2) - [E(X)]^2$. |\n| **Percentile** | $n$th percentile $P_n$ satisfies $P(X \\leq P_n) = \\frac{n}{100}$. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| $$\\int_{-\\infty}^{\\infty} f(x) dx$$ | $$= 1$$ | Total probability. |\n| $$F(x)$$ | $$= \\int_{-\\infty}^x f(t) dt$$ | C.d.f. definition. |\n| $$f(x)$$ | $$= \\frac{d}{dx} F(x)$$ | P.d.f. from c.d.f. |\n| $$E(X)$$ | $$= \\int_{-\\infty}^{\\infty} x f(x) dx$$ | Expected value. |\n| $$\\text{Var}(X)$$ | $$= \\int_{-\\infty}^{\\infty} x^2 f(x) dx - \\mu^2$$ | Variance formula. |\n| $$P(a < X < b)$$ | $$= F(b) - F(a)$$ | Probability via c.d.f. |\n| $$\\text{IQR}$$ | $$= Q_3 - Q_1$$ | Interquartile range. |\n```", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A function is defined as $\\mathrm{f}(x) = \\begin{cases} 2x+1 & 0 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$. Explain why this cannot be a valid probability density function, and state the two conditions that any valid p.d.f. must satisfy. (2 steps)", "answer": "- Step 1: Check the non-negativity condition. While $\\mathrm{f}(x) \\geq 0$ for all $x$ in the given range (since $2x+1 \\geq 1 > 0$ when $x \\geq 0$), we must also verify the integral equals 1.\n- Step 2: Compute the total area: $\\int_0^3 (2x+1)\\,dx = [x^2 + x]_0^3 = 9 + 3 = 12$. Since this equals 12 (not 1), the function cannot be a valid p.d.f.\n\nThe two conditions for a valid p.d.f. are: (1) $\\mathrm{f}(x) \\geq 0$ for all $x \\in \\mathbb{R}$, and (2) $\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,dx = 1$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "For a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$, write down the formula for $\\mathrm{P}(a < X < b)$. Does it matter whether you use strict inequalities ($<$) or non-strict inequalities ($\\leq$)? Explain why or why not. (2 steps)", "answer": "- Step 1: The probability is given by the definite integral $\\mathrm{P}(a < X < b) = \\int_a^b \\mathrm{f}(x)\\,dx$, which represents the area under the p.d.f. curve between $a$ and $b$.\n+ For a constant $c$, $\\mathrm{P}(X = c) = \\int_c^c \\mathrm{f}(x)\\,dx = 0$ for any continuous distribution.\n- Step 2: Therefore, it does NOT matter whether you use strict or non-strict inequalities: $\\mathrm{P}(a < X < b) = \\mathrm{P}(a \\leq X < b) = \\mathrm{P}(a < X \\leq b) = \\mathrm{P}(a \\leq X \\leq b)$. All four expressions give the same value because the probability of exactly $a$ or $b$ is zero.\n\nThis is a key property that differs from discrete distributions where $\\mathrm{P}(X = a)$ and $\\mathrm{P}(X \\leq a)$ can be very different.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "The random variable $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} k(4x - x^2) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the value of $k$ and explain the method. (4 steps)", "answer": "- Step 1: Since this is a valid p.d.f., the total area under the curve must equal 1: $\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,dx = 1$.\n- Step 2: Since $\\mathrm{f}(x) = 0$ outside $[2, 4]$, we only integrate over this interval: $\\int_2^4 k(4x - x^2)\\,dx = 1$.\n- Step 3: Compute the integral: $k\\int_2^4 (4x - x^2)\\,dx = k[2x^2 - \\frac{x^3}{3}]_2^4 = k\\left((32 - \\frac{64}{3}) - (8 - \\frac{8}{3})\\right) = k\\left(\\frac{16}{3}\\right)$.\n- Step 4: Set equal to 1 and solve: $k \\cdot \\frac{16}{3} = 1$, so $k = \\frac{3}{16}$.\n\nThe method: integrate the function over its non-zero region and set equal to 1.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A continuous random variable $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} k & 1 < x < 2 \\\\ k(x-1) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the value of $k$ using two different methods and explain both. (3 steps)", "answer": "- Step 1: Method 1 - Integration. The total area must equal 1: $\\int_1^2 k\\,dx + \\int_2^4 k(x-1)\\,dx = 1$. Computing: $k[x]_1^2 + k[\\frac{x^2}{2} - x]_2^4 = k + k((8-4) - (2-2)) = k + 4k = 5k$. So $5k = 1$, giving $k = \\frac{1}{5}$.\n- Step 2: Method 2 - Geometric approach. The p.d.f. consists of a rectangle (width 1, height $k$) plus a triangle/trapezium (base from 2 to 4, with heights $k$ at $x=2$ and $3k$ at $x=4$).\n- Step 3: Area = rectangle ($1 \\times k = k$) + triangle ($\\frac{1}{2} \\times 2 \\times (k + 3k) = 4k$) = $5k$. Setting $5k = 1$ gives $k = \\frac{1}{5}$.\n\nBoth methods yield the same answer. The geometric method is faster when the p.d.f. consists of simple shapes.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "Given $\\mathrm{P}(2.5 < X < 3)$ for the p.d.f. $\\mathrm{f}(x) = \\frac{3}{16}(4x - x^2)$ defined on $[2, 4]$, calculate this probability. Explain why you can use either the p.d.f. directly or the c.d.f. to find this probability. (3 steps)", "answer": "- Step 1: Using the p.d.f.: $\\mathrm{P}(2.5 < X < 3) = \\int_{2.5}^3 \\frac{3}{16}(4x - x^2)\\,dx = \\frac{3}{16}[2x^2 - \\frac{x^3}{3}]_{2.5}^3$.\n- Step 2: Evaluate: $\\frac{3}{16}\\left((18 - 9) - (12.5 - \\frac{15.625}{3})\\right) = \\frac{3}{16}\\left(9 - 12.5 + 5.2083\\right) = \\frac{3}{16} \\times 1.7083 \\approx 0.320$.\n- Step 3: Alternatively, using the c.d.f.: $\\mathrm{P}(2.5 < X < 3) = \\mathrm{F}(3) - \\mathrm{F}(2.5)$. Both methods give the same answer because the c.d.f. is defined as $\\mathrm{F}(x) = \\int_{-\\infty}^x \\mathrm{f}(t)\\,dt$, so the Fundamental Theorem of Calculus ensures $\\frac{d}{dx}\\mathrm{F}(x) = \\mathrm{f}(x)$.\n\nThe key insight: The c.d.f. is just the accumulated probability up to $x$, so subtracting two c.d.f. values gives the probability of being in an interval.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Define the cumulative distribution function (c.d.f.) of a continuous random variable $X$. How is it related to the probability density function (p.d.f.)? (2 steps)", "answer": "- Step 1: The cumulative distribution function $\\mathrm{F}(x)$ is defined as $\\mathrm{F}(x) = \\mathrm{P}(X \\leq x)$, representing the probability that the random variable takes a value less than or equal to $x$. Geometrically, this is the area under the p.d.f. to the left of $x$.\n- Step 2: The two functions are related by: $\\mathrm{F}(x) = \\int_{-\\infty}^x \\mathrm{f}(t)\\,dt$ and conversely $\\mathrm{f}(x) = \\frac{d}{dx}\\mathrm{F}(x)$ (where the derivative exists). The p.d.f. is the rate of change of accumulated probability.\n\nThe p.d.f. and c.d.f. are linked by calculus: integration builds the c.d.f. from the p.d.f., and differentiation recovers the p.d.f. from the c.d.f.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Find the c.d.f. $\\mathrm{F}(x)$ for the p.d.f. $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}x & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$. Specify it fully for all $x \\in \\mathbb{R}$. (3 steps)", "answer": "- Step 1: For $x < 1$, the p.d.f. is 0, so no probability has accumulated: $\\mathrm{F}(x) = 0$.\n- Step 2: For $1 \\leq x \\leq 3$, integrate the p.d.f. from 1 to $x$: $\\mathrm{F}(x) = \\int_1^x \\frac{1}{4}t\\,dt = [\\frac{t^2}{8}]_1^x = \\frac{x^2}{8} - \\frac{1}{8}$.\n- Step 3: For $x > 3$, all probability has accumulated (total area = 1), so $\\mathrm{F}(x) = 1$.\n\nThe full c.d.f. is: $\\mathrm{F}(x) = \\begin{cases} 0 & x < 1 \\\\ \\frac{x^2}{8} - \\frac{1}{8} & 1 \\leq x \\leq 3 \\\\ 1 & x > 3 \\end{cases}$\n\nAlways specify the c.d.f. over all real numbers.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "The random variable $X$ has c.d.f. $\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{1}{5}x + \\frac{3}{20}x^2 & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$. Find the p.d.f. $\\mathrm{f}(x)$. (3 steps)", "answer": "- Step 1: The p.d.f. is the derivative of the c.d.f.: $\\mathrm{f}(x) = \\frac{d}{dx}\\mathrm{F}(x)$.\n- Step 2: Differentiate each piece: For $0 \\leq x \\leq 2$, $\\mathrm{f}(x) = \\frac{d}{dx}(\\frac{1}{5}x + \\frac{3}{20}x^2) = \\frac{1}{5} + \\frac{3}{10}x$.\n- Step 3: For $x < 0$ and $x > 2$, the c.d.f. is constant (0 and 1 respectively), so the derivative is 0.\n\nThe p.d.f. is: $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} + \\frac{3}{10}x & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$\n\nNote: At boundaries where the c.d.f. formula changes, we can define $\\mathrm{f}(x) = 0$ or use either formula since it doesn't affect probabilities (the probability at a single point is zero).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "The p.d.f. is defined piecewise as $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} & 1 < x < 2 \\\\ \\frac{1}{5}(x-1) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the c.d.f. $\\mathrm{F}(x)$ for all $x$. (4 steps)", "answer": "- Step 1: For $x \\leq 1$, $\\mathrm{F}(x) = 0$.\n- Step 2: For $1 < x < 2$, we integrate the constant $\\frac{1}{5}$: $\\mathrm{F}(x) = \\int_1^x \\frac{1}{5}\\,dt = \\frac{x}{5} - \\frac{1}{5}$. At $x = 2$, $\\mathrm{F}(2) = \\frac{1}{5}$.\n- Step 3: For $2 \\leq x \\leq 4$, we add the probability from the first section ($\\mathrm{F}(2) = \\frac{1}{5}$) to the integral from 2 to $x$: $\\mathrm{F}(x) = \\frac{1}{5} + \\int_2^x \\frac{1}{5}(t-1)\\,dt = \\frac{1}{5} + [\\frac{t^2}{10} - \\frac{t}{5}]_2^x = \\frac{x^2}{10} - \\frac{x}{5} + \\frac{1}{5}$.\n- Step 4: For $x > 4$, $\\mathrm{F}(x) = 1$.\n\nThe c.d.f. is continuous at the boundaries: at $x=2$, $\\frac{2}{5} - \\frac{2}{5} + \\frac{1}{5} = \\frac{1}{5}$, matching the left-hand value.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Explain why $\\mathrm{P}(X = a) = 0$ for any continuous random variable $X$ and specific value $a$. Then find $\\mathrm{P}(X \\leq 1.5)$ and $\\mathrm{P}(0.5 \\leq X \\leq 1.5)$ given the c.d.f. from the previous question. (3 steps)", "answer": "- Step 1: For a continuous distribution, the probability of any single point is zero because $\\mathrm{P}(X = a) = \\int_a^a \\mathrm{f}(x)\\,dx = 0$. This is a fundamental difference from discrete distributions.\n- Step 2: Using the c.d.f., $\\mathrm{P}(X \\leq 1.5) = \\mathrm{F}(1.5)$. Since $1.5$ is in the second region ($1 < x < 2$), $\\mathrm{F}(1.5) = \\frac{1}{5}(1.5) - \\frac{1}{5} = 0.3 - 0.2 = 0.1$. Wait, let me recalculate using the correct formula: $\\mathrm{F}(1.5) = \\frac{1.5}{5} - \\frac{1}{5} = 0.3 - 0.2 = 0.1$? Actually, from the earlier calculation, this seems off. Let me verify: for $1 < x < 2$, $\\mathrm{F}(x) = \\frac{x}{5} - \\frac{1}{5}$, so $\\mathrm{F}(1.5) = 0.3 - 0.2 = 0.1$. This seems too small for a probability. Let me reconsider—actually this seems incorrect. Using the integration approach for the specific p.d.f. would be more reliable for verification.\n\nActually, for $\\mathrm{P}(0.5 \\leq X \\leq 1.5)$: Since $0.5 < 1$, this equals $\\mathrm{F}(1.5) - \\mathrm{F}(0.5) = 0.1 - 0 = 0.1$. This still seems incorrect. Let me verify with integration: Actually, for the p.d.f. $\\frac{1}{5}$ on $(1,2)$, the probability of being in $(0.5, 1.5)$ is just the area from 1 to 1.5, which is $0.5 \\times \\frac{1}{5} = 0.1$. Yes, this is correct!\n\nThe key insight: For continuous distributions, $\\mathrm{P}(X = a) = 0$, so $\\mathrm{P}(X \\leq a) = \\mathrm{P}(X < a)$.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Write down the formulas for the mean $\\mathrm{E}(X)$ and variance $\\operatorname{Var}(X)$ of a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$. Explain how these compare to the discrete case. (2 steps)", "answer": "- Step 1: For a continuous random variable:\n$$\\mathrm{E}(X) = \\mu = \\int_{-\\infty}^{\\infty} x\\mathrm{f}(x)\\,dx$$\n$$\\operatorname{Var}(X) = \\sigma^2 = \\int_{-\\infty}^{\\infty} (x - \\mu)^2\\mathrm{f}(x)\\,dx = \\int_{-\\infty}^{\\infty} x^2\\mathrm{f}(x)\\,dx - \\mu^2$$\n\n- Step 2: These are the continuous analogues of the discrete formulas, where the summation $\\sum$ is replaced by the integral $\\int$, and the probability mass function $p(x)$ is replaced by the probability density function $\\mathrm{f}(x)$.\n\nThe intuition: Just as discrete expectation is a weighted average (sum of each value times its probability), continuous expectation is the \"weighted average\" where we integrate each $x$ value weighted by its density.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "For the p.d.f. $\\mathrm{f}(y) = \\begin{cases} \\frac{1}{4}y & 1 \\leq y \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$, find $\\mathrm{E}(Y)$ and $\\operatorname{Var}(Y)$. (4 steps)", "answer": "- Step 1: Find $\\mathrm{E}(Y) = \\int_1^3 y \\cdot \\frac{1}{4}y\\,dy = \\int_1^3 \\frac{1}{4}y^2\\,dy = [\\frac{1}{12}y^3]_1^3 = \\frac{27}{12} - \\frac{1}{12} = \\frac{26}{12} = \\frac{13}{6}$.\n- Step 2: Compute $\\mathrm{E}(Y^2) = \\int_1^3 y^2 \\cdot \\frac{1}{4}y\\,dy = \\int_1^3 \\frac{1}{4}y^3\\,dy = [\\frac{1}{16}y^4]_1^3 = \\frac{81}{16} - \\frac{1}{16} = \\frac{80}{16} = 5$.\n- Step 3: Use the formula $\\operatorname{Var}(Y) = \\mathrm{E}(Y^2) - (\\mathrm{E}(Y))^2 = 5 - (\\frac{13}{6})^2 = 5 - \\frac{169}{36} = \\frac{180}{36} - \\frac{169}{36} = \\frac{11}{36}$.\n- Step 4: Alternatively, use the definition $\\operatorname{Var}(Y) = \\int_1^3 (y - \\frac{13}{6})^2 \\cdot \\frac{1}{4}y\\,dy$, which gives the same answer after lengthy calculation.\n\nThe variance is $\\frac{11}{36}$, and the standard deviation is $\\sqrt{\\frac{11}{36}} = \\frac{\\sqrt{11}}{6}$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "If $\\mathrm{E}(X) = \\frac{13}{6}$ and $\\operatorname{Var}(X) = \\frac{11}{36}$ for the previous p.d.f., find $\\mathrm{E}(2X - 3)$ and $\\operatorname{Var}(2X - 3)$. Explain the general formulas used. (2 steps)", "answer": "- Step 1: For expectation of a linear function: $\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$. So $\\mathrm{E}(2X - 3) = 2 \\times \\frac{13}{6} - 3 = \\frac{26}{6} - 3 = \\frac{26}{6} - \\frac{18}{6} = \\frac{8}{6} = \\frac{4}{3}$.\n- Step 2: For variance of a linear function: $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$. The constant $b$ shifts the distribution but doesn't affect spread. So $\\operatorname{Var}(2X - 3) = 2^2 \\times \\frac{11}{36} = 4 \\times \\frac{11}{36} = \\frac{44}{36} = \\frac{11}{9}$.\n\nThe general rules: $\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$ and $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$. The $b$ term affects only the mean, not the variance.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For a continuous random variable $X$, prove that $\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x)\\mathrm{f}(x)\\,dx$ for any function $g(X)$. How does this relate to finding $\\mathrm{E}(X^2)$? (2 steps)", "answer": "- Step 1: This is the continuous analogue of the discrete formula $\\mathrm{E}(g(X)) = \\sum g(x)p(x)$. The intuition is that we \"weight\" each value of $g(x)$ by the probability density at that point.\n- Step 2: For finding $\\mathrm{E}(X^2)$, we set $g(X) = X^2$, giving $\\mathrm{E}(X^2) = \\int_{-\\infty}^{\\infty} x^2 \\mathrm{f}(x)\\,dx$. This is used in the variance formula $\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$.\n\nThis generalized expectation formula allows us to find the expected value of any function of $X$, not just linear functions.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "The p.d.f. of $X$ is given by $\\mathrm{f}(x) = \\begin{cases} \\frac{3}{32}(3 + 2x - x^2) & -1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$. Without performing integration, explain how to find $\\mathrm{E}(X)$. Then find it. (3 steps)", "answer": "- Step 1: The p.d.f. appears to be symmetric. Let's check: substitute $x = 1 + u$, then the expression becomes $\\frac{3}{32}(3 + 2(1+u) - (1+u)^2) = \\frac{3}{32}(3 + 2 + 2u - 1 - 2u - u^2) = \\frac{3}{32}(4 - u^2)$. This is symmetric about $u = 0$, i.e., $x = 1$.\n- Step 2: Since the p.d.f. is symmetric about $x = 1$, the mean must equal the center of symmetry: $\\mathrm{E}(X) = 1$.\n- Step 3: You could verify by computing $\\int_{-1}^3 x \\cdot \\frac{3}{32}(3 + 2x - x^2)\\,dx$, but symmetry gives the answer immediately.\n\nFor symmetric distributions, the mean equals the center of symmetry. This is a powerful shortcut when applicable.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Define the mode of a continuous random variable. For the p.d.f. $\\mathrm{f}(x) = 12x^2(1-x)$ for $0 \\leq x \\leq 1$, find the mode. Explain the method. (3 steps)", "answer": "- Step 1: The mode is the value of $x$ where the p.d.f. attains its maximum value—the point of highest probability density.\n- Step 2: First, sketch the p.d.f. to understand its shape. The function $12x^2(1-x)$ is a cubic that rises from 0, reaches a peak, then falls back to 0 at $x = 1$.\n- Step 3: Find the critical point by differentiating: $\\frac{d}{dx}(12x^2 - 12x^3) = 24x - 36x^2 = 12x(2 - 3x) = 0$. This gives $x = 0$ or $x = \\frac{2}{3}$. At $x = 0$, the function equals 0; at $x = \\frac{2}{3}$, it equals $12 \\times \\frac{4}{9} \\times \\frac{1}{3} = \\frac{16}{9} > 0$. So the mode is $x = \\frac{2}{3}$.\n\nThe mode need not be at the \"middle\" of the distribution—it simply marks where density is highest.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A continuous p.d.f. is given by $\\mathrm{f}(x) = 2x$ for $0 \\leq x \\leq 1$. What is its mode? Explain why this illustrates an important point about modes. (2 steps)", "answer": "- Step 1: The function $2x$ is strictly increasing on $[0, 1]$, so its maximum occurs at the right endpoint $x = 1$. Thus the mode is $x = 1$.\n- Step 2: This illustrates that the mode can occur at a boundary of the domain, not necessarily in the interior. Some distributions may also have multiple modes (multimodal), or no unique mode (uniform distribution has no single mode).\n\nThe mode is simply where the density is highest—it doesn't have to be \"central\" or even in the middle of the support.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "Define the median of a continuous random variable. If $X$ has c.d.f. $\\mathrm{F}(x) = 2x^2 - terquartile range (IQR) measures the spread of the middle 50% of the distribution.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What is the 15th percentile? If $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{10}x & 0 \\leq x < 2 \\\\ \\frac{1}{4} - \\frac{1}{40}x & 2 \\leq x < 10 \\end{cases}$, find the 15th percentile. (4 steps)", "answer": "- Step 1: The $n$th percentile $P_n$ is the value $a$ such that $\\mathrm{F}(a) = \\frac{n}{100}$. So the 15th percentile $P_{15}$ satisfies $\\mathrm{F}(a) = 0.15$.\n- Step 2: First find the c.d.f. For $0 \\leq x < 2$: $\\mathrm{F}(x) = \\int_0^x \\frac{1}{10}t\\,dt = \\frac{x^2}{20}$. At $x = 2$, $\\mathrm{F}(2) = \\frac{4}{20} = 0.2$.\n- Step 3: Since $0.15 < 0.2$, $P_{15}$ lies in $0 \\leq x < 2$. Solve $\\frac{a^2}{20} = 0.15$, so $a^2 = 3$, giving $a = \\sqrt{3} \\approx 1.41$ (taking the positive root since we're in the valid range).\n- Step 4: Verify: the 15th percentile is approximately 1.41 minutes (or whatever the unit is).\n\nPercentiles divide the distribution into hundredths—the median is the 50th percentile, quartiles are the 25th and 75th percentiles.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A p.d.f. is defined as $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{8}x & 0 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the median of $X$ and explain why it's different from the mean. (3 steps)", "answer": "- Step 1: Find the c.d.f.: for $0 \\leq x \\leq 4$, $\\mathrm{F}(x) = \\int_0^x \\frac{1}{8}t\\,dt = \\frac{x^2}{16}$. At $x = 4$, $\\mathrm{F}(4) = 1$, so this is valid.\n- Step 2: Find the median $m$ where $\\mathrm{F}(m) = 0.5$: $\\frac{m^2}{16} = 0.5$, so $m^2 = 8$, giving $m = \\sqrt{8} \\approx 2.83$.\n- Step 3: Find the mean: $\\mathrm{E}(X) = \\int_0^4 x \\cdot \\frac{1}{8}x\\,dx = \\int_0^4 \\frac{1}{8}x^2\\,dx = [\\frac{x^3}{24}]_0^4 = \\frac{64}{24} = \\frac{8}{3} \\approx 2.67$.\n\nThe median (2.83) is
