<script>
const DATA={"selected": [{"question": "Why is the mode of a pdf $ f(x) $ the value of $ x $ where $ f(x) $ is maximized?", "answer": "- The mode is the most probable value of $ X $. Since $ f(x) $ represents the \"density\" of probability, the peak of $ f(x) $ corresponds to the highest concentration of probability, making it the most likely value.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "When specifying a c.d.f. $$\\mathrm{F}(x)$$ fully, why must you define it for all $$x \\in \\mathbb{R}$$ — including regions where $$\\mathrm{f}(x)=0$$? What values does $$\\mathrm{F}(x)$$ take in those regions? (2 steps)", "answer": "- Step 1: The c.d.f. must be defined for all real $$x$$ because it represents $$\\mathrm{P}(X \\leqslant x)$$, which is a meaningful question for any $$x$$ — even values outside the range of $$X$$. If the p.d.f. is zero for all $$x$$ below some value $$a$$ (meaning $$X$$ never takes values less than $$a$$), then $$\\mathrm{P}(X \\leqslant x)=0$$ for any $$x < a$$, so $$\\mathrm{F}(x)=0$$ for $$x < a$$.\n- Step 2: Similarly, if the p.d.f. is zero for all $$x$$ above some value $$b$$, then all the probability has already been accumulated by the time we reach $$b$$, so $$\\mathrm{F}(x)=1$$ for $$x > b$$. A fully specified c.d.f. always has the structure:\n+ $$\\mathrm{F}(x)=0$$ for $$x$$ below the range\n+ $$\\mathrm{F}(x)$$ is some increasing function within the range (from 0 to 1)\n+ $$\\mathrm{F}(x)=1$$ for $$x$$ above the range\n\nOmitting the \"0 below\" and \"1 above\" parts is incomplete — exam marks are lost for this.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Sketch the p.d.f. of a distribution that is symmetrical but where mode $$\\neq$$ median. Is this possible? (2 steps)", "answer": "- Step 1: For a *unimodal* (single-peaked) symmetric distribution, the mode, median, and mean are all equal (at the centre of symmetry). So for mode $$\\neq$$ median, we need a different shape.\n- Step 2: A symmetric *bimodal* distribution works. Imagine a p.d.f. shaped like a \"W\" — two equal peaks with a valley between them. The modes are at the two peaks, but the median is at the centre (by symmetry), which is the *minimum* of the p.d.f., not a mode. For example, $$\\mathrm{f}(x) = \\frac{3}{8}(1 + x^2)$$ on $$[-1, 1]$$ has modes at $$\\pm 1$$ but median at 0.\n\nSymmetry guarantees mean = median, but says nothing about the mode unless the distribution is also unimodal.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x \\leq 2 \\\\ \\frac{k}{x^2} & 2 < x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Explain why this p.d.f. is discontinuous at $$x = 2$$, and why that's perfectly acceptable. (2 steps)", "answer": "- Step 1: At $$x = 2$$, the first piece gives $$\\mathrm{f}(2) = k$$, while the second piece gives $$\\mathrm{f}(2) = \\frac{k}{4}$$. These are different values (since $$k > 0$$), so the p.d.f. has a jump discontinuity at $$x = 2$$.\n- Step 2: This is perfectly acceptable because the p.d.f. does not need to be continuous. It only needs to be non-negative and integrate to 1. The probability at the exact point $$x = 2$$ is zero anyway ($$\\mathrm{P}(X = 2) = 0$$ for a continuous variable), so the jump doesn't affect any probability calculations.\n\nA p.d.f. can have jumps, gaps, or corners — only the *area* under it matters for probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "If a random variable $$X$$ is only defined with non-zero probability density on the interval $$[2, 5]$$, what must be the values of $$F(2)$$ and $$F(5)$$, and why? (2 steps)", "answer": "- Step 1: $$F(2) = 0$$. Since there is no probability density (no area) for any $$x < 2$$, the total accumulated probability at $$x=2$$ is zero.\n- Step 2: $$F(5) = 1$$. Since there is no probability density for any $$x > 5$$, all the probability must have been accumulated by the time we reach $$x=5$$.\n+ These boundary conditions are crucial for finding unknown constants in either the p.d.f. or the c.d.f.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "How do you convert between the p.d.f. $$\\mathrm{f}(x)$$ and the c.d.f. $$\\mathrm{F}(x)$$? State both directions. (2 steps)", "answer": "- Step 1: **From p.d.f. to c.d.f.**: Integrate. $$\\mathrm{F}(x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. You accumulate area from the left. In practice, if $$\\mathrm{f}(x) = 0$$ for $$x < a$$, then the lower limit becomes $$a$$.\n- Step 2: **From c.d.f. to p.d.f.**: Differentiate. $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$. The p.d.f. is the slope (gradient) of the c.d.f. at each point. Where the c.d.f. is flat (constant), the p.d.f. is zero.\n\nThese are inverse operations: integration builds up the c.d.f. from the p.d.f., and differentiation recovers the p.d.f. from the c.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "A proposed p.d.f. is $$\\mathrm{f}(x)=\\left\\{\\begin{array}{cc}x^3-2 & -1 \\leqslant x \\leqslant 3 \\\\ 0 & \\text{otherwise}\\end{array}\\right.$$ Why can this never be a valid p.d.f., no matter what constant you multiply it by? (2 steps)", "answer": "- Step 1: The first requirement for any p.d.f. is $$\\mathrm{f}(x) \\geqslant 0$$ for all $$x$$ in its domain. Let's check $$x^3-2$$ on $$-1 \\leqslant x \\leqslant 3$$. At $$x=-1$$: $$(-1)^3-2=-1-2=-3<0$$. At $$x=0$$: $$0-2=-2<0$$. At $$x=1$$: $$1-2=-1<0$$. The function is negative for all $$x < \\sqrt[3]{2} \\approx 1.26$$, which covers a large portion of the interval $$[-1,3]$$.\n- Step 2: Even if we multiply by a positive constant $$k$$, we get $$k(x^3-2)$$, which is still negative wherever $$x^3-2<0$$ (i.e., for $$x<\\sqrt[3]{2}$$). Multiplying by a positive constant cannot flip negative values to positive — it only scales them. So no positive $$k$$ can make this function non-negative everywhere on its domain.\n\nThis illustrates a crucial point: before checking the \"total area = 1\" condition, you must **first** verify non-negativity. If the function goes negative anywhere in its domain, it's automatically disqualified.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "For a continuous random variable with p.d.f. symmetric about $x = a$, what can you say about its mean, median, and mode? Explain. (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about $x = a$, then the distribution is mirror-imaged around the vertical line $x = a$. This means the probability of being to the left of $a$ equals the probability of being to the right of $a$.\n- Step 2: Therefore: the median must be $a$ (since $\\mathrm{F}(a) = 0.5$ by symmetry), and the mean must also be $a$ (by symmetry, the positive and negative deviations cancel out). The mode is at $a$ if the distribution has a single peak.\n\nFor symmetric unimodal distributions, the mean = median = mode. However, if the distribution is symmetric but multimodal, the modes will still be symmetrically placed, but the mean and median remain at the center of symmetry.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "For a positively skewed distribution, what is the typical order of the mode, median, and mean? Explain why. (3 steps)", "answer": "- Step 1: The typical order is Mode < Median < Mean.\n- Step 2: The mode is at the peak (the hump) of the distribution. The positive skew means there is a long tail to the right.\n- Step 3: The extreme high values in the right tail pull the mean (balance point) towards them the most. The median (area split) is pulled slightly, and the mode (peak) is unaffected by the tail.\n+ Thus, the mean is dragged furthest right, the median sits in the middle, and the mode remains at the peak on the left.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "For a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$, write down the formula for $\\mathrm{P}(a < X < b)$. Does it matter whether you use strict inequalities ($<$) or non-strict inequalities ($\\leq$)? Explain why or why not. (2 steps)", "answer": "- Step 1: The probability is given by the definite integral $\\mathrm{P}(a < X < b) = \\int_a^b \\mathrm{f}(x)\\,dx$, which represents the area under the p.d.f. curve between $a$ and $b$.\n+ For a constant $c$, $\\mathrm{P}(X = c) = \\int_c^c \\mathrm{f}(x)\\,dx = 0$ for any continuous distribution.\n- Step 2: Therefore, it does NOT matter whether you use strict or non-strict inequalities: $\\mathrm{P}(a < X < b) = \\mathrm{P}(a \\leq X < b) = \\mathrm{P}(a < X \\leq b) = \\mathrm{P}(a \\leq X \\leq b)$. All four expressions give the same value because the probability of exactly $a$ or $b$ is zero.\n\nThis is a key property that differs from discrete distributions where $\\mathrm{P}(X = a)$ and $\\mathrm{P}(X \\leq a)$ can be very different.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "Why does adding a constant $$b$$ to a random variable not change its variance? Give a conceptual and algebraic reason. (3 steps)", "answer": "- Step 1: Conceptually, variance measures how far values are spread from their average. If you add 10 to every possible outcome, the average goes up by 10, but the *distances between the values and the average* remain exactly the same.\n- Step 2: Algebraically, the new mean is $$\\mu' = a\\mu + b$$. The new deviations are $$(aX+b) - \\mu' = aX + b - (a\\mu + b) = a(X - \\mu)$$.\n- Step 3: When you square these deviations to find variance, the $$b$$ terms have completely cancelled out, leaving only the $$a^2$$ factor: $$Var(aX+b) = a^2 Var(X)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "The lower quartile $$Q_1$$ and upper quartile $$Q_3$$ are defined by $$\\mathrm{F}(Q_1)=0.25$$ and $$\\mathrm{F}(Q_3)=0.75$$. What is the **interquartile range**, and what does it measure conceptually? (2 steps)", "answer": "- Step 1: The interquartile range (IQR) is $$Q_3-Q_1$$ — the difference between the upper and lower quartiles. It's the range of the **middle 50%** of the distribution: 25% of probability lies below $$Q_1$$, 50% lies between $$Q_1$$ and $$Q_3$$, and 25% lies above $$Q_3$$.\n- Step 2: Conceptually, the IQR measures **spread** — how wide the central portion of the distribution is. It's a robust measure of dispersion (unaffected by extreme values in the tails), analogous to how the IQR works for data sets. A narrow IQR means the \"typical\" values are tightly clustered; a wide IQR means they're spread out. Compare this to variance, which also measures spread but is sensitive to tails.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "For a continuous random variable X with p.d.f. f(x), what is E(g(X))? If X has E(X) = 2 and Var(X) = 3, find E(3X + 5) and Var(3X + 5). (3 steps)", "answer": "- Step 1: E(g(X)) = ∫_{-∞}^{∞} g(x) f(x) dx — you substitute the function g(x) into the integral instead of just x.\n\n- Step 2: For linear transformations: E(aX + b) = aE(X) + b = 3(2) + 5 = 11\n\n- Step 3: Var(aX + b) = a² Var(X) = 9 × 3 = 27 (the constant b shifts the mean but doesn't affect variance)\n\n+ Note: The formula Var(aX + b) = a²Var(X) holds for any random variable (discrete or continuous), not just continuous ones.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "The random variable $X$ has c.d.f. $\\mathrm{F}(x) = \\begin{cases} 0 & x < 2 \\\\ \\frac{1}{5}(x^2 - 4) & 2 \\leq x \\leq 3 \\\\ 1 & x > 3 \\end{cases}$. Find the p.d.f. and verify it's valid. (2 steps)", "answer": "- Step 1: Differentiate the c.d.f. to get the p.d.f.: for $2 \\leq x \\leq 3$, $\\mathrm{f}(x) = \\frac{d}{dx}(\\frac{1}{5}(x^2 - 4)) = \\frac{2x}{5}$.\n- Step 2: Verify it's valid: $\\mathrm{f}(x) \\geq 0$ for $2 \\leq x \\leq 3$ (since $x \\geq 2 > 0$). The total area is $\\int_2^3 \\frac{2x}{5}\\,dx = \\frac{2}{5}[\\frac{x^2}{2}]_2^3 = \\frac{1}{5}(9 - 4) = \\frac{5}{5} = 1$. For $x < 2$ and $x > 3$, $\\mathrm{f}(x) = 0$. This is a valid p.d.f.\n\nThe p.d.f. is $\\mathrm{f}(x) = \\begin{cases} \\frac{2x}{5} & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$.", "source": "MiniMax ①", "_id": "minimax_1_36"}, {"question": "When writing the c.d.f. $$\\mathrm{F}(x)$$ fully, you must define it for all real $$x$$, typically as a piecewise function. What are the three regions, and what is $$\\mathrm{F}(x)$$ in each? (3 steps)", "answer": "- Step 1: **Below the range** ($$x < a$$, where $$a$$ is the lower bound of the p.d.f.): $$\\mathrm{F}(x) = 0$$. No area has accumulated yet, so the probability of being below any value in this region is zero.\n- Step 2: **Within the range** ($$a \\leq x \\leq b$$): $$\\mathrm{F}(x) = \\int_a^x \\mathrm{f}(t)\\,\\mathrm{d}t$$. This is the accumulated area from the start of the distribution up to $$x$$. It is a function of $$x$$ that increases from 0 to 1.\n- Step 3: **Above the range** ($$x > b$$): $$\\mathrm{F}(x) = 1$$. All the area has been accumulated, so the probability of being below any value above the entire distribution is certainty (1).\n\nForgetting the $$\\mathrm{F}(x) = 0$$ and $$\\mathrm{F}(x) = 1$$ regions is a common exam error.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "A piecewise p.d.f. has $$\\mathrm{f}(x)=\\frac{2}{15}x$$ for $$0 \\leqslant x < 3$$ and $$\\mathrm{f}(x)=\\frac{1}{5}(5-x)$$ for $$3 \\leqslant x \\leqslant 5$$. When computing $$\\mathrm{E}(X)$$, why must you split the integral into two parts with different limits? (2 steps)", "answer": "- Step 1: The p.d.f. has **different formulas** on different intervals, so you can't write a single integrand $$x\\mathrm{f}(x)$$ that works everywhere. On $$[0,3)$$, $$x\\mathrm{f}(x)=\\frac{2}{15}x^2$$; on $$[3,5]$$, $$x\\mathrm{f}(x)=\\frac{1}{5}x(5-x)=\\frac{1}{5}(5x-x^2)$$. These are different functions, so you integrate each over its own interval.\n- Step 2: $$\\mathrm{E}(X)=\\int_{0}^{3}\\frac{2}{15}x^2\\,\\mathrm{d}x+\\int_{3}^{5}\\frac{1}{5}(5x-x^2)\\,\\mathrm{d}x$$ — the total expectation is the **sum** of the contributions from each piece. This works because the integral over the whole range is the sum of the integrals over the sub-ranges (additivity of integration). Each piece contributes its own \"partial mean,\" and they add up.\n\nThe same splitting applies to $$\\mathrm{E}(X^2)$$ and any $$\\mathrm{E}(g(X))$$ for piecewise p.d.f.s.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "State the linearity rules for expectation and variance of $$aX + b$$. Then explain *why* the variance rule has $$a^2$$ but no $$b$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(aX + b) = a\\,\\mathrm{E}(X) + b$$. Shifting by $$b$$ shifts the mean by $$b$$; scaling by $$a$$ scales the mean by $$a$$.\n- Step 2: $$\\operatorname{Var}(aX + b) = a^2\\,\\operatorname{Var}(X)$$. Scaling by $$a$$ scales the spread by $$|a|$$, and since variance involves squaring, the factor becomes $$a^2$$.\n- Step 3: The constant $$b$$ disappears from variance because variance measures *spread* (how far values are from the mean), not *location*. Adding a constant shifts every value (and the mean) by the same amount, so the deviations from the mean are unchanged. Only scaling affects spread.\n\nIntuitively: translating a dataset doesn't change how spread out it is; only stretching/compressing does.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Given the c.d.f. $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{1}{5}x + \\frac{3}{20}x^2 & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$$, how do you recover the p.d.f. $$\\mathrm{f}(x)$$? (2 steps)", "answer": "- Step 1: Differentiate the c.d.f. in the active region: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\left(\\frac{1}{5}x + \\frac{3}{20}x^2\\right) = \\frac{1}{5} + \\frac{3}{10}x$$ for $$0 \\leq x \\leq 2$$.\n- Step 2: Where the c.d.f. is constant, the p.d.f. is zero. So $$\\mathrm{f}(x) = 0$$ for $$x < 0$$ and $$x > 2$$ (since $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(0) = 0$$ and $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(1) = 0$$). Full answer: $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} + \\frac{3}{10}x & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$$.\n\nDifferentiation undoes integration — the p.d.f. is the rate of change (slope) of the c.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Define the median of a continuous random variable in terms of the c.d.f. Why is the median sometimes more informative than the mean? (2 steps)", "answer": "- Step 1: The median $$m$$ satisfies $$\\mathrm{F}(m) = 0.5$$, meaning $$\\mathrm{P}(X \\leq m) = 0.5$$. Half the probability (area under the p.d.f.) lies to the left of $$m$$, and half to the right.\n- Step 2: The median is more robust than the mean for skewed distributions. A long tail on one side pulls the mean toward it, but the median stays at the 50% probability point. For example, in income distributions, the median income better represents the \"typical\" person than the mean, which is inflated by very high earners.\n\nThe median splits the area in half; the mean is the \"balance point\" of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "A student wants to find the expected volume of a cube with random side length $$X$$. They compute $$(\\mathrm{E}(X))^3$$. Is this correct? If not, what should they compute? (2 steps)", "answer": "- Step 1: This is incorrect. $$(\\mathrm{E}(X))^3$$ is the cube of the expected side length, not the expected volume. In general, $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$$ because the cubing function is non-linear, and expectation doesn't commute with non-linear transformations.\n- Step 2: The correct computation is $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. This integrates $$x^3$$ weighted by the p.d.f., giving the true average volume. The discrepancy between $$\\mathrm{E}(X^3)$$ and $$(\\mathrm{E}(X))^3$$ is related to the higher moments of the distribution.\n\nOnly for linear functions $$g(X) = aX + b$$ does $$\\mathrm{E}(g(X)) = g(\\mathrm{E}(X))$$ hold.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=\\left\\{\\begin{array}{cc}k\\left(4x-x^2\\right) & 2 \\leqslant x \\leqslant 4 \\\\ 0 & \\text{otherwise}\\end{array}\\right.$$ Conceptually, how do you find the value of $$k$$ that makes this valid, and what does $$k$$ represent geometrically? (2 steps)", "answer": "- Step 1: The total area under the p.d.f. must equal 1. The \"raw\" area under $$4x-x^2$$ between $$x=2$$ and $$x=4$$ (without the factor $$k$$) is some number, say $$A$$. Then the actual area under $$k(4x-x^2)$$ is $$k \\times A$$. We need $$k \\times A = 1$$, so $$k = \\frac{1}{A}$$.\n+ For this specific function: $$A = \\int_{2}^{4}(4x-x^2)\\,\\mathrm{d}x = \\left[2x^2-\\frac{x^3}{3}\\right]_{2}^{4}=\\left(32-\\frac{64}{3}\\right)-\\left(8-\\frac{8}{3}\\right)=\\frac{16}{3}$$, giving $$k=\\frac{3}{16}$$.\n- Step 2: Geometrically, $$k$$ is a **vertical scaling factor** that stretches or compresses the curve so that the total area under it becomes exactly 1. If the raw area $$A$$ is too large (greater than 1), $$k<1$$ squishes the curve down; if $$A$$ is too small, $$k>1$$ stretches it up. The value $$k=\\frac{1}{A}$$ is the exact factor that normalizes the area to 1.\n\nThink of $$k$$ as the \"probability density per unit area\" — it adjusts the height of the curve so the probability content is correctly distributed.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "If the graph of a p.d.f. $$f(x)$$ is perfectly symmetric about the vertical line $$x = a$$, what is the value of $$E(X)$$? (2 steps)", "answer": "- Step 1: The expected value $$E(X)$$ is the center of mass (balance point) of the p.d.f.\n- Step 2: If the shape is perfectly symmetric about $$x = a$$, the center of mass must lie exactly on the line of symmetry.\n+ Therefore, $$E(X) = a$$. This symmetry shortcut can save you from doing a long integral!", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "A continuous p.d.f. is given by $\\mathrm{f}(x) = 2x$ for $0 \\leq x \\leq 1$. What is its mode? Explain why this illustrates an important point about modes. (2 steps)", "answer": "- Step 1: The function $2x$ is strictly increasing on $[0, 1]$, so its maximum occurs at the right endpoint $x = 1$. Thus the mode is $x = 1$.\n- Step 2: This illustrates that the mode can occur at a boundary of the domain, not necessarily in the interior. Some distributions may also have multiple modes (multimodal), or no unique mode (uniform distribution has no single mode).\n\nThe mode is simply where the density is highest—it doesn't have to be \"central\" or even in the middle of the support.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Given a p.d.f. $$\\mathrm{f}(x)=\\frac{1}{4}x$$ for $$1 \\leqslant x \\leqslant 3$$ and 0 otherwise, describe two methods for finding the c.d.f. $$\\mathrm{F}(x)$$ in the region $$1 \\leqslant x \\leqslant 3$$, and explain the logic behind each. (3 steps)", "answer": "- Step 1: **Method 1 (Definite integral):** Use the definition $$\\mathrm{F}(x)=\\int_{-\\infty}^{x}\\mathrm{f}(t)\\,\\mathrm{d}t$$. Since $$\\mathrm{f}(t)=0$$ for $$t<1$$, the integral starts at 1: $$\\mathrm{F}(x)=\\int_{1}^{x}\\frac{1}{4}t\\,\\mathrm{d}t=\\left[\\frac{t^2}{8}\\right]_{1}^{x}=\\frac{x^2}{8}-\\frac{1}{8}$$ for $$1 \\leqslant x \\leqslant 3$$. The lower limit is the start of the non-zero region, and we verify: $$\\mathrm{F}(1)=\\frac{1}{8}-\\frac{1}{8}=0$$ ✓ and $$\\mathrm{F}(3)=\\frac{9}{8}-\\frac{1}{8}=1$$ ✓.\n- Step 2: **Method 2 (Indefinite integral + constant):** Integrate without limits: $$\\mathrm{F}(x)=\\int\\frac{1}{4}x\\,\\mathrm{d}x=\\frac{x^2}{8}+c$$. Then find $$c$$ using a boundary condition. Since $$\\mathrm{F}(1)=0$$ (no probability accumulated at the start of the range): $$\\frac{1}{8}+c=0$$, so $$c=-\\frac{1}{8}$$, giving $$\\mathrm{F}(x)=\\frac{x^2}{8}-\\frac{1}{8}$$.\n- Step 3: Both methods yield the same result. Method 1 is more direct (the definite integral automatically handles the constant), while Method 2 requires you to find the constant separately but can be easier when the lower limit is complicated. The key insight: the c.d.f. at the **start** of the non-zero range must be 0, and at the **end** must be 1 — these are your boundary conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "A function is proposed as a probability density function. What two conditions must it satisfy to be valid? Explain the physical/geometric intuition behind each. (2 steps)", "answer": "- Step 1: **Non-negativity**: $$\\mathrm{f}(x) \\geq 0$$ for all $$x \\in \\mathbb{R}$$. Intuitively, probabilities can never be negative, and since probability over a range equals the area under the curve, the curve must sit on or above the $$x$$-axis everywhere. A negative region would represent \"negative probability,\" which is meaningless.\n- Step 2: **Total area equals 1**: $$\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,\\mathrm{d}x = 1$$. The total probability over all possible outcomes must be exactly 1 (certainty). Geometrically, the entire area under the p.d.f. curve must equal 1. In practice, you only integrate over the range where $$\\mathrm{f}(x)$$ is non-zero.\n\nBoth conditions are necessary; violating either one makes the function invalid as a p.d.f.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "The random variable X has p.d.f. f(x) = {3/8(1 + x²) for -1 ≤ x ≤ 1, 0 otherwise}. Explain why the mode is not unique. What is the median? (2 steps)", "answer": "- Step 1: The function 3/8(1 + x²) is strictly increasing on [0, 1] and strictly decreasing on [-1, 0] (since x² is symmetric and increases as |x| increases). The minimum occurs at x = 0, and maximum values occur at both endpoints x = -1 and x = 1, which both equal 3/4.\n\n- Step 2: The distribution is symmetric about x = 0, so the median is 0 (half the probability lies on each side). The mode is any value where f(x) attains its maximum — specifically x = -1 and x = 1 (bimodal with modes at the endpoints).\n\n+ For symmetric continuous distributions, the median always equals the center of symmetry, but the mode may be at the edges if the p.d.f. increases toward the edges.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "Write down the two equivalent formulas for the variance $$Var(X)$$ of a continuous random variable. Which one is typically easier to use? (2 steps)", "answer": "- Step 1: The defining formula is $$Var(X) = \\int_{-\\infty}^{\\infty} (x-\\mu)^2 f(x) dx$$, and the computational formula is $$Var(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: The computational formula $$E(X^2) - \\mu^2$$ is almost always easier because it avoids squaring terms with $$\\mu$$ inside the integral, which creates messy algebra.\n+ Here, $$E(X^2) = \\int_{-\\infty}^{\\infty} x^2 f(x) dx$$, which is straightforward to calculate.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "The delay $$T$$ in flight departure has p.d.f. $$\\mathrm{f}(t) = \\frac{1}{72}(6-t)^2$$ for $$0 \\leq t \\leq 6$$. Without full computation, determine: is the median closer to 0, 3, or 6? (2 steps)", "answer": "- Step 1: The p.d.f. at $$t = 0$$ is $$\\frac{36}{72} = 0.5$$, and at $$t = 6$$ it is 0. The function is decreasing (since $$(6-t)^2$$ decreases as $$t$$ increases from 0 to 6). Most probability weight is concentrated near $$t = 0$$.\n- Step 2: Since the distribution is heavily left-weighted (short delays are most common), the median is closer to 0 than to 6. It will be less than the midpoint (3). (Exact: the median is approximately 1.76.)\n\nFor a rapidly decreasing p.d.f., the median is much closer to the start of the range than the end.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "A proposed p.d.f. is defined as $$f(x) = kx(5-x)$$ for $$0 \\leq x \\leq 6$$. Even before checking if the total area is 1, how can you immediately tell this cannot be a valid p.d.f. for any positive constant $$k$$? (2 steps)", "answer": "- Step 1: A valid p.d.f. must satisfy $$f(x) \\geq 0$$ for all $$x$$ in its defined range.\n- Step 2: The roots of the function $$x(5-x)$$ are at $$x=0$$ and $$x=5$$. For any $$x$$ greater than 5 (up to the domain limit of 6), the term $$(5-x)$$ becomes negative, making $$f(x)$$ negative (e.g., at $$x=6$$, $$f(6) = -6k$$, which is negative since $$k$$ is positive).\n+ A probability density cannot dip below the x-axis; doing so implies a negative probability, which is physically and mathematically meaningless.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Given a c.d.f., how do you recover the p.d.f.? And what does a constant section of the c.d.f. (e.g., $$\\mathrm{F}(x)=1$$ for $$x>2$$) tell you about the p.d.f. in that region? (2 steps)", "answer": "- Step 1: The p.d.f. is the **derivative** of the c.d.f.: $$\\mathrm{f}(x)=\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$ for all $$x$$ where $$\\mathrm{F}(x)$$ is differentiable. For the region $$0 \\leqslant x \\leqslant 2$$ where $$\\mathrm{F}(x)=\\frac{1}{5}x+\\frac{3}{20}x^2$$, we differentiate: $$\\mathrm{f}(x)=\\frac{1}{5}+\\frac{3}{10}x$$.\n- Step 2: For $$x>2$$, $$\\mathrm{F}(x)=1$$ (a constant). The derivative of a constant is 0, so $$\\mathrm{f}(x)=0$$ for $$x>2$$. This makes perfect sense: if all probability has already been accumulated by $$x=2$$, then no additional probability density exists beyond that point — the random variable simply cannot take values greater than 2. Similarly, $$\\mathrm{F}(x)=0$$ for $$x<0$$ gives $$\\mathrm{f}(x)=0$$ there.\n\nThe rule: **flat sections of the c.d.f. → zero sections of the p.d.f.**. Increasing sections of the c.d.f. → positive p.d.f. values.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "Why is it impossible to assign a non-zero probability to a continuous random variable taking one exact, specific value — and how does this fundamentally change the way we describe its distribution compared to a discrete random variable? (3 steps)", "answer": "- Step 1: A continuous random variable can take infinitely many values in a range (e.g., any real number between 0 and 1). If you tried to assign positive probability to each specific value, the total probability would blow up to infinity — violating the requirement that total probability equals 1. The only way to keep the total at 1 while distributing probability across infinitely many points is to assign probability 0 to each individual point.\n- Step 2: For a discrete random variable, we describe the distribution with a table or function listing $$\\mathrm{P}(X=x)$$ for each value in the sample space. This works because there are finitely many (or countably many) values. For a continuous random variable, $$\\mathrm{P}(X=x)=0$$ for every $$x$$, so this approach is useless — every entry would be 0.\n- Step 3: Instead, we describe a continuous distribution using a **probability density function** $$\\mathrm{f}(x)$$, where probabilities are assigned to **ranges** of values, not individual points. The probability that $$X$$ falls between $$a$$ and $$b$$ is the **area under the curve** of $$\\mathrm{f}(x)$$ over that interval: $$\\mathrm{P}(a<X<b)=\\int_{a}^{b}\\mathrm{f}(x)\\,\\mathrm{d}x$$. The density function doesn't give probability directly — it gives probability *per unit length*, which must be integrated to yield actual probability.\n\nThis is analogous to how a single point on a line has zero length, but an interval of points has positive length.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "For the exponential distribution, prove the memoryless property: $\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$. Explain what this means intuitively. (3 steps)", "answer": "- Step 1: Using conditional probability: $\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b \\text{ and } X > a)}{\\mathrm{P}(X > a)} = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)}$.\n- Step 2: For exponential, $\\mathrm{P}(X > x) = e^{-\\lambda x}$. So $\\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$.\n- Step 3: Intuitively, this means that if you've already waited $a$ units (and the event hasn't occurred), the probability of waiting another $b$ units is the same as if you were starting fresh. The distribution \"forgets\" how long you've already waited. This is unique to the exponential distribution among continuous distributions.\n\nThis property makes the exponential distribution particularly useful for modeling waiting times, lifespans, and reliability problems where the \"age\" of the system doesn't affect future survival probability.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "For a continuous random variable with p.d.f. $$\\mathrm{f}(x)$$, the general formula for the expectation of any function $$g(X)$$ is $$\\mathrm{E}(g(X))=\\int g(x)\\mathrm{f}(x)\\,\\mathrm{d}x$$. How does this unify all the specific formulas we've seen ($$\\mathrm{E}(X)$$, $$\\mathrm{E}(X^2)$$, $$\\mathrm{E}(X^3)$$)? (2 steps)", "answer": "- Step 1: Each specific formula is just the general rule with a particular choice of $$g$$:\n+ $$\\mathrm{E}(X)$$: use $$g(x)=x$$ → $$\\mathrm{E}(X)=\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ $$\\mathrm{E}(X^2)$$: use $$g(x)=x^2$$ → $$\\mathrm{E}(X^2)=\\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ $$\\mathrm{E}(X^3)$$: use $$g(x)=x^3$$ → $$\\mathrm{E}(X^3)=\\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$\n- Step 2: This general principle means: **to find the expected value of any function of $$X$$, multiply that function by the p.d.f. and integrate**. This works for any $$g$$ — polynomials, exponentials, logarithms, etc. For example, $$\\mathrm{E}(\\ln X)=\\int \\ln(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. The only constraint is that the integral must converge (exist as a finite number).\n\nThis is the continuous analogue of $$\\mathrm{E}(g(X))=\\sum g(x)\\mathrm{P}(X=x)$$ for discrete RVs.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "A student claims: \"For a continuous random variable, $$\\mathrm{P}(X > a) = 1 - \\mathrm{F}(a)$$.\" Is this correct? Justify using the definition of the c.d.f. (2 steps)", "answer": "- Step 1: Yes, this is correct. By definition, $$\\mathrm{F}(a) = \\mathrm{P}(X \\leq a)$$. Since $$\\mathrm{P}(X \\leq a) + \\mathrm{P}(X > a) = 1$$ (the events are complementary), we get $$\\mathrm{P}(X > a) = 1 - \\mathrm{F}(a)$$.\n- Step 2: Note that for a continuous random variable, $$\\mathrm{P}(X > a) = \\mathrm{P}(X \\geq a)$$ since $$\\mathrm{P}(X = a) = 0$$. So $$1 - \\mathrm{F}(a) = 1 - \\mathrm{P}(X \\leq a) = \\mathrm{P}(X > a) = \\mathrm{P}(X \\geq a)$$.\n\nThis is one of the most useful c.d.f. shortcuts for quickly computing tail probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "A student's model gives c.d.f. $$\\mathrm{F}(y) = 13y - 4y^2 - 9$$ for $$1 \\leq y \\leq 2$$. Explain two different ways to show this is invalid. (2 steps)", "answer": "- Step 1: Check boundary values: $$\\mathrm{F}(1) = 13 - 4 - 9 = 0$$ ✓, but $$\\mathrm{F}(2) = 26 - 16 - 9 = 1$$ ✓. Boundaries are fine, so the problem lies elsewhere.\n- Step 2: Check monotonicity: $$\\mathrm{F}'(y) = 13 - 8y$$. This is positive for $$y < \\frac{13}{8} = 1.625$$ but *negative* for $$y > 1.625$$. So the c.d.f. decreases on $$(1.625, 2]$$, meaning the implied p.d.f. is negative there. Alternatively, check a value: $$\\mathrm{F}(1.7) = 13(1.7) - 4(2.89) - 9 = 22.1 - 11.56 - 9 = 1.54 > 1$$. A c.d.f. exceeding 1 is invalid.\n\nA valid c.d.f. must be non-decreasing and stay within $$[0, 1]$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=\\frac{3}{8}(x^2+1)$$ on $$-1 \\leqslant x \\leqslant 1$$ and 0 elsewhere. This is symmetric about $$x=0$$. What can you immediately say about the mode, median, and mean — and what caution applies to the mode? (3 steps)", "answer": "- Step 1: **Mean:** By symmetry, $$\\mathrm{E}(X)=0$$ (the balance point of a symmetric distribution centered at 0).\n- Step 2: **Median:** By symmetry, the median is also 0. The c.d.f. at $$x=0$$ must be 0.5 because the left half and right half contain equal probability.\n- Step 3: **Mode:** This is where caution is needed. $$\\mathrm{f}(x)=\\frac{3}{8}(x^2+1)$$ is a U-shaped (bimodal) function — it's **minimized** at $$x=0$$ (where $$\\mathrm{f}(0)=\\frac{3}{8}$$) and **maximized** at the endpoints $$x=\\pm 1$$ (where $$\\mathrm{f}(\\pm 1)=\\frac{3}{8}\\cdot 2=\\frac{3}{4}$$). So the distribution has **two modes**: $$x=-1$$ and $$x=1$$. The mode is NOT at the center, and there isn't a unique mode.\n\nSymmetry guarantees mean = median, but says nothing about the mode — it could be at the center, at the boundaries, or at multiple points.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "Exercise check: A p.d.f. is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{2}(x-1) & 1 \\leq x < 2 \\\\ \\frac{1}{6}(5-x) & 2 \\leq x \\leq 5 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Verify this is valid by checking the total area equals 1 (use geometry: triangle + triangle). (2 steps)", "answer": "- Step 1: First piece: $$\\frac{1}{2}(x-1)$$ on $$[1,2]$$ is a triangle with base 1 and height $$\\mathrm{f}(2) = \\frac{1}{2}$$. Area = $$\\frac{1}{2} \\times 1 \\times \\frac{1}{2} = \\frac{1}{4}$$.\n- Step 2: Second piece: $$\\frac{1}{6}(5-x)$$ on $$[2,5]$$ is a triangle with base 3 and height $$\\mathrm{f}(2) = \\frac{3}{6} = \\frac{1}{2}$$. Area = $$\\frac{1}{2} \\times 3 \\times \\frac{1}{2} = \\frac{3}{4}$$. Total area = $$\\frac{1}{4} + \\frac{3}{4} = 1$$ ✓.\n\nGeometry often beats integration for piecewise-linear p.d.f.s — sketch first, compute areas of simple shapes.", "source": "GLM 5.1 ③", "_id": "glm_3_68"}, {"question": "Why is $\\mathrm{P}(X = 0.5) = 0$ for any continuous random variable $X$? Can $\\mathrm{P}(X \\leq 0.5)$ ever equal $\\mathrm{P}(X < 0.5)$? Explain. (2 steps)", "answer": "- Step 1: For a continuous random variable, the probability of any exact value is zero because $\\mathrm{P}(X = a) = \\int_a^a \\mathrm{f}(x)\\,dx = 0$. Geometrically, the area under a curve over a zero-width interval is zero.\n- Step 2: Yes! For continuous distributions, $\\mathrm{P}(X \\leq 0.5) = \\mathrm{P}(X < 0.5)$ because the difference is $\\mathrm{P}(X = 0.5)$, which equals zero. This is why we can use either strict or non-strict inequalities when calculating probabilities for continuous variables. However, for discrete distributions, these probabilities can differ.\n\nThis is a key conceptual difference: continuous distributions assign probability to intervals, not to points.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{10}x & 0 \\leq x < 2 \\\\ \\frac{1}{4} - \\frac{1}{40}x & 2 \\leq x < 10 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Where is the mode? (Hint: sketch it mentally.) (2 steps)", "answer": "- Step 1: The first piece is linear and increasing (slope $$\\frac{1}{10}$$), reaching $$\\mathrm{f}(2) = \\frac{2}{10} = 0.2$$. The second piece is linear and decreasing (slope $$-\\frac{1}{40}$$), starting at $$\\mathrm{f}(2) = \\frac{1}{4} - \\frac{2}{40} = 0.25 - 0.05 = 0.2$$ and falling to $$\\mathrm{f}(10) = 0$$.\n- Step 2: The function increases to $$x = 2$$, then decreases. The peak is at the junction point $$x = 2$$. So the mode is $$x = 2$$. (Note: $$\\mathrm{f}(x)$$ is continuous here, but the mode can also occur at a junction even if there's a discontinuity.)\n\nFor piecewise-linear p.d.f.s, the mode is typically at a peak or a boundary — sketching is the fastest method.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "Why can't the cdf $ F(x) $ be decreasing?", "answer": "- $ F(x) $ is cumulative probability. As $ x $ increases, $ F(x) $ adds more probability mass and must be non-decreasing. A decreasing $ F(x) $ would imply negative probabilities when differentiating to get the pdf.", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "Explain why the 90th percentile P₉₀ is defined by F(P₉₀) = 0.90. If X ~ Uniform(0, 1), what is P₉₀? (2 steps)", "answer": "- Step 1: The pth percentile is the value below which p% of the probability mass lies. By definition, 90% of the distribution lies below the 90th percentile, so F(P₉₀) = 0.90.\n\n- Step 2: For X ~ Uniform(0, 1), the c.d.f. is F(x) = x for 0 ≤ x ≤ 1. Solving F(x) = 0.90 gives x = 0.90. So P₉₀ = 0.90.\n\n+ For any uniform distribution on [a, b], the pth percentile is simply a + p(b - a).", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "How is the mean (expected value) of a continuous random variable defined, and why does the formula $$\\mathrm{E}(X)=\\int_{-\\infty}^{\\infty}x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ mirror the discrete formula $$\\mathrm{E}(X)=\\sum x\\,\\mathrm{P}(X=x)$$? (2 steps)", "answer": "- Step 1: For a discrete RV, the mean is $$\\mathrm{E}(X)=\\sum x\\,\\mathrm{P}(X=x)$$ — each possible value $$x$$ multiplied by its probability, summed over all values. For a continuous RV, each specific value has probability 0, so we can't use point probabilities. Instead, we use the probability **density** $$\\mathrm{f}(x)$$ and **integrate** (which is the continuous analogue of summing): $$\\mathrm{E}(X)=\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$.\n- Step 2: The conceptual parallel: $$\\sum \\to \\int$$ (discrete sum becomes continuous integral), and $$\\mathrm{P}(X=x) \\to \\mathrm{f}(x)\\,\\mathrm{d}x$$ (point probability becomes the infinitesimal probability in a tiny interval of width $$\\mathrm{d}x$$ around $$x$$). So $$x \\cdot \\mathrm{f}(x)\\,\\mathrm{d}x$$ is the contribution to the mean from values near $$x$$, and integrating over all $$x$$ collects all contributions. The mean is the **balance point** of the probability distribution — the center of mass of the area under the p.d.f. curve.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "Why is the interquartile range (IQR) sometimes preferred over the standard deviation as a measure of spread for certain distributions? What type of distributions is IQR particularly useful for? (2 steps)", "answer": "- Step 1: The standard deviation squares deviations from the mean, making it very sensitive to outliers and extreme values. The IQR only uses the middle 50% of data (from Q₁ to Q₃), ignoring extremes entirely. For distributions with heavy tails or extreme outliers, IQR gives a more representative measure of \"typical\" spread.\n\n- Step 2: IQR is especially useful for skewed distributions and distributions with outliers. It's also essential for constructing box plots, which visually display the five-number summary (min, Q₁, median, Q₃, max).\n\n+ For a normal distribution, IQR ≈ 1.35σ, showing the relationship between these two measures of spread for symmetric distributions.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "Explain why for a continuous random variable, knowing the median gives you different information than knowing the mean. Under what conditions would they be equal? (2 steps)", "answer": "- Step 1: The mean is the weighted average (E(X)), sensitive to extreme values since it squares deviations. The median is the middle value (50th percentile), robust against outliers since it depends only on position, not magnitude. For the distribution of incomes, a few very high incomes would raise the mean but barely affect the median.\n\n- Step 2: They are equal for symmetric distributions (like the normal distribution). For symmetric continuous distributions, the mean = median = mode all equal the center of symmetry.\n\n+ This is why analysts often report both: the mean captures the \"center of gravity\" while the median captures the \"typical value\" more robustly.", "source": "MiniMax ②", "_id": "minimax_2_21"}, {"question": "For the exponential distribution with p.d.f. f(x) = λe^(-λx) for x ≥ 0, show that E(X) = 1/λ and Var(X) = 1/λ². (3 steps)", "answer": "- Step 1: E(X) = ∫₀^∞ x·λe^(-λx) dx. Use integration by parts: = [-xe^(-λx)]₀^∞ + ∫₀^∞ e^(-λx) dx = 0 + [(-1/λ)e^(-λx)]₀^∞ = 1/λ\n\n- Step 2: E(X²) = ∫₀^∞ x²·λe^(-λx) dx. Using integration by parts twice: = [-x²e^(-λx)]₀^∞ + 2∫₀^∞ xe^(-λx) dx = 0 + 2/λ² = 2/λ²\n\n- Step 3: Var(X) = E(X²) - [E(X)]² = 2/λ² - (1/λ)² = 2/λ² - 1/λ² = 1/λ²\n\n+ The exponential distribution is memoryless: P(X > a + b | X > a) = P(X > b), which explains why it models waiting times.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "When constructing a c.d.f. $$F(x)$$ from a piecewise p.d.f., why must you add the cumulative area from previous intervals to the integral of the current interval? (3 steps)", "answer": "- Step 1: The c.d.f. $$F(x)$$ measures the *total* accumulated probability from the very left of the distribution up to $$x$$.\n- Step 2: When you move to a new piece of the p.d.f. (say, for $$x > c$$), the random variable doesn't \"reset\". It still carries all the probability from the previous intervals.\n- Step 3: Therefore, for a new interval starting at $$c$$, you must calculate $$F(x) = F(c) + \\int_{c}^{x} f(t) dt$$, where $$F(c)$$ is the total probability accumulated up to the boundary $$c$$.\n+ Think of it like filling a bucket: if you've already poured in 0.2 liters in the first minute, and then change the pouring rate, the total water is still 0.2 liters plus whatever the new rate adds.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "If $$\\mathrm{E}(X)=\\mu$$ and you want $$\\mathrm{E}(2X-3)$$, you can use the shortcut $$\\mathrm{E}(aX+b)=a\\mathrm{E}(X)+b$$. Why does this work — what's the intuitive reasoning? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(2X-3)=\\int(2x-3)\\mathrm{f}(x)\\,\\mathrm{d}x=2\\int x\\mathrm{f}(x)\\,\\mathrm{d}x-3\\int\\mathrm{f}(x)\\,\\mathrm{d}x=2\\mathrm{E}(X)-3\\cdot 1=2\\mu-3$$. The constant 3 gets multiplied by the total probability (which is 1), so it just shifts the mean by -3. The factor 2 scales every value, so it scales the mean by 2.\n- Step 2: Intuitively: if you double every outcome and then subtract 3, the average outcome also doubles and then subtracts 3. The expectation is a **linear operator** — it respects addition and scalar multiplication. This is true for both discrete and continuous random variables. The key: $$\\mathrm{E}$$ \"distributes\" over linear combinations just like ordinary arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "A cube has a random side length $$X$$. Why is the expected volume $$E(X^3)$$ not equal to $$[E(X)]^3$$? (3 steps)", "answer": "- Step 1: $$E(X^3)$$ is the average of the *cubed* side lengths: $$\\int x^3 f(x) dx$$.\n- Step 2: $$[E(X)]^3$$ is the cube of the *average* side length: $$(\\int x f(x) dx)^3$$.\n- Step 3: Because $$g(x) = x^3$$ is a convex function for $$x>0$$, by Jensen's inequality, the average of the function is greater than the function of the average: $$E(X^3) > [E(X)]^3$$.\n+ The distribution of volumes is skewed by the cubing effect on larger side lengths, pulling the expected volume higher than the volume of the average side.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "How do you find the median when the c.d.f. is defined piecewise? What preliminary step saves you from solving the wrong equation? (3 steps)", "answer": "- Step 1: Evaluate $$\\mathrm{F}(x)$$ at each boundary point of the piecewise definition. This tells you the c.d.f. value at the transition between pieces.\n- Step 2: Determine which piece contains $$\\mathrm{F}(x) = 0.5$$ by checking which interval of c.d.f. values contains 0.5. For example, if $$\\mathrm{F}(2) = 0.2$$ and $$\\mathrm{F}(4) = 1$$, then the median lies in the second piece (since $$0.2 < 0.5 < 1$$).\n- Step 3: Set the appropriate piece of $$\\mathrm{F}(x)$$ equal to 0.5 and solve for the median. If you picked the wrong piece, you'd get an answer outside its valid $$x$$-range.\n\nThis boundary-checking step is essential and frequently tested in exams.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "A p.d.f. has a triangular shape: rising linearly from 0 to some peak, then falling linearly. The mode is at the peak. Is the median above, below, or equal to the mode? Explain using the concept of area balance. (2 steps)", "answer": "- Step 1: The median splits the total area in half. The mode is at the peak (the highest point of the density). For a symmetric triangle, median = mode. But for a skewed triangle (peak not at the midpoint of the base), they differ.\n- Step 2: If the triangle is right-skewed (long tail to the right, peak to the left), the median is to the *right* of the mode, because the thin right tail requires more horizontal distance to accumulate 50% of the area. If left-skewed, the median is to the *left* of the mode.\n\nIn general, for skewed distributions: the mean is pulled furthest toward the tail, the median is between the mode and mean, and the mode stays at the peak.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Prove that for a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$, if $g(X) = aX + b$, then $\\mathrm{E}(g(X)) = a\\mathrm{E}(X) + b$ and $\\operatorname{Var}(g(X)) = a^2\\operatorname{Var}(X)$. (3 steps)", "answer": "- Step 1: For expectation: $\\mathrm{E}(aX + b) = \\int (ax + b)\\mathrm{f}(x)\\,dx = a\\int x\\mathrm{f}(x)\\,dx + b\\int \\mathrm{f}(x)\\,dx = a\\mathrm{E}(X) + b(1) = a\\mathrm{E}(X) + b$.\n- Step 2: For variance: $\\operatorname{Var}(aX + b) = \\mathrm{E}((aX + b)^2) - (\\mathrm{E}(aX + b))^2 = \\mathrm{E}(a^2X^2 + 2abX + b^2) - (a\\mathrm{E}(X) + b)^2 = a^2\\mathrm{E}(X^2) + 2ab\\mathrm{E}(X) + b^2 - (a^2(\\mathrm{E}(X))^2 + 2ab\\mathrm{E}(X) + b^2) = a^2\\mathrm{E}(X^2) - a^2(\\mathrm{E}(X))^2 = a^2\\operatorname{Var}(X)$.\n- Step 3: The $b$ term cancels out because adding a constant shifts the mean but doesn't change the spread—variance measures spread around the mean, not the absolute location.\n\nThe linearity properties mirror those of discrete distributions but use integration instead of summation.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=12x^2(1-x)$$ on $$0 \\leqslant x \\leqslant 1$$ (a Beta distribution). How do you find the mode, and why must you verify it's a maximum rather than a minimum? (3 steps)", "answer": "- Step 1: To find the mode, set $$\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{f}(x)=0$$. First expand: $$\\mathrm{f}(x)=12x^2-12x^3$$. Then differentiate: $$\\mathrm{f}'(x)=24x-36x^2=12x(2-3x)=0$$.\n- Step 2: Solving: $$x=0$$ or $$2-3x=0 \\Rightarrow x=\\frac{2}{3}$$. These are the **critical points** — candidates for maximum or minimum.\n- Step 3: Check which is the maximum:\n+ At $$x=0$$: $$\\mathrm{f}(0)=0$$ (boundary, minimum)\n+ At $$x=\\frac{2}{3}$$: $$\\mathrm{f}(\\frac{2}{3})=12\\cdot\\frac{4}{9}\\cdot\\frac{1}{3}=\\frac{48}{27}=\\frac{16}{9}\\approx 1.78$$ (positive, clearly the peak)\n+ At $$x=1$$: $$\\mathrm{f}(1)=0$$ (boundary, minimum)\n\nThe mode is $$x=\\frac{2}{3}$$ — the interior critical point where $$\\mathrm{f}$$ is maximized. Always verify: setting the derivative to zero finds *all* critical points (maxima, minima, or saddle points), and you must confirm which is the actual maximum, often by checking values or using a sketch.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "The variance of a continuous random variable can be written in two forms: $$\\operatorname{Var}(X)=\\int(x-\\mu)^2\\mathrm{f}(x)\\,\\mathrm{d}x$$ and $$\\operatorname{Var}(X)=\\mathrm{E}(X^2)-\\mu^2$$. Why are these equivalent, and which is typically easier to compute? (3 steps)", "answer": "- Step 1: The first form is the direct definition: the average squared deviation from the mean, weighted by probability density. It's analogous to the discrete $$\\operatorname{Var}(X)=\\sum(x-\\mu)^2\\mathrm{P}(X=x)$$.\n- Step 2: To see equivalence, expand $$\\int(x-\\mu)^2\\mathrm{f}(x)\\,\\mathrm{d}x$$:\n$$\\int(x^2-2\\mu x+\\mu^2)\\mathrm{f}(x)\\,\\mathrm{d}x=\\int x^2\\mathrm{f}(x)\\,\\mathrm{d}x-2\\mu\\int x\\mathrm{f}(x)\\,\\mathrm{d}x+\\mu^2\\int\\mathrm{f}(x)\\,\\mathrm{d}x$$\n+ The first term is $$\\mathrm{E}(X^2)$$\n+ The second term is $$2\\mu \\cdot \\mathrm{E}(X)=2\\mu \\cdot \\mu=2\\mu^2$$\n+ The third term is $$\\mu^2 \\cdot 1=\\mu^2$$ (since the total integral of $$\\mathrm{f}(x)$$ is 1)\n- Step 3: Combining: $$\\mathrm{E}(X^2)-2\\mu^2+\\mu^2=\\mathrm{E}(X^2)-\\mu^2$$. The second form is **easier to compute** because you just need two integrals ($$\\mathrm{E}(X)$$ and $$\\mathrm{E}(X^2)$$) rather than computing the mean first and then integrating $$(x-\\mu)^2\\mathrm{f}(x)$$, which involves an awkward shifted integrand.\n\nThe formula $$\\operatorname{Var}(X)=\\mathrm{E}(X^2)-(\\mathrm{E}(X))^2$$ is the go-to computational tool.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "For a continuous random variable, explain why $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$ in general. When would they be equal? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X^2) = \\int x^2 \\mathrm{f}(x)\\,\\mathrm{d}x$$ is the average of $$x^2$$ weighted by the p.d.f. Meanwhile, $$(\\mathrm{E}(X))^2 = \\left(\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x\\right)^2$$ is the square of the average of $$x$$. By Jensen's inequality, for a convex function like squaring, $$\\mathrm{E}(g(X)) \\geq g(\\mathrm{E}(X))$$, so $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$.\n- Step 2: Equality holds only when $$\\operatorname{Var}(X) = 0$$, i.e., when $$X$$ is a constant (degenerate distribution with all probability at one point). Since $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$, and variance is zero only for a constant, the two are almost always unequal for any non-trivial random variable.\n\nThis is precisely why variance is defined as $$\\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 \\geq 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "A continuous random variable $$X$$ has $$\\mathrm{f}(x) = \\begin{cases} 2(x-2) & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$$. Without computing, is the mean closer to 2 or 3? (2 steps)", "answer": "- Step 1: The p.d.f. is increasing on $$[2, 3]$$ (from 0 at $$x=2$$ to 2 at $$x=3$$). More probability weight is concentrated near $$x = 3$$ than near $$x = 2$$.\n- Step 2: The mean is therefore pulled toward 3, so it's closer to 3. (Exact: $$\\mathrm{E}(X) = \\frac{8}{3} \\approx 2.67$$, which is closer to 3 than to 2.)\n\nAn increasing p.d.f. always pulls the mean above the midpoint; a decreasing one pulls it below.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "Define the mode of a continuous random variable. Is the mode always in the \"middle\" of the distribution? Give a counterexample. (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ for which the p.d.f. $$\\mathrm{f}(x)$$ is a maximum. It is the \"most likely\" region — the point of greatest probability density.\n- Step 2: The mode is *not* always in the middle. For example, if $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$, the mode is at $$x = 1$$ (the right endpoint), not the middle. For a triangular p.d.f. with peak at one end, the mode is at that end. The mode can even be at a boundary, far from the mean or median.\n\nThe mode is purely about where the density is highest — it has no obligation to be central.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "A p.d.f. is defined as $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{8}x & 0 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the median of $X$ and explain why it's different from the mean. (3 steps)", "answer": "- Step 1: Find the c.d.f.: for $0 \\leq x \\leq 4$, $\\mathrm{F}(x) = \\int_0^x \\frac{1}{8}t\\,dt = \\frac{x^2}{16}$. At $x = 4$, $\\mathrm{F}(4) = 1$, so this is valid.\n- Step 2: Find the median $m$ where $\\mathrm{F}(m) = 0.5$: $\\frac{m^2}{16} = 0.5$, so $m^2 = 8$, giving $m = \\sqrt{8} \\approx 2.83$.\n- Step 3: Find the mean: $\\mathrm{E}(X) = \\int_0^4 x \\cdot \\frac{1}{8}x\\,dx = \\int_0^4 \\frac{1}{8}x^2\\,dx = [\\frac{x^3}{24}]_0^4 = \\frac{64}{24} = \\frac{8}{3} \\approx 2.67$.\n\nThe median (2.83) is greater than the mean (2.67) because the distribution is right-skewed (the p.d.f. increases linearly, so more density toward higher values). For right-skewed distributions, the mean is pulled toward the tail, making it less than the median.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "To find the mode of a continuous random variable, you set $$\\mathrm{f}'(x) = 0$$ and solve. What additional checks must you perform to confirm the answer is actually the mode? (2 steps)", "answer": "- Step 1: Check that the solution is within the valid range of $$x$$. If $$\\mathrm{f}'(x) = 0$$ gives a value outside the domain where $$\\mathrm{f}(x) > 0$$, it's not the mode.\n- Step 2: Check that this critical point is a *maximum*, not a minimum. You can verify this by sketching the p.d.f., or by checking that $$\\mathrm{f}''(x) < 0$$ at the critical point. Also check the boundary values — if the p.d.f. is strictly increasing on its domain, the mode is at the upper boundary (even though $$\\mathrm{f}'(x) \\neq 0$$ there).\n\nA common error: finding where $$\\mathrm{f}'(x) = 0$$ and declaring it the mode without checking it's a maximum or checking endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "A continuous random variable $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} k & 1 < x < 2 \\\\ k(x-1) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the value of $k$ using two different methods and explain both. (3 steps)", "answer": "- Step 1: Method 1 - Integration. The total area must equal 1: $\\int_1^2 k\\,dx + \\int_2^4 k(x-1)\\,dx = 1$. Computing: $k[x]_1^2 + k[\\frac{x^2}{2} - x]_2^4 = k + k((8-4) - (2-2)) = k + 4k = 5k$. So $5k = 1$, giving $k = \\frac{1}{5}$.\n- Step 2: Method 2 - Geometric approach. The p.d.f. consists of a rectangle (width 1, height $k$) plus a triangle/trapezium (base from 2 to 4, with heights $k$ at $x=2$ and $3k$ at $x=4$).\n- Step 3: Area = rectangle ($1 \\times k = k$) + triangle ($\\frac{1}{2} \\times 2 \\times (k + 3k) = 4k$) = $5k$. Setting $5k = 1$ gives $k = \\frac{1}{5}$.\n\nBoth methods yield the same answer. The geometric method is faster when the p.d.f. consists of simple shapes.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "Explain the difference between the p.d.f. and the c.d.f. of a continuous random variable. Why do we need both? (2 steps)", "answer": "- Step 1: The probability density function $\\mathrm{f}(x)$ gives the \"density\" of probability at each point—it tells us how probability is distributed across the range. The cumulative distribution function $\\mathrm{F}(x) = \\mathrm{P}(X \\leq x)$ gives the total probability up to that point.\n- Step 2: We need both because they serve different purposes: the p.d.f. is useful for finding probabilities of intervals (via integration), while the c.d.f. is useful for finding percentiles, quartiles, and medians (by solving $\\mathrm{F}(x) = p$). The c.d.f. also makes it easy to compute $\\mathrm{P}(a < X < b) = \\mathrm{F}(b) - \\mathrm{F}(a)$ without performing integration each time.\n\nThe p.d.f. answers \"how dense is probability here?\", while the c.d.f. answers \"how much probability is below this value?\"", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "What is the cumulative distribution function (c.d.f.) $$\\mathrm{F}(x)$$, and how does it relate geometrically to the p.d.f. $$\\mathrm{f}(x)$$? (2 steps)", "answer": "- Step 1: The c.d.f. is defined as $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. It gives the probability that the random variable takes a value less than or equal to $$x$$.\n- Step 2: Geometrically, $$\\mathrm{F}(x)$$ equals the area under the p.d.f. curve to the *left* of $$x$$. As $$x$$ increases, more area accumulates, so $$\\mathrm{F}(x)$$ is a non-decreasing function that starts at 0 (for very small $$x$$) and ends at 1 (for very large $$x$$).\n\nThe c.d.f. converts probability calculations from integration into simple evaluation: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{F}(b) - \\mathrm{F}(a)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "The exponential distribution has the \"memoryless property\": $$\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$$. Explain what this means in plain language, using the example of a light bulb's lifetime. (2 steps)", "answer": "- Step 1: In plain language: given that the light bulb has already lasted $$a$$ hours, the probability it lasts another $$b$$ hours is the same as the probability that a brand-new bulb lasts $$b$$ hours. The bulb doesn't \"age\" — its future lifetime distribution is the same as when it was new.\n- Step 2: Mathematically: $$\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)} = \\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$$. The exponential is the *only* continuous distribution with this property, which is why it's used to model \"time until next event\" in Poisson processes.\n\nThis property is both the strength and weakness of the exponential model: it's analytically convenient but unrealistic for things that genuinely wear out.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "For a continuous random variable X with p.d.f. f(x), prove that E(g(X)) = ∫ g(x) f(x) dx. Why is this a useful generalization? (2 steps)", "answer": "- Step 1: This follows directly from the definition. For any function g, the expected value is the \"weighted average\" of g(X), where each value is weighted by its probability. For continuous variables, the probability of landing in [x, x + dx] is f(x)dx, so the contribution to E(g(X)) from this interval is g(x) · f(x)dx. Summing (integrating) over all x gives E(g(X)).\n\n- Step 2: This is useful because it allows us to find expected values of any function of X without finding the distribution of g(X) first. For example, to find E(X²), we use g(X) = X², giving E(X²) = ∫ x² f(x)dx directly. This is the key to the variance formula Var(X) = E(X²) - [E(X)]².\n\n+ The discrete analog is E(g(X)) = Σ g(x) · P(X = x), showing the beautiful parallel between discrete and continuous cases.", "source": "MiniMax ②", "_id": "minimax_2_36"}, {"question": "For the exponential distribution with rate $$\\lambda$$, the mean is $$\\frac{1}{\\lambda}$$ and the variance is $$\\frac{1}{\\lambda^2}$$. What is the standard deviation, and what does the relationship $$\\text{mean} = \\text{standard deviation}$$ tell you about the shape of the distribution? (2 steps)", "answer": "- Step 1: The standard deviation is $$\\sigma = \\sqrt{\\frac{1}{\\lambda^2}} = \\frac{1}{\\lambda}$$. So the mean equals the standard deviation: $$\\mu = \\sigma$$.\n- Step 2: This means the spread is as large as the typical value itself. The distribution is highly right-skewed — values can range from 0 to very large, with a long right tail. This is characteristic of \"time until event\" distributions where most events happen quickly but some take much longer.\n\nThe equality of mean and standard deviation is a unique signature of the exponential distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "What is the mode of a continuous random variable, and how does its definition differ from the mode of a discrete random variable? (2 steps)", "answer": "- Step 1: For a **continuous** random variable, the mode is the value of $$x$$ at which the p.d.f. $$\\mathrm{f}(x)$$ reaches its **maximum**. This is the value where the probability density is highest — the \"most crowded\" or \"most likely region\" of the distribution. You find it by solving $$\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{f}(x)=0$$ and verifying a maximum (or by inspecting a sketch).\n- Step 2: For a **discrete** random variable, the mode is the value of $$x$$ with the highest probability $$\\mathrm{P}(X=x)$$ — you just look for the largest entry in the probability table. The continuous version replaces \"highest probability\" with \"highest probability density\" because individual point probabilities are all 0. The mode is a **location** measure, not a probability value — it tells you *where* the distribution is most dense, not *how much* probability is there.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "A p.d.f. for website visit duration is $$\\mathrm{f}(x)=\\frac{1}{60}(x+1)$$ for $$0 \\leqslant x \\leqslant 10$$ (minutes). If you want the probability a visitor spends less than 30 seconds, what must you be careful about regarding units? (2 steps)", "answer": "- Step 1: The random variable $$X$$ is defined **in minutes**, so $$x$$ represents minutes. The p.d.f. and all limits of integration are in minutes. \"30 seconds\" is **0.5 minutes**, not 30. You must convert: $$\\mathrm{P}(X < 30\\text{ seconds}) = \\mathrm{P}(X < 0.5) = \\int_{0}^{0.5}\\frac{1}{60}(x+1)\\,\\mathrm{d}x$$.\n- Step 2: This is a common trap in applied problems: the p.d.f. is calibrated in one unit (minutes), but the question might phrase things in another unit (seconds). Always check what units the random variable uses, and convert the query into those units before integrating. The integral itself is straightforward once the limits are correct:\n$$\\int_{0}^{0.5}\\frac{1}{60}(x+1)\\,\\mathrm{d}x = \\frac{1}{60}\\left[\\frac{x^2}{2}+x\\right]_{0}^{0.5}=\\frac{1}{60}\\left(\\frac{0.25}{2}+0.5\\right)=\\frac{1}{60}\\times 0.625=\\frac{1}{96}$$\n\nUnit consistency is essential — a mismatch by a factor of 60 would give a wildly wrong answer.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "A student reasons: \"The mode is the most probable value, so $$\\mathrm{P}(X = \\text{mode})$$ must be the largest single probability.\" What's wrong with this reasoning for a continuous random variable? (2 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for *every* value of $$x$$, including the mode. So $$\\mathrm{P}(X = \\text{mode}) = 0$$, the same as for any other value.\n- Step 2: The mode is where the probability *density* is highest, not where the probability mass is highest. It's the point where the p.d.f. curve reaches its peak — meaning values *near* the mode are more likely than values near any other point. The correct interpretation: for a small interval $$\\delta$$ around the mode, $$\\mathrm{P}(\\text{mode} - \\delta < X < \\text{mode} + \\delta)$$ is larger than the same-width interval around any other point.\n\n\"Most probable\" for continuous variables means \"highest density,\" not \"highest point probability.\"", "source": "GLM 5.1 ③", "_id": "glm_3_43"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Why is it impossible to assign a non-zero probability to a continuous random variable taking one exact, specific value — and how does this fundamentally change the way we describe its distribution compared to a discrete random variable? (3 steps)", "answer": "- Step 1: A continuous random variable can take infinitely many values in a range (e.g., any real number between 0 and 1). If you tried to assign positive probability to each specific value, the total probability would blow up to infinity — violating the requirement that total probability equals 1. The only way to keep the total at 1 while distributing probability across infinitely many points is to assign probability 0 to each individual point.\n- Step 2: For a discrete random variable, we describe the distribution with a table or function listing $$\\mathrm{P}(X=x)$$ for each value in the sample space. This works because there are finitely many (or countably many) values. For a continuous random variable, $$\\mathrm{P}(X=x)=0$$ for every $$x$$, so this approach is useless — every entry would be 0.\n- Step 3: Instead, we describe a continuous distribution using a **probability density function** $$\\mathrm{f}(x)$$, where probabilities are assigned to **ranges** of values, not individual points. The probability that $$X$$ falls between $$a$$ and $$b$$ is the **area under the curve** of $$\\mathrm{f}(x)$$ over that interval: $$\\mathrm{P}(a<X<b)=\\int_{a}^{b}\\mathrm{f}(x)\\,\\mathrm{d}x$$. The density function doesn't give probability directly — it gives probability *per unit length*, which must be integrated to yield actual probability.\n\nThis is analogous to how a single point on a line has zero length, but an interval of points has positive length.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "What two conditions must a probability density function $$\\mathrm{f}(x)$$ satisfy to be valid, and what is the physical/geometric intuition behind each? (2 steps)", "answer": "- Step 1: **Condition 1:** $$\\mathrm{f}(x) \\geqslant 0$$ for all $$x \\in \\mathbb{R}$$. The geometric intuition: the p.d.f. curve must never dip below the $$x$$-axis. Since probabilities are computed as areas under the curve, a negative $$\\mathrm{f}(x)$$ would imply a \"negative area,\" which would mean a negative probability — and probabilities cannot be negative. This is the same reason a discrete probability function must have non-negative values.\n- Step 2: **Condition 2:** $$\\int_{-\\infty}^{\\infty}\\mathrm{f}(x)\\,\\mathrm{d}x=1$$. The geometric intuition: the **total area** under the entire p.d.f. curve must equal exactly 1. This represents the certainty that $$X$$ takes some value somewhere in its range. If the total area were less than 1, some probability would be \"missing\"; if greater than 1, we'd have more than 100% total probability — both are impossible.\n\nIn practice, since $$\\mathrm{f}(x)=0$$ outside a finite interval, you only need to integrate over the region where $$\\mathrm{f}(x)$$ is non-zero.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A function is proposed as a p.d.f.: $$\\mathrm{f}(x)=\\left\\{\\begin{array}{cc}k(2-x) & -2 \\leqslant x \\leqslant 2 \\\\ 0 & \\text{otherwise}\\end{array}\\right.$$ where $$k>0$$. Without doing any integration, can you immediately identify a problem that makes this impossible as a p.d.f. regardless of the value of $$k$$? (2 steps)", "answer": "- Step 1: We need to check whether $$\\mathrm{f}(x) \\geqslant 0$$ for all $$x$$ in the domain. On the interval $$-2 \\leqslant x \\leqslant 2$$, the function is $$k(2-x)$$, where $$k$$ is positive. When $$x$$ is close to 2, $$k(2-x)$$ is near 0 (fine). But when $$x$$ is negative (e.g., $$x=-2$$), we get $$k(2-(-2))=k \\times 4=4k>0$$ — still positive. Actually, for $$-2 \\leqslant x \\leqslant 2$$, since $$2-x \\geqslant 0$$ (because $$x \\leqslant 2$$), the function is always non-negative in this range. So there is no non-negativity problem here.\n- Step 2: Wait — let me reconsider. The textbook example (c) has $$\\mathrm{f}(x)=kx(5-x)$$ on $$0 \\leqslant x \\leqslant 6$$. The issue there is that $$x(5-x)$$ becomes **negative** when $$x>5$$, and since the domain extends to $$x=6$$, there exist values where $$\\mathrm{f}(x)<0$$, making it invalid regardless of $$k>0$$. The key lesson: **always check that the function stays non-negative over its entire stated domain**, not just at the endpoints. A quadratic like $$x(5-x)$$ is positive between its roots (0 and 5) but negative outside them — so if the domain extends beyond the roots, the p.d.f. fails.\n\nThe proposed function $$k(2-x)$$ on $$[-2,2]$$ actually works (it's non-negative there), so it *could* be a valid p.d.f. for the right $$k$$. The trap to watch for is functions that go negative *within* their stated domain.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A proposed p.d.f. is $$\\mathrm{f}(x)=\\left\\{\\begin{array}{cc}x^3-2 & -1 \\leqslant x \\leqslant 3 \\\\ 0 & \\text{otherwise}\\end{array}\\right.$$ Why can this never be a valid p.d.f., no matter what constant you multiply it by? (2 steps)", "answer": "- Step 1: The first requirement for any p.d.f. is $$\\mathrm{f}(x) \\geqslant 0$$ for all $$x$$ in its domain. Let's check $$x^3-2$$ on $$-1 \\leqslant x \\leqslant 3$$. At $$x=-1$$: $$(-1)^3-2=-1-2=-3<0$$. At $$x=0$$: $$0-2=-2<0$$. At $$x=1$$: $$1-2=-1<0$$. The function is negative for all $$x < \\sqrt[3]{2} \\approx 1.26$$, which covers a large portion of the interval $$[-1,3]$$.\n- Step 2: Even if we multiply by a positive constant $$k$$, we get $$k(x^3-2)$$, which is still negative wherever $$x^3-2<0$$ (i.e., for $$x<\\sqrt[3]{2}$$). Multiplying by a positive constant cannot flip negative values to positive — it only scales them. So no positive $$k$$ can make this function non-negative everywhere on its domain.\n\nThis illustrates a crucial point: before checking the \"total area = 1\" condition, you must **first** verify non-negativity. If the function goes negative anywhere in its domain, it's automatically disqualified.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "A p.d.f. is $$\\mathrm{f}(x)=\\left\\{\\begin{array}{cc}k\\left(4x-x^2\\right) & 2 \\leqslant x \\leqslant 4 \\\\ 0 & \\text{otherwise}\\end{array}\\right.$$ Conceptually, how do you find the value of $$k$$ that makes this valid, and what does $$k$$ represent geometrically? (2 steps)", "answer": "- Step 1: The total area under the p.d.f. must equal 1. The \"raw\" area under $$4x-x^2$$ between $$x=2$$ and $$x=4$$ (without the factor $$k$$) is some number, say $$A$$. Then the actual area under $$k(4x-x^2)$$ is $$k \\times A$$. We need $$k \\times A = 1$$, so $$k = \\frac{1}{A}$$.\n+ For this specific function: $$A = \\int_{2}^{4}(4x-x^2)\\,\\mathrm{d}x = \\left[2x^2-\\frac{x^3}{3}\\right]_{2}^{4}=\\left(32-\\frac{64}{3}\\right)-\\left(8-\\frac{8}{3}\\right)=\\frac{16}{3}$$, giving $$k=\\frac{3}{16}$$.\n- Step 2: Geometrically, $$k$$ is a **vertical scaling factor** that stretches or compresses the curve so that the total area under it becomes exactly 1. If the raw area $$A$$ is too large (greater than 1), $$k<1$$ squishes the curve down; if $$A$$ is too small, $$k>1$$ stretches it up. The value $$k=\\frac{1}{A}$$ is the exact factor that normalizes the area to 1.\n\nThink of $$k$$ as the \"probability density per unit area\" — it adjusts the height of the curve so the probability content is correctly distributed.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "For a continuous random variable, why does it make no difference whether you write $$\\mathrm{P}(a < X < b)$$, $$\\mathrm{P}(a \\leqslant X < b)$$, $$\\mathrm{P}(a < X \\leqslant b)$$, or $$\\mathrm{P}(a \\leqslant X \\leqslant b)$$? (2 steps)", "answer": "- Step 1: For a continuous random variable, the probability of taking any one exact value is zero: $$\\mathrm{P}(X=a)=0$$ and $$\\mathrm{P}(X=b)=0$$. This is because the p.d.f. assigns probability to *intervals* via area, and a single point has zero width — hence zero area under the curve.\n- Step 2: Therefore, adding or removing the endpoints doesn't change the probability:\n+ $$\\mathrm{P}(a \\leqslant X \\leqslant b) = \\mathrm{P}(a < X < b) + \\mathrm{P}(X=a) + \\mathrm{P}(X=b) = \\mathrm{P}(a < X < b) + 0 + 0 = \\mathrm{P}(a < X < b)$$\n\nAll four versions give the same integral $$\\int_{a}^{b}\\mathrm{f}(x)\\,\\mathrm{d}x$$. This is fundamentally different from discrete random variables, where $$\\mathrm{P}(X=a)$$ can be positive and the inclusion/exclusion of endpoints matters.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A piecewise p.d.f. has two regions: $$\\mathrm{f}(x)=k$$ for $$1<x<2$$, and $$\\mathrm{f}(x)=k(x-1)$$ for $$2 \\leqslant x \\leqslant 4$$, and 0 elsewhere. When finding $$k$$, why must you integrate *both* pieces and add them, rather than just one? What's the geometric picture? (2 steps)", "answer": "- Step 1: The total probability must be 1, meaning the total area under the **entire** p.d.f. curve must equal 1. Since the p.d.f. is defined in two separate regions, the total area is the sum of the areas in each region. You compute:\n$$\\int_{1}^{2}k\\,\\mathrm{d}x + \\int_{2}^{4}k(x-1)\\,\\mathrm{d}x = 1$$\n+ The first integral gives a **rectangle** of width 1 and height $$k$$, area = $$k$$.\n+ The second integral gives a **trapezium** (or triangle-like shape) from $$x=2$$ to $$x=4$$, where the height grows from $$k(2-1)=k$$ to $$k(4-1)=3k$$.\n- Step 2: Geometrically, the total area is a rectangle plus a trapezium. The rectangle area is $$k \\times 1 = k$$. The trapezium has parallel sides of height $$k$$ and $$3k$$, width 2, so area = $$\\frac{1}{2}(k+3k) \\times 2 = 4k$$. Total area = $$k + 4k = 5k = 1$$, so $$k = \\frac{1}{5}$$. You can often find $$k$$ faster by computing areas geometrically rather than integrating, especially when the pieces are simple shapes (rectangles, triangles, trapezia).\n\nThe key principle: **every piece of the p.d.f. contributes area, and all contributions must sum to 1.**", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A p.d.f. for website visit duration is $$\\mathrm{f}(x)=\\frac{1}{60}(x+1)$$ for $$0 \\leqslant x \\leqslant 10$$ (minutes). If you want the probability a visitor spends less than 30 seconds, what must you be careful about regarding units? (2 steps)", "answer": "- Step 1: The random variable $$X$$ is defined **in minutes**, so $$x$$ represents minutes. The p.d.f. and all limits of integration are in minutes. \"30 seconds\" is **0.5 minutes**, not 30. You must convert: $$\\mathrm{P}(X < 30\\text{ seconds}) = \\mathrm{P}(X < 0.5) = \\int_{0}^{0.5}\\frac{1}{60}(x+1)\\,\\mathrm{d}x$$.\n- Step 2: This is a common trap in applied problems: the p.d.f. is calibrated in one unit (minutes), but the question might phrase things in another unit (seconds). Always check what units the random variable uses, and convert the query into those units before integrating. The integral itself is straightforward once the limits are correct:\n$$\\int_{0}^{0.5}\\frac{1}{60}(x+1)\\,\\mathrm{d}x = \\frac{1}{60}\\left[\\frac{x^2}{2}+x\\right]_{0}^{0.5}=\\frac{1}{60}\\left(\\frac{0.25}{2}+0.5\\right)=\\frac{1}{60}\\times 0.625=\\frac{1}{96}$$\n\nUnit consistency is essential — a mismatch by a factor of 60 would give a wildly wrong answer.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "What is the cumulative distribution function $$\\mathrm{F}(x)$$, and how does it relate conceptually and mathematically to the probability density function $$\\mathrm{f}(x)$$? (3 steps)", "answer": "- Step 1: The c.d.f. $$\\mathrm{F}(x)$$ is defined as $$\\mathrm{F}(x)=\\mathrm{P}(X \\leqslant x)$$ — it gives the probability that the random variable takes a value **at most** $$x$$. Geometrically, this is the **total area under the p.d.f. curve to the left of** $$x$$.\n- Step 2: Mathematically, the c.d.f. is obtained by **integrating** the p.d.f.: $$\\mathrm{F}(x)=\\int_{-\\infty}^{x}\\mathrm{f}(t)\\,\\mathrm{d}t$$ (note: we use the dummy variable $$t$$ to avoid confusion with the upper limit $$x$$). Conversely, the p.d.f. is obtained by **differentiating** the c.d.f.: $$\\mathrm{f}(x)=\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$.\n- Step 3: The relationship is: **p.d.f. is the rate of change (derivative) of cumulative probability**, and **c.d.f. is the accumulated total (integral) of probability density**. This is exactly analogous to velocity vs. position: velocity is the derivative of position, and position is the integral of velocity. The p.d.f. tells you how densely probability is \"piling up\" at each point; the c.d.f. tells you how much has piled up so far.\n\nNotation: lowercase $$\\mathrm{f}$$ for p.d.f., uppercase $$\\mathrm{F}$$ for c.d.f. — following the convention that the derivative gets lowercase and the antiderivative gets uppercase.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When specifying a c.d.f. $$\\ma
