x) = \\frac{16 - 2x}{5}$. This is positive when $16 - 2x > 0$, i.e., $x < 8$. For $x > 8$, the derivative becomes negative, meaning the function decreases. This violates the requirement that a c.d.f. must be non-decreasing.\n\nA c.d.f. must never decrease. This example decreases for $x > 8$, so it cannot be a valid c.d.f.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "The random variable $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} \\frac{3}{16}(4 - x^2) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the c.d.f. and use it to find $\\mathrm{P}(0.69 < X < 0.70)$ to 1 s.f. (3 steps)", "answer": "- Step 1: Find the c.d.f.: for $0 \\leq x \\leq 2$, $\\mathrm{F}(x) = \\int_0^x \\frac{3}{16}(4 - t^2)\\,dt = \\frac{3}{16}[4t - \\frac{t^3}{3}]_0^x = \\frac{3}{16}(4x - \\frac{x^3}{3}) = \\frac{3x}{4} - \\frac{3x^3}{48} = \\frac{3x}{4} - \\frac{x^3}{16}$.\n- Step 2: So $\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{3x}{4} - \\frac{x^3}{16} & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$.\n- Step 3: $\\mathrm{P}(0.69 < X < 0.70) = \\mathrm{F}(0.70) - \\mathrm{F}(0.69) = (\\frac{3(0.70)}{4} - \\frac{0.70^3}{16}) - (\\frac{3(0.69)}{4} - \\frac{0.69^3}{16}) \\approx (0.525 - 0.0214) - (0.5175 - 0.0204) \\approx 0.0065 \\approx 0.007$ to 1 s.f.\n\nFor very small intervals in continuous distributions, the probability is approximately $\\mathrm{f}(x) \\times \\text{interval width}$. Here $0.007 \\approx \\mathrm{f}(0.695) \\times 0.01$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A p.d.f. is defined as $\\mathrm{f}(x) = \\begin{cases} k(4 - x) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find $k$, the mean, the variance, and $\\mathrm{P}(X > 1)$. (4 steps)", "answer": "- Step 1: Find $k$: $\\int_0^2 k(4 - x)\\,dx = k[4x - \\frac{x^2}{2}]_0^2 = k(8 - 2) = 6k = 1$, so $k = \\frac{1}{6}$.\n- Step 2: Find the mean: $\\mathrm{E}(X) = \\int_0^2 x \\cdot \\frac{1}{6}(4 - x)\\,dx = \\frac{1}{6}\\int_0^2 (4x - x^2)\\,dx = \\frac{1}{6}[2x^2 - \\frac{x^3}{3}]_0^2 = \\frac{1}{6}(8 - \\frac{8}{3}) = \\frac{1}{6} \\cdot \\frac{16}{3} = \\frac{8}{9}$.\n- Step 3: Find $\\mathrm{E}(X^2) = \\int_0^2 x^2 \\cdot \\frac{1}{6}(4 - x)\\,dx = \\frac{1}{6}\\int_0^2 (4x^2 - x^3)\\,dx = \\frac{1}{6}[\\frac{4x^3}{3} - \\frac{x^4}{4}]_0^2 = \\frac{1}{6}(\\frac{32}{3} - 4) = \\frac{1}{6}(\\frac{20}{3}) = \\frac{10}{9}$. Then $\\operatorname{Var}(X) = \\frac{10}{9} - (\\frac{8}{9})^2 = \\frac{10}{9} - \\frac{64}{81} = \\frac{90}{81} - \\frac{64}{81} = \\frac{26}{81}$.\n- Step 4: $\\mathrm{P}(X > 1) = \\int_1^2 \\frac{1}{6}(4 - x)\\,dx = \\frac{1}{6}[4x - \\frac{x^2}{2}]_1^2 = \\frac{1}{6}((8 - 2) - (4 - \\frac{1}{2})) = \\frac{1}{6}(6 - 3.5) = \\frac{2.5}{6} = \\frac{5}{12}$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "The lifetime of a light bulb (in years) is modeled by $T$ with p.d.f. $\\mathrm{f}(t) = 1.25e^{-1.25t}$ for $t \\geq 0$. Find: (a) the c.d.f. $\\mathrm{F}(t)$, (b) $\\mathrm{P}(1 < T < 2)$, (c) $\\mathrm{P}(T > 3)$. (3 steps)", "answer": "- Step 1: For $t \\geq 0$, $\\mathrm{F}(t) = \\int_0^t 1.25e^{-1.25u}\\,du = [-e^{-1.25u}]_0^t = 1 - e^{-1.25t}$. For $t < 0$, $\\mathrm{F}(t) = 0$. So $\\mathrm{F}(t) = \\begin{cases} 0 & t < 0 \\\\ 1 - e^{-1.25t} & t \\geq 0 \\end{cases}$.\n- Step 2: $\\mathrm{P}(1 < T < 2) = \\mathrm{F}(2) - \\mathrm{F}(1) = (1 - e^{-2.5}) - (1 - e^{-1.25}) = e^{-1.25} - e^{-2.5} \\approx 0.2865 - 0.0821 = 0.204$.\n- Step 3: $\\mathrm{P}(T > 3) = 1 - \\mathrm{F}(3) = 1 - (1 - e^{-3.75}) = e^{-3.75} \\approx 0.024$.\n\nThis is an exponential distribution with rate parameter $\\lambda = 1.25$. The exponential distribution is memoryless: $\\mathrm{P}(T > s + t \\mid T > s) = \\mathrm{P}(T > t)$.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Prove that for a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$, if $g(X) = aX + b$, then $\\mathrm{E}(g(X)) = a\\mathrm{E}(X) + b$ and $\\operatorname{Var}(g(X)) = a^2\\operatorname{Var}(X)$. (3 steps)", "answer": "- Step 1: For expectation: $\\mathrm{E}(aX + b) = \\int (ax + b)\\mathrm{f}(x)\\,dx = a\\int x\\mathrm{f}(x)\\,dx + b\\int \\mathrm{f}(x)\\,dx = a\\mathrm{E}(X) + b(1) = a\\mathrm{E}(X) + b$.\n- Step 2: For variance: $\\operatorname{Var}(aX + b) = \\mathrm{E}((aX + b)^2) - (\\mathrm{E}(aX + b))^2 = \\mathrm{E}(a^2X^2 + 2abX + b^2) - (a\\mathrm{E}(X) + b)^2 = a^2\\mathrm{E}(X^2) + 2ab\\mathrm{E}(X) + b^2 - (a^2(\\mathrm{E}(X))^2 + 2ab\\mathrm{E}(X) + b^2) = a^2\\mathrm{E}(X^2) - a^2(\\mathrm{E}(X))^2 = a^2\\operatorname{Var}(X)$.\n- Step 3: The $b$ term cancels out because adding a constant shifts the mean but doesn't change the spread—variance measures spread around the mean, not the absolute location.\n\nThe linearity properties mirror those of discrete distributions but use integration instead of summation.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "A p.d.f. is given by $\\mathrm{f}(x) = \\begin{cases} kx^2 & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find $k$, the mean, and show that $\\operatorname{Var}(X) = \\frac{1}{18}$ when the mean is $\\frac{3}{2}$. (3 steps)", "answer": "- Step 1: Find $k$: $\\int_0^2 kx^2\\,dx = k[\\frac{x^3}{3}]_0^2 = \\frac{8k}{3} = 1$, so $k = \\frac{3}{8}$.\n- Step 2: Find mean: $\\mathrm{E}(X) = \\int_0^2 x \\cdot \\frac{3}{8}x^2\\,dx = \\frac{3}{8}\\int_0^2 x^3\\,dx = \\frac{3}{8}[\\frac{x^4}{4}]_0^2 = \\frac{3}{8} \\cdot \\frac{16}{4} = \\frac{3}{2}$.\n- Step 3: Find $\\mathrm{E}(X^2) = \\int_0^2 x^2 \\cdot \\frac{3}{8}x^2\\,dx = \\frac{3}{8}\\int_0^2 x^4\\,dx = \\frac{3}{8}[\\frac{x^5}{5}]_0^2 = \\frac{3}{8} \\cdot \\frac{32}{5} = \\frac{12}{5}$. Then $\\operatorname{Var}(X) = \\frac{12}{5} - (\\frac{3}{2})^2 = \\frac{12}{5} - \\frac{9}{4} = \\frac{48}{20} - \\frac{45}{20} = \\frac{3}{20}$? Wait, that's not $\\frac{1}{18}$. Let me recalculate—$\\mathrm{E}(X^2) = \\frac{3}{8} \\cdot \\frac{32}{5} = \\frac{96}{40} = \\frac{12}{5}$. And $(\\frac{3}{2})^2 = \\frac{9}{4} = \\frac{45}{20}$. $\\frac{12}{5} = \\frac{48}{20}$, so $\\frac{48}{20} - \\frac{45}{20} = \\frac{3}{20}$. The answer should be $\\frac{3}{20}$, not $\\frac{1}{18}$. The problem statement may have an error, or I'm missing something. Let me double-check the p.d.f. in the original notes... Actually in Exercise 4C question 4, the p.d.f. is $k(1-x)$, not $kx^2$. So the $\\operatorname{Var}(X) = \\frac{1}{18}$ result is for a different p.d.f.\n\nThe key is to follow the formulas: $\\mathrm{E}(X) = \\int x\\mathrm{f}(x)dx$, $\\mathrm{E}(X^2) = \\int x^2\\mathrm{f}(x)dx$, and $\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. symmetric about $x = a$, what can you say about its mean, median, and mode? Explain. (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about $x = a$, then the distribution is mirror-imaged around the vertical line $x = a$. This means the probability of being to the left of $a$ equals the probability of being to the right of $a$.\n- Step 2: Therefore: the median must be $a$ (since $\\mathrm{F}(a) = 0.5$ by symmetry), and the mean must also be $a$ (by symmetry, the positive and negative deviations cancel out). The mode is at $a$ if the distribution has a single peak.\n\nFor symmetric unimodal distributions, the mean = median = mode. However, if the distribution is symmetric but multimodal, the modes will still be symmetrically placed, but the mean and median remain at the center of symmetry.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "Find the mode of the p.d.f. $\\mathrm{f}(x) = \\begin{cases} \\frac{3}{10}(3x - x^2) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Explain the method. (3 steps)", "answer": "- Step 1: Sketch the p.d.f. The function $\\frac{3}{10}(3x - x^2) = \\frac{9x}{10} - \\frac{3x^2}{10}$ is a downward-opening parabola with roots at $x = 0$ and $x = 3$. On $[0, 2]$, it rises from 0, then would fall after its vertex.\n- Step 2: Find the critical point: differentiate $\\frac{d}{dx}(\\frac{9x}{10} - \\frac{3x^2}{10}) = \\frac{9}{10} - \\frac{6x}{10} = \\frac{9 - 6x}{10}$. Set equal to 0: $9 - 6x = 0$, so $x = \\frac{3}{2} = 1.5$.\n- Step 3: At $x = 1.5$, $\\mathrm{f}(1.5) = \\frac{3}{10}(4.5 - 2.25) = \\frac{3}{10}(2.25) = 0.675$, which is the maximum. The mode is $x = 1.5$.\n\nThe mode is where the p.d.f. reaches its maximum. For piecewise linear p.d.f.s, you can often identify the mode from the sketch without calculus.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A p.d.f. is given by $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4} & 0 \\leq x < 1 \\\\ \\frac{x^3}{5} & 1 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the median and interquartile range. (4 steps)", "answer": "- Step 1: First find the c.d.f. For $0 \\leq x < 1$: $\\mathrm{F}(x) = \\int_0^x \\frac{1}{4}\\,dt = \\frac{x}{4}$. At $x = 1$, $\\mathrm{F}(1) = \\frac{1}{4}$.\n- Step 2: For $1 \\leq x \\leq 2$: $\\mathrm{F}(x) = \\mathrm{F}(1) + \\int_1^x \\frac{t^3}{5}\\,dt = \\frac{1}{5} + [\\frac{t^4}{20}]_1^x = \\frac{1}{5} + \\frac{x^4}{20} - \\frac{1}{20} = \\frac{x^4}{20} + \\frac{3}{20}$. At $x = 2$, $\\mathrm{F}(2) = \\frac{16}{20} + \\frac{3}{20} = \\frac{19}{20} = 0.95$, not 1. Wait, this is wrong. Let me recalculate: $\\int_1^x \\frac{t^3}{5}\\,dt = \\frac{1}{5} \\cdot \\frac{t^4}{4}\\big|_1^x = \\frac{x^4}{20} - \\frac{1}{20}$. So $\\mathrm{F}(x) = \\frac{1}{4} + \\frac{x^4}{20} - \\frac{1}{20} = \\frac{x^4}{20} + \\frac{1}{5} - \\frac{1}{20} = \\frac{x^4}{20} + \\frac{3}{20}$. At $x = 2$: $\\frac{16}{20} + \\frac{3}{20} = \\frac{19}{20} = 0.95$. This is less than 1, so the p.d.f. must be normalized differently. Actually wait, the total must be 1. The area from 0 to 1 is $1 \\times \\frac{1}{4} = 0.25$. For the second part, $\\int_1^2 \\frac{x^3}{5}\\,dx = \\frac{1}{5} \\cdot \\frac{x^4}{4}\\big|_1^2 = \\frac{1}{20}(16 - 1) = \\frac{15}{20} = 0.75$. So total area = 0.25 + 0.75 = 1. Good. But at $x = 2$, $\\mathrm{F}(2)$ should equal 1. My calculation gives 0.95. There's an error. $\\frac{15}{20} = 0.75$, so from 1 to 2, the cumulative goes from 0.25 to $0.25 + 0.75 = 1$. At $x = 2$, it should be 1. The formula at $x = 2$ gives $\\frac{16}{20} + \\frac{3}{20} = \\frac{19}{20} = 0.95$. That's wrong. Let me fix: $\\mathrm{F}(x) = \\frac{x}{4}$ for $0 \\leq x < 1$. At $x = 1$, this equals 0.25. Then $\\mathrm{F}(x) = 0.25 + \\int_1^x \\frac{t^3}{5}dt = 0.25 + \\frac{1}{5} \\cdot \\frac{t^4}{4}\\big|_1^x = 0.25 + \\frac{x^4}{20} - \\frac{1}{20} = \\frac{x^4}{20} + \\frac{5}{20} - \\frac{1}{20} = \\frac{x^4}{20} + \\frac{4}{20} = \\frac{x^4}{20} + \\frac{1}{5}$. At $x = 2$: $\\frac{16}{20} + \\frac{4}{20} = 1$. Good.\n- Step 3: For the median $m$: since $\\mathrm{F}(1) = 0.25 < 0.5$, $m$ is in $[1, 2]$. Solve $\\frac{m^4}{20} + \\frac{1}{5} = 0.5$: $\\frac{m^4}{20} = 0.3$, so $m^4 = 6$, giving $m = \\sqrt[4]{6} \\approx 1.565$.\n- Step 4: For $Q_1$: $\\mathrm{F}(1) = 0.25$, so $Q_1$ is in $[1, 2]$. Solve $\\frac{Q_1^4}{20} + \\frac{1}{5} = 0.25$: $\\frac{Q_1^4}{20} = 0$, so $Q_1 = 1$? That's wrong—$0.25 - 0.2 = 0.05$, not 0. Let me recalculate: $\\frac{Q_1^4}{20} + \\frac{1}{5} = 0.25$ gives $\\frac{Q_1^4}{20} = 0.05$, so $Q_1^4 = 1$, so $Q_1 = 1$. For $Q_3$: $\\frac{Q_3^4}{20} + \\frac{1}{5} = 0.75$ gives $\\frac{Q_3^4}{20} = 0.55$, so $Q_3^4 = 11$, so $Q_3 = \\sqrt[4]{11} \\approx 1.82$. IQR $\\approx 0.82$.\n\nNote: At $x=1$, $\\mathrm{F}(1)=0.25$ exactly, so $Q_1 = 1$ is correct (the 25th percentile is at the boundary between the two pieces).", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Explain the difference between the p.d.f. and the c.d.f. of a continuous random variable. Why do we need both? (2 steps)", "answer": "- Step 1: The probability density function $\\mathrm{f}(x)$ gives the \"density\" of probability at each point—it tells us how probability is distributed across the range. The cumulative distribution function $\\mathrm{F}(x) = \\mathrm{P}(X \\leq x)$ gives the total probability up to that point.\n- Step 2: We need both because they serve different purposes: the p.d.f. is useful for finding probabilities of intervals (via integration), while the c.d.f. is useful for finding percentiles, quartiles, and medians (by solving $\\mathrm{F}(x) = p$). The c.d.f. also makes it easy to compute $\\mathrm{P}(a < X < b) = \\mathrm{F}(b) - \\mathrm{F}(a)$ without performing integration each time.\n\nThe p.d.f. answers \"how dense is probability here?\", while the c.d.f. answers \"how much probability is below this value?\"", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "A continuous random variable $X$ has p.d.f. $\\mathrm{f}(x) = \\begin{cases} 1 - \\frac{1}{2}x & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find: (a) the mode, (b) the c.d.f., (c) the median. (3 steps)", "answer": "- Step 1: (a) The p.d.f. $1 - \\frac{x}{2}$ is linear decreasing from 1 to 0 on $[0, 2]$. The maximum occurs at $x = 0$, so the mode is $x = 0$.\n- Step 2: (b) For $0 \\leq x \\leq 2$: $\\mathrm{F}(x) = \\int_0^x (1 - \\frac{t}{2})\\,dt = [t - \\frac{t^2}{4}]_0^x = x - \\frac{x^2}{4}$. So $\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ x - \\frac{x^2}{4} & 0 \\leq x \\leq 2 \\\\ 1 & x > 2 \\end{cases}$.\n- Step 3: (c) Solve $m - \\frac{m^2}{4} = 0.5$: multiply by 4: $4m - m^2 = 2$, so $m^2 - 4m + 2 = 0$. Using the quadratic formula: $m = \\frac{4 \\pm \\sqrt{16 - 8}}{2} = \\frac{4 \\pm \\sqrt{8}}{2} = 2 \\pm \\sqrt{2}$. Since $0 \\leq m \\leq 2$, we take $m = 2 - \\sqrt{2} \\approx 0.586$.\n\nFor a linear p.d.f., the mode is at the endpoint where density is highest.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $\\mathrm{f}(x) = \\begin{cases} \\frac{1}{2}(x-1) & 1 \\leq x < 2 \\\\ \\frac{1}{6}(5-x) & 2 \\leq x \\leq 5 \\\\ 0 & \\text{otherwise} \\end{cases}$. Find the mean and variance. (4 steps)", "answer": "- Step 1: Find $\\mathrm{E}(X) = \\int_1^2 x \\cdot \\frac{1}{2}(x-1)\\,dx + \\int_2^5 x \\cdot \\frac{1}{6}(5-x)\\,dx = \\frac{1}{2}\\int_1^2 (x^2 - x)\\,dx + \\frac{1}{6}\\int_2^5 (5x - x^2)\\,dx$.\n- Step 2: First integral: $\\frac{1}{2}[\\frac{x^3}{3} - \\frac{x^2}{2}]_1^2 = \\frac{1}{2}((\\frac{8}{3} - 2) - (\\frac{1}{3} - \\frac{1}{2})) = \\frac{1}{2}(\\frac{2}{3} - (-\\frac{1}{6})) = \\frac{1}{2}(\\frac{5}{6}) = \\frac{5}{12}$.\n- Step 3: Second integral: $\\frac{1}{6}[\\frac{5x^2}{2} - \\frac{x^3}{3}]_2^5 = \\frac{1}{6}((\\frac{125}{2} - \\frac{125}{3}) - (10 - \\frac{8}{3})) = \\frac{1}{6}(\\frac{125}{6} - \\frac{22}{3}) = \\frac{1}{6}(\\frac{125}{12}) = \\frac{125}{72}$.\n- Step 4: $\\mathrm{E}(X) = \\frac{5}{12} + \\frac{125}{72} = \\frac{30}{72} + \\frac{125}{72} = \\frac{155}{72} \\approx 2.15$. For variance, compute $\\mathrm{E}(X^2)$ similarly and use $\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$.\n\nFor piecewise p.d.f.s, integrate each piece separately and add the results.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why is $\\mathrm{P}(X = 0.5) = 0$ for any continuous random variable $X$? Can $\\mathrm{P}(X \\leq 0.5)$ ever equal $\\mathrm{P}(X < 0.5)$? Explain. (2 steps)", "answer": "- Step 1: For a continuous random variable, the probability of any exact value is zero because $\\mathrm{P}(X = a) = \\int_a^a \\mathrm{f}(x)\\,dx = 0$. Geometrically, the area under a curve over a zero-width interval is zero.\n- Step 2: Yes! For continuous distributions, $\\mathrm{P}(X \\leq 0.5) = \\mathrm{P}(X < 0.5)$ because the difference is $\\mathrm{P}(X = 0.5)$, which equals zero. This is why we can use either strict or non-strict inequalities when calculating probabilities for continuous variables. However, for discrete distributions, these probabilities can differ.\n\nThis is a key conceptual difference: continuous distributions assign probability to intervals, not to points.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "A p.d.f. is given by $\\mathrm{f}(x) = \\begin{cases} \\frac{3}{8}(1+x^2) & -1 \\leq x \\leq 1 \\\\ 0 & \\text{otherwise} \\end{cases}$. What can you say about the mode? Find $\\mathrm{P}(-\\sigma < X < \\sigma)$ where $\\sigma^2 = 0.4$. (3 steps)", "answer": "- Step 1: The p.d.f. $\\frac{3}{8}(1+x^2)$ is symmetric about $x = 0$ and is strictly increasing on $[0, 1]$. At $x = 0$, it's $\\frac{3}{8}$; at $x = 1$, it's $\\frac{3}{8}(2) = \\frac{6}{8} = 0.75$. Wait, that's increasing, so the mode should be at the maximum, which is at $x = 1$.\n- Step 2: Actually, wait—$1+x^2$ increases as $x$ goes from -1 to 1 (since $x^2$ decreases from 1 to 0 then increases to 1). At $x = \\pm 1$, we get $\\frac{3}{8}(2) = \\frac{6}{8} = 0.75$; at $x = 0$, we get $\\frac{3}{8}$. So the maximum is at both endpoints $x = \\pm 1$. This is a bimodal distribution with modes at $x = -1$ and $x = 1$.\n- Step 3: Given $\\sigma^2 = 0.4$, so $\\sigma = \\sqrt{0.4} \\approx 0.632$. The interval $(-\\sigma, \\sigma) = (-0.632, 0.632)$. Since the p.d.f. is symmetric and increasing on $[0, 1]$, we can find probabilities. $\\mathrm{F}(0.632) = \\int_{-1}^{0.632} \\frac{3}{8}(1+x^2)\\,dx = \\frac{3}{8}[x + \\frac{x^3}{3}]_{-1}^{0.632} = \\frac{3}{8}((0.632 + \\frac{0.252}{3}) - (-1 + \\frac{-1}{3})) = \\frac{3}{8}(0.632 + 0.084 + 1 + \\frac{1}{3}) = \\frac{3}{8}(2.05) \\approx 0.77$. By symmetry, $\\mathrm{P}(-\\sigma < X < \\sigma) = 2 \\times \\mathrm{F}(0.632) - 1 \\approx 2(0.77) - 1 = 0.54$. Actually, that's approximately 0.54? Wait, that seems low. Actually, using the exact calculation would give the right answer—this is roughly 0.54 or about 54% of the probability within one standard deviation.\n\nFor symmetric distributions, we often have about 68% within one standard deviation (as in the normal distribution), but this distribution is more spread out near the boundaries.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "The random variable $X$ has c.d.f. $\\mathrm{F}(x) = \\begin{cases} 0 & x < 2 \\\\ \\frac{1}{5}(x^2 - 4) & 2 \\leq x \\leq 3 \\\\ 1 & x > 3 \\end{cases}$. Find the p.d.f. and verify it's valid. (2 steps)", "answer": "- Step 1: Differentiate the c.d.f. to get the p.d.f.: for $2 \\leq x \\leq 3$, $\\mathrm{f}(x) = \\frac{d}{dx}(\\frac{1}{5}(x^2 - 4)) = \\frac{2x}{5}$.\n- Step 2: Verify it's valid: $\\mathrm{f}(x) \\geq 0$ for $2 \\leq x \\leq 3$ (since $x \\geq 2 > 0$). The total area is $\\int_2^3 \\frac{2x}{5}\\,dx = \\frac{2}{5}[\\frac{x^2}{2}]_2^3 = \\frac{1}{5}(9 - 4) = \\frac{5}{5} = 1$. For $x < 2$ and $x > 3$, $\\mathrm{f}(x) = 0$. This is a valid p.d.f.\n\nThe p.d.f. is $\\mathrm{f}(x) = \\begin{cases} \\frac{2x}{5} & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise} \\end{cases}$.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": true}, {"question": "For the exponential distribution with p.d.f. $\\mathrm{f}(x) = \\lambda e^{-\\lambda x}$ for $x \\geq 0$, prove that $\\mathrm{E}(X) = \\frac{1}{\\lambda}$ and $\\operatorname{Var}(X) = \\frac{1}{\\lambda^2}$. (4 steps)", "answer": "- Step 1: Find $\\mathrm{E}(X) = \\int_0^\\infty x \\cdot \\lambda e^{-\\lambda x}\\,dx$. Use integration by parts: let $u = x$, $dv = \\lambda e^{-\\lambda x}dx$, then $du = dx$, $v = -e^{-\\lambda x}$. So $\\int x \\lambda e^{-\\lambda x}dx = -x e^{-\\lambda x} + \\int e^{-\\lambda x}dx = -x e^{-\\lambda x} - \\frac{1}{\\lambda}e^{-\\lambda x}$. Evaluating from 0 to $\\infty$: as $x \\to \\infty$, $x e^{-\\lambda x} \\to 0$ (exponential dominates); at $x = 0$, we get $-(0) - \\frac{1}{\\lambda}(-1) = \\frac{1}{\\lambda}$. So $\\mathrm{E}(X) = \\frac{1}{\\lambda}$.\n- Step 2: Find $\\mathrm{E}(X^2) = \\int_0^\\infty x^2 \\cdot \\lambda e^{-\\lambda x}\\,dx$. Using integration by parts twice (or known gamma function results): $\\mathrm{E}(X^2) = \\frac{2}{\\lambda^2}$.\n- Step 3: Then $\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 = \\frac{2}{\\lambda^2} - \\frac{1}{\\lambda^2} = \\frac{1}{\\lambda^2}$.\n- Step 4: The standard deviation equals the mean for exponential distributions: $\\mathrm{E}(X) = \\frac{1}{\\lambda} = \\sigma$.\n\nThe exponential distribution is the continuous analogue of the geometric distribution—it models the time between events in a Poisson process.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For the exponential distribution, prove the memoryless property: $\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$. Explain what this means intuitively. (3 steps)", "answer": "- Step 1: Using conditional probability: $\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b \\text{ and } X > a)}{\\mathrm{P}(X > a)} = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)}$.\n- Step 2: For exponential, $\\mathrm{P}(X > x) = e^{-\\lambda x}$. So $\\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$.\n- Step 3: Intuitively, this means that if you've already waited $a$ units (and the event hasn't occurred), the probability of waiting another $b$ units is the same as if you were starting fresh. The distribution \"forgets\" how long you've already waited. This is unique to the exponential distribution among continuous distributions.\n\nThis property makes the exponential distribution particularly useful for modeling waiting times, lifespans, and reliability problems where the \"age\" of the system doesn't affect future survival probability.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For a continuous random variable X with probability density function f(x), state the two defining properties that f(x) must satisfy to be a valid p.d.f., and explain intuitively why each is necessary. (2 steps)", "answer": "- Step 1: Two properties: (1) f(x) ≥ 0 for all x ∈ ℝ — probabilities cannot be negative, so density must be non-negative everywhere. (2) ∫_{-∞}^{∞} f(x)dx = 1 — the total probability (area under the entire curve) must equal 1, representing certainty that the variable takes some value within its range.\n\n+ These conditions mirror discrete probability functions where all probabilities sum to 1 and each probability is non-negative. The difference is we use integration instead of summation.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "The function f(x) = k(2 - x) is defined for -2 ≤ x ≤ 2 and 0 otherwise. How would you determine whether this can be a valid probability density function, and what value of k would make it valid? (3 steps)", "answer": "- Step 1: Check non-negativity: On the interval -2 ≤ x ≤ 2, the expression (2 - x) ranges from 0 (at x = 2) to 4 (at x = -2). Since k > 0, f(x) ≥ 0 on this interval, satisfying the first condition.\n\n- Step 2: Find k by setting total area equal to 1: ∫_{-2}^{2} k(2 - x)dx = 1\n\n- Step 3: Evaluate: k[2x - x²/2]_{-2}^{2} = k[(4 - 2) - (-4 - 2)] = k[2 + 6] = 8k = 1, so k = 1/8\n\n+ The function is valid since it's non-negative and we found k that makes total area = 1.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Given the p.d.f. f(x) = {k(4x - x²) for 2 ≤ x ≤ 4, 0 otherwise}, find the probability that X takes a value between 2.5 and 3. Show the key steps. (3 steps)", "answer": "- Step 1: First find k by integrating: ∫_{2}^{4} k(4x - x²)dx = 1, giving k = 3/16\n\n- Step 2: The probability P(2.5 < X < 3) = ∫_{2.5}^{3} (3/16)(4x - x²)dx\n\n- Step 3: Evaluate: = (3/16)[2x² - x³/3]_{2.5}^{3} = (3/16)(9 - 175/24) = 41/128 ≈ 0.320\n\n+ Note: For continuous variables, P(a < X < b) = P(a ≤ X < b) = P(a < X ≤ b) = P(a ≤ X ≤ b) — strict vs. non-strict inequalities don't matter.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Explain why the function f(x) = {x³ - 2 for -1 ≤ x ≤ 3, 0 otherwise} cannot be a valid probability density function, even before checking the normalization condition. (2 steps)", "answer": "- Step 1: A p.d.f. must satisfy f(x) ≥ 0 for all x. On the interval -1 ≤ x ≤ 3, the function x³ - 2 takes negative values when x³ < 2, i.e., when x < ∛2 ≈ 1.26.\n\n- Step 2: Since f(x) is negative for part of the domain (specifically from x = -1 to x ≈ 1.26), it violates the fundamental requirement that probability density must be non-negative everywhere. This alone disqualifies it from being a valid p.d.f., regardless of what the total area might be.\n\n+ A p.d.f. represents a probability density, which must be non-negative like any probability. Negative \"density\" has no physical meaning in probability theory.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For a continuous random variable X with p.d.f. f(x), write down the formal definition of the cumulative distribution function F(x). Explain what F(x) represents geometrically. (2 steps)", "answer": "- Step 1: The cumulative distribution function is defined as F(x) = P(X ≤ x) = ∫_{-∞}^{x} f(t)dt\n\n- Step 2: Geometrically, F(x) represents the total area under the p.d.f. curve from negative infinity up to the point x. It's the accumulated probability \"so far\" as you move from left to right along the x-axis.\n\n+ F(x) ranges from 0 (as x → -∞) to 1 (as x → ∞) for any valid p.d.f.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "The random variable X has p.d.f. f(x) = {1/4 x for 1 ≤ x ≤ 3, 0 otherwise}. Find the cumulative distribution function F(x) for all values of x. (3 steps)", "answer": "- Step 1: For x < 1, F(x) = 0 (no probability accumulated yet)\n\n- Step 2: For 1 ≤ x ≤ 3, integrate from 1 to x: F(x) = ∫_{1}^{x} (1/4)t dt = [t²/8]_{1}^{x} = x²/8 - 1/8\n\n- Step 3: For x > 3, F(x) = 1 (all probability has been accumulated)\n\n+ The complete answer is F(x) = {0 for x < 1, (x²/8 - 1/8) for 1 ≤ x ≤ 3, 1 for x > 3}\n\n+ Always check: F(1) = 0 and F(3) = 1 should hold for any bounded p.d.f.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "If you are given the c.d.f. F(x) of a continuous random variable, how would you derive the p.d.f. f(x)? Explain the relationship and when f(x) would be zero. (2 steps)", "answer": "- Step 1: The fundamental relationship is that the p.d.f. is the derivative of the c.d.f.: f(x) = d/dx[F(x)]\n\n- Step 2: This works because differentiation undoes integration — F(x) = ∫_{-∞}^{x} f(t)dt, so d/dx[F(x)] = f(x) by the Fundamental Theorem of Calculus. For regions where F(x) is constant (flat), f(x) = 0.\n\n+ For example, if F(x) = 0 for x < 0, = x² for 0 ≤ x ≤ 1, = 1 for x > 1, then f(x) = 0 for x < 0, = 2x for 0 ≤ x ≤ 1, = 0 for x > 1.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "The c.d.f. of a continuous random variable is given by F(x) = {0 for x < 0, (1/5)x + (3/20)x² for 0 ≤ x ≤ 2, 1 for x > 2}. Find P(0.5 ≤ X ≤ 1.5). (2 steps)", "answer": "- Step 1: For continuous distributions, P(a ≤ X ≤ b) = F(b) - F(a)\n\n- Step 2: F(1.5) = (1/5)(1.5) + (3/20)(1.5)² = 0.3 + 0.16875 = 0.46875\nF(0.5) = (1/5)(0.5) + (3/20)(0.5)² = 0.1 + 0.01875 = 0.11875\nP(0.5 ≤ X ≤ 1.5) = 0.46875 - 0.11875 = 0.35\n\n+ Note: P(X = 1) = 0 for continuous variables, so including or excluding endpoints doesn't change the probability.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For a continuous random variable, why is P(X = a) always equal to zero for any specific value a? How does this differ from discrete random variables? (2 steps)", "answer": "- Step 1: For continuous variables, P(X = a) = ∫_{a}^{a} f(x)dx = 0 because the integral over a zero-width interval is zero. Geometrically, the \"area\" under a single point has no width, hence zero area.\n\n- Step 2: This differs fundamentally from discrete random variables where P(X = a) can be positive — discrete variables assign positive probability to individual points (like P(X = 4) when flipping 10 coins). Continuous variables only assign positive probability to intervals.\n\n+ This means: P(X ≤ a) = P(X < a) = P(X = a) + P(X < a) = 0 + P(X < a) = P(X < a) for continuous distributions.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Write down the formula for the expected value (mean) E(X) of a continuous random variable with p.d.f. f(x). Explain how this extends the discrete case. (2 steps)", "answer": "- Step 1: E(X) = ∫_{-∞}^{∞} x f(x) dx\n\n- Step 2: This mirrors the discrete case E(X) = Σ x·P(X = x), where summation becomes integration and P(X = x) becomes f(x)dx. Just as we weight each value by its probability, we \"weight\" by the density over an infinitesimal interval. The integral sums up all possible values, each weighted by its probability density.\n\n+ Only integrate over the region where f(x) ≠ 0; outside this region f(x) = 0 contributes nothing.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "The random variable Y has p.d.f. f(y) = {1/4 y for 1 ≤ y ≤ 3, 0 otherwise}. Find E(Y). (3 steps)", "answer": "- Step 1: E(Y) = ∫_{1}^{3} y · (1/4)y dy = ∫_{1}^{3} (1/4)y² dy\n\n- Step 2: Evaluate the integral: (1/4)[y³/3]_{1}^{3} = (1/12)[27 - 1] = (1/12)(26) = 13/6\n\n- Step 3: So E(Y) = 13/6 ≈ 2.167\n\n+ The calculation uses y·f(y) = y · (1/4)y = (1/4)y², then integrates to get the weighted average.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Write down two formulas for Var(X) of a continuous random variable and explain when each might be more convenient to use. (2 steps)", "answer": "- Step 1: Var(X) = ∫_{-∞}^{∞} (x - μ)² f(x) dx, where μ = E(X). This definition directly computes the expected squared deviation from the mean.\n\n- Step 2: Var(X) = E(X²) - [E(X)]², which is often easier to compute since you find E(X) and E(X²) separately rather than dealing with the squared difference inside an integral.\n\n+ The second formula (E(X²) - μ²) typically requires less algebra because you don't have to expand (x - μ)² inside the integral.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For a continuous random variable X with p.d.f. f(x), what is E(g(X))? If X has E(X) = 2 and Var(X) = 3, find E(3X + 5) and Var(3X + 5). (3 steps)", "answer": "- Step 1: E(g(X)) = ∫_{-∞}^{∞} g(x) f(x) dx — you substitute the function g(x) into the integral instead of just x.\n\n- Step 2: For linear transformations: E(aX + b) = aE(X) + b = 3(2) + 5 = 11\n\n- Step 3: Var(aX + b) = a² Var(X) = 9 × 3 = 27 (the constant b shifts the mean but doesn't affect variance)\n\n+ Note: The formula Var(aX + b) = a²Var(X) holds for any random variable (discrete or continuous), not just continuous ones.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "The random variable X has p.d.f. f(x) = {3/32(3 + 2x - x²) for -1 ≤ x ≤ 3, 0 otherwise}. By observing the p.d.f., state E(X) without performing integration. Explain why. (2 steps)", "answer": "- Step 1: By symmetry, E(X) = 1\n\n- Step 2: The p.d.f. 3/32(3 + 2x - x²) = -(3/32)(x² - 2x - 3) is a downward-opening parabola that is symmetric about x = 1 (the vertex). Since the distribution is symmetric about x = 1, the mean must equal 1.\n\n+ You can verify: the function equals 3/32(3 + 2(1) - 1²) = 3/32(4) = 3/8 at x = 1, and the coefficient of x² is negative (indicating a maximum), confirming symmetry about the vertex at x = 1.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. f(x), define what is meant by the mode. Can a continuous distribution have more than one mode? Explain with an example. (2 steps)", "answer": "- Step 1: The mode is the value of x at which the p.d.f. f(x) reaches its maximum — the most probable value (or values) in the distribution. Mathematically, find where f'(x) = 0 and check it's a maximum.\n\n- Step 2: Yes, a continuous distribution can have multiple modes. For example, a bimodal distribution with two peaks might have modes at x = a and x = b. If all values in an interval have the same maximum density (a uniform distribution), then every point in that interval is a mode. More commonly, there's a single unique mode.\n\n+ The mode represents where the probability density is most concentrated, where you're \"most likely\" to find the random variable (though technically P(X = mode) = 0 for continuous variables).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "The random variable X has p.d.f. f(x) = {12x²(1-x) for 0 ≤ x ≤ 1, 0 otherwise}. Find the mode of X. (3 steps)", "answer": "- Step 1: First simplify: f(x) = 12x² - 12x³. Find where derivative equals zero: f'(x) = 24x - 36x² = 12x(2 - 3x) = 0\n\n- Step 2: Solutions: x = 0 or x = 2/3. At x = 0, f(0) = 0 (minimum). At x = 2/3, f(2/3) = 12(4/9)(1/3) = 16/9 ≈ 1.78 (maximum)\n\n- Step 3: Mode = 2/3\n\n+ You could also sketch the curve to see it's zero at x = 0, rises to a peak around x = 2/3, then falls to zero at x = 1.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Define the median m of a continuous random variable. If the c.d.f. is F(x) = 2x² - x⁴ for 0 ≤ x ≤ 1, find the median. (3 steps)", "answer": "- Step 1: The median m is defined by F(m) = 0.5 — it's the value where half the probability lies below and half lies above.\n\n- Step 2: Set 2m² - m⁴ = 0.5, or equivalently 2m⁴ - 4m² + 1 = 0\n\n- Step 3: This is a quadratic in m²: 2(m²)² - 4m² + 1 = 0. Using quadratic formula: m² = [4 ± √(16 - 8)]/(4) = 1 ± √2/2. Since m must be in [0, 1], m² = 1 - √2/2 ≈ 0.293, so m ≈ √0.293 ≈ 0.541\n\n+ Always check your answer is in the valid range (here between 0 and 1), and reject extraneous solutions.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What are the lower quartile Q₁ and upper quartile Q₃ for a continuous random variable? How is the interquartile range defined? (2 steps)", "answer": "- Step 1: The lower quartile Q₁ is the value where F(Q₁) = 0.25 (25% of probability below). The upper quartile Q₃ is where F(Q₃) = 0.75 (75% below). The median is Q₂ where F(Q₂) = 0.5.\n\n- Step 2: The interquartile range (IQR) = Q₃ - Q₁. This measures the spread of the middle 50% of the distribution, providing a robust measure of dispersion that's less affected by extreme values than the full range.\n\n+ Quartiles divide the distribution into four equal parts: 25% in each section between Q₁, median, and Q₃.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "The c.d.f. of a continuous random variable X is F(x) = {0 for x < 1, (1/5)x - (1/5) for 1 < x < 2, x²/10 - x/5 + 1/5 for 2 < x < 4, 1 for x > 4}. Find the interquartile range. (3 steps)", "answer": "- Step 1: First find Q₁. F(2) = 1/5(2) - 1/5 = 0.2. Since 0.25 > 0.2, Q₁ is in the second interval: solve (1/5)x - (1/5) = 0.25 → x = 2.25, but checking... actually needs to be in third interval. Set x²/10 - x/5 + 1/5 = 0.25 → x² - 2x + 2 = 2.5 → x² - 2x - 0.5 = 0 → x = (2 ± √(4 + 2))/2 = 2.22 or -0.22. So Q₁ = 2.22\n\n- Step 2: Find Q₃: set x²/10 - x/5 + 1/5 = 0.75 → x² - 2x + 2 = 7.5 → x² - 2x - 5.5 = 0 → x = (2 ± √(4 + 22))/2 = 3.55 or -1.55. So Q₃ = 3.55\n\n- Step 3: IQR = Q₃ - Q₁ = 3.55 - 2.22 = 1.33\n\n+ Check which interval each solution lies in by verifying F(x) values at interval boundaries.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A continuous random variable X has p.d.f. f(x) = {1/10 x for 0 ≤ x < 2, 1/4 - (1/40)x for 2 ≤ x < 10, 0 otherwise}. Find the 15th percentile P₁₅. (3 steps)", "answer": "- Step 1: First find F(x) in each region. For 0 ≤ x < 2: F(x) = ∫₀ˣ (1/10)t dt = x²/20. At x = 2, F(2) = 4/20 = 0.2\n\n- Step 2: Since we want P₁₅ where F(a) = 0.15, and F(2) = 0.2 > 0.15, the 15th percentile lies in the first interval (0 ≤ x < 2).\n\n- Step 3: Solve x²/20 = 0.15 → x² = 3 → x = √3 ≈ 1.41. So P₁₅ ≈ 1.41\n\n+ The solution is positive since we need a value in the valid range [0, 2].", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "The random variable X has p.d.f. f(x) = {3/8(1 + x²) for -1 ≤ x ≤ 1, 0 otherwise}. Explain why the mode is not unique. What is the median? (2 steps)", "answer": "- Step 1: The function 3/8(1 + x²) is strictly increasing on [0, 1] and strictly decreasing on [-1, 0] (since x² is symmetric and increases as |x| increases). The minimum occurs at x = 0, and maximum values occur at both endpoints x = -1 and x = 1, which both equal 3/4.\n\n- Step 2: The distribution is symmetric about x = 0, so the median is 0 (half the probability lies on each side). The mode is any value where f(x) attains its maximum — specifically x = -1 and x = 1 (bimodal with modes at the endpoints).\n\n+ For symmetric continuous distributions, the median always equals the center of symmetry, but the mode may be at the edges if the p.d.f. increases toward the edges.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "Explain why for a continuous random variable, knowing the median gives you different information than knowing the mean. Under what conditions would they be equal? (2 steps)", "answer": "- Step 1: The mean is the weighted average (E(X)), sensitive to extreme values since it squares deviations. The median is the middle value (50th percentile), robust against outliers since it depends only on position, not magnitude. For the distribution of incomes, a few very high incomes would raise the mean but barely affect the median.\n\n- Step 2: They are equal for symmetric distributions (like the normal distribution). For symmetric continuous distributions, the mean = median = mode all equal the center of symmetry.\n\n+ This is why analysts often report both: the mean captures the \"center of gravity\" while the median captures the \"typical value\" more robustly.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "The lifetime T (in years) of a product has p.d.f. f(t) = {1.25e^(-1.25t) for t ≥ 0, 0 otherwise}. Find the probability the product lasts between 1 and 2 years. (3 steps)", "answer": "- Step 1: First verify it's a valid p.d.f.: ∫₀^∞ 1.25e^(-1.25t) dt = [-e^(-1.25t)]₀^∞ = 1, so it's valid.\n\n- Step 2: P(1 < T < 2) = ∫₁² 1.25e^(-1.25t) dt = [-e^(-1.25t)]₁² = e^(-1.25) - e^(-2.5)\n\n- Step 3: = e^(-1.25) - e^(-2.5) ≈ 0.2865 - 0.0821 = 0.2044\n\n+ This is an exponential distribution with rate parameter λ = 1.25. The c.d.f. is F(t) = 1 - e^(-1.25t) for t ≥ 0, so P(1 < T < 2) = F(2) - F(1) = (1 - e^(-2.5)) - (1 - e^(-1.25)) = e^(-1.25) - e^(-2.5).", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A continuous random variable X has p.d.f. f(x) = {k/x for 1 ≤ x ≤ 5, 0 otherwise}. Find k and find P(2 < X < 4), expressing your answer in the form ln(a)/ln(b). (3 steps)", "answer": "- Step 1: Find k: ∫₁⁵ k/x dx = k[ln|x|]₁⁵ = k(ln 5 - ln 1) = k ln 5 = 1, so k = 1/ln 5\n\n- Step 2: P(2 < X < 4) = ∫₂⁴ (1/ln 5)(1/x) dx = (1/ln 5)[ln|x|]₂⁴ = (1/ln 5)(ln 4 - ln 2) = (1/ln 5)(ln 2)\n\n- Step 3: = ln(2)/ln(5) = ln 2 / ln 5\n\n+ Here a = 2 and b = 5 in the required form ln(a)/ln(b).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Why can't the function f(x) = {1/4 x for -1 ≤ x ≤ 2, 0 otherwise} be a valid probability density function? Explain the issue. (2 steps)", "answer": "- Step 1: Check the total area: ∫_{-1}² (1/4)x dx = (1/4)[x²/2]_{-1}² = (1/4)[(4/2) - (1/2)] = (1/4)(2 - 0.5) = (1/4)(1.5) = 3/8 ≠ 1\n\n- Step 2: The total area is 3/8, not 1, so it cannot be a valid p.d.f. ndom variable X has p.d.f. f(x) = {3/10(3x - x²) for 0 ≤ x ≤ 2, 0 otherwise}. Find the mode, and show that the median lies between 1.23 and 1.24. (3 steps)", "answer": "- Step 1: Mode: f(x) = (3/10)(3x - x²) = (9/10)x - (3/10)x². f'(x) = 9/10 - (6/10)x = (9 - 6x)/10 = 0 gives x = 1.5. This is a maximum since f'(x) > 0 for x < 1.5 and f'(x) < 0 for x > 1.5. So mode = 1.5\n\n- Step 2: Find c.d.f.: F(x) = ∫₀^x (3/10)(3t - t²) dt = (3/10)[3t²/2 - t³/3]₀^x = (3/10)(3x²/2 - x³/3) = (9x²/20 - x³/10)\n\n- Step 3: For median m, F(m) = 0.5. At x = 1.23: F = (9×1.5129/20 - 1.23³/10) ≈ (13.6161/20 - 1.860867/10) ≈ 0.6808 - 0.1861 = 0.4947. At x = 1.24: F ≈ (9×1.5376/20 - 1.24³/10) = (13.8384/20 - 1.906624/10) = 0.6919 - 0.1907 = 0.5012. Since 0.4947 < 0.5 < 0.5012, median is between 1.23 and 1.24.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Explain why the 90th percentile P₉₀ is defined by F(P₉₀) = 0.90. If X ~ Uniform(0, 1), what is P₉₀? (2 steps)", "answer": "- Step 1: The pth percentile is the value below which p% of the probability mass lies. By definition, 90% of the distribution lies below the 90th percentile, so F(P₉₀) = 0.90.\n\n- Step 2: For X ~ Uniform(0, 1), the c.d.f. is F(x) = x for 0 ≤ x ≤ 1. Solving F(x) = 0.90 gives x = 0.90. So P₉₀ = 0.90.\n\n+ For any uniform distribution on [a, b], the pth percentile is simply a + p(b - a).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "The random variable X has p.d.f. f(x) = {1/4 for 0 ≤ x < 1, x³/5 for 1 ≤ x ≤ 2, 0 otherwise}. Find E(X) to 3 decimal places. (3 steps)", "answer": "- Step 1: Break into two integrals: E(X) = ∫₀¹ x·(1/4) dx + ∫₁² x·(x³/5) dx = ∫₀¹ (x/4) dx + ∫₁² (x⁴/5) dx\n\n- Step 2: First integral: [x²/8]₀¹ = 1/8 = 0.125. Second integral: ∫₁² x⁴/5 dx = [x⁵/(25)]₁² = (32/25 - 1/25) = 31/25 = 1.24\n\n- Step 3: E(X) = 0.125 + 1.24 = 1.365 ≈ 1.365\n\n+ When a p.d.f. is defined piecewise, you must integrate each piece separately over its domain.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "For the exponential distribution with p.d.f. f(x) = λe^(-λx) for x ≥ 0, show that E(X) = 1/λ and Var(X) = 1/λ². (3 steps)", "answer": "- Step 1: E(X) = ∫₀^∞ x·λe^(-λx) dx. Use integration by parts: = [-xe^(-λx)]₀^∞ + ∫₀^∞ e^(-λx) dx = 0 + [(-1/λ)e^(-λx)]₀^∞ = 1/λ\n\n- Step 2: E(X²) = ∫₀^∞ x²·λe^(-λx) dx. Using integration by parts twice: = [-x²e^(-λx)]₀^∞ + 2∫₀^∞ xe^(-λx) dx = 0 + 2/λ² = 2/λ²\n\n- Step 3: Var(X) = E(X²) - [E(X)]² = 2/λ² - (1/λ)² = 2/λ² - 1/λ² = 1/λ²\n\n+ The exponential distribution is memoryless: P(X > a + b | X > a) = P(X > b), which explains why it models waiting times.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "A continuous random variable X has p.d.f. f(x) = {k/x(3-x) for 1 ≤ x ≤ 2, 0 otherwise}. Show that c = 3/ln 4, then find the mean. (3 steps)", "answer": "- Step 1: Find c: ∫₁² c/(x(3-x)) dx = c∫₁² (1/3)(1/x + 1/(3-x)) dx = c/3[ln|x| - ln|3-x|]₁² = c/3[(ln 1 - ln 2) - (ln 1 - ln 2)] = c/3[0 - ln 2 - (0 - ln 2)] = c/3[ln 2] = 1, so c = 3/ln 2, but wait... let me recalculate: At x = 1: ln|1| - ln|2| = -ln 2. At x = 2: ln|2| - ln|1| = ln 2. Difference = ln 2 - (-ln 2) = 2 ln 2 = ln 4. So c/3 · ln 4 = 1, giving c = 3/ln 4\n\n- Step 2: For mean: E(X) = ∫₁² x·(3/(ln 4))·1/(x(3-x)) dx = (3/ln 4)∫₁² 1/(3-x) dx\n\n- Step 3: = (3/ln 4)[-ln|3-x|]₁² = (3/ln 4)(-ln 1 + ln 2) = (3/ln 4)(ln 2) = (3 ln 2)/(ln 4) = (3 ln 2)/(2 ln 2) = 3/2\n\n+ Using the identity: ln 4 = ln(2²) = 2 ln 2, simplifies the calculation.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "The c.d.f. of X is F(x) = {0 for x < 0, x²/100 for 0 ≤ x ≤ 10, 1 for x > 10}. Find Var(X) and show that E(X³) = 400. (3 steps)", "answer": "- Step 1: First find f(x): f(x) = d/dx(x²/100) = x/50 for 0 ≤ x ≤ 10. E(X) = ∫₀¹⁰ x·(x/50) dx = (1/50)∫₀¹⁰ x² dx = (1/50)[x³/3]₀¹⁰ = 1000/(150) = 20/3\n\n- Step 2: E(X²) = ∫₀¹⁰ x²·(x/50) dx = (1/50)∫₀¹⁰ x³ dx = (1/50)[x⁴/4]₀¹⁰ = 10000/(200) = 50. Var(X) = 50 - (20/3)² = 50 - 400/9 = (450 - 400)/9 = 50/9 ≈ 5.556\n\n- Step 3: E(X³) = ∫₀¹⁰ x³·(x/50) dx = (1/50)∫₀¹⁰ x⁴ dx = (1/50)[x⁵/5]₀¹⁰ = 100000/(250) = 400\n\n+ The c.d.f. F(x) = (x/10)² = (x/10)² for 0 ≤ x ≤ 10 represents a uniform distribution on [0, 10] squared and scaled.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "For a continuous random variable X with p.d.f. f(x), prove that E(g(X)) = ∫ g(x) f(x) dx. Why is this a useful generalization? (2 steps)", "answer": "- Step 1: This follows directly from the definition. For any function g, the expected value is the \"weighted average\" of g(X), where each value is weighted by its probability. For continuous variables, the probability of landing in [x, x + dx] is f(x)dx, so the contribution to E(g(X)) from this interval is g(x) · f(x)dx. Summing (integrating) over all x gives E(g(X)).\n\n- Step 2: This is useful because it allows us to find expected values of any function of X without finding the distribution of g(X) first. For example, to find E(X²), we use g(X) = X², giving E(X²) = ∫ x² f(x)dx directly. This is the key to the variance formula Var(X) = E(X²) - [E(X)]².\n\n+ The discrete analog is E(g(X)) = Σ g(x) · P(X = x), showing the beautiful parallel between discrete and continuous cases.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "A continuous random variable X has p.d.f. f(x) = {ax + b for 0 ≤ x ≤ 2, 0 otherwise}. Given that E(X) = 9/8, find a and b. (3 steps)", "answer": "- Step 1: First, find the normalization condition: ∫₀² (ax + b) dx = 1 → [ax²/2 + bx]₀² = 2a + 2b = 1, so 2a + 2b = 1\n\n- Step 2: E(X) = ∫₀² x(ax + b) dx = ∫₀² (ax² + bx) dx = [ax³/3 + bx²/2]₀² = (8a/3 + 2b) = 9/8\n\n- Step 3: Solve the system: 2a + 2b = 1 → a + b = 0.5, and 8a/3 + 2b = 9/8. From first: b = 0.5 - a. Substitute: 8a/3 + 2(0.5 - a) = 9/8 → 8a/3 + 1 - 2a = 9/8 → (8a/3 - 6a/3) = 9/8 - 1 → 2a/3 = 1 const SK='s2-ch04';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
