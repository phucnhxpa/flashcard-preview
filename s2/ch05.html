plying $$\\frac{5.5 - 3.5}{7} = \\frac{2}{7}$$, which would give too large an answer. Always intersect the queried interval with the support — probability mass that doesn't exist can't be counted.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "What is the interquartile range (IQR) of $$X \\sim \\mathrm{U}[a,b]$$? Find it for $$X \\sim \\mathrm{U}[175, 215]$$. Why does the result make sense? (3 steps)", "answer": "- Step 1: The lower quartile $$Q_1$$ satisfies $$\\mathrm{F}(Q_1) = 0.25$$, i.e., $$\\frac{Q_1 - a}{b - a} = 0.25$$, so $$Q_1 = a + 0.25(b-a)$$. Similarly, $$Q_3 = a + 0.75(b-a)$$.\n- Step 2: $$\\text{IQR} = Q_3 - Q_1 = 0.5(b - a)$$. For $$X \\sim \\mathrm{U}[175, 215]$$: width = 40, so IQR = $$0.5 \\times 40 = 20$$.\n- Step 3: This makes perfect sense: the middle 50% of a uniform distribution occupies exactly half the interval. By symmetry and equal density, each quarter of the probability occupies exactly one quarter of the interval width.\n\nFor any uniform distribution, the IQR is always exactly half the total interval width.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "For $$X \\sim U[a, b]$$, explain why $$\\text{Var}(X)$$ depends on $$(b - a)^2$$ but **not** on the actual location of the interval. (3 steps)", "answer": "- Step 1: Variance is a measure of spread *around the mean* — it's translation-invariant. Shifting the interval (e.g. moving $$U[0, 1]$$ to $$U[10, 11]$$) shifts the mean by the same amount but doesn't change any deviations $$(X - \\mu)$$.\n- Step 2: Scaling the interval scales each deviation proportionally. If you double the width, every deviation $$(X - \\mu)$$ doubles, so squared deviations quadruple, and so does the variance.\n- Step 3: Therefore $$\\text{Var}(X) = c \\cdot (b-a)^2$$ for some constant $$c$$. Direct calculation gives $$c = \\frac{1}{12}$$, so $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$.\n\nThe takeaway: variance depends only on the *width*, not the *location*, of the interval. This is true for any \"shape-preserving\" family of distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A continuous random variable $$X$$ takes values only in the interval $$[a, b]$$, and every value in that interval is equally likely. What must the probability density function $$f(x)$$ look like, and why is it $$\\frac{1}{b-a}$$ specifically? (3 steps)", "answer": "- Step 1: Since every value in $$[a,b]$$ is equally likely, the probability density must be the same (constant) across the entire interval. Graphically, this means the p.d.f. is a horizontal line — forming a rectangle from $$a$$ to $$b$$.\n- Step 2: The total area under any p.d.f. must equal 1 (this is the axiom that total probability is 1). The area of our rectangle is $$\\text{height} \\times \\text{width} = f(x) \\times (b - a)$$.\n- Step 3: Setting area equal to 1: $$f(x) \\times (b-a) = 1$$, so $$f(x) = \\frac{1}{b-a}$$. The height of the rectangle is the reciprocal of the width — a wider interval means a shorter rectangle (lower density), because the probability is spread more thinly.\n\nThe uniform p.d.f. is a rectangle whose area is always exactly 1: taller for narrow intervals, shorter for wide ones.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "If $$X \\sim \\mathrm{U}[a,b]$$, what is $$\\mathrm{P}(X = c)$$ for any specific value $$c$$ in $$[a,b]$$? What does this mean about computing probabilities for continuous uniform distributions? (2 steps)", "answer": "- Step 1: For any continuous random variable, the probability of taking exactly one specific value is zero: $$\\mathrm{P}(X = c) = 0$$. This is because probability corresponds to area under the p.d.f., and the area of a vertical line (zero width) is zero.\n- Step 2: This means we always compute probabilities over *intervals*, not at points. For $$X \\sim \\mathrm{U}[a,b]$$, $$\\mathrm{P}(c < X < d) = \\frac{d - c}{b - a}$$ — the width of the sub-interval divided by the total width. Note that it doesn't matter whether we use strict or non-strict inequalities: $$\\mathrm{P}(c < X < d) = \\mathrm{P}(c \\leq X \\leq d)$$.\n\nIn continuous distributions, single-point probabilities are always zero; only interval probabilities are meaningful.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{U}[3,5]$$. Without doing any integration, how would you find $$\\mathrm{P}(3.2 < X < 4.3)$$ using a geometric/proportional argument? (2 steps)", "answer": "- Step 1: The p.d.f. is a rectangle from 3 to 5 with height $$\\frac{1}{5-3} = 0.5$$. The probability $$\\mathrm{P}(3.2 < X < 4.3)$$ is the area of the sub-rectangle from 3.2 to 4.3, which has width $$4.3 - 3.2 = 1.1$$ and height 0.5.\n- Step 2: Area = $$1.1 \\times 0.5 = 0.55$$. Equivalently, by proportion: the sub-interval has width 1.1 out of a total width of 2, so the probability is $$\\frac{1.1}{2} = 0.55$$.\n\nFor uniform distributions, probability is just the fraction of the total interval width that your sub-interval covers.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[3,5]$$. You need to find $$k$$ such that $$\\mathrm{P}(2X < k - X) = 0.2$$. What is the key strategy for solving this type of problem? (3 steps)", "answer": "- Step 1: Rearrange the inequality to isolate $$X$$: $$2X < k - X$$ becomes $$3X < k$$, i.e., $$X < \\frac{k}{3}$$. Always convert probability statements about complicated expressions into statements about $$X$$ directly.\n- Step 2: Now we need $$\\mathrm{P}\\!\\left(X < \\frac{k}{3}\\right) = 0.2$$. For a uniform distribution, this probability equals the area of the rectangle to the left of $$\\frac{k}{3}$$: $$\\frac{1}{2}\\left(\\frac{k}{3} - 3\\right) = 0.2$$.\n- Step 3: Solve: $$\\frac{k}{3} - 3 = 0.4$$, so $$\\frac{k}{3} = 3.4$$, giving $$k = 10.2$$.\n\nThe universal strategy: rewrite the event in terms of $$X$$ alone, then use the uniform probability formula (area or proportion).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[1.5, 4]$$ (i.e., $$k=1.5$$ from a diagram where height is 0.4). Find $$\\mathrm{P}(X > 3 \\mid X > 2)$$. What two approaches can you use? (3 steps)", "answer": "- Step 1: Apply the conditional probability formula: $$\\mathrm{P}(X > 3 \\mid X > 2) = \\frac{\\mathrm{P}(X > 3 \\cap X > 2)}{\\mathrm{P}(X > 2)} = \\frac{\\mathrm{P}(X > 3)}{\\mathrm{P}(X > 2)}$$.\n- Step 2: Compute each: $$\\mathrm{P}(X > 3) = 0.4 \\times (4-3) = 0.4$$ and $$\\mathrm{P}(X > 2) = 0.4 \\times (4-2) = 0.8$$.\n- Step 3: So $$\\mathrm{P}(X > 3 \\mid X > 2) = \\frac{0.4}{0.8} = \\frac{1}{2}$$.\n\n+ **Alternative approach**: Given $$X > 2$$, the restricted sample space is $$[2, 4]$$, and $$X$$ is *still uniform* on this restricted interval. Then $$\\mathrm{P}(X > 3 \\mid X > 2)$$ is the fraction of $$[2,4]$$ that lies above 3, which is $$\\frac{4-3}{4-2} = \\frac{1}{2}$$.\n\nThe key insight: conditioning a uniform distribution on a sub-interval gives another uniform distribution on that sub-interval.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "If $$X \\sim \\mathrm{U}[a,b]$$ and $$Y = cX + d$$ where $$c > 0$$, what is the distribution of $$Y$$, and why? What changes if $$c < 0$$? (3 steps)", "answer": "- Step 1: When $$X = a$$, $$Y = ca + d$$; when $$X = b$$, $$Y = cb + d$$. Since the linear transformation stretches and shifts the interval uniformly, every value of $$Y$$ in the new interval is equally likely — so $$Y$$ is still uniform.\n- Step 2: If $$c > 0$$, the order is preserved: $$Y \\sim \\mathrm{U}[ca+d, cb+d]$$. If $$c < 0$$, the order reverses: $$Y \\sim \\mathrm{U}[cb+d, ca+d]$$ (the smaller endpoint comes first).\n- Step 3: For example, if $$X \\sim \\mathrm{U}[2,8]$$ and $$Y = 2X+5$$, then $$Y \\sim \\mathrm{U}[2(2)+5, 2(8)+5] = \\mathrm{U}[9, 21]$$.\n\nA linear transformation of a uniform random variable is always uniform — the interval endpoints transform accordingly.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "If $$X \\sim \\mathrm{U}[3,8]$$ and $$Y = 12 - 3X$$, find the distribution of $$Y$$. Then use it to find $$\\mathrm{P}(Y > 0)$$ directly. (3 steps)", "answer": "- Step 1: Since $$Y = -3X + 12$$ is a linear transformation with negative coefficient, when $$X=3$$, $$Y = -3(3)+12 = 3$$; when $$X=8$$, $$Y = -3(8)+12 = -12$$. So $$Y \\sim \\mathrm{U}[-12, 3]$$.\n- Step 2: $$\\mathrm{P}(Y > 0)$$ is the fraction of $$[-12, 3]$$ above 0: $$\\frac{3 - 0}{3 - (-12)} = \\frac{3}{15} = \\frac{1}{5}$$.\n- Step 3: Verify via $$X$$: $$Y > 0 \\Leftrightarrow 12 - 3X > 0 \\Leftrightarrow X < 4$$, and $$\\mathrm{P}(X < 4) = \\frac{4-3}{8-3} = \\frac{1}{5}$$. ✓\n\nBoth approaches must agree — converting to an event about $$X$$ or finding the distribution of $$Y$$ directly are equivalent strategies.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Derive $$\\mathrm{E}(X)$$ for $$X \\sim \\mathrm{U}[a,b]$$ using the definition of expectation. Why does the result make intuitive sense? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{E}(X) = \\int_a^b x \\cdot f(x)\\, dx = \\int_a^b x \\cdot \\frac{1}{b-a}\\, dx = \\frac{1}{b-a} \\int_a^b x\\, dx$$.\n- Step 2: $$\\int_a^b x\\, dx = \\left[\\frac{x^2}{2}\\right]_a^b = \\frac{b^2 - a^2}{2} = \\frac{(b-a)(b+a)}{2}$$. So $$\\mathrm{E}(X) = \\frac{1}{b-a} \\cdot \\frac{(b-a)(b+a)}{2} = \\frac{a+b}{2}$$.\n- Step 3: Intuitively, since every value is equally likely, the \"balance point\" (centre of mass) of the rectangle is exactly the midpoint of the interval: $$\\frac{a+b}{2}$$. This is the same reason the centre of mass of a uniform rod is at its midpoint.\n\nThe mean of a uniform distribution is always the midpoint — symmetry demands it.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Derive $$\\operatorname{Var}(X)$$ for $$X \\sim \\mathrm{U}[a,b]$$ using the definition $$\\operatorname{Var}(X) = \\mathrm{E}[(X-\\mu)^2]$$. What is the intuitive reason for the $$\\frac{1}{12}$$ factor? (4 steps)", "answer": "- Step 1: With $$\\mu = \\frac{a+b}{2}$$, we have $$\\operatorname{Var}(X) = \\int_a^b \\left(x - \\frac{a+b}{2}\\right)^2 \\cdot \\frac{1}{b-a}\\, dx$$.\n- Step 2: Integrate: $$\\frac{1}{b-a}\\left[\\frac{(x - \\frac{a+b}{2})^3}{3}\\right]_a^b$$. At the upper limit: $$b - \\frac{a+b}{2} = \\frac{b-a}{2}$$. At the lower limit: $$a - \\frac{a+b}{2} = \\frac{a-b}{2} = -\\frac{b-a}{2}$$.\n- Step 3: So the expression becomes $$\\frac{1}{3(b-a)}\\left[\\left(\\frac{b-a}{2}\\right)^3 - \\left(-\\frac{b-a}{2}\\right)^3\\right] = \\frac{1}{3(b-a)} \\cdot 2\\left(\\frac{b-a}{2}\\right)^3 = \\frac{2(b-a)^3}{3(b-a) \\cdot 8} = \\frac{(b-a)^2}{12}$$.\n- Step 4: The $$\\frac{1}{12}$$ factor arises from the integral of the squared distance over the interval — it's a purely mathematical result. Intuitively, variance grows with the *square* of the interval width (wider intervals spread values much more), and the $$\\frac{1}{12}$$ is the constant that emerges from the calculus.\n\n$$\\operatorname{Var}(X) = \\frac{(b-a)^2}{12}$$ — variance depends on the *width* of the interval, not its location.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Derive the cumulative distribution function $$\\mathrm{F}(x)$$ for $$X \\sim \\mathrm{U}[a,b]$$. Why is the CDF a straight line between $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: For $$a \\leq x \\leq b$$, $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x) = \\int_a^x \\frac{1}{b-a}\\, dt = \\frac{1}{b-a}[t]_a^x = \\frac{x - a}{b-a}$$.\n- Step 2: The full CDF is: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < a \\\\ \\frac{x-a}{b-a} & a \\leq x \\leq b \\\\ 1 & x > b \\end{cases}$$\n- Step 3: The CDF is a straight line (linear function) on $$[a,b]$$ because the p.d.f. is constant — integrating a constant gives a linear function. Geometrically, as you sweep rightward, each unit of width adds the same amount of area (probability), so the total accumulates at a constant rate.\n\nThe CDF of a uniform distribution is a ramp function: 0, then linearly rising, then 1.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "$$Y \\sim \\mathrm{U}[a,b]$$ with $$\\mathrm{E}(Y) = 1$$ and $$\\operatorname{Var}(Y) = \\frac{16}{3}$$. How do you find $$a$$ and $$b$$? What constraint must you remember? (3 steps)", "answer": "- Step 1: From the mean: $$\\frac{a+b}{2} = 1$$, so $$a + b = 2$$. From the variance: $$\\frac{(b-a)^2}{12} = \\frac{16}{3}$$, so $$(b-a)^2 = 64$$, giving $$b - a = \\pm 8$$.\n- Step 2: Solving simultaneously: if $$b - a = 8$$ and $$a + b = 2$$, then adding: $$2b = 10$$, so $$b = 5$$, $$a = -3$$. If $$b - a = -8$$ and $$a + b = 2$$, then $$a = 5$$, $$b = -3$$.\n- Step 3: Since we require $$a < b$$ (by definition of the interval), we must choose $$a = -3$$, $$b = 5$$.\n\nAlways check which solution satisfies $$a < b$$ — the variance formula gives $$(b-a)^2$$, so both orderings are mathematically possible but only one is valid.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Why is it wrong to write $$\\mathrm{E}(R^2) = (\\mathrm{E}(R))^2$$? If $$R \\sim \\mathrm{U}[1,5]$$, find $$\\mathrm{E}(R^2)$$ using two different methods. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(R^2) \\neq (\\mathrm{E}(R))^2$$ in general because the expectation operator is linear, not multiplicative. The square of the average is not the average of the squares — variance exists precisely because of this gap.\n- Step 2: **Method 1** (using variance): $$\\mathrm{E}(R) = 3$$, $$\\operatorname{Var}(R) = \\frac{(5-1)^2}{12} = \\frac{4}{3}$$. Since $$\\operatorname{Var}(R) = \\mathrm{E}(R^2) - (\\mathrm{E}(R))^2$$, rearranging: $$\\mathrm{E}(R^2) = \\operatorname{Var}(R) + (\\mathrm{E}(R))^2 = \\frac{4}{3} + 9 = \\frac{31}{3}$$.\n- Step 3: **Method 2** (direct integration): $$\\mathrm{E}(R^2) = \\int_1^5 r^2 \\cdot \\frac{1}{4}\\, dr = \\frac{1}{4}\\left[\\frac{r^3}{3}\\right]_1^5 = \\frac{1}{12}(125 - 1) = \\frac{124}{12} = \\frac{31}{3}$$. Both methods agree. ✓\n\nUse $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2$$ as a shortcut whenever you already know the variance.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A tree trunk tapers from diameter 10 cm (bottom) to 2 cm (top). It's cut at a random height, and the cross-section radius $$R \\sim \\mathrm{U}[1,5]$$. Find the expected area of the cross-section. Why can't you just square the expected radius? (3 steps)", "answer": "- Step 1: The area is $$A = \\pi R^2$$, so $$\\mathrm{E}(A) = \\pi\\,\\mathrm{E}(R^2)$$. We need $$\\mathrm{E}(R^2)$$, not $$(\\mathrm{E}(R))^2$$.\n- Step 2: Compute: $$\\mathrm{E}(R) = 3$$, $$\\operatorname{Var}(R) = \\frac{16}{12} = \\frac{4}{3}$$. So $$\\mathrm{E}(R^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$.\n- Step 3: $$\\mathrm{E}(A) = \\frac{31\\pi}{3} \\approx 32.5$$ cm². If we had incorrectly used $$(\\mathrm{E}(R))^2 = 9$$, we'd get $$9\\pi \\approx 28.3$$ cm² — an underestimate. The true expected area is larger because squaring amplifies larger values more, and this extra contribution is captured by the variance term.\n\n$$\\mathrm{E}(g(X)) \\neq g(\\mathrm{E}(X))$$ for nonlinear functions — the variance term accounts for the curvature of $$g$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A length is measured to the nearest cm. What distribution models the rounding error $$R$$, and why? What are its parameters? (3 steps)", "answer": "- Step 1: If a pencil is recorded as 20 cm, its true length lies in $$[19.5, 20.5)$$. The error (true minus recorded) lies in $$[-0.5, 0.5)$$.\n- Step 2: It's reasonable to assume the true length is equally likely to be anywhere in this half-centimetre band on either side — there's no reason to favour any particular error value within the range.\n- Step 3: Therefore $$R \\sim \\mathrm{U}[-0.5, 0.5]$$. The mean error is 0 (unbiased), and the variance is $$\\frac{(0.5-(-0.5))^2}{12} = \\frac{1}{12}$$.\n\nThe uniform distribution on $$[-0.5, 0.5]$$ is the standard model for rounding errors when measuring to the nearest unit.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A bus is due at 9 am but arrives at a random time between 3 minutes early and 10 minutes late. Let $$X$$ = minutes after 9 am when the bus arrives. Specify the distribution fully and find $$\\mathrm{P}$$(Jameil is late, i.e., bus after 9:05). (2 steps)", "answer": "- Step 1: 3 minutes early means $$X = -3$$; 10 minutes late means $$X = 10$$. Since arrival is random in this range, $$X \\sim \\mathrm{U}[-3, 10]$$.\n- Step 2: Jameil is late if $$X > 5$$. $$\\mathrm{P}(X > 5) = \\frac{10 - 5}{10 - (-3)} = \\frac{5}{13} \\approx 0.385$$.\n\nFor modelling problems: identify the range of equally-likely values, set up $$\\mathrm{U}[a,b]$$, then compute probabilities as proportions.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the interquartile range (IQR) of $$X \\sim \\mathrm{U}[a,b]$$? Find it for $$X \\sim \\mathrm{U}[175, 215]$$. Why does the result make sense? (3 steps)", "answer": "- Step 1: The lower quartile $$Q_1$$ satisfies $$\\mathrm{F}(Q_1) = 0.25$$, i.e., $$\\frac{Q_1 - a}{b - a} = 0.25$$, so $$Q_1 = a + 0.25(b-a)$$. Similarly, $$Q_3 = a + 0.75(b-a)$$.\n- Step 2: $$\\text{IQR} = Q_3 - Q_1 = 0.5(b - a)$$. For $$X \\sim \\mathrm{U}[175, 215]$$: width = 40, so IQR = $$0.5 \\times 40 = 20$$.\n- Step 3: This makes perfect sense: the middle 50% of a uniform distribution occupies exactly half the interval. By symmetry and equal density, each quarter of the probability occupies exactly one quarter of the interval width.\n\nFor any uniform distribution, the IQR is always exactly half the total interval width.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{U}[175, 215]$$ (coffee volume in ml). Find the value $$x$$ such that $$\\mathrm{P}(X \\geq x) = 0.65$$. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\geq x) = 0.65$$ means $$\\mathrm{P}(X < x) = 0.35$$. Using the CDF: $$\\frac{x - 175}{215 - 175} = 0.35$$.\n- Step 2: $$x - 175 = 0.35 \\times 40 = 14$$, so $$x = 189$$. This means 65% of cups have at least 189 ml.\n\nPercentile problems for uniform distributions are straightforward: set up $$\\frac{x - a}{b - a} = p$$ and solve for $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A drinks machine pours coffee with $$X \\sim \\mathrm{U}[175,215]$$. Rashmi buys 5 cups. Find the probability exactly 3 contain less than 187 ml. What two distributions are involved, and how do they combine? (3 steps)", "answer": "- Step 1: First, find the probability a single cup has less than 187 ml: $$\\mathrm{P}(X < 187) = \\frac{187 - 175}{40} = \\frac{12}{40} = 0.3$$. This uses the **uniform distribution**.\n- Step 2: Now we have 5 independent trials, each with \"success\" (less than 187 ml) probability 0.3. The number of successes follows a **binomial distribution**: $$W \\sim \\mathrm{B}(5, 0.3)$$.\n- Step 3: $$\\mathrm{P}(W = 3) = \\binom{5}{3}(0.3)^3(0.7)^2 = 10 \\times 0.027 \\times 0.49 = 0.1323$$.\n\nTwo-stage problems: use the uniform distribution to find a single-trial probability, then use the binomial distribution for the count of successes across multiple independent trials.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A machine cuts rods with error $$X \\sim \\mathrm{U}[-3, 3]$$ mm. Find $$\\mathrm{P}(|X| > 2)$$. Then if 10 rods are cut, find the probability exactly 6 are within 2 mm of the target. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(|X| > 2) = \\mathrm{P}(X > 2) + \\mathrm{P}(X < -2) = \\frac{3-2}{6} + \\frac{-2-(-3)}{6} = \\frac{1}{6} + \\frac{1}{6} = \\frac{2}{6} = \\frac{1}{3}$$.\n- Step 2: The probability a rod is *within* 2 mm: $$\\mathrm{P}(|X| \\leq 2) = 1 - \\frac{1}{3} = \\frac{2}{3}$$.\n- Step 3: For 10 rods, the number within 2 mm is $$W \\sim \\mathrm{B}(10, \\frac{2}{3})$$. $$\\mathrm{P}(W = 6) = \\binom{10}{6}\\left(\\frac{2}{3}\\right)^6\\left(\\frac{1}{3}\\right)^4$$.\n\nFor symmetric uniform distributions on $$[-c, c]$$, probabilities about $$|X|$$ split symmetrically about 0.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "A 20 cm rod is cut at a random point. The longer piece $$X \\sim \\mathrm{U}[10, 20]$$. The two pieces form the base and height of a rectangle. Find the expected area. (3 steps)", "answer": "- Step 1: The longer piece has length $$X$$, so the shorter piece has length $$20 - X$$. The rectangle's area is $$A = X(20 - X) = 20X - X^2$$.\n- Step 2: $$\\mathrm{E}(A) = 20\\,\\mathrm{E}(X) - \\mathrm{E}(X^2)$$. We have $$\\mathrm{E}(X) = 15$$ and $$\\operatorname{Var}(X) = \\frac{100}{12} = \\frac{25}{3}$$, so $$\\mathrm{E}(X^2) = \\frac{25}{3} + 225 = \\frac{700}{3}$$.\n- Step 3: $$\\mathrm{E}(A) = 20(15) - \\frac{700}{3} = 300 - \\frac{700}{3} = \\frac{900 - 700}{3} = \\frac{200}{3} \\approx 66.7$$ cm².\n\nWhen the area is a nonlinear function of a uniform random variable, you must use $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[-3,5]$$. Use the formula $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$ with integration to find the variance. Verify it matches the formula $$\\frac{(b-a)^2}{12}$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\frac{-3+5}{2} = 1$$. The p.d.f. is $$f(x) = \\frac{1}{8}$$ on $$[-3,5]$$.\n- Step 2: $$\\mathrm{E}(X^2) = \\int_{-3}^{5} x^2 \\cdot \\frac{1}{8}\\, dx = \\frac{1}{8}\\left[\\frac{x^3}{3}\\right]_{-3}^{5} = \\frac{1}{24}(125 + 27) = \\frac{152}{24} = \\frac{19}{3}$$.\n- Step 3: $$\\operatorname{Var}(X) = \\frac{19}{3} - 1 = \\frac{16}{3}$$. Check: $$\\frac{(5-(-3))^2}{12} = \\frac{64}{12} = \\frac{16}{3}$$. ✓\n\nBoth methods for computing variance are valid; the formula $$\\frac{(b-a)^2}{12}$$ is faster, but integration confirms it from first principles.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[\\alpha, \\beta]$$ with $$\\mathrm{E}(X) = 7.5$$ and $$\\mathrm{P}(X > 10.5) = 0.25$$. Find $$\\alpha$$ and $$\\beta$$. (3 steps)", "answer": "- Step 1: From the mean: $$\\frac{\\alpha + \\beta}{2} = 7.5$$, so $$\\alpha + \\beta = 15$$.\n- Step 2: From $$\\mathrm{P}(X > 10.5) = 0.25$$: $$\\frac{\\beta - 10.5}{\\beta - \\alpha} = 0.25$$, so $$\\beta - 10.5 = 0.25(\\beta - \\alpha)$$, i.e., $$4\\beta - 42 = \\beta - \\alpha$$, giving $$3\\beta + \\alpha = 42$$.\n- Step 3: From $$\\alpha + \\beta = 15$$ and $$\\alpha + 3\\beta = 42$$: subtracting gives $$2\\beta = 27$$, so $$\\beta = 13.5$$ and $$\\alpha = 1.5$$.\n\nWhen given a probability condition instead of the variance, translate it into an equation using the CDF or proportion formula.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[0,2]$$ and $$Y = 10 - 5X$$. Describe the distribution of $$Y$$ and find $$\\mathrm{P}(Y > 3 \\mid X > 0.5)$$. (3 steps)", "answer": "- Step 1: Since $$Y = -5X + 10$$ is linear with negative coefficient: when $$X=0$$, $$Y=10$$; when $$X=2$$, $$Y=0$$. So $$Y \\sim \\mathrm{U}[0, 10]$$.\n- Step 2: $$Y > 3 \\Leftrightarrow 10 - 5X > 3 \\Leftrightarrow X < 1.4$$. So $$\\mathrm{P}(Y > 3 \\mid X > 0.5) = \\mathrm{P}(X < 1.4 \\mid X > 0.5)$$.\n- Step 3: $$= \\frac{\\mathrm{P}(0.5 < X < 1.4)}{\\mathrm{P}(X > 0.5)} = \\frac{0.9/2}{1.5/2} = \\frac{0.9}{1.5} = \\frac{3}{5}$$.\n\nFor conditional probability with linear transformations, convert everything back to events about $$X$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[\\alpha, \\beta]$$. Find $$\\mathrm{P}\\!\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right)$$. What is the geometric interpretation? (2 steps)", "answer": "- Step 1: Using the CDF: $$\\mathrm{P}\\!\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right) = \\frac{\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta - \\alpha}{\\beta - \\alpha} = \\frac{\\frac{3\\alpha + 4\\beta - 7\\alpha}{7}}{\\beta - \\alpha} = \\frac{4\\beta - 4\\alpha}{7(\\beta - \\alpha)} = \\frac{4}{7}$$.\n- Step 2: Geometrically, $$\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta$$ is a point that is $$\\frac{4}{7}$$ of the way from $$\\alpha$$ to $$\\beta$$. For a uniform distribution, the probability of being below a point that fraction $$f$$ of the way through the interval is exactly $$f$$. Here $$f = \\frac{4}{7}$$.\n\nFor any uniform distribution, $$\\mathrm{P}(X < a + f(b-a)) = f$$. The CDF is just \"what fraction of the interval is below this point.\"", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A spinner has a pointer of length $$r$$ pivoted at the centre of a circle of radius $$r$$. The angle $$\\theta$$ from the vertical is uniformly distributed on $$[0, 2\\pi)$$. The horizontal distance of the tip from the vertical is $$X = r\\sin\\theta$$. Find $$\\mathrm{E}(X)$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\mathrm{E}(r\\sin\\theta) = r\\,\\mathrm{E}(\\sin\\theta)$$, since $$r$$ is a constant. We need $$\\mathrm{E}(\\sin\\theta) = \\int_0^{2\\pi} \\sin\\theta \\cdot \\frac{1}{2\\pi}\\, d\\theta$$.\n- Step 2: $$\\int_0^{2\\pi} \\sin\\theta\\, d\\theta = [-\\cos\\theta]_0^{2\\pi} = -\\cos(2\\pi) + \\cos(0) = -1 + 1 = 0$$.\n- Step 3: Therefore $$\\mathrm{E}(X) = r \\times 0 = 0$$. This makes sense: the tip is equally likely to be on the left or right of the vertical, so the average horizontal displacement is zero.\n\nEven though $$X = r\\sin\\theta$$ is a nonlinear transformation, the symmetry of $$\\sin$$ over a full period makes the expected value zero.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For the spinner in Q25, explain how it could be used to estimate $$\\pi$$. What is the connection to the expected value of $$X^2$$? (3 steps)", "answer": "- Step 1: Compute $$\\mathrm{E}(X^2) = r^2\\,\\mathrm{E}(\\sin^2\\theta) = r^2 \\int_0^{2\\pi} \\sin^2\\theta \\cdot \\frac{1}{2\\pi}\\, d\\theta$$. Using $$\\sin^2\\theta = \\frac{1 - \\cos 2\\theta}{2}$$, the integral becomes $$\\frac{1}{2\\pi} \\cdot \\pi = \\frac{1}{2}$$.\n- Step 2: So $$\\mathrm{E}(X^2) = \\frac{r^2}{2}$$. The average squared horizontal distance is $$\\frac{r^2}{2}$$.\n- Step 3: The area of the circle is $$\\pi r^2$$. The area of the square circumscribing it (from $$-r$$ to $$r$$ in both directions) is $$4r^2$$. The ratio is $$\\frac{\\pi r^2}{4r^2} = \\frac{\\pi}{4}$$. By repeatedly spinning and recording whether the tip falls within a certain region, one can estimate this ratio and hence $$\\pi$$. This is a Monte Carlo method.\n\nThe spinner provides a physical random number generator; statistical properties of the outcomes connect to geometric constants like $$\\pi$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{U}[2,8]$$. Six observations are made. Find the probability that exactly 4 are less than 5. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X < 5) = \\frac{5-2}{8-2} = \\frac{3}{6} = 0.5$$. Each observation independently has probability 0.5 of being less than 5.\n- Step 2: The count of observations less than 5 follows $$W \\sim \\mathrm{B}(6, 0.5)$$. $$\\mathrm{P}(W = 4) = \\binom{6}{4}(0.5)^4(0.5)^2 = 15 \\times \\frac{1}{64} = \\frac{15}{64}$$.\n\nUniform + Binomial: the uniform gives you the per-trial probability, the binomial gives you the probability of a specific count.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[a,b]$$. Given $$\\mathrm{P}(Y < 5) = \\frac{1}{4}$$ and $$\\mathrm{P}(Y > 7) = \\frac{1}{2}$$, find $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(Y < 5) = \\frac{1}{4}$$ means $$\\frac{5 - a}{b - a} = \\frac{1}{4}$$, so $$4(5-a) = b - a$$, giving $$20 - 4a = b - a$$, i.e., $$b = 20 - 3a$$.\n- Step 2: $$\\mathrm{P}(Y > 7) = \\frac{1}{2}$$ means $$\\frac{b - 7}{b - a} = \\frac{1}{2}$$, so $$2(b - 7) = b - a$$, giving $$2b - 14 = b - a$$, i.e., $$b = 14 - a$$.\n- Step 3: Setting equal: $$20 - 3a = 14 - a$$, so $$6 = 2a$$, giving $$a = 3$$ and $$b = 11$$.\n\nTwo probability conditions give two equations in two unknowns — solve simultaneously.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A coffee machine pours $$X \\sim \\mathrm{U}[190, 210]$$ ml. Given the machine has already poured 195 ml, find the probability it pours more than 200 ml total. What concept is this? (2 steps)", "answer": "- Step 1: This is a conditional probability: $$\\mathrm{P}(X > 200 \\mid X > 195)$$. Given $$X > 195$$, the restricted distribution is uniform on $$[195, 210]$$.\n- Step 2: $$\\mathrm{P}(X > 200 \\mid X > 195) = \\frac{210 - 200}{210 - 195} = \\frac{10}{15} = \\frac{2}{3}$$.\n\nConditioning a uniform distribution on a sub-interval gives a new uniform distribution on that sub-interval — the \"memoryless-like\" property of uniform distributions.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why is the uniform distribution a good model for rounding errors but NOT for the heights of 18-year-old females? What distribution would be more appropriate for heights? (2 steps)", "answer": "- Step 1: Rounding errors are equally likely to be anywhere in $$[-0.5, 0.5]$$ — there's no reason any particular error value is more likely than another. The uniform distribution captures this \"equally likely\" property perfectly.\n- Step 2: Heights are NOT equally likely — most people are near the average height, and extreme heights (very tall or very short) are rare. This bell-shaped pattern is modelled by the **normal distribution**, not the uniform distribution.\n\nThe uniform distribution models situations with constant probability density; the normal distribution models situations with a central peak and symmetric tails.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A string 20 cm long has a mark on one end. It's cut at a random point. Let $$X$$ = length of the marked piece. What is the distribution of $$X$$, and what is the probability the shorter piece is at least 8 cm? (3 steps)", "answer": "- Step 1: The cut point is equally likely to be anywhere along the 20 cm, so $$X \\sim \\mathrm{U}[0, 20]$$. The marked piece could be anywhere from 0 to 20 cm.\n- Step 2: The shorter piece is at least 8 cm means both pieces are at least 8 cm. So $$X \\geq 8$$ AND $$20 - X \\geq 8$$ (i.e., $$X \\leq 12$$). The condition is $$8 \\leq X \\leq 12$$.\n- Step 3: $$\\mathrm{P}(8 \\leq X \\leq 12) = \\frac{12 - 8}{20 - 0} = \\frac{4}{20} = 0.2$$.\n\n\"Shorter piece at least 8 cm\" translates to a constraint on $$X$$: both pieces must be ≥ 8, giving a symmetric interval around the midpoint.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[b, 5b]$$. Show by integration that $$\\operatorname{Var}(X) = \\frac{4b^2}{3}$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\frac{b + 5b}{2} = 3b$$. The p.d.f. is $$f(x) = \\frac{1}{4b}$$ on $$[b, 5b]$$.\n- Step 2: $$\\mathrm{E}(X^2) = \\int_b^{5b} \\frac{x^2}{4b}\\, dx = \\frac{1}{4b}\\left[\\frac{x^3}{3}\\right]_b^{5b} = \\frac{1}{12b}(125b^3 - b^3) = \\frac{124b^2}{12} = \\frac{31b^2}{3}$$.\n- Step 3: $$\\operatorname{Var}(X) = \\frac{31b^2}{3} - 9b^2 = \\frac{31b^2 - 27b^2}{3} = \\frac{4b^2}{3}$$. Verify with formula: $$\\frac{(5b-b)^2}{12} = \\frac{16b^2}{12} = \\frac{4b^2}{3}$$. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[-1,4]$$. Six observations are made. Find the probability exactly 4 are less than 1.4. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X < 1.4) = \\frac{1.4 - (-1)}{4 - (-1)} = \\frac{2.4}{5} = 0.48$$. Each observation independently has probability 0.48 of being less than 1.4.\n- Step 2: The count is $$W \\sim \\mathrm{B}(6, 0.48)$$. $$\\mathrm{P}(W = 4) = \\binom{6}{4}(0.48)^4(0.52)^2 = 15 \\times 0.05308 \\times 0.2704 \\approx 0.215$$.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A continuous random variable has CDF $$\\mathrm{F}(x) = \\begin{cases} 0 & x < -3 \\\\ \\frac{x+3}{7} & -3 \\leq x \\leq 4 \\\\ 1 & x > 4 \\end{cases}$$. How can you identify this as a uniform distribution, and find its mean and variance? (3 steps)", "answer": "- Step 1: The CDF is linear (of the form $$\\frac{x - a}{b - a}$$) on its support. Comparing: $$\\frac{x+3}{7} = \\frac{x - (-3)}{4 - (-3)}$$, so $$a = -3$$, $$b = 4$$. This is $$X \\sim \\mathrm{U}[-3, 4]$$.\n- Step 2: To find the p.d.f., differentiate: $$f(x) = \\mathrm{F}'(x) = \\frac{1}{7}$$ for $$-3 \\leq x \\leq 4$$, and 0 otherwise. This constant p.d.f. confirms the uniform distribution.\n- Step 3: $$\\mathrm{E}(X) = \\frac{-3+4}{2} = 0.5$$, $$\\operatorname{Var}(X) = \\frac{(4-(-3))^2}{12} = \\frac{49}{12}$$.\n\nA linear CDF on its support is the hallmark of a uniform distribution — differentiate to get the constant p.d.f.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[-2,5]$$. Find $$\\mathrm{P}(X > 0 \\mid X < 2)$$ and $$\\mathrm{P}(X > 3 \\mid X > 0)$$. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X > 0 \\mid X < 2) = \\frac{\\mathrm{P}(0 < X < 2)}{\\mathrm{P}(X < 2)} = \\frac{2/7}{4/7} = \\frac{1}{2}$$. Alternatively, given $$X < 2$$, the restricted distribution is $$\\mathrm{U}[-2, 2]$$, and $$\\mathrm{P}(X > 0) = \\frac{2}{4} = \\frac{1}{2}$$.\n- Step 2: $$\\mathrm{P}(X > 3 \\mid X > 0) = \\frac{\\mathrm{P}(X > 3)}{\\mathrm{P}(X > 0)} = \\frac{2/7}{5/7} = \\frac{2}{5}$$. Alternatively, given $$X > 0$$, the restricted distribution is $$\\mathrm{U}[0, 5]$$, and $$\\mathrm{P}(X > 3) = \\frac{2}{5}$$.\n- Step 3: Both approaches work: the conditional probability formula, or the \"restricted uniform\" approach where you condition and then compute on the new interval.\n\nThe restricted uniform approach is often faster: condition on the event, identify the new uniform interval, compute the probability on that interval.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Priya's checkout time $$X \\sim \\mathrm{U}[2,10]$$ minutes. She's already spent 5 minutes. Find the probability she takes less than 8 minutes total. Also find the probability she takes less than 5 minutes on each of 3 successive visits. (3 steps)", "answer": "- Step 1: Given $$X > 5$$, the restricted distribution is $$\\mathrm{U}[5, 10]$$. $$\\mathrm{P}(X < 8 \\mid X > 5) = \\frac{8-5}{10-5} = \\frac{3}{5}$$.\n- Step 2: $$\\mathrm{P}(X < 5) = \\frac{5-2}{10-2} = \\frac{3}{8}$$. For 3 independent visits: $$\\mathrm{P}(\\text{all} < 5) = \\left(\\frac{3}{8}\\right)^3 = \\frac{27}{512}$$.\n- Step 3: The conditional probability uses the restricted uniform; the multiple-visits probability uses independence (multiply probabilities).\n\nConditional probability → restricted uniform. Independent events → multiply probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A manufacturer produces sweets with length $$Y \\sim \\mathrm{U}[20,28]$$ mm. Sweets are packed in bags of 20. Find the probability a bag contains at least 7 sweets longer than 26 mm. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(Y > 26) = \\frac{28-26}{28-20} = \\frac{2}{8} = 0.25$$. The number of sweets in a bag longer than 26 mm is $$W \\sim \\mathrm{B}(20, 0.25)$$.\n- Step 2: $$\\mathrm{P}(W \\geq 7) = 1 - \\mathrm{P}(W \\leq 6) = 1 - \\sum_{k=0}^{6}\\binom{20}{k}(0.25)^k(0.75)^{20-k}$$. This requires cumulative binomial calculation (or tables). The key insight is the two-stage structure: uniform → single probability → binomial for counts.\n\n\"At least $$k$$\" problems require cumulative binomial probabilities — use $$1 - \\mathrm{P}(W \\leq k-1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{U}[a,b]$$ with $$\\mathrm{E}(X) = 2.5$$ and $$\\mathrm{P}(X < 1) = \\frac{4}{11}$$. Find $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: From the mean: $$\\frac{a+b}{2} = 2.5$$, so $$a + b = 5$$.\n- Step 2: From $$\\mathrm{P}(X < 1) = \\frac{4}{11}$$: $$\\frac{1 - a}{b - a} = \\frac{4}{11}$$, so $$11(1-a) = 4(b-a)$$, giving $$11 - 11a = 4b - 4a$$, i.e., $$7a + 4b = 11$$.\n- Step 3: From $$a + b = 5$$: $$b = 5 - a$$. Substituting: $$7a + 4(5-a) = 11$$, so $$7a + 20 - 4a = 11$$, giving $$3a = -9$$, so $$a = -3$$ and $$b = 8$$.\n\nWhen given a CDF-based condition, translate it into an equation relating $$a$$ and $$b$$ using $$\\frac{x - a}{b - a} = p$$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A plumber measures pipe lengths to the nearest cm. Three pipes are selected. Find the probability that all three measured lengths are within 0.2 cm of the true length. (2 steps)", "answer": "- Step 1: The rounding error $$R \\sim \\mathrm{U}[-0.5, 0.5]$$. Being within 0.2 cm of the true length means $$|R| < 0.2$$, i.e., $$-0.2 < R < 0.2$$. $$\\mathrm{P}(|R| < 0.2) = \\frac{0.4}{1} = 0.4$$.\n- Step 2: For 3 independent pipes: $$\\mathrm{P}(\\text{all within 0.2}) = (0.4)^3 = 0.064$$.\n\nThe rounding error model $$\\mathrm{U}[-0.5, 0.5]$$ applies whenever measurements are recorded to the nearest unit.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Joan records the daily high temperature as 29°C to the nearest degree. Let $$X$$ = error in the measured temperature. Find the variance of the error. (2 steps)", "answer": "- Step 1: The rounding error $$X \\sim \\mathrm{U}[-0.5, 0.5]$$. The true temperature is uniformly distributed in $$[28.5, 29.5)$$, so the error is uniformly distributed in $$[-0.5, 0.5)$$.\n- Step 2: $$\\operatorname{Var}(X) = \\frac{(0.5 - (-0.5))^2}{12} = \\frac{1}{12} \\approx 0.0833$$ °C².\n\nThe variance of a rounding error to the nearest unit is always $$\\frac{1}{12}$$ — a useful constant to remember.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}], "count": 40}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A continuous uniform distribution over $$[a,b]$$ has a constant probability density function. Why must the p.d.f. value be exactly $$\\frac{1}{b-a}$$, and what would go wrong if it were any other constant? (3 steps)", "answer": "- Step 1: The total probability over all possible values must equal 1. For a continuous distribution, this means the total area under the p.d.f. curve must be 1.\n- Step 2: The p.d.f. is a rectangle: width $$(b-a)$$ and height $$h$$. The area is $$h \\times (b-a)$$. Setting this equal to 1 gives $$h = \\frac{1}{b-a}$$.\n+ If $$h$$ were larger, the total area would exceed 1 (impossible — probabilities can't sum to more than 1).\n+ If $$h$$ were smaller, the total area would be less than 1 (some probability would be \"missing\").\n- Step 3: The constant height reflects the defining property: every value in $$[a,b]$$ is equally likely. The height is forced by the normalisation condition that total probability = 1.\n\nThe uniform distribution is the continuous analogue of \"rolling a fair die\" — every outcome in the interval is equally probable.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What does the notation $$X \\sim \\mathrm{U}[a,b]$$ mean, and what are the roles of $$a$$ and $$b$$?", "answer": "This notation means \"$$X$$ follows a continuous uniform distribution over the interval $$[a,b]$$.\" Here, $$a$$ is the minimum possible value of $$X$$ and $$b$$ is the maximum possible value. The distribution is fully specified by these two parameters — once you know $$a$$ and $$b$$, you know everything: the p.d.f., the mean, the variance, and the c.d.f. This is unlike many other distributions (e.g., normal) which require more complex parameterisation.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, why is $$\\mathrm{P}(X = c) = 0$$ for any single point $$c$$ in $$[a,b]$$? What does this imply about $$\\mathrm{P}(a \\leq X \\leq b)$$ versus $$\\mathrm{P}(a < X < b)$$? (3 steps)", "answer": "- Step 1: For a continuous random variable, probability corresponds to *area* under the p.d.f. curve. The area of a vertical line (zero width) is 0, so $$\\mathrm{P}(X = c) = 0$$ for any single point $$c$$.\n- Step 2: Since the endpoints $$a$$ and $$b$$ each have probability 0, including or excluding them makes no difference:\n+ $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(a < X < b) = 1$$\n+ $$\\mathrm{P}(a \\leq X < b) = \\mathrm{P}(a < X \\leq b) = 1$$\n- Step 3: This is a general property of all continuous distributions, not just the uniform. It means strict vs. non-strict inequalities in probability statements are interchangeable for continuous random variables.\n\nThis contrasts with discrete distributions, where $$\\mathrm{P}(X = c)$$ can be nonzero and the distinction between $$<$$ and $$\\leq$$ matters.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[3, 5]$$, how do you find $$\\mathrm{P}(3.2 < X < 4.3)$$ using both the \"area of rectangle\" method and the \"proportion\" method? Why do they give the same answer? (3 steps)", "answer": "- Step 1: **Area method**: The p.d.f. height is $$\\frac{1}{5-3} = 0.5$$. The interval $$[3.2, 4.3]$$ has width $$4.3 - 3.2 = 1.1$$. Probability = height × width = $$0.5 \\times 1.1 = 0.55$$.\n- Step 2: **Proportion method**: The favourable interval has width 1.1 out of a total interval width of 2. So probability = $$\\frac{1.1}{2} = 0.55$$.\n- Step 3: These are the same calculation in disguise: $$\\frac{1}{b-a} \\times (x_2 - x_1) = \\frac{x_2 - x_1}{b-a}$$. The proportion method is simply the area method with the arithmetic rearranged. Both rely on the constant density — every sub-interval of the same width has the same probability.\n\nFor quick mental checks, proportion is fastest: \"what fraction of the total range does my interval cover?\"", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[3,5]$$, suppose $$\\mathrm{P}(2X < k - X) = 0.2$$. How do you find $$k$$, and what's the key insight about rearranging the inequality? (3 steps)", "answer": "- Step 1: Rearrange the inequality in terms of $$X$$: $$2X < k - X$$ becomes $$3X < k$$, i.e., $$X < \\frac{k}{3}$$. The key insight is that all probability statements must be converted to conditions on $$X$$ itself before you can use the uniform distribution's properties.\n- Step 2: Now we need $$\\mathrm{P}(X < \\frac{k}{3}) = 0.2$$. Since $$X \\sim \\mathrm{U}[3,5]$$, the probability that $$X$$ falls below some value is proportional to the width below that value: $$\\frac{\\frac{k}{3} - 3}{5 - 3} = 0.2$$.\n- Step 3: Solve: $$\\frac{\\frac{k}{3} - 3}{2} = 0.2$$, so $$\\frac{k}{3} - 3 = 0.4$$, giving $$\\frac{k}{3} = 3.4$$, so $$k = 10.2$$.\n\nAlways verify the answer makes sense: $$\\frac{k}{3} = 3.4$$ is within $$[3,5]$$, and the interval $$[3, 3.4]$$ has width 0.4 out of 2, giving probability 0.2. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A uniform p.d.f. has height 0.4 and spans from $$k$$ to 4, with total area 1. How do you find $$k$$, and why must $$k < 4$$? (2 steps)", "answer": "- Step 1: Total area = height × width = $$0.4 \\times (4 - k) = 1$$. Solving: $$4 - k = 2.5$$, so $$k = 1.5$$.\n- Step 2: We need $$k < 4$$ because the width $$(4 - k)$$ must be positive for the distribution to make sense (the interval can't have zero or negative length). This also ensures the height $$\\frac{1}{b-a}$$ is positive.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, how do you compute $$\\mathrm{P}(X > c \\mid X > d)$$ where $$d > a$$? What's the intuition behind the \"restricted sample space\" approach? (3 steps)", "answer": "- Step 1: By the definition of conditional probability: $$\\mathrm{P}(X > c \\mid X > d) = \\frac{\\mathrm{P}(X > c \\text{ and } X > d)}{\\mathrm{P}(X > d)}$$. Since $$c > d$$, the condition \"$$X > c$$ and $$X > d$$\" simplifies to \"$$X > c$$\".\n- Step 2: Compute each: $$\\mathrm{P}(X > c) = \\frac{b-c}{b-a}$$ and $$\\mathrm{P}(X > d) = \\frac{b-d}{b-a}$$. The ratio is $$\\frac{b-c}{b-d}$$.\n- Step 3: **Restricted sample space intuition**: Given that $$X > d$$, the value of $$X$$ is now uniformly distributed over the *restricted* interval $$[d, b]$$. So $$\\mathrm{P}(X > c \\mid X > d)$$ is just the probability of being above $$c$$ within this new uniform distribution on $$[d, b]$$, which is $$\\frac{b - c}{b - d}$$. This is the continuous analogue of \"removing impossible outcomes and renormalising.\"\n\nThis property — conditioning a uniform distribution gives another uniform distribution on a restricted interval — is unique and extremely useful.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[3,8]$$, find $$\\mathrm{P}(X < 7 \\mid X > 4)$$. Walk through both the formula approach and the \"restricted interval\" shortcut. (3 steps)", "answer": "- Step 1: **Formula approach**: $$\\mathrm{P}(X < 7 \\mid X > 4) = \\frac{\\mathrm{P}(4 < X < 7)}{\\mathrm{P}(X > 4)} = \\frac{\\frac{7-3}{8-3}}{\\frac{8-4}{8-3}} = \\frac{\\frac{4}{5}}{\\frac{4}{5}} = \\frac{3}{4}$$. Wait — let me recalculate: $$\\mathrm{P}(4 < X < 7) = \\frac{4}{5}$$ and $$\\mathrm{P}(X > 4) = \\frac{4}{5}$$. That gives 1, which is wrong. Let me redo: $$\\mathrm{P}(4 < X < 7) = \\frac{7-4}{8-3} = \\frac{3}{5}$$. $$\\mathrm{P}(X > 4) = \\frac{8-4}{8-3} = \\frac{4}{5}$$. Ratio = $$\\frac{3/5}{4/5} = \\frac{3}{4}$$.\n- Step 2: **Restricted interval shortcut**: Given $$X > 4$$, the distribution is $$\\mathrm{U}[4, 8]$$. Now find $$\\mathrm{P}(X < 7)$$ on this new interval: $$\\frac{7-4}{8-4} = \\frac{3}{4}$$.\n- Step 3: Both methods agree. The shortcut is faster: just recompute on the restricted interval $$[4, 8]$$. This works because conditioning a uniform distribution on a sub-interval gives a uniform distribution on that sub-interval.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If $$X \\sim \\mathrm{U}[a,b]$$ and $$Y = cX + d$$ where $$c > 0$$, what is the distribution of $$Y$$, and why? What changes if $$c < 0$$? (3 steps)", "answer": "- Step 1: A linear transformation of a uniform random variable is still uniform. When $$X$$ ranges over $$[a,b]$$, $$Y = cX + d$$ ranges over $$[ca + d, cb + d]$$. So $$Y \\sim \\mathrm{U}[ca+d, cb+d]$$.\n- Step 2: **Why?** The p.d.f. of $$X$$ is constant on $$[a,b]$$. A linear stretch/shift preserves constant density — it just changes the interval endpoints. The new height adjusts to $$\\frac{1}{c(b-a)}$$ so the total area remains 1.\n- Step 3: If $$c < 0$$, the interval reverses: $$Y$$ ranges from $$cb + d$$ (the new minimum) to $$ca + d$$ (the new maximum). So $$Y \\sim \\mathrm{U}[cb+d, ca+d]$$. For example, if $$X \\sim \\mathrm{U}[2,8]$$ and $$Y = -X$$, then $$Y \\sim \\mathrm{U}[-8, -2]$$.\n\nThis is analogous to how a linear transformation of a normal distribution gives another normal distribution — the family is closed under linear transformations.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, derive $$\\mathrm{E}(X) = \\frac{a+b}{2}$$ from first principles. Why does the result make intuitive sense? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{E}(X) = \\int_a^b x \\cdot \\frac{1}{b-a} \\, dx = \\frac{1}{b-a} \\int_a^b x \\, dx = \\frac{1}{b-a} \\left[\\frac{x^2}{2}\\right]_a^b = \\frac{1}{b-a} \\cdot \\frac{b^2 - a^2}{2}$$.\n- Step 2: Factor: $$b^2 - a^2 = (b-a)(b+a)$$, so $$\\mathrm{E}(X) = \\frac{(b-a)(b+a)}{2(b-a)} = \\frac{a+b}{2}$$.\n- Step 3: **Intuition**: The mean is the midpoint of the interval. Since every value is equally likely, the \"balance point\" is exactly in the centre — just as the centre of mass of a uniform rod is at its midpoint. This is the continuous version of \"the average of the smallest and largest equally-likely values.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, derive $$\\operatorname{Var}(X) = \\frac{(b-a)^2}{12}$$ from first principles using $$\\operatorname{Var}(X) = \\int_a^b (x - \\mu)^2 f(x) \\, dx$$. Why does the variance only depend on the *width* $$(b-a)$$ and not on the *location* of the interval? (4 steps)", "answer": "- Step 1: With $$\\mu = \\frac{a+b}{2}$$, let $$u = x - \\mu$$. Then $$\\operatorname{Var}(X) = \\int_a^b (x-\\mu)^2 \\cdot \\frac{1}{b-a} \\, dx = \\frac{1}{b-a} \\int_a^b \\left(x - \\frac{a+b}{2}\\right)^2 dx$$.\n- Step 2: Substitute limits: when $$x = a$$, the expression is $$\\left(a - \\frac{a+b}{2}\\right)^2 = \\left(\\frac{a-b}{2}\\right)^2 = \\frac{(b-a)^2}{4}$$. When $$x = b$$, it's $$\\left(\\frac{b-a}{2}\\right)^2 = \\frac{(b-a)^2}{4}$$. The integrand $$(x - \\mu)^2$$ is a perfect shift of $$u^2$$, so we can integrate directly:\n$$\\frac{1}{b-a} \\left[\\frac{(x-\\mu)^3}{3}\\right]_a^b = \\frac{1}{3(b-a)}\\left[\\left(\\frac{b-a}{2}\\right)^3 - \\left(-\\frac{b-a}{2}\\right)^3\\right]$$\n- Step 3: Since $$\\left(-\\frac{b-a}{2}\\right)^3 = -\\left(\\frac{b-a}{2}\\right)^3$$, we get $$\\frac{1}{3(b-a)} \\cdot 2 \\cdot \\left(\\frac{b-a}{2}\\right)^3 = \\frac{2(b-a)^3}{3(b-a) \\cdot 8} = \\frac{(b-a)^2}{12}$$.\n- Step 4: **Why only width matters**: Variance measures *spread*, not *location*. Shifting the entire interval left or right (changing $$a$$ and $$b$$ by the same amount) doesn't change how spread out the values are — it only changes where they are. The variance depends only on the range $$b - a$$, which determines how far values can deviate from the mean.\n\nThe factor of 12 arises from integrating a squared quantity over a symmetric range — it's a purely mathematical consequence.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, derive the cumulative distribution function $$\\mathrm{F}(x)$$. Why is $$\\mathrm{F}(x)$$ a straight line between $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x) = \\int_{-\\infty}^{x} f(t) \\, dt$$. For $$x$$ in $$[a,b]$$, this becomes $$\\int_a^x \\frac{1}{b-a} \\, dt = \\frac{x - a}{b - a}$$.\n- Step 2: The full c.d.f. is:\n+ $$\\mathrm{F}(x) = 0$$ for $$x < a$$ (no probability accumulated yet)\n+ $$\\mathrm{F}(x) = \\frac{x-a}{b-a}$$ for $$a \\leq x \\leq b$$ (linearly increasing)\n+ $$\\mathrm{F}(x) = 1$$ for $$x > b$$ (all probability accumulated)\n- Step 3: **Why linear?** The p.d.f. is constant (a flat rectangle), so the accumulated area grows at a constant rate as $$x$$ moves from $$a$$ to $$b$$. A constant rate of accumulation means a straight-line c.d.f. This is the graphical signature of the uniform distribution.\n\nThis c.d.f. is NOT given in the formula booklet — you must be able to derive it.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A uniform distribution $$Y \\sim \\mathrm{U}[a,b]$$ has $$\\mathrm{E}(Y) = 1$$ and $$\\operatorname{Var}(Y) = \\frac{16}{3}$$. How do you find $$a$$ and $$b$$, and why must you check which value is $$a$$ and which is $$b$$? (3 steps)", "answer": "- Step 1: From the mean: $$\\frac{a+b}{2} = 1$$, so $$a + b = 2$$. From the variance: $$\\frac{(b-a)^2}{12} = \\frac{16}{3}$$, so $$(b-a)^2 = 64$$, giving $$b - a = \\pm 8$$.\n- Step 2: Solve simultaneously. If $$b - a = 8$$: adding to $$a + b = 2$$ gives $$2b = 10$$, so $$b = 5$$ and $$a = -3$$. If $$b - a = -8$$: adding gives $$2b = -6$$, so $$b = -3$$ and $$a = 5$$.\n- Step 3: By convention, $$a < b$$ (the lower bound must be less than the upper bound). So $$a = -3, b = 5$$. The other solution ($$a = 5, b = -3$$) is rejected because it would make the interval $$[5, -3]$$ which is empty/invalid.\n\nAlways check that $$a < b$$ after solving — the variance formula gives $$(b-a)^2$$, which loses the sign information.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Why is $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$ in general? For $$X \\sim \\mathrm{U}[1,5]$$, find both values to illustrate the difference. What identity connects them? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X^2)$$ is the average of the *squared* values, while $$(\\mathrm{E}(X))^2$$ is the *square of the average*. These differ because squaring is a nonlinear operation — Jensen's inequality tells us that for a convex function like $$x^2$$, $$\\mathrm{E}(g(X)) \\geq g(\\mathrm{E}(X))$$, so $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$, with equality only when $$X$$ is constant.\n- Step 2: For $$X \\sim \\mathrm{U}[1,5]$$: $$\\mathrm{E}(X) = 3$$, so $$(\\mathrm{E}(X))^2 = 9$$. Meanwhile, $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2 = \\frac{(5-1)^2}{12} + 9 = \\frac{16}{12} + 9 = \\frac{4}{3} + 9 = \\frac{31}{3} \\approx 10.33$$. Clearly $$10.33 \\neq 9$$.\n- Step 3: The connecting identity is: $$\\operatorname{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$, rearranged as $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2$$. This is often the easiest way to find $$\\mathrm{E}(X^2)$$ when you already know the mean and variance.\n\nThis is a crucial distinction: confusing $$\\mathrm{E}(X^2)$$ with $$(\\mathrm{E}(X))^2$$ is one of the most common errors in exams.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "If $$X \\sim \\mathrm{U}[3,8]$$ and $$Y = 12 - 3X$$, find $$\\mathrm{E}(Y)$$ and describe the distribution of $$Y$$. Why can you use $$\\mathrm{E}(aX+b) = a\\mathrm{E}(X) + b$$ instead of finding the full distribution first? (3 steps)", "answer": "- Step 1: Using the linearity of expectation: $$\\mathrm{E}(Y) = \\mathrm{E}(12 - 3X) = 12 - 3\\mathrm{E}(X) = 12 - 3 \\times 5.5 = 12 - 16.5 = -4.5$$.\n- Step 2: The distribution of $$Y$$: since $$X \\sim \\mathrm{U}[3,8]$$ and $$Y = -3X + 12$$, this is a linear transformation. When $$X = 3$$, $$Y = -9 + 12 = 3$$. When $$X = 8$$, $$Y = -24 + 12 = -12$$. Since the coefficient of $$X$$ is negative ($$-3 < 0$$), the interval reverses, so $$Y \\sim \\mathrm{U}[-12, 3]$$.\n- Step 3: You can use the linearity rule because it's a general property of expectation that works for *any* distribution — you don't need to know what distribution $$Y$$ follows. However, knowing that linear transforms of uniforms are uniform is useful for finding probabilities involving $$Y$$.\n\nThe linearity of expectation is distribution-free; the \"uniform stays uniform\" property is distribution-specific.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{U}[3,8]$$ and $$Y = 12 - 3X$$, find $$\\mathrm{P}(Y > 0)$$ by converting to a probability statement about $$X$$. Why is this approach often simpler than working directly with $$Y$$? (3 steps)", "answer": "- Step 1: Convert the inequality: $$Y > 0$$ means $$12 - 3X > 0$$, so $$3X < 12$$, giving $$X < 4$$.\n- Step 2: Now find $$\\mathrm{P}(X < 4)$$ using the uniform distribution on $$[3, 8]$$: $$\\mathrm{P}(X < 4) = \\frac{4 - 3}{8 - 3} = \\frac{1}{5}$$.\n- Step 3: This approach is simpler because you already know the distribution of $$X$$. While you *could* use $$Y \\sim \\mathrm{U}[-12, 3]$$ and compute $$\\mathrm{P}(Y > 0) = \\frac{3 - 0}{3 - (-12)} = \\frac{3}{15} = \\frac{1}{5}$$, the conversion method avoids needing to determine the distribution of $$Y$$ first.\n\nBoth methods work; the conversion method is often faster for a single probability calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{U}[3,8]$$ and $$Y = 12 - 3X$$, find $$\\mathrm{P}(X < 7 \\mid Y < 0)$$. What's the key step in handling conditional probability when the condition involves a different random variable? (3 steps)", "answer": "- Step 1: Convert the condition to be about $$X$$: $$Y < 0$$ means $$12 - 3X < 0$$, so $$X > 4$$. The problem becomes $$\\mathrm{P}(X < 7 \\mid X > 4)$$.\n- Step 2: Use conditional probability: $$\\mathrm{P}(X < 7 \\mid X > 4) = \\frac{\\mathrm{P}(4 < X < 7)}{\\mathrm{P}(X > 4)} = \\frac{\\frac{7-4}{8-3}}{\\frac{8-4}{8-3}} = \\frac{3/5}{4/5} = \\frac{3}{4}$$.\n- Step 3: The key step is always converting everything to the same random variable before applying probability rules. Once both the event and the condition are expressed in terms of $$X$$, you can use the standard conditional probability formula or the \"restricted interval\" shortcut: given $$X > 4$$, use $$\\mathrm{U}[4,8]$$ and find $$\\mathrm{P}(X < 7) = \\frac{7-4}{8-4} = \\frac{3}{4}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "The radius $$R$$ of a tree cross-section is modelled as $$R \\sim \\mathrm{U}[1,5]$$. Find $$\\mathrm{E}(\\pi R^2)$$, the expected area. Why can't you just compute $$\\pi(\\mathrm{E}(R))^2$$? (3 steps)", "answer": "- Step 1: The area is $$A = \\pi R^2$$, so $$\\mathrm{E}(A) = \\pi \\, \\mathrm{E}(R^2)$$. We need $$\\mathrm{E}(R^2)$$, NOT $$(\\mathrm{E}(R))^2$$.\n- Step 2: Using the identity $$\\mathrm{E}(R^2) = \\operatorname{Var}(R) + (\\mathrm{E}(R))^2$$: $$\\mathrm{E}(R) = \\frac{1+5}{2} = 3$$ and $$\\operatorname{Var}(R) = \\frac{(5-1)^2}{12} = \\frac{4}{3}$$. So $$\\mathrm{E}(R^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$, and $$\\mathrm{E}(A) = \\frac{31\\pi}{3}$$.\n- Step 3: You can't use $$\\pi(\\mathrm{E}(R))^2 = 9\\pi$$ because squaring and averaging don't commute. Since $$R$$ varies, the average of the squares exceeds the in this range. The uniform distribution correctly captures this \"equally likely\" property.\n- Step 2: **(b) Heights of 18-year-old females**: No, uniform is NOT appropriate. Human heights cluster around a central value (approximately normally distributed) — most people are near average height, with fewer very short or very tall. A uniform model would say someone is equally likely to be 150cm as 170cm, which contradicts reality. The normal distribution is the correct model here.\n\nThe key question: is every value in the range equally likely? If yes → uniform. If values cluster near the centre → normal or another bell-shaped distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A bus arrives at a random time between 3 minutes early and 10 minutes late. If $$X$$ = minutes after 9am when the bus arrives, specify the distribution fully and find the probability Jameil is late (bus after 9:05). (3 steps)", "answer": "- Step 1: 3 minutes early means the bus can arrive at 8:57 (i.e., $$X = -3$$). 10 minutes late means it can arrive at 9:10 (i.e., $$X = 10$$). So $$X \\sim \\mathrm{U}[-3, 10]$$.\n- Step 2: Jameil is late if the bus arrives after 9:05, i.e., $$X > 5$$. Using proportion: $$\\mathrm{P}(X > 5) = \\frac{10 - 5}{10 - (-3)} = \\frac{5}{13}$$.\n- Step 3: The mean arrival time is $$\\mathrm{E}(X) = \\frac{-3 + 10}{2} = 3.5$$ minutes after 9am, i.e., 9:03:30 on average. The c.d.f. is $$\\mathrm{F}(x) = \\frac{x + 3}{13}$$ for $$-3 \\leq x \\leq 10$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A coffee machine pours between 190ml and 210ml uniformly. Find the interquartile range (IQR) of $$X$$. What does the IQR represent geometrically on the p.d.f.? (3 steps)", "answer": "- Step 1: The IQR is the distance between the lower quartile $$Q_1$$ (where $$\\mathrm{P}(X \\leq Q_1) = 0.25$$) and the upper quartile $$Q_3$$ (where $$\\mathrm{P}(X \\leq Q_3) = 0.75$$).\n- Step 2: Using the c.d.f. $$\\mathrm{F}(x) = \\frac{x - 190}{20}$$: $$Q_1$$ satisfies $$\\frac{Q_1 - 190}{20} = 0.25$$, so $$Q_1 = 195$$. $$Q_3$$ satisfies $$\\frac{Q_3 - 190}{20} = 0.75$$, so $$Q_3 = 205$$. IQR = $$205 - 195 = 10$$ml.\n- Step 3: Geometrically, the IQR is the width of the central 50% of the distribution. On the p.d.f. graph (a rectangle of height $$\\frac{1}{20}$$), the IQR corresponds to the interval that contains exactly half the total area. For any uniform distribution, IQR = $$\\frac{b-a}{2}$$, since the quartiles are evenly spaced.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, find the value of $$x$$ such that $$\\mathrm{P}(X \\geq x) = p$$. Express this as a general formula and explain the logic. (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\geq x) = p$$ means $$1 - \\mathrm{F}(x) = p$$, so $$\\mathrm{F}(x) = 1 - p$$. Using the c.d.f.: $$\\frac{x - a}{b - a} = 1 - p$$.\n- Step 2: Solving: $$x = a + (1-p)(b-a) = a + b - a - p(b-a) = b - p(b-a)$$. Intuitively: we need the top $$p$$ fraction of the distribution, which starts at a distance $$p(b-a)$$ from the upper endpoint $$b$$.\n\nFor example, if $$\\mathrm{P}(X \\geq x) = 0.65$$ with $$X \\sim \\mathrm{U}[175, 215]$$: $$x = 215 - 0.65(40) = 215 - 26 = 189$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Each cup from a drinks machine has volume $$X \\sim \\mathrm{U}[175,215]$$$ ml. Rashmi buys 5 cups. Find the probability that exactly 3 contain less than 187 ml. What two distributions are being combined, and why? (3 steps)", "answer": "- Step 1: First, find the probability that a single cup has less than 187 ml: $$\\mathrm{P}(X < 187) = \\frac{187 - 175}{215 - 175} = \\frac{12}{40} = 0.3$$.\n- Step 2: Each cup is an independent trial with \"success\" = less than 187ml (probability 0.3) and \"failure\" = 187ml or more (probability 0.7). The number of successes in 5 independent trials follows a **binomial distribution**: $$B(5, 0.3)$$.\n- Step 3: $$\\mathrm{P}(\\text{exactly 3}) = \\binom{5}{3}(0.3)^3(0.7)^2 = 10 \\times 0.027 \\times 0.49 = 0.1323$$.\n\nThe key insight: the uniform distribution gives you the per-trial probability $$p$$, and then the binomial distribution counts successes across multiple independent trials. This two-step pattern (uniform → binomial) appears frequently.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A 20cm rod is cut at a random point. The longer piece $$X \\sim \\mathrm{U}[10,20]$$. The two pieces form the base and height of a rectangle. Find the expected area, and explain why $$X$$ ranges over $$[10,20]$$ rather than $$[0,20]$$. (3 steps)", "answer": "- Step 1: The cut point is uniformly distributed on $$[0,20]$$. If the cut is at point $$c$$, the two pieces have lengths $$c$$ and $$20-c$$. The longer piece has length $$\\max(c, 20-c)$$, which ranges from 10 (when $$c = 10$$) to 20 (when $$c = 0$$ or $$c = 20$$). Hence $$X \\sim \\mathrm{U}[10,20]$$.\n- Step 2: The rectangle has base $$X$$ and height $$20 - X$$, so area $$A = X(20 - X) = 20X - X^2$$. Then $$\\mathrm{E}(A) = 20\\mathrm{E}(X) - \\mathrm{E}(X^2)$$.\n+ $$\\mathrm{E}(X) = 15$$\n+ $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2 = \\frac{100}{12} + 225 = \\frac{100}{12} + 225 = \\frac{2800}{12} + \\frac{100}{12} = \\frac{2900}{12} = \\frac{725}{3}$$\nWait, let me recalculate: $$\\operatorname{Var}(X) = \\frac{(20-10)^2}{12} = \\frac{100}{12} = \\frac{25}{3}$$. So $$\\mathrm{E}(X^2) = \\frac{25}{3} + 225 = \\frac{25 + 675}{3} = \\frac{700}{3}$$.\n- Step 3: $$\\mathrm{E}(A) = 20(15) - \\frac{700}{3} = 300 - \\frac{700}{3} = \\frac{900 - 700}{3} = \\frac{200}{3} \\approx 66.7$$ cm².\n\nThe range $$[10,20]$$ makes sense: the longer piece can never be shorter than 10cm (that's the minimum of the max function), and can never exceed 20cm (the total rod length).", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Given
