false}, {"question": "For X ~ U[a, b], find P(X < (3/7)a + (4/7)b). What is this point called? (2 steps)", "answer": "- Step 1: The point (3/7)a + (4/7)b is a weighted average (3/7 from a, 4/7 from b), lying 3/7 of the way from a to b.\n- Step 2: P(X < weighted point) = (weighted point - a)/(b-a) = [(3/7)a + (4/7)b - a]/(b-a) = [(3/7 - 1)a + (4/7)b]/(b-a) = [(-4/7)a + (4/7)b]/(b-a) = (4/7)(b-a)/(b-a) = 4/7\n\nThis is at the 4/7 quantile of the distribution.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "For X ~ U[a, b], find P(X > (2/5)a + (3/5)b). (2 steps)", "answer": "- Step 1: The point (2/5)a + (3/5)b is 3/5 of the way from a to b (or equivalently, 2/5 from b).\n- Step 2: P(X > weighted point) = (b - weighted point)/(b-a) = [b - (2/5)a - (3/5)b]/(b-a) = [(2/5)b - (2/5)a]/(b-a) = (2/5)(b-a)/(b-a) = 2/5", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "If X ~ U[a, b] and you wanted P(X < m) = p, what is m in terms of a, b, and p? (1 step)", "answer": "m = a + p(b - a)\n\nThis is the p-th quantile (or inverse CDF): m = F⁻¹(p)", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "Six observations are made of X ~ U[-1, 4]. Find probability that exactly 4 observations are less than 1.4. (2 steps)", "answer": "- Step 1: First find P(X < 1.4). P(X < 1.4) = (1.4 - (-1))/(4 - (-1)) = 2.4/5 = 0.48\n- Step 2: This is a binomial problem: n=6, p=0.48. P(exactly 4) = C(6,4) × 0.48⁴ × 0.52² = 15 × 0.053 ≈ 0.795", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "Ten rods are cut with error X ~ U[-3, 3] mm. Find probability exactly 6 are within 2 mm of target (i.e., |X| < 2). (2 steps)", "answer": "- Step 1: P(|X| < 2) = P(-2 < X < 2) = (2 - (-2))/(3 - (-2)) = 4/6 = 2/3 ≈ 0.667\n- Step 2: Binomial: n=10, p=2/3. P(exactly 6) = C(10,6) × (2/3)⁶ × (1/3)⁴ = 210 × (64/729) × (1/81) ≈ 210 × 0.000108 ≈ 0.227", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "Sweets have length Y ~ U[20, 28] mm. Find P(Y > 26). If 20 sweets are randomly packed, find P(at least 7 have length > 26 mm). (3 steps)", "answer": "- Step 1: P(Y > 26) = (28 - 26)/(28 - 20) = 2/8 = 1/4 = 0.25\n- Step 2: For 20 sweets, this is binomial with n=20, p=0.25. P(at least 7) = 1 - P(0 to 6)\n- Step 3: This requires summing binomial probabilities. P(0) = 0.75²⁰ ≈ 0; P(1) ≈ 0; P(2) ≈ 0.003; P(3) ≈ 0.015; P(4) ≈ 0.054; P(5) ≈ 0.134; P(6) ≈ 0.234. Sum ≈ 0.44. So P(at least 7) ≈ 1 - 0.44 = 0.56", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "Waiting times X ~ U[2, 7] minutes between flights. A flight is at 10 am. Find P(next flight before 10:05). (1 step)", "answer": "P(X < 5) = (5 - 2)/(7 - 2) = 3/5 = 0.6", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "Waiting times X ~ U[2, 7] minutes. For next 10 flights, find P(at least 3 have waiting time > 6 minutes). (2 steps)", "answer": "- Step 1: P(X > 6) = (7 - 6)/(7 - 2) = 1/5 = 0.2\n- Step 2: Binomial with n=10, p=0.2. P(at least 3) = 1 - [P(0) + P(1) + P(2)]. P(0) = 0.8¹⁰ ≈ 0.107; P(1) = 10×0.2×0.8⁹ ≈ 0.268; P(2) = 45×0.04×0.8⁸ ≈ 0.302. Sum ≈ 0.677. So P(at least 3) ≈ 0.323", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "The continuous random variable X has pdf f(x) = k for -2 ≤ x ≤ 6. Find k and P(-1.3 < X < 4.2). (2 steps)", "answer": "- Step 1: Area = 1 gives k × (6 - (-2)) = 1, so k = 1/8\n- Step 2: P(-1.3 < X < 4.2) = (4.2 - (-1.3)) × (1/8) = 5.5/8 = 11/16 = 0.6875", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": false}, {"question": "For X ~ U[-2, 6], find p such that P(3X < X + p) = 0.5. (3 steps)", "answer": "- Step 1: 3X < X + p means 2X < p, so X < p/2\n- Step 2: P(X < p/2) = (p/2 - (-2))/(6 - (-2)) = (p/2 + 2)/8 = 0.5\n- Step 3: p/2 + 2 = 4 → p/2 = 2 → p = 4", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "For X ~ U[-2, 6], find P(X > 5 | X > 0). (2 steps)", "answer": "- Step 1: Given X > 0, X is uniform on [0, 6]\n- Step 2: P(X > 5 | X > 0) = (6 - 5)/(6 - 0) = 1/6", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "For X ~ U[-2, 6], find P(X > 0 | X < 3). (2 steps)", "answer": "- Step 1: Given X < 3, X is uniform on [-2, 3]\n- Step 2: P(X > 0 | X < 3) = (3 - 0)/(3 - (-2)) = 3/5 = 0.6", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "For X ~ U[-2, 6], find P(X < 1 | 0 < X < 2). (2 steps)", "answer": "- Step 1: The condition 0 < X < 2 means X is uniform on (0, 2). We're asked for P(X < 1 | 0 < X < 2).\n- Step 2: Given X is uniform on [0, 2], P(X < 1) = (1 - 0)/(2 - 0) = 1/2", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "Y ~ U[a, b] has P(Y < 5) = 1/4 and P(Y > 7) = 1/2. Find a and b. (3 steps)", "answer": "- Step 1: P(Y < 5) = (5 - a)/(b - a) = 1/4 → 5 - a = (b - a)/4 → 20 - 4a = b - a → b = 20 - 3a\n- Step 2: P(Y > 7) = (b - 7)/(b - a) = 1/2 → 2(b - 7) = b - a → 2b - 14 = b - a → b = 14 - a\n- Step 3: Equating: 20 - 3a = 14 - a → 6 = 2a → a = 3, b = 11", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "A spinner with radius r and pointer length r has angle θ ~ U[0, 2π]. The horizontal distance X = r sin(θ). Find E(X). Explain. (2 steps)", "answer": "- Step 1: E(X) = E(r sin(θ)) = r × E(sin(θ))\n- Step 2: Over a full cycle [0, 2π], sin(θ) is symmetric: equal areas above and below zero. Therefore E(sin(θ)) = 0, and hence E(X) = 0.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}], "count": 69}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Write down the probability density function of $$X \\sim U[a, b]$$, and explain why the height of the PDF must take the value it does. (3 steps)", "answer": "- Step 1: The PDF is $$f(x) = \\frac{1}{b-a}$$ on the interval $$a \\leq x \\leq b$$, and $$f(x) = 0$$ outside this interval. The graph is a horizontal rectangle sitting on $$[a, b]$$.\n- Step 2: For ANY PDF, the total area under it must equal 1 (total probability). So we need $$\\int_a^b f(x)\\,dx = 1$$.\n- Step 3: The area of the rectangle is height × width $$= h \\cdot (b-a)$$. Setting this equal to 1 forces $$h = \\frac{1}{b-a}$$.\n\nThe word \"uniform\" reflects that the density is *constant* — every region of equal width on $$[a, b]$$ has equal probability. The height is whatever it needs to be to make the rectangle have area 1.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "For a continuous random variable $$X$$, what is $$P(X = c)$$ for any specific value $$c$$, and why? (3 steps)", "answer": "- Step 1: $$P(X = c) = 0$$ for every individual value $$c$$, no matter how \"likely\" it seems.\n- Step 2: A probability for a continuous variable is the *area under the PDF* over an interval. A single point has width zero, so the area is zero.\n- Step 3: Intuitively: the variable can take uncountably many values, so spreading total probability of 1 across them means each individual point gets zero probability — only intervals of positive width carry probability.\n\nThis is the key contrast with discrete distributions, where individual outcomes do have positive probability. It also explains why $$U[a,b]$$ and $$U(a,b)$$ give identical probabilities — endpoint inclusion does not matter.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "A student writes \"for $$X \\sim U[2, 7]$$, $$P(X = 3) = \\frac{1}{5}$$ because the density is $$\\frac{1}{5}$$.\" What is the conceptual error?", "answer": "The student has confused **density** with **probability**. The value $$\\frac{1}{5}$$ is the *density* $$f(3)$$, not a probability. Density has units of \"probability per unit width\" — to convert to probability, you multiply by an interval width. So $$P(2.9 < X < 3.1) \\approx \\frac{1}{5} \\times 0.2 = 0.04$$, but $$P(X = 3) = 0$$ because there's zero width at a single point. The density tells you *how concentrated* the probability is, not *how much* probability sits at a point.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "For $$X \\sim U[a, b]$$, explain how to compute $$P(c < X < d)$$ where $$a \\leq c < d \\leq b$$, using a geometric argument. (3 steps)", "answer": "- Step 1: The PDF is a rectangle of total area 1, with width $$(b-a)$$ and height $$\\frac{1}{b-a}$$.\n- Step 2: $$P(c < X < d)$$ is the area of the *sub-rectangle* over $$[c, d]$$, which has width $$(d-c)$$ and the same height $$\\frac{1}{b-a}$$.\n- Step 3: So $$P(c < X < d) = \\frac{d-c}{b-a}$$ — the ratio of the sub-interval's width to the full interval's width.\n\nThe takeaway: for a uniform distribution, probability *is* proportion. You don't need to integrate — just compare lengths.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "For $$X \\sim U[2, 7]$$, mentally compute $$P(3 < X < 5)$$ and $$P(X > 4)$$ — and explain the reasoning in each case. (2 steps)", "answer": "- Step 1: For $$P(3 < X < 5)$$: this interval has width $$5 - 3 = 2$$, sitting inside the total width $$7 - 2 = 5$$. So $$P(3 < X < 5) = \\frac{2}{5}$$.\n- Step 2: For $$P(X > 4)$$: equivalent to $$P(4 < X < 7)$$, with width $$7 - 4 = 3$$ inside total width $$5$$. So $$P(X > 4) = \\frac{3}{5}$$.\n\nNotice the speed: no integration, no formula — just \"what fraction of the interval is in this region?\". This is the practical advantage of recognizing a uniform distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A PDF graph shows a horizontal rectangle of height $$0.4$$ over the interval $$[k, 4]$$ and zero elsewhere. Explain how to find $$k$$. (2 steps)", "answer": "- Step 1: Since the area under any PDF must equal 1, we have $$\\text{height} \\times \\text{width} = 1$$, so $$0.4 \\times (4 - k) = 1$$.\n- Step 2: Solving: $$4 - k = 2.5$$, hence $$k = 1.5$$.\n\nConceptual insight: the height $$0.4$$ already *encodes* the interval width — it must equal $$\\frac{1}{b-a}$$. So we could write $$0.4 = \\frac{1}{4 - k}$$ directly. Either route works; both are just expressing \"rectangle area = 1\".", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "For $$X \\sim U[a, b]$$, derive the formula $$E(X) = \\frac{a+b}{2}$$ using a symmetry argument and verify it by integration. (3 steps)", "answer": "- Step 1 (Symmetry): The PDF is a rectangle, perfectly symmetric about its midpoint $$\\frac{a+b}{2}$$. The mean of any symmetric distribution equals its centre of symmetry. So $$E(X) = \\frac{a+b}{2}$$ without any calculation.\n- Step 2 (Integration): $$E(X) = \\int_a^b x \\cdot \\frac{1}{b-a}\\, dx = \\frac{1}{b-a} \\cdot \\left[\\frac{x^2}{2}\\right]_a^b = \\frac{b^2 - a^2}{2(b-a)}$$.\n- Step 3: Factor: $$\\frac{(b-a)(b+a)}{2(b-a)} = \\frac{a+b}{2}$$. ✓\n\nBoth routes give the same answer. The symmetry argument is faster and reveals *why* the mean is the midpoint — there's no algebraic accident here, it's a structural feature of any symmetric PDF.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "For $$X \\sim U[a, b]$$, explain why $$\\text{Var}(X)$$ depends on $$(b - a)^2$$ but **not** on the actual location of the interval. (3 steps)", "answer": "- Step 1: Variance is a measure of spread *around the mean* — it's translation-invariant. Shifting the interval (e.g. moving $$U[0, 1]$$ to $$U[10, 11]$$) shifts the mean by the same amount but doesn't change any deviations $$(X - \\mu)$$.\n- Step 2: Scaling the interval scales each deviation proportionally. If you double the width, every deviation $$(X - \\mu)$$ doubles, so squared deviations quadruple, and so does the variance.\n- Step 3: Therefore $$\\text{Var}(X) = c \\cdot (b-a)^2$$ for some constant $$c$$. Direct calculation gives $$c = \\frac{1}{12}$$, so $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$.\n\nThe takeaway: variance depends only on the *width*, not the *location*, of the interval. This is true for any \"shape-preserving\" family of distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Derive $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ for $$X \\sim U[a, b]$$ using $$\\text{Var}(X) = \\int_a^b (x-\\mu)^2 f(x)\\,dx$$, where $$\\mu = \\frac{a+b}{2}$$. (4 steps)", "answer": "- Step 1: Substitute $$u = x - \\mu$$, so $$du = dx$$. When $$x = a$$, $$u = -\\frac{b-a}{2}$$. When $$x = b$$, $$u = \\frac{b-a}{2}$$.\n- Step 2: The integral becomes $$\\text{Var}(X) = \\int_{-(b-a)/2}^{(b-a)/2} \\frac{u^2}{b-a}\\, du = \\frac{1}{b-a} \\left[\\frac{u^3}{3}\\right]_{-(b-a)/2}^{(b-a)/2}$$.\n- Step 3: Evaluating: $$\\frac{1}{b-a} \\cdot \\frac{2}{3} \\cdot \\left(\\frac{b-a}{2}\\right)^3 = \\frac{1}{b-a} \\cdot \\frac{2}{3} \\cdot \\frac{(b-a)^3}{8}$$.\n- Step 4: Simplify: $$= \\frac{(b-a)^2}{12}$$.\n\nThe substitution exploits symmetry — by centering at the mean, we remove all translation effects. The factor $$\\frac{1}{12}$$ is the \"shape constant\" of the uniform distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Show how to find $$\\text{Var}(X)$$ for a continuous uniform distribution using the formula $$\\text{Var}(X) = E(X^2) - (E(X))^2$$, taking the example $$X \\sim U[-3, 5]$$. (4 steps)", "answer": "- Step 1: $$E(X) = \\frac{-3 + 5}{2} = 1$$.\n- Step 2: $$E(X^2) = \\int_{-3}^{5} x^2 \\cdot \\frac{1}{8}\\, dx = \\frac{1}{8}\\left[\\frac{x^3}{3}\\right]_{-3}^{5} = \\frac{1}{24}(125 - (-27)) = \\frac{152}{24} = \\frac{19}{3}$$.\n- Step 3: $$\\text{Var}(X) = \\frac{19}{3} - 1^2 = \\frac{19}{3} - 1 = \\frac{16}{3}$$.\n- Step 4: Sanity check using formula: $$\\frac{(5 - (-3))^2}{12} = \\frac{64}{12} = \\frac{16}{3}$$. ✓\n\nInsight: the $$E(X^2) - (E(X))^2$$ method works but is messier here — directly using $$\\frac{(b-a)^2}{12}$$ is far quicker. However, knowing both routes lets you verify and handles cases where you've forgotten the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why is it generally a **conceptual error** to write $$E(X^2) = (E(X))^2$$? Illustrate with $$X \\sim U[1, 5]$$. (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the average of *squared values*, while $$(E(X))^2$$ is the *square of the average*. These are different operations: averaging then squaring vs. squaring then averaging. They agree only if $$X$$ is constant.\n- Step 2: For $$X \\sim U[1, 5]$$: $$E(X) = 3$$, so $$(E(X))^2 = 9$$.\n- Step 3: But $$E(X^2) = \\text{Var}(X) + (E(X))^2 = \\frac{16}{12} + 9 = \\frac{4}{3} + 9 = \\frac{31}{3} \\approx 10.33$$.\n\nThe gap $$E(X^2) - (E(X))^2 = \\text{Var}(X)$$ is exactly the variance — by definition. This is why finding $$E(g(X))$$ for nonlinear $$g$$ (like $$g(x) = x^2$$, $$\\pi x^2$$, etc.) cannot be done by plugging in the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Derive the cumulative distribution function $$F(x)$$ of $$X \\sim U[a, b]$$ from first principles, and write it out as a piecewise function. (4 steps)", "answer": "- Step 1: For $$a \\leq x \\leq b$$: $$F(x) = P(X \\leq x) = \\int_a^x \\frac{1}{b-a}\\, dt = \\left[\\frac{t}{b-a}\\right]_a^x = \\frac{x - a}{b - a}$$.\n- Step 2: For $$x < a$$: there's no probability below $$a$$, so $$F(x) = 0$$.\n- Step 3: For $$x > b$$: all probability lies below $$b$$, so $$F(x) = 1$$.\n- Step 4: Putting it together:\n$$\nF(x) = \\begin{cases} 0 & x < a \\\\ \\frac{x - a}{b - a} & a \\leq x \\leq b \\\\ 1 & x > b \\end{cases}\n$$\n\nThe CDF is a piecewise-linear \"ramp\" rising from 0 to 1 as $$x$$ moves from $$a$$ to $$b$$. This is uniquely characteristic: a *constant* PDF integrates to a *linear* CDF.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What is the geometric/visual relationship between the PDF and CDF of $$X \\sim U[a, b]$$, and why does this matter? (3 steps)", "answer": "- Step 1: The PDF is a horizontal rectangle of constant height $$\\frac{1}{b-a}$$ on $$[a, b]$$.\n- Step 2: The CDF is the *running area* under the PDF — at any point $$x$$, $$F(x)$$ is the area to the left of $$x$$. For a constant-height PDF, this area grows *linearly* with $$x$$.\n- Step 3: Hence the CDF graph is a straight line of slope $$\\frac{1}{b-a}$$ on $$[a, b]$$, flat at 0 before $$a$$ and flat at 1 after $$b$$.\n\nThis connects to a deeper fact: $$f(x) = F'(x)$$ for any continuous distribution. Differentiating a linear ramp gives a constant — which is exactly the uniform PDF.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "A student computes $$P(X < 4)$$ for $$X \\sim U[2, 7]$$ using the CDF: $$F(4) = \\frac{4 - 2}{7 - 2} = \\frac{2}{5}$$. Explain *why* this matches the proportion-based answer. (2 steps)", "answer": "- Step 1: $$F(x) = \\frac{x - a}{b - a}$$ literally measures *how far along* the interval $$[a, b]$$ the value $$x$$ sits, expressed as a fraction.\n- Step 2: For uniform distributions, this fraction is exactly the probability — because probability is uniformly distributed by length. So $$P(X < x) = \\frac{x - a}{b - a}$$ is just \"fraction of interval to the left of $$x$$\".\n\nInsight: the CDF and the proportion shortcut are the *same idea*, written in different notation. Both reflect the unique property that for $$U[a,b]$$, probability is length.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Explain the \"restricted sample space\" trick for computing conditional probabilities like $$P(X > 3 \\mid X > 2)$$ when $$X \\sim U[2, 4]$$. (3 steps)", "answer": "- Step 1: When you condition on $$X > 2$$ (which is *all* of $$[2, 4]$$ in this case), the conditional distribution of $$X$$ remains uniform on the restricted interval — uniformity is preserved under restriction.\n- Step 2: So given $$X > 2$$, $$X \\sim U[2, 4]$$ (already), and $$P(X > 3 \\mid X > 2) = \\frac{4 - 3}{4 - 2} = \\frac{1}{2}$$.\n- Step 3: This matches the formula approach: $$P(X > 3 \\mid X > 2) = \\frac{P(X > 3)}{P(X > 2)} = \\frac{(4-3)/(4-2)}{(4-2)/(4-2)} = \\frac{1/2}{1} = \\frac{1}{2}$$.\n\nThe conceptual reason this works: the *constant* density of a uniform distribution means cutting off a piece doesn't bias what's left — every remaining region scales by the same factor $$\\frac{1}{P(\\text{condition})}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "For $$X \\sim U[-2, 6]$$, find $$P(X > 5 \\mid X > 0)$$ — and explain how the conditional event simplifies. (3 steps)", "answer": "- Step 1: The intersection $$\\{X > 5\\} \\cap \\{X > 0\\} = \\{X > 5\\}$$, since $$X > 5$$ already implies $$X > 0$$.\n- Step 2: So $$P(X > 5 \\mid X > 0) = \\frac{P(X > 5)}{P(X > 0)}$$.\n- Step 3: Compute proportionally on $$[-2, 6]$$: $$P(X > 5) = \\frac{6-5}{8} = \\frac{1}{8}$$, $$P(X > 0) = \\frac{6-0}{8} = \\frac{6}{8}$$. So the answer is $$\\frac{1/8}{6/8} = \\frac{1}{6}$$.\n\nA general lesson: when one event is a subset of another, the intersection is the smaller event. Always check this before mechanically applying $$P(A \\cap B)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "If $$X \\sim U[a, b]$$ and $$Y = cX + d$$ where $$c > 0$$, explain why $$Y$$ is also uniformly distributed and find its range. (3 steps)", "answer": "- Step 1: A linear transformation $$x \\mapsto cx + d$$ stretches the interval by factor $$c$$ and shifts by $$d$$ — it doesn't change the *shape* of the distribution. Constant density stays constant density.\n- Step 2: The range maps as: $$x = a \\to y = ca + d$$ and $$x = b \\to y = cb + d$$.\n- Step 3: So $$Y \\sim U[ca + d, cb + d]$$ when $$c > 0$$.\n\nIf $$c < 0$$, the order flips (since multiplying by a negative reverses inequalities), giving $$Y \\sim U[cb + d, ca + d]$$. Always check the sign of $$c$$ to determine which endpoint becomes the lower bound.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Given $$X \\sim U[2, 12]$$ and $$Y = 20 - 2X$$, identify the distribution of $$Y$$ and find $$E(Y)$$. (3 steps)", "answer": "- Step 1: Since the transformation is linear with negative slope, $$Y$$ is uniform but the endpoints flip.\n+ When $$X = 2$$: $$Y = 20 - 4 = 16$$\n+ When $$X = 12$$: $$Y = 20 - 24 = -4$$\n- Step 2: So $$Y \\sim U[-4, 16]$$.\n- Step 3: $$E(Y) = \\frac{-4 + 16}{2} = 6$$. Check via $$E(Y) = E(20 - 2X) = 20 - 2E(X) = 20 - 2(7) = 6$$. ✓\n\nBoth routes agree. The \"find new range\" approach is geometric; the $$E(aX + b) = aE(X) + b$$ approach is algebraic. They must give the same answer because linearity preserves uniformity *and* expectation.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "$$X \\sim U[a, b]$$ with $$E(X) = 1$$ and $$\\text{Var}(X) = \\frac{16}{3}$$. Set up and solve simultaneous equations to find $$a$$ and $$b$$. (4 steps)", "answer": "- Step 1: From $$E(X) = \\frac{a+b}{2} = 1$$, we get $$a + b = 2$$.\n- Step 2: From $$\\text{Var}(X) = \\frac{(b-a)^2}{12} = \\frac{16}{3}$$, we get $$(b-a)^2 = 64$$, so $$b - a = 8$$ (taking positive root since $$b > a$$).\n- Step 3: Now solve $$a + b = 2$$ and $$b - a = 8$$ simultaneously: adding gives $$2b = 10 \\Rightarrow b = 5$$, and so $$a = -3$$.\n- Step 4: Check: midpoint $$= \\frac{-3+5}{2} = 1$$ ✓; width $$= 8$$, variance $$= \\frac{64}{12} = \\frac{16}{3}$$ ✓.\n\nThe structural insight: knowing the *mean* fixes the centre, and knowing the *variance* fixes the width. Two pieces of info — two unknowns — uniquely determined.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why is the continuous uniform distribution a natural model for **rounding errors** when measurements are recorded to a fixed precision? (3 steps)", "answer": "- Step 1: When a length is recorded to the nearest cm as, say, \"20 cm\", the *true* length lies in the interval $$[19.5, 20.5)$$ — anywhere within half a unit of 20.\n- Step 2: The rounding error (true minus recorded) lies in $$[-0.5, 0.5)$$. Without further information, it's reasonable to assume any error in this range is *equally likely* — there's no reason to prefer 0.1 over -0.3, for instance.\n- Step 3: This \"equal likelihood across an interval\" is exactly the defining property of a continuous uniform distribution. So the error $$R \\sim U[-0.5, 0.5]$$.\n\nThe deeper reason: the uniform distribution captures *maximum ignorance* given only that the value lies in some interval. It assumes no extra structure beyond the bounds.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "A measurement is recorded to the nearest 0.1 cm. What is the distribution of the rounding error, and what is its variance? (2 steps)", "answer": "- Step 1: The rounding error lies in an interval of half-width $$0.05$$ around zero, so $$R \\sim U[-0.05, 0.05]$$.\n- Step 2: $$\\text{Var}(R) = \\frac{(0.1)^2}{12} = \\frac{0.01}{12} \\approx 0.000833$$.\n\nThe general pattern: rounding to the nearest $$\\Delta$$ gives error $$\\sim U[-\\Delta/2, \\Delta/2]$$ with variance $$\\frac{\\Delta^2}{12}$$. This formula is widely used in engineering (quantization noise) and is sometimes called the \"1/12 rule\".", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "When is the continuous uniform distribution **NOT** a good model? Give two examples and explain why. (3 steps)", "answer": "- Step 1: The uniform model assumes every value in $$[a, b]$$ is *equally* likely. Any context where some values cluster more than others violates this.\n- Step 2: Example 1: The masses of 200g tins of tomatoes off a production line. These will cluster around 200g (target) with fewer at the extremes — better modeled by a *normal* distribution.\n- Step 3: Example 2: The heights of randomly selected adults. These also cluster around an average and tail off — again, normal distribution, not uniform.\n\nRule of thumb: use uniform when \"any value in the range is plausibly equally likely\" (rounding errors, random spinner positions, completely random arrival times). Use normal when there's a \"natural target\" with random deviations.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "A drinks machine pours coffee with the volume cut off randomly between 175 ml and 215 ml. Volume $$X \\sim U[175, 215]$$. Find $$P(X < 187)$$ and the **interquartile range** of $$X$$. (4 steps)", "answer": "- Step 1: $$P(X < 187) = \\frac{187 - 175}{215 - 175} = \\frac{12}{40} = 0.3$$.\n- Step 2: For IQR, we need the lower and upper quartiles $$Q_1$$ and $$Q_3$$, defined by $$F(Q_1) = 0.25$$ and $$F(Q_3) = 0.75$$.\n- Step 3: Using $$F(x) = \\frac{x - 175}{40}$$:\n+ $$Q_1$$: $$\\frac{Q_1 - 175}{40} = 0.25 \\Rightarrow Q_1 = 175 + 10 = 185$$\n+ $$Q_3$$: $$\\frac{Q_3 - 175}{40} = 0.75 \\Rightarrow Q_3 = 175 + 30 = 205$$\n- Step 4: IQR $$= Q_3 - Q_1 = 205 - 185 = 20$$ ml.\n\nA general result: for $$U[a, b]$$, the IQR is $$\\frac{b - a}{2}$$ — half the total range. The middle 50% of the distribution sits in the middle half of the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "For any $$X \\sim U[a, b]$$, what is the median of $$X$$, and how does it compare to the mean? (2 steps)", "answer": "- Step 1: The median is defined by $$F(m) = 0.5$$. For uniform: $$\\frac{m - a}{b - a} = 0.5$$, giving $$m = \\frac{a + b}{2}$$.\n- Step 2: This equals the mean $$E(X) = \\frac{a+b}{2}$$.\n\nWhy? A symmetric distribution has mean = median, since both are at the centre of symmetry. The uniform PDF is symmetric about its midpoint, so all \"central tendency\" measures coincide there. (For the *mode*, the uniform has no unique mode — every value in $$[a, b]$$ is \"equally most likely\".)", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A tree trunk's radius (cross-section) is modelled as $$R \\sim U[1, 5]$$ cm. Explain how to find the *expected cross-sectional area* $$E(\\pi R^2)$$ — and why simply plugging the mean radius is wrong. (4 steps)", "answer": "- Step 1: WRONG approach: $$E(R) = 3$$, so naively $$E(\\text{area}) = \\pi \\cdot 3^2 = 9\\pi$$. This treats $$R$$ as if it were always 3 cm, ignoring all variation.\n- Step 2: CORRECT: $$E(\\pi R^2) = \\pi E(R^2)$$, and $$E(R^2) \\neq (E(R))^2$$ when $$R$$ varies.\n- Step 3: Use $$\\text{Var}(R) = E(R^2) - (E(R))^2 \\Rightarrow E(R^2) = \\text{Var}(R) + (E(R))^2 = \\frac{16}{12} + 9 = \\frac{4}{3} + 9 = \\frac{31}{3}$$.\n- Step 4: So $$E(\\pi R^2) = \\frac{31\\pi}{3} \\approx 10.33\\pi$$, slightly bigger than $$9\\pi$$.\n\nThe expected area is *larger* than $$\\pi (E(R))^2$$ — that's because squaring is convex, and convex functions amplify spread, by **Jensen's inequality**. Variation always inflates the expected value of a convex function.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A wooden rod of length 20 cm is cut at a random point. The longer piece $$X \\sim U[10, 20]$$ cm. The two pieces form the base and height of a rectangle. Sketch the conceptual workflow to find the expected area of the rectangle. (4 steps)", "answer": "- Step 1: If the longer piece is $$X$$, the shorter is $$20 - X$$. Area $$A = X(20 - X) = 20X - X^2$$.\n- Step 2: $$E(A) = 20 E(X) - E(X^2)$$. We need both $$E(X)$$ and $$E(X^2)$$.\n- Step 3: $$E(X) = \\frac{10 + 20}{2} = 15$$. For $$E(X^2)$$: $$\\text{Var}(X) = \\frac{(20-10)^2}{12} = \\frac{100}{12} = \\frac{25}{3}$$, so $$E(X^2) = \\frac{25}{3} + 225 = \\frac{700}{3}$$.\n- Step 4: $$E(A) = 20(15) - \\frac{700}{3} = 300 - \\frac{700}{3} = \\frac{200}{3} \\approx 66.67$$ cm².\n\nLesson: when finding $$E$$ of a polynomial in $$X$$, expand and use linearity of expectation, then plug in $$E(X)$$ and $$E(X^2)$$ separately. Don't substitute into the function before taking the expectation.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Suppose $$X \\sim U[0, 5]$$ and you take 6 independent observations of $$X$$. Explain how to find the probability that *exactly 4* of them are greater than 3. (4 steps)", "answer": "- Step 1: First, find $$p = P(X > 3) = \\frac{5 - 3}{5} = \\frac{2}{5}$$ — the probability for a single observation.\n- Step 2: Since each observation is independent and either \"succeeds\" ($$X > 3$$) or \"fails\" ($$X \\leq 3$$), the count $$N$$ of successes in 6 trials has $$N \\sim \\text{Bin}(6, 2/5)$$.\n- Step 3: $$P(N = 4) = \\binom{6}{4} \\left(\\frac{2}{5}\\right)^4 \\left(\\frac{3}{5}\\right)^2$$.\n- Step 4: Conceptually: \"compute single-trial probability from uniform → use it as the binomial $$p$$ → apply binomial formula\".\n\nThis pattern — *uniform feeds into binomial* — is one of the most common combinations in S2 problems. The uniform distribution provides the per-trial probability; binomial counts successes.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "For $$X \\sim U[a, b]$$, suppose you're told $$P(X < 5) = \\frac{1}{4}$$ and $$P(X > 7) = \\frac{1}{2}$$. Walk through how to set up and solve for $$a$$ and $$b$$. (4 steps)", "answer": "- Step 1: Convert each probability into a length proportion:\n+ $$P(X < 5) = \\frac{5 - a}{b - a} = \\frac{1}{4}$$\n+ $$P(X > 7) = \\frac{b - 7}{b - a} = \\frac{1}{2}$$\n- Step 2: Cross-multiply:\n+ $$4(5 - a) = b - a \\Rightarrow 20 - 4a = b - a \\Rightarrow b = 20 - 3a$$\n+ $$2(b - 7) = b - a \\Rightarrow 2b - 14 = b - a \\Rightarrow b = 14 - a$$\n- Step 3: Set equal: $$20 - 3a = 14 - a \\Rightarrow -2a = -6 \\Rightarrow a = 3$$.\n- Step 4: Then $$b = 14 - 3 = 11$$. Check: $$P(X < 5) = \\frac{2}{8} = \\frac{1}{4}$$ ✓; $$P(X > 7) = \\frac{4}{8} = \\frac{1}{2}$$ ✓.\n\nStrategy lesson: each probability statement becomes a linear equation in $$a$$ and $$b$$ via the proportion formula. Two equations, two unknowns — solve as usual.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Find $$k$$ such that $$P(X < k) = 0.2$$ where $$X \\sim U[3, 5]$$, *without* using the CDF formula explicitly. (3 steps)", "answer": "- Step 1: We want a value $$k$$ such that the slice $$[3, k]$$ contains 20% of the total interval.\n- Step 2: Total interval width is $$5 - 3 = 2$$. So we need the slice $$[3, k]$$ to have width $$0.2 \\times 2 = 0.4$$.\n- Step 3: Hence $$k - 3 = 0.4$$, so $$k = 3.4$$.\n\nThis \"fraction-of-interval\" reasoning is far quicker than setting up integrals. It also gives strong intuition: probabilities for uniform distributions are *literally* fractions of the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "For $$X \\sim U[-2, 6]$$, find $$p$$ such that $$P(3X < X + p) = 0.5$$. (4 steps)", "answer": "- Step 1: Simplify the inequality: $$3X < X + p \\Leftrightarrow 2X < p \\Leftrightarrow X < \\frac{p}{2}$$.\n- Step 2: So we need $$P(X < \\frac{p}{2}) = 0.5$$.\n- Step 3: Since the median of $$U[-2, 6]$$ is $$\\frac{-2 + 6}{2} = 2$$, we need $$\\frac{p}{2} = 2$$.\n- Step 4: Therefore $$p = 4$$.\n\nThe shortcut: probability $$0.5$$ corresponds to the median for any continuous distribution. Recognising this saves you from setting up the proportion equation explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A bus is due at 9 am but can arrive between 3 minutes early and 10 minutes late, modelled by $$X \\sim U[-3, 10]$$ minutes after 9 am. Walk through finding $$E(X)$$ and the cumulative distribution function $$F(x)$$. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{-3 + 10}{2} = 3.5$$ minutes after 9 am, i.e. 9:03:30 on average.\n- Step 2: For $$F(x)$$ on the active interval $$[-3, 10]$$: $$F(x) = \\frac{x - (-3)}{10 - (-3)} = \\frac{x + 3}{13}$$.\n- Step 3: Full piecewise:\n$$F(x) = \\begin{cases} 0 & x < -3 \\\\ \\frac{x+3}{13} & -3 \\leq x \\leq 10 \\\\ 1 & x > 10 \\end{cases}$$\n\nSo $$P(\\text{late by more than 5 min}) = P(X > 5) = 1 - F(5) = 1 - \\frac{8}{13} = \\frac{5}{13}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Sketch and reason about how the PDF of $$X \\sim U[-3, 5]$$ looks, and what features it shares with any other uniform distribution. (3 steps)", "answer": "- Step 1: It's a horizontal rectangle of height $$\\frac{1}{5 - (-3)} = \\frac{1}{8}$$, sitting on the interval $$[-3, 5]$$. Outside this interval, the height is 0.\n- Step 2: Universal features of any uniform PDF:\n+ Constant (flat) on its support\n+ Total area equals 1\n+ Symmetric about the midpoint (here, $$x = 1$$)\n+ Has no unique mode — the height is the same everywhere on its support\n- Step 3: The CDF would be a straight line from $$(-3, 0)$$ to $$(5, 1)$$, with slope $$\\frac{1}{8}$$.\n\nThe sketch is the same shape for every uniform distribution — only the position and scale change.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "For $$X \\sim U[\\alpha, \\beta]$$ with $$E(X) = 7.5$$ and $$P(X > 10.5) = 0.25$$, walk through finding $$\\alpha$$ and $$\\beta$$. (4 steps)", "answer": "- Step 1: From the mean: $$\\alpha + \\beta = 15$$.\n- Step 2: From $$P(X > 10.5) = 0.25$$: the proportion of interval above 10.5 is one-quarter, so 10.5 is the upper quartile $$Q_3$$.\n- Step 3: For uniform, $$Q_3$$ is three-quarters of the way from $$\\alpha$$ to $$\\beta$$, so $$10.5 = \\alpha + \\frac{3}{4}(\\beta - \\alpha)$$, which simplifies to $$10.5 = \\frac{\\alpha + 3\\beta}{4}$$, i.e. $$\\alpha + 3\\beta = 42$$.\n- Step 4: Subtract from $$\\alpha + \\beta = 15$$: $$2\\beta = 27 \\Rightarrow \\beta = 13.5$$, hence $$\\alpha = 1.5$$.\n\nStrategy: relating \"$$P(X > c) = 0.25$$\" to \"$$c$$ is the upper quartile\" gives a positional interpretation. For uniform, position translates directly into a linear equation.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Suppose $$X \\sim U[a, b]$$ and we want $$Y = aX + c$$ — explain why $$E(Y)$$ and $$\\text{Var}(Y)$$ can be found WITHOUT computing the new distribution explicitly. (3 steps)", "answer": "- Step 1: For *any* random variable (not just uniform), linearity gives:\n+ $$E(aX + c) = a E(X) + c$$\n+ $$\\text{Var}(aX + c) = a^2 \\text{Var}(X)$$ (constants don't affect variance; the multiplier squares)\n- Step 2: So plug in $$E(X) = \\frac{a+b}{2}$$ and $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ — no need to derive a new PDF.\n- Step 3: This is much faster than re-deriving the distribution of $$Y$$ from scratch.\n\nThe conceptual takeaway: linearity properties of $$E$$ and $$\\text{Var}$$ are universal — they hold for any distribution. You only need to rebuild the distribution of $$Y$$ if you want a *probability* for $$Y$$, not just its mean/variance.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "$$X \\sim U[-1, 5]$$ with $$Y = 4X - 6$$. Find $$E(Y)$$ and $$\\text{Var}(Y)$$. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{-1 + 5}{2} = 2$$ and $$\\text{Var}(X) = \\frac{(5-(-1))^2}{12} = \\frac{36}{12} = 3$$.\n- Step 2: $$E(Y) = 4E(X) - 6 = 4(2) - 6 = 2$$.\n- Step 3: $$\\text{Var}(Y) = 4^2 \\cdot \\text{Var}(X) = 16 \\cdot 3 = 48$$.\n\nNotice: even though $$Y$$ is a linear function of $$X$$, its variance is much larger because the multiplier $$4$$ stretches the distribution by a factor of 4, and variance scales as the square. The $$-6$$ shift doesn't affect the variance at all.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why does adding a constant to a random variable leave its variance unchanged, but multiplying by a constant scales the variance by the **square** of that constant? (3 steps)", "answer": "- Step 1: Adding $$c$$ shifts the entire distribution rightwards by $$c$$. Every observation moves by the same amount, so deviations $$(X - \\mu)$$ are unchanged — and so is variance.\n- Step 2: Multiplying by $$k$$ stretches the distribution by factor $$k$$. Each deviation $$(X - \\mu)$$ becomes $$k(X - \\mu)$$, and squared deviations become $$k^2 (X - \\mu)^2$$.\n- Step 3: Hence $$\\text{Var}(kX + c) = k^2 \\text{Var}(X)$$.\n\nGeometric intuition: shifting moves the rectangle but doesn't change its width; stretching widens it by factor $$k$$, giving $$k^2$$ times the original variance. This is the same reason area scales as the square of length.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "A continuous random variable has CDF $$F(x) = \\frac{x + 3}{7}$$ for $$-3 \\leq x \\leq 4$$ (and the appropriate constants outside). Walk through how to recover the PDF and identify the distribution. (3 steps)", "answer": "- Step 1: For continuous distributions, $$f(x) = F'(x)$$. Differentiating $$\\frac{x+3}{7}$$ with respect to $$x$$ gives $$f(x) = \\frac{1}{7}$$.\n- Step 2: This is constant on $$[-3, 4]$$ (an interval of width $$7$$, matching $$\\frac{1}{b-a} = \\frac{1}{7}$$).\n- Step 3: So $$X \\sim U[-3, 4]$$ — a continuous uniform distribution.\n\nThe key relation: a *linear* CDF on an interval $$\\Leftrightarrow$$ a *constant* PDF on that interval $$\\Leftrightarrow$$ a *uniform* distribution. Recognising this saves time on identification problems.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "A continuous random variable $$X \\sim U[b, 5b]$$. Without doing full integration, find $$E(X)$$ and use the standard formula to write $$\\text{Var}(X)$$. (3 steps)", "answer": "- Step 1: Use the formula $$E(X) = \\frac{b + 5b}{2} = 3b$$ — the midpoint.\n- Step 2: Use $$\\text{Var}(X) = \\frac{(5b - b)^2}{12} = \\frac{16b^2}{12} = \\frac{4b^2}{3}$$.\n- Step 3: Sanity: as $$b$$ doubles, the interval widens by $$2$$, so variance grows by $$4$$ — and indeed $$\\frac{4(2b)^2}{3} = 4 \\cdot \\frac{4b^2}{3}$$. ✓\n\nThe formulas $$\\mu = \\frac{a+b}{2}$$ and $$\\sigma^2 = \\frac{(b-a)^2}{12}$$ are universal for uniform — applying them by inspection rather than re-deriving each time saves a lot of work.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "For a measurement recorded to the nearest cm, the rounding error $$R \\sim U[-0.5, 0.5]$$. Find $$P(|R| < 0.2)$$. (3 steps)", "answer": "- Step 1: $$|R| < 0.2$$ means $$-0.2 < R < 0.2$$ — an interval of width $$0.4$$.\n- Step 2: The total support of $$R$$ has width $$1$$.\n- Step 3: $$P(-0.2 < R < 0.2) = \\frac{0.4}{1} = 0.4$$.\n\nIf three pipes are independently measured, $$P(\\text{all three within 0.2 cm}) = 0.4^3 = 0.064$$. The independence assumption — which is reasonable for separate physical measurements — lets us multiply.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Compare and contrast the modelling situations: (a) heights of people, and (b) measurement rounding errors. Which uses uniform, which uses normal, and why? (3 steps)", "answer": "- Step 1: Heights of people: there's a \"natural\" central tendency (population mean), with most people clustering near the mean and fewer at extremes. This is best modelled by a *normal* distribution, with bell shape.\n- Step 2: Rounding errors: every value in $$[-\\Delta/2, \\Delta/2]$$ is equally plausible — the true length is just as likely to be 0.1 above the rounded value as 0.3 below. No clustering, no central tendency. Best modelled as *uniform*.\n- Step 3: The contrast: uniform = \"complete equality of likelihood across a bounded range\"; normal = \"central peak with tapering tails\". Always ask: \"does this physical process favor any value within the range?\".", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "For $$X \\sim U[2, 10]$$ (Priya's checkout time in minutes), explain how to find $$P(X < 8 \\mid X > 5)$$ using the restricted sample space approach. (3 steps)", "answer": "- Step 1: Given $$X > 5$$, the distribution of $$X$$ on the restricted sample space is uniform on $$[5, 10]$$ — the part of the original support above 5. Width of restricted interval: $$5$$.\n- Step 2: Within this restricted distribution, we want $$P(X < 8) = $$ proportion of $$[5, 10]$$ below $$8 = \\frac{8 - 5}{10 - 5} = \\frac{3}{5}$$.\n- Step 3: So $$P(X < 8 \\mid X > 5) = \\frac{3}{5}$$.\n\nThe intuition: knowing she's already taken 5 minutes \"uses up\" the lower portion of the distribution — what's left is uniformly distributed over the remaining 5 minutes. Then ask for the proportion ending before the 8-minute mark.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "For a continuous uniform distribution, what's the relationship between the **PDF height** and the interval width, and what physical units does the PDF carry? (3 steps)", "answer": "- Step 1: PDF height $$=\\frac{1}{b-a}$$. So a *narrow* interval has a *tall* PDF; a *wide* interval has a *short* PDF.\n- Step 2: The product height × width $$= 1$$ always — area is conserved.\n- Step 3: Units: if $$X$$ is measured in cm, then $$f(x)$$ has units of $$\\text{cm}^{-1}$$ (inverse length). PDF is **probability per unit length**, not probability itself. To get a probability, you multiply by a width — that's why probabilities are dimensionless.\n\nThis is why $$f(x) = 0.4$$ doesn't mean \"40% probability\"; it means \"0.4 probability per unit of $$x$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "A spinner has angle $$\\theta$$ from vertical, modelled as $$\\theta \\sim U[0, 2\\pi]$$. The horizontal distance of the tip (length $$r$$) from the vertical line is $$X = r |\\sin \\theta|$$. Sketch the reasoning to find $$E(X)$$. (4 steps)", "answer": "- Step 1: $$E(X) = E(r |\\sin \\theta|) = r \\cdot E(|\\sin \\theta|)$$ since $$r$$ is constant.\n- Step 2: Using the definition: $$E(|\\sin \\theta|) = \\int_0^{2\\pi} |\\sin \\theta| \\cdot \\frac{1}{2\\pi} d\\theta$$.\n- Step 3: By symmetry of $$|\\sin \\theta|$$ over $$[0, 2\\pi]$$ (4 identical \"humps\" each of area 1):\n+ $$\\int_0^{2\\pi} |\\sin \\theta| d\\theta = 4 \\cdot \\int_0^{\\pi/2} \\sin \\theta\\, d\\theta = 4 \\cdot [-\\cos \\theta]_0^{\\pi/2} = 4 \\cdot 1 = 4$$\n- Step 4: So $$E(|\\sin \\theta|) = \\frac{4}{2\\pi} = \\frac{2}{\\pi}$$, and $$E(X) = \\frac{2r}{\\pi}$$.\n\nThis is the celebrated \"average of $$|\\sin|$$ is $$\\frac{2}{\\pi}$$\" result — it appears throughout physics and engineering (e.g., AC current rectification).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Given $$E(X) = \\frac{2r}{\\pi}$$ for the spinner setup (where $$X = r|\\sin \\theta|$$ and $$\\theta \\sim U[0, 2\\pi]$$), explain how this can be used to **estimate $$\\pi$$ experimentally**. (3 steps)", "answer": "- Step 1: Rearranging: $$\\pi = \\frac{2r}{E(X)}$$.\n- Step 2: Spin the pointer many times (say $$n$$ times), record $$x_1, x_2, \\dots, x_n$$, and compute the sample mean $$\\bar{x} = \\frac{1}{n}\\sum x_i$$. By the law of large numbers, $$\\bar{x} \\to E(X)$$ as $$n \\to \\infty$$.\n- Step 3: Then estimate $$\\hat{\\pi} = \\frac{2r}{\\bar{x}}$$. The more spins, the closer $$\\hat{\\pi}$$ gets to the true $$\\pi$$.\n\nThis is a simple Monte Carlo method — using random experiments to estimate mathematical constants. (Buffon's needle is the historically famous version of the same idea.)", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "For $$X \\sim U[\\alpha, \\beta]$$, explain why $$P\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right) = \\frac{4}{7}$$. (3 steps)", "answer": "- Step 1: The point $$\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta$$ is a weighted average of $$\\alpha$$ and $$\\beta$$. Since the weights sum to 1, this point lies somewhere between $$\\alpha$$ and $$\\beta$$.\n- Step 2: Geometrically, this point is $$\\frac{4}{7}$$ of the way from $$\\alpha$$ to $$\\beta$$, since the weight on $$\\beta$$ is $$\\frac{4}{7}$$.\n- Step 3: For a uniform distribution, \"fraction of the way along the interval\" equals \"probability of being below\" — so $$P\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right) = \\frac{4}{7}$$.\n\nThis is a slick application of the uniform-as-proportion principle. No computation needed — just recognise the point as a convex combination and read off the weight on $$\\beta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why is the continuous uniform distribution often described as \"the distribution of maximum ignorance\" given a bounded range? (2 steps)", "answer": "- Step 1: If you know only that a value lies in $$[a, b]$$ with no other information — no clustering, no preferred region, no peaks — assigning equal density everywhere is the *least biased* assumption. Any non-uniform distribution would imply additional structure that you don't have evidence for.\n- Step 2: This is formalised by the *maximum entropy principle*: among all distributions supported on $$[a, b]$$, the uniform distribution has the largest entropy (= most \"spread out\", = least informative beyond the range).\n\nSo the uniform distribution isn't just convenient — it's the natural default when all you know is the range. This justifies using it for rounding errors, random arrival times, etc.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A pencil is recorded as 20 cm long (to the nearest cm). What is the variance of the rounding error, and why is the formula $$\\frac{\\Delta^2}{12}$$ universal? (3 steps)", "answer": "- Step 1: The rounding error is $$R \\sim U[-0.5, 0.5]$$, so $$\\text{Var}(R) = \\frac{(0.5 - (-0.5))^2}{12} = \\frac{1}{12}$$.\n- Step 2: For rounding to nearest $$\\Delta$$, error is $$U[-\\Delta/2, \\Delta/2]$$, with variance $$\\frac{(\\Delta)^2}{12} = \\frac{\\Delta^2}{12}$$.\n- Step 3: This formula is universal because: (a) the uniform model is justified by symmetry, and (b) the $$\\frac{1}{12}$$ factor comes from the geometry of $$\\int u^2 du$$ over a symmetric interval.\n\nThis \"$$\\frac{\\Delta^2}{12}$$\" is the *quantization noise variance* in signal processing — the same formula appears wherever you discretize a continuous quantity uniformly.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Suppose $$X \\sim U[0, 1]$$ and $$Y = -\\ln(1 - X)$$. Without computing the distribution of $$Y$$, briefly explain why the linearity rule $$E(Y) = -\\ln(1 - E(X))$$ would be **wrong**. (2 steps)", "answer": "- Step 1: $$E(g(X)) = g(E(X))$$ holds only when $$g$$ is *linear*. For nonlinear $$g$$ (logarithm, square, exponential, ...), it fails — Jensen's inequality says $$E(g(X)) \\neq g(E(X))$$ in general.\n- Step 2: For $$g(x) = -\\ln(1-x)$$ (convex on $$[0,1)$$), Jensen gives $$E(g(X)) \\geq g(E(X))$$, with equality only if $$X$$ is constant. So plugging in the mean would underestimate $$E(Y)$$.\n\nThe lesson: always check whether the transformation is linear before applying $$E(aX + b) = aE(X) + b$$. Squaring, exponentiating, taking logs — all need integration of $$g(x) f(x)$$ directly.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "For $$X \\sim U[a, b]$$, a student claims that $$P(X > \\mu) = P(X < \\mu) = 0.5$$, where $$\\mu = E(X)$$. Verify this and explain why it would NOT hold for an asymmetric distribution. (3 steps)", "answer": "- Step 1: For uniform: $$\\mu = \\frac{a+b}{2}$$ is the midpoint of $$[a, b]$$, so half the support lies on each side, and probabilities are proportions. Hence $$P(X > \\mu) = P(X < \\mu) = 0.5$$. ✓\n- Step 2: This works because the uniform PDF is **symmetric** about its mean. For symmetric distributions, mean = median.\n- Step 3: For asymmetric distributions (e.g., exponential, log-normal), the mean and median are typically different. The mean is pulled toward the longer tail, so $$P(X > \\text{mean}) \\neq 0.5$$ in general.\n\nPunchline: \"$$P(X > \\mu) = 0.5$$\" is *not* a property of all distributions — it relies on symmetry, which the uniform happens to have.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "For $$X \\sim U[-2, 5]$$, find $$P(3.5 < X < 5.5)$$. Watch out for the trap. (3 steps)", "answer": "- Step 1: The PDF is non-zero only on $$[-2, 5]$$. The interval $$(3.5, 5.5)$$ extends *beyond* the support.\n- Step 2: Effectively, $$P(3.5 < X < 5.5) = P(3.5 < X < 5)$$ because $$X$$ cannot exceed 5.\n- Step 3: $$P(3.5 < X < 5) = \\frac{5 - 3.5}{5 - (-2)} = \\frac{1.5}{7} = \\frac{3}{14}$$.\n\nCommon mistake: applying $$\\frac{5.5 - 3.5}{7} = \\frac{2}{7}$$, which would give too large an answer. Always intersect the queried interval with the support — probability mass that doesn't exist can't be counted.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Sketch the conceptual workflow: given a uniform $$X \\sim U[a, b]$$ and a transformation $$Y = g(X)$$, when can you \"carry over\" uniformity, and when must you recompute the distribution? (3 steps)", "answer": "- Step 1: If $$g$$ is **linear** ($$g(x) = cx + d$$ with $$c \\neq 0$$), uniformity is preserved. $$Y$$ is uniform on the transformed interval, with new endpoints obtained by substituting $$x = a$$ and $$x = b$$.\n- Step 2: If $$g$$ is **non-linear** (e.g., $$g(x) = x^2$$, $$\\sqrt{x}$$, $$\\ln x$$, $$\\pi x^2$$), uniformity is generally **lost**. The PDF of $$Y$$ would have to be derived using the Jacobian / change-of-variables formula.\n- Step 3: However, $$E(Y)$$ and $$\\text{Var}(Y)$$ can still often be computed without finding the full distribution — using $$E(g(X)) = \\int g(x) f(x) dx$$ directly.\n\nLesson: linearity is the line in the sand. Linear → uniform stays uniform. Nonlinear → distribution changes shape, but expectations are still computable.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Briefly explain why, for $$X \\sim U[a, b]$$, the cumulative distribution function $$F(x) = \\frac{x-a}{b-a}$$ on $$[a, b]$$ is *not given in the formula booklet*, but the formula for $$E(X)$$ and $$\\text{Var}(X)$$ are. (2 steps)", "answer": "- Step 1: $$F(x)$$ for uniform is so simple — it's just \"fraction of interval to the left of $$x$$\" — that it can be derived by inspection in seconds. Memorising it is optional; reconstructing it is trivial.\n- Step 2: The formulas $$E(X) = \\frac{a+b}{2}$$ and $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ are also derivable, but the variance derivation involves slightly more algebra (cubic factoring) — so the booklet provides them as a convenience.\n\nPractical tip: even though $$F(x)$$ isn't booklet-given, you should be able to write it down instantly during exams — it's the \"linear ramp from $$(a, 0)$$ to $$(b, 1)$$\" and that's all there is to it.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "For $$X \\sim U[\\alpha, \\beta]$$ with $$E(X) = 2.5$$ and $$P(X < 1) = \\frac{4}{11}$$, walk through how to find $$\\alpha$$ and $$\\beta$$. (4 steps)", "answer": "- Step 1: From $$E(X) = \\frac{\\alpha + \\beta}{2} = 2.5$$: $$\\alpha + \\beta = 5$$.\n- Step 2: From $$P(X < 1) = \\frac{1 - \\alpha}{\\beta - \\alpha} = \\frac{4}{11}$$: cross-multiply to get $$11(1 - \\alpha) = 4(\\beta - \\alpha)$$, i.e. $$11 - 11\\alpha = 4\\beta - 4\\alpha$$, so $$7\\alpha + 4\\beta = 11$$.\n- Step 3: From the first equation, $$\\beta = 5 - \\alpha$$. Substitute into $$7\\alpha + 4\\beta = 11$$: $$7\\alpha + 4(5 - \\alpha) = 11 \\Rightarrow 3\\alpha + 20 = 11 \\Rightarrow \\alpha = -3$$.\n- Step 4: Then $$\\beta = 5 - (-3) = 8$$. Quick check: $$P(X < 1) = \\frac{1-(-3)}{8 - (-3)} = \\frac{4}{11}$$ ✓.\n\nThis kind of two-equations-two-unknowns problem is the *primary* application of the uniform distribution formulas. Master converting probability statements into linear equations.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has $$f(x) = 0$$ outside $$[a, b]$$ and is constant inside. Without integration, identify which feature of $$X$$ uniquely determines the constant value. (2 steps)", "answer": "- Step 1: The PDF must integrate to 1 over its support — that's the *defining* condition for any valid PDF.\n- Step 2: A constant function $$h$$ on an interval of width $$(b-a)$$ has integral $$h(b-a)$$. Setting this equal to 1 forces $$h = \\frac{1}{b-a}$$ uniquely.\n\nThis explains why no uniform distribution can have a \"free parameter\" for the height — once $$a$$ and $$b$$ are fixed, the height is determined by the normalization requirement. The uniform family is fully characterized by just two parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "For $$X \\sim U[2, 10]$$ (Priya's checkout time), find the probability she takes less than 5 minutes on each of three independent visits. (3 steps)", "answer": "- Step 1: First find $$P(X < 5) = \\frac{5 - 2}{10 - 2} = \\frac{3}{8}$$.\n- Step 2: For three independent visits, \"less than 5 on all three\" has probability $$\\left(\\frac{3}{8}\\right)^3 = \\frac{27}{512}$$.\n- Step 3: $$\\approx 0.053$$ — about 5%.\n\nWhy this works: independence allows multiplication. Each visit is its own experiment with the same per-trial probability $$\\frac{3}{8}$$, drawn from the same uniform distribution. This is the same \"uniform feeds into binomial\" pattern, with the binomial here being $$\\text{Bin}(3, 3/8)$$ specialized to the all-success case.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}], "count": 55}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does it mean conceptually for a continuous random variable to be \"uniformly distributed\" on an interval $$[a,b]$$? (3 steps)", "answer": "- Step 1: It means the probability density is \"spread perfectly evenly\" across the interval — every sub-interval of equal width has the same probability of containing $$X$$.\n- Step 2: Formally, the p.d.f. $$f(x)$$ is a positive constant on $$[a,b]$$ and zero everywhere else — a flat rectangle.\n- Step 3: Notation: we write $$X \\sim U[a,b]$$. Among continuous distributions, this is the simplest: no peaks, no skew, just total ignorance about *where* in the interval $$X$$ will land.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why must the height of a continuous uniform p.d.f. equal $$\\frac{1}{b-a}$$? (3 steps)", "answer": "- Step 1: Every p.d.f. must integrate to 1 — the total probability axiom.\n- Step 2: A uniform p.d.f. is a rectangle on $$[a,b]$$ with area = height $$\\times$$ width = $$h(b-a)$$.\n- Step 3: Setting $$h(b-a) = 1$$ gives $$h = \\frac{1}{b-a}$$. The wider the support, the *shorter* the rectangle — probability \"thins out\" over a larger range.\n\nThe height has nothing to do with how \"likely\" $$X$$ is; it's just the scaling factor that makes the area come out to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "For a continuous uniform distribution, what is the value of the p.d.f. for points outside the interval $$[a,b]$$, and why?", "answer": "It is zero. The support of $$X$$ is exactly $$[a,b]$$, meaning $$X$$ cannot take any value outside that interval. Visually the p.d.f. is a single rectangle with no tails — values beyond $$a$$ or $$b$$ have density $$0$$ and contribute nothing to any probability calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why is $$P(X = c) = 0$$ for a continuous uniform distribution, even when $$c$$ is inside the support? (3 steps)", "answer": "- Step 1: Probability for a continuous variable equals area under the p.d.f.\n- Step 2: A single point $$x = c$$ has zero width, so the \"rectangle\" above it has zero area.\n- Step 3: This holds for any continuous distribution, not just uniform. A direct consequence: $$P(X<c) = P(X \\le c)$$ — strict and non-strict inequalities give the same answer.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "How do you compute $$P(c < X < d)$$ for $$X \\sim U[a,b]$$ geometrically, without integration? (3 steps)", "answer": "- Step 1: Sketch the rectangular p.d.f. of height $$\\frac{1}{b-a}$$ over $$[a,b]$$.\n- Step 2: The required probability is the area of a sub-rectangle of width $$d-c$$ and height $$\\frac{1}{b-a}$$.\n- Step 3: So $$P(c<X<d) = \\frac{d-c}{b-a}$$ — simply the proportion of the support's width covered by $$[c,d]$$.\n\nThis is *the* mental shortcut: probability = proportion of interval.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "For $$X \\sim U[3,5]$$, compute $$P(3.2 < X < 4.3)$$ using proportion. (3 steps)", "answer": "- Step 1: The full support $$[3,5]$$ has width $$2$$.\n- Step 2: The sub-interval $$[3.2, 4.3]$$ has width $$1.1$$.\n- Step 3: So $$P(3.2<X<4.3) = \\frac{1.1}{2} = 0.55$$. No integration needed — just a width ratio.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why is $$E(X) = \\frac{a+b}{2}$$ for $$X \\sim U[a,b]$$ derivable purely from symmetry? (3 steps)", "answer": "- Step 1: The p.d.f. is a flat rectangle, perfectly symmetric about the midpoint of $$[a,b]$$.\n- Step 2: For *any* p.d.f. that is symmetric about some axis, the mean equals that axis of symmetry — equal mass on each side balances at the centre.\n- Step 3: The midpoint of $$[a,b]$$ is $$\\frac{a+b}{2}$$, so this is the mean. No integration required — pure geometric reasoning.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Derive $$E(X) = \\frac{a+b}{2}$$ for $$X \\sim U[a,b]$$ using integration. (3 steps)", "answer": "- Step 1: Apply the definition $$E(X) = \\int_a^b x \\cdot f(x)\\, dx = \\int_a^b \\frac{x}{b-a}\\, dx$$.\n- Step 2: Integrate: $$\\frac{1}{b-a}\\left[\\frac{x^2}{2}\\right]_a^b = \\frac{b^2 - a^2}{2(b-a)}$$.\n- Step 3: Factor numerator as a difference of squares: $$b^2-a^2 = (b-a)(b+a)$$. The $$(b-a)$$ cancels, leaving $$\\frac{a+b}{2}$$. This confirms the symmetry argument formally.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Conceptually, why is the variance of $$X \\sim U[a,b]$$ proportional to $$(b-a)^2$$ rather than to $$(b-a)$$? (3 steps)", "answer": "- Step 1: Variance measures the *average squared deviation* from the mean.\n- Step 2: If you double the interval length, every deviation from the centre doubles too, so squared deviations *quadruple*.\n- Step 3: Hence variance scales as length-squared. The exact constant turns out to be $$\\frac{1}{12}$$, giving $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$.\n\nThis scaling is why standard deviation $$\\sigma = \\frac{b-a}{\\sqrt{12}}$$ is itself proportional to length — a \"linear\" measure of spread.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Derive $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ for $$X \\sim U[a,b]$$ from first principles. (4 steps)", "answer": "- Step 1: Use $$\\text{Var}(X) = \\int_a^b (x-\\mu)^2 f(x)\\, dx$$ with $$\\mu = \\frac{a+b}{2}$$ and $$f(x) = \\frac{1}{b-a}$$.\n- Step 2: Substitute $$u = x - \\mu$$. Then $$x = a \\Rightarrow u = -\\frac{b-a}{2}$$ and $$x = b \\Rightarrow u = +\\frac{b-a}{2}$$.\n- Step 3: The integral becomes $$\\frac{1}{b-a}\\int_{-(b-a)/2}^{(b-a)/2} u^2\\, du = \\frac{1}{b-a} \\cdot \\frac{2}{3}\\left(\\frac{b-a}{2}\\right)^3$$ (the integrand is even, so we can double the half-interval result).\n- Step 4: Simplify: $$\\frac{1}{b-a} \\cdot \\frac{(b-a)^3}{12} = \\frac{(b-a)^2}{12}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Where does the \"12\" in the variance formula $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ come from? (3 steps)", "answer": "- Step 1: Comes from $$12 = 4 \\times 3$$. The 4 arises from squaring the half-width $$\\left(\\frac{b-a}{2}\\right)^2 = \\frac{(b-a)^2}{4}$$.\n- Step 2: The 3 comes from integrating $$x^2$$, since $$\\int x^2\\, dx = \\frac{x^3}{3}$$.\n- Step 3: Combined with the symmetric ±half-interval and normalisation, you get the factor $$\\frac{1}{12}$$ — a clean, geometry-derived constant, not arbitrary.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Derive the cumulative distribution function $$F(x)$$ for $$X \\sim U[a,b]$$. (3 steps)", "answer": "- Step 1: For $$x < a$$: no probability mass has accumulated yet, so $$F(x) = 0$$.\n- Step 2: For $$a \\le x \\le b$$: $$F(x) = \\int_a^x \\frac{1}{b-a}\\, dt = \\left[\\frac{t}{b-a}\\right]_a^x = \\frac{x-a}{b-a}$$ — a linear ramp from 0 to 1.\n- Step 3: For $$x > b$$: all probability has been accumulated, so $$F(x) = 1$$.\n\nGeometrically, $$F(x)$$ is \"the fraction of $$[a,b]$$ lying at or below $$x$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "What does the graph of $$F(x)$$ for a continuous uniform distribution look like, and how is its slope related to $$f(x)$$? (3 steps)", "answer": "- Step 1: Constant $$0$$ for $$x < a$$, then a straight line from $$(a, 0)$$ to $$(b, 1)$$, then constant $$1$$ for $$x > b$$.\n- Step 2: The slope on $$[a,b]$$ is $$\\frac{1}{b-a}$$, which is exactly the height of the p.d.f.\n- Step 3: This reflects the universal rule $$F'(x) = f(x)$$: the CDF accumulates probability at a rate equal to the density. For uniform, density is constant, so the CDF rises linearly.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "If you're given a CDF $$F(x) = \\frac{x+3}{7}$$ on $$[-3, 4]$$, how do you identify the distribution? (3 steps)", "answer": "- Step 1: Differentiate: $$f(x) = F'(x) = \\frac{1}{7}$$, a constant on the support.\n- Step 2: A constant p.d.f. on a finite interval is the signature of a uniform distribution.\n- Step 3: Verify: support has width $$4-(-3) = 7$$, and density $$\\frac{1}{7}$$ ✓. So $$X \\sim U[-3, 4]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why does conditioning a uniform distribution on a sub-event like $$X > c$$ produce *another* uniform distribution? (3 steps)", "answer": "- Step 1: Conditioning means restricting the sample space and rescaling so probabilities sum to 1 on the restricted region.\n- Step 2: On $$[a,b]$$, $$f(x)$$ was constant. Restricting to $$[c,b]$$ keeps $$f$$ constant — just rescaled to height $$\\frac{1}{b-c}$$.\n- Step 3: So $$X \\mid X > c \\sim U[c, b]$$. This is *the* shortcut for uniform conditional probability problems: don't compute, just rewrite as a new uniform distribution on a shorter interval.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "For $$X \\sim U[1,4]$$, find $$P(X > 3 \\mid X > 2)$$ both by formula and by the restricted-uniform shortcut. (3 steps)", "answer": "- Step 1: Formula: $$P(X>3 \\mid X>2) = \\frac{P(X>3)}{P(X>2)}$$ since $$\\{X>3\\} \\subset \\{X>2\\}$$. This is $$\\frac{1/3}{2/3} = \\frac{1}{2}$$.\n- Step 2: Shortcut: given $$X > 2$$, the conditional distribution is $$U[2, 4]$$. Then $$P(X > 3) = \\frac{4-3}{4-2} = \\frac{1}{2}$$.\n- Step 3: Both agree. The shortcut is faster and avoids fraction-stacking — useful especially when intervals get messy.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Does the continuous uniform distribution have the memoryless property? Justify your answer. (3 steps)", "answer": "- Step 1: Memoryless means $$P(X > s+t \\mid X > s) = P(X > t)$$ for all $$s, t \\ge 0$$ — \"history doesn't matter\".\n- Step 2: For $$X \\sim U[0,b]$$: given $$X > s$$, $$X \\sim U[s,b]$$, so $$P(X > s+t \\mid X > s) = \\frac{b-s-t}{b-s}$$, which *depends on* $$s$$.\n- Step 3: But $$P(X > t) = \\frac{b-t}{b}$$, independent of $$s$$. These don't match in general, so uniform is **not** memoryless. Among standard distributions, only the exponential (continuous) and geometric (discrete) are memoryless.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "If $$X \\sim U[a,b]$$ and $$Y = pX + q$$ with $$p > 0$$, what is the distribution of $$Y$$? Why? (3 steps)", "answer": "- Step 1: A linear transformation maps the interval $$[a,b]$$ onto $$[pa+q, \\, pb+q]$$ — endpoints transform linearly when $$p>0$$.\n- Step 2: Linear transformations preserve the *shape* of a distribution: a flat density maps to a (rescaled) flat density.\n- Step 3: So $$Y \\sim U[pa+q, \\, pb+q]$$. The new height is $$\\frac{1}{p(b-a)}$$ — wider interval, lower density.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What changes if $$Y = pX + q$$ with $$p < 0$$, given $$X \\sim U[a,b]$$? (3 steps)", "answer": "- Step 1: A negative scaling reverses the orientation: $$a$$ maps to the *larger* endpoint $$pa+q$$, and $$b$$ maps to the *smaller* one $$pb+q$$.\n- Step 2: Intervals are conventionally written low-to-high, so $$Y \\sim U[pb+q, \\, pa+q]$$.\n- Step 3: Despite the flip, $$Y$$ is still uniform — only the labelling of endpoints reverses. The shape is preserved.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Without computing variances directly, why is $$\\text{Var}(aX+b) = a^2\\,\\text{Var}(X)$$ regardless of the distribution of $$X$$? (3 steps)", "answer": "- Step 1: Adding $$b$$ shifts every value by the same amount — it shifts the mean too, leaving deviations unchanged. So $$+b$$ has *no* effect on variance.\n- Step 2: Multiplying by $$a$$ multiplies every deviation from the mean by $$a$$, so squared deviations get multiplied by $$a^2$$.\n- Step 3: Hence $$\\text{Var}(aX+b) = a^2 \\text{Var}(X)$$. This is general — applies to uniform, normal, any distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Explain why $$E(X^2) \\ne (E(X))^2$$ for a uniform distribution with non-zero variance. (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the *average of squared values*; $$(E(X))^2$$ is the *square of the average value*. These are different operations.\n- Step 2: They differ exactly by the variance: $$\\text{Var}(X) = E(X^2) - (E(X))^2$$, so $$E(X^2) = \\text{Var}(X) + (E(X))^2$$.\n- Step 3: They are equal only when $$\\text{Var}(X) = 0$$, i.e. $$X$$ is constant. For any spread-out distribution, $$E(X^2) > (E(X))^2$$ — squaring amplifies large values.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "For $$X \\sim U[1, 5]$$, find $$E(X^2)$$ using $$E(X^2) = \\text{Var}(X) + (E(X))^2$$. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{1+5}{2} = 3$$, so $$(E(X))^2 = 9$$.\n- Step 2: $$\\text{Var}(X) = \\frac{(5-1)^2}{12} = \\frac{16}{12} = \\frac{4}{3}$$.\n- Step 3: $$E(X^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$. Faster than direct integration of $$x^2 f(x)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "A radius $$R \\sim U[1,5]$$. Why is the expected area of a circle of radius $$R$$ NOT $$\\pi(E(R))^2$$? (3 steps)", "answer": "- Step 1: Area $$A = \\pi R^2$$ is a *non-linear* function of $$R$$. Expectation does NOT commute with non-linear functions.\n- Step 2: The correct relation: $$E(A) = \\pi E(R^2)$$, *not* $$\\pi (E(R))^2$$. These differ by $$\\pi \\cdot \\text{Var}(R)$$.\n- Step 3: Concretely: $$E(R^2) = \\text{Var}(R) + (E(R))^2 = \\frac{4}{3} + 9 = \\frac{31}{3}$$, so $$E(A) = \\frac{31\\pi}{3}$$ — much larger than $$9\\pi$$.\n\nThis is \"Jensen's inequality\" in disguise: for convex $$g$$, $$E(g(X)) \\ge g(E(X))$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A solid rod's diameter varies from $$2$$ cm to $$10$$ cm; cut at a random height, the radius $$R \\sim U[1,5]$$. Sketch the reasoning to find $$E(\\text{cross-section area})$$. (3 steps)", "answer": "- Step 1: Area $$A = \\pi R^2$$, so $$E(A) = \\pi E(R^2)$$.\n- Step 2: Compute $$E(R^2) = \\text{Var}(R) + (E(R))^2$$. With $$E(R) = 3$$ and $$\\text{Var}(R) = \\frac{4}{3}$$, get $$E(R^2) = \\frac{31}{3}$$.\n- Step 3: $$E(A) = \\frac{31\\pi}{3} \\approx 32.5\\,\\text{cm}^2$$. Notice this is more than the area at the average radius ($$9\\pi \\approx 28.3$$) — variance pushes the expected area up.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Given $$Y \\sim U[a,b]$$ with $$E(Y) = 1$$ and $$\\text{Var}(Y) = \\frac{16}{3}$$, find $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: From $$E(Y)$$: $$\\frac{a+b}{2} = 1 \\Rightarrow a + b = 2$$.\n- Step 2: From $$\\text{Var}(Y)$$: $$\\frac{(b-a)^2}{12} = \\frac{16}{3} \\Rightarrow (b-a)^2 = 64 \\Rightarrow b-a = 8$$ (taking positive root since $$b>a$$).\n- Step 3: Solving the system: $$b = 5$$, $$a = -3$$. So $$Y \\sim U[-3, 5]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Given $$Y \\sim U[a,b]$$ with $$P(Y < 5) = \\frac{1}{4}$$ and $$P(Y > 7) = \\frac{1}{2}$$, find $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: Translate the probabilities: $$\\frac{5-a}{b-a} = \\frac{1}{4}$$ and $$\\frac{b-7}{b-a} = \\frac{1}{2}$$.\n- Step 2: From the first: $$4(5-a) = b - a \\Rightarrow b = 20 - 3a$$. From the second: $$2(b-7) = b-a \\Rightarrow b = 14 - a$$.\n- Step 3: Set equal: $$20 - 3a = 14 - a \\Rightarrow a = 3$$, then $$b = 11$$. So $$Y \\sim U[3, 11]$$.\n\nQuick sanity check: $$P(Y<5) = \\frac{2}{8} = \\frac{1}{4}$$ ✓ and $$P(Y>7) = \\frac{4}{8} = \\frac{1}{2}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "A pencil's length is recorded to the nearest cm. Justify modeling the rounding error as $$U[-0.5, 0.5]$$. (3 steps)", "answer": "- Step 1: If recorded length is $$L$$ cm, the true length lies anywhere in $$[L-0.5, L+0.5)$$ (the rounding bin).\n- Step 2: The error $$=$$ true $$-$$ recorded ranges over $$[-0.5, 0.5)$$.\n- Step 3: With no reason to favour any value in this range — true measurements arrive \"blindly\" across the bin — uniform is the natural model: $$\\text{error} \\sim U[-0.5, 0.5]$$.\n\nThe principle: any measurement rounded to the nearest unit $$u$$ has error $$\\sim U[-u/2,\\,u/2]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "What is the variance of the rounding error when measuring to the nearest cm? Use the general formula. (3 steps)", "answer": "- Step 1: Error $$\\sim U[-0.5, 0.5]$$, so $$b - a = 1$$.\n- Step 2: $$\\text{Var}(\\text{error}) = \\frac{(b-a)^2}{12} = \\frac{1}{12}$$.\n- Step 3: Hence standard deviation $$= \\frac{1}{\\sqrt{12}} \\approx 0.289$$ cm. The \"typical\" rounding error is small but non-zero — and this $$\\frac{1}{12}$$ result is the foundation of error-budget calculations in metrology.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Suggest a suitable distribution to model: (a) the masses of 200g tins of tomatoes from a production line, (b) the rounding error in lengths of metal rods. (2 steps)", "answer": "- Step 1: (a) Tin masses cluster around the target — there's a central tendency from manufacturing aim plus random noise. This is **not** uniform; a normal-like distribution is appropriate.\n- Step 2: (b) Rounding errors are equally likely anywhere within the rounding bin — uniform on $$[-0.5, 0.5]$$ cm.\n\nThe key distinction: uniform models *agnostic* spread, normal models *clustered* spread.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "When is the continuous uniform distribution philosophically the \"right\" model? (3 steps)", "answer": "- Step 1: When the underlying mechanism truly produces equal likelihood across a range — e.g. randomly chosen cut point on a rod, electronically randomised cut-off, angle of a fairly-spun spinner.\n- Step 2: When the modeler genuinely has *no information* favouring any region of the support — the \"principle of insufficient reason\" / maximum entropy choice given only a bounded range.\n- Step 3: Bad fit when the underlying physics or biology suggests clustering (heights, weights, reaction times) — these typically have central tendency and should NOT be uniform.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A bus arrives every $$T$$ minutes and you turn up at a random time. What's your wait-time distribution and expected wait? (3 steps)", "answer": "- Step 1: If your arrival is uniformly random within an inter-arrival cycle, every wait $$0$$ to $$T$$ is equally likely.\n- Step 2: So wait $$W \\sim U[0, T]$$.\n- Step 3: Expected wait $$= \\frac{T}{2}$$. Counterintuitive: you don't expect $$T$$ on average — half the cycle, by symmetry of the uniform.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "What is the median of $$X \\sim U[a,b]$$, and how does it compare to the mean? (3 steps)", "answer": "- Step 1: Median $$m$$ satisfies $$F(m) = \\frac{1}{2}$$, i.e. $$\\frac{m-a}{b-a} = \\frac{1}{2}$$.\n- Step 2: Solving: $$m = \\frac{a+b}{2}$$ — the midpoint.\n- Step 3: This equals the mean. For *any* symmetric distribution, mean $$=$$ median; uniform is a textbook example.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "What are the lower and upper quartiles of $$X \\sim U[a,b]$$, and what is the interquartile range? (3 steps)", "answer": "- Step 1: $$Q_1$$: solve $$\\frac{Q_1 - a}{b-a} = \\frac{1}{4} \\Rightarrow Q_1 = a + \\frac{b-a}{4}$$.\n- Step 2: $$Q_3$$: similarly $$Q_3 = a + \\frac{3(b-a)}{4}$$.\n- Step 3: $$\\text{IQR} = Q_3 - Q_1 = \\frac{b-a}{2}$$ — exactly half the support's width. The middle 50% of the distribution occupies the central half of the interval.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "A drinks machine pours coffee uniformly between $$175$$ and $$215$$ ml. Find $$x$$ such that $$P(X \\ge x) = 0.65$$. (3 steps)", "answer": "- Step 1: $$P(X \\ge x) = \\frac{215-x}{215-175} = \\frac{215-x}{40}$$.\n- Step 2: Set $$\\frac{215-x}{40} = 0.65 \\Rightarrow 215 - x = 26 \\Rightarrow x = 189$$.\n- Step 3: So $$x = 189$$ ml. Mental check: this is below the midpoint ($$195$$), and we want the upper $$65\\%$$, so $$x$$ being below mid makes sense.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Five cups of coffee are drawn from a machine where each pour is uniform on $$[175, 215]$$ ml. What's the chance exactly three contain less than $$187$$ ml? (4 steps)", "answer": "- Step 1: First, find $$p = P(X < 187) = \\frac{187-175}{40} = \\frac{12}{40} = 0.3$$.\n- Step 2: Each cup independently has probability $$p = 0.3$$ of containing $$<187$$ ml — these are independent Bernoulli trials.\n- Step 3: The count of \"low\" cups out of 5 is $$\\text{Binomial}(5, 0.3)$$.\n- Step 4: $$P(\\text{exactly 3}) = \\binom{5}{3}(0.3)^3(0.7)^2$$. The structure: uniform supplies $$p$$, binomial counts the successes.\n\nThe pattern \"uniform sets up $$p$$, binomial counts successes\" appears in many exam problems.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "For $$X \\sim U[3,8]$$ and $$Y = 12 - 3X$$, find $$E(Y)$$ using linearity. (3 steps)", "answer": "- Step 1: By linearity of expectation, $$E(Y) = E(12 - 3X) = 12 - 3E(X)$$.\n- Step 2: $$E(X) = \\frac{3+8}{2} = 5.5$$.\n- Step 3: $$E(Y) = 12 - 3(5.5) = -4.5$$. Note $$E$$ doesn't care that the transformation is decreasing — only the linear coefficients matter.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "For $$X \\sim U[3,8]$$ and $$Y = 12 - 3X$$, convert $$P(Y > 0)$$ into a probability about $$X$$. (3 steps)", "answer": "- Step 1: $$Y > 0 \\Leftrightarrow 12 - 3X > 0 \\Leftrightarrow X < 4$$.\n- Step 2: So $$P(Y > 0) = P(X < 4)$$, which we can compute on the original uniform support.\n- Step 3: $$P(X < 4) = \\frac{4-3}{8-3} = \\frac{1}{5}$$. This is a key trick: rewrite probabilities about $$Y$$ as probabilities about $$X$$ — then use the known uniform on $$X$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "For $$X \\sim U[3,8]$$ and $$Y = 12-3X$$, find the distribution of $$Y$$ directly. Verify it gives the same $$E(Y)$$. (3 steps)", "answer": "- Step 1: $$Y = 12 - 3X$$ is linear in $$X$$ with negative slope, so $$Y$$ is uniform on the interval whose endpoints are images of $$3$$ and $$8$$.\n- Step 2: $$X = 3 \\mapsto Y = 3$$; $$X = 8 \\mapsto Y = -12$$. So $$Y \\sim U[-12, 3]$$ (low to high).\n- Step 3: Check: $$E(Y) = \\frac{-12 + 3}{2} = -4.5$$ ✓. Variance: $$\\frac{15^2}{12} = \\frac{225}{12} = 18.75$$, also matching $$9\\,\\text{Var}(X)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A 20-cm rod is cut at a uniformly random point. Modeling the longer piece as $$X \\sim U[10, 20]$$, find the expected area of a rectangle whose base and height are the two pieces. (4 steps)", "answer": "- Step 1: If longer piece is $$X$$, the shorter piece is $$20 - X$$. Area $$A = X(20 - X) = 20X - X^2$$.\n- Step 2: $$E(A) = 20 E(X) - E(X^2)$$, so we need both moments.\n- Step 3: $$E(X) = 15$$, $$\\text{Var}(X) = \\frac{(20-10)^2}{12} = \\frac{100}{12} = \\frac{25}{3}$$. Thus $$E(X^2) = \\frac{25}{3} + 225 = \\frac{700}{3}$$.\n- Step 4: $$E(A) = 20(15) - \\frac{700}{3} = 300 - \\frac{700}{3} = \\frac{200}{3} \\approx 66.7\\,\\text{cm}^2$$. Note the answer is *less* than $$15 \\times 5 = 75$$ — variance reduces the expected product.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "What happens to a uniform distribution $$U[a,b]$$ in the limit as $$b \\to a$$? (3 steps)", "answer": "- Step 1: The interval shrinks to a single point.\n- Step 2: The p.d.f. height $$\\frac{1}{b-a}$$ blows up to $$\\infty$$, but the support shrinks to nothing — total area still $$1$$.\n- Step 3: In the limit, $$X$$ is no longer random — it's deterministic, equal to $$a$$. Variance $$\\to 0$$, and the distribution degenerates to a \"point mass\". Useful sanity check: the formulas behave correctly in this edge case.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "For $$X \\sim U[-c, c]$$, find $$E(X)$$ and $$\\text{Var}(X)$$. Why isn't the standard deviation equal to $$c$$? (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{-c + c}{2} = 0$$ by symmetry.\n- Step 2: $$\\text{Var}(X) = \\frac{(2c)^2}{12} = \\frac{c^2}{3}$$, so $$\\sigma = \\frac{c}{\\sqrt{3}} \\approx 0.577\\,c$$.\n- Step 3: The range goes to $$\\pm c$$, but values near the endpoints are *no more likely* than values near zero. The \"typical\" deviation is much less than $$c$$ — about $$58\\%$$ of the half-range. SD weights values by their probability density, not by extreme reach.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A spinner of radius $$r$$ has its angle $$\\theta$$ from vertical uniformly distributed. Over what interval, and why is this a perfect physical realisation of the uniform distribution? (3 steps)", "answer": "- Step 1: A fair spin should have no preferred resting angle, so all angles in a full rotation are equally likely.\n- Step 2: $$\\theta \\sim U[0, 2\\pi]$$ (or any equivalent $$2\\pi$$-wide interval).\n- Step 3: This is a \"physical maximum entropy\" device: rotational symmetry of the spinner forces equal likelihood over all angles. It's one of the few real-world processes that produces a *truly* uniform distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A spinner has pointer length $$r$$, with angle $$\\theta \\sim U[0, 2\\pi]$$. The horizontal distance of the tip from the vertical axis is $$X = r\\sin\\theta$$. Sketch how to find $$E(|X|)$$ and explain the connection to estimating $$\\pi$$. (4 steps)", "answer": "- Step 1: $$|X| = r|\\sin\\theta|$$. Then $$E(|X|) = r \\cdot \\frac{1}{2\\pi}\\int_0^{2\\pi}|\\sin\\theta|\\, d\\theta$$.\n- Step 2: $$|\\sin\\theta|$$ over a full period integrates to $$4$$ (four humps of unit area each, two from $$\\sin$$ and two from absolute value).\n- Step 3: So $$E(|X|) = r \\cdot \\frac{4}{2\\pi} = \\frac{2r}{\\pi}$$.\n- Step 4: Rearranging: $$\\pi = \\frac
