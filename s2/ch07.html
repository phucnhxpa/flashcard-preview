stion": "When we \"reject $$H_0$$\" at the 5% level, what have we established, and what have we NOT established?", "answer": "Rejecting $$H_0$$ means: *given the data and the model, the probability of observing such an extreme test statistic under $$H_0$$ is less than 5%*. This indicates that $$H_0$$ is statistically inconsistent with the data, and we treat $$H_1$$ as the more credible explanation. However, we have NOT:\n- Proven $$H_1$$ is true (our test could be a false alarm ~5% of the time even if $$H_0$$ were correct).\n- Determined the specific value of the parameter under $$H_1$$ (only its direction).\n- Eliminated chance as an explanation (we've just decided it's unlikely enough to act on).\n\nEqually, \"failing to reject $$H_0$$\" does NOT mean $$H_0$$ is true — only that the current evidence is insufficient. A small sample could easily miss a real effect. Language matters: use phrases like \"evidence supports\" or \"insufficient evidence to reject\", not \"$$H_1$$ is true\" or \"proved $$H_0$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Why is it crucial to state conclusions of a hypothesis test in the *context* of the original question, rather than just saying \"reject $$H_0$$\"? (3 steps)", "answer": "- Step 1: \"Reject $$H_0$$\" is a statistical decision, but readers (clinicians, managers, scientists) want to know what this means for their *real-world* question.\n- Step 2: A complete conclusion includes:\n+ (a) the statistical decision (reject / fail to reject),\n+ (b) the direction of the finding in plain language (\"the drug is more effective\", \"sales have increased\"),\n+ (c) the confidence caveat (\"at the 5% level\").\n- Step 3: Examples:\n+ Bad: \"Reject $$H_0$$.\"\n+ Good: \"There is sufficient evidence at the 5% significance level to conclude that the new drug is more effective than the standard treatment.\"\n+ Bad: \"$$H_0$$ is proved.\"\n+ Good: \"There is insufficient evidence at the 5% level to reject the claim that $$p = 0.4$$.\"\n\nHedge your claims. Never claim to have \"proven\" anything in statistics — all results are probabilistic.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Give the four conditions that must hold for a binomial model to be appropriate for counting outcomes in a sample. Why does each condition matter? (4 steps)", "answer": "- Step 1: **Fixed number of trials $$n$$**: we must decide the sample size in advance. If $$n$$ were random (e.g., stopping when you see enough successes), we'd have a different distribution (negative binomial, say).\n- Step 2: **Two outcomes per trial** (success/failure): each trial must be dichotomous. If there were three possible outcomes (like \"red/green/blue\"), we'd need a different distribution.\n- Step 3: **Independence**: the outcome of one trial must not influence any other. If trials share a confounder (e.g., same batch, same patient), they're dependent and the binomial model is wrong.\n- Step 4: **Constant probability $$p$$**: each trial has the same probability of success. If $$p$$ varies (e.g., a machine wearing out over time), the binomial assumption is violated.\n+ When one condition fails, we get over- or under-dispersion, and the test loses validity.\n\nRule of thumb: if you can write the sample as a fixed series of identical, independent coin flips, binomial applies.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why should \"optional stopping\" (sampling until you see enough successes) *never* be used with a binomial hypothesis test? (3 steps)", "answer": "- Step 1: The binomial distribution assumes $$n$$ is fixed in advance. Under optional stopping, $$n$$ is random — it depends on what outcomes have already occurred.\n- Step 2: Under optional stopping, the observed counts are no longer binomial; the distribution could be negative binomial or even more complex. Using binomial probabilities would give *incorrect* p-values.\n- Step 3: Specifically, optional stopping tends to make tests *anti-conservative* — you can almost always find enough outcomes to \"reach significance\" by continuing to sample. This inflates the Type I error rate well above the nominal level.\n+ This is a classic source of p-hacking in research: \"just collect more data until it's significant\".\n+ Always determine $$n$$ before sampling, and commit to stopping at that $$n$$ regardless of intermediate results.\n\nValid statistics require pre-specified sampling rules.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "A Poisson hypothesis test is conducted over an interval that is different from the \"natural\" unit of the rate. Why and how do we scale the rate parameter? (3 steps)", "answer": "- Step 1: The Poisson distribution is parameterised by $$\\lambda$$ = expected count over the interval being observed. The underlying process has a fixed rate per unit time (or space), and $$\\lambda$$ scales proportionally with the interval length.\n- Step 2: If events occur at 0.325 per minute and we observe for 20 minutes:\n+ $$\\lambda = 0.325 \\times 20 = 6.5$$ events expected over 20 minutes.\n+ So $$X \\sim \\text{Po}(6.5)$$ for our count.\n- Step 3: Why this scaling is valid: sums of independent Poisson random variables are Poisson with parameter summed. If each minute has $$\\text{Po}(0.325)$$, then 20 minutes sum to $$\\text{Po}(6.5)$$.\n+ Practically: state $$H_0$$ in terms of the rate that matches your interval (e.g., $$H_0: \\lambda = 6.5$$ for 20 minutes, or equivalently $$H_0: \\text{rate} = 0.325$$/min).\n+ Be consistent: the count follows $$\\text{Po}(\\lambda)$$, where $$\\lambda$$ corresponds to your observation window.\n\nTakeaway: always match the rate parameter to the length/size of your sampling window.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why does hypothesis testing with a Poisson distribution follow the same structure as with a binomial distribution, even though the underlying models are different? (3 steps)", "answer": "- Step 1: Both binomial and Poisson are *discrete probability distributions*. The structural logic of hypothesis testing (null, alternative, critical region, significance level, rejection rule) is independent of the specific distribution used.\n- Step 2: The only differences are:\n+ The distribution of the test statistic ($$B(n, p_0)$$ vs $$\\text{Po}(\\lambda_0)$$).\n+ The parameter being tested ($$p$$ vs $$\\lambda$$).\n+ The expected value ($$np$$ vs $$\\lambda$$).\n- Step 3: Everything else transfers directly:\n+ Critical regions are found the same way — find the smallest (or largest) value where the tail probability ≤ $$\\alpha$$.\n+ One-tailed vs two-tailed works identically.\n+ The actual significance level is the true probability of falling in the critical region.\n\nThe conceptual framework is universal; only the computational model changes.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "When should we use a Poisson approximation for a binomial distribution, and what is the intuitive reason? (3 steps)", "answer": "- Step 1: Use $$B(n, p) \\approx \\text{Po}(np)$$ when $$n$$ is large (say $$n \\geq 50$$) AND $$p$$ is small (say $$p \\leq 0.1$$). Often stated as $$n$$ large, $$np$$ finite/moderate.\n- Step 2: Mathematical derivation: in the limit $$n \\to \\infty$$, $$p \\to 0$$ with $$np = \\lambda$$ fixed, the binomial probability mass function converges to the Poisson. Specifically:\n+ Mean of binomial: $$np = \\lambda$$ → matches Poisson mean.\n+ Variance of binomial: $$np(1-p) \\approx np = \\lambda$$ for small $$p$$ → matches Poisson variance.\n- Step 3: Intuition: for many rare-event opportunities, what matters is not each individual opportunity but the total \"rate\" $$\\lambda = np$$. The specific values of $$n$$ and $$p$$ blur into a continuous-time rate process — which is exactly what Poisson models.\n+ Practical benefit: Poisson tables go up to $$\\lambda \\approx 10$$, so approximations work for many binomial cases where $$n$$ is large but unwieldy.\n\nBinomial with \"tiny $$p$$ but many trials\" = Poisson with rate $$np$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When should we use a normal approximation for a binomial distribution, and why does it work? (3 steps)", "answer": "- Step 1: Use $$B(n, p) \\approx N(np, np(1-p))$$ when $$n$$ is large (say $$n \\geq 30$$) AND $$p$$ is not too close to 0 or 1 (typically both $$np > 5$$ and $$n(1-p) > 5$$).\n- Step 2: Why it works: the binomial is the sum of $$n$$ independent Bernoulli trials. By the Central Limit Theorem, the distribution of a sum of many independent random variables approaches a normal distribution as $$n$$ grows.\n+ Mean: $$E(X) = np$$.\n+ Variance: $$\\text{Var}(X) = np(1-p)$$.\n- Step 3: When this approximation is invalid:\n+ $$n$$ small: not enough trials for CLT to kick in.\n+ $$p$$ very small or very large: binomial is skewed (too asymmetric for a normal to fit well). Use Poisson approximation instead.\n\nThe binomial is approximately bell-shaped when conditions hold, and that's exactly when normal approximation is accurate.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Explain the concept of \"continuity correction\" — what it is, why we need it, and how to apply it. (3 steps)", "answer": "- Step 1: **What**: When approximating a discrete distribution (binomial or Poisson) by a continuous normal, we shift the boundaries by $$\\pm 0.5$$ to account for the \"width\" of each integer's probability mass.\n- Step 2: **Why**: The discrete $$X = 5$$ corresponds to a \"box\" of probability at the single point 5. But for the continuous normal, this point has probability zero. To make the approximation work, we treat $$X = 5$$ as the interval $$(4.5, 5.5)$$ — a unit-width box centred at 5.\n- Step 3: **How to apply**:\n+ \"$$X \\leq a$$\" (inclusive) → $$P(W \\leq a + 0.5)$$\n+ \"$$X \\geq a$$\" (inclusive) → $$P(W \\geq a - 0.5)$$\n+ \"$$X = a$$\" → $$P(a - 0.5 \\leq W \\leq a + 0.5)$$\n+ The rule: always adjust by 0.5 *outwards* from the boundary to include the discrete value's box.\n\nWithout this correction, the approximation systematically miscounts probability at tail boundaries, especially for moderate $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "When is a normal approximation to a Poisson distribution appropriate, and what parameters should you use? (3 steps)", "answer": "- Step 1: Use $$\\text{Po}(\\lambda) \\approx N(\\lambda, \\lambda)$$ when $$\\lambda$$ is large — typically $$\\lambda > 10$$ or $$\\lambda > 15$$.\n- Step 2: Why it works: a Poisson with large $$\\lambda$$ can be viewed as a sum of many independent $$\\text{Po}(1)$$ variables, and by the Central Limit Theorem, this sum becomes approximately normal.\n+ Both mean and variance of the Poisson equal $$\\lambda$$, so the normal approximation has mean $$\\lambda$$ and variance $$\\lambda$$.\n- Step 3: Practical relevance:\n+ Standard cumulative Poisson tables often only go up to $$\\lambda = 10$$. For larger $$\\lambda$$, normal approximation is essential.\n+ Apply continuity correction (shift boundaries by 0.5) since Poisson is still discrete.\n+ Example: $$\\text{Po}(60)$$ is approximated by $$N(60, 60)$$, with $$P(X \\geq 75) \\approx P(W \\geq 74.5)$$.\n\nPoisson becomes bell-shaped and symmetric for large $$\\lambda$$, making normal an excellent fit.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Walk through the full procedure for conducting a hypothesis test: given data from an experiment, what are the steps you always follow? (5 steps)", "answer": "- Step 1: **Identify the test statistic and model**:\n+ Binomial $$X \\sim B(n, p)$$ or Poisson $$X \\sim \\text{Po}(\\lambda)$$.\n+ Check whether an approximation (Poisson or normal) is appropriate.\n- Step 2: **State the hypotheses**:\n+ $$H_0$$: specific parameter value (the status quo).\n+ $$H_1$$: direction ($$<$$, $$>$$, or $$\\neq$$) based on the research question.\n- Step 3: **Under $$H_0$$, compute either the p-value or the critical region**:\n+ P-value: $$P(\\text{as extreme as observed} | H_0)$$.\n+ Critical region: values where we'd reject $$H_0$$.\n- Step 4: **Apply the decision rule**:\n+ If p-value < $$\\alpha$$ or observed value is in critical region → reject $$H_0$$.\n+ Otherwise → fail to reject $$H_0$$.\n- Step 5: **Write conclusion in context**:\n+ \"There is [sufficient/insufficient] evidence at the $$\\alpha$$% level to [specific statement about the research question].\"\n\nThis five-step structure works for any hypothesis test covered in this chapter.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A shop sells 10 cars per week on average. Over 6 weeks, 75 cars are sold. Conceptually walk through how you'd test at the 5% level whether sales have increased, without doing the arithmetic. (5 steps)", "answer": "- Step 1: **Distribution**: counts of cars in time intervals → Poisson. Under $$H_0$$, rate = 10/week, so $$\\lambda = 60$$ over 6 weeks. So $$Y \\sim \\text{Po}(60)$$ under $$H_0$$.\n- Step 2: **Approximation check**: $$\\lambda = 60$$ is large (well beyond cumulative tables), so approximate $$Y$$ by $$W \\sim N(60, 60)$$.\n- Step 3: **Hypotheses**: $$H_0: \\lambda = 60$$, $$H_1: \\lambda > 60$$ (one-tailed upper, testing for increase).\n- Step 4: **Compute the p-value**:\n+ $$P(Y \\geq 75) \\approx P(W \\geq 74.5)$$ (continuity correction).\n+ Standardise: $$Z \\geq (74.5 - 60)/\\sqrt{60}$$.\n+ Look up $$P(Z \\geq \\text{about } 1.87)$$ from the normal table.\n- Step 5: **Compare and conclude**:\n+ If p-value < 0.05 → reject $$H_0$$.\n+ Conclusion in context: \"There is evidence at the 5% level that sales have increased.\"\n\nThe approximation simplifies what would be an unmanageable exact computation.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "A manager claims $$p = 0.45$$ of customers buy something. Out of 100 sampled customers, 35 buy. At the 5% level, test whether the manager's claim is correct. Describe the approach, choice of approximation, and conceptual steps. (4 steps)", "answer": "- Step 1: **Distribution**: fixed sample size of 100, binary outcome (bought / didn't buy) → binomial. $$X \\sim B(100, p)$$ under test.\n- Step 2: **Check approximation**: $$n = 100$$ is large, $$p = 0.45$$ is near 0.5, so $$np = 45$$ and $$n(1-p) = 55$$ are both well above 5. Normal approximation is appropriate: $$W \\sim N(45, 24.75)$$.\n- Step 3: **Hypotheses**: $$H_0: p = 0.45$$, $$H_1: p \\neq 0.45$$ (two-tailed, testing for any deviation from claim).\n+ Note: 35 is *below* the expected value 45, so we'll compute $$P(X \\leq 35) \\approx P(W \\leq 35.5)$$ (lower-tail, with continuity correction).\n- Step 4: **Compare**:\n+ For a two-tailed test at 5%, compare to $$\\alpha/2 = 0.025$$.\n+ If $$P(W \\leq 35.5)$$ < 0.025 → reject $$H_0$$.\n+ Conclusion in context: \"evidence the manager's claim is wrong\" or \"insufficient evidence\".\n\nKey insight: $$p \\approx 0.5$$ and large $$n$$ = use normal approximation.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "For a binomial test with $$n = 100$$ and $$p = 0.04$$, which approximation is appropriate and why? Why would a normal approximation be a poor choice here? (3 steps)", "answer": "- Step 1: Check the parameters: $$n = 100$$ is large, $$p = 0.04$$ is small. This fits the \"large $$n$$, small $$p$$\" profile → **Poisson approximation**: $$X \\approx \\text{Po}(4)$$.\n- Step 2: Normal approximation would be poor because:\n+ $$np = 4$$ is too small (normal approximation typically needs $$np \\geq 5$$ or higher).\n+ The binomial is strongly right-skewed when $$p$$ is small — it looks nothing like a symmetric bell curve.\n+ The normal distribution would give significant probability to *negative* counts, which is meaningless.\n- Step 3: Why Poisson works: with tiny $$p$$, successes are rare events. The Poisson is specifically designed for modelling rare event counts. The skewness of the binomial (heavy right tail, compressed left) matches the Poisson exactly for small $$p$$.\n+ Concretely, $$\\text{Po}(4)$$ tables can be looked up directly, making calculations easy.\n\nRule of thumb: small $$p$$ ⇒ Poisson; large $$p \\approx 0.5$$ ⇒ normal.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Walk through the intuitive reason why $$B(n, p) \\to \\text{Po}(np)$$ as $$n \\to \\infty$$ and $$p \\to 0$$ (with $$np$$ held constant). (3 steps)", "answer": "- Step 1: In the binomial setting with $$n$$ huge and $$p$$ tiny, each trial is almost certainly a failure. Successes are rare events spread over many opportunities.\n- Step 2: As $$n$$ grows and $$p$$ shrinks (with $$np = \\lambda$$ constant), the specific number of trials becomes less important than the total \"rate of rare events\" $$\\lambda$$. The process blurs into a continuous stream of arrivals at rate $$\\lambda$$ — exactly what Poisson models.\n- Step 3: Mathematically:\n+ Binomial mean $$np$$ = Poisson mean $$\\lambda$$ (exactly).\n+ Binomial variance $$np(1-p) \\approx np = \\lambda$$ (approximation holds for small $$p$$).\n+ The probability mass function of the binomial approaches the Poisson pmf in this limit.\n\nConceptually: \"many opportunities × tiny chance each\" = \"rate of rare events\".", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "When using a normal approximation for $$P(X \\geq 12)$$ where $$X$$ is discrete, why do we approximate by $$P(W \\geq 11.5)$$ and not $$P(W \\geq 12.5)$$?", "answer": "The discrete value $$X = 12$$ corresponds to the probability \"box\" between 11.5 and 12.5 under the continuous normal approximation. We want to include *all* the probability from $$X = 12$$ onward, so we start from the lower edge of this box — i.e., $$W \\geq 11.5$$.\n\nIf we used $$P(W \\geq 12.5)$$, we would start from the upper edge, missing the probability for $$X = 12$$ itself (the interval from 11.5 to 12.5). This would systematically understate the probability. The general rule: for \"$$X \\geq a$$\", the matching continuous event is \"$$W \\geq a - 0.5$$\" (shift *outwards* by half a unit to include $$X = a$$'s full box). For \"$$X \\leq a$$\", the matching event is \"$$W \\leq a + 0.5$$\" (also outward).\n\nContinuity correction ensures the discrete value's full probability is captured.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Why is applying the continuity correction more important for small-to-moderate $$n$$ than for very large $$n$$? (3 steps)", "answer": "- Step 1: The continuity correction adjusts by 0.5 — a fixed amount regardless of sample size.\n- Step 2: The standard deviation of the binomial or Poisson scales as $$\\sqrt{n}$$ (or $$\\sqrt{\\lambda}$$). As $$n$$ grows, the SD grows, and the 0.5 correction becomes a smaller fraction of the SD.\n+ For $$n = 16$$, SD might be 2, so 0.5 is 25% of an SD — significant.\n+ For $$n = 1600$$, SD might be 20, so 0.5 is 2.5% of an SD — negligible.\n- Step 3: For very large samples, you get similar answers with or without correction. But for moderate samples, ignoring the correction introduces systematic errors in probabilities.\n+ Exam expectation: always apply continuity correction when approximating discrete by continuous, regardless of sample size.\n\nRule: better to always apply the correction than to forget it when needed.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A student reasons: \"Since the critical value is 8 for $$X \\geq 8$$, my observed value of 7 is 'just outside' the critical region. Should I reject anyway since it's 'close'?\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: Hypothesis testing is a *binary* decision procedure: the test statistic is either in the critical region (reject) or not in the critical region (don't reject). \"Close to\" the boundary has no meaning in the decision rule.\n- Step 2: The critical value is carefully chosen to ensure the total tail probability matches the significance level. Moving the boundary inward (to include 7) would inflate the Type I error rate above the nominal $$\\alpha$$.\n- Step 3: If you reject for $$x = 7$$, you're effectively running a test at a larger significance level than 5% — maybe 5.5% — without acknowledging it.\n+ Valid alternatives: either commit to the critical region you've set, OR acknowledge you'd want to use a slightly higher $$\\alpha$$ (e.g., 10%) and redo the test honestly.\n+ Never \"stretch\" the critical region based on what the data shows.\n\nDecisions must follow the pre-specified rule exactly, not approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "What is a Type I error, and how does it relate to the significance level?", "answer": "A **Type I error** is the error of rejecting $$H_0$$ when $$H_0$$ is actually true — a \"false alarm\". The significance level $$\\alpha$$ is defined as the probability of making a Type I error. So if $$\\alpha = 5\\%$$, then we accept up to a 5% chance of false rejection. This is the \"price\" we pay for having a procedure that can detect real effects.\n\nFor discrete distributions, the *actual* Type I error rate may be slightly below $$\\alpha$$ (due to the discrete nature of the distribution). The trade-off: lowering $$\\alpha$$ reduces false alarms but makes real effects harder to detect (increasing Type II errors — missing real effects). In practice, $$\\alpha = 5\\%$$ is a social convention balancing these concerns. Key insight: Type I error rate is a property of the test procedure over hypothetical repetitions, not a single run.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "A student writes \"the test rejects $$H_1$$\" as their conclusion. What is incorrect about this, and what is the right language? (2 steps)", "answer": "- Step 1: The hypothesis testing framework is structured around $$H_0$$ — the assumption we're challenging. We either **reject $$H_0$$** (when data contradicts it) or **fail to reject $$H_0$$** (when evidence is insufficient). The test makes no direct statement about $$H_1$$.\n- Step 2: Correct language:\n+ \"Reject $$H_0$$ at the 5% level\" → there is evidence supporting $$H_1$$.\n+ \"Fail to reject $$H_0$$ at the 5% level\" → evidence is insufficient to support $$H_1$$.\n+ We never say \"reject $$H_1$$\" — it's not in our framework.\n+ We never say \"accept $$H_0$$\" or \"prove $$H_0$$\" — we lack evidence to reject, but this doesn't confirm $$H_0$$.\n\nThe asymmetry reflects the logic: we give $$H_0$$ the benefit of the doubt and only overturn it with strong evidence.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Two hypothesis tests share the same data structure and significance level, but Test A has $$n = 20$$ and Test B has $$n = 200$$. Which is more likely to correctly detect a real deviation from $$H_0$$? Why? (3 steps)", "answer": "- Step 1: Both tests have the same false-alarm rate (5%), so this isn't about Type I errors — it's about *power* (the ability to detect real effects, i.e., reject $$H_0$$ when $$H_1$$ is true).\n- Step 2: Larger sample sizes give tighter sampling distributions — the test statistic is less variable under any fixed parameter value. The standard error scales as $$1/\\sqrt{n}$$.\n- Step 3: So Test B (with $$n = 200$$) is more powerful — same $$\\alpha$$, but smaller effects become detectable.\n+ Equivalently: in Test B, the critical value is closer (in proportional terms) to the null value $$p_0$$, so smaller deviations push into the critical region.\n+ Intuition: with more data, you can \"see\" smaller signals above the noise.\n\nConsequence: if you want to detect a small effect, you need a large sample. Underpowered studies ($$n$$ too small) often fail to detect real effects.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A researcher finds that $$n = 10$$ trials with $$x = 4$$ successes gives a non-significant result under $$H_0: p = 0.5$$. She argues that $$n = 100$$ trials with $$x = 40$$ successes (same 40%) would also be non-significant. Is she right? (3 steps)", "answer": "- Step 1: No, she's wrong. Sample size fundamentally changes the test outcome even for the same observed proportion.\n- Step 2: Intuition: $$n = 10$$ is very noisy; a sample proportion of 40% is consistent with true $$p = 0.5$$ by chance (1 SD of sampling error). But $$n = 100$$ is much more precise; observing exactly 40% is many SDs away from 50% expected.\n- Step 3: Formally: standardised z-score is $$Z = \\frac{\\hat p - p_0}{\\sqrt{p_0(1-p_0)/n}}$$.\n+ For $$n = 10$$, $$\\hat p = 0.4$$: $$Z = \\frac{0.4 - 0.5}{\\sqrt{0.5 \\times 0.5/10}} \\approx -0.63$$ — small.\n+ For $$n = 100$$, $$\\hat p = 0.4$$: $$Z = \\frac{0.4 - 0.5}{\\sqrt{0.5 \\times 0.5/100}} = -2.0$$ — large, likely significant.\n+ The z-score scales as $$\\sqrt{n}$$ for fixed proportions.\n\nTakeaway: the same sample proportion becomes more significant as $$n$$ grows. Don't confuse \"effect size\" with \"statistical significance\".", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "For $$X \\sim B(50, 0.02)$$ with observation $$x = 4$$, why is the correct test of the \"two-tailed\" version to examine the *upper* tail? (3 steps)", "answer": "- Step 1: Compute the expected value: $$E(X) = np = 50 \\times 0.02 = 1$$.\n- Step 2: The observation $$x = 4$$ is *above* the expected value (4 > 1). In a two-tailed test, the relevant tail is the one consistent with the observed deviation direction.\n- Step 3: So even though 4 sounds like a \"small number\" in absolute terms, relative to the expected value of 1, it's large — four times expected. Compute $$P(X \\geq 4)$$ and compare to $$\\alpha/2$$.\n+ Misconception trap: anchoring on the absolute magnitude of $$x$$ without comparing to $$np_0$$.\n+ Always compare $$x_{\\text{obs}}$$ to the expected value under $$H_0$$, and choose the tail in the direction of deviation.\n\nFor two-tailed tests, \"which tail\" is determined by where $$x$$ lies relative to $$E(X)$$ — not by whether $$x$$ is large or small in absolute terms.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A coin tossed 20 times shows 6 heads. Test at 5% (two-tailed) whether the coin is biased. Walk through the intuition step-by-step. (4 steps)", "answer": "- Step 1: Model: $$X \\sim B(20, 0.5)$$ under $$H_0$$ (fair coin). $$H_0: p = 0.5$$, $$H_1: p \\neq 0.5$$.\n- Step 2: Compare $$x = 6$$ to $$E(X) = np = 10$$. Observation is *below* expectation — compute the lower-tail probability $$P(X \\leq 6)$$.\n- Step 3: For a two-tailed test at 5%, the cutoff per tail is $$\\alpha/2 = 0.025$$. We reject $$H_0$$ if $$P(X \\leq 6 | p = 0.5) < 0.025$$.\n- Step 4: From tables, $$P(X \\leq 6 | p = 0.5) \\approx 0.058$$. Since 0.058 > 0.025, we fail to reject $$H_0$$.\n+ Conclusion in context: \"There is insufficient evidence at the 5% level that the coin is biased.\"\n+ Intuition: with only 20 tosses, a result of 6 heads is quite possible under fairness due to sampling variation.\n\nThe takeaway: intuitively \"unfair-looking\" results (6 out of 20) can still be consistent with fairness when $$n$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "For a two-tailed test, suppose the exact p-value is 0.04. At the 5% level, do you reject? What about at the 2% level? Explain. (3 steps)", "answer": "- Step 1: For a **two-tailed** test, we compare the *single-tail* probability to $$\\alpha/2$$, NOT to $$\\alpha$$. Equivalently, we compare the \"two-tailed p-value\" (the sum of both tail probabilities) to $$\\alpha$$.\n- Step 2: If the problem states \"p-value = 0.04\" and this is the *one-tailed* probability for the observed tail:\n+ Compare 0.04 to $$\\alpha/2$$.\n+ At 5% level: $$\\alpha/2 = 0.025$$. Since 0.04 > 0.025, fail to reject.\n+ At 2% level: $$\\alpha/2 = 0.01$$. Since 0.04 > 0.01, fail to reject.\n- Step 3: If instead the \"two-tailed p-value\" is 0.04 (doubled for two tails):\n+ Compare 0.04 to $$\\alpha$$.\n+ At 5%: 0.04 < 0.05, reject.\n+ At 2%: 0.04 > 0.02, fail to reject.\n\nThe punchline: always clarify whether a reported p-value is one-tailed or two-tailed, and apply the right comparison.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "An exam question mentions \"probability in each tail should be as close as possible to 0.025\" for a two-tailed test. What adjacent values do you check, and how do you decide which gives the critical value?", "answer": "For a discrete distribution, compute cumulative probabilities for consecutive integer values of the test statistic in each tail. At the upper tail, for example, you'd check:\n- $$P(X \\geq k)$$, $$P(X \\geq k+1)$$, $$P(X \\geq k+2)$$, …\n\nYou'll find two consecutive values where 0.025 falls between them — e.g., $$P(X \\geq 18) = 0.028$$ and $$P(X \\geq 19) = 0.015$$. Since $$|0.028 - 0.025| = 0.003 < |0.015 - 0.025| = 0.010$$, the value 18 is *closer* to 0.025, so the critical value is 18, even though 0.028 > 0.025. The actual significance level contribution from this tail is 0.028. Repeat for the lower tail. The total actual significance level is the sum of both tail probabilities, and may exceed the nominal 5% depending on which values are chosen. Always read the question precisely — \"closest\" vs \"less than\" gives different answers.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Explain why the expected number of successes in a binomial experiment is $$np$$ — derive this from first principles. (3 steps)", "answer": "- Step 1: Decompose $$X$$ as the sum of indicator variables: $$X = X_1 + X_2 + \\cdots + X_n$$, where $$X_i = 1$$ if trial $$i$$ is a success, 0 otherwise.\n- Step 2: Each $$X_i$$ is a Bernoulli($$p$$) random variable. Its expectation is:\n$$E(X_i) = 1 \\cdot P(X_i = 1) + 0 \\cdot P(X_i = 0) = p$$\n- Step 3: By linearity of expectation (which holds regardless of dependence):\n$$E(X) = E(X_1) + E(X_2) + \\cdots + E(X_n) = n \\cdot p = np$$\n+ This is why $$np$$ is the natural \"centre\" of the binomial distribution — it's just the sum of individual-trial expectations.\n+ The derivation doesn't require independence; it only requires each trial to have probability $$p$$ of success.\n\nThe result $$E(X) = np$$ is one of the most fundamental facts about binomial distributions, and underlies the entire framework of binomial hypothesis testing.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "During an outbreak, 4% of city population has the flu. A factory of 100 employees has 12 absent claiming flu. Test at 5% whether the factory rate exceeds the city rate. Which distribution and approximation do you use? (4 steps)", "answer": "- Step 1: Model: counting absences in fixed sample size of 100, with each employee independently likely to have flu with $$p = 0.04$$ → binomial. $$X \\sim B(100, 0.04)$$.\n- Step 2: Approximation check: $$n = 100$$ is large, $$p = 0.04$$ is small, $$np = 4$$ is moderate. Ideal conditions for **Poisson approximation**: $$X \\approx \\text{Po}(4)$$.\n+ Normal would be poor because $$p$$ is small and the distribution is skewed.\n- Step 3: Hypotheses: $$H_0: p = 0.04$$ (or equivalently $$\\lambda = 4$$), $$H_1: p > 0.04$$. One-tailed upper.\n- Step 4: Find critical region using Poisson tables for $$\\lambda = 4$$:\n+ $$P(X \\geq 8) = 1 - P(X \\leq 7) \\approx 0.0511$$ (just above 5%).\n+ $$P(X \\geq 9) = 1 - P(X \\leq 8) \\approx 0.0214$$ (below 5%).\n+ So the critical region is $$X \\geq 9$$, and 12 falls inside it.\n+ Conclusion: reject $$H_0$$. Evidence at 5% level that factory has higher flu rate than city average.\n\nUsing Poisson approximation makes this tractable.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Why does the choice of approximation depend fundamentally on the *shape* of the binomial distribution (symmetric vs skewed), rather than just on $$n$$? (3 steps)", "answer": "- Step 1: The normal distribution is symmetric and bell-shaped. Any approximation by a normal assumes the target distribution shares these properties (at least approximately).\n- Step 2: The binomial $$B(n, p)$$:\n+ Is symmetric when $$p = 0.5$$ (for any $$n$$).\n+ Becomes more symmetric and bell-shaped as $$n$$ grows for any fixed $$p$$ (CLT effect).\n+ Is highly right-skewed when $$p$$ is small (peak at 0, long right tail).\n+ Is highly left-skewed when $$p$$ is close to 1.\n- Step 3: So for small $$p$$ (even with large $$n$$), the binomial is skewed → normal approximation would be inaccurate, especially in the tails. Poisson, which is also right-skewed for small $$\\lambda$$, captures the shape well.\n+ Heuristic: $$np > 5$$ AND $$n(1-p) > 5$$ ensures enough symmetry for normal approximation.\n\nThe core issue: approximating requires matching shape, not just first two moments.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Why, intuitively, does the Poisson approximation become exact in the \"rare event in many trials\" limit, but the normal approximation doesn't? (3 steps)", "answer": "- Step 1: The Poisson is specifically designed to model rare events occurring at some rate — it's the natural \"limit\" of counting rare events over many opportunities. Its probability mass is concentrated near 0 with a long right tail.\n- Step 2: The normal is designed to model the sum of many *additive, roughly equal contributions* — it requires each individual contribution to be relatively small *on its own scale* (not compared to zero).\n- Step 3: In the rare-event limit ($$n$$ large, $$p$$ small, $$np = \\lambda$$ fixed):\n+ Each trial contributes either 0 (likely) or 1 (rare), and the sum has a distinctive skewed shape (mostly 0s, occasional 1s).\n+ This is the Poisson shape exactly.\n+ The normal would try to fit a symmetric bell curve, which doesn't match.\n\nSo Poisson approximation matches the *nature* of rare-event processes; normal approximation matches bulk averaging of many moderate-sized contributions.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "When would you prefer normal approximation over Poisson approximation for a binomial test, even if both are technically valid? (3 steps)", "answer": "- Step 1: Both approximations can be valid when $$n$$ is large, $$p$$ is moderate (say 0.05-0.1), and $$np$$ is small (say 5-10). The choice depends on computational convenience.\n- Step 2: Prefer **normal approximation** when:\n+ You have access to normal tables and can use z-scores easily.\n+ The question involves further manipulations (e.g., combining with other normal variables).\n+ Large-sample results are needed without needing to look up specific $$\\lambda$$.\n- Step 3: Prefer **Poisson approximation** when:\n+ $$p$$ is very small (e.g., < 0.05) making the distribution quite skewed.\n+ $$np$$ is moderate (say 2-10) and fits the cumulative Poisson table well.\n+ You want to avoid the complications of continuity correction.\n+ The question explicitly gives you Poisson tables.\n\nIn exams, check: which tables are provided? How skewed is the distribution? What does the question hint at?", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Why do we never conclude \"$$H_0$$ is true\" or \"the population is fair\" based on a non-significant test — even if the p-value is very large? (3 steps)", "answer": "- Step 1: A hypothesis test can only provide evidence *against* $$H_0$$ (by rejecting) or fail to provide such evidence (by not rejecting). It cannot confirm $$H_0$$ positively.\n- Step 2: Many different true parameter values would give non-significant results. For example, $$p = 0.48, p = 0.50, p = 0.52$$ might all give similar-looking data for small samples. A non-rejection doesn't pick out $$p = 0.5$$ specifically.\n- Step 3: To \"confirm\" $$H_0$$, you'd need infinite sample size to rule out all possible deviations. With finite data, you can only say \"the deviations from $$H_0$$ consistent with these data include $$H_0$$ itself\" — which is much weaker than \"$$H_0$$ is true\".\n+ Proper phrasing: \"We fail to reject $$H_0$$\" or \"there is insufficient evidence to reject $$H_0$$\".\n+ Never: \"we conclude the coin is fair\" or \"the claim is confirmed\".\n\nThe asymmetry is fundamental to the logic of testing.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Explain why conducting multiple hypothesis tests on the same dataset inflates the overall false-alarm rate — and how this relates to the 5% significance level. (3 steps)", "answer": "- Step 1: A single test at 5% has a 5% chance of false rejection *in isolation*. If we run many tests, the probability of at least one false rejection grows.\n- Step 2: Specifically, if you run $$k$$ independent tests at 5% each, the probability of no false alarms is $$(1 - 0.05)^k = 0.95^k$$.\n+ For $$k = 10$$ tests: $$0.95^{10} \\approx 0.60$$, so ~40% chance of at least one false alarm.\n+ For $$k = 100$$ tests: $$\\approx 0.60^{20} \\approx 0.006$$, so ~99% chance of at least one false alarm.\n- Step 3: This is why multiple-comparison corrections (like Bonferroni) are used in practice — they lower the per-test $$\\alpha$$ so the total error rate stays at 5%.\n+ In research contexts, running many tests and cherry-picking \"significant\" ones is a form of p-hacking.\n+ The 5% guarantee only holds for a single, pre-specified test.\n\nTakeaway: significance at 5% is meaningful only in the context of a single test, not \"the best of many\".", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "How does the structure of a one-tailed test for $$H_1: \\lambda < \\lambda_0$$ (Poisson, lower-tail) differ from the upper-tail version? (3 steps)", "answer": "- Step 1: The rejection direction is reversed. We reject $$H_0$$ if the observed count is *too low* — specifically, if $$P(X \\leq x_{\\text{obs}} | H_0) < \\alpha$$.\n- Step 2: Finding the critical region: start from 0 and go up until the cumulative probability exceeds $$\\alpha$$. The largest value $$c$$ with $$P(X \\leq c | H_0) \\leq \\alpha$$ is the critical value. The critical region is $$\\{0, 1, \\ldots, c\\}$$.\n- Step 3: In practice:\n+ Compute $$P(X \\leq 0), P(X \\leq 1), P(X \\leq 2), \\ldots$$ until you find two consecutive values that straddle $$\\alpha$$.\n+ The largest value for which cumulative is ≤ $$\\alpha$$ is your critical value.\n+ Reject if observed value is ≤ critical value.\n\nThe upper-tail and lower-tail logics are mirror images; the procedure is identical, only the direction changes.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "A study finds $$P(X \\leq 1) = 0.165$$ under $$H_0$$, and they fail to reject $$H_0$$ at 5%. Why doesn't this mean \"the rate is 3.25\" (the null value)? (3 steps)", "answer": "- Step 1: A non-rejection means the observed data is consistent with $$H_0$$. But it's also consistent with many other nearby parameter values — e.g., $$\\lambda = 2.5$$ or $$\\lambda = 4.0$$ might also have given non-rejection with this data.\n- Step 2: In fact, any parameter in a \"confidence interval\" around the observed value would have led to non-rejection. A single test doesn't uniquely identify a parameter value.\n- Step 3: So all we know is:\n+ The data *fails to discredit* $$H_0$$ at the 5% level.\n+ The parameter *could be* 3.25, but could also be other values nearby.\n+ We haven't established what the true rate actually is.\n+ To pin down the parameter, we'd need estimation (confidence intervals), not testing.\n\nHypothesis testing and parameter estimation serve different goals; failing to reject does not constitute estimation.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "At a seedling nursery, 12 out of 40 seedlings typically survive. A gardener tests if a new fertiliser improves survival at 10% significance. Describe the test setup conceptually. (4 steps)", "answer": "- Step 1: Model: each of 40 seedlings independently survives with some probability $$p$$ → binomial. $$X \\sim B(40, p)$$ where $$X$$ = number surviving.\n- Step 2: Hypotheses: \n+ $$H_0: p = 12/40 = 0.3$$ (current success rate).\n+ $$H_1: p > 0.3$$ (fertiliser improves survival).\n+ One-tailed upper.\n- Step 3: Find critical region at 10%:\n+ Need smallest $$c$$ with $$P(X \\geq c | p = 0.3) \\leq 0.10$$.\n+ From tables, $$P(X \\leq 15) = 0.8246$$, so $$P(X \\geq 16) = 0.1754$$ — too large.\n+ $$P(X \\leq 16) = 0.8974$$, so $$P(X \\geq 17) = 0.1026$$ — still just above 10%.\n+ $$P(X \\leq 17) = 0.9432$$, so $$P(X \\geq 18) = 0.0568$$ — below 10%.\n+ Critical region: $$X \\geq 18$$.\n- Step 4: Decision: if observed number of survivors is ≥ 18, reject $$H_0$$. Otherwise, fail to reject.\n+ Conclude in context: \"sufficient/insufficient evidence at 10% level that the fertiliser improves survival.\"\n\nThe 10% level is more generous, so smaller improvements are detectable.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "A two-tailed Poisson test under $$H_0: \\lambda = 6.5$$ at 5% level has critical region $$\\{X \\leq 1\\} \\cup \\{X \\geq 12\\}$$, with actual significance level 4.5%. Why is 4.5% (not 5%) the \"true\" Type I error rate? (3 steps)", "answer": "- Step 1: The actual significance level is the probability that the test statistic falls in the critical region *given $$H_0$$ is true*. This is the true probability of a false rejection.\n- Step 2: Computed as: $$P(X \\leq 1) + P(X \\geq 12)$$ under $$\\text{Po}(6.5)$$. If this sum is 4.5%, that's exactly the Type I error rate.\n- Step 3: The nominal 5% is the *target* — what we wanted. The actual 4.5% is what the discrete distribution allows us to achieve. Because discrete tails jump in chunks, we can't always land on the target exactly.\n+ In repeated application: if we did this test many times with $$H_0$$ actually true, we'd falsely reject ~4.5% of the time, not 5%.\n+ The test is slightly *conservative*: it falsely rejects less often than nominal.\n\nAlways state the actual significance level, not just the nominal one.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Using Poisson approximation for $$B(2000, 0.003)$$, what are the approximate values to use for the approximating Poisson, and why is this approximation appropriate? (3 steps)", "answer": "- Step 1: Check conditions: $$n = 2000$$ is very large; $$p = 0.003$$ is very small; $$np = 6$$ is moderate. This is the classic rare-events-in-many-trials setting.\n- Step 2: Approximation: $$X \\sim B(2000, 0.003) \\approx \\text{Po}(np) = \\text{Po}(6)$$.\n+ Mean of approximation: $$E(X) \\approx \\lambda = 6$$ (matches exact binomial mean).\n+ Variance of approximation: $$\\text{Var}(X) \\approx \\lambda = 6$$ (approximates $$np(1-p) = 6 \\times 0.997 \\approx 5.98$$, essentially equal).\n- Step 3: Why appropriate:\n+ $$p$$ is much less than 0.1 → Poisson is accurate.\n+ $$\\lambda = 6$$ fits within standard Poisson tables.\n+ Alternative exact binomial computation with $$n = 2000$$ is impractical by hand.\n\nSo use $$\\text{Po}(6)$$ for all further tail-probability calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Explain how to construct a decision tree for choosing the right distribution and approximation given sample data. (4 steps)", "answer": "- Step 1: **Type of data**:\n+ Fixed number of trials with binary outcomes → binomial.\n+ Counts of events in continuous time/space → Poisson.\n- Step 2: **Parameters**:\n+ Binomial: note $$n$$ and $$p$$.\n+ Poisson: note $$\\lambda$$ for observation window (scale appropriately).\n- Step 3: **Approximation needed?**\n+ Binomial with small $$n$$ or exact tables available → use exact.\n+ Binomial with large $$n$$, small $$p$$ (rare events): Poisson with $$\\lambda = np$$.\n+ Binomial with large $$n$$, $$p$$ near 0.5 ($$np, n(1-p) > 5$$): normal with $$N(np, np(1-p))$$.\n+ Poisson with small $$\\lambda$$: exact Poisson (tables go up to ~10).\n+ Poisson with large $$\\lambda$$ (> 10): normal with $$N(\\lambda, \\lambda)$$.\n- Step 4: **Apply continuity correction** if approximating discrete by normal.\n\nThis tree covers all scenarios in the chapter.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "In a sample of 5 tea-drinkers, 4 prefer Sunshine Tea and the company claims this shows superiority. Conceptually test at 5%. (4 steps)", "answer": "- Step 1: Model: 5 independent people, each preferring Sunshine with some probability $$p$$ → $$X \\sim B(5, p)$$.\n- Step 2: Hypotheses: $$H_0: p = 0.5$$ (no preference — equally likely to pick either brand), $$H_1: p > 0.5$$ (preference for Sunshine). One-tailed upper.\n- Step 3: Compute p-value: $$P(X \\geq 4 | p = 0.5) = P(X = 4) + P(X = 5)$$. From the binomial table with $$n = 5, p = 0.5$$:\n+ $$P(X \\leq 3) = 0.8125$$, so $$P(X \\geq 4) = 0.1875$$.\n- Step 4: Compare: $$0.1875 > 0.05$$, so fail to reject $$H_0$$.\n+ Conclusion: insufficient evidence at 5% level that Sunshine Tea is preferred. The sample size is too small — 4/5 preferring Sunshine is entirely consistent with no preference by sampling variability.\n+ Lesson: tiny samples give low power. A \"4 out of 5\" result sounds impressive but doesn't provide statistical evidence.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "A record store's national average is 30% of cars fail a brake test. A garage randomly tests 10 cars, finding 2 failures. Test at 5% whether this garage's failure rate is lower. Describe the conceptual reasoning. (4 steps)", "answer": "- Step 1: Model: each of 10 cars independently fails with probability $$p$$ → $$X \\sim B(10, p)$$. Binomial assumptions (fixed $$n$$, independent trials, two outcomes, constant $$p$$) are reasonable for a random sample.\n- Step 2: Hypotheses: $$H_0: p = 0.3$$, $$H_1: p < 0.3$$ (one-tailed lower, testing for reduction).\n- Step 3: Compute p-value: $$P(X \\leq 2 | p = 0.3)$$. From binomial table ($$n = 10, p = 0.3$$):\n+ $$P(X \\leq 2) = 0.3828$$ (about 38%).\n- Step 4: Compare: $$0.3828 > 0.05$$, so fail to reject $$H_0$$.\n+ Conclusion: insufficient evidence at 5% level that this garage's failure rate is below the national average.\n+ Context: with 10 cars, observing 2 failures (20%) vs expected 3 is not statistically distinguishable. Need much more data to detect such a small proportional difference.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why might a \"small\" observed proportion (like 20% vs expected 30%) be statistically non-significant with $$n = 10$$ but highly significant with $$n = 1000$$? (3 steps)", "answer": "- Step 1: Statistical significance depends on the *standardised* distance between observed and expected, not just the raw difference. This standardisation factors in the sampling noise (standard error).\n- Step 2: Standard error scales as $$\\sqrt{p(1-p)/n}$$, which decreases as $$n$$ increases. So for a fixed proportional difference, the z-score scales as $$\\sqrt{n}$$.\n+ For $$n = 10$$: SE $$\\approx 0.145$$. A 10 percentage-point difference is ~0.7 SE — not extreme.\n+ For $$n = 1000$$: SE $$\\approx 0.0145$$. Same 10 percentage-point difference is ~7 SE — extremely extreme.\n- Step 3: Interpretation:\n+ Small samples are noisy — most differences look unsurprising.\n+ Large samples have tight sampling distributions — even small differences stand out.\n+ This is why \"statistical significance\" ≠ \"practical significance\"; a tiny effect can be highly significant with enough data.\n\nEffect size and significance are distinct concepts; both matter for decision-making.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "An election poll of 50 people finds 28 support a candidate; prior polls suggested 35% support. Test at 5% if support has increased. Describe conceptually. (4 steps)", "answer": "- Step 1: Model: 50 independent voters each supporting with probability $$p$$ → $$X \\sim B(50, p)$$. Binomial assumptions OK for random sample.\n- Step 2: Hypotheses: $$H_0: p = 0.35$$, $$H_1: p > 0.35$$. One-tailed upper.\n- Step 3: Check if normal approximation is valid: $$n = 50$$ is not huge but $$np = 17.5$$ and $$n(1-p) = 32.5$$ both > 5 → normal approximation acceptable. Alternatively use exact binomial tables.\n+ Approximation: $$W \\sim N(17.5, 11.375)$$.\n+ Compute $$P(X \\geq 28) \\approx P(W \\geq 27.5)$$ (continuity correction).\n+ Standardise: $$Z \\approx (27.5 - 17.5)/\\sqrt{11.375} \\approx 2.96$$.\n+ Tail probability: $$P(Z \\geq 2.96) \\approx 0.0015$$.\n- Step 4: Compare: $$0.0015 < 0.05$$, reject $$H_0$$.\n+ Conclusion: strong evidence at 5% level that support has increased beyond 35%.\n+ Observation of 28/50 = 56% vs 35% expected is a large deviation, highly significant.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "A water treatment filter should extract 75% of dirt. Starting at 10 particles/litre, the expected residual should be 2.5 particles/litre. A study on 20 litres finds 64 particles. Test at 5% whether the filter is failing. (4 steps)", "answer": "- Step 1: Expected rate after filter: $$10 \\times 0.25 = 2.5$$ particles/litre (if working correctly). Over 20 litres, expected count is $$2.5 \\times 20 = 50$$.\n- Step 2: Model: Poisson (counts in a continuous medium). Under $$H_0$$ (filter working), $$Y \\sim \\text{Po}(50)$$.\n+ $$\\lambda = 50$$ is large, so use normal approximation: $$W \\sim N(50, 50)$$.\n- Step 3: Hypotheses: $$H_0: \\lambda = 50$$, $$H_1: \\lambda > 50$$ (filter failing means *more* particles than expected). One-tailed upper.\n+ Compute $$P(Y \\geq 64) \\approx P(W \\geq 63.5)$$ (continuity correction).\n+ Standardise: $$Z \\geq (63.5 - 50)/\\sqrt{50} \\approx 1.91$$.\n+ Tail probability: $$P(Z \\geq 1.91) \\approx 0.028$$.\n- Step 4: Compare: $$0.028 < 0.05$$, reject $$H_0$$.\n+ Conclusion: evidence at 5% level that the filter is failing to extract dirt properly.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "In a manufacturing plant, 6% of plates typically have flaws. A new sample of 150 plates has 15 flawed. Test at 5% if the process is getting worse. Explain the full test setup. (4 steps)", "answer": "- Step 1: Model: $$X \\sim B(150, p)$$ where $$p$$ = probability of flaw.\n- Step 2: Approximation check: $$n = 150$$ is large; $$p = 0.06$$ is small. $$np = 9$$. This is the \"large $$n$$, small $$p$$\" regime → Poisson approximation: $$X \\approx \\text{Po}(9)$$.\n- Step 3: Hypotheses: $$H_0: p = 0.06$$ (or $$\\lambda = 9$$), $$H_1: p > 0.06$$ (process worse, more flaws). One-tailed upper.\n+ Compute $$P(X \\geq 15) = 1 - P(X \\leq 14)$$ under $$\\text{Po}(9)$$.\n+ From Poisson table: $$P(X \\leq 14) = 0.9585$$, so $$P(X \\geq 15) = 0.0415$$.\n- Step 4: Compare: $$0.0415 < 0.05$$, reject $$H_0$$.\n+ Conclusion: evidence at 5% level that the manufacturing process is getting worse (more flaws than usual).\n+ Note: could also check if normal approximation would work — $$np = 9$$, $$n(1-p) = 141$$, both > 5. Either approximation could work here, but Poisson is cleaner for these parameters.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "A standard blood test is 96% accurate. A cheaper test is claimed to be equally accurate; a trial on 75 patients correctly identified 63. Test at 10% (two-tailed) whether the new test has the same accuracy. Discuss the setup. (4 steps)", "answer": "- Step 1: Model: each of 75 patients correctly identified with probability $$p$$ → $$X \\sim B(75, p)$$.\n+ Here we're testing the manufacturer's *claim* that $$p = 0.96$$, so the null is the claim.\n- Step 2: Hypotheses: $$H_0: p = 0.96$$, $$H_1: p \\neq 0.96$$. Two-tailed.\n- Step 3: Check approximation: $$np = 72$$, $$n(1-p) = 3$$. Since $$n(1-p) < 5$$, normal approximation is questionable on the failure side.\n+ Alternative: Poisson approximation for failures — $$Y = 75 - X$$ = number of incorrect diagnoses under $$H_0: \\lambda = 3$$. With $$x_{\\text{obs}} = 63$$ correct, we have 12 incorrect.\n+ Test under Poisson: $$P(Y \\geq 12 | \\lambda = 3)$$ — this is extremely small.\n- Step 4: Decision:\n+ Observed 12 failures vs 3 expected under null — a huge deviation.\n+ At 10% two-tailed, $$\\alpha/2 = 0.05$$. Tail probability for 12 failures under $$\\text{Po}(3)$$ is virtually 0.\n+ Reject $$H_0$$. Conclusion: evidence at 10% level that the new test is less accurate than claimed.\n\nThe key is reframing in terms of failures to use Poisson approximation cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "In a Poisson hypothesis test at 5%, you find both tail probabilities under $$H_0$$ exceed 0.025 — so no clean two-tailed critical region fits within 5%. What do you do? (3 steps)", "answer": "- Step 1: This happens when the discrete distribution has sparse probability mass — the jumps between consecutive tail probabilities are large.\n- Step 2: The exam convention (depending on wording):\n+ \"Closest to 0.025\" → pick the value where each tail is closest, even if sum exceeds 5%.\n+ \"Less than 0.025\" per tail → may give very small tail probabilities.\n+ Sometimes a critical region has one or both tails being EMPTY if probability is too small.\n- Step 3: Compute the actual significance level explicitly (sum of tail probabilities actually achieved), and report it. This may be well below 5% (say 3.2%) — the test is conservative.\n+ In rare cases with small $$\\lambda$$, the lower tail may not exist (only $$P(X \\leq 0)$$ may be > 0.025).\n\nAlways clearly state what critical region you're using and what the actual significance level is.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "A retail manager claims 20% of workers are absent at least once per month. A sample of 100 workers finds only 2 were absent at least once last month. Test at 5% whether this rate is lower than claimed. (4 steps)", "answer": "- Step 1: Model: $$X \\sim B(100, p)$$, where $$p$$ is the probability a random worker is absent ≥ 1 day.\n- Step 2: Check approximation: $$n = 100$$, $$p = 0.2$$. Under $$H_0$$, $$np = 20$$, $$n(1-p) = 80$$ — both ≫ 5. Normal OR Poisson could work; Poisson less ideal because $$p$$ is not that small. Normal approximation: $$W \\sim N(20, 16)$$.\n+ Alternatively, since the question likely wants Poisson: treat $$X \\approx \\text{Po}(np) = \\text{Po}(20)$$ — but 20 is large, so use normal approximation to Poisson: $$W \\sim N(20, 20)$$.\n- Step 3: Hypotheses: $$H_0: p = 0.2$$, $$H_1: p < 0.2$$. One-tailed lower.\n+ Compute $$P(X \\leq 2) \\approx P(W \\leq 2.5)$$ (using $$W \\sim N(20, 16)$$, continuity correction).\n+ Standardise: $$Z \\leq (2.5 - 20)/4 = -4.375$$.\n+ $$P(Z \\leq -4.375) \\approx 0$$ (essentially zero).\n- Step 4: Compare: $$0 < 0.05$$, reject $$H_0$$.\n+ Conclusion: very strong evidence at 5% level that the true absence rate is lower than 20%. Only 2 out of 100 is an enormous deviation from the expected 20.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "What is the fundamental reason the binomial and Poisson distributions are treated so similarly for hypothesis testing — despite modelling different phenomena? (3 steps)", "answer": "- Step 1: Both are **discrete probability distributions** with a single parameter controlling their shape. Both accept positive integer counts. Both have exact cumulative distribution functions that can be tabulated.\n- Step 2: The hypothesis testing framework only requires:\n+ Ability to compute $$P(X \\leq x)$$ and $$P(X \\geq x)$$ under $$H_0$$.\n+ A test statistic from the distribution.\n+ A decision rule based on tail probabilities.\n- Step 3: Both binomial and Poisson satisfy these requirements. The computational details (which distribution, which parameter, which scaling) differ, but the logical structure is identical.\n+ Similar tests would work for any other discrete distribution (e.g., geometric, negative binomial) by the same framework.\n+ What changes: the specific tables used and how to match the parameter to the sampling setup.\n\nThe framework is a general procedure; distributions are just the engines.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "If you were designing a new hypothesis test from scratch for a novel distribution, what would be the essential ingredients you'd need to define? (5 steps)", "answer": "- Step 1: **A statistic**: a function of the sample with a known distribution under $$H_0$$. Must be sensitive to deviations from $$H_0$$.\n- Step 2: **A null distribution**: the exact probability distribution of the statistic when $$H_0$$ is true. This is what you'd compute probabilities from.\n- Step 3: **A direction**: based on the research question, specify $$H_1$$ and whether extreme values go in one tail or both.\n- Step 4: **A significance level $$\\alpha$$**: the acceptable false-alarm rate. Determines where you cut the tail(s).\n- Step 5: **A decision rule**: if test statistic is in critical region (or p-value < $$\\alpha$$), reject $$H_0$$.\n+ Properties: the rule must be pre-specified (before data collection), and the test must be reported honestly (including non-rejections and full context).\n\nThis skeleton applies to any test — binomial, Poisson, normal, or beyond.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Summarise in one concise paragraph the overarching philosophy of the chapter — what is hypothesis testing *really about*?", "answer": "Hypothesis testing is a statistical procedure for making decisions about populations based on sample data. We assume a \"status quo\" ($$H_0$$) as the default, then check how surprising our observation is under that assumption. If the observation is extreme enough that we'd see it less than $$\\alpha$$% of the time under $$H_0$$ (the significance level), we reject $$H_0$$ in favour of an alternative ($$H_1$$). The procedure is asymmetric: we can only \"reject\" or \"fail to reject\" $$H_0$$ — we never prove it true. The choice of distribution (binomial for fixed trials, Poisson for rates of rare events) and approximations (normal, Poisson) depends on the data's structure. Essential principles: pre-specify the direction of $$H_1$$, use $$\\alpha/2$$ per tail for two-tailed tests, apply continuity correction when approximating discrete by continuous, and always interpret results in the context of the original research question. The test is not a tool for proving anything — it's a disciplined way to quantify how strong the evidence is against a specific claim, while controlling the rate of false alarms.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}], "count": 68}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 38294, "out_tokens": 12104, "reasoning_chars": 21126, "cost_eur": 0.076, "elapsed_s": 548, "content_chars": 22709}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 38294, "out_tokens": 17977, "reasoning_chars": 41647, "cost_eur": 0.0949, "elapsed_s": 150, "content_chars": 21505}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 38294, "out_tokens": let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
