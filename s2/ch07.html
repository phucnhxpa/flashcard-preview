<script>
const DATA={"selected": [{"question": "Why is the test statistic’s distribution (e.g., B(n, p)) central to hypothesis testing?", "answer": "- Step 1: The distribution (e.g., binomial) under H₀ allows calculating P(X = x), which is needed to find critical regions.  \n- Step 2: Without the distribution, we can’t compute probabilities to assess the test statistic’s extremity.  \n- Step 3: Example: For X ~ B(20, 0.4), P(X ≥ 11) = 0.1275 > 0.05, so H₀ is not rejected.  \n\n**Takeaway:** The distribution is the foundation for probability calculations in hypothesis testing.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "State the roles of $$H_0$$ and $$H_1$$ in a hypothesis test, and explain the asymmetry between them. (3 steps)", "answer": "- Step 1: $$H_0$$ (null hypothesis) is the hypothesis we **assume to be correct** for the purposes of the test. It must specify a single value, e.g. $$H_0: p = 0.4$$, so the distribution is fully determined.\n- Step 2: $$H_1$$ (alternative hypothesis) describes what we suspect **if the assumption turns out wrong**. It takes the form $$p < \\ldots$$, $$p > \\ldots$$, or $$p \\neq \\ldots$$ — never a single value.\n- Step 3: The asymmetry is deliberate: $$H_0$$ is the \"status quo\" and enjoys protection. We only abandon it if the data strongly contradict it. This protects us from over-claiming — we don't switch to $$H_1$$ on flimsy evidence.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why is a test statistic used in hypothesis testing, and how is it related to the population parameter?", "answer": "- Step 1: A **test statistic** is a value calculated from the sample (e.g., number of successes in a binomial experiment). It quantifies the outcome of the experiment.  \n- Step 2: The test statistic is modeled using a distribution (e.g., X ~ B(n, p) for binomial or X ~ Po(λ) for Poisson) under the assumption that H₀ is true.  \n- Step 3: By comparing the observed test statistic to its expected distribution under H₀, we determine how \"extreme\" the result is. Extreme values (in the critical region) lead to rejecting H₀.  \n\n**Takeaway:** The test statistic links sample data to population parameters, enabling inference.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "Two hypothesis tests share the same data structure and significance level, but Test A has $$n = 20$$ and Test B has $$n = 200$$. Which is more likely to correctly detect a real deviation from $$H_0$$? Why? (3 steps)", "answer": "- Step 1: Both tests have the same false-alarm rate (5%), so this isn't about Type I errors — it's about *power* (the ability to detect real effects, i.e., reject $$H_0$$ when $$H_1$$ is true).\n- Step 2: Larger sample sizes give tighter sampling distributions — the test statistic is less variable under any fixed parameter value. The standard error scales as $$1/\\sqrt{n}$$.\n- Step 3: So Test B (with $$n = 200$$) is more powerful — same $$\\alpha$$, but smaller effects become detectable.\n+ Equivalently: in Test B, the critical value is closer (in proportional terms) to the null value $$p_0$$, so smaller deviations push into the critical region.\n+ Intuition: with more data, you can \"see\" smaller signals above the noise.\n\nConsequence: if you want to detect a small effect, you need a large sample. Underpowered studies ($$n$$ too small) often fail to detect real effects.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "A doctor's new drug cures 11 of 20 patients; the old drug cures 40%. Why does testing at 5% with $$H_1: p > 0.4$$ fail to reject $$H_0$$, even though 11/20 = 55% seems better than 40%? (4 steps)", "answer": "- Step 1: Under $$H_0: p = 0.4$$ with $$n = 20$$, the expected number cured is $$20 \\times 0.4 = 8$$. So seeing 11 is 3 above expected.\n- Step 2: But binomial distributions have natural variability. $$P(X \\geq 11 \\mid p = 0.4) \\approx 0.128$$ — there's roughly a 13% chance of seeing 11 or more cures purely by chance even if the drug is no better.\n- Step 3: 13% is greater than our 5% threshold, so this result isn't extraordinary enough under $$H_0$$.\n- Step 4: Lesson: small samples have wide natural variation. To be confident the drug is genuinely better, we'd need either a much larger sample or a much more extreme result. \"Looks better\" isn't the same as \"statistically significant.\"\n\n+ With $$n = 200$$, seeing 110 out of 200 (same proportion) would be far more convincing because the spread of the distribution scales with $$\\sqrt{n}$$, so the signal-to-noise ratio improves.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Isabelle tests a coin for bias by tossing it 100 times. She claims her test statistic is \"the probability of the coin landing on heads.\" Identify the conceptual mistake in her claim and state what the correct test statistic should be. (2 steps)", "answer": "- Step 1: The mistake is confusing the population parameter with the test statistic. The probability $$p$$ is a fixed but unknown population parameter; it is not a value calculated from the sample. We cannot observe $$p$$ directly.\n- Step 2: The correct test statistic is the number of heads observed in the 100 tosses (or the proportion of heads in the sample). This is the random variable whose probability distribution we can model (e.g., $$X \\sim B(100, p)$$), and its observed value from the experiment is what we use to test the hypothesis.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "For a two-tailed binomial test with n = 20, p = 0.4 at 5% significance, the lower critical value is found to be 4 and upper is 15. Write down the critical region, acceptance region, and explain what each means in context. (3 steps)", "answer": "- Step 1: Critical region: X ≤ 4 OR X ≥ 15 (i.e., extremely low or extremely high counts lead to rejection)\n- Step 2: Acceptance region: 5 ≤ X ≤ 14 (values in between are consistent with p = 0.4)\n- Step 3: If we observe 3 successes, we'd reject H₀ (evidence p < 0.4); if we observe 16, we'd reject (evidence p > 0.4). If we observe 8, we'd not reject (insufficient evidence of change either way).", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "When conducting a two-tailed test, why do we divide the significance level by 2 for each tail? What would happen if we didn't do this? (2 steps)", "answer": "- Step 1: We divide the significance level by 2 because we now have two separate critical regions—one in each tail of the distribution. Each tail must have a probability of approximately α/2 to ensure that the total probability of rejecting H₀ (when it's true) remains at our chosen significance level α.\n\n- Step 2: If we didn't divide the significance level, we'd have a test with an actual significance level of approximately 2α rather than α. For example, using 10% total in a two-tailed test (5% in each tail) gives us an actual significance level close to 10%. Using 10% in each tail would give us an actual significance level near 20%, which is too high.", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "For a two-tailed test, suppose the exact p-value is 0.04. At the 5% level, do you reject? What about at the 2% level? Explain. (3 steps)", "answer": "- Step 1: For a **two-tailed** test, we compare the *single-tail* probability to $$\\alpha/2$$, NOT to $$\\alpha$$. Equivalently, we compare the \"two-tailed p-value\" (the sum of both tail probabilities) to $$\\alpha$$.\n- Step 2: If the problem states \"p-value = 0.04\" and this is the *one-tailed* probability for the observed tail:\n+ Compare 0.04 to $$\\alpha/2$$.\n+ At 5% level: $$\\alpha/2 = 0.025$$. Since 0.04 > 0.025, fail to reject.\n+ At 2% level: $$\\alpha/2 = 0.01$$. Since 0.04 > 0.01, fail to reject.\n- Step 3: If instead the \"two-tailed p-value\" is 0.04 (doubled for two tails):\n+ Compare 0.04 to $$\\alpha$$.\n+ At 5%: 0.04 < 0.05, reject.\n+ At 2%: 0.04 > 0.02, fail to reject.\n\nThe punchline: always clarify whether a reported p-value is one-tailed or two-tailed, and apply the right comparison.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Why, intuitively, does the Poisson approximation become exact in the \"rare event in many trials\" limit, but the normal approximation doesn't? (3 steps)", "answer": "- Step 1: The Poisson is specifically designed to model rare events occurring at some rate — it's the natural \"limit\" of counting rare events over many opportunities. Its probability mass is concentrated near 0 with a long right tail.\n- Step 2: The normal is designed to model the sum of many *additive, roughly equal contributions* — it requires each individual contribution to be relatively small *on its own scale* (not compared to zero).\n- Step 3: In the rare-event limit ($$n$$ large, $$p$$ small, $$np = \\lambda$$ fixed):\n+ Each trial contributes either 0 (likely) or 1 (rare), and the sum has a distinctive skewed shape (mostly 0s, occasional 1s).\n+ This is the Poisson shape exactly.\n+ The normal would try to fit a symmetric bell curve, which doesn't match.\n\nSo Poisson approximation matches the *nature* of rare-event processes; normal approximation matches bulk averaging of many moderate-sized contributions.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why does hypothesis testing with a Poisson distribution follow the same structure as with a binomial distribution, even though the underlying models are different? (3 steps)", "answer": "- Step 1: Both binomial and Poisson are *discrete probability distributions*. The structural logic of hypothesis testing (null, alternative, critical region, significance level, rejection rule) is independent of the specific distribution used.\n- Step 2: The only differences are:\n+ The distribution of the test statistic ($$B(n, p_0)$$ vs $$\\text{Po}(\\lambda_0)$$).\n+ The parameter being tested ($$p$$ vs $$\\lambda$$).\n+ The expected value ($$np$$ vs $$\\lambda$$).\n- Step 3: Everything else transfers directly:\n+ Critical regions are found the same way — find the smallest (or largest) value where the tail probability ≤ $$\\alpha$$.\n+ One-tailed vs two-tailed works identically.\n+ The actual significance level is the true probability of falling in the critical region.\n\nThe conceptual framework is universal; only the computational model changes.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "When using a Normal distribution to approximate a Binomial or Poisson distribution for a hypothesis test, why must a continuity correction be applied? If testing $$P(X \\geq 10)$$, what value do you use in the Normal calculation? (2 steps)", "answer": "- Step 1: The Normal distribution is continuous, while Binomial and Poisson distributions are discrete. A continuity correction adjusts for the fact that discrete probabilities are concentrated at integer points, while continuous probabilities are spread over intervals.\n- Step 2: To calculate $$P(X \\geq 10)$$ for a discrete variable, we must include the probability of exactly 10. In the continuous Normal approximation, this corresponds to starting just below 10, so we calculate $$P(W \\geq 9.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "What is the difference between statistical significance and practical significance? Can a result be statistically significant but not practically significant? (2 steps)", "answer": "- Step 1: Statistical significance tells us whether an observed effect is likely due to something real (not just chance). Practical significance asks whether the effect is large enough to matter in the real world.\n- Step 2: Yes, with large samples, tiny effects can be statistically significant (even with p < 0.001) but have no practical importance. For example, a new drug that improves recovery from 80.0% to 80.1% might be \"significant\" with 10,000 patients but the 0.1% improvement is clinically meaningless. Always consider both.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "In hypothesis testing, why do we begin by *assuming* something we might actually want to disprove? What is the underlying logic of this \"prove by contradiction under probability\"? (3 steps)", "answer": "- Step 1: We cannot observe an entire population — only a sample. The sample produces a test statistic that will vary from sample to sample, even if our beliefs about the population are correct. So we need a framework for deciding when the deviation is \"too large\" to be chance.\n- Step 2: We assume a specific value of the parameter ($$H_0$$) so that we can fix a probability distribution. Without a specific value, we couldn't compute $$P(X = x)$$ or $$P(X \\geq x)$$ because the distribution wouldn't be determined.\n- Step 3: We then ask: \"given $$H_0$$ is true, how surprising is my observation?\" If the observation is extremely unlikely under $$H_0$$, we reject $$H_0$$ as being inconsistent with the data.\n+ The test never \"proves\" $$H_1$$ — it shows $$H_0$$ is inconsistent with what we saw.\n+ This is analogous to proof by contradiction in mathematics, but with a probability cutoff rather than strict logical contradiction.\n\nThe key insight: the asymmetry (assume $$H_0$$, test for contradiction) is what makes calculation possible.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Using Poisson approximation for $$B(2000, 0.003)$$, what are the approximate values to use for the approximating Poisson, and why is this approximation appropriate? (3 steps)", "answer": "- Step 1: Check conditions: $$n = 2000$$ is very large; $$p = 0.003$$ is very small; $$np = 6$$ is moderate. This is the classic rare-events-in-many-trials setting.\n- Step 2: Approximation: $$X \\sim B(2000, 0.003) \\approx \\text{Po}(np) = \\text{Po}(6)$$.\n+ Mean of approximation: $$E(X) \\approx \\lambda = 6$$ (matches exact binomial mean).\n+ Variance of approximation: $$\\text{Var}(X) \\approx \\lambda = 6$$ (approximates $$np(1-p) = 6 \\times 0.997 \\approx 5.98$$, essentially equal).\n- Step 3: Why appropriate:\n+ $$p$$ is much less than 0.1 → Poisson is accurate.\n+ $$\\lambda = 6$$ fits within standard Poisson tables.\n+ Alternative exact binomial computation with $$n = 2000$$ is impractical by hand.\n\nSo use $$\\text{Po}(6)$$ for all further tail-probability calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "When should we use a normal approximation for a binomial distribution, and why does it work? (3 steps)", "answer": "- Step 1: Use $$B(n, p) \\approx N(np, np(1-p))$$ when $$n$$ is large (say $$n \\geq 30$$) AND $$p$$ is not too close to 0 or 1 (typically both $$np > 5$$ and $$n(1-p) > 5$$).\n- Step 2: Why it works: the binomial is the sum of $$n$$ independent Bernoulli trials. By the Central Limit Theorem, the distribution of a sum of many independent random variables approaches a normal distribution as $$n$$ grows.\n+ Mean: $$E(X) = np$$.\n+ Variance: $$\\text{Var}(X) = np(1-p)$$.\n- Step 3: When this approximation is invalid:\n+ $$n$$ small: not enough trials for CLT to kick in.\n+ $$p$$ very small or very large: binomial is skewed (too asymmetric for a normal to fit well). Use Poisson approximation instead.\n\nThe binomial is approximately bell-shaped when conditions hold, and that's exactly when normal approximation is accurate.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "When finding critical regions for a two-tailed test with a discrete distribution, what is the rule for choosing the critical value in each tail? If the target tail probability is 0.025, and the candidates are 0.030 and 0.018, which do you choose? (3 steps)", "answer": "- Step 1: The rule is to choose the critical value that makes the probability in the tail as close as possible to the target tail probability (e.g., 0.025), even if it slightly exceeds it.\n- Step 2: Calculate the distance of each candidate from the target: $$|0.030 - 0.025| = 0.005$$ and $$|0.018 - 0.025| = 0.007$$.\n- Step 3: Since 0.030 is closer to 0.025 than 0.018 is, you choose the critical value that gives the 0.030 probability, even though it slightly exceeds the 2.5% target.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "What is the relationship between confidence intervals and hypothesis testing? If a 95% confidence interval for p does not contain the value p₀, what does this imply about a two-tailed test at 5% significance? (3 steps)", "answer": "- Step 1: There is a duality: testing H₀: p = p₀ at significance level α is equivalent to checking whether p₀ falls outside the (1-α) confidence interval for p.\n- Step 2: If the 95% CI doesn't contain p₀, then at the 5% significance level, we'd reject H₀: p = p₀.\n- Step 3: This works because both procedures use the same standard error and critical values (z = 1.96 for 95% CI / 5% significance). They are two sides of the same coin.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "A critical region for a one-tailed upper test is $$X \\geq 8$$. The observed value is exactly $$x = 8$$. Should you reject $$H_0$$? Explain why this follows from the definition. (2 steps)", "answer": "- Step 1: The notation \"$$X \\geq 8$$\" is inclusive — it includes the value 8. The critical value is defined as the *first value inside* the critical region.\n- Step 2: Since $$x = 8$$ is inside the critical region, we reject $$H_0$$.\n+ This is consistent with the construction: $$P(X \\geq 8 | H_0) \\leq \\alpha$$ was the condition used to pick 8. Observing 8 or more is considered sufficiently unusual to reject.\n+ If instead the critical region had been stated as \"$$X > 8$$\" (strict), then $$x = 8$$ would *not* be in the region.\n+ Exam boards use $$\\geq$$ by convention — always check the notation.\n\nAlways read the inequality carefully when deciding.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "When testing a binomial proportion $$p$$ with a large sample size $$n$$, direct calculation becomes difficult. Under what two different conditions do we approximate $$B(n, p)$$, and what are the approximating distributions?", "answer": "- Step 1: Condition 1: $$n$$ is large and $$p$$ is small (typically $$n > 50$$ and $$p < 0.1$$). In this case, the Binomial is skewed, and we approximate it with a Poisson distribution $$Po(np)$$.\n- Step 2: Condition 2: $$n$$ is large and $$p$$ is close to 0.5 (so the distribution is roughly symmetrical). In this case, we approximate it with a Normal distribution $$N(np, np(1-p))$$.\n- Step 3: The choice depends on the shape of the binomial distribution: skewed (use Poisson) or symmetrical (use Normal).", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "In hypothesis testing, why do we need both a null hypothesis (H₀) and an alternative hypothesis (H₁)? Why can't we just test one claim directly? (3 steps)", "answer": "- Step 1: The null hypothesis H₀ represents the default position—it states what we assume to be true before collecting evidence (e.g., a coin is fair, a treatment has no effect). It's the status quo or baseline.\n- Step 2: The alternative hypothesis H₁ represents what we're investigating—whether there's evidence against our assumption. It defines what we'd conclude if H₀ turns out to be unlikely.\n- Step 3: We structure it this way because direct proof is impossible in statistics; instead, we see if the data would be unusually unlikely if H₀ were true. If sufficiently unlikely, we \"reject H₀\" in favor of H₁. This framework controls the probability of incorrectly rejecting a true null (Type I error).", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "What is a Type I error, and how does it relate to the significance level?", "answer": "A **Type I error** is the error of rejecting $$H_0$$ when $$H_0$$ is actually true — a \"false alarm\". The significance level $$\\alpha$$ is defined as the probability of making a Type I error. So if $$\\alpha = 5\\%$$, then we accept up to a 5% chance of false rejection. This is the \"price\" we pay for having a procedure that can detect real effects.\n\nFor discrete distributions, the *actual* Type I error rate may be slightly below $$\\alpha$$ (due to the discrete nature of the distribution). The trade-off: lowering $$\\alpha$$ reduces false alarms but makes real effects harder to detect (increasing Type II errors — missing real effects). In practice, $$\\alpha = 5\\%$$ is a social convention balancing these concerns. Key insight: Type I error rate is a property of the test procedure over hypothetical repetitions, not a single run.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "When we find a critical region from the cumulative binomial table, what is the significance of the value $$P(X \\leq 6) = 0.9452$$ for determining the upper critical region at 5%? (3 steps)", "answer": "- Step 1: $$P(X \\leq 6) = 0.9452$$ tells us $$P(X \\geq 7) = 1 - 0.9452 = 0.0548$$.\n- Step 2: Compare: $$0.0548 > 0.05$$, so $$X = 7$$ is **not** extreme enough; seeing 7 or more still has > 5% probability under $$H_0$$, not rare enough to reject.\n- Step 3: Move up: compute $$P(X \\leq 7)$$ from the table, get $$P(X \\geq 8) = 0.0132 < 0.05$$. So 8 is the critical value and the critical region is $$X \\geq 8$$.\n\n+ Key lesson: you look up the **predecessor** in the cumulative table, then complement to get the upper tail. $$P(X \\geq c) = 1 - P(X \\leq c-1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "An exam question mentions \"probability in each tail should be as close as possible to 0.025\" for a two-tailed test. What adjacent values do you check, and how do you decide which gives the critical value?", "answer": "For a discrete distribution, compute cumulative probabilities for consecutive integer values of the test statistic in each tail. At the upper tail, for example, you'd check:\n- $$P(X \\geq k)$$, $$P(X \\geq k+1)$$, $$P(X \\geq k+2)$$, …\n\nYou'll find two consecutive values where 0.025 falls between them — e.g., $$P(X \\geq 18) = 0.028$$ and $$P(X \\geq 19) = 0.015$$. Since $$|0.028 - 0.025| = 0.003 < |0.015 - 0.025| = 0.010$$, the value 18 is *closer* to 0.025, so the critical value is 18, even though 0.028 > 0.025. The actual significance level contribution from this tail is 0.028. Repeat for the lower tail. The total actual significance level is the sum of both tail probabilities, and may exceed the nominal 5% depending on which values are chosen. Always read the question precisely — \"closest\" vs \"less than\" gives different answers.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "A hospital tests whether their infection rate differs from the national rate of 20%. They sample 20 patients and find 8 infections. Test at 5% significance using both the critical region method and p-value method, showing they give the same conclusion. (4 steps)", "answer": "- Step 1: H₀: p = 0.2, H₁: p ≠ 0.2. Under H₀: X ~ B(20, 0.2), expected = 4. Observed = 8.\n- Step 2: P-value method: Since observed > expected, consider upper tail: P(X ≥ 8) = 1 - P(X ≤ 7). From tables: P(X ≤ 7) ≈ 0.968, so P(X ≥ 8) ≈ 0.032.\n- Step 3: Two-tailed p-value = 2 × 0.032 = 0.064 (or use exact binomial). Compare to 0.05: 0.064 > 0.05, so do not reject.\n- Step 4: Critical region method: Find critical values where each tail probability ≈ 0.025. Lower: X ≤ 0 (P ≈ 0.012); Upper: X ≥ 8 (P ≈ 0.032, close to 0.025). Observed X = 8 is at the boundary. Since 0.032 > 0.025, not in critical region. Same conclusion: insufficient evidence to reject H₀.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "For a two-tailed test at significance level $$\\alpha$$, why must we split $$\\alpha$$ into $$\\alpha/2$$ at each tail? What goes wrong if we don't? (3 steps)", "answer": "- Step 1: The significance level represents the *total* probability of incorrectly rejecting $$H_0$$ — summed over all rejection scenarios. For a two-tailed test, rejection can happen via either the lower tail or the upper tail.\n- Step 2: If we allowed $$\\alpha$$ at each tail separately, the total probability of false rejection would be $$2\\alpha$$ — double what we intended. Our \"5% test\" would actually have a 10% false alarm rate.\n- Step 3: By setting each tail at $$\\alpha/2 = 0.025$$ (for $$\\alpha = 5\\%$$), the two disjoint tails sum to $$\\alpha$$, preserving the intended false-alarm rate.\n+ This is why one-tailed tests look \"easier\" to reject — they concentrate all the error budget into one direction.\n+ It also explains why two-tailed tests require more extreme evidence: 2.5% tail vs 5% tail.\n\nRule: the total probability of landing in the rejection region (under $$H_0$$) must equal the significance level, regardless of how many tails the region has.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "A student observes 8 heads out of 10 coin tosses and writes $$H_0: p = 0.8$$ because 8/10 = 0.8. Explain the flaw in this logic.", "answer": "- Step 1: The null hypothesis $$H_0$$ must state the assumed or claimed value of the population parameter *before* the experiment is conducted.\n- Step 2: $$p = 0.8$$ is the sample proportion (a statistic), not the population parameter.\n- Step 3: If testing for fairness, $$H_0$$ should be $$p = 0.5$$. We use the sample result (8 heads) to test the claim, not to define the claim itself. The student is confusing the observed statistic with the hypothesized parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "If a hypothesis test results in rejecting the null hypothesis, does this prove that the alternative hypothesis is true? Similarly, if we fail to reject $$H_0$$, does it prove $$H_0$$ is true? (2 steps)", "answer": "- Step 1: Rejecting $$H_0$$ does *not* prove $$H_1$$ is true; it simply means there is sufficient statistical evidence at the given significance level to suggest $$H_1$$ is more likely than $$H_0$$. There is still a chance (equal to the significance level) that we are wrong.\n- Step 2: Failing to reject $$H_0$$ does *not* prove $$H_0$$ is true; it means we do not have enough evidence to reject it. The correct interpretation is \"there is insufficient evidence to suggest [context of $$H_1$$]\".", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "When is it appropriate to use a Normal approximation to the Poisson, and what are the parameters? (3 steps)", "answer": "- Step 1: Use when $$\\lambda$$ is large (typically $$\\lambda > 10$$).\n- Step 2: The approximation is: $$X \\sim \\text{Po}(\\lambda) \\approx N(\\lambda, \\lambda)$$\n+ Mean = $$\\lambda$$\n+ Variance = $$\\lambda$$ (same, since Poisson has equal mean and variance)\n- Step 3: Why this works: a Poisson with large $$\\lambda$$ can be seen as a sum of many small independent Poissons (since sums of Poissons are Poisson). By CLT, this sum becomes approximately Normal.\n\n+ Intuitively: the Poisson distribution is right-skewed for small $$\\lambda$$ but becomes more symmetric as $$\\lambda$$ grows.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "How do you find the critical region for an upper-tail one-tailed test with $$X \\sim B(n, p_0)$$ at significance level $$\\alpha$$? (3 steps)", "answer": "- Step 1: Assume $$H_0$$ true so $$X \\sim B(n, p_0)$$. We want $$P(X \\geq c) \\leq \\alpha$$ — the probability of being in the region is at most $$\\alpha$$.\n- Step 2: Compute $$P(X \\geq c) = 1 - P(X \\leq c-1)$$ using cumulative binomial tables or calculator, stepping up values of $$c$$.\n- Step 3: The critical value is the smallest $$c$$ such that $$P(X \\geq c) \\leq \\alpha$$. The critical region is $$X \\geq c$$.\n\n+ Sanity check: $$P(X \\geq c-1)$$ should be **greater** than $$\\alpha$$ (that's why $$c-1$$ isn't enough to reject), while $$P(X \\geq c) \\leq \\alpha$$ — this shows you've found the boundary.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "The Poisson rate is \"0.325 per minute.\" What is $$\\lambda$$ over a 20-minute interval, and why does this scaling work? (3 steps)", "answer": "- Step 1: A fundamental property of the Poisson process: events occur independently at a **constant rate per unit time**. Over a longer interval, the expected count scales linearly with interval length.\n- Step 2: So $$\\lambda_{\\text{20 min}} = 20 \\times 0.325 = 6.5$$. The distribution of events in 20 minutes is $$\\text{Po}(6.5)$$.\n- Step 3: Why this works: the Poisson process has \"no memory\" — the future rate doesn't depend on what happened before. Non-overlapping intervals are independent and additive, and sums of independent Poissons are Poisson with added rates.\n\n+ Extension: over $$t$$ minutes at rate $$r$$ per minute, $$\\lambda = rt$$. Over 3 intervals of 10 minutes each, $$\\lambda = 30r$$.\n\nThis scaling is crucial because hypotheses can be stated for any time window by rescaling $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "(Exercise) Apply continuity correction: approximate $$P(X \\leq 35)$$ for $$X \\sim B(100, 0.45)$$ using Normal, showing the corrected expression and standardization setup. (4 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(100, 0.45)$$; we approximate by $$W \\sim N(np, np(1-p)) = N(45, 24.75)$$ since $$n$$ large and $$p$$ close to 0.5.\n- Step 2: Apply continuity correction for $$P(X \\leq 35)$$: the \"≤\" includes the bar at 35, so expand outward: $$P(X \\leq 35) \\approx P(W \\leq 35.5)$$.\n- Step 3: Standardize: $$Z = \\frac{W - 45}{\\sqrt{24.75}}$$, so $$P(W \\leq 35.5) = P\\left(Z \\leq \\frac{35.5 - 45}{\\sqrt{24.75}}\\right) = P(Z \\leq -1.910)$$.\n- Step 4: Look up: $$P(Z \\leq -1.910) \\approx 0.0281$$.\n\n+ The conceptual workthrough shows: correction moves 35 to 35.5 (including the bar), then we standardize and read off the standard Normal table.\n\nFor a two-tailed 5% test, compare 0.0281 to $$\\alpha/2 = 0.025$$: slightly above, so fail to reject.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Give the four conditions that must hold for a binomial model to be appropriate for counting outcomes in a sample. Why does each condition matter? (4 steps)", "answer": "- Step 1: **Fixed number of trials $$n$$**: we must decide the sample size in advance. If $$n$$ were random (e.g., stopping when you see enough successes), we'd have a different distribution (negative binomial, say).\n- Step 2: **Two outcomes per trial** (success/failure): each trial must be dichotomous. If there were three possible outcomes (like \"red/green/blue\"), we'd need a different distribution.\n- Step 3: **Independence**: the outcome of one trial must not influence any other. If trials share a confounder (e.g., same batch, same patient), they're dependent and the binomial model is wrong.\n- Step 4: **Constant probability $$p$$**: each trial has the same probability of success. If $$p$$ varies (e.g., a machine wearing out over time), the binomial assumption is violated.\n+ When one condition fails, we get over- or under-dispersion, and the test loses validity.\n\nRule of thumb: if you can write the sample as a fixed series of identical, independent coin flips, binomial applies.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why do we never conclude \"$$H_0$$ is true\" or \"the population is fair\" based on a non-significant test — even if the p-value is very large? (3 steps)", "answer": "- Step 1: A hypothesis test can only provide evidence *against* $$H_0$$ (by rejecting) or fail to provide such evidence (by not rejecting). It cannot confirm $$H_0$$ positively.\n- Step 2: Many different true parameter values would give non-significant results. For example, $$p = 0.48, p = 0.50, p = 0.52$$ might all give similar-looking data for small samples. A non-rejection doesn't pick out $$p = 0.5$$ specifically.\n- Step 3: To \"confirm\" $$H_0$$, you'd need infinite sample size to rule out all possible deviations. With finite data, you can only say \"the deviations from $$H_0$$ consistent with these data include $$H_0$$ itself\" — which is much weaker than \"$$H_0$$ is true\".\n+ Proper phrasing: \"We fail to reject $$H_0$$\" or \"there is insufficient evidence to reject $$H_0$$\".\n+ Never: \"we conclude the coin is fair\" or \"the claim is confirmed\".\n\nThe asymmetry is fundamental to the logic of testing.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Explain why, in a two-tailed test with a highly skewed distribution like $$B(20, 0.1)$$, the tail probabilities in the critical region can be very unequal, and why this is acceptable. (3 steps)", "answer": "- Step 1: $$B(20, 0.1)$$ is strongly right-skewed (mean 2, long right tail). The lower tail is \"compressed\" because values close to 0 have limited probability mass. The upper tail is long.\n- Step 2: To place ~2.5% probability in each tail:\n+ The lower tail might end at $$X = 0$$ with probability 0.12 — way above 2.5%.\n+ Or we might not put ANY probability in the lower tail (no valid cutoff).\n+ The upper tail settles at $$X \\geq 5$$ with probability ~3%.\n- Step 3: The test can still proceed with a slightly asymmetric structure — we're controlling the *total* significance level, not forcing each tail to be equal.\n+ The actual significance level is the sum of both tail probabilities (perhaps 1.5% + 0.1% = 1.6%, say), which could be less than 5%.\n+ Skewed distributions naturally lead to unequal tail contributions; this is a feature, not a bug.\n\nIn practice, always compute both tails separately and sum them for the actual significance level.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Distinguish between a \"test statistic\" and a \"population parameter\" — what role does each play in a hypothesis test? (3 steps)", "answer": "- Step 1: A **population parameter** (like $$p$$ in $$B(n,p)$$ or $$\\lambda$$ in $$\\text{Po}(\\lambda)$$) is a feature of the underlying population or process. It is typically *unknown* and is what the hypothesis is *about*.\n- Step 2: A **test statistic** is a single numerical value *calculated from the sample* (the observed data). For binomial tests, the test statistic is typically the count $$X$$ of successes; for Poisson tests, the count of events in an interval.\n- Step 3: The relationship: we use the test statistic (observed) to make inferences about the parameter (unknown). We *never* compute the parameter directly; we only test whether the observed data is consistent with a hypothesised value of the parameter.\n+ Common student error: calling \"$$p = 0.2$$\" the test statistic. No — the test statistic is the *count* of successes, a value like 5 or 11.\n\nAlways: parameter = feature of population; statistic = function of sample data.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "When finding a critical value for a one-tailed binomial test with H₁: p > p₀ at 5% significance, explain why we look for the smallest value x where P(X ≥ x) < 0.05, rather than simply P(X ≥ x) = 0.05. (3 steps)", "answer": "- Step 1: We're looking for the first value x such that the cumulative probability of x or more falls below 0.05—this ensures the actual significance level doesn't exceed our target.\n- Step 2: Since the binomial distribution is discrete, we typically cannot achieve exactly 0.05. We choose the smallest x where P(X ≥ x) < 0.05 to be \"just significant\"—any smaller x would put us in the acceptance region.\n- Step 3: This gives us the critical region X ≥ x (or X ≤ x for lower tail tests). The actual significance level will be ≤ 0.05 but typically less (e.g., 0.032 or 0.021), which is the probability of incorrectly rejecting H₀.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "Explain why for a fixed significance level α, a one-tailed test has more power to detect an effect in the specified direction than a two-tailed test. (2 steps)", "answer": "- Step 1: In a one-tailed test at α = 0.05, all 5% goes to detecting effects in one direction (e.g., increase). In a two-tailed test, only 2.5% goes to each direction.\n- Step 2: This means the critical value for one-tailed is less extreme (closer to the null value) than for two-tailed. For the same observed effect size, you're more likely to fall into the critical region with a one-tailed test, giving higher power for detecting effects in the predicted direction.", "source": "MiniMax ②", "_id": "minimax_2_51"}, {"question": "A test is conducted at the 5% significance level, but the actual significance level turns out to be 3.7%. Explain why these two numbers are different, and what the 3.7% specifically represents. (3 steps)", "answer": "- Step 1: The difference arises because the test statistic follows a discrete distribution (like Binomial), which can only take integer values. Probabilities accumulate in discrete chunks, so we cannot always hit the exact threshold of 5%.\n- Step 2: When finding the critical region, we must ensure the probability of falling within it is *less than or equal to* the nominal level (5%). The largest critical region we can create might only have a 3.7% chance of occurring under $$H_0$$. Adding the next value would push the probability over 5%.\n- Step 3: The 3.7% is the actual significance level — the true probability of incorrectly rejecting $$H_0$$ (a Type I error) given the critical region we have chosen. It is always less than or equal to the nominal significance level.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "A coin tossed 20 times shows 6 heads. Test at 5% (two-tailed) whether the coin is biased. Walk through the intuition step-by-step. (4 steps)", "answer": "- Step 1: Model: $$X \\sim B(20, 0.5)$$ under $$H_0$$ (fair coin). $$H_0: p = 0.5$$, $$H_1: p \\neq 0.5$$.\n- Step 2: Compare $$x = 6$$ to $$E(X) = np = 10$$. Observation is *below* expectation — compute the lower-tail probability $$P(X \\leq 6)$$.\n- Step 3: For a two-tailed test at 5%, the cutoff per tail is $$\\alpha/2 = 0.025$$. We reject $$H_0$$ if $$P(X \\leq 6 | p = 0.5) < 0.025$$.\n- Step 4: From tables, $$P(X \\leq 6 | p = 0.5) \\approx 0.058$$. Since 0.058 > 0.025, we fail to reject $$H_0$$.\n+ Conclusion in context: \"There is insufficient evidence at the 5% level that the coin is biased.\"\n+ Intuition: with only 20 tosses, a result of 6 heads is quite possible under fairness due to sampling variation.\n\nThe takeaway: intuitively \"unfair-looking\" results (6 out of 20) can still be consistent with fairness when $$n$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Conceptually, why does the actual significance level equal the sum of the tail probabilities, rather than the average? (3 steps)", "answer": "- Step 1: The actual significance level is the probability of rejecting $$H_0$$ when $$H_0$$ is true. Rejection can happen if $$X$$ falls in **either** part of the critical region.\n- Step 2: The two tails are **disjoint** events: $$X$$ can be $$\\leq c_1$$ or $$X \\geq c_2$$, but not both simultaneously. Probability of a union of disjoint events is the sum of their probabilities.\n- Step 3: So the actual level = $$P(X \\leq c_1) + P(X \\geq c_2)$$. Summing (not averaging) gives the total false-positive rate.\n\nFor a one-tailed test, there's only one tail, so the actual level is just that one probability.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "In hypothesis testing, what is the relationship between confidence intervals and hypothesis tests? If a (1-α)% confidence interval for p does not contain the null value p₀, what does this imply about the hypothesis test? (2 steps)", "answer": "- Step 1: There is a direct correspondence between hypothesis tests and confidence intervals. A two-tailed test at significance level α is equivalent to checking whether the (1-α)% confidence interval contains the null hypothesis value.\n\n- Step 2: If the confidence interval does not contain p₀, we reject H₀: p = p₀ at the α level. For example, if a 95% confidence interval for p is (0.42, 0.58) and we're testing H₀: p = 0.35, since 0.35 is not in the interval, we reject H₀ at the 5% significance level.", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "For a hypothesis test, explain why we might prefer using the critical region method over the p-value method, or vice versa. What information does each provide? (2 steps)", "answer": "- Step 1: Critical region method: Pre-determines the decision rule before seeing data. Once we find the critical value, we simply check if our observation falls in it. It gives a clear accept/reject decision but doesn't tell us \"how significant\" the result is.\n- Step 2: P-value method: Calculates the probability of observing data as extreme as (or more extreme than) what we got, assuming H₀ is true. This tells us the \"strength of evidence\" against H₀—the smaller the p-value, the stronger the evidence. It's more informative but requires calculation after seeing data.", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "In a Poisson test, given $$\\lambda = 3.25$$ (not in tables), what's the most efficient way to compute $$P(Y \\leq 1)$$ by hand for hypothesis testing? (3 steps)", "answer": "- Step 1: Use the Poisson PMF directly: $$P(Y = k) = \\frac{e^{-\\lambda} \\lambda^k}{k!}$$.\n- Step 2: Compute just the terms you need:\n+ $$P(Y = 0) = e^{-3.25}$$\n+ $$P(Y = 1) = e^{-3.25} \\times 3.25$$\n- Step 3: Sum: $$P(Y \\leq 1) = e^{-3.25}(1 + 3.25) = 4.25 \\, e^{-3.25}$$. Evaluate numerically to compare to $$\\alpha$$.\n\n+ This approach is efficient for small tail counts ($$k \\leq 3$$ or so). For larger counts, approximations beat direct computation.\n\n+ For two-tailed tests or upper-tail tests with many terms, a Normal approximation saves significant time.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Two researchers test the same hypothesis: one uses 5%, the other uses 1%. They both see $$p$$-value 0.03. Who rejects $$H_0$$ and what does this illustrate? (3 steps)", "answer": "- Step 1: At 5%: $$p = 0.03 < 0.05$$ → reject $$H_0$$.\n- Step 2: At 1%: $$p = 0.03 > 0.01$$ → fail to reject $$H_0$$.\n- Step 3: This illustrates that the conclusion depends on the chosen significance level. Same data, different threshold, different decision. It also underscores that \"significance\" is a function of how strict we are, not a property of the data alone.\n\n+ This is why communicating the p-value itself is often more useful than just \"significant / not significant.\"", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "For a two-tailed test at the 5% significance level, a student checks if the probability in one tail is less than 5%. Identify the mistake and explain the correct approach to splitting the significance level. (3 steps)", "answer": "- Step 1: The mistake is that applying a 5% threshold to *each* tail would result in a total risk of 10% (5% + 5%) of incorrectly rejecting $$H_0$$, which violates the requirement of a 5% test.\n- Step 2: The correct approach is to halve the overall significance level and apply it to both ends. For a 5% two-tailed test, we look for a probability of 2.5% in the lower tail and 2.5% in the upper tail.\n- Step 3: This ensures that the total probability of falling into either critical region (and thus incorrectly rejecting $$H_0$$) sums to no more than 5%. We are allowing for deviation in either direction, but the total risk of a false positive remains 5%.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "(Exercise) A manufacturer claims 15 new purple drawing pins per 20-box. A customer sees 1 purple pin and wants to test at 5% whether probability < 0.15. Walk through the test. (4 steps)", "answer": "- Step 1: Set up: $$X$$ = number of purple pins in a box, $$X \\sim B(20, p)$$. $$H_0: p = 0.15$$, $$H_1: p < 0.15$$ (one-tailed, lower). Under $$H_0$$, $$E(X) = 3$$.\n- Step 2: Compute $$P(X \\leq 1 \\mid p = 0.15)$$ from tables: $$P(X \\leq 1) \\approx 0.1756$$.\n- Step 3: Compare to $$\\alpha = 0.05$$: since $$0.1756 > 0.05$$, the observation is not extreme enough.\n- Step 4: **Fail to reject $$H_0$$.** Conclude: insufficient evidence at 5% that the proportion of purple pins is less than 0.15. One low box doesn't establish a manufacturing problem.\n\n+ Intuition: with expected value 3 and observed value 1, the shortfall of 2 pins is within natural sampling variation.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "For a binomial test with $$n = 100$$ and $$p = 0.04$$, which approximation is appropriate and why? Why would a normal approximation be a poor choice here? (3 steps)", "answer": "- Step 1: Check the parameters: $$n = 100$$ is large, $$p = 0.04$$ is small. This fits the \"large $$n$$, small $$p$$\" profile → **Poisson approximation**: $$X \\approx \\text{Po}(4)$$.\n- Step 2: Normal approximation would be poor because:\n+ $$np = 4$$ is too small (normal approximation typically needs $$np \\geq 5$$ or higher).\n+ The binomial is strongly right-skewed when $$p$$ is small — it looks nothing like a symmetric bell curve.\n+ The normal distribution would give significant probability to *negative* counts, which is meaningless.\n- Step 3: Why Poisson works: with tiny $$p$$, successes are rare events. The Poisson is specifically designed for modelling rare event counts. The skewness of the binomial (heavy right tail, compressed left) matches the Poisson exactly for small $$p$$.\n+ Concretely, $$\\text{Po}(4)$$ tables can be looked up directly, making calculations easy.\n\nRule of thumb: small $$p$$ ⇒ Poisson; large $$p \\approx 0.5$$ ⇒ normal.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A researcher conducts 20 hypothesis tests at the 5% significance level. What is the probability that at least one test incorrectly rejects a true null hypothesis? What does this illustrate about multiple testing? (3 steps)", "answer": "- Step 1: Assuming independence, the probability of NOT incorrectly rejecting in each test is 0.95. For 20 tests: P(no Type I errors) = 0.95²⁰ ≈ 0.358.\n- Step 2: Therefore, P(at least one Type I error) = 1 - 0.358 ≈ 0.642 (64.2%).\n- Step 3: This illustrates the problem with multiple testing: even if all null hypotheses are true, the chance of finding at least one \"significant\" result is very high. This is why we should be cautious about multiple comparisons and may need to adjust significance levels (e.g., Bonferroni correction).", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "Why is the \"actual significance level\" formally equal to $$P(\\text{test statistic} \\in \\text{critical region} | H_0 \\text{ is true})$$, and what does this interpretation reveal about Type I errors? (3 steps)", "answer": "- Step 1: Rejecting $$H_0$$ happens precisely when the test statistic lands in the critical region. So $$P(\\text{reject } H_0 | H_0 \\text{ true})$$ equals the probability of landing in the critical region under $$H_0$$.\n- Step 2: This probability is called the **actual significance level**, or equivalently the **Type I error rate** — the rate of false alarms in repeated testing.\n- Step 3: So if the actual significance level is 3.2%, then:\n+ If $$H_0$$ is truly correct and we repeatedly test on independent samples, we'd incorrectly reject $$H_0$$ about 3.2% of the time.\n+ This is the \"price we pay\" for having a procedure that can detect real effects when they exist.\n+ The test's procedure imposes this rate by construction — we've chosen to reject based on outcomes that have probability ≤ some threshold under $$H_0$$.\n\nDeeper: the significance level is a property of the *procedure*, not a single test — it reflects long-run behaviour under repeated hypothetical sampling.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "What is the fundamental reason the binomial and Poisson distributions are treated so similarly for hypothesis testing — despite modelling different phenomena? (3 steps)", "answer": "- Step 1: Both are **discrete probability distributions** with a single parameter controlling their shape. Both accept positive integer counts. Both have exact cumulative distribution functions that can be tabulated.\n- Step 2: The hypothesis testing framework only requires:\n+ Ability to compute $$P(X \\leq x)$$ and $$P(X \\geq x)$$ under $$H_0$$.\n+ A test statistic from the distribution.\n+ A decision rule based on tail probabilities.\n- Step 3: Both binomial and Poisson satisfy these requirements. The computational details (which distribution, which parameter, which scaling) differ, but the logical structure is identical.\n+ Similar tests would work for any other discrete distribution (e.g., geometric, negative binomial) by the same framework.\n+ What changes: the specific tables used and how to match the parameter to the sampling setup.\n\nThe framework is a general procedure; distributions are just the engines.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "A machine produces 0.3% faulty bulbs. A sample of 2000 bulbs has 12 faulty ones. Test if the fault rate has increased at the 5% level. Walk through the approximation choice and the conceptual setup. (4 steps)", "answer": "- Step 1: Set up Binomial. The exact model is $$X \\sim B(2000, 0.003)$$. $$H_0: p = 0.003$$, $$H_1: p > 0.003$$.\n- Step 2: Choose approximation. Since $$n$$ is large (2000) and $$p$$ is small (0.003), we approximate with Poisson. The mean is $$\\lambda = np = 2000 \\times 0.003 = 6$$. So, $$X \\approx Po(6)$$.\n- Step 3: Formulate the test using the approximation. We need to find $$P(X \\ge 12)$$ under the $$Po(6)$$ distribution.\n- Step 4: Decision. If $$P(X \\ge 12) < 0.05$$, we reject $$H_0$$. Since 12 is double the mean of 6, it sits far in the upper tail, suggesting we will likely reject $$H_0$$. (The actual probability is ~0.02, so we reject it).", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "If a test fails to reject $$H_0$$ at 5% but we later collect more data and reject at 5%, have we contradicted ourselves? (3 steps)", "answer": "- Step 1: No contradiction. The first test said \"given this sample, the evidence isn't strong enough.\" The second said \"given this larger sample, the evidence is now strong enough.\"\n- Step 2: With more data, the binomial/Poisson distribution concentrates around its mean relative to sample size, so smaller deviations from $$H_0$$ become detectable. The true parameter hasn't changed — our ability to detect deviations has.\n- Step 3: This reflects an asymmetry: \"fail to reject\" doesn't mean $$H_0$$ is true — it just means we lack enough evidence. Additional evidence can change the verdict without contradiction.\n\n+ This is also why \"absence of evidence isn't evidence of absence\" — both tests may be correct given their respective data.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "A researcher finds that $$n = 10$$ trials with $$x = 4$$ successes gives a non-significant result under $$H_0: p = 0.5$$. She argues that $$n = 100$$ trials with $$x = 40$$ successes (same 40%) would also be non-significant. Is she right? (3 steps)", "answer": "- Step 1: No, she's wrong. Sample size fundamentally changes the test outcome even for the same observed proportion.\n- Step 2: Intuition: $$n = 10$$ is very noisy; a sample proportion of 40% is consistent with true $$p = 0.5$$ by chance (1 SD of sampling error). But $$n = 100$$ is much more precise; observing exactly 40% is many SDs away from 50% expected.\n- Step 3: Formally: standardised z-score is $$Z = \\frac{\\hat p - p_0}{\\sqrt{p_0(1-p_0)/n}}$$.\n+ For $$n = 10$$, $$\\hat p = 0.4$$: $$Z = \\frac{0.4 - 0.5}{\\sqrt{0.5 \\times 0.5/10}} \\approx -0.63$$ — small.\n+ For $$n = 100$$, $$\\hat p = 0.4$$: $$Z = \\frac{0.4 - 0.5}{\\sqrt{0.5 \\times 0.5/100}} = -2.0$$ — large, likely significant.\n+ The z-score scales as $$\\sqrt{n}$$ for fixed proportions.\n\nTakeaway: the same sample proportion becomes more significant as $$n$$ grows. Don't confuse \"effect size\" with \"statistical significance\".", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "What are the structural rules for writing $$H_0$$ and $$H_1$$ in a hypothesis test? Why must $$H_0$$ contain a specific value rather than a range? (3 steps)", "answer": "- Step 1: $$H_0$$ is always of the form \"parameter = specific value\" (e.g., $$H_0: p = 0.4$$ or $$H_0: \\lambda = 6.5$$). It must specify a *single* value so that we can determine a unique probability distribution under which to compute probabilities.\n- Step 2: $$H_1$$ describes the *direction* of deviation we are testing for:\n+ $$H_1: \\theta > \\theta_0$$ → upper-tailed (testing for increase)\n+ $$H_1: \\theta < \\theta_0$$ → lower-tailed (testing for decrease)\n+ $$H_1: \\theta \\neq \\theta_0$$ → two-tailed (testing for change in either direction)\n- Step 3: Why $$H_0$$ must be specific: if $$H_0$$ said \"$$p \\geq 0.4$$\", there are infinitely many values ($$p = 0.4, 0.5, 0.6, \\ldots$$) each giving a different distribution, and we couldn't decide which probabilities to compute. Fixing $$p = 0.4$$ gives a single, workable model.\n\nThe rule: $$H_0$$ fixes a number; $$H_1$$ provides a direction away from that number.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Why should \"optional stopping\" (sampling until you see enough successes) *never* be used with a binomial hypothesis test? (3 steps)", "answer": "- Step 1: The binomial distribution assumes $$n$$ is fixed in advance. Under optional stopping, $$n$$ is random — it depends on what outcomes have already occurred.\n- Step 2: Under optional stopping, the observed counts are no longer binomial; the distribution could be negative binomial or even more complex. Using binomial probabilities would give *incorrect* p-values.\n- Step 3: Specifically, optional stopping tends to make tests *anti-conservative* — you can almost always find enough outcomes to \"reach significance\" by continuing to sample. This inflates the Type I error rate well above the nominal level.\n+ This is a classic source of p-hacking in research: \"just collect more data until it's significant\".\n+ Always determine $$n$$ before sampling, and commit to stopping at that $$n$$ regardless of intermediate results.\n\nValid statistics require pre-specified sampling rules.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Why do we compare $$P(X \\geq x)$$ (or $$P(X \\leq x)$$) to $$\\alpha$$ rather than just $$P(X = x)$$? (3 steps)", "answer": "- Step 1: The idea is to measure how extreme the observation is. Evidence \"at least as extreme as what we saw\" is what should count.\n- Step 2: Using only $$P(X = x)$$ would be misleading because in any distribution, single point probabilities are small — every outcome looks \"unlikely\" by that criterion.\n- Step 3: By using tail probabilities $$P(X \\geq x)$$ or $$P(X \\leq x)$$, we capture \"this observation, or something even more extreme in the direction of $$H_1$$.\" This is a genuine measure of incompatibility with $$H_0$$.\n\nIf you wanted to criticize a coin as biased toward heads, seeing 9 out of 10 heads should count just as much evidence as 8 out of 10 (plus more) — which is exactly $$P(X \\geq 8)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why is the *actual* significance level of a test often different from the nominal significance level (like 5%) when using discrete distributions like the Binomial? (3 steps)", "answer": "- Step 1: Discrete distributions can only take specific integer values, so we cannot always find a critical value that gives exactly a 5% probability in the tail.\n- Step 2: We must choose the critical region such that the probability of the test statistic falling within it is less than or as close as possible to the nominal significance level.\n- Step 3: The actual significance level is the exact probability of the test statistic falling within the critical region (the probability of incorrectly rejecting $$H_0$$), which is usually slightly less than the nominal 5% threshold because we can't hit it exactly with discrete jumps.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "During an outbreak, 4% of city population has the flu. A factory of 100 employees has 12 absent claiming flu. Test at 5% whether the factory rate exceeds the city rate. Which distribution and approximation do you use? (4 steps)", "answer": "- Step 1: Model: counting absences in fixed sample size of 100, with each employee independently likely to have flu with $$p = 0.04$$ → binomial. $$X \\sim B(100, 0.04)$$.\n- Step 2: Approximation check: $$n = 100$$ is large, $$p = 0.04$$ is small, $$np = 4$$ is moderate. Ideal conditions for **Poisson approximation**: $$X \\approx \\text{Po}(4)$$.\n+ Normal would be poor because $$p$$ is small and the distribution is skewed.\n- Step 3: Hypotheses: $$H_0: p = 0.04$$ (or equivalently $$\\lambda = 4$$), $$H_1: p > 0.04$$. One-tailed upper.\n- Step 4: Find critical region using Poisson tables for $$\\lambda = 4$$:\n+ $$P(X \\geq 8) = 1 - P(X \\leq 7) \\approx 0.0511$$ (just above 5%).\n+ $$P(X \\geq 9) = 1 - P(X \\leq 8) \\approx 0.0214$$ (below 5%).\n+ So the critical region is $$X \\geq 9$$, and 12 falls inside it.\n+ Conclusion: reject $$H_0$$. Evidence at 5% level that factory has higher flu rate than city average.\n\nUsing Poisson approximation makes this tractable.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why does the \"actual significance level\" provide useful information, beyond just stating the nominal level? (3 steps)", "answer": "- Step 1: The nominal level tells us our target: \"we want no more than 5% Type I error.\"\n- Step 2: The actual level tells us what we actually achieved with the chosen critical region — e.g., 3.28%. For discrete distributions, this will typically be strictly less than nominal.\n- Step 3: Reporting both reveals:\n+ How conservative the test actually is\n+ Whether our critical region was constructed well\n+ The real false-positive rate, which is what practical users care about\n\n+ In some cases, alternative critical regions with different actual levels are valid — knowing the actual level helps choose among them.\n\n+ It's also a sanity check: if your \"actual level\" exceeds nominal, you've made an error somewhere.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "What happens to the power of a hypothesis test (its ability to detect a real effect) as sample size increases? (3 steps)", "answer": "- Step 1: As $$n$$ grows, the binomial (or Poisson) distribution becomes more concentrated around its mean relative to the scale — variability as a proportion of the sample size decreases.\n- Step 2: This means smaller departures from $$p_0$$ become detectable. A 5% difference from the null proportion that was invisible with $$n = 20$$ might be highly significant with $$n = 2000$$.\n- Step 3: In practical terms: larger samples give better statistical \"resolution.\" If you fail to reject $$H_0$$ with a small sample but the effect is real, the right move is usually to collect more data.\n\n+ Trade-off: larger samples cost time and money, so power calculations guide how much is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "For $$X \\sim B(50, 0.02)$$ with observation $$x = 4$$, why is the correct test of the \"two-tailed\" version to examine the *upper* tail? (3 steps)", "answer": "- Step 1: Compute the expected value: $$E(X) = np = 50 \\times 0.02 = 1$$.\n- Step 2: The observation $$x = 4$$ is *above* the expected value (4 > 1). In a two-tailed test, the relevant tail is the one consistent with the observed deviation direction.\n- Step 3: So even though 4 sounds like a \"small number\" in absolute terms, relative to the expected value of 1, it's large — four times expected. Compute $$P(X \\geq 4)$$ and compare to $$\\alpha/2$$.\n+ Misconception trap: anchoring on the absolute magnitude of $$x$$ without comparing to $$np_0$$.\n+ Always compare $$x_{\\text{obs}}$$ to the expected value under $$H_0$$, and choose the tail in the direction of deviation.\n\nFor two-tailed tests, \"which tail\" is determined by where $$x$$ lies relative to $$E(X)$$ — not by whether $$x$$ is large or small in absolute terms.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why is the binomial distribution the natural model for testing a proportion? (3 steps)", "answer": "- Step 1: A proportion $$p$$ represents the probability of a single \"success\" in some category (e.g., supporting a candidate, being faulty, landing on heads).\n- Step 2: When we take a sample of $$n$$ independent observations and count how many are successes, we have the exact setup of a binomial distribution: fixed $$n$$ trials, each with success probability $$p$$, independent, two outcomes.\n- Step 3: So \"number of successes in the sample\" $$\\sim B(n, p)$$, and testing a claim about $$p$$ means testing a binomial parameter.\n\n+ Key insight: the test statistic is the **count**, not the proportion. The sample proportion $$\\hat{p} = x/n$$ is just the count rescaled, so it carries identical information but binomial tables work with counts.\n\nIsabelle's mistake in Exercise 7A Q4 was treating \"probability of heads\" (a parameter) as a test statistic — but a parameter isn't a statistic, it's an unknown we're testing.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "William takes two independent observations of a test statistic and finds they *both* fall inside the critical region. If the actual significance level (probability of incorrectly rejecting $$H_0$$ for one observation) is $$\\alpha$$, what is the probability that he has incorrectly rejected $$H_0$$ based on both observations?", "answer": "- Step 1: The probability of incorrectly rejecting $$H_0$$ for one observation is the probability of a Type I error, which is $$\\alpha$$.\n- Step 2: Since the two observations are independent, the probability of both falling in the critical region (and thus incorrectly rejecting $$H_0$$ based on this rule) is the product of the individual probabilities.\n- Step 3: Therefore, the probability is $$\\alpha \\times \\alpha = \\alpha^2$$. This makes a false positive much less likely than using a single observation.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "A student reasons: \"Since the critical value is 8 for $$X \\geq 8$$, my observed value of 7 is 'just outside' the critical region. Should I reject anyway since it's 'close'?\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: Hypothesis testing is a *binary* decision procedure: the test statistic is either in the critical region (reject) or not in the critical region (don't reject). \"Close to\" the boundary has no meaning in the decision rule.\n- Step 2: The critical value is carefully chosen to ensure the total tail probability matches the significance level. Moving the boundary inward (to include 7) would inflate the Type I error rate above the nominal $$\\alpha$$.\n- Step 3: If you reject for $$x = 7$$, you're effectively running a test at a larger significance level than 5% — maybe 5.5% — without acknowledging it.\n+ Valid alternatives: either commit to the critical region you've set, OR acknowledge you'd want to use a slightly higher $$\\alpha$$ (e.g., 10%) and redo the test honestly.\n+ Never \"stretch\" the critical region based on what the data shows.\n\nDecisions must follow the pre-specified rule exactly, not approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why does the direction of $$H_1$$ fundamentally change the nature of the test? Contrast what a one-tailed and a two-tailed test of the same $$H_0$$ would detect. (3 steps)", "answer": "- Step 1: A **one-tailed test** concentrates all of the significance-level probability (say 5%) into *one tail* of the distribution. It is designed to detect deviations in one specific direction.\n- Step 2: A **two-tailed test** splits the significance level into both tails (2.5% each for $$\\alpha = 5\\%$$). It detects deviations in either direction.\n- Step 3: Consequences:\n+ A one-tailed test is *more sensitive* (has higher power) in the specified direction — you need a smaller effect to reject.\n+ But a one-tailed test has *zero power* to detect effects in the other direction.\n+ A two-tailed test sacrifices sensitivity in each direction (2.5% instead of 5%) to gain the ability to detect both.\n\n**The choice must be made BEFORE seeing the data**, based on the research question — not after, based on what the data shows (which would be statistical dishonesty).", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Why do we use approximations at all, given that exact Binomial and Poisson calculations are possible? (3 steps)", "answer": "- Step 1: For large $$n$$, computing Binomial probabilities involves terms like $$\\binom{n}{k} p^k (1-p)^{n-k}$$, which are computationally expensive or unavailable in standard tables.\n- Step 2: Similarly for large $$\\lambda$$ in Poisson: tables cut off at $$\\lambda = 10$$, and direct computation requires summing many terms.\n- Step 3: Normal approximations use the standard Normal table $$Z \\sim N(0,1)$$, which handles any parameters via standardization: compute $$Z = \\frac{x - \\mu}{\\sigma}$$ once and look up the result. This is universally tabulated.\n\nHistorical context: in pre-calculator days this was the only practical way to handle large-sample problems. Even today, approximations give quick analytic insights.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A researcher claims their test is \"highly significant\" with p = 0.001. Explain why this phrase can be misleading and what a more accurate interpretation would be. (2 steps)", "answer": "- Step 1: \"Highly significant\" suggests the result is important or has large practical importance, which may not be true. Statistical significance only tells us about the evidence against H₀—it says nothing about the magnitude or practical importance of an effect.\n- Step 2: A p-value of 0.001 means that if H₀ were true, there's only a 0.1% chance of observing data this extreme. This is strong evidence against H₀, but the actual effect could be trivial in practical terms (especially with very large samples, tiny differences can be \"significant\"). Proper interpretation: \"Strong evidence against H₀; further investigation of practical significance is warranted.\"", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "During a flu outbreak, 4% of city is affected; the manager of a 100-person firm sees 12 absences. Why is Poisson approximation appropriate here, not Normal? (4 steps)", "answer": "- Step 1: Under $$H_0$$: $$X \\sim B(100, 0.04)$$. Here $$n = 100$$ is large but $$p = 0.04$$ is small.\n- Step 2: For Normal approximation, we'd want $$np$$ and $$n(1-p)$$ both large. But $$np = 4$$ is too small — the distribution is too skewed to look Normal.\n- Step 3: For Poisson approximation, we want $$n$$ large, $$p$$ small. Both hold, with $$np = 4$$ being a moderate Poisson rate. So use $$X \\approx \\text{Po}(4)$$.\n- Step 4: Since $$\\lambda = 4$$ IS in the Poisson tables, we can use them directly without further approximation.\n\n+ Rule: small $$p$$, large $$n$$, moderate $$np$$ → Poisson. Large $$n$$, middling $$p$$, both $$np$$ and $$n(1-p)$$ large → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "In statistics, what exactly is a \"hypothesis,\" and what fundamental epistemic limitation prevents us from proving one true from sample data alone? (3 steps)", "answer": "- Step 1: A hypothesis is a statement about the value of a **population parameter** — for example, $$p$$ in $$B(n,p)$$ or $$\\lambda$$ in $$\\text{Po}(\\lambda)$$. It's a specific claim about the unknown quantity governing the distribution.\n- Step 2: We only observe a **sample**, not the whole population. Due to random variation, the same sample could have arisen under many different true parameter values — nothing in the sample uniquely identifies the true value.\n- Step 3: Therefore we can only assess how **consistent** our sample is with a hypothesis. If very inconsistent, we reject; if consistent, we fail to reject. We never \"prove\" — we quantify compatibility under uncertainty.\n\nThe whole framework is built on \"is our data surprising under this assumption?\" — not \"what is the truth?\"", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Why should we write \"there is insufficient evidence to reject $$H_0$$\" rather than \"we accept $$H_0$$\"? (3 steps)", "answer": "- Step 1: Failing to reject $$H_0$$ means our data weren't unusual enough to contradict $$H_0$$. It doesn't prove $$H_0$$ is true — many other values of the parameter could also produce this data.\n- Step 2: The test is asymmetric: we set up the machinery to detect evidence **against** $$H_0$$. Absence of evidence against it is not evidence for it.\n- Step 3: Saying \"accept $$H_0$$\" would imply we've proven the parameter equals exactly $$p_0$$, which sample data can't do. More accurate phrasing: \"insufficient evidence to reject\" or \"consistent with $$H_0$$.\"\n\nAnalogy: in court, \"not guilty\" does not mean \"innocent\" — it means \"evidence wasn't strong enough to prove guilt.\"", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why do we need to pick a significance level **before** seeing the data? (3 steps)", "answer": "- Step 1: If we set $$\\alpha$$ after seeing the data, we could pick a threshold that conveniently includes or excludes our observation — rigging the test.\n- Step 2: The whole point of the significance level is to guarantee a bound on the long-run false-positive rate. That guarantee only holds if $$\\alpha$$ is independent of the specific data.\n- Step 3: In practice: state $$\\alpha$$ (and $$H_0$$, $$H_1$$) at the start of the analysis, then run the test.\n\nThis is analogous to setting the finish line before the race, not after.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Conceptually, what does a 5% significance level mean, and why are typical levels 10%, 5%, 1%? (4 steps)", "answer": "- Step 1: The significance level $$\\alpha$$ is the threshold probability below which we declare the observed data \"too unlikely to have arisen under $$H_0$$.\"\n- Step 2: Equivalently, $$\\alpha$$ is the probability of wrongly rejecting $$H_0$$ **when $$H_0$$ is actually true** (Type I error rate).\n- Step 3: Smaller $$\\alpha$$ = stricter evidence required = harder to reject $$H_0$$ = lower false-rejection risk, but also lower chance of detecting a real effect.\n- Step 4: The conventional choices reflect different contexts:\n+ 10% — exploratory work, early-stage research\n+ 5% — default scientific standard\n+ 1% — high-stakes decisions (medicine, safety, legal)\n\nA useful mental picture: at 5%, we'd expect to wrongly reject a true $$H_0$$ about one time in twenty.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "For a Poisson distribution hypothesis test, explain why we need to adjust the parameter λ when the time interval changes. For instance, if calls occur at a rate of 0.325 per minute, what would be the parameter for a 20-minute interval? (2 steps)", "answer": "- Step 1: The Poisson distribution models the number of events occurring in a fixed interval of time or space. The parameter λ represents the mean number of events in that specific interval. If we change the interval length, λ must be scaled proportionally.\n\n- Step 2: If calls occur at 0.325 per minute, then for a 20-minute interval, λ = 0.325 × 20 = 6.5. So X ~ Po(6.5) represents the number of calls in 20 minutes. This scaling is essential because λ is not a fixed \"rate\" but rather the expected count for a specific interval.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "Why is it crucial to state conclusions of a hypothesis test in the *context* of the original question, rather than just saying \"reject $$H_0$$\"? (3 steps)", "answer": "- Step 1: \"Reject $$H_0$$\" is a statistical decision, but readers (clinicians, managers, scientists) want to know what this means for their *real-world* question.\n- Step 2: A complete conclusion includes:\n+ (a) the statistical decision (reject / fail to reject),\n+ (b) the direction of the finding in plain language (\"the drug is more effective\", \"sales have increased\"),\n+ (c) the confidence caveat (\"at the 5% level\").\n- Step 3: Examples:\n+ Bad: \"Reject $$H_0$$.\"\n+ Good: \"There is sufficient evidence at the 5% significance level to conclude that the new drug is more effective than the standard treatment.\"\n+ Bad: \"$$H_0$$ is proved.\"\n+ Good: \"There is insufficient evidence at the 5% level to reject the claim that $$p = 0.4$$.\"\n\nHedge your claims. Never claim to have \"proven\" anything in statistics — all results are probabilistic.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "The p-value method and the critical region method are two approaches to hypothesis testing. Explain why they must always give the same conclusion. (3 steps)", "answer": "- Step 1: **P-value method**: assume $$H_0$$, compute $$P(\\text{data as extreme as or more than observed})$$, compare to $$\\alpha$$. Reject if p-value < $$\\alpha$$.\n- Step 2: **Critical region method**: compute in advance the set of values $$C$$ such that $$P(X \\in C | H_0) \\leq \\alpha$$. Reject if observed $$x \\in C$$.\n- Step 3: These must agree because:\n+ If $$x$$ is in the critical region, the tail from $$x$$ outward has probability ≤ $$\\alpha$$ (since $$C$$ is defined this way), so the p-value < $$\\alpha$$ → reject.\n+ If $$x$$ is not in the critical region, the tail from $$x$$ outward has probability > $$\\alpha$$, so the p-value > $$\\alpha$$ → don't reject.\n+ The two methods are logically equivalent — they're restating the same inequality.\n\nStrategic tip: use critical regions when the question asks for them or when doing multiple tests; use p-values for single observations in simple tests.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "In the context of hypothesis testing, what is meant by a \"conservative\" test? Why might we prefer a conservative test in some contexts? (2 steps)", "answer": "- Step 1: A conservative test is one where the actual significance level is less than or equal to the nominal (stated) level. For example, if we aim for 5% but achieve 3%, it's conservative.\n- Step 2: We might prefer conservative tests when the consequences of incorrectly rejecting H₀ (Type I error) are severe. By using a more stringent threshold, we reduce the chance of false positives. The trade-off is potentially more Type II errors (missing real effects), but in high-stakes situations, avoiding false alarms may be paramount.", "source": "MiniMax ②", "_id": "minimax_2_43"}, {"question": "A shop sells cars at rate 10/week. In 6 weeks they sold 75 (after price reductions). Why do we need an approximation here, and which one is appropriate? (4 steps)", "answer": "- Step 1: The time window has been extended to 6 weeks, so under $$H_0$$: $$Y \\sim \\text{Po}(60)$$ where $$60 = 6 \\times 10$$.\n- Step 2: Standard Poisson cumulative tables only go up to $$\\lambda = 10$$, so direct table lookup fails for $$\\lambda = 60$$.\n- Step 3: Since $$\\lambda = 60$$ is large ($$> 10$$), use the Normal approximation: $$Y \\approx N(60, 60)$$.\n- Step 4: Apply continuity correction: $$P(Y \\geq 75) \\approx P(W \\geq 74.5)$$ where $$W \\sim N(60, 60)$$. Standardize: $$Z = \\frac{74.5 - 60}{\\sqrt{60}}$$, then use standard Normal tables.\n\n+ Compare the resulting probability to $$\\alpha = 0.05$$ to decide.\n\nThis illustrates the need: without approximation, we'd face an intractable sum.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In a Poisson hypothesis test at 5%, you find both tail probabilities under $$H_0$$ exceed 0.025 — so no clean two-tailed critical region fits within 5%. What do you do? (3 steps)", "answer": "- Step 1: This happens when the discrete distribution has sparse probability mass — the jumps between consecutive tail probabilities are large.\n- Step 2: The exam convention (depending on wording):\n+ \"Closest to 0.025\" → pick the value where each tail is closest, even if sum exceeds 5%.\n+ \"Less than 0.025\" per tail → may give very small tail probabilities.\n+ Sometimes a critical region has one or both tails being EMPTY if probability is too small.\n- Step 3: Compute the actual significance level explicitly (sum of tail probabilities actually achieved), and report it. This may be well below 5% (say 3.2%) — the test is conservative.\n+ In rare cases with small $$\\lambda$$, the lower tail may not exist (only $$P(X \\leq 0)$$ may be > 0.025).\n\nAlways clearly state what critical region you're using and what the actual significance level is.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "For a binomial or Poisson hypothesis test with nominal significance level 5%, why is the *actual* significance level usually less than 5% — not exactly equal? (3 steps)", "answer": "- Step 1: Binomial and Poisson distributions are *discrete* — probability is placed at integer values only. The cumulative probability jumps in discrete steps as you move from one integer to the next.\n- Step 2: The nominal 5% usually falls *between* two adjacent cumulative probabilities. For example, $$P(X \\geq 7) = 0.0548$$ and $$P(X \\geq 8) = 0.0132$$ — neither equals 0.05.\n- Step 3: To stay conservative (actual ≤ nominal), we pick the critical region whose tail probability is the largest value still ≤ 0.05. In the example above, we'd pick $$X \\geq 8$$, giving an actual significance level of $$1.32\\%$$.\n+ This is inherent to discrete testing — there's no way to \"hit\" 5% exactly without using randomisation.\n+ Continuous distributions (like the normal) can achieve the exact significance level.\n\nConsequence: discrete tests tend to be slightly more conservative than nominal, giving you less frequent false rejections than $$\\alpha$$ suggests.", "source": "Op
