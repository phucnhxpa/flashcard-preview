niMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A company claims their machines produce only 5% defective items. A quality inspector samples 20 items and finds 3 defective. What are the appropriate null and alternative hypotheses for testing whether the defect rate has increased? (2 steps)", "answer": "- Step 1: The parameter p represents the probability that an item is defective. The null hypothesis represents the status quo (the claimed defect rate), so H₀: p = 0.05.\n\n- Step 2: Since we're testing whether the defect rate has increased (not decreased, and not just changed), this is a one-tailed test. The alternative hypothesis is H₁: p > 0.05, reflecting the inspector's concern that the true defect rate might be higher than claimed.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Example 3 from the textbook, for X ~ B(6, 0.35) testing H₀: p = 0.35 against H₁: p > 0.35 at 5% significance, why is the critical region X ≥ 5 rather than X ≥ 4? (2 steps)", "answer": "- Step 1: We need to find the smallest value where P(X ≥ k) < 0.05. Using the binomial tables or calculator: P(X ≥ 4) = 1 - P(X ≤ 3) = 1 - 0.8826 = 0.1174, which is > 0.05.\n\n- Step 2: However, P(X ≥ 5) = 1 - P(X ≤ 4) = 1 - 0.9777 = 0.0223, which is < 0.05. Therefore, X = 5 is the critical value, and the critical region is X ≥ 5. The actual significance level is 0.0223 (2.23%), which is less than our 5% threshold.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For a two-tailed binomial test with H₀: p = 0.25 against H₁: p ≠ 0.25 using n = 20 at the 5% significance level, explain how we find the lower critical region. (2 steps)", "answer": "- Step 1: For the lower tail, we need to find the smallest value such that P(X ≤ k) < 0.025 (since we split the 5% significance level between two tails).\n\n- Step 2: Using binomial tables for n = 20, p = 0.25: P(X ≤ 1) = 0.0248... which is < 0.025. But P(X ≤ 2) = 0.0913... which is > 0.025. Therefore, the lower critical region is X ≤ 1, with critical value 1. The upper tail would be found similarly.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A teacher claims that 70% of students pass her exam. A random sample of 30 students shows that 25 passed. Conduct a hypothesis test at the 5% significance level to determine if the pass rate is different from 70%. (3 steps)", "answer": "- Step 1: Set up hypotheses. Let p = proportion of students who pass. H₀: p = 0.7, H₁: p ≠ 0.7. This is a two-tailed test. The test statistic is X = 25 (number who passed).\n\n- Step 2: Under H₀, X ~ B(30, 0.7). Expected value = 30 × 0.7 = 21. Since observed value 25 > 21, consider the upper tail: P(X ≥ 25) = 1 - P(X ≤ 24). Using tables or calculator: P(X ≤ 24) ≈ 0.9957, so P(X ≥ 25) ≈ 0.0043.\n\n- Step 3: Compare to α/2 = 0.025. Since 0.0043 < 0.025, we reject H₀. There is sufficient evidence at the 5% level to conclude that the pass rate is different from 70%. The data suggests the pass rate may be higher than claimed.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A call center receives calls at a rate of λ = 3 per minute on average. After an advertising campaign, they record the number of calls in a 10-minute period and get 40 calls. Test at the 5% level whether the call rate has increased. (3 steps)", "answer": "- Step 1: Under the null hypothesis, for a 10-minute period, λ = 3 × 10 = 30. So X ~ Po(30). The observed value is 40. This is a one-tailed test (H₁: λ > 30).\n\n- Step 2: We need P(X ≥ 40) when X ~ Po(30). Using the normal approximation: X ~ N(30, 30) approximately. With continuity correction: P(X ≥ 39.5) = P(Z ≥ (39.5 - 30)/√30) = P(Z ≥ 1.74) ≈ 0.041.\n\n- Step 3: Since 0.041 < 0.05, we reject H₀. There is sufficient evidence at the 5% level to conclude that the call rate has increased after the advertising campaign.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A manufacturer knows that historically, 10% of their products are defective. After changing suppliers, they sample 50 products and find 8 defectives. Test at the 5% level whether the defect rate has changed. (3 steps)", "answer": "- Step 1: H₀: p = 0.1 (no change), H₁: p ≠ 0.1 (two-tailed test). Observed X = 8. Under H₀, X ~ B(50, 0.1). Expected value = 50 × 0.1 = 5.\n\n- Step 2: Since observed value (8) is greater than expected (5), consider upper tail. Using normal approximation: X ≈ N(5, 4.5). With continuity correction: P(X ≥ 7.5) = P(Z ≥ (7.5-5)/√4.5) = P(Z ≥ 1.18) ≈ 0.119.\n\n- Step 3: Since this is a two-tailed test, we compare 0.119 to α/2 = 0.025. 0.119 > 0.025, so we do not reject H₀. There is insufficient evidence at the 5% level to conclude that the defect rate has changed.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why might a researcher choose a 1% significance level instead of 5%? What are the trade-offs involved in choosing a higher or lower significance level? (2 steps)", "answer": "- Step 1: A lower significance level (like 1%) makes it harder to reject H₀, which reduces the probability of a Type I error (false positive). This is important when the consequences of wrongly rejecting a true null hypothesis are severe—for example, when approving a new drug that could be harmful.\n\n- Step 2: The trade-off is that a lower significance level increases the probability of Type II error (failing to detect a real effect). If we make it too hard to reject H₀, we might miss genuine discoveries. The choice depends on context: 5% is common in exploratory research, while 1% or lower is used when being wrong is costly.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "In Example 10 from the textbook, why can the binomial B(100, 0.04) be approximated by Poisson(4)? What condition must be satisfied for this approximation to be valid? (2 steps)", "answer": "- Step 1: The Poisson approximation to binomial is appropriate when n is large and p is small such that np < 5 (some texts say np < 10 as a rule of thumb). Here, n = 100 and p = 0.04, so np = 4.\n\n- Step 2: Since np = 4 < 5, the conditions for Poisson approximation are satisfied. The mean of the Poisson approximation equals np = 4, so X ≈ Po(4). This approximation makes finding probabilities much easier than calculating binomial probabilities for n = 100.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What is the difference between the \"p-value\" approach and the \"critical region\" approach to hypothesis testing? Do they always lead to the same conclusion? (2 steps)", "answer": "- Step 1: In the critical region approach, we determine before collecting data what values would lead to rejection (the critical region) based on our significance level. In the p-value approach, we calculate the probability of getting our observed result (or more extreme) assuming H₀ is true—this is the p-value.\n\n- Step 2: Both approaches will always lead to the same conclusion: if the p-value < significance level, we reject H₀; if p-value > significance level, we don't reject. The p-value gives more information (it tells us exactly how likely our result is under H₀), while the critical region approach is often simpler for decision-making.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A test has H₀: λ = 6 for a Poisson distribution against H₁: λ > 6. At the 5% level, the critical region is X ≥ 11. If the actual significance level is 3.2%, explain what this means. (2 steps)", "answer": "- Step 1: The stated significance level is what we aimed for (5%), but due to the discrete nature of the Poisson distribution, we couldn't get exactly 5% in the critical region.\n\n- Step 2: The actual significance level (3.2%) is the true probability of rejecting H₀ when it's actually true. This means if H₀: λ = 6 were correct, there's only a 3.2% chance we'd get a result in the critical region by random chance alone. Since 3.2% < 5%, our test is still valid—we've actually been more conservative than we needed to be.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is it logically incorrect to \"accept H₀\" in hypothesis testing? What should we say instead, and why? (2 steps)", "answer": "- Step 1: We should say \"fail to reject H₀\" rather than \"accept H₀\" because hypothesis testing doesn't prove that H₀ is true—it only shows that we don't have sufficient evidence to reject it.\n\n- Step 2: Our sample might be consistent with H₀, but that doesn't prove H₀ is correct. There could be other possible values of the parameter that our data is also consistent with. Saying \"fail to reject\" acknowledges this uncertainty and is more statistically accurate.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In a hypothesis test, if we double the sample size but keep everything else the same, what happens to the power of the test? Why? (2 steps)", "answer": "- Step 1: The power of a test is the probability of correctly rejecting H₀ when H₁ is true (i.e., detecting a real effect).\n\n- Step 2: Increasing the sample size generally increases the power of the test because it reduces the variability of our estimate of the parameter. With more data, we get a more precise estimate, making it easier to detect a genuine difference from the null value. This is why large samples are valuable in statistical testing.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "For testing H₀: p = 0.3 against H₁: p > 0.3 with n = 15 at the 10% significance level, find the critical region using the binomial distribution. Explain your reasoning. (3 steps)", "answer": "- Step 1: Under H₀, X ~ B(15, 0.3). We need to find the smallest k such that P(X ≥ k) < 0.10.\n\n- Step 2: Using binomial tables or calculator: P(X ≥ 7) = 1 - P(X ≤ 6) = 1 - 0.870 = 0.130. P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.931 = 0.069.\n\n- Step 3: Since P(X ≥ 8) = 0.069 < 0.10 but P(X ≥ 7) = 0.130 > 0.10, the critical value is 8. The critical region is X ≥ 8, with actual significance level = 6.9%.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A restaurant owner believes that 30% of customers order dessert. In a random sample of 25 customers, 12 ordered dessert. Test at the 5% level whether the proportion is different from 30%. (3 steps)", "answer": "- Step 1: Let p = proportion ordering dessert. H₀: p = 0.3, H₁: p ≠ 0.3 (two-tailed). Observed X = 12. Under H₀: X ~ B(25, 0.3), expected = 7.5.\n\n- Step 2: Since observed (12) > expected (7.5), consider upper tail. Using tables: P(X ≥ 12) = 1 - P(X ≤ 11) = 1 - 0.926 = 0.074.\n\n- Step 3: For two-tailed test, compare to α/2 = 0.025. Since 0.074 > 0.025, we do not reject H₀. There is insufficient evidence at the 5% level to conclude that the proportion of customers ordering dessert is different from 30%.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the context of hypothesis testing with the Poisson distribution, explain why we sometimes need to use the normal approximation when λ is large. (2 steps)", "answer": "- Step 1: When λ is large (typically λ > 25 or so), calculating Poisson probabilities becomes computationally intensive because you need to calculate many individual terms of the Poisson probability mass function.\n\n- Step 2: The Poisson distribution with large λ can be approximated by a normal distribution N(λ, λ) due to the central limit theorem. This makes calculations much simpler—we just need to find z-scores rather than summing many Poisson probabilities. This approximation becomes accurate when λ is sufficiently large.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A test statistic follows B(20, p). For testing H₀: p = 0.4 against H₁: p ≠ 0.4 at the 5% level, the critical regions are X ≤ 3 and X ≥ 14. What is the actual significance level of this test? (2 steps)", "answer": "- Step 1: The actual significance level is the sum of probabilities in both critical regions: P(X ≤ 3) + P(X ≥ 14) when p = 0.4.\n\n- Step 2: From tables: P(X ≤ 3) ≈ 0.0164 and P(X ≥ 14) = 1 - P(X ≤ 13) ≈ 1 - 0.9950 = 0.0050. Sum = 0.0164 + 0.0050 = 0.0214 or approximately 2.14%. This is less than the target 5%, making this a conservative test.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In hypothesis testing, what is the relationship between confidence intervals and hypothesis tests? If a (1-α)% confidence interval for p does not contain the null value p₀, what does this imply about the hypothesis test? (2 steps)", "answer": "- Step 1: There is a direct correspondence between hypothesis tests and confidence intervals. A two-tailed test at significance level α is equivalent to checking whether the (1-α)% confidence interval contains the null hypothesis value.\n\n- Step 2: If the confidence interval does not contain p₀, we reject H₀: p = p₀ at the α level. For example, if a 95% confidence interval for p is (0.42, 0.58) and we're testing H₀: p = 0.35, since 0.35 is not in the interval, we reject H₀ at the 5% significance level.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "Why is it important to check the assumptions of a hypothesis test before interpreting the results? What are the key assumptions for a binomial hypothesis test? (2 steps)", "answer": "- Step 1: If assumptions are violated, our p-values and conclusions may be invalid. The test assumes certain conditions about the data, and if these don't hold, the binomial (or Poisson) model may not be appropriate.\n\n- Step 2: Key assumptions for binomial hypothesis testing include: (1) independent trials, (2) fixed number of trials n, (3) constant probability of success p, and (4) two distinct outcomes. If these are violated (e.g., trials aren't independent), the results could be misleading.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In hypothesis testing with the binomial distribution, explain why we sometimes get a critical region that doesn't exactly match our significance level (e.g., we might have actual significance of 3.2% when we wanted 5%). (2 steps)", "answer": "- Step 1: This happens because the binomial distribution is discrete—it can only take integer values. We can't split probability exactly at our chosen threshold.\n\n- Step 2: We must choose whole numbers for our critical region. The best we can do is find the smallest integer where the probability crosses our threshold. This results in the actual significance level being different (usually smaller, making the test conservative) from our target level. This is an inherent feature of testing with discrete distributions.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A scientist tests whether a new fertilizer increases crop yield. She designs an experiment with treatment and control groups. How does this relate to the hypothesis testing framework we've learned? What are the hypotheses? (2 steps)", "answer": "- Step 1: This is a classic application of hypothesis testing. The scientist would define p as the probability of \"success\" (improved yield), with H₀: p = p₀ (the baseline success rate without fertilizer) and H₁: p > p₀ (the fertilizer improves yield).\n\n- Step 2: The experiment provides sample data—the number of successful crops in each group. The scientist would count how many plants with fertilizer achieved the desired yield, compare to the expected proportion, and use the binomial model (if conditions are met) to determine if the observed improvement is statistically significant or could have occurred by chance.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "For a one-tailed test with H₀: p = 0.5 against H₁: p > 0.5, would a result of X = 15 (out of 20) provide stronger evidence against H₀ than X = 75 (out of 100)? Explain your reasoning without doing detailed calculations. (2 steps)", "answer": "- Step 1: Intuitively, X = 15 out of 20 gives a sample proportion of 0.75, while X = 75 out of 100 gives 0.75 as well. Both have the same proportion, but the larger sample provides more information.\n\n- Step 2: With n = 20, the probability of getting 15 or more successes under p = 0.5 is about 0.020 (2%). With n = 100, getting 75 or more successes would be extremely unlikely (essentially 0%). The larger sample provides much stronger evidence against H₀ because it's much less likely to occur by chance when the null is true. This illustrates why larger samples give more precise tests.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is the difference between statistical significance and practical significance in hypothesis testing? Give an example where a result might be statistically significant but not practically significant. (2 steps)", "answer": "- Step 1: Statistical significance means the result is unlikely to have occurred by chance (given H₀ is true). Practical significance considers whether the effect size matters in the real world.\n\n- Step 2: For example, with a very large sample, you might detect a statistically significant difference in exam pass rates—say 70.1% vs 70.0%—but this 0.1% difference has no practical importance for policy decisions. The result is statistically significant (due to large n) but not practically significant. Researchers must consider both.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In hypothesis testing, if we change from a one-tailed test to a two-tailed test (keeping the same data and significance level), what happens to the probability of Type I error? What happens to the power? (2 steps)", "answer": "- Step 1: Switching from one-tailed to two-tailed increases the Type I error rate. In a one-tailed test at α = 0.05, we put all 5% in one tail. In a two-tailed test, we split it—typically about 2.5% in each tail—making it harder to reject in any direction.\n\n- Step 2: The power of the test decreases when switching to two-tailed because we're now requiring stronger evidence to reject H₀. If there's a genuine effect in one direction, splitting the significance level between two tails means we're less likely to detect it. This is the trade-off for being open to effects in either direction.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A medical researcher wants to test whether a new treatment is better than existing treatment (success rate 60%). She plans to use 30 patients. What considerations determine whether she should use a binomial model for her test statistic? (2 steps)", "answer": "- Step 1: The key considerations are: (1) Are the 30 patients independent trials? (2) Does each patient either succeed (recover) or fail (not recover)? (3) Is the probability of success constant at 60% if the null is true?\n\n- Step 2: If these conditions are met, the number of patients who recover can be modeled as X ~ B(30, p). She would set up H₀: p = 0.6 and H₁: p > 0.6 (one-tailed, since she wants to show improvement). She would then find the critical region and determine if her observed results fall in it.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is a hypothesis in the context of statistical hypothesis testing, and how does it differ from a hypothesis in everyday language? (2 steps)", "answer": "- Step 1: In statistics, a hypothesis is a formal statement about the value of a population parameter (like a probability p in a binomial distribution or a rate λ in a Poisson distribution). It makes a specific claim that can be tested using sample data.\n- Step 2: Unlike everyday usage where \"hypothesis\" might mean a rough guess, in statistics it must be precise enough to be tested mathematically—we define exactly what we're testing (e.g., H₀: p = 0.5) and what evidence would lead us to reject it.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In hypothesis testing, why do we need both a null hypothesis (H₀) and an alternative hypothesis (H₁)? Why can't we just test one claim directly? (3 steps)", "answer": "- Step 1: The null hypothesis H₀ represents the default position—it states what we assume to be true before collecting evidence (e.g., a coin is fair, a treatment has no effect). It's the status quo or baseline.\n- Step 2: The alternative hypothesis H₁ represents what we're investigating—whether there's evidence against our assumption. It defines what we'd conclude if H₀ turns out to be unlikely.\n- Step 3: We structure it this way because direct proof is impossible in statistics; instead, we see if the data would be unusually unlikely if H₀ were true. If sufficiently unlikely, we \"reject H₀\" in favor of H₁. This framework controls the probability of incorrectly rejecting a true null (Type I error).", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "A researcher claims a new drug improves recovery rates. What would be an appropriate null hypothesis and alternative hypothesis if the standard recovery probability is 0.4? Explain why you would choose these particular forms. (3 steps)", "answer": "- Step 1: H₀: p = 0.4 (the new drug has the same recovery probability as the standard treatment)\n- Step 2: H₁: p > 0.4 (the new drug improves recovery probability)\n+ The direction \">\" comes from the researcher's claim—they're asserting improvement, not just a change in either direction.\n- Step 3: We use H₀: p = 0.4 (not ≤ or ≥) because hypothesis testing requires a specific value under H₀ to calculate probabilities. The alternative captures the directional claim being investigated.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Explain why the test statistic in hypothesis testing comes from the sample data, while the null hypothesis is about the population parameter. What concept links these two? (2 steps)", "answer": "- Step 1: The null hypothesis makes a claim about an unknown population parameter (e.g., the true probability p across all potential trials). We can't measure the entire population, so we take a sample and calculate a test statistic from it.\n- Step 2: This embodies the core concept of statistical inference—we use sample data (test statistic) to make inferences about the population. The link is that assuming H₀ is true gives us a specific distribution for the test statistic, against which we compare our observed value.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What does the significance level represent in hypothesis testing? How does it relate to the probability of making a Type I error? (3 steps)", "answer": "- Step 1: The significance level (typically 5%, 1%, or 10%) is the threshold probability below which we consider observed data sufficiently unlikely under H₀ that we'd reject the null hypothesis. It's denoted α.\n- Step 2: Specifically, it's the maximum probability we're willing to accept of incorrectly rejecting H₀ when it is actually true—this is a Type I error.\n- Step 3: If we set α = 0.05, we're saying: \"If the probability of observing our data (or more extreme) is less than 5% assuming H₀ is true, then I'll reject H₀.\" This controls our error rate.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "For each of the following hypothesis pairs, state whether they describe a one-tailed or two-tailed test, and explain your reasoning: (a) H₀: p = 0.5, H₁: p > 0.5 (b) H₀: p = 0.3, H₁: p ≠ 0.3 (c) H₀: λ = 4, H₁: λ < 4 (3 steps)", "answer": "- Step 1: (a) One-tailed—the alternative specifies a direction (greater than), testing only if p has increased.\n- Step 2: (b) Two-tailed—the alternative uses \"≠\", meaning we're testing for any difference (either greater or less), not a specific direction.\n- Step 3: (c) One-tailed—the alternative specifies a direction (less than), testing only if λ has decreased. The key is whether H₁ includes \"<\" or \">\" (one-tailed) or \"≠\" (two-tailed).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A company tests whether a new manufacturing process reduces the proportion of faulty items from the historical 10%. They collect a sample and calculate the test statistic. Using a 5% significance level, they find P(X ≤ observed) = 0.03. What conclusion should they draw and why? (3 steps)", "answer": "- Step 1: Since 0.03 < 0.05 (the significance level), the probability of observing this result (or more extreme) assuming H₀ is true is less than our threshold.\n- Step 2: This means the observed data would be considered unusually unlikely if the null hypothesis were true.\n- Step 3: Therefore, we reject H₀ and conclude there is sufficient evidence at the 5% level to suggest the proportion of faulty items has decreased (supporting the company's belief).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is a critical region in hypothesis testing, and how is it different from an acceptance region? (2 steps)", "answer": "- Step 1: The critical region (or rejection region) is the set of values for the test statistic that would lead us to reject the null hypothesis. If our observed test statistic falls in this region, we reject H₀.\n- Step 2: The acceptance region is the complement—it contains values that would lead us to not reject H₀. Values in this region are considered consistent with what we'd expect if H₀ were true. The boundary between them is the critical value.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "When finding a critical value for a one-tailed binomial test with H₁: p > p₀ at 5% significance, explain why we look for the smallest value x where P(X ≥ x) < 0.05, rather than simply P(X ≥ x) = 0.05. (3 steps)", "answer": "- Step 1: We're looking for the first value x such that the cumulative probability of x or more falls below 0.05—this ensures the actual significance level doesn't exceed our target.\n- Step 2: Since the binomial distribution is discrete, we typically cannot achieve exactly 0.05. We choose the smallest x where P(X ≥ x) < 0.05 to be \"just significant\"—any smaller x would put us in the acceptance region.\n- Step 3: This gives us the critical region X ≥ x (or X ≤ x for lower tail tests). The actual significance level will be ≤ 0.05 but typically less (e.g., 0.032 or 0.021), which is the probability of incorrectly rejecting H₀.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "For a binomial test with n = 10, p = 0.3, and H₁: p > 0.3 at 5% significance level, the critical value is found to be 6. Explain what this means and state the critical region and acceptance region. (3 steps)", "answer": "- Step 1: The critical value of 6 means that if 6 or more \"successes\" are observed, we'd reject H₀.\n- Step 2: Critical region: X ≥ 6 (i.e., 6, 7, 8, 9, or 10 successes)\n+ Acceptance region: X ≤ 5 (i.e., 0, 1, 2, 3, 4, or 5 successes)\n- Step 3: The actual significance level would be P(X ≥ 6) when X ~ B(10, 0.3), which we can calculate from tables. This actual level (e.g., about 0.15 or whatever it computes to) is the true probability of a Type I error.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is the \"actual significance level\" of a hypothesis test, and why is it usually different from the nominal (stated) significance level? (2 steps)", "answer": "- Step 1: The actual significance level is the true probability of rejecting H₀ when it is actually true—i.e., the probability that our test statistic falls in the critical region assuming H₀ is true. This is also called the Type I error rate.\n- Step 2: It differs from the nominal (stated) level because discrete distributions (binomial, Poisson) cannot usually achieve exactly 5% or 1%. We pick the closest value, so the actual rate is typically slightly lower (rarely higher) than our target. For example, we might aim for 5% but achieve 3.2% actual significance.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In a two-tailed hypothesis test, why do we split the significance level between both tails? What would happen if we used the full significance level in only one tail? (3 steps)", "answer": "- Step 1: In a two-tailed test, H₁: p ≠ p₀ is true when p is either greater than OR less than p₀. Since we're testing for change in either direction, we need to account for both possibilities.\n- Step 2: We split α evenly (e.g., α/2 = 0.025 for each tail at 5% total) so that the total probability of incorrectly rejecting H₀ remains at our chosen significance level.\n- Step 3: If we used the full 5% in one tail, we'd have a 5% chance of incorrectly rejecting when the true parameter is actually higher, PLUS we'd be more likely to reject when it's lower (because we haven't accounted for that possibility fairly). This would inflate our overall error rate and create bias toward one direction.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For a two-tailed binomial test with n = 20, p = 0.4 at 5% significance, the lower critical value is found to be 4 and upper is 15. Write down the critical region, acceptance region, and explain what each means in context. (3 steps)", "answer": "- Step 1: Critical region: X ≤ 4 OR X ≥ 15 (i.e., extremely low or extremely high counts lead to rejection)\n- Step 2: Acceptance region: 5 ≤ X ≤ 14 (values in between are consistent with p = 0.4)\n- Step 3: If we observe 3 successes, we'd reject H₀ (evidence p < 0.4); if we observe 16, we'd reject (evidence p > 0.4). If we observe 8, we'd not reject (insufficient evidence of change either way).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "When carrying out a two-tailed test using binomial tables, explain the process of finding the lower critical value. Why do we look for P(X ≤ c) closest to α/2? (2 steps)", "answer": "- Step 1: For the lower tail, we find the largest value c such that P(X ≤ c) ≤ α/2. This ensures the probability of incorrectly rejecting in the lower tail doesn't exceed our allocation.\n- Step 2: We use ≤ rather than = because we need the probability to be at or below our target. The value we choose should have cumulative probability as close as possible to (but not exceeding) α/2—this gives us the most powerful test while maintaining our error rate.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A researcher conducts a test with H₀: p = 0.5, H₁: p ≠ 0.5 using n = 25 at 5% significance. They observe x = 4. Using the p-value approach, explain how they would make a decision, and why this is equivalent to the critical region approach. (3 steps)", "answer": "- Step 1: Calculate the p-value: Since observed 4 is less than expected 12.5, find P(X ≤ 4) under X ~ B(25, 0.5). This gives the probability of observing 4 or fewer successes.\n- Step 2: This p-value represents the probability of getting a result as extreme as (or more extreme than) what was observed, assuming H₀ is true.\n- Step 3: If this p-value is less than α/2 = 0.025 (for a two-tailed test), we reject H₀. This is mathematically equivalent to checking whether the observed value falls in the critical region—both approaches use the same underlying probability calculations.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A manufacturer claims their defective rate is 8%. A quality inspector samples 20 items and finds 5 defectives. Conduct a hypothesis test at 5% significance to determine if there's evidence the rate is different from 8%. State your hypotheses, method, and conclusion. (4 steps)", "answer": "- Step 1: H₀: p = 0.08, H₁: p ≠ 0.08. Test statistic: X = number of defectives in n = 20. Model: X ~ B(20, 0.08) assuming H₀ true.\n- Step 2: Expected value = 20 × 0.08 = 1.6. Observed = 5, which is higher than expected, so consider upper tail: P(X ≥ 5) = 1 - P(X ≤ 4).\n- Step 3: From binomial tables, P(X ≤ 4) ≈ (for p = 0.08, n = 20, need values from tables—using calculator or approximation). P(X ≥ 5) ≈ 0.001 or similar (very small).\n- Step 4: Since P(X ≥ 5) < 0.025 (half of 5% for two-tailed), we reject H₀. There IS evidence the defect rate differs from 8%.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What is the fundamental difference between testing a binomial proportion and testing a Poisson rate parameter? In what way are they similar? (3 steps)", "answer": "- Step 1: For binomial, we test the probability parameter p (or proportion) in B(n, p)—the number of \"successes\" in n independent Bernoulli trials.\n- Step 2: For Poisson, we test the mean/rate parameter λ in Po(λ)—the average number of events in a given interval (time, space, etc.).\n- Step 3: They are similar in structure: both are discrete distributions where we assume a specific parameter value under H₀, then calculate probabilities of observing our test statistic (or more extreme) to see if it's sufficiently unlikely. The hypothesis testing framework is identical; only the underlying distribution differs.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "For a Poisson hypothesis test with H₀: λ = 3, H₁: λ > 3 at 5% significance, and observed x = 8, explain how to conduct the test using the critical region method. What is the key difference from binomial testing? (3 steps)", "answer": "- Step 1: Find critical region by finding smallest c where P(X ≥ c) < 0.05 when X ~ Po(3). Look at Poisson cumulative tables or calculate directly.\n- Step 2: P(X ≥ 8) = 1 - P(X ≤ 7). From Poisson tables (λ = 3), find P(X ≤ 7) ≈ 0.988, so P(X ≥ 8) ≈ 0.012 < 0.05. So critical value is 8, critical region X ≥ 8.\n- Step 3: Since observed x = 8 falls in the critical region (equal to critical value), we reject H₀. The key difference from binomial: Poisson tables typically only go up to λ = 10, so for larger λ we'd need to use a normal approximation or calculator.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A hospital records incoming emergency calls. Historically, they receive 2.5 calls per hour on average. After a new system is implemented, they record 15 calls in a 4-hour period. Test at 5% significance whether the average rate has changed. (4 steps)", "answer": "- Step 1: H₀: λ = 2.5 per hour (unchanged), H₁: λ ≠ 2.5 per hour (changed). For 4-hour period, λ_total = 4 × 2.5 = 10. Let X ~ Po(10).\n- Step 2: Expected value = 10, observed = 15 (greater than expected). For two-tailed test, find upper tail probability: P(X ≥ 15) = 1 - P(X ≤ 14).\n- Step 3: From Poisson tables (λ = 10): P(X ≤ 14) ≈ 0.916, so P(X ≥ 15) ≈ 0.084. This is NOT less than 0.025.\n- Step 4: Since 0.084 > 0.025 (and considering lower tail would also not be significant), we do not reject H₀. Insufficient evidence at 5% level that the rate has changed.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Under what conditions can we use a normal approximation to the binomial distribution for hypothesis testing? Why do these conditions matter? (3 steps)", "answer": "- Step 1: The normal approximation B(n, p) ≈ N(np, np(1-p)) is appropriate when: np > 5 AND n(1-p) > 5 (some sources use 10 instead of 5 for better accuracy).\n- Step 2: These conditions ensure the binomial distribution is sufficiently symmetric and bell-shaped for the normal to be a good approximation. When p is very close to 0 or 1, the binomial is heavily skewed, and the normal approximation fails.\n- Step 3: When using the approximation in hypothesis testing, we apply a continuity correction (e.g., P(X ≥ x) ≈ P(W ≥ x - 0.5) where W ~ Normal) to account for the discrete nature of the binomial.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A company tests whether their proportion of defective items has increased from the historical 3%. They sample 200 items and find 12 defectives. Using a normal approximation, test at 5% significance. (4 steps)", "answer": "- Step 1: H₀: p = 0.03, H₁: p > 0.03. Under H₀: X ~ B(200, 0.03), approximated by X ≈ N(6, 5.82). Test statistic x = 12.\n- Step 2: Apply continuity correction: P(X ≥ 12) ≈ P(W ≥ 11.5) where W ~ N(6, 5.82), standard deviation = √5.82 ≈ 2.414.\n- Step 3: Calculate z = (11.5 - 6) / 2.414 ≈ 2.28. From standard normal tables, P(Z ≥ 2.28) ≈ 0.0113.\n- Step 4: Since 0.0113 < 0.05, we reject H₀. There is evidence at 5% level that the defect rate has increased.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For large n and small p, what alternative approximation can be used instead of the normal approximation to binomial? Explain why this works and when it's appropriate. (3 steps)", "answer": "- Step 1: When n is large and p is small (typically np < 5), we can approximate B(n, p) using Poisson(λ = np).\n- Step 2: This works because as p → 0 while np stays constant, the binomial distribution converges to Poisson. The Poisson has a single parameter λ = np capturing both n and p.\n- Step 3: This is appropriate when np < 5 (some say < 10) and p is small (typically p < 0.1). It avoids the skewness issues of normal approximation when p is very small.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A call center receives on average 3 calls per 10-minute interval. After an advertising campaign, they record 28 calls in an 80-minute period. Test at 5% significance whether the rate has increased. Use an appropriate approximation. (4 steps)", "answer": "- Step 1: H₀: λ = 3 per 10 min (or 24 per 80 min), H₁: λ > 3 per 10 min. For 80 min: λ = 8 × 3 = 24. X ~ Po(24).\n- Step 2: Observed = 28, which is greater than expected 24. Need P(X ≥ 28) when X ~ Po(24).\n- Step 3: Using Poisson approximation with large λ, can use normal: X ≈ N(24, 24). With continuity correction: P(X ≥ 28) ≈ P(W ≥ 27.5) where W ~ N(24, 24).\n- Step 4: z = (27.5 - 24) / √24 = 3.5/4.899 ≈ 0.714. P(Z ≥ 0.714) ≈ 0.238. Since 0.238 > 0.05, do not reject H₀. Insufficient evidence rate has increased.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A medical researcher tests whether a new treatment is better than the standard (which works 60% of the time). They treat 15 patients and observe 12 successes. Conduct the test at 5% significance. (4 steps)", "answer": "- Step 1: H₀: p = 0.6, H₁: p > 0.6 (one-tailed—we're testing for improvement). X ~ B(15, 0.6). Observed x = 12.\n- Step 2: Calculate P(X ≥ 12) = 1 - P(X ≤ 11). From binomial tables with n=15, p=0.6: P(X ≤ 11) ≈ 0.969. So P(X ≥ 12) ≈ 0.031.\n- Step 3: Since 0.031 < 0.05, the result is statistically significant at the 5% level.\n- Step 4: We reject H₀ and conclude there is evidence the new treatment has a higher success rate than 60%.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In a two-tailed test, a student calculates the p-value for the upper tail as 0.04 and says \"the result is significant at 5%.\" What is wrong with this statement for a two-tailed test? (2 steps)", "answer": "- Step 1: For a two-tailed test, we must compare the p-value to α/2, not α. We need to account for both tails.\n- Step 2: If the upper tail probability is 0.04, this is GREATER than 0.025 (α/2 = 0.025), so it's NOT significant at 5% for a two-tailed test. The student would need to be testing one-tailed, or compare to 0.025 for two-tailed.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain why we always assume the null hypothesis is true when calculating the p-value or critical region. What would happen if we didn't make this assumption? (2 steps)", "answer": "- Step 1: The p-value is defined as P(observing the test statistic or more extreme | H₀ is true). We're asking: \"How likely is this data if the null hypothesis were correct?\"\n- Step 2: Without assuming H₀ is true, we cannot determine what probability distribution the test statistic should follow, and thus cannot calculate any probabilities to compare against. We'd have no reference distribution to judge whether our observed value is \"unusual.\"", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What is the relationship between confidence intervals and hypothesis testing? If a 95% confidence interval for p does not contain the value p₀, what does this imply about a two-tailed test at 5% significance? (3 steps)", "answer": "- Step 1: There is a duality: testing H₀: p = p₀ at significance level α is equivalent to checking whether p₀ falls outside the (1-α) confidence interval for p.\n- Step 2: If the 95% CI doesn't contain p₀, then at the 5% significance level, we'd reject H₀: p = p₀.\n- Step 3: This works because both procedures use the same standard error and critical values (z = 1.96 for 95% CI / 5% significance). They are two sides of the same coin.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "A manufacturer tests H₀: p = 0.1 against H₁: p < 0.1 at 5% significance with n = 20. The critical value is found to be 0. Write down the critical region and acceptance region. What does it mean if the observed number of defectives is 0? (3 steps)", "answer": "- Step 1: Critical region: X ≤ 0 (i.e., 0 defectives)\n+ Acceptance region: X ≥ 1 (i.e., 1 or more defectives)\n- Step 2: If we observe 0 defectives, we reject H₀ at the 5% level and conclude p < 0.1 (evidence of improvement).\n- Step 3: The actual significance level is P(X ≤ 0) = (1 - p)²⁰ = 0.9²⁰ ≈ 0.122 (wait, this is greater than 0.05!). Actually, we'd need to recalculate—critical value may need to be higher. The point is: 0 defectives may not always be significant if p under H₀ is not small enough.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Why is it important to state the conclusion of a hypothesis test in the context of the problem, rather than just saying \"reject H₀\" or \"do not reject H₀\"? (2 steps)", "answer": "- Step 1: Statistical conclusions are about evidence, not practical significance. \"Reject H₀\" only tells us the data provided sufficient evidence against our assumption—it doesn't tell us what the result means in the real world.\n- Step 2: For example, \"There is evidence at 5% significance that the proportion of defective items has decreased\" is meaningful. Just \"reject H₀\" could mean anything. Context also helps identify whether the result is practically important, not just statistically significant (e.g., a tiny improvement might be statistically significant with large n but not practically meaningful).", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A researcher conducts 20 hypothesis tests at the 5% significance level. What is the probability that at least one test incorrectly rejects a true null hypothesis? What does this illustrate about multiple testing? (3 steps)", "answer": "- Step 1: Assuming independence, the probability of NOT incorrectly rejecting in each test is 0.95. For 20 tests: P(no Type I errors) = 0.95²⁰ ≈ 0.358.\n- Step 2: Therefore, P(at least one Type I error) = 1 - 0.358 ≈ 0.642 (64.2%).\n- Step 3: This illustrates the problem with multiple testing: even if all null hypotheses are true, the chance of finding at least one \"significant\" result is very high. This is why we should be cautious about multiple comparisons and may need to adjust significance levels (e.g., Bonferroni correction).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "What is the difference between a Type I error and a Type II error in hypothesis testing? Which one is controlled by the significance level? (2 steps)", "answer": "- Step 1: Type I error: Rejecting H₀ when it is actually true (false positive). Type II error: Failing to reject H₀ when it is actually false (false negative).\n- Step 2: The significance level (α) controls the Type I error rate—we choose the maximum probability of incorrectly rejecting H₀. Type II error rate (denoted β) depends on the sample size and the \"distance\" between the true parameter and the hypothesized value. The power of a test is 1-β.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In hypothesis testing, does failing to reject H₀ prove that H₀ is true? Explain your reasoning. (2 steps)", "answer": "- Step 1: No—failing to reject H₀ simply means there isn't sufficient evidence against it given our data and significance level. It doesn't prove H₀ is true.\n- Step 2: This is the distinction between \"proof\" and \"evidence.\" We might have failed to detect an effect because our sample was too small, the effect exists but is too subtle, or simply due to random variation. The correct interpretation is \"we cannot reject H₀ based on this evidence,\" not \"H₀ is true.\"", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "For a Poisson test with H₀: λ = 5, H₁: λ ≠ 5 at 5% significance, explain why we might need to use a normal approximation even when λ is moderate (e.g., λ = 5). (2 steps)", "answer": "- Step 1: While Poisson with λ = 5 is in tables, finding critical regions for two-tailed tests requires checking multiple cumulative probabilities. When λ isn't in the tables, or for larger λ values, calculation becomes tedious.\n- Step 2: Additionally, the normal approximation Po(λ) ≈ N(λ, λ) becomes reasonably accurate for λ > 10 or so. For smaller λ, we can still use it with continuity correction, but it may be less accurate. The key is: for larger λ values where tables are unavailable or calculations are complex, the approximation provides a practical solution.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "When testing H₀: p = 0.5 against H₁: p ≠ 0.5 with n = 100 using normal approximation, the critical z-values are ±1.96. Explain where these come from and what they represent. (2 steps)", "answer": "- Step 1: For a two-tailed test at 5% significance, we split α into two tails of 2.5% each. The z-value that leaves 2.5% in each tail is ±1.96 (from standard normal tables: P(Z > 1.96) = 0.025).\n- Step 2: These are the critical values for the standardized test statistic Z = (X - np) / √(np(1-p)). If |Z| > 1.96, we reject H₀. They represent how many standard deviations our observed value can be from the expected before we consider it \"too unlikely\" under H₀.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A quality control engineer samples 50 items and finds 3 defectives. Test at 5% whether the defect rate has changed from the historical 10%. Use an appropriate approximation. (4 steps)", "answer": "- Step 1: H₀: p = 0.1, H₁: p ≠ 0.1. Under H₀: X ~ B(50, 0.1), expected = 5. Observed = 3.\n- Step 2: Since np = 5 and n(1-p) = 45, both > 5, normal approximation is reasonable. X ≈ N(5, 4.5), sd = √4.5 ≈ 2.121.\n- Step 3: Using continuity correction, for lower tail: P(X ≤ 3) ≈ P(W < 3.5). z = (3.5 - 5) / 2.121 ≈ -0.707. P(Z < -0.707) ≈ 0.24.\n- Step 4: For two-tailed test, compare 0.24 to α/2 = 0.025. Since 0.24 > 0.025, we do not reject H₀. Insufficient evidence that the defect rate has changed from 10%.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Explain the intuition behind why we require np > 5 and n(1-p) > 5 for the normal approximation to binomial to work well. What does this condition ensure about the distribution? (3 steps)", "answer": "- Step 1: The binomial distribution is discrete and bounded by 0 and n. For the normal (a continuous, unbounded distribution) to approximate it well, the distribution needs to be roughly symmetric and bell-shaped.\n- Step 2: When p = 0.5, the binomial is perfectly symmetric regardless of n. As p moves away from 0.5, the distribution becomes increasingly skewed. The conditions np > 5 and n(1-p) > 5 ensure we have enough \"mass\" on both sides of the distribution to approximate it with a symmetric normal curve.\n- Step 3: Essentially, these conditions ensure the mean is far enough from both 0 and n that the binomial doesn't look like a skewed distribution. If np < 5, the distribution is piled up near 0, making normal approximation poor.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "A test claims to be significant at the 1% level, but upon inspection, the actual significance level is 3%. Explain why this might happen and why it matters. (2 steps)", "answer": "- Step 1: This happens because discrete distributions (binomial, Poisson) cannot usually achieve exact significance levels. We pick the closest value, so the actual level (probability of Type I error) differs from the nominal (stated) level.\n- Step 2: It matters because when we say \"significant at 1%,\" we're claiming a 1% Type I error rate, but the true error rate is 3%. This means we're actually more likely to reject a true null than we claimed. For important decisions, knowing the actual significance level is crucial for accurate interpretation.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In Example 4 from the textbook with X ~ B(40, p), H₀: p = 0.25, H₁: p ≠ 0.25 at 2% significance, the lower critical value is 3 and upper is 18. Verify that the probability in each tail is approximately 1%, and explain why we don't need them to be exactly 1%. (3 steps)", "answer": "- Step 1: From tables: P(X ≤ 3) ≈ 0.0047, which is less than 1% (0.01). P(X ≥ 18) = 1 - P(X ≤ 17) ≈ 1 - 0.9884 = 0.0116, which is close to 1%.\n- Step 2: The lower tail is slightly LESS than 1%, upper tail slightly MORE than 1%. They are as close as possible to 1% given the discrete nature of the distribution.\n- Step 3: We don't need exact 1% because: (1) it's impossible with discrete distributions, and (2) the total actual significance level (0.0047 + 0.0116 = 0.0163 ≈ 1.63%) is still less than 2%, so we maintain our error rate constraint.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Why is it conceptually important that hypothesis testing is about weighing evidence against H₀, rather than proving H₀ is false? How does this affect how we interpret \"insufficient evidence\"? (2 steps)", "answer": "- Step 1: In the legal principle \"innocent until proven guilty,\" not proving guilt doesn't mean proven innocent—it means the evidence wasn't strong enough. Similarly, \"fail to reject H₀\" means the evidence against it wasn't strong enough, not that H₀ is proven true.\n- Step 2: \"Insufficient evidence\" is a statement about our data, not a statement about the truth of H₀. Our test might have low power (be insensitive to detect real effects), or the effect might exist but be too small for our sample to detect. This nuance is critical for proper interpretation.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A supermarket wants to test whether the proportion of customers buying milk has changed from the historical 40%. They sample 100 customers and find 35 bought milk. Conduct the test at 5% significance using an appropriate method. (4 steps)", "answer": "- Step 1: H₀: p = 0.4, H₁: p ≠ 0.4. Under H₀: X ~ B(100, 0.4), expected = 40. Observed = 35.\n- Step 2: Since np = 40 and n(1-p) = 60, both > 5, normal approximation is appropriate. X ≈ N(40, 24), sd = √24 ≈ 4.899.\n- Step 3: Using continuity correction, for lower tail: P(X ≤ 35) ≈ P(W < 35.5). z = (35.5 - 40) / 4.899 ≈ -0.918. P(Z < -0.918) ≈ 0.179.\n- Step 4: For two-tailed test, compare 0.179 to α/2 = 0.025. Since 0.179 > 0.025, we do not reject H₀. Insufficient evidence that the proportion has changed from 0.4.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What is the relationship between sample size and hypothesis testing power? Why does increasing n make it easier to detect a real effect? (3 steps)", "answer": "- Step 1: Power is the probability of correctly rejecting H₀ when H₁ is true (i.e., detecting a real effect). Larger samples generally increase power.\n- Step 2: With larger n, the standard error (standard deviation of the sampling distribution) decreases: SE = √(p(1-p)/n). This means the distribution of the test statistic becomes narrower.\n- Step 3: A narrower distribution means the observed value is more likely to fall in the critical region when H₁ is true (since the distribution under H₁ is shifted away from H₀). Also, smaller standard errors make it easier for the observed value to be \"unusual\" under H₀, lowering p-values for true effects.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "For a hypothesis test, explain why we might prefer using the critical region method over the p-value method, or vice versa. What information does each provide? (2 steps)", "answer": "- Step 1: Critical region method: Pre-determines the decision rule before seeing data. Once we find the critical value, we simply check if our observation falls in it. It gives a clear accept/reject decision but doesn't tell us \"how significant\" the result is.\n- Step 2: P-value method: Calculates the probability of observing data as extreme as (or more extreme than) what we got, assuming H₀ is true. This tells us the \"strength of evidence\" against H₀—the smaller the p-value, the stronger the evidence. It's more informative but requires calculation after seeing data.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": true}, {"question": "A researcher claims their test is \"highly significant\" with p = 0.001. Explain why this phrase can be misleading and what a more accurate interpretation would be. (2 steps)", "answer": "- Step 1: \"Highly significant\" suggests the result is important or has large practical importance, which may not be true. Statistical significance only tells us about the evidence against H₀—it says nothing about the magnitude or practical importance of an effect.\n- Step 2: A p-value of 0.001 means that if H₀ were true, there's only a 0.1% chance of observing data this extreme. This is strong evidence against H₀, but the actual effect could be trivial in practical terms (especially with very large samples, tiny differences can be \"significant\"). Proper interpretation: \"Strong evidence against H₀; further investigation of practical significance is warranted.\"", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "In the context of hypothesis testing, what is meant by a \"conservative\" test? Why might we prefer a conservative test in some contexts? (2 steps)", "answer": "- Step 1: A conservative test is one where the actual significance level is less than or equal to the nominal (stated) level. For example, if we aim for 5% but achieve 3%, it's conservative.\n- Step 2: We might prefer conservative tests when the consequences of incorrectly rejecting H₀ (Type I error) are severe. By using a more stringent threshold, we reduce the chance of false positives. The trade-off is potentially more Type II errors (missing real effects), but in high-stakes situations, avoiding false alarms may be paramount.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": true}, {"question": "A company tests whether a new website design increases conversion rate from the historical 5%. They get 8 conversions out of 100 visitors. At 5% significance, test using the critical region method with binomial tables. (4 steps)", "answer": "- Step 1: H₀: p = 0.05, H₁: p > 0.05. Test statistic: X = conversions in n = 100. Under H₀: X ~ B(100, 0.05), expected = 5.\n- Step 2: Find critical region: need smallest c where P(X ≥ c) < 0.05. Using Poisson approximation (np = 5 < 5): X ≈ Po(5). From tables: P(X ≥ 10) = 1 - P(X ≤ 9) ≈ 1 - 0.968 = 0.032 < 0.05. So critical value is 10, critical region X ≥ 10.\n- Step 3: Observed X = 8, which is NOT in the critical region (8 < 10).\n- Step 4: We do not reject H₀. Insufficient evidence at 5% level that the conversion rate has increased.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "Why is the choice between one-tailed and two-tailed tests important for determining the critical region? What happens if you choose the wrong type? (3 steps)", "answer": "- Step 1: One-tailed tests put all the significance level in one tail (e.g., 5% in the upper tail for H₁: p > p₀), while two-tailed tests split it (2.5% in each tail for a 5% test).\n- Step 2: If you use a one-tailed test when you should use two-tailed, you're more likely to reject H₀ (higher power for detecting effects in that direction, but inflated Type I error for other directions). If you use two-tailed when one-tailed is appropriate, you may miss real effects (reduced power).\n- Step 3: The choice should be made based on the research question BEFORE collecting data. Using the \"wrong\" test essentially answers a different question than intended and can lead to incorrect conclusions or accusations of data-snooping.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For a Poisson distribution test, explain how you would determine whether to use the lower tail, upper tail, or both tails when finding critical regions. (2 steps)", "answer": "- Step 1: Look at your observed value relative to the expected value (λ). If observed > λ, you're testing for an increase, so use upper tail. If observed < λ, you're testing for a decrease, so use lower tail.\n- Step 2: For two-tailed tests (H₁: λ ≠ λ₀), you always consider both tails—the expected value is λ, and if your observed value is far from it in either direction, that's evidence against H₀. The expected value acts as the center: values much lower than λ suggest λ < λ₀; values much higher suggest λ > λ₀.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A hospital tests whether their infection rate differs from the national rate of 20%. They sample 20 patients and find 8 infections. Test at 5% significance using both the critical region method and p-value method, showing they give the same conclusion. (4 steps)", "answer": "- Step 1: H₀: p = 0.2, H₁: p ≠ 0.2. Under H₀: X ~ B(20, 0.2), expected = 4. Observed = 8.\n- Step 2: P-value method: Since observed > expected, consider upper tail: P(X ≥ 8) = 1 - P(X ≤ 7). From tables: P(X ≤ 7) ≈ 0.968, so P(X ≥ 8) ≈ 0.032.\n- Step 3: Two-tailed p-value = 2 × 0.032 = 0.064 (or use exact binomial). Compare to 0.05: 0.064 > 0.05, so do not reject.\n- Step 4: Critical region method: Find critical values where each tail probability ≈ 0.025. Lower: X ≤ 0 (P ≈ 0.012); Upper: X ≥ 8 (P ≈ 0.032, close to 0.025). Observed X = 8 is at the boundary. Since 0.032 > 0.025, not in critical region. Same conclusion: insufficient evidence to reject H₀.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "What is the difference between statistical significance and practical significance? Can a result be statistically significant but not practically significant? (2 steps)", "answer": "- Step 1: Statistical significance tells us whether an observed effect is likely due to something real (not just chance). Practical significance asks whether the effect is large enough to matter in the real world.\n- Step 2: Yes, with large samples, tiny effects can be statistically significant (even with p < 0.001) but have no practical importance. For example, a new drug that improves recovery from 80.0% to 80.1% might be \"significant\" with 10,000 patients but the 0.1% improvement is clinically meaningless. Always consider both.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "A gardener tests whether a new fertilizer increases the proportion of seeds that germinate from the historical 70%. She plants 25 seeds and 21 germinate. Conduct the test at 5% significance. (4 steps)", "answer": "- Step 1: H₀: p = 0.7, H₁: p > 0.7 (one-tailed—we're testing for improvement). Under H₀: X ~ B(25, 0.7), expected = 17.5. Observed = 21.\n- Step 2: Calculate P(X ≥ 21) = 1 - P(X ≤ 20). From tables (or calculator): P(X ≤ 20) ≈ 0.996. So P(X ≥ 21) ≈ 0.004.\n- Step 3: Since 0.004 < 0.05, the result is statistically significant at the 5% level.\n- Step 4: We reject H₀ and conclude there is evidence that the fertilizer increases the germination rate above 70%. The probability of seeing 21 or more successes if p = 0.7 is only 0.4%, very unlikely under H₀.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "In hypothesis testing, what does it mean when we say a test is \"level α\" or \"has size α\"? How does this relate to the actual significance level? (2 steps)", "answer": "- Step 1: Saying a test is \"level α\" or \"has size α\" means that the probability of rejecting H₀ when it is true (Type I error rate) is at most α.\n- Step 2: For discrete distributions, we often can't achieve exactly α, so we achieve some actual level α* ≤ α. We say the test is \"level α\" meaning we control the error rate to not exceed our target. The actual significance level is α*, which may be less than α.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "Explain why for a fixed significance level α, a one-tailed test has more power to detect an effect in the specified direction than a two-tailed test. (2 steps)", "answer": "- Step 1: In a one-tailed test at α = 0.05, all 5% goes to detecting effects in one direction (e.g., increase). In a two-tailed test, only 2.5% goes to each direction.\n- Step 2: This means the critical value for one-tailed is less extreme (closer to the null value) than for two-tailed. For the same observed effect size, you're more likely to fall into the critical region with a one-tailed test, giving higher power for detecting effects in the predicted direction.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": true}, {"question": "When using the Poisson distribution for hypothesis testing, explain why we multiply the rate parameter by the time/space interval when formulating our hypotheses. (2 steps)", "answer": "- Step 1: The Poisson distribution models the number of events in a fixed interval. The parameter λ represents the mean number of events PER interval.\n- Step 2: If we change the interval (e.g., from 10 minutes to 30 minutes), we must scale λ proportionally. If the rate is 2 per 10 minutes, then for 30 minutes it's 3 × 2 = 6. The hypothesis about the rate per unit time/space must be converted to the actual interval we're observing to use the Poisson tables correctly.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "A researcher conducts a test and obtains a p-value of 0.23. They claim this proves the null hypothesis is true. What is wrong with this interpretation? (2 steps)", "answer": "- Step 1: A p-value of 0.23 means there's a 23% chance of observing data this extreme (or more extreme) assuming H₀ is true. This is not low enough to reject H₀, but it certainly doesn't \"prove\" H₀ is true.\n- Step 2: Failing to reject H₀ could mean many things: H₀ might be true, OR H₀ might be false but our test lacked power to detect the effect. The p-value tells us about the evidence against H₀, not the evidence for it. A high p-value simply means the data is consistent with H₀—nothing more.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": true}, {"question": "For binomial hypothesis testing, explain why we can sometimes reject H₀ for both very low AND very high observed counts in a two-tailed test, even when we're only interested in one direction. (2 steps)", "answer": "- Step 1: In a two-tailed test with H₁: p ≠ p₀, we're testing for any difference, not a specific direction. Both extremely low and extremely high counts provide evidence that p differs from p₀.\n- Step 2: If we're only interested in one direction (say, testing if p increased), we should use a one-tailed test. Using two-tailed when we only care about increase wastes half our significance level on the opposite tail, making it harder to detect the increase we care about.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "A teacher claims that 80% of students pass his exam. A sample of 30 students shows 21 passes. Test this claim at 5% significance, explaining whether you use one-tailed or two-tailed and why. (4 steps)", "answer": "- Step 1: The claim is that p = 0.8. We're testing whether the data contradicts this. Since the claim is specific (equal to 0.8), and we're testing if it's different, we use two-tailed: H₀: p = 0.8, H₁: p ≠ 0.8.\n- Step 2: Under H₀: X ~ B(30, 0.8), expected = 24. Observed = 21, which is less than expected.\n- Step 3: P-value: P(X ≤ 21) = P(X ≤ 21). From tables: P(X ≤ 21) ≈ 0.29 (need to check). Two-tailed p-value = 2 × P(X ≤ 21) if lower tail.\n- Step 4: If p-value > 0.05, we do not reject H₀. Insufficient evidence to say the pass rate is different from 80%. (Note: We use two-tailed because we're testing the claim \"is it 80%?\" not \"is it less than 80%?\" or \"is it greater than 80%?\")", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "What is the purpose of a continuity correction when using normal approximation for binomial Poisson hypothesis testing? Provide an example of how it's applied. (2 steps)", "answer": "- Step 1: The normal approximation treats a discrete distribution as continuous. The continuity correction accounts for this by adjusting the boundary by 0.5, capturing the \"jump\" from one discrete value to the next.\n- Step 2: For P(X ≥ k), we use P(W ≥ k - 0.5). For P(X ≤ k), we use P(W ≤ k + 0.5). Example: P(X ≥ 8) with X ~ B(20, 0.3) becomes P(W ≥ 7.5) where W ~ N(6, 4.2). This gives a more accurate approximation than using 8.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "A test has power of 0.8 at a particular alternative value. Explain what this means and what factors influence the power of a hypothesis test. (3 steps)", "answer": "- Step 1: A power of 0.8 means that if the alternative hypothesis is true (with that specific parameter value), there's an 80% chance we will correctly reject H₀ and detect the effect.\n- Step 2: Factors influencing power: (1) Sample size n—larger samples increase power; (2) Effect size—the larger the true deviation from H₀, the easier to detect; (3) Significance level α—higher α gives higher power but more Type I errors; (4) One-tailed vs two-tailed—one-tailed has more power for detecting effects in the predicted direction.\n- Step 3: Power analysis is important for study design—before collecting data, we can calculate needed sample size to achieve desired power for detecting a minimum meaningful effect.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "Why might a researcher choose a 1% significance level over a 5% level, even though it makes it harder to find significant results? (2 steps)", "answer": "- Step 1: A stricter significance level (1% vs 5%) makes it harder to reject H₀, meaning we need stronger evidence to claim significance.\n- Step 2: Researchers might choose 1% when: (1) the consequences of a false positive are severe (e.g., claiming a new drug works when it doesn't); (2) they're making a bold claim that warrants more stringent evidence; or (3) they're doing exploratory analysis and want to avoid too many false leads. The lower Type I error rate comes at the cost of higher Type II error rate (lower power).", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "In hypothesis testing with the Poisson distribution, explain why some λ values cannot be found directly in standard tables and what alternatives are available. (2 steps)", "answer": "- Step 1: Standard Poisson tables typically only go up to λ = 10 or so. For larger λ values, looking up cumulative probabilities becomes impractical or impossible.\n- Step 2: Alternatives include: (1) using a calculator with Poisson functions; (2) using normal approximation Po(λ) ≈ N(λ, λ) with continuity correction for larger λ; or (3) using computational software. The normal approximation improves as λ increases (becomes very accurate for λ > 20 or so).", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}], "count": 60}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In statistics, what exactly is a \"hypothesis,\" and what fundamental epistemic limitation prevents us from proving one true from sample data alone? (3 steps)", "answer": "- Step 1: A hypothesis is a statement about the value of a **population parameter** — for example, $$p$$ in $$B(n,p)$$ or $$\\lambda$$ in $$\\text{Po}(\\lambda)$$. It's a specific claim about the unknown quantity governing the distribution.\n- Step 2: We only observe a **sample**, not the whole population. Due to random variation, the same sample could have arisen under many different true parameter values — nothing in the sample uniquely identifies the true value.\n- Step 3: Therefore we can only assess how **consistent** our sample is with a hypothesis. If very inconsistent, we reject; if consistent, we fail to reject. We never \"prove\" — we quantify compatibility under uncertainty.\n\nThe whole framework is built on \"is our data surprising under this assumption?\" — not \"what is the truth?\"", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "What is a test statistic, and why must it be a single number rather than the full sample?", "answer": "The test statistic is a value computed from the sample (or outcome of an experiment) that summarizes the evidence about the parameter of interest. In this chapter it's typically a count — like the number of heads in $$n$$ tosses, or the number of calls in a time interval. It must be a single number because we need to place it on a known probability distribution under $$H_0$$ and compute tail probabilities like $$P(X \\geq x)$$ or $$P(X \\leq x)$$. Reducing the sample to one number whose distribution is known lets us quantify \"how unusual is this observation?\"", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "State the roles of $$H_0$$ and $$H_1$$ in a hypothesis test, and explain the asymmetry between them. (3 steps)", "answer": "- Step 1: $$H_0$$ (null hypothesis) is the hypothesis we **assume to be correct** for the purposes of the test. It must specify a single value, e.g. $$H_0: p = 0.4$$, so the distribution is fully determined.\n- Step 2: $$H_1$$ (alternative hypothesis) describes what we suspect **if the assumption turns out wrong**. It takes the form $$p < \\ldots$$, $$p > \\ldots$$, or $$p \\neq \\ldots$$ — never a single value.\n- Step 3: The asymmetry is deliberate: $$H_0$$ is the \"status quo\" and enjoys protection. We only abandon it if the data strongly contradict it. This protects us from over-claiming — we don't switch to $$H_1$$ on flimsy evidence.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Why must we mathematically assume $$H_0$$ is true when performing the calculations, even though the whole point is to test whether $$H_0$$ might be false? (4 steps)", "answer": "- Step 1: The core question we're answering is: \"How likely was the observed data **if** $$H_0$$ were true?\"\n- Step 2: To compute any probability, we need a fully specified distribution. $$H_0$$ fixes the parameter (e.g. $$p = 0.4$$), so $$X \\sim B(n, 0.4)$$ becomes a concrete distribution we can work with.\n- Step 3: $$H_1$$ typically contains infinitely many values (e.g. $$p > 0.4$$ covers all values up to 1), so it doesn't give us a single distribution to compute with.\n- Step 4: The logic is proof-by-contradiction with uncertainty: assume $$H_0$$, compute the probability of what we saw (or more extreme), and if this probability is tiny, conclude that $$H_0$$ was probably a bad assumption.\n\nThis is exactly analogous to \"assume the suspect is innocent; if the evidence would be almost impossible under innocence, conclude guilt.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What is the formal distinction between a one-tailed and a two-tailed test, and how does this distinction flow from the research question? (3 steps)", "answer": "- Step 1: The distinction lies in the form of $$H_1$$:\n+ One-tailed: $$H_1$$ is directional, like $$p > 0.4$$ or $$p < 0.4$$\n+ Two-tailed: $$H_1$$ is non-directional, like $$p \\neq 0.4$$\n- Step 2: The choice is driven by the question being asked:\n+ \"Has it **increased**?\" or \"Is it **better**?\" → one-tailed\n+ \"Has it **changed**?\" or \"Is it **different**?\" → two-tailed\n- Step 3: This matters because it affects where the critical region lives: all of $$\\alpha$$ in one tail for one-tailed tests; $$\\alpha/2$$ in each tail for two-tailed tests. A given observation may be significant one-tailed but not two-tailed.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Conceptually, what does a 5% significance level mean, and why are typical levels 10%, 5%, 1%? (4 steps)", "answer": "- Step 1: The significance level $$\\alpha$$ is the threshold probability below which we declare the observed data \"too unlikely to have arisen under $$H_0$$.\"\n- Step 2: Equivalently, $$\\alpha$$ is the probability of wrongly rejecting $$H_0$$ **when $$H_0$$ is actually true** (Type I error rate).\n- Step 3: Smaller $$\\alpha$$ = stricter evidence required = harder to reject $$H_0$$ = lower false-rejection risk, but also lower chance of detecting a real effect.\n- Step 4: The conventional choices reflect different contexts:\n+ 10% — exploratory work, early-stage research\n+ 5% — default scientific standard\n+ 1% — high-stakes decisions (medicine, safety, legal)\n\nA useful mental picture: at 5%, we'd expect to wrongly reject a true $$H_0$$ about one time in twenty.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Why do we compare $$P(X \\geq x)$$ (or $$P(X \\leq x)$$) to $$\\alpha$$ rather than just $$P(X = x)$$? (3 steps)", "answer": "- Step 1: The idea is to measure how extreme the observation is. Evidence \"at least as extreme as what we saw\" is what should count.\n- Step 2: Using only $$P(X = x)$$ would be misleading because in any distribution, single point probabilities are small — every outcome looks \"unlikely\" by that criterion.\n- Step 3: By using tail probabilities $$P(X \\geq x)$$ or $$P(X \\leq x)$$, we capture \"this observation, or something even more extreme in the direction of $$H_1$$.\" This is a genuine measure of incompatibility with $$H_0$$.\n\nIf you wanted to criticize a coin as biased toward heads, seeing 9 out of 10 heads should count just as much evidence as 8 out of 10 (plus more) — which is exactly $$P(X \\geq 8)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Define the \"critical region\" and explain the intuition behind why it lives in the tail(s) of the distribution. (3 steps)", "answer": "- Step 1: The critical region is the set of values of the test statistic that, if observed, would cause us to reject $$H_0$$.\n- Step 2: Under $$H_0$$, the test statistic has a known distribution centered around an expected value (e.g. $$np$$ for binomial). Values near this center are consistent with $$H_0$$; values far out in the tails are inconsistent.\n- Step 3: So the critical region sits in the tail(s) — it's where \"unusually extreme\" observations live. The total probability of the critical region under $$H_0$$ is capped at $$\\alpha$$: at most $$\\alpha$$ worth of outcomes are \"extreme enough to reject.\"\n\nPicture it as the distribution's \"rejection zone\" in the tails, with the \"acceptance zone\" being the bulk in the middle.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "What is the critical value, and why is it different from the significance level itself?", "answer": "The critical value is the first value of the test statistic to fall **inside** the critical region — it's the boundary between \"don't reject\" and \"reject.\" It is a value of $$X$$ (like $$x = 8$$ or $$x = 3$$), not a probability. The significance level $$\\alpha$$ is the probability threshold (e.g., 0.05), while the critical value is where on the $$X$$-axis the boundary sits. In practice you find the critical value by scanning values of $$X$$ until the tail probability drops just below $$\\alpha$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Define the \"actual significance level\" and explain why, for discrete distributions, it usually differs from the nominal level. (3 steps)", "answer": "- Step 1: The actual significance level is the **true probability of wrongly rejecting $$H_0$$** when using our chosen critical region, computed as $$P(X \\in \\text{critical region} \\mid H_0 \\text{ true})$$.\n- Step 2: For continuous distributions we could set a critical region with probability exactly $$\\alpha$$. But for discrete distributions (binomial, Poisson), probabilities come in discrete jumps — we rarely hit $$\\alpha$$ exactly.\n- Step 3: Convention: we choose the critical region with probability as close to $$\\alpha$$ as possible without exceeding it (or, in some problems, whichever is closest to $$\\alpha$$). The resulting probability is the **actual** significance level — the real false-positive rate of our test.\n\nExample intuition: if we want 5% but the nearest cumulative tail probability is 2.23%, the actual level is 2.23% — stricter than we aimed for.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "How do you find the critical region for an upper-tail one-tailed test with $$X \\sim B(n, p_0)$$ at significance level $$\\alpha$$? (3 steps)", "answer": "- Step 1: Assume $$H_0$$ true so $$X \\sim B(n, p_0)$$. We want $$P(X \\geq c) \\leq \\alpha$$ — the probability of being in the region is at most $$\\alpha$$.\n- Step 2: Compute $$P(X \\geq c) = 1 - P(X \\leq c-1)$$ using cumulative binomial tables or calculator, stepping up values of $$c$$.\n- Step 3: The critical value is the smallest $$c$$ such that $$P(X \\geq c) \\leq \\alpha$$. The critical region is $$X \\geq c$$.\n\n+ Sanity check: $$P(X \\geq c-1)$$ should be **greater** than $$\\alpha$$ (that's why $$c-1$$ isn't enough to reject), while $$P(X \\geq c) \\leq \\alpha$$ — this shows you've found the boundary.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "How do you find the critical region for a lower-tail one-tailed test with $$X \\sim B(n, p_0)$$ at significance level $$\\alpha$$? (2 steps)", "answer": "- Step 1: Assume $$H_0$$ true so $$X \\sim B(n, p_0)$$. Want $$P(X \\leq c) \\leq \\alpha$$ — tail probability in the lower end.\n- Step 2: Read cumulative tables or use calculator, scanning values of $$c$$. The critical value is the **largest** $$c$$ such that $$P(X \\leq c) \\leq \\alpha$$. Critical region is $$X \\leq c$$.\n\n+ Contrast with upper tail: we use $$P(X \\leq c)$$ directly (no complement needed) since tables give cumulative probability from 0.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "For a two-tailed test of $$H_0: p = p_0$$ vs $$H_1: p \\neq p_0$$ at level $$\\alpha$$, why
