us 4.7 ②", "_id": "opus_2_6"}, {"question": "Define the \"critical region\" and explain the intuition behind why it lives in the tail(s) of the distribution. (3 steps)", "answer": "- Step 1: The critical region is the set of values of the test statistic that, if observed, would cause us to reject $$H_0$$.\n- Step 2: Under $$H_0$$, the test statistic has a known distribution centered around an expected value (e.g. $$np$$ for binomial). Values near this center are consistent with $$H_0$$; values far out in the tails are inconsistent.\n- Step 3: So the critical region sits in the tail(s) — it's where \"unusually extreme\" observations live. The total probability of the critical region under $$H_0$$ is capped at $$\\alpha$$: at most $$\\alpha$$ worth of outcomes are \"extreme enough to reject.\"\n\nPicture it as the distribution's \"rejection zone\" in the tails, with the \"acceptance zone\" being the bulk in the middle.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why might Chloe, seeing two separate observations both falling in a 5%-each-tail critical region, conclude with stronger confidence than one observation would warrant? (3 steps)", "answer": "- Step 1: If $$H_0$$ is true, each observation independently has probability 0.05 of landing in the critical region.\n- Step 2: The probability of **both** independent observations landing in the critical region by chance is $$0.05 \\times 0.05 = 0.0025$$, or 0.25%.\n- Step 3: This is far stronger evidence than a single significant result. Double confirmation reduces the chance of a Type I error dramatically.\n\n+ This is the principle behind replication studies: multiple confirming tests exponentially reduce false-positive probability.\n\nFor the Challenge problem: if \"in each tail\" the probability is close to 5%, the two-tailed actual significance level is about 10%, and the probability of Chloe incorrectly rejecting is $$\\approx 0.1^2 = 0.01$$ (1%).", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "A researcher wants to test if a coin is biased. They flip it 20 times and count the number of heads. Is the test statistic the probability of heads $$p$$, or the number of heads observed? Explain the difference between a test statistic and a population parameter. (3 steps)", "answer": "- Step 1: The test statistic is the number of heads observed. It is the result of the experiment or the statistic calculated from the sample.\n- Step 2: The population parameter is the probability $$p$$, which is the unknown true value we are making a statement about in our hypotheses (e.g., $$H_0: p = 0.5$$).\n- Step 3: The key difference is that the test statistic is known and calculated from observed data, while the population parameter is unknown and is what the hypothesis test is trying to make an inference about. We write hypotheses about parameters, but we calculate probabilities using the test statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "In a two-tailed test for a binomial distribution, we are told to find critical regions where the probability in each tail is \"as close as possible to 2.5%\". Suppose for the lower tail, $$P(X \\le 2) = 0.01$$ and $$P(X \\le 3) = 0.04$$. Which do we choose as the critical value and why? (3 steps)", "answer": "- Step 1: The target probability for the tail is 2.5% (0.025). We must compare the probabilities of our candidate values to this target.\n- Step 2: $$P(X \\le 2) = 0.01$$ is 0.015 away from the target. $$P(X \\le 3) = 0.04$$ is 0.015 away from the target. Both are equidistant from 0.025.\n- Step 3: According to the \"as close as possible\" rule, we typically choose the value that gives the probability closer to the target. If they are equidistant, or if one is slightly over but much closer, we choose the closest one. Here, both are equally close, but standard convention (and Edexcel mark schemes) usually favors the value that includes slightly more probability rather than less, so 3 would be the critical value. (Always check specific syllabus nuances, but the principle is minimizing the distance to $$\\alpha/2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "Outline the full sequence of steps to carry out any one-tailed hypothesis test from scratch. (5 steps)", "answer": "- Step 1: **Formulate a model** for the test statistic: e.g., \"Let $$X$$ be the number of successes; then $$X \\sim B(n, p)$$.\"\n- Step 2: **Write hypotheses** in terms of the parameter:\n+ $$H_0: p = p_0$$ (specific value)\n+ $$H_1: p > p_0$$ or $$p < p_0$$ (directional)\n- Step 3: **Assume $$H_0$$ true** and compute the probability of the observed test statistic (or more extreme in the direction of $$H_1$$). Alternatively, find the critical region.\n- Step 4: **Compare** the probability to the significance level (or check whether the observation is inside the critical region).\n- Step 5: **Write a conclusion in context** — not just \"reject $$H_0$$,\" but what it means for the real situation (e.g., \"there is evidence that the new drug is more effective\").\n\nThe conclusion in context is not optional — without it, the test has no meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Two exam questions use slightly different wording for two-tailed critical regions: (a) \"probability in each tail should be *less than* 0.025\" vs (b) \"probability in each tail should be *as close as possible to* 0.025\". Why does this change the answer? (3 steps)", "answer": "- Step 1: Suppose adjacent candidate tail probabilities are 0.028 and 0.015.\n- Step 2: Under \"less than 0.025\":\n+ 0.028 is too large → must pick 0.015.\n- Step 3: Under \"as close as possible to 0.025\":\n+ $$|0.028 - 0.025| = 0.003$$\n+ $$|0.015 - 0.025| = 0.010$$\n+ The value 0.028 is closer — pick it, even though it exceeds 0.025.\n\nSo \"closest\" allows the actual significance level to *slightly exceed* the nominal; \"less than\" is strictly conservative. Always match the computation to the wording. Mix them up, and you'll pick the wrong critical value — and lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Why do we often see small discrepancies (like \"$$0.028 > 0.025$$, so fail to reject\") that depend on whether we compute tail probabilities exactly or by approximation? (3 steps)", "answer": "- Step 1: Approximations (Normal, continuity-corrected) introduce small numerical errors compared to the exact binomial or Poisson probabilities.\n- Step 2: When the exact p-value is near the decision threshold, these approximation errors can swing the decision. This is a known limitation near boundaries.\n- Step 3: In principle, when available, exact computation is preferred. But in practice, examination problems with large $$n$$ rely on approximations. The convention is to trust the approximated answer at the stated precision.\n\n+ Lesson: near-boundary decisions are inherently fragile. Good statistical practice includes reporting the actual p-value so readers can judge for themselves.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "For a two-tailed test of $$H_0: p = p_0$$ vs $$H_1: p \\neq p_0$$ at level $$\\alpha$$, why do we split $$\\alpha$$ into $$\\alpha/2$$ for each tail? (3 steps)", "answer": "- Step 1: Under $$H_1: p \\neq p_0$$, deviations in **either** direction (too high or too low) count as evidence against $$H_0$$. So the critical region has two pieces — one at each end.\n- Step 2: We want the **total** false-rejection probability $$P(\\text{reject} \\mid H_0) \\leq \\alpha$$. Since rejection can happen via either tail, and these events are disjoint:\n$$P(\\text{reject}) = P(X \\leq c_1) + P(X \\geq c_2) \\leq \\alpha$$\n- Step 3: To balance the test, we put $$\\alpha/2$$ in each tail. This means neither direction gets \"too easy\" to trigger rejection, and the overall false-positive rate stays at $$\\alpha$$.\n\nIf we used $$\\alpha$$ in each tail separately, the total false-positive rate would be $$2\\alpha$$ — twice what we wanted.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why is the \"actual significance level\" of a test often slightly different from the nominal \"significance level\" (e.g., 5%) specified in the problem when using discrete distributions?", "answer": "- Step 1: Discrete distributions (like Binomial or Poisson) can only take specific, separate integer values. Probabilities jump from one value to the next; there are no fractional observations.\n- Step 2: When finding the critical region, we must include whole values. We look for the region where the probability is strictly less than the nominal level (e.g., $$< 0.05$$).\n- Step 3: Because of the discrete jumps, we usually cannot hit exactly 5%. We must take the critical region that brings the probability just *under* 5%, meaning the actual probability of falling in the critical region (the actual significance level) is often slightly less than the nominal 5%.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "In hypothesis testing, what is the difference between the null hypothesis (H₀) and the alternative hypothesis (H₁)? Why is it crucial that H₀ always contains an equality sign? (2 steps)", "answer": "- Step 1: The null hypothesis H₀ represents the default position or status quo—it states what we assume to be true before collecting evidence. The alternative hypothesis H₁ represents what we are trying to find evidence for—it contains the claim we suspect might be true.\n\n- Step 2: H₀ must always contain an equality condition (such as p = 0.5 or λ = 6) because this establishes a specific, testable probability model. Without an equality, we cannot calculate the probability of obtaining our sample result under the null hypothesis. The alternative hypothesis typically contains inequality signs (<, >, or ≠) indicating the direction or nature of the suspected difference.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "Why must we mathematically assume $$H_0$$ is true when performing the calculations, even though the whole point is to test whether $$H_0$$ might be false? (4 steps)", "answer": "- Step 1: The core question we're answering is: \"How likely was the observed data **if** $$H_0$$ were true?\"\n- Step 2: To compute any probability, we need a fully specified distribution. $$H_0$$ fixes the parameter (e.g. $$p = 0.4$$), so $$X \\sim B(n, 0.4)$$ becomes a concrete distribution we can work with.\n- Step 3: $$H_1$$ typically contains infinitely many values (e.g. $$p > 0.4$$ covers all values up to 1), so it doesn't give us a single distribution to compute with.\n- Step 4: The logic is proof-by-contradiction with uncertainty: assume $$H_0$$, compute the probability of what we saw (or more extreme), and if this probability is tiny, conclude that $$H_0$$ was probably a bad assumption.\n\nThis is exactly analogous to \"assume the suspect is innocent; if the evidence would be almost impossible under innocence, conclude guilt.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "A call center receives calls at a rate of 0.325 per minute. A manager wants to test if the rate has changed over a 20-minute period. How do you set up the hypotheses $$H_0$$ and $$H_1$$, and what distribution do you use under $$H_0$$?", "answer": "- Step 1: Define the parameter. Let $$\\lambda$$ be the mean number of calls in the 20-minute interval. The rate must be scaled to match the time period.\n- Step 2: Under the null hypothesis (rate hasn't changed), the mean for 20 minutes is $$20 \\times 0.325 = 6.5$$. So, $$H_0: \\lambda = 6.5$$.\n- Step 3: Since we are testing if the rate has changed (no direction specified), $$H_1: \\lambda \\neq 6.5$$. The model under $$H_0$$ is $$X \\sim Po(6.5)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "What is the continuity correction, and why is it needed when approximating a discrete distribution with a continuous one? (3 steps)", "answer": "- Step 1: Discrete distributions (Binomial, Poisson) assign positive probability to single integers: $$P(X = k) > 0$$. Continuous distributions (Normal) assign zero probability to single points: $$P(Y = k) = 0$$.\n- Step 2: If we want $$P(X \\leq k)$$, the discrete distribution includes the mass at $$k$$. But $$P(Y \\leq k)$$ for continuous $$Y$$ excludes a point-mass (of zero) at $$k$$ — we need to shift the boundary to include the width of the \"rectangle\" representing $$P(X = k)$$.\n- Step 3: The fix: expand each integer $$k$$ to the interval $$[k - 0.5, k + 0.5]$$. This accounts for the implicit width of each discrete \"bar\" in the probability distribution.\n\nThink of the discrete distribution as a histogram with bars of width 1 — we need to capture the whole bar, not just its center.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A student writes the null hypothesis as $$H_0: p \\le 0.5$$ when testing if a coin is biased towards heads. Explain why this formulation is incorrect and what the correct formulation should be. (3 steps)", "answer": "- Step 1: The null hypothesis must always be a precise, exact statement about the population parameter (an equality, like $$p = 0.5$$). This is because we need a specific parameter value to calculate the probabilities of our test statistic under the assumption that $$H_0$$ is true.\n- Step 2: If we used an inequality like $$p \\le 0.5$$, we wouldn't know which value of $$p$$ to use for our binomial model. The probability distribution would be ambiguous.\n- Step 3: The correct formulation is $$H_0: p = 0.5$$. We use the boundary value ($$0.5$$) because if we can reject $$p = 0.5$$ in favor of $$p > 0.5$$, we have certainly also rejected all values of $$p$$ less than $$0.5$$. It represents the \"worst-case\" scenario for our assumption.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Summarise in one concise paragraph the overarching philosophy of the chapter — what is hypothesis testing *really about*?", "answer": "Hypothesis testing is a statistical procedure for making decisions about populations based on sample data. We assume a \"status quo\" ($$H_0$$) as the default, then check how surprising our observation is under that assumption. If the observation is extreme enough that we'd see it less than $$\\alpha$$% of the time under $$H_0$$ (the significance level), we reject $$H_0$$ in favour of an alternative ($$H_1$$). The procedure is asymmetric: we can only \"reject\" or \"fail to reject\" $$H_0$$ — we never prove it true. The choice of distribution (binomial for fixed trials, Poisson for rates of rare events) and approximations (normal, Poisson) depends on the data's structure. Essential principles: pre-specify the direction of $$H_1$$, use $$\\alpha/2$$ per tail for two-tailed tests, apply continuity correction when approximating discrete by continuous, and always interpret results in the context of the original research question. The test is not a tool for proving anything — it's a disciplined way to quantify how strong the evidence is against a specific claim, while controlling the rate of false alarms.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "In a one-tailed upper test, why do we compute $$P(X \\geq x_{\\text{obs}})$$ rather than $$P(X = x_{\\text{obs}})$$? (2 steps)", "answer": "- Step 1: The individual-point probability $$P(X = x_{\\text{obs}})$$ is typically very small for *any* value (since many outcomes are possible). This alone doesn't tell us whether the observation is \"in the tail\" or \"near the centre\" of the distribution.\n- Step 2: The hypothesis test asks: \"how unlikely is it to see something *at least as extreme* as my observation?\" This is the tail probability $$P(X \\geq x_{\\text{obs}})$$, which accumulates the probability of all equally-or-more-extreme outcomes.\n+ This is fairer: it treats the observation $$x_{\\text{obs}}$$ on equal footing with all values that would have caused us to reject $$H_0$$ just as strongly.\n+ Example: observing \"11 successes\" is only evidence for $$H_1: p > p_0$$ if 12, 13, 14, … would also have been. We count all of them.\n\nSo the p-value is not \"the probability of $$x_{\\text{obs}}$$\" but rather \"the probability of data at least this extreme\".", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "If you were designing a new hypothesis test from scratch for a novel distribution, what would be the essential ingredients you'd need to define? (5 steps)", "answer": "- Step 1: **A statistic**: a function of the sample with a known distribution under $$H_0$$. Must be sensitive to deviations from $$H_0$$.\n- Step 2: **A null distribution**: the exact probability distribution of the statistic when $$H_0$$ is true. This is what you'd compute probabilities from.\n- Step 3: **A direction**: based on the research question, specify $$H_1$$ and whether extreme values go in one tail or both.\n- Step 4: **A significance level $$\\alpha$$**: the acceptable false-alarm rate. Determines where you cut the tail(s).\n- Step 5: **A decision rule**: if test statistic is in critical region (or p-value < $$\\alpha$$), reject $$H_0$$.\n+ Properties: the rule must be pre-specified (before data collection), and the test must be reported honestly (including non-rejections and full context).\n\nThis skeleton applies to any test — binomial, Poisson, normal, or beyond.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "A shop sells 10 cars per week on average. Over 6 weeks, 75 cars are sold. Conceptually walk through how you'd test at the 5% level whether sales have increased, without doing the arithmetic. (5 steps)", "answer": "- Step 1: **Distribution**: counts of cars in time intervals → Poisson. Under $$H_0$$, rate = 10/week, so $$\\lambda = 60$$ over 6 weeks. So $$Y \\sim \\text{Po}(60)$$ under $$H_0$$.\n- Step 2: **Approximation check**: $$\\lambda = 60$$ is large (well beyond cumulative tables), so approximate $$Y$$ by $$W \\sim N(60, 60)$$.\n- Step 3: **Hypotheses**: $$H_0: \\lambda = 60$$, $$H_1: \\lambda > 60$$ (one-tailed upper, testing for increase).\n- Step 4: **Compute the p-value**:\n+ $$P(Y \\geq 75) \\approx P(W \\geq 74.5)$$ (continuity correction).\n+ Standardise: $$Z \\geq (74.5 - 60)/\\sqrt{60}$$.\n+ Look up $$P(Z \\geq \\text{about } 1.87)$$ from the normal table.\n- Step 5: **Compare and conclude**:\n+ If p-value < 0.05 → reject $$H_0$$.\n+ Conclusion in context: \"There is evidence at the 5% level that sales have increased.\"\n\nThe approximation simplifies what would be an unmanageable exact computation.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why does the Binomial approximate to Poisson when $$p$$ is small, and specifically what does the Poisson \"capture\" about the binomial in this limit? (4 steps)", "answer": "- Step 1: Consider $$X \\sim B(n, p)$$ with $$\\mu = np$$ fixed but $$n \\to \\infty$$, $$p = \\mu/n \\to 0$$.\n- Step 2: The binomial PMF is $$\\binom{n}{k} p^k (1-p)^{n-k}$$. Substituting $$p = \\mu/n$$ and taking the limit:\n+ $$\\binom{n}{k} \\approx \\frac{n^k}{k!}$$ for fixed $$k$$, large $$n$$\n+ $$p^k = \\left(\\frac{\\mu}{n}\\right)^k$$\n+ $$(1-p)^{n-k} \\approx (1-\\mu/n)^n \\to e^{-\\mu}$$\n- Step 3: Multiplying: $$\\binom{n}{k} p^k (1-p)^{n-k} \\to \\frac{\\mu^k e^{-\\mu}}{k!}$$, which is the Poisson PMF.\n- Step 4: The Poisson \"captures\" the fact that when individual successes are rare ($$p$$ small) but the sample is large, the count distribution becomes governed by the rate $$\\mu = np$$ alone, not by $$n$$ and $$p$$ separately.\n\n+ Intuition: rare events scattered among many trials — it doesn't really matter how many trials there were, just the expected count.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Walk through the intuitive reason why $$B(n, p) \\to \\text{Po}(np)$$ as $$n \\to \\infty$$ and $$p \\to 0$$ (with $$np$$ held constant). (3 steps)", "answer": "- Step 1: In the binomial setting with $$n$$ huge and $$p$$ tiny, each trial is almost certainly a failure. Successes are rare events spread over many opportunities.\n- Step 2: As $$n$$ grows and $$p$$ shrinks (with $$np = \\lambda$$ constant), the specific number of trials becomes less important than the total \"rate of rare events\" $$\\lambda$$. The process blurs into a continuous stream of arrivals at rate $$\\lambda$$ — exactly what Poisson models.\n- Step 3: Mathematically:\n+ Binomial mean $$np$$ = Poisson mean $$\\lambda$$ (exactly).\n+ Binomial variance $$np(1-p) \\approx np = \\lambda$$ (approximation holds for small $$p$$).\n+ The probability mass function of the binomial approaches the Poisson pmf in this limit.\n\nConceptually: \"many opportunities × tiny chance each\" = \"rate of rare events\".", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "A researcher claims a coin is biased towards heads. They flip the coin 8 times and count the number of heads. Identify the test statistic and explain why the probability of heads is NOT the test statistic.", "answer": "- Step 1: The test statistic is the result calculated from the sample or experiment — in this case, the number of heads observed out of the 8 flips.\n- Step 2: The probability of heads is a population parameter ($$p$$), not a statistic. A statistic is computed from the sample data; a parameter is the unknown true value of the population.\n- Step 3: We use the observed test statistic (the count) to make an inference about the unknown population parameter ($$p$$). We cannot observe $$p$$ directly; we only observe the data.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A researcher conducts a test and obtains a p-value of 0.23. They claim this proves the null hypothesis is true. What is wrong with this interpretation? (2 steps)", "answer": "- Step 1: A p-value of 0.23 means there's a 23% chance of observing data this extreme (or more extreme) assuming H₀ is true. This is not low enough to reject H₀, but it certainly doesn't \"prove\" H₀ is true.\n- Step 2: Failing to reject H₀ could mean many things: H₀ might be true, OR H₀ might be false but our test lacked power to detect the effect. The p-value tells us about the evidence against H₀, not the evidence for it. A high p-value simply means the data is consistent with H₀—nothing more.", "source": "MiniMax ②", "_id": "minimax_2_53"}, {"question": "What is a test statistic, and why must it be a single number rather than the full sample?", "answer": "The test statistic is a value computed from the sample (or outcome of an experiment) that summarizes the evidence about the parameter of interest. In this chapter it's typically a count — like the number of heads in $$n$$ tosses, or the number of calls in a time interval. It must be a single number because we need to place it on a known probability distribution under $$H_0$$ and compute tail probabilities like $$P(X \\geq x)$$ or $$P(X \\leq x)$$. Reducing the sample to one number whose distribution is known lets us quantify \"how unusual is this observation?\"", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "When we \"reject $$H_0$$\" at the 5% level, what have we established, and what have we NOT established?", "answer": "Rejecting $$H_0$$ means: *given the data and the model, the probability of observing such an extreme test statistic under $$H_0$$ is less than 5%*. This indicates that $$H_0$$ is statistically inconsistent with the data, and we treat $$H_1$$ as the more credible explanation. However, we have NOT:\n- Proven $$H_1$$ is true (our test could be a false alarm ~5% of the time even if $$H_0$$ were correct).\n- Determined the specific value of the parameter under $$H_1$$ (only its direction).\n- Eliminated chance as an explanation (we've just decided it's unlikely enough to act on).\n\nEqually, \"failing to reject $$H_0$$\" does NOT mean $$H_0$$ is true — only that the current evidence is insufficient. A small sample could easily miss a real effect. Language matters: use phrases like \"evidence supports\" or \"insufficient evidence to reject\", not \"$$H_1$$ is true\" or \"proved $$H_0$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is a \"critical region\" and what is a \"critical value\"? How do they relate to the decision rule of a hypothesis test? (3 steps)", "answer": "- Step 1: The **critical region** (or rejection region) is the set of values of the test statistic that, if observed, would cause you to *reject* $$H_0$$. These are the \"extreme\" values — outcomes very unlikely under $$H_0$$.\n- Step 2: The **critical value** is the boundary point — the first (most extreme) value of the test statistic that falls *inside* the critical region.\n+ For upper-tail tests: smallest $$c$$ with $$P(X \\geq c | H_0) \\leq \\alpha$$.\n+ For lower-tail tests: largest $$c$$ with $$P(X \\leq c | H_0) \\leq \\alpha$$.\n- Step 3: The **acceptance region** is the complement — values of the test statistic where we do *not* reject $$H_0$$.\n+ Decision rule: compute your observed test statistic; if it's in the critical region → reject $$H_0$$; otherwise → fail to reject.\n+ The critical value is always included in the critical region (using $$\\geq$$ or $$\\leq$$).\n\nThese three concepts partition the possible outcomes into \"evidence for $$H_1$$\" and \"consistent with $$H_0$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "What are the two equivalent methods for conducting a hypothesis test, and which should you use when? (3 steps)", "answer": "- Step 1: **Method 1 (p-value approach):**\n+ Compute the probability of the observed test statistic (or more extreme) under $$H_0$$\n+ Compare this probability directly to $$\\alpha$$ (or $$\\alpha/2$$ for two-tailed)\n+ If probability $$< \\alpha$$, reject $$H_0$$\n- Step 2: **Method 2 (critical region approach):**\n+ Find the critical region based on $$\\alpha$$ and the distribution under $$H_0$$\n+ Check whether the observed test statistic falls inside the critical region\n+ If it does, reject $$H_0$$\n- Step 3: When to use which:\n+ Method 1 when you just need to make one decision with a specific observed value\n+ Method 2 when you'll test several observations against the same threshold, or when the question explicitly asks for the critical region\n\nBoth methods give identical conclusions — they're just different routes to the same decision.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "A researcher observes data, decides the result is \"in the direction we want\", then sets up a one-tailed test in that direction and rejects $$H_0$$. What is wrong with this methodology? (3 steps)", "answer": "- Step 1: The significance level of a test is only valid when the $$H_1$$ direction is chosen **before** seeing the data. Choosing the direction after peeking at the data uses information from the data to inflate significance.\n- Step 2: If the direction is chosen based on the sign of the observed deviation, you're effectively running a two-tailed test at $$2\\alpha$$ — doubling the false-alarm rate.\n- Step 3: This practice is known as \"p-hacking\" or \"post-hoc direction selection\" and undermines the validity of the test.\n+ The significance level of $$5\\%$$ assumes a pre-specified direction, not a \"whichever tail shows a stronger result\" choice.\n+ Proper practice: pre-register the direction based on prior belief, then analyse honestly.\n\nTakeaway: hypothesis tests require *commitment* to a test plan before data analysis. The direction must be justified by the research question, not by the data.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Explain the intuition behind why we require np > 5 and n(1-p) > 5 for the normal approximation to binomial to work well. What does this condition ensure about the distribution? (3 steps)", "answer": "- Step 1: The binomial distribution is discrete and bounded by 0 and n. For the normal (a continuous, unbounded distribution) to approximate it well, the distribution needs to be roughly symmetric and bell-shaped.\n- Step 2: When p = 0.5, the binomial is perfectly symmetric regardless of n. As p moves away from 0.5, the distribution becomes increasingly skewed. The conditions np > 5 and n(1-p) > 5 ensure we have enough \"mass\" on both sides of the distribution to approximate it with a symmetric normal curve.\n- Step 3: Essentially, these conditions ensure the mean is far enough from both 0 and n that the binomial doesn't look like a skewed distribution. If np < 5, the distribution is piled up near 0, making normal approximation poor.", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "In hypothesis testing, what is the relationship between \"significance level,\" \"p-value,\" and the decision? (3 steps)", "answer": "- Step 1: The **significance level** $$\\alpha$$ is a threshold you choose **before** looking at the data (e.g., 5%).\n- Step 2: The **p-value** is the probability, assuming $$H_0$$ is true, of observing a test statistic as extreme as or more extreme than the one you actually got. It's computed **from** the data.\n- Step 3: The decision rule: reject $$H_0$$ if $$p\\text{-value} < \\alpha$$. Equivalently: if the observed result would be rarer than our threshold, dismiss $$H_0$$ as improbable.\n\nThe p-value quantifies \"how surprising is our data\"; $$\\alpha$$ quantifies \"how surprised we need to be to change our mind.\"", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why is the probability of incorrectly rejecting $$H_0$$ sometimes written as the \"probability of a Type I error\"? (3 steps)", "answer": "- Step 1: A Type I error is the specific mistake of rejecting $$H_0$$ when $$H_0$$ is actually true.\n- Step 2: By design, this probability equals the significance level (nominally) or actual significance level (in practice). We can't do better than our chosen threshold for this error rate.\n- Step 3: There's also a Type II error (failing to reject when $$H_1$$ is actually true), whose probability is typically denoted $$\\beta$$. Hypothesis tests trade off these two: lower $$\\alpha$$ → higher $$\\beta$$ (more conservative tests miss real effects more often).\n\nIn this syllabus, we focus on Type I (the actual significance level), but knowing the distinction sharpens your understanding.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "State the four continuity-correction rules for approximating discrete $$X$$ by continuous $$Y$$. (4 steps)", "answer": "- Step 1: For $$P(X \\leq k)$$, include the bar at $$k$$, so use $$P(Y \\leq k + 0.5)$$.\n- Step 2: For $$P(X < k)$$ (strictly less), exclude the bar at $$k$$, so use $$P(Y \\leq k - 0.5)$$.\n- Step 3: For $$P(X \\geq k)$$, include the bar at $$k$$, so use $$P(Y \\geq k - 0.5)$$.\n- Step 4: For $$P(X > k)$$ (strictly greater), exclude the bar at $$k$$, so use $$P(Y \\geq k + 0.5)$$.\n\n+ Point probability: $$P(X = k) \\approx P(k - 0.5 \\leq Y \\leq k + 0.5)$$\n\nMemory aid: ask \"is the endpoint included or excluded?\" If included, expand outward by 0.5; if excluded, contract inward by 0.5.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A study finds $$P(X \\leq 1) = 0.165$$ under $$H_0$$, and they fail to reject $$H_0$$ at 5%. Why doesn't this mean \"the rate is 3.25\" (the null value)? (3 steps)", "answer": "- Step 1: A non-rejection means the observed data is consistent with $$H_0$$. But it's also consistent with many other nearby parameter values — e.g., $$\\lambda = 2.5$$ or $$\\lambda = 4.0$$ might also have given non-rejection with this data.\n- Step 2: In fact, any parameter in a \"confidence interval\" around the observed value would have led to non-rejection. A single test doesn't uniquely identify a parameter value.\n- Step 3: So all we know is:\n+ The data *fails to discredit* $$H_0$$ at the 5% level.\n+ The parameter *could be* 3.25, but could also be other values nearby.\n+ We haven't established what the true rate actually is.\n+ To pin down the parameter, we'd need estimation (confidence intervals), not testing.\n\nHypothesis testing and parameter estimation serve different goals; failing to reject does not constitute estimation.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "A student writes \"the test rejects $$H_1$$\" as their conclusion. What is incorrect about this, and what is the right language? (2 steps)", "answer": "- Step 1: The hypothesis testing framework is structured around $$H_0$$ — the assumption we're challenging. We either **reject $$H_0$$** (when data contradicts it) or **fail to reject $$H_0$$** (when evidence is insufficient). The test makes no direct statement about $$H_1$$.\n- Step 2: Correct language:\n+ \"Reject $$H_0$$ at the 5% level\" → there is evidence supporting $$H_1$$.\n+ \"Fail to reject $$H_0$$ at the 5% level\" → evidence is insufficient to support $$H_1$$.\n+ We never say \"reject $$H_1$$\" — it's not in our framework.\n+ We never say \"accept $$H_0$$\" or \"prove $$H_0$$\" — we lack evidence to reject, but this doesn't confirm $$H_0$$.\n\nThe asymmetry reflects the logic: we give $$H_0$$ the benefit of the doubt and only overturn it with strong evidence.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why is the binomial approximation to Poisson useful even though we could use binomial tables directly? (3 steps)", "answer": "- Step 1: Binomial tables in standard statistical references are often limited to $$n \\leq 50$$ and specific $$p$$ values like 0.05, 0.1, ..., 0.5.\n- Step 2: For problems with $$n$$ very large (e.g., 1000) or $$p$$ very small (e.g., 0.002), binomial tables simply don't apply — no entry exists for these parameters.\n- Step 3: If $$n$$ is large and $$p$$ small, $$B(n,p) \\approx \\text{Po}(np)$$, which requires only one parameter $$\\lambda = np$$ and is tabulated up to $$\\lambda = 10$$. Beyond that, use Normal approximation on the Poisson.\n\n+ This cascade — binomial → Poisson → Normal — covers essentially all large-sample hypothesis-testing situations with minimal computational effort.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "Why is the phrase \"incorrectly rejecting $$H_0$$\" a way to describe the actual significance level, and how does this emphasize the role of the critical region? (3 steps)", "answer": "- Step 1: To \"incorrectly reject\" means to reject $$H_0$$ when $$H_0$$ is actually true — a Type I error.\n- Step 2: This happens precisely when the test statistic (which, under $$H_0$$, has the hypothesized distribution) happens to fall in the critical region purely by chance.\n- Step 3: So $$P(\\text{incorrect rejection}) = P(X \\in \\text{critical region} \\mid H_0 \\text{ true})$$. This is identically the \"actual significance level\" — they are the same number viewed two ways: as a long-run error rate and as a tail probability.\n\nThis framing emphasizes that the critical region is essentially a decision boundary, and its size controls our Type I error rate.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "If we see a result significant at 5% but not at 1%, what does that tell us? (3 steps)", "answer": "- Step 1: The p-value lies between 0.01 and 0.05. Under $$H_0$$, our observation is unusual (less than 5% chance) but not highly extraordinary (more than 1%).\n- Step 2: At the 5% level, we reject $$H_0$$; at the 1% level, we don't. The result is \"moderately significant.\"\n- Step 3: This represents borderline evidence. In practice, this may prompt further investigation, larger samples, or replication studies, rather than a firm conclusion.\n\nReporting the actual p-value (rather than just \"significant/not\") gives readers the full picture.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Why might a researcher choose a 1% significance level instead of 5%? What are the trade-offs involved in choosing a higher or lower significance level? (2 steps)", "answer": "- Step 1: A lower significance level (like 1%) makes it harder to reject H₀, which reduces the probability of a Type I error (false positive). This is important when the consequences of wrongly rejecting a true null hypothesis are severe—for example, when approving a new drug that could be harmful.\n\n- Step 2: The trade-off is that a lower significance level increases the probability of Type II error (failing to detect a real effect). If we make it too hard to reject H₀, we might miss genuine discoveries. The choice depends on context: 5% is common in exploratory research, while 1% or lower is used when being wrong is costly.", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "Compare binomial vs Poisson test setups: what stays the same and what changes? (4 steps)", "answer": "- Step 1: **Same logical structure:** assume $$H_0$$, compute tail probability, compare to $$\\alpha$$, decide, conclude in context.\n- Step 2: **Different parameter:** binomial tests a proportion $$p$$; Poisson tests a rate $$\\lambda$$.\n- Step 3: **Different expected value:** binomial gives $$E(X) = np$$; Poisson gives $$E(X) = \\lambda$$. This determines which tail to consider in two-tailed tests.\n- Step 4: **Different table lookups:** binomial tables indexed by $$(n, p)$$; Poisson tables indexed by $$\\lambda$$ only. Poisson also has a natural scaling property (rate × time), which binomial lacks in the same form.\n\n+ Both can be approximated by Normal when parameters are \"large\" (large $$n$$ with moderate $$p$$ for binomial; large $$\\lambda$$ for Poisson).", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "When would you prefer normal approximation over Poisson approximation for a binomial test, even if both are technically valid? (3 steps)", "answer": "- Step 1: Both approximations can be valid when $$n$$ is large, $$p$$ is moderate (say 0.05-0.1), and $$np$$ is small (say 5-10). The choice depends on computational convenience.\n- Step 2: Prefer **normal approximation** when:\n+ You have access to normal tables and can use z-scores easily.\n+ The question involves further manipulations (e.g., combining with other normal variables).\n+ Large-sample results are needed without needing to look up specific $$\\lambda$$.\n- Step 3: Prefer **Poisson approximation** when:\n+ $$p$$ is very small (e.g., < 0.05) making the distribution quite skewed.\n+ $$np$$ is moderate (say 2-10) and fits the cumulative Poisson table well.\n+ You want to avoid the complications of continuity correction.\n+ The question explicitly gives you Poisson tables.\n\nIn exams, check: which tables are provided? How skewed is the distribution? What does the question hint at?", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "For a two-tailed test, you see the observation is on one side of the expected value (e.g., below $$np$$). Which tail should you compute for the p-value, and why does the observation dictate this? (3 steps)", "answer": "- Step 1: The expected value of $$X$$ under $$H_0$$ is $$np$$ (binomial) or $$\\lambda$$ (Poisson). This is the \"centre\" — values close to this are consistent with $$H_0$$.\n- Step 2: Compare the observation to this expected value:\n+ If $$x_{\\text{obs}} < E(X)$$ under $$H_0$$: compute $$P(X \\leq x_{\\text{obs}})$$ (lower-tail probability).\n+ If $$x_{\\text{obs}} > E(X)$$ under $$H_0$$: compute $$P(X \\geq x_{\\text{obs}})$$ (upper-tail probability).\n- Step 3: Computing the \"wrong\" tail gives a very large probability (close to 1), which would never lead to rejection. But the observation still could be in the other tail's critical region.\n+ Misconception trap: students anchor on the absolute magnitude of $$x$$. For $$X \\sim B(50, 0.02)$$ with expected value 1, observing $$x = 4$$ is in the *upper* tail (even though 4 is a \"small\" number) because it exceeds expectation.\n\nFor a two-tailed test, compare the chosen tail probability to $$\\alpha/2$$, not $$\\alpha$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "What is the \"expected number\" or \"rate\" that appears under $$H_0$$, and why is it the anchor for reasoning about which tail to consider? (3 steps)", "answer": "- Step 1: Under $$H_0$$, the distribution has a known mean: $$np$$ for binomial, $$\\lambda$$ for Poisson. This is the \"central\" value — what we'd expect on average if $$H_0$$ were true.\n- Step 2: Observed values near this mean are consistent with $$H_0$$; values far above or below are suspect. The direction of the observation (above or below the mean) tells us which tail to investigate.\n- Step 3: In a two-tailed test, you save effort by only computing the tail the observation actually falls in — the other tail contributes probability that was already \"pre-paid\" by halving $$\\alpha$$.\n\nThis is why examples always compute just one tail in two-tailed tests: \"the observed value 4 is above $$np = 1$$, so consider the upper tail $$P(X \\geq 4)$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why does the continuity correction sometimes flip direction for \"less than\" vs \"less than or equal\"? (3 steps)", "answer": "- Step 1: Consider two different discrete events:\n+ $$P(X \\leq 5)$$ includes the integer 5\n+ $$P(X < 5) = P(X \\leq 4)$$ excludes the integer 5\n- Step 2: When approximating with a continuous Normal, we need to decide whether to include or exclude the \"bar\" at the boundary integer:\n+ $$P(X \\leq 5) \\approx P(W \\leq 5.5)$$ — include the bar, extend to 5.5\n+ $$P(X < 5) \\approx P(W \\leq 4.5)$$ — exclude the bar at 5; stop at 4.5\n- Step 3: The direction of the 0.5 adjustment depends entirely on whether the boundary integer is part of the event or not.\n\n+ Mnemonic: imagine the discrete bars as rectangles of width 1. If the boundary integer's rectangle is included, extend the continuous range to the right edge of that rectangle; if excluded, stop at its left edge.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "What does \"rejecting $$H_0$$\" logically entitle us to conclude, and what does it NOT entitle us to conclude? (3 steps)", "answer": "- Step 1: Rejecting $$H_0$$ means: under the assumption that $$H_0$$ is true, our observed data (or more extreme) would be very unlikely. So we prefer $$H_1$$ over $$H_0$$ as a description of reality.\n- Step 2: It does **not** prove $$H_1$$ is true. We've only shown that $$H_0$$ looks implausible. Some alternative parameter value is more consistent with our data, but we haven't identified exactly what.\n- Step 3: It does **not** prove our specific direction in $$H_1$$ (e.g., \"$$p > 0.4$$\") is the truth either — just that the data suggest the parameter lies in that direction rather than at $$p_0$$.\n\nIn practice: \"evidence suggests...\" or \"the data are consistent with...\" — use hedged language because hypothesis testing is inherently probabilistic.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "In a two-tailed test with observed value $$x = 4$$ from $$X \\sim B(50, 0.02)$$, why would we consider the **upper** tail even though 4 looks like a small number?", "answer": "- Step 1: The expected value under $$H_0$$ is $$np = 50 \\times 0.02 = 1$$. So typical observations should be around 1.\n- Step 2: The observed $$x = 4$$ is **greater** than the expected value of 1, so it's the upper tail that's relevant — 4 is \"unusually large,\" not small, in this context.\n- Step 3: You'd compute $$P(X \\geq 4)$$ and compare to $$\\alpha/2$$.\n\n+ General rule: compare $$x$$ to the expected value $$np$$ (binomial) or $$\\lambda$$ (Poisson). If $$x > \\text{expected}$$, use the upper tail; if $$x < \\text{expected}$$, use the lower tail.\n\nThis is a classic trap: raw magnitude of $$x$$ doesn't matter — what matters is $$x$$ relative to the expected value.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Explain why conducting multiple hypothesis tests on the same dataset inflates the overall false-alarm rate — and how this relates to the 5% significance level. (3 steps)", "answer": "- Step 1: A single test at 5% has a 5% chance of false rejection *in isolation*. If we run many tests, the probability of at least one false rejection grows.\n- Step 2: Specifically, if you run $$k$$ independent tests at 5% each, the probability of no false alarms is $$(1 - 0.05)^k = 0.95^k$$.\n+ For $$k = 10$$ tests: $$0.95^{10} \\approx 0.60$$, so ~40% chance of at least one false alarm.\n+ For $$k = 100$$ tests: $$\\approx 0.60^{20} \\approx 0.006$$, so ~99% chance of at least one false alarm.\n- Step 3: This is why multiple-comparison corrections (like Bonferroni) are used in practice — they lower the per-test $$\\alpha$$ so the total error rate stays at 5%.\n+ In research contexts, running many tests and cherry-picking \"significant\" ones is a form of p-hacking.\n+ The 5% guarantee only holds for a single, pre-specified test.\n\nTakeaway: significance at 5% is meaningful only in the context of a single test, not \"the best of many\".", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why might a \"small\" observed proportion (like 20% vs expected 30%) be statistically non-significant with $$n = 10$$ but highly significant with $$n = 1000$$? (3 steps)", "answer": "- Step 1: Statistical significance depends on the *standardised* distance between observed and expected, not just the raw difference. This standardisation factors in the sampling noise (standard error).\n- Step 2: Standard error scales as $$\\sqrt{p(1-p)/n}$$, which decreases as $$n$$ increases. So for a fixed proportional difference, the z-score scales as $$\\sqrt{n}$$.\n+ For $$n = 10$$: SE $$\\approx 0.145$$. A 10 percentage-point difference is ~0.7 SE — not extreme.\n+ For $$n = 1000$$: SE $$\\approx 0.0145$$. Same 10 percentage-point difference is ~7 SE — extremely extreme.\n- Step 3: Interpretation:\n+ Small samples are noisy — most differences look unsurprising.\n+ Large samples have tight sampling distributions — even small differences stand out.\n+ This is why \"statistical significance\" ≠ \"practical significance\"; a tiny effect can be highly significant with enough data.\n\nEffect size and significance are distinct concepts; both matter for decision-making.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Why is applying the continuity correction more important for small-to-moderate $$n$$ than for very large $$n$$? (3 steps)", "answer": "- Step 1: The continuity correction adjusts by 0.5 — a fixed amount regardless of sample size.\n- Step 2: The standard deviation of the binomial or Poisson scales as $$\\sqrt{n}$$ (or $$\\sqrt{\\lambda}$$). As $$n$$ grows, the SD grows, and the 0.5 correction becomes a smaller fraction of the SD.\n+ For $$n = 16$$, SD might be 2, so 0.5 is 25% of an SD — significant.\n+ For $$n = 1600$$, SD might be 20, so 0.5 is 2.5% of an SD — negligible.\n- Step 3: For very large samples, you get similar answers with or without correction. But for moderate samples, ignoring the correction introduces systematic errors in probabilities.\n+ Exam expectation: always apply continuity correction when approximating discrete by continuous, regardless of sample size.\n\nRule: better to always apply the correction than to forget it when needed.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "When should we use a Poisson approximation for a binomial distribution, and what is the intuitive reason? (3 steps)", "answer": "- Step 1: Use $$B(n, p) \\approx \\text{Po}(np)$$ when $$n$$ is large (say $$n \\geq 50$$) AND $$p$$ is small (say $$p \\leq 0.1$$). Often stated as $$n$$ large, $$np$$ finite/moderate.\n- Step 2: Mathematical derivation: in the limit $$n \\to \\infty$$, $$p \\to 0$$ with $$np = \\lambda$$ fixed, the binomial probability mass function converges to the Poisson. Specifically:\n+ Mean of binomial: $$np = \\lambda$$ → matches Poisson mean.\n+ Variance of binomial: $$np(1-p) \\approx np = \\lambda$$ for small $$p$$ → matches Poisson variance.\n- Step 3: Intuition: for many rare-event opportunities, what matters is not each individual opportunity but the total \"rate\" $$\\lambda = np$$. The specific values of $$n$$ and $$p$$ blur into a continuous-time rate process — which is exactly what Poisson models.\n+ Practical benefit: Poisson tables go up to $$\\lambda \\approx 10$$, so approximations work for many binomial cases where $$n$$ is large but unwieldy.\n\nBinomial with \"tiny $$p$$ but many trials\" = Poisson with rate $$np$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Explain how to construct a decision tree for choosing the right distribution and approximation given sample data. (4 steps)", "answer": "- Step 1: **Type of data**:\n+ Fixed number of trials with binary outcomes → binomial.\n+ Counts of events in continuous time/space → Poisson.\n- Step 2: **Parameters**:\n+ Binomial: note $$n$$ and $$p$$.\n+ Poisson: note $$\\lambda$$ for observation window (scale appropriately).\n- Step 3: **Approximation needed?**\n+ Binomial with small $$n$$ or exact tables available → use exact.\n+ Binomial with large $$n$$, small $$p$$ (rare events): Poisson with $$\\lambda = np$$.\n+ Binomial with large $$n$$, $$p$$ near 0.5 ($$np, n(1-p) > 5$$): normal with $$N(np, np(1-p))$$.\n+ Poisson with small $$\\lambda$$: exact Poisson (tables go up to ~10).\n+ Poisson with large $$\\lambda$$ (> 10): normal with $$N(\\lambda, \\lambda)$$.\n- Step 4: **Apply continuity correction** if approximating discrete by normal.\n\nThis tree covers all scenarios in the chapter.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Explain the concept of \"continuity correction\" — what it is, why we need it, and how to apply it. (3 steps)", "answer": "- Step 1: **What**: When approximating a discrete distribution (binomial or Poisson) by a continuous normal, we shift the boundaries by $$\\pm 0.5$$ to account for the \"width\" of each integer's probability mass.\n- Step 2: **Why**: The discrete $$X = 5$$ corresponds to a \"box\" of probability at the single point 5. But for the continuous normal, this point has probability zero. To make the approximation work, we treat $$X = 5$$ as the interval $$(4.5, 5.5)$$ — a unit-width box centred at 5.\n- Step 3: **How to apply**:\n+ \"$$X \\leq a$$\" (inclusive) → $$P(W \\leq a + 0.5)$$\n+ \"$$X \\geq a$$\" (inclusive) → $$P(W \\geq a - 0.5)$$\n+ \"$$X = a$$\" → $$P(a - 0.5 \\leq W \\leq a + 0.5)$$\n+ The rule: always adjust by 0.5 *outwards* from the boundary to include the discrete value's box.\n\nWithout this correction, the approximation systematically miscounts probability at tail boundaries, especially for moderate $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why do \"write your hypotheses clearly\" instructions appear in so many exam questions? (3 steps)", "answer": "- Step 1: The hypotheses define what you're testing. Without them explicit, the subsequent calculations are meaningless — a tail probability is just a number unless tied to specific claims.\n- Step 2: Markers need to verify you've identified:\n+ The right parameter (e.g., $$p$$ or $$\\lambda$$)\n+ The right null value ($$p_0$$ or $$\\lambda_0$$)\n+ The right direction (or lack thereof) in $$H_1$$\n- Step 3: Also, hypotheses should be in context: \"$$p$$ is the proportion of faulty items\" rather than just \"$$p$$.\" This shows understanding, not just symbol manipulation.\n\n+ A test with unstated hypotheses is an incomplete answer no matter how correct the arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "When using a normal approximation for $$P(X \\geq 12)$$ where $$X$$ is discrete, why do we approximate by $$P(W \\geq 11.5)$$ and not $$P(W \\geq 12.5)$$?", "answer": "The discrete value $$X = 12$$ corresponds to the probability \"box\" between 11.5 and 12.5 under the continuous normal approximation. We want to include *all* the probability from $$X = 12$$ onward, so we start from the lower edge of this box — i.e., $$W \\geq 11.5$$.\n\nIf we used $$P(W \\geq 12.5)$$, we would start from the upper edge, missing the probability for $$X = 12$$ itself (the interval from 11.5 to 12.5). This would systematically understate the probability. The general rule: for \"$$X \\geq a$$\", the matching continuous event is \"$$W \\geq a - 0.5$$\" (shift *outwards* by half a unit to include $$X = a$$'s full box). For \"$$X \\leq a$$\", the matching event is \"$$W \\leq a + 0.5$$\" (also outward).\n\nContinuity correction ensures the discrete value's full probability is captured.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "When is it appropriate to use a Poisson approximation to the Binomial, and what are the approximating parameters? (3 steps)", "answer": "- Step 1: Use when $$n$$ is large and $$p$$ is small (rare-event scenario), so that individual successes are infrequent.\n- Step 2: The approximation is: $$X \\sim B(n, p) \\approx \\text{Po}(np)$$\n+ The mean $$np$$ carries over exactly\n+ Variance of Poisson = $$np$$, which matches Binomial variance $$np(1-p) \\approx np$$ when $$p$$ is small\n- Step 3: Why this works: when $$p$$ is small, \"successes\" resemble rare events scattered among $$n$$ trials — exactly the Poisson setup. Formally, the limit of $$B(n, \\lambda/n)$$ as $$n \\to \\infty$$ is $$\\text{Po}(\\lambda)$$.\n\n+ Rule of thumb: $$n > 50$$ and $$np < 10$$ (and $$p < 0.1$$).", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Consider the critical region logic: for $$B(10, 0.4)$$ at 5% upper-tail, we have $$P(X \\geq 7) = 0.0548$$ and $$P(X \\geq 8) = 0.0132$$. Why is the critical value 8 rather than 7? (3 steps)", "answer": "- Step 1: We need the tail probability to be **less than** (or at most) 5%.\n- Step 2: $$P(X \\geq 7) = 0.0548 > 0.05$$ — seeing 7 or more has probability above 5%, not rare enough to reject. If we included 7 in the critical region, our actual false-positive rate would exceed 5%.\n- Step 3: $$P(X \\geq 8) = 0.0132 < 0.05$$ — this qualifies. So 8 is the smallest value that makes the tail probability below 5%. Critical region: $$X \\geq 8$$, actual significance level $$= 0.0132 \\approx 1.32\\%$$.\n\n+ The \"smallest integer such that tail probability $$\\leq \\alpha$$\" rule is why we jump to 8 rather than 7.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why might a test statistic giving $$P(X \\geq x) = 0.06$$ lead to \"fail to reject\" at the 5% level, while $$P(X \\geq x) = 0.04$$ leads to \"reject,\" even though the two are very close? (3 steps)", "answer": "- Step 1: The 5% threshold is a hard boundary chosen in advance. At 0.06, the probability is **just above** the threshold; at 0.04, it's below.\n- Step 2: This feels arbitrary because of the sharp cut-off. In reality, both values provide similar evidence against $$H_0$$ — neither is dramatically more convincing than the other.\n- Step 3: This is a known limitation of binary decision-making via significance tests. In practice, one should also consider effect sizes and confidence intervals, and not treat 0.05 as a magical boundary.\n\n+ Some statisticians criticize \"the cult of 0.05\" for exactly this reason. But within the formal framework, the threshold is what's used.\n\nThis is a conceptual point about the logic: hypothesis tests are designed to force a decision, but the decision depends sensitively on the threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "When would you strategically prefer the critical region method over computing a p-value directly, and vice versa? (3 points)", "answer": "- Step 1: **Use the critical region method when:**\n+ The exam question explicitly asks for the critical region.\n+ You have a two-tailed test — finding two critical values at once is cleaner than computing two-sided p-values.\n+ The question has multiple parts using the same $$H_0$$ — reuse the critical region.\n- Step 2: **Use the p-value method when:**\n+ You have a single observed value and want a single, direct comparison.\n+ The distribution parameters don't align with cumulative tables (and so a direct tail calculation is simpler).\n- Step 3: They're mathematically equivalent, so the choice is about efficiency, not correctness. In exams, always read the question carefully — it often tells you which method to use (e.g., \"find the critical region\" vs \"test the claim\").", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Explain why the expected number of successes in a binomial experiment is $$np$$ — derive this from first principles. (3 steps)", "answer": "- Step 1: Decompose $$X$$ as the sum of indicator variables: $$X = X_1 + X_2 + \\cdots + X_n$$, where $$X_i = 1$$ if trial $$i$$ is a success, 0 otherwise.\n- Step 2: Each $$X_i$$ is a Bernoulli($$p$$) random variable. Its expectation is:\n$$E(X_i) = 1 \\cdot P(X_i = 1) + 0 \\cdot P(X_i = 0) = p$$\n- Step 3: By linearity of expectation (which holds regardless of dependence):\n$$E(X) = E(X_1) + E(X_2) + \\cdots + E(X_n) = n \\cdot p = np$$\n+ This is why $$np$$ is the natural \"centre\" of the binomial distribution — it's just the sum of individual-trial expectations.\n+ The derivation doesn't require independence; it only requires each trial to have probability $$p$$ of success.\n\nThe result $$E(X) = np$$ is one of the most fundamental facts about binomial distributions, and underlies the entire framework of binomial hypothesis testing.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Why does the choice of approximation depend fundamentally on the *shape* of the binomial distribution (symmetric vs skewed), rather than just on $$n$$? (3 steps)", "answer": "- Step 1: The normal distribution is symmetric and bell-shaped. Any approximation by a normal assumes the target distribution shares these properties (at least approximately).\n- Step 2: The binomial $$B(n, p)$$:\n+ Is symmetric when $$p = 0.5$$ (for any $$n$$).\n+ Becomes more symmetric and bell-shaped as $$n$$ grows for any fixed $$p$$ (CLT effect).\n+ Is highly right-skewed when $$p$$ is small (peak at 0, long right tail).\n+ Is highly left-skewed when $$p$$ is close to 1.\n- Step 3: So for small $$p$$ (even with large $$n$$), the binomial is skewed → normal approximation would be inaccurate, especially in the tails. Poisson, which is also right-skewed for small $$\\lambda$$, captures the shape well.\n+ Heuristic: $$np > 5$$ AND $$n(1-p) > 5$$ ensures enough symmetry for normal approximation.\n\nThe core issue: approximating requires matching shape, not just first two moments.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "What's the key conceptual insight behind why splitting $$\\alpha$$ into two $$\\alpha/2$$ halves is the **correct** way to conduct a two-tailed test? (3 steps)", "answer": "- Step 1: The total probability of Type I error must be at most $$\\alpha$$. This is the whole point of the significance level.\n- Step 2: In a two-tailed test, rejection happens if $$X$$ lands in the lower tail **or** the upper tail. These are disjoint, so probabilities add: $$P(\\text{reject} \\mid H_0) = P(\\text{lower}) + P(\\text{upper})$$.\n- Step 3: To keep the sum at $$\\alpha$$, each tail gets $$\\alpha/2$$. This is \"spending\" the significance budget equally in both directions. A symmetric two-tailed test requires a symmetric allocation.\n\n+ If we used $$\\alpha$$ in each tail separately, the overall error rate would be $$2\\alpha$$ — we'd be twice as likely to wrongly reject $$H_0$$ as intended.\n\nThis links to a broader principle: when testing multiple hypotheses simultaneously, you must adjust for the multiplicity.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In hypothesis testing, we form two competing statements about a population parameter. What is the fundamental difference in how we treat the null hypothesis ($$H_0$$) versus the alternative hypothesis ($$H_1$$) during the testing process? (2 steps)", "answer": "- Step 1: The null hypothesis $$H_0$$ is the statement we assume to be correct for the purpose of the test. It represents the \"status quo\" or the historical accepted value. We use this assumption to build our probability model because it gives us a specific parameter value to work with.\n- Step 2: The alternative hypothesis $$H_1$$ is the statement we adopt only if the evidence from our sample strongly contradicts $$H_0$$. It represents the research claim or the change we are trying to detect. We do not assume $$H_1$$ is true to build our model; rather, we see if the data is so extreme that $$H_0$$ becomes untenable.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A student writes the null hypothesis as $$H_0: p \\le 0.5$$ when testing if a coin is biased towards heads. Explain why this formulation is incorrect and what the correct formulation should be. (3 steps)", "answer": "- Step 1: The null hypothesis must always be a precise, exact statement about the population parameter (an equality, like $$p = 0.5$$). This is because we need a specific parameter value to calculate the probabilities of our test statistic under the assumption that $$H_0$$ is true.\n- Step 2: If we used an inequality like $$p \\le 0.5$$, we wouldn't know which value of $$p$$ to use for our binomial model. The probability distribution would be ambiguous.\n- Step 3: The correct formulation is $$H_0: p = 0.5$$. We use the boundary value ($$0.5$$) because if we can reject $$p = 0.5$$ in favor of $$p > 0.5$$, we have certainly also rejected all values of $$p$$ less than $$0.5$$. It represents the \"worst-case\" scenario for our assumption.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Isabelle tests a coin for bias by tossing it 100 times. She claims her test statistic is \"the probability of the coin landing on heads.\" Identify the conceptual mistake in her claim and state what the correct test statistic should be. (2 steps)", "answer": "- Step 1: The mistake is confusing the population parameter with the test statistic. The probability $$p$$ is a fixed but unknown population parameter; it is not a value calculated from the sample. We cannot observe $$p$$ directly.\n- Step 2: The correct test statistic is the number of heads observed in the 100 tosses (or the proportion of heads in the sample). This is the random variable whose probability distribution we can model (e.g., $$X \\sim B(100, p)$$), and its observed value from the experiment is what we use to test the hypothesis.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "A researcher tests a hypothesis at the 5% significance level. Explain what \"5% significance level\" actually means in terms of the risk of error, and why we don't just set it to 0% to eliminate all risk. (2 steps)", "answer": "- Step 1: The 5% significance level is the threshold probability below which we consider an observed result too unlikely to occur by chance alone if $$H_0$$ were true. It represents the maximum acceptable probability of incorrectly rejecting $$H_0$$ (a Type I error) — meaning there is a 5% risk we are discarding a true null hypothesis.\n- Step 2: We cannot set it to 0% because in a random world, there is always *some* non-zero probability of observing an extreme value even if $$H_0$$ is true. To have a 0% chance of ever rejecting a true $$H_0$$, we would have to *never* reject $$H_0$$, which defeats the purpose of the test. We must tolerate a small risk (like 1%, 5%, or 10%) to gain the ability to detect real effects.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A test statistic is modelled as $$B(n, p)$$ and we are testing $$H_0: p = 0.2$$ against $$H_1: p \\neq 0.2$$. Contrast this with a test where $$H_1: p > 0.2$$. How does the directionality of $$H_1$$ affect the structure of the test? (2 steps)", "answer": "- Step 1: When $$H_1: p > 0.2$$, it is a one-tailed test. We are only looking for evidence that the proportion has increased. Therefore, we only look at the upper tail of the distribution for extreme values (unusually high numbers of successes), and the entire significance level (e.g., 5%) is allocated to that one tail.\n- Step 2: When $$H_1: p \\neq 0.2$$, it is a two-tailed test. We are looking for evidence of change in *either* direction (increase or decrease). Therefore, we must look at both the upper and lower tails of the distribution. The significance level must be split between the two tails (e.g., 2.5% in the upper tail and 2.5% in the lower tail) so that the total risk of a Type I error remains 5%.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Define the terms \"critical region\" and \"critical value.\" Why is the critical value defined as the *first* value to fall inside the critical region, rather than just any value in it? (3 steps)", "answer": "- Step 1: The critical region is the set of values for the test statistic that would lead us to reject $$H_0$$. If our observed result falls here, it is deemed \"too extreme\" to have occurred by chance under $$H_0$$.\n- Step 2: The critical value is the boundary point; it is the first value to fall inside the critical region. For an upper-tailed test, it is the smallest value of $$x$$ for which $$P(X \\ge x)$$ is less than the significance level.\n- Step 3: We define it as the *first* value because discrete distributions (like Binomial or Poisson) jump in steps. For example, if $$P(X \\ge 8) < 0.05$$ but $$P(X \\ge 7) > 0.05$$, then 8 is the first value that crosses our threshold. 7 is still in the \"acceptance region.\" The critical value marks the exact boundary of the jump.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A test is conducted at the 5% significance level, but the actual significance level turns out to be 3.7%. Explain why these two numbers are different, and what the 3.7% specifically represents. (3 steps)", "answer": "- Step 1: The difference arises because the test statistic follows a discrete distribution (like Binomial), which can only take integer values. Probabilities accumulate in discrete chunks, so we cannot always hit the exact threshold of 5%.\n- Step 2: When finding the critical region, we must ensure the probability of falling within it is *less than or equal to* the nominal level (5%). The largest critical region we can create might only have a 3.7% chance of occurring under $$H_0$$. Adding the next value would push the probability over 5%.\n- Step 3: The 3.7% is the actual significance level — the true probability of incorrectly rejecting $$H_0$$ (a Type I error) given the critical region we have chosen. It is always less than or equal to the nominal significance level.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "For a two-tailed test at the 5% significance level, a student checks if the probability in one tail is less than 5%. Identify the mistake and explain the correct approach to splitting the significance level. (3 steps)", "answer": "- Step 1: The mistake is that applying a 5% threshold to *each* tail would result in a total risk of 10% (5% + 5%) of incorrectly rejecting $$H_0$$, which violates the requirement of a 5% test.\n- Step 2: The correct approach is to halve the overall significance level and apply it to both ends. For a 5% two-tailed test, we look for a probability of 2.5% in the lower tail and 2.5% in the upper tail.\n- Step 3: This ensures that the total probability of falling into either critical region (and thus incorrectly rejecting $$H_0$$) sums to no more than 5%. We are allowing for deviation in either direction, but the total risk of a false positive remains 5%.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "In a two-tailed test for a binomial proportion $$p$$, the expected value under $$H_0$$ is $$np$$. If the observed value $$x$$ is significantly lower than $$np$$, which probability do you calculate and why? (2 steps)", "answer": "- Step 1: You calculate $$P(X \\le x)$$. Since the observed value is lower than the expected value, it sits in the lower tail of the distribution. We need to find the probability of observing a value \"at least as extreme\" as our result, in the direction it lies.\n- Step 2: We do not calculate the upper tail probability $$P(X \\ge x)$$ because an observed value lower than expected provides no evidence that $$p$$ has increased. In a two-tailed test, we only test the tail where the observed value falls, using the halved significance level (e.g., 2.5% for a 5% test).", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Accidents occur at a rate of 0.5 per day. A safety officer wants to test the rate over a 10-day period. If the null hypothesis is $$H_0: \\lambda = 0.5$$, explain how to correctly set up the Poisson distribution and the hypotheses for this 10-day period. (3 steps)", "answer": "- Step 1: The Poisson parameter $$\\lambda$$ represents the expected number of occurrences in a given interval. The given rate is 0.5 per day, but the observation period is 10 days. We must scale the parameter to match the observation interval.\n- Step 2: For a 10-day period, the expected rate is $$10 \\times 0.5 = 5$$. Therefore, the model for the 10-day period is $$X \\sim Po(5)$$, where $$X$$ is the number of accidents in 10 days.\n- Step 3: The hypotheses must reflect the scaled parameter. The correct null hypothesis is $$H_0: \\lambda = 5$$ (or equivalently, the rate is 0.5 per day). The alternative hypothesis would depend on the claim, e.g., $$H_1: \\lambda > 5$$ if testing for an increase.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A factory tests if the proportion of faulty items has increased from a historical 1%. They sample 200 items and find 5 faulty ones. Explain why a Poisson approximation is suitable here and how it changes the parameter being tested. (3 steps)", "answer": "- Step 1: The exact model is Binomial, $$X \\sim B(200, 0.01)$$, because we are counting faulty items out of a fixed number of trials. However, since $$n$$ is large (200) and $$p$$ is small (0.01), the calculations are cumbersome, and a Poisson approximation is appropriate.\n- Step 2: We approximate the Binomial distribution with a Poisson distribution. The parameter for the Poisson is $$\\lambda = np = 200 \\times 0.01 = 2$$.\n- Step 3: This changes the parameter we are testing from a proportion $$p$$ to a rate $$\\lambda$$. The hypotheses become $$H_0: \\lambda = 2$$ and $$H_1: \\lambda > 2$$. We then use the $$Po(2)$$ distribution to find probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A call centre receives calls at a rate of 50 per hour. They test if the rate has changed over an 8-hour shift. Explain why a Normal approximation is appropriate and state the parameters of the approximating Normal distribution. (3 steps)", "answer": "- Step 1: The exact model for the number of calls in 8 hours is Poisson, with $$\\lambda = 8 \\times 50 = 400$$. Because $$\\lambda$$ is large (typically $$\\lambda > 10$$), the Poisson distribution becomes too difficult to calculate by hand or with basic tables.\n- Step 2: For large $$\\lambda$$, the Poisson distribution can be approximated by a Normal distribution. This allows us to use the standard Normal distribution (Z-values) to find probabilities.\n- Step 3: The parameters of the approximating Normal distribution match the mean and variance of the Poisson. Therefore, we approximate $$Po(400)$$ with $$W \\sim N(400, 400)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When using a Normal approximation to test a Poisson distribution, we apply a continuity correction. Explain the conceptual reason for this correction, and for a test where $$H_1: \\lambda > \\lambda_0$$, describe how you would adjust the boundary. (3 steps)", "answer": "- Step 1: The Normal distribution is continuous (can take any real value), whereas the Poisson (and Binomial) is discrete (can only take integer values). A discrete probability like $$P(X = 15)$$ is represented in the continuous model by the area under the curve from 14.5 to 15.5.\n- Step 2: When we calculate $$P(X \\ge 15)$$ in the discrete model, it includes the entire probability mass at 15. In the continuous model, the boundary must start at 14.5 to capture the entire area corresponding to $$X = 15$$.\n- Step 3: For an upper-tailed test ($$H_1: \\lambda > \\lambda_0$$), we adjust the boundary down by 0.5. So $$P(X \\ge x)$$ is approximated by $$P(W \\ge x - 0.5)$$. This ensures the continuous area accurately captures the discrete probability.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A student concludes a hypothesis test by saying \"I accept $$H_0$$; the probability is exactly 0.4.\" Explain why this phrasing is flawed and provide the correct way to state the conclusion. (2 steps)", "answer": "- Step 1: We never \"accept\" the null hypothesis in a formal hypothesis test. Failing to find sufficient evidence to reject $$H_0$$ does not prove $$H_0$$ is true; it merely means our sample wasn't extreme enough to rule it out. Also, we are testing a population parameter, not a sample probability.\n- Step 2: The correct phrasing is \"There is insufficient evidence to reject $$H_0$$.\" The conclusion should be written in the context of the question, e.g., \"There is insufficient evidence to suggest that the proportion has changed from 0.4.\"", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "In a two-tailed test for a binomial distribution, we are told to find critical regions where the probability in each tail is \"as close as possible to 2.5%\". Suppose for the lower tail, $$P(X \\le 2) = 0.01$$ and $$P(X \\le 3) = 0.04$$. Which do we choose as the critical value and why? (3 steps)", "answer": "- Step 1: The target probability for the tail is 2.5% (0.025). We must compare the probabilities of our candidate values to this target.\n- Step 2: $$P(X \\le 2) = 0.01$$ is 0.015 away from the target. $$P(X \\le 3) = 0.04$$ is 0.015 away from the target. Both are equidistant from 0.025.\n- Step 3: According to the \"as close as possible\" rule, we typically choose the value that gives the probability closer to the target. If they are equidistant, or if one is slightly over but much closer, we choose the closest one. Here, both are equally close, but standard convention (and Edexcel mark schemes) usually favors the value that includes slightly more probability rather than less, so 3 would be the critical value. (Always check specific syllabus nuances, but the principle is minimizing the distance to $$\\alpha/2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "A standard drug has a 30% success rate. A new drug is tested on 20 patients and succeeds on 11. Test if the new drug is better at the 5% level. Walk through the logic of finding the critical region and making a decision, without calculating exact probabilities. (3 steps)", "answer": "- Step 1: Set up hypotheses. $$H_0: p = 0.3$$, $$H_1: p > 0.3$$. The model is $$X \\sim B(20, 0.3)$$, where $$X$$ is the number of successes. This is a one-tailed test.\n- Step 2: Find the critical region. We need the smallest integer $$c$$ such that $$P(X \\ge c) < 0.05$$. The expected value is $$20 \\times 0.3 = 6$$. Since the observed value (11) is much higher than 6, we are looking in the upper tail.\n- Step 3: Compare the observed value to the critical value. If the critical value is 10 or less, then 11 is in the critical region, and we reject $$H_0$$. If the critical value is 12 or more, 11 is not in the critical region, so we fail to reject $$H_0$$. (Note: The actual critical value for $$B(20, 0.3)$$ at 5% is 10, so 11 leads to rejecting $$H_0$$).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A coin is tossed 40 times, landing on heads 16 times. Test if the coin is biased at the 5% level. Walk through how to find the critical regions for this two-tailed test conceptually. (3 steps)", "answer": "- Step 1: Set up hypotheses. $$H_0: p = 0.5$$, $$H_1: p \\neq 0.5$$. Model is $$X \\sim B(40, 0.5)$$. The expected value is $$40 \\times 0.5 = 20$$.\n- Step 2: Split the significance level. For a 5% two-tailed test, we look for 2.5% in each tail. We need to find the largest $$c_1$$ such that $$P(X \\le c_1) \\le 0.025$$ (lower tail) and the smallest $$c_2$$ such that $$P(X \\ge c_2) \\le 0.025$$ (upper tail).\n- Step 3: Locate the observed value. The observed value is 16, which is in the lower tail (less than 20). We compare 16 to the lower critical value $$c_1$$. If 16 is less than or equal to $$c_1$$, we reject $$H_0$$. Otherwise, we do not reject it. (Note: The actual critical value is 13, so 16 is not in the critical region).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Accidents occur at a rate of 3 per week. Over a 4-week period, 18 accidents occur. Test if the rate has increased at the 5% level. Walk through the setup and the conceptual decision. (3 steps)", "answer": "- Step 1: Scale the parameter. For a 4-week period, the expected number of accidents is $$4 \\times 3 = 12$$. So, $$H_0: \\lambda = 12$$, $$H_1: \\lambda > 12$$. The model is $$X \\sim Po(12)$$.\n- Step 2: Determine the probability to calculate. Since we are testing for an increase and observed 18 (which is higher than 12), we need to calculate $$P(X \\ge 18)$$ under the $$Po(12)$$ distribution.\n- Step 3: Decision. If $$P(X \\ge 18) < 0.05$$, we reject $$H_0$$ and conclude the rate has increased. If it's greater than 0.05, there is insufficient evidence. Since 18 is quite far from the mean of 12, it is likely significant, but the exact probability determines this.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A shop sells cars at a rate of 10 per week. Over 6 weeks, 75 cars are sold. Test if the rate has increased at the 5% level. Walk through the approximation choice, continuity correction, and conceptual Z-score evaluation. (4 steps)", "answer": "- Step 1: Scale and set up hypotheses. For 6 weeks, $$\\lambda = 6 \\times 10 = 60$$. Hypotheses: $$H_0: \\lambda = 60$$, $$H_1: \\lambda > 60$$. Since $$\\lambda = 60$$ is large, we approximate $$Po(60)$$ with $$W \\sim N(60, 60)$$.\n- Step 2: Apply continuity correction. We want $$P(X \\ge 75)$$. Since Poisson is discrete, we adjust the boundary down by 0.5 to include the area for $$X = 75$$. We calculate $$P(W > 74.5)$$.\n- Step 3: Calculate Z-score conceptually. $$Z = \\frac{74.5 - 60}{\\sqrt{60}}$$. The numerator is 14.5, and the denominator is roughly 7.7. So, $$Z \\approx 1.88$$.\n- Step 4: Decision. Compare the Z-score to the 5% one-tailed critical value of 1.645. Since 1.88 > 1.645, the result is significant. We reject $$H_0$$ and conclude there is evidence the rate of sales has increased.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A machine produces 0.3% faulty bulbs. A sample of 2000 bulbs has 12 faulty ones. Test if the fault rate has increased at the 5% level. Walk through the approximation choice and the conceptual setup. (4 steps)", "answer": "- Step 1: Set up Binomial. The exact model is $$X \\sim B(2000, 0.003)$$. $$H_0: p = 0.003$$, $$H_1: p > 0.003$$.\n- Step 2: Choose approximation. Since $$n$$ is large (2000) and $$p$$ is small (0.003), we approximate with Poisson. The mean is $$\\lambda = np = 2000 \\times 0.003 = 6$$. So, $$X \\approx Po(6)$$.\n- Step 3: Formulate the test using the approximation. We need to find $$P(X \\ge 12)$$ under the $$Po(6)$$ distribution.\n- Step 4: Decision. If $$P(X \\ge 12) < 0.05$$, we reject $$H_0$$. Since 12 is double the mean of 6, it sits far in the upper tail, suggesting we will likely reject $$H_0$$. (The actual probability is ~0.02, so we reject it).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}], "count": 20}, "glm_2
