": {"label": "GLM 5.1 ②", "cards": [{"question": "In the context of statistical hypothesis testing, what is a hypothesis, and what are the two specific types you must formulate before carrying out a test? Why do we need both? (3 steps)", "answer": "- Step 1: A hypothesis is a statement made about the value of a population parameter (such as the probability $$p$$ in a binomial distribution or the rate $$\\lambda$$ in a Poisson distribution).\n- Step 2: The two types are the **null hypothesis** ($$H_0$$), which is the assumption we assume to be correct initially, and the **alternative hypothesis** ($$H_1$$), which tells us about the parameter if our assumption is shown to be wrong.\n- Step 3: We need both because a hypothesis test is a process of determining whether there is enough evidence to reject $$H_0$$ in favour of $$H_1$$. Without $$H_1$$, we wouldn't know what specific change we are testing for (e.g., an increase, a decrease, or simply a difference).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A researcher wants to test if a coin is biased. They flip it 20 times and count the number of heads. Is the test statistic the probability of heads $$p$$, or the number of heads observed? Explain the difference between a test statistic and a population parameter. (3 steps)", "answer": "- Step 1: The test statistic is the number of heads observed. It is the result of the experiment or the statistic calculated from the sample.\n- Step 2: The population parameter is the probability $$p$$, which is the unknown true value we are making a statement about in our hypotheses (e.g., $$H_0: p = 0.5$$).\n- Step 3: The key difference is that the test statistic is known and calculated from observed data, while the population parameter is unknown and is what the hypothesis test is trying to make an inference about. We write hypotheses about parameters, but we calculate probabilities using the test statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "Conceptually, what does the significance level (e.g., 5%) represent in a hypothesis test? If we reject $$H_0$$ when we shouldn't have, what is this error called? (2 steps)", "answer": "- Step 1: The significance level is the threshold probability below which we consider the observed result to be too unlikely to have occurred by chance under the null hypothesis. It defines how much evidence we require to abandon our initial assumption.\n- Step 2: Incorrectly rejecting the null hypothesis when it is actually true is called a **Type I error**. The significance level is the probability of making a Type I error.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "If a researcher wants to test if a drug is *better* than the standard, what form does $$H_1$$ take? What if they want to test if it is simply *different*? How does this affect the \"tails\" of the test? (3 steps)", "answer": "- Step 1: If testing if it is *better* (an increase in success rate), the alternative hypothesis is $$H_1: p > p_0$$ (where $$p_0$$ is the standard rate). This is a **one-tailed test** because we only care about values in one extreme direction.\n- Step 2: If testing if it is *different* (could be better or worse), the alternative hypothesis is $$H_1: p \\neq p_0$$. This is a **two-tailed test** because extreme values in either direction would lead us to reject $$H_0$$.\n- Step 3: The choice between one-tailed and two-tailed dictates whether we look at one end of the distribution or split our significance level between both ends.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Define critical region and critical value. What is the relationship between them? Is the critical value inside or outside the critical region? (3 steps)", "answer": "- Step 1: A **critical region** is a range of values for the test statistic that would cause you to reject the null hypothesis. If the test statistic falls here, the result is considered statistically significant.\n- Step 2: The **critical value** is the first value to fall inside the critical region. It marks the boundary between the acceptance region and the critical region.\n- Step 3: The critical value is *inside* the critical region. For example, if the critical region is $$X \\geq 8$$, then 8 is the critical value and it is included in the critical region.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why is the *actual* significance level of a test often different from the nominal significance level (like 5%) when using discrete distributions like the Binomial? (3 steps)", "answer": "- Step 1: Discrete distributions can only take specific integer values, so we cannot always find a critical value that gives exactly a 5% probability in the tail.\n- Step 2: We must choose the critical region such that the probability of the test statistic falling within it is less than or as close as possible to the nominal significance level.\n- Step 3: The actual significance level is the exact probability of the test statistic falling within the critical region (the probability of incorrectly rejecting $$H_0$$), which is usually slightly less than the nominal 5% threshold because we can't hit it exactly with discrete jumps.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "When finding critical regions for a two-tailed test with a discrete distribution, what is the rule for choosing the critical value in each tail? If the target tail probability is 0.025, and the candidates are 0.030 and 0.018, which do you choose? (3 steps)", "answer": "- Step 1: The rule is to choose the critical value that makes the probability in the tail as close as possible to the target tail probability (e.g., 0.025), even if it slightly exceeds it.\n- Step 2: Calculate the distance of each candidate from the target: $$|0.030 - 0.025| = 0.005$$ and $$|0.018 - 0.025| = 0.007$$.\n- Step 3: Since 0.030 is closer to 0.025 than 0.018 is, you choose the critical value that gives the 0.030 probability, even though it slightly exceeds the 2.5% target.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "For a two-tailed test at the 5% significance level, how is the significance level distributed between the two tails? Why is this done instead of using 5% for each tail? (2 steps)", "answer": "- Step 1: The 5% significance level is split into two tails of 2.5% (0.025) each. We test if the observed probability in the relevant tail is less than 0.025.\n- Step 2: If we used 5% in each tail, the total probability of rejecting $$H_0$$ in either direction would be 10%. This would double the intended significance level, making it far too easy to falsely reject the null hypothesis.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "In a one-tailed test with $$H_1: p > 0.3$$, if the observed value is 8, why do we calculate $$P(X \\geq 8)$$ instead of just $$P(X = 8)$$? (2 steps)", "answer": "- Step 1: We need the probability of observing a value *at least as extreme* as the one observed, assuming $$H_0$$ is true. Values more extreme than 8 (like 9, 10, etc.) also provide evidence against $$H_0$$.\n- Step 2: $$P(X = 8)$$ only gives the probability of exactly that outcome, which is very small for any specific value. We must include the probabilities of all more extreme outcomes to properly assess the total rarity of the event under the null hypothesis.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "If a hypothesis test results in rejecting the null hypothesis, does this prove that the alternative hypothesis is true? Similarly, if we fail to reject $$H_0$$, does it prove $$H_0$$ is true? (2 steps)", "answer": "- Step 1: Rejecting $$H_0$$ does *not* prove $$H_1$$ is true; it simply means there is sufficient statistical evidence at the given significance level to suggest $$H_1$$ is more likely than $$H_0$$. There is still a chance (equal to the significance level) that we are wrong.\n- Step 2: Failing to reject $$H_0$$ does *not* prove $$H_0$$ is true; it means we do not have enough evidence to reject it. The correct interpretation is \"there is insufficient evidence to suggest [context of $$H_1$$]\".", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "A coin is tossed 10 times and lands on heads 8 times. Given that under the assumption of a fair coin, $$P(X \\geq 8) \\approx 0.055$$, test if the coin is biased towards heads at the 5% significance level. (4 steps)", "answer": "- Step 1: Define hypotheses. Let $$p$$ be the probability of heads. $$H_0: p = 0.5$$, $$H_1: p > 0.5$$.\n- Step 2: Assume $$H_0$$ is true, so the test statistic $$X \\sim B(10, 0.5)$$.\n- Step 3: Calculate the probability of the observed value or more extreme: $$P(X \\geq 8) \\approx 0.055$$.\n- Step 4: Compare to significance level. Since $$0.055 > 0.05$$, the result is not significant. We do not reject $$H_0$$. There is insufficient evidence to suggest the coin is biased towards heads.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "In a two-tailed test for $$X \\sim B(30, 0.5)$$ at the 5% significance level, if the observed value is 10, which tail of the distribution do you evaluate, and why? (2 steps)", "answer": "- Step 1: The expected value under $$H_0$$ is $$n \\times p = 30 \\times 0.5 = 15$$. The observed value of 10 is lower than the expected value.\n- Step 2: Therefore, we evaluate the lower tail of the distribution by calculating $$P(X \\leq 10)$$. In a two-tailed test, we only need to check the tail where the observed value falls, as extreme values in the other direction would not be consistent with the specific observed data.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A manufacturer claims 20% of items are faulty. In a sample of 20, 1 is faulty. Given $$P(X \\leq 1) \\approx 0.07$$ for $$X \\sim B(20, 0.2)$$, test at 10% significance if the proportion has changed. (4 steps)", "answer": "- Step 1: Define hypotheses. $$H_0: p = 0.2$$, $$H_1: p \\neq 0.2$$ (two-tailed test).\n- Step 2: Assume $$H_0$$ is true, so $$X \\sim B(20, 0.2)$$. Expected value is 4. Observed is 1 (lower tail).\n- Step 3: For a 10% two-tailed test, the significance level in each tail is 5% (0.05). Calculate $$P(X \\leq 1) \\approx 0.07$$.\n- Step 4: Compare to the tail threshold. Since $$0.07 > 0.05$$, we do not reject $$H_0$$. There is insufficient evidence that the proportion of faulty items has changed.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If a Poisson process occurs at a rate of 0.5 per minute, and you want to test observations over a 20-minute period, how do you adjust the parameter $$\\lambda$$ for your hypotheses? Why is this necessary? (2 steps)", "answer": "- Step 1: The parameter $$\\lambda$$ must be scaled to the observation period. For a 20-minute interval, $$\\lambda = 0.5 \\times 20 = 10$$. The hypotheses would be $$H_0: \\lambda = 10$$ and $$H_1$$ depending on the test direction.\n- Step 2: This is necessary because the Poisson distribution's parameter depends on the size of the interval. Observing for a longer period naturally increases the expected number of events, and the distribution must reflect the specific time frame of the test statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A typist makes 3 errors per page on average. On a 5-page document, they make 20 errors. Given $$P(X \\geq 20) \\approx 0.13$$ for $$X \\sim Po(15)$$, test at 5% significance if their error rate has increased. (3 steps)", "answer": "- Step 1: Define hypotheses for the 5-page period. $$H_0: \\lambda = 15$$, $$H_1: \\lambda > 15$$ (one-tailed test).\n- Step 2: Assume $$H_0$$ is true, so $$X \\sim Po(15)$$. Calculate the probability of the observed value or more extreme: $$P(X \\geq 20) \\approx 0.13$$.\n- Step 3: Compare to significance level. Since $$0.13 > 0.05$$, the result is not significant. We do not reject $$H_0$$. There is insufficient evidence to suggest the error rate has increased.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Under what conditions can a Binomial distribution $$B(n, p)$$ be approximated by a Poisson distribution? What is the parameter of the approximating Poisson distribution? (2 steps)", "answer": "- Step 1: A Binomial distribution can be approximated by a Poisson distribution when the number of trials $$n$$ is large and the probability of success $$p$$ is small (typically $$n > 50$$ and $$p < 0.1$$).\n- Step 2: The parameter of the approximating Poisson distribution is $$\\lambda = np$$, which represents the mean number of successes.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Under what conditions can a Binomial distribution $$B(n, p)$$ be approximated by a Normal distribution? What are the mean and variance of the approximating Normal distribution? (2 steps)", "answer": "- Step 1: A Binomial distribution can be approximated by a Normal distribution when the number of trials $$n$$ is large and the probability $$p$$ is close to 0.5 (typically $$np > 5$$ and $$n(1-p) > 5$$).\n- Step 2: The approximating Normal distribution has mean $$\\mu = np$$ and variance $$\\sigma^2 = np(1-p)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Under what condition can a Poisson distribution $$Po(\\lambda)$$ be approximated by a Normal distribution? What are the mean and variance of the approximating Normal distribution? (2 steps)", "answer": "- Step 1: A Poisson distribution can be approximated by a Normal distribution when the mean $$\\lambda$$ is large (typically $$\\lambda > 15$$ or $$20$$).\n- Step 2: The approximating Normal distribution has mean $$\\mu = \\lambda$$ and variance $$\\sigma^2 = \\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When using a Normal distribution to approximate a Binomial or Poisson distribution for a hypothesis test, why must a continuity correction be applied? If testing $$P(X \\geq 10)$$, what value do you use in the Normal calculation? (2 steps)", "answer": "- Step 1: The Normal distribution is continuous, while Binomial and Poisson distributions are discrete. A continuity correction adjusts for the fact that discrete probabilities are concentrated at integer points, while continuous probabilities are spread over intervals.\n- Step 2: To calculate $$P(X \\geq 10)$$ for a discrete variable, we must include the probability of exactly 10. In the continuous Normal approximation, this corresponds to starting just below 10, so we calculate $$P(W \\geq 9.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "A shop sells cars at a rate of 10 per week. Over a 6-week period, 75 cars were sold. Using a Normal approximation with $$\\mu=60$$ and $$\\sigma^2=60$$, and given the Z-score for 74.5 is approx 1.87, test at 5% significance if the rate has increased. (4 steps)", "answer": "- Step 1: Define hypotheses for the 6-week period. $$H_0: \\lambda = 60$$, $$H_1: \\lambda > 60$$.\n- Step 2: Assume $$H_0$$ is true, so $$Y \\sim Po(60)$$, approximated by $$W \\sim N(60, 60)$$.\n- Step 3: Calculate the probability of the observed value or more extreme using continuity correction: $$P(Y \\geq 75) \\approx P(W \\geq 74.5) = P(Z \\geq 1.87) \\approx 0.03$$.\n- Step 4: Compare to significance level. Since $$0.03 < 0.05$$, the result is significant. We reject $$H_0$$. There is sufficient evidence to suggest the rate of sales has increased.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A factory has a 1% faulty rate. In a sample of 200, 12 are faulty. Given that for $$X \\sim Po(2)$$, the critical region at 5% significance for a one-tailed test is $$X \\geq 6$$, test if the faulty rate has increased. (3 steps)", "answer": "- Step 1: Since $$n=200$$ is large and $$p=0.01$$ is small, we use a Poisson approximation with $$\\lambda = np = 2$$. Hypotheses: $$H_0: p=0.01$$, $$H_1: p>0.01$$.\n- Step 2: Under $$H_0$$, $$X \\sim Po(2)$$. The critical region for $$P(X \\geq c) < 0.05$$ is $$X \\geq 6$$.\n- Step 3: The observed value is 12. Since 12 falls inside the critical region ($$12 \\geq 6$$), we reject $$H_0$$. There is sufficient evidence that the faulty rate has increased.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "In a two-tailed test at 5% significance, if the observed value falls in the lower tail and $$P(X \\leq x) = 0.03$$, do we reject $$H_0$$? Why or why not? (2 steps)", "answer": "- Step 1: No, we do not reject $$H_0$$. In a two-tailed test at 5% significance, the significance level is split between the two tails, giving a threshold of 2.5% (0.025) in each tail.\n- Step 2: Since 0.03 is greater than the 0.025 threshold for that specific tail, the result is not extreme enough to be considered statistically significant in that direction.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A bus is late 30% of the time. Over 100 days, it is late 40 times. Using a Normal approximation with mean 30 and variance 21, and given the Z-score for 39.5 is approximately 2.07, test at 5% significance if the probability has increased. (4 steps)", "answer": "- Step 1: Define hypotheses. $$H_0: p = 0.3$$, $$H_1: p > 0.3$$.\n- Step 2: Assume $$H_0$$ is true, so $$X \\sim B(100, 0.3) \\approx N(30, 21)$$.\n- Step 3: Calculate probability with continuity correction: $$P(X \\geq 40) \\approx P(W \\geq 39.5) = P(Z \\geq 2.07) \\approx 0.02$$.\n- Step 4: Compare to significance level. Since $$0.02 < 0.05$$, the result is significant. We reject $$H_0$$. There is sufficient evidence that the probability of the bus being late has increased.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "A researcher tests if a coin is biased. They set $$H_0: p=0.5$$ and $$H_1: p \\neq 0.5$$. They observe 8 heads in 10 tosses. Given $$P(X \\geq 8) \\approx 0.055$$, what is their conclusion at the 5% significance level? (3 steps)", "answer": "- Step 1: This is a two-tailed test at 5% significance, so the threshold for each tail is 2.5% (0.025).\n- Step 2: The observed value is in the upper tail. The probability is $$P(X \\geq 8) \\approx 0.055$$.\n- Step 3: Since $$0.055 > 0.025$$, the result is not significant. We do not reject $$H_0$$. There is insufficient evidence to suggest the coin is biased. (Note: If it were a one-tailed test $$H_1: p>0.5$$, we would still not reject as $$0.055 > 0.05$$).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why is it incorrect to define the test statistic as the population parameter? For example, saying \"the test statistic is the probability of the coin landing on heads\". (2 steps)", "answer": "- Step 1: The test statistic is the value calculated from the *sample* or *experiment* (e.g., the number of heads observed). It is a random variable whose value we observe to conduct the test.\n- Step 2: The population parameter (like the probability $$p$$) is a fixed but unknown value that we are making an inference about. It cannot be observed directly and is the subject of the hypotheses, not the result of the experiment.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}], "count": 25}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In statistical hypothesis testing, what is a hypothesis, and how do the null ($$H_0$$) and alternative ($$H_1$$) hypotheses fundamentally differ in their roles within the test?", "answer": "- Step 1: A hypothesis is a statement made about the value of a population parameter (such as the probability $$p$$ in a binomial distribution or the rate $$\\lambda$$ in a Poisson distribution).\n- Step 2: The null hypothesis, $$H_0$$, is the baseline assumption we assume to be correct for the purpose of the test. It typically represents the status quo, a claimed value, or \"no change.\"\n- Step 3: The alternative hypothesis, $$H_1$$, tells us about the parameter if our assumption ($$H_0$$) is shown to be wrong. It represents the research claim, the suspicion of a change, or the effect we are testing for.\n\nThe test is designed to see if there is enough evidence to reject the status quo ($$H_0$$) in favor of the alternative ($$H_1$$).", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A researcher claims a coin is biased towards heads. They flip the coin 8 times and count the number of heads. Identify the test statistic and explain why the probability of heads is NOT the test statistic.", "answer": "- Step 1: The test statistic is the result calculated from the sample or experiment — in this case, the number of heads observed out of the 8 flips.\n- Step 2: The probability of heads is a population parameter ($$p$$), not a statistic. A statistic is computed from the sample data; a parameter is the unknown true value of the population.\n- Step 3: We use the observed test statistic (the count) to make an inference about the unknown population parameter ($$p$$). We cannot observe $$p$$ directly; we only observe the data.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When conducting a hypothesis test, we assume $$H_0$$ is true. What does the significance level represent in this context, and what is the consequence of setting it too high?", "answer": "- Step 1: The significance level (e.g., 5% or 1%) is the threshold probability below which we consider the observed result to be too unlikely to have occurred by chance alone under $$H_0$$.\n- Step 2: It represents the maximum tolerable probability of incorrectly rejecting $$H_0$$ (a Type I error) — that is, concluding there is an effect or change when there actually isn't one.\n- Step 3: If the significance level is set too high (e.g., 50%), we would reject $$H_0$$ based on weak evidence, leading to too many false positives (e.g., claiming the coin is biased when it is actually fair).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "How do the forms of the alternative hypothesis $$H_1$$ distinguish a one-tailed test from a two-tailed test?", "answer": "- Step 1: A one-tailed test has an alternative hypothesis with a specific direction of change: $$H_1: \\theta < \\text{value}$$ or $$H_1: \\theta > \\text{value}$$ (where $$\\theta$$ is the parameter).\n+ Example: Testing if a drug is an *improvement* ($$p > 0.4$$) or if a machine produces *fewer* faults ($$p < 0.1$$).\n- Step 2: A two-tailed test has an alternative hypothesis with no specific direction, only that the parameter is *different* from the null: $$H_1: \\theta \\neq \\text{value}$$.\n+ Example: Testing if a coin is *biased* in *any* direction ($$p \\neq 0.5$$) or if a rate has *changed*.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Define \"critical region\" and \"critical value\". How do they relate to the acceptance region?", "answer": "- Step 1: The critical region is the range of values for the test statistic that would lead you to reject the null hypothesis $$H_0$$. It corresponds to the \"extreme\" outcomes.\n- Step 2: The critical value is the boundary value — the first value to fall inside the critical region. It marks the cutoff point.\n- Step 3: The acceptance region is the complement of the critical region. If the test statistic falls in the acceptance region, you do not have enough evidence to reject $$H_0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Why is the \"actual significance level\" of a test often slightly different from the nominal \"significance level\" (e.g., 5%) specified in the problem when using discrete distributions?", "answer": "- Step 1: Discrete distributions (like Binomial or Poisson) can only take specific, separate integer values. Probabilities jump from one value to the next; there are no fractional observations.\n- Step 2: When finding the critical region, we must include whole values. We look for the region where the probability is strictly less than the nominal level (e.g., $$< 0.05$$).\n- Step 3: Because of the discrete jumps, we usually cannot hit exactly 5%. We must take the critical region that brings the probability just *under* 5%, meaning the actual probability of falling in the critical region (the actual significance level) is often slightly less than the nominal 5%.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Given $$X \\sim B(10, p)$$ and a one-tailed test $$H_1: p > 0.4$$ at the 5% level, explain the logical process of finding the critical region using cumulative probabilities. (3 steps)", "answer": "- Step 1: Assume $$H_0$$ is true, so $$X \\sim B(10, 0.4)$$. We are looking for high values of $$X$$ that are unlikely, so we need to find the smallest $$x$$ such that $$P(X \\ge x) < 0.05$$.\n- Step 2: Convert to cumulative form using the complement rule: $$P(X \\ge x) = 1 - P(X \\le x - 1)$$. We need $$1 - P(X \\le x - 1) < 0.05$$, which rearranges to $$P(X \\le x - 1) > 0.95$$.\n- Step 3: Look up the cumulative tables for $$n=10, p=0.4$$. Find the first value where the cumulative probability exceeds 0.95. If $$P(X \\le 7) = 0.9877$$, then $$x-1 = 7$$, so the critical value is $$x = 8$$. The critical region is $$X \\ge 8$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "For a two-tailed test at the 5% significance level, why do we split the probability and look for critical regions where the probability in each tail is as close as possible to 2.5%, rather than allowing 5% in each tail?", "answer": "- Step 1: A two-tailed test checks for a change in *either* direction. The overall probability of incorrectly rejecting $$H_0$$ (the total significance level) must be kept to the specified 5%.\n- Step 2: If we allowed 5% in each tail, the total probability of an incorrect rejection would be 10%, which violates the 5% significance level set for the test.\n- Step 3: Therefore, we split the 5% equally (or as close as possible given the discrete nature) between the two tails, aiming for roughly 2.5% in the lower tail and 2.5% in the upper tail.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "In a two-tailed test for $$X \\sim B(n, p)$$ with an observed value $$x$$, how do you decide which tail's probability to calculate first when using the probability method (Method 1)?", "answer": "- Step 1: Calculate the expected value of the test statistic under $$H_0$$, which is $$E(X) = np$$.\n- Step 2: Compare the observed value $$x$$ to the expected value $$np$$.\n- Step 3: If $$x$$ is lower than $$np$$, consider the lower tail probability $$P(X \\le x)$$. If $$x$$ is higher than $$np$$, consider the upper tail probability $$P(X \\ge x)$$. You then compare this probability to half the significance level (e.g., 0.025 for a 5% test).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A call center receives calls at a rate of 0.325 per minute. A manager wants to test if the rate has changed over a 20-minute period. How do you set up the hypotheses $$H_0$$ and $$H_1$$, and what distribution do you use under $$H_0$$?", "answer": "- Step 1: Define the parameter. Let $$\\lambda$$ be the mean number of calls in the 20-minute interval. The rate must be scaled to match the time period.\n- Step 2: Under the null hypothesis (rate hasn't changed), the mean for 20 minutes is $$20 \\times 0.325 = 6.5$$. So, $$H_0: \\lambda = 6.5$$.\n- Step 3: Since we are testing if the rate has changed (no direction specified), $$H_1: \\lambda \\neq 6.5$$. The model under $$H_0$$ is $$X \\sim Po(6.5)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "When testing a binomial proportion $$p$$ with a large sample size $$n$$, direct calculation becomes difficult. Under what two different conditions do we approximate $$B(n, p)$$, and what are the approximating distributions?", "answer": "- Step 1: Condition 1: $$n$$ is large and $$p$$ is small (typically $$n > 50$$ and $$p < 0.1$$). In this case, the Binomial is skewed, and we approximate it with a Poisson distribution $$Po(np)$$.\n- Step 2: Condition 2: $$n$$ is large and $$p$$ is close to 0.5 (so the distribution is roughly symmetrical). In this case, we approximate it with a Normal distribution $$N(np, np(1-p))$$.\n- Step 3: The choice depends on the shape of the binomial distribution: skewed (use Poisson) or symmetrical (use Normal).", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "When approximating a discrete distribution (like Binomial or Poisson) with a continuous Normal distribution for a hypothesis test, why is a continuity correction necessary, and how do you adjust the boundary for $$P(X \\ge x)$$?", "answer": "- Step 1: Discrete distributions assign probability to exact integer points, while continuous distributions assign probability over intervals. The Normal distribution assigns zero probability to any exact single point.\n- Step 2: To approximate the discrete probability at $$X = x$$ with a continuous distribution, we use the interval from $$(x - 0.5)$$ to $$(x + 0.5)$$.\n- Step 3: For $$P(X \\ge x)$$, we must include the whole block of probability at $$x$$. So we adjust the boundary down by 0.5: $$P(X \\ge x) \\approx P(W > x - 0.5)$$, where $$W$$ is the Normal variable.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A factory tests 200 items and finds 12 faulty. The historical fault rate is 4%. To test if the fault rate has increased, we use a Poisson approximation. Explain why Poisson is suitable here and state the approximate distribution under $$H_0$$.", "answer": "- Step 1: Identify the parameters: $$n = 200$$ (large) and $$p = 0.04$$ (small). These satisfy the conditions for a Poisson approximation to the Binomial.\n- Step 2: Under $$H_0$$ (rate hasn't changed), the mean of the Binomial is $$np = 200 \\times 0.04 = 8$$.\n- Step 3: The approximate distribution is $$X \\sim Po(8)$$. This allows us to use the simpler Poisson cumulative tables instead of complex Binomial calculations.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A test statistic $$X \\sim B(20, 0.25)$$ is used to test $$H_0: p=0.25$$ against $$H_1: p < 0.25$$ at the 5% level. The observed value is 2. Given $$P(X \\le 2) = 0.0913$$ and $$P(X \\le 1) = 0.0243$$, what is the conclusion, and what is the actual significance level? (3 steps)", "answer": "- Step 1: Calculate the probability of the observed value or more extreme under $$H_0$$: $$P(X \\le 2) = 0.0913$$.\n- Step 2: Compare to the significance level: $$0.0913 > 0.05$$. The probability is not small enough, so there is insufficient evidence to reject $$H_0$$.\n- Step 3: The actual significance level is the probability of falling in the critical region. Since $$P(X \\le 1) = 0.0243$$ is the first value below 0.05, the critical region is $$X \\le 1$$. The actual significance level is $$P(X \\le 1) = 0.0243$$ or 2.43%.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A student observes 8 heads out of 10 coin tosses and writes $$H_0: p = 0.8$$ because 8/10 = 0.8. Explain the flaw in this logic.", "answer": "- Step 1: The null hypothesis $$H_0$$ must state the assumed or claimed value of the population parameter *before* the experiment is conducted.\n- Step 2: $$p = 0.8$$ is the sample proportion (a statistic), not the population parameter.\n- Step 3: If testing for fairness, $$H_0$$ should be $$p = 0.5$$. We use the sample result (8 heads) to test the claim, not to define the claim itself. The student is confusing the observed statistic with the hypothesized parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "If the critical region for a test is $$X \\ge 15$$, and the observed value is exactly 15, do we reject or fail to reject $$H_0$$? Why?", "answer": "- Step 1: The critical region is defined as the set of values that cause us to reject $$H_0$$.\n- Step 2: Since 15 is included in the critical region ($$X \\ge 15$$), we reject $$H_0$$.\n- Step 3: The critical value (15) is defined as the *first* value to fall inside the critical region. Therefore, reaching the critical value is sufficient to reject the null hypothesis.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Let $$X \\sim Po(6.5)$$. For a two-tailed test at 5%, how do you find the two critical regions, and how do you calculate the actual significance level? (3 steps)", "answer": "- Step 1: Split the 5% into two 2.5% tails. For the lower tail, find the largest $$c_1$$ such that $$P(X \\le c_1) \\le 0.025$$. For the upper tail, find the smallest $$c_2$$ such that $$P(X \\ge c_2) \\le 0.025$$.\n- Step 2: The critical regions are $$X \\le c_1$$ and $$X \\ge c_2$$. (e.g., from tables: $$P(X \\le 1) = 0.0113$$, so lower region is $$X \\le 1$$. $$P(X \\ge 12) = 0.0339$$, so upper region is $$X \\ge 12$$).\n- Step 3: The actual significance level is the sum of the probabilities in both critical regions: $$P(X \\le c_1) + P(X \\ge c_2)$$. (e.g., $$0.0113 + 0.0339 = 0.0452$$ or 4.52%).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "William takes two independent observations of a test statistic and finds they *both* fall inside the critical region. If the actual significance level (probability of incorrectly rejecting $$H_0$$ for one observation) is $$\\alpha$$, what is the probability that he has incorrectly rejected $$H_0$$ based on both observations?", "answer": "- Step 1: The probability of incorrectly rejecting $$H_0$$ for one observation is the probability of a Type I error, which is $$\\alpha$$.\n- Step 2: Since the two observations are independent, the probability of both falling in the critical region (and thus incorrectly rejecting $$H_0$$ based on this rule) is the product of the individual probabilities.\n- Step 3: Therefore, the probability is $$\\alpha \\times \\alpha = \\alpha^2$$. This makes a false positive much less likely than using a single observation.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "A shop sells cars at a rate of 10 per week. Over 6 weeks, 75 cars are sold. Test if the rate has increased at the 5% level. Walk through the steps of using a Normal approximation to find the standardized test statistic. (4 steps)", "answer": "- Step 1: Set up hypotheses. Let $$Y$$ be sales in 6 weeks. $$H_0: \\lambda = 60$$ (rate is 10/wk), $$H_1: \\lambda > 60$$. Under $$H_0$$, $$Y \\sim Po(60)$$.\n- Step 2: Since $$\\lambda = 60$$ is large, approximate with Normal: $$Y \\approx N(60, 60)$$.\n- Step 3: Apply continuity correction for $$P(Y \\ge 75)$$: we need $$P(W > 74.5)$$ where $$W \\sim N(60, 60)$$.\n- Step 4: Calculate the z-score: $$z = \\frac{74.5 - 60}{\\sqrt{60}} = \\frac{14.5}{7.746} \\approx 1.87$$. Since 1.87 > 1.6449 (the 5% one-tail critical z-value), we reject $$H_0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A dice is rolled 12 times, and only one '6' appears. Test at the 5% level if $$P(\\text{rolling a 6}) < 1/6$$. State $$H_0, H_1$$ and the conclusion directionally. (3 steps)", "answer": "- Step 1: Let $$p$$ be the probability of rolling a 6. $$H_0: p = 1/6$$, $$H_1: p < 1/6$$. Under $$H_0$$, $$X \\sim B(12, 1/6)$$.\n- Step 2: We need $$P(X \\le 1)$$. From tables or calculation: $$P(X=0) + P(X=1) \\approx 0.1122 + 0.2692 = 0.3814$$.\n- Step 3: Since $$0.3814 > 0.05$$, there is insufficient evidence to reject $$H_0$$. The observed result is not unlikely enough under the null hypothesis to conclude the dice is biased against 6.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A coin is tossed 20 times, landing heads 6 times. For a two-tailed test at 5% significance, we are testing $$H_0: p=0.5$$ vs $$H_1: p \\neq 0.5$$. The expected value is 10. Which tail probability do we calculate, and what is the comparison value?", "answer": "- Step 1: The observed value (6) is less than the expected value (10), so we consider the lower tail probability: $$P(X \\le 6)$$.\n- Step 2: Because it is a two-tailed test at 5%, we must split the significance level. We compare our probability to half of 5%, which is 2.5% or 0.025.\n- Step 3: Calculate $$P(X \\le 6)$$ under $$B(20, 0.5)$$. From tables, this is 0.0577. Since $$0.0577 > 0.025$$, we do not reject $$H_0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A manager thinks 45% of customers buy a product. In a sample of 100, 35 buy it. Test at 5% if the claim is justified (two-tailed). Walk through the Normal approximation setup and continuity correction. (3 steps)", "answer": "- Step 1: $$H_0: p = 0.45$$, $$H_1: p \\neq 0.45$$. Under $$H_0$$, $$X \\sim B(100, 0.45)$$. Since $$n$$ is large and $$p$$ is near 0.5, approximate as $$W \\sim N(45, 100 \\times 0.45 \\times 0.55) = N(45, 24.75)$$.\n- Step 2: Observed value is 35, which is below the mean of 45. We calculate the lower tail probability with continuity correction: $$P(X \\le 35) \\approx P(W < 35.5)$$.\n- Step 3: Calculate z-score: $$z = \\frac{35.5 - 45}{\\sqrt{24.75}} = \\frac{-9.5}{4.975} \\approx -1.91$$. For a two-tailed 5% test, the critical z-values are $$\\pm 1.96$$. Since -1.91 is not more extreme than -1.96, we do not reject $$H_0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}], "count": 22}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define null and alternative hypotheses, and explain their roles in hypothesis testing. (3 steps)", "answer": "- Step 1: **Null hypothesis (H₀)** is the default assumption about a population parameter (e.g., \"p = 0.5\" for a biased coin). It is the hypothesis we assume to be true during testing.  \n- Step 2: **Alternative hypothesis (H₁)** describes the parameter if H₀ is false. It defines the direction (one-tailed: H₁: p > 0.5 or p < 0.5; two-tailed: H₁: p ≠ 0.5).  \n- Step 3: H₀ and H₁ together form the framework for testing. H₀ is rejected if the test statistic falls into the critical region, determined by the significance level (e.g., 5%).  \n\n**Takeaway:** H₀ is the status quo; H₁ reflects the researcher’s suspicion.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is a test statistic used in hypothesis testing, and how is it related to the population parameter?", "answer": "- Step 1: A **test statistic** is a value calculated from the sample (e.g., number of successes in a binomial experiment). It quantifies the outcome of the experiment.  \n- Step 2: The test statistic is modeled using a distribution (e.g., X ~ B(n, p) for binomial or X ~ Po(λ) for Poisson) under the assumption that H₀ is true.  \n- Step 3: By comparing the observed test statistic to its expected distribution under H₀, we determine how \"extreme\" the result is. Extreme values (in the critical region) lead to rejecting H₀.  \n\n**Takeaway:** The test statistic links sample data to population parameters, enabling inference.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "What distinguishes a one-tailed test from a two-tailed test, and how do their critical regions differ? (3 steps)", "answer": "- Step 1: **One-tailed tests** (H₁: p > x or p < x) have a single critical region in one tail of the distribution. They test directional claims (e.g., \"higher than\").  \n- Step 2: **Two-tailed tests** (H₁: p ≠ x) split the significance level (α) into two equal parts (α/2 per tail). They test non-directional claims (e.g., \"different from\").  \n- Step 3: Example: A 5% two-tailed test has 2.5% in each tail. This affects critical values (e.g., X ≤ c₁ or X ≥ c₂).  \n\n**Takeaway:** Use one-tailed for directional hypotheses, two-tailed for non-directional.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How is the critical region determined for a binomial distribution at a given significance level (e.g., 5%)? (4 steps)", "answer": "- Step 1: Assume H₀ is true and define the distribution (e.g., X ~ B(10, 0.2)).  \n- Step 2: For H₁: p > 0.2, calculate cumulative probabilities P(X ≥ x) using tables or a calculator.  \n- Step 3: Identify the smallest x where P(X ≥ x) < α (e.g., P(X ≥ 5) = 0.0328 < 0.05 for H₁: p > 0.2).  \n- Step 4: The critical region is all x values where P(X ≥ x) < α (e.g., x ≥ 5).  \n\n**Takeaway:** Critical regions are based on extreme values under H₀ that are unlikely if H₀ is valid.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the actual significance level sometimes less than the stated level (e.g., 5%) in discrete distributions?", "answer": "- Step 1: Discrete distributions (binomial/Poisson) have gaps between probabilities. The critical region must be the closest value below α.  \n- Step 2: For example, if P(X ≥ 5) = 3% but P(X ≥ 4) = 6%, the critical region is X ≥ 5 even though 3% < 5%.  \n- Step 3: The **actual significance level** is the sum of probabilities in the critical region (3% in this case). It is the true probability of a Type I error.  \n\n**Takeaway:** Discrete distributions force actual significance to be ≤ α.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How are critical regions for two-tailed binomial tests found, and why are they split? (4 steps)", "answer": "- Step 1: For H₁: p ≠ 0.5, split α (e.g., 5% → 2.5% per tail).  \n- Step 2: Find lower tail critical value (c₁) where P(X ≤ c₁) ≤ 2.5%.  \n- Step 3: Find upper tail critical value (c₂) where P(X ≥ c₂) ≤ 2.5%.  \n- Step 4: The critical region is X ≤ c₁ or X ≥ c₂. The actual significance level is P(X ≤ c₁) + P(X ≥ c₂).  \n\n**Takeaway:** Two-tailed tests require checking both extremes of the distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "In a Poisson hypothesis test (e.g., λ = 3.25), how is the critical region determined for a one-tailed test at 5%? (3 steps)", "answer": "- Step 1: Define H₀: λ = 3.25 and H₁: λ < 3.25 (one-tailed).  \n- Step 2: Calculate P(X ≤ observed) using Poisson tables. If P(X ≤ x) < 5%, reject H₀.  \n- Step 3: For example, if Y ~ Po(3.25) and observes Y = 1, find P(Y ≤ 1) = 0.1648 > 0.05. Do not reject H₀.  \n\n**Takeaway:** Poisson tests use cumulative probabilities like binomial, but with λ instead of p.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why are critical values for two-tailed Poisson tests often asymmetric?", "answer": "- Step 1: Discrete distributions (like Poisson) make it hard to split α exactly.  \n- Step 2: For H₀: λ = 6.5 (Example 7a), lower tail P(X ≤ 1) = 0.0113 and upper tail P(X ≥ 12) = 0.0339. These sum to 0.0452 (actual significance level).  \n- Step 3: The critical regions (X ≤ 1 and X ≥ 12) are asymmetric because the Poisson distribution is skewed.  \n\n**Takeaway:** Discreteness and skewness cause asymmetric critical regions in two-tailed tests.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you decide whether to use a binomial or Poisson distribution for a hypothesis test?", "answer": "- Step 1: Use **binomial** when modeling proportions (e.g., number of successes in n trials).  \n- Step 2: Use **Poisson** when modeling rates (e.g., number of events in a fixed interval).  \n- Step 3: Example: Olav’s coin tosses (8 trials) → binomial. Office calls over 20 minutes (rate) → Poisson.  \n\n**Takeaway:** Binomial for fixed n, Poisson for unbounded events over time/space.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the role of the significance level (e.g., 5%) in hypothesis testing?", "answer": "- Step 1: The significance level (α) is the threshold for rejecting H₀. If P(test statistic) < α, reject H₀.  \n- Step 2: It defines the critical region. For example, α = 5% means 5% of outcomes under H₀ are \"extreme.\"  \n- Step 3: A lower α (e.g., 1%) makes rejecting H₀ harder, reducing Type I error risk.  \n\n**Takeaway:** α balances Type I error risk and the sensitivity of the test.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is the test statistic’s distribution (e.g., B(n, p)) central to hypothesis testing?", "answer": "- Step 1: The distribution (e.g., binomial) under H₀ allows calculating P(X = x), which is needed to find critical regions.  \n- Step 2: Without the distribution, we can’t compute probabilities to assess the test statistic’s extremity.  \n- Step 3: Example: For X ~ B(20, 0.4), P(X ≥ 11) = 0.1275 > 0.05, so H₀ is not rejected.  \n\n**Takeaway:** The distribution is the foundation for probability calculations in hypothesis testing.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "What is the procedure for using a normal approximation in a binomial hypothesis test? (4 steps)", "answer": "- Step 1: Use N(np, np(1-p)) if n is large and p ≈ 0.5 (e.g., n=100, p=0.45).  \n- Step 2: Apply continuity correction (e.g., P(X ≤ 35) ≈ P(W < 35.5) for W ~ N(45, 24.75)).  \n- Step 3: Standardize using Z = (x - μ)/σ and compare to critical Z-values (e.g., Z < -1.96 for 5% two-tailed).  \n- Step 4: If the Z-value falls in the critical region, reject H₀.  \n\n**Takeaway:** Normal approximation simplifies calculations for large n but requires continuity correction.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is the expected value (np) important when determining which tail to test in a binomial test?", "answer": "- Step 1: The expected value under H₀ (e.g., np = 8 for X ~ B(20, 0.4)) is the \"typical\" outcome.  \n- Step 2: If the observed value is lower than expected, test the lower tail (P(X ≤ x)). If higher, test the upper tail (P(X ≥ x)).  \n- Step 3: Example: In Example 2, 3 supporters vs. expected 8. Test P(X ≤ 3) to check if the proportion is lower than 0.4.  \n\n**Takeaway:** The expected value anchors the direction of the test.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the purpose of continuity correction in Poisson-to-normal approximations?", "answer": "- Step 1: Poisson is discrete; normal is continuous. Continuity correction adjusts for the gap between discrete and continuous scales.  \n- Step 2: For P(X ≥ 75) in Y ~ Po(60), use P(W ≥ 74.5) for W ~ N(60, 60).  \n- Step 3: This ensures probabilities align better (e.g., 74.5 in normal approximates 75 in Poisson).  \n\n**Takeaway:** Continuity correction improves approximation accuracy in hypothesis testing.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How do you interpret the conclusion of a hypothesis test in context, using the significance level and critical region? (3 steps)", "answer": "- Step 1: If the test statistic falls in the critical region, reject H₀. Example: X = 11 in Example 5 is not in the critical region (X ≥ 13), so H₀ is not rejected.  \n- Step 2: If not in the critical region, conclude \"insufficient evidence\" to reject H₀.  \n- Step 3: Always state the conclusion in context: \"There is insufficient evidence to suggest the new drug is better than the old one.\"  \n\n**Takeaway:** Contextual interpretation is crucial, not just statistical jargon.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What is a Type I error in hypothesis testing, and how is its probability related to the significance level?", "answer": "- Step 1: A **Type I error** occurs when H₀ is true but rejected (false positive).  \n- Step 2: The significance level (α) is the maximum allowed probability of a Type I error (e.g., 5% chance if α = 5%).  \n- Step 3: The actual significance level is the true Type I error probability (e.g., 2.23% in Example 3).  \n\n**Takeaway:** Significance level controls Type I error risk, but actual significance may differ due to discrete distributions.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How does the critical region change when increasing the sample size (n) in a binomial test? (3 steps)", "answer": "- Step 1: Larger n makes the binomial distribution more symmetric (CLT).  \n- Step 2: Critical regions shift outward. For example, n=10 (H₀: p=0.2) has critical region X ≥ 4. For n=30, it might be X ≥ 8.  \n- Step 3: Larger n increases test power (ability to detect deviations from H₀).  \n\n**Takeaway:** Larger samples allow for tighter critical regions and better sensitivity.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is the actual significance level in Example 4, and why might it differ from the stated 2.5% per tail?", "answer": "- Step 1: For H₀: p = 0.5 vs. H₁: p ≠ 0.5 (Example 4), lower tail P(X ≤ 1) = 0.0113, upper tail P(X ≥ 12) = 0.0160.  \n- Step 2: Actual significance level = 0.0113 + 0.0160 = 0.0273 (2.73%) vs. 2.5% per tail.  \n- Step 3: Discreteness of the binomial distribution makes exact α splits impossible, so the actual level is the closest achievable.  \n\n**Takeaway:** Actual significance level is the true Type I error probability, adjusted for discrete data.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "When should a Poisson distribution be used instead of a binomial distribution for hypothesis testing?", "answer": "- Step 1: Use Poisson when modeling **rare events** over time/space (e.g., calls per hour).  \n- Step 2: Use binomial for fixed trials with two outcomes (e.g., 10 coin tosses).  \n- Step 3: Example: Office calls (Example 7) use Poisson (rate), while Dmitri’s dice throws (3a) use binomial (success/failure in fixed trials).  \n\n**Takeaway:** Poisson for rates, binomial for proportions.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How do you test a hypothesis about a Poisson rate (e.g., λ = 3.25) at 5% significance? (3 steps)", "answer": "- Step 1: Define H₀: λ = 3.25 and H₁: λ < 3.25 (one-tailed).  \n- Step 2: Calculate P(Y ≤ 1) for Y ~ Po(3.25). Example: 0.1648 > 0.05 → accept H₀.  \n- Step 3: Compare cumulative probabilities to α. If P(Y ≤ observed) < α, reject H₀.  \n\n**Takeaway:** Use Poisson tables to find cumulative probabilities and compare to α.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Why might a two-tailed test have non-integer critical values (e.g., X ≤ 0 or X ≥ 12 for a discrete distribution)?", "answer": "- Step 1: Discrete distributions (e.g., binomial) require critical values to be integers.  \n- Step 2: For Example 4 (X ~ B(40, 0.4)), lower tail P(X ≤ 3) = 0.0047, upper tail P(X ≥ 29) = 0.0043.  \n- Step 3: Critical regions are X ≤ 3 or X ≥ 29, even if their probabilities (0.0089 total) are slightly below α = 2.5%.  \n\n**Takeaway:** Discrete data forces critical regions to be integer bounds, even if probabilities aren’t exact.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "What is the key difference between a **critical region** and an **acceptance region** in hypothesis testing?", "answer": "- Step 1: **Critical region** contains values leading to rejection of H₀ (e.g., X ≥ 8 in Example 2).  \n- Step 2: **Acceptance region** contains values leading to not rejecting H₀ (e.g., X ≤ 7 in Example 2).  \n- Step 3: The critical region is determined by α, while the acceptance region is the complement.  \n\n**Takeaway:** Critical region = rejection; acceptance region = fail to reject H₀.", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "How is the actual significance level calculated when using a two-tailed approximation (e.g., normal) for a binomial test?", "answer": "- Step 1: Convert binomial to normal: X ~ B(n, p) → N(np, np(1-p)).  \n- Step 2: Find critical values (e.g., z = ±1.96 for 5% two-tailed).  \n- Step 3: Calculate P(X ≥ c₁) + P(X ≥ c₂) using binomial tables (Example 4: 0.0113 + 0.0160 = 0.0273).  \n\n**Takeaway:** Approximations require adjustment to match actual significance levels.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "Why is the critical value for a one-tailed binomial test not always the smallest x where P(X ≥ x) < α?", "answer": "- Step 1: The critical value is the **smallest x where P(X ≥ x) < α** (Example 3: x=5).  \n- Step 2: However, if P(X ≥ x) is closer to α than P(X ≥ x+1), x is chosen (Example 3: P(X ≥ 5) = 0.0223 < 0.05, so critical region is X ≥ 5).  \n- Step 3: Discreteness forces critical values to be chosen based on the closest cumulative probability below α.  \n\n**Takeaway:** Critical values balance α and discrete probability jumps.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "How do you handle a Poisson test when the observed value is **exactly the expected value** under H₀?", "answer": "- Step 1: If Y ~ Po(6.5) and observes y = 6.5 (e.g., 6 or 7), the cumulative probability is compared to α/2 per tail.  \n- Step 2: For H₁: λ ≠ 6.5, P(X ≤ 6) and P(X ≥ 7) are checked. If both are > α/2, H₀ is not rejected.  \n- Step 3: Example: In Example 7a, X=7 is near the expected 6.5, and P(X ≥ 12) is the critical region.  \n\n**Takeaway:** Even exact matches must be compared to critical regions.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}], "count": 25}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the two hypotheses needed for any hypothesis test and what do they represent? (2 steps)", "answer": "- Step 1: The null hypothesis (H₀) is the assumption we begin with that we will test, usually representing \"no change\" or \"no effect\".\n- Step 2: The alternative hypothesis (H₁) tells us what we believe to be true about the parameter if our assumption (H₀) is shown to be wrong.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is a test statistic in hypothesis testing?", "answer": "A test statistic is the result of the experiment or the statistic that is calculated from the sample. It's used to determine how likely our observed result is, assuming the null hypothesis is true.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is the significance level in hypothesis testing?", "answer": "The significance level is the probability threshold below which we consider our test statistic to be unlikely enough to reject the null hypothesis. Common levels are 10%, 5%, or 1%, though the question will specify which level to use.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What is a critical region in hypothesis testing?", "answer": "A critical region is the region of the probability distribution which, if the test statistic falls within it, would cause you to reject the null hypothesis. It contains the most extreme values that would lead to rejection of H₀.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is a critical value in hypothesis testing?", "answer": "A critical value is the first value to fall inside the critical region. It's the boundary value that separates the critical region (where we reject H₀) from the acceptance region (where we don't reject H₀).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the actual significance level in hypothesis testing?", "answer": "The actual significance level is the probability of incorrectly rejecting the null hypothesis. It's the exact probability of the test statistic falling within the critical region, which might be slightly different from the stated significance level.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What's the difference between one-tailed and two-tailed tests? (2 steps)", "answer": "- Step 1: One-tailed tests have the alternative hypothesis in the form H₁: p < ... or H₁: p > ...\n- Step 2: Two-tailed tests have alternative hypothesis in the form H₁: p ≠ ... and have critical regions at both ends of the distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "When you're conducting a hypothesis test with a binomial distribution, how do you find the critical region? (3 steps)", "answer": "- Step 1: Assume H₀ is true and determine the binomial distribution parameters (n and p)\n- Step 2: For a one-tailed test, find the first value where P(X ≥ x) < significance level (or P(X ≤ x) < significance level)\n- Step 3: For a two-tailed test, find values where P(X ≤ x₁) ≤ significance level/2 and P(X ≥ x₂) ≤ significance level/2", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When you're working with a binomial distribution and conducting hypothesis tests, how do you calculate probabilities? (3 steps)", "answer": "- Step 1: Use binomial distribution tables to find cumulative probabilities\n- Step 2: For P(X ≤ x), directly use table value\n- Step 3: For P(X ≥ x), calculate as 1 - P(X ≤ x-1)", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "If you're conducting a one-tailed hypothesis test with a binomial distribution at the 5% significance level, how do you determine if you should reject the null hypothesis? (3 steps)", "answer": "- Step 1: Assume H₀ is true and determine the binomial distribution\n- Step 2: Calculate the probability of observing the test statistic or more extreme (P(X ≥ x) or P(X ≤ x) depending on direction)\n- Step 3: If this probability is less than 5%, reject H₀", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "For a two-tailed hypothesis test with a binomial distribution at the 5% signif ributions have fixed number of trials n while Poisson doesn't\n- Step 3: Binomial can only take values between 0 and n while Poisson can take any non-negative integer\n- Step 4: Different tables and distributions are used for finding probabilities", "source": "Qwen 3 ②", "_id": "qwen_2_50", "judge_pick": false}, {"question": "When you're conducting a hypothesis test with a Poisson distribution, how do you determine if your sample size justifies normal approximation?", "answer": "- Step 1: If λ is large (typically λ > 10), normal approximation is justified\n- Step 2: The normal distribution would be N(λ, λ)\n- Step 3: Larger λ values make Poisson distribution more symmetric\n- Step 4: Apply continuity correction since Poisson is discrete while normal is continuous", "source": "Qwen 3 ②", "_id": "qwen_2_51", "judge_pick": false}, {"question": "When you're conducting a hypothesis test with a Poisson distribution, why do you need to consider which tail to test?", "answer": "- Step 1: Compare the observed value to the expected value under H₀ (which is λ)\n- Step 2: If the observed value is significantly lower than λ, test the lower tail\n- Step 3: If the observed value is significantly higher than λ, test the upper tail\n- Step 4: For two-tailed tests, consider both tails if direction is unknown", "source": "Qwen 3 ②", "_id": "qwen_2_52", "judge_pick": false}, {"question": "How does the process of hypothesis testing connect sample data to population parameters?", "answer": "- Step 1: A sample is used to make an inference about a population\n- Step 2: The test is based on the assumption that the population parameter is the null hypothesis value\n- Step 3: The sample data is compared to what would be expected under the null hypothesis\n- Step 4: If the sample data is extremely unlikely under the null hypothesis, we reject it", "source": "Qwen 3 ②", "_id": "qwen_2_53", "judge_pick": false}, {"question": "When you're conducting a hypothesis test, how does the sample size affect the test?", "answer": "- Step 1: Larger sample sizes make small deviations from the null hypothesis more detectable\n- Step 2: As sample size increases, test becomes more sensitive\n- Step 3: With very large samples, even trivial differences can become statistically significant\n- Step 4: The critical value will also change with sample size for a given significance level", "source": "Qwen 3 ②", "_id": "qwen_2_54", "judge_pick": false}, {"question": "If you're conducting a binomial hypothesis test with H₀: p = 0.4 and you observe x = 13 from n = 20 trials, how do you calculate the p-value?", "answer": "- Step 1: Assume H₀ is true, so X ~ B(20, 0.4)\n- Step 2: The expected value would be 20 × 0.4 = 8\n- Step 3: Since 13 > 8 we calculate P(X ≥ 13)\n- Step 4: P(X ≥ 13) = 1 - P(X ≤ 12) = 1 - 0.9786 = 0.0214\n- Step 5: If significance level is 5%, we'd reject H₀ since 0.0214 < 0.05", "source": "Qwen 3 ②", "_id": "qwen_2_55", "judge_pick": false}, {"question": "If you're conducting a Poisson hypothesis test with H₀: λ = 5 and you observe y = 10, how do you calculate the one-tailed p-value?", "answer": "- Step 1: Assume H₀ is true, so Y ~ Po(5)\n- Step 2: Calculate P(Y ≥ 10) = 1 - P(Y ≤ 9)\n- Step 3: Use Poisson tables to find P(Y ≤ 9) = 0.968\n- Step 4: P(Y ≥ 10) = 1 - 0.968 = 0.032\n- Step 5: If significance level is 5%, reject H₀ since 0.032 < 0.05", "source": "Qwen 3 ②", "_id": "qwen_2_56", "judge_pick": false}, {"question": "If you're conducting a two-tailed Poisson hypothesis test with H₀: λ = 5 and significance level 5%, how do you find the critical region?", "answer": "- Step 1: For two tails, use 2.5% in each tail\n- Step 2: From Poisson(5) tables, P(Y ≤ 1) = 0.0404 which is > 0.025\n- Step 3: P(Y ≤ 2) = 0.1247 which is much > 0.025\n- Step 4: P(Y ≥ 10) = 1 - P(Y ≤ 9) = 0.032 which is < 0.05\n- Step 5: So critical region would be Y ≤ 1 or Y ≥ 10 (but 0.032 is the actual significance level)", "source": "Qwen 3 ②", "_id": "qwen_2_57", "judge_pick": false}, {"question": "What is the difference between the level of significance and the actual significance level?", "answer": "- Step 1: The level of significance is the threshold probability (typically 10%, 5%, or 1%) that we set for rejecting the null hypothesis\n- Step 2: The actual significance level is the exact probability of the critical region\n- Step 3: The actual significance level might be slightly less than the level of significance\n- Step 4: The actual significance level is what we actually risk rejecting H₀ when it's true", "source": "Qwen 3 ②", "_id": "qwen_2_58", "judge_pick": false}, {"question": "When you're conducting a two-tailed hypothesis test, why should you split the significance level between the two tails?", "answer": "- Step 1: A two-tailed test is testing whether the parameter is different rather than specifically higher or lower\n- Step 2: We need to account for the possibility of the test statistic being extreme in either direction\n- Step 3: Splitting the significance level ensures an equal risk of error in both tails\n- Step 4: This maintains the overall significance level of the test", "source": "Qwen 3 ②", "_id": "qwen_2_59", "judge_pick": false}, {"question": "If you're conducting a hypothesis test with H₀: p = 0.4, H₁: p > 0.4, n = 20, observed x = 12, significance level = 5%, what is the p-value?", "answer": "- Step 1: Assume H₀ is true, so X ~ B(20, 0.4)\n- Step 2: P(X ≥ 12) = 1 - P(X ≤ 11) = 1 - 0.943 = 0.057\n- Step 3: This is greater than 5%, so we do not reject H₀\n- Step 4: There is insufficient evidence to suggest p > 0.4 at the 5% level", "source": "Qwen 3 ②", "_id": "qwen_2_60", "judge_pick": false}, {"question": "If you're conducting a hypothesis test with H₀: p = 0.6, H₁: p < 0.6, n = 20, observed x = 8, significance level = 5%, what is the p-value?", "answer": "- Step 1: Assume H₀ is true, so X ~ B(20, 0.6)\n- Step 2: P(X ≤ 8) = 0.0565 from tables\n- Step 3: This is greater than 5%, so we do not reject H₀\n- Step 4: There is insufficient evidence to suggest p < 0.6 at the 5% level", "source": "Qwen 3 ②", "_id": "qwen_2_61", "judge_pick": false}, {"question": "If you're conducting a hypothesis test with H₀: λ = 8, H₁: λ > 8, observed y = 13, significance level = 5%, what is the p-value?", "answer": "- Step 1: Assume H₀ is true, so Y ~ Po(8)\n- Step 2: P(Y ≥ 13) = 1 - P(Y ≤ 12)\n- Step 3: From Poisson tables for λ = 8: P(Y ≤ 12) = 0.9362\n- Step 4: P(Y ≥ 13) = 1 - 0.9362 = 0.0638\n- Step 5: This is greater than 5%, so we do not reject H₀", "source": "Qwen 3 ②", "_id": "qwen_2_62", "judge_pick": false}, {"question": "If you're conducting a hypothesis test with H₀: λ = 6, H₁: λ > 6, observed y = 10, significance level = 5%, what is the p-value?", "answer": "- Step 1: Assume H₀ is true, so Y ~ Po(6)\n- Step 2: P(Y ≥ 10) = 1 - P(Y ≤ 9)\n- Step 3: From Poisson tables for λ = 6: P(Y ≤ 9) = 0.9161\n- Step 4: P(Y ≥ 10) = 1 - 0.9161 = 0.0839\n- Step 5: This is greater than 5%, so we do not reject H₀", "source": "Qwen 3 ②", "_id": "qwen_2_63", "judge_pick": false}, {"question": "For a one-tailed binomial hypothesis test with H₀: p = 0.4, significance level 5%, and n = 20, what is the critical region?", "answer": "- Step 1: X ~ B(20, 0.4) under H₀\n- Step 2: Find x such that P(X ≥ x) < 0.05\n- Step 3: P(X ≥ 11) = 1 - P(X ≤ 10) = 1 - 0.8725 = 0.1275\n- Step 4: P(X ≥ 12) = 1 - P(X ≤ 11) = 1 - 0.943 = 0.057\n- Step 5: P(X ≥ 13) = 1 - P(X ≤ 12) = 1 - 0.9786 = 0.0214 < 0.05, so critical region is X ≥ 13", "source": "Qwen 3 ②", "_id": "qwen_2_64", "judge_pick": false}, {"question": "For a two-tailed binomial hypothesis test with H₀: p = 0.5, significance level 5%, and n = 20, what is the critical region?", "answer": "- Step 1: X ~ B(20, 0.5) under H₀\n- Step 2: For two tails, each has probability 2.5%\n- Step 3: P(X ≤ 5) = 0.0207 < 0.025, so one critical region is X ≤ 5\n- Step 4: P(X ≥ 15) = 0.0207 < 0.025, so the other critical region is X ≥ 15\n- Step 5: The critical region is X ≤ 5 or X ≥ 15 with actual significance level 0.0414", "source": "Qwen 3 ②", "_id": "qwen_2_65", "judge_pick": false}, {"question": "For a hypothesis test with Poisson(6), what is the critical region at 5% significance level?", "answer": "- Step 1: Y ~ Po(6) under H₀\n- Step 2: For one-tailed test, find y where P(Y ≥ y) < 0.05\n- Step 3: P(Y ≥ 10) = 1 - P(Y ≤ 9) = 1 - 0.9161 = 0.0839\n- Step 4: P(Y ≥ 11) = 1 - P(Y ≤ 10) = 1 - 0.9719 = 0.0281 < 0.05\n- Step 5: So the critical region is Y ≥ 11 with actual significance level 0.0281", "source": "Qwen 3 ②", "_id": "qwen_2_66", "judge_pick": false}, {"question": "For a two-tailed hypothesis test with H₀: λ = 10, significance level 5%, what is the critical region?", "answer": "- Step 1: Y ~ Po(10) under H₀\n- Step 2: For two tails, each has probability 2.5%\n- Step 3: P(Y ≤ 4) = 0.0293 > 0.025, P(Y ≤ 3) = 0.0103 < 0.025\n- Step 4: P(Y ≥ 17) = 1 - P(Y ≤ 16) = 1 - 0.9730 = 0.0270 < 0.025, P(Y ≥ 16) = 1 - P(Y ≤ 15) = 1 - 0.9513 = 0.0487 > 0.025\n- Step 5: Critical region is Y ≤ 3 or Y ≥ 17 with actual significance level 0.0103 + 0.0270 = 0.0373", "source": "Qwen 3 ②", "_id": "qwen_2_67", "judge_pick": false}], "count": 68}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In hypothesis testing, what is the difference between the null hypothesis (H₀) and the alternative hypothesis (H₁)? Why is it crucial that H₀ always contains an equality sign? (2 steps)", "answer": "- Step 1: The null hypothesis H₀ represents the default position or status quo—it states what we assume to be true before collecting evidence. The alternative hypothesis H₁ represents what we are trying to find evidence for—it contains the claim we suspect might be true.\n\n- Step 2: H₀ must always contain an equality condition (such as p = 0.5 or λ = 6) because this establishes a specific, testable probability model. Without an equality, we cannot calculate the probability of obtaining our sample result under the null hypothesis. The alternative hypothesis typically contains inequality signs (<, >, or ≠) indicating the direction or nature of the suspected difference.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "A researcher believes a coin is biased towards heads. She tosses the coin 20 times and gets 15 heads. Explain what the test statistic would be in this scenario and why we calculate probabilities based on assuming H₀ is true. (2 steps)", "answer": "- Step 1: The test statistic is the number of heads observed, which in this case is 15. This value is used to evaluate the evidence against the null hypothesis.\n\n- Step 2: We calculate probabilities assuming H₀ is true (i.e., p = 0.5 for a fair coin) to determine how likely our observed result (or more extreme results) would be if the null hypothesis were actually correct. If this probability is very small (below our significance threshold), we have evidence to reject H₀. This is the fundamental logic of hypothesis testing—we quantify how surprising our data would be under the null assumption.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the difference between a one-tailed test and a two-tailed test? For each type, write down the form that the alternative hypothesis H₁ must take. (2 steps)", "answer": "- Step 1: A one-tailed test (or directional test) checks for an effect in a specific direction only—either greater than or less than the null value. A two-tailed test checks for any difference from the null value, regardless of direction.\n\n- Step 2: For one-tailed tests, H₁ takes the form H₁: p > a or H₁: p < a. For two-tailed tests, H₁ takes the form H₁: p ≠ a. The two-tailed test essentially combines two one-tailed tests (one in each direction) and splits the significance level between both tails of the distribution.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In hypothesis testing, what is meant by the \"significance level\" of a test? How does this differ from the \"actual significance level\"? (2 steps)", "answer": "- Step 1: The significance level (often denoted α) is the threshold probability we set before conducting the test—typically 5% (0.05), 1% (0.01), or 10% (0.10). It represents the maximum probability we're willing to accept of incorrectly rejecting the null hypothesis (a Type I error).\n\n- Step 2: The actual significance level is the true probability of rejecting H₀ when it is actually true. This occurs because the critical region we choose may not sum exactly to our target significance level. For example, if we set α = 0.05, the actual significance level might be 0.032 or 0.063 depending on the discrete nature of the distribution. The actual significance level is often called the \"size\" of the test.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is a critical region in hypothesis testing, and how is the critical value related to it? (2 steps)", "answer": "- Step 1: The critical region is the set of values for the test statistic that would lead us to reject the null hypothesis H₀. If our observed test statistic falls within this region, we conclude that the evidence is strong enough to reject H₀ in favor of H₁.\n\n- Step 2: The critical value is the first (boundary) value that falls inside the critical region. For example, if our critical region is X ≥ 8 for a binomial test, then 8 is the critical value. All values from 8 upwards lead to rejection of H₀, while values below 8 lead to acceptance.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Why do we need to consider both the test statistic value AND its position relative to the critical region when making a decision in hypothesis testing? (2 steps)", "answer": "- Step 1: The observed test statistic alone doesn't tell us whether to reject or accept H₀—we must compare it to our critical region, which was determined before collecting data based on our chosen significance level.\n\n- Step 2: The critical region is defined such that if the null hypothesis were true, the probability of the test statistic falling in that region equals (or is close to) our significance level. If our observed value falls in the critical region, the probability of getting such an extreme result (or more extreme) under H₀ is less than our significance level, giving us sufficient evidence to reject H₀.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In a hypothesis test with H₀: p = 0.4 and H₁: p > 0.4 using a sample of size n = 10 at the 5% significance level, the critical region is found to be X ≥ 8. Why is X = 7 NOT in the critical region, and what is the probability of incorrectly rejecting H₀ if we observe X = 7? (2 steps)", "answer": "- Step 1: X = 7 is not in the critical region because our critical region was defined as X ≥ 8. The critical value is 8, so X = 7 falls in the acceptance region.\n\n- Step 2: If we observe X = 7, we do not reject H₀. The probability of incorrectly rejecting H₀ (Type I error) is the probability that X falls in the critical region assuming H₀ is true, which is P(X ≥ 8) when p = 0.4. This is approximately 0.0132 or 1.32%, not 5%—this is the actual significance level.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "When conducting a two-tailed test, why do we divide the significance level by 2 for each tail? What would happen if we didn't do this? (2 steps)", "answer": "- Step 1: We divide the significance level by 2 because we now have two separate critical regions—one in each tail of the distribution. Each tail must have a probability of approximately α/2 to ensure that the total probability of rejecting H₀ (when it's true) remains at our chosen significance level α.\n\n- Step 2: If we didn't divide the significance level, we'd have a test with an actual significance level of approximately 2α rather than α. For example, using 10% total in a two-tailed test (5% in each tail) gives us an actual significance level close to 10%. Using 10% in each tail would give us an actual significance level near 20%, which is too high.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "A researcher conducts a test with H₀: p = 0.5 against H₁: p ≠ 0.5 using n = 10 at the 5% significance level. The observed value is X = 9. Explain why we should consider P(X ≥ 9) for the upper tail in this case. (2 steps)", "answer": "- Step 1: The expected value under H₀ is np = 10 × 0.5 = 5. Since our observed value (9) is greater than the expected value (5), we're in the upper tail of the distribution.\n\n- Step 2: For hypothesis testing, we always consider the probability of obtaining our observed value OR any more extreme value in the direction that supports H₁. Since 9 is above the mean, we consider P(X ≥ 9). This gives us the probability of getting a result as extreme as, or more extreme than, what we observed, assuming H₀ is true.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why is it important to write conclusions in the context of the problem rather than just saying \"reject H₀\" or \"accept H₀\"? Give an example related to a medical treatment test. (2 steps)", "answer": "- Step 1: Statistical conclusions must be translated into meaningful real-world statements. \"Rejecting H₀\" only tells us about the statistical evidence—it doesn't tell us what the data actually mean in context.\n\n- Step 2: For example, if testing whether a new drug is better than an existing treatment, we shouldn't just say \"reject H₀ at the 5% level.\" Instead, we should say \"there is sufficient evidence at the 5% level to conclude that the new drug has a higher success rate than the existing treatment.\" This makes the conclusion actionable and meaningful to doctors and patients.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In hypothesis testing with the binomial distribution, what are the key conditions that must be satisfied for the binomial model to be appropriate? (2 steps)", "answer": "- Step 1: The situation must meet these conditions: (1) Fixed number of independent trials n, (2) Each trial has exactly two outcomes (success/failure), (3) The probability of success p is constant for each trial, and (4) Each trial is independent of others.\n\n- Step 2: For example, when testing whether a coin is biased by tossing it 20 times, we have n = 20 independent trials, each with two outcomes (heads/tails), and the probability of heads should remain constant if the coin is fair. These conditions justify using the binomial distribution B(n, p) to model the test statistic.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "For a Poisson distribution hypothesis test, explain why we need to adjust the parameter λ when the time interval changes. For instance, if calls occur at a rate of 0.325 per minute, what would be the parameter for a 20-minute interval? (2 steps)", "answer": "- Step 1: The Poisson distribution models the number of events occurring in a fixed interval of time or space. The parameter λ represents the mean number of events in that specific interval. If we change the interval length, λ must be scaled proportionally.\n\n- Step 2: If calls occur at 0.325 per minute, then for a 20-minute interval, λ = 0.325 × 20 = 6.5. So X ~ Po(6.5) represents the number of calls in 20 minutes. This scaling is essential because λ is not a fixed \"rate\" but rather the expected count for a specific interval.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "When might we use an approximation instead of exact binomial or Poisson calculations in hypothesis testing? What approximations are commonly used? (2 steps)", "answer": "- Step 1: Approximations are used when n (or λ) is large, making exact calculations computationally impractical or time-consuming. In exam contexts, approximations simplify the work significantly.\n\n- Step 2: Two common approximations are: (1) Normal approximation to binomial: when n is large and p is not too close to 0 or 1, X ~ B(n, p) can be approximated by X ~ N(np, np(1-p)). (2) Poisson approximation to binomial: when n is large and p is small (typically np < 5), the binomial can be approximated by Poisson with λ = np.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In hypothesis testing, what is a Type I error and a Type II error? Which error is controlled by the significance level? (2 steps)", "answer": "- Step 1: A Type I error occurs when we reject H₀ when it is actually true (a \"false positive\"). A Type II error occurs when we fail to reject H₀ when it is actually false (a \"false negative\").\n\n- Step 2: The significance level α controls the probability of Type I error. If we set α = 0.05, we're accepting a 5% chance of incorrectly rejecting a true null hypothesis. The probability of Type II error (β) is related to the \"power\" of the test (1 - β), but we don't directly control it through the significance level.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "When finding critical regions for hypothesis tests, why do we look for the smallest value where P(X ≥ critical value) < significance level, rather than the largest value? (2 steps)", "answer": "- Step 1: We want the critical region to be as small as possible while still being \"extreme enough\" to reject H₀. We start from the most extreme values (highest for upper tail tests, lowest for lower tail tests) and move inward until we cross our significance threshold.\n\n- Step 2: For an upper tail test with α = 0.05, we check P(X ≥ k) for increasing values of k. The first k where P(X ≥ k) < 0.05 becomes our critical value. This ensures we reject H₀ only when the evidence is sufficiently strong, minimizing Type I error while still having reasonable power to detect a real effect.", "source": "Mi
