 do we split $$\\alpha$$ into $$\\alpha/2$$ for each tail? (3 steps)", "answer": "- Step 1: Under $$H_1: p \\neq p_0$$, deviations in **either** direction (too high or too low) count as evidence against $$H_0$$. So the critical region has two pieces — one at each end.\n- Step 2: We want the **total** false-rejection probability $$P(\\text{reject} \\mid H_0) \\leq \\alpha$$. Since rejection can happen via either tail, and these events are disjoint:\n$$P(\\text{reject}) = P(X \\leq c_1) + P(X \\geq c_2) \\leq \\alpha$$\n- Step 3: To balance the test, we put $$\\alpha/2$$ in each tail. This means neither direction gets \"too easy\" to trigger rejection, and the overall false-positive rate stays at $$\\alpha$$.\n\nIf we used $$\\alpha$$ in each tail separately, the total false-positive rate would be $$2\\alpha$$ — twice what we wanted.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Explain the step-by-step procedure for finding the two critical values $$c_1$$ (lower) and $$c_2$$ (upper) in a two-tailed binomial test at level $$\\alpha$$. (3 steps)", "answer": "- Step 1: For the lower tail: find the largest $$c_1$$ such that $$P(X \\leq c_1) \\leq \\alpha/2$$. Critical region piece: $$X \\leq c_1$$.\n- Step 2: For the upper tail: find the smallest $$c_2$$ such that $$P(X \\geq c_2) \\leq \\alpha/2$$, equivalently $$1 - P(X \\leq c_2 - 1) \\leq \\alpha/2$$. Critical region piece: $$X \\geq c_2$$.\n- Step 3: Combine: the critical region is $$\\{X \\leq c_1\\} \\cup \\{X \\geq c_2\\}$$. The **actual significance level** is $$P(X \\leq c_1) + P(X \\geq c_2)$$, which will be at most $$\\alpha$$.\n\n+ Warning: Sometimes the question says \"probability in each tail as close as possible to $$\\alpha/2$$\" — then you pick the value nearest $$\\alpha/2$$, even if slightly above. Read the question carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "A test gives a critical region with actual significance level 1.63% when the nominal level was 2%. Why isn't this a problem, and what does it signify about the test's conservativeness? (3 steps)", "answer": "- Step 1: The actual level 1.63% is less than the nominal 2%. This means the probability of wrongly rejecting $$H_0$$ under our critical region is smaller than our stated threshold — the test is **stricter** than advertised, not looser.\n- Step 2: Being \"conservative\" here is fine: we have a genuine upper bound on the false-positive rate. We're not exceeding our tolerance for error.\n- Step 3: The mismatch arises because discrete distributions can only take values in jumps. We can't get exactly 2% — we had to round down to avoid exceeding it. This is unavoidable for binomial/Poisson and is why actual levels are almost never exactly equal to nominal levels.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "In a two-tailed test with observed value $$x = 4$$ from $$X \\sim B(50, 0.02)$$, why would we consider the **upper** tail even though 4 looks like a small number?", "answer": "- Step 1: The expected value under $$H_0$$ is $$np = 50 \\times 0.02 = 1$$. So typical observations should be around 1.\n- Step 2: The observed $$x = 4$$ is **greater** than the expected value of 1, so it's the upper tail that's relevant — 4 is \"unusually large,\" not small, in this context.\n- Step 3: You'd compute $$P(X \\geq 4)$$ and compare to $$\\alpha/2$$.\n\n+ General rule: compare $$x$$ to the expected value $$np$$ (binomial) or $$\\lambda$$ (Poisson). If $$x > \\text{expected}$$, use the upper tail; if $$x < \\text{expected}$$, use the lower tail.\n\nThis is a classic trap: raw magnitude of $$x$$ doesn't matter — what matters is $$x$$ relative to the expected value.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "What are the two equivalent methods for conducting a hypothesis test, and which should you use when? (3 steps)", "answer": "- Step 1: **Method 1 (p-value approach):**\n+ Compute the probability of the observed test statistic (or more extreme) under $$H_0$$\n+ Compare this probability directly to $$\\alpha$$ (or $$\\alpha/2$$ for two-tailed)\n+ If probability $$< \\alpha$$, reject $$H_0$$\n- Step 2: **Method 2 (critical region approach):**\n+ Find the critical region based on $$\\alpha$$ and the distribution under $$H_0$$\n+ Check whether the observed test statistic falls inside the critical region\n+ If it does, reject $$H_0$$\n- Step 3: When to use which:\n+ Method 1 when you just need to make one decision with a specific observed value\n+ Method 2 when you'll test several observations against the same threshold, or when the question explicitly asks for the critical region\n\nBoth methods give identical conclusions — they're just different routes to the same decision.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Outline the full sequence of steps to carry out any one-tailed hypothesis test from scratch. (5 steps)", "answer": "- Step 1: **Formulate a model** for the test statistic: e.g., \"Let $$X$$ be the number of successes; then $$X \\sim B(n, p)$$.\"\n- Step 2: **Write hypotheses** in terms of the parameter:\n+ $$H_0: p = p_0$$ (specific value)\n+ $$H_1: p > p_0$$ or $$p < p_0$$ (directional)\n- Step 3: **Assume $$H_0$$ true** and compute the probability of the observed test statistic (or more extreme in the direction of $$H_1$$). Alternatively, find the critical region.\n- Step 4: **Compare** the probability to the significance level (or check whether the observation is inside the critical region).\n- Step 5: **Write a conclusion in context** — not just \"reject $$H_0$$,\" but what it means for the real situation (e.g., \"there is evidence that the new drug is more effective\").\n\nThe conclusion in context is not optional — without it, the test has no meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why should we write \"there is insufficient evidence to reject $$H_0$$\" rather than \"we accept $$H_0$$\"? (3 steps)", "answer": "- Step 1: Failing to reject $$H_0$$ means our data weren't unusual enough to contradict $$H_0$$. It doesn't prove $$H_0$$ is true — many other values of the parameter could also produce this data.\n- Step 2: The test is asymmetric: we set up the machinery to detect evidence **against** $$H_0$$. Absence of evidence against it is not evidence for it.\n- Step 3: Saying \"accept $$H_0$$\" would imply we've proven the parameter equals exactly $$p_0$$, which sample data can't do. More accurate phrasing: \"insufficient evidence to reject\" or \"consistent with $$H_0$$.\"\n\nAnalogy: in court, \"not guilty\" does not mean \"innocent\" — it means \"evidence wasn't strong enough to prove guilt.\"", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why is the binomial distribution the natural model for testing a proportion? (3 steps)", "answer": "- Step 1: A proportion $$p$$ represents the probability of a single \"success\" in some category (e.g., supporting a candidate, being faulty, landing on heads).\n- Step 2: When we take a sample of $$n$$ independent observations and count how many are successes, we have the exact setup of a binomial distribution: fixed $$n$$ trials, each with success probability $$p$$, independent, two outcomes.\n- Step 3: So \"number of successes in the sample\" $$\\sim B(n, p)$$, and testing a claim about $$p$$ means testing a binomial parameter.\n\n+ Key insight: the test statistic is the **count**, not the proportion. The sample proportion $$\\hat{p} = x/n$$ is just the count rescaled, so it carries identical information but binomial tables work with counts.\n\nIsabelle's mistake in Exercise 7A Q4 was treating \"probability of heads\" (a parameter) as a test statistic — but a parameter isn't a statistic, it's an unknown we're testing.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Write out the logic of what to do when $$P(X \\geq \\text{observed}) = 0.127$$ under $$H_0$$ at the 5% level for a one-tailed upper test. (3 steps)", "answer": "- Step 1: The observed probability 0.127 is the probability, assuming $$H_0$$ true, of seeing a result as extreme or more extreme than we observed.\n- Step 2: Compare to $$\\alpha = 0.05$$: we have $$0.127 > 0.05$$. Under $$H_0$$, seeing this result isn't rare enough to be surprising.\n- Step 3: Therefore we **do not reject $$H_0$$**. The data are consistent with $$H_0$$; there is insufficient evidence to support $$H_1$$.\n\nRule of thumb: if $$p\\text{-value} < \\alpha$$, reject. If $$p\\text{-value} > \\alpha$$, fail to reject.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A doctor's new drug cures 11 of 20 patients; the old drug cures 40%. Why does testing at 5% with $$H_1: p > 0.4$$ fail to reject $$H_0$$, even though 11/20 = 55% seems better than 40%? (4 steps)", "answer": "- Step 1: Under $$H_0: p = 0.4$$ with $$n = 20$$, the expected number cured is $$20 \\times 0.4 = 8$$. So seeing 11 is 3 above expected.\n- Step 2: But binomial distributions have natural variability. $$P(X \\geq 11 \\mid p = 0.4) \\approx 0.128$$ — there's roughly a 13% chance of seeing 11 or more cures purely by chance even if the drug is no better.\n- Step 3: 13% is greater than our 5% threshold, so this result isn't extraordinary enough under $$H_0$$.\n- Step 4: Lesson: small samples have wide natural variation. To be confident the drug is genuinely better, we'd need either a much larger sample or a much more extreme result. \"Looks better\" isn't the same as \"statistically significant.\"\n\n+ With $$n = 200$$, seeing 110 out of 200 (same proportion) would be far more convincing because the spread of the distribution scales with $$\\sqrt{n}$$, so the signal-to-noise ratio improves.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When conducting a two-tailed test, how do you determine which tail contains the observed value, and why does this matter? (3 steps)", "answer": "- Step 1: Compute the expected value under $$H_0$$:\n+ Binomial: $$E(X) = np$$\n+ Poisson: $$E(X) = \\lambda$$\n- Step 2: Compare the observed value $$x$$ to this expected value:\n+ If $$x <$$ expected → lower tail, compute $$P(X \\leq x)$$\n+ If $$x >$$ expected → upper tail, compute $$P(X \\geq x)$$\n- Step 3: Why it matters: in a two-tailed test, you're measuring how extreme the observation is in its own direction. You compare to $$\\alpha/2$$, not $$\\alpha$$, because the significance level is split across both tails.\n\nOnly one tail calculation is needed in Method 1 for a two-tailed test — but you compare that probability to $$\\alpha/2$$, reflecting that the other tail also could have triggered rejection.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What does \"rejecting $$H_0$$\" logically entitle us to conclude, and what does it NOT entitle us to conclude? (3 steps)", "answer": "- Step 1: Rejecting $$H_0$$ means: under the assumption that $$H_0$$ is true, our observed data (or more extreme) would be very unlikely. So we prefer $$H_1$$ over $$H_0$$ as a description of reality.\n- Step 2: It does **not** prove $$H_1$$ is true. We've only shown that $$H_0$$ looks implausible. Some alternative parameter value is more consistent with our data, but we haven't identified exactly what.\n- Step 3: It does **not** prove our specific direction in $$H_1$$ (e.g., \"$$p > 0.4$$\") is the truth either — just that the data suggest the parameter lies in that direction rather than at $$p_0$$.\n\nIn practice: \"evidence suggests...\" or \"the data are consistent with...\" — use hedged language because hypothesis testing is inherently probabilistic.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "How does the Poisson hypothesis test differ structurally from the binomial, and what's the same? (3 steps)", "answer": "- Step 1: **Same framework:** assume $$H_0$$ true, compute the probability of observed result (or more extreme), compare to $$\\alpha$$, decide whether to reject.\n- Step 2: **Different distribution:** instead of $$X \\sim B(n, p)$$ we have $$X \\sim \\text{Po}(\\lambda)$$. We test $$H_0: \\lambda = \\lambda_0$$ against $$H_1: \\lambda > \\lambda_0$$, $$\\lambda < \\lambda_0$$, or $$\\lambda \\neq \\lambda_0$$.\n- Step 3: **Different expected value:** in Poisson, $$E(X) = \\lambda$$. This is what determines which tail to consider in a two-tailed test, and it's also the variance.\n\nCritical value finding follows the same pattern: scan values, find where the tail probability drops below $$\\alpha$$ (or $$\\alpha/2$$ in two-tailed).", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "The Poisson rate is \"0.325 per minute.\" What is $$\\lambda$$ over a 20-minute interval, and why does this scaling work? (3 steps)", "answer": "- Step 1: A fundamental property of the Poisson process: events occur independently at a **constant rate per unit time**. Over a longer interval, the expected count scales linearly with interval length.\n- Step 2: So $$\\lambda_{\\text{20 min}} = 20 \\times 0.325 = 6.5$$. The distribution of events in 20 minutes is $$\\text{Po}(6.5)$$.\n- Step 3: Why this works: the Poisson process has \"no memory\" — the future rate doesn't depend on what happened before. Non-overlapping intervals are independent and additive, and sums of independent Poissons are Poisson with added rates.\n\n+ Extension: over $$t$$ minutes at rate $$r$$ per minute, $$\\lambda = rt$$. Over 3 intervals of 10 minutes each, $$\\lambda = 30r$$.\n\nThis scaling is crucial because hypotheses can be stated for any time window by rescaling $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why might you need to compute $$P(Y \\leq 1)$$ using the formula $$P(Y=k) = \\frac{e^{-\\lambda}\\lambda^k}{k!}$$ directly, even when you have Poisson tables? (3 steps)", "answer": "- Step 1: Standard Poisson cumulative tables include common values of $$\\lambda$$ (like 1, 2, 3, ..., 10), but not every value.\n- Step 2: If your problem requires $$\\lambda = 3.25$$ (from rate $$0.325$$ per minute over 10 minutes), the tables don't cover this.\n- Step 3: You then compute directly: for $$P(Y \\leq 1) = P(Y=0) + P(Y=1) = e^{-3.25} + 3.25 e^{-3.25}$$. For small values of $$k$$ this is manageable.\n\n+ For large $$\\lambda$$ not in tables, use a Normal approximation to avoid computing many Poisson terms.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "When is it appropriate to use a Normal approximation to the Binomial, and what are the approximating parameters? (3 steps)", "answer": "- Step 1: Use when $$n$$ is large and $$p$$ is close to 0.5 — this makes the distribution roughly symmetric and bell-shaped.\n- Step 2: The approximation is: $$X \\sim B(n, p) \\approx N(np,\\ np(1-p))$$\n+ Mean of Normal = mean of Binomial = $$np$$\n+ Variance of Normal = variance of Binomial = $$np(1-p)$$\n- Step 3: Why this works: the Binomial counts sums of independent Bernoulli trials, and by the Central Limit Theorem, standardized sums of i.i.d. variables approach Normal. With $$n$$ large and not-too-extreme $$p$$, the approximation is excellent.\n\n+ Rule of thumb: $$np > 5$$ and $$n(1-p) > 5$$ (both tails need enough mass).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "When is it appropriate to use a Poisson approximation to the Binomial, and what are the approximating parameters? (3 steps)", "answer": "- Step 1: Use when $$n$$ is large and $$p$$ is small (rare-event scenario), so that individual successes are infrequent.\n- Step 2: The approximation is: $$X \\sim B(n, p) \\approx \\text{Po}(np)$$\n+ The mean $$np$$ carries over exactly\n+ Variance of Poisson = $$np$$, which matches Binomial variance $$np(1-p) \\approx np$$ when $$p$$ is small\n- Step 3: Why this works: when $$p$$ is small, \"successes\" resemble rare events scattered among $$n$$ trials — exactly the Poisson setup. Formally, the limit of $$B(n, \\lambda/n)$$ as $$n \\to \\infty$$ is $$\\text{Po}(\\lambda)$$.\n\n+ Rule of thumb: $$n > 50$$ and $$np < 10$$ (and $$p < 0.1$$).", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "When is it appropriate to use a Normal approximation to the Poisson, and what are the parameters? (3 steps)", "answer": "- Step 1: Use when $$\\lambda$$ is large (typically $$\\lambda > 10$$).\n- Step 2: The approximation is: $$X \\sim \\text{Po}(\\lambda) \\approx N(\\lambda, \\lambda)$$\n+ Mean = $$\\lambda$$\n+ Variance = $$\\lambda$$ (same, since Poisson has equal mean and variance)\n- Step 3: Why this works: a Poisson with large $$\\lambda$$ can be seen as a sum of many small independent Poissons (since sums of Poissons are Poisson). By CLT, this sum becomes approximately Normal.\n\n+ Intuitively: the Poisson distribution is right-skewed for small $$\\lambda$$ but becomes more symmetric as $$\\lambda$$ grows.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "What is the continuity correction, and why is it needed when approximating a discrete distribution with a continuous one? (3 steps)", "answer": "- Step 1: Discrete distributions (Binomial, Poisson) assign positive probability to single integers: $$P(X = k) > 0$$. Continuous distributions (Normal) assign zero probability to single points: $$P(Y = k) = 0$$.\n- Step 2: If we want $$P(X \\leq k)$$, the discrete distribution includes the mass at $$k$$. But $$P(Y \\leq k)$$ for continuous $$Y$$ excludes a point-mass (of zero) at $$k$$ — we need to shift the boundary to include the width of the \"rectangle\" representing $$P(X = k)$$.\n- Step 3: The fix: expand each integer $$k$$ to the interval $$[k - 0.5, k + 0.5]$$. This accounts for the implicit width of each discrete \"bar\" in the probability distribution.\n\nThink of the discrete distribution as a histogram with bars of width 1 — we need to capture the whole bar, not just its center.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "State the four continuity-correction rules for approximating discrete $$X$$ by continuous $$Y$$. (4 steps)", "answer": "- Step 1: For $$P(X \\leq k)$$, include the bar at $$k$$, so use $$P(Y \\leq k + 0.5)$$.\n- Step 2: For $$P(X < k)$$ (strictly less), exclude the bar at $$k$$, so use $$P(Y \\leq k - 0.5)$$.\n- Step 3: For $$P(X \\geq k)$$, include the bar at $$k$$, so use $$P(Y \\geq k - 0.5)$$.\n- Step 4: For $$P(X > k)$$ (strictly greater), exclude the bar at $$k$$, so use $$P(Y \\geq k + 0.5)$$.\n\n+ Point probability: $$P(X = k) \\approx P(k - 0.5 \\leq Y \\leq k + 0.5)$$\n\nMemory aid: ask \"is the endpoint included or excluded?\" If included, expand outward by 0.5; if excluded, contract inward by 0.5.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why do we use approximations at all, given that exact Binomial and Poisson calculations are possible? (3 steps)", "answer": "- Step 1: For large $$n$$, computing Binomial probabilities involves terms like $$\\binom{n}{k} p^k (1-p)^{n-k}$$, which are computationally expensive or unavailable in standard tables.\n- Step 2: Similarly for large $$\\lambda$$ in Poisson: tables cut off at $$\\lambda = 10$$, and direct computation requires summing many terms.\n- Step 3: Normal approximations use the standard Normal table $$Z \\sim N(0,1)$$, which handles any parameters via standardization: compute $$Z = \\frac{x - \\mu}{\\sigma}$$ once and look up the result. This is universally tabulated.\n\nHistorical context: in pre-calculator days this was the only practical way to handle large-sample problems. Even today, approximations give quick analytic insights.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "A candidate claims 40% support; observed 3 out of 20 support her. What form should the hypothesis test take? (3 steps)", "answer": "- Step 1: Set up the model: let $$X$$ = number of supporters in the sample, so $$X \\sim B(20, p)$$ where $$p$$ is the true support proportion.\n- Step 2: Hypotheses:\n+ $$H_0: p = 0.4$$ (the claim)\n+ $$H_1: p < 0.4$$ (researcher suspects over-estimation — one-tailed, lower)\n- Step 3: Test direction: since the researcher suspects over-estimation, she's asking \"is support actually less than 40%?\" This makes it a lower-tail one-tailed test. Observed 3 out of 20 is below the expected $$20 \\times 0.4 = 8$$, which is consistent with the direction being tested.\n\nDecision rule: reject $$H_0$$ if $$P(X \\leq 3 \\mid p = 0.4) < 0.05$$.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "For $$X \\sim B(20, 0.4)$$, how would you walk through finding whether observing $$x = 3$$ leads to rejecting $$H_0$$ at the 5% level? (4 steps)", "answer": "- Step 1: We want the lower-tail probability: $$P(X \\leq 3 \\mid p = 0.4)$$.\n- Step 2: Look this up in cumulative binomial tables for $$n = 20$$, $$p = 0.4$$: $$P(X \\leq 3) \\approx 0.0160$$.\n- Step 3: Compare: $$0.016 < 0.05$$, so the observation lies in the critical region — very unlikely under $$H_0$$.\n- Step 4: Reject $$H_0$$. Conclusion in context: there is evidence at the 5% level that the candidate is overestimating her support.\n\nYou don't need to calculate the exact number for every possible $$x$$ — just the observed value (or find the critical region once if you'll reuse it).", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Conceptually, why does the actual significance level equal the sum of the tail probabilities, rather than the average? (3 steps)", "answer": "- Step 1: The actual significance level is the probability of rejecting $$H_0$$ when $$H_0$$ is true. Rejection can happen if $$X$$ falls in **either** part of the critical region.\n- Step 2: The two tails are **disjoint** events: $$X$$ can be $$\\leq c_1$$ or $$X \\geq c_2$$, but not both simultaneously. Probability of a union of disjoint events is the sum of their probabilities.\n- Step 3: So the actual level = $$P(X \\leq c_1) + P(X \\geq c_2)$$. Summing (not averaging) gives the total false-positive rate.\n\nFor a one-tailed test, there's only one tail, so the actual level is just that one probability.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "What is the \"expected number\" or \"rate\" that appears under $$H_0$$, and why is it the anchor for reasoning about which tail to consider? (3 steps)", "answer": "- Step 1: Under $$H_0$$, the distribution has a known mean: $$np$$ for binomial, $$\\lambda$$ for Poisson. This is the \"central\" value — what we'd expect on average if $$H_0$$ were true.\n- Step 2: Observed values near this mean are consistent with $$H_0$$; values far above or below are suspect. The direction of the observation (above or below the mean) tells us which tail to investigate.\n- Step 3: In a two-tailed test, you save effort by only computing the tail the observation actually falls in — the other tail contributes probability that was already \"pre-paid\" by halving $$\\alpha$$.\n\nThis is why examples always compute just one tail in two-tailed tests: \"the observed value 4 is above $$np = 1$$, so consider the upper tail $$P(X \\geq 4)$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "A shop sells cars at rate 10/week. In 6 weeks they sold 75 (after price reductions). Why do we need an approximation here, and which one is appropriate? (4 steps)", "answer": "- Step 1: The time window has been extended to 6 weeks, so under $$H_0$$: $$Y \\sim \\text{Po}(60)$$ where $$60 = 6 \\times 10$$.\n- Step 2: Standard Poisson cumulative tables only go up to $$\\lambda = 10$$, so direct table lookup fails for $$\\lambda = 60$$.\n- Step 3: Since $$\\lambda = 60$$ is large ($$> 10$$), use the Normal approximation: $$Y \\approx N(60, 60)$$.\n- Step 4: Apply continuity correction: $$P(Y \\geq 75) \\approx P(W \\geq 74.5)$$ where $$W \\sim N(60, 60)$$. Standardize: $$Z = \\frac{74.5 - 60}{\\sqrt{60}}$$, then use standard Normal tables.\n\n+ Compare the resulting probability to $$\\alpha = 0.05$$ to decide.\n\nThis illustrates the need: without approximation, we'd face an intractable sum.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "A manager samples 100 customers, 35 bought. She claims 45%. Why is Normal approximation appropriate here, and how do you set it up? (4 steps)", "answer": "- Step 1: Under $$H_0$$: $$X \\sim B(100, 0.45)$$. Since $$n$$ is large and $$p \\approx 0.5$$, Normal approximation is ideal.\n- Step 2: Parameters of approximating Normal:\n+ Mean: $$np = 100 \\times 0.45 = 45$$\n+ Variance: $$np(1-p) = 100 \\times 0.45 \\times 0.55 = 24.75$$\n+ So $$W \\sim N(45, 24.75)$$\n- Step 3: Observed value $$x = 35$$ is **less than** the expected 45, so we're in the lower tail. Apply continuity correction: $$P(X \\leq 35) \\approx P(W \\leq 35.5)$$.\n- Step 4: Standardize: $$Z = \\frac{35.5 - 45}{\\sqrt{24.75}}$$, look up in standard Normal table.\n\nFor a two-tailed test at 5%, compare to $$\\alpha/2 = 0.025$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "During a flu outbreak, 4% of city is affected; the manager of a 100-person firm sees 12 absences. Why is Poisson approximation appropriate here, not Normal? (4 steps)", "answer": "- Step 1: Under $$H_0$$: $$X \\sim B(100, 0.04)$$. Here $$n = 100$$ is large but $$p = 0.04$$ is small.\n- Step 2: For Normal approximation, we'd want $$np$$ and $$n(1-p)$$ both large. But $$np = 4$$ is too small — the distribution is too skewed to look Normal.\n- Step 3: For Poisson approximation, we want $$n$$ large, $$p$$ small. Both hold, with $$np = 4$$ being a moderate Poisson rate. So use $$X \\approx \\text{Po}(4)$$.\n- Step 4: Since $$\\lambda = 4$$ IS in the Poisson tables, we can use them directly without further approximation.\n\n+ Rule: small $$p$$, large $$n$$, moderate $$np$$ → Poisson. Large $$n$$, middling $$p$$, both $$np$$ and $$n(1-p)$$ large → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "When we find a critical region from the cumulative binomial table, what is the significance of the value $$P(X \\leq 6) = 0.9452$$ for determining the upper critical region at 5%? (3 steps)", "answer": "- Step 1: $$P(X \\leq 6) = 0.9452$$ tells us $$P(X \\geq 7) = 1 - 0.9452 = 0.0548$$.\n- Step 2: Compare: $$0.0548 > 0.05$$, so $$X = 7$$ is **not** extreme enough; seeing 7 or more still has > 5% probability under $$H_0$$, not rare enough to reject.\n- Step 3: Move up: compute $$P(X \\leq 7)$$ from the table, get $$P(X \\geq 8) = 0.0132 < 0.05$$. So 8 is the critical value and the critical region is $$X \\geq 8$$.\n\n+ Key lesson: you look up the **predecessor** in the cumulative table, then complement to get the upper tail. $$P(X \\geq c) = 1 - P(X \\leq c-1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "In hypothesis testing, what is the relationship between \"significance level,\" \"p-value,\" and the decision? (3 steps)", "answer": "- Step 1: The **significance level** $$\\alpha$$ is a threshold you choose **before** looking at the data (e.g., 5%).\n- Step 2: The **p-value** is the probability, assuming $$H_0$$ is true, of observing a test statistic as extreme as or more extreme than the one you actually got. It's computed **from** the data.\n- Step 3: The decision rule: reject $$H_0$$ if $$p\\text{-value} < \\alpha$$. Equivalently: if the observed result would be rarer than our threshold, dismiss $$H_0$$ as improbable.\n\nThe p-value quantifies \"how surprising is our data\"; $$\\alpha$$ quantifies \"how surprised we need to be to change our mind.\"", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "How would you test whether a dice is biased towards 6, having rolled it 60 times and counted the sixes? (4 steps)", "answer": "- Step 1: Set up the model. Let $$X$$ be the number of sixes in 60 rolls. Under no bias, $$X \\sim B(60, \\frac{1}{6})$$ since each roll independently has probability $$\\frac{1}{6}$$ of being a six.\n- Step 2: State hypotheses:\n+ $$H_0: p = \\frac{1}{6}$$ (fair dice)\n+ $$H_1: p > \\frac{1}{6}$$ (biased toward 6 — one-tailed, upper)\n- Step 3: Choose a significance level (e.g., 5%). Compute $$P(X \\geq x_{\\text{observed}} \\mid p = \\frac{1}{6})$$.\n- Step 4: Compare to $$\\alpha$$. If probability is less, reject $$H_0$$ and conclude evidence of bias toward 6. If not, conclude insufficient evidence.\n\nBecause the bias direction is specified (\"toward 6\"), use a one-tailed upper test.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Why might a test statistic giving $$P(X \\geq x) = 0.06$$ lead to \"fail to reject\" at the 5% level, while $$P(X \\geq x) = 0.04$$ leads to \"reject,\" even though the two are very close? (3 steps)", "answer": "- Step 1: The 5% threshold is a hard boundary chosen in advance. At 0.06, the probability is **just above** the threshold; at 0.04, it's below.\n- Step 2: This feels arbitrary because of the sharp cut-off. In reality, both values provide similar evidence against $$H_0$$ — neither is dramatically more convincing than the other.\n- Step 3: This is a known limitation of binary decision-making via significance tests. In practice, one should also consider effect sizes and confidence intervals, and not treat 0.05 as a magical boundary.\n\n+ Some statisticians criticize \"the cult of 0.05\" for exactly this reason. But within the formal framework, the threshold is what's used.\n\nThis is a conceptual point about the logic: hypothesis tests are designed to force a decision, but the decision depends sensitively on the threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Walk through the setup for a hypothesis test on whether a restaurant's pasta-choice rate has changed, given 1/5 baseline and a new sample of 25 customers. (4 steps)", "answer": "- Step 1: Model: let $$X$$ = number who choose pasta in sample of 25. Under $$H_0$$, $$X \\sim B(25, 0.2)$$.\n- Step 2: Hypotheses:\n+ $$H_0: p = 0.2$$\n+ $$H_1: p \\neq 0.2$$ (changed, either direction — two-tailed)\n- Step 3: At 5% level, split into $$\\alpha/2 = 0.025$$ in each tail. Find:\n+ Lower critical value $$c_1$$: largest integer with $$P(X \\leq c_1) \\leq 0.025$$\n+ Upper critical value $$c_2$$: smallest integer with $$P(X \\geq c_2) \\leq 0.025$$\n- Step 4: Critical region is $$X \\leq c_1 \\cup X \\geq c_2$$. Actual significance level = sum of the two tail probabilities.\n\nThis illustrates the full two-tailed setup: direction unknown → two tails.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why is the probability of incorrectly rejecting $$H_0$$ sometimes written as the \"probability of a Type I error\"? (3 steps)", "answer": "- Step 1: A Type I error is the specific mistake of rejecting $$H_0$$ when $$H_0$$ is actually true.\n- Step 2: By design, this probability equals the significance level (nominally) or actual significance level (in practice). We can't do better than our chosen threshold for this error rate.\n- Step 3: There's also a Type II error (failing to reject when $$H_1$$ is actually true), whose probability is typically denoted $$\\beta$$. Hypothesis tests trade off these two: lower $$\\alpha$$ → higher $$\\beta$$ (more conservative tests miss real effects more often).\n\nIn this syllabus, we focus on Type I (the actual significance level), but knowing the distinction sharpens your understanding.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why do we need to pick a significance level **before** seeing the data? (3 steps)", "answer": "- Step 1: If we set $$\\alpha$$ after seeing the data, we could pick a threshold that conveniently includes or excludes our observation — rigging the test.\n- Step 2: The whole point of the significance level is to guarantee a bound on the long-run false-positive rate. That guarantee only holds if $$\\alpha$$ is independent of the specific data.\n- Step 3: In practice: state $$\\alpha$$ (and $$H_0$$, $$H_1$$) at the start of the analysis, then run the test.\n\nThis is analogous to setting the finish line before the race, not after.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Two researchers test the same hypothesis: one uses 5%, the other uses 1%. They both see $$p$$-value 0.03. Who rejects $$H_0$$ and what does this illustrate? (3 steps)", "answer": "- Step 1: At 5%: $$p = 0.03 < 0.05$$ → reject $$H_0$$.\n- Step 2: At 1%: $$p = 0.03 > 0.01$$ → fail to reject $$H_0$$.\n- Step 3: This illustrates that the conclusion depends on the chosen significance level. Same data, different threshold, different decision. It also underscores that \"significance\" is a function of how strict we are, not a property of the data alone.\n\n+ This is why communicating the p-value itself is often more useful than just \"significant / not significant.\"", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "In setting up a Poisson test for incoming calls at rate 0.45/min over 20 minutes, why must $$\\lambda$$ be scaled before building hypotheses? (3 steps)", "answer": "- Step 1: The original rate (0.45/min) is per minute, but we observe in a 20-minute window. The distribution of observed counts over 20 min has a different mean than over 1 min.\n- Step 2: Scale $$\\lambda$$ to match the observation window: $$\\lambda_{\\text{20 min}} = 20 \\times 0.45 = 9$$. Under $$H_0$$, count $$\\sim \\text{Po}(9)$$.\n- Step 3: Hypotheses are now in the 20-min scale:\n+ $$H_0: \\lambda = 9$$\n+ $$H_1: \\lambda \\neq 9$$ (or directional)\n\nThe underlying rate claim (0.45/min) is equivalent, but the test statistic's distribution uses the scaled $$\\lambda$$.\n\nConsequence: the decision is identical whether you state $$\\lambda$$ per minute or per observation window, as long as you're consistent.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Consider the critical region logic: for $$B(10, 0.4)$$ at 5% upper-tail, we have $$P(X \\geq 7) = 0.0548$$ and $$P(X \\geq 8) = 0.0132$$. Why is the critical value 8 rather than 7? (3 steps)", "answer": "- Step 1: We need the tail probability to be **less than** (or at most) 5%.\n- Step 2: $$P(X \\geq 7) = 0.0548 > 0.05$$ — seeing 7 or more has probability above 5%, not rare enough to reject. If we included 7 in the critical region, our actual false-positive rate would exceed 5%.\n- Step 3: $$P(X \\geq 8) = 0.0132 < 0.05$$ — this qualifies. So 8 is the smallest value that makes the tail probability below 5%. Critical region: $$X \\geq 8$$, actual significance level $$= 0.0132 \\approx 1.32\\%$$.\n\n+ The \"smallest integer such that tail probability $$\\leq \\alpha$$\" rule is why we jump to 8 rather than 7.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Walk through how you'd determine whether rolling a die 12 times and getting only one 6 provides evidence, at 5%, that the die is biased against 6. (5 steps)", "answer": "- Step 1: Set up model. Under fairness, $$X \\sim B(12, \\frac{1}{6})$$. Test statistic is number of 6's in 12 rolls.\n- Step 2: State hypotheses:\n+ $$H_0: p = \\frac{1}{6}$$\n+ $$H_1: p < \\frac{1}{6}$$ (biased away from 6, one-tailed lower)\n- Step 3: Under $$H_0$$, expected value is $$12 \\times \\frac{1}{6} = 2$$. Observed 1 is below expected, consistent with the direction being tested.\n- Step 4: Compute $$P(X \\leq 1 \\mid p = \\frac{1}{6})$$. Either look up in tables or compute directly: $$P(X=0) + P(X=1) \\approx 0.112 + 0.269 \\approx 0.381$$.\n- Step 5: Compare $$0.381 > 0.05$$. **Fail to reject $$H_0$$.** Conclude: insufficient evidence that the probability of a 6 is less than $$\\frac{1}{6}$$; observed result is quite consistent with a fair die.\n\n+ Intuition: 1 six in 12 rolls differs from expected 2 by only one — well within natural variation for a small sample.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "What happens to the power of a hypothesis test (its ability to detect a real effect) as sample size increases? (3 steps)", "answer": "- Step 1: As $$n$$ grows, the binomial (or Poisson) distribution becomes more concentrated around its mean relative to the scale — variability as a proportion of the sample size decreases.\n- Step 2: This means smaller departures from $$p_0$$ become detectable. A 5% difference from the null proportion that was invisible with $$n = 20$$ might be highly significant with $$n = 2000$$.\n- Step 3: In practical terms: larger samples give better statistical \"resolution.\" If you fail to reject $$H_0$$ with a small sample but the effect is real, the right move is usually to collect more data.\n\n+ Trade-off: larger samples cost time and money, so power calculations guide how much is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "If we see a result significant at 5% but not at 1%, what does that tell us? (3 steps)", "answer": "- Step 1: The p-value lies between 0.01 and 0.05. Under $$H_0$$, our observation is unusual (less than 5% chance) but not highly extraordinary (more than 1%).\n- Step 2: At the 5% level, we reject $$H_0$$; at the 1% level, we don't. The result is \"moderately significant.\"\n- Step 3: This represents borderline evidence. In practice, this may prompt further investigation, larger samples, or replication studies, rather than a firm conclusion.\n\nReporting the actual p-value (rather than just \"significant/not\") gives readers the full picture.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why might Chloe, seeing two separate observations both falling in a 5%-each-tail critical region, conclude with stronger confidence than one observation would warrant? (3 steps)", "answer": "- Step 1: If $$H_0$$ is true, each observation independently has probability 0.05 of landing in the critical region.\n- Step 2: The probability of **both** independent observations landing in the critical region by chance is $$0.05 \\times 0.05 = 0.0025$$, or 0.25%.\n- Step 3: This is far stronger evidence than a single significant result. Double confirmation reduces the chance of a Type I error dramatically.\n\n+ This is the principle behind replication studies: multiple confirming tests exponentially reduce false-positive probability.\n\nFor the Challenge problem: if \"in each tail\" the probability is close to 5%, the two-tailed actual significance level is about 10%, and the probability of Chloe incorrectly rejecting is $$\\approx 0.1^2 = 0.01$$ (1%).", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "A test statistic $$X \\sim B(40, p)$$ is used to test $$H_0: p = 0.25$$ against $$H_1: p \\neq 0.25$$ at 2%. Where, roughly, do you expect the two critical values to be and why? (3 steps)", "answer": "- Step 1: Under $$H_0$$, expected value is $$40 \\times 0.25 = 10$$, and variance is $$40 \\times 0.25 \\times 0.75 = 7.5$$, giving standard deviation $$\\approx 2.74$$.\n- Step 2: Two-tailed 2% → 1% in each tail. The 1% tails lie roughly 2.33 standard deviations from the mean (from standard Normal approximation).\n- Step 3: So expect lower critical value around $$10 - 2.33 \\times 2.74 \\approx 10 - 6.4 \\approx 3$$–$$4$$, and upper around $$10 + 6.4 \\approx 16$$–$$18$$. Exact values require binomial tables.\n\n+ This kind of back-of-envelope checking catches gross errors in critical region computation.\n\nObserved: the text's example gave $$X \\leq 3$$ and $$X \\geq 18$$, matching our estimate.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "(Exercise) For $$X \\sim B(10, p)$$, $$H_0: p = 0.2$$, $$H_1: p > 0.2$$ at 5%, walk through finding the critical region. (3 steps)", "answer": "- Step 1: Assume $$H_0$$ true: $$X \\sim B(10, 0.2)$$. Expected value is 2; we're looking for the upper tail.\n- Step 2: From binomial tables, scan cumulative probabilities:\n+ $$P(X \\leq 4) = 0.9672$$, so $$P(X \\geq 5) = 0.0328 < 0.05$$ ✓\n+ $$P(X \\leq 3) = 0.8791$$, so $$P(X \\geq 4) = 0.1209 > 0.05$$ ✗\n- Step 3: The smallest $$c$$ such that $$P(X \\geq c) < 0.05$$ is $$c = 5$$. So the critical region is $$X \\geq 5$$, with actual significance level $$0.0328 \\approx 3.28\\%$$.\n\n+ You don't need to compute more — once you find the smallest $$c$$ satisfying the inequality, you have the critical region.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "(Exercise) For $$X \\sim B(20, p)$$, $$H_0: p = 0.15$$, $$H_1: p < 0.15$$ at 5%, find the critical region. (3 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(20, 0.15)$$. Expected value is $$20 \\times 0.15 = 3$$. Looking at lower tail.\n- Step 2: Scan cumulative probabilities from tables:\n+ $$P(X \\leq 0) = 0.0388 < 0.05$$\n+ $$P(X \\leq 1) = 0.1756 > 0.05$$\n- Step 3: The largest $$c$$ such that $$P(X \\leq c) < 0.05$$ is $$c = 0$$. So the critical region is $$X \\leq 0$$, i.e., $$\\{X = 0\\}$$.\n\n+ This tiny critical region reflects that even observing 1 or 2 successes isn't particularly surprising — the tail drops off slowly when $$p$$ is small.\n\nActual significance level: 3.88%. The test is conservative.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "(Exercise) Conceptually, outline testing an election candidate's claim of 35% support after a charity-related boost, with 28 of 50 new voters supporting her, at 5%. (5 steps)", "answer": "- Step 1: Set up: let $$X$$ = number of supporters in sample of 50. Under $$H_0$$, $$X \\sim B(50, 0.35)$$.\n- Step 2: Hypotheses:\n+ $$H_0: p = 0.35$$\n+ $$H_1: p > 0.35$$ (support may have gone up — one-tailed upper)\n- Step 3: Expected value under $$H_0$$ is $$50 \\times 0.35 = 17.5$$. Observed 28 is substantially above this, consistent with the direction being tested.\n- Step 4: Find critical region by scanning tables for $$P(X \\geq c) < 0.05$$. From the table at $$p = 0.35$$, $$n = 50$$, we find $$P(X \\geq 23) \\approx 0.0478$$ and $$P(X \\geq 22) \\approx 0.0856$$, so critical region is $$X \\geq 23$$.\n- Step 5: Observed 28 lies inside the critical region (28 > 23), so reject $$H_0$$. Conclusion: there is evidence at 5% that support has increased after the charity commitment.\n\n+ Without calculating the exact p-value, the critical-region approach gives a clean decision.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "(Exercise) Apply continuity correction: approximate $$P(X \\leq 35)$$ for $$X \\sim B(100, 0.45)$$ using Normal, showing the corrected expression and standardization setup. (4 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(100, 0.45)$$; we approximate by $$W \\sim N(np, np(1-p)) = N(45, 24.75)$$ since $$n$$ large and $$p$$ close to 0.5.\n- Step 2: Apply continuity correction for $$P(X \\leq 35)$$: the \"≤\" includes the bar at 35, so expand outward: $$P(X \\leq 35) \\approx P(W \\leq 35.5)$$.\n- Step 3: Standardize: $$Z = \\frac{W - 45}{\\sqrt{24.75}}$$, so $$P(W \\leq 35.5) = P\\left(Z \\leq \\frac{35.5 - 45}{\\sqrt{24.75}}\\right) = P(Z \\leq -1.910)$$.\n- Step 4: Look up: $$P(Z \\leq -1.910) \\approx 0.0281$$.\n\n+ The conceptual workthrough shows: correction moves 35 to 35.5 (including the bar), then we standardize and read off the standard Normal table.\n\nFor a two-tailed 5% test, compare 0.0281 to $$\\alpha/2 = 0.025$$: slightly above, so fail to reject.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Why do we often see small discrepancies (like \"$$0.028 > 0.025$$, so fail to reject\") that depend on whether we compute tail probabilities exactly or by approximation? (3 steps)", "answer": "- Step 1: Approximations (Normal, continuity-corrected) introduce small numerical errors compared to the exact binomial or Poisson probabilities.\n- Step 2: When the exact p-value is near the decision threshold, these approximation errors can swing the decision. This is a known limitation near boundaries.\n- Step 3: In principle, when available, exact computation is preferred. But in practice, examination problems with large $$n$$ rely on approximations. The convention is to trust the approximated answer at the stated precision.\n\n+ Lesson: near-boundary decisions are inherently fragile. Good statistical practice includes reporting the actual p-value so readers can judge for themselves.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "In a Poisson test, given $$\\lambda = 3.25$$ (not in tables), what's the most efficient way to compute $$P(Y \\leq 1)$$ by hand for hypothesis testing? (3 steps)", "answer": "- Step 1: Use the Poisson PMF directly: $$P(Y = k) = \\frac{e^{-\\lambda} \\lambda^k}{k!}$$.\n- Step 2: Compute just the terms you need:\n+ $$P(Y = 0) = e^{-3.25}$$\n+ $$P(Y = 1) = e^{-3.25} \\times 3.25$$\n- Step 3: Sum: $$P(Y \\leq 1) = e^{-3.25}(1 + 3.25) = 4.25 \\, e^{-3.25}$$. Evaluate numerically to compare to $$\\alpha$$.\n\n+ This approach is efficient for small tail counts ($$k \\leq 3$$ or so). For larger counts, approximations beat direct computation.\n\n+ For two-tailed tests or upper-tail tests with many terms, a Normal approximation saves significant time.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why does the Binomial approximate to Poisson when $$p$$ is small, and specifically what does the Poisson \"capture\" about the binomial in this limit? (4 steps)", "answer": "- Step 1: Consider $$X \\sim B(n, p)$$ with $$\\mu = np$$ fixed but $$n \\to \\infty$$, $$p = \\mu/n \\to 0$$.\n- Step 2: The binomial PMF is $$\\binom{n}{k} p^k (1-p)^{n-k}$$. Substituting $$p = \\mu/n$$ and taking the limit:\n+ $$\\binom{n}{k} \\approx \\frac{n^k}{k!}$$ for fixed $$k$$, large $$n$$\n+ $$p^k = \\left(\\frac{\\mu}{n}\\right)^k$$\n+ $$(1-p)^{n-k} \\approx (1-\\mu/n)^n \\to e^{-\\mu}$$\n- Step 3: Multiplying: $$\\binom{n}{k} p^k (1-p)^{n-k} \\to \\frac{\\mu^k e^{-\\mu}}{k!}$$, which is the Poisson PMF.\n- Step 4: The Poisson \"captures\" the fact that when individual successes are rare ($$p$$ small) but the sample is large, the count distribution becomes governed by the rate $$\\mu = np$$ alone, not by $$n$$ and $$p$$ separately.\n\n+ Intuition: rare events scattered among many trials — it doesn't really matter how many trials there were, just the expected count.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "Why does the continuity correction sometimes flip direction for \"less than\" vs \"less than or equal\"? (3 steps)", "answer": "- Step 1: Consider two different discrete events:\n+ $$P(X \\leq 5)$$ includes the integer 5\n+ $$P(X < 5) = P(X \\leq 4)$$ excludes the integer 5\n- Step 2: When approximating with a continuous Normal, we need to decide whether to include or exclude the \"bar\" at the boundary integer:\n+ $$P(X \\leq 5) \\approx P(W \\leq 5.5)$$ — include the bar, extend to 5.5\n+ $$P(X < 5) \\approx P(W \\leq 4.5)$$ — exclude the bar at 5; stop at 4.5\n- Step 3: The direction of the 0.5 adjustment depends entirely on whether the boundary integer is part of the event or not.\n\n+ Mnemonic: imagine the discrete bars as rectangles of width 1. If the boundary integer's rectangle is included, extend the continuous range to the right edge of that rectangle; if excluded, stop at its left edge.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "If a test fails to reject $$H_0$$ at 5% but we later collect more data and reject at 5%, have we contradicted ourselves? (3 steps)", "answer": "- Step 1: No contradiction. The first test said \"given this sample, the evidence isn't strong enough.\" The second said \"given this larger sample, the evidence is now strong enough.\"\n- Step 2: With more data, the binomial/Poisson distribution concentrates around its mean relative to sample size, so smaller deviations from $$H_0$$ become detectable. The true parameter hasn't changed — our ability to detect deviations has.\n- Step 3: This reflects an asymmetry: \"fail to reject\" doesn't mean $$H_0$$ is true — it just means we lack enough evidence. Additional evidence can change the verdict without contradiction.\n\n+ This is also why \"absence of evidence isn't evidence of absence\" — both tests may be correct given their respective data.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "(Exercise) A single observation from $$X \\sim B(30, p)$$, testing $$H_0: p = 0.35$$ vs $$H_1: p \\neq 0.35$$ at 5%. Conceptually walk through how you'd find the critical region. (4 steps)", "answer": "- Step 1: Under $$H_0$$, $$X \\sim B(30, 0.35)$$. Expected value $$np = 10.5$$.\n- Step 2: Two-tailed at 5% → probability in each tail close to 2.5%. Consult binomial tables for $$n = 30$$, $$p = 0.35$$:\n+ Lower tail: find largest $$c_1$$ with $$P(X \\leq c_1) \\leq 0.025$$\n+ Upper tail: find smallest $$c_2$$ with $$P(X \\geq c_2) \\leq 0.025$$\n- Step 3: From tables, $$P(X \\leq 5) \\approx 0.0233$$ and $$P(X \\leq 6) \\approx 0.0586$$, so $$c_1 = 5$$.\n+ Also $$P(X \\geq 16) \\approx 0.0301$$ and $$P(X \\geq 17) \\approx 0.0124$$, so $$c_2 = 17$$ (closest to 2.5%).\n- Step 4: Critical region: $$X \\leq 5$$ or $$X \\geq 17$$. Actual significance level $$\\approx 0.0233 + 0.0124 = 0.0357$$.\n\n+ The conceptual take: you look up cumulative probabilities, find the boundary, and sum for the actual level.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Why is the phrase \"incorrectly rejecting $$H_0$$\" a way to describe the actual significance level, and how does this emphasize the role of the critical region? (3 steps)", "answer": "- Step 1: To \"incorrectly reject\" means to reject $$H_0$$ when $$H_0$$ is actually true — a Type I error.\n- Step 2: This happens precisely when the test statistic (which, under $$H_0$$, has the hypothesized distribution) happens to fall in the critical region purely by chance.\n- Step 3: So $$P(\\text{incorrect rejection}) = P(X \\in \\text{critical region} \\mid H_0 \\text{ true})$$. This is identically the \"actual significance level\" — they are the same number viewed two ways: as a long-run error rate and as a tail probability.\n\nThis framing emphasizes that the critical region is essentially a decision boundary, and its size controls our Type I error rate.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Compare binomial vs Poisson test setups: what stays the same and what changes? (4 steps)", "answer": "- Step 1: **Same logical structure:** assume $$H_0$$, compute tail probability, compare to $$\\alpha$$, decide, conclude in context.\n- Step 2: **Different parameter:** binomial tests a proportion $$p$$; Poisson tests a rate $$\\lambda$$.\n- Step 3: **Different expected value:** binomial gives $$E(X) = np$$; Poisson gives $$E(X) = \\lambda$$. This determines which tail to consider in two-tailed tests.\n- Step 4: **Different table lookups:** binomial tables indexed by $$(n, p)$$; Poisson tables indexed by $$\\lambda$$ only. Poisson also has a natural scaling property (rate × time), which binomial lacks in the same form.\n\n+ Both can be approximated by Normal when parameters are \"large\" (large $$n$$ with moderate $$p$$ for binomial; large $$\\lambda$$ for Poisson).", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "What are the conditions that must hold for a problem to be modeled as binomial, and how should we justify this in an exam? (4 steps)", "answer": "- Step 1: Binomial requires four conditions:\n+ Fixed number of trials $$n$$\n+ Each trial has two outcomes (success/failure)\n+ Trials are independent\n+ Probability of success $$p$$ is constant across trials\n- Step 2: To justify in context: identify the trials (e.g., \"each car being tested\"), the success (e.g., \"fails the brake test\"), argue independence (one car's outcome doesn't influence another's), and argue constant $$p$$ (e.g., \"each car is drawn from the same population with the same failure rate\").\n- Step 3: If any condition fails, binomial isn't appropriate:\n+ If $$n$$ varies, use different model\n+ If outcome has more than 2 categories, use multinomial\n+ If trials are dependent, use e.g., hypergeometric\n- Step 4: In many exam problems, binomial is given or strongly implied, but knowing the conditions helps spot when it wouldn't apply.\n\n+ This matters: a garage-test problem is binomial because each car's pass/fail is independent of others at the same rate. A dice-biased question is binomial because each roll is independent with the same probability.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "What's the key conceptual insight behind why splitting $$\\alpha$$ into two $$\\alpha/2$$ halves is the **correct** way to conduct a two-tailed test? (3 steps)", "answer": "- Step 1: The total probability of Type I error must be at most $$\\alpha$$. This is the whole point of the significance level.\n- Step 2: In a two-tailed test, rejection happens if $$X$$ lands in the lower tail **or** the upper tail. These are disjoint, so probabilities add: $$P(\\text{reject} \\mid H_0) = P(\\text{lower}) + P(\\text{upper})$$.\n- Step 3: To keep the sum at $$\\alpha$$, each tail gets $$\\alpha/2$$. This is \"spending\" the significance budget equally in both directions. A symmetric two-tailed test requires a symmetric allocation.\n\n+ If we used $$\\alpha$$ in each tail separately, the overall error rate would be $$2\\alpha$$ — we'd be twice as likely to wrongly reject $$H_0$$ as intended.\n\nThis links to a broader principle: when testing multiple hypotheses simultaneously, you must adjust for the multiplicity.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "(Exercise) A manufacturer claims 15 new purple drawing pins per 20-box. A customer sees 1 purple pin and wants to test at 5% whether probability < 0.15. Walk through the test. (4 steps)", "answer": "- Step 1: Set up: $$X$$ = number of purple pins in a box, $$X \\sim B(20, p)$$. $$H_0: p = 0.15$$, $$H_1: p < 0.15$$ (one-tailed, lower). Under $$H_0$$, $$E(X) = 3$$.\n- Step 2: Compute $$P(X \\leq 1 \\mid p = 0.15)$$ from tables: $$P(X \\leq 1) \\approx 0.1756$$.\n- Step 3: Compare to $$\\alpha = 0.05$$: since $$0.1756 > 0.05$$, the observation is not extreme enough.\n- Step 4: **Fail to reject $$H_0$$.** Conclude: insufficient evidence at 5% that the proportion of purple pins is less than 0.15. One low box doesn't establish a manufacturing problem.\n\n+ Intuition: with expected value 3 and observed value 1, the shortfall of 2 pins is within natural sampling variation.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "Why is the binomial approximation to Poisson useful even though we could use binomial tables directly? (3 steps)", "answer": "- Step 1: Binomial tables in standard statistical references are often limited to $$n \\leq 50$$ and specific $$p$$ values like 0.05, 0.1, ..., 0.5.\n- Step 2: For problems with $$n$$ very large (e.g., 1000) or $$p$$ very small (e.g., 0.002), binomial tables simply don't apply — no entry exists for these parameters.\n- Step 3: If $$n$$ is large and $$p$$ small, $$B(n,p) \\approx \\text{Po}(np)$$, which requires only one parameter $$\\lambda = np$$ and is tabulated up to $$\\lambda = 10$$. Beyond that, use Normal approximation on the Poisson.\n\n+ This cascade — binomial → Poisson → Normal — covers essentially all large-sample hypothesis-testing situations with minimal computational effort.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "In the bacteria-in-river problem: rate 5/litre baseline, 0.5 litre sampled contains 7 bacteria. At 5%, how do you test for pollution increase? (4 steps)", "answer": "- Step 1: Scale $$\\lambda$$ to match sample volume: if rate is 5/litre and we sampled 0.5 litre, then under $$H_0$$: $$X \\sim \\text{Po}(0.5 \\times 5) = \\text{Po}(2.5)$$.\n- Step 2: Hypotheses:\n+ $$H_0: \\lambda = 2.5$$ (baseline level in 0.5 litre)\n+ $$H_1: \\lambda > 2.5$$ (pollution increases rate, one-tailed upper)\n- Step 3: Compute $$P(X \\geq 7 \\mid \\lambda = 2.5)$$ using Poisson tables or direct computation. From the table with $$\\lambda = 2.5$$: $$P(X \\leq 6) \\approx 0.9858$$, so $$P(X \\geq 7) \\approx 0.0142$$.\n- Step 4: Compare to $$\\alpha = 0.05$$: $$0.0142 < 0.05$$, so **reject $$H_0$$**. Conclude: there is evidence at 5% that the bacteria rate is elevated near the factory, supporting the pollution claim.\n\n+ Key step: scaling the rate to match the sample volume before testing.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Why does the \"actual significance level\" provide useful information, beyond just stating the nominal level? (3 steps)", "answer": "- Step 1: The nominal level tells us our target: \"we want no more than 5% Type I error.\"\n- Step 2: The actual level tells us what we actually achieved with the chosen critical region — e.g., 3.28%. For discrete distributions, this will typically be strictly less than nominal.\n- Step 3: Reporting both reveals:\n+ How conservative the test actually is\n+ Whether our critical region was constructed well\n+ The real false-positive rate, which is what practical users care about\n\n+ In some cases, alternative critical regions with different actual levels are valid — knowing the actual level helps choose among them.\n\n+ It's also a sanity check: if your \"actual level\" exceeds nominal, you've made an error somewhere.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "Why do \"write your hypotheses clearly\" instructions appear in so many exam questions? (3 steps)", "answer": "- Step 1: The hypotheses define what you're testing. Without them explicit, the subsequent calculations are meaningless — a tail probability is just a number unless tied to specific claims.\n- Step 2: Markers need to verify you've identified:\n+ The right parameter (e.g., $$p$$ or $$\\lambda$$)\n+ The right null value ($$p_0$$ or $$\\lambda_0$$)\n+ The right direction (or lack thereof) in $$H_1$$\n- Step 3: Also, hypotheses should be in context: \"$$p$$ is the proportion of faulty items\" rather than just \"$$p$$.\" This shows understanding, not just symbol manipulation.\n\n+ A test with unstated hypotheses is an incomplete answer no matter how correct the arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "A sample of size 20 gives a result at the 5% level but the 1% level is required. What are your options? (3 steps)", "answer": "- Step 1: Check if the observed p-value is below 1%. If so, the result is also significant at 1% and the conclusion changes simply by stating this stricter significance.\n- Step 2: If the p-value is between 1% and 5%, the result is significant at 5% but **not** at 1%. You'd report \"fail to reject $$H_0$$ at the 1% level.\"\n- Step 3: To achieve 1% significance with similarly sized effect, you'd typically need more data. Larger sample size → more concentrated distribution → easier to detect real effects with small p-values.\n\n+ The example from the text: \"what is the greatest number of recoveries from 20 patients needed for 1% significance?\" — this asks you to find the critical value at 1% rather than 5%, showing the distinction.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}], "count": 75}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In hypothesis testing, why do we begin by *assuming* something we might actually want to disprove? What is the underlying logic of this \"prove by contradiction under probability\"? (3 steps)", "answer": "- Step 1: We cannot observe an entire population — only a sample. The sample produces a test statistic that will vary from sample to sample, even if our beliefs about the population are correct. So we need a framework for deciding when the deviation is \"too large\" to be chance.\n- Step 2: We assume a specific value of the parameter ($$H_0$$) so that we can fix a probability distribution. Without a specific value, we couldn't compute $$P(X = x)$$ or $$P(X \\geq x)$$ because the distribution wouldn't be determined.\n- Step 3: We then ask: \"given $$H_0$$ is true, how surprising is my observation?\" If the observation is extremely unlikely under $$H_0$$, we reject $$H_0$$ as being inconsistent with the data.\n+ The test never \"proves\" $$H_1$$ — it shows $$H_0$$ is inconsistent with what we saw.\n+ This is analogous to proof by contradiction in mathematics, but with a probability cutoff rather than strict logical contradiction.\n\nThe key insight: the asymmetry (assume $$H_0$$, test for contradiction) is what makes calculation possible.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Distinguish between a \"test statistic\" and a \"population parameter\" — what role does each play in a hypothesis test? (3 steps)", "answer": "- Step 1: A **population parameter** (like $$p$$ in $$B(n,p)$$ or $$\\lambda$$ in $$\\text{Po}(\\lambda)$$) is a feature of the underlying population or process. It is typically *unknown* and is what the hypothesis is *about*.\n- Step 2: A **test statistic** is a single numerical value *calculated from the sample* (the observed data). For binomial tests, the test statistic is typically the count $$X$$ of successes; for Poisson tests, the count of events in an interval.\n- Step 3: The relationship: we use the test statistic (observed) to make inferences about the parameter (unknown). We *never* compute the parameter directly; we only test whether the observed data is consistent with a hypothesised value of the parameter.\n+ Common student error: calling \"$$p = 0.2$$\" the test statistic. No — the test statistic is the *count* of successes, a value like 5 or 11.\n\nAlways: parameter = feature of population; statistic = function of sample data.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "What are the structural rules for writing $$H_0$$ and $$H_1$$ in a hypothesis test? Why must $$H_0$$ contain a specific value rather than a range? (3 steps)", "answer": "- Step 1: $$H_0$$ is always of the form \"parameter = specific value\" (e.g., $$H_0: p = 0.4$$ or $$H_0: \\lambda = 6.5$$). It must specify a *single* value so that we can determine a unique probability distribution under which to compute probabilities.\n- Step 2: $$H_1$$ describes the *direction* of deviation we are testing for:\n+ $$H_1: \\theta > \\theta_0$$ → upper-tailed (testing for increase)\n+ $$H_1: \\theta < \\theta_0$$ → lower-tailed (testing for decrease)\n+ $$H_1: \\theta \\neq \\theta_0$$ → two-tailed (testing for change in either direction)\n- Step 3: Why $$H_0$$ must be specific: if $$H_0$$ said \"$$p \\geq 0.4$$\", there are infinitely many values ($$p = 0.4, 0.5, 0.6, \\ldots$$) each giving a different distribution, and we couldn't decide which probabilities to compute. Fixing $$p = 0.4$$ gives a single, workable model.\n\nThe rule: $$H_0$$ fixes a number; $$H_1$$ provides a direction away from that number.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Explain what the \"significance level\" of a hypothesis test represents conceptually, and why we choose values like 10%, 5%, or 1% rather than something arbitrary. (3 steps)", "answer": "- Step 1: The significance level $$\\alpha$$ is the *threshold* probability we set in advance for rejecting $$H_0$$. It represents the maximum probability of a \"false alarm\" — rejecting $$H_0$$ when $$H_0$$ is actually true — that we are willing to tolerate.\n- Step 2: Lower $$\\alpha$$ means stronger evidence is required to reject $$H_0$$. This protects against false rejections (wrongly claiming an effect) but makes it harder to detect real effects.\n- Step 3: Why 10%, 5%, 1%?\n+ 5% is conventional — a balance between protection against false alarms and sensitivity.\n+ 1% is used when false rejections are costly (e.g., approving a dangerous drug).\n+ 10% is used in exploratory work where we want sensitivity over rigour.\n+ These aren't magic numbers — they're social conventions in the scientific community.\n\nIn exam, you'll always be told the significance level to use.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why does the direction of $$H_1$$ fundamentally change the nature of the test? Contrast what a one-tailed and a two-tailed test of the same $$H_0$$ would detect. (3 steps)", "answer": "- Step 1: A **one-tailed test** concentrates all of the significance-level probability (say 5%) into *one tail* of the distribution. It is designed to detect deviations in one specific direction.\n- Step 2: A **two-tailed test** splits the significance level into both tails (2.5% each for $$\\alpha = 5\\%$$). It detects deviations in either direction.\n- Step 3: Consequences:\n+ A one-tailed test is *more sensitive* (has higher power) in the specified direction — you need a smaller effect to reject.\n+ But a one-tailed test has *zero power* to detect effects in the other direction.\n+ A two-tailed test sacrifices sensitivity in each direction (2.5% instead of 5%) to gain the ability to detect both.\n\n**The choice must be made BEFORE seeing the data**, based on the research question — not after, based on what the data shows (which would be statistical dishonesty).", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "What is a \"critical region\" and what is a \"critical value\"? How do they relate to the decision rule of a hypothesis test? (3 steps)", "answer": "- Step 1: The **critical region** (or rejection region) is the set of values of the test statistic that, if observed, would cause you to *reject* $$H_0$$. These are the \"extreme\" values — outcomes very unlikely under $$H_0$$.\n- Step 2: The **critical value** is the boundary point — the first (most extreme) value of the test statistic that falls *inside* the critical region.\n+ For upper-tail tests: smallest $$c$$ with $$P(X \\geq c | H_0) \\leq \\alpha$$.\n+ For lower-tail tests: largest $$c$$ with $$P(X \\leq c | H_0) \\leq \\alpha$$.\n- Step 3: The **acceptance region** is the complement — values of the test statistic where we do *not* reject $$H_0$$.\n+ Decision rule: compute your observed test statistic; if it's in the critical region → reject $$H_0$$; otherwise → fail to reject.\n+ The critical value is always included in the critical region (using $$\\geq$$ or $$\\leq$$).\n\nThese three concepts partition the possible outcomes into \"evidence for $$H_1$$\" and \"consistent with $$H_0$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "For a binomial or Poisson hypothesis test with nominal significance level 5%, why is the *actual* significance level usually less than 5% — not exactly equal? (3 steps)", "answer": "- Step 1: Binomial and Poisson distributions are *discrete* — probability is placed at integer values only. The cumulative probability jumps in discrete steps as you move from one integer to the next.\n- Step 2: The nominal 5% usually falls *between* two adjacent cumulative probabilities. For example, $$P(X \\geq 7) = 0.0548$$ and $$P(X \\geq 8) = 0.0132$$ — neither equals 0.05.\n- Step 3: To stay conservative (actual ≤ nominal), we pick the critical region whose tail probability is the largest value still ≤ 0.05. In the example above, we'd pick $$X \\geq 8$$, giving an actual significance level of $$1.32\\%$$.\n+ This is inherent to discrete testing — there's no way to \"hit\" 5% exactly without using randomisation.\n+ Continuous distributions (like the normal) can achieve the exact significance level.\n\nConsequence: discrete tests tend to be slightly more conservative than nominal, giving you less frequent false rejections than $$\\alpha$$ suggests.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Why is the \"actual significance level\" formally equal to $$P(\\text{test statistic} \\in \\text{critical region} | H_0 \\text{ is true})$$, and what does this interpretation reveal about Type I errors? (3 steps)", "answer": "- Step 1: Rejecting $$H_0$$ happens precisely when the test statistic lands in the critical region. So $$P(\\text{reject } H_0 | H_0 \\text{ true})$$ equals the probability of landing in the critical region under $$H_0$$.\n- Step 2: This probability is called the **actual significance level**, or equivalently the **Type I error rate** — the rate of false alarms in repeated testing.\n- Step 3: So if the actual significance level is 3.2%, then:\n+ If $$H_0$$ is truly correct and we repeatedly test on independent samples, we'd incorrectly reject $$H_0$$ about 3.2% of the time.\n+ This is the \"price we pay\" for having a procedure that can detect real effects when they exist.\n+ The test's procedure imposes this rate by construction — we've chosen to reject based on outcomes that have probability ≤ some threshold under $$H_0$$.\n\nDeeper: the significance level is a property of the *procedure*, not a single test — it reflects long-run behaviour under repeated hypothetical sampling.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "In a one-tailed upper test, why do we compute $$P(X \\geq x_{\\text{obs}})$$ rather than $$P(X = x_{\\text{obs}})$$? (2 steps)", "answer": "- Step 1: The individual-point probability $$P(X = x_{\\text{obs}})$$ is typically very small for *any* value (since many outcomes are possible). This alone doesn't tell us whether the observation is \"in the tail\" or \"near the centre\" of the distribution.\n- Step 2: The hypothesis test asks: \"how unlikely is it to see something *at least as extreme* as my observation?\" This is the tail probability $$P(X \\geq x_{\\text{obs}})$$, which accumulates the probability of all equally-or-more-extreme outcomes.\n+ This is fairer: it treats the observation $$x_{\\text{obs}}$$ on equal footing with all values that would have caused us to reject $$H_0$$ just as strongly.\n+ Example: observing \"11 successes\" is only evidence for $$H_1: p > p_0$$ if 12, 13, 14, … would also have been. We count all of them.\n\nSo the p-value is not \"the probability of $$x_{\\text{obs}}$$\" but rather \"the probability of data at least this extreme\".", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "For a two-tailed test at significance level $$\\alpha$$, why must we split $$\\alpha$$ into $$\\alpha/2$$ at each tail? What goes wrong if we don't? (3 steps)", "answer": "- Step 1: The significance level represents the *total* probability of incorrectly rejecting $$H_0$$ — summed over all rejection scenarios. For a two-tailed test, rejection can happen via either the lower tail or the upper tail.\n- Step 2: If we allowed $$\\alpha$$ at each tail separately, the total probability of false rejection would be $$2\\alpha$$ — double what we intended. Our \"5% test\" would actually have a 10% false alarm rate.\n- Step 3: By setting each tail at $$\\alpha/2 = 0.025$$ (for $$\\alpha = 5\\%$$), the two disjoint tails sum to $$\\alpha$$, preserving the intended false-alarm rate.\n+ This is why one-tailed tests look \"easier\" to reject — they concentrate all the error budget into one direction.\n+ It also explains why two-tailed tests require more extreme evidence: 2.5% tail vs 5% tail.\n\nRule: the total probability of landing in the rejection region (under $$H_0$$) must equal the significance level, regardless of how many tails the region has.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "For a two-tailed test, you see the observation is on one side of the expected value (e.g., below $$np$$). Which tail should you compute for the p-value, and why does the observation dictate this? (3 steps)", "answer": "- Step 1: The expected value of $$X$$ under $$H_0$$ is $$np$$ (binomial) or $$\\lambda$$ (Poisson). This is the \"centre\" — values close to this are consistent with $$H_0$$.\n- Step 2: Compare the observation to this expected value:\n+ If $$x_{\\text{obs}} < E(X)$$ under $$H_0$$: compute $$P(X \\leq x_{\\text{obs}})$$ (lower-tail probability).\n+ If $$x_{\\text{obs}} > E(X)$$ under $$H_0$$: compute $$P(X \\geq x_{\\text{obs}})$$ (upper-tail probability).\n- Step 3: Computing the \"wrong\" tail gives a very large probability (close to 1), which would never lead to rejection. But the observation still could be in the other tail's critical region.\n+ Misconception trap: students anchor on the absolute magnitude of $$x$$. For $$X \\sim B(50, 0.02)$$ with expected value 1, observing $$x = 4$$ is in the *upper* tail (even though 4 is a \"small\" number) because it exceeds expectation.\n\nFor a two-tailed test, compare the chosen tail probability to $$\\alpha/2$$, not $$\\alpha$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "The p-value method and the critical region method are two approaches to hypothesis testing. Explain why they must always give the same conclusion. (3 steps)", "answer": "- Step 1: **P-value method**: assume $$H_0$$, compute $$P(\\text{data as extreme as or more than observed})$$, compare to $$\\alpha$$. Reject if p-value < $$\\alpha$$.\n- Step 2: **Critical region method**: compute in advance the set of values $$C$$ such that $$P(X \\in C | H_0) \\leq \\alpha$$. Reject if observed $$x \\in C$$.\n- Step 3: These must agree because:\n+ If $$x$$ is in the critical region, the tail from $$x$$ outward has probability ≤ $$\\alpha$$ (since $$C$$ is defined this way), so the p-value < $$\\alpha$$ → reject.\n+ If $$x$$ is not in the critical region, the tail from $$x$$ outward has probability > $$\\alpha$$, so the p-value > $$\\alpha$$ → don't reject.\n+ The two methods are logically equivalent — they're restating the same inequality.\n\nStrategic tip: use critical regions when the question asks for them or when doing multiple tests; use p-values for single observations in simple tests.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "When would you strategically prefer the critical region method over computing a p-value directly, and vice versa? (3 points)", "answer": "- Step 1: **Use the critical region method when:**\n+ The exam question explicitly asks for the critical region.\n+ You have a two-tailed test — finding two critical values at once is cleaner than computing two-sided p-values.\n+ The question has multiple parts using the same $$H_0$$ — reuse the critical region.\n- Step 2: **Use the p-value method when:**\n+ You have a single observed value and want a single, direct comparison.\n+ The distribution parameters don't align with cumulative tables (and so a direct tail calculation is simpler).\n- Step 3: They're mathematically equivalent, so the choice is about efficiency, not correctness. In exams, always read the question carefully — it often tells you which method to use (e.g., \"find the critical region\" vs \"test the claim\").", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Explain why, in a two-tailed test with a highly skewed distribution like $$B(20, 0.1)$$, the tail probabilities in the critical region can be very unequal, and why this is acceptable. (3 steps)", "answer": "- Step 1: $$B(20, 0.1)$$ is strongly right-skewed (mean 2, long right tail). The lower tail is \"compressed\" because values close to 0 have limited probability mass. The upper tail is long.\n- Step 2: To place ~2.5% probability in each tail:\n+ The lower tail might end at $$X = 0$$ with probability 0.12 — way above 2.5%.\n+ Or we might not put ANY probability in the lower tail (no valid cutoff).\n+ The upper tail settles at $$X \\geq 5$$ with probability ~3%.\n- Step 3: The test can still proceed with a slightly asymmetric structure — we're controlling the *total* significance level, not forcing each tail to be equal.\n+ The actual significance level is the sum of both tail probabilities (perhaps 1.5% + 0.1% = 1.6%, say), which could be less than 5%.\n+ Skewed distributions naturally lead to unequal tail contributions; this is a feature, not a bug.\n\nIn practice, always compute both tails separately and sum them for the actual significance level.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Two exam questions use slightly different wording for two-tailed critical regions: (a) \"probability in each tail should be *less than* 0.025\" vs (b) \"probability in each tail should be *as close as possible to* 0.025\". Why does this change the answer? (3 steps)", "answer": "- Step 1: Suppose adjacent candidate tail probabilities are 0.028 and 0.015.\n- Step 2: Under \"less than 0.025\":\n+ 0.028 is too large → must pick 0.015.\n- Step 3: Under \"as close as possible to 0.025\":\n+ $$|0.028 - 0.025| = 0.003$$\n+ $$|0.015 - 0.025| = 0.010$$\n+ The value 0.028 is closer — pick it, even though it exceeds 0.025.\n\nSo \"closest\" allows the actual significance level to *slightly exceed* the nominal; \"less than\" is strictly conservative. Always match the computation to the wording. Mix them up, and you'll pick the wrong critical value — and lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "A critical region for a one-tailed upper test is $$X \\geq 8$$. The observed value is exactly $$x = 8$$. Should you reject $$H_0$$? Explain why this follows from the definition. (2 steps)", "answer": "- Step 1: The notation \"$$X \\geq 8$$\" is inclusive — it includes the value 8. The critical value is defined as the *first value inside* the critical region.\n- Step 2: Since $$x = 8$$ is inside the critical region, we reject $$H_0$$.\n+ This is consistent with the construction: $$P(X \\geq 8 | H_0) \\leq \\alpha$$ was the condition used to pick 8. Observing 8 or more is considered sufficiently unusual to reject.\n+ If instead the critical region had been stated as \"$$X > 8$$\" (strict), then $$x = 8$$ would *not* be in the region.\n+ Exam boards use $$\\geq$$ by convention — always check the notation.\n\nAlways read the inequality carefully when deciding.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "A researcher observes data, decides the result is \"in the direction we want\", then sets up a one-tailed test in that direction and rejects $$H_0$$. What is wrong with this methodology? (3 steps)", "answer": "- Step 1: The significance level of a test is only valid when the $$H_1$$ direction is chosen **before** seeing the data. Choosing the direction after peeking at the data uses information from the data to inflate significance.\n- Step 2: If the direction is chosen based on the sign of the observed deviation, you're effectively running a two-tailed test at $$2\\alpha$$ — doubling the false-alarm rate.\n- Step 3: This practice is known as \"p-hacking\" or \"post-hoc direction selection\" and undermines the validity of the test.\n+ The significance level of $$5\\%$$ assumes a pre-specified direction, not a \"whichever tail shows a stronger result\" choice.\n+ Proper practice: pre-register the direction based on prior belief, then analyse honestly.\n\nTakeaway: hypothesis tests require *commitment* to a test plan before data analysis. The direction must be justified by the research question, not by the data.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"que
