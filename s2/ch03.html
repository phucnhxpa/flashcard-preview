<script>
const DATA={"selected": [{"question": "A cereal has prizes in 56% of boxes. In a sample of 100 boxes, is it more accurate to use a normal approximation for $$\\mathrm{P}(X = 55)$$ or for $$\\mathrm{P}(X \\geqslant 55)$$? Explain why. (2 steps)", "answer": "- Step 1: The normal approximation is more accurate for **cumulative** probabilities like $$\\mathrm{P}(X \\geqslant 55)$$ than for **single-value** probabilities like $$\\mathrm{P}(X = 55)$$.\n- Step 2: For a single value, we approximate a thin bar by the area under the normal curve between 54.5 and 55.5 ‚ÄĒ a narrow slice where small errors in the curve's shape matter proportionally more. For a cumulative probability, we sum many bars, and overestimates in some regions cancel underestimates in others. The net error is smaller in relative terms.\n\nTakeaway: Cumulative probabilities are more robust to approximation error than point probabilities ‚ÄĒ errors cancel over many bars.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_42"}, {"question": "When approximating $$X \\sim \\mathrm{B}(n, p)$$ with a Poisson distribution, what is the parameter $$\\lambda$$ of the approximating Poisson, and why does this choice make sense? (2 steps)", "answer": "- Step 1: The approximating Poisson has parameter $$\\lambda = np$$. This is simply the mean of the binomial distribution, since $$\\mathrm{E}(X) = np$$.\n- Step 2: This choice ensures the approximating distribution has the same centre of mass as the original. Since for Poisson the mean equals the variance (both are $$\\lambda$$), and for binomial when $$p$$ is small we have $$\\mathrm{Var}(X) = np(1-p) \\approx np$$ because $$(1-p) \\approx 1$$, the Poisson naturally matches both the mean and (approximately) the variance of the binomial in this regime.\n\nTakeaway: $$\\lambda = np$$ preserves the expected value, and when $$p$$ is small the variance automatically matches too ‚ÄĒ that's why Poisson is the right approximation here.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_2"}, {"question": "When approximating $$\\mathrm{P}(X = k)$$ for a binomial random variable using a normal approximation, what interval do you use, and why might the percentage error be relatively large for this type of probability? (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X = k) \\approx \\mathrm{P}(k - 0.5 < Y < k + 0.5)$$. We straddle the integer $$k$$ by ¬Ī0.5 to capture the area of the single bar.\n- Step 2: A single-point probability for a binomial can be quite small (e.g., 0.0365). The normal approximation gives a similar but not identical small number (e.g., 0.0362). The absolute difference is tiny (0.0003), but the percentage error = $$\\frac{0.0003}{0.0365} \\times 100\\% \\approx 0.82\\%$$ can be noticeable.\n- Step 3: Percentage errors for single values tend to be larger than for cumulative probabilities because we're approximating a thin slice, where small shifts in the curve matter more. Cumulative probabilities sum many bars, and errors tend to cancel out.\n\nTakeaway: Single-value probabilities are the hardest to approximate well (in percentage terms) because we're capturing one thin bar under the curve.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_12"}, {"question": "When can a Poisson distribution $$X \\sim \\operatorname{Po}(\\lambda)$$ be approximated by a normal distribution? What are the parameters of the resulting normal distribution, and why do they take this form? (3 steps)", "answer": "- Step 1: The approximation is valid when the mean $$\\lambda$$ is large (typically $$\\lambda > 10$$).\n- Step 2: The resulting distribution is $$Y \\sim \\mathrm{N}(\\lambda, \\lambda)$$.\n- Step 3: This is because a Poisson distribution has the property that its variance is exactly equal to its mean (both are $$\\lambda$$). When choosing a normal distribution to approximate it, we match both the mean and the variance to preserve the center and spread of the distribution.\n\nTakeaway: Large $$\\lambda$$, use Normal with $$\\mu = \\lambda$$, $$\\sigma^2 = \\lambda$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_11"}, {"question": "A random variable $$X \\sim \\mathrm{B}(200, 0.98)$$. To use a Poisson approximation, how should you re-frame this problem, and what is the resulting approximate distribution? (2 steps)", "answer": "- Step 1: The condition for a Poisson approximation is a small $$p$$. Here $$p = 0.98$$ is large, not small. However, we can consider the number of failures instead of successes, which has probability $$1 - 0.98 = 0.02$$.\n- Step 2: Let $$Y$$ be the number of failures. Then $$Y \\sim \\mathrm{B}(200, 0.02)$$. Now $$p = 0.02$$ is small and $$n = 200$$ is large, so we can approximate $$Y$$ using $$\\operatorname{Po}(200 \\times 0.02) = \\operatorname{Po}(4)$$.\n\nTakeaway: If $$p$$ is large, swap \"success\" and \"failure\" so $$p$$ becomes small.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_2"}, {"question": "Explain intuitively why the Poisson distribution is a good approximation to the binomial when $$p$$ is small. What happens to the binomial's variance in this regime? (3 steps)", "answer": "- Step 1: The binomial variance is $$\\mathrm{Var}(X) = np(1-p)$$. When $$p$$ is small, $$(1-p)$$ is close to 1, so $$\\mathrm{Var}(X) \\approx np = \\mathrm{E}(X)$$.\n- Step 2: The defining property of a Poisson distribution is that its mean equals its variance (both are $$\\lambda$$). So when the binomial's variance is approximately equal to its mean, the binomial \"behaves like\" a Poisson.\n- Step 3: Physically, when $$p$$ is small and $$n$$ is large, we're counting rare events in many trials ‚ÄĒ exactly the scenario Poisson models (events occurring at a constant rate, independently). The binomial's discrete, skewed shape converges to the Poisson shape.\n\nTakeaway: Small $$p$$ makes the binomial's mean ‚Čą variance, which is the signature property of Poisson ‚ÄĒ that's the deep reason the approximation works.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3"}, {"question": "A doctor claims a remedy cures 52% of cases. In a sample of 300, 170 are cured. Explain conceptually how to assess this claim using a normal approximation, without computing the final number. (3 steps)", "answer": "- Step 1: Under the claim, $$X \\sim \\mathrm{B}(300, 0.52)$$, with $$\\mu = 156$$ and $$\\sigma^2 = 300 \\times 0.52 \\times 0.48 = 74.88$$. Approximate with $$Y \\sim \\mathrm{N}(156, 74.88)$$.\n- Step 2: Compute $$\\mathrm{P}(X \\geqslant 170) \\approx \\mathrm{P}(Y > 169.5)$$. Standardise: $$z = \\frac{169.5 - 156}{\\sqrt{74.88}} = \\frac{13.5}{8.653} \\approx 1.56$$, giving a probability of about 0.06.\n- Step 3: A probability of ~6% is borderline ‚ÄĒ not extremely unlikely but not typical either. This is not strong enough evidence to firmly reject the claim, but it raises suspicion. The observed 170 is somewhat higher than the expected 156, but not impossibly so under the claim.\n\nTakeaway: The approximated tail probability is the p-value; interpreting it requires judgment about what threshold constitutes \"sufficiently unlikely.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_30"}, {"question": "Conceptually, what does \"percentage error\" measure when evaluating an approximation, and why is it more informative than absolute error? (2 steps)", "answer": "- Step 1: Percentage error $$= \\frac{|\\text{exact} - \\text{approximate}|}{\\text{exact}} \\times 100\\%$$. It measures the relative size of the error compared to the true value.\n- Step 2: Absolute error alone can be misleading. An absolute error of 0.001 is negligible if the true probability is 0.5 (0.2% error) but significant if the true probability is 0.01 (10% error). Percentage error contextualises the error, telling you how much the approximation distorts the true answer proportionally.\n\nTakeaway: Percentage error tells you the *relative* accuracy of an approximation ‚ÄĒ essential when comparing approximations across problems with very different probability scales.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_36"}, {"question": "Summarise the complete decision framework for choosing an approximation, given a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$ or a Poisson random variable $$X \\sim \\mathrm{Po}(\\lambda)$$. (3 steps)", "answer": "- Step 1: **For binomial** $$\\mathrm{B}(n, p)$$:\n+ If $$p$$ is small (and $$n$$ large): check $$np$$. If $$np \\leqslant 10$$, use **Poisson** approximation $$\\mathrm{Po}(np)$$.\n+ If $$p$$ is close to 0.5 (and $$n$$ large): if $$np > 10$$, use **normal** approximation $$\\mathrm{N}(np, np(1-p))$$ with continuity correction.\n+ Go directly to the chosen approximation ‚ÄĒ never via an intermediate.\n- Step 2: **For Poisson** $$\\mathrm{Po}(\\lambda)$$:\n+ If $$\\lambda > 10$$, use **normal** approximation $$\\mathrm{N}(\\lambda, \\lambda)$$ with continuity correction.\n+ If $$\\lambda \\leqslant 10$$, use Poisson directly (tables are available).\n- Step 3: **Key reminders**: always apply continuity corrections when using normal approximations for discrete distributions; the question will usually tell you when to approximate; and the larger the parameters ($$n$$ or $$\\lambda$$), the better any approximation will be.\n\nTakeaway: The decision tree is: Binomial ‚Üí check $$p$$ and $$np$$ ‚Üí Poisson or Normal. Poisson ‚Üí check $$\\lambda$$ ‚Üí Normal or direct.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_44"}, {"question": "Let $$X \\sim B(n, p)$$. Show that if we approximate $$X$$ using a Poisson distribution, the Poisson approximation will always give a higher probability for $$P(X=0)$$ than the exact Binomial calculation. (4 steps)", "answer": "- Step 1: Write the exact Binomial probability for 0 successes: $$P(X=0) = (1-p)^n$$.\n- Step 2: Write the Poisson approximation probability for 0 successes, using $$\\lambda = np$$: $$P(Y=0) = e^{-np}$$.\n- Step 3: Recall the Maclaurin series expansion for $$e^x$$: $$e^x = 1 + x + \\frac{x^2}{2!} + \\dots$$. Substitute $$x = -p$$ to get $$e^{-p} = 1 - p + \\frac{p^2}{2!} - \\dots$$\n- Step 4: Since $$p$$ is small and positive, the alternating terms decrease in magnitude. Therefore, $$e^{-p} > 1 - p$$. Raising both sides to the power of $$n$$ gives $$(e^{-p})^n > (1-p)^n$$, which simplifies to $$e^{-np} > (1-p)^n$$. Thus, the Poisson approximation for $$P(X=0)$$ is always an overestimate.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_3"}, {"question": "Under what conditions can a Poisson distribution be approximated by a normal distribution, and why is this valid? (2 steps)", "answer": "- Step 1: Large őĽ threshold: If őĽ > 10, the Poisson distribution becomes approximately normal because the mean őĽ and variance őĽ grow, making the distribution less skewed.\n- Step 2: Apply CLT: A Poisson distribution is the sum of many independent rare events. As őĽ increases, the CLT ensures the distribution tends toward normality, with parameters őľ = őĽ and ŌÉ¬≤ = őĽ.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_4"}, {"question": "Why does a Poisson distribution with a large $$\\lambda$$ look like a normal distribution? (2 steps)", "answer": "- Step 1: A Poisson distribution is skewed to the right when $$\\lambda$$ is small. However, as $$\\lambda$$ increases, the distribution shifts to the right and spreads out.\n- Step 2: Because the standard deviation is $$\\sqrt{\\lambda}$$, the spread grows slower than the mean, making the distribution appear more concentrated and symmetric relative to its center. In the limit as $$\\lambda \\to \\infty$$, the shape converges to the bell curve of a normal distribution.\n\nTakeaway: Large $$\\lambda$$ reduces the relative skewness, making the Poisson shape symmetric like the normal curve.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_12"}, {"question": "A spinner lands on red 10% of the time. In 60 spins, we count the number of reds, $$X$$. In 150 spins, we count the number of reds, $$R$$. Which approximation is suitable for $$X$$ and which for $$R$$? (2 steps)", "answer": "- Step 1: For $$X$$, $$n=60, p=0.1$$. The mean is $$np = 6$$. Since $$np \\leqslant 10$$ and $$p$$ is small, a Poisson approximation $$Po(6)$$ is suitable.\n- Step 2: For $$R$$, $$n=150, p=0.1$$. The mean is $$np = 15$$. Since $$np > 10$$, the mean is large enough that the distribution starts to become un-skewed, so a Normal approximation is suitable. (Even though $$p=0.1$$ is not close to 0.5, the large $$n$$ makes the Normal approximation the required method over Poisson in this context).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_14"}, {"question": "Why must a continuity correction be applied when using a normal distribution to approximate a binomial distribution? Visually, what does this correction do? (2 steps)", "answer": "- Step 1: The binomial distribution is discrete (values are integers like 5, 6, 7), whereas the normal distribution is continuous (values can be any real number, like 5.3 or 6.8). A single integer point in the discrete distribution has probability mass, but a single point in a continuous distribution has zero probability.\n- Step 2: Visually, the probability of a discrete value like $$X=6$$ is represented by a bar of height $$\\mathrm{P}(X=6)$$ and width 1 (from 5.5 to 6.5). To approximate the area of this bar using the smooth continuous curve, we must integrate between 5.5 and 6.5. Adding or subtracting 0.5 to the boundary values is the continuity correction.\n\nTakeaway: We shift the boundaries by 0.5 to capture the full \"area\" of the discrete integer bars under the continuous curve.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_6"}, {"question": "Explain why we use different approximations (Poisson vs Normal) depending on whether p is small or p is close to 0.5. (2 steps)", "answer": "- Step 1: When p is small (close to 0), the binomial is highly right-skewed. The Poisson distribution is also right-skewed and has the same mean-variance relationship (when p is small, variance ‚Čą mean).\n- Step 2: When p is close to 0.5, the binomial is roughly symmetric and bell-shaped, matching the normal distribution's shape. The normal has parameters matching the binomial's mean and variance exactly.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_40"}, {"question": "What is the key relationship between the mean and variance for a Poisson distribution, and how does this relate to when the normal approximation becomes valid? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mean equals the variance: $$\\text{Mean} = \\text{Variance} = \\lambda$$\n- Step 2: This is why the normal approximation uses $$N(\\lambda, \\lambda)$$ ‚ÄĒ we match both the mean and variance\n+ When $$\\lambda$$ is small, the Poisson is heavily right-skewed; as $$\\lambda$$ increases, it becomes more symmetric and the normal approximation improves", "source": "MiniMax ‚Ď°", "_id": "minimax_2_35"}, {"question": "A fair coin is tossed 100 times. Let $$X$$ be the number of heads. Using a normal approximation, estimate the probability of getting more than 55 heads. State the normal parameters and the exact continuity-corrected inequality for $$Y$$. (3 steps)", "answer": "- Step 1: $$X \\sim B(100, 0.5)$$. The normal approximation parameters are mean $$\\mu = np = 100 \\times 0.5 = 50$$ and standard deviation $$\\sigma = \\sqrt{np(1-p)} = \\sqrt{100 \\times 0.5 \\times 0.5} = \\sqrt{25} = 5$$. So $$Y \\sim N(50, 25)$$.\n- Step 2: We need $$P(X > 55)$$. Since the inequality is strictly greater than 55, the integer 55 is not included. The continuous equivalent must stop right before 55, at $$55 - 0.5 = 54.5$$.\n- Step 3: The approximation is $$P(Y > 54.5)$$. (Mental check: 54.5 is 4.5 above the mean of 50, which is almost 1 standard deviation. The upper tail past 1 SD is roughly 16%, so we expect an answer slightly less than 16%).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_10"}, {"question": "How does the normal distribution approximate a binomial distribution, and what role does the Central Limit Theorem play? (3 steps)", "answer": "- Step 1: Define parameters: The normal approximation uses őľ = np and ŌÉ¬≤ = np(1-p). This is valid when **n is large** and **p is close to 0.5**, ensuring symmetry.\n- Step 2: Apply the Central Limit Theorem (CLT): As n increases, the binomial distribution (sum of Bernoulli trials) approaches a normal distribution due to the CLT.\n- Step 3: Use continuity correction: Adjust discrete binomial probabilities (e.g., P(X ‚Č§ k) ‚Čą P(Y ‚Č§ k + 0.5)) to match the continuous normal distribution.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_2"}, {"question": "Why is a large $ \\lambda $ ($ >10 $) required to approximate a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: **Poisson properties**: For small $ \\lambda $, the Poisson distribution is skewed. As $ \\lambda $ increases, the distribution becomes approximately normal due to the Central Limit Theorem.  \n- Step 2: **Variance matching**: The normal approximation uses $ Y \\sim \\mathrm{N}(\\lambda, \\lambda) $, which works best when $ \\lambda $ is large enough to smooth skewness.  \n+ Example: $ \\lambda = 25 $ has a symmetric shape, whereas $ \\lambda = 2 $ is highly skewed.  \n\n**Takeaway**: Larger $ \\lambda $ ensures the Poisson distribution‚Äôs skewness diminishes, enabling a normal approximation.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_3"}, {"question": "Under what condition can a Poisson distribution $$X \\sim Po(\\lambda)$$ be approximated by a normal distribution, what are the parameters of the normal distribution, and why do the parameters take this form? (3 steps)", "answer": "- Step 1: The condition is that $$\\lambda$$ must be large (typically $$\\lambda > 10$$). As $$\\lambda$$ increases, the Poisson distribution becomes less positively skewed and more bell-shaped.\n- Step 2: The normal approximation is $$Y \\sim N(\\lambda, \\lambda)$$. This means the mean is $$\\lambda$$ and the variance is $$\\lambda$$.\n- Step 3: The parameters take this form because a defining property of any Poisson distribution is that its mean equals its variance. The normal approximation must match both the mean and the variance of the distribution it is approximating to be accurate.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_11"}, {"question": "Why do we use approximations to probability distributions at all, instead of always computing exact binomial or Poisson probabilities? (2 steps)", "answer": "- Step 1: Exact binomial calculations require computing terms like $$\\binom{n}{x}p^x(1-p)^{n-x}$$. When $$n$$ is large (e.g., $$n = 1000$$), the binomial coefficient $$\\binom{1000}{6}$$ and powers like $$(0.993)^{994}$$ become extremely cumbersome ‚ÄĒ many calculators can't handle them without overflow or loss of precision, and cumulative binomial tables in the formula booklet only go up to $$n = 50$$.\n- Step 2: Approximations trade a small amount of accuracy for massive computational simplicity. A Poisson or normal probability can be looked up in tables or computed with a simple formula, giving answers that are often correct to 3‚Äď4 decimal places ‚ÄĒ more than sufficient for real-life decision-making.\n\nTakeaway: Approximations exist because exact computation becomes impractical for large $$n$$, and the slight loss in accuracy is an acceptable price for tractability.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0"}, {"question": "When using normal approximation to estimate P(X = k) for a binomial distribution, why do we use the interval (k-0.5, k+0.5) rather than just evaluating at k? (2 steps)", "answer": "- Step 1: The binomial distribution is discrete ‚ÄĒ it assigns probability only to integer values\n- Step 2: The normal approximation spreads probability continuously, so to capture the \"weight\" at exactly k, we need to include the entire interval from halfway between k-1 and k to halfway between k and k+1\n+ Mathematically, this is $$P(X = k) \\approx \\int_{k-0.5}^{k+0.5} f_Y(y) \\, dy$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_39"}, {"question": "Why is there no exact rule for what constitutes a \"large n\" or \"small p\" in the Poisson approximation to binomial? (2 steps)", "answer": "- Step 1: The quality of the approximation depends on the interplay between n and p. A moderate n with very small p might work, while a larger n with p closer to 0.5 might not.\n- Step 2: The guideline np ‚Č§ 10 is practical but not strict. The approximation improves as n increases and p decreases. Different contexts may accept slightly different thresholds depending on the required accuracy.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_35"}, {"question": "Why does the Poisson distribution become approximately normal when $$\\lambda$$ is large? Give both a mathematical and a visual intuition. (3 steps)", "answer": "- Step 1: **Mathematically**, the Poisson is a sum of independent rare events. By a Central Limit Theorem-type argument, sums of independent random variables tend toward normality as the number of terms grows. A Poisson with large $$\\lambda$$ can be thought of as a sum of many independent Poisson(1) variables.\n- Step 2: **Visually**, when $$\\lambda$$ is small (e.g., $$\\lambda = 2$$), the Poisson is heavily right-skewed with a long tail. As $$\\lambda$$ grows (e.g., $$\\lambda = 25$$), the distribution spreads out and the skewness diminishes ‚ÄĒ the bars form a symmetric, bell-shaped pattern.\n- Step 3: The skewness of a Poisson is $$\\frac{1}{\\sqrt{\\lambda}}$$, which decreases toward 0 as $$\\lambda \\to \\infty$$. This confirms the distribution becomes more symmetric with larger $$\\lambda$$.\n\nTakeaway: Large $$\\lambda$$ ‚Üí less skew ‚Üí more symmetric ‚Üí more normal. It's a CLT-type convergence.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_14"}, {"question": "A box contains 500 switches with a 0.005 fault probability. Let $$X$$ be the number of faulty switches. We want to find $$P(X < 2)$$. Compare using the Poisson approximation vs the Normal approximation for this specific scenario. Which is better and why? (3 steps)", "answer": "- Step 1: The parameters are $$n=500, p=0.005$$, so mean $$np = 2.5$$. The exact probability for $$P(X < 2)$$ is mostly concentrated at $$X=0$$ and $$X=1$$.\n- Step 2: Poisson approximation gives $$Po(2.5)$$. This captures the highly skewed, non-negative nature of the distribution at low means, yielding accurate probabilities for $$X=0$$ and $$X=1$$.\n- Step 3: Normal approximation gives $$N(2.5, 2.4875)$$. The normal curve is symmetric and extends into negative values. When calculating $$P(X < 2)$$, using a continuity correction ($$Y < 1.5$$), the symmetric bell curve poorly fits the heavily right-skewed reality of the data near the boundary at 0. Thus, the Poisson approximation is vastly superior here because $$p$$ is very small and $$np \\leqslant 10$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_15"}, {"question": "A Poisson variable $$X \\sim \\operatorname{Po}(25)$$ is approximated by a normal variable $$Y$$. Write down the distribution of $$Y$$ and the corrected inequality to estimate $$\\mathrm{P}(X > 30)$$. (2 steps)", "answer": "- Step 1: Since $$\\lambda = 25$$, the mean is 25 and the variance is 25. Thus, $$Y \\sim \\mathrm{N}(25, 25)$$.\n- Step 2: Since $$X$$ is discrete and we want $$X > 30$$ (which means $$X \\geqslant 31$$), we apply the continuity correction by subtracting 0.5 from the lower bound. The inequality becomes $$\\mathrm{P}(Y > 30.5)$$.\n\nTakeaway: Approximating discrete Poisson with continuous Normal requires the same 0.5 boundary adjustments as with Binomial.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_13"}, {"question": "Why is the normal approximation to the binomial not suitable when p is very close to 0 or 1? (2 steps)", "answer": "- Step 1: Skewness issue: When p is near 0 or 1, the binomial distribution is highly skewed. The normal distribution, being symmetric, cannot capture this skewness.\n- Step 2: Variance mismatch: The variance np(1-p) becomes very small (p ‚Čą 0 or 1), leading to a narrow normal curve that poorly matches the discrete binomial probabilities.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_6"}, {"question": "A breakfast cereal has prizes in 56% of boxes. For 100 boxes, compare the exact probability of exactly 55 prizes with the normal approximation. (3 steps)", "answer": "- Step 1: Exact: X ~ B(100, 0.56). P(X = 55) = C(100,55) √ó 0.56‚ĀĶ‚ĀĶ √ó 0.44‚Āī‚ĀĶ ‚Čą 0.0365.\n- Step 2: Normal: őľ = 56, ŌÉ = ‚ąö(100 √ó 0.56 √ó 0.44) = ‚ąö24.64 ‚Čą 4.96. For P(X = 55), use P(54.5 < Y < 55.5). z‚āĀ = (54.5 - 56)/4.96 ‚Čą -0.30, z‚āā = (55.5 - 56)/4.96 ‚Čą -0.10. P ‚Čą ő¶(-0.10) - ő¶(-0.30) ‚Čą 0.460 - 0.382 = 0.078.\n- Step 3: Percentage error = |0.0365 - 0.078|/0.0365 √ó 100% ‚Čą 114%. This is a terrible approximation! This is because p = 0.56 is not close enough to 0.5 for n = 100.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_37"}, {"question": "A shop owner knows that 40% of customers buy a newspaper, but only 4% spend over \\$10. In a sample of 100 customers, explain which approximation you'd use for each probability and why they differ. (3 steps)", "answer": "- Step 1: For newspapers, $$X \\sim \\mathrm{B}(100, 0.40)$$. Here $$np = 40 > 10$$ and $$p = 0.40$$ is close to 0.5, so use a **normal approximation**: $$Y \\sim \\mathrm{N}(40, 24)$$.\n- Step 2: For spending over \\$10, $$W \\sim \\mathrm{B}(100, 0.04)$$. Here $$np = 4 \\leqslant 10$$ and $$p = 0.04$$ is small, so use a **Poisson approximation**: $$W \\approx \\mathrm{Po}(4)$$.\n- Step 3: Same sample size, but different $$p$$ values lead to different approximations. The key insight: it's not just $$n$$ that matters ‚ÄĒ the value of $$p$$ (and hence $$np$$) determines which approximation captures the shape of the distribution.\n\nTakeaway: For the same $$n$$, a large $$p$$ (close to 0.5) ‚Üí normal; a small $$p$$ ‚Üí Poisson. Always check $$np$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_33"}, {"question": "Why should you approximate a binomial distribution directly to a normal distribution rather than going via a Poisson distribution (i.e., binomial ‚Üí Poisson ‚Üí normal)? (2 steps)", "answer": "- Step 1: Each approximation introduces a small error. Going binomial ‚Üí Poisson ‚Üí normal involves **two** successive approximations, and the errors compound. Going binomial ‚Üí normal involves only **one** approximation.\n- Step 2: The direct normal approximation preserves the correct variance $$np(1-p)$$, whereas the Poisson approximation replaces it with $$np$$ (losing the $$(1-p)$$ factor). If you then approximate that Poisson by a normal, you've baked in an incorrect variance. The direct route is always more accurate.\n\nTakeaway: Never chain approximations. Go directly from binomial to the appropriate approximating distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18"}, {"question": "A fair coin is tossed 70 times. Set up (but do not compute) the normal approximation to estimate the probability of more than 45 heads, stating the distribution, the continuity correction, and the inequality to evaluate. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(70, 0.5)$$. Since $$p = 0.5$$ (perfectly symmetric) and $$n = 70$$ is large, the normal approximation is ideal. Parameters: $$\\mu = 70 \\times 0.5 = 35$$, $$\\sigma^2 = 70 \\times 0.5 \\times 0.5 = 17.5$$, so $$Y \\sim \\mathrm{N}(35, 17.5)$$.\n- Step 2: Apply continuity correction: $$\\mathrm{P}(X > 45) \\approx \\mathrm{P}(Y > 45.5)$$. We use 45.5 because \"$$> 45$$\" excludes the bar at 45.\n- Step 3: Standardise: $$\\mathrm{P}\\left(Z > \\frac{45.5 - 35}{\\sqrt{17.5}}\\right) = \\mathrm{P}\\left(Z > \\frac{10.5}{4.183}\\right) \\approx \\mathrm{P}(Z > 2.51)$$. This is a very small probability (around 0.006), indicating 45+ heads in 70 tosses is quite unlikely.\n\nTakeaway: Fair coin ‚Üí $$p = 0.5$$ ‚Üí normal approximation is at its best. The setup is: define, correct, standardise.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_27"}, {"question": "Why is the Poisson approximation to the binomial invalid when p is close to 0.5 and n is large? (2 steps)", "answer": "- Step 1: őĽ = np behavior: When p ‚Čą 0.5, őĽ = np grows large (e.g., n=1000, p=0.5 ‚Üí őĽ=500). Poisson distributions with large őĽ become approximately normal.\n- Step 2: Better alternative: A direct normal approximation is more appropriate here since the Poisson approximation is designed for rare events (small p), not symmetric cases.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_9"}, {"question": "Why is the Poisson approximation generally more accurate when $$n$$ is very large and $$p$$ is very small? (2 steps)", "answer": "- Step 1: The Poisson distribution is the limiting case of the binomial distribution as $$n \\to \\infty$$ and $$p \\to 0$$ while keeping $$np = \\lambda$$ constant\n- Step 2: As $$n$$ gets larger and $$p$$ gets smaller, the binomial distribution gets closer and closer to this limiting Poisson distribution\n+ This is why the approximation improves with larger $$n$$ and smaller $$p$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_25"}, {"question": "In the context of approximations, what is the key difference between using Poisson tables vs. using normal tables after applying a continuity correction? (2 steps)", "answer": "- Step 1: When using a **Poisson approximation** (e.g., $$\\mathrm{Po}(6)$$), you read probabilities directly from Poisson cumulative tables ‚ÄĒ no continuity correction is needed because the Poisson is already discrete. You simply look up $$\\mathrm{P}(X \\leqslant k)$$ for the appropriate $$\\lambda$$ and $$k$$.\n- Step 2: When using a **normal approximation**, you must first apply a continuity correction (adjusting boundaries by ¬Ī0.5) because you're approximating a discrete distribution with a continuous one. Then you standardise and look up the standard normal table. Forgetting the continuity correction is the most common source of error.\n\nTakeaway: Poisson approximation ‚Üí direct table lookup. Normal approximation ‚Üí continuity correction ‚Üí standardise ‚Üí table lookup.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_41"}, {"question": "Why does the condition \"$$p$$ is close to 0.5\" matter for the normal approximation to the binomial, but NOT for the Poisson approximation? (2 steps)", "answer": "- Step 1: The normal distribution is **symmetric**. It only approximates the binomial well when the binomial itself is approximately symmetric, which happens when $$p \\approx 0.5$$. When $$p$$ is far from 0.5, the binomial is skewed and the symmetric normal curve is a poor fit.\n- Step 2: The Poisson distribution is **right-skewed** (especially for small $$\\lambda$$). When $$p$$ is small, the binomial is also right-skewed, so the Poisson shape matches. The Poisson doesn't require symmetry ‚ÄĒ it requires the mean to be close to the variance, which happens automatically when $$p$$ is small.\n\nTakeaway: Normal needs symmetry ($$p \\approx 0.5$$); Poisson needs mean ‚Čą variance ($$p$$ small). They approximate different shapes of the binomial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_48"}, {"question": "A car hire firm experiences breakdowns at a rate of 21 per week. What distribution models the number of breakdowns per week, and how would you approximate the probability of more than 27 breakdowns? (3 steps)", "answer": "- Step 1: Breakdowns occur at a constant rate, randomly and independently ‚ÄĒ this is the classic Poisson setup. Let $$X \\sim \\mathrm{Po}(21)$$.\n- Step 2: Since $$\\lambda = 21 > 10$$, use a normal approximation: $$Y \\sim \\mathrm{N}(21, 21)$$. The standard deviation is $$\\sigma = \\sqrt{21} \\approx 4.58$$.\n- Step 3: Apply continuity correction: $$\\mathrm{P}(X > 27) \\approx \\mathrm{P}(Y > 27.5)$$. Standardise: $$z = \\frac{27.5 - 21}{\\sqrt{21}} \\approx 1.42$$. Then $$\\mathrm{P}(Z > 1.42) = 1 - 0.9222 = 0.0778$$.\n\nTakeaway: Rate-based problems ‚Üí Poisson; large $$\\lambda$$ ‚Üí normal approximation with continuity correction.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_21"}, {"question": "State the continuity corrections for each of the following binomial probabilities when using a normal approximation: (a) $$\\mathrm{P}(X \\leqslant k)$$, (b) $$\\mathrm{P}(X < k)$$, (c) $$\\mathrm{P}(X \\geqslant k)$$, (d) $$\\mathrm{P}(X > k)$$, (e) $$\\mathrm{P}(X = k)$$. (3 steps)", "answer": "- Step 1: The key principle is that each integer value $$k$$ on the discrete scale occupies the interval $$[k - 0.5, k + 0.5]$$ on the continuous scale. We adjust boundaries outward to include the full bar, or inward to exclude it.\n- Step 2: Applying this:\n+ $$\\mathrm{P}(X \\leqslant k) \\approx \\mathrm{P}(Y < k + 0.5)$$ ‚ÄĒ include the full bar at $$k$$\n+ $$\\mathrm{P}(X < k) \\approx \\mathrm{P}(Y < k - 0.5)$$ ‚ÄĒ exclude the bar at $$k$$\n+ $$\\mathrm{P}(X \\geqslant k) \\approx \\mathrm{P}(Y > k - 0.5)$$ ‚ÄĒ include the full bar at $$k$$\n+ $$\\mathrm{P}(X > k) \\approx \\mathrm{P}(Y > k + 0.5)$$ ‚ÄĒ exclude the bar at $$k$$\n+ $$\\mathrm{P}(X = k) \\approx \\mathrm{P}(k - 0.5 < Y < k + 0.5)$$ ‚ÄĒ the single bar at $$k$$\n- Step 3: Mnemonic: \"‚Č§ and ‚Č• get the +0.5 / ‚ąí0.5 that includes the boundary; < and > get the adjustment that excludes the boundary.\" For equality, straddle the integer by ¬Ī0.5.\n\nTakeaway: The direction of the 0.5 shift depends on whether the inequality is strict or non-strict ‚ÄĒ it's all about whether to include or exclude the bar at the boundary.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9"}, {"question": "A random variable $$X \\sim \\mathrm{B}(20, 0.5)$$. Would a normal approximation be appropriate here? Explain why or why not, considering both conditions. (2 steps)", "answer": "- Step 1: Checking the conditions: $$p = 0.5$$ is perfectly close to 0.5 ‚úď, but $$n = 20$$ is not particularly large ‚úó. The rule of thumb requires $$n$$ to be large.\n- Step 2: With $$n = 20$$, the binomial has only 21 possible values (0 through 20), and the distribution is not smooth enough for the normal curve to fit well. While $$p = 0.5$$ is ideal for symmetry, the small $$n$$ means the discrete \"steps\" are too coarse. The approximation would be rough, especially in the tails. Use exact binomial calculation instead.\n\nTakeaway: Both conditions must be met: $$p \\approx 0.5$$ alone is not sufficient if $$n$$ is too small.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_34"}, {"question": "A supermarket finds 20% of chocolate bar buyers choose large size. In a sample of 80 buyers, estimate $$\\mathrm{P}(\\text{more than 20 chose large})$$. Walk through the choice of approximation and setup. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(80, 0.20)$$. Compute $$np = 80 \\times 0.2 = 16 > 10$$. Since $$np > 10$$, use a normal approximation.\n- Step 2: Parameters: $$\\mu = 16$$, $$\\sigma^2 = 80 \\times 0.2 \\times 0.8 = 12.8$$, so $$Y \\sim \\mathrm{N}(16, 12.8)$$, $$\\sigma \\approx 3.578$$.\n- Step 3: $$\\mathrm{P}(X > 20) \\approx \\mathrm{P}(Y > 20.5)$$. Standardise: $$z = \\frac{20.5 - 16}{3.578} \\approx \\frac{4.5}{3.578} \\approx 1.26$$. Then $$\\mathrm{P}(Z > 1.26) \\approx 1 - 0.8962 = 0.1038$$.\n\nTakeaway: $$p = 0.2$$ is not that close to 0.5, but $$np = 16 > 10$$, so normal is the recommended approximation. The result is approximate ‚ÄĒ for very accurate work, exact binomial would be better.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_45"}, {"question": "The probability of an electrical component being faulty is 0.0125. Components come in boxes of 400. Estimate $$\\mathrm{P}(\\text{more than 3 faulty in a box})$$. Then: a retailer buys 5 boxes ‚ÄĒ estimate $$\\mathrm{P}(\\text{more than 3 faulty in exactly 3 of the 5 boxes})$$. Explain the two-stage model. (4 steps)", "answer": "- Step 1: For one box: $$X \\sim \\mathrm{B}(400, 0.0125)$$, $$np = 5 \\leqslant 10$$, so $$X \\approx \\mathrm{Po}(5)$$. $$\\mathrm{P}(X > 3) = 1 - \\mathrm{P}(X \\leqslant 3) = 1 - 0.2650 = 0.7350$$.\n- Step 2: For the second stage, let $$W$$ = number of boxes (out of 5) with more than 3 faulty components. Each box independently has probability 0.7350 of having $$>3$$ faults.\n- Step 3: $$W \\sim \\mathrm{B}(5, 0.7350)$$. We want $$\\mathrm{P}(W = 3) = \\binom{5}{3}(0.7350)^3(0.2650)^2 = 10 \\times 0.3966 \\times 0.0702 \\approx 0.279$$.\n- Step 4: The two-stage structure: Stage 1 uses an approximation (Poisson) to find the per-box probability. Stage 2 uses exact binomial (small $$n = 5$$) with the Stage 1 probability as the new $$p$$.\n\nTakeaway: Multi-stage problems require finding per-unit probabilities first (possibly with approximations), then using those as parameters in a new distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_47"}, {"question": "Why is the normal approximation particularly bad for computing left-tail probabilities (like $$\\mathrm{P}(X < 2)$$) when $$p$$ is very small, even if $$n$$ is large? (3 steps)", "answer": "- Step 1: When $$p$$ is small, the binomial distribution is right-skewed ‚ÄĒ it has a long right tail and a steep left side. The normal distribution is symmetric and extends equally in both directions.\n- Step 2: In the left tail (near 0), the true binomial probability drops off very quickly ‚ÄĒ there's a hard boundary at 0. The normal distribution, being symmetric, assigns too much probability to negative values and redistributes this, distorting the left tail shape.\n- Step 3: The result is that the normal curve is too high on the left side compared to the true binomial, leading to overestimation of left-tail probabilities in skewed cases. This is why the normal approximation should only be used when $$p$$ is close to 0.5 (symmetric distribution).\n\nTakeaway: Symmetric approximations fail on skewed distributions, especially in the tail on the steep side.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_25"}, {"question": "A student approximates $$X \\sim \\mathrm{B}(1000, 0.01)$$ using $$Y \\sim \\mathrm{N}(10, 9.9)$$. Critique this choice of approximation. (3 steps)", "answer": "- Step 1: Check the parameters: $$n = 1000$$, $$p = 0.01$$, $$np = 10$$. Since $$p = 0.01$$ is very small, the binomial is heavily right-skewed.\n- Step 2: The normal approximation is inappropriate here because the distribution is far from symmetric ‚ÄĒ it's skewed, not bell-shaped. The normal would assign significant probability to negative values (impossible for a count) and misrepresent the right tail.\n- Step 3: The correct approximation is Poisson: $$X \\approx \\mathrm{Po}(10)$$. Even though $$np = 10$$ is at the boundary, the Poisson captures the skewness correctly. The normal should only be used when $$p$$ is close to 0.5, regardless of whether $$np > 10$$.\n\nTakeaway: $$np > 10$$ alone doesn't justify a normal approximation ‚ÄĒ $$p$$ must also be close to 0.5. The $$np$$ rule is a guide for choosing between Poisson and normal, but the underlying shape (symmetric vs. skewed) is what really matters.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_49"}, {"question": "A box contains 500 electrical switches, each with probability 0.005 of being faulty. We want $$\\mathrm{P}(X < 2)$$ where $$X$$ is the number of faulty switches. Conceptually compare the accuracy of the Poisson approximation vs the normal approximation for this problem. (4 steps)", "answer": "- Step 1: Here $$n = 500$$, $$p = 0.005$$, so $$np = 2.5$$. This is a case with very large $$n$$ and very small $$p$$ ‚ÄĒ ideal for Poisson.\n- Step 2: **Poisson approximation**: $$X \\approx \\mathrm{Po}(2.5)$$. Then $$\\mathrm{P}(X < 2) = \\mathrm{P}(X \\leqslant 1) = e^{-2.5}(1 + 2.5) = 0.2873$$. This should be very accurate since conditions are perfectly met.\n- Step 3: **Normal approximation**: $$X \\approx \\mathrm{N}(2.5, 2.4875)$$ with $$\\sigma \\approx 1.577$$. Then $$\\mathrm{P}(X < 2) \\approx \\mathrm{P}(Y < 1.5)$$ (continuity correction). Standardising: $$z = \\frac{1.5 - 2.5}{1.577} \\approx -0.634$$, giving $$\\mathrm{P}(Z < -0.634) \\approx 0.263$$. This is quite far from the exact answer.\n- Step 4: The normal approximation performs poorly here because the distribution is very skewed (small $$p$$), and we're looking at the left tail where the skew matters most. The Poisson matches the shape much better. The percentage error for Poisson is tiny (~0.1%), while for normal it's substantial (~8%).\n\nTakeaway: When $$p$$ is very small, the normal approximation is poor (especially in the tails) because it can't capture the skewness. Poisson is the right tool.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_24"}, {"question": "Street light failures occur at a rate of 1 every 2 days. How would you model the number of failures in a 10-week period to estimate the probability of fewer than 45 failures? (3 steps)", "answer": "- Step 1: First, establish the Poisson parameter for the 10-week period. The rate is 0.5 failures per day. In 10 weeks (70 days), the mean number of failures is $$\\lambda = 0.5 \\times 70 = 35$$.\n- Step 2: Let $$X$$ be the number of failures in 70 days. The exact model is $$X \\sim \\operatorname{Po}(35)$$.\n- Step 3: Since $$\\lambda = 35 > 10$$, we can use a Normal approximation. The approximate distribution is $$Y \\sim \\mathrm{N}(35, 35)$$. To find the probability of fewer than 45 failures, we apply a continuity correction and calculate $$\\mathrm{P}(Y < 44.5)$$.\n\nTakeaway: Convert the rate to the specific time interval to find $$\\lambda$$, then check if $$\\lambda$$ is large enough for a Normal approximation.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_19"}, {"question": "What are the conditions required for approximating a binomial distribution with a Poisson distribution, and why do these conditions ensure the approximation works well? (3 steps)", "answer": "- Step 1: **Conditions**: The binomial distribution $ X \\sim \\mathrm{B}(n, p) $ can be approximated by a Poisson distribution when $ n $ is large, $ p $ is small, and $ np \\leq 10 $.  \n- Step 2: **Variance justification**: For binomial distributions, $ \\mathrm{Var}(X) = np(1-p) $. When $ p $ is small, $ 1-p \\approx 1 $, so $ \\mathrm{Var}(X) \\approx np $, matching the Poisson property where mean and variance are equal.  \n+ Example: If $ n = 200 $ and $ p = 0.03 $, $ np = 6 $, satisfying the condition.  \n- Step 3: **Practicality**: Larger $ n $ and smaller $ p $ make $ (1-p) $ closer to 1, improving the match between binomial and Poisson distributions.  \n\n**Takeaway**: The approximation leverages the convergence of binomial variance to its mean under these conditions.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0"}, {"question": "Each cell of an insect contains 1200 genes, each with probability 0.005 of being damaged. Find the mean and variance of damaged genes, and explain why this supports using a Poisson model. (3 steps)", "answer": "- Step 1: Let $$X$$ = number of damaged genes. $$X \\sim \\mathrm{B}(1200, 0.005)$$. Mean: $$\\mathrm{E}(X) = np = 1200 \\times 0.005 = 6$$.\n- Step 2: Variance: $$\\mathrm{Var}(X) = np(1-p) = 1200 \\times 0.005 \\times 0.995 = 5.97$$.\n- Step 3: The mean (6) and variance (5.97) are very close ‚ÄĒ the ratio is $$5.97/6 = 0.995 \\approx 1$$. This near-equality of mean and variance is the hallmark of a Poisson distribution, confirming the Poisson approximation $$\\mathrm{Po}(6)$$ is appropriate. The closeness occurs because $$p = 0.005$$ is so small that $$(1-p) \\approx 1$$.\n\nTakeaway: When mean ‚Čą variance, Poisson is the right model. Small $$p$$ guarantees this for the binomial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_40"}, {"question": "In the box of 500 electrical switches example (Challenge), each has probability 0.005 of being faulty. What are the three ways to find P(X < 2)? (3 steps)", "answer": "- Step 1: (a) Exact binomial: $$X \\sim \\mathrm{~B}(500, 0.005)$$, calculate directly\n- Step 2: (b) Poisson approximation: $$\\lambda = 500 \\times 0.005 = 2.5$$, so $$X \\approx \\mathrm{Po}(2.5)$$, find $$P(X < 2) = P(X \\leq 1)$$\n- Step 3: (c) Normal approximation: $$X \\approx \\mathrm{~N}(2.5, 2.5)$$, apply continuity correction to find $$P(X < 2) \\approx P(Y < 1.5)$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_30"}, {"question": "For X ~ B(20, 0.5), can we use normal approximation? For X ~ B(20, 0.05)? Explain. (2 steps)", "answer": "- Step 1: For B(20, 0.5): n = 20 is borderline large, but p = 0.5 is exactly at the threshold for symmetry. Some sources allow this, but the approximation may not be very accurate with n = 20.\n- Step 2: For B(20, 0.05): n is not large enough for normal approximation (p is too far from 0.5). However, since p = 0.05 is small and np = 1 ‚Č§ 10, the Poisson approximation would be more appropriate here.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_36"}, {"question": "Show that if $$X \\sim \\mathrm{B}(n, p)$$ is approximated by $$Y \\sim \\mathrm{Po}(np)$$, the Poisson approximation always overestimates $$\\mathrm{P}(X = 0)$$. (4 steps)", "answer": "- Step 1: Write down the exact binomial probability: $$\\mathrm{P}(X = 0) = (1-p)^n$$.\n- Step 2: Write down the Poisson approximation: $$\\mathrm{P}(Y = 0) = e^{-np}$$.\n- Step 3: We need to show $$e^{-np} > (1-p)^n$$ for $$0 < p < 1$$. Taking natural logs of both sides: we need $$-np > n\\ln(1-p)$$, which simplifies (dividing by the positive number $$n$$) to: $$-p > \\ln(1-p)$$, i.e., $$e^{-p} > 1 - p$$.\n- Step 4: Define $$f(p) = e^{-p} - (1 - p)$$. Then $$f(0) = 1 - 1 = 0$$, and $$f'(p) = -e^{-p} + 1 = 1 - e^{-p}$$. For $$p > 0$$, we have $$e^{-p} < 1$$, so $$f'(p) > 0$$. Since $$f(0) = 0$$ and $$f$$ is increasing for $$p > 0$$, we get $$f(p) > 0$$ for all $$0 < p < 1$$. Therefore $$e^{-p} > 1 - p$$, and hence $$e^{-np} > (1-p)^n$$.\n\nTakeaway: The Poisson always overestimates the probability of zero successes because $$e^{-p}$$ lies above the tangent line $$1-p$$ ‚ÄĒ a consequence of the exponential function's convexity.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_23"}, {"question": "When approximating $$X \\sim \\mathrm{B}(n, p)$$ with a normal distribution, what are the mean and variance of the approximating normal, and why are they chosen this way? (2 steps)", "answer": "- Step 1: The approximating normal is $$Y \\sim \\mathrm{N}(\\mu, \\sigma^2)$$ where $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$. These are exactly the mean and variance of the binomial distribution.\n- Step 2: Matching the first two moments (mean and variance) ensures the approximating distribution has the same centre and spread as the original. This is the standard method of moment-matching ‚ÄĒ if two distributions share the same mean and variance, and one is roughly bell-shaped, the normal with those parameters will be a good approximation.\n\nTakeaway: We choose the normal's parameters to preserve the binomial's mean and variance ‚ÄĒ the two most important features of any distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_7"}, {"question": "What is a continuity correction, and why is it necessary when using a normal (continuous) approximation for a binomial or Poisson (discrete) distribution? (3 steps)", "answer": "- Step 1: The binomial and Poisson distributions are discrete ‚ÄĒ they assign probability to specific integer values (0, 1, 2, ‚Ä¶). The normal distribution is continuous ‚ÄĒ probability is spread over intervals, and the probability at any single point is zero.\n- Step 2: When we approximate a discrete probability like $$\\mathrm{P}(X = 5)$$ using a continuous distribution, we can't just evaluate the normal at the point 5 (that gives probability 0). Instead, we recognise that the bar at $$X = 5$$ on a histogram spans from 4.5 to 5.5, so we compute $$\\mathrm{P}(4.5 < Y < 5.5)$$.\n- Step 3: This adjustment ‚ÄĒ extending or shrinking the boundary by 0.5 ‚ÄĒ is the continuity correction. It accounts for the area under the normal curve that corresponds to each discrete bar.\n\nTakeaway: The continuity correction bridges the gap between discrete \"bars\" and continuous \"curves\" by shifting boundaries by ¬Ī0.5.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8"}, {"question": "A common mistake is to forget the continuity correction when approximating discrete distributions with the normal. If you compute $$\\mathrm{P}(X > 27)$$ for a discrete $$X$$ using $$\\mathrm{P}(Y > 27)$$ instead of $$\\mathrm{P}(Y > 27.5)$$, will your answer be too large or too small, and why? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(Y > 27.5) < \\mathrm{P}(Y > 27)$$ because we're excluding the interval $$(27, 27.5]$$ from the calculation. This interval has positive area under the normal curve.\n- Step 2: Therefore, forgetting the continuity correction (using $$> 27$$ instead of $$> 27.5$$) gives an answer that is **too large**. You've included extra area that shouldn't be there ‚ÄĒ the area corresponding to the left half of the bar at $$X = 28$$ doesn't belong to \"$$X > 27$$\" in the discrete world.\n\nTakeaway: Forgetting the continuity correction for \"$$> k$$\" overestimates the probability because you include area that belongs to the bar at $$k+1$$'s left edge.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_22"}, {"question": "For $$X \\sim \\mathrm{B}(80, 0.55)$$, the exact probability $$\\mathrm{P}(X = 50) = 0.0365$$ and the normal approximation gives 0.0362. Calculate the percentage error and explain what this tells us. (2 steps)", "answer": "- Step 1: Percentage error $$= \\frac{|0.0365 - 0.0362|}{0.0365} \\times 100\\% = \\frac{0.0003}{0.0365} \\times 100\\% \\approx 0.82\\%$$.\n- Step 2: A percentage error under 1% is excellent ‚ÄĒ it shows the normal approximation is highly accurate when conditions are met ($$n = 80$$ is large, $$p = 0.55$$ is close to 0.5). Even for a single-value probability (the hardest case), the approximation is nearly indistinguishable from the exact answer.\n\nTakeaway: When $$n$$ is large and $$p \\approx 0.5$$, the normal approximation is extremely accurate ‚ÄĒ even for point probabilities.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_26"}, {"question": "$$X \\sim \\mathrm{B}(300, 0.85)$$. Can you use a normal approximation directly? If not, how would you handle this? (3 steps)", "answer": "- Step 1: Here $$p = 0.85$$, which is far from 0.5. The binomial distribution is left-skewed (since $$p$$ is large), so a direct normal approximation would be poor.\n- Step 2: However, $$np = 255 > 10$$, and $$n(1-p) = 45$$ is also large. The distribution of the number of *failures* $$F = 300 - X \\sim \\mathrm{B}(300, 0.15)$$ has a more moderate $$p$$ value, though still not close to 0.5.\n- Step 3: In practice, for $$n$$ very large, the normal approximation can still work reasonably well even when $$p$$ is not that close to 0.5, because the CLT effect is strong. But the approximation quality degrades as $$p$$ moves away from 0.5. The textbook would likely still accept a normal approximation here given the very large $$n$$, but be cautious about tail probabilities.\n\nTakeaway: When $$p$$ is far from 0.5, consider flipping to count failures, and be aware that the normal approximation may be less accurate ‚ÄĒ especially in tails.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_35"}, {"question": "Breakdowns occur at a rate of 25 per week. Let $$X$$ be the number of breakdowns. Using a normal approximation, estimate $$P(X \\leqslant 20)$$. State the normal parameters and the exact continuity-corrected inequality for $$Y$$. (3 steps)", "answer": "- Step 1: $$X \\sim Po(25)$$. Since $$\\lambda = 25 > 10$$, we use a normal approximation. The parameters are mean $$\\mu = 25$$ and variance $$\\sigma^2 = 25$$, so standard deviation $$\\sigma = 5$$. Thus, $$Y \\sim N(25, 25)$$.\n- Step 2: We need $$P(X \\leqslant 20)$$. Since the inequality includes 20, the continuous area must extend to cover the bar at 20 fully, reaching $$20 + 0.5 = 20.5$$.\n- Step 3: The approximation is $$P(Y < 20.5)$$. (Mental check: 20.5 is 4.5 below the mean of 25, which is 0.9 standard deviations below the mean. This should give a probability around 18%).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_12"}, {"question": "When approximating a binomial distribution with a Poisson distribution, do you need to apply a continuity correction? Why or why not? (2 steps)", "answer": "- Step 1: No, a continuity correction is not needed.\n- Step 2: Both the binomial distribution and the Poisson distribution are discrete distributions. A continuity correction is only required when approximating a discrete distribution with a continuous one (like the normal distribution).\n\nTakeaway: Discrete to discrete = no continuity correction.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_3"}, {"question": "What are the two conditions for approximating a binomial distribution with a normal distribution, and what is the key reason $$p$$ must be close to 0.5? (2 steps)", "answer": "- Step 1: The conditions are **$$n$$ is large** and **$$p$$ is close to 0.5**. The approximating normal is $$\\mathrm{N}(np, np(1-p))$$.\n- Step 2: The normal distribution is symmetric. The binomial distribution is symmetric only when $$p = 0.5$$; as $$p$$ moves away from 0.5, the binomial becomes increasingly skewed. If $$p$$ is close to 0.5, the binomial shape is close enough to a bell curve for the normal to be a good fit. If $$p$$ is near 0 or 1, the binomial is too skewed for a symmetric approximation.\n\nTakeaway: The normal approximation requires the binomial to be roughly symmetric, which happens when $$p \\approx 0.5$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_6"}, {"question": "Street light failures occur at a rate of one every two days. What is the Poisson parameter for the number of failures per week, and how would you approximate the probability of fewer than 45 failures in a 10-week period? (3 steps)", "answer": "- Step 1: Rate = 1 failure per 2 days = 3.5 failures per week. So per week, $$X \\sim \\mathrm{Po}(3.5)$$.\n- Step 2: For 10 weeks, the total failures $$T$$ is the sum of 10 independent $$\\mathrm{Po}(3.5)$$ variables. By the additive property of Poisson, $$T \\sim \\mathrm{Po}(35)$$.\n- Step 3: Since $$\\lambda = 35 > 10$$, use a normal approximation: $$T \\approx \\mathrm{N}(35, 35)$$. Then $$\\mathrm{P}(T < 45) \\approx \\mathrm{P}(Y < 44.5)$$ (continuity correction). Standardise: $$z = \\frac{44.5 - 35}{\\sqrt{35}} \\approx \\frac{9.5}{5.916} \\approx 1.61$$, giving $$\\mathrm{P}(Z < 1.61) \\approx 0.9463$$.\n\nTakeaway: For Poisson processes over different time periods, scale the rate, use the additive property, then approximate if $$\\lambda$$ is large.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_28"}], "models": {"glm_1": {"label": "GLM 5.1 ‚Ď†", "cards": [{"question": "Why do we use approximations to probability distributions at all, instead of always computing exact binomial or Poisson probabilities? (2 steps)", "answer": "- Step 1: Exact binomial calculations require computing terms like $$\\binom{n}{x}p^x(1-p)^{n-x}$$. When $$n$$ is large (e.g., $$n = 1000$$), the binomial coefficient $$\\binom{1000}{6}$$ and powers like $$(0.993)^{994}$$ become extremely cumbersome ‚ÄĒ many calculators can't handle them without overflow or loss of precision, and cumulative binomial tables in the formula booklet only go up to $$n = 50$$.\n- Step 2: Approximations trade a small amount of accuracy for massive computational simplicity. A Poisson or normal probability can be looked up in tables or computed with a simple formula, giving answers that are often correct to 3‚Äď4 decimal places ‚ÄĒ more than sufficient for real-life decision-making.\n\nTakeaway: Approximations exist because exact computation becomes impractical for large $$n$$, and the slight loss in accuracy is an acceptable price for tractability.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0", "judge_pick": true}, {"question": "What are the two conditions under which a binomial distribution $$X \\sim \\mathrm{B}(n, p)$$ can be approximated by a Poisson distribution, and what is the rule-of-thumb numerical guide?", "answer": "The conditions are: **$$n$$ is large** and **$$p$$ is small**. The rule-of-thumb guide is that $$np \\leqslant 10$$ ‚ÄĒ if the mean of the binomial is 10 or less, the Poisson approximation is generally appropriate. The larger $$n$$ is and the smaller $$p$$ is, the better the approximation becomes. There is no strict cutoff; the question will typically tell you when to use an approximation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1", "judge_pick": false}, {"question": "When approximating $$X \\sim \\mathrm{B}(n, p)$$ with a Poisson distribution, what is the parameter $$\\lambda$$ of the approximating Poisson, and why does this choice make sense? (2 steps)", "answer": "- Step 1: The approximating Poisson has parameter $$\\lambda = np$$. This is simply the mean of the binomial distribution, since $$\\mathrm{E}(X) = np$$.\n- Step 2: This choice ensures the approximating distribution has the same centre of mass as the original. Since for Poisson the mean equals the variance (both are $$\\lambda$$), and for binomial when $$p$$ is small we have $$\\mathrm{Var}(X) = np(1-p) \\approx np$$ because $$(1-p) \\approx 1$$, the Poisson naturally matches both the mean and (approximately) the variance of the binomial in this regime.\n\nTakeaway: $$\\lambda = np$$ preserves the expected value, and when $$p$$ is small the variance automatically matches too ‚ÄĒ that's why Poisson is the right approximation here.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_2", "judge_pick": true}, {"question": "Explain intuitively why the Poisson distribution is a good approximation to the binomial when $$p$$ is small. What happens to the binomial's variance in this regime? (3 steps)", "answer": "- Step 1: The binomial variance is $$\\mathrm{Var}(X) = np(1-p)$$. When $$p$$ is small, $$(1-p)$$ is close to 1, so $$\\mathrm{Var}(X) \\approx np = \\mathrm{E}(X)$$.\n- Step 2: The defining property of a Poisson distribution is that its mean equals its variance (both are $$\\lambda$$). So when the binomial's variance is approximately equal to its mean, the binomial \"behaves like\" a Poisson.\n- Step 3: Physically, when $$p$$ is small and $$n$$ is large, we're counting rare events in many trials ‚ÄĒ exactly the scenario Poisson models (events occurring at a constant rate, independently). The binomial's discrete, skewed shape converges to the Poisson shape.\n\nTakeaway: Small $$p$$ makes the binomial's mean ‚Čą variance, which is the signature property of Poisson ‚ÄĒ that's the deep reason the approximation works.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3", "judge_pick": true}, {"question": "A random variable $$Y \\sim \\mathrm{B}(200, 0.98)$$. If you want to use a Poisson approximation, why can't you directly apply it to $$Y$$, and what transformation should you use instead? (3 steps)", "answer": "- Step 1: The Poisson approximation requires $$p$$ to be small, but here $$p = 0.98$$, which is close to 1, not close to 0. Directly applying Poisson would be invalid.\n- Step 2: Define $$X = 200 - Y$$, the number of *non-faulty* items (or \"failures\"). Then $$X \\sim \\mathrm{B}(200, 1 - 0.98) = \\mathrm{B}(200, 0.02)$$. Now $$p = 0.02$$ is small, and $$np = 4 \\leqslant 10$$.\n- Step 3: Approximate $$X \\sim \\mathrm{Po}(4)$$, then translate back. For example, $$\\mathrm{P}(Y = 197) = \\mathrm{P}(X = 3)$$, which you compute using the Poisson with $$\\lambda = 4$$.\n\nTakeaway: When $$p$$ is close to 1, flip the problem by counting the complementary event (failures instead of successes), which then has a small probability.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_4", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{B}(200, 0.03)$$. Without doing any calculation, what is the approximating Poisson distribution, and roughly how accurate do you expect it to be ‚ÄĒ and why? (2 steps)", "answer": "- Step 1: The approximating distribution is $$Y \\sim \\mathrm{Po}(np) = \\mathrm{Po}(6)$$. This is valid because $$n = 200$$ is large, $$p = 0.03$$ is small, and $$np = 6 \\leqslant 10$$.\n- Step 2: The accuracy should be very good because both conditions are well-satisfied: $$n$$ is quite large and $$p$$ is quite small. In fact, computing both exactly: $$\\mathrm{P}(X=4) \\approx 0.1338$$ (binomial) vs $$\\mathrm{P}(Y=4) \\approx 0.1339$$ (Poisson) ‚ÄĒ they agree to 3 decimal places.\n\nTakeaway: When conditions are clearly met (large $$n$$, small $$p$$, $$np \\leqslant 10$$), the Poisson approximation is excellent.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5", "judge_pick": false}, {"question": "What are the two conditions for approximating a binomial distribution with a normal distribution, and what is the key reason $$p$$ must be close to 0.5? (2 steps)", "answer": "- Step 1: The conditions are **$$n$$ is large** and **$$p$$ is close to 0.5**. The approximating normal is $$\\mathrm{N}(np, np(1-p))$$.\n- Step 2: The normal distribution is symmetric. The binomial distribution is symmetric only when $$p = 0.5$$; as $$p$$ moves away from 0.5, the binomial becomes increasingly skewed. If $$p$$ is close to 0.5, the binomial shape is close enough to a bell curve for the normal to be a good fit. If $$p$$ is near 0 or 1, the binomial is too skewed for a symmetric approximation.\n\nTakeaway: The normal approximation requires the binomial to be roughly symmetric, which happens when $$p \\approx 0.5$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_6", "judge_pick": true}, {"question": "When approximating $$X \\sim \\mathrm{B}(n, p)$$ with a normal distribution, what are the mean and variance of the approximating normal, and why are they chosen this way? (2 steps)", "answer": "- Step 1: The approximating normal is $$Y \\sim \\mathrm{N}(\\mu, \\sigma^2)$$ where $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$. These are exactly the mean and variance of the binomial distribution.\n- Step 2: Matching the first two moments (mean and variance) ensures the approximating distribution has the same centre and spread as the original. This is the standard method of moment-matching ‚ÄĒ if two distributions share the same mean and variance, and one is roughly bell-shaped, the normal with those parameters will be a good approximation.\n\nTakeaway: We choose the normal's parameters to preserve the binomial's mean and variance ‚ÄĒ the two most important features of any distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_7", "judge_pick": true}, {"question": "What is a continuity correction, and why is it necessary when using a normal (continuous) approximation for a binomial or Poisson (discrete) distribution? (3 steps)", "answer": "- Step 1: The binomial and Poisson distributions are discrete ‚ÄĒ they assign probability to specific integer values (0, 1, 2, ‚Ä¶). The normal distribution is continuous ‚ÄĒ probability is spread over intervals, and the probability at any single point is zero.\n- Step 2: When we approximate a discrete probability like $$\\mathrm{P}(X = 5)$$ using a continuous distribution, we can't just evaluate the normal at the point 5 (that gives probability 0). Instead, we recognise that the bar at $$X = 5$$ on a histogram spans from 4.5 to 5.5, so we compute $$\\mathrm{P}(4.5 < Y < 5.5)$$.\n- Step 3: This adjustment ‚ÄĒ extending or shrinking the boundary by 0.5 ‚ÄĒ is the continuity correction. It accounts for the area under the normal curve that corresponds to each discrete bar.\n\nTakeaway: The continuity correction bridges the gap between discrete \"bars\" and continuous \"curves\" by shifting boundaries by ¬Ī0.5.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8", "judge_pick": true}, {"question": "State the continuity corrections for each of the following binomial probabilities when using a normal approximation: (a) $$\\mathrm{P}(X \\leqslant k)$$, (b) $$\\mathrm{P}(X < k)$$, (c) $$\\mathrm{P}(X \\geqslant k)$$, (d) $$\\mathrm{P}(X > k)$$, (e) $$\\mathrm{P}(X = k)$$. (3 steps)", "answer": "- Step 1: The key principle is that each integer value $$k$$ on the discrete scale occupies the interval $$[k - 0.5, k + 0.5]$$ on the continuous scale. We adjust boundaries outward to include the full bar, or inward to exclude it.\n- Step 2: Applying this:\n+ $$\\mathrm{P}(X \\leqslant k) \\approx \\mathrm{P}(Y < k + 0.5)$$ ‚ÄĒ include the full bar at $$k$$\n+ $$\\mathrm{P}(X < k) \\approx \\mathrm{P}(Y < k - 0.5)$$ ‚ÄĒ exclude the bar at $$k$$\n+ $$\\mathrm{P}(X \\geqslant k) \\approx \\mathrm{P}(Y > k - 0.5)$$ ‚ÄĒ include the full bar at $$k$$\n+ $$\\mathrm{P}(X > k) \\approx \\mathrm{P}(Y > k + 0.5)$$ ‚ÄĒ exclude the bar at $$k$$\n+ $$\\mathrm{P}(X = k) \\approx \\mathrm{P}(k - 0.5 < Y < k + 0.5)$$ ‚ÄĒ the single bar at $$k$$\n- Step 3: Mnemonic: \"‚Č§ and ‚Č• get the +0.5 / ‚ąí0.5 that includes the boundary; < and > get the adjustment that excludes the boundary.\" For equality, straddle the integer by ¬Ī0.5.\n\nTakeaway: The direction of the 0.5 shift depends on whether the inequality is strict or non-strict ‚ÄĒ it's all about whether to include or exclude the bar at the boundary.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{B}(150, 0.48)$$ is approximated by $$Y \\sim \\mathrm{N}(72, 6.12^2)$$. Explain how to compute $$\\mathrm{P}(X \\leqslant 70)$$ using this approximation, including the continuity correction. (3 steps)", "answer": "- Step 1: Since we want $$\\mathrm{P}(X \\leqslant 70)$$, the continuity correction gives $$\\mathrm{P}(Y < 70.5)$$. We add 0.5 because \"$$\\leqslant 70$$\" includes the bar at 70, which extends up to 70.5.\n- Step 2: Standardise: $$z = \\frac{70.5 - 72}{6.12} = \\frac{-1.5}{6.12} \\approx -0.245$$.\n- Step 3: Look up $$\\mathrm{P}(Z < -0.245)$$ in normal tables. Since the value falls between standard table entries, we use the nearest value. This gives approximately 0.4032.\n\nTakeaway: For \"$$\\leqslant$$\", push the boundary up by 0.5, then standardise and use normal tables.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_10", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{B}(150, 0.48)$$ is approximated by $$Y \\sim \\mathrm{N}(72, 6.12^2)$$. Explain how to compute $$\\mathrm{P}(80 \\leqslant X < 90)$$ using this approximation. (3 steps)", "answer": "- Step 1: Apply continuity corrections to both boundaries. \"$$80 \\leqslant$$\" means include the bar at 80, so the lower bound becomes 79.5. \"$$< 90$$\" means exclude the bar at 90, so the upper bound becomes 89.5. We get $$\\mathrm{P}(79.5 < Y < 89.5)$$.\n- Step 2: Standardise both ends:\n+ Lower: $$z_1 = \\frac{79.5 - 72}{6.12} = \\frac{7.5}{6.12} \\approx 1.23$$\n+ Upper: $$z_2 = \\frac{89.5 - 72}{6.12} = \\frac{17.5}{6.12} \\approx 2.86$$\n- Step 3: Compute $$\\mathrm{P}(Z < 2.86) - \\mathrm{P}(Z < 1.23) = 0.9979 - 0.8907 \\approx 0.1072$$. (Exact values depend on table precision; the textbook gives 0.1081.)\n\nTakeaway: For a range, correct both boundaries independently ‚ÄĒ include the lower bar, exclude the upper bar (for this particular inequality pattern).", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_11", "judge_pick": false}, {"question": "When approximating $$\\mathrm{P}(X = k)$$ for a binomial random variable using a normal approximation, what interval do you use, and why might the percentage error be relatively large for this type of probability? (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X = k) \\approx \\mathrm{P}(k - 0.5 < Y < k + 0.5)$$. We straddle the integer $$k$$ by ¬Ī0.5 to capture the area of the single bar.\n- Step 2: A single-point probability for a binomial can be quite small (e.g., 0.0365). The normal approximation gives a similar but not identical small number (e.g., 0.0362). The absolute difference is tiny (0.0003), but the percentage error = $$\\frac{0.0003}{0.0365} \\times 100\\% \\approx 0.82\\%$$ can be noticeable.\n- Step 3: Percentage errors for single values tend to be larger than for cumulative probabilities because we're approximating a thin slice, where small shifts in the curve matter more. Cumulative probabilities sum many bars, and errors tend to cancel out.\n\nTakeaway: Single-value probabilities are the hardest to approximate well (in percentage terms) because we're capturing one thin bar under the curve.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_12", "judge_pick": true}, {"question": "What condition must the Poisson parameter $$\\lambda$$ satisfy for a normal approximation to be appropriate, and what is the approximating normal distribution? (2 steps)", "answer": "- Step 1: $$\\lambda$$ must be large ‚ÄĒ the course guideline is $$\\lambda > 10$$. As $$\\lambda$$ increases, the Poisson distribution becomes more symmetric and bell-shaped, making it a better match for the normal.\n- Step 2: The approximating normal is $$Y \\sim \\mathrm{N}(\\lambda, \\lambda)$$. Both the mean and variance of the Poisson are $$\\lambda$$, so the normal is given the same mean and variance. Note: the variance is $$\\lambda$$ (not $$\\sqrt{\\lambda}$$); the standard deviation is $$\\sqrt{\\lambda}$$.\n\nTakeaway: For Poisson, mean = variance = $$\\lambda$$, so the approximating normal inherits both: $$\\mathrm{N}(\\lambda, \\lambda)$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_13", "judge_pick": false}, {"question": "Why does the Poisson distribution become approximately normal when $$\\lambda$$ is large? Give both a mathematical and a visual intuition. (3 steps)", "answer": "- Step 1: **Mathematically**, the Poisson is a sum of independent rare events. By a Central Limit Theorem-type argument, sums of independent random variables tend toward normality as the number of terms grows. A Poisson with large $$\\lambda$$ can be thought of as a sum of many independent Poisson(1) variables.\n- Step 2: **Visually**, when $$\\lambda$$ is small (e.g., $$\\lambda = 2$$), the Poisson is heavily right-skewed with a long tail. As $$\\lambda$$ grows (e.g., $$\\lambda = 25$$), the distribution spreads out and the skewness diminishes ‚ÄĒ the bars form a symmetric, bell-shaped pattern.\n- Step 3: The skewness of a Poisson is $$\\frac{1}{\\sqrt{\\lambda}}$$, which decreases toward 0 as $$\\lambda \\to \\infty$$. This confirms the distribution becomes more symmetric with larger $$\\lambda$$.\n\nTakeaway: Large $$\\lambda$$ ‚Üí less skew ‚Üí more symmetric ‚Üí more normal. It's a CLT-type convergence.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_14", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{Po}(25)$$. Explain how to approximate $$\\mathrm{P}(X > 30)$$ using a normal approximation, including the continuity correction and standardisation. (3 steps)", "answer": "- Step 1: Approximate with $$Y \\sim \\mathrm{N}(25, 25)$$. The standard deviation is $$\\sigma = \\sqrt{25} = 5$$. Apply the continuity correction: $$\\mathrm{P}(X > 30) \\approx \\mathrm{P}(Y > 30.5)$$ (we add 0.5 because \"$$> 30$$\" excludes the bar at 30, so we start just above it).\n- Step 2: Standardise: $$z = \\frac{30.5 - 25}{5} = \\frac{5.5}{5} = 1.1$$.\n- Step 3: $$\\mathrm{P}(Z > 1.1) = 1 - \\mathrm{P}(Z < 1.1) = 1 - 0.8643 = 0.1357$$.\n\nTakeaway: Poisson-to-normal works the same way as binomial-to-normal: match mean and variance, apply continuity correction, standardise.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_15", "judge_pick": false}, {"question": "$$X \\sim \\mathrm{Po}(25)$$. Explain how to approximate $$\\mathrm{P}(18 \\leqslant X < 35)$$ using a normal approximation. (3 steps)", "answer": "- Step 1: Approximate with $$Y \\sim \\mathrm{N}(25, 25)$$, so $$\\sigma = 5$$. Apply continuity corrections: \"$$18 \\leqslant$$\" includes 18, so lower bound becomes 17.5; \"$$< 35$$\" excludes 35, so upper bound becomes 34.5. We get $$\\mathrm{P}(17.5 \\leqslant Y < 34.5)$$.\n- Step 2: Standardise both:\n+ Lower: $$z_1 = \\frac{17.5 - 25}{5} = \\frac{-7.5}{5} = -1.5$$\n+ Upper: $$z_2 = \\frac{34.5 - 25}{5} = \\frac{9.5}{5} = 1.9$$\n- Step 3: $$\\mathrm{P}(-1.5 \\leqslant Z < 1.9) = \\mathrm{P}(Z < 1.9) - \\mathrm{P}(Z < -1.5) = 0.9713 - 0.0668 = 0.9045$$. (Alternatively: $$0.4332 + 0.4332 + 0.0381 = 0.9045$$ using the symmetric property.)\n\nTakeaway: Both boundaries get corrected independently ‚ÄĒ the direction depends on the type of inequality at each end.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_16", "judge_pick": false}, {"question": "When choosing an approximation for a binomial distribution, what is the decision rule based on the mean $$np$$? (2 steps)", "answer": "- Step 1: Calculate the mean $$np$$. This single number determines which approximation is more appropriate.\n+ If $$np \\leqslant 10$$: use a **Poisson** approximation, $$\\mathrm{Po}(np)$$. This works because $$p$$ is small enough that the binomial is skewed, matching the Poisson shape.\n+ If $$np > 10$$: use a **normal** approximation, $$\\mathrm{N}(np, np(1-p))$$. This works because with a larger mean, the binomial is more symmetric and bell-shaped, matching the normal.\n- Step 2: The underlying logic is that $$np \\leqslant 10$$ implies $$p$$ is small (since $$n$$ must be large for approximation to be needed), while $$np > 10$$ typically means $$p$$ is not too far from 0.5, making the distribution symmetric enough for normal.\n\nTakeaway: $$np \\leqslant 10 \\Rightarrow$$ Poisson; $$np > 10 \\Rightarrow$$ Normal. The mean is the decision variable.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why should you approximate a binomial distribution directly to a normal distribution rather than going via a Poisson distribution (i.e., binomial ‚Üí Poisson ‚Üí normal)? (2 steps)", "answer": "- Step 1: Each approximation introduces a small error. Going binomial ‚Üí Poisson ‚Üí normal involves **two** successive approximations, and the errors compound. Going binomial ‚Üí normal involves only **one** approximation.\n- Step 2: The direct normal approximation preserves the correct variance $$np(1-p)$$, whereas the Poisson approximation replaces it with $$np$$ (losing the $$(1-p)$$ factor). If you then approximate that Poisson by a normal, you've baked in an incorrect variance. The direct route is always more accurate.\n\nTakeaway: Never chain approximations. Go directly from binomial to the appropriate approximating distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18", "judge_pick": true}, {"question": "A spinner lands on red 10% of the time. In 60 spins, we count the number of reds. Which approximation should be used and why? (2 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(60, 0.1)$$. Compute the mean: $$np = 60 \\times 0.1 = 6$$.\n- Step 2: Since $$np = 6 \\leqslant 10$$, use a Poisson approximation: $$X \\approx \\mathrm{Po}(6)$$. The small $$p$$ and moderate mean make this a skewed distribution well-suited to Poisson. No continuity correction is needed for Poisson calculations (it is already discrete).\n\nTakeaway: $$p = 0.1$$ is small, $$np = 6 \\leqslant 10$$ ‚ÄĒ classic Poisson approximation territory.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_19", "judge_pick": false}, {"question": "A spinner lands on red 10% of the time. In 150 spins, we count the number of reds. Which approximation should be used and why? (3 steps)", "answer": "- Step 1: Let $$R \\sim \\mathrm{B}(150, 0.1)$$. Compute the mean: $$np = 150 \\times 0.1 = 15$$.\n- Step 2: Since $$np = 15 > 10$$, use a normal approximation. The parameters are $$\\mu = 15$$ and $$\\sigma^2 = 150 \\times 0.1 \\times 0.9 = 13.5$$, so $$R \\approx \\mathrm{N}(15, 13.5)$$.\n- Step 3: Note: even though $$p = 0.1$$ is not close to 0.5, the large $$n$$ and the resulting mean of 15 make the distribution symmetric enough for the normal to work. A continuity correction is required.\n\nTakeaway: Same $$p$$ as Q20, but larger $$n$$ pushes $$np$$ above 10, switching us to the normal approximation. The decision depends on $$np$$, not just $$p$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_20", "judge_pick": false}, {"question": "A car hire firm experiences breakdowns at a rate of 21 per week. What distribution models the number of breakdowns per week, and how would you approximate the probability of more than 27 breakdowns? (3 steps)", "answer": "- Step 1: Breakdowns occur at a constant rate, randomly and independently ‚ÄĒ this is the classic Poisson setup. Let $$X \\sim \\mathrm{Po}(21)$$.\n- Step 2: Since $$\\lambda = 21 > 10$$, use a normal approximation: $$Y \\sim \\mathrm{N}(21, 21)$$. The standard deviation is $$\\sigma = \\sqrt{21} \\approx 4.58$$.\n- Step 3: Apply continuity correction: $$\\mathrm{P}(X > 27) \\approx \\mathrm{P}(Y > 27.5)$$. Standardise: $$z = \\frac{27.5 - 21}{\\sqrt{21}} \\approx 1.42$$. Then $$\\mathrm{P}(Z > 1.42) = 1 - 0.9222 = 0.0778$$.\n\nTakeaway: Rate-based problems ‚Üí Poisson; large $$\\lambda$$ ‚Üí normal approximation with continuity correction.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_21", "judge_pick": true}, {"question": "A common mistake is to forget the continuity correction when approximating discrete distributions with the normal. If you compute $$\\mathrm{P}(X > 27)$$ for a discrete $$X$$ using $$\\mathrm{P}(Y > 27)$$ instead of $$\\mathrm{P}(Y > 27.5)$$, will your answer be too large or too small, and why? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(Y > 27.5) < \\mathrm{P}(Y > 27)$$ because we're excluding the interval $$(27, 27.5]$$ from the calculation. This interval has positive area under the normal curve.\n- Step 2: Therefore, forgetting the continuity correction (using $$> 27$$ instead of $$> 27.5$$) gives an answer that is **too large**. You've included extra area that shouldn't be there ‚ÄĒ the area corresponding to the left half of the bar at $$X = 28$$ doesn't belong to \"$$X > 27$$\" in the discrete world.\n\nTakeaway: Forgetting the continuity correction for \"$$> k$$\" overestimates the probability because you include area that belongs to the bar at $$k+1$$'s left edge.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_22", "judge_pick": true}, {"question": "Show that if $$X \\sim \\mathrm{B}(n, p)$$ is approximated by $$Y \\sim \\mathrm{Po}(np)$$, the Poisson approximation always overestimates $$\\mathrm{P}(X = 0)$$. (4 steps)", "answer": "- Step 1: Write down the exact binomial probability: $$\\mathrm{P}(X = 0) = (1-p)^n$$.\n- Step 2: Write down the Poisson approximation: $$\\mathrm{P}(Y = 0) = e^{-np}$$.\n- Step 3: We need to show $$e^{-np} > (1-p)^n$$ for $$0 < p < 1$$. Taking natural logs of both sides: we need $$-np > n\\ln(1-p)$$, which simplifies (dividing b
