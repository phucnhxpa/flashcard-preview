y the positive number $$n$$) to: $$-p > \\ln(1-p)$$, i.e., $$e^{-p} > 1 - p$$.\n- Step 4: Define $$f(p) = e^{-p} - (1 - p)$$. Then $$f(0) = 1 - 1 = 0$$, and $$f'(p) = -e^{-p} + 1 = 1 - e^{-p}$$. For $$p > 0$$, we have $$e^{-p} < 1$$, so $$f'(p) > 0$$. Since $$f(0) = 0$$ and $$f$$ is increasing for $$p > 0$$, we get $$f(p) > 0$$ for all $$0 < p < 1$$. Therefore $$e^{-p} > 1 - p$$, and hence $$e^{-np} > (1-p)^n$$.\n\nTakeaway: The Poisson always overestimates the probability of zero successes because $$e^{-p}$$ lies above the tangent line $$1-p$$ ‚ÄĒ a consequence of the exponential function's convexity.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_23", "judge_pick": true}, {"question": "A box contains 500 electrical switches, each with probability 0.005 of being faulty. We want $$\\mathrm{P}(X < 2)$$ where $$X$$ is the number of faulty switches. Conceptually compare the accuracy of the Poisson approximation vs the normal approximation for this problem. (4 steps)", "answer": "- Step 1: Here $$n = 500$$, $$p = 0.005$$, so $$np = 2.5$$. This is a case with very large $$n$$ and very small $$p$$ ‚ÄĒ ideal for Poisson.\n- Step 2: **Poisson approximation**: $$X \\approx \\mathrm{Po}(2.5)$$. Then $$\\mathrm{P}(X < 2) = \\mathrm{P}(X \\leqslant 1) = e^{-2.5}(1 + 2.5) = 0.2873$$. This should be very accurate since conditions are perfectly met.\n- Step 3: **Normal approximation**: $$X \\approx \\mathrm{N}(2.5, 2.4875)$$ with $$\\sigma \\approx 1.577$$. Then $$\\mathrm{P}(X < 2) \\approx \\mathrm{P}(Y < 1.5)$$ (continuity correction). Standardising: $$z = \\frac{1.5 - 2.5}{1.577} \\approx -0.634$$, giving $$\\mathrm{P}(Z < -0.634) \\approx 0.263$$. This is quite far from the exact answer.\n- Step 4: The normal approximation performs poorly here because the distribution is very skewed (small $$p$$), and we're looking at the left tail where the skew matters most. The Poisson matches the shape much better. The percentage error for Poisson is tiny (~0.1%), while for normal it's substantial (~8%).\n\nTakeaway: When $$p$$ is very small, the normal approximation is poor (especially in the tails) because it can't capture the skewness. Poisson is the right tool.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_24", "judge_pick": true}, {"question": "Why is the normal approximation particularly bad for computing left-tail probabilities (like $$\\mathrm{P}(X < 2)$$) when $$p$$ is very small, even if $$n$$ is large? (3 steps)", "answer": "- Step 1: When $$p$$ is small, the binomial distribution is right-skewed ‚ÄĒ it has a long right tail and a steep left side. The normal distribution is symmetric and extends equally in both directions.\n- Step 2: In the left tail (near 0), the true binomial probability drops off very quickly ‚ÄĒ there's a hard boundary at 0. The normal distribution, being symmetric, assigns too much probability to negative values and redistributes this, distorting the left tail shape.\n- Step 3: The result is that the normal curve is too high on the left side compared to the true binomial, leading to overestimation of left-tail probabilities in skewed cases. This is why the normal approximation should only be used when $$p$$ is close to 0.5 (symmetric distribution).\n\nTakeaway: Symmetric approximations fail on skewed distributions, especially in the tail on the steep side.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_25", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{B}(80, 0.55)$$, the exact probability $$\\mathrm{P}(X = 50) = 0.0365$$ and the normal approximation gives 0.0362. Calculate the percentage error and explain what this tells us. (2 steps)", "answer": "- Step 1: Percentage error $$= \\frac{|0.0365 - 0.0362|}{0.0365} \\times 100\\% = \\frac{0.0003}{0.0365} \\times 100\\% \\approx 0.82\\%$$.\n- Step 2: A percentage error under 1% is excellent ‚ÄĒ it shows the normal approximation is highly accurate when conditions are met ($$n = 80$$ is large, $$p = 0.55$$ is close to 0.5). Even for a single-value probability (the hardest case), the approximation is nearly indistinguishable from the exact answer.\n\nTakeaway: When $$n$$ is large and $$p \\approx 0.5$$, the normal approximation is extremely accurate ‚ÄĒ even for point probabilities.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_26", "judge_pick": true}, {"question": "A fair coin is tossed 70 times. Set up (but do not compute) the normal approximation to estimate the probability of more than 45 heads, stating the distribution, the continuity correction, and the inequality to evaluate. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(70, 0.5)$$. Since $$p = 0.5$$ (perfectly symmetric) and $$n = 70$$ is large, the normal approximation is ideal. Parameters: $$\\mu = 70 \\times 0.5 = 35$$, $$\\sigma^2 = 70 \\times 0.5 \\times 0.5 = 17.5$$, so $$Y \\sim \\mathrm{N}(35, 17.5)$$.\n- Step 2: Apply continuity correction: $$\\mathrm{P}(X > 45) \\approx \\mathrm{P}(Y > 45.5)$$. We use 45.5 because \"$$> 45$$\" excludes the bar at 45.\n- Step 3: Standardise: $$\\mathrm{P}\\left(Z > \\frac{45.5 - 35}{\\sqrt{17.5}}\\right) = \\mathrm{P}\\left(Z > \\frac{10.5}{4.183}\\right) \\approx \\mathrm{P}(Z > 2.51)$$. This is a very small probability (around 0.006), indicating 45+ heads in 70 tosses is quite unlikely.\n\nTakeaway: Fair coin ‚Üí $$p = 0.5$$ ‚Üí normal approximation is at its best. The setup is: define, correct, standardise.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_27", "judge_pick": true}, {"question": "Street light failures occur at a rate of one every two days. What is the Poisson parameter for the number of failures per week, and how would you approximate the probability of fewer than 45 failures in a 10-week period? (3 steps)", "answer": "- Step 1: Rate = 1 failure per 2 days = 3.5 failures per week. So per week, $$X \\sim \\mathrm{Po}(3.5)$$.\n- Step 2: For 10 weeks, the total failures $$T$$ is the sum of 10 independent $$\\mathrm{Po}(3.5)$$ variables. By the additive property of Poisson, $$T \\sim \\mathrm{Po}(35)$$.\n- Step 3: Since $$\\lambda = 35 > 10$$, use a normal approximation: $$T \\approx \\mathrm{N}(35, 35)$$. Then $$\\mathrm{P}(T < 45) \\approx \\mathrm{P}(Y < 44.5)$$ (continuity correction). Standardise: $$z = \\frac{44.5 - 35}{\\sqrt{35}} \\approx \\frac{9.5}{5.916} \\approx 1.61$$, giving $$\\mathrm{P}(Z < 1.61) \\approx 0.9463$$.\n\nTakeaway: For Poisson processes over different time periods, scale the rate, use the additive property, then approximate if $$\\lambda$$ is large.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_28", "judge_pick": true}, {"question": "A company claims 55% of seedlings produce apples. In a sample of 200, only 95 produce apples. Set up the approximation to find $$\\mathrm{P}(X \\leqslant 95)$$, and explain how the result would be used to assess the claim. (3 steps)", "answer": "- Step 1: Under the claim, $$X \\sim \\mathrm{B}(200, 0.55)$$. With $$np = 110 > 10$$ and $$p$$ close to 0.5, use a normal approximation: $$Y \\sim \\mathrm{N}(110, 49.5)$$, so $$\\sigma = \\sqrt{49.5} \\approx 7.036$$.\n- Step 2: $$\\mathrm{P}(X \\leqslant 95) \\approx \\mathrm{P}(Y < 95.5)$$. Standardise: $$z = \\frac{95.5 - 110}{7.036} \\approx \\frac{-14.5}{7.036} \\approx -2.06$$. This gives $$\\mathrm{P}(Z < -2.06) \\approx 0.0197$$.\n- Step 3: This probability is very small (about 2%). If the company's claim were true, observing 95 or fewer successes out of 200 would be very unlikely. This provides evidence **against** the company's claim ‚ÄĒ the true proportion is likely lower than 55%.\n\nTakeaway: Approximations let us compute tail probabilities that serve as evidence for/against hypotheses about population parameters.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_29", "judge_pick": false}, {"question": "A doctor claims a remedy cures 52% of cases. In a sample of 300, 170 are cured. Explain conceptually how to assess this claim using a normal approximation, without computing the final number. (3 steps)", "answer": "- Step 1: Under the claim, $$X \\sim \\mathrm{B}(300, 0.52)$$, with $$\\mu = 156$$ and $$\\sigma^2 = 300 \\times 0.52 \\times 0.48 = 74.88$$. Approximate with $$Y \\sim \\mathrm{N}(156, 74.88)$$.\n- Step 2: Compute $$\\mathrm{P}(X \\geqslant 170) \\approx \\mathrm{P}(Y > 169.5)$$. Standardise: $$z = \\frac{169.5 - 156}{\\sqrt{74.88}} = \\frac{13.5}{8.653} \\approx 1.56$$, giving a probability of about 0.06.\n- Step 3: A probability of ~6% is borderline ‚ÄĒ not extremely unlikely but not typical either. This is not strong enough evidence to firmly reject the claim, but it raises suspicion. The observed 170 is somewhat higher than the expected 156, but not impossibly so under the claim.\n\nTakeaway: The approximated tail probability is the p-value; interpreting it requires judgment about what threshold constitutes \"sufficiently unlikely.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_30", "judge_pick": true}, {"question": "A fair die is rolled 48 times. We want the probability of no more than 10 sixes. Which approximation is appropriate and why? (2 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(48, \\frac{1}{6})$$. Compute $$np = 48 \\times \\frac{1}{6} = 8$$.\n- Step 2: Since $$np = 8 \\leqslant 10$$, use a Poisson approximation: $$X \\approx \\mathrm{Po}(8)$$. Then $$\\mathrm{P}(X \\leqslant 10)$$ can be read directly from Poisson cumulative tables. The value $$p = \\frac{1}{6} \\approx 0.167$$ is reasonably small, and the mean is within the Poisson-friendly range.\n\nTakeaway: $$p = 1/6$$ is small enough, and $$np = 8 \\leqslant 10$$, so Poisson is the natural choice.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_31", "judge_pick": false}, {"question": "A fair die is rolled 120 times. We want the probability of at least 25 sixes. Which approximation is appropriate and why? (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(120, \\frac{1}{6})$$. Compute $$np = 120 \\times \\frac{1}{6} = 20$$.\n- Step 2: Since $$np = 20 > 10$$, use a normal approximation. Parameters: $$\\mu = 20$$, $$\\sigma^2 = 120 \\times \\frac{1}{6} \\times \\frac{5}{6} = \\frac{100}{6} \\approx 16.67$$, so $$Y \\sim \\mathrm{N}(20, 16.67)$$.\n- Step 3: Apply continuity correction: $$\\mathrm{P}(X \\geqslant 25) \\approx \\mathrm{P}(Y > 24.5)$$. Standardise: $$z = \\frac{24.5 - 20}{\\sqrt{16.67}} \\approx \\frac{4.5}{4.08} \\approx 1.10$$, giving $$\\mathrm{P}(Z > 1.10) \\approx 0.1357$$.\n\nTakeaway: Same $$p = 1/6$$ as Q32, but larger $$n$$ pushes $$np$$ above 10, switching to the normal approximation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_32", "judge_pick": false}, {"question": "A shop owner knows that 40% of customers buy a newspaper, but only 4% spend over \\$10. In a sample of 100 customers, explain which approximation you'd use for each probability and why they differ. (3 steps)", "answer": "- Step 1: For newspapers, $$X \\sim \\mathrm{B}(100, 0.40)$$. Here $$np = 40 > 10$$ and $$p = 0.40$$ is close to 0.5, so use a **normal approximation**: $$Y \\sim \\mathrm{N}(40, 24)$$.\n- Step 2: For spending over \\$10, $$W \\sim \\mathrm{B}(100, 0.04)$$. Here $$np = 4 \\leqslant 10$$ and $$p = 0.04$$ is small, so use a **Poisson approximation**: $$W \\approx \\mathrm{Po}(4)$$.\n- Step 3: Same sample size, but different $$p$$ values lead to different approximations. The key insight: it's not just $$n$$ that matters ‚ÄĒ the value of $$p$$ (and hence $$np$$) determines which approximation captures the shape of the distribution.\n\nTakeaway: For the same $$n$$, a large $$p$$ (close to 0.5) ‚Üí normal; a small $$p$$ ‚Üí Poisson. Always check $$np$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_33", "judge_pick": true}, {"question": "A random variable $$X \\sim \\mathrm{B}(20, 0.5)$$. Would a normal approximation be appropriate here? Explain why or why not, considering both conditions. (2 steps)", "answer": "- Step 1: Checking the conditions: $$p = 0.5$$ is perfectly close to 0.5 ‚úď, but $$n = 20$$ is not particularly large ‚úó. The rule of thumb requires $$n$$ to be large.\n- Step 2: With $$n = 20$$, the binomial has only 21 possible values (0 through 20), and the distribution is not smooth enough for the normal curve to fit well. While $$p = 0.5$$ is ideal for symmetry, the small $$n$$ means the discrete \"steps\" are too coarse. The approximation would be rough, especially in the tails. Use exact binomial calculation instead.\n\nTakeaway: Both conditions must be met: $$p \\approx 0.5$$ alone is not sufficient if $$n$$ is too small.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_34", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{B}(300, 0.85)$$. Can you use a normal approximation directly? If not, how would you handle this? (3 steps)", "answer": "- Step 1: Here $$p = 0.85$$, which is far from 0.5. The binomial distribution is left-skewed (since $$p$$ is large), so a direct normal approximation would be poor.\n- Step 2: However, $$np = 255 > 10$$, and $$n(1-p) = 45$$ is also large. The distribution of the number of *failures* $$F = 300 - X \\sim \\mathrm{B}(300, 0.15)$$ has a more moderate $$p$$ value, though still not close to 0.5.\n- Step 3: In practice, for $$n$$ very large, the normal approximation can still work reasonably well even when $$p$$ is not that close to 0.5, because the CLT effect is strong. But the approximation quality degrades as $$p$$ moves away from 0.5. The textbook would likely still accept a normal approximation here given the very large $$n$$, but be cautious about tail probabilities.\n\nTakeaway: When $$p$$ is far from 0.5, consider flipping to count failures, and be aware that the normal approximation may be less accurate ‚ÄĒ especially in tails.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_35", "judge_pick": true}, {"question": "Conceptually, what does \"percentage error\" measure when evaluating an approximation, and why is it more informative than absolute error? (2 steps)", "answer": "- Step 1: Percentage error $$= \\frac{|\\text{exact} - \\text{approximate}|}{\\text{exact}} \\times 100\\%$$. It measures the relative size of the error compared to the true value.\n- Step 2: Absolute error alone can be misleading. An absolute error of 0.001 is negligible if the true probability is 0.5 (0.2% error) but significant if the true probability is 0.01 (10% error). Percentage error contextualises the error, telling you how much the approximation distorts the true answer proportionally.\n\nTakeaway: Percentage error tells you the *relative* accuracy of an approximation ‚ÄĒ essential when comparing approximations across problems with very different probability scales.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_36", "judge_pick": true}, {"question": "A radioactive source emits particles at a rate of 14 counts per second. Using a normal approximation, explain how to find the probability of getting 20, 21, or 22 counts in a given second. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{Po}(14)$$. Since $$\\lambda = 14 > 10$$, use a normal approximation: $$Y \\sim \\mathrm{N}(14, 14)$$, with $$\\sigma = \\sqrt{14} \\approx 3.742$$.\n- Step 2: $$\\mathrm{P}(X \\in \\{20, 21, 22\\}) = \\mathrm{P}(20 \\leqslant X \\leqslant 22)$$. Apply continuity correction: $$\\mathrm{P}(19.5 \\leqslant Y \\leqslant 22.5)$$.\n- Step 3: Standardise both bounds:\n+ Lower: $$z_1 = \\frac{19.5 - 14}{\\sqrt{14}} \\approx \\frac{5.5}{3.742} \\approx 1.47$$\n+ Upper: $$z_2 = \\frac{22.5 - 14}{\\sqrt{14}} \\approx \\frac{8.5}{3.742} \\approx 2.27$$\nThen $$\\mathrm{P}(1.47 \\leqslant Z \\leqslant 2.27) = \\mathrm{P}(Z < 2.27) - \\mathrm{P}(Z < 1.47) \\approx 0.9884 - 0.9292 = 0.0592$$.\n\nTakeaway: \"20, 21, or 22\" is equivalent to \"$$20 \\leqslant X \\leqslant 22$$\" ‚ÄĒ apply continuity correction to both ends.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_37", "judge_pick": false}, {"question": "A company hires out boats at a mean rate of 15 per day. They own 20 boats. Over 100 days, on how many days would you expect them to turn customers away? Explain the setup conceptually. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{Po}(15)$$ represent daily hires. The company turns customers away when demand exceeds supply, i.e., when $$X > 20$$.\n- Step 2: Since $$\\lambda = 15 > 10$$, approximate with $$Y \\sim \\mathrm{N}(15, 15)$$, $$\\sigma = \\sqrt{15} \\approx 3.873$$. $$\\mathrm{P}(X > 20) \\approx \\mathrm{P}(Y > 20.5)$$. Standardise: $$z = \\frac{20.5 - 15}{\\sqrt{15}} \\approx \\frac{5.5}{3.873} \\approx 1.42$$, giving $$\\mathrm{P}(Z > 1.42) \\approx 0.0778$$.\n- Step 3: Over 100 days, expected number of days turning customers away $$= 100 \\times 0.0778 \\approx 7.78$$, so about 8 days.\n\nTakeaway: First find the daily probability of exceeding capacity, then multiply by the number of days to get the expected count.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_38", "judge_pick": false}, {"question": "A manufacturer produces nails with 2.5% faulty rate, sold in packets of 200. Find the probability a packet has more than 6 faulty nails. Then: if a carpenter buys 6 packets, estimate the probability that more than half have more than 6 faulty nails. Explain the two-stage setup. (4 steps)", "answer": "- Step 1: For one packet: $$X \\sim \\mathrm{B}(200, 0.025)$$, $$np = 5 \\leqslant 10$$, so use Poisson: $$X \\approx \\mathrm{Po}(5)$$. $$\\mathrm{P}(X > 6) = 1 - \\mathrm{P}(X \\leqslant 6) = 1 - 0.7622 = 0.2378$$.\n- Step 2: Now define a new random variable: let $$W$$ = number of packets (out of 6) with more than 6 faulty nails. Each packet independently has probability 0.2378 of having $$>6$$ faults.\n- Step 3: $$W \\sim \\mathrm{B}(6, 0.2378)$$. \"More than half\" means $$W \\geqslant 4$$ (since half of 6 is 3).\n- Step 4: $$\\mathrm{P}(W \\geqslant 4) = \\mathrm{P}(W = 4) + \\mathrm{P}(W = 5) + \\mathrm{P}(W = 6)$$. This is a small-$$n$$ binomial calculated exactly (no approximation needed for this second stage). Each term uses $$\\binom{6}{w}(0.2378)^w(0.7622)^{6-w}$$.\n\nTakeaway: This is a two-stage problem ‚ÄĒ first find the per-packet probability using an approximation, then use that probability as $$p$$ in a new (exact) binomial for the second stage.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_39", "judge_pick": false}, {"question": "Each cell of an insect contains 1200 genes, each with probability 0.005 of being damaged. Find the mean and variance of damaged genes, and explain why this supports using a Poisson model. (3 steps)", "answer": "- Step 1: Let $$X$$ = number of damaged genes. $$X \\sim \\mathrm{B}(1200, 0.005)$$. Mean: $$\\mathrm{E}(X) = np = 1200 \\times 0.005 = 6$$.\n- Step 2: Variance: $$\\mathrm{Var}(X) = np(1-p) = 1200 \\times 0.005 \\times 0.995 = 5.97$$.\n- Step 3: The mean (6) and variance (5.97) are very close ‚ÄĒ the ratio is $$5.97/6 = 0.995 \\approx 1$$. This near-equality of mean and variance is the hallmark of a Poisson distribution, confirming the Poisson approximation $$\\mathrm{Po}(6)$$ is appropriate. The closeness occurs because $$p = 0.005$$ is so small that $$(1-p) \\approx 1$$.\n\nTakeaway: When mean ‚Čą variance, Poisson is the right model. Small $$p$$ guarantees this for the binomial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_40", "judge_pick": true}, {"question": "In the context of approximations, what is the key difference between using Poisson tables vs. using normal tables after applying a continuity correction? (2 steps)", "answer": "- Step 1: When using a **Poisson approximation** (e.g., $$\\mathrm{Po}(6)$$), you read probabilities directly from Poisson cumulative tables ‚ÄĒ no continuity correction is needed because the Poisson is already discrete. You simply look up $$\\mathrm{P}(X \\leqslant k)$$ for the appropriate $$\\lambda$$ and $$k$$.\n- Step 2: When using a **normal approximation**, you must first apply a continuity correction (adjusting boundaries by ¬Ī0.5) because you're approximating a discrete distribution with a continuous one. Then you standardise and look up the standard normal table. Forgetting the continuity correction is the most common source of error.\n\nTakeaway: Poisson approximation ‚Üí direct table lookup. Normal approximation ‚Üí continuity correction ‚Üí standardise ‚Üí table lookup.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_41", "judge_pick": true}, {"question": "A cereal has prizes in 56% of boxes. In a sample of 100 boxes, is it more accurate to use a normal approximation for $$\\mathrm{P}(X = 55)$$ or for $$\\mathrm{P}(X \\geqslant 55)$$? Explain why. (2 steps)", "answer": "- Step 1: The normal approximation is more accurate for **cumulative** probabilities like $$\\mathrm{P}(X \\geqslant 55)$$ than for **single-value** probabilities like $$\\mathrm{P}(X = 55)$$.\n- Step 2: For a single value, we approximate a thin bar by the area under the normal curve between 54.5 and 55.5 ‚ÄĒ a narrow slice where small errors in the curve's shape matter proportionally more. For a cumulative probability, we sum many bars, and overestimates in some regions cancel underestimates in others. The net error is smaller in relative terms.\n\nTakeaway: Cumulative probabilities are more robust to approximation error than point probabilities ‚ÄĒ errors cancel over many bars.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_42", "judge_pick": true}, {"question": "$$X \\sim \\mathrm{B}(100, 0.6)$$. Find the largest value of $$x$$ such that $$\\mathrm{P}(X < x) < 0.05$$ using a normal approximation. Walk through the logic. (4 steps)", "answer": "- Step 1: Approximate with $$Y \\sim \\mathrm{N}(60, 24)$$, so $$\\mu = 60$$, $$\\sigma = \\sqrt{24} \\approx 4.899$$.\n- Step 2: We need $$\\mathrm{P}(X < x) < 0.05$$, which means $$\\mathrm{P}(Y < x - 0.5) < 0.05$$ (continuity correction: \"$$< x$$\" excludes the bar at $$x$$, so we use $$x - 0.5$$).\n- Step 3: From standard normal tables, $$\\mathrm{P}(Z < -1.645) = 0.05$$. So we need $$\\frac{(x-0.5) - 60}{4.899} = -1.645$$, giving $$x - 0.5 = 60 - 1.645 \\times 4.899 = 60 - 8.06 = 51.94$$, so $$x = 52.44$$.\n- Step 4: Since $$x$$ must be an integer and we need $$\\mathrm{P}(X < x) < 0.05$$, we round up to $$x = 53$$. Check: $$\\mathrm{P}(X < 53) = \\mathrm{P}(X \\leqslant 52)$$, and the corresponding normal probability $$\\mathrm{P}(Y < 52.5)$$ gives $$z = \\frac{52.5-60}{4.899} \\approx -1.53$$, which has probability about 0.063 > 0.05. So actually $$x = 52$$: $$\\mathrm{P}(X < 52) = \\mathrm{P}(X \\leqslant 51) \\approx \\mathrm{P}(Y < 51.5)$$, $$z = \\frac{51.5-60}{4.899} \\approx -1.74$$, probability ‚Čą 0.041 < 0.05. ‚úď\n\nTakeaway: For inverse problems, work backwards from the standard normal, apply the continuity correction, then check the nearest integer values.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_43", "judge_pick": false}, {"question": "Summarise the complete decision framework for choosing an approximation, given a binomial random variable $$X \\sim \\mathrm{B}(n, p)$$ or a Poisson random variable $$X \\sim \\mathrm{Po}(\\lambda)$$. (3 steps)", "answer": "- Step 1: **For binomial** $$\\mathrm{B}(n, p)$$:\n+ If $$p$$ is small (and $$n$$ large): check $$np$$. If $$np \\leqslant 10$$, use **Poisson** approximation $$\\mathrm{Po}(np)$$.\n+ If $$p$$ is close to 0.5 (and $$n$$ large): if $$np > 10$$, use **normal** approximation $$\\mathrm{N}(np, np(1-p))$$ with continuity correction.\n+ Go directly to the chosen approximation ‚ÄĒ never via an intermediate.\n- Step 2: **For Poisson** $$\\mathrm{Po}(\\lambda)$$:\n+ If $$\\lambda > 10$$, use **normal** approximation $$\\mathrm{N}(\\lambda, \\lambda)$$ with continuity correction.\n+ If $$\\lambda \\leqslant 10$$, use Poisson directly (tables are available).\n- Step 3: **Key reminders**: always apply continuity corrections when using normal approximations for discrete distributions; the question will usually tell you when to approximate; and the larger the parameters ($$n$$ or $$\\lambda$$), the better any approximation will be.\n\nTakeaway: The decision tree is: Binomial ‚Üí check $$p$$ and $$np$$ ‚Üí Poisson or Normal. Poisson ‚Üí check $$\\lambda$$ ‚Üí Normal or direct.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_44", "judge_pick": true}, {"question": "A supermarket finds 20% of chocolate bar buyers choose large size. In a sample of 80 buyers, estimate $$\\mathrm{P}(\\text{more than 20 chose large})$$. Walk through the choice of approximation and setup. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(80, 0.20)$$. Compute $$np = 80 \\times 0.2 = 16 > 10$$. Since $$np > 10$$, use a normal approximation.\n- Step 2: Parameters: $$\\mu = 16$$, $$\\sigma^2 = 80 \\times 0.2 \\times 0.8 = 12.8$$, so $$Y \\sim \\mathrm{N}(16, 12.8)$$, $$\\sigma \\approx 3.578$$.\n- Step 3: $$\\mathrm{P}(X > 20) \\approx \\mathrm{P}(Y > 20.5)$$. Standardise: $$z = \\frac{20.5 - 16}{3.578} \\approx \\frac{4.5}{3.578} \\approx 1.26$$. Then $$\\mathrm{P}(Z > 1.26) \\approx 1 - 0.8962 = 0.1038$$.\n\nTakeaway: $$p = 0.2$$ is not that close to 0.5, but $$np = 16 > 10$$, so normal is the recommended approximation. The result is approximate ‚ÄĒ for very accurate work, exact binomial would be better.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_45", "judge_pick": true}, {"question": "The probability of buying an extra large chocolate bar is 0.02. In a sample of 150 customers, estimate $$\\mathrm{P}(\\text{fewer than 5 buy extra large})$$. Walk through the choice and setup. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{B}(150, 0.02)$$. Compute $$np = 150 \\times 0.02 = 3 \\leqslant 10$$. Since $$p$$ is small and $$np \\leqslant 10$$, use a Poisson approximation: $$X \\approx \\mathrm{Po}(3)$$.\n- Step 2: $$\\mathrm{P}(X < 5) = \\mathrm{P}(X \\leqslant 4)$$. Using Poisson tables with $$\\lambda = 3$$: $$\\mathrm{P}(X \\leqslant 4) = 0.8153$$.\n- Step 3: No continuity correction needed ‚ÄĒ Poisson is discrete and we're using it directly. The approximation is excellent because $$p = 0.02$$ is very small and $$n = 150$$ is large.\n\nTakeaway: $$p = 0.02$$, $$np = 3$$ ‚ÄĒ classic Poisson approximation scenario. Read directly from Poisson tables.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_46", "judge_pick": false}, {"question": "The probability of an electrical component being faulty is 0.0125. Components come in boxes of 400. Estimate $$\\mathrm{P}(\\text{more than 3 faulty in a box})$$. Then: a retailer buys 5 boxes ‚ÄĒ estimate $$\\mathrm{P}(\\text{more than 3 faulty in exactly 3 of the 5 boxes})$$. Explain the two-stage model. (4 steps)", "answer": "- Step 1: For one box: $$X \\sim \\mathrm{B}(400, 0.0125)$$, $$np = 5 \\leqslant 10$$, so $$X \\approx \\mathrm{Po}(5)$$. $$\\mathrm{P}(X > 3) = 1 - \\mathrm{P}(X \\leqslant 3) = 1 - 0.2650 = 0.7350$$.\n- Step 2: For the second stage, let $$W$$ = number of boxes (out of 5) with more than 3 faulty components. Each box independently has probability 0.7350 of having $$>3$$ faults.\n- Step 3: $$W \\sim \\mathrm{B}(5, 0.7350)$$. We want $$\\mathrm{P}(W = 3) = \\binom{5}{3}(0.7350)^3(0.2650)^2 = 10 \\times 0.3966 \\times 0.0702 \\approx 0.279$$.\n- Step 4: The two-stage structure: Stage 1 uses an approximation (Poisson) to find the per-box probability. Stage 2 uses exact binomial (small $$n = 5$$) with the Stage 1 probability as the new $$p$$.\n\nTakeaway: Multi-stage problems require finding per-unit probabilities first (possibly with approximations), then using those as parameters in a new distribution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_47", "judge_pick": true}, {"question": "Why does the condition \"$$p$$ is close to 0.5\" matter for the normal approximation to the binomial, but NOT for the Poisson approximation? (2 steps)", "answer": "- Step 1: The normal distribution is **symmetric**. It only approximates the binomial well when the binomial itself is approximately symmetric, which happens when $$p \\approx 0.5$$. When $$p$$ is far from 0.5, the binomial is skewed and the symmetric normal curve is a poor fit.\n- Step 2: The Poisson distribution is **right-skewed** (especially for small $$\\lambda$$). When $$p$$ is small, the binomial is also right-skewed, so the Poisson shape matches. The Poisson doesn't require symmetry ‚ÄĒ it requires the mean to be close to the variance, which happens automatically when $$p$$ is small.\n\nTakeaway: Normal needs symmetry ($$p \\approx 0.5$$); Poisson needs mean ‚Čą variance ($$p$$ small). They approximate different shapes of the binomial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_48", "judge_pick": true}, {"question": "A student approximates $$X \\sim \\mathrm{B}(1000, 0.01)$$ using $$Y \\sim \\mathrm{N}(10, 9.9)$$. Critique this choice of approximation. (3 steps)", "answer": "- Step 1: Check the parameters: $$n = 1000$$, $$p = 0.01$$, $$np = 10$$. Since $$p = 0.01$$ is very small, the binomial is heavily right-skewed.\n- Step 2: The normal approximation is inappropriate here because the distribution is far from symmetric ‚ÄĒ it's skewed, not bell-shaped. The normal would assign significant probability to negative values (impossible for a count) and misrepresent the right tail.\n- Step 3: The correct approximation is Poisson: $$X \\approx \\mathrm{Po}(10)$$. Even though $$np = 10$$ is at the boundary, the Poisson captures the skewness correctly. The normal should only be used when $$p$$ is close to 0.5, regardless of whether $$np > 10$$.\n\nTakeaway: $$np > 10$$ alone doesn't justify a normal approximation ‚ÄĒ $$p$$ must also be close to 0.5. The $$np$$ rule is a guide for choosing between Poisson and normal, but the underlying shape (symmetric vs. skewed) is what really matters.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_49", "judge_pick": true}], "count": 50}, "glm_2": {"label": "GLM 5.1 ‚Ď°", "cards": [{"question": "When approximating a binomial distribution with a Poisson distribution, what two conditions on the binomial parameters $$n$$ and $$p$$ must generally be met, and what is the rough threshold for their product? (2 steps)", "answer": "- Step 1: The conditions are that $$n$$ must be large and $$p$$ must be small. This represents a scenario where we are counting the number of \"rare\" events occurring over many trials.\n- Step 2: The rough threshold for their product is $$np \\leqslant 10$$. This ensures the mean is small enough that the distribution remains positively skewed (like a Poisson distribution) rather than becoming symmetric (like a Normal distribution).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why does the Poisson approximation make conceptual sense when $$n$$ is large and $$p$$ is small? Connect the mean and variance of the Binomial to the defining condition of the Poisson distribution. (3 steps)", "answer": "- Step 1: For a Binomial random variable $$X \\sim B(n, p)$$, the mean is $$E(X) = np$$ and the variance is $$Var(X) = np(1-p)$$.\n- Step 2: If $$p$$ is small, then $$(1-p)$$ is very close to 1. This means the variance $$np(1-p)$$ becomes approximately equal to the mean $$np$$.\n- Step 3: A defining characteristic of the Poisson distribution is that its mean equals its variance. Thus, when $$p$$ is small, the Binomial distribution naturally satisfies this Poisson property, making it a mathematically valid approximation.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_1", "judge_pick": false}, {"question": "If a random variable $$X \\sim B(n, p)$$ is approximated by a Poisson distribution $$Y \\sim Po(\\lambda)$$, what is the value of $$\\lambda$$?", "answer": "The parameter $$\\lambda$$ is equal to $$np$$. The mean of the Poisson distribution is set equal to the mean of the Binomial distribution it is approximating, ensuring both distributions are centered at the same expected value.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_2", "judge_pick": false}, {"question": "Let $$X \\sim B(n, p)$$. Show that if we approximate $$X$$ using a Poisson distribution, the Poisson approximation will always give a higher probability for $$P(X=0)$$ than the exact Binomial calculation. (4 steps)", "answer": "- Step 1: Write the exact Binomial probability for 0 successes: $$P(X=0) = (1-p)^n$$.\n- Step 2: Write the Poisson approximation probability for 0 successes, using $$\\lambda = np$$: $$P(Y=0) = e^{-np}$$.\n- Step 3: Recall the Maclaurin series expansion for $$e^x$$: $$e^x = 1 + x + \\frac{x^2}{2!} + \\dots$$. Substitute $$x = -p$$ to get $$e^{-p} = 1 - p + \\frac{p^2}{2!} - \\dots$$\n- Step 4: Since $$p$$ is small and positive, the alternating terms decrease in magnitude. Therefore, $$e^{-p} > 1 - p$$. Raising both sides to the power of $$n$$ gives $$(e^{-p})^n > (1-p)^n$$, which simplifies to $$e^{-np} > (1-p)^n$$. Thus, the Poisson approximation for $$P(X=0)$$ is always an overestimate.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_3", "judge_pick": true}, {"question": "Suppose $$Y \\sim B(200, 0.98)$$. You want to use a Poisson approximation. How should you transform this problem so that the conditions for the approximation are met? (3 steps)", "answer": "- Step 1: The Poisson approximation requires $$p$$ to be small, but here $$p = 0.98$$ is very large. We must look at the \"failures\" instead of the \"successes\".\n- Step 2: Define $$X$$ as the number of failures, so $$X \\sim B(200, 1 - 0.98) = B(200, 0.02)$$. Now the probability $$p = 0.02$$ is small.\n- Step 3: Approximate $$X$$ using a Poisson distribution: $$X \\sim Po(200 \\times 0.02) = Po(4)$$. To find probabilities about $$Y$$, convert them: for example, finding $$P(Y = 197)$$ is equivalent to finding $$P(X = 3)$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_4", "judge_pick": false}, {"question": "When approximating a binomial distribution with a normal distribution, what conditions on $$n$$ and $$p$$ must be satisfied, and why does the value of $$p$$ matter? (2 steps)", "answer": "- Step 1: The conditions are that $$n$$ is large and $$p$$ is close to 0.5.\n- Step 2: The value of $$p$$ must be close to 0.5 because the normal distribution is perfectly symmetric. When $$p \\approx 0.5$$, the binomial distribution is also roughly symmetric, making the bell curve a good fit. If $$p$$ is far from 0.5, the binomial distribution is heavily skewed, and a symmetric normal curve will be a poor approximation.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_5", "judge_pick": false}, {"question": "If a binomial distribution $$X \\sim B(n, p)$$ is approximated by a normal distribution $$Y \\sim N(\\mu, \\sigma^2)$$, what are the formulas for $$\\mu$$ and $$\\sigma$$?", "answer": "The mean is $$\\mu = np$$ and the standard deviation is $$\\sigma = \\sqrt{np(1-p)}$$. The normal distribution is parameterized to match both the mean and the variance of the binomial distribution it is approximating.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_6", "judge_pick": false}, {"question": "Why is a continuity correction necessary when using a continuous normal distribution to approximate a discrete binomial distribution? (3 steps)", "answer": "- Step 1: The binomial distribution assigns probability to exact integer values (e.g., $$P(X=5)$$ is a discrete bar of height at $$x=5$$). The normal distribution distributes probability continuously across intervals, where the probability at any exact point is zero.\n- Step 2: To approximate the probability of a discrete integer $$X=k$$ using a continuous curve, we must capture the area under the curve centered around $$k$$, which spans from $$k - 0.5$$ to $$k + 0.5$$.\n- Step 3: More generally, because discrete points have no width, we extend the discrete boundary by 0.5 towards the direction of inclusion to capture the correct area under the continuous curve, ensuring we don't miss or double-count the probability mass at the integer boundaries.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_7", "judge_pick": false}, {"question": "Given a discrete random variable $$X$$ and its continuous normal approximation $$Y$$, how do you apply continuity corrections to the following: $$P(X \\leqslant a)$$, $$P(X < a)$$, $$P(X = a)$$, and $$P(a \\leqslant X \\leqslant b)$$? (4 steps)", "answer": "- Step 1: $$P(X \\leqslant a)$$ includes all values up to and including $$a$$. On the continuous scale, this area extends up to $$a + 0.5$$. So, approximate as $$P(Y < a + 0.5)$$.\n- Step 2: $$P(X < a)$$ includes values strictly less than $$a$$, which means up to $$a - 1$$. This area extends up to $$(a-1) + 0.5 = a - 0.5$$. So, approximate as $$P(Y < a - 0.5)$$.\n- Step 3: $$P(X = a)$$ is the single point $$a$$. The continuous equivalent is the interval from $$a - 0.5$$ to $$a + 0.5$$. So, approximate as $$P(a - 0.5 < Y < a + 0.5)$$.\n- Step 4: $$P(a \\leqslant X \\leqslant b)$$ includes the endpoints $$a$$ and $$b$$. Extend outwards by 0.5 on both sides. So, approximate as $$P(a - 0.5 < Y < b + 0.5)$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_8", "judge_pick": false}, {"question": "If you need to approximate a binomial distribution with a normal distribution, should you go directly to the normal distribution, or first approximate to Poisson and then to normal? Why? (2 steps)", "answer": "- Step 1: You should always go directly from Binomial to Normal.\n- Step 2: Each approximation introduces a small error. Going via the Poisson distribution introduces two sources of error (Binomial $$\\rightarrow$$ Poisson, then Poisson $$\\rightarrow$$ Normal), whereas the direct method (Binomial $$\\rightarrow$$ Normal) only introduces one source of error, making it more accurate.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_9", "judge_pick": false}, {"question": "A fair coin is tossed 100 times. Let $$X$$ be the number of heads. Using a normal approximation, estimate the probability of getting more than 55 heads. State the normal parameters and the exact continuity-corrected inequality for $$Y$$. (3 steps)", "answer": "- Step 1: $$X \\sim B(100, 0.5)$$. The normal approximation parameters are mean $$\\mu = np = 100 \\times 0.5 = 50$$ and standard deviation $$\\sigma = \\sqrt{np(1-p)} = \\sqrt{100 \\times 0.5 \\times 0.5} = \\sqrt{25} = 5$$. So $$Y \\sim N(50, 25)$$.\n- Step 2: We need $$P(X > 55)$$. Since the inequality is strictly greater than 55, the integer 55 is not included. The continuous equivalent must stop right before 55, at $$55 - 0.5 = 54.5$$.\n- Step 3: The approximation is $$P(Y > 54.5)$$. (Mental check: 54.5 is 4.5 above the mean of 50, which is almost 1 standard deviation. The upper tail past 1 SD is roughly 16%, so we expect an answer slightly less than 16%).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_10", "judge_pick": true}, {"question": "Under what condition can a Poisson distribution $$X \\sim Po(\\lambda)$$ be approximated by a normal distribution, what are the parameters of the normal distribution, and why do the parameters take this form? (3 steps)", "answer": "- Step 1: The condition is that $$\\lambda$$ must be large (typically $$\\lambda > 10$$). As $$\\lambda$$ increases, the Poisson distribution becomes less positively skewed and more bell-shaped.\n- Step 2: The normal approximation is $$Y \\sim N(\\lambda, \\lambda)$$. This means the mean is $$\\lambda$$ and the variance is $$\\lambda$$.\n- Step 3: The parameters take this form because a defining property of any Poisson distribution is that its mean equals its variance. The normal approximation must match both the mean and the variance of the distribution it is approximating to be accurate.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_11", "judge_pick": true}, {"question": "Breakdowns occur at a rate of 25 per week. Let $$X$$ be the number of breakdowns. Using a normal approximation, estimate $$P(X \\leqslant 20)$$. State the normal parameters and the exact continuity-corrected inequality for $$Y$$. (3 steps)", "answer": "- Step 1: $$X \\sim Po(25)$$. Since $$\\lambda = 25 > 10$$, we use a normal approximation. The parameters are mean $$\\mu = 25$$ and variance $$\\sigma^2 = 25$$, so standard deviation $$\\sigma = 5$$. Thus, $$Y \\sim N(25, 25)$$.\n- Step 2: We need $$P(X \\leqslant 20)$$. Since the inequality includes 20, the continuous area must extend to cover the bar at 20 fully, reaching $$20 + 0.5 = 20.5$$.\n- Step 3: The approximation is $$P(Y < 20.5)$$. (Mental check: 20.5 is 4.5 below the mean of 25, which is 0.9 standard deviations below the mean. This should give a probability around 18%).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_12", "judge_pick": true}, {"question": "You have a binomial distribution $$B(n, p)$$ where $$n$$ is large. How do you decide whether to use a Poisson approximation or a Normal approximation? (2 steps)", "answer": "- Step 1: Calculate the mean, $$np$$.\n- Step 2: If $$np \\leqslant 10$$ (meaning $$p$$ is small), use a Poisson approximation. If $$np > 10$$ and $$p$$ is close to 0.5, use a Normal approximation. If $$np > 10$$ but $$p$$ is not close to 0.5, the Normal approximation is still generally the standard choice in this syllabus, though the skew might make it less accurate than when $$p \\approx 0.5$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_13", "judge_pick": false}, {"question": "A spinner lands on red 10% of the time. In 60 spins, we count the number of reds, $$X$$. In 150 spins, we count the number of reds, $$R$$. Which approximation is suitable for $$X$$ and which for $$R$$? (2 steps)", "answer": "- Step 1: For $$X$$, $$n=60, p=0.1$$. The mean is $$np = 6$$. Since $$np \\leqslant 10$$ and $$p$$ is small, a Poisson approximation $$Po(6)$$ is suitable.\n- Step 2: For $$R$$, $$n=150, p=0.1$$. The mean is $$np = 15$$. Since $$np > 10$$, the mean is large enough that the distribution starts to become un-skewed, so a Normal approximation is suitable. (Even though $$p=0.1$$ is not close to 0.5, the large $$n$$ makes the Normal approximation the required method over Poisson in this context).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_14", "judge_pick": true}, {"question": "A box contains 500 switches with a 0.005 fault probability. Let $$X$$ be the number of faulty switches. We want to find $$P(X < 2)$$. Compare using the Poisson approximation vs the Normal approximation for this specific scenario. Which is better and why? (3 steps)", "answer": "- Step 1: The parameters are $$n=500, p=0.005$$, so mean $$np = 2.5$$. The exact probability for $$P(X < 2)$$ is mostly concentrated at $$X=0$$ and $$X=1$$.\n- Step 2: Poisson approximation gives $$Po(2.5)$$. This captures the highly skewed, non-negative nature of the distribution at low means, yielding accurate probabilities for $$X=0$$ and $$X=1$$.\n- Step 3: Normal approximation gives $$N(2.5, 2.4875)$$. The normal curve is symmetric and extends into negative values. When calculating $$P(X < 2)$$, using a continuity correction ($$Y < 1.5$$), the symmetric bell curve poorly fits the heavily right-skewed reality of the data near the boundary at 0. Thus, the Poisson approximation is vastly superior here because $$p$$ is very small and $$np \\leqslant 10$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_15", "judge_pick": true}, {"question": "When calculating the percentage error of an approximation compared to an exact probability, what is the formula?", "answer": "Percentage error = $$\\frac{|\\text{Exact Probability} - \\text{Approximate Probability}|}{\\text{Exact Probability}} \\times 100\\%$$. It measures the relative size of the error compared to the true value, giving a standardized sense of how far off the approximation is regardless of the magnitude of the probability itself.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_16", "judge_pick": false}], "count": 17}, "glm_3": {"label": "GLM 5.1 ‚ĎĘ", "cards": [{"question": "When can a binomial distribution $$X \\sim \\mathrm{B}(n, p)$$ be approximated by a Poisson distribution? What is the parameter of the resulting Poisson distribution? (2 steps)", "answer": "- Step 1: The conditions for the approximation are that $$n$$ must be large and $$p$$ must be small. A common rule of thumb is that $$np \\leqslant 10$$.\n- Step 2: The binomial distribution is approximated by $$\\operatorname{Po}(\\lambda)$$, where the parameter $$\\lambda = np$$.\n\nTakeaway: Large $$n$$, small $$p$$, use Poisson with $$\\lambda = np$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_0", "judge_pick": false}, {"question": "Why does it make intuitive sense that the mean and variance of a binomial distribution become approximately equal when $$p$$ is small? How does this support using a Poisson approximation? (2 steps)", "answer": "- Step 1: For a binomial distribution, the mean is $$\\mathrm{E}(X) = np$$ and the variance is $$\\operatorname{Var}(X) = np(1-p)$$. When $$p$$ is very small, the term $$(1-p)$$ is very close to 1.\n- Step 2: This causes the variance $$np(1-p)$$ to be approximately equal to $$np$$, which is the mean. Since a defining characteristic of the Poisson distribution is that its mean and variance are equal, this mathematical alignment makes the Poisson distribution a suitable approximation.\n\nTakeaway: Small $$p$$ means $$(1-p) \\approx 1$$, so $$\\operatorname{Var} \\approx \\text{Mean}$$, matching Poisson.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_1", "judge_pick": false}, {"question": "A random variable $$X \\sim \\mathrm{B}(200, 0.98)$$. To use a Poisson approximation, how should you re-frame this problem, and what is the resulting approximate distribution? (2 steps)", "answer": "- Step 1: The condition for a Poisson approximation is a small $$p$$. Here $$p = 0.98$$ is large, not small. However, we can consider the number of failures instead of successes, which has probability $$1 - 0.98 = 0.02$$.\n- Step 2: Let $$Y$$ be the number of failures. Then $$Y \\sim \\mathrm{B}(200, 0.02)$$. Now $$p = 0.02$$ is small and $$n = 200$$ is large, so we can approximate $$Y$$ using $$\\operatorname{Po}(200 \\times 0.02) = \\operatorname{Po}(4)$$.\n\nTakeaway: If $$p$$ is large, swap \"success\" and \"failure\" so $$p$$ becomes small.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_2", "judge_pick": true}, {"question": "When approximating a binomial distribution with a Poisson distribution, do you need to apply a continuity correction? Why or why not? (2 steps)", "answer": "- Step 1: No, a continuity correction is not needed.\n- Step 2: Both the binomial distribution and the Poisson distribution are discrete distributions. A continuity correction is only required when approximating a discrete distribution with a continuous one (like the normal distribution).\n\nTakeaway: Discrete to discrete = no continuity correction.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_3", "judge_pick": true}, {"question": "Let $$X \\sim \\mathrm{B}(n, p)$$. Show that if we approximate $$X$$ with a Poisson distribution, the approximation will always be an overestimate for $$\\mathrm{P}(X = 0)$$. (3 steps)", "answer": "- Step 1: Write the exact binomial probability for $$X=0$$. Since there are zero successes, every trial must be a failure, so $$\\mathrm{P}(X=0) = (1-p)^n$$.\n- Step 2: Write the Poisson approximation for this probability. With $$\\lambda = np$$, the Poisson probability is $$\\mathrm{P}(Y=0) = e^{-\\lambda} = e^{-np}$$.\n- Step 3: Compare the two. We can rewrite the exact binomial probability using the limit definition of $$e$$: $$(1-p)^n = \\left((1-p)^{1/p}\\right)^{np}$$. Since $$(1-p)^{1/p} < e$$ for $$0 < p < 1$$, it follows that $$(1-p)^n < e^{np}$$, meaning $$(1-p)^n < e^{-np}$$. Thus, the Poisson probability is always slightly larger.\n\nTakeaway: Poisson overestimates the probability of zero occurrences compared to the true binomial.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_4", "judge_pick": false}, {"question": "When can a binomial distribution $$X \\sim \\mathrm{B}(n, p)$$ be approximated by a normal distribution? What are the parameters of the resulting normal distribution? (2 steps)", "answer": "- Step 1: The conditions are that $$n$$ must be large and $$p$$ must be close to 0.5. The approximation works well because the normal distribution is symmetrical, and a binomial distribution becomes increasingly symmetrical as $$p$$ approaches 0.5.\n- Step 2: The binomial is approximated by $$\\mathrm{N}(\\mu, \\sigma^2)$$ where the mean $$\\mu = np$$ and the variance $$\\sigma^2 = np(1-p)$$.\n\nTakeaway: Large $$n$$, $$p \\approx 0.5$$, use Normal with $$\\mu = np$$, $$\\sigma^2 = np(1-p)$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_5", "judge_pick": false}, {"question": "Why must a continuity correction be applied when using a normal distribution to approximate a binomial distribution? Visually, what does this correction do? (2 steps)", "answer": "- Step 1: The binomial distribution is discrete (values are integers like 5, 6, 7), whereas the normal distribution is continuous (values can be any real number, like 5.3 or 6.8). A single integer point in the discrete distribution has probability mass, but a single point in a continuous distribution has zero probability.\n- Step 2: Visually, the probability of a discrete value like $$X=6$$ is represented by a bar of height $$\\mathrm{P}(X=6)$$ and width 1 (from 5.5 to 6.5). To approximate the area of this bar using the smooth continuous curve, we must integrate between 5.5 and 6.5. Adding or subtracting 0.5 to the boundary values is the continuity correction.\n\nTakeaway: We shift the boundaries by 0.5 to capture the full \"area\" of the discrete integer bars under the continuous curve.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_6", "judge_pick": true}, {"question": "If $$X$$ is a discrete binomial variable approximated by a continuous normal variable $$Y$$, how do you apply the continuity correction for $$\\mathrm{P}(X \\leqslant a)$$ and $$\\mathrm{P}(X \\geqslant a)$$? (2 steps)", "answer": "- Step 1: For $$\\mathrm{P}(X \\leqslant a)$$, we want to include the entire bar for $$X=a$$. The bar extends up to $$a + 0.5$$, so we approximate as $$\\mathrm{P}(Y < a + 0.5)$$.\n- Step 2: For $$\\mathrm{P}(X \\geqslant a)$$, we want to include the entire bar for $$X=a$$. The bar starts at $$a - 0.5$$, so we approximate as $$\\mathrm{P}(Y > a - 0.5)$$.\n\nTakeaway: \"$$\\leqslant$$\" pushes the boundary up by 0.5; \"$$\\geqslant$$\" pushes the boundary down by 0.5.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_7", "judge_pick": false}, {"question": "If $$X$$ is a discrete binomial variable approximated by a continuous normal variable $$Y$$, how do you apply the continuity correction for $$\\mathrm{P}(X = a)$$ and $$\\mathrm{P}(a < X < b)$$? (2 steps)", "answer": "- Step 1: For the exact equality $$\\mathrm{P}(X = a)$$, we must capture the area of the bar at $$a$$, which spans from $$a - 0.5$$ to $$a + 0.5$$. Thus, we approximate as $$\\mathrm{P}(a - 0.5 < Y < a + 0.5)$$.\n- Step 2: For a strict inequality like $$\\mathrm{P}(a < X < b)$$, we exclude the bars at $$a$$ and $$b$$, but include the bars at $$a+1$$ up to $$b-1$$. The outer boundaries of this range are $$a + 0.5$$ and $$b - 0.5$$. Thus, we approximate as $$\\mathrm{P}(a + 0.5 < Y < b - 0.5)$$.\n\nTakeaway: Equality spans $$\\pm 0.5$$; strict inequalities shrink the interval by 0.5 on each side.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_8", "judge_pick": false}, {"question": "A binomial variable $$X \\sim \\mathrm{B}(150, 0.48)$$ is approximated by $$Y \\sim \\mathrm{N}(72, 6.12^2)$$. To find $$\\mathrm{P}(80 \\leqslant X < 90)$$, what inequality for $$Y$$ should you calculate? (2 steps)", "answer": "- Step 1: Identify the boundary conditions. We want to include the bar at $$X=80$$ (so the lower bound is $$80 - 0.5 = 79.5$$) and we want to exclude the bar at $$X=90$$ (so the upper bound is $$90 - 0.5 = 89.5$$).\n- Step 2: The corresponding normal approximation inequality is $$\\mathrm{P}(79.5 < Y < 89.5)$$.\n\nTakeaway: \"$$\\leqslant$$\" and \"$$<$$\" at the upper end both push the upper bound to $$-0.5$$ for the $$<$$ symbol on $$Y$$; \"$$\\leqslant$$\" and \"$$\\geqslant$$\" at the lower end push the lower bound to $$-0.5$$ for the $$>$$ symbol on $$Y$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_9", "judge_pick": false}, {"question": "For a binomial variable $$X$$, the exact probability $$\\mathrm{P}(X=50) = 0.0365$$, and the normal approximation gives $$0.0362$$. What is the percentage error of the approximation? (2 steps)", "answer": "- Step 1: The formula for percentage error is $$\\frac{\\text{Exact} - \\text{Approximate}}{\\text{Exact}} \\times 100\\%$$.\n- Step 2: Plugging in the values: $$\\frac{0.0365 - 0.0362}{0.0365} \\times 100\\% = \\frac{0.0003}{0.0365} \\times 100\\% \\approx 0.82\\%$$.\n\nTakeaway: Percentage error measures how far the approximation deviates from the exact value as a proportion of the exact value.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_10", "judge_pick": false}, {"question": "When can a Poisson distribution $$X \\sim \\operatorname{Po}(\\lambda)$$ be approximated by a normal distribution? What are the parameters of the resulting normal distribution, and why do they take this form? (3 steps)", "answer": "- Step 1: The approximation is valid when the mean $$\\lambda$$ is large (typically $$\\lambda > 10$$).\n- Step 2: The resulting distribution is $$Y \\sim \\mathrm{N}(\\lambda, \\lambda)$$.\n- Step 3: This is because a Poisson distribution has the property that its variance is exactly equal to its mean (both are $$\\lambda$$). When choosing a normal distribution to approximate it, we match both the mean and the variance to preserve the center and spread of the distribution.\n\nTakeaway: Large $$\\lambda$$, use Normal with $$\\mu = \\lambda$$, $$\\sigma^2 = \\lambda$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_11", "judge_pick": true}, {"question": "Why does a Poisson distribution with a large $$\\lambda$$ look like a normal distribution? (2 steps)", "answer": "- Step 1: A Poisson distribution is skewed to the right when $$\\lambda$$ is small. However, as $$\\lambda$$ increases, the distribution shifts to the right and spreads out.\n- Step 2: Because the standard deviation is $$\\sqrt{\\lambda}$$, the spread grows slower than the mean, making the distribution appear more concentrated and symmetric relative to its center. In the limit as $$\\lambda \\to \\infty$$, the shape converges to the bell curve of a normal distribution.\n\nTakeaway: Large $$\\lambda$$ reduces the relative skewness, making the Poisson shape symmetric like the normal curve.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_12", "judge_pick": true}, {"question": "A Poisson variable $$X \\sim \\operatorname{Po}(25)$$ is approximated by a normal variable $$Y$$. Write down the distribution of $$Y$$ and the corrected inequality to estimate $$\\mathrm{P}(X > 30)$$. (2 steps)", "answer": "- Step 1: Since $$\\lambda = 25$$, the mean is 25 and the variance is 25. Thus, $$Y \\sim \\mathrm{N}(25, 25)$$.\n- Step 2: Since $$X$$ is discrete and we want $$X > 30$$ (which means $$X \\geqslant 31$$), we apply the continuity correction by subtracting 0.5 from the lower bound. The inequality becomes $$\\mathrm{P}(Y > 30.5)$$.\n\nTakeaway: Approximating discrete Poisson with continuous Normal requires the same 0.5 boundary adjustments as with Binomial.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_13", "judge_pick": true}, {"question": "A spinner lands on red 10% of the time. You spin it 60 times and want to estimate the probability of fewer than 4 reds. Should you use a Poisson or Normal approximation, and why? (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of reds, so $$X \\sim \\mathrm{B}(60, 0.1)$$. Calculate the mean: $$np = 60 \\times 0.1 = 6$$.\n- Step 2: Since $$p = 0.1$$ is small and the mean $$np = 6 \\leqslant 10$$, the conditions favor a Poisson approximation. We would use $$\\operatorname{Po}(6)$$.\n\nTakeaway: Small $$p$$ and $$np \\leqslant 10$$ points directly to a Poisson approximation.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_14", "judge_pick": false}, {"question": "A spinner lands on red 10% of the time. You spin it 150 times and want to estimate the probability of more than 20 reds. Should you use a Poisson or Normal approximation, and why? (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of reds, so $$X \\sim \\mathrm{B}(150, 0.1)$$. Calculate the mean: $$np = 150 \\times 0.1 = 15$$.\n- Step 2: Since the mean $$np = 15 > 10$$, the Poisson tables cannot be easily used (and the distribution is large enough to be symmetric), so a Normal approximation is appropriate. We would use $$\\mathrm{N}(15, 13.5)$$ where variance is $$150 \\times 0.1 \\times 0.9 = 13.5$$.\n\nTakeaway: When $$np > 10$$, even if $$p$$ is small, a Normal approximation becomes the standard choice.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_15", "judge_pick": false}, {"question": "When approximating a binomial distribution with a normal distribution, why is it better to go directly to the normal distribution rather than using a Poisson approximation as an intermediate step? (2 steps)", "answer": "- Step 1: Every time you use an approximation, you introduce a small error. If you approximate Binomial $$\\rightarrow$$ Poisson $$\\rightarrow$$ Normal, you compound the errors from both steps.\n- Step 2: Going directly from Binomial $$\\rightarrow$$ Normal involves only one approximation step, resulting in a more accurate final probability.\n\nTakeaway: Fewer steps of approximation mean less accumulated error.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_16", "judge_pick": false}, {"question": "A box contains 500 electrical switches, each with a 0.005 probability of being faulty. You want to find $$\\mathrm{P}(X < 2)$$ where $$X$$ is the number of faulty switches. Which approximation is most appropriate and why? (2 steps)", "answer": "- Step 1: The exact distribution is $$X \\sim \\mathrm{B}(500, 0.005)$$. Here $$p = 0.005$$ is very small and $$n = 500$$ is large. The mean is $$np = 500 \\times 0.005 = 2.5$$.\n- Step 2: Since $$p$$ is small and $$np = 2.5 \\leqslant 10$$, the Poisson approximation is the most appropriate. The normal approximation would fail here because the distribution is heavily skewed (not close to 0.5) and the mean is too small for the bell curve to fit the shape accurately.\n\nTakeaway: Very small $$p$$ and small mean $$np$$ heavily favor the Poisson model due to the underlying skewness.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_17", "judge_pick": false}, {"question": "Using the scenario from Q18 (500 switches, $$p=0.005$$), compare the conceptual oximation.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_19", "judge_pick": true}], "count": 20}, "qwen_1": {"label": "Qwen 3 ‚Ď†", "cards": [{"question": "What are the conditions required for approximating a binomial distribution with a Poisson distribution, and why do these conditions ensure the approximation works well? (3 steps)", "answer": "- Step 1: **Conditions**: The binomial distribution $ X \\sim \\mathrm{B}(n, p) $ can be approximated by a Poisson distribution when $ n $ is large, $ p $ is small, and $ np \\leq 10 $.  \n- Step 2: **Variance justification**: For binomial distributions, $ \\mathrm{Var}(X) = np(1-p) $. When $ p $ is small, $ 1-p \\approx 1 $, so $ \\mathrm{Var}(X) \\approx np $, matching the Poisson property where mean and variance are equal.  \n+ Example: If $ n = 200 $ and $ p = 0.03 $, $ np = 6 $, satisfying the condition.  \n- Step 3: **Practicality**: Larger $ n $ and smaller $ p $ make $ (1-p) $ closer to 1, improving the match between binomial and Poisson distributions.  \n\n**Takeaway**: The approximation leverages the convergence of binomial variance to its mean under these conditions.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Why does a Poisson approximation to the binomial distribution always overestimate $ \\mathrm{P}(X=0) $? (3 steps)", "answer": "- Step 1: **Exact binomial**: $ \\mathrm{P}(X=0) = (1-p)^n $.  \n- Step 2: **Poisson approximation**: $ \\mathrm{P}(Y=0) = e^{-\\lambda} $ where $ \\lambda = np $.  \n- Step 3: **Inequality proof**: Since $ 1-p < e^{-p} $ for $ p > 0 $, raising both sides to $ n $ gives $ (1-p)^n < e^{-np} $.  \n+ Example: For $ n = 100 $, $ p = 0.01 $, $ (1-p)^n \\approx 0.366 $, while $ e^{-1} \\approx 0.368 $.  \n\n**Takeaway**: The Poisson overestimates because $ e^{-p} $ decays slower than $ 1-p $.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When is a normal distribution used to approximate a binomial distribution, and why is a  distribution $ X \\sim \\mathrm{Po}(15) $, why is a normal approximation acceptable? Calculate $ \\mathrm{P}(X > 20) $ using this approximation. (4 steps)", "answer": "- Step 1: **Acceptability**: $ \\lambda = 15 > 10 $, so the distribution is approximately normal.  \n- Step 2: **Parameters**: $ Y \\sim \\mathrm{N}(15, 15) $.  \n- Step 3: **Continuity correction**: $ \\mathrm{P}(X > 20) \\approx \\mathrm{P}(Y > 20.5) $.  \n- Step 4: **Standardization**:  \n  $$\n  Z = \\frac{20.5 - 15}{\\sqrt{15}} \\approx 1.42 \\Rightarrow \\mathrm{P}(Z > 1.42) = 1 - 0.9222 = 0.0778.\n  $$  \n+ Example: Exact Poisson calculation gives $ \\mathrm{P}(X > 20) \\approx 0.077 $.  \n\n**Takeaway**: The normal approximation is viable for $ \\lambda > 10 $, with minimal error.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the percentage error when using a normal approximation for $ \\mathrm{P}(X = 50) $ where $ X \\sim \\mathrm{B}(80, 0.55) $? (4 steps)", "answer": "- Step 1: **Exact value**: $ \\mathrm{P}(X=50) = \\binom{80}{50}(0.55)^{50}(0.45)^{30} \\approx 0.0365 $.  \n- Step 2: **Normal parameters**: $ \\mu = 44 $, $ \\sigma = \\sqrt{19.8} \\approx 4.45 $.  \n- Step 3: **Approximation**: $ \\mathrm{P}(49.5 < Y < 50.5) \\approx 0.0362 $.  \n- Step 4: **Percentage error**:  \n  $$\n  \\frac{0.0365 - 0.0362}{0.0365} \\times 100\\% \\approx 0.82\\%.\n  $$  \n+ Insight: The error is minimal due to the normal curve closely fitting the binomial distribution.  \n\n**Takeaway**: Continuity correction minimizes error in approximations.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you approximate $ \\mathrm{P}(X < 4) $ for $ X \\sim \\mathrm{B}(60, 0.1) $? Justify the method and compute the result. (4 steps)", "answer": "- Step 1: **Method**: Use Poisson approximation since $ np = 6 \\leq 10 $ and $ p $ is small.  \n- Step 2: **Parameters**: $ \\lambda = 6 $.  \n- Step 3: **Calculation**:  \n  $$\n  \\mathr l Limit Theorem play? (3 steps)", "answer": "- Step 1: Define parameters: The normal approximation uses őľ = np and ŌÉ¬≤ = np(1-p). This is valid when **n is large** and **p is close to 0.5**, ensuring symmetry.\n- Step 2: Apply the Central Limit Theorem (CLT): As n increases, the binomial distribution (sum of Bernoulli trials) approaches a normal distribution due to the CLT.\n- Step 3: Use continuity correction: Adjust discrete binomial probabilities (e.g., P(X ‚Č§ k) ‚Čą P(Y ‚Č§ k + 0.5)) to match the continuous normal distribution.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why is a continuity correction necessary when approximating a binomial distribution with the normal distribution? (2 steps)", "answer": "- Step 1: Discrete ‚Üí Continuous Mismatch: The binomial distribution is discrete (e.g., X=3), while the normal distribution is continuous (e.g., 3 ‚Č§ Y < 3.5). A continuity correction bridges this gap by spreading discrete points over intervals.\n- Step 2: Adjust probabilities: For example, P(X ‚Č• 5) in binomial becomes P(Y ‚Č• 4.5) in normal approximation, ensuring the area under the curve aligns with the discrete probability.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Under what conditions can a Poisson distribution be approximated by a normal distribution, and why is this valid? (2 steps)", "answer": "- Step 1: Large őĽ threshold: If őĽ > 10, the Poisson distribution becomes approximately normal because the mean őĽ and variance őĽ grow, making the distribution less skewed.\n- Step 2: Apply CLT: A Poisson distribution is the sum of many independent rare events. As őĽ increases, the CLT ensures the distribution tends toward normality, with parameters őľ = őĽ and ŌÉ¬≤ = őĽ.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_4", "judge_pick": true}, {"question": "How do you choose between a Poisson and a normal approximation for a binomial distribution? (3 steps)", "answer": "- Step 1: Check ő p.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is the Poisson approximation to the binomial invalid when p is close to 0.5 and n is large? (2 steps)", "answer": "- Step 1: őĽ = np behavior: When p ‚Čą 0.5, őĽ = np grows large (e.g., n=1000, p=0.5 ‚Üí őĽ=500). Poisson distributions with large őĽ become approximately normal.\n- Step 2: Better alternative: A direct normal approximation is more appropriate here since the Poisson approximation is designed for rare events (small p), not symmetric cases.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ‚Ď†", "cards": [{"question": "Under what two conditions can a binomial distribution B(n,p) be approximated by a Poisson distribution Po(őĽ)? What is the value of őĽ in this approximation? (2 steps)", "answer": "- Step 1: The conditions are that n must be large and p must be small. The exact thresholds aren't strictly defined, but typically np ‚Č§ 10 works as a guideline.\n- Step 2: The parameter őĽ is calculated as őĽ = np (the mean of the binomial distribution). This works because when p is small, (1-p) ‚Čą 1, so the variance np(1-p) ‚Čą np = őĽ, matching the Poisson property that mean ‚Čą variance.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why does the Poisson approximation work better when p is very small rather than when p is close to 0.5? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mean equals the variance (E(X) = Var(X) = őĽ). For a binomial B(n,p), the variance is np(1-p).\n- Step 2: When p is very small, (1-p) ‚Čą 1, so Var(X) ‚Čą np = őĽ. This makes the binomial's mean and variance approximately equal, satisfying the Poisson condition. When p is close to 0.5, (1-p) ‚Čą 0.5, so the variance is about half the mean, which doesn't match the Poisson's equal mean-variance property.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A manufacturer produces 1000 items with a defect probability of 0.003. What Poisson distribution would approximate the number of defective items, and why is this approximation valid? (2 steps)", "answer": "- Step 1: Calculate őĽ = np = 1000 √ó 0.003 = 3. So we approximate with Po(3).\n- Step 2: The approximation is valid because n = 1000 is large and p = 0.003 is small. Also, őĽ = 3 ‚Č§ 10, which satisfies the typical guideline for when Poisson approximation works well.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What are the two conditions for approximating a binomial distribution B(n,p) using a normal distribution N(őľ,ŌÉ¬≤)? What are the formulas for őľ and ŌÉ? (2 steps)", "answer": "- Step 1: The conditions are: (1) n is large, and (2) p is close to 0.5. The normal approximation works best when the binomial distribution is roughly symmetrical, which occurs when p ‚Čą 0.5.\n- Step 2: The parameters are őľ = np and ŌÉ = ‚ąö(np(1-p)). These match the mean and standard deviation of the binomial distribution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For X ~ B(100, 0.53), write down the normal approximation in the form N(őľ,ŌÉ¬≤) and explain why it satisfies the conditions for approximation. (2 steps)", "answer": "- Step 1: Calculate őľ = np = 100 √ó 0.53 = 53, and ŌÉ = ‚ąö(100 √ó 0.53 √ó 0.47) ‚Čą ‚ąö(24.91) ‚Čą 4.99. So the approximation is N(53, 4.99¬≤).\n- Step 2: This satisfies the conditions because n = 100 is large, and p = 0.53 is close to 0.5. The closer p is to 0.5, the more symmetric the binomial distribution becomes, making the normal approximation more accurate.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Why must we apply a continuity correction when using a normal approximation to a discrete binomial distribution? (2 steps)", "answer": "- Step 1: A binomial distribution is discrete (it takes integer values), while the normal distribution is continuous. When approximating, we need to account for this difference.\n- Step 2: For P(X = k), we use P(k - 0.5 < Y < k + 0.5) for the normal variable Y. For P(X ‚Č§ k), we use P(Y < k + 0.5). This \"spreads\" half a unit on each side to capture the discrete probability within the continuous distribution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Using a normal approximation, estimate P(X ‚Č§ 70) for X ~ B(150, 0.48), showing the continuity correction. (3 steps)", "answer": "- Step 1: Calculate the normal parameters: őľ = 150 √ó 0.48 = 72, ŌÉ = ‚ąö(150 √ó 0.48 √ó 0.52) = ‚ąö(37.44) ‚Čą 6.12. So Y ~ N(72, 6.12¬≤).\n- Step 2: Apply continuity correction: P(X ‚Č§ 70) ‚Čą P(Y < 70.5).\n- Step 3: Standardize: z = (70.5 - 72) / 6.12 ‚Čą -0.245. Using standard normal tables, P(Z < -0.245) ‚Čą 0.403.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What condition must be satisfied for approximating a Poisson distribution Po(őĽ) using a normal distribution? What are the parameters of the normal approximation? (2 steps)", "answer": "- Step 1: The condition is that őĽ must be large (typically őĽ > 10). The larger őĽ is, the better the approximation.\n- Step 2: The normal approximation is N(őĽ, őĽ), meaning the mean and variance both equal őĽ (same as the Poisson distribution).", "source": "MiniMax ‚Ď†", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Let X ~ Po(25). Use a normal approximation to estimate P(X > 30), showing the continuity correction. (3 steps)", "answer": "- Step 1: Since őĽ = 25 > 10, use normal approximation Y ~ N(25, 25), so ŌÉ = ‚ąö25 = 5.\n- Step 2: Apply continuity correction: P(X > 30) ‚Čą P(Y > 30.5).\n- Step 3: Standardize: z = (30.5 - 25) / 5 = 1.1. From tables, P(Z > 1.1) = 1 - 0.8643 = 0.1357.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A company has on average 21 breakdowns per week. Use a normal approximation to estimate the probability of more than 27 breakdowns in a week. (3 steps)", "answer": "- Step 1: X ~ Po(21), so use Y ~ N(21, 21) with ŌÉ = ‚ąö21 ‚Čą 4.58.\n- Step 2: Apply continuity correction: P(X > 27) ‚Čą P(Y > 27.5).\n- Step 3: Standardize: z = (27.5 - 21) / 4.58 ‚Čą 1.42. From tables, P(Z > 1.42) ‚Čą 0.078.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A spinner lands on red 10% of the time. For 60 spins, estimate the probability of fewer than 4 reds. Which approximation should be used and why? (3 steps)", "answer": "- Step 1: Let X ~ B(60, 0.1). Calculate the mean: E(X) = 60 √ó 0.1 = 6.\n- Step 2: Since E(X) = 6 ‚Č§ 10, use the Poisson approximation: X ‚Čą Po(6).\n- Step 3: P(X < 4) = P(X ‚Č§ 3) = 0.1512 (from Poisson tables).", "source": "MiniMax ‚Ď†", "_id": "minimax_1_10", "judge_pick": false}, {"question": "For 150 spins of the same spinner (p = 0.1), estimate the probability of more than 20 reds. Which approximation should be used? (3 steps)", "answer": "- Step 1: Let R ~ B(150, 0.1). Calculate E(R) = 150 √ó 0.1 = 15.\n- Step 2: Since E(R) = 15 > 10, use normal approximation: N(15, 13.5) with ŌÉ = ‚ąö13.5 ‚Čą 3.67.\n- Step 3: Apply continuity correction: P(R > 20) ‚Čą P(Y > 20.5). Standardize: z = (20.5 - 15) / 3.67 ‚Čą 1.50. P(Z > 1.50) = 1 - 0.9332 = 0.0668.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_11", "judge_pick": false}, {"question": "When approximating a binomial distribution, explain why you should go directly to the normal distribution rather than via a Poisson distribution. (2 steps)", "answer": "- Step 1: If you approximate B(n,p) ‚Üí Po(őĽ) ‚Üí N(őĽ,őĽ), you're making two approximations, each with its own error.\n- Step 2: Going directly from B(n,p) to N(np, np(1-p)) involves only one approximation, so the accumulated error is smaller and the result is more accurate.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the guideline for choosing between Poisson and normal approximations for a binomial distribution? (2 steps)", "answer": "- Step 1: Calculate the mean np.\n- Step 2: If np ‚Č§ 10, use Poisson approximation (since p is small). If np > 10, use normal approximation (since p is closer to 0.5 or n is large enough for symmetry).", "source": "MiniMax ‚Ď†", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why can't a Poisson approximation be used when p is close to 0.5 even if n is large? (2 steps)", "answer": "- Step 1: For Poisson, we need mean ‚Čą variance. For binomial, variance = np(1-p).\n- Step 2: When p ‚Čą 0.5, (1-p) ‚Čą 0.5, so variance ‚Čą 0.5np = 0.5őľ, which is much smaller than the mean őľ. This violates the Poisson condition (mean = variance), so Poisson approximation would be poor. Normal approximation works because binomial approaches normal symmetry when p ‚Čą 0.5.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A fair coin is tossed 70 times. Estimate the probability of obtaining more than 45 heads using an appropriate approximation. (3 steps)", "answer": "- Step 1: X ~ B(70, 0.5). Calculate őľ = 70 √ó 0.5 = 35, ŌÉ = ‚ąö(70 √ó 0.5 √ó 0.5) = ‚ąö17.5 ‚Čą 4.18.\n- Step 2: Since p = 0.5 exactly and n is large, use normal approximation: N(35, 4.18¬≤).\n- Step 3: Apply continuity correction: P(X > 45) ‚Čą P(Y > 45.5). Standardize: z = (45.5 - 35) / 4.18 ‚Čą 2.51. P(Z > 2.51) ‚Čą 0.006.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For X ~ Po(30), use a normal approximation to estimate P(25 ‚Č§ X ‚Č§ 35). (3 steps)", "answer": "- Step 1: Since őĽ = 30 > 10, use Y ~ N(30, 30) with ŌÉ = ‚ąö30 ‚Čą 5.48.\n- Step 2: Apply continuity correction: P(25 ‚Č§ X ‚Č§ 35) ‚Čą P(24.5 < Y < 35.5).\n- Step 3: Standardize: z‚āĀ = (24.5 - 30) / 5.48 ‚Čą -1.00, z‚āā = (35.5 - 30) / 5.48 ‚Čą 1.00. P(-1 < Z < 1) = 2 √ó 0.3413 = 0.6826.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A
