tion gives a quick estimate without computing large binomial coefficients. Both values should be close since őĽ = 2.19 ‚Č§ 10.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A machine produces 2.5% faulty nails, sold in packets of 200. Using Poisson approximation, find the probability of more than 6 faulty nails in a packet. (3 steps)", "answer": "- Step 1: X ~ B(200, 0.025). Since p is small, use Poisson: őĽ = 200 √ó 0.025 = 5. So X ‚Čą Po(5).\n- Step 2: P(X > 6) = 1 - P(X ‚Č§ 6).\n- Step 3: From Poisson tables with őĽ = 5, P(X ‚Č§ 6) ‚Čą 0.762. So P(X > 6) ‚Čą 0.238.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A drill bit manufacturer claims 52% last >40 hours. For 600 bits, use normal approximation to find P(300 < X ‚Č§ 350) where X is the number lasting >40 hours. (3 steps)", "answer": "- Step 1: X ~ B(600, 0.52). őľ = 600 √ó 0.52 = 312, ŌÉ = ‚ąö(600 √ó 0.52 √ó 0.48) = ‚ąö(149.76) ‚Čą 12.24.\n- Step 2: Apply continuity correction: P(300 < X ‚Č§ 350) ‚Čą P(300.5 < Y < 350.5).\n- Step 3: Standardize: z‚āĀ = (300.5 - 312) / 12.24 ‚Čą -0.94, z‚āā = (350.5 - 312) / 12.24 ‚Čą 3.15. P = ő¶(3.15) - ő¶(-0.94) ‚Čą 0.999 - 0.174 = 0.825.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_22", "judge_pick": false}, {"question": "For X ~ B(120, 0.46), find the percentage error when using normal approximation for P(X = 65). (3 steps)", "answer": "- Step 1: Exact binomial: P(X = 65) = C(120,65) √ó 0.46‚Ā∂‚ĀĶ √ó 0.54‚ĀĶ‚ĀĶ ‚Čą 0.0365 (using calculator).\n- Step 2: Normal approximation: őľ = 120 √ó 0.46 = 55.2, ŌÉ = ‚ąö(120 √ó 0.46 √ó 0.54) ‚Čą 5.41. For P(X = 65), use P(64.5 < Y < 65.5). z‚āĀ = (64.5 - 55.2)/5.41 ‚Čą 1.72, z‚āā = (65.5 - 55.2)/5.41 ‚Čą 1.90. P ‚Čą ő¶(1.90) - ő¶(1.72) ‚Čą 0.971 - 0.957 = 0.014.\n- Step 3: Percentage error = |0.0365 - 0.014| / 0.0365 √ó 100% ‚Čą 62%. (Note: This is a poor approximation because p = 0.46 is not close enough to 0.5.)", "source": "MiniMax ‚Ď†", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why is the Poisson approximation to binomial generally an overestimate for P(X = 0)? (2 steps)", "answer": "- Step 1: For binomial: P(X = 0) = (1-p)‚ĀŅ. For Poisson approximation: P(X = 0) = e^(-őĽ) where őĽ = np.\n- Step 2: Since (1-p)‚ĀŅ < e^(-np) for p > 0 (by considering the inequality e^x > 1 + x), the Poisson approximation gives a larger value than the true binomial probability. This is because the Poisson assumes events can occur at any time continuously, while binomial has a fixed number n of trials.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A fair dice is rolled 48 times. Estimate the probability of getting no more than 10 sixes. Which approximation method should be used? (3 steps)", "answer": "- Step 1: X ~ B(48, 1/6). Mean = 48 √ó (1/6) = 8.\n- Step 2: Since np = 8 ‚Č§ 10 and p is small, use Poisson approximation: X ‚Čą Po(8).\n- Step 3: P(X ‚Č§ 10) from Poisson tables with őĽ = 8 ‚Čą 0.814.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A fair dice is rolled 120 times. Estimate the probability of getting at least 25 sixes. (3 steps)", "answer": "- Step 1: X ~ B(120, 1/6). Mean = 120 √ó (1/6) = 20.\n- Step 2: Since np = 20 > 10, use normal approximation: őľ = 20, ŌÉ = ‚ąö(120 √ó 1/6 √ó 5/6) = ‚ąö(120/36) ‚Čą ‚ąö3.33 ‚Čą 1.83.\n- Step 3: Apply continuity correction: P(X ‚Č• 25) ‚Čą P(Y > 24.5). z = (24.5 - 20)/1.83 ‚Čą 2.46. P(Z > 2.46) ‚Čą 0.007.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In a box of 500 electrical switches with fault probability 0.005, compare the Poisson and normal approximations for P(X < 2). (3 steps)", "answer": "- Step 1: X ~ B(500, 0.005), őĽ = 500 √ó 0.005 = 2.5.\n- Step 2: Poisson approximation: P(X < 2) = P(X ‚Č§ 1) = e^(-2.5) √ó (1 + 2.5) ‚Čą 0.082 + 0.205 = 0.287.\n- Step 3: Normal approximation: őľ = 2.5, ŌÉ = ‚ąö2.5 ‚Čą 1.58. P(X < 2) ‚Čą P(Y < 1.5). z = (1.5 - 2.5)/1.58 ‚Čą -0.63. P(Z < -0.63) ‚Čą 0.264. Both approximations are close to the exact binomial value.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A supermarket finds 40% of nut buyers choose large bags. For 80 customers, estimate P(X > 30) where X is the number choosing large bags. (3 steps)", "answer": "- Step 1: X ~ B(80, 0.4). őľ = 80 √ó 0.4 = 32, ŌÉ = ‚ąö(80 √ó 0.4 √ó 0.6) = ‚ąö19.2 ‚Čą 4.38.\n- Step 2: Since n is large and p = 0.4 is reasonably close to 0.5, use normal approximation.\n- Step 3: P(X > 30) ‚Čą P(Y > 30.5). z = (30.5 - 32)/4.38 ‚Čą -0.34. P(Z > -0.34) = P(Z < 0.34) ‚Čą 0.633.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A company claims 55% of seedlings produce apples. For 200 seedlings, find P(X ‚Č§ 95) using an appropriate approximation, and comment on the claim if 95 actually produced apples. (3 steps)", "answer": "- Step 1: If claim is true, X ~ B(200, 0.55). őľ = 200 √ó 0.55 = 110, ŌÉ = ‚ąö(200 √ó 0.55 √ó 0.45) = ‚ąö49.5 ‚Čą 7.04.\n- Step 2: Normal approximation with continuity: P(X ‚Č§ 95) ‚Čą P(Y < 95.5). z = (95.5 - 110)/7.04 ‚Čą -2.06. P(Z < -2.06) ‚Čą 0.020.\n- Step 3: Since P(X ‚Č§ 95) ‚Čą 0.02 (only 2% chance), observing 95 or fewer is unlikely if the claim is true. This provides evidence against the company's claim.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Street light failures occur at a rate of one every 2 days. For 10 weeks (70 days), estimate P(X < 45) where X is the number of failures. (3 steps)", "answer": "- Step 1: Weekly rate = 7 √ó (1/2) = 3.5 failures per week. For 10 weeks, őĽ = 10 √ó 3.5 = 35.\n- Step 2: Since őĽ = 35 > 10, use normal approximation: Y ~ N(35, 35), ŌÉ = ‚ąö35 ‚Čą 5.92.\n- Step 3: P(X < 45) ‚Čą P(Y < 44.5). z = (44.5 - 35)/5.92 ‚Čą 1.60. P(Z < 1.60) ‚Čą 0.945.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For X ~ B(1000, 0.58), write down the normal approximation and explain why it's appropriate. (2 steps)", "answer": "- Step 1: őľ = 1000 √ó 0.58 = 580, ŌÉ = ‚ąö(1000 √ó 0.58 √ó 0.42) = ‚ąö(243.6) ‚Čą 15.6. So N(580, 15.6¬≤).\n- Step 2: This is appropriate because n = 1000 is very large, and p = 0.58 is reasonably close to 0.5, making the binomial distribution highly symmetric and well-approximated by the normal distribution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A medical practice tests 180 patients for a condition with population prevalence 2%. Using Poisson approximation, find P(at least 2 patients have the condition). (3 steps)", "answer": "- Step 1: X ~ B(180, 0.02). Since p is small, use Poisson: őĽ = 180 √ó 0.02 = 3.6.\n- Step 2: P(X ‚Č• 2) = 1 - P(X ‚Č§ 1) = 1 - [P(0) + P(1)].\n- Step 3: P(0) = e^(-3.6) ‚Čą 0.027, P(1) = e^(-3.6) √ó 3.6¬Ļ/1! ‚Čą 0.098. So P(X ‚Č• 2) ‚Čą 1 - 0.125 = 0.875.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A company has 800 pupils with birthday probability 1/365. Find P(exactly 4 have April 1 birthday) using Poisson. (2 steps)", "answer": "- Step 1: őĽ = 800 √ó (1/365) ‚Čą 2.192 (or 2.19).\n- Step 2: P(X = 4) = e^(-2.19) √ó 2.19‚Āī / 4! ‚Čą (0.112) √ó (22.9) / 24 ‚Čą 0.107.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In a packet of 200 nails with 2.5% faults, a carpenter buys 6 packets. Estimate the probability that more than half (more than 3 packets) contain more than 6 faulty nails. (3 steps)", "answer": "- Step 1: From earlier, P(more than 6 faults in one packet) ‚Čą 0.238.\n- Step 2: Let W be the number of packets with >6 faults. W ~ B(6, 0.238).\n- Step 3: P(W > 3) = P(W ‚Č• 4). This requires summing binomial probabilities or using further approximation. With p = 0.238 and n = 6, we could use normal approximation: őľ = 6 √ó 0.238 = 1.428, ŌÉ = ‚ąö(6 √ó 0.238 √ó 0.762) ‚Čą 1.05. P(W > 3) ‚Čą P(Y > 3.5). z = (3.5 - 1.428)/1.05 ‚Čą 1.97. P(Z > 1.97) ‚Čą 0.024.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Why is there no exact rule for what constitutes a \"large n\" or \"small p\" in the Poisson approximation to binomial? (2 steps)", "answer": "- Step 1: The quality of the approximation depends on the interplay between n and p. A moderate n with very small p might work, while a larger n with p closer to 0.5 might not.\n- Step 2: The guideline np ‚Č§ 10 is practical but not strict. The approximation improves as n increases and p decreases. Different contexts may accept slightly different thresholds depending on the required accuracy.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_35", "judge_pick": true}, {"question": "For X ~ B(20, 0.5), can we use normal approximation? For X ~ B(20, 0.05)? Explain. (2 steps)", "answer": "- Step 1: For B(20, 0.5): n = 20 is borderline large, but p = 0.5 is exactly at the threshold for symmetry. Some sources allow this, but the approximation may not be very accurate with n = 20.\n- Step 2: For B(20, 0.05): n is not large enough for normal approximation (p is too far from 0.5). However, since p = 0.05 is small and np = 1 ‚Č§ 10, the Poisson approximation would be more appropriate here.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_36", "judge_pick": true}, {"question": "A breakfast cereal has prizes in 56% of boxes. For 100 boxes, compare the exact probability of exactly 55 prizes with the normal approximation. (3 steps)", "answer": "- Step 1: Exact: X ~ B(100, 0.56). P(X = 55) = C(100,55) √ó 0.56‚ĀĶ‚ĀĶ √ó 0.44‚Āī‚ĀĶ ‚Čą 0.0365.\n- Step 2: Normal: őľ = 56, ŌÉ = ‚ąö(100 √ó 0.56 √ó 0.44) = ‚ąö24.64 ‚Čą 4.96. For P(X = 55), use P(54.5 < Y < 55.5). z‚āĀ = (54.5 - 56)/4.96 ‚Čą -0.30, z‚āā = (55.5 - 56)/4.96 ‚Čą -0.10. P ‚Čą ő¶(-0.10) - ő¶(-0.30) ‚Čą 0.460 - 0.382 = 0.078.\n- Step 3: Percentage error = |0.0365 - 0.078|/0.0365 √ó 100% ‚Čą 114%. This is a terrible approximation! This is because p = 0.56 is not close enough to 0.5 for "judge_pick": true}, {"question": "In Example 5 of the textbook, for X ~ B(80, 0.55), why is the percentage error for estimating P(X = 50) only 0.82%? (2 steps)", "answer": "- Step 1: With n = 80 and p = 0.55, the binomial is fairly symmetric (p is reasonably close to 0.5). The mean is 44, and we're estimating at X = 50, which is not far from the center.\n- Step 2: The continuity correction properly captures the discrete probability mass. Both factors contribute to making this a good approximation, hence the small percentage error.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A random sample of 150 customers has probability 0.04 of spending over $10. Estimate P(more than 5 customers spent over $10). (3 steps)", "answer": "- Step 1: X ~ B(150, 0.04). Mean = 150 √ó 0.04 = 6. Since np = 6 ‚Č§ 10 and p is small, use Poisson approximation: X ‚Čą Po(6).\n- Step 2: P(X > 5) = 1 - P(X ‚Č§ 5).\n- Step 3: From Poisson tables with őĽ = 6, P(X ‚Č§ 5) ‚Čą 0.446. So P(X > 5) ‚Čą 0.554.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_42", "judge_pick": false}, {"question": "When approximating Poisson(őĽ) with Normal, why must őĽ > 10? (2 steps)", "answer": "- Step 1: The Poisson distribution is right-skewed when őĽ is small. As őĽ increases, it becomes more symmetric and approaches a normal shape.\n- Step 2: Below őĽ = 10, the skewness is too pronounced for the normal approximation to be accurate. The threshold őĽ > 10 is a practical guideline where the approximation becomes reasonably accurate for most purposes.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A manufacturing process has 3% defective items. For a batch of 100, find P(fewer than 4 defective items) using Poisson approximation. (2 steps)", "answer": "- Step 1: X ~ B(100, 0.03). Since p is small, use Poisson with őĽ = 100 √ó 0.03 = 3.\n- Step 2: P(X < 4) = P(X ‚Č§ 3). From Poisson tables with őĽ = 3, P(X ‚Č§ 3) = P(0) + P(1) + P(2) + P(3) = 0.050 + 0.149 + 0.224 + 0.224 = 0.647.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_44", "judge_pick": false}], "count": 45}, "minimax_2": {"label": "MiniMax ‚Ď°", "cards": [{"question": "What two conditions must be met for a binomial distribution $$X \\sim \\mathrm{~B}(n, p)$$ to be approximated by a Poisson distribution? (2 points)", "answer": "- Step 1: The number of trials $$n$$ must be large (typically very large)\n- Step 2: The probability of success $$p$$ must be small (close to zero)\n+ These conditions ensure that the mean $$\\lambda = np \\leq 10$$, which makes the Poisson approximation accurate\n+ When $$p$$ is small, $$(1-p) \\approx 1$$, so the variance $$np(1-p) \\approx np = \\lambda$$, satisfying the Poisson property that mean ‚Čą variance", "source": "MiniMax ‚Ď°", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For a binomial random variable $$X \\sim \\mathrm{~B}(200, 0.03)$$, what value of $$\\lambda$$ would you use when approximating with a Poisson distribution, and why is this approximation appropriate here? (2 steps)", "answer": "- Step 1: Calculate $$\\lambda = n \\times p = 200 \\times 0.03 = 6$$\n- Step 2: The approximation is appropriate because:\n+ $$n = 200$$ is large\n+ $$p = 0.03$$ is small (close to zero)\n+ $$\\lambda = 6 \\leq 10$$, satisfying the typical guideline for accurate Poisson approximation", "source": "MiniMax ‚Ď°", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Why does the Poisson approximation work well for binomial distributions when $$p$$ is small? Explain the intuition behind this. (2 steps)", "answer": "- Step 1: For a binomial distribution, the variance is $$np(1-p)$$ and the mean is $$np$$\n- Step 2: When $$p$$ is small, $$(1-p) \\approx 1$$, so:\n+ Variance $$\\approx np(1-p) \\approx np \\approx$$ mean\n+ This satisfies the key Poisson property that mean and variance are approximately equal\n+ The binomial with small $$p$$ essentially models rare events occurring independently, which is exactly what the Poisson distribution describes", "source": "MiniMax ‚Ď°", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If you want to approximate $$Y \\sim \\mathrm{~B}(200, 0.98)$$ using a Poisson distribution, what transformation would you make and why? (2 steps)", "answer": "- Step 1: Let $$X = n - Y$$, where $$n = 200$$. Then $$X \\sim \\mathrm{~B}(200, 0.02)$$\n- Step 2: Now you can approximate $$X \\sim \\mathrm{Po}(\\lambda)$$ where $$\\lambda = 200 \\times 0.02 = 4$$\n+ This works because finding $$P(Y = 197)$$ is equivalent to finding $$P(X = 3)$$\n+ The key insight: when $$p$$ is close to 1 (very high success rate), it's easier to model the failures (rare events) rather than the successes", "source": "MiniMax ‚Ď°", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A factory produces items with a fault probability of 0.007. In a batch of 1000 items, what Poisson distribution would you use to approximate the number of faulty items, and state whether this approximation is valid. (2 steps)", "answer": "- Step 1: $$\\lambda = n \\times p = 1000 \\times 0.007 = 7$$\n- Step 2: The approximation is valid because:\n+ $$n = 1000$$ is large\n+ $$p = 0.007$$ is very small\n+ $$\\lambda = 7 \\leq 10$$ falls within the typical guideline", "source": "MiniMax ‚Ď°", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What are the two conditions required to approximate a binomial distribution $$X \\sim \\mathrm{~B}(n, p)$$ using a normal distribution? (2 points)", "answer": "- Step 1: The number of trials $$n$$ must be large\n- Step 2: The probability of success $$p$$ must be close to 0.5\n+ The reason: when $$p$$ is close to 0.5, the binomial distribution becomes approximately symmetric and bell-shaped, matching the normal distribution's shape", "source": "MiniMax ‚Ď°", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For a binomial random variable $$X \\sim \\mathrm{~B}(100, 0.53)$$, what normal distribution would you use to approximate it? Write down the values of $$\\mu$$ and $$\\sigma$$. (3 steps)", "answer": "- Step 1: Calculate $$\\mu = n \\times p = 100 \\times 0.53 = 53$$\n- Step 2: Calculate the variance: $$np(1-p) = 100 \\times 0.53 \\times 0.47 = 24.91$$\n- Step 3: Therefore $$\\sigma = \\sqrt{np(1-p)} = \\sqrt{24.91} \\approx 4.99$$\n+ The approximation is $$X \\approx \\mathrm{~N}(53, 4.99^2)$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Why must we apply a continuity correction when using a normal approximation to a binomial distribution? (2 steps)", "answer": "- Step 1: The binomial distribution is discrete (it takes only integer values), while the normal distribution is continuous\n- Step 2: To account for this difference:\n+ For $$P(X \\leq 70)$$, we compute $$P(Y < 70.5)$$ using the continuous normal\n+ For $$P(X = k)$$, we compute $$P(k - 0.5 < Y < k + 0.5)$$\n+ This \"spreads\" the discrete probability across a small interval on the continuous scale", "source": "MiniMax ‚Ď°", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Using normal approximation, find $$P(X \\leq 70)$$ for $$X \\sim \\mathrm{~B}(150, 0.48)$$ with appropriate continuity correction. Explain each step. (3 steps)", "answer": "- Step 1: The normal approximation is $$Y \\sim \\mathrm{~N}(\\mu, \\sigma^2)$$ where $$\\mu = 150 \\times 0.48 = 72$$ and $$\\sigma = \\sqrt{150 \\times 0.48 \\times 0.52} = \\sqrt{37.44} \\approx 6.12$$\n- Step 2: Apply continuity correction: $$P(X \\leq 70) \\approx P(Y < 70.5)$$\n- Step 3: Standardize: $$z = \\frac{70.5 - 72}{6.12} = \\frac{-1.5}{6.12} \\approx -0.245$$\n+ So $$P(Z < -0.245) \\approx 0.403$$ (from standard normal tables)", "source": "MiniMax ‚Ď°", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{~B}(150, 0.48)$$ approximated by $$Y \\sim \\mathrm{~N}(72, 6.12^2)$$, use continuity correction to find $$P(80 \\leq X < 90)$$. Show the z-score calculations. (3 steps)", "answer": "- Step 1: Apply continuity correction: $$P(80 \\leq X < 90) \\approx P(79.5 < Y < 89.5)$$\n- Step 2: Standardize the lower bound: $$z_1 = \\frac{79.5 - 72}{6.12} = \\frac{7.5}{6.12} \\approx 1.225$$\n- Step 3: Standardize the upper bound: $$z_2 = \\frac{89.5 - 72}{6.12} = \\frac{17.5}{6.12} \\approx 2.86$$\n+ So $$P(1.225 < Z < 2.86) = P(Z < 2.86) - P(Z < 1.225) \\approx 0.9979 - 0.8898 = 0.1081$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_9", "judge_pick": false}, {"question": "When estimating $$P(X = 50)$$ for $$X \\sim \\mathrm{~B}(80, 0.55)$$ using normal approximation, what continuity correction would you apply and why? (2 steps)", "answer": "- Step 1: Since we're looking for a single discrete value, we consider an interval half a unit on either side\n- Step 2: Apply continuity correction: $$P(X = 50) \\approx P(49.5 < Y < 50.5)$$\n+ This captures the probability of the continuous normal variable falling within the \"band\" corresponding to the discrete value 50", "source": "MiniMax ‚Ď°", "_id": "minimax_2_10", "judge_pick": false}, {"question": "For a Poisson distribution $$X \\sim \\mathrm{Po}(\\lambda)$$, when can it be approximated by a normal distribution, and what are the parameters of that normal distribution? (2 points)", "answer": "- Step 1: The approximation can be used when $$\\lambda$$ is large (typically $$\\lambda > 10$$)\n- Step 2: The normal approximation is $$Y \\sim \\mathrm{~N}(\\lambda, \\lambda)$$\n+ This uses the facts that for Poisson: mean = $$\\lambda$$ and variance = $$\\lambda$$", "source": "MiniMax ‚Ď°", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{Po}(25)$$, use normal approximation to estimate $$P(X > 30)$$, showing the continuity correction and standardization. (3 steps)", "answer": "- Step 1: Normal approximation: $$Y \\sim \\mathrm{~N}(25, 25)$$, so $$\\sigma = \\sqrt{25} = 5$$\n- Step 2: Apply continuity correction: $$P(X > 30) \\approx P(Y > 30.5)$$\n- Step 3: Standardize: $$z = \\frac{30.5 - 25}{5} = \\fr const SK='s2_ch03';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'‚ÄĒ'}
function fC(n){return n!=null?'‚ā¨'+n.toFixed(4):'‚ÄĒ'}
function fT(s){if(!s)return'‚ÄĒ';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">ūüďĆ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">‚ú® Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'‚ÄĒ'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){

  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">ūüďč</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('ūüďč '+myCards.length+' cards copied ‚ÄĒ paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('‚ÄĒ')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error ‚Üí clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
