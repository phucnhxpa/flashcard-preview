lly as $$\\tfrac{1}{360}$$ of a circle for arithmetic convenience (360 has many divisors).\n- Step 3: Since $$\\pi$$ is irrational, no rational number of degrees can exactly equal 1 radian — the two systems are intrinsically incommensurable.\n\nSo 1 radian is \"just under 60°\" — a useful mental anchor.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Explain conceptually why the area of a sector is $$A = \\tfrac{1}{2}r^2\\theta$$ rather than just $$r^2\\theta$$. (3 steps)", "answer": "- Step 1: View the sector as a fraction of the whole circle. The full circle has area $$\\pi r^2$$ and corresponds to angle $$2\\pi$$.\n- Step 2: A sector of angle $$\\theta$$ takes the fraction $$\\dfrac{\\theta}{2\\pi}$$ of the whole circle, giving area $$\\dfrac{\\theta}{2\\pi} \\times \\pi r^2 = \\dfrac{1}{2}r^2\\theta$$.\n- Step 3: The $$\\tfrac{1}{2}$$ comes from the cancellation $$\\dfrac{\\pi}{2\\pi} = \\dfrac{1}{2}$$ — a structural footprint of the relationship between $$\\pi$$ (in area) and $$2\\pi$$ (in full angle).\n\nSo the $$\\tfrac{1}{2}$$ is not a fudge factor — it's a natural consequence of how circles and angles relate.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "A composite region's perimeter is being computed. The region is a triangle with one corner replaced by an arc (from a \"lawn sector\" cut into the triangle). Conceptually, what stays and what changes? (3 steps)", "answer": "- Step 1: The original triangle had THREE straight sides. After cutting the sector, you remove TWO partial straight segments (each of length $$r$$, from the vertex to where the arc meets the side) and ADD the arc.\n- Step 2: New perimeter = (sum of remaining straight portions of sides) + (arc length $$r\\theta$$).\n- Step 3: For a triangle with vertex angle $$\\theta$$ and adjacent sides $$a, b$$, both reduced by $$r$$: perimeter = $$(a - r) + (b - r) + (\\text{third side}) + r\\theta$$.\n\nThe key trick: don't blindly add or subtract. Track which boundary pieces remain and which are replaced.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "Explain why $$\\tan\\theta \\approx \\theta$$ for small $$\\theta$$. Derive it from the approximations for sine and cosine. (2 steps)", "answer": "- Step 1: $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta} \\approx \\frac{\\theta}{1 - \\frac{\\theta^2}{2}}$$.\n- Step 2: For small $$\\theta$$, the denominator $$1 - \\frac{\\theta^2}{2} \\approx 1$$ (since $$\\frac{\\theta^2}{2}$$ is negligible compared to 1), so $$\\tan\\theta \\approx \\frac{\\theta}{1} = \\theta$$.\n\nAlternatively, since $$\\sin\\theta \\approx \\theta$$ and $$\\cos\\theta \\approx 1$$, their ratio $$\\frac{\\sin\\theta}{\\cos\\theta} \\approx \\frac{\\theta}{1} = \\theta$$. This is consistent with tangent and sine having the same first-order approximation.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "A circle has radius 10 cm and chord $$AB$$ length 18.65 cm. Without computing exactly, what does the sign of $$\\cos\\theta$$ tell you? (3 steps)", "answer": "- Step 1: Cosine rule: $$\\cos\\theta = \\dfrac{2r^2 - c^2}{2r^2} = \\dfrac{200 - 18.65^2}{200}$$.\n- Step 2: Since $$18.65^2 \\approx 348 > 200$$, the numerator is negative, so $$\\cos\\theta < 0$$.\n- Step 3: Negative cosine means the angle is OBTUSE ($$\\theta > \\pi/2$$). Consistent with intuition: the chord (18.65) is almost as long as the diameter (20), so the angle must be close to (but less than) $$\\pi$$.\n\nThe sign of $$\\cos\\theta$$ is a quick clue to whether the angle is acute or obtuse.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Approximate $$\\cos\\theta$$ for $$\\theta = 0.3$$ radians using the small-angle formula, and estimate the percentage error compared to the true value. (3 steps)", "answer": "- Step 1: Approximation: $$\\cos 0.3 \\approx 1 - \\frac{0.3^2}{2} = 1 - \\frac{0.09}{2} = 1 - 0.045 = 0.955$$.\n- Step 2: True value: $$\\cos 0.3 \\approx 0.95534$$ (calculator).\n- Step 3: Error = $$|0.955 - 0.95534| = 0.00034$$. Percentage error = $$\\frac{0.00034}{0.95534} \\times 100\\% \\approx 0.036\\%$$. The cosine approximation is even more accurate than the sine approximation because the error term is of order $$\\theta^4$$ (the next term is $$+\\frac{\\theta^4}{24}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "In the small-angle limit (θ → 0), which approximation becomes most accurate fastest: sin θ ≈ θ, cos θ ≈ 1 - θ²/2, or tan θ ≈ θ? How can you determine this? (2 steps)", "answer": "- Step 1: Compare the first neglected term in each Taylor series:\n  - sin: next term is $$-\\frac{\\theta^3}{6}$$\n  - cos: next term is $$+\\frac{\\theta^4}{24}$$\n  - tan: next term is $$\\frac{2\\theta^3}{15}$$\n- Step 2: The error in sin θ ≈ θ is proportional to $$\\theta^3$$; in tan θ ≈ θ it's also $$\\theta^3$$ (but with coefficient 2/15 vs 1/6); in cos it's $$\\theta^4$$. So cos becomes accurate fastest for very tiny angles. But for θ < 0.5 rad, sin and tan are both quite accurate.", "source": "MiniMax ①", "_id": "minimax_1_50"}, {"question": "Express the chord length of a circle of radius $$r$$ subtending angle $$\\theta$$ at the centre, in terms of $$r$$ and $$\\theta$$. (3 steps)", "answer": "- Step 1: Triangle $$OAB$$ is isosceles with $$OA = OB = r$$. Drop a perpendicular from $$O$$ to $$AB$$, splitting the triangle into two congruent right-angled triangles, each with angle $$\\theta/2$$ at the apex.\n- Step 2: In each right triangle, the half-chord = $$r\\sin(\\theta/2)$$.\n- Step 3: So full chord length is $$AB = 2r\\sin(\\theta/2)$$.\n\nCompare to arc = $$r\\theta$$ — the chord is always shorter for $$\\theta > 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Solve $$2\\sin^2\\theta + \\sin\\theta - 1 = 0$$ for $$0 \\leq \\theta < 2\\pi$$. Walk through the full strategy. (4 steps)", "answer": "- Step 1: Recognise this as a *quadratic in* $$\\sin\\theta$$. Let $$u = \\sin\\theta$$: $$2u^2 + u - 1 = 0$$.\n- Step 2: Factorise: $$(2u - 1)(u + 1) = 0$$, so $$u = \\frac{1}{2}$$ or $$u = -1$$.\n- Step 3: For $$\\sin\\theta = \\frac{1}{2}$$: $$\\theta = \\frac{\\pi}{6}$$ or $$\\theta = \\frac{5\\pi}{6}$$. For $$\\sin\\theta = -1$$: $$\\theta = \\frac{3\\pi}{2}$$.\n- Step 4: All four solutions: $$\\theta = \\frac{\\pi}{6}, \\frac{5\\pi}{6}, \\frac{3\\pi}{2}$$.\n\nThe critical insight: never try to solve a quadratic trig equation by taking inverse trig of both sides. Always substitute, factorise/solve the quadratic first, *then* find angles. This avoids the fatal error of treating $$\\sin^2\\theta$$ as if it were $$\\sin\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "A sector has angle $$\\theta$$ rad and arc length $$l$$. Why can the relationship between arc length and circumference fraction be written cleanly only when $$\\theta$$ is in radians? (3 steps)", "answer": "- Step 1: Arc-fraction-of-circumference: $$\\dfrac{l}{2\\pi r} = \\dfrac{\\theta}{2\\pi}$$ (in radians). Both sides simplify cleanly.\n- Step 2: In degrees: $$\\dfrac{l}{2\\pi r} = \\dfrac{\\theta_{\\deg}}{360}$$ — needs the conversion 360.\n- Step 3: With radians, the ratios use the same base $$2\\pi$$, so they're cleanly proportional with no factors of 360 or $$\\pi/180$$ to remember.\n\nRadians make proportional reasoning about circles natural and unit-free.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "Compute the segment area when $$\\theta = \\dfrac{\\pi}{2}$$ (a quarter circle). (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2}r^2 \\cdot \\dfrac{\\pi}{2} = \\dfrac{\\pi r^2}{4}$$ — a quarter of the full circle, as expected.\n- Step 2: Triangle area = $$\\tfrac{1}{2}r^2\\sin(\\pi/2) = \\tfrac{1}{2}r^2$$ — the triangle is right-isosceles with legs $$r$$.\n- Step 3: Segment area = $$\\dfrac{\\pi r^2}{4} - \\dfrac{r^2}{2} = \\dfrac{r^2(\\pi - 2)}{4} \\approx 0.286 r^2$$.\n\nA clean exact answer for the canonical quarter-circle segment.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why must $$\\theta$$ be in radians (not degrees) in the segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$? (3 steps)", "answer": "- Step 1: The sector part $$\\frac{1}{2}r^2\\theta$$ requires $$\\theta$$ in radians (the proportional derivation only works in radians without extra constants).\n- Step 2: The same $$\\theta$$ appears inside $$\\sin\\theta$$. For consistency, $$\\theta$$ must be measured in radians for the trig function too.\n- Step 3: A common mistake: plug in $$\\theta$$ in degrees but evaluate $$\\sin\\theta$$ on a calculator in degree mode. The two terms then have completely different \"units\" — the result is meaningless. Both occurrences of $$\\theta$$ must use radians.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "How are the small-angle approximations connected to the derivatives of trig functions in calculus? (3 steps)", "answer": "- Step 1: The derivative of $$\\sin\\theta$$ at $$\\theta = 0$$ equals $$\\cos 0 = 1$$. So near $$\\theta = 0$$: $$\\sin\\theta \\approx \\sin 0 + 1 \\cdot \\theta = \\theta$$.\n- Step 2: The derivative of $$\\cos\\theta$$ at $$\\theta = 0$$ equals $$-\\sin 0 = 0$$, but the second derivative is $$-\\cos 0 = -1$$. Taylor expansion: $$\\cos\\theta \\approx 1 + 0 \\cdot \\theta + \\frac{-1}{2}\\theta^2 = 1 - \\frac{\\theta^2}{2}$$.\n- Step 3: These small-angle formulas ARE the leading terms of Taylor series of $$\\sin$$ and $$\\cos$$. They work in radians because $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ requires radians.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "At roughly what value of $$\\theta$$ (in radians) do the small-angle approximations start to break down significantly? Use orders-of-magnitude reasoning. (2 steps)", "answer": "- Step 1: The approximation $$\\sin\\theta \\approx \\theta$$ has error $$\\approx \\frac{\\theta^3}{6}$$. The relative error is $$\\frac{\\theta^3/6}{\\theta} = \\frac{\\theta^2}{6}$$. For this to be \"small\" (say < 5%), we need $$\\frac{\\theta^2}{6} < 0.05$$, giving $$\\theta < \\sqrt{0.3} \\approx 0.55$$ radians.\n- Step 2: In practice, the approximations are good to about 1% for $$\\theta < 0.3$$ rad (≈17°), and still usable (within ~5%) for $$\\theta < 0.5$$ rad (≈29°). Beyond about 0.5–1.0 radians, the errors grow rapidly. At $$\\theta = 1$$ rad: $$\\sin 1 \\approx 0.841$$ vs. approximation $$\\theta = 1$$ — a 16% error.\n\n**Rule of thumb:** Small-angle approximations are reliable for $$\\theta \\lesssim 0.3$$ radians (about 15–20°). Use them cautiously beyond that.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "A student says \"1 radian is about 57.3°.\" Another student says \"1 radian is exactly $$\\frac{180}{\\pi}$$ degrees.\" Which statement is more useful for problem-solving and why? (2 steps)", "answer": "- Step 1: Both are numerically equal (57.2958...°). The first is a decimal approximation, the second is the exact form.\n- Step 2: The exact form $$\\frac{180°}{\\pi}$$ is more useful because it maintains precision when used in algebraic manipulation. It also reminds you that $$\\pi$$ is irrational—you should leave answers in terms of $$\\pi$$ when possible rather than converting to decimals.\n\n**Misconception alert:** Using 57.3° as an exact value introduces rounding errors. Always use the fraction form $$\\frac{180}{\\pi}$$ for exact calculations.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "Why does the formula $$A = \\tfrac{1}{2}r^2\\theta$$ give NEGATIVE area when $$\\theta$$ is negative? Is this physically meaningful? (3 steps)", "answer": "- Step 1: A negative angle $$\\theta$$ corresponds to rotating in the opposite (clockwise) direction.\n- Step 2: With $$\\theta < 0$$ in $$\\tfrac{1}{2}r^2\\theta$$, the area is negative — but areas in pure geometry should be positive.\n- Step 3: Negative areas ARE meaningful in CONTEXTS like signed areas in calculus (integrals giving signed areas) or rotational analysis. For pure geometry, always use the absolute value $$|\\theta|$$.\n\nSo: in geometry, take absolute values; in calculus or oriented physics, signed areas have meaning.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "Why does $$\\tan\\theta = 1$$ have only TWO solutions in $$[0, 2\\pi]$$ rather than just one? (3 steps)", "answer": "- Step 1: $$\\tan\\theta = 1$$ has principal solution $$\\theta = \\dfrac{\\pi}{4}$$.\n- Step 2: Tangent has period $$\\pi$$ (not $$2\\pi$$), so the next solution is $$\\theta = \\dfrac{\\pi}{4} + \\pi = \\dfrac{5\\pi}{4}$$.\n- Step 3: Both lie in $$[0, 2\\pi]$$, giving exactly TWO solutions.\n\nThe shorter period of $$\\tan$$ ($$\\pi$$ vs $$2\\pi$$ for sin/cos) is a frequent source of confusion — fewer solutions than you might expect from sine.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Compare the lengths of arc, chord, and tangent (length along tangent at one endpoint, projecting to the other radius's extension) for a small angle. Order them from shortest to longest. (3 steps)", "answer": "- Step 1: Chord = $$2r\\sin(\\theta/2) \\approx r\\theta - \\frac{r\\theta^3}{24}$$ — slightly less than $$r\\theta$$.\n- Step 2: Arc = $$r\\theta$$ exactly.\n- Step 3: Tangent = $$r\\tan\\theta \\approx r\\theta + \\frac{r\\theta^3}{3}$$ — slightly more than $$r\\theta$$.\n\nSo: chord < arc < tangent, and all three converge for small $$\\theta$$. This bounding leads to inequalities like $$\\sin\\theta < \\theta < \\tan\\theta$$, which is fundamental in proofs.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Why is \"1 radian\" specifically defined to be the angle for which arc length equals radius, rather than some other ratio? (3 steps)", "answer": "- Step 1: Choosing arc/radius = 1 makes the proportionality constant in $$l = r\\theta$$ exactly 1 — no dimensional factor needed.\n- Step 2: This single choice cascades through all of mathematics: derivatives of trig functions become clean ($$\\dfrac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$, no factor); Taylor series have integer coefficients; small-angle approximations are direct.\n- Step 3: If we'd chosen a different ratio (say, arc/radius = 2 to define one \"double-radian\"), every formula would carry an extra factor of 2 or 1/2, making the math messier without adding anything.\n\nRadians are not arbitrary — they're the unique unit choice that makes circle geometry and calculus minimal-coefficient.", "source": "Opus 4.7 ②", "_id": "opus_2_84"}, {"question": "A student claims that for small $$\\theta$$, $$\\sin 2\\theta \\approx 2\\theta$$ and $$\\cos 2\\theta \\approx 1 - \\frac{\\theta^2}{2}$$. One is correct and one is wrong. Which is which, and why? (3 steps)", "answer": "- Step 1: The small-angle approximation says $$\\sin x \\approx x$$ for small $$x$$. Here $$x = 2\\theta$$, so $$\\sin 2\\theta \\approx 2\\theta$$. This is **correct** — you substitute the entire argument into the approximation.\n- Step 2: The approximation says $$\\cos x \\approx 1 - \\frac{x^2}{2}$$ for small $$x$$. Here $$x = 2\\theta$$, so $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$. The student wrote $$1 - \\frac{\\theta^2}{2}$$, which is **wrong** — they forgot to square the entire argument, only squaring $$\\theta$$ instead of $$2\\theta$$.\n- Step 3: The rule: whenever you apply a small-angle approximation, the \"$$\\theta$$\" in the formula stands for the **whole argument** of the trig function. So $$\\sin 2\\theta \\approx 2\\theta$$ (not $$\\theta$$), and $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$ (not $$1 - \\frac{\\theta^2}{2}$$).\n\nThis is a very common exam trap — always substitute the full argument.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "A pendulum tip moves through small angle $$\\theta = 0.2$$ rad on a string of length $$L$$. Compare the actual horizontal displacement and the arc length traversed by the tip. (3 steps)", "answer": "- Step 1: Arc length traced = $$L\\theta = 0.2L$$.\n- Step 2: Horizontal displacement = $$L\\sin\\theta = L\\sin(0.2) \\approx L(0.2 - \\tfrac{0.008}{6}) \\approx 0.1987L$$.\n- Step 3: They differ by less than 1% — arc is slightly LONGER because the path is curved. As $$\\theta$$ grows, divergence widens.\n\nFor practical small-angle pendulum problems, \"arc length\" and \"horizontal displacement\" are interchangeable to good accuracy.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Using small-angle approximations, simplify $$\\frac{\\sin\\theta}{\\theta}$$ and $$\\frac{1 - \\cos\\theta}{\\theta^2}$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: For $$\\frac{\\sin\\theta}{\\theta}$$: using $$\\sin\\theta \\approx \\theta$$, we get $$\\frac{\\sin\\theta}{\\theta} \\approx \\frac{\\theta}{\\theta} = 1$$.\n- Step 2: For $$\\frac{1 - \\cos\\theta}{\\theta^2}$$: using $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, we get $$1 - \\cos\\theta \\approx \\frac{\\theta^2}{2}$$, so $$\\frac{1 - \\cos\\theta}{\\theta^2} \\approx \\frac{\\theta^2/2}{\\theta^2} = \\frac{1}{2}$$.\n- Step 3: These are important limits: $$\\lim_{\\theta \\to 0} \\frac{\\sin\\theta}{\\theta} = 1$$ and $$\\lim_{\\theta \\to 0} \\frac{1 - \\cos\\theta}{\\theta^2} = \\frac{1}{2}$$. The small-angle approximations give you these limits immediately.\n\nThese two results are among the most used consequences of small-angle approximations.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Convert $$150°$$ to radians, expressing the answer as a multiple of $$\\pi$$. Why does expressing angles as multiples of $$\\pi$$ give \"exact\" values? (3 steps)", "answer": "- Step 1: Multiply by the conversion factor: $$150° \\times \\frac{\\pi}{180°} = \\frac{150\\pi}{180}$$.\n- Step 2: Simplify the fraction: $$\\frac{150}{180} = \\frac{5}{6}$$, so the answer is $$\\frac{5\\pi}{6}$$ radians.\n- Step 3: This is \"exact\" because $$\\pi$$ is irrational. If we wrote $$150° \\approx 2.618$$ rad, that's a decimal approximation. But $$\\frac{5\\pi}{6}$$ captures the *exact* angle — no rounding, no loss of precision. The fraction tells you the proportion of a semicircle ($$\\pi$$), and $$\\pi$$ itself is a known exact constant.\n\nTakeaway: Always leave radian answers in terms of $$\\pi$$ when possible — it's both simpler and more precise.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "How does the perimeter of a sector scale if the radius doubles but the angle stays the same? What about the area? (3 steps)", "answer": "- Step 1: Perimeter $$P = r(\\theta + 2)$$ scales LINEARLY with $$r$$ — doubling $$r$$ doubles $$P$$.\n- Step 2: Area $$A = \\tfrac{1}{2}r^2\\theta$$ scales QUADRATICALLY with $$r$$ — doubling $$r$$ quadruples $$A$$.\n- Step 3: General scaling law: 1D quantities scale as $$k^1$$, 2D quantities as $$k^2$$, 3D as $$k^3$$ when all linear dimensions scale by $$k$$.\n\nA core principle in geometry: linear, area, volume scale as $$k, k^2, k^3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "What's the \"fuzzy boundary\" for \"small enough $$\\theta$$\" in small-angle approximations, and how do you decide? (3 steps)", "answer": "- Step 1: There's no sharp threshold — error grows continuously with $$\\theta$$.\n- Step 2: \"Small enough\" depends on required accuracy:\n+ For 1% accuracy: $$\\theta \\lesssim 0.25$$ rad ($$\\sim$$15°).\n+ For 0.1% accuracy: $$\\theta \\lesssim 0.1$$ rad ($$\\sim$$6°).\n+ For 0.01% accuracy: $$\\theta \\lesssim 0.03$$ rad ($$\\sim$$2°).\n- Step 3: The relevant question: \"How much error can my application tolerate?\" The next Taylor term gives explicit bound.\n\nSo \"small\" is context-dependent and quantifiable via the error estimate.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "Using small-angle approximations, simplify the expression $$\\frac{\\theta \\cos\\theta}{\\sin\\theta}$$ for small $$\\theta$$. What familiar function does this approximate? (3 steps)", "answer": "- Step 1: Apply each approximation: $$\\sin\\theta \\approx \\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$.\n- Step 2: Substitute: $$\\frac{\\theta\\left(1 - \\frac{\\theta^2}{2}\\right)}{\\theta} = 1 - \\frac{\\theta^2}{2}$$.\n- Step 3: This is the small-angle approximation for $$\\cos\\theta$$ itself! Indeed, $$\\frac{\\theta\\cos\\theta}{\\sin\\theta} = \\frac{\\cos\\theta}{\\frac{\\sin\\theta}{\\theta}}$$. Since $$\\frac{\\sin\\theta}{\\theta} \\to 1$$, this expression approaches $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$. Everything is consistent.\n\nTakeaway: Small-angle approximations are internally consistent — you get the same result regardless of how you decompose an expression.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "Why does $$\\sin\\theta \\approx \\theta$$ require $$\\theta$$ to be in radians, fundamentally? (3 steps)", "answer": "- Step 1: The famous limit $$\\lim_{\\theta \\to 0} \\frac{\\sin\\theta}{\\theta} = 1$$ holds only when $$\\theta$$ is in radians.\n- Step 2: In degrees, this limit equals $$\\frac{\\pi}{180} \\approx 0.01745$$ — far from 1.\n- Step 3: The radian definition is precisely calibrated so this limit is 1. This is why radians are \"the natural\" unit for trigonometry: only in radians does $$\\sin$$ behave like the identity function near zero.\n\nThis has profound consequences for calculus: $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ holds only in radians.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "What's the structural similarity between sector area, sector perimeter, and triangle area, and why does this exist? (3 steps)", "answer": "- Step 1: Sector perimeter: $$P = 2r + r\\theta$$. Sector area: $$A = \\frac{1}{2}r \\cdot l$$ (with $$l = r\\theta$$). Triangle area (two sides $$r$$, included angle $$\\theta$$): $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: For small $$\\theta$$, $$\\sin\\theta \\approx \\theta$$, so triangle area $$\\approx \\frac{1}{2}r^2\\theta$$ = sector area. The two are nearly identical for small angles!\n- Step 3: This is because, for small angles, a sector is essentially a thin triangle: the arc and chord nearly coincide. The relationship $$A_{\\text{sector}} = \\frac{1}{2}rl$$ then becomes $$\\frac{1}{2}r \\cdot r\\theta = \\frac{1}{2}r^2\\theta$$, mirroring $$\\frac{1}{2}bh$$.\n\nThe deeper reason: a circle behaves locally like a tangent line, and a sector locally like a triangle.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "What is the chord-to-arc ratio in the limit $$\\theta \\to 0$$, and what does this tell you about straight-line approximations of curves? (3 steps)", "answer": "- Step 1: From $$\\dfrac{\\text{chord}}{\\text{arc}} = \\dfrac{2\\sin(\\theta/2)}{\\theta} = \\dfrac{\\sin(\\theta/2)}{\\theta/2}$$, taking $$\\theta \\to 0$$: the ratio approaches 1.\n- Step 2: This means: for very small angles, an arc behaves like a straight line — its chord and the arc become indistinguishable.\n- Step 3: This is the foundational principle behind calculus: smooth curves are LOCALLY linear. Differentiation works precisely because tangent lines approximate curves arbitrarily well at small scales.\n\nThe limit $$\\dfrac{\\sin x}{x} \\to 1$$ as $$x \\to 0$$ is the workhorse of trigonometric calculus.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "When solving trig equations in radians, why is it useful to first identify the principal value, then apply symmetry/periodicity? (3 steps)", "answer": "- Step 1: The principal value is the simplest solution (often in $$[0, \\pi/2]$$) — easily recognised from exact value tables.\n- Step 2: From the principal, apply the function's symmetries:\n+ Sine: $$\\sin(\\pi - \\theta) = \\sin\\theta$$ (second-quadrant symmetry).\n+ Cosine: $$\\cos(2\\pi - \\theta) = \\cos\\theta$$ (reflective symmetry in y-axis).\n+ Tangent: $$\\tan(\\theta + \\pi) = \\tan\\theta$$ (period $$\\pi$$).\n- Step 3: Then add multiples of the period to get all solutions in the required interval.\n\nThis systematic approach prevents missing solutions — a common error in trig equation problems.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "Explain why, for a segment of a circle, the area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ gives the *minor* segment when $$0 < \\theta \\leq \\pi$$, and the *major* segment when $$\\pi < \\theta < 2\\pi$$. What happens at $$\\theta = \\pi$$? (3 steps)", "answer": "- Step 1: For $$0 < \\theta \\leq \\pi$$: The sector is the minor sector (or a semicircle at $$\\theta = \\pi$$). The triangle has area $$\\frac{1}{2}r^2\\sin\\theta \\geq 0$$. The segment $$= \\text{sector} - \\text{triangle}$$ is the smaller region between the chord and arc, i.e., the minor segment.\n- Step 2: For $$\\pi < \\theta < 2\\pi$$: The sector is the major sector. The formula $$\\frac{1}{2}r^2\\sin\\theta$$ is negative (since $$\\sin\\theta < 0$$ in this range). So $$\\theta - \\sin\\theta > \\theta$$, and the formula gives an area larger than the sector area — this is the *major* segment (sector + triangle, since the triangle is on the \"other side\").\n- Step 3: At $$\\theta = \\pi$$: The sector is a semicircle, and the \"segment\" degenerates. The formula gives $$\\frac{1}{2}r^2(\\pi - 0) = \\frac{\\pi r^2}{2}$$, which is exactly the semicircle area. The chord is the diameter, so the \"segment\" and \"sector\" are the same region.\n\nTakeaway: The same formula handles both minor and major segments — the sign of $$\\sin\\theta$$ automatically adjusts which region you get.", "source": "GLM 5.1 ③", "_id": "glm_3_68"}, {"question": "Why does $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ have UNITS-CONSISTENT dimensions for any sensible $$\\theta$$ in radians? (3 steps)", "answer": "- Step 1: $$r^2$$ has units of length squared (e.g., cm²) — the natural unit for area.\n- Step 2: $$\\theta$$ is dimensionless (it's a ratio of lengths), and $$\\sin\\theta$$ is dimensionless.\n- Step 3: So $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ has units of cm² — a valid area. The dimensionlessness of radians is exactly what makes the formula work without conversion factors.\n\nAnother instance of why radians are the \"natural\" angular unit for analysis: dimensional consistency is preserved.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Compute the segment area when $$\\theta = \\pi$$ (a semicircle), and explain geometrically. (3 steps)", "answer": "- Step 1: Substitute $$\\theta = \\pi$$: $$A = \\tfrac{1}{2}r^2(\\pi - \\sin\\pi) = \\tfrac{1}{2}r^2 \\times \\pi = \\tfrac{\\pi r^2}{2}$$.\n- Step 2: This is half the full circle area $$\\pi r^2$$.\n- Step 3: Geometrically, when $$\\theta = \\pi$$, the chord becomes the diameter and the \"triangle\" collapses to a flat line of zero area. So the segment IS the half-circle, exactly $$\\tfrac{1}{2}\\pi r^2$$.\n\nThe formula's behavior at this limit case validates it: the triangle vanishes ($$\\sin\\pi = 0$$) and the sector becomes the half-circle.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Without doing any calculation, explain whether an angle of 3 radians is closer to 90°, 180°, or 360°. What physical intuition guides your answer? (2 steps)", "answer": "- Step 1: Recall that $$\\pi \\approx 3.14$$ radians = 180°. So 3 radians is slightly less than $$\\pi$$ radians.\n- Step 2: Since 3 radians ≈ 3.14 − 0.14 radians below $$\\pi$$, it's very close to 180° but slightly less. In fact, $$3 \\times \\frac{180°}{\\pi} \\approx 171.9°$$.\n\nThe mental model: $$\\pi$$ radians is a straight line (180°), so anything close to 3.14 radians is close to a half-turn. An angle of 2 radians would be roughly 2/3 of that, i.e., around 115°.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "When working with the segment formula $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ on a calculator, why is precision crucial? (3 steps)", "answer": "- Step 1: For small $$\\theta$$, both $$\\theta$$ and $$\\sin\\theta$$ are nearly equal — their difference $$\\theta - \\sin\\theta$$ is small.\n- Step 2: Subtraction of nearly-equal numbers AMPLIFIES rounding error: if $$\\theta = 1.000$$ and you round $$\\sin\\theta \\approx 0.841$$ to 0.84, the difference 0.16 vs 0.159 differs by a relative ~1%.\n- Step 3: Use unrounded values throughout (use the calculator's memory or \"ans\" button). Only round at the very end.\n\nThis is a general numerical stability principle: avoid subtracting nearly equal numbers without high precision.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Solve $$\\cos\\theta = \\frac{1}{2}$$ for $$-\\pi \\leq \\theta \\leq \\pi$$. How does using a negative radian domain change your approach compared to the usual $$0 \\leq \\theta < 2\\pi$$? (3 steps)", "answer": "- Step 1: Find the principal value: $$\\theta = \\frac{\\pi}{3}$$. Cosine is positive in Q1 and Q4 (in the standard $$0$$ to $$2\\pi$$ picture), but in the symmetric domain $$-\\pi$$ to $$\\pi$$, the equivalent second solution is the negative angle in Q4.\n- Step 2: Using the symmetry $$\\cos(-\\theta) = \\cos\\theta$$, the second solution is $$\\theta = -\\frac{\\pi}{3}$$.\n- Step 3: Both solutions: $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = -\\frac{\\pi}{3}$$. Both lie within $$[-\\pi, \\pi]$$ ✓.\n\nThe key difference: in the domain $$[0, 2\\pi)$$, you'd give $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = \\frac{5\\pi}{3}$$. In the domain $$[-\\pi, \\pi]$$, you use negative angles instead of angles beyond $$\\pi$$. The *set of points on the unit circle* is the same — just represented differently.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "A sector $$AOB$$ has $$\\angle AOB = 2\\theta$$. A circle of radius $$r$$ is inscribed in the sector, touching both radii and the arc. The sector has radius $$R$$. Show why $$R\\sin\\theta = r(1 + \\sin\\theta)$$. (3 steps)", "answer": "- Step 1: Let $$C$$ be the centre of the inscribed circle. By symmetry, $$C$$ lies on the angle bisector of the sector, so $$\\angle DOC = \\theta$$ where $$D$$ is the foot of the perpendicular from $$C$$ to $$OA$$.\n- Step 2: Since the inscribed circle is tangent to the arc at the far point $$T$$, $$OC + CT = R$$, i.e., $$OC + r = R$$, so $$OC = R - r$$.\n- Step 3: In the right-angled triangle $$ODC$$ (with right angle at $$D$$ since radius⊥tangent): $$\\sin\\theta = \\dfrac{CD}{OC} = \\dfrac{r}{R-r}$$.\n+ Cross-multiply: $$r = (R - r)\\sin\\theta = R\\sin\\theta - r\\sin\\theta$$.\n+ Rearrange: $$R\\sin\\theta = r + r\\sin\\theta = r(1 + \\sin\\theta)$$. ✓\n\nThis combines tangent-perpendicularity with sector geometry — a classic A-Level synthesis.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "At what angle $$\\theta$$ (in radians) is the area of a segment equal to zero? Explain why, both algebraically and geometrically. (2 steps)", "answer": "- Step 1: Algebraically, the segment area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. This equals zero when $$\\theta - \\sin\\theta = 0$$, i.e., when $$\\theta = \\sin\\theta$$. The only solution with $$\\theta \\geq 0$$ is $$\\theta = 0$$.\n- Step 2: Geometrically, when $$\\theta = 0$$, the two radii coincide (they're the same line), the arc has zero length, and the chord has zero length. The sector collapses to a single radius line, and the triangle collapses too — there's no region between them, so the segment area is zero.\n\n**Edge case:** As $$\\theta \\to 0$$, both the sector and triangle areas approach zero, but their difference shrinks even faster (the segment area is of order $$\\theta^3$$ for small $$\\theta$$, since $$\\sin\\theta \\approx \\theta - \\frac{\\theta^3}{6}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "A common formula trick in segment problems: if the area of a triangle equals the area of a segment, what equation in $$\\theta$$ do you get? (3 steps)", "answer": "- Step 1: Triangle area (from two radii, included angle): $$\\frac{1}{2}r^2\\sin\\theta$$. Segment area: $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 2: Setting them equal (or proportional): $$\\sin\\theta = \\theta - \\sin\\theta$$ (if equal), giving $$2\\sin\\theta = \\theta$$, or $$\\theta - 2\\sin\\theta = 0$$.\n- Step 3: This is a transcendental equation — no closed-form solution, must be solved numerically or graphically. Such equations frequently appear in advanced exam problems.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "When does the area of a sector equal exactly twice the area of the inscribed triangle (formed by the two radii and chord)? (3 steps)", "answer": "- Step 1: Sector area: $$\\frac{1}{2}r^2\\theta$$. Triangle area: $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Setting sector = 2 × triangle: $$\\theta = 2\\sin\\theta$$.\n- Step 3: This is a transcendental equation; non-trivial solution exists numerically near $$\\theta \\approx 1.895$$ rad ≈ 108.6°. The trivial $$\\theta = 0$$ solution is degenerate.\n\nThis kind of equation appears when comparing geometric areas — recognition of the structure $$\\theta = k\\sin\\theta$$ is key.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the geometric definition of 1 radian? Describe it in terms of a circle's arc and radius. (2 steps)", "answer": "- Step 1: Imagine a circle with centre $$O$$ and radius $$r$$. Place a point $$A$$ on the circumference. Walk along the circumference until you reach point $$B$$, such that the arc length $$AB$$ is exactly equal to the radius $$r$$.\n- Step 2: The angle $$\\angle AOB$$ subtended at the centre by this arc is defined as **1 radian**. It is the natural angle unit because it directly links the arc length to the radius — no arbitrary constant like 360 is involved.\n\nOne radian ≈ 57.3°, meaning it's slightly more than a right angle's half. This is the foundation on which all radian formulas are built.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Why does a full revolution equal exactly $$2\\pi$$ radians? Walk through the reasoning from the definition of a radian. (2 steps)", "answer": "- Step 1: By definition, an arc of length $$r$$ subtends 1 radian at the centre. The full circumference of a circle of radius $$r$$ is $$2\\pi r$$.\n- Step 2: Since the whole circumference is $$2\\pi$$ times the radius, the full angle at the centre must be $$2\\pi$$ times 1 radian, i.e., $$2\\pi$$ radians. This gives us the fundamental equivalence: $$2\\pi \\text{ rad} = 360°$$.\n\nThis is why $$\\pi$$ appears everywhere in radian measure — it emerges naturally from the geometry of circles, not from an arbitrary choice like 360.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Given that $$2\\pi$$ radians = $$360°$$, derive the two key conversion factors: (a) how to convert from radians to degrees, and (b) how to convert from degrees to radians. (2 steps)", "answer": "- Step 1: From $$2\\pi \\text{ rad} = 360°$$, divide both sides by 2 to get $$\\pi \\text{ rad} = 180°$$. This is the master conversion.\n  + To convert **radians → degrees**: multiply by $$\\frac{180°}{\\pi}$$. For example, $$\\frac{7\\pi}{8} \\text{ rad} = \\frac{7\\pi}{8} \\times \\frac{180°}{\\pi} = \\frac{7}{8} \\times 180° = 157.5°$$.\n- Step 2: Rearrange $$\\pi \\text{ rad} = 180°$$ to get $$1° = \\frac{\\pi}{180}$$ radians.\n  + To convert **degrees → radians**: multiply by $$\\frac{\\pi}{180°}$$. For example, $$150° = 150° \\times \\frac{\\pi}{180°} = \\frac{5\\pi}{6}$$ rad.\n\nThe key insight: you're always multiplying by a fraction that equals 1 (since $$\\frac{\\pi}{180°} = 1$$ and $$\\frac{180°}{\\pi} = 1$$), so you're changing the unit without changing the actual angle.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "Without doing any calculation, explain whether an angle of 3 radians is closer to 90°, 180°, or 360°. What physical intuition guides your answer? (2 steps)", "answer": "- Step 1: Recall that $$\\pi \\approx 3.14$$ radians = 180°. So 3 radians is slightly less than $$\\pi$$ radians.\n- Step 2: Since 3 radians ≈ 3.14 − 0.14 radians below $$\\pi$$, it's very close to 180° but slightly less. In fact, $$3 \\times \\frac{180°}{\\pi} \\approx 171.9°$$.\n\nThe mental model: $$\\pi$$ radians is a straight line (180°), so anything close to 3.14 radians is close to a half-turn. An angle of 2 radians would be roughly 2/3 of that, i.e., around 115°.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "State the exact radian values for these standard angles: $$30°$$, $$45°$$, $$60°$$, $$90°$$, $$180°$$, $$360°$$. Explain the pattern that makes them easy to memorize. (2 steps)", "answer": "- Step 1: The exact conversions are:\n  + $$30° = \\frac{\\pi}{6}$$ rad\n  + $$45° = \\frac{\\pi}{4}$$ rad\n  + $$60° = \\frac{\\pi}{3}$$ rad\n  + $$90° = \\frac{\\pi}{2}$$ rad\n  + $$180° = \\pi$$ rad\n  + $$360° = 2\\pi$$ rad\n- Step 2: The pattern: each denominator tells you what fraction of 180° the angle represents. $$30° = \\frac{1}{6} \\times 180°$$, so $$30° = \\frac{\\pi}{6}$$. $$45° = \\frac{1}{4} \\times 180°$$, so $$45° = \\frac{\\pi}{4}$$. Simply ask: \"What fraction of 180° is this angle?\" — that fraction of $$\\pi$$ is your radian answer.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Convert $$135°$$ to radians, leaving your answer as a multiple of $$\\pi$$. Walk through the simplification. (2 steps)", "answer": "- Step 1: Multiply by $$\\frac{\\pi}{180°}$$: $$135° \\times \\frac{\\pi}{180°} = \\frac{135\\pi}{180}$$.\n- Step 2: Simplify the fraction: $$\\frac{135}{180} = \\frac{3}{4}$$ (divide both by 45). So $$135° = \\frac{3\\pi}{4}$$ rad.\n\nSanity check: $$135°$$ is $$\\frac{3}{4}$$ of $$180°$$, so it should be $$\\frac{3}{4}\\pi$$ — which matches.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Convert $$\\frac{5\\pi}{12}$$ radians to degrees. Walk through the simplification. (2 steps)", "answer": "- Step 1: Multiply by $$\\frac{180°}{\\pi}$$: $$\\frac{5\\pi}{12} \\times \\frac{180°}{\\pi} = \\frac{5}{12} \\times 180°$$.\n- Step 2: $$\\frac{5}{12} \\times 180° = 5 \\times 15° = 75°$$.\n\nSanity check: $$\\frac{5\\pi}{12}$$ is between $$\\frac{\\pi}{4}$$ (45°) and $$\\frac{\\pi}{2}$$ (90°), and 75° fits that range.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Why are radians considered a \"natural\" unit for angles, whereas degrees are \"artificial\"? What practical advantage does this give? (3 steps)", "answer": "- Step 1: Degrees are based on dividing a circle into 360 equal parts — an arbitrary historical choice (linked to the Babylonian base-60 system and approximate days in a year). There's no mathematical reason for 360.\n- Step 2: Radians emerge from the geometry itself: 1 radian is the angle where arc = radius. The formula $$s = r\\theta$$ is a direct consequence of this definition — no conversion constant needed.\n- Step 3: In degrees, the arc length formula would be $$s = \\frac{\\theta°}{360°} \\times 2\\pi r = r\\theta° \\times \\frac{\\pi}{180}$$, which is clunky. The radian formula $$s = r\\theta$$ is clean precisely because the unit was chosen to make it so. This same simplicity cascades into sector area, angular velocity, calculus derivatives of trig functions ($$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ only in radians), and small-angle approximations.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Derive the arc length formula $$s = r\\theta$$ from first principles, starting from the definition of a radian. (3 steps)", "answer": "- Step 1: By definition, an arc of length $$r$$ subtends an angle of 1 radian. So: arc length $$r$$ ↔ angle 1 rad.\n- Step 2: By proportionality, if 1 radian corresponds to arc length $$r$$, then an angle of $$\\theta$$ radians corresponds to arc length $$r\\theta$$. This is because arc length is directly proportional to the angle (for a fixed radius).\n- Step 3: Therefore $$s = r\\theta$$. Notice this only works because we defined the radian so that the constant of proportionality is exactly 1. In degrees, the constant would be $$\\frac{\\pi}{180}$$ instead, giving $$s = r\\theta \\times \\frac{\\pi}{180}$$.\n\nThe entire point of radians is to make this constant equal to 1, eliminating it from every formula.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A student uses $$s = r\\theta$$ with $$\\theta = 60°$$. Will they get the correct arc length? Explain exactly what goes wrong and how to fix it. (3 steps)", "answer": "- Step 1: No, the answer will be wrong. The formula $$s = r\\theta$$ is derived assuming $$\\theta$$ is in radians. With $$\\theta = 60°$$, the student would compute $$s = r \\times 60$$, which is far too large.\n- Step 2: The correct approach: convert $$60°$$ to radians first: $$60° = \\frac{\\pi}{3}$$ rad. Then $$s = r \\times \\frac{\\pi}{3}$$.\n- Step 3: To see the error magnitude: for a circle of radius 1, the correct arc length is $$\\frac{\\pi}{3} \\approx 1.047$$, but the student would get 60 — off by a factor of about 57.3 (= $$\\frac{180}{\\pi}$$). This factor is the telltale sign of a degree-radian mix-up.\n\n**Misconception probe:** If your arc length ever comes out larger than the full circumference $$2\\pi r$$, you almost certainly forgot to convert to radians.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What is the perimeter of a sector of a circle with radius $$r$$ and angle $$\\theta$$ radians? Walk through what it consists of. (2 steps)", "answer": "- Step 1: A sector is bounded by two radii and an arc. The perimeter consists of: two radii (each of length $$r$$) plus the arc (of length $$r\\theta$$).\n- Step 2: Therefore, perimeter $$= 2r + r\\theta = r(2 + \\theta)$$.\n\nThis factorised form is often more useful. For example, if you're told the perimeter is $$P$$, you can immediately solve: $$r = \\frac{P}{2 + \\theta}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "The perimeter of a sector is twice the length of its arc. Find the angle $$\\theta$$ of the sector in radians. (3 steps)", "answer": "- Step 1: Let the radius be $$r$$ and angle be $$\\theta$$. The arc length is $$r\\theta$$ and the perimeter is $$r(2 + \\theta)$$.\n- Step 2: We're told perimeter = 2 × arc length: $$r(2 + \\theta) = 2r\\theta$$.\n- Step 3: Divide by $$r$$: $$2 + \\theta = 2\\theta$$, so $$2 = \\theta$$. The angle is **2 radians** (≈ 114.6°).\n\nThis makes intuitive sense: the two radii together have length $$2r$$, and the arc has length $$2r$$ as well (since $$\\theta = 2$$), so the perimeter is $$4r$$, which is indeed twice the arc length $$2r$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "Derive the sector area formula $$A = \\frac{1}{2}r^2\\theta$$ from first principles. (3 steps)", "answer": "- Step 1: A full circle of radius $$r$$ has area $$\\pi r^2$$ and subtends an angle of $$2\\pi$$ radians at the centre. So the area per radian is $$\\frac{\\pi r^2}{2\\pi} = \\frac{r^2}{2}$$.\n- Step 2: By proportionality, a sector with angle $$\\theta$$ radians has area $$= \\frac{r^2}{2} \\times \\theta = \\frac{1}{2}r^2\\theta$$.\n- Step 3: Alternatively, think of it as: fraction of circle = $$\\frac{\\theta}{2\\pi}$$, so area = $$\\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$. Both approaches give the same clean result — another payoff of using radians.\n\nCompare with the degree version: $$A = \\frac{\\theta°}{360°} \\times \\pi r^2$$, which is less elegant and harder to work with algebraically.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Why does the sector area formula $$A = \\frac{1}{2}r^2\\theta$$ require $$\\theta$$ in radians? What would the formula look like in degrees? (2 steps)", "answer": "- Step 1: The derivation assumes the full circle is $$2\\pi$$ radians with area $$\\pi r^2$$. The factor $$\\frac{\\theta}{2\\pi}$$ (fraction of the circle) only equals $$\\frac{\\theta}{2\\pi}$$ when $$\\theta$$ is in radians. In degrees, the fraction would be $$\\frac{\\theta°}{360}$$.\n- Step 2: In degrees, the area would be $$A = \\frac{\\theta°}{360} \\times \\pi r^2 = \\frac{\\pi r^2 \\theta°}{360}$$. This is valid but cumbersome. The radian version $$\\frac{1}{2}r^2\\theta$$ is simpler because the $$\\pi$$ and 360 cancel into the definition of the radian.\n\n**Bottom line:** Every radian-based formula is a cleaned-up version of a degree formula where the messy constants have been absorbed into the angle unit itself.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A sector has arc length $$l$$ and radius $$r$$. Express its area in terms of $$l$$ and $$r$$ only (no $$\\theta$$). What does this formula remind you of? (3 steps)", "answer": "- Step 1: We know arc length $$l = r\\theta$$, so $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substitute into the sector area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}r^2 \\times \\frac{l}{r} = \\frac{1}{2}rl$$.\n- Step 3: This is exactly the same form as the area of a triangle: $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$. Here, $$l$$ plays the role of \"base\" and $$r$$ plays the role of \"height.\" This is a beautiful geometric connection — a sector is like a \"curved triangle\" with the same area formula.\n\nThis result ($$A = \\frac{1}{2}rl$$) is extremely handy when you know arc length but not the angle.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Derive the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ from the definitions of sector and triangle areas. (3 steps)", "answer": "- Step 1: A segment is the region between a chord and its arc. Its area = area of sector − area of triangle formed by the two radii and the chord.\n- Step 2: The sector area is $$\\frac{1}{2}r^2\\theta$$. The triangle has two sides of length $$r$$ with included angle $$\\theta$$, so its area is $$\\frac{1}{2}r^2\\sin\\theta$$ (using the formula $$\\frac{1}{2}ab\\sin C$$).\n- Step 3: Segment area $$= \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe term $$(\\theta - \\sin\\theta)$$ measures how much the arc \"bulges\" beyond the chord. Since $$\\theta > \\sin\\theta$$ for all $$\\theta > 0$$, the segment area is always positive (as it should be).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "At what angle $$\\theta$$ (in radians) is the area of a segment equal to zero? Explain why, both algebraically and geometrically. (2 steps)", "answer": "- Step 1: Algebraically, the segment area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. This equals zero when $$\\theta - \\sin\\theta = 0$$, i.e., when $$\\theta = \\sin\\theta$$. The only solution with $$\\theta \\geq 0$$ is $$\\theta = 0$$.\n- Step 2: Geometrically, when $$\\theta = 0$$, the two radii coincide (they're the same line), the arc has zero length, and the chord has zero length. The sector collapses to a single radius line, and the triangle collapses too — there's no region between them, so the segment area is zero.\n\n**Edge case:** As $$\\theta \\to 0$$, both the sector and triangle areas approach zero, but their difference shrinks even faster (the segment area is of order $$\\theta^3$$ for small $$\\theta$$, since $$\\sin\\theta \\approx \\theta - \\frac{\\theta^3}{6}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "As $$\\theta$$ approaches $$2\\pi$$ (a full circle), what happens to the segment area $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$? Does it approach the area of the full circle? Explain. (3 steps)", "answer": "- Step 1: At $$\\theta = 2\\pi$$: segment area $$= \\frac{1}{2}r^2(2\\pi - \\sin 2\\pi) = \\frac{1}{2}r^2(2\\pi - 0) = \\pi r^2$$.\n- Step 2: This equals the full circle area $$\\pi r^2$$. Geometrically, when $$\\theta = 2\\pi$$, the \"segment\" is the entire circle minus a triangle of zero area (the chord has come full circle and the triangle collapses), so the segment is the whole circle.\n- Step 3: However, the formula is normally used for $$0 < \\theta < \\pi$$ (minor segment). For $$\\theta > \\pi$$, you'd typically compute the major segment differently. The formula still works mathematically, but the \"segment\" it computes may not be the one you visually expect.\n\n**Warning:** For angles greater than $$\\pi$$, always check which region (minor or major segment) the formula is actually describing.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "A student calculates the area of a sector with $$r = 3$$ cm and $$\\theta = 50°$$ as $$A = \\frac{1}{2}(3^2)(50) = 225$$ cm². Identify the mistake and explain what the correct answer should be, conceptually. (2 steps)", "answer": "- Step 1: The student used $$\\theta = 50$$ directly in the radian formula $$A = \\frac{1}{2}r^2\\theta$$. But 50 is in degrees, not radians. The formula requires $$\\theta$$ in radians.\n- Step 2: The correct approach: convert $$50° = \\frac{50\\pi}{180} = \\frac{5\\pi}{18}$$ radians. Then $$A = \\frac{1}{2}(9)\\left(\\frac{5\\pi}{18}\\right) = \\frac{45\\pi}{36} = \\frac{5\\pi}{4} \\approx 3.93$$ cm². The student's answer of 225 cm² is absurdly large — a sector of a circle of radius 3 can't have area larger than the whole circle ($$\\pi r^2 \\approx 28.3$$ cm²).\n\n**Rule of thumb:** If your sector area exceeds $$\\pi r^2$$, you forgot to convert to radians.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "What is the difference between a sector and a segment of a circle? Describe each geometrically, and explain how their area formulas relate. (2 steps)", "answer": "- Step 1: A **sector** is the region bounded by two radii and an arc (like a pizza slice). Its area is $$\\frac{1}{2}r^2\\theta$$. A **segment** is the region bounded by a chord and an arc (like a cap cut off by a straight line). Its area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 2: The segment area is always less than the sector area for the same $$\\theta$$, because the segment = sector − triangle. The triangle ($$\\frac{1}{2}r^2\\sin\\theta$$) is the piece \"missing\" from the sector to get the segment. So: $$\\text{segment} = \\text{sector} - \\text{triangle}$$.\n\n**Misconception probe:** Never confuse sector and segment! A sector includes the centre; a segment does not (for $$\\theta < \\pi$$).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "In the context of a circle with angle $$\\theta$$ at the centre, explain the difference between a minor arc/sector/segment and a major arc/sector/segment. How do their angles relate? (2 steps)", "answer": "- Step 1: Given two points $$A$$ and $$B$$ on a circle with centre $$O$$ and angle $$\\angle AOB = \\theta < \\pi$$:\n  + The **minor** arc/sector/segment corresponds to the smaller angle $$\\theta$$.\n  + The **major** arc/sector/segment corresponds to the larger angle $$2\\pi - \\theta$$.\n- Step 2: The minor and major together make the full circle. So: minor arc length + major arc length = $$2\\pi r$$; minor sector area + major sector area = $$\\pi r^2$$; minor segment area + major segment area = $$\\pi r^2$$ (since minor segment + major segment = full circle area, noting that minor segment + triangle = minor sector, and major segment = major sector + triangle).\n\n**Key identity:** Major sector area = $$\\frac{1}{2}r^2(2\\pi - \\theta)$$, and major segment area = $$\\frac{1}{2}r^2(2\\pi - \\theta - \\sin\\theta)$$ (note: $$\\sin(2\\pi - \\theta) = -\\sin\\theta$$ requires care — actually the major segment = circle area − minor segment).", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "A sector of radius $$r$$ has perimeter equal to $$P$$. The angle is $$\\theta$$ radians. Express $$r$$ in terms of $$P$$ and $$\\theta$$. (2 steps)", "answer": "- Step 1: Perimeter of sector = arc + two radii = $$r\\theta + 2r = r(\\theta + 2)$$.\n- Step 2: Set this equal to $$P$$: $$r(\\theta + 2) = P$$, so $$r = \\frac{P}{\\theta + 2}$$.\n\nThis is a commonly needed rearrangement. Notice that if $$\\theta = 0$$, then $$r = P/2$$ (just two radii, no arc), and if $$\\theta$$ is very large, $$r \\approx P/\\theta$$ (the arc dominates the perimeter).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A sector has area $$A$$ and perimeter $$P$$. Given that $$A = 4P$$, and the radius is 28 cm, find the angle $$\\theta$$ and hence the perimeter. (3 steps)", "answer": "- Step 1: Write both formulas. Area: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(28^2)\\theta = 392\\theta$$. Perimeter: $$P = r(2 + \\theta) = 28(2 + \\theta)$$.\n- Step 2: Set $$A = 4P$$: $$392\\theta = 4 \\times 28(2 + \\theta) = 112(2 + \\theta) = 224 + 112\\theta$$.\n- Step 3: Solve: $$392\\theta - 112\\theta = 224$$, so $$280\\theta = 224$$, giving $$\\theta = \\frac{224}{280} = 0.8$$ radians. Then $$P = 28(2 + 0.8) = 28 \\times 2.8 = 78.4$$ cm.\n\nThis is a classic \"relate two quantities\" problem. The key is expressing both $$A$$ and $$P$$ in terms of the same variables ($$r$$ and $$\\theta$$), then using the given relationship.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When solving trigonometric equations in radians, what are the principal value ranges for $$\\sin^{-1}$$, $$\\cos^{-1}$$, and $$\\tan^{-1}$$? Why do these ranges matter? (2 steps)", "answer": "- Step 1: The principal value ranges are:\n  + $$\\sin^{-1}: [-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$ (Quadrants I and IV)\n  + $$\\cos^{-1}: [0, \\pi]$$ (Quadrants I and II)\n  + $$\\tan^{-1}: (-\\frac{\\pi}{2}, \\frac{\\pi}{2})$$ (Quadrants I and IV)\n- Step 2: These matter because your calculator only gives you ONE solution (the principal value), but trig equations typically have infinitely many solutions. You must use the CAST diagram or symmetry properties to find ALL solutions in the required interval from this one starting point.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Using the CAST diagram in radians, if $$\\sin\\theta = \\frac{1}{2}$$ and the principal solution is $$\\theta = \\frac{\\pi}{6}$$, find all solutions in the interval $$[0, 2\\pi]$$. Walk through the CAST reasoning. (3 steps)", "answer": "- Step 1: $$\\sin\\theta = \\frac{1}{2} > 0$$, so $$\\theta$$ is in quadrants where sine is positive: **A** (1st) and **S** (2nd) of the CAST diagram.\n- Step 2: The principal solution from the calculator is $$\\theta_1 = \\frac{\\pi}{6}$$ (1st quadrant). The 2nd quadrant solution uses the identity $$\\sin(\\pi - \\theta) = \\sin\\theta$$: $$\\theta_2 = \\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$.\n- Step 3: Check these are in $$[0, 2\\pi]$$: $$\\frac{\\pi}{6} \\approx 0.524$$ ✓ and $$\\frac{5\\pi}{6} \\approx 2.618$$ ✓. So the solutions are $$\\theta = \\frac{\\pi}{6}, \\frac{5\\pi}{6}$$.\n\n**General solutions:** $$\\theta = \\frac{\\pi}{6} + 2n\\pi$$ or $$\\theta = \\frac{5\\pi}{6} + 2n\\pi$$ for any integer $$n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Using the CAST diagram in radians, if $$\\cos\\theta = -\\frac{\\sqrt{3}}{2}$$, find all solutions in $$[0, 2\\pi]$$. Walk through the reasoning. (3 steps)", "answer": "- Step 1: $$\\cos\\theta < 0$$, so $$\\theta$$ is in quadrants where cosine is negative: **S** (2nd) and **T** (3rd) of the CAST diagram.\n- Step 2: The reference angle: $$\\cos^{-1}\\left(\\frac{\\sqrt{3}}{2}\\right) = \\frac{\\pi}{6}$$. Since cosine is negative, we need 2nd and 3rd quadrant angles. 2nd quadrant: $$\\theta_1 = \\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$. 3rd quadrant: $$\\theta_2 = \\pi + \\frac{\\pi}{6} = \\frac{7\\pi}{6}$$.\n- Step 3: Verify: $$\\cos\\frac{5\\pi}{6} = -\\frac{\\sqrt{3}}{2}$$ ✓ and $$\\cos\\frac{7\\pi}{6} = -\\frac{\\sqrt{3}}{2}$$ ✓. Solutions: $$\\theta = \\frac{5\\pi}{6}, \\frac{7\\pi}{6}$$.\n\n**Key identity:** $$\\cos(\\pi - \\alpha) = -\\cos\\alpha$$ and $$\\cos(\\pi + \\alpha) = -\\cos\\alpha$$, which is why both 2nd and 3rd quadrant angles work when cosine is negative.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Using the CAST diagram in radians, if $$\\tan\\theta = -1$$, find all solutions in $$[-\\pi, \\pi]$$. Walk through the reasoning. (3 steps)", "answer": "- Step 1: $$\\tan\\theta < 0$$, so $$\\theta$$ is in quadrants where tangent is negative: **A** (4th) and **S** (2nd) of the CAST diagram.\n- Step 2: The reference angle: $$\\tan^{-1}(1) = \\frac{\\pi}{4}$$. 2nd quadrant: $$\\theta_1 = \\pi - \\frac{\\pi}{4} = \\frac{3\\pi}{4}$$. 4th quadrant: $$\\theta_2 = -\\frac{\\pi}{4}$$ (or equivalently $$\\frac{7\\pi}{4}$$, but that's outside our interval).\n- Step 3: Check both are in $$[-\\pi, \\pi]$$: $$\\frac{3\\pi}{4} \\approx 2.36$$ ✓ and $$-\\frac{\\pi}{4} \\approx -0.785$$ ✓. Solutions: $$\\theta = -\\frac{\\pi}{4}, \\frac{3\\pi}{4}$$.\n\n**Key identity for tangent:** $$\\tan\\theta$$ has period $$\\pi$$, so if $$\\alpha$$ is one solution, all solutions are $$\\alpha + n\\pi$$ for integer $$n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "State the general solutions in radians for: (a) $$\\sin\\theta = \\sin\\alpha$$, (b) $$\\cos\\theta = \\cos\\alpha$$, (c) $$\\tan\\theta = \\tan\\alpha$$. Explain where each comes from. (3 steps)", "answer": "- Step 1: (a) $$\\sin\\theta = \\sin\\alpha$$: Sine is positive in 1st and 2nd quadrants, so $$\\theta = \\alpha + 2n\\pi$$ OR $$\\theta = (\\pi - \\alpha) + 2n\\pi$$, for integer $$n$$.\n- Step 2: (b) $$\\cos\\theta = \\cos\\alpha$$: Cosine is positive in 1st and 4th quadrants, so $$\\theta = \\alpha + 2n\\pi$$ OR $$\\theta = -\\alpha + 2n\\pi$$ (equivalently $$\\theta = 2\\pi - \\alpha + 2n\\pi$$), for integer $$n$$.\n- Step 3: (c) $$\\tan\\theta = \\tan\\alpha$$: Tangent has period $$\\pi$$, so $$\\theta = \\alpha + n\\pi$$, for integer $$n$$. This is simpler because tangent repeats every $$\\pi$$, not every $$2\\pi$$.\n\nThese general solutions are the \"template\" from which you extract specific solutions in any given interval by choosing appropriate values of $$n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "Solve $$\\sin\\theta = -\\frac{\\sqrt{2}}{2}$$ for $$\\theta \\in [0, 2\\pi]$$. Give exact answers in radians. (3 steps)", "answer": "- Step 1: $$\\sin\\theta < 0$$, so $$\\theta$$ is in **T** (3rd) and **A** (4th) quadrants. The reference angle: $$\\sin^{-1}\\left(\\frac{\\sqrt{2}}{2}\\right) = \\frac{\\pi}{4}$$.\n- Step 2: 3rd quadrant: $$\\theta_1 = \\pi + \\frac{\\pi}{4} = \\frac{5\\pi}{4}$$. 4th quadrant: $$\\theta_2 = 2\\pi - \\frac{\\pi}{4} = \\frac{7\\pi}{4}$$.\n- Step 3: Verify: $$\\sin\\frac{5\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓ and $$\\sin\\frac{7\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓. Solutions: $$\\theta = \\frac{5\\pi}{4}, \\frac{7\\pi}{4}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "What are the three small-angle approximations, and why must $$\\theta$$ be in radians for them to work? (3 steps)", "answer": "- Step 1: The three approximations for small $$\\theta$$ (in radians) are:\n  + $$\\sin\\theta \\approx \\theta$$\n  + $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$\n  + $$\\tan\\theta \\approx \\theta$$\n- Step 2: These come from the Taylor/Maclaurin series expansions, which are derived using calculus. The derivative $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ is only true when $$\\theta$$ is in radians. In degrees, there would be an extra factor of $$\\frac{\\pi}{180}$$ at every derivative, ruining the clean series.\n- Step 3: If you used degrees, the first approximation would become $$\\sin\\theta° \\approx \\frac{\\pi\\theta°}{180}$$, which is messy and defeats the purpose. Radians make the approximations elegantly simple.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Explain intuitively why $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$. Use a geometric picture of the unit circle. (3 steps)", "answer": "- Step 1: On the unit circle, $$\\theta$$ (in radians) equals the arc length from $$(1,0)$$ to the point on the circle, while $$\\sin\\theta$$ is the vertical height (the $$y$$-coordinate).\n- Step 2: For small $$\\theta$$, the arc is nearly straight — it's almost identical to the vertical line segment. The arc length $$\\theta$$ and the height $$\\sin\\theta$$ are almost the same because the curved arc and the vertical line are nearly indistinguishable.\n- Step 3: More precisely, the difference $$\\theta - \\sin\\theta$$ is of order $$\\theta^3$$ (the next term in the series is $$\\frac{\\theta^3}{6}$$). So for $$\\theta = 0.1$$, the error is about $$\\frac{0.001}{6} \\approx 0.00017$$ — tiny compared to 0.1.\n\nThe smaller $$\\theta$$ is, the better the approximation. This is why radians are the \"right\" unit — the arc length directly approximates the sine.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "Explain intuitively why $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ for small $$\\theta$$. Why isn't the approximation simply $$\\cos\\theta \\approx 1$$? (3 steps)", "answer": "- Step 1: On the unit circle, $$\\cos\\theta$$ is the horizontal ($$x$$) coordinate. At $$\\theta = 0$$, $$\\cos 0 = 1$$ exactly. For small $$\\theta$$, $$\\cos\\theta$$ is close to 1 but slightly less.\n- Step 2: The approximation $$\\cos\\theta \\approx 1$$ is too crude — it captures the constant term but misses how quickly cosine drops. The next term in the Taylor series is $$-\\frac{\\theta^2}{2}$$, which accounts for the parabolic decrease near $$\\theta = 0$$.\n- Step 3: Geometrically, the point on the unit circle moves along a curve, not a straight line. The $$x$$-coordinate decreases quadratically (like a parabola), not linearly. The term $$-\\frac{\\theta^2}{2}$$ captures this curvature. For $$\\theta = 0.1$$: $$\\cos(0.1) \\approx 0.99500$$ and $$1 - \\frac{0.01}{2} = 0.99500$$ — an excellent match.\n\nThe linear approximation $$\\cos\\theta \\approx 1$$ has error of order $$\\theta^2$$, while $$1 - \\frac{\\theta^2}{2}$$ has error of order $$\\theta^4$$ — dramatically better.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Explain why $$\\tan\\theta \\approx \\theta$$ for small $$\\theta$$. Derive it from the approximations for sine and cosine. (2 steps)", "answer": "- Step 1: $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta} \\approx \\frac{\\theta}{1 - \\frac{\\theta^2}{2}}$$.\n- Step 2: For small $$\\theta$$, the denominator $$1 - \\frac{\\theta^2}{2} \\approx 1$$ (since $$\\frac{\\theta^2}{2}$$ is negligible compared to 1), so $$\\tan\\theta \\approx \\frac{\\theta}{1} = \\theta$$.\n\nAlternatively, since $$\\sin\\theta \\approx \\theta$$ and $$\\cos\\theta \\approx 1$$, their ratio $$\\frac{\\sin\\theta}{\\cos\\theta} \\approx \\frac{\\theta}{1} = \\theta$$. This is consistent with tangent and sine having the same first-order approximation.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "At roughly what value of $$\\theta$$ (in radians) do the small-angle approximations start to break down significantly? Use orders-of-magnitude reasoning. (2 steps)", "answer": "- Step 1: The approximation $$\\sin\\theta \\approx \\theta$$ has error $$\\approx \\frac{\\theta^3}{6}$$. The relative error is $$\\frac{\\theta^3/6}{\\theta} = \\frac{\\theta^2}{6}$$. For this to be \"small\" (say < 5%), we need $$\\frac{\\theta^2}{6} < 0.05$$, giving $$\\theta < \\sqrt{0.3} \\approx 0.55$$ radians.\n- Step 2: In practice, the approximations are good to about 1% for $$\\theta < 0.3$$ rad (≈17°), and still usable (within ~5%) for $$\\theta < 0.5$$ rad (≈29°). Beyond about 0.5–1.0 radians, the errors grow rapidly. At $$\\theta = 1$$ rad: $$\\sin 1 \\approx 0.841$$ vs. approximation $$\\theta = 1$$ — a 16% error.\n\n**Rule of thumb:** Small-angle approximations are reliable for $$\\theta \\lesssim 0.3$$ radians (about 15–20°). Use them cautiously beyond that.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Using small-angle approximations, estimate the value of $$\\frac{1 - \\cos\\theta}{\\sin^2\\theta}$$ for small $$\\theta$$. Walk through the substitution and simplification. (3 steps)", "answer": "- Step 1: Substitute the approximations: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, so $$1 - \\cos\\theta \\approx \\frac{\\theta^2}{2}$$. And $$\\sin\\theta \\approx \\theta$$, so $$\\sin^2\\theta \\approx \\theta^2$$.\n- Step 2: Therefore $$\\frac{1 - \\cos\\theta}{\\sin^2\\theta} \\approx \\frac{\\theta^2/2}{\\theta^2} = \\frac{1}{2}$$.\n- Step 3: This is actually an exact result! The identity $$\\frac{1-\\cos\\theta}{\\sin^2\\theta} = \\frac{1}{2}$$ can be proven using $$\\sin^2\\theta + \\cos^2\\theta = 1$$ (since $$1 - \\cos^2\\theta = \\sin^2\\theta$$, so $$1 - \\cos\\theta = \\frac{\\sin^2\\theta}{1+\\cos\\theta}$$, and the ratio becomes $$\\frac{1}{1+\\cos\\theta}$$, which approaches $$\\frac{1}{2}$$ as $$\\theta \\to 0$$).\n\nThis example shows how small-angle approximations can reveal limiting values and verify identities.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A pendulum swings through a small angle $$\\theta$$ radians. Using small-angle approximations, show that $$\\frac{\\sin\\theta \\cdot \\tan\\theta}{1 - \\cos\\theta} \\approx \\frac{2}{\\theta}$$ for small $$\\theta$$. What happens to this expression as $$\\theta \\to 0$$? (3 steps)", "answer": "- Step 1: Substitute approximations: $$\\sin\\theta \\approx \\theta$$, $$\\tan\\theta \\approx \\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, so $$1 - \\cos\\theta \\approx \\frac{\\theta^2}{2}$$.\n- Step 2: The expression becomes $$\\frac{\\theta \\cdot \\theta}{\\theta^2/2} = \\frac{\\theta^2}{\\theta^2/2} = 2$$... Wait, let me recheck. Actually: $$\\frac{\\sin\\theta \\cdot \\tan\\theta}{1 - \\cos\\theta} \\approx \\frac{\\theta \\cdot \\theta}{\\theta^2/2} = \\frac{\\theta^2}{\\theta^2/2} = 2$$.\n- Step 3: Hmm, this gives 2, not $$\\frac{2}{\\theta}$$. Let me reconsider the question. If the question had $$\\sin\\theta + \\tan\\theta$$ in the numerator instead, we'd get $$\\frac{\\theta + \\theta}{\\theta^2/2} = \\frac{2\\theta}{\\theta^2/2} = \\frac{4}{\\theta}$$, which diverges. The product version gives exactly 2 for small $$\\theta$$.\n\n**Correction:** The expression $$\\frac{\\sin\\theta \\cdot \\tan\\theta}{1 - \\cos\\theta} \\approx 2$$ for small $$\\theta$$. It does NOT approach $$\\frac{2}{\\theta}$$ — it approaches the constant 2. As $$\\theta \\to 0$$, the expression approaches 2, not infinity.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A circle has centre $$O$$, radius 8.5 cm. Points $$A$$ and $$B$$ lie on the circumference. Point $$C$$ lies on the major arc $$AB$$, and $$\\angle ACB = 0.4$$ radians. Find the length of the minor arc $$AB$$. Walk through the circle theorem connection. (3 steps)", "answer": "- Step 1: Use the circle theorem: the angle at the centre is twice the angle at the circumference subtended by the same arc. So $$\\angle AOB = 2 \\times \\angle ACB = 2 \\times 0.4 = 0.8$$ radians.\n- Step 2: The minor arc $$AB$$ has length $$s = r\\theta = 8.5 \\times 0.8 = 6.8$$ cm.\n- Step 3: Verify this is indeed the minor arc: $$0.8 < \\pi$$, so yes, this is the minor arc. (The major arc would subtend $$2\\pi - 0.8 \\approx 5.48$$ rad.)\n\nThis problem beautifully combines circle theorems (from GCSE) with radian arc length formulas. The key insight is recognising that the angle at the circumference gives you the angle at the centre.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "In a circle of radius $$r$$ with centre $$O$$, a chord $$AB$$ subtends angle $$\\theta$$ at the centre. A circle of radius $$r'$$ is inscribed inside the sector (touching both radii and the arc). Express $$r'$$ in terms of $$r$$ and $$\\theta$$, using the geometry of the situation. (3 steps)", "answer": "- Step 1: The inscribed circle has centre $$C$$ at distance $$r - r'$$ from $$O$$ (since it touches the arc of radius $$r$$). The circle touches each radius at a point where the line from $$C$$ is perpendicular to the radius.\n- Step 2: Consider the right triangle formed by $$O$$, $$C$$, and the point where the inscribed circle touches a radius. The half-angle at $$O$$ is $$\\frac{\\theta}{2}$$, and we have $$\\sin\\frac{\\theta}{2} = \\frac{r'}{OC} = \\frac{r'}{r - r'}$$.\n- Step 3: Solve: $$r' = (r - r')\\sin\\frac{\\theta}{2}$$, so $$r' = r\\sin\\frac{\\theta}{2} - r'\\sin\\frac{\\theta}{2}$$, giving $$r'(1 + \\sin\\frac{\\theta}{2}) = r\\sin\\frac{\\theta}{2}$$, and thus $$r' = \\frac{r\\sin\\frac{\\theta}{2}}{1 + \\sin\\frac{\\theta}{2}}$$.\n\nThis is the result from Exercise 10 in the textbook (with $$\\theta$$ there being the half-angle). The key is drawing the right triangle and using trigonometry.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "Given that the area of triangle $$AOC$$ is three times the area of the shaded segment (where $$AB$$ is a diameter, $$\\angle BOC = \\theta$$), show that $$3\\theta - 4\\sin\\theta = 0$$. Walk through the setup. (3 steps)", "answer": "- Step 1: The segment area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Since $$AB$$ is a diameter, $$\\angle ACB = \\frac{\\pi}{2}$$ (angle in a semicircle). Triangle $$AOC$$ has sides $$OA = OC = r$$ with angle $$\\angle AOC = \\pi - \\theta$$, so its area is $$\\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: We're told: area of triangle = 3 × area of segment. So: $$\\frac{1}{2}r^2\\sin\\theta = 3 \\times \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 3: Cancel $$\\frac{1}{2}r^2$$: $$\\sin\\theta = 3(\\theta - \\sin\\theta) = 3\\theta - 3\\sin\\theta$$. So $$4\\sin\\theta = 3\\theta$$, giving $$3\\theta - 4\\sin\\theta = 0$$.\n\nThe key insight is using $$\\sin(\\pi - \\theta) = \\sin\\theta$$ for the triangle area, and recognising that the segment is the small region bounded by chord $$BC$$ and arc $$BC$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Using small-angle approximations, approximate $$\\frac{\\sin 2\\theta}{1 - \\cos 2\\theta}$$ for small $$\\theta$$. Walk through the substitution carefully. (3 steps)", "answer": "- Step 1: For small $$\\theta$$, $$2\\theta$$ is also small. Apply approximations: $$\\sin 2\\theta \\approx 2\\theta$$ and $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$.\n- Step 2: So $$1 - \\cos 2\\theta \\approx 1 - (1 - 2\\theta^2) = 2\\theta^2$$.\n- Step 3: Therefore $$\\frac{\\sin 2\\theta}{1 - \\cos 2\\theta} \\approx \\frac{2\\theta}{2\\theta^2} = \\frac{1}{\\theta}$$.\n\nThis expression grows without bound as $$\\theta \\to 0$$, which makes sense — both numerator and denominator approach 0, but the numerator is linear in $$\\theta$$ while the denominator is quadratic, so the ratio diverges like $$\\frac{1}{\\theta}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "Solve $$2\\sin\\theta + 1 = 0$$ for $$\\theta \\in [0, 2\\pi]$$, giving exact answers in radians. (3 steps)", "answer": "- Step 1: $$\\sin\\theta = -\\frac{1}{2}$$. The reference angle is $$\\sin^{-1}\\frac{1}{2} = \\frac{\\pi}{6}$$.\n- Step 2: Sine is negative in the 3rd and 4th quadrants. 3rd quadrant: $$\\theta_1 = \\pi + \\frac{\\pi}{6} = \\frac{7\\pi}{6}$$. 4th quadrant: $$\\theta_2 = 2\\pi - \\frac{\\pi}{6} = \\frac{11\\pi}{6}$$.\n- Step 3: Both values are in $$[0, 2\\pi]$$. Solutions: $$\\theta = \\frac{7\\pi}{6}, \\frac{11\\pi}{6}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Solve $$\\cos 2\\theta = \\frac{1}{2}$$ for $$\\theta \\in [0, \\pi]$$. Give exact answers in radians. (3 steps)", "answer": "- Step 1: $$2\\theta = \\cos^{-1}\\frac{1}{2}$$. The values of $$2\\theta$$ in $$[0, 2\\pi]$$ where cosine equals $$\\frac{1}{2}$$ are $$2\\theta = \\frac{\\pi}{3}$$ and $$2\\theta = 2\\pi - \\frac{\\pi}{3} = \\frac{5\\pi}{3}$$.\n- Step 2: Divide by 2: $$\\theta = \\frac{\\pi}{6}$$ and $$\\theta = \\frac{5\\pi}{6}$$.\n- Step 3: Check: both are in $$[0, \\pi]$$. Solutions: $$\\theta = \\frac{\\pi}{6}, \\frac{5\\pi}{6}$$.\n\n**Key technique:** When solving $$\\cos(n\\theta) = k$$, first find all values of $$n\\theta$$, then divide by $$n$$. Always check your answers are in the required interval.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "A plot of land is a sector of radius 55 m. The fencing around its edge totals 176 m. Find the area of the plot. Walk through the complete strategy. (4 steps)", "answer": "- Step 1: Let the sector angle be $$\\theta$$ radians. The perimeter = arc + two radii = $$55\\theta + 2(55) = 55\\theta + 110$$.\n- Step 2: Set perimeter = 176: $$55\\theta + 110 = 176$$, so $$55\\theta = 66$$, giving $$\\theta = \\frac{66}{55} = 1.2$$ radians.\n- Step 3: Now find the area using $$A = \\frac{1}{2}r^2\\theta$$: $$A = \\frac{1}{2}(55^2)(1.2) = \\frac{1}{2}(3025)(1.2)$$.\n- Step 4: $$A = 0.5 \\times 3025 \\times 1.2 = 1815$$ m².\n\nThis is a classic two-step problem: first find the angle from the perimeter, then find the area. The key is recognising that perimeter gives you a relationship between $$r$$ and $$\\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Two intersecting circles each of radius 12 cm have centres $$O_1$$ and $$O_2$$, with each centre lying on the other's circumference. Show that the angle $$\\angle AO_1B = \\frac{2\\pi}{3}$$, where $$A$$ and $$B$$ are the intersection points. (3 steps)", "answer": "- Step 1: Since $$O_2$$ lies on the circumference of the circle centred at $$O_1$$, we have $$O_1O_2 = 12$$ cm (the radius). Similarly, $$O_2O_1 = 12$$ cm. Triangle $$O_1AO_2$$ is equilateral with all sides = 12 cm.\n- Step 2: In an equilateral triangle, each angle is $$\\frac{\\pi}{3}$$ radians (60°). So $$\\angle AO_1O_2 = \\frac{\\pi}{3}$$ and $$\\angle BO_1O_2 = \\frac{\\pi}{3}$$.\n- Step 3: Therefore $$\\angle AO_1B = \\frac{\\pi}{3} + \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$ radians (120°).\n\nThe region $$R$$ enclosed by both circles is formed by two identical segments, each with angle $$\\frac{2\\pi}{3}$$ and radius 12.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Using the result from Q44, find the area of the lens-shaped region enclosed by two circles of radius 12 cm whose centres lie on each other's circumference. Give your answer to 3 significant figures. (3 steps)", "answer": "- Step 1: The region consists of two identical segments, each from a circle of radius 12 with angle $$\\frac{2\\pi}{3}$$. Each segment area = $$\\frac{1}{2}r^2(\\theta - \\sin\\theta) = \\frac{1}{2}(144)\\left(\\frac{2\\pi}{3} - \\sin\\frac{2\\pi}{3}\\right)$$.\n- Step 2: $$\\sin\\frac{2\\pi}{3} = \\frac{\\sqrt{3}}{2}$$. So each segment = $$72\\left(\\frac{2\\pi}{3} - \\frac{\\sqrt{3}}{2}\\right) = 72 \\times \\frac{2\\pi}{3} - 72 \\times \\frac{\\sqrt{3}}{2} = 48\\pi - 36\\sqrt{3}$$.\n- Step 3: Total area = 2 segments = $$2(48\\pi - 36\\sqrt{3}) = 96\\pi - 72\\sqrt{3} \\approx 301.59 - 124.71 = 176.88 \\approx 177$$ cm² (3 s.f.).\n\nThis \"lens\" or \"lune\" shape appears frequently in geometry problems involving intersecting circles.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A student is asked to approximate $$\\sin 0.2$$ using small-angle approximations. They write $$\\sin 0.2 \\approx 0.2$$. Estimate the percentage error in this approximation. (3 steps)", "answer": "- Step 1: The approximation gives $$\\sin 0.2 \\approx 0.2$$. The actual value (calculator, radians mode): $$\\sin 0.2 \\approx 0.19867$$.\n- Step 2: Error = $$|0.2 - 0.19867| = 0.00133$$. Percentage error = $$\\frac{0.00133}{0.19867} \\times 100\\% \\approx 0.67\\%$$.\n- Step 3: Alternatively, from the series: the next term is $$\\frac{\\theta^3}{6} = \\frac{0.008}{6} \\approx 0.00133$$, confirming the error. For $$\\theta = 0.2$$, the approximation is excellent (under 1% error).\n\nThis confirms the rule of thumb: for $$\\theta \\lesssim 0.3$$ rad, $$\\sin\\theta \\approx \\theta$$ is accurate to about 1%.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "Approximate $$\\cos\\theta$$ for $$\\theta = 0.3$$ radians using the small-angle formula, and estimate the percentage error compared to the true value. (3 steps)", "answer": "- Step 1: Approximation: $$\\cos 0.3 \\approx 1 - \\frac{0.3^2}{2} = 1 - \\frac{0.09}{2} = 1 - 0.045 = 0.955$$.\n- Step 2: True value: $$\\cos 0.3 \\approx 0.95534$$ (calculator).\n- Step 3: Error = $$|0.955 - 0.95534| = 0.00034$$. Percentage error = $$\\frac{0.00034}{0.95534} \\times 100\\% \\approx 0.036\\%$$. The cosine approximation is even more accurate than the sine approximation because the error term is of order $$\\theta^4$$ (the next term is $$+\\frac{\\theta^4}{24}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "In triangle $$ABC$$, $$AB = 9$$ cm, $$BC = 10$$ cm, $$CA = 5$$ cm. A circle centred at $$A$$ with radius 3 cm intersects $$AB$$ at $$P$$ and $$AC$$ at $$Q$$. The region $$BPQC$$ is shaded. Describe the strategy to find the perimeter of the shaded region. (3 steps)", "answer": "- Step 1: The perimeter of region $$BPQC$$ consists of: segment $$BP$$ (along $$AB$$), arc $$PQ$$ (part of the circle centred at $$A$$), segment $$QC$$ (along $$AC$$), and side $$CB$$.\n- Step 2: First, find angle $$\\angle BAC$$ using the cosine rule: $$\\cos A = \\frac{b^2 + c^2 - a^2}{2bc} = \\frac{5^2 + 9^2 - 10^2}{2 \\times 5 \\times 9} = \\frac{25 + 81 - 100}{90} = \\frac{6}{90} = \\frac{1}{15}$$. So $$A = \\cos^{-1}\\frac{1}{15} \\approx 1.504$$ radians.\n- Step 3: Now compute each piece: $$BP = 9 - 3 = 6$$ cm, $$QC = 5 - 3 = 2$$ cm, arc $$PQ = 3 \\times 1.504 \\approx 4.51$$ cm, and $$CB = 10$$ cm. Perimeter ≈ $$6 + 4.51 + 2 + 10 = 22.5$$ cm.\n\nThe key strategy: decompose the perimeter into straight segments and arcs, find the angle first (using the cosine rule), then compute each piece.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A badge is shaped as a sector of a circle with an equilateral triangle $$ABC$$ of perpendicular height 3 cm. Find the radius (side length) of the equilateral triangle in surd form, then find the area of the badge. (3 steps)", "answer": "- Step 1: In an equilateral triangle with side $$s$$ and perpendicular height $$h$$: $$h = \\frac{\\sqrt{3}}{2}s$$. Given $$h = 3$$: $$s = \\frac{6}{\\sqrt{3}} = 2\\sqrt{3}$$ cm.\n- Step 2: The sector angle is $$\\frac{\\pi}{3}$$ (60°, since the triangle is equilateral). The radius of the sector is $$AB = 2\\sqrt{3}$$ cm.\n- Step 3: Area of sector = $$\\frac{1}{2}r^2\\theta = \\frac{1}{2}(2\\sqrt{3})^2 \\times \\frac{\\pi}{3} = \\frac{1}{2}(12) \\times \\frac{\\pi}{3} = 6 \\times \\frac{\\pi}{3} = 2\\pi$$ cm².\n\nThe badge is the sector (not just the triangle), so its area is the sector area $$2\\pi$$, not the triangle area.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A straight path of length 70 m connects points $$A$$ and $$B$$. A railway track in the form of a circular arc (centre $$C$$, radius 44 m) also connects them. If $$CA = CB = 44$$ m, find the angle $$\\angle ACB$$ and hence the length of the railway track. (3 steps)", "answer": "- Step 1: In isosceles triangle $$ABC$$, drop a perpendicular from $$C$$ to the midpoint $$M$$ of $$AB$$. Then $$AM = 35$$ m and $$CA = 44$$ m. So $$\\sin\\frac{\\angle ACB}{2} = \\frac{35}{44}$$.\n- Step 2
