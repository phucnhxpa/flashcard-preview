: $$\\frac{\\angle ACB}{2} = \\sin^{-1}\\frac{35}{44} \\approx 0.9200$$ rad, so $$\\angle ACB \\approx 1.8400 \\approx 1.84$$ rad (to 2 d.p.).\n- Step 3: Arc length = $$r\\theta = 44 \\times 1.84 \\approx 81.0$$ m.\n\nThe railway track is longer than the straight path (81 m vs 70 m), which makes sense — the arc curves around, adding distance.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}], "count": 50}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Why does a full revolution around a circle equal exactly $$2\\pi$$ radians? (3 steps)", "answer": "- Step 1: The circumference of a circle of radius $$r$$ is $$2\\pi r$$. This is the total arc length for one complete revolution.\n- Step 2: From the definition, an arc of length $$r$$ subtends 1 radian. So an arc of length $$2\\pi r$$ subtends $$\\frac{2\\pi r}{r} = 2\\pi$$ radians.\n- Step 3: Since a full revolution is also $$360°$$, we get the fundamental relationship $$2\\pi \\text{ rad} = 360°$$, or equivalently $$\\pi \\text{ rad} = 180°$$.\n\nThe factor of $$2\\pi$$ arises because the circumference-to-radius ratio is exactly $$2\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "To convert an angle from radians to degrees, what factor do you multiply by, and why? (2 steps)", "answer": "- Step 1: Since $$\\pi$$ radians $$= 180°$$, we have $$1 \\text{ radian} = \\frac{180°}{\\pi}$$. So to convert from radians to degrees, multiply by $$\\frac{180}{\\pi}$$.\n- Step 2: For example, $$\\frac{7\\pi}{8}$$ rad $$= \\frac{7\\pi}{8} \\times \\frac{180°}{\\pi} = \\frac{7}{8} \\times 180° = 157.5°$$. The $$\\pi$$ cancels, leaving a pure number times $$180°$$.\n\nThink of it as: radians × (degrees per radian) = degrees.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "To convert an angle from degrees to radians, what factor do you multiply by? (2 steps)", "answer": "- Step 1: Since $$180° = \\pi$$ radians, we have $$1° = \\frac{\\pi}{180}$$ radians. So to convert from degrees to radians, multiply by $$\\frac{\\pi}{180}$$.\n- Step 2: For example, $$150° = 150° \\times \\frac{\\pi}{180°} = \\frac{5\\pi}{6}$$ rad. The 150 and 180 simplify by cancelling the common factor of 30.\n\nThink of it as: degrees × (radians per degree) = radians.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Approximately how many degrees is 1 radian, and why is it slightly less than 60°? (2 steps)", "answer": "- Step 1: $$1 \\text{ radian} = \\frac{180°}{\\pi} \\approx \\frac{180°}{3.14159} \\approx 57.296°$$. This is the exact conversion.\n- Step 2: It is less than 60° because $$\\pi \\approx 3.14 > 3$$, so $$\\frac{180}{\\pi} < \\frac{180}{3} = 60$$. Since $$\\pi$$ exceeds 3, the denominator is larger, making the quotient smaller than 60.\n\nA useful checkpoint: if you ever compute 1 radian and get something near 57°, you're in the right ballpark.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "What are the exact radian measures for the six key angles: $$30°$$, $$45°$$, $$60°$$, $$90°$$, $$180°$$, and $$360°$$? (2 steps)", "answer": "- Step 1: Multiply each by $$\\frac{\\pi}{180}$$ and simplify:\n+ $$30° = \\frac{30\\pi}{180} = \\frac{\\pi}{6}$$\n+ $$45° = \\frac{45\\pi}{180} = \\frac{\\pi}{4}$$\n+ $$60° = \\frac{60\\pi}{180} = \\frac{\\pi}{3}$$\n+ $$90° = \\frac{90\\pi}{180} = \\frac{\\pi}{2}$$\n+ $$180° = \\frac{180\\pi}{180} = \\pi$$\n+ $$360° = \\frac{360\\pi}{180} = 2\\pi$$\n- Step 2: These must be memorised. Notice the pattern: the denominators 6, 4, 3, 2 are exactly what you'd get by asking \"how many of this angle fit in $$180°$$?\" — that count becomes the denominator under $$\\pi$$.\n\nEach fraction tells you what fraction of a half-revolution (π rad) the angle represents.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A student converts $$110°$$ to radians and writes the answer as $$\\frac{11\\pi}{18}$$. How would you verify this is correct without a calculator? (2 steps)", "answer": "- Step 1: Apply the conversion: $$110° \\times \\frac{\\pi}{180°} = \\frac{110\\pi}{180} = \\frac{11\\pi}{18}$$ after dividing numerator and denominator by 10.\n- Step 2: To verify, convert back: $$\\frac{11\\pi}{18} \\times \\frac{180°}{\\pi} = \\frac{11 \\times 180°}{18} = 11 \\times 10° = 110°$$. ✓ The round-trip confirms the answer.\n\nAlways check: does the fraction of π make sense? $$\\frac{11}{18}$$ is a bit more than $$\\frac{1}{2}$$, so the angle is a bit more than $$90°$$ — consistent with $$110°$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why do formulas for arc length and sector area become simpler when angles are measured in radians rather than degrees? (3 steps)", "answer": "- Step 1: In degrees, the arc length formula is $$l = \\frac{\\theta}{360} \\times 2\\pi r$$, because you're taking a fraction $$\\frac{\\theta}{360}$$ of the full circumference. Similarly, sector area is $$A = \\frac{\\theta}{360} \\times \\pi r^2$$.\n- Step 2: In radians, a full circle is $$2\\pi$$ rad, so the fraction of the circle is $$\\frac{\\theta}{2\\pi}$$. Then arc length becomes $$l = \\frac{\\theta}{2\\pi} \\times 2\\pi r = r\\theta$$, and sector area becomes $$A = \\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$.\n- Step 3: The $$2\\pi$$ and $$\\pi$$ cancel cleanly because radians measure the angle as a fraction of the radius-arc relationship directly. In degrees, the arbitrary 360 never cancels with anything natural, leaving ugly fractions.\n\nRadians are the \"natural\" unit: they make the constant of proportionality equal to 1 in $$l = r\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A student calculates arc length as $$l = r\\theta$$ where $$\\theta = 60$$ (meaning 60°). What is wrong, and what is the correct arc length for a circle of radius 10 cm? (3 steps)", "answer": "- Step 1: The formula $$l = r\\theta$$ requires $$\\theta$$ in radians. Substituting $$\\theta = 60$$ as if it were radians gives $$l = 600$$ cm, which is absurdly large — almost 10 times the full circumference of $$20\\pi \\approx 62.8$$ cm.\n- Step 2: The correct approach: convert $$60°$$ to radians first: $$60° = \\frac{\\pi}{3}$$ rad.\n- Step 3: Now compute: $$l = r\\theta = 10 \\times \\frac{\\pi}{3} = \\frac{10\\pi}{3} \\approx 10.47$$ cm. This is a reasonable arc length, about one-sixth of the circumference.\n\n**Misconception probe:** Always check: if your arc length exceeds the full circumference $$2\\pi r$$, something is wrong — likely a degree-radian mix-up.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "State the arc length formula $$l = r\\theta$$. If the radius doubles and the angle halves (both still in radians), what happens to the arc length? (2 steps)", "answer": "- Step 1: The formula is $$l = r\\theta$$, where $$r$$ is the radius and $$\\theta$$ is the angle in radians.\n- Step 2: If $$r \\to 2r$$ and $$\\theta \\to \\frac{\\theta}{2}$$, then the new arc length is $$l' = (2r)\\left(\\frac{\\theta}{2}\\right) = r\\theta = l$$. The arc length stays the same because the two changes cancel exactly.\n\nArc length depends on the *product* $$r\\theta$$. Changing $$r$$ and $$\\theta$$ in inverse proportions leaves $$l$$ unchanged.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Derive the formula $$l = r\\theta$$ from the proportionality principle that arc length is proportional to the angle subtended. (3 steps)", "answer": "- Step 1: For a fixed radius $$r$$, the arc length $$l$$ is proportional to the angle $$\\theta$$ at the centre. So $$l = k\\theta$$ for some constant $$k$$ that depends on $$r$$.\n- Step 2: To find $$k$$, use the known case: when $$\\theta = 2\\pi$$ (a full revolution), the arc is the entire circumference, so $$l = 2\\pi r$$. Substituting: $$2\\pi r = k \\cdot 2\\pi$$, giving $$k = r$$.\n- Step 3: Therefore $$l = r\\theta$$. The constant of proportionality is simply the radius itself — this is precisely why radians are the natural unit.\n\nThe formula encodes the definition: 1 radian opens up an arc of length 1 radius.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "What is the perimeter of a sector of a circle with radius $$r$$ and angle $$\\theta$$ radians? (2 steps)", "answer": "- Step 1: A sector is bounded by two radii and one arc. The two radii contribute $$2r$$ to the perimeter, and the arc contributes $$r\\theta$$.\n- Step 2: Therefore the total perimeter is $$P = r\\theta + 2r = r(\\theta + 2)$$.\n\nFactorising as $$r(\\theta + 2)$$ is often useful when solving for $$r$$ given the perimeter.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A sector has perimeter $$P$$ and angle $$\\theta$$ radians. Express the radius $$r$$ in terms of $$P$$ and $$\\theta$$. (2 steps)", "answer": "- Step 1: The perimeter is $$P = r\\theta + 2r = r(\\theta + 2)$$.\n- Step 2: Solving for $$r$$: $$r = \\frac{P}{\\theta + 2}$$.\n\nThis is a quick formula to recall when perimeter and angle are given but radius is unknown.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A minor arc subtends angle $$x$$ radians at the centre of a circle, and the major arc subtends angle $$5x$$ radians. Find $$x$$ and describe the ratio of the minor arc length to the major arc length. (3 steps)", "answer": "- Step 1: The total angle around the centre is $$2\\pi$$ radians. So $$x + 5x = 2\\pi$$, giving $$6x = 2\\pi$$, hence $$x = \\frac{\\pi}{3}$$.\n- Step 2: The minor arc has length $$l_1 = r \\cdot x = r \\cdot \\frac{\\pi}{3}$$, and the major arc has length $$l_2 = r \\cdot 5x = r \\cdot \\frac{5\\pi}{3}$$.\n- Step 3: The ratio is $$l_1 : l_2 = \\frac{\\pi}{3} : \\frac{5\\pi}{3} = 1 : 5$$. Since arc length is proportional to angle, the arc length ratio equals the angle ratio.\n\nArc length ratios always match angle ratios (for the same radius) because $$l = r\\theta$$ is linear in $$\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "An arc of a circle with radius 7 cm has length 2.45 cm. How do you find the angle subtended at the centre? (2 steps)", "answer": "- Step 1: Use $$l = r\\theta$$ and solve for $$\\theta$$: $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substituting: $$\\theta = \\frac{2.45}{7} = 0.35$$ radians. (This is about $$20°$$, a small angle — consistent with a short arc on a circle of radius 7.)\n\nWhenever you know any two of $$l$$, $$r$$, $$\\theta$$, the third follows immediately from $$l = r\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A garden pond has a straight edge $$AB$$ of length 2.4 m, and a curved edge that is an arc of a circle with centre $$O$$ and radius 2 m. Outline the strategy to find the length of the curved edge. (3 steps)", "answer": "- Step 1: The triangle $$AOB$$ is isosceles (both sides are radii of length 2 m). The straight edge $$AB = 2.4$$ m is the base. Use trigonometry to find the angle $$\\angle AOB$$: drop a perpendicular from $$O$$ to the midpoint of $$AB$$, creating a right triangle with adjacent side 1.2 m and hypotenuse 2 m.\n- Step 2: The half-angle is $$\\cos^{-1}\\left(\\frac{1.2}{2}\\right) = \\cos^{-1}(0.6) \\approx 0.9273$$ rad, so the full acute angle $$\\angle AOB \\approx 1.287$$ rad. The curved edge subtends the *reflex* angle $$\\theta = 2\\pi - 1.287 \\approx 4.996$$ rad.\n- Step 3: The arc length is $$l = r\\theta = 2 \\times (2\\pi - 1.287) \\approx 9.99$$ m.\n\nKey insight: always check whether the problem asks for the minor arc or the major (reflex) arc — they sum to the full circumference.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "State the formula for the area of a sector of a circle with radius $$r$$ and angle $$\\theta$$ in radians. (2 steps)", "answer": "- Step 1: The area of a sector is $$A = \\frac{1}{2}r^2\\theta$$, where $$r$$ is the radius and $$\\theta$$ is the angle in radians.\n- Step 2: This comes from the fact that the sector is a fraction $$\\frac{\\theta}{2\\pi}$$ of the full circle area $$\\pi r^2$$: $$A = \\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$.\n\nCompare with the degree version $$A = \\frac{\\theta}{360} \\times \\pi r^2$$ — the radian version is cleaner.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Derive the sector area formula $$A = \\frac{1}{2}r^2\\theta$$ starting from the arc length formula $$l = r\\theta$$. (3 steps)", "answer": "- Step 1: Think of the sector as a thin \"triangle\" with base equal to the arc length $$l = r\\theta$$ and height equal to the radius $$r$$.\n- Step 2: Using the triangle area formula $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$: $$A = \\frac{1}{2} \\times r\\theta \\times r = \\frac{1}{2}r^2\\theta$$.\n- Step 3: This is not a coincidence — as the angle gets very small, the sector truly approximates a triangle with base along the arc and height along the radius. The formula is exact for any angle because the \"triangular\" decomposition works sector-by-sector.\n\nThis derivation reveals why the $$\\frac{1}{2}$$ appears: it's the same $$\\frac{1}{2}$$ as in the triangle area formula.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "A sector has area 28.9 cm² and angle 0.8 radians. Describe how to find the radius. (3 steps)", "answer": "- Step 1: Start with $$A = \\frac{1}{2}r^2\\theta$$ and substitute the knowns: $$28.9 = \\frac{1}{2}r^2 \\times 0.8$$.\n- Step 2: Simplify: $$28.9 = 0.4\\,r^2$$, so $$r^2 = \\frac{28.9}{0.4} = 72.25$$.\n- Step 3: Take the positive square root (lengths are positive): $$r = \\sqrt{72.25} = 8.5$$ cm.\n\nAlways use the positive root — a negative radius has no physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What is the geometric difference between a sector and a segment of a circle? (2 steps)", "answer": "- Step 1: A **sector** is the region enclosed by two radii and an arc — it looks like a \"pie slice\" with its vertex at the centre.\n- Step 2: A **segment** is the region enclosed by a chord and an arc — it is the \"cap\" or \"lens\" shape between the chord and the arc, and does NOT include the centre (for the minor segment).\n\nThe segment is what remains when you subtract the triangular part (two radii + chord) from the sector.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "State the formula for the area of a segment of a circle with radius $$r$$ and angle $$\\theta$$ in radians. (2 steps)", "answer": "- Step 1: The area of a segment is $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$, where $$\\theta$$ is in radians.\n- Step 2: This is the sector area minus the triangle area: $$A = \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe formula combines two sub-formulas you already know: sector area and triangle area with two equal sides.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Derive the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ step by step. (4 steps)", "answer": "- Step 1: A segment is the region between a chord and its arc. It equals the sector area minus the triangle area formed by the two radii and the chord.\n- Step 2: The sector area is $$A_{\\text{sector}} = \\frac{1}{2}r^2\\theta$$.\n- Step 3: The triangle formed by two radii of length $$r$$ with included angle $$\\theta$$ has area $$A_{\\text{triangle}} = \\frac{1}{2}r \\cdot r \\cdot \\sin\\theta = \\frac{1}{2}r^2\\sin\\theta$$.\n- Step 4: Subtracting: $$A_{\\text{segment}} = \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe factor $$\\frac{1}{2}r^2$$ is common to both pieces, so it factors out neatly.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "When $$\\theta = \\pi$$ (a semicircle), what does the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ give? Does this make geometric sense? (3 steps)", "answer": "- Step 1: Substitute $$\\theta = \\pi$$: $$A = \\frac{1}{2}r^2(\\pi - \\sin\\pi) = \\frac{1}{2}r^2(\\pi - 0) = \\frac{1}{2}\\pi r^2$$.\n- Step 2: This is exactly half the circle's area $$\\pi r^2$$, which makes sense: when the angle is a semicircle, the chord is the diameter, and the \"segment\" is the entire semicircle.\n- Step 3: The triangle area is zero because the two radii form a straight line (angle $$\\pi$$), so $$\\sin\\pi = 0$$ and the triangle collapses. The segment equals the sector.\n\nEdge case confirmed: at $$\\theta = \\pi$$, the segment, sector, and semicircle all coincide.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "For the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$, explain why the result is always positive for $$0 < \\theta < 2\\pi$$. (3 steps)", "answer": "- Step 1: The sign of the area depends on the sign of $$(\\theta - \\sin\\theta)$$. We need to show $$\\theta > \\sin\\theta$$ for $$0 < \\theta < 2\\pi$$.\n- Step 2: For $$0 < \\theta \\leq \\pi$$: the function $$f(\\theta) = \\theta - \\sin\\theta$$ has $$f(0) = 0$$ and $$f'(\\theta) = 1 - \\cos\\theta \\geq 0$$ (since $$\\cos\\theta \\leq 1$$). So $$f$$ is non-decreasing, meaning $$\\theta \\geq \\sin\\theta$$ with equality only at $$\\theta = 0$$.\n- Step 3: For $$\\pi < \\theta < 2\\pi$$: $$\\sin\\theta < 0$$ while $$\\theta > 0$$, so clearly $$\\theta > \\sin\\theta$$. In all cases, $$\\theta - \\sin\\theta > 0$$, so the segment area is always positive.\n\nThe arc \"sweeps out\" more area than the chord \"cuts off\" — that's why the segment (the difference) is always positive.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "If the arc length of a sector is $$l$$ and the radius is $$r$$, express the sector area in terms of $$l$$ and $$r$$ only (no $$\\theta$$). (3 steps)", "answer": "- Step 1: From $$l = r\\theta$$, solve for $$\\theta$$: $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substitute into the sector area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}r^2 \\cdot \\frac{l}{r} = \\frac{1}{2}rl$$.\n- Step 3: The result is $$A = \\frac{1}{2}rl$$. This looks like the triangle area formula $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$, with base = arc length and height = radius.\n\nThis is the Challenge result from the textbook: $$A = \\frac{1}{2}rl$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A sector of radius 55 m has perimeter 176 m. Describe the process to find its area. (3 steps)", "answer": "- Step 1: The perimeter is $$P = r\\theta + 2r$$. So $$176 = 55\\theta + 110$$, giving $$55\\theta = 66$$, hence $$\\theta = \\frac{66}{55} = 1.2$$ radians.\n- Step 2: Now use the sector area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(55)^2(1.2)$$.\n- Step 3: Compute: $$A = \\frac{1}{2} \\times 3025 \\times 1.2 = 1815$$ m².\n\nStrategy: perimeter → angle → area. Two steps of substitution.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A student computes the area of a segment as $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ with $$\\theta = 50$$ (meaning 50°). What is wrong? (2 steps)", "answer": "- Step 1: The formula requires $$\\theta$$ in radians. Using $$\\theta = 50$$ as if it were radians gives $$\\sin(50) \\approx -0.262$$ (since 50 rad is far beyond $$2\\pi$$), producing a nonsensical result.\n- Step 2: The correct approach: convert $$50° = \\frac{5\\pi}{18}$$ rad first, then compute $$A = \\frac{1}{2}r^2\\left(\\frac{5\\pi}{18} - \\sin\\frac{5\\pi}{18}\\right)$$.\n\n**Misconception probe:** Every radian formula ($$l = r\\theta$$, $$A = \\frac{1}{2}r^2\\theta$$, $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$) requires $$\\theta$$ in radians. The $$\\sin\\theta$$ term especially demands radians on your calculator.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "In a circle of radius $$r$$, the chord $$AB$$ has length 6 cm and the radius is also 6 cm. What is the angle subtended by the arc $$AB$$, and what is the arc length? (3 steps)", "answer": "- Step 1: Triangle $$AOB$$ is isosceles with $$OA = OB = 6$$ and $$AB = 6$$. So it is actually equilateral, meaning $$\\angle AOB = 60° = \\frac{\\pi}{3}$$ radians.\n- Step 2: The arc length is $$l = r\\theta = 6 \\times \\frac{\\pi}{3} = 2\\pi$$ cm.\n- Step 3: Check: the arc length $$2\\pi \\approx 6.28$$ cm is slightly longer than the chord length 6 cm, which makes sense — the arc \"curves around\" and is always longer than the straight chord it subtends.\n\nAn arc is always longer than its chord (for angles $$0 < \\theta < \\pi$$), and equal only when $$\\theta = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "What are the principal value ranges (in radians) for $$\\sin^{-1}$$, $$\\cos^{-1}$$, and $$\\tan^{-1}$$? (2 steps)", "answer": "- Step 1: The principal value ranges in radians are:\n+ $$\\sin^{-1}$$: $$-\\frac{\\pi}{2} \\leq \\theta \\leq \\frac{\\pi}{2}$$ (first and fourth quadrants)\n+ $$\\cos^{-1}$$: $$0 \\leq \\theta \\leq \\pi$$ (first and second quadrants)\n+ $$\\tan^{-1}$$: $$-\\frac{\\pi}{2} < \\theta < \\frac{\\pi}{2}$$ (first and fourth quadrants)\n- Step 2: These are the same as the degree ranges ($$-90°$$ to $$90°$$, $$0°$$ to $$180°$$, $$-90°$$ to $$90°$$) but expressed in radians. Your calculator returns values in these ranges.\n\nWhen solving trig equations, the principal value is your starting point; other solutions come from symmetry.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Solve $$\\sin\\theta = \\frac{1}{2}$$ for $$0 \\leq \\theta < 2\\pi$$, giving exact answers in radians. (3 steps)", "answer": "- Step 1: The principal value is $$\\theta = \\sin^{-1}\\left(\\frac{1}{2}\\right) = \\frac{\\pi}{6}$$.\n- Step 2: Sine is positive in the first and second quadrants. The second quadrant solution is $$\\theta = \\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$.\n- Step 3: The two solutions are $$\\theta = \\frac{\\pi}{6}$$ and $$\\theta = \\frac{5\\pi}{6}$$.\n\nIn radians, the \"second quadrant\" rule becomes: if the principal value is $$\\alpha$$, the other sine solution in $$[0, 2\\pi)$$ is $$\\pi - \\alpha$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "If $$\\cos\\theta = -\\frac{1}{2}$$, find all solutions in the range $$0 \\leq \\theta < 2\\pi$$, giving exact answers in radians. (3 steps)", "answer": "- Step 1: The principal value is $$\\theta = \\cos^{-1}\\left(-\\frac{1}{2}\\right) = \\frac{2\\pi}{3}$$ (second quadrant, since cosine is negative).\n- Step 2: Cosine is negative in the second and third quadrants. The third quadrant solution is $$\\theta = 2\\pi - \\frac{2\\pi}{3} = \\frac{4\\pi}{3}$$.\n- Step 3: The two solutions are $$\\theta = \\frac{2\\pi}{3}$$ and $$\\theta = \\frac{4\\pi}{3}$$.\n\nFor cosine, if one solution is $$\\alpha$$, the other in $$[0, 2\\pi)$$ is $$2\\pi - \\alpha$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "If $$\\tan\\theta = \\sqrt{3}$$, find all solutions in the range $$0 \\leq \\theta < 2\\pi$$, giving exact answers in radians. (3 steps)", "answer": "- Step 1: The principal value is $$\\theta = \\tan^{-1}(\\sqrt{3}) = \\frac{\\pi}{3}$$.\n- Step 2: Tangent is positive in the first and third quadrants. The third quadrant solution is $$\\theta = \\pi + \\frac{\\pi}{3} = \\frac{4\\pi}{3}$$.\n- Step 3: The two solutions are $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = \\frac{4\\pi}{3}$$.\n\nFor tangent, if one solution is $$\\alpha$$, the other in $$[0, 2\\pi)$$ is $$\\pi + \\alpha$$. This is why tangent has period $$\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Using the CAST diagram in radians, if $$\\sin\\theta = -0.4$$, in which two quadrants are the solutions, and what is the general form of all solutions? (3 steps)", "answer": "- Step 1: Sine is negative in the third and fourth quadrants (C and T in CAST).\n- Step 2: The principal value is $$\\alpha = \\sin^{-1}(-0.4) \\approx -0.4115$$ rad (in the fourth quadrant, since the range of $$\\sin^{-1}$$ is $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$).\n- Step 3: The solutions in $$[0, 2\\pi)$$ are: $$\\theta = 2\\pi + \\alpha \\approx 5.872$$ rad (fourth quadrant) and $$\\theta = \\pi - \\alpha \\approx 3.553$$ rad (third quadrant). The general solution is $$\\theta = \\alpha + 2n\\pi$$ or $$\\theta = (\\pi - \\alpha) + 2n\\pi$$ for integer $$n$$.\n\nIn radians, the CAST rules work identically to degrees — just replace 360° with $$2\\pi$$ and 180° with $$\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "What is the small-angle approximation for $$\\sin\\theta$$ when $$\\theta$$ is small and measured in radians? Give a geometric justification. (3 steps)", "answer": "- Step 1: The approximation is $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$ in radians.\n- Step 2: Geometric justification: in the unit circle, $$\\sin\\theta$$ is the vertical coordinate (height of the triangle). For a small angle, the arc of length $$\\theta$$ is nearly vertical, so the arc length, the vertical height $$\\sin\\theta$$, and the tangent length $$\\tan\\theta$$ are all nearly equal to $$\\theta$$.\n- Step 3: More precisely, as $$\\theta \\to 0$$, $$\\frac{\\sin\\theta}{\\theta} \\to 1$$. This is a fundamental limit. The error is of order $$\\theta^3$$, so the approximation is very good for small $$\\theta$$.\n\nThis is why radians are essential: $$\\sin\\theta \\approx \\theta$$ is only true when $$\\theta$$ is in radians. In degrees, $$\\sin 1° \\neq 1$$!", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "What is the small-angle approximation for $$\\cos\\theta$$ when $$\\theta$$ is small and measured in radians? Why does it include a $$\\theta^2$$ term rather than just being a constant? (3 steps)", "answer": "- Step 1: The approximation is $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ for small $$\\theta$$ in radians.\n- Step 2: Unlike $$\\sin\\theta$$, which passes through the origin, $$\\cos\\theta$$ starts at 1 when $$\\theta = 0$$. The first correction term captures the *curvature* — how fast cosine drops away from 1.\n- Step 3: Geometrically, for small $$\\theta$$, the point on the unit circle drops below height 1 by a distance approximately $$\\frac{\\theta^2}{2}$$ (this comes from the chord-arc relationship: the \"sag\" of a circular arc of length $$\\theta$$ is roughly $$\\frac{\\theta^2}{8} \\times 4 = \\frac{\\theta^2}{2}$$ for the unit circle). So $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$.\n\nThe quadratic term reflects that cosine curves *away* from its maximum — the drop-off is proportional to the square of the angle.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "What is the small-angle approximation for $$\\tan\\theta$$ when $$\\theta$$ is small and measured in radians? Why does it match the sine approximation? (3 steps)", "answer": "- Step 1: The approximation is $$\\tan\\theta \\approx \\theta$$ for small $$\\theta$$ in radians.\n- Step 2: Since $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, and for small $$\\theta$$: $$\\sin\\theta \\approx \\theta$$ and $$\\cos\\theta \\approx 1$$, we get $$\\tan\\theta \\approx \\frac{\\theta}{1} = \\theta$$.\n- Step 3: The next-order correction would be $$\\tan\\theta \\approx \\theta + \\frac{\\theta^3}{3}$$, but to leading order, $$\\tan\\theta \\approx \\theta$$ just like $$\\sin\\theta$$.\n\nBoth $$\\sin\\theta$$ and $$\\tan\\theta$$ pass through the origin with slope 1 (in radians), so their leading-order approximations coincide.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A student says \"since $$\\sin\\theta \\approx \\theta$$ for small angles, $$\\sin 0.1° \\approx 0.1$$\". What is wrong? (3 steps)", "answer": "- Step 1: The small-angle approximation $$\\sin\\theta \\approx \\theta$$ requires $$\\theta$$ to be in **radians**. The value $$0.1°$$ is in degrees.\n- Step 2: Converting: $$0.1° = \\frac{0.1\\pi}{180} \\approx 0.001745$$ radians. So $$\\sin 0.1° \\approx 0.001745$$, not 0.1.\n- Step 3: The student's answer of 0.1 is off by a factor of about 57 (which is $$\\frac{180}{\\pi}$$). This is the degree-radian conversion factor — exactly the error you'd expect from using degrees where radians are required.\n\n**Misconception probe:** The approximation $$\\sin\\theta \\approx \\theta$$ is a statement about the *radian* measure. It essentially says \"the sine of a small number of radians is approximately that number.\"", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "For roughly what range of $$\\theta$$ (in radians) are the small-angle approximations considered reasonably accurate? What happens as $$\\theta$$ increases? (2 steps)", "answer": "- Step 1: The approximations are typically good to within about 1% for $$|\\theta| < 0.25$$ rad (about 14°). They remain usable (within ~5%) up to about $$|\\theta| < 0.5$$ rad (about 29°).\n- Step 2: As $$\\theta$$ increases, the errors grow: $$\\sin\\theta$$ falls below $$\\theta$$ (since sine curves down), $$\\cos\\theta$$ falls below $$1 - \\frac{\\theta^2}{2}$$, and $$\\tan\\theta$$ rises above $$\\theta$$ (since tangent curves up steeply). Beyond about 0.5 rad, the approximations become increasingly unreliable.\n\nThe approximations are *asymptotic* — exact in the limit $$\\theta \\to 0$$, and increasingly approximate as $$\\theta$$ grows.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Using small-angle approximations, simplify $$\\frac{\\sin\\theta}{\\theta}$$ and $$\\frac{1 - \\cos\\theta}{\\theta^2}$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: For $$\\frac{\\sin\\theta}{\\theta}$$: using $$\\sin\\theta \\approx \\theta$$, we get $$\\frac{\\sin\\theta}{\\theta} \\approx \\frac{\\theta}{\\theta} = 1$$.\n- Step 2: For $$\\frac{1 - \\cos\\theta}{\\theta^2}$$: using $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, we get $$1 - \\cos\\theta \\approx \\frac{\\theta^2}{2}$$, so $$\\frac{1 - \\cos\\theta}{\\theta^2} \\approx \\frac{\\theta^2/2}{\\theta^2} = \\frac{1}{2}$$.\n- Step 3: These are important limits: $$\\lim_{\\theta \\to 0} \\frac{\\sin\\theta}{\\theta} = 1$$ and $$\\lim_{\\theta \\to 0} \\frac{1 - \\cos\\theta}{\\theta^2} = \\frac{1}{2}$$. The small-angle approximations give you these limits immediately.\n\nThese two results are among the most used consequences of small-angle approximations.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "Using small-angle approximations, find an approximate expression for $$\\frac{3\\sin\\theta + \\tan\\theta}{2\\theta}$$ when $$\\theta$$ is small. (3 steps)", "answer": "- Step 1: Apply the approximations: $$\\sin\\theta \\approx \\theta$$ and $$\\tan\\theta \\approx \\theta$$.\n- Step 2: Substitute: numerator $$\\approx 3\\theta + \\theta = 4\\theta$$. So the expression becomes $$\\frac{4\\theta}{2\\theta} = 2$$.\n- Step 3: The approximate value is 2. This makes sense: both $$\\sin\\theta$$ and $$\\tan\\theta$$ contribute one \"copy\" of $$\\theta$$ each, and the 3 multiplies the sine contribution.\n\nFor small $$\\theta$$, any expression involving only $$\\sin\\theta$$, $$\\tan\\theta$$, and $$\\theta$$ in the right combination will simplify to a constant.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Using small-angle approximations, approximate $$\\frac{\\cos 4\\theta - 1}{\\theta^2}$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: Use $$\\cos\\phi \\approx 1 - \\frac{\\phi^2}{2}$$ with $$\\phi = 4\\theta$$: $$\\cos 4\\theta \\approx 1 - \\frac{(4\\theta)^2}{2} = 1 - \\frac{16\\theta^2}{2} = 1 - 8\\theta^2$$.\n- Step 2: So $$\\cos 4\\theta - 1 \\approx -8\\theta^2$$.\n- Step 3: Therefore $$\\frac{\\cos 4\\theta - 1}{\\theta^2} \\approx \\frac{-8\\theta^2}{\\theta^2} = -8$$.\n\nThe key trick: when the argument of the trig function isn't just $$\\theta$$ but $$k\\theta$$, substitute $$\\phi = k\\theta$$ and apply the approximation to $$\\phi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Explain the unified reason why radians are the \"natural\" unit for angles, connecting the definition of a radian to the simplicity of $$l = r\\theta$$, $$A = \\frac{1}{2}r^2\\theta$$, and the small-angle approximations. (3 steps)", "answer": "- Step 1: The radian is defined so that the angle equals the ratio of arc length to radius: $$\\theta = \\frac{l}{r}$$. This immediately gives $$l = r\\theta$$ with no extra constant.\n- Step 2: Since sector area is $$\\frac{1}{2}rl$$ (like a triangle), substituting $$l = r\\theta$$ gives $$A = \\frac{1}{2}r^2\\theta$$ — again, no extra constant. In degrees, both formulas carry the awkward factor $$\\frac{\\pi}{180}$$.\n- Step 3: The small-angle approximations $$\\sin\\theta \\approx \\theta$$, $$\\tan\\theta \\approx \\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ are *only* true in radians because they rely on the limit $$\\frac{\\sin\\theta}{\\theta} \\to 1$$, which holds precisely when $$\\theta$$ is the arc-length-to-radius ratio.\n\nRadians are to angles what natural logarithms are to exponents: they remove artificial constants and let the mathematics speak in its cleanest form.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A sector of a circle has perimeter equal to twice the arc length. Find the angle $$\\theta$$ of the sector. (3 steps)", "answer": "- Step 1: The perimeter is $$P = r\\theta + 2r$$ and the arc length is $$l = r\\theta$$. The condition is $$P = 2l$$, so $$r\\theta + 2r = 2r\\theta$$.\n- Step 2: Simplify: $$2r = 2r\\theta - r\\theta = r\\theta$$, so $$\\theta = \\frac{2r}{r} = 2$$ radians.\n- Step 3: The angle is 2 radians (about 114.6°). Check: perimeter $$= r(2) + 2r = 4r$$, and twice the arc length $$= 2 \\times 2r = 4r$$. ✓\n\nThis is a \"synthesis\" problem requiring you to combine the perimeter formula with a given condition.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "In a circle of radius 6 cm, a chord $$PQ$$ subtends angle $$\\theta$$ at the centre. The minor segment has area $$A_1$$ and the major segment has area $$A_2$$. Show that $$A_1 = 18(\\theta - \\sin\\theta)$$. If $$A_2 = 3A_1$$, what equation must $$\\theta$$ satisfy? (3 steps)", "answer": "- Step 1: The minor segment area is $$A_1 = \\frac{1}{2}(6)^2(\\theta - \\sin\\theta) = 18(\\theta - \\sin\\theta)$$. ✓\n- Step 2: The total circle area is $$\\pi(6)^2 = 36\\pi$$. So $$A_2 = 36\\pi - A_1 = 36\\pi - 18(\\theta - \\sin\\theta)$$.\n- Step 3: Given $$A_2 = 3A_1$$: $$36\\pi - 18(\\theta - \\sin\\theta) = 3 \\times 18(\\theta - \\sin\\theta) = 54(\\theta - \\sin\\theta)$$. So $$36\\pi = 54(\\theta - \\sin\\theta) + 18(\\theta - \\sin\\theta) = 72(\\theta - \\sin\\theta)$$. Thus $$\\theta - \\sin\\theta = \\frac{36\\pi}{72} = \\frac{\\pi}{2}$$, giving $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$.\n\nThis is the equation from the textbook (Chapter Review Q7): $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A student is asked to find the area of a sector with radius 3 cm and angle 50°. They write $$A = \\frac{1}{2}(3)^2(50) = 225$$ cm². Identify the mistake and describe the correct approach. (3 steps)", "answer": "- Step 1: The mistake is using $$\\theta = 50$$ (degrees) in the formula $$A = \\frac{1}{2}r^2\\theta$$, which requires radians. The value 225 cm² is absurd — it's much larger than the entire circle area of $$\\pi(3)^2 \\approx 28.3$$ cm².\n- Step 2: The correct approach: convert 50° to radians: $$50° = \\frac{50\\pi}{180} = \\frac{5\\pi}{18}$$ rad.\n- Step 3: Now compute: $$A = \\frac{1}{2}(3)^2 \\times \\frac{5\\pi}{18} = \\frac{9}{2} \\times \\frac{5\\pi}{18} = \\frac{45\\pi}{36} = \\frac{5\\pi}{4} \\approx 3.93$$ cm². This is a reasonable fraction of the circle.\n\n**Sanity check:** 50° is about one-seventh of a full circle, so the area should be about $$\\frac{28.3}{7} \\approx 4$$ cm². ✓", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "Convert 75° to radians (in terms of $$\\pi$$), then describe qualitatively the arc length and sector area for a circle of radius 8 cm with this angle. (3 steps)", "answer": "- Step 1: $$75° = \\frac{75\\pi}{180} = \\frac{5\\pi}{12}$$ radians.\n- Step 2: Arc length: $$l = r\\theta = 8 \\times \\frac{5\\pi}{12} = \\frac{40\\pi}{12} = \\frac{10\\pi}{3} \\approx 10.47$$ cm. This is about one-sixth of the full circumference $$16\\pi \\approx 50.3$$ cm, consistent with 75° being about one-fifth of 360°.\n- Step 3: Sector area: $$A = \\frac{1}{2}(8)^2 \\times \\frac{5\\pi}{12} = \\frac{1}{2}(64)\\frac{5\\pi}{12} = \\frac{160\\pi}{12} = \\frac{40\\pi}{3} \\approx 41.9$$ cm². This is about one-fifth of the full circle area $$64\\pi \\approx 201$$ cm². ✓\n\n75° is $$\\frac{75}{360} = \\frac{5}{24}$$ of a full circle — all results should be consistent with this fraction.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Find the area of the segment cut off by a chord that subtends an angle of $$\\frac{2\\pi}{3}$$ radians at the centre of a circle of radius 6 cm. (3 steps)", "answer": "- Step 1: Use the segment area formula: $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ with $$r = 6$$ and $$\\theta = \\frac{2\\pi}{3}$$.\n- Step 2: Compute: $$A = \\frac{1}{2}(36)\\left(\\frac{2\\pi}{3} - \\sin\\frac{2\\pi}{3}\\right) = 18\\left(\\frac{2\\pi}{3} - \\frac{\\sqrt{3}}{2}\\right)$$.\n- Step 3: Simplify: $$A = 18 \\times \\frac{2\\pi}{3} - 18 \\times \\frac{\\sqrt{3}}{2} = 12\\pi - 9\\sqrt{3}$$ cm². Numerically, this is approximately $$37.70 - 15.59 = 22.11$$ cm².\n\nThe exact answer $$12\\pi - 9\\sqrt{3}$$ is preferred; it uses the exact value $$\\sin\\frac{2\\pi}{3} = \\frac{\\sqrt{3}}{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Use small-angle approximations to find an approximate simplified expression for $$\\frac{\\theta \\cos\\theta - \\sin\\theta}{\\theta^3}$$ when $$\\theta$$ is small. (4 steps)", "answer": "- Step 1: Apply approximations: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ and $$\\sin\\theta \\approx \\theta$$.\n- Step 2: Compute the numerator: $$\\theta\\cos\\theta - \\sin\\theta \\approx \\theta\\left(1 - \\frac{\\theta^2}{2}\\right) - \\theta = \\theta - \\frac{\\theta^3}{2} - \\theta = -\\frac{\\theta^3}{2}$$.\n- Step 3: Divide by $$\\theta^3$$: $$\\frac{-\\theta^3/2}{\\theta^3} = -\\frac{1}{2}$$.\n- Step 4: The approximate value is $$-\\frac{1}{2}$$. Note: the leading-order terms cancelled ($$\\theta - \\theta = 0$$), so we needed the next-order correction from $$\\cos\\theta$$ to get a nonzero answer.\n\nWhen the leading terms cancel, you must keep the next order in the approximation — here, the $$\\theta^2$$ term from cosine was essential.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "Solve the equation $$2\\sin\\theta = \\sqrt{3}$$ for $$0 \\leq \\theta \\leq 2\\pi$$, giving answers in exact form. (3 steps)", "answer": "- Step 1: Rearrange: $$\\sin\\theta = \\frac{\\sqrt{3}}{2}$$. The principal value is $$\\theta = \\sin^{-1}\\left(\\frac{\\sqrt{3}}{2}\\right) = \\frac{\\pi}{3}$$.\n- Step 2: Sine is positive in the first and second quadrants. The second quadrant solution is $$\\theta = \\pi - \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$.\n- Step 3: The two solutions are $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = \\frac{2\\pi}{3}$$.\n\nRemember: $$\\sin\\frac{\\pi}{3} = \\frac{\\sqrt{3}}{2}$$ is one of the exact values you should know.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A sector of a circle has area $$100$$ cm² and perimeter $$50$$ cm. Set up (but do not solve) the equations needed to find the radius $$r$$ and angle $$\\theta$$. (3 steps)", "answer": "- Step 1: The two equations come from the area and perimeter formulas. Area: $$\\frac{1}{2}r^2\\theta = 100$$.\n- Step 2: Perimeter: $$r\\theta + 2r = 50$$, which factors as $$r(\\theta + 2) = 50$$.\n- Step 3: From the perimeter equation: $$r\\theta = 50 - 2r$$, so $$\\theta = \\frac{50 - 2r}{r}$$. Substitute into the area equation: $$\\frac{1}{2}r^2 \\cdot \\frac{50 - 2r}{r} = 100$$, giving $$\\frac{r(50 - 2r)}{2} = 100$$, or $$r(50 - 2r) = 200$$. This is a quadratic in $$r$$.\n\nThis is a classic \"two equations, two unknowns\" problem. The substitution method works cleanly here because $$r\\theta$$ appears in both equations.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "In the diagram, $$AB$$ is the diameter of a circle of radius $$r$$ cm, and $$\\angle BOC = \\theta$$ radians. If the area of triangle $$AOC$$ is three times the area of the shaded segment between chord $$BC$$ and arc $$BC$$, show that $$3\\theta - 4\\sin\\theta = 0$$. (4 steps)", "answer": "- Step 1: Since $$AB$$ is a diameter, $$\\angle AOB = \\pi$$ radians, so $$\\angle AOC = \\pi - \\theta$$.\n- Step 2: Area of triangle $$AOC$$: two sides are radii $$r$$ with included angle $$\\pi - \\theta$$, so $$A_{\\triangle AOC} = \\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$ (since $$\\sin(\\pi - \\theta) = \\sin\\theta$$).\n- Step 3: Area of the shaded segment (between chord $$BC$$ and arc $$BC$$): $$A_{\\text{segment}} = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 4: The condition is $$A_{\\triangle AOC} = 3 \\times A_{\\text{segment}}$$: $$\\frac{1}{2}r^2\\sin\\theta = 3 \\times \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Cancelling $$\\frac{1}{2}r^2$$: $$\\sin\\theta = 3(\\theta - \\sin\\theta) = 3\\theta - 3\\sin\\theta$$. So $$4\\sin\\theta = 3\\theta$$, giving $$3\\theta - 4\\sin\\theta = 0$$. ✓\n\nKey insight: $$\\sin(\\pi - \\theta) = \\sin\\theta$$ is crucial here — it's the supplementary angle identity.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "Two circles of radii 10 cm and 8 cm intersect at points $$A$$ and $$B$$ such that $$AB = 14$$ cm. Without doing the full calculation, describe the strategy to find the area of the region common to both circles (the lens-shaped overlap). (4 steps)", "answer": "- Step 1: In the larger circle (radius 10), the chord $$AB = 14$$ subtends an angle $$\\alpha$$ at the centre. Find $$\\alpha$$ using the isosceles triangle: drop a perpendicular from the centre to the midpoint of $$AB$$, giving $$\\sin\\frac{\\alpha}{2} = \\frac{7}{10}$$, so $$\\frac{\\alpha}{2} = \\sin^{-1}(0.7)$$.\n- Step 2: Similarly, in the smaller circle (radius 8), the chord $$AB = 14$$ subtends angle $$\\beta$$ at the centre: $$\\sin\\frac{\\beta}{2} = \\frac{7}{8}$$, so $$\\frac{\\beta}{2} = \\sin^{-1}(0.875)$$.\n- Step 3: The overlap region consists of: the segment of the larger circle (angle $$\\alpha$$) plus the segment of the smaller circle (angle $$\\beta$$). Each segment area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 4: Total overlap area $$= \\frac{1}{2}(10)^2(\\alpha - \\sin\\alpha) + \\frac{1}{2}(8)^2(\\beta - \\sin\\beta)$$. Note: $$\\beta$$ will be larger than $$\\alpha$$ because the same chord subtends a bigger angle in the smaller circle.\n\nThe lens (vesica piscis) is always the sum of two segments — one from each circle.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "A sector of a circle of radius 28 cm has perimeter $$P$$ cm and area $$A$$ cm². Given that $$A = 4P$$, find the value of $$P$$. (4 steps)", "answer": "- Step 1: Let the angle be $$\\theta$$ radians. Then $$P = r\\theta + 2r = 28\\theta + 56$$ and $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(784)\\theta = 392\\theta$$.\n- Step 2: The condition $$A = 4P$$ gives: $$392\\theta = 4(28\\theta + 56) = 112\\theta + 224$$.\n- Step 3: Solving: $$392\\theta - 112\\theta = 224$$, so $$280\\theta = 224$$, giving $$\\theta = \\frac{224}{280} = 0.8$$ radians.\n- Step 4: Now find $$P$$: $$P = 28(0.8) + 56 = 22.4 + 56 = 78.4$$ cm.\n\nThis problem combines both the perimeter and area formulas with an algebraic condition — a common exam-style question.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A circle has centre $$O$$ and radius 5 cm. The minor arc $$AB$$ has length 6.4 cm. Find the acute angle $$\\angle AOB$$ in radians, and describe how the areas of the minor and major sectors are related. (3 steps)", "answer": "- Step 1: From $$l = r\\theta$$: $$\\theta = \\frac{l}{r} = \\frac{6.4}{5} = 1.28$$ radians. This is the acute angle $$\\angle AOB$$.\n- Step 2: Minor sector area: $$A_1 = \\frac{1}{2}(5)^2(1.28) = \\frac{1}{2}(25)(1.28) = 16$$ cm².\n- Step 3: Major sector area: the reflex angle is $$2\\pi - 1.28$$, so $$A_2 = \\frac{1}{2}(25)(2\\pi - 1.28) = 12.5(2\\pi - 1.28)$$. The ratio $$A_1 : A_2 = 1.28 : (2\\pi - 1.28)$$, since both share the factor $$\\frac{1}{2}r^2 = 12.5$$.\n\nSector areas are proportional to their angles (for the same radius), so the ratio of areas equals the ratio of angles.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Why can't you use the small-angle approximation $$\\cos\\theta \\approx 1$$ (dropping the $$\\theta^2/2$$ term) when computing $$\\frac{1 - \\cos\\theta}{\\theta^2}$$? What goes wrong? (3 steps)", "answer": "- Step 1: If you use $$\\cos\\theta \\approx 1$$, then $$1 - \\cos\\theta \\approx 0$$, and you'd get $$\\frac{0}{\\theta^2} = 0$$. But the true limit is $$\\frac{1}{2}$$, not 0.\n- Step 2: The problem is that the numerator and denominator are both \"small\" (both → 0 as θ → 0), so the leading-order approximation loses the crucial information about their *ratio*. The $$\\frac{\\theta^2}{2}$$ term in the cosine approximation is exactly what contributes to the numerator.\n- Step 3: The lesson: when computing ratios where both numerator and denominator vanish, you must keep enough terms in the approximation to capture the first nonzero contribution. Here, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ is needed because the linear term is absent (cosine is flat at 0).\n\nThis is a \"limit of indeterminate form 0/0\" situation — the small-angle approximations resolve it by revealing the true order of vanishing.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}], "count": 54}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A unit circle has radius 1. You walk along the circumference a distance equal to the radius. What angle (in what unit) does this arc subtend at the centre, and why is this unit considered more \"natural\" than degrees? (3 steps)", "answer": "- Step 1: The angle subtended at the centre by an arc whose length equals the radius is defined as **1 radian**. If arc length $$s = r$$, then the angle $$\\theta = 1$$ radian (or 1 rad, or $$1^{c}$$).\n- Step 2: This is more \"natural\" than degrees because the radian measure directly links the arc length to the angle through the proportionality $$s = r\\theta$$. In degrees, you would need an extra conversion factor ($$\\frac{\\pi}{180}$$) every time. Radians eliminate that clutter.\n- Step 3: Think of it this way: a full circle has circumference $$2\\pi r$$, so it subtends $$2\\pi$$ radians. The number $$2\\pi \\approx 6.28$$ arises from the geometry itself (the ratio of circumference to radius), whereas 360° is an arbitrary historical choice (Babylonian base-60 system). Radians are to angles what metres are to distance — grounded in the shape itself.\n\nTakeaway: 1 radian ≈ 57.3°, but its true power is that it makes arc length a simple multiplication: $$s = r\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the fundamental conversion relationship between radians and degrees that all other conversions are built from? (State it, then explain how to derive the conversion factors in both directions.)", "answer": "The foundational relationship is:\n$$\\pi \\text{ radians} = 180°$$\n\nThis comes from the fact that a full revolution is $$360°$$ and also $$2\\pi$$ radians (since circumference $$= 2\\pi r$$), so dividing both by 2 gives $$\\pi$$ rad $$= 180°$$.\n\nFrom this, the two conversion factors are:\n+ **Radians → Degrees:** Multiply by $$\\frac{180°}{\\pi}$$. So 1 radian $$= \\frac{180°}{\\pi} \\approx 57.3°$$.\n+ **Degrees → Radians:** Multiply by $$\\frac{\\pi}{180°}$$. So $$1° = \\frac{\\pi}{180°}$$ radians.\n\nThe key insight: you're always multiplying by a fraction that equals 1 (like $$\\frac{\\pi}{\\pi}$$ rearranged), so you're not changing the angle — just its units.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Convert $$\\frac{7\\pi}{8}$$ radians to degrees. Walk through the mechanism of why the $$\\pi$$ cancels. (2 steps)", "answer": "- Step 1: Apply the conversion: $$\\frac{7\\pi}{8} \\times \\frac{180°}{\\pi}$$. The $$\\pi$$ in the numerator cancels with the $$\\pi$$ in the denominator. This cancellation happens precisely because the conversion factor $$\\frac{180°}{\\pi}$$ was designed to absorb the $$\\pi$$ — it's the bridge between the two systems.\n- Step 2: You're left with $$\\frac{7}{8} \\times 180° = 7 \\times 22.5° = 157.5°$$.\n\nThe deeper point: whenever an angle is given as a multiple of $$\\pi$$, converting to degrees is just \"multiply the fraction by 180°\" because the $$\\pi$$ always cancels.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "Convert $$150°$$ to radians, expressing the answer as a multiple of $$\\pi$$. Why does expressing angles as multiples of $$\\pi$$ give \"exact\" values? (3 steps)", "answer": "- Step 1: Multiply by the conversion factor: $$150° \\times \\frac{\\pi}{180°} = \\frac{150\\pi}{180}$$.\n- Step 2: Simplify the fraction: $$\\frac{150}{180} = \\frac{5}{6}$$, so the answer is $$\\frac{5\\pi}{6}$$ radians.\n- Step 3: This is \"exact\" because $$\\pi$$ is irrational. If we wrote $$150° \\approx 2.618$$ rad, that's a decimal approximation. But $$\\frac{5\\pi}{6}$$ captures the *exact* angle — no rounding, no loss of precision. The fraction tells you the proportion of a semicircle ($$\\pi$$), and $$\\pi$$ itself is a known exact constant.\n\nTakeaway: Always leave radian answers in terms of $$\\pi$$ when possible — it's both simpler and more precise.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "Without a calculator, what is $$\\frac{\\pi}{6}$$ radians in degrees? What common angle is this, and why is it worth memorising? (2 steps)", "answer": "- Step 1: $$\\frac{\\pi}{6} \\times \\frac{180°}{\\pi} = \\frac{180°}{6} = 30°$$. This is the familiar 30° angle.\n- Step 2: You must memorise this (and the other key angles) because exam questions routinely use these exact values, and you need to recognise them instantly — both for conversion and for evaluating trig functions without a calculator. The six key pairs are:\n\n| Degrees | Radians |\n|---------|---------|\n| $$30°$$ | $$\\frac{\\pi}{6}$$ |\n| $$45°$$ | $$\\frac{\\pi}{4}$$ |\n| $$60°$$ | $$\\frac{\\pi}{3}$$ |\n| $$90°$$ | $$\\frac{\\pi}{2}$$ |\n| $$180°$$ | $$\\pi$$ |\n| $$360°$$ | $$2\\pi$$ |", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A student sees the angle $$\\frac{5\\pi}{4}$$ and immediately knows it's in the third quadrant. How can you quickly determine the quadrant of any angle given as a multiple of $$\\pi$$? (3 steps)", "answer": "- Step 1: Compare the fraction to the key boundary values. The four quadrants in radians are: Q1: $$0$$ to $$\\frac{\\pi}{2}$$, Q2: $$\\frac{\\pi}{2}$$ to $$\\pi$$, Q3: $$\\pi$$ to $$\\frac{3\\pi}{2}$$, Q4: $$\\frac{3\\pi}{2}$$ to $$2\\pi$$.\n- Step 2: For $$\\frac{5\\pi}{4}$$: note that $$\\pi = \\frac{4\\pi}{4}$$ and $$\\frac{3\\pi}{2} = \\frac{6\\pi}{4}$$. Since $$\\frac{4\\pi}{4} < \\frac{5\\pi}{4} < \\frac{6\\pi}{4}$$, the angle lies in Q3.\n- Step 3: General strategy: express the angle with a common denominator and compare to the boundaries. For example, $$\\frac{7\\pi}{6}$$ vs $$\\pi = \\frac{6\\pi}{6}$$ and $$\\frac{3\\pi}{2} = \\frac{9\\pi}{6}$$ → between $$\\frac{6\\pi}{6}$$ and $$\\frac{9\\pi}{6}$$ → Q3.\n\nThis skill is essential for solving trig equations in radians, where you need to identify the correct quadrants for solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Derive the arc length formula $$l = r\\theta$$ (where $$\\theta$$ is in radians) from first principles. Why does this formula fail if $$\\theta$$ is in degrees? (4 steps)", "answer": "- Step 1: Start with the proportionality principle. A full circle has circumference $$2\\pi r$$ and subtends an angle of $$2\\pi$$ radians. A sector with angle $$\\theta$$ radians is a fraction $$\\frac{\\theta}{2\\pi}$$ of the full circle.\n- Step 2: Therefore the arc length is: $$l = \\frac{\\theta}{2\\pi} \\times 2\\pi r = r\\theta$$.\n- Step 3: The formula is beautifully simple — just multiply radius by angle. No fractions, no conversion constants.\n- Step 4: If $$\\theta$$ were in degrees, the fraction of the circle would be $$\\frac{\\theta}{360}$$, giving $$l = \\frac{\\theta}{360} \\times 2\\pi r = \\frac{\\pi r\\theta}{180}$$. This is clunky and error-prone. The degree-based formula has that extra $$\\frac{\\pi}{180}$$ factor precisely because degrees don't naturally relate arc length to angle.\n\nTakeaway: $$l = r\\theta$$ is the *reason* radians were invented — it makes the geometry clean.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A sector of a circle has radius $$r$$ and angle $$\\theta$$ radians. Write an expression for the perimeter of the sector. Why is the perimeter *not* just the arc length? (2 steps)", "answer": "- Step 1: The perimeter of a sector consists of three pieces: the arc (length $$r\\theta$$) plus the two straight radii (each of length $$r$$). So: $$P = r\\theta + 2r = r(2 + \\theta)$$.\n- Step 2: A common mistake is to give the arc length alone as the \"perimeter.\" But a sector is a closed region bounded by the arc *and* the two radii. The perimeter is the total distance around the boundary — you must count all three sides.\n\nThis factorised form $$P = r(2 + \\theta)$$ is extremely useful for problems where you need to solve for $$r$$ or $$\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A sector has radius $$r$$ and angle $$\\theta$$ radians. Its perimeter is $$P$$. Express $$r$$ in terms of $$P$$ and $$\\theta$$. (2 steps)", "answer": "- Step 1: Write the perimeter equation: $$P = r\\theta + 2r = r(\\theta + 2)$$.\n- Step 2: Solve for $$r$$: $$r = \\frac{P}{\\theta + 2}$$.\n\nThis type of rearrangement appears frequently in exam problems. The key is to factorise first (pull out the common $$r$$), then divide — much cleaner than trying to solve $$P = r\\theta + 2r$$ by treating it as a linear equation in $$r$$ without factorising.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A minor arc subtends angle $$x$$ at the centre, and the major arc subtends angle $$5x$$. What is the total angle at the centre, and hence what is $$x$$ in terms of $$\\pi$$? (2 steps)", "answer": "- Step 1: The minor arc and major arc together cover the full circle. So: $$x + 5x = 2\\pi$$, giving $$6x = 2\\pi$$.\n- Step 2: Therefore $$x = \\frac{\\pi}{3}$$ radians (which is 60°).\n\nThe insight: the minor and major arcs are complementary — they always sum to the full circle angle of $$2\\pi$$ radians. This is the radian version of \"angles around a point sum to 360°.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "The chord $$AB$$ of a circle with centre $$O$$ and radius 6 cm has length 6 cm. What triangle is formed by $$O$$, $$A$$, and $$B$$? Hence find the angle $$\\angle AOB$$ and the arc length. (3 steps)", "answer": "- Step 1: Triangle $$OAB$$ has $$OA = OB = 6$$ (both radii) and $$AB = 6$$. All three sides are equal, so it's **equilateral**.\n- Step 2: Each angle in an equilateral triangle is $$\\frac{\\pi}{3}$$ radians (60°). So $$\\angle AOB = \\frac{\\pi}{3}$$.\n- Step 3: Arc length $$= r\\theta = 6 \\times \\frac{\\pi}{3} = 2\\pi$$ cm.\n\nThis problem illustrates how chord length can determine the central angle. If the chord equals the radius, you get an equilateral triangle — a special case worth recognising.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A garden pond border consists of a straight edge $$AB = 2.4$$ m and a curved part which is an arc of a circle with centre $$O$$ and radius 2 m. The straight edge is a chord. Explain why triangle $$AOB$$ is isosceles, and how you find the reflex angle for the arc. (3 steps)", "answer": "- Step 1: Since $$O$$ is the centre, $$OA = OB = 2$$ m (both radii). A triangle with two equal sides is **isosceles**.\n- Step 2: Drop a perpendicular from $$O$$ to the midpoint $$M$$ of $$AB$$. This splits the isosceles triangle into two congruent right-angled triangles, each with hypotenuse 2 and adjacent side 1.2 (half of 2.4). So $$\\cos\\left(\\frac{\\angle AOB}{2}\\right) = \\frac{1.2}{2} = 0.6$$, giving the acute $$\\angle AOB \\approx 1.287$$ rad.\n- Step 3: The arc forming the pond border is the *reflex* arc (the longer way around), so the angle for the arc is $$\\theta = 2\\pi - 1.287 \\approx 4.996$$ rad. The arc length is then $$r\\theta = 2 \\times 4.996 \\approx 9.99$$ m.\n\nThe misconception trap: students often compute the acute angle and use that for the arc, getting the *minor* arc instead of the *major* arc. Always check which arc the problem refers to.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Derive the area of a sector formula $$A = \\frac{1}{2}r^2\\theta$$ from first principles. (3 steps)", "answer": "- Step 1: A full circle has area $$\\pi r^2$$ and subtends an angle of $$2\\pi$$ radians at the centre. A sector with angle $$\\theta$$ radians is a fraction $$\\frac{\\theta}{2\\pi}$$ of the full circle.\n- Step 2: Therefore: $$A = \\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$.\n- Step 3: Notice the parallel with the arc length derivation. Both use the same fraction-of-circle logic. The area formula is essentially \"half of $$r$$ times arc length\" — since arc length is $$r\\theta$$, area is $$\\frac{1}{2}r \\times r\\theta = \\frac{1}{2}r^2\\theta$$. This mirrors the triangle area formula $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$, where the \"base\" is the arc and the \"height\" is the radius.\n\nTakeaway: $$A = \\frac{1}{2}r^2\\theta$$ is one of the most important formulas in this chapter.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A plot of land is a sector of radius 55 m. The fencing around its edge totals 176 m. Find the area of the plot. (3 steps)", "answer": "- Step 1: The perimeter of the sector is $$P = r\\theta + 2r = 55\\theta + 110 = 176$$. Solve: $$55\\theta = 66$$, so $$\\theta = 1.2$$ radians.\n- Step 2: Now use the area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(55)^2(1.2)$$.\n- Step 3: $$A = \\frac{1}{2}(3025)(1.2) = 1815$$ m².\n\nThe problem-solving pattern here is very common: you're given the perimeter, you extract $$\\theta$$, then compute area. The key insight is that perimeter information lets you find the angle, which then unlocks the area.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "The area of a minor sector is $$28.9$$ cm² and the angle is 0.8 radians. Find the radius. (2 steps)", "answer": "- Step 1: Set up the equation: $$\\frac{1}{2}r^2(0.8) = 28.9$$, so $$0.4r^2 = 28.9$$.\n- Step 2: $$r^2 = \\frac{28.9}{0.4} = 72.25$$, so $$r = \\sqrt{72.25} = 8.5$$ cm. (We take the positive root since a radius is a positive length.)\n\nNote: This is a straightforward \"use the formula, solve for the unknown\" problem, but the key step is correctly identifying *which* unknown you're solving for and rearranging appropriately.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What is the area of the triangle formed by two radii and a chord, if the angle between the radii is $$\\theta$$ radians and both radii have length $$r$$? Derive this using the sine formula for area. (3 steps)", "answer": "- Step 1: The area of any triangle with two sides $$a$$ and $$b$$ and included angle $$C$$ is: $$\\text{Area} = \\frac{1}{2}ab\\sin C$$.\n- Step 2: Here, both sides are radii: $$a = b = r$$, and the included angle is $$\\theta$$. So: $$\\text{Area} = \\frac{1}{2}r^2\\sin\\theta$$.\n- Step 3: This triangle is the \"wedge\" inside the sector. The sector area is $$\\frac{1}{2}r^2\\theta$$, and the triangle area is $$\\frac{1}{2}r^2\\sin\\theta$$. The difference between these two is what gives us the segment area.\n\nThis formula is the essential stepping stone to the segment area formula.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Derive the area of a segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ by combining two earlier results. Why is the segment area always positive for $$0 < \\theta < 2\\pi$$? (3 steps)", "answer": "- Step 1: A segment is the region between a chord and its arc. It equals the sector area minus the triangle area:\n$$A = \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta$$\n- Step 2: Factor out the common $$\\frac{1}{2}r^2$$:\n$$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$\n- Step 3: For $$0 < \\theta < 2\\pi$$, we always have $$\\theta > \\sin\\theta$$ (since the sine function is bounded by 1, but also for small angles $$\\sin\\theta < \\theta$$, and for larger angles $$\\theta$$ can exceed 1 while $$\\sin\\theta$$ cannot). Therefore $$\\theta - \\sin\\theta > 0$$, and the segment area is always positive.\n\n+ At $$\\theta = 0$$: segment area is 0 (no segment).\n+ At $$\\theta = \\pi$$: this is the largest minor segment (a semicircle minus its triangle).\n\nTakeaway: Segment = Sector − Triangle. This subtraction pattern is the key to remembering the formula.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A segment is formed in a circle of radius 7 cm with angle $$\\theta = 1.2$$ radians. Explain why you must have your calculator in radians mode when computing $$\\sin 1.2$$ in the segment formula. What goes wrong if you're in degrees mode? (2 steps)", "answer": "- Step 1: The angle $$\\theta = 1.2$$ is in radians. The formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ requires $$\\theta$$ to be in radians *and* the $$\\sin\\theta$$ to be evaluated with $$\\theta$$ in radians. So you must compute $$\\sin(1.2 \\text{ rad})$$.\n- Step 2: If your calculator is in degrees mode, it would compute $$\\sin(1.2°) \\approx 0.02094$$, whereas the correct value is $$\\sin(1.2 \\text{ rad}) \\approx 0.93204$$. These are wildly different! Your segment area would be far too large (since $$\\theta - \\sin\\theta$$ would become approximately $$1.2 - 0.021 = 1.179$$ instead of $$1.2 - 0.932 = 0.268$$).\n\nThis is one of the most common exam errors. Always check your calculator mode before computing trig values in radian problems.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A chord of length 5 m is drawn in a circle of radius 4 m. The segment between the chord and the arc is shaded. Explain the two-step process to find the segment area — what must you find first, and how? (3 steps)", "answer": "- Step 1: To use the segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$, you need $$\\theta$$. Since you're given the chord length and radius, use the **cosine rule** in triangle $$OAB$$: $$5^2 = 4^2 + 4^2 - 2(4)(4)\\cos\\theta$$, so $$25 = 32 - 32\\cos\\theta$$, giving $$\\cos\\theta = \\frac{7}{32}$$.\n- Step 2: Compute $$\\theta = \\arccos\\left(\\frac{7}{32}\\right) \\approx 1.3502$$ radians (using calculator in radians mode).\n- Step 3: Now substitute into the segment formula: $$A = \\frac{1}{2}(16)(1.3502 - \\sin 1.3502) \\approx 3.00$$ m².\n\nThe key insight: when chord length is given but the angle isn't, the cosine rule is your bridge to finding $$\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "In a circle with diameter $$AB$$ and centre $$O$$, a point $$C$$ on the circumference makes $$\\angle BOC = \\theta$$ radians. The area of triangle $$AOC$$ is three times the area of the shaded segment. Show that $$3\\theta - 4\\sin\\theta = 0$$. (4 steps)", "answer": "- Step 1: Since $$AB$$ is a diameter, $$\\angle AOB = \\pi$$ radians, so $$\\angle AOC = \\pi - \\theta$$.\n- Step 2: Area of segment = sector area − triangle area = $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 3: Area of triangle $$AOC$$: two sides are $$r$$ and the included angle is $$\\pi - \\theta$$. So: $$\\text{Area} = \\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$ (using the identity $$\\sin(\\pi - \\theta) = \\sin\\theta$$).\n- Step 4: Given that triangle area $$= 3 \\times$$ segment area:\n$$\\frac{1}{2}r^2\\sin\\theta = 3 \\times \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$\n$$\\sin\\theta = 3\\theta - 3\\sin\\theta$$\n$$4\\sin\\theta = 3\\theta$$\n$$3\\theta - 4\\sin\\theta = 0$$\n\nThe identity $$\\sin(\\pi - \\theta) = \\sin\\theta$$ is crucial here — it's why the triangle area simplifies so neatly.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A sector has area $$A$$ and arc length $$l$$. Express the area in terms of $$r$$ and $$l$$ alone (eliminating $$\\theta$$). What does the resulting formula remind you of? (3 steps)", "answer": "- Step 1: From the arc length formula: $$l = r\\theta$$, so $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substitute into the area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}r^2 \\cdot \\frac{l}{r} = \\frac{1}{2}rl$$.\n- Step 3: This is exactly the same form as the triangle area formula $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$! Here, the arc plays the role of the \"base\" and the radius plays the role of the \"height.\" This isn't a coincidence — a sector is a \"curved triangle,\" and as the angle shrinks, the sector increasingly resembles a triangle with the arc as its base.\n\nThis geometric intuition is powerful: a sector is a triangle-like shape, and its area formula reflects that.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A student calculates the area of a sector with $$r = 3$$ cm and $$\\theta = 50$$ as $$A = \\frac{1}{2}(3^2)(50) = 225$$ cm². Identify the mistake and explain why it gives a physically absurd answer. (2 steps)", "answer": "- Step 1: The student used $$\\theta = 50$$ in the formula $$A = \\frac{1}{2}r^2\\theta$$, but this formula requires $$\\theta$$ to be in **radians**. The value 50 appears to be in degrees. Converting: $$50° = \\frac{50\\pi}{180} = \\frac{5\\pi}{18} \\approx 0.873$$ radians.\n- Step 2: The correct area is $$A = \\frac{1}{2}(9)\\left(\\frac{5\\pi}{18}\\right) \\approx 3.93$$ cm². The student's answer of 225 cm² is absurdly large — it exceeds the area of the full circle ($$\\pi r^2 = 9\\pi \\approx 28.3$$ cm²). A sector can never be larger than the whole circle!\n\nThis is the single most common error in this topic: forgetting that the radian formulas only work with radian inputs.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Express the area of a sector in terms of arc length $$l$$ and radius $$r$$. Then, given a full circle of area $$3600\\pi$$ cm² and an arc of angle $$\\frac{\\pi}{12}$$, find the arc length. (3 steps)", "answer": "- Step 1: The area of a sector in terms of $$l$$ and $$r$$ is $$A = \\frac{1}{2}rl$$ (as derived from $$A = \\frac{1}{2}r^2\\theta$$ and $$l = r\\theta$$).\n- Step 2: The full circle has area $$\\pi r^2 = 3600\\pi$$, so $$r^2 = 3600$$, giving $$r = 60$$ cm.\n- Step 3: Arc length $$l = r\\theta = 60 \\times \\frac{\\pi}{12} = 5\\pi$$ cm.\n\nThis two-step reasoning (area → radius → arc length) is a typical exam pattern.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Two circles of the same radius 12 cm intersect such that each centre lies on the other's circumference. The circles intersect at points $$A$$ and $$B$$. Show that $$\\angle AO_1B = \\frac{2\\pi}{3}$$. (3 steps)", "answer": "- Step 1: Since $$O_2$$ lies on the circumference of the circle centred at $$O_1$$, the distance $$O_1O_2 = 12$$ (the radius). Similarly, $$O_1O_2 = O_1A = O_1B = O_2A = O_2B = 12$$.\n- Step 2: Triangle $$O_1AO_2$$ has all sides equal to 12, so it's **equilateral**, meaning $$\\angle AO_1O_2 = \\frac{\\pi}{3}$$. By symmetry, triangle $$O_1BO_2$$ is also equilateral, so $$\\angle BO_1O_2 = \\frac{\\pi}{3}$$.\n- Step 3: Therefore $$\\angle AO_1B = \\frac{\\pi}{3} + \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$.\n\nThe key geometric insight: when two equal circles pass through each other's centres, the resulting triangles formed by the centres and intersection points are always equilateral.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "In the intersecting circles problem (Q24), write down the perimeter of the lens-shaped region $$R$$ enclosed by both circles, in terms of $$\\pi$$. (2 steps)", "answer": "- Step 1: The perimeter of region $$R$$ consists of two arcs: the arc $$AB$$ on circle $$C_1$$ (angle $$\\frac{2\\pi}{3}$$) and the arc $$AB$$ on circle $$C_2$$ (also angle $$\\frac{2\\pi}{3}$$, by symmetry).\n- Step 2: Each arc has length $$r\\theta = 12 \\times \\frac{2\\pi}{3} = 8\\pi$$ cm. Total perimeter $$= 8\\pi + 8\\pi = 16\\pi$$ cm.\n\nThe region's boundary has no straight segments — it's purely the two arcs joining at $$A$$ and $$B$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "For the intersecting circles of radius 12 cm (Q24-25), find the area of the lens-shaped overlap region $$R$$. (3 steps)", "answer": "- Step 1: The area of region $$R$$ = (area of sector in $$C_1$$ with angle $$\\frac{2\\pi}{3}$$) + (area of sector in $$C_2$$ with angle $$\\frac{2\\pi}{3}$$) − (area of rhombus $$O_1AO_2B$$).\n- Step 2: Each sector area $$= \\frac{1}{2}(12)^2\\left(\\frac{2\\pi}{3}\\right) = 48\\pi$$ cm². The rhombus consists of two equilateral triangles of side 12, so its area $$= 2 \\times \\frac{\\sqrt{3}}{4}(144) = 72\\sqrt{3}$$ cm².\n- Step 3: Total area $$= 48\\pi + 48\\pi - 72\\sqrt{3} = 96\\pi - 72\\sqrt{3} \\approx 127$$ cm² (3 s.f.).\n\nThis \"two sectors minus the central quadrilateral\" pattern is the standard method for lens-shaped overlap regions.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A sector of radius 28 cm has perimeter $$P$$ and area $$A$$. Given that $$A = 4P$$, find $$P$$. (3 steps)", "answer": "- Step 1: Write both quantities in terms of $$r$$ and $$\\theta$$: $$P = r\\theta + 2r = 28\\theta + 56$$, and $$A = \\frac{1}{2}(28)^2\\theta = 392\\theta$$.\n- Step 2: Set $$A = 4P$$: $$392\\theta = 4(28\\theta + 56) = 112\\theta + 224$$.\n- Step 3: Solve: $$392\\theta - 112\\theta = 224$$, so $$280\\theta = 224$$, giving $$\\theta = 0.8$$ rad. Then $$P = 28(0.8) + 56 = 22.4 + 56 = 78.4$$ cm.\n\nThis is a \"two equations, two unknowns\" problem disguised in geometric language. The strategy: express everything in terms of $$\\theta$$, then solve.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "When solving a trigonometric equation in radians, such as $$\\sin\\theta = \\frac{1}{2}$$ for $$0 \\leq \\theta < 2\\pi$$, what are the two solutions and how do you find the second one using the CAST diagram or symmetry? (3 steps)", "answer": "- Step 1: The principal solution from the calculator (in radians mode) is $$\\theta_1 = \\frac{\\pi}{6}$$ (i.e., 30°).\n- Step 2: Sine is positive in Q1 and Q2. The Q2 solution is found using the symmetry $$\\sin(\\pi - \\theta) = \\sin\\theta$$: $$\\theta_2 = \\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$.\n- Step 3: Both solutions verified: $$\\sin\\frac{\\pi}{6} = \\frac{1}{2}$$ ✓ and $$\\sin\\frac{5\\pi}{6} = \\frac{1}{2}$$ ✓.\n\n+ Using CAST: \"A\" (Q1, All positive) and \"S\" (Q2, Sine positive) give the two solutions.\n+ Common mistake: forgetting to check if the principal value is in the correct quadrant, or giving answers in degrees when the domain is specified in radians.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Solve $$\\cos\\theta = -\\frac{\\sqrt{2}}{2}$$ for $$0 \\leq \\theta < 2\\pi$$, giving exact answers. Explain how the negative sign affects which quadrants you search. (3 steps)", "answer": "- Step 1: First find the reference angle: $$\\cos\\alpha = \\frac{\\sqrt{2}}{2}$$ gives $$\\alpha = \\frac{\\pi}{4}$$. But cosine is *negative*, so we look in Q2 and Q4 (where cosine is negative).\n- Step 2: Q2 solution: $$\\theta_1 = \\pi - \\frac{\\pi}{4} = \\frac{3\\pi}{4}$$. Q4 solution: $$\\theta_2 = 2\\pi - \\frac{\\pi}{4} = \\frac{7\\pi}{4}$$.\n- Step 3: Verify: $$\\cos\\frac{3\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓ and $$\\cos\\frac{7\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓.\n\nThe key principle: the sign of the trig value tells you *which quadrants* to search. The absolute value gives you the *reference angle*. You then reflect that reference angle into the appropriate quadrants.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Solve $$\\tan\\theta = -\\sqrt{3}$$ for $$0 \\leq \\theta < 2\\pi$$, giving exact answers. Why does tangent have a different symmetry rule than sine or cosine? (3 steps)", "answer": "- Step 1: Find the reference angle: $$\\tan\\alpha = \\sqrt{3}$$ gives $$\\alpha = \\frac{\\pi}{3}$$. Tangent is negative in Q2 and Q4.\n- Step 2: Q2 solution: $$\\theta_1 = \\pi - \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$. Q4 solution: $$\\theta_2 = 2\\pi - \\frac{\\pi}{3} = \\frac{5\\pi}{3}$$.\n- Step 3: Tangent has period $$\\pi$$ (not $$2\\pi$$), so an alternative way to find the Q4 solution is: $$\\theta_2 = \\frac{2\\pi}{3} + \\pi = \\frac{5\\pi}{3}$$ (which simplifies to the same answer since $$\\frac{2\\pi}{3} + \\pi = \\frac{5\\pi}{3}$$, but note $$\\frac{5\\pi}{3} < 2\\pi$$ ✓).\n\n+ The deeper reason: $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, and tangent is periodic with period $$\\pi$$ because both sine and cosine flip sign after a half-turn, so their ratio stays the same. This is why once you have one solution, adding $$\\pi$$ always gives another.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Solve $$2\\sin^2\\theta + \\sin\\theta - 1 = 0$$ for $$0 \\leq \\theta < 2\\pi$$. Walk through the full strategy. (4 steps)", "answer": "- Step 1: Recognise this as a *quadratic in* $$\\sin\\theta$$. Let $$u = \\sin\\theta$$: $$2u^2 + u - 1 = 0$$.\n- Step 2: Factorise: $$(2u - 1)(u + 1) = 0$$, so $$u = \\frac{1}{2}$$ or $$u = -1$$.\n- Step 3: For $$\\sin\\theta = \\frac{1}{2}$$: $$\\theta = \\frac{\\pi}{6}$$ or $$\\theta = \\frac{5\\pi}{6}$$. For $$\\sin\\theta = -1$$: $$\\theta = \\frac{3\\pi}{2}$$.\n- Step 4: All four solutions: $$\\theta = \\frac{\\pi}{6}, \\frac{5\\pi}{6}, \\frac{3\\pi}{2}$$.\n\nThe critical insight: never try to solve a quadratic trig equation by taking inverse trig of both sides. Always substitute, factorise/solve the quadratic first, *then* find angles. This avoids the fatal error of treating $$\\sin^2\\theta$$ as if it were $$\\sin\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "What are the three small-angle approximations, and what condition must hold for them to be accurate? (2 steps)", "answer": "- Step 1: The three approximations (for $$\\theta$$ in radians, and $$\\theta$$ close to 0) are:\n$$\\sin\\theta \\approx \\theta$$\n$$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$\n$$\\tan\\theta \\approx \\theta$$\n- Step 2: These are accurate when $$\\theta$$ is small (typically $$|\\theta| < 0.1$$ radians, or about 6°). The smaller $$\\theta$$ is, the better the approximation. They come from truncating the Taylor/Maclaurin series of each function after the leading terms.\n\n+ For sine: the full series is $$\\theta - \\frac{\\theta^3}{6} + \\cdots$$; dropping higher-order terms leaves $$\\theta$$.\n+ For cosine: the full series is $$1 - \\frac{\\theta^2}{2} + \\frac{\\theta^4}{24} - \\cdots$$; keeping one correction term gives $$1 - \\frac{\\theta^2}{2}$$.\n+ For tangent: the full series is $$\\theta + \\frac{\\theta^3}{3} + \\cdots$$; dropping higher-order terms leaves $$\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Why does $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$? Give both a geometric/intuitive argument and a calculus-based argument. (3 steps)", "answer": "- Step 1: **Geometric argument:** For a very small angle, the arc of length $$r\\theta$$ on a unit circle ($$r=1$$) is almost identical to the vertical line segment of height $$\\sin\\theta$$. The chord and the arc become indistinguishable as the angle shrinks. So $$\\sin\\theta \\approx \\text{arc length} = \\theta$$ (in radians, on a unit circle).\n- Step 2: **Calculus argument:** The Maclaurin series for $$\\sin\\theta$$ is $$\\theta - \\frac{\\theta^3}{3!} + \\frac{\\theta^5}{5!} - \\cdots$$. When $$\\theta$$ is tiny, $$\\theta^3$$ is negligibly small compared to $$\\theta$$, so all terms beyond the first vanish: $$\\sin\\theta \\approx \\theta$$.\n- Step 3: **Rate-of-change argument:** $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$, and at $$\\theta = 0$$, $$\\cos 0 = 1$$. This means near $$\\theta = 0$$, sine increases at the same rate as the line $$y = \\theta$$. The function and the line are tangent to each other at the origin, so they agree closely nearby.\n\nTakeaway: All three perspectives converge — for small angles, sine is essentially the angle itself (in radians).", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Why does $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ include a quadratic term, unlike the approximations for sine and tangent? (3 steps)", "answer": "- Step 1: Cosine is an **even function**: $$\\cos(-\\theta) = \\cos\\theta$$. This means its Taylor series contains only even powers: $$1 - \\frac{\\theta^2}{2} + \\frac{\\theta^4}{24} - \\cdots$$. There is no linear term (no $$\\theta$$ term), because a linear term would break the symmetry — it would make $$\\cos(-\\theta) \\neq \\cos\\theta$$.\n- Step 2: Sine and tangent are **odd functions**: $$\\sin(-\\theta) = -\\sin\\theta$$ and $$\\tan(-\\theta) = -\\tan\\theta$$. Their series contain only odd powers. The leading term for both is linear: $$\\theta$$.\n- Step 3: So the quadratic term in the cosine approximation is the *first correction* beyond the constant term. You can't just say $$\\cos\\theta \\approx 1$$ because that drops too much information — it would make $$\\cos(0.1) = 1$$ when actually $$\\cos(0.1) \\approx 0.995$$. The $$-\\frac{\\theta^2}{2}$$ term captures the downward curvature of cosine near zero.\n\nTakeaway: The parity (odd/even) of a function determines which powers appear in its approximation.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A student claims that for small $$\\theta$$, $$\\sin 2\\theta \\approx 2\\theta$$ and $$\\cos 2\\theta \\approx 1 - \\frac{\\theta^2}{2}$$. One is correct and one is wrong. Which is which, and why? (3 steps)", "answer": "- Step 1: The small-angle approximation says $$
