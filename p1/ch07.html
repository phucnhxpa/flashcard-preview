<script>
const DATA={"selected": [{"question": "Why does the formula $$l = r\\theta$$ NOT work when $$\\theta$$ is in degrees? (3 steps)", "answer": "- Step 1: The formula comes directly from the definition of radians: 1 radian gives an arc length of exactly $$r$$.\n- Step 2: If $$\\theta$$ is in degrees, 1° gives an arc length of $$\\frac{\\pi r}{180}$$ (a much smaller proportion), not $$r$$.\n- Step 3: To use degrees, you must first convert: $$l = r \\times \\frac{\\pi \\theta°}{180°}$$. Hence radians give the clean version because they're calibrated to the radius.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "From $$l = r\\theta$$, recover $$\\theta$$ in terms of $$l$$ and $$r$$. Explain why this is dimensional analysis. (3 steps)", "answer": "- Step 1: Divide both sides by $$r$$: $$\\theta = \\dfrac{l}{r}$$.\n- Step 2: This is dimensionally an arc length divided by another length — a pure number, exactly what radians ARE: a ratio of two lengths.\n- Step 3: This explains why radians are unit-less: the angle is the ratio of \"arc travelled\" to \"radius,\" with all length units cancelling.\n\nInsight: radians ARE the natural ratio $$\\dfrac{\\text{arc}}{\\text{radius}}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "A student is asked to find the area of a sector with radius 3 cm and angle 50°. They write $$A = \\frac{1}{2}(3)^2(50) = 225$$ cm². Identify the mistake and describe the correct approach. (3 steps)", "answer": "- Step 1: The mistake is using $$\\theta = 50$$ (degrees) in the formula $$A = \\frac{1}{2}r^2\\theta$$, which requires radians. The value 225 cm² is absurd — it's much larger than the entire circle area of $$\\pi(3)^2 \\approx 28.3$$ cm².\n- Step 2: The correct approach: convert 50° to radians: $$50° = \\frac{50\\pi}{180} = \\frac{5\\pi}{18}$$ rad.\n- Step 3: Now compute: $$A = \\frac{1}{2}(3)^2 \\times \\frac{5\\pi}{18} = \\frac{9}{2} \\times \\frac{5\\pi}{18} = \\frac{45\\pi}{36} = \\frac{5\\pi}{4} \\approx 3.93$$ cm². This is a reasonable fraction of the circle.\n\n**Sanity check:** 50° is about one-seventh of a full circle, so the area should be about $$\\frac{28.3}{7} \\approx 4$$ cm². ✓", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Why is $$\\sin\\theta \\approx \\theta$$ valid only when $$\\theta$$ is in radians? (3 steps)", "answer": "- Step 1: The approximation comes from the Taylor series $$\\sin\\theta = \\theta - \\dfrac{\\theta^3}{6} + \\dots$$, derived assuming $$\\theta$$ is in radians.\n- Step 2: If $$\\theta$$ were in degrees, the expansion would carry an extra factor: $$\\sin\\theta_{\\deg} = \\dfrac{\\pi}{180}\\theta_{\\deg} - \\dots$$, so the leading term is $$\\dfrac{\\pi}{180}\\theta_{\\deg}$$, not $$\\theta_{\\deg}$$.\n- Step 3: For example: $$\\sin(30°) = 0.5$$ but $$30 \\neq 0.5$$. In radians, $$\\dfrac{\\pi}{6} \\approx 0.524$$, and $$\\sin(0.524) \\approx 0.5$$ — consistent.\n\nSo radians make the approximation work because angle and sine share the same \"natural\" scale.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Compare the second-order $$\\sin\\theta \\approx \\theta - \\dfrac{\\theta^3}{6}$$ and first-order $$\\sin\\theta \\approx \\theta$$ approximations for $$\\theta = 0.5$$. (3 steps)", "answer": "- Step 1: First-order: $$\\sin(0.5) \\approx 0.5$$.\n- Step 2: Second-order: $$\\sin(0.5) \\approx 0.5 - \\dfrac{0.125}{6} \\approx 0.5 - 0.0208 \\approx 0.4792$$.\n- Step 3: True value (calculator): $$\\sin(0.5) \\approx 0.4794$$.\n+ First-order error: $$\\approx 0.02$$ ($$\\sim$$4%)\n+ Second-order error: $$\\approx 0.0002$$ ($$\\sim$$0.04%)\n\nAdding the cubic correction reduces error by $$\\sim$$100x at this scale.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "Derive the formula $$l = r\\theta$$ from the proportionality principle that arc length is proportional to the angle subtended. (3 steps)", "answer": "- Step 1: For a fixed radius $$r$$, the arc length $$l$$ is proportional to the angle $$\\theta$$ at the centre. So $$l = k\\theta$$ for some constant $$k$$ that depends on $$r$$.\n- Step 2: To find $$k$$, use the known case: when $$\\theta = 2\\pi$$ (a full revolution), the arc is the entire circumference, so $$l = 2\\pi r$$. Substituting: $$2\\pi r = k \\cdot 2\\pi$$, giving $$k = r$$.\n- Step 3: Therefore $$l = r\\theta$$. The constant of proportionality is simply the radius itself — this is precisely why radians are the natural unit.\n\nThe formula encodes the definition: 1 radian opens up an arc of length 1 radius.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Use a small-angle approximation to compare arc length and chord length for $$\\theta = 0.2$$ rad qualitatively. (3 steps)", "answer": "- Step 1: Arc length = $$r\\theta$$. Chord length = $$2r\\sin(\\theta/2) \\approx 2r \\cdot \\theta/2 = r\\theta$$ to leading order.\n- Step 2: Going to second order: $$\\sin(\\theta/2) \\approx \\theta/2 - \\dfrac{(\\theta/2)^3}{6}$$, so chord $$\\approx r\\theta - \\dfrac{r\\theta^3}{24}$$.\n- Step 3: For $$\\theta = 0.2$$: chord/arc ratio $$\\approx 1 - \\dfrac{\\theta^2}{24} = 1 - \\dfrac{0.04}{24} \\approx 0.998$$.\n\nSo chord and arc agree to about 0.2% for $$\\theta = 0.2$$ rad — almost identical, confirming the small-angle picture.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "When the angle in a trig equation problem is given to a \"non-standard\" interval, like $$[-\\pi, \\pi]$$ or $$[\\pi, 3\\pi]$$, what's the strategy? (3 steps)", "answer": "- Step 1: First find solutions in a \"canonical\" interval like $$[0, 2\\pi]$$ using the standard approach (principal value + symmetries).\n- Step 2: Then shift solutions by $$\\pm 2\\pi$$ as needed to land in the desired interval.\n- Step 3: Always sketch the trig function over the desired interval — visual checks catch missing solutions easily.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Why does the small-angle approximation for tan θ ≈ θ require both sin and cos approximations to be valid? (2 steps)", "answer": "- Step 1: tan θ = sin θ / cos θ.\n- Step 2: Using approximations: tan θ ≈ θ / (1 - θ²/2) ≈ θ(1 + θ²/2) ≈ θ for small θ (since θ² terms are very small). The approximation relies on both sin ≈ θ and cos ≈ 1 - θ²/2 being valid.\n\nThis shows how one approximation can be derived from others.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "An arc subtends 0.4 rad at the centre. By inspection (without computation), is the radius likely larger or smaller than the arc length? Why? (3 steps)", "answer": "- Step 1: From $$l = r\\theta$$, we have $$r = \\frac{l}{\\theta}$$.\n- Step 2: Since $$\\theta = 0.4 < 1$$, dividing $$l$$ by $$\\theta$$ gives $$r > l$$.\n- Step 3: Geometrically: when the angle is small, even a long radius produces only a short arc — the \"fan\" of the sector is narrow, so the arc is short relative to the radius.\n\nIntuition: 1 rad gives arc = radius. Less than 1 rad gives arc < radius.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "A student sees the angle $$\\frac{5\\pi}{4}$$ and immediately knows it's in the third quadrant. How can you quickly determine the quadrant of any angle given as a multiple of $$\\pi$$? (3 steps)", "answer": "- Step 1: Compare the fraction to the key boundary values. The four quadrants in radians are: Q1: $$0$$ to $$\\frac{\\pi}{2}$$, Q2: $$\\frac{\\pi}{2}$$ to $$\\pi$$, Q3: $$\\pi$$ to $$\\frac{3\\pi}{2}$$, Q4: $$\\frac{3\\pi}{2}$$ to $$2\\pi$$.\n- Step 2: For $$\\frac{5\\pi}{4}$$: note that $$\\pi = \\frac{4\\pi}{4}$$ and $$\\frac{3\\pi}{2} = \\frac{6\\pi}{4}$$. Since $$\\frac{4\\pi}{4} < \\frac{5\\pi}{4} < \\frac{6\\pi}{4}$$, the angle lies in Q3.\n- Step 3: General strategy: express the angle with a common denominator and compare to the boundaries. For example, $$\\frac{7\\pi}{6}$$ vs $$\\pi = \\frac{6\\pi}{6}$$ and $$\\frac{3\\pi}{2} = \\frac{9\\pi}{6}$$ → between $$\\frac{6\\pi}{6}$$ and $$\\frac{9\\pi}{6}$$ → Q3.\n\nThis skill is essential for solving trig equations in radians, where you need to identify the correct quadrants for solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "A student writes $$\\cos 3\\theta \\approx 1 - \\frac{3\\theta^2}{2}$$ using small-angle approximations. Is this correct? If not, what is the right answer? (2 steps)", "answer": "- Step 1: The small-angle approximation for cosine is $$\\cos x \\approx 1 - \\frac{x^2}{2}$$ where $$x$$ is the *entire argument*. Here $$x = 3\\theta$$, so: $$\\cos 3\\theta \\approx 1 - \\frac{(3\\theta)^2}{2} = 1 - \\frac{9\\theta^2}{2}$$.\n- Step 2: The student's answer $$1 - \\frac{3\\theta^2}{2}$$ is **incorrect** — they substituted only the $$\\theta$$ into the formula but forgot to square the coefficient 3. The correct answer is $$1 - \\frac{9\\theta^2}{2}$$.\n\nThis is the most common small-angle error: failing to substitute the *full argument* into the approximation template.", "source": "GLM 5.1 ③", "_id": "glm_3_65"}, {"question": "A region bounded by two intersecting circles forms a \"lens\" shape. Why can we compute its area as a sum of two segments without double-counting? (3 steps)", "answer": "- Step 1: The lens-shaped region is bounded by an arc from EACH circle. Each segment is bounded by the common chord and one of these arcs.\n- Step 2: The two segments share the chord but have DIFFERENT arcs, so adding them gives the full lens with no double-counting — the chord is on the boundary, traversed once from each side.\n- Step 3: Setup: identify the common chord, find the central angle in each circle (using cosine rule on each centre triangle), then sum: $$\\tfrac{1}{2}r_1^2(\\theta_1 - \\sin\\theta_1) + \\tfrac{1}{2}r_2^2(\\theta_2 - \\sin\\theta_2)$$.\n\nThis is the canonical strategy for circle-intersection problems.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Two circles of the same radius 12 cm intersect such that each centre lies on the other's circumference. The circles intersect at points $$A$$ and $$B$$. Show that $$\\angle AO_1B = \\frac{2\\pi}{3}$$. (3 steps)", "answer": "- Step 1: Since $$O_2$$ lies on the circumference of the circle centred at $$O_1$$, the distance $$O_1O_2 = 12$$ (the radius). Similarly, $$O_1O_2 = O_1A = O_1B = O_2A = O_2B = 12$$.\n- Step 2: Triangle $$O_1AO_2$$ has all sides equal to 12, so it's **equilateral**, meaning $$\\angle AO_1O_2 = \\frac{\\pi}{3}$$. By symmetry, triangle $$O_1BO_2$$ is also equilateral, so $$\\angle BO_1O_2 = \\frac{\\pi}{3}$$.\n- Step 3: Therefore $$\\angle AO_1B = \\frac{\\pi}{3} + \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$.\n\nThe key geometric insight: when two equal circles pass through each other's centres, the resulting triangles formed by the centres and intersection points are always equilateral.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Approximately how many degrees is 1 radian, and why is it slightly less than 60°? (2 steps)", "answer": "- Step 1: $$1 \\text{ radian} = \\frac{180°}{\\pi} \\approx \\frac{180°}{3.14159} \\approx 57.296°$$. This is the exact conversion.\n- Step 2: It is less than 60° because $$\\pi \\approx 3.14 > 3$$, so $$\\frac{180}{\\pi} < \\frac{180}{3} = 60$$. Since $$\\pi$$ exceeds 3, the denominator is larger, making the quotient smaller than 60.\n\nA useful checkpoint: if you ever compute 1 radian and get something near 57°, you're in the right ballpark.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "In a circle of radius $$r$$ with centre $$O$$, a chord $$AB$$ subtends angle $$\\theta$$ at the centre. A circle of radius $$r'$$ is inscribed inside the sector (touching both radii and the arc). Express $$r'$$ in terms of $$r$$ and $$\\theta$$, using the geometry of the situation. (3 steps)", "answer": "- Step 1: The inscribed circle has centre $$C$$ at distance $$r - r'$$ from $$O$$ (since it touches the arc of radius $$r$$). The circle touches each radius at a point where the line from $$C$$ is perpendicular to the radius.\n- Step 2: Consider the right triangle formed by $$O$$, $$C$$, and the point where the inscribed circle touches a radius. The half-angle at $$O$$ is $$\\frac{\\theta}{2}$$, and we have $$\\sin\\frac{\\theta}{2} = \\frac{r'}{OC} = \\frac{r'}{r - r'}$$.\n- Step 3: Solve: $$r' = (r - r')\\sin\\frac{\\theta}{2}$$, so $$r' = r\\sin\\frac{\\theta}{2} - r'\\sin\\frac{\\theta}{2}$$, giving $$r'(1 + \\sin\\frac{\\theta}{2}) = r\\sin\\frac{\\theta}{2}$$, and thus $$r' = \\frac{r\\sin\\frac{\\theta}{2}}{1 + \\sin\\frac{\\theta}{2}}$$.\n\nThis is the result from Exercise 10 in the textbook (with $$\\theta$$ there being the half-angle). The key is drawing the right triangle and using trigonometry.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Given that $$2\\pi$$ radians = $$360°$$, derive the two key conversion factors: (a) how to convert from radians to degrees, and (b) how to convert from degrees to radians. (2 steps)", "answer": "- Step 1: From $$2\\pi \\text{ rad} = 360°$$, divide both sides by 2 to get $$\\pi \\text{ rad} = 180°$$. This is the master conversion.\n  + To convert **radians → degrees**: multiply by $$\\frac{180°}{\\pi}$$. For example, $$\\frac{7\\pi}{8} \\text{ rad} = \\frac{7\\pi}{8} \\times \\frac{180°}{\\pi} = \\frac{7}{8} \\times 180° = 157.5°$$.\n- Step 2: Rearrange $$\\pi \\text{ rad} = 180°$$ to get $$1° = \\frac{\\pi}{180}$$ radians.\n  + To convert **degrees → radians**: multiply by $$\\frac{\\pi}{180°}$$. For example, $$150° = 150° \\times \\frac{\\pi}{180°} = \\frac{5\\pi}{6}$$ rad.\n\nThe key insight: you're always multiplying by a fraction that equals 1 (since $$\\frac{\\pi}{180°} = 1$$ and $$\\frac{180°}{\\pi} = 1$$), so you're changing the unit without changing the actual angle.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "A common misconception: \"the segment is the part between a chord and an arc.\" Why does this need to be more precise? (3 steps)", "answer": "- Step 1: A chord divides a circle into TWO regions: the minor segment (smaller) and the major segment (larger). Both are bounded by the chord and an arc.\n- Step 2: The formula $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ gives the MINOR segment when $$\\theta$$ is the (non-reflex) angle subtended at the centre.\n- Step 3: For the MAJOR segment, use $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$, OR compute as (whole circle) − (minor segment) = $$\\pi r^2 - \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nAlways check which segment the problem refers to, and which angle (reflex or not) to use.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "When the area $$A_2$$ of the major segment is some multiple $$k$$ of the minor segment area $$A_1$$ (with $$A_2 = k A_1$$), what's the relationship between $$\\theta$$ (central angle of minor segment) and the total circle area? (3 steps)", "answer": "- Step 1: Total circle area = $$A_1 + A_2 + (\\text{triangle area})$$? No — total = minor segment + major segment, since segments together cover the circle minus nothing. Hmm.\n\nActually, careful: $$A_1 + A_2 = $$ area of circle, since the chord $$PQ$$ splits the circle into exactly two segments.\n- Step 2: So $$A_1 + A_2 = \\pi r^2$$. With $$A_2 = k A_1$$: $$A_1(1 + k) = \\pi r^2$$, giving $$A_1 = \\frac{\\pi r^2}{1 + k}$$.\n- Step 3: Then use $$A_1 = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ to set up an equation for $$\\theta$$. This often results in transcendental equations.\n\nThe trap: students sometimes count the triangle separately. The chord truly splits the circle into just two regions (segments).", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "A student is asked to approximate $$\\sin 0.2$$ using small-angle approximations. They write $$\\sin 0.2 \\approx 0.2$$. Estimate the percentage error in this approximation. (3 steps)", "answer": "- Step 1: The approximation gives $$\\sin 0.2 \\approx 0.2$$. The actual value (calculator, radians mode): $$\\sin 0.2 \\approx 0.19867$$.\n- Step 2: Error = $$|0.2 - 0.19867| = 0.00133$$. Percentage error = $$\\frac{0.00133}{0.19867} \\times 100\\% \\approx 0.67\\%$$.\n- Step 3: Alternatively, from the series: the next term is $$\\frac{\\theta^3}{6} = \\frac{0.008}{6} \\approx 0.00133$$, confirming the error. For $$\\theta = 0.2$$, the approximation is excellent (under 1% error).\n\nThis confirms the rule of thumb: for $$\\theta \\lesssim 0.3$$ rad, $$\\sin\\theta \\approx \\theta$$ is accurate to about 1%.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Compute the perimeter of a small sector with radius $$r$$ in the limit $$\\theta \\to 0$$. What does it tell us? (3 steps)", "answer": "- Step 1: $$P = r(2 + \\theta) \\to 2r$$ as $$\\theta \\to 0$$.\n- Step 2: This makes sense: as the angle shrinks, the arc disappears, leaving just the two radii (which coincide as $$\\theta \\to 0$$, but their lengths are still each $$r$$).\n- Step 3: The \"sector\" collapses to a single line segment of length $$r$$ (traversed twice), giving total length $$2r$$.\n\nEdge cases like this verify the formula's consistency.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Explain why the formula A = ½pr (where p is the arc length and r is the radius) gives the area of a sector, and derive it from the standard formula. (3 steps)", "answer": "- Step 1: Starting from A = ½r²θ, and knowing l = rθ (arc length), we can substitute θ = l/r.\n- Step 2: So A = ½r² × (l/r) = ½rl.\n- Step 3: This is useful when you're given the arc length rather than the angle, as it avoids having to first calculate θ = l/r.\n\nThis shows how to derive alternative forms of the area formula.", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "Why might computing $$\\sin(0.5)$$ on a calculator give wildly different results, and what should you check? (3 steps)", "answer": "- Step 1: In degree mode, the calculator interprets 0.5 as 0.5° (a tiny angle), giving $$\\sin(0.5°) \\approx 0.0087$$.\n- Step 2: In radian mode, 0.5 is interpreted as 0.5 rad ≈ 28.6°, giving $$\\sin(0.5\\text{ rad}) \\approx 0.479$$.\n- Step 3: A factor of ~55 difference! Always verify your calculator's angle mode (DEG vs RAD) before computing trig functions. This is one of the most common student errors and can cause answers to be off by orders of magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "A student converts 1 radian to degrees by doing \"1 × 180 = 180°\". Explain why this is wrong and what the correct answer is. (1 step)", "answer": "- Step 1: The student forgot to divide by π! The correct conversion is $$1 \\text{ rad} = \\frac{180°}{\\pi} \\approx 57.3°$$. You must divide by π because π radians = 180°, not π radians = 180 × π degrees!\n\n**Misconception alert:** 1 radian is NOT 180°—π radians equals 180°.", "source": "MiniMax ①", "_id": "minimax_1_52"}, {"question": "Given a sector with arc length $$l$$ and radius $$r$$, derive an alternative formula for the sector area in terms of $$l$$ and $$r$$ only (without explicitly using $$\\theta$$). Why is this useful? (3 steps)", "answer": "- Step 1: From the arc length formula: $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substitute into the sector area: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}r^2 \\cdot \\frac{l}{r} = \\frac{1}{2}rl$$.\n- Step 3: So $$A = \\frac{1}{2}rl$$. Useful when the arc length is given directly (not the angle), as it bypasses computing $$\\theta$$.\n\nThis also reveals a deep analogy with triangle areas: the sector behaves like a triangle when you \"unwrap\" it.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "The perimeter of a sector is twice the length of its arc. Find the angle $$\\theta$$ of the sector in radians. (3 steps)", "answer": "- Step 1: Let the radius be $$r$$ and angle be $$\\theta$$. The arc length is $$r\\theta$$ and the perimeter is $$r(2 + \\theta)$$.\n- Step 2: We're told perimeter = 2 × arc length: $$r(2 + \\theta) = 2r\\theta$$.\n- Step 3: Divide by $$r$$: $$2 + \\theta = 2\\theta$$, so $$2 = \\theta$$. The angle is **2 radians** (≈ 114.6°).\n\nThis makes intuitive sense: the two radii together have length $$2r$$, and the arc has length $$2r$$ as well (since $$\\theta = 2$$), so the perimeter is $$4r$$, which is indeed twice the arc length $$2r$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Why is $$\\theta - \\sin\\theta$$ always non-negative for $$\\theta \\geq 0$$, and what does this mean physically? (3 steps)", "answer": "- Step 1: For all $$\\theta \\geq 0$$, the curve $$y = \\theta$$ lies on or above $$y = \\sin\\theta$$ — they meet only at $$\\theta = 0$$.\n- Step 2: This is a consequence of $$\\sin\\theta \\leq \\theta$$ (a standard inequality, easily seen from the unit-circle geometry where the chord ≤ arc).\n- Step 3: So $$\\theta - \\sin\\theta \\geq 0$$, ensuring segment area is always non-negative — a sanity check on the formula. Physically: a segment is a real region with positive area.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "If you double the radius of a sector while keeping the angle the same, what happens to (a) the arc length, (b) the area? If you double the angle while keeping the radius the same, what happens? (2 steps)", "answer": "- Step 1: Arc length = $$r\\theta$$. Doubling $$r$$ doubles the arc length. Doubling $$\\theta$$ also doubles the arc length (direct proportion to both).\n- Step 2: Area = $$\\frac{1}{2}r^2\\theta$$. Doubling $$r$$ quadruples the area ($$r^2$$ factor). Doubling $$\\theta$$ doubles the area (direct proportion to $$\\theta$$).", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "Solve $$\\cos\\theta = -\\frac{\\sqrt{2}}{2}$$ for $$0 \\leq \\theta < 2\\pi$$, giving exact answers. Explain how the negative sign affects which quadrants you search. (3 steps)", "answer": "- Step 1: First find the reference angle: $$\\cos\\alpha = \\frac{\\sqrt{2}}{2}$$ gives $$\\alpha = \\frac{\\pi}{4}$$. But cosine is *negative*, so we look in Q2 and Q4 (where cosine is negative).\n- Step 2: Q2 solution: $$\\theta_1 = \\pi - \\frac{\\pi}{4} = \\frac{3\\pi}{4}$$. Q4 solution: $$\\theta_2 = 2\\pi - \\frac{\\pi}{4} = \\frac{7\\pi}{4}$$.\n- Step 3: Verify: $$\\cos\\frac{3\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓ and $$\\cos\\frac{7\\pi}{4} = -\\frac{\\sqrt{2}}{2}$$ ✓.\n\nThe key principle: the sign of the trig value tells you *which quadrants* to search. The absolute value gives you the *reference angle*. You then reflect that reference angle into the appropriate quadrants.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "In a circle of radius $$r$$, the chord $$AB$$ has length 6 cm and the radius is also 6 cm. What is the angle subtended by the arc $$AB$$, and what is the arc length? (3 steps)", "answer": "- Step 1: Triangle $$AOB$$ is isosceles with $$OA = OB = 6$$ and $$AB = 6$$. So it is actually equilateral, meaning $$\\angle AOB = 60° = \\frac{\\pi}{3}$$ radians.\n- Step 2: The arc length is $$l = r\\theta = 6 \\times \\frac{\\pi}{3} = 2\\pi$$ cm.\n- Step 3: Check: the arc length $$2\\pi \\approx 6.28$$ cm is slightly longer than the chord length 6 cm, which makes sense — the arc \"curves around\" and is always longer than the straight chord it subtends.\n\nAn arc is always longer than its chord (for angles $$0 < \\theta < \\pi$$), and equal only when $$\\theta = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Two circles of radii 10 cm and 8 cm intersect at points $$A$$ and $$B$$ such that $$AB = 14$$ cm. Without doing the full calculation, describe the strategy to find the area of the region common to both circles (the lens-shaped overlap). (4 steps)", "answer": "- Step 1: In the larger circle (radius 10), the chord $$AB = 14$$ subtends an angle $$\\alpha$$ at the centre. Find $$\\alpha$$ using the isosceles triangle: drop a perpendicular from the centre to the midpoint of $$AB$$, giving $$\\sin\\frac{\\alpha}{2} = \\frac{7}{10}$$, so $$\\frac{\\alpha}{2} = \\sin^{-1}(0.7)$$.\n- Step 2: Similarly, in the smaller circle (radius 8), the chord $$AB = 14$$ subtends angle $$\\beta$$ at the centre: $$\\sin\\frac{\\beta}{2} = \\frac{7}{8}$$, so $$\\frac{\\beta}{2} = \\sin^{-1}(0.875)$$.\n- Step 3: The overlap region consists of: the segment of the larger circle (angle $$\\alpha$$) plus the segment of the smaller circle (angle $$\\beta$$). Each segment area is $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 4: Total overlap area $$= \\frac{1}{2}(10)^2(\\alpha - \\sin\\alpha) + \\frac{1}{2}(8)^2(\\beta - \\sin\\beta)$$. Note: $$\\beta$$ will be larger than $$\\alpha$$ because the same chord subtends a bigger angle in the smaller circle.\n\nThe lens (vesica piscis) is always the sum of two segments — one from each circle.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "Using small-angle approximations, estimate the value of $$\\frac{1 - \\cos\\theta}{\\sin^2\\theta}$$ for small $$\\theta$$. Walk through the substitution and simplification. (3 steps)", "answer": "- Step 1: Substitute the approximations: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, so $$1 - \\cos\\theta \\approx \\frac{\\theta^2}{2}$$. And $$\\sin\\theta \\approx \\theta$$, so $$\\sin^2\\theta \\approx \\theta^2$$.\n- Step 2: Therefore $$\\frac{1 - \\cos\\theta}{\\sin^2\\theta} \\approx \\frac{\\theta^2/2}{\\theta^2} = \\frac{1}{2}$$.\n- Step 3: This is actually an exact result! The identity $$\\frac{1-\\cos\\theta}{\\sin^2\\theta} = \\frac{1}{2}$$ can be proven using $$\\sin^2\\theta + \\cos^2\\theta = 1$$ (since $$1 - \\cos^2\\theta = \\sin^2\\theta$$, so $$1 - \\cos\\theta = \\frac{\\sin^2\\theta}{1+\\cos\\theta}$$, and the ratio becomes $$\\frac{1}{1+\\cos\\theta}$$, which approaches $$\\frac{1}{2}$$ as $$\\theta \\to 0$$).\n\nThis example shows how small-angle approximations can reveal limiting values and verify identities.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Convert $$\\frac{7\\pi}{8}$$ radians to degrees. Walk through the mechanism of why the $$\\pi$$ cancels. (2 steps)", "answer": "- Step 1: Apply the conversion: $$\\frac{7\\pi}{8} \\times \\frac{180°}{\\pi}$$. The $$\\pi$$ in the numerator cancels with the $$\\pi$$ in the denominator. This cancellation happens precisely because the conversion factor $$\\frac{180°}{\\pi}$$ was designed to absorb the $$\\pi$$ — it's the bridge between the two systems.\n- Step 2: You're left with $$\\frac{7}{8} \\times 180° = 7 \\times 22.5° = 157.5°$$.\n\nThe deeper point: whenever an angle is given as a multiple of $$\\pi$$, converting to degrees is just \"multiply the fraction by 180°\" because the $$\\pi$$ always cancels.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "What is a circular segment, and how does it differ from a sector? (3 steps)", "answer": "- Step 1: A sector is the region enclosed by two radii and the arc between their endpoints — like a pizza slice from the centre.\n- Step 2: A segment is the region enclosed by a chord and the arc between its endpoints — like the slice with the triangular crust portion removed.\n- Step 3: Geometrically: segment = sector − (triangle formed by the two radii and the chord). The boundary of a segment doesn't pass through the centre; it's bounded by a straight chord and a curved arc.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Why can't you use the formula A = ½r²θ for a full circle (θ = 2π)? What formula should you use instead? (2 steps)", "answer": "- Step 1: Actually, you CAN use A = ½r²θ for a full circle! Substituting θ = 2π gives A = ½r² × 2π = πr², which is the correct area of a circle.\n- Step 2: The formula works for any angle in radians, including the full circle. The arc length formula l = rθ also gives l = r × 2π = 2πr for the full circumference.\n\nThis addresses a potential misconception - the formulas work for all angles.", "source": "MiniMax ②", "_id": "minimax_2_46"}, {"question": "For a sector with central angle $$\\theta$$ and area $$A$$, expressed in terms of the arc length $$l$$, what's the relationship $$A$$ to $$l$$? Why is this useful? (3 steps)", "answer": "- Step 1: From $$A = \\frac{1}{2}rl$$ (alternate sector area formula).\n- Step 2: If you know $$l$$ and $$r$$, you can compute area directly without finding $$\\theta$$ — saves one step.\n- Step 3: Conversely, if you know $$A$$ and $$r$$, you can find arc length: $$l = \\frac{2A}{r}$$. Useful in problems where the angle isn't directly relevant.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "Explain conceptually why the area formula for a segment involves $$\\sin\\theta$$ rather than just $$\\theta$$ minus something simple. What does $$\\sin\\theta$$ represent geometrically in this context? (2 steps)", "answer": "- Step 1: The $$\\sin\\theta$$ comes from the area of the triangle formed by the two radii and the chord. Using the formula $$\\frac{1}{2}ab\\sin C$$ with $$a = b = r$$, we get $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Geometrically, $$\\sin\\theta$$ is the ratio of the chord's perpendicular height to the radius. It captures how \"tall\" the triangular portion is. As $$\\theta$$ increases from 0 to $$\\pi$$, $$\\sin\\theta$$ increases from 0 to 1 then back to 0, perfectly describing how the triangular area changes relative to the sector. That's why we subtract $$\\sin\\theta$$—to remove exactly the triangular portion from the sector.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "Solve $$\\tan\\theta = -\\sqrt{3}$$ for $$0 \\leq \\theta < 2\\pi$$, giving exact answers. Why does tangent have a different symmetry rule than sine or cosine? (3 steps)", "answer": "- Step 1: Find the reference angle: $$\\tan\\alpha = \\sqrt{3}$$ gives $$\\alpha = \\frac{\\pi}{3}$$. Tangent is negative in Q2 and Q4.\n- Step 2: Q2 solution: $$\\theta_1 = \\pi - \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$. Q4 solution: $$\\theta_2 = 2\\pi - \\frac{\\pi}{3} = \\frac{5\\pi}{3}$$.\n- Step 3: Tangent has period $$\\pi$$ (not $$2\\pi$$), so an alternative way to find the Q4 solution is: $$\\theta_2 = \\frac{2\\pi}{3} + \\pi = \\frac{5\\pi}{3}$$ (which simplifies to the same answer since $$\\frac{2\\pi}{3} + \\pi = \\frac{5\\pi}{3}$$, but note $$\\frac{5\\pi}{3} < 2\\pi$$ ✓).\n\n+ The deeper reason: $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, and tangent is periodic with period $$\\pi$$ because both sine and cosine flip sign after a half-turn, so their ratio stays the same. This is why once you have one solution, adding $$\\pi$$ always gives another.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "A circle has radius 6 cm. The chord $$PQ$$ divides it into a minor segment of area $$A_1$$ and a major segment of area $$A_2$$. If $$A_2 = 3A_1$$, set up the equation for $$\\theta$$ (the angle subtended at the centre by $$PQ$$). (3 steps)", "answer": "- Step 1: Total area: $$A_1 + A_2 = \\pi r^2 = 36\\pi$$. Combined with $$A_2 = 3A_1$$: $$4A_1 = 36\\pi$$, so $$A_1 = 9\\pi$$.\n- Step 2: $$A_1 = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta) = 18(\\theta - \\sin\\theta)$$.\n- Step 3: Setting equal: $$18(\\theta - \\sin\\theta) = 9\\pi \\Rightarrow \\theta - \\sin\\theta = \\dfrac{\\pi}{2} \\Rightarrow \\sin\\theta = \\theta - \\dfrac{\\pi}{2}$$.\n\nThe transcendental equation $$\\sin\\theta = \\theta - \\pi/2$$ would need numerical methods to solve — but the setup is clean and elegant.", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "When $$\\theta$$ is in radians, $$\\dfrac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$. What does the derivative look like if $$\\theta$$ were in degrees? (3 steps)", "answer": "- Step 1: If $$\\theta$$ is in degrees, $$\\sin\\theta_{\\deg} = \\sin\\left(\\dfrac{\\pi}{180}\\theta_{\\deg}\\right)$$, so by chain rule: $$\\dfrac{d}{d\\theta_{\\deg}}\\sin\\theta_{\\deg} = \\dfrac{\\pi}{180}\\cos\\theta_{\\deg}$$.\n- Step 2: A factor of $$\\dfrac{\\pi}{180} \\approx 0.0175$$ pollutes EVERY derivative formula.\n- Step 3: Hence calculus formulas are stated in radians: differentiation and integration of trig functions are CLEAN only when $$\\theta$$ is in radians.\n\nThis is the deep reason radians are preferred in higher mathematics.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "Explain why small angles ($\\theta \\ll 1$) in radians satisfy $\\sin\\theta \\approx \\theta$ and $\\tan\\theta \\approx \\theta$, but $\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$. (3 steps)", "answer": "- Step 1: Taylor series expansions around $\\theta = 0$:  \n$$\n\\sin\\theta = \\theta - \\frac{\\theta^3}{6} + \\dots \\approx \\theta \\\\\n\\tan\\theta = \\theta + \\frac{\\theta^3}{3} + \\dots \\approx \\theta \\\\\n\\cos\\theta = 1 - \\frac{\\theta^2}{2} + \\dots \\approx 1 - \\frac{\\theta^2}{2}\n$$  \n- Step 2: For small $\\theta$, higher-order terms ($\\theta^3$, etc.) are negligible.  \n+ Example: For $\\theta = 0.1$ rad, $\\sin\\theta \\approx 0.1$, with error < 0.1%.  \n- Step 3: These approximations are crucial in physics for simplifying simple harmonic motion and diffraction equations.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Use small-angle approximations to find an approximate simplified expression for $$\\frac{\\theta \\cos\\theta - \\sin\\theta}{\\theta^3}$$ when $$\\theta$$ is small. (4 steps)", "answer": "- Step 1: Apply approximations: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ and $$\\sin\\theta \\approx \\theta$$.\n- Step 2: Compute the numerator: $$\\theta\\cos\\theta - \\sin\\theta \\approx \\theta\\left(1 - \\frac{\\theta^2}{2}\\right) - \\theta = \\theta - \\frac{\\theta^3}{2} - \\theta = -\\frac{\\theta^3}{2}$$.\n- Step 3: Divide by $$\\theta^3$$: $$\\frac{-\\theta^3/2}{\\theta^3} = -\\frac{1}{2}$$.\n- Step 4: The approximate value is $$-\\frac{1}{2}$$. Note: the leading-order terms cancelled ($$\\theta - \\theta = 0$$), so we needed the next-order correction from $$\\cos\\theta$$ to get a nonzero answer.\n\nWhen the leading terms cancel, you must keep the next order in the approximation — here, the $$\\theta^2$$ term from cosine was essential.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Why does a chord and arc subtended by it become approximately equal for small angles, and how does this connect to small-angle approximations? (3 steps)", "answer": "- Step 1: Chord length: $$2r\\sin(\\theta/2)$$. Arc length: $$r\\theta$$.\n- Step 2: For small $$\\theta$$: $$\\sin(\\theta/2) \\approx \\theta/2$$, so chord $$\\approx 2r \\cdot \\theta/2 = r\\theta$$ = arc length.\n- Step 3: Visually: a small arc looks nearly straight (locally tangent-like). The smaller the angle, the better the approximation.\n\nThis is the visual basis for $$\\sin\\theta \\approx \\theta$$ in radians: as $$\\theta \\to 0$$, the y-coordinate (chord projection) on the unit circle becomes proportional to arc length (= angle).", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A student says \"since $$\\sin\\theta \\approx \\theta$$ for small angles, $$\\sin 0.1° \\approx 0.1$$\". What is wrong? (3 steps)", "answer": "- Step 1: The small-angle approximation $$\\sin\\theta \\approx \\theta$$ requires $$\\theta$$ to be in **radians**. The value $$0.1°$$ is in degrees.\n- Step 2: Converting: $$0.1° = \\frac{0.1\\pi}{180} \\approx 0.001745$$ radians. So $$\\sin 0.1° \\approx 0.001745$$, not 0.1.\n- Step 3: The student's answer of 0.1 is off by a factor of about 57 (which is $$\\frac{180}{\\pi}$$). This is the degree-radian conversion factor — exactly the error you'd expect from using degrees where radians are required.\n\n**Misconception probe:** The approximation $$\\sin\\theta \\approx \\theta$$ is a statement about the *radian* measure. It essentially says \"the sine of a small number of radians is approximately that number.\"", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "How would you find the area of a segment if you know the chord length $$c$$ and radius $$r$$, but not the angle? (3 steps)", "answer": "- Step 1: Find the central angle first using the cosine rule on the isosceles triangle $$OAB$$: $$c^2 = 2r^2 - 2r^2\\cos\\theta$$, giving $$\\cos\\theta = 1 - \\dfrac{c^2}{2r^2}$$.\n- Step 2: Solve $$\\theta = \\arccos\\left(1 - \\dfrac{c^2}{2r^2}\\right)$$ in radians.\n- Step 3: Plug into the segment formula: $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe cosine rule is the bridge between \"side info\" (chord) and \"angle info\" (central angle).", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Why does a full revolution around a circle equal exactly $$2\\pi$$ radians? (3 steps)", "answer": "- Step 1: The circumference of a circle of radius $$r$$ is $$2\\pi r$$. This is the total arc length for one complete revolution.\n- Step 2: From the definition, an arc of length $$r$$ subtends 1 radian. So an arc of length $$2\\pi r$$ subtends $$\\frac{2\\pi r}{r} = 2\\pi$$ radians.\n- Step 3: Since a full revolution is also $$360°$$, we get the fundamental relationship $$2\\pi \\text{ rad} = 360°$$, or equivalently $$\\pi \\text{ rad} = 180°$$.\n\nThe factor of $$2\\pi$$ arises because the circumference-to-radius ratio is exactly $$2\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "A sector has radius 12 cm and area 100 cm². Conceptually, how do you find its perimeter? (3 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}r^2\\theta$$ to extract $$\\theta$$: $$\\theta = \\frac{2A}{r^2} = \\frac{200}{144} = \\frac{25}{18}$$ rad.\n- Step 2: Apply the perimeter formula $$P = r(2 + \\theta)$$.\n- Step 3: $$P = 12\\left(2 + \\frac{25}{18}\\right) = 12 \\cdot \\frac{61}{18} = \\frac{732}{18} \\approx 40.67$$ cm.\n\nThe general approach: extract the angle from area, then plug into perimeter (or vice versa).", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Explain why two sectors with the same arc length but different radii have different areas. Which is larger? (3 steps)", "answer": "- Step 1: From $$A = \\tfrac{1}{2}lr$$, with $$l$$ fixed: a LARGER radius gives a LARGER area.\n- Step 2: Geometrically: same arc length, but the \"fan\" reaches farther out, sweeping more area.\n- Step 3: Equivalently, fixed arc length corresponds to a smaller angle in a larger circle ($$\\theta = l/r$$), and the area $$\\tfrac{1}{2}r^2 \\cdot l/r = \\tfrac{1}{2}lr$$ scales linearly with $$r$$.\n\nInsight: it's the radius (not the angle) that controls the \"size\" of the sector when arc length is held constant.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Explain intuitively why $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$. Use a geometric picture of the unit circle. (3 steps)", "answer": "- Step 1: On the unit circle, $$\\theta$$ (in radians) equals the arc length from $$(1,0)$$ to the point on the circle, while $$\\sin\\theta$$ is the vertical height (the $$y$$-coordinate).\n- Step 2: For small $$\\theta$$, the arc is nearly straight — it's almost identical to the vertical line segment. The arc length $$\\theta$$ and the height $$\\sin\\theta$$ are almost the same because the curved arc and the vertical line are nearly indistinguishable.\n- Step 3: More precisely, the difference $$\\theta - \\sin\\theta$$ is of order $$\\theta^3$$ (the next term in the series is $$\\frac{\\theta^3}{6}$$). So for $$\\theta = 0.1$$, the error is about $$\\frac{0.001}{6} \\approx 0.00017$$ — tiny compared to 0.1.\n\nThe smaller $$\\theta$$ is, the better the approximation. This is why radians are the \"right\" unit — the arc length directly approximates the sine.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "For a sector of given perimeter $$P$$, what relationship between $$r$$ and $$\\theta$$ maximises the sector's area? (Conceptual outline.) (3 steps)", "answer": "- Step 1: Constraint: $$P = r(\\theta + 2)$$, so $$\\theta = \\dfrac{P}{r} - 2$$.\n- Step 2: Area: $$A = \\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2}r^2\\left(\\dfrac{P}{r} - 2\\right) = \\tfrac{1}{2}(Pr - 2r^2)$$.\n- Step 3: Maximise: $$\\dfrac{dA}{dr} = \\tfrac{1}{2}(P - 4r) = 0 \\Rightarrow r = \\dfrac{P}{4}$$. Then $$\\theta = \\dfrac{P}{P/4} - 2 = 4 - 2 = 2$$ rad.\n\nSo the area-maximising sector has $$\\theta = 2$$ radians (interesting: not $$\\pi$$ or some \"round\" number).", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "True or false: \"If you double the radius and halve the angle of a sector, the arc length stays the same.\" Justify. (2 steps)", "answer": "- Step 1: Original arc: $$l_1 = r\\theta$$. New arc: $$l_2 = (2r)(\\theta/2) = r\\theta$$ — same!\n- Step 2: TRUE for arc length. But the area changes: $$A_1 = \\tfrac{1}{2}r^2\\theta$$ vs $$A_2 = \\tfrac{1}{2}(2r)^2(\\theta/2) = r^2\\theta$$ — the new area is DOUBLE.\n\nDoubling the radius and halving the angle preserves arc but doubles area — a useful asymmetry to remember.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "In the context of a circle with angle $$\\theta$$ at the centre, explain the difference between a minor arc/sector/segment and a major arc/sector/segment. How do their angles relate? (2 steps)", "answer": "- Step 1: Given two points $$A$$ and $$B$$ on a circle with centre $$O$$ and angle $$\\angle AOB = \\theta < \\pi$$:\n  + The **minor** arc/sector/segment corresponds to the smaller angle $$\\theta$$.\n  + The **major** arc/sector/segment corresponds to the larger angle $$2\\pi - \\theta$$.\n- Step 2: The minor and major together make the full circle. So: minor arc length + major arc length = $$2\\pi r$$; minor sector area + major sector area = $$\\pi r^2$$; minor segment area + major segment area = $$\\pi r^2$$ (since minor segment + major segment = full circle area, noting that minor segment + triangle = minor sector, and major segment = major sector + triangle).\n\n**Key identity:** Major sector area = $$\\frac{1}{2}r^2(2\\pi - \\theta)$$, and major segment area = $$\\frac{1}{2}r^2(2\\pi - \\theta - \\sin\\theta)$$ (note: $$\\sin(2\\pi - \\theta) = -\\sin\\theta$$ requires care — actually the major segment = circle area − minor segment).", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "A student sees the equation $$\\sin\\theta = \\theta$$ and says \"this is true for all small angles.\" Is this statement precisely correct? Explain the distinction between an approximation and an equation. (2 steps)", "answer": "- Step 1: The statement is imprecise. $$\\sin\\theta = \\theta$$ is an **approximation**, not an equation that holds exactly (except at $$\\theta = 0$$). The correct statement is: \"$$\\sin\\theta \\approx \\theta$$ when $$\\theta$$ is small\" or equivalently \"$$\\lim_{\\theta\\to 0}\\frac{\\sin\\theta}{\\theta} = 1$$.\"\n- Step 2: The equation $$\\sin\\theta = \\theta$$ has only one solution: $$\\theta = 0$$. For any non-zero $$\\theta$$, no matter how small, $$\\sin\\theta \\neq \\theta$$ exactly. For example, $$\\sin(0.01) = 0.009999833...$$, not $$0.01$$. The difference is tiny but real. Confusing $$\\approx$$ with $$=$$ is a conceptual error that can lead to wrong conclusions in proofs and derivations.\n\nTakeaway: Approximations are tools for simplification; they are not identities.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "The perimeter of a sector is twice the length of its arc. Find the angle of the sector. (2 steps)", "answer": "- Step 1: Let the sector have radius $$r$$ and angle $$\\theta$$ radians. Arc length $$= r\\theta$$. Perimeter $$= r\\theta + 2r$$.\n- Step 2: Set perimeter = 2 × arc: $$r\\theta + 2r = 2r\\theta$$, so $$2r = r\\theta$$, giving $$\\theta = 2$$ radians.\n\nThis is a clean result: the angle is exactly 2 radians (about 114.6°). The problem is solvable because the radius cancels — the answer depends only on the angle, which makes physical sense since the ratio \"perimeter to arc length\" is a dimensionless quantity.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "A circle has radius r. A chord subtends an angle of θ radians at the centre. How does the area of the corresponding segment change as θ approaches 0? What about as θ approaches π? (3 steps)", "answer": "- Step 1: As θ → 0: The segment becomes very small. Using A = ½r²(θ - sin θ), and for small θ, sin θ ≈ θ, so A ≈ ½r²(θ - θ) → 0. The segment area tends to zero.\n- Step 2: As θ → π (half circle): A = ½r²(π - sin π) = ½r²(π - 0) = ½πr², which is exactly half the circle (a semicircle).\n- Step 3: This shows the formula works for the full range 0 < θ < 2π, with the segment growing from nothing (θ=0) to the full circle minus a tiny triangle (θ just below 2π).\n\nThis explores limiting behavior of the segment formula.", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "Using small-angle approximations, approximate $$\\frac{\\sin 2\\theta}{1 - \\cos 2\\theta}$$ for small $$\\theta$$. Walk through the substitution carefully. (3 steps)", "answer": "- Step 1: For small $$\\theta$$, $$2\\theta$$ is also small. Apply approximations: $$\\sin 2\\theta \\approx 2\\theta$$ and $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$.\n- Step 2: So $$1 - \\cos 2\\theta \\approx 1 - (1 - 2\\theta^2) = 2\\theta^2$$.\n- Step 3: Therefore $$\\frac{\\sin 2\\theta}{1 - \\cos 2\\theta} \\approx \\frac{2\\theta}{2\\theta^2} = \\frac{1}{\\theta}$$.\n\nThis expression grows without bound as $$\\theta \\to 0$$, which makes sense — both numerator and denominator approach 0, but the numerator is linear in $$\\theta$$ while the denominator is quadratic, so the ratio diverges like $$\\frac{1}{\\theta}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "Why are radians used in calculus instead of degrees?", "answer": "- Step 1: Radians simplify derivative and integral formulas for trigonometric functions (e.g., $ \\frac{d}{d\\theta} \\sin\\theta = \\cos\\theta $ only holds if $ \\theta $ is in radians).  \n- Step 2: Radians are dimensionless and directly relate arc length to radius (via $ s = r\\theta $), making them a natural unit for calculus.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "Compare the formula $$A = \\tfrac{1}{2}r^2\\theta$$ (sector) with $$A = \\tfrac{1}{2}ab\\sin C$$ (triangle). What's the structural similarity, and where do they agree? (3 steps)", "answer": "- Step 1: Both have $$\\tfrac{1}{2}$$ and a product of two \"sides\" — sector uses $$r \\times r = r^2$$, triangle uses $$a \\times b$$.\n- Step 2: The sector uses $$\\theta$$ directly; the triangle uses $$\\sin\\theta$$.\n- Step 3: As $$\\theta \\to 0$$, both formulas agree (since $$\\sin\\theta \\approx \\theta$$). For larger $$\\theta$$, they diverge: the triangle \"fills up\" less of the angular space, while the sector's curved boundary captures the full sweep.\n\nThis is yet another manifestation of $$\\sin\\theta \\approx \\theta$$ for small angles.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why is $ \\theta $ in radians dimensionless?", "answer": "- Step 1: Radians are defined as the ratio of arc length to radius ($ \\theta = \\frac{s}{r} $), both measured in length units.  \n- Step 2: The units cancel, leaving $ \\theta $ dimensionless.", "source": "Qwen 3 ①", "_id": "qwen_1_18"}, {"question": "Under what condition does sector area equal triangle area? Is this possible? (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2}r^2\\theta$$; triangle area = $$\\tfrac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Setting equal: $$\\theta = \\sin\\theta$$.\n- Step 3: For $$\\theta \\in (0, 2\\pi)$$, the only solution to $$\\theta = \\sin\\theta$$ is $$\\theta = 0$$ — there is NO positive angle where these are equal because $$\\theta > \\sin\\theta$$ for all $$\\theta > 0$$.\n\nConceptually: the sector strictly exceeds the triangle in area, with the difference being the segment.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "Why does the area formula $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ tend to $$\\tfrac{r^2 \\theta^3}{12}$$ for small $$\\theta$$, and what does this tell us about thin segments? (3 steps)", "answer": "- Step 1: Use $$\\sin\\theta \\approx \\theta - \\dfrac{\\theta^3}{6}$$, so $$\\theta - \\sin\\theta \\approx \\dfrac{\\theta^3}{6}$$.\n- Step 2: Substitute: $$A \\approx \\tfrac{1}{2}r^2 \\cdot \\dfrac{\\theta^3}{6} = \\dfrac{r^2\\theta^3}{12}$$.\n- Step 3: This means: thin segments have area scaling as $$\\theta^3$$ — for $$\\theta = 0.1$$, the segment is roughly $$\\dfrac{r^2 \\times 10^{-3}}{12}$$, vs the sector at $$\\dfrac{r^2}{20}$$. The segment is about $$\\dfrac{1}{50}$$ of the sector for this thin slice.\n\nThis $$\\theta^3$$ scaling is the geometric fingerprint of \"almost-flat\" regions.", "source": "Opus 4.7 ②", "_id": "opus_2_82"}, {"question": "Given a circle of radius $$r$$ and a regular polygon with $$n$$ sides inscribed in it, why does the polygon's perimeter approach $$2\\pi r$$ as $$n \\to \\infty$$? (3 steps)", "answer": "- Step 1: Each side of the polygon is a chord subtending angle $$\\dfrac{2\\pi}{n}$$ at the centre.\n- Step 2: Side length = $$2r\\sin\\left(\\dfrac{\\pi}{n}\\right)$$. Perimeter = $$n \\times 2r\\sin\\left(\\dfrac{\\pi}{n}\\right) = 2rn\\sin\\left(\\dfrac{\\pi}{n}\\right)$$.\n- Step 3: As $$n \\to \\infty$$, $$\\dfrac{\\pi}{n} \\to 0$$, and $$\\sin\\left(\\dfrac{\\pi}{n}\\right) \\approx \\dfrac{\\pi}{n}$$. So perimeter $$\\approx 2rn \\cdot \\dfrac{\\pi}{n} = 2\\pi r$$ — the circumference!\n\nThis is essentially how Archimedes computed $$\\pi$$: by inscribing/circumscribing polygons. The small-angle approximation is the analytical engine.", "source": "Opus 4.7 ②", "_id": "opus_2_80"}, {"question": "A minor arc subtends angle $$x$$ at the centre, and the major arc subtends angle $$5x$$. What is the total angle at the centre, and hence what is $$x$$ in terms of $$\\pi$$? (2 steps)", "answer": "- Step 1: The minor arc and major arc together cover the full circle. So: $$x + 5x = 2\\pi$$, giving $$6x = 2\\pi$$.\n- Step 2: Therefore $$x = \\frac{\\pi}{3}$$ radians (which is 60°).\n\nThe insight: the minor and major arcs are complementary — they always sum to the full circle angle of $$2\\pi$$ radians. This is the radian version of \"angles around a point sum to 360°.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Without computing exactly, compare the area of a sector ($$r = 5, \\theta = 1$$ rad) to the triangle with two sides of length 5 and included angle 1 rad. (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2} \\times 25 \\times 1 = 12.5$$.\n- Step 2: Triangle area = $$\\tfrac{1}{2} \\times 25 \\times \\sin(1) \\approx 12.5 \\times 0.841 \\approx 10.5$$.\n- Step 3: Sector > Triangle, with the difference (~2) being the segment area — the \"bulge\" of the arc over the chord.\n\nSector and triangle differ by exactly a segment; this is a useful intuition for seeing relationships.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is dimensional analysis a useful tool for checking radian formulas? (3 steps)", "answer": "- Step 1: Length and area have well-defined units (e.g., cm, cm²). Angle in radians is dimensionless.\n- Step 2: Check that each formula's units balance:\n+ $$l = r\\theta$$: cm = cm × (dimensionless) ✓.\n+ $$A = \\tfrac{1}{2}r^2\\theta$$: cm² = cm² × (dimensionless) ✓.\n+ $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$: cm² = cm² × (dimensionless) ✓.\n- Step 3: If your final answer has the wrong units, you've made an error. This is one of the cheapest, most powerful sanity checks.\n\nA formula that doesn't pass dimensional analysis is wrong. Always check.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "When dealing with composite shapes (e.g., shaded region between tangents and a circle), what's the general strategy? (3 steps)", "answer": "- Step 1: Decompose the shape into simpler pieces: triangles, sectors, segments, rectangles. Identify which can be added or subtracted.\n- Step 2: Use the relevant formulas: triangle area ($$\\frac{1}{2}ab\\sin C$$), sector area ($$\\frac{1}{2}r^2\\theta$$), segment area ($$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$).\n- Step 3: Carefully account for additions and subtractions (e.g., shaded = \"outer shape\" − \"inner shape\"), and use circle theorems (right angles at tangent points, angle in semicircle, etc.) to find missing angles.\n\nA sketch with all known angles and lengths labelled is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "A sector has radius 5 cm and angle $$\\dfrac{\\pi}{4}$$ rad. Mentally estimate its area. (3 steps)", "answer": "- Step 1: Use $$A = \\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2} \\times 25 \\times \\tfrac{\\pi}{4} = \\dfrac{25\\pi}{8}$$ cm².\n- Step 2: $$\\pi \\approx 3.14$$, so $$\\dfrac{25 \\times 3.14}{8} \\approx 9.8$$ cm².\n- Step 3: Sanity check via fraction: $$\\dfrac{\\pi/4}{2\\pi} = \\dfrac{1}{8}$$ of the full circle, so the area is $$\\dfrac{1}{8} \\times 25\\pi \\approx \\dfrac{78.5}{8} \\approx 9.8$$ cm². ✓\n\nThe proportional reasoning gives a quick mental sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "State the general solutions in radians for: (a) $$\\sin\\theta = \\sin\\alpha$$, (b) $$\\cos\\theta = \\cos\\alpha$$, (c) $$\\tan\\theta = \\tan\\alpha$$. Explain where each comes from. (3 steps)", "answer": "- Step 1: (a) $$\\sin\\theta = \\sin\\alpha$$: Sine is positive in 1st and 2nd quadrants, so $$\\theta = \\alpha + 2n\\pi$$ OR $$\\theta = (\\pi - \\alpha) + 2n\\pi$$, for integer $$n$$.\n- Step 2: (b) $$\\cos\\theta = \\cos\\alpha$$: Cosine is positive in 1st and 4th quadrants, so $$\\theta = \\alpha + 2n\\pi$$ OR $$\\theta = -\\alpha + 2n\\pi$$ (equivalently $$\\theta = 2\\pi - \\alpha + 2n\\pi$$), for integer $$n$$.\n- Step 3: (c) $$\\tan\\theta = \\tan\\alpha$$: Tangent has period $$\\pi$$, so $$\\theta = \\alpha + n\\pi$$, for integer $$n$$. This is simpler because tangent repeats every $$\\pi$$, not every $$2\\pi$$.\n\nThese general solutions are the \"template\" from which you extract specific solutions in any given interval by choosing appropriate values of $$n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "For roughly what range of $$\\theta$$ (in radians) are the small-angle approximations considered reasonably accurate? What happens as $$\\theta$$ increases? (2 steps)", "answer": "- Step 1: The approximations are typically good to within about 1% for $$|\\theta| < 0.25$$ rad (about 14°). They remain usable (within ~5%) up to about $$|\\theta| < 0.5$$ rad (about 29°).\n- Step 2: As $$\\theta$$ increases, the errors grow: $$\\sin\\theta$$ falls below $$\\theta$$ (since sine curves down), $$\\cos\\theta$$ falls below $$1 - \\frac{\\theta^2}{2}$$, and $$\\tan\\theta$$ rises above $$\\theta$$ (since tangent curves up steeply). Beyond about 0.5 rad, the approximations become increasingly unreliable.\n\nThe approximations are *asymptotic* — exact in the limit $$\\theta \\to 0$$, and increasingly approximate as $$\\theta$$ grows.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "Why can't you use the small-angle approximation $$\\cos\\theta \\approx 1$$ (dropping the $$\\theta^2/2$$ term) when computing $$\\frac{1 - \\cos\\theta}{\\theta^2}$$? What goes wrong? (3 steps)", "answer": "- Step 1: If you use $$\\cos\\theta \\approx 1$$, then $$1 - \\cos\\theta \\approx 0$$, and you'd get $$\\frac{0}{\\theta^2} = 0$$. But the true limit is $$\\frac{1}{2}$$, not 0.\n- Step 2: The problem is that the numerator and denominator are both \"small\" (both → 0 as θ → 0), so the leading-order approximation loses the crucial information about their *ratio*. The $$\\frac{\\theta^2}{2}$$ term in the cosine approximation is exactly what contributes to the numerator.\n- Step 3: The lesson: when computing ratios where both numerator and denominator vanish, you must keep enough terms in the approximation to capture the first nonzero contribution. Here, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ is needed because the linear term is absent (cosine is flat at 0).\n\nThis is a \"limit of indeterminate form 0/0\" situation — the small-angle approximations resolve it by revealing the true order of vanishing.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "As $$\\theta$$ increases from 0 to $$\\pi$$, how does the ratio $$\\dfrac{\\text{chord}}{\\text{arc}}$$ behave? (3 steps)", "answer": "- Step 1: Chord = $$2r\\sin(\\theta/2)$$, arc = $$r\\theta$$, so ratio = $$\\dfrac{2\\sin(\\theta/2)}{\\theta} = \\dfrac{\\sin(\\theta/2)}{\\theta/2}$$.\n- Step 2: As $$\\theta \\to 0$$, $$\\dfrac{\\sin(\\theta/2)}{\\theta/2} \\to 1$$ — chord and arc become nearly equal.\n- Step 3: As $$\\theta \\to \\pi$$, chord = diameter $$2r$$, arc = $$\\pi r$$, ratio = $$\\dfrac{2}{\\pi} \\approx 0.637$$ — chord is about 64% of the arc.\n\nSo the ratio decreases monotonically from 1 to $$\\dfrac{2}{\\pi}$$ as $$\\theta$$ grows from 0 to $$\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A pendulum swings through small angle $$\\theta$$. Horizontal displacement is $$L\\sin\\theta$$. Why can we replace this with $$L\\theta$$, and what does this enable? (3 steps)", "answer": "- Step 1: For typical pendulum swings of a few degrees, $$\\sin\\theta \\approx \\theta$$ to better than 1% accuracy.\n- Step 2: So $$L\\sin\\theta \\approx L\\theta$$ — horizontal displacement becomes LINEAR in the angle.\n- Step 3: This linearity allows simple harmonic motion (SHM) analysis: the restoring force becomes proportional to displacement, leading to a clean sinusoidal solution. Without small-angle, the pendulum equation is nonlinear and has no closed-form solution.\n\nThis is one of the most important physics applications — the approximation turns a hard problem into a solvable one.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "What is the fundamental conversion relationship between radians and degrees that all other conversions are built from? (State it, then explain how to derive the conversion factors in both directions.)", "answer": "The foundational relationship is:\n$$\\pi \\text{ radians} = 180°$$\n\nThis comes from the fact that a full revolution is $$360°$$ and also $$2\\pi$$ radians (since circumference $$= 2\\pi r$$), so dividing both by 2 gives $$\\pi$$ rad $$= 180°$$.\n\nFrom this, the two conversion factors are:\n+ **Radians → Degrees:** Multiply by $$\\frac{180°}{\\pi}$$. So 1 radian $$= \\frac{180°}{\\pi} \\approx 57.3°$$.\n+ **Degrees → Radians:** Multiply by $$\\frac{\\pi}{180°}$$. So $$1° = \\frac{\\pi}{180°}$$ radians.\n\nThe key insight: you're always multiplying by a fraction that equals 1 (like $$\\frac{\\pi}{\\pi}$$ rearranged), so you're not changing the angle — just its units.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Explain the unified reason why radians are the \"natural\" unit for angles, connecting the definition of a radian to the simplicity of $$l = r\\theta$$, $$A = \\frac{1}{2}r^2\\theta$$, and the small-angle approximations. (3 steps)", "answer": "- Step 1: The radian is defined so that the angle equals the ratio of arc length to radius: $$\\theta = \\frac{l}{r}$$. This immediately gives $$l = r\\theta$$ with no extra constant.\n- Step 2: Since sector area is $$\\frac{1}{2}rl$$ (like a triangle), substituting $$l = r\\theta$$ gives $$A = \\frac{1}{2}r^2\\theta$$ — again, no extra constant. In degrees, both formulas carry the awkward factor $$\\frac{\\pi}{180}$$.\n- Step 3: The small-angle approximations $$\\sin\\theta \\approx \\theta$$, $$\\tan\\theta \\approx \\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ are *only* true in radians because they rely on the limit $$\\frac{\\sin\\theta}{\\theta} \\to 1$$, which holds precisely when $$\\theta$$ is the arc-length-to-radius ratio.\n\nRadians are to angles what natural logarithms are to exponents: they remove artificial constants and let the mathematics speak in its cleanest form.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "Why do tangent lines to a circle drawn from an external point form right angles with the radii at the points of tangency, and how is this useful in radian problems? (3 steps)", "answer": "- Step 1: Geometric fact: the radius is always perpendicular to the tangent at the point of contact.\n- Step 2: This means in problems involving tangent lines (e.g., circles inscribed in sectors), you can use right-angled trigonometry instead of cosine/sine rules.\n- Step 3: Specifically, in a triangle formed by the centre, an external point, and the tangent point, you have a right angle, allowing $$\\sin, \\cos, \\tan$$ directly.\n\nA common A-Level problem (e.g., the brooch or earring problems) hinges on recognising this perpendicularity to break symmetry into right triangles.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why can't you use the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ directly when the *chord length* is given but $$\\theta$$ is unknown? What must you do first? (2 steps)", "answer": "- Step 1: The formula requires $$\\theta$$ as an input. If only the chord length $$c$$ and radius $$r$$ are given, $$\\theta$$ is not directly known and must be found first.\n- Step 2: Use the relationship between chord, radius, and angle. In the isosceles triangle formed by the two radii and the chord, apply either:\n+ The cosine rule: $$c^2 = r^2 + r^2 - 2r^2\\cos\\theta$$, solving for $$\\theta$$.\n+ Or split the triangle: $$\\sin\\frac{\\theta}{2} = \\frac{c/2}{r}$$, so $$\\theta = 2\\arcsin\\left(\\frac{c}{2r}\\right)$$.\n\nOnly after finding $$\\theta$$ can you substitute into the segment formula.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "Show that the sector area formula is consistent with the full circle when $$\\theta = 2\\pi$$. (2 steps)", "answer": "- Step 1: Substitute $$\\theta = 2\\pi$$ into $$A = \\tfrac{1}{2}r^2\\theta$$: $$A = \\tfrac{1}{2}r^2 \\times 2\\pi = \\pi r^2$$.\n- Step 2: This is exactly the formula for the area of the full circle. The sector formula reduces to the circle formula in the limiting case — a sanity check confirming the formula's correctness.\n\nAlways test a general formula against well-known limits.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Estimate the relative error of $$\\sin\\theta \\approx \\theta$$ for $$\\theta = 0.1, 0.5, 1$$ rad qualitatively. (3 steps)", "answer": "- Step 1: The absolute error is approximately $$\\dfrac{\\theta^3}{6}$$. The RELATIVE error is $$\\dfrac{\\theta^3/6}{\\theta} = \\dfrac{\\theta^2}{6}$$.\n- Step 2:\n+ $$\\theta = 0.1$$: relative error $$\\approx 0.01/6 \\approx 0.17\\%$$ — negligible.\n+ $$\\theta = 0.5$$: relative error $$\\approx 0.25/6 \\approx 4\\%$$ — noticeable.\n+ $$\\theta = 1$$: relative error $$\\approx 1/6 \\approx 17\\%$$ — significant; approximation breaks down.\n- Step 3: Rule of thumb: $$\\sin\\theta \\approx \\theta$$ is excellent for $$|\\theta| < 0.2$$ rad, acceptable for $$|\\theta| < 0.5$$ rad, poor for $$|\\theta| > 1$$ rad.\n\nThis $$\\theta^2$$ scaling of relative error is a key feature of leading-order Taylor approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "As $$\\theta$$ approaches $$2\\pi$$ (a full circle), what happens to the segment area $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$? Does it approach the area of the full circle? Explain. (3 steps)", "answer": "- Step 1: At $$\\theta = 2\\pi$$: segment area $$= \\frac{1}{2}r^2(2\\pi - \\sin 2\\pi) = \\frac{1}{2}r^2(2\\pi - 0) = \\pi r^2$$.\n- Step 2: This equals the full circle area $$\\pi r^2$$. Geometrically, when $$\\theta = 2\\pi$$, the \"segment\" is the entire circle minus a triangle of zero area (the chord has come full circle and the triangle collapses), so the segment is the whole circle.\n- Step 3: However, the formula is normally used for $$0 < \\theta < \\pi$$ (minor segment). For $$\\theta > \\pi$$, you'd typically compute the major segment differently. The formula still works mathematically, but the \"segment\" it computes may not be the one you visually expect.\n\n**Warning:** For angles greater than $$\\pi$$, always check which region (minor or major segment) the formula is actually describing.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "A common visualization: how does a sector \"unroll\" into a near-triangular shape, and what does this teach about $$A = \\frac{1}{2}rl$$? (3 steps)", "answer": "- Step 1: Imagine slicing the sector into many infinitesimally thin pie-slices, each almost a triangle with base $$dl$$ along the arc and height $$r$$.\n- Step 2: Each tiny triangle has area $$\\frac{1}{2} \\cdot r \\cdot dl$$. The whole sector is the sum: $$A = \\sum \\frac{1}{2}r \\, dl = \\frac{1}{2}r \\cdot l$$.\n- Step 3: This is essentially how integration in polar coordinates works. The formula $$A = \\frac{1}{2}rl$$ embodies the fact that a sector behaves locally like a triangle.\n\nThe same logic underlies the integral $$\\frac{1}{2}\\int r^2 \\, d\\theta$$ in calculus.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "A student approximates $$\\cos(0.5)$$ as $$1 - \\frac{0.5^2}{2} = 1 - 0.125 = 0.875$$. The true value is approximately 0.8776. Is the approximation reasonable? At what point does the cosine approximation start to break down significantly? (2 steps)", "answer": "- Step 1: The approximation gives 0.875 vs the true value 0.8776. The error is about 0.003, or roughly 0.3% — quite good for a quick approximation. So yes, for $$\\theta = 0.5$$ rad (about 29°), the approximation is still reasonable.\n- Step 2: The approximation starts to break down significantly around $$\\theta \\approx 0.4\\text{–}0.5$$ radians (roughly 23°–29°). Beyond this, the next term $$\\frac{\\theta^4}{24}$$ becomes non-negligible. As a rough guide:\n+ At $$\\theta = 0.1$$: error is tiny ($$\\approx 0.000004$$)\n+ At $$\\theta = 0.3$$: error is small ($$\\approx 0.0003$$)\n+ At $$\\theta = 0.5$$: error is moderate ($$\\approx 0.003$$)\n+ At $$\\theta = 1.0$$: error is significant ($$\\approx 0.13$$)\n\nTakeaway: Small-angle approximations are \"small\" for a reason — they degrade quickly as $$\\theta$$ grows.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "Why are the formulas $$l = r\\theta$$ (arc) and $$2r\\sin(\\theta/2)$$ (chord) so different in form, and what does this encode? (3 steps)", "answer": "- Step 1: The arc length depends LINEARLY on $$\\theta$$ — the arc grows in proportion to angle without bound.\n- Step 2: The chord length SATURATES: as $$\\theta \\to \\pi$$, $$2r\\sin(\\pi/2) = 2r$$ — the diameter, the maximum chord. The chord can't exceed $$2r$$ no matter how large $$\\theta$$ gets.\n- Step 3: For small $$\\theta$$, $$\\sin(\\theta/2) \\approx \\theta/2$$, so chord $$\\approx r\\theta$$ — chord and arc are nearly equal, consistent with intuition that small arcs are \"almost straight.\"\n\nSo the difference encodes curvature: agreement at small $$\\theta$$, divergence as $$\\theta$$ grows.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why is exact-form (e.g., $$\\frac{\\pi}{6}$$) preferred over decimal-form (e.g., 0.5236) when expressing radian angles? (3 steps)", "answer": "- Step 1: Exact forms preserve all information — no rounding errors propagate through subsequent calculations.\n- Step 2: Many quantities depend on $$\\pi$$; keeping $$\\pi$$ symbolic allows clean cancellations (e.g., $$\\frac{\\pi}{6} \\times \\frac{180}{\\pi} = 30°$$ cleanly).\n- Step 3: Examination conventions and elegance: an exact answer like $$\\frac{5\\pi}{6}$$ is considered superior to its decimal approximation 2.618.\n\nAlways work with exact values until the final step (if a decimal is required).", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "Using small-angle approximations, approximate $$\\sec\\theta - \\cos\\theta$$ for small $$\\theta$$. (Recall $$\\sec\\theta = \\frac{1}{\\cos\\theta}$$.) (3 steps)", "answer": "- Step 1: Write $$\\sec\\theta = \\frac{1}{\\cos\\theta}$$. Using $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, we get: $$\\sec\\theta \\approx \\frac{1}{1 - \\frac{\\theta^2}{2}}$$.\n- Step 2: For small $$\\theta$$, $$\\frac{\\theta^2}{2}$$ is tiny, so use the binomial approximation $$\\frac{1}{1-x} \\approx 1+x$$: $$\\sec\\theta \\approx 1 + \\frac{\\theta^2}{2}$$.\n- Step 3: Therefore: $$\\sec\\theta - \\cos\\theta \\approx \\left(1 + \\frac{\\theta^2}{2}\\right) - \\left(1 - \\frac{\\theta^2}{2}\\right) = \\theta^2$$.\n\nThis is a beautiful result: for small angles, the difference between secant and cosine is approximately $$\\theta^2$$. It illustrates how two functions that are both approximately 1 near the origin can still have a non-trivial difference captured by the next-order term.", "source": "GLM 5.1 ③", "_id": "glm_3_69"}, {"question": "How does the arc length compare to the chord length for the same central angle, and why? (3 steps)", "answer": "- Step 1: The chord is a straight line connecting two points; the arc is the curved path along the circle between them.\n- Step 2: A straight line is the shortest distance between two points, so chord ≤ arc, with equality only when the two points coincide (i.e., $$\\theta = 0$$).\n- Step 3: As $$\\theta$$ approaches 0, both shrink to zero, but their ratio approaches 1. Specifically: chord = $$2r\\sin(\\theta/2) \\approx r\\theta$$ for small $$\\theta$$, just like the arc $$r\\theta$$.\n\nFor small angles, arc and chord become indistinguishable — this is the geometric basis for $$\\sin\\theta \\approx \\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Given an arc of length $$l$$ in a circle of radius $$r$$, conceptually how do you find the central angle? Why is the answer dimensionless? (3 steps)", "answer": "- Step 1: Rearrange $$l = r\\theta$$ to get $$\\theta = \\frac{l}{r}$$.\n- Step 2: Both $$l$$ and $$r$$ are lengths (e.g., both in cm), so their ratio has no units — it's a pure number.\n- Step 3: This dimensionlessness is the reason radians are sometimes said to be \"unitless.\" A radian is fundamentally a ratio of two lengths, not a unit in the traditional sense.\n\nThis explains why some physics formulas treat $$\\theta$$ as just a number when it's in radians.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "When given a chord and asked to find the central angle, what's the typical approach using right-angled triangles? (3 steps)", "answer": "- Step 1: Drop a perpendicular from the centre $$O$$ to the chord; this bisects both the chord (call it half-chord $$c/2$$) and the central angle (creating two equal halves $$\\theta/2$$).\n- Step 2: This forms two congruent right-angled triangles, each with hypotenuse $$r$$ (radius), opposite side $$c/2$$, and angle $$\\theta/2$$ at the centre.\n- Step 3: Use $$\\sin(\\theta/2) = \\frac{c/2}{r}$$, so $$\\theta = 2\\arcsin\\left(\\frac{c}{2r}\\right)$$. Often simpler than using the cosine rule directly.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "What is the small-angle approximation for $$\\tan\\theta$$ when $$\\theta$$ is small and measured in radians? Why does it match the sine approximation? (3 steps)", "answer": "- Step 1: The approximation is $$\\tan\\theta \\approx \\theta$$ for small $$\\theta$$ in radians.\n- Step 2: Since $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, and for small $$\\theta$$: $$\\sin\\theta \\approx \\theta$$ and $$\\cos\\theta \\approx 1$$, we get $$\\tan\\theta \\approx \\frac{\\theta}{1} = \\theta$$.\n- Step 3: The next-order correction would be $$\\tan\\theta \\approx \\theta + \\frac{\\theta^3}{3}$$, but to leading order, $$\\tan\\theta \\approx \\theta$$ just like $$\\sin\\theta$$.\n\nBoth $$\\sin\\theta$$ and $$\\tan\\theta$$ pass through the origin with slope 1 (in radians), so their leading-order approximations coincide.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "In the small-angle approximation, we have $$\\sin\\theta \\approx \\theta$$ and $$\\tan\\theta \\approx \\theta$$. Why does cosine need the $$-\\frac{\\theta^2}{2}$$ term while sine and tangent don't? (2 steps)", "answer": "- Step 1: The key is the value at $$\\theta = 0$$:\n  - $$\\sin(0) = 0$$, derivative at 0 = $$\\cos(0) = 1$$. So linear term = $$\\theta$$ works perfectly.\n  - $$\\tan(0) = 0$$, derivative at 0 = $$\\sec^2(0) = 1$$. So linear term = $$\\theta$$ works perfectly.\n  - $$\\cos(0) = 1$$ (not 0!), derivative at 0 = $$-\\sin(0) = 0$$. So the linear term is zero! We must use the quadratic term.\n\n- Step 2: This is why the cosine approximation is fundamentally different—it doesn't start from zero.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "A sector of a circle of radius $$r$$ has angle $$\\theta$$ rad. Write down its perimeter and explain each term. (3 steps)", "answer": "- Step 1: The perimeter consists of TWO straight sides (each a radius, length $$r$$) and ONE curved side (the arc, length $$r\\theta$$).\n- Step 2: Therefore $$P = 2r + r\\theta = r(2 + \\theta)$$.\n- Step 3: A common error is to forget the two radii and write $$P = r\\theta$$ alone — this gives only the arc, not the closed region's full boundary.\n\nWhen you see \"perimeter of sector,\" always ask: are both radii included? (For a full closed boundary, yes.)", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Without computing, why is $$\\sin\\left(\\dfrac{\\pi}{6}\\right)$$ exactly equal to $$\\sin 30°$$? (3 steps)", "answer": "- Step 1: $$30° = \\dfrac{\\pi}{6}$$ rad — they describe the same physical rotation.\n- Step 2: A trigonometric function returns the same value for the same physical angle, regardless of how that angle is labelled.\n- Step 3: So $$\\sin\\left(\\dfrac{\\pi}{6}\\right) = \\sin 30° = \\dfrac{1}{2}$$ exactly.\n\nThis is why your calculator must be in the correct mode: it computes $$\\sin$$ of the input number, but the meaning of that number depends on whether it's degrees or radians.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "A chord of length 5 m is drawn in a circle of radius 4 m. The segment between the chord and the arc is shaded. Explain the two-step process to find the segment area — what must you find first, and how? (3 steps)", "answer": "- Step 1: To use the segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$, you need $$\\theta$$. Since you're given the chord length and radius, use the **cosine rule** in triangle $$OAB$$: $$5^2 = 4^2 + 4^2 - 2(4)(4)\\cos\\theta$$, so $$25 = 32 - 32\\cos\\theta$$, giving $$\\cos\\theta = \\frac{7}{32}$$.\n- Step 2: Compute $$\\theta = \\arccos\\left(\\frac{7}{32}\\right) \\approx 1.3502$$ radians (using calculator in radians mode).\n- Step 3: Now substitute into the segment formula: $$A = \\frac{1}{2}(16)(1.3502 - \\sin 1.3502) \\approx 3.00$$ m².\n\nThe key insight: when chord length is given but the angle isn't, the cosine rule is your bridge to finding $$\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "Why is $$\\cos\\theta \\approx 1 - \\dfrac{\\theta^2}{2}$$ a \"second-order\" approximation while $$\\sin\\theta \\approx \\theta$$ is \"first-order\"? (3 steps)", "answer": "- Step 1: $$\\sin\\theta$$ is an ODD function — only odd powers of $$\\theta$$ in its Taylor series: $$\\sin\\theta = \\theta - \\dfrac{\\theta^3}{6} + \\dots$$. The first nonzero term is $$\\theta^1$$ (first-order).\n- Step 2: $$\\cos\\theta$$ is an EVEN function — only even powers: $$\\cos\\theta = 1 - \\dfrac{\\theta^2}{2} + \\dfrac{\\theta^4}{24} - \\dots$$. The first non-constant term is $$\\theta^2$$ (second-order).\n- Step 3: Hence sine starts deviating from 0 LINEARLY in $$\\theta$$, while cosine starts deviating from 1 QUADRATICALLY — the parabolic dip is much slower than a linear rise.\n\nThis parity (odd/even) is fundamental and explains the symmetric/antisymmetric behaviours of trig functions.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Use the small-angle approximations to estimate $$\\cos(0.1)$$ and assess the error. (3 steps)", "answer": "- Step 1: Apply $$\\cos\\theta \\approx 1 - \\dfrac{\\theta^2}{2}$$ with $$\\theta = 0.1$$: $$\\cos(0.1) \\approx 1 - \\dfrac{0.01}{2} = 0.995$$.\n- Step 2: The next term in the series is $$+\\dfrac{\\theta^4}{24}$$. For $$\\theta = 0.1$$: $$\\dfrac{0.0001}{24} \\approx 4 \\times 10^{-6}$$ — utterly negligible.\n- Step 3: So the approximation has error of order $$10^{-6}$$, accurate to several decimal places.\n\nThe takeaway: $$\\cos\\theta \\approx 1 - \\tfrac{\\theta^2}{2}$$ has tiny error of order $$\\theta^4$$, so it's wildly accurate for $$\\theta < 0.5$$ rad or so.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Using small-angle approximations, find an approximation for $$\\tan 2\\theta - \\sin 2\\theta$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: Apply approximations with the full argument $$2\\theta$$:\n$$\\tan 2\\theta \\approx 2\\theta$$\n$$\\sin 2\\theta \\approx 2\\theta$$\n- Step 2: Naively, this gives $$2\\theta - 2\\theta = 0$$, which is unhelpful. This means we've lost too much information — we need *more terms* in the expansion.\n- Step 3: Using higher-order approximations: $$\\sin 2\\theta \\approx 2\\theta - \\frac{(2\\theta)^3}{6} = 2\\theta - \\frac{8\\theta^3}{6} = 2\\theta - \\frac{4\\theta^3}{3}$$. And $$\\tan 2\\theta \\approx 2\\theta + \\frac{(2\\theta)^3}{3} = 2\\theta + \\frac{8\\theta^3}{3}$$. So: $$\\tan 2\\theta - \\sin 2\\theta \\approx \\left(2\\theta + \\frac{8\\theta^3}{3}\\right) - \\left(2\\theta - \\frac{4\\theta^3}{3}\\right) = \\frac{12\\theta^3}{3} = 4\\theta^3$$.\n\nThe lesson: when the leading terms cancel, you must include the next-order terms. This is a common exam trick — the \"obvious\" approximation gives zero, but the true answer is non-zero at a higher order.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "Approximately how large is 1 radian in degrees, and why isn't it a \"clean\" number? (3 steps)", "answer": "- Step 1: Since $$\\pi$$ rad $$= 180°$$, we have $$1$$ rad $$= \\dfrac{180°}{\\pi} \\approx 57.3°$$.\n- Step 2: It's not \"clean\" because radians are defined geometrically (arc = radius), while degrees were chosen historica
