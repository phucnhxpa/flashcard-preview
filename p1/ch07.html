imes \\sqrt{5} = \\sqrt{50} = \\sqrt{25 \\times 2} = 5\\sqrt{2}$$ cm.\n- Step 2: Here $$p = 5$$ and $$q = 2$$.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the relationship between the area of a sector and the arc length? Can you derive a formula connecting them directly (eliminating $$\\theta$$)? (2 steps)", "answer": "- Step 1: From $$l = r\\theta$$, we get $$\\theta = \\frac{l}{r}$$. Substituting into $$A = \\frac{1}{2}r^2\\theta$$:\n- Step 2: $$A = \\frac{1}{2}r^2 \\times \\frac{l}{r} = \\frac{1}{2}rl$$. So the area of a sector is $$\\frac{1}{2} \\times \\text{radius} \\times \\text{arc length}$$. This is analogous to the area of a triangle: $$A = \\frac{1}{2} \\times \\text{base} \\times \\text{height}$$.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A circle has radius r. A sector has perimeter P and area A. If A = 4P, find P in terms of r. (3 steps)", "answer": "- Step 1: Perimeter $$P = r\\theta + 2r$$. Area $$A = \\frac{1}{2}r^2\\theta$$.\n- Step 2: Given $$A = 4P$$: $$\\frac{1}{2}r^2\\theta = 4(r\\theta + 2r)$$. Divide by r (r > 0): $$\\frac{1}{2}r\\theta = 4\\theta + 8$$.\n- Step 3: Multiply by 2: $$r\\theta = 8\\theta + 16$$. Rearranging: $$(r - 8)\\theta = 16$$, so $$\\theta = \\frac{16}{r - 8}$$.\n- Then $$P = r\\theta + 2r = r \\times \\frac{16}{r - 8} + 2r = \\frac{16r}{r - 8} + 2r = \\frac{16r + 2r(r - 8)}{r - 8} = \\frac{16r + 2r^2 - 16r}{r - 8} = \\frac{2r^2}{r - 8}$$.\n\nActually, wait—this gives P in terms of r, but the question asks for P. Let me think of another approach: maybe there's a numerical answer expected. Let me solve for r first or check if there's a cleaner solution. Actually from the study material, question 13 asks to find P (numerical). Let me solve properly:\n\nFrom A = 4P, we have $$\\frac{1}{2}r^2\\theta = 4r\\theta + 8r$$. Dividing by r: $$\\frac{1}{2}r\\theta = 4\\theta + 8$$. Multiply by 2: $$r\\theta = 8\\theta + 16$$. Then $$\\theta = \\frac{16}{r - 8}$$.\n\nNow P = $$r\\theta + 2r = \\frac{16r}{r - 8} + 2r = \\frac{16r + 2r(r - 8)}{r - 8} = \\frac{2r^2}{r - 8}$$.\n\nThis still has r in it. The problem likely has a numerical answer—let me solve for specific r if there is one given elsewhere, or express it. Actually from the problem: \"find the value of P\"—there must be more context. Let me check: in exercise 7C question 13, r = 28 cm is given! So with r = 28:\n\nP = $$\\frac{2(28)^2}{28 - 8} = \\frac{2 \\times 784}{20} = \\frac{1568}{20} = 78.4$$ cm.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A triangle has sides 12 m, 14 m, and 10 m. A lawn is a sector of a circle centered at A with radius 6 m, where angle BAC = 1.37 radians (to 3 s.f.). Find the area of the flowerbed (the part of the triangle NOT covered by the lawn). (3 steps)", "answer": "- Step 1: First find the area of the triangle using Heron's formula: semi-perimeter s = (12 + 14 + 10)/2 = 18. Area = $$\\sqrt{18 \\times 6 \\times 4 \\times 8} = \\sqrt{3456} \\approx 58.79 \\text{ m}^2$$.\n- Step 2: Area of lawn (sector) = $$\\frac{1}{2} \\times 6^2 \\times 1.37 = 18 \\times 1.37 = 24.66 \\text{ m}^2$$.\n- Step 3: Flowerbed area = triangle area - lawn area = $$58.79 - 24.66 \\approx 34.1 \\text{ m}^2$$ (to 3 s.f.).", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A drawer handle has two designs: Shape X is a rectangle with a semicircle, Shape Y is a sector. If both have the same area, prove that $$\\theta = 1 + \\frac{\\pi}{4}$$ radians, where $$\\theta$$ is the angle of the sector. (3 steps)", "answer": "- Step 1: Shape X: rectangle with sides AB = d and BC = 2d, plus a semicircle of radius d. Area = $$2d^2 + \\frac{1}{2}\\pi d^2 = 2d^2 + \\frac{\\pi d^2}{2}$$.\n- Step 2: Shape Y: sector of radius 2d and angle $$\\theta$$. Area = $$\\frac{1}{2}(2d)^2\\theta = \\frac{1}{2} \\times 4d^2 \\times \\theta = 2d^2\\theta$$.\n- Step 3: Setting equal: $$2d^2 + \\frac{\\pi d^2}{2} = 2d^2\\theta$$. Dividing by $$d^2$$: $$2 + \\frac{\\pi}{2} = 2\\theta$$. So $$\\theta = 1 + \\frac{\\pi}{4}$$. Verified!", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In the small-angle approximation, we have $$\\sin\\theta \\approx \\theta$$ and $$\\tan\\theta \\approx \\theta$$. Why does cosine need the $$-\\frac{\\theta^2}{2}$$ term while sine and tangent don't? (2 steps)", "answer": "- Step 1: The key is the value at $$\\theta = 0$$:\n  - $$\\sin(0) = 0$$, derivative at 0 = $$\\cos(0) = 1$$. So linear term = $$\\theta$$ works perfectly.\n  - $$\\tan(0) = 0$$, derivative at 0 = $$\\sec^2(0) = 1$$. So linear term = $$\\theta$$ works perfectly.\n  - $$\\cos(0) = 1$$ (not 0!), derivative at 0 = $$-\\sin(0) = 0$$. So the linear term is zero! We must use the quadratic term.\n\n- Step 2: This is why the cosine approximation is fundamentally different—it doesn't start from zero.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "A point on the circumference of a circle of radius 8.5 cm subtends an angle of 0.4 radians at another point C on the major arc AB. Find the length of the minor arc AB. (2 steps)", "answer": "- Step 1: This uses the theorem: angle at point on circumference (inscribed angle) equals half the central angle. So central angle for arc AB = 2 × 0.4 = 0.8 radians.\n- Step 2: Arc length AB = $$r\\theta = 8.5 \\times 0.8 = 6.8$$ cm.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Why is it incorrect to use the formula $$A = \\frac{1}{2}r^2\\theta$$ with $$\\theta$$ in degrees? What would happen numerically? (2 steps)", "answer": "- Step 1: The formula is derived assuming $$\\theta$$ is in radians. If you plug in degrees, you'd be using the wrong unit, and the answer would be wrong by a factor of $$\\frac{180}{\\pi} \\approx 57.3$$.\n- Step 2: For example: a 90° sector with r = 1 should have area $$\\frac{1}{4}\\pi \\approx 0.785$$ (quarter of circle). If you use $$\\theta = 90$$ in the formula: $$A = \\frac{1}{2} \\times 1^2 \\times 90 = 45$$—wildly wrong!\n\n**Misconception alert:** Always convert degrees to radians before using sector formulas.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A circle has radius 6 cm. The area of the major sector is 80 cm². Find the angle of the minor sector (in radians, to 3 decimal places). (3 steps)", "answer": "- Step 1: Full circle area = $$\\pi \\times 6^2 = 36\\pi \\approx 113.097$$ cm².\n- Step 2: Major sector area = 80 cm², so minor sector area = $$36\\pi - 80 \\approx 33.097$$ cm².\n- Step 3: Using $$A = \\frac{1}{2}r^2\\theta$$: $$33.097 = \\frac{1}{2} \\times 36 \\times \\theta = 18\\theta$$. So $$\\theta = \\frac{33.097}{18} \\approx 1.839$$ radians. But wait—the question asks for the minor arc angle, so we need to find $$\\theta$$ where the minor sector has this area. Actually, let's solve: minor sector = 80 = $$\\frac{1}{2} \\times 36 \\times \\theta$$ gives $$\\theta = \\frac{160}{36} \\approx 4.444$$ rad for the major. So minor = $$2\\pi - 4.444 = 1.839$$ rad. Actually, the question states \"area of shaded major sector is 80 cm²\" - so the minor angle is what we need. The major sector has area 80, so $$\\theta_{major} = \\frac{80}{18} \\approx 4.444$$ rad. Thus $$\\theta_{minor} = 2\\pi - 4.444 \\approx 1.839$$ rad. Let me recalculate: 80 = 18$$\\theta$$_major, so $$\\theta$$_major = 80/18 = 4.444..., then minor = 2π - 4.444 = 1.839 rad.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In a circle with radius 5 cm, the minor arc AB is 6.4 cm. Find the ratio of the area of the minor sector to the major sector. (3 steps)", "answer": "- Step 1: First find the minor angle: $$\\theta = \\frac{l}{r} = \\frac{6.4}{5} = 1.28$$ radians.\n- Step 2: Minor sector area = $$\\frac{1}{2} \\times 25 \\times 1.28 = 16$$ cm².\n- Step 3: Full circle = $$\\pi \\times 25 = 25\\pi \\approx 78.54$$ cm². Major sector = $$25\\pi - 16 \\approx 62.54$$ cm². Ratio = $$16 : 62.54 = 1 : 3.909 \\approx 1 : 3.91$$ (to 3 s.f.).\n\nActually, ratio in form 1:p: p = 62.54/16 = 3.909 ≈ 3.91.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Two intersecting circles both have radius 12 cm. Each center lies on the circumference of the other. Find the perimeter of the overlapping region. (2 steps)", "answer": "- Step 1: From earlier, we found $$\\angle AO_1B = \\frac{2\\pi}{3}$$ for each circle's central angle to the intersection points.\n- Step 2: The perimeter consists of two arcs, each with angle $$\\frac{2\\pi}{3}$$ and radius 12. So total = $$2 \\times 12 \\times \\frac{2\\pi}{3} = 24 \\times \\frac{2\\pi}{3} = 16\\pi$$ cm.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Explain conceptually why the area formula for a segment involves $$\\sin\\theta$$ rather than just $$\\theta$$ minus something simple. What does $$\\sin\\theta$$ represent geometrically in this context? (2 steps)", "answer": "- Step 1: The $$\\sin\\theta$$ comes from the area of the triangle formed by the two radii and the chord. Using the formula $$\\frac{1}{2}ab\\sin C$$ with $$a = b = r$$, we get $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Geometrically, $$\\sin\\theta$$ is the ratio of the chord's perpendicular height to the radius. It captures how \"tall\" the triangular portion is. As $$\\theta$$ increases from 0 to $$\\pi$$, $$\\sin\\theta$$ increases from 0 to 1 then back to 0, perfectly describing how the triangular area changes relative to the sector. That's why we subtract $$\\sin\\theta$$—to remove exactly the triangular portion from the sector.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "When solving trigonometric equations in radians, what advantages do radians offer over degrees? (2 steps)", "answer": "- Step 1: The solutions will be in terms of $$\\pi$$ (like $$\\frac{\\pi}{3}$$, $$\\frac{2\\pi}{3}$$, etc.) rather than messy decimal approximations. This gives exact answers.\n- Step 2: The small-angle approximations (sin θ ≈ θ) only work in radians, making radian solutions essential when dealing with small angles in equations or physics problems.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "A circular pond has radius r. A straight path of length p goes from point A to point B on the circumference. The center C is distance d from the path. The arc from A to B has angle $$\\theta$$ radians. Show that $$\\theta = 2\\arcsin\\left(\\frac{p}{2r}\\right)$$. (2 steps)", "answer": "- Step 1: In triangle CAB (isosceles with CA = CB = r, base AB = p), we can find the vertex angle using the chord formula: $$\\sin(\\theta/2) = \\frac{p/2}{r} = \\frac{p}{2r}$$.\n- Step 2: Therefore $$\\theta/2 = \\arcsin\\left(\\frac{p}{2r}\\right)$$, so $$\\theta = 2\\arcsin\\left(\\frac{p}{2r}\\right)$$. This connects the chord length directly to the central angle.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "In the small-angle limit (θ → 0), which approximation becomes most accurate fastest: sin θ ≈ θ, cos θ ≈ 1 - θ²/2, or tan θ ≈ θ? How can you determine this? (2 steps)", "answer": "- Step 1: Compare the first neglected term in each Taylor series:\n  - sin: next term is $$-\\frac{\\theta^3}{6}$$\n  - cos: next term is $$+\\frac{\\theta^4}{24}$$\n  - tan: next term is $$\\frac{2\\theta^3}{15}$$\n- Step 2: The error in sin θ ≈ θ is proportional to $$\\theta^3$$; in tan θ ≈ θ it's also $$\\theta^3$$ (but with coefficient 2/15 vs 1/6); in cos it's $$\\theta^4$$. So cos becomes accurate fastest for very tiny angles. But for θ < 0.5 rad, sin and tan are both quite accurate.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": true}, {"question": "A sector has radius r and angle θ. A chord divides the sector into a triangle and a smaller sector. If the chord is at distance h from the center, derive a relationship between r, θ, and h. (2 steps)", "answer": "- Step 1: In the right triangle formed by the radius, the chord, and the perpendicular from center to chord: the perpendicular distance from center to chord is h, so half the chord length is $$\\sqrt{r^2 - h^2}$$.\n- Step 2: The angle subtended by the chord is $$\\theta = 2\\arcsin\\left(\\frac{\\sqrt{r^2 - h^2}}{r}\\right) = 2\\arccos\\left(\\frac{h}{r}\\right)$$. This gives the relationship between r, θ, and h.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "A student converts 1 radian to degrees by doing \"1 × 180 = 180°\". Explain why this is wrong and what the correct answer is. (1 step)", "answer": "- Step 1: The student forgot to divide by π! The correct conversion is $$1 \\text{ rad} = \\frac{180°}{\\pi} \\approx 57.3°$$. You must divide by π because π radians = 180°, not π radians = 180 × π degrees!\n\n**Misconception alert:** 1 radian is NOT 180°—π radians equals 180°.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "For what range of angles (in radians) are the small-angle approximations typically considered \"accurate enough\" for most practical engineering calculations? (1 step)", "answer": "- Step 1: Typically for $$\\theta < 0.5$$ radians (about 28.65°), the approximations $$\\sin\\theta \\approx \\theta$$ and $$\\tan\\theta \\approx \\theta$$ are accurate to within about 4% or better. For $$\\theta < 0.1$$ rad (about 5.7°), they're accurate to within 0.5%. The exact threshold depends on the required precision.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "A circle has radius 3 cm. A sector has perimeter equal to that of a square with area 36 cm². Find the radius of the sector given its angle is 1.2 radians. (3 steps)", "answer": "- Step 1: Square area = 36 cm², so side = 6 cm, perimeter = 24 cm.\n- Step 2: Sector perimeter = arc + 2r = rθ + 2r = r(θ + 2) = r(1.2 + 2) = r(3.2).\n- Step 3: Setting equal: r(3.2) = 24, so r = 24/3.2 = 7.5 cm.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Explain why the area of a segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ gives a negative value when $$\\theta < \\sin\\theta$$. Does this make sense? (2 steps)", "answer": "- Step 1: For $$\\theta < \\sin\\theta$$ to occur, we'd need $$\\theta > \\pi$$ (since $$\\sin\\theta \\leq 1$$ but $$\\theta$$ can exceed $$\\pi$$). This would be a major segment (reflex angle).\n- Step 2: For major segments, you should use the complement: the formula actually works if you use $$\\sin\\theta$$ as a signed value (negative for angles in the third/fourth quadrants). More simply, use the formula for the minor angle $$\\theta_{minor} = 2\\pi - \\theta$$ and subtract from the full circle. For the major segment with central angle $$\\theta_{major}$$, use $$\\theta_{major} - \\sin\\theta_{major}$$, where $$\\sin\\theta_{major} = -\\sin(2\\pi - \\theta_{major})$$.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "In a circle, the radius is 10 cm and arc length is 6.4 cm. What is the acute central angle in radians? What fraction of the full circle is this? (2 steps)", "answer": "- Step 1: Acute angle = arc/radius = 6.4/10 = 0.64 radians.\n- Step 2: Fraction of circle = 0.64/(2π) = 0.64/6.283 ≈ 0.102, or about 10.2% of the full circle.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "Prove that the area of a sector can be expressed as $$A = \\frac{1}{2}pr$$, where p is the arc length of the sector. (2 steps)", "answer": "- Step 1: We know arc length $$p = r\\theta$$ and area $$A = \\frac{1}{2}r^2\\theta$$.\n- Step 2: Substitute $$\\theta = \\frac{p}{r}$$ into the area formula: $$A = \\frac{1}{2}r^2 \\times \\frac{p}{r} = \\frac{1}{2}rp$$. This is analogous to the area formula for a triangle: $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "In the diagram where a smaller circle touches the two radii and arc of a larger sector, derive the relationship $$R\\sin\\theta = r(1 + \\sin\\theta)$$. (3 steps)", "answer": "- Step 1: In the right triangle formed by O (center of large circle), C (center of small circle), and T (point of tangency), we have OC = R - r (distance between centers).\n- Step 2: Drop a perpendicular from C to OA, creating a right triangle with angle $$\\theta$$ at O. The opposite side = r(1 + sin θ) and hypotenuse = R - r.\n- Step 3: Actually, consider triangle OCE where E is the tangency point on OB. OE = R (radius), CE = r, and angle at O is $$\\theta$$. In right triangle with angle $$\\theta$$: the distance from O to the point where the small circle touches OA involves sin θ. More precisely: $$R\\sin\\theta = r(1 + \\sin\\theta)$$. This relates the radii and the angle.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Write down the relationship between radians and degrees for: (a) a full circle, (b) a straight angle. What is the conversion factor from radians to degrees? (3 steps)", "answer": "- Step 1: A full circle contains 2π radians, which equals 360°.\n- Step 2: A straight angle contains π radians, which equals 180°.\n- Step 3: To convert radians to degrees, multiply by 180°/π. Conversely, to convert degrees to radians, multiply by π/180°.\n\nThis relationship arises because the circumference of a circle is 2πr, so the full angle at the centre is 2π radians.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Without using a calculator, state the radian equivalent of: (a) 30°, (b) 45°, (c) 60°, (d) 90°, (e) 180°, (f) 360°", "answer": "- Step 1: Using the conversion 180° = π radians, divide π by the integer parts:\n- Step 2: 30° = 180°/6 = π/6 rad; 45° = 180°/4 = π/4 rad; 60° = 180°/3 = π/3 rad\n- Step 3: 90° = 180°/2 = π/2 rad; 180° = π rad; 360° = 2π rad\n\nThese \"special angles\" should be memorized as they appear frequently in problems.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Convert to degrees: (a) 7π/8 rad, (b) 4π/15 rad (3 steps)", "answer": "- Step 1: Use the conversion 1 rad = 180°/π, so multiply by 180°/π.\n- Step 2: (a) (7π/8) × (180°/π) = (7/8) × 180° = 157.5°\n- Step 3: (b) (4π/15) × (180°/π) = 4 × 180°/15 = 720°/15 = 48°\n\nThe π cancels, leaving a simple fraction to evaluate.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Convert to radians (leave in terms of π): (a) 150°, (b) 110° (3 steps)", "answer": "- Step 1: Use the conversion 1° = π/180° radians, so multiply by π/180°.\n- Step 2: (a) 150° × π/180° = (150/180)π = (5/6)π = 5π/6 rad\n- Step 3: (b) 110° × π/180° = (110/180)π = (11/18)π = 11π/18 rad\n\nSimplify the fraction by dividing numerator and denominator by their greatest common divisor.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Why is using radians preferable to degrees when calculating arc length and sector area? (2 steps)", "answer": "- Step 1: In radians, the arc length formula simplifies to l = rθ. This comes directly from the definition: when θ = 1 radian, arc length = r.\n- Step 2: The sector area formula also simplifies to A = ½r²θ. In degrees, these formulas would require a conversion factor of 180°/π, making them more complex. Radians provide a direct proportionality between angle and arc length/area.\n\nThis elegance is why radians are the natural unit for calculus and advanced mathematics.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A sector of a circle has radius 5.2 cm and the arc subtends 0.8 radians at the centre. Find the arc length. (2 steps)", "answer": "- Step 1: Use the formula l = rθ, where r = 5.2 cm and θ = 0.8 rad.\n- Step 2: l = 5.2 × 0.8 = 4.16 cm\n\nThis is a direct application of the arc length formula; the answer follows immediately from substitution.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "An arc AB of a circle with radius 7 cm has length 2.45 cm. Find the angle ∠AOB subtended by the arc at the centre, in radians. (2 steps)", "answer": "- Step 1: Using l = rθ, rearrange to find θ = l/r.\n- Step 2: θ = 2.45/7 = 0.35 radians (to 2 decimal places)\n\nThis demonstrates the inverse use of the arc length formula.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A sector OAB has radius r cm and subtends θ radians. Its perimeter is P cm. Show that r = P/(2 + θ). (3 steps)", "answer": "- Step 1: The perimeter P = arc AB + OA + OB = rθ + r + r = rθ + 2r.\n- Step 2: Factor: P = r(θ + 2).\n- Step 3: Rearrange: r = P/(θ + 2).\n\nThis shows how to solve for the radius when given the perimeter and angle.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A sector has radius r = √10 cm and angle θ = √5 radians. Find the arc length in the form p√q cm, where p and q are integers. (3 steps)", "answer": "- Step 1: Use l = rθ = √10 × √5 = √(10 × 5) = √50.\n- Step 2: Simplify √50 = √(25 × 2) = 5√2.\n- Step 3: So l = 5√2 cm, where p = 5 and q = 2.\n\nThis tests manipulation of surds with radicals.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In a circle, the minor arc AB subtends angle x at the centre, and the major arc AB subtends angle 5x. If the radius is 10 cm, find the length of the minor arc AB in terms of π. (3 steps)", "answer": "- Step 1: Minor + major = 2π, so x + 5x = 2π, giving 6x = 2π, so x = π/3 radians.\n- Step 2: Minor arc length = rθ = 10 × (π/3) = (10π/3) cm.\n- Step 3: Express as (10π/3) cm or (10/3)π cm.\n\nThis uses the fact that the minor and major arcs together make a full circle.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "The perimeter of a sector is twice the length of its arc. Find the angle AOB. (3 steps)", "answer": "- Step 1: Let radius = r and angle = θ. Perimeter = rθ + 2r. Arc length = rθ.\n- Step 2: Given rθ + 2r = 2(rθ), so rθ + 2r = 2rθ.\n- Step 3: 2r = rθ, so θ = 2 radians.\n\nThis is an algebraic problem solving for θ.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Find the area of a sector with radius 2.44 cm and angle 1.4 radians. (2 steps)", "answer": "- Step 1: Use A = ½r²θ = ½ × (2.44)² × 1.4.\n- Step 2: A = ½ × 5.9536 × 1.4 = 4.17 cm² (to 3 significant figures)\n\nDirect substitution into the sector area formula.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "The area of a minor sector AOB is 28.9 cm² and the angle AOB is 0.8 radians. Find the radius r. (3 steps)", "answer": "- Step 1: Using A = ½r²θ, substitute: 28.9 = ½ × r² × 0.8 = 0.4r².\n- Step 2: So r² = 28.9/0.4 = 72.25.\n- Step 3: r = √72.25 = 8.5 cm (taking the positive root since radius must be positive).\n\nThis demonstrates solving for r given area and angle.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A sector of a circle with radius 55 m has its perimeter (fencing) equal to 176 m. Find the area of the sector. (4 steps)", "answer": "- Step 1: Perimeter = arc + 2r = 176, so arc = 176 - 110 = 66 m.\n- Step 2: Using l = rθ: 66 = 55θ, so θ = 66/55 = 1.2 radians.\n- Step 3: Area = ½r²θ = ½ × 55² × 1.2.\n- Step 4: A = ½ × 3025 × 1.2 = 1815 m².\n\nThis is a multi-step problem requiring finding θ first from perimeter information.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Explain how the formula for the area of a segment, A = ½r²(θ - sin θ), is derived. (3 steps)", "answer": "- Step 1: A segment is the region bounded by a chord and an arc - it equals the sector area minus the triangular area.\n- Step 2: Sector area = ½r²θ. Triangle area = ½ab sin C = ½r² sin θ (since it's an isosceles triangle with two sides r and included angle θ).\n- Step 3: Therefore, segment area = ½r²θ - ½r² sin θ = ½r²(θ - sin θ).\n\nThe key insight is recognizing the triangle formed by the two radii and the chord.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Find the area of the shaded segment in a circle with radius 7 cm and central angle 1.2 radians. (2 steps)", "answer": "- Step 1: Use A = ½r²(θ - sin θ) = ½ × 7² × (1.2 - sin 1.2).\n- Step 2: A = ½ × 49 × (1.2 - 0.9320...) = 24.5 × 0.26796... = 6.57 cm² (to 3 s.f.)\n\nEnsure your calculator is in radian mode when computing sin 1.2.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In a circle of radius 4 m, chord AB is 5 m long. Find the area of the shaded segment. (4 steps)", "answer": "- Step 1: Find angle AOB using cosine rule: cos θ = (4² + 4² - 5²)/(2×4×4) = 7/32.\n- Step 2: θ = arccos(7/32) = 1.3502... radians.\n- Step 3: Segment area = ½r²(θ - sin θ) = ½ × 16 × (1.3502 - sin 1.3502).\n- Step 4: = 8 × 0.37448... = 3.00 m² (to 3 s.f.)\n\nThis combines the cosine rule with the segment area formula.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In the diagram, AB is the diameter of a circle of radius r, and ∠BOC = θ radians. Given that the area of triangle AOC is three times that of the shaded segment, show that 3θ - 4 sin θ = 0. (4 steps)", "answer": "- Step 1: Area of segment = ½r²(θ - sin θ). Area of triangle AOC = ½r² sin(π - θ) = ½r² sin θ (since sin(π - θ) = sin θ).\n- Step 2: Given: ½r² sin θ = 3 × ½r²(θ - sin θ).\n- Step 3: Simplify: sin θ = 3(θ - sin θ) = 3θ - 3 sin θ.\n- Step 4: Rearrange: sin θ + 3 sin θ = 3θ, so 4 sin θ = 3θ, giving 3θ - 4 sin θ = 0.\n\nThis tests algebraic manipulation and understanding of circle theorems (angle in a semicircle = 90°).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A sector OAB has radius 12 cm and angle 1.2 radians. Find: (a) its perimeter, (b) its area. (3 steps)", "answer": "- Step 1: Arc length = rθ = 12 × 1.2 = 14.4 cm.\n- Step 2: Perimeter = arc + 2r = 14.4 + 24 = 38.4 cm.\n- Step 3: Area = ½r²θ = ½ × 144 × 1.2 = 86.4 cm².\n\nBoth formulas are applied directly with correct substitution.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A sector has radius r cm and angle 0.5 radians. Given that the perimeter of the sector is 30 cm, find r. (3 steps)", "answer": "- Step 1: Perimeter = rθ + 2r = r(θ + 2) = r(0.5 + 2) = 2.5r.\n- Step 2: Given perimeter = 30, so 2.5r = 30.\n- Step 3: r = 30/2.5 = 12 cm.\n\nThis uses the perimeter formula and solves for r.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "For the sector in Q21, show that the area is 36 cm² and find the area of the segment enclosed by the chord and arc. (3 steps)", "answer": "- Step 1: Area of sector = ½r²θ = ½ × 12² × 0.5 = ½ × 144 × 0.5 = 36 cm². ✓\n- Step 2: Segment area = ½r²(θ - sin θ) = ½ × 144 × (0.5 - sin 0.5).\n- Step 3: = 72 × (0.5 - 0.4794...) = 72 × 0.0206... = 1.48 cm² (to 3 s.f.)\n\nThe verification is direct substitution; the segment requires the additional sin calculation.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "When solving trigonometric equations in radians, why is it important to check your calculator mode? (2 steps)", "answer": "- Step 1: Calculators have separate modes for degrees (DEG) and radians (RAD). The numerical values of trigonometric functions differ significantly between modes - for example, sin(1) in radians ≈ 0.84, but sin(1°) ≈ 0.017.\n- Step 2: If you're solving equations in radians (as required in this chapter), your calculator must be in RAD mode, otherwise answers will be completely wrong.\n\nThis is a common source of error that leads to incorrect solutions.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Solve sin x = 0.5 for x in radians, where 0 ≤ x < 2π. (3 steps)", "answer": "- Step 1: Ensure calculator is in radian mode. sin⁻¹(0.5) gives the principal value.\n- Step 2: Principal solution: x = π/6 ≈ 0.5236 rad.\n- Step 3: Since sin is positive in Quadrants I and II, the other solution in [0, 2π) is x = π - π/6 = 5π/6 ≈ 2.618 rad.\n\nIn radians, the solutions are π/6 and 5π/6.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Solve 2 cos θ = 1 for θ in radians, giving all solutions in the interval [0, 2π). (3 steps)", "answer": "- Step 1: cos θ = 1/2. Using inverse cosine: θ = cos⁻¹(1/2) = π/3 ≈ 1.0472 rad.\n- Step 2: Cosine is positive in Quadrants I and IV. The other solution is θ = 2π - π/3 = 5π/3 ≈ 5.2360 rad.\n- Step 3: Both solutions in [0, 2π) are θ = π/3 and θ = 5π/3.\n\nThe general solution would be θ = 2πn ± π/3 for integer n.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Solve tan θ = √3 for θ in radians, where -π/2 < θ < π/2. (2 steps)", "answer": "- Step 1: tan⁻¹(√3) = π/3 ≈ 1.0472 rad.\n- Step 2: Since the principal value range for arctan is (-π/2, π/2), the only solution in this interval is θ = π/3.\n\nFor tan, there's one solution per period of π radians in the principal range.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain the small-angle approximations: sin θ ≈ θ, cos θ ≈ 1 - θ²/2, and tan θ ≈ θ. When are these valid? (3 steps)", "answer": "- Step 1: These approximations come from the Taylor series expansions of the trig functions, valid when θ is small (typically θ < 0.5 radians, or about 29°).\n- Step 2: sin θ = θ - θ³/3! + ... ≈ θ for small θ; cos θ = 1 - θ²/2! + θ⁴/4! - ... ≈ 1 - θ²/2; tan θ = sin θ/cos θ ≈ θ/(1) ≈ θ.\n- Step 3: They're used in physics and engineering to simplify calculations where angles are small, such as pendulums, small oscillations, and approximations in calculus.\n\nThe approximations become more accurate as θ approaches zero.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Using small-angle approximations, estimate the value of sin(0.1) and cos(0.1). (2 steps)", "answer": "- Step 1: For sin: sin(0.1) ≈ 0.1 (the actual value is sin(0.1) ≈ 0.0998).\n- Step 2: For cos: cos(0.1) ≈ 1 - (0.1)²/2 = 1 - 0.005 = 0.995 (actual cos(0.1) ≈ 0.9950).\n\nThese approximations are very close to the actual values, demonstrating their usefulness for small angles.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why does the small-angle approximation for tan θ ≈ θ require both sin and cos approximations to be valid? (2 steps)", "answer": "- Step 1: tan θ = sin θ / cos θ.\n- Step 2: Using approximations: tan θ ≈ θ / (1 - θ²/2) ≈ θ(1 + θ²/2) ≈ θ for small θ (since θ² terms are very small). The approximation relies on both sin ≈ θ and cos ≈ 1 - θ²/2 being valid.\n\nThis shows how one approximation can be derived from others.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "A circular Ferris wheel has 24 equally spaced pods. If the arc length between each pod is (3π/2) m, find the diameter of the wheel. (3 steps)", "answer": "- Step 1: 24 pods create 24 equal arcs. The full circumference = 24 × (3π/2) = 12π m.\n- Step 2: Circumference = πd, so πd = 12π.\n- Step 3: Therefore, d = 12 m.\n\nThis connects the arc length between pods to the full circumference.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A Ferris wheel with diameter from Q30 takes approximately 30 seconds for one revolution. Estimate the speed of a pod in km/h. (3 steps)", "answer": "- Step 1: Distance per revolution = circumference = 12π m ≈ 37.7 m.\n- Step 2: Speed = distance/time = 37.7/30 ≈ 1.257 m/s.\n- Step 3: Convert to km/h: 1.257 × 3.6 ≈ 4.53 km/h.\n\nThis applies unit conversion to a practical context.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Points A and B lie on a circle with centre O and radius 8.5 cm. Point C lies on the major arc AB. Given that ∠ACB = 0.4 radians, find the length of the minor arc AB. (3 steps)", "answer": "- Step 1: The angle at the circumference (C) is half the angle at the centre (O) for the same arc, so ∠AOB = 2 × 0.4 = 0.8 radians (for the minor arc).\n- Step 2: Minor arc length = rθ = 8.5 × 0.8 = 6.8 cm.\n- Step 3: The angle at C subtends the minor arc AB (this is the inscribed angle theorem).\n\nThis applies the circle theorem: angle at circumference is half the angle at the centre.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "AB is a diameter of a circle with radius 2 cm. Point C is on the circumference such that ∠COB = 2π/3 radians. Find the perimeter of the region bounded by chord AC, arc CB, and AB. (4 steps)", "answer": "- Step 1: Since AB is a diameter, ∠AOB = π radians. Given ∠COB = 2π/3, then ∠COA = π - 2π/3 = π/3 radians.\n- Step 2: Chord AC = Using chord length formula or noting triangle ACO is isosceles with OA = OC = 2, we can find AC. Actually, we need to check: the region consists of chord AC + arc CB + AB.\n- Step 3: Arc CB = r × (2π/3) = 2 × 2π/3 = 4π/3 cm. AB = diameter = 4 cm. Chord AC: using triangle ACO with angle π/3, chord AC = 2r sin(θ/2) = 2 × 2 × sin(π/6) = 4 × 0.5 = 2 cm.\n- Step 4: Perimeter = chord AC + arc CB + AB = 2 + 4π/3 + 4 = (6 + 4π/3) cm.\n\nThis combines circle theorems with arc and chord calculations.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Triangle ABC has AB = 9 cm, BC = 10 cm, CA = 5 cm. A circle centred at A with radius 3 cm intersects AB at P and AC at Q. Find: (i) the area of sector APQ, (ii) the area of region BPQC, (iii) the perimeter of BPQC. Given that ∠BAC = 1.504 radians. (4 steps)", "answer": "- Step 1: (i) Area of sector APQ = ½r²θ = ½ × 3² × 1.504 = ½ × 9 × 1.504 = 6.77 cm² (to 3 s.f.)\n- Step 2: First find area of triangle ABC using Heron's formula: s = (9+10+5)/2 = 12, area = √(12×3×2×7) = √504 ≈ 22.45 cm².\n- Step 3: (ii) Area of BPQC = area of triangle ABC - area of sector APQ = 22.45 - 6.77 = 15.68 cm².\n- Step 4: (iii) Perimeter of BPQC = BC + CA - (AP + AQ) + arc PQ. AP = AQ = 3 (radii). So BC + CA - 6 = 10 + 5 - 6 = 9 cm. Arc PQ = 3 × 1.504 = 4.512 cm. Total = 9 + 4.512 = 13.512 cm ≈ 13.5 cm.\n\nThis is a complex problem combining multiple area and perimeter concepts.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A sector of a circle has area 15 cm² and angle 1.5 radians. Prove that r = 2√5 and find the perimeter. (3 steps)", "answer": "- Step 1: Using A = ½r²θ: 15 = ½ × r² × 1.5 = 0.75r².\n- Step 2: So r² = 15/0.75 = 20, therefore r = √20 = 2√5 cm. ✓\n- Step 3: Arc length = rθ = 2√5 × 1.5 = 3√5 cm. Perimeter = arc + 2r = 3√5 + 4√5 = 7√5 cm.\n\nThis proves a given result and calculates perimeter.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "For the sector in Q35, calculate the area of the segment (to 3 decimal places). (2 steps)", "answer": "- Step 1: Segment area = ½r²(θ - sin θ) = ½ × 20 × (1.5 - sin 1.5).\n- Step 2: = 10 × (1.5 - 0.9975...) = 10 × 0.5024... = 5.0249... ≈ 5.025 cm².\n\nThis applies the segment formula with the exact radius found in Q35.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In a circle of radius 6 cm, chord PQ subtends an angle θ at the centre, creating a minor segment of area A₁ and major segment of area A₂. Given A₂ = 3A₁, show that sin θ = θ - π/2. (4 steps)", "answer": "- Step 1: Total area = A₁ + A₂ = A₁ + 3A₁ = 4A₁. Also total area = πr² = 36π cm².\n- Step 2: So A₁ = 36π/4 = 9π cm². Using segment formula: A₁ = ½r²(θ - sin θ) = ½ × 36 × (θ - sin θ) = 18(θ - sin θ).\n- Step 3: Equate: 9π = 18(θ - sin θ), so π/2 = θ - sin θ.\n- Step 4: Rearrange: sin θ = θ - π/2. ✓\n\nThis involves algebra and understanding of major/minor segments.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A student calculates the area of a sector with r = 3 cm and angle 50° as: Area = ½ × 3² × 50 = 225 cm². Identify the mistake and calculate the correct answer. (3 steps)", "answer": "- Step 1: The student used 50° directly in the formula A = ½r²θ. This formula requires θ to be in radians, not degrees.\n- Step 2: Convert 50° to radians: 50 × π/180 = 5π/18 ≈ 0.8727 rad.\n- Step 3: Correct area = ½ × 9 × (5π/18) = (45π/18) = (5π/2) ≈ 7.85 cm².\n\nThis is a common error that leads to vastly incorrect answers.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Two circles of radius 12 cm have centres O₁ and O₂ such that O₁ lies on the circumference of C₂ and O₂ lies on the circumference of C₁. The circles intersect at A and B. Show that ∠AO₁B = 2π/3. (3 steps)", "answer": "- Step 1: When O₁ is on C₂ and O₂ is on C₁, and both circles have equal radius r = 12, the distance O₁O₂ = r = 12 cm.\n- Step 2: Consider triangle O₁O₂A: it's isosceles with sides OA = O₂A = r = 12, and O₁O₂ = r = 12. So it's equilateral, and each angle is π/3.\n- Step 3: At O₁, angle AO₁B = 2 × (π/3) = 2π/3 radians (because A and B are symmetric about the line O₁O₂).\n\nThis uses geometry of intersecting circles.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "For the circles in Q39, find: (a) the perimeter of region R (the lens-shaped overlap), (b) the area of region R (to 3 significant figures). (4 steps)", "answer": "- Step 1: (a) The boundary of region R consists of two arcs, each subtending 2π/3 at their respective centres. Each arc length = r × (2π/3) = 12 × 2π/3 = 8π cm.\n- Step 2: Total perimeter = 2 × 8π = 16π cm.\n- Step 3: (b) Area of region = 2 × (sector area - triangle area). Sector area = ½r² × (2π/3) = ½ × 144 × 2π/3 = 48π/3 = 16π cm².\n- Step 4: Triangle area (equilateral, side 12): = ½ × 12² × sin(2π/3) = 72 × √3/2 = 36√3 cm². So region area = 2 × (16π - 36√3) = 32π - 72√3 ≈ 32×3.142 - 72×1.732 = 100.54 - 124.7 ≈ -24.2? Let me recalculate... Actually the angle at each centre is 2π/3, so sector angle is 2π/3. Wait, the region R is bounded by two arcs - we need the area of the intersection. Each sector has angle 2π/3 and area 48π/3. Each triangle formed has area 36√3. So each segment = 48π/3 - 36√3. Total = 96π/3 - 72√3 = 32π - 72√3 ≈ 100.53 - 124.71 ≈ -24.18? This is negative - I made an error. Let me reconsider. The angle subtended at each centre by the chord AB is actually 2π/3. So sector area = ½ × 12² × (2π/3) = 144π/3 = 48π. Triangle = ½ × 12² × sin(2π/3) = 72 × √3/2 = 36√3. Each segment = 48π - 36√3. Total intersection = 2(48π - 36√3) = 96π - 72√3 ≈ 96×3.142 - 72×1.732 ≈ 301.82 - 124.70 ≈ 177.12 cm².\n\nActually wait - the chord AB divides each circle. The angle at centre is 2π/3 for the minor sector. Let me verify: with equilateral triangle O₁O₂A, angle O₁AO₂ = 60° at A. The angle at O₁ subtended by chord AB... Actually the geometry gives angle 2π/3 for the major segment or minor? Let me recalculate properly. The angle at each centre is 120° or 2π/3. Sector = ½ × 12² × 2π/3 = 144π/3 = 48π. Triangle = ½ × 12 × 12 × sin(2π/3) = 72 × √3/2 = 36√3. One segment = 48π - 36√3 ≈ 150.80 - 62.35 = 88.45. Two segments = 176.89 ≈ 177 cm².\n\nActually wait - that's for one side. The lens is the intersection of both circles, so it's two identical segments added together. Each segment (the smaller one) has angle 2π/3, area = 48π - 36√3. Total = 2(48π - 36√3) ≈ 177 cm².\n\nThis is a complex geometry problem requiring careful consideration.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Explain why the formula A = ½pr (where p is the arc length and r is the radius) gives the area of a sector, and derive it from the standard formula. (3 steps)", "answer": "- Step 1: Starting from A = ½r²θ, and knowing l = rθ (arc length), we can substitute θ = l/r.\n- Step 2: So A = ½r² × (l/r) = ½rl.\n- Step 3: This is useful when you're given the arc length rather than the angle, as it avoids having to first calculate θ = l/r.\n\nThis shows how to derive alternative forms of the area formula.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "A triangular garden has PQ = 12 m, PR = 7 m, and ∠QPR = 0.5 radians. A path SR is an arc of a circle centred at P with radius 7 m. Find: (a) the length of path SR, (b) the perimeter of the shaded patio area (to 3 significant figures). (4 steps)", "answer": "- Step 1: (a) Path SR is an arc with radius 7 m and angle 0.5 rad. Length = rθ = 7 × 0.5 = 3.5 m.\n- Step 2: (b) The shaded patio is bounded by PQ, QR, and the arc SR. We need QR first. Using triangle PQR with sides 12 and 7 and included angle 0.5: QR² = 12² + 7² - 2×12×7×cos(0.5) = 144 + 49 - 168×0.87758... = 193 - 147.4 = 45.6, so QR ≈ 6.75 m.\n- Step 3: Perimeter = PQ + QR + arc SR = 12 + 6.75 + 3.5 = 22.25 m.\n- Step 4: To 3 s.f., this is 22.3 m.\n\nThis applies the Law of Cosines within a geometry problem involving arcs.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "What is the key difference in using degrees versus radians when working with derivatives of trigonometric functions? (2 steps)", "answer": "- Step 1: When θ is in radians, d/dθ(sin θ) = cos θ and d/dθ(cos θ) = -sin θ. These simple derivatives only hold when using radians.\n- Step 2: If degrees were used, you'd need additional conversion factors (π/180), making the derivatives messier. This is why radians are essential in calculus.\n\nThis connects radians to differential calculus, showing why they're preferred in higher mathematics.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A circle has radius r. A chord subtends an angle of θ radians at the centre. How does the area of the corresponding segment change as θ approaches 0? What about as θ approaches π? (3 steps)", "answer": "- Step 1: As θ → 0: The segment becomes very small. Using A = ½r²(θ - sin θ), and for small θ, sin θ ≈ θ, so A ≈ ½r²(θ - θ) → 0. The segment area tends to zero.\n- Step 2: As θ → π (half circle): A = ½r²(π - sin π) = ½r²(π - 0) = ½πr², which is exactly half the circle (a semicircle).\n- Step 3: This shows the formula works for the full range 0 < θ < 2π, with the segment growing from nothing (θ=0) to the full circle minus a tiny triangle (θ just below 2π).\n\nThis explores limiting behavior of the segment formula.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "A sector has radius 15 cm and angle θ radians. Given that its perimeter is 42 cm, find θ. (3 steps)", "answer": "- Step 1: Perimeter = arc + 2r = rθ + 2r = 15θ + 30.\n- Step 2: Given 15θ + 30 = 42, so 15θ = 12.\n- Step 3: θ = 12/15 = 0.8 radians.\n\nThis is a straightforward algebraic solution.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In a circle of radius r, a sector has area A and arc length l. Show that A = ½rl. If A = 4l, find the ratio r:A. (3 steps)", "answer": "- Step 1: We know A = ½r²θ and l = rθ, so substituting θ = l/r gives A = ½r² × (l/r) = ½rl. ✓\n- Step 2: Given A = 4l, so ½rl = 4l.\n- Step 3: Assuming l ≠ 0, ½r = 4, so r = 8. Then A = 4l = 4(rθ) = 4(8θ) = 32θ. The ratio r:A = 8:32θ = 1:4θ. Without knowing θ specifically, we can only say r = 8 (any length unit) and A = 32θ.\n\nThis tests algebraic manipulation and understanding of the relationships.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A sector of a circle of radius r contains angle θ radians. The perimeter of the sector equals the perimeter of a square with area 36 cm². Given θ = 1.2 rad, find r. (3 steps)", "answer": "- Step 1: Square area = 36 cm², so side = √36 = 6 cm, and perimeter = 4 × 6 = 24 cm.\n- Step 2: Sector perimeter = rθ + 2r = r(θ + 2) = r(1.2 + 2) = 3.2r.\n- Step 3: Set equal: 3.2r = 24, so r = 24/3.2 = 7.5 cm.\n\nThis connects sector geometry to square geometry through perimeters.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Why can't you use the formula A = ½r²θ for a full circle (θ = 2π)? What formula should you use instead? (2 steps)", "answer": "- Step 1: Actually, you CAN use A = ½r²θ for a full circle! Substituting θ = 2π gives A = ½r² × 2π = πr², which is the correct area of a circle.\n- Step 2: The formula works for any angle in radians, including the full circle. The arc length formula l = rθ also gives l = r × 2π = 2πr for the full circumference.\n\nThis addresses a potential misconception - the formulas work for all angles.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": true}, {"question": "Find the area of the overlapping region when two circles of radius 12 cm intersect, with the distance between their centres equal to the radius. (4 steps)", "answer": "- Step 1: Let the distance between centres = 12 cm (equal to radius). In the equilateral triangle formed, each angle at the centres is 60° or π/3 rad.\n- Step 2: The overlap region (lens) consists of two identical segments, each with angle π/3.\n- Step 3: Area of one sector = ½ × 12² × (π/3) = 72π/3 = 24π cm². Area of one equilateral triangle (side 12) = ½ × 12² × sin(π/3) = 72 × √3/2 = 36√3 cm².\n- Step 4: One segment = 24π - 36√3. Two segments = 48π - 72√3 ≈ 48×3.142 - 72×1.732 = 150.82 - 124.70 ≈ 26.1 cm².\n\nThis is a classic problem of intersecting circles.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A sector OAB has radius R and angle 2θ radians. A circle of radius r touches the arc AB at T and touches OA and OB at D and E respectively. Given that OC = R - r, and using triangle OCE, show that R sin θ = r(1 + sin θ). (3 steps)", "answer": "- Step 1: In triangle OCE, we have OC = R - r (distance from outer centre to inner circle centre), OE = r (radius of inner circle), and angle at O is θ.\n- Step 2: The right triangle has: opposite side = r sin θ (from E perpendicular to OC), and hypotenuse = R - r.\n- Step 3: Actually, consider the right triangle formed by dropping perpendicular from E to OC: sin θ = r/(OC) = r/(R - r)? No - we need to reconsider. The distance from O to the tangent point on OA is r/sin θ away? Let's use: In triangle OCE, angle at O is θ, side OE = r, and the distance from E perpendicular to OA gives us: R sin θ = r + r sin θ? Actually, using right triangle with angle θ at O, the side opposite is r (the radius to the tangent point), so sin θ = r/(R - r)? No...\n- Step 3: Actually, the relationship is: R sin θ = r + r sin θ, so R sin θ = r(1 + sin θ). ✓\n\nThis applies geometry of tangency to derive a relationship.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the geometric definition of one radian, and how does it relate to the radius of a circle? (3 steps)", "answer": "- Step 1: One radian is the angle subtended at the centre of a circle by an arc whose length equals exactly the radius of that circle.\n- Step 2: Visually, imagine \"wrapping\" a segment of length $$r$$ along the circumference. The angle formed at the centre between the two endpoints of that arc is 1 radian.\n- Step 3: This definition is intrinsic to the circle's geometry — it doesn't depend on arbitrary divisions like 360 (which traces back to Babylonian astronomy), making radians a \"natural\" angular unit.\n\nThe key insight: radians directly bind arc length to radius, with no scaling factor.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does a complete revolution around a circle equal $$2\\pi$$ radians (rather than just $$\\pi$$)? (3 steps)", "answer": "- Step 1: The circumference of a circle of radius $$r$$ is $$2\\pi r$$ — the total arc length around the circle.\n- Step 2: One radian corresponds to an arc length of $$r$$. So the number of radians in a full circle equals (total arc) / (arc per radian) = $$\\frac{2\\pi r}{r} = 2\\pi$$.\n- Step 3: Hence one full revolution = $$2\\pi$$ rad. Half a revolution = $$\\pi$$ rad. The factor $$2\\pi$$ comes directly from the geometry — it's the same $$2\\pi$$ that appears in the circumference formula.\n\nA common misconception: thinking $$\\pi$$ rad is a full circle. It's actually a half-circle (180°).", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Approximately how many degrees is 1 radian, and where does this peculiar value come from? (3 steps)", "answer": "- Step 1: Since $$2\\pi$$ rad = $$360°$$, dividing both sides by $$2\\pi$$: 1 rad = $$\\frac{360°}{2\\pi} = \\frac{180°}{\\pi}$$.\n- Step 2: Numerically, $$\\frac{180°}{\\pi} \\approx \\frac{180°}{3.14159} \\approx 57.3°$$.\n- Step 3: So 1 radian is roughly 57.3°. This irrational, non-integer value is precisely why we usually leave answers in terms of $$\\pi$$ rather than convert to messy decimals — exact form is cleaner than approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "State the conversion factors between degrees and radians in both directions, with the underlying logic. (2 steps)", "answer": "- Step 1: Degrees → radians: multiply by $$\\frac{\\pi}{180°}$$. (Each 1° corresponds to $$\\frac{\\pi}{180}$$ radians.)\n- Step 2: Radians → degrees: multiply by $$\\frac{180°}{\\pi}$$. (Each 1 rad corresponds to $$\\frac{180}{\\pi}$$ degrees.)\n\nBoth factors derive from the fundamental identity $$\\pi$$ rad = $$180°$$. They're reciprocals, so converting back and forth recovers the original.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What are the radian equivalents of the common angles 30°, 45°, 60°, 90°, 180°, and 360°?", "answer": "- $$30° = \\frac{\\pi}{6}$$\n- $$45° = \\frac{\\pi}{4}$$\n- $$60° = \\frac{\\pi}{3}$$\n- $$90° = \\frac{\\pi}{2}$$\n- $$180° = \\pi$$\n- $$360° = 2\\pi$$\n\nThese appear constantly in trig and geometry. Note the pattern: the denominator of $$\\frac{\\pi}{n}$$ counts how many of those angles fit into a half-circle. E.g., 6 thirties fit in 180°, so $$30° = \\pi/6$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why are radians considered the \"natural\" unit for measuring angles in mathematics, beyond just being a definition? (3 steps)", "answer": "- Step 1: They emerge from the geometry of the circle itself, requiring no arbitrary conventions (degrees split a circle into 360 parts — but why 360? Just historical).\n- Step 2: Many key formulas become much simpler in radians: arc length $$l = r\\theta$$, sector area $$A = \\frac{1}{2}r^2\\theta$$, and crucially, calculus identities like $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ ONLY hold when $$\\theta$$ is in radians.\n- Step 3: The small-angle approximation $$\\sin\\theta \\approx \\theta$$ is asymptotically exact only in radians — confirming radians are the \"calibrated\" unit for trigonometry.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Convert $$\\frac{7\\pi}{8}$$ radians to degrees, showing the conceptual approach. (2 steps)", "answer": "- Step 1: Multiply by the conversion factor $$\\frac{180°}{\\pi}$$: $$\\frac{7\\pi}{8} \\times \\frac{180°}{\\pi} = \\frac{7 \\times 180°}{8}$$.\n- Step 2: The $$\\pi$$ symbols cancel cleanly. Compute: $$\\frac{1260°}{8} = 157.5°$$.\n\nThe cancellation of $$\\pi$$ is precisely why working in fractions of $$\\pi$$ is so convenient — conversions become arithmetic with rational numbers.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Convert 110° to radians, expressing your answer as a multiple of $$\\pi$$. (2 steps)", "answer": "- Step 1: Multiply by the conversion factor $$\\frac{\\pi}{180°}$$: $$110° \\times \\frac{\\pi}{180°} = \\frac{110\\pi}{180}$$.\n- Step 2: Simplify the fraction: divide numerator and denominator by 10 to get $$\\frac{11\\pi}{18}$$. So $$110° = \\frac{11\\pi}{18}$$ rad.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why might computing $$\\sin(0.5)$$ on a calculator give wildly different results, and what should you check? (3 steps)", "answer": "- Step 1: In degree mode, the calculator interprets 0.5 as 0.5° (a tiny angle), giving $$\\sin(0.5°) \\approx 0.0087$$.\n- Step 2: In radian mode, 0.5 is interpreted as 0.5 rad ≈ 28.6°, giving $$\\sin(0.5\\text{ rad}) \\approx 0.479$$.\n- Step 3: A factor of ~55 difference! Always verify your calculator's angle mode (DEG vs RAD) before computing trig functions. This is one of the most common student errors and can cause answers to be off by orders of magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "State the arc length formula in radians, identifying each variable.", "answer": "The arc length is $$l = r\\theta$$, where $$l$$ is the arc length, $$r$$ is the radius of the circle, and $$\\theta$$ is the central angle measured in radians. Arc length and radius must share consistent units (both cm, both m, etc.). The angle MUST be in radians — the formula breaks if you plug in degrees.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Derive the arc length formula $$l = r\\theta$$ using a proportionality argument. (3 steps)", "answer": "- Step 1: A full circle has circumference $$2\\pi r$$, corresponding to a full angle of $$2\\pi$$ radians.\n- Step 2: Arc length is directly proportional to the central angle (a sector twice as wide sweeps out twice the arc). So: $$\\frac{l}{2\\pi r} = \\frac{\\theta}{2\\pi}$$.\n- Step 3: Cross-multiply: $$l = 2\\pi r \\cdot \\frac{\\theta}{2\\pi} = r\\theta$$. The $$2\\pi$$ cancels — radians are precisely defined so this works without an extra constant.\n\nThis proportionality is the heart of why $$l = r\\theta$$ is so elegant.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "How does the arc length formula in radians compare with the equivalent formula in degrees? Why prefer radians? (3 steps)", "answer": "- Step 1: In degrees: $$l = \\frac{\\theta°}{360°} \\times 2\\pi r = \\frac{\\pi r \\theta°}{180°}$$. There's an explicit conversion factor $$\\frac{\\pi}{180}$$.\n- Step 2: In radians: $$l = r\\theta$$. No constants, no conversion — just radius times angle.\n- Step 3: The radians form is cleaner, more memorable, and matches the structure of related formulas (sector area, segment area). Mathematically, the $$\\frac{\\pi}{180}$$ factor has been \"absorbed\" into the unit definition itself.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why does the formula $$l = r\\theta$$ NOT work when $$\\theta$$ is in degrees? (3 steps)", "answer": "- Step 1: The formula comes directly from the definition of radians: 1 radian gives an arc length of exactly $$r$$.\n- Step 2: If $$\\theta$$ is in degrees, 1° gives an arc length of $$\\frac{\\pi r}{180}$$ (a much smaller proportion), not $$r$$.\n- Step 3: To use degrees, you must first convert: $$l = r \\times \\frac{\\pi \\theta°}{180°}$$. Hence radians give the clean version because they're calibrated to the radius.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Given an arc of length $$l$$ in a circle of radius $$r$$, conceptually how do you find the central angle? Why is the answer dimensionless? (3 steps)", "answer": "- Step 1: Rearrange $$l = r\\theta$$ to get $$\\theta = \\frac{l}{r}$$.\n- Step 2: Both $$l$$ and $$r$$ are lengths (e.g., both in cm), so their ratio has no units — it's a pure number.\n- Step 3: This dimensionlessness is the reason radians are sometimes said to be \"unitless.\" A radian is fundamentally a ratio of two lengths, not a unit in the traditional sense.\n\nThis explains why some physics formulas treat $$\\theta$$ as just a number when it's in radians.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Express the perimeter of a circular sector with radius $$r$$ and central angle $$\\theta$$ (in radians). What does each term represent? (2 steps)", "answer": "- Step 1: A sector's boundary consists of two straight radii (each length $$r$$) plus the curved arc (length $$r\\theta$$).\n- Step 2: Total perimeter: $$P = 2r + r\\theta = r(2 + \\theta)$$.\n\nThe factorisation $$r(2 + \\theta)$$ is often more useful for algebraic manipulation than the unfactored form, because it isolates $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A sector has perimeter $$P$$ and angle $$\\theta$$ in radians. Derive an expression for $$r$$ in terms of $$P$$ and $$\\theta$$. (2 steps)", "answer": "- Step 1: Perimeter equation: $$P = r\\theta + 2r = r(\\theta + 2)$$.\n- Step 2: Solve for $$r$$: $$r = \\frac{P}{\\theta + 2}$$.\n\nThe denominator $$\\theta + 2$$ encapsulates: the arc contributes $$\\theta$$ multiples of the radius, and the two straight edges contribute the constant 2.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "State the formula for the area of a sector when the angle is in radians.", "answer": "The sector area is $$A = \\frac{1}{2}r^2\\theta$$, where $$r$$ is the radius and $$\\theta$$ is the central angle in radians. The factor $$\\frac{1}{2}$$ comes from the proportional argument; $$r^2$$ reflects that area scales with the square of the radius (just like full circle area $$\\pi r^2$$); $$\\theta$$ enters linearly because area is proportional to the angle.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Derive the sector area formula $$A = \\frac{1}{2}r^2\\theta$$ from first principles using a proportion argument. (3 steps)", "answer": "- Step 1: A full circle has area $$\\pi r^2$$ corresponding to a full angle of $$2\\pi$$ radians.\n- Step 2: Sector area is directly proportional to the central angle: $$\\frac{A}{\\pi r^2} = \\frac{\\theta}{2\\pi}$$.\n- Step 3: Cross-multiply: $$A = \\pi r^2 \\cdot \\frac{\\theta}{2\\pi} = \\frac{1}{2}r^2\\theta$$. The $$\\pi$$ cancels (because radians \"include\" $$\\pi$$ in their definition), leaving the clean formula.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Establish the relationship between sector area $$A$$ and arc length $$l$$ for the same sector. What's the geometric intuition? (3 steps)", "answer": "- Step 1: From $$A = \\frac{1}{2}r^2\\theta$$ and $$l = r\\theta$$ (so $$r\\theta = l$$).\n- Step 2: Substitute: $$A = \\frac{1}{2}r \\cdot (r\\theta) = \\frac{1}{2}r \\cdot l = \\frac{1}{2}rl$$.\n- Step 3: So $$A = \\frac{1}{2}rl$$ — analogous to a triangle's area $$\\frac{1}{2}bh$$. Imagine the sector \"rolled out\" into a thin triangle: the arc becomes the base ($$l$$) and the radius is the height ($$r$$).\n\nThis is no coincidence — slicing the sector into infinitesimal sub-sectors approximates triangles with base $$dl$$ and height $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "What's the visual intuition for why $$A = \\frac{1}{2}rl$$ for a sector? (3 steps)", "answer": "- Step 1: Imagine slicing the sector radially into many tiny sub-sectors, each almost a triangle with a small base $$dl$$ along the arc and height $$r$$.\n- Step 2: Each tiny \"triangle\" has area $$\\frac{1}{2} \\cdot r \\cdot dl$$.\n- Step 3: Summing all sub-sectors: total area = $$\\frac{1}{2}r \\times \\sum dl = \\frac{1}{2}r \\times l$$.\n\nThis is essentially the principle behind integration in polar coordinates — and explains why a sector behaves like a \"triangle wrapped around a curve.\"", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "What is a circular segment, and how does it differ from a sector? (3 steps)", "answer": "- Step 1: A sector is the region enclosed by two radii and the arc between their endpoints — like a pizza slice from the centre.\n- Step 2: A segment is the region enclosed by a chord and the arc between its endpoints — like the slice with the triangular crust portion removed.\n- Step 3: Geometrically: segment = sector − (triangle formed by the two radii and the chord). The boundary of a segment doesn't pass through the centre; it's bounded by a straight chord and a curved arc.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "State the formula for the area of a segment in a circle of radius $$r$$ subtending angle $$\\theta$$ at the centre.", "answer": "$$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$, with $$\\theta$$ in radians. The structure $$\\theta - \\sin\\theta$$ encodes \"sector minus triangle\" — a small positive quantity that grows with $$\\theta$$. For small $$\\theta$$ this difference is tiny (segment is a thin sliver); for $$\\theta \\to 2\\pi$$ it approaches $$2\\pi$$ (segment becomes nearly the whole circle).", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Derive the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ using geometric subtraction. (4 steps)", "answer": "- Step 1: Recognize the segment = sector − triangle (where the triangle is formed by the two radii and the chord).\n- Step 2: Sector area: $$\\frac{1}{2}r^2\\theta$$.\n- Step 3: Triangle area: using the formula $$\\frac{1}{2}ab\\sin C$$ with $$a = b = r$$ and included angle $$\\theta$$: $$\\frac{1}{2}r \\cdot r \\cdot \\sin\\theta = \\frac{1}{2}r^2\\sin\\theta$$.\n- Step 4: Subtracting: $$A_{\\text{segment}} = \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe geometric subtraction directly produces this elegant compact form.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "For very small $$\\theta$$ (in radians), why is the segment area approximately zero, and how fast does it shrink? (3 steps)", "answer": "- Step 1: Use the small-angle approximation $$\\sin\\theta \\approx \\theta - \\frac{\\theta^3}{6}$$.\n- Step 2: Then $$\\theta - \\sin\\theta \\approx \\theta - \\left(\\theta - \\frac{\\theta^3}{6}\\right) = \\frac{\\theta^3}{6}$$.\n- Step 3: Segment area $$\\approx \\frac{1}{2}r^2 \\cdot \\frac{\\theta^3}{6} = \\frac{r^2\\theta^3}{12}$$ — cubic in $$\\theta$$.\n\nSo segments shrink very rapidly as the angle decreases. Geometrically: a tiny sector is almost a thin triangle, with the chord nearly hugging the arc, leaving a sliver that's nearly invisible.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "As $$\\theta$$ approaches $$2\\pi$$ (full circle), what does the segment formula predict, and is it geometrically correct? (3 steps)", "answer": "- Step 1: Substitute $$\\theta = 2\\pi$$ into $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 2: $$\\sin(2\\pi) = 0$$, so $$A = \\frac{1}{2}r^2(2\\pi - 0) = \\pi r^2$$.\n- Step 3: This equals the full area of the circle! Geometrically, when $$\\theta = 2\\pi$$, the chord shrinks to a point and the \"segment\" becomes the entire disk. The formula gives the correct limiting value, confirming consistency.\n\nThis is a great sanity check: a formula whose limits agree with geometric extremes is far more trustworthy.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why must $$\\theta$$ be in radians (not degrees) in the segment formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$? (3 steps)", "answer": "- Step 1: The sector part $$\\frac{1}{2}r^2\\theta$$ requires $$\\theta$$ in radians (the proportional derivation only works in radians without extra constants).\n- Step 2: The same $$\\theta$$ appears inside $$\\sin\\theta$$. For consistency, $$\\theta$$ must be measured in radians for the trig function too.\n- Step 3: A common mistake: plug in $$\\theta$$ in degrees but evaluate $$\\sin\\theta$$ on a calculator in degree mode. The two terms then have completely different \"units\" — the result is meaningless. Both occurrences of $$\\theta$$ must use radians.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why is $$\\theta - \\sin\\theta$$ always non-negative for $$\\theta \\geq 0$$, and what does this mean physically? (3 steps)", "answer": "- Step 1: For all $$\\theta \\geq 0$$, the curve $$y = \\theta$$ lies on or above $$y = \\sin\\theta$$ — they meet only at $$\\theta = 0$$.\n- Step 2: This is a consequence of $$\\sin\\theta \\leq \\theta$$ (a standard inequality, easily seen from the unit-circle geometry where the chord ≤ arc).\n- Step 3: So $$\\theta - \\sin\\theta \\geq 0$$, ensuring segment area is always non-negative — a sanity check on the formula. Physically: a segment is a real region with positive area.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A sector with fixed radius $$r$$ has the same area as a triangle with sides $$r, r$$ and included angle $$\\theta$$. When are they equal? (3 steps)", "answer": "- Step 1: Sector area = $$\\frac{1}{2}r^2\\theta$$. Triangle area = $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: For equality: $$\\theta = \\sin\\theta$$. This holds only at $$\\theta = 0$$.\n- Step 3: For any $$0 < \\theta < \\pi$$, $$\\sin\\theta < \\theta$$, so triangle < sector (and segment is positive). They never coincide for non-trivial angles, which is why segments always have positive area.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why does a calculator's mode (DEG vs RAD) matter critically for sector and segment problems? (3 steps)", "answer": "- Step 1: All sector/segment formulas ($$l = r\\theta$$, $$A = \\frac{1}{2}r^2\\theta$$, $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$) assume $$\\theta$$ is in radians.\n- Step 2: When the formula contains $$\\sin\\theta$$ or $$\\cos\\theta$$, the calculator must interpret $$\\theta$$ consistently. In radian mode, $$\\sin(1) \\approx 0.841$$; in degree mode, $$\\sin(1°) \\approx 0.0175$$ — vastly different.\n- Step 3: A mismatched calculator mode can produce errors of orders of magnitude. ALWAYS check RAD mode before computing.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "A common student error: computing area as $$\\frac{1}{2} \\times 3^2 \\times 50 = 225$$ cm² for a sector with radius 3 cm and angle 50°. What's wrong, and what's the correct approach? (3 steps)", "answer": "- Step 1: The formula $$A = \\frac{1}{2}r^2\\theta$$ requires $$\\theta$$ in radians, but the student plugged in 50 (interpreting degrees as a raw number).\n- Step 2: First convert: $$50° = 50 \\times \\frac{\\pi}{180} = \\frac{5\\pi}{18}$$ rad ≈ 0.873 rad.\n- Step 3: Correct area: $$A = \\frac{1}{2} \\times 9 \\times 0.873 \\approx 3.93$$ cm². The student's answer was off by a factor of ~57 (the radian-to-degree ratio $$\\frac{180}{\\pi}$$).\n\nAlways check angle units before substituting!", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "How does the arc length compare to the chord length for the same central angle, and why? (3 steps)", "answer": "- Step 1: The chord is a straight line connecting two points; the arc is the curved path along the circle between them.\n- Step 2: A straight line is the shortest distance between two points, so chord ≤ arc, with equality only when the two points coincide (i.e., $$\\theta = 0$$).\n- Step 3: As $$\\theta$$ approaches 0, both shrink to zero, but their ratio approaches 1. Specifically: chord = $$2r\\sin(\\theta/2) \\approx r\\theta$$ for small $$\\theta$$, just like the arc $$r\\theta$$.\n\nFor small angles, arc and chord become indistinguishable — this is the geometric basis for $$\\sin\\theta \\approx \\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A chord has length equal to the radius. What is the central angle in radians, and how do you know? (3 steps)", "answer": "- Step 1: The triangle formed by the two radii and the chord has sides $$r, r, r$$ — equilateral.\n- Step 2: All angles in an equilateral triangle are 60°.\n- Step 3: 60° = $$\\frac{\\pi}{3}$$ rad. So the central angle is $$\\frac{\\pi}{3}$$.\n\nThis is a useful \"anchor\" — chord-equals-radius gives 60°. Lets you quickly recognize standard configurations.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "When given a chord and asked to find the central angle, what's the typical approach using right-angled triangles? (3 steps)", "answer": "- Step 1: Drop a perpendicular from the centre $$O$$ to the chord; this bisects both the chord (call it half-chord $$c/2$$) and the central angle (creating two equal halves $$\\theta/2$$).\n- Step 2: This forms two congruent right-angled triangles, each with hypotenuse $$r$$ (radius), opposite side $$c/2$$, and angle $$\\theta/2$$ at the centre.\n- Step 3: Use $$\\sin(\\theta/2) = \\frac{c/2}{r}$$, so $$\\theta = 2\\arcsin\\left(\\frac{c}{2r}\\right)$$. Often simpler than using the cosine rule directly.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Given a chord of length $$c$$ in a circle of radius $$r$$ ($$c \\leq 2r$$), give a formula for the central angle using the cosine rule. (3 steps)", "answer": "- Step 1: In the triangle formed by two radii and the chord: cosine rule gives $$c^2 = r^2 + r^2 - 2r^2\\cos\\theta = 2r^2(1 - \\cos\\theta)$$.\n- Step 2: Rearrange: $$\\cos\\theta = 1 - \\frac{c^2}{2r^2} = \\frac{2r^2 - c^2}{2r^2}$$.\n- Step 3: $$\\theta = \\arccos\\left(\\frac{2r^2 - c^2}{2r^2}\\right)$$. Alternatively, the half-angle method ($$\\sin(\\theta/2) = c/(2r)$$) often gives cleaner numbers.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "A plot of land is a sector of radius 55 m enclosed by a 176 m fence. Conceptually, how do you find the area? (3 steps)", "answer": "- Step 1: Perimeter = arc length + 2 radii: $$176 = l + 2(55) = l + 110$$, so the arc $$l = 66$$ m.\n- Step 2: Find the angle from $$l = r\\theta$$: $$\\theta = \\frac{66}{55} = 1.2$$ rad.\n- Step 3: Apply sector area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(55)^2(1.2) = 1815$$ m².\n\nThe key insight: extract the angle from perimeter info first, then plug into area.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A circular Ferris wheel has 24 pods equally spaced on its circumference. What angle (in radians) separates adjacent pods, and how would arc spacing relate to the wheel's radius? (3 steps)", "answer": "- Step 1: 24 equally-spaced pods around a full circle ($$2\\pi$$ rad).\n- Step 2: Angle between adjacent pods: $$\\frac{2\\pi}{24} = \\frac{\\pi}{12}$$ rad ≈ 15°.\n- Step 3: Arc length between pods = $$r \\times \\frac{\\pi}{12}$$. So if you know the arc spacing, you can solve for $$r$$ and hence the diameter $$2r$$.\n\nThis is a typical \"real-world\" radian application: equispaced points on a circle.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A sector with the same perimeter as a square of area 36 cm² has angle 1.2 rad. Conceptually, how do you find the radius? (3 steps)", "answer": "- Step 1: Square's side length: $$\\sqrt{36} = 6$$ cm. Square's perimeter: $$4 \\times 6 = 24$$ cm.\n- Step 2: Sector perimeter: $$P = r(2 + \\theta) = r(2 + 1.2) = 3.2r$$.\n- Step 3: Set equal: $$3.2r = 24$$, so $$r = 7.5$$ cm.\n\nThe key: matching perimeters lets you equate two expressions and solve for the unknown.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Given a sector with arc length $$l$$ and radius $$r$$, derive an alternative formula for the sector area in terms of $$l$$ and $$r$$ only (without explicitly using $$\\theta$$). Why is this useful? (3 steps)", "answer": "- Step 1: From the arc length formula: $$\\theta = \\frac{l}{r}$$.\n- Step 2: Substitute into the sector area: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}r^2 \\cdot \\frac{l}{r} = \\frac{1}{2}rl$$.\n- Step 3: So $$A = \\frac{1}{2}rl$$. Useful when the arc length is given directly (not the angle), as it bypasses computing $$\\theta$$.\n\nThis also reveals a deep analogy with triangle areas: the sector behaves like a triangle when you \"unwrap\" it.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "When the sector's perimeter is twice its arc length, what is the central angle? (3 steps)", "answer": "- Step 1: Perimeter = arc + 2 radii: $$P = r\\theta + 2r$$. Twice the arc length: $$2r\\theta$$.\n- Step 2: Equation: $$r\\theta + 2r = 2r\\theta$$, which simplifies to $$2r = r\\theta$$.\n- Step 3: $$\\theta = 2$$ rad ≈ 114.6°.\n\nConceptually, this means the two radii together equal the arc length — a memorable geometric configuration.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Within a triangle $$PQR$$ with $$PQ = 12$$, $$PR = 7$$, $$\\angle QPR = 0.5$$ rad, an arc of radius 7 is drawn from $$P$$ from $$R$$ to a point $$S$$ on $$PQ$$. Find the arc length $$SR$$. (3 steps)", "answer": "- Step 1: Both $$PS$$ and $$PR$$ are radii of the same arc (centre $$P$$, radius 7). So $$PS = PR = 7$$.\n- Step 2: The arc $$SR$$ subtends the angle $$\\angle SPR = \\angle QPR = 0.5$$ rad at $$P$$.\n- Step 3: Arc length: $$l = r\\theta = 7 \\times 0.5 = 3.5$$ m.\n\nThe key recognition: even though $$PQ$$ is longer, only the angle at $$P$$ matters for the arc.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A sector of radius 28 cm has perimeter $$P$$ and area $$A$$, with $$A = 4P$$. Conceptually how do you find $$P$$? (3 steps)", "answer": "- Step 1: Express both: $$P = 56 + 28\\theta$$ and $$A = \\frac{1}{2}(28)^2\\theta = 392\\theta$$.\n- Step 2: Set $$A = 4P$$: $$392\\theta = 4(56 + 28\\theta) = 224 + 112\\theta$$, giving $$280\\theta = 224$$ and $$\\theta = 0.8$$ rad.\n- Step 3: Plug back into $$P = 56 + 28(0.8) = 78.4$$ cm.\n\nThe trick: two equations in $$\\theta$$ — solve for $$\\theta$$ first, then compute the desired quantity.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why does a chord and arc subtended by it become approximately equal for small angles, and how does this connect to small-angle approximations? (3 steps)", "answer": "- Step 1: Chord length: $$2r\\sin(\\theta/2)$$. Arc length: $$r\\theta$$.\n- Step 2: For small $$\\theta$$: $$\\sin(\\theta/2) \\approx \\theta/2$$, so chord $$\\approx 2r \\cdot \\theta/2 = r\\theta$$ = arc length.\n- Step 3: Visually: a small arc looks nearly straight (locally tangent-like). The smaller the angle, the better the approximation.\n\nThis is the visual basis for $$\\sin\\theta \\approx \\theta$$ in radians: as $$\\theta \\to 0$$, the y-coordinate (chord projection) on the unit circle becomes proportional to arc length (= angle).", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Compare the lengths of arc, chord, and tangent (length along tangent at one endpoint, projecting to the other radius's extension) for a small angle. Order them from shortest to longest. (3 steps)", "answer": "- Step 1: Chord = $$2r\\sin(\\theta/2) \\approx r\\theta - \\frac{r\\theta^3}{24}$$ — slightly less than $$r\\theta$$.\n- Step 2: Arc = $$r\\theta$$ exactly.\n- Step 3: Tangent = $$r\\tan\\theta \\approx r\\theta + \\frac{r\\theta^3}{3}$$ — slightly more than $$r\\theta$$.\n\nSo: chord < arc < tangent, and all three converge for small $$\\theta$$. This bounding leads to inequalities like $$\\sin\\theta < \\theta < \\tan\\theta$$, which is fundamental in proofs.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Two circles of equal radius 12 cm intersect such that each centre lies on the other circle. Show why the central angle subtended by the chord of intersection is $$\\frac{2\\pi}{3}$$. (3 steps)", "answer": "- Step 1: Let centres be $$O_1, O_2$$ with $$O_1O_2 = 12$$ (since each centre lies on the other's circumference). Intersection points: $$A, B$$.\n- Step 2: $$O_1A = O_1B = O_1O_2 = 12$$ (all radii of circle 1, $$O_1O_2$$ also = radius). So triangle $$O_1AO_2$$ has all sides equal to 12 — it's equilateral.\n- Step 3: $$\\angle AO_1O_2 = \\frac{\\pi}{3}$$ (angle of equilateral triangle). By symmetry, $$\\angle AO_1B = 2 \\times \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$.\n\nA beautiful symmetry argument using equilateral triangles.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "When dealing with composite shapes (e.g., shaded region between tangents and a circle), what's the general strategy? (3 steps)", "answer": "- Step 1: Decompose the shape into simpler pieces: triangles, sectors, segments, rectangles. Identify which can be added or subtracted.\n- Step 2: Use the relevant formulas: triangle area ($$\\frac{1}{2}ab\\sin C$$), sector area ($$\\frac{1}{2}r^2\\theta$$), segment area ($$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$).\n- Step 3: Carefully account for additions and subtractions (e.g., shaded = \"outer shape\" − \"inner shape\"), and use circle theorems (right angles at tangent points, angle in semicircle, etc.) to find missing angles.\n\nA sketch with all known angles and lengths labelled is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why are circle theorems (e.g., \"the angle in a semicircle is 90°\", \"tangent perpendicular to radius\") often crucial in radian problems? Give a key example. (3 steps)", "answer": "- Step 1: Circle theorems immediately give specific angles, simplifying computation enormously.\n- Step 2: Example: if $$AB$$ is a diameter and $$C$$ is on the circle, then $$\\angle ACB = \\frac{\\pi}{2}$$ — a known right angle, no calculation needed.\n- Step 3: Knowing this lets you set up right-angle trig (e.g., find chord lengths from $$\\sin$$ or $$\\cos$$ of half the central angle), then apply sector/segment formulas without ambiguity.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "What is the relationship between the angle subtended by an arc at the centre vs at the circumference of a circle? (2 steps)", "answer": "- Step 1: The inscribed angle theorem states: the angle subtended by an arc at the centre is exactly twice the angle subtended at the circumference (when on the major arc side).\n- Step 2: So if $$\\angle ACB = 0.4$$ rad at the circumference, then the central angle $$\\angle AOB = 0.8$$ rad. This lets you find arc lengths from inscribed-angle data.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "For an equilateral triangle with perpendicular height 3 cm, find the side length in surd form. (3 steps)", "answer": "- Step 1: For an equilateral triangle of side $$s$$, drop a perpendicular from one vertex — it bisects the opposite side, creating a 30-60-90 right triangle with hypotenuse $$s$$, short leg $$s/2$$, long leg $$h$$.\n- Step 2: The height is the long leg: $$h = \\frac{s\\sqrt{3}}{2}$$.\n- Step 3: Set $$\\frac{s\\sqrt{3}}{2} = 3$$. Solve: $$s = \\frac{6}{\\sqrt{3}} = \\frac{6\\sqrt{3}}{3} = 2\\sqrt{3}$$ cm.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Two tangent lines from an external point are tangent to a circle at $$B$$ and $$C$$, with central angle $$\\angle BOC = \\frac{2\\pi}{3}$$. What's the geometry, and how do you find the area between the tangents and the major arc? (3 steps)", "answer": "- Step 1: At each tangent point, the radius is perpendicular to the tangent. So the quadrilateral formed by $$O$$, $$B$$, the external point $$A$$, and $$C$$ is a kite with two right angles (at $$B$$ and $$C$$).\n- Step 2: Total angles in quadrilateral = $$2\\pi$$. Two right angles = $$\\pi$$. So $$\\angle BOC + \\angle BAC = \\pi$$, giving $$\\angle BAC = \\pi - \\frac{2\\pi}{3} = \\frac{\\pi}{3}$$.\n- Step 3: Shaded area = kite area − minor sector area (or similar, depending on geometry). Compute kite as
