\\sin x \\approx x$$ for small $$x$$. Here $$x = 2\\theta$$, so $$\\sin 2\\theta \\approx 2\\theta$$. This is **correct** — you substitute the entire argument into the approximation.\n- Step 2: The approximation says $$\\cos x \\approx 1 - \\frac{x^2}{2}$$ for small $$x$$. Here $$x = 2\\theta$$, so $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$. The student wrote $$1 - \\frac{\\theta^2}{2}$$, which is **wrong** — they forgot to square the entire argument, only squaring $$\\theta$$ instead of $$2\\theta$$.\n- Step 3: The rule: whenever you apply a small-angle approximation, the \"$$\\theta$$\" in the formula stands for the **whole argument** of the trig function. So $$\\sin 2\\theta \\approx 2\\theta$$ (not $$\\theta$$), and $$\\cos 2\\theta \\approx 1 - \\frac{(2\\theta)^2}{2} = 1 - 2\\theta^2$$ (not $$1 - \\frac{\\theta^2}{2}$$).\n\nThis is a very common exam trap — always substitute the full argument.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "Using small-angle approximations, approximate $$\\frac{\\sin 3\\theta}{\\theta \\cos\\theta}$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: Apply approximations to each part: $$\\sin 3\\theta \\approx 3\\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$.\n- Step 2: Substitute: $$\\frac{\\sin 3\\theta}{\\theta \\cos\\theta} \\approx \\frac{3\\theta}{\\theta\\left(1 - \\frac{\\theta^2}{2}\\right)} = \\frac{3}{1 - \\frac{\\theta^2}{2}}$$.\n- Step 3: For very small $$\\theta$$, the denominator $$1 - \\frac{\\theta^2}{2} \\approx 1$$, so the whole expression approaches 3. More precisely, $$\\frac{3}{1 - \\frac{\\theta^2}{2}} \\approx 3\\left(1 + \\frac{\\theta^2}{2}\\right) = 3 + \\frac{3\\theta^2}{2}$$.\n\nThe key skill: apply each approximation separately, then simplify. Don't try to approximate the whole fraction at once.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "What is the limit of $$\\frac{\\sin\\theta}{\\theta}$$ as $$\\theta \\to 0$$? Explain why this is essentially the same idea as the small-angle approximation for sine. (2 steps)", "answer": "- Step 1: Since $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$, we get $$\\frac{\\sin\\theta}{\\theta} \\approx \\frac{\\theta}{\\theta} = 1$$. So $$\\lim_{\\theta \\to 0}\\frac{\\sin\\theta}{\\theta} = 1$$.\n- Step 2: This limit is exactly the rigorous version of the approximation $$\\sin\\theta \\approx \\theta$$. The approximation says \"sine and $$\\theta$$ are approximately equal near 0,\" which means their *ratio* approaches 1. The limit formalises the intuition: as the angle shrinks, the vertical height and the arc length on a unit circle become indistinguishable.\n\n+ This limit is foundational in calculus — it's how you derive $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ from first principles.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A student approximates $$\\cos(0.5)$$ as $$1 - \\frac{0.5^2}{2} = 1 - 0.125 = 0.875$$. The true value is approximately 0.8776. Is the approximation reasonable? At what point does the cosine approximation start to break down significantly? (2 steps)", "answer": "- Step 1: The approximation gives 0.875 vs the true value 0.8776. The error is about 0.003, or roughly 0.3% — quite good for a quick approximation. So yes, for $$\\theta = 0.5$$ rad (about 29°), the approximation is still reasonable.\n- Step 2: The approximation starts to break down significantly around $$\\theta \\approx 0.4\\text{–}0.5$$ radians (roughly 23°–29°). Beyond this, the next term $$\\frac{\\theta^4}{24}$$ becomes non-negligible. As a rough guide:\n+ At $$\\theta = 0.1$$: error is tiny ($$\\approx 0.000004$$)\n+ At $$\\theta = 0.3$$: error is small ($$\\approx 0.0003$$)\n+ At $$\\theta = 0.5$$: error is moderate ($$\\approx 0.003$$)\n+ At $$\\theta = 1.0$$: error is significant ($$\\approx 0.13$$)\n\nTakeaway: Small-angle approximations are \"small\" for a reason — they degrade quickly as $$\\theta$$ grows.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "Solve $$\\cos\\theta = \\frac{1}{2}$$ for $$-\\pi \\leq \\theta \\leq \\pi$$. How does using a negative radian domain change your approach compared to the usual $$0 \\leq \\theta < 2\\pi$$? (3 steps)", "answer": "- Step 1: Find the principal value: $$\\theta = \\frac{\\pi}{3}$$. Cosine is positive in Q1 and Q4 (in the standard $$0$$ to $$2\\pi$$ picture), but in the symmetric domain $$-\\pi$$ to $$\\pi$$, the equivalent second solution is the negative angle in Q4.\n- Step 2: Using the symmetry $$\\cos(-\\theta) = \\cos\\theta$$, the second solution is $$\\theta = -\\frac{\\pi}{3}$$.\n- Step 3: Both solutions: $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = -\\frac{\\pi}{3}$$. Both lie within $$[-\\pi, \\pi]$$ ✓.\n\nThe key difference: in the domain $$[0, 2\\pi)$$, you'd give $$\\theta = \\frac{\\pi}{3}$$ and $$\\theta = \\frac{5\\pi}{3}$$. In the domain $$[-\\pi, \\pi]$$, you use negative angles instead of angles beyond $$\\pi$$. The *set of points on the unit circle* is the same — just represented differently.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "A sector has the same perimeter as a square of area 36 cm². The sector has angle 1.2 radians. Find the radius of the sector. (3 steps)", "answer": "- Step 1: The square has area 36 cm², so its side length is $$\\sqrt{36} = 6$$ cm. Its perimeter is $$4 \\times 6 = 24$$ cm.\n- Step 2: The sector has perimeter $$P = r\\theta + 2r = r(1.2) + 2r = r(3.2) = 24$$.\n- Step 3: Solve: $$r = \\frac{24}{3.2} = 7.5$$ cm.\n\nThis problem combines geometry from two different shapes. The strategy: compute the known quantity (square perimeter), set it equal to the sector perimeter expressed in terms of $$r$$, then solve.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A Ferris wheel has 24 equally-spaced pods. The arc length between consecutive pods is $$\\frac{3\\pi}{2}$$ m. Find the diameter of the wheel, and estimate the speed of a pod in km/h if one revolution takes 30 seconds. (3 steps)", "answer": "- Step 1: The total circumference equals 24 times the arc between pods: $$C = 24 \\times \\frac{3\\pi}{2} = 36\\pi$$ m. Since $$C = \\pi d$$, the diameter is $$d = 36$$ m.\n- Step 2: One revolution covers the circumference $$36\\pi \\approx 113.1$$ m in 30 seconds. Speed $$= \\frac{113.1}{30} \\approx 3.77$$ m/s.\n- Step 3: Convert to km/h: $$3.77 \\times 3.6 \\approx 13.6$$ km/h.\n\nThe key insight for the diameter: the arc between consecutive pods is simply the circumference divided by the number of pods, and from the circumference you can extract the diameter immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "In a circle of radius 6 cm, a chord $$AB$$ of length 6 cm subtends angle $$\\theta$$ at the centre. Calculate the area of the minor segment. (3 steps)", "answer": "- Step 1: Since the chord equals the radius, triangle $$OAB$$ is equilateral, so $$\\theta = \\frac{\\pi}{3}$$ radians.\n- Step 2: Area of sector $$= \\frac{1}{2}(6)^2\\left(\\frac{\\pi}{3}\\right) = 6\\pi$$ cm². Area of triangle $$= \\frac{1}{2}(6)^2\\sin\\frac{\\pi}{3} = 18 \\times \\frac{\\sqrt{3}}{2} = 9\\sqrt{3}$$ cm².\n- Step 3: Area of segment $$= 6\\pi - 9\\sqrt{3}$$ cm² (exact), or using the formula: $$\\frac{1}{2}(36)\\left(\\frac{\\pi}{3} - \\sin\\frac{\\pi}{3}\\right) = 18\\left(\\frac{\\pi}{3} - \\frac{\\sqrt{3}}{2}\\right) = 6\\pi - 9\\sqrt{3}$$ cm². Same result ✓.\n\nThis exact-value problem is achievable without a calculator because all the trig values are known exactly for $$\\frac{\\pi}{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Why can't you use the segment area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ directly when the *chord length* is given but $$\\theta$$ is unknown? What must you do first? (2 steps)", "answer": "- Step 1: The formula requires $$\\theta$$ as an input. If only the chord length $$c$$ and radius $$r$$ are given, $$\\theta$$ is not directly known and must be found first.\n- Step 2: Use the relationship between chord, radius, and angle. In the isosceles triangle formed by the two radii and the chord, apply either:\n+ The cosine rule: $$c^2 = r^2 + r^2 - 2r^2\\cos\\theta$$, solving for $$\\theta$$.\n+ Or split the triangle: $$\\sin\\frac{\\theta}{2} = \\frac{c/2}{r}$$, so $$\\theta = 2\\arcsin\\left(\\frac{c}{2r}\\right)$$.\n\nOnly after finding $$\\theta$$ can you substitute into the segment formula.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "A sector $$OAB$$ has radius $$R$$ and angle $$2\\theta$$. A circle of radius $$r$$ is inscribed inside the sector, touching both radii and the arc. Using triangle $$OCE$$ (where $$C$$ is the circle's centre and $$E$$ is a point of tangency on a radius), show that $$R\\sin\\theta = r(1 + \\sin\\theta)$$. (3 steps)", "answer": "- Step 1: In triangle $$OCE$$, the angle at $$O$$ is $$\\theta$$ (half of $$2\\theta$$, by symmetry). The side $$OE = r$$ (the radius of the inscribed circle, since the circle touches the radius at $$E$$). The hypotenuse is $$OC = R - r$$ (the distance from the sector's centre to the inscribed circle's centre, since the inscribed circle touches the arc of radius $$R$$).\n- Step 2: In right triangle $$OCE$$: $$\\sin\\theta = \\frac{CE}{OC} = \\frac{r}{R - r}$$.\n- Step 3: Cross-multiply: $$r = (R-r)\\sin\\theta = R\\sin\\theta - r\\sin\\theta$$. So $$r + r\\sin\\theta = R\\sin\\theta$$, giving $$r(1 + \\sin\\theta) = R\\sin\\theta$$ ✓.\n\nThis result is the foundation for many inscribed-circle-in-sector problems. The key geometric insight is that the distance from the sector centre to the inscribed circle centre is $$R - r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Using small-angle approximations, simplify the expression $$\\frac{\\theta \\cos\\theta}{\\sin\\theta}$$ for small $$\\theta$$. What familiar function does this approximate? (3 steps)", "answer": "- Step 1: Apply each approximation: $$\\sin\\theta \\approx \\theta$$, $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$.\n- Step 2: Substitute: $$\\frac{\\theta\\left(1 - \\frac{\\theta^2}{2}\\right)}{\\theta} = 1 - \\frac{\\theta^2}{2}$$.\n- Step 3: This is the small-angle approximation for $$\\cos\\theta$$ itself! Indeed, $$\\frac{\\theta\\cos\\theta}{\\sin\\theta} = \\frac{\\cos\\theta}{\\frac{\\sin\\theta}{\\theta}}$$. Since $$\\frac{\\sin\\theta}{\\theta} \\to 1$$, this expression approaches $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$. Everything is consistent.\n\nTakeaway: Small-angle approximations are internally consistent — you get the same result regardless of how you decompose an expression.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "The perimeter of a sector is twice the length of its arc. Find the angle of the sector. (2 steps)", "answer": "- Step 1: Let the sector have radius $$r$$ and angle $$\\theta$$ radians. Arc length $$= r\\theta$$. Perimeter $$= r\\theta + 2r$$.\n- Step 2: Set perimeter = 2 × arc: $$r\\theta + 2r = 2r\\theta$$, so $$2r = r\\theta$$, giving $$\\theta = 2$$ radians.\n\nThis is a clean result: the angle is exactly 2 radians (about 114.6°). The problem is solvable because the radius cancels — the answer depends only on the angle, which makes physical sense since the ratio \"perimeter to arc length\" is a dimensionless quantity.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "In the diagram, $$AB$$ is a diameter of a circle with centre $$O$$ and radius 2 cm. Point $$C$$ is on the circumference with $$\\angle COB = \\frac{2\\pi}{3}$$. Find the exact perimeter of the region bounded by chord $$AC$$, arc $$CB$$, and $$AB$$. (3 steps)", "answer": "- Step 1: Since $$AB$$ is a diameter, $$\\angle ACB = \\frac{\\pi}{2}$$ (angle in a semicircle). Also, $$\\angle COA = \\pi - \\frac{2\\pi}{3} = \\frac{\\pi}{3}$$.\n- Step 2: Find the three boundary pieces:\n+ Arc $$CB$$: length $$= r\\theta = 2 \\times \\frac{2\\pi}{3} = \\frac{4\\pi}{3}$$ cm.\n+ Chord $$AC$$: In right triangle $$ACB$$ (right-angled at $$C$$), $$AC = AB\\sin(\\angle ABC)$$. Triangle $$COB$$ is isosceles with $$\\angle COB = \\frac{2\\pi}{3}$$, so $$\\angle OBC = \\frac{\\pi - 2\\pi/3}{2} = \\frac{\\pi}{6}$$. Thus $$AC = 4\\sin\\frac{\\pi}{6} = 4 \\times \\frac{1}{2} = 2$$ cm.\n+ $$AB$$: the diameter $$= 4$$ cm.\n- Step 3: Perimeter $$= \\frac{4\\pi}{3} + 2 + 4 = 6 + \\frac{4\\pi}{3}$$ cm.\n\nThis problem combines circle theorems (angle in a semicircle), radian arc length, and exact trig values — a classic synthesis question.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A student sees the equation $$\\sin\\theta = \\theta$$ and says \"this is true for all small angles.\" Is this statement precisely correct? Explain the distinction between an approximation and an equation. (2 steps)", "answer": "- Step 1: The statement is imprecise. $$\\sin\\theta = \\theta$$ is an **approximation**, not an equation that holds exactly (except at $$\\theta = 0$$). The correct statement is: \"$$\\sin\\theta \\approx \\theta$$ when $$\\theta$$ is small\" or equivalently \"$$\\lim_{\\theta\\to 0}\\frac{\\sin\\theta}{\\theta} = 1$$.\"\n- Step 2: The equation $$\\sin\\theta = \\theta$$ has only one solution: $$\\theta = 0$$. For any non-zero $$\\theta$$, no matter how small, $$\\sin\\theta \\neq \\theta$$ exactly. For example, $$\\sin(0.01) = 0.009999833...$$, not $$0.01$$. The difference is tiny but real. Confusing $$\\approx$$ with $$=$$ is a conceptual error that can lead to wrong conclusions in proofs and derivations.\n\nTakeaway: Approximations are tools for simplification; they are not identities.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "Using small-angle approximations, find an approximation for $$\\tan 2\\theta - \\sin 2\\theta$$ for small $$\\theta$$. (3 steps)", "answer": "- Step 1: Apply approximations with the full argument $$2\\theta$$:\n$$\\tan 2\\theta \\approx 2\\theta$$\n$$\\sin 2\\theta \\approx 2\\theta$$\n- Step 2: Naively, this gives $$2\\theta - 2\\theta = 0$$, which is unhelpful. This means we've lost too much information — we need *more terms* in the expansion.\n- Step 3: Using higher-order approximations: $$\\sin 2\\theta \\approx 2\\theta - \\frac{(2\\theta)^3}{6} = 2\\theta - \\frac{8\\theta^3}{6} = 2\\theta - \\frac{4\\theta^3}{3}$$. And $$\\tan 2\\theta \\approx 2\\theta + \\frac{(2\\theta)^3}{3} = 2\\theta + \\frac{8\\theta^3}{3}$$. So: $$\\tan 2\\theta - \\sin 2\\theta \\approx \\left(2\\theta + \\frac{8\\theta^3}{3}\\right) - \\left(2\\theta - \\frac{4\\theta^3}{3}\\right) = \\frac{12\\theta^3}{3} = 4\\theta^3$$.\n\nThe lesson: when the leading terms cancel, you must include the next-order terms. This is a common exam trick — the \"obvious\" approximation gives zero, but the true answer is non-zero at a higher order.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "A point $$C$$ lies on the major arc $$AB$$ of a circle with centre $$O$$ and radius 8.5 cm. Given that $$\\angle ACB = 0.4$$ radians, find the length of the minor arc $$AB$$. (3 steps)", "answer": "- Step 1: Use the circle theorem: the angle at the centre is twice the angle at the circumference subtended by the same arc. Since $$C$$ is on the major arc, $$\\angle ACB$$ is the angle at the circumference subtended by the minor arc $$AB$$.\n- Step 2: Therefore $$\\angle AOB = 2 \\times 0.4 = 0.8$$ radians.\n- Step 3: Minor arc length $$= r\\theta = 8.5 \\times 0.8 = 6.8$$ cm.\n\nThe key circle theorem here is: \"angle at centre = 2 × angle at circumference\" (when subtended by the same chord). This works in radians exactly as it does in degrees.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "A sector $$OPQ$$ has centre $$O$$, radius 10 cm, and angle 0.3 radians. Point $$R$$ divides $$OQ$$ in the ratio $$OR:RQ = 1:3$$. Find the perimeter of the shaded region bounded by $$QR$$, $$RP$$, and arc $$PQ$$. (3 steps)", "answer": "- Step 1: Find the lengths of the boundary pieces. $$OQ = 10$$, so $$OR = \\frac{10}{4} = 2.5$$ cm and $$RQ = 10 - 2.5 = 7.5$$ cm.\n- Step 2: Arc $$PQ = r\\theta = 10 \\times 0.3 = 3$$ cm. For $$RP$$: since $$P$$ is on the circle of radius 10 and $$R$$ is at distance 2.5 from $$O$$, use the cosine rule in triangle $$ORP$$: $$RP^2 = 10^2 + 2.5^2 - 2(10)(2.5)\\cos(0.3) = 100 + 6.25 - 50\\cos(0.3) \\approx 106.25 - 48.86 = 57.39$$, so $$RP \\approx 7.58$$ cm.\n- Step 3: Perimeter $$= RQ + RP + \\text{arc } PQ = 7.5 + 7.58 + 3 \\approx 18.1$$ cm (3 s.f.).\n\nThe challenge here is identifying the three boundary pieces and using the cosine rule for the non-trivial side $$RP$$.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "Two tangent lines $$AB$$ and $$AC$$ touch a circle at $$B$$ and $$C$$ respectively, with centre $$O$$ and radius 3.6 cm. If $$\\angle BOC = \\frac{2\\pi}{3}$$, find the area of the shaded region (the region inside the tangents and the minor arc). (4 steps)", "answer": "- Step 1: The tangent is perpendicular to the radius at the point of contact, so $$\\angle OBA = \\angle OCA = 90°$$. In quadrilateral $$OBA C$$, the angles sum to $$2\\pi$$: $$\\angle BAC = 2\\pi - \\frac{\\pi}{2} - \\frac{\\pi}{2} - \\frac{2\\pi}{3} = 2\\pi - \\pi - \\frac{2\\pi}{3} = \\pi - \\frac{2\\pi}{3} = \\frac{\\pi}{3}$$.\n- Step 2: Find the tangent lengths. In triangle $$OBA$$: $$\\tan\\left(\\frac{\\pi}{3}\\right) = \\frac{AB}{OB}$$... Wait, let me reconsider. The angle $$\\angle AOB = \\pi - \\frac{\\pi}{3} = \\frac{2\\pi}{3}$$... No. Let me be more careful. Since $$\\angle OBA = 90°$$ and triangle $$OBA$$ is right-angled at $$B$$: the angle at $$O$$ in this triangle is half of $$\\angle BOC = \\frac{\\pi}{3}$$ (by symmetry, the line $$OA$$ bisects $$\\angle BOC$$). So $$AB = OB\\tan\\frac{\\pi}{3} = 3.6\\sqrt{3}$$.\n- Step 3: Area of triangle $$OAB$$: $$\\frac{1}{2}(OB)(AB) = \\frac{1}{2}(3.6)(3.6\\sqrt{3}) = 6.48\\sqrt{3}$$ cm². Total triangle area (two triangles) $$= 12.96\\sqrt{3}$$ cm². Area of sector $$BOC$$: $$\\frac{1}{2}(3.6)^2\\left(\\frac{2\\pi}{3}\\right) = 4.32\\pi$$ cm².\n- Step 4: Shaded area = total triangle area − sector area $$= 12.96\\sqrt{3} - 4.32\\pi \\approx 22.45 - 13.57 = 8.88$$ cm² (3 s.f.).\n\nThis is a \"triangles minus sector\" problem — the mirror image of the segment formula (which is \"sector minus triangle\").", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "In the diagram, arcs $$AD$$ and $$BC$$ are arcs of circles with centre $$O$$. $$OA = OD = r$$ cm, $$AB = DC = 8$$ cm, and $$\\angle BOC = \\theta$$ radians. The area of the shaded region is 48 cm². Show that $$r = \\frac{6}{\\theta} - 4$$. (3 steps)", "answer": "- Step 1: The shaded region is bounded by two arcs and two straight lines. It's the difference between a large sector (radius $$r + 8$$, angle $$\\theta$$) and a small sector (radius $$r$$, angle $$\\theta$$).\n- Step 2: Area of large sector $$= \\frac{1}{2}(r+8)^2\\theta$$. Area of small sector $$= \\frac{1}{2}r^2\\theta$$. Shaded area $$= \\frac{1}{2}(r+8)^2\\theta - \\frac{1}{2}r^2\\theta = \\frac{\\theta}{2}[(r+8)^2 - r^2] = \\frac{\\theta}{2}(16r + 64) = \\theta(8r + 32)$$.\n- Step 3: Set equal to 48: $$\\theta(8r + 32) = 48$$, so $$8r + 32 = \\frac{48}{\\theta}$$, giving $$8r = \\frac{48}{\\theta} - 32$$, and $$r = \\frac{6}{\\theta} - 4$$ ✓.\n\nThe algebraic trick: expanding $$(r+8)^2 - r^2$$ gives a linear expression in $$r$$ (the $$r^2$$ terms cancel), which makes the equation solvable.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "Why do small-angle approximations only work when the angle is in radians? What would go wrong if you tried to approximate $$\\sin(0.1°) \\approx 0.1$$? (3 steps)", "answer": "- Step 1: The small-angle approximation $$\\sin\\theta \\approx \\theta$$ is derived from the Maclaurin series, which is defined with $$\\theta$$ in radians. The series $$\\sin\\theta = \\theta - \\frac{\\theta^3}{6} + \\cdots$$ only holds when $$\\theta$$ is measured in radians.\n- Step 2: If $$\\theta = 0.1°$$, then $$\\theta$$ in radians is $$\\frac{0.1\\pi}{180} \\approx 0.001745$$. The approximation $$\\sin(0.1°) \\approx 0.001745$$ is correct (to 10 decimal places). But writing $$\\sin(0.1°) \\approx 0.1$$ would be wildly wrong — the actual value is about 0.001745.\n- Step 3: The reason is that radians are the \"natural\" angle measure where the arc length on a unit circle equals the angle. In degrees, there's a hidden conversion factor. The Maclaurin series coefficients ($$\\frac{1}{6}$$, $$\\frac{1}{120}$$, etc.) are calibrated for radians; using degrees would insert factors of $$\\frac{\\pi}{180}$$ everywhere, destroying the simplicity.\n\nTakeaway: Small-angle approximations are a radian-exclusive tool. Never apply them to angles in degrees.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "The shape of a badge is a sector $$ABC$$ where triangle $$ABC$$ is equilateral with perpendicular height 3 cm. Find the length of $$AB$$ in surd form. (2 steps)", "answer": "- Step 1: In an equilateral triangle with perpendicular height 3 cm, the height is $$\\frac{\\sqrt{3}}{2} \\times \\text{side length}$$. So if side length $$= s$$, then $$\\frac{\\sqrt{3}}{2}s = 3$$.\n- Step 2: Therefore $$s = \\frac{6}{\\sqrt{3}} = \\frac{6\\sqrt{3}}{3} = 2\\sqrt{3}$$ cm. So $$AB = 2\\sqrt{3}$$ cm.\n\nThis is a standard exact-value geometry setup. The equilateral triangle's height-to-side ratio of $$\\frac{\\sqrt{3}}{2}$$ is one of those relationships that should be second nature.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "For the badge in Q55 (equilateral triangle with side $$2\\sqrt{3}$$ cm), find the area of the badge (the sector with centre $$A$$ and radius $$AB$$) in terms of $$\\pi$$. (3 steps)", "answer": "- Step 1: The sector has centre $$A$$, radius $$r = 2\\sqrt{3}$$ cm, and angle $$\\angle BAC = \\frac{\\pi}{3}$$ radians (60°, since the triangle is equilateral).\n- Step 2: Area $$= \\frac{1}{2}r^2\\theta = \\frac{1}{2}(2\\sqrt{3})^2\\left(\\frac{\\pi}{3}\\right) = \\frac{1}{2}(12)\\left(\\frac{\\pi}{3}\\right) = 2\\pi$$ cm².\n\nThis elegant result — the sector area is exactly $$2\\pi$$ — comes from the nice numbers in the problem. In an exam, this is the kind of answer that should make you confident: clean exact values usually mean you're on the right track.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Prove that the perimeter of the badge (sector with centre $$A$$, radius $$2\\sqrt{3}$$, angle $$\\frac{\\pi}{3}$$) is $$\\frac{2\\sqrt{3}}{3}(\\pi + 6)$$ cm. (3 steps)", "answer": "- Step 1: The perimeter consists of the arc $$BC$$ plus the two radii $$AB$$ and $$AC$$.\n- Step 2: Arc $$BC = r\\theta = 2\\sqrt{3} \\times \\frac{\\pi}{3} = \\frac{2\\sqrt{3}\\pi}{3}$$ cm. The two radii: $$AB + AC = 2\\sqrt{3} + 2\\sqrt{3} = 4\\sqrt{3}$$ cm.\n- Step 3: Total perimeter $$= \\frac{2\\sqrt{3}\\pi}{3} + 4\\sqrt{3} = \\frac{2\\sqrt{3}\\pi}{3} + \\frac{12\\sqrt{3}}{3} = \\frac{2\\sqrt{3}(\\pi + 6)}{3}$$ cm ✓.\n\nThe algebraic move: factor out $$\\frac{2\\sqrt{3}}{3}$$ from both terms. This is the exam's preferred form — factored and simplified.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "There is a straight path of 70 m from $$A$$ to $$B$$. A railway track in the form of an arc of a circle with centre $$C$$ and radius 44 m also connects $$A$$ and $$B$$. Show that $$\\angle ACB \\approx 1.84$$ radians. (3 steps)", "answer": "- Step 1: The chord $$AB = 70$$ m in a circle of radius 44 m. The perpendicular from $$C$$ to the midpoint of $$AB$$ splits the isosceles triangle into two right-angled triangles.\n- Step 2: In the right triangle: $$\\sin\\frac{\\theta}{2} = \\frac{35}{44}$$, so $$\\frac{\\theta}{2} = \\arcsin\\left(\\frac{35}{44}\\right) \\approx 0.9200$$ radians.\n- Step 3: Therefore $$\\theta = 2 \\times 0.9200 \\approx 1.84$$ radians ✓.\n\nThe perpendicular-bisector technique is almost always the cleanest way to find a central angle from a chord length — much simpler than the cosine rule.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "A glass prism has cross-section with straight sides $$AD = BC = 4$$ cm perpendicular to $$DC$$, and top $$AB$$ which is an arc of a circle with centre $$O$$ and radius 6 cm. Given that $$\\angle AOB = 2\\theta$$ and the perimeter of the cross-section is $$2(7+\\pi)$$ cm, show that $$2\\theta + 2\\sin\\theta - 1 = \\frac{\\pi}{3}$$. (4 steps)", "answer": "- Step 1: The perimeter consists of: arc $$AB$$ + straight sides $$AD + BC$$ + base $$DC$$. Arc $$AB = r \\times 2\\theta = 6 \\times 2\\theta = 12\\theta$$. The straight sides: $$AD = BC = 4$$, so $$AD + BC = 8$$.\n- Step 2: For the base $$DC$$: draw perpendiculars from $$A$$ and $$B$$ to $$DC$$, or note that the horizontal distance from $$A$$ to the midpoint of $$AB$$'s projection is $$6\\sin\\theta$$, so $$DC = 2 \\times 6\\sin\\theta + \\text{(gap)}$$... Actually, let me think about this more carefully. The distance from $$O$$ to $$AB$$ is $$6\\cos\\theta$$. The distance from $$O$$ to $$DC$$ is $$6\\cos\\theta + 4$$ (adding the perpendicular side of length 4). But wait — I need to find $$DC$$. By symmetry, the midpoint of $$AB$$ is directly below/above $$O$$. The half-width from the midpoint of $$AB$$ to $$A$$ is $$6\\sin\\theta$$. Similarly, the half-width from the midpoint of $$DC$$ to $$D$$ is also $$6\\sin\\theta$$ (since $$AD$$ is vertical). So $$DC = 2 \\times 6\\sin\\theta = 12\\sin\\theta$$.\n- Step 3: Total perimeter $$= 12\\theta + 8 + 12\\sin\\theta = 2(7 + \\pi) = 14 + 2\\pi$$. So: $$12\\theta + 12\\sin\\theta + 8 = 14 + 2\\pi$$, giving $$12\\theta + 12\\sin\\theta = 6 + 2\\pi$$.\n- Step 4: Divide by 6: $$2\\theta + 2\\sin\\theta = 1 + \\frac{\\pi}{3}$$, hence $$2\\theta + 2\\sin\\theta - 1 = \\frac{\\pi}{3}$$ ✓.\n\nThis problem requires careful geometric reasoning about the cross-section — drawing the diagram is essential.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "For the glass prism (Q59), verify that $$\\theta = \\frac{\\pi}{6}$$ satisfies the equation $$2\\theta + 2\\sin\\theta - 1 = \\frac{\\pi}{3}$$. (2 steps)", "answer": "- Step 1: Substitute $$\\theta = \\frac{\\pi}{6}$$: $$2\\left(\\frac{\\pi}{6}\\right) + 2\\sin\\left(\\frac{\\pi}{6}\\right) - 1 = \\frac{\\pi}{3} + 2 \\times \\frac{1}{2} - 1 = \\frac{\\pi}{3} + 1 - 1 = \\frac{\\pi}{3}$$ ✓.\n- Step 2: Since the left side equals the right side, $$\\theta = \\frac{\\pi}{6}$$ is verified. Note: \"verify\" means plug in and confirm — you don't need to *solve* the equation from scratch.\n\nThe exact trig value $$\\sin\\frac{\\pi}{6} = \\frac{1}{2}$$ makes this verification clean. This is why memorising exact values matters.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "Using $$\\theta = \\frac{\\pi}{6}$$ for the prism (Q59-60), find the area of the cross-section. (3 steps)", "answer": "- Step 1: The cross-section is bounded by arc $$AB$$ and the three straight sides. Its area = area of sector $$OAB$$ + area of rectangle below (the part between the sector and the base $$DC$$).\n- Step 2: Area of sector $$OAB = \\frac{1}{2}(6)^2\\left(\\frac{\\pi}{3}\\right) = 6\\pi$$ cm². The rectangular region below has width $$DC = 12\\sin\\frac{\\pi}{6} = 12 \\times \\frac{1}{2} = 6$$ cm and height $$AD = 4$$ cm, so its area $$= 6 \\times 4 = 24$$ cm². But we need to subtract the triangle $$OAB$$ from the sector and add the rectangle. Actually, let me reconsider: the cross-section area = (area of sector $$OAB$$) − (area of triangle $$OAB$$) + (area of rectangle with base $$DC$$ and height 4).\n- Step 3: Area of triangle $$OAB = \\frac{1}{2}(6)^2\\sin\\frac{\\pi}{3} = 18 \\times \\frac{\\sqrt{3}}{2} = 9\\sqrt{3}$$ cm². Area of rectangle $$= 6 \\times 4 = 24$$ cm². Total area $$= 6\\pi - 9\\sqrt{3} + 24$$ cm², which evaluates to approximately $$18.85 - 15.59 + 24 = 27.26$$ cm².\n\nThe structure: segment of arc + rectangle = (sector − triangle) + rectangle.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "A chord $$PQ$$ of a circle with centre $$O$$ and radius 6 cm divides the circle into two segments. The minor segment has area $$A_1$$ and the major segment has area $$A_2$$. If $$A_2 = 3A_1$$, show that $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$. (3 steps)", "answer": "- Step 1: Express both areas. $$A_1 = \\frac{1}{2}(36)(\\theta - \\sin\\theta) = 18(\\theta - \\sin\\theta)$$. $$A_2 = \\text{area of circle} - A_1 = 36\\pi - 18(\\theta - \\sin\\theta)$$.\n- Step 2: Set $$A_2 = 3A_1$$: $$36\\pi - 18(\\theta - \\sin\\theta) = 3 \\times 18(\\theta - \\sin\\theta) = 54(\\theta - \\sin\\theta)$$.\n- Step 3: So: $$36\\pi = 54(\\theta - \\sin\\theta) + 18(\\theta - \\sin\\theta) = 72(\\theta - \\sin\\theta)$$. Therefore $$\\theta - \\sin\\theta = \\frac{36\\pi}{72} = \\frac{\\pi}{2}$$, which rearranges to $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$ ✓.\n\nThe insight: when the major segment is 3 times the minor segment, the minor segment is one-quarter of the circle's area. This gives a clean equation relating $$\\theta$$ and $$\\sin\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Solve $$3\\sin\\theta - 1 = 0$$ for $$0 \\leq \\theta \\leq 2\\pi$$, giving answers to 3 significant figures. Explain why there are exactly two solutions. (3 steps)", "answer": "- Step 1: Rearrange: $$\\sin\\theta = \\frac{1}{3}$$. Use a calculator (in radians mode) to find the principal value: $$\\theta_1 = \\arcsin\\frac{1}{3} \\approx 0.340$$ rad.\n- Step 2: Sine is positive in Q1 and Q2, so the second solution is $$\\theta_2 = \\pi - 0.340 \\approx 2.80$$ rad.\n- Step 3: There are exactly two solutions because on the interval $$[0, 2\\pi]$$, the horizontal line $$y = \\frac{1}{3}$$ crosses the sine curve exactly twice — once on the way up in Q1, and once on the way down in Q2.\n\n+ Common error: giving only the principal value. Always check all quadrants consistent with the sign of the trig value.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "Solve $$\\cos 2\\theta = -\\frac{1}{2}$$ for $$0 \\leq \\theta \\leq 2\\pi$$. How many solutions do you expect, and why? (3 steps)", "answer": "- Step 1: Let $$\\phi = 2\\theta$$. Then $$\\cos\\phi = -\\frac{1}{2}$$ with $$0 \\leq \\phi \\leq 4\\pi$$. The reference angle is $$\\frac{\\pi}{3}$$, and cosine is negative in Q2 and Q3.\n- Step 2: Solutions for $$\\phi$$: $$\\frac{2\\pi}{3}, \\frac{4\\pi}{3}, \\frac{2\\pi}{3} + 2\\pi = \\frac{8\\pi}{3}, \\frac{4\\pi}{3} + 2\\pi = \\frac{10\\pi}{3}$$.\n- Step 3: Converting back: $$\\theta = \\frac{\\phi}{2}$$, so $$\\theta = \\frac{\\pi}{3}, \\frac{2\\pi}{3}, \\frac{4\\pi}{3}, \\frac{5\\pi}{3}$$. Four solutions total.\n\nThe principle: when the argument is $$n\\theta$$, the domain for $$\\theta$$ of length $$2\\pi$$ corresponds to a domain for $$n\\theta$$ of length $$2n\\pi$$, giving $$n$$ full periods of the trig function — hence roughly $$2n$$ solutions for a simple equation.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "Using small-angle approximations, show that for small $$\\theta$$, $$\\frac{1-\\cos\\theta}{\\theta\\sin\\theta} \\approx \\frac{1}{2}$$. (3 steps)", "answer": "- Step 1: Apply approximations: $$1 - \\cos\\theta \\approx 1 - \\left(1 - \\frac{\\theta^2}{2}\\right) = \\frac{\\theta^2}{2}$$. And $$\\theta\\sin\\theta \\approx \\theta \\times \\theta = \\theta^2$$.\n- Step 2: Substitute: $$\\frac{1 - \\cos\\theta}{\\theta\\sin\\theta} \\approx \\frac{\\frac{\\theta^2}{2}}{\\theta^2} = \\frac{1}{2}$$.\n- Step 3: This result makes intuitive sense: near the origin, cosine curves down parabolically while sine rises linearly. The ratio of the \"drop from 1\" to the \"rise from 0\" (scaled by $$\\theta$$) approaches a constant $$\\frac{1}{2}$$.\n\nThis is a classic exam-style small-angle problem: substitute, simplify, get a clean constant. The $$\\theta$$'s always cancel when the approximation is done correctly.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "A student writes $$\\cos 3\\theta \\approx 1 - \\frac{3\\theta^2}{2}$$ using small-angle approximations. Is this correct? If not, what is the right answer? (2 steps)", "answer": "- Step 1: The small-angle approximation for cosine is $$\\cos x \\approx 1 - \\frac{x^2}{2}$$ where $$x$$ is the *entire argument*. Here $$x = 3\\theta$$, so: $$\\cos 3\\theta \\approx 1 - \\frac{(3\\theta)^2}{2} = 1 - \\frac{9\\theta^2}{2}$$.\n- Step 2: The student's answer $$1 - \\frac{3\\theta^2}{2}$$ is **incorrect** — they substituted only the $$\\theta$$ into the formula but forgot to square the coefficient 3. The correct answer is $$1 - \\frac{9\\theta^2}{2}$$.\n\nThis is the most common small-angle error: failing to substitute the *full argument* into the approximation template.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": true}, {"question": "A circle of radius 5 cm has a minor arc of length 6.4 cm. Find the acute angle $$\\angle AOB$$ in radians, the area of the minor sector $$R_1$$, and the ratio $$R_1 : R_2$$ where $$R_2$$ is the area of the major sector, in the form $$1 : p$$. (3 steps)", "answer": "- Step 1: Angle: $$\\theta = \\frac{l}{r} = \\frac{6.4}{5} = 1.28$$ radians.\n- Step 2: Area of minor sector: $$R_1 = \\frac{1}{2}(5)^2(1.28) = 16$$ cm².\n- Step 3: Area of major sector: $$R_2 = \\pi r^2 - R_1 = 25\\pi - 16 \\approx 62.54$$ cm². Ratio: $$R_1 : R_2 = 16 : 62.54 = 1 : 3.91$$ (3 s.f.).\n\nThe ratio of sector areas equals the ratio of the angles (since both sectors share the same radius). So $$R_1 : R_2 = 1.28 : (2\\pi - 1.28)$$, which gives the same result.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "A triangular plot has sides 12 m, 14 m, and 10 m. A lawn is a sector of a circle with centre at the vertex between the 12 m and 10 m sides, with radius 6 m. Show that the angle at this vertex is approximately 1.37 radians, then find the area of the flowerbed (the region between the lawn and the triangle boundary). (3 steps)", "answer": "- Step 1: Use the cosine rule to find the angle at vertex $$A$$ (between sides 12 and 10): $$14^2 = 12^2 + 10^2 - 2(12)(10)\\cos A$$, so $$196 = 144 + 100 - 240\\cos A$$, giving $$\\cos A = \\frac{48}{240} = 0.2$$. Thus $$A = \\arccos(0.2) \\approx 1.3694 \\approx 1.37$$ rad (3 s.f.) ✓.\n- Step 2: Area of the lawn (sector) $$= \\frac{1}{2}(6)^2(1.3694) = 18(1.3694) \\approx 24.65$$ m². Area of triangle $$= \\frac{1}{2}(12)(10)\\sin(1.3694) = 60\\sin(1.3694)$$. Since $$\\sin(1.3694) = \\sqrt{1 - 0.04} = \\sqrt{0.96} \\approx 0.9798$$, area of triangle $$\\approx 58.79$$ m².\n- Step 3: Area of flowerbed $$= \\text{area of triangle} - \\text{area of sector} = 58.79 - 24.65 = 34.1$$ m² (3 s.f.).\n\nThis \"sector cut from a triangle\" pattern is very common: the shaded region is the triangle minus the sector.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "Explain why, for a segment of a circle, the area formula $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ gives the *minor* segment when $$0 < \\theta \\leq \\pi$$, and the *major* segment when $$\\pi < \\theta < 2\\pi$$. What happens at $$\\theta = \\pi$$? (3 steps)", "answer": "- Step 1: For $$0 < \\theta \\leq \\pi$$: The sector is the minor sector (or a semicircle at $$\\theta = \\pi$$). The triangle has area $$\\frac{1}{2}r^2\\sin\\theta \\geq 0$$. The segment $$= \\text{sector} - \\text{triangle}$$ is the smaller region between the chord and arc, i.e., the minor segment.\n- Step 2: For $$\\pi < \\theta < 2\\pi$$: The sector is the major sector. The formula $$\\frac{1}{2}r^2\\sin\\theta$$ is negative (since $$\\sin\\theta < 0$$ in this range). So $$\\theta - \\sin\\theta > \\theta$$, and the formula gives an area larger than the sector area — this is the *major* segment (sector + triangle, since the triangle is on the \"other side\").\n- Step 3: At $$\\theta = \\pi$$: The sector is a semicircle, and the \"segment\" degenerates. The formula gives $$\\frac{1}{2}r^2(\\pi - 0) = \\frac{\\pi r^2}{2}$$, which is exactly the semicircle area. The chord is the diameter, so the \"segment\" and \"sector\" are the same region.\n\nTakeaway: The same formula handles both minor and major segments — the sign of $$\\sin\\theta$$ automatically adjusts which region you get.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": true}, {"question": "Using small-angle approximations, approximate $$\\sec\\theta - \\cos\\theta$$ for small $$\\theta$$. (Recall $$\\sec\\theta = \\frac{1}{\\cos\\theta}$$.) (3 steps)", "answer": "- Step 1: Write $$\\sec\\theta = \\frac{1}{\\cos\\theta}$$. Using $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, we get: $$\\sec\\theta \\approx \\frac{1}{1 - \\frac{\\theta^2}{2}}$$.\n- Step 2: For small $$\\theta$$, $$\\frac{\\theta^2}{2}$$ is tiny, so use the binomial approximation $$\\frac{1}{1-x} \\approx 1+x$$: $$\\sec\\theta \\approx 1 + \\frac{\\theta^2}{2}$$.\n- Step 3: Therefore: $$\\sec\\theta - \\cos\\theta \\approx \\left(1 + \\frac{\\theta^2}{2}\\right) - \\left(1 - \\frac{\\theta^2}{2}\\right) = \\theta^2$$.\n\nThis is a beautiful result: for small angles, the difference between secant and cosine is approximately $$\\theta^2$$. It illustrates how two functions that are both approximately 1 near the origin can still have a non-trivial difference captured by the next-order term.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": true}], "count": 70}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the definition of 1 radian? (2 steps)", "answer": "- Step 1: A radian is the angle subtended at the **center of a circle** by an **arc whose length equals the radius** of the circle.  \n- Step 2: This means if the arc length $ s = r $, the angle $ \\theta = 1 $ radian.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why are radians used in calculus instead of degrees?", "answer": "- Step 1: Radians simplify derivative and integral formulas for trigonometric functions (e.g., $ \\frac{d}{d\\theta} \\sin\\theta = \\cos\\theta $ only holds if $ \\theta $ is in radians).  \n- Step 2: Radians are dimensionless and directly relate arc length to radius (via $ s = r\\theta $), making them a natural unit for calculus.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "Convert $ \\frac{3\\pi}{4} $ radians to degrees. (2 steps)", "answer": "- Step 1: Use the conversion factor $ \\frac{180^\\circ}{\\pi} $:  \n  $ \\frac{3\\pi}{4} \\times \\frac{180^\\circ}{\\pi} = \\frac{3 \\times 180^\\circ}{4} $.  \n- Step 2: Simplify: $ \\frac{540^\\circ}{4} = 135^\\circ $.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Convert $ 210^\\circ $ to radians. (2 steps)", "answer": "- Step 1: Use the conversion factor $ \\frac{\\pi}{180^\\circ} $:  \n  $ 210^\\circ \\times \\frac{\\pi}{180^\\circ} = \\frac{7\\pi}{6} $.  \n- Step 2: Simplify the fraction: $ \\frac{7\\pi}{6} $ radians.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is the exact radian measure of $ 30^\\circ $?", "answer": "- Step 1: $ 30^\\circ $ is $ \\frac{1}{12} $ of a full circle ($ 360^\\circ $).  \n- Step 2: In radians: $ \\frac{2\\pi}{12} = \\frac{\\pi}{6} $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does the formula $ s = r\\theta $ require $ \\theta $ to be in radians? (3 steps)", "answer": "- Step 1: The definition of a radian directly ties $ \\theta $ to arc length: $ 1 $ radian corresponds to $ s = r $.  \n- Step 2: For $ \\theta $ in radians, the proportion $ \\frac{\\theta}{2\\pi} = \\frac{s}{2\\pi r} $ simplifies to $ s = r\\theta $.  \n- Step 3: Degrees would require an extra conversion factor (e.g., $ s = r \\cdot \\frac{\\pi\\theta}{180} $), complicating the formula.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Find the arc length $ s $ for a circle with radius $ 5 $ cm and angle $ 1.2 $ radians.", "answer": "- Step 1: Use $ s = r\\theta $: $ s = 5 \\times 1.2 = 6 $ cm.  \n- Step 2: Verify units: radians are dimensionless, so the result is in cm.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "The perimeter of a sector is $ 20 $ cm, and the radius is $ 6 $ cm. Find the angle $ \\theta $ in radians. (3 steps)", "answer": "- Step 1: Perimeter $ P = 2r + r\\theta $.  \n- Step 2: Substitute known values: $ 20 = 2(6) + 6\\theta \\Rightarrow 20 = 12 + 6\\theta $.  \n- Step 3: Solve for $ \\theta $: $ \\theta = \\frac{20 - 12}{6} = \\frac{8}{6} = \\frac{4}{3} $ radians.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the area of a sector $ \\frac{1}{2}r^2\\theta $? (3 steps)", "answer": "- Step 1: A sector’s area is proportional to its angle: $ \\frac{\\theta}{2\\pi} \\times \\pi r^2 $.  \n- Step 2: Simplify: $ \\frac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\frac{1}{2}r^2\\theta $.  \n- Step 3: This only works for $ \\theta $ in radians because the proportionality relies on $ 2\\pi $ radians being the full circle.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Calculate the area of a segment with radius $ 8 $ cm and angle $ \\frac{\\pi}{3} $ radians. (4 steps)", "answer": "- Step 1: Use the segment area formula: $ \\frac{1}{2}r^2(\\theta - \\sin\\theta) $.  \n- Step 2: Plug in values: $ \\frac{1}{2} \\cdot 8^2 \\cdot \\left( \\frac{\\pi}{3} - \\sin\\left( \\frac{\\pi}{3} \\right) \\right) $.  \n- Step 3: $ \\sin\\left( \\frac{\\pi}{3} \\right) = \\frac{\\sqrt{3}}{2} $, so:  \n  $ 32 \\cdot \\left( \\frac{\\pi}{3} - \\frac{\\sqrt{3}}{2} \\right) \\approx 32(1.047 - 0.866) \\approx 32(0.181) \\approx 5.79 $ cm².", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you solve $ \\sin\\theta = \\frac{1}{2} $ in radians for $ 0 \\leq \\theta < 2\\pi $? (3 steps)", "answer": "- Step 1: Reference angle: $ \\theta = \\frac{\\pi}{6} $ (since $ \\sin\\frac{\\pi}{6} = \\frac{1}{2} $).  \n- Step 2: Solutions in the range:  \n  $ \\theta = \\frac{\\pi}{6} $ (first quadrant) and $ \\theta = \\frac{5\\pi}{6} $ (second quadrant).", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why is $ \\sin\\theta \\approx \\theta $ for small angles in radians? (3 steps)", "answer": "- Step 1: The Taylor series for $ \\sin\\theta $ is $ \\theta - \\frac{\\theta^3}{6} + \\dots $.  \n- Step 2: For small $ \\theta $, higher-order terms ($ \\theta^3 $, etc.) become negligible.  \n- Step 3: Thus, $ \\sin\\theta \\approx \\theta $ when $ \\theta $ is near $ 0 $ radians.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Compare $ \\cos\\theta \\approx 1 - \\frac{\\theta^2}{2} $ to the exact value of $ \\cos(0.1) $. (2 steps)", "answer": "- Step 1: Approximate $ \\cos(0.1) \\approx 1 - \\frac{(0.1)^2}{2} = 1 - 0.005 = 0.995 $.  \n- Step 2: Exact value (using calculator): $ \\cos(0.1) \\approx 0.99517 $, showing the approximation is accurate.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the radian measure of a reflex angle $ \\angle AOB $ if the minor sector angle is $ 0.8 $ radians?", "answer": "- Step 1: Total angle in a circle: $ 2\\pi $ radians.  \n- Step 2: Reflex angle = $ 2\\pi - 0.8 \\approx 6.283 - 0.8 = 5.483 $ radians.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "A Ferris wheel has 12 equally spaced pods. If the arc length between pods is $ \\frac{5\\pi}{6} $ meters, what is the diameter of the wheel? (3 steps)", "answer": "- Step 1: Total circumference $ C = 12 \\times \\frac{5\\pi}{6} = 10\\pi $ meters.  \n- Step 2: Circumference formula $ C = \\pi d \\Rightarrow d = \\frac{C}{\\pi} = \\frac{10\\pi}{\\pi} = 10 $ meters.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why is the area of a segment $ \\frac{1}{2}r^2(\\theta - \\sin\\theta) $? (4 steps)", "answer": "- Step 1: Segment area = sector area $ \\frac{1}{2}r^2\\theta $ minus triangle area $ \\frac{1}{2}r^2\\sin\\theta $.  \n- Step 2: Triangle area uses $ \\frac{1}{2}ab\\sin C $ for two radii and chord.  \n- Step 3: Subtract: $ \\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta) $.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "Solve $ \\tan\\theta = \\theta $ for small $ \\theta $ in radians. (2 steps)", "answer": "- Step 1: Use small-angle approximation $ \\tan\\theta \\approx \\theta $.  \n- Step 2: Equation becomes $ \\theta \\approx \\theta $, which holds for $ \\theta \\approx 0 $ (e.g., $ \\theta = 0 $ is a solution).", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "A sector has area $ 24 $ cm² and radius $ 6 $ cm. Find $ \\theta $. (3 steps)", "answer": "- Step 1: Use $ A = \\frac{1}{2}r^2\\theta \\Rightarrow 24 = \\frac{1}{2} \\cdot 36 \\cdot \\theta $.  \n- Step 2: Solve: $ 24 = 18\\theta \\Rightarrow \\theta = \\frac{24}{18} = \\frac{4}{3} $ radians.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is $ \\theta $ in radians dimensionless?", "answer": "- Step 1: Radians are defined as the ratio of arc length to radius ($ \\theta = \\frac{s}{r} $), both measured in length units.  \n- Step 2: The units cancel, leaving $ \\theta $ dimensionless.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": true}, {"question": "A sector has perimeter $ 16 $ cm and arc length $ 6 $ cm. Find the radius $ r $. (2 steps)", "answer": "- Step 1: Perimeter $ P = 2r + s \\Rightarrow 16 = 2r + 6 $.  \n- Step 2: Solve: $ 2r = 10 \\Rightarrow r = 5 $ cm.  \n``` \n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Radian Measure** |  |\n| Radian | Unit of angle defined by arc length equal to radius; $ 2\\pi $ radians = $ 360^\\circ $. |\n| Degree | Unit of angle where $ 1^\\circ = \\frac{\\pi}{180} $ radians. |\n| **Arc Length** |  |\n| Sector | Region bounded by two radii and an arc. |\n| Arc Length | $ s = r\\theta $; $ \\theta $ in radians. |\n| **Areas of Sectors and Segments** |  |\n| Segment | Region bounded by a chord and an arc. |\n| Area of Sector | $ \\frac{1}{2}r^2\\theta $. |\n| Area of Segment | $ \\frac{1}{2}r^2(\\theta - \\sin\\theta) $. |\n| **Trigonometric Equations** |  |\n| Solving in Radians | Use unit circle and exact values (e.g., $ \\theta = \\frac{\\pi}{6}, \\frac{5\\pi}{6} $ for $ \\sin\\theta = \\frac{1}{2} $). |\n| **Small-Angle Approximations** |  |\n| Small-Angle Approximations | $ \\sin\\theta \\approx \\theta $, $ \\cos\\theta \\approx 1 - \\frac{\\theta^2}{2} $, $ \\tan\\theta \\approx \\theta $ for $ \\theta $ near 0 radians. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Radian Measure** |  |  |\n| $$1 \\text{ radian} = ?^\\circ$$ | $$= \\frac{180^\\circ}{\\pi} \\approx 57.3^\\circ$$ | Radian to degree conversion. |\n| $$1^\\circ = ? \\text{ radians}$$ | $$= \\frac{\\pi}{180}$$ | Degree to radian conversion. |\n| **Arc Length** |  |  |\n| $$s = ?$$ | $$= r\\theta$$ | Arc length formula. |\n| **Areas of Sectors and Segments** |  |  |\n| $$A_{\\text{sector}} = ?$$ | $$= \\frac{1}{2}r^2\\theta$$ | Area of a sector. |\n| $$A_{\\text{segment}} = ?$$ | $$= \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ | Area of a segment. |\n| **Small-Angle Approximations** |  |  |\n| $$\\sin\\theta \\approx ?$$ | $$= \\theta$$ | Small-angle sine approximation. |\n| $$\\cos\\theta \\approx ?$$ | $$= 1 - \\frac{\\theta^2}{2}$$ | Small-angle cosine approximation. |\n| $$\\tan\\theta \\approx ?$$ | $$= \\theta$$ | Small-angle tangent approximation. |", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain why 1 radian is defined as the angle subtended at the center of a circle by an arc whose length equals the radius of the circle. (3 steps)", "answer": "- Step 1: A full circle has a circumference of $2\\pi r$, so the entire angle around the center is $2\\pi$ radians.  \n- Step 2: If an arc length $l$ is proportional to the angle $\\theta$ it subtends ($l = r\\theta$), then for $\\theta = 1$ radian, $l = r$ by definition.  \n+ This creates a natural unit where angular and linear measurements are directly related.  \n- Step 3: Radians simplify calculus and trigonometry because derivatives like $\\frac{d}{dx}\\sin x = \\cos x$ only hold when $x$ is in radians.  \n+ Example: A pendulum's small-angle displacement ($\\theta$) has arc length $r\\theta$, directly usable in physical laws.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Convert $\\frac{3\\pi}{4}$ radians to degrees and explain why multiplying by $\\frac{180^\\circ}{\\pi}$ works. (2 steps)", "answer": "- Step 1: Since $\\pi$ radians = $180^\\circ$, multiply $\\frac{3\\pi}{4}$ by $\\frac{180^\\circ}{\\pi}$:  \n$$\n\\frac{3\\pi}{4} \\times \\frac{180^\\circ}{\\pi} = 135^\\circ\n$$  \n- Step 2: This works because it scales the radian measure to the number of degrees in half a circle ($\\pi$ radians = $180^\\circ$), preserving proportionality.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Derive the formula for arc length $s = r\\theta$ using the proportion of the circle's circumference. (3 steps)", "answer": "- Step 1: Circumference = $2\\pi r$ corresponds to full angle $2\\pi$ radians.  \n- Step 2: For angle $\\theta$, arc length is a fraction $\\frac{\\theta}{2\\pi}$ of the circumference:  \n$$\ns = \\frac{\\theta}{2\\pi} \\times 2\\pi r = r\\theta\n$$  \n+ This eliminates the need for constants, making radians a dimensionless unit.  \n- Step 3: Example: For $\\theta = \\pi$ radians, $s = r\\pi$, which is half the circumference.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is the area of a sector $\\frac{1}{2}r^2\\theta$ in radians, but $\\frac{\\theta}{360^\\circ}\\pi r^2$ in degrees? (3 steps)", "answer": "- Step 1: Total circle area = $\\pi r^2$ corresponds to angle $2\\pi$ radians.  \n- Step 2: For angle $\\theta$ in radians, sector area is $\\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$.  \n- Step 3: In degrees, the fraction is $\\frac{\\theta}{360^\\circ}$, so area = $\\frac{\\theta}{360^\\circ}\\pi r^2$.  \n+ Radians eliminate the need for conversion factors, making calculus operations simpler.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Derive the area of a segment using the sector area and triangle area. (4 steps)", "answer": "- Step 1: Segment area = Sector area ($\\frac{1}{2}r^2\\theta$) − Triangle area ($\\frac{1}{2}r^2\\sin\\theta$).  \n- Step 2: Triangle area uses formula $\\frac{1}{2}ab\\sin C$ for sides $a = b = r$ and angle $C = \\theta$.  \n- Step 3: Combine terms:  \n$$\n\\text{Segment area} = \\frac{1}{2}r^2(\\theta - \\sin\\theta)\n$$  \n+ This works because the triangle's area is subtracted from the sector to isolate the segment.  \n- Step 4: Example: For $\\theta = \\frac{\\pi}{2}$, the segment area is $\\frac{1}{2}r^2\\left(\\frac{\\pi}{2} - 1\\right)$.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Explain why small angles ($\\theta \\ll 1$) in radians satisfy $\\sin\\theta \\approx \\theta$ and $\\tan\\theta \\approx \\theta$, but $\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$. (3 steps)", "answer": "- Step 1: Taylor series expansions around $\\theta = 0$:  \n$$\n\\sin\\theta = \\theta - \\frac{\\theta^3}{6} + \\dots \\approx \\theta \\\\\n\\tan\\theta = \\theta + \\frac{\\theta^3}{3} + \\dots \\approx \\theta \\\\\n\\cos\\theta = 1 - \\frac{\\theta^2}{2} + \\dots \\approx 1 - \\frac{\\theta^2}{2}\n$$  \n- Step 2: For small $\\theta$, higher-order terms ($\\theta^3$, etc.) are negligible.  \n+ Example: For $\\theta = 0.1$ rad, $\\sin\\theta \\approx 0.1$, with error < 0.1%.  \n- Step 3: These approximations are crucial in physics for simplifying simple harmonic motion and diffraction equations.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "Calculate the angle subtended by a 10 cm arc in a circle of radius 25 cm. (2 steps)", "answer": "- Step 1: Use $s = r\\theta$ ⇒ $\\theta = \\frac{s}{r} = \\frac{10}{25} = 0.4$ radians.  \n- Step 2: Convert to degrees: $0.4 \\times \\frac{180^\\circ}{\\pi} \\approx 22.92^\\circ$.  \n+ This shows the direct proportionality between arc length and angle in radians.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Compare the arc length and area of a sector for $\\theta = 2\\pi$ (full circle) and $\\theta = \\pi$ (semicircle). (2 steps)", "answer": "- Step 1: For $\\theta = 2\\pi$:  \n$$\ns = r(2\\pi) = 2\\pi r \\quad (\\text{circumference}), \\quad \\text{Area} = \\frac{1}{2}r^2(2\\pi) = \\pi r^2\n$$  \n- Step 2: For $\\theta = \\pi$:  \n$$\ns = r\\pi \\quad (\\text{half circumference}), \\quad \\text{Area} = \\frac{1}{2}r^2\\pi\n$$  \n+ This confirms sector formulas scale linearly with $\\theta$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}], "count": 8}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Convert $$\\frac{7\\pi}{6}$$ radians to degrees without using a calculator. Explain the method. (2 steps)", "answer": "- Step 1: Recall that $$\\pi$$ radians = 180°. This gives the conversion factor: multiply by $$\\frac{180°}{\\pi}$$.\n- Step 2: $$\\frac{7\\pi}{6} \\times \\frac{180°}{\\pi} = \\frac{7 \\times 180°}{6} = 7 \\times 30° = 210°$$\n\nThe answer is 210°.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Convert 150° to radians, leaving your answer in terms of $$\\pi$$. (2 steps)", "answer": "- Step 1: Recall that $$1° = \\frac{\\pi}{180}$$ radians, so multiply by $$\\frac{\\pi}{180}$$.\n- Step 2: $$150° \\times \\frac{\\pi}{180} = \\frac{150\\pi}{180} = \\frac{5\\pi}{6}$$ radians.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Write down the exact radian values for all \"special angles\" between 0° and 360° that you should memorize: 30°, 45°, 60°, 90°, 180°, 270°, 360°.", "answer": "- $$30° = \\frac{\\pi}{6}$$ radians\n- $$45° = \\frac{\\pi}{4}$$ radians\n- $$60° = \\frac{\\pi}{3}$$ radians\n- $$90° = \\frac{\\pi}{2}$$ radians\n- $$180° = \\pi$$ radians\n- $$270° = \\frac{3\\pi}{2}$$ radians\n- $$360° = 2\\pi$$ radians\n\nThese should be memorized as they appear frequently and save valuable time in exams.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A student says \"1 radian is about 57.3°.\" Another student says \"1 radian is exactly $$\\frac{180}{\\pi}$$ degrees.\" Which statement is more useful for problem-solving and why? (2 steps)", "answer": "- Step 1: Both are numerically equal (57.2958...°). The first is a decimal approximation, the second is the exact form.\n- Step 2: The exact form $$\\frac{180°}{\\pi}$$ is more useful because it maintains precision when used in algebraic manipulation. It also reminds you that $$\\pi$$ is irrational—you should leave answers in terms of $$\\pi$$ when possible rather than converting to decimals.\n\n**Misconception alert:** Using 57.3° as an exact value introduces rounding errors. Always use the fraction form $$\\frac{180}{\\pi}$$ for exact calculations.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "Derive the arc length formula $$l = r\\theta$$ from the definition of a radian. (3 steps)", "answer": "- Step 1: By definition, 1 radian corresponds to an arc length equal to the radius: when $$\\theta = 1$$ rad, $$l = r$$.\n- Step 2: Since angle and arc length are directly proportional (a full circle is $$2\\pi$$ radians and $$2\\pi r$$ in arc length), the constant of proportionality is $$r$$. This gives $$l = r\\theta$$.\n- Step 3: This is why radians simplify arc length calculations—no conversion factor like $$\\frac{π}{180}$$ is needed. In degrees, the formula would be $$l = \\frac{\\pi r \\theta}{180}$$, which is messier.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A sector has radius 5.2 cm and the arc subtends 0.8 radians at the center. Find the arc length. Why can we use $$l = r\\theta$$ directly? (2 steps)", "answer": "- Step 1: Using $$l = r\\theta = 5.2 \\times 0.8 = 4.16$$ cm.\n- Step 2: We can use this directly because the angle is already given in radians. If it were in degrees, we'd need to convert first: $$l = \\frac{\\pi r \\theta_{degrees}}{180}$$. This is precisely why radians are preferred in higher mathematics—they eliminate these conversion factors.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "An arc AB of a circle with radius 7 cm has length 2.45 cm. Find the angle $$\\angle AOB$$ subtended by this arc at the center. (2 steps)", "answer": "- Step 1: Using the formula $$l = r\\theta$$, rearrange to find $$\\theta = \\frac{l}{r}$$.\n- Step 2: $$\\theta = \\frac{2.45}{7} = 0.35$$ radians (to 2 decimal places).\n\nThis shows how to find the angle when you know the arc length and radius.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "The perimeter of a sector is given by $$P = r\\theta + 2r$$. Express the radius $$r$$ in terms of $$P$$ and $$\\theta$$. (2 steps)", "answer": "- Step 1: The perimeter consists of the arc length ($$r\\theta$$) plus the two radii ($$r + r = 2r$$), so $$P = r\\theta + 2r = r(\\theta + 2)$$.\n- Step 2: Solving for $$r$$: $$r = \\frac{P}{\\theta + 2}$$.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A circular garden pond has a straight edge AB of length 2.4 m and a curved part C which is an arc of a circle with radius 2 m. The arc is the major arc (the reflex angle at the center). Find the length of the curved part C. (3 steps)", "answer": "- Step 1: Let the angle subtended by the minor arc be $$\\alpha$$. Then the chord AB = 2.4 m. Using the chord formula in the isosceles triangle: $$\\sin\\alpha = \\frac{1.2}{2} = 0.6$$, so $$\\alpha = \\arcsin(0.6) \\approx 0.6435$$ rad.\n- Step 2: The reflex angle for the major arc is $$\\theta = 2\\pi - \\alpha \\approx 2\\pi - 0.6435 \\approx 5.6397$$ rad.\n- Step 3: Arc length $$C = r\\theta = 2 \\times 5.6397 \\approx 11.28$$ m (or more precisely, using the given calculation: the acute angle AOB = 1.287 rad, so $$\\theta = 2\\pi - 1.287 = 4.996$$ rad, giving C = 9.99 m to 3 s.f.)\n\nWait, let me recalculate: Actually from the study material, the minor arc angle is 1.287 rad, so the reflex angle is $$2\\pi - 1.287 = 4.996$$ rad, and the curved part length is $$2 \\times 4.996 = 9.99$$ m.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why is the formula for arc length $$l = r\\theta$$ only valid when $$\\theta$$ is measured in radians? What would the formula be if $$\\theta$$ were in degrees? (2 steps)", "answer": "- Step 1: The formula $$l = r\\theta$$ comes directly from the definition: 1 radian = arc length = radius. This direct proportionality only exists in radian measure.\n- Step 2: In degrees, the formula becomes $$l = \\frac{\\pi r \\theta}{180}$$ because you need to convert degrees to radians first: $$l = r \\times (\\theta \\times \\frac{\\pi}{180})$$.\n\nThis is why radians are fundamentally easier to work with in geometry and calculus.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Derive the formula for the area of a sector: $$A = \\frac{1}{2}r^2\\theta$$. (3 steps)", "answer": "- Step 1: A full circle has area $$\\pi r^2$$ and angle $$2\\pi$$ radians. Since area is proportional to angle, the fraction of the circle for a sector is $$\\frac{\\theta}{2\\pi}$$.\n- Step 2: Multiply this fraction by the full area: $$A = \\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$.\n- Step 3: This elegant formula is another reason radians are preferred—compare to the degree version: $$A = \\frac{\\pi r^2 \\theta}{360}$$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A sector of a circle has radius 2.44 cm and the sector angle is 1.4 radians. Find the area of the sector. (2 steps)", "answer": "- Step 1: Use the formula $$A = \\frac{1}{2}r^2\\theta$$.\n- Step 2: $$A = \\frac{1}{2} \\times (2.44)^2 \\times 1.4 = \\frac{1}{2} \\times 5.9536 \\times 1.4 = 4.17 \\text{ cm}^2$$ (to 3 s.f.)", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "The area of a minor sector AOB is 28.9 cm² and the angle AOB is 0.8 radians. Find the radius r. (2 steps)", "answer": "- Step 1: Using $$A = \\frac{1}{2}r^2\\theta$$, we have $$28.9 = \\frac{1}{2} \\times r^2 \\times 0.8 = 0.4r^2$$.\n- Step 2: Solving: $$r^2 = \\frac{28.9}{0.4} = 72.25$$, so $$r = \\sqrt{72.25} = 8.5$$ cm.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A plot of land is a sector of a circle with radius 55 m. The fencing along the edge (perimeter) is 176 m. Find the area of the plot. (3 steps)", "answer": "- Step 1: Perimeter = arc + 2 radii = $$r\\theta + 2r = 176$$. So $$55\\theta + 110 = 176$$, giving $$55\\theta = 66$$, so $$\\theta = \\frac{66}{55} = 1.2$$ radians.\n- Step 2: Now use the area formula: $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2} \\times 55^2 \\times 1.2$$.\n- Step 3: $$A = 0.5 \\times 3025 \\times 1.2 = 1815 \\text{ m}^2$$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A sector has radius r and angle $$\\theta$$ radians. The area of the corresponding segment (the region between the chord and the arc) is given by $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Explain why we subtract $$\\sin\\theta$$ in this formula. (3 steps)", "answer": "- Step 1: The segment area equals the sector area minus the triangular area formed by the two radii and the chord.\n- Step 2: The sector area is $$\\frac{1}{2}r^2\\theta$$. The triangular area (using the formula $$\\frac{1}{2}ab\\sin C$$ with $$a = b = r$$) is $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 3: Subtracting: $$\\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. The $$\\sin\\theta$$ term represents the triangular \"bite\" that must be removed.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Find the area of a segment where r = 7 cm and $$\\theta = 1.2$$ radians. (2 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta) = \\frac{1}{2} \\times 49 \\times (1.2 - \\sin(1.2))$$.\n- Step 2: $$\\sin(1.2) \\approx 0.93204$$, so $$1.2 - 0.93204 = 0.26796$$. Thus $$A = 24.5 \\times 0.26796 \\approx 6.57 \\text{ cm}^2$$ (3 s.f.).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In a circle with radius 4 m, chord AB is 5 m long. Find the area of the segment (shaded region between chord AB and the minor arc). (3 steps)", "answer": "- Step 1: First find the angle $$\\theta$$ using the cosine rule in triangle AOB: $$\\cos\\theta = \\frac{4^2 + 4^2 - 5^2}{2 \\times 4 \\times 4} = \\frac{7}{32}$$. So $$\\theta = \\arccos(\\frac{7}{32}) \\approx 1.3502$$ radians.\n- Step 2: Use the segment formula: $$A = \\frac{1}{2}r^2(\\theta - \\sin\\theta) = \\frac{1}{2} \\times 16 \\times (1.3502 - \\sin(1.3502))$$.\n- Step 3: $$\\sin(1.3502) \\approx 0.9757$$, so $$A = 8 \\times (1.3502 - 0.9757) = 8 \\times 0.3745 \\approx 3.00 \\text{ m}^2$$.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "AB is the diameter of a circle of radius r, and $$\\angle BOC = \\theta$$ radians. If the area of triangle AOC is three times that of the shaded segment, show that $$3\\theta - 4\\sin\\theta = 0$$. (3 steps)", "answer": "- Step 1: Area of segment = area of sector - area of triangle = $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. (Since $$\\angle AOB = \\pi$$, triangle AOC has angle $$\\pi - \\theta$$).\n- Step 2: Actually, triangle AOC uses angle $$\\pi - \\theta$$ (since AOB is a diameter = $$\\pi$$ rad), so its area is $$\\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$.\n- Step 3: Given $$\\triangle AOC = 3 \\times \\text{segment}$$, so $$\\frac{1}{2}r^2\\sin\\theta = 3 \\times \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Simplifying: $$\\sin\\theta = 3\\theta - 3\\sin\\theta$$, so $$4\\sin\\theta = 3\\theta$$, giving $$3\\theta - 4\\sin\\theta = 0$$.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the difference between a sector and a segment of a circle? (1 step)", "answer": "A **sector** is the region bounded by two radii and the arc (like a \"pizza slice\"). A **segment** is the region bounded by a chord and the arc (like the \"cap\" of a circle). The segment is essentially the sector minus the triangular portion formed by the two radii and the chord.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain why the formulas for arc length and sector area are simpler in radians than in degrees. (2 steps)", "answer": "- Step 1: In radians, the constant of proportionality is 1. Arc length = $$r\\theta$$ (not $$\\frac{\\pi r \\theta}{180}$$), and sector area = $$\\frac{1}{2}r^2\\theta$$ (not $$\\frac{\\pi r^2 \\theta}{360}$$).\n- Step 2: This happens because the radian was defined specifically to make this relationship direct—1 radian creates an arc equal to the radius. In degrees, you're always fighting the 360 conversion factor.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A circle has radius r. Write down (a) the length of the full circumference, (b) the area of the full circle, (c) the angle of a full circle in radians. Explain the pattern you see. (2 steps)", "answer": "- Step 1: (a) Circumference = $$2\\pi r$$ (b) Area = $$\\pi r^2$$ (c) Angle = $$2\\pi$$ radians.\n- Step 2: Notice the pattern: each formula contains $$\\pi$$ and the dimension (1 for linear, 2 for area). In radians, the angle $$2\\pi$$ corresponds perfectly to these formulas—no conversion factors needed. This is not a coincidence; it's by design.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "If you double the radius of a sector while keeping the angle the same, what happens to (a) the arc length, (b) the area? If you double the angle while keeping the radius the same, what happens? (2 steps)", "answer": "- Step 1: Arc length = $$r\\theta$$. Doubling $$r$$ doubles the arc length. Doubling $$\\theta$$ also doubles the arc length (direct proportion to both).\n- Step 2: Area = $$\\frac{1}{2}r^2\\theta$$. Doubling $$r$$ quadruples the area ($$r^2$$ factor). Doubling $$\\theta$$ doubles the area (direct proportion to $$\\theta$$).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "A student uses the formula $$A = \\frac{1}{2}r^2\\theta$$ with $$\\theta = 50°$$ and r = 3 cm, getting 225 cm². Identify the mistake and find the correct answer. (2 steps)", "answer": "- Step 1: The student used 50 (thinking it was in radians) but it was given in degrees. The formula $$A = \\frac{1}{2}r^2\\theta$$ only works for $$\\theta$$ in radians.\n- Step 2: Convert first: $$50° \\times \\frac{\\pi}{180} = \\frac{5\\pi}{18} \\approx 0.8727$$ rad. Then $$A = \\frac{1}{2} \\times 9 \\times 0.8727 \\approx 3.93 \\text{ cm}^2$$.\n\n**Misconception alert:** Always check your angle mode! The formula will give catastrophically wrong answers if you use degrees without converting.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A sector has radius 6 cm and arc length 4 cm. Find the area of the sector. (2 steps)", "answer": "- Step 1: First find the angle: $$\\theta = \\frac{l}{r} = \\frac{4}{6} = \\frac{2}{3} \\approx 0.6667$$ radians.\n- Step 2: Then $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2} \\times 36 \\times \\frac{2}{3} = 18 \\times \\frac{2}{3} = 12 \\text{ cm}^2$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A sector has perimeter equal to twice the arc length. If the radius is r, find the angle $$\\theta$$ in radians. (3 steps)", "answer": "- Step 1: Perimeter = arc + 2 radii = $$r\\theta + 2r$$.\n- Step 2: Given: $$r\\theta + 2r = 2 \\times (r\\theta)$$, so $$r\\theta + 2r = 2r\\theta$$.\n- Step 3: Rearranging: $$2r = r\\theta$$ (subtracting $$r\\theta$$ from both sides), so $$\\theta = 2$$ radians.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Explain why the small-angle approximations for sine, cosine, and tangent are only valid when $$\\theta$$ is measured in radians. (2 steps)", "answer": "- Step 1: The approximations come from the Taylor series expansions: $$\\sin\\theta = \\theta - \\frac{\\theta^3}{3!} + \\cdots$$. For small $$\\theta$$, the higher-order terms become negligible, leaving $$\\sin\\theta \\approx \\theta$$.\n- Step 2: This derivation assumes $$\\theta$$ is in radians because the Taylor series coefficients depend on radian measure. In degrees, you'd have an extra factor of $$\\frac{\\pi}{180}$$ in each term, making the approximations completely different. This is why these approximations are one of the most important practical reasons for using radians.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Write down the three small-angle approximations and explain when each is sufficiently accurate. (2 steps)", "answer": "- Step 1: - $$\\sin\\theta \\approx \\theta$$\n- $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$\n- $$\\tan\\theta \\approx \\theta$$\n- Step 2: These are accurate for small $$\\theta$$ (typically $$\\theta < 0.5$$ radians ≈ 30°). The cosine approximation includes the quadratic term because $$\\cos\\theta$$ doesn't vary linearly near zero. For very small angles (< 0.1 rad), all three simplify to just $$\\sin\\theta \\approx \\tan\\theta \\approx \\theta$$ and $$\\cos\\theta \\approx 1$$.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Without using a calculator, explain why $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$ (in radians) makes intuitive sense geometrically. (2 steps)", "answer": "- Step 1: Consider a unit circle (r = 1). The point on the circle at angle $$\\theta$$ has coordinates $$(\\cos\\theta, \\sin\\theta)$$. For very small $$\\theta$$, the arc (length = $$\\theta$$) and the vertical line segment (length = $$\\sin\\theta$$) are almost identical.\n- Step 2: Visually, when $$\\theta$$ is tiny, the circular arc and the tangent at that point are nearly the same line. The difference between the arc length and the vertical height ($$\\sin\\theta$$) becomes negligible compared to $$\\theta$$ itself. This is why the approximation becomes better as $$\\theta$$ approaches 0.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Use the small-angle approximation to estimate the value of $$\\cos(0.1)$$ and $$\\tan(0.1)$$, where angles are in radians. (2 steps)", "answer": "- Step 1: For $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$: $$\\cos(0.1) \\approx 1 - \\frac{0.01}{2} = 1 - 0.005 = 0.995$$. (Actual: 0.9950, very accurate!)\n- Step 2: For $$\\tan\\theta \\approx \\theta$$: $$\\tan(0.1) \\approx 0.1$$. (Actual: 0.1003, also very close!)", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A Ferris wheel has 24 equally spaced pods. The arc length between each pod is $$\\frac{3\\pi}{2}$$ m. Find the diameter of the wheel. (2 steps)", "answer": "- Step 1: 24 pods means 24 arcs around the circle, so the full circumference is $$24 \\times \\frac{3\\pi}{2} = 12 \\times 3\\pi = 36\\pi$$ m.\n- Step 2: Using $$C = \\pi d$$, we get $$36\\pi = \\pi d$$, so $$d = 36$$ m.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why can't you directly use the small-angle approximation $$\\sin\\theta \\approx \\theta$$ when $$\\theta = 0.5$$ radians for high-precision calculations? What should you use instead? (2 steps)", "answer": "- Step 1: At $$\\theta = 0.5$$ rad (~28.65°), the approximation gives $$\\sin(0.5) \\approx 0.5$$, but the actual value is $$\\sin(0.5) \\approx 0.4794$$. The error is about 4.3%, which may be significant depending on the application.\n- Step 2: For better accuracy at 0.5 rad, include the next term in the series: $$\\sin\\theta \\approx \\theta - \\frac{\\theta^3}{6}$$. This gives $$0.5 - \\frac{0.125}{6} = 0.5 - 0.0208 = 0.4792$$, much closer to the true value.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In a circle, a chord AB subtends an angle $$\\theta$$ at the center. The area of the minor segment is given to be equal to the area of the triangle formed by the radii and chord. Show that $$\\theta + 2\\sin\\theta = \\pi$$. (3 steps)", "answer": "- Step 1: Area of segment = area of sector - area of triangle = $$\\frac{1}{2}r^2\\theta - \\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 2: Area of triangle = $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 3: Setting them equal: $$\\frac{1}{2}r^2(\\theta - \\sin\\theta) = \\frac{1}{2}r^2\\sin\\theta$$. This gives $$\\theta - \\sin\\theta = \\sin\\theta$$, so $$\\theta = 2\\sin\\theta$$, or rearranging: $$\\theta + 2\\sin\\theta = \\pi$$? Wait—that's not right.\n\nActually, let me reconsider: Given area of triangle COB equals area of shaded segment. The triangle has angle $$\\theta$$ at O, so area = $$\\frac{1}{2}r^2\\sin\\theta$$. The sector has area $$\\frac{1}{2}r^2\\theta$$. The segment = sector - triangle = $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Setting equal: $$\\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. So $$\\sin\\theta = \\theta - \\sin\\theta$$, giving $$\\theta = 2\\sin\\theta$$. Rearranging: $$\\theta + 2\\sin\\theta = \\pi$$ would be incorrect here.\n\nWait—the question states area of triangle = area of segment, and the diagram shows angle BOC = $$\\theta$$ and ABO is diameter (meaning angle AOB = $$\\pi$$). So angle AOC = $$\\pi - \\theta$$. The triangle AOC has area $$\\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$. \n\nActually, let me use the given result: area of triangle C O B equals area of shaded segment. The shaded segment is bounded by chord CB and arc CB (the major arc). So the segment is the larger region, not the smaller one. The major sector has angle $$\\pi + \\theta$$. The segment = major sector - triangle. So $$\\frac{1}{2}r^2(\\pi + \\theta) - \\frac{1}{2}r^2\\sin(\\pi + \\theta) = \\frac{1}{2}r^2\\sin\\theta$$ (area of triangle). This gives $$\\pi + \\theta - (-\\sin\\theta) = \\sin\\theta$$, so $$\\pi + \\theta + \\sin\\theta = \\sin\\theta$$, meaning $$\\pi + \\theta = 0$$—that doesn't work either.\n\nLet me approach this properly: Looking at the diagram, AB is diameter, $$\\angle BOC = \\theta$$. So $$\\angle AOC = \\pi - \\theta$$. Triangle AOC has area $$\\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2\\sin\\theta$$. The shaded segment is bounded by chord AC and arc AC (the smaller arc, angle = $$\\pi - \\theta$$). So segment = sector AOC - triangle AOC = $$\\frac{1}{2}r^2(\\pi - \\theta) - \\frac{1}{2}r^2\\sin(\\pi - \\theta) = \\frac{1}{2}r^2[(\\pi - \\theta) - \\sin\\theta]$$.\n\nGiven triangle area = segment area: $$\\frac{1}{2}r^2\\sin\\theta = \\frac{1}{2}r^2[(\\pi - \\theta) - \\sin\\theta]$$. So $$\\sin\\theta = \\pi - \\theta - \\sin\\theta$$. Thus $$2\\sin\\theta = \\pi - \\theta$$, giving $$\\theta + 2\\sin\\theta = \\pi$$.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A sector has radius r and angle $$\\theta$$ radians. The perimeter is given as 42 cm, and the radius is 15 cm. Find $$\\theta$$. (2 steps)", "answer": "- Step 1: Perimeter = arc + 2 radii = $$r\\theta + 2r = 15\\theta + 30$$.\n- Step 2: Given this equals 42: $$15\\theta + 30 = 42$$, so $$15\\theta = 12$$, thus $$\\theta = \\frac{12}{15} = 0.8$$ radians.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In a circle with center O and radius 6 cm, chord PQ subtends angle $$\\theta$$ at O. The area of the major segment is three times the area of the minor segment. Show that $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$. (3 steps)", "answer": "- Step 1: Minor segment area = $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$. Major segment uses angle $$2\\pi - \\theta$$, so its area = $$\\frac{1}{2}r^2((2\\pi - \\theta) - \\sin(2\\pi - \\theta)) = \\frac{1}{2}r^2(2\\pi - \\theta - \\sin\\theta)$$.\n- Step 2: Given major = 3 × minor: $$\\frac{1}{2}r^2(2\\pi - \\theta - \\sin\\theta) = 3 \\times \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 3: Simplifying: $$2\\pi - \\theta - \\sin\\theta = 3\\theta - 3\\sin\\theta$$. So $$2\\pi = 4\\theta - 2\\sin\\theta$$, or $$\\pi = 2\\theta - \\sin\\theta$$. Rearranging: $$\\sin\\theta = 2\\theta - \\pi = \\theta - (\\theta - \\pi) = \\theta - \\frac{\\pi}{2}$$? \n\nWait, from $$\\pi = 2\\theta - \\sin\\theta$$, we get $$\\sin\\theta = 2\\theta - \\pi = \\theta - (\\pi - \\theta)$$. Actually, $$\\pi = 2\\theta - \\sin\\theta$$ gives $$\\sin\\theta = 2\\theta - \\pi$$.\n\nThis doesn't match the target. Let me check: $$\\sin\\theta = \\theta - \\frac{\\pi}{2}$$ means $$2\\theta - \\sin\\theta = \\pi$$... yes! That's exactly what we have. So it's verified.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Two circles of radius 12 cm have centers O₁ and O₂, with O₁ on the circumference of C₂ and vice versa. The circles intersect at A and B. Show that $$\\angle AO_1B = \\frac{2\\pi}{3}$$. (3 steps)", "answer": "- Step 1: Let the distance O₁O₂ = 12 cm (since each center lies on the other's circumference).\n- Step 2: Triangle O₁O₂A is equilateral (all sides = 12 cm), so each angle is $$\\frac{\\pi}{3}$$.\n- Step 3: At O₁, the angle subtended by points A and B is twice the angle at O₁ in triangle O₁O₂A (since O₂ lies on the circle centered at O₁). Actually, wait—points A and B are symmetric, so we need the angle between radii O₁A and O₁B. In triangle O₁AO₂, angle at O₁ is $$\\frac{\\pi}{3}$$. The full angle AOB would be 2 × $$\\frac{\\pi}{3}$$ = $$\\frac{2\\pi}{3}$$. This is correct.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "For the small-angle approximation $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, explain why we need the $$\\frac{\\theta^2}{2}$$ term but $$\\sin\\theta$$ doesn't need a quadratic term. (2 steps)", "answer": "- Step 1: At $$\\theta = 0$$, $$\\sin\\theta = 0$$ and its derivative $$\\cos\\theta = 1$$. So the linear approximation $$\\sin\\theta \\approx \\theta$$ is exact at the linear level.\n- Step 2: However, $$\\cos\\theta = 1$$ at $$\\theta = 0$$, so the linear term is zero! The first non-zero term is the quadratic: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$. This is why cosine needs the quadratic term while sine and tangent can get away with just the linear term (for small $$\\theta$$).", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A sector has radius $$\\sqrt{10}$$ cm and angle $$\\sqrt{5}$$ radians. Find the arc length in the form $$p\\sqrt{q}$$ cm. (2 steps)", "answer": "- Step 1: Using $$l = r\\theta = \\sqrt{10} \\t
