two right triangles using $$\\tan\\theta = \\frac{r}{OA \\cdot \\cos\\theta}$$ etc.\n\nThe right-angle tangent property is the key unlock.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "State the small-angle approximations for $$\\sin\\theta$$, $$\\cos\\theta$$, and $$\\tan\\theta$$. What unit must $$\\theta$$ be in? (2 steps)", "answer": "- Step 1: For small $$\\theta$$ (in RADIANS):\n+ $$\\sin\\theta \\approx \\theta$$ (linear)\n+ $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ (quadratic correction)\n+ $$\\tan\\theta \\approx \\theta$$ (linear)\n- Step 2: These approximations work ONLY when $$\\theta$$ is in radians, NOT degrees. They become exact in the limit $$\\theta \\to 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Why does $$\\sin\\theta \\approx \\theta$$ require $$\\theta$$ to be in radians, fundamentally? (3 steps)", "answer": "- Step 1: The famous limit $$\\lim_{\\theta \\to 0} \\frac{\\sin\\theta}{\\theta} = 1$$ holds only when $$\\theta$$ is in radians.\n- Step 2: In degrees, this limit equals $$\\frac{\\pi}{180} \\approx 0.01745$$ — far from 1.\n- Step 3: The radian definition is precisely calibrated so this limit is 1. This is why radians are \"the natural\" unit for trigonometry: only in radians does $$\\sin$$ behave like the identity function near zero.\n\nThis has profound consequences for calculus: $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ holds only in radians.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "What's the geometric intuition behind $$\\sin\\theta \\approx \\theta$$ for small $$\\theta$$? (3 steps)", "answer": "- Step 1: On the unit circle, $$\\theta$$ (in radians) is the arc length from the positive x-axis to the point $$(\\cos\\theta, \\sin\\theta)$$.\n- Step 2: $$\\sin\\theta$$ is the y-coordinate (vertical drop from x-axis to the point).\n- Step 3: For small $$\\theta$$, the arc is nearly vertical (going almost straight up), so the y-coordinate (vertical change) is approximately equal to the arc length. Hence $$\\sin\\theta \\approx \\theta$$.\n\nGeometrically: arc, chord, and y-projection all converge as $$\\theta \\to 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why does $$\\cos\\theta$$ have a quadratic correction $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$, while $$\\sin\\theta$$ has a linear approximation? (3 steps)", "answer": "- Step 1: At $$\\theta = 0$$, $$\\cos 0 = 1$$ (max value). For small $$\\theta$$, $$\\cos\\theta$$ decreases — but slowly, because the cosine curve has zero slope at the origin (it's at a peak).\n- Step 2: Geometrically: $$\\cos\\theta$$ is the x-coordinate on the unit circle. Near the positive x-axis, the point barely moves horizontally — most motion is vertical (in the $$\\sin\\theta$$ direction).\n- Step 3: The leading-order change is quadratic: $$\\cos\\theta \\approx 1 - \\frac{\\theta^2}{2}$$ (the next non-zero term in the Taylor series). The \"1\" reflects the starting value; the $$-\\theta^2/2$$ captures the slow downward bend.\n\nFor $$\\sin\\theta$$, the slope at the origin is 1 (not 0), so the linear approximation $$\\sin\\theta \\approx \\theta$$ captures the leading behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Use the small-angle approximation to estimate $$\\sin(0.05)$$ and $$\\cos(0.05)$$ when $$\\theta$$ is in radians. (2 steps)", "answer": "- Step 1: $$\\sin(0.05) \\approx 0.05$$ (linear approximation). Actual: ≈ 0.04998.\n- Step 2: $$\\cos(0.05) \\approx 1 - \\frac{(0.05)^2}{2} = 1 - 0.00125 = 0.99875$$. Actual: ≈ 0.99875.\n\nThe accuracy is excellent for small angles — errors are on the order of $$\\theta^3$$, which is negligible here.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "How are the small-angle approximations connected to the derivatives of trig functions in calculus? (3 steps)", "answer": "- Step 1: The derivative of $$\\sin\\theta$$ at $$\\theta = 0$$ equals $$\\cos 0 = 1$$. So near $$\\theta = 0$$: $$\\sin\\theta \\approx \\sin 0 + 1 \\cdot \\theta = \\theta$$.\n- Step 2: The derivative of $$\\cos\\theta$$ at $$\\theta = 0$$ equals $$-\\sin 0 = 0$$, but the second derivative is $$-\\cos 0 = -1$$. Taylor expansion: $$\\cos\\theta \\approx 1 + 0 \\cdot \\theta + \\frac{-1}{2}\\theta^2 = 1 - \\frac{\\theta^2}{2}$$.\n- Step 3: These small-angle formulas ARE the leading terms of Taylor series of $$\\sin$$ and $$\\cos$$. They work in radians because $$\\frac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$ requires radians.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "When solving a trig equation like $$\\sin\\theta = \\frac{1}{2}$$ in the interval $$[0, 2\\pi]$$, how does the procedure differ from working in degrees? (3 steps)", "answer": "- Step 1: Find the principal value: $$\\theta_1 = \\arcsin\\left(\\frac{1}{2}\\right) = \\frac{\\pi}{6}$$ (instead of 30°).\n- Step 2: Use symmetry of sine: positive in Q1 and Q2, so the second solution is $$\\theta_2 = \\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$ (instead of 150°).\n- Step 3: Both solutions lie in $$[0, 2\\pi]$$. Check: are there any in additional revolutions? For this interval, no.\n\nThe procedure is identical to degrees — only the units (and interval bounds) change.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why are intervals like $$[0, 2\\pi]$$ commonly used in trig equation problems involving radians? (2 steps)", "answer": "- Step 1: $$2\\pi$$ is one full revolution — the natural period of sine and cosine. Any solution outside $$[0, 2\\pi]$$ is just a repeat.\n- Step 2: Working within one period gives a complete, non-redundant set of solutions, after which they recur every $$2\\pi$$. This mirrors the use of $$[0°, 360°]$$ in degrees.\n\nFor $$\\tan\\theta$$, the period is $$\\pi$$ (not $$2\\pi$$), so intervals like $$[0, \\pi]$$ may be used.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "When the angle in a trig equation problem is given to a \"non-standard\" interval, like $$[-\\pi, \\pi]$$ or $$[\\pi, 3\\pi]$$, what's the strategy? (3 steps)", "answer": "- Step 1: First find solutions in a \"canonical\" interval like $$[0, 2\\pi]$$ using the standard approach (principal value + symmetries).\n- Step 2: Then shift solutions by $$\\pm 2\\pi$$ as needed to land in the desired interval.\n- Step 3: Always sketch the trig function over the desired interval — visual checks catch missing solutions easily.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "A sector has radius 12 cm and area 100 cm². Conceptually, how do you find its perimeter? (3 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}r^2\\theta$$ to extract $$\\theta$$: $$\\theta = \\frac{2A}{r^2} = \\frac{200}{144} = \\frac{25}{18}$$ rad.\n- Step 2: Apply the perimeter formula $$P = r(2 + \\theta)$$.\n- Step 3: $$P = 12\\left(2 + \\frac{25}{18}\\right) = 12 \\cdot \\frac{61}{18} = \\frac{732}{18} \\approx 40.67$$ cm.\n\nThe general approach: extract the angle from area, then plug into perimeter (or vice versa).", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "For a sector with central angle $$\\theta$$ and area $$A$$, expressed in terms of the arc length $$l$$, what's the relationship $$A$$ to $$l$$? Why is this useful? (3 steps)", "answer": "- Step 1: From $$A = \\frac{1}{2}rl$$ (alternate sector area formula).\n- Step 2: If you know $$l$$ and $$r$$, you can compute area directly without finding $$\\theta$$ — saves one step.\n- Step 3: Conversely, if you know $$A$$ and $$r$$, you can find arc length: $$l = \\frac{2A}{r}$$. Useful in problems where the angle isn't directly relevant.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "An arc subtends 0.4 rad at the centre. By inspection (without computation), is the radius likely larger or smaller than the arc length? Why? (3 steps)", "answer": "- Step 1: From $$l = r\\theta$$, we have $$r = \\frac{l}{\\theta}$$.\n- Step 2: Since $$\\theta = 0.4 < 1$$, dividing $$l$$ by $$\\theta$$ gives $$r > l$$.\n- Step 3: Geometrically: when the angle is small, even a long radius produces only a short arc — the \"fan\" of the sector is narrow, so the arc is short relative to the radius.\n\nIntuition: 1 rad gives arc = radius. Less than 1 rad gives arc < radius.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "A shaded annular region is bounded by two arcs of radii 3 and 5 sharing a common centre, plus two straight edges connecting them. With central angle 0.8 rad, what is the perimeter? (3 steps)", "answer": "- Step 1: Outer arc length: $$5 \\times 0.8 = 4$$ cm. Inner arc length: $$3 \\times 0.8 = 2.4$$ cm.\n- Step 2: Each straight edge has length $$5 - 3 = 2$$ cm; two edges give 4 cm total.\n- Step 3: Perimeter = outer arc + inner arc + 2 straight edges = $$4 + 2.4 + 4 = 10.4$$ cm.\n\nThe strategy: identify all four boundary pieces (two arcs, two radial segments) and sum.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "In a problem with a sector of one circle inscribed inside another sector, what's the typical decomposition strategy? (3 steps)", "answer": "- Step 1: Identify which sector is \"outer\" and which is \"inner\" — overlapping regions can often be subtracted.\n- Step 2: For example, \"overlap area\" = \"inner sector\" + \"outer sector\" − \"union\". Or, shaded = outer minus segment.\n- Step 3: Use sector and segment formulas separately for each piece, paying close attention to what angle each uses (it may differ between the two circles).\n\nA clear sketch labelling everything is critical for these.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "What's the structural similarity between sector area, sector perimeter, and triangle area, and why does this exist? (3 steps)", "answer": "- Step 1: Sector perimeter: $$P = 2r + r\\theta$$. Sector area: $$A = \\frac{1}{2}r \\cdot l$$ (with $$l = r\\theta$$). Triangle area (two sides $$r$$, included angle $$\\theta$$): $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: For small $$\\theta$$, $$\\sin\\theta \\approx \\theta$$, so triangle area $$\\approx \\frac{1}{2}r^2\\theta$$ = sector area. The two are nearly identical for small angles!\n- Step 3: This is because, for small angles, a sector is essentially a thin triangle: the arc and chord nearly coincide. The relationship $$A_{\\text{sector}} = \\frac{1}{2}rl$$ then becomes $$\\frac{1}{2}r \\cdot r\\theta = \\frac{1}{2}r^2\\theta$$, mirroring $$\\frac{1}{2}bh$$.\n\nThe deeper reason: a circle behaves locally like a tangent line, and a sector locally like a triangle.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Why is exact-form (e.g., $$\\frac{\\pi}{6}$$) preferred over decimal-form (e.g., 0.5236) when expressing radian angles? (3 steps)", "answer": "- Step 1: Exact forms preserve all information — no rounding errors propagate through subsequent calculations.\n- Step 2: Many quantities depend on $$\\pi$$; keeping $$\\pi$$ symbolic allows clean cancellations (e.g., $$\\frac{\\pi}{6} \\times \\frac{180}{\\pi} = 30°$$ cleanly).\n- Step 3: Examination conventions and elegance: an exact answer like $$\\frac{5\\pi}{6}$$ is considered superior to its decimal approximation 2.618.\n\nAlways work with exact values until the final step (if a decimal is required).", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "Two intersecting circles, both radius 12 cm, with each centre on the other circle. What is the perimeter of the overlapping region in terms of $$\\pi$$? (3 steps)", "answer": "- Step 1: From the equilateral triangle insight: each centre subtends an angle of $$\\frac{2\\pi}{3}$$ at the chord of intersection.\n- Step 2: The overlapping region (the lens) is bounded by two arcs, each from a different circle. Each arc has angle $$\\frac{2\\pi}{3}$$ at its respective centre.\n- Step 3: Each arc length: $$l = r\\theta = 12 \\times \\frac{2\\pi}{3} = 8\\pi$$ cm. Two arcs: perimeter = $$16\\pi$$ cm.\n\nThe key: identify the symmetric structure (equilateral triangle), giving the angle directly.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "When the area $$A_2$$ of the major segment is some multiple $$k$$ of the minor segment area $$A_1$$ (with $$A_2 = k A_1$$), what's the relationship between $$\\theta$$ (central angle of minor segment) and the total circle area? (3 steps)", "answer": "- Step 1: Total circle area = $$A_1 + A_2 + (\\text{triangle area})$$? No — total = minor segment + major segment, since segments together cover the circle minus nothing. Hmm.\n\nActually, careful: $$A_1 + A_2 = $$ area of circle, since the chord $$PQ$$ splits the circle into exactly two segments.\n- Step 2: So $$A_1 + A_2 = \\pi r^2$$. With $$A_2 = k A_1$$: $$A_1(1 + k) = \\pi r^2$$, giving $$A_1 = \\frac{\\pi r^2}{1 + k}$$.\n- Step 3: Then use $$A_1 = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$ to set up an equation for $$\\theta$$. This often results in transcendental equations.\n\nThe trap: students sometimes count the triangle separately. The chord truly splits the circle into just two regions (segments).", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "A common formula trick in segment problems: if the area of a triangle equals the area of a segment, what equation in $$\\theta$$ do you get? (3 steps)", "answer": "- Step 1: Triangle area (from two radii, included angle): $$\\frac{1}{2}r^2\\sin\\theta$$. Segment area: $$\\frac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n- Step 2: Setting them equal (or proportional): $$\\sin\\theta = \\theta - \\sin\\theta$$ (if equal), giving $$2\\sin\\theta = \\theta$$, or $$\\theta - 2\\sin\\theta = 0$$.\n- Step 3: This is a transcendental equation — no closed-form solution, must be solved numerically or graphically. Such equations frequently appear in advanced exam problems.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "Compute the perimeter of a small sector with radius $$r$$ in the limit $$\\theta \\to 0$$. What does it tell us? (3 steps)", "answer": "- Step 1: $$P = r(2 + \\theta) \\to 2r$$ as $$\\theta \\to 0$$.\n- Step 2: This makes sense: as the angle shrinks, the arc disappears, leaving just the two radii (which coincide as $$\\theta \\to 0$$, but their lengths are still each $$r$$).\n- Step 3: The \"sector\" collapses to a single line segment of length $$r$$ (traversed twice), giving total length $$2r$$.\n\nEdge cases like this verify the formula's consistency.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "When does the area of a sector equal exactly twice the area of the inscribed triangle (formed by the two radii and chord)? (3 steps)", "answer": "- Step 1: Sector area: $$\\frac{1}{2}r^2\\theta$$. Triangle area: $$\\frac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Setting sector = 2 × triangle: $$\\theta = 2\\sin\\theta$$.\n- Step 3: This is a transcendental equation; non-trivial solution exists numerically near $$\\theta \\approx 1.895$$ rad ≈ 108.6°. The trivial $$\\theta = 0$$ solution is degenerate.\n\nThis kind of equation appears when comparing geometric areas — recognition of the structure $$\\theta = k\\sin\\theta$$ is key.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "A sector has fixed perimeter $$P$$. Conceptually, what radius and angle maximize the area? (3 steps)", "answer": "- Step 1: $$P = 2r + r\\theta$$ (constraint). $$A = \\frac{1}{2}r^2\\theta$$ (objective).\n- Step 2: Eliminate $$\\theta$$: $$\\theta = \\frac{P - 2r}{r}$$. Substitute: $$A = \\frac{1}{2}r^2 \\cdot \\frac{P - 2r}{r} = \\frac{1}{2}r(P - 2r)$$.\n- Step 3: Maximize $$A(r) = \\frac{1}{2}(Pr - 2r^2)$$. Derivative: $$\\frac{dA}{dr} = \\frac{1}{2}(P - 4r) = 0 \\Rightarrow r = \\frac{P}{4}$$. Then $$\\theta = 2$$ rad.\n\nSo the optimal sector has $$\\theta = 2$$ rad ≈ 114.6° — interesting consistency: same condition as \"perimeter equals twice the arc.\"", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "State the formula relating the area of a sector to its arc length and radius (alternative to using $$\\theta$$).", "answer": "$$A = \\frac{1}{2}rl$$, where $$r$$ is the radius and $$l$$ is the arc length. Derived by substituting $$\\theta = l/r$$ into the standard sector area formula. Useful when the arc length is given directly without needing $$\\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "A common visualization: how does a sector \"unroll\" into a near-triangular shape, and what does this teach about $$A = \\frac{1}{2}rl$$? (3 steps)", "answer": "- Step 1: Imagine slicing the sector into many infinitesimally thin pie-slices, each almost a triangle with base $$dl$$ along the arc and height $$r$$.\n- Step 2: Each tiny triangle has area $$\\frac{1}{2} \\cdot r \\cdot dl$$. The whole sector is the sum: $$A = \\sum \\frac{1}{2}r \\, dl = \\frac{1}{2}r \\cdot l$$.\n- Step 3: This is essentially how integration in polar coordinates works. The formula $$A = \\frac{1}{2}rl$$ embodies the fact that a sector behaves locally like a triangle.\n\nThe same logic underlies the integral $$\\frac{1}{2}\\int r^2 \\, d\\theta$$ in calculus.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "When solving a trig equation in radians whose solutions are required as exact values (not decimals), what's the standard format for expressing them? (3 steps)", "answer": "- Step 1: Use multiples of $$\\pi$$ with integer or rational coefficients in the denominator. E.g., $$\\frac{\\pi}{6}, \\frac{2\\pi}{3}, \\frac{5\\pi}{4}$$.\n- Step 2: The denominator usually corresponds to a \"standard angle\" (6 → 30°, 4 → 45°, 3 → 60°, etc.).\n- Step 3: For non-standard angles where exact form involves $$\\arcsin$$, write as $$\\arcsin(k)$$ or $$\\arccos(k)$$ — but for \"nice\" problems, expect cleaner expressions.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "In a problem involving a circle inscribed inside a sector (touching both radii and the arc), what's the relationship between the sector's radius $$R$$, the inscribed circle's radius $$r$$, and the half-angle $$\\theta$$? (3 steps)", "answer": "- Step 1: The inscribed circle's centre lies on the angle bisector. Distance from sector's centre to the inscribed circle's centre = $$R - r$$ (since the inscribed circle touches the arc).\n- Step 2: From the right triangle formed by centre, point of tangency on radius, and inscribed circle's centre: $$\\sin\\theta = \\frac{r}{R - r}$$, where $$\\theta$$ is the half-angle of the sector.\n- Step 3: Rearrange: $$\\sin\\theta(R - r) = r$$, so $$R\\sin\\theta = r(1 + \\sin\\theta)$$. Useful for problems requiring the inscribed circle's radius from the sector's geometry.\n\nThis is a standard configuration in advanced sector problems.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}], "count": 75}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the precise geometric definition of 1 radian, and why is it considered the \"natural\" angular unit? (3 steps)", "answer": "- Step 1: 1 radian is the angle subtended at the centre of a circle when the arc length equals the radius.\n- Step 2: So if you \"walk\" along the circumference a distance of $$r$$, the angle you've swept from the centre is exactly 1 radian — independent of the size of the circle.\n- Step 3: This is \"natural\" because it's defined by a pure geometric ratio (arc/radius), not by an arbitrary subdivision (like 360, which has historical Babylonian origins).\n+ The unit is dimensionless: it's a ratio of two lengths, so it carries no actual unit.\n+ Because of this, formulas like $$l = r\\theta$$ and $$A = \\tfrac{1}{2}r^2\\theta$$ work cleanly without conversion factors.\n\nThe takeaway: a radian is the angle for which the arc traced equals the radius — pure geometry, no arbitrary scaling.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Derive from first principles why a full circle equals $$2\\pi$$ radians. (3 steps)", "answer": "- Step 1: The total circumference of a circle of radius $$r$$ is $$C = 2\\pi r$$.\n- Step 2: By definition, 1 radian corresponds to an arc of length $$r$$. So the number of radians in one full revolution is the number of times $$r$$ fits into the circumference: $$\\dfrac{2\\pi r}{r} = 2\\pi$$.\n- Step 3: Therefore one full revolution = $$2\\pi$$ radians, half a revolution = $$\\pi$$ radians, and quarter = $$\\pi/2$$ radians.\n\nThis is why $$\\pi$$ appears everywhere in trigonometry — it's the ratio fundamental to circles.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Approximately how large is 1 radian in degrees, and why isn't it a \"clean\" number? (3 steps)", "answer": "- Step 1: Since $$\\pi$$ rad $$= 180°$$, we have $$1$$ rad $$= \\dfrac{180°}{\\pi} \\approx 57.3°$$.\n- Step 2: It's not \"clean\" because radians are defined geometrically (arc = radius), while degrees were chosen historically as $$\\tfrac{1}{360}$$ of a circle for arithmetic convenience (360 has many divisors).\n- Step 3: Since $$\\pi$$ is irrational, no rational number of degrees can exactly equal 1 radian — the two systems are intrinsically incommensurable.\n\nSo 1 radian is \"just under 60°\" — a useful mental anchor.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "State the two conversion factors between degrees and radians, and explain how to remember which to use. (3 steps)", "answer": "- Step 1: To convert degrees → radians, multiply by $$\\dfrac{\\pi}{180°}$$.\n- Step 2: To convert radians → degrees, multiply by $$\\dfrac{180°}{\\pi}$$.\n- Step 3: Memory aid: the unit you're going TO appears on top of the conversion factor.\n+ Going to radians: $$\\pi$$ on top (radians involve $$\\pi$$).\n+ Going to degrees: 180 on top (degrees involve 180 for half circle).\n\nBoth come from the master identity $$\\pi$$ rad $$= 180°$$, rearranged as needed.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Convert $$\\dfrac{5\\pi}{6}$$ radians to degrees, showing the reasoning. (2 steps)", "answer": "- Step 1: Multiply by the conversion factor $$\\dfrac{180°}{\\pi}$$: $$\\dfrac{5\\pi}{6} \\times \\dfrac{180°}{\\pi}$$.\n- Step 2: The $$\\pi$$'s cancel, giving $$\\dfrac{5 \\times 180°}{6} = 5 \\times 30° = 150°$$.\n\nThe elegance: $$\\pi$$ in the numerator of the angle cancels with $$\\pi$$ in the denominator of the conversion — radians-with-$$\\pi$$ convert effortlessly.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Convert $$135°$$ to radians, leaving the answer in terms of $$\\pi$$. (2 steps)", "answer": "- Step 1: Multiply by $$\\dfrac{\\pi}{180°}$$: $$135° \\times \\dfrac{\\pi}{180°} = \\dfrac{135\\pi}{180}$$.\n- Step 2: Simplify by dividing numerator and denominator by their GCD (45): $$\\dfrac{135}{180} = \\dfrac{3}{4}$$, giving $$\\dfrac{3\\pi}{4}$$ rad.\n\nA faster mental route: $$135° = 3 \\times 45°$$, and $$45° = \\dfrac{\\pi}{4}$$, so the answer is $$\\dfrac{3\\pi}{4}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "State the radian equivalents of the six \"core\" angles: $$30°, 45°, 60°, 90°, 180°, 360°$$.", "answer": "Memorise these:\n+ $$30° = \\dfrac{\\pi}{6}$$\n+ $$45° = \\dfrac{\\pi}{4}$$\n+ $$60° = \\dfrac{\\pi}{3}$$\n+ $$90° = \\dfrac{\\pi}{2}$$\n+ $$180° = \\pi$$\n+ $$360° = 2\\pi$$\n\nPattern: as the angle gets larger, the denominator under $$\\pi$$ gets smaller. Halving the angle doubles the denominator. These six are foundational and should be instantly recognisable in either direction.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Without computing, why is $$\\sin\\left(\\dfrac{\\pi}{6}\\right)$$ exactly equal to $$\\sin 30°$$? (3 steps)", "answer": "- Step 1: $$30° = \\dfrac{\\pi}{6}$$ rad — they describe the same physical rotation.\n- Step 2: A trigonometric function returns the same value for the same physical angle, regardless of how that angle is labelled.\n- Step 3: So $$\\sin\\left(\\dfrac{\\pi}{6}\\right) = \\sin 30° = \\dfrac{1}{2}$$ exactly.\n\nThis is why your calculator must be in the correct mode: it computes $$\\sin$$ of the input number, but the meaning of that number depends on whether it's degrees or radians.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Why is computing $$\\sin(30)$$ on a calculator dangerous if you don't know the mode? (3 steps)", "answer": "- Step 1: In DEGREE mode, the calculator returns $$\\sin 30° = 0.5$$.\n- Step 2: In RADIAN mode, it returns $$\\sin(30 \\text{ rad}) \\approx -0.988$$ — completely different.\n- Step 3: 30 radians is many full revolutions ($$30/2\\pi \\approx 4.77$$ revolutions), so the result is essentially \"random\" within $$[-1, 1]$$.\n\nAlways check your calculator mode before computing trig values. This is a top exam-error source.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is the formula $$l = r\\theta$$ for arc length valid only when $$\\theta$$ is in radians? (3 steps)", "answer": "- Step 1: The radian is DEFINED so that \"1 radian = arc of length $$r$$.\" Therefore $$\\theta$$ radians corresponds to $$\\theta$$ copies of an arc of length $$r$$, giving $$l = r\\theta$$ directly.\n- Step 2: If $$\\theta$$ were in degrees, the formula would need a conversion factor: $$l = r \\cdot \\theta_{\\deg} \\cdot \\dfrac{\\pi}{180}$$, because each degree corresponds to $$\\dfrac{\\pi}{180}$$ of a radian.\n- Step 3: This is the appeal of radians — they are designed so geometric formulas have NO conversion factors. Using degrees in $$l = r\\theta$$ would give an answer too large by a factor of about 57.\n\nThe simplicity is not magic — it's baked into the definition of the radian.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Derive the arc length formula $$l = r\\theta$$ using proportional reasoning (arc as fraction of circumference). (3 steps)", "answer": "- Step 1: A full revolution sweeps the entire circumference $$2\\pi r$$ and corresponds to angle $$2\\pi$$ rad.\n- Step 2: For an angle $$\\theta$$ rad, the arc is the same fraction of the circumference as $$\\theta$$ is of $$2\\pi$$: $$l = \\dfrac{\\theta}{2\\pi} \\times 2\\pi r$$.\n- Step 3: The $$2\\pi$$'s cancel, leaving $$l = r\\theta$$.\n\nThis proportional view also confirms why the formula breaks if $$\\theta$$ is in degrees — you'd need $$\\dfrac{\\theta_{\\deg}}{360}$$ instead of $$\\dfrac{\\theta}{2\\pi}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "A circle has radius 5 cm. Mentally compute the arc length subtended by an angle of 1 rad and 2 rad. (2 steps)", "answer": "- Step 1: With $$r = 5, \\theta = 1$$: $$l = r\\theta = 5 \\times 1 = 5$$ cm.\n- Step 2: With $$r = 5, \\theta = 2$$: $$l = 5 \\times 2 = 10$$ cm.\n\nThe pattern: arc length grows linearly with both angle and radius. Doubling either doubles the arc.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A sector of a circle of radius $$r$$ has angle $$\\theta$$ rad. Write down its perimeter and explain each term. (3 steps)", "answer": "- Step 1: The perimeter consists of TWO straight sides (each a radius, length $$r$$) and ONE curved side (the arc, length $$r\\theta$$).\n- Step 2: Therefore $$P = 2r + r\\theta = r(2 + \\theta)$$.\n- Step 3: A common error is to forget the two radii and write $$P = r\\theta$$ alone — this gives only the arc, not the closed region's full boundary.\n\nWhen you see \"perimeter of sector,\" always ask: are both radii included? (For a full closed boundary, yes.)", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "A sector has perimeter $$P$$ and angle $$\\theta$$ rad. Express the radius $$r$$ in terms of $$P$$ and $$\\theta$$. (3 steps)", "answer": "- Step 1: Start from $$P = r\\theta + 2r$$ (arc + two radii).\n- Step 2: Factorise: $$P = r(\\theta + 2)$$.\n- Step 3: Solve for $$r$$: $$r = \\dfrac{P}{\\theta + 2}$$.\n\nUseful when you know the total boundary length and the angle, and need the radius — common in design problems.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "From $$l = r\\theta$$, recover $$\\theta$$ in terms of $$l$$ and $$r$$. Explain why this is dimensional analysis. (3 steps)", "answer": "- Step 1: Divide both sides by $$r$$: $$\\theta = \\dfrac{l}{r}$$.\n- Step 2: This is dimensionally an arc length divided by another length — a pure number, exactly what radians ARE: a ratio of two lengths.\n- Step 3: This explains why radians are unit-less: the angle is the ratio of \"arc travelled\" to \"radius,\" with all length units cancelling.\n\nInsight: radians ARE the natural ratio $$\\dfrac{\\text{arc}}{\\text{radius}}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "A circle has radius 6 cm and a chord $$AB$$ of length 6 cm. Find $$\\angle AOB$$ and the arc length $$AB$$. (3 steps)", "answer": "- Step 1: Triangle $$OAB$$ has $$OA = OB = 6$$ (radii) and $$AB = 6$$, so it's equilateral.\n- Step 2: All angles in an equilateral triangle are $$60° = \\dfrac{\\pi}{3}$$ rad.\n- Step 3: Arc length: $$l = r\\theta = 6 \\times \\dfrac{\\pi}{3} = 2\\pi$$ cm.\n\nA subtle point: the chord (6 cm) and arc ($$2\\pi \\approx 6.28$$ cm) are very close in length when the angle is small-to-moderate — the arc is always slightly longer.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Express the chord length of a circle of radius $$r$$ subtending angle $$\\theta$$ at the centre, in terms of $$r$$ and $$\\theta$$. (3 steps)", "answer": "- Step 1: Triangle $$OAB$$ is isosceles with $$OA = OB = r$$. Drop a perpendicular from $$O$$ to $$AB$$, splitting the triangle into two congruent right-angled triangles, each with angle $$\\theta/2$$ at the apex.\n- Step 2: In each right triangle, the half-chord = $$r\\sin(\\theta/2)$$.\n- Step 3: So full chord length is $$AB = 2r\\sin(\\theta/2)$$.\n\nCompare to arc = $$r\\theta$$ — the chord is always shorter for $$\\theta > 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why are the formulas $$l = r\\theta$$ (arc) and $$2r\\sin(\\theta/2)$$ (chord) so different in form, and what does this encode? (3 steps)", "answer": "- Step 1: The arc length depends LINEARLY on $$\\theta$$ — the arc grows in proportion to angle without bound.\n- Step 2: The chord length SATURATES: as $$\\theta \\to \\pi$$, $$2r\\sin(\\pi/2) = 2r$$ — the diameter, the maximum chord. The chord can't exceed $$2r$$ no matter how large $$\\theta$$ gets.\n- Step 3: For small $$\\theta$$, $$\\sin(\\theta/2) \\approx \\theta/2$$, so chord $$\\approx r\\theta$$ — chord and arc are nearly equal, consistent with intuition that small arcs are \"almost straight.\"\n\nSo the difference encodes curvature: agreement at small $$\\theta$$, divergence as $$\\theta$$ grows.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Inscribed angle $$\\angle ACB = 0.4$$ rad in a circle of radius 8.5 cm. Find the minor arc length $$AB$$. (3 steps)", "answer": "- Step 1: By the inscribed angle theorem, the central angle subtending the same arc is twice the inscribed angle: $$\\angle AOB = 2 \\times 0.4 = 0.8$$ rad.\n- Step 2: Use $$l = r\\theta$$ with $$r = 8.5, \\theta = 0.8$$: $$l = 8.5 \\times 0.8 = 6.8$$ cm.\n- Step 3: The inscribed angle theorem holds the same in radians as in degrees — it's a geometric truth, unit-independent.\n\nThis problem highlights how circle theorems pair with the arc length formula in radians.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Explain conceptually why the area of a sector is $$A = \\tfrac{1}{2}r^2\\theta$$ rather than just $$r^2\\theta$$. (3 steps)", "answer": "- Step 1: View the sector as a fraction of the whole circle. The full circle has area $$\\pi r^2$$ and corresponds to angle $$2\\pi$$.\n- Step 2: A sector of angle $$\\theta$$ takes the fraction $$\\dfrac{\\theta}{2\\pi}$$ of the whole circle, giving area $$\\dfrac{\\theta}{2\\pi} \\times \\pi r^2 = \\dfrac{1}{2}r^2\\theta$$.\n- Step 3: The $$\\tfrac{1}{2}$$ comes from the cancellation $$\\dfrac{\\pi}{2\\pi} = \\dfrac{1}{2}$$ — a structural footprint of the relationship between $$\\pi$$ (in area) and $$2\\pi$$ (in full angle).\n\nSo the $$\\tfrac{1}{2}$$ is not a fudge factor — it's a natural consequence of how circles and angles relate.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Show that the sector area formula is consistent with the full circle when $$\\theta = 2\\pi$$. (2 steps)", "answer": "- Step 1: Substitute $$\\theta = 2\\pi$$ into $$A = \\tfrac{1}{2}r^2\\theta$$: $$A = \\tfrac{1}{2}r^2 \\times 2\\pi = \\pi r^2$$.\n- Step 2: This is exactly the formula for the area of the full circle. The sector formula reduces to the circle formula in the limiting case — a sanity check confirming the formula's correctness.\n\nAlways test a general formula against well-known limits.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Show that a sector's area can be written $$A = \\tfrac{1}{2}lr$$ where $$l$$ is the arc length, and interpret this geometrically. (3 steps)", "answer": "- Step 1: From $$l = r\\theta$$, get $$\\theta = \\dfrac{l}{r}$$.\n- Step 2: Substitute into $$A = \\tfrac{1}{2}r^2\\theta$$: $$A = \\tfrac{1}{2}r^2 \\cdot \\dfrac{l}{r} = \\tfrac{1}{2}lr$$.\n- Step 3: This is the same form as the area of a TRIANGLE with base $$l$$ and height $$r$$.\n+ Intuition: imagine \"unrolling\" the sector — the curved arc becomes a straight base of length $$l$$, and the radius becomes the height.\n\nA sector is, in this sense, a \"curvy triangle\" with base = arc and height = radius.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What is the area of the triangle formed by two radii and the chord, in terms of $$r$$ and the central angle $$\\theta$$? (2 steps)", "answer": "- Step 1: Use the SAS area formula: $$\\text{Area} = \\tfrac{1}{2}ab\\sin C$$, with $$a = b = r$$ and $$C = \\theta$$.\n- Step 2: So area = $$\\tfrac{1}{2}r \\cdot r\\sin\\theta = \\tfrac{1}{2}r^2\\sin\\theta$$.\n\nThis is the \"triangle part\" that gets subtracted from the sector to give the segment.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "What is a \"segment\" of a circle, and how does it differ from a \"sector\"? (3 steps)", "answer": "- Step 1: A SECTOR is the pie-slice region bounded by two radii and an arc.\n- Step 2: A SEGMENT is the region bounded by a CHORD (straight line connecting two points on the circle) and an arc — like a sector with the triangle \"cap\" removed.\n- Step 3: To get the segment, you take the sector and SUBTRACT the triangle formed by the two radii and the chord.\n\nSo segment area = sector area − triangle area, which is the geometric origin of the formula.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Derive the segment area formula $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ from first principles. (3 steps)", "answer": "- Step 1: The sector has area $$\\tfrac{1}{2}r^2\\theta$$.\n- Step 2: The triangle formed by two radii and the chord has area $$\\tfrac{1}{2}r^2\\sin\\theta$$ (using $$\\tfrac{1}{2}ab\\sin C$$ with both sides equal to $$r$$).\n- Step 3: Subtracting: segment area $$= \\tfrac{1}{2}r^2\\theta - \\tfrac{1}{2}r^2\\sin\\theta = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe $$(\\theta - \\sin\\theta)$$ structure shows the angle \"in radians\" minus the sine of the same angle — both pure numbers, both growing with $$\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why is $$\\theta - \\sin\\theta \\geq 0$$ for $$\\theta \\in [0, 2\\pi]$$, and what does this mean physically? (3 steps)", "answer": "- Step 1: For $$\\theta > 0$$ small, $$\\sin\\theta < \\theta$$ (the sine curve lies below the line $$y = \\theta$$ near the origin).\n- Step 2: For larger $$\\theta$$ in $$(0, 2\\pi)$$, $$\\theta$$ keeps growing while $$\\sin\\theta$$ oscillates between $$-1$$ and $$1$$, so $$\\theta - \\sin\\theta$$ stays positive and growing.\n- Step 3: Physically, this expresses the fact that the segment has positive area — the arc bulges outward from the chord, so there's always some region between them.\n\nThe inequality $$\\sin\\theta \\leq \\theta$$ for $$\\theta \\geq 0$$ is fundamental and underlies many small-angle approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "As $$\\theta \\to 0$$, what happens to the segment area, and what scaling does $$\\theta - \\sin\\theta$$ exhibit? (3 steps)", "answer": "- Step 1: As $$\\theta \\to 0$$, the chord and the arc become almost identical — the segment becomes vanishingly thin.\n- Step 2: Segment area $$\\to 0$$, meaning $$\\theta - \\sin\\theta \\to 0$$ FASTER than $$\\theta \\to 0$$.\n- Step 3: In fact, $$\\sin\\theta \\approx \\theta - \\dfrac{\\theta^3}{6}$$, so $$\\theta - \\sin\\theta \\approx \\dfrac{\\theta^3}{6}$$. The segment area scales as $$\\theta^3$$ for small angles, much faster than the sector area $$\\propto \\theta$$.\n\nThis $$\\theta^3$$ scaling explains why thin segments have very small areas relative to thin sectors of the same angle.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Compute the segment area when $$\\theta = \\pi$$ (a semicircle), and explain geometrically. (3 steps)", "answer": "- Step 1: Substitute $$\\theta = \\pi$$: $$A = \\tfrac{1}{2}r^2(\\pi - \\sin\\pi) = \\tfrac{1}{2}r^2 \\times \\pi = \\tfrac{\\pi r^2}{2}$$.\n- Step 2: This is half the full circle area $$\\pi r^2$$.\n- Step 3: Geometrically, when $$\\theta = \\pi$$, the chord becomes the diameter and the \"triangle\" collapses to a flat line of zero area. So the segment IS the half-circle, exactly $$\\tfrac{1}{2}\\pi r^2$$.\n\nThe formula's behavior at this limit case validates it: the triangle vanishes ($$\\sin\\pi = 0$$) and the sector becomes the half-circle.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Compute the segment area when $$\\theta = \\dfrac{\\pi}{2}$$ (a quarter circle). (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2}r^2 \\cdot \\dfrac{\\pi}{2} = \\dfrac{\\pi r^2}{4}$$ — a quarter of the full circle, as expected.\n- Step 2: Triangle area = $$\\tfrac{1}{2}r^2\\sin(\\pi/2) = \\tfrac{1}{2}r^2$$ — the triangle is right-isosceles with legs $$r$$.\n- Step 3: Segment area = $$\\dfrac{\\pi r^2}{4} - \\dfrac{r^2}{2} = \\dfrac{r^2(\\pi - 2)}{4} \\approx 0.286 r^2$$.\n\nA clean exact answer for the canonical quarter-circle segment.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "When working with the segment formula $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ on a calculator, why is precision crucial? (3 steps)", "answer": "- Step 1: For small $$\\theta$$, both $$\\theta$$ and $$\\sin\\theta$$ are nearly equal — their difference $$\\theta - \\sin\\theta$$ is small.\n- Step 2: Subtraction of nearly-equal numbers AMPLIFIES rounding error: if $$\\theta = 1.000$$ and you round $$\\sin\\theta \\approx 0.841$$ to 0.84, the difference 0.16 vs 0.159 differs by a relative ~1%.\n- Step 3: Use unrounded values throughout (use the calculator's memory or \"ans\" button). Only round at the very end.\n\nThis is a general numerical stability principle: avoid subtracting nearly equal numbers without high precision.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A common misconception: \"the segment is the part between a chord and an arc.\" Why does this need to be more precise? (3 steps)", "answer": "- Step 1: A chord divides a circle into TWO regions: the minor segment (smaller) and the major segment (larger). Both are bounded by the chord and an arc.\n- Step 2: The formula $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ gives the MINOR segment when $$\\theta$$ is the (non-reflex) angle subtended at the centre.\n- Step 3: For the MAJOR segment, use $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$, OR compute as (whole circle) − (minor segment) = $$\\pi r^2 - \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nAlways check which segment the problem refers to, and which angle (reflex or not) to use.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A common mistake is using $$A = \\tfrac{1}{2}r^2\\theta$$ with $$\\theta$$ in degrees. By what factor will the answer be wrong? (3 steps)", "answer": "- Step 1: The correct $$\\theta$$ in radians is $$\\theta_{\\text{rad}} = \\theta_{\\deg} \\times \\dfrac{\\pi}{180}$$.\n- Step 2: Plugging $$\\theta_{\\deg}$$ directly gives an answer wrong by the factor $$\\dfrac{\\theta_{\\deg}}{\\theta_{\\text{rad}}} = \\dfrac{180}{\\pi} \\approx 57.3$$.\n- Step 3: So you'll OVERESTIMATE by a factor of 57 — absurdly large. The fix: always confirm $$\\theta$$ is in radians before plugging into $$\\tfrac{1}{2}r^2\\theta$$ or $$r\\theta$$.\n\nThis is one of the most common errors in radian-related problems.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "A sector has radius 5 cm and angle $$\\dfrac{\\pi}{4}$$ rad. Mentally estimate its area. (3 steps)", "answer": "- Step 1: Use $$A = \\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2} \\times 25 \\times \\tfrac{\\pi}{4} = \\dfrac{25\\pi}{8}$$ cm².\n- Step 2: $$\\pi \\approx 3.14$$, so $$\\dfrac{25 \\times 3.14}{8} \\approx 9.8$$ cm².\n- Step 3: Sanity check via fraction: $$\\dfrac{\\pi/4}{2\\pi} = \\dfrac{1}{8}$$ of the full circle, so the area is $$\\dfrac{1}{8} \\times 25\\pi \\approx \\dfrac{78.5}{8} \\approx 9.8$$ cm². ✓\n\nThe proportional reasoning gives a quick mental sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "How does the perimeter of a sector scale if the radius doubles but the angle stays the same? What about the area? (3 steps)", "answer": "- Step 1: Perimeter $$P = r(\\theta + 2)$$ scales LINEARLY with $$r$$ — doubling $$r$$ doubles $$P$$.\n- Step 2: Area $$A = \\tfrac{1}{2}r^2\\theta$$ scales QUADRATICALLY with $$r$$ — doubling $$r$$ quadruples $$A$$.\n- Step 3: General scaling law: 1D quantities scale as $$k^1$$, 2D quantities as $$k^2$$, 3D as $$k^3$$ when all linear dimensions scale by $$k$$.\n\nA core principle in geometry: linear, area, volume scale as $$k, k^2, k^3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "True or false: \"If you double the radius and halve the angle of a sector, the arc length stays the same.\" Justify. (2 steps)", "answer": "- Step 1: Original arc: $$l_1 = r\\theta$$. New arc: $$l_2 = (2r)(\\theta/2) = r\\theta$$ — same!\n- Step 2: TRUE for arc length. But the area changes: $$A_1 = \\tfrac{1}{2}r^2\\theta$$ vs $$A_2 = \\tfrac{1}{2}(2r)^2(\\theta/2) = r^2\\theta$$ — the new area is DOUBLE.\n\nDoubling the radius and halving the angle preserves arc but doubles area — a useful asymmetry to remember.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Explain why two sectors with the same arc length but different radii have different areas. Which is larger? (3 steps)", "answer": "- Step 1: From $$A = \\tfrac{1}{2}lr$$, with $$l$$ fixed: a LARGER radius gives a LARGER area.\n- Step 2: Geometrically: same arc length, but the \"fan\" reaches farther out, sweeping more area.\n- Step 3: Equivalently, fixed arc length corresponds to a smaller angle in a larger circle ($$\\theta = l/r$$), and the area $$\\tfrac{1}{2}r^2 \\cdot l/r = \\tfrac{1}{2}lr$$ scales linearly with $$r$$.\n\nInsight: it's the radius (not the angle) that controls the \"size\" of the sector when arc length is held constant.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "As $$\\theta$$ increases from 0 to $$\\pi$$, how does the ratio $$\\dfrac{\\text{chord}}{\\text{arc}}$$ behave? (3 steps)", "answer": "- Step 1: Chord = $$2r\\sin(\\theta/2)$$, arc = $$r\\theta$$, so ratio = $$\\dfrac{2\\sin(\\theta/2)}{\\theta} = \\dfrac{\\sin(\\theta/2)}{\\theta/2}$$.\n- Step 2: As $$\\theta \\to 0$$, $$\\dfrac{\\sin(\\theta/2)}{\\theta/2} \\to 1$$ — chord and arc become nearly equal.\n- Step 3: As $$\\theta \\to \\pi$$, chord = diameter $$2r$$, arc = $$\\pi r$$, ratio = $$\\dfrac{2}{\\pi} \\approx 0.637$$ — chord is about 64% of the arc.\n\nSo the ratio decreases monotonically from 1 to $$\\dfrac{2}{\\pi}$$ as $$\\theta$$ grows from 0 to $$\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why do problems involving \"the area bounded by various arcs and lines\" often combine sector areas, triangle areas, and segment areas? (3 steps)", "answer": "- Step 1: Curved boundaries → use SECTOR or SEGMENT formulas (depending on whether the boundary closes via radii or a chord).\n- Step 2: Straight boundaries → use TRIANGLE areas (e.g., $$\\tfrac{1}{2}ab\\sin C$$ with $$C$$ in radians).\n- Step 3: Composite regions → ADD or SUBTRACT pieces strategically. The key is to identify which simple shapes form the boundary, then sum/subtract.\n\nThis decomposition strategy works for any complex region — break it into known pieces, compute each, combine.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why do tangent lines to a circle drawn from an external point form right angles with the radii at the points of tangency, and how is this useful in radian problems? (3 steps)", "answer": "- Step 1: Geometric fact: the radius is always perpendicular to the tangent at the point of contact.\n- Step 2: This means in problems involving tangent lines (e.g., circles inscribed in sectors), you can use right-angled trigonometry instead of cosine/sine rules.\n- Step 3: Specifically, in a triangle formed by the centre, an external point, and the tangent point, you have a right angle, allowing $$\\sin, \\cos, \\tan$$ directly.\n\nA common A-Level problem (e.g., the brooch or earring problems) hinges on recognising this perpendicularity to break symmetry into right triangles.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "A sector of radius $$r$$ inscribes a smaller circle that touches both radii and the arc. Outline the relationship between the inscribed circle's radius and the sector's geometry. (3 steps)", "answer": "- Step 1: Let the half-angle of the sector be $$\\theta$$ (full angle $$2\\theta$$). The inscribed circle's centre $$C$$ lies on the bisector of the sector.\n- Step 2: $$OC = R - r$$ (distance from sector vertex to inscribed-circle centre, since the inscribed circle is tangent to the arc).\n- Step 3: By perpendicularity of radius-to-tangent at the line of contact: $$\\sin\\theta = \\dfrac{r}{OC} = \\dfrac{r}{R - r}$$, giving $$R\\sin\\theta = r(1 + \\sin\\theta)$$.\n\nThis pretty relationship combines tangent properties with sector geometry — a classic A-Level setup.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A Ferris wheel has 24 equally-spaced pods on its circumference, with arc spacing $$\\dfrac{3\\pi}{2}$$ m between adjacent pods. How big is the wheel? (3 steps)", "answer": "- Step 1: 24 equal arcs sum to the full circumference: $$C = 24 \\times \\dfrac{3\\pi}{2} = 36\\pi$$ m.\n- Step 2: From $$C = 2\\pi r$$: $$r = \\dfrac{36\\pi}{2\\pi} = 18$$ m, so diameter = 36 m.\n- Step 3: Cross-check: each \"slice\" between pods spans $$\\dfrac{2\\pi}{24} = \\dfrac{\\pi}{12}$$ rad, with arc $$= r\\theta = 18 \\times \\dfrac{\\pi}{12} = \\dfrac{3\\pi}{2}$$ m ✓.\n\nMental model: pod spacing on circumference scales linearly with the radius.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A circle has area $$3600\\pi$$ cm². Find the arc length of a sector with angle $$\\dfrac{\\pi}{12}$$. (3 steps)", "answer": "- Step 1: From $$\\pi r^2 = 3600\\pi$$, get $$r^2 = 3600$$, so $$r = 60$$ cm.\n- Step 2: Arc length: $$l = r\\theta = 60 \\times \\dfrac{\\pi}{12} = 5\\pi$$ cm.\n- Step 3: Sanity: this sector is $$\\dfrac{1}{24}$$ of the circle ($$\\dfrac{\\pi/12}{2\\pi}$$), so its arc should be $$\\dfrac{1}{24}$$ of the circumference $$120\\pi$$ — yes, $$5\\pi$$. ✓\n\nThe key skill: extract the radius from the area using $$\\pi r^2$$, then use $$l = r\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A sector of radius 28 cm has perimeter $$P$$ and area $$A$$. If $$A = 4P$$, set up the equation for $$\\theta$$ and solve. (3 steps)", "answer": "- Step 1: $$P = 28\\theta + 56 = 28(\\theta + 2)$$ and $$A = \\tfrac{1}{2} \\times 28^2 \\times \\theta = 392\\theta$$.\n- Step 2: Set $$A = 4P$$: $$392\\theta = 4 \\times 28(\\theta + 2) = 112\\theta + 224$$.\n- Step 3: Solve: $$280\\theta = 224 \\Rightarrow \\theta = 0.8$$ rad. Then $$P = 28 \\times 2.8 = 78.4$$ cm.\n\nThe technique: write perimeter and area in terms of $$\\theta$$, then equate using the given relation.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "How would you find the area of a segment if you know the chord length $$c$$ and radius $$r$$, but not the angle? (3 steps)", "answer": "- Step 1: Find the central angle first using the cosine rule on the isosceles triangle $$OAB$$: $$c^2 = 2r^2 - 2r^2\\cos\\theta$$, giving $$\\cos\\theta = 1 - \\dfrac{c^2}{2r^2}$$.\n- Step 2: Solve $$\\theta = \\arccos\\left(1 - \\dfrac{c^2}{2r^2}\\right)$$ in radians.\n- Step 3: Plug into the segment formula: $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$.\n\nThe cosine rule is the bridge between \"side info\" (chord) and \"angle info\" (central angle).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "A circle has radius 10 cm and chord $$AB$$ length 18.65 cm. Without computing exactly, what does the sign of $$\\cos\\theta$$ tell you? (3 steps)", "answer": "- Step 1: Cosine rule: $$\\cos\\theta = \\dfrac{2r^2 - c^2}{2r^2} = \\dfrac{200 - 18.65^2}{200}$$.\n- Step 2: Since $$18.65^2 \\approx 348 > 200$$, the numerator is negative, so $$\\cos\\theta < 0$$.\n- Step 3: Negative cosine means the angle is OBTUSE ($$\\theta > \\pi/2$$). Consistent with intuition: the chord (18.65) is almost as long as the diameter (20), so the angle must be close to (but less than) $$\\pi$$.\n\nThe sign of $$\\cos\\theta$$ is a quick clue to whether the angle is acute or obtuse.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A region bounded by two intersecting circles forms a \"lens\" shape. Why can we compute its area as a sum of two segments without double-counting? (3 steps)", "answer": "- Step 1: The lens-shaped region is bounded by an arc from EACH circle. Each segment is bounded by the common chord and one of these arcs.\n- Step 2: The two segments share the chord but have DIFFERENT arcs, so adding them gives the full lens with no double-counting — the chord is on the boundary, traversed once from each side.\n- Step 3: Setup: identify the common chord, find the central angle in each circle (using cosine rule on each centre triangle), then sum: $$\\tfrac{1}{2}r_1^2(\\theta_1 - \\sin\\theta_1) + \\tfrac{1}{2}r_2^2(\\theta_2 - \\sin\\theta_2)$$.\n\nThis is the canonical strategy for circle-intersection problems.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Compare the formula $$A = \\tfrac{1}{2}r^2\\theta$$ (sector) with $$A = \\tfrac{1}{2}ab\\sin C$$ (triangle). What's the structural similarity, and where do they agree? (3 steps)", "answer": "- Step 1: Both have $$\\tfrac{1}{2}$$ and a product of two \"sides\" — sector uses $$r \\times r = r^2$$, triangle uses $$a \\times b$$.\n- Step 2: The sector uses $$\\theta$$ directly; the triangle uses $$\\sin\\theta$$.\n- Step 3: As $$\\theta \\to 0$$, both formulas agree (since $$\\sin\\theta \\approx \\theta$$). For larger $$\\theta$$, they diverge: the triangle \"fills up\" less of the angular space, while the sector's curved boundary captures the full sweep.\n\nThis is yet another manifestation of $$\\sin\\theta \\approx \\theta$$ for small angles.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Under what condition does sector area equal triangle area? Is this possible? (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2}r^2\\theta$$; triangle area = $$\\tfrac{1}{2}r^2\\sin\\theta$$.\n- Step 2: Setting equal: $$\\theta = \\sin\\theta$$.\n- Step 3: For $$\\theta \\in (0, 2\\pi)$$, the only solution to $$\\theta = \\sin\\theta$$ is $$\\theta = 0$$ — there is NO positive angle where these are equal because $$\\theta > \\sin\\theta$$ for all $$\\theta > 0$$.\n\nConceptually: the sector strictly exceeds the triangle in area, with the difference being the segment.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Without computing exactly, compare the area of a sector ($$r = 5, \\theta = 1$$ rad) to the triangle with two sides of length 5 and included angle 1 rad. (3 steps)", "answer": "- Step 1: Sector area = $$\\tfrac{1}{2} \\times 25 \\times 1 = 12.5$$.\n- Step 2: Triangle area = $$\\tfrac{1}{2} \\times 25 \\times \\sin(1) \\approx 12.5 \\times 0.841 \\approx 10.5$$.\n- Step 3: Sector > Triangle, with the difference (~2) being the segment area — the \"bulge\" of the arc over the chord.\n\nSector and triangle differ by exactly a segment; this is a useful intuition for seeing relationships.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why does $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ have UNITS-CONSISTENT dimensions for any sensible $$\\theta$$ in radians? (3 steps)", "answer": "- Step 1: $$r^2$$ has units of length squared (e.g., cm²) — the natural unit for area.\n- Step 2: $$\\theta$$ is dimensionless (it's a ratio of lengths), and $$\\sin\\theta$$ is dimensionless.\n- Step 3: So $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ has units of cm² — a valid area. The dimensionlessness of radians is exactly what makes the formula work without conversion factors.\n\nAnother instance of why radians are the \"natural\" angular unit for analysis: dimensional consistency is preserved.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Solve $$\\sin x = \\dfrac{1}{2}$$ for $$x \\in [0, 2\\pi]$$. List all solutions and the reasoning. (3 steps)", "answer": "- Step 1: Principal value: the smallest positive $$x$$ with $$\\sin x = \\tfrac{1}{2}$$ is $$x = \\dfrac{\\pi}{6}$$ (since $$30° = \\dfrac{\\pi}{6}$$ rad).\n- Step 2: Sine is positive in the first AND second quadrants. The second-quadrant solution is $$x = \\pi - \\dfrac{\\pi}{6} = \\dfrac{5\\pi}{6}$$.\n- Step 3: Since sine has period $$2\\pi$$, within $$[0, 2\\pi]$$ there are exactly TWO solutions: $$x = \\dfrac{\\pi}{6}, \\dfrac{5\\pi}{6}$$.\n\nThe procedure is identical to solving in degrees, but the interval and answers are in radian form.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Solve $$\\cos 2\\theta = \\dfrac{\\sqrt{3}}{2}$$ for $$\\theta \\in [0, 2\\pi]$$. (3 steps)", "answer": "- Step 1: Let $$u = 2\\theta$$. As $$\\theta$$ ranges over $$[0, 2\\pi]$$, $$u$$ ranges over $$[0, 4\\pi]$$ — a DOUBLED interval.\n- Step 2: $$\\cos u = \\dfrac{\\sqrt{3}}{2}$$ has solutions $$u = \\pm\\dfrac{\\pi}{6} + 2\\pi k$$. In $$[0, 4\\pi]$$: $$u = \\dfrac{\\pi}{6}, \\dfrac{11\\pi}{6}, \\dfrac{13\\pi}{6}, \\dfrac{23\\pi}{6}$$.\n- Step 3: Divide by 2: $$\\theta = \\dfrac{\\pi}{12}, \\dfrac{11\\pi}{12}, \\dfrac{13\\pi}{12}, \\dfrac{23\\pi}{12}$$ — four solutions.\n\nThe trick: when the argument is $$2\\theta$$, the period halves, doubling the count of solutions in the original interval.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Why does $$\\tan\\theta = 1$$ have only TWO solutions in $$[0, 2\\pi]$$ rather than just one? (3 steps)", "answer": "- Step 1: $$\\tan\\theta = 1$$ has principal solution $$\\theta = \\dfrac{\\pi}{4}$$.\n- Step 2: Tangent has period $$\\pi$$ (not $$2\\pi$$), so the next solution is $$\\theta = \\dfrac{\\pi}{4} + \\pi = \\dfrac{5\\pi}{4}$$.\n- Step 3: Both lie in $$[0, 2\\pi]$$, giving exactly TWO solutions.\n\nThe shorter period of $$\\tan$$ ($$\\pi$$ vs $$2\\pi$$ for sin/cos) is a frequent source of confusion — fewer solutions than you might expect from sine.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "State the three small-angle approximations for $$\\sin, \\cos, \\tan$$ when $$\\theta$$ is in radians.", "answer": "For small $$\\theta$$ (close to 0):\n+ $$\\sin\\theta \\approx \\theta$$\n+ $$\\cos\\theta \\approx 1 - \\dfrac{\\theta^2}{2}$$\n+ $$\\tan\\theta \\approx \\theta$$\n\nThese are the leading-order terms of each function's Taylor series around $$\\theta = 0$$. They become more accurate as $$\\theta \\to 0$$ and progressively worse as $$\\theta$$ grows. Mnemonic: $$\\sin$$ and $$\\tan$$ both \"look like $$\\theta$$\" near zero; $$\\cos$$ \"looks like 1 minus a small parabolic dip.\"", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Why is $$\\sin\\theta \\approx \\theta$$ valid only when $$\\theta$$ is in radians? (3 steps)", "answer": "- Step 1: The approximation comes from the Taylor series $$\\sin\\theta = \\theta - \\dfrac{\\theta^3}{6} + \\dots$$, derived assuming $$\\theta$$ is in radians.\n- Step 2: If $$\\theta$$ were in degrees, the expansion would carry an extra factor: $$\\sin\\theta_{\\deg} = \\dfrac{\\pi}{180}\\theta_{\\deg} - \\dots$$, so the leading term is $$\\dfrac{\\pi}{180}\\theta_{\\deg}$$, not $$\\theta_{\\deg}$$.\n- Step 3: For example: $$\\sin(30°) = 0.5$$ but $$30 \\neq 0.5$$. In radians, $$\\dfrac{\\pi}{6} \\approx 0.524$$, and $$\\sin(0.524) \\approx 0.5$$ — consistent.\n\nSo radians make the approximation work because angle and sine share the same \"natural\" scale.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Explain the geometric intuition behind $$\\sin\\theta \\approx \\theta$$ using the unit circle. (3 steps)", "answer": "- Step 1: On a unit circle, $$\\theta$$ rad corresponds to an arc length of exactly $$\\theta$$ (since $$l = r\\theta = 1 \\cdot \\theta = \\theta$$).\n- Step 2: $$\\sin\\theta$$ is the y-coordinate of the point on the circle — equivalently, the vertical \"height\" above the x-axis.\n- Step 3: For tiny $$\\theta$$, the arc is nearly vertical, so the height ($$\\sin\\theta$$) is almost equal to the arc length ($$\\theta$$). They differ only by a $$\\theta^3$$ amount due to the curvature.\n\nSo $$\\sin\\theta \\approx \\theta$$ is a direct consequence of the radian definition.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Why is $$\\cos\\theta \\approx 1 - \\dfrac{\\theta^2}{2}$$ a \"second-order\" approximation while $$\\sin\\theta \\approx \\theta$$ is \"first-order\"? (3 steps)", "answer": "- Step 1: $$\\sin\\theta$$ is an ODD function — only odd powers of $$\\theta$$ in its Taylor series: $$\\sin\\theta = \\theta - \\dfrac{\\theta^3}{6} + \\dots$$. The first nonzero term is $$\\theta^1$$ (first-order).\n- Step 2: $$\\cos\\theta$$ is an EVEN function — only even powers: $$\\cos\\theta = 1 - \\dfrac{\\theta^2}{2} + \\dfrac{\\theta^4}{24} - \\dots$$. The first non-constant term is $$\\theta^2$$ (second-order).\n- Step 3: Hence sine starts deviating from 0 LINEARLY in $$\\theta$$, while cosine starts deviating from 1 QUADRATICALLY — the parabolic dip is much slower than a linear rise.\n\nThis parity (odd/even) is fundamental and explains the symmetric/antisymmetric behaviours of trig functions.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "Estimate the relative error of $$\\sin\\theta \\approx \\theta$$ for $$\\theta = 0.1, 0.5, 1$$ rad qualitatively. (3 steps)", "answer": "- Step 1: The absolute error is approximately $$\\dfrac{\\theta^3}{6}$$. The RELATIVE error is $$\\dfrac{\\theta^3/6}{\\theta} = \\dfrac{\\theta^2}{6}$$.\n- Step 2:\n+ $$\\theta = 0.1$$: relative error $$\\approx 0.01/6 \\approx 0.17\\%$$ — negligible.\n+ $$\\theta = 0.5$$: relative error $$\\approx 0.25/6 \\approx 4\\%$$ — noticeable.\n+ $$\\theta = 1$$: relative error $$\\approx 1/6 \\approx 17\\%$$ — significant; approximation breaks down.\n- Step 3: Rule of thumb: $$\\sin\\theta \\approx \\theta$$ is excellent for $$|\\theta| < 0.2$$ rad, acceptable for $$|\\theta| < 0.5$$ rad, poor for $$|\\theta| > 1$$ rad.\n\nThis $$\\theta^2$$ scaling of relative error is a key feature of leading-order Taylor approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Use the small-angle approximations to estimate $$\\cos(0.1)$$ and assess the error. (3 steps)", "answer": "- Step 1: Apply $$\\cos\\theta \\approx 1 - \\dfrac{\\theta^2}{2}$$ with $$\\theta = 0.1$$: $$\\cos(0.1) \\approx 1 - \\dfrac{0.01}{2} = 0.995$$.\n- Step 2: The next term in the series is $$+\\dfrac{\\theta^4}{24}$$. For $$\\theta = 0.1$$: $$\\dfrac{0.0001}{24} \\approx 4 \\times 10^{-6}$$ — utterly negligible.\n- Step 3: So the approximation has error of order $$10^{-6}$$, accurate to several decimal places.\n\nThe takeaway: $$\\cos\\theta \\approx 1 - \\tfrac{\\theta^2}{2}$$ has tiny error of order $$\\theta^4$$, so it's wildly accurate for $$\\theta < 0.5$$ rad or so.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "Use small-angle approximations to estimate $$\\dfrac{\\sin(0.05) + \\tan(0.05)}{\\cos(0.05)}$$ without a calculator. (3 steps)", "answer": "- Step 1: Apply approximations: $$\\sin(0.05) \\approx 0.05$$, $$\\tan(0.05) \\approx 0.05$$, $$\\cos(0.05) \\approx 1 - \\dfrac{0.0025}{2} \\approx 0.9988$$.\n- Step 2: Numerator: $$0.05 + 0.05 = 0.10$$. Denominator: $$\\approx 0.9988$$.\n- Step 3: Ratio: $$\\dfrac{0.10}{0.9988} \\approx 0.1001$$ — essentially $$0.10$$ with a tiny correction.\n\nThe approximation collapses an apparently complex expression into simple arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "A pendulum swings through small angle $$\\theta$$. Horizontal displacement is $$L\\sin\\theta$$. Why can we replace this with $$L\\theta$$, and what does this enable? (3 steps)", "answer": "- Step 1: For typical pendulum swings of a few degrees, $$\\sin\\theta \\approx \\theta$$ to better than 1% accuracy.\n- Step 2: So $$L\\sin\\theta \\approx L\\theta$$ — horizontal displacement becomes LINEAR in the angle.\n- Step 3: This linearity allows simple harmonic motion (SHM) analysis: the restoring force becomes proportional to displacement, leading to a clean sinusoidal solution. Without small-angle, the pendulum equation is nonlinear and has no closed-form solution.\n\nThis is one of the most important physics applications — the approximation turns a hard problem into a solvable one.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "Compare the second-order $$\\sin\\theta \\approx \\theta - \\dfrac{\\theta^3}{6}$$ and first-order $$\\sin\\theta \\approx \\theta$$ approximations for $$\\theta = 0.5$$. (3 steps)", "answer": "- Step 1: First-order: $$\\sin(0.5) \\approx 0.5$$.\n- Step 2: Second-order: $$\\sin(0.5) \\approx 0.5 - \\dfrac{0.125}{6} \\approx 0.5 - 0.0208 \\approx 0.4792$$.\n- Step 3: True value (calculator): $$\\sin(0.5) \\approx 0.4794$$.\n+ First-order error: $$\\approx 0.02$$ ($$\\sim$$4%)\n+ Second-order error: $$\\approx 0.0002$$ ($$\\sim$$0.04%)\n\nAdding the cubic correction reduces error by $$\\sim$$100x at this scale.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "When $$\\theta$$ is in radians, $$\\dfrac{d}{d\\theta}\\sin\\theta = \\cos\\theta$$. What does the derivative look like if $$\\theta$$ were in degrees? (3 steps)", "answer": "- Step 1: If $$\\theta$$ is in degrees, $$\\sin\\theta_{\\deg} = \\sin\\left(\\dfrac{\\pi}{180}\\theta_{\\deg}\\right)$$, so by chain rule: $$\\dfrac{d}{d\\theta_{\\deg}}\\sin\\theta_{\\deg} = \\dfrac{\\pi}{180}\\cos\\theta_{\\deg}$$.\n- Step 2: A factor of $$\\dfrac{\\pi}{180} \\approx 0.0175$$ pollutes EVERY derivative formula.\n- Step 3: Hence calculus formulas are stated in radians: differentiation and integration of trig functions are CLEAN only when $$\\theta$$ is in radians.\n\nThis is the deep reason radians are preferred in higher mathematics.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "What's the \"fuzzy boundary\" for \"small enough $$\\theta$$\" in small-angle approximations, and how do you decide? (3 steps)", "answer": "- Step 1: There's no sharp threshold — error grows continuously with $$\\theta$$.\n- Step 2: \"Small enough\" depends on required accuracy:\n+ For 1% accuracy: $$\\theta \\lesssim 0.25$$ rad ($$\\sim$$15°).\n+ For 0.1% accuracy: $$\\theta \\lesssim 0.1$$ rad ($$\\sim$$6°).\n+ For 0.01% accuracy: $$\\theta \\lesssim 0.03$$ rad ($$\\sim$$2°).\n- Step 3: The relevant question: \"How much error can my application tolerate?\" The next Taylor term gives explicit bound.\n\nSo \"small\" is context-dependent and quantifiable via the error estimate.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "Use a small-angle approximation to compare arc length and chord length for $$\\theta = 0.2$$ rad qualitatively. (3 steps)", "answer": "- Step 1: Arc length = $$r\\theta$$. Chord length = $$2r\\sin(\\theta/2) \\approx 2r \\cdot \\theta/2 = r\\theta$$ to leading order.\n- Step 2: Going to second order: $$\\sin(\\theta/2) \\approx \\theta/2 - \\dfrac{(\\theta/2)^3}{6}$$, so chord $$\\approx r\\theta - \\dfrac{r\\theta^3}{24}$$.\n- Step 3: For $$\\theta = 0.2$$: chord/arc ratio $$\\approx 1 - \\dfrac{\\theta^2}{24} = 1 - \\dfrac{0.04}{24} \\approx 0.998$$.\n\nSo chord and arc agree to about 0.2% for $$\\theta = 0.2$$ rad — almost identical, confirming the small-angle picture.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "What is the chord-to-arc ratio in the limit $$\\theta \\to 0$$, and what does this tell you about straight-line approximations of curves? (3 steps)", "answer": "- Step 1: From $$\\dfrac{\\text{chord}}{\\text{arc}} = \\dfrac{2\\sin(\\theta/2)}{\\theta} = \\dfrac{\\sin(\\theta/2)}{\\theta/2}$$, taking $$\\theta \\to 0$$: the ratio approaches 1.\n- Step 2: This means: for very small angles, an arc behaves like a straight line — its chord and the arc become indistinguishable.\n- Step 3: This is the foundational principle behind calculus: smooth curves are LOCALLY linear. Differentiation works precisely because tangent lines approximate curves arbitrarily well at small scales.\n\nThe limit $$\\dfrac{\\sin x}{x} \\to 1$$ as $$x \\to 0$$ is the workhorse of trigonometric calculus.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "A common error: a student writes $$A = \\tfrac{1}{2}r^2 \\theta$$ and plugs in $$\\theta = 50$$ (degrees!) for a sector of radius 3 cm, getting 225 cm². Identify the mistake and the correct answer. (3 steps)", "answer": "- Step 1: The mistake: $$\\theta = 50$$ was used in DEGREES, but the formula $$\\tfrac{1}{2}r^2\\theta$$ requires $$\\theta$$ in RADIANS.\n- Step 2: Convert: $$50° = 50 \\times \\dfrac{\\pi}{180} = \\dfrac{5\\pi}{18}$$ rad $$\\approx 0.873$$ rad.\n- Step 3: Correct area: $$A = \\tfrac{1}{2} \\times 9 \\times 0.873 \\approx 3.93$$ cm² — vastly smaller than 225, by the factor $$\\dfrac{180}{\\pi} \\approx 57.3$$.\n\nThis is the canonical degree-vs-radian error: forgetting to convert leads to absurdly inflated answers.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "Why does the formula $$A = \\tfrac{1}{2}r^2\\theta$$ give NEGATIVE area when $$\\theta$$ is negative? Is this physically meaningful? (3 steps)", "answer": "- Step 1: A negative angle $$\\theta$$ corresponds to rotating in the opposite (clockwise) direction.\n- Step 2: With $$\\theta < 0$$ in $$\\tfrac{1}{2}r^2\\theta$$, the area is negative — but areas in pure geometry should be positive.\n- Step 3: Negative areas ARE meaningful in CONTEXTS like signed areas in calculus (integrals giving signed areas) or rotational analysis. For pure geometry, always use the absolute value $$|\\theta|$$.\n\nSo: in geometry, take absolute values; in calculus or oriented physics, signed areas have meaning.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "A circle has area $$\\pi r^2$$ and circumference $$2\\pi r$$. For a sector with arc length $$l$$, why is the formula $$A = \\tfrac{1}{2}lr$$ structurally identical to a triangle's $$\\tfrac{1}{2}\\text{base} \\times \\text{height}$$? (3 steps)", "answer": "- Step 1: $$A = \\tfrac{1}{2}lr$$ has the form (½)(base)(height), with $$l$$ playing the role of base and $$r$$ the role of height.\n- Step 2: Imagine \"unrolling\" the sector along its arc — the curved arc becomes a straight base of length $$l$$, the radius becomes the perpendicular height.\n- Step 3: This gives a clean mnemonic: a sector is a \"triangle in disguise\" — the curved boundary is straightened, but the area formula has the same triangle-like structure.\n\nThis connection between $$\\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2}lr$$ and triangle area is one of the elegant features of radians.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "A sector has area $$15$$ cm² and angle $$1.5$$ rad. Without computing exactly, describe how to find the radius. (2 steps)", "answer": "- Step 1: From $$A = \\tfrac{1}{2}r^2\\theta$$, isolate: $$r^2 = \\dfrac{2A}{\\theta} = \\dfrac{30}{1.5} = 20$$.\n- Step 2: So $$r = \\sqrt{20} = 2\\sqrt{5}$$ cm.\n\nThe procedure is mechanical: $$r^2 = \\tfrac{2A}{\\theta}$$, take positive square root (lengths are positive).", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "A circle has radius 6 cm. The chord $$PQ$$ divides it into a minor segment of area $$A_1$$ and a major segment of area $$A_2$$. If $$A_2 = 3A_1$$, set up the equation for $$\\theta$$ (the angle subtended at the centre by $$PQ$$). (3 steps)", "answer": "- Step 1: Total area: $$A_1 + A_2 = \\pi r^2 = 36\\pi$$. Combined with $$A_2 = 3A_1$$: $$4A_1 = 36\\pi$$, so $$A_1 = 9\\pi$$.\n- Step 2: $$A_1 = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta) = 18(\\theta - \\sin\\theta)$$.\n- Step 3: Setting equal: $$18(\\theta - \\sin\\theta) = 9\\pi \\Rightarrow \\theta - \\sin\\theta = \\dfrac{\\pi}{2} \\Rightarrow \\sin\\theta = \\theta - \\dfrac{\\pi}{2}$$.\n\nThe transcendental equation $$\\sin\\theta = \\theta - \\pi/2$$ would need numerical methods to solve — but the setup is clean and elegant.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": true}, {"question": "Period of trigonometric functions: how do they compare in degrees vs radians?", "answer": "Both $$\\sin x$$ and $$\\cos x$$ have period $$360°$$ in degrees, equivalently $$2\\pi$$ in radians. $$\\tan x$$ has period $$180°$$, equivalently $$\\pi$$. The period describes the same physical rotation regardless of unit — only the numerical label changes. Critically, when solving trig equations in radians, you look for solutions within $$[0, 2\\pi]$$ for sine/cosine and $$[0, \\pi]$$ within each period for tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "A sector $$AOB$$ has $$\\angle AOB = 2\\theta$$. A circle of radius $$r$$ is inscribed in the sector, touching both radii and the arc. The sector has radius $$R$$. Show why $$R\\sin\\theta = r(1 + \\sin\\theta)$$. (3 steps)", "answer": "- Step 1: Let $$C$$ be the centre of the inscribed circle. By symmetry, $$C$$ lies on the angle bisector of the sector, so $$\\angle DOC = \\theta$$ where $$D$$ is the foot of the perpendicular from $$C$$ to $$OA$$.\n- Step 2: Since the inscribed circle is tangent to the arc at the far point $$T$$, $$OC + CT = R$$, i.e., $$OC + r = R$$, so $$OC = R - r$$.\n- Step 3: In the right-angled triangle $$ODC$$ (with right angle at $$D$$ since radius⊥tangent): $$\\sin\\theta = \\dfrac{CD}{OC} = \\dfrac{r}{R-r}$$.\n+ Cross-multiply: $$r = (R - r)\\sin\\theta = R\\sin\\theta - r\\sin\\theta$$.\n+ Rearrange: $$R\\sin\\theta = r + r\\sin\\theta = r(1 + \\sin\\theta)$$. ✓\n\nThis combines tangent-perpendicularity with sector geometry — a classic A-Level synthesis.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "A composite region's perimeter is being computed. The region is a triangle with one corner replaced by an arc (from a \"lawn sector\" cut into the triangle). Conceptually, what stays and what changes? (3 steps)", "answer": "- Step 1: The original triangle had THREE straight sides. After cutting the sector, you remove TWO partial straight segments (each of length $$r$$, from the vertex to where the arc meets the side) and ADD the arc.\n- Step 2: New perimeter = (sum of remaining straight portions of sides) + (arc length $$r\\theta$$).\n- Step 3: For a triangle with vertex angle $$\\theta$$ and adjacent sides $$a, b$$, both reduced by $$r$$: perimeter = $$(a - r) + (b - r) + (\\text{third side}) + r\\theta$$.\n\nThe key trick: don't blindly add or subtract. Track which boundary pieces remain and which are replaced.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "For a sector of given perimeter $$P$$, what relationship between $$r$$ and $$\\theta$$ maximises the sector's area? (Conceptual outline.) (3 steps)", "answer": "- Step 1: Constraint: $$P = r(\\theta + 2)$$, so $$\\theta = \\dfrac{P}{r} - 2$$.\n- Step 2: Area: $$A = \\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2}r^2\\left(\\dfrac{P}{r} - 2\\right) = \\tfrac{1}{2}(Pr - 2r^2)$$.\n- Step 3: Maximise: $$\\dfrac{dA}{dr} = \\tfrac{1}{2}(P - 4r) = 0 \\Rightarrow r = \\dfrac{P}{4}$$. Then $$\\theta = \\dfrac{P}{P/4} - 2 = 4 - 2 = 2$$ rad.\n\nSo the area-maximising sector has $$\\theta = 2$$ radians (interesting: not $$\\pi$$ or some \"round\" number).", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "When solving trig equations in radians, why is it useful to first identify the principal value, then apply symmetry/periodicity? (3 steps)", "answer": "- Step 1: The principal value is the simplest solution (often in $$[0, \\pi/2]$$) — easily recognised from exact value tables.\n- Step 2: From the principal, apply the function's symmetries:\n+ Sine: $$\\sin(\\pi - \\theta) = \\sin\\theta$$ (second-quadrant symmetry).\n+ Cosine: $$\\cos(2\\pi - \\theta) = \\cos\\theta$$ (reflective symmetry in y-axis).\n+ Tangent: $$\\tan(\\theta + \\pi) = \\tan\\theta$$ (period $$\\pi$$).\n- Step 3: Then add multiples of the period to get all solutions in the required interval.\n\nThis systematic approach prevents missing solutions — a common error in trig equation problems.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "A region bounded by two non-overlapping arcs forms a \"moon\" or \"crescent\" shape. How do you compute its area? (3 steps)", "answer": "- Step 1: Identify which simple shapes the crescent decomposes into. Often: (sector or triangle from circle 1) − (sector or triangle from circle 2), or vice versa.\n- Step 2: Compute each component using the appropriate formula ($$\\tfrac{1}{2}r^2\\theta$$ for sector, $$\\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$ for segment, $$\\tfrac{1}{2}r^2\\sin\\theta$$ for triangle).\n- Step 3: Combine with appropriate signs (subtraction for \"carved out\" regions).\n\nThe strategy applies to ALL composite regions: decompose, compute each, combine. The hard part is identifying the decomposition.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "A sector has angle $$\\theta$$ rad and arc length $$l$$. Why can the relationship between arc length and circumference fraction be written cleanly only when $$\\theta$$ is in radians? (3 steps)", "answer": "- Step 1: Arc-fraction-of-circumference: $$\\dfrac{l}{2\\pi r} = \\dfrac{\\theta}{2\\pi}$$ (in radians). Both sides simplify cleanly.\n- Step 2: In degrees: $$\\dfrac{l}{2\\pi r} = \\dfrac{\\theta_{\\deg}}{360}$$ — needs the conversion 360.\n- Step 3: With radians, the ratios use the same base $$2\\pi$$, so they're cleanly proportional with no factors of 360 or $$\\pi/180$$ to remember.\n\nRadians make proportional reasoning about circles natural and unit-free.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "Why is dimensional analysis a useful tool for checking radian formulas? (3 steps)", "answer": "- Step 1: Length and area have well-defined units (e.g., cm, cm²). Angle in radians is dimensionless.\n- Step 2: Check that each formula's units balance:\n+ $$l = r\\theta$$: cm = cm × (dimensionless) ✓.\n+ $$A = \\tfrac{1}{2}r^2\\theta$$: cm² = cm² × (dimensionless) ✓.\n+ $$A = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$: cm² = cm² × (dimensionless) ✓.\n- Step 3: If your final answer has the wrong units, you've made an error. This is one of the cheapest, most powerful sanity checks.\n\nA formula that doesn't pass dimensional analysis is wrong. Always check.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "A pendulum tip moves through small angle $$\\theta = 0.2$$ rad on a string of length $$L$$. Compare the actual horizontal displacement and the arc length traversed by the tip. (3 steps)", "answer": "- Step 1: Arc length traced = $$L\\theta = 0.2L$$.\n- Step 2: Horizontal displacement = $$L\\sin\\theta = L\\sin(0.2) \\approx L(0.2 - \\tfrac{0.008}{6}) \\approx 0.1987L$$.\n- Step 3: They differ by less than 1% — arc is slightly LONGER because the path is curved. As $$\\theta$$ grows, divergence widens.\n\nFor practical small-angle pendulum problems, \"arc length\" and \"horizontal displacement\" are interchangeable to good accuracy.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Given a circle of radius $$r$$ and a regular polygon with $$n$$ sides inscribed in it, why does the polygon's perimeter approach $$2\\pi r$$ as $$n \\to \\infty$$? (3 steps)", "answer": "- Step 1: Each side of the polygon is a chord subtending angle $$\\dfrac{2\\pi}{n}$$ at the centre.\n- Step 2: Side length = $$2r\\sin\\left(\\dfrac{\\pi}{n}\\right)$$. Perimeter = $$n \\times 2r\\sin\\left(\\dfrac{\\pi}{n}\\right) = 2rn\\sin\\left(\\dfrac{\\pi}{n}\\right)$$.\n- Step 3: As $$n \\to \\infty$$, $$\\dfrac{\\pi}{n} \\to 0$$, and $$\\sin\\left(\\dfrac{\\pi}{n}\\right) \\approx \\dfrac{\\pi}{n}$$. So perimeter $$\\approx 2rn \\cdot \\dfrac{\\pi}{n} = 2\\pi r$$ — the circumference!\n\nThis is essentially how Archimedes computed $$\\pi$$: by inscribing/circumscribing polygons. The small-angle approximation is the analytical engine.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "Two circles of equal radius 12 cm intersect such that each passes through the other's centre. The angle subtended at each centre by the common chord is what? (3 steps)", "answer": "- Step 1: Each centre lies on the OTHER circle, so the distance between centres equals the radius (12 cm). The triangle formed by the two centres and an intersection point has all sides equal to 12 — an equilateral triangle.\n- Step 2: Each angle of the equilateral trian
