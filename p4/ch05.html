n- Step 2: For F(x, y) = 0, ∂F/∂x is the derivative treating y as constant; ∂F/∂y is the derivative treating x as constant. Their ratio (with negative sign) gives dy/dx. This is essentially what we do manually in implicit differentiation.\n+ For example, if F = x² + y² - 4, then ∂F/∂x = 2x, ∂F/∂y = 2y, giving dy/dx = -2x/2y = -x/y", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "A function is defined parametrically by x = t - sin t, y = 1 - cos t. Find dy/dx and determine where the curve has horizontal and vertical tangents. (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = 1 - cos t, dy/dt = sin t\n- Step 2: dy/dx = sin t/(1 - cos t). Using identity: = 2 sin(t/2) cos(t/2)/[2 sin²(t/2)] = cot(t/2)\n- Step 3: Horizontal tangents (dy/dx = 0): sin t = 0 gives t = 0, π, 2π... At these, check dx/dt ≠ 0. At t = 0, dx/dt = 0, so this is a singular point (cusp). Vertical tangents (dx/dt = 0): cos t = 1 gives t = 0, 2π... Same points! These are cusp points.\n+ The cycloid has cusps where it touches the ground", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": true}, {"question": "Why might we choose to parametrize a curve rather than work with its Cartesian equation? Give two practical advantages. (2 steps)", "answer": "- Step 1: Advantages of parametric form: (1) Some curves cannot be expressed as single Cartesian functions (like circles, ellipses, cycloids) but can be easily described parametrically; (2) Parametric form naturally describes motion along a curve, with the parameter often representing time.\n- Step 2: Additionally, parametric differentiation is often simpler than implicit differentiation for complex curves, and it handles multiple branches automatically without needing to track them separately.\n+ For computer graphics and animation, parametric forms are far more practical", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "The gradient function of a curve is dy/dx = (x + y)/(x - y). At the point (2, 2), what is the gradient? What happens at points where x = y? (2 steps)", "answer": "- Step 1: At (2, 2): dy/dx = (2 + 2)/(2 - 2) = 4/0 → undefined (vertical tangent)\n- Step 2: When x = y, the denominator is zero, giving vertical tangents (or undefined gradient). At these points, the curve has a vertical tangent line.\n+ The line y = x consists of points where the gradient is undefined for this curve", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}, {"question": "A certain bacteria population P grows so that dP/dt = kP(1000 - P). What type of growth does this differential equation describe? What do the two terms in the parentheses represent? (2 steps)", "answer": "- Step 1: This is logistic growth — bounded growth with a carrying capacity. It combines exponential growth (kP) with a limiting factor (1000 - P) that slows growth as P approaches 1000.\n- Step 2: The term P represents current population (growth potential), and (1000 - P) represents the \"room to grow.\" When P is small, (1000 - P) ≈ 1000, giving near-exponential growth. As P → 1000, the factor goes to zero, stopping growth.\n+ This models real populations that stabilize due to limited resources", "source": "MiniMax ②", "_id": "minimax_2_70", "judge_pick": true}, {"question": "For the parametric equations x = t² + 1, y = t³ - 3t, find the points where the curve crosses itself (self-intersection). What does this mean geometrically? (3 steps)", "answer": "- Step 1: Self-intersection occurs when two different parameter values give the same (x, y). So we need t₁ ≠ t₂ such that x(t₁) = x(t₂) and y(t₁) = y(t₂).\n- Step 2: t₁² + 1 = t₂² + 1 → t₁² = t₂² → t₁ = ±t₂. And t₁³ - 3t₁ = t₂³ - 3t₂\n- Step 3: If t₂ = -t₁, then t₁³ - 3t₁ + (-t₁)³ + 3(-t₁) = t₁³ - 3t₁ - t₁³ - 3t₁ = -6t₁ = 0 → t₁ = 0. Then t₂ = 0 as well — same point. If t₂ = t₁, trivial. So there's actually no self-intersection for this particular curve (it passes through each point once).\n+ This particular parametric curve is a \"simple\" curve with no self-intersections. Other curves (like the cycloid's evolution) can have nodes.", "source": "MiniMax ②", "_id": "minimax_2_71", "judge_pick": false}, {"question": "When solving \"show that\" type questions in implicit differentiation, what is the typical structure of the solution? What should you verify at the end? (2 steps)", "answer": "- Step 1: The typical structure: (1) Differentiate both sides of the given equation with respect to x, applying chain rule and product rule as needed; (2) Rearrange algebraically to isolate dy/dx; (3) Substitute the given point coordinates if required; (4) Simplify to match the target form.\n- Step 2: At the end, verify that your final expression matches what was to be shown. Sometimes this involves algebraic manipulation or recognizing a simplified form of your result.\n+ The key is keeping track of all dy/dx terms and combining them correctly", "source": "MiniMax ②", "_id": "minimax_2_72", "judge_pick": false}, {"question": "A curve is defined implicitly by y = sin(x + y). Find dy/dx. What complication arises from having y on both sides? (2 steps)", "answer": "- Step 1: Differentiate: dy/dx = cos(x + y) × (1 + dy/dx)\n- Step 2: So dy/dx = cos(x + y) + cos(x + y) × dy/dx. Rearranging: dy/dx[1 - cos(x + y)] = cos(x + y)\n- Step 3: Thus dy/dx = cos(x + y)/[1 - cos(x + y)]\n+ The complication is that dy/dx appears on BOTH sides of the equation after differentiation, requiring algebraic rearrangement to solve for it", "source": "MiniMax ②", "_id": "minimax_2_73", "judge_pick": true}, {"question": "In many physics applications, parametric equations describe motion with the parameter being time t. In this context, what does dy/dx represent physically? How is it different from dy/dt and dx/dt? (2 steps)", "answer": "- Step 1: When t is time: dx/dt is the x-velocity, dy/dt is the y-velocity, and dy/dx is the direction of motion (the slope of the trajectory). dy/dx tells us the path's direction at each instant, while dy/dt and dx/dt tell us how fast we move in each direction.\n- Step 2: This is crucial in physics: the trajectory's shape (dy/dx) is separate from how fast we traverse it (dx/dt, dy/dt). Two objects can follow the same path (same dy/dx) at different speeds.\n+ For example, projectiles with different initial speeds follow the same parabolic path but at different rates", "source": "MiniMax ②", "_id": "minimax_2_74", "judge_pick": true}, {"question": "A curve has implicit equation x²y + xy² = 6. Find the equations of the tangents at the point (1, 2). How many tangents does this point have and why? (3 steps)", "answer": "- Step 1: Differentiate implicitly: 2x y + x²(dy/dx) + x(2y)(dy/dx) + y² = 0. Simplifying: 2xy + y² + dy/dx(x² + 2xy) = 0\n- Step 2: So dy/dx = -(2xy + y²)/(x² + 2xy) = -(2×1×2 + 2²)/(1² + 2×1×2) = -(4 + 4)/(1 + 4) = -8/5 = -1.6\n- Step 3: At (1, 2), there's ONE tangent with gradient -8/5. The equation is: y - 2 = (-8/5)(x - 1), or 5y - 10 = -8x + 8, or 8x + 5y - 18 = 0.\n+ Each point on this curve has exactly one tangent (unless it's a singular point) — curves don't typically have multiple tangents at a single point", "source": "MiniMax ②", "_id": "minimax_2_75", "judge_pick": false}, {"question": "The gradient of a curve is given by dy/dx = (x² - y²)/(xy). At points where x = y, what happens? What does this indicate about the curve's behavior? (2 steps)", "answer": "- Step 1: When x = y, denominator xy = x² (non-zero if x ≠ 0), and numerator x² - y² = 0, so dy/dx = 0/x² = 0. These are horizontal tangents along the line y = x.\n- Step 2: The curve crosses its own path at x = y with horizontal tangents. These could be local maxima or minima depending on the second derivative, or points where the curve turns back on itself.\n+ The line y = x is significant for this curve — it's where gradient is zero", "source": "MiniMax ②", "_id": "minimax_2_76", "judge_pick": false}, {"question": "When a curve is given by x = f(t), y = g(t), explain why the second derivative d²y/dx² cannot simply be the derivative of dy/dx with respect to t. What is the correct formula and why? (3 steps)", "answer": "- Step 1: The first derivative is dy/dx = (dy/dt)/(dx/dt). The second derivative is d/dx(dy/dx), not d/dt(dy/dx).\n- Step 2: Since dy/dx is a function of t, we must use the chain rule: d²y/dx² = d/dt(dy/dx) ÷ (dx/dt)\n- Step 3: The formula is: $$\\frac{d^2y}{dx^2} = \\frac{d}{dt}\\left(\\frac{dy}{dx}\\right) \\div \\frac{dx}{dt} = \\frac{d}{dt}\\left(\\frac{dy}{dx}\\right) \\times \\frac{dt}{dx}$$\n+ We divide by dx/dt again because we're differentiating with respect to x, not t", "source": "MiniMax ②", "_id": "minimax_2_77", "judge_pick": false}, {"question": "A curve has parametric equations x = t², y = t⁴ - 2t². Find d²y/dx² and simplify. What does the sign of this second derivative tell us about the curve's concavity? (3 steps)", "answer": "- Step 1: First derivative: dy/dx = (4t³ - 4t)/(2t) = 2t² - 2, for t ≠ 0\n- Step 2: Second derivative: d²y/dx² = d/dt(2t² - 2) ÷ (2t) = (4t)/(2t) = 2, for t ≠ 0\n- Step 3: Since d²y/dx² = 2 > 0 everywhere (for t ≠ 0), the curve is always concave up (like a cup). This means any stationary points must be minima.\n+ Positive second derivative indicates concave up; negative indicates concave down", "source": "MiniMax ②", "_id": "minimax_2_78", "judge_pick": false}, {"question": "In the context of rates of change, what does it mean when a problem says \"at a rate of\" versus \"proportional to\"? How does this affect the differential equation? (2 steps)", "answer": "- Step 1: \"At a rate of k\" means equals k (a constant or known function): dA/dt = k. \"Proportional to\" means equals k times: dA/dt = k × (something). The former gives a specific rate; the latter gives a relationship to determine.\n- Step 2: \"At a constant rate\" means the rate itself doesn't change with variables. \"Proportional to\" means the rate scales with another variable.\n+ For example, \"decreasing at a rate of 5 cm/s\" gives dL/dt = -5. \"Decreasing at a rate proportional to length\" gives dL/dt = -kL", "source": "MiniMax ②", "_id": "minimax_2_79", "judge_pick": false}, {"question": "Find the gradient of the curve with equation $$\\ln(y^2) = \\frac{1}{2}x\\ln(x-1)$$ at x = 4, given x > 1 and y > 0. Set up the solution conceptually. (3 steps)", "answer": "- Step 1: Differentiate implicitly: (1/y²)(2y)(dy/dx) = (1/2)[ln(x-1) + x × (1/(x-1))]\n+ Simplifying left: (2/y)(dy/dx) = (1/2)[ln(x-1) + x/(x-1)]\n- Step 2: So dy/dx = (y/4)[ln(x-1) + x/(x-1)]\n- Step 3: At x = 4: right side = (1/2)[ln(3) + 4/3]. We need y: from ln(y²) = (1/2)(4)ln(3) = 2ln(3), so y² = e^(2ln3) = 9, y = 3 (positive branch). So dy/dx = (3/4)[ln(3) + 4/3] = (3/4)ln(3) + 1\n+ This is the gradient at the point (4, 3)", "source": "MiniMax ②", "_id": "minimax_2_80", "judge_pick": false}, {"question": "A curve is given parametrically by x = sin⁻¹(t), y = √(1-t²). At t = 0, find the gradient and explain what the curve represents. (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = 1/√(1-t²), dy/dt = -t/√(1-t²)\n- Step 2: So dy/dx = (-t/√(1-t²))/(1/√(1-t²)) = -t\n- Step 3: At t = 0: dy/dx = 0 (horizontal tangent). The curve is the upper half of the unit circle x² + y² = 1 (since sin⁻¹(t) = x means t = sin x, then y = √(1-sin²x) = cos x for x in the right domain)\n+ At t = 0, we have the point (0, 1), the top of the circle, where the tangent is horizontal", "source": "MiniMax ②", "_id": "minimax_2_81", "judge_pick": false}, {"question": "In implicit differentiation, what is the difference between using the \"general formula\" approach versus differentiating term-by-term directly? When would you prefer each? (2 steps)", "answer": "- Step 1: The general formula dy/dx = -(∂F/∂x)/(∂F/∂y) is systematic but requires understanding partial derivatives. Term-by-term is more intuitive but requires careful application of chain rule.\n- Step 2: For simple equations like x² + y² = 4, term-by-term is faster. For complex equations or when proving general results, the formula is more elegant. Both give identical results.\n+ In practice, most students prefer term-by-term differentiation as it's more transparent", "source": "MiniMax ②", "_id": "minimax_2_82", "judge_pick": false}, {"question": "A curve has equation y = f(x) where f is defined implicitly. Explain why finding d²y/dx² using implicit differentiation is more complex than finding dy/dx. What extra step is needed? (2 steps)", "answer": "- Step 1: After finding dy/dx implicitly (which itself contains x and y), differentiating again requires treating y as a function of x, so any y in dy/dx must be differentiated using the chain rule: d/dx(y) = dy/dx.\n- Step 2: The extra step is applying the product/chain rule to the first derivative expression, which now contains both x and y(x). This makes the algebra significantly more involved.\n+ For example, if dy/dx = -x/y, then d²y/dx² = d/dx(-x/y) = -(1×y - x×dy/dx)/y² using quotient rule", "source": "MiniMax ②", "_id": "minimax_2_83", "judge_pick": true}, {"question": "In parametric form, the curve x = a cos³t, y = a sin³t (an astroid) has a singular point at t = 0. Find dy/dx and explain what happens. (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = -3a cos²t sin t, dy/dt = 3a sin²t cos t\n- Step 2: So dy/dx = (3a sin²t cos t)/(-3a cos²t sin t) = -tan t / tan t = -1 for t ≠ 0, π/2, etc. Wait: = -sin²t cos t/(cos²t sin t) = -sin/cos = -tan t? Let me redo: = (3a sin²t cos t)/(-3a cos²t sin t) = -(sin²t cos t)/(cos²t sin t) = -sin t/cos t = -tan t\n- Step 3: At t = 0: dy/dx = -tan(0) = 0. But dx/dt = 0 at t = 0, giving 0/0 form. Using limit: as t → 0, -tan t/t → -1. So gradient = -1 at the cusp!\n+ The astroid has a cusp at (a, 0) where the tangent is well-defined (gradient -1) but the curve has a sharp point", "source": "MiniMax ②", "_id": "minimax_2_84", "judge_pick": true}, {"question": "The gradient of a curve is given by dy/dx = √(xy). At the point (4, 1), find the gradient. What does the domain restriction (x, y ≥ 0) indicate? (2 steps)", "answer": "- Step 1: At (4, 1): dy/dx = √(4 × 1) = √4 = 2\n- Step 2: The domain restriction (x, y ≥ 0) indicates that the square root is defined for non-negative arguments only. If xy < 0, we'd have imaginary values, which aren't part of this real curve.\n+ This gradient formula only makes sense in the first quadrant of the xy-plane", "source": "MiniMax ②", "_id": "minimax_2_85", "judge_pick": false}, {"question": "Explain why the equation of the tangent to an implicit curve at a point can always be written in the form: $$y - y_0 = \\left(\\frac{dy}{dx}\\right)_{(x_0,y_0)}(x - x_0)$$. What does this tell us about tangents in general? (2 steps)", "answer": "- Step 1: This is the point-slope form of a line, valid for any curve where the derivative exists. The tangent line at a point is the line that best approximates the curve near that point — it's the unique line through the point with the same instantaneous rate of change.\n- Step 2: For implicit curves, we find dy/dx at the point (x₀, y₀) via implicit differentiation, then plug into this standard form. This works because locally, even complex curves look like their tangents.\n+ The tangent is the linear approximation to the curve at that point", "source": "MiniMax ②", "_id": "minimax_2_86", "judge_pick": false}, {"question": "A curve is defined parametrically by x = t³ - 12t + 1, y = t² - 4t. Find the points where the tangent is parallel to the y-axis. What does \"parallel to the y-axis\" mean for a tangent? (2 steps)", "answer": "- Step 1: Tangent parallel to y-axis means vertical tangent, so dx/dt = 0 (and dy/dt ≠ 0 to avoid singular points). dx/dt = 3t² - 12 = 3(t² - 4) = 0 gives t = ±2\n- Step 2: At t = 2: dy/dt = 4 - 8 = -4 ≠ 0, so valid. Point: x = 8 - 24 + 1 = -15, y = 4 - 8 = -4 → (-15, -4). At t = -2: dy/dt = -4 - 8 = -12 ≠ 0. Point: x = -8 + 24 + 1 = 17, y = 4 + 8 = 12 → (17, 12)\n+ These are points where the tangent is vertical (parallel to y-axis)", "source": "MiniMax ②", "_id": "minimax_2_87", "judge_pick": false}, {"question": "In rates of change problems, what is the difference between a \"steady rate\" and a \"rate proportional to\"? Give examples from real-world contexts. (2 steps)", "answer": "- Step 1: \"Steady rate\" means constant: dA/dt = k (like water flowing at 5 L/min). \"Rate proportional to\" means variable, scaling with something: dA/dt = k × (something), like population growing at 5% per year (dP/dt = 0.05P).\n- Step 2: Examples: A leaking tap might release water at a steady rate. A cooling object's rate of temperature loss is proportional to temperature difference (Newton's law). Radioactive decay is proportional to remaining atoms.\n+ Steady rates give linear change; proportional rates give exponential change", "source": "MiniMax ②", "_id": "minimax_2_88", "judge_pick": false}, {"question": "For the implicit curve x³ + y³ = 3xy + 1, find dy/dx. At the point (1, 1), verify the gradient is 0. What does this indicate about the curve locally? (3 steps)", "answer": "- Step 1: Differentiate: 3x² + 3y²(dy/dx) = 3y + 3x(dy/dx)\n- Step 2: Rearranging: 3y²(dy/dx) - 3x(dy/dx) = 3y - 3x², so dy/dx(y² - x) = y - x²\n- Step 3: Thus dy/dx = (y - x²)/(y² - x). At (1, 1): (1 - 1)/(1 - 1) = 0/0! Indeterminate. Need to find the limit or check via substitution. Let's differentiate differently or check if (1,1) is on the curve: 1 + 1 = 3 + 1? 2 ≠ 4, so (1,1) is NOT on the curve! Wait, let me check: x³ + y³ = 1 + 1 = 2, and 3xy + 1 = 3 + 1 = 4. These are not equal, so (1,1) is not on this curve. The question premise is incorrect. If we try (0,1): 0 + 1 = 0 + 1, works. At (0,1): dy/dx = (1 - 0)/(1 - 0) = 1. So gradient = 1 at (0,1).\n+ We must always verify the point is on the curve before evaluating the gradient", "source": "MiniMax ②", "_id": "minimax_2_89", "judge_pick": false}, {"question": "A curve is defined by x = t/(1+t), y = t²/(1+t). Find dy/dx in terms of t, and show this simplifies to y = x/(1-x). What does this tell us about the relationship? (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = [(1+t) - t]/(1+t)² = 1/(1+t)², dy/dt = [2t(1+t) - t²]/(1+t)² = (2t + 2t² - t²)/(1+t)² = (t² + 2t)/(1+t)²\n- Step 2: dy/dx = (t² + 2t)/(1) = t² + 2t = t(t + 2)\n- Step 3: Also from x = t/(1+t), solving for t: x(1+t) = t → x + xt = t → x = t(1-x) → t = x/(1-x). Then y = t²/(1+t) = [x²/(1-x)²] / [(1-x + x)/(1-x)] = x²/(1-x). Wait, we need to verify: y = t²/(1+t), substitute t = x/(1-x): y = [x²/(1-x)²] / [(1-x + x)/(1-x)] = [x²/(1-x)²] / [1/(1-x)] = x²/(1-x). This is NOT equal to x/(1-x) generally! Let me check: the simplification y = x/(1-x) appears incorrect. Actually, let's eliminate t: from x = t/(1+t), we get t = x/(1-x). Then y = [x²/(1-x)²] / [(1-x + x)/(1-x)] = x²/(1-x), which is x²/(1-x), not x/(1-x). The claimed simplification is wrong.\n+ The actual Cartesian equation is y = x²/(1-x), a different curve", "source": "MiniMax ②", "_id": "minimax_2_90", "judge_pick": false}, {"question": "What is a \"point of inflection\" in the context of implicit curves? How would you find such a point using differentiation? (2 steps)", "answer": "- Step 1: A point of inflection is where the concavity of the curve changes — the curve switches from concave up to concave down (or vice versa). Mathematically, this requires d²y/dx² = 0 (and a sign change).\n- Step 2: For implicit curves, we'd find dy/dx first (implicitly), then differentiate again (using implicit differentiation on dy/dx), set the result equal to zero, and solve together with the original equation.\n+ This is computationally complex but follows the same principles as explicit curves", "source": "MiniMax ②", "_id": "minimax_2_91", "judge_pick": false}, {"question": "In parametric form, how would you find the equation of the normal to a curve at a given point? What is the key relationship between the tangent and normal gradients? (2 steps)", "answer": "- Step 1: Steps: (1) Find dy/dx using parametric differentiation; (2) At the given parameter value, find the point (x, y) and the gradient m = dy/dx; (3) The normal gradient is -1/m (negative reciprocal); (4) Use point-slope form: y - y₁ = m_normal(x - x₁).\n- Step 2: The key relationship: m_tangent × m_normal = -1 (perpendicular lines). This ensures the normal is perpendicular to the tangent.\n+ If the tangent is vertical (m = ∞), the normal is horizontal (m = 0), and vice versa", "source": "MiniMax ②", "_id": "minimax_2_92", "judge_pick": false}, {"question": "A curve has implicit equation (x - y)⁴ = x + y + 5. Find dy/dx. What is the challenge in differentiating the left side? (2 steps)", "answer": "- Step 1: Let u = x - y, so u⁴. Differentiate: 4(x - y)³ × (1 - dy/dx) = 1 + dy/dx\n- Step 2: This gives: 4(x - y)³ - 4(x - y)³ dy/dx = 1 + dy/dx. Rearranging: dy/dx[1 + 4(x - y)³] = 4(x - y)³ - 1, so dy/dx = [4(x - y)³ - 1]/[1 + 4(x - y)³]\n+ The challenge is the chain rule applied to (x - y)⁴: we need the derivative of (x - y), which is 1 - dy/dx, because y depends on x", "source": "MiniMax ②", "_id": "minimax_2_93", "judge_pick": true}, {"question": "Why is it important in rate of change problems to ensure all variables are expressed in consistent units before differentiating? What common errors can this prevent? (2 steps)", "answer": "- Step 1: If variables are in different units (e.g., radius in cm, area in m²), the relationship between them is incorrect. Converting to consistent units first ensures the derivative relationships are valid.\n- Step 2: Common errors: mixing seconds with minutes, centimeters with meters, or different time units. This leads to incorrect numerical answers by factors of 60, 100, or other conversion factors.\n+ Always check units match before setting up the derivative relationship", "source": "MiniMax ②", "_id": "minimax_2_94", "judge_pick": false}, {"question": "A curve is defined by x = e^t cos t, y = e^t sin t. This is a logarithmic spiral. Find dy/dx in terms of t. What happens to the gradient as t → ∞? (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = e^t cos t - e^t sin t = e^t(cos t - sin t), dy/dt = e^t sin t + e^t cos t = e^t(sin t + cos t)\n- Step 2: So dy/dx = (sin t + cos t)/(cos t - sin t)\n- Step 3: As t → ∞, this oscillates without settling — the gradient keeps cycling through values as the spiral winds around the origin. There's no limit.\n+ The spiral never stops winding, so the gradient keeps oscillating", "source": "MiniMax ②", "_id": "minimax_2_95", "judge_pick": false}, {"question": "In implicit differentiation problems where the answer must be shown to equal a given expression, what strategy helps verify you've reached the correct form? (2 steps)", "answer": "- Step 1: Compare your derived expression with the target expression algebraically. Look for opportunities to factor, cancel, or simplify to match the target form exactly.\n- Step 2: If stuck, substitute specific numeric values (that satisfy the original equation) into both your expression and the target — they should give the same numerical result, confirming equivalence.\n+ This is a useful check when the algebraic manipulation to reach the target form is complex", "source": "MiniMax ②", "_id": "minimax_2_96", "judge_pick": false}, {"question": "A curve is given by x = t, y = t^5 - 5t³ + 4t. This is actually equivalent to y = x^5 - 5x³ + 4x. Find where the gradient is zero. What do these points represent? (2 steps)", "answer": "- Step 1: Since y = f(x), we can differentiate directly: dy/dx = 5x^4 - 15x² + 4 = 0. Let u = x²: 5u² - 15u + 4 = 0 → u = [15 ± √(225 - 80)]/10 = [15 ± √145]/10\n- Step 2: So x = ±√([15 + √145]/10) and x = ±√([15 - √145]/10). There are four solutions. These are stationary points where the tangent is horizontal.\n+ These could be maxima, minima, or points of inflection — we need the second derivative to classify them", "source": "MiniMax ②", "_id": "minimax_2_97", "judge_pick": false}, {"question": "In the context of parametric differentiation, what does \"eliminating the parameter\" mean? When is this approach impractical? (2 steps)", "answer": "- Step 1: Eliminating the parameter means solving the parametric equations to express y directly as a function of x (or vice versa), removing t entirely. For x = t², y = t³, eliminating t gives y = x^(3/2) (for x ≥ 0).\n- Step 2: This is impractical when: (1) the elimination produces multiple branches requiring case analysis; (2) the algebraic manipulation is extremely complex; (3) the relationship cannot be expressed in elementary functions; (4) we only need dy/dx, where parametric differentiation is simpler.\n+ Many parametric curves (like cycloids, spirals) are actually simpler in parametric form", "source": "MiniMax ②", "_id": "minimax_2_98", "judge_pick": false}, {"question": "The gradient of a curve is given by dy/dx = (y - x)/(y + x). At points where y = 0, what is the gradient? What about when x = 0? What does this indicate about the curve's shape? (2 steps)", "answer": "- Step 1: When y = 0: dy/dx = (-x)/(x) = -1. So along the x-axis (excluding origin), gradient is always -1 (lines at -45°). When x = 0: dy/dx = y/y = 1 (provided y ≠ 0). Along the y-axis, gradient is always +1 (lines at 45°).\n- Step 2: This suggests the curve crosses the axes at 45° angles: it meets the x-axis at -45° and the y-axis at +45°. The curve appears to make \"X\" patterns through the axes.\n+ These gradient constraints strongly determine the curve's geometry", "source": "MiniMax ②", "_id": "minimax_2_99", "judge_pick": false}, {"question": "A tank contains V cubic meters of water, decreasing at rate dV/dt = -k√V (outflow proportional to square root of volume). This is a differential equation. What type of equation is this and how would you solve it? (3 steps)", "answer": "- Step 1: This is a first-order separable differential equation. We can separate variables: dV/√V = -k dt → V^(-1/2) dV = -k dt\n- Step 2: Integrate: ∫V^(-1/2) dV = ∫-k dt → 2√V = -kt + C → √V = C' - (k/2)t\n- Step 3: This gives V(t) = (C' - (k/2)t)², showing volume decreases quadratically with time (parabolic decay), not exponentially.\n+ This models water tanks with outlet valves where flow depends on water height (pressure)", "source": "MiniMax ②", "_id": "minimax_2_100", "judge_pick": false}, {"question": "For the parametric curve x = sin(2t), y = cos(2t), what curve does this trace? Find dy/dx and explain the result. (2 steps)", "answer": "- Step 1: Eliminating t: sin²(2t) + cos²(2t) = 1, so x² + y² = 1. This is the unit circle, traced twice as t goes from 0 to π (since sin(2t) and cos(2t) have period π).\n- Step 2: Differentiating: dx/dt = 2 cos(2t), dy/dt = -2 sin(2t), so dy/dx = (-2 sin(2t))/(2 cos(2t)) = -tan(2t). At any point, this gives the correct slope for the circle. As t varies, we get all possible slopes around the circle.\n+ The parametric form goes around the circle twice as t goes from 0 to π", "source": "MiniMax ②", "_id": "minimax_2_101", "judge_pick": false}, {"question": "A curve has implicit equation x² + xy + y² = 3. At the point (1, 1), find the gradient. What does the fact that dy/dx is negative tell us about the curve locally? (2 steps)", "answer": "- Step 1: Differentiate: 2x + (x dy/dx + y) + 2y dy/dx = 0 → dy/dx(x + 2y) = -2x - y → dy/dx = (-2x - y)/(x + 2y)\n- Step 2: At (1, 1): dy/dx = (-2 - 1)/(1 + 2) = -3/3 = -1\n+ The negative gradient tells us the curve is descending (going down as we move right) at this point. The tangent line has slope -1, so it's a 45° decline.\n+ This curve is an ellipse rotated 45°, and at (1, 1) it's heading \"southeast\"", "source": "MiniMax ②", "_id": "minimax_2_102", "judge_pick": false}, {"question": "In the formula for parametric differentiation, dy/dx = (dy/dt)/(dx/dt), explain why this is essentially the chain rule rearranged. What does this tell us about the relationship between the three derivatives? (2 steps)", "answer": "- Step 1: The chain rule states: dy/dx = (dy/dt)(dt/dx). Since dt/dx = 1/(dx/dt), we get dy/dx = (dy/dt)/(dx/dt). This is just algebraic rearrangement, not a new rule.\n- Step 2: The relationship shows that the rate of change of y with respect to x equals the rate of y with respect to t, divided by the rate of x with respect to t. The parameter t acts as an intermediary \"bridge\" between x and y.\n+ This is powerful because we can find derivatives in simpler parameter space and combine them", "source": "MiniMax ②", "_id": "minimax_2_103", "judge_pick": false}, {"question": "The gradient of a curve is given by dy/dx = x²/y. At the point (2, 4), find the gradient. If the curve passes through this point, what type of curve might this be? (2 steps)", "answer": "- Step 1: At (2, 4): dy/dx = (2²)/4 = 4/4 = 1\n- Step 2: This suggests a curve with gradient 1 at (2, 4). This could be a parabola, hyperbola, or other conic section. The relationship x²/y = constant when integrated gives y = kx³? Wait: dy/dx = x²/y → y dy = x² dx → integrate: (1/2)y² = (1/3)x³ + C → 3y² = 2x³ + C'. This is not a standard conic — it's a cubic relationship.\n+ The curve defined by dy/dx = x²/y is related to y² ∝ x³, which is like a parabola-like curve", "source": "MiniMax ②", "_id": "minimax_2_104", "judge_pick": false}, {"question": "A curve is defined by x = t² + t, y = t² - t. Find dy/dx in terms of t. At what values of t does the tangent have gradient 1? (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = 2t + 1, dy/dt = 2t - 1\n- Step 2: dy/dx = (2t - 1)/(2t + 1)\n- Step 3: Set equal to 1: (2t - 1)/(2t + 1) = 1 → 2t - 1 = 2t + 1 → -1 = 1, which is impossible!\n+ This curve never has tangent slope 1 — the gradient is always less than 1 (for t > -1/2) or greater than 1 (for t < -1/2), approaching but never reaching 1 as t → ∞", "source": "MiniMax ②", "_id": "minimax_2_105", "judge_pick": true}, {"question": "When solving related rates problems involving similar triangles (like a ladder sliding), what geometric relationship typically links the variables? Why does this work? (2 steps)", "answer": "- Step 1: Similar triangles give proportional relationships between sides. For a ladder of fixed length L against a wall: x² + y² = L² (Pythagoras) is actually a specific case of similar triangles (the ground, wall, and ladder form a right triangle).\n- Step 2: More generally, if the proportions change (like a melting ice cube maintaining shape), then volume and linear dimensions are related by similarity: V ∝ L³, area ∝ L². This allows converting between rates of change of different quantities.\n+ Similarity ensures the shape remains constant while size changes, providing exact proportional relationships", "source": "MiniMax ②", "_id": "minimax_2_106", "judge_pick": false}, {"question": "For the curve defined by x = t/(1-t), y = t²/(1-t) (a portion of a parabola), find the gradient at t = 2. What is the point's location? (3 steps)", "answer": "- Step 1: First verify domain: t ≠ 1. At t = 2, this is valid. Compute derivatives: dx/dt = [(1-t) - t(-1)]/(1-t)² = (1-t + t)/(1-t)² = 1/(1-t)² = 1/(1-2)² = 1\n- Step 2: dy/dt = [2t(1-t) - t²(-1)]/(1-t)² = (2t - 2t² + t²)/(1-t)² = (2t - t²)/(1-t)². At t = 2: (4 - 4)/(1)² = 0\n- Step 3: dy/dx = 0/1 = 0. The point is (x, y) = (2/(1-2), 4/(1-2)) = (2/(-1), 4/(-1)) = (-2, -4). Gradient = 0 (horizontal tangent).\n+ At (-2, -4), the curve has a horizontal tangent line", "source": "MiniMax ②", "_id": "minimax_2_107", "judge_pick": false}, {"question": "Explain why implicit differentiation is sometimes the only practical method for finding tangents to curves that are not functions. Give an example. (2 steps)", "answer": "- Step 1: For curves like circles, ellipses, orlemniscates that fail the vertical line test, we cannot write y = f(x) as a single function. We'd need to split into multiple branches, each requiring separate treatment.\n- Step 2: Example: The circle x² + y² = 4 has top half y = √(4 - x²) and bottom half y = -√(4 - x²). Implicit differentiation handles both at once. At point (2, 0), the tangent is x = 2 (vertical), which is easy to find implicitly but requires recognizing we're on the right branch for explicit differentiation.\n+ Implicit differentiation works for all branches simultaneously without case-splitting", "source": "MiniMax ②", "_id": "minimax_2_108", "judge_pick": false}, {"question": "In the context of rates of change, what does it mean when a problem says \"show that\" a differential equation equals a given form? What must you demonstrate? (2 steps)", "answer": "- Step 1: To \"show that\" a differential equation has a certain form means to manipulate your derived equation algebraically until it exactly matches the target equation.\n- Step 2: This typically involves: (1) Starting from the given information; (2) Differentiating appropriately; (3) Rearranging to isolate the derivative term; (4) Simplifying coefficients and terms to match the given form exactly.\n+ The key is comparing your final expression term-by-term with the target, and making algebraic adjustments as needed", "source": "MiniMax ②", "_id": "minimax_2_109", "judge_pick": false}], "count": 110}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "For a curve defined parametrically by $$x = f(t)$$ and $$y = g(t)$$, what is $$\\frac{dy}{dx}$$, and how does this follow from the chain rule? (3 steps)", "answer": "- Step 1: The formula is $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, provided $$\\frac{dx}{dt} \\neq 0$$.\n- Step 2: This follows from the chain rule: if $$y$$ depends on $$x$$ through the parameter $$t$$, then $$\\frac{dy}{dt} = \\frac{dy}{dx} \\cdot \\frac{dx}{dt}$$. Rearranging isolates $$\\frac{dy}{dx}$$.\n- Step 3: Intuition: $$\\frac{dy}{dt}$$ is \"how fast $$y$$ changes as $$t$$ increases\" and $$\\frac{dx}{dt}$$ is \"how fast $$x$$ changes.\" Their ratio is the geometric slope — rise over run in the \"$$t$$-direction.\"\n\nKey insight: gradient is a ratio of \"velocities,\" not a difference.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "What is the main advantage of using parametric differentiation rather than first converting to Cartesian form?", "answer": "Many parametric curves cannot be cleanly rewritten as $$y = f(x)$$ — either the algebra is ugly, or a single $$x$$ corresponds to multiple $$y$$-values (loops, self-intersections). Parametric differentiation lets you evaluate the gradient at any $$t$$ by taking two simple derivatives $$\\frac{dx}{dt}$$ and $$\\frac{dy}{dt}$$, without ever \"solving for $$y$$.\" This is especially valuable for curves built from trig functions, exponentials, or rational expressions where inversion creates multi-valued messes. You stay entirely in \"$$t$$-world\" where each $$t$$ gives one unique point.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Describe the pipeline for finding the gradient at a given $$t$$ on a parametric curve $$x(t)$$, $$y(t)$$. (4 steps)", "answer": "- Step 1: Differentiate $$x$$ with respect to $$t$$ to obtain $$\\frac{dx}{dt}$$.\n- Step 2: Differentiate $$y$$ with respect to $$t$$ to obtain $$\\frac{dy}{dt}$$.\n- Step 3: Form the ratio $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ — this is a function of $$t$$, not of $$x$$ directly.\n- Step 4: Substitute the specific value of $$t$$ into this expression to get the numerical gradient. You do not need the $$(x, y)$$ point's coordinates unless you also want a tangent or normal line.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "A parametric curve is given by $$x = 3\\sin\\theta$$, $$y = 5\\cos\\theta$$. What does $$\\frac{dy}{dx}$$ look like in terms of $$\\theta$$, and what does its sign reveal about the curve's shape? (3 steps)", "answer": "- Step 1: $$\\frac{dx}{d\\theta} = 3\\cos\\theta$$, $$\\frac{dy}{d\\theta} = -5\\sin\\theta$$, so $$\\frac{dy}{dx} = -\\frac{5}{3}\\tan\\theta$$.\n- Step 2: The underlying curve is the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{25} = 1$$. The gradient being proportional to $$-\\tan\\theta$$ means as $$\\theta$$ sweeps around, the tangent rotates continuously.\n- Step 3: Sign: for $$0 < \\theta < \\frac{\\pi}{2}$$, $$\\tan\\theta > 0$$ so $$\\frac{dy}{dx} < 0$$ — curve slopes down (consistent: $$x$$ rises from 0 to 3 while $$y$$ falls from 5 to 0).", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Describe the full conceptual pipeline for finding the equation of the **normal** to a parametric curve at a given $$t$$. (5 steps)", "answer": "- Step 1: Compute $$\\frac{dy}{dx}$$ as a function of $$t$$.\n- Step 2: Substitute the given $$t$$-value to find the tangent's gradient $$m$$ at that point.\n- Step 3: The normal's gradient is $$-\\frac{1}{m}$$ (perpendicular).\n- Step 4: Substitute the same $$t$$ into $$x(t)$$ and $$y(t)$$ to find the point $$(x_1, y_1)$$.\n- Step 5: Write $$y - y_1 = -\\frac{1}{m}(x - x_1)$$ and simplify.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "On a parametric curve, what is the condition for $$\\frac{dy}{dx} = 0$$ (horizontal tangent), and what subtle check must you make? (3 steps)", "answer": "- Step 1: Since $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, the ratio equals zero precisely when the numerator $$\\frac{dy}{dt} = 0$$.\n- Step 2: Also require $$\\frac{dx}{dt} \\neq 0$$ at that $$t$$. Otherwise you have \"$$0/0$$,\" an indeterminate case which signals a singular point (cusp), not a horizontal tangent.\n- Step 3: Substitute valid $$t$$-values back into $$x(t)$$ and $$y(t)$$ to get coordinates.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Geometrically, what does $$\\frac{dx}{dt} = 0$$ (with $$\\frac{dy}{dt} \\neq 0$$) mean at a point on a parametric curve?", "answer": "It means the curve's horizontal velocity is instantaneously zero while it is still moving vertically — so the tangent line is **vertical**. The formula $$\\frac{dy}{dx}$$ blows up to $$\\pm\\infty$$ there. Such points are typically the \"leftmost\" or \"rightmost\" extremes of a loop (e.g., at $$t = 0$$ on the unit circle $$x = \\cos t$$, $$y = \\sin t$$, the point $$(1, 0)$$ has a vertical tangent). They are crucial for sketching, and you'd analyze them via $$\\frac{dx}{dy} = 0$$ instead.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "How do you show a parametric curve has no stationary points? (4 steps)", "answer": "- Step 1: Form $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ as a function of $$t$$.\n- Step 2: A stationary point requires $$\\frac{dy}{dx} = 0$$, which needs $$\\frac{dy}{dt} = 0$$.\n- Step 3: Examine $$\\frac{dy}{dt}$$: show it is never zero on the allowed range. E.g., if $$y = e^t - 1$$ then $$\\frac{dy}{dt} = e^t > 0$$ always.\n- Step 4: Since the numerator of $$\\frac{dy}{dx}$$ never vanishes, there are no horizontal tangents, hence no stationary points.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why does a parametric curve's gradient satisfy the ratio formula $$\\frac{dy/dt}{dx/dt}$$ rather than the (wrong) difference $$\\frac{dy}{dt} - \\frac{dx}{dt}$$? (3 steps)", "answer": "- Step 1: Slope is rise-over-run, inherently a ratio of two infinitesimal quantities.\n- Step 2: Scale check: if you re-parametrize with $$s = 2t$$, both $$\\frac{dy}{dt}$$ and $$\\frac{dx}{dt}$$ double — a difference would also double (wrong — the geometric slope shouldn't change), but a ratio stays the same (correct).\n- Step 3: Conceptually, only the ratio captures the intrinsic geometric slope independent of traversal speed.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "When dealing with a parametric curve, when would you substitute the numerical $$t$$-value early vs. keep $$\\frac{dy}{dx}$$ symbolic in $$t$$? (3 steps)", "answer": "- Step 1: If you need the gradient at ONE specific point (or tangent/normal line): substitute the $$t$$-value as early as possible — it collapses $$\\frac{dy}{dx}$$ to a number and avoids nasty algebra.\n- Step 2: If you need general information (e.g., all stationary points, sketching, or proving no stationary points): keep $$\\frac{dy}{dx}$$ as a function of $$t$$.\n- Step 3: Choose based on the question: \"specific point\" → substitute; \"general behavior\" → keep symbolic.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is the difference between a curve given **explicitly** and one given **implicitly**, and why does the distinction matter for differentiation? (3 steps)", "answer": "- Step 1: Explicit: $$y$$ is expressed as a direct function of $$x$$, e.g., $$y = x^2 + 3x$$. You plug in $$x$$ and read off $$y$$.\n- Step 2: Implicit: $$x$$ and $$y$$ are tangled together, e.g., $$x^2 + 2xy + y^3 = 5$$. Often impossible to isolate $$y$$ in closed form.\n- Step 3: Why it matters: for explicit, just differentiate the RHS normally. For implicit, we differentiate \"in place,\" using the chain rule on every $$y$$-term (treating $$y$$ as a function of $$x$$) and solve algebraically for $$\\frac{dy}{dx}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Derive the rule $$\\frac{d}{dx}[f(y)] = f'(y) \\cdot \\frac{dy}{dx}$$ from the chain rule. (3 steps)", "answer": "- Step 1: Treat $$f(y(x))$$ as a composite: outer function is $$f$$, inner function is $$y(x)$$.\n- Step 2: Chain rule: \"derivative of outer at inner\" times \"derivative of inner.\" Derivative of outer at inner = $$f'(y)$$. Derivative of inner = $$\\frac{dy}{dx}$$.\n- Step 3: Multiply: $$\\frac{d}{dx}[f(y)] = f'(y) \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[\\sin y] = \\cos y \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[e^y] = e^y \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[\\ln y] = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why does $$\\frac{d}{dx}(y^n)$$ equal $$n y^{n-1} \\cdot \\frac{dy}{dx}$$ rather than just $$n y^{n-1}$$? (3 steps)", "answer": "- Step 1: For $$x^n$$, the derivative is $$n x^{n-1}$$ because $$x$$ is the variable we differentiate with respect to.\n- Step 2: But $$y$$ is not the independent variable — $$y$$ depends on $$x$$. So $$y^n$$ is a composite of the outer \"$$n$$-th power\" with the inner function $$y(x)$$.\n- Step 3: Chain rule forces the extra factor $$\\frac{dy}{dx}$$: it converts the rate of change with respect to $$y$$ into the rate of change with respect to $$x$$. Omitting this factor is one of the most common implicit-differentiation errors.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why must we use the product rule when differentiating the term $$xy$$ implicitly, even though it \"looks like\" one variable times another? (3 steps)", "answer": "- Step 1: $$xy$$ is a product of two functions of $$x$$: $$u(x) = x$$ (simple) and $$v(x) = y(x)$$ (an implicit function of $$x$$).\n- Step 2: Product rule: $$\\frac{d}{dx}(uv) = u \\frac{dv}{dx} + v \\frac{du}{dx}$$. Setting $$u = x$$, $$v = y$$: $$\\frac{d}{dx}(xy) = x \\frac{dy}{dx} + y \\cdot 1$$.\n- Step 3: The common error is treating $$y$$ as a constant and writing $$\\frac{d}{dx}(xy) = y$$. That would only be true if $$y$$ didn't depend on $$x$$ — precisely the assumption implicit differentiation denies.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "State the general algorithm for finding $$\\frac{dy}{dx}$$ from an implicit equation. (5 steps)", "answer": "- Step 1: Differentiate both sides of the equation term-by-term with respect to $$x$$.\n- Step 2: Treat each term according to its form:\n+ Pure $$x$$-term: differentiate normally.\n+ Pure $$y$$-term: apply chain rule (multiply by $$\\frac{dy}{dx}$$).\n+ Mixed $$xy$$-term: use product rule (and chain rule on the $$y$$-part).\n- Step 3: Collect all $$\\frac{dy}{dx}$$ terms on one side.\n- Step 4: Factor out $$\\frac{dy}{dx}$$ and divide to isolate.\n- Step 5: The final expression for $$\\frac{dy}{dx}$$ typically depends on BOTH $$x$$ and $$y$$ — this is natural for implicit curves.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "If you need $$\\frac{dy}{dx}$$ at a specific point $$(x_0, y_0)$$ on an implicit curve, should you substitute numerical values before or after isolating $$\\frac{dy}{dx}$$, and why?", "answer": "Substitute as **early** as possible — right after differentiating, before rearranging. The reason: after implicit differentiation, the equation is linear in $$\\frac{dy}{dx}$$ (since chain rule produces $$\\frac{dy}{dx}$$ to the first power). Plugging in numerical $$x_0, y_0$$ immediately turns complicated expressions into simple constants, collapsing everything to a small equation like $$a \\cdot \\frac{dy}{dx} + b = 0$$ which you solve in one step. If you isolate $$\\frac{dy}{dx}$$ symbolically first, you often wade through ugly algebra and are more prone to errors. **Substitute early, rearrange late.**", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "Why does $$\\frac{dy}{dx}$$ for an implicit curve usually depend on both $$x$$ and $$y$$? (3 steps)", "answer": "- Step 1: When differentiating an implicit equation, the $$x$$-pieces and $$y$$-pieces both contribute, and the chain-rule factor $$\\frac{dy}{dx}$$ sits attached to all $$y$$-pieces.\n- Step 2: After solving, the expression for $$\\frac{dy}{dx}$$ naturally carries both variables: the numerator encodes \"$$x$$-sensitivity,\" the denominator encodes \"$$y$$-sensitivity.\"\n- Step 3: Geometrically: different $$(x, y)$$ points on the same curve have different tangent slopes, so the gradient formula must reference both coordinates.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "On an implicit curve, how do you locate points with horizontal tangents vs. vertical tangents? (3 steps)", "answer": "- Step 1: **Horizontal tangent:** $$\\frac{dy}{dx} = 0$$. Set the numerator of $$\\frac{dy}{dx}$$ to zero, and combine with the original curve equation to solve for $$(x, y)$$.\n- Step 2: **Vertical tangent:** $$\\frac{dy}{dx}$$ undefined (equivalently $$\\frac{dx}{dy} = 0$$). Set the denominator of $$\\frac{dy}{dx}$$ to zero, combined with the curve equation.\n- Step 3: Intuition: horizontal tangents mark highest/lowest points in $$y$$; vertical tangents mark leftmost/rightmost points in $$x$$. Implicit curves can have both kinds.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "For the implicit curve $$e^{2x} \\ln y = x + y - 2$$, why is early substitution especially powerful at the point $$(1, 1)$$? (3 steps)", "answer": "- Step 1: Differentiating gives a messy equation involving $$e^{2x}$$, $$\\frac{1}{y}$$, $$\\ln y$$, and $$\\frac{dy}{dx}$$ in multiple places.\n- Step 2: At $$(1, 1)$$: $$e^{2 \\cdot 1} = e^2$$, $$\\frac{1}{1} = 1$$, $$\\ln 1 = 0$$. The $$\\ln y$$ term vanishes entirely, and many factors become clean numbers.\n- Step 3: The remaining equation collapses to roughly $$e^2 \\cdot \\frac{dy}{dx} = 1 + \\frac{dy}{dx}$$, solvable in one step. Waiting to substitute would mean wading through algebra with live logarithms.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Describe the strategy for finding $$\\frac{dy}{dx}$$ at $$(1, 1)$$ for $$4xy^2 + \\frac{6x^2}{y} = 10$$ without heavy arithmetic. (4 steps)", "answer": "- Step 1: Differentiate each term with respect to $$x$$:\n+ $$4xy^2$$ needs product rule (for $$x \\cdot y^2$$) and chain rule (for $$y^2$$).\n+ $$\\frac{6x^2}{y} = 6x^2 y^{-1}$$ needs product rule and chain rule on $$y^{-1}$$.\n- Step 2: Resulting equation is linear in $$\\frac{dy}{dx}$$, with coefficients involving $$x$$ and $$y$$.\n- Step 3: Substitute $$x = 1$$, $$y = 1$$ immediately: the expressions turn into simple numbers.\n- Step 4: Solve the resulting one-variable linear equation for $$\\frac{dy}{dx}$$. This is much faster than full symbolic isolation.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "A common mistake is writing $$\\frac{d}{dx}(y^3) = 3y^2$$. Explain why this is wrong and what's correct.", "answer": "It's wrong because $$y$$ is not the independent variable here — we are differentiating with respect to $$x$$, but $$y$$ depends on $$x$$ (implicitly). \"$$3y^2$$\" would be correct only if we were differentiating with respect to $$y$$ itself. The chain rule demands an extra factor: $$\\frac{d}{dx}(y^3) = 3y^2 \\cdot \\frac{dy}{dx}$$. That $$\\frac{dy}{dx}$$ represents \"how fast $$y$$ is moving as $$x$$ changes\" and is essential — without it, the equation fails dimensionally and the entire implicit method breaks.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "For the implicit curve $$(x - y)^4 = x + y + 5$$, how do you apply the chain rule on the LHS? (4 steps)", "answer": "- Step 1: The LHS is a composite: outer function $$u^4$$, inner function $$u = x - y$$. Use chain rule: $$\\frac{d}{dx}[(x-y)^4] = 4(x-y)^3 \\cdot \\frac{d}{dx}(x-y)$$.\n- Step 2: The inner derivative: $$\\frac{d}{dx}(x - y) = 1 - \\frac{dy}{dx}$$.\n- Step 3: So LHS derivative is $$4(x-y)^3 \\cdot (1 - \\frac{dy}{dx})$$. The RHS derivative is $$1 + \\frac{dy}{dx}$$.\n- Step 4: Equate and collect $$\\frac{dy}{dx}$$ terms on one side, other terms on the other. Isolate: $$\\frac{dy}{dx} = \\frac{4(x-y)^3 - 1}{4(x-y)^3 + 1}$$.\n\nThe chain rule is applied once on the power, then on the inner $$(x-y)$$ where $$-y$$ carries a $$-\\frac{dy}{dx}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "On the implicit curve $$x^2 + 4y^2 - 6x - 16y + 21 = 0$$, conceptually how would you find the points of zero gradient? (4 steps)", "answer": "- Step 1: Differentiate implicitly to get an expression $$A(x, y)\\frac{dy}{dx} + B(x, y) = 0$$, then solve: $$\\frac{dy}{dx} = -\\frac{B(x, y)}{A(x, y)}$$.\n- Step 2: For $$\\frac{dy}{dx} = 0$$: set the numerator $$B(x, y) = 0$$. Here, this gives an equation in $$x$$ alone (say, $$x = c$$).\n- Step 3: Substitute $$x = c$$ back into the original curve equation — now a one-variable equation in $$y$$ (typically quadratic).\n- Step 4: Solve for the $$y$$-values; this gives the full list of horizontal-tangent points. Usually there will be two (upper and lower branches).", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Use logarithmic differentiation to find $$\\frac{dy}{dx}$$ for $$y = x^x$$ where both base and exponent vary. (4 steps)", "answer": "- Step 1: Neither the power rule nor the exponential rule applies directly: power rule needs constant exponent, exponential rule needs constant base.\n- Step 2: Take $$\\ln$$ of both sides: $$\\ln y = x \\ln x$$. The logarithm turns the awkward power into a simple product.\n- Step 3: Implicit differentiation of both sides with respect to $$x$$: $$\\frac{1}{y} \\cdot \\frac{dy}{dx} = \\ln x + x \\cdot \\frac{1}{x} = \\ln x + 1$$.\n- Step 4: Multiply by $$y$$: $$\\frac{dy}{dx} = y(1 + \\ln x) = x^x(1 + \\ln x)$$.\n\nTakeaway: $$\\ln$$ is the universal tool for untangling variable-in-both-positions expressions.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Using the identity $$a^x = e^{x \\ln a}$$, show why $$\\frac{d}{dx}(2^x) = 2^x \\ln 2$$. (3 steps)", "answer": "- Step 1: Write $$2^x = e^{x \\ln 2}$$ using the base-conversion identity (any positive base can be rewritten in base $$e$$).\n- Step 2: Differentiate using chain rule: $$\\frac{d}{dx}[e^{x \\ln 2}] = e^{x \\ln 2} \\cdot \\frac{d}{dx}(x \\ln 2) = e^{x \\ln 2} \\cdot \\ln 2$$.\n- Step 3: Recognize $$e^{x \\ln 2} = 2^x$$: so $$\\frac{d}{dx}(2^x) = 2^x \\ln 2$$. In general, $$\\frac{d}{dx}(a^x) = a^x \\ln a$$. The $$\\ln a$$ factor is the \"native calculus rate\" of the base $$a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why is $$e$$ called the \"natural\" base in calculus? (3 steps)", "answer": "- Step 1: For any exponential $$a^x$$, $$\\frac{d}{dx}(a^x) = a^x \\ln a$$. The derivative equals the function only when $$\\ln a = 1$$, i.e., $$a = e$$.\n- Step 2: So $$\\frac{d}{dx}(e^x) = e^x$$ — no extra factor required. $$e$$ is the unique base where calculus works \"without corrections.\"\n- Step 3: All other exponentials are just $$e$$ rescaled: $$a^x = e^{x \\ln a}$$. This makes $$e$$ the foundational base; every exponential is a time-rescaled version of $$e^x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Conceptually, what does $$\\frac{d}{dx}F(x, y) = 0$$ (applied to an implicit curve $$F(x, y) = 0$$) really mean geometrically? (3 steps)", "answer": "- Step 1: The equation $$F(x, y) = 0$$ defines a curve: the set of points where $$F$$ takes the value 0.\n- Step 2: As you move along that curve, $$F$$ stays at 0, so its rate of change along the curve is 0. That's what \"$$\\frac{d}{dx}F = 0$$\" expresses.\n- Step 3: Expanding via chain rule: $$\\frac{\\partial F}{\\partial x} + \\frac{\\partial F}{\\partial y} \\cdot \\frac{dy}{dx} = 0$$. Solving gives $$\\frac{dy}{dx} = -\\frac{\\partial F / \\partial x}{\\partial F / \\partial y}$$ — a \"balance\" between horizontal and vertical sensitivities that keeps $$F$$ constant.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Describe how you would extract the coordinates of turning points on the implicit curve $$y^3 + 3xy^2 - x^3 = 3$$. (5 steps)", "answer": "- Step 1: Differentiate implicitly: $$3y^2 \\frac{dy}{dx} + 3y^2 + 6xy \\frac{dy}{dx} - 3x^2 = 0$$.\n- Step 2: Collect $$\\frac{dy}{dx}$$ terms: $$\\frac{dy}{dx}(3y^2 + 6xy) = 3x^2 - 3y^2$$, so $$\\frac{dy}{dx} = \\frac{x^2 - y^2}{y^2 + 2xy}$$.\n- Step 3: Turning point: $$\\frac{dy}{dx} = 0$$ requires $$x^2 - y^2 = 0$$, i.e., $$y = \\pm x$$.\n- Step 4: Substitute each case into the curve equation. E.g., $$y = x$$ gives $$x^3 + 3x^3 - x^3 = 3 \\Rightarrow x^3 = 1 \\Rightarrow x = 1$$, point $$(1, 1)$$.\n- Step 5: Similarly handle $$y = -x$$. Then verify each solution does not also satisfy the denominator $$y^2 + 2xy = 0$$ (to avoid the $$0/0$$ indeterminate case).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "If the implicit equation $$F(x, y) = 0$$ gives $$\\frac{dy}{dx} = \\frac{N(x, y)}{D(x, y)}$$ and you want to prove \"there are no points of zero gradient,\" what structure should you look for? (3 steps)", "answer": "- Step 1: Zero gradient means $$N(x, y) = 0$$ on the curve.\n- Step 2: Combine this with the curve equation $$F(x, y) = 0$$ and see if the system has real solutions.\n- Step 3: Show no real solutions exist — typically by algebraic manipulation leading to a contradiction (e.g., a \"sum of squares equals a negative constant\"). This kind of proof often uses completing-the-square or discriminant-negative arguments.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Geometrically, what does \"$$\\frac{dx}{dy} = 0$$ on a curve\" mean?", "answer": "$$\\frac{dx}{dy} = 0$$ means that for a small vertical change $$dy$$, the horizontal coordinate doesn't change ($$dx \\approx 0$$). This corresponds to a **vertical tangent**: $$x$$ has a local extremum (leftmost or rightmost point) while $$y$$ passes through. Equivalently, $$\\frac{dy}{dx} \\to \\pm\\infty$$. These are the points where a plotted tangent line would appear vertical, often at the \"equator\" of a loop-like implicit curve.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "If $$A$$ depends on $$r$$ and $$r$$ depends on $$t$$, explain why $$\\frac{dA}{dt} = \\frac{dA}{dr} \\cdot \\frac{dr}{dt}$$ is just the chain rule. (3 steps)", "answer": "- Step 1: $$A$$ is a composite function of $$t$$ via $$r$$: $$A(r(t))$$. Chain rule says: differentiate the outer at the inner, times derivative of the inner.\n- Step 2: \"Derivative of outer at the inner\" $$= \\frac{dA}{dr}$$. \"Derivative of the inner\" $$= \\frac{dr}{dt}$$.\n- Step 3: Product: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\cdot \\frac{dr}{dt}$$. This is the universal pattern for \"connected rates\" — find a shared intermediate variable, then multiply rates.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why is the identity $$\\frac{dr}{dV} = \\frac{1}{dV/dr}$$ helpful in rate-of-change problems? (3 steps)", "answer": "- Step 1: Often a problem tells you how $$V$$ depends on $$r$$ (so $$\\frac{dV}{dr}$$ is easy) but you need $$\\frac{dr}{dV}$$ (the reverse).\n- Step 2: For any well-behaved one-variable function with $$\\frac{dV}{dr} \\neq 0$$, the reciprocal identity holds.\n- Step 3: Combined with the chain rule, this lets you \"climb the chain in reverse\": e.g., $$\\frac{dr}{dt} = \\frac{dr}{dV} \\cdot \\frac{dV}{dt} = \\frac{1}{dV/dr} \\cdot \\frac{dV}{dt}$$ converts a known volume-rate into a radius-rate.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "A hemisphere has volume $$V = \\frac{2}{3}\\pi r^3$$ and total surface area $$S = 3\\pi r^2$$. Given $$\\frac{dV}{dt} = 6$$ cm$$^3$$/s, outline the conceptual pipeline for finding $$\\frac{dS}{dt}$$. (4 steps)", "answer": "- Step 1: We want $$\\frac{dS}{dt}$$, and $$S$$ depends on $$r$$, $$r$$ depends on $$t$$. Chain: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\cdot \\frac{dr}{dt}$$.\n- Step 2: We don't know $$\\frac{dr}{dt}$$ directly, but we have $$\\frac{dV}{dt}$$. Use the reciprocal: $$\\frac{dr}{dt} = \\frac{1}{dV/dr} \\cdot \\frac{dV}{dt}$$.\n- Step 3: Chain together: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\cdot \\frac{1}{dV/dr} \\cdot \\frac{dV}{dt}$$.\n- Step 4: Plug in: $$\\frac{dS}{dt} = 6\\pi r \\cdot \\frac{1}{2\\pi r^2} \\cdot 6 = \\frac{18}{r}$$. $$r$$ is the \"bridge variable\" connecting all the geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "How do you translate the sentence \"the rate of decay of $$N$$ is proportional to $$N$$\" into a differential equation, and why the minus sign convention? (3 steps)", "answer": "- Step 1: \"Rate of change of $$N$$\" = $$\\frac{dN}{dt}$$. \"Proportional to $$N$$\" means $$\\frac{dN}{dt} = (\\text{constant}) \\cdot N$$.\n- Step 2: \"Decay\" means $$N$$ decreases, so the rate is negative. Convention: write $$\\frac{dN}{dt} = -kN$$ with $$k > 0$$.\n- Step 3: The minus sign carries the direction (decay); positive $$k$$ represents magnitude. This separation makes physical interpretation transparent — a reader immediately sees \"decay\" from the minus, and \"how fast\" from the $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "State Newton's law of cooling as a differential equation and verify its sign behavior. (4 steps)", "answer": "- Step 1: Let $$\\theta(t)$$ be body temperature, $$\\theta_0$$ surroundings. The \"excess\" is $$(\\theta - \\theta_0)$$. Law: rate of temperature loss proportional to excess.\n- Step 2: Equation: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$ with $$k > 0$$.\n- Step 3: Sign check: if $$\\theta > \\theta_0$$ (hot body), $$(\\theta - \\theta_0) > 0$$, so $$\\frac{d\\theta}{dt} < 0$$ — body cools ✓. If $$\\theta < \\theta_0$$ (cold body), $$\\frac{d\\theta}{dt} > 0$$ — body warms ✓.\n- Step 4: Long-term: $$\\theta \\to \\theta_0$$ regardless of starting side. This exponential approach to equilibrium is the signature of first-order linear decay.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A snowman's head (radius $$R$$) loses volume at a rate proportional to surface area. Derive the differential equation for $$\\frac{dR}{dt}$$ and interpret. (5 steps)", "answer": "- Step 1: \"Volume lost proportional to surface area\": $$\\frac{dV}{dt} = -kA$$, with $$k > 0$$.\n- Step 2: Sphere formulas: $$V = \\frac{4}{3}\\pi R^3$$, $$A = 4\\pi R^2$$. So $$\\frac{dV}{dR} = 4\\pi R^2$$.\n- Step 3: Chain rule: $$\\frac{dV}{dt} = \\frac{dV}{dR} \\cdot \\frac{dR}{dt} = 4\\pi R^2 \\cdot \\frac{dR}{dt}$$.\n- Step 4: Equate: $$4\\pi R^2 \\cdot \\frac{dR}{dt} = -k \\cdot 4\\pi R^2$$. The $$4\\pi R^2$$ cancels.\n- Step 5: Result: $$\\frac{dR}{dt} = -k$$ (constant!). Striking: radius shrinks linearly with time even though volume is cubic. A small snowball evaporates in time proportional to its initial radius only.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Conceptually, why does \"rate of volume change proportional to surface area\" imply \"constant rate of radius change\" for a sphere? (3 steps)", "answer": "- Step 1: For a sphere, the identity $$\\frac{dV}{dR} = A$$ holds (up to constants): a thin \"skin\" of thickness $$dR$$ adds volume equal to surface area times thickness.\n- Step 2: If $$\\frac{dV}{dt} = cA$$ for some constant $$c$$, and $$\\frac{dV}{dt} = A \\cdot \\frac{dR}{dt}$$ (from the skin identity), then equating gives $$\\frac{dR}{dt} = c$$ — constant.\n- Step 3: Geometric insight: if the process removes a uniform \"skin\" per unit time (scaled by $$A$$), the thickness of that skin is what shrinks $$R$$, and it's constant in time. Raindrops and snowballs evaporate by losing a constant \"skin-thickness per unit time.\"", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "A container has liquid pouring in at 30 cm$$^3$$/s and leaking out at $$\\frac{2}{15}V$$ cm$$^3$$/s where $$V$$ is the current volume. Write and analyze the differential equation. (4 steps)", "answer": "- Step 1: Net rate of change = inflow $$-$$ outflow, so $$\\frac{dV}{dt} = 30 - \\frac{2}{15}V$$.\n- Step 2: Multiply by $$-15$$: $$-15\\frac{dV}{dt} = -450 + 2V = 2V - 450$$.\n- Step 3: Equilibrium ($$\\frac{dV}{dt} = 0$$): $$30 = \\frac{2}{15}V \\Rightarrow V = 225$$.\n- Step 4: Behavior: if $$V < 225$$, inflow dominates and $$V$$ grows; if $$V > 225$$, outflow dominates and $$V$$ shrinks. $$V$$ always trends towards the stable equilibrium $$225$$ cm$$^3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "For a cube expanding so that surface area $$A$$ grows at $$2$$ cm$$^2$$/s, why does $$\\frac{dV}{dt}$$ depend on $$V^{1/3}$$? (4 steps)", "answer": "- Step 1: For a cube with side $$s$$: $$A = 6s^2$$, $$V = s^3$$. So $$s = (A/6)^{1/2} = V^{1/3}$$.\n- Step 2: Relate $$V$$ to $$A$$: $$V = (A/6)^{3/2}$$. Therefore $$\\frac{dV}{dA} = \\frac{3}{2} \\cdot \\frac{1}{6} \\cdot (A/6)^{1/2} = \\frac{s}{4}$$.\n- Step 3: Chain rule: $$\\frac{dV}{dt} = \\frac{dV}{dA} \\cdot \\frac{dA}{dt} = \\frac{s}{4} \\cdot 2 = \\frac{s}{2} = \\frac{V^{1/3}}{2}$$.\n- Step 4: Interpretation: sub-linear growth in $$V$$ — surface-constrained processes speed up more slowly than the volume itself, because the \"engine\" for volume change is surface area, which scales as $$V^{2/3}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "An oil patch has radius growing inversely proportional to itself ($$\\frac{dr}{dt} = \\frac{k}{r}$$). What does this say about how the area grows? (4 steps)", "answer": "- Step 1: $$\\frac{dr}{dt} = \\frac{k}{r}$$ means $$r \\frac{dr}{dt} = k$$ (constant).\n- Step 2: Area $$A = \\pi r^2$$, so $$\\frac{dA}{dt} = 2\\pi r \\cdot \\frac{dr}{dt} = 2\\pi \\cdot (r \\frac{dr}{dt}) = 2\\pi k$$ — constant.\n- Step 3: So area grows at a constant rate, even though the radius grows slower and slower.\n- Step 4: Physical picture: oil is released at a steady mass rate and spreads uniformly in a thin layer. The area grows linearly in time ($$A \\sim t$$), so $$r \\sim \\sqrt{t}$$ — the radius grows like a square root, diminishing but never stopping.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "The ice on a pond thickens at a rate inversely proportional to $$x^2$$ (where $$x$$ is thickness). Write the differential equation and explain physically why the $$x^2$$ appears. (3 steps)", "answer": "- Step 1: Differential equation: $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ with $$k > 0$$ (growth).\n- Step 2: The $$x^2$$ in the denominator means thicker ice slows its own growth. Physically: existing ice acts as insulation. Heat must flow through it for new water at the bottom to freeze — and the rate of heat flow is inversely proportional to the insulating thickness (one factor of $$x$$) and to thermal resistance (another factor of $$x$$).\n- Step 3: Prediction: $$\\int x^2 \\, dx = \\int k \\, dt \\Rightarrow x^3 \\propto t$$. So thickness grows as $$t^{1/3}$$ — very slow once ice is thick. This matches real winter pond observations.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Fluid flows out of a cylindrical tank with $$\\frac{dV}{dt} \\propto -\\sqrt{V}$$. Show that the depth $$h$$ satisfies $$\\frac{dh}{dt} = -K\\sqrt{h}$$. (4 steps)", "answer": "- Step 1: For a cylindrical tank with constant cross-section $$A$$, $$V = Ah$$, so $$\\frac{dV}{dt} = A \\frac{dh}{dt}$$.\n- Step 2: Given $$\\frac{dV}{dt} = -k\\sqrt{V} = -k\\sqrt{Ah} = -k\\sqrt{A} \\cdot \\sqrt{h}$$.\n- Step 3: Equate: $$A \\frac{dh}{dt} = -k\\sqrt{A} \\cdot \\sqrt{h}$$, giving $$\\frac{dh}{dt} = -\\frac{k\\sqrt{A}}{A} \\sqrt{h} = -\\frac{k}{\\sqrt{A}} \\sqrt{h}$$.\n- Step 4: Relabel: $$\\frac{dh}{dt} = -K\\sqrt{h}$$ where $$K = k/\\sqrt{A}$$ is still a positive constant. This is Torricelli's law — drainage rate proportional to square root of depth.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "For a conical funnel with cone half-angle $$30°$$, explain how to relate volume to height $$h$$. (4 steps)", "answer": "- Step 1: At height $$h$$, the radius at the top of the salt cone is $$r$$. The angle condition: $$\\tan(30°) = r/h$$ (since angle is between slanting edge and vertical).\n- Step 2: $$\\tan(30°) = 1/\\sqrt{3}$$, so $$r = h/\\sqrt{3}$$.\n- Step 3: Volume of a cone: $$V = \\frac{1}{3}\\pi r^2 h = \\frac{1}{3}\\pi \\cdot \\frac{h^2}{3} \\cdot h = \\frac{\\pi h^3}{9}$$.\n- Step 4: This proportionality $$V \\propto h^3$$ reflects that cones scale in all three dimensions together — whenever the shape is preserved (fixed angle), linear dimensions scale alike and volume scales cubically.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "For the salt cone with $$V = \\frac{\\pi h^3}{9}$$ and $$\\frac{dV}{dt} = -6$$, show $$\\frac{dh}{dt}$$ is inversely proportional to $$h^2$$. (4 steps)", "answer": "- Step 1: $$\\frac{dV}{dh} = \\frac{3\\pi h^2}{9} = \\frac{\\pi h^2}{3}$$.\n- Step 2: Chain rule: $$\\frac{dV}{dt} = \\frac{dV}{dh} \\cdot \\frac{dh}{dt}$$, so $$-6 = \\frac{\\pi h^2}{3} \\cdot \\frac{dh}{dt}$$.\n- Step 3: Rearrange: $$\\frac{dh}{dt} = \\frac{-18}{\\pi h^2}$$.\n- Step 4: Indeed $$\\frac{dh}{dt} \\propto \\frac{1}{h^2}$$. Interpretation: as the cone drains and $$h$$ grows small (well, shrinks), the top cross-section shrinks too, so a fixed volume loss drops $$h$$ faster. Initially the drop is slow; at the end it accelerates.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "For $$P = P_0 (1.09)^t$$, without computing decimals, show conceptually why $$\\frac{dP}{dt}$$ is proportional to $$P$$. (4 steps)", "answer": "- Step 1: Rewrite using base $$e$$: $$(1.09)^t = e^{t \\ln 1.09}$$.\n- Step 2: Differentiate: $$\\frac{dP}{dt} = P_0 \\cdot e^{t \\ln 1.09} \\cdot \\ln 1.09 = P \\cdot \\ln 1.09$$.\n- Step 3: So $$\\frac{dP}{dt} = (\\ln 1.09) P$$ — a simple proportionality to $$P$$ itself.\n- Step 4: This is the characteristic signature of exponential growth: rate proportional to current value. The constant $$\\ln 1.09$$ is the \"instantaneous continuous growth rate,\" slightly less than the \"annual multiplicative rate\" $$9\\%$$ because continuous compounding accumulates more per unit nominal rate.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does doubling time $$T$$ for $$P = P_0(1.09)^t$$ equal $$\\ln 2 / \\ln 1.09$$? (4 steps)", "answer": "- Step 1: \"Doubled\" means $$P = 2P_0$$, so $$(1.09)^T = 2$$.\n- Step 2: Take $$\\ln$$ of both sides: $$T \\ln 1.09 = \\ln 2$$.\n- Step 3: Solve: $$T = \\ln 2 / \\ln 1.09$$ — exact form, no approximation needed.\n- Step 4: Magnitude sense: $$\\ln 2 \\approx 0.69$$, $$\\ln 1.09 \\approx 0.086$$ (close to $$0.09$$ by small-log approximation). So $$T \\approx 8$$ years — the famous \"rule of 72 divided by percentage\" rough estimate ($$72 / 9 = 8$$).", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "For $$y = \\ln(\\sin x)$$ on $$(0, \\pi)$$, describe how to find its stationary point and prove it's concave everywhere. (4 steps)", "answer": "- Step 1: Chain rule: $$\\frac{dy}{dx} = \\frac{\\cos x}{\\sin x} = \\cot x$$.\n- Step 2: Stationary: $$\\cot x = 0 \\Rightarrow x = \\pi/2$$. Value: $$y = \\ln(1) = 0$$. Stationary point $$(\\pi/2, 0)$$.\n- Step 3: Second derivative: $$\\frac{d^2y}{dx^2} = -\\csc^2 x = -\\frac{1}{\\sin^2 x}$$.\n- Step 4: Since $$\\sin^2 x > 0$$ on $$(0, \\pi)$$, we have $$\\frac{d^2y}{dx^2} < 0$$ everywhere — curve is concave (concave down) throughout. The stationary point is a maximum.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "If $$\\frac{d^2y}{dx^2} < 0$$ on an interval, what does this tell you geometrically, and how does it relate to the slope? (3 steps)", "answer": "- Step 1: $$\\frac{d^2y}{dx^2}$$ is the rate of change of the slope. If negative, slope is decreasing.\n- Step 2: Decreasing slope means: the curve bends \"downward\" — tangent lines lie above the curve. This is concavity (concave down).\n- Step 3: Geometric test: the curve between any two points lies **above** the chord joining them. Classical concave examples: $$\\ln x$$ on $$(0, \\infty)$$, $$-x^2$$, $$\\sqrt{x}$$. Contrast with convex (concave up) curves where tangents lie below.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "At a stationary point where $$\\frac{dy}{dx} = 0$$, how does the sign of $$\\frac{d^2y}{dx^2}$$ classify the point? (3 steps)", "answer": "- Step 1: $$\\frac{d^2y}{dx^2} > 0$$: slope is increasing through 0 (was negative, becomes positive). Curve bends up — **local minimum**.\n- Step 2: $$\\frac{d^2y}{dx^2} < 0$$: slope is decreasing through 0 (was positive, becomes negative). Curve bends down — **local maximum**.\n- Step 3: $$\\frac{d^2y}{dx^2} = 0$$: inconclusive. Could be a point of inflection with a horizontal tangent, or something more degenerate. Use higher derivatives or sign analysis of $$\\frac{dy}{dx}$$ on either side.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "For the parametric curve, how do you compute $$\\frac{d^2y}{dx^2}$$? Why isn't it just $$\\frac{d^2y/dt^2}{d^2x/dt^2}$$? (3 steps)", "answer": "- Step 1: The correct formula is $$\\frac{d^2y}{dx^2} = \\frac{d}{dx}\\left(\\frac{dy}{dx}\\right) = \\frac{\\frac{d}{dt}(dy/dx)}{dx/dt}$$.\n- Step 2: You first compute $$\\frac{dy}{dx}$$ as a function of $$t$$, then differentiate IT with respect to $$t$$, then divide by $$\\frac{dx}{dt}$$.\n- Step 3: The \"obvious but wrong\" formula $$\\frac{d^2y/dt^2}{d^2x/dt^2}$$ skips the chain rule entirely — it's analogous to the mistake of treating $$\\frac{dy}{dx}$$ as $$\\frac{dy}{dt} - \\frac{dx}{dt}$$. Second derivatives need the parametric chain rule applied twice.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "For the function $$f(x) = \\frac{\\cos 2x}{e^x}$$ on $$[0, \\pi]$$, why do its stationary points satisfy $$\\tan 2x = -\\frac{1}{2}$$? (4 steps)", "answer": "- Step 1: Use quotient rule: $$f'(x) = \\frac{-2\\sin 2x \\cdot e^x - \\cos 2x \\cdot e^x}{e^{2x}} = \\frac{-2\\sin 2x - \\cos 2x}{e^x}$$.\n- Step 2: Stationary: $$f'(x) = 0$$. Since $$e^x \\neq 0$$, need $$-2\\sin 2x - \\cos 2x = 0$$.\n- Step 3: Rearrange: $$2\\sin 2x = -\\cos 2x$$. Divide both sides by $$\\cos 2x$$: $$2\\tan 2x = -1$$.\n- Step 4: So $$\\tan 2x = -\\frac{1}{2}$$. Key technique: when an equation mixes $$\\sin$$ and $$\\cos$$ of the same angle, dividing by $$\\cos$$ converts it to a $$\\tan$$ equation solvable by $$\\arctan$$.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Translate a proportionality statement involving rates into a differential equation: \"rate of change of $$P$$ is proportional to the product of $$x$$ and $$y$$, with gradient $$\\frac{1}{2}$$ at $$(4, 2)$$.\" (4 steps)", "answer": "- Step 1: \"Rate proportional to $$xy$$\" means $$\\frac{dy}{dx} = k \\cdot xy$$ for some constant $$k$$.\n- Step 2: Substitute the known point and gradient: $$\\frac{1}{2} = k \\cdot 4 \\cdot 2 = 8k$$.\n- Step 3: Solve: $$k = \\frac{1}{16}$$.\n- Step 4: Final differential equation: $$\\frac{dy}{dx} = \\frac{xy}{16}$$. This is a separable first-order DE — notice we found $$k$$ using a \"calibration point,\" a standard trick when proportionalities are given together with specific data.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Compare the differential equations $$\\frac{dP}{dt} = kP$$ vs. $$\\frac{dP}{dt} = kP - Q$$ where $$k, Q > 0$$. What do they model? (4 steps)", "answer": "- Step 1: $$\\frac{dP}{dt} = kP$$: pure exponential growth. $$P \\to \\infty$$ without bound.\n- Step 2: $$\\frac{dP}{dt} = kP - Q$$: growth proportional to $$P$$ **minus** a fixed removal $$Q$$ per unit time (e.g., pondweed reproduces as $$kP$$, fish eat $$Q$$).\n- Step 3: Equilibrium ($$\\frac{dP}{dt} = 0$$) at $$P^* = Q/k$$. Below it: $$\\frac{dP}{dt} < 0$$ (weed shrinks); above: $$\\frac{dP}{dt} > 0$$ (weed grows).\n- Step 4: This is **unstable** — small perturbations from $$P^*$$ grow. A qualitatively different regime from pure exponential: introducing a constant \"removal\" creates a tipping point.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why is the differential equation $$\\frac{dm}{dt} = -0.244\\,m$$ a decay model, and what does the sign of $$\\frac{dm}{dt}$$ tell us? (3 steps)", "answer": "- Step 1: Mass $$m > 0$$ always (physical). Coefficient $$-0.244 < 0$$. Therefore $$\\frac{dm}{dt} < 0$$ always.\n- Step 2: Negative $$\\frac{dm}{dt}$$ means mass decreases over time — the signature of decay.\n- Step 3: The sign encodes direction (decay vs. growth), the magnitude $$|0.244|$$ encodes the rate. Together they specify a first-order linear decay: $$m(t) = m_0 e^{-0.244 t}$$, approaching zero asymptotically but never quite reaching it.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "On the curve $$7x^2 + 48xy - 7y^2 + 75 = 0$$, suppose points $$A$$ and $$B$$ both have $$\\frac{dy}{dx} = \\frac{2}{11}$$. Show the line through them has equation $$x + 2y = 0$$. (5 steps)", "answer": "- Step 1: Differentiate implicitly: $$14x + 48(x\\frac{dy}{dx} + y) - 14y\\frac{dy}{dx} = 0$$.\n- Step 2: Simplify: $$14x + 48y + (48x - 14y)\\frac{dy}{dx} = 0$$.\n- Step 3: Set $$\\frac{dy}{dx} = 2/11$$: $$14x + 48y + (48x - 14y)\\frac{2}{11} = 0$$. Multiply through by 11: $$154x + 528y + 96x - 28y = 0$$.\n- Step 4: Combine: $$250x + 500y = 0 \\Rightarrow x + 2y = 0$$.\n- Step 5: This is a linear equation satisfied by EVERY point on the curve with gradient $$2/11$$ — in particular, by both $$A$$ and $$B$$. So the chord $$AB$$ lies on $$x + 2y = 0$$. Elegant fact: the locus of points of given gradient on a conic is a chord.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "How does a parametric curve's $$(dy/dt, dx/dt)$$ relate to the concept of \"velocity\" along the curve? (3 steps)", "answer": "- Step 1: Imagine $$t$$ as time: a particle moves along the curve with position $$(x(t), y(t))$$.\n- Step 2: $$\\frac{dx}{dt}$$ is horizontal velocity; $$\\frac{dy}{dt}$$ is vertical velocity. The pair $$(\\frac{dx}{dt}, \\frac{dy}{dt})$$ is the velocity vector, always tangent to the curve.\n- Step 3: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ is the slope — a purely geometric property of the path, independent of the particle's speed. This is why reparametrization (e.g., $$t \\to 2t$$) doesn't change the slope: both velocities scale identically.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "A circle has radius increasing at $$0.4$$ cm/s. Why does the area's rate of change depend on $$r$$, even though $$\\frac{dr}{dt}$$ is constant? (3 steps)", "answer": "- Step 1: $$A = \\pi r^2$$, so $$\\frac{dA}{dt} = 2\\pi r \\frac{dr}{dt} = 0.8\\pi r$$.\n- Step 2: $$\\frac{dA}{dt}$$ grows linearly with $$r$$: bigger circle → faster area growth.\n- Step 3: Intuition: each incremental ring added has area $$\\approx 2\\pi r \\cdot dr$$ (circumference times thickness). Constant $$dr$$ per unit time means bigger rings get added as $$r$$ grows — so more area per unit time. Area grows quadratically while radius grows linearly: $$A \\sim t^2$$, $$r \\sim t$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "If a parametric curve has $$x = 4\\sin 3t$$, $$y = 3\\cos 3t$$, what shape is it and does the parametric gradient match implicit differentiation? (4 steps)", "answer": "- Step 1: Identify: $$x/4 = \\sin 3t$$, $$y/3 = \\cos 3t$$. Sum of squares: $$(x/4)^2 + (y/3)^2 = 1$$ — an ellipse with semi-axes 4 and 3.\n- Step 2: Parametric derivative: $$\\frac{dx}{dt} = 12\\cos 3t$$, $$\\frac{dy}{dt} = -9\\sin 3t$$. So $$\\frac{dy}{dx} = -\\frac{9\\sin 3t}{12\\cos 3t} = -\\frac{3}{4}\\tan 3t$$.\n- Step 3: Implicit derivative of $$x^2/16 + y^2/9 = 1$$: $$\\frac{2x}{16} + \\frac{2y}{9}\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{9x}{16y}$$.\n- Step 4: Substitute $$x, y$$ in parametric: $$-\\frac{9 \\cdot 4\\sin 3t}{16 \\cdot 3\\cos 3t} = -\\frac{3}{4}\\tan 3t$$ ✓ Matches.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Discuss the surprising simplicity of $$\\frac{dR}{dt} = -k$$ (constant) for evaporating spheres. What does this say about time-to-disappear? (3 steps)", "answer": "- Step 1: $$\\frac{dR}{dt} = -k$$ means $$R(t) = R_0 - kt$$ (linear shrinkage).\n- Step 2: Time to vanish: $$R(t) = 0 \\Rightarrow t = R_0/k$$. Only proportional to initial radius — not volume!\n- Step 3: Physical insight: though most volume is near the surface for large spheres, the radius shrinks at the same rate regardless of size. This explains why tiny raindrops evaporate fast (small $$R_0$$) while large ones last much longer — time scales with initial radius, not mass or volume.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Suppose a parametric curve is given by $$x = 2 + \\sin t$$, $$y = 3 - 4\\cos t$$. Find the Cartesian form and verify its gradient matches. (4 steps)", "answer": "- Step 1: From $$\\sin t = x - 2$$, $$\\cos t = (3 - y)/4$$, the identity $$\\sin^2 t + \\cos^2 t = 1$$ gives $$(x - 2)^2 + \\frac{(y - 3)^2}{16} = 1$$.\n- Step 2: This is an ellipse centered at $$(2, 3)$$ with semi-axes 1 horizontally and 4 vertically.\n- Step 3: Parametric gradient: $$\\frac{dx}{dt} = \\cos t$$, $$\\frac{dy}{dt} = 4\\sin t$$, so $$\\frac{dy}{dx} = 4\\tan t$$.\n- Step 4: Check at $$t = 0$$: point $$(2, -1)$$ (bottom). $$\\frac{dy}{dx} = 0$$ — horizontal tangent ✓. At $$t = \\pi/2$$: point $$(3, 3)$$ (rightmost). $$\\frac{dy}{dx} \\to \\infty$$ — vertical tangent ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Explain why $$a^x \\equiv e^{x \\ln a}$$ is a foundational identity in calculus. (3 steps)", "answer": "- Step 1: Any positive number $$a$$ can be written as $$a = e^{\\ln a}$$ (since $$\\ln$$ and $$e$$ are inverse). Raising to power $$x$$: $$a^x = (e^{\\ln a})^x = e^{x \\ln a}$$.\n- Step 2: This lets you convert any exponential into a base-$$e$$ exponential, which has the cleanest derivative rule.\n- Step 3: Differentiating $$a^x$$: $$\\frac{d}{dx}(a^x) = \\frac{d}{dx}(e^{x \\ln a}) = e^{x \\ln a} \\cdot \\ln a = a^x \
