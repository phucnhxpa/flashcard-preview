question": "The radius $$r$$ of a circle increases at a constant rate of $$0.4 \\text{ cm/s}$$. Is the rate of increase of the area $$\\frac{dA}{dt}$$ constant, increasing, or decreasing as the circle gets larger? Explain your reasoning using the chain rule. (3 steps)", "answer": "- Step 1: Use the chain rule to connect the rates: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dt}$$. We know the area formula is $$A = \\pi r^2$$, so $$\\frac{dA}{dr} = 2\\pi r$$.\n- Step 2: We are given that the radius increases at a constant rate, so $$\\frac{dr}{dt} = 0.4$$. Substituting this in gives $$\\frac{dA}{dt} = 2\\pi r \\times 0.4 = 0.8\\pi r$$.\n- Step 3: The expression for $$\\frac{dA}{dt}$$ is $$0.8\\pi r$$. Since $$r$$ is increasing over time, the rate of change of the area itself must be increasing. The circle adds area faster as it gets larger.\n\nEven if the radius grows at a steady pace, the area expands increasingly faster because the circumference (where new area is added) is getting longer.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Why does implicit differentiation always differentiate with respect to $$x$$ (treating $$y$$ as the dependent variable), rather than with respect to $$y$$? What would change if you differentiated with respect to $$y$$ instead? (2 steps)", "answer": "- Step 1: We differentiate with respect to $$x$$ because we want $$\\frac{dy}{dx}$$ — the gradient of the curve when plotted with $$x$$ on the horizontal axis and $$y$$ on the vertical axis. This is the standard convention for sketching and interpreting graphs.\n- Step 2: If you differentiated with respect to $$y$$ instead, you'd get $$\\frac{dx}{dy}$$ — the rate of change of $$x$$ with respect to $$y$$. This is the reciprocal of the gradient: $$\\frac{dx}{dy} = \\frac{1}{dy/dx}$$ (when both are nonzero). For $$x^2 + y^3 = 2$$: differentiating w.r.t. $$y$$ gives $$2x\\frac{dx}{dy} + 3y^2 = 0$$, so $$\\frac{dx}{dy} = -\\frac{3y^2}{2x}$$, which is indeed $$\\frac{1}{-2x/(3y^2)}$$.\n\n+ Sometimes $$\\frac{dx}{dy}$$ is easier to find, and you can flip it to get $$\\frac{dy}{dx}$$ — but only where $$\\frac{dx}{dy} \\neq 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "In many physics applications, parametric equations describe motion with the parameter being time t. In this context, what does dy/dx represent physically? How is it different from dy/dt and dx/dt? (2 steps)", "answer": "- Step 1: When t is time: dx/dt is the x-velocity, dy/dt is the y-velocity, and dy/dx is the direction of motion (the slope of the trajectory). dy/dx tells us the path's direction at each instant, while dy/dt and dx/dt tell us how fast we move in each direction.\n- Step 2: This is crucial in physics: the trajectory's shape (dy/dx) is separate from how fast we traverse it (dx/dt, dy/dt). Two objects can follow the same path (same dy/dx) at different speeds.\n+ For example, projectiles with different initial speeds follow the same parabolic path but at different rates", "source": "MiniMax ②", "_id": "minimax_2_74"}, {"question": "To find the stationary points on an implicitly defined curve, you set $$\\frac{dy}{dx} = 0$$. If your derived expression for $$\\frac{dy}{dx}$$ is a fraction $$\\frac{A(x,y)}{B(x,y)}$$, which part of the fraction must equal zero, and why? What does it mean geometrically if the denominator equals zero? (3 steps)", "answer": "- Step 1: For a fraction to equal zero, its numerator must equal zero (provided the denominator is not also zero). Therefore, you set $$A(x,y) = 0$$ to find the coordinates of stationary points.\n- Step 2: The denominator $$B(x,y)$$ cannot be zero at a stationary point, because division by zero is undefined, meaning the gradient is infinite.\n- Step 3: If the denominator $$B(x,y) = 0$$ (and the numerator is non-zero), it means $$\\frac{dy}{dx}$$ is undefined. Geometrically, this corresponds to a vertical tangent or a cusp on the curve, where the slope is infinite.\n\nZero numerator = horizontal tangent (stationary). Zero denominator = vertical tangent (undefined gradient).", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Derive the rule $$\\frac{d}{dx}[f(y)] = f'(y) \\cdot \\frac{dy}{dx}$$ from the chain rule. (3 steps)", "answer": "- Step 1: Treat $$f(y(x))$$ as a composite: outer function is $$f$$, inner function is $$y(x)$$.\n- Step 2: Chain rule: \"derivative of outer at inner\" times \"derivative of inner.\" Derivative of outer at inner = $$f'(y)$$. Derivative of inner = $$\\frac{dy}{dx}$$.\n- Step 3: Multiply: $$\\frac{d}{dx}[f(y)] = f'(y) \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[\\sin y] = \\cos y \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[e^y] = e^y \\cdot \\frac{dy}{dx}$$.\n+ Example: $$\\frac{d}{dx}[\\ln y] = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Liquid flows into a tank at a constant 30 cm³/s while leaking out at a rate of $$\\frac{2V}{15}$$ cm³/s where $$V$$ is current volume. Construct the differential equation and discuss equilibrium. (3 steps)", "answer": "- Step 1: Net rate = rate in − rate out: $$\\frac{dV}{dt} = 30 - \\frac{2V}{15}$$.\n- Step 2: Multiply through by $$-15$$ for a cleaner form: $$-15\\frac{dV}{dt} = 2V - 450$$.\n- Step 3: Equilibrium when net rate = 0 ⇒ $$V = 225$$ cm³:\n+ If $$V < 225$$: inflow exceeds outflow, volume rises.\n+ If $$V > 225$$: outflow exceeds inflow, volume falls.\n+ $$V \\to 225$$ asymptotically — the tank self-stabilizes.\n\nTakeaway: competing processes give DE = \"rate in − rate out\"; the equilibrium is where they balance.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Fluid flows out of a cylindrical tank with $$\\frac{dV}{dt} \\propto -\\sqrt{V}$$. Show that the depth $$h$$ satisfies $$\\frac{dh}{dt} = -K\\sqrt{h}$$. (4 steps)", "answer": "- Step 1: For a cylindrical tank with constant cross-section $$A$$, $$V = Ah$$, so $$\\frac{dV}{dt} = A \\frac{dh}{dt}$$.\n- Step 2: Given $$\\frac{dV}{dt} = -k\\sqrt{V} = -k\\sqrt{Ah} = -k\\sqrt{A} \\cdot \\sqrt{h}$$.\n- Step 3: Equate: $$A \\frac{dh}{dt} = -k\\sqrt{A} \\cdot \\sqrt{h}$$, giving $$\\frac{dh}{dt} = -\\frac{k\\sqrt{A}}{A} \\sqrt{h} = -\\frac{k}{\\sqrt{A}} \\sqrt{h}$$.\n- Step 4: Relabel: $$\\frac{dh}{dt} = -K\\sqrt{h}$$ where $$K = k/\\sqrt{A}$$ is still a positive constant. This is Torricelli's law — drainage rate proportional to square root of depth.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "If $$\\frac{d^2y}{dx^2} < 0$$ on an interval, what does this tell you geometrically, and how does it relate to the slope? (3 steps)", "answer": "- Step 1: $$\\frac{d^2y}{dx^2}$$ is the rate of change of the slope. If negative, slope is decreasing.\n- Step 2: Decreasing slope means: the curve bends \"downward\" — tangent lines lie above the curve. This is concavity (concave down).\n- Step 3: Geometric test: the curve between any two points lies **above** the chord joining them. Classical concave examples: $$\\ln x$$ on $$(0, \\infty)$$, $$-x^2$$, $$\\sqrt{x}$$. Contrast with convex (concave up) curves where tangents lie below.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "For an ellipse $$x^2/a^2 + y^2/b^2 = 1$$, why does implicit differentiation give different slopes at different points, unlike a circle where slopes depend only on $$(x, y)$$? (3 steps)", "answer": "- Step 1: For both shapes, implicit differentiation gives $$\\frac{dy}{dx}$$ as a function of both $$x$$ and $$y$$ — positions where slope is defined.\n- Step 2: For a circle, symmetry means the slope magnitude at angle $$\\theta$$ depends only on $$\\theta$$: $$\\frac{dy}{dx} = -\\cot\\theta$$ (parametrically).\n- Step 3: For an ellipse, the axes have different scales ($$a \\neq b$$), so the curve \"stretches\" differently in $$x$$ and $$y$$. Slopes at geometrically similar angles differ in magnitude, giving slope $$= -\\frac{b^2 x}{a^2 y}$$ — the ratio $$b^2/a^2$$ encodes the asymmetry.\n\nTakeaway: implicit differentiation faithfully captures curve geometry; asymmetry in axes directly shows up in the $$dy/dx$$ expression.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "A population model $$P = P_0(1.09)^t$$ has annual growth of 9%. Explain the relationship between the \"discrete rate\" 1.09 and the \"continuous rate\" in $$\\frac{dP}{dt}$$. (3 steps)", "answer": "- Step 1: $$1.09$$ means the population multiplies by 1.09 each year — a discrete annual growth factor (9% per year).\n- Step 2: Differentiating: $$\\frac{dP}{dt} = P_0(1.09)^t\\ln(1.09) = P\\ln(1.09)$$. The \"continuous growth rate\" is $$\\ln(1.09) \\approx 0.0862$$, or about 8.62%.\n- Step 3: The two rates differ because continuous compounding exceeds a single annual jump by the same factor. $$1.09 = e^{\\ln 1.09}$$, so $$\\ln 1.09$$ is the instantaneous rate that, continuously compounded, matches 9% annual growth.\n\nTakeaway: discrete growth factor $$a$$ corresponds to continuous rate $$\\ln a$$; they describe the same curve but from different sampling perspectives.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "The gradient of a curve is given by $$\\frac{dy}{dx} = \\frac{x + y}{x - y}$$. At the point (1, 0), is the curve increasing or decreasing as x increases? At the point (0, 1) is it increasing or decreasing? (2 steps)", "answer": "- Step 1: At (1, 0): substitute x = 1, y = 0 into gradient formula: (1 + 0)/(1 - 0) = 1. The gradient is positive (1), so the curve is increasing as x increases (going upward from left to right).\n\n- Step 2: At (0, 1): substitute x = 0, y = 1: (0 + 1)/(0 - 1) = 1/(-1) = -1. The gradient is negative (-1), so the curve is decreasing as x increases. Different points on the same curve can have completely different gradient behaviors.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "Pondweed $$P$$ grows at a rate proportional to itself, while fish eat it at constant rate $$Q$$ per unit time. Write the differential equation and describe the equilibrium. (3 steps)", "answer": "- Step 1: Growth: $$+kP$$ (proportional to existing amount). Consumption: $$-Q$$ (constant loss).\n- Step 2: Net: $$\\frac{dP}{dt} = kP - Q$$.\n- Step 3: Equilibrium at $$P_{eq} = Q/k$$ (where rate vanishes):\n+ If $$P < P_{eq}$$: $$kP < Q$$, so net rate negative, pondweed decreases.\n+ If $$P > P_{eq}$$: growth dominates, pondweed increases (unboundedly, in the model).\n+ $$P_{eq}$$ is unstable: small perturbations grow, not shrink.\n\nTakeaway: linear-proportional + constant-loss DEs have one equilibrium; whether it's stable or unstable depends on the sign of $$k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "What does it mean for a curve to be given in parametric form, and how does this differ from the explicit form $$y = f(x)$$? (3 steps)", "answer": "- Step 1: In explicit form, $$y$$ is given directly as a function of $$x$$, like $$y = x^2 + 3$$ — every $$x$$-input produces one $$y$$-output via a single rule, and the curve must pass the vertical line test.\n- Step 2: In parametric form, both $$x$$ and $$y$$ are separately defined as functions of a third variable (the parameter, often $$t$$), e.g. $$x = t^3 + t, y = t^2 + 1$$. The parameter $$t$$ acts like a \"dial\" or \"time\" that sweeps out the curve.\n- Step 3: The key benefit is that parametric form can represent curves that fail the vertical line test (like circles or loops), encodes direction of travel, and often expresses physical motion more naturally (e.g. projectile position as $$x(t), y(t)$$).\n\nTakeaway: parametric form decouples $$x$$ and $$y$$ by routing both through a parameter, letting you describe richer curves than $$y = f(x)$$ allows.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Identify the key conceptual differences between \"rate proportional to amount\" and \"rate proportional to surface area\" models. (3 steps)", "answer": "- Step 1: \"Rate ∝ amount\" (e.g., radioactive decay, population) gives $$\\frac{dN}{dt} = \\pm kN$$ → exponential solution.\n- Step 2: \"Rate ∝ surface area\" (e.g., evaporation of a sphere) gives $$\\frac{dV}{dt} = -kA = -k(4\\pi R^2)$$. Since $$V = \\frac{4}{3}\\pi R^3$$, this translates to $$\\frac{dR}{dt} = -k$$ → linear shrinkage of radius.\n- Step 3: The first is \"intrinsic\" (every unit has the same chance), giving multiplicative dynamics. The second is \"boundary-driven\" (only surface atoms interact), giving additive shrinkage. Very different qualitative behaviors.\n\nTakeaway: matching the right proportionality to the physics matters — gets you exponential vs. linear vs. other dynamics.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Give a physical intuition for why $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ when a particle moves along a curve parametrised by time $$t$$. (3 steps)", "answer": "- Step 1: Think of $$t$$ as time, $$dy/dt$$ as the vertical velocity component, and $$dx/dt$$ as the horizontal velocity component.\n- Step 2: The slope of the path at any instant is \"rise over run\", or equivalently \"vertical rise per unit time ÷ horizontal run per unit time\" — which is exactly the ratio of the velocity components.\n- Step 3: Caveat: when $$dx/dt = 0$$ (no horizontal motion), the path has a vertical tangent, and the formula \"breaks down\" (division by zero). Those are exactly the vertical-tangent points.\n\nTakeaway: slope = vertical speed / horizontal speed; zero numerator → horizontal tangent; zero denominator → vertical tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "When finding $$\\frac{dy}{dx}$$ at a specific point on an implicit curve, what is the strategic advantage of substituting the coordinates $$x = x_0$$, $$y = y_0$$ before rearranging for $$\\frac{dy}{dx}$$? (2 steps)", "answer": "- Step 1: Substituting first converts all the $$x$$'s and $$y$$'s into concrete numbers, leaving an equation that is **linear in** $$\\frac{dy}{dx}$$ — easy to solve. For example, after differentiating $$4xy^2 + \\frac{6x^2}{y} = 10$$, substituting $$(1,1)$$ immediately gives $$8\\frac{dy}{dx} + 4 + 12 - 6\\frac{dy}{dx} = 0$$, which simplifies to $$2\\frac{dy}{dx} + 16 = 0$$.\n- Step 2: If instead you rearranged for $$\\frac{dy}{dx}$$ in general (keeping all $$x$$'s and $$y$$'s), you'd get a complicated rational expression in $$x$$ and $$y$$, and then substituting might involve messy simplification. Substituting first eliminates this complexity. The textbook explicitly recommends: \"Substitute before rearranging, as this simplifies the working.\"\n\n+ When you DON'T have a specific point (e.g., finding a general expression, or finding stationary points where $$\\frac{dy}{dx} = 0$$), you must work with the general form.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "How does a parametric curve's $$(dy/dt, dx/dt)$$ relate to the concept of \"velocity\" along the curve? (3 steps)", "answer": "- Step 1: Imagine $$t$$ as time: a particle moves along the curve with position $$(x(t), y(t))$$.\n- Step 2: $$\\frac{dx}{dt}$$ is horizontal velocity; $$\\frac{dy}{dt}$$ is vertical velocity. The pair $$(\\frac{dx}{dt}, \\frac{dy}{dt})$$ is the velocity vector, always tangent to the curve.\n- Step 3: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ is the slope — a purely geometric property of the path, independent of the particle's speed. This is why reparametrization (e.g., $$t \\to 2t$$) doesn't change the slope: both velocities scale identically.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "For the implicit equation $$e^{2x} \\ln y = x + y - 2$$, explain why we substitute the point coordinates into the differentiated equation BEFORE solving for dy/dx, rather than after. (2 steps)", "answer": "- Step 1: The differentiated equation contains terms like (1/y)(dy/dx) that become much simpler when we substitute y = 1, because 1/y = 1.\n- Step 2: Substituting before rearranging simplifies the algebra significantly. At (1, 1), the equation reduces from $$e^{2x} \\frac{dy}{dx} + 2e^{2x} \\ln y = 1 + \\frac{dy}{dx}$$ to $$e^2 \\frac{dy}{dx} = 1 + \\frac{dy}{dx}$$, which is immediately solvable.\n+ This is much cleaner than rearranging first with ln y still present", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "A parametric curve has $$\\frac{dx}{dt} = 0$$ at some $$t = t_0$$. A student concludes \"the gradient is $$\\frac{dy/dt}{0}$$, which is undefined, so there's no tangent.\" What's the correct interpretation? (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx}$$ is undefined (infinite), but this doesn't mean \"no tangent\" — it means the tangent is vertical (infinite slope).\n- Step 2: Geometrically, the curve changes $$y$$ without changing $$x$$ at this moment, which is exactly what a vertical tangent describes.\n- Step 3: To handle it, consider $$\\frac{dx}{dy} = \\frac{dx/dt}{dy/dt} = 0$$ at $$t_0$$. A zero \"reverse slope\" matches the intuition of \"no horizontal run per unit vertical rise\" = vertical line.\n\nTakeaway: undefined slope ≠ no tangent; usually it means vertical. Flipping to $$\\frac{dx}{dy}$$ gives a well-defined picture.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "For a circle of radius $$r$$ growing at constant rate $$\\frac{dr}{dt} = c$$, explain why $$\\frac{dC}{dt}$$ is constant but $$\\frac{dA}{dt}$$ grows with $$r$$. (3 steps)", "answer": "- Step 1: Circumference $$C = 2\\pi r$$, so $$\\frac{dC}{dr} = 2\\pi$$ (constant). Area $$A = \\pi r^2$$, so $$\\frac{dA}{dr} = 2\\pi r$$ (linear in $$r$$).\n- Step 2: By chain rule:\n+ $$\\frac{dC}{dt} = 2\\pi c$$ — constant, independent of $$r$$.\n+ $$\\frac{dA}{dt} = 2\\pi r \\cdot c$$ — grows linearly with $$r$$.\n- Step 3: Geometrically, adding a thin radial ring of thickness $$dr$$ contributes $$2\\pi\\,dr$$ to circumference (fixed) but $$2\\pi r\\,dr$$ to area (larger for bigger circles, because the ring is longer). Hence the rate disparity.\n\nTakeaway: linear quantities have constant rates of change; quadratic quantities' rates scale with the underlying variable.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why does $$\\frac{dr}{dV} = \\frac{1}{dV/dr}$$, and when is this identity useful? (3 steps)", "answer": "- Step 1: If $$V(r)$$ is a monotonic function, $$r$$ is a well-defined function of $$V$$. Differentiating \"$$r = r$$\" with respect to $$V$$ via chain rule: $$1 = \\frac{dr}{dV}\\cdot\\frac{dV}{dr}$$.\n- Step 2: Rearranging: $$\\frac{dr}{dV} = \\frac{1}{dV/dr}$$. Swapping dependent and independent variables swaps the derivative's numerator and denominator.\n- Step 3: Useful when you know $$V(r)$$ but need a rate involving $$\\frac{dr}{dV}$$ — you can avoid rearranging the equation to get $$r(V)$$ explicitly.\n\nTakeaway: derivatives of inverse functions are reciprocals — no need to invert a formula just to flip the derivative direction.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "The population P of a species grows at a rate proportional to the square of the current population. Write down the differential equation and explain each term. How does this differ from exponential growth? (2 steps)", "answer": "- Step 1: The differential equation is $$\\frac{dP}{dt} = kP^2$$, where k > 0 is the constant of proportionality. This says the growth rate increases with the square of the population.\n\n- Step 2: This differs fundamentally from exponential growth $$\\frac{dP}{dt} = kP$$ where growth rate is proportional to P (not P²). In exponential growth, doubling the population doubles the growth rate; here, doubling the population quadruples the growth rate. This leads to faster, \"runaway\" growth. However, unless there's some limiting factor, this model predicts infinite growth in finite time — often unrealistic, suggesting the model needs constraints for real populations.", "source": "MiniMax ①", "_id": "minimax_1_19"}, {"question": "Exercise: A cube's volume is decreasing at a constant rate. As the volume gets smaller, does the side length decrease at a faster or slower rate? (4 steps)", "answer": "- Step 1: Let side length be $$s$$ and volume be $$V$$. We are given $$\\frac{dV}{dt} = -C$$ (constant rate of decrease).\n- Step 2: The volume of a cube is $$V = s^3$$. Differentiating with respect to $$s$$ gives $$\\frac{dV}{ds} = 3s^2$$.\n- Step 3: Using the chain rule, $$\\frac{dV}{dt} = \\frac{dV}{ds} \\times \\frac{ds}{dt}$$. So, $$-C = 3s^2 \\times \\frac{ds}{dt}$$, which means $$\\frac{ds}{dt} = \\frac{-C}{3s^2}$$.\n- Step 4: As the volume gets smaller, the side length $$s$$ also gets smaller. \n+ As $$s$$ gets smaller, the denominator $$3s^2$$ gets smaller.\n+ Making the magnitude of the fraction $$\\frac{C}{3s^2}$$ larger. \n+ Since it's negative, the rate of decrease becomes faster (the side length shrinks progressively faster).\n\nConstant volume loss causes accelerating side-length loss as the cube shrinks.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "A student differentiates $$x^2 + y^2 = 25$$ and writes $$2x + 2y = 0$$, then solves for $$\\frac{dy}{dx} = -\\frac{x}{y}$$ by rearranging. Where is the error, and what should the correct differentiation produce? (2 steps)", "answer": "- Step 1: The error is in differentiating $$y^2$$: the student wrote $$\\frac{d}{dx}(y^2) = 2y$$, treating $$y$$ as if it were a simple variable like $$x$$. But $$y$$ is a function of $$x$$, so the chain rule must apply: $$\\frac{d}{dx}(y^2) = 2y \\cdot \\frac{dy}{dx}$$, not just $$2y$$.\n- Step 2: The correct differentiation: $$2x + 2y\\frac{dy}{dx} = 0$$, then rearranging: $$2y\\frac{dy}{dx} = -2x$$, so $$\\frac{dy}{dx} = -\\frac{x}{y}$$. Notice the final answer is the same, but the intermediate step was wrong! The student accidentally got the right final answer by an incorrect method — this won't work for more complex equations.\n\n+ The trap: for simple equations like $$x^2 + y^2 = 25$$, the missing $$\\frac{dy}{dx}$$ factor can \"cancel out\" during rearranging, making the error invisible. For equations like $$x^2 + 3xy^2 - y^3 = 9$$, the error would produce a completely wrong answer.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Logically, why does \"taking logs before differentiating\" help for expressions like $$y = x^x$$ but not for $$y = x^2$$?", "answer": "For $$y = x^2$$: the exponent is a constant, so the power rule $$\\frac{d}{dx}(x^n) = n x^{n-1}$$ applies directly. For $$y = x^x$$: the exponent itself varies with $$x$$, so neither the power rule (constant exponent needed) nor the exponential rule (constant base needed) applies. Taking $$\\ln$$ converts $$x^x$$ into $$x \\ln x$$ — a simple product of elementary functions that both rules handle. Logarithmic differentiation is the specific tool for \"both the base and exponent depend on the variable.\" It's also useful for complicated products/quotients since $$\\ln$$ turns them into sums/differences.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "If the implicit equation $$F(x, y) = 0$$ gives $$\\frac{dy}{dx} = \\frac{N(x, y)}{D(x, y)}$$ and you want to prove \"there are no points of zero gradient,\" what structure should you look for? (3 steps)", "answer": "- Step 1: Zero gradient means $$N(x, y) = 0$$ on the curve.\n- Step 2: Combine this with the curve equation $$F(x, y) = 0$$ and see if the system has real solutions.\n- Step 3: Show no real solutions exist — typically by algebraic manipulation leading to a contradiction (e.g., a \"sum of squares equals a negative constant\"). This kind of proof often uses completing-the-square or discriminant-negative arguments.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "For a curve defined by $$x=f(t)$$ and $$y=g(t)$$, a student sets $$\\frac{dx}{dt} = 0$$ to find the stationary points (where $$\\frac{dy}{dx} = 0$$). Explain why this is flawed logic, and state the correct condition for a stationary point. What geometric feature might occur if $$\\frac{dy}{dt}=0$$ and $$\\frac{dx}{dt}=0$$ simultaneously? (3 steps)", "answer": "- Step 1: The logic is flawed because setting $$\\frac{dx}{dt} = 0$$ means the denominator of $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ is zero. This results in an undefined (infinite) gradient, which corresponds to a vertical tangent, not a horizontal (stationary) one.\n- Step 2: For a stationary point, the gradient $$\\frac{dy}{dx}$$ must be exactly zero. For a fraction to equal zero, its numerator must be zero (while the denominator is non-zero). Therefore, the correct condition is $$\\frac{dy}{dt} = 0$$ provided $$\\frac{dx}{dt} \\neq 0$$.\n- Step 3: If both $$\\frac{dy}{dt} = 0$$ and $$\\frac{dx}{dt} = 0$$ simultaneously, the formula $$\\frac{dy}{dx}$$ becomes the indeterminate form $$\\frac{0}{0}$$. Geometrically, this often indicates a cusp (where the curve reverses direction sharply) or a self-intersection, requiring further analysis rather than simple evaluation.\n\nA stationary point requires the vertical velocity to vanish while horizontal movement continues.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "For the curve $$y^3 + 3xy^2 - x^3 = 3$$, why are turning points located where $$y = \\pm x$$? (3 steps)", "answer": "- Step 1: Implicit derivative gives $$\\frac{dy}{dx} = \\frac{x^2 - y^2}{y^2 + 2xy}$$.\n- Step 2: Turning points (where $$\\frac{dy}{dx} = 0$$) require numerator zero: $$x^2 - y^2 = 0$$, i.e., $$x^2 = y^2$$, so $$y = \\pm x$$.\n- Step 3: Each line $$y = x$$ and $$y = -x$$ can intersect the curve at specific points — substitute into the curve equation to find them. The symmetry of the equation in $$x, y$$ (or the lack thereof) determines which branches give valid turning points.", "source": "Opus 4.7 ①", "_id": "opus_1_85"}, {"question": "Exercise: A spherical balloon is being inflated such that the volume increases at a constant rate. As the radius gets larger, does the rate of increase of the radius ($$\\frac{dR}{dt}$$) increase, decrease, or stay the same? (4 steps)", "answer": "- Step 1: We are given that $$\\frac{dV}{dt} = C$$ (a positive constant).\n- Step 2: We want to find the behavior of $$\\frac{dR}{dt}$$. Using the chain rule, $$\\frac{dV}{dt} = \\frac{dV}{dR} \\times \\frac{dR}{dt}$$.\n- Step 3: For a sphere, $$V = \\frac{4}{3}\\pi R^3$$, so $$\\frac{dV}{dR} = 4\\pi R^2$$. Thus, $$C = 4\\pi R^2 \\times \\frac{dR}{dt}$$.\n- Step 4: Rearranging, $$\\frac{dR}{dt} = \\frac{C}{4\\pi R^2}$$. \n+ As $$R$$ gets larger, the denominator $$R^2$$ gets much larger.\n+ So the fraction $$\\frac{dR}{dt}$$ gets smaller. The radius increases at a *decreasing* rate.\n\nConstant volume growth means slower radius growth as the balloon gets bigger.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "For the implicit curve $$(x - y)^4 = x + y + 5$$, how do you apply the chain rule on the LHS? (4 steps)", "answer": "- Step 1: The LHS is a composite: outer function $$u^4$$, inner function $$u = x - y$$. Use chain rule: $$\\frac{d}{dx}[(x-y)^4] = 4(x-y)^3 \\cdot \\frac{d}{dx}(x-y)$$.\n- Step 2: The inner derivative: $$\\frac{d}{dx}(x - y) = 1 - \\frac{dy}{dx}$$.\n- Step 3: So LHS derivative is $$4(x-y)^3 \\cdot (1 - \\frac{dy}{dx})$$. The RHS derivative is $$1 + \\frac{dy}{dx}$$.\n- Step 4: Equate and collect $$\\frac{dy}{dx}$$ terms on one side, other terms on the other. Isolate: $$\\frac{dy}{dx} = \\frac{4(x-y)^3 - 1}{4(x-y)^3 + 1}$$.\n\nThe chain rule is applied once on the power, then on the inner $$(x-y)$$ where $$-y$$ carries a $$-\\frac{dy}{dx}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "For a curve $$y = \\mathrm{f}(x) = \\frac{\\cos 2x}{e^x}$$, sketch the reasoning for finding its stationary points on $$0 \\leq x \\leq \\pi$$. (3 steps)", "answer": "- Step 1: Differentiate using product/quotient rule: $$f'(x) = \\frac{-2\\sin 2x\\cdot e^x - \\cos 2x\\cdot e^x}{e^{2x}} = \\frac{-2\\sin 2x - \\cos 2x}{e^x}$$.\n- Step 2: Stationary: $$f'(x) = 0$$ ⇒ numerator $$= 0$$ (since $$e^x > 0$$). So $$2\\sin 2x + \\cos 2x = 0$$, giving $$\\tan 2x = -\\frac{1}{2}$$.\n- Step 3: Solve $$\\tan 2x = -1/2$$ in the given range, then substitute each $$x$$-solution back into $$f(x)$$ for $$y$$-values — these are the coordinates of max/min.\n\nTakeaway: with decaying envelopes ($$\\cos 2x/e^x$$), stationary points reduce to solving trig equations; exponential factor cancels since it's always positive.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "Explain why \"rate inversely proportional to $$x^n$$\" differential equations often describe \"self-limiting\" physical processes. (3 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = k/x^n$$ means as $$x$$ grows, the rate decreases — the process slows itself down.\n- Step 2: Physical examples: ice thickening ($$n = 2$$: thicker ice insulates, slowing freezing); diffusion across a membrane (thicker film, slower transit).\n- Step 3: Mathematical signature: solutions go like $$x \\sim t^{1/(n+1)}$$ — sub-linear growth. Never stops, but grows slower and slower. Contrast with self-accelerating processes $$\\frac{dx}{dt} \\propto x^n$$ where growth speeds up.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "Misconception: If for a parametric curve, $$\\frac{dx}{dt} = 0$$ at some point $$t=t_0$$, does this mean the curve is undefined at that point? (2 steps)", "answer": "- Step 1: No, the curve itself is likely perfectly well-defined at that point. You can find the coordinates by simply substituting $$t_0$$ into both $$x(t_0)$$ and $$y(t_0)$$.\n- Step 2: What is undefined is the gradient $$\\frac{dy}{dx}$$, because the formula $$\\frac{dy/dt}{dx/dt}$$ involves division by zero. \n+ Geometrically, this usually corresponds to a vertical tangent (if $$\\frac{dy}{dt} \\neq 0$$) or a cusp/sharp point (if both are zero).\n+ The curve still exists, but the slope is undefined or infinite.\n\nA zero denominator in $$\\frac{dy}{dx}$$ doesn't mean the point doesn't exist; it means the slope is vertical or undefined.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "If $$\\frac{dy}{dt}$$ is inversely proportional to $$y$$, write the DE and argue qualitatively that $$y$$ grows like $$\\sqrt{t}$$. (3 steps)", "answer": "- Step 1: DE: $$\\frac{dy}{dt} = \\frac{k}{y}$$ with $$k > 0$$.\n- Step 2: Separate variables: $$y\\,dy = k\\,dt$$. Integrate: $$\\frac{y^2}{2} = kt + C$$.\n- Step 3: Rearrange: $$y = \\sqrt{2kt + 2C}$$ — square-root growth. The growth is ever-slower than linear but never stops: $$y$$ doubles only when $$t$$ quadruples.\n\nTakeaway: $$\\frac{dy}{dt} \\propto 1/y$$ gives square-root growth; compare to $$\\frac{dy}{dt} \\propto y$$ (exponential) and $$\\frac{dy}{dt} = $$ constant (linear).", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "Why is Newton's law of cooling \"universal\" in the sense that the temperature approaches equilibrium exponentially regardless of initial conditions? (4 steps)", "answer": "- Step 1: Equation: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$.\n- Step 2: Substitute $$\\phi = \\theta - \\theta_0$$ (excess temperature): $$\\frac{d\\phi}{dt} = -k\\phi$$.\n- Step 3: This is a first-order linear DE with solution $$\\phi(t) = \\phi_0 e^{-kt}$$, i.e., the excess decays exponentially.\n- Step 4: Whether you start hotter or colder than surroundings, the excess (positive or negative) decays with the same rate $$k$$. So $$\\theta(t) \\to \\theta_0$$ as $$t \\to \\infty$$, irrespective of initial $$\\theta_0$$. The mathematical structure of the DE guarantees this universal approach.", "source": "Opus 4.7 ①", "_id": "opus_1_78"}, {"question": "A common mistake is writing $$\\frac{d}{dx}(y^3) = 3y^2$$. Explain why this is wrong and what's correct.", "answer": "It's wrong because $$y$$ is not the independent variable here — we are differentiating with respect to $$x$$, but $$y$$ depends on $$x$$ (implicitly). \"$$3y^2$$\" would be correct only if we were differentiating with respect to $$y$$ itself. The chain rule demands an extra factor: $$\\frac{d}{dx}(y^3) = 3y^2 \\cdot \\frac{dy}{dx}$$. That $$\\frac{dy}{dx}$$ represents \"how fast $$y$$ is moving as $$x$$ changes\" and is essential — without it, the equation fails dimensionally and the entire implicit method breaks.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Newton's law of cooling states: \"the rate of loss of temperature of a body is proportional to the excess temperature of the body over its surroundings.\" Write the differential equation and identify what $$\\theta_0$$ represents. (2 steps)", "answer": "- Step 1: Let $$\\theta$$ = temperature of the body, $$t$$ = time, $$\\theta_0$$ = temperature of the surroundings (a constant). \"Excess temperature\" is $$\\theta - \\theta_0$$ (how much hotter the body is than its environment). \"Rate of loss of temperature\" means $$\\frac{d\\theta}{dt}$$ is negative when the body is cooling. So: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$, where $$k > 0$$.\n- Step 2: $$\\theta_0$$ is the **ambient temperature** — the temperature of the surroundings that the body is cooling towards. As $$\\theta$$ approaches $$\\theta_0$$, the excess $$\\theta - \\theta_0$$ approaches zero, so $$\\frac{d\\theta}{dt}$$ also approaches zero: the body cools ever more slowly as it nears ambient temperature, never quite reaching it (in the model).\n\n+ The minus sign ensures: when $$\\theta > \\theta_0$$ (body hotter than surroundings), $$\\frac{d\\theta}{dt} < 0$$ (cooling down). If you forgot the minus sign, the body would heat up further when already hotter than surroundings — absurd.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "Discuss the surprising simplicity of $$\\frac{dR}{dt} = -k$$ (constant) for evaporating spheres. What does this say about time-to-disappear? (3 steps)", "answer": "- Step 1: $$\\frac{dR}{dt} = -k$$ means $$R(t) = R_0 - kt$$ (linear shrinkage).\n- Step 2: Time to vanish: $$R(t) = 0 \\Rightarrow t = R_0/k$$. Only proportional to initial radius — not volume!\n- Step 3: Physical insight: though most volume is near the surface for large spheres, the radius shrinks at the same rate regardless of size. This explains why tiny raindrops evaporate fast (small $$R_0$$) while large ones last much longer — time scales with initial radius, not mass or volume.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Explain why the fluid-tank differential equation $$\\frac{dh}{dt} = -K\\sqrt{h}$$ implies the tank takes finite time to fully drain. (3 steps)", "answer": "- Step 1: Separate variables: $$h^{-1/2} dh = -K \\, dt$$, giving $$2\\sqrt{h} = -Kt + C$$.\n- Step 2: At $$t = 0$$, $$h = h_0$$, so $$C = 2\\sqrt{h_0}$$. Drainage complete when $$h = 0$$: $$0 = -Kt + 2\\sqrt{h_0}$$, i.e., $$t = \\frac{2\\sqrt{h_0}}{K}$$ — finite!\n- Step 3: Compare to exponential decay ($$\\frac{dh}{dt} = -Kh$$), which takes infinite time to reach zero. The square root gives a gentler decay near $$h = 0$$ — but the integral $$\\int h^{-1/2} dh$$ converges (unlike $$\\int h^{-1} dh$$), so drainage completes in finite time.", "source": "Opus 4.7 ①", "_id": "opus_1_89"}, {"question": "Misconception: In implicit differentiation, the final expression for $$\\frac{dy}{dx}$$ usually contains both $$x$$ and $$y$$. Why is this not considered an error, and how does it affect evaluating the gradient? (2 steps)", "answer": "- Step 1: It is not an error because the relationship between $$x$$ and $$y$$ is defined by the implicit curve itself; $$y$$ is not an independent variable. On the curve, $$y$$ is locked to $$x$$, but we don't always have an explicit formula $$y = f(x)$$ to substitute and eliminate $$y$$.\n- Step 2: To evaluate the gradient at a specific point, you simply substitute both the x-coordinate *and* the y-coordinate of that point into the expression. \n+ You do not need to eliminate $$y$$ from the formula.\n+ You just need to know the specific point on the curve where you want the gradient.\n\n$$\\frac{dy}{dx}$$ in terms of both $$x$$ and $$y$$ is perfectly valid; you just need both coordinates to find a numerical gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "When differentiating $$\\frac{6x^2}{y}$$ with respect to $$x$$, you can treat it as a product $$6x^2 \\cdot y^{-1}$$ or as a quotient. Walk through the product rule approach and show why it's cleaner. (3 steps)", "answer": "- Step 1: Rewrite $$\\frac{6x^2}{y} = 6x^2 y^{-1}$$, identifying $$u = 6x^2$$ and $$v = y^{-1}$$ as the two factors.\n- Step 2: Apply the product rule: $$\\frac{d}{dx}(6x^2 y^{-1}) = 6x^2 \\cdot \\frac{d}{dx}(y^{-1}) + y^{-1} \\cdot \\frac{d}{dx}(6x^2)$$. Now $$\\frac{d}{dx}(y^{-1}) = -y^{-2}\\frac{dy}{dx}$$ (chain rule on $$y^{-1}$$), and $$\\frac{d}{dx}(6x^2) = 12x$$.\n- Step 3: Result: $$6x^2(-y^{-2}\\frac{dy}{dx}) + y^{-1}(12x) = -\\frac{6x^2}{y^2}\\frac{dy}{dx} + \\frac{12x}{y}$$, or equivalently $$\\frac{12x}{y} - \\frac{6x^2}{y^2}\\frac{dy}{dx}$$.\n\n+ The quotient rule would give the same result but with a more complex expression before simplification. Rewriting as a product with negative powers is often cleaner for implicit differentiation because the $$\\frac{dy}{dx}$$ terms are more visible.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "An oil patch has radius growing inversely proportional to itself ($$\\frac{dr}{dt} = \\frac{k}{r}$$). What does this say about how the area grows? (4 steps)", "answer": "- Step 1: $$\\frac{dr}{dt} = \\frac{k}{r}$$ means $$r \\frac{dr}{dt} = k$$ (constant).\n- Step 2: Area $$A = \\pi r^2$$, so $$\\frac{dA}{dt} = 2\\pi r \\cdot \\frac{dr}{dt} = 2\\pi \\cdot (r \\frac{dr}{dt}) = 2\\pi k$$ — constant.\n- Step 3: So area grows at a constant rate, even though the radius grows slower and slower.\n- Step 4: Physical picture: oil is released at a steady mass rate and spreads uniformly in a thin layer. The area grows linearly in time ($$A \\sim t$$), so $$r \\sim \\sqrt{t}$$ — the radius grows like a square root, diminishing but never stopping.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the fundamental reason we use parametric equations to define curves instead of always using Cartesian form $$y = f(x)$$? (3 steps)", "answer": "- Step 1: In Cartesian form $$y = f(x)$$, for every x-value, there can be at most one y-value. This means a function cannot loop back on itself or have two y-values for the same x-value (like a circle or a figure-eight).\n- Step 2: Parametric equations use a third variable, the parameter (often $$t$$ for time or $$\\theta$$ for angle), to drive both $$x$$ and $$y$$ independently. As the parameter changes, the point $$(x(t), y(t))$$ traces out a path.\n- Step 3: This allows the curve to cross itself, loop around, or even trace back over the same points, which is impossible for a single explicit function $$y = f(x)$$.\n+ It also naturally provides a direction and \"speed\" along the curve based on how the parameter changes.\n+ For example, a circle cannot be represented by a single function $$y=f(x)$$, but it is easily parameterized as $$x = \\cos t, y = \\sin t$$.\n\nParametric equations decouple $$x$$ and $$y$$, allowing curves that fail the vertical line test.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Derive the formula for $$\\frac{dy}{dx}$$ when $$x$$ and $$y$$ are defined parametrically in terms of $$t$$. (3 steps)", "answer": "- Step 1: We want the rate of change of $$y$$ with respect to $$x$$. However, we only know how $$x$$ and $$y$$ change with respect to the parameter $$t$$: we have $$\\frac{dx}{dt}$$ and $$\\frac{dy}{dt}$$.\n- Step 2: We can use the chain rule to link these three variables. \n+ The chain rule states that $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$.\n+ This works because a tiny change in $$y$$ divided by a tiny change in $$t$$ equals the ratio of change in $$y$$ over $$x$$ times change in $$x$$ over $$t$$.\n- Step 3: Rearranging this equation to solve for $$\\frac{dy}{dx}$$, we divide both sides by $$\\frac{dx}{dt}$$ (assuming $$\\frac{dx}{dt} \\neq 0$$). This gives the parametric differentiation formula: $$\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}}$$.\n\nThe parametric gradient is simply the ratio of the parameter's effect on $$y$$ to its effect on $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For a parametric curve, what is the condition on $$\\frac{dy}{dt}$$ and $$\\frac{dx}{dt}$$ for the curve to have a horizontal tangent (stationary point)? What about a vertical tangent? (2 steps)", "answer": "- Step 1: A horizontal tangent means the gradient $$\\frac{dy}{dx} = 0$$. \n+ Since $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, a fraction equals zero only when its numerator is zero (and denominator is not).\n+ So, we need $$\\frac{dy}{dt} = 0$$ and $$\\frac{dx}{dt} \\neq 0$$.\n- Step 2: A vertical tangent means the gradient is infinite (the tangent line is parallel to the y-axis). \n+ A fraction tends to infinity when its denominator tends to zero (and numerator is not).\n+ So, we need $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} \\neq 0$$.\n\nHorizontal tangents occur when $$y$$ stops changing relative to $$t$$; vertical tangents occur when $$x$$ stops changing relative to $$t$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "Misconception: If for a parametric curve, $$\\frac{dx}{dt} = 0$$ at some point $$t=t_0$$, does this mean the curve is undefined at that point? (2 steps)", "answer": "- Step 1: No, the curve itself is likely perfectly well-defined at that point. You can find the coordinates by simply substituting $$t_0$$ into both $$x(t_0)$$ and $$y(t_0)$$.\n- Step 2: What is undefined is the gradient $$\\frac{dy}{dx}$$, because the formula $$\\frac{dy/dt}{dx/dt}$$ involves division by zero. \n+ Geometrically, this usually corresponds to a vertical tangent (if $$\\frac{dy}{dt} \\neq 0$$) or a cusp/sharp point (if both are zero).\n+ The curve still exists, but the slope is undefined or infinite.\n\nA zero denominator in $$\\frac{dy}{dx}$$ doesn't mean the point doesn't exist; it means the slope is vertical or undefined.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "To find the equation of the normal to a parametric curve at a given parameter value, what are the sequential conceptual steps? (4 steps)", "answer": "- Step 1: Differentiate both $$x(t)$$ and $$y(t)$$ with respect to $$t$$ to find $$\\frac{dx}{dt}$$ and $$\\frac{dy}{dt}$$.\n- Step 2: Form the fraction $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ to find the gradient of the tangent in terms of $$t$$. Substitute the given $$t$$-value to find the numerical gradient of the tangent, $$m_t$$.\n- Step 3: Find the gradient of the normal, $$m_n$$, using the perpendicular relationship: $$m_n = -\\frac{1}{m_t}$$.\n- Step 4: Find the specific point on the curve by substituting the $$t$$-value into the original $$x(t)$$ and $$y(t)$$ equations. Use this point $$(x_0, y_0)$$ and the normal gradient $$m_n$$ in the line equation $$y - y_0 = m_n(x - x_0)$$.\n\nTangent gradient comes from the derivative ratio; normal gradient is its negative reciprocal; the point comes from the original parametric equations.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Synthesis: A curve is given by $$x = t^3, y = t^2$$. Without converting to Cartesian, reason whether this curve passes through the origin, and if so, how many times? (3 steps)", "answer": "- Step 1: The origin occurs where both $$x = 0$$ and $$y = 0$$. We set the parametric equations to zero: $$t^3 = 0$$ and $$t^2 = 0$$.\n- Step 2: Both equations are satisfied when $$t = 0$$. So the curve passes through the origin exactly once (at $$t=0$$).\n- Step 3: Even though $$t^2$$ is an even function (so $$y$$ is the same for $$t$$ and $$-t$$), the x-component $$t^3$$ is odd ($$x$$ changes sign for $$-t$$). \n+ Therefore, at $$t=1$$ and $$t=-1$$, the curve is at different points $$(1,1)$$ and $$(-1,1)$$, so it doesn't hit the origin again.\n\nTo find intersections with axes parametrically, set $$x=0$$ or $$y=0$$ and solve for $$t$$, then check the other coordinate.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Exercise: For the curve $$x = t^2 - 1, y = t^3 - t$$, find the values of $$t$$ where the curve has horizontal tangents. (3 steps)", "answer": "- Step 1: A horizontal tangent requires $$\\frac{dy}{dx} = 0$$, which means the numerator of our parametric derivative must be zero: $$\\frac{dy}{dt} = 0$$.\n- Step 2: Differentiate $$y$$ with respect to $$t$$: $$\\frac{dy}{dt} = \\frac{d}{dt}(t^3 - t) = 3t^2 - 1$$.\n- Step 3: Set $$\\frac{dy}{dt} = 0$$, so $$3t^2 - 1 = 0$$. \n+ This gives $$t^2 = \\frac{1}{3}$$, so $$t = \\pm \\frac{1}{\\sqrt{3}}$$.\n+ We must quickly check that $$\\frac{dx}{dt} = 2t \\neq 0$$ at these $$t$$ values, which is true since $$t \\neq 0$$.\n\nHorizontal tangents are found purely by setting the derivative of the y-parameter equation to zero.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What is the difference between an explicit equation and an implicit equation, and why does implicit differentiation exist? (2 steps)", "answer": "- Step 1: An explicit equation has $$y$$ isolated on one side, like $$y = f(x)$$. An implicit equation mixes $$x$$ and $$y$$ together, like $$x^2 + y^2 = 25$$ or $$\\sin(x+y) = 2x$$, where $$y$$ is not easily isolated.\n- Step 2: Implicit differentiation exists because trying to rearrange an implicit equation into the form $$y = f(x)$$ can be algebraically impossible, extremely messy, or would result in multiple separate functions (like $$y = \\pm\\sqrt{25-x^2}$$). \n+ Implicit differentiation allows us to find $$\\frac{dy}{dx}$$ directly without ever solving for $$y$$.\n\nImplicit differentiation bypasses the need to solve for $$y$$, handling the mixed terms directly.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Why does differentiating $$y^n$$ with respect to $$x$$ result in $$ny^{n-1}\\frac{dy}{dx}$$ instead of just $$ny^{n-1}$$? Explain using the chain rule. (3 steps)", "answer": "- Step 1: When we differentiate with respect to $$x$$, we must account for how *every* variable in the expression changes with respect to $$x$$. If it were just $$x$$, like $$x^n$$, the derivative is $$nx^{n-1}$$.\n- Step 2: However, $$y$$ is not the independent variable; $$y$$ is a function of $$x$$. By the chain rule, to differentiate a composite function $$f(g(x))$$, we take the derivative of the outer function and multiply by the derivative of the inner function: $$f'(g(x)) \\cdot g'(x)$$.\n- Step 3: Here, the outer function is \"something to the power $$n$$\", and the inner function is $$y$$. \n+ The derivative of the outer is $$ny^{n-1}$$.\n+ The derivative of the inner $$y$$ with respect to $$x$$ is $$\\frac{dy}{dx}$$.\n+ Multiplying them gives $$ny^{n-1}\\frac{dy}{dx}$$.\n\nThe $$\\frac{dy}{dx}$$ factor is the chain rule's way of accounting for $$y$$'s dependence on $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Derive the product rule for implicit differentiation: $$\\frac{d}{dx}(xy) = x\\frac{dy}{dx} + y$$. (3 steps)", "answer": "- Step 1: Recognize that $$xy$$ is a product of two functions of $$x$$: the function $$x$$, and the function $$y$$ (which is implicitly dependent on $$x$$). We must use the standard product rule: $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$.\n- Step 2: Let $$u = x$$ and $$v = y$$. Then $$\\frac{du}{dx} = \\frac{d}{dx}(x) = 1$$. Since $$v = y$$ is a function of $$x$$, $$\\frac{dv}{dx} = \\frac{dy}{dx}$$.\n- Step 3: Substitute these into the product rule formula: \n+ $$\\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot 1$$\n+ This simplifies to $$x\\frac{dy}{dx} + y$$.\n\nDifferentiating $$xy$$ requires the product rule, and since $$y$$ depends on $$x$$, its derivative is $$\\frac{dy}{dx}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "How do you differentiate an implicit term like $$\\frac{6x^2}{y}$$ with respect to $$x$$? What rules must you combine? (3 steps)", "answer": "- Step 1: First, rewrite the term with negative exponents to make differentiation clearer: $$6x^2 y^{-1}$$. This is a product of a function of $$x$$ ($$6x^2$$) and a function of $$y$$ ($$y^{-1}$$).\n- Step 2: Apply the product rule: $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$. Let $$u = 6x^2$$ and $$v = y^{-1}$$. Then $$\\frac{du}{dx} = 12x$$.\n- Step 3: To find $$\\frac{dv}{dx}$$, apply the chain rule because $$v$$ is a function of $$y$$. \n+ $$\\frac{d}{dx}(y^{-1}) = -1y^{-2}\\frac{dy}{dx} = -\\frac{1}{y^2}\\frac{dy}{dx}$$.\n+ Combining it all: $$6x^2(-\\frac{1}{y^2}\\frac{dy}{dx}) + y^{-1}(12x) = \\frac{12x}{y} - \\frac{6x^2}{y^2}\\frac{dy}{dx}$$.\n\nQuotients with $$y$$ in the denominator require both the product rule (after negative exponent) and the chain rule.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Strategy: When asked to find the gradient of an implicitly defined curve at a specific point $$(x_0, y_0)$$, what is the most efficient strategy regarding when to substitute the point? (2 steps)", "answer": "- Step 1: Differentiate the entire implicit equation term-by-term with respect to $$x$$, carefully applying the chain and product rules to any terms containing $$y$$. This will result in an equation where $$\\frac{dy}{dx}$$ appears in multiple terms.\n- Step 2: *Substitute the point $$(x_0, y_0)$$ immediately after differentiating, before rearranging to solve for $$\\frac{dy}{dx}$$*. \n+ This turns the equation into a simple linear equation in one unknown ($$\\frac{dy}{dx}$$).\n+ It avoids messy algebraic rearrangement of terms containing both $$x$$, $$y$$, and $$\\frac{dy}{dx}$$.\n\nSubstitute the point early! It turns a complex algebraic rearrangement into a simple arithmetic solve.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Misconception: In implicit differentiation, the final expression for $$\\frac{dy}{dx}$$ usually contains both $$x$$ and $$y$$. Why is this not considered an error, and how does it affect evaluating the gradient? (2 steps)", "answer": "- Step 1: It is not an error because the relationship between $$x$$ and $$y$$ is defined by the implicit curve itself; $$y$$ is not an independent variable. On the curve, $$y$$ is locked to $$x$$, but we don't always have an explicit formula $$y = f(x)$$ to substitute and eliminate $$y$$.\n- Step 2: To evaluate the gradient at a specific point, you simply substitute both the x-coordinate *and* the y-coordinate of that point into the expression. \n+ You do not need to eliminate $$y$$ from the formula.\n+ You just need to know the specific point on the curve where you want the gradient.\n\n$$\\frac{dy}{dx}$$ in terms of both $$x$$ and $$y$$ is perfectly valid; you just need both coordinates to find a numerical gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "For an implicit curve, if you find $$\\frac{dy}{dx} = \\frac{-2x}{3y^2+1}$$, how do you find the stationary points, and why must you check the denominator? (3 steps)", "answer": "- Step 1: Stationary points occur where the gradient is zero, so set the numerator of $$\\frac{dy}{dx}$$ to zero: $$-2x = 0 \\implies x = 0$$.\n- Step 2: However, a stationary point only exists if the curve itself is well-defined and smooth at that x-value. You must substitute $$x=0$$ back into the *original implicit equation* to find the corresponding y-value(s).\n- Step 3: You must check the denominator to ensure it isn't zero at those y-values. \n+ If $$3y^2+1 = 0$$, the gradient is undefined (vertical tangent or cusp), not zero.\n+ (In this case, $$3y^2+1 \\ge 1 > 0$$ always, so the gradient is always defined).\n\nStationary points require numerator = 0 AND denominator $$\\neq 0$$, plus the point must actually lie on the original curve.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Edge case: Consider the implicit equation $$x^2 + y^2 = -5$$. If you differentiate implicitly, you get $$2x + 2y\\frac{dy}{dx} = 0$$. Does this curve have any stationary points? What does this reveal about implicit differentiation? (3 steps)", "answer": "- Step 1: Setting the numerator condition for stationary points, if we solve $$2x = 0$$, we get $$x = 0$$.\n- Step 2: If we substitute $$x = 0$$ into the original equation, we get $$0 + y^2 = -5$$, which means $$y^2 = -5$$. There are no real values for $$y$$, so the point $$x=0$$ does not exist on this curve in the real plane.\n- Step 3: This reveals that implicit differentiation is a purely mechanical process. \n+ It will blindly give you a formula for $$\\frac{dy}{dx}$$ even if the original equation describes an empty set (no real points).\n+ You must always verify that the points you find actually lie on the original curve.\n\nImplicit differentiation doesn't check if the curve is real; always validate points against the original equation.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "Exercise: Find the gradient of the curve $$x^2 + y^2 = 25$$ at the point (3, 4). (4 steps)", "answer": "- Step 1: Differentiate both sides with respect to $$x$$. The derivative of $$x^2$$ is $$2x$$. For $$y^2$$, use the chain rule: $$2y\\frac{dy}{dx}$$.\n- Step 2: This gives the equation $$2x + 2y\\frac{dy}{dx} = 0$$.\n- Step 3: Substitute the point (3, 4) early to simplify: $$2(3) + 2(4)\\frac{dy}{dx} = 0 \\implies 6 + 8\\frac{dy}{dx} = 0$$.\n- Step 4: Solve for $$\\frac{dy}{dx}$$: \n+ $$8\\frac{dy}{dx} = -6$$\n+ $$\\frac{dy}{dx} = -\\frac{6}{8} = -\\frac{3}{4}$$.\n\nEarly substitution makes implicit gradient calculations straightforward arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "The chain rule connects rates of change. If A depends on r, and r depends on t, write the chain rule connecting $$\\frac{dA}{dt}$$ to the other rates. (2 steps)", "answer": "- Step 1: We want the rate of change of Area with respect to time, $$\\frac{dA}{dt}$$. We know how Area changes with radius ($$\\frac{dA}{dr}$$) and how radius changes with time ($$\\frac{dr}{dt}$$).\n- Step 2: The chain rule links these by multiplication: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dt}$$. \n+ Think of the \"dr\" units cancelling out, leaving a rate of change of $$A$$ with respect to $$t$$.\n\nConnected rates of change multiply together via the chain rule.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Constructing differential equations: \"The rate of increase of a population P is proportional to the size of P.\" Write the differential equation and explain the sign choice. (3 steps)", "answer": "- Step 1: Translate \"rate of increase of P\" into calculus notation: $$\\frac{dP}{dt}$$, where $$t$$ is time.\n- Step 2: \"Is proportional to the size of P\" means it equals a constant times $$P$$: $$kP$$, where $$k$$ is the constant of proportionality.\n- Step 3: Because the problem states \"rate of *increase*\", the population is going up, meaning $$\\frac{dP}{dt}$$ is positive. \n+ Therefore, $$k$$ must be a positive constant.\n+ The equation is $$\\frac{dP}{dt} = kP$$ (with $$k > 0$$).\n\n\"Rate of increase\" implies a positive derivative, so the constant of proportionality is positive.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Constructing differential equations: \"A body loses its charge Q at a rate proportional to the charge Q.\" Write the DE and explain the sign choice. (3 steps)", "answer": "- Step 1: \"Rate of change of charge\" translates to $$\\frac{dQ}{dt}$$.\n- Step 2: \"Is proportional to the charge Q\" means we write $$kQ$$.\n- Step 3: The word \"loses\" means the charge is decreasing over time, so the rate of change $$\\frac{dQ}{dt}$$ must be negative. \n+ To make a positive quantity ($$kQ$$) equal to a negative rate, we must introduce a negative sign.\n+ The DE is $$\\frac{dQ}{dt} = -kQ$$, where $$k$$ is a positive constant.\n\n\"Loses\" or \"decreases\" requires a negative sign in front of the proportional term.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Constructing differential equations with multiple terms: \"Liquid is poured into a container at a constant rate of 30 cm³/s, and leaks out at a rate proportional to the volume V currently in the container.\" Write the DE. (3 steps)", "answer": "- Step 1: The total rate of change of volume is $$\\frac{dV}{dt}$$. This is the sum of the rate in and the rate out.\n- Step 2: The rate in is a constant +30. The rate out is \"proportional to V\", which we can write as $$kV$$ (with $$k > 0$$). \n+ Since it is leaking *out*, this term decreases $$V$$, so it must be subtracted.\n- Step 3: Combine them: $$\\frac{dV}{dt} = 30 - kV$$. \n+ If the problem stated it leaks at a rate of $$\\frac{2}{15}V$$, we would write $$\\frac{dV}{dt} = 30 - \\frac{2}{15}V$$.\n\nWhen there are multiple sources of change, add the increasing rates and subtract the decreasing rates.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Newton's Law of Cooling: \"The rate of loss of temperature of a body is proportional to the excess temperature of the body over its surroundings $$\\theta_0$$.\" Write the DE. (3 steps)", "answer": "- Step 1: \"Rate of loss of temperature\" means $$-\\frac{d\\theta}{dt}$$ (negative because it's a loss). The temperature of the body is $$\\theta$$.\n- Step 2: \"Excess temperature over its surroundings $$\\theta_0$$\" is the difference $$(\\theta - \\theta_0)$$.\n- Step 3: \"Is proportional to\" means we set them equal with a constant $$k$$. \n+ So $$-\\frac{d\\theta}{dt} = k(\\theta - \\theta_0)$$.\n+ This is usually written as $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$, where $$k$$ is a positive constant.\n\nThe driving force of cooling is the temperature difference $$(\\theta - \\theta_0)$$, and it's a loss, so it's negative.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "The snowman problem insight: A spherical snowman loses volume at a rate proportional to its surface area. Conceptually, why does this lead to the radius decreasing at a constant rate? (4 steps)", "answer": "- Step 1: The problem states $$\\frac{dV}{dt} \\propto -A$$ (negative because it's losing volume). So $$\\frac{dV}{dt} = -kA$$.\n- Step 2: By the chain rule, $$\\frac{dV}{dt} = \\frac{dV}{dR} \\times \\frac{dR}{dt}$$. For a sphere, $$V = \\frac{4}{3}\\pi R^3$$, so $$\\frac{dV}{dR} = 4\\pi R^2$$.\n- Step 3: Notice that $$\\frac{dV}{dR}$$ is exactly the formula for the surface area $$A$$! So the chain rule gives $$\\frac{dV}{dt} = A \\times \\frac{dR}{dt}$$.\n- Step 4: Equate the two expressions for $$\\frac{dV}{dt}$$: $$A \\times \\frac{dR}{dt} = -kA$$. \n+ Dividing both sides by $$A$$ (assuming $$A > 0$$), we get $$\\frac{dR}{dt} = -k$$.\n+ The rate of change of the radius is just a constant!\n\nBecause the derivative of volume with respect to radius is surface area, a volume loss proportional to area perfectly cancels out the area, leaving a constant radius decay.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Exercise: A spherical balloon is being inflated such that the volume increases at a constant rate. As the radius gets larger, does the rate of increase of the radius ($$\\frac{dR}{dt}$$) increase, decrease, or stay the same? (4 steps)", "answer": "- Step 1: We are given that $$\\frac{dV}{dt} = C$$ (a positive constant).\n- Step 2: We want to find the behavior of $$\\frac{dR}{dt}$$. Using the chain rule, $$\\frac{dV}{dt} = \\frac{dV}{dR} \\times \\frac{dR}{dt}$$.\n- Step 3: For a sphere, $$V = \\frac{4}{3}\\pi R^3$$, so $$\\frac{dV}{dR} = 4\\pi R^2$$. Thus, $$C = 4\\pi R^2 \\times \\frac{dR}{dt}$$.\n- Step 4: Rearranging, $$\\frac{dR}{dt} = \\frac{C}{4\\pi R^2}$$. \n+ As $$R$$ gets larger, the denominator $$R^2$$ gets much larger.\n+ So the fraction $$\\frac{dR}{dt}$$ gets smaller. The radius increases at a *decreasing* rate.\n\nConstant volume growth means slower radius growth as the balloon gets bigger.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "Exercise: A cube's volume is decreasing at a constant rate. As the volume gets smaller, does the side length decrease at a faster or slower rate? (4 steps)", "answer": "- Step 1: Let side length be $$s$$ and volume be $$V$$. We are given $$\\frac{dV}{dt} = -C$$ (constant rate of decrease).\n- Step 2: The volume of a cube is $$V = s^3$$. Differentiating with respect to $$s$$ gives $$\\frac{dV}{ds} = 3s^2$$.\n- Step 3: Using the chain rule, $$\\frac{dV}{dt} = \\frac{dV}{ds} \\times \\frac{ds}{dt}$$. So, $$-C = 3s^2 \\times \\frac{ds}{dt}$$, which means $$\\frac{ds}{dt} = \\frac{-C}{3s^2}$$.\n- Step 4: As the volume gets smaller, the side length $$s$$ also gets smaller. \n+ As $$s$$ gets smaller, the denominator $$3s^2$$ gets smaller.\n+ Making the magnitude of the fraction $$\\frac{C}{3s^2}$$ larger. \n+ Since it's negative, the rate of decrease becomes faster (the side length shrinks progressively faster).\n\nConstant volume loss causes accelerating side-length loss as the cube shrinks.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}], "count": 24}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a curve is given parametrically as $$x = f(t)$$, $$y = g(t)$$, why does $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$? Derive this from the chain rule. (3 steps)", "answer": "- Step 1: Start with the chain rule in its standard form: $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$. This says \"the rate of change of $$y$$ with respect to $$t$$ equals the rate of change of $$y$$ with respect to $$x$$, multiplied by the rate of change of $$x$$ with respect to $$t$$.\" Think of it as a chain of dependencies: $$y$$ depends on $$x$$, and $$x$$ depends on $$t$$, so $$y$$ depends on $$t$$ through $$x$$.\n- Step 2: We want $$\\frac{dy}{dx}$$, not $$\\frac{dy}{dt}$$. Rearrange the chain rule equation by dividing both sides by $$\\frac{dx}{dt}$$ (assuming it's nonzero): $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$.\n- Step 3: The intuitive picture: if $$y$$ changes by some amount per unit change in $$t$$, and $$x$$ also changes by some amount per unit change in $$t$$, then the gradient of the curve (change in $$y$$ per unit change in $$x$$) is the ratio of those two rates. You're effectively \"cancelling\" the $$dt$$'s — though this is a mnemonic, not a rigorous algebraic cancellation.\n\nThe key takeaway: parametric differentiation is just the chain rule rearranged — you never need to convert to Cartesian form to find gradients.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "On a parametric curve $$x = f(t)$$, $$y = g(t)$$, what condition identifies a stationary point (where the gradient is zero)? What additional check must you perform? (2 steps)", "answer": "- Step 1: Since $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, the gradient is zero when the numerator $$\\frac{dy}{dt} = 0$$ — provided the denominator $$\\frac{dx}{dt} \\neq 0$$. This is exactly analogous to explicit differentiation where you set $$\\frac{dy}{dx} = 0$$.\n- Step 2: The crucial additional check: you must verify that $$\\frac{dx}{dt} \\neq 0$$ at that same value of $$t$$. If both $$\\frac{dy}{dt} = 0$$ and $$\\frac{dx}{dt} = 0$$ simultaneously, the expression $$\\frac{dy/dt}{dx/dt}$$ is undefined (0/0 form), and the curve may have a cusp, a point where it reverses direction, or some other non-smooth behaviour — it is NOT necessarily a stationary point.\n\nRemember: stationary point requires $$\\frac{dy}{dt} = 0$$ AND $$\\frac{dx}{dt} \\neq 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A student says \"when $$\\frac{dx}{dt} = 0$$, the gradient $$\\frac{dy}{dx}$$ is zero.\" Is this correct? What actually happens at a point where $$\\frac{dx}{dt} = 0$$ but $$\\frac{dy}{dt} \\neq 0$$? (2 steps)", "answer": "- Step 1: This is a common misconception — completely wrong. When $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} \\neq 0$$, the formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ gives division by zero, meaning the gradient is **undefined** (infinite), not zero.\n+ Example: For $$x = \\cos t$$, $$y = \\sin t$$ (a circle), at $$t = 0$$: $$\\frac{dx}{dt} = -\\sin 0 = 0$$ and $$\\frac{dy}{dt} = \\cos 0 = 1$$. The point is (1, 0) on the circle, where the tangent is **vertical** — gradient infinite, not zero.\n- Step 2: The visual intuition: if $$x$$ isn't changing ($$\\frac{dx}{dt} = 0$$) but $$y$$ is changing ($$\\frac{dy}{dt} \\neq 0$$), the curve is moving vertically at that instant. A vertical line has infinite/undefined gradient. So $$\\frac{dx}{dt} = 0$$ (with $$\\frac{dy}{dt} \\neq 0$$) signals a **vertical tangent**, not a horizontal one.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "To find the equation of a tangent to a parametric curve at parameter value $$t = t_0$$, what three quantities must you compute? Why can't you skip any of them? (3 steps)", "answer": "- Step 1: **The gradient** — compute $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ and substitute $$t = t_0$$. Without this, you don't know the slope of the tangent line.\n- Step 2: **The coordinates of the point** — substitute $$t = t_0$$ into both $$x = f(t)$$ and $$y = g(t)$$ to get the point $$(x_0, y_0)$$ on the curve. Without the actual point, you can't write the equation $$y - y_0 = m(x - x_0)$$.\n- Step 3: **Combine into the line equation** — use $$y - y_0 = m(x - x_0)$$ where $$m$$ is the gradient from Step 1 and $$(x_0, y_0)$$ from Step 2. You need both because a line requires a point and a direction; either alone is insufficient.\n\nThe reason you can't just find the gradient and stop: infinitely many lines have the same slope, but only one passes through the specific point on the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "You compute $$\\frac{dy}{dx} = m$$ at a point on a curve. How do you find the gradient of the normal at that same point, and why does this relationship hold? (2 steps)", "answer": "- Step 1: The gradient of the normal is $$-\\frac{1}{m}$$ (the negative reciprocal of the tangent's gradient). This works provided $$m \\neq 0$$; if $$m = 0$$ (horizontal tangent), the normal is vertical (undefined gradient), and if the tangent is vertical (undefined $$m$$), the normal has gradient 0.\n- Step 2: The geometric reason: the normal is perpendicular to the tangent. Two perpendicular lines have gradients that are negative reciprocals of each other. Proof sketch: if one line has angle $$\\alpha$$ to the horizontal (gradient $$\\tan \\alpha$$), the perpendicular line has angle $$\\alpha + 90°$$, giving gradient $$\\tan(\\alpha + 90°) = -\\frac{1}{\\tan \\alpha}$$.\n\n+ Edge case: If $$m = 0$$, the normal is vertical — its equation is simply $$x = x_0$$, not written in gradient form.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why is it often preferable to find $$\\frac{dy}{dx}$$ in terms of the parameter rather than converting to Cartesian form first? Give two practical reasons. (2 steps)", "answer": "- Step 1: **Some curves cannot be expressed as a single function** $$y = f(x)$$. A circle $$x = \\cos t$$, $$y = \\sin t$$ would require two functions ($$y = \\sqrt{1-x^2}$$ and $$y = -\\sqrt{1-x^2}$$), and curves like $$x = t^2$$, $$y = t^3$$ give $$y = x^{3/2}$$ only for $$t \\geq 0$$, losing the branch where $$t < 0$$ and $$x$$ is still positive but $$y$$ is negative. Parametric form captures the full trajectory, including self-intersections and direction of travel.\n- Step 2: **The algebra of conversion can be messy or impossible.** For $$x = \\frac{2t}{1+t^2}$$, $$y = \\frac{1-t^2}{1+t^2}$$, converting to Cartesian requires solving for $$t$$ in terms of $$x$$ and substituting — a complicated rational expression. Differentiating parametrically is straightforward: just differentiate each equation with respect to $$t$$ and take the ratio.\n\nThe principle: work in the natural coordinate system of the problem. If the curve is given parametrically, stay parametric.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "The parametric curve $$x = 3\\sin\\theta$$, $$y = 5\\cos\\theta$$ is an ellipse. Walk through the conceptual steps to find the gradient at $$\\theta = \\pi/6$$, without computing exact numerical values. (3 steps)", "answer": "- Step 1: Differentiate each parametric equation with respect to $$\\theta$$: $$\\frac{dx}{d\\theta} = 3\\cos\\theta$$ and $$\\frac{dy}{d\\theta} = -5\\sin\\theta$$. The key insight is that $$\\sin$$ differentiates to $$\\cos$$, and $$\\cos$$ differentiates to $$-\\sin$$.\n- Step 2: Form the ratio: $$\\frac{dy}{dx} = \\frac{-5\\sin\\theta}{3\\cos\\theta} = -\\frac{5}{3}\\tan\\theta$$. Notice how the gradient depends on $$\\theta$$ through $$\\tan\\theta$$ — at $$\\theta = 0$$ the gradient is 0 (top of ellipse), and as $$\\theta$$ increases toward $$\\pi/2$$, the gradient becomes increasingly negative (steeper downward slope).\n- Step 3: Substitute $$\\theta = \\pi/6$$: since $$\\tan(\\pi/6) = 1/\\sqrt{3}$$, the gradient is $$-\\frac{5}{3\\sqrt{3}}$$, a moderate negative value. The point itself is $$(3 \\cdot \\frac{1}{2}, 5 \\cdot \\frac{\\sqrt{3}}{2}) = (3/2, 5\\sqrt{3}/2)$$ — in the upper-right portion of the ellipse, where the curve slopes downward to the right.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Given a tangent line to a parametric curve at point $$P$$ with parameter $$t_0$$, how would you determine whether this tangent intersects the curve at any other point? Explain the conceptual strategy. (3 steps)", "answer": "- Step 1: Write the tangent line equation using the point $$(x_0, y_0)$$ and gradient $$m$$ at $$t = t_0$$: $$y - y_0 = m(x - x_0)$$.\n- Step 2: Substitute the parametric expressions for $$x$$ and $$y$$ into the tangent equation: replace $$x$$ with $$f(t)$$ and $$y$$ with $$g(t)$$, giving an equation purely in terms of $$t$$.\n- Step 3: Solve for $$t$$. One solution will always be $$t = t_0$$ (the point of tangency). Any **other** real solutions correspond to additional intersections. If the resulting equation has no other real solutions (e.g., a quadratic with negative discriminant after factoring out the known root), the tangent touches the curve only at $$P$$.\n\n+ This is a powerful technique because it works for any parametric form — you never need the Cartesian equation.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "What is the difference between an explicit equation and an implicit equation? Give an example of each, and explain why implicit differentiation is sometimes the only practical approach. (2 steps)", "answer": "- Step 1: An **explicit** equation has $$y$$ isolated as a function of $$x$$: $$y = f(x)$$, e.g., $$y = x^2 + 3x$$. You differentiate directly. An **implicit** equation mixes $$x$$ and $$y$$ together without isolating either: e.g., $$x^2 + 2xy = 3$$ or $$\\cos(x+y) = 2x$$ or $$e^{2x}\\ln y = x + y - 2$$. In these, $$y$$ is \"implicitly\" defined as a function of $$x$$, but you can't easily solve for it.\n- Step 2: Implicit differentiation is necessary when rearranging to explicit form is impractical or impossible. For $$x^2 + y^3 + 3y = 6$$, solving for $$y$$ would require solving a cubic — messy and unnecessary. For $$e^{x}y = xe^{y}$$, there's no algebraic method to isolate $$y$$. Implicit differentiation lets you find $$\\frac{dy}{dx}$$ directly from the original equation, treating $$y$$ as an unknown function of $$x$$ and applying the chain rule wherever $$y$$ appears.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "When differentiating $$y^3$$ with respect to $$x$$ (where $$y$$ is a function of $$x$$), why is the result $$3y^2 \\frac{dy}{dx}$$ rather than just $$3y^2$$? Walk through the chain rule reasoning. (2 steps)", "answer": "- Step 1: The chain rule states: $$\\frac{d}{dx}[f(u)] = f'(u) \\times \\frac{du}{dx}$$, where $$u$$ is a function of $$x$$. Here, the \"outer function\" is $$u^3$$ and the \"inner function\" is $$u = y(x)$$.\n- Step 2: Applying this: the derivative of the outer function $$u^3$$ with respect to $$u$$ is $$3u^2$$, evaluated at $$u = y$$ giving $$3y^2$$. Then multiply by the derivative of the inner function $$y$$ with respect to $$x$$, which is $$\\frac{dy}{dx}$$. Result: $$3y^2 \\frac{dy}{dx}$$.\n\n+ The crucial insight: $$y$$ is NOT a constant — it depends on $$x$$. If you just wrote $$3y^2$$, you'd be treating $$y$$ as a constant, which is wrong. The extra $$\\frac{dy}{dx}$$ factor accounts for how $$y$$ itself changes as $$x$$ changes.\n\nEvery time you differentiate a function of $$y$$ with respect to $$x$$, you must include the $$\\frac{dy}{dx}$$ factor.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Using the product rule, walk through why $$\\frac{d}{dx}(xy) = x\\frac{dy}{dx} + y$$, identifying what the two \"functions being multiplied\" are. (3 steps)", "answer": "- Step 1: The product rule states $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$, where $$u$$ and $$v$$ are both functions of $$x$$. In the expression $$xy$$, identify: $$u = x$$ (a simple function of $$x$$) and $$v = y$$ (also a function of $$x$$, though implicit).\n- Step 2: Compute each piece. $$\\frac{du}{dx} = \\frac{d}{dx}(x) = 1$$ (the derivative of $$x$$ with respect to $$x$$ is just 1). $$\\frac{dv}{dx} = \\frac{dy}{dx}$$ (since $$v = y$$, and $$y$$ is a function of $$x$$).\n- Step 3: Substitute into the product rule: $$\\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot 1 = x\\frac{dy}{dx} + y$$.\n\n+ Common mistake: writing $$\\frac{d}{dx}(xy) = 1 \\cdot y + x \\cdot 1 = x + y$$ — this treats both $$x$$ and $$y$$ as if they were simple variables with derivatives 1 and 1 respectively, forgetting that $$y$$ depends on $$x$$ and its derivative is $$\\frac{dy}{dx}$$, not 1.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "A student differentiates $$x^2 + y^2 = 25$$ and writes $$2x + 2y = 0$$, then solves for $$\\frac{dy}{dx} = -\\frac{x}{y}$$ by rearranging. Where is the error, and what should the correct differentiation produce? (2 steps)", "answer": "- Step 1: The error is in differentiating $$y^2$$: the student wrote $$\\frac{d}{dx}(y^2) = 2y$$, treating $$y$$ as if it were a simple variable like $$x$$. But $$y$$ is a function of $$x$$, so the chain rule must apply: $$\\frac{d}{dx}(y^2) = 2y \\cdot \\frac{dy}{dx}$$, not just $$2y$$.\n- Step 2: The correct differentiation: $$2x + 2y\\frac{dy}{dx} = 0$$, then rearranging: $$2y\\frac{dy}{dx} = -2x$$, so $$\\frac{dy}{dx} = -\\frac{x}{y}$$. Notice the final answer is the same, but the intermediate step was wrong! The student accidentally got the right final answer by an incorrect method — this won't work for more complex equations.\n\n+ The trap: for simple equations like $$x^2 + y^2 = 25$$, the missing $$\\frac{dy}{dx}$$ factor can \"cancel out\" during rearranging, making the error invisible. For equations like $$x^2 + 3xy^2 - y^3 = 9$$, the error would produce a completely wrong answer.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "When finding $$\\frac{dy}{dx}$$ at a specific point on an implicit curve, what is the strategic advantage of substituting the coordinates $$x = x_0$$, $$y = y_0$$ before rearranging for $$\\frac{dy}{dx}$$? (2 steps)", "answer": "- Step 1: Substituting first converts all the $$x$$'s and $$y$$'s into concrete numbers, leaving an equation that is **linear in** $$\\frac{dy}{dx}$$ — easy to solve. For example, after differentiating $$4xy^2 + \\frac{6x^2}{y} = 10$$, substituting $$(1,1)$$ immediately gives $$8\\frac{dy}{dx} + 4 + 12 - 6\\frac{dy}{dx} = 0$$, which simplifies to $$2\\frac{dy}{dx} + 16 = 0$$.\n- Step 2: If instead you rearranged for $$\\frac{dy}{dx}$$ in general (keeping all $$x$$'s and $$y$$'s), you'd get a complicated rational expression in $$x$$ and $$y$$, and then substituting might involve messy simplification. Substituting first eliminates this complexity. The textbook explicitly recommends: \"Substitute before rearranging, as this simplifies the working.\"\n\n+ When you DON'T have a specific point (e.g., finding a general expression, or finding stationary points where $$\\frac{dy}{dx} = 0$$), you must work with the general form.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "How would you differentiate $$e^{2x} \\ln y$$ with respect to $$x$$? Walk through the product rule, paying special attention to what happens when you differentiate $$\\ln y$$. (3 steps)", "answer": "- Step 1: Identify this as a product: $$u = e^{2x}$$ and $$v = \\ln y$$. Apply the product rule: $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$.\n- Step 2: Compute each derivative. $$\\frac{du}{dx} = \\frac{d}{dx}(e^{2x}) = 2e^{2x}$$ (chain rule on the exponential). $$\\frac{dv}{dx} = \\frac{d}{dx}(\\ln y) = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$ (chain rule: derivative of $$\\ln(\\text{stuff})$$ is $$\\frac{1}{\\text{stuff}} \\times \\frac{d}{dx}(\\text{stuff})$$).\n- Step 3: Combine: $$\\frac{d}{dx}(e^{2x}\\ln y) = e^{2x} \\cdot \\frac{1}{y}\\frac{dy}{dx} + \\ln y \\cdot 2e^{2x} = \\frac{e^{2x}}{y}\\frac{dy}{dx} + 2e^{2x}\\ln y$$.\n\n+ The key pattern: whenever you differentiate a function of $$y$$ (like $$\\ln y$$, $$e^y$$, $$\\sin y$$, $$y^n$$) with respect to $$x$$, you always get the ordinary derivative of that function with respect to $$y$$, multiplied by $$\\frac{dy}{dx}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "You derive $$\\frac{dy}{dx} = -\\frac{3x^2+1}{3(1+y^2)}$$ from an implicit equation. To find stationary points, you set $$\\frac{dy}{dx} = 0$$. What does this tell you about the numerator, and why doesn't the denominator matter for this step? (2 steps)", "answer": "- Step 1: A fraction equals zero when its numerator equals zero (provided the denominator is nonzero). So $$\\frac{dy}{dx} = 0$$ requires $$3x^2 + 1 = 0$$, i.e., $$x^2 = -\\frac{1}{3}$$. This has no real solutions, meaning there are **no stationary points** on this curve.\n- Step 2: The denominator $$3(1+y^2)$$ is always positive (since $$y^2 \\geq 0$$ means $$1+y^2 \\geq 1 > 0$$), so it never equals zero and never causes the fraction to be undefined. For finding stationary points, you only need the numerator to be zero; the denominator just needs to be nonzero at those same points (which you check separately).\n\n+ General principle: for $$\\frac{dy}{dx} = \\frac{N(x,y)}{D(x,y)}$$, stationary points occur where $$N(x,y) = 0$$ and $$D(x,y) \\neq 0$$ simultaneously. Points where $$D(x,y) = 0$$ (with $$N \\neq 0$$) give vertical tangents.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "Why is it normal for $$\\frac{dy}{dx}$$ from implicit differentiation to involve both $$x$$ and $$y$$, unlike explicit differentiation where $$\\frac{dy}{dx}$$ is purely in terms of $$x$$? (2 steps)", "answer": "- Step 1: In explicit form $$y = f(x)$$, you can substitute this expression for $$y$$ everywhere, so any $$y$$'s in the derivative can be replaced by $$f(x)$$, making the result depend only on $$x$$. For example, $$y = x^2$$ gives $$\\frac{dy}{dx} = 2x$$.\n- Step 2: In implicit form, you **don't know** the explicit relationship $$y = f(x)$$ — that's precisely why you're using implicit differentiation. So when the derivative produces terms involving $$y$$ (like $$3y^2 \\frac{dy}{dx}$$ or $$\\frac{1}{y}\\frac{dy}{dx}$$), you cannot replace $$y$$ with anything. After rearranging, $$\\frac{dy}{dx}$$ naturally contains b
