ue}, {"question": "For $$x = 4\\cos 2t$$, $$y = 3\\sin t$$ on $$-\\pi/2 < t < \\pi/2$$, explain how to find $$\\frac{dy}{dx}$$ and identify horizontal tangents. (3 steps)", "answer": "- Step 1: Differentiate: $$\\frac{dx}{dt} = -8\\sin 2t$$, $$\\frac{dy}{dt} = 3\\cos t$$.\n- Step 2: Ratio: $$\\frac{dy}{dx} = \\frac{3\\cos t}{-8\\sin 2t} = \\frac{3\\cos t}{-16\\sin t\\cos t} = \\frac{-3}{16\\sin t}$$ (simplify using $$\\sin 2t = 2\\sin t\\cos t$$).\n- Step 3: Horizontal tangents: $$\\frac{dy}{dx} = 0$$ ⇒ numerator zero ⇒ $$\\cos t = 0$$, but in the open interval this doesn't occur. Check endpoints: at $$t = \\pm\\pi/2$$ (excluded), $$\\cos t = 0$$, but these are boundary points. Hence no horizontal tangents in the interior.\n\nTakeaway: after simplification, checking where numerator vanishes (and in the valid parameter range) identifies all horizontal tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "Why does a cone's volume scale as $$h^3$$ when the angle is fixed, but only as $$r^2 h$$ in general? (3 steps)", "answer": "- Step 1: In general, $$V = \\frac{1}{3}\\pi r^2 h$$ — two independent variables $$r$$ and $$h$$.\n- Step 2: For a fixed angle (like the $$30°$$ funnel), $$r$$ is a fixed multiple of $$h$$: $$r = h\\tan\\theta$$. So $$r$$ and $$h$$ are no longer independent.\n- Step 3: Substituting: $$V = \\frac{1}{3}\\pi(h\\tan\\theta)^2 h = \\frac{\\pi\\tan^2\\theta}{3}\\cdot h^3$$ — pure cubic in $$h$$.\n\nTakeaway: geometric constraints (fixed angle) reduce degrees of freedom; a two-variable formula can collapse to single-variable, simplifying dynamics.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Relate \"rate of change\" and derivatives — why are they the same mathematical object? (3 steps)", "answer": "- Step 1: The derivative $$\\frac{dy}{dx}$$ is defined as $$\\lim_{h \\to 0}\\frac{y(x+h) - y(x)}{h}$$ — a limit of average rates over shrinking intervals.\n- Step 2: A \"rate of change\" in context (e.g., $$\\frac{dA}{dt}$$) is exactly this limit applied to a time variable — it measures how $$A$$ changes per unit time, instantaneously.\n- Step 3: So derivatives and rates of change are the same operation, just contextualized. \"Rate\" emphasizes physical interpretation (speed, growth rate); \"derivative\" emphasizes the mathematical operation.\n\nTakeaway: rate of change = derivative; the word choice depends on whether you're doing physics (rates) or math (derivatives).", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "If $$\\frac{dy}{dt}$$ is inversely proportional to $$y$$, write the DE and argue qualitatively that $$y$$ grows like $$\\sqrt{t}$$. (3 steps)", "answer": "- Step 1: DE: $$\\frac{dy}{dt} = \\frac{k}{y}$$ with $$k > 0$$.\n- Step 2: Separate variables: $$y\\,dy = k\\,dt$$. Integrate: $$\\frac{y^2}{2} = kt + C$$.\n- Step 3: Rearrange: $$y = \\sqrt{2kt + 2C}$$ — square-root growth. The growth is ever-slower than linear but never stops: $$y$$ doubles only when $$t$$ quadruples.\n\nTakeaway: $$\\frac{dy}{dt} \\propto 1/y$$ gives square-root growth; compare to $$\\frac{dy}{dt} \\propto y$$ (exponential) and $$\\frac{dy}{dt} = $$ constant (linear).", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Why does the result $$\\frac{dR}{dt} = -k$$ for the evaporating snowman feel counterintuitive at first, and what makes it work? (3 steps)", "answer": "- Step 1: Intuitively, one might expect smaller snowballs to shrink faster or slower depending on size — a size-dependent rate.\n- Step 2: But \"volume loss ∝ surface area\" has a deep geometric consequence: both $$\\frac{dV}{dt}$$ and $$\\frac{dV}{dR}$$ are proportional to $$R^2$$ (the surface-area factor). The ratio $$\\frac{dR}{dt} = \\frac{dV/dt}{dV/dR}$$ has these $$R^2$$ factors cancel completely.\n- Step 3: Result: $$\\frac{dR}{dt}$$ depends only on $$k$$ (the material's evaporation constant) — independent of $$R$$. Small and large snowmen lose radius at the same rate.\n\nTakeaway: this is a geometric \"accident\" — two $$R^2$$ factors cancel perfectly because of how volume and surface area scale with radius in 3D.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "For an ellipse $$x^2/a^2 + y^2/b^2 = 1$$, why does implicit differentiation give different slopes at different points, unlike a circle where slopes depend only on $$(x, y)$$? (3 steps)", "answer": "- Step 1: For both shapes, implicit differentiation gives $$\\frac{dy}{dx}$$ as a function of both $$x$$ and $$y$$ — positions where slope is defined.\n- Step 2: For a circle, symmetry means the slope magnitude at angle $$\\theta$$ depends only on $$\\theta$$: $$\\frac{dy}{dx} = -\\cot\\theta$$ (parametrically).\n- Step 3: For an ellipse, the axes have different scales ($$a \\neq b$$), so the curve \"stretches\" differently in $$x$$ and $$y$$. Slopes at geometrically similar angles differ in magnitude, giving slope $$= -\\frac{b^2 x}{a^2 y}$$ — the ratio $$b^2/a^2$$ encodes the asymmetry.\n\nTakeaway: implicit differentiation faithfully captures curve geometry; asymmetry in axes directly shows up in the $$dy/dx$$ expression.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "For a curve $$y = \\mathrm{f}(x) = \\frac{\\cos 2x}{e^x}$$, sketch the reasoning for finding its stationary points on $$0 \\leq x \\leq \\pi$$. (3 steps)", "answer": "- Step 1: Differentiate using product/quotient rule: $$f'(x) = \\frac{-2\\sin 2x\\cdot e^x - \\cos 2x\\cdot e^x}{e^{2x}} = \\frac{-2\\sin 2x - \\cos 2x}{e^x}$$.\n- Step 2: Stationary: $$f'(x) = 0$$ ⇒ numerator $$= 0$$ (since $$e^x > 0$$). So $$2\\sin 2x + \\cos 2x = 0$$, giving $$\\tan 2x = -\\frac{1}{2}$$.\n- Step 3: Solve $$\\tan 2x = -1/2$$ in the given range, then substitute each $$x$$-solution back into $$f(x)$$ for $$y$$-values — these are the coordinates of max/min.\n\nTakeaway: with decaying envelopes ($$\\cos 2x/e^x$$), stationary points reduce to solving trig equations; exponential factor cancels since it's always positive.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "Sketch the relationship between concavity and the shape of a curve near a stationary point. (3 steps)", "answer": "- Step 1: At a stationary point where $$f'(x_0) = 0$$, the curve has a horizontal tangent.\n- Step 2: Concavity near $$x_0$$:\n+ $$f''(x_0) > 0$$: slope is increasing from negative to positive → curve dips down then rises → minimum (U-shape).\n+ $$f''(x_0) < 0$$: slope is decreasing from positive to negative → curve rises then falls → maximum (∩-shape).\n- Step 3: If $$f''(x_0) = 0$$, the second-derivative test is inconclusive — could be a flat inflection, and first-derivative behaviour around the point must be checked directly.\n\nTakeaway: concavity sign at a stationary point classifies it as min/max; ambiguity when it's zero requires deeper analysis.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "For $$y = 2^x$$, show its gradient at $$(2, 4)$$ equals $$\\ln 16$$. (3 steps)", "answer": "- Step 1: Using $$\\frac{d}{dx}(a^x) = a^x\\ln a$$: $$\\frac{dy}{dx} = 2^x\\ln 2$$.\n- Step 2: At $$x = 2$$: $$2^x = 4$$, so $$\\frac{dy}{dx} = 4\\ln 2$$.\n- Step 3: Using log-power rule: $$4\\ln 2 = \\ln(2^4) = \\ln 16$$. Hence the gradient is $$\\ln 16$$ as required.\n\nTakeaway: scalar-multiplied logs can be absorbed into the argument via log-power rule — a useful simplification.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": false}, {"question": "For the model $$P = P_0(1.09)^t$$, how do you find when the population doubles and the rate of change at that moment? (3 steps)", "answer": "- Step 1: Doubling: $$P = 2P_0$$ ⇒ $$(1.09)^t = 2$$ ⇒ $$t = \\frac{\\ln 2}{\\ln 1.09}$$. (No arithmetic needed — the ratio of logs captures it.)\n- Step 2: Differentiate: $$\\frac{dP}{dt} = P_0(1.09)^t\\ln(1.09) = P\\ln(1.09)$$.\n- Step 3: At doubling time, $$P = 2P_0$$, so $$\\frac{dP}{dt} = 2P_0\\ln(1.09)$$ — a fixed multiple of $$P_0$$.\n\nTakeaway: doubling time in exponential models depends only on the base; rate at doubling time is always twice the rate at $$t = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": false}, {"question": "Identify the key conceptual differences between \"rate proportional to amount\" and \"rate proportional to surface area\" models. (3 steps)", "answer": "- Step 1: \"Rate ∝ amount\" (e.g., radioactive decay, population) gives $$\\frac{dN}{dt} = \\pm kN$$ → exponential solution.\n- Step 2: \"Rate ∝ surface area\" (e.g., evaporation of a sphere) gives $$\\frac{dV}{dt} = -kA = -k(4\\pi R^2)$$. Since $$V = \\frac{4}{3}\\pi R^3$$, this translates to $$\\frac{dR}{dt} = -k$$ → linear shrinkage of radius.\n- Step 3: The first is \"intrinsic\" (every unit has the same chance), giving multiplicative dynamics. The second is \"boundary-driven\" (only surface atoms interact), giving additive shrinkage. Very different qualitative behaviors.\n\nTakeaway: matching the right proportionality to the physics matters — gets you exponential vs. linear vs. other dynamics.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Summarise when each approach — explicit, implicit, or parametric — is best for differentiation. (3 steps)", "answer": "- Step 1: Explicit ($$y = f(x)$$): use when $$y$$ is easily isolated. Direct differentiation with standard rules.\n- Step 2: Parametric ($$x(t), y(t)$$): use when both variables are naturally functions of a parameter (e.g., motion, circles, curves failing vertical-line test). Gradient via $$\\frac{dy/dt}{dx/dt}$$.\n- Step 3: Implicit ($$F(x,y) = 0$$): use when $$y$$ is mixed with $$x$$ inseparably (e.g., $$x^2 + xy + y^3 = 1$$). Differentiate term-by-term treating $$y$$ as a hidden function; $$\\frac{dy}{dx}$$ expressed in both $$x, y$$.\n\nTakeaway: pick the form that matches the problem structure; all three rely on chain rule, just applied differently.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "For the connected rate setup with volume $$V = \\frac{2}{3}\\pi r^3$$ and surface $$S = 3\\pi r^2$$ (hemisphere), and $$\\frac{dV}{dt} = 6$$, describe the chain-rule setup for $$\\frac{dS}{dt}$$. (3 steps)", "answer": "- Step 1: Since $$S = S(r)$$ and $$r = r(V)$$ (implicitly), and $$V = V(t)$$, we chain: $$\\frac{dS}{dt} = \\frac{dS}{dr}\\cdot\\frac{dr}{dV}\\cdot\\frac{dV}{dt}$$.\n- Step 2: Compute each factor: $$\\frac{dS}{dr} = 6\\pi r$$; $$\\frac{dV}{dr} = 2\\pi r^2$$, so $$\\frac{dr}{dV} = \\frac{1}{2\\pi r^2}$$; $$\\frac{dV}{dt} = 6$$ (given).\n- Step 3: Multiply: $$\\frac{dS}{dt} = 6\\pi r \\cdot \\frac{1}{2\\pi r^2}\\cdot 6 = \\frac{18}{r}$$. Inversely proportional to current radius.\n\nTakeaway: multi-step chain rule handles any number of intermediate variables — just make sure directions match (reciprocate where needed).", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "Why is implicit differentiation especially powerful when dealing with equations that mix algebraic and transcendental functions? (3 steps)", "answer": "- Step 1: Equations like $$e^{2x}\\ln y = x + y - 2$$ have no hope of being solved explicitly for $$y$$ — the mix of polynomial, exponential, and logarithmic parts resists algebraic isolation.\n- Step 2: Implicit differentiation doesn't care about solvability: you just differentiate each term using standard rules (product, chain), treating $$y$$ as a hidden function.\n- Step 3: The resulting slope expression can be evaluated at any point, giving information about the curve's geometry without ever finding an explicit formula for it.\n\nTakeaway: implicit differentiation works on any smooth curve equation, regardless of whether $$y = f(x)$$ can be extracted — a universal tool.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": true}, {"question": "For the curve $$y^3 + 3xy^2 - x^3 = 3$$, what does the condition \"$$\\frac{dy}{dx} = 0$$ requires $$y = \\pm x$$\" geometrically indicate? (3 steps)", "answer": "- Step 1: The condition $$y^2 = x^2$$ says that at turning points, the $$y$$-coordinate equals $$\\pm$$ the $$x$$-coordinate.\n- Step 2: Geometrically, the turning points lie on the two lines $$y = x$$ and $$y = -x$$ (the diagonals).\n- Step 3: Combined with the original implicit equation, this pins down specific coordinates — only finitely many points lie on both the curve and a diagonal line.\n\nTakeaway: zero-gradient conditions often give a simple locus (like a line); intersecting with the original curve picks out the stationary points.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "Explain why taking logs before differentiating is particularly useful for expressions like $$y = f(x)^{g(x)}$$. (3 steps)", "answer": "- Step 1: Expressions like $$x^x$$ or $$(1 + x)^x$$ have both the base and exponent varying with $$x$$ — neither the power rule nor the exponential rule applies directly.\n- Step 2: Taking $$\\ln$$ converts $$y = f(x)^{g(x)}$$ to $$\\ln y = g(x)\\ln f(x)$$, a product of two ordinary functions — standard product and chain rules apply.\n- Step 3: After differentiating, $$\\frac{1}{y}\\frac{dy}{dx}$$ is the left side, so $$\\frac{dy}{dx} = y\\cdot(\\text{logarithmic derivative of right side})$$. Substitute $$y = f(x)^{g(x)}$$ back at the end.\n\nTakeaway: logarithmic differentiation turns \"exponent complications\" into \"product + chain rule problems\" — a standard trick for variable bases with variable exponents.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": false}], "count": 85}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13383, "out_tokens": 16868, "reasoning_chars": 33564, "cost_eur": 0.0672, "elapsed_s": 708, "content_chars": 24199}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM const SK='p4_ch5';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
