\ln a$$. Every exponential is $$e$$ with a rescaled time axis — $$\\ln a$$ is the \"native rate.\"", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Conceptually, why is implicit differentiation often preferred over explicit differentiation for curves like ellipses? (3 steps)", "answer": "- Step 1: For $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, solving for $$y$$ gives $$y = \\pm b\\sqrt{1 - x^2/a^2}$$ — **two branches**.\n- Step 2: Each branch requires separate differentiation; formulas include awkward square roots; the $$\\pm$$ changes which branch you're on.\n- Step 3: Implicit differentiation: $$\\frac{2x}{a^2} + \\frac{2y}{b^2}\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{b^2 x}{a^2 y}$$. One unified formula — plug in any point $$(x, y)$$ on either branch and get the slope. Branch-agnostic and cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "What is a differential equation, and how does it differ from an ordinary equation? (3 steps)", "answer": "- Step 1: A differential equation involves an unknown **function** together with its derivative(s). Example: $$\\frac{dy}{dx} = y$$.\n- Step 2: An ordinary equation involves numbers or expressions: $$2x + 3 = 7$$ asks for a specific $$x$$.\n- Step 3: Solutions to DEs are functions, not numbers. For $$\\frac{dy}{dx} = y$$, any $$y = C e^x$$ works. Physical laws (growth, decay, motion, heating) are typically encoded as DEs because they describe rates. Solving reveals the actual time-evolution.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "Why is $$\\frac{dy}{dx}$$ of a parametric curve \"0/0\" at a point where both $$\\frac{dx}{dt}$$ and $$\\frac{dy}{dt}$$ vanish? What does this indicate?", "answer": "If both vanish simultaneously, the direct formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ is indeterminate. Geometrically, this signals a **singular point** — typically a cusp, self-intersection, or other non-smooth behavior. The particle's velocity is zero in both components, so the tangent direction isn't well-defined by velocity alone. A finer analysis is needed: local Taylor expansion of $$x(t)$$ and $$y(t)$$ around the critical $$t$$, or L'Hôpital's rule applied to the ratio as $$t$$ approaches the point. The standard parametric tools break here.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "For the curve $$C$$ with $$x = e^{2t}$$, $$y = e^t - 1$$, show there are no stationary points. (4 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = 2e^{2t}$$, $$\\frac{dy}{dt} = e^t$$. Both positive for all $$t$$.\n- Step 2: $$\\frac{dy}{dx} = \\frac{e^t}{2e^{2t}} = \\frac{1}{2e^t}$$.\n- Step 3: For a stationary point: $$\\frac{dy}{dx} = 0$$. This requires $$\\frac{1}{2e^t} = 0$$.\n- Step 4: But $$e^t > 0$$ for all $$t$$, so $$\\frac{1}{2e^t} > 0$$ — never zero. Hence no stationary points: the curve is monotonically increasing throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "For a hemisphere's surface area growth driven by volume change, why is $$r$$ the natural \"bridge variable\"? (3 steps)", "answer": "- Step 1: Both volume ($$V = \\frac{2}{3}\\pi r^3$$) and surface area ($$S = 3\\pi r^2$$) are single-variable functions of $$r$$.\n- Step 2: Rather than trying to relate $$V$$ to $$S$$ directly (which would require solving $$V = V(S)$$ — messy), express both in terms of the shared variable.\n- Step 3: Chain rule then links their time-rates through $$r$$: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\cdot \\frac{dr}{dV} \\cdot \\frac{dV}{dt}$$. The common intermediate variable is the geometric trick that makes these problems tractable.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Why does the \"product rule\" for $$\\frac{d}{dx}(xy)$$ equal $$x\\frac{dy}{dx} + y$$ and not one of these other wrong alternatives? Give the derivation. (3 steps)", "answer": "- Step 1: Treat $$xy$$ as $$u(x) \\cdot v(x)$$ where $$u(x) = x$$ and $$v(x) = y(x)$$.\n- Step 2: Standard product rule: $$\\frac{d}{dx}(uv) = u' v + u v'$$. With $$u' = 1$$ and $$v' = \\frac{dy}{dx}$$: $$\\frac{d}{dx}(xy) = 1 \\cdot y + x \\cdot \\frac{dy}{dx} = y + x \\frac{dy}{dx}$$.\n- Step 3: Common wrong answers: \"$$y$$\" (forgets that $$y$$ depends on $$x$$), \"$$\\frac{dy}{dx}$$\" (forgets product structure), or \"$$xy'$$\" (misses the $$y$$ term). The correct formula captures both contributions: change from the $$x$$-factor (gives $$y$$) and change from the $$y$$-factor (gives $$x \\frac{dy}{dx}$$).", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "An electrically-charged body loses charge $$Q$$ at a rate proportional to $$Q$$ itself. Write the differential equation. (3 steps)", "answer": "- Step 1: \"Rate of change of $$Q$$\" = $$\\frac{dQ}{dt}$$. \"Proportional to $$Q$$\" = multiplied by a constant. \"Losing\" = negative rate.\n- Step 2: Differential equation: $$\\frac{dQ}{dt} = -kQ$$ where $$k > 0$$.\n- Step 3: Solution form: $$Q(t) = Q_0 e^{-kt}$$ — exponential decay. Charge never quite reaches zero but decays toward it asymptotically. This is the same functional form as radioactive decay, population death, and Newton's cooling (in excess form).", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "For a parametric curve $$x = \\cos t$$, $$y = \\frac{1}{2}\\sin 2t$$, describe how to find points where $$\\frac{dy}{dx} = 0$$. (4 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = -\\sin t$$, $$\\frac{dy}{dt} = \\cos 2t$$. So $$\\frac{dy}{dx} = \\frac{\\cos 2t}{-\\sin t}$$.\n- Step 2: Set the numerator $$\\cos 2t = 0$$: $$2t = \\pi/2, 3\\pi/2, 5\\pi/2, 7\\pi/2 \\Rightarrow t = \\pi/4, 3\\pi/4, 5\\pi/4, 7\\pi/4$$.\n- Step 3: Check denominator is nonzero at these $$t$$: $$\\sin(\\pi/4) \\neq 0$$ etc. — all valid.\n- Step 4: Substitute back into $$x(t)$$ and $$y(t)$$ to get coordinates. These are horizontal-tangent points, often corresponding to local max/min of $$y$$ along the curve.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "Explain why \"rate inversely proportional to $$x^n$$\" differential equations often describe \"self-limiting\" physical processes. (3 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = k/x^n$$ means as $$x$$ grows, the rate decreases — the process slows itself down.\n- Step 2: Physical examples: ice thickening ($$n = 2$$: thicker ice insulates, slowing freezing); diffusion across a membrane (thicker film, slower transit).\n- Step 3: Mathematical signature: solutions go like $$x \\sim t^{1/(n+1)}$$ — sub-linear growth. Never stops, but grows slower and slower. Contrast with self-accelerating processes $$\\frac{dx}{dt} \\propto x^n$$ where growth speeds up.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "How do you construct a differential equation when you're told \"dy/dx is proportional to the product of $$x$$ and $$y$$, and equals $$\\frac{1}{2}$$ at $$(4, 2)$$\"? (4 steps)", "answer": "- Step 1: \"$$\\frac{dy}{dx}$$ proportional to $$xy$$\" means $$\\frac{dy}{dx} = k \\cdot xy$$ for some constant $$k$$.\n- Step 2: Use the calibration point: $$\\frac{1}{2} = k \\cdot 4 \\cdot 2 = 8k$$.\n- Step 3: Solve: $$k = 1/16$$.\n- Step 4: Complete differential equation: $$\\frac{dy}{dx} = \\frac{xy}{16}$$. This is the pattern for all \"proportionality + one known value\" problems: write the proportional form, substitute the known data, solve for the constant.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "For a parametric curve that is a circle ($$x = \\cos t$$, $$y = \\sin t$$), describe what happens at $$t = 0$$, $$\\pi/2$$, $$\\pi$$, $$3\\pi/2$$ in terms of tangent directions. (4 steps)", "answer": "- Step 1: At $$t = 0$$: point $$(1, 0)$$. $$\\frac{dx}{dt} = 0$$, $$\\frac{dy}{dt} = 1$$. Vertical tangent (rightmost point).\n- Step 2: At $$t = \\pi/2$$: point $$(0, 1)$$. $$\\frac{dx}{dt} = -1$$, $$\\frac{dy}{dt} = 0$$. Horizontal tangent (topmost point).\n- Step 3: At $$t = \\pi$$: point $$(-1, 0)$$. Vertical tangent (leftmost).\n- Step 4: At $$t = 3\\pi/2$$: point $$(0, -1)$$. Horizontal tangent (bottommost). These four points (where one parametric velocity vanishes) are exactly the cardinal extremes — characteristic of elliptical/circular parametric geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Logically, why does \"taking logs before differentiating\" help for expressions like $$y = x^x$$ but not for $$y = x^2$$?", "answer": "For $$y = x^2$$: the exponent is a constant, so the power rule $$\\frac{d}{dx}(x^n) = n x^{n-1}$$ applies directly. For $$y = x^x$$: the exponent itself varies with $$x$$, so neither the power rule (constant exponent needed) nor the exponential rule (constant base needed) applies. Taking $$\\ln$$ converts $$x^x$$ into $$x \\ln x$$ — a simple product of elementary functions that both rules handle. Logarithmic differentiation is the specific tool for \"both the base and exponent depend on the variable.\" It's also useful for complicated products/quotients since $$\\ln$$ turns them into sums/differences.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "On the curve $$x^2 + 4y^2 - 6x - 16y + 21 = 0$$ (an ellipse), find the points of zero gradient by description, without full calculation. (4 steps)", "answer": "- Step 1: Implicit differentiation gives $$2x + 8y\\frac{dy}{dx} - 6 - 16\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = \\frac{6 - 2x}{8y - 16}$$.\n- Step 2: Zero gradient: numerator $$= 0 \\Rightarrow x = 3$$.\n- Step 3: Substitute $$x = 3$$ into the curve: $$9 + 4y^2 - 18 - 16y + 21 = 0 \\Rightarrow 4y^2 - 16y + 12 = 0 \\Rightarrow y^2 - 4y + 3 = 0$$.\n- Step 4: Factor: $$(y - 1)(y - 3) = 0$$, giving $$y = 1$$ or $$y = 3$$. Points: $$(3, 1)$$ and $$(3, 3)$$ — the top and bottom of the ellipse.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Conceptually, why is it often possible to find $$\\frac{dy}{dx}$$ at a specific point for an implicit curve more quickly than for its explicit counterpart?", "answer": "For some curves the explicit form $$y = f(x)$$ involves nested square roots, cubic-root solutions, or is multi-valued. Differentiating that is painful. The implicit form is often a simple polynomial in $$x, y$$ — differentiating polynomials is mechanical. After substituting the numerical point, you solve a linear equation for $$\\frac{dy}{dx}$$. The whole process bypasses the \"solve for $$y$$\" step entirely, saving major algebraic effort. Implicit is the lazy-but-powerful route for localized questions.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Describe the conceptual purpose of the parametric second derivative formula $$\\frac{d^2y}{dx^2} = \\frac{d(dy/dx)/dt}{dx/dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{d^2y}{dx^2}$$ is \"how the slope changes as $$x$$ changes,\" not \"as $$t$$ changes.\"\n- Step 2: But our information about slope is given in terms of $$t$$ (via $$\\frac{dy}{dx} = g(t)$$). So we need to convert \"change in slope per unit $$t$$\" to \"change in slope per unit $$x$$\" using $$\\frac{d}{dx} = \\frac{d/dt}{dx/dt}$$.\n- Step 3: Two chain-rule applications happen: one to get $$\\frac{dy}{dx}$$, another to get its derivative with respect to $$x$$. Missing this is a classic error — the naive \"$$\\frac{d^2y/dt^2}{d^2x/dt^2}$$\" is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "On an implicit curve where $$\\frac{dy}{dx} = \\frac{N(x, y)}{D(x, y)}$$, what does \"$$N = 0$$ and $$D = 0$$ simultaneously\" mean? (3 steps)", "answer": "- Step 1: Both numerator and denominator vanish at the same point: $$\\frac{dy}{dx}$$ becomes $$0/0$$ — indeterminate.\n- Step 2: This signals a **singular point** on the curve: possibly a cusp, self-intersection (node), or isolated point. The naive gradient formula breaks down.\n- Step 3: Resolution requires more care: examine tangent directions via Taylor expansion or L'Hôpital-like limits. These singular points often carry geometric significance (e.g., where a curve crosses itself).", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "Think about why $$\\frac{d}{dx}(\\ln y) = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$ rather than just $$\\frac{1}{y}$$. (3 steps)", "answer": "- Step 1: $$\\ln y$$ is a composition: outer function $$\\ln(\\cdot)$$, inner function $$y(x)$$.\n- Step 2: Chain rule: $$\\frac{d}{dx}[\\ln y] = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$. The $$\\frac{1}{y}$$ comes from differentiating $$\\ln$$; the $$\\frac{dy}{dx}$$ comes from differentiating the inner $$y(x)$$.\n- Step 3: If we were differentiating with respect to $$y$$ itself, then $$\\frac{d}{dy}(\\ln y) = \\frac{1}{y}$$ — no chain factor. The $$\\frac{dy}{dx}$$ factor is always there whenever the variable of differentiation differs from the function's explicit variable.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Why is Newton's law of cooling \"universal\" in the sense that the temperature approaches equilibrium exponentially regardless of initial conditions? (4 steps)", "answer": "- Step 1: Equation: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$.\n- Step 2: Substitute $$\\phi = \\theta - \\theta_0$$ (excess temperature): $$\\frac{d\\phi}{dt} = -k\\phi$$.\n- Step 3: This is a first-order linear DE with solution $$\\phi(t) = \\phi_0 e^{-kt}$$, i.e., the excess decays exponentially.\n- Step 4: Whether you start hotter or colder than surroundings, the excess (positive or negative) decays with the same rate $$k$$. So $$\\theta(t) \\to \\theta_0$$ as $$t \\to \\infty$$, irrespective of initial $$\\theta_0$$. The mathematical structure of the DE guarantees this universal approach.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": true}, {"question": "For a parametric curve passing through a point twice (self-intersection), what would the gradient formula tell us at that point? (3 steps)", "answer": "- Step 1: A self-intersection means two different $$t$$-values $$t_1 \\neq t_2$$ give the same $$(x, y)$$.\n- Step 2: At each of the two parameter values, the curve may have a different tangent direction. So the gradient formula gives **two different slopes** at the same geometric point.\n- Step 3: This shows parametric form preserves more information than Cartesian: the curve can legitimately \"cross itself\" in the $$(x, y)$$ plane because the parameter $$t$$ distinguishes the two visits. Good parametric reasoning always tracks which $$t$$-value you're using at each geometric point.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Describe a simple exercise: a curve is given parametrically by $$x = t^2$$, $$y = t^3 - t$$. Find the values of $$t$$ where the tangent is horizontal. (4 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = 2t$$, $$\\frac{dy}{dt} = 3t^2 - 1$$.\n- Step 2: Horizontal tangent: $$\\frac{dy}{dx} = 0$$, i.e., $$\\frac{dy}{dt} = 0$$ (with $$\\frac{dx}{dt} \\neq 0$$).\n- Step 3: Solve $$3t^2 - 1 = 0$$: $$t = \\pm 1/\\sqrt{3}$$.\n- Step 4: Check $$\\frac{dx}{dt} = 2t \\neq 0$$ at these values — yes, $$t \\neq 0$$. So horizontal tangents at $$t = \\pm 1/\\sqrt{3}$$. At $$t = 0$$, both derivatives vanish — a cusp at the origin.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": false}, {"question": "Describe the conceptual pipeline for solving a \"related rates\" problem involving volume and surface area of an evaporating solid. (5 steps)", "answer": "- Step 1: Identify the physical rate given (e.g., $$\\frac{dV}{dt}$$) and the rate sought (e.g., $$\\frac{dS}{dt}$$ or $$\\frac{dR}{dt}$$).\n- Step 2: Identify the bridge variable (usually the defining geometric dimension: radius $$R$$, side length $$s$$, etc.).\n- Step 3: Express both the given and sought quantities as functions of the bridge: $$V(R)$$, $$S(R)$$. Compute $$\\frac{dV}{dR}$$ and $$\\frac{dS}{dR}$$.\n- Step 4: Apply the chain rule, possibly with the reciprocal trick $$\\frac{dR}{dV} = \\frac{1}{dV/dR}$$ if needed, to connect all rates through the bridge.\n- Step 5: Substitute numerical values at the end (or at specific instants asked about). The result is an equation relating the rates or a formula for the sought rate.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "For the curve $$e^{2x} + e^{2y} = xy$$, why would it be infeasible to differentiate explicitly, forcing implicit differentiation? (3 steps)", "answer": "- Step 1: Attempting to solve for $$y$$: $$e^{2y} = xy - e^{2x}$$, so $$2y = \\ln(xy - e^{2x})$$, giving $$y = \\frac{1}{2}\\ln(xy - e^{2x})$$. But $$y$$ still appears on the right!\n- Step 2: This equation cannot be solved in closed form for $$y$$ as a function of $$x$$ — it's a transcendental equation.\n- Step 3: Implicit differentiation sidesteps this entirely: differentiate both sides of the original with respect to $$x$$, treating each $$e^{2y}$$ and $$y$$-term with the chain rule, and solve algebraically for $$\\frac{dy}{dx}$$. Implicit is not just convenient — sometimes it's the only option.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "Conceptually, what does the equation $$\\frac{dP}{dt} = (\\ln 1.09) P$$ tell us about the continuous growth rate versus the annual growth rate of $$9\\%$$? (3 steps)", "answer": "- Step 1: \"9% per year\" is the annual compounding factor: $$P(t+1) = 1.09 \\cdot P(t)$$.\n- Step 2: The continuous (instantaneous) growth rate is $$\\ln(1.09) \\approx 0.0862 = 8.62\\%$$, slightly less than 9%.\n- Step 3: Why less? Continuous compounding accumulates growth on growth throughout the year, so a smaller continuous rate gives the same annual outcome. The difference reflects the compounding effect: $$\\ln(1 + r) < r$$ for small positive $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "Give a simple exercise: in an implicit relation $$x^2 + y^2 = 25$$, find $$\\frac{dy}{dx}$$ at the point $$(3, 4)$$. (4 steps)", "answer": "- Step 1: Differentiate implicitly: $$2x + 2y \\frac{dy}{dx} = 0$$.\n- Step 2: Solve symbolically: $$\\frac{dy}{dx} = -\\frac{x}{y}$$.\n- Step 3: Substitute $$(3, 4)$$: $$\\frac{dy}{dx} = -\\frac{3}{4}$$.\n- Step 4: Geometric check: the tangent to a circle at $$(3, 4)$$ is perpendicular to the radius from origin to $$(3, 4)$$. The radius has slope $$4/3$$, so the perpendicular has slope $$-3/4$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": false}, {"question": "For the curve $$y^3 + 3xy^2 - x^3 = 3$$, why are turning points located where $$y = \\pm x$$? (3 steps)", "answer": "- Step 1: Implicit derivative gives $$\\frac{dy}{dx} = \\frac{x^2 - y^2}{y^2 + 2xy}$$.\n- Step 2: Turning points (where $$\\frac{dy}{dx} = 0$$) require numerator zero: $$x^2 - y^2 = 0$$, i.e., $$x^2 = y^2$$, so $$y = \\pm x$$.\n- Step 3: Each line $$y = x$$ and $$y = -x$$ can intersect the curve at specific points — substitute into the curve equation to find them. The symmetry of the equation in $$x, y$$ (or the lack thereof) determines which branches give valid turning points.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "Why does the \"constant radius shrink rate\" result for evaporating spheres NOT hold for cubes or other shapes? (3 steps)", "answer": "- Step 1: The identity that made it work is $$\\frac{dV}{dR} = A$$ (up to constants) — the \"skin identity\" that volume change equals surface area times thickness.\n- Step 2: For a cube with side $$s$$: $$V = s^3$$, so $$\\frac{dV}{ds} = 3s^2 = A/2$$ (since $$A = 6s^2$$). So $$\\frac{dV}{dt} \\propto A$$ gives $$\\frac{ds}{dt}$$ proportional to something specific, **not** constant.\n- Step 3: More carefully: for cube, $$\\frac{dV}{dt} = -kA$$ combined with $$\\frac{dV}{dt} = 3s^2 \\frac{ds}{dt}$$ gives $$3s^2 \\frac{ds}{dt} = -6ks^2$$, so $$\\frac{ds}{dt} = -2k$$ — actually it IS constant for cubes too! This is because cubes maintain proportional scaling under uniform evaporation. The constant-rate property holds for any shape with fixed angular geometry evaporating uniformly by surface area.", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": true}, {"question": "If a population follows $$P = P_0 e^{kt}$$ and doubles at time $$T$$, relate $$T$$ to $$k$$. (3 steps)", "answer": "- Step 1: \"Doubled\" means $$P(T) = 2P_0$$: $$P_0 e^{kT} = 2P_0$$, so $$e^{kT} = 2$$.\n- Step 2: Take $$\\ln$$: $$kT = \\ln 2$$, so $$T = \\frac{\\ln 2}{k}$$.\n- Step 3: Universal \"doubling time\" for exponential growth: $$T = (\\ln 2)/k \\approx 0.693/k$$. The \"rule of 70\" in finance ($$T \\approx 70/(\\text{percent rate})$$) is this formula with $$\\ln 2 \\approx 0.693 \\approx 70/100$$.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": false}, {"question": "For the curve $$y e^{-3x} - 3x = y^2$$ at the origin $$O$$, show that the tangent is $$y = 3x$$. (4 steps)", "answer": "- Step 1: Check $$(0, 0)$$ is on the curve: $$0 \\cdot e^0 - 0 = 0^2 \\Rightarrow 0 = 0$$ ✓.\n- Step 2: Differentiate implicitly: $$\\frac{dy}{dx} e^{-3x} + y \\cdot (-3 e^{-3x}) - 3 = 2y \\frac{dy}{dx}$$.\n- Step 3: Substitute $$(0, 0)$$: $$\\frac{dy}{dx} \\cdot 1 + 0 - 3 = 0$$, so $$\\frac{dy}{dx} = 3$$.\n- Step 4: Tangent through origin with slope 3: $$y = 3x$$. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": false}, {"question": "Explain why the fluid-tank differential equation $$\\frac{dh}{dt} = -K\\sqrt{h}$$ implies the tank takes finite time to fully drain. (3 steps)", "answer": "- Step 1: Separate variables: $$h^{-1/2} dh = -K \\, dt$$, giving $$2\\sqrt{h} = -Kt + C$$.\n- Step 2: At $$t = 0$$, $$h = h_0$$, so $$C = 2\\sqrt{h_0}$$. Drainage complete when $$h = 0$$: $$0 = -Kt + 2\\sqrt{h_0}$$, i.e., $$t = \\frac{2\\sqrt{h_0}}{K}$$ — finite!\n- Step 3: Compare to exponential decay ($$\\frac{dh}{dt} = -Kh$$), which takes infinite time to reach zero. The square root gives a gentler decay near $$h = 0$$ — but the integral $$\\int h^{-1/2} dh$$ converges (unlike $$\\int h^{-1} dh$$), so drainage completes in finite time.", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": true}], "count": 90}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does it mean for a curve to be given in parametric form, and how does this differ from the explicit form $$y = f(x)$$? (3 steps)", "answer": "- Step 1: In explicit form, $$y$$ is given directly as a function of $$x$$, like $$y = x^2 + 3$$ — every $$x$$-input produces one $$y$$-output via a single rule, and the curve must pass the vertical line test.\n- Step 2: In parametric form, both $$x$$ and $$y$$ are separately defined as functions of a third variable (the parameter, often $$t$$), e.g. $$x = t^3 + t, y = t^2 + 1$$. The parameter $$t$$ acts like a \"dial\" or \"time\" that sweeps out the curve.\n- Step 3: The key benefit is that parametric form can represent curves that fail the vertical line test (like circles or loops), encodes direction of travel, and often expresses physical motion more naturally (e.g. projectile position as $$x(t), y(t)$$).\n\nTakeaway: parametric form decouples $$x$$ and $$y$$ by routing both through a parameter, letting you describe richer curves than $$y = f(x)$$ allows.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Starting from the chain rule, derive the formula for $$\\frac{dy}{dx}$$ when $$x$$ and $$y$$ are given as functions of a parameter $$t$$. (3 steps)", "answer": "- Step 1: By chain rule, treating $$y$$ as a function of $$x$$ which depends on $$t$$: $$\\frac{dy}{dt} = \\frac{dy}{dx} \\cdot \\frac{dx}{dt}$$.\n- Step 2: Rearrange for $$\\frac{dy}{dx}$$ by dividing both sides by $$\\frac{dx}{dt}$$ (assumed nonzero): $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$.\n- Step 3: This makes intuitive sense: $$dy/dt$$ is \"how fast $$y$$ moves as $$t$$ changes\", $$dx/dt$$ is \"how fast $$x$$ moves as $$t$$ changes\". Their ratio is the slope of the path in the $$xy$$-plane — no need to eliminate the parameter.\n\nTakeaway: the chain rule lets us compute slope directly as a ratio of parameter derivatives, bypassing any need for Cartesian form.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Give a physical intuition for why $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ when a particle moves along a curve parametrised by time $$t$$. (3 steps)", "answer": "- Step 1: Think of $$t$$ as time, $$dy/dt$$ as the vertical velocity component, and $$dx/dt$$ as the horizontal velocity component.\n- Step 2: The slope of the path at any instant is \"rise over run\", or equivalently \"vertical rise per unit time ÷ horizontal run per unit time\" — which is exactly the ratio of the velocity components.\n- Step 3: Caveat: when $$dx/dt = 0$$ (no horizontal motion), the path has a vertical tangent, and the formula \"breaks down\" (division by zero). Those are exactly the vertical-tangent points.\n\nTakeaway: slope = vertical speed / horizontal speed; zero numerator → horizontal tangent; zero denominator → vertical tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "On a parametric curve, how do you find points with (a) horizontal tangents and (b) vertical tangents, and what if both derivatives vanish simultaneously? (3 steps)", "answer": "- Step 1: Horizontal tangent: $$\\frac{dy}{dx} = 0$$, so need the numerator $$\\frac{dy}{dt} = 0$$ while $$\\frac{dx}{dt} \\neq 0$$.\n- Step 2: Vertical tangent: $$\\frac{dy}{dx}$$ is undefined (infinite slope), so need $$\\frac{dx}{dt} = 0$$ while $$\\frac{dy}{dt} \\neq 0$$.\n- Step 3: If both vanish at the same $$t$$, that's a singular point (possibly a cusp, corner, or self-intersection) and requires more careful analysis using limits or higher derivatives.\n\nTakeaway: tangent direction is decided by which of $$dy/dt, dx/dt$$ is zero; both zero = singularity requiring care.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "When finding $$\\frac{dy}{dx}$$ parametrically at a specific $$t$$-value, why is it often better to keep the general expression in $$t$$ and substitute last? (3 steps)", "answer": "- Step 1: Mathematically, substituting early or late gives the same numerical result — the ratio of numbers equals the number of the ratio.\n- Step 2: Keeping the expression symbolic in $$t$$ is useful when you need the gradient as a function (e.g., finding all points of zero gradient, or showing no stationary points exist).\n- Step 3: A symbolic $$\\frac{dy}{dx}(t)$$ also lets you set it equal to any target slope (e.g., a slope parallel to some line), solve for $$t$$, and then backtrack to coordinates — one formula solves many problems.\n\nTakeaway: symbolic first, numerical last — you get flexibility for free.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Describe the procedure for finding points of zero gradient on a parametric curve. (3 steps)", "answer": "- Step 1: Find $$\\frac{dy}{dx}(t)$$ using $$\\frac{dy/dt}{dx/dt}$$, as a function of the parameter.\n- Step 2: For zero gradient, set the numerator $$\\frac{dy}{dt} = 0$$ and solve for $$t$$. Verify the denominator $$\\frac{dx}{dt}$$ is not simultaneously zero (otherwise it's an indeterminate form).\n- Step 3: Substitute each valid $$t$$ back into the original $$x(t)$$ and $$y(t)$$ to get the $$(x, y)$$ coordinates of the stationary points.\n\nTakeaway: zero gradient ↔ numerator vanishes with nonzero denominator; then use $$x(t), y(t)$$ to locate.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "For $$x = e^{2t}$$, $$y = e^t - 1$$, how would you argue that the curve has no stationary points? (3 steps)", "answer": "- Step 1: Compute $$\\frac{dy/dt}{dx/dt}$$. Since $$\\frac{dy}{dt} = e^t$$ and $$\\frac{dx}{dt} = 2e^{2t}$$, the ratio simplifies to $$\\frac{1}{2e^t}$$.\n- Step 2: A stationary point requires $$\\frac{dy}{dx} = 0$$. But $$\\frac{1}{2e^t}$$ is strictly positive for any real $$t$$ — $$e^t > 0$$ always, so the fraction can never reach zero.\n- Step 3: Therefore no value of $$t$$ makes the gradient zero, so the curve has no horizontal tangents anywhere — it is strictly monotonic.\n\nTakeaway: to show no stationary points, demonstrate that the gradient expression is never zero in the parameter's domain.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Outline the steps to find the equation of the normal at a given parametric point. (4 steps)", "answer": "- Step 1: Differentiate $$x(t)$$ and $$y(t)$$ with respect to $$t$$, and form the tangent slope $$m = \\frac{dy/dt}{dx/dt}$$ at the given parameter value.\n- Step 2: The normal is perpendicular to the tangent, so its slope is $$-\\frac{1}{m}$$ (negative reciprocal).\n- Step 3: Find the point's coordinates by substituting the parameter value into the original $$x(t), y(t)$$ equations.\n- Step 4: Use the point-slope form $$y - y_1 = -\\frac{1}{m}(x - x_1)$$ to write the normal's equation.\n\nTakeaway: tangent slope → flip and negate → that's the normal slope → use point-slope form.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "A parametric curve has $$\\frac{dy}{dx}$$ expressed in terms of $$t$$. How would you find tangents to the curve that are parallel to a given line $$y = mx + c$$? (3 steps)", "answer": "- Step 1: A line parallel to $$y = mx + c$$ has the same slope $$m$$. So set the parametric gradient expression equal to $$m$$.\n- Step 2: Solve the resulting equation for $$t$$. There may be multiple solutions — each corresponds to a distinct point on the curve with the required slope.\n- Step 3: For each valid $$t$$, use $$x(t), y(t)$$ to get the point of tangency, then write the tangent in point-slope form using slope $$m$$.\n\nTakeaway: \"parallel to line\" = \"same slope\" = \"parametric slope equation\"; multiple roots = multiple tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "How would you demonstrate that a tangent line to a parametric curve at point $$P$$ does not intersect the curve at any other point? (4 steps)", "answer": "- Step 1: Substitute the parametric $$x(t), y(t)$$ into the tangent's equation. This produces a single equation in $$t$$.\n- Step 2: Since $$P$$ is on the tangent, $$t_P$$ (the parameter value at $$P$$) must be a root of this equation.\n- Step 3: Factor out $$(t - t_P)$$ from the polynomial and examine the remaining factor.\n+ If the remaining factor has no real roots (e.g., negative discriminant for a quadratic), the tangent touches only at $$P$$.\n+ If the remaining factor is also $$(t - t_P)$$, then $$t_P$$ is a double root — confirming tangency without cutting.\n- Step 4: Report: \"the tangent does not intersect the curve again.\"\n\nTakeaway: a geometric non-intersection claim becomes the algebraic claim that a polynomial has only $$t_P$$ as a real root.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What's the difference between an explicit equation and an implicit equation, and why do we need special techniques for the latter? (3 steps)", "answer": "- Step 1: Explicit: $$y$$ is isolated as a function of $$x$$, e.g., $$y = 3x^2 - 1$$. Standard differentiation rules apply directly.\n- Step 2: Implicit: the relationship ties $$x$$ and $$y$$ without isolating $$y$$, e.g., $$x^2 + 2xy + y^3 = 5$$ or $$\\sin(x+y) = 2x$$. Isolating $$y$$ is sometimes messy or impossible in closed form.\n- Step 3: Implicit differentiation treats $$y$$ as an unknown function of $$x$$ and uses the chain rule on every $$y$$-term. This lets you find $$\\frac{dy}{dx}$$ without ever solving for $$y$$.\n\nTakeaway: implicit differentiation = solving for the slope without first solving for $$y$$; the chain rule is the engine that makes this possible.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Using the chain rule, explain why $$\\frac{d}{dx}(f(y)) = f'(y)\\frac{dy}{dx}$$ when $$y$$ depends on $$x$$. (3 steps)", "answer": "- Step 1: The expression $$f(y)$$ depends on $$x$$ indirectly through $$y$$: the composition is $$x \\mapsto y(x) \\mapsto f(y(x))$$.\n- Step 2: Chain rule says: \"derivative of outer evaluated at inner, times derivative of inner.\" Outer is $$f$$ with derivative $$f'$$; inner is $$y$$ with derivative $$\\frac{dy}{dx}$$.\n- Step 3: So $$\\frac{d}{dx}[f(y(x))] = f'(y(x)) \\cdot \\frac{dy}{dx}$$. The $$\\frac{dy}{dx}$$ factor is the hallmark of implicit differentiation — it's the \"price\" paid for having $$y$$ as an intermediate.\n\nTakeaway: every time you differentiate a $$y$$-expression with respect to $$x$$, a $$\\frac{dy}{dx}$$ appears — chain rule bookkeeping.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Explain why $$\\frac{d}{dx}(y^n) = ny^{n-1}\\frac{dy}{dx}$$ and what would go wrong if you forgot the $$\\frac{dy}{dx}$$ factor. (3 steps)", "answer": "- Step 1: Apply the chain rule with $$f(y) = y^n$$, giving $$f'(y) = ny^{n-1}$$. Therefore $$\\frac{d}{dx}(y^n) = ny^{n-1}\\cdot\\frac{dy}{dx}$$.\n- Step 2: Intuition: if $$y$$ were a fixed number, $$y^n$$ would be a constant with zero derivative. But $$y$$ changes with $$x$$; a small change in $$x$$ produces a small change $$\\frac{dy}{dx}$$ in $$y$$, which the power rule then amplifies by $$ny^{n-1}$$.\n- Step 3: Forgetting $$\\frac{dy}{dx}$$ treats $$y$$ as if it were the independent variable — which is only true when we compute $$\\frac{d}{dy}(y^n) = ny^{n-1}$$, a different operation. The missing factor gives an algebraically wrong gradient.\n\nTakeaway: the power rule needs its chain-rule tail whenever the base depends on the differentiation variable.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Using the product rule, derive the identity $$\\frac{d}{dx}(xy) = x\\frac{dy}{dx} + y$$. (3 steps)", "answer": "- Step 1: Product rule: $$\\frac{d}{dx}(uv) = u'v + uv'$$ for two functions of $$x$$.\n- Step 2: Let $$u = x$$, so $$u' = 1$$. Let $$v = y$$ (a function of $$x$$), so $$v' = \\frac{dy}{dx}$$.\n- Step 3: Substituting: $$\\frac{d}{dx}(xy) = (1)(y) + (x)\\frac{dy}{dx} = y + x\\frac{dy}{dx}$$.\n\nTakeaway: $$xy$$ is a product of two $$x$$-dependent factors — can't treat it like $$\\frac{d}{dx}(x^2)$$; the $$y$$ factor needs differentiating as a function of $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Differentiate $$x^2 y$$ with respect to $$x$$, assuming $$y = y(x)$$, and identify the two distinct sources of the terms. (3 steps)", "answer": "- Step 1: Apply the product rule with $$u = x^2$$ and $$v = y$$: $$\\frac{d}{dx}(x^2 y) = \\frac{d(x^2)}{dx}\\cdot y + x^2\\cdot\\frac{dy}{dx}$$.\n- Step 2: Compute $$\\frac{d(x^2)}{dx} = 2x$$, giving $$\\frac{d}{dx}(x^2 y) = 2xy + x^2\\frac{dy}{dx}$$.\n- Step 3: Two distinct origins:\n+ First term ($$2xy$$) comes from \"differentiate the $$x$$-part, keep the $$y$$-part\".\n+ Second term ($$x^2\\frac{dy}{dx}$$) comes from \"keep the $$x$$-part, differentiate the $$y$$-part\" — the $$y$$-derivative generates the $$\\frac{dy}{dx}$$ factor via chain rule.\n\nTakeaway: any product involving $$y$$ splits into two terms via product rule; the $$y$$-term carries a $$\\frac{dy}{dx}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Describe the general procedure for finding $$\\frac{dy}{dx}$$ from an implicit equation. (3 steps)", "answer": "- Step 1: Differentiate both sides of the equation with respect to $$x$$, treating $$y$$ as an unknown function of $$x$$. Each $$y$$-term picks up a $$\\frac{dy}{dx}$$ via chain rule; products like $$xy$$ also need product rule.\n- Step 2: Collect all terms containing $$\\frac{dy}{dx}$$ on one side, and all other terms on the other side.\n- Step 3: Factor out $$\\frac{dy}{dx}$$ and divide to isolate it. The answer typically depends on both $$x$$ and $$y$$.\n\nTakeaway: differentiate → collect → factor → divide. The result naturally involves both variables because the curve itself does.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When asked to find $$\\frac{dy}{dx}$$ at a specific point $$(a, b)$$ on an implicit curve, why is it often efficient to substitute the coordinates before fully isolating $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: After differentiating, you typically have a messy equation with multiple $$\\frac{dy}{dx}$$ terms scattered throughout.\n- Step 2: Substituting the numerical coordinates first collapses all polynomial-in-$$x,y$$ expressions into numbers, leaving a simple linear equation in $$\\frac{dy}{dx}$$.\n- Step 3: Algebraically it gives the same answer as isolating $$\\frac{dy}{dx}$$ first, but the arithmetic is cleaner and less error-prone. The trade-off: you lose the general formula, so substitute-early only when one-point is enough.\n\nTakeaway: substitute early for one-shot problems; keep symbolic if you need a formula valid everywhere.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "For an implicit equation containing $$e^{2x}\\ln y$$, outline the implicit differentiation of this term with respect to $$x$$. (3 steps)", "answer": "- Step 1: $$e^{2x}\\ln y$$ is a product of two $$x$$-dependent factors, so apply the product rule.\n- Step 2: Differentiate each factor:\n+ $$\\frac{d}{dx}(e^{2x}) = 2e^{2x}$$ (chain rule on the exponent).\n+ $$\\frac{d}{dx}(\\ln y) = \\frac{1}{y}\\cdot\\frac{dy}{dx}$$ (chain rule on the log).\n- Step 3: Combining: $$\\frac{d}{dx}(e^{2x}\\ln y) = 2e^{2x}\\ln y + e^{2x}\\cdot\\frac{1}{y}\\frac{dy}{dx}$$.\n\nTakeaway: transcendentals (exp, log, trig) follow the same rules — outer derivative times inner chain; products need product rule; $$y$$-factors contribute $$\\frac{dy}{dx}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "On an implicit curve, what condition gives stationary points, and why isn't it just \"$$\\frac{dy}{dx} = 0$$\"? (3 steps)", "answer": "- Step 1: After implicit differentiation, $$\\frac{dy}{dx} = \\frac{\\text{numerator}}{\\text{denominator}}$$. For the fraction to equal zero, the numerator must vanish.\n- Step 2: Additionally require the denominator to be nonzero — otherwise $$\\frac{dy}{dx}$$ is $$\\frac{0}{0}$$, a singular form requiring deeper analysis (not a genuine stationary point).\n- Step 3: Procedure: set numerator $$= 0$$ (necessary condition), then intersect with the original curve equation to find specific $$(x, y)$$ coordinates, and verify the denominator is nonzero there.\n\nTakeaway: numerator zero + denominator nonzero = horizontal tangent; both zero = singular point needing extra work.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "On an implicit curve, what condition gives vertical tangents, and what's the method to find them? (3 steps)", "answer": "- Step 1: A vertical tangent corresponds to $$\\frac{dy}{dx}$$ being undefined (infinite), which is equivalent to $$\\frac{dx}{dy} = 0$$.\n- Step 2: After implicit differentiation, set the denominator of $$\\frac{dy}{dx}$$ equal to zero. Solve this together with the original implicit equation to find candidate points.\n- Step 3: Verify the numerator is nonzero at these points (otherwise it's a singular cusp-type point, not a genuine vertical tangent).\n\nTakeaway: denominator zero + numerator nonzero = vertical tangent; this is the $$\\frac{dx}{dy} = 0$$ condition in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Explain the principle behind solving \"connected rates of change\" problems where multiple variables change over time. (3 steps)", "answer": "- Step 1: Identify the quantities and their static geometric relationships (e.g., $$A = \\pi r^2$$ links area to radius for a circle).\n- Step 2: Use the chain rule to link rates through derivatives: $$\\frac{dA}{dt} = \\frac{dA}{dr}\\cdot\\frac{dr}{dt}$$. The first factor comes from differentiating the static relationship; the second is given by the problem.\n- Step 3: For longer chains (three or more variables), insert more links: $$\\frac{dS}{dt} = \\frac{dS}{dr}\\cdot\\frac{dr}{dV}\\cdot\\frac{dV}{dt}$$, using the inverse rule $$\\frac{dr}{dV} = 1/\\frac{dV}{dr}$$ to reverse direction if needed.\n\nTakeaway: chain rule is the bridge — any rate of change with respect to $$t$$ can be rebuilt from chains of rates through intermediate variables.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Give an intuitive unit-based reason for why $$\\frac{dA}{dt} = \\frac{dA}{dr}\\cdot\\frac{dr}{dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{dA}{dr}$$ has units of \"$$A$$-units per $$r$$-unit\"; $$\\frac{dr}{dt}$$ has units of \"$$r$$-units per $$t$$-unit\".\n- Step 2: Multiplying cancels the $$r$$-units: $$\\frac{A}{r}\\cdot\\frac{r}{t} = \\frac{A}{t}$$ — the result has units of $$\\frac{dA}{dt}$$, confirming the identity.\n- Step 3: Physically, $$r$$ is an intermediate messenger: a change in $$t$$ first produces a change in $$r$$, which in turn produces a change in $$A$$. Rates compose multiplicatively through the chain.\n\nTakeaway: chain rule = unit cancellation = composing rates through intermediate variables.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Why does $$\\frac{dr}{dV} = \\frac{1}{dV/dr}$$, and when is this identity useful? (3 steps)", "answer": "- Step 1: If $$V(r)$$ is a monotonic function, $$r$$ is a well-defined function of $$V$$. Differentiating \"$$r = r$$\" with respect to $$V$$ via chain rule: $$1 = \\frac{dr}{dV}\\cdot\\frac{dV}{dr}$$.\n- Step 2: Rearranging: $$\\frac{dr}{dV} = \\frac{1}{dV/dr}$$. Swapping dependent and independent variables swaps the derivative's numerator and denominator.\n- Step 3: Useful when you know $$V(r)$$ but need a rate involving $$\\frac{dr}{dV}$$ — you can avoid rearranging the equation to get $$r(V)$$ explicitly.\n\nTakeaway: derivatives of inverse functions are reciprocals — no need to invert a formula just to flip the derivative direction.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What is a differential equation, and why is it called \"differential\"? (3 steps)", "answer": "- Step 1: A differential equation is any equation involving one or more derivatives of an unknown function, e.g., $$\\frac{dy}{dt} = ky$$ or $$\\frac{d^2 y}{dx^2} + y = 0$$.\n- Step 2: It's called \"differential\" because it relates the function to its rates of change (differentials), not to the function value alone.\n- Step 3: Solving means finding the function(s) satisfying the relationship — typically via integration, the inverse operation to differentiation.\n\nTakeaway: a differential equation encodes how something changes; its solution recovers the thing itself.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A problem states \"the rate of change of $$P$$ is proportional to $$P$$\". How do you translate this into a differential equation, and what does the sign of the proportionality constant control? (3 steps)", "answer": "- Step 1: \"Rate of change\" means $$\\frac{dP}{dt}$$; \"proportional to $$P$$\" means equal to a constant times $$P$$: $$\\frac{dP}{dt} = kP$$.\n- Step 2: The sign of $$k$$ controls behaviour:\n+ $$k > 0$$: exponential growth — $$P$$ increases indefinitely.\n+ $$k < 0$$: exponential decay — $$P$$ heads toward zero.\n- Step 3: In decay contexts (radioactivity, cooling), convention writes $$\\frac{dP}{dt} = -kP$$ with $$k > 0$$, making the negative sign explicit while keeping $$k$$ always positive.\n\nTakeaway: \"proportional to\" → \"= constant ×\"; sign convention separates magnitude from direction.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Write down the differential equation for radioactive decay, explaining each symbol and sign. (3 steps)", "answer": "- Step 1: Let $$N$$ be the number of radioactive particles and $$t$$ be time. The rate of decay is proportional to the number remaining: $$\\frac{dN}{dt} \\propto N$$.\n- Step 2: Since particles are being lost (decreasing), $$\\frac{dN}{dt}$$ must be negative. Write $$\\frac{dN}{dt} = -kN$$ where $$k > 0$$ is the positive decay constant.\n- Step 3: The minus sign captures decrease; the size of $$k$$ dictates the decay rate. Larger $$k$$ corresponds to shorter half-life (faster decay).\n\nTakeaway: decay ⇒ negative rate ⇒ write $$-kN$$ with $$k$$ kept positive for conceptual clarity.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "State Newton's law of cooling as a differential equation, and explain why the \"excess temperature\" appears rather than the absolute temperature. (3 steps)", "answer": "- Step 1: Let $$\\theta$$ be the body's temperature, $$\\theta_0$$ the ambient temperature, $$t$$ time. Newton's law: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$ with $$k > 0$$.\n- Step 2: Physically, heat flows due to temperature *difference*, not absolute temperature. A body already at ambient doesn't cool further.\n- Step 3: If $$\\theta = \\theta_0$$, the excess is zero, and so is the rate — consistent with equilibrium. If $$\\theta < \\theta_0$$, the excess is negative and the equation automatically says $$\\frac{d\\theta}{dt} > 0$$ (warming) — a single equation handles cooling and warming.\n\nTakeaway: heat flow is driven by temperature difference, and the DE captures this by using $$\\theta - \\theta_0$$ — giving automatic sign flipping.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Why does \"rate proportional to amount\" always lead to exponential behaviour? (3 steps)", "answer": "- Step 1: The DE $$\\frac{dP}{dt} = kP$$ asks: \"what function's derivative is proportional to itself?\"\n- Step 2: The exponential function is the unique (up to constant multiples) function with this property: $$\\frac{d}{dt}(e^{kt}) = k e^{kt}$$, so $$P(t) = P_0 e^{kt}$$.\n- Step 3: Intuition: each individual (atom/person/dollar) contributes a constant growth rate, so the total rate scales with the total count — a self-reinforcing compounding that must be exponential.\n\nTakeaway: proportionality of rate to amount ⇒ exponential solution; this underlies compound interest, decay, uninhibited growth, and countless models.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "How do you translate \"the rate of increase of $$x$$ is inversely proportional to the square of $$x$$\" into a differential equation? (3 steps)", "answer": "- Step 1: \"Rate of increase of $$x$$\" is $$\\frac{dx}{dt}$$; \"inversely proportional to $$x^2$$\" means equal to a positive constant divided by $$x^2$$.\n- Step 2: So $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ where $$k > 0$$.\n- Step 3: Physical feel: when $$x$$ is small, the rate is large (fast change); when $$x$$ is large, the rate is small (slow change). This models processes like ice thickening on a pond, where each additional layer is harder to freeze than the last.\n\nTakeaway: \"inversely proportional to $$x^n$$\" ⇒ divide by $$x^n$$; sign is set by the physical context.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Liquid flows into a tank at a constant 30 cm³/s while leaking out at a rate of $$\\frac{2V}{15}$$ cm³/s where $$V$$ is current volume. Construct the differential equation and discuss equilibrium. (3 steps)", "answer": "- Step 1: Net rate = rate in − rate out: $$\\frac{dV}{dt} = 30 - \\frac{2V}{15}$$.\n- Step 2: Multiply through by $$-15$$ for a cleaner form: $$-15\\frac{dV}{dt} = 2V - 450$$.\n- Step 3: Equilibrium when net rate = 0 ⇒ $$V = 225$$ cm³:\n+ If $$V < 225$$: inflow exceeds outflow, volume rises.\n+ If $$V > 225$$: outflow exceeds inflow, volume falls.\n+ $$V \\to 225$$ asymptotically — the tank self-stabilizes.\n\nTakeaway: competing processes give DE = \"rate in − rate out\"; the equilibrium is where they balance.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A snowman's spherical head loses volume at a rate proportional to its surface area. Show that the radius shrinks at a constant rate. (4 steps)", "answer": "- Step 1: Translate the given: $$\\frac{dV}{dt} = -kA$$ where $$A = 4\\pi R^2$$ is the surface area, $$k > 0$$.\n- Step 2: For a sphere, $$V = \\frac{4}{3}\\pi R^3$$, so $$\\frac{dV}{dR} = 4\\pi R^2$$. By chain rule: $$\\frac{dV}{dt} = 4\\pi R^2 \\cdot \\frac{dR}{dt}$$.\n- Step 3: Equate the two expressions for $$\\frac{dV}{dt}$$: $$4\\pi R^2 \\cdot \\frac{dR}{dt} = -k\\cdot 4\\pi R^2$$.\n- Step 4: Cancel $$4\\pi R^2$$ (nonzero): $$\\frac{dR}{dt} = -k$$. The radius decreases linearly in time!\n\nTakeaway: when volumetric loss scales with surface area (geometrically, exposed boundary), spheres peel inward at constant speed — a beautiful cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A cone has slant making angle $$30°$$ with the vertical axis. Derive the relationship between volume and height. (3 steps)", "answer": "- Step 1: The radius $$r$$ at height $$h$$ satisfies $$\\tan 30° = r/h$$, so $$r = h\\tan 30° = h/\\sqrt{3}$$.\n- Step 2: Cone volume: $$V = \\frac{1}{3}\\pi r^2 h = \\frac{1}{3}\\pi\\cdot\\frac{h^2}{3}\\cdot h = \\frac{\\pi h^3}{9}$$.\n- Step 3: Hence $$V = \\frac{1}{9}\\pi h^3$$. Notice the $$h^3$$ dependence: for a cone of fixed angle, volume always scales cubically with height.\n\nTakeaway: fixed-angle cones have a constant $$r/h$$ ratio, so volume reduces to a single-variable function of $$h$$ alone — a useful simplification.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "For the conical funnel with $$V = \\frac{1}{9}\\pi h^3$$ and salt leaving at constant 6 cm³/s, show $$\\frac{dh}{dt}$$ is inversely proportional to $$h^2$$. (3 steps)", "answer": "- Step 1: Differentiate $$V$$ with respect to $$h$$: $$\\frac{dV}{dh} = \\frac{\\pi h^2}{3}$$.\n- Step 2: Use chain rule with $$\\frac{dV}{dt} = -6$$ (salt leaving): $$\\frac{dh}{dt} = \\frac{dV/dt}{dV/dh} = \\frac{-6}{\\pi h^2/3} = \\frac{-18}{\\pi h^2}$$.\n- Step 3: This has the form $$\\frac{dh}{dt} = \\frac{\\text{constant}}{h^2}$$ — inverse-square in $$h$$. As the cone empties, $$h$$ decreases faster because the cross-section narrows.\n\nTakeaway: constant volumetric outflow + narrowing cross-section = accelerating height drop; cone geometry dictates this.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For fluid draining from a cylindrical tank at a rate proportional to $$\\sqrt{V}$$, show the depth satisfies $$\\frac{dh}{dt} = -k\\sqrt{h}$$. (3 steps)", "answer": "- Step 1: For a cylinder of constant cross-section $$A$$: $$V = Ah$$, so $$\\sqrt{V} = \\sqrt{A}\\cdot\\sqrt{h}$$.\n- Step 2: Given $$\\frac{dV}{dt} = -c\\sqrt{V}$$ for some $$c > 0$$. Also $$\\frac{dV}{dt} = A\\frac{dh}{dt}$$ by direct differentiation.\n- Step 3: Equate: $$A\\frac{dh}{dt} = -c\\sqrt{A}\\sqrt{h}$$, so $$\\frac{dh}{dt} = -\\frac{c}{\\sqrt{A}}\\sqrt{h} = -k\\sqrt{h}$$ where $$k = c/\\sqrt{A}$$ is positive.\n\nTakeaway: for a cylindrical tank, volume and depth are linearly proportional, so the $$\\sqrt{V}$$-law translates directly to a $$\\sqrt{h}$$-law.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "How do you decide the sign of the proportionality constant when writing a differential equation from a word problem? (3 steps)", "answer": "- Step 1: Identify the physical direction: is the quantity increasing or decreasing?\n- Step 2: If decreasing (decay, cooling, draining), include an explicit minus sign and keep the proportionality constant $$k$$ positive.\n- Step 3: If increasing (growth, charging, filling), no minus sign — $$k$$ positive indicates growth.\n\nTakeaway: conventionally $$k$$ stays positive; direction is expressed by an explicit + or − sign in front — this keeps the physics transparent.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "For $$y = x^x$$ with $$x, y > 0$$, use logarithmic differentiation to find $$\\frac{dy}{dx}$$. (3 steps)", "answer": "- Step 1: Take natural log: $$\\ln y = x\\ln x$$ (using log-power rule to bring the exponent down).\n- Step 2: Differentiate both sides with respect to $$x$$:\n+ Left: $$\\frac{1}{y}\\frac{dy}{dx}$$ (chain rule).\n+ Right: product rule on $$x\\ln x$$ gives $$\\ln x + x\\cdot\\frac{1}{x} = \\ln x + 1$$.\n- Step 3: Rearrange: $$\\frac{dy}{dx} = y(1 + \\ln x) = x^x(1 + \\ln x)$$.\n\nTakeaway: logs turn \"variable to variable power\" into a product that standard rules handle; this trick is essential for $$x^x$$ type expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Show that $$a^x = e^{x\\ln a}$$ and use this to derive $$\\frac{d}{dx}(a^x)$$. (3 steps)", "answer": "- Step 1: Take natural log of $$a^x$$: $$\\ln(a^x) = x\\ln a$$. Exponentiating: $$a^x = e^{x\\ln a}$$.\n- Step 2: Differentiate using chain rule: $$\\frac{d}{dx}(e^{x\\ln a}) = e^{x\\ln a}\\cdot \\ln a = a^x\\ln a$$.\n- Step 3: Result: $$\\frac{d}{dx}(a^x) = a^x\\ln a$$. The $$\\ln a$$ factor is the \"conversion rate\" from base $$a$$ to base $$e$$ — it equals 1 only when $$a = e$$, explaining why $$e$$ is the natural base.\n\nTakeaway: any exponential is just $$e$$ rescaled on the input axis by $$\\ln a$$; derivatives inherit this scaling.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why is $$e$$ called the \"natural\" base for exponentials? (3 steps)", "answer": "- Step 1: For $$y = e^x$$: $$\\frac{dy}{dx} = e^x$$ — the function is its own derivative. No extra constant appears.\n- Step 2: For any other base $$a$$: $$\\frac{d}{dx}(a^x) = a^x\\ln a$$ — the factor $$\\ln a$$ is only 1 when $$a = e$$.\n- Step 3: This makes $$e$$ the unique base where calculus operations don't introduce extra multiplicative constants — \"natural\" in the sense of cleanest calculus behaviour.\n\nTakeaway: $$e$$'s naturality comes from being the fixed point of differentiation — the base where the exponential's rate equals the exponential itself.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For a curve $$y = \\ln(\\sin x)$$ on $$0 < x < \\pi$$, how would you show that the curve is concave throughout its domain? (3 steps)", "answer": "- Step 1: First derivative (chain rule): $$\\frac{dy}{dx} = \\frac{\\cos x}{\\sin x} = \\cot x$$.\n- Step 2: Second derivative: $$\\frac{d}{dx}(\\cot x) = -\\csc^2 x$$.\n- Step 3: On $$(0, \\pi)$$, $$\\sin x > 0$$ so $$\\csc^2 x > 0$$, hence $$-\\csc^2 x < 0$$. The second derivative is strictly negative everywhere in the domain, so the curve is concave throughout — no inflection points.\n\nTakeaway: globally negative second derivative = globally concave; second-derivative sign is the concavity test.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "How do you use the second derivative to classify a stationary point as max, min, or inconclusive? (3 steps)", "answer": "- Step 1: At a stationary point $$x_0$$ (where $$f'(x_0) = 0$$), compute $$f''(x_0)$$.\n- Step 2: Interpret:\n+ $$f''(x_0) > 0$$: curve concave up → local minimum.\n+ $$f''(x_0) < 0$$: curve concave down → local maximum.\n+ $$f''(x_0) = 0$$: inconclusive — could be inflection, or need higher-order test.\n- Step 3: Geometric intuition: $$f''$$ measures how fast the slope is changing. Positive $$f''$$ means slope goes from negative to positive through zero → min. Negative means slope goes from positive to negative → max.\n\nTakeaway: second derivative = concavity = slope-of-slope; sign determines max/min at stationary points.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A common mistake in implicit differentiation is to differentiate $$y^2$$ as simply $$2y$$ (without the $$\\frac{dy}{dx}$$). Explain the error carefully. (3 steps)", "answer": "- Step 1: The expression $$\\frac{d}{dx}(y^2) = 2y$$ would be correct only if $$y$$ were the variable of differentiation. Here we differentiate with respect to $$x$$, but $$y$$ depends on $$x$$.\n- Step 2: By chain rule: $$\\frac{d}{dx}(y^2) = 2y\\cdot\\frac{dy}{dx}$$. The factor $$\\frac{dy}{dx}$$ converts \"derivative with respect to $$y$$\" into \"derivative with respect to $$x$$\".\n- Step 3: Omitting it is treating $$y$$ as independent — which gives the wrong equation, wrong gradient, and ultimately wrong answers at every point.\n\nTakeaway: in implicit differentiation, a $$\\frac{dy}{dx}$$ appears every time a $$y$$-factor gets differentiated — this is mandatory, not optional.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A parametric curve has $$\\frac{dx}{dt} = 0$$ at some $$t = t_0$$. A student concludes \"the gradient is $$\\frac{dy/dt}{0}$$, which is undefined, so there's no tangent.\" What's the correct interpretation? (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx}$$ is undefined (infinite), but this doesn't mean \"no tangent\" — it means the tangent is vertical (infinite slope).\n- Step 2: Geometrically, the curve changes $$y$$ without changing $$x$$ at this moment, which is exactly what a vertical tangent describes.\n- Step 3: To handle it, consider $$\\frac{dx}{dy} = \\frac{dx/dt}{dy/dt} = 0$$ at $$t_0$$. A zero \"reverse slope\" matches the intuition of \"no horizontal run per unit vertical rise\" = vertical line.\n\nTakeaway: undefined slope ≠ no tangent; usually it means vertical. Flipping to $$\\frac{dx}{dy}$$ gives a well-defined picture.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Give a geometric explanation for why the normal to a curve at a point has slope $$-\\frac{1}{m}$$ when the tangent has slope $$m$$. (3 steps)", "answer": "- Step 1: The tangent and normal are perpendicular lines. For two perpendicular lines with slopes $$m_1$$ and $$m_2$$: $$m_1\\cdot m_2 = -1$$.\n- Step 2: Solving: $$m_2 = -\\frac{1}{m_1}$$ — \"flip and negate\".\n- Step 3: Visually: a line with slope $$m$$ rises $$m$$ units for every 1-unit run. Rotating this line $$90°$$ swaps \"run\" and \"rise\" and flips one sign, yielding rise 1 per run $$-m$$, i.e., slope $$-\\frac{1}{m}$$.\n\nTakeaway: perpendicular slopes are negative reciprocals — a direct consequence of $$90°$$ rotation in the plane.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "On a parametric curve, what does it mean geometrically for a point to satisfy $$\\frac{dx}{dy} = 0$$, and how would you find such points? (3 steps)", "answer": "- Step 1: $$\\frac{dx}{dy} = 0$$ means that at this point, $$x$$ is not changing as $$y$$ changes — the tangent line is vertical.\n- Step 2: Parametrically, $$\\frac{dx}{dy} = \\frac{dx/dt}{dy/dt}$$, so $$\\frac{dx}{dy} = 0$$ ↔ $$\\frac{dx}{dt} = 0$$ (with $$\\frac{dy}{dt} \\neq 0$$).\n- Step 3: Procedure: solve $$\\frac{dx}{dt} = 0$$ for $$t$$, verify $$\\frac{dy}{dt} \\neq 0$$ there, and substitute into $$x(t), y(t)$$ for coordinates.\n\nTakeaway: $$\\frac{dx}{dy} = 0$$ characterizes vertical tangents; parametrically this means the $$x$$-component momentarily freezes.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "A circle of radius 1 has parametric form $$x = \\cos t$$, $$y = \\sin t$$. Find $$\\frac{dy}{dx}$$ and discuss where it's defined. (3 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = -\\sin t$$, $$\\frac{dy}{dt} = \\cos t$$.\n- Step 2: Ratio: $$\\frac{dy}{dx} = \\frac{\\cos t}{-\\sin t} = -\\cot t$$.\n- Step 3: Undefined when $$\\sin t = 0$$, i.e., at $$t = 0, \\pi$$, corresponding to points $$(1, 0)$$ and $$(-1, 0)$$ — exactly where the circle has vertical tangents. Everywhere else, $$\\frac{dy}{dx}$$ is well-defined, matching the circle's smooth curvature.\n\nTakeaway: parametric differentiation handles the entire circle, correctly flagging the left/right extremes as vertical-tangent points.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "For the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, use implicit differentiation to find $$\\frac{dy}{dx}$$ and identify horizontal/vertical tangent points. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$\\frac{2x}{9} + \\frac{2y}{4}\\frac{dy}{dx} = 0$$. Solving: $$\\frac{dy}{dx} = -\\frac{4x}{9y}$$.\n- Step 2: Horizontal tangents: numerator $$= 0$$ ⇒ $$x = 0$$. Substitute into ellipse: $$y^2 = 4$$, so $$y = \\pm 2$$. Points: $$(0, \\pm 2)$$ — top and bottom.\n- Step 3: Vertical tangents: denominator $$= 0$$ ⇒ $$y = 0$$. Substitute: $$x^2 = 9$$, so $$x = \\pm 3$$. Points: $$(\\pm 3, 0)$$ — left and right extremes. Matches ellipse geometry exactly.\n\nTakeaway: numerator zero → horizontal tangents (top/bottom); denominator zero → vertical tangents (sides).", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "For a circle of radius $$r$$ growing at constant rate $$\\frac{dr}{dt} = c$$, explain why $$\\frac{dC}{dt}$$ is constant but $$\\frac{dA}{dt}$$ grows with $$r$$. (3 steps)", "answer": "- Step 1: Circumference $$C = 2\\pi r$$, so $$\\frac{dC}{dr} = 2\\pi$$ (constant). Area $$A = \\pi r^2$$, so $$\\frac{dA}{dr} = 2\\pi r$$ (linear in $$r$$).\n- Step 2: By chain rule:\n+ $$\\frac{dC}{dt} = 2\\pi c$$ — constant, independent of $$r$$.\n+ $$\\frac{dA}{dt} = 2\\pi r \\cdot c$$ — grows linearly with $$r$$.\n- Step 3: Geometrically, adding a thin radial ring of thickness $$dr$$ contributes $$2\\pi\\,dr$$ to circumference (fixed) but $$2\\pi r\\,dr$$ to area (larger for bigger circles, because the ring is longer). Hence the rate disparity.\n\nTakeaway: linear quantities have constant rates of change; quadratic quantities' rates scale with the underlying variable.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "If $$y = xe^x$$ and $$\\frac{dx}{dt} = 5$$, find $$\\frac{dy}{dt}$$ when $$x = 2$$. (3 steps)", "answer": "- Step 1: Find $$\\frac{dy}{dx}$$ via product rule: $$\\frac{dy}{dx} = e^x + xe^x = e^x(1 + x)$$.\n- Step 2: Use chain rule: $$\\frac{dy}{dt} = \\frac{dy}{dx}\\cdot\\frac{dx}{dt}$$.\n- Step 3: At $$x = 2$$: $$\\frac{dy}{dx} = 3e^2$$, so $$\\frac{dy}{dt} = 3e^2 \\cdot 5 = 15e^2$$.\n\nTakeaway: connected rates: find $$\\frac{dy}{dx}$$ from the relationship, multiply by $$\\frac{dx}{dt}$$ from the problem.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "For $$x^2 + 3xy^2 - y^3 = 9$$, outline the steps to find the equation of the tangent at $$(2, 1)$$. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$2x + 3(y^2 + x\\cdot 2y\\frac{dy}{dx}) - 3y^2\\frac{dy}{dx} = 0$$ — product rule on $$3xy^2$$, chain rule on $$y^3$$ and $$y^2$$.\n- Step 2: Substitute $$x = 2, y = 1$$ to simplify: $$4 + 3(1 + 4\\frac{dy}{dx}) - 3\\frac{dy}{dx} = 0$$, which collapses to a linear equation in $$\\frac{dy}{dx}$$, giving the slope $$m$$.\n- Step 3: Use point-slope: $$y - 1 = m(x - 2)$$ for the tangent equation.\n\nTakeaway: the universal implicit-tangent workflow — differentiate, substitute point, solve for slope, point-slope form.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Why might you want to eliminate the parameter from parametric equations, and when should you avoid doing so? (3 steps)", "answer": "- Step 1: Eliminate when you want Cartesian form for graphing, comparison with explicit curves, or certain integrations. For example, $$x = \\cos t, y = \\sin t$$ becomes $$x^2 + y^2 = 1$$.\n- Step 2: Avoid when: (a) the algebra is intractable (e.g., $$x = t^2e^t$$), (b) direction information matters, (c) parametric differentiation is simpler.\n- Step 3: For computing $$\\frac{dy}{dx}$$, parametric is almost always easier — don't eliminate unless the problem specifically requires Cartesian form.\n\nTakeaway: parameter elimination is optional, not mandatory; parametric differentiation bypasses the need entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Why does the expression for $$\\frac{dy}{dx}$$ from implicit differentiation typically depend on both $$x$$ and $$y$$, and what does this mean visually? (3 steps)", "answer": "- Step 1: In implicit form, different points on the curve have different slopes — the slope isn't uniquely determined by $$x$$ alone (the curve may have multiple $$y$$-values at a given $$x$$).\n- Step 2: Visually, $$\\frac{dy}{dx}(x,y)$$ defines a slope at each point in the plane — a \"slope field\" or \"direction field\". The curve follows these slope arrows tangentially.\n- Step 3: To get a single slope value, you need the specific $$(x, y)$$ coordinates, because the same $$x$$ can give different slopes at different branches of the curve.\n\nTakeaway: implicit $$\\frac{dy}{dx}$$ is a function of both coordinates because the curve can pass through the same $$x$$-value multiple times with different slopes.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "For $$\\sin x + \\cos y = 0.5$$ on $$-\\pi < x, y < \\pi$$, describe the approach to finding stationary points. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$\\cos x - \\sin y\\cdot\\frac{dy}{dx} = 0$$, giving $$\\frac{dy}{dx} = \\frac{\\cos x}{\\sin y}$$.\n- Step 2: Stationary ⇔ numerator zero ⇔ $$\\cos x = 0$$ ⇔ $$x = \\pm\\frac{\\pi}{2}$$ in range.\n- Step 3: For each such $$x$$, substitute into the original equation: $$\\sin(\\pm\\pi/2) + \\cos y = 0.5$$, i.e., $$\\cos y = -0.5$$ or $$\\cos y = 1.5$$ (impossible). Find valid $$y$$-values — this gives the stationary coordinates.\n\nTakeaway: implicit stationary points come from numerator-zero; combine with the original equation to get coordinates.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Construct the differential equation for a patch of oil whose radius $$r$$ increases at a rate inversely proportional to $$r$$. (3 steps)", "answer": "- Step 1: \"Rate of increase of $$r$$\" is $$\\frac{dr}{dt}$$. \"Inversely proportional to $$r$$\" means $$\\frac{dr}{dt} = \\frac{k}{r}$$ with $$k > 0$$.\n- Step 2: So the DE is $$\\frac{dr}{dt} = \\frac{k}{r}$$ — the radius grows, but slower as it gets bigger.\n- Step 3: Physical intuition: when the patch is small, it spreads fast; when large, it spreads slowly. Consistent with a conserved amount of oil being spread over a growing circumference.\n\nTakeaway: \"rate inversely proportional to $$X$$\" ⇒ divide by $$X$$ in the DE; the result often models diffusion-like processes.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Pondweed $$P$$ grows at a rate proportional to itself, while fish eat it at constant rate $$Q$$ per unit time. Write the differential equation and describe the equilibrium. (3 steps)", "answer": "- Step 1: Growth: $$+kP$$ (proportional to existing amount). Consumption: $$-Q$$ (constant loss).\n- Step 2: Net: $$\\frac{dP}{dt} = kP - Q$$.\n- Step 3: Equilibrium at $$P_{eq} = Q/k$$ (where rate vanishes):\n+ If $$P < P_{eq}$$: $$kP < Q$$, so net rate negative, pondweed decreases.\n+ If $$P > P_{eq}$$: growth dominates, pondweed increases (unboundedly, in the model).\n+ $$P_{eq}$$ is unstable: small perturbations grow, not shrink.\n\nTakeaway: linear-proportional + constant-loss DEs have one equilibrium; whether it's stable or unstable depends on the sign of $$k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "A cube's volume decreases at constant 4.5 cm³/s. Describe (conceptually) how to find the rate of side-length decrease when $$V = 100$$ cm³. (3 steps)", "answer": "- Step 1: Relationship: $$V = s^3$$, so $$\\frac{dV}{dt} = 3s^2\\frac{ds}{dt}$$.\n- Step 2: Given $$\\frac{dV}{dt} = -4.5$$ (decreasing). Find $$s$$ at $$V = 100$$: $$s = 100^{1/3}$$.\n- Step 3: Rearrange: $$\\frac{ds}{dt} = \\frac{-4.5}{3\\cdot 100^{2/3}}$$ — negative (decreasing), with magnitude depending on the current side length. Larger cubes lose side length more slowly because $$s^2$$ in the denominator grows.\n\nTakeaway: chain rule gives side-rate from volume-rate; size-dependence reflects the cubic geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "For parametric curves, how do you find points where the curve cuts the $$y$$-axis? (3 steps)", "answer": "- Step 1: The $$y$$-axis is the line $$x = 0$$. Set $$x(t) = 0$$ and solve for $$t$$.\n- Step 2: For each valid $$t$$-value, compute $$y(t)$$ to get the intersection point $$(0, y(t))$$.\n- Step 3: For the $$x$$-axis, instead set $$y(t) = 0$$, find $$t$$, then get $$(x(t), 0)$$.\n\nTakeaway: parametric axis intersections are one-variable problems in $$t$$ — solve for $$t$$, then evaluate the other coordinate.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "For $$y^3 + 3xy^2 - x^3 = 3$$, describe the key algebraic step to find turning points. (3 steps)", "answer": "- Step 1: Differentiate implicitly. Chain rule on $$y^3$$ gives $$3y^2\\frac{dy}{dx}$$; product rule on $$3xy^2$$ gives $$3y^2 + 6xy\\frac{dy}{dx}$$; chain rule on $$x^3$$ gives $$3x^2$$.\n- Step 2: Collect: $$(3y^2 + 6xy)\\frac{dy}{dx} = 3x^2 - 3y^2$$, so $$\\frac{dy}{dx} = \\frac{x^2 - y^2}{y^2 + 2xy}$$.\n- Step 3: Turning points: set numerator zero: $$x^2 = y^2$$, i.e., $$y = \\pm x$$. Substitute each back into the original equation to locate specific $$(x, y)$$ coordinates.\n\nTakeaway: numerator zero gives a simple relation between $$x$$ and $$y$$; intersecting with the original curve pins down turning points.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "Explain why we can apply implicit differentiation even when $$y$$ cannot be explicitly solved from the equation. (3 steps)", "answer": "- Step 1: The implicit function theorem (an advanced result) guarantees that under mild smoothness conditions, an equation $$F(x, y) = 0$$ locally defines $$y$$ as a differentiable function of $$x$$ — even if we can't write a closed-form formula.\n- Step 2: Implicit differentiation exploits this existence without requiring the explicit formula: we just differentiate both sides as if $$y = y(x)$$, using chain rule.\n- Step 3: The resulting $$\\frac{dy}{dx}$$ gives the correct slope wherever the curve is smooth; only at singular points (where $$F_y = 0$$ and $$F_x = 0$$) does this break down.\n\nTakeaway: the implicit function theorem underwrites implicit differentiation — we know $$y(x)$$ exists locally, we just don't need to find it explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "For $$ye^{-3x} - 3x = y^2$$, show the gradient at the origin is 3, then write the tangent there. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$\\frac{dy}{dx}e^{-3x} + y\\cdot(-3e^{-3x}) - 3 = 2y\\frac{dy}{dx}$$ (product rule on $$ye^{-3x}$$, chain rule on $$y^2$$).\n- Step 2: Substitute $$(0, 0)$$: $$\\frac{dy}{dx}\\cdot 1 + 0 - 3 = 0$$, so $$\\frac{dy}{dx} = 3$$.\n- Step 3: Tangent at origin with slope 3: $$y = 3x$$.\n\nTakeaway: at special points like the origin, coordinate substitution collapses many terms, making slope calculation trivial.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "In a parametric tangent problem, why might a curve admit several tangent lines parallel to a given direction? (3 steps)", "answer": "- Step 1: \"Parallel tangents\" means \"tangents with the same slope\". Setting the parametric slope expression equal to a fixed value gives an equation in $$t$$.\n- Step 2: This equation may have multiple solutions (roots), each corresponding to a distinct point on the curve where the slope matches.\n- Step 3: Each solution gives a different tangent line (with the same slope but different intercepts, if the points differ). This is common for curves with multiple \"turns\" or loops.\n\nTakeaway: slope-equation roots correspond to tangent-points; multiple roots = multiple parallel tangents (but at different places).", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "For $$x = 5\\cos(t + \\pi/12), y = 2\\sin 2t$$ on $$0 \\leq t \\leq 2\\pi$$, outline how to find points where $$\\frac{dy}{dx} = 0$$. (3 steps)", "answer": "- Step 1: Differentiate: $$\\frac{dy}{dt} = 4\\cos 2t$$ and $$\\frac{dx}{dt} = -5\\sin(t + \\pi/12)$$.\n- Step 2: $$\\frac{dy}{dx} = 0$$ requires numerator zero with nonzero denominator: $$\\cos 2t = 0$$ ⇒ $$2t = \\pi/2, 3\\pi/2, 5\\pi/2, 7\\pi/2$$ ⇒ $$t = \\pi/4, 3\\pi/4, 5\\pi/4, 7\\pi/4$$.\n- Step 3: Substitute each $$t$$ into $$x(t), y(t)$$ to get the point coordinates — each is a horizontal-tangent point on the curve.\n\nTakeaway: trig parametric curves often have multiple horizontal tangents — all from roots of a trig equation over the full parameter range.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "For $$3^x = y - 2xy$$, find the structure of $$\\frac{dy}{dx}$$ at $$(2, -3)$$ conceptually. (3 steps)", "answer": "- Step 1: Differentiate: left side gives $$3^x\\ln 3$$ (exponential rule); right side gives $$\\frac{dy}{dx} - 2(y + x\\frac{dy}{dx})$$ (product rule on $$2xy$$).\n- Step 2: Rearrange: $$3^x\\ln 3 + 2y = (1 - 2x)\\frac{dy}{dx}$$, so $$\\frac{dy}{dx} = \\frac{3^x\\ln 3 + 2y}{1 - 2x}$$.\n- Step 3: At $$(2, -3)$$: $$\\frac{dy}{dx} = \\frac{9\\ln 3 - 6}{1 - 4} = \\frac{9\\ln 3 - 6}{-3} = 2 - 3\\ln 3$$. The key insight is that derivatives of $$a^x$$ require the $$\\ln a$$ factor.\n\nTakeaway: when $$a^x$$ appears in an implicit equation, its derivative contributes a $$\\ln a$$ factor; the rest follows standard implicit-differentiation rules.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "For a radioactive mass $$m = 40e^{-0.244t}$$, explain the physical significance of the sign and magnitude of $$\\frac{dm}{dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{dm}{dt} = 40\\cdot(-0.244)e^{-0.244t} = -0.244\\,m$$ — proportional to current mass, with a negative constant.\n- Step 2: Sign: negative ⇒ mass is decreasing over time. This matches radioactive decay — atoms are being lost, not gained.\n- Step 3: Magnitude: $$|\\frac{dm}{dt}| = 0.244\\,m$$ — loss rate is proportional to current mass. Larger $$m$$ means more atoms available to decay, hence faster loss.\n\nTakeaway: derivative of exponential decay is \"decay constant × current quantity\"; sign = direction, magnitude = rate intensity.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "A cube has surface area $$A$$ expanding at a constant 2 cm²/s. Why does $$V$$ have a form expressible in $$A$$, and show that $$\\frac{dV}{dt}$$ is related to $$V^{1/3}$$. (3 steps)", "answer": "- Step 1: For a cube of side $$s$$: $$A = 6s^2$$ and $$V = s^3$$. Solve for $$s$$: $$s = \\sqrt{A/6}$$. Then $$V = (A/6)^{3/2}$$.\n- Step 2: Differentiate: $$\\frac{dV}{dA} = \\frac{3}{2}(A/6)^{1/2}\\cdot\\frac{1}{6} = \\frac{(A/6)^{1/2}}{4}$$. Equivalently, in terms of $$V$$: since $$s = V^{1/3}$$ and $$A = 6V^{2/3}$$, we get $$\\frac{dV}{dA} = \\frac{V^{1/3}}{4}$$.\n- Step 3: Chain rule with $$\\frac{dA}{dt} = 2$$: $$\\frac{dV}{dt} = \\frac{dV}{dA}\\cdot\\frac{dA}{dt} = \\frac{V^{1/3}}{4}\\cdot 2 = \\frac{V^{1/3}}{2}$$.\n\nTakeaway: the cube's geometry forces all rates to relate through powers of $$s$$; constants of integration drop out, leaving universal laws.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "For a parametric curve, what does a sketching strategy look like once you know where $$\\frac{dy}{dx} = 0$$ and $$\\frac{dx}{dy} = 0$$? (3 steps)", "answer": "- Step 1: Points where $$\\frac{dy}{dx} = 0$$ are horizontal-tangent points (peaks and troughs) — vertical extrema of the curve.\n- Step 2: Points where $$\\frac{dx}{dy} = 0$$ are vertical-tangent points (leftmost/rightmost) — horizontal extrema.\n- Step 3: Also include axis crossings ($$x = 0$$ or $$y = 0$$) and endpoint behaviour (as $$t$$ approaches range limits). Connect these landmarks smoothly, respecting monotonicity between them, to produce the sketch.\n\nTakeaway: key features (extrema + crossings + endpoints) define the skeleton; smooth arcs between them complete the curve.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "Describe how the rate-proportionality connects physics to the exponential-solution universality. (3 steps)", "answer": "- Step 1: Any \"rate proportional to amount\" law is $$\\frac{dP}{dt} = kP$$ (with sign of $$k$$ encoding growth/decay).\n- Step 2: The unique solution (up to initial condition) is $$P(t) = P_0 e^{kt}$$ — exponential behaviour.\n- Step 3: This single dynamic describes: bacterial growth (uninhibited), compound interest, radioactive decay, capacitor discharge, cooling (in excess-temperature form), Beer-Lambert absorption... all manifestations of the same proportionality law.\n\nTakeaway: when rates scale with current amount, exponential solutions inevitably appear — a cornerstone of modelling throughout science.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "Using the chain rule, derive $$\\frac{dy}{dx}$$ for $$x = 2\\sin^2 t$$, $$y = 2\\cot t$$ on $$0 < t < \\pi/2$$. (3 steps)", "answer": "- Step 1: $$\\frac{dx}{dt} = 2\\cdot 2\\sin t\\cos t = 2\\sin 2t$$ (using chain rule, then double-angle).\n- Step 2: $$\\frac{dy}{dt} = -2\\csc^2 t$$.\n- Step 3: Ratio: $$\\frac{dy}{dx} = \\frac{-2\\csc^2 t}{2\\sin 2t} = \\frac{-\\csc^2 t}{\\sin 2t} = \\frac{-1}{\\sin^2 t \\cdot 2\\sin t\\cos t} = \\frac{-1}{2\\sin^3 t\\cos t}$$.\n\nTakeaway: parametric + trig derivatives often simplify via trig identities; keep the expression in $$t$$ for clarity.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "Connect differential equations and integration: why does solving a simple DE boil down to integration? (3 steps)", "answer": "- Step 1: A DE like $$\\frac{dP}{dt} = f(P)$$ or $$\\frac{dP}{dt} = g(t)$$ expresses the derivative of an unknown function.\n- Step 2: Integration is the inverse of differentiation, so to recover $$P(t)$$, one typically integrates: e.g., if $$\\frac{dP}{dt} = g(t)$$, then $$P(t) = \\int g(t)\\,dt + C$$.\n- Step 3: For more complex DEs (like $$\\frac{dP}{dt} = kP$$), separation of variables leads to integrations on each side: $$\\int \\frac{dP}{P} = \\int k\\,dt$$, giving $$\\ln P = kt + C$$, hence $$P = Ae^{kt}$$.\n\nTakeaway: DE solving = integration (possibly after rearrangement); the constant of integration reflects the missing initial condition.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "A population model $$P = P_0(1.09)^t$$ has annual growth of 9%. Explain the relationship between the \"discrete rate\" 1.09 and the \"continuous rate\" in $$\\frac{dP}{dt}$$. (3 steps)", "answer": "- Step 1: $$1.09$$ means the population multiplies by 1.09 each year — a discrete annual growth factor (9% per year).\n- Step 2: Differentiating: $$\\frac{dP}{dt} = P_0(1.09)^t\\ln(1.09) = P\\ln(1.09)$$. The \"continuous growth rate\" is $$\\ln(1.09) \\approx 0.0862$$, or about 8.62%.\n- Step 3: The two rates differ because continuous compounding exceeds a single annual jump by the same factor. $$1.09 = e^{\\ln 1.09}$$, so $$\\ln 1.09$$ is the instantaneous rate that, continuously compounded, matches 9% annual growth.\n\nTakeaway: discrete growth factor $$a$$ corresponds to continuous rate $$\\ln a$$; they describe the same curve but from different sampling perspectives.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": tr
