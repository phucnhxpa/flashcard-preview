oth $$x$$ and $$y$$.\n\n+ This is not a deficiency — it's a feature. The expression $$\\frac{dy}{dx} = -\\frac{x}{y}$$ for the circle $$x^2+y^2=25$$ tells you the gradient at ANY point on the circle, which is more elegant than having two separate functions $$y = \\pm\\sqrt{25-x^2}$$ each with their own derivative.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "For a circle with area $$A = \\pi r^2$$, if you know the radius is growing at rate $$\\frac{dr}{dt} = 5$$ cm/s, how do you find $$\\frac{dA}{dt}$$? Explain the chain rule connection that links these rates. (3 steps)", "answer": "- Step 1: We need $$\\frac{dA}{dt}$$, but $$A$$ is given as a function of $$r$$, not $$t$$ directly. The chain rule bridges this: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dt}$$. This says \"rate of change of area with respect to time = rate of change of area with respect to radius × rate of change of radius with respect to time.\"\n- Step 2: Compute each piece. $$\\frac{dA}{dr} = 2\\pi r$$ (differentiate $$A = \\pi r^2$$ with respect to $$r$$). We're given $$\\frac{dr}{dt} = 5$$. So $$\\frac{dA}{dt} = 2\\pi r \\times 5 = 10\\pi r$$.\n- Step 3: This result depends on $$r$$ — at $$r = 3$$, $$\\frac{dA}{dt} = 30\\pi$$ cm²/s. The key insight: even though the radius grows at a constant rate, the area grows at a rate proportional to the current radius. A bigger circle accumulates area faster because each new \"ring\" of radius increase adds more area.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Volume $$V$$ and surface area $$S$$ of a hemisphere both depend on radius $$r$$: $$V = \\frac{2}{3}\\pi r^3$$ and $$S = 3\\pi r^2$$. Given $$\\frac{dV}{dt} = 6$$, how would you find $$\\frac{dS}{dt}$$? Walk through the chain rule structure needed. (3 steps)", "answer": "- Step 1: We need a chain linking $$S$$ to $$t$$ through $$r$$ and $$V$$. The chain rule in extended form: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\times \\frac{dr}{dV} \\times \\frac{dV}{dt}$$. Notice the middle link uses $$\\frac{dr}{dV}$$, not $$\\frac{dV}{dr}$$ — we're going \"backwards\" from $$V$$ to $$r$$.\n- Step 2: Compute the derivatives. $$\\frac{dS}{dr} = 6\\pi r$$, $$\\frac{dV}{dr} = 2\\pi r^2$$, so $$\\frac{dr}{dV} = \\frac{1}{2\\pi r^2}$$ (reciprocal of $$\\frac{dV}{dr}$$). We're given $$\\frac{dV}{dt} = 6$$.\n- Step 3: Combine: $$\\frac{dS}{dt} = 6\\pi r \\times \\frac{1}{2\\pi r^2} \\times 6 = \\frac{36\\pi r}{2\\pi r^2} = \\frac{18}{r}$$. The surface area growth rate depends on $$r$$ — as the hemisphere gets larger, its surface area grows more slowly (per unit time) for a given volume increase rate.\n\n+ General principle: when variables $$A$$ and $$B$$ both depend on a third variable $$C$$, and you know $$\\frac{dA}{dt}$$, you can find $$\\frac{dB}{dt}$$ by chaining through $$C$$: $$\\frac{dB}{dt} = \\frac{dB}{dC} \\times \\frac{dC}{dA} \\times \\frac{dA}{dt}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "If you know $$\\frac{dV}{dr} = 2\\pi r^2$$, how do you obtain $$\\frac{dr}{dV}$$? What general principle is being used, and when might it fail? (2 steps)", "answer": "- Step 1: The relationship is $$\\frac{dr}{dV} = \\frac{1}{\\frac{dV}{dr}} = \\frac{1}{2\\pi r^2}$$. This is the **reciprocal rule** for derivatives: if $$y = f(x)$$ is a differentiable function with $$f'(x) \\neq 0$$, then the inverse function has derivative $$\\frac{dx}{dy} = \\frac{1}{dy/dx}$$.\n- Step 2: This fails when $$\\frac{dV}{dr} = 0$$ — at such points, $$V$$ is stationary with respect to $$r$$, meaning the \"inverse\" relationship $$r$$ as a function of $$V$$ is not differentiable (the function is flat, so its inverse would be vertical/undefined). In practice, for geometric formulas like $$V = \\frac{2}{3}\\pi r^3$$ with $$r > 0$$, $$\\frac{dV}{dr}$$ is always positive, so the reciprocal rule always works.\n\n+ Intuition: if $$V$$ changes rapidly with $$r$$ (large $$\\frac{dV}{dr}$$), then $$r$$ changes slowly with $$V$$ (small $$\\frac{dr}{dV}$$) — they're inverses of each other.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "\"The rate of decay of radioactive particles is proportional to the number of particles remaining.\" Write the differential equation and explain the significance of the negative sign. (2 steps)", "answer": "- Step 1: Let $$N$$ = number of particles, $$t$$ = time. \"Rate of decay\" means $$\\frac{dN}{dt}$$, and \"proportional to $$N$$\" means $$\\frac{dN}{dt} = kN$$ for some constant $$k$$. But \"decay\" means the number is decreasing, so $$\\frac{dN}{dt}$$ must be negative. Since $$N > 0$$, the constant $$k$$ must be negative. Convention: write $$\\frac{dN}{dt} = -kN$$ where $$k > 0$$ is a positive constant, making the minus sign explicit.\n- Step 2: The negative sign is crucial for the physics: it ensures the solution $$N(t) = N_0 e^{-kt}$$ describes exponential decay (decreasing over time), not exponential growth. Without the negative sign, $$N(t) = N_0 e^{kt}$$ would grow, contradicting \"decay.\"\n\n+ The general pattern: \"rate of **loss**/**decrease** proportional to quantity\" → $$\\frac{dQ}{dt} = -kQ$$ (negative sign). \"rate of **growth**/**increase** proportional to quantity\" → $$\\frac{dQ}{dt} = kQ$$ (positive sign).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Newton's law of cooling states: \"the rate of loss of temperature of a body is proportional to the excess temperature of the body over its surroundings.\" Write the differential equation and identify what $$\\theta_0$$ represents. (2 steps)", "answer": "- Step 1: Let $$\\theta$$ = temperature of the body, $$t$$ = time, $$\\theta_0$$ = temperature of the surroundings (a constant). \"Excess temperature\" is $$\\theta - \\theta_0$$ (how much hotter the body is than its environment). \"Rate of loss of temperature\" means $$\\frac{d\\theta}{dt}$$ is negative when the body is cooling. So: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$, where $$k > 0$$.\n- Step 2: $$\\theta_0$$ is the **ambient temperature** — the temperature of the surroundings that the body is cooling towards. As $$\\theta$$ approaches $$\\theta_0$$, the excess $$\\theta - \\theta_0$$ approaches zero, so $$\\frac{d\\theta}{dt}$$ also approaches zero: the body cools ever more slowly as it nears ambient temperature, never quite reaching it (in the model).\n\n+ The minus sign ensures: when $$\\theta > \\theta_0$$ (body hotter than surroundings), $$\\frac{d\\theta}{dt} < 0$$ (cooling down). If you forgot the minus sign, the body would heat up further when already hotter than surroundings — absurd.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "\"The rate of increase of ice thickness $$x$$ is inversely proportional to the square of $$x$$.\" Write the differential equation. What's the difference between \"inversely proportional to $$x^2$$\" and \"proportional to $$x^2$$\"? (2 steps)", "answer": "- Step 1: \"Rate of increase\" = $$\\frac{dx}{dt}$$ (positive, since thickness is growing). \"Inversely proportional to $$x^2$$\" means $$\\frac{dx}{dt} = \\frac{k}{x^2}$$, where $$k > 0$$ is a constant. The word \"inversely\" flips the relationship: the rate gets SMALLER as $$x$$ gets larger.\n- Step 2: Contrast with \"proportional to $$x^2$$\": that would give $$\\frac{dx}{dt} = kx^2$$, meaning the rate gets LARGER as $$x$$ grows — the ice would thicken ever faster, which is physically unrealistic for freezing. The inverse relationship $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ is more plausible: thicker ice insulates better, slowing further growth.\n\n+ Translation rules: \"proportional to $$Q$$\" → $$= kQ$$; \"inversely proportional to $$Q$$\" → $$= \\frac{k}{Q}$$; \"proportional to the square of $$Q$$\" → $$= kQ^2$$; \"inversely proportional to the square of $$Q$$\" → $$= \\frac{k}{Q^2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "A spherical snowman head loses volume at a rate proportional to its surface area: $$\\frac{dV}{dt} = -kA$$ where $$A = 4\\pi R^2$$ and $$V = \\frac{4}{3}\\pi R^3$$. Why does this simplify to $$\\frac{dR}{dt} = -k$$ (a constant rate of radius decrease)? Walk through the key insight. (3 steps)", "answer": "- Step 1: Use the chain rule: $$\\frac{dV}{dt} = \\frac{dV}{dR} \\times \\frac{dR}{dt}$$, so $$\\frac{dR}{dt} = \\frac{dV/dt}{dV/dR}$$.\n- Step 2: Compute $$\\frac{dV}{dR} = 4\\pi R^2$$ (derivative of $$\\frac{4}{3}\\pi R^3$$). Notice this is exactly the same as the surface area $$A = 4\\pi R^2$$! This is the key geometric insight: for a sphere, the rate of change of volume with respect to radius equals the surface area.\n- Step 3: Substitute: $$\\frac{dR}{dt} = \\frac{-kA}{dV/dR} = \\frac{-k \\cdot 4\\pi R^2}{4\\pi R^2} = -k$$. The $$4\\pi R^2$$ factors cancel completely, leaving a constant. The radius shrinks at a constant rate regardless of size — a smaller snowman head evaporates at the same rate (in cm/s of radius) as a larger one.\n\n+ This cancellation is specific to spheres. For a cube with $$V = s^3$$ and $$A = 6s^2$$, $$\\frac{dV}{ds} = 3s^2$$ does NOT equal $$A$$, so the rate of side-length decrease would depend on $$s$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Liquid pours into a container at $$30$$ cm³/s and leaks out at rate $$\\frac{2}{15}V$$ cm³/s. How do you combine these to write the overall rate equation $$\\frac{dV}{dt}$$? What determines the sign of each term? (2 steps)", "answer": "- Step 1: The overall rate of change of volume is the **inflow rate minus the outflow rate**: $$\\frac{dV}{dt} = 30 - \\frac{2}{15}V$$. Inflow is positive (adding volume), outflow is negative (removing volume). This is a fundamental principle: net rate = rate in - rate out.\n- Step 2: Rearranging to match the required form: $$-15\\frac{dV}{dt} = -15 \\times 30 + 15 \\times \\frac{2}{15}V = -450 + 2V = 2V - 450$$. So $$-15\\frac{dV}{dt} = 2V - 450$$, or equivalently $$\\frac{dV}{dt} = 30 - \\frac{2V}{15}$$.\n\n+ The equilibrium state: when $$\\frac{dV}{dt} = 0$$, volume stabilises at $$V = 30 \\times \\frac{15}{2} = 225$$ cm³. Below this, inflow exceeds outflow (volume rising); above it, outflow exceeds inflow (volume falling).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A cube's volume decreases at $$4.5$$ cm³/s. Why can't you immediately find the rate at which the side length decreases without knowing the current volume? Explain the chain of relationships. (2 steps)", "answer": "- Step 1: Let $$V = s^3$$ (volume of cube with side $$s$$). By the chain rule: $$\\frac{dV}{dt} = \\frac{dV}{ds} \\times \\frac{ds}{dt} = 3s^2 \\times \\frac{ds}{dt}$$. We know $$\\frac{dV}{dt} = -4.5$$, but $$\\frac{dV}{ds} = 3s^2$$ depends on the current side length $$s$$.\n- Step 2: Solving: $$\\frac{ds}{dt} = \\frac{dV/dt}{dV/ds} = \\frac{-4.5}{3s^2} = \\frac{-1.5}{s^2}$$. This depends on $$s$$ — you need the current side length (or equivalently, the current volume) to get a numerical answer. A small cube (small $$s$$) has its sides shrinking much faster than a large cube, because the same volume loss is a larger fraction of the total.\n\n+ Intuition: losing 4.5 cm³ from a 1000 cm³ cube barely affects the side length, but losing 4.5 cm³ from a 10 cm³ cube dramatically shrinks it. The chain rule captures this through the $$3s^2$$ factor.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "For the parametric equations $$x = 2t$$, $$y = t^2 - 3t + 2$$, find $$\\frac{dy}{dx}$$ in terms of $$t$$. Walk through the steps. (2 steps)", "answer": "- Step 1: Differentiate each equation with respect to $$t$$: $$\\frac{dx}{dt} = 2$$ (constant), $$\\frac{dy}{dt} = 2t - 3$$ (derivative of quadratic in $$t$$).\n- Step 2: Form the ratio: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{2t-3}{2}$$. The gradient is a linear function of $$t$$ — it increases as $$t$$ increases. At $$t = \\frac{3}{2}$$, the gradient is zero (stationary point); for $$t < \\frac{3}{2}$$ the gradient is negative; for $$t > \\frac{3}{2}$$ it's positive.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Find $$\\frac{dy}{dx}$$ in terms of $$x$$ and $$y$$ for the implicit equation $$x^2 + y^3 = 2$$. Walk through step by step. (3 steps)", "answer": "- Step 1: Differentiate both sides with respect to $$x$$, term by term. $$\\frac{d}{dx}(x^2) = 2x$$ (standard). $$\\frac{d}{dx}(y^3) = 3y^2\\frac{dy}{dx}$$ (chain rule — $$y$$ is a function of $$x$$). $$\\frac{d}{dx}(2) = 0$$ (constant). So: $$2x + 3y^2\\frac{dy}{dx} = 0$$.\n- Step 2: Isolate $$\\frac{dy}{dx}$$: move $$2x$$ to the other side: $$3y^2\\frac{dy}{dx} = -2x$$.\n- Step 3: Divide by $$3y^2$$: $$\\frac{dy}{dx} = -\\frac{2x}{3y^2}$$. This expression involves both $$x$$ and $$y$$ — you'd need specific coordinates to evaluate it numerically.\n\n+ Note: this is undefined when $$y = 0$$ (vertical tangent). At such points, $$x^2 = 2$$, giving $$x = \\pm\\sqrt{2}$$ — the curve has vertical tangents at these two points.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A circle's radius increases at $$0.4$$ cm/s. Find $$\\frac{dC}{dt}$$ where $$C$$ is the circumference, and interpret what this value means. (2 steps)", "answer": "- Step 1: Circumference $$C = 2\\pi r$$. By the chain rule: $$\\frac{dC}{dt} = \\frac{dC}{dr} \\times \\frac{dr}{dt} = 2\\pi \\times 0.4 = 0.8\\pi$$ cm/s.\n- Step 2: Interpretation: the circumference grows at a constant rate of approximately $$2.51$$ cm/s, regardless of the current radius. This is because $$\\frac{dC}{dr} = 2\\pi$$ is constant — each additional cm of radius always adds $$2\\pi$$ cm of circumference. Contrast with area, where $$\\frac{dA}{dr} = 2\\pi r$$ depends on $$r$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Find the equation of the tangent to the implicit curve $$x^2 + 3xy^2 - y^3 = 9$$ at the point $$(2, 1)$$. Walk through conceptually. (3 steps)", "answer": "- Step 1: Differentiate implicitly with respect to $$x$$: $$2x + 3(y^2 + x \\cdot 2y\\frac{dy}{dx}) - 3y^2\\frac{dy}{dx} = 0$$. The $$3xy^2$$ term requires the product rule: $$3[x \\cdot 2y\\frac{dy}{dx} + y^2 \\cdot 1]$$, and the $$y^3$$ term requires the chain rule: $$3y^2\\frac{dy}{dx}$$.\n- Step 2: Substitute $$(2,1)$$ immediately to simplify: $$2(2) + 3[1^2 + 2 \\cdot 2(1)\\frac{dy}{dx}] - 3(1)^2\\frac{dy}{dx} = 0$$, giving $$4 + 3[1 + 4\\frac{dy}{dx}] - 3\\frac{dy}{dx} = 0$$, i.e., $$4 + 3 + 12\\frac{dy}{dx} - 3\\frac{dy}{dx} = 0$$, so $$7 + 9\\frac{dy}{dx} = 0$$.\n- Step 3: Solve: $$\\frac{dy}{dx} = -\\frac{7}{9}$$, so the tangent equation is $$y - 1 = -\\frac{7}{9}(x - 2)$$, which rearranges to $$9y - 9 = -7x + 14$$, i.e., $$7x + 9y = 23$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "For the parametric curve $$x = \\frac{t}{1-t}$$, $$y = \\frac{t^2}{1-t}$$, find the points of zero gradient. Walk through the conceptual approach. (3 steps)", "answer": "- Step 1: Compute $$\\frac{dy}{dt}$$ and $$\\frac{dx}{dt}$$ using the quotient rule. For $$x = \\frac{t}{1-t}$$: $$\\frac{dx}{dt} = \\frac{(1-t)(1) - t(-1)}{(1-t)^2} = \\frac{1}{(1-t)^2}$$, always positive (for $$t \\neq 1$$), so the denominator of $$\\frac{dy}{dx}$$ is never zero — no vertical tangents.\n- Step 2: For $$y = \\frac{t^2}{1-t}$$: $$\\frac{dy}{dt} = \\frac{(1-t)(2t) - t^2(-1)}{(1-t)^2} = \\frac{2t - 2t^2 + t^2}{(1-t)^2} = \\frac{2t - t^2}{(1-t)^2} = \\frac{t(2-t)}{(1-t)^2}$$.\n- Step 3: Zero gradient when $$\\frac{dy}{dt} = 0$$: $$t(2-t) = 0$$, giving $$t = 0$$ or $$t = 2$$. At $$t = 0$$: point is (0, 0). At $$t = 2$$: $$x = \\frac{2}{-1} = -2$$, $$y = \\frac{4}{-1} = -4$$, point is $$(-2, -4)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "An inverted cone with semi-vertical angle $$30°$$ has salt draining at $$6$$ cm³/s. Given $$V = \\frac{1}{9}\\pi h^3$$, show that $$\\frac{dh}{dt}$$ is inversely proportional to $$h^2$$ and write the differential equation. (3 steps)", "answer": "- Step 1: Use the chain rule: $$\\frac{dV}{dt} = \\frac{dV}{dh} \\times \\frac{dh}{dt}$$, so $$\\frac{dh}{dt} = \\frac{dV/dt}{dV/dh}$$.\n- Step 2: Compute $$\\frac{dV}{dh} = \\frac{1}{9}\\pi \\cdot 3h^2 = \\frac{\\pi h^2}{3}$$. We're given $$\\frac{dV}{dt} = -6$$ (negative because volume is decreasing).\n- Step 3: So $$\\frac{dh}{dt} = \\frac{-6}{\\pi h^2/3} = \\frac{-18}{\\pi h^2} = -\\frac{18}{\\pi} \\cdot \\frac{1}{h^2}$$. This is inversely proportional to $$h^2$$ (the rate gets slower as the salt level drops, because the remaining salt is spread over a narrower cross-section). The differential equation is $$\\frac{dh}{dt} = -\\frac{k}{h^2}$$ where $$k = \\frac{18}{\\pi}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "For a parametric curve, can $$\\frac{dy}{dx}$$ exist at a point where both $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} = 0$$ simultaneously? What geometric situations can arise? (2 steps)", "answer": "- Step 1: The formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ gives $$\\frac{0}{0}$$ — undefined. The gradient might exist but cannot be found from this formula alone. You'd need higher-order analysis (second derivatives, limits) or converting to Cartesian form near that point.\n- Step 2: Possible geometric situations:\n+ A **cusp** — the curve reverses direction, like $$x = t^3$$, $$y = t^2$$ at $$t = 0$$ (the curve has a sharp point).\n+ A **smooth point with a well-defined tangent** — like $$x = t^2$$, $$y = t^2$$ at $$t = 0$$ (the curve passes through the origin along the line $$y = x$$, but both derivatives are zero there).\n+ A **point where the curve stops and starts** (self-intersection with different tangent directions at the same point).\n\nThe 0/0 case is ambiguous — you cannot simply conclude \"no gradient\" or \"zero gradient.\"", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "Why does implicit differentiation always differentiate with respect to $$x$$ (treating $$y$$ as the dependent variable), rather than with respect to $$y$$? What would change if you differentiated with respect to $$y$$ instead? (2 steps)", "answer": "- Step 1: We differentiate with respect to $$x$$ because we want $$\\frac{dy}{dx}$$ — the gradient of the curve when plotted with $$x$$ on the horizontal axis and $$y$$ on the vertical axis. This is the standard convention for sketching and interpreting graphs.\n- Step 2: If you differentiated with respect to $$y$$ instead, you'd get $$\\frac{dx}{dy}$$ — the rate of change of $$x$$ with respect to $$y$$. This is the reciprocal of the gradient: $$\\frac{dx}{dy} = \\frac{1}{dy/dx}$$ (when both are nonzero). For $$x^2 + y^3 = 2$$: differentiating w.r.t. $$y$$ gives $$2x\\frac{dx}{dy} + 3y^2 = 0$$, so $$\\frac{dx}{dy} = -\\frac{3y^2}{2x}$$, which is indeed $$\\frac{1}{-2x/(3y^2)}$$.\n\n+ Sometimes $$\\frac{dx}{dy}$$ is easier to find, and you can flip it to get $$\\frac{dy}{dx}$$ — but only where $$\\frac{dx}{dy} \\neq 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "When differentiating $$\\frac{6x^2}{y}$$ with respect to $$x$$, you can treat it as a product $$6x^2 \\cdot y^{-1}$$ or as a quotient. Walk through the product rule approach and show why it's cleaner. (3 steps)", "answer": "- Step 1: Rewrite $$\\frac{6x^2}{y} = 6x^2 y^{-1}$$, identifying $$u = 6x^2$$ and $$v = y^{-1}$$ as the two factors.\n- Step 2: Apply the product rule: $$\\frac{d}{dx}(6x^2 y^{-1}) = 6x^2 \\cdot \\frac{d}{dx}(y^{-1}) + y^{-1} \\cdot \\frac{d}{dx}(6x^2)$$. Now $$\\frac{d}{dx}(y^{-1}) = -y^{-2}\\frac{dy}{dx}$$ (chain rule on $$y^{-1}$$), and $$\\frac{d}{dx}(6x^2) = 12x$$.\n- Step 3: Result: $$6x^2(-y^{-2}\\frac{dy}{dx}) + y^{-1}(12x) = -\\frac{6x^2}{y^2}\\frac{dy}{dx} + \\frac{12x}{y}$$, or equivalently $$\\frac{12x}{y} - \\frac{6x^2}{y^2}\\frac{dy}{dx}$$.\n\n+ The quotient rule would give the same result but with a more complex expression before simplification. Rewriting as a product with negative powers is often cleaner for implicit differentiation because the $$\\frac{dy}{dx}$$ terms are more visible.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "The curve $$2x^2 + 3y^2 - x + 6xy + 5 = 0$$ passes through $$(1, -2)$$. Find the tangent equation at this point, giving your answer as $$ax + by + c = 0$$ with integer coefficients. Walk through the key steps conceptually. (3 steps)", "answer": "- Step 1: Differentiate implicitly w.r.t. $$x$$: $$4x + 6y\\frac{dy}{dx} - 1 + 6(y + x\\frac{dy}{dx}) = 0$$, where the $$6xy$$ term uses the product rule: $$6(x\\frac{dy}{dx} + y)$$.\n- Step 2: Substitute $$(1, -2)$$: $$4(1) + 6(-2)\\frac{dy}{dx} - 1 + 6((-2) + 1\\cdot\\frac{dy}{dx}) = 0$$, giving $$4 - 12\\frac{dy}{dx} - 1 - 12 + 6\\frac{dy}{dx} = 0$$, i.e., $$-9 - 6\\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = -\\frac{9}{6} = -\\frac{3}{2}$$.\n- Step 3: Tangent equation: $$y - (-2) = -\\frac{3}{2}(x - 1)$$, i.e., $$y + 2 = -\\frac{3}{2}(x - 1)$$, multiplying by 2: $$2y + 4 = -3x + 3$$, rearranging: $$3x + 2y + 1 = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "A population grows at a rate proportional to its size, and pondweed is also being eaten by fish at a constant rate $$Q$$. Write the differential equation for the amount of pondweed $$P$$ over time $$t$$. (2 steps)", "answer": "- Step 1: \"Grows at a rate proportional to size\" gives a positive term: $$+kP$$ (growth). \"Removed by fish at constant rate $$Q$$\" gives a negative term: $$-Q$$ (constant removal, not proportional to $$P$$).\n- Step 2: Combine: $$\\frac{dP}{dt} = kP - Q$$. The net rate is growth minus consumption. If $$P$$ is large enough ($$P > Q/k$$), growth exceeds removal and the population increases. If $$P < Q/k$$, removal exceeds growth and the population decreases toward zero.\n\n+ This differs from pure exponential growth ($$\\frac{dP}{dt} = kP$$) because of the constant drain $$Q$$. The equilibrium population is $$P = Q/k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A circular oil patch has radius $$r$$ that increases at a rate inversely proportional to the radius. Write the differential equation and explain the physical intuition: does the patch grow faster or slower as it gets larger? (2 steps)", "answer": "- Step 1: \"Rate of increase of $$r$$ inversely proportional to $$r$$\" means $$\\frac{dr}{dt} = \\frac{k}{r}$$ for some positive constant $$k$$", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}], "count": 37}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Why can't we always find $$\\frac{dy}{dx}$$ directly for parametric curves, and how does the chain rule logically connect the rates $$\\frac{dy}{dt}$$, $$\\frac{dx}{dt}$$, and $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: Parametric equations define both $$x$$ and $$y$$ in terms of a third variable (the parameter, $$t$$). Often, converting these to a single Cartesian equation $$y = f(x)$$ is algebraically difficult or impossible (e.g., for loops or self-intersecting curves), so we need a direct method.\n- Step 2: The chain rule states that the rate of change of $$y$$ with respect to $$t$$ can be broken down into the rate of change of $$y$$ with respect to $$x$$, multiplied by the rate of change of $$x$$ with respect to $$t$$. Mathematically, this is $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$.\n- Step 3: By rearranging the chain rule expression algebraically, we isolate the gradient $$\\frac{dy}{dx}$$ to get the parametric differentiation formula: $$\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}}$$. This allows us to find the gradient using the rates with respect to the parameter directly.\n\nThink of it as traveling along a path: your vertical speed $$(\\frac{dy}{dt})$$ divided by your horizontal speed $$(\\frac{dx}{dt})$$ gives your instantaneous slope $$(\\frac{dy}{dx})$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "Starting from the chain rule statement $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$, derive the formula for $$\\frac{dy}{dx}$$ in terms of $$t$$. What condition must be true for this formula to be valid? (2 steps)", "answer": "- Step 1: To isolate $$\\frac{dy}{dx}$$, divide both sides of the equation $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$ by $$\\frac{dx}{dt}$$. This yields $$\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}}$$.\n- Step 2: For this division to be mathematically valid, the denominator $$\\frac{dx}{dt}$$ must not equal zero. If $$\\frac{dx}{dt} = 0$$, the tangent to the curve is vertical, and the gradient $$\\frac{dy}{dx}$$ is undefined.\n\nAlways check that $$\\frac{dx}{dt} \\neq 0$$ before calculating the gradient; a zero denominator signals a vertical tangent or a cusp.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "For a curve defined by $$x=f(t)$$ and $$y=g(t)$$, a student sets $$\\frac{dx}{dt} = 0$$ to find the stationary points (where $$\\frac{dy}{dx} = 0$$). Explain why this is flawed logic, and state the correct condition for a stationary point. What geometric feature might occur if $$\\frac{dy}{dt}=0$$ and $$\\frac{dx}{dt}=0$$ simultaneously? (3 steps)", "answer": "- Step 1: The logic is flawed because setting $$\\frac{dx}{dt} = 0$$ means the denominator of $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ is zero. This results in an undefined (infinite) gradient, which corresponds to a vertical tangent, not a horizontal (stationary) one.\n- Step 2: For a stationary point, the gradient $$\\frac{dy}{dx}$$ must be exactly zero. For a fraction to equal zero, its numerator must be zero (while the denominator is non-zero). Therefore, the correct condition is $$\\frac{dy}{dt} = 0$$ provided $$\\frac{dx}{dt} \\neq 0$$.\n- Step 3: If both $$\\frac{dy}{dt} = 0$$ and $$\\frac{dx}{dt} = 0$$ simultaneously, the formula $$\\frac{dy}{dx}$$ becomes the indeterminate form $$\\frac{0}{0}$$. Geometrically, this often indicates a cusp (where the curve reverses direction sharply) or a self-intersection, requiring further analysis rather than simple evaluation.\n\nA stationary point requires the vertical velocity to vanish while horizontal movement continues.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "Given a parametric curve where the gradient $$\\frac{dy}{dx} = m$$ at a specific parameter value $$t=t_0$$, what is the gradient of the normal to the curve at that point, and what is the geometric relationship between the tangent and the normal? (2 steps)", "answer": "- Step 1: The normal to a curve at any point is defined as the line perpendicular to the tangent at that point. Geometrically, if two lines are perpendicular, the product of their gradients is $$-1$$.\n- Step 2: If the tangent has gradient $$m$$, the normal has gradient $$-\\frac{1}{m}$$. Therefore, if $$\\frac{dy}{dx} = m$$ at $$t=t_0$$, the gradient of the normal is $$-\\frac{1}{m}$$.\n\nAlways flip the fraction and change the sign to jump from the tangent gradient to the normal gradient.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A curve has parametric equations $$x = t^2$$, $$y = t^3 - t$$. Without fully calculating the exact numerical value, determine the sign (positive, negative, or zero) of the gradient $$\\frac{dy}{dx}$$ at the point where $$t = -1$$. (3 steps)", "answer": "- Step 1: Find the sign of $$\\frac{dx}{dt}$$. Differentiating $$x = t^2$$ gives $$\\frac{dx}{dt} = 2t$$. At $$t = -1$$, $$\\frac{dx}{dt} = 2(-1) = -2$$, which is negative.\n- Step 2: Find the sign of $$\\frac{dy}{dt}$$. Differentiating $$y = t^3 - t$$ gives $$\\frac{dy}{dt} = 3t^2 - 1$$. At $$t = -1$$, $$\\frac{dy}{dt} = 3(-1)^2 - 1 = 3 - 1 = 2$$, which is positive.\n- Step 3: Combine them using $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$. We have a positive numerator and a negative denominator. A positive divided by a negative is negative, so the gradient $$\\frac{dy}{dx}$$ at $$t = -1$$ is negative.\n\nDirectional reasoning saves time: positive vertical speed and negative horizontal speed means the curve moves down-right, giving a negative slope.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What does it mean for an equation to be defined \"implicitly\" rather than \"explicitly\", and why is implicit differentiation a necessary tool for such equations? (2 steps)", "answer": "- Step 1: An equation is defined \"explicitly\" if the dependent variable $$y$$ is isolated on one side, such as $$y = f(x)$$. An \"implicit\" equation mixes $$x$$ and $$y$$ together, such as $$x^2 + y^2 = 25$$ or $$\\cos(x+y) = 2x$$, without $$y$$ being isolated.\n- Step 2: Implicit differentiation is necessary because rearranging an implicit equation into the explicit form $$y = f(x)$$ can be algebraically messy, impossible, or result in losing branches of the curve (like the negative square root). Implicit differentiation allows us to find $$\\frac{dy}{dx}$$ directly without solving for $$y$$ first.\n\nImplicit differentiation treats $$y$$ as an unknown function of $$x$$ rather than an isolated variable.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When differentiating an equation implicitly with respect to $$x$$, explain the step-by-step reasoning for why differentiating a term like $$y^3$$ with respect to $$x$$ results in $$3y^2 \\frac{dy}{dx}$$ rather than just $$3y^2$$. (3 steps)", "answer": "- Step 1: Recognize that $$y$$ is not an independent variable; it is a function of $$x$$ (i.e., $$y = y(x)$$). Therefore, $$y^3$$ is a composite function, much like $$\\sin^3(x)$$ or $$(2x+1)^3$$.\n- Step 2: Apply the chain rule for composite functions: $$\\frac{d}{dx}[f(g(x))] = f'(g(x)) \\times g'(x)$$. Here, the outer function is \"cube\" and the inner function is $$y$$.\n- Step 3: Differentiating the outer function gives $$3y^2$$. Multiplying by the derivative of the inner function with respect to $$x$$ gives $$\\frac{dy}{dx}$$. Thus, the full derivative is $$3y^2 \\frac{dy}{dx}$$. Forgetting the $$\\frac{dy}{dx}$$ is the most common error in implicit differentiation.\n\nWhenever you differentiate a term containing $$y$$ with respect to $$x$$, you must tag on a $$\\frac{dy}{dx}$$ at the end.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Using the product rule, walk through the differentiation of the term $$xy$$ with respect to $$x$$. Why is $$y$$ treated differently from a standard constant when taking the derivative? (3 steps)", "answer": "- Step 1: Identify $$xy$$ as a product of two functions of $$x$$: let $$u = x$$ and $$v = y$$. Because $$y$$ depends on $$x$$, it is not a constant, so the product rule must be applied.\n- Step 2: The product rule states $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$. Substituting our functions, we get $$x\\frac{dy}{dx} + y\\frac{dx}{dx}$$.\n- Step 3: Since $$\\frac{dx}{dx} = 1$$, the result simplifies to $$x\\frac{dy}{dx} + y$$. The $$y$$ is treated differently from a constant because a constant would have a derivative of 0, but $$y$$ varies as $$x$$ varies, hence the $$\\frac{dy}{dx}$$ term appears.\n\nThe term $$xy$$ means \"$$x$$ multiplied by the function $$y(x)$$\", requiring both the change in $$x$$ and the change in $$y$$ to be accounted for.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "After implicitly differentiating an equation, you typically have an expression containing $$x$$, $$y$$, and $$\\frac{dy}{dx}$$ terms. What is the general algebraic strategy to isolate $$\\frac{dy}{dx}$$, and why is it often beneficial to substitute a specific coordinate point *before* isolating $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: The strategy is to treat $$\\frac{dy}{dx}$$ as the unknown variable in a linear equation. Collect all terms containing $$\\frac{dy}{dx}$$ on one side of the equals sign, and move all terms without $$\\frac{dy}{dx}$$ to the other side.\n- Step 2: Factor out $$\\frac{dy}{dx}$$ from the collected terms, then divide both sides by the coefficient (the bracketed expression next to $$\\frac{dy}{dx}$$) to isolate it.\n- Step 3: Substituting the specific $$(x, y)$$ coordinate *before* isolating $$\\frac{dy}{dx}$$ is often beneficial because it turns the algebraic expression into a simple numerical equation. This avoids messy algebra with $$x$$ and $$y$$ symbols and reduces the chance of making errors during factorization and division.\n\nSubstituting early simplifies the equation immediately, making the algebra significantly easier to manage.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "To find the stationary points on an implicitly defined curve, you set $$\\frac{dy}{dx} = 0$$. If your derived expression for $$\\frac{dy}{dx}$$ is a fraction $$\\frac{A(x,y)}{B(x,y)}$$, which part of the fraction must equal zero, and why? What does it mean geometrically if the denominator equals zero? (3 steps)", "answer": "- Step 1: For a fraction to equal zero, its numerator must equal zero (provided the denominator is not also zero). Therefore, you set $$A(x,y) = 0$$ to find the coordinates of stationary points.\n- Step 2: The denominator $$B(x,y)$$ cannot be zero at a stationary point, because division by zero is undefined, meaning the gradient is infinite.\n- Step 3: If the denominator $$B(x,y) = 0$$ (and the numerator is non-zero), it means $$\\frac{dy}{dx}$$ is undefined. Geometrically, this corresponds to a vertical tangent or a cusp on the curve, where the slope is infinite.\n\nZero numerator = horizontal tangent (stationary). Zero denominator = vertical tangent (undefined gradient).", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Find the gradient of the curve defined implicitly by $$x^2 + y^2 = 25$$ at the point $$(3, 4)$$. Walk through the differentiation and substitution conceptually. (3 steps)", "answer": "- Step 1: Differentiate both sides with respect to $$x$$ term by term. The derivative of $$x^2$$ is $$2x$$. For $$y^2$$, apply the chain rule to get $$2y\\frac{dy}{dx}$$. The derivative of the constant 25 is 0. This gives $$2x + 2y\\frac{dy}{dx} = 0$$.\n- Step 2: Isolate $$\\frac{dy}{dx}$$. Subtract $$2x$$ from both sides to get $$2y\\frac{dy}{dx} = -2x$$, then divide by $$2y$$ to get $$\\frac{dy}{dx} = -\\frac{x}{y}$$.\n- Step 3: Substitute the point $$(3, 4)$$ into the expression. This gives $$\\frac{dy}{dx} = -\\frac{3}{4}$$. The gradient at $$(3,4)$$ is $$-\\frac{3}{4}$$.\n\nThis confirms the geometric intuition: on a circle, the gradient at a point is the negative ratio of the x-coordinate to the y-coordinate.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "If a variable $$A$$ depends on $$r$$, and $$r$$ depends on time $$t$$, explain how the chain rule allows you to connect the rate $$\\frac{dA}{dt}$$ to the rates $$\\frac{dA}{dr}$$ and $$\\frac{dr}{dt}$$. (2 steps)", "answer": "- Step 1: The chain rule connects rates of change in linked variables. Since $$A$$ is a function of $$r$$, and $$r$$ is a function of $$t$$, the rate of change of $$A$$ with respect to $$t$$ is the product of the rate of change of $$A$$ with respect to $$r$$ and the rate of change of $$r$$ with respect to $$t$$.\n- Step 2: Mathematically, this is written as $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dt}$$. This allows you to find the overall rate of change $$\\frac{dA}{dt}$$ even if you only know the intermediate rates.\n\nThink of it as multiplying the \"sensitivity of A to r\" by the \"speed of r over time\" to get the \"speed of A over time\".", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "If you are given the rate $$\\frac{dV}{dr}$$ but need $$\\frac{dr}{dV}$$ for a chain rule calculation, how do you find it? Provide the general principle. (2 steps)", "answer": "- Step 1: The derivatives $$\\frac{dV}{dr}$$ and $$\\frac{dr}{dV}$$ are reciprocals of each other. This is a general property of inverse functions and related rates.\n- Step 2: Therefore, to find $$\\frac{dr}{dV}$$, you simply take the reciprocal of $$\\frac{dV}{dr}$$. Mathematically, $$\\frac{dr}{dV} = \\frac{1}{\\frac{dV}{dr}}$$, provided $$\\frac{dV}{dr} \\neq 0$$.\n\nFlipping the fraction flips the rate direction; just ensure the denominator is not zero.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A population $$P$$ grows at a rate proportional to its size. Write down the differential equation that represents this, explaining the role of the constant $$k$$ and why it is positive. (3 steps)", "answer": "- Step 1: \"Rate of change of population\" translates to the derivative $$\\frac{dP}{dt}$$, where $$t$$ is time.\n- Step 2: \"Proportional to its size\" means this rate is equal to a constant $$k$$ multiplied by the population $$P$$. This gives the equation $$\\frac{dP}{dt} = kP$$.\n- Step 3: The constant $$k$$ is the constant of proportionality. It is positive because the population is \"growing\", meaning the rate of change $$\\frac{dP}{dt}$$ must be positive. Since $$P$$ (population size) is always positive, $$k$$ must also be positive to ensure their product is positive.\n\nIf the population were decreasing, the word \"loss\" or \"decreases\" would require a negative sign, often written as $$\\frac{dP}{dt} = -kP$$ with $$k>0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A snowman's head loses volume by evaporation at a rate proportional to its surface area. If $$V$$ is volume and $$t$$ is time, explain why the differential equation is $$\\frac{dV}{dt} = -kA$$ rather than $$\\frac{dV}{dt} = kA$$. (2 steps)", "answer": "- Step 1: The phrase \"loses volume\" indicates that the volume is decreasing over time. Therefore, the rate of change of volume with respect to time, $$\\frac{dV}{dt}$$, must be negative.\n- Step 2: Surface area $$A$$ is a positive quantity. If the equation were $$\\frac{dV}{dt} = kA$$ with a positive $$k$$, the volume would be increasing. To make the rate negative, we must introduce a negative sign, giving $$\\frac{dV}{dt} = -kA$$ where $$k$$ is a positive constant.\n\nThe sign of the differential equation is determined by whether the quantity is increasing (positive) or decreasing (negative) over time.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "State Newton's Law of Cooling in terms of a differential equation. What does each term represent, and why is the excess temperature $$(\\theta - \\theta_0)$$ used instead of just the body's temperature $$\\theta$$? (3 steps)", "answer": "- Step 1: The differential equation is $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$, where $$\\theta$$ is the temperature of the body, $$\\theta_0$$ is the temperature of the surroundings, and $$t$$ is time.\n- Step 2: The term $$(\\theta - \\theta_0)$$ represents the excess temperature—the difference between the body and its environment. This is used because cooling stops when the body reaches the surrounding temperature (i.e., when $$\\theta = \\theta_0$$, the rate $$\\frac{d\\theta}{dt}$$ becomes 0).\n- Step 3: The $$-k$$ term indicates that the rate of temperature loss is proportional to this difference, and the negative sign ensures the temperature is decreasing (moving towards $$\\theta_0$$) when $$\\theta > \\theta_0$$.\n\nNewton's Law of Cooling relies on the *difference* in temperature, not the absolute temperature, because heat transfer is driven by thermal imbalance.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "Liquid pours into a container at a constant rate of $$30 \\text{ cm}^3\\text{s}^{-1}$$ and leaks out at a rate of $$\\frac{2}{15}V \\text{ cm}^3\\text{s}^{-1}$$. Explain how to construct the differential equation for the rate of change of volume $$V$$ with respect to time $$t$$. (3 steps)", "answer": "- Step 1: The overall rate of change of volume, $$\\frac{dV}{dt}$$, is determined by the difference between the rate at which liquid enters and the rate at which liquid leaves the container.\n- Step 2: The inflow rate is a constant $$30$$. The outflow rate depends on the current volume and is given as $$\\frac{2}{15}V$$.\n- Step 3: Subtract the outflow from the inflow to find the net rate: $$\\frac{dV}{dt} = \\text{inflow} - \\text{outflow} = 30 - \\frac{2}{15}V$$. This can also be rearranged to $$15\\frac{dV}{dt} = 450 - 2V$$ or $$-15\\frac{dV}{dt} = 2V - 450$$.\n\nFor connected rates involving tanks or populations, Net Rate = Rate In - Rate Out.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "The radius $$r$$ of a circle increases at a constant rate of $$0.4 \\text{ cm/s}$$. Is the rate of increase of the area $$\\frac{dA}{dt}$$ constant, increasing, or decreasing as the circle gets larger? Explain your reasoning using the chain rule. (3 steps)", "answer": "- Step 1: Use the chain rule to connect the rates: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dt}$$. We know the area formula is $$A = \\pi r^2$$, so $$\\frac{dA}{dr} = 2\\pi r$$.\n- Step 2: We are given that the radius increases at a constant rate, so $$\\frac{dr}{dt} = 0.4$$. Substituting this in gives $$\\frac{dA}{dt} = 2\\pi r \\times 0.4 = 0.8\\pi r$$.\n- Step 3: The expression for $$\\frac{dA}{dt}$$ is $$0.8\\pi r$$. Since $$r$$ is increasing over time, the rate of change of the area itself must be increasing. The circle adds area faster as it gets larger.\n\nEven if the radius grows at a steady pace, the area expands increasingly faster because the circumference (where new area is added) is getting longer.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Given $$y = x^x$$, we cannot apply the standard power rule or exponential rule directly. Walk through the strategy of taking natural logarithms on both sides and using implicit differentiation to find $$\\frac{dy}{dx}$$. (4 steps)", "answer": "- Step 1: Take the natural logarithm of both sides to bring the exponent down: $$\\ln y = \\ln(x^x)$$, which simplifies to $$\\ln y = x \\ln x$$ using log rules.\n- Step 2: Differentiate both sides implicitly with respect to $$x$$. The left side becomes $$\\frac{1}{y}\\frac{dy}{dx}$$. The right side requires the product rule on $$x \\ln x$$: $$1 \\cdot \\ln x + x \\cdot \\frac{1}{x} = \\ln x + 1$$.\n- Step 3: Equate the derivatives: $$\\frac{1}{y}\\frac{dy}{dx} = \\ln x + 1$$. Multiply both sides by $$y$$ to isolate $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx} = y(\\ln x + 1)$$.\n- Step 4: Substitute the original expression for $$y$$ back into the equation, since we want the answer in terms of $$x$$. This yields $$\\frac{dy}{dx} = x^x(\\ln x + 1)$$.\n\nLogarithmic differentiation is the essential trick for variables raised to the power of variables.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A student finds the equation of a tangent to a parametric curve and then tries to find where the tangent intersects the curve again by substituting the parametric equations into the tangent equation. Why does solving for the parameter $$t$$ yield the original point as well as any new intersection points? (2 steps)", "answer": "- Step 1: The tangent line touches the curve at the original point by definition. Therefore, the coordinates of the original point satisfy both the equation of the curve and the equation of the tangent line.\n- Step 2: When you substitute the parametric equations into the tangent equation, you are finding *all* parameter values $$t$$ where the curve meets the line. Since the line is tangent at the original parameter $$t_0$$, that value will be a solution (often a repeated root if the line is tangent, but at least a root).\nTo find *other* intersection points, you must factor out the known $$(t - t_0)$$ term and solve the remaining polynomial for different roots.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "The thickness of ice $$x$$ increases at a rate inversely proportional to the square of $$x$$. Formulate the differential equation for this situation and explain the sign of the constant of proportionality. (3 steps)", "answer": "- Step 1: \"Rate of increase of $$x$$\" translates to the derivative $$\\frac{dx}{dt}$$.\n- Step 2: \"Inversely proportional to the square of $$x$$\" means the rate is equal to a constant divided by $$x^2$$. This gives the basic structure $$\\frac{dx}{dt} = \\frac{k}{x^2}$$.\n- Step 3: Because the ice thickness is \"increasing\", the rate $$\\frac{dx}{dt}$$ must be positive. Since $$x^2$$ is always positive, the constant $$k$$ must also be positive to ensure a positive rate of increase. The final equation is $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ with $$k > 0$$.\n\n\"Inversely proportional\" puts the variable in the denominator; \"increasing\" dictates the positive sign of the constant.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Given that $$a^x = e^{kx}$$, explain how to find the value of $$k$$ in terms of $$a$$, and use this to deduce the derivative of $$a^x$$ with respect to $$x$$. (3 steps)", "answer": "- Step 1: Take the natural logarithm of both sides of $$a^x = e^{kx}$$ to get $$\\ln(a^x) = \\ln(e^{kx})$$, which simplifies to $$x \\ln a = kx$$.\n- Step 2: Divide both sides by $$x$$ (assuming $$x \\neq 0$$) to solve for $$k$$. This shows that $$k = \\ln a$$, meaning $$a^x$$ can be written as $$e^{x \\ln a}$$.\n- Step 3: Differentiate $$e^{x \\ln a}$$ with respect to $$x$$. The derivative of $$e^{mx}$$ is $$me^{mx}$$, so here it is $$(\\ln a)e^{x \\ln a}$$. Substituting $$a^x$$ back for $$e^{x \\ln a}$$, we get the derivative $$\\frac{d}{dx}(a^x) = a^x \\ln a$$.\n\nAny exponential base $$a$$ can be converted to base $$e$$, revealing that its derivative is just the original function scaled by $$\\ln a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Explain why the second derivative $$\\frac{d^2y}{dx^2}$$ for a parametric curve cannot be found by simply differentiating the expression for $$\\frac{dy}{dx}$$ with respect to $$t$$. What is the correct procedure? (3 steps)", "answer": "- Step 1: The second derivative is defined as the rate of change of the first derivative with respect to $$x$$: $$\\frac{d^2y}{dx^2} = \\frac{d}{dx}\\left(\\frac{dy}{dx}\\right)$$. Simply differentiating with respect to $$t$$ gives $$\\frac{d}{dt}\\left(\\frac{dy}{dx}\\right)$$, which is the wrong denominator.\n- Step 2: Since $$\\frac{dy}{dx}$$ is typically expressed as a function of $$t$$ (say, $$g(t)$$), we must use the chain rule to differentiate it with respect to $$x$$. The chain rule gives $$\\frac{d}{dx}(g(t)) = \\frac{d}{dt}(g(t)) \\times \\frac{dt}{dx}$$.\n- Step 3: Since $$\\frac{dt}{dx}$$ is the reciprocal of $$\\frac{dx}{dt}$$, the correct formula for the second derivative is $$\\frac{d^2y}{dx^2} = \\frac{d}{dt}\\left(\\frac{dy}{dx}\\right) \\div \\frac{dx}{dt}$$. You must differentiate the first derivative with respect to $$t$$, and then divide by $$\\frac{dx}{dt}$$.\n\nA common trap is treating $$\\frac{d^2y}{dx^2}$$ as $$\\frac{d^2y/dt^2}{d^2x/dt^2}$$; this is completely wrong. You must differentiate the entire gradient function $$\\frac{dy}{dx}$$ and divide by $$\\frac{dx}{dt}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}], "count": 23}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does the parametric derivative formula $\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}}$ work? Explain the intuition and derivation. (3 steps)", "answer": "- Step 1: Recall the chain rule, which relates derivatives of composite functions. If $ y $ and $ x $ are both functions of a parameter $ t $, then $ \\frac{dy}{dt} = \\frac{dy}{dx} \\cdot \\frac{dx}{dt} $.  \n- Step 2: Rearrange the chain rule equation to solve for $ \\frac{dy}{dx} $:  \n  $$\n  \\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}} \\quad \\text{(provided } \\frac{dx}{dt} \\neq 0\\text{)}.\n  $$  \n- Step 3: Intuitively, $ \\frac{dy}{dx} $ measures how $ y $ changes with $ x $, but since both depend on $ t $, you divide their rates of change with respect to $ t $ to eliminate the parameter.  \n\n**Takeaway:** This formula allows direct computation of $ \\frac{dy}{dx} $ without eliminating $ t $, leveraging the chain rule.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Differentiate $ y = x^2(1 - 3x)^4 $ using the product rule. (3 steps)", "answer": "- Step 1: Let $ u = x^2 $ and $ v = (1 - 3x)^4 $. Compute their derivatives:  \n  $$\n  u' = 2x, \\quad v' = 4(1 - 3x)^3 \\cdot (-3) = -12(1 - 3x)^3.\n  $$  \n- Step 2: Apply the product rule $ \\frac{dy}{dx} = u'v + uv' $:  \n  $$\n  \\frac{dy}{dx} = 2x(1 - 3x)^4 + x^2(-12)(1 - 3x)^3.\n  $$  \n- Step 3: Factor common terms:  \n  $$\n  \\frac{dy}{dx} = 2x(1 - 3x)^3\\left[(1 - 3x) - 6x\\right] = 2x(1 - 3x)^3(1 - 9x).\n  $$  \n\n**Takeaway:** The product rule systematically combines the derivatives of individual functions, preserving their interdependence.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Given $ x^2 + 3xy^2 - y^3 = 9 $, find $ \\frac{dy}{dx} $ in terms of $ x $ and $ y $. (4 steps)", "answer": "- Step 1: Differentiate each term with respect to $ x $, applying the chain rule for $ y $:  \n  $$\n  \\frac{d}{dx}(x^2) + \\frac{d}{dx}(3xy^2) - \\frac{d}{dx}(y^3) = \\frac{d}{dx}(9).\n  $$  \n- Step 2: Compute term-by-term:  \n  $$\n  2x + 3\\left(y^2 + x \\cdot 2y \\cdot \\frac{dy}{dx}\\right) - 3y^2 \\cdot \\frac{dy}{dx} = 0.\n  $$  \n- Step 3: Expand and collect $ \\frac{dy}{dx} $ terms:  \n  $$\n  2x + 3y^2 + 6xy \\cdot \\frac{dy}{dx} - 3y^2 \\cdot \\frac{dy}{dx} = 0.\n  $$  \n- Step 4: Solve for $ \\frac{dy}{dx} $:  \n  $$\n  \\frac{dy}{dx}(6xy - 3y^2) = -2x - 3y^2 \\quad \\Rightarrow \\quad \\frac{dy}{dx} = \\frac{-2x - 3y^2}{6xy - 3y^2}.\n  $$  \n\n**Takeaway:** Implicit differentiation treats $ y $ as a function of $ x $, allowing differentiation of equations not explicitly solved for $ y $.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Derive the derivative of $ \\sin x $ from first principles. (4 steps)", "answer": "- Step 1: Use the definition of the derivative:  \n  $$\n  \\frac{d}{dx} \\sin x = \\lim_{h \\to 0} \\frac{\\sin(x + h) - \\sin x}{h}.\n  $$  \n- Step 2: Apply the sine addition formula:  \n  $$\n  \\sin(x + h) = \\sin x \\cos h + \\cos x \\sin h.\n  $$  \n  Substituting:  \n  $$\n  \\frac{\\sin(x + h) - \\sin x}{h} = \\sin x \\cdot \\frac{\\cos h - 1}{h} + \\cos x \\cdot \\frac{\\sin h}{h}.\n  $$  \n- Step 3: Evaluate limits $ \\lim_{h \\to 0} \\frac{\\cos h - 1}{h} = 0 $ and $ \\lim_{h \\to 0} \\frac{\\sin h}{h} = 1 $.  \n- Step 4: Combine results:  \n  $$\n  \\frac{d}{dx} \\sin x = \\cos x.\n  $$  \n\n**Takeaway:** The derivative of $ \\sin x $ arises from its periodic properties and small-angle approximations $ \\sin h \\approx h $, $ \\cos h \\approx 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "The radius of a snowman’s head decreases at a rate proportional to its surface area. Given $ V = \\frac{4}{3}\\pi R^3 $ and $ A = 4\\pi R^2 $, derive $ \\frac{dR}{dt} $. (4 steps)", "answer": "- Step 1: Relate $ \\frac{dV}{dt} $ to $ A $: $ \\frac{dV}{dt} = -kA $, where $ k > 0 $.  \n- Step 2: Express $ \\frac{dV}{dt} $ via the chain rule:  \n  $$\n  \\frac{dV}{dt} = \\frac{dV}{dR} \\cdot \\frac{dR}{dt} = 4\\pi R^2 \\cdot \\frac{dR}{dt}.\n  $$  \n- Step 3: Substitute $ A = 4\\pi R^2 $ into $ \\frac{dV}{dt} = -kA $:  \n  $$\n  4\\pi R^2 \\cdot \\frac{dR}{dt} = -k \\cdot 4\\pi R^2.\n  $$  \n- Step 4: Divide both sides by $ 4\\pi R^2 $:  \n  $$\n  \\frac{dR}{dt} = -k.\n  $$  \n\n**Takeaway:** The radius decreases at a constant rate $ k $, independent of $ R $, because the surface area and volume derivative cancel $ R^2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How does the second derivative $ \\frac{d^2y}{dx^2} $ help determine the concavity of a parametric curve $ x(t), y(t) $? (3 steps)", "answer": "- Step 1: Compute $ \\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}} $, then differentiate again with respect to $ x $:  \n  $$\n  \\frac{d^2y}{dx^2} = \\frac{d}{dt}\\left(\\frac{dy}{dx}\\right) \\cdot \\frac{1}{\\frac{dx}{dt}}.\n  $$  \n- Step 2: If $ \\frac{d^2y}{dx^2} > 0 $, the curve is concave upward; if $ < 0 $, concave downward.  \n- Step 3: For example, if $ \\frac{d^2y}{dx^2} = 0 $, check higher derivatives or inflection points.  \n\n**Takeaway:** The second derivative in parametric form reveals how the slope’s rate of change affects the curve’s shape.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Compare the product rule and quotient rule. Why are they algebraically equivalent? (2 steps)", "answer": "- Step 1: The quotient rule is a special case of the product rule. For $ \\frac{u}{v} $, rewrite as $ u \\cdot v^{-1} $ and apply the product rule:  \n  $$\n  \\frac{d}{dx}\\left(u v^{-1}\\right) = u' v^{-1} + u (-v^{-2} v') = \\frac{u'v - uv'}{v^2}.\n  $$  \n- Step 2: Both rules derive from the chain rule and multiplication. The quotient rule simplifies the process for division, while the product rule applies broadly.  \n\n**Takeaway:** Mastery of the product rule allows deriving the quotient rule, emphasizing their interconnectedness.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Differentiate $ y = \\ln(\\sin x) $. What is the second derivative $ y'' $? (3 steps)", "answer": "- Step 1: First derivative via chain rule:  \n  $$\n  y' = \\frac{1}{\\sin x} \\cdot \\cos x = \\cot x.\n  $$  \n- Step 2: Differentiate $ \\cot x $:  \n  $$\n  y'' = \\frac{d}{dx} \\cot x = -\\csc^2 x.\n  $$  \n- Step 3: Interpret concavity: Since $ y'' = -\\csc^2 x < 0 $ for all $ x $, the function is concave downward.  \n\n**Takeaway:** Derivatives of logarithmic trigonometric functions combine chain rule logic with trigonometric identities.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "For the parametric curve $ x = 2 \\sin 2t, y = 5 \\cos t $, find $ \\frac{dy}{dx} $ when $ t = \\frac{\\pi}{6} $. (3 steps)", "answer": "- Step 1: Compute $ \\frac{dx}{dt} = 4 \\cos 2t $, $ \\frac{dy}{dt} = -5 \\sin t $.  \n- Step 2: Apply the parametric derivative formula:  \n  $$\n  \\frac{dy}{dx} = \\frac{-5 \\sin t}{4 \\cos 2t}.\n  $$  \n- Step 3: Substitute $ t = \\frac{\\pi}{6} $:  \n  $$\n  \\sin\\left(\\frac{\\pi}{6}\\right) = \\frac{1}{2}, \\quad \\cos\\left(\\frac{\\pi}{3}\\right) = \\frac{1}{2} \\Rightarrow \\frac{dy}{dx} = \\frac{-5 \\cdot \\frac{1}{2}}{4 \\cdot \\frac{1}{2}} = -\\frac{5}{4}.\n  $$  \n\n**Takeaway:** Parametric derivatives depend on both $ t $ and the trigonometric identities inherent in the parametric equations.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the gradient of a curve defined by $ \\frac{dy}{dx} = \\frac{dy}{dt} \\div \\frac{dx}{dt} $ become undefined when $ \\frac{dx}{dt} = 0 $?", "answer": "- Step 1: When $ \\frac{dx}{dt} = 0 $, the denominator in $ \\frac{dy}{dx} $ is zero, making the gradient infinite.  \n- Step 2: This corresponds to a vertical tangent line (infinite slope) on the curve.  \n- Step 3: Example: If $ x = t^3, y = t^2 $, at $ t = 0 $, $ \\frac{dx}{dt} = 0 $, so the tangent is vertical.  \n\n**Takeaway:** A zero derivative in $ x(t) $ signals a point where the curve’s direction is purely vertical.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the derivative dy/dx for parametric equations given by (dy/dt)/(dx/dt)? Explain using the chain rule. (3 steps)", "answer": "- Step 1: Recall the chain rule: dy/dx = dy/dt × dt/dx.  \n- Step 2: Compute dt/dx as the reciprocal of dx/dt: dt/dx = 1/(dx/dt).  \n- Step 3: Substitute into the chain rule: dy/dx = dy/dt × 1/(dx/dt) = (dy/dt)/(dx/dt).  \n+ This ensures units align: if dx/dt is zero, dy/dx is undefined (vertical tangent).  \n+ Example: For x = t³ + t, y = t² + 1, dy/dt = 2t, dx/dt = 3t² + 1 ⇒ dy/dx = 2t/(3t² + 1).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What are the derivatives of sin x and cos x from first principles? Derive them. (4 steps)", "answer": "- Step 1: Use the definition of derivative: f’(x) = limₕ→₀ [f(x+h) - f(x)]/h.  \n- Step 2: For sin x:  \n  - Expand sin(x+h) = sin x cos h + cos x sin h.  \n  - [sin(x+h) - sin x]/h = sin x[(cos h - 1)/h] + cos x[sin h/h].  \n  - As h→0, (cos h - 1)/h → 0, sin h/h → 1 ⇒ derivative cos x.  \n- Step 3: For cos x:  \n  - Expand cos(x+h) = cos x cos h - sin x sin h.  \n  - [cos(x+h) - cos x]/h = cos x[(cos h - 1)/h] - sin x[sin h/h].  \n  - As h→0, derivative becomes -sin x.  \n- Step 4: Conclusion: d/dx(sin x) = cos x, d/dx(cos x) = -sin x.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you differentiate eˣ and ln x? Explain their unique properties. (3 steps)", "answer": "- Step 1: Derivative of eˣ is eˣ.  \n  - Proof: limₕ→₀ [e^(x+h) - eˣ]/h = eˣ limₕ→₀ (eʰ - 1)/h = eˣ.  \n- Step 2: Derivative of ln x is 1/x.  \n  - Proof: Let y = ln x ⇒ eʸ = x. Differentiate both sides: eʸ dy/dx = 1 ⇒ dy/dx = 1/x.  \n- Step 3: eˣ is the only function equal to its derivative. ln x’s derivative 1/x makes it ideal for integrating 1/x.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "State the chain rule and apply it to differentiate (2x + 3)⁵ and e^(sin x). (3 steps)", "answer": "- Step 1: Chain rule: d/dx f(g(x)) = f’(g(x)) × g’(x).  \n- Step 2: For (2x + 3)⁵:  \n  - Outer function u⁵ (derivative 5u⁴), inner 2x + 3 (derivative 2).  \n  - Result: 5(2x + 3)⁴ × 2 = 10(2x + 3)⁴.  \n- Step 3: For e^(sin x):  \n  - Outer eᵘ (derivative eᵘ), inner sin x (derivative cos x).  \n  - Result: e^(sin x) cos x.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is the product rule? Use it to differentiate x²(1 - 3x)⁴ and e²ˣ ln x. (3 steps)", "answer": "- Step 1: Product rule: d/dx(uv) = u’v + uv’.  \n- Step 2: For x²(1 - 3x)⁴:  \n  - u = x², u’ = 2x; v = (1 - 3x)⁴, v’ = -12(1 - 3x)³.  \n  - Result: 2x(1 - 3x)⁴ + x²(-12)(1 - 3x)³.  \n- Step 3: For e²ˣ ln x:  \n  - u = e²ˣ, u’ = 2e²ˣ; v = ln x, v’ = 1/x.  \n  - Result: 2e²ˣ ln x + e²ˣ/x.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the quotient rule? Use it to differentiate (x² + 1)/(x - 2) and tan x. (4 steps)", "answer": "- Step 1: Quotient rule: d/dx(u/v) = (u’v - uv’)/v².  \n- Step 2: For (x² + 1)/(x - 2):  \n  - u = x² + 1, u’ = 2x; v = x - 2, v’ = 1.  \n  - Result: [2x(x - 2) - (x² + 1)(1)]/(x - 2)² = (x² - 4x - 1)/(x - 2)².  \n- Step 3: For tan x = sin x/cos x:  \n  - u’ = cos x, v’ = -sin x.  \n  - Result: [cos x cos x - sin x(-sin x)]/cos² x = 1/cos² x = sec² x.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you differentiate sin(2x) and cos(3x)? Explain the role of the chain rule. (3 steps)", "answer": "- Step 1: Chain rule applies because these are composite functions.  \n- Step 2: d/dx sin(2x) = cos(2x) × 2 = 2 cos(2x).  \n- Step 3: d/dx cos(3x) = -sin(3x) × 3 = -3 sin(3x).  \n+ The derivative scales with the inner function’s coefficient (e.g., 2x vs x).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is implicit differentiation? Apply it to x² + y² = 25 and xy = 1. (4 steps)", "answer": "- Step 1: Differentiate both sides term-by-term, treating y as a function of x.  \n- Step 2: For x² + y² = 25:  \n  - 2x + 2y dy/dx = 0 ⇒ dy/dx = -x/y.  \n- Step 3: For xy = 1:  \n  - x dy/dx + y = 0 ⇒ dy/dx = -y/x.  \n- Step 4: Use chain rule for y terms (d/dx y² = 2y dy/dx).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you perform parametric differentiation for x = t³ + t, y = t² + 1? Find dy/dx at t = 2. (3 steps)", "answer": "- Step 1: Compute dy/dt = 2t, dx/dt = 3t² + 1.  \n- Step 2: dy/dx = (dy/dt)/(dx/dt) = 2t/(3t² + 1).  \n- Step 3: At t = 2: dy/dx = 4/(13).  \n+ This avoids converting to Cartesian form.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the derivative of sin⁻¹ x? Derive it using implicit differentiation. (4 steps)", "answer": "- Step 1: Let y = sin⁻¹ x ⇒ sin y = x.  \n- Step 2: Differentiate both sides: cos y dy/dx = 1.  \n- Step 3: dy/dx = 1/cos y.  \n- Step 4: Express cos y in terms of x: cos y = √(1 - x²) ⇒ dy/dx = 1/√(1 - x²).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How do you find the second derivative d²y/dx² for parametric equations? Apply it to x = t², y = t³. (3 steps)", "answer": "- Step 1: Compute dy/dx = (dy/dt)/(dx/dt) = (3t²)/(2t) = 3t/2.  \n- Step 2: Differentiate dy/dx with respect to t: d/dt (3t/2) = 3/2.  \n- Step 3: Divide by dx/dt: d²y/dx² = (3/2)/(2t) = 3/(4t).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "What is logarithmic differentiation? Apply it to y = xˣ and y = (1 + x)^(1/x). (4 steps)", "answer": "- Step 1: Take ln of both sides to simplify differentiation.  \n- Step 2: For y = xˣ:  \n  - ln y = x ln x ⇒ (1/y) dy/dx = ln x + 1 ⇒ dy/dx = xˣ(ln x + 1).  \n- Step 3: For y = (1 + x)^(1/x):  \n  - ln y = (1/x) ln(1 + x) ⇒ (1/y) dy/dx = [ln(1 + x)/x²] + [1/(x(1 + x))].  \n- Step 4: Solve for dy/dx.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How do you differentiate inverse trigonometric functions like tan⁻¹ x? Derive it. (4 steps)", "answer": "- Step 1: Let y = tan⁻¹ x ⇒ tan y = x.  \n- Step 2: Differentiate both sides: sec² y dy/dx = 1.  \n- Step 3: dy/dx = 1/sec² y.  \n- Step 4: Express sec² y in terms of x: sec² y = 1 + x² ⇒ dy/dx = 1/(1 + x²).", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "What is the derivative of aˣ with respect to x? Derive it using logarithmic differentiation. (3 steps)", "answer": "- Step 1: Let y = aˣ ⇒ ln y = x ln a.  \n- Step 2: Differentiate: (1/y) dy/dx = ln a ⇒ dy/dx = aˣ ln a.  \n- Step 3: Example: d/dx 2ˣ = 2ˣ ln 2.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How do you use the chain rule for related rates? Apply it to a melting snowball where volume decreases at a rate proportional to surface area. (4 steps)", "answer": "- Step 1: Relate volume (V) and radius (r): V = (4/3)πr³.  \n- Step 2: Given dV/dt = -kA (A = 4πr²).  \n- Step 3: Compute dV/dt = dV/dr × dr/dt ⇒ -k(4πr²) = 4πr² dr/dt.  \n- Step 4: Cancel terms: dr/dt = -k ⇒ radius decreases at constant rate.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How do you find stationary points using implicit differentiation? Apply it to x² + 4y² - 6x -16y +21 = 0. (4 steps)", "answer": "- Step 1: Differentiate implicitly: 2x + 8y dy/dx - 6 - 16 dy/dx = 0.  \n- Step 2: Solve for dy/dx = (6 - 2x)/(8y - 16).  \n- Step 3: Set dy/dx = 0 ⇒ 6 - 2x = 0 ⇒ x = 3.  \n- Step 4: Substitute x = 3 into original equation to find y-values.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "What is the derivative of sec x? Derive it using the quotient rule. (3 steps)", "answer": "- Step 1: sec x = 1/cos x.  \n- Step 2: Apply quotient rule: d/dx(1/cos x) = [0 - (-sin x)]/cos² x.  \n- Step 3: Simplify: sin x / cos² x = sec x tan x.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How do you differentiate sin y = x using implicit differentiation? (3 steps)", "answer": "- Step 1: Differentiate both sides: cos y dy/dx = 1.  \n- Step 2: Solve for dy/dx = 1/cos y.  \n- Step 3: Express in terms of x: cos y = √(1 - x²) ⇒ dy/dx = 1/√(1 - x²).", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "How do you find the tangent line to a parametric curve at a specific point? Apply it to x = 3 sin θ, y = 5 cos θ at θ = π/6. (4 steps)", "answer": "- Step 1: Compute dx/dθ = 3 cos θ, dy/dθ = -5 sin θ.  \n- Step 2: dy/dx = (-5 sin θ)/(3 cos θ) = -5/3 tan θ.  \n- Step 3: At θ = π/6: dy/dx = -5/3 (1/2)/(√3/2) = -5/(3√3).  \n- Step 4: Use point-slope form with x = 3/2, y = 5√3/2.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "What is the derivative of ln|x|? Explain its integral application. (2 steps)", "answer": "- Step 1: d/dx ln|x| = 1/x for x ≠ 0.  \n- Step 2: This makes ∫1/x dx = ln|x| + C.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "How do you differentiate y = e^(ln x)? Simplify and differentiate. (3 steps)", "answer": "- Step 1: Simplify y = x (since e^(ln x) = x).  \n- Step 2: dy/dx = 1.  \n- Step 3: Alternatively, apply chain rule: e^(ln x) * (1/x) = x*(1/x) = 1.", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "What is the derivative of tan⁻¹(2x)? Apply the chain rule. (3 steps)", "answer": "- Step 1: Let u = 2x. Derivative of tan⁻¹ u is 1/(1 + u²) * du/dx.  \n- Step 2: Result: 1/(1 + 4x²) * 2.  \n- Step 3: Final answer: 2/(1 + 4x²).", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "How do you find d²y/dx² for implicit equations? Apply it to x² + y² = 25. (5 steps)", "answer": "- Step 1: First derivative: dy/dx = -x/y.  \n- Step 2: Differentiate dy/dx with respect to x:  \n  - Use quotient rule: d/dx(-x/y) = [(-1)y - (-x) dy/dx]/y².  \n- Step 3: Substitute dy/dx: [ -y + x(-x/y) ] / y².  \n- Step 4: Simplify numerator: (-y² - x²)/y ⇒ (- (x² + y²))/y.  \n- Step 5: Since x² + y² = 25, numerator = -25 ⇒ d²y/dx² = -25/y³.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "How do you differentiate y = logₐ x using change of base? (3 steps)", "answer": "- Step 1: y = ln x / ln a.  \n- Step 2: dy/dx = (1/x)/ln a.  \n- Step 3: Formula: d/dx logₐ x = 1/(x ln a).", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "How do you apply the product rule to differentiate x sin x eˣ? (3 steps)", "answer": "- Step 1: Let u = x, v = sin x eˣ. First differentiate v using product rule: dv/dx = cos x eˣ + sin x eˣ.  \n- Step 2: Apply product rule to uv: d/dx(x sin x eˣ) = sin x eˣ + x(cos x eˣ + sin x eˣ).  \n- Step 3: Factor eˣ: eˣ [sin x + x(cos x + sin x)].", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}, {"question": "What is the derivative of aˣ sin x? Apply product rule and chain rule. (3 steps)", "answer": "- Step 1: Let u = aˣ, v = sin x. Then du/dx = aˣ ln a, dv/dx = cos x.  \n- Step 2: Product rule: d/dx (uv) = aˣ ln a sin x + aˣ cos x.  \n- Step 3: Factor aˣ: aˣ (ln a sin x + cos x).", "source": "Qwen 3 ②", "_id": "qwen_2_25", "judge_pick": false}, {"question": "How do you differentiate y = x^(1/x)? Use logarithmic differentiation. (4 steps)", "answer": "- Step 1: ln y = (1/x) ln x.  \n- Step 2: Differentiate: (1/y) dy/dx = -ln x /x² + 1/x².  \n- Step 3: Multiply by y: dy/dx = x^(1/x) * (1 - ln x)/x².  \n- Step 4: Final form: dy/dx = x^(1/x - 2) (1 - ln x).", "source": "Qwen 3 ②", "_id": "qwen_2_26", "judge_pick": false}, {"question": "What is the derivative of y = sin(cos x)? Apply the chain rule twice. (3 steps)", "answer": "- Step 1: Outer function sin(u), derivative cos(u); inner u = cos x, derivative -sin x.  \n- Step 2: dy/dx = cos(cos x) * (-sin x).  \n- Step 3: Final answer: -sin x cos(cos x).", "source": "Qwen 3 ②", "_id": "qwen_2_27", "judge_pick": false}, {"question": "How do you find the rate of change of the volume of a cube with respect to time if its edge length is changing? (3 steps)", "answer": "- Step 1: V = s³.  \n- Step 2: dV/dt = 3s² ds/dt.  \n- Step 3: Example: If ds/dt = 0.1 m/s, dV/dt = 3s² * 0.1.", "source": "Qwen 3 ②", "_id": "qwen_2_28", "judge_pick": false}, {"question": "Why does the quotient rule have a subtraction in the numerator? Contrast with the product rule. (2 steps)", "answer": "- Step 1: For u/v, the derivative must account for v changing in the denominator: d/dx(1/v) = -v’/v².  \n- Step 2: Applying product rule to u*(1/v): u’*(1/v) + u*(-v’/v²) = (u’v - uv’)/v².", "source": "Qwen 3 ②", "_id": "qwen_2_29", "judge_pick": false}, {"question": "How do you differentiate y = sin⁻¹(√x)? Use implicit differentiation. (4 steps)", "answer": "- Step 1: y = sin⁻¹(√x) ⇒ sin y = √x.  \n- Step 2: Differentiate: cos y dy/dx = 1/(2√x).  \n- Step 3: cos y = √(1 - x).  \n- Step 4: dy/dx = 1/(2√x √(1 - x)) = 1/(2√(x(1 - x))).", "source": "Qwen 3 ②", "_id": "qwen_2_30", "judge_pick": false}, {"question": "What is the derivative of ln(sin x)? Apply the chain rule. (3 steps)", "answer": "- Step 1: Let u = sin x. Derivative of ln u is (cos x)/sin x.  \n- Step 2: Simplify: cot x.  \n- Step 3: Example: d/dx ln(sin x) = cot x.", "source": "Qwen 3 ②", "_id": "qwen_2_31", "judge_pick": false}, {"question": "How do you differentiate y = x sin⁻¹ x? (3 steps)", "answer": "- Step 1: Apply product rule: dy/dx = sin⁻¹ x + x * d/dx(sin⁻¹ x).  \n- Step 2: d/dx(sin⁻¹ x) = 1/√(1 - x²).  \n- Step 3: Final answer: sin⁻¹ x + x /√(1 - x²).", "source": "Qwen 3 ②", "_id": "qwen_2_32", "judge_pick": false}, {"question": "What is the derivative of y = (x² + 1)^(1/2)? Apply the chain rule. (3 steps)", "answer": "- Step 1: Outer function u^(1/2) (derivative (1/2)u^(-1/2)), inner x² + 1 (derivative 2x).  \n- Step 2: dy/dx = (1/2)(x² + 1)^(-1/2) * 2x.  \n- Step 3: Simplify: x /√(x² + 1).", "source": "Qwen 3 ②", "_id": "qwen_2_33", "judge_pick": false}, {"question": "How do you differentiate inverse hyperbolic functions like sinh⁻¹ x? Derive it. (4 steps)", "answer": "- Step 1: Let y = sinh⁻¹ x ⇒ x = sinh y.  \n- Step 2: Differentiate: dx/dy = cosh y.  \n- Step 3: dy/dx = 1/cosh y.  \n- Step 4: Express in terms of x: cosh y = √(1 + x²) ⇒ dy/dx = 1/√(1 + x²).", "source": "Qwen 3 ②", "_id": "qwen_2_34", "judge_pick": false}], "count": 35}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For parametric equations $$x = f(t)$$ and $$y = g(t)$$, derive the formula for $$\\frac{dy}{dx}$$ in terms of the parameter t. Explain intuitively why this formula works. (3 steps)", "answer": "- Step 1: Start from the chain rule: $$\\frac{dy}{dx} \\times \\frac{dx}{dt} = \\frac{dy}{dt}$$. This follows because \"multiplying\" the rate of change from y to x via t should give the direct rate from y to t.\n\n- Step 2: Solve for $$\\frac{dy}{dx}$$ by dividing both sides by $$\\frac{dx}{dt}$$:\n$$\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}} = \\frac{dy/dt}{dx/dt}$$\n\n- Step 3: Intuition — when parameter t changes by a small amount dt, x changes by dx = (dx/dt)dt and y changes by dy = (dy/dt)dt. The ratio dy/dx is therefore the ratio of these two rates of change, independent of how fast t itself is changing.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A curve is defined parametrically by $$x = t^2$$ and $$y = t^3$$. At t = 2, is the gradient of the curve positive or negative? Without calculating the exact value, explain how you can determine this. (2 steps)", "answer": "- Step 1: Compute the derivatives: $$\\frac{dx}{dt} = 2t$$ and $$\\frac{dy}{dt} = 3t^2$$. Notice that $$\\frac{dy}{dt}$$ is always non-negative (zero only at t = 0), while $$\\frac{dx}{dt}$$ is negative when t < 0 and positive when t > 0.\n\n- Step 2: At t = 2, both $$\\frac{dy}{dt} > 0$$ and $$\\frac{dx}{dt} > 0$$, so their ratio $$\\frac{dy}{dx} = \\frac{3t^2}{2t} = \\frac{3t}{2}$$ is positive. The gradient is positive. Intuition: as t increases, both x and y increase, so the curve slopes upward from left to right.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "What is the key difference in approach when finding the equation of a normal to a parametric curve compared to finding the equation of a tangent? (2 steps)", "answer": "- Step 1: For both tangent and normal, we first find the gradient $$\\frac{dy}{dx}$$ at the given point using the parametric differentiation formula.\n\n- Step 2: The tangent uses this gradient directly in point-slope form $$y - y_1 = m(x - x_1)$$. The normal uses the negative reciprocal: if tangent gradient is m, then normal gradient is $$-1/m$$. This is because the normal is perpendicular to the tangent, and perpendicular lines have gradients that multiply to -1.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "When using implicit differentiation on the equation $$x^2 + y^2 = 25$$, we get $$\\frac{dy}{dx} = -\\frac{x}{y}$$. Explain why this expression is valid even at points where y = 0, and what happens at those specific points. (2 steps)", "answer": "- Step 1: The formula $$\\frac{dy}{dx} = -\\frac{x}{y}$$ is algebraically derived from implicit differentiation. At y = 0, this expression is undefined (division by zero), indicating a vertical tangent.\n\n- Step 2: At the points (5, 0) and (-5, 0) on the circle, the curve has vertical tangents. The gradient doesn't exist as a finite number — this is an edge case where we must recognize the limitation. The implicit differentiation gives us the correct behavior: as y approaches 0, the magnitude of the gradient becomes arbitrarily large, reflecting the vertical tangent.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "In related rates problems, we often have three variables (e.g., radius r, surface area A, volume V of a sphere). Explain why we sometimes need to chain through an intermediate variable rather than directly connecting the two rates we care about. (3 steps)", "answer": "- Step 1: Consider finding dA/dt given dV/dt for a sphere. We don't have a direct relationship between A and V — we only know how each relates to radius r.\n\n- Step 2: We use the chain rule: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dV} \\times \\frac{dV}{dt}$$. We need the intermediate derivatives dA/dr and dr/dV to connect the rates.\n\n- Step 3: This pattern appears whenever two quantities aren't directly related but both depend on a common variable. The intermediate variable acts as a \"bridge\" connecting the rates. The chain rule generalizes to any number of intermediate variables: $$\\frac{dy}{dx} = \\frac{dy}{du_1} \\times \\frac{du_1}{du_2} \\times ... \\times \\frac{du_n}{dx}$$", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "For the differential equation $$\\frac{dN}{dt} = -kN$$ describing radioactive decay, explain why the constant k must be positive and why there is a negative sign in the equation. (2 steps)", "answer": "- Step 1: The negative sign appears because N (the number of particles) decreases over time — $$\\frac{dN}{dt}$$ is therefore negative. Since N is positive, we need -kN to be negative, requiring k > 0.\n\n- Step 2: The positive constant k represents the decay constant — how fast the substance decays. A larger k means faster decay. The differential equation captures the key property: the rate of decay is proportional to the amount remaining. If you have twice as many particles, twice as many decay per unit time (in absolute terms).", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Newton's law of cooling states $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$. If the body's temperature is initially higher than the surroundings, what happens to $$\\frac{d\\theta}{dt}$$ as time passes? Explain the behavior in terms of the equation. (2 steps)", "answer": "- Step 1: Initially, $$\\theta > \\theta_0$$, so $$\\theta - \\theta_0 > 0$$. With the negative sign, $$\\frac{d\\theta}{dt}$$ is negative — the body cools down.\n\n- Step 2: As time passes, $$\\theta$$ decreases, so $$\\theta - \\theta_0$$ gets smaller. This makes $$|d\\theta/dt|$$ smaller — the cooling rate slows down. Eventually, as $$\\theta \\to \\theta_0$$, we have $$\\frac{d\\theta}{dt} \\to 0$$. This is equilibrium: the body reaches ambient temperature and stops cooling. The model correctly captures diminishing cooling rate as temperature difference decreases.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Why is implicit differentiation preferred over first solving for y explicitly for equations like $$x^2 + 2xy + y^2 = 4$$? What difficulties might arise with the explicit approach? (2 steps)", "answer": "- Step 1: Solving for y explicitly would require the quadratic formula: $$y = -x \\pm \\sqrt{4 - x^2}$$. This gives two separate functions, each valid only for portions of the curve where the expression under the square root is non-negative.\n\n- Step 2: Implicit differentiation handles the entire curve in one step without needing to solve or split into branches. It works for equations where explicit solving is impractical or impossible (e.g., $$e^y + y = x$$ cannot be solved for y in elementary functions). The implicit approach is more efficient and works for the complete relationship.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A curve is defined implicitly by $$f(x,y) = 0$$. When we differentiate implicitly and obtain $$\\frac{dy}{dx}$$, explain why this expression typically contains both x and y, rather than just x. (2 steps)", "answer": "- Step 1: The implicit equation relates x and y together. When x changes, y must change to maintain the relationship. The derivative $$\\frac{dy}{dx}$$ describes how y changes in response to x changes at any particular point.\n\n- Step 2: The expression in both x and y reflects that the relationship between x and y isn't a function in the sense of y = f(x) alone — different points on the curve can have different \"rules\" for how y responds to x. At the point (x, y), the local behavior depends on both coordinates. If we could solve for y explicitly, we could substitute and get an expression in x alone — but this often requires knowing which branch to use.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For parametric differentiation, what condition must be satisfied for $$\\frac{dy}{dx}$$ to exist at a point? Explain why this condition is necessary. (2 steps)", "answer": "- Step 1: We need $$\\frac{dx}{dt} \\neq 0$$ at the point. The formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ requires division by $$\\frac{dx}{dt}$$.\n\n- Step 2: When $$\\frac{dx}{dt} = 0$$, two possibilities exist: if $$\\frac{dy}{dt} \\neq 0$$, we have a vertical tangent (gradient undefined/infinite); if $$\\frac{dy}{dt} = 0$$ also, we may have a cusp or stationary point requiring further investigation. The condition $$\\frac{dx}{dt} \\neq 0$$ ensures the curve is locally representable as a function of x — it's not vertical or degenerate at that point.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Explain why finding \"points of zero gradient\" on a parametric curve requires setting $$\\frac{dy}{dx} = 0$$, and what this means geometrically. When does this not give us maximum or minimum points? (2 steps)", "answer": "- Step 1: Zero gradient means horizontal tangent — the curve is locally flat, running left-right rather than up-down. Setting $$\\frac{dy}{dx} = 0$$ (i.e., dy/dt = 0 while dx/dt ≠ 0) finds these horizontal points.\n\n- Step 2: However, horizontal points aren't necessarily extrema. They could be points of inflection where the curve changes from concave-up to concave-down but doesn't reach a local maximum or minimum. The second derivative test would determine the nature. Some problems explicitly say \"you do not need to establish whether they are maximum or minimum points\" because the calculation itself is complex, or
