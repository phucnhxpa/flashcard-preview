<script>
const DATA={"selected": [{"question": "A cube has surface area $$A$$ expanding at a constant 2 cm²/s. Why does $$V$$ have a form expressible in $$A$$, and show that $$\\frac{dV}{dt}$$ is related to $$V^{1/3}$$. (3 steps)", "answer": "- Step 1: For a cube of side $$s$$: $$A = 6s^2$$ and $$V = s^3$$. Solve for $$s$$: $$s = \\sqrt{A/6}$$. Then $$V = (A/6)^{3/2}$$.\n- Step 2: Differentiate: $$\\frac{dV}{dA} = \\frac{3}{2}(A/6)^{1/2}\\cdot\\frac{1}{6} = \\frac{(A/6)^{1/2}}{4}$$. Equivalently, in terms of $$V$$: since $$s = V^{1/3}$$ and $$A = 6V^{2/3}$$, we get $$\\frac{dV}{dA} = \\frac{V^{1/3}}{4}$$.\n- Step 3: Chain rule with $$\\frac{dA}{dt} = 2$$: $$\\frac{dV}{dt} = \\frac{dV}{dA}\\cdot\\frac{dA}{dt} = \\frac{V^{1/3}}{4}\\cdot 2 = \\frac{V^{1/3}}{2}$$.\n\nTakeaway: the cube's geometry forces all rates to relate through powers of $$s$$; constants of integration drop out, leaving universal laws.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "Volume $$V$$ and surface area $$S$$ of a hemisphere both depend on radius $$r$$: $$V = \\frac{2}{3}\\pi r^3$$ and $$S = 3\\pi r^2$$. Given $$\\frac{dV}{dt} = 6$$, how would you find $$\\frac{dS}{dt}$$? Walk through the chain rule structure needed. (3 steps)", "answer": "- Step 1: We need a chain linking $$S$$ to $$t$$ through $$r$$ and $$V$$. The chain rule in extended form: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\times \\frac{dr}{dV} \\times \\frac{dV}{dt}$$. Notice the middle link uses $$\\frac{dr}{dV}$$, not $$\\frac{dV}{dr}$$ — we're going \"backwards\" from $$V$$ to $$r$$.\n- Step 2: Compute the derivatives. $$\\frac{dS}{dr} = 6\\pi r$$, $$\\frac{dV}{dr} = 2\\pi r^2$$, so $$\\frac{dr}{dV} = \\frac{1}{2\\pi r^2}$$ (reciprocal of $$\\frac{dV}{dr}$$). We're given $$\\frac{dV}{dt} = 6$$.\n- Step 3: Combine: $$\\frac{dS}{dt} = 6\\pi r \\times \\frac{1}{2\\pi r^2} \\times 6 = \\frac{36\\pi r}{2\\pi r^2} = \\frac{18}{r}$$. The surface area growth rate depends on $$r$$ — as the hemisphere gets larger, its surface area grows more slowly (per unit time) for a given volume increase rate.\n\n+ General principle: when variables $$A$$ and $$B$$ both depend on a third variable $$C$$, and you know $$\\frac{dA}{dt}$$, you can find $$\\frac{dB}{dt}$$ by chaining through $$C$$: $$\\frac{dB}{dt} = \\frac{dB}{dC} \\times \\frac{dC}{dA} \\times \\frac{dA}{dt}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "The gradient of a curve is given by dy/dx = e^(-y) cos x. At the point where x = π/2 and y = 0, find the gradient. What does the presence of e^(-y) indicate about how gradient changes with y? (2 steps)", "answer": "- Step 1: At x = π/2, y = 0: dy/dx = e^(-0) × cos(π/2) = 1 × 0 = 0\n- Step 2: The factor e^(-y) means that for larger y values, the gradient is multiplied by a smaller factor (since e^(-y) decreases as y increases). The gradient is more sensitive to x (through cos x) than to y (through the exponential factor).\n+ As y increases, e^(-y) approaches 0, reducing the overall magnitude of the gradient", "source": "MiniMax ②", "_id": "minimax_2_64"}, {"question": "A curve is defined parametrically by x = t³ + t and y = t² + 1. Without using the parametric differentiation formula, explain conceptually why you cannot simply differentiate y with respect to x as dy/dx = 2t directly. (2 steps)", "answer": "- Step 1: The derivative dy/dx represents the instantaneous rate of change of y with respect to x. This is fundamentally different from dy/dt, which measures change in y relative to the parameter t.\n- Step 2: The parameter t is not the same as x. To find how y changes with x, we must account for how x changes with t as well. This is precisely why we use dy/dx = (dy/dt)/(dx/dt) — we must \"scale\" the rate dy/dt by how fast x changes with t.\n+ If dx/dt = 0 at some point, this indicates a vertical tangent, which dy/dt alone would never reveal", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "For $$ye^{-3x} - 3x = y^2$$, show the gradient at the origin is 3, then write the tangent there. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$\\frac{dy}{dx}e^{-3x} + y\\cdot(-3e^{-3x}) - 3 = 2y\\frac{dy}{dx}$$ (product rule on $$ye^{-3x}$$, chain rule on $$y^2$$).\n- Step 2: Substitute $$(0, 0)$$: $$\\frac{dy}{dx}\\cdot 1 + 0 - 3 = 0$$, so $$\\frac{dy}{dx} = 3$$.\n- Step 3: Tangent at origin with slope 3: $$y = 3x$$.\n\nTakeaway: at special points like the origin, coordinate substitution collapses many terms, making slope calculation trivial.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "If you need $$\\frac{dy}{dx}$$ at a specific point $$(x_0, y_0)$$ on an implicit curve, should you substitute numerical values before or after isolating $$\\frac{dy}{dx}$$, and why?", "answer": "Substitute as **early** as possible — right after differentiating, before rearranging. The reason: after implicit differentiation, the equation is linear in $$\\frac{dy}{dx}$$ (since chain rule produces $$\\frac{dy}{dx}$$ to the first power). Plugging in numerical $$x_0, y_0$$ immediately turns complicated expressions into simple constants, collapsing everything to a small equation like $$a \\cdot \\frac{dy}{dx} + b = 0$$ which you solve in one step. If you isolate $$\\frac{dy}{dx}$$ symbolically first, you often wade through ugly algebra and are more prone to errors. **Substitute early, rearrange late.**", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "In related rates problems, we often have three variables (e.g., radius r, surface area A, volume V of a sphere). Explain why we sometimes need to chain through an intermediate variable rather than directly connecting the two rates we care about. (3 steps)", "answer": "- Step 1: Consider finding dA/dt given dV/dt for a sphere. We don't have a direct relationship between A and V — we only know how each relates to radius r.\n\n- Step 2: We use the chain rule: $$\\frac{dA}{dt} = \\frac{dA}{dr} \\times \\frac{dr}{dV} \\times \\frac{dV}{dt}$$. We need the intermediate derivatives dA/dr and dr/dV to connect the rates.\n\n- Step 3: This pattern appears whenever two quantities aren't directly related but both depend on a common variable. The intermediate variable acts as a \"bridge\" connecting the rates. The chain rule generalizes to any number of intermediate variables: $$\\frac{dy}{dx} = \\frac{dy}{du_1} \\times \\frac{du_1}{du_2} \\times ... \\times \\frac{du_n}{dx}$$", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "Why does $$\\frac{dy}{dx}$$ for an implicit curve usually depend on both $$x$$ and $$y$$? (3 steps)", "answer": "- Step 1: When differentiating an implicit equation, the $$x$$-pieces and $$y$$-pieces both contribute, and the chain-rule factor $$\\frac{dy}{dx}$$ sits attached to all $$y$$-pieces.\n- Step 2: After solving, the expression for $$\\frac{dy}{dx}$$ naturally carries both variables: the numerator encodes \"$$x$$-sensitivity,\" the denominator encodes \"$$y$$-sensitivity.\"\n- Step 3: Geometrically: different $$(x, y)$$ points on the same curve have different tangent slopes, so the gradient formula must reference both coordinates.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Describe how the rate-proportionality connects physics to the exponential-solution universality. (3 steps)", "answer": "- Step 1: Any \"rate proportional to amount\" law is $$\\frac{dP}{dt} = kP$$ (with sign of $$k$$ encoding growth/decay).\n- Step 2: The unique solution (up to initial condition) is $$P(t) = P_0 e^{kt}$$ — exponential behaviour.\n- Step 3: This single dynamic describes: bacterial growth (uninhibited), compound interest, radioactive decay, capacitor discharge, cooling (in excess-temperature form), Beer-Lambert absorption... all manifestations of the same proportionality law.\n\nTakeaway: when rates scale with current amount, exponential solutions inevitably appear — a cornerstone of modelling throughout science.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "A curve is defined by x = 2 cos θ, y = 3 sin θ (a parametric ellipse). Find the gradient at θ = π/4, and explain why this is equivalent to finding the gradient on the ellipse x²/4 + y²/9 = 1. (3 steps)", "answer": "- Step 1: Differentiate: dx/dθ = -2 sin θ, dy/dθ = 3 cos θ\n- Step 2: So dy/dx = (3 cos θ)/(-2 sin θ) = -(3/2) cot θ\n- Step 3: At θ = π/4: dy/dx = -(3/2) × 1 = -3/2\n+ Eliminating θ: (x/2)² + (y/3)² = cos²θ + sin²θ = 1. Differentiating implicitly gives the same gradient formula.", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "In a \"rates of change\" problem, a spherical balloon is being inflated at a constant rate dV/dt = 100 cm³/s. Explain why dr/dt is not constant, and describe how it changes as the balloon grows. (2 steps)", "answer": "- Step 1: Since $$V = \\frac{4}{3}\\pi r^3$$, we have $$\\frac{dV}{dr} = 4\\pi r^2$$. Then $$\\frac{dr}{dt} = \\frac{dV/dt}{dV/dr} = \\frac{100}{4\\pi r^2} = \\frac{25}{\\pi r^2}$$.\n\n- Step 2: As r increases, dr/dt decreases (since r² is in the denominator). Even though volume increases at a constant rate, the radius grows more slowly as the balloon gets larger — this is because a given volume increase spreads over a larger surface area as the balloon expands. Initially fast radius growth, then slowing down.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "For the implicit equation $$e^{2x} \\ln y = x + y - 2$$, at the point (1, 1), we found $$\\frac{dy}{dx} = \\frac{1}{e^2 - 1}$$. Without using a calculator, explain whether this gradient is less than 1, between 1 and 0, or greater than 1, and explain your reasoning. (2 steps)", "answer": "- Step 1: e² ≈ (2.718)² ≈ 7.39. So e² - 1 ≈ 6.39. Therefore 1/(e² - 1) ≈ 1/6.39 ≈ 0.156.\n\n- Step 2: Since 0.156 is positive but less than 1, the gradient is between 0 and 1. This means at (1, 1), the curve is increasing as x increases, but relatively gently — less steep than the line y = x (which has gradient 1). The curve is rising but at less than a 45° angle at that point.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "In related rates problems, sometimes we need to differentiate an equation that relates variables before substituting the rates we know. Explain why this ordering matters. (2 steps)", "answer": "- Step 1: The relationship between variables must hold at every instant. If we have a relationship like $$x^2 + y^2 = 25$$ (a circle), this must be true at all times. We differentiate this relationship to get the relationship between rates: $$2x\\frac{dx}{dt} + 2y\\frac{dy}{dt} = 0$$.\n\n- Step 2: If we substituted numbers for x and y before differentiating, we'd lose the general relationship. The differentiation step converts the static relationship into a dynamic one that connects the rates. We differentiate first, then substitute known values of x, y, and the known rate(s) to find the unknown rate.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "For $$x = e^{2t}$$, $$y = e^t - 1$$, how would you argue that the curve has no stationary points? (3 steps)", "answer": "- Step 1: Compute $$\\frac{dy/dt}{dx/dt}$$. Since $$\\frac{dy}{dt} = e^t$$ and $$\\frac{dx}{dt} = 2e^{2t}$$, the ratio simplifies to $$\\frac{1}{2e^t}$$.\n- Step 2: A stationary point requires $$\\frac{dy}{dx} = 0$$. But $$\\frac{1}{2e^t}$$ is strictly positive for any real $$t$$ — $$e^t > 0$$ always, so the fraction can never reach zero.\n- Step 3: Therefore no value of $$t$$ makes the gradient zero, so the curve has no horizontal tangents anywhere — it is strictly monotonic.\n\nTakeaway: to show no stationary points, demonstrate that the gradient expression is never zero in the parameter's domain.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "How would you differentiate $$e^{2x} \\ln y$$ with respect to $$x$$? Walk through the product rule, paying special attention to what happens when you differentiate $$\\ln y$$. (3 steps)", "answer": "- Step 1: Identify this as a product: $$u = e^{2x}$$ and $$v = \\ln y$$. Apply the product rule: $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$.\n- Step 2: Compute each derivative. $$\\frac{du}{dx} = \\frac{d}{dx}(e^{2x}) = 2e^{2x}$$ (chain rule on the exponential). $$\\frac{dv}{dx} = \\frac{d}{dx}(\\ln y) = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$ (chain rule: derivative of $$\\ln(\\text{stuff})$$ is $$\\frac{1}{\\text{stuff}} \\times \\frac{d}{dx}(\\text{stuff})$$).\n- Step 3: Combine: $$\\frac{d}{dx}(e^{2x}\\ln y) = e^{2x} \\cdot \\frac{1}{y}\\frac{dy}{dx} + \\ln y \\cdot 2e^{2x} = \\frac{e^{2x}}{y}\\frac{dy}{dx} + 2e^{2x}\\ln y$$.\n\n+ The key pattern: whenever you differentiate a function of $$y$$ (like $$\\ln y$$, $$e^y$$, $$\\sin y$$, $$y^n$$) with respect to $$x$$, you always get the ordinary derivative of that function with respect to $$y$$, multiplied by $$\\frac{dy}{dx}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "For a parametric curve, what is the condition on $$\\frac{dy}{dt}$$ and $$\\frac{dx}{dt}$$ for the curve to have a horizontal tangent (stationary point)? What about a vertical tangent? (2 steps)", "answer": "- Step 1: A horizontal tangent means the gradient $$\\frac{dy}{dx} = 0$$. \n+ Since $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, a fraction equals zero only when its numerator is zero (and denominator is not).\n+ So, we need $$\\frac{dy}{dt} = 0$$ and $$\\frac{dx}{dt} \\neq 0$$.\n- Step 2: A vertical tangent means the gradient is infinite (the tangent line is parallel to the y-axis). \n+ A fraction tends to infinity when its denominator tends to zero (and numerator is not).\n+ So, we need $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} \\neq 0$$.\n\nHorizontal tangents occur when $$y$$ stops changing relative to $$t$$; vertical tangents occur when $$x$$ stops changing relative to $$t$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "State Newton's Law of Cooling in terms of a differential equation. What does each term represent, and why is the excess temperature $$(\\theta - \\theta_0)$$ used instead of just the body's temperature $$\\theta$$? (3 steps)", "answer": "- Step 1: The differential equation is $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$, where $$\\theta$$ is the temperature of the body, $$\\theta_0$$ is the temperature of the surroundings, and $$t$$ is time.\n- Step 2: The term $$(\\theta - \\theta_0)$$ represents the excess temperature—the difference between the body and its environment. This is used because cooling stops when the body reaches the surrounding temperature (i.e., when $$\\theta = \\theta_0$$, the rate $$\\frac{d\\theta}{dt}$$ becomes 0).\n- Step 3: The $$-k$$ term indicates that the rate of temperature loss is proportional to this difference, and the negative sign ensures the temperature is decreasing (moving towards $$\\theta_0$$) when $$\\theta > \\theta_0$$.\n\nNewton's Law of Cooling relies on the *difference* in temperature, not the absolute temperature, because heat transfer is driven by thermal imbalance.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "A snowman's spherical head loses volume at a rate proportional to its surface area. Show that the radius shrinks at a constant rate. (4 steps)", "answer": "- Step 1: Translate the given: $$\\frac{dV}{dt} = -kA$$ where $$A = 4\\pi R^2$$ is the surface area, $$k > 0$$.\n- Step 2: For a sphere, $$V = \\frac{4}{3}\\pi R^3$$, so $$\\frac{dV}{dR} = 4\\pi R^2$$. By chain rule: $$\\frac{dV}{dt} = 4\\pi R^2 \\cdot \\frac{dR}{dt}$$.\n- Step 3: Equate the two expressions for $$\\frac{dV}{dt}$$: $$4\\pi R^2 \\cdot \\frac{dR}{dt} = -k\\cdot 4\\pi R^2$$.\n- Step 4: Cancel $$4\\pi R^2$$ (nonzero): $$\\frac{dR}{dt} = -k$$. The radius decreases linearly in time!\n\nTakeaway: when volumetric loss scales with surface area (geometrically, exposed boundary), spheres peel inward at constant speed — a beautiful cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "For a curve defined parametrically by $$x = f(t)$$ and $$y = g(t)$$, what is $$\\frac{dy}{dx}$$, and how does this follow from the chain rule? (3 steps)", "answer": "- Step 1: The formula is $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$, provided $$\\frac{dx}{dt} \\neq 0$$.\n- Step 2: This follows from the chain rule: if $$y$$ depends on $$x$$ through the parameter $$t$$, then $$\\frac{dy}{dt} = \\frac{dy}{dx} \\cdot \\frac{dx}{dt}$$. Rearranging isolates $$\\frac{dy}{dx}$$.\n- Step 3: Intuition: $$\\frac{dy}{dt}$$ is \"how fast $$y$$ changes as $$t$$ increases\" and $$\\frac{dx}{dt}$$ is \"how fast $$x$$ changes.\" Their ratio is the geometric slope — rise over run in the \"$$t$$-direction.\"\n\nKey insight: gradient is a ratio of \"velocities,\" not a difference.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What is the difference between an explicit equation and an implicit equation, and why does implicit differentiation exist? (2 steps)", "answer": "- Step 1: An explicit equation has $$y$$ isolated on one side, like $$y = f(x)$$. An implicit equation mixes $$x$$ and $$y$$ together, like $$x^2 + y^2 = 25$$ or $$\\sin(x+y) = 2x$$, where $$y$$ is not easily isolated.\n- Step 2: Implicit differentiation exists because trying to rearrange an implicit equation into the form $$y = f(x)$$ can be algebraically impossible, extremely messy, or would result in multiple separate functions (like $$y = \\pm\\sqrt{25-x^2}$$). \n+ Implicit differentiation allows us to find $$\\frac{dy}{dx}$$ directly without ever solving for $$y$$.\n\nImplicit differentiation bypasses the need to solve for $$y$$, handling the mixed terms directly.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "\"The rate of increase of ice thickness $$x$$ is inversely proportional to the square of $$x$$.\" Write the differential equation. What's the difference between \"inversely proportional to $$x^2$$\" and \"proportional to $$x^2$$\"? (2 steps)", "answer": "- Step 1: \"Rate of increase\" = $$\\frac{dx}{dt}$$ (positive, since thickness is growing). \"Inversely proportional to $$x^2$$\" means $$\\frac{dx}{dt} = \\frac{k}{x^2}$$, where $$k > 0$$ is a constant. The word \"inversely\" flips the relationship: the rate gets SMALLER as $$x$$ gets larger.\n- Step 2: Contrast with \"proportional to $$x^2$$\": that would give $$\\frac{dx}{dt} = kx^2$$, meaning the rate gets LARGER as $$x$$ grows — the ice would thicken ever faster, which is physically unrealistic for freezing. The inverse relationship $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ is more plausible: thicker ice insulates better, slowing further growth.\n\n+ Translation rules: \"proportional to $$Q$$\" → $$= kQ$$; \"inversely proportional to $$Q$$\" → $$= \\frac{k}{Q}$$; \"proportional to the square of $$Q$$\" → $$= kQ^2$$; \"inversely proportional to the square of $$Q$$\" → $$= \\frac{k}{Q^2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "On an implicit curve where $$\\frac{dy}{dx} = \\frac{N(x, y)}{D(x, y)}$$, what does \"$$N = 0$$ and $$D = 0$$ simultaneously\" mean? (3 steps)", "answer": "- Step 1: Both numerator and denominator vanish at the same point: $$\\frac{dy}{dx}$$ becomes $$0/0$$ — indeterminate.\n- Step 2: This signals a **singular point** on the curve: possibly a cusp, self-intersection (node), or isolated point. The naive gradient formula breaks down.\n- Step 3: Resolution requires more care: examine tangent directions via Taylor expansion or L'Hôpital-like limits. These singular points often carry geometric significance (e.g., where a curve crosses itself).", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "For a hemisphere's surface area growth driven by volume change, why is $$r$$ the natural \"bridge variable\"? (3 steps)", "answer": "- Step 1: Both volume ($$V = \\frac{2}{3}\\pi r^3$$) and surface area ($$S = 3\\pi r^2$$) are single-variable functions of $$r$$.\n- Step 2: Rather than trying to relate $$V$$ to $$S$$ directly (which would require solving $$V = V(S)$$ — messy), express both in terms of the shared variable.\n- Step 3: Chain rule then links their time-rates through $$r$$: $$\\frac{dS}{dt} = \\frac{dS}{dr} \\cdot \\frac{dr}{dV} \\cdot \\frac{dV}{dt}$$. The common intermediate variable is the geometric trick that makes these problems tractable.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "When using implicit differentiation on the equation $$x^2 + y^2 = 25$$, we get $$\\frac{dy}{dx} = -\\frac{x}{y}$$. Explain why this expression is valid even at points where y = 0, and what happens at those specific points. (2 steps)", "answer": "- Step 1: The formula $$\\frac{dy}{dx} = -\\frac{x}{y}$$ is algebraically derived from implicit differentiation. At y = 0, this expression is undefined (division by zero), indicating a vertical tangent.\n\n- Step 2: At the points (5, 0) and (-5, 0) on the circle, the curve has vertical tangents. The gradient doesn't exist as a finite number — this is an edge case where we must recognize the limitation. The implicit differentiation gives us the correct behavior: as y approaches 0, the magnitude of the gradient becomes arbitrarily large, reflecting the vertical tangent.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "Compare the differential equations $$\\frac{dP}{dt} = kP$$ vs. $$\\frac{dP}{dt} = kP - Q$$ where $$k, Q > 0$$. What do they model? (4 steps)", "answer": "- Step 1: $$\\frac{dP}{dt} = kP$$: pure exponential growth. $$P \\to \\infty$$ without bound.\n- Step 2: $$\\frac{dP}{dt} = kP - Q$$: growth proportional to $$P$$ **minus** a fixed removal $$Q$$ per unit time (e.g., pondweed reproduces as $$kP$$, fish eat $$Q$$).\n- Step 3: Equilibrium ($$\\frac{dP}{dt} = 0$$) at $$P^* = Q/k$$. Below it: $$\\frac{dP}{dt} < 0$$ (weed shrinks); above: $$\\frac{dP}{dt} > 0$$ (weed grows).\n- Step 4: This is **unstable** — small perturbations from $$P^*$$ grow. A qualitatively different regime from pure exponential: introducing a constant \"removal\" creates a tipping point.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Conceptually, what does $$\\frac{d}{dx}F(x, y) = 0$$ (applied to an implicit curve $$F(x, y) = 0$$) really mean geometrically? (3 steps)", "answer": "- Step 1: The equation $$F(x, y) = 0$$ defines a curve: the set of points where $$F$$ takes the value 0.\n- Step 2: As you move along that curve, $$F$$ stays at 0, so its rate of change along the curve is 0. That's what \"$$\\frac{d}{dx}F = 0$$\" expresses.\n- Step 3: Expanding via chain rule: $$\\frac{\\partial F}{\\partial x} + \\frac{\\partial F}{\\partial y} \\cdot \\frac{dy}{dx} = 0$$. Solving gives $$\\frac{dy}{dx} = -\\frac{\\partial F / \\partial x}{\\partial F / \\partial y}$$ — a \"balance\" between horizontal and vertical sensitivities that keeps $$F$$ constant.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "State Newton's law of cooling as a differential equation, and explain why the \"excess temperature\" appears rather than the absolute temperature. (3 steps)", "answer": "- Step 1: Let $$\\theta$$ be the body's temperature, $$\\theta_0$$ the ambient temperature, $$t$$ time. Newton's law: $$\\frac{d\\theta}{dt} = -k(\\theta - \\theta_0)$$ with $$k > 0$$.\n- Step 2: Physically, heat flows due to temperature *difference*, not absolute temperature. A body already at ambient doesn't cool further.\n- Step 3: If $$\\theta = \\theta_0$$, the excess is zero, and so is the rate — consistent with equilibrium. If $$\\theta < \\theta_0$$, the excess is negative and the equation automatically says $$\\frac{d\\theta}{dt} > 0$$ (warming) — a single equation handles cooling and warming.\n\nTakeaway: heat flow is driven by temperature difference, and the DE captures this by using $$\\theta - \\theta_0$$ — giving automatic sign flipping.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Geometrically, what does \"$$\\frac{dx}{dy} = 0$$ on a curve\" mean?", "answer": "$$\\frac{dx}{dy} = 0$$ means that for a small vertical change $$dy$$, the horizontal coordinate doesn't change ($$dx \\approx 0$$). This corresponds to a **vertical tangent**: $$x$$ has a local extremum (leftmost or rightmost point) while $$y$$ passes through. Equivalently, $$\\frac{dy}{dx} \\to \\pm\\infty$$. These are the points where a plotted tangent line would appear vertical, often at the \"equator\" of a loop-like implicit curve.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "A student says \"when $$\\frac{dx}{dt} = 0$$, the gradient $$\\frac{dy}{dx}$$ is zero.\" Is this correct? What actually happens at a point where $$\\frac{dx}{dt} = 0$$ but $$\\frac{dy}{dt} \\neq 0$$? (2 steps)", "answer": "- Step 1: This is a common misconception — completely wrong. When $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} \\neq 0$$, the formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ gives division by zero, meaning the gradient is **undefined** (infinite), not zero.\n+ Example: For $$x = \\cos t$$, $$y = \\sin t$$ (a circle), at $$t = 0$$: $$\\frac{dx}{dt} = -\\sin 0 = 0$$ and $$\\frac{dy}{dt} = \\cos 0 = 1$$. The point is (1, 0) on the circle, where the tangent is **vertical** — gradient infinite, not zero.\n- Step 2: The visual intuition: if $$x$$ isn't changing ($$\\frac{dx}{dt} = 0$$) but $$y$$ is changing ($$\\frac{dy}{dt} \\neq 0$$), the curve is moving vertically at that instant. A vertical line has infinite/undefined gradient. So $$\\frac{dx}{dt} = 0$$ (with $$\\frac{dy}{dt} \\neq 0$$) signals a **vertical tangent**, not a horizontal one.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Using the product rule, walk through why $$\\frac{d}{dx}(xy) = x\\frac{dy}{dx} + y$$, identifying what the two \"functions being multiplied\" are. (3 steps)", "answer": "- Step 1: The product rule states $$\\frac{d}{dx}(uv) = u\\frac{dv}{dx} + v\\frac{du}{dx}$$, where $$u$$ and $$v$$ are both functions of $$x$$. In the expression $$xy$$, identify: $$u = x$$ (a simple function of $$x$$) and $$v = y$$ (also a function of $$x$$, though implicit).\n- Step 2: Compute each piece. $$\\frac{du}{dx} = \\frac{d}{dx}(x) = 1$$ (the derivative of $$x$$ with respect to $$x$$ is just 1). $$\\frac{dv}{dx} = \\frac{dy}{dx}$$ (since $$v = y$$, and $$y$$ is a function of $$x$$).\n- Step 3: Substitute into the product rule: $$\\frac{d}{dx}(xy) = x \\cdot \\frac{dy}{dx} + y \\cdot 1 = x\\frac{dy}{dx} + y$$.\n\n+ Common mistake: writing $$\\frac{d}{dx}(xy) = 1 \\cdot y + x \\cdot 1 = x + y$$ — this treats both $$x$$ and $$y$$ as if they were simple variables with derivatives 1 and 1 respectively, forgetting that $$y$$ depends on $$x$$ and its derivative is $$\\frac{dy}{dx}$$, not 1.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why is $$e$$ called the \"natural\" base in calculus? (3 steps)", "answer": "- Step 1: For any exponential $$a^x$$, $$\\frac{d}{dx}(a^x) = a^x \\ln a$$. The derivative equals the function only when $$\\ln a = 1$$, i.e., $$a = e$$.\n- Step 2: So $$\\frac{d}{dx}(e^x) = e^x$$ — no extra factor required. $$e$$ is the unique base where calculus works \"without corrections.\"\n- Step 3: All other exponentials are just $$e$$ rescaled: $$a^x = e^{x \\ln a}$$. This makes $$e$$ the foundational base; every exponential is a time-rescaled version of $$e^x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "When differentiating implicitly, we sometimes get an expression for dy/dx that we need to evaluate at a specific point. Why is it important to check whether the point actually lies on the original curve before using it? (2 steps)", "answer": "- Step 1: The derivative formula we derive is valid only for points that satisfy the original implicit equation. If we substitute a point that doesn't lie on the curve, we're evaluating the derivative where the curve doesn't exist.\n\n- Step 2: For example, if we find $$\\frac{dy}{dx} = -\\frac{x}{y}$$ from $$x^2 + y^2 = 25$$, and we evaluate at (0, 6), we get gradient = 0. But (0, 6) isn't on the circle $$x^2 + y^2 = 25$$ (since 0 + 36 = 36 ≠ 25). The derivative formula doesn't apply there. Always verify the point satisfies the original equation first.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "Conceptually, what does the equation $$\\frac{dP}{dt} = (\\ln 1.09) P$$ tell us about the continuous growth rate versus the annual growth rate of $$9\\%$$? (3 steps)", "answer": "- Step 1: \"9% per year\" is the annual compounding factor: $$P(t+1) = 1.09 \\cdot P(t)$$.\n- Step 2: The continuous (instantaneous) growth rate is $$\\ln(1.09) \\approx 0.0862 = 8.62\\%$$, slightly less than 9%.\n- Step 3: Why less? Continuous compounding accumulates growth on growth throughout the year, so a smaller continuous rate gives the same annual outcome. The difference reflects the compounding effect: $$\\ln(1 + r) < r$$ for small positive $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "Conceptually, why does \"rate of volume change proportional to surface area\" imply \"constant rate of radius change\" for a sphere? (3 steps)", "answer": "- Step 1: For a sphere, the identity $$\\frac{dV}{dR} = A$$ holds (up to constants): a thin \"skin\" of thickness $$dR$$ adds volume equal to surface area times thickness.\n- Step 2: If $$\\frac{dV}{dt} = cA$$ for some constant $$c$$, and $$\\frac{dV}{dt} = A \\cdot \\frac{dR}{dt}$$ (from the skin identity), then equating gives $$\\frac{dR}{dt} = c$$ — constant.\n- Step 3: Geometric insight: if the process removes a uniform \"skin\" per unit time (scaled by $$A$$), the thickness of that skin is what shrinks $$R$$, and it's constant in time. Raindrops and snowballs evaporate by losing a constant \"skin-thickness per unit time.\"", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "For a parametric curve passing through a point twice (self-intersection), what would the gradient formula tell us at that point? (3 steps)", "answer": "- Step 1: A self-intersection means two different $$t$$-values $$t_1 \\neq t_2$$ give the same $$(x, y)$$.\n- Step 2: At each of the two parameter values, the curve may have a different tangent direction. So the gradient formula gives **two different slopes** at the same geometric point.\n- Step 3: This shows parametric form preserves more information than Cartesian: the curve can legitimately \"cross itself\" in the $$(x, y)$$ plane because the parameter $$t$$ distinguishes the two visits. Good parametric reasoning always tracks which $$t$$-value you're using at each geometric point.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "Describe the conceptual purpose of the parametric second derivative formula $$\\frac{d^2y}{dx^2} = \\frac{d(dy/dx)/dt}{dx/dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{d^2y}{dx^2}$$ is \"how the slope changes as $$x$$ changes,\" not \"as $$t$$ changes.\"\n- Step 2: But our information about slope is given in terms of $$t$$ (via $$\\frac{dy}{dx} = g(t)$$). So we need to convert \"change in slope per unit $$t$$\" to \"change in slope per unit $$x$$\" using $$\\frac{d}{dx} = \\frac{d/dt}{dx/dt}$$.\n- Step 3: Two chain-rule applications happen: one to get $$\\frac{dy}{dx}$$, another to get its derivative with respect to $$x$$. Missing this is a classic error — the naive \"$$\\frac{d^2y/dt^2}{d^2x/dt^2}$$\" is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_75"}, {"question": "How do you construct a differential equation when you're told \"dy/dx is proportional to the product of $$x$$ and $$y$$, and equals $$\\frac{1}{2}$$ at $$(4, 2)$$\"? (4 steps)", "answer": "- Step 1: \"$$\\frac{dy}{dx}$$ proportional to $$xy$$\" means $$\\frac{dy}{dx} = k \\cdot xy$$ for some constant $$k$$.\n- Step 2: Use the calibration point: $$\\frac{1}{2} = k \\cdot 4 \\cdot 2 = 8k$$.\n- Step 3: Solve: $$k = 1/16$$.\n- Step 4: Complete differential equation: $$\\frac{dy}{dx} = \\frac{xy}{16}$$. This is the pattern for all \"proportionality + one known value\" problems: write the proportional form, substitute the known data, solve for the constant.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "A function is defined parametrically by x = t - sin t, y = 1 - cos t. Find dy/dx and determine where the curve has horizontal and vertical tangents. (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = 1 - cos t, dy/dt = sin t\n- Step 2: dy/dx = sin t/(1 - cos t). Using identity: = 2 sin(t/2) cos(t/2)/[2 sin²(t/2)] = cot(t/2)\n- Step 3: Horizontal tangents (dy/dx = 0): sin t = 0 gives t = 0, π, 2π... At these, check dx/dt ≠ 0. At t = 0, dx/dt = 0, so this is a singular point (cusp). Vertical tangents (dx/dt = 0): cos t = 1 gives t = 0, 2π... Same points! These are cusp points.\n+ The cycloid has cusps where it touches the ground", "source": "MiniMax ②", "_id": "minimax_2_67"}, {"question": "Given a tangent line to a parametric curve at point $$P$$ with parameter $$t_0$$, how would you determine whether this tangent intersects the curve at any other point? Explain the conceptual strategy. (3 steps)", "answer": "- Step 1: Write the tangent line equation using the point $$(x_0, y_0)$$ and gradient $$m$$ at $$t = t_0$$: $$y - y_0 = m(x - x_0)$$.\n- Step 2: Substitute the parametric expressions for $$x$$ and $$y$$ into the tangent equation: replace $$x$$ with $$f(t)$$ and $$y$$ with $$g(t)$$, giving an equation purely in terms of $$t$$.\n- Step 3: Solve for $$t$$. One solution will always be $$t = t_0$$ (the point of tangency). Any **other** real solutions correspond to additional intersections. If the resulting equation has no other real solutions (e.g., a quadratic with negative discriminant after factoring out the known root), the tangent touches the curve only at $$P$$.\n\n+ This is a powerful technique because it works for any parametric form — you never need the Cartesian equation.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "A common mistake in implicit differentiation is to differentiate $$y^2$$ as simply $$2y$$ (without the $$\\frac{dy}{dx}$$). Explain the error carefully. (3 steps)", "answer": "- Step 1: The expression $$\\frac{d}{dx}(y^2) = 2y$$ would be correct only if $$y$$ were the variable of differentiation. Here we differentiate with respect to $$x$$, but $$y$$ depends on $$x$$.\n- Step 2: By chain rule: $$\\frac{d}{dx}(y^2) = 2y\\cdot\\frac{dy}{dx}$$. The factor $$\\frac{dy}{dx}$$ converts \"derivative with respect to $$y$$\" into \"derivative with respect to $$x$$\".\n- Step 3: Omitting it is treating $$y$$ as independent — which gives the wrong equation, wrong gradient, and ultimately wrong answers at every point.\n\nTakeaway: in implicit differentiation, a $$\\frac{dy}{dx}$$ appears every time a $$y$$-factor gets differentiated — this is mandatory, not optional.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "You derive $$\\frac{dy}{dx} = -\\frac{3x^2+1}{3(1+y^2)}$$ from an implicit equation. To find stationary points, you set $$\\frac{dy}{dx} = 0$$. What does this tell you about the numerator, and why doesn't the denominator matter for this step? (2 steps)", "answer": "- Step 1: A fraction equals zero when its numerator equals zero (provided the denominator is nonzero). So $$\\frac{dy}{dx} = 0$$ requires $$3x^2 + 1 = 0$$, i.e., $$x^2 = -\\frac{1}{3}$$. This has no real solutions, meaning there are **no stationary points** on this curve.\n- Step 2: The denominator $$3(1+y^2)$$ is always positive (since $$y^2 \\geq 0$$ means $$1+y^2 \\geq 1 > 0$$), so it never equals zero and never causes the fraction to be undefined. For finding stationary points, you only need the numerator to be zero; the denominator just needs to be nonzero at those same points (which you check separately).\n\n+ General principle: for $$\\frac{dy}{dx} = \\frac{N(x,y)}{D(x,y)}$$, stationary points occur where $$N(x,y) = 0$$ and $$D(x,y) \\neq 0$$ simultaneously. Points where $$D(x,y) = 0$$ (with $$N \\neq 0$$) give vertical tangents.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "For $$y = \\ln(\\sin x)$$ on $$(0, \\pi)$$, describe how to find its stationary point and prove it's concave everywhere. (4 steps)", "answer": "- Step 1: Chain rule: $$\\frac{dy}{dx} = \\frac{\\cos x}{\\sin x} = \\cot x$$.\n- Step 2: Stationary: $$\\cot x = 0 \\Rightarrow x = \\pi/2$$. Value: $$y = \\ln(1) = 0$$. Stationary point $$(\\pi/2, 0)$$.\n- Step 3: Second derivative: $$\\frac{d^2y}{dx^2} = -\\csc^2 x = -\\frac{1}{\\sin^2 x}$$.\n- Step 4: Since $$\\sin^2 x > 0$$ on $$(0, \\pi)$$, we have $$\\frac{d^2y}{dx^2} < 0$$ everywhere — curve is concave (concave down) throughout. The stationary point is a maximum.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "The parametric curve $$x = 3\\sin\\theta$$, $$y = 5\\cos\\theta$$ is an ellipse. Walk through the conceptual steps to find the gradient at $$\\theta = \\pi/6$$, without computing exact numerical values. (3 steps)", "answer": "- Step 1: Differentiate each parametric equation with respect to $$\\theta$$: $$\\frac{dx}{d\\theta} = 3\\cos\\theta$$ and $$\\frac{dy}{d\\theta} = -5\\sin\\theta$$. The key insight is that $$\\sin$$ differentiates to $$\\cos$$, and $$\\cos$$ differentiates to $$-\\sin$$.\n- Step 2: Form the ratio: $$\\frac{dy}{dx} = \\frac{-5\\sin\\theta}{3\\cos\\theta} = -\\frac{5}{3}\\tan\\theta$$. Notice how the gradient depends on $$\\theta$$ through $$\\tan\\theta$$ — at $$\\theta = 0$$ the gradient is 0 (top of ellipse), and as $$\\theta$$ increases toward $$\\pi/2$$, the gradient becomes increasingly negative (steeper downward slope).\n- Step 3: Substitute $$\\theta = \\pi/6$$: since $$\\tan(\\pi/6) = 1/\\sqrt{3}$$, the gradient is $$-\\frac{5}{3\\sqrt{3}}$$, a moderate negative value. The point itself is $$(3 \\cdot \\frac{1}{2}, 5 \\cdot \\frac{\\sqrt{3}}{2}) = (3/2, 5\\sqrt{3}/2)$$ — in the upper-right portion of the ellipse, where the curve slopes downward to the right.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "A cylindrical tank is being filled with water at a constant rate, but water is also leaking out through a hole in the bottom. The leak rate is proportional to the square root of the water depth. Set up (but do not solve) a differential equation for the depth h of water in the tank. (3 steps)", "answer": "- Step 1: Let V be volume, h be depth, A be cross-sectional area (constant for cylinder). The filling rate is constant: dV/dt = R (positive constant).\n\n- Step 2: The leak rate is proportional to √h: dV/dt (leak) = -k√h, where k > 0.\n\n- Step 3: The net rate of change of volume is: $$\\frac{dV}{dt} = R - k\\sqrt{h}$$. Since V = Ah for a cylinder (constant cross-section), we have $$\\frac{dV}{dt} = A\\frac{dh}{dt}$$. Therefore: $$A\\frac{dh}{dt} = R - k\\sqrt{h}$$, or $$\\frac{dh}{dt} = \\frac{R}{A} - \\frac{k}{A}\\sqrt{h}$$. This is the differential equation relating h and t.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "For $$y = x^x$$ with $$x, y > 0$$, use logarithmic differentiation to find $$\\frac{dy}{dx}$$. (3 steps)", "answer": "- Step 1: Take natural log: $$\\ln y = x\\ln x$$ (using log-power rule to bring the exponent down).\n- Step 2: Differentiate both sides with respect to $$x$$:\n+ Left: $$\\frac{1}{y}\\frac{dy}{dx}$$ (chain rule).\n+ Right: product rule on $$x\\ln x$$ gives $$\\ln x + x\\cdot\\frac{1}{x} = \\ln x + 1$$.\n- Step 3: Rearrange: $$\\frac{dy}{dx} = y(1 + \\ln x) = x^x(1 + \\ln x)$$.\n\nTakeaway: logs turn \"variable to variable power\" into a product that standard rules handle; this trick is essential for $$x^x$$ type expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "A curve is defined parametrically by $$x = t^2$$ and $$y = t^3$$. At t = 2, is the gradient of the curve positive or negative? Without calculating the exact value, explain how you can determine this. (2 steps)", "answer": "- Step 1: Compute the derivatives: $$\\frac{dx}{dt} = 2t$$ and $$\\frac{dy}{dt} = 3t^2$$. Notice that $$\\frac{dy}{dt}$$ is always non-negative (zero only at t = 0), while $$\\frac{dx}{dt}$$ is negative when t < 0 and positive when t > 0.\n\n- Step 2: At t = 2, both $$\\frac{dy}{dt} > 0$$ and $$\\frac{dx}{dt} > 0$$, so their ratio $$\\frac{dy}{dx} = \\frac{3t^2}{2t} = \\frac{3t}{2}$$ is positive. The gradient is positive. Intuition: as t increases, both x and y increase, so the curve slopes upward from left to right.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "If a parametric curve has $$x = 4\\sin 3t$$, $$y = 3\\cos 3t$$, what shape is it and does the parametric gradient match implicit differentiation? (4 steps)", "answer": "- Step 1: Identify: $$x/4 = \\sin 3t$$, $$y/3 = \\cos 3t$$. Sum of squares: $$(x/4)^2 + (y/3)^2 = 1$$ — an ellipse with semi-axes 4 and 3.\n- Step 2: Parametric derivative: $$\\frac{dx}{dt} = 12\\cos 3t$$, $$\\frac{dy}{dt} = -9\\sin 3t$$. So $$\\frac{dy}{dx} = -\\frac{9\\sin 3t}{12\\cos 3t} = -\\frac{3}{4}\\tan 3t$$.\n- Step 3: Implicit derivative of $$x^2/16 + y^2/9 = 1$$: $$\\frac{2x}{16} + \\frac{2y}{9}\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{9x}{16y}$$.\n- Step 4: Substitute $$x, y$$ in parametric: $$-\\frac{9 \\cdot 4\\sin 3t}{16 \\cdot 3\\cos 3t} = -\\frac{3}{4}\\tan 3t$$ ✓ Matches.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "For a radioactive mass $$m = 40e^{-0.244t}$$, explain the physical significance of the sign and magnitude of $$\\frac{dm}{dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{dm}{dt} = 40\\cdot(-0.244)e^{-0.244t} = -0.244\\,m$$ — proportional to current mass, with a negative constant.\n- Step 2: Sign: negative ⇒ mass is decreasing over time. This matches radioactive decay — atoms are being lost, not gained.\n- Step 3: Magnitude: $$|\\frac{dm}{dt}| = 0.244\\,m$$ — loss rate is proportional to current mass. Larger $$m$$ means more atoms available to decay, hence faster loss.\n\nTakeaway: derivative of exponential decay is \"decay constant × current quantity\"; sign = direction, magnitude = rate intensity.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "The ice on a pond thickens at a rate inversely proportional to $$x^2$$ (where $$x$$ is thickness). Write the differential equation and explain physically why the $$x^2$$ appears. (3 steps)", "answer": "- Step 1: Differential equation: $$\\frac{dx}{dt} = \\frac{k}{x^2}$$ with $$k > 0$$ (growth).\n- Step 2: The $$x^2$$ in the denominator means thicker ice slows its own growth. Physically: existing ice acts as insulation. Heat must flow through it for new water at the bottom to freeze — and the rate of heat flow is inversely proportional to the insulating thickness (one factor of $$x$$) and to thermal resistance (another factor of $$x$$).\n- Step 3: Prediction: $$\\int x^2 \\, dx = \\int k \\, dt \\Rightarrow x^3 \\propto t$$. So thickness grows as $$t^{1/3}$$ — very slow once ice is thick. This matches real winter pond observations.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Edge case: Consider the implicit equation $$x^2 + y^2 = -5$$. If you differentiate implicitly, you get $$2x + 2y\\frac{dy}{dx} = 0$$. Does this curve have any stationary points? What does this reveal about implicit differentiation? (3 steps)", "answer": "- Step 1: Setting the numerator condition for stationary points, if we solve $$2x = 0$$, we get $$x = 0$$.\n- Step 2: If we substitute $$x = 0$$ into the original equation, we get $$0 + y^2 = -5$$, which means $$y^2 = -5$$. There are no real values for $$y$$, so the point $$x=0$$ does not exist on this curve in the real plane.\n- Step 3: This reveals that implicit differentiation is a purely mechanical process. \n+ It will blindly give you a formula for $$\\frac{dy}{dx}$$ even if the original equation describes an empty set (no real points).\n+ You must always verify that the points you find actually lie on the original curve.\n\nImplicit differentiation doesn't check if the curve is real; always validate points against the original equation.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "For a parametric curve, can $$\\frac{dy}{dx}$$ exist at a point where both $$\\frac{dx}{dt} = 0$$ and $$\\frac{dy}{dt} = 0$$ simultaneously? What geometric situations can arise? (2 steps)", "answer": "- Step 1: The formula $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt}$$ gives $$\\frac{0}{0}$$ — undefined. The gradient might exist but cannot be found from this formula alone. You'd need higher-order analysis (second derivatives, limits) or converting to Cartesian form near that point.\n- Step 2: Possible geometric situations:\n+ A **cusp** — the curve reverses direction, like $$x = t^3$$, $$y = t^2$$ at $$t = 0$$ (the curve has a sharp point).\n+ A **smooth point with a well-defined tangent** — like $$x = t^2$$, $$y = t^2$$ at $$t = 0$$ (the curve passes through the origin along the line $$y = x$$, but both derivatives are zero there).\n+ A **point where the curve stops and starts** (self-intersection with different tangent directions at the same point).\n\nThe 0/0 case is ambiguous — you cannot simply conclude \"no gradient\" or \"zero gradient.\"", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "What is the main advantage of using parametric differentiation rather than first converting to Cartesian form?", "answer": "Many parametric curves cannot be cleanly rewritten as $$y = f(x)$$ — either the algebra is ugly, or a single $$x$$ corresponds to multiple $$y$$-values (loops, self-intersections). Parametric differentiation lets you evaluate the gradient at any $$t$$ by taking two simple derivatives $$\\frac{dx}{dt}$$ and $$\\frac{dy}{dt}$$, without ever \"solving for $$y$$.\" This is especially valuable for curves built from trig functions, exponentials, or rational expressions where inversion creates multi-valued messes. You stay entirely in \"$$t$$-world\" where each $$t$$ gives one unique point.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "When finding $$\\frac{dy}{dx}$$ parametrically at a specific $$t$$-value, why is it often better to keep the general expression in $$t$$ and substitute last? (3 steps)", "answer": "- Step 1: Mathematically, substituting early or late gives the same numerical result — the ratio of numbers equals the number of the ratio.\n- Step 2: Keeping the expression symbolic in $$t$$ is useful when you need the gradient as a function (e.g., finding all points of zero gradient, or showing no stationary points exist).\n- Step 3: A symbolic $$\\frac{dy}{dx}(t)$$ also lets you set it equal to any target slope (e.g., a slope parallel to some line), solve for $$t$$, and then backtrack to coordinates — one formula solves many problems.\n\nTakeaway: symbolic first, numerical last — you get flexibility for free.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "For the parametric curve, how do you compute $$\\frac{d^2y}{dx^2}$$? Why isn't it just $$\\frac{d^2y/dt^2}{d^2x/dt^2}$$? (3 steps)", "answer": "- Step 1: The correct formula is $$\\frac{d^2y}{dx^2} = \\frac{d}{dx}\\left(\\frac{dy}{dx}\\right) = \\frac{\\frac{d}{dt}(dy/dx)}{dx/dt}$$.\n- Step 2: You first compute $$\\frac{dy}{dx}$$ as a function of $$t$$, then differentiate IT with respect to $$t$$, then divide by $$\\frac{dx}{dt}$$.\n- Step 3: The \"obvious but wrong\" formula $$\\frac{d^2y/dt^2}{d^2x/dt^2}$$ skips the chain rule entirely — it's analogous to the mistake of treating $$\\frac{dy}{dx}$$ as $$\\frac{dy}{dt} - \\frac{dx}{dt}$$. Second derivatives need the parametric chain rule applied twice.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Give an intuitive unit-based reason for why $$\\frac{dA}{dt} = \\frac{dA}{dr}\\cdot\\frac{dr}{dt}$$. (3 steps)", "answer": "- Step 1: $$\\frac{dA}{dr}$$ has units of \"$$A$$-units per $$r$$-unit\"; $$\\frac{dr}{dt}$$ has units of \"$$r$$-units per $$t$$-unit\".\n- Step 2: Multiplying cancels the $$r$$-units: $$\\frac{A}{r}\\cdot\\frac{r}{t} = \\frac{A}{t}$$ — the result has units of $$\\frac{dA}{dt}$$, confirming the identity.\n- Step 3: Physically, $$r$$ is an intermediate messenger: a change in $$t$$ first produces a change in $$r$$, which in turn produces a change in $$A$$. Rates compose multiplicatively through the chain.\n\nTakeaway: chain rule = unit cancellation = composing rates through intermediate variables.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "A curve has equation y = f(x) where f is defined implicitly. Explain why finding d²y/dx² using implicit differentiation is more complex than finding dy/dx. What extra step is needed? (2 steps)", "answer": "- Step 1: After finding dy/dx implicitly (which itself contains x and y), differentiating again requires treating y as a function of x, so any y in dy/dx must be differentiated using the chain rule: d/dx(y) = dy/dx.\n- Step 2: The extra step is applying the product/chain rule to the first derivative expression, which now contains both x and y(x). This makes the algebra significantly more involved.\n+ For example, if dy/dx = -x/y, then d²y/dx² = d/dx(-x/y) = -(1×y - x×dy/dx)/y² using quotient rule", "source": "MiniMax ②", "_id": "minimax_2_83"}, {"question": "Think about why $$\\frac{d}{dx}(\\ln y) = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$ rather than just $$\\frac{1}{y}$$. (3 steps)", "answer": "- Step 1: $$\\ln y$$ is a composition: outer function $$\\ln(\\cdot)$$, inner function $$y(x)$$.\n- Step 2: Chain rule: $$\\frac{d}{dx}[\\ln y] = \\frac{1}{y} \\cdot \\frac{dy}{dx}$$. The $$\\frac{1}{y}$$ comes from differentiating $$\\ln$$; the $$\\frac{dy}{dx}$$ comes from differentiating the inner $$y(x)$$.\n- Step 3: If we were differentiating with respect to $$y$$ itself, then $$\\frac{d}{dy}(\\ln y) = \\frac{1}{y}$$ — no chain factor. The $$\\frac{dy}{dx}$$ factor is always there whenever the variable of differentiation differs from the function's explicit variable.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "If you know $$\\frac{dV}{dr} = 2\\pi r^2$$, how do you obtain $$\\frac{dr}{dV}$$? What general principle is being used, and when might it fail? (2 steps)", "answer": "- Step 1: The relationship is $$\\frac{dr}{dV} = \\frac{1}{\\frac{dV}{dr}} = \\frac{1}{2\\pi r^2}$$. This is the **reciprocal rule** for derivatives: if $$y = f(x)$$ is a differentiable function with $$f'(x) \\neq 0$$, then the inverse function has derivative $$\\frac{dx}{dy} = \\frac{1}{dy/dx}$$.\n- Step 2: This fails when $$\\frac{dV}{dr} = 0$$ — at such points, $$V$$ is stationary with respect to $$r$$, meaning the \"inverse\" relationship $$r$$ as a function of $$V$$ is not differentiable (the function is flat, so its inverse would be vertical/undefined). In practice, for geometric formulas like $$V = \\frac{2}{3}\\pi r^3$$ with $$r > 0$$, $$\\frac{dV}{dr}$$ is always positive, so the reciprocal rule always works.\n\n+ Intuition: if $$V$$ changes rapidly with $$r$$ (large $$\\frac{dV}{dr}$$), then $$r$$ changes slowly with $$V$$ (small $$\\frac{dr}{dV}$$) — they're inverses of each other.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Why is implicit differentiation especially powerful when dealing with equations that mix algebraic and transcendental functions? (3 steps)", "answer": "- Step 1: Equations like $$e^{2x}\\ln y = x + y - 2$$ have no hope of being solved explicitly for $$y$$ — the mix of polynomial, exponential, and logarithmic parts resists algebraic isolation.\n- Step 2: Implicit differentiation doesn't care about solvability: you just differentiate each term using standard rules (product, chain), treating $$y$$ as a hidden function.\n- Step 3: The resulting slope expression can be evaluated at any point, giving information about the curve's geometry without ever finding an explicit formula for it.\n\nTakeaway: implicit differentiation works on any smooth curve equation, regardless of whether $$y = f(x)$$ can be extracted — a universal tool.", "source": "Opus 4.7 ②", "_id": "opus_2_82"}, {"question": "Summarise when each approach — explicit, implicit, or parametric — is best for differentiation. (3 steps)", "answer": "- Step 1: Explicit ($$y = f(x)$$): use when $$y$$ is easily isolated. Direct differentiation with standard rules.\n- Step 2: Parametric ($$x(t), y(t)$$): use when both variables are naturally functions of a parameter (e.g., motion, circles, curves failing vertical-line test). Gradient via $$\\frac{dy/dt}{dx/dt}$$.\n- Step 3: Implicit ($$F(x,y) = 0$$): use when $$y$$ is mixed with $$x$$ inseparably (e.g., $$x^2 + xy + y^3 = 1$$). Differentiate term-by-term treating $$y$$ as a hidden function; $$\\frac{dy}{dx}$$ expressed in both $$x, y$$.\n\nTakeaway: pick the form that matches the problem structure; all three rely on chain rule, just applied differently.", "source": "Opus 4.7 ②", "_id": "opus_2_80"}, {"question": "A curve has equation y = f(x). If we parametrize it as x = t, y = f(t), what is dy/dx in terms of t? What does this tell us about this particular parametrization? (2 steps)", "answer": "- Step 1: dx/dt = 1, dy/dt = f'(t), so dy/dx = f'(t)/1 = f'(t)\n- Step 2: This is simply the original derivative expressed in terms of the parameter t (which equals x). This trivial parametrization (called the \"identity parametrization\") shows that parametric differentiation includes regular differentiation as a special case.\n+ The parameter t is just another name for x in this case", "source": "MiniMax ②", "_id": "minimax_2_52"}, {"question": "A curve is defined implicitly by y = sin(x + y). Find dy/dx. What complication arises from having y on both sides? (2 steps)", "answer": "- Step 1: Differentiate: dy/dx = cos(x + y) × (1 + dy/dx)\n- Step 2: So dy/dx = cos(x + y) + cos(x + y) × dy/dx. Rearranging: dy/dx[1 - cos(x + y)] = cos(x + y)\n- Step 3: Thus dy/dx = cos(x + y)/[1 - cos(x + y)]\n+ The complication is that dy/dx appears on BOTH sides of the equation after differentiation, requiring algebraic rearrangement to solve for it", "source": "MiniMax ②", "_id": "minimax_2_73"}, {"question": "A curve with implicit equation x³ + y³ = 3xy has a self-intersection. Find the gradient at the origin (0, 0) and explain what makes this case special. (3 steps)", "answer": "- Step 1: Differentiate implicitly: 3x² + 3y² dy/dx = 3y + 3x dy/dx\n- Step 2: Rearrange: dy/dx(3y² - 3x) = 3y - 3x², so dy/dx = (y - x²)/(y² - x)\n- Step 3: At (0, 0), this gives 0/0 — indeterminate! This is the Folium of Descartes, which has a self-intersection (node) at the origin. The gradient is different depending on which branch approaches the origin.\n+ Near the origin, the curve looks like an \"X\" with different slopes on each branch. This is a singular point requiring careful limiting analysis.", "source": "MiniMax ②", "_id": "minimax_2_62"}, {"question": "Why does the result $$\\frac{dR}{dt} = -k$$ for the evaporating snowman feel counterintuitive at first, and what makes it work? (3 steps)", "answer": "- Step 1: Intuitively, one might expect smaller snowballs to shrink faster or slower depending on size — a size-dependent rate.\n- Step 2: But \"volume loss ∝ surface area\" has a deep geometric consequence: both $$\\frac{dV}{dt}$$ and $$\\frac{dV}{dR}$$ are proportional to $$R^2$$ (the surface-area factor). The ratio $$\\frac{dR}{dt} = \\frac{dV/dt}{dV/dR}$$ has these $$R^2$$ factors cancel completely.\n- Step 3: Result: $$\\frac{dR}{dt}$$ depends only on $$k$$ (the material's evaporation constant) — independent of $$R$$. Small and large snowmen lose radius at the same rate.\n\nTakeaway: this is a geometric \"accident\" — two $$R^2$$ factors cancel perfectly because of how volume and surface area scale with radius in 3D.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "In parametric form, the curve x = a cos³t, y = a sin³t (an astroid) has a singular point at t = 0. Find dy/dx and explain what happens. (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = -3a cos²t sin t, dy/dt = 3a sin²t cos t\n- Step 2: So dy/dx = (3a sin²t cos t)/(-3a cos²t sin t) = -tan t / tan t = -1 for t ≠ 0, π/2, etc. Wait: = -sin²t cos t/(cos²t sin t) = -sin/cos = -tan t? Let me redo: = (3a sin²t cos t)/(-3a cos²t sin t) = -(sin²t cos t)/(cos²t sin t) = -sin t/cos t = -tan t\n- Step 3: At t = 0: dy/dx = -tan(0) = 0. But dx/dt = 0 at t = 0, giving 0/0 form. Using limit: as t → 0, -tan t/t → -1. So gradient = -1 at the cusp!\n+ The astroid has a cusp at (a, 0) where the tangent is well-defined (gradient -1) but the curve has a sharp point", "source": "MiniMax ②", "_id": "minimax_2_84"}, {"question": "A cube's volume decreases at $$4.5$$ cm³/s. Why can't you immediately find the rate at which the side length decreases without knowing the current volume? Explain the chain of relationships. (2 steps)", "answer": "- Step 1: Let $$V = s^3$$ (volume of cube with side $$s$$). By the chain rule: $$\\frac{dV}{dt} = \\frac{dV}{ds} \\times \\frac{ds}{dt} = 3s^2 \\times \\frac{ds}{dt}$$. We know $$\\frac{dV}{dt} = -4.5$$, but $$\\frac{dV}{ds} = 3s^2$$ depends on the current side length $$s$$.\n- Step 2: Solving: $$\\frac{ds}{dt} = \\frac{dV/dt}{dV/ds} = \\frac{-4.5}{3s^2} = \\frac{-1.5}{s^2}$$. This depends on $$s$$ — you need the current side length (or equivalently, the current volume) to get a numerical answer. A small cube (small $$s$$) has its sides shrinking much faster than a large cube, because the same volume loss is a larger fraction of the total.\n\n+ Intuition: losing 4.5 cm³ from a 1000 cm³ cube barely affects the side length, but losing 4.5 cm³ from a 10 cm³ cube dramatically shrinks it. The chain rule captures this through the $$3s^2$$ factor.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Differentiate $$x^2 y$$ with respect to $$x$$, assuming $$y = y(x)$$, and identify the two distinct sources of the terms. (3 steps)", "answer": "- Step 1: Apply the product rule with $$u = x^2$$ and $$v = y$$: $$\\frac{d}{dx}(x^2 y) = \\frac{d(x^2)}{dx}\\cdot y + x^2\\cdot\\frac{dy}{dx}$$.\n- Step 2: Compute $$\\frac{d(x^2)}{dx} = 2x$$, giving $$\\frac{d}{dx}(x^2 y) = 2xy + x^2\\frac{dy}{dx}$$.\n- Step 3: Two distinct origins:\n+ First term ($$2xy$$) comes from \"differentiate the $$x$$-part, keep the $$y$$-part\".\n+ Second term ($$x^2\\frac{dy}{dx}$$) comes from \"keep the $$x$$-part, differentiate the $$y$$-part\" — the $$y$$-derivative generates the $$\\frac{dy}{dx}$$ factor via chain rule.\n\nTakeaway: any product involving $$y$$ splits into two terms via product rule; the $$y$$-term carries a $$\\frac{dy}{dx}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "On the curve $$7x^2 + 48xy - 7y^2 + 75 = 0$$, suppose points $$A$$ and $$B$$ both have $$\\frac{dy}{dx} = \\frac{2}{11}$$. Show the line through them has equation $$x + 2y = 0$$. (5 steps)", "answer": "- Step 1: Differentiate implicitly: $$14x + 48(x\\frac{dy}{dx} + y) - 14y\\frac{dy}{dx} = 0$$.\n- Step 2: Simplify: $$14x + 48y + (48x - 14y)\\frac{dy}{dx} = 0$$.\n- Step 3: Set $$\\frac{dy}{dx} = 2/11$$: $$14x + 48y + (48x - 14y)\\frac{2}{11} = 0$$. Multiply through by 11: $$154x + 528y + 96x - 28y = 0$$.\n- Step 4: Combine: $$250x + 500y = 0 \\Rightarrow x + 2y = 0$$.\n- Step 5: This is a linear equation satisfied by EVERY point on the curve with gradient $$2/11$$ — in particular, by both $$A$$ and $$B$$. So the chord $$AB$$ lies on $$x + 2y = 0$$. Elegant fact: the locus of points of given gradient on a conic is a chord.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Connect differential equations and integration: why does solving a simple DE boil down to integration? (3 steps)", "answer": "- Step 1: A DE like $$\\frac{dP}{dt} = f(P)$$ or $$\\frac{dP}{dt} = g(t)$$ expresses the derivative of an unknown function.\n- Step 2: Integration is the inverse of differentiation, so to recover $$P(t)$$, one typically integrates: e.g., if $$\\frac{dP}{dt} = g(t)$$, then $$P(t) = \\int g(t)\\,dt + C$$.\n- Step 3: For more complex DEs (like $$\\frac{dP}{dt} = kP$$), separation of variables leads to integrations on each side: $$\\int \\frac{dP}{P} = \\int k\\,dt$$, giving $$\\ln P = kt + C$$, hence $$P = Ae^{kt}$$.\n\nTakeaway: DE solving = integration (possibly after rearrangement); the constant of integration reflects the missing initial condition.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "A circle has radius increasing at $$0.4$$ cm/s. Why does the area's rate of change depend on $$r$$, even though $$\\frac{dr}{dt}$$ is constant? (3 steps)", "answer": "- Step 1: $$A = \\pi r^2$$, so $$\\frac{dA}{dt} = 2\\pi r \\frac{dr}{dt} = 0.8\\pi r$$.\n- Step 2: $$\\frac{dA}{dt}$$ grows linearly with $$r$$: bigger circle → faster area growth.\n- Step 3: Intuition: each incremental ring added has area $$\\approx 2\\pi r \\cdot dr$$ (circumference times thickness). Constant $$dr$$ per unit time means bigger rings get added as $$r$$ grows — so more area per unit time. Area grows quadratically while radius grows linearly: $$A \\sim t^2$$, $$r \\sim t$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "Why does a parametric curve's gradient satisfy the ratio formula $$\\frac{dy/dt}{dx/dt}$$ rather than the (wrong) difference $$\\frac{dy}{dt} - \\frac{dx}{dt}$$? (3 steps)", "answer": "- Step 1: Slope is rise-over-run, inherently a ratio of two infinitesimal quantities.\n- Step 2: Scale check: if you re-parametrize with $$s = 2t$$, both $$\\frac{dy}{dt}$$ and $$\\frac{dx}{dt}$$ double — a difference would also double (wrong — the geometric slope shouldn't change), but a ratio stays the same (correct).\n- Step 3: Conceptually, only the ratio captures the intrinsic geometric slope independent of traversal speed.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "A curve has implicit equation $$\\sin(xy) = x + y$$. How would you find $$\\frac{dy}{dx}$$ using implicit differentiation? What rules are applied at each step? (3 steps)", "answer": "- Step 1: Differentiate both sides with respect to x:\n$$\\frac{d}{dx}[\\sin(xy)] = \\frac{d}{dx}[x] + \\frac{d}{dx}[y]$$\n\n- Step 2: For sin(xy), use chain rule: derivative of sin(u) is cos(u) × du/dx, where u = xy. So we get $$\\cos(xy) \\times \\frac{d}{dx}(xy)$$. Then apply product rule to d/dx(xy): $$\\cos(xy) \\times (x\\frac{dy}{dx} + y)$$.\n\n- Step 3: The right side differentiates to 1 + dy/dx. So:\n$$\\cos(xy)(x\\frac{dy}{dx} + y) = 1 + \\frac{dy}{dx}$$\nNow collect dy/dx terms and solve. The key is recognizing multiple rules: chain rule (sin → cos), product rule (xy), and the fundamental implicit differentiation step (d/dx of y gives dy/dx).", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "For the implicit curve $$e^{2x} \\ln y = x + y - 2$$, why is early substitution especially powerful at the point $$(1, 1)$$? (3 steps)", "answer": "- Step 1: Differentiating gives a messy equation involving $$e^{2x}$$, $$\\frac{1}{y}$$, $$\\ln y$$, and $$\\frac{dy}{dx}$$ in multiple places.\n- Step 2: At $$(1, 1)$$: $$e^{2 \\cdot 1} = e^2$$, $$\\frac{1}{1} = 1$$, $$\\ln 1 = 0$$. The $$\\ln y$$ term vanishes entirely, and many factors become clean numbers.\n- Step 3: The remaining equation collapses to roughly $$e^2 \\cdot \\frac{dy}{dx} = 1 + \\frac{dy}{dx}$$, solvable in one step. Waiting to substitute would mean wading through algebra with live logarithms.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "A problem states \"the rate of change of $$P$$ is proportional to $$P$$\". How do you translate this into a differential equation, and what does the sign of the proportionality constant control? (3 steps)", "answer": "- Step 1: \"Rate of change\" means $$\\frac{dP}{dt}$$; \"proportional to $$P$$\" means equal to a constant times $$P$$: $$\\frac{dP}{dt} = kP$$.\n- Step 2: The sign of $$k$$ controls behaviour:\n+ $$k > 0$$: exponential growth — $$P$$ increases indefinitely.\n+ $$k < 0$$: exponential decay — $$P$$ heads toward zero.\n- Step 3: In decay contexts (radioactivity, cooling), convention writes $$\\frac{dP}{dt} = -kP$$ with $$k > 0$$, making the negative sign explicit while keeping $$k$$ always positive.\n\nTakeaway: \"proportional to\" → \"= constant ×\"; sign convention separates magnitude from direction.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Why can't we always find $$\\frac{dy}{dx}$$ directly for parametric curves, and how does the chain rule logically connect the rates $$\\frac{dy}{dt}$$, $$\\frac{dx}{dt}$$, and $$\\frac{dy}{dx}$$? (3 steps)", "answer": "- Step 1: Parametric equations define both $$x$$ and $$y$$ in terms of a third variable (the parameter, $$t$$). Often, converting these to a single Cartesian equation $$y = f(x)$$ is algebraically difficult or impossible (e.g., for loops or self-intersecting curves), so we need a direct method.\n- Step 2: The chain rule states that the rate of change of $$y$$ with respect to $$t$$ can be broken down into the rate of change of $$y$$ with respect to $$x$$, multiplied by the rate of change of $$x$$ with respect to $$t$$. Mathematically, this is $$\\frac{dy}{dt} = \\frac{dy}{dx} \\times \\frac{dx}{dt}$$.\n- Step 3: By rearranging the chain rule expression algebraically, we isolate the gradient $$\\frac{dy}{dx}$$ to get the parametric differentiation formula: $$\\frac{dy}{dx} = \\frac{\\frac{dy}{dt}}{\\frac{dx}{dt}}$$. This allows us to find the gradient using the rates with respect to the parameter directly.\n\nThink of it as traveling along a path: your vertical speed $$(\\frac{dy}{dt})$$ divided by your horizontal speed $$(\\frac{dx}{dt})$$ gives your instantaneous slope $$(\\frac{dy}{dx})$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Why does the \"constant radius shrink rate\" result for evaporating spheres NOT hold for cubes or other shapes? (3 steps)", "answer": "- Step 1: The identity that made it work is $$\\frac{dV}{dR} = A$$ (up to constants) — the \"skin identity\" that volume change equals surface area times thickness.\n- Step 2: For a cube with side $$s$$: $$V = s^3$$, so $$\\frac{dV}{ds} = 3s^2 = A/2$$ (since $$A = 6s^2$$). So $$\\frac{dV}{dt} \\propto A$$ gives $$\\frac{ds}{dt}$$ proportional to something specific, **not** constant.\n- Step 3: More carefully: for cube, $$\\frac{dV}{dt} = -kA$$ combined with $$\\frac{dV}{dt} = 3s^2 \\frac{ds}{dt}$$ gives $$3s^2 \\frac{ds}{dt} = -6ks^2$$, so $$\\frac{ds}{dt} = -2k$$ — actually it IS constant for cubes too! This is because cubes maintain proportional scaling under uniform evaporation. The constant-rate property holds for any shape with fixed angular geometry evaporating uniformly by surface area.", "source": "Opus 4.7 ①", "_id": "opus_1_86"}, {"question": "A certain bacteria population P grows so that dP/dt = kP(1000 - P). What type of growth does this differential equation describe? What do the two terms in the parentheses represent? (2 steps)", "answer": "- Step 1: This is logistic growth — bounded growth with a carrying capacity. It combines exponential growth (kP) with a limiting factor (1000 - P) that slows growth as P approaches 1000.\n- Step 2: The term P represents current population (growth potential), and (1000 - P) represents the \"room to grow.\" When P is small, (1000 - P) ≈ 1000, giving near-exponential growth. As P → 1000, the factor goes to zero, stopping growth.\n+ This models real populations that stabilize due to limited resources", "source": "MiniMax ②", "_id": "minimax_2_70"}, {"question": "Why is it often preferable to find $$\\frac{dy}{dx}$$ in terms of the parameter rather than converting to Cartesian form first? Give two practical reasons. (2 steps)", "answer": "- Step 1: **Some curves cannot be expressed as a single function** $$y = f(x)$$. A circle $$x = \\cos t$$, $$y = \\sin t$$ would require two functions ($$y = \\sqrt{1-x^2}$$ and $$y = -\\sqrt{1-x^2}$$), and curves like $$x = t^2$$, $$y = t^3$$ give $$y = x^{3/2}$$ only for $$t \\geq 0$$, losing the branch where $$t < 0$$ and $$x$$ is still positive but $$y$$ is negative. Parametric form captures the full trajectory, including self-intersections and direction of travel.\n- Step 2: **The algebra of conversion can be messy or impossible.** For $$x = \\frac{2t}{1+t^2}$$, $$y = \\frac{1-t^2}{1+t^2}$$, converting to Cartesian requires solving for $$t$$ in terms of $$x$$ and substituting — a complicated rational expression. Differentiating parametrically is straightforward: just differentiate each equation with respect to $$t$$ and take the ratio.\n\nThe principle: work in the natural coordinate system of the problem. If the curve is given parametrically, stay parametric.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "When finding the normal to a parametric curve at a point, we sometimes need to handle the case where the tangent is horizontal differently than when it's vertical. Explain why. (2 steps)", "answer": "- Step 1: If tangent is horizontal (gradient = 0), then normal gradient = $$-1/0$$, which is undefined — the normal is vertical (x = constant). We handle this by recognizing the normal is a vertical line through that x-coordinate.\n\n- Step 2: If tangent is vertical (gradient undefined, dx/dt = 0), then normal gradient = 0 — the normal is horizontal (y = constant). These edge cases require recognizing that the standard point-slope form y - y₁ = m(x - x₁) breaks down when m is undefined. Instead, we use the geometric understanding: vertical tangent → horizontal normal, horizontal tangent → vertical normal.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "A curve has implicit equation (x - y)⁴ = x + y + 5. Find dy/dx. What is the challenge in differentiating the left side? (2 steps)", "answer": "- Step 1: Let u = x - y, so u⁴. Differentiate: 4(x - y)³ × (1 - dy/dx) = 1 + dy/dx\n- Step 2: This gives: 4(x - y)³ - 4(x - y)³ dy/dx = 1 + dy/dx. Rearranging: dy/dx[1 + 4(x - y)³] = 4(x - y)³ - 1, so dy/dx = [4(x - y)³ - 1]/[1 + 4(x - y)³]\n+ The challenge is the chain rule applied to (x - y)⁴: we need the derivative of (x - y), which is 1 - dy/dx, because y depends on x", "source": "MiniMax ②", "_id": "minimax_2_93"}, {"question": "For the curve $$e^{2x} + e^{2y} = xy$$, why would it be infeasible to differentiate explicitly, forcing implicit differentiation? (3 steps)", "answer": "- Step 1: Attempting to solve for $$y$$: $$e^{2y} = xy - e^{2x}$$, so $$2y = \\ln(xy - e^{2x})$$, giving $$y = \\frac{1}{2}\\ln(xy - e^{2x})$$. But $$y$$ still appears on the right!\n- Step 2: This equation cannot be solved in closed form for $$y$$ as a function of $$x$$ — it's a transcendental equation.\n- Step 3: Implicit differentiation sidesteps this entirely: differentiate both sides of the original with respect to $$x$$, treating each $$e^{2y}$$ and $$y$$-term with the chain rule, and solve algebraically for $$\\frac{dy}{dx}$$. Implicit is not just convenient — sometimes it's the only option.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "For the curve $$y^3 + 3xy^2 - x^3 = 3$$, what does the condition \"$$\\frac{dy}{dx} = 0$$ requires $$y = \\pm x$$\" geometrically indicate? (3 steps)", "answer": "- Step 1: The condition $$y^2 = x^2$$ says that at turning points, the $$y$$-coordinate equals $$\\pm$$ the $$x$$-coordinate.\n- Step 2: Geometrically, the turning points lie on the two lines $$y = x$$ and $$y = -x$$ (the diagonals).\n- Step 3: Combined with the original implicit equation, this pins down specific coordinates — only finitely many points lie on both the curve and a diagonal line.\n\nTakeaway: zero-gradient conditions often give a simple locus (like a line); intersecting with the original curve picks out the stationary points.", "source": "Opus 4.7 ②", "_id": "opus_2_83"}, {"question": "Give a geometric explanation for why the normal to a curve at a point has slope $$-\\frac{1}{m}$$ when the tangent has slope $$m$$. (3 steps)", "answer": "- Step 1: The tangent and normal are perpendicular lines. For two perpendicular lines with slopes $$m_1$$ and $$m_2$$: $$m_1\\cdot m_2 = -1$$.\n- Step 2: Solving: $$m_2 = -\\frac{1}{m_1}$$ — \"flip and negate\".\n- Step 3: Visually: a line with slope $$m$$ rises $$m$$ units for every 1-unit run. Rotating this line $$90°$$ swaps \"run\" and \"rise\" and flips one sign, yielding rise 1 per run $$-m$$, i.e., slope $$-\\frac{1}{m}$$.\n\nTakeaway: perpendicular slopes are negative reciprocals — a direct consequence of $$90°$$ rotation in the plane.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why does \"rate proportional to amount\" always lead to exponential behaviour? (3 steps)", "answer": "- Step 1: The DE $$\\frac{dP}{dt} = kP$$ asks: \"what function's derivative is proportional to itself?\"\n- Step 2: The exponential function is the unique (up to constant multiples) function with this property: $$\\frac{d}{dt}(e^{kt}) = k e^{kt}$$, so $$P(t) = P_0 e^{kt}$$.\n- Step 3: Intuition: each individual (atom/person/dollar) contributes a constant growth rate, so the total rate scales with the total count — a self-reinforcing compounding that must be exponential.\n\nTakeaway: proportionality of rate to amount ⇒ exponential solution; this underlies compound interest, decay, uninhibited growth, and countless models.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Synthesis: A curve is given by $$x = t^3, y = t^2$$. Without converting to Cartesian, reason whether this curve passes through the origin, and if so, how many times? (3 steps)", "answer": "- Step 1: The origin occurs where both $$x = 0$$ and $$y = 0$$. We set the parametric equations to zero: $$t^3 = 0$$ and $$t^2 = 0$$.\n- Step 2: Both equations are satisfied when $$t = 0$$. So the curve passes through the origin exactly once (at $$t=0$$).\n- Step 3: Even though $$t^2$$ is an even function (so $$y$$ is the same for $$t$$ and $$-t$$), the x-component $$t^3$$ is odd ($$x$$ changes sign for $$-t$$). \n+ Therefore, at $$t=1$$ and $$t=-1$$, the curve is at different points $$(1,1)$$ and $$(-1,1)$$, so it doesn't hit the origin again.\n\nTo find intersections with axes parametrically, set $$x=0$$ or $$y=0$$ and solve for $$t$$, then check the other coordinate.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "A curve is defined by x = t² + t, y = t² - t. Find dy/dx in terms of t. At what values of t does the tangent have gradient 1? (3 steps)", "answer": "- Step 1: Differentiate: dx/dt = 2t + 1, dy/dt = 2t - 1\n- Step 2: dy/dx = (2t - 1)/(2t + 1)\n- Step 3: Set equal to 1: (2t - 1)/(2t + 1) = 1 → 2t - 1 = 2t + 1 → -1 = 1, which is impossible!\n+ This curve never has tangent slope 1 — the gradient is always less than 1 (for t > -1/2) or greater than 1 (for t < -1/2), approaching but never reaching 1 as t → ∞", "source": "MiniMax ②", "_id": "minimax_2_105"}, {"question": "Describe how you would extract the coordinates of turning points on the implicit curve $$y^3 + 3xy^2 - x^3 = 3$$. (5 steps)", "answer": "- Step 1: Differentiate implicitly: $$3y^2 \\frac{dy}{dx} + 3y^2 + 6xy \\frac{dy}{dx} - 3x^2 = 0$$.\n- Step 2: Collect $$\\frac{dy}{dx}$$ terms: $$\\frac{dy}{dx}(3y^2 + 6xy) = 3x^2 - 3y^2$$, so $$\\frac{dy}{dx} = \\frac{x^2 - y^2}{y^2 + 2xy}$$.\n- Step 3: Turning point: $$\\frac{dy}{dx} = 0$$ requires $$x^2 - y^2 = 0$$, i.e., $$y = \\pm x$$.\n- Step 4: Substitute each case into the curve equation. E.g., $$y = x$$ gives $$x^3 + 3x^3 - x^3 = 3 \\Rightarrow x^3 = 1 \\Rightarrow x = 1$$, point $$(1, 1)$$.\n- Step 5: Similarly handle $$y = -x$$. Then verify each solution does not also satisfy the denominator $$y^2 + 2xy = 0$$ (to avoid the $$0/0$$ indeterminate case).", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "What is the difference between an explicit equation and an implicit equation? Give an example of each, and explain why implicit differentiation is sometimes the only practical approach. (2 steps)", "answer": "- Step 1: An **explicit** equation has $$y$$ isolated as a function of $$x$$: $$y = f(x)$$, e.g., $$y = x^2 + 3x$$. You differentiate directly. An **implicit** equation mixes $$x$$ and $$y$$ together without isolating either: e.g., $$x^2 + 2xy = 3$$ or $$\\cos(x+y) = 2x$$ or $$e^{2x}\\ln y = x + y - 2$$. In these, $$y$$ is \"implicitly\" defined as a function of $$x$$, but you can't easily solve for it.\n- Step 2: Implicit differentiation is necessary when rearranging to explicit form is impractical or impossible. For $$x^2 + y^3 + 3y = 6$$, solving for $$y$$ would require solving a cubic — messy and unnecessary. For $$e^{x}y = xe^{y}$$, there's no algebraic method to isolate $$y$$. Implicit differentiation lets you find $$\\frac{dy}{dx}$$ directly from the original equation, treating $$y$$ as an unknown function of $$x$$ and applying the chain rule wherever $$y$$ appears.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "On an implicit curve, how do you locate points with horizontal tangents vs. vertical tangents? (3 steps)", "answer": "- Step 1: **Horizontal tangent:** $$\\frac{dy}{dx} = 0$$. Set the numerator of $$\\frac{dy}{dx}$$ to zero, and combine with the original curve equation to solve for $$(x, y)$$.\n- Step 2: **Vertical tangent:** $$\\frac{dy}{dx}$$ undefined (equivalently $$\\frac{dx}{dy} = 0$$). Set the denominator of $$\\frac{dy}{dx}$$ to zero, combined with the curve equation.\n- Step 3: Intuition: horizontal tangents mark highest/lowest points in $$y$$; vertical tangents mark leftmost/rightmost points in $$x$$. Implicit curves can have both kinds.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "For the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, use implicit differentiation to find $$\\frac{dy}{dx}$$ and identify horizontal/vertical tangent points. (3 steps)", "answer": "- Step 1: Differentiate implicitly: $$\\frac{2x}{9} + \\frac{2y}{4}\\frac{dy}{dx} = 0$$. Solving: $$\\frac{dy}{dx} = -\\frac{4x}{9y}$$.\n- Step 2: Horizontal tangents: numerator $$= 0$$ ⇒ $$x = 0$$. Substitute into ellipse: $$y^2 = 4$$, so $$y = \\pm 2$$. Points: $$(0, \\pm 2)$$ — top and bottom.\n- Step 3: Vertical tangents: denominator $$= 0$$ ⇒ $$y = 0$$. Substitute: $$x^2 = 9$$, so $$x = \\pm 3$$. Points: $$(\\pm 3, 0)$$ — left and right extremes. Matches ellipse geometry exactly.\n\nTakeaway: numerator zero → horizontal tangents (top/bottom); denominator zero → vertical tangents (sides).", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"
