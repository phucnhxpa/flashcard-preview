<script>
const DATA={"selected": [{"question": "During the lesson, Phuc initially differentiated $y=\\ln(3x)$ as $y'=\\dfrac{1}{3x}$. What factor is missing from the numerator, and which rule catches the error?", "answer": "Use $\\dfrac{d}{dx}[\\ln f(x)]=\\dfrac{f'(x)}{f(x)}$. Here $f(x)=3x$ and $f'(x)=3$, so $y'=\\dfrac{3}{3x}=\\dfrac{1}{x}$. The missing numerator factor is $3$. A reliable check is: the denominator must be the original log argument and the numerator must be its derivative."}, {"question": "State the four reciprocal trig identities. What is Harry's \"third letter\" memory hook for pairing cosec and sec correctly? (2 steps)", "answer": "- Step 1: The identities are $$\\tan A=\\frac{\\sin A}{\\cos A}$$, $$\\csc A=\\frac{1}{\\sin A}$$, $$\\sec A=\\frac{1}{\\cos A}$$, $$\\cot A=\\frac{1}{\\tan A}$$.\n- Step 2: The hook: the **third letter** of the reciprocal name tells you its partner. co**S**ec → **s**ine; se**C** → **c**osine. This stops the common swap of thinking $$\\sec = 1/\\sin$$.\n\nHarry also lists them in sin, cos, tan order so each reciprocal lines up under its partner — visual alignment reinforces the pairing."}, {"question": "The lesson used the reverse-log pattern, with its official domain condition: what is $\\int \\dfrac{f'(x)}{f(x)}\\,dx$, and how is it connected to differentiating $\\ln f(x)$?", "answer": "On any interval where $f(x)\\ne0$, $\\int \\dfrac{f'(x)}{f(x)}\\,dx=\\ln|f(x)|+C$. This reverses $\\dfrac{d}{dx}[\\ln f(x)]=\\dfrac{f'(x)}{f(x)}$ on intervals where $f(x)>0$; the modulus extends the antiderivative to intervals where $f(x)<0$. The domain qualification is official/specification reference detail; the reverse-log method itself was used in the lesson."}, {"question": "The derivative $\\dfrac{d}{dx}(\\tan x) = \\sec^2 x$ \"should remind you of a trig identity\" in Harry's teaching. **Which identity**, and why does binding derivative-to-identity in memory help in the exam?", "answer": "- Step 1: The matching identity is $1 + \\tan^2 x = \\sec^2 x$ — the Pythagorean identity for tan/sec.\n- Step 2: Binding them in memory means if you remember $\\dfrac{d}{dx}(\\tan x) = \\sec^2 x$, you can recover $1 + \\tan^2 x = \\sec^2 x$ in one step, and vice versa.\n- Step 3: The same pairing applies to $\\cot x \\to -\\cosec^2 x$ and $1 + \\cot^2 x = \\cosec^2 x$.\n- Exam payoff: in questions like \"show $f(x) = ...$ can be written as ...\" you need the identity, not the derivative. But recalling the derivative (which you've drilled harder) acts as a memory hook."}, {"question": "For $f(x)=2\\sqrt5\\sin(2x+\\alpha)-1$, what is the maximum value, and how can it be read off without calculus?", "answer": "Since $-1\\le\\sin(2x+\\alpha)\\le1$, the maximum occurs when the sine is $1$. Therefore $f_{\\max}=2\\sqrt5(1)-1=2\\sqrt5-1$. In $R\\sin(2x+\\alpha)+c$, the amplitude is $R$ and the vertical shift is $c$, so the maximum is $c+R$."}, {"question": "According to Harry's 12 July 2026 follow-up email, why should Phuc space practice and revisit previously learned material?", "answer": "Harry wrote that forgetting over time is natural, so practice should be spaced and learned material revisited regularly to combat the 'forgetting' curve. This was follow-up-email guidance, not a claim that the idea was newly taught in the recorded maths lesson."}, {"question": "Q2(a) alternative: solve for $A,B,C$ in $2x^2-5x+8\\equiv(Ax+B)(x-2)+C$ by substitution. Which $x$-values do you pick and why those? (3 steps)", "answer": "- Step 1: Sub $$x=2$$ to *kill* the $$(Ax+B)(x-2)$$ term: $$8-10+8=C\\Rightarrow C=6$$. Choosing the root of $$(x-2)$$ isolates $$C$$ instantly.\n- Step 2: Sub $$x=0$$ (easy arithmetic): $$8=-2B+6\\Rightarrow B=-1$$.\n- Step 3: Sub $$x=1$$ (another easy value): $$5=-(A-1)+6\\Rightarrow A=2$$.\n\nThe strategy: pick the value that zeroes a bracket first (gets one unknown free), then pick simple values ($$0$$, $$1$$) for the rest. Harry prefers long division for *speed* but accepts this identity method."}, {"question": "Official/specification reference expansion — not stated in the video: for which real constant bases is $\\dfrac{d}{dx}(a^x)=a^x\\ln a$ the standard real-valued rule, and why?", "answer": "The standard real-valued rule assumes $a>0$. Then $a^x$ is defined for every real $x$ and $\\ln a$ is real. A negative base does not define a real-valued $a^x$ for general real $x$, and $a=0$ is not defined on a domain suitable for this general derivative rule. The case $a=1$ is included: $1^x=1$ and $1^x\\ln 1=0$."}, {"question": "Differentiate $a^{kx}$ with respect to $x$, where $a,k$ are constants. Show the chain-rule step; note that $a>0$ is the official real-domain condition.", "answer": "Treat $a^{kx}$ as an outer exponential with inner function $kx$. The outer derivative is $a^{kx}\\ln a$, and $\\dfrac{d}{dx}(kx)=k$. Therefore $\\dfrac{d}{dx}(a^{kx})=k a^{kx}\\ln a$. The chain-rule method was lesson-taught; $a>0$ is the locally stated official/specification condition."}, {"question": "Why is $\\int \\dfrac{k}{x-2}\\,dx=k\\ln|x-2|+C$ written with modulus bars, and why may they be dropped when evaluating from $x=4$ to $x=8$?", "answer": "For $x\\ne2$, $\\dfrac{d}{dx}\\ln|x-2|=\\dfrac{1}{x-2}$, so the modulus makes the antiderivative valid on either side of $x=2$. On the interval $[4,8]$, $x-2$ is always positive, so $|x-2|=x-2$ and the bars may be dropped when the limits are substituted."}, {"question": "State the six trig derivatives in the order Harry taught them: sin, cos, tan, cosec, sec, cot.", "answer": "- Step 1: $\\frac{d}{dx}(\\sin x) = \\cos x$ (positive, position 1).\n- Step 2: $\\frac{d}{dx}(\\cos x) = -\\sin x$ (negative, position 2).\n- Step 3: $\\frac{d}{dx}(\\tan x) = \\sec^2 x$ (positive, position 3).\n- Step 4: $\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$ (negative, position 4).\n- Step 5: $\\frac{d}{dx}(\\sec x) = \\sec x \\tan x$ (positive, position 5).\n- Step 6: $\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$ (negative, position 6).\n\n**Sign pattern:** $+ - + - + -$ in this order. This is the memory hook."}, {"question": "State all three forms of $\\cos 2A$ and explain why Harry says to \"memorize, don't derive\" in the exam.", "answer": "- Step 1: The three forms are:\n  + $\\cos 2A = \\cos^2 A - \\sin^2 A$ (the \"base\" form)\n  + $\\cos 2A = 1 - 2\\sin^2 A$ (replaces $\\cos^2 A$ with $1 - \\sin^2 A$)\n  + $\\cos 2A = 2\\cos^2 A - 1$ (replaces $\\sin^2 A$ with $1 - \\cos^2 A$)\n- Step 2: Deriving them takes time, and the exam rewards fluency.\n- Step 3: Harry's advice: \"I always emphasise... memorising these three forms rather than deriving them during the exam.\"\n- Step 4: These identities are NOT in the exam formula booklet — they must be memorized.\n\n**Why three forms:** Different forms are useful for isolating $\\sin^2 A$ or $\\cos^2 A$ in different problems (e.g., Q4a needed $2\\cos^2 A = \\cos 2A + 1$)."}, {"question": "What is the formula booklet status for the trig identities and standard derivatives covered in this lesson — are they provided or must you memorise them?", "answer": "They are **NOT in the exam formula booklet**. The specification lists them among results \"students are expected to know\" — meaning you must memorise them. This includes: $$\\cos^2 A + \\sin^2 A = 1$$, $$\\sec^2 A = 1 + \\tan^2 A$$, $$\\cosec^2 A = 1 + \\cot^2 A$$, $$\\sin 2A = 2\\sin A \\cos A$$, $$\\cos 2A$$ forms, and the standard derivatives of $$\\sin kx$$, $$\\cos kx$$, $$e^{kx}$$, $$\\ln x$$, $$a^x$$. This is exactly why Harry drills them from memory and recommends flashcards."}, {"question": "Harry's follow-up email argues that re-doing already-covered questions from scratch is still valuable, despite giving less \"insight\" than unseen papers. What's his reasoning?", "answer": "- Step 1: Doing a question live *with a tutor* \"can feel quite different\" to doing it alone — support masks whether you can actually stand on your own.\n- Step 2: Re-working it solo, without hints, especially after \"some time has passed,\" **confirms you've genuinely learned to tackle it unsupported**.\n- Step 3: He concedes re-dones give less insight than an unseen paper, but \"there is a place for both.\" Solo re-attempts test *retention and independence*; unseen papers test *transfer*."}, {"question": "P3 June 2024 Q3 was **Discussed only (D)**: no full model, derivation, graph or completed solution was worked through in the lesson. What two pieces of graph-presentation feedback did Harry give?", "answer": "**Status: Discussed only (D).** Harry said Phuc's existing sketch was 'pretty much fine'. The two recorded points were: (1) label intercepts as coordinate pairs, for example $(0,6)$ and $(2,0)$; and (2) a **sketch** needs the correct shape and key points but not an accurate scale, whereas a **plot** requires accurate scaling. No missing Q3 model, derivation, graph or solution is reconstructed here."}, {"question": "In Q2a, perform polynomial long division of $2x^2 - 5x + 8$ by $x - 2$. What is the quotient and remainder?", "answer": "- Step 1: Set up the division: divide $2x^2 - 5x + 8$ by $x - 2$.\n- Step 2: First term: $\\frac{2x^2}{x} = 2x$. Multiply: $2x \\cdot (x - 2) = 2x^2 - 4x$.\n- Step 3: Subtract: $(2x^2 - 5x) - (2x^2 - 4x) = -5x - (-4x) = -5x + 4x = -x$ (bracket the term you subtract!).\n- Step 4: Bring down $+8$: now we have $-x + 8$.\n- Step 5: Next term: $\\frac{-x}{x} = -1$. Multiply: $-1 \\cdot (x - 2) = -x + 2$.\n- Step 6: Subtract: $(-x + 8) - (-x + 2) = -x + 8 + x - 2 = 6$.\n- Step 7: Quotient is $2x - 1$, remainder is $6$.\n\n**Result:** $g(x) = 2x - 1 + \\frac{6}{x - 2}$, so $A = 2$, $B = -1$, $C = 6$."}, {"question": "State the three Pythagorean trig identities. Which is the master identity, and how do the other two follow as official/derived reference expansions?", "answer": "The master identity is $\\sin^2A+\\cos^2A=1$. Where $\\cos A\\ne0$, divide by $\\cos^2A$ to get $1+\\tan^2A=\\sec^2A$. Where $\\sin A\\ne0$, divide by $\\sin^2A$ to get $1+\\cot^2A=\\operatorname{cosec}^2A$. The identities were recalled in the lesson; these division derivations and domain conditions are official/derived reference expansion."}, {"question": "Rewrite $f(x)=8\\sin x\\cos x+4\\cos^2x-3$ as $a\\sin2x+b\\cos2x+c$, and state $a,b,c$.", "answer": "Use $2\\sin x\\cos x=\\sin2x$, so $8\\sin x\\cos x=4\\sin2x$. Use $\\cos2x=2\\cos^2x-1$, so $4\\cos^2x=2(\\cos2x+1)=2\\cos2x+2$. Hence $f(x)=4\\sin2x+2\\cos2x+2-3=4\\sin2x+2\\cos2x-1$. Therefore $a=4$, $b=2$, $c=-1$."}, {"question": "For real-valued functions, what is the numerator-denominator rule for differentiating $\\ln(f(x))$, and what official/specification domain condition accompanies it?", "answer": "$\\dfrac{d}{dx}[\\ln(f(x))]=\\dfrac{f'(x)}{f(x)}$: differentiate the log argument for the numerator and keep the original argument in the denominator. The real-domain condition is $f(x)>0$. The differentiation method was taught in the lesson; the explicit domain condition is locally identified official/specification reference expansion."}, {"question": "Q1(b) — to solve $2|x-5| + 10 > 6x$ *by algebra*, what must you do **before** writing any equation, and why?", "answer": "- Step 1: Sketch first. Draw $$y = 6x$$ against the modulus graph and note $$y=6x$$ is steeper than the branches (slope 6 vs 2).\n- Step 2: The sketch tells you *which branch* the inequality holds on — the modulus graph sits above $$6x$$ only on the **left branch**, so you equate $$6x$$ with the left piece $$-2x+20$$.\n- Step 3: Then do the algebra: $$6x = -2x + 20 \\Rightarrow 8x = 20 \\Rightarrow x = \\frac{5}{2}$$, giving solution $$x < \\frac{5}{2}$$.\n\nThink graphically first to pick the correct branch — jumping straight to algebra risks solving against the wrong piece."}, {"question": "The point $P=(5,10)$ lies on $y=f(x)$. What is its image under $y=3f(x-2)$? State both transformations.", "answer": "$f(x-2)$ translates the graph 2 units to the right, sending the $x$-coordinate from $5$ to $7$. The outer factor $3$ stretches all $y$-coordinates by scale factor $3$, sending $10$ to $30$. Therefore the image is $P'=(7,30)$."}, {"question": "For $f(x)=2|x-5|+10$, what is the vertex $P$, and why can it be read off directly?", "answer": "A graph in the form $y=a|x-h|+k$ has vertex $(h,k)$, so here $P=(5,10)$. Specifically, $|x-5|$ reaches $0$ at $x=5$; because the coefficient $2$ is positive, this is the minimum and $f(5)=10$."}, {"question": "In Q2b, evaluate $\\int_4^8 g(x)\\, dx$ where $g(x) = 2x - 1 + \\frac{6}{x-2}$. Show how the integration works step by step.", "answer": "- Step 1: Split the integral: $\\int_4^8 \\left(2x - 1 + \\frac{6}{x-2}\\right) dx$.\n- Step 2: Integrate term by term:\n  + $\\int (2x - 1)\\, dx = x^2 - x + c$\n  + $\\int \\frac{6}{x-2}\\, dx = 6 \\ln|x - 2| + c$ (using the rule $\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$ with $f(x) = x - 2$, $f'(x) = 1$, so $\\frac{6}{x-2} = 6 \\cdot \\frac{1}{x-2} = 6 \\cdot \\frac{f'(x)}{f(x)}$)\n- Step 3: Combine: $\\int_4^8 g(x)\\, dx = \\left[x^2 - x + 6\\ln|x-2|\\right]_4^8$.\n- Step 4: Evaluate at $x = 8$: $64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$.\n- Step 5: Evaluate at $x = 4$: $16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$.\n- Step 6: Subtract: $(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6(\\ln 6 - \\ln 2) = 44 + 6\\ln 3$.\n\n**Final answer:** $\\alpha = 44$, $\\beta = 6$, so $\\int_4^8 g(x)\\, dx = 44 + 6\\ln 3$."}, {"question": "In Q2(a), polynomial long division of $2x^2 - 5x + 8$ by $x - 2$ gives quotient $2x - 1$, remainder $6$. **What's the sign trap** in subtracting $-4x$ from $-5x$, and what rule prevents it?", "answer": "- Step 1: The division step asks you to compute $(-5x) - (-4x)$. A common mistake: $(-5x) - (-4x) = -5x - 4x = -9x$.\n- Step 2: The correct calculation: $(-5x) - (-4x) = -5x + 4x = -x$ (because subtracting a negative is adding).\n- Step 3: Harry's rule: **always bracket the term you subtract**. Write $(-5x) - (-4x)$ explicitly, then distribute the minus: $-5x - (-4x) = -5x + 4x = -x$.\n- Step 4: Why this matters: the quotient coefficient depends on this calculation. Getting $-9x$ would push the whole division off-track.\n- General principle: every minus sign in subtraction needs to be distributed; brackets force you to do this explicitly."}, {"question": "In the lesson, Phuc initially gave $1+\\tan^2A=\\cot^2A$. What is the correction, and how does the official/derived reference proof recover it from the master identity?", "answer": "The correction is $1+\\tan^2A=\\sec^2A$. Starting from $\\sin^2A+\\cos^2A=1$ and dividing by $\\cos^2A$ (where $\\cos A\\ne0$) gives $\\tan^2A+1=\\sec^2A$. Phuc's error and Harry's correction are lesson evidence; the division proof and domain condition are official/derived reference expansion."}, {"question": "What was Harry's 'invent a plausible value and carry it forward' exam tip, and what is its evidence-safe limitation?", "answer": "Harry advised that if an early part is inaccessible, write a plausible carry-forward value and continue consistently so that method credit may still be available in later parts instead of leaving them blank. This is lesson exam technique, not a guarantee of a particular mark: the exact credit depends on the question's mark scheme, and a correct final-answer mark still requires the correct value where specified."}, {"question": "Q4(b): to write $4\\sin 2x + 2\\cos 2x$ as $R\\sin(2x+\\alpha)$, what do you expand and what two equations do you compare to find $R$ and $\\alpha$? (3 steps)", "answer": "- Step 1: Expand the target: $$R\\sin(2x+\\alpha) = R\\sin 2x\\cos\\alpha + R\\cos 2x\\sin\\alpha$$.\n- Step 2: Match coefficients of $$\\sin 2x$$ and $$\\cos 2x$$ against $$4\\sin 2x + 2\\cos 2x$$: $$R\\cos\\alpha = 4$$ and $$R\\sin\\alpha = 2$$.\n- Step 3: Divide the equations to get $$\\tan\\alpha = \\frac{2}{4}=\\frac12$$ (so $$\\alpha=\\arctan\\tfrac12\\approx 0.464$$ rad), and use $$R^2=4^2+2^2=20$$ to get $$R=\\sqrt{20}=2\\sqrt5$$.\n\nThe method: expand, compare coefficients, then $$\\tan\\alpha=\\frac{b}{a}$$ and $$R=\\sqrt{a^2+b^2}$$."}, {"question": "Contrast $\\dfrac{d}{dx}(3^x)$ with $\\dfrac{d}{dx}(x^3)$. Which visible feature selects the rule?", "answer": "In $3^x$, the variable is in the exponent, so use the exponential rule: $\\dfrac{d}{dx}(3^x)=3^x\\ln3$. In $x^3$, the variable is in the base with constant exponent, so use the power rule: $\\dfrac{d}{dx}(x^3)=3x^2$. The lesson diagnostic was to check where the variable sits before choosing a rule."}, {"question": "For $f(x)=2\\sqrt5\\sin(2x+\\alpha)-1$, use the carried-forward value $\\alpha=0.464$ rad to find the second smallest positive $x$ at which $f$ is maximum. Where must the $2\\pi$ periodicity be applied?", "answer": "The maximum occurs when $\\sin(2x+\\alpha)=1$, so solve the **whole angle** first: $2x+0.464=\\dfrac{\\pi}{2}+2n\\pi$. For $n=0$, $x\\approx0.553398$; for $n=1$, $x=\\dfrac{5\\pi/2-0.464}{2}\\approx3.694991$. Using the lesson's carried-forward $\\alpha=0.464$ branch, the second smallest positive value is $x=3.69$ to 3 significant figures. Apply $+2\\pi$ to $2x+\\alpha$ before dividing by $2$; adding $2\\pi$ directly to $x$ skips a solution."}, {"question": "For $f(x)=4\\sin2x+2\\cos2x-1=R\\sin(2x+\\alpha)-1$, find exact $R$ and $\\alpha$ to 3 significant figures in radians.", "answer": "$R=\\sqrt{4^2+2^2}=\\sqrt{20}=2\\sqrt5$. Matching coefficients gives $R\\cos\\alpha=4$ and $R\\sin\\alpha=2$, so $\\tan\\alpha=1/2$. Both coefficients are positive, placing $\\alpha$ in the first quadrant. Hence $\\alpha=\\arctan(1/2)\\approx0.464$ rad to 3 significant figures. The constant $-1$ remains the vertical shift."}, {"question": "Official/specification reference expansion — not stated in the video: what domain restrictions accompany $\\tan A=\\dfrac{\\sin A}{\\cos A}$, $\\sec A=\\dfrac1{\\cos A}$ and $\\operatorname{cosec}A=\\dfrac1{\\sin A}$?", "answer": "$\\tan A$ and $\\sec A$ require $\\cos A\\ne0$, so they are undefined at $A=\\dfrac{\\pi}{2}+n\\pi$. $\\operatorname{cosec}A$ requires $\\sin A\\ne0$, so it is undefined at $A=n\\pi$, where $n$ is an integer. These are official/specification domain conditions added as reference expansion, not attributed to the recorded lesson dialogue."}], "models": {"curated": {"label": "Curated deck", "cards": [{"question": "During the lesson, Phuc initially differentiated $y=\\ln(3x)$ as $y'=\\dfrac{1}{3x}$. What factor is missing from the numerator, and which rule catches the error?", "answer": "Use $\\dfrac{d}{dx}[\\ln f(x)]=\\dfrac{f'(x)}{f(x)}$. Here $f(x)=3x$ and $f'(x)=3$, so $y'=\\dfrac{3}{3x}=\\dfrac{1}{x}$. The missing numerator factor is $3$. A reliable check is: the denominator must be the original log argument and the numerator must be its derivative."}, {"question": "State the four reciprocal trig identities. What is Harry's \"third letter\" memory hook for pairing cosec and sec correctly? (2 steps)", "answer": "- Step 1: The identities are $$\\tan A=\\frac{\\sin A}{\\cos A}$$, $$\\csc A=\\frac{1}{\\sin A}$$, $$\\sec A=\\frac{1}{\\cos A}$$, $$\\cot A=\\frac{1}{\\tan A}$$.\n- Step 2: The hook: the **third letter** of the reciprocal name tells you its partner. co**S**ec → **s**ine; se**C** → **c**osine. This stops the common swap of thinking $$\\sec = 1/\\sin$$.\n\nHarry also lists them in sin, cos, tan order so each reciprocal lines up under its partner — visual alignment reinforces the pairing."}, {"question": "The lesson used the reverse-log pattern, with its official domain condition: what is $\\int \\dfrac{f'(x)}{f(x)}\\,dx$, and how is it connected to differentiating $\\ln f(x)$?", "answer": "On any interval where $f(x)\\ne0$, $\\int \\dfrac{f'(x)}{f(x)}\\,dx=\\ln|f(x)|+C$. This reverses $\\dfrac{d}{dx}[\\ln f(x)]=\\dfrac{f'(x)}{f(x)}$ on intervals where $f(x)>0$; the modulus extends the antiderivative to intervals where $f(x)<0$. The domain qualification is official/specification reference detail; the reverse-log method itself was used in the lesson."}, {"question": "The derivative $\\dfrac{d}{dx}(\\tan x) = \\sec^2 x$ \"should remind you of a trig identity\" in Harry's teaching. **Which identity**, and why does binding derivative-to-identity in memory help in the exam?", "answer": "- Step 1: The matching identity is $1 + \\tan^2 x = \\sec^2 x$ — the Pythagorean identity for tan/sec.\n- Step 2: Binding them in memory means if you remember $\\dfrac{d}{dx}(\\tan x) = \\sec^2 x$, you can recover $1 + \\tan^2 x = \\sec^2 x$ in one step, and vice versa.\n- Step 3: The same pairing applies to $\\cot x \\to -\\cosec^2 x$ and $1 + \\cot^2 x = \\cosec^2 x$.\n- Exam payoff: in questions like \"show $f(x) = ...$ can be written as ...\" you need the identity, not the derivative. But recalling the derivative (which you've drilled harder) acts as a memory hook."}, {"question": "For $f(x)=2\\sqrt5\\sin(2x+\\alpha)-1$, what is the maximum value, and how can it be read off without calculus?", "answer": "Since $-1\\le\\sin(2x+\\alpha)\\le1$, the maximum occurs when the sine is $1$. Therefore $f_{\\max}=2\\sqrt5(1)-1=2\\sqrt5-1$. In $R\\sin(2x+\\alpha)+c$, the amplitude is $R$ and the vertical shift is $c$, so the maximum is $c+R$."}, {"question": "According to Harry's 12 July 2026 follow-up email, why should Phuc space practice and revisit previously learned material?", "answer": "Harry wrote that forgetting over time is natural, so practice should be spaced and learned material revisited regularly to combat the 'forgetting' curve. This was follow-up-email guidance, not a claim that the idea was newly taught in the recorded maths lesson."}, {"question": "Q2(a) alternative: solve for $A,B,C$ in $2x^2-5x+8\\equiv(Ax+B)(x-2)+C$ by substitution. Which $x$-values do you pick and why those? (3 steps)", "answer": "- Step 1: Sub $$x=2$$ to *kill* the $$(Ax+B)(x-2)$$ term: $$8-10+8=C\\Rightarrow C=6$$. Choosing the root of $$(x-2)$$ isolates $$C$$ instantly.\n- Step 2: Sub $$x=0$$ (easy arithmetic): $$8=-2B+6\\Rightarrow B=-1$$.\n- Step 3: Sub $$x=1$$ (another easy value): $$5=-(A-1)+6\\Rightarrow A=2$$.\n\nThe strategy: pick the value that zeroes a bracket first (gets one unknown free), then pick simple values ($$0$$, $$1$$) for the rest. Harry prefers long division for *speed* but accepts this identity method."}, {"question": "Official/specification reference expansion — not stated in the video: for which real constant bases is $\\dfrac{d}{dx}(a^x)=a^x\\ln a$ the standard real-valued rule, and why?", "answer": "The standard real-valued rule assumes $a>0$. Then $a^x$ is defined for every real $x$ and $\\ln a$ is real. A negative base does not define a real-valued $a^x$ for general real $x$, and $a=0$ is not defined on a domain suitable for this general derivative rule. The case $a=1$ is included: $1^x=1$ and $1^x\\ln 1=0$."}, {"question": "Differentiate $a^{kx}$ with respect to $x$, where $a,k$ are constants. Show the chain-rule step; note that $a>0$ is the official real-domain condition.", "answer": "Treat $a^{kx}$ as an outer exponential with inner function $kx$. The outer derivative is $a^{kx}\\ln a$, and $\\dfrac{d}{dx}(kx)=k$. Therefore $\\dfrac{d}{dx}(a^{kx})=k a^{kx}\\ln a$. The chain-rule method was lesson-taught; $a>0$ is the locally stated official/specification condition."}, {"question": "Why is $\\int \\dfrac{k}{x-2}\\,dx=k\\ln|x-2|+C$ written with modulus bars, and why may they be dropped when evaluating from $x=4$ to $x=8$?", "answer": "For $x\\ne2$, $\\dfrac{d}{dx}\\ln|x-2|=\\dfrac{1}{x-2}$, so the modulus makes the antiderivative valid on either side of $x=2$. On the interval $[4,8]$, $x-2$ is always positive, so $|x-2|=x-2$ and the bars may be dropped when the limits are substituted."}, {"question": "State the six trig derivatives in the order Harry taught them: sin, cos, tan, cosec, sec, cot.", "answer": "- Step 1: $\\frac{d}{dx}(\\sin x) = \\cos x$ (positive, position 1).\n- Step 2: $\\frac{d}{dx}(\\cos x) = -\\sin x$ (negative, position 2).\n- Step 3: $\\frac{d}{dx}(\\tan x) = \\sec^2 x$ (positive, position 3).\n- Step 4: $\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$ (negative, position 4).\n- Step 5: $\\frac{d}{dx}(\\sec x) = \\sec x \\tan x$ (positive, position 5).\n- Step 6: $\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$ (negative, position 6).\n\n**Sign pattern:** $+ - + - + -$ in this order. This is the memory hook."}, {"question": "State all three forms of $\\cos 2A$ and explain why Harry says to \"memorize, don't derive\" in the exam.", "answer": "- Step 1: The three forms are:\n  + $\\cos 2A = \\cos^2 A - \\sin^2 A$ (the \"base\" form)\n  + $\\cos 2A = 1 - 2\\sin^2 A$ (replaces $\\cos^2 A$ with $1 - \\sin^2 A$)\n  + $\\cos 2A = 2\\cos^2 A - 1$ (replaces $\\sin^2 A$ with $1 - \\cos^2 A$)\n- Step 2: Deriving them takes time, and the exam rewards fluency.\n- Step 3: Harry's advice: \"I always emphasise... memorising these three forms rather than deriving them during the exam.\"\n- Step 4: These identities are NOT in the exam formula booklet — they must be memorized.\n\n**Why three forms:** Different forms are useful for isolating $\\sin^2 A$ or $\\cos^2 A$ in different problems (e.g., Q4a needed $2\\cos^2 A = \\cos 2A + 1$)."}, {"question": "What is the formula booklet status for the trig identities and standard derivatives covered in this lesson — are they provided or must you memorise them?", "answer": "They are **NOT in the exam formula booklet**. The specification lists them among results \"students are expected to know\" — meaning you must memorise them. This includes: $$\\cos^2 A + \\sin^2 A = 1$$, $$\\sec^2 A = 1 + \\tan^2 A$$, $$\\cosec^2 A = 1 + \\cot^2 A$$, $$\\sin 2A = 2\\sin A \\cos A$$, $$\\cos 2A$$ forms, and the standard derivatives of $$\\sin kx$$, $$\\cos kx$$, $$e^{kx}$$, $$\\ln x$$, $$a^x$$. This is exactly why Harry drills them from memory and recommends flashcards."}, {"question": "Harry's follow-up email argues that re-doing already-covered questions from scratch is still valuable, despite giving less \"insight\" than unseen papers. What's his reasoning?", "answer": "- Step 1: Doing a question live *with a tutor* \"can feel quite different\" to doing it alone — support masks whether you can actually stand on your own.\n- Step 2: Re-working it solo, without hints, especially after \"some time has passed,\" **confirms you've genuinely learned to tackle it unsupported**.\n- Step 3: He concedes re-dones give less insight than an unseen paper, but \"there is a place for both.\" Solo re-attempts test *retention and independence*; unseen papers test *transfer*."}, {"question": "P3 June 2024 Q3 was **Discussed only (D)**: no full model, derivation, graph or completed solution was worked through in the lesson. What two pieces of graph-presentation feedback did Harry give?", "answer": "**Status: Discussed only (D).** Harry said Phuc's existing sketch was 'pretty much fine'. The two recorded points were: (1) label intercepts as coordinate pairs, for example $(0,6)$ and $(2,0)$; and (2) a **sketch** needs the correct shape and key points but not an accurate scale, whereas a **plot** requires accurate scaling. No missing Q3 model, derivation, graph or solution is reconstructed here."}, {"question": "In Q2a, perform polynomial long division of $2x^2 - 5x + 8$ by $x - 2$. What is the quotient and remainder?", "answer": "- Step 1: Set up the division: divide $2x^2 - 5x + 8$ by $x - 2$.\n- Step 2: First term: $\\frac{2x^2}{x} = 2x$. Multiply: $2x \\cdot (x - 2) = 2x^2 - 4x$.\n- Step 3: Subtract: $(2x^2 - 5x) - (2x^2 - 4x) = -5x - (-4x) = -5x + 4x = -x$ (bracket the term you subtract!).\n- Step 4: Bring down $+8$: now we have $-x + 8$.\n- Step 5: Next term: $\\frac{-x}{x} = -1$. Multiply: $-1 \\cdot (x - 2) = -x + 2$.\n- Step 6: Subtract: $(-x + 8) - (-x + 2) = -x + 8 + x - 2 = 6$.\n- Step 7: Quotient is $2x - 1$, remainder is $6$.\n\n**Result:** $g(x) = 2x - 1 + \\frac{6}{x - 2}$, so $A = 2$, $B = -1$, $C = 6$."}, {"question": "State the three Pythagorean trig identities. Which is the master identity, and how do the other two follow as official/derived reference expansions?", "answer": "The master identity is $\\sin^2A+\\cos^2A=1$. Where $\\cos A\\ne0$, divide by $\\cos^2A$ to get $1+\\tan^2A=\\sec^2A$. Where $\\sin A\\ne0$, divide by $\\sin^2A$ to get $1+\\cot^2A=\\operatorname{cosec}^2A$. The identities were recalled in the lesson; these division derivations and domain conditions are official/derived reference expansion."}, {"question": "Rewrite $f(x)=8\\sin x\\cos x+4\\cos^2x-3$ as $a\\sin2x+b\\cos2x+c$, and state $a,b,c$.", "answer": "Use $2\\sin x\\cos x=\\sin2x$, so $8\\sin x\\cos x=4\\sin2x$. Use $\\cos2x=2\\cos^2x-1$, so $4\\cos^2x=2(\\cos2x+1)=2\\cos2x+2$. Hence $f(x)=4\\sin2x+2\\cos2x+2-3=4\\sin2x+2\\cos2x-1$. Therefore $a=4$, $b=2$, $c=-1$."}, {"question": "For real-valued functions, what is the numerator-denominator rule for differentiating $\\ln(f(x))$, and what official/specification domain condition accompanies it?", "answer": "$\\dfrac{d}{dx}[\\ln(f(x))]=\\dfrac{f'(x)}{f(x)}$: differentiate the log argument for the numerator and keep the original argument in the denominator. The real-domain condition is $f(x)>0$. The differentiation method was taught in the lesson; the explicit domain condition is locally identified official/specification reference expansion."}, {"question": "Q1(b) — to solve $2|x-5| + 10 > 6x$ *by algebra*, what must you do **before** writing any equation, and why?", "answer": "- Step 1: Sketch first. Draw $$y = 6x$$ against the modulus graph and note $$y=6x$$ is steeper than the branches (slope 6 vs 2).\n- Step 2: The sketch tells you *which branch* the inequality holds on — the modulus graph sits above $$6x$$ only on the **left branch**, so you equate $$6x$$ with the left piece $$-2x+20$$.\n- Step 3: Then do the algebra: $$6x = -2x + 20 \\Rightarrow 8x = 20 \\Rightarrow x = \\frac{5}{2}$$, giving solution $$x < \\frac{5}{2}$$.\n\nThink graphically first to pick the correct branch — jumping straight to algebra risks solving against the wrong piece."}, {"question": "The point $P=(5,10)$ lies on $y=f(x)$. What is its image under $y=3f(x-2)$? State both transformations.", "answer": "$f(x-2)$ translates the graph 2 units to the right, sending the $x$-coordinate from $5$ to $7$. The outer factor $3$ stretches all $y$-coordinates by scale factor $3$, sending $10$ to $30$. Therefore the image is $P'=(7,30)$."}, {"question": "For $f(x)=2|x-5|+10$, what is the vertex $P$, and why can it be read off directly?", "answer": "A graph in the form $y=a|x-h|+k$ has vertex $(h,k)$, so here $P=(5,10)$. Specifically, $|x-5|$ reaches $0$ at $x=5$; because the coefficient $2$ is positive, this is the minimum and $f(5)=10$."}, {"question": "In Q2b, evaluate $\\int_4^8 g(x)\\, dx$ where $g(x) = 2x - 1 + \\frac{6}{x-2}$. Show how the integration works step by step.", "answer": "- Step 1: Split the integral: $\\int_4^8 \\left(2x - 1 + \\frac{6}{x-2}\\right) dx$.\n- Step 2: Integrate term by term:\n  + $\\int (2x - 1)\\, dx = x^2 - x + c$\n  + $\\int \\frac{6}{x-2}\\, dx = 6 \\ln|x - 2| + c$ (using the rule $\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$ with $f(x) = x - 2$, $f'(x) = 1$, so $\\frac{6}{x-2} = 6 \\cdot \\frac{1}{x-2} = 6 \\cdot \\frac{f'(x)}{f(x)}$)\n- Step 3: Combine: $\\int_4^8 g(x)\\, dx = \\left[x^2 - x + 6\\ln|x-2|\\right]_4^8$.\n- Step 4: Evaluate at $x = 8$: $64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$.\n- Step 5: Evaluate at $x = 4$: $16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$.\n- Step 6: Subtract: $(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6(\\ln 6 - \\ln 2) = 44 + 6\\ln 3$.\n\n**Final answer:** $\\alpha = 44$, $\\beta = 6$, so $\\int_4^8 g(x)\\, dx = 44 + 6\\ln 3$."}, {"question": "In Q2(a), polynomial long division of $2x^2 - 5x + 8$ by $x - 2$ gives quotient $2x - 1$, remainder $6$. **What's the sign trap** in subtracting $-4x$ from $-5x$, and what rule prevents it?", "answer": "- Step 1: The division step asks you to compute $(-5x) - (-4x)$. A common mistake: $(-5x) - (-4x) = -5x - 4x = -9x$.\n- Step 2: The correct function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  else { DATA.selected.forEach(c=>mySet.add(c.question)); saveMySet(); }
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  p.innerHTML=`<div class="mi"><span class="ml">Deck</span><span class="mv">${DATA.selected.length} cards</span></div><div class="mi"><span class="ml">Status</span><span class="mv">Audited standalone recall</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const cardClass=im?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf"><button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  // Safe: h contains only fixed audited DATA; learner text is escaped/formatted by eI and fA.
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to curated deck')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
