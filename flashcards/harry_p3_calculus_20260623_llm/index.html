<script>
const DATA={"selected":[{"question":"Official WMA13/01 Oct 2025 Q1(d). Using $f(x) = \\ln(x^2 + 3)$ and $g(x) = \\dfrac{5x + 3}{x + 2}$ with $x > -2$, solve $g(e^{2a}) = f\\!\\left(\\sqrt{e^4 - 3}\\right)$ for $a$. State: lesson status is DEFERRED / UNFINISHED; the answer $a = \\tfrac{1}{2}\\ln 5$ is Official reference only — not completed live. [3 marks: M1 dM1 A1]","answer":"**DEFERRED / UNFINISHED** in lesson. The following is **Official reference only — not completed live**:\n\nLHS: $g(e^{2a}) = \\dfrac{5e^{2a} + 3}{e^{2a} + 2}$.\nRHS: $f\\!\\left(\\sqrt{e^4 - 3}\\right) = \\ln\\!\\left(\\left(\\sqrt{e^4 - 3}\\right)^2 + 3\\right) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$.\n\nSet LHS $= 4$: $\\dfrac{5e^{2a} + 3}{e^{2a} + 2} = 4$, so $5e^{2a} + 3 = 4e^{2a} + 8 \\Rightarrow e^{2a} = 5 \\Rightarrow 2a = \\ln 5 \\Rightarrow a = \\tfrac{1}{2}\\ln 5$. [M1, dM1, A1]"},{"question":"Official WMA13/01 October 2025 Q1(c), completed with prompting, 2 marks (M1 A1). Given\n$$f(x)=\\ln(x^2+3),\\qquad g(x)=\\frac{5x+3}{x+2},\\quad x>-2,$$\nfind the exact value of $fg(0)$, where $fg(0)=f(g(0))$.","answer":"First,\n$$g(0)=\\frac{5(0)+3}{0+2}=\\frac32.$$\nTherefore\n$$fg(0)=f\\left(\\frac32\\right)\n=\\ln\\left[\\left(\\frac32\\right)^2+3\\right]\n=\\ln\\left(\\frac94+\\frac{12}{4}\\right).$$\nThus\n$$\\boxed{fg(0)=\\ln\\left(\\frac{21}{4}\\right)}.$$\nSubstitution into the composite function earns M1 and the exact value earns A1."},{"question":"Lesson evidence F2 — paper and marks unresolved. Describe, without performing a sketch, how the graph of $y = f^{-1}(x)$ for $f(x) = \\dfrac{12}{x+1}$, $x > 0$, is related to the graph of $y = f(x)$. Do not invent official marks.","answer":"The graph of $y = f^{-1}(x)$ is the reflection of the graph of $y = f(x)$ in the line $y = x$. The only points unchanged by this reflection are those on $y = x$ — i.e. fixed points of $f$ — which for this function is $x = 3$ (the point $(3, 3)$). Reflection maps the domain $x > 0$ onto the range $0 < x < 12$, and the range $0 < y < 12$ onto the domain $y > 0$."},{"question":"Lesson evidence; paper and marks unresolved. Given\n$$f(x)=\\frac{12}{x+1},\\qquad x>0,$$\nfind $f^{-1}(x)$ and state its domain.","answer":"Let\n$$y=\\frac{12}{x+1}.$$\nThen\n$$y(x+1)=12,$$\nso\n$$x=\\frac{12}{y}-1.$$\nInterchanging $x$ and $y$ gives\n$$f^{-1}(x)=\\frac{12}{x}-1.$$\nFor $x>0$, the original function satisfies\n$$0<f(x)<12,$$\nso the inverse domain is $0<x<12$. Therefore,\n$$\\boxed{f^{-1}(x)=\\frac{12}{x}-1,\\qquad 0<x<12}.$$"},{"question":"Official WMA13/01 October 2025 Q1(a), completed with prompting, 1 mark (B1). Given $f(x)=\\ln(x^2+3)$ for real $x$, determine the range of $f$.","answer":"Since $x^2\\geq 0$ for every real $x$,\n$$x^2+3\\geq 3.$$\nBecause $\\ln x$ is increasing,\n$$\\ln(x^2+3)\\geq\\ln 3.$$\nEquality occurs at $x=0$, so the range is\n$$\\boxed{f(x)\\geq\\ln 3}$$\nor equivalently $\\boxed{[\\ln 3,\\infty)}$. This earns B1."},{"question":"Lesson evidence; paper and marks unresolved. Prove\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\nusing\n$$\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x,$$\n$$\\sin 2x=2\\sin x\\cos x,\\qquad \\cos 2x=1-2\\sin^2x,$$\nand\n$$\\sin^2x+\\cos^2x=1.$$","answer":"Begin with\n$$\\sin(3x)=\\sin(2x+x)\n=\\sin 2x\\cos x+\\cos 2x\\sin x.$$\nSubstitute the double-angle identities:\n$$\\sin(3x)=2\\sin x\\cos^2x+(1-2\\sin^2x)\\sin x.$$\nUsing $\\cos^2x=1-\\sin^2x$,\n$$\\sin(3x)=2\\sin x(1-\\sin^2x)+\\sin x-2\\sin^3x.$$\nTherefore,\n$$\\sin(3x)=2\\sin x-2\\sin^3x+\\sin x-2\\sin^3x,$$\nso\n$$\\boxed{\\sin(3x)=3\\sin x-4\\sin^3x}.$$"},{"question":"Lesson evidence; exact paper, iteration formula and marks unresolved. A numerical iteration starts from $x_1=3$ and its iterates approach $3.1589$. State the root estimate supported by this evidence and explain why no intermediate iterates should be calculated from the available information.","answer":"The supported root estimate is\n$$\\boxed{x\\approx3.1589}.$$\nNo intermediate iterates can be calculated because the iteration formula is unavailable. Supplying a recurrence or additional terms would therefore require inventing information not present in the evidence."},{"question":"Lesson evidence: prove that an equation has a root in $[3,4]$ (exact equation, paper, and official marks unresolved). What two conditions on a function $h(x)$ must be verified to establish a root in this interval, and what starting value is used for the subsequent iteration that approaches $3.1589$?","answer":"Show $h(x)$ is continuous on $[3,4]$ and that $h(3)$ and $h(4)$ have opposite signs (sign change). The iteration then starts from $x_1=3$ and converges towards $3.1589$."},{"question":"Lesson evidence (paper unresolved, no official marks): $f(x)=\\dfrac{12}{x+1}$ with $x>0$. Find the fixed points of $f$ and state which (if any) are valid for the function as given.","answer":"Fixed points satisfy $\\dfrac{12}{x+1}=x\\Rightarrow x^2+x-12=0\\Rightarrow (x+4)(x-3)=0$, giving $x=3$ or $x=-4$. Only $x=3$ lies in the domain $x>0$; $x=-4$ is rejected as it is outside the domain."},{"question":"In non-official numerical-methods evidence with the exact paper, formula and marks unresolved, a function $h$ is continuous on $[3,4]$ and satisfies $h(3)h(4)<0$. Explain rigorously why $h(x)=0$ has at least one root in $(3,4)$.","answer":"The condition\n$$h(3)h(4)<0$$\nmeans that $h(3)$ and $h(4)$ have opposite signs. Because $h$ is continuous on $[3,4]$, the Intermediate Value Theorem guarantees that $h$ takes every value between $h(3)$ and $h(4)$, including $0$. Therefore there is at least one $c\\in(3,4)$ such that\n$$\\boxed{h(c)=0}.$$\nA sign change alone is insufficient: continuity on $[3,4]$ is also required."},{"question":"The curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$. Determine $a$ and $b$. This is non-official warm-up evidence with no official marks.","answer":"At each intersection,\n$$x^2+ax+b=x+1.$$\nHence\n$$x^2+(a-1)x+(b-1)=0.$$\nIts roots are $2$ and $4$, so\n$$x^2+(a-1)x+(b-1)=(x-2)(x-4)=x^2-6x+8.$$\nComparing coefficients gives\n$$a-1=-6,\\qquad b-1=8,$$\nso\n$$\\boxed{a=-5,\\quad b=9}.$$"},{"question":"Official WMA13/01 October 2025 Q1(b), completed with prompting. Given\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nand\n$$g^{-1}(x)=\\frac{3-2x}{x-5},$$\ndetermine the domain of $g^{-1}$. This domain statement carries B1 within the 3 marks available for Q1(b).","answer":"Rewrite $g$ as\n$$g(x)=5-\\frac{7}{x+2}.$$\nSince $x>-2$, we have $x+2>0$, so\n$$-\\frac{7}{x+2}<0$$\nand hence $g(x)<5$. As $x$ varies over $(-2,\\infty)$, the range of $g$ is $(-\\infty,5)$. The domain of the inverse equals the range of the original function, so\n$$\\boxed{\\operatorname{dom}(g^{-1})=\\{x:x<5\\}}.$$\nThis earns B1."},{"question":"In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find $f^{-1}(x)$, state its domain, and describe the geometric relationship between the curves $y=f(x)$ and $y=f^{-1}(x)$.","answer":"Starting with\n$$y=\\frac{12}{x+1},$$\ninterchange $x$ and $y$:\n$$x=\\frac{12}{y+1}.$$\nThen\n$$x(y+1)=12,\\qquad y=\\frac{12}{x}-1.$$\nThus\n$$\\boxed{f^{-1}(x)=\\frac{12}{x}-1}.$$\nFor $x>0$, the range of $f$ is $0<f(x)<12$, so the inverse domain is\n$$\\boxed{0<x<12}.$$\nThe curves $y=f(x)$ and $y=f^{-1}(x)$ are reflections of each other in the line\n$$\\boxed{y=x}.$$"},{"question":"In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find all algebraic candidates satisfying $f(x)=x$, then apply the domain restriction to identify the valid fixed point.","answer":"Solve\n$$\\frac{12}{x+1}=x.$$\nThen\n$$12=x(x+1),$$\nso\n$$x^2+x-12=0.$$\nFactorising,\n$$(x-3)(x+4)=0,$$\ngiving the algebraic candidates\n$$x=3\\quad\\text{or}\\quad x=-4.$$\nSince the domain is $x>0$, reject $-4$. The valid fixed point is\n$$\\boxed{x=3}.$$"},{"question":"In official WMA13/01 October 2025 Q1(a), worth $1$ B1 mark and completed with prompting, the function is $f(x)=\\ln(x^2+3)$ for real $x$. State the range of $f$.","answer":"Since $x^2\\geq 0$,\n$$x^2+3\\geq 3.$$\nBecause $\\ln x$ is increasing,\n$$\\ln(x^2+3)\\geq\\ln 3.$$\nTherefore the range is\n$$\\boxed{f(x)\\geq\\ln 3}$$\nor equivalently\n$$\\boxed{[\\ln 3,\\infty)}.$$"},{"question":"Official WMA13/01 October 2025 Q1(b), completed with prompting. For\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nderive an expression for $g^{-1}(x)$. The inverse-expression work carries M1 A1 within the 3 marks available for Q1(b).","answer":"Let\n$$y=\\frac{5x+3}{x+2}.$$\nThen\n$$y(x+2)=5x+3,$$\nso\n$$x(y-5)=3-2y$$\nand therefore\n$$x=\\frac{3-2y}{y-5}.$$\nInterchanging $x$ and $y$ gives\n$$\\boxed{g^{-1}(x)=\\frac{3-2x}{x-5}}.$$\nThe valid rearrangement earns M1 and the correct inverse earns A1."},{"question":"Two curves $y = x^2 + ax + b$ and $y = x + 1$ meet at the points $x = 2$ and $x = 4$. Find the values of $a$ and $b$. (Lesson-evidence warm-up W0; paper and marks unresolved — do not attribute to WMA13/01.)","answer":"Substitute each intersection into $x^2 + ax + b = x + 1$.\n- $x = 2$: $4 + 2a + b = 3 \\Rightarrow 2a + b = -1$\n- $x = 4$: $16 + 4a + b = 5 \\Rightarrow 4a + b = -11$\n\nSubtracting gives $2a = -10$, so $a = -5$. Then $b = -1 - 2(-5) = 9$.\n\n$\\boxed{a = -5,\\ b = 9}$"},{"question":"Lesson evidence F2 — paper and marks unresolved. Given $f(x) = \\dfrac{12}{x + 1}$, $x > 0$: (i) state why $x = -4$ is rejected as a fixed-point candidate, (ii) find the range of $f$ on its domain, and (iii) hence state the domain of $f^{-1}$. Do not invent official marks.","answer":"(i) A fixed point satisfies $f(x) = x$. Solving $\\dfrac{12}{x+1} = x$ gives $x^2 + x - 12 = 0 \\Rightarrow (x+4)(x-3) = 0$, so candidates are $x = 3$ and $x = -4$. The domain is $x > 0$, so $x = -4$ is rejected.\n\n(ii) Write $f(x) = \\dfrac{12}{x+1}$. As $x \\to 0^+$, $f \\to 12$. As $x \\to \\infty$, $f \\to 0^+$ decreasingly. So the range is $0 < f(x) < 12$.\n\n(iii) Domain of $f^{-1}$ = range of $f$: $\\ 0 < x < 12$."},{"question":"Official WMA13/01 October 2025 Q1(d), 3 marks (M1 dM1 A1), status DEFERRED / UNFINISHED. Given\n$$f(x)=\\ln(x^2+3),\\qquad g(x)=\\frac{5x+3}{x+2},\\quad x>-2,$$\nsolve\n$$g(e^{2a})=f\\left(\\sqrt{e^4-3}\\right).$$\nThe official result is reference material only and must not be treated as work completed live.","answer":"**DEFERRED / UNFINISHED. Official reference only — not completed live.**\n\nThe official route is\n$$f\\left(\\sqrt{e^4-3}\\right)\n=\\ln\\left[\\left(\\sqrt{e^4-3}\\right)^2+3\\right]\n=\\ln(e^4)=4.$$\nHence\n$$\\frac{5e^{2a}+3}{e^{2a}+2}=4.$$\nTherefore\n$$5e^{2a}+3=4e^{2a}+8,$$\nso\n$$e^{2a}=5.$$\nTaking natural logarithms gives\n$$2a=\\ln 5,$$\nand thus the official answer is\n$$\\boxed{a=\\frac12\\ln 5}.$$\nThe official allocation is M1 dM1 A1."},{"question":"Rearrange the identity $\\sin(3x)=3\\sin x-4\\sin^3 x$ to express $\\sin^3 x$ in terms of $\\sin x$ and $\\sin 3x$. Note: This problem is DEFERRED / UNFINISHED.","answer":"$4\\sin^3 x = 3\\sin x - \\sin 3x \\implies \\sin^3 x = \\frac{3\\sin x - \\sin 3x}{4}$. (DEFERRED / UNFINISHED) (Lesson evidence, paper unresolved, no official marks)"},{"question":"Given the function $f(x)=\\frac{12}{x+1}$ with the restricted domain $x>0$, determine the domain of the inverse function $f^{-1}(x)$. (Lesson evidence, no official marks).","answer":"The domain of $f^{-1}(x)$ is the range of $f(x)$. For $x>0$, $x+1>1$, so $0 < \\frac{12}{x+1} < 12$. Therefore, the domain of $f^{-1}(x)$ is $0 < x < 12$."},{"question":"Lesson evidence T1 — paper and marks unresolved. Prove the identity $\\sin 3x = 3\\sin x - 4\\sin^3 x$ using $\\sin(2x + x)$, the double-angle formula $\\sin 2x = 2\\sin x \\cos x$, the identity $\\cos 2x = 1 - 2\\sin^2 x$, and $\\sin^2 x + \\cos^2 x = 1$. Do not invent official marks.","answer":"$\\sin 3x = \\sin(2x + x) = \\sin 2x \\cos x + \\cos 2x \\sin x$.\n\nSubstitute the double-angle identities:\n$= (2\\sin x \\cos x)\\cos x + (1 - 2\\sin^2 x)\\sin x$\n$= 2\\sin x \\cos^2 x + \\sin x - 2\\sin^3 x$.\n\nUse $\\cos^2 x = 1 - \\sin^2 x$:\n$= 2\\sin x (1 - \\sin^2 x) + \\sin x - 2\\sin^3 x$\n$= 2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x$\n$= 3\\sin x - 4\\sin^3 x.$ $\\blacksquare$"},{"question":"Lesson-evidence warm-up; paper and marks unresolved. The curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$. Determine $a$ and $b$.","answer":"At an intersection,\n$$x^2+ax+b=x+1,$$\nso\n$$x^2+(a-1)x+(b-1)=0.$$\nIts roots are $2$ and $4$, hence\n$$x^2+(a-1)x+(b-1)=(x-2)(x-4)=x^2-6x+8.$$\nComparing coefficients gives\n$$a-1=-6,\\qquad b-1=8,$$\nso\n$$\\boxed{a=-5,\\quad b=9}.$$"},{"question":"In official WMA13/01 October 2025 Q1(b), worth $3$ marks $(\\mathrm{M1,\\ A1,\\ B1})$ and completed with prompting, $g(x)=\\dfrac{5x+3}{x+2}$ has domain $x>-2$ and inverse $g^{-1}(x)=\\dfrac{3-2x}{x-5}$. Determine the domain of $g^{-1}$.","answer":"Rewrite $g$ as\n$$g(x)=5-\\frac{7}{x+2}.$$\nSince $x>-2$, we have $x+2>0$, so\n$$-\\frac{7}{x+2}<0$$\nand therefore\n$$g(x)<5.$$\nAs $x\\to-2^+$, $g(x)\\to-\\infty$, while as $x\\to\\infty$, $g(x)\\to5^-$, so the range of $g$ is $(-\\infty,5)$. This becomes the domain of its inverse:\n$$\\boxed{x<5}.$$"},{"question":"Lesson evidence; paper and marks unresolved, status DEFERRED / UNFINISHED. Using only\n$$\\sin(3x)=3\\sin x-4\\sin^3x,$$\nrearrange for $\\sin^3x$ and identify the suggested constant factor for a possible integration step. The exact integrand, limits and completed antiderivative are unavailable and must not be reconstructed.","answer":"**DEFERRED / UNFINISHED.**\n\nRearranging\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\ngives\n$$4\\sin^3x=3\\sin x-\\sin(3x),$$\nso\n$$\\boxed{\\sin^3x=\\frac{3\\sin x-\\sin(3x)}{4}}.$$\nThe suggested constant factor is therefore\n$$\\boxed{\\frac14}.$$\nBecause the exact integrand and limits are unavailable, no completed integral or antiderivative can be supplied."},{"question":"Lesson evidence; exact paper, formula and marks unresolved. Let $h$ be continuous on $[3,4]$ and suppose\n$$h(3)h(4)<0.$$\nExplain rigorously why the equation $h(x)=0$ has at least one root in the interval $(3,4)$.","answer":"The inequality\n$$h(3)h(4)<0$$\nmeans that $h(3)$ and $h(4)$ have opposite signs. Since $h$ is continuous on $[3,4]$, the Intermediate Value Theorem guarantees that $h$ takes every value between $h(3)$ and $h(4)$, including $0$. Therefore, there is at least one $c\\in(3,4)$ such that\n$$\\boxed{h(c)=0}.$$\nBoth the sign change and continuity are required."},{"question":"Lesson evidence (paper unresolved, no official marks): $f(x)=\\dfrac{12}{x+1}$ with domain $x>0$. (i) State the range of $f$, (ii) write down the domain of $f^{-1}$, (iii) describe the geometric relationship between the graphs of $f$ and $f^{-1}$.","answer":"(i) As $x\\to 0^+$, $f\\to 12$; as $x\\to\\infty$, $f\\to 0^+$, so $0<f(x)<12$, i.e. range $0<x<12$. (ii) Domain of $f^{-1}$ equals the range of $f$, namely $0<x<12$. (iii) The graph of $f^{-1}$ is the reflection of the graph of $f$ in the line $y=x$."},{"question":"Lesson evidence (paper unresolved, no official marks): the iteration for the root in $[3,4]$ (whose numerical value is $3.1589$) starts from $x_1=3$. State the two hypotheses required to prove a root exists in $[3,4]$, the starting value used, and the limiting value approached, without inventing an iteration formula.","answer":"Hypotheses: (i) $h$ is continuous on $[3,4]$; (ii) $h(3)$ and $h(4)$ have opposite signs (sign change). Starting value: $x_1=3$. The iteration converges to the root with limiting value $3.1589$."},{"question":"For the function $f(x)=\\ln(x^2+3)$, state the range of $f(x)$. (Official WMA13/01 Oct 2025, 1 B1 mark, completed with prompting).","answer":"Since $x^2 \\ge 0$ for all real $x$, $x^2+3 \\ge 3$. Because the natural logarithm is a strictly increasing function, $\\ln(x^2+3) \\ge \\ln 3$. The range is $f(x) \\ge \\ln 3$."},{"question":"Two curves $y=x^2+ax+b$ and $y=x+1$ meet at $x=2$ and $x=4$. Find the values of $a$ and $b$ (Warm-up evidence; no official paper/marks).","answer":"Substitute $x=2$ and $x=4$ into $x^2+ax+b=x+1$: $4+2a+b=3$ and $16+4a+b=5$. Subtracting gives $12+2a=2$, so $a=-5$; then $b=3-4-2(-5)=9$. Hence $a=-5,\\ b=9$."},{"question":"Lesson evidence (paper unresolved, no official marks): prove the identity $\\sin(3x)=3\\sin x-4\\sin^{3}x$ starting from $\\sin(2x+x)$ and using $\\sin 2x=2\\sin x\\cos x$, $\\cos 2x=1-2\\sin^2 x$, and $\\sin^2 x+\\cos^2 x=1$. Give the full proof.","answer":"$\\sin(3x)=\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x=(2\\sin x\\cos x)\\cos x+(1-2\\sin^2 x)\\sin x=2\\sin x\\cos^2 x+\\sin x-2\\sin^3 x$. Using $\\cos^2 x=1-\\sin^2 x$: $2\\sin x(1-\\sin^2 x)+\\sin x-2\\sin^3 x=2\\sin x-2\\sin^3 x+\\sin x-2\\sin^3 x=3\\sin x-4\\sin^3 x$. Hence $\\sin(3x)=3\\sin x-4\\sin^3 x$."},{"question":"For the function $f(x)=\\frac{12}{x+1}$ defined for $x>0$, describe the geometric transformation mapping the graph of $y=f(x)$ to $y=f^{-1}(x)$, and find the valid fixed-point candidate(s) of $f(x)$ by solving $f(x)=x$. (Lesson evidence, no official marks).","answer":"The graph of $y=f^{-1}(x)$ is obtained by reflecting the graph of $y=f(x)$ in the line $y=x$. To find fixed points, solve $\\frac{12}{x+1}=x \\implies x^2+x-12=0 \\implies (x-3)(x+4)=0$, giving candidates $x=3$ and $x=-4$. Since the domain is $x>0$, $x=-4$ is rejected, leaving the valid fixed point $x=3$."}],"models":{"glm_1":{"label":"GLM 5.1 ①","cards":[{"question":"Find the values of $a$ and $b$ if the curve $y=x^2+ax+b$ meets the line $y=x+1$ at $x=2$ and $x=4$.","answer":"Set $x^2+ax+b = x+1 \\Rightarrow x^2+(a-1)x+(b-1)=0$. Since roots are $2$ and $4$, $(x-2)(x-4) = x^2-6x+8$. Equating coefficients: $a-1=-6 \\Rightarrow a=-5$, and $b-1=8 \\Rightarrow b=9$."},{"question":"For the function $f(x)=\\ln(x^2+3)$, what is its range? (WMA13/01 Oct 2025, 1 B1)","answer":"Since $x^2 \\ge 0$, $x^2+3 \\ge 3$. Therefore, $\\ln(x^2+3) \\ge \\ln 3$. The range is $f(x) \\ge \\ln 3$."},{"question":"Find the inverse function of $g(x)=\\frac{5x+3}{x+2}$, given the domain $x>-2$. (WMA13/01 Oct 2025, 3 M1 A1 B1)","answer":"Let $y=\\frac{5x+3}{x+2}$. Then $y(x+2)=5x+3 \\Rightarrow xy+2y=5x+3 \\Rightarrow xy-5x=3-2y \\Rightarrow x(y-5)=3-2y \\Rightarrow x=\\frac{3-2y}{y-5}$. The inverse is $g^{-1}(x)=\\frac{3-2x}{x-5}$."},{"question":"What is the domain of the inverse function $g^{-1}(x)=\\frac{3-2x}{x-5}$, given the original function $g(x)=\\frac{5x+3}{x+2}$ has domain $x>-2$? (WMA13/01 Oct 2025, 3 M1 A1 B1)","answer":"The domain of the inverse is the range of the original function. For $x>-2$, $g(x) \\rightarrow 5$ as $x \\rightarrow \\infty$ and $g(x) \\rightarrow -\\infty$ as $x \\rightarrow -2$. The range is $y<5$, so the domain of $g^{-1}(x)$ is $x<5$."},{"question":"Given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$, evaluate $fg(0)$. (WMA13/01 Oct 2025, 2 M1 A1)","answer":"First find $g(0) = \\frac{5(0)+3}{0+2} = \\frac{3}{2}$. Then find $f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^2+3\\right) = \\ln\\left(\\frac{9}{4}+3\\right) = \\ln\\left(\\frac{21}{4}\\right)$."},{"question":"Given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$, solve the equation $g(e^{2a})=f(\\sqrt{e^4-3})$. Status: DEFERRED / UNFINISHED. (WMA13/01 Oct 2025, 3 M1 dM1 A1)","answer":"Status: DEFERRED / UNFINISHED. The official answer is $a=\\frac{1}{2}\\ln 5$ (Official reference only — not completed live)."},{"question":"To prove a root exists in the interval $[3,4]$ using a sign change, what two conditions must be established for the function?","answer":"The function must have a change of sign over the interval (i.e., $f(3)f(4)<0$) AND the function must be continuous on the interval $[3,4]$."},{"question":"If an iterative formula is used with a starting value of $x_1=3$ to find a root in the interval $[3,4]$, and the sequence converges, what value does it approach?","answer":"The iteration approaches $3.1589$."},{"question":"Find the fixed-point candidates for the function $f(x)=\\frac{12}{x+1}$ with domain $x>0$, and state which is rejected and why.","answer":"Set $x=\\frac{12}{x+1} \\Rightarrow x(x+1)=12 \\Rightarrow x^2+x-12=0 \\Rightarrow (x-3)(x+4)=0$. Candidates are $x=3$ and $x=-4$. Since the domain is $x>0$, $x=-4$ is rejected."},{"question":"For the function $f(x)=\\frac{12}{x+1}$ with domain $x>0$, what is the domain of its inverse, and what is the line of reflection between the graph of a function and its inverse?","answer":"The domain of the inverse is the range of the original function. Since $x>0$, $f(0^+)=12$ and $f(\\infty)=0^+$, so the range is $0<y<12$. Thus, the inverse domain is $0<x<12$. The line of reflection is $y=x$."},{"question":"Prove the trigonometric identity $\\sin(3x)=3\\sin x - 4\\sin^3 x$ using the angle addition formula $\\sin(2x+x)$, the double angle formulas $\\sin 2x = 2\\sin x \\cos x$ and $\\cos 2x = 1-2\\sin^2 x$, and the Pythagorean identity $\\sin^2 x + \\cos^2 x = 1$.","answer":"$\\sin(3x) = \\sin(2x+x) = \\sin 2x \\cos x + \\cos 2x \\sin x$. Substitute double angle formulas: $= (2\\sin x \\cos x)\\cos x + (1-2\\sin^2 x)\\sin x = 2\\sin x \\cos^2 x + \\sin x - 2\\sin^3 x$. Substitute $\\cos^2 x = 1-\\sin^2 x$: $= 2\\sin x(1-\\sin^2 x) + \\sin x - 2\\sin^3 x = 2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$."},{"question":"From the identity $\\sin(3x)=3\\sin x - 4\\sin^3 x$, what is the rearrangement for $\\sin^3 x$? Status: DEFERRED / UNFINISHED.","answer":"Status: DEFERRED / UNFINISHED. The rearrangement is $\\sin^3 x = \\frac{3\\sin x - \\sin 3x}{4}$, with a suggested factor of $\\frac{1}{4}$. Exact integrand, limits, and completed antiderivative are unavailable."}]},"glm_2":{"label":"GLM 5.1 ②","cards":[{"question":"Find the values of $a$ and $b$ given that the curves $y=x^2+ax+b$ and $y=x+1$ meet at $x=2$ and $x=4$.","answer":"Substitute $x=2$ and $x=4$ into $x^2+ax+b = x+1$. For $x=2$: $4+2a+b=3 \\implies 2a+b=-1$. For $x=4$: $16+4a+b=5 \\implies 4a+b=-11$. Subtracting the equations gives $2a=-10 \\implies a=-5$. Substituting back gives $-10+b=-1 \\implies b=9$."},{"question":"State the range of the function $f(x)=\\ln(x^2+3)$.","answer":"Since $x^2 \\ge 0$ for all real $x$, the minimum value of the argument is $0+3=3$. Therefore, the minimum value of the function is $\\ln 3$. The range is $f(x) \\ge \\ln 3$. (WMA13/01 Oct 2025, 1 B1)"},{"question":"Find the inverse function of $g(x)=\\frac{5x+3}{x+2}$ for $x>-2$, and state its domain.","answer":"Let $y=\\frac{5x+3}{x+2}$. Then $y(x+2)=5x+3 \\implies xy+2y=5x+3 \\implies x(y-5)=3-2y \\implies x=\\frac{3-2y}{y-5}$. Thus, the inverse is $g^{-1}(x)=\\frac{3-2x}{x-5}$. The domain of the inverse is the range of $g(x)$. As $x \\to -2^+$, $g(x) \\to -\\infty$; as $x \\to \\infty$, $g(x) \\to 5^-$. The range is $y<5$, so the domain of the inverse is $x<5$. (WMA13/01 Oct 2025, 3 M1 A1 B1)"},{"question":"Given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$, evaluate $fg(0)$.","answer":"First find $g(0)=\\frac{5(0)+3}{0+2}=\\frac{3}{2}$. Then apply $f$: $f\\left(\\frac{3}{2}\\right)=\\ln\\left(\\left(\\frac{3}{2}\\right)^2+3\\right)=\\ln\\left(\\frac{9}{4}+3\\right)=\\ln\\left(\\frac{21}{4}\\right)$. (WMA13/01 Oct 2025, 2 M1 A1)"},{"question":"Solve $g(e^{2a})=f(\\sqrt{e^4-3})$ where $g(x)=\\frac{5x+3}{x+2}$ and $f(x)=\\ln(x^2+3)$. Note: This problem is DEFERRED / UNFINISHED.","answer":"$f(\\sqrt{e^4-3})=\\ln((\\sqrt{e^4-3})^2+3)=\\ln(e^4-3+3)=\\ln(e^4)=4$. Setting $g(e^{2a})=4$ gives $\\frac{5e^{2a}+3}{e^{2a}+2}=4 \\implies 5e^{2a}+3=4e^{2a}+8 \\implies e^{2a}=5 \\implies 2a=\\ln 5 \\implies a=\\frac{1}{2}\\ln 5$. Official reference only — not completed live. (DEFERRED / UNFINISHED) (WMA13/01 Oct 2025, 3 M1 dM1 A1)"},{"question":"What two conditions must be established to prove a root exists in the interval $[3,4]$ using a sign change?","answer":"The function must have a sign change between $f(3)$ and $f(4)$, AND the function must be continuous on the interval $[3,4]$. (Lesson evidence, paper unresolved, no official marks)"},{"question":"If an iteration formula starting from $x_1=3$ approaches $3.1589$, what does this value represent?","answer":"The value $3.1589$ represents the root of the equation found by the iterative process converging to that value. (Lesson evidence, paper unresolved, no official marks)"},{"question":"For the function $f(x)=\\frac{12}{x+1}$ with $x>0$, what is the line of reflection between the graph of $y=f(x)$ and the graph of its inverse?","answer":"The line $y=x$. (Lesson evidence, paper unresolved, no official marks)"},{"question":"The function $f(x)=\\frac{12}{x+1}$ for $x>0$ has fixed-point candidates at $x=3$ and $x=-4$. Which is rejected and why?","answer":"$x=-4$ is rejected because it falls outside the given domain of $x>0$. (Lesson evidence, paper unresolved, no official marks)"},{"question":"Find the domain of the inverse function for $f(x)=\\frac{12}{x+1}$ with $x>0$.","answer":"The domain of the inverse is the range of the original function. For $x>0$, $x+1>1$, so $\\frac{12}{x+1}<12$. As $x \\to \\infty$, $f(x) \\to 0^+$. Thus, the range is $0<y<12$, making the inverse domain $0<x<12$. (Lesson evidence, paper unresolved, no official marks)"},{"question":"Prove the identity $\\sin(3x)=3\\sin x-4\\sin^3 x$ using $\\sin(2x+x)$, $\\sin 2x=2\\sin x\\cos x$, $\\cos 2x=1-2\\sin^2 x$ and $\\sin^2 x+\\cos^2 x=1$.","answer":"$\\sin(3x)=\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x$. Using $\\sin 2x=2\\sin x\\cos x$ and $\\cos 2x=1-2\\sin^2 x$, this becomes $(2\\sin x\\cos x)\\cos x+(1-2\\sin^2 x)\\sin x = 2\\sin x\\cos^2 x+\\sin x-2\\sin^3 x$. Using $\\cos^2 x=1-\\sin^2 x$, this is $2\\sin x(1-\\sin^2 x)+\\sin x-2\\sin^3 x = 2\\sin x-2\\sin^3 x+\\sin x-2\\sin^3 x = 3\\sin x-4\\sin^3 x$. (Lesson evidence, paper unresolved, no official marks)"},{"question":"Rearrange the identity $\\sin(3x)=3\\sin x-4\\sin^3 x$ to express $\\sin^3 x$ in terms of $\\sin x$ and $\\sin 3x$. Note: This problem is DEFERRED / UNFINISHED.","answer":"$4\\sin^3 x = 3\\sin x - \\sin 3x \\implies \\sin^3 x = \\frac{3\\sin x - \\sin 3x}{4}$. (DEFERRED / UNFINISHED) (Lesson evidence, paper unresolved, no official marks)"}]},"glm_3":{"label":"GLM 5.1 ③","cards":[{"question":"Given the curves $y=x^2+ax+b$ and $y=x+1$ meet at $x=2$ and $x=4$, find the values of $a$ and $b$.","answer":"Substituting $x=2$ and $x=4$ into $x^2+ax+b=x+1$ gives $4+2a+b=3$ and $16+4a+b=5$. Solving simultaneously yields $a=-5$ and $b=9$."},{"question":"State the range of the function $f(x)=\\ln(x^2+3)$ (WMA13/01 Oct 2025, 1 B1).","answer":"Since $x^2 \\ge 0$, $x^2+3 \\ge 3$. Therefore, $f(x) \\ge \\ln 3$."},{"question":"Find the inverse function $g^{-1}(x)$ for $g(x)=\\frac{5x+3}{x+2}$ with domain $x>-2$ (WMA13/01 Oct 2025, 3 M1 A1 B1).","answer":"Let $y=\\frac{5x+3}{x+2}$. Then $y(x+2)=5x+3$, so $xy+2y=5x+3$, giving $x(5-y)=2y-3$. Thus $x=\\frac{2y-3}{5-y}=\\frac{3-2y}{y-5}$. The inverse is $g^{-1}(x)=\\frac{3-2x}{x-5}$."},{"question":"State the domain of the inverse function $g^{-1}(x)$ for $g(x)=\\frac{5x+3}{x+2}$ with domain $x>-2$ (WMA13/01 Oct 2025, 3 M1 A1 B1).","answer":"The domain of the inverse is the range of the original function. As $x \\to -2^+$, $g(x) \\to -\\infty$; as $x \\to \\infty$, $g(x) \\to 5^-$. The domain is $x<5$."},{"question":"Evaluate $fg(0)$ given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$ (WMA13/01 Oct 2025, 2 M1 A1).","answer":"$g(0)=\\frac{3}{2}$. Then $fg(0)=f\\left(\\frac{3}{2}\\right)=\\ln\\left(\\left(\\frac{3}{2}\\right)^2+3\\right)=\\ln\\left(\\frac{9}{4}+3\\right)=\\ln\\left(\\frac{21}{4}\\right)$."},{"question":"Solve $g(e^{2a})=f(\\sqrt{e^4-3})$ given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$ with $x>-2$. Status: DEFERRED / UNFINISHED (WMA13/01 Oct 2025, 3 M1 dM1 A1).","answer":"Status: DEFERRED / UNFINISHED. $f(\\sqrt{e^4-3})=\\ln((e^4-3)+3)=\\ln(e^4)=4$. Setting $g(e^{2a})=4$ gives $\\frac{5e^{2a}+3}{e^{2a}+2}=4$, so $5e^{2a}+3=4e^{2a}+8$, meaning $e^{2a}=5$. Thus $a=\\frac{1}{2}\\ln 5$. Official reference only — not completed live."},{"question":"What two conditions must be established to prove a root exists in the interval $[3,4]$ using the change of sign method?","answer":"The function must be continuous on the interval $[3,4]$, and there must be a sign change between $f(3)$ and $f(4)$."},{"question":"If an iteration sequence starting from $x_1=3$ on the interval $[3,4]$ approaches $3.1589$, what is the approximate value of the root to 4 decimal places?","answer":"The root is approximately $3.1589$."},{"question":"For the function $f(x)=\\frac{12}{x+1}$ with domain $x>0$, find the fixed-point candidates and state which is rejected by the domain.","answer":"Fixed points occur when $x=\\frac{12}{x+1}$, so $x^2+x-12=0$, giving $(x+4)(x-3)=0$. The candidates are $x=3$ and $x=-4$. The value $x=-4$ is rejected because it does not satisfy the domain $x>0$."},{"question":"Find the domain of the inverse function for $f(x)=\\frac{12}{x+1}$ with domain $x>0$.","answer":"The domain of the inverse is the range of $f(x)$. Since $x>0$, $x+1>1$, so $0<\\frac{1}{x+1}<1$. Multiplying by 12 gives $0<\\frac{12}{x+1}<12$. The domain of the inverse is $0<x<12$."},{"question":"Prove the identity $\\sin(3x)=3\\sin x-4\\sin^3 x$ using $\\sin(2x+x)$, $\\sin 2x=2\\sin x\\cos x$, $\\cos 2x=1-2\\sin^2 x$, and $\\sin^2 x+\\cos^2 x=1$.","answer":"$\\sin(3x)=\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x$. Substituting identities: $=(2\\sin x\\cos x)\\cos x+(1-2\\sin^2 x)\\sin x=2\\sin x\\cos^2 x+\\sin x-2\\sin^3 x$. Using $\\cos^2 x=1-\\sin^2 x$, this becomes $2\\sin x(1-\\sin^2 x)+\\sin x-2\\sin^3 x=2\\sin x-2\\sin^3 x+\\sin x-2\\sin^3 x=3\\sin x-4\\sin^3 x$."},{"question":"Rearrange the identity $\\sin(3x)=3\\sin x-4\\sin^3 x$ to express $\\sin^3 x$ in terms of $\\sin 3x$ and $\\sin x$. Status: DEFERRED / UNFINISHED.","answer":"Status: DEFERRED / UNFINISHED. Rearranging gives $4\\sin^3 x=3\\sin x-\\sin 3x$, so $\\sin^3 x=\\frac{3\\sin x-\\sin 3x}{4}$. A factor of $\\frac{1}{4}$ is suggested for integration, but exact integrand, limits, and completed antiderivative are unavailable."}]},"qwen_1":{"label":"Qwen ①","cards":[{"question":"Given that the curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$, find the values of the constants $a$ and $b$. (Lesson evidence, no official marks).","answer":"Equating the expressions gives $x^2+ax+b = x+1 \\implies x^2+(a-1)x+(b-1)=0$. The roots are $x=2$ and $x=4$, so the sum of roots is $-(a-1) = 6 \\implies a=-5$, and the product of roots is $b-1 = 8 \\implies b=9$."},{"question":"For the function $f(x)=\\ln(x^2+3)$, state the range of $f(x)$. (Official WMA13/01 Oct 2025, 1 B1 mark, completed with prompting).","answer":"Since $x^2 \\ge 0$ for all real $x$, $x^2+3 \\ge 3$. Because the natural logarithm is a strictly increasing function, $\\ln(x^2+3) \\ge \\ln 3$. The range is $f(x) \\ge \\ln 3$."},{"question":"Given the function $g(x)=\\frac{5x+3}{x+2}$ for $x>-2$, find the inverse function $g^{-1}(x)$ and state its domain. (Official WMA13/01 Oct 2025, 3 M1 A1 B1 marks, completed with prompting).","answer":"Let $y=\\frac{5x+3}{x+2}$. Rearranging for $x$: $y(x+2)=5x+3 \\implies xy+2y=5x+3 \\implies x(y-5)=3-2y \\implies x=\\frac{3-2y}{y-5}$. Thus, $g^{-1}(x)=\\frac{3-2x}{x-5}$. The domain of $g^{-1}(x)$ is the range of $g(x)$, which is $x<5$."},{"question":"Given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$ for $x>-2$, find the exact value of the composite function $fg(0)$. (Official WMA13/01 Oct 2025, 2 M1 A1 marks, completed with prompting).","answer":"First, evaluate $g(0) = \\frac{5(0)+3}{0+2} = \\frac{3}{2}$. Then, evaluate $f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^2+3\\right) = \\ln\\left(\\frac{9}{4}+3\\right) = \\ln\\left(\\frac{21}{4}\\right)$. Thus, $fg(0) = \\ln\\left(\\frac{21}{4}\\right)$."},{"question":"Given $f(x)=\\ln(x^2+3)$ and $g(x)=\\frac{5x+3}{x+2}$, solve the equation $g(e^{2a})=f(\\sqrt{e^4-3})$ for $a$. Note: This question is DEFERRED / UNFINISHED in the lesson. (Official WMA13/01 Oct 2025, 3 M1 dM1 A1 marks).","answer":"DEFERRED / UNFINISHED. Official reference only — not completed live. The official reference answer is $a=\\frac{1}{2}\\ln 5$."},{"question":"To prove that a continuous function has a root in the interval $[3,4]$, what two mathematical conditions must be demonstrated regarding the function's values and properties on this interval? (Lesson evidence, no official marks).","answer":"You must demonstrate a sign change (the function evaluates to opposite signs at $x=3$ and $x=4$) AND you must state or prove that the function is continuous on the closed interval $[3,4]$."},{"question":"In a numerical methods lesson, an iteration sequence starting from $x_1=3$ is used to find a root. If the sequence converges, what value does it approach, based on the lesson evidence? (Lesson evidence, no official marks or invented iteration formula).","answer":"Based on the lesson evidence, the iteration sequence starting from $x_1=3$ approaches the value $3.1589$."},{"question":"For the function $f(x)=\\frac{12}{x+1}$ defined for $x>0$, describe the geometric transformation mapping the graph of $y=f(x)$ to $y=f^{-1}(x)$, and find the valid fixed-point candidate(s) of $f(x)$ by solving $f(x)=x$. (Lesson evidence, no official marks).","answer":"The graph of $y=f^{-1}(x)$ is obtained by reflecting the graph of $y=f(x)$ in the line $y=x$. To find fixed points, solve $\\frac{12}{x+1}=x \\implies x^2+x-12=0 \\implies (x-3)(x+4)=0$, giving candidates $x=3$ and $x=-4$. Since the domain is $x>0$, $x=-4$ is rejected, leaving the valid fixed point $x=3$."},{"question":"Given the function $f(x)=\\frac{12}{x+1}$ with the restricted domain $x>0$, determine the domain of the inverse function $f^{-1}(x)$. (Lesson evidence, no official marks).","answer":"The domain of $f^{-1}(x)$ is the range of $f(x)$. For $x>0$, $x+1>1$, so $0 < \\frac{12}{x+1} < 12$. Therefore, the domain of $f^{-1}(x)$ is $0 < x < 12$."},{"question":"Prove the identity $\\sin(3x) = 3\\sin x - 4\\sin^3 x$ by expanding $\\sin(2x+x)$ and using standard double angle formulae and the Pythagorean identity. (Lesson evidence, no official marks).","answer":"Start with $\\sin(3x) = \\sin(2x+x) = \\sin 2x \\cos x + \\cos 2x \\sin x$. Substitute $\\sin 2x = 2\\sin x \\cos x$ and $\\cos 2x = 1-2\\sin^2 x$: $(2\\sin x \\cos x)\\cos x + (1-2\\sin^2 x)\\sin x = 2\\sin x \\cos^2 x + \\sin x - 2\\sin^3 x$. Use $\\cos^2 x = 1-\\sin^2 x$: $2\\sin x(1-\\sin^2 x) + \\sin x - 2\\sin^3 x = 2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$."},{"question":"Using the identity $\\sin(3x) = 3\\sin x - 4\\sin^3 x$, rearrange the formula to express $\\sin^3 x$ in terms of $\\sin x$ and $\\sin(3x)$, identifying the suggested constant factor. Note: This topic is DEFERRED / UNFINISHED in the lesson. (Lesson evidence, no official marks).","answer":"DEFERRED / UNFINISHED. Rearranging $4\\sin^3 x = 3\\sin x - \\sin(3x)$ gives $\\sin^3 x = \\frac{3\\sin x - \\sin(3x)}{4}$. The suggested constant factor is $\\frac{1}{4}$. (Exact integrand, limits, and completed antiderivative are unavailable and not reconstructed)."},{"question":"In the context of integrating powers of sine, a lesson suggests using the rearrangement $\\sin^3 x = \\frac{1}{4}(3\\sin x - \\sin 3x)$. What is the official status of the exact integrand, limits, and completed antiderivative for this integral, and what rule applies to their reconstruction? Note: This topic is DEFERRED / UNFINISHED.","answer":"DEFERRED / UNFINISHED. The exact integrand, limits, and completed antiderivative are unavailable in the lesson evidence. The strict rule is that you must not reconstruct, invent, or provide a completed integral or invented source details for this deferred topic."}]},"minimax_1":{"label":"MiniMax ①","cards":[{"question":"Two curves $y = x^2 + ax + b$ and $y = x + 1$ meet at the points $x = 2$ and $x = 4$. Find the values of $a$ and $b$. (Lesson-evidence warm-up W0; paper and marks unresolved — do not attribute to WMA13/01.)","answer":"Substitute each intersection into $x^2 + ax + b = x + 1$.\n- $x = 2$: $4 + 2a + b = 3 \\Rightarrow 2a + b = -1$\n- $x = 4$: $16 + 4a + b = 5 \\Rightarrow 4a + b = -11$\n\nSubtracting gives $2a = -10$, so $a = -5$. Then $b = -1 - 2(-5) = 9$.\n\n$\\boxed{a = -5,\\ b = 9}$"},{"question":"Official WMA13/01 Oct 2025 Q1(a). Given $f(x) = \\ln(x^2 + 3)$, find the range of $f$. [1 mark: B1]","answer":"Since $x^2 \\geq 0$, we have $x^2 + 3 \\geq 3 > 0$, so $\\ln$ is defined for all real $x$. Because $x^2$ is minimised at $x = 0$ with $x^2 = 0$, the minimum of $x^2 + 3$ is $3$. The function $\\ln$ is increasing, so the minimum value of $f(x)$ is $\\ln 3$, attained at $x = 0$.\n\nRange: $f(x) \\geq \\ln 3$. [B1]"},{"question":"Official WMA13/01 Oct 2025 Q1(b). Given $g(x) = \\dfrac{5x + 3}{x + 2}$, $x > -2$, find $g^{-1}(x)$ and state its domain. [3 marks: M1 A1 B1]","answer":"Let $y = \\dfrac{5x + 3}{x + 2}$. Interchange $x$ and $y$:\n$$x = \\frac{5y + 3}{y + 2}$$\nMultiply: $x(y + 2) = 5y + 3$, so $xy + 2x = 5y + 3$.\nRearrange: $xy - 5y = 3 - 2x \\Rightarrow y(x - 5) = 3 - 2x \\Rightarrow y = \\dfrac{3 - 2x}{x - 5}$. [M1, A1]\n\nDomain of $g^{-1}$ equals range of $g$. As $x \\to -2^+$, $g \\to +\\infty$, and as $x \\to +\\infty$, $g \\to 5^-$ (from the asymptote $y = 5$, since $g(x) = 5 - \\dfrac{7}{x+2}$). So range of $g$ is $g < 5$.\n\nDomain of $g^{-1}$: $x < 5$. [B1]"},{"question":"Official WMA13/01 Oct 2025 Q1(c). Using $f(x) = \\ln(x^2 + 3)$ and $g(x) = \\dfrac{5x + 3}{x + 2}$ (with $x > -2$), evaluate $\\mathrm{fg}(0)$, where $\\mathrm{fg}(x) = f(g(x))$. [2 marks: M1 A1]","answer":"First compute $g(0) = \\dfrac{5(0) + 3}{0 + 2} = \\dfrac{3}{2}$.\n\nThen $\\mathrm{fg}(0) = f\\!\\left(\\dfrac{3}{2}\\right) = \\ln\\!\\left(\\left(\\dfrac{3}{2}\\right)^2 + 3\\right) = \\ln\\!\\left(\\dfrac{9}{4} + 3\\right) = \\ln\\!\\left(\\dfrac{21}{4}\\right)$. [M1, A1]"},{"question":"Official WMA13/01 Oct 2025 Q1(d). Using $f(x) = \\ln(x^2 + 3)$ and $g(x) = \\dfrac{5x + 3}{x + 2}$ with $x > -2$, solve $g(e^{2a}) = f\\!\\left(\\sqrt{e^4 - 3}\\right)$ for $a$. State: lesson status is DEFERRED / UNFINISHED; the answer $a = \\tfrac{1}{2}\\ln 5$ is Official reference only — not completed live. [3 marks: M1 dM1 A1]","answer":"**DEFERRED / UNFINISHED** in lesson. The following is **Official reference only — not completed live**:\n\nLHS: $g(e^{2a}) = \\dfrac{5e^{2a} + 3}{e^{2a} + 2}$.\nRHS: $f\\!\\left(\\sqrt{e^4 - 3}\\right) = \\ln\\!\\left(\\left(\\sqrt{e^4 - 3}\\right)^2 + 3\\right) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$.\n\nSet LHS $= 4$: $\\dfrac{5e^{2a} + 3}{e^{2a} + 2} = 4$, so $5e^{2a} + 3 = 4e^{2a} + 8 \\Rightarrow e^{2a} = 5 \\Rightarrow 2a = \\ln 5 \\Rightarrow a = \\tfrac{1}{2}\\ln 5$. [M1, dM1, A1]"},{"question":"Lesson evidence NM1 — paper, exact formula and marks unresolved. Show that a root of an equation lies in the interval $[3, 4]$ and that an iteration starting from $x_1 = 3$ approaches approximately $3.1589$. You may NOT invent the iteration formula, the original equation, or official marks.","answer":"Root-existence requirement (lesson evidence only): prove (i) continuity of the relevant function on the closed interval $[3, 4]$, and (ii) a sign change across the interval (e.g. $f(3) < 0 < f(4)$ or vice versa). By the Intermediate Value Theorem / sign-change + continuity argument, a root lies in $[3, 4]$.\n\nConvergence towards $3.1589$ starting from $x_1 = 3$ is observed numerically; the exact rearrangement used in class is not in the evidence, so no specific iteration formula is given here."},{"question":"Lesson evidence F2 — paper and marks unresolved. Given $f(x) = \\dfrac{12}{x + 1}$, $x > 0$: (i) state why $x = -4$ is rejected as a fixed-point candidate, (ii) find the range of $f$ on its domain, and (iii) hence state the domain of $f^{-1}$. Do not invent official marks.","answer":"(i) A fixed point satisfies $f(x) = x$. Solving $\\dfrac{12}{x+1} = x$ gives $x^2 + x - 12 = 0 \\Rightarrow (x+4)(x-3) = 0$, so candidates are $x = 3$ and $x = -4$. The domain is $x > 0$, so $x = -4$ is rejected.\n\n(ii) Write $f(x) = \\dfrac{12}{x+1}$. As $x \\to 0^+$, $f \\to 12$. As $x \\to \\infty$, $f \\to 0^+$ decreasingly. So the range is $0 < f(x) < 12$.\n\n(iii) Domain of $f^{-1}$ = range of $f$: $\\ 0 < x < 12$."},{"question":"Lesson evidence F2 — paper and marks unresolved. Describe, without performing a sketch, how the graph of $y = f^{-1}(x)$ for $f(x) = \\dfrac{12}{x+1}$, $x > 0$, is related to the graph of $y = f(x)$. Do not invent official marks.","answer":"The graph of $y = f^{-1}(x)$ is the reflection of the graph of $y = f(x)$ in the line $y = x$. The only points unchanged by this reflection are those on $y = x$ — i.e. fixed points of $f$ — which for this function is $x = 3$ (the point $(3, 3)$). Reflection maps the domain $x > 0$ onto the range $0 < x < 12$, and the range $0 < y < 12$ onto the domain $y > 0$."},{"question":"Lesson evidence T1 — paper and marks unresolved. Prove the identity $\\sin 3x = 3\\sin x - 4\\sin^3 x$ using $\\sin(2x + x)$, the double-angle formula $\\sin 2x = 2\\sin x \\cos x$, the identity $\\cos 2x = 1 - 2\\sin^2 x$, and $\\sin^2 x + \\cos^2 x = 1$. Do not invent official marks.","answer":"$\\sin 3x = \\sin(2x + x) = \\sin 2x \\cos x + \\cos 2x \\sin x$.\n\nSubstitute the double-angle identities:\n$= (2\\sin x \\cos x)\\cos x + (1 - 2\\sin^2 x)\\sin x$\n$= 2\\sin x \\cos^2 x + \\sin x - 2\\sin^3 x$.\n\nUse $\\cos^2 x = 1 - \\sin^2 x$:\n$= 2\\sin x (1 - \\sin^2 x) + \\sin x - 2\\sin^3 x$\n$= 2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x$\n$= 3\\sin x - 4\\sin^3 x.$ $\\blacksquare$"},{"question":"Official WMA13/01 Oct 2025 Q1(d) — recurrence / rearrangement style. Define $h(x) = g(e^{2x})$ where $g(t) = \\dfrac{5t + 3}{t + 2}$. Starting from $x_1 = 0$, apply one Newton–Raphson step using $a = \\tfrac{1}{2}\\ln 5$ as the Official reference root (not completed live; DEFERRED / UNFINISHED in lesson) to estimate the improved value $x_2$. State only the setup and the official mark allocation [M1 dM1 A1] — do not invent working.","answer":"**DEFERRED / UNFINISHED** in lesson. The following is **Official reference only — not completed live**:\n\nSet $F(x) = h(x) - 4$, so a root of $F$ corresponds to $h(x) = 4$. Newton–Raphson:\n$$x_2 = x_1 - \\frac{F(x_1)}{F'(x_1)}.$$\nA correct derivative of $h$ and substitution with $x_1 = 0$ would earn [M1]; forming the iteration and simplifying earns [dM1]; the final numerical value (which approaches $a = \\tfrac{1}{2}\\ln 5$) earns [A1]. Exact numerical working is not provided here, per the evidence rules."},{"question":"Lesson evidence T2 — DEFERRED / UNFINISHED. State the rearrangement $\\sin^3 x = \\dfrac{3\\sin x - \\sin 3x}{4}$ and the factor $\\tfrac{1}{4}$ that were established in lesson. Do NOT reconstruct the original integrand, the limits of integration, the completed antiderivative, or any official paper/marks — these are not in the evidence.","answer":"**DEFERRED / UNFINISHED.** The only lesson-established facts are:\n\n$$\\sin^3 x = \\frac{3\\sin x - \\sin 3x}{4}, \\qquad \\text{overall factor } = \\tfrac{1}{4}.$$\n\nNo integrand, no limits, no completed antiderivative, and no official paper or marks are given here because they are not in the evidence."},{"question":"Lesson evidence T2 — DEFERRED / UNFINISHED. Outline, in general terms, why the identity $\\sin^3 x = \\dfrac{3\\sin x - \\sin 3x}{4}$ would be useful when integrating an expression involving $\\sin^3 x$ and powers of $\\sin x$, without completing any specific integral. Do NOT state the original integrand, the limits, or a completed antiderivative.","answer":"**DEFERRED / UNFINISHED.** General principle only:\n\nThe identity replaces a single power $\\sin^3 x$ with a linear combination of $\\sin x$ and $\\sin 3x$. This converts an integrand involving $\\sin^3 x$ into a sum of standard terms of the form $\\int \\sin(kx)\\,dx$, each of which integrates directly to $-\\tfrac{1}{k}\\cos(kx) + C$. No specific integrand, limits, or final antiderivative is provided here, as the source details for T2 are unresolved."}]},"minimax_2":{"label":"MiniMax ②","cards":[{"question":"Two curves $y=x^2+ax+b$ and $y=x+1$ meet at $x=2$ and $x=4$. Find the values of $a$ and $b$ (Warm-up evidence; no official paper/marks).","answer":"Substitute $x=2$ and $x=4$ into $x^2+ax+b=x+1$: $4+2a+b=3$ and $16+4a+b=5$. Subtracting gives $12+2a=2$, so $a=-5$; then $b=3-4-2(-5)=9$. Hence $a=-5,\\ b=9$."},{"question":"$f(x)=\\ln(x^2+3)$. State the range of $f$ (Official WMA13/01 Oct 2025 Q1(a); 1 mark: B1).","answer":"$x^2+3\\ge 3$ with equality at $x=0$, so $f(x)\\ge \\ln 3$. Range: $f(x)\\ge \\ln 3$."},{"question":"$g(x)=\\dfrac{5x+3}{x+2}$, $x>-2$. Find the inverse function $g^{-1}(x)$ and its domain (Official WMA13/01 Oct 2025 Q1(b); 3 marks: M1 A1 B1).","answer":"Let $y=\\dfrac{5x+3}{x+2}\\Rightarrow y(x+2)=5x+3\\Rightarrow x(y-5)=3-2y\\Rightarrow x=\\dfrac{3-2y}{y-5}$. So $g^{-1}(x)=\\dfrac{3-2x}{x-5}$, with domain $x<5$ (the original range)."},{"question":"With $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$, find the exact value of $fg(0)$ (Official WMA13/01 Oct 2025 Q1(c); 2 marks: M1 A1).","answer":"$g(0)=\\dfrac{3}{2}$, so $fg(0)=\\ln\\!\\left(\\left(\\tfrac{3}{2}\\right)^2+3\\right)=\\ln\\!\\left(\\tfrac{9}{4}+3\\right)=\\ln\\!\\left(\\tfrac{21}{4}\\right)$."},{"question":"With $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$, $x>-2$, solve $g(e^{2a})=f\\!\\left(\\sqrt{e^{4}-3}\\right)$. Status: DEFERRED / UNFINISHED in lesson; the value $a=\\tfrac{1}{2}\\ln 5$ is the official reference only — not completed live (Official WMA13/01 Oct 2025 Q1(d); 3 marks: M1 dM1 A1).","answer":"Status: DEFERRED / UNFINISHED. Official reference only — not completed live: $a=\\dfrac{1}{2}\\ln 5$."},{"question":"Lesson evidence: prove that an equation has a root in $[3,4]$ (exact equation, paper, and official marks unresolved). What two conditions on a function $h(x)$ must be verified to establish a root in this interval, and what starting value is used for the subsequent iteration that approaches $3.1589$?","answer":"Show $h(x)$ is continuous on $[3,4]$ and that $h(3)$ and $h(4)$ have opposite signs (sign change). The iteration then starts from $x_1=3$ and converges towards $3.1589$."},{"question":"Lesson evidence (paper unresolved, no official marks): $f(x)=\\dfrac{12}{x+1}$ with domain $x>0$. (i) State the range of $f$, (ii) write down the domain of $f^{-1}$, (iii) describe the geometric relationship between the graphs of $f$ and $f^{-1}$.","answer":"(i) As $x\\to 0^+$, $f\\to 12$; as $x\\to\\infty$, $f\\to 0^+$, so $0<f(x)<12$, i.e. range $0<x<12$. (ii) Domain of $f^{-1}$ equals the range of $f$, namely $0<x<12$. (iii) The graph of $f^{-1}$ is the reflection of the graph of $f$ in the line $y=x$."},{"question":"Lesson evidence (paper unresolved, no official marks): $f(x)=\\dfrac{12}{x+1}$ with $x>0$. Find the fixed points of $f$ and state which (if any) are valid for the function as given.","answer":"Fixed points satisfy $\\dfrac{12}{x+1}=x\\Rightarrow x^2+x-12=0\\Rightarrow (x+4)(x-3)=0$, giving $x=3$ or $x=-4$. Only $x=3$ lies in the domain $x>0$; $x=-4$ is rejected as it is outside the domain."},{"question":"Lesson evidence (paper unresolved, no official marks): prove the identity $\\sin(3x)=3\\sin x-4\\sin^{3}x$ starting from $\\sin(2x+x)$ and using $\\sin 2x=2\\sin x\\cos x$, $\\cos 2x=1-2\\sin^2 x$, and $\\sin^2 x+\\cos^2 x=1$. Give the full proof.","answer":"$\\sin(3x)=\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x=(2\\sin x\\cos x)\\cos x+(1-2\\sin^2 x)\\sin x=2\\sin x\\cos^2 x+\\sin x-2\\sin^3 x$. Using $\\cos^2 x=1-\\sin^2 x$: $2\\sin x(1-\\sin^2 x)+\\sin x-2\\sin^3 x=2\\sin x-2\\sin^3 x+\\sin x-2\\sin^3 x=3\\sin x-4\\sin^3 x$. Hence $\\sin(3x)=3\\sin x-4\\sin^3 x$."},{"question":"Lesson evidence: derive the rearrangement $\\sin^3 x=\\dfrac{3\\sin x-\\sin 3x}{4}$ (paper unresolved, no official marks). Starting from $\\sin(3x)=3\\sin x-4\\sin^3 x$, show the steps to isolate $\\sin^3 x$.","answer":"$\\sin(3x)=3\\sin x-4\\sin^3 x\\Rightarrow 4\\sin^3 x=3\\sin x-\\sin 3x\\Rightarrow \\sin^3 x=\\dfrac{3\\sin x-\\sin 3x}{4}$."},{"question":"Lesson evidence: a definite integral whose antiderivative involves a factor of $\\tfrac{1}{4}$ and uses the rearrangement $\\sin^3 x=\\dfrac{3\\sin x-\\sin 3x}{4}$ (paper unresolved, no official marks). Status: DEFERRED / UNFINISHED. State only the rearrangement form, the suggested $\\tfrac{1}{4}$ factor, and the literal status. Do not reconstruct the integrand, limits, or a completed antiderivative.","answer":"Status: DEFERRED / UNFINISHED. Available evidence: integrand contains $\\sin^3 x$ rewritten as $\\dfrac{3\\sin x-\\sin 3x}{4}$, and a factor $\\dfrac{1}{4}$ is suggested. Exact integrand, limits, and completed antiderivative are not available and must not be reconstructed."},{"question":"Lesson evidence (paper unresolved, no official marks): the iteration for the root in $[3,4]$ (whose numerical value is $3.1589$) starts from $x_1=3$. State the two hypotheses required to prove a root exists in $[3,4]$, the starting value used, and the limiting value approached, without inventing an iteration formula.","answer":"Hypotheses: (i) $h$ is continuous on $[3,4]$; (ii) $h(3)$ and $h(4)$ have opposite signs (sign change). Starting value: $x_1=3$. The iteration converges to the root with limiting value $3.1589$."}]},"gpt56sol_1":{"label":"GPT-5.6 Sol ①","cards":[{"question":"The curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$. Determine $a$ and $b$. This is non-official warm-up evidence with no official marks.","answer":"At each intersection,\n$$x^2+ax+b=x+1.$$\nHence\n$$x^2+(a-1)x+(b-1)=0.$$\nIts roots are $2$ and $4$, so\n$$x^2+(a-1)x+(b-1)=(x-2)(x-4)=x^2-6x+8.$$\nComparing coefficients gives\n$$a-1=-6,\\qquad b-1=8,$$\nso\n$$\\boxed{a=-5,\\quad b=9}.$$"},{"question":"In official WMA13/01 October 2025 Q1(a), worth $1$ B1 mark and completed with prompting, the function is $f(x)=\\ln(x^2+3)$ for real $x$. State the range of $f$.","answer":"Since $x^2\\geq 0$,\n$$x^2+3\\geq 3.$$\nBecause $\\ln x$ is increasing,\n$$\\ln(x^2+3)\\geq\\ln 3.$$\nTherefore the range is\n$$\\boxed{f(x)\\geq\\ln 3}$$\nor equivalently\n$$\\boxed{[\\ln 3,\\infty)}.$$"},{"question":"In official WMA13/01 October 2025 Q1(b), worth $3$ marks $(\\mathrm{M1,\\ A1,\\ B1})$ and completed with prompting, $g(x)=\\dfrac{5x+3}{x+2}$ with domain $x>-2$. Find an expression for $g^{-1}(x)$.","answer":"Set\n$$y=\\frac{5x+3}{x+2}.$$\nThen\n$$y(x+2)=5x+3,$$\nso\n$$x(y-5)=3-2y$$\nand\n$$x=\\frac{3-2y}{y-5}.$$\nInterchanging $x$ and $y$ gives\n$$\\boxed{g^{-1}(x)=\\frac{3-2x}{x-5}}.$$"},{"question":"In official WMA13/01 October 2025 Q1(b), worth $3$ marks $(\\mathrm{M1,\\ A1,\\ B1})$ and completed with prompting, $g(x)=\\dfrac{5x+3}{x+2}$ has domain $x>-2$ and inverse $g^{-1}(x)=\\dfrac{3-2x}{x-5}$. Determine the domain of $g^{-1}$.","answer":"Rewrite $g$ as\n$$g(x)=5-\\frac{7}{x+2}.$$\nSince $x>-2$, we have $x+2>0$, so\n$$-\\frac{7}{x+2}<0$$\nand therefore\n$$g(x)<5.$$\nAs $x\\to-2^+$, $g(x)\\to-\\infty$, while as $x\\to\\infty$, $g(x)\\to5^-$, so the range of $g$ is $(-\\infty,5)$. This becomes the domain of its inverse:\n$$\\boxed{x<5}.$$"},{"question":"In official WMA13/01 October 2025 Q1(c), worth $2$ marks $(\\mathrm{M1,\\ A1})$ and completed with prompting, $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$ for $x>-2$. Find the exact value of the composite function $fg(0)=f(g(0))$.","answer":"First,\n$$g(0)=\\frac{5(0)+3}{0+2}=\\frac32.$$\nTherefore\n$$fg(0)=f\\left(\\frac32\\right)\n=\\ln\\left(\\left(\\frac32\\right)^2+3\\right)\n=\\ln\\left(\\frac94+\\frac{12}{4}\\right).$$\nHence\n$$\\boxed{fg(0)=\\ln\\left(\\frac{21}{4}\\right)}.$$"},{"question":"DEFERRED / UNFINISHED — In official WMA13/01 October 2025 Q1(d), worth $3$ marks $(\\mathrm{M1,\\ dM1,\\ A1})$, $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$ for $x>-2$. Solve $g(e^{2a})=f\\!\\left(\\sqrt{e^4-3}\\right)$, while clearly identifying that the result is an official reference only and was not completed live.","answer":"DEFERRED / UNFINISHED — Official reference only — not completed live.\n\nThe right-hand side simplifies to\n$$f\\left(\\sqrt{e^4-3}\\right)\n=\\ln\\left(\\left(\\sqrt{e^4-3}\\right)^2+3\\right)\n=\\ln(e^4)=4.$$\nThus\n$$\\frac{5e^{2a}+3}{e^{2a}+2}=4.$$\nTherefore\n$$5e^{2a}+3=4e^{2a}+8,$$\nso\n$$e^{2a}=5.$$\nTaking natural logarithms gives\n$$2a=\\ln 5,$$\nhence the official reference answer is\n$$\\boxed{a=\\frac12\\ln 5}.$$"},{"question":"In non-official numerical-methods evidence with the exact paper, formula and marks unresolved, a function $h$ is continuous on $[3,4]$ and satisfies $h(3)h(4)<0$. Explain rigorously why $h(x)=0$ has at least one root in $(3,4)$.","answer":"The condition\n$$h(3)h(4)<0$$\nmeans that $h(3)$ and $h(4)$ have opposite signs. Because $h$ is continuous on $[3,4]$, the Intermediate Value Theorem guarantees that $h$ takes every value between $h(3)$ and $h(4)$, including $0$. Therefore there is at least one $c\\in(3,4)$ such that\n$$\\boxed{h(c)=0}.$$\nA sign change alone is insufficient: continuity on $[3,4]$ is also required."},{"question":"In non-official numerical-methods evidence with the exact paper, iteration formula and marks unresolved, an iteration starts from $x_1=3$ and its recorded values approach $3.1589$. What root estimate may be reported without inventing an iteration formula?","answer":"The recorded convergence supports the root estimate\n$$\\boxed{x\\approx3.1589}.$$\nNo specific recurrence relation or additional iteration values can be stated because the iteration formula is unresolved."},{"question":"In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find $f^{-1}(x)$, state its domain, and describe the geometric relationship between the curves $y=f(x)$ and $y=f^{-1}(x)$.","answer":"Starting with\n$$y=\\frac{12}{x+1},$$\ninterchange $x$ and $y$:\n$$x=\\frac{12}{y+1}.$$\nThen\n$$x(y+1)=12,\\qquad y=\\frac{12}{x}-1.$$\nThus\n$$\\boxed{f^{-1}(x)=\\frac{12}{x}-1}.$$\nFor $x>0$, the range of $f$ is $0<f(x)<12$, so the inverse domain is\n$$\\boxed{0<x<12}.$$\nThe curves $y=f(x)$ and $y=f^{-1}(x)$ are reflections of each other in the line\n$$\\boxed{y=x}.$$"},{"question":"In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find all algebraic candidates satisfying $f(x)=x$, then apply the domain restriction to identify the valid fixed point.","answer":"Solve\n$$\\frac{12}{x+1}=x.$$\nThen\n$$12=x(x+1),$$\nso\n$$x^2+x-12=0.$$\nFactorising,\n$$(x-3)(x+4)=0,$$\ngiving the algebraic candidates\n$$x=3\\quad\\text{or}\\quad x=-4.$$\nSince the domain is $x>0$, reject $-4$. The valid fixed point is\n$$\\boxed{x=3}.$$"},{"question":"In non-official trigonometry evidence with the paper and marks unresolved, prove\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\nusing $\\sin(2x+x)$, $\\sin2x=2\\sin x\\cos x$, $\\cos2x=1-2\\sin^2x$, and $\\sin^2x+\\cos^2x=1$.","answer":"Using the angle-addition formula,\n$$\\sin(3x)=\\sin(2x+x)=\\sin2x\\cos x+\\cos2x\\sin x.$$\nSubstitute $\\sin2x=2\\sin x\\cos x$ and $\\cos2x=1-2\\sin^2x$:\n$$\\sin(3x)=2\\sin x\\cos^2x+(1-2\\sin^2x)\\sin x.$$\nSince $\\cos^2x=1-\\sin^2x$,\n$$\\sin(3x)=2\\sin x(1-\\sin^2x)+\\sin x-2\\sin^3x.$$\nTherefore\n$$\\sin(3x)=2\\sin x-2\\sin^3x+\\sin x-2\\sin^3x,$$\nso\n$$\\boxed{\\sin(3x)=3\\sin x-4\\sin^3x}.$$"},{"question":"DEFERRED / UNFINISHED — In non-official trigonometry evidence with the paper, exact integrand, limits, completed antiderivative and marks unresolved, rearrange\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\nto make $\\sin^3x$ the subject, and state the only supported constant-factor observation without reconstructing an integral.","answer":"DEFERRED / UNFINISHED — Rearranging,\n$$4\\sin^3x=3\\sin x-\\sin(3x),$$\nso\n$$\\boxed{\\sin^3x=\\frac{3\\sin x-\\sin(3x)}{4}}.$$\nThe only supported constant-factor observation is that a factor of\n$$\\boxed{\\frac14}$$\nmay be taken outside an integral if this identity is substituted. No complete antiderivative, integrand, limits or final integral result can be supplied from the available evidence."}]},"gpt56sol_2":{"label":"GPT-5.6 Sol ②","cards":[{"question":"Lesson-evidence warm-up; paper and marks unresolved. The curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$. Determine $a$ and $b$.","answer":"At an intersection,\n$$x^2+ax+b=x+1,$$\nso\n$$x^2+(a-1)x+(b-1)=0.$$\nIts roots are $2$ and $4$, hence\n$$x^2+(a-1)x+(b-1)=(x-2)(x-4)=x^2-6x+8.$$\nComparing coefficients gives\n$$a-1=-6,\\qquad b-1=8,$$\nso\n$$\\boxed{a=-5,\\quad b=9}.$$"},{"question":"Official WMA13/01 October 2025 Q1(a), completed with prompting, 1 mark (B1). Given $f(x)=\\ln(x^2+3)$ for real $x$, determine the range of $f$.","answer":"Since $x^2\\geq 0$ for every real $x$,\n$$x^2+3\\geq 3.$$\nBecause $\\ln x$ is increasing,\n$$\\ln(x^2+3)\\geq\\ln 3.$$\nEquality occurs at $x=0$, so the range is\n$$\\boxed{f(x)\\geq\\ln 3}$$\nor equivalently $\\boxed{[\\ln 3,\\infty)}$. This earns B1."},{"question":"Official WMA13/01 October 2025 Q1(b), completed with prompting. For\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nderive an expression for $g^{-1}(x)$. The inverse-expression work carries M1 A1 within the 3 marks available for Q1(b).","answer":"Let\n$$y=\\frac{5x+3}{x+2}.$$\nThen\n$$y(x+2)=5x+3,$$\nso\n$$x(y-5)=3-2y$$\nand therefore\n$$x=\\frac{3-2y}{y-5}.$$\nInterchanging $x$ and $y$ gives\n$$\\boxed{g^{-1}(x)=\\frac{3-2x}{x-5}}.$$\nThe valid rearrangement earns M1 and the correct inverse earns A1."},{"question":"Official WMA13/01 October 2025 Q1(b), completed with prompting. Given\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nand\n$$g^{-1}(x)=\\frac{3-2x}{x-5},$$\ndetermine the domain of $g^{-1}$. This domain statement carries B1 within the 3 marks available for Q1(b).","answer":"Rewrite $g$ as\n$$g(x)=5-\\frac{7}{x+2}.$$\nSince $x>-2$, we have $x+2>0$, so\n$$-\\frac{7}{x+2}<0$$\nand hence $g(x)<5$. As $x$ varies over $(-2,\\infty)$, the range of $g$ is $(-\\infty,5)$. The domain of the inverse equals the range of the original function, so\n$$\\boxed{\\operatorname{dom}(g^{-1})=\\{x:x<5\\}}.$$\nThis earns B1."},{"question":"Official WMA13/01 October 2025 Q1(c), completed with prompting, 2 marks (M1 A1). Given\n$$f(x)=\\ln(x^2+3),\\qquad g(x)=\\frac{5x+3}{x+2},\\quad x>-2,$$\nfind the exact value of $fg(0)$, where $fg(0)=f(g(0))$.","answer":"First,\n$$g(0)=\\frac{5(0)+3}{0+2}=\\frac32.$$\nTherefore\n$$fg(0)=f\\left(\\frac32\\right)\n=\\ln\\left[\\left(\\frac32\\right)^2+3\\right]\n=\\ln\\left(\\frac94+\\frac{12}{4}\\right).$$\nThus\n$$\\boxed{fg(0)=\\ln\\left(\\frac{21}{4}\\right)}.$$\nSubstitution into the composite function earns M1 and the exact value earns A1."},{"question":"Official WMA13/01 October 2025 Q1(d), 3 marks (M1 dM1 A1), status DEFERRED / UNFINISHED. Given\n$$f(x)=\\ln(x^2+3),\\qquad g(x)=\\frac{5x+3}{x+2},\\quad x>-2,$$\nsolve\n$$g(e^{2a})=f\\left(\\sqrt{e^4-3}\\right).$$\nThe official result is reference material only and must not be treated as work completed live.","answer":"**DEFERRED / UNFINISHED. Official reference only — not completed live.**\n\nThe official route is\n$$f\\left(\\sqrt{e^4-3}\\right)\n=\\ln\\left[\\left(\\sqrt{e^4-3}\\right)^2+3\\right]\n=\\ln(e^4)=4.$$\nHence\n$$\\frac{5e^{2a}+3}{e^{2a}+2}=4.$$\nTherefore\n$$5e^{2a}+3=4e^{2a}+8,$$\nso\n$$e^{2a}=5.$$\nTaking natural logarithms gives\n$$2a=\\ln 5,$$\nand thus the official answer is\n$$\\boxed{a=\\frac12\\ln 5}.$$\nThe official allocation is M1 dM1 A1."},{"question":"Lesson evidence; exact paper, formula and marks unresolved. Let $h$ be continuous on $[3,4]$ and suppose\n$$h(3)h(4)<0.$$\nExplain rigorously why the equation $h(x)=0$ has at least one root in the interval $(3,4)$.","answer":"The inequality\n$$h(3)h(4)<0$$\nmeans that $h(3)$ and $h(4)$ have opposite signs. Since $h$ is continuous on $[3,4]$, the Intermediate Value Theorem guarantees that $h$ takes every value between $h(3)$ and $h(4)$, including $0$. Therefore, there is at least one $c\\in(3,4)$ such that\n$$\\boxed{h(c)=0}.$$\nBoth the sign change and continuity are required."},{"question":"Lesson evidence; exact paper, iteration formula and marks unresolved. A numerical iteration starts from $x_1=3$ and its iterates approach $3.1589$. State the root estimate supported by this evidence and explain why no intermediate iterates should be calculated from the available information.","answer":"The supported root estimate is\n$$\\boxed{x\\approx3.1589}.$$\nNo intermediate iterates can be calculated because the iteration formula is unavailable. Supplying a recurrence or additional terms would therefore require inventing information not present in the evidence."},{"question":"Lesson evidence; paper and marks unresolved. Given\n$$f(x)=\\frac{12}{x+1},\\qquad x>0,$$\nfind $f^{-1}(x)$ and state its domain.","answer":"Let\n$$y=\\frac{12}{x+1}.$$\nThen\n$$y(x+1)=12,$$\nso\n$$x=\\frac{12}{y}-1.$$\nInterchanging $x$ and $y$ gives\n$$f^{-1}(x)=\\frac{12}{x}-1.$$\nFor $x>0$, the original function satisfies\n$$0<f(x)<12,$$\nso the inverse domain is $0<x<12$. Therefore,\n$$\\boxed{f^{-1}(x)=\\frac{12}{x}-1,\\qquad 0<x<12}.$$"},{"question":"Lesson evidence; paper and marks unresolved. For\n$$f(x)=\\frac{12}{x+1},\\qquad x>0,$$\nstate the geometric relationship between the graphs of $y=f(x)$ and $y=f^{-1}(x)$, then determine their admissible fixed point by solving $f(x)=x$ and enforcing the domain $x>0$.","answer":"The graphs of $y=f(x)$ and $y=f^{-1}(x)$ are reflections of each other in the line\n$$\\boxed{y=x}.$$\nTheir common points satisfy\n$$\\frac{12}{x+1}=x.$$\nThus\n$$x^2+x-12=0,$$\nso\n$$(x-3)(x+4)=0.$$\nThe algebraic candidates are $x=3$ and $x=-4$. Since the domain requires $x>0$, reject $-4$. The admissible fixed point is\n$$\\boxed{x=3},$$\ncorresponding to the point $\\boxed{(3,3)}$."},{"question":"Lesson evidence; paper and marks unresolved. Prove\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\nusing\n$$\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x,$$\n$$\\sin 2x=2\\sin x\\cos x,\\qquad \\cos 2x=1-2\\sin^2x,$$\nand\n$$\\sin^2x+\\cos^2x=1.$$","answer":"Begin with\n$$\\sin(3x)=\\sin(2x+x)\n=\\sin 2x\\cos x+\\cos 2x\\sin x.$$\nSubstitute the double-angle identities:\n$$\\sin(3x)=2\\sin x\\cos^2x+(1-2\\sin^2x)\\sin x.$$\nUsing $\\cos^2x=1-\\sin^2x$,\n$$\\sin(3x)=2\\sin x(1-\\sin^2x)+\\sin x-2\\sin^3x.$$\nTherefore,\n$$\\sin(3x)=2\\sin x-2\\sin^3x+\\sin x-2\\sin^3x,$$\nso\n$$\\boxed{\\sin(3x)=3\\sin x-4\\sin^3x}.$$"},{"question":"Lesson evidence; paper and marks unresolved, status DEFERRED / UNFINISHED. Using only\n$$\\sin(3x)=3\\sin x-4\\sin^3x,$$\nrearrange for $\\sin^3x$ and identify the suggested constant factor for a possible integration step. The exact integrand, limits and completed antiderivative are unavailable and must not be reconstructed.","answer":"**DEFERRED / UNFINISHED.**\n\nRearranging\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\ngives\n$$4\\sin^3x=3\\sin x-\\sin(3x),$$\nso\n$$\\boxed{\\sin^3x=\\frac{3\\sin x-\\sin(3x)}{4}}.$$\nThe suggested constant factor is therefore\n$$\\boxed{\\frac14}.$$\nBecause the exact integrand and limits are unavailable, no completed integral or antiderivative can be supplied."}]}},"meta":{"glm_1":{"model":"z-ai/glm-5.1","provider":"openrouter","route":"openrouter","reasoning_effort":null,"parsed_cards":12},"glm_2":{"model":"z-ai/glm-5.1","provider":"openrouter","route":"openrouter","reasoning_effort":null,"parsed_cards":12},"glm_3":{"model":"z-ai/glm-5.1","provider":"openrouter","route":"openrouter","reasoning_effort":null,"parsed_cards":12},"qwen_1":{"model":"qwen/qwen3.7-max","provider":"openrouter","route":"openrouter","reasoning_effort":null,"parsed_cards":12},"minimax_1":{"model":"minimax/minimax-m3","provider":"openrouter","route":"openrouter","reasoning_effort":null,"parsed_cards":12},"minimax_2":{"model":"minimax function rebuildMyCards(){const qm={};DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});for(const[mk,md]of Object.entries(DATA.models))md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c}});myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])})}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}function inM(c){return mySet.has(c.question)}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}function fA(t){if(!t)return'';const ls=t.split('\n');let h='';for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}h+=`<div>${eH(tr)}</div>`}return h}function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}
function renderTabs(){const b=document.getElementById('tabs');let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;for(const[k,m]of Object.entries(DATA.models)){const n=m.cards.filter(c=>inM(c)).length;h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}b.innerHTML=h}
function renderMeta(){const p=document.getElementById('mp');if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Runs</span><span class="mv">8</span></div>`;return}if(cur==='judge'){p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Judge</span><span class="mv mo">GPT-5.6 Sol</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">medium</span></div><div class="mi"><span class="ml">Selection</span><span class="mv">source-blind</span></div>`;return}const m=DATA.meta[cur],r=DATA.models[cur];p.innerHTML=`<div class="mi"><span class="ml">Run</span><span class="mv">${r.label}</span></div><div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider}</span></div><div class="mi"><span class="ml">Route</span><span class="mv mo">${m.route}</span></div><div class="mi"><span class="ml">Cards</span><span class="mv">${m.parsed_cards}</span></div>${m.reasoning_effort?`<div class="mi"><span class="ml">Reasoning</span><span class="mv">${m.reasoning_effort}</span></div>`:''}`}
function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}
function renderCards(){const cards=getCur(),list=document.getElementById('cl');document.getElementById('cc').textContent=cards.length+' cards';document.getElementById('sc').textContent=myCards.length+' in My Selection';if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}let h='';for(let i=0;i<cards.length;i++){const c=cards[i],im=inM(c);const src=(cur!=='mysel'&&cur!=='judge')?`<span class="sb">${eH(DATA.models[cur].label)}</span>`:'';h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}list.innerHTML=h;rr()}
function onTog(i,ch){const c=getCur()[i];if(ch)addM(c);else remM(c);const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection'}function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})}function sw(t){cur=t;renderTabs();renderMeta();renderCards()}function selAll(){getCur().forEach(addM);renderTabs();renderCards();toast('All selected')}function deAll(){getCur().forEach(remM);renderTabs();renderCards();toast('All deselected')}function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}function shuf(){const l=document.getElementById('cl'),cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}function cpC(i){const c=getCur()[i];navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}function cpTbl(){if(!myCards.length){toast('Empty!');return}let md='| Question | Answer |\n| --- | --- |\n';myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))}function expN(){if(!myCards.length){toast('Empty!');return}cpTbl()}
initMySet();document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script></body></html>
