<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P3 & Calculus — Recall Cards</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230071e3'/%3E%3Cpath d='M17 18h30v28H17z' fill='white'/%3E%3Cpath d='M23 27h18M23 35h12' stroke='%230071e3' stroke-width='4'/%3E%3C/svg%3E"><script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre']}};</script><script defer src="assets/mathjax/tex-svg.js"></script><style>
:root{color-scheme:light;--blue:#0071e3;--ink:#1d1d1f;--muted:#6e6e73;--canvas:#f5f5f7;--line:#d2d2d7}*{box-sizing:border-box}body{margin:0;background:var(--canvas);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;line-height:1.5}main{max-width:920px;margin:0 auto;padding:54px 22px 70px}h1{font-size:clamp(2rem,6vw,3.6rem);letter-spacing:-.055em;line-height:1.04;margin:0 0 12px}.eyebrow{color:var(--blue);font-weight:700;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase}.sub{max-width:640px;color:var(--muted);font-size:1.05rem;margin:0 0 26px}.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:22px 0 26px}button{appearance:none;border:0;border-radius:999px;padding:10px 15px;background:white;color:var(--ink);font:600 .92rem inherit;box-shadow:0 1px 2px #00000014;cursor:pointer}button:hover{background:#e8e8ed}button.primary{background:var(--blue);color:white}button.primary:hover{background:#0077ed}.meta{font-size:.83rem;color:var(--muted);margin-left:4px}.card{background:#fff;border-radius:20px;box-shadow:0 3px 18px #0000000d;padding:23px 24px;margin:14px 0;overflow-wrap:anywhere}.cardhead{display:flex;gap:12px;align-items:flex-start}.pick{margin-top:5px;width:18px;height:18px;accent-color:var(--blue);flex:0 0 auto}.num{font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:5px}.q{font-size:1.02rem;font-weight:600;flex:1;min-width:0}.answer{margin-top:15px;padding-top:17px;border-top:1px solid var(--line);color:#303035}.answer[hidden]{display:none}.cardtools{display:flex;gap:8px;margin-top:16px}.cardtools button{padding:8px 12px;font-size:.83rem;border:1px solid var(--line);box-shadow:none}#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1d1d1f;color:white;padding:9px 13px;border-radius:999px;font-size:.85rem;opacity:0;transition:.2s;pointer-events:none}#toast.on{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:600px){main{padding:35px 14px 55px}.card{padding:19px 17px;border-radius:17px}.toolbar{gap:7px}button{padding:9px 12px;font-size:.86rem}.q{font-size:.97rem}}
</style></head><body><main><div class="eyebrow">P3 &amp; Calculus · local study deck</div><h1>Recall cards</h1><p class="sub">12 independently curated, standalone questions. Select cards, reveal answers, shuffle the order, or copy an individual card for personal notes.</p><div class="toolbar"><button class="primary" id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="select">Select all</button><button id="none">Deselect all</button><button id="shuffle">Shuffle</button><span class="meta" id="count"></span></div><section id="cards" aria-live="polite"></section></main><div id="toast" role="status"></div><script>
const DATA=[{"question": "The curves $y=x^2+ax+b$ and $y=x+1$ intersect at $x=2$ and $x=4$. Determine $a$ and $b$. This is non-official warm-up evidence with no official marks.", "answer": "At each intersection,\n$$x^2+ax+b=x+1.$$\nHence\n$$x^2+(a-1)x+(b-1)=0.$$\nIts roots are $2$ and $4$, so\n$$x^2+(a-1)x+(b-1)=(x-2)(x-4)=x^2-6x+8.$$\nComparing coefficients gives\n$$a-1=-6,\\qquad b-1=8,$$\nso\n$$\\boxed{a=-5,\\quad b=9}.$$"}, {"question": "Official WMA13/01 October 2025 Q1(a), completed with prompting, 1 mark (B1). Given $f(x)=\\ln(x^2+3)$ for real $x$, determine the range of $f$.", "answer": "Since $x^2\\geq 0$ for every real $x$,\n$$x^2+3\\geq 3.$$\nBecause $\\ln x$ is increasing,\n$$\\ln(x^2+3)\\geq\\ln 3.$$\nEquality occurs at $x=0$, so the range is\n$$\\boxed{f(x)\\geq\\ln 3}$$\nor equivalently $\\boxed{[\\ln 3,\\infty)}$. This earns B1."}, {"question": "Official WMA13/01 October 2025 Q1(b), completed with prompting. For\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nderive an expression for $g^{-1}(x)$. The inverse-expression work carries M1 A1 within the 3 marks available for Q1(b).", "answer": "Let\n$$y=\\frac{5x+3}{x+2}.$$\nThen\n$$y(x+2)=5x+3,$$\nso\n$$x(y-5)=3-2y$$\nand therefore\n$$x=\\frac{3-2y}{y-5}.$$\nInterchanging $x$ and $y$ gives\n$$\\boxed{g^{-1}(x)=\\frac{3-2x}{x-5}}.$$\nThe valid rearrangement earns M1 and the correct inverse earns A1."}, {"question": "Official WMA13/01 October 2025 Q1(b), completed with prompting. Given\n$$g(x)=\\frac{5x+3}{x+2},\\qquad x>-2,$$\nand\n$$g^{-1}(x)=\\frac{3-2x}{x-5},$$\ndetermine the domain of $g^{-1}$. This domain statement carries B1 within the 3 marks available for Q1(b).", "answer": "Rewrite $g$ as\n$$g(x)=5-\\frac{7}{x+2}.$$\nSince $x>-2$, we have $x+2>0$, so\n$$-\\frac{7}{x+2}<0$$\nand hence $g(x)<5$. As $x$ varies over $(-2,\\infty)$, the range of $g$ is $(-\\infty,5)$. The domain of the inverse equals the range of the original function, so\n$$\\boxed{\\operatorname{dom}(g^{-1})=\\{x:x<5\\}}.$$\nThis earns B1."}, {"question": "Official WMA13/01 October 2025 Q1(c), completed with prompting, 2 marks (M1 A1). Given\n$$f(x)=\\ln(x^2+3),\\qquad g(x)=\\frac{5x+3}{x+2},\\quad x>-2,$$\nfind the exact value of $fg(0)$, where $fg(0)=f(g(0))$.", "answer": "First,\n$$g(0)=\\frac{5(0)+3}{0+2}=\\frac32.$$\nTherefore\n$$fg(0)=f\\left(\\frac32\\right)\n=\\ln\\left[\\left(\\frac32\\right)^2+3\\right]\n=\\ln\\left(\\frac94+\\frac{12}{4}\\right).$$\nThus\n$$\\boxed{fg(0)=\\ln\\left(\\frac{21}{4}\\right)}.$$\nSubstitution into the composite function earns M1 and the exact value earns A1."}, {"question": "Official WMA13/01 Oct 2025 Q1(d), 3 marks (M1 dM1 A1): using $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$ with $x>-2$, solve $g(e^{2a})=f\\!\\left(\\sqrt{e^4-3}\\right)$ for $a$. **DEFERRED / UNFINISHED:** this was not completed live; use the official reference only.", "answer": "**DEFERRED / UNFINISHED** in lesson. The following is **Official reference only — not completed live**:\n\nLHS: $g(e^{2a}) = \\dfrac{5e^{2a} + 3}{e^{2a} + 2}$.\nRHS: $f\\!\\left(\\sqrt{e^4 - 3}\\right) = \\ln\\!\\left(\\left(\\sqrt{e^4 - 3}\\right)^2 + 3\\right) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$.\n\nSet LHS $= 4$: $\\dfrac{5e^{2a} + 3}{e^{2a} + 2} = 4$, so $5e^{2a} + 3 = 4e^{2a} + 8 \\Rightarrow e^{2a} = 5 \\Rightarrow 2a = \\ln 5 \\Rightarrow a = \\tfrac{1}{2}\\ln 5$. The official allocation is M1 dM1 A1."}, {"question": "Lesson evidence; exact paper, formula and marks unresolved. Let $h$ be continuous on $[3,4]$ and suppose\n$$h(3)h(4)<0.$$\nExplain rigorously why the equation $h(x)=0$ has at least one root in the interval $(3,4)$.", "answer": "The inequality\n$$h(3)h(4)<0$$\nmeans that $h(3)$ and $h(4)$ have opposite signs. Since $h$ is continuous on $[3,4]$, the Intermediate Value Theorem guarantees that $h$ takes every value between $h(3)$ and $h(4)$, including $0$. Therefore, there is at least one $c\\in(3,4)$ such that\n$$\\boxed{h(c)=0}.$$\nBoth the sign change and continuity are required."}, {"question": "Lesson evidence; exact paper, iteration formula and marks unresolved. A numerical iteration starts from $x_1=3$ and its iterates approach $3.1589$. State the root estimate supported by this evidence and explain why no intermediate iterates should be calculated from the available information.", "answer": "The supported root estimate is\n$$\\boxed{x\\approx3.1589}.$$\nNo intermediate iterates can be calculated because the iteration formula is unavailable. Supplying a recurrence or additional terms would therefore require inventing information not present in the evidence."}, {"question": "In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find $f^{-1}(x)$, state its domain, and describe the geometric relationship between the curves $y=f(x)$ and $y=f^{-1}(x)$.", "answer": "Starting with\n$$y=\\frac{12}{x+1},$$\ninterchange $x$ and $y$:\n$$x=\\frac{12}{y+1}.$$\nThen\n$$x(y+1)=12,\\qquad y=\\frac{12}{x}-1.$$\nThus\n$$\\boxed{f^{-1}(x)=\\frac{12}{x}-1}.$$\nFor $x>0$, the range of $f$ is $0<f(x)<12$, so the inverse domain is\n$$\\boxed{0<x<12}.$$\nThe curves $y=f(x)$ and $y=f^{-1}(x)$ are reflections of each other in the line\n$$\\boxed{y=x}.$$"}, {"question": "In non-official function evidence with the paper and marks unresolved, $f(x)=\\dfrac{12}{x+1}$ has domain $x>0$. Find all algebraic candidates satisfying $f(x)=x$, then apply the domain restriction to identify the valid fixed point.", "answer": "Solve\n$$\\frac{12}{x+1}=x.$$\nThen\n$$12=x(x+1),$$\nso\n$$x^2+x-12=0.$$\nFactorising,\n$$(x-3)(x+4)=0,$$\ngiving the algebraic candidates\n$$x=3\\quad\\text{or}\\quad x=-4.$$\nSince the domain is $x>0$, reject $-4$. The valid fixed point is\n$$\\boxed{x=3}.$$"}, {"question": "Lesson evidence; paper and marks unresolved. Prove\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\nusing\n$$\\sin(2x+x)=\\sin 2x\\cos x+\\cos 2x\\sin x,$$\n$$\\sin 2x=2\\sin x\\cos x,\\qquad \\cos 2x=1-2\\sin^2x,$$\nand\n$$\\sin^2x+\\cos^2x=1.$$", "answer": "Begin with\n$$\\sin(3x)=\\sin(2x+x)\n=\\sin 2x\\cos x+\\cos 2x\\sin x.$$\nSubstitute the double-angle identities:\n$$\\sin(3x)=2\\sin x\\cos^2x+(1-2\\sin^2x)\\sin x.$$\nUsing $\\cos^2x=1-\\sin^2x$,\n$$\\sin(3x)=2\\sin x(1-\\sin^2x)+\\sin x-2\\sin^3x.$$\nTherefore,\n$$\\sin(3x)=2\\sin x-2\\sin^3x+\\sin x-2\\sin^3x,$$\nso\n$$\\boxed{\\sin(3x)=3\\sin x-4\\sin^3x}.$$"}, {"question": "Lesson evidence T2; paper and marks unresolved, status DEFERRED / UNFINISHED. Using only\n$$\\sin(3x)=3\\sin x-4\\sin^3x,$$\nrearrange for $\\sin^3x$ and identify the suggested constant factor for a possible integration step. The exact integrand, limits and completed antiderivative are unavailable and must not be reconstructed.", "answer": "**DEFERRED / UNFINISHED.**\n\nRearranging\n$$\\sin(3x)=3\\sin x-4\\sin^3x$$\ngives\n$$4\\sin^3x=3\\sin x-\\sin(3x),$$\nso\n$$\\boxed{\\sin^3x=\\frac{3\\sin x-\\sin(3x)}{4}}.$$\nThe suggested constant factor is therefore\n$$\\boxed{\\frac14}.$$\nBecause the exact integrand and limits are unavailable, no completed integral or antiderivative can be supplied."}];let order=[...DATA.keys()];const chosen=new Set();const box=document.getElementById('cards');const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const fmt=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
function draw(){box.innerHTML=order.map((ix,n)=>{const c=DATA[ix];return `<article class="card"><div class="cardhead"><input class="pick" type="checkbox" aria-label="Select card ${n+1}" data-i="${ix}" ${chosen.has(ix)?'checked':''}><div class="q"><div class="num">CARD ${n+1}</div>${fmt(c.question)}</div></div><div class="answer" id="a-${ix}" hidden>${fmt(c.answer)}</div><div class="cardtools"><button class="toggle" aria-controls="a-${ix}" aria-expanded="false">Show answer</button><button class="copy" data-i="${ix}">Copy</button></div></article>`}).join('');document.getElementById('count').textContent=`${chosen.size} selected · ${DATA.length} total`;if(window.MathJax&&typeof MathJax.typesetPromise==='function') MathJax.typesetPromise([box]);}
function toast(s){const t=document.getElementById('toast');t.textContent=s;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1300)}
document.addEventListener('change',e=>{if(!e.target.matches('.pick'))return;const i=+e.target.dataset.i;e.target.checked?chosen.add(i):chosen.delete(i);document.getElementById('count').textContent=`${chosen.size} selected · ${DATA.length} total`;});
document.addEventListener('click',async e=>{if(e.target.matches('.toggle')){const a=document.getElementById(e.target.getAttribute('aria-controls'));const show=a.hidden;a.hidden=!show;e.target.textContent=show?'Hide answer':'Show answer';e.target.setAttribute('aria-expanded',String(show));if(show&&window.MathJax&&typeof MathJax.typesetPromise==='function')await MathJax.typesetPromise([a]);}if(e.target.matches('.copy')){const c=DATA[+e.target.dataset.i];try{await navigator.clipboard.writeText('Q: '+c.question+'\n\nA: '+c.answer);toast('Copied')}catch{toast('Copy unavailable')}}});
document.getElementById('reveal').onclick=()=>document.querySelectorAll('.toggle').forEach(b=>{if(b.textContent==='Show answer')b.click()});document.getElementById('hide').onclick=()=>document.querySelectorAll('.toggle').forEach(b=>{if(b.textContent==='Hide answer')b.click()});document.getElementById('select').onclick=()=>{DATA.forEach((_,i)=>chosen.add(i));draw()};document.getElementById('none').onclick=()=>{chosen.clear();draw()};document.getElementById('shuffle').onclick=()=>{for(let i=order.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}draw();toast('Shuffled')};draw();
</script></body></html>
