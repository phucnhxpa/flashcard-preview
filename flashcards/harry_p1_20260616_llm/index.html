<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pure P1 May 2022 — Flashcards</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230071e3'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='54' fill='white'%3EF%3C/text%3E%3C/svg%3E"><script>window.MathJax={tex:{inlineMath:[['$','$']],displayMath:[['$$','$$']]}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#f5f5f7;color:#1d1d1f;font:16px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif}.wrap{max-width:920px;margin:auto;padding:32px 18px 72px}header{text-align:center;margin:14px 0 24px}h1{font-size:32px;letter-spacing:-.6px;margin:0}.sub{color:#6e6e73;margin-top:5px}.controls{position:sticky;top:8px;z-index:5;background:#fff;padding:12px;border-radius:14px;box-shadow:0 1px 5px #0001;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}button{font:inherit;font-size:13px;font-weight:600;border:1px solid #d2d2d7;background:#fff;padding:8px 11px;border-radius:9px;color:#1d1d1f;cursor:pointer}button.primary{background:#0071e3;color:white;border-color:#0071e3}.count{margin-left:auto;color:#6e6e73;padding:7px}.card{background:#fff;border-radius:14px;padding:18px;margin:11px 0;box-shadow:0 1px 4px #0000000d}.top{display:flex;gap:12px}.select{margin-top:5px;width:18px;height:18px;accent-color:#0071e3}.question{font-weight:650;flex:1}.toggle{margin-top:12px}.answer{border-top:1px solid #e8e8ed;margin-top:12px;padding-top:12px;color:#424245}.copy{font-size:12px;margin-top:10px}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:9px 14px;border-radius:10px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:600px){.wrap{padding:18px 12px 55px}h1{font-size:25px}.controls{gap:6px}.count{width:100%;margin-left:0}.card{padding:15px}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}}</style></head><body><main class="wrap"><header><h1>Pure P1 · May 2022</h1><div class="sub">Standalone revision flashcards</div></header><div class="controls"><button class="primary" onclick="all(true)">Select all</button><button onclick="all(false)">Deselect all</button><button onclick="reveal(true)">Reveal all</button><button onclick="reveal(false)">Hide all</button><button onclick="shuffle()">Shuffle</button><button onclick="copyTable()">Copy selection</button><span id="count" class="count"></span></div><section id="cards"></section></main><div class="toast"></div><script>const DATA=[{"question": "Evaluate $\\displaystyle\\int\\left(10x^5+6x^3-\\frac{3}{x^2}\\right)\\,dx$.", "answer": "$\\displaystyle\\frac53x^6+\\frac32x^4+\\frac3x+C$. Rewrite $-3/x^2$ as $-3x^{-2}$; integration adds one to the power and divides by the new power, so $-3x^{-2}\\mapsto+3x^{-1}$. This was reviewed and corrected live."}, {"question": "In triangle $ABC$, $AB=21$, $BC=13$ and $\\angle BAC=25^\\circ$. The angle $x=\\angle ACB$ is obtuse. Find $\\sin x$ to $4$ d.p. and then $x$.", "answer": "By the sine rule, $\\sin x=\\dfrac{21\\sin25^\\circ}{13}=0.6827$ (4 d.p.). The acute inverse-sine value is $43.05^\\circ$, so the required obtuse angle is $x=180^\\circ-43.05^\\circ=136.95^\\circ$. Keep the 4-d.p. value; do not round it prematurely."}, {"question": "Simplify $\\displaystyle\\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}$. What is the review status for this surds item?", "answer": "$\\sqrt{180}=6\\sqrt5$ and $\\sqrt{80}=4\\sqrt5$, hence the expression is $2$. The simplification was touched briefly; it was not a logged lost-mark review and its exact lesson score is unknown."}, {"question": "Rationalise $\\displaystyle\\frac{4\\sqrt5-5}{7-3\\sqrt5}$.", "answer": "Multiply by $\\dfrac{7+3\\sqrt5}{7+3\\sqrt5}$. The denominator is $49-45=4$ and the numerator is $(4\\sqrt5-5)(7+3\\sqrt5)=25+13\\sqrt5$. Therefore the result is $\\displaystyle\\frac{25+13\\sqrt5}{4}=\\frac{25}{4}+\\frac{13}{4}\\sqrt5$."}, {"question": "Given $y=f(x)$ has minimum $(-1,0)$, maximum $(\\tfrac32,2)$ and horizontal asymptote $y=1$, state the key features of $y=f(x)-2$.", "answer": "Translate every $y$-coordinate down by $2$: minimum $(-1,-2)$, maximum $(\\tfrac32,0)$, and asymptote $y=-1."}, {"question": "For the same function, state the key features of $y=f(-x)$ and explain what happens to $y=1$.", "answer": "Reflect in the $y$-axis: minimum $(1,0)$, maximum $(-\\tfrac32,2)$, and the horizontal asymptote remains $y=1$. A $y$-axis reflection changes $x$, not $y."}, {"question": "Reference-only; not reviewed live; score unknown. State the correct completed-square form recorded for Q5 and the specific legacy transcription trap.", "answer": "Reference-only; not reviewed live; score unknown. The recorded correct form is $12-\\tfrac43(x+2)^2$. The legacy trap was dropping the factor \\tfrac43 and writing $12-(x+2)^2$, which is not equivalent. No live Q5 solution or score is asserted."}, {"question": "A simultaneous-equations problem reduces to $2x^4-15x^2-50=0$. Solve it exactly. This was extra teaching live, not a logged lost-mark review.", "answer": "Let $u=x^2$. Then $2u^2-15u-50=(2u+5)(u-10)=0$. Reject $u=-\\tfrac52$ because $u=x^2\\ge0$; $u=10$ gives $x=\\pm\\sqrt{10}$. Back-substitution gives $(\\sqrt{10},4\\sqrt{10})$ and $(-\\sqrt{10},-4\\sqrt{10})$. It was solved live as extra teaching, not a logged loss."}, {"question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ and $f''(4)=0$, find $A$.", "answer": "$f''(x)=-x^{-3/2}-2Ax^{-3}$. At $x=4$: $-\\tfrac18-\\tfrac{A}{32}=0$, so $A=-4$. Valid differentiation and algebra are required; a correct number from invalid working does not earn the method marks."}, {"question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$ and $f(12)=8\\sqrt3$, find $f(x)$.", "answer": "Integrate: $f(x)=4\\sqrt{x}+\\dfrac4x+3x+C$. Using $f(12)=8\\sqrt3$ gives $C=-\\dfrac{109}{3}$, hence $\\displaystyle f(x)=4\\sqrt{x}+\\frac4x+3x-\\frac{109}{3}$. Keep the constant exact."}, {"question": "Reference-only; not reviewed live; score unknown. Q8 was printed but not solved live. State its official reference results.", "answer": "Reference-only; not reviewed live; score unknown. Q8 was printed but not solved live. Official reference results: $\\theta=\\tfrac53$, arc $CD=35.9\\text{ cm}$, perimeter $=603\\text{ cm}$, and area $\\approx4730\\text{ cm}^2=0.473\\text{ m}^2$. These are reference values, not a reconstructed live solution."}, {"question": "For $y=\\sin2x$, state the horizontal transformation and period. If $\\sin\\alpha=p$, $0<\\alpha<90^\\circ$, solve $\\sin2x=p$ for $0\\le x\\le90^\\circ$.", "answer": "$y=\\sin2x$ is a horizontal scale factor $\\tfrac12$ (compression), so its period is $180^\\circ$. The roots are $x=\\tfrac\\alpha2$ and $x=90^\\circ-\\tfrac\\alpha2$. This was re-taught live."}, {"question": "Reference-only; not reviewed live; score unknown. Q10 was printed but not solved live. State its official reference outputs.", "answer": "Reference-only; not reviewed live; score unknown. Q10 was printed but not solved live. Official reference outputs are $\\dfrac{dy}{dx}=\\tfrac67x^2+\\tfrac27x-\\tfrac52$, $12x^2+4x-33=0$, $x=\\tfrac32$, and $k=\\tfrac54$. These are reference values, not a reconstructed live solution."}, {"question": "What is the evidence-led status of the legacy total $29/75$?", "answer": "It is an unreconciled, provisional guide-claim, not an established score. It was not confirmed by audio or a verified frame and does not match the best-available breakdown (about $32/75$ with an unresolved delta). Never present $29/75$ as reconciled."}, {"question": "Which paper is this review about, and which questions were reviewed live?", "answer": "Pearson Edexcel IAL Pure Mathematics P1, WMA11/01, Summer 2022 (P69458A), 75 marks over Q1–Q10. Reviewed live: Q1, Q2, Q4, Q6 (extra teaching), Q7 and Q9; Q3 was touched briefly. Q5, Q8 and Q10 were not reviewed live."}];let order=[...DATA],chosen=new Set(DATA.map(x=>x.question));const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};function fmt(s){return esc(s).replace(/\n/g,'<br>')}function draw(){const list=document.querySelector('#cards');list.innerHTML='';document.querySelector('#count').textContent=chosen.size+' selected · '+DATA.length+' cards';order.forEach((c,i)=>{let a=document.createElement('article');a.className='card';a.innerHTML=`<div class="top"><input class="select" type="checkbox" aria-label="Select card ${i+1}" ${chosen.has(c.question)?'checked':''}><div class="question">${fmt(c.question)}</div></div><button class="toggle" aria-expanded="false" aria-controls="ans-${i}">Reveal answer</button><div class="answer" id="ans-${i}" hidden>${fmt(c.answer)}<br><button class="copy">Copy card</button></div>`;let cb=a.querySelector('.select');cb.onchange=()=>{cb.checked?chosen.add(c.question):chosen.delete(c.question);draw()};let t=a.querySelector('.toggle'),ans=a.querySelector('.answer');const toggle=()=>{let open=ans.hidden;ans.hidden=!open;t.setAttribute('aria-expanded',String(open));t.textContent=open?'Hide answer':'Reveal answer';typeset(a)};t.onclick=toggle;t.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}};a.querySelector('.copy').onclick=()=>navigator.clipboard.writeText(c.question+'\n\n'+c.answer).then(()=>toast('Copied')).catch(()=>toast('Clipboard unavailable'));list.append(a)});typeset(list)}function typeset(x){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([x])}function all(v){if(v)DATA.forEach(c=>chosen.add(c.question));else chosen.clear();draw()}function reveal(v){document.querySelectorAll('.toggle').forEach(b=>{let a=document.getElementById(b.getAttribute('aria-controls'));if(a.hidden===v)b.click()})}function shuffle(){for(let i=order.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}draw()}function copyTable(){let s=[...chosen].map(q=>{let c=DATA.find(x=>x.question===q);return c.question+'\t'+c.answer}).join('\n');navigator.clipboard.writeText(s).then(()=>toast('Selection copied')).catch(()=>toast('Clipboard unavailable'))}function toast(s){let t=document.querySelector('.toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}draw();</script></body></html>
