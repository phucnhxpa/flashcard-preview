-4\\pm\\sqrt{1600}}{24}\n=\\frac{-4\\pm40}{24}.\n\\]\nThus\n\\[\nx=\\frac32\\quad\\text{or}\\quad x=-\\frac{11}{6}.\n\\]\nThe official Q10 value selected is\n\\[\nx=\\frac32.\n\\]\nQ10 was printed but not solved live.", "source": "GPT-5.6 Sol ②"}, {"id": "186", "question": "Reference-only; not reviewed live; score unknown. State the official sequence of reference results for Q10, concerning the normal to a curve and the value of $k$.", "answer": "Reference-only; not reviewed live; score unknown. The official reference results are\n\\[\n\\frac{dy}{dx}=\\frac67x^2+\\frac27x-\\frac52,\n\\]\n\\[\n12x^2+4x-33=0,\n\\]\n\\[\nx=\\frac32,\n\\]\nand\n\\[\nk=54.\n\\]\nQ10 was printed but not solved live.", "source": "GPT-5.6 Sol ②"}, {"id": "187", "question": "What is the correct evidence-led position on the legacy total $29/75$ for this paper?", "answer": "The legacy $29/75$ is provisional and unreconciled only; it must not be described as reconciled. The best-available per-question breakdown sums to approximately\n\\[\n\\frac{32}{75},\n\\]\nwith a declared unresolved difference of at least $3$ marks. The scored states of Q8 and Q10 are unknown, and Q3’s exact score is unavailable.", "source": "GPT-5.6 Sol ②"}, {"id": "188", "question": "Using the provisional reviewed losses Q1 $(-3)$, Q2 $(-1)$, Q4 $(-3)$, Q7 $(-6)$ and Q9 $(-8)$, and assuming at most $22$ further marks are lost from Q8 and Q10, calculate the resulting best-available total out of $75$.", "answer": "The explained reviewed losses are\n\\[\n3+1+3+6+8=21.\n\\]\nIncluding at most $22$ marks from Q8 and Q10 gives\n\\[\n21+22=43\n\\]\nmarks lost, so the resulting total is\n\\[\n75-43=32.\n\\]\nThus the best-available breakdown gives approximately $32/75$, with an unresolved delta; the legacy $29/75$ remains provisional and unreconciled only.", "source": "GPT-5.6 Sol ②"}]}}, "judge": [{"id": "127", "question": "Reference-only; not reviewed live; score unknown. The sector/arc problem on this paper has official answers: (a) $\\theta=\\tfrac{5}{3}$ rad, arc $CD=35.9$ cm; (b) perimeter $=603$ cm; (c) area $\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$. State these three official results.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\theta=\\tfrac{5}{3}$ rad, arc $CD=35.9$ cm. (b) Perimeter $=603$ cm. (c) Area $\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$.", "source": "MiniMax ②"}, {"id": "176", "question": "Reference-only; not reviewed live; score unknown. What is the official reference equation of the line $\\ell_2$ in Q5?", "answer": "Reference-only; not reviewed live; score unknown. The official reference equation is\n\\[\n\\ell_2:\\quad y=-\\frac54x-\\frac{25}{4}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "87", "question": "What is the evidence status of WMA11/01 Summer 2022 Q3 (Surds) in the review lesson?", "answer": "Q3 was touched briefly but was not a logged lost-mark review. Its exact score is [UNAVAILABLE]. While the guide claims it was \"essentially full,\" no specific mark verification exists in the retained evidence.", "source": "Qwen ①"}, {"id": "86", "question": "Regarding the WMA11/01 Summer 2022 review score, is the legacy figure \"29/75\" a reconciled fact?", "answer": "No. The \"29/75\" total is a [GUIDE-CLAIM] only. It is unreconciled and provisional because it contradicts the per-question breakdown (which sums to $\\approx 32/75$) and lacks confirmation from audio or verified frames. It must not be cited as a factual score.", "source": "Qwen ①"}, {"id": "1", "question": "What is the status of the legacy \"29/75\" total and the best-available estimated score for this paper?", "answer": "The legacy \"29/75\" is unreconciled/provisional, not a fact. The best-available estimated score is $\\approx 32/75$ with a declared $\\geq 3$-mark unresolved delta.", "source": "GLM 5.1 ①"}, {"id": "72", "question": "When solving a sine rule ambiguous case where two angles are mathematically possible, how do you determine whether to select the acute or obtuse solution?", "answer": "Calculate the acute angle $\\theta = \\arcsin(\\text{value})$. Check the geometric constraints of the triangle (e.g., sum of angles, side lengths). If the configuration forces an obtuse angle, use $180^\\circ - \\theta$. Always retain full calculator precision for intermediate sine values to preserve accuracy marks.", "source": "Qwen ①"}, {"id": "6", "question": "Simplify $\\frac{\\sqrt{180} - \\sqrt{80}}{\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "(Note: Q3 was touched briefly; exact score unavailable.) $\\frac{6\\sqrt{5} - 4\\sqrt{5}}{\\sqrt{5}} = \\frac{2\\sqrt{5}}{\\sqrt{5}} = 2$.", "source": "GLM 5.1 ①"}, {"id": "133", "question": "Explain why a correct final answer obtained from invalid working scores 0 marks under Edexcel P1 marking.", "answer": "Marks are awarded for method, not just the answer. Each mark is tied to a specific reasoning step (M marks) or accuracy of follow-through (A marks). If the working that produces a value is invalid, the dependent marks are not earned even if the number happens to be right.", "source": "MiniMax ②"}, {"id": "147", "question": "In a triangle, $AB=21$, $BC=13$, and $\\angle BAC=25^\\circ$. The angle $x$ opposite the side of length $21$ is obtuse. Find $\\sin x$ to $4$ decimal places and hence find $x$.", "answer": "By the sine rule,\n\\[\n\\frac{\\sin x}{21}=\\frac{\\sin25^\\circ}{13},\n\\qquad\n\\sin x=\\frac{21\\sin25^\\circ}{13}=0.6827\\quad(4\\text{ d.p.}).\n\\]\nThe acute calculator value is $\\arcsin(0.6827)$, but $x$ is obtuse, so\n\\[\nx=180^\\circ-\\arcsin(0.6827)=136.95^\\circ.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "91", "question": "What specific limitation applies to the \"visual-lead\" evidence tier regarding the WMA11/01 Summer 2022 review board content?", "answer": "Visual-lead data is derived from automated reads of on-screen content without frame-level verification. It is demonstrably error-prone regarding exact strings and timestamps. It serves only as a lead and never as source authority; official QP/MS and audio transcripts take precedence.", "source": "Qwen ①"}, {"id": "46", "question": "When integrating a term $kx^n$, what is the rule for the new power and coefficient, and what common error does this correct?", "answer": "Add one to the power ($n \\to n+1$), then divide by the new power ($k \\to \\frac{k}{n+1}$). This corrects the error of differentiating (multiplying by $n$ and subtracting 1 from the power) instead of integrating.", "source": "GLM 5.1 ③"}, {"id": "141", "question": "State the lesson-reviewed correction for Q2's sine-rule accuracy loss.", "answer": "Carry full 4-decimal-place accuracy through the sine rule: $\\sin x=\\dfrac{21\\sin 25^\\circ}{13}=0.6827$ (not $0.6830$). The sine rule always offers two angles, $\\theta$ and $180^\\circ-\\theta$; pick the one the triangle configuration requires (here, obtuse: $136.95^\\circ$).", "source": "MiniMax ②"}, {"id": "67", "question": "What is the scored state and review status of Q5, Q8, and Q10 from this lesson?", "answer": "Q5, Q8, and Q10 were NOT reviewed live. Their scored state is unknown and must not be assumed. Any cards about their exact official reference material must note: \"Reference-only; not reviewed live; score unknown.\"", "source": "GLM 5.1 ③"}, {"id": "89", "question": "Why can no verbatim tutor quotes be confirmed from the WMA11/01 Summer 2022 review audio transcript?", "answer": "The audio recording is one-sided, capturing only the student's microphone. The tutor's speech is largely inaudible. Any tutor coaching is inferred from student responses or visual board annotations, not direct audio transcription.", "source": "Qwen ①"}, {"id": "97", "question": "Given $y=f(x)$ with minimum $P(-1,0)$, maximum $Q(\\tfrac{2}{3},2)$, asymptote $y=1$, sketch (i) $y=f(x)-2$ and (ii) $y=f(-x)$. State key points and asymptotes.", "answer": "(i) Shift down 2: min $(-1,-2)$, max $(\\tfrac{2}{3},0)$, asymptote $y=-1$. (ii) Reflection in $y$-axis: min $(1,0)$, max $(-\\tfrac{2}{3},2)$, asymptote $y=1$ unchanged (horizontal asymptotes are unaffected by $x\\to -x$).", "source": "MiniMax ①"}, {"id": "142", "question": "State the lesson-reviewed correction for Q4's transformation error on $y=f(-x)$.", "answer": "$y=f(-x)$ is a reflection in the $y$-axis: $x\\to -x$, $y$ unchanged. Coordinates: min becomes $(1,0)$, max becomes $\\!\\left(-\\tfrac{2}{3},2\\right)$; the horizontal asymptote $y=1$ is unchanged. Correct coordinates alone do not score — the sketched shape and asymptote must also be correct.", "source": "MiniMax ②"}, {"id": "93", "question": "In the context of the WMA11/01 Summer 2022 review, what does the evidence tier [UNAVAILABLE] signify regarding Q8 and Q10?", "answer": "[UNAVAILABLE] signifies that these questions were genuinely not present in any retained lesson artifact (audio or verified video). Although printed on a worksheet, they were not reviewed live. Their scored state is unknown and must not be inferred as blank or attempted based on absence.", "source": "Qwen ①"}, {"id": "77", "question": "In the review of WMA11/01 Summer 2022 Q6, what strategic advice was given regarding variable selection when solving simultaneous equations reducing to a quartic?", "answer": "\"Take a step back\" to choose the most convenient variable to make the subject before substitution. Choosing the wrong variable can complicate the algebra significantly. The lesson emphasized this strategic pause over immediate manipulation.", "source": "Qwen ①"}, {"id": "44", "question": "Given $\\frac{dy}{dx} = \\frac{6}{7}x^2 + \\frac{2}{7}x - \\frac{5}{2}$, what is the value of $\\frac{dy}{dx}$ at $x = \\frac{3}{2}$? Reference-only; not reviewed live; score unknown.", "answer": "$\\frac{dy}{dx} = \\frac{6}{7}\\left(\\frac{9}{4}\\right) + \\frac{2}{7}\\left(\\frac{3}{2}\\right) - \\frac{5}{2} = \\frac{27}{14} + \\frac{3}{7} - \\frac{5}{2} = \\frac{27}{14} + \\frac{6}{14} - \\frac{35}{14} = -\\frac{1}{7}$. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ②"}, {"id": "12", "question": "Solve the simultaneous equations from Q6 yielding the quartic $2x^4 - 15x^2 - 50 = 0$. Give the exact solution pairs. (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "(Note: Q6 was solved live as extra teaching, not a logged lost-mark review.) Factorise: $(2x^2+5)(x^2-10)=0$. Reject $x^2 = -5/2$. Use $x^2 = 10 \\implies x = \\pm\\sqrt{10}$. Back-substitute to get pairs $(\\sqrt{10}, 4\\sqrt{10})$ and $(-\\sqrt{10}, -4\\sqrt{10})$.", "source": "GLM 5.1 ①"}, {"id": "113", "question": "State the paper identity for this sitting: qualification, unit code, paper code, sitting, total marks, and number of questions.", "answer": "Pearson Edexcel IAL Pure Mathematics P1, unit WMA11, paper code WMA11/01, question-paper code P69458A, Summer 2022 sitting, 75 marks across 10 questions (Q1–Q10) with mark split $4+5+5+6+9+7+9+10+8+12$.", "source": "MiniMax ①"}, {"id": "109", "question": "In Q7 part (a), why does a correct value of $A$ obtained from invalid working score zero?", "answer": "Edexcel mark schemes require the method to justify the answer. A right number from wrong or missing working earns 0 marks for that part — the method marks are independent of the answer mark, and without valid method there is nothing to award.", "source": "MiniMax ①"}, {"id": "88", "question": "Simplify $\\frac{9^{2n+1} \\cdot 3^{4-3n}}{27^{n-1}}$ as a single power of 3, noting this is a supplementary ESAT warm-up and not a paper question.", "answer": "Convert to base 3: $\\frac{(3^2)^{2n+1} \\cdot 3^{4-3n}}{(3^3)^{n-1}} = \\frac{3^{4n+2} \\cdot 3^{4-3n}}{3^{3n-3}} = 3^{(4n+2)+(4-3n)-(3n-3)} = 3^{9-2n}$. Note: This is a supplementary warm-up item, not part of the WMA11 Summer 2022 exam paper.", "source": "Qwen ①"}, {"id": "106", "question": "Why must full 4-d.p. accuracy be carried through the sine rule calculation in Q2?", "answer": "The mark scheme awards an accuracy mark for $\\sin x=0.6827$ (4 d.p.). Rounding early to $0.6830$ loses this mark and propagates a small error into the final angle ($136.93°$ vs $136.95°$), risking a second accuracy mark.", "source": "MiniMax ①"}, {"id": "167", "question": "Evaluate $\\displaystyle \\int \\left(10x^5+6x^3-\\frac{3}{x^2}\\right)\\,dx$.", "answer": "Rewrite $\\displaystyle -\\frac{3}{x^2}=-3x^{-2}$. Then\n\\[\n\\int(10x^5+6x^3-3x^{-2})\\,dx\n=\\frac{10}{6}x^6+\\frac{6}{4}x^4+\\frac{-3}{-1}x^{-1}+C\n=\\frac53x^6+\\frac32x^4+\\frac3x+C.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "181", "question": "Why can a correct final value receive no marks if it follows from invalid algebra or calculus?", "answer": "A final value must be justified by valid mathematical working. If the method contains invalid steps that do not logically imply the answer, the correct value is unsupported and may score $0$. For example, finding $A=-4$ from $f''(4)=0$ requires correctly differentiating fractional and negative powers before substituting $x=4$.", "source": "GPT-5.6 Sol ②"}, {"id": "177", "question": "Solve the quartic equation $2x^4-15x^2-50=0$, showing the hidden-quadratic method.", "answer": "Let $u=x^2$. Then\n\\[\n2u^2-15u-50=0=(2u+5)(u-10).\n\\]\nThus\n\\[\nu=-\\frac52\\quad\\text{or}\\quad u=10.\n\\]\nSince $u=x^2\\ge0$ for real $x$, reject $u=-\\frac52$. Therefore\n\\[\nx^2=10\\implies x=\\pm\\sqrt{10}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "158", "question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ and $f''(4)=0$, find $A$.", "answer": "Differentiate:\n\\[\nf''(x)=-x^{-3/2}-2Ax^{-3}.\n\\]\nUsing $f''(4)=0$,\n\\[\n-4^{-3/2}-2A(4^{-3})=0.\n\\]\nSince $4^{-3/2}=\\frac18$ and $4^{-3}=\\frac1{64}$,\n\\[\n-\\frac18-\\frac{A}{32}=0.\n\\]\nMultiplying by $32$ gives $-4-A=0$, so\n\\[\nA=-4.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "185", "question": "Reference-only; not reviewed live; score unknown. Solve $12x^2+4x-33=0$ and identify the official Q10 value of $x$.", "answer": "Reference-only; not reviewed live; score unknown. Using the quadratic formula,\n\\[\nx=\\frac{-4\\pm\\sqrt{4^2-4(12)(-33)}}{24}\n=\\frac{-4\\pm\\sqrt{1600}}{24}\n=\\frac{-4\\pm40}{24}.\n\\]\nThus\n\\[\nx=\\frac32\\quad\\text{or}\\quad x=-\\frac{11}{6}.\n\\]\nThe official Q10 value selected is\n\\[\nx=\\frac32.\n\\]\nQ10 was printed but not solved live.", "source": "GPT-5.6 Sol ②"}, {"id": "32", "question": "When sketching $y = f(-x)$, why is it an error to change a horizontal asymptote $y = 1$ to $y = -1$?", "answer": "$y = f(-x)$ reflects the graph horizontally (in the $y$-axis). A horizontal asymptote depends on $y$ as $x \\to \\pm\\infty$, so it is unaffected by a horizontal reflection.", "source": "GLM 5.1 ②"}, {"id": "29", "question": "Rationalise the denominator of $\\frac{4\\sqrt{5} - 5}{7 - 3\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "Multiply by conjugate $7 + 3\\sqrt{5}$: $\\frac{(4\\sqrt{5} - 5)(7 + 3\\sqrt{5})}{49 - 45} = \\frac{28\\sqrt{5} + 60 - 35 - 15\\sqrt{5}}{4} = \\frac{25 + 13\\sqrt{5}}{4} = \\frac{25}{4} + \\frac{13\\sqrt{5}}{4}$.", "source": "GLM 5.1 ②"}, {"id": "71", "question": "For WMA11/01 Summer 2022 Q2, given triangle $ABC$ with $AB=21$, $BC=13$, and $\\angle BAC = 25^\\circ$, calculate $\\sin x$ to 4 decimal places and find the obtuse angle $x$.", "answer": "Using the sine rule: $\\sin x = \\frac{21 \\sin 25^\\circ}{13} \\approx 0.6827$ (4 d.p.). Since $x$ is obtuse, $x = 180^\\circ - \\arcsin(0.6827) = 136.95^\\circ$. Rounding $\\sin x$ to 0.6830 prematurely leads to an incorrect angle and loss of accuracy marks.", "source": "Qwen ①"}, {"id": "187", "question": "What is the correct evidence-led position on the legacy total $29/75$ for this paper?", "answer": "The legacy $29/75$ is provisional and unreconciled only; it must not be described as reconciled. The best-available per-question breakdown sums to approximately\n\\[\n\\frac{32}{75},\n\\]\nwith a declared unresolved difference of at least $3$ marks. The scored states of Q8 and Q10 are unknown, and Q3’s exact score is unavailable.", "source": "GPT-5.6 Sol ②"}, {"id": "16", "question": "In the Q8 sector/arc problem, what is the value of the angle $\\theta$ and the arc length $CD$? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) $\\theta = \\frac{5}{3}$ radians; arc $CD = 35.9$ cm.", "source": "GLM 5.1 ①"}, {"id": "119", "question": "State the key takeaway from Q9's trig error.", "answer": "$y=\\sin 2x$: multiply $x$ by 2 inside $\\Rightarrow$ horizontal stretch by factor $\\tfrac{1}{2}$ $\\Rightarrow$ period $180°$. Once you have one solution $x=\\tfrac{\\alpha}{2}$, use the graph's symmetry about $x=45°$ to get the partner $x=90°-\\tfrac{\\alpha}{2}$ in range.", "source": "MiniMax ①"}, {"id": "81", "question": "Reference-only; not reviewed live; score unknown. State the reference answers for WMA11/01 Summer 2022 Q8(b) perimeter and Q8(c) area.", "answer": "Reference-only; not reviewed live; score unknown. Official references: (b) Perimeter $= 603$ cm; (c) Area $\\approx 4730 \\text{ cm}^2$ (or $0.473 \\text{ m}^2$). These values are from the mark scheme only; no live verification or student attempt exists in the lesson evidence.", "source": "Qwen ①"}, {"id": "131", "question": "Why does a horizontal asymptote $y=1$ stay at $y=1$ under the transformation $y=f(-x)$?", "answer": "$y=f(-x)$ replaces $x$ with $-x$ only; $y$-values are unchanged. As $x\\to\\pm\\infty$, $f(-x)\\to 1$, so the asymptote $y=1$ is preserved. Horizontal asymptotes depend on $y$, not on $x$.", "source": "MiniMax ②"}, {"id": "180", "question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$ and $f(12)=8\\sqrt3$, find $f(x)$ exactly.", "answer": "Integrating,\n\\[\nf(x)=4x^{1/2}+4x^{-1}+3x+C\n=4\\sqrt{x}+\\frac4x+3x+C.\n\\]\nNow\n\\[\nf(12)=4\\sqrt{12}+\\frac4{12}+36+C\n=8\\sqrt3+\\frac13+36+C.\n\\]\nSince $f(12)=8\\sqrt3$,\n\\[\nC=-36-\\frac13=-\\frac{109}{3}.\n\\]\nTherefore\n\\[\nf(x)=4\\sqrt{x}+\\frac4x+3x-\\frac{109}{3}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "130", "question": "State the rule for integrating a power $x^n$, including the case $n=-1$.", "answer": "$\\displaystyle\\int x^n\\,dx=\\dfrac{x^{n+1}}{n+1}+c$ for $n\\neq -1$. Equivalently: add 1 to the power, then divide by the new power. For $n=-1$: $\\displaystyle\\int \\dfrac{1}{x}dx=\\ln|x|+c$.", "source": "MiniMax ②"}, {"id": "36", "question": "When solving simultaneous equations where one equation is linear and one is quadratic, what is a useful strategic step before substituting? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "Step back to see which variable to make the subject of the linear equation. Choosing the more convenient variable to isolate minimises algebraic complexity and reduces errors.", "source": "GLM 5.1 ②"}, {"id": "11", "question": "How do you solve a quartic equation like $2x^4 - 15x^2 - 50 = 0$ algebraically? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "(Note: Q6 was solved live as extra teaching, not a logged lost-mark review.) Substitute $u = x^2$ to form a quadratic $2u^2 - 15u - 50 = 0$. Factorise, reject any $u < 0$ (since $x^2 \\ge 0$), then take square roots for exact surd $x$ values. Show all working; calculator-only solutions are barred.", "source": "GLM 5.1 ①"}, {"id": "115", "question": "Which questions were reviewed live in this lesson, and which were not?", "answer": "Reviewed live: Q1, Q2, Q4, Q6 (as extra teaching), Q7, Q9. Q3 was touched briefly (exact score unavailable). Q5, Q8, Q10 were NOT reviewed live — their scored state is unknown and they are reference-only.", "source": "MiniMax ①"}, {"id": "175", "question": "Reference-only; not reviewed live; score unknown. Show that $\\displaystyle 12-\\frac34(x+2)^2$ is equivalent to $\\displaystyle -\\frac34(x-1)(x+5)$.", "answer": "Reference-only; not reviewed live; score unknown. Expanding the completed-square form,\n\\[\n12-\\frac34(x+2)^2\n=12-\\frac34(x^2+4x+4)\n=-\\frac34x^2-3x+9.\n\\]\nAlso,\n\\[\n-\\frac34(x-1)(x+5)\n=-\\frac34(x^2+4x-5)\n=-\\frac34x^2-3x+\\frac{15}{4}.\n\\]\nThese displayed forms are not algebraically equivalent, so the equality cannot be established as written from the frozen guide’s stated expressions.", "source": "GPT-5.6 Sol ②"}, {"id": "110", "question": "Explain the \"horizontal half-stretch\" that turns $y=\\sin x$ into $y=\\sin 2x$, and state the new period.", "answer": "Replacing $x$ by $2x$ inside the function compresses the graph horizontally by factor $\\tfrac{1}{2}$: every $x$-coordinate is halved. The original period $360°$ becomes $180°$. Amplitude and $y$-values are unchanged.", "source": "MiniMax ①"}, {"id": "30", "question": "Given $y = f(x)$ has minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$ and asymptote $y = 1$, state the coordinates and asymptote for $y = f(x) - 2$.", "answer": "Shift down by 2. Minimum: $(-1, -2)$. Maximum: $(\\frac{2}{3}, 0)$. Asymptote: $y = -1$.", "source": "GLM 5.1 ②"}, {"id": "129", "question": "Reference-only; not reviewed live; score unknown. The normal-to-a-curve question on this paper has official answers: (a) $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$; (b) $12x^2+4x-33=0$; (c) $x=\\tfrac{3}{2}$; (d) $k=\\tfrac{5}{4}$. State these four official results.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$. (b) $12x^2+4x-33=0$. (c) $x=\\tfrac{3}{2}$. (d) $k=\\tfrac{5}{4}$.", "source": "MiniMax ②"}, {"id": "164", "question": "State the key intercepts and turning points of $y=\\sin2x$ for $0^\\circ\\le x\\le360^\\circ$.", "answer": "The zeros satisfy $2x=0^\\circ,180^\\circ,360^\\circ,540^\\circ,720^\\circ$, so\n\\[\nx=0^\\circ,90^\\circ,180^\\circ,270^\\circ,360^\\circ.\n\\]\nThe maxima occur when $2x=90^\\circ+360^\\circ k$, giving\n\\[\n(45^\\circ,1),\\qquad(225^\\circ,1).\n\\]\nThe minima occur when $2x=270^\\circ+360^\\circ k$, giving\n\\[\n(135^\\circ,-1),\\qquad(315^\\circ,-1).\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "137", "question": "Differentiate $f(x)=4\\sqrt{x}+\\dfrac{4}{x}+3x-\\dfrac{109}{3}$ and verify $f''(4)=0$ when $A=-4$.", "answer": "$f'(x)=2x^{-1/2}-4x^{-2}+3$. $f''(x)=-x^{-3/2}+8x^{-3}$. At $x=4$: $f''(4)=-4^{-3/2}+8\\cdot 4^{-3}=-\\tfrac{1}{8}+\\tfrac{8}{64}=-\\tfrac{1}{8}+\\tfrac{1}{8}=0$. ✓", "source": "MiniMax ②"}, {"id": "135", "question": "Given $\\sin\\alpha=p$ with $0<\\alpha<90^\\circ$, solve $\\sin 2x=p$ for $x\\in[0,180^\\circ]$.", "answer": "Set $2x=\\alpha$ giving $x=\\tfrac{\\alpha}{2}$. By symmetry of sine about $90^\\circ$, the partner is $2x=180^\\circ-\\alpha$, i.e. $x=90^\\circ-\\tfrac{\\alpha}{2}$. Solutions: $x=\\tfrac{\\alpha}{2}$ and $x=90^\\circ-\\tfrac{\\alpha}{2}$.", "source": "MiniMax ②"}, {"id": "65", "question": "To find the equation of the normal to a curve $y=f(x)$ at point $x=a$, what is the gradient of the normal? Reference-only; not reviewed live; score unknown.", "answer": "Gradient of normal $= -\\frac{1}{f'(a)}$ (the negative reciprocal of the tangent's gradient). Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ③"}, {"id": "153", "question": "Distinguish the transformations $y=f(x)-2$ and $y=f(-x)$, including their effects on a horizontal asymptote $y=a$.", "answer": "For\n\\[\ny=f(x)-2,\n\\]\nall $y$-coordinates decrease by $2$, so the graph shifts down and $y=a$ becomes $y=a-2$. For\n\\[\ny=f(-x),\n\\]\nall $x$-coordinates change sign while $y$-coordinates remain unchanged, so the graph reflects in the $y$-axis and the horizontal asymptote remains $y=a$.", "source": "GPT-5.6 Sol ①"}, {"id": "149", "question": "Simplify $\\displaystyle \\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}$.", "answer": "Since\n\\[\n\\sqrt{180}=6\\sqrt5,\\qquad \\sqrt{80}=4\\sqrt5,\n\\]\n\\[\n\\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}\n=\\frac{6\\sqrt5-4\\sqrt5}{\\sqrt5}\n=\\frac{2\\sqrt5}{\\sqrt5}=2.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "27", "question": "When using the sine rule to find an angle, why must you carry full calculator accuracy (e.g., 0.6827) rather than rounding early (e.g., to 0.6830)?", "answer": "An early rounding slip loses the accuracy mark. Rounding 0.6827 to 0.6830 before taking $\\arcsin$ yields $136.93^\\circ$, which differs from the correct $136.95^\\circ$.", "source": "GLM 5.1 ②"}, {"id": "104", "question": "State the rule for integrating a power $x^n$ ($n\\neq -1$), and explain the sign trap when integrating $-3x^{-2}$.", "answer": "$\\int x^n\\,dx=\\dfrac{x^{n+1}}{n+1}+c$ (add one to the power, divide by the new power). For $-3x^{-2}$: new power is $-1$, so $\\int -3x^{-2}\\,dx=\\dfrac{-3x^{-1}}{-1}+c=3x^{-1}+c=\\dfrac{3}{x}+c$. The two negatives cancel — the result is positive.", "source": "MiniMax ①"}, {"id": "154", "question": "Reference-only; not reviewed live; score unknown. Rewrite $\\displaystyle -\\frac34(x-1)(x+5)$ in completed-square form and expanded form.", "answer": "Reference-only; not reviewed live; score unknown. Expanding gives\n\\[\n-\\frac34(x-1)(x+5)\n=-\\frac34(x^2+4x-5)\n=-\\frac34x^2-3x+\\frac{15}{4}.\n\\]\nCompleting the square,\n\\[\n-\\frac34(x^2+4x-5)\n=-\\frac34\\bigl((x+2)^2-9\\bigr)\n=\\frac{27}{4}-\\frac34(x+2)^2.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "62", "question": "For a sector with radius $r$ and angle $\\theta$ in radians, state the formulas for arc length and area. Reference-only; not reviewed live; score unknown.", "answer": "Arc length $= r\\theta$. Area $= \\frac{1}{2}r^2\\theta$. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ③"}, {"id": "33", "question": "For Q5, the completed square form of a quadratic is $12 - \\frac{3}{4}(x+2)^2$. What is a common error when writing this form? Reference-only; not reviewed live; score unknown.", "answer": "Omitting the coefficient $\\frac{3}{4}$ and writing $12 - (x+2)^2$, which equals $-x^2 - 4x + 8$ and is incorrect. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ②"}, {"id": "159", "question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$, find the general form of $f(x)$.", "answer": "Integrate term by term:\n\\[\nf(x)=\\int\\left(2x^{-1/2}-4x^{-2}+3\\right)\\,dx.\n\\]\nTherefore\n\\[\nf(x)=4x^{1/2}+4x^{-1}+3x+C\n=4\\sqrt{x}+\\frac4x+3x+C.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "31", "question": "Given $y = f(x)$ has minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$ and asymptote $y = 1$, state the coordinates and asymptote for $y = f(-x)$.", "answer": "Reflection in the $y$-axis. Minimum: $(1, 0)$. Maximum: $(-\\frac{2}{3}, 2)$. Asymptote: $y = 1$ (horizontal asymptotes are unchanged by horizontal reflections).", "source": "GLM 5.1 ②"}, {"id": "140", "question": "State the lesson-reviewed correction for the Q1 integration slip, including the sign handling for $\\int -3x^{-2}dx$.", "answer": "Rewrite $\\dfrac{3}{x^2}=3x^{-2}$. Integrating: $\\int 3x^{-2}dx=\\dfrac{3x^{-1}}{-1}=-\\dfrac{3}{x}=\\dfrac{3}{x}\\cdot(-1)$. Equivalently $\\int -3x^{-2}dx=\\dfrac{-3x^{-1}}{-1}=\\dfrac{3}{x}$. Final: $\\dfrac{5}{3}x^6+\\dfrac{3}{2}x^4+\\dfrac{3}{x}+c$. Rule restated: add 1 to the power, divide by the new power; watch the sign when the new power is negative.", "source": "MiniMax ②"}]};const SK='harry_p1_may2022_ui_rebuild_v2';let cur='mysel';let selected=new Set();let cards=[];
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
function toast(s){const e=document.querySelector('.toast');e.textContent=s;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function save(){localStorage.setItem(SK,JSON.stringify([...selected]))}function rebuild(){const all=[...DATA.judge,...Object.values(DATA.models).flatMap(m=>m.cards)], map=new Map(all.map(c=>[c.id,c]));cards=[...selected].map(id=>map.get(id)).filter(Boolean)}function load(){try{selected=new Set(JSON.parse(localStorage.getItem(SK)||'[]'))}catch(e){selected=new Set()}rebuild()}
function view(){if(cur==='mysel')return cards;if(cur==='judge')return DATA.judge;return DATA.models[cur].cards}
function tabs(){let h=`<button class="tb ${cur==='mysel'?'mact':''}" data-tab="mysel">📌 My Selection (${cards.length})</button><button class="tb ${cur==='judge'?'jact':''}" data-tab="judge">✨ Judge (${DATA.judge.length})</button>`;for(const [id,m] of Object.entries(DATA.models)){const n=m.cards.filter(c=>selected.has(c.id)).length;h+=`<button class="tb ${cur===id?'act':''}" data-tab="${id}">${m.label} (${n}/${m.cards.length})</button>`}document.querySelector('.tabs').innerHTML=h}
function meta(){let a=cur==='mysel'?[['Final',cards.length+' cards'],['Judge base',DATA.judge.length+' picks'],['Runs','8 genuine runs']]:cur==='judge'?[['Judge picks',DATA.judge.length],['Policy','source-blind exact count'],['Route','GPT-5.6 Sol · medium']]:[['Run',DATA.models[cur].label],['Candidates',DATA.models[cur].cards.length],['Policy','current approved pool']];document.querySelector('.meta').innerHTML=a.map(x=>`<div><span class="ml">${x[0]}</span><span class="mv">${x[1]}</span></div>`).join('')}
function render(){const v=view(),list=document.querySelector('.cl');document.querySelector('.sc').textContent=cards.length+' in My Selection';document.querySelector('.cc').textContent=v.length+' cards';if(!v.length){list.innerHTML='<div class="empty">No cards. Select from Judge or an individual run.</div>';return}list.innerHTML=v.map((c,i)=>{const yes=selected.has(c.id);return `<article class="cd ${yes?'':'ds'}" data-id="${c.id}"><div class="ct"><input class="cb" type="checkbox" aria-label="Add card ${i+1} to My Selection" ${yes?'checked':''}><div class="qw"><button class="q" aria-expanded="false" aria-controls="a-${i}">${esc(c.question)}</button></div></div><div class="a" id="a-${i}" hidden>${esc(c.answer).replace(/\n/g,'<br>')}<div class="cf"><span class="sb">${esc(c.source)}</span><button class="cpb" data-copy="${i}">Copy card</button></div></div></article>`}).join('');typeset(list)}
function typeset(e){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([e])}function redraw(){rebuild();tabs();meta();render()}
document.querySelector('.tabs').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(!b)return;cur=b.dataset.tab;tabs();meta();render()});document.querySelector('.cl').addEventListener('change',e=>{if(!e.target.matches('.cb'))return;const id=e.target.closest('.cd').dataset.id;e.target.checked?selected.add(id):selected.delete(id);save();redraw()});document.querySelector('.cl').addEventListener('click',e=>{const q=e.target.closest('.q');if(q){const a=document.getElementById(q.getAttribute('aria-controls')),open=a.hidden;a.hidden=!open;q.setAttribute('aria-expanded',String(open));typeset(a);return}const b=e.target.closest('[data-copy]');if(b){const c=view()[Number(b.dataset.copy)];navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied card')).catch(()=>toast('Clipboard unavailable'))}});
function selectAll(){view().forEach(c=>selected.add(c.id));save();redraw();toast('All visible cards selected')}function deselectAll(){view().forEach(c=>selected.delete(c.id));save();redraw();toast('Visible cards deselected')}function resetJudge(){selected=new Set(DATA.judge.map(c=>c.id));save();redraw();toast('Reset to Judge')}function reveal(open){document.querySelectorAll('.q').forEach(q=>{const a=document.getElementById(q.getAttribute('aria-controls'));if(a.hidden===open)q.click()})}function shuffle(){const l=document.querySelector('.cl'),a=[...l.children];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}a.forEach(x=>l.append(x));toast('Shuffled')}function copyTable(){if(!cards.length){toast('My Selection is empty');return}const s='| Question | Answer |\n| --- | --- |\n'+cards.map(c=>'| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |').join('\n');navigator.clipboard.writeText(s).then(()=>toast(cards.length+' cards copied')).catch(()=>toast('Clipboard unavailable'))}function notion(){copyTable();toast('Notion-ready table copied to clipboard')}load();redraw();</script></body></html>
