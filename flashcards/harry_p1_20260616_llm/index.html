ansform:uppercase;letter-spacing:.05em;color:#6e6e73}.mv{display:block;font:700 14px ui-monospace,SFMono-Regular,Menlo,monospace}.ctrl{position:sticky;top:8px;z-index:5;display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 16px;margin-bottom:14px;border-radius:14px;background:#fff;box-shadow:0 1px 4px #00000012}.ctrl button{padding:7px 14px;border:1px solid #d2d2d7;border-radius:10px;background:#fff;color:#1d1d1f;cursor:pointer;font:600 12px inherit}.ctrl button:hover{background:#f5f5f7}.ctrl .bl{background:#0071e3;color:#fff;border-color:#0071e3}.ctrl .dk{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.ctrl .gn{background:#34c759;color:#fff;border-color:#34c759}.ctrl .pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#764ba2}.ctrl .nt{background:#000;color:#fff;border-color:#000}.sp{flex:1}.sc{font-weight:800;color:#16833d;font-size:13px}.cc{color:#6e6e73;font-weight:700;font-size:13px}.cl{display:flex;flex-direction:column;gap:10px}.cd{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px #0000000d;min-width:0}.cd.ds{opacity:.52}.ct{display:flex;gap:10px;align-items:flex-start}.cb{flex:none;width:18px;height:18px;margin-top:4px;accent-color:#0071e3;cursor:pointer}.qw{min-width:0;flex:1}.q{width:100%;padding:0 28px 0 0;border:0;background:transparent;color:#1d1d1f;text-align:left;font:650 15px/1.5 inherit;cursor:pointer;position:relative;overflow-wrap:anywhere}.q:after{content:'▸';position:absolute;right:0;top:0;color:#6e6e73;font-size:17px}.q[aria-expanded="true"]:after{transform:rotate(90deg)}.a{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f5;color:#424245;overflow-wrap:anywhere}.a[hidden]{display:none}.cf{display:flex;gap:8px;align-items:center;margin-top:10px}.sb{padding:2px 10px;border-radius:12px;background:#f0f0f5;color:#6e6e73;font-size:11px;font-weight:700}.cpb{padding:2px 8px;border:1px solid #d2d2d7;border-radius:8px;background:#fff;cursor:pointer;font-size:11px}.empty{text-align:center;color:#6e6e73;padding:60px 18px}.toast{position:fixed;z-index:20;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:600px){.ctr{padding:16px 12px 60px}.hdr h1{font-size:26px}.meta{grid-template-columns:repeat(2,minmax(0,1fr))}.cd{padding:14px}.ctrl{padding:10px}.ctrl .sp{display:none}.sc,.cc{width:100%}}</style></head><body><main class="ctr"><header class="hdr"><h1>Pure P1 · May 2022</h1><p class="sub">Eight-run learner review · choose your own recall set, or begin from the source-blind judge selection.</p><div class="bdg-row"><span class="bdg pp">✨ 60 judge picks</span><span class="bdg">189 candidates</span><span class="bdg gr">8 approved runs</span></div></header><nav class="tabs" aria-label="Review source tabs"></nav><section class="meta" aria-live="polite"></section><section class="ctrl" aria-label="Deck controls"><button class="bl" onclick="selectAll()">Select All</button><button onclick="deselectAll()">Deselect All</button><button class="pp" onclick="resetJudge()">Reset to Judge</button><button onclick="reveal(true)">Reveal</button><button onclick="reveal(false)">Hide</button><button class="dk" onclick="shuffle()">Shuffle</button><button class="gn" onclick="copyTable()">Copy</button><button class="nt" onclick="notion()">Notion-ready</button><span class="sp"></span><span class="sc"></span><span class="cc"></span></section><section class="cl" aria-live="polite"></section></main><div class="toast" role="status" aria-live="polite"></div><script>const DATA={"models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"id": "0", "question": "What is the unit code, paper code, sitting, and total marks for the Pearson Edexcel IAL Pure Mathematics P1 paper reviewed in this lesson?", "answer": "Unit code WMA11/01, paper code P69458A, Summer 2022 sitting, total 75 marks across 10 questions.", "source": "GLM 5.1 ①"}, {"id": "1", "question": "What is the status of the legacy \"29/75\" total and the best-available estimated score for this paper?", "answer": "The legacy \"29/75\" is unreconciled/provisional, not a fact. The best-available estimated score is $\\approx 32/75$ with a declared $\\geq 3$-mark unresolved delta.", "source": "GLM 5.1 ①"}, {"id": "2", "question": "When integrating $x^n$, what is the rule for the new power and coefficient? How should terms like $\\frac{k}{x^m}$ be handled?", "answer": "Add one to the power ($n \\to n+1$), then divide by the new power ($\\frac{1}{n+1}$). Rewrite $\\frac{k}{x^m}$ as $k x^{-m}$ before integrating; watch the sign when the new power is negative (e.g., $-3x^{-2} \\to +3x^{-1}$).", "source": "GLM 5.1 ①"}, {"id": "3", "question": "Evaluate the indefinite integral $\\int \\left( 10x^5 + 6x^3 - \\frac{3}{x^2} \\right) dx$.", "answer": "Rewrite as $\\int (10x^5 + 6x^3 - 3x^{-2}) dx$. Integrating term-by-term: $\\frac{10}{6}x^6 + \\frac{6}{4}x^4 + \\frac{3}{1}x^{-1} + c = \\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$.", "source": "GLM 5.1 ①"}, {"id": "4", "question": "In triangle ABC with $AB = 21$, $BC = 13$, and $\\angle BAC = 25^\\circ$, find the obtuse angle $x$ at C using the sine rule.", "answer": "$\\sin x = \\frac{21 \\sin 25^\\circ}{13} = 0.6827$. The acute angle is $\\arcsin(0.6827) \\approx 43.05^\\circ$. Since $x$ is obtuse, $x = 180^\\circ - 43.05^\\circ = 136.95^\\circ$.", "source": "GLM 5.1 ①"}, {"id": "5", "question": "In multi-step trigonometry calculations (like the sine rule), why must intermediate values be kept to at least 4 decimal places?", "answer": "Rounding early (e.g., $0.6827 \\to 0.6830$) propagates error and loses the final accuracy mark. Carry full calculator accuracy (at least 4 d.p.) until the final step.", "source": "GLM 5.1 ①"}, {"id": "6", "question": "Simplify $\\frac{\\sqrt{180} - \\sqrt{80}}{\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "(Note: Q3 was touched briefly; exact score unavailable.) $\\frac{6\\sqrt{5} - 4\\sqrt{5}}{\\sqrt{5}} = \\frac{2\\sqrt{5}}{\\sqrt{5}} = 2$.", "source": "GLM 5.1 ①"}, {"id": "7", "question": "Rationalise the denominator of $\\frac{4\\sqrt{5}-5}{\\sqrt{7}-3\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "(Note: Q3 was touched briefly; exact score unavailable.) Multiply numerator and denominator by $\\sqrt{7}+3\\sqrt{5}$. Result: $\\frac{25}{4} + \\frac{13}{4}\\sqrt{5}$.", "source": "GLM 5.1 ①"}, {"id": "8", "question": "Given $y = f(x)$ with minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$, and asymptote $y = 1$, state the key features of the graph $y = f(x) - 2$.", "answer": "Shift down by 2. Minimum becomes $(-1, -2)$, maximum becomes $(\\frac{2}{3}, 0)$, asymptote becomes $y = -1$.", "source": "GLM 5.1 ①"}, {"id": "9", "question": "Given $y = f(x)$ with minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$, and asymptote $y = 1$, state the key features of the graph $y = f(-x)$.", "answer": "Reflection in the y-axis. Minimum becomes $(1, 0)$, maximum becomes $(-\\frac{2}{3}, 2)$. The horizontal asymptote $y = 1$ is unchanged (reflection is horizontal only).", "source": "GLM 5.1 ①"}, {"id": "10", "question": "What is the completed square form of the quadratic in Q5? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) $12 - \\frac{3}{4}(x+2)^2$.", "source": "GLM 5.1 ①"}, {"id": "11", "question": "How do you solve a quartic equation like $2x^4 - 15x^2 - 50 = 0$ algebraically? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "(Note: Q6 was solved live as extra teaching, not a logged lost-mark review.) Substitute $u = x^2$ to form a quadratic $2u^2 - 15u - 50 = 0$. Factorise, reject any $u < 0$ (since $x^2 \\ge 0$), then take square roots for exact surd $x$ values. Show all working; calculator-only solutions are barred.", "source": "GLM 5.1 ①"}, {"id": "12", "question": "Solve the simultaneous equations from Q6 yielding the quartic $2x^4 - 15x^2 - 50 = 0$. Give the exact solution pairs. (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "(Note: Q6 was solved live as extra teaching, not a logged lost-mark review.) Factorise: $(2x^2+5)(x^2-10)=0$. Reject $x^2 = -5/2$. Use $x^2 = 10 \\implies x = \\pm\\sqrt{10}$. Back-substitute to get pairs $(\\sqrt{10}, 4\\sqrt{10})$ and $(-\\sqrt{10}, -4\\sqrt{10})$.", "source": "GLM 5.1 ①"}, {"id": "13", "question": "Given $f'(x) = 2x^{-1/2} + Ax^{-2} + 3$ and $f''(4) = 0$, find the value of $A$.", "answer": "Differentiate: $f''(x) = -x^{-3/2} - 2Ax^{-3}$. Substitute $x=4$: $f''(4) = -4^{-3/2} - 2A(4^{-3}) = -\\frac{1}{8} - \\frac{2A}{64} = 0$. Solve: $\\frac{2A}{64} = -\\frac{1}{8} \\implies A = -4$.", "source": "GLM 5.1 ①"}, {"id": "14", "question": "If a correct numerical answer is obtained via invalid working in an exam, what is the mark outcome?", "answer": "A correct answer obtained from invalid working scores 0 marks. The method must justify the answer; keep fractional and negative indices exact throughout.", "source": "GLM 5.1 ①"}, {"id": "15", "question": "Given $f'(x) = 2x^{-1/2} - 4x^{-2} + 3$ and $f(\\frac{1}{2}) = 8\\sqrt{3}$, find $f(x)$.", "answer": "Integrate: $f(x) = 4x^{1/2} + 4x^{-1} + 3x + c$. Using the official mark scheme values, the final exact form is $f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$.", "source": "GLM 5.1 ①"}, {"id": "16", "question": "In the Q8 sector/arc problem, what is the value of the angle $\\theta$ and the arc length $CD$? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) $\\theta = \\frac{5}{3}$ radians; arc $CD = 35.9$ cm.", "source": "GLM 5.1 ①"}, {"id": "17", "question": "In the Q8 sector/arc problem, what are the perimeter and area values? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) Perimeter = 603 cm; area $\\approx 4730$ cm$^2$ = 0.473 m$^2$.", "source": "GLM 5.1 ①"}, {"id": "18", "question": "Describe the transformation from $y = \\sin x$ to $y = \\sin 2x$ and state the new period.", "answer": "Multiplying $x$ by 2 inside the function compresses the graph horizontally by a factor of $\\frac{1}{2}$ (\"sweep every x-coordinate by a half\"). The period halves from $360^\\circ$ to $180^\\circ$.", "source": "GLM 5.1 ①"}, {"id": "19", "question": "Given $\\sin 2x = p$ where $2x = \\alpha$ is one solution, what are the two solutions for $x$ in the range $0^\\circ \\le x \\le 90^\\circ$?", "answer": "$x = \\frac{\\alpha}{2}$ and $x = 90^\\circ - \\frac{\\alpha}{2}$. Use the graph's symmetry: the roots are equidistant from the line of symmetry at $x = 45^\\circ$.", "source": "GLM 5.1 ①"}, {"id": "20", "question": "If $\\sin \\alpha = p$, express $\\sin 2\\alpha$, $\\sin(-\\alpha)$, and $3 - \\sin \\alpha$ in terms of $p$.", "answer": "$\\sin 2\\alpha = 2p$, $\\sin(-\\alpha) = -p$, and $3 - \\sin \\alpha = 3 - p$.", "source": "GLM 5.1 ①"}, {"id": "21", "question": "In the Q10 normal-to-curve problem, what is the derivative $\\frac{dy}{dx}$ and the resulting quadratic equation for the x-coordinate of the normal? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) $\\frac{dy}{dx} = \\frac{6}{7}x^2 + \\frac{2}{7}x - \\frac{5}{2}$. The quadratic equation is $12x^2 + 4x - 33 = 0$.", "source": "GLM 5.1 ①"}, {"id": "22", "question": "In the Q10 normal-to-curve problem, what is the final value of $k$? (Reference-only; not reviewed live; score unknown.)", "answer": "(Reference-only; not reviewed live; score unknown.) $k = 54$.", "source": "GLM 5.1 ①"}]}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"id": "23", "question": "For the integral $\\int \\left(10x^5 + 6x^3 - \\frac{3}{x^2}\\right) dx$, what is the result? State the rule for integrating $x^n$.", "answer": "Rule: add 1 to the power, then divide by the new power. Rewrite $\\frac{3}{x^2} = 3x^{-2}$.\n$$\\int \\left(10x^5 + 6x^3 - 3x^{-2}\\right) dx = \\frac{10}{6}x^6 + \\frac{6}{4}x^4 - \\frac{3}{-1}x^{-1} + c = \\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$$", "source": "GLM 5.1 ②"}, {"id": "24", "question": "When integrating $-3x^{-2}$, what is a common sign error to avoid?", "answer": "Dividing by the new power $(-1)$ gives $-3 \\div -1 = +3$, so the term becomes $+3x^{-1} = +\\frac{3}{x}$. Do not accidentally make it negative.", "source": "GLM 5.1 ②"}, {"id": "25", "question": "What is a common conceptual slip when attempting indefinite integration of polynomial terms?", "answer": "Accidentally applying the differentiation rule (multiply by power, subtract one) instead of the integration rule (add one to power, divide by new power). Always verify the operation being performed.", "source": "GLM 5.1 ②"}, {"id": "26", "question": "In triangle $ABC$, $AB = 21$, $BC = 13$, $\\angle BAC = 25^\\circ$. Using the sine rule, $\\sin x = \\frac{21 \\sin 25^\\circ}{13} \\approx 0.6827$. If $x$ is an obtuse angle, how is $x$ found?", "answer": "The sine rule gives two possible angles: $\\theta$ and $180^\\circ - \\theta$. Since $x$ is obtuse, $x = 180^\\circ - \\arcsin(0.6827) = 180^\\circ - 43.05^\\circ = 136.95^\\circ$.", "source": "GLM 5.1 ②"}, {"id": "27", "question": "When using the sine rule to find an angle, why must you carry full calculator accuracy (e.g., 0.6827) rather than rounding early (e.g., to 0.6830)?", "answer": "An early rounding slip loses the accuracy mark. Rounding 0.6827 to 0.6830 before taking $\\arcsin$ yields $136.93^\\circ$, which differs from the correct $136.95^\\circ$.", "source": "GLM 5.1 ②"}, {"id": "28", "question": "Simplify $\\frac{\\sqrt{180} - \\sqrt{80}}{\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "$\\frac{\\sqrt{36 \\times 5} - \\sqrt{16 \\times 5}}{\\sqrt{5}} = \\frac{6\\sqrt{5} - 4\\sqrt{5}}{\\sqrt{5}} = \\frac{2\\sqrt{5}}{\\sqrt{5}} = 2$.", "source": "GLM 5.1 ②"}, {"id": "29", "question": "Rationalise the denominator of $\\frac{4\\sqrt{5} - 5}{7 - 3\\sqrt{5}}$. (Note: Q3 was touched briefly; exact score unavailable.)", "answer": "Multiply by conjugate $7 + 3\\sqrt{5}$: $\\frac{(4\\sqrt{5} - 5)(7 + 3\\sqrt{5})}{49 - 45} = \\frac{28\\sqrt{5} + 60 - 35 - 15\\sqrt{5}}{4} = \\frac{25 + 13\\sqrt{5}}{4} = \\frac{25}{4} + \\frac{13\\sqrt{5}}{4}$.", "source": "GLM 5.1 ②"}, {"id": "30", "question": "Given $y = f(x)$ has minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$ and asymptote $y = 1$, state the coordinates and asymptote for $y = f(x) - 2$.", "answer": "Shift down by 2. Minimum: $(-1, -2)$. Maximum: $(\\frac{2}{3}, 0)$. Asymptote: $y = -1$.", "source": "GLM 5.1 ②"}, {"id": "31", "question": "Given $y = f(x)$ has minimum $P(-1, 0)$, maximum $Q(\\frac{2}{3}, 2)$ and asymptote $y = 1$, state the coordinates and asymptote for $y = f(-x)$.", "answer": "Reflection in the $y$-axis. Minimum: $(1, 0)$. Maximum: $(-\\frac{2}{3}, 2)$. Asymptote: $y = 1$ (horizontal asymptotes are unchanged by horizontal reflections).", "source": "GLM 5.1 ②"}, {"id": "32", "question": "When sketching $y = f(-x)$, why is it an error to change a horizontal asymptote $y = 1$ to $y = -1$?", "answer": "$y = f(-x)$ reflects the graph horizontally (in the $y$-axis). A horizontal asymptote depends on $y$ as $x \\to \\pm\\infty$, so it is unaffected by a horizontal reflection.", "source": "GLM 5.1 ②"}, {"id": "33", "question": "For Q5, the completed square form of a quadratic is $12 - \\frac{3}{4}(x+2)^2$. What is a common error when writing this form? Reference-only; not reviewed live; score unknown.", "answer": "Omitting the coefficient $\\frac{3}{4}$ and writing $12 - (x+2)^2$, which equals $-x^2 - 4x + 8$ and is incorrect. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ②"}, {"id": "34", "question": "To solve the quartic $2x^4 - 15x^2 - 50 = 0$, what substitution is used? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "Let $u = x^2$. The equation becomes the quadratic $2u^2 - 15u - 50 = 0$.", "source": "GLM 5.1 ②"}, {"id": "35", "question": "Solve $2x^4 - 15x^2 - 50 = 0$ for real $x$. (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "Let $u = x^2$: $2u^2 - 15u - 50 = 0 \\implies (2u+5)(u-10) = 0$.\n$u = -2.5$ (reject, since $x^2 \\ge 0$) or $u = 10$.\n$x^2 = 10 \\implies x = \\pm\\sqrt{10}$.", "source": "GLM 5.1 ②"}, {"id": "36", "question": "When solving simultaneous equations where one equation is linear and one is quadratic, what is a useful strategic step before substituting? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review.)", "answer": "Step back to see which variable to make the subject of the linear equation. Choosing the more convenient variable to isolate minimises algebraic complexity and reduces errors.", "source": "GLM 5.1 ②"}, {"id": "37", "question": "If a question asks you to find a constant $A$ using differentiation and you obtain the correct $A$ via invalid working, how many marks are earned?", "answer": "0 marks. A correct answer obtained from invalid working earns zero; the method must justify the answer.", "source": "GLM 5.1 ②"}, {"id": "38", "question": "Given $f'(x) = 2x^{-1/2} + Ax^{-2} + 3$ and $f''(4) = 0$, find $A$.", "answer": "$f''(x) = -x^{-3/2} - 2Ax^{-3}$.\n$f''(4) = -4^{-3/2} - 2A(4^{-3}) = 0 \\implies -\\frac{1}{8} - \\frac{2A}{64} = 0 \\implies -8 - 2A = 0 \\implies A = -4$.", "source": "GLM 5.1 ②"}, {"id": "39", "question": "Given $f'(x) = 2x^{-1/2} - 4x^{-2} + 3$ and $f(12) = 8\\sqrt{3}$, find $f(x)$.", "answer": "$f(x) = \\int f'(x) dx = 4x^{1/2} + 4x^{-1} + 3x + c = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$.\n$f(12) = 4\\sqrt{12} + \\frac{4}{12} + 36 + c = 8\\sqrt{3} + \\frac{1}{3} + 36 + c = 8\\sqrt{3} \\implies c = -\\frac{109}{3}$.\nSo $f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$.", "source": "GLM 5.1 ②"}, {"id": "40", "question": "For Q8, a sector/arc problem, the area is $\\approx 4730$ cm$^2$. What is the area in m$^2$? Reference-only; not reviewed live; score unknown.", "answer": "$4730 \\text{ cm}^2 = 4730 \\div 10000 \\text{ m}^2 = 0.473 \\text{ m}^2$. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ②"}, {"id": "41", "question": "How does the graph of $y = \\sin 2x$ relate to $y = \\sin x$ in terms of period and horizontal stretch?", "answer": "$y = \\sin 2x$ is a horizontal stretch of $y = \\sin x$ by a factor of $\\frac{1}{2}$. This halves the period to $180^\\circ$.", "source": "GLM 5.1 ②"}, {"id": "42", "question": "Solve $\\sin 2x = p$ for $0 \\le x < 180^\\circ$, given one solution is $2x = \\alpha$. Express $x$ in terms of $\\alpha$.", "answer": "$2x = \\alpha \\implies x = \\frac{\\alpha}{2}$.\nUsing the symmetry of the sine curve, the second solution in range is $2x = 180^\\circ - \\alpha \\implies x = 90^\\circ - \\frac{\\alpha}{2}$.", "source": "GLM 5.1 ②"}, {"id": "43", "question": "When solving $\\sin 2x = p$, how is the $-\\sin \\alpha$ symmetry used to find the second root?", "answer": "The sine curve has lines of symmetry at $x = 90^\\circ, 270^\\circ$, etc. If one root is at $x = \\frac{\\alpha}{2}$, the second root is at an equal distance from the line of symmetry $x = 45^\\circ$ (for $\\sin 2x$), giving $x = 90^\\circ - \\frac{\\alpha}{2}$.", "source": "GLM 5.1 ②"}, {"id": "44", "question": "Given $\\frac{dy}{dx} = \\frac{6}{7}x^2 + \\frac{2}{7}x - \\frac{5}{2}$, what is the value of $\\frac{dy}{dx}$ at $x = \\frac{3}{2}$? Reference-only; not reviewed live; score unknown.", "answer": "$\\frac{dy}{dx} = \\frac{6}{7}\\left(\\frac{9}{4}\\right) + \\frac{2}{7}\\left(\\frac{3}{2}\\right) - \\frac{5}{2} = \\frac{27}{14} + \\frac{3}{7} - \\frac{5}{2} = \\frac{27}{14} + \\frac{6}{14} - \\frac{35}{14} = -\\frac{1}{7}$. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ②"}, {"id": "45", "question": "What is the status of the legacy \"29/75\" score claim for this paper?", "answer": "It is unreconciled and provisional. The best-available per-question breakdown sums to $\\approx 32/75$, leaving a declared $\\ge 3$-mark unresolved delta. It must not be described as a reconciled fact.", "source": "GLM 5.1 ②"}]}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"id": "46", "question": "When integrating a term $kx^n$, what is the rule for the new power and coefficient, and what common error does this correct?", "answer": "Add one to the power ($n \\to n+1$), then divide by the new power ($k \\to \\frac{k}{n+1}$). This corrects the error of differentiating (multiplying by $n$ and subtracting 1 from the power) instead of integrating.", "source": "GLM 5.1 ③"}, {"id": "47", "question": "Integrate $\\int (10x^5 + 6x^3 - \\frac{3}{x^2}) dx$. What must be done to $\\frac{3}{x^2}$ first?", "answer": "Rewrite $\\frac{3}{x^2}$ as $3x^{-2}$. Then integrate: $\\frac{10}{6}x^6 + \\frac{6}{4}x^4 + \\frac{3}{-1}x^{-1} + c = \\frac{5}{3}x^6 + \\frac{3}{2}x^4 - 3x^{-1} + c = \\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$.", "source": "GLM 5.1 ③"}, {"id": "48", "question": "When integrating $-3x^{-2}$, what is the sign of the resulting term?", "answer": "Add one to power: $-2 \\to -1$. Divide by new power: $-3 / -1 = 3$. Result is $3x^{-1} = \\frac{3}{x}$. Watch the sign when the new power is negative.", "source": "GLM 5.1 ③"}, {"id": "49", "question": "In triangle $ABC$ with $AB=21$, $BC=13$, $\\angle BAC = 25^\\circ$, the sine rule gives $\\sin x = 0.6827$. Why must $x$ be the obtuse angle $136.95^\\circ$ rather than the acute angle?", "answer": "The sine rule yields two candidates: $\\theta$ and $180^\\circ - \\theta$. Since the given configuration forces the required angle to exceed $90^\\circ$, you must select the obtuse solution $x = 180^\\circ - \\arcsin(0.6827) = 136.95^\\circ$.", "source": "GLM 5.1 ③"}, {"id": "50", "question": "Using the sine rule to find an angle, if you round $\\sin x = 0.6827$ to $0.6830$ early, what is the consequence?", "answer": "An early rounding slip loses the accuracy mark for that part, even if the method and obtuse-case recognition are sound. Carry full 4-decimal-place accuracy through intermediate steps.", "source": "GLM 5.1 ③"}, {"id": "51", "question": "Simplify $\\frac{\\sqrt{180} - \\sqrt{80}}{\\sqrt{5}}$. (Note: Q3 exact score is unavailable).", "answer": "$\\frac{6\\sqrt{5} - 4\\sqrt{5}}{\\sqrt{5}} = \\frac{2\\sqrt{5}}{\\sqrt{5}} = 2$. (Note: Q3 exact score is unavailable).", "source": "GLM 5.1 ③"}, {"id": "52", "question": "Rationalise $\\frac{4\\sqrt{5}-5}{\\sqrt{7}-3\\sqrt{5}}$. (Note: Q3 exact score is unavailable).", "answer": "Official answer: $\\frac{25}{4} + \\frac{13\\sqrt{5}}{4}$. (Note: Q3 exact score is unavailable).", "source": "GLM 5.1 ③"}, {"id": "53", "question": "Given $y=f(x)$ has a minimum $(-1, 0)$ and asymptote $y=1$, state the coordinates of the minimum and the equation of the asymptote for $y=f(x)-2$.", "answer": "Shift down 2: minimum becomes $(-1, -2)$, asymptote becomes $y = -1$.", "source": "GLM 5.1 ③"}, {"id": "54", "question": "Given $y=f(x)$ has a maximum at $(\\frac{2}{3}, 2)$, what are the coordinates of the maximum for $y=f(-x)$?", "answer": "Reflection in the y-axis changes $x \\to -x$ and leaves $y$ unchanged. The new maximum is $(-\\frac{2}{3}, 2)$.", "source": "GLM 5.1 ③"}, {"id": "55", "question": "Given $y=f(x)$ has a horizontal asymptote $y=1$, what happens to this asymptote under the transformation $y=f(-x)$?", "answer": "$y=f(-x)$ is a reflection in the y-axis ($x \\to -x$, $y$ unchanged). A horizontal asymptote depends only on $y$, so $y=1$ stays put; a horizontal reflection cannot move a horizontal asymptote.", "source": "GLM 5.1 ③"}, {"id": "56", "question": "Find the completed square form of $-\\frac{3}{4}x^2 - \\frac{16}{3}x + \\frac{20}{3}$. Reference-only; not reviewed live; score unknown.", "answer": "$12 - \\frac{3}{4}(x+2)^2$. Reference-only; not reviewed live; score unknown. (Legacy guide omitted the $\\frac{3}{4}$ coefficient, yielding $-x^2-4x+8$, which is incorrect).", "source": "GLM 5.1 ③"}, {"id": "57", "question": "Solve $2x^4 - 15x^2 - 50 = 0$ by substitution. Why must you reject $x^2 = -\\frac{5}{2}$? (Note: Q6 was solved live as extra teaching, not a logged lost-mark review).", "answer": "Let $u = x^2$. The equation becomes $2u^2 - 15u - 50 = 0 \\Rightarrow (2u+5)(u-10)=0$. Reject $u = -\\frac{5}{2}$ because a real square ($x^2$) cannot be negative. Thus $x^2 = 10 \\Rightarrow x = \\pm\\sqrt{10}$. (Note: Q6 was solved live as extra teaching, not a logged lost-mark review).", "source": "GLM 5.1 ③"}, {"id": "58", "question": "For the simultaneous equations yielding $x = \\pm\\sqrt{10}$, what form must the $y$-values take, and why are calculator-only solutions rejected? (Note: Q6 was solved live as extra teaching).", "answer": "Back-substitution gives $y = \\pm 4\\sqrt{10}$, yielding exact surd pairs $(\\sqrt{10}, 4\\sqrt{10})$ and $(-\\sqrt{10}, -4\\sqrt{10})$. Calculator-only solutions are rejected because the question requires showing all working. (Note: Q6 was solved live as extra teaching).", "source": "GLM 5.1 ③"}, {"id": "59", "question": "In an exam, if you reach the correct final value $A = -4$ but via invalid working, what is the mark outcome?", "answer": "A correct answer obtained from invalid working earns 0 marks. The method must justify the answer.", "source": "GLM 5.1 ③"}, {"id": "60", "question": "Given $f'(x) = 2x^{-1/2} + Ax^{-2} + 3$ and $f''(4) = 0$, find $A$.", "answer": "Differentiate: $f''(x) = -x^{-3/2} - 2Ax^{-3}$. Set $x=4$: $-4^{-3/2} - 2A(4^{-3}) = 0 \\Rightarrow -\\frac{1}{8} - \\frac{A}{32} = 0 \\Rightarrow A = -4$.", "source": "GLM 5.1 ③"}, {"id": "61", "question": "Given $f'(x) = 2x^{-1/2} - 4x^{-2} + 3$ and $f(\\frac{1}{2}) = 8\\sqrt{3}$, find $f(x)$.", "answer": "Integrate: $f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x + c$. Official answer: $f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$. Keep constants exact, not rounded decimals.", "source": "GLM 5.1 ③"}, {"id": "62", "question": "For a sector with radius $r$ and angle $\\theta$ in radians, state the formulas for arc length and area. Reference-only; not reviewed live; score unknown.", "answer": "Arc length $= r\\theta$. Area $= \\frac{1}{2}r^2\\theta$. Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ③"}, {"id": "63", "question": "What is the period of $y = \\sin 2x$ (in degrees), and how does it relate to $y = \\sin x$?", "answer": "The period is $180^\\circ$. Multiplying $x$ by 2 inside the function causes a horizontal stretch by factor $\\frac{1}{2}$, halving the period from $360^\\circ$ to $180^\\circ$.", "source": "GLM 5.1 ③"}, {"id": "64", "question": "If $\\sin 2x = p$ has one solution $x = \\frac{\\alpha}{2}$ in the range $0^\\circ \\le x \\le 90^\\circ$, what is its partner root in that range?", "answer": "Using the graph's symmetry, the partner root is $x = 90^\\circ - \\frac{\\alpha}{2}$. The two roots are equidistant from the line of symmetry at $x = 45^\\circ$.", "source": "GLM 5.1 ③"}, {"id": "65", "question": "To find the equation of the normal to a curve $y=f(x)$ at point $x=a$, what is the gradient of the normal? Reference-only; not reviewed live; score unknown.", "answer": "Gradient of normal $= -\\frac{1}{f'(a)}$ (the negative reciprocal of the tangent's gradient). Reference-only; not reviewed live; score unknown.", "source": "GLM 5.1 ③"}, {"id": "66", "question": "What is the status of the legacy \"29/75\" score for this paper?", "answer": "It is unreconciled and provisional; it must not be described as a reconciled fact. The best-available per-question breakdown sums to $\\approx 32/75$, leaving a declared $\\ge 3$-mark unresolved delta.", "source": "GLM 5.1 ③"}, {"id": "67", "question": "What is the scored state and review status of Q5, Q8, and Q10 from this lesson?", "answer": "Q5, Q8, and Q10 were NOT reviewed live. Their scored state is unknown and must not be assumed. Any cards about their exact official reference material must note: \"Reference-only; not reviewed live; score unknown.\"", "source": "GLM 5.1 ③"}, {"id": "68", "question": "What is the scored state of Q3 from this lesson?", "answer": "Q3 was touched briefly; its exact score is unavailable.", "source": "GLM 5.1 ③"}]}, "qwen_1": {"label": "Qwen ①", "cards": [{"id": "69", "question": "In the WMA11/01 Summer 2022 review, what specific error was identified in the student's attempt at $\\int (10x^5 + 6x^3 - \\frac{3}{x^2}) \\, dx$, and what is the correct integration rule to apply?", "answer": "The student incorrectly applied the differentiation rule instead of integration. The correct rule for integrating powers is to add one to the power and divide by the new power. Specifically, rewrite $\\frac{3}{x^2}$ as $3x^{-2}$ before integrating to avoid sign errors.", "source": "Qwen ①"}, {"id": "70", "question": "Evaluate $\\int (10x^5 + 6x^3 - 3x^{-2}) \\, dx$ correctly, showing the term-by-term integration of the negative power.", "answer": "$\\frac{10}{6}x^6 + \\frac{6}{4}x^4 - \\frac{3}{-1}x^{-1} + c = \\frac{5}{3}x^6 + \\frac{3}{2}x^4 + \\frac{3}{x} + c$. Note that integrating $-3x^{-2}$ yields $+3x^{-1}$ because dividing by the new power $-1$ reverses the sign.", "source": "Qwen ①"}, {"id": "71", "question": "For WMA11/01 Summer 2022 Q2, given triangle $ABC$ with $AB=21$, $BC=13$, and $\\angle BAC = 25^\\circ$, calculate $\\sin x$ to 4 decimal places and find the obtuse angle $x$.", "answer": "Using the sine rule: $\\sin x = \\frac{21 \\sin 25^\\circ}{13} \\approx 0.6827$ (4 d.p.). Since $x$ is obtuse, $x = 180^\\circ - \\arcsin(0.6827) = 136.95^\\circ$. Rounding $\\sin x$ to 0.6830 prematurely leads to an incorrect angle and loss of accuracy marks.", "source": "Qwen ①"}, {"id": "72", "question": "When solving a sine rule ambiguous case where two angles are mathematically possible, how do you determine whether to select the acute or obtuse solution?", "answer": "Calculate the acute angle $\\theta = \\arcsin(\\text{value})$. Check the geometric constraints of the triangle (e.g., sum of angles, side lengths). If the configuration forces an obtuse angle, use $180^\\circ - \\theta$. Always retain full calculator precision for intermediate sine values to preserve accuracy marks.", "source": "Qwen ①"}, {"id": "73", "question": "Reference-only; not reviewed live; score unknown. For WMA11/01 Summer 2022 Q5(a), express $12 - \\frac{3}{4}(x+2)^2$ in the form $ax^2 + bx + c$ to verify the completed square form.", "answer": "Reference-only; not reviewed live; score unknown. Expanding $12 - \\frac{3}{4}(x^2 + 4x + 4)$ gives $12 - \\frac{3}{4}x^2 - 3x - 3 = -\\frac{3}{4}x^2 - 3x + 9$. Note: The legacy guide incorrectly printed this as $12-(x+2)^2$; the coefficient $\\frac{3}{4}$ is mandatory for equality with the factored form $-\\frac{3}{4}(x-1)(x+5)$.", "source": "Qwen ①"}, {"id": "74", "question": "In WMA11/01 Summer 2022 Q4(ii), describe the transformation from $y=f(x)$ to $y=f(-x)$ and state the effect on a horizontal asymptote $y=1$.", "answer": "$y=f(-x)$ represents a reflection in the $y$-axis ($x \\to -x$). This is a purely horizontal transformation; therefore, the horizontal asymptote remains unchanged at $y=1$. Moving the asymptote to $y=-1$ is a common error confusing horizontal reflection with vertical translation.", "source": "Qwen ①"}, {"id": "75", "question": "Given $y=f(x)$ has a minimum at $P(-1, 0)$, a maximum at $Q(\\frac{3}{2}, 2)$, and asymptote $y=1$, state the coordinates of the minimum and maximum for the transformed graph $y=f(-x)$.", "answer": "Reflection in the $y$-axis negates the $x$-coordinates while keeping $y$-coordinates unchanged. New Minimum: $(1, 0)$. New Maximum: $(-\\frac{3}{2}, 2)$. The shape must be mirrored horizontally, and the asymptote stays at $y=1$.", "source": "Qwen ①"}, {"id": "76", "question": "Solve the quartic equation $2x^4 - 15x^2 - 50 = 0$ exactly, explaining why one quadratic factor yields no real solutions.", "answer": "Substitute $u=x^2$ to get $2u^2 - 15u - 50 = 0$, which factorises to $(2u+5)(u-10)=0$. Solutions are $u=-\\frac{5}{2}$ or $u=10$. Reject $x^2 = -\\frac{5}{2}$ as squares cannot be negative. Thus $x^2=10 \\Rightarrow x = \\pm\\sqrt{10}$. Exact surd answers are required; calculator-only solutions are not accepted.", "source": "Qwen ①"}, {"id": "77", "question": "In the review of WMA11/01 Summer 2022 Q6, what strategic advice was given regarding variable selection when solving simultaneous equations reducing to a quartic?", "answer": "\"Take a step back\" to choose the most convenient variable to make the subject before substitution. Choosing the wrong variable can complicate the algebra significantly. The lesson emphasized this strategic pause over immediate manipulation.", "source": "Qwen ①"}, {"id": "78", "question": "Given $f'(x) = 2x^{-1/2} + Ax^{-2} + 3$ and $f''(4) = 0$, find the exact value of $A$. Explain why obtaining $A=-4$ via invalid working scores zero marks.", "answer": "Differentiating: $f''(x) = -x^{-3/2} - 2Ax^{-3}$. Setting $f''(4)=0$: $-4^{-3/2} - 2A(4)^{-3} = 0 \\Rightarrow -\\frac{1}{8} - \\frac{2A}{64} = 0 \\Rightarrow -8 - 2A = 0 \\Rightarrow A = -4$. A correct answer derived from invalid differentiation or algebraic errors scores 0 marks; the method must rigorously justify the result.", "source": "Qwen ①"}, {"id": "79", "question": "Given $f'(x) = 2x^{-1/2} - 4x^{-2} + 3$ and $f(12) = 8\\sqrt{3}$, find the exact expression for $f(x)$.", "answer": "Integrate term-by-term: $f(x) = 4x^{1/2} + 4x^{-1} + 3x + C$. Substitute $x=12$: $4\\sqrt{12} + \\frac{4}{12} + 36 + C = 8\\sqrt{3} \\Rightarrow 8\\sqrt{3} + \\frac{1}{3} + 36 + C = 8\\sqrt{3}$. Solving gives $C = -36 - \\frac{1}{3} = -\\frac{109}{3}$. Final answer: $f(x) = 4\\sqrt{x} + \\frac{4}{x} + 3x - \\frac{109}{3}$.", "source": "Qwen ①"}, {"id": "80", "question": "Reference-only; not reviewed live; score unknown. For WMA11/01 Summer 2022 Q8(a), if a sector has arc length $35.9$ cm and radius derived from context, what is the reference value for angle $\\theta$ in radians?", "answer": "Reference-only; not reviewed live; score unknown. The official mark scheme reference answer for Q8(a) is $\\theta = \\frac{5}{3}$ radians. This question was printed but not solved or reviewed in the lesson audio; its scored state is unknown.", "source": "Qwen ①"}, {"id": "81", "question": "Reference-only; not reviewed live; score unknown. State the reference answers for WMA11/01 Summer 2022 Q8(b) perimeter and Q8(c) area.", "answer": "Reference-only; not reviewed live; score unknown. Official references: (b) Perimeter $= 603$ cm; (c) Area $\\approx 4730 \\text{ cm}^2$ (or $0.473 \\text{ m}^2$). These values are from the mark scheme only; no live verification or student attempt exists in the lesson evidence.", "source": "Qwen ①"}, {"id": "82", "question": "For $y = \\sin 2x$, describe the geometric transformation relative to $y = \\sin x$ and state the new period in degrees.", "answer": "Multiplying $x$ by 2 inside the function causes a horizontal stretch by scale factor $\\frac{1}{2}$ (compression). The period is halved from $360^\\circ$ to $180^\\circ$. The lesson described this as \"sweeping every x-coordinate by a half.\"", "source": "Qwen ①"}, {"id": "83", "question": "When solving $\\sin 2x = p$ in the range $0 \\le x \\le 180^\\circ$, if one solution is $x = \\frac{\\alpha}{2}$, use symmetry to find the second solution in terms of $\\alpha$.", "answer": "The graph of $y=\\sin 2x$ has a line of symmetry at $x=45^\\circ$ within the first half-period. The second solution is equidistant from this peak: $x = 90^\\circ - \\frac{\\alpha}{2}$. Alternatively, using the identity $\\sin(180^\\circ - \\theta) = \\sin \\theta$, if $2x = \\alpha$, then $2x = 180^\\circ - \\alpha \\Rightarrow x = 90^\\circ - \\frac{\\alpha}{2}$.", "source": "Qwen ①"}, {"id": "84", "question": "Reference-only; not reviewed live; score unknown. State the reference answer for WMA11/01 Summer 2022 Q10(d) finding the value of $k$.", "answer": "Reference-only; not reviewed live; score unknown. The official mark scheme value is $k = \\frac{5}{4}$. This question was visible on the worksheet but was not discussed in audio or worked on screen; its scored state is unknown.", "source": "Qwen ①"}, {"id": "85", "question": "Reference-only; not reviewed live; score unknown. Provide the reference derivative and quadratic equation for WMA11/01 Summer 2022 Q10 parts (a) and (b).", "answer": "Reference-only; not reviewed live; score unknown. Official references: (a) $\\frac{dy}{dx} = \\frac{6}{7}x^2 + \\frac{2}{7}x - \\frac{5}{2}$; (b) $12x^2 + 4x - 33 = 0$. These are unreconciled reference materials only; no live lesson evidence exists for this question.", "source": "Qwen ①"}, {"id": "86", "question": "Regarding the WMA11/01 Summer 2022 review score, is the legacy figure \"29/75\" a reconciled fact?", "answer": "No. The \"29/75\" total is a [GUIDE-CLAIM] only. It is unreconciled and provisional because it contradicts the per-question breakdown (which sums to $\\approx 32/75$) and lacks confirmation from audio or verified frames. It must not be cited as a factual score.", "source": "Qwen ①"}, {"id": "87", "question": "What is the evidence status of WMA11/01 Summer 2022 Q3 (Surds) in the review lesson?", "answer": "Q3 was touched briefly but was not a logged lost-mark review. Its exact score is [UNAVAILABLE]. While the guide claims it was \"essentially full,\" no specific mark verification exists in the retained evidence.", "source": "Qwen ①"}, {"id": "88", "question": "Simplify $\\frac{9^{2n+1} \\cdot 3^{4-3n}}{27^{n-1}}$ as a single power of 3, noting this is a supplementary ESAT warm-up and not a paper question.", "answer": "Convert to base 3: $\\frac{(3^2)^{2n+1} \\cdot 3^{4-3n}}{(3^3)^{n-1}} = \\frac{3^{4n+2} \\cdot 3^{4-3n}}{3^{3n-3}} = 3^{(4n+2)+(4-3n)-(3n-3)} = 3^{9-2n}$. Note: This is a supplementary warm-up item, not part of the WMA11 Summer 2022 exam paper.", "source": "Qwen ①"}, {"id": "89", "question": "Why can no verbatim tutor quotes be confirmed from the WMA11/01 Summer 2022 review audio transcript?", "answer": "The audio recording is one-sided, capturing only the student's microphone. The tutor's speech is largely inaudible. Any tutor coaching is inferred from student responses or visual board annotations, not direct audio transcription.", "source": "Qwen ①"}, {"id": "90", "question": "In WMA11/01 Summer 2022 Q7, why is keeping constants exact (e.g., $-\\frac{109}{3}$) critical compared to using rounded decimals?", "answer": "Pure Mathematics mark schemes typically require exact forms for final answers. Converting fractions like $-\\frac{109}{3}$ to decimals introduces rounding errors that invalidate the accuracy mark. Additionally, intermediate rounding in multi-step calculus problems compounds error, leading to incorrect final functions.", "source": "Qwen ①"}, {"id": "91", "question": "What specific limitation applies to the \"visual-lead\" evidence tier regarding the WMA11/01 Summer 2022 review board content?", "answer": "Visual-lead data is derived from automated reads of on-screen content without frame-level verification. It is demonstrably error-prone regarding exact strings and timestamps. It serves only as a lead and never as source authority; official QP/MS and audio transcripts take precedence.", "source": "Qwen ①"}, {"id": "92", "question": "For WMA11/01 Summer 2022 Q4(i), given original min $P(-1,0)$, max $Q(\\frac{3}{2}, 2)$, and asymptote $y=1$, state the transformed features for $y=f(x)-2$.", "answer": "This is a vertical translation by vector $\\begin{pmatrix} 0 \\\\ -2 \\end{pmatrix}$. New Minimum: $(-1, -2)$. New Maximum: $(\\frac{3}{2}, 0)$. New Asymptote: $y = -1$. All $y$-coordinates decrease by 2; $x$-coordinates remain unchanged.", "source": "Qwen ①"}, {"id": "93", "question": "In the context of the WMA11/01 Summer 2022 review, what does the evidence tier [UNAVAILABLE] signify regarding Q8 and Q10?", "answer": "[UNAVAILABLE] signifies that these questions were genuinely not present in any retained lesson artifact (audio or verified video). Although printed on a worksheet, they were not reviewed live. Their scored state is unknown and must not be inferred as blank or attempted based on absence.", "source": "Qwen ①"}]}, "minimax_1": {"label": "MiniMax ①", "cards": [{"id": "94", "question": "Evaluate $\\int\\left(10x^5+6x^3-\\dfrac{3}{x^2}\\right)dx$.", "answer": "Rewrite $\\dfrac{3}{x^2}=3x^{-2}$, then integrate term-by-term: $\\dfrac{10}{6}x^6+\\dfrac{6}{4}x^4+\\dfrac{3}{-1}x^{-1}+c=\\dfrac{5}{3}x^6+\\dfrac{3}{2}x^4+\\dfrac{3}{x}+c$.", "source": "MiniMax ①"}, {"id": "95", "question": "In triangle $ABC$, $AB=21$, $BC=13$, $\\angle BAC=25°$. Find $\\sin x$ (4 d.p.) and the obtuse angle $x$.", "answer": "By the sine rule, $\\dfrac{13}{\\sin 25°}=\\dfrac{21}{\\sin x}$, so $\\sin x=\\dfrac{21\\sin 25°}{13}=0.6827$ (4 d.p.). The required angle is obtuse, so $x=180°-\\arcsin(0.6827)=136.95°$.", "source": "MiniMax ①"}, {"id": "96", "question": "(i) Simplify $\\dfrac{\\sqrt{180}-\\sqrt{80}}{\\sqrt{5}}$. (ii) Rationalise $\\dfrac{4\\sqrt{5}-5}{7-3\\sqrt{5}}$.", "answer": "(i) $\\sqrt{180}=6\\sqrt{5}$, $\\sqrt{80}=4\\sqrt{5}$, so numerator $=2\\sqrt{5}$, giving $\\dfrac{2\\sqrt{5}}{\\sqrt{5}}=2$. (ii) Multiply by $\\dfrac{7+3\\sqrt{5}}{7+3\\sqrt{5}}$: numerator $(4\\sqrt{5}-5)(7+3\\sqrt{5})=28\\sqrt{5}+60-35-15\\sqrt{5}=25+13\\sqrt{5}$; denominator $49-45=4$. Result: $\\dfrac{25}{4}+\\dfrac{13\\sqrt{5}}{4}$.", "source": "MiniMax ①"}, {"id": "97", "question": "Given $y=f(x)$ with minimum $P(-1,0)$, maximum $Q(\\tfrac{2}{3},2)$, asymptote $y=1$, sketch (i) $y=f(x)-2$ and (ii) $y=f(-x)$. State key points and asymptotes.", "answer": "(i) Shift down 2: min $(-1,-2)$, max $(\\tfrac{2}{3},0)$, asymptote $y=-1$. (ii) Reflection in $y$-axis: min $(1,0)$, max $(-\\tfrac{2}{3},2)$, asymptote $y=1$ unchanged (horizontal asymptotes are unaffected by $x\\to -x$).", "source": "MiniMax ①"}, {"id": "98", "question": "Reference-only; not reviewed live; score unknown. Given $f(x)=\\tfrac{4}{3}x^2+\\tfrac{16}{3}x+\\tfrac{20}{3}$, write (a) in completed-square form, (b) find the equation of the line $\\ell_2$ through the roots with gradient $-\\tfrac{5}{4}$, (c) state the region defined by three inequalities.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\tfrac{4}{3}(x+2)^2-\\tfrac{4}{3}$. (b) $y=-\\tfrac{5}{4}x-\\tfrac{25}{4}$. (c) Region bounded by $y=\\tfrac{4}{3}x^2+\\tfrac{16}{3}x+\\tfrac{20}{3}$, $y=-\\tfrac{5}{4}x-\\tfrac{25}{4}$, and the $y$-axis (or as specified by the official inequalities).", "source": "MiniMax ①"}, {"id": "99", "question": "Solve the simultaneous equations that reduce to $2x^4-15x^2-50=0$, giving exact surd pairs.", "answer": "Substitute $u=x^2$: $2u^2-15u-50=0$, factor as $(2u+5)(u-10)=0$. Reject $u=-\\tfrac{5}{2}$ (a square cannot be negative), so $u=10$, giving $x=\\pm\\sqrt{10}$. Back-substitute to obtain the pairs $(\\sqrt{10},4\\sqrt{10})$ and $(-\\sqrt{10},-4\\sqrt{10})$.", "source": "MiniMax ①"}, {"id": "100", "question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ with $f''(4)=0$, find $A$. Then given $f(12)=8\\sqrt{3}$, find $f(x)$.", "answer": "Differentiate: $f''(x)=-x^{-3/2}-2Ax^{-3}$. Set $f''(4)=0$: $-4^{-3/2}-2A\\cdot 4^{-3}=0\\Rightarrow -\\tfrac{1}{8}-\\tfrac{A}{32}=0\\Rightarrow A=-4$. Integrate $f'(x)=2x^{-1/2}-4x^{-2}+3$: $f(x)=4\\sqrt{x}+\\tfrac{4}{x}+3x+c$. Use $f(12)=8\\sqrt{3}$: $4\\sqrt{12}+\\tfrac{4}{12}+36+c=8\\sqrt{3}\\Rightarrow 8\\sqrt{3}+\\tfrac{1}{3}+36+c=8\\sqrt{3}\\Rightarrow c=-\\tfrac{109}{3}$. Hence $f(x)=4\\sqrt{x}+\\tfrac{4}{x}+3x-\\tfrac{109}{3}$.", "source": "MiniMax ①"}, {"id": "101", "question": "Reference-only; not reviewed live; score unknown. A sector/arc \"ceiling-fan\" problem: given radius and perimeter/area conditions, find (a) the angle $\\theta$ and arc length $CD$, (b) the perimeter, (c) the area in $\\text{cm}^2$ and $\\text{m}^2$.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\theta=\\tfrac{5}{3}$ rad, arc $CD=35.9$ cm. (b) Perimeter $=603$ cm. (c) Area $\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$.", "source": "MiniMax ①"}, {"id": "102", "question": "(a) Express three trig quantities in terms of $p$ where $\\sin\\alpha=p$. (b) Sketch $y=\\sin 2x$ and state its period. (c) Solve $\\sin 2x=p$ for $x$ in an appropriate range.", "answer": "(a) Using $\\sin(180°-\\alpha)=\\sin\\alpha$, $-\\sin\\alpha$, and $3-\\sin\\alpha$: the three values are $2p$, $-p$, $3-p$. (b) $y=\\sin 2x$ is a horizontal half-stretch of $y=\\sin x$ (multiply $x$ by 2 inside), so period $=180°$. (c) One root is $x=\\tfrac{\\alpha}{2}$; by symmetry about the maximum at $45°$, the partner in $[0°,90°]$ is $x=90°-\\tfrac{\\alpha}{2}$.", "source": "MiniMax ①"}, {"id": "103", "question": "Reference-only; not reviewed live; score unknown. Given a curve with $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$, (a) state $\\dfrac{dy}{dx}$, (b) form the equation for the normal at a given point, (c) solve for $x$, (d) find $k$.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$. (b) $12x^2+4x-33=0$. (c) $x=\\tfrac{3}{2}$. (d) $k=\\tfrac{5}{4}$.", "source": "MiniMax ①"}, {"id": "104", "question": "State the rule for integrating a power $x^n$ ($n\\neq -1$), and explain the sign trap when integrating $-3x^{-2}$.", "answer": "$\\int x^n\\,dx=\\dfrac{x^{n+1}}{n+1}+c$ (add one to the power, divide by the new power). For $-3x^{-2}$: new power is $-1$, so $\\int -3x^{-2}\\,dx=\\dfrac{-3x^{-1}}{-1}+c=3x^{-1}+c=\\dfrac{3}{x}+c$. The two negatives cancel — the result is positive.", "source": "MiniMax ①"}, {"id": "105", "question": "In the sine rule, why does $\\sin x=0.6827$ give two possible angles, and how do you decide which one the triangle requires?", "answer": "$\\sin\\theta=\\sin(180°-\\theta)$, so every value in $(0,1)$ corresponds to an acute angle $\\theta$ and an obtuse angle $180°-\\theta$. Choose by the triangle's geometry: if the side opposite the unknown angle is the longest (or the configuration forces it), pick the obtuse case; otherwise pick the acute case.", "source": "MiniMax ①"}, {"id": "106", "question": "Why must full 4-d.p. accuracy be carried through the sine rule calculation in Q2?", "answer": "The mark scheme awards an accuracy mark for $\\sin x=0.6827$ (4 d.p.). Rounding early to $0.6830$ loses this mark and propagates a small error into the final angle ($136.93°$ vs $136.95°$), risking a second accuracy mark.", "source": "MiniMax ①"}, {"id": "107", "question": "For $y=f(-x)$, why does the horizontal asymptote $y=1$ stay at $y=1$?", "answer": "The transformation $x\\to -x$ reflects in the $y$-axis; $y$-values are unchanged. A horizontal asymptote $y=k$ is a statement about $y$, not $x$, so it is invariant under reflection in the $y$-axis. (Contrast: a vertical asymptote $x=a$ would move to $x=-a$.)", "source": "MiniMax ①"}, {"id": "108", "question": "In Q6, why is $u=-\\tfrac{5}{2}$ rejected after solving $2u^2-15u-50=0$?", "answer": "$u=x^2$ and $x^2\\geq 0$ for real $x$. A negative value of $u$ has no real square root, so $u=-\\tfrac{5}{2}$ yields no real solutions and must be discarded before taking square roots.", "source": "MiniMax ①"}, {"id": "109", "question": "In Q7 part (a), why does a correct value of $A$ obtained from invalid working score zero?", "answer": "Edexcel mark schemes require the method to justify the answer. A right number from wrong or missing working earns 0 marks for that part — the method marks are independent of the answer mark, and without valid method there is nothing to award.", "source": "MiniMax ①"}, {"id": "110", "question": "Explain the \"horizontal half-stretch\" that turns $y=\\sin x$ into $y=\\sin 2x$, and state the new period.", "answer": "Replacing $x$ by $2x$ inside the function compresses the graph horizontally by factor $\\tfrac{1}{2}$: every $x$-coordinate is halved. The original period $360°$ becomes $180°$. Amplitude and $y$-values are unchanged.", "source": "MiniMax ①"}, {"id": "111", "question": "Given one solution $x=\\tfrac{\\alpha}{2}$ to $\\sin 2x=p$ (with $\\sin\\alpha=p$), use the symmetry of $y=\\sin 2x$ to find the second solution in $[0°,90°]$.", "answer": "$y=\\sin 2x$ has a line of symmetry at its maximum $x=45°$. The two roots in $[0°,90°]$ are equidistant from $45°$, so if one is $\\tfrac{\\alpha}{2}$, the other is $45°+ (45°-\\tfrac{\\alpha}{2})=90°-\\tfrac{\\alpha}{2}$.", "source": "MiniMax ①"}, {"id": "112", "question": "Simplify $\\dfrac{9^{2n+1}\\cdot 3^{4-3n}}{27^{n-1}}$, writing the answer as a power of 3.", "answer": "Convert to base 3: $9^{2n+1}=3^{4n+2}$, $3^{4-3n}=3^{4-3n}$, $27^{n-1}=3^{3n-3}$. Combine exponents: $(4n+2)+(4-3n)-(3n-3)=4n+2+4-3n-3n+3=9-2n$. Result: $3^{9-2n}$.", "source": "MiniMax ①"}, {"id": "113", "question": "State the paper identity for this sitting: qualification, unit code, paper code, sitting, total marks, and number of questions.", "answer": "Pearson Edexcel IAL Pure Mathematics P1, unit WMA11, paper code WMA11/01, question-paper code P69458A, Summer 2022 sitting, 75 marks across 10 questions (Q1–Q10) with mark split $4+5+5+6+9+7+9+10+8+12$.", "source": "MiniMax ①"}, {"id": "114", "question": "What is the honest, evidence-based position on the legacy \"29/75\" total for this paper?", "answer": "The legacy 29/75 is a guide-claim only — not spoken in the audio, not confirmed from any frame, and arithmetically inconsistent with the per-question breakdown (which sums to ≈32/75 under stated assumptions). It is provisional/unreconciled and must not be presented as a fact. The true cover total is unavailable pending frame verification.", "source": "MiniMax ①"}, {"id": "115", "question": "Which questions were reviewed live in this lesson, and which were not?", "answer": "Reviewed live: Q1, Q2, Q4, Q6 (as extra teaching), Q7, Q9. Q3 was touched briefly (exact score unavailable). Q5, Q8, Q10 were NOT reviewed live — their scored state is unknown and they are reference-only.", "source": "MiniMax ①"}, {"id": "116", "question": "State the key takeaway from Q1's integration error.", "answer": "Integrating powers: add one to the power, then divide by the new power. Rewrite $\\dfrac{3}{x^2}$ as $3x^{-2}$ first; watch the sign when the new power is negative ($-3x^{-2}\\to +3x^{-1}=+\\tfrac{3}{x}$).", "source": "MiniMax ①"}, {"id": "117", "question": "State the key takeaway from Q4's graph-transformation error.", "answer": "$y=f(-x)$ reflects in the $y$-axis: $x\\to -x$, $y$ unchanged, so a horizontal asymptote $y=1$ stays put. Correct coordinates alone do not score — the sketched shape and asymptote must also be right.", "source": "MiniMax ①"}, {"id": "118", "question": "State the key takeaway from Q7's differentiation error.", "answer": "The method must justify the answer — a right number from wrong working scores nothing. Differentiate carefully with fractional and negative indices ($x^{-1/2}$, $x^{-2}$) and keep constants exact ($-\\tfrac{109}{3}$, not a rounded decimal).", "source": "MiniMax ①"}, {"id": "119", "question": "State the key takeaway from Q9's trig error.", "answer": "$y=\\sin 2x$: multiply $x$ by 2 inside $\\Rightarrow$ horizontal stretch by factor $\\tfrac{1}{2}$ $\\Rightarrow$ period $180°$. Once you have one solution $x=\\tfrac{\\alpha}{2}$, use the graph's symmetry about $x=45°$ to get the partner $x=90°-\\tfrac{\\alpha}{2}$ in range.", "source": "MiniMax ①"}]}, "minimax_2": {"label": "MiniMax ②", "cards": [{"id": "120", "question": "Evaluate $\\displaystyle\\int\\left(10x^5+6x^3-\\dfrac{3}{x^2}\\right)dx$.", "answer": "Rewrite $\\dfrac{3}{x^2}=3x^{-2}$. Integrating term-by-term: $\\dfrac{10x^6}{6}+\\dfrac{6x^4}{4}+\\dfrac{3x^{-1}}{-1}+c=\\dfrac{5}{3}x^6+\\dfrac{3}{2}x^4+\\dfrac{3}{x}+c$.", "source": "MiniMax ②"}, {"id": "121", "question": "In triangle $ABC$, $AB=21$, $BC=13$, $\\angle BAC=25^\\circ$. Find $\\sin x$ to 4 d.p., then $x$ (the obtuse angle).", "answer": "Sine rule: $\\sin x=\\dfrac{21\\sin 25^\\circ}{13}=0.6827$ (4 d.p.). Acute value $\\arcsin(0.6827)=43.05^\\circ$; obtuse case $x=180^\\circ-43.05^\\circ=136.95^\\circ$.", "source": "MiniMax ②"}, {"id": "122", "question": "Simplify (i) $\\sqrt{180}-\\sqrt{80}$ over $\\sqrt{5}$, and (ii) rationalise $\\dfrac{4\\sqrt{5}-5}{7-3\\sqrt{5}}$.", "answer": "(i) $\\sqrt{180}=6\\sqrt5$, $\\sqrt{80}=4\\sqrt5$, so $\\dfrac{6\\sqrt5-4\\sqrt5}{\\sqrt5}=\\dfrac{2\\sqrt5}{\\sqrt5}=2$. (ii) Multiply by $\\dfrac{7+3\\sqrt5}{7+3\\sqrt5}$: numerator $(4\\sqrt5-5)(7+3\\sqrt5)=28\\sqrt5+60-35-15\\sqrt5=13\\sqrt5+25$; denominator $49-45=4$. Result $\\dfrac{25+13\\sqrt5}{4}=\\dfrac{25}{4}+\\dfrac{13\\sqrt5}{4}$.", "source": "MiniMax ②"}, {"id": "123", "question": "Given $y=f(x)$ with minimum $P(-1,0)$, maximum $Q\\!\\left(\\tfrac{2}{3},2\\right)$ and asymptote $y=1$, sketch (i) $y=f(x)-2$ and (ii) $y=f(-x)$. Give key points and asymptotes.", "answer": "(i) Shift down 2: min $(-1,-2)$, max $\\!\\left(\\tfrac{2}{3},0\\right)$, asymptote $y=-1$. (ii) Reflect in the $y$-axis ($x\\to -x$, $y$ unchanged): min $(1,0)$, max $\\!\\left(-\\tfrac{2}{3},2\\right)$, asymptote $y=1$ unchanged.", "source": "MiniMax ②"}, {"id": "124", "question": "Reference-only; not reviewed live; score unknown. The completed-square/line/region question on this paper has official answers: (a) $-\\tfrac{3}{4}(x+2)^2+12=-\\tfrac{3}{4}(x-1)(x+5)=-\\tfrac{3}{4}x^2-\\tfrac{16}{3}x+\\tfrac{20}{3}$; (b) $\\ell_2: y=-\\tfrac{5}{4}x-\\tfrac{25}{4}$; (c) region from three inequalities. State these three official results.", "answer": "Reference-only; not reviewed live; score unknown. (a) $-\\tfrac{3}{4}(x+2)^2+12=-\\tfrac{3}{4}(x-1)(x+5)=-\\tfrac{3}{4}x^2-\\tfrac{16}{3}x+\\tfrac{20}{3}$. (b) $\\ell_2: y=-\\tfrac{5}{4}x-\\tfrac{25}{4}$. (c) Region defined by three inequalities (per official mark scheme).", "source": "MiniMax ②"}, {"id": "125", "question": "Solve the simultaneous equations that reduce to $2x^4-15x^2-50=0$, giving exact surd pairs.", "answer": "Let $u=x^2$: $2u^2-15u-50=0=(2u+5)(u-10)$. Reject $u=-\\tfrac{5}{2}$. Take $u=10\\Rightarrow x^2=10$, so $x=\\pm\\sqrt{10}$. Back-substitute into the original pair to obtain $\\left(\\sqrt{10},\\,4\\sqrt{10}\\right)$ and $\\left(-\\sqrt{10},\\,-4\\sqrt{10}\\right)$.", "source": "MiniMax ②"}, {"id": "126", "question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ with $f''(4)=0$, find $A$. Then with $f(12)=8\\sqrt{3}$, find $f(x)$.", "answer": "$f''(x)=-x^{-3/2}-2Ax^{-3}$. Set $f''(4)=0$: $-4^{-3/2}-2A\\cdot 4^{-3}=0\\Rightarrow -\\tfrac{1}{8}-\\tfrac{A}{32}=0\\Rightarrow A=-4$. Integrate: $f(x)=4x^{1/2}-4x^{-1}+3x+c=4\\sqrt{x}+\\tfrac{4}{x}+3x+c$. Use $f(12)=8\\sqrt{3}$: $4\\sqrt{12}+\\tfrac{4}{12}+36+c=8\\sqrt{3}\\Rightarrow 8\\sqrt{3}+\\tfrac{1}{3}+36+c=8\\sqrt{3}\\Rightarrow c=-\\tfrac{109}{3}$. Hence $f(x)=4\\sqrt{x}+\\dfrac{4}{x}+3x-\\dfrac{109}{3}$.", "source": "MiniMax ②"}, {"id": "127", "question": "Reference-only; not reviewed live; score unknown. The sector/arc problem on this paper has official answers: (a) $\\theta=\\tfrac{5}{3}$ rad, arc $CD=35.9$ cm; (b) perimeter $=603$ cm; (c) area $\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$. State these three official results.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\theta=\\tfrac{5}{3}$ rad, arc $CD=35.9$ cm. (b) Perimeter $=603$ cm. (c) Area $\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$.", "source": "MiniMax ②"}, {"id": "128", "question": "(a) If $\\cos\\alpha=p$, express $2\\cos 2\\alpha$, $\\sin(\\alpha+180^\\circ)$, and $3-\\cos(90^\\circ-\\alpha)$ in terms of $p$. (b) State the period of $y=\\sin 2x$. (c) Solve $\\sin 2x=p$ for $x\\in[0,180^\\circ]$, given $\\sin\\alpha=p$.", "answer": "(a) $2(2p^2-1)=4p^2-2$; $-\\sin\\alpha=-\\sqrt{1-p^2}$ (or use $-\\sin\\alpha$ form); $3-\\sin\\alpha=3-\\sqrt{1-p^2}$. (b) Period $=180^\\circ$ (half-stretch of $y=\\sin x$). (c) $2x=\\alpha$ or $2x=180^\\circ-\\alpha$, so $x=\\tfrac{\\alpha}{2}$ or $x=90^\\circ-\\tfrac{\\alpha}{2}$.", "source": "MiniMax ②"}, {"id": "129", "question": "Reference-only; not reviewed live; score unknown. The normal-to-a-curve question on this paper has official answers: (a) $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$; (b) $12x^2+4x-33=0$; (c) $x=\\tfrac{3}{2}$; (d) $k=\\tfrac{5}{4}$. State these four official results.", "answer": "Reference-only; not reviewed live; score unknown. (a) $\\dfrac{dy}{dx}=\\tfrac{6}{7}x^2+\\tfrac{2}{7}x-\\tfrac{5}{2}$. (b) $12x^2+4x-33=0$. (c) $x=\\tfrac{3}{2}$. (d) $k=\\tfrac{5}{4}$.", "source": "MiniMax ②"}, {"id": "130", "question": "State the rule for integrating a power $x^n$, including the case $n=-1$.", "answer": "$\\displaystyle\\int x^n\\,dx=\\dfrac{x^{n+1}}{n+1}+c$ for $n\\neq -1$. Equivalently: add 1 to the power, then divide by the new power. For $n=-1$: $\\displaystyle\\int \\dfrac{1}{x}dx=\\ln|x|+c$.", "source": "MiniMax ②"}, {"id": "131", "question": "Why does a horizontal asymptote $y=1$ stay at $y=1$ under the transformation $y=f(-x)$?", "answer": "$y=f(-x)$ replaces $x$ with $-x$ only; $y$-values are unchanged. As $x\\to\\pm\\infty$, $f(-x)\\to 1$, so the asymptote $y=1$ is preserved. Horizontal asymptotes depend on $y$, not on $x$.", "source": "MiniMax ②"}, {"id": "132", "question": "The sine rule gives $\\sin x=0.6827$ and the triangle forces the obtuse angle. Find $x$ to 2 d.p.", "answer": "Acute candidate $\\arcsin(0.6827)=43.05^\\circ$. Obtuse case $x=180^\\circ-43.05^\\circ=136.95^\\circ$.", "source": "MiniMax ②"}, {"id": "133", "question": "Explain why a correct final answer obtained from invalid working scores 0 marks under Edexcel P1 marking.", "answer": "Marks are awarded for method, not just the answer. Each mark is tied to a specific reasoning step (M marks) or accuracy of follow-through (A marks). If the working that produces a value is invalid, the dependent marks are not earned even if the number happens to be right.", "source": "MiniMax ②"}, {"id": "134", "question": "State the period of $y=\\sin 2x$ and describe the transformation from $y=\\sin x$.", "answer": "Period $=180^\\circ$. Multiplying $x$ by 2 inside the function compresses the graph horizontally by factor $\\tfrac{1}{2}$: every $x$-coordinate is halved, so the $360^\\circ$ period becomes $180^\\circ$; $y$-values are unchanged.", "source": "MiniMax ②"}, {"id": "135", "question": "Given $\\sin\\alpha=p$ with $0<\\alpha<90^\\circ$, solve $\\sin 2x=p$ for $x\\in[0,180^\\circ]$.", "answer": "Set $2x=\\alpha$ giving $x=\\tfrac{\\alpha}{2}$. By symmetry of sine about $90^\\circ$, the partner is $2x=180^\\circ-\\alpha$, i.e. $x=90^\\circ-\\tfrac{\\alpha}{2}$. Solutions: $x=\\tfrac{\\alpha}{2}$ and $x=90^\\circ-\\tfrac{\\alpha}{2}$.", "source": "MiniMax ②"}, {"id": "136", "question": "Solve $2x^4-15x^2-50=0$ exactly, rejecting any non-real roots.", "answer": "Substitute $u=x^2$: $2u^2-15u-50=(2u+5)(u-10)=0$. Roots $u=-\\tfrac{5}{2}$ (reject: $x^2\\ge 0$) and $u=10$. Hence $x^2=10\\Rightarrow x=\\pm\\sqrt{10}$.", "source": "MiniMax ②"}, {"id": "137", "question": "Differentiate $f(x)=4\\sqrt{x}+\\dfrac{4}{x}+3x-\\dfrac{109}{3}$ and verify $f''(4)=0$ when $A=-4$.", "answer": "$f'(x)=2x^{-1/2}-4x^{-2}+3$. $f''(x)=-x^{-3/2}+8x^{-3}$. At $x=4$: $f''(4)=-4^{-3/2}+8\\cdot 4^{-3}=-\\tfrac{1}{8}+\\tfrac{8}{64}=-\\tfrac{1}{8}+\\tfrac{1}{8}=0$. ✓", "source": "MiniMax ②"}, {"id": "138", "question": "Express $\\cos 2\\alpha$ and $\\sin(\\alpha+180^\\circ)$ in terms of $p=\\cos\\alpha$.", "answer": "$\\cos 2\\alpha=2\\cos^2\\alpha-1=2p^2-1$. $\\sin(\\alpha+180^\\circ)=-\\sin\\alpha$, and $\\sin\\alpha=\\sqrt{1-p^2}$ (taking $\\alpha$ in the first quadrant), so $\\sin(\\alpha+180^\\circ)=-\\sqrt{1-p^2}$.", "source": "MiniMax ②"}, {"id": "139", "question": "The legacy guide records a paper total of \"29/75\". What is the evidence status of this figure?", "answer": "Unreconciled/provisional — a [GUIDE-CLAIM] only. It was not spoken in the lesson audio, not confirmed from any frame, and does not arithmetically match the per-question breakdown (which sums to ≈32/75 with declared gaps). It must not be presented as a reconciled fact.", "source": "MiniMax ②"}, {"id": "140", "question": "State the lesson-reviewed correction for the Q1 integration slip, including the sign handling for $\\int -3x^{-2}dx$.", "answer": "Rewrite $\\dfrac{3}{x^2}=3x^{-2}$. Integrating: $\\int 3x^{-2}dx=\\dfrac{3x^{-1}}{-1}=-\\dfrac{3}{x}=\\dfrac{3}{x}\\cdot(-1)$. Equivalently $\\int -3x^{-2}dx=\\dfrac{-3x^{-1}}{-1}=\\dfrac{3}{x}$. Final: $\\dfrac{5}{3}x^6+\\dfrac{3}{2}x^4+\\dfrac{3}{x}+c$. Rule restated: add 1 to the power, divide by the new power; watch the sign when the new power is negative.", "source": "MiniMax ②"}, {"id": "141", "question": "State the lesson-reviewed correction for Q2's sine-rule accuracy loss.", "answer": "Carry full 4-decimal-place accuracy through the sine rule: $\\sin x=\\dfrac{21\\sin 25^\\circ}{13}=0.6827$ (not $0.6830$). The sine rule always offers two angles, $\\theta$ and $180^\\circ-\\theta$; pick the one the triangle configuration requires (here, obtuse: $136.95^\\circ$).", "source": "MiniMax ②"}, {"id": "142", "question": "State the lesson-reviewed correction for Q4's transformation error on $y=f(-x)$.", "answer": "$y=f(-x)$ is a reflection in the $y$-axis: $x\\to -x$, $y$ unchanged. Coordinates: min becomes $(1,0)$, max becomes $\\!\\left(-\\tfrac{2}{3},2\\right)$; the horizontal asymptote $y=1$ is unchanged. Correct coordinates alone do not score — the sketched shape and asymptote must also be correct.", "source": "MiniMax ②"}, {"id": "143", "question": "State the lesson-reviewed correction for Q9's trig errors (symmetry root and period).", "answer": "Symmetry root: once one solution $x=\\tfrac{\\alpha}{2}$ is found, the partner uses the $-\\sin\\alpha$ symmetry about the line of symmetry, giving $x=90^\\circ-\\tfrac{\\alpha}{2}$ in $[0,180^\\circ]$. Period: $y=\\sin 2x$ is a horizontal half-stretch of $y=\\sin x$, so period $=180^\\circ$.", "source": "MiniMax ②"}, {"id": "144", "question": "Give the supplementary ESAT warm-up result: simplify $\\dfrac{9^{2n+1}\\cdot 3^{4-3n}}{27^{n-1}}$.", "answer": "Convert to base 3: $9^{2n+1}=3^{4n+2}$, $3^{4-3n}=3^{4-3n}$, $27^{n-1}=3^{3n-3}$. Exponent: $(4n+2)+(4-3n)-(3n-3)=4n+2+4-3n-3n+3=9-2n$. Result: $3^{9-2n}$.", "source": "MiniMax ②"}]}, "gpt56sol_1": {"label": "GPT-5.6 Sol ①", "cards": [{"id": "145", "question": "Evaluate $\\displaystyle \\int\\left(10x^5+6x^3-\\frac{3}{x^2}\\right)\\,dx$.", "answer": "Rewrite $-\\dfrac{3}{x^2}=-3x^{-2}$. Then\n\\[\n\\int\\left(10x^5+6x^3-3x^{-2}\\right)\\,dx\n=\\frac{10}{6}x^6+\\frac{6}{4}x^4+\\frac{-3}{-1}x^{-1}+c\n=\\frac53x^6+\\frac32x^4+\\frac3x+c.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "146", "question": "State the power rule for indefinite integration and explain the sign of $\\displaystyle \\int-3x^{-2}\\,dx$.", "answer": "For $n\\ne-1$,\n\\[\n\\int ax^n\\,dx=\\frac{a}{n+1}x^{n+1}+c.\n\\]\nThus\n\\[\n\\int-3x^{-2}\\,dx=\\frac{-3}{-1}x^{-1}+c=3x^{-1}+c=\\frac3x+c.\n\\]\nThe result is positive because the new power is $-1$, so dividing by it reverses the sign.", "source": "GPT-5.6 Sol ①"}, {"id": "147", "question": "In a triangle, $AB=21$, $BC=13$, and $\\angle BAC=25^\\circ$. The angle $x$ opposite the side of length $21$ is obtuse. Find $\\sin x$ to $4$ decimal places and hence find $x$.", "answer": "By the sine rule,\n\\[\n\\frac{\\sin x}{21}=\\frac{\\sin25^\\circ}{13},\n\\qquad\n\\sin x=\\frac{21\\sin25^\\circ}{13}=0.6827\\quad(4\\text{ d.p.}).\n\\]\nThe acute calculator value is $\\arcsin(0.6827)$, but $x$ is obtuse, so\n\\[\nx=180^\\circ-\\arcsin(0.6827)=136.95^\\circ.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "148", "question": "If $\\sin\\theta=0.6827$ and the required angle satisfies $90^\\circ<\\theta<180^\\circ$, how should $\\theta$ be found?", "answer": "Since $\\sin\\theta$ is positive in quadrants I and II, the two relevant angles are\n\\[\n\\theta_1=\\arcsin(0.6827)\n\\quad\\text{and}\\quad\n\\theta_2=180^\\circ-\\theta_1.\n\\]\nThe required angle is obtuse, so\n\\[\n\\theta=180^\\circ-\\arcsin(0.6827).\n\\]\nFull unrounded calculator accuracy should be retained until the final answer.", "source": "GPT-5.6 Sol ①"}, {"id": "149", "question": "Simplify $\\displaystyle \\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}$.", "answer": "Since\n\\[\n\\sqrt{180}=6\\sqrt5,\\qquad \\sqrt{80}=4\\sqrt5,\n\\]\n\\[\n\\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}\n=\\frac{6\\sqrt5-4\\sqrt5}{\\sqrt5}\n=\\frac{2\\sqrt5}{\\sqrt5}=2.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "150", "question": "Rationalise and simplify $\\displaystyle \\frac{4\\sqrt5-5}{7-3\\sqrt5}$.", "answer": "Multiply numerator and denominator by $7+3\\sqrt5$:\n\\[\n\\frac{4\\sqrt5-5}{7-3\\sqrt5}\\cdot\\frac{7+3\\sqrt5}{7+3\\sqrt5}\n=\\frac{(4\\sqrt5-5)(7+3\\sqrt5)}{49-45}.\n\\]\nThe numerator is\n\\[\n28\\sqrt5+60-35-15\\sqrt5=25+13\\sqrt5,\n\\]\nso the result is\n\\[\n\\frac{25+13\\sqrt5}{4}\n=\\frac{25}{4}+\\frac{13}{4}\\sqrt5.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "151", "question": "A graph $y=f(x)$ has minimum $(-1,0)$, maximum $\\left(\\frac23,2\\right)$, and horizontal asymptote $y=1$. State the corresponding features of $y=f(x)-2$.", "answer": "The transformation $y=f(x)-2$ translates every point vertically down by $2$:\n\\[\n(-1,0)\\mapsto(-1,-2),\\qquad\n\\left(\\frac23,2\\right)\\mapsto\\left(\\frac23,0\\right).\n\\]\nThe horizontal asymptote becomes\n\\[\ny=1-2=-1.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "152", "question": "A graph $y=f(x)$ has minimum $(-1,0)$, maximum $\\left(\\frac23,2\\right)$, and horizontal asymptote $y=1$. State the corresponding features of $y=f(-x)$.", "answer": "The transformation $y=f(-x)$ is a reflection in the $y$-axis, so $(x,y)\\mapsto(-x,y)$. Hence\n\\[\n(-1,0)\\mapsto(1,0),\\qquad\n\\left(\\frac23,2\\right)\\mapsto\\left(-\\frac23,2\\right).\n\\]\nThe horizontal asymptote remains $y=1$ because all $y$-coordinates are unchanged.", "source": "GPT-5.6 Sol ①"}, {"id": "153", "question": "Distinguish the transformations $y=f(x)-2$ and $y=f(-x)$, including their effects on a horizontal asymptote $y=a$.", "answer": "For\n\\[\ny=f(x)-2,\n\\]\nall $y$-coordinates decrease by $2$, so the graph shifts down and $y=a$ becomes $y=a-2$. For\n\\[\ny=f(-x),\n\\]\nall $x$-coordinates change sign while $y$-coordinates remain unchanged, so the graph reflects in the $y$-axis and the horizontal asymptote remains $y=a$.", "source": "GPT-5.6 Sol ①"}, {"id": "154", "question": "Reference-only; not reviewed live; score unknown. Rewrite $\\displaystyle -\\frac34(x-1)(x+5)$ in completed-square form and expanded form.", "answer": "Reference-only; not reviewed live; score unknown. Expanding gives\n\\[\n-\\frac34(x-1)(x+5)\n=-\\frac34(x^2+4x-5)\n=-\\frac34x^2-3x+\\frac{15}{4}.\n\\]\nCompleting the square,\n\\[\n-\\frac34(x^2+4x-5)\n=-\\frac34\\bigl((x+2)^2-9\\bigr)\n=\\frac{27}{4}-\\frac34(x+2)^2.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "155", "question": "Reference-only; not reviewed live; score unknown. State the official equation of the line $\\ell_2$ in Q5.", "answer": "Reference-only; not reviewed live; score unknown. The official equation is\n\\[\n\\ell_2:\\quad y=-\\frac54x-\\frac{25}{4}.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "156", "question": "Solve $2x^4-15x^2-50=0$ exactly, showing why one factor gives no real solutions.", "answer": "Treat the equation as a quadratic in $x^2$:\n\\[\n2x^4-15x^2-50=(2x^2+5)(x^2-10)=0.\n\\]\nThus\n\\[\nx^2=-\\frac52\\quad\\text{or}\\quad x^2=10.\n\\]\nThe first is impossible for real $x$ because $x^2\\ge0$. Therefore\n\\[\nx=\\pm\\sqrt{10}.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "157", "question": "A simultaneous-equation problem reduces to $(2x^2+5)(x^2-10)=0$ and back-substitution gives $y=4x$. Find all real solution pairs.", "answer": "From\n\\[\n(2x^2+5)(x^2-10)=0,\n\\]\nthe equation $x^2=-\\frac52$ is rejected for real $x$, while $x^2=10$ gives\n\\[\nx=\\pm\\sqrt{10}.\n\\]\nSince $y=4x$, the solution pairs are\n\\[\n(\\sqrt{10},4\\sqrt{10})\n\\quad\\text{and}\\quad\n(-\\sqrt{10},-4\\sqrt{10}).\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "158", "question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ and $f''(4)=0$, find $A$.", "answer": "Differentiate:\n\\[\nf''(x)=-x^{-3/2}-2Ax^{-3}.\n\\]\nUsing $f''(4)=0$,\n\\[\n-4^{-3/2}-2A(4^{-3})=0.\n\\]\nSince $4^{-3/2}=\\frac18$ and $4^{-3}=\\frac1{64}$,\n\\[\n-\\frac18-\\frac{A}{32}=0.\n\\]\nMultiplying by $32$ gives $-4-A=0$, so\n\\[\nA=-4.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "159", "question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$, find the general form of $f(x)$.", "answer": "Integrate term by term:\n\\[\nf(x)=\\int\\left(2x^{-1/2}-4x^{-2}+3\\right)\\,dx.\n\\]\nTherefore\n\\[\nf(x)=4x^{1/2}+4x^{-1}+3x+C\n=4\\sqrt{x}+\\frac4x+3x+C.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "160", "question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$ and $f(12)=8\\sqrt3$, find $f(x)$ exactly.", "answer": "First integrate:\n\\[\nf(x)=4\\sqrt{x}+\\frac4x+3x+C.\n\\]\nUsing $f(12)=8\\sqrt3$,\n\\[\n8\\sqrt3+\\frac13+36+C=8\\sqrt3,\n\\]\nso\n\\[\nC=-36-\\frac13=-\\frac{109}{3}.\n\\]\nHence\n\\[\nf(x)=4\\sqrt{x}+\\frac4x+3x-\\frac{109}{3}.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "161", "question": "Reference-only; not reviewed live; score unknown. State the official Q8 sector-and-arc results for $\\theta$, arc $CD$, the perimeter, and the area.", "answer": "Reference-only; not reviewed live; score unknown. The official results are\n\\[\n\\theta=\\frac53,\\qquad \\text{arc }CD=35.9\\text{ cm},\n\\]\n\\[\n\\text{perimeter}=603\\text{ cm},\n\\]\nand\n\\[\n\\text{area}\\approx4730\\text{ cm}^2=0.473\\text{ m}^2.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "162", "question": "Describe the transformation from $y=\\sin x$ to $y=\\sin 2x$ and state the new period in degrees.", "answer": "Multiplying $x$ by $2$ inside the function produces a horizontal stretch with scale factor $\\frac12$, equivalently a horizontal compression by factor $2$. Since $y=\\sin x$ has period $360^\\circ$,\n\\[\n\\text{new period}=\\frac{360^\\circ}{2}=180^\\circ.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "163", "question": "Given that $\\sin\\alpha=p$, solve $\\sin2x=p$ for the two corresponding solutions in one $180^\\circ$ period of $y=\\sin2x$.", "answer": "Since $\\sin\\alpha=p$,\n\\[\n2x=\\alpha\n\\quad\\text{or}\\quad\n2x=180^\\circ-\\alpha.\n\\]\nDividing by $2$ gives\n\\[\nx=\\frac{\\alpha}{2}\n\\quad\\text{or}\\quad\nx=90^\\circ-\\frac{\\alpha}{2}.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "164", "question": "State the key intercepts and turning points of $y=\\sin2x$ for $0^\\circ\\le x\\le360^\\circ$.", "answer": "The zeros satisfy $2x=0^\\circ,180^\\circ,360^\\circ,540^\\circ,720^\\circ$, so\n\\[\nx=0^\\circ,90^\\circ,180^\\circ,270^\\circ,360^\\circ.\n\\]\nThe maxima occur when $2x=90^\\circ+360^\\circ k$, giving\n\\[\n(45^\\circ,1),\\qquad(225^\\circ,1).\n\\]\nThe minima occur when $2x=270^\\circ+360^\\circ k$, giving\n\\[\n(135^\\circ,-1),\\qquad(315^\\circ,-1).\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "165", "question": "Reference-only; not reviewed live; score unknown. State the official derivative and resulting quadratic equation from Q10.", "answer": "Reference-only; not reviewed live; score unknown. The official derivative is\n\\[\n\\frac{dy}{dx}=\\frac67x^2+\\frac27x-\\frac52,\n\\]\nand the resulting quadratic equation is\n\\[\n12x^2+4x-33=0.\n\\]", "source": "GPT-5.6 Sol ①"}, {"id": "166", "question": "Reference-only; not reviewed live; score unknown. State the official values of $x$ and $k$ obtained in Q10.", "answer": "Reference-only; not reviewed live; score unknown. The official values are\n\\[\nx=\\frac32\n\\qquad\\text{and}\\qquad\nk=\\frac54.\n\\]", "source": "GPT-5.6 Sol ①"}]}, "gpt56sol_2": {"label": "GPT-5.6 Sol ②", "cards": [{"id": "167", "question": "Evaluate $\\displaystyle \\int \\left(10x^5+6x^3-\\frac{3}{x^2}\\right)\\,dx$.", "answer": "Rewrite $\\displaystyle -\\frac{3}{x^2}=-3x^{-2}$. Then\n\\[\n\\int(10x^5+6x^3-3x^{-2})\\,dx\n=\\frac{10}{6}x^6+\\frac{6}{4}x^4+\\frac{-3}{-1}x^{-1}+C\n=\\frac53x^6+\\frac32x^4+\\frac3x+C.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "168", "question": "State the power rule for indefinite integration and apply it to $\\displaystyle \\int -3x^{-2}\\,dx$.", "answer": "For $n\\ne-1$,\n\\[\n\\int ax^n\\,dx=\\frac{a}{n+1}x^{n+1}+C.\n\\]\nHence\n\\[\n\\int -3x^{-2}\\,dx=\\frac{-3}{-1}x^{-1}+C=3x^{-1}+C=\\frac3x+C.\n\\]\nThe new exponent is $-1$, so the negative coefficient becomes positive after division by $-1$.", "source": "GPT-5.6 Sol ②"}, {"id": "169", "question": "In triangle $ABC$, $AB=21$, $BC=13$ and $\\angle BAC=25^\\circ$. Calculate $\\sin x$ to $4$ decimal places, where $x$ is the angle opposite $AB$.", "answer": "By the sine rule,\n\\[\n\\frac{\\sin x}{21}=\\frac{\\sin25^\\circ}{13},\n\\qquad\n\\sin x=\\frac{21\\sin25^\\circ}{13}=0.6827\n\\]\nto $4$ decimal places.", "source": "GPT-5.6 Sol ②"}, {"id": "170", "question": "Given $\\sin x=0.6827$ and the triangle requires $x$ to be obtuse, find $x$.", "answer": "The acute solution is\n\\[\n\\arcsin(0.6827)\\approx43.05^\\circ.\n\\]\nSince $\\sin\\theta=\\sin(180^\\circ-\\theta)$ and $x$ must be obtuse,\n\\[\nx=180^\\circ-43.05^\\circ=136.95^\\circ.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "171", "question": "Simplify $\\displaystyle \\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}$.", "answer": "Since $\\sqrt{180}=6\\sqrt5$ and $\\sqrt{80}=4\\sqrt5$,\n\\[\n\\frac{\\sqrt{180}-\\sqrt{80}}{\\sqrt5}\n=\\frac{6\\sqrt5-4\\sqrt5}{\\sqrt5}\n=\\frac{2\\sqrt5}{\\sqrt5}=2.\n\\]\nThe exact score for Q3 is unavailable.", "source": "GPT-5.6 Sol ②"}, {"id": "172", "question": "Rationalise and simplify $\\displaystyle \\frac{4\\sqrt5-5}{7-3\\sqrt5}$.", "answer": "Multiply by the conjugate $7+3\\sqrt5$:\n\\[\n\\frac{4\\sqrt5-5}{7-3\\sqrt5}\\cdot\\frac{7+3\\sqrt5}{7+3\\sqrt5}\n=\\frac{(4\\sqrt5-5)(7+3\\sqrt5)}{49-45}.\n\\]\nThe numerator is\n\\[\n28\\sqrt5+60-35-15\\sqrt5=25+13\\sqrt5,\n\\]\nso the result is\n\\[\n\\frac{25+13\\sqrt5}{4}=\\frac{25}{4}+\\frac{13}{4}\\sqrt5.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "173", "question": "A graph $y=f(x)$ has minimum $(-1,0)$, maximum $\\left(\\frac23,2\\right)$ and horizontal asymptote $y=1$. State these features after the transformation $y=f(x)-2$.", "answer": "The graph is translated vertically down by $2$. Therefore:\n\\[\n(-1,0)\\mapsto(-1,-2),\\qquad\n\\left(\\frac23,2\\right)\\mapsto\\left(\\frac23,0\\right),\n\\]\nand the horizontal asymptote becomes\n\\[\ny=1-2=-1.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "174", "question": "A graph $y=f(x)$ has minimum $(-1,0)$, maximum $\\left(\\frac23,2\\right)$ and horizontal asymptote $y=1$. State these features after the transformation $y=f(-x)$.", "answer": "The graph is reflected in the $y$-axis, so $(x,y)\\mapsto(-x,y)$. Thus\n\\[\n(-1,0)\\mapsto(1,0),\\qquad\n\\left(\\frac23,2\\right)\\mapsto\\left(-\\frac23,2\\right).\n\\]\nThe $y$-coordinates are unchanged, so the horizontal asymptote remains $y=1$.", "source": "GPT-5.6 Sol ②"}, {"id": "175", "question": "Reference-only; not reviewed live; score unknown. Show that $\\displaystyle 12-\\frac34(x+2)^2$ is equivalent to $\\displaystyle -\\frac34(x-1)(x+5)$.", "answer": "Reference-only; not reviewed live; score unknown. Expanding the completed-square form,\n\\[\n12-\\frac34(x+2)^2\n=12-\\frac34(x^2+4x+4)\n=-\\frac34x^2-3x+9.\n\\]\nAlso,\n\\[\n-\\frac34(x-1)(x+5)\n=-\\frac34(x^2+4x-5)\n=-\\frac34x^2-3x+\\frac{15}{4}.\n\\]\nThese displayed forms are not algebraically equivalent, so the equality cannot be established as written from the frozen guide’s stated expressions.", "source": "GPT-5.6 Sol ②"}, {"id": "176", "question": "Reference-only; not reviewed live; score unknown. What is the official reference equation of the line $\\ell_2$ in Q5?", "answer": "Reference-only; not reviewed live; score unknown. The official reference equation is\n\\[\n\\ell_2:\\quad y=-\\frac54x-\\frac{25}{4}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "177", "question": "Solve the quartic equation $2x^4-15x^2-50=0$, showing the hidden-quadratic method.", "answer": "Let $u=x^2$. Then\n\\[\n2u^2-15u-50=0=(2u+5)(u-10).\n\\]\nThus\n\\[\nu=-\\frac52\\quad\\text{or}\\quad u=10.\n\\]\nSince $u=x^2\\ge0$ for real $x$, reject $u=-\\frac52$. Therefore\n\\[\nx^2=10\\implies x=\\pm\\sqrt{10}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "178", "question": "The simultaneous equations reduce to $2x^4-15x^2-50=0$. What real $x$-values survive, and what are the official exact solution pairs after back-substitution?", "answer": "Factorising gives\n\\[\n(2x^2+5)(x^2-10)=0.\n\\]\nReject $x^2=-\\frac52$ because a real square cannot be negative. Hence\n\\[\nx=\\pm\\sqrt{10}.\n\\]\nThe official exact solution pairs are\n\\[\n(\\sqrt{10},\\,4\\sqrt{10})\n\\quad\\text{and}\\quad\n(-\\sqrt{10},\\,-4\\sqrt{10}).\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "179", "question": "Given $f'(x)=2x^{-1/2}+Ax^{-2}+3$ and $f''(4)=0$, find $A$.", "answer": "Differentiate:\n\\[\nf''(x)=-x^{-3/2}-2Ax^{-3}.\n\\]\nUsing $f''(4)=0$,\n\\[\n-4^{-3/2}-2A(4^{-3})=0.\n\\]\nSince $4^{-3/2}=\\frac18$ and $4^{-3}=\\frac1{64}$,\n\\[\n-\\frac18-\\frac{A}{32}=0.\n\\]\nMultiplying by $32$ gives $-4-A=0$, so\n\\[\nA=-4.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "180", "question": "Given $f'(x)=2x^{-1/2}-4x^{-2}+3$ and $f(12)=8\\sqrt3$, find $f(x)$ exactly.", "answer": "Integrating,\n\\[\nf(x)=4x^{1/2}+4x^{-1}+3x+C\n=4\\sqrt{x}+\\frac4x+3x+C.\n\\]\nNow\n\\[\nf(12)=4\\sqrt{12}+\\frac4{12}+36+C\n=8\\sqrt3+\\frac13+36+C.\n\\]\nSince $f(12)=8\\sqrt3$,\n\\[\nC=-36-\\frac13=-\\frac{109}{3}.\n\\]\nTherefore\n\\[\nf(x)=4\\sqrt{x}+\\frac4x+3x-\\frac{109}{3}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "181", "question": "Why can a correct final value receive no marks if it follows from invalid algebra or calculus?", "answer": "A final value must be justified by valid mathematical working. If the method contains invalid steps that do not logically imply the answer, the correct value is unsupported and may score $0$. For example, finding $A=-4$ from $f''(4)=0$ requires correctly differentiating fractional and negative powers before substituting $x=4$.", "source": "GPT-5.6 Sol ②"}, {"id": "182", "question": "Reference-only; not reviewed live; score unknown. State the official reference answers for the Q8 sector-and-arc problem.", "answer": "Reference-only; not reviewed live; score unknown. The official reference answers are\n\\[\n\\theta=\\frac53,\\qquad \\text{arc }CD=35.9\\text{ cm},\n\\]\n\\[\n\\text{perimeter}=603\\text{ cm},\n\\]\nand\n\\[\n\\text{area}\\approx4730\\text{ cm}^2=0.473\\text{ m}^2.\n\\]\nQ8 was printed but not solved live.", "source": "GPT-5.6 Sol ②"}, {"id": "183", "question": "Describe the transformation from $y=\\sin x$ to $y=\\sin2x$ and state the period of $y=\\sin2x$ in degrees.", "answer": "Replacing $x$ by $2x$ produces a horizontal stretch with scale factor $\\frac12$, so every $x$-coordinate is halved. Since $y=\\sin x$ has period $360^\\circ$,\n\\[\n\\text{period of }y=\\sin2x=\\frac{360^\\circ}{2}=180^\\circ.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "184", "question": "If $\\sin\\alpha=p$, solve $\\sin2x=p$ for the two standard solutions corresponding to one $180^\\circ$ period of $y=\\sin2x$.", "answer": "Since $\\sin2x=\\sin\\alpha$,\n\\[\n2x=\\alpha\n\\quad\\text{or}\\quad\n2x=180^\\circ-\\alpha.\n\\]\nTherefore\n\\[\nx=\\frac{\\alpha}{2}\n\\quad\\text{or}\\quad\nx=90^\\circ-\\frac{\\alpha}{2}.\n\\]", "source": "GPT-5.6 Sol ②"}, {"id": "185", "question": "Reference-only; not reviewed live; score unknown. Solve $12x^2+4x-33=0$ and identify the official Q10 value of $x$.", "answer": "Reference-only; not reviewed live; score unknown. Using the quadratic formula,\n\\[\nx=\\frac{-4\\pm\\sqrt{4^2-4(12)(-33)}}{24}\n=\\frac{
