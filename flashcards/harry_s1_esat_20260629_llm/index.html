<script>
const DATA=[{"question": "The cumulative distribution function is $$F(x)=P(X\\le x)$$. Conceptually, how is it built from a probability table, and why must it end at 1? (3 steps)", "answer": "- Step 1: $$F(x)$$ accumulates probability from the smallest value up to and including $$x$$ â€” a running total of the individual $$P(X=x)$$ entries.\n- Step 2: Each new $$F$$ value = previous $$F$$ + the next probability. It is non-decreasing (probabilities can't be negative) and steps up at each outcome.\n- Step 3: By the time you include the *largest* value, you have added all the probability, which sums to 1. So $$F(\\text{max})=1$$ always â€” a built-in sanity check.\n\nPicture: a staircase rising from 0 up to 1, flat between outcomes and jumping at each."}, {"question": "In Q4(c), P(2X < 1) = F(0) = 0.15. Why might a student wrongly compute P(2X < 1) = P(X < 0) + P(X = 0)? (2 steps)", "answer": "- Step 1: The mistake treats 2X < 1 as if the strict inequality might allow X = 0 to be on the boundary. The student writes: \"2X < 1, so X < 0.5. X could be 0 (since 0 < 0.5) â€” and possibly also X = âˆ’1\". Then they sum P(X = âˆ’1) + P(X = 0) = 0.05 + 0.10 = 0.15. The numerical answer is *correct* here, but the *reasoning* is off â€” it works by coincidence because X = 0 *is* in the strict event.\n- Step 2: The cleaner reasoning: 2X < 1 âŸº X < 0.5 âŸº X â‰¤ 0 (since X takes integer values). So P(X â‰¤ 0) = F(0) = 0.15 directly. The CDF takes care of \"â‰¤\" vs \"<\" without manual splitting.\n\nTakeaway: for discrete integer X, convert strict inequalities to non-strict on the integer lattice (X < 0.5 â†” X â‰¤ 0), then use F. Don't manually enumerate."}, {"question": "A correlation of $$r\\approx0.948$$ between horse height and weight â€” what does its *magnitude and sign* tell you, and what does it deliberately *not* tell you? (3 steps)", "answer": "- Step 1: Sign positive âŸ¹ taller horses tend to be heavier; the variables move the same direction.\n- Step 2: Magnitude near 1 âŸ¹ the linear relationship is very strong â€” the points hug a straight line closely.\n- Step 3: What it does *not* say: it doesn't prove height *causes* weight, it doesn't describe any *non*-linear pattern (r only measures linear association), and it gives no prediction equation by itself â€” that's the regression line's job.\n\nTakeaway: $$r$$ reports strength+direction of a *linear* link only; not causation, not the actual rate."}, {"question": "What is a \"reversed tree\" and why do you build it by conditioning first on the *outcome* (late / not late) then on the cause (transport)? (3 steps)", "answer": "- Step 1: The forward tree conditions causeâ†’effect (transport then lateness). The reversed tree conditions effectâ†’cause (lateness then transport), answering \"given the outcome, which cause was it?\"\n- Step 2: The first-stage probabilities become the *marginals* of the outcome, $$P(L)=\\tfrac2{15}$$ and $$P(L')=\\tfrac{13}{15}$$; the second-stage probabilities become posteriors like $$P(\\text{car}\\mid L)$$.\n- Step 3: Each posterior is a Bayes calculation: joint over marginal, e.g. $$P(\\text{car}\\mid L')=\\frac{1/2\\cdot4/5}{13/15}=\\frac{2/5}{13/15}=\\tfrac{6}{13}$$. The reversal literally swaps which variable is known first.\n\nTakeaway: reversed tree = condition on outcome first; its second-stage branches are Bayes posteriors."}, {"question": "On a two-stage tree (transport, then late/not), why do you find $$P(\\text{late})$$ by summing complete *path products*, and what makes this the law of total probability? (3 steps)", "answer": "- Step 1: \"Late\" can be reached via several disjoint routes â€” late-by-car, late-by-bike, late-by-walk. Each route's probability is the product along its branches: $$P(\\text{mode})\\times P(\\text{late}\\mid\\text{mode})$$.\n- Step 2: These routes are mutually exclusive (you take exactly one mode), so their probabilities add: $$P(L) = \\sum_{\\text{modes}} P(\\text{mode})P(L\\mid\\text{mode})$$.\n- Step 3: That sum is the law of total probability â€” splitting an event across an exhaustive set of conditions. E.g. $$\\tfrac12\\cdot\\tfrac15 + \\tfrac16\\cdot\\tfrac1{10} + \\tfrac13\\cdot\\tfrac1{20} = \\tfrac{2}{15}$$.\n\nKey distinction: multiply *along* a path, add *across* paths."}, {"question": "The variance identity $$\\text{Var}(X)=\\sum x^2 P - \\mu^2$$ **is** printed in the S1 formula booklet, yet it's still worth memorising as a flashcard. Why? (2 steps)", "answer": "- Step 1: Being printed only helps if you apply it correctly. The identity is easy to *misuse* â€” dividing by $$n$$, or subtracting $$\\mu$$ instead of $$\\mu^2$$ â€” errors that cost marks regardless of the booklet.\n- Step 2: Fluency means you recognise instantly what each symbol is ($$\\sum x^2P$$ = probability-weighted, no $$\\frac1n$$; $$\\mu^2$$ = squared mean). Memorising cements the *correct application*, not just the formula's existence.\n\nLesson: knowing where a formula lives â‰  knowing how to wield it."}, {"question": "For a skew question, why is \"Club B is positively skewed\" alone incomplete, and what turns it into a full contextual interpretation? (2 steps)", "answer": "- Step 1: \"Positively skewed\" names the shape but does not *interpret* it for the real quantity â€” the examiner distinguishes describing from interpreting.\n- Step 2: Add the contextual spread statement: \"Club B's weights are **more varied above the median than below it**.\" Now the skew is translated into a statement about the actual data (weights), which secures the interpretation mark.\n\nPattern: every \"describe the skew\" answer should pair the *name* with an *in-context consequence*."}, {"question": "In Q1, why is it essential to distinguish **S_hw** (the cross-product sum) from **S_hh** and **S_ww** (the self-product sums)? (2 steps)", "answer": "- Step 1: S_hw has the form Î£h_i w_i âˆ’ Î£h_i Î£w_i / n â€” it involves the *product* of the two different variables, not the square of one variable. S_hh and S_ww have the form Î£xÂ² âˆ’ (Î£x)Â²/n.\n- Step 2: S_hw is the numerator of r and the numerator of the regression slope b = S_hw / S_hh. S_hh and S_ww are *both* in the denominator of r. Getting the formula structure wrong (e.g. using Î£hw in place of Î£hÂ²) silently produces the wrong r.\n\nTakeaway: the corrected sum S_{xy} involves *both* variables; S_{xx} and S_{yy} involve the same variable squared. The numerator of r is *always* the cross-product sum, regardless of which variable is the predictor."}, {"question": "For a data set, what do the quartiles $$Q_1$$, $$Q_2$$ (median), $$Q_3$$ represent, and what does the interquartile range $$Q_3-Q_1$$ measure that the full range does not? (3 steps)", "answer": "- Step 1: $$Q_1$$, $$Q_2$$, $$Q_3$$ are the values below which 25%, 50%, 75% of the ordered data fall â€” they carve the data into four equal-count quarters.\n- Step 2: The IQR $$=Q_3-Q_1$$ is the spread of the *middle 50%* of the data.\n- Step 3: Unlike the full range (max âˆ’ min), the IQR ignores the extreme tails, so it's robust â€” a single wild value can't inflate it. That's exactly why the IQR anchors the standard outlier rule.\n\nTakeaway: quartiles split by count; IQR is a tail-resistant measure of central spread."}, {"question": "In S1 Q4 part (b), the *cumulative distribution function* F(x) = P(X â‰¤ x) is presented as a table. Why is the CDF non-decreasing and right-continuous for a discrete RV, and what are the values for X = âˆ’1, 0, 1, 2, 3 in this problem? (3 steps)", "answer": "- Step 1: F(x) is the running sum of probabilities up to and including x. As x increases, we add more non-negative terms to the sum, so F(x) can only stay the same or increase â€” it is *non-decreasing*.\n- Step 2: F is *right-continuous* because at each jump point x = xáµ¢, the value at exactly xáµ¢ includes P(X = xáµ¢). So F(xáµ¢) = F(xáµ¢ âˆ’ Îµ) + P(X = xáµ¢). Just to the left of xáµ¢, the value is the previous CDF; at xáµ¢, it jumps up.\n- Step 3: Filling in for the problem: F(âˆ’1) = 0.05; F(0) = 0.05 + 0.10 = 0.15; F(1) = 0.15 + 0.20 = 0.35; F(2) = 0.35 + 0.30 = 0.65; F(3) = 0.65 + 0.35 = 1.00.\n\nLesson evidence `[L 16:21]`: the tutor recommended presenting CDF as a table (matching the format of the distribution table) for clarity."}, {"question": "In S1 Q1, the correlation coefficient was rounded to 2 s.f. instead of 3 s.f., losing the final accuracy mark. What is the *paper-wide* precision rule on WST01/01, and why is 3 s.f. the standard rather than 2? (2 steps)", "answer": "- Step 1: The official rubric `[QP]` for WST01/01 states that inexact (decimal) answers must be given to **three significant figures** unless the question explicitly says otherwise. So r = 0.948 (not 0.95) is the correct precision.\n- Step 2: 3 s.f. is the convention because it strikes a balance: 2 s.f. loses too much information (0.95 could be anywhere from 0.945 to 0.954), while 4+ s.f. usually exceeds the accuracy of the input data. For correlation and regression, where downstream values depend on the rounded r, 3 s.f. is the working precision that allows follow-up calculations to be valid.\n\nTakeaway: on WST01/01, \"3 s.f.\" is the *minimum*, not a suggestion. If a value naturally rounds to fewer digits (e.g., exactly 0.5), it is still acceptable to write 0.5 â€” but if there are more digits, write them to 3 s.f."}, {"question": "In Q8, why is **P(L âˆ© walk) = (1/3)(1/20) = 1/60**, and not, say, P(L | walk) = 1/3? (2 steps)", "answer": "- Step 1: P(L âˆ© walk) is the *joint* probability: the person both walks AND is late. By the multiplication rule for conditionals, P(L âˆ© walk) = P(walk) Â· P(L | walk) = (1/3) Â· (1/20) = 1/60. Each branch product is a *joint* probability, not a conditional.\n- Step 2: P(L | walk) = 1/20 is the *conditional* probability â€” the chance of being late, given that the person walks. These are different objects. P(L âˆ© walk) is a number â‰¤ min(P(L), P(walk)) = 1/20; here it is 1/60, which is indeed smaller.\n\nTakeaway: in a tree diagram, branch products give joint probabilities. Reading off a single branch gives a marginal (level 1) or a conditional (level 2). Don't confuse them."}, {"question": "In $$M = \\frac{(x+y)^2 z}{P}\\cdot Q$$, if $$x$$ and $$y$$ each increase by 50%, why is it far safer to write $$x+y \\to \\tfrac{3}{2}(x+y)$$ *before* squaring, rather than expanding $$(1.5x+1.5y)^2$$ term by term? (2 steps)", "answer": "- Step 1: Both $$x$$ and $$y$$ scale by the *same* factor $$1.5$$, so their sum scales by that same factor: $$1.5x+1.5y = 1.5(x+y)$$. Factoring first collapses two changing terms into one clean bracket.\n- Step 2: Now squaring is trivial: $$(1.5)^2(x+y)^2 = \\tfrac{9}{4}(x+y)^2$$. Expanding instead gives $$2.25x^2 + 4.5xy + 2.25y^2$$ â€” a messy binomial that hides the fact that the *whole thing* just scaled by $$\\tfrac94$$.\n\nThe trap this avoids: thinking the increase inside a square is still 50% â€” it is not; squaring a $$1.5$$ factor makes it a $$2.25$$ factor."}, {"question": "In a regression context, what is the conceptual danger of using the word \"causes\" when interpreting the slope $$b$$? (2 steps)", "answer": "- Step 1: Regression and correlation measure the strength and direction of an *association* or relationship, not causation.\n- Step 2: An increase in the independent variable is associated with a change in the dependent variable on average, but there may be lurking variables driving both. You must use phrases like \"on average, for each unit increase in X, Y increases by b.\"\n\nCorrelation does not imply causation; regression only models the linear association, not a physical cause-and-effect mechanism."}, {"question": "Why does squaring a variable that increases by 50% turn a \"+50%\" into a \"+125%\" effect, and how does this shape intuition for powers in proportional-change problems? (3 steps)", "answer": "- Step 1: A 50% increase is a $$\\times1.5$$ factor. Squaring the variable squares the factor: $$1.5^2 = 2.25$$.\n- Step 2: A $$\\times2.25$$ factor means the squared term is 225% of its original â€” a **125% increase**, far more than 50%.\n- Step 3: Intuition: powers *amplify* proportional changes. A modest change in a variable becomes a large change once raised to a power â€” and the higher the power, the more dramatic the amplification.\n\nBoundary sense: a variable raised to power $$n$$ turns a factor $$k$$ into $$k^n$$ â€” small changes compound fast."}, {"question": "Why is $$P(\\text{Car} | \\text{Late})$$ calculated as $$\\frac{P(\\text{Car}) \\cdot P(\\text{Late} | \\text{Car})}{P(\\text{Late})}$$ and NOT as $$P(\\text{Car}) \\cdot P(\\text{Late})$$, even though both involve the same events? (2 steps)", "answer": "- Step 1: Recognize that $$P(\\text{Car} | \\text{Late})$$ is a **conditional** probability, asking \"within the subset of late arrivals, what fraction are cars?\" This requires normalizing the joint probability $$P(\\text{Car} \\cap \\text{Late})$$ by the size of the conditioning set $$P(\\text{Late})$$. The numerator $$P(\\text{Car})P(\\text{Late}|\\text{Car})$$ is simply the product rule expansion of $$P(\\text{Car} \\cap \\text{Late})$$.\n- Step 2: The expression $$P(\\text{Car}) \\cdot P(\\text{Late})$$ equals $$P(\\text{Car} \\cap \\text{Late})$$ **only if Car and Late are independent**. In transport problems, they are explicitly dependent (different modes have different lateness rates). Using the independence product would ignore the causal structure and yield the joint probability, not the conditional probability. Bayes' theorem is precisely the correction for dependence.\n\n**Takeaway:** Conditional = Joint / Condition. Independence product is only valid when events are unrelated."}, {"question": "In S1 Q1, the printed S_hh = 286 was miscopied as 290 in the lesson. Why is this kind of transcription error particularly dangerous in regression, and what should the habit be when reading printed summary statistics? (3 steps)", "answer": "- Step 1: S_hh appears in the *denominator* of the slope b = S_hw / S_hh. A small change in S_hh (e.g., 286 vs 290) changes the slope by roughly 4/286 â‰ˆ 1.4%, but it also changes the *correlation coefficient* r = S_hw / âˆš(S_hh Â· S_ww) because S_hh sits under a square root.\n- Step 2: A wrong S_hh propagates into every subsequent calculation: slope, intercept, predicted values, and even the final answer. Unlike a one-off computational slip, a transcription error *systematically* corrupts the entire question.\n- Step 3: Habit: when a value is *printed* (given in the question), write it down *before* doing anything else, and double-check digit-by-digit against the paper before using it. If the printed value is an integer or ends in a clean digit (like 6 in 286), expect that and treat a value ending in 0 as suspicious.\n\nLesson evidence `[L 07:50â€“08:40]`: the student wrote 290, then 286, then 286 again â€” the slip cost the final accuracy mark because the printed value was wrong from the start."}, {"question": "In S1 Q2, Club B has positive skew because Q3 âˆ’ Q2 > Q2 âˆ’ Q1. Walk through what each side of this inequality measures, and why the inequality direction indicates positive (rather than negative) skew. (3 steps)", "answer": "- Step 1: Q2 âˆ’ Q1 is the *lower half-spread*: the distance from the median down to the lower quartile. It captures how spread out the bottom 25% of the data is from the centre.\n- Step 2: Q3 âˆ’ Q2 is the *upper half-spread*: the distance from the median up to the upper quartile. It captures how spread out the top 25% of the data is from the centre.\n- Step 3: If Q3 âˆ’ Q2 > Q2 âˆ’ Q1, then the upper half is more stretched out than the lower half. This means the data has a *longer/heavier tail above the median* than below â€” the definition of *positive* (right) skew. (Negative skew would give the opposite inequality.)\n\nIn context `[L 14:06â€“16:07]`: Club B's weights are more varied *above* the median than below â€” the upper tail is the longer one."}, {"question": "Misconception probe: a student says \"since $$A$$ and $$C$$ don't overlap, they must be independent.\" Why is this backwards? (2 steps)", "answer": "- Step 1: Non-overlapping means mutually exclusive: $$P(A\\cap C)=0$$. For independence you'd need $$P(A\\cap C)=P(A)P(C)$$.\n- Step 2: If $$P(A),P(C)>0$$ then $$P(A)P(C)>0\\ne0$$, so they *fail* independence â€” they're actually strongly *dependent* (if $$A$$ happens, $$C$$ certainly didn't). Disjoint circles signal dependence, not independence.\n\nTakeaway: disjoint â‡’ mutually exclusive â‡’ (with positive probabilities) dependent â€” the opposite of independent."}, {"question": "Why is \"independent\" not the same as \"mutually exclusive\", and can two events with non-zero probability be both? (3 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A\\cap B)=0$$ â€” they can't co-occur; on a Venn diagram the circles don't overlap.\n- Step 2: Independent means $$P(A\\cap B)=P(A)P(B)$$ â€” they *can* co-occur, and one occurring doesn't change the other's probability.\n- Step 3: If both had non-zero probability and were mutually exclusive, then $$P(A\\cap B)=0$$ but $$P(A)P(B)>0$$ â€” contradiction. So (with positive probabilities) they're actually *opposites*: knowing $$A$$ happened tells you $$B$$ definitely didn't (strong dependence).\n\nTakeaway: exclusive = never together; independent = together at the \"no-information\" rate â€” mutually exclusive events with positive probability are dependent."}, {"question": "If Y is a discrete uniform on {1, â€¦, 6} with E(Y) = 3.5, evaluate **E(4Y + 3)**. Why can the +3 be moved outside? (2 steps)", "answer": "- Step 1: By **linearity of expectation**, E(aY + b) = aÂ·E(Y) + b for any constants a, b. So E(4Y + 3) = 4Â·E(Y) + 3 = 4(3.5) + 3 = 14 + 3 = **17**.\n- Step 2: Linearity holds for *any* random variable â€” it doesn't require independence, identical distribution, or any property of Y. The proof is one line: E(aY + b) = Î£ (ay_i + b)Â·P(Y=y_i) = aÂ·Î£y_i P(Y=y_i) + bÂ·Î£P(Y=y_i) = aÂ·E(Y) + bÂ·1. The 1 in the last term comes from the total probability summing to 1.\n\nTakeaway: linearity of expectation is the most-used identity in S1. Memorise it and use it without re-deriving."}, {"question": "In a proportional change problem, a variable in the denominator is doubled. What scale factor do you apply to the overall expression, and why? (2 steps)", "answer": "- Step 1: If a variable is in the denominator, its contribution to the overall expression is inversely proportional. Doubling the denominator means the overall value is divided by that factor.\n- Step 2: Therefore, the scale factor applied to the overall expression is the reciprocal of the change. For a doubled variable (factor of $$2$$), you multiply the overall expression by $$1/2$$.\n\nA variable in the denominator acts as a divisor; doubling it halves the contribution."}, {"question": "Given a discrete random variable X with P(X = âˆ’1) = 0.05, P(X = 0) = 0.10, P(X = 1) = a, P(X = 2) = b, P(X = 3) = 0.35, and E(X) = 1.8, **set up and solve** the system of equations to find a and b. (3 steps)", "answer": "- Step 1: Two equations come from two conditions. (i) **Probabilities sum to 1**: 0.05 + 0.10 + a + b + 0.35 = 1, so a + b = 0.5.\n- Step 2: (ii) **Expected value formula**: E(X) = Î£xÂ·P(X=x), so (âˆ’1)(0.05) + 0(0.10) + 1(a) + 2(b) + 3(0.35) = 1.8, which simplifies to âˆ’0.05 + a + 2b + 1.05 = 1.8, i.e. a + 2b = 0.8.\n- Step 3: Subtract (i) from (ii): (a + 2b) âˆ’ (a + b) = 0.8 âˆ’ 0.5, so b = 0.3. Then a = 0.5 âˆ’ b = **0.2**. Check: a + 2b = 0.2 + 0.6 = 0.8 âœ“.\n\nTakeaway: with two unknowns, you need two *independent* equations â€” sum-to-1 and the given E(X) are always independent here."}, {"question": "Why is the formula $$Var(X) = \\Sigma x^2 P(X=x) - \\mu^2$$ computationally more efficient than $$Var(X) = \\Sigma (x - \\mu)^2 P(X=x)$$? (2 steps)", "answer": "- Step 1: The formula $$\\Sigma (x - \\mu)^2 P(X=x)$$ requires you to calculate the deviation $$(x - \\mu)$$ for every single value of $$x$$ before squaring and summing, which involves messy decimals if $$\\mu$$ is not an integer.\n- Step 2: The identity $$E(X^2) - \\mu^2$$ allows you to square the raw $$x$$ values first (which are usually integers), find that expectation, and only subtract the single squared mean at the very end.\n\nSquaring raw values first avoids calculating and squaring messy decimal deviations for every data point."}, {"question": "In S1 Q6 part (d)(ii), P((AâˆªB) âˆ© Câ€²) = 0.67. Why does this equal *all* of AâˆªB, and what does that tell us about the chain geometry? (3 steps)", "answer": "- Step 1: AâˆªB is the union of A and B: A-only + Aâˆ©B + B-only = 0.36 + 0.24 + 0.07 = 0.67.\n- Step 2: (AâˆªB) âˆ© Câ€² is the part of AâˆªB that lies outside C. In the chain geometry, Aâˆ©C = âˆ…, so A lies entirely outside C. And Bâˆ©C is *inside* C â€” but that part is excluded by the Câ€² condition.\n- Step 3: So (AâˆªB) âˆ© Câ€² = A-only + Aâˆ©B + B-only = the *whole* of AâˆªB. Hence the probability is 0.67 â€” exactly the same as P(AâˆªB).\n\nThis is a chain-geometry consequence: A and C are disjoint, so intersecting with Câ€² \"preserves\" all of A and only excludes the Bâˆ©C part â€” but Bâˆ©C is not in AâˆªB anyway."}, {"question": "Interpret the slope $$b = 3.27$$ in the regression line $$w = 46.0 + 3.27h$$ (weight vs height) correctly. Why is stating \"positive correlation\" or \"as height increases, weight increases\" insufficient for full marks? (2 steps)", "answer": "- Step 1: Identify that the slope $$b$$ represents a **rate of change**, not just a direction. \"Positive correlation\" describes the *association* ($$r$$), not the *model prediction* ($$b$$). The question asks for interpretation of the regression parameter specifically.\n- Step 2: Formulate the answer as \"On average, for each 1 cm increase in height, weight increases by 3.27 kg.\" You must include: (1) the unit of the independent variable (\"1 cm\"), (2) the unit of the dependent variable (\"kg\"), (3) the numerical value, and (4) the phrase \"on average\" (because regression predicts the conditional mean, not deterministic outcomes for individuals).\n\n**Takeaway:** Slope interpretation requires units, magnitude, and probabilistic language (\"on average\")."}, {"question": "What is the fundamental difference between a Probability Mass Function (PMF) and a Cumulative Distribution Function (CDF) for a discrete random variable? (2 steps)", "answer": "- Step 1: A PMF gives the probability of a single exact value: $$P(X = x)$$. It answers \"what is the chance of this specific outcome?\"\n- Step 2: A CDF gives the accumulated probability up to and including a value: $$F(x) = P(X \\le x)$$. It answers \"what is the chance of this outcome or anything lower?\"\n\nThe CDF is the running total of the PMF; to move from PMF to CDF, you sum all probabilities up to that point."}, {"question": "In a Venn diagram, events $$A$$ and $$B$$ are *independent* iff $$P(A\\cap B) = P(A)P(B)$$. Conceptually, why does this product characterise independence? (3 steps)", "answer": "- Step 1: Independence means knowing $$A$$ happened doesn't change the chance of $$B$$: $$P(B\\mid A) = P(B)$$.\n- Step 2: The general product rule is $$P(A\\cap B) = P(A)P(B\\mid A)$$. Substitute independence ($$P(B\\mid A)=P(B)$$) and it collapses to $$P(A\\cap B) = P(A)P(B)$$.\n- Step 3: So the product form is just the product rule with the conditional replaced by the unconditional â€” a compact test. If the observed overlap equals the product of the marginals, neither event informs the other.\n\nContrast: this is a *test* to apply, not the *definition* of intersection â€” dependent events break it."}, {"question": "A quantity scales by multiplier $$\\frac{9}{10}$$. Why is the correct verbal answer \"a 10% *decrease*,\" and what is the classic sign-of-change slip to avoid here? (2 steps)", "answer": "- Step 1: A multiplier less than 1 means the new value is *smaller*. $$\\tfrac{9}{10} = 0.9 = 90\\%$$ of the original, so the change is $$90\\% - 100\\% = -10\\%$$: a **decrease**.\n- Step 2: The slip is reading the \"9\" as \"+90%\" or \"9Ã— bigger.\" The multiplier itself is the *fraction of the original that remains*, not the percentage change. Change $$= \\text{multiplier} - 1$$, so $$0.9-1 = -0.1$$.\n\nKey mental check: multiplier $$>1$$ âŸ¹ increase, $$<1$$ âŸ¹ decrease, $$=1$$ âŸ¹ no change."}, {"question": "Compute **P(L)** = P(late) by summing complete-path products in the forward tree. Why is the sum of *branch labels* wrong, and the sum of *path products* right? (2 steps)", "answer": "- Step 1: Path products: P(L âˆ© car) = (1/2)(1/5) = 1/10; P(L âˆ© bike) = (1/6)(1/10) = 1/60; P(L âˆ© walk) = (1/3)(1/20) = 1/60. Sum = 1/10 + 1/60 + 1/60 = 6/60 + 1/60 + 1/60 = 8/60 = **2/15**.\n- Step 2: The branches at level 1 (1/2, 1/6, 1/3) sum to 1 â€” that's the *partition*, not P(L). Adding those numbers gives 1, the trivial partition identity. P(L) needs the *joint* probabilities P(L âˆ© mode), which are the products along full paths.\n\nTakeaway: in a tree, P(any event on the leaves) = Î£ (products of branches along each full path leading to a leaf with that event). Never add the level-1 branch labels â€” they're not joint probabilities."}, {"question": "Explain, in the context of horse heights h (cm) and weights w (kg), what the **slope b = 3.27** of the regression line w = 46.0 + 3.27h means. Why is the wording \"1 cm increase\" rather than \"1 cm change\"? (2 steps)", "answer": "- Step 1: Slope b = 3.27 kg/cm means: *for each additional 1 cm of height, the predicted weight increases by 3.27 kg*. The variable on the right of the equation (h) is the *predictor*, and the unit of the slope is the unit of the response (kg) per unit of the predictor (cm).\n- Step 2: \"Increase\" vs \"change\" matters because the regression line has a *direction* â€” slope is positive here. If b were âˆ’3.27, the correct phrasing would be \"for each 1 cm increase in height, weight *decreases* by 3.27 kg\". Using \"change\" loses that direction and is too vague for the mark scheme.\n\nTakeaway: when interpreting a regression slope in context, always state (i) the predictor variable with units, (ii) the response variable with units, (iii) the direction (increases/decreases)."}, {"question": "Explain why $$\\mathrm{Var}(X)=E(X^2)-\\mu^2$$ (subtracting $$\\mu^2$$, the mean *squared*, not $$\\mu$$). (3 steps)", "answer": "- Step 1: Variance is the mean squared deviation: $$\\mathrm{Var}(X)=E\\big[(X-\\mu)^2\\big]$$.\n- Step 2: Expand: $$E[X^2-2\\mu X+\\mu^2]=E(X^2)-2\\mu E(X)+\\mu^2=E(X^2)-2\\mu^2+\\mu^2=E(X^2)-\\mu^2$$.\n- Step 3: So you subtract $$\\mu^2$$ (mean squared), not $$\\mu$$. A common error is subtracting $$\\mu$$; that isn't even dimensionally consistent, since $$E(X^2)$$ and $$\\mu^2$$ share the \"value-squared\" units. (Lesson error: subtracting $$E(X)$$ instead of $$[E(X)]^2$$.)\n\nTakeaway: \"mean of the squares minus the square of the mean\" â€” both terms are squared quantities."}, {"question": "A student computes $$\\mathrm{Var}(X)$$ and gets a *negative* number. Why is this impossible, and what typical mistake produces it? (2 steps)", "answer": "- Step 1: Variance is a mean of *squared* deviations, so it can never be negative â€” the smallest it can be is 0 (only when $$X$$ is constant).\n- Step 2: A negative result signals a formula error â€” usually subtracting $$\\mu$$ instead of $$\\mu^2$$, or forgetting that $$E(X^2)\\ge[E(X)]^2$$ always (that inequality is exactly why variance is non-negative). It's a built-in sanity check.\n\nTakeaway: $$\\mathrm{Var}\\ge0$$ always; a negative answer means you misapplied the identity."}, {"question": "When combining the fraction multipliers $$\\frac{9}{4}\\times\\frac{4}{5}\\times\\frac{1}{2}$$ from a proportional-change problem, doubling $$P$$ contributed the $$\\frac12$$. Why does \"P is doubled\" put a factor into the *denominator*, and where does the common error hide? (2 steps)", "answer": "- Step 1: $$P$$ sits in the denominator of $$M = \\frac{(\\dots)}{P}\\cdot Q$$. Replacing $$P$$ by $$2P$$ gives $$\\frac{1}{2P}$$, i.e. dividing the whole quantity by 2 â€” a $$\\times\\tfrac12$$ multiplier.\n- Step 2: The slip is treating \"doubled\" as $$\\times 2$$ on $$M$$. Doubling something you are *dividing by* halves the result. So $$\\frac{9/4 \\cdot 4/5}{2} = \\frac{9/5}{2} = \\frac{9}{10}$$ â€” the 2 goes to the bottom, not the top.\n\nRule: a variable in the numerator passes its scale factor through as-is; a variable in the denominator passes its *reciprocal* factor."}, {"question": "In Q6, the question uses a *chain* Venn rather than a generic three-circle Venn. What constraint does this impose on the independence condition? (2 steps)", "answer": "- Step 1: In a chain, A and C are *disjoint by construction* (P(Aâˆ©C) = 0). So A and C can *never* be independent unless one of them has probability 0. Independence forces P(Aâˆ©C) = P(A)Â·P(C); for both to be non-zero, we'd need P(Aâˆ©C) > 0, contradicting the chain geometry.\n- Step 2: So independence in Q6 is *only* claimed for specific pairs (here, A and B), not for all three pairs. The chain shape restricts which independence conditions are even *possible*.\n\nTakeaway: read the Venn diagram description carefully. A \"chain\" forbids Aâˆ©C, which forbids A and C being independent."}, {"question": "Learners often confuse $$\\cap$$ (intersection) and $$\\cup$$ (union) when shading a Venn diagram. Give the mental rule that resolves it, with a colour analogy. (2 steps)", "answer": "- Step 1: Shade each event a different colour. $$\\cap$$ (intersection) keeps only where **both** colours overlap â€” the doubly-shaded region. It shrinks the area (AND).\n- Step 2: $$\\cup$$ (union) keeps everywhere **either** colour appears â€” all shaded area combined. It grows the region (OR).\n\nRule of thumb: intersection = \"in both\" = overlap only (smaller); union = \"in at least one\" = everything shaded (larger). When in doubt, ask \"AND or OR?\""}, {"question": "In Q6(d), interpret the event **P((BâˆªC)â€² âˆ© A) = 0.36**. Walk through the set algebra. (3 steps)", "answer": "- Step 1: De Morgan: (BâˆªC)â€² = Bâ€² âˆ© Câ€². So (BâˆªC)â€² âˆ© A = (Bâ€² âˆ© Câ€²) âˆ© A = A âˆ© Bâ€² âˆ© Câ€² â€” the part of A that is *not* in B *and not* in C.\n- Step 2: In the chain Venn, Aâˆ©C = âˆ…, so any part of A is automatically not in C. Hence A âˆ© Bâ€² âˆ© Câ€² simplifies to A âˆ© Bâ€² = A-only.\n- Step 3: A-only = **0.36**. This matches the printed region directly.\n\nTakeaway: when reading an event like \"(BâˆªC)â€² âˆ© A\", apply De Morgan first to convert the complement of a union into an intersection of complements, then simplify using the geometry."}, {"question": "A random variable $$Y$$ takes values $$1,2,\\dots,6$$ each with probability $$\\tfrac16$$. Why is this called a *discrete uniform* distribution, and what makes $$E(Y)=3.5$$ intuitive without summing? (3 steps)", "answer": "- Step 1: \"Discrete\" â€” finitely many separate values; \"uniform\" â€” every value equally likely ($$\\tfrac16$$ each). Uniform means flat: no value is favoured.\n- Step 2: For a symmetric, equally-spaced set of outcomes, the mean sits exactly at the centre of symmetry â€” the midpoint of the smallest and largest value.\n- Step 3: Midpoint of 1 and 6 is $$\\frac{1+6}{2}=3.5$$. No summation needed: uniformity + symmetry pins the mean at the centre. (It need not be an achievable value â€” 3.5 is not a face of a die.)\n\nGeneral: for a discrete uniform on $$1..n$$, $$E = \\frac{n+1}{2}$$."}, {"question": "In S1 Q8, why is the \"reversed tree\" sometimes called a *Bayes' tree*, and what does Bayes' theorem let us do that the forward tree alone does not? (2 steps)", "answer": "- Step 1: The forward tree gives us *forward* conditionals: P(L|mode). The reversal asks for *backward* conditionals: P(mode|L). The two are related by Bayes' theorem, which inverts the direction of conditioning.\n- Step 2: Without Bayes, we could only compute probabilities in the natural causal direction. Bayes lets us reason *diagnostically*: given an observed outcome (late), infer the likely cause (mode of transport). This is essential in statistics and machine learning â€” every time we update beliefs about a hidden variable from an observed one, we are using Bayes.\n\nIn Q8 part (c), the reversed tree is essentially a diagnostic tool: given lateness, what is the breakdown by mode?"}, {"question": "In the **reversed tree** for Q8(c), the first-stage branches are \"given late\" (with weight P(L) = 2/15) and \"given not late\" (with weight 13/15). Why are these first-stage branches *probabilities themselves*, and what do the second-stage branches under each represent? (2 steps)", "answer": "- Step 1: The reversed tree conditions first on whether the person is late. P(L) = 2/15 and P(Lâ€²) = 13/15 are the *prior* probabilities of the late/not-late partition, so they sit at level 1 and sum to 1.\n- Step 2: Under \"given late\", the three transport modes split *conditioned on lateness*: P(car|L), P(bike|L), P(walk|L). Under \"given not late\", they split *conditioned on not being late*: P(car|Lâ€²), etc. These are *reverse-engineered* probabilities from Bayes.\n\nTakeaway: a reversed tree re-roots the diagram at the *outcome* (late/not late), then expresses the *cause* (transport mode) as conditional on that outcome. The first-level weights are the probabilities of the outcomes; the second-level branches are reverse-Bayes conditionals."}, {"question": "When the question says **\"interpret in context\"** for a regression slope or skew direction, what two things must the answer contain to earn the mark? (2 steps)", "answer": "- Step 1: The **direction** (increase/decrease, positive/negative) and the **magnitude** (the numeric rate, like 3.27 kg/cm). A bare \"positive correlation\" or \"positively skewed\" is direction only â€” not enough.\n- Step 2: The **contextual variable names and units** (height in cm, weight in kg, Club B horses, etc.). The same statistic can mean different things in different contexts, so the mark scheme requires the contextual wrapper.\n\nTakeaway: \"interpret in context\" = direction + magnitude + variable names + units. Write all four for full marks."}, {"question": "A box plot has lower whisker 72, Q1 = 95, median = 105, Q3 = 112, upper whisker 127, and outlier 139. Why are **72 and 127 the whisker ends** (and not the minimum/maximum)? (2 steps)", "answer": "- Step 1: By convention, the **whiskers** extend to the *smallest and largest data values that are not outliers*. The minimum 72 and the value 127 are inside the fences (69.5 and 137.5), so they are the whisker tips. The outlier 139 is plotted as a separate cross/dot beyond the upper whisker.\n- Step 2: This is the whole point of the box plot â€” to *visually separate* outliers from the bulk of the data, so the eye sees them as exceptional points rather than as part of the spread. A whisker that includes an outlier would hide that signal.\n\nTakeaway: whisker ends â‰  min/max unless there are no outliers. Always check whether the smallest/largest data values are inside the fences."}, {"question": "Why does the mark scheme for an outlier question specifically require the word **\"only\"** (as in \"139 is the only outlier\")? (2 steps)", "answer": "- Step 1: The question usually says \"show that there is *only one* outlier\". The mark scheme mirrors that wording because it's the literal claim being demonstrated â€” \"only one\" makes a universal statement about *all* data points, not just the obvious one.\n- Step 2: Saying \"139 is an outlier\" without \"only\" leaves open the possibility that 72 (or some other value) is also an outlier, which the candidate hasn't checked. The word \"only\" closes that loophole and earns the final mark.\n\nTakeaway: when a question asks you to show \"only one\" of something, your conclusion must contain the word \"only\". Mark schemes reward mirroring the question's precise wording."}, {"question": "A table has unknowns $$a,b$$ with \"sum = 1\" giving $$a+b=0.5$$ and the mean $$E(X)=1.8$$ giving $$a+2b=0.8$$. Explain *why* subtracting the equations isolates $$b$$, and what each equation contributes. (3 steps)", "answer": "- Step 1: The \"sum\" equation weights $$a$$ and $$b$$ equally (each probability counts once). The \"mean\" equation weights each probability by its $$x$$-value, so $$b$$ (at $$x=2$$) carries an extra factor.\n- Step 2: Subtracting removes $$a$$ (same coefficient in both) and leaves the *difference in weighting*: $$(a+2b)-(a+b) = b = 0.8-0.5 = 0.3$$.\n- Step 3: Back-substitute: $$a = 0.5 - 0.3 = 0.2$$. The two equations are independent because one uses raw counts and the other uses $$x$$-weighted counts.\n\nInsight: the mean equation is the \"sum\" equation tilted by the outcome values â€” that tilt is what pins down the individual probabilities."}, {"question": "The product-moment correlation coefficient is $$r=\\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$. Why does dividing by $$\\sqrt{S_{xx}S_{yy}}$$ make $$r$$ a *standardised*, unit-free number between $$-1$$ and $$1$$? (3 steps)", "answer": "- Step 1: $$S_{xy}$$ alone carries the units of $$x\\times y$$ and grows with sample size and spread, so its raw size means little.\n- Step 2: Dividing by $$\\sqrt{S_{xx}S_{yy}}$$ scales the co-variation by the individual spreads, cancelling units and magnitude â€” it asks \"how large is the shared movement *relative to* how much each variable moves on its own?\"\n- Step 3: By the Cauchyâ€“Schwarz inequality $$|S_{xy}|\\le\\sqrt{S_{xx}S_{yy}}$$, so the ratio is trapped in $$[-1,1]$$. $$r=\\pm1$$ means perfect linear alignment; $$r=0$$ means no linear co-movement.\n\nTakeaway: $$r$$ is covariance rescaled by the spreads, giving a pure, bounded measure of *linear* association."}, {"question": "In S1 Q2, the IQR is 17. Using the 1.5Ã—IQR rule, the lower fence is 95 âˆ’ 25.5 = 69.5 and the upper fence is 112 + 25.5 = 137.5. A value of 139 is flagged as an outlier. Why is 139 *just barely* an outlier rather than clearly one? (2 steps)", "answer": "- Step 1: 139 is only 1.5 units above the upper fence of 137.5. The 1.5Ã—IQR rule is a *mild* outlier criterion â€” values have to be quite far from Q3 to qualify. Many \"real\" outliers in textbook data sets are much further out (like 3Ã—IQR beyond Q3, or 200+ above the upper fence).\n- Step 2: In this problem, the value 139 was deliberately chosen to be borderline so the student has to apply the rule mechanically (compute 1.5Ã—IQR = 25.5, fences, compare). It tests whether the rule is being used, not the intuition of \"this looks like an outlier\".\n\nRule of thumb: when an outlier is *just* outside the fence by a small margin, it is still an outlier by the rule â€” the rule does not have a \"severity threshold\"."}, {"question": "In the regression line $$w=a+bh$$, why is the slope $$b=\\frac{S_{hw}}{S_{hh}}$$ (dividing by the *predictor's* spread), rather than by $$S_{ww}$$? (3 steps)", "answer": "- Step 1: The line predicts $$w$$ *from* $$h$$, minimising vertical (in $$w$$) squared errors. It answers \"per unit of $$h$$, how much does $$w$$ change?\"\n- Step 2: That rate is co-movement per unit of predictor variation: shared movement $$S_{hw}$$ normalised by how much the predictor $$h$$ itself varies, $$S_{hh}$$.\n- Step 3: Dividing by $$S_{ww}$$ would give the slope of the *reverse* regression (predicting $$h$$ from $$w$$), a different line. The choice of denominator encodes which variable is the input.\n\nTakeaway: slope = shared movement Ã· spread of the variable you're regressing *on*."}, {"question": "Using a fitted line $$w = 46.0 + 3.27h$$, predicting at $$h=153$$ cm (inside the data range) is called *interpolation* and at $$h=170$$ cm (outside it) *extrapolation*. Why is one prediction trusted more than the other? (3 steps)", "answer": "- Step 1: The line was fitted *only* where data exist. Inside that range, the linear pattern has been directly observed, so a prediction there rests on evidence â€” interpolation is reliable.\n- Step 2: Outside the range, you *assume* the same straight-line behaviour continues, with no data to confirm it. The relationship could curve, plateau, or break down â€” extrapolation is a guess dressed as arithmetic.\n- Step 3: So $$h=153$$ (interpolation) is more reliable; $$h=170$$ (extrapolation) is less reliable. For the mark you must use the exact terms *interpolation* / *extrapolation*, not just \"closer/further.\"\n\nBoundary insight: reliability drops sharply the moment you cross the edge of the observed data."}, {"question": "In Q3, why is Y a **discrete uniform** distribution and not a continuous uniform or a binomial? (2 steps)", "answer": "- Step 1: Y takes only the integer values 1, 2, 3, 4, 5, 6 â€” this is *discrete* (countable, isolated values), ruling out continuous uniform which is defined on an interval.\n- Step 2: P(Y = y) = 1/6 for each of the 6 values â€” this is *uniform* across the support (equal probabilities), and crucially there's no fixed number of independent trials with success probability p, ruling out binomial. A die roll is the canonical discrete uniform example.\n\nTakeaway: discrete uniform â†” finite set of integers, each equally likely. Recognise the equal-probability signature immediately."}, {"question": "The instruction \"Hence find...\" appears in a part. Does \"hence\" forbid re-deriving an earlier result, and how do you decide? (2 steps)", "answer": "- Step 1: \"Hence\" tells you to *use* the previous part's result â€” it's a signpost that the earlier work feeds this one, and often the intended (shortest) route.\n- Step 2: But whether re-deriving still scores depends on that part's mark scheme, not a blanket ban. Follow the \"hence\" route to be safe, yet don't assume a re-derivation automatically loses all marks â€” it may still earn method credit. The safe habit: use the prior result *and* show the connecting working.\n\nTakeaway: \"hence\" means *build on the previous answer*; re-derivation isn't automatically penalised, but the signposted route is safest."}, {"question": "Why is the computational form $$S_{xy}=\\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ equivalent to $$\\sum(x-\\bar x)(y-\\bar y)$$, and why is the computational form preferred in exams? (2 steps)", "answer": "- Step 1: Expanding $$\\sum(x-\\bar x)(y-\\bar y)=\\sum xy - \\bar x\\sum y - \\bar y \\sum x + n\\bar x\\bar y$$. Since $$\\bar x = \\tfrac{\\sum x}{n}$$ and $$\\bar y=\\tfrac{\\sum y}{n}$$, the last three terms collapse to $$-\\tfrac{(\\sum x)(\\sum y)}{n}$$, giving the computational form.\n- Step 2: The computational form only needs raw totals ($$\\sum x,\\sum y,\\sum xy,n$$) that are given in the question, so you avoid computing every deviation individually â€” fewer steps, fewer rounding errors.\n\nTakeaway: the two forms are algebraically identical; the totals-form is exam-efficient."}, {"question": "When a quantity is built from products and powers of several variables (like $$M = \\frac{(x+y)^2 z}{P}\\cdot Q$$) and each variable changes by a percentage, why is it far easier to work with *scale factors* than to recompute $$M$$ from scratch? (3 steps)", "answer": "- Step 1: A percentage change turns each variable into \"old value Ã— a fixed multiplier\". A 50% increase means $$\\times 1.5$$; a 20% decrease means $$\\times 0.8$$; doubling means $$\\times 2$$. The variable's actual number never matters â€” only its multiplier does.\n- Step 2: Because $$M$$ is a pure product/quotient of powers, the multipliers pass straight through the same operations. If $$x+y$$ scales by $$1.5$$, then $$(x+y)^2$$ scales by $$1.5^2$$; if $$P$$ doubles and sits in the denominator, you divide by $$2$$.\n- Step 3: The overall change is just the product of all the individual multipliers. You never touch the original values â€” you multiply the scale factors together and read off the net factor.\n\nTakeaway: for multiplicative structures, \"the change in the whole = the product of the changes in the parts.\""}, {"question": "To find $$P(2X < 1)$$ for a discrete $$X$$, why do you translate it into a CDF value $$F(0)$$ rather than doing anything with the factor 2? (3 steps)", "answer": "- Step 1: Rearrange the inequality: $$2X < 1 \\iff X < 0.5$$. The 2 just rescales the threshold â€” no probability manipulation yet.\n- Step 2: Because $$X$$ is discrete taking integer values, $$X < 0.5$$ is the same event as $$X \\le 0$$ (there are no values strictly between 0 and 0.5).\n- Step 3: $$P(X\\le 0) = F(0) = 0.15$$. The whole task became \"convert the inequality into a $$\\le$$ at an actual outcome, then read the CDF.\"\n\nTrap: for discrete variables always check whether $$<$$ becomes $$\\le$$ at the next lower outcome â€” it changes which probabilities are included."}, {"question": "When interpreting a box plot with positive skew, a student writes \"the mean is greater than the median.\" While true, why might this answer fail to secure the interpretation mark in an S1 exam? (2 steps)", "answer": "- Step 1: The question asks for an interpretation *in context* based on the box plot, which explicitly displays quartiles and medians, not means.\n- Step 2: The mark scheme typically requires an interpretation of the *spread* of the specific data sections, such as \"the data is more varied/spread out above the median than below it.\"\n\nBox plots visualize quartiles; your interpretation should describe the visible spread of the quartile sections, not invisible parameters like the mean."}, {"question": "For any constants $$a,b$$: $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$. Explain intuitively why the $$+b$$ vanishes and why the $$a$$ is *squared*. (3 steps)", "answer": "- Step 1: Adding a constant $$b$$ shifts every value (and the mean) by the same amount. Distances from the mean are unchanged, so spread â€” and hence variance â€” is unaffected. The $$+b$$ disappears.\n- Step 2: Multiplying by $$a$$ stretches every deviation from the mean by $$a$$. But variance measures *squared* deviations, so each squared distance grows by $$a^2$$.\n- Step 3: Hence $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$. Example: $$\\text{Var}(5-3X) = (-3)^2\\text{Var}(X) = 9\\,\\text{Var}(X)$$ â€” note $$(-3)^2 = 9$$, so the sign of $$a$$ is irrelevant.\n\nSign insight: variance can never be negative, so squaring $$a$$ (killing its sign) is exactly right."}, {"question": "In S1 Q6, the Venn diagram is described as a \"**chain**\" with A overlapping B, B overlapping C, and A and C *not* overlapping. What does this geometry imply about the regions and the total number of disjoint regions? (2 steps)", "answer": "- Step 1: A chain has *no triple-overlap region* (Aâˆ©Bâˆ©C = âˆ…), because Aâˆ©C = âˆ… is given. So the disjoint regions are exactly: A-only, B-only, C-only, Aâˆ©B, Bâˆ©C, and outside (z). That is 6 regions in total.\n- Step 2: This is one fewer region than a *full* three-circle Venn (which has 8 regions: 3 singlets, 3 pairwise, 1 triple, 1 outside). The chain shape *forces* Aâˆ©C and the triple region to have probability 0 â€” they exist geometrically as overlapping curves but contain no points.\n\nTakeaway: a chain Venn has 6 regions, all non-empty; Aâˆ©C and Aâˆ©Bâˆ©C are *constrained to be zero*. Always check the geometry the question describes before labelling regions."}, {"question": "Given $$\\sum h=1160$$, $$\\sum w=4160$$, $$\\sum hw=604135$$, $$n=8$$, walk through finding $$S_{hw}$$ conceptually (no need to memorise the exact product). (2 steps)", "answer": "- Step 1: $$S_{hw}=\\sum hw - \\frac{(\\sum h)(\\sum w)}{n}$$. The subtracted term is \"what $$\\sum hw$$ *would* be if $$h$$ and $$w$$ were unrelated\" â€” it removes the part explained purely by the means.\n- Step 2: Numerically $$604135 - \\frac{1160\\times4160}{8}=604135-603200=935$$. The small positive leftover ($$935$$) is the genuine co-movement of height and weight.\n\nTakeaway: $$S_{hw}$$ is \"actual cross-total minus the mean-only baseline.\""}, {"question": "What is the **chain-Venn \"outside\" region z**, geometrically and probabilistically? Why does it include *no overlap with any circle*? (2 steps)", "answer": "- Step 1: Geometrically, z is the area of the rectangle (universal set) *outside all three circles*. It's the complement of A âˆª B âˆª C. In a chain Venn, it's bounded by the edges of the diagram and the outside arcs of all three circles.\n- Step 2: Probabilistically, z = 1 âˆ’ P(A âˆª B âˆª C) = 1 âˆ’ (sum of all regions inside any circle). It's the probability that a randomly chosen element lies *in none of A, B, C*.\n\nTakeaway: \"outside\" in a Venn diagram always means complement-of-the-union of all drawn sets. It's the residual probability needed to make all regions sum to 1."}, {"question": "The $$1.5\\times\\text{IQR}$$ outlier rule flags a value as an outlier if it lies more than $$1.5\\times\\text{IQR}$$ beyond a quartile. Why is the multiplier applied to the IQR (not the range or the mean), and how do you build the two fences? (3 steps)", "answer": "- Step 1: The IQR is a robust spread measure, so \"$$1.5$$ IQRs beyond a quartile\" gives a distance scaled to the data's *own* natural variability â€” wide-spread data get wider fences automatically.\n- Step 2: Lower fence $$= Q_1 - 1.5\\,\\text{IQR}$$; upper fence $$= Q_3 + 1.5\\,\\text{IQR}$$. Anything below the lower or above the upper fence is an outlier.\n- Step 3: For $$Q_1=95, Q_3=112$$: $$\\text{IQR}=17$$, $$1.5\\times17=25.5$$, fences $$95-25.5=69.5$$ and $$112+25.5=137.5$$. A value of 139 exceeds 137.5 â†’ outlier.\n\nNote the fences start from the *quartiles*, not the median or mean â€” the rule is deliberately quartile-based."}, {"question": "Given P(B|Câ€²) = 31/75 in the chain Venn, find the **outside region z**. Why does Câ€² include both B-only and z, and not just B-only? (3 steps)", "answer": "- Step 1: Conditional probability is defined as P(B|Câ€²) = P(B âˆ© Câ€²) / P(Câ€²). Câ€² means \"not in C\", so the *denominator* is the union of *all* regions not inside C: A-only, Aâˆ©B, B-only, *and* z (the outside). So P(Câ€²) = 0.36 + 0.24 + 0.07 + z = 0.67 + z.\n- Step 2: The numerator P(B âˆ© Câ€²) is the part of B that lies outside C â€” which excludes the Bâˆ©C region. So P(B âˆ© Câ€²) = Aâˆ©B + B-only = 0.24 + 0.07 = 0.31.\n- Step 3: Setting 0.31 / (0.67 + z) = 31/75: the 0.31 = 31/100 on the left and 31/75 on the right, so 0.67 + z = (31/100) Ã— (75/31) = 75/100 = 0.75. Therefore z = 0.75 âˆ’ 0.67 = **0.08**.\n\nTakeaway: when you see a vertical bar \"|\" in a probability, immediately write out *both* parts of the conditional â€” the numerator (intersection) and the denominator (the whole conditioning region). Missing regions in the denominator is a very common slip."}, {"question": "In a two-stage tree (transport mode, then late/not-late), why must the branches leaving each node sum to 1, and how does that fix complement probabilities? (2 steps)", "answer": "- Step 1: From any node the branches list *all* mutually exclusive possibilities for the next stage, so their probabilities are a complete partition â€” they must total 1.\n- Step 2: This instantly gives complements: if $$P(\\text{late}\\mid\\text{car})=\\tfrac15$$ then $$P(\\text{not late}\\mid\\text{car})=\\tfrac45$$. Each fan of branches is self-checking; if they don't sum to 1 something is wrong.\n\nTakeaway: each node's branches partition the next stage â€” they sum to 1, which hands you the complements free."}, {"question": "A cumulative distribution function (CDF), $$F(x)$$, is presented as a table rather than a graph. What does each value $$F(x)$$ actually represent, and how does it differ from the probability mass function $$P(X=x)$$? (2 steps)", "answer": "- Step 1: $$F(x) = P(X \\le x)$$ represents the **accumulated probability** up to and including the value $$x$$. It is a running total.\n- Step 2: $$P(X=x)$$ is the probability of exactly that one outcome. To find $$P(X=x)$$ from a CDF table, you must subtract the previous CDF value: $$P(X=x) = F(x) - F(x-1)$$. The CDF always ends at 1, whereas individual probabilities are usually much smaller."}, {"question": "When a conditional probability like $$P(B\\mid C') = \\frac{31}{75}$$ is *given* in a question, why is it wrong to try to *derive* that value, and how should you use it instead? (2 steps)", "answer": "- Step 1: A *given* value is data, not a target. Trying to reproduce it wastes effort and, worse, may tempt you to build a denominator that excludes an unknown (like $$z$$) so the number \"comes out.\"\n- Step 2: Instead, set your correct expression equal to the given: $$\\frac{0.31}{0.67+z} = \\frac{31}{75}$$, then solve for the unknown $$z$$. The given conditional is the *equation*, and the diagram unknown is what you solve for.\n\nMindset: \"given\" âŸ¹ plug it in as a known and solve for what's missing."}, {"question": "Conditional probability is $$P(B\\mid C') = \\frac{P(B\\cap C')}{P(C')}$$. When a Venn diagram has an \"outside\" region $$z$$ (in no circle), why must $$z$$ be included in the denominator $$P(C')$$? (3 steps)", "answer": "- Step 1: $$C'$$ means \"not $$C$$\" â€” *everything* in the sample space that is outside circle $$C$$. The region $$z$$, being outside all circles, is certainly outside $$C$$, so it belongs to $$C'$$.\n- Step 2: The denominator $$P(C')$$ is the total probability of the conditioning event. Omitting $$z$$ understates $$C'$$ and inflates the conditional probability.\n- Step 3: So $$P(C') = (\\text{all of }A\\cup B\\text{ outside }C) + z$$. For the given diagram, $$P(C') = 0.36+0.24+0.07+z = 0.67+z$$ â€” the $$z$$ must be there.\n\nTrap: conditioning on a complement quietly sweeps in the outside region; never forget it."}, {"question": "Contrast the transformation rules $$E(aX+b) = aE(X)+b$$ and $$\\text{Var}(aX+b)=a^2\\text{Var}(X)$$. Why does the constant $$b$$ survive in the mean but die in the variance? (2 steps)", "answer": "- Step 1: The mean is a *location* â€” where the distribution is centred. Shifting everything by $$b$$ moves the centre by $$b$$, so $$b$$ stays: $$E(aX+b)=aE(X)+b$$.\n- Step 2: The variance is a *spread* â€” how far values sit from their centre. Shifting the whole distribution by $$b$$ leaves those relative distances untouched, so $$b$$ contributes nothing. Only the stretching factor $$a$$ matters, and it enters as $$a^2$$.\n\nOne-line contrast: mean tracks *where*, variance tracks *how spread* â€” shifts move the where but not the spread."}, {"question": "For a data set, the interquartile range is $$\\text{IQR} = Q_3 - Q_1$$. Conceptually, why is the IQR preferred over the full range as a measure of spread? (2 steps)", "answer": "- Step 1: The full range = max âˆ’ min depends entirely on the two most extreme values, so a single freak outlier can dominate it and misrepresent typical spread.\n- Step 2: The IQR captures the spread of the *middle 50%* of the data ($$Q_1$$ to $$Q_3$$), ignoring the extreme quarters at each end. It is therefore *resistant* to outliers and better reflects where the bulk of the data lives.\n\nThis robustness is also exactly why the IQR anchors the outlier rule (a $$1.5\\times\\text{IQR}$$ fence)."}, {"question": "A \"reversed tree\" conditions first on late/not-late, then on transport â€” the opposite order of the forward tree. Why can't you just read off the forward branch probabilities, and how do you get the reversed ones? (3 steps)", "answer": "- Step 1: The forward tree gives $$P(\\text{late}\\mid\\text{mode})$$, but the reversed tree needs $$P(\\text{mode}\\mid\\text{late})$$ â€” a different conditional with a different conditioning event.\n- Step 2: Use Bayes: $$P(\\text{mode}\\mid\\text{late}) = \\frac{P(\\text{mode})P(\\text{late}\\mid\\text{mode})}{P(\\text{late})}$$. Each joint path (numerator) is divided by the total probability of that *outcome* (denominator, $$P(L)$$ or $$P(L')$$).\n- Step 3: E.g. given not-late: $$P(\\text{car}\\mid L') = \\frac{(1/2)(4/5)}{13/15} = \\frac{2/5}{13/15} = \\frac{6}{13}$$. Each reversed fan is a set of these Bayes ratios.\n\nWhy reversal is hard: you're inverting the direction of conditioning, which always routes through Bayes."}, {"question": "A quantity $$N = \\frac{a^2 b}{c}$$. If $$a$$ increases by $$50\\%$$, $$b$$ decreases by $$20\\%$$, and $$c$$ is doubled, qualitatively, does the squaring of $$a$$ or the doubling of $$c$$ have a larger impact on the overall multiplier? (2 steps)", "answer": "- Step 1: The factor for $$a$$ is $$(1.5)^2 = 2.25$$ (a $$125\\%$$ increase in its contribution to the numerator).\n- Step 2: The factor for $$c$$ is $$1/2 = 0.5$$ (a $$50\\%$$ decrease in its contribution as a divisor). The squaring of $$a$$ (factor 2.25) has a larger magnitude impact than the doubling of $$c$$ (factor 0.5).\n\nExponential/squared terms in the numerator often dominate linear changes in the denominator."}, {"question": "Compare the three ways skew can be diagnosed (quartile spacing, mean vs median, box-plot shape). Why can a quartile-based test be used even without computing a mean? (2 steps)", "answer": "- Step 1: Quartile test: compare $$Q_3-Q_2$$ with $$Q_2-Q_1$$ â€” bigger upper gap âŸ¹ positive skew. Mean-vs-median: mean > median âŸ¹ positive skew (the long upper tail drags the mean up). Box-plot: longer whisker/box-half on the high side âŸ¹ positive skew.\n- Step 2: The quartile test needs only the three quartiles, which are already read off for the box plot â€” no mean or standard deviation required. That's why it's the natural test in a box-plot question.\n\nTakeaway: three consistent lenses; the quartile-spacing test is self-contained from the five-number summary."}, {"question": "In regression/correlation, what do the \"summary statistics\" $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$ each capture conceptually, before any formula is applied? (3 steps)", "answer": "- Step 1: $$S_{xx}=\\sum(x-\\bar x)^2$$ measures the total spread of the $$x$$-values about their mean â€” how much the predictor varies.\n- Step 2: $$S_{yy}=\\sum(y-\\bar y)^2$$ measures the total spread of the $$y$$-values â€” how much the response varies.\n- Step 3: $$S_{xy}=\\sum(x-\\bar x)(y-\\bar y)$$ measures *co*-variation: whether $$x$$ and $$y$$ tend to be above/below their means *together* (positive) or oppositely (negative). It's the raw \"do they move together?\" quantity that both correlation and the regression slope are built from.\n\nTakeaway: two \"spread\" quantities and one \"shared-movement\" quantity are the raw ingredients of all regression."}, {"question": "Why is the mean point $$(\\bar x, \\bar y)$$ guaranteed to lie on the least-squares regression line, and how does this connect to why the intercept is *not* fitted independently? (3 steps)", "answer": "- Step 1: Least squares minimises the sum of squared vertical residuals. The optimal intercept condition forces the residuals to sum to zero, which algebraically means the line passes through $$(\\bar x, \\bar y)$$.\n- Step 2: So once the slope is chosen, the line is *pinned* at the mean point â€” there's no freedom left for the intercept. It's determined by $$a = \\bar y - b\\bar x$$.\n- Step 3: This is why you compute slope first, then read off the intercept: the \"centre of mass\" of the data is a fixed pivot, and the fitted line rotates about it to the best slope.\n\nPicture: the line is a see-saw balanced on $$(\\bar x, \\bar y)$$, tilted to the least-squares slope."}, {"question": "In a regression question, the printed value was $$S_{hh}=286$$ but it got miscopied as $$289$$, and the final correlation was given to 2 s.f. instead of 3 s.f. Why can each of these independently cost the *accuracy* mark, even with correct method? (2 steps)", "answer": "- Step 1: A miscopied given value feeds a wrong number through every later calculation â€” the method marks may survive, but the final *value* is wrong, so the accuracy mark is lost. Copying is a silent, high-cost error.\n- Step 2: On WST01/01, inexact answers must be to **3 significant figures unless stated otherwise**. Giving $$0.95$$ instead of $$0.948$$ is under-specified: 2 s.f. is treated as insufficient precision, not a rounding of the accepted answer.\n\nDiscipline: copy givens character-by-character, and default every decimal answer to 3 s.f."}, {"question": "In S1 Q1, why is the regression line w = a + bh written with w as the *dependent* variable on the left, rather than h as a function of w? (2 steps)", "answer": "- Step 1: The question asks for w (weight) given h (height). This is a *prediction* of weight from height â€” the convention is that the variable we are *predicting* goes on the left (the dependent variable), and the variable we are *predicting from* goes on the right (the independent variable, or explanatory variable).\n- Step 2: Physically: height is something we measure on the horse and then look up its expected weight. The arrow of reasoning goes h â†’ w, so we write w = a + bh. The least-squares line is also asymmetric: predicting w from h minimises vertical (w) residuals, not horizontal (h) residuals.\n\nIf the question had asked \"given a weight, predict the height\", we would swap roles and compute a line h = a' + b'w (and the slope would not simply be 1/3.27)."}, {"question": "Why does the same event $$P(\\text{car}\\cap\\text{late})$$ appear as $$P(\\text{car})P(L\\mid\\text{car})$$ in the forward tree but $$P(L)P(\\text{car}\\mid L)$$ in the reversed tree â€” and what identity does this reflect? (2 steps)", "answer": "- Step 1: Both express the *same* joint probability two ways, factored by which variable you condition on first: $$P(\\text{car}\\cap L)=P(\\text{car})P(L\\mid\\text{car})=P(L)P(\\text{car}\\mid L)$$.\n- Step 2: This is the general multiplication rule $$P(A\\cap B)=P(A)P(B\\mid A)=P(B)P(A\\mid B)$$, and equating the two factorisations *is* Bayes' theorem. The joint is the fixed anchor; the two trees are just two orderings of the same fact.\n\nTakeaway: a joint probability factors either order; equating the two orderings gives Bayes."}, {"question": "On S1, which of these results are in the **Pearson IAL formula booklet** vs which must be supplied from memory? Distinguish the two buckets clearly. (2 steps)", "answer": "- Step 1: **In the booklet**: E(X) = Î£xP(X=x); Var(X) = Î£(xâˆ’Î¼)Â²P = Î£xÂ²P âˆ’ Î¼Â²; E(g(X)) = Î£g(x)P(X=x); regression sums S_xx, S_yy, S_xy; r; regression line; normal distribution tables; P(AâˆªB) = P(A) + P(B) âˆ’ P(Aâˆ©B); P(Aâˆ©B) = P(A)P(B|A).\n- Step 2: **Expected knowledge** (must memorise): Var(aX + b) = aÂ²Var(X); E(aX + b) = aE(X) + b; CDF definition F(x) = P(Xâ‰¤x); complement P(Aâ€²) = 1 âˆ’ P(A); **independence** P(Aâˆ©B) = P(A)P(B) (distinct from the conditional form which is in the booklet); discrete-uniform closed forms. Note: the 1.5Ã—IQR outlier rule is *always supplied in the question* â€” never memorise it.\n\nTakeaway: a quick mental check before each part is \"is this identity in the booklet?\". If yes, you can quote it; if no, you must derive or state it from memory."}, {"question": "For bivariate data, the sum $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$ measures \"how $$x$$ and $$y$$ vary together.\" Conceptually, what is this correcting for, and why subtract that particular term? (3 steps)", "answer": "- Step 1: $$\\sum xy$$ alone is inflated purely because $$x$$ and $$y$$ have nonzero *means* â€” even unrelated data with large positive values give a large $$\\sum xy$$.\n- Step 2: The term $$\\frac{\\sum x \\sum y}{n} = n\\bar x\\bar y$$ is exactly the product you'd expect from the means alone. Subtracting it removes the \"baseline\" contribution, leaving only the *co-movement about the means*.\n- Step 3: So $$S_{xy} = \\sum(x-\\bar x)(y-\\bar y)$$ in disguise. Positive when $$x$$ and $$y$$ tend to be above/below their means together; negative when they move oppositely; zero when unrelated.\n\nThis is the covariance-numerator: it isolates relationship from mere scale."}, {"question": "What's the self-check that every fan of a reversed tree must satisfy, and why does it catch errors? (2 steps)", "answer": "- Step 1: Each fan (e.g. \"given late\": car, bike, walk) must have branch probabilities summing to 1 â€” given the outcome, *some* cause definitely occurred, so the posteriors partition to 1. Check: $$\\tfrac34+\\tfrac18+\\tfrac18=1$$; and \"given not late\": $$\\tfrac{6}{13}+\\tfrac{9}{52}+\\tfrac{19}{52}=\\tfrac{24+9+19}{52}=1$$.\n- Step 2: If a fan doesn't sum to 1, at least one posterior is wrong â€” usually a mis-divided joint or a wrong marginal. It's a cheap, powerful consistency test built into the structure.\n\nTakeaway: each reversed fan sums to 1 (some cause must have happened); a non-unit sum flags a bad conditional."}, {"question": "Events $$A,B$$ are independent with $$P(A\\cap B)=0.24$$ and $$P(A)=0.60$$. Explain the reasoning that recovers $$P(B)$$ and hence a missing region. (3 steps)", "answer": "- Step 1: Independence means $$P(A\\cap B)=P(A)P(B)$$ â€” knowing $$A$$ tells you nothing about $$B$$, so their joint probability *factorises*.\n- Step 2: Rearrange: $$P(B)=\\frac{P(A\\cap B)}{P(A)}=\\frac{0.24}{0.60}=0.40$$. Dividing by $$0.6$$ directly is cleaner than expanding a bracket.\n- Step 3: If $$P(B)=0.24+x+0.09$$ from the diagram, then $$0.33+x=0.40\\Rightarrow x=0.07$$. Independence pins the total of $$B$$'s regions, which then fixes the unknown piece.\n\nTakeaway: independence lets you *divide* to get $$P(B)$$, then diagram totals give the missing region."}, {"question": "All regions of a Venn diagram (including the outside) must sum to 1. Why does the question demand you *show* the subtraction line explicitly when finding the last region, e.g. $$y$$? (2 steps)", "answer": "- Step 1: The final region is forced by \"total probability = 1\": $$y = 1 - (\\text{all other regions})$$. Writing $$y = 1 - 0.36 - 0.24 - 0.07 - 0.09 - 0.08 = 0.16$$ demonstrates you used that principle.\n- Step 2: The method mark (M1) rewards the *reasoning*, not just the number. A bare \"$$y=0.16$$\" could be a guess; the subtraction line proves the total-probability method and secures the follow-through (A1ft) mark.\n\nHabit: show the \"1 minus everything else\" line whenever a last region is deduced."}, {"question": "For a *probability distribution*, why is $$E(X^2)=\\sum x^2 P(X=x)$$ with **no division by $$n$$**, unlike the mean of a raw data list? (3 steps)", "answer": "- Step 1: In a raw data set you divide by $$n$$ because each value has weight $$\\tfrac1n$$ â€” you're averaging equally weighted numbers.\n- Step 2: In a probability distribution the weights are the probabilities $$P(X=x)$$, which *already sum to 1*. The averaging is baked into the weights.\n- Step 3: So $$E(X^2)$$ is a weighted sum $$\\sum x^2P(X=x)$$ â€” dividing by $$n$$ afterwards would double-count the averaging and shrink the answer wrongly. (The lesson slip was dividing $$\\sum x^2p$$ by 5.)\n\nTakeaway: probabilities are the weights; never also divide by $$n$$."}, {"question": "You find $$Var(X) = 1.36$$ and need to calculate $$Var(5 - 3X)$$. A student writes $$Var(5 - 3X) = 5 - 9(1.36)$$. What two conceptual errors did they make regarding the transformation of variance? (2 steps)", "answer": "- Step 1: The first error is subtracting the 5. Adding or subtracting a constant ($$b$$) shifts the center of the distribution but does not change its spread. Therefore, the constant disappears: $$Var(aX + b) = a^2 Var(X)$$.\n- Step 2: The second error is the sign on the $$a^2$$ term. Variance is a squared distance, so it can never be negative. The multiplier $$(-3)^2 = +9$$ must be positive. The correct calculation is $$9 \\times 1.36 = 12.24$$."}, {"question": "The Edexcel convention is that inexact answers must be given to **3 significant figures** unless told otherwise. Why did giving r = 0.95 (2 s.f.) in Q1(b) lose a mark even though the value is \"essentially right\"? (2 steps)", "answer": "- Step 1: The official mark scheme accepts only answers `awrt 0.948`. \"0.95\" rounded to 2 s.f. is outside the accepted range (0.9475 â‰¤ r â‰¤ 0.9485 say). So \"0.95\" is not \"essentially right\" to Edexcel â€” it's a different stated value.\n- Step 2: The convention exists because rounding to too few s.f. discards information that the candidate clearly had â€” they could have computed it more precisely. Giving 2 s.f. when 3 s.f. is required looks like carelessness, and the mark scheme is explicit: \"do not accept 2 s.f.\".\n\nTakeaway: on WST01/01, default to 3 s.f. for any inexact (decimal) answer. If your answer is exact (a fraction like 3/4), don't convert it to a decimal."}, {"question": "Conceptually, why does extrapolation carry more risk than interpolation even when the regression line fits the observed data extremely well ($$r$$ near 1)? (3 steps)", "answer": "- Step 1: A high $$r$$ only certifies that the *linear* model fits well *within the range of data you have*. It says nothing about behaviour outside that range.\n- Step 2: Real relationships can bend, saturate, or break down beyond the observed values (e.g. weight can't grow linearly with height forever). The straight line is an assumption, not a guarantee, off the edge of the data.\n- Step 3: So interpolation rests on evidence (nearby data points), while extrapolation rests on an *unverified* continuation of the pattern â€” hence the extra risk regardless of how good the in-range fit looks.\n\nTakeaway: a great fit is only local evidence; extrapolation gambles that the same shape persists where you've never observed it."}];const SK='harry_s1_esat_20260629_v2_curated';
let mySet=new Set();
function loadSel(){const s=localStorage.getItem(SK+'_sel');if(s){try{mySet=new Set(JSON.parse(s));return}catch(e){}}DATA.forEach((c,i)=>mySet.add(i));saveSel()}
function saveSel(){localStorage.setItem(SK+'_sel',JSON.stringify([...mySet]))}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){if(!t)return'';const ls=t.split('\n');let h='';for(const l of ls){const tr=l.trim();if(!tr){h+='';continue}
  const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
  if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
  if(tr.startsWith('+ ')){h+=`<div class="sb">â—¦ ${eI(tr.slice(2))}</div>`;continue}
  if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">â€¢ ${eI(tr.slice(2))}</div>`;continue}
  h+=`<div style="margin:6px 0">${eI(tr)}</div>`}return h}
function inSel(i){return mySet.has(i)}
function tog(i,ch){if(ch)mySet.add(i);else mySet.delete(i);saveSel();
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);updBar()}
function updBar(){document.getElementById('sc').textContent=mySet.size+' in selection'}
function render(){
  const list=document.getElementById('cl');
  document.getElementById('cc').textContent=DATA.length+' cards';
  if(!DATA.length){list.innerHTML='<div class="es">No cards.</div>';return}
  let h='';
  for(let i=0;i<DATA.length;i++){const c=DATA[i];const im=inSel(i);
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="tog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');typeset(this.closest('.cd'))">${eI(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf"><button class="cpb" onclick="cpC(${i})">ðŸ“‹ Copy</button></div></div></div>`}
  list.innerHTML=h;updBar();typeset(list)}
function typeset(el){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([el]).catch(()=>{})}
function selAll(){DATA.forEach((c,i)=>mySet.add(i));saveSel();render();toast('All selected')}
function deAll(){mySet.clear();saveSel();render();toast('All deselected')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));typeset(document.getElementById('cl'))}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cs[i],cs[j]]=[cs[j],cs[i]]}cs.forEach(c=>l.appendChild(c));typeset(l)}
function resetDeck(){localStorage.removeItem(SK+'_sel');mySet=new Set();DATA.forEach((c,i)=>mySet.add(i));saveSel();render();toast('Deck reset')}
function cpC(i){const c=DATA[i];if(!c)return;navigator.clipboard.writeText(c.question+'\n\n'+c.answer).then(()=>toast('Card copied')).catch(()=>toast('Copy failed'))}
function cpNotion(){const sel=DATA.filter((c,i)=>mySet.has(i));if(!sel.length){toast('Selection empty');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  sel.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,'<br>')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(sel.length+' cards â†’ Notion/Markdown table copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('sh'),2100)}
loadSel();document.addEventListener('DOMContentLoaded',render);
</script>
