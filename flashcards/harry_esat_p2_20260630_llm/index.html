<script>
const DATA=[{"question": "Why can squaring or combining logarithms introduce a solution that must later be rejected, whereas the original equation never had it? (2 steps)", "answer": "- Step 1: The original $$\\log_5(5-a)$$ is only *defined* for $$5-a > 0$$. When you rewrite it as $$(5-a)^2$$, squaring removes the sign information — $$(5-a)^2$$ is happily positive even when $$5-a$$ is negative.\n- Step 2: So the polynomial equation is a *superset* of the log equation: it admits extra roots that satisfy the algebra but sit outside the log's domain. The domain check restores the lost constraint and discards those extraneous roots.\n\nTakeaway: algebraic rewriting (squaring, merging logs) can widen the solution set; always re-impose the original domain to catch impostors."}, {"question": "When expanding $$(2 - 5x)^8$$, a student copies the exponent as 2 on the first line. What is the conceptual danger of this error beyond just getting the wrong numbers? (2 steps)", "answer": "- Step 1: The binomial expansion relies on the binomial coefficients $$\\binom{n}{r}$$ and the descending powers of the first term $$(2)^{n-r}$$. An incorrect exponent changes the entire structure of the expansion, not just one term.\n- Step 2: If $$n=2$$, the expansion only has 3 terms and terminates quickly, completely misrepresenting the polynomial's degree and behaviour. It destroys the approximation power for values like $$2.05^8$$.\n\nTranscription errors at the start of a long calculation invalidate all subsequent work. Always double-check the initial expression against the question."}, {"question": "A geometric series has $$S_3=70.2$$ and $$S_\\infty=75$$. Why is it a costly misread to treat $$70.2$$ as the third term $$ar^2$$ instead of the *sum* of the first three? (2 steps)", "answer": "- Step 1: $$S_3=a+ar+ar^2$$ is a *cumulative* sum of three terms; $$ar^2$$ is a single term. They are different quantities, so substituting $$70.2$$ into the wrong one models a different problem entirely.\n- Step 2: The give-away is the wording \"sum of its first three terms\" — a sum, not a term. Misreading it sends you down a route that cannot be reconciled with $$S_\\infty$$.\n\nMisconception probe: \"$$S_3$$\" and \"third term\" sound similar but are structurally distinct — always parse which object the number labels."}, {"question": "A die is biased so that faces 1–5 are equally likely and face 6 is different. If you call the probability of each of faces 1–5 by the letter $$P$$, how do you express $$\\Pr(6)$$, and what constraint forces this? (2 steps)", "answer": "- Step 1: The six face-probabilities must sum to exactly 1 — that is the normalisation axiom of any probability distribution. Faces 1–5 each contribute $$P$$, so they contribute $$5P$$ together.\n- Step 2: Whatever mass is left over sits on face 6: $$\\Pr(6) = 1 - 5P$$.\n+ Caveat on labelling: you must be consistent. If instead you let $$P$$ mean the *total* mass on 1–5, then each single face is $$P/5$$ and $$\\Pr(6) = 1 - P$$. The lesson error was mixing these two meanings mid-solution.\n\nTakeaway: allocate the mass consistently and let normalisation (sum = 1) pin down the leftover face."}, {"question": "After finding a stationary point of an area function, why does showing $$A''>0$$ confirm a *minimum*, and what does that mean geometrically? (2 steps)", "answer": "- Step 1: The second derivative measures how the *slope itself* is changing. $$A''>0$$ means the slope is increasing through the stationary point — falling then rising — a valley, i.e. a minimum.\n- Step 2: For $$A=3x^2+320/x$$, $$A''=6+640/x^3$$. For physical $$x>0$$ this is always positive, so *any* stationary point there is a minimum — matching intuition that a material-minimising box exists.\n\nContrast: $$A''<0$$ would be a maximum (a hill); $$A''=0$$ is inconclusive and needs further testing."}, {"question": "If the Factor Theorem gives $$f(4/3) = 0$$ for $$f(x) = 3x^3 + ax^2 - 10x + b$$, how does clearing the denominator transform this into the integer relation $$16a + 9b = 56$$? (3 steps)", "answer": "- Step 1: The Factor Theorem states that if $$(3x - 4)$$ is a factor, then substituting the root $$x = 4/3$$ makes the polynomial equal to zero: $$f(4/3) = 3(4/3)^3 + a(4/3)^2 - 10(4/3) + b = 0$$.\n- Step 2: Evaluate the pure number terms first. $$3(64/27) = 64/9$$, and $$-10(4/3) = -40/3 = -120/9$$. Combining these gives $$64/9 - 120/9 = -56/9$$. So the equation becomes $$(16/9)a + b - 56/9 = 0$$.\n- Step 3: Multiply the entire equation by 9 to clear all denominators: $$16a + 9b - 56 = 0$$, which rearranges to $$16a + 9b = 56$$. This transforms a messy fractional equation into a clean integer relation that is easy to solve alongside a second equation.\n\nTakeaway: Always clear denominators by multiplying by the lowest common multiple to avoid fractional arithmetic errors."}, {"question": "For $$(1+2x)^6$$, find the first three ascending terms conceptually, and explain why the coefficients grow. (3 steps)", "answer": "- Step 1: $$(1+2x)^6=\\sum\\binom{6}{r}(2x)^r$$. The $$1^{6-r}$$ contributes nothing, so each term is $$\\binom{6}{r}2^r x^r$$.\n- Step 2: $$r=0$$: $$1$$. $$r=1$$: $$\\binom61\\cdot2=12$$, so $$12x$$. $$r=2$$: $$\\binom62\\cdot4=15\\cdot4=60$$, so $$60x^2$$.\n- Step 3: Result $$1+12x+60x^2+\\dots$$. Coefficients grow because both $$\\binom6r$$ (peaks in the middle) and $$2^r$$ (doubles each step) increase together early on.\n\nThe interplay of a rising binomial coefficient and a rising power of 2 drives the coefficient growth."}, {"question": "When two independent events must *both* happen (e.g. \"a six on the fair die *and* a six on the biased die\"), do you add or multiply their probabilities, and why? (3 steps)", "answer": "- Step 1: The keyword \"and\" for two independent events signals a *joint* occurrence — both conditions hold simultaneously. Independence means one die's outcome carries no information about the other's.\n- Step 2: For independent events, $$\\Pr(A \\cap B) = \\Pr(A)\\times\\Pr(B)$$. You *multiply* because each outcome of $$A$$ is subdivided into the possible outcomes of $$B$$; the fraction of the whole that satisfies both is the product of the two fractions.\n+ Adding would answer a different question — \"$$A$$ *or* $$B$$\" (for mutually exclusive events), which counts either happening, not both.\n+ Intuition: multiplying always *shrinks* probability (product of two numbers $$<1$$), matching that \"both must happen\" is more demanding than \"at least one\".\n- Step 3: So $$\\Pr(\\text{total }12) = \\Pr(6_{\\text{fair}})\\times\\Pr(6_{\\text{biased}})$$, not a sum.\n\nThe lesson error was adding the two single-die probabilities — the classic AND/OR confusion."}, {"question": "In the point-slope form $$y-y_1=m(x-x_1)$$ through $$M(5,4)$$, why is writing \"$$y-5$$\" instead of \"$$y-4$$\" a fatal slip, and how does it propagate? (2 steps)", "answer": "- Step 1: The template subtracts the *point's own coordinates*: $$y_1$$ from $$y$$ and $$x_1$$ from $$x$$. At $$M(5,4)$$, that's $$y-4$$ and $$x-5$$. Writing $$y-5$$ borrows the $$x$$-coordinate for the $$y$$-slot.\n- Step 2: It changes the constant: $$y-5=-3(x-5)\\Rightarrow y=-3x+20$$ (wrong), versus the correct $$y-4=-3(x-5)\\Rightarrow y=-3x+19$$.\n\nMisconception probe: the $$5$$ and $$4$$ are not interchangeable — each coordinate pairs with its own variable. One swapped digit shifts the whole line."}, {"question": "Given the arithmetic series $2 + 5 + 8 + 11 + \\cdots + 254$, how do you find the number of terms using the formula $u_n = a + (n-1)d$, and why does the answer come out to exactly 85? (3 steps)", "answer": "- Step 1: Identify $a = 2$ (first term), $d = 3$ (common difference — each term is previous + 3), and the last term $u_n = 254$.\n- Step 2: Substitute into $u_n = a + (n-1)d$: $$254 = 2 + (n-1)\\times 3 \\implies 252 = 3(n-1) \\implies n-1 = 84 \\implies n = 85$$\n- Step 3: Conceptual sanity check: starting from 2 and stepping by 3, the 85th term is $2 + 84 \\times 3 = 254$. The \"+1\" or \"−1\" between $(n-1)$ and $n$ comes from the fact that **counting terms starts at 1, but counting steps from the first term starts at 0**."}, {"question": "Which formulae does the IAL P2 formula booklet *supply* for series and logs, and which must you memorise or derive yourself? (3 steps)", "answer": "- Step 1: **Supplied**: arithmetic series ($$n$$th term and sum), geometric series ($$n$$th term, finite sum, *and* sum to infinity for $$|r|<1$$), the change-of-base rule for logs, the binomial theorem (positive integer index), and the trapezium rule.\n- Step 2: **Not supplied (learn/derive)**: the difference of two cubes; the Factor and Remainder Theorems; the circle equation $$(x-a)^2+(y-b)^2=r^2$$; the perpendicular-gradient rule $$m_1 m_2 = -1$$; and the log **product/quotient/power** laws (only *change of base* is given).\n- Step 3: Practical upshot: since the geometric sum formulae *are* printed, don't waste memory on them — but the log manipulation laws you use constantly are *not* given, so those must be second nature.\n+ Regular-polygon bearings are ESAT/predecessor content, not P2.\n\nTakeaway: series sums and change-of-base are gifts on the sheet; the log laws, theorems, and circle equation are yours to know cold."}, {"question": "A student sees the bearing question and immediately writes 0°, reasoning that the first leg points straight up on the page. Why is this a fundamental misunderstanding of what a bearing measures? (2 steps)", "answer": "- Step 1: A bearing is defined as the clockwise angle from **true North** at the specific point of departure, not from the vertical axis drawn on the page.\n- Step 2: Unless the diagram explicitly states that the vertical axis represents true North, assuming the page's \"up\" is North is invalid. The runner's initial heading must be deduced from the given bearing of the third leg and the geometry of the turns, not from the drawing's orientation."}, {"question": "In Q8(ii), the proof's conclusion is that $$n^3 + 3n + 2$$ is *even* and *never a multiple of 4*. Why does the second claim require showing the remainder is *always* 2 (not just *sometimes*)? (2 steps)", "answer": "- Step 1: \"Even\" is a weaker claim; \"not a multiple of 4\" is stronger. To prove the stronger claim, you must show the *remainder mod 4 is constant at 2* across all odd $$n$$, not just for one specific $$n$$.\n- Step 2: This is why the substitution $$n = 2k+1$$ is essential: it parameterises *all* odd integers, so the result $$4(\\text{integer}) + 2$$ applies universally. A proof by example (e.g., checking $$n = 1, 3, 5$$) would only show it's not always a multiple of 4 *for those $$n$$*, not for all odd $$n$$.\n\nA general proof must use the general form; examples illustrate but don't prove."}, {"question": "What is the **Factor Theorem** and why does it say \"$(x-\\alpha)$ is a factor of $f(x)$ if and only if $f(\\alpha) = 0$\"? (3 steps)", "answer": "- Step 1: Suppose $(x-\\alpha)$ is a factor of $f(x)$. Then $f(x) = (x-\\alpha) \\cdot g(x)$ for some polynomial $g(x)$. Substitute $x = \\alpha$: $f(\\alpha) = (\\alpha - \\alpha) \\cdot g(\\alpha) = 0$.\n- Step 2: Conversely, if $f(\\alpha) = 0$, polynomial long division of $f(x)$ by $(x-\\alpha)$ gives quotient $g(x)$ and remainder $f(\\alpha)$. With the remainder 0, the division is exact, so $(x-\\alpha)$ *is* a factor.\n- Step 3: Conceptual takeaway: the Factor Theorem converts a **factor question** (a divisibility statement) into a **root question** (an equation $f(\\alpha) = 0$) — a swap that is computationally much easier, since you only have to evaluate a polynomial at one point."}, {"question": "To prove a statement holds for every *odd* integer $$n$$, why do we write $$n = 2k+1$$ with $$k$$ an integer, and why is $$n = 2n+1$$ a mistake? (2 steps)", "answer": "- Step 1: Every odd integer is one more than an even integer, and even integers are exactly $$2k$$. So $$n = 2k + 1$$ as $$k$$ ranges over all integers generates *every* odd number — this makes the proof fully general, not example-based.\n- Step 2: Writing \"$$n = 2n+1$$\" reuses $$n$$ on both sides, which is self-contradictory (it implies $$n = -1$$). You need a *fresh* letter $$k$$ for the underlying integer — the tutor's correction was exactly $$2n+1 \\to 2k+1$$.\n\nTakeaway: parametrise odd $$n$$ as $$2k+1$$ with a *new* variable $$k$$ — that single substitution turns \"for all odd $$n$$\" into ordinary algebra."}, {"question": "In Q5, the long division step computes $$(3x^3 - x^2 - 10x + 8) \\div (3x - 4)$$. Why is the *leading coefficient* of the divisor (the 3) important for the division setup? (2 steps)", "answer": "- Step 1: Long division aligns coefficients by *degree*, not by leading coefficient. The leading term of the dividend is $$3x^3$$, and the leading term of the divisor is $$3x$$. So the first quotient term is $$\\tfrac{3x^3}{3x} = x^2$$.\n- Step 2: This matching ensures the polynomial degrees decrease at each step. If the leading coefficients were mismatched in a way that didn't divide cleanly, the quotient would have fractional coefficients — valid, but messier.\n\nThe leading coefficients \"drive\" the long division: each quotient term is the ratio of the current leading dividend term to the divisor's leading term."}, {"question": "In Q7(i), the trapezium sum is $$\\tfrac{1}{2} \\log_{10}\\!\\left[4 \\cdot 9 \\cdot (5 \\cdot 6 \\cdot 7 \\cdot 8)^2\\right]$$. Why does each inner ordinate appear *twice* in the product? (2 steps)", "answer": "- Step 1: The trapezium-rule structure is $$\\tfrac{h}{2}[y_0 + y_n + 2(y_1 + \\cdots + y_{n-1})]$$. The coefficient 2 on inner ordinates means they each contribute twice.\n- Step 2: When converting to logs via the product law, \"twice contributing $$\\log y$$\" means multiplying by $$y^2$$ (because $$2 \\log y = \\log y^2$$). So inner ordinates appear squared in the product.\n\nThis is the deep reason for the squaring — it's the log-domain trace of the trapezium-rule weighting."}, {"question": "For a regular pentagon walked once around, why does each turn equal $$72°$$, and how does the exterior angle differ from the interior angle? (3 steps)", "answer": "- Step 1: Walking once around *any* closed polygon and returning to your start, you turn through a full $$360°$$ in total — the exterior angles always sum to $$360°$$.\n- Step 2: For a *regular* pentagon the five turns are equal, so each exterior turn is $$\\tfrac{360°}{5} = 72°$$ (mental route: $$360 \\div 10 \\times 2$$).\n- Step 3: The interior angle is what's left on a straight line at each vertex: $$180° - 72° = 108°$$. The interior angle is an *intermediate* fact, not the turn you apply between legs.\n\nTakeaway: the *exterior* angle ($$72°$$) is the heading change per leg; the interior angle ($$108°$$) is the corner you see inside."}, {"question": "The arithmetic series formula $S_n = \\frac{n}{2}(2a + (n-1)d)$ has *three* input variables ($n, a, d$) while $u_n = a + (n-1)d$ has the same three. If you know $S_n$, $a$, $d$, can you solve for $n$? Walk through the conceptual structure of the resulting equation. (3 steps)", "answer": "- Step 1: Substituting known values in $S_n = \\frac{n}{2}(2a + (n-1)d)$ produces a *quadratic in $n$* — the $(n-1)$ inside becomes $n^2 - n$ after distribution. So you generally need the **quadratic formula** or factorisation to solve.\n- Step 2: Rearrange to standard form: $n^2 \\cdot \\frac{d}{2} + n \\cdot (a - \\frac{d}{2}) - S_n = 0$. Two unknowns give two equations; but here three inputs are *given* and one ($n$) is sought, so one quadratic suffices.\n- Step 3: Conceptual reminder: $u_n = a + (n-1)d$ is **linear** in $n$ — given $a$ and $d$, one evaluation yields $u_n$. But $S_n$ grows like $n^2$, so recovering $n$ from $S_n$ is intrinsically a *square-root-like* inversion, hence a quadratic. Watch the order: linear output, linear inverse; quadratic output, quadratic inverse."}, {"question": "In the Factor Theorem, if $$(3x - 4)$$ is a factor of $$f(x) = 3x^3 + ax^2 - 10x + b$$, why does $$f(4/3) = 0$$ rather than $$f(4) = 0$$ or $$f(3) = 0$$? (2 steps)", "answer": "- Step 1: The Factor Theorem says $$(x - c)$$ is a factor of $$f(x)$$ iff $$f(c) = 0$$. The factor $$(3x - 4)$$ is not in the form $$(x - c)$$; it's in the form $$3(x - 4/3)$$.\n- Step 2: So $$(3x-4)$$ is a factor iff $$(x - 4/3)$$ is a factor iff $$f(4/3) = 0$$. The trick is to extract the *root* from the linear factor: set $$3x - 4 = 0 \\Rightarrow x = 4/3$$, then evaluate $$f$$ at that root.\n\nThe general rule: a linear factor $$(Ax - B)$$ is equivalent to $$(x - B/A)$$ up to a constant; only the latter directly applies the Factor Theorem."}, {"question": "To disprove \"if $$x,y$$ are irrational and $$x \\ne y$$ then $$xy$$ is irrational,\" why does $$x=\\sqrt2,\\ y=3\\sqrt2$$ work, while $$\\sqrt2 \\cdot \\sqrt5$$ fails as a counterexample? (3 steps)", "answer": "- Step 1: A counterexample must satisfy *all* the hypotheses (both irrational, unequal) yet *break* the conclusion (product should be rational). So you need two unequal irrationals whose product is rational.\n- Step 2: $$\\sqrt2$$ and $$3\\sqrt2$$ are both irrational and unequal, but $$\\sqrt2 \\cdot 3\\sqrt2 = 3 \\cdot 2 = 6$$ — rational. The trick: choose factors that \"rescale the same surd\" so the roots multiply to a perfect square.\n- Step 3: $$\\sqrt2 \\cdot \\sqrt5 = \\sqrt{10}$$ is *still irrational*, so it satisfies the conclusion and disproves nothing — the surds don't combine into a whole number.\n+ One valid counterexample is enough; you don't need a general argument.\n\nTakeaway: to kill the claim you need irrationals whose product is rational — pair a surd with a rational multiple of *itself*, not with an unrelated surd."}, {"question": "In an optimisation problem, why do you first use the fixed *constraint* (e.g. capacity) to eliminate a variable before differentiating the quantity you're minimising? (3 steps)", "answer": "- Step 1: The quantity to minimise (surface area $$A$$) initially depends on *two* variables ($$x$$ and $$y$$). You cannot differentiate a two-variable expression with single-variable calculus.\n- Step 2: The constraint (volume $$=120$$) links $$x$$ and $$y$$: $$3x^2y=120\\Rightarrow y=40/x^2$$. This lets you *substitute out* $$y$$.\n- Step 3: Now $$A$$ is a function of $$x$$ alone (e.g. $$A=3x^2+320/x$$), and $$dA/dx=0$$ locates the stationary point.\n\nThe constraint is the tool that collapses a two-variable problem into the one-variable calculus you can actually do."}, {"question": "During polynomial long division of $$3x^3 - x^2 - 10x + 8$$ by $$(3x-4)$$, a student writes the subtraction row $$-x^2 - (-4x^2)$$ and gets $$-5x^2$$. Identify the error and the exam-technique rule that prevents it. (2 steps)", "answer": "- Step 1: Subtracting a negative term means adding its positive counterpart. The calculation should be $$-x^2 - (-4x^2) = -x^2 + 4x^2 = +3x^2$$, not $$-5x^2$$.\n- Step 2: The preventative rule is: always place brackets around the entire row being subtracted and explicitly distribute the minus sign. Writing it as $$... - (... + ...)$$ forces you to flip every sign in the subtrahend before combining, ensuring you add where you might mistakenly subtract again.\n\nBrackets around subtracted rows in long division are the single most effective safeguard against cascading sign errors."}, {"question": "In the circle problem, $$P=(7,k)$$ lies on the perpendicular bisector $$l:y=-3x+19$$. Why does this pin down $$k$$? (2 steps)", "answer": "- Step 1: The centre of a circle lies on the perpendicular bisector of *any* chord — because the centre is equidistant from both chord endpoints. So $$P$$ must satisfy $$l$$'s equation.\n- Step 2: Substitute $$x=7$$: $$k=-3(7)+19=-2$$. The single geometric fact (centre on the bisector) converts the known $$x$$-coordinate into the unknown $$k$$.\n\nDeeper point: this is *why* you found the bisector first — it's the line the centre is guaranteed to sit on."}, {"question": "A student \"proves\" a number is irrational by saying \"its decimal expansion goes on forever.\" Why is that the wrong definition, and what is the correct one? (3 steps)", "answer": "- Step 1: A non-terminating decimal is *not* automatically irrational. Counterexample: $$0.\\overline{3} = \\tfrac13$$ has an infinite decimal but is perfectly rational.\n- Step 2: The true dividing line is: a number is **rational** iff it can be written as $$\\tfrac{p}{q}$$ with integers $$p, q$$ ($$q \\ne 0$$). Its decimal is either terminating *or* eventually **repeating**.\n- Step 3: **Irrational** means it *cannot* be written as such a ratio; its decimal goes on forever *without* any repeating block (e.g. $$\\sqrt2,\\ \\pi$$).\n\nTakeaway: \"infinite decimal\" alone isn't irrational — the test is *non-repeating* infinite, equivalently \"no integer ratio exists.\""}, {"question": "Solving $$2\\log_5(5-a) - \\log_5(a+25) = 1$$, walk through combining the logs and why a domain check is essential. (3 steps)", "answer": "- Step 1: Use power and quotient laws: $$2\\log_5(5-a) = \\log_5(5-a)^2$$, then $$\\log_5\\dfrac{(5-a)^2}{a+25} = 1$$. Since $$\\log_5(\\cdot)=1$$ means the argument is $$5^1 = 5$$, we get $$(5-a)^2 = 5(a+25)$$.\n- Step 2: Expand: $$25 - 10a + a^2 = 5a + 125 \\Rightarrow a^2 - 15a - 100 = 0 = (a-20)(a+5)$$, so $$a = 20$$ or $$a = -5$$.\n- Step 3: **Domain check**: logs require positive arguments, so $$5 - a > 0$$ and $$a + 25 > 0$$, i.e. $$-25 < a < 5$$. Then $$a = 20$$ violates $$5 - a > 0$$ (you'd take $$\\log$$ of a negative) — reject it. Only $$a = -5$$ survives.\n+ Present the rejection as \"reject $$a=20$$ because $$5 - a < 0$$,\" naming the violated condition — not merely a cross.\n\nTakeaway: combine logs to strip them, but algebra can create phantom roots — the positivity domain of the original logs is the filter that discards them."}, {"question": "Compute (mentally) the sum $S_{85}$ of the arithmetic series $2 + 5 + 8 + \\cdots + 254$ using the formula $S_n = \\frac{n}{2}(a + u_n)$, and identify which factor in the multiplication is doing the heavy lifting. (3 steps)", "answer": "- Step 1: Substitute $n = 85$, $a = 2$, $u_n = 254$: $$S_{85} = \\tfrac{85}{2}(2 + 254) = \\tfrac{85}{2} \\times 256.$$\n- Step 2: Notice that $256 = 2^8$, and $85/2 = 42.5$. So $42.5 \\times 256 = \\frac{85 \\times 256}{2} = \\frac{21760}{2} = 10880$.\n- Step 3: Elegant factorisation: $S_{85} = 85 \\times 128 = 10{,}880$ (since $256/2 = 128$). The heavy lifter is the **128**, which is $\\frac{a+u_n}{2}$ — the average of the first and last terms. The arithmetic sum is *count × average* and nothing more."}, {"question": "Why is the gradient of the perpendicular bisector of a chord the **negative reciprocal** of the chord's gradient? (3 steps)", "answer": "- Step 1: For a chord of a circle, the perpendicular bisector **must** pass through the centre (this is the theorem that makes chord-centre geometry work). So the perpendicular bisector connects the chord's midpoint to the centre.\n- Step 2: Two lines are perpendicular iff their slopes satisfy $m_1 \\cdot m_2 = -1$. This is because perpendicular directions correspond to rotating a vector by 90°, which in 2D swaps the components and changes one sign — turning gradient $m$ into $-1/m$.\n- Step 3: If chord gradient is $m$, perpendicular gradient is $-1/m$. **Negative reciprocal** combines two operations: \"reciprocal\" ($1/m$) and \"negate\" ($-1/m$). The minus sign is non-negotiable — perpendicularity requires it."}, {"question": "Why is the sum formula for an arithmetic series $$S_n = \\dfrac{n}{2}(a + \\ell)$$? Walk through the intuition. (3 steps)", "answer": "- Step 1: Pair the first and last terms: $$a + \\ell$$. Pair the second and second-last: $$(a+d) + (\\ell - d) = a + \\ell$$ — same sum! Every \"outside-in\" pair adds to $$a + \\ell$$.\n- Step 2: If $$n$$ is even, there are $$n/2$$ such pairs, so the sum is $$\\dfrac{n}{2}(a+\\ell)$$. If $$n$$ is odd, the middle term equals $$\\tfrac{a+\\ell}{2}$$ (the average), and the same formula still holds: the middle term is just half a pair, contributing the right amount.\n- Step 3: Algebraically: $$2S_n = n(a+\\ell)$$ by the telescoping pairing, hence $$S_n = \\tfrac{n}{2}(a+\\ell)$$. This is the \"average of first and last, times count\" formula — elegant and exact."}, {"question": "Why is the perpendicular gradient to a line with gradient $$m$$ equal to $$-1/m$$ (when $$m \\neq 0$$)? (2 steps)", "answer": "- Step 1: Two lines are perpendicular iff the product of their gradients is $$-1$$: $$m_1 m_2 = -1$$. This comes from the geometric fact that rotating a line by 90° sends its slope to its negative reciprocal.\n- Step 2: So $$m_\\perp = -\\tfrac{1}{m}$$. For $$m = 1/3$$: $$m_\\perp = -\\tfrac{1}{1/3} = -3$$. The negative reciprocal flips both sign and reciprocal at once.\n\nEdge case: a horizontal line ($$m = 0$$) has a vertical perpendicular, and vice versa — the formula breaks because division by zero is undefined; these are handled separately."}, {"question": "What is a **bearing**, and what are the two specific conventions that make it a well-defined direction on a map? (2 steps)", "answer": "- Step 1: A bearing is the **clockwise angle measured from North** at the observer's location to the target. The North reference is fixed (not the page's vertical axis — a common slip).\n- Step 2: This gives two conventions: (i) always measured **clockwise** (so a bearing is always between 0° and 360°, never negative and never \"anti-clockwise\"), and (ii) always measured from **North** (not from East, not from the previous leg). Bearings describe direction *in the world*, not direction *on the page*."}, {"question": "Synthesis: several lesson errors (dice add-vs-multiply, $$S_3$$-vs-third-term, remainder-$$b$$-vs-8, cube-vs-square, $$y-5$$-vs-$$y-4$$) share a common failure mode. What is it, and what's the general guard? (3 steps)", "answer": "- Step 1: Each error is a *misreading of what an object or symbol denotes* — treating \"and\" as \"or\", a cumulative sum as a single term, the symbol $$b$$ as the number 8, a cube as a square, a $$y$$-coordinate as an $$x$$-coordinate.\n- Step 2: None is a conceptual gap in the *method*; all are precision-of-reading slips, often under time or distraction pressure (the Q2 slip was blamed on a noisy room).\n- Step 3: The general guard is to **underline/parse command words and symbols before writing** — name exactly which quantity each number labels, and work in a quiet environment.\n\nDeep lesson: at this level, marks are lost far more to *reading* precision than to *conceptual* weakness — slow the parse, not the algebra."}, {"question": "The expansion of $$(2-5x)^8$$ is meant to approximate $$2.05^8$$. What value of $$x$$ do you \"state\", and what's the logic of choosing it? (2 steps)", "answer": "- Step 1: You *match representations*: set the bracket $$2-5x$$ equal to the number being raised, $$2.05$$. So $$2-5x=2.05 \\Rightarrow -5x=0.05 \\Rightarrow x=-0.01$$.\n- Step 2: With $$x=-0.01$$ small, higher powers ($$x^2,x^3,\\dots$$) shrink rapidly, so the first four terms give a good approximation — that's *why* the small-$$x$$ substitution is useful.\n\nCommand-word note: the demand was only \"state the value of $$x$$\" — over-reading it as \"compute the approximation\" wastes time. Underline \"state\"."}, {"question": "Given $$(x-3)$$ is a factor of $$f(x)=2x^3-3x^2-11x+6$$, factorise fully. What's the mental route? (3 steps)", "answer": "- Step 1: Dividing out $$(x-3)$$ leaves a quadratic; its leading term is $$2x^2$$ (from $$2x^3\\div x$$) and its constant is $$-2$$ (from $$6\\div -3$$). So the quotient is $$2x^2+3x-2$$.\n- Step 2: Factor the quadratic: seek factors of $$2\\times(-2)=-4$$ summing to $$+3$$: that's $$+4,-1$$, giving $$2x^2+4x-x-2=(2x-1)(x+2)$$.\n- Step 3: Full factorisation: $$f(x)=(x-3)(2x-1)(x+2)$$.\n\nThe shortcut: the quotient's leading and constant coefficients are fixed by the original cubic's ends — a fast sanity check before factoring."}, {"question": "In Q8(ii), the proof target is \"$n^3 + 3n + 2$ is even but never a multiple of 4 for every odd $n$\". After substituting $n = 2k+1$, what's the strategic plan for showing both halves — even, and not-divisible-by-4? (3 steps)", "answer": "- Step 1: Show **even** by extracting a factor of 2. Expand $(2k+1)^3 + 3(2k+1) + 2 = 8k^3 + 12k^2 + 12k + 6$. Every term is divisible by 2 except... well, $8k^3$ ✓, $12k^2$ ✓, $12k$ ✓, but $6 = 2 \\cdot 3$ ✓. So the whole expression is $2(4k^3 + 6k^2 + 6k + 3)$ — even.\n- Step 2: Show **not divisible by 4** by extracting more and looking mod 4. Factor out 4 from as much as possible: $8k^3 + 12k^2 + 12k + 6 = 4(2k^3 + 3k^2 + 3k + 1) + 2$. That's $4M + 2$ for some integer $M$.\n- Step 3: $4M + 2$ is $\\equiv 2 \\pmod 4$, so it has remainder 2 when divided by 4 — meaning the expression is *even* but *not a multiple of 4*. The \"extract 4\" structure shows it is \"2 more than a multiple of 4\" — exactly the right residue."}, {"question": "In Q6, the midpoint of $A(-1, 2)$ and $B(11, 6)$ is computed as $M = ((-1+11)/2, (2+6)/2) = (5, 4)$. Why is the **midpoint formula** $M = ((x_1+x_2)/2, (y_1+y_2)/2)$ and where does the $\\div 2$ come from? (2 steps)", "answer": "- Step 1: The midpoint lies *halfway* between the two endpoints along the x-axis and *halfway* along the y-axis. Half of the distance from $x_1$ to $x_2$ is $(x_2 - x_1)/2$.\n- Step 2: Starting from $x_1$ and walking half the distance gives $M_x = x_1 + (x_2-x_1)/2 = (x_1 + x_2)/2$. The same logic applies to $y$. The $\\div 2$ is the literal \"halfway\" of a translation; it converts *difference* into *average*."}, {"question": "Why is the \"difference of cubes\" factorization $$1 - r^3 = (1-r)(1+r+r^2)$$ often a strategic trap in Geometric Series problems where both $$S_3$$ and $$S_\\infty$$ are known, and what is the superior conceptual route? (3 steps)", "answer": "- Step 1: Recognize the redundancy. $$S_3 = \\frac{a(1-r^3)}{1-r}$$ and $$S_\\infty = \\frac{a}{1-r}$$. Notice that $$S_\\infty$$ is literally a sub-component of $$S_3$$. Factoring $$1-r^3$$ treats the numerator as an isolated polynomial, ignoring its relationship to the denominator and the infinite sum.\n- Step 2: Execute the substitution route. Rewrite $$S_3$$ as $$S_\\infty \\times (1-r^3)$$. This eliminates $$a$$ and $$(1-r)$$ instantly. You get a direct equation for $$r$$: $$70.2 = 75(1-r^3)$$.\n- Step 3: Compare cognitive load. The factorization route requires expanding polynomials and solving quadratics/cubics. The substitution route reduces the problem to simple arithmetic ($$1 - r^3 = \\frac{70.2}{75}$$). Always look for the *structural nesting* of formulas before applying brute-force algebra.\n\nTreat $$S_\\infty$$ as a known constant block within the $$S_n$$ formula to eliminate variables."}, {"question": "For a circle with centre $(a, b)$ and radius $r$, derive the equation $(x-a)^2 + (y-b)^2 = r^2$ from the Pythagorean distance formula. (3 steps)", "answer": "- Step 1: A point $(x, y)$ lies on the circle iff its distance from the centre $(a, b)$ equals $r$. By the distance formula: $$\\sqrt{(x-a)^2 + (y-b)^2} = r$$\n- Step 2: Square both sides to remove the square root: $$(x-a)^2 + (y-b)^2 = r^2$$\n- Step 3: Geometric meaning: the equation says \"horizontal distance squared plus vertical distance squared equals radius squared\" — i.e., Pythagoras applied at every point on the circle. The two squared terms on the left are **independent** orthogonal components that together trace out the circle's curve."}, {"question": "In Q5(c), the factorisation $$f(x) = (3x-4)(x+2)(x-1)$$ has three linear factors. Why must a cubic have exactly *three* linear factors (over the reals) when fully factorised? (2 steps)", "answer": "- Step 1: A cubic polynomial has degree 3, meaning the highest power of $$x$$ is 3. Each linear factor $$(ax + b)$$ contributes degree 1 to the product.\n- Step 2: By the fundamental theorem of algebra, a polynomial of degree $$n$$ has exactly $$n$$ complex roots (counted with multiplicity). Over the reals, complex roots come in conjugate pairs, so a real cubic has at least one real root; the remaining quadratic factor may be real- or complex-factorable. For a real cubic with three real roots, all three factors are linear over the reals.\n\nThe factor count matches the degree: degree 3 → 3 linear factors (when all roots are real)."}, {"question": "In optimising the cuboid's area $$A = 3x^2 + 320/x$$, what does setting $$A' = 0$$ find, and how does $$A''$$ confirm it's a *minimum* rather than a maximum? (3 steps)", "answer": "- Step 1: $$A' = 6x - \\dfrac{320}{x^2}$$. Setting $$A' = 0$$ locates a **stationary point** — where the area momentarily stops changing, i.e. the turning point. Solving gives $$x^3 = \\tfrac{160}{3}$$, so $$x \\approx 3.76$$.\n- Step 2: The second derivative $$A'' = 6 + \\dfrac{640}{x^3}$$ measures *curvature*. For $$x > 0$$ both terms are positive, so $$A'' > 0$$.\n- Step 3: Positive curvature means the graph is concave up (cup-shaped) there, so the stationary point is a **minimum** — the least-material design.\n+ Conceptually this must be a minimum: as $$x \\to 0$$ the box gets infinitely tall ($$320/x \\to \\infty$$) and as $$x \\to \\infty$$ the base blows up ($$3x^2 \\to \\infty$$); area is large at both ends, so the interior turning point is the valley.\n\nTakeaway: $$A'=0$$ finds where; $$A''>0$$ certifies it's a valley (minimum) via positive curvature."}, {"question": "For an arithmetic series with first term $a$ and common difference $d$, derive (or intuitively justify) why the $n$-th term is $a + (n-1)d$. (2 steps)", "answer": "- Step 1: Start with the first term $a$. The second term is \"one step of size $d$ beyond $a$\": $a + d$. The third term is \"two steps beyond $a$\": $a + 2d$. The pattern is **add $d$ once per step past the first**.\n- Step 2: To reach the $n$-th term, you have taken $(n-1)$ steps from the first term. So $$u_n = a + (n-1)d$$ The $-1$ is essential: the first term uses **zero** steps, the second uses **one**, and so on. This formula lets you find any term if you know its position."}, {"question": "A student incorrectly labels the interior angle of the pentagon (108°) as the bearing change between legs. Why is this wrong, and what should 108° actually represent? (2 steps)", "answer": "- Step 1: The interior angle is the angle **inside the polygon** at a vertex, between two adjacent edges meeting there. It is *not* the amount a runner's heading changes when they go around a corner.\n- Step 2: The heading change of a runner is the **external** turn — the angle through which their facing direction rotates. This is $180° - \\text{interior angle}$ (because exterior + interior = a straight line as a straightening reflex). For a pentagon: $180° - 108° = 72°$, which matches $360°/5$. So the interior angle 108° is a *geometric fact* about the polygon, but irrelevant to bearings."}, {"question": "For Q8(ii), every odd integer can be written as $n = 2k + 1$ where $k$ is an integer. Why is this a **bijection** between odd integers and all integers (i.e., why does every odd integer appear exactly once)? (2 steps)", "answer": "- Step 1: For any integer $k$, $2k+1$ is odd (twice any integer plus one is odd), so the map $k \\mapsto 2k+1$ produces **only** odd integers.\n- Step 2: For any odd integer $n$, $k = (n-1)/2$ is an integer (since $n-1$ is even), so this $k$ recovers $n$ as $2((n-1)/2) + 1 = n$. Hence the map is onto. Distinct $k$'s give distinct $2k+1$, so it's one-to-one. Bijection means you can replace \"every odd $n$\" by \"every integer $k$\" in any proof statement — a powerful move."}, {"question": "In a counter-example proof, why is *one* valid counter-example enough to disprove a universal claim? (2 steps)", "answer": "- Step 1: A universal claim has the form \"for all $$x$$, property $$P(x)$$ holds\". To disprove it, you only need *one* $$x$$ for which $$P(x)$$ fails — the \"all\" is refuted by the existence of a single exception.\n- Step 2: This is the *logical asymmetry* between \"all\" and \"some\": proving \"all\" requires exhaustive verification, but disproving \"all\" requires only one counter-example. The claim \"all swans are white\" is destroyed by a single black swan.\n\nCounter-example proofs are the most efficient disproofs of universal statements — leverage this whenever you see \"all\" or \"every\" in a claim."}, {"question": "Why is the difference of two cubes $$1-r^3=(1-r)(1+r+r^2)$$, and how does it connect to the geometric-sum formula? (3 steps)", "answer": "- Step 1: Expand $$(1-r)(1+r+r^2)$$: the $$1$$ gives $$1+r+r^2$$; the $$-r$$ gives $$-r-r^2-r^3$$. Adding, the $$r$$ and $$r^2$$ terms cancel telescopically, leaving $$1-r^3$$.\n- Step 2: This is the $$n=3$$ case of the general geometric identity $$1-r^n=(1-r)(1+r+\\dots+r^{n-1})$$ — the cancellation is exactly why $$S_n=a\\dfrac{1-r^n}{1-r}$$ holds.\n- Step 3: So $$S_3=a(1+r+r^2)=a\\dfrac{1-r^3}{1-r}$$ — the factorisation *is* the sum formula in disguise.\n\nThe telescoping cancellation is the engine behind every finite geometric sum."}, {"question": "In Q8(i), why is the original claim \"if $$x, y$$ irrational and $$x \\neq y$$, then $$xy$$ irrational\" a *false but plausible* statement? (2 steps)", "answer": "- Step 1: The claim is plausible because most *random* pairs of irrationals have irrational products — e.g., $$\\sqrt{2} \\cdot \\sqrt{3} = \\sqrt{6}$$ is irrational. The pattern \"irrational × irrational = irrational\" is the *default* outcome.\n- Step 2: But \"default\" isn't \"universal\". The counter-example exploits the *cancellation* of irrational parts when one factor is a rational multiple of the other. The claim fails because the structure of \"irrational\" is too broad to constrain products universally.\n\nFalse-but-plausible claims are the hardest to disprove — they need careful counter-examples, not just skepticism."}, {"question": "Misconception probe: a student says \"the probability of scoring 12 is $1/6 + q$\" and treats the events as needing *summation*. Where does this reasoning collapse? (2 steps)", "answer": "- Step 1: The student is treating \"die 1 shows 6\" and \"die 2 shows 6\" as **mutually exclusive outcomes of a single trial**, when in fact they are **simultaneous conditions on different dice**. Two events on *different* dice cannot mutually exclude each other — they can both happen at the same time (both dice landing on 6 is exactly the event we want).\n- Step 2: Addition $\\Pr(A) + \\Pr(B)$ works for an \"either/or\" situation where exactly one of $A$ or $B$ occurs. With two dice rolled together, \"die 1 shows 6\" and \"die 2 shows 6\" are *independent dimensions* of the same outcome, so you enumerate the *joint* outcomes by multiplying row-by-column entries in the sample space grid."}, {"question": "For an open-topped cuboid ($$3x$$ by $$x$$ base, height $$y$$), why does the surface-area formula include the base *once* but the four sides, and no top? (3 steps)", "answer": "- Step 1: \"Open-topped\" means no lid — you count the base plus four walls only. This is why area $$\\neq$$ full-box area.\n- Step 2: Base area $$=3x\\cdot x=3x^2$$ (counted once). The four walls: two of dimension $$3x\\times y$$ and two of $$x\\times y$$, totalling $$2(3xy)+2(xy)=8xy$$.\n- Step 3: So $$A=3x^2+8xy$$; substituting $$y=40/x^2$$ gives $$A=3x^2+320/x$$ (so $$P=3,\\ Q=320$$).\n\nMisconception probe: forgetting the shape is open (adding a top) or double-counting the base inflates $$A$$ and gives the wrong constants."}, {"question": "*Exam technique:* why write \"reject\" *plus the violated condition* rather than just crossing out an extraneous root in a log equation? (2 steps)", "answer": "- Step 1: The rejection carries method marks: it shows you understood the log domain, not that you guessed. Naming the condition (\"$$5-a > 0$$ fails at $$a=20$$\") demonstrates the reasoning.\n- Step 2: A bare cross is ambiguous — an examiner can't tell if you rejected it for a valid reason or by luck, so the mark is at risk. Explicit justification makes the logic auditable.\n\nTakeaway: a rejection is an *argument*, not a deletion — state which positivity condition the discarded root breaks."}, {"question": "To solve $$2\\log_5(5-a)-\\log_5(a+25)=1$$, why do you combine into a single log, and what does the \"$$=1$$\" convert to? (3 steps)", "answer": "- Step 1: Use power then quotient laws: $$2\\log_5(5-a)=\\log_5(5-a)^2$$, and subtracting logs divides: $$\\log_5\\dfrac{(5-a)^2}{a+25}=1$$.\n- Step 2: \"$$=1$$\" in base 5 means the argument equals $$5^1=5$$ (since $$\\log_5 5=1$$). So $$\\dfrac{(5-a)^2}{a+25}=5$$.\n- Step 3: Cross-multiply: $$(5-a)^2=5(a+25)\\Rightarrow a^2-15a-100=0\\Rightarrow(a-20)(a+5)=0$$.\n\nThe single-log form lets you \"undo\" the log by raising the base to both sides — the entire strategy hinges on collapsing to one logarithm."}, {"question": "A fair die and a biased die are rolled; the biased die shows 6 with probability $$q$$. If $$\\Pr(\\text{total}=12)=\\tfrac{1}{18}$$, how do you find $$q$$? (3 steps)", "answer": "- Step 1: A total of 12 requires a 6 on *both* dice — there is exactly one way. So $$\\Pr(\\text{total }12)=\\Pr(6_{\\text{fair}})\\times\\Pr(6_{\\text{biased}})$$.\n- Step 2: The fair die gives $$\\tfrac16$$, so $$\\tfrac16 \\cdot q = \\tfrac{1}{18}$$.\n- Step 3: Solve: $$q = \\tfrac{6}{18} = \\tfrac13$$. The given \"total 12\" event is the *key* that unlocks the unknown bias.\n\nConceptually: the exam hands you one joint probability precisely so you can back out the single unknown parameter of the biased die."}, {"question": "In the Q4 direct-substitution route, the equation $$75(1 - r^3) = 70.2$$ becomes $$1 - r^3 = \\tfrac{117}{125}$$. Why is the fraction $$\\tfrac{117}{125}$$ in lowest terms, and why does this matter? (2 steps)", "answer": "- Step 1: $$\\gcd(117, 125) = 1$$ because $$125 = 5^3$$ and $$117 = 9 \\cdot 13$$ (no factor of 5). So the fraction is already reduced.\n- Step 2: Having the fraction in lowest terms helps in the next step: $$r^3 = 1 - \\tfrac{117}{125} = \\tfrac{8}{125}$$, which is recognisably a perfect cube: $$\\tfrac{8}{125} = \\left(\\tfrac{2}{5}\\right)^3$$. Recognisable cubes are easy to take cube roots of; messy fractions would force a calculator step.\n\nThe \"clean\" numbers here are no accident — exam questions are designed so the algebraic path ends in a recognisable form."}, {"question": "In the binomial expansion of $$(2 - 5x)^8$$, why does writing the first term as \"256\" — not \"$$2^8$$\" alone — score the first accuracy mark? (2 steps)", "answer": "- Step 1: The first term is $$\\binom{8}{0}(2)^8(-5x)^0 = 1 \\cdot 256 \\cdot 1 = 256$$. The number 256 is the *computed value* of the constant term.\n- Step 2: If a student writes just \"$$2^8$$\" as the first term, the marker has to assume they know $$2^8 = 256$$ — but an error could hide in the unevaluated form. Writing the numerical value 256 makes the work unambiguously correct and shows the binomial coefficient was applied.\n\nAlways evaluate constants to plain numbers in expansion answers; the marker awards accuracy marks for the *finished* form."}, {"question": "Synthesis: across the log problems (trapezium $$\\to\\log_{10}k$$ and the $$\\log_5$$ equation), what single family of log laws does the booklet *not* give you, and why must you know them cold? (3 steps)", "answer": "- Step 1: The booklet supplies *only change of base*. The **product** ($$\\log a+\\log b=\\log ab$$), **quotient** ($$\\log a-\\log b=\\log\\tfrac ab$$), and **power** ($$n\\log a=\\log a^n$$) laws are *not* printed.\n- Step 2: Every step of both problems relies on them: summing ordinates into one log, turning $$2\\log$$ into a square, and combining $$2\\log_5(5-a)-\\log_5(a+25)$$ into a single log. Without them you cannot even start.\n- Step 3: So the \"hidden\" curriculum burden is the three product/quotient/power laws — the most-used yet un-supplied tools.\n\nTakeaway: the log laws you use constantly are exactly the ones you must memorise; only change-of-base is a freebie."}, {"question": "Conceptually, why does \"$$\\equiv 2 \\pmod 4$$\" capture *both* \"even\" and \"not a multiple of 4\" at once? (2 steps)", "answer": "- Step 1: Residues mod 4 are $$0,1,2,3$$. Even numbers are those $$\\equiv 0$$ or $$\\equiv 2$$; odd are $$\\equiv 1$$ or $$\\equiv 3$$. So residue $$2$$ is squarely in the \"even\" camp.\n- Step 2: Multiples of 4 are exactly the $$\\equiv 0$$ residues. Residue $$2 \\ne 0$$, so a number $$\\equiv 2 \\pmod 4$$ is even yet definitely *not* divisible by 4 — it sits exactly halfway between consecutive multiples of 4.\n\nTakeaway: mod-4 residue 2 = \"even but stuck between multiples of 4\" — one residue encodes both required properties."}, {"question": "Why does the work of finding $b$ in Q5 require using *both* $f(4/3) = 0$ (Factor Theorem) and $f(2) = b$ (Remainder Theorem), even though only one might seem sufficient? (2 steps)", "answer": "- Step 1: $f(2) = b$ alone gave us $a = -1$ but said nothing about $b$ (it cancelled). We have one equation: $16a + 9b = 56$ (from $f(4/3) = 0$) and we just learned $a = -1$.\n- Step 2: Substitute $a = -1$ into that earlier equation: $16(-1) + 9b = 56$, giving $9b = 72$, so $b = 8$. **Both conditions together** are needed: the Factor Theorem gives a *coupled* equation between $a$ and $b$, and the Remainder Theorem gives a *decoupled* one. Decoupling first is efficient."}, {"question": "Why does knowing the centre $$P$$ and one point $$B$$ on a circle immediately give its equation, and what's the role of \"draw a radius\"? (3 steps)", "answer": "- Step 1: A circle is the set of points a fixed distance (radius $$r$$) from the centre. So $$(x-a)^2+(y-b)^2=r^2$$ needs only the centre $$(a,b)$$ and $$r$$.\n- Step 2: The radius is the distance from the centre to *any* point on the circle — so drawing the segment $$P$$-to-$$B$$ gives $$r$$ via the distance formula. This is the \"draw a radius\" unlock: it turns an unknown radius into a computable length.\n- Step 3: For $$P(7,-2),B(11,6)$$: $$r^2=(11-7)^2+(6+2)^2=16+64=80$$, so $$(x-7)^2+(y+2)^2=80$$.\n\nNote you never need $$r$$ itself, only $$r^2$$ — leaving it as $$80$$ avoids an ugly surd."}, {"question": "In the question \"show that $$16a + 9b = 56$$\" in Q5(a), why is \"show that\" a different command from \"find\"? (2 steps)", "answer": "- Step 1: \"Show that\" tells you the answer *in advance* and asks you to demonstrate *how to reach it*. The marker expects to see logical steps from given conditions to the stated conclusion, with no missing steps.\n- Step 2: \"Find\" means the answer is unknown and you must compute it. \"Show that\" is more lenient (the answer is given) but stricter on *method* — every algebraic step must be visible, with no logical jumps.\n\nThis is why Q5(a) was harder to \"complete independently\" — the student had to *manufacture* a derivation, not just verify an answer."}, {"question": "When solving for individual probabilities on a biased die with six faces, a student writes $$\\Pr(\\text{faces 1 to 5}) = P$$ and $$\\Pr(\\text{face 6}) = 1 - P$$. Why will this lead to an inconsistent probability distribution? (2 steps)", "answer": "- Step 1: The variable $$P$$ is ambiguous. If $$P$$ is the *total* probability mass for faces 1 to 5, then each face has probability $$P/5$$, and the die's probabilities sum to $$5(P/5) + (1-P) = 1$$, which is consistent. However, if the student then treats $$P$$ as the probability of *each* face, they are saying each face has probability $$P$$ and face 6 has probability $$1-P$$.\n- Step 2: Under the \"each face\" interpretation, the sum of probabilities is $$5P + (1-P) = 4P + 1$$. For this to equal 1, $$P$$ must be 0, making all faces impossible. The error is failing to consistently define what $$P$$ represents and incorrectly summing the probabilities.\n\nAlways state explicitly whether a variable represents a single outcome's probability or the grouped mass, then verify the total sums to 1."}, {"question": "On the pentagon track, a runner running clockwise has the third leg on a bearing of 110°. Why can't the first-leg bearing simply be $110° - 2 \\times 72°$ without the modular adjustment step, and what's the right way to handle it? (3 steps)", "answer": "- Step 1: Going backwards two legs in time, each leg turns the heading by 72° clockwise. So going from the first leg to the third leg, the heading has advanced by $2 \\times 72° = 144°$ clockwise.\n- Step 2: Therefore, going from the third leg *back* to the first leg, the heading decreases by 144°. So the first-leg bearing is $110° - 144° = -34°$.\n- Step 3: A bearing **must** be in $[0°, 360°)$, never negative. Modular adjustment adds 360°: $$-34° + 360° = 326°$$ Answer: 326° (option H). The conceptual lesson: when a bearing calculation gives a negative number, *always* add 360° once — bearings wrap around clockwise."}, {"question": "In Q8(i), the student initially claimed $$3/7$$ as a counter-example. Why is $$3/7$$ irrational, and why is it the *wrong* type of counter-example? (2 steps)", "answer": "- Step 1: $$3/7$$ is **rational** — it's a ratio of two integers in lowest terms, so by definition it's rational (not irrational). The student's first attempt mis-identified its nature.\n- Step 2: Even if it were irrational, $$3/7$$ would need *two* irrationals to disprove the claim. The claim is about the *product* of two irrationals, so the counter-example needs two irrational inputs whose product is rational.\n\nA counter-example must (i) match the claim's setup (here, two irrationals $$x \\neq y$$) and (ii) violate the claim's conclusion (here, $$xy$$ being rational)."}, {"question": "Why is dividing $$S_3=a(1-r^3)/(1-r)$$ by $$S_\\infty=a/(1-r)$$ the elegant route to find $$r$$? (3 steps)", "answer": "- Step 1: Both formulas share the factor $$a/(1-r)$$. Since $$S_\\infty=a/(1-r)=75$$, you can *substitute that whole block* into $$S_3$$.\n- Step 2: $$S_3 = \\underbrace{\\tfrac{a}{1-r}}_{75}\\,(1-r^3)=75(1-r^3)=70.2$$. The unknown $$a$$ has vanished — one equation, one unknown $$r$$.\n- Step 3: $$1-r^3=\\tfrac{70.2}{75}=\\tfrac{117}{125}\\Rightarrow r^3=\\tfrac{8}{125}\\Rightarrow r=\\tfrac25$$.\n\nTakeaway: spotting the *shared factor* avoids the messy difference-of-cubes expansion — the tutor called the cubes route \"harder\"."}, {"question": "When solving the logarithmic equation $$2\\log_5(5-a) - \\log_5(a+25) = 1$$, a student correctly finds $$a=20$$ and $$a=-5$$, but rejects $$a=-5$$ because \"it makes the first log negative.\" Why is this reasoning incomplete? (3 steps)", "answer": "- Step 1: A logarithm's argument must be strictly greater than zero ($$>0$$), not just \"not negative.\" $$0$$ is not negative, but $$\\log_5(0)$$ is undefined.\n- Step 2: You must check the domain condition for *every* log argument in the original equation. The conditions are $$5-a > 0$$ and $$a+25 > 0$$, which together restrict the domain to $$-25 < a < 5$$.\n- Step 3: The value $$a=20$$ is rejected not because it makes the first log negative, but because it violates $$5-a > 0$$ (since $$5-20 = -15 < 0$$, the argument is not strictly positive). The value $$a=-5$$ is accepted because it satisfies both: $$5-(-5) = 10 > 0$$ and $$-5+25 = 20 > 0$$.\n\nAlways state the domain explicitly (argument > 0) and check all arguments against it. \"Reject because argument < 0\" misses the boundary case of 0."}, {"question": "What is the conceptual difference between the Factor Theorem and the Remainder Theorem, and how are they two faces of the same idea? (3 steps)", "answer": "- Step 1: The Remainder Theorem says: dividing $$f(x)$$ by $$(x - c)$$ leaves remainder $$f(c)$$. The remainder is just the polynomial *evaluated* at the root of the divisor.\n- Step 2: The Factor Theorem is the special case when that remainder is **zero**: $$f(c) = 0 \\iff (x-c)$$ divides $$f(x)$$ exactly.\n- Step 3: So \"factor\" is \"remainder = 0.\" Both replace laborious division with a single substitution $$x = c$$.\n+ Watch the wording: \"leaves remainder $$b$$\" means $$f(c) = b$$, *not* $$f(c) = 0$$ and *not* some fixed number like 8. Set $$f(c)$$ equal to whatever the remainder is stated to be.\n\nTakeaway: remainder = $$f(c)$$ always; factor = the case where that value is exactly zero."}, {"question": "In Q5 part (c), you must factorise $f(x) = 3x^3 - x^2 - 10x + 8$ fully *using algebra* (not a graph or calculator). What's the strategy that chained the previous answers $(a=-1, b=8)$ to the factorisation? (3 steps)", "answer": "- Step 1: Knowing $(3x-4)$ is a factor, do polynomial long division of $3x^3 - x^2 - 10x + 8$ by $3x-4$. The quotient will be a quadratic: $x^2 + x - 2$.\n- Step 2: Factor the quadratic $x^2 + x - 2$ by finding two numbers that multiply to $-2$ and add to $1$: those are $2$ and $-1$, giving $(x+2)(x-1)$.\n- Step 3: So the full factorisation is $$f(x) = (3x-4)(x+2)(x-1)$$ The chain of reasoning is: previous answers establish $a, b$, which *fully determine* $f(x)$, which can now be factored using the linear factor (3x-4) plus algebraic factoring of the resulting quadratic."}, {"question": "For an open-topped cuboid with base $$3x$$ by $$x$$, height $$y$$, and fixed volume $$120\\,\\text{m}^3$$, why does the surface area reduce to a function of $$x$$ alone of the form $$A = Px^2 + Q/x$$? (3 steps)", "answer": "- Step 1: The volume constraint links $$x$$ and $$y$$: $$3x^2 y = 120 \\Rightarrow y = \\dfrac{40}{x^2}$$. One variable is now dependent, so the problem is genuinely one-dimensional.\n- Step 2: The sheet metal is the base plus four sides (no top): base $$3x^2$$, and side area $$2(3x)y + 2xy = 8xy$$. So $$A = 3x^2 + 8xy$$.\n- Step 3: Substitute $$y = 40/x^2$$: $$A = 3x^2 + 8x\\cdot\\dfrac{40}{x^2} = 3x^2 + \\dfrac{320}{x}$$, so $$P = 3,\\ Q = 320$$.\n+ The $$x^2$$ term is \"material grows with area\"; the $$1/x$$ term is \"a thin tall box needs a lot of side wall\" — the two pull in opposite directions, which is why a minimum exists.\n\nTakeaway: use the fixed-volume equation to eliminate $$y$$; the competing $$x^2$$ and $$1/x$$ terms are what create an optimum."}, {"question": "In a perpendicular bisector problem, why is the perpendicular bisector of any chord the line on which the **centre must lie** (one direction of the chord-centre theorem)? (2 steps)", "answer": "- Step 1: The set of points equidistant from two fixed points $A$ and $B$ is, by symmetry, the locus where the \"$A$-side\" and \"$B$-side\" balance. Walking perpendicular to $AB$ from the midpoint is the natural \"balance axis\".\n- Step 2: More carefully: if a point $P$ lies on this line, then triangles $PAM$ and $PBM$ are congruent (right-angle, shared hypotenuse $PM$, shared leg $AM = BM$), so $PA = PB$. So every point on the perpendicular bisector is equidistant from $A$ and $B$. The centre, being equidistant from *every* point on the circle, must in particular be equidistant from $A$ and $B$ (both on the circle) — forcing it onto the perpendicular bisector."}, {"question": "Once $$a = -1, b = 8$$, the cubic $$f(x) = 3x^3 - x^2 - 10x + 8$$ factorises as $$(3x-4)(x+2)(x-1)$$. Why does multiplying these three factors *back* yield the original polynomial, and what does this confirm? (2 steps)", "answer": "- Step 1: Expand $$(x+2)(x-1) = x^2 + x - 2$$. Then $$(3x-4)(x^2+x-2) = 3x^3 + 3x^2 - 6x - 4x^2 - 4x + 8 = 3x^3 - x^2 - 10x + 8$$ — matches $$f(x)$$.\n- Step 2: This confirms three things simultaneously: (i) all three factors are correct, (ii) the constants $$a, b$$ are correct, and (iii) the Factor and Remainder Theorem reasoning was valid. The full factorisation is the *verification* that the original equations were consistent.\n\nThe reverse expansion is a built-in answer check — always do it in exam questions worth 3 marks."}, {"question": "In Q8(ii), substituting $$n = 2k+1$$ into $$n^3 + 3n + 2$$ gives $$4(2k^3 + 3k^2 + 3k + 1) + 2$$. Why is this expression \"even but not a multiple of 4\"? (3 steps)", "answer": "- Step 1: The expression is $$4 \\cdot (\\text{integer}) + 2$$. Any integer of the form $$4m + 2$$ is *even* (divisible by 2, because $$4m + 2 = 2(2m+1)$$), so it's even.\n- Step 2: But it's *not* a multiple of 4, because $$4m + 2$$ leaves remainder 2 when divided by 4 (since $$4m$$ is divisible by 4, and adding 2 doesn't reach the next multiple).\n- Step 3: This holds for *every* integer $$k$$, so for every odd $$n$$, the expression $$n^3 + 3n + 2$$ has the form $$4m + 2$$, which is even but never a multiple of 4.\n\nThe pattern $$4m + 2$$ encodes \"even, not multiple of 4\" — same as saying \"$$\\equiv 2 \\pmod{4}$$\"."}, {"question": "When finding the equation of a circle given a center $$P$$ and a point $$B$$ on the circumference, why is it conceptually redundant to calculate the radius $$r$$ as a decimal before writing the equation? (2 steps)", "answer": "- Step 1: Identify the required form. The standard circle equation is $$(x-a)^2 + (y-b)^2 = r^2$$. The parameter needed is $$r^2$$, not $$r$$.\n- Step 2: Preserve precision. Calculating $$r = \\sqrt{80} \\approx 8.94$$ introduces rounding error and loses exactness. Keeping $$r^2 = 80$$ (derived directly from Pythagoras: $$\\Delta x^2 + \\Delta y^2$$) maintains the integer/surd structure required for exact marks. The radius is a geometric distance; the equation parameter is a squared metric.\n\nThe equation consumes squared distance; extracting the root is an unnecessary and lossy intermediate step."}, {"question": "In the biased-dice problem, why is it a conceptual trap to assume the answer for \"total of 2\" is the same as for \"total of 12\"? (2 steps)", "answer": "- Step 1: Symmetry of totals holds only for a *fair* die, where $$\\Pr(1) = \\Pr(6)$$. Here the die is biased, so face 6 and face 1 carry different masses: $$\\Pr(6_{\\text{bias}}) = \\tfrac13$$ but $$\\Pr(1_{\\text{bias}}) = \\tfrac{2}{15}$$.\n- Step 2: Hence total-12 (needs both sixes) and total-2 (needs both ones) have genuinely different probabilities: $$\\tfrac{1}{18}$$ versus $$\\tfrac{1}{45}$$.\n\nTakeaway: bias breaks the usual \"ends of the range are symmetric\" intuition — always recompute with the actual face masses."}, {"question": "Why is the Remainder Theorem statement \"dividing $$f(x)$$ by $$(x-c)$$ leaves remainder $$f(c)$$\" — and why is this *not* the same as \"$$f(c)$$ is the quotient\"? (2 steps)", "answer": "- Step 1: Polynomial division yields $$f(x) = (x-c) Q(x) + r$$, where $$Q(x)$$ is the quotient and $$r$$ is a constant remainder (because dividing by a linear polynomial always gives a constant remainder).\n- Step 2: Substituting $$x = c$$ makes the first term vanish: $$f(c) = (c-c) Q(c) + r = r$$. So $$f(c)$$ equals the remainder — never the quotient (the quotient is the polynomial $$Q(x)$$ itself, which is a different object).\n\nThe lesson's Q5 trap was reading \"remainder = $$b$$\" as if $$b = 8$$; the condition is just that the *unknown* remainder is called $$b$$, so $$f(2) = b$$."}, {"question": "An open-topped cuboid has a volume of 120. Its base has length 3x and width x. If the height y is replaced by $$40/x^2$$, explain the directional relationship between x and the surface area A for very small and very large values of x. (3 steps)", "answer": "- Step 1: The area is $$A = 3x^2 + \\frac{320}{x}$$. For very small $$x$$ (approaching 0), the term $$\\frac{320}{x}$$ grows towards infinity, meaning the area becomes massive because the height $$y = \\frac{40}{x^2}$$ must be enormous to maintain the volume.\n- Step 2: For very large $$x$$, the term $$3x^2$$ dominates and grows towards infinity, meaning the area becomes massive because the base itself is sprawling.\n- Step 3: Since the area approaches infinity at both extremes and is continuous, it must have a minimum somewhere in between. Calculus finds this exact stationary point where the rate of area increase from the base perfectly balances the rate of area decrease from the shrinking walls.\n\nOptimisation problems often feature a \"U-shaped\" curve where one term pulls the total up at low values and another pulls it up at high values."}, {"question": "In Q8(ii), why is the substitution $$n = 2k+1$$ valid for *every* odd integer, including negative odd integers like $$-3$$ or $$-7$$? (2 steps)", "answer": "- Step 1: For $$n = -3$$: $$-3 = 2(-2) + 1$$, so $$k = -2$$. For $$n = -7$$: $$-7 = 2(-4) + 1$$, so $$k = -4$$. The substitution works for *all* integers $$k$$, including negative ones.\n- Step 2: The proof $$n^3 + 3n + 2 = 4(\\text{integer}) + 2$$ holds for any integer $$k$$ (positive, negative, or zero), because all the algebraic manipulations are polynomial identities over the integers.\n\nThe substitution covers the *full* odd-integer set, not just the positives — a common pitfall is to assume \"odd\" means positive odd."}, {"question": "Why does a geometric series have a finite sum to infinity only when $$|r| < 1$$, and what does the value $$S_\\infty = a/(1-r)$$ represent? (3 steps)", "answer": "- Step 1: Each term is the previous one times $$r$$. If $$|r| < 1$$, terms shrink geometrically toward zero, so the running total settles down (converges).\n- Step 2: If $$|r| \\ge 1$$, terms don't shrink — they stay the same size or grow — so the partial sums march off to infinity and no finite limit exists.\n- Step 3: In the finite-sum formula $$S_n = \\dfrac{a(1-r^n)}{1-r}$$, when $$|r|<1$$ the $$r^n$$ term vanishes as $$n\\to\\infty$$, leaving $$S_\\infty = \\dfrac{a}{1-r}$$ — the total \"reachable distance\" of the shrinking steps.\n+ Feel it: $$1 + \\tfrac12 + \\tfrac14 + \\cdots = 2$$; infinitely many steps, finite destination, because each step is half the last.\n\nTakeaway: convergence needs shrinking terms ($$|r|<1$$); $$S_\\infty$$ is the finite limit that the ever-smaller additions approach."}, {"question": "For the biased die, you're told $$\\Pr(\\text{total } 12) = \\tfrac{1}{18}$$ where the fair die contributes $$\\tfrac16$$. Sketch how to back out the biased die's $$\\Pr(6)$$, then $$\\Pr(1)$$. (3 steps)", "answer": "- Step 1: Total 12 needs a 6 on both. Let biased $$\\Pr(6) = q$$. Independence gives $$\\tfrac16 \\cdot q = \\tfrac{1}{18}$$, so $$q = \\tfrac13$$.\n- Step 2: The remaining mass $$1 - \\tfrac13 = \\tfrac23$$ is shared equally over faces 1–5, so each is $$\\tfrac{2/3}{5} = \\tfrac{2}{15}$$. This is $$\\Pr(1_{\\text{biased}})$$.\n- Step 3: A total of 2 needs a 1 on *both* dice: $$\\Pr(\\text{total }2) = \\tfrac16 \\cdot \\tfrac{2}{15} = \\tfrac{2}{90} = \\tfrac{1}{45}$$.\n\nTakeaway: the given \"both six\" event calibrates the unknown bias; then you reuse the *same* distribution for the \"both one\" target."}, {"question": "Quick conceptual exercise: a geometric series has $r = 1/3$ and $S_\\infty = 54$. Find $a$ *using only the $S_\\infty$ formula*, then sanity-check using $S_3$. Show the mental-math chain. (3 steps)", "answer": "- Step 1: $a = S_\\infty(1-r)$. With $r = 1/3$, $a = 54 \\times (1 - 1/3) = 54 \\times 2/3 = 36$. (Mental: $54 \\div 3 = 18$, times 2 = 36.)\n- Step 2: $S_3 = a + ar + ar^2 = 36 + 12 + 4 = 52$. Conceptually this should be just-below $S_\\infty = 54$ because three terms out of infinity haven't summed to everything — sanity check holds (52 < 54).\n- Step 3: The tail $54 - 52 = 2$ equals $ar^3 + ar^4 + \\cdots = ar^3/(1-r) = (36 \\cdot 1/27)/(2/3) = (4/3)/(2/3) = 2$. This confirms: the **first three terms carry nearly all the sum** when $r$ is small. For $r = 1/3$, $S_3$ already captures 96% of the infinite sum."}, {"question": "Why are the Factor Theorem, Remainder Theorem, and circle equation *not* in the P2 formula booklet, even though they are heavily used? (1 step)", "answer": "- Step 1: These theorems are considered *core knowledge* expected of any A-level mathematician — they're so central that the booklet assumes you know them. The booklet reserves space for *less obvious* or *easily forgotten* items (sum formulae, log change-of-base, trapezium rule), not the building blocks.\n\nThe pedagogical logic: if you don't know the Factor Theorem, no formula booklet will help you — these are foundational."}, {"question": "In Q7(i), the trapezium rule gives an *approximation*, not the exact integral. Why is it exact for linear functions and only approximate for curved ones? (2 steps)", "answer": "- Step 1: For a linear function, the region between the curve and the $$x$$-axis is exactly a trapezium (the curve *is* a straight line). So the trapezium-rule area equals the true integral.\n- Step 2: For a curved function, the region between the curve and the chord is a *curved segment*; the trapezium over- or under-estimates depending on whether the curve is concave up or down. The trapezium rule approximates this segment area as zero.\n\nThis is why \"use more strips\" → \"better approximation\": finer strips reduce the gap between curve and chord."}, {"question": "The log equation gives candidate solutions $$a=20$$ and $$a=-5$$. Why must $$a=20$$ be rejected, and how should the rejection be written? (3 steps)", "answer": "- Step 1: Logs are only defined for *positive* arguments. Both $$5-a$$ and $$a+25$$ must be $$>0$$, giving the domain $$-25<a<5$$.\n- Step 2: $$a=20$$ makes $$5-a=-15<0$$ — outside the domain, so $$\\log_5(5-a)$$ doesn't exist. Reject it. $$a=-5$$ lies in $$(-25,5)$$, so accept it.\n- Step 3: Write \"**reject $$a=20$$** because $$5-a<0$$ violates the domain\" — the *stated positivity condition*, not just a cross.\n\nMisconception probe: solving the algebra is not the end — extraneous roots from squaring/domain limits must be explicitly filtered with the *reason*."}, {"question": "In Q7(i), the trapezium-rule sum must equal $$\\log_{10} k$$ for some integer $$k$$. Why does the leading $$\\tfrac{1}{2}$$ become a *square root* (not just halving the integer)? (2 steps)", "answer": "- Step 1: The rule gives $$\\tfrac{1}{2} \\log_{10}(\\text{product})$$, because $$\\log_{10}(a) + \\log_{10}(b) = \\log_{10}(ab)$$ — so adding log values corresponds to multiplying their arguments.\n- Step 2: The $$\\tfrac{1}{2}$$ in front becomes $$\\log_{10}(\\sqrt{\\text{product}})$$, since $$\\tfrac{1}{2}\\log_{10}(P) = \\log_{10}(P^{1/2}) = \\log_{10}(\\sqrt{P})$$. The square root is essential — without it, the \"leading 1/2\" doesn't have the right meaning.\n\nThis is the change-of-log-scale: halving a logarithm is the logarithm of a square root."}, {"question": "For $$f(x) = 3x^3 + ax^2 - 10x + b$$, you're told dividing by $$(x-2)$$ leaves remainder $$b$$. Why does this *not* mean the remainder equals 8, and how does it pin down $$a$$? (3 steps)", "answer": "- Step 1: By the Remainder Theorem the remainder is $$f(2)$$, and we're told it equals $$b$$ (the unknown constant term), so $$f(2) = b$$ — you must keep $$b$$ symbolic on both sides, not plug in a number.\n- Step 2: Compute $$f(2) = 24 + 4a - 20 + b = 4 + 4a + b$$. Setting $$f(2) = b$$: the $$b$$ cancels, leaving $$4 + 4a = 0$$, so $$a = -1$$.\n- Step 3: Feed $$a = -1$$ into the earlier relation $$16a + 9b = 56$$: $$-16 + 9b = 56 \\Rightarrow b = 8$$.\n+ The trap: assuming \"remainder = 8\" up front assumes the answer. The $$b$$ on both sides cancelling is precisely what makes the equation solvable for $$a$$.\n\nTakeaway: \"remainder = $$b$$\" keeps $$b$$ on both sides so it cancels, isolating $$a$$ — reading it as a fixed number destroys that cancellation."}, {"question": "After finding $r = 2/5$, why does the formula $a = S_\\infty(1-r)$ directly give the first term, and what's the conceptual link between $a$ and $S_\\infty$? (2 steps)", "answer": "- Step 1: From $S_\\infty = a/(1-r)$, multiply both sides by $(1-r)$: $$a = S_\\infty(1-r)$$ For $r = 2/5$, this is $a = 75 \\times 3/5 = 45$.\n- Step 2: Conceptual link: $a$ is the *first* payment, and $S_\\infty$ is the *total amount* received. The \"discount factor\" $1-r$ tells you the proportion of the infinite sum attributed to the very first term — geometrically, $a$ is $S_\\infty$ **shrunk** by the converging tail. For $r$ close to 1, $a$ is close to $S_\\infty$ (most of the sum is the first term); for $r$ close to 0, $a$ is small (terms shrink fast)."}, {"question": "Runners go clockwise round a regular pentagon; the third leg has bearing $$110°$$. Explain the reasoning to get the first leg's bearing, without memorising the final number. (3 steps)", "answer": "- Step 1: Each clockwise corner turns the heading *forward* by one exterior angle, $$72°$$. Going from an earlier leg to a later leg adds $$72°$$ per corner passed.\n- Step 2: The first leg is two corners *before* the third, so to go backwards you *subtract*: $$110° - 2(72°) = 110° - 144° = -34°$$.\n- Step 3: A negative bearing is fixed by adding $$360°$$: $$-34° + 360° = 326°$$.\n+ Sanity check: the first-leg heading should be a small clockwise angle just west of north — $$326°$$ (i.e. $$34°$$ west of north) fits that picture; $$0°$$ does not.\n\nTakeaway: successive clockwise legs step the bearing by $$+72°$$; reverse the direction of travel means subtract, then normalise mod $$360°$$."}, {"question": "What does the trapezium rule actually approximate, and why does each interior ordinate get weight 2 while the two end ordinates get weight 1? (3 steps)", "answer": "- Step 1: The rule replaces the curve over each strip with a straight top, making a trapezium; area of one strip $$=\\tfrac{h}{2}(y_{\\text{left}}+y_{\\text{right}})$$.\n- Step 2: Summing adjacent strips, every *interior* ordinate is the right edge of one trapezium and the left edge of the next — so it's counted *twice*. The two *ends* belong to only one strip each, counted once.\n- Step 3: This gives $$\\int\\approx\\tfrac{h}{2}\\big[y_0+y_n+2(y_1+\\dots+y_{n-1})\\big]$$ — the \"$$\\tfrac{h}{2}$$, ends once, middles twice\" pattern.\n\nThe doubling isn't arbitrary — it's shared edges being added from both neighbouring strips."}, {"question": "In the arithmetic series $$2 + 5 + 8 + \\dots + 254$$, why does the formula $$n = \\frac{\\text{last} - \\text{first}}{d} + 1$$ require the \"$$+1$$\" at the end? (2 steps)", "answer": "- Step 1: Consider a fence-post analogy. If you have fence posts at positions 2m, 5m, and 8m, the number of *gaps* between them is $$(8-2)/3 = 2$$ gaps.\n- Step 2: The number of *posts* (terms) is always one more than the number of gaps. The difference $$254 - 2 = 252$$ only counts the number of \"steps\" of size 3 between the first and last term. Dividing by $$d$$ gives the number of gaps, so you must add 1 to include the starting term itself: $$252/3 + 1 = 84 + 1 = 85$$ terms.\n\nA common error is calculating the number of gaps and forgetting to include the first term."}];
const SK='esat_p2_20260630';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderMeta(){document.getElementById('mp').innerHTML=
  `<div class="mi"><span class="ml">Cards</span><span class="mv">${DATA.length}</span></div>`+
  `<div class="mi"><span class="ml">In Selection</span><span class="mv">${myCards.length}</span></div>`+
  `<div class="mi"><span class="ml">Curation</span><span class="mv">local rubric</span></div>`}
function getCur(){return DATA}
function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const cardClass=im?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf"><button class="cpb" onclick="cpC(${i})">📋 Copy card</button></div></div></div>`}
  list.innerHTML=h;rr();
}
function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderMeta();document.getElementById('sc').textContent=myCards.length+' in My Selection'}
function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}
function selAll(){getCur().forEach(c=>addM(c));renderMeta();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderMeta();renderCards();toast('All deselected')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{clearTimeout(tmo);return _ntbCopy()})
}
initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderMeta();renderCards()});
</script>
</body></html>
