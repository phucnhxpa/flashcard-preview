<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="icon" href="data:,"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mechanics M1 January 2023 · eight-run review</title><script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#f5f5f7;color:#1d1d1f;font:16px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased}.ctr{max-width:920px;margin:auto;padding:24px 20px 80px}.hdr{text-align:center;padding:32px 0 24px}.hdr h1{font-size:34px;line-height:1.15;letter-spacing:-.5px;margin:0}.sub{font-size:15px;color:#6e6e73;margin:7px auto 0;max-width:720px}.bdg-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:14px}.bdg{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;background:#e8e8ed;color:#424245}.bdg.pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}.bdg.gr{background:#34c759;color:#fff}.tabs{display:flex;gap:4px;overflow-x:auto;padding:4px;background:#fff;border-radius:14px;box-shadow:0 1px 4px #00000012;margin-bottom:14px}.tabs::-webkit-scrollbar{display:none}.tb{flex:none;padding:9px 18px;border:0;border-radius:10px;background:transparent;cursor:pointer;font:600 13px inherit;color:#6e6e73;white-space:nowrap}.tb:focus-visible,button:focus-visible{outline:3px solid #0071e366;outline-offset:2px}.tb:hover{background:#f5f5f7;color:#1d1d1f}.tb.act{background:#0071e3;color:#fff}.tb.jact{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}.tb.mact{background:#34c759;color:#fff}.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:16px 20px;margin-bottom:14px;border-radius:14px;background:#fff;box-shadow:0 1px 4px #00000012}.ml{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6e6e73}.mv{display:block;font:700 14px ui-monospace,SFMono-Regular,Menlo,monospace}.ctrl{position:sticky;top:8px;z-index:5;display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 16px;margin-bottom:14px;border-radius:14px;background:#fff;box-shadow:0 1px 4px #00000012}.ctrl button{padding:7px 14px;border:1px solid #d2d2d7;border-radius:10px;background:#fff;color:#1d1d1f;cursor:pointer;font:600 12px inherit}.ctrl button:hover{background:#f5f5f7}.ctrl .bl{background:#0071e3;color:#fff;border-color:#0071e3}.ctrl .dk{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.ctrl .gn{background:#34c759;color:#fff;border-color:#34c759}.ctrl .pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#764ba2}.ctrl .nt{background:#000;color:#fff;border-color:#000}.sp{flex:1}.sc{font-weight:800;color:#16833d;font-size:13px}.cc{color:#6e6e73;font-weight:700;font-size:13px}.cl{display:flex;flex-direction:column;gap:10px}.cd{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px #0000000d;min-width:0}.cd.ds{opacity:.52}.ct{display:flex;gap:10px;align-items:flex-start}.cb{flex:none;width:18px;height:18px;margin-top:4px;accent-color:#0071e3;cursor:pointer}.qw{min-width:0;flex:1}.q{width:100%;padding:0 28px 0 0;border:0;background:transparent;color:#1d1d1f;text-align:left;font:650 15px/1.5 inherit;cursor:pointer;position:relative;overflow-wrap:anywhere}.q:after{content:'▸';position:absolute;right:0;top:0;color:#6e6e73;font-size:17px}.q[aria-expanded="true"]:after{transform:rotate(90deg)}.a{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f5;color:#424245;overflow-wrap:anywhere}.a[hidden]{display:none}.cf{display:flex;gap:8px;align-items:center;margin-top:10px}.sb{padding:2px 10px;border-radius:12px;background:#f0f0f5;color:#6e6e73;font-size:11px;font-weight:700}.cpb{padding:2px 8px;border:1px solid #d2d2d7;border-radius:8px;background:#fff;cursor:pointer;font-size:11px}.empty{text-align:center;color:#6e6e73;padding:60px 18px}.toast{position:fixed;z-index:20;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s}.toast.show{opacity:1}mjx-container{display:inline-block;max-width:100%;overflow-x:auto;overflow-y:hidden}mjx-container[display="true"]{display:block;max-width:100%}@media(max-width:600px){mjx-container{max-width:calc(100% - 8px)!important;overflow-x:auto!important}.ctr{padding:16px 12px 60px}.hdr h1{font-size:26px}.meta{grid-template-columns:repeat(2,minmax(0,1fr))}.cd{padding:14px}.ctrl{padding:10px}.ctrl .sp{display:none}.sc,.cc{width:100%}}</style></head><body><main class="ctr"><header class="hdr"><h1>Mechanics M1 · January 2023</h1><p class="sub">Eight-run learner review · choose your own recall set, or begin from the source-blind judge selection.</p><div class="bdg-row"><span class="bdg pp">✨ 105 judge picks</span><span class="bdg">347 valid candidates</span><span class="bdg gr">8 approved runs</span></div></header><nav class="tabs" aria-label="Review source tabs"></nav><section class="meta" aria-live="polite"></section><section class="ctrl" aria-label="Deck controls"><button class="bl" onclick="selectAll()">Select All</button><button onclick="deselectAll()">Deselect All</button><button class="pp" onclick="resetJudge()">Reset to Judge</button><button onclick="reveal(true)">Reveal</button><button onclick="reveal(false)">Hide</button><button class="dk" onclick="shuffle()">Shuffle</button><button class="gn" onclick="copyTable()">Copy</button><button class="nt" onclick="notion()">Notion-ready</button><span class="sp"></span><span class="sc"></span><span class="cc"></span></section><section class="cl" aria-live="polite"></section></main><div class="toast" role="status" aria-live="polite"></div><script>const DATA={"models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"id": "glm_1_0", "question": "In the ESAT-style warm-up (ESAT-STYLE WARM-UP — NOT WME01), how do you translate the phrase \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" into a single modulus statement?", "answer": "\"Difference less than 1\" means the size of the gap is under 1. Write it as $$|2\\sqrt{n} - 7| < 1$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ①"}, {"id": "glm_1_1", "question": "In the ESAT-style warm-up (ESAT-STYLE WARM-UP — NOT WME01), how do you unfold the modulus inequality $$|2\\sqrt{n} - 7| < 1$$ into a three-part chain on a number line?", "answer": "Unfold it as $$-1 < 2\\sqrt{n} - 7 < 1$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ①"}, {"id": "glm_1_2", "question": "In the ESAT-style warm-up (ESAT-STYLE WARM-UP — NOT WME01), after adding 7 and dividing by 2 to get $$3 < \\sqrt{n} < 4$$, how do you solve for integer $$n$$?", "answer": "Square the strict inequalities to get $$9 < n < 16$$. The strict endpoints exclude 9 and 16, leaving the integers $$n \\in \\{10, 11, 12, 13, 14, 15\\}$$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ①"}, {"id": "glm_1_3", "question": "In the ESAT-style warm-up (ESAT-STYLE WARM-UP — NOT WME01), having found $$n \\in \\{10, 11, 12, 13, 14, 15\\}$$, how do you count the number of different integers in this set without listing them?", "answer": "Use inclusive counting: highest minus lowest plus one, i.e., $$15 - 10 + 1 = 6$$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ①"}, {"id": "glm_1_4", "question": "For Tutor packet Q1 / official WME01 Q2, two particles A (mass $$3m$$) and B (mass $$m$$) approach each other at $$1.5 \\text{ m s}^{-1}$$ each. If A's initial direction is taken as positive, what are the initial velocities of A and B?", "answer": "A moves in the positive direction: $$u_A = 1.5$$$. B moves in the opposite direction: $$u_B = -1.5$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_5", "question": "For Tutor packet Q1 / official WME01 Q2, using the positive direction as A's initial direction and given post-collision speeds $$v_A = x$$ and $$v_B = x + 1$$, write the conservation of momentum equation.", "answer": "$$3m(1.5) + m(-1.5) = 3m(x) + m(x + 1)$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_6", "question": "For Tutor packet Q1 / official WME01 Q2, simplifying $$4.5m - 1.5m = 3mx + m(x+1)$$, find the value of $$x$$ and the post-collision speeds $$v_A$$ and $$v_B$$.", "answer": "$$3 = 4x + 1 \\implies x = 0.5$$$. Thus, $$v_A = 0.5 \\text{ m s}^{-1}$$ and $$v_B = 1.5 \\text{ m s}^{-1}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_7", "question": "For Tutor packet Q1 / official WME01 Q2, particle B (mass $$m$$) changes velocity from $$-1.5 \\text{ m s}^{-1}$$ to $$1.5 \\text{ m s}^{-1}$$ (positive direction is A's initial direction). Write the expression for the impulse exerted on B.", "answer": "$$I_B = m(v_B - u_B) = m(1.5 - (-1.5)) = 3m \\text{ N s}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_8", "question": "For Tutor packet Q1 / official WME01 Q2, the calculated impulse on B is $$I_B = 3m \\text{ N s}$$$. When a question asks for the \"magnitude of the impulse\", how should the final answer be written?", "answer": "\"Magnitude\" means the final answer is a positive quantity. Give $$3m$$, written without modulus bars.", "source": "GLM 5.1 ①"}, {"id": "glm_1_9", "question": "For Tutor packet Q1 / official WME01 Q2, why must you explicitly state which calculated speed belongs to which particle (e.g., \"speed of A\", \"speed of B\")?", "answer": "Two unlabelled numbers may not fully answer the question; the examiner needs to know which particle has which speed.", "source": "GLM 5.1 ①"}, {"id": "glm_1_10", "question": "For Tutor packet Q2 / official WME01 Q1, the speed–time graph forms a trapezium. What P1/P2 prerequisite formula is more efficient for finding the area than splitting into triangles and a rectangle?", "answer": "The trapezium-area formula: $$A = \\frac{1}{2}(a + b)h$$, where $$a$$ and $$b$$ are the parallel sides and $$h$$ is the height.", "source": "GLM 5.1 ①"}, {"id": "glm_1_11", "question": "For Tutor packet Q2 / official WME01 Q1, a train accelerates for time $$T$$, runs at constant speed for 180 s, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, what is the duration of the deceleration phase?", "answer": "Since deceleration magnitude is half the acceleration magnitude, it takes twice as long: $$2T$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_12", "question": "For Tutor packet Q2 / official WME01 Q1, with acceleration phase $$T$$, constant phase 180 s, and deceleration phase $$2T$$, what are the three time markers along the base of the speed–time graph?", "answer": "$$T$$, $$T + 180$$, and $$3T + 180$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_13", "question": "For Tutor packet Q2 / official WME01 Q1, the total distance is 4.8 km. Using the trapezium area formula with parallel sides 180 and $$3T + 180$$, and height 20, set up the equation to find $$T$$.", "answer": "$$4800 = \\frac{1}{2}(180 + 3T + 180)(20)$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_14", "question": "For Tutor packet Q2 / official WME01 Q1, before equating the trapezium area (in metres) to the total distance, what unit conversion must be applied to 4.8 km?", "answer": "Convert kilometres to metres: $$4.8 \\text{ km} = 4800 \\text{ m}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_15", "question": "For Tutor packet Q2 / official WME01 Q1, having found $$T = 40 \\text{ s}$$ and the top speed $$20 \\text{ m s}^{-1}$$, how do you find the initial acceleration?", "answer": "The acceleration is the gradient of the first phase: $$a = \\frac{\\text{change in speed}}{\\text{time}} = \\frac{20}{40} = 0.5 \\text{ m s}^{-2}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_16", "question": "For Packet Q3 / official WME01 Q3 (REVIEWED ONLY / DEFERRED), if a particle has velocity vector $$\\mathbf{v}$$ at time $$t = 2$$, what is the method to find its speed?", "answer": "Speed is the magnitude of the velocity vector: $$|\\mathbf{v}| = \\sqrt{v_x^2 + v_y^2}$$. (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_17", "question": "For Packet Q3 / official WME01 Q3 (REVIEWED ONLY / DEFERRED), to find the angle the velocity vector makes with the unit vector $$\\mathbf{i}$$ at $$t = 2$$, what trigonometric ratio is used?", "answer": "Use the ratio of the $$\\mathbf{j}$$-component to the $$\\mathbf{i}$$-component: $$\\tan \\theta = \\frac{v_y}{v_x}$$, then state the angle per the given convention. (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_18", "question": "For Packet Q3 / official WME01 Q3 (REVIEWED ONLY / DEFERRED), to find the time $$T$$ when the velocity vector has a specific direction (e.g., $$2\\mathbf{i} - 3\\mathbf{j}$$), what equation do you set up?", "answer": "Set the ratio of components equal to the direction ratio: $$\\frac{v_y}{v_x} = \\frac{-3}{2}$$, then solve for $$T$$. (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_19", "question": "For Packet Q4 / official WME01 Q5 (REVIEWED ONLY / DEFERRED), when a question asks you to \"show that\" a result like $$x = 3u$$ is true, what must your final line contain?", "answer": "The exact given result ($$x = 3u$$) with no approximations or decimal rounding, derived clearly from the preceding working. (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_20", "question": "For Packet Q4 / official WME01 Q5 (REVIEWED ONLY / DEFERRED), once the relationship $$x = 3u$$ is established, what is the next step to find the numerical value of initial velocity $$u$$?", "answer": "Substitute the known distance $$x$$ into $$x = 3u$$ and solve for $$u$$. (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_21", "question": "For Packet Q4 / official WME01 Q5 (REVIEWED ONLY / DEFERRED), to find the total distance travelled in the first 14 s, what SUVAT variable must you carefully distinguish from displacement?", "answer": "Distance is the total path length (always positive), whereas displacement is the net change in position (can be negative if reversing direction). (REVIEWED ONLY / DEFERRED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_22", "question": "For Tutor packet Q5 / official WME01 Q4, a branch rests on two supports C and D. When the branch is \"on the point of tilting about C\", what happens to the reaction at D?", "answer": "The reaction at D becomes zero: $$R_D = 0$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_23", "question": "For Tutor packet Q5 / official WME01 Q4, when taking moments about a pivot (e.g., support C) under a tilting condition, why can you omit the weight's moment if it acts through C, and why can you omit the reaction $$R_C$$?", "answer": "A force acting through the pivot has a perpendicular distance of zero, so its moment is zero. Under tilting about C, $$R_C$$ acts through C and $$R_D = 0$$, so neither needs to be written in the moments equation.", "source": "GLM 5.1 ①"}, {"id": "glm_1_24", "question": "For Tutor packet Q5 / official WME01 Q4, what layout strategy helps avoid sign errors when writing moments equations?", "answer": "Put clockwise moments on one side of the equation and anticlockwise moments on the other, rather than using a single long signed sum.", "source": "GLM 5.1 ①"}, {"id": "glm_1_25", "question": "For Tutor packet Q5 / official WME01 Q4, the branch (length 1.5 m) tilts about C with a 150 N load at the far end. The weight $$W$$ acts at distance $$x$$ from C. The support C is 0.24 m from one end. Write the moments equation about C.", "answer": "Clockwise: $$W \\cdot x$$. Anticlockwise: $$150 \\times (1.5 - 0.24) = 150 \\times 1.26 = 189$$. Equation (A): $$Wx = 189$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_26", "question": "For Tutor packet Q5 / official WME01 Q4, the branch tilts about D with a 225 N load at the other end (0.36 m from it). The weight $$W$$ acts at distance $$x$$ from C. The supports C and D are separated by $$0.9 \\text{ m}$$ (since $$1.5 - 0.24 - 0.36 = 0.9$$). Write the moments equation about D.", "answer": "Clockwise: $$225 \\times 0.36 = 81$$. Anticlockwise: $$W \\times (0.9 - x)$$. Equation (B): $$81 = W(0.9 - x)$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_27", "question": "For Tutor packet Q5 / official WME01 Q4, you have two equations: $$Wx = 189$$ and $$W(0.9 - x) = 81$$. Why is dividing Equation (A) by Equation (B) more efficient than substitution?", "answer": "Dividing cancels the common unknown $$W$$ immediately, leaving a single linear equation in $$x$$: $$\\frac{x}{0.9 - x} = \\frac{189}{81} = \\frac{7}{3}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_28", "question": "For Tutor packet Q5 / official WME01 Q4, after finding $$x = 0.63$$ from $$10x = 6.3$$, what common trap must you avoid when back-substituting into $$Wx = 189$$ to find $$W$$?", "answer": "Be careful with the arithmetic: $$W = \\frac{189}{0.63}$$, which gives exactly 300 N. A wrong intermediate value for $$x$$ or a calculator slip leads to an incorrect $$W$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_29", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a parcel of mass 2 kg rests on a plane inclined at $$30^\\circ$$. How do you resolve the weight $$2g$$ into components parallel and perpendicular to the plane?", "answer": "Parallel (down the plane): $$2g \\sin 30^\\circ$$. Perpendicular (into the plane): $$2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_30", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a force of 18 N acts on the parcel at $$40^\\circ$$ to the inclined plane (upwards from the plane). How do you resolve this force?", "answer": "Parallel (up the plane): $$18 \\cos 40^\\circ$$. Perpendicular (away from the plane): $$18 \\sin 40^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_31", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the Student said the perpendicular forces were \"balanced vertically\". What is the correct directional phrasing, and why?", "answer": "Say \"balanced perpendicular to the plane\". \"Vertically\" means up/down relative to the ground, which is not the resolving direction for an inclined-plane force diagram. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_32", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the live board line read $$R - 2g \\sin 30^\\circ + 18 \\sin 40^\\circ = 0$$, which was incorrect. What is the correct perpendicular equilibrium equation?", "answer": "$$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_33", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the forces parallel to the plane are the 18 N component up, friction $$F_R$$ down, and the weight component down. Write Newton's 2nd law equation for the acceleration $$a$$.", "answer": "$$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_34", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the tutor claimed friction \"only exists because\" of the applied pull, so acceleration must be up the slope. Why is this general claim invalid?", "answer": "The direction of acceleration must be decided from the net resolved force along the plane (including gravity). Friction opposes the direction of motion or impending motion, not just the applied pull. The net force happens to be up the slope for these specific numbers, but the general claim is false. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_35", "question": "For Packet Q8 / official WME01 Q8 (OFFICIAL MS REFERENCE ONLY), using $$R = 2g \\cos 30^\\circ - 18 \\sin 40^\\circ \\approx 5.4039 \\text{ N}$$ and $$F_R = 0.3R \\approx 1.6212 \\text{ N}$$, calculate the acceleration $$a$$.", "answer": "Substitute into $$2a = 18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ$$: $$2a \\approx 13.7888 - 1.6212 - 9.8 = 2.3676$$, giving $$a \\approx 1.18 \\text{ m s}^{-2}$$ (or $$1.2$$). (OFFICIAL MS REFERENCE ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_36", "question": "For Packet Q8 / official WME01 Q8 (OFFICIAL MS REFERENCE ONLY), the parcel starts at $$u = 2 \\text{ m s}^{-1}$$ and moves $$s = 5 \\text{ m}$$ with unrounded $$a \\approx 1.1838 \\text{ m s}^{-2}$. Calculate the speed at B.", "answer": "Use $$v^2 = u^2 + 2as$$: $$v^2 = 2^2 + 2(1.1838)(5) \\approx 15.838$$, so $$v \\approx 3.98 \\text{ m s}^{-1}$$ (or $$4.0$$). (OFFICIAL MS REFERENCE ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_37", "question": "For Packet Q8 / official WME01 Q8 (OFFICIAL MS REFERENCE ONLY), with the 18 N force removed, the normal reaction is $$R = 2g \\cos 30^\\circ \\approx 16.974 \\text{ N}$$ and the weight component down the plane is $$2g \\sin 30^\\circ = 9.8 \\text{ N}$. Does P remain at rest?", "answer": "Maximum friction $$\\mu R \\approx 5.09 \\text{ N}$$ is less than the weight component $$9.8 \\text{ N}$$, so friction cannot hold the parcel; P does not remain at rest. (OFFICIAL MS REFERENCE ONLY)", "source": "GLM 5.1 ①"}, {"id": "glm_1_38", "question": "For Packet Q6 / official WME01 Q6 (NOT DISCUSSED), a boat is pulled by two ropes. What is the general method to find the angle and tension of one rope?", "answer": "Resolve forces horizontally and vertically, set up two equilibrium equations, and solve the simultaneous equations for the unknown angle and tension. (NOT DISCUSSED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_39", "question": "For Packet Q7 / official WME01 Q7 (NOT DISCUSSED), a lift contains two boxes P and Q. To find the combined mass and individual masses, what equations do you set up?", "answer": "Apply Newton's 2nd law to the whole system for combined mass, and to individual boxes (resolving forces between them) for individual masses. (NOT DISCUSSED)", "source": "GLM 5.1 ①"}, {"id": "glm_1_40", "question": "According to the formula booklet, what M1 results are not additionally printed and must be known by heart?", "answer": "Momentum ($$mv$$), impulse ($$mv - mu$$), the five constant-acceleration (SUVAT) formulae, Newton's laws, friction law ($$F = \\mu R$$ and $$F \\leq \\mu R$$), and the principle of moments.", "source": "GLM 5.1 ①"}, {"id": "glm_1_41", "question": "What P1/P2 prerequisite formula was used in Tutor packet Q2 / official WME01 Q1 that is not in the M1 section of the formula booklet?", "answer": "Area of a trapezium: $$A = \\frac{1}{2}(a + b)h$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_42", "question": "In M1 calculations, when should you use an unrounded value (e.g., $$a = 1.1838...$$) and how should you denote the final rounded answer?", "answer": "Keep the unrounded value for onward substitution. Use \"=\" for exact/calculated expressions and \"≈\" for rounded ones. Give SI units on final mechanics answers.", "source": "GLM 5.1 ①"}, {"id": "glm_1_43", "question": "What was the priority study action agreed at the end of the lesson?", "answer": "Complete the Pure 2 baseline paper, then the Pure 3 baseline paper, to build a full course diagnostic — ahead of extra M1 work.", "source": "GLM 5.1 ①"}, {"id": "glm_1_44", "question": "Earlier guide versions presented author-created drills on moments and inclined-plane resolving as tutor-assigned work. What is the genuine status of these drills?", "answer": "They are not supported by the lesson. The lesson did not assign \"keep practising moments and inclined-plane resolving\" or any drill set as homework.", "source": "GLM 5.1 ①"}, {"id": "glm_1_45", "question": "In this lesson, the printed practice packet was re-ordered relative to the official WME01 paper. How must you read the labels for each discussed item?", "answer": "Always read both labels, e.g., Tutor packet Q1 / official WME01 Q2. Using only the official numbering would contradict the packet you actually worked from.", "source": "GLM 5.1 ①"}, {"id": "glm_1_46", "question": "An earlier version of the guide claimed a live slip in Tutor packet Q1 / official WME01 Q2 where 4.5 was used as a particle's speed, producing $$x = 2.75$$ and $$v_B = 3.75$$. What does the recording and final board actually show?", "answer": "There was no such slip; the correct values were used: initial speed $$-1.5$$, $$x = 0.5$$, and $$v_B = 1.5$$. That narrative has been removed.", "source": "GLM 5.1 ①"}, {"id": "glm_1_47", "question": "An earlier version of the guide claimed a specific mis-drawn peak value (e.g., \"30\") for Tutor packet Q2 / official WME01 Q1. What does the evidence actually support about the peak label?", "answer": "The evidence supports only that a temporary peak label was corrected to the printed $$20 \\text{ m s}^{-1}$$$. Do not state a specific mis-drawn value such as \"30\".", "source": "GLM 5.1 ①"}, {"id": "glm_1_48", "question": "An earlier version claimed the Student first took moments about B for the second scenario in Tutor packet Q5 / official WME01 Q4. What pivot did the Student actually choose, and what was the real issue?", "answer": "The Student explicitly chose D. The actual issue was a complicated signed equation that produced a sign/distance error, which was then corrected to equation (B): $$81 = W(0.9 - x)$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_49", "question": "What tutor strategy (technique, not a formula) was emphasised for solving simultaneous moments equations in Tutor packet Q5 / official WME01 Q4?", "answer": "Dividing two simultaneous equations to cancel a common unknown ($$W$$), and boxing/labelling key equations so you can combine them cleanly.", "source": "GLM 5.1 ①"}]}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"id": "glm_2_0", "question": "In the ESAT-style warm-up, how do you translate \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" into a modulus inequality, and what is the resulting integer count? (ESAT-STYLE WARM-UP — NOT WME01)", "answer": "\"Difference less than 1\" means the size of the gap is under 1. Write it as a single modulus statement and unfold it on a number line: $$|2\\sqrt{n} - 7| < 1 \\implies -1 < 2\\sqrt{n} - 7 < 1$$. Adding 7 and dividing by 2 gives $$3 < \\sqrt{n} < 4$$. Squaring yields $$9 < n < 16$$. The integers are 10, 11, 12, 13, 14, 15. The count is $$15 - 10 + 1 = 6$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_1", "question": "When solving an inequality chain such as $$6 < 2\\sqrt{n} < 8$$, why is it safe to divide all three parts by 2, and what must you remember when squaring to find $$n$$? (ESAT-STYLE WARM-UP — NOT WME01)", "answer": "It is safe to divide by 2 because every term in the inequality is positive, so the inequality signs do not flip. When squaring to get $$9 < n < 16$$, remember that the strict endpoints mean $$n$$ cannot equal 9 or 16. When counting the integers between them, add 1 to the difference: $$15 - 10 + 1 = 6$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_2", "question": "For two particles A (mass $$3m$$) and B (mass $$m$$) approaching each other at $$1.5 \\text{ m s}^{-1}$$, what sign convention and algebraic speed labels should you set up before applying conservation of momentum? (Tutor packet Q1 / official WME01 Q2)", "answer": "Choose A's initial direction as positive, making B's initial velocity $$-1.5 \\text{ m s}^{-1}$$. Let A's speed after impact be $$x$$. Since they are moving in the same direction after a direct collision, let B's speed be $$x + 1$$ (or use separate variables and check for consistency). Clearly label these on a before/after diagram.", "source": "GLM 5.1 ②"}, {"id": "glm_2_3", "question": "Using conservation of momentum for A (mass $$3m$$) and B (mass $$m$$) approaching at $$1.5 \\text{ m s}^{-1}$$ with A's direction positive, and post-collision speeds $$x$$ and $$x+1$$, what are the final speeds? (Tutor packet Q1 / official WME01 Q2)", "answer": "Momentum before = Momentum after: $$(3m)(1.5) + m(-1.5) = 3mx + m(x+1)$$. This simplifies to $$4.5m - 1.5m = 4mx + m$$, so $$3m = 4mx + m$$. Dividing by $$m$$ gives $$3 = 4x + 1$$, so $$x = 0.5$$. Speed of A is $$0.5 \\text{ m s}^{-1}$$; speed of B is $$0.5 + 1 = 1.5 \\text{ m s}^{-1}$$. State which speed belongs to which particle.", "source": "GLM 5.1 ②"}, {"id": "glm_2_4", "question": "After finding the speeds of particles A ($$0.5 \\text{ m s}^{-1}$$) and B ($$1.5 \\text{ m s}^{-1}$$), how do you calculate the magnitude of the impulse exerted on B (mass $$m$$), and why is no modulus bar needed in the final answer? (Tutor packet Q1 / official WME01 Q2)", "answer": "Impulse on B = change in momentum of B: $$I_B = m(v_B - u_B) = m(1.5 - (-1.5)) = 3m \\text{ N s}$$. No modulus bars are needed because the question asks for the \"magnitude\", which is inherently positive. Giving the signed quantity with modulus bars would be incorrect for a magnitude request.", "source": "GLM 5.1 ②"}, {"id": "glm_2_5", "question": "A train accelerates from rest to $$20 \\text{ m s}^{-1}$$, runs at that speed for $$180 \\text{ s}$$, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, what are the time markers along the base of the speed–time graph in terms of $$T$$? (Tutor packet Q2 / official WME01 Q1)", "answer": "Let the acceleration phase last $$T$$. Because $$|a| = 2|d|$$, the deceleration phase takes twice as long, lasting $$2T$$. The time markers along the base are: end of acceleration at $$T$$, end of constant speed at $$T + 180$$, and end of deceleration at $$3T + 180$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_7", "question": "How do you find the initial acceleration of the train given it reaches $$20 \\text{ m s}^{-1}$$ in time $$T = 40 \\text{ s}$$ from rest? (Tutor packet Q2 / official WME01 Q1)", "answer": "The acceleration is the gradient of the first phase of the speed–time graph: $$a = \\frac{\\text{change in speed}}{\\text{time}} = \\frac{20 - 0}{40} = 0.5 \\text{ m s}^{-2}$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_8", "question": "When calculating the area under a speed–time graph for distance, what unit conversion and area formula are essential? (Tutor packet Q2 / official WME01 Q1)", "answer": "Convert all units consistently (e.g., $$4.8 \\text{ km} = 4800 \\text{ m}$$) before equating to the area. Use the trapezium area formula $$A = \\frac{1}{2}(a+b)h$$, where $$a$$ and $$b$$ are the parallel sides (total time base and the constant-speed section) and $$h$$ is the peak speed, rather than splitting into triangles and a rectangle.", "source": "GLM 5.1 ②"}, {"id": "glm_2_9", "question": "A non-uniform branch rests on two supports C and D. In a scenario where the branch is \"on the point of tilting about C\", what reaction force becomes zero and what simplification does this allow? (Tutor packet Q5 / official WME01 Q4)", "answer": "The reaction at the pivot you are tilting about (in this case, $$R_D$$) becomes zero. This simplification allows you to ignore $$R_D$$ in your moment equation, because a force acting through the pivot (or a zero reaction) has no moment about that pivot.", "source": "GLM 5.1 ②"}, {"id": "glm_2_10", "question": "When taking moments about a pivot for a tilting problem, what is the safest way to set up the equation to avoid sign errors? (Tutor packet Q5 / official WME01 Q4)", "answer": "Put clockwise moments on one side of the equals sign and anticlockwise moments on the other side. This is safer than writing a single long signed sum (e.g., $$\\sum M = 0$$), which often leads to sign errors.", "source": "GLM 5.1 ②"}, {"id": "glm_2_11", "question": "For a branch tilting about C (so $$R_D = 0$$), with weight $$W$$ at distance $$x$$ from C and a $$150 \\text{ N}$$ load at the opposite end $$1.26 \\text{ m}$$ from C, what is the moments equation? (Tutor packet Q5 / official WME01 Q4)", "answer": "Clockwise moments = Anticlockwise moments. The weight $$W$$ acts at $$x$$ (assume it is anticlockwise about C based on the diagram) and the 150 N load acts at 1.26 m (clockwise). So, $$150 \\times 1.26 = Wx$$, which gives $$Wx = 189$$. (Box this as equation A).", "source": "GLM 5.1 ②"}, {"id": "glm_2_12", "question": "For a branch tilting about D (so $$R_C = 0$$), with weight $$W$$ at distance $$0.9 - x$$ from D and a $$225 \\text{ N}$$ load at $$0.36 \\text{ m}$$ from D, what is the moments equation? (Tutor packet Q5 / official WME01 Q4)", "answer": "Clockwise moments = Anticlockwise moments. The 225 N load acts at 0.36 m (clockwise) and the weight $$W$$ acts at $$(0.9 - x)$$ (anticlockwise). So, $$225 \\times 0.36 = W(0.9 - x)$$, which gives $$81 = W(0.9 - x)$$. (Box this as equation B).", "source": "GLM 5.1 ②"}, {"id": "glm_2_13", "question": "You have two simultaneous moments equations: $$Wx = 189$$ and $$81 = W(0.9 - x)$$. What is the most efficient algebraic method to find $$x$$? (Tutor packet Q5 / official WME01 Q4)", "answer": "Divide equation A by equation B. The common unknown $$W$$ cancels out directly: $$\\frac{Wx}{W(0.9-x)} = \\frac{189}{81}$$. This simplifies to $$\\frac{x}{0.9-x} = \\frac{7}{3}$$, leading to $$3x = 6.3 - 7x$$, so $$10x = 6.3 \\implies x = 0.63 \\text{ m}$$. This is more efficient than substitution.", "source": "GLM 5.1 ②"}, {"id": "glm_2_14", "question": "Once you have found $$x = 0.63 \\text{ m}$$, how do you find the weight $$W$$, and what is a common trap to avoid? (Tutor packet Q5 / official WME01 Q4)", "answer": "Back-substitute $$x$$ into equation A: $$W(0.63) = 189 \\implies W = 300 \\text{ N}$$. Common trap: arithmetic errors on the calculator when dividing. Be careful and double-check the division: $$189 / 0.63 = 300$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_15", "question": "A parcel of mass $$2 \\text{ kg}$$ is on a plane inclined at $$30^\\circ$$. A force of $$18 \\text{ N}$$ acts at $$40^\\circ$$ to the plane. How do you resolve the $$18 \\text{ N}$$ force into components parallel and perpendicular to the plane? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "Parallel to the plane (upward): $$18 \\cos 40^\\circ$$. Perpendicular to the plane (away from the surface): $$18 \\sin 40^\\circ$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_16", "question": "For a parcel of mass $$2 \\text{ kg}$$ on a plane inclined at $$30^\\circ$$, how do you resolve the weight into components parallel and perpendicular to the plane? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "Parallel to the plane (down the slope): $$2g \\sin 30^\\circ$$. Perpendicular to the plane (into the surface): $$2g \\cos 30^\\circ$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_17", "question": "When resolving forces on an inclined plane, a student said the perpendicular forces were \"balanced vertically\". Why is this phrasing wrong, and what should you say instead? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "\"Vertically\" means up and down, which is not the resolving direction for an inclined plane. You must say the forces are \"balanced perpendicular to the plane\". The parallel forces are not balanced; Newton's second law applies along the plane.", "source": "GLM 5.1 ②"}, {"id": "glm_2_18", "question": "What is the correct equilibrium equation for forces perpendicular to the plane for the $$2 \\text{ kg}$$ parcel with an $$18 \\text{ N}$$ pull at $$40^\\circ$$? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "The components acting away from the plane must balance the components acting into the plane. The normal reaction $$R$$ and the perpendicular pull act away, while the weight component acts in. So, $$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$. (A common live error was to include $$2g \\sin 30^\\circ$$ here instead of $$\\cos 30^\\circ$$).", "source": "GLM 5.1 ②"}, {"id": "glm_2_19", "question": "What is the equation of motion for the $$2 \\text{ kg}$$ parcel parallel to the plane, using $$a$$ for acceleration? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "Net force parallel to the plane = mass $$\\times$$ acceleration. Taking up the slope as positive: $$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_20", "question": "A tutor claimed that friction \"only exists because\" of an applied pull and therefore can never exceed the applied component, using this to infer the acceleration's direction. Why is this general rule invalid? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "The direction of acceleration must be decided from the net resolved force along the plane, including gravity. Friction opposes motion (or impending motion), which can be caused by the weight component alone. While the net force here happens to be up the slope, this is because the resolved equation proves it, not because of the invalid general claim that friction cannot exceed the applied pull.", "source": "GLM 5.1 ②"}, {"id": "glm_2_21", "question": "Using $$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$ and $$g = 9.8$$, what is the normal reaction $$R$$? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "$$R = 2(9.8) \\cos 30^\\circ - 18 \\sin 40^\\circ \\approx 19.6(0.86603) - 18(0.64279) \\approx 16.974 - 11.570 \\approx 5.4039 \\text{ N}$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_22", "question": "Given $$R \\approx 5.4039 \\text{ N}$$ and $$\\mu = 0.3$$, what is the friction force $$F_R$$, and which equation do you substitute it into to find acceleration? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "$$F_R = \\mu R = 0.3 \\times 5.4039 \\approx 1.6212 \\text{ N}$$. Substitute this into the parallel equation: $$2a = 18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_23", "question": "Using the parallel equation $$2a = 18 \\cos 40^\\circ - 1.6212 - 2(9.8) \\sin 30^\\circ$$, what is the acceleration of the parcel? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "$$2a = 13.7888 - 1.6212 - 9.8 \\approx 2.3676$$. Therefore, $$a \\approx 1.1838 \\text{ m s}^{-2}$$. Using standard rounding, $$a \\approx 1.18 \\text{ m s}^{-2}$$ (or $$1.2 \\text{ m s}^{-2}$$).", "source": "GLM 5.1 ②"}, {"id": "glm_2_24", "question": "In Q8(b), the parcel starts at $$2 \\text{ m s}^{-1}$$ and travels $$5 \\text{ m}$$ up the slope with $$a \\approx 1.1838 \\text{ m s}^{-2}$$. How do you find its speed at B? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "Use the SUVAT equation $$v^2 = u^2 + 2as$$. Substitute the values: $$v^2 = 2^2 + 2(1.1838)(5) = 4 + 11.838 = 15.838$$. So, $$v = \\sqrt{15.838} \\approx 3.98 \\text{ m s}^{-1}$$ (or $$4.0 \\text{ m s}^{-1}$$).", "source": "GLM 5.1 ②"}, {"id": "glm_2_25", "question": "In Q8(c), the 18 N force is removed and the parcel is at rest. How do you determine if it remains at rest? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "Compare the weight component down the plane ($$2g \\sin 30^\\circ$$) with the maximum available friction ($$\\mu R$$, where $$R$$ is now just $$2g \\cos 30^\\circ$$). If the weight component exceeds maximum friction, the parcel cannot remain at rest.", "source": "GLM 5.1 ②"}, {"id": "glm_2_26", "question": "With the 18 N force removed, the weight component down the plane is $$9.8 \\text{ N}$$ and the maximum friction is $$\\approx 5.09 \\text{ N}$$. Does the parcel remain at rest? (Tutor packet Q8 / official WME01 Q8 — OFFICIAL MS REFERENCE ONLY)", "answer": "No. Because $$9.8 \\text{ N} > 5.09 \\text{ N}$$, the weight component down the plane exceeds the maximum available friction, so the parcel will accelerate down the slope. It does not remain at rest.", "source": "GLM 5.1 ②"}, {"id": "glm_2_27", "question": "The M1 formula booklet states there are no formulae given for M1 in addition to those candidates are expected to know. Which key mechanics formulae must you memorise? (Formula and result availability)", "answer": "Momentum ($$mv$$), impulse ($$mv - mu$$), the five constant-acceleration (SUVAT) formulae, Newton's laws, the friction law ($$F = \\mu R$$ and $$F \\le \\mu R$$), and the principle of moments.", "source": "GLM 5.1 ②"}, {"id": "glm_2_28", "question": "Which Pure Maths prerequisite formula was required for the train speed–time graph question, and what is the formula? (Formula and result availability)", "answer": "The area of a trapezium: $$A = \\frac{1}{2}(a + b)h$$, where $$a$$ and $$b$$ are the lengths of the parallel sides and $$h$$ is the height (perpendicular distance between them).", "source": "GLM 5.1 ②"}, {"id": "glm_2_29", "question": "When carrying an unrounded value (e.g., $$a = 1.1838...$$) into the next part of a calculation, what rounding protocol should you follow? (Formula and result availability)", "answer": "Keep the unrounded value stored in your calculator for onward substitution. Only round at the very end of the new calculation. Use the equals sign ($$=$$) for exact/calculated expressions and the approximately equals sign ($$\\approx$$) for rounded ones, and always give SI units on final answers.", "source": "GLM 5.1 ②"}, {"id": "glm_2_30", "question": "What was the lesson status of Packet Q3 (constant-acceleration vectors) and Packet Q4 (vehicle SUVAT), and were any tutorial solutions produced for them? (Packet Q3 / official WME01 Q3 & Packet Q4 / official WME01 Q5 — REVIEWED ONLY / DEFERRED)", "answer": "Both were REVIEWED ONLY / DEFERRED. They were looked at and commented on, but not re-worked in the lesson. No tutorial solution was produced live for either.", "source": "GLM 5.1 ②"}, {"id": "glm_2_31", "question": "What are the official mark scheme answers for the constant-acceleration vectors question (Packet Q3 / official WME01 Q3)? (OFFICIAL MS REFERENCE ONLY)", "answer": "(a) Speed at $$t=2$$: $$3\\sqrt{5} \\approx 6.7 \\text{ m s}^{-1}$$. (b) Angle to $$\\mathbf{i}$$ at $$t=2$$: $$27^\\circ$$ (or $$333^\\circ$$ per the stated convention). (c) $$T$$ for direction $$2\\mathbf{i} - 3\\mathbf{j}$$: $$T = 3.2$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_32", "question": "What are the official mark scheme answers for the vehicle SUVAT question (Packet Q4 / official WME01 Q5)? (OFFICIAL MS REFERENCE ONLY)", "answer": "(a) Show $$x = 3u$$ (given result established). (b) $$u = 9 \\text{ m s}^{-1}$$. (c) Distance in the first 14 s: $$201 \\text{ m}$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_33", "question": "What was the lesson status of Packet Q6 (boat pulled by two ropes) and Packet Q7 (lift and two boxes)? (Packet Q6 / official WME01 Q6 & Packet Q7 / official WME01 Q7 — NOT DISCUSSED)", "answer": "Both were NOT DISCUSSED. They were not opened or discussed in the lesson at all.", "source": "GLM 5.1 ②"}, {"id": "glm_2_34", "question": "What are the official mark scheme answers for the boat and two ropes question (Packet Q6 / official WME01 Q6)? (OFFICIAL MS REFERENCE ONLY)", "answer": "Rope angle $$\\alpha \\approx 31.9^\\circ$$; tension $$P \\approx 609 \\text{ N}$$ (mark scheme accepts 610 N or better).", "source": "GLM 5.1 ②"}, {"id": "glm_2_35", "question": "What are the official mark scheme answers for the lift and two boxes question (Packet Q7 / official WME01 Q7)? (OFFICIAL MS REFERENCE ONLY)", "answer": "(a) Combined mass of P and Q: $$5m$$. (b) Mass of P: $$2m$$.", "source": "GLM 5.1 ②"}, {"id": "glm_2_36", "question": "What were the three closing study actions agreed at the end of the lesson? (Closing study actions)", "answer": "1. Priority this week: complete the Pure 2 baseline paper, then the Pure 3 baseline paper, to build a full course diagnostic (ahead of extra M1 work). 2. Look over a separate, already-completed M1 homework paper if time allows. 3. Revisit that earlier M1 paper together in mid-July, with more homework time allowed first.", "source": "GLM 5.1 ②"}, {"id": "glm_2_37", "question": "The lesson involved M1 practice on moments and inclined planes. Was the student assigned \"keep practising moments and inclined-plane resolving\" as homework? (Closing study actions)", "answer": "No. The lesson did not assign any drill set as homework. The genuine closing actions prioritised Pure 2 and Pure 3 baseline papers, plus reviewing an already-completed M1 paper. Earlier guide versions presenting author-created drills as tutor-assigned work are not supported by the lesson.", "source": "GLM 5.1 ②"}]}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"id": "glm_3_0", "question": "An ESAT-style warm-up asks: how many different integers $$n$$ satisfy $$|2\\sqrt{n} - 7| < 1$$? What modulus inequality do you write first, and what is the count of integers?", "answer": "Write $$2\\sqrt{n} - 7 < 1$$, which unfolds to $$-1 < 2\\sqrt{n} - 7 < 1$$. Add 7 and divide by 2 to get $$3 < \\sqrt{n} < 4$$, then square to yield $$9 < n < 16$$. The integers are 10, 11, 12, 13, 14, 15. Count = $$15 - 10 + 1 = 6$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ③"}, {"id": "glm_3_1", "question": "When counting the integers strictly between 9 and 16, why must you include the \"+1\" in the formula $$\\text{last} - \\text{first} + 1$$? (ESAT-STYLE WARM-UP — NOT WME01)", "answer": "The subtraction $$16 - 10$$ gives the size of the gap between the numbers (5), but you must also count the starting integer itself. Adding 1 includes the starting boundary, giving the correct total of 6.", "source": "GLM 5.1 ③"}, {"id": "glm_3_2", "question": "A particle A (mass $$3m$$) and particle B (mass $$m$$) approach each other on a line, each at $$1.5 \\text{ m s}^{-1}$$. Taking A's initial direction as positive, state the initial momentum of each particle.", "answer": "Particle A: $$(3m)(1.5) = 4.5m$$. Particle B: $$(m)(-1.5) = -1.5m$$. The negative sign for B is crucial because it moves in the opposite direction to the chosen positive. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "glm_3_3", "question": "After the collision in Tutor packet Q1 / official WME01 Q2, A moves at speed $$x$$ and B moves at speed $$x+1$$ in the positive direction. Why is the label $$x+1$$ used for B's speed?", "answer": "The problem states the difference in their speeds after impact is $$1 \\text{ m s}^{-1}$$. Assuming both move in the positive direction, B is faster, so its speed is A's speed plus 1. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "glm_3_4", "question": "Using conservation of momentum for Tutor packet Q1 / official WME01 Q2, the equation is $$4.5m - 1.5m = 3mx + m(x+1)$$. Solve for $$x$$ and state both speeds.", "answer": "$$3 = 4x + 1 \\implies 4x = 2 \\implies x = 0.5$$. Speed of A is $$0.5 \\text{ m s}^{-1}$$; speed of B is $$x+1 = 1.5 \\text{ m s}^{-1}$$. Always label which speed belongs to which particle. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "glm_3_5", "question": "To find the impulse on particle B (mass $$m$$) in Tutor packet Q1 / official WME01 Q2, you calculate the change in momentum: $$m(1.5) - m(-1.5) = 3m$$. Why does the question ask for the \"magnitude\" of the impulse, and what is the final answer?", "answer": "\"Magnitude\" means the final answer must be a positive quantity written without modulus bars. The calculation yields $$3m$$ (already positive), so the magnitude of the impulse on B is $$3m \\text{ N s}$$. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "glm_3_6", "question": "A train accelerates from rest to $$20 \\text{ m s}^{-1}$$, runs at that speed for 180 s, then decelerates to rest. The acceleration magnitude is twice the deceleration magnitude. If the acceleration phase lasts $$T$$, why does the deceleration phase last $$2T$$?", "answer": "The change in speed is the same for both phases ($$20 \\text{ m s}^{-1}$$). Since $$v = at$$, time is inversely proportional to acceleration. If acceleration is twice deceleration, the deceleration time must be twice the acceleration time. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "glm_3_7", "question": "For the train in Tutor packet Q2 / official WME01 Q1, the time markers on the speed–time graph base are $$T$$, $$T+180$$, and $$3T+180$$. Explain what each marker represents.", "answer": "$$T$$: end of acceleration / start of constant speed. $$T+180$$: end of constant speed / start of deceleration (measured from the origin, not just 180). $$3T+180$$: end of deceleration / total time ($$T + 180 + 2T$$). (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "glm_3_8", "question": "To find $$T$$ for the train in Tutor packet Q2 / official WME01 Q1, you equate the area under the speed–time graph to the total distance $$4.8 \\text{ km}$$. What Pure prerequisite formula is used for the area, and what must you do with the distance unit?", "answer": "Use the trapezium area formula $$A = \\frac{1}{2}(a+b)h$$. The parallel sides are $$a=180$$ and $$b=3T+180$$, and the height is $$h=20$$. You must convert $$4.8 \\text{ km}$$ to $$4800 \\text{ m}$$ before equating. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "glm_3_9", "question": "The trapezium equation for the train in Tutor packet Q2 / official WME01 Q1 is $$4800 = \\frac{1}{2}(180 + 3T + 180)(20)$$. Solve for $$T$$.", "answer": "$$4800 = 10(3T + 360) \\implies 480 = 3T + 360 \\implies 3T = 120 \\implies T = 40 \\text{ s}$$. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "glm_3_10", "question": "Given $$T = 40 \\text{ s}$$ for the train in Tutor packet Q2 / official WME01 Q1, how do you find the initial acceleration?", "answer": "Acceleration is the gradient of the first phase: $$a = \\frac{\\text{change in speed}}{\\text{time}} = \\frac{20}{40} = 0.5 \\text{ m s}^{-2}$$. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "glm_3_11", "question": "A non-uniform branch of length $$1.5 \\text{ m}$$ rests on supports C and D. In one scenario, it is \"on the point of tilting about C\". What fundamental conclusion does this give about the reaction force at D, and how does it simplify your moments equation?", "answer": "The reaction force at D becomes zero ($$R_D = 0$$). A force through the pivot (and a zero reaction) has no moment about that pivot, so $$R_D$$ is eliminated from the moments equation about C. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_12", "question": "In Scenario 1 of Tutor packet Q5 / official WME01 Q4, taking moments about C yields $$Wx = 150(1.5 - 0.24)$$. What distance $$1.5 - 0.24$$ represents, and what is its value?", "answer": "It is the perpendicular distance from pivot C to the line of action of the 150 N force at the end of the branch. Its value is $$1.26 \\text{ m}$$. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_13", "question": "In Scenario 2 of Tutor packet Q5 / official WME01 Q4, the branch tilts about D ($$R_C = 0$$). Taking moments about D gives $$225(0.36) = (0.9 - x)W$$. Explain how the distance $$0.9 - x$$ is derived.", "answer": "The weight $$W$$ is at distance $$x$$ from C. The distance from C to D is $$1.5 - 0.24 - 0.36 = 0.9 \\text{ m}$$. Therefore, the distance from D to $$W$$ is $$0.9 - x$$. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_14", "question": "You have two equations for Tutor packet Q5 / official WME01 Q4: (A) $$Wx = 189$$ and (B) $$(0.9 - x)W = 81$$. What is the most efficient algebraic strategy to solve for $$x$$?", "answer": "Divide equation (A) by equation (B). This instantly cancels the common unknown $$W$$, yielding $$\\frac{x}{0.9 - x} = \\frac{189}{81} = \\frac{7}{3}$$. Cross-multiply to solve for $$x$$. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_15", "question": "From the ratio $$\\frac{x}{0.9 - x} = \\frac{7}{3}$$ in Tutor packet Q5 / official WME01 Q4, find $$x$$ and then back-substitute to find $$W$$.", "answer": "$$3x = 7(0.9 - x) \\implies 10x = 6.3 \\implies x = 0.63 \\text{ m}$$. Back-substitute into (A): $$W = \\frac{189}{0.63} = 300 \\text{ N}$$. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_16", "question": "When taking moments, what tutor strategy helps you avoid sign errors compared to writing a single long signed sum set to zero?", "answer": "Put clockwise moments on one side of the equation and anticlockwise moments on the other. This prevents assigning incorrect negative signs to distances or forces. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_17", "question": "For Tutor packet Q8 / official WME01 Q8, a $$2 \\text{ kg}$$ parcel lies on a rough plane inclined at $$30^\\circ$$. An $$18 \\text{ N}$$ force acts at $$40^\\circ$$ to the plane. How do you resolve the $$18 \\text{ N}$$ force into components relative to the plane?", "answer": "Parallel up the plane: $$18 \\cos 40^\\circ$$. Perpendicular away from the plane: $$18 \\sin 40^\\circ$$. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_18", "question": "For the inclined plane in Tutor packet Q8 / official WME01 Q8, the Student said forces were \"balanced vertically\". What was the tutor's correction?", "answer": "Say balanced perpendicular to the plane. \"Vertically\" means up/down, which is not the resolving direction here. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_19", "question": "For the parcel on the inclined plane in Tutor packet Q8 / official WME01 Q8, write the correct equation for forces resolved perpendicular to the plane.", "answer": "$$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_20", "question": "For the parcel on the inclined plane in Tutor packet Q8 / official WME01 Q8, write the equation of motion parallel to the plane using friction $$F_R$$, acceleration $$a$$, and the resolved components.", "answer": "$$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$$. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_21", "question": "The tutor claimed friction \"only exists because\" of the applied pull and can therefore never exceed it. Is this a valid general rule for deciding the direction of acceleration?", "answer": "No. The direction of acceleration must be decided from the net resolved force along the plane, including gravity. The net force may be up or down the slope regardless of the applied pull. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_22", "question": "Using $$R = 2g \\cos 30^\\circ - 18 \\sin 40^\\circ$$ and $$F_R = 0.3R$$, the acceleration for Tutor packet Q8 / official WME01 Q8 evaluates to $$a \\approx 1.18 \\text{ m s}^{-2}$$. What is the correct procedure for substituting this into subsequent parts?", "answer": "Keep the unrounded value $$a = 1.1838...$$ for onward substitution (e.g., into SUVAT), and only write the rounded value $$a \\approx 1.18 \\text{ m s}^{-2}$$ at the end. (OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "glm_3_23", "question": "Official WME01 Q3 (packet Q3) was looked at but not re-worked in the lesson. What status does this item carry, and where must you find its answers (e.g., speed at $$t=2$$ is $$3\\sqrt{5}$$)?", "answer": "REVIEWED ONLY / DEFERRED. Answers are found in the official reference appendix, not from live work. (Tutor packet Q3 / official WME01 Q3)", "source": "GLM 5.1 ③"}, {"id": "glm_3_24", "question": "Official WME01 Q5 (packet Q4) was looked at but not re-worked. What status does this item carry, and where must you find its answers (e.g., $$u = 9 \\text{ m s}^{-1}$$)?", "answer": "REVIEWED ONLY / DEFERRED. Answers are found in the official reference appendix, not from live work. (Tutor packet Q4 / official WME01 Q5)", "source": "GLM 5.1 ③"}, {"id": "glm_3_25", "question": "Official WME01 Q6 (boat pulled by two ropes) and Q7 (lift and two boxes) were not opened in the lesson. What status do they carry?", "answer": "NOT DISCUSSED. (Tutor packet Q6 / official WME01 Q6; Tutor packet Q7 / official WME01 Q7)", "source": "GLM 5.1 ③"}, {"id": "glm_3_26", "question": "What three priority study actions were actually agreed at the end of the lesson?", "answer": "1. Complete the Pure 2 baseline paper. 2. Complete the Pure 3 baseline paper. 3. Look over the already-completed, marked M1 homework paper if time allows (to be revisited together in mid-July).", "source": "GLM 5.1 ③"}, {"id": "glm_3_27", "question": "What is the rule for rounding and units when an official mark-scheme reference supplies a numerical completion, such as $$a \\approx 1.18 \\text{ m s}^{-2}$$ in Q8?", "answer": "Keep signed quantities until a requested magnitude is taken; keep an unrounded value for onward substitution; use \"=\" for exact/calculated expressions and \"≈\" for rounded ones; give SI units on final mechanics answers. (OFFICIAL MS REFERENCE ONLY)", "source": "GLM 5.1 ③"}, {"id": "glm_3_28", "question": "Which M1 formulas used in this lesson are NOT additionally printed in the M1 formula booklet and must be known by heart?", "answer": "Momentum = $$mv$$; impulse = $$mv - mu$$; the five constant-acceleration (SUVAT) formulae; Newton's laws; friction law $$F = \\mu R$$ (and $$F \\le \\mu R$$); principle of moments.", "source": "GLM 5.1 ③"}, {"id": "glm_3_29", "question": "Which Pure prerequisite formula was used for the train speed–time graph (Tutor packet Q2 / official WME01 Q1), and why is it useful to learn instead of always splitting into triangles and a rectangle?", "answer": "The area of a trapezium: $$A = \\frac{1}{2}(a+b)h$$. It is faster and less prone to arithmetic error than splitting the area into two triangles and a rectangle.", "source": "GLM 5.1 ③"}, {"id": "glm_3_30", "question": "Why does the official WME01 January 2023 paper require a dual-numbering system with the tutor's practice packet?", "answer": "The packet re-ordered questions relative to the official paper. Packet Q1 is official Q2; packet Q2 is official Q1; packet Q5 is official Q4. Using only official numbering would contradict the packet actually worked from.", "source": "GLM 5.1 ③"}, {"id": "glm_3_31", "question": "What is the difference between \"LIVE SET-UP ONLY\" and \"COMPLETED WITH PROMPTING\"?", "answer": "\"Live set-up only\" means the diagram and governing equations were reached live but the arithmetic/final answer was not finished. \"Completed with prompting\" means the question was worked through to the requested answer during the lesson with tutor help.", "source": "GLM 5.1 ③"}, {"id": "glm_3_32", "question": "In Tutor packet Q5 / official WME01 Q4, the Student took moments about D for the second tilting scenario. What common trap caused a sign/distance error in their initial complicated signed equation?", "answer": "Attempting a single long signed sum set to zero, which makes it easy to assign incorrect negative signs to distances. The correction was to equate clockwise moments to anticlockwise moments explicitly. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_3_33", "question": "In the official MS reference for Tutor packet Q8 / official WME01 Q8(c), the 18 N force is removed. The maximum friction is $$\\mu R \\approx 5.09 \\text{ N}$$. The weight component down the plane is $$2g \\sin 30^\\circ = 9.8 \\text{ N}$$. Does the parcel remain at rest?", "answer": "No. Because the weight component down the slope (9.8 N) exceeds the maximum available friction (5.09 N), friction cannot hold the parcel, so it does not remain at rest. (OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}]}, "qwen_1": {"label": "Qwen ①", "cards": [{"id": "qwen_1_0", "question": "In the ESAT-style warm-up (NOT WME01), how many integers $n$ satisfy the condition that the difference between $\\sqrt{2n}$ and $7$ is less than $1$? State the inequality setup, the integer range, and the final count.", "answer": "This is an ESAT-style warm-up, NOT a WME01 question.\n\"Difference less than 1\" translates to the modulus inequality $|\\sqrt{2n} - 7| < 1$.\nUnfolding gives $-1 < \\sqrt{2n} - 7 < 1 \\Rightarrow 6 < \\sqrt{2n} < 8$.\nDividing by 2 and squaring yields $9 < n < 16$.\nThe integers are $\\{10, 11, 12, 13, 14, 15\\}$.\nThe count is $15 - 10 + 1 = 6$.", "source": "Qwen ①"}, {"id": "qwen_1_1", "question": "For Tutor packet Q1 / official WME01 Q2 (direct collision), particles A ($3m$) and B ($m$) approach each other at $1.5 \\text{ m s}^{-1}$. If A's initial direction is positive and post-collision speeds are defined as $v_A = x$ and $v_B = x+1$, write the conservation of linear momentum equation and solve for $x$. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nTaking A's initial direction as positive:\n$(3m)(1.5) + m(-1.5) = 3m(x) + m(x+1)$\n$4.5 - 1.5 = 3x + x + 1$\n$3 = 4x + 1 \\Rightarrow 4x = 2 \\Rightarrow x = 0.5$.\nThe speed of A after impact is $0.5 \\text{ m s}^{-1}$.", "source": "Qwen ①"}, {"id": "qwen_1_2", "question": "In Tutor packet Q1 / official WME01 Q2, given that particle B (mass $m$) has an initial velocity of $-1.5 \\text{ m s}^{-1}$ and a final velocity of $1.5 \\text{ m s}^{-1}$, calculate the magnitude of the impulse exerted on B. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nImpulse on B = change in momentum of B.\n$I_B = m(v_{final} - v_{initial}) = m(1.5 - (-1.5)) = m(3) = 3m$.\nMagnitude is requested, so the answer is $3m \\text{ N s}$.\nNote: \"Magnitude\" requires a positive quantity without modulus bars in the final answer.", "source": "Qwen ①"}, {"id": "qwen_1_3", "question": "In Tutor packet Q2 / official WME01 Q1 (train graph), a train accelerates from rest to $20 \\text{ m s}^{-1}$ in time $T$, runs at constant speed for $180 \\text{ s}$, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, express the total time of motion in terms of $T$. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nSince $|a| = 2|d|$, the deceleration phase takes twice as long as the acceleration phase ($t_{dec} = 2T$).\nTotal time = (acceleration time) + (constant speed time) + (deceleration time)\nTotal time = $T + 180 + 2T = 3T + 180$.", "source": "Qwen ①"}, {"id": "qwen_1_4", "question": "For Tutor packet Q2 / official WME01 Q1, given total distance $4.8 \\text{ km}$, peak speed $20 \\text{ m s}^{-1}$, constant phase $180 \\text{ s}$, and total time $3T+180$, set up the trapezium area equation to find $T$. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nConvert distance: $4.8 \\text{ km} = 4800 \\text{ m}$.\nTrapezium area $A = \\frac{1}{2}(a+b)h$, where parallel sides are $180$ and $(3T+180)$, and height is $20$.\n$4800 = \\frac{1}{2}[180 + (3T + 180)] \\times 20$\n$4800 = (3T + 360) \\times 10$\n$480 = 3T + 360 \\Rightarrow 3T = 120 \\Rightarrow T = 40 \\text{ s}$.", "source": "Qwen ①"}, {"id": "qwen_1_5", "question": "In Tutor packet Q2 / official WME01 Q1, once $T=40 \\text{ s}$ is found for the acceleration phase reaching $20 \\text{ m s}^{-1}$ from rest, how is the initial acceleration calculated? Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nAcceleration is the gradient of the speed–time graph during the first phase.\n$a = \\frac{\\Delta v}{\\Delta t} = \\frac{20 - 0}{40} = 0.5 \\text{ m s}^{-2}$.", "source": "Qwen ①"}, {"id": "qwen_1_6", "question": "What is the current study status of Tutor packet Q3 / official WME01 Q3 (constant-acceleration vectors) and Tutor packet Q4 / official WME01 Q5 (vehicle SUVAT)?", "answer": "Status: REVIEWED ONLY / DEFERRED.\nThese items were looked at and commented on but not re-worked in the lesson. No tutorial solution was produced live. Official answers exist only in the reference appendix.", "source": "Qwen ①"}, {"id": "qwen_1_7", "question": "What is the current study status of Tutor packet Q6 / official WME01 Q6 (boat with two ropes) and Tutor packet Q7 / official WME01 Q7 (lift and two boxes)?", "answer": "Status: NOT DISCUSSED.\nThese parts of the paper were not opened or discussed in the lesson. They appear in the guide only for inventory completeness. Any answers are official mark scheme references only.", "source": "Qwen ①"}, {"id": "qwen_1_8", "question": "In Tutor packet Q5 / official WME01 Q4 (moments), a non-uniform branch rests on supports C and D. When the branch is \"on the point of tilting about C\", what is the value of the reaction at D ($R_D$), and why? Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\n$R_D = 0$.\nWhen a rigid body is on the point of tilting about a specific support, it loses contact with all other supports. Therefore, the reaction force at any support other than the pivot is zero. This simplifies moment equations as the force through the pivot exerts zero moment.", "source": "Qwen ①"}, {"id": "qwen_1_9", "question": "For Tutor packet Q5 / official WME01 Q4, a branch of length $1.5 \\text{ m}$ has supports C ($0.24 \\text{ m}$ from left end) and D ($0.36 \\text{ m}$ from right end). In the scenario tilting about C with a $150 \\text{ N}$ load applied at the right end, write the moment equation about C. Let $W$ be the branch weight acting at distance $x$ from C. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nTilting about C implies $R_D = 0$.\nDistance from C to right end = $1.5 - 0.24 = 1.26 \\text{ m}$.\nTaking moments about C (Clockwise = Anticlockwise):\n$W \\cdot x = 150 \\cdot (1.26)$\n$Wx = 189$  (Equation A)", "source": "Qwen ①"}, {"id": "qwen_1_10", "question": "For Tutor packet Q5 / official WME01 Q4, in the scenario tilting about D with a $225 \\text{ N}$ load applied at the left end, write the moment equation about D. Supports are $0.24 \\text{ m}$ from left and $0.36 \\text{ m}$ from right; weight $W$ acts at distance $x$ from C. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nTilting about D implies $R_C = 0$.\nDistance from D to left end = $0.36 \\text{ m}$ (load arm).\nDistance from D to weight $W$: Total length $1.5$ minus left gap $0.24$ minus right gap $0.36$ minus distance $x$ from C. Wait, $x$ is from C. Distance CD = $1.5 - 0.24 - 0.36 = 0.9$. Distance from D to W is $(0.9 - x)$.\nMoments about D:\n$225(0.36) = W(0.9 - x)$\n$81 = W(0.9 - x)$ (Equation B)", "source": "Qwen ①"}, {"id": "qwen_1_11", "question": "Using the two tilting equations for Tutor packet Q5 / official WME01 Q4: (A) $Wx = 189$ and (B) $W(0.9-x) = 81$, describe the most efficient algebraic method to find $x$ and state the result. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nDivide equation (A) by equation (B) to eliminate $W$:\n$\\frac{Wx}{W(0.9-x)} = \\frac{189}{81}$\n$\\frac{x}{0.9-x} = \\frac{7}{3}$\n$3x = 7(0.9 - x) \\Rightarrow 3x = 6.3 - 7x \\Rightarrow 10x = 6.3$\n$x = 0.63 \\text{ m}$.\nDividing is preferred over substitution to avoid carrying $W$ through intermediate steps.", "source": "Qwen ①"}, {"id": "qwen_1_12", "question": "In Tutor packet Q5 / official WME01 Q4, after finding $x = 0.63 \\text{ m}$, how is the weight $W$ determined using Equation A ($Wx = 189$)? Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nSubstitute $x = 0.63$ into $Wx = 189$:\n$W = \\frac{189}{0.63} = 300 \\text{ N}$.\nCare must be taken with back-substitution arithmetic to avoid errors.", "source": "Qwen ①"}, {"id": "qwen_1_13", "question": "What is the specific lesson status of Tutor packet Q8 / official WME01 Q8 (parcel on rough inclined plane), and what does this status imply about the availability of the numerical solution?", "answer": "Status: LIVE SET-UP ONLY.\nOnly the force diagram and governing equations were reached during the lesson. The arithmetic elimination and final numerical answers were NOT completed live. Numerical values for this question in the guide are OFFICIAL MS REFERENCE ONLY.", "source": "Qwen ①"}, {"id": "qwen_1_14", "question": "For Tutor packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a $2 \\text{ kg}$ parcel on a $30^\\circ$ rough plane is pulled by an $18 \\text{ N}$ force at $40^\\circ$ to the plane. Write the correct resolved equation perpendicular to the plane for the normal reaction $R$.", "answer": "Status: LIVE SET-UP ONLY.\nResolving perpendicular to the plane (equilibrium in this direction):\n$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$\nNote: The board line in the lesson contained an error ($2g \\sin 30^\\circ$); the correct term balancing the normal components is $2g \\cos 30^\\circ$. The $18 \\sin 40^\\circ$ component lifts the parcel, reducing $R$.", "source": "Qwen ①"}, {"id": "qwen_1_15", "question": "For Tutor packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), write the governing equation parallel to the plane relating acceleration $a$, friction $F_R$, and the applied force components.", "answer": "Status: LIVE SET-UP ONLY.\nApplying Newton's Second Law parallel to the plane (up the plane positive):\n$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$\nNote: Friction $F_R$ opposes motion. The weight component $2g \\sin 30^\\circ$ acts down the plane.", "source": "Qwen ①"}, {"id": "qwen_1_16", "question": "In the setup for Tutor packet Q8 / official WME01 Q8, why is the statement \"friction only exists because of the applied pull and can never exceed it\" considered invalid general advice?", "answer": "Status: LIVE SET-UP ONLY (Tutor correction required).\nFriction is determined by the net tendency to slide, which includes gravity components, not just applied forces. The direction of acceleration and magnitude of friction must be decided solely from the resolved net force equation ($F_{net} = ma$). While the specific numbers in Q8 result in upward acceleration, this is a consequence of the equation, not a general rule limiting friction to the applied pull.", "source": "Qwen ①"}, {"id": "qwen_1_17", "question": "For Tutor packet Q8 / official WME01 Q8, what is the source status of the numerical answer $a \\approx 1.18 \\text{ m s}^{-2}$, and what inputs produce it?", "answer": "Source: OFFICIAL MS REFERENCE ONLY (not completed live).\nInputs: $g=9.8$, $R = 2g \\cos 30^\\circ - 18 \\sin 40^\\circ \\approx 5.40 \\text{ N}$.\n$F_R = 0.3R \\approx 1.62 \\text{ N}$.\n$2a = 18 \\cos 40^\\circ - 1.62 - 2g \\sin 30^\\circ \\approx 2.37$.\n$a \\approx 1.18 \\text{ m s}^{-2}$.\nThis value was not derived in the lesson.", "source": "Qwen ①"}, {"id": "qwen_1_18", "question": "According to the M1 Formula Booklet policy cited in the guide, which of the following are NOT printed and must be memorized: Momentum, SUVAT, Area of Trapezium, or Principle of Moments?", "answer": "Must be memorized (not printed): Momentum ($mv$), Impulse ($mv-mu$), SUVAT equations, Newton's Laws, Friction Law ($F \\le \\mu R$), Principle of Moments.\nPrinted/Prerequisite: Area of a trapezium is a P1/P2 prerequisite result, not an M1-specific formula, but candidates are expected to know it.", "source": "Qwen ①"}, {"id": "qwen_1_19", "question": "In Tutor packet Q2 / official WME01 Q1, when calculating the area of the speed-time trapezium, what unit conversion is mandatory before equating area to distance?", "answer": "The distance is given in km ($4.8 \\text{ km}$) while speed is in $\\text{m s}^{-1}$ and time in s.\nConversion: $4.8 \\text{ km} = 4800 \\text{ m}$.\nEquating area (in meters) to $4800$ is required; using $4.8$ would yield incorrect time values.", "source": "Qwen ①"}, {"id": "qwen_1_20", "question": "For Tutor packet Q1 / official WME01 Q2, if a student calculates impulse as $-3m \\text{ N s}$, how should the final answer be presented if the question asks for the \"magnitude of the impulse\"?", "answer": "Magnitude is a scalar quantity and must be positive.\nFinal answer: $3m \\text{ N s}$.\nDo not include modulus bars or negative signs in the final stated magnitude.", "source": "Qwen ①"}, {"id": "qwen_1_21", "question": "In Tutor packet Q5 / official WME01 Q4, when setting up moment equations for tilting problems, what structural formatting strategy is recommended to avoid sign errors?", "answer": "Separate clockwise and anticlockwise moments onto opposite sides of the equation (e.g., CW = ACW) rather than summing signed moments to zero.\nAlso, box and label key equations (e.g., Eq A, Eq B) to facilitate clean combination later.", "source": "Qwen ①"}, {"id": "qwen_1_22", "question": "Regarding Tutor packet Q8 / official WME01 Q8, what specific terminology correction did the tutor give regarding forces perpendicular to the inclined plane?", "answer": "Status: LIVE SET-UP ONLY.\nCorrection: Do not say forces are \"balanced vertically.\" Say they are \"balanced perpendicular to the plane.\"\n\"Vertical\" refers to the direction of gravity; resolving is done relative to the inclined surface. Parallel forces are NOT balanced (Newton's 2nd Law applies).", "source": "Qwen ①"}, {"id": "qwen_1_23", "question": "For Tutor packet Q8 / official WME01 Q8, what is the source status of the result \"$P$ does not remain at rest\" in part (c)?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\nThis part was NOT attempted live. The conclusion relies on comparing weight component ($2g \\sin 30^\\circ = 9.8 \\text{ N}$) with max friction ($\\mu R \\approx 5.09 \\text{ N}$) after the $18 \\text{ N}$ force is removed. Since $9.8 > 5.09$, equilibrium is impossible.", "source": "Qwen ①"}, {"id": "qwen_1_24", "question": "In the ESAT-style warm-up (NOT WME01), why are the endpoints $n=9$ and $n=16$ excluded from the solution set?", "answer": "The inequality is strict: \"difference ... is less than 1\" ($< 1$).\nThis leads to strict inequalities $9 < n < 16$.\nIf the difference were \"less than or equal to 1\", endpoints would be included. Strict inequality excludes them.", "source": "Qwen ①"}, {"id": "qwen_1_25", "question": "For Tutor packet Q2 / official WME01 Q1, if a student incorrectly assumes the constant speed phase ends at $t=180$ instead of having duration $180$, how does this affect the trapezium geometry?", "answer": "The constant phase has *duration* $180 \\text{ s}$, starting after acceleration time $T$.\nCorrect transition point: $T + 180$.\nIncorrect assumption ($t=180$) ignores the acceleration phase duration, shrinking the top parallel side and yielding an incorrect total area/distance equation.", "source": "Qwen ①"}, {"id": "qwen_1_26", "question": "In Tutor packet Q1 / official WME01 Q2, why is it necessary to explicitly label calculated speeds as \"$v_A$\" and \"$v_B$\" rather than just listing two numbers?", "answer": "Status: COMPLETED WITH PROMPTING.\nThe question asks for the speeds of specific particles. Two unlabelled numbers are ambiguous and may not receive full credit. Explicit labelling ensures the examiner knows which speed corresponds to which particle.", "source": "Qwen ①"}, {"id": "qwen_1_27", "question": "What is the verified status of the \"live slip\" narrative regarding Tutor packet Q1 / official WME01 Q2 where $x=2.75$ was allegedly calculated?", "answer": "The narrative of a slip producing $x=2.75$ is FALSE and has been removed.\nEvidence (recording/board) confirms only the correct working: $x=0.5$ and $v_B=1.5$. Do not study the erroneous value.", "source": "Qwen ①"}, {"id": "qwen_1_28", "question": "For Tutor packet Q3 / official WME01 Q3 (REVIEWED ONLY / DEFERRED), what is the official mark scheme answer for the speed at $t=2$?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\nSpeed = $\\sqrt{45} = 3\\sqrt{5} \\approx 6.7 \\text{ m s}^{-1}$.\nThis was not worked live; provided for reference only.", "source": "Qwen ①"}, {"id": "qwen_1_29", "question": "For Tutor packet Q4 / official WME01 Q5 (REVIEWED ONLY / DEFERRED), what is the official mark scheme answer for the initial speed $u$?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\n$u = 9 \\text{ m s}^{-1}$.\nThis was not worked live; provided for reference only.", "source": "Qwen ①"}, {"id": "qwen_1_30", "question": "In Tutor packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), what is the correct expression for the friction force $F_R$ used in the parallel equation?", "answer": "Status: LIVE SET-UP ONLY.\nSince the parcel is moving/accelerating, friction is limiting:\n$F_R = \\mu R = 0.3 R$.\nWhere $R$ is determined from the perpendicular equilibrium equation $R = 2g \\cos 30^\\circ - 18 \\sin 40^\\circ$.", "source": "Qwen ①"}, {"id": "qwen_1_31", "question": "What specific study action was prioritized for the week following the 19 June 2026 lesson, according to the Closing Study Actions?", "answer": "Priority: Complete the Pure 2 baseline paper, then the Pure 3 baseline paper.\nGoal: Build a full course diagnostic ahead of extra M1 work.\nNote: No specific M1 drill sets were assigned as homework.", "source": "Qwen ①"}, {"id": "qwen_1_32", "question": "In Tutor packet Q5 / official WME01 Q4, what is the distance between supports C and D given the branch length is $1.5 \\text{ m}$, C is $0.24 \\text{ m}$ from the left end, and D is $0.36 \\text{ m}$ from the right end?", "answer": "Distance CD = Total Length - (Left Gap + Right Gap)\n$CD = 1.5 - (0.24 + 0.36) = 1.5 - 0.60 = 0.9 \\text{ m}$.\nThis distance is crucial for determining the moment arm of the weight $W$ relative to support D.", "source": "Qwen ①"}, {"id": "qwen_1_33", "question": "For Tutor packet Q8 / official WME01 Q8, what is the official reference value for the speed at B (part b), and what kinematic parameters generate it?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\n$v \\approx 3.98 \\text{ m s}^{-1}$ (or $4.0 \\text{ m s}^{-1}$).\nDerived from $v^2 = u^2 + 2as$ with $u=2 \\text{ m s}^{-1}$, $s=5 \\text{ m}$, and unrounded $a \\approx 1.1838 \\text{ m s}^{-2}$.\nNot attempted live.", "source": "Qwen ①"}, {"id": "qwen_1_34", "question": "Why must unrounded values (e.g., $a = 1.1838...$) be used in multi-step M1 calculations like Tutor packet Q8 / official WME01 Q8, even if the final answer is rounded?", "answer": "To prevent premature rounding errors accumulating in subsequent steps (e.g., calculating $v$ from $a$).\nStore the full calculator value for onward substitution.\nWrite \"$\\approx$\" only for the final rounded answer; use \"$=$\" for exact intermediate expressions.", "source": "Qwen ①"}, {"id": "qwen_1_35", "question": "In the ESAT-style warm-up (NOT WME01), what was the specific coaching point regarding the rearrangement of $|\\sqrt{2n} - 7| < 1$?", "answer": "Use the single modulus statement and number line unfolding ($-1 < \\sqrt{2n} - 7 < 1$).\nAvoid rearranging to isolate $\\sqrt{2n}$ first in a way that re-introduces complex terms or splits into separate inequalities unnecessarily. The unified chain is safer and faster.", "source": "Qwen ①"}, {"id": "qwen_1_36", "question": "For Tutor packet Q6 / official WME01 Q6 (NOT DISCUSSED), what are the official reference values for rope angle $\\alpha$ and tension $P$?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\n$\\alpha \\approx 31.9^\\circ$.\nTension $P \\approx 609 \\text{ N}$ (610 N accepted).\nThese were not discussed or derived in the lesson.", "source": "Qwen ①"}, {"id": "qwen_1_37", "question": "In Tutor packet Q5 / official WME01 Q4, if a student obtains $W=300 \\text{ N}$ but initially wrote a wrong intermediate value during back-substitution, what does the guide suggest as a preventative measure?", "answer": "Status: COMPLETED WITH PROMPTING.\n\"Be careful\" with back-substitution arithmetic.\nThe guide notes the student started from a wrong value and repaired it live. Using the division method to find $x$ first reduces algebraic complexity, but arithmetic checks on the final substitution are essential.", "source": "Qwen ①"}, {"id": "qwen_1_38", "question": "What distinguishes \"LIVE SET-UP ONLY\" from \"OFFICIAL MS REFERENCE
