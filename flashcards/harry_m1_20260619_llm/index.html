 ONLY\" in the context of Tutor packet Q8 / official WME01 Q8?", "answer": "LIVE SET-UP ONLY: The diagram and governing equations were physically drawn/written in the lesson.\nOFFICIAL MS REFERENCE ONLY: The numerical answers and completion steps were added post-lesson from the mark scheme.\nFor Q8, the setup is live; the solution is reference-only.", "source": "Qwen ①"}, {"id": "qwen_1_39", "question": "For Tutor packet Q2 / official WME01 Q1, what Pure Mathematics prerequisite formula is explicitly cited as necessary for finding $T$?", "answer": "Area of a trapezium: $A = \\frac{1}{2}(a+b)h$.\nThis is not in the M1 formula booklet but is required for speed-time graph area problems. Candidates are expected to know it from P1/P2.", "source": "Qwen ①"}, {"id": "qwen_1_40", "question": "In Tutor packet Q1 / official WME01 Q2, what sign convention was established for the conservation of momentum equation?", "answer": "Status: COMPLETED WITH PROMPTING.\nA's initial direction was taken as POSITIVE.\nTherefore:\n$v_{A,initial} = +1.5$\n$v_{B,initial} = -1.5$ (approaching A)\nConsistency in this sign convention is critical for obtaining the correct $x$.", "source": "Qwen ①"}, {"id": "qwen_1_41", "question": "Regarding the \"Closing Study Actions\", what is the status of the \"recurring weakness\" drill set mentioned in earlier guide versions?", "answer": "It is INVALID and REMOVED.\nThe lesson did not assign specific M1 drills or identify a recurring weakness story.\nGenuine actions are limited to: Pure 2/3 baselines, reviewing a separate marked M1 homework, and revisiting that paper in mid-July.", "source": "Qwen ①"}, {"id": "qwen_1_42", "question": "For Tutor packet Q7 / official WME01 Q7 (NOT DISCUSSED), what are the official reference answers for combined mass and mass of P?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\nCombined mass of P and Q: $5m$.\nMass of P: $2m$.\nNot discussed in lesson.", "source": "Qwen ①"}, {"id": "qwen_1_43", "question": "In Tutor packet Q8 / official WME01 Q8, why is the perpendicular equation $R - 2g \\sin 30^\\circ + 18 \\sin 40^\\circ = 0$ (as seen on the board) incorrect?", "answer": "Status: LIVE SET-UP ONLY (Board Error).\nThe weight component perpendicular to the plane is $2g \\cos 30^\\circ$, not $\\sin$.\nThe applied force component $18 \\sin 40^\\circ$ acts away from the plane (lifting).\nCorrect equilibrium: $R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$.\nThe board line was not audibly repaired but is factually wrong.", "source": "Qwen ①"}, {"id": "qwen_1_44", "question": "What is the dual numbering for the \"Direct collision and impulse\" question in the 19 June 2026 tutorial?", "answer": "Tutor packet Q1 / Official WME01 Q2.\nAlways use both labels to align with the re-ordered practice packet and the official paper.", "source": "Qwen ①"}, {"id": "qwen_1_45", "question": "What is the dual numbering for the \"Train speed–time graph\" question in the 19 June 2026 tutorial?", "answer": "Tutor packet Q2 / Official WME01 Q1.\nNote the swap: Packet Q2 corresponds to Official Q1.", "source": "Qwen ①"}, {"id": "qwen_1_46", "question": "What is the dual numbering for the \"Moments and tilting\" question in the 19 June 2026 tutorial?", "answer": "Tutor packet Q5 / Official WME01 Q4.\nNote the swap: Packet Q5 corresponds to Official Q4.", "source": "Qwen ①"}, {"id": "qwen_1_47", "question": "In Tutor packet Q5 / official WME01 Q4, if the branch is uniform, how would the position of $W$ change in the moment equations?", "answer": "Note: The problem specifies a NON-UNIFORM branch, so $x$ is an unknown variable to be found.\nIf it were uniform, $W$ would act at the geometric center ($0.75 \\text{ m}$ from either end), making $x$ a known constant relative to C.\nSince it is non-uniform, $x$ must be solved via simultaneous equations from two tilting scenarios.", "source": "Qwen ①"}, {"id": "qwen_1_48", "question": "For Tutor packet Q8 / official WME01 Q8, what is the value of $g$ used in the official mark scheme reference calculations?", "answer": "Source: OFFICIAL MS REFERENCE ONLY.\n$g = 9.8 \\text{ m s}^{-2}$.\nThis value is standard for WME01 unless specified otherwise, and was used to generate the reference answers $a \\approx 1.18$ and $v \\approx 3.98$.", "source": "Qwen ①"}]}, "minimax_1": {"label": "MiniMax ①", "cards": [{"id": "minimax_1_0", "question": "A warm-up asks: how many different integers n satisfy that the difference between √n and 7 is less than 1? Without solving, write the single modulus statement that captures \"difference less than 1\", and state why dividing every term of the resulting chain by 2 is safe here.", "answer": "The statement is |√n − 7| < 1, which unfolds to −1 < √n − 7 < 1. Dividing by 2 is safe because every term in the chain 6 < √n < 8 is non-negative, so the direction of all three inequalities is preserved.", "source": "MiniMax ①"}, {"id": "minimax_1_1", "question": "Continuing the warm-up, starting from 6 < √n < 8, square all three sides to remove the square root, state the resulting strict inequality in n, and use it to count the admissible integers.", "answer": "Squaring strict inequalities between non-negative quantities gives 36 < n < 64, so n ∈ {37, 38, …, 63}. The count is 63 − 37 + 1 = 27 integers.", "source": "MiniMax ①"}, {"id": "minimax_1_2", "question": "Why must the endpoints 36 and 64 be excluded from the count in the warm-up inequality 36 < n < 64, and why is the \"+1\" needed when counting integers between two strict bounds?", "answer": "The original inequality is strict (<), so n = 36 and n = 64 are not allowed. For inclusive counting of consecutive integers, the number from a to b inclusive is b − a + 1, which accounts for both endpoints.", "source": "MiniMax ①"}, {"id": "minimax_1_3", "question": "(Packet Q1 / official WME01 Q2) Two particles collide directly. Particle A has mass 3m and B has mass m; each approaches the other at 1.5 m s⁻¹. Taking A's initial direction as positive, state conservation-of-linear-momentum in terms of A's post-collision speed x and B's post-collision speed (x + 1), and solve for x.", "answer": "(3m)(1.5) + m(−1.5) = 3m·x + m(x + 1) gives 3 = 4x + 1, so x = 1/2, i.e. 0.5 m s⁻¹.", "source": "MiniMax ①"}, {"id": "minimax_1_4", "question": "(Packet Q1 / official WME01 Q2) Using the value of x from the previous card, give the post-collision speeds of A and B with clear labels, and state the magnitude of the impulse on B.", "answer": "v_A = 0.5 m s⁻¹ in A's original direction; v_B = 1.5 m s⁻¹ in A's original direction. Impulse on B = m(1.5 − (−1.5)) = 3m, so |I_B| = 3m N s (written without modulus bars because the question asks for the magnitude).", "source": "MiniMax ①"}, {"id": "minimax_1_5", "question": "(Packet Q1 / official WME01 Q2) Why is the post-collision speed of B not just left as the algebraic expression \"x + 1\" when answering the paper, and which particle's impulse is the one that must be evaluated?", "answer": "The question asks for the speeds of A and B explicitly, so both must be written as numerical values with units and labels. The impulse requested is on B, computed as B's change in momentum m(v_B − u_B).", "source": "MiniMax ①"}, {"id": "minimax_1_6", "question": "(Packet Q2 / official WME01 Q1) A train accelerates from rest to 20 m s⁻¹, runs at that speed for 180 s, then decelerates to rest. The magnitude of the acceleration is twice the magnitude of the deceleration. If the acceleration phase lasts T seconds, what are the times of the three transition points along the base of the speed–time graph, and why is the constant-velocity phase measured from T, not from 0?", "answer": "The transitions occur at T, T + 180, and 3T + 180 s. The constant phase begins only after the acceleration has reached the top speed (at t = T), not from the start.", "source": "MiniMax ①"}, {"id": "minimax_1_7", "question": "(Packet Q2 / official Q1) The total distance travelled is 4.8 km. Using the trapezium area formula A = ½(a + b)h with a = 180, b = 3T + 180, h = 20, set up the equation for the area and solve for T. State the unit conversion you must do first.", "answer": "Convert distance to metres: 4.8 km = 4800 m. Then 4800 = ½(180 + 3T + 180)(20), which reduces to 4800 = 10(3T + 360), giving 3T = 120, so T = 40 s.", "source": "MiniMax ①"}, {"id": "minimax_1_8", "question": "(Packet Q2 / official Q1) With T = 40 s, what is the magnitude of the initial acceleration, and which feature of the speed–time graph supplies it?", "answer": "The gradient of the first (rising) phase: 20 / T = 20 / 40 = 0.5 m s⁻².", "source": "MiniMax ①"}, {"id": "minimax_1_9", "question": "(Packet Q2 / official Q1) A learner writes the area equation as 4800 = ½(180)(3T + 180)(20) instead of ½(180 + (3T + 180))(20). What conceptual mistake does this reveal, and which side of the trapezium does the 3T + 180 represent?", "answer": "They have multiplied the two parallel sides instead of adding them; the two parallel sides of a trapezium add, they do not multiply. 3T + 180 is the length of the bottom base (from t = 0 to t = 3T + 180), and 180 is the length of the top base (the duration at 20 m s⁻¹).", "source": "MiniMax ①"}, {"id": "minimax_1_10", "question": "(Packet Q5 / official Q4) A non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m and 0.36 m from its two ends. Weight W acts at a distance x from C. State the rule that turns \"on the point of tilting about C\" into a single equation, and the parallel rule for tilting about D.", "answer": "\"On the point of tilting about C\" means the reaction at D is zero: R_D = 0. \"On the point of tilting about D\" means R_C = 0. A force acting through the pivot produces no moment about that pivot.", "source": "MiniMax ①"}, {"id": "minimax_1_11", "question": "(Packet Q5 / official Q4) In the tilting-about-C scenario an extra load of 150 N hangs at the far end. Using clockwise = anticlockwise moments about C and the branch length 1.5 m, write the moment equation and simplify to a single numerical equation for W and x.", "answer": "With R_D = 0 and the 150 N at the end of the branch, the distance from C to the load is 1.5 − 0.24 = 1.26 m. So W·x = 150 × 1.26 = 189, i.e. Wx = 189.", "source": "MiniMax ①"}, {"id": "minimax_1_12", "question": "(Packet Q5 / official Q4) In the tilting-about-D scenario an extra load of 225 N hangs at the near end. With R_C = 0, take moments about D: the 225 N is at distance 0.36 m from D, and the weight W is at distance (1.5 − 0.36 − 0.24 − x) = (0.9 − x) from D. Write the moment equation and simplify.", "answer": "W(0.9 − x) = 225 × 0.36 = 81.", "source": "MiniMax ①"}, {"id": "minimax_1_13", "question": "(Packet Q5 / official Q4) Given Wx = 189 and W(0.9 − x) = 81, find the cancellation strategy and solve for x and W.", "answer": "Divide the first equation by the second to cancel W: x / (0.9 − x) = 189 / 81 = 7/3, so 3x = 7(0.9 − x) = 6.3 − 7x, giving 10x = 6.3 and x = 0.63 m. Then W = 189 / 0.63 = 300 N.", "source": "MiniMax ①"}, {"id": "minimax_1_14", "question": "(Packet Q5 / official Q4) Why is dividing two simultaneous equations often preferable to substitution when the unknown W is common to both, and what is the labelling strategy that prevents sign slippage when summing moments?", "answer": "Dividing cancels the common unknown immediately, removing a layer of algebra. Labelling the two equations (e.g. (A) and (B)) and putting clockwise moments on one side and anticlockwise on the other prevents adding signed lengths that mix opposite senses.", "source": "MiniMax ①"}, {"id": "minimax_1_15", "question": "(Packet Q5 / official Q4) The first scenario was tilted about C and the second about D. Why does the new guide reject the \"friction only exists because of the applied pull\" generalisation that appeared in an earlier version, and what is the correct way to decide the direction of motion on an incline?", "answer": "That is not a valid general rule. The direction of motion must be decided from the net resolved force along the plane, including the weight component. Any shortcut that ignores gravity along the slope is unsound; the resolved equation along the plane is the only trustworthy test.", "source": "MiniMax ①"}, {"id": "minimax_1_16", "question": "(Packet Q8 / official Q4, source-limited) A parcel of mass 2 kg lies on a rough plane inclined at 30°. A force of 18 N acts on it at 40° to the plane, with µ = 0.3. Draw the three resolved components that the live lesson reached (the applied force along and into the plane, and the weight along and into the plane) and state the Newton's-second-law equation along the plane.", "answer": "Applied force: 18 cos 40° up the plane and 18 sin 40° into the plane (away from the surface). Weight: 2g sin 30° down the plane and 2g cos 30° into the surface. Along the plane: 18 cos 40° − F_R − 2g sin 30° = 2a.", "source": "MiniMax ①"}, {"id": "minimax_1_17", "question": "(Packet Q8 / official Q4, source-limited) For the parcel problem, write the friction relation, the corrected perpendicular-to-the-plane equation (not the wrong board line), and the rule for when friction is at its maximum value.", "answer": "F_R ≤ µR, with equality F_R = µR when sliding. Perpendicular: R + 18 sin 40° = 2g cos 30° (NOT R − 2g sin 30° + 18 sin 40° = 0). \"Balanced\" refers to perpendicular to the plane, not vertically.", "source": "MiniMax ①"}, {"id": "minimax_1_18", "question": "(Packet Q8 / official Q4, OFFICIAL MS REFERENCE ONLY) Using g = 9.8 m s⁻², compute R, then F_R, then the acceleration a from 18 cos 40° − F_R − 2g sin 30° = 2a.", "answer": "R = 2g cos 30° − 18 sin 40° ≈ 5.40 N; F_R = 0.3 R ≈ 1.62 N; 2a = 13.79 − 1.62 − 9.8 ≈ 2.37, so a ≈ 1.18 m s⁻² (≈ 1.2 m s⁻²). [Status: OFFICIAL MS REFERENCE ONLY — not produced live in the lesson.]", "source": "MiniMax ①"}, {"id": "minimax_1_19", "question": "(Packet Q8 / official Q4, OFFICIAL MS REFERENCE ONLY) With u = 2 m s⁻¹, s = 5 m and the acceleration from the previous card, use v² = u² + 2as to find the speed at B.", "answer": "v² = 4 + 2(1.1838)(5) ≈ 15.84, so v ≈ 3.98 m s⁻¹ (≈ 4.0 m s⁻¹). [Status: OFFICIAL MS REFERENCE ONLY — not produced live.]", "source": "MiniMax ①"}, {"id": "minimax_1_20", "question": "(Packet Q8 / official Q4, OFFICIAL MS REFERENCE ONLY) With the 18 N force removed, decide whether the parcel remains at rest. State the comparison you must make and the conclusion.", "answer": "Maximum static friction available: µ × 2g cos 30° ≈ 5.09 N. Weight component down the plane: 2g sin 30° = 9.8 N. Since 9.8 > 5.09, friction cannot balance gravity, so the parcel will not remain at rest. [Status: OFFICIAL MS REFERENCE ONLY — not produced live.]", "source": "MiniMax ①"}, {"id": "minimax_1_21", "question": "(Lesson status) Packet Q3 / official W3 (constant-acceleration vectors, 10 marks) and Packet Q4 / official Q5 (vehicle SUVAT P–Q–R, 9 marks) appear in this paper. State their lesson status from the recorded chronology and what that implies for solving them yourself.", "answer": "Both are REVIEWED ONLY / DEFERRED — they were looked at and commented on, but no subpart was re-worked live. Any numerical answer must come from the official reference appendix; do not treat tutorial explanations as covering them.", "source": "MiniMax ①"}, {"id": "minimax_1_22", "question": "(Lesson status) Packet Q6 / official Q6 (boat pulled by two ropes, 8 marks) and Packet Q7 / official Q7 (lift and two boxes, 7 marks) appear in this paper. State their lesson status and what it means if you are revising them.", "answer": "Both are NOT DISCUSSED. They were not opened or worked in the lesson; any answers you use come from the official reference appendix and were not produced live, so they carry no tutorial commentary.", "source": "MiniMax ①"}, {"id": "minimax_1_23", "question": "(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q3 / official Q3: speed at t = 2, angle to i at t = 2, and the value of T for direction 2i − 3j.", "answer": "Speed at t = 2: √45 ≈ 6.7 m s⁻¹. Angle to i at t = 2: 27° (or 333°, per the stated convention). T for direction 2i − 3j: 3.2. [Status: OFFICIAL MS REFERENCE ONLY / REVIEWED ONLY / DEFERRED.]", "source": "MiniMax ①"}, {"id": "minimax_1_24", "question": "(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q4 / official Q5 (vehicle SUVAT P–Q–R): the given result to be shown in (a), u in (b), and the distance in the first 14 s in (c).", "answer": "(a) Show x = 3u; (b) u = 9 m s⁻¹; (c) distance in first 14 s = 201 m. [Status: OFFICIAL MS REFERENCE ONLY / REVIEWED ONLY / DEFERRED.]", "source": "MiniMax ①"}, {"id": "minimax_1_25", "question": "(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q6 / official Q6 (boat pulled by two ropes): the rope angle α and the tension P.", "answer": "α ≈ 31.9°; P ≈ 609 N (mark scheme accepts 610 N or better). [Status: OFFICIAL MS REFERENCE ONLY / NOT DISCUSSED.]", "source": "MiniMax ①"}, {"id": "minimax_1_26", "question": "(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q7 / official Q7 (lift and two boxes): the combined mass of P and Q in (a), and the mass of P in (b).", "answer": "(a) combined mass of P and Q = 5m; (b) mass of P = 2m. [Status: OFFICIAL MS REFERENCE ONLY / NOT DISCUSSED.]", "source": "MiniMax ①"}, {"id": "minimax_1_27", "question": "(Lesson-status labelling rule) Why must the ESAT-style warm-up never be labelled as an M1 or WME01 question, and what is the correct status pill for any WME01 item whose answer came only from the official mark scheme after the lesson?", "answer": "The warm-up is explicitly outside the WME01 syllabus and is labelled ESAT-STYLE WARM-UP — NOT WME01 throughout. Items whose answers came only from the mark scheme are OFFICIAL MS REFERENCE ONLY and must never be presented as live tutorial work.", "source": "MiniMax ①"}, {"id": "minimax_1_28", "question": "(Dual numbering rule) State the three items whose packet number differs from their official WME01 number, give each pair of labels, and explain how the dual numbering is established.", "answer": "Packet Q1 = official Q2 (collision and impulse); Packet Q2 = official Q1 (train speed–time graph); Packet Q5 = official Q4 (moments and tilting). The renumbering is fixed by the board images and page footers of the printed practice packet versus the official paper.", "source": "MiniMax ①"}, {"id": "minimax_1_29", "question": "(Formula availability) The M1 formula booklet states no formulae are given for M1 beyond those candidates are expected to know. List the M1-required (not additionally printed) items used in this lesson.", "answer": "Momentum = mv; impulse = mv − mu; the five SUVAT formulae; Newton's laws; friction law F = µR (with F ≤ µR at the limit); and the principle of moments.", "source": "MiniMax ①"}, {"id": "minimax_1_30", "question": "(Formula availability) Which formula used in this lesson is a P1/P2 prerequisite rather than an M1-required result, and which are pure tutor strategies rather than formulae at all?", "answer": "Area of a trapezium, A = ½(a + b)h, is a P1/P2 prerequisite. Strategies, not formulae: equating clockwise and anticlockwise moments; dividing equations to cancel a common unknown; boxing/labeling key equations; and taking magnitudes only when the question asks.", "source": "MiniMax ①"}, {"id": "minimax_1_31", "question": "(Numerical style) State the lesson's rules on (i) the use of \"=\" versus \"≈\", (ii) when to take a magnitude, (iii) keeping unrounded intermediates, and (iv) final-unit policy.", "answer": "Use \"=\" for exact or calculated expressions and \"≈\" for rounded values; keep signed quantities until a magnitude is requested; keep an unrounded value (e.g. a ≈ 1.1838) for onward substitution before writing the final ≈ 1.18 m s⁻²; final mechanics answers must carry SI units.", "source": "MiniMax ①"}, {"id": "minimax_1_32", "question": "(Source authority) Two numbering systems are in use for this paper. When revising, which set of marks should you trust, and what is the status of any worked solution whose source cannot be located in the recorded chronology?", "answer": "Trust the official WME01 marks, wording, and final answers; the packet marks follow the printed practice packet. Any worked solution with no trace in the lesson chronology must be treated as OFFICIAL MS REFERENCE ONLY and never as live tutorial work.", "source": "MiniMax ①"}, {"id": "minimax_1_33", "question": "(Sanity check on direct collisions) Before solving a two-particle direct-collision problem, list the three \"set-up habits\" the lesson identified as essential, and the one labelling habit that earns full marks.", "answer": "(1) Highlight the key words; (2) draw before/after diagrams; (3) fix a sign convention (take one particle's initial direction as positive); (4) label the requested particle (e.g. \"speed of A\", \"speed of B\") with units so two unlabelled numbers do not lose marks.", "source": "MiniMax ①"}, {"id": "minimax_1_34", "question": "(Sanity check on the trapezium area) For a speed–time graph that is a trapezium with parallel sides a and b and height h, justify why A = ½(a + b)h gives the distance travelled, and why converting 4.8 km to 4800 m before substitution is essential rather than optional.", "answer": "The area under a speed–time graph equals distance, because speed × time integrated gives displacement. The trapezium area is ½(sum of parallel sides)(perpendicular height); here the height is the peak speed 20 m s⁻¹ and the parallel sides are the times. Mixing 4800 m with a metres-per-second area requires consistent SI units, which forces the conversion.", "source": "MiniMax ①"}, {"id": "minimax_1_35", "question": "(Tilting rule) State, without reference to the numerical problem, the two algebraic consequences of \"about to tilt\" that turn a moments problem into a one-equation solve.", "answer": "Tilting about C implies R_D = 0, and tilting about D implies R_C = 0. A force whose line of action passes through the chosen pivot then contributes zero moment about that pivot and need not be written into the equation.", "source": "MiniMax ①"}, {"id": "minimax_1_36", "question": "(Common trap on rough inclines) A learner says the perpendicular forces are \"balanced vertically\" on a 30° plane and writes the perpendicular equation as R − 2g sin 30° + 18 sin 40° = 0. Identify each error and write the corrected equation.", "answer": "\"Vertically\" is the wrong resolving direction — it should be perpendicular to the plane. The component of weight perpendicular to the plane is 2g cos 30° (not 2g sin 30°). Corrected: R + 18 sin 40° = 2g cos 30°.", "source": "MiniMax ①"}, {"id": "minimax_1_37", "question": "(Closing study actions) List the three closing study actions actually agreed at the end of this lesson, and identify the homework claim that an earlier guide version made that the recorded transcript does not support.", "answer": "(1) Complete the Pure 2 baseline paper, then Pure 3, ahead of extra M1 work. (2) A separately completed and marked M1 homework paper can be looked over if time allows. (3) That M1 paper will be revisited together in mid-July, after more homework time. The unsupported claim is that the tutor set \"keep practising moments and inclined-plane resolving\" or any drill homework — the recording shows no such assignment.", "source": "MiniMax ①"}, {"id": "minimax_1_38", "question": "(Sign convention trap, collisions) In a direct collision, taking A's initial direction as positive, both particles \"approach each other at 1.5 m s⁻¹\". Why is the initial momentum of B written as m(−1.5) rather than m(+1.5)?", "answer": "Because B moves opposite to the chosen positive direction (it approaches A). Initial momentum must be signed with respect to the same axis used for the post-collision speeds.", "source": "MiniMax ①"}, {"id": "minimax_1_39", "question": "(Interpretation trap, friction) The tutor remarked live that \"friction only exists because of the applied pull and therefore can never exceed the applied component\". For these specific numbers the conclusion (acceleration up the slope) happens to be true. State the only general rule that decides the direction of acceleration.", "answer": "Decide from the net resolved force along the plane: the acceleration is in the direction of (resolved applied force along plane) − (friction, opposing motion or impending motion) − (weight component down the plane). No shortcut that ignores gravity along the slope is valid in general.", "source": "MiniMax ①"}]}, "minimax_2": {"label": "MiniMax ②", "cards": [{"id": "minimax_2_0", "question": "In the ESAT-style warm-up that opened the lesson (status: ESAT-STYLE WARM-UP — NOT WME01), the prompt asks for integers *n* such that the difference between √(*n*) and 7 is less than 1. Which single equation correctly encodes \"the difference is less than 1\" as a compound inequality, and why is it equivalent to 9 < *n* < 16?", "answer": "|√*n* − 7| < 1, which unfolds to −1 < √*n* − 7 < 1. Adding 7 gives 6 < √*n* < 8; dividing by 2 (safe — every term is positive) gives 3 < √(*n*/2) < 4… wait, the guide's chain is 6 < √*n* < 8, divide by 2 ⇒ 3 < √(*n*)/2 < 4, then square ⇒ 9 < *n* < 16. The endpoints 9 and 16 are excluded (strict inequalities), so *n* ∈ {10, 11, 12, 13, 14, 15}, a count of 6.", "source": "MiniMax ②"}, {"id": "minimax_2_1", "question": "State the rule the tutor emphasised for turning the inequality-counting answer into a count of integers. Why does the count come out as 6 and not 5?", "answer": "For integers strictly between *a* and *b*, the count is *b* − *a* − 1 (or (*b* − 1) − (*a* + 1) + 1). Here 16 − 9 − 1 = 6. Using *b* − *a* alone forgets that both endpoints are excluded, which is why an off-by-one answer of 5 is the classic trap.", "source": "MiniMax ②"}, {"id": "minimax_2_2", "question": "Why does the guide forbid ever labelling the ESAT-style inequality exercise a \"WME01 question\" or an \"M1 question\", and what status pill must it carry?", "answer": "The exercise is a numeracy/inequality warm-up used to surface issues with modulus and dividing by a positive quantity before M1 starts. It is not on the WME01/01 January 2023 paper and attracts no marks from it. The mandatory status pill is \"ESAT-STYLE WARM-UP — NOT WME01\".", "source": "MiniMax ②"}, {"id": "minimax_2_3", "question": "For packet Q1 / official WME01 Q2 (direct collision and impulse, 8 marks), particle A of mass 3*m* and particle B of mass *m* each approach the other along the line at 1.5 m s⁻¹. After impact, A is observed to move away from B with speed *x* and B with speed *x* + 1. Write the conservation-of-momentum equation in full and solve it for *x*, labelling which side is \"before\" and which is \"after\".", "answer": "Taking A's initial direction as positive: (3*m*)(1.5) + (*m*)(−1.5) = (3*m*)*x* + *m*(*x* + 1). The left side is the total momentum before (A = +4.5*m*, B = −1.5*m*); the right side is the total momentum after. Simplifying: 3*m* = 4*m x* + *m*, so 4*x* = 2 and *x* = ½ = 0.5 m s⁻¹.", "source": "MiniMax ②"}, {"id": "minimax_2_4", "question": "Using the *x* from the previous card, state the post-impact speeds of A and B and label which one is which. Why does the question warn you not to hand in two unlabelled numbers?", "answer": "*v*_A = 0.5 m s⁻¹ (1/2 m s⁻¹) and *v*_B = *x* + 1 = 1.5 m s⁻¹ (3/2 m s⁻¹). Two unlabelled numbers can sit in either order on the page and still be partially wrong against the mark scheme's \"speed of A / speed of B\" split, so each value must be clearly tied to a particle.", "source": "MiniMax ②"}, {"id": "minimax_2_5", "question": "On the same direct-collision question, part (b) asks for the magnitude of the impulse on B. Define impulse, write it as Δ(m*v*) for B, evaluate it, and state the units. Why is the final answer written without modulus bars?", "answer": "Impulse on B = change in B's momentum = *m v*_B(final) − *m v*_B(initial). With initial v = −1.5 m s⁻¹ and final v = 1.5 m s⁻¹: *I*_B = *m*(1.5) − *m*(−1.5) = 3*m* N s. \"Magnitude\" already forces a positive number, so writing |3*m*| with bars is redundant — give 3*m*.", "source": "MiniMax ②"}, {"id": "minimax_2_6", "question": "For packet Q2 / official WME01 Q1 (train speed–time graph, 10 marks), the train accelerates from rest to 20 m s⁻¹, runs at 20 m s⁻¹ for 180 s, then decelerates to rest. The magnitude of the acceleration is twice the magnitude of the deceleration. If the acceleration phase lasts *T* seconds, write the three time markers along the base of the speed–time graph.", "answer": "Acceleration ends at *t* = *T*. The constant-speed phase runs from *T* to *T* + 180. The deceleration phase lasts twice as long (because *a* = 2*d*), so it takes 2*T* and ends at *T* + 180 + 2*T* = 3*T* + 180. Hence the markers are *T*, *T* + 180 and 3*T* + 180.", "source": "MiniMax ②"}, {"id": "minimax_2_7", "question": "The total distance travelled by the train above is 4.8 km. Set up the area-of-a-trapezium equation, use the trapezium formula *A* = ½(*a* + *b*)*h*, and solve for *T*. State clearly what *a*, *b*, *h* are on the graph and why the km must be converted before equating.", "answer": "The region under the graph is a trapezium with parallel-side times *a* = 180 and *b* = 3*T* + 180 and height *h* = 20 m s⁻¹. *A* = ½(180 + 3*T* + 180)(20) = (3*T* + 360)(10) = 4800. So 3*T* = 120 and *T* = 40 s. The conversion to 4800 m is essential because the *h* = 20 is in m s⁻¹ and the *a*, *b* are in seconds — the area must be in metres.", "source": "MiniMax ②"}, {"id": "minimax_2_8", "question": "From *T* = 40 s, find the initial acceleration of the train (part (c), 2 marks). Which physical quantity on the speed–time graph gives this directly, and why does it have a positive sign?", "answer": "The initial acceleration equals the gradient of the first (rising) segment: (final speed − initial speed)/(elapsed time) = (20 − 0)/40 = 0.5 m s⁻². The sign is positive because the chosen positive direction is the direction of motion and the gradient of an upward line is positive.", "source": "MiniMax ②"}, {"id": "minimax_2_9", "question": "The tutor coaching on the train question warns against splitting the trapezium into triangles and a rectangle. Why is the single-formula trapezium area *A* = ½(*a* + *b*)*h* more reliable for this paper, and which prior-Pure result does it call on?", "answer": "Splitting introduces extra sub-shapes whose bases and heights must each be measured and added — easy to drop a piece or double-count the constant-speed rectangle. The trapezium formula collapses all of that into three numbers taken from the base labels, and it is listed as a Pure prerequisite result permitted in M1 (per the formula-booklet note that M1 candidates may also use P1/P2 formulae).", "source": "MiniMax ②"}, {"id": "minimax_2_10", "question": "On the same train question, why is the constant-speed phase shown to last from *T* to *T* + 180 and not from 0 to 180? Give a numeric check using *T* = 40.", "answer": "Because 180 s is the duration of the constant-speed phase, not its end-time measured from the origin. Starting the clock again at *T* gives the end at *T* + 180 = 220 s. The full run ends at 3*T* + 180 = 300 s, so the constant-speed phase lasts 220 − 40 = 180 s, as required.", "source": "MiniMax ②"}, {"id": "minimax_2_11", "question": "For packet Q5 / official WME01 Q4 (moments and tilting, 8 marks), a non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m from one end and 0.36 m from the other. State the two \"on the point of tilting\" rules that turn this problem into equations, and name which support goes to zero in each case.", "answer": "\"On the point of tilting about C\" ⇒ reaction at D vanishes, *R*_D = 0. \"On the point of tilting about D\" ⇒ reaction at C vanishes, *R*_C = 0. A force acting through the pivot (or a zero reaction) has zero moment about that pivot, so it can be omitted from the moment equation.", "source": "MiniMax ②"}, {"id": "minimax_2_12", "question": "In the two tilting scenarios the branch is loaded with 150 N (scenario 1) and 225 N (scenario 2). Using *W* at distance *x* from C, write the moment equation in scenario 1 by taking moments about C (so *R*_D = 0). Use L = 1.5 m, C-offset = 0.24 m.", "answer": "Clockwise moments = anticlockwise moments about C. The 150 N load acts at the end of the branch, 1.5 − 0.24 = 1.26 m from C. *W* acts *x* from C on the opposite side: *W x* = 150 × 1.26 = 189. This is equation (A) in the guide.", "source": "MiniMax ②"}, {"id": "minimax_2_13", "question": "In scenario 2 (225 N about D, so *R*_C = 0), write the moment equation about D in the form *W*(0.9 − *x*) = 81, justifying each distance.", "answer": "The 225 N load is at the far end, 0.36 m from D. Moment of 225 about D is 225 × 0.36 = 81 (clockwise). *W* acts *x* from C; the distance from C to D is 1.5 − 0.24 − 0.36 = 0.9 m, so *W* is (0.9 − *x*) from D on the other side. Equating gives 81 = (0.9 − *x*)*W*.", "source": "MiniMax ②"}, {"id": "minimax_2_14", "question": "Divide equation (A) by equation (B) from the previous two cards, cancel *W*, and solve for *x*. Why is division cleaner than substitution here?", "answer": "(A): *W x* = 189. (B): (0.9 − *x*)*W* = 81. Dividing gives *x*/(0.9 − *x*) = 189/81 = 7/3, so 3*x* = 7(0.9 − *x*) ⇒ 10*x* = 6.3 ⇒ *x* = 0.63 m. Division cancels the common unknown *W*, avoiding the back-substitute-into-a-fraction step that previously miscalculated *W*.", "source": "MiniMax ②"}, {"id": "minimax_2_15", "question": "Back-substitute *x* = 0.63 m into equation (A) to find *W*. Give *W* with units, and state the common live-arithmetic trap to avoid.", "answer": "*W* = 189 / 0.63 = 300 N. The live-arithmetic trap is to compute 189 / 0.6 = 315 N (or 189 / 6.3 = 30 N) by mis-keying the decimal; *x* = 0.63 has two significant figures but the result is exactly 300 N, and the student's first attempt produced a near-miss that was corrected live.", "source": "MiniMax ②"}, {"id": "minimax_2_16", "question": "The moments problem coaching recommends \"clockwise on one side, anticlockwise on the other\" instead of a single signed sum. Translate that advice into a sign-convention check you can apply to any M1 moment equation.", "answer": "Pick a viewing direction (usually from the page as drawn). Sum all clockwise moments of forces about the pivot, sum all anticlockwise moments, then set them equal. Because every force's moment is signed by the geometry rather than by an artificial +/− rule, you cannot accidentally double-sign a term, and a missing force shows up as an unbalanced equation rather than as a wrong sign.", "source": "MiniMax ②"}, {"id": "minimax_2_17", "question": "For packet Q8 / official WME01 Q8 (parcel on a rough inclined plane, 15 marks — status: LIVE SET-UP ONLY for part (a), OFFICIAL MS REFERENCE ONLY for the numerical completion and parts (b), (c)), the plane is inclined at 30° and a force of 18 N acts on a 2 kg parcel at 40° to the plane, with µ = 0.3. Resolve the 18 N force into components along and perpendicular to the plane, and resolve the weight 2*g* likewise.", "answer": "Along the plane: 18 cos 40° (up the plane, sense decided by the geometry of the 40° angle) and 2*g* sin 30° (down the plane, because the weight component along the slope is *mg* sin θ). Perpendicular to the plane: 18 sin 40° (away from the plane) and 2*g* cos 30° (into the plane, giving the normal reaction's contribution).", "source": "MiniMax ②"}, {"id": "minimax_2_18", "question": "On the same inclined-plane question, write Newton's second law along the plane (taking up-the-slope as positive) and the friction law in the form needed for part (a). Use *a* for acceleration and *R* for the normal reaction. Status: equation writing is live; the numerical evaluation below is OFFICIAL MS REFERENCE ONLY.", "answer": "Parallel: 18 cos 40° − *F*_R − 2*g* sin 30° = 2*a*. Friction: *F*_R = *F*_max = µ*R* = 0.3 *R*. The \"max\" form is correct here because the parcel is on the point of sliding up (the applied component exceeds the gravity component), so kinetic friction at its maximum is the operative value for the acceleration.", "source": "MiniMax ②"}, {"id": "minimax_2_19", "question": "The tutor corrected the live board's perpendicular-equation line (\"R − 2*g* sin 30° + 18 sin 40° = 0\") on the way to the OFFICIAL MS REFERENCE ONLY completion. What is the corrected perpendicular-equation form, and why is the original line physically wrong?", "answer": "Correct form: *R* + 18 sin 40° = 2*g* cos 30°. The original used *g* sin 30° (a component along the slope) where it should have used *g* cos 30° (the component into the slope), and it missed the 18 sin 40° push on the same perpendicular side as the reaction. The corrected form balances forces perpendicular to the plane, not vertically.", "source": "MiniMax ②"}, {"id": "minimax_2_20", "question": "The guide explicitly flags a tutor remark during the inclined-plane set-up — \"friction only exists because of the applied pull, so it can never exceed the applied component\" — as a rule that must not be carried into other questions. Why is the remark invalid as a general principle, and how is the correct direction of motion decided for this specific parcel?", "answer": "As a general principle it fails the moment a body slides under gravity alone (no applied pull), in which case friction arises from weight and can certainly exceed any applied component (which is zero). Even here, the direction of *a* must be decided from the resolved equation along the plane — 18 cos 40° − *F*_R − 2*g* sin 30° has whatever sign emerges after substitution, not from a prior reasoning about magnitudes.", "source": "MiniMax ②"}, {"id": "minimax_2_21", "question": "For packet Q8(a) the OFFICIAL MS REFERENCE ONLY value of *a* is 1.18 m s⁻² (or 1.2 m s⁻²), produced by combining the corrected perpendicular equation *R* + 18 sin 40° = 2*g* cos 30° with the friction law *F*_R = 0.3*R* and the parallel equation. Carry out that elimination symbolically for *a* in terms of the given data — do not evaluate numerically.", "answer": "From the perpendicular equation: *R* = 2*g* cos 30° − 18 sin 40°. Then *F*_R = 0.3(2*g* cos 30° − 18 sin 40°). Substituting into 18 cos 40° − *F*_R − 2*g* sin 30° = 2*a*: 2*a* = 18 cos 40° − 0.3(2*g* cos 30° − 18 sin 40°) − 2*g* sin 30°. So *a* = ½[18 cos 40° − 0.6*g* cos 30° + 5.4 sin 40° − *g*].", "source": "MiniMax ②"}, {"id": "minimax_2_22", "question": "Explain how the formula-booklet note \"there are no formulae given for M1 in addition to those candidates are expected to know\" affects what you must commit to memory and what you may quote from P1/P2. Give one example of each.", "answer": "You must memorise the M1 core — momentum *p* = *mv*, impulse = *mv* − *mu*, the five SUVAT formulas, Newton's laws, the friction law *F* ≤ µ*R* (used as = µ*R* at the limit) and the principle of moments. These are not reprinted. You may quote P1/P2 prerequisites when they are needed in M1, e.g. the trapezium area *A* = ½(*a* + *b*)*h* used on the train graph.", "source": "MiniMax ②"}, {"id": "minimax_2_23", "question": "Distinguish the three availability groups the guide identifies: \"M1 required\", \"P1/P2 prerequisite formula\" and \"tutor strategy (technique, not a formula)\". Give one example from this lesson's work for each, and explain why a strategy is not a formula.", "answer": "M1 required: conservation of linear momentum (*m*_1*u*_1 + *m*_2*u*_2 = *m*_1*v*_1 + *m*_2*v*_2) used in the collision. P1/P2 prerequisite: trapezium area used on the train graph. Tutor strategy: \"clockwise = anticlockwise\" for moment equations. A strategy is not a formula because it is a procedural choice about how to set up equations (it changes the form of your working but adds no new physical content) and is taught rather than given in the formula booklet.", "source": "MiniMax ②"}, {"id": "minimax_2_24", "question": "The guide tells you to \"keep an unrounded value (e.g. *a* = 1.1838...) for onward substitution and only then write *a* ≈ 1.18 m s⁻².\" Restate this as a rounding rule and explain why rounding too early would have changed the official answer for packet Q8(b).", "answer": "Rule: carry full calculator precision through every chained substitution; round only at the final reported answer, using \"=\" for exact and \"≈\" for rounded. Rounding *a* to 1.18 before using it in *v*² = *u*² + 2*a s* with *u* = 2, *s* = 5 would under-state *v* (use 1.18 → *v* ≈ 3.980; use 1.2 → *v* ≈ 4.00); the official scheme accepts either, but early rounding propagates errors that can push a borderline answer outside tolerance.", "source": "MiniMax ②"}, {"id": "minimax_2_25", "question": "Translate \"give SI units on final mechanics answers\" into the unit checks you must perform on packet Q1, packet Q2 and packet Q8(a). Use *g* = 9.8 m s⁻².", "answer": "Packet Q1: impulse = change in momentum has units kg·m s⁻¹ = N s, so the magnitude 3*m* must be written as 3*m* N s. Packet Q2: distance comes out in m only if *T* is in s and 20 is in m s⁻¹, so 4.8 km must first be written 4800 m. Packet Q8(a): acceleration from (parallel-force terms)/(mass) gives m s⁻² because the right-hand-side numerator is in newtons and the denominator is 2 kg.", "source": "MiniMax ②"}, {"id": "minimax_2_26", "question": "The dual-numbering ledger shows packet Q1 ↔ official Q2 and packet Q4 ↔ official Q5, while Q3, Q6, Q7 and Q8 carry the same number in both systems. Why does using only the official numbering \"contradict the packet you actually worked from\"?", "answer": "During the lesson the printed practice packet was a re-ordered version of the official paper, so the collision (page 4 of the official paper) was bound as packet Q1 and the train as packet Q2. Quoting \"official WME01 Q2\" when you mean \"the collision question\" is fine, but if you only cite the official number a learner holding the packet in front of them will look at the wrong page. The dual label preserves both viewpoints.", "source": "MiniMax ②"}, {"id": "minimax_2_27", "question": "For packet Q3 / official WME01 Q3 (constant-acceleration vectors, status: REVIEWED ONLY / DEFERRED) the official-reference appendix states the speed at *t* = 2 is √45 = 3√5 ≈ 6.7 m s⁻¹. Identify which M1 core result this is grounded in and explain why the skill, not the number, is the review priority.", "answer": "The skill is the constant-acceleration (SUVAT) family — substituting *u*, *v*, *a*, *t* and *s* into the right one of the five formulas — combined with vector arithmetic from the prior Pure papers. The reference number √45 = 3√5 tells you the mark scheme's expected form (exact surd) and tolerance; what you must be able to do is derive it from the given data and present it in the requested exact/decimal form.", "source": "MiniMax ②"}, {"id": "minimax_2_28", "question": "Same status (REVIEWED ONLY / DEFERRED): for the angle to the **i** direction at *t* = 2, the appendix gives 27° (or 333°, per the stated convention). What concept is being tested, and why must the convention be stated explicitly?", "answer": "The concept is taking the angle of a 2-D velocity vector from **i** using tan θ = (j-component)/(i-component). The convention matters because every quadrant I–IV has its own range and bearings can be reported clockwise or anti-clockwise; without it, \"27°\" and \"333°\" describe two different vectors and the mark scheme must know which one you intended.", "source": "MiniMax ②"}, {"id": "minimax_2_29", "question": "For packet Q3 / official Q3, the appendix gives *T* = 3.2 for the direction 2**i** − 3**j**. Identify the equation you would set up to obtain *T*, and what condition on *T* the value 3.2 satisfies.", "answer": "Set the velocity vector at time *T* to be parallel to 2**i** − 3**j**: (components of **v**(*T*))/(2) = (other components)/(−3), i.e. their cross-product is zero. Then *T* = 3.2 s is the value that makes the velocity a positive scalar multiple of 2**i** − 3**j** (so the parcel is actually moving in the requested direction, not opposite to it).", "source": "MiniMax ②"}, {"id": "minimax_2_30", "question": "Packet Q4 / official Q5 (vehicle SUVAT, P–Q–R, status: REVIEWED ONLY / DEFERRED): the appendix says (a) the result is \"given\" and the answer is *x* = 3*u*, (b) *u* = 9 m s⁻¹, (c) distance in 14 s is 201 m. Which two of the five SUVAT equations are the workhorses here, and which quantity acts as the \"given result\" in (a)?", "answer": "The workhorses are *v* = *u* + *a t* and *s* = *u t* + ½*a t*² (or *v*² = *u*² + 2*a s*, depending on which unknowns are exposed by the data points P, Q, R). The \"given result\" in (a) is the symbolic relation *x* = 3*u* — a derived relationship you are asked to show, not a numerical answer.", "source": "MiniMax ②"}, {"id": "minimax_2_31", "question": "Packet Q6 / official WME01 Q6 (boat pulled by two ropes) and packet Q7 / official WME01 Q7 (lift and two boxes) both carry the status NOT DISCUSSED. What does the guide say you are allowed to take from the reference appendix for these two items, and what are you not allowed to do?", "answer": "You may take the answers listed (Q6: rope angle α ≈ 31.9°, tension *P* ≈ 609 N; Q7: combined mass 5*m*, mass of *P* is 2*m*) as official-mark-scheme values. You may not claim that these answers were produced in the lesson, that you have internalised the technique, or that any of the steps were tutor-coached — the lesson status is unchanged, and your study actions for these questions must be set yourself.", "source": "MiniMax ②"}, {"id": "minimax_2_32", "question": "For packet Q8(c) (does the parcel remain at rest when the 18 N force is removed?), the OFFICIAL MS REFERENCE ONLY answer is \"no, P does not remain at rest\". Reconstruct the comparison that produces this answer, in symbolic form, using *m* = 2, θ = 30°, µ = 0.3, *g*.", "answer": "With no applied force the normal reaction is *R* = *mg* cos θ, so the maximum available friction is µ*mg* cos θ = 0.3 × 2*g* × cos 30°. The gravity component down the slope is *mg* sin θ = 2*g* × sin 30° = *g*. Compare: µ*mg* cos 30° < *mg* sin 30° because 0.3 × cos 30° ≈ 0.260 < 0.5 = sin 30°. Friction cannot balance gravity, so P accelerates down the slope.", "source": "MiniMax ②"}, {"id": "minimax_2_33", "question": "Explain why \"on the point of tilting about C ⇒ *R*_D = 0\" is the correct interpretation rather than \"*R*_D just becomes very small\". Use a quick sketch in words.", "answer": "\"Point of tilting\" is the threshold at which one support still carries load but is on the verge of losing contact; the contact force goes to zero, not to a small finite value. A non-zero *R*_D would mean the support is still bearing weight and the rod is not actually on the point of tilting. Replacing \"goes to zero\" with \"becomes small\" gives a different physical picture (still in contact) and the moment equation *R*_D × (its arm) must then be retained.", "source": "MiniMax ②"}, {"id": "minimax_2_34", "question": "Translate the closing-study-actions rule from §12 into a single sentence you could put on a wall: \"the genuine closing actions agreed at the end of the 19 June 2026 M1 practice tutorial are…\"", "answer": "The agreed closing actions are (i) complete the Pure 2 baseline paper, then the Pure 3 baseline paper, this week to build a full course diagnostic; (ii) optionally look over the already-completed and marked M1 homework paper; (iii) revisit that earlier M1 paper together in mid-July, allowing more homework time first. No M1 drill set was assigned.", "source": "MiniMax ②"}, {"id": "minimax_2_35", "question": "The guide warns against describing \"author-created drills\" or a \"recurring weakness story\" as tutor-assigned homework. Why is that warning there, and how does it affect how you should read the closing-actions list?", "answer": "Because earlier guide versions conflated genuine lesson actions with retrospective study suggestions. The lessons did not assign extra M1 drills or label any topic a \"recurring weakness\", so any such claim in earlier notes is unsupported and should be ignored. The only valid homework list is the three items above, and everything outside them is your own optional work.", "source": "MiniMax ②"}, {"id": "minimax_2_36", "question": "On the moments-and-tilting question, give a one-line diagnostic test for a missing weight *W* in scenario 2: \"if I forget *W*, then the equation I would write is …, and the resulting *x* would satisfy ….\"", "answer": "Without *W* the moment equation about D would read 225 × 0.36 = 0, which is false; the only way to balance moments is to include *W* acting (0.9 − *x*) from D. Forgetting *W* gives a contradiction, so any consistent moment equation in this scenario must contain *W* — a useful self-check before solving.", "source": "MiniMax ②"}, {"id": "minimax_2_37", "question": "Restate the lesson's \"magnitude means a positive quantity\" rule for impulse and explain how it interacts with the symbol convention in packet Q1 / official Q2 (part b). Why is \"3*m* N s\" the canonical form of the answer?", "answer": "When a question asks for magnitude, the answer is non-negative by definition, so |3*m*| = 3*m* and the modulus bars add nothing. The canonical form is therefore 3*m* N s (with the unit N s, the SI unit of impulse), and writing \"3*m*\" alone loses the unit.", "source": "MiniMax ②"}, {"id": "minimax_2_38", "question": "For the train graph, derive the deceleration in m s⁻² and confirm it is half the magnitude of the initial acceleration. State what assumption about the sign convention you are making.", "answer": "Initial acceleration = 20/40 = 0.5 m s⁻². Deceleration phase lasts 2*T* = 80 s, so deceleration magnitude = 20/80 = 0.25 m s⁻², exactly half. The assumption is that both \"acceleration\" and \"deceleration\" are reported as magnitudes (positive numbers), with the negative sign carried implicitly by the direction \"down the slope of the speed–time line\".", "source": "MiniMax ②"}, {"id": "minimax_2_39", "question": "Re-express the rule \"say balanced perpendicular to the plane, not vertically\" as a test: which two equations on the inclined-plane question are perpendicular-line equations, and which one is the only line equation that is not balanced?", "answer": "Perpendicular-to-plane: *R* + 18 sin 40° = 2*g* cos 30° and the friction-relation statement \"friction max = µ*R*\" both involve forces perpendicular to the slope only. The line equation 18 cos 40° − *F*_R − 2*g* sin 30° = 2*a* is the only non-balanced one — it carries the mass-times-acceleration term because the parallel forces sum to the net force, not to zero.", "source": "MiniMax ②"}, {"id": "minimax_2_40", "question": "The collision card requires you to underline \"integer, difference, less than\". Translate that into a generic M1 reading-strategy rule: which three kinds of word should you underline on every M1 question, and why?", "answer": "Underline (i) the physical objects/quantities (mass, speed, distance, weight) so you can translate them into symbols; (ii) the operations (difference, magnitude, impulse, acceleration) so you select the right M1 formula; (iii) the conditions and constraints (less than, on the point of tilting, in equilibrium) so you set *R* = 0, |*x*| < 1 or whatever the threshold is. Underlining forces you to map wording onto algebra before drawing a diagram, which is the first action of the M1 method.", "source": "MiniMax ②"}, {"id": "minimax_2_41", "question": "Why does the guide recommend \"box and label\" key equations such as (A) and (B)? Give a concrete example of a slip the boxing would have caught in the moments question.", "answer": "Boxing forces you to refer to each equation by a stable name later, so a slip like dividing (B) by (A) instead of (A) by (B), or back-substituting the wrong *x* value into the wrong box, becomes visible at the substitution step. In the moments question, the live slip on *W* happened because the first *W* came from a partial-back-substitute into equation (B); boxing (A) and (B) keeps the substitution route explicit so the misroute is obvious.", "source": "MiniMax ②"}, {"id": "minimax_2_42", "question": "State the rule from §11 about equality symbols and units, and apply it to the four OFFICIAL MS REFERENCE ONLY numerical outputs of packet Q8.", "answer": "Use \"=\" for exact expressions (e.g. *a* = (1/2)[18 cos 40° − 0.6*g* cos 30° + 5.4 sin 40° − *g*]) and \"≈\" once a decimal approximation is given. Q8: *R* ≈ 5.4039 N, *F*_R ≈ 1.6212 N, *a* ≈ 1.18 m s⁻² (or 1.2 m s⁻²), *v* ≈ 3.98 m s⁻¹ (or 4.0 m s⁻¹) — each with its SI unit on the right-hand side.", "source": "MiniMax ②"}, {"id": "minimax_2_43", "question": "Translate the inequality warm-up's advice \"use the single modulus statement and the number line; strict endpoints exclude 9 and 16; inclusive counting of integers between needs the +1\" into a checklist you could apply to any \"|expression| < *c*\" question.", "answer": "(1) Write the single modulus statement |*E*| < *c*. (2) Unfold to −*c* < *E* < *c*. (3) Picture it on a number line so the strict/inclusive nature of *c* is visible. (4) Solve the two strict inequalities separately, marking endpoints excluded. (5) Use count = (upper − lower − 1) because both endpoints are out. (6) Sanity-check by listing the integers.", "source": "MiniMax ②"}, {"id": "minimax_2_44", "question": "Using *T* = 40 s, compute the *full* base-length of the train speed–time graph and check it against the total distance: area = ½(180 + 300) × 20 = 4800 m²·s⁻¹ = 4800 m. What does this confirm?", "answer": "Parallel sides 180 (constant-speed segment) and 300 (full base from start to stop: *T* + 180 + 2*T* = 3*T* + 180 = 300). Height 20. Area = ½ × (180 + 300) × 20 = ½ × 480 × 20 = 4800 m·s⁻¹ × s = 4800 m, matching 4.8 km. It confirms both *T* = 40 and the trapezium-formula setup.", "source": "MiniMax ②"}, {"id": "minimax_2_45", "question": "State the official-mark-scheme values for packet Q6 / official Q6 (boat, two ropes, NOT DISCUSSED) and packet Q7 / official Q7 (lift, two boxes, NOT DISCUSSED) in the form \"label: value (units where applicable)\".", "answer": "Q6: rope angle α ≈ 31.9°, tension *P* ≈ 609 N (610 N or better accepted). Q7: combined mass of *P* and *Q* = 5*m*; mass of *P* = 2*m*. These are official-mark-scheme values; none was produced live.", "source": "MiniMax ②"}]}, "gpt56sol_1": {"label": "GPT-5.6 Sol ①", "cards": [{"id": "gpt56sol_1_0", "question": "ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, the difference between $$2\\sqrt n$$ and $$7$$ is less than $$1$$. Translate this condition into a single modulus inequality and then into a compound inequality.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. Write $$|2\\sqrt n-7|<1$$, hence $$-1<2\\sqrt n-7<1$$. The modulus is required because “difference” means the non-negative size of the gap.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_1", "question": "ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, solve $$|2\\sqrt n-7|<1$$, stating how strict endpoints affect the solution set.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. $$-1<2\\sqrt n-7<1$$ gives $$6<2\\sqrt n<8$$, then $$3<\\sqrt n<4$$. Since all terms are non-negative, squaring preserves the inequalities: $$9<n<16$$. The strict inequalities exclude $$9$$ and $$16$$, so $$n\\in\\{10,11,12,13,14,15\\}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_2", "question": "ESAT-STYLE WARM-UP — NOT WME01. If the integer solutions of an inequality are all integers from $$10$$ to $$15$$ inclusive, how many solutions are there, and what counting trap should be avoided?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. The count is $$15-10+1=6$$. The $$+1$$ is essential when both listed endpoints are included.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_3", "question": "Tutor packet Q1 / official WME01 Q2 (8 marks: part (a) 5, part (b) 3). Two particles collide directly along a line. Particle A has mass $$3m$$ and particle B has mass $$m$$. Before impact, each has speed $$1.5\\ \\mathrm{m\\,s^{-1}}$$ and they move towards one another. If A’s initial direction is positive, what are their signed initial velocities?", "answer": "A has velocity $$u_A=+1.5\\ \\mathrm{m\\,s^{-1}}$$ and B has velocity $$u_B=-1.5\\ \\mathrm{m\\,s^{-1}}$$. Opposing motions must have opposite signs even though both speeds are positive.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_4", "question": "Tutor packet Q1 / official WME01 Q2. Particle A has mass $$3m$$ and initial velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$; particle B has mass $$m$$ and initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$. After their direct collision, their velocities are modelled as $$x$$ and $$x+1$$ respectively. Use conservation of linear momentum to form the governing equation.", "answer": "Conservation of linear momentum gives $$(3m)(1.5)+m(-1.5)=3mx+m(x+1).$$ Cancelling $$m$$ produces $$4.5-1.5=3x+x+1$$, or $$3=4x+1$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_5", "question": "Tutor packet Q1 / official WME01 Q2. In a direct collision, conservation of momentum gives $$3=4x+1$$. Particle A’s post-impact velocity is $$x$$ and particle B’s is $$x+1$$. Find and label both post-impact speeds.", "answer": "$$x=\\frac12$$, so A’s speed is $$\\frac12\\ \\mathrm{m\\,s^{-1}}$$ and B’s speed is $$\\frac32\\ \\mathrm{m\\,s^{-1}}$$. The values should be labelled because two unlabelled numbers do not identify the particles.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_6", "question": "Tutor packet Q1 / official WME01 Q2. Particle B has mass $$m$$, initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$ and final velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$. Using impulse as change in momentum, find the signed impulse on B and its magnitude.", "answer": "$$I_B=mv-mu=m(1.5)-m(-1.5)=3m\\ \\mathrm{N\\,s}.$$ The signed impulse is positive in the chosen direction, and its magnitude is $$3m\\ \\mathrm{N\\,s}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_7", "question": "Tutor packet Q1 / official WME01 Q2. In a one-dimensional collision calculation, when should a final impulse answer be made positive, and what should remain signed during the working?", "answer": "Velocities and changes of momentum should remain signed throughout the calculation. Take the absolute value only when the question asks for the magnitude of the impulse; report that magnitude as a positive quantity with units $$\\mathrm{N\\,s}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_8", "question": "Tutor packet Q1 / official WME01 Q2. What conservation principle is triggered by a direct collision of two particles when calculating their velocities immediately before and after impact?", "answer": "Use conservation of total linear momentum along the line of motion: $$m_Au_A+m_Bu_B=m_Av_A+m_Bv_B.$$ Choose one positive direction and assign every velocity its corresponding sign.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_9", "question": "Tutor packet Q2 / official WME01 Q1 (10 marks: part (a) 3, part (b) 5, part (c) 2). A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$T$$ seconds, travels at that speed for $$180$$ seconds, then decelerates uniformly to rest. The acceleration magnitude is twice the deceleration magnitude. Show why the deceleration phase lasts $$2T$$.", "answer": "The speed change has magnitude $$20\\ \\mathrm{m\\,s^{-1}}$$ in both phases. If the initial acceleration is $$a=20/T$$, the deceleration magnitude is $$a/2$$. Its duration is therefore $$20/(a/2)=2(20/a)=2T$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_10", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates for $$T$$ seconds, travels at constant speed for the next $$180$$ seconds, and decelerates for $$2T$$ seconds. What are the three cumulative time coordinates at the transitions and at the end?", "answer": "The coordinates are $$T,\\qquad T+180,\\qquad 3T+180.$$ A common trap is to place the end of the constant-speed phase at $$180$$ rather than $$T+180$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_11", "question": "Tutor packet Q2 / official WME01 Q1. A train’s speed–time graph is a trapezium of height $$20\\ \\mathrm{m\\,s^{-1}}$$. Its parallel horizontal sides have lengths $$180$$ and $$3T+180$$ seconds. The total distance is $$4.8\\ \\mathrm{km}$$. Form the area equation using $$A=\\frac12(a+b)h$$.", "answer": "First convert $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Then $$4800=\\frac12\\bigl(180+(3T+180)\\bigr)(20).$$ The area under a speed–time graph represents distance.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_12", "question": "Tutor packet Q2 / official WME01 Q1. Solve $$4800=\\frac12\\bigl(180+(3T+180)\\bigr)(20)$$ for the acceleration-phase duration $$T$$.", "answer": "$$4800=10(3T+360)$$, so $$480=3T+360$$. Hence $$3T=120$$ and $$T=40\\ \\mathrm s$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_13", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates uniformly from $$0$$ to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$40\\ \\mathrm s$$. Find its initial acceleration from the speed–time graph and give the correct SI unit.", "answer": "Acceleration is the graph’s gradient: $$a=\\frac{\\Delta v}{\\Delta t}=\\frac{20-0}{40}=0.5\\ \\mathrm{m\\,s^{-2}}.$$", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_14", "question": "Tutor packet Q2 / official WME01 Q1. On a speed–time graph, what do the area under the graph and the gradient represent?", "answer": "The area represents distance travelled when speed is plotted, while the gradient represents acceleration. Dimensionally, $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$ and $$(\\mathrm{m\\,s^{-1}})/\\mathrm s=\\mathrm{m\\,s^{-2}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_15", "question": "Tutor packet Q2 / official WME01 Q1. Why must a stated distance of $$4.8\\ \\mathrm{km}$$ be converted before equating it to the area under a speed–time graph whose axes use seconds and $$\\mathrm{m\\,s^{-1}}$$?", "answer": "The graph’s area is measured in $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$, so use $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Equating $$4.8$$ directly to the area would mix kilometres with metres.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_16", "question": "Tutor packet Q5 / official WME01 Q4 (8 marks, with no official split between the two requested values). A branch of length $$1.5\\ \\mathrm m$$ rests on supports C and D. What happens to the reaction at D when the branch is on the point of tilting about C, and why?", "answer": "At impending tilt about C, contact at D is just lost, so $$R_D=0$$. The branch pivots about C, and the zero reaction contributes no force or moment.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_17", "question": "Tutor packet Q5 / official WME01 Q4. What happens to the reaction at C when a supported branch is on the point of tilting about D?", "answer": "At impending tilt about D, contact at C is just lost, so $$R_C=0$$. The remaining support D acts as the pivot.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_18", "question": "Tutor packet Q5 / official WME01 Q4. A force acts through the pivot in a moments problem. What is its moment about that pivot?", "answer": "Its moment is zero because its perpendicular distance from the pivot is zero: $$M=F d_\\perp=0.$$ It therefore need not appear in the moment equation about that pivot.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_19", "question": "Tutor packet Q5 / official WME01 Q4. A branch has weight $$W$$ acting at distance $$x$$ from support C. When it is on the point of tilting about C, a $$150\\ \\mathrm N$$ load acts at perpendicular distance $$1.5-0.24=1.26\\ \\mathrm m$$ from C. Form the moment equation about C.", "answer": "Equating clockwise and anticlockwise moments gives $$Wx=150(1.26)=189.$$ Thus the governing equation is $$Wx=189\\ \\mathrm{N\\,m}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_20", "question": "Tutor packet Q5 / official WME01 Q4. In a second tilting scenario, moments are taken about support D. A $$225\\ \\mathrm N$$ load has moment arm $$0.36\\ \\mathrm m$$, while the branch’s weight $$W$$ has moment arm $$1.5-0.36-0.24-x=0.9-x$$. Form the moment equation.", "answer": "Equating opposing moments about D gives $$225(0.36)=W(0.9-x),$$ so $$81=W(0.9-x).$$", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_21", "question": "Tutor packet Q5 / official WME01 Q4. Two tilting scenarios give $$Wx=189$$ and $$W(0.9-x)=81$$, where $$W$$ is in newtons and $$x$$ in metres. What efficient operation eliminates $$W$$?", "answer": "Divide the equations: $$\\frac{Wx}{W(0.9-x)}=\\frac{189}{81},$$ giving $$\\frac{x}{0.9-x}=\\frac73.$$ Division is efficient because the common unknown $$W$$ cancels immediately.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_22", "question": "Tutor packet Q5 / official WME01 Q4. Solve $$\\frac{x}{0.9-x}=\\frac73$$ for $$x$$, where $$x$$ is a distance in metres.", "answer": "$$3x=7(0.9-x)$$, so $$3x=6.3-7x$$ and $$10x=6.3$$. Therefore $$x=0.63\\ \\mathrm m$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_23", "question": "Tutor packet Q5 / official WME01 Q4. Given $$Wx=189\\ \\mathrm{N\\,m}$$ and $$x=0.63\\ \\mathrm m$$, find the branch’s weight $$W$$.", "answer": "$$W=\\frac{189}{0.63}=300\\ \\mathrm N.$$ The unit is newtons because $$W$$ is a force.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_24", "question": "Tutor packet Q5 / official WME01 Q4. What equation-writing strategy reduces sign errors when taking moments in a two-dimensional equilibrium or tilting problem?", "answer": "Choose the pivot clearly and write “clockwise moments = anticlockwise moments,” placing the two senses on opposite sides. This is usually safer than constructing one long signed sum.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_25", "question": "Tutor packet Q5 / official WME01 Q4. Why should two governing moment equations be boxed and labelled before solving for $$W$$ and $$x$$?", "answer": "Labelling the equations makes their physical origins clear, helps preserve distances and signs, and makes an efficient operation such as division or substitution easier to perform without mixing the two tilting scenarios.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_26", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8 (15 marks: part (a) 8, part (b) 3, part (c) 4). A $$2\\ \\mathrm{kg}$$ parcel lies on a rough plane inclined at $$30^\\circ$$. An $$18\\ \\mathrm N$$ force acts at $$40^\\circ$$ to the plane. State the components of the applied force parallel and perpendicular to the plane.", "answer": "LIVE SET-UP ONLY. The component up the plane is $$18\\cos40^\\circ$$. The perpendicular component is $$18\\sin40^\\circ$$ directed away from the plane.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_27", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. A parcel of mass $$2\\ \\mathrm{kg}$$ lies on a plane inclined at $$30^\\circ$$. Resolve its weight into components parallel and perpendicular to the plane.", "answer": "LIVE SET-UP ONLY. The component down the plane is $$2g\\sin30^\\circ$$, and the component into the plane is $$2g\\cos30^\\circ$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_28", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. For a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ rough plane, an $$18\\ \\mathrm N$$ force acts at $$40^\\circ$$ above the plane. Taking up the plane as positive, with friction magnitude $$F_R$$ opposing the upward motion, form Newton’s second-law equation parallel to the plane.", "answer": "LIVE SET-UP ONLY. $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a.$$ The parallel forces are not balanced; their resultant equals mass times acceleration.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_29", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. A $$2\\ \\mathrm{kg}$$ parcel lies on a $$30^\\circ$$ plane while an $$18\\ \\mathrm N$$ force acts at $$40^\\circ$$ away from the plane. If there is no acceleration perpendicular to the plane, form the correct perpendicular equation.", "answer": "LIVE SET-UP ONLY. $$R+18\\sin40^\\circ=2g\\cos30^\\circ.$$ Resolving “perpendicular to the plane” is not the same as balancing forces vertically.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_30", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. The coefficient of friction is $$\\mu=0.3$$ and the live model uses limiting friction. Express the friction magnitude $$F_R$$ in terms of the normal reaction $$R$$.", "answer": "LIVE SET-UP ONLY. Under the stated limiting-friction model, $$F_R=F_{\\max}=\\mu R=0.3R.$$ In general static friction satisfies $$F\\leq\\mu R$$; equality requires limiting friction.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_31", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Why is the claim “friction can never exceed the applied component, so the acceleration must be up the slope” not a valid general method?", "answer": "LIVE SET-UP ONLY. Acceleration direction must be determined from the net resolved force, including the applied force, friction and the component of weight. Friction is governed by contact and the friction law, not by a universal comparison with the applied component.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_32", "question": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. Tutor packet Q8 / official WME01 Q8(a). Using $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$ and $$R+18\\sin40^\\circ=2g\\cos30^\\circ$$ for a $$2\\ \\mathrm{kg}$$ parcel, calculate the normal reaction.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. $$R=19.6\\cos30^\\circ-18\\sin40^\\circ\\approx5.4039\\ \\mathrm N.$$ This is an official-reference numerical completion, not a result produced live.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_33", "question": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. Tutor packet Q8 / official WME01 Q8(a). Given $$R\\approx5.4039\\ \\mathrm N$$ and $$\\mu=0.3$$ under the limiting-friction model, calculate the friction magnitude.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. $$F_R=\\mu R=0.3(5.4039)\\approx1.6212\\ \\mathrm N.$$ This arithmetic was supplied as official-reference material, not completed in the lesson.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_34", "question": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. Tutor packet Q8 / official WME01 Q8(a). For a $$2\\ \\mathrm{kg}$$ parcel, use $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a$$ with $$F_R\\approx1.6212\\ \\mathrm N$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$ to find the acceleration.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. $$2a\\approx13.7888-1.6212-9.8=2.3676,$$ so $$a\\approx1.1838\\ \\mathrm{m\\,s^{-2}}$$, reported as $$1.18\\ \\mathrm{m\\,s^{-2}}$$ or approximately $$1.2\\ \\mathrm{m\\,s^{-2}}$$. The positive sign means up the plane.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_35", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(b). A parcel moves with initial speed $$u=2\\ \\mathrm{m\\,s^{-1}}$$ over $$s=5\\ \\mathrm m$$ with constant acceleration $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$. Which SUVAT relation finds its speed at B, and what is that speed?", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Use $$v^2=u^2+2as$$ because time is not required. Then $$v^2=2^2+2(1.1838\\ldots)(5)\\approx15.838$$, so $$v\\approx3.98\\ \\mathrm{m\\,s^{-1}}$$, or approximately $$4.0\\ \\mathrm{m\\,s^{-1}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_36", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). After the $$18\\ \\mathrm N$$ force is removed, a $$2\\ \\mathrm{kg}$$ parcel is instantaneously at rest on a $$30^\\circ$$ rough plane with $$\\mu=0.3$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$. Determine whether friction can keep it at rest.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. $$R=2g\\cos30^\\circ\\approx16.974\\ \\mathrm N$$, so $$F_{\\max}=\\mu R\\approx5.09\\ \\mathrm N$$. The downslope weight component is $$2g\\sin30^\\circ=9.8\\ \\mathrm N$$. Since $$9.8>5.09$$, friction cannot hold it; the parcel does not remain at rest.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_37", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). What comparison should be made before assuming $$F=\\mu R$$ for a body that may remain at rest on a rough incline?", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Calculate the friction required for equilibrium and compare it with $$\\mu R$$. If the required friction is at most $$\\mu R$$, static friction can supply it; if it exceeds $$\\mu R$$, equilibrium is impossible.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_38", "question": "REVIEWED ONLY / DEFERRED — Tutor packet Q3 / official WME01 Q3 (10 marks), constant-acceleration vectors. What lesson-status claim is supported, and what official-reference results may be recorded without claiming they were worked live?", "answer": "REVIEWED ONLY / DEFERRED. No subpart was re-worked in the lesson. OFFICIAL MS REFERENCE ONLY results are: speed at $$t=2$$ is $$\\sqrt{45}=3\\sqrt5\\approx6.7\\ \\mathrm{m\\,s^{-1}}$$; the angle to $$\\mathbf i$$ at $$t=2$$ is $$27^\\circ$$ or $$333^\\circ$$ under the stated convention; and $$T=3.2$$ for direction $$2\\mathbf i-3\\mathbf j$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_39", "question": "REVIEWED ONLY / DEFERRED — Tutor packet Q4 / official WME01 Q5 (9 marks), vehicle SUVAT through P–Q–R. What official-reference results are available, without claiming the lesson produced them?", "answer": "REVIEWED ONLY / DEFERRED. No subpart was re-worked live. OFFICIAL MS REFERENCE ONLY results are: establish the given result $$x=3u$$; then $$u=9\\ \\mathrm{m\\,s^{-1}}$$; and the distance travelled in the first $$14\\ \\mathrm s$$ is $$201\\ \\mathrm m$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_40", "question": "NOT DISCUSSED — Tutor packet Q6 / official WME01 Q6 (8 marks), boat pulled by two ropes. What official-reference answers are available, and what must not be inferred about the lesson?", "answer": "NOT DISCUSSED. The question was not opened or discussed. OFFICIAL MS REFERENCE ONLY gives rope angle $$\\alpha\\approx31.9^\\circ$$ and tension $$P\\approx609\\ \\mathrm N$$, with $$610\\ \\mathrm N$$ or better accepted. These values must not be described as lesson work.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_41", "question": "NOT DISCUSSED — Tutor packet Q7 / official WME01 Q7 (7 marks), lift and two boxes. What official-reference answers are available, and what is their evidence boundary?", "answer": "NOT DISCUSSED. The question was not opened or discussed. OFFICIAL MS REFERENCE ONLY gives the combined mass of P and Q as $$5m$$ and the mass of P as $$2m$$. They are reference answers, not results produced live.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_42", "question": "For Edexcel IAL Mechanics M1, which core results used in this lesson must candidates know because no additional M1 formulae are printed for them?", "answer": "Candidates must know momentum $$p=mv$$; impulse $$I=mv-mu$$; the five constant-acceleration equations; Newton’s laws; the friction relations $$F=\\mu R$$ at limiting equilibrium and generally $$F\\leq\\mu R$$; and the principle of moments.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_43", "question": "In the train speed–time problem, what is the availability status of the trapezium-area formula $$A=\\frac12(a+b)h$$?", "answer": "It is a P1/P2 prerequisite formula rather than an additional printed M1 formula. It can be used to find the area under the trapezoidal speed–time graph.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_44", "question": "In mechanics calculations, how should exact and rounded values be carried through linked parts?", "answer": "Retain the unrounded value for onward substitution, use $$=$$ for exact or directly calculated expressions, and use $$\\approx$$ only for rounded values. For example, carry $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$ before reporting $$a\\approx1.18\\ \\mathrm{m\\,s^{-2}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_45", "question": "What units should accompany the principal mechanics quantities used in this lesson: speed, acceleration, force, impulse, distance and moment?", "answer": "Speed: $$\\mathrm{m\\,s^{-1}}$$; acceleration: $$\\mathrm{m\\,s^{-2}}$$; force: $$\\mathrm N$$; impulse: $$\\mathrm{N\\,s}$$; distance: $$\\mathrm m$$; moment: $$\\mathrm{N\\,m}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_46", "question": "What were the three genuine closing study actions agreed in the 19 June 2026 M1 practice tutorial?", "answer": "First complete the Pure 2 baseline paper, then the Pure 3 baseline paper, to build a full-course diagnostic before extra M1 work. If time allows, look over the separate already-completed and marked M1 homework paper. Revisit that earlier M1 paper together in mid-July after allowing more homework time.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_47", "question": "Did the 19 June 2026 M1 practice tutorial assign a drill set or “keep practising moments and inclined-plane resolving” as homework?", "answer": "No. Those were not tutor-assigned closing actions. The supported priority was Pure 2 and Pure 3 baseline papers, with the earlier marked M1 paper available for review and planned for a joint mid-July revisit.", "source": "GPT-5.6 Sol ①"}]}, "gpt56sol_2": {"label": "GPT-5.6 Sol ②", "cards": [{"id": "gpt56sol_2_0", "question": "ESAT-STYLE WARM-UP — NOT WME01. How should “the difference between $$2\\sqrt n$$ and $$7$$ is less than $$1$$” be translated into a single inequality, and why?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. “Difference” means the non-negative size of the gap, so use modulus: $$|2\\sqrt n-7|<1.$$ Equivalently, $$-1<2\\sqrt n-7<1.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_1", "question": "ESAT-STYLE WARM-UP — NOT WME01. Given $$-1<2\\sqrt n-7<1,$$ derive the interval for $$n$$. State why squaring is valid and preserve the strict endpoints.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. Add $$7$$ and divide all parts by the positive number $$2$$: $$6<2\\sqrt n<8\\implies 3<\\sqrt n<4.$$ All three terms are positive, so squaring preserves the order: $$9<n<16.$$ The inequalities remain strict.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_2", "question": "ESAT-STYLE WARM-UP — NOT WME01. If $$n$$ is an integer satisfying $$9<n<16,$$ which values are permitted, and how many are there?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. The permitted integers are $$n\\in\\{10,11,12,13,14,15\\}.$$ Inclusive counting gives $$15-10+1=6$$ integers.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_3", "question": "ESAT-STYLE WARM-UP — NOT WME01. In the integer inequality $$9<n<16,$$ explain the two endpoint traps that could produce a wrong count.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. The strict inequalities exclude $$9$$ and $$16$$. After identifying the first and last permitted integers as $$10$$ and $$15,$$ count inclusively using $$15-10+1$$, not merely $$15-10$$.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_4", "question": "ESAT-STYLE WARM-UP — NOT WME01. What is the efficient trigger when a prompt says that the “difference” between two real quantities is less than a positive number?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. Translate the size of the difference into a modulus inequality: $$|A-B|<c.$$ Then unfold it as $$-c<A-B<c.$$ This avoids unnecessary separate cases or rearrangements that make the expression more complicated.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_5", "question": "Tutor packet Q1 / official WME01
