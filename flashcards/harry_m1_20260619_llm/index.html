 Q2. Two particles collide directly along a line. Particle A has mass $$3m$$ and particle B has mass $$m$$. Initially, A moves at $$1.5\\ \\mathrm{m\\,s^{-1}}$$ and B approaches it at the same speed. Taking A’s initial direction as positive, what signed initial velocities must be used in conservation of momentum?", "answer": "Use $$u_A=+1.5\\ \\mathrm{m\\,s^{-1}}$$ and $$u_B=-1.5\\ \\mathrm{m\\,s^{-1}}.$$ “Approach each other” means their velocities have opposite signs under one fixed sign convention.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_6", "question": "Tutor packet Q1 / official WME01 Q2. Particle A has mass $$3m$$ and initial velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$; particle B has mass $$m$$ and initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$. After impact their velocities are modelled as $$x$$ and $$x+1$$ respectively. Form the conservation-of-momentum equation and find $$x$$.", "answer": "Conservation of linear momentum gives $$(3m)(1.5)+m(-1.5)=3mx+m(x+1).$$ Cancelling $$m$$: $$4.5-1.5=3x+x+1,$$ so $$3=4x+1$$ and therefore $$x=0.5\\ \\mathrm{m\\,s^{-1}}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_7", "question": "Tutor packet Q1 / official WME01 Q2. In a direct collision, the post-impact velocities are modelled as $$v_A=x$$ and $$v_B=x+1$$, where conservation of momentum gives $$x=0.5\\ \\mathrm{m\\,s^{-1}}$$. State the speed of each particle and explain why the labels matter.", "answer": "$$\\text{Speed of A}=0.5\\ \\mathrm{m\\,s^{-1}},\\qquad \\text{speed of B}=1.5\\ \\mathrm{m\\,s^{-1}}.$$ The numbers must be attached to A and B; two unlabelled speeds may not identify which result belongs to which particle.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_8", "question": "Tutor packet Q1 / official WME01 Q2. Particle B has mass $$m$$, initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$ and final velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$ under the chosen sign convention. Find the impulse on B and its magnitude.", "answer": "Impulse is change in momentum: $$I_B=mv_B-mu_B=m(1.5)-m(-1.5)=3m\\ \\mathrm{N\\,s}.$$ Hence its magnitude is $$3m\\ \\mathrm{N\\,s}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_9", "question": "Tutor packet Q1 / official WME01 Q2. When finding the magnitude of an impulse, at what stage should signs be retained, and how should the final answer be presented?", "answer": "Retain signed velocities while calculating $$I=mv-mu.$$ Take the magnitude only after finding the signed impulse. A requested magnitude is reported as a positive quantity with units, for example $$3m\\ \\mathrm{N\\,s},$$ without leaving modulus bars in the final answer.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_10", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in time $$T$$. The magnitude of its acceleration is twice the magnitude of its later deceleration to rest. How long does the deceleration last?", "answer": "For the same speed change, time is inversely proportional to acceleration magnitude. Since the acceleration magnitude is twice the deceleration magnitude, the deceleration takes twice as long: $$2T.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_11", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates for $$T$$ seconds, travels at constant speed for $$180$$ seconds, and decelerates for $$2T$$ seconds. What are the three transition times measured from the start?", "answer": "The acceleration ends at $$T$$, the constant-speed phase ends at $$T+180$$, and the train stops at $$T+180+2T=3T+180.$$ A common trap is to mark the end of the constant phase at $$180$$ rather than $$T+180.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_12", "question": "Tutor packet Q2 / official WME01 Q1. A train’s speed–time graph is a trapezium of height $$20\\ \\mathrm{m\\,s^{-1}}$$. Its upper parallel side has length $$180\\ \\mathrm{s}$$ and its lower parallel side has length $$3T+180\\ \\mathrm{s}$$. Its total distance is $$4.8\\ \\mathrm{km}$$. Form the area equation used to find $$T$$.", "answer": "First convert $$4.8\\ \\mathrm{km}=4800\\ \\mathrm{m}.$$ Since area under a speed–time graph is distance and $$A=\\frac12(a+b)h,$$ $$4800=\\frac12\\bigl[180+(3T+180)\\bigr](20).$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_13", "question": "Tutor packet Q2 / official WME01 Q1. Solve the speed–time graph equation $$4800=\\frac12\\bigl[180+(3T+180)\\bigr](20)$$ for $$T$$, including units.", "answer": "$$4800=10(3T+360)\\implies 480=3T+360\\implies 3T=120.$$ Therefore, $$T=40\\ \\mathrm{s}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_14", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$40\\ \\mathrm{s}$$. How is its initial acceleration obtained from the speed–time graph?", "answer": "Acceleration is the graph’s gradient: $$a=\\frac{\\Delta v}{\\Delta t}=\\frac{20-0}{40}=0.5\\ \\mathrm{m\\,s^{-2}}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_15", "question": "Tutor packet Q2 / official WME01 Q1. What do the area and gradient of a speed–time graph represent, and what unit checks follow?", "answer": "Area represents distance because $$(\\mathrm{m\\,s^{-1}})(\\mathrm{s})=\\mathrm{m}.$$ Gradient represents acceleration because $$\\frac{\\mathrm{m\\,s^{-1}}}{\\mathrm{s}}=\\mathrm{m\\,s^{-2}}.$$ Distances must therefore be converted to metres before using a graph measured in seconds and metres per second.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_16", "question": "Tutor packet Q5 / official WME01 Q4. A branch rests on supports C and D. What happens to the support reactions when the branch is on the point of tilting about C or about D?", "answer": "On the point of tilting about C, contact at D is just lost, so $$R_D=0.$$ On the point of tilting about D, contact at C is just lost, so $$R_C=0.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_17", "question": "Tutor packet Q5 / official WME01 Q4. Why can a force through the chosen pivot, or a support reaction known to be zero at limiting tilt, be omitted from a moments equation?", "answer": "Moment equals force multiplied by perpendicular distance from the pivot. A force through the pivot has zero perpendicular distance and hence zero moment. A zero reaction also produces zero moment.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_18", "question": "Tutor packet Q5 / official WME01 Q4. A branch of length $$1.5\\ \\mathrm{m}$$ has support C located $$0.24\\ \\mathrm{m}$$ from one end. Its weight $$W$$ acts at distance $$x$$ from C. At limiting tilt about C, a $$150\\ \\mathrm{N}$$ load acts at the opposite end. Form the moments equation about C.", "answer": "The load’s distance from C is $$1.5-0.24=1.26\\ \\mathrm{m}.$$ Equating opposite moments gives $$Wx=150(1.26)=189.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_19", "question": "Tutor packet Q5 / official WME01 Q4. Supports C and D are $$1.5-0.24-0.36=0.9\\ \\mathrm{m}$$ apart. The branch’s weight $$W$$ acts at distance $$x$$ from C. At limiting tilt about D, a $$225\\ \\mathrm{N}$$ load has moment arm $$0.36\\ \\mathrm{m}$$. Form the moments equation about D.", "answer": "The weight is $$0.9-x$$ metres from D. Equating opposite moments gives $$225(0.36)=W(0.9-x),$$ so $$81=W(0.9-x).$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_20", "question": "Tutor packet Q5 / official WME01 Q4. Given the two moments equations $$Wx=189$$ and $$W(0.9-x)=81,$$ what efficient method eliminates $$W$$, and what equation for $$x$$ results?", "answer": "Divide the first equation by the second: $$\\frac{Wx}{W(0.9-x)}=\\frac{189}{81}.$$ Hence $$\\frac{x}{0.9-x}=\\frac73,$$ which gives $$3x=7(0.9-x).$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_21", "question": "Tutor packet Q5 / official WME01 Q4. Solve $$3x=7(0.9-x)$$ and then use $$Wx=189$$ to find the branch’s weight. Include units.", "answer": "$$3x=6.3-7x\\implies 10x=6.3\\implies x=0.63\\ \\mathrm{m}.$$ Then $$W=\\frac{189}{0.63}=300\\ \\mathrm{N}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_22", "question": "Tutor packet Q5 / official WME01 Q4. What moments-equation layout reduces sign errors in a two-scenario tilting problem?", "answer": "Draw each tilting scenario separately, identify the active pivot and zero reaction, and place clockwise moments on one side and anticlockwise moments on the other. Box and label the resulting equations before combining them. This is safer than writing one long signed sum.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_23", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. A $$2\\ \\mathrm{kg}$$ parcel is on a rough plane inclined at $$30^\\circ$$. A force of $$18\\ \\mathrm{N}$$ acts at $$40^\\circ$$ above the plane. Describe the force components required for resolving parallel and perpendicular to the plane.", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Resolve the pull as $$18\\cos40^\\circ$$ up the plane and $$18\\sin40^\\circ$$ away from the plane. Resolve weight $$2g$$ as $$2g\\sin30^\\circ$$ down the plane and $$2g\\cos30^\\circ$$ into the plane. Include normal reaction $$R$$ perpendicular to the plane and friction $$F_R$$ along the plane.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_24", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. For a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ incline pulled by $$18\\ \\mathrm{N}$$ at $$40^\\circ$$ above the plane, what is the correct perpendicular equilibrium equation?", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Perpendicular to the plane there is no acceleration, so $$R+18\\sin40^\\circ=2g\\cos30^\\circ.$$ The pull reduces the normal reaction because its perpendicular component acts away from the plane.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_25", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Taking up the plane as positive, form Newton’s second-law equation for a $$2\\ \\mathrm{kg}$$ parcel pulled by $$18\\ \\mathrm{N}$$ at $$40^\\circ$$ above a $$30^\\circ$$ rough plane, with friction $$F_R$$ opposing upward motion.", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. The equation is $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a.$$ The right-hand side is $$ma=2a$$ because the parcel’s mass is $$2\\ \\mathrm{kg}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_26", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. The coefficient of friction is $$\\mu=0.3$$ and the model uses limiting friction during the initial motion. What friction relation applies, and what distinction must be remembered for static friction generally?", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. In the stated limiting-friction setup, $$F_R=F_{\\max}=\\mu R=0.3R.$$ In general, static friction adjusts only as needed and satisfies $$F_R\\leq\\mu R$$; equality is not automatic.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_27", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Why is “the forces are balanced vertically” incorrect when resolving normal to an inclined plane?", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. “Vertical” means the ordinary up–down direction, whereas the chosen resolving direction is perpendicular to the plane. The correct statement is that forces balance perpendicular to the plane. Along the plane they are not balanced if the parcel accelerates.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_28", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Why is it invalid to infer the direction of acceleration merely by claiming that friction exists only because of the applied pull or cannot exceed the pull’s parallel component?", "answer": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Friction depends on contact and the actual or impending relative motion, not solely on the applied pull. The acceleration direction must be determined from the signed net force along the plane, including the component of gravity.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_29", "question": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. Using $$g=9.8\\ \\mathrm{m\\,s^{-2}},$$ find the normal reaction and limiting friction for a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ plane pulled by $$18\\ \\mathrm{N}$$ at $$40^\\circ$$ above the plane, where $$\\mu=0.3$$.", "answer": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. From $$R+18\\sin40^\\circ=2g\\cos30^\\circ,$$ $$R=19.6\\cos30^\\circ-18\\sin40^\\circ\\approx5.4039\\ \\mathrm{N}.$$ Thus $$F_R=0.3R\\approx1.6212\\ \\mathrm{N}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_30", "question": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. Taking up the plane as positive, use $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a,$$ with $$F_R\\approx1.6212\\ \\mathrm{N}$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}},$$ to determine the acceleration.", "answer": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. $$2a\\approx18\\cos40^\\circ-1.6212-19.6\\sin30^\\circ\\approx2.3676.$$ Therefore, $$a\\approx1.1838\\ \\mathrm{m\\,s^{-2}},$$ reported as $$1.18\\ \\mathrm{m\\,s^{-2}}$$ or approximately $$1.2\\ \\mathrm{m\\,s^{-2}}$$ up the plane.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_31", "question": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(b), not attempted live. A parcel moves with initial speed $$u=2\\ \\mathrm{m\\,s^{-1}}$$ over $$s=5\\ \\mathrm{m}$$ with constant acceleration $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$ in the same direction. Which SUVAT relation applies, and what is its speed after this distance?", "answer": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(b), not attempted live. Use $$v^2=u^2+2as.$$ Thus $$v^2=2^2+2(1.1838\\ldots)(5)\\approx15.838,$$ giving $$v\\approx3.98\\ \\mathrm{m\\,s^{-1}}$$ or approximately $$4.0\\ \\mathrm{m\\,s^{-1}}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_32", "question": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(c), not attempted live. After the $$18\\ \\mathrm{N}$$ force is removed, a $$2\\ \\mathrm{kg}$$ parcel is momentarily at rest on a $$30^\\circ$$ rough plane with $$\\mu=0.3$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}.$$ How do you decide whether it remains at rest?", "answer": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(c), not attempted live. Now $$R=2g\\cos30^\\circ\\approx16.974\\ \\mathrm{N},$$ so $$F_{\\max}=\\mu R\\approx5.09\\ \\mathrm{N}.$$ The downslope weight component is $$2g\\sin30^\\circ=9.8\\ \\mathrm{N}.$$ Since $$9.8>5.09,$$ friction cannot maintain equilibrium, so the parcel does not remain at rest.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_33", "question": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q3 / official WME01 Q3(a–b). What official-reference speed and direction are listed at $$t=2$$ for the constant-acceleration vector question?", "answer": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q3 / official WME01 Q3(a–b). The listed speed is $$\\sqrt{45}=3\\sqrt5\\approx6.7\\ \\mathrm{m\\,s^{-1}}.$$ The listed angle to $$\\mathbf i$$ is $$27^\\circ,$$ or $$333^\\circ$$ under the stated alternative convention. These values were not produced live.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_34", "question": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q3 / official WME01 Q3(c). What official-reference value of $$T$$ is listed when the particle’s direction is $$2\\mathbf i-3\\mathbf j$$?", "answer": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q3 / official WME01 Q3(c). The listed result is $$T=3.2.$$ This subpart was not re-worked in the lesson.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_35", "question": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(a–b), vehicle SUVAT from P to Q to R. What two official-reference results are listed?", "answer": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(a–b). The listed results are $$x=3u$$ for the required shown relation and $$u=9\\ \\mathrm{m\\,s^{-1}}.$$ Neither subpart was re-worked live.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_36", "question": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(c), vehicle SUVAT from P to Q to R. What official-reference distance is listed for the first $$14\\ \\mathrm{s}$$?", "answer": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(c). The listed distance is $$201\\ \\mathrm{m}.$$ It was not produced live.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_37", "question": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6, boat pulled by two ropes. What official-reference values are listed for the rope angle and tension?", "answer": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6. The listed values are $$\\alpha\\approx31.9^\\circ$$ and $$P\\approx609\\ \\mathrm{N},$$ with $$610\\ \\mathrm{N}$$ or better accepted for the tension. The question was not opened or discussed in the lesson.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_38", "question": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q7 / official WME01 Q7, lift and two boxes. What official-reference mass results are listed?", "answer": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q7 / official WME01 Q7. The listed combined mass of P and Q is $$5m,$$ and the listed mass of P is $$2m.$$ These results were not produced live.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_39", "question": "For Edexcel IAL Mechanics M1, which mechanics results used in this lesson must be known because no additional M1 formulae are printed for candidates?", "answer": "Candidates are expected to know momentum $$p=mv$$, impulse $$I=mv-mu$$, the five constant-acceleration SUVAT formulae, Newton’s laws, the friction model $$F\\leq\\mu R$$ with $$F=\\mu R$$ at limiting friction, and the principle of moments.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_40", "question": "In the train speed–time problem, what formula is a Pure Mathematics prerequisite rather than an additionally printed M1 formula, and how is it written?", "answer": "The area of a trapezium is the P1/P2 prerequisite formula $$A=\\frac12(a+b)h,$$ where $$a$$ and $$b$$ are the parallel-side lengths and $$h$$ is their perpendicular separation.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_41", "question": "What rounding, equality-sign, carry-forward and unit conventions should be used in an M1 multi-part calculation?", "answer": "Keep signed quantities until a magnitude is requested. Retain an unrounded value for onward substitution, then round the final result appropriately. Use $$=$$ for exact or directly calculated expressions and $$\\approx$$ for rounded values. Attach SI units to final mechanics answers, such as $$\\mathrm{m\\,s^{-1}},$$ $$\\mathrm{m\\,s^{-2}},$$ $$\\mathrm{N}$$ or $$\\mathrm{N\\,s}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_42", "question": "What study actions were actually agreed at the end of the 19 June 2026 M1 practice tutorial, and what extra mechanics homework was not assigned?", "answer": "The agreed priority was to complete the Pure 2 baseline paper and then the Pure 3 baseline paper before extra M1 work. A separate marked M1 homework paper could be reviewed if time allowed, and that earlier paper was to be revisited together in mid-July after more homework time. No drill set or instruction to keep practising moments and inclined-plane resolving was assigned.", "source": "GPT-5.6 Sol ②"}]}}, "judge": [{"id": "qwen_1_32", "question": "In Tutor packet Q5 / official WME01 Q4, what is the distance between supports C and D given the branch length is $1.5 \\text{ m}$, C is $0.24 \\text{ m}$ from the left end, and D is $0.36 \\text{ m}$ from the right end?", "answer": "Distance CD = Total Length - (Left Gap + Right Gap)\n$CD = 1.5 - (0.24 + 0.36) = 1.5 - 0.60 = 0.9 \\text{ m}$.\nThis distance is crucial for determining the moment arm of the weight $W$ relative to support D.", "source": "Qwen ①"}, {"id": "qwen_1_41", "question": "Regarding the \"Closing Study Actions\", what is the status of the \"recurring weakness\" drill set mentioned in earlier guide versions?", "answer": "It is INVALID and REMOVED.\nThe lesson did not assign specific M1 drills or identify a recurring weakness story.\nGenuine actions are limited to: Pure 2/3 baselines, reviewing a separate marked M1 homework, and revisiting that paper in mid-July.", "source": "Qwen ①"}, {"id": "gpt56sol_1_39", "question": "REVIEWED ONLY / DEFERRED — Tutor packet Q4 / official WME01 Q5 (9 marks), vehicle SUVAT through P–Q–R. What official-reference results are available, without claiming the lesson produced them?", "answer": "REVIEWED ONLY / DEFERRED. No subpart was re-worked live. OFFICIAL MS REFERENCE ONLY results are: establish the given result $$x=3u$$; then $$u=9\\ \\mathrm{m\\,s^{-1}}$$; and the distance travelled in the first $$14\\ \\mathrm s$$ is $$201\\ \\mathrm m$$.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_3_6", "question": "A train accelerates from rest to $$20 \\text{ m s}^{-1}$$, runs at that speed for 180 s, then decelerates to rest. The acceleration magnitude is twice the deceleration magnitude. If the acceleration phase lasts $$T$$, why does the deceleration phase last $$2T$$?", "answer": "The change in speed is the same for both phases ($$20 \\text{ m s}^{-1}$$). Since $$v = at$$, time is inversely proportional to acceleration. If acceleration is twice deceleration, the deceleration time must be twice the acceleration time. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "qwen_1_3", "question": "In Tutor packet Q2 / official WME01 Q1 (train graph), a train accelerates from rest to $20 \\text{ m s}^{-1}$ in time $T$, runs at constant speed for $180 \\text{ s}$, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, express the total time of motion in terms of $T$. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nSince $|a| = 2|d|$, the deceleration phase takes twice as long as the acceleration phase ($t_{dec} = 2T$).\nTotal time = (acceleration time) + (constant speed time) + (deceleration time)\nTotal time = $T + 180 + 2T = 3T + 180$.", "source": "Qwen ①"}, {"id": "minimax_1_10", "question": "(Packet Q5 / official Q4) A non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m and 0.36 m from its two ends. Weight W acts at a distance x from C. State the rule that turns \"on the point of tilting about C\" into a single equation, and the parallel rule for tilting about D.", "answer": "\"On the point of tilting about C\" means the reaction at D is zero: R_D = 0. \"On the point of tilting about D\" means R_C = 0. A force acting through the pivot produces no moment about that pivot.", "source": "MiniMax ①"}, {"id": "gpt56sol_2_37", "question": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6, boat pulled by two ropes. What official-reference values are listed for the rope angle and tension?", "answer": "NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6. The listed values are $$\\alpha\\approx31.9^\\circ$$ and $$P\\approx609\\ \\mathrm{N},$$ with $$610\\ \\mathrm{N}$$ or better accepted for the tension. The question was not opened or discussed in the lesson.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_1_23", "question": "Tutor packet Q5 / official WME01 Q4. Given $$Wx=189\\ \\mathrm{N\\,m}$$ and $$x=0.63\\ \\mathrm m$$, find the branch’s weight $$W$$.", "answer": "$$W=\\frac{189}{0.63}=300\\ \\mathrm N.$$ The unit is newtons because $$W$$ is a force.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_1_25", "question": "For Tutor packet Q5 / official WME01 Q4, the branch (length 1.5 m) tilts about C with a 150 N load at the far end. The weight $$W$$ acts at distance $$x$$ from C. The support C is 0.24 m from one end. Write the moments equation about C.", "answer": "Clockwise: $$W \\cdot x$$. Anticlockwise: $$150 \\times (1.5 - 0.24) = 150 \\times 1.26 = 189$$. Equation (A): $$Wx = 189$$.", "source": "GLM 5.1 ①"}, {"id": "glm_2_12", "question": "For a branch tilting about D (so $$R_C = 0$$), with weight $$W$$ at distance $$0.9 - x$$ from D and a $$225 \\text{ N}$$ load at $$0.36 \\text{ m}$$ from D, what is the moments equation? (Tutor packet Q5 / official WME01 Q4)", "answer": "Clockwise moments = Anticlockwise moments. The 225 N load acts at 0.36 m (clockwise) and the weight $$W$$ acts at $$(0.9 - x)$$ (anticlockwise). So, $$225 \\times 0.36 = W(0.9 - x)$$, which gives $$81 = W(0.9 - x)$$. (Box this as equation B).", "source": "GLM 5.1 ②"}, {"id": "gpt56sol_1_6", "question": "Tutor packet Q1 / official WME01 Q2. Particle B has mass $$m$$, initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$ and final velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$. Using impulse as change in momentum, find the signed impulse on B and its magnitude.", "answer": "$$I_B=mv-mu=m(1.5)-m(-1.5)=3m\\ \\mathrm{N\\,s}.$$ The signed impulse is positive in the chosen direction, and its magnitude is $$3m\\ \\mathrm{N\\,s}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_41", "question": "NOT DISCUSSED — Tutor packet Q7 / official WME01 Q7 (7 marks), lift and two boxes. What official-reference answers are available, and what is their evidence boundary?", "answer": "NOT DISCUSSED. The question was not opened or discussed. OFFICIAL MS REFERENCE ONLY gives the combined mass of P and Q as $$5m$$ and the mass of P as $$2m$$. They are reference answers, not results produced live.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_5", "question": "Tutor packet Q1 / official WME01 Q2. In a direct collision, conservation of momentum gives $$3=4x+1$$. Particle A’s post-impact velocity is $$x$$ and particle B’s is $$x+1$$. Find and label both post-impact speeds.", "answer": "$$x=\\frac12$$, so A’s speed is $$\\frac12\\ \\mathrm{m\\,s^{-1}}$$ and B’s speed is $$\\frac32\\ \\mathrm{m\\,s^{-1}}$$. The values should be labelled because two unlabelled numbers do not identify the particles.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_11", "question": "Tutor packet Q2 / official WME01 Q1. A train’s speed–time graph is a trapezium of height $$20\\ \\mathrm{m\\,s^{-1}}$$. Its parallel horizontal sides have lengths $$180$$ and $$3T+180$$ seconds. The total distance is $$4.8\\ \\mathrm{km}$$. Form the area equation using $$A=\\frac12(a+b)h$$.", "answer": "First convert $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Then $$4800=\\frac12\\bigl(180+(3T+180)\\bigr)(20).$$ The area under a speed–time graph represents distance.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_3_0", "question": "An ESAT-style warm-up asks: how many different integers $$n$$ satisfy $$|2\\sqrt{n} - 7| < 1$$? What modulus inequality do you write first, and what is the count of integers?", "answer": "Write $$2\\sqrt{n} - 7 < 1$$, which unfolds to $$-1 < 2\\sqrt{n} - 7 < 1$$. Add 7 and divide by 2 to get $$3 < \\sqrt{n} < 4$$, then square to yield $$9 < n < 16$$. The integers are 10, 11, 12, 13, 14, 15. Count = $$15 - 10 + 1 = 6$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ③"}, {"id": "minimax_1_31", "question": "(Numerical style) State the lesson's rules on (i) the use of \"=\" versus \"≈\", (ii) when to take a magnitude, (iii) keeping unrounded intermediates, and (iv) final-unit policy.", "answer": "Use \"=\" for exact or calculated expressions and \"≈\" for rounded values; keep signed quantities until a magnitude is requested; keep an unrounded value (e.g. a ≈ 1.1838) for onward substitution before writing the final ≈ 1.18 m s⁻²; final mechanics answers must carry SI units.", "source": "MiniMax ①"}, {"id": "gpt56sol_1_37", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). What comparison should be made before assuming $$F=\\mu R$$ for a body that may remain at rest on a rough incline?", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Calculate the friction required for equilibrium and compare it with $$\\mu R$$. If the required friction is at most $$\\mu R$$, static friction can supply it; if it exceeds $$\\mu R$$, equilibrium is impossible.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_1_33", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the forces parallel to the plane are the 18 N component up, friction $$F_R$$ down, and the weight component down. Write Newton's 2nd law equation for the acceleration $$a$$.", "answer": "$$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "minimax_1_23", "question": "(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q3 / official Q3: speed at t = 2, angle to i at t = 2, and the value of T for direction 2i − 3j.", "answer": "Speed at t = 2: √45 ≈ 6.7 m s⁻¹. Angle to i at t = 2: 27° (or 333°, per the stated convention). T for direction 2i − 3j: 3.2. [Status: OFFICIAL MS REFERENCE ONLY / REVIEWED ONLY / DEFERRED.]", "source": "MiniMax ①"}, {"id": "glm_1_32", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the live board line read $$R - 2g \\sin 30^\\circ + 18 \\sin 40^\\circ = 0$$, which was incorrect. What is the correct perpendicular equilibrium equation?", "answer": "$$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "qwen_1_13", "question": "What is the specific lesson status of Tutor packet Q8 / official WME01 Q8 (parcel on rough inclined plane), and what does this status imply about the availability of the numerical solution?", "answer": "Status: LIVE SET-UP ONLY.\nOnly the force diagram and governing equations were reached during the lesson. The arithmetic elimination and final numerical answers were NOT completed live. Numerical values for this question in the guide are OFFICIAL MS REFERENCE ONLY.", "source": "Qwen ①"}, {"id": "gpt56sol_1_4", "question": "Tutor packet Q1 / official WME01 Q2. Particle A has mass $$3m$$ and initial velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$; particle B has mass $$m$$ and initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$. After their direct collision, their velocities are modelled as $$x$$ and $$x+1$$ respectively. Use conservation of linear momentum to form the governing equation.", "answer": "Conservation of linear momentum gives $$(3m)(1.5)+m(-1.5)=3mx+m(x+1).$$ Cancelling $$m$$ produces $$4.5-1.5=3x+x+1$$, or $$3=4x+1$$.", "source": "GPT-5.6 Sol ①"}, {"id": "minimax_2_10", "question": "On the same train question, why is the constant-speed phase shown to last from *T* to *T* + 180 and not from 0 to 180? Give a numeric check using *T* = 40.", "answer": "Because 180 s is the duration of the constant-speed phase, not its end-time measured from the origin. Starting the clock again at *T* gives the end at *T* + 180 = 220 s. The full run ends at 3*T* + 180 = 300 s, so the constant-speed phase lasts 220 − 40 = 180 s, as required.", "source": "MiniMax ②"}, {"id": "gpt56sol_2_5", "question": "Tutor packet Q1 / official WME01 Q2. Two particles collide directly along a line. Particle A has mass $$3m$$ and particle B has mass $$m$$. Initially, A moves at $$1.5\\ \\mathrm{m\\,s^{-1}}$$ and B approaches it at the same speed. Taking A’s initial direction as positive, what signed initial velocities must be used in conservation of momentum?", "answer": "Use $$u_A=+1.5\\ \\mathrm{m\\,s^{-1}}$$ and $$u_B=-1.5\\ \\mathrm{m\\,s^{-1}}.$$ “Approach each other” means their velocities have opposite signs under one fixed sign convention.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_3_30", "question": "Why does the official WME01 January 2023 paper require a dual-numbering system with the tutor's practice packet?", "answer": "The packet re-ordered questions relative to the official paper. Packet Q1 is official Q2; packet Q2 is official Q1; packet Q5 is official Q4. Using only official numbering would contradict the packet actually worked from.", "source": "GLM 5.1 ③"}, {"id": "glm_3_17", "question": "For Tutor packet Q8 / official WME01 Q8, a $$2 \\text{ kg}$$ parcel lies on a rough plane inclined at $$30^\\circ$$. An $$18 \\text{ N}$$ force acts at $$40^\\circ$$ to the plane. How do you resolve the $$18 \\text{ N}$$ force into components relative to the plane?", "answer": "Parallel up the plane: $$18 \\cos 40^\\circ$$. Perpendicular away from the plane: $$18 \\sin 40^\\circ$$. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "qwen_1_40", "question": "In Tutor packet Q1 / official WME01 Q2, what sign convention was established for the conservation of momentum equation?", "answer": "Status: COMPLETED WITH PROMPTING.\nA's initial direction was taken as POSITIVE.\nTherefore:\n$v_{A,initial} = +1.5$\n$v_{B,initial} = -1.5$ (approaching A)\nConsistency in this sign convention is critical for obtaining the correct $x$.", "source": "Qwen ①"}, {"id": "gpt56sol_1_14", "question": "Tutor packet Q2 / official WME01 Q1. On a speed–time graph, what do the area under the graph and the gradient represent?", "answer": "The area represents distance travelled when speed is plotted, while the gradient represents acceleration. Dimensionally, $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$ and $$(\\mathrm{m\\,s^{-1}})/\\mathrm s=\\mathrm{m\\,s^{-2}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "qwen_1_9", "question": "For Tutor packet Q5 / official WME01 Q4, a branch of length $1.5 \\text{ m}$ has supports C ($0.24 \\text{ m}$ from left end) and D ($0.36 \\text{ m}$ from right end). In the scenario tilting about C with a $150 \\text{ N}$ load applied at the right end, write the moment equation about C. Let $W$ be the branch weight acting at distance $x$ from C. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nTilting about C implies $R_D = 0$.\nDistance from C to right end = $1.5 - 0.24 = 1.26 \\text{ m}$.\nTaking moments about C (Clockwise = Anticlockwise):\n$W \\cdot x = 150 \\cdot (1.26)$\n$Wx = 189$  (Equation A)", "source": "Qwen ①"}, {"id": "glm_3_31", "question": "What is the difference between \"LIVE SET-UP ONLY\" and \"COMPLETED WITH PROMPTING\"?", "answer": "\"Live set-up only\" means the diagram and governing equations were reached live but the arithmetic/final answer was not finished. \"Completed with prompting\" means the question was worked through to the requested answer during the lesson with tutor help.", "source": "GLM 5.1 ③"}, {"id": "qwen_1_12", "question": "In Tutor packet Q5 / official WME01 Q4, after finding $x = 0.63 \\text{ m}$, how is the weight $W$ determined using Equation A ($Wx = 189$)? Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nSubstitute $x = 0.63$ into $Wx = 189$:\n$W = \\frac{189}{0.63} = 300 \\text{ N}$.\nCare must be taken with back-substitution arithmetic to avoid errors.", "source": "Qwen ①"}, {"id": "gpt56sol_1_42", "question": "For Edexcel IAL Mechanics M1, which core results used in this lesson must candidates know because no additional M1 formulae are printed for them?", "answer": "Candidates must know momentum $$p=mv$$; impulse $$I=mv-mu$$; the five constant-acceleration equations; Newton’s laws; the friction relations $$F=\\mu R$$ at limiting equilibrium and generally $$F\\leq\\mu R$$; and the principle of moments.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_28", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. For a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ rough plane, an $$18\\ \\mathrm N$$ force acts at $$40^\\circ$$ above the plane. Taking up the plane as positive, with friction magnitude $$F_R$$ opposing the upward motion, form Newton’s second-law equation parallel to the plane.", "answer": "LIVE SET-UP ONLY. $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a.$$ The parallel forces are not balanced; their resultant equals mass times acceleration.", "source": "GPT-5.6 Sol ①"}, {"id": "qwen_1_26", "question": "In Tutor packet Q1 / official WME01 Q2, why is it necessary to explicitly label calculated speeds as \"$v_A$\" and \"$v_B$\" rather than just listing two numbers?", "answer": "Status: COMPLETED WITH PROMPTING.\nThe question asks for the speeds of specific particles. Two unlabelled numbers are ambiguous and may not receive full credit. Explicit labelling ensures the examiner knows which speed corresponds to which particle.", "source": "Qwen ①"}, {"id": "glm_3_4", "question": "Using conservation of momentum for Tutor packet Q1 / official WME01 Q2, the equation is $$4.5m - 1.5m = 3mx + m(x+1)$$. Solve for $$x$$ and state both speeds.", "answer": "$$3 = 4x + 1 \\implies 4x = 2 \\implies x = 0.5$$. Speed of A is $$0.5 \\text{ m s}^{-1}$$; speed of B is $$x+1 = 1.5 \\text{ m s}^{-1}$$. Always label which speed belongs to which particle. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "minimax_2_6", "question": "For packet Q2 / official WME01 Q1 (train speed–time graph, 10 marks), the train accelerates from rest to 20 m s⁻¹, runs at 20 m s⁻¹ for 180 s, then decelerates to rest. The magnitude of the acceleration is twice the magnitude of the deceleration. If the acceleration phase lasts *T* seconds, write the three time markers along the base of the speed–time graph.", "answer": "Acceleration ends at *t* = *T*. The constant-speed phase runs from *T* to *T* + 180. The deceleration phase lasts twice as long (because *a* = 2*d*), so it takes 2*T* and ends at *T* + 180 + 2*T* = 3*T* + 180. Hence the markers are *T*, *T* + 180 and 3*T* + 180.", "source": "MiniMax ②"}, {"id": "glm_2_33", "question": "What was the lesson status of Packet Q6 (boat pulled by two ropes) and Packet Q7 (lift and two boxes)? (Packet Q6 / official WME01 Q6 & Packet Q7 / official WME01 Q7 — NOT DISCUSSED)", "answer": "Both were NOT DISCUSSED. They were not opened or discussed in the lesson at all.", "source": "GLM 5.1 ②"}, {"id": "gpt56sol_1_0", "question": "ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, the difference between $$2\\sqrt n$$ and $$7$$ is less than $$1$$. Translate this condition into a single modulus inequality and then into a compound inequality.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. Write $$|2\\sqrt n-7|<1$$, hence $$-1<2\\sqrt n-7<1$$. The modulus is required because “difference” means the non-negative size of the gap.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_2_28", "question": "Which Pure Maths prerequisite formula was required for the train speed–time graph question, and what is the formula? (Formula and result availability)", "answer": "The area of a trapezium: $$A = \\frac{1}{2}(a + b)h$$, where $$a$$ and $$b$$ are the lengths of the parallel sides and $$h$$ is the height (perpendicular distance between them).", "source": "GLM 5.1 ②"}, {"id": "glm_1_29", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a parcel of mass 2 kg rests on a plane inclined at $$30^\\circ$$. How do you resolve the weight $$2g$$ into components parallel and perpendicular to the plane?", "answer": "Parallel (down the plane): $$2g \\sin 30^\\circ$$. Perpendicular (into the plane): $$2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_1_15", "question": "Tutor packet Q2 / official WME01 Q1. Why must a stated distance of $$4.8\\ \\mathrm{km}$$ be converted before equating it to the area under a speed–time graph whose axes use seconds and $$\\mathrm{m\\,s^{-1}}$$?", "answer": "The graph’s area is measured in $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$, so use $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Equating $$4.8$$ directly to the area would mix kilometres with metres.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_1_1", "question": "In the ESAT-style warm-up (ESAT-STYLE WARM-UP — NOT WME01), how do you unfold the modulus inequality $$|2\\sqrt{n} - 7| < 1$$ into a three-part chain on a number line?", "answer": "Unfold it as $$-1 < 2\\sqrt{n} - 7 < 1$$. (ESAT-STYLE WARM-UP — NOT WME01)", "source": "GLM 5.1 ①"}, {"id": "minimax_2_13", "question": "In scenario 2 (225 N about D, so *R*_C = 0), write the moment equation about D in the form *W*(0.9 − *x*) = 81, justifying each distance.", "answer": "The 225 N load is at the far end, 0.36 m from D. Moment of 225 about D is 225 × 0.36 = 81 (clockwise). *W* acts *x* from C; the distance from C to D is 1.5 − 0.24 − 0.36 = 0.9 m, so *W* is (0.9 − *x*) from D on the other side. Equating gives 81 = (0.9 − *x*)*W*.", "source": "MiniMax ②"}, {"id": "minimax_1_27", "question": "(Lesson-status labelling rule) Why must the ESAT-style warm-up never be labelled as an M1 or WME01 question, and what is the correct status pill for any WME01 item whose answer came only from the official mark scheme after the lesson?", "answer": "The warm-up is explicitly outside the WME01 syllabus and is labelled ESAT-STYLE WARM-UP — NOT WME01 throughout. Items whose answers came only from the mark scheme are OFFICIAL MS REFERENCE ONLY and must never be presented as live tutorial work.", "source": "MiniMax ①"}, {"id": "minimax_2_11", "question": "For packet Q5 / official WME01 Q4 (moments and tilting, 8 marks), a non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m from one end and 0.36 m from the other. State the two \"on the point of tilting\" rules that turn this problem into equations, and name which support goes to zero in each case.", "answer": "\"On the point of tilting about C\" ⇒ reaction at D vanishes, *R*_D = 0. \"On the point of tilting about D\" ⇒ reaction at C vanishes, *R*_C = 0. A force acting through the pivot (or a zero reaction) has zero moment about that pivot, so it can be omitted from the moment equation.", "source": "MiniMax ②"}, {"id": "glm_1_31", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the Student said the perpendicular forces were \"balanced vertically\". What is the correct directional phrasing, and why?", "answer": "Say \"balanced perpendicular to the plane\". \"Vertically\" means up/down relative to the ground, which is not the resolving direction for an inclined-plane force diagram. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_2_2", "question": "ESAT-STYLE WARM-UP — NOT WME01. If $$n$$ is an integer satisfying $$9<n<16,$$ which values are permitted, and how many are there?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. The permitted integers are $$n\\in\\{10,11,12,13,14,15\\}.$$ Inclusive counting gives $$15-10+1=6$$ integers.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_1_24", "question": "For Tutor packet Q5 / official WME01 Q4, what layout strategy helps avoid sign errors when writing moments equations?", "answer": "Put clockwise moments on one side of the equation and anticlockwise moments on the other, rather than using a single long signed sum.", "source": "GLM 5.1 ①"}, {"id": "minimax_2_7", "question": "The total distance travelled by the train above is 4.8 km. Set up the area-of-a-trapezium equation, use the trapezium formula *A* = ½(*a* + *b*)*h*, and solve for *T*. State clearly what *a*, *b*, *h* are on the graph and why the km must be converted before equating.", "answer": "The region under the graph is a trapezium with parallel-side times *a* = 180 and *b* = 3*T* + 180 and height *h* = 20 m s⁻¹. *A* = ½(180 + 3*T* + 180)(20) = (3*T* + 360)(10) = 4800. So 3*T* = 120 and *T* = 40 s. The conversion to 4800 m is essential because the *h* = 20 is in m s⁻¹ and the *a*, *b* are in seconds — the area must be in metres.", "source": "MiniMax ②"}, {"id": "gpt56sol_1_31", "question": "LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Why is the claim “friction can never exceed the applied component, so the acceleration must be up the slope” not a valid general method?", "answer": "LIVE SET-UP ONLY. Acceleration direction must be determined from the net resolved force, including the applied force, friction and the component of weight. Friction is governed by contact and the friction law, not by a universal comparison with the applied component.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_2_10", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in time $$T$$. The magnitude of its acceleration is twice the magnitude of its later deceleration to rest. How long does the deceleration last?", "answer": "For the same speed change, time is inversely proportional to acceleration magnitude. Since the acceleration magnitude is twice the deceleration magnitude, the deceleration takes twice as long: $$2T.$$", "source": "GPT-5.6 Sol ②"}, {"id": "minimax_1_35", "question": "(Tilting rule) State, without reference to the numerical problem, the two algebraic consequences of \"about to tilt\" that turn a moments problem into a one-equation solve.", "answer": "Tilting about C implies R_D = 0, and tilting about D implies R_C = 0. A force whose line of action passes through the chosen pivot then contributes zero moment about that pivot and need not be written into the equation.", "source": "MiniMax ①"}, {"id": "gpt56sol_2_9", "question": "Tutor packet Q1 / official WME01 Q2. When finding the magnitude of an impulse, at what stage should signs be retained, and how should the final answer be presented?", "answer": "Retain signed velocities while calculating $$I=mv-mu.$$ Take the magnitude only after finding the signed impulse. A requested magnitude is reported as a positive quantity with units, for example $$3m\\ \\mathrm{N\\,s},$$ without leaving modulus bars in the final answer.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_2_17", "question": "When resolving forces on an inclined plane, a student said the perpendicular forces were \"balanced vertically\". Why is this phrasing wrong, and what should you say instead? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "\"Vertically\" means up and down, which is not the resolving direction for an inclined plane. You must say the forces are \"balanced perpendicular to the plane\". The parallel forces are not balanced; Newton's second law applies along the plane.", "source": "GLM 5.1 ②"}, {"id": "gpt56sol_2_19", "question": "Tutor packet Q5 / official WME01 Q4. Supports C and D are $$1.5-0.24-0.36=0.9\\ \\mathrm{m}$$ apart. The branch’s weight $$W$$ acts at distance $$x$$ from C. At limiting tilt about D, a $$225\\ \\mathrm{N}$$ load has moment arm $$0.36\\ \\mathrm{m}$$. Form the moments equation about D.", "answer": "The weight is $$0.9-x$$ metres from D. Equating opposite moments gives $$225(0.36)=W(0.9-x),$$ so $$81=W(0.9-x).$$", "source": "GPT-5.6 Sol ②"}, {"id": "glm_1_7", "question": "For Tutor packet Q1 / official WME01 Q2, particle B (mass $$m$$) changes velocity from $$-1.5 \\text{ m s}^{-1}$$ to $$1.5 \\text{ m s}^{-1}$$ (positive direction is A's initial direction). Write the expression for the impulse exerted on B.", "answer": "$$I_B = m(v_B - u_B) = m(1.5 - (-1.5)) = 3m \\text{ N s}$$.", "source": "GLM 5.1 ①"}, {"id": "glm_1_14", "question": "For Tutor packet Q2 / official WME01 Q1, before equating the trapezium area (in metres) to the total distance, what unit conversion must be applied to 4.8 km?", "answer": "Convert kilometres to metres: $$4.8 \\text{ km} = 4800 \\text{ m}$$.", "source": "GLM 5.1 ①"}, {"id": "qwen_1_5", "question": "In Tutor packet Q2 / official WME01 Q1, once $T=40 \\text{ s}$ is found for the acceleration phase reaching $20 \\text{ m s}^{-1}$ from rest, how is the initial acceleration calculated? Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nAcceleration is the gradient of the speed–time graph during the first phase.\n$a = \\frac{\\Delta v}{\\Delta t} = \\frac{20 - 0}{40} = 0.5 \\text{ m s}^{-2}$.", "source": "Qwen ①"}, {"id": "gpt56sol_1_36", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). After the $$18\\ \\mathrm N$$ force is removed, a $$2\\ \\mathrm{kg}$$ parcel is instantaneously at rest on a $$30^\\circ$$ rough plane with $$\\mu=0.3$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$. Determine whether friction can keep it at rest.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. $$R=2g\\cos30^\\circ\\approx16.974\\ \\mathrm N$$, so $$F_{\\max}=\\mu R\\approx5.09\\ \\mathrm N$$. The downslope weight component is $$2g\\sin30^\\circ=9.8\\ \\mathrm N$$. Since $$9.8>5.09$$, friction cannot hold it; the parcel does not remain at rest.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_2_19", "question": "What is the equation of motion for the $$2 \\text{ kg}$$ parcel parallel to the plane, using $$a$$ for acceleration? (Tutor packet Q8 / official WME01 Q8 — LIVE SET-UP ONLY)", "answer": "Net force parallel to the plane = mass $$\\times$$ acceleration. Taking up the slope as positive: $$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$$.", "source": "GLM 5.1 ②"}, {"id": "gpt56sol_2_11", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates for $$T$$ seconds, travels at constant speed for $$180$$ seconds, and decelerates for $$2T$$ seconds. What are the three transition times measured from the start?", "answer": "The acceleration ends at $$T$$, the constant-speed phase ends at $$T+180$$, and the train stops at $$T+180+2T=3T+180.$$ A common trap is to mark the end of the constant phase at $$180$$ rather than $$T+180.$$", "source": "GPT-5.6 Sol ②"}, {"id": "qwen_1_21", "question": "In Tutor packet Q5 / official WME01 Q4, when setting up moment equations for tilting problems, what structural formatting strategy is recommended to avoid sign errors?", "answer": "Separate clockwise and anticlockwise moments onto opposite sides of the equation (e.g., CW = ACW) rather than summing signed moments to zero.\nAlso, box and label key equations (e.g., Eq A, Eq B) to facilitate clean combination later.", "source": "Qwen ①"}, {"id": "glm_3_8", "question": "To find $$T$$ for the train in Tutor packet Q2 / official WME01 Q1, you equate the area under the speed–time graph to the total distance $$4.8 \\text{ km}$$. What Pure prerequisite formula is used for the area, and what must you do with the distance unit?", "answer": "Use the trapezium area formula $$A = \\frac{1}{2}(a+b)h$$. The parallel sides are $$a=180$$ and $$b=3T+180$$, and the height is $$h=20$$. You must convert $$4.8 \\text{ km}$$ to $$4800 \\text{ m}$$ before equating. (Tutor packet Q2 / official WME01 Q1)", "source": "GLM 5.1 ③"}, {"id": "minimax_2_12", "question": "In the two tilting scenarios the branch is loaded with 150 N (scenario 1) and 225 N (scenario 2). Using *W* at distance *x* from C, write the moment equation in scenario 1 by taking moments about C (so *R*_D = 0). Use L = 1.5 m, C-offset = 0.24 m.", "answer": "Clockwise moments = anticlockwise moments about C. The 150 N load acts at the end of the branch, 1.5 − 0.24 = 1.26 m from C. *W* acts *x* from C on the opposite side: *W x* = 150 × 1.26 = 189. This is equation (A) in the guide.", "source": "MiniMax ②"}, {"id": "gpt56sol_2_13", "question": "Tutor packet Q2 / official WME01 Q1. Solve the speed–time graph equation $$4800=\\frac12\\bigl[180+(3T+180)\\bigr](20)$$ for $$T$$, including units.", "answer": "$$4800=10(3T+360)\\implies 480=3T+360\\implies 3T=120.$$ Therefore, $$T=40\\ \\mathrm{s}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "glm_1_30", "question": "For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a force of 18 N acts on the parcel at $$40^\\circ$$ to the inclined plane (upwards from the plane). How do you resolve this force?", "answer": "Parallel (up the plane): $$18 \\cos 40^\\circ$$. Perpendicular (away from the plane): $$18 \\sin 40^\\circ$$. (LIVE SET-UP ONLY)", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_2_4", "question": "ESAT-STYLE WARM-UP — NOT WME01. What is the efficient trigger when a prompt says that the “difference” between two real quantities is less than a positive number?", "answer": "ESAT-STYLE WARM-UP — NOT WME01. Translate the size of the difference into a modulus inequality: $$|A-B|<c.$$ Then unfold it as $$-c<A-B<c.$$ This avoids unnecessary separate cases or rearrangements that make the expression more complicated.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_3_12", "question": "In Scenario 1 of Tutor packet Q5 / official WME01 Q4, taking moments about C yields $$Wx = 150(1.5 - 0.24)$$. What distance $$1.5 - 0.24$$ represents, and what is its value?", "answer": "It is the perpendicular distance from pivot C to the line of action of the 150 N force at the end of the branch. Its value is $$1.26 \\text{ m}$$. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "glm_2_30", "question": "What was the lesson status of Packet Q3 (constant-acceleration vectors) and Packet Q4 (vehicle SUVAT), and were any tutorial solutions produced for them? (Packet Q3 / official WME01 Q3 & Packet Q4 / official WME01 Q5 — REVIEWED ONLY / DEFERRED)", "answer": "Both were REVIEWED ONLY / DEFERRED. They were looked at and commented on, but not re-worked in the lesson. No tutorial solution was produced live for either.", "source": "GLM 5.1 ②"}, {"id": "minimax_1_5", "question": "(Packet Q1 / official WME01 Q2) Why is the post-collision speed of B not just left as the algebraic expression \"x + 1\" when answering the paper, and which particle's impulse is the one that must be evaluated?", "answer": "The question asks for the speeds of A and B explicitly, so both must be written as numerical values with units and labels. The impulse requested is on B, computed as B's change in momentum m(v_B − u_B).", "source": "MiniMax ①"}, {"id": "minimax_1_38", "question": "(Sign convention trap, collisions) In a direct collision, taking A's initial direction as positive, both particles \"approach each other at 1.5 m s⁻¹\". Why is the initial momentum of B written as m(−1.5) rather than m(+1.5)?", "answer": "Because B moves opposite to the chosen positive direction (it approaches A). Initial momentum must be signed with respect to the same axis used for the post-collision speeds.", "source": "MiniMax ①"}, {"id": "gpt56sol_2_39", "question": "For Edexcel IAL Mechanics M1, which mechanics results used in this lesson must be known because no additional M1 formulae are printed for candidates?", "answer": "Candidates are expected to know momentum $$p=mv$$, impulse $$I=mv-mu$$, the five constant-acceleration SUVAT formulae, Newton’s laws, the friction model $$F\\leq\\mu R$$ with $$F=\\mu R$$ at limiting friction, and the principle of moments.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_7", "question": "Tutor packet Q1 / official WME01 Q2. In a direct collision, the post-impact velocities are modelled as $$v_A=x$$ and $$v_B=x+1$$, where conservation of momentum gives $$x=0.5\\ \\mathrm{m\\,s^{-1}}$$. State the speed of each particle and explain why the labels matter.", "answer": "$$\\text{Speed of A}=0.5\\ \\mathrm{m\\,s^{-1}},\\qquad \\text{speed of B}=1.5\\ \\mathrm{m\\,s^{-1}}.$$ The numbers must be attached to A and B; two unlabelled speeds may not identify which result belongs to which particle.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_1_18", "question": "Tutor packet Q5 / official WME01 Q4. A force acts through the pivot in a moments problem. What is its moment about that pivot?", "answer": "Its moment is zero because its perpendicular distance from the pivot is zero: $$M=F d_\\perp=0.$$ It therefore need not appear in the moment equation about that pivot.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_8", "question": "Tutor packet Q1 / official WME01 Q2. What conservation principle is triggered by a direct collision of two particles when calculating their velocities immediately before and after impact?", "answer": "Use conservation of total linear momentum along the line of motion: $$m_Au_A+m_Bu_B=m_Av_A+m_Bv_B.$$ Choose one positive direction and assign every velocity its corresponding sign.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_9", "question": "Tutor packet Q2 / official WME01 Q1 (10 marks: part (a) 3, part (b) 5, part (c) 2). A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$T$$ seconds, travels at that speed for $$180$$ seconds, then decelerates uniformly to rest. The acceleration magnitude is twice the deceleration magnitude. Show why the deceleration phase lasts $$2T$$.", "answer": "The speed change has magnitude $$20\\ \\mathrm{m\\,s^{-1}}$$ in both phases. If the initial acceleration is $$a=20/T$$, the deceleration magnitude is $$a/2$$. Its duration is therefore $$20/(a/2)=2(20/a)=2T$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_44", "question": "In mechanics calculations, how should exact and rounded values be carried through linked parts?", "answer": "Retain the unrounded value for onward substitution, use $$=$$ for exact or directly calculated expressions, and use $$\\approx$$ only for rounded values. For example, carry $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$ before reporting $$a\\approx1.18\\ \\mathrm{m\\,s^{-2}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_1_21", "question": "Tutor packet Q5 / official WME01 Q4. Two tilting scenarios give $$Wx=189$$ and $$W(0.9-x)=81$$, where $$W$$ is in newtons and $$x$$ in metres. What efficient operation eliminates $$W$$?", "answer": "Divide the equations: $$\\frac{Wx}{W(0.9-x)}=\\frac{189}{81},$$ giving $$\\frac{x}{0.9-x}=\\frac73.$$ Division is efficient because the common unknown $$W$$ cancels immediately.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_3_21", "question": "The tutor claimed friction \"only exists because\" of the applied pull and can therefore never exceed it. Is this a valid general rule for deciding the direction of acceleration?", "answer": "No. The direction of acceleration must be decided from the net resolved force along the plane, including gravity. The net force may be up or down the slope regardless of the applied pull. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)", "source": "GLM 5.1 ③"}, {"id": "gpt56sol_1_45", "question": "What units should accompany the principal mechanics quantities used in this lesson: speed, acceleration, force, impulse, distance and moment?", "answer": "Speed: $$\\mathrm{m\\,s^{-1}}$$; acceleration: $$\\mathrm{m\\,s^{-2}}$$; force: $$\\mathrm N$$; impulse: $$\\mathrm{N\\,s}$$; distance: $$\\mathrm m$$; moment: $$\\mathrm{N\\,m}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_2_14", "question": "Tutor packet Q2 / official WME01 Q1. A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$40\\ \\mathrm{s}$$. How is its initial acceleration obtained from the speed–time graph?", "answer": "Acceleration is the graph’s gradient: $$a=\\frac{\\Delta v}{\\Delta t}=\\frac{20-0}{40}=0.5\\ \\mathrm{m\\,s^{-2}}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_1_34", "question": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. Tutor packet Q8 / official WME01 Q8(a). For a $$2\\ \\mathrm{kg}$$ parcel, use $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a$$ with $$F_R\\approx1.6212\\ \\mathrm N$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$ to find the acceleration.", "answer": "OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. $$2a\\approx13.7888-1.6212-9.8=2.3676,$$ so $$a\\approx1.1838\\ \\mathrm{m\\,s^{-2}}$$, reported as $$1.18\\ \\mathrm{m\\,s^{-2}}$$ or approximately $$1.2\\ \\mathrm{m\\,s^{-2}}$$. The positive sign means up the plane.", "source": "GPT-5.6 Sol ①"}, {"id": "minimax_1_33", "question": "(Sanity check on direct collisions) Before solving a two-particle direct-collision problem, list the three \"set-up habits\" the lesson identified as essential, and the one labelling habit that earns full marks.", "answer": "(1) Highlight the key words; (2) draw before/after diagrams; (3) fix a sign convention (take one particle's initial direction as positive); (4) label the requested particle (e.g. \"speed of A\", \"speed of B\") with units so two unlabelled numbers do not lose marks.", "source": "MiniMax ①"}, {"id": "glm_1_47", "question": "An earlier version of the guide claimed a specific mis-drawn peak value (e.g., \"30\") for Tutor packet Q2 / official WME01 Q1. What does the evidence actually support about the peak label?", "answer": "The evidence supports only that a temporary peak label was corrected to the printed $$20 \\text{ m s}^{-1}$$$. Do not state a specific mis-drawn value such as \"30\".", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_1_40", "question": "NOT DISCUSSED — Tutor packet Q6 / official WME01 Q6 (8 marks), boat pulled by two ropes. What official-reference answers are available, and what must not be inferred about the lesson?", "answer": "NOT DISCUSSED. The question was not opened or discussed. OFFICIAL MS REFERENCE ONLY gives rope angle $$\\alpha\\approx31.9^\\circ$$ and tension $$P\\approx609\\ \\mathrm N$$, with $$610\\ \\mathrm N$$ or better accepted. These values must not be described as lesson work.", "source": "GPT-5.6 Sol ①"}, {"id": "gpt56sol_2_40", "question": "In the train speed–time problem, what formula is a Pure Mathematics prerequisite rather than an additionally printed M1 formula, and how is it written?", "answer": "The area of a trapezium is the P1/P2 prerequisite formula $$A=\\frac12(a+b)h,$$ where $$a$$ and $$b$$ are the parallel-side lengths and $$h$$ is their perpendicular separation.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_1_9", "question": "For Tutor packet Q1 / official WME01 Q2, why must you explicitly state which calculated speed belongs to which particle (e.g., \"speed of A\", \"speed of B\")?", "answer": "Two unlabelled numbers may not fully answer the question; the examiner needs to know which particle has which speed.", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_1_1", "question": "ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, solve $$|2\\sqrt n-7|<1$$, stating how strict endpoints affect the solution set.", "answer": "ESAT-STYLE WARM-UP — NOT WME01. $$-1<2\\sqrt n-7<1$$ gives $$6<2\\sqrt n<8$$, then $$3<\\sqrt n<4$$. Since all terms are non-negative, squaring preserves the inequalities: $$9<n<16$$. The strict inequalities exclude $$9$$ and $$16$$, so $$n\\in\\{10,11,12,13,14,15\\}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "minimax_1_9", "question": "(Packet Q2 / official Q1) A learner writes the area equation as 4800 = ½(180)(3T + 180)(20) instead of ½(180 + (3T + 180))(20). What conceptual mistake does this reveal, and which side of the trapezium does the 3T + 180 represent?", "answer": "They have multiplied the two parallel sides instead of adding them; the two parallel sides of a trapezium add, they do not multiply. 3T + 180 is the length of the bottom base (from t = 0 to t = 3T + 180), and 180 is the length of the top base (the duration at 20 m s⁻¹).", "source": "MiniMax ①"}, {"id": "glm_1_26", "question": "For Tutor packet Q5 / official WME01 Q4, the branch tilts about D with a 225 N load at the other end (0.36 m from it). The weight $$W$$ acts at distance $$x$$ from C. The supports C and D are separated by $$0.9 \\text{ m}$$ (since $$1.5 - 0.24 - 0.36 = 0.9$$). Write the moments equation about D.", "answer": "Clockwise: $$225 \\times 0.36 = 81$$. Anticlockwise: $$W \\times (0.9 - x)$$. Equation (B): $$81 = W(0.9 - x)$$.", "source": "GLM 5.1 ①"}, {"id": "gpt56sol_1_3", "question": "Tutor packet Q1 / official WME01 Q2 (8 marks: part (a) 5, part (b) 3). Two particles collide directly along a line. Particle A has mass $$3m$$ and particle B has mass $$m$$. Before impact, each has speed $$1.5\\ \\mathrm{m\\,s^{-1}}$$ and they move towards one another. If A’s initial direction is positive, what are their signed initial velocities?", "answer": "A has velocity $$u_A=+1.5\\ \\mathrm{m\\,s^{-1}}$$ and B has velocity $$u_B=-1.5\\ \\mathrm{m\\,s^{-1}}$$. Opposing motions must have opposite signs even though both speeds are positive.", "source": "GPT-5.6 Sol ①"}, {"id": "minimax_1_13", "question": "(Packet Q5 / official Q4) Given Wx = 189 and W(0.9 − x) = 81, find the cancellation strategy and solve for x and W.", "answer": "Divide the first equation by the second to cancel W: x / (0.9 − x) = 189 / 81 = 7/3, so 3x = 7(0.9 − x) = 6.3 − 7x, giving 10x = 6.3 and x = 0.63 m. Then W = 189 / 0.63 = 300 N.", "source": "MiniMax ①"}, {"id": "gpt56sol_2_22", "question": "Tutor packet Q5 / official WME01 Q4. What moments-equation layout reduces sign errors in a two-scenario tilting problem?", "answer": "Draw each tilting scenario separately, identify the active pivot and zero reaction, and place clockwise moments on one side and anticlockwise moments on the other. Box and label the resulting equations before combining them. This is safer than writing one long signed sum.", "source": "GPT-5.6 Sol ②"}, {"id": "gpt56sol_2_35", "question": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(a–b), vehicle SUVAT from P to Q to R. What two official-reference results are listed?", "answer": "REVIEWED ONLY / DEFERRED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q4 / official WME01 Q5(a–b). The listed results are $$x=3u$$ for the required shown relation and $$u=9\\ \\mathrm{m\\,s^{-1}}.$$ Neither subpart was re-worked live.", "source": "GPT-5.6 Sol ②"}, {"id": "glm_3_11", "question": "A non-uniform branch of length $$1.5 \\text{ m}$$ rests on supports C and D. In one scenario, it is \"on the point of tilting about C\". What fundamental conclusion does this give about the reaction force at D, and how does it simplify your moments equation?", "answer": "The reaction force at D becomes zero ($$R_D = 0$$). A force through the pivot (and a zero reaction) has no moment about that pivot, so $$R_D$$ is eliminated from the moments equation about C. (Tutor packet Q5 / official WME01 Q4)", "source": "GLM 5.1 ③"}, {"id": "qwen_1_15", "question": "For Tutor packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), write the governing equation parallel to the plane relating acceleration $a$, friction $F_R$, and the applied force components.", "answer": "Status: LIVE SET-UP ONLY.\nApplying Newton's Second Law parallel to the plane (up the plane positive):\n$18 \\cos 40^\\circ - F_R - 2g \\sin 30^\\circ = 2a$\nNote: Friction $F_R$ opposes motion. The weight component $2g \\sin 30^\\circ$ acts down the plane.", "source": "Qwen ①"}, {"id": "qwen_1_1", "question": "For Tutor packet Q1 / official WME01 Q2 (direct collision), particles A ($3m$) and B ($m$) approach each other at $1.5 \\text{ m s}^{-1}$. If A's initial direction is positive and post-collision speeds are defined as $v_A = x$ and $v_B = x+1$, write the conservation of linear momentum equation and solve for $x$. Status: COMPLETED WITH PROMPTING.", "answer": "Status: COMPLETED WITH PROMPTING.\nTaking A's initial direction as positive:\n$(3m)(1.5) + m(-1.5) = 3m(x) + m(x+1)$\n$4.5 - 1.5 = 3x + x + 1$\n$3 = 4x + 1 \\Rightarrow 4x = 2 \\Rightarrow x = 0.5$.\nThe speed of A after impact is $0.5 \\text{ m s}^{-1}$.", "source": "Qwen ①"}, {"id": "glm_3_3", "question": "After the collision in Tutor packet Q1 / official WME01 Q2, A moves at speed $$x$$ and B moves at speed $$x+1$$ in the positive direction. Why is the label $$x+1$$ used for B's speed?", "answer": "The problem states the difference in their speeds after impact is $$1 \\text{ m s}^{-1}$$. Assuming both move in the positive direction, B is faster, so its speed is A's speed plus 1. (Tutor packet Q1 / official WME01 Q2)", "source": "GLM 5.1 ③"}, {"id": "gpt56sol_2_29", "question": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. Using $$g=9.8\\ \\mathrm{m\\,s^{-2}},$$ find the normal reaction and limiting friction for a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ plane pulled by $$18\\ \\mathrm{N}$$ at $$40^\\circ$$ above the plane, where $$\\mu=0.3$$.", "answer": "OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. From $$R+18\\sin40^\\circ=2g\\cos30^\\circ,$$ $$R=19.6\\cos30^\\circ-18\\sin40^\\circ\\approx5.4039\\ \\mathrm{N}.$$ Thus $$F_R=0.3R\\approx1.6212\\ \\mathrm{N}.$$", "source": "GPT-5.6 Sol ②"}, {"id": "minimax_1_7", "question": "(Packet Q2 / official Q1) The total distance travelled is 4.8 km. Using the trapezium area formula A = ½(a + b)h with a = 180, b = 3T + 180, h = 20, set up the equation for the area and solve for T. State the unit conversion you must do first.", "answer": "Convert distance to metres: 4.8 km = 4800 m. Then 4800 = ½(180 + 3T + 180)(20), which reduces to 4800 = 10(3T + 360), giving 3T = 120, so T = 40 s.", "source": "MiniMax ①"}, {"id": "minimax_1_28", "question": "(Dual numbering rule) State the three items whose packet number differs from their official WME01 number, give each pair of labels, and explain how the dual numbering is established.", "answer": "Packet Q1 = official Q2 (collision and impulse); Packet Q2 = official Q1 (train speed–time graph); Packet Q5 = official Q4 (moments and tilting). The renumbering is fixed by the board images and page footers of the printed practice packet versus the official paper.", "source": "MiniMax ①"}, {"id": "gpt56sol_1_35", "question": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(b). A parcel moves with initial speed $$u=2\\ \\mathrm{m\\,s^{-1}}$$ over $$s=5\\ \\mathrm m$$ with constant acceleration $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$. Which SUVAT relation finds its speed at B, and what is that speed?", "answer": "OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Use $$v^2=u^2+2as$$ because time is not required. Then $$v^2=2^2+2(1.1838\\ldots)(5)\\approx15.838$$, so $$v\\approx3.98\\ \\mathrm{m\\,s^{-1}}$$, or approximately $$4.0\\ \\mathrm{m\\,s^{-1}}$$.", "source": "GPT-5.6 Sol ①"}, {"id": "glm_3_23", "question": "Official WME01 Q3 (packet Q3) was looked at but not re-worked in the lesson. What status does this item carry, and where must you find its answers (e.g., speed at $$t=2$$ is $$3\\sqrt{5}$$)?", "answer": "REVIEWED ONLY / DEFERRED. Answers are found in the official reference appendix, not from live work. (Tutor packet Q3 / official WME01 Q3)", "source": "GLM 5.1 ③"}, {"id": "minimax_1_11", "question": "(Packet Q5 / official Q4) In the tilting-about-C scenario an extra load of 150 N hangs at the far end. Using clockwise = anticlockwise moments about C and the branch length 1.5 m, write the moment equation and simplify to a single numerical equation for W and x.", "answer": "With R_D = 0 and the 150 N at the end of the branch, the distance from C to the load is 1.5 − 0.24 = 1.26 m. So W·x = 150 × 1.26 = 189, i.e. Wx = 189.", "source": "MiniMax ①"}, {"id": "gpt56sol_1_17", "question": "Tutor packet Q5 / official WME01 Q4. What happens to the reaction at C when a supported branch is on the point of tilting about D?", "answer": "At impending tilt about D, contact at C is just lost, so $$R_C=0$$. The remaining support D acts as the pivot.", "source": "GPT-5.6 Sol ①"}]};const SK='harry_m1_jan2023_ui_rebuild_v2';let cur='mysel';let selected=new Set();let cards=[];
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
function toast(s){const e=document.querySelector('.toast');e.textContent=s;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function save(){localStorage.setItem(SK,JSON.stringify([...selected]))}function rebuild(){const all=[...DATA.judge,...Object.values(DATA.models).flatMap(m=>m.cards)], map=new Map(all.map(c=>[c.id,c]));cards=[...selected].map(id=>map.get(id)).filter(Boolean)}function load(){try{selected=new Set(JSON.parse(localStorage.getItem(SK)||'[]'))}catch(e){selected=new Set()}rebuild()}
function view(){if(cur==='mysel')return cards;if(cur==='judge')return DATA.judge;return DATA.models[cur].cards}
function tabs(){let h=`<button class="tb ${cur==='mysel'?'mact':''}" data-tab="mysel">📌 My Selection (${cards.length})</button><button class="tb ${cur==='judge'?'jact':''}" data-tab="judge">✨ Judge (${DATA.judge.length})</button>`;for(const [id,m] of Object.entries(DATA.models)){const n=m.cards.filter(c=>selected.has(c.id)).length;h+=`<button class="tb ${cur===id?'act':''}" data-tab="${id}">${m.label} (${n}/${m.cards.length})</button>`}document.querySelector('.tabs').innerHTML=h}
function meta(){let a=cur==='mysel'?[['Final',cards.length+' cards'],['Judge base',DATA.judge.length+' picks'],['Runs','8 genuine runs']]:cur==='judge'?[['Judge picks',DATA.judge.length],['Policy','source-blind exact count'],['Route','GPT-5.6 Sol · medium']]:[['Run',DATA.models[cur].label],['Candidates',DATA.models[cur].cards.length],['Policy','current approved pool']];document.querySelector('.meta').innerHTML=a.map(x=>`<div><span class="ml">${x[0]}</span><span class="mv">${x[1]}</span></div>`).join('')}
function render(){const v=view(),list=document.querySelector('.cl'),showSource=!(cur==='mysel'||cur==='judge');document.querySelector('.sc').textContent=cards.length+' in My Selection';document.querySelector('.cc').textContent=v.length+' cards';if(!v.length){list.innerHTML='<div class="empty">No cards. Select from Judge or an individual run.</div>';return}list.innerHTML=v.map((c,i)=>{const yes=selected.has(c.id),source=showSource?`<span class="sb">${esc(c.source)}</span>`:'';return `<article class="cd ${yes?'':'ds'}" data-id="${c.id}"><div class="ct"><input class="cb" type="checkbox" aria-label="Add card ${i+1} to My Selection" ${yes?'checked':''}><div class="qw"><button class="q" aria-expanded="false" aria-controls="a-${i}">${esc(c.question)}</button></div></div><div class="a" id="a-${i}" hidden>${esc(c.answer).replace(/\n/g,'<br>')}<div class="cf">${source}<button class="cpb" data-copy="${i}">Copy card</button></div></div></article>`}).join('');typeset(list)}
function typeset(e){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([e])}function redraw(){rebuild();tabs();meta();render()}
document.querySelector('.tabs').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(!b)return;cur=b.dataset.tab;tabs();meta();render()});document.querySelector('.cl').addEventListener('change',e=>{if(!e.target.matches('.cb'))return;const id=e.target.closest('.cd').dataset.id;e.target.checked?selected.add(id):selected.delete(id);save();redraw()});document.querySelector('.cl').addEventListener('click',e=>{const q=e.target.closest('.q');if(q){const a=document.getElementById(q.getAttribute('aria-controls')),open=a.hidden;a.hidden=!open;q.setAttribute('aria-expanded',String(open));typeset(a);return}const b=e.target.closest('[data-copy]');if(b){const c=view()[Number(b.dataset.copy)];navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied card')).catch(()=>toast('Clipboard unavailable'))}});
function selectAll(){view().forEach(c=>selected.add(c.id));save();redraw();toast('All visible cards selected')}function deselectAll(){view().forEach(c=>selected.delete(c.id));save();redraw();toast('Visible cards deselected')}function resetJudge(){selected=new Set(DATA.judge.map(c=>c.id));save();redraw();toast('Reset to Judge')}function reveal(open){document.querySelectorAll('.q').forEach(q=>{const a=document.getElementById(q.getAttribute('aria-controls'));if(a.hidden===open)q.click()})}function shuffle(){const l=document.querySelector('.cl'),a=[...l.children];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}a.forEach(x=>l.append(x));toast('Shuffled')}function copyTable(){if(!cards.length){toast('My Selection is empty');return}const s='| Question | Answer |\n| --- | --- |\n'+cards.map(c=>'| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |').join('\n');navigator.clipboard.writeText(s).then(()=>toast(cards.length+' cards copied')).catch(()=>toast('Clipboard unavailable'))}function notion(){copyTable();toast('Notion-ready table copied to clipboard')}load();redraw();</script></body></html>
