th:19px;height:19px;accent-color:var(--blue);margin:5px 0 0;flex:none} .card-num{color:var(--muted);font-size:.79rem;font-weight:700;letter-spacing:.055em;margin:0 0 7px;text-transform:uppercase} .question{font-size:1.06rem;line-height:1.52;margin:0;overflow-wrap:anywhere} .answer{border-top:1px solid var(--line);background:rgba(0,122,255,.035);padding:20px 24px 23px;display:none;font-size:1rem;line-height:1.62;overflow-wrap:anywhere} .answer.show{display:block} .answer-label{color:var(--green);font-size:.76rem;font-weight:750;letter-spacing:.065em;text-transform:uppercase;margin-bottom:9px} .card-actions{display:flex;gap:8px;align-items:center;padding:0 24px 22px} .reveal{flex:1;text-align:left} .copy{padding-left:11px;padding-right:11px} .footer{color:var(--muted);font-size:.84rem;line-height:1.5;margin:28px 4px 0} @media(max-width:600px){.shell{padding:32px 14px 48px}.hero{display:block;margin-bottom:22px}.count{display:inline-block;margin-top:16px}.toolbar{top:6px;padding:9px;gap:7px}.toolbar .spacer{display:none}.btn{font-size:.84rem;padding:8px 10px}.selection{width:100%;padding:2px 4px 0;order:5}.card-head{padding:19px 17px 16px;gap:10px}.question{font-size:1rem}.answer{padding:17px;font-size:.97rem}.card-actions{padding:0 17px 17px}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}} @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

<script>
(() => {
  const DATA=[{"question":"In Tutor packet Q5 / official WME01 Q4, what is the distance between supports C and D given the branch length is $1.5 \\text{ m}$, C is $0.24 \\text{ m}$ from the left end, and D is $0.36 \\text{ m}$ from the right end?","answer":"Distance CD = Total Length - (Left Gap + Right Gap)\n$CD = 1.5 - (0.24 + 0.36) = 1.5 - 0.60 = 0.9 \\text{ m}$.\nThis distance is crucial for determining the moment arm of the weight $W$ relative to support D."},{"question":"Regarding the \"Closing Study Actions\", what is the status of the \"recurring weakness\" drill set mentioned in earlier guide versions?","answer":"It is INVALID and REMOVED.\nThe lesson did not assign specific M1 drills or identify a recurring weakness story.\nGenuine actions are limited to: Pure 2/3 baselines, reviewing a separate marked M1 homework, and revisiting that paper in mid-July."},{"question":"REVIEWED ONLY / DEFERRED — Tutor packet Q4 / official WME01 Q5 (9 marks), vehicle SUVAT through P–Q–R. What official-reference results are available, without claiming the lesson produced them?","answer":"REVIEWED ONLY / DEFERRED. No subpart was re-worked live. OFFICIAL MS REFERENCE ONLY results are: establish the given result $$x=3u$$; then $$u=9\\ \\mathrm{m\\,s^{-1}}$$; and the distance travelled in the first $$14\\ \\mathrm s$$ is $$201\\ \\mathrm m$$."},{"question":"In Tutor packet Q2 / official WME01 Q1 (train graph), a train accelerates from rest to $20 \\text{ m s}^{-1}$ in time $T$, runs at constant speed for $180 \\text{ s}$, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, express the total time of motion in terms of $T$. Status: COMPLETED WITH PROMPTING.","answer":"Status: COMPLETED WITH PROMPTING.\nSince $|a| = 2|d|$, the deceleration phase takes twice as long as the acceleration phase ($t_{dec} = 2T$).\nTotal time = (acceleration time) + (constant speed time) + (deceleration time)\nTotal time = $T + 180 + 2T = 3T + 180$."},{"question":"(Packet Q5 / official Q4) A non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m and 0.36 m from its two ends. Weight W acts at a distance x from C. State the rule that turns \"on the point of tilting about C\" into a single equation, and the parallel rule for tilting about D.","answer":"\"On the point of tilting about C\" means the reaction at D is zero: R_D = 0. \"On the point of tilting about D\" means R_C = 0. A force acting through the pivot produces no moment about that pivot."},{"question":"NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6, boat pulled by two ropes. What official-reference values are listed for the rope angle and tension?","answer":"NOT DISCUSSED; OFFICIAL MS REFERENCE ONLY — Tutor packet Q6 / official WME01 Q6. The listed values are $$\\alpha\\approx31.9^\\circ$$ and $$P\\approx609\\ \\mathrm{N},$$ with $$610\\ \\mathrm{N}$$ or better accepted for the tension. The question was not opened or discussed in the lesson."},{"question":"Tutor packet Q5 / official WME01 Q4. Given $$Wx=189\\ \\mathrm{N\\,m}$$ and $$x=0.63\\ \\mathrm m$$, find the branch’s weight $$W$$.","answer":"$$W=\\frac{189}{0.63}=300\\ \\mathrm N.$$ The unit is newtons because $$W$$ is a force."},{"question":"For Tutor packet Q5 / official WME01 Q4, the branch (length 1.5 m) tilts about C with a 150 N load at the far end. The weight $$W$$ acts at distance $$x$$ from C. The support C is 0.24 m from one end. Write the moments equation about C.","answer":"Clockwise: $$W \\cdot x$$. Anticlockwise: $$150 \\times (1.5 - 0.24) = 150 \\times 1.26 = 189$$. Equation (A): $$Wx = 189$$."},{"question":"For a branch tilting about D (so $$R_C = 0$$), with weight $$W$$ at distance $$0.9 - x$$ from D and a $$225 \\text{ N}$$ load at $$0.36 \\text{ m}$$ from D, what is the moments equation? (Tutor packet Q5 / official WME01 Q4)","answer":"Clockwise moments = Anticlockwise moments. The 225 N load acts at 0.36 m (clockwise) and the weight $$W$$ acts at $$(0.9 - x)$$ (anticlockwise). So, $$225 \\times 0.36 = W(0.9 - x)$$, which gives $$81 = W(0.9 - x)$$. (Box this as equation B)."},{"question":"Tutor packet Q1 / official WME01 Q2. Particle B has mass $$m$$, initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$ and final velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$. Using impulse as change in momentum, find the signed impulse on B and its magnitude.","answer":"$$I_B=mv-mu=m(1.5)-m(-1.5)=3m\\ \\mathrm{N\\,s}.$$ The signed impulse is positive in the chosen direction, and its magnitude is $$3m\\ \\mathrm{N\\,s}$$."},{"question":"NOT DISCUSSED — Tutor packet Q7 / official WME01 Q7 (7 marks), lift and two boxes. What official-reference answers are available, and what is their evidence boundary?","answer":"NOT DISCUSSED. The question was not opened or discussed. OFFICIAL MS REFERENCE ONLY gives the combined mass of P and Q as $$5m$$ and the mass of P as $$2m$$. They are reference answers, not results produced live."},{"question":"Tutor packet Q1 / official WME01 Q2. In a direct collision, conservation of momentum gives $$3=4x+1$$. Particle A’s post-impact velocity is $$x$$ and particle B’s is $$x+1$$. Find and label both post-impact speeds.","answer":"$$x=\\frac12$$, so A’s speed is $$\\frac12\\ \\mathrm{m\\,s^{-1}}$$ and B’s speed is $$\\frac32\\ \\mathrm{m\\,s^{-1}}$$. The values should be labelled because two unlabelled numbers do not identify the particles."},{"question":"Tutor packet Q2 / official WME01 Q1. A train’s speed–time graph is a trapezium of height $$20\\ \\mathrm{m\\,s^{-1}}$$. Its parallel horizontal sides have lengths $$180$$ and $$3T+180$$ seconds. The total distance is $$4.8\\ \\mathrm{km}$$. Form the area equation using $$A=\\frac12(a+b)h$$.","answer":"First convert $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Then $$4800=\\frac12\\bigl(180+(3T+180)\\bigr)(20).$$ The area under a speed–time graph represents distance."},{"question":"(Numerical style) State the lesson's rules on (i) the use of \"=\" versus \"≈\", (ii) when to take a magnitude, (iii) keeping unrounded intermediates, and (iv) final-unit policy.","answer":"Use \"=\" for exact or calculated expressions and \"≈\" for rounded values; keep signed quantities until a magnitude is requested; keep an unrounded value (e.g. a ≈ 1.1838) for onward substitution before writing the final ≈ 1.18 m s⁻²; final mechanics answers must carry SI units."},{"question":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). What comparison should be made before assuming $$F=\\mu R$$ for a body that may remain at rest on a rough incline?","answer":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Calculate the friction required for equilibrium and compare it with $$\\mu R$$. If the required friction is at most $$\\mu R$$, static friction can supply it; if it exceeds $$\\mu R$$, equilibrium is impossible."},{"question":"(OFFICIAL MS REFERENCE ONLY) State the official answers for Packet Q3 / official Q3: speed at t = 2, angle to i at t = 2, and the value of T for direction 2i − 3j.","answer":"Speed at t = 2: √45 ≈ 6.7 m s⁻¹. Angle to i at t = 2: 27° (or 333°, per the stated convention). T for direction 2i − 3j: 3.2. [Status: OFFICIAL MS REFERENCE ONLY / REVIEWED ONLY / DEFERRED.]"},{"question":"For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the live board line read $$R - 2g \\sin 30^\\circ + 18 \\sin 40^\\circ = 0$$, which was incorrect. What is the correct perpendicular equilibrium equation?","answer":"$$R + 18 \\sin 40^\\circ = 2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)"},{"question":"What is the specific lesson status of Tutor packet Q8 / official WME01 Q8 (parcel on rough inclined plane), and what does this status imply about the availability of the numerical solution?","answer":"Status: LIVE SET-UP ONLY.\nOnly the force diagram and governing equations were reached during the lesson. The arithmetic elimination and final numerical answers were NOT completed live. Numerical values for this question in the guide are OFFICIAL MS REFERENCE ONLY."},{"question":"Tutor packet Q1 / official WME01 Q2. Particle A has mass $$3m$$ and initial velocity $$+1.5\\ \\mathrm{m\\,s^{-1}}$$; particle B has mass $$m$$ and initial velocity $$-1.5\\ \\mathrm{m\\,s^{-1}}$$. After their direct collision, their velocities are modelled as $$x$$ and $$x+1$$ respectively. Use conservation of linear momentum to form the governing equation.","answer":"Conservation of linear momentum gives $$(3m)(1.5)+m(-1.5)=3mx+m(x+1).$$ Cancelling $$m$$ produces $$4.5-1.5=3x+x+1$$, or $$3=4x+1$$."},{"question":"On the same train question, why is the constant-speed phase shown to last from *T* to *T* + 180 and not from 0 to 180? Give a numeric check using *T* = 40.","answer":"Because 180 s is the duration of the constant-speed phase, not its end-time measured from the origin. Starting the clock again at *T* gives the end at *T* + 180 = 220 s. The full run ends at 3*T* + 180 = 300 s, so the constant-speed phase lasts 220 − 40 = 180 s, as required."},{"question":"Tutor packet Q1 / official WME01 Q2. Two particles collide directly along a line. Particle A has mass $$3m$$ and particle B has mass $$m$$. Initially, A moves at $$1.5\\ \\mathrm{m\\,s^{-1}}$$ and B approaches it at the same speed. Taking A’s initial direction as positive, what signed initial velocities must be used in conservation of momentum?","answer":"Use $$u_A=+1.5\\ \\mathrm{m\\,s^{-1}}$$ and $$u_B=-1.5\\ \\mathrm{m\\,s^{-1}}.$$ “Approach each other” means their velocities have opposite signs under one fixed sign convention."},{"question":"Why does the official WME01 January 2023 paper require a dual-numbering system with the tutor's practice packet?","answer":"The packet re-ordered questions relative to the official paper. Packet Q1 is official Q2; packet Q2 is official Q1; packet Q5 is official Q4. Using only official numbering would contradict the packet actually worked from."},{"question":"For Tutor packet Q8 / official WME01 Q8, a $$2 \\text{ kg}$$ parcel lies on a rough plane inclined at $$30^\\circ$$. An $$18 \\text{ N}$$ force acts at $$40^\\circ$$ to the plane. How do you resolve the $$18 \\text{ N}$$ force into components relative to the plane?","answer":"Parallel up the plane: $$18 \\cos 40^\\circ$$. Perpendicular away from the plane: $$18 \\sin 40^\\circ$$. (LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8)"},{"question":"Tutor packet Q2 / official WME01 Q1. On a speed–time graph, what do the area under the graph and the gradient represent?","answer":"The area represents distance travelled when speed is plotted, while the gradient represents acceleration. Dimensionally, $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$ and $$(\\mathrm{m\\,s^{-1}})/\\mathrm s=\\mathrm{m\\,s^{-2}}$$."},{"question":"What is the difference between \"LIVE SET-UP ONLY\" and \"COMPLETED WITH PROMPTING\"?","answer":"\"Live set-up only\" means the diagram and governing equations were reached live but the arithmetic/final answer was not finished. \"Completed with prompting\" means the question was worked through to the requested answer during the lesson with tutor help."},{"question":"For Edexcel IAL Mechanics M1, which core results used in this lesson must candidates know because no additional M1 formulae are printed for them?","answer":"Candidates must know momentum $$p=mv$$; impulse $$I=mv-mu$$; the five constant-acceleration equations; Newton’s laws; the friction relations $$F=\\mu R$$ at limiting equilibrium and generally $$F\\leq\\mu R$$; and the principle of moments."},{"question":"LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. For a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ rough plane, an $$18\\ \\mathrm N$$ force acts at $$40^\\circ$$ above the plane. Taking up the plane as positive, with friction magnitude $$F_R$$ opposing the upward motion, form Newton’s second-law equation parallel to the plane.","answer":"LIVE SET-UP ONLY. $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a.$$ The parallel forces are not balanced; their resultant equals mass times acceleration."},{"question":"In Tutor packet Q1 / official WME01 Q2, why is it necessary to explicitly label calculated speeds as \"$v_A$\" and \"$v_B$\" rather than just listing two numbers?","answer":"Status: COMPLETED WITH PROMPTING.\nThe question asks for the speeds of specific particles. Two unlabelled numbers are ambiguous and may not receive full credit. Explicit labelling ensures the examiner knows which speed corresponds to which particle."},{"question":"For packet Q2 / official WME01 Q1 (train speed–time graph, 10 marks), the train accelerates from rest to 20 m s⁻¹, runs at 20 m s⁻¹ for 180 s, then decelerates to rest. The magnitude of the acceleration is twice the magnitude of the deceleration. If the acceleration phase lasts *T* seconds, write the three time markers along the base of the speed–time graph.","answer":"Acceleration ends at *t* = *T*. The constant-speed phase runs from *T* to *T* + 180. The deceleration phase lasts twice as long (because *a* = 2*d*), so it takes 2*T* and ends at *T* + 180 + 2*T* = 3*T* + 180. Hence the markers are *T*, *T* + 180 and 3*T* + 180."},{"question":"ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, the difference between $$2\\sqrt n$$ and $$7$$ is less than $$1$$. Translate this condition into a single modulus inequality and then into a compound inequality.","answer":"ESAT-STYLE WARM-UP — NOT WME01. Write $$|2\\sqrt n-7|<1$$, hence $$-1<2\\sqrt n-7<1$$. The modulus is required because “difference” means the non-negative size of the gap."},{"question":"Which Pure Maths prerequisite formula was required for the train speed–time graph question, and what is the formula? (Formula and result availability)","answer":"The area of a trapezium: $$A = \\frac{1}{2}(a + b)h$$, where $$a$$ and $$b$$ are the lengths of the parallel sides and $$h$$ is the height (perpendicular distance between them)."},{"question":"For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), a parcel of mass 2 kg rests on a plane inclined at $$30^\\circ$$. How do you resolve the weight $$2g$$ into components parallel and perpendicular to the plane?","answer":"Parallel (down the plane): $$2g \\sin 30^\\circ$$. Perpendicular (into the plane): $$2g \\cos 30^\\circ$$. (LIVE SET-UP ONLY)"},{"question":"Tutor packet Q2 / official WME01 Q1. Why must a stated distance of $$4.8\\ \\mathrm{km}$$ be converted before equating it to the area under a speed–time graph whose axes use seconds and $$\\mathrm{m\\,s^{-1}}$$?","answer":"The graph’s area is measured in $$(\\mathrm{m\\,s^{-1}})(\\mathrm s)=\\mathrm m$$, so use $$4.8\\ \\mathrm{km}=4800\\ \\mathrm m$$. Equating $$4.8$$ directly to the area would mix kilometres with metres."},{"question":"(Lesson-status labelling rule) Why must the ESAT-style warm-up never be labelled as an M1 or WME01 question, and what is the correct status pill for any WME01 item whose answer came only from the official mark scheme after the lesson?","answer":"The warm-up is explicitly outside the WME01 syllabus and is labelled ESAT-STYLE WARM-UP — NOT WME01 throughout. Items whose answers came only from the mark scheme are OFFICIAL MS REFERENCE ONLY and must never be presented as live tutorial work."},{"question":"For Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY), the Student said the perpendicular forces were \"balanced vertically\". What is the correct directional phrasing, and why?","answer":"Say \"balanced perpendicular to the plane\". \"Vertically\" means up/down relative to the ground, which is not the resolving direction for an inclined-plane force diagram. (LIVE SET-UP ONLY)"},{"question":"ESAT-STYLE WARM-UP — NOT WME01. If $$n$$ is an integer satisfying $$9<n<16,$$ which values are permitted, and how many are there?","answer":"ESAT-STYLE WARM-UP — NOT WME01. The permitted integers are $$n\\in\\{10,11,12,13,14,15\\}.$$ Inclusive counting gives $$15-10+1=6$$ integers."},{"question":"The total distance travelled by the train above is 4.8 km. Set up the area-of-a-trapezium equation, use the trapezium formula *A* = ½(*a* + *b*)*h*, and solve for *T*. State clearly what *a*, *b*, *h* are on the graph and why the km must be converted before equating.","answer":"The region under the graph is a trapezium with parallel-side times *a* = 180 and *b* = 3*T* + 180 and height *h* = 20 m s⁻¹. *A* = ½(180 + 3*T* + 180)(20) = (3*T* + 360)(10) = 4800. So 3*T* = 120 and *T* = 40 s. The conversion to 4800 m is essential because the *h* = 20 is in m s⁻¹ and the *a*, *b* are in seconds — the area must be in metres."},{"question":"LIVE SET-UP ONLY — Tutor packet Q8 / official WME01 Q8. Why is the claim “friction can never exceed the applied component, so the acceleration must be up the slope” not a valid general method?","answer":"LIVE SET-UP ONLY. Acceleration direction must be determined from the net resolved force, including the applied force, friction and the component of weight. Friction is governed by contact and the friction law, not by a universal comparison with the applied component."},{"question":"Tutor packet Q1 / official WME01 Q2. When finding the magnitude of an impulse, at what stage should signs be retained, and how should the final answer be presented?","answer":"Retain signed velocities while calculating $$I=mv-mu.$$ Take the magnitude only after finding the signed impulse. A requested magnitude is reported as a positive quantity with units, for example $$3m\\ \\mathrm{N\\,s},$$ without leaving modulus bars in the final answer."},{"question":"In Tutor packet Q2 / official WME01 Q1, once $T=40 \\text{ s}$ is found for the acceleration phase reaching $20 \\text{ m s}^{-1}$ from rest, how is the initial acceleration calculated? Status: COMPLETED WITH PROMPTING.","answer":"Status: COMPLETED WITH PROMPTING.\nAcceleration is the gradient of the speed–time graph during the first phase.\n$a = \\frac{\\Delta v}{\\Delta t} = \\frac{20 - 0}{40} = 0.5 \\text{ m s}^{-2}$."},{"question":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(c). After the $$18\\ \\mathrm N$$ force is removed, a $$2\\ \\mathrm{kg}$$ parcel is instantaneously at rest on a $$30^\\circ$$ rough plane with $$\\mu=0.3$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$. Determine whether friction can keep it at rest.","answer":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. $$R=2g\\cos30^\\circ\\approx16.974\\ \\mathrm N$$, so $$F_{\\max}=\\mu R\\approx5.09\\ \\mathrm N$$. The downslope weight component is $$2g\\sin30^\\circ=9.8\\ \\mathrm N$$. Since $$9.8>5.09$$, friction cannot hold it; the parcel does not remain at rest."},{"question":"Tutor packet Q2 / official WME01 Q1. A train accelerates for $$T$$ seconds, travels at constant speed for $$180$$ seconds, and decelerates for $$2T$$ seconds. What are the three transition times measured from the start?","answer":"The acceleration ends at $$T$$, the constant-speed phase ends at $$T+180$$, and the train stops at $$T+180+2T=3T+180.$$ A common trap is to mark the end of the constant phase at $$180$$ rather than $$T+180.$$"},{"question":"ESAT-STYLE WARM-UP — NOT WME01. What is the efficient trigger when a prompt says that the “difference” between two real quantities is less than a positive number?","answer":"ESAT-STYLE WARM-UP — NOT WME01. Translate the size of the difference into a modulus inequality: $$|A-B|<c.$$ Then unfold it as $$-c<A-B<c.$$ This avoids unnecessary separate cases or rearrangements that make the expression more complicated."},{"question":"In Scenario 1 of Tutor packet Q5 / official WME01 Q4, taking moments about C yields $$Wx = 150(1.5 - 0.24)$$. What distance $$1.5 - 0.24$$ represents, and what is its value?","answer":"It is the perpendicular distance from pivot C to the line of action of the 150 N force at the end of the branch. Its value is $$1.26 \\text{ m}$$. (Tutor packet Q5 / official WME01 Q4)"},{"question":"What was the lesson status of Packet Q3 (constant-acceleration vectors) and Packet Q4 (vehicle SUVAT), and were any tutorial solutions produced for them? (Packet Q3 / official WME01 Q3 & Packet Q4 / official WME01 Q5 — REVIEWED ONLY / DEFERRED)","answer":"Both were REVIEWED ONLY / DEFERRED. They were looked at and commented on, but not re-worked in the lesson. No tutorial solution was produced live for either."},{"question":"(Packet Q1 / official WME01 Q2) Why is the post-collision speed of B not just left as the algebraic expression \"x + 1\" when answering the paper, and which particle's impulse is the one that must be evaluated?","answer":"The question asks for the speeds of A and B explicitly, so both must be written as numerical values with units and labels. The impulse requested is on B, computed as B's change in momentum m(v_B − u_B)."},{"question":"(Sign convention trap, collisions) In a direct collision, taking A's initial direction as positive, both particles \"approach each other at 1.5 m s⁻¹\". Why is the initial momentum of B written as m(−1.5) rather than m(+1.5)?","answer":"Because B moves opposite to the chosen positive direction (it approaches A). Initial momentum must be signed with respect to the same axis used for the post-collision speeds."},{"question":"Tutor packet Q5 / official WME01 Q4. A force acts through the pivot in a moments problem. What is its moment about that pivot?","answer":"Its moment is zero because its perpendicular distance from the pivot is zero: $$M=F d_\\perp=0.$$ It therefore need not appear in the moment equation about that pivot."},{"question":"Tutor packet Q1 / official WME01 Q2. What conservation principle is triggered by a direct collision of two particles when calculating their velocities immediately before and after impact?","answer":"Use conservation of total linear momentum along the line of motion: $$m_Au_A+m_Bu_B=m_Av_A+m_Bv_B.$$ Choose one positive direction and assign every velocity its corresponding sign."},{"question":"Tutor packet Q2 / official WME01 Q1 (10 marks: part (a) 3, part (b) 5, part (c) 2). A train accelerates uniformly from rest to $$20\\ \\mathrm{m\\,s^{-1}}$$ in $$T$$ seconds, travels at that speed for $$180$$ seconds, then decelerates uniformly to rest. The acceleration magnitude is twice the deceleration magnitude. Show why the deceleration phase lasts $$2T$$.","answer":"The speed change has magnitude $$20\\ \\mathrm{m\\,s^{-1}}$$ in both phases. If the initial acceleration is $$a=20/T$$, the deceleration magnitude is $$a/2$$. Its duration is therefore $$20/(a/2)=2(20/a)=2T$$."},{"question":"In mechanics calculations, how should exact and rounded values be carried through linked parts?","answer":"Retain the unrounded value for onward substitution, use $$=$$ for exact or directly calculated expressions, and use $$\\approx$$ only for rounded values. For example, carry $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$ before reporting $$a\\approx1.18\\ \\mathrm{m\\,s^{-2}}$$."},{"question":"Tutor packet Q5 / official WME01 Q4. Two tilting scenarios give $$Wx=189$$ and $$W(0.9-x)=81$$, where $$W$$ is in newtons and $$x$$ in metres. What efficient operation eliminates $$W$$?","answer":"Divide the equations: $$\\frac{Wx}{W(0.9-x)}=\\frac{189}{81},$$ giving $$\\frac{x}{0.9-x}=\\frac73.$$ Division is efficient because the common unknown $$W$$ cancels immediately."},{"question":"What units should accompany the principal mechanics quantities used in this lesson: speed, acceleration, force, impulse, distance and moment?","answer":"Speed: $$\\mathrm{m\\,s^{-1}}$$; acceleration: $$\\mathrm{m\\,s^{-2}}$$; force: $$\\mathrm N$$; impulse: $$\\mathrm{N\\,s}$$; distance: $$\\mathrm m$$; moment: $$\\mathrm{N\\,m}$$."},{"question":"OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. Tutor packet Q8 / official WME01 Q8(a). For a $$2\\ \\mathrm{kg}$$ parcel, use $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a$$ with $$F_R\\approx1.6212\\ \\mathrm N$$ and $$g=9.8\\ \\mathrm{m\\,s^{-2}}$$ to find the acceleration.","answer":"OFFICIAL MS REFERENCE ONLY — NOT COMPLETED LIVE. $$2a\\approx13.7888-1.6212-9.8=2.3676,$$ so $$a\\approx1.1838\\ \\mathrm{m\\,s^{-2}}$$, reported as $$1.18\\ \\mathrm{m\\,s^{-2}}$$ or approximately $$1.2\\ \\mathrm{m\\,s^{-2}}$$. The positive sign means up the plane."},{"question":"(Sanity check on direct collisions) Before solving a two-particle direct-collision problem, list the three \"set-up habits\" the lesson identified as essential, and the one labelling habit that earns full marks.","answer":"(1) Highlight the key words; (2) draw before/after diagrams; (3) fix a sign convention (take one particle's initial direction as positive); (4) label the requested particle (e.g. \"speed of A\", \"speed of B\") with units so two unlabelled numbers do not lose marks."},{"question":"An earlier version of the guide claimed a specific mis-drawn peak value (e.g., \"30\") for Tutor packet Q2 / official WME01 Q1. What does the evidence actually support about the peak label?","answer":"The evidence supports only that a temporary peak label was corrected to the printed $$20 \\text{ m s}^{-1}$$$. Do not state a specific mis-drawn value such as \"30\"."},{"question":"ESAT-STYLE WARM-UP — NOT WME01. For integer $$n$$, solve $$|2\\sqrt n-7|<1$$, stating how strict endpoints affect the solution set.","answer":"ESAT-STYLE WARM-UP — NOT WME01. $$-1<2\\sqrt n-7<1$$ gives $$6<2\\sqrt n<8$$, then $$3<\\sqrt n<4$$. Since all terms are non-negative, squaring preserves the inequalities: $$9<n<16$$. The strict inequalities exclude $$9$$ and $$16$$, so $$n\\in\\{10,11,12,13,14,15\\}$$."},{"question":"(Packet Q2 / official Q1) A learner writes the area equation as 4800 = ½(180)(3T + 180)(20) instead of ½(180 + (3T + 180))(20). What conceptual mistake does this reveal, and which side of the trapezium does the 3T + 180 represent?","answer":"They have multiplied the two parallel sides instead of adding them; the two parallel sides of a trapezium add, they do not multiply. 3T + 180 is the length of the bottom base (from t = 0 to t = 3T + 180), and 180 is the length of the top base (the duration at 20 m s⁻¹)."},{"question":"(Packet Q5 / official Q4) Given Wx = 189 and W(0.9 − x) = 81, find the cancellation strategy and solve for x and W.","answer":"Divide the first equation by the second to cancel W: x / (0.9 − x) = 189 / 81 = 7/3, so 3x = 7(0.9 − x) = 6.3 − 7x, giving 10x = 6.3 and x = 0.63 m. Then W = 189 / 0.63 = 300 N."},{"question":"Tutor packet Q5 / official WME01 Q4. What moments-equation layout reduces sign errors in a two-scenario tilting problem?","answer":"Draw each tilting scenario separately, identify the active pivot and zero reaction, and place clockwise moments on one side and anticlockwise moments on the other. Box and label the resulting equations before combining them. This is safer than writing one long signed sum."},{"question":"After the collision in Tutor packet Q1 / official WME01 Q2, A moves at speed $$x$$ and B moves at speed $$x+1$$ in the positive direction. Why is the label $$x+1$$ used for B's speed?","answer":"The problem states the difference in their speeds after impact is $$1 \\text{ m s}^{-1}$$. Assuming both move in the positive direction, B is faster, so its speed is A's speed plus 1. (Tutor packet Q1 / official WME01 Q2)"},{"question":"OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. Using $$g=9.8\\ \\mathrm{m\\,s^{-2}},$$ find the normal reaction and limiting friction for a $$2\\ \\mathrm{kg}$$ parcel on a $$30^\\circ$$ plane pulled by $$18\\ \\mathrm{N}$$ at $$40^\\circ$$ above the plane, where $$\\mu=0.3$$.","answer":"OFFICIAL MS REFERENCE ONLY — Tutor packet Q8 / official WME01 Q8(a), not completed live. From $$R+18\\sin40^\\circ=2g\\cos30^\\circ,$$ $$R=19.6\\cos30^\\circ-18\\sin40^\\circ\\approx5.4039\\ \\mathrm{N}.$$ Thus $$F_R=0.3R\\approx1.6212\\ \\mathrm{N}.$$"},{"question":"(Dual numbering rule) State the three items whose packet number differs from their official WME01 number, give each pair of labels, and explain how the dual numbering is established.","answer":"Packet Q1 = official Q2 (collision and impulse); Packet Q2 = official Q1 (train speed–time graph); Packet Q5 = official Q4 (moments and tilting). The renumbering is fixed by the board images and page footers of the printed practice packet versus the official paper."},{"question":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Tutor packet Q8 / official WME01 Q8(b). A parcel moves with initial speed $$u=2\\ \\mathrm{m\\,s^{-1}}$$ over $$s=5\\ \\mathrm m$$ with constant acceleration $$a=1.1838\\ldots\\ \\mathrm{m\\,s^{-2}}$$. Which SUVAT relation finds its speed at B, and what is that speed?","answer":"OFFICIAL MS REFERENCE ONLY — NOT ATTEMPTED LIVE. Use $$v^2=u^2+2as$$ because time is not required. Then $$v^2=2^2+2(1.1838\\ldots)(5)\\approx15.838$$, so $$v\\approx3.98\\ \\mathrm{m\\,s^{-1}}$$, or approximately $$4.0\\ \\mathrm{m\\,s^{-1}}$$."},{"question":"Tutor packet Q5 / official WME01 Q4. What happens to the reaction at C when a supported branch is on the point of tilting about D?","answer":"At impending tilt about D, contact at C is just lost, so $$R_C=0$$. The remaining support D acts as the pivot."}];
  const deck=document.getElementById('deck');
  const revealAll=document.getElementById('revealAll');
  const selectAll=document.getElementById('selectAll');
  const status=document.getElementById('selectionStatus');
  let order=DATA.map((_,i)=>i);
  function rich(text) { const span=document.createElement('span'); span.textContent=text.replace(/\$\$/g,'$'); return span.innerHTML.replace(/\n/g,'<br>'); }
  function typeset(node) { if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([node]).catch(()=>{}); }
  function updateStatus() { const n=deck.querySelectorAll('.pick:checked').length; status.textContent=`${n} selected`; selectAll.textContent=n===DATA.length?'Deselect all':'Select all'; }
  function setAnswer(card, visible) { const answer=card.querySelector('.answer'); const button=card.querySelector('.reveal'); answer.classList.toggle('show',visible); button.setAttribute('aria-expanded',String(visible)); button.textContent=visible?'Hide answer':'Reveal answer'; if(visible) typeset(answer); }
  function render() { deck.replaceChildren(); order.forEach((dataIndex,position)=>{ const item=DATA[dataIndex]; const card=document.createElement('article'); card.className='card'; const answerId=`answer-${dataIndex}`; card.innerHTML=`<div class="card-head"><input class="pick" type="checkbox" aria-label="Select card ${position+1}"><div><p class="card-num">Card ${position+1}</p><p class="question">${rich(item.question)}</p></div></div><div class="answer" id="${answerId}" aria-live="polite"><div class="answer-label">Answer</div><div>${rich(item.answer)}</div></div><div class="card-actions"><button class="btn reveal" type="button" aria-controls="${answerId}" aria-expanded="false">Reveal answer</button><button class="btn copy" type="button" aria-label="Copy card ${position+1}">Copy</button></div>`; card.querySelector('.pick').addEventListener('change',updateStatus); card.querySelector('.reveal').addEventListener('click',e=>{const open=e.currentTarget.getAttribute('aria-expanded')==='true';setAnswer(card,!open);}); card.querySelector('.copy').addEventListener('click',async e=>{await copyText(`Q: ${item.question}

A: ${item.answer}`); const old=e.currentTarget.textContent;e.currentTarget.textContent='Copied';setTimeout(()=>e.currentTarget.textContent=old,1200);}); deck.append(card); }); updateStatus(); typeset(deck); }
  async function copyText(text) { try { await navigator.clipboard.writeText(text); } catch { const ta=document.createElement('textarea');ta.value=text;document.body.append(ta);ta.select();document.execCommand('copy');ta.remove(); } }
  revealAll.addEventListener('click',()=>{const open=revealAll.getAttribute('aria-pressed')!=='true'; deck.querySelectorAll('.card').forEach(card=>setAnswer(card,open));revealAll.setAttribute('aria-pressed',String(open));revealAll.textContent=open?'Hide all':'Reveal all';});
  selectAll.addEventListener('click',()=>{const shouldSelect=deck.querySelectorAll('.pick:checked').length!==DATA.length;deck.querySelectorAll('.pick').forEach(x=>x.checked=shouldSelect);updateStatus();});
  document.getElementById('shuffle').addEventListener('click',()=>{for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}revealAll.setAttribute('aria-pressed','false');revealAll.textContent='Reveal all';render();});
  document.getElementById('copySelected').addEventListener('click',async()=>{const selected=[...deck.querySelectorAll('.pick:checked')].map(x=>order[[...deck.children].indexOf(x.closest('.card'))]);if(!selected.length){status.textContent='Select at least one card';return;}const rows=selected.map(i=>`| ${DATA[i].question.replace(/\|/g,'\|').replace(/\n/g,'<br>')} | ${DATA[i].answer.replace(/\|/g,'\|').replace(/\n/g,'<br>')} |`).join('\n');await copyText(`| Question | Answer |
|---|---|
${rows}`);status.textContent=`Copied ${selected.length} selected`;});
  document.getElementById('reset').addEventListener('click',()=>{order=DATA.map((_,i)=>i);revealAll.setAttribute('aria-pressed','false');revealAll.textContent='Reveal all';render();window.scrollTo({top:0,behavior:'smooth'});});
  render();
})();
</script>
</body>
</html>
