<script>
const DATA={"selected": [{"question": "In the 11 July 2026 lesson, what was the status of WMA13/01 October 2025 Q1, which defined $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{3+5x}{x+2}$ for $x>-2$?", "answer": "Q1 was displayed and discussed only. Phuc reported that he had already completed the range subquestion, and the lesson moved on without working any Q1 solution. Therefore, no Q1 method or learner error should be attributed to this lesson; Q1 remained independent-practice material."}, {"question": "For radius $r$, radius $R$ and height $h$, state the area of a circle, the surface area of a sphere, and the volume of a cylinder. How can dimensions distinguish area from volume?", "answer": "Circle area: $\\pi r^2$. Sphere surface area: $4\\pi R^2$. Cylinder volume: $\\pi r^2h$. Area expressions have units of length squared, whereas volume has units of length cubed. This check catches slips such as $\\pi r$ for an area, $4\\pi R$ for a sphere’s surface area, or $\\pi r^2h$ for a surface area."}, {"question": "Derive the total surface area of a closed cylinder of radius $r$ and height $h$.", "answer": "The two circular ends contribute $2\\pi r^2$. Unrolling the curved side gives a rectangle of height $h$ and width equal to the circumference $2\\pi r$, so its area is $2\\pi rh$. Hence the total surface area is $2\\pi r^2+2\\pi rh$. The width is the circumference, not the diameter."}, {"question": "A sphere of radius $R$ has the same surface area as 10 closed cylinders, each of radius $r$ and height $h=4R$. Derive $R$ in terms of $r$.", "answer": "Use sphere area $4\\pi R^2$ and closed-cylinder area $2\\pi r^2+2\\pi rh$:\n\n$4\\pi R^2=10(2\\pi r^2+2\\pi r(4R))$.\n\nDividing by $4\\pi$ gives $R^2-20rR-5r^2=0$. The quadratic formula gives $R=r(10\\pm\\sqrt{105})$. Since $r>0$ and $10-\\sqrt{105}<0$, a radius cannot use the minus branch. Therefore $R=r(10+\\sqrt{105})$."}, {"question": "Which ESAT geometry errors were explicitly corrected in the 11 July 2026 lesson, and what are the corresponding corrections?", "answer": "The recorded corrections were: circle area $\\pi r^2$, not $\\pi r$; sphere surface area $4\\pi R^2$, not $4\\pi R$; the unrolled cylinder width is the circumference $2\\pi r$, not the diameter; $\\pi r^2h$ is cylinder volume, not surface area; and a closed cylinder has two circular ends, so its surface area is $2\\pi r^2+2\\pi rh$."}, {"question": "For $f(x)=\\dfrac{2x^2+3x-4}{e^x}-\\dfrac1{x^2}$, show that $f(x)=0$ has a root in $[1,2]$.", "answer": "$f(1)=e^{-1}-1=-0.6321\\ldots<0$, while $f(2)=10e^{-2}-\\tfrac14=1.1033\\ldots>0$. The function is continuous on $[1,2]$ because both denominators are nonzero there. Since the endpoint values have opposite signs, the Intermediate Value Theorem guarantees at least one root $\\alpha\\in(1,2)$. Both the sign change and continuity statement are required."}, {"question": "For $f(x)=\\dfrac{2x^2+3x-4}{e^x}-\\dfrac1{x^2}$, rearrange $f(x)=0$ into $x=\\sqrt[3]{\\dfrac{e^x+4x^2}{2x+3}}$.", "answer": "Start from $\\dfrac{2x^2+3x-4}{e^x}=\\dfrac1{x^2}$. Multiplying by $e^xx^2$ gives $2x^4+3x^3-4x^2=e^x$. Move $-4x^2$ to the right and factor the left: $x^3(2x+3)=e^x+4x^2$. Divide by $2x+3$ and take the real cube root to obtain $x=\\sqrt[3]{\\dfrac{e^x+4x^2}{2x+3}}$. In the lesson this was completed with prompting; the transcript confirms completion, while the video ledger labels it partial."}, {"question": "What was the lesson status of WMA13/01 October 2025 Q2(c), which supplied $x_{n+1}=\\sqrt[3]{\\dfrac{e^{x_n}+4x_n^2}{2x_n+3}}$ with $x_1=1$ and asked for $x_3$ and the root $\\alpha$ to 4 decimal places?", "answer": "Q2(c) was explicitly skipped and deferred: the iteration was not started or solved in the lesson. It was left for independent completion and possible submission to Harry. Any numerical iterates or root values belong to the official paper/mark-scheme expansion, not to the lesson record, so this lesson-status card does not supply them."}, {"question": "A graph of $\\log_{10}V$ against $t$ is a straight line through $(0,2)$ and $(5,2.25)$. Find its equation in the form $\\log_{10}V=mt+c$.", "answer": "“$\\log_{10}V$ against $t$” means vertical coordinate $\\log_{10}V$ and horizontal coordinate $t$. The gradient is $m=(2.25-2)/(5-0)=0.05$, and the intercept is $c=2$. Therefore $\\log_{10}V=0.05t+2$."}, {"question": "Convert $\\log_{10}V=0.05t+2$ into $V=ab^t$, giving $a$ exactly and $b$ to 3 significant figures.", "answer": "Raise 10 to both sides and split the index: $V=10^{0.05t+2}=10^2(10^{0.05})^t=100(10^{0.05})^t$. Hence $a=100$ exactly and $b=10^{0.05}=1.1220\\ldots=1.12$ to 3 significant figures. The exact identity uses $10^{0.05}$; for the later rate calculation, the official mark scheme follows through the required reported value $1.12$."}, {"question": "State and apply the rule for differentiating $a^{kx}$. In particular, differentiate $3^{6x}$ and $1.12^t$.", "answer": "For $a>0$, $\\dfrac{d}{dx}a^{kx}=a^{kx}k\\ln a$. The factor $k$ comes from differentiating the exponent, while $\\ln a$ comes from the base. Therefore $\\dfrac{d}{dx}3^{6x}=6\\ln(3)\\,3^{6x}$ and $\\dfrac{d}{dt}1.12^t=\\ln(1.12)\\,1.12^t$. The logarithm is applied to the base, not to the variable expression $6x$."}, {"question": "For $V=100(1.12)^t$, the share price’s rate of increase is £50 per year when $t=T$. Find $T$ to the nearest integer, showing an algebraic method.", "answer": "Differentiate: $\\dfrac{dV}{dt}=100\\ln(1.12)(1.12)^t$. “Rate of increase” means set this equal to $+50$: $100\\ln(1.12)(1.12)^T=50$. Thus $(1.12)^T=\\dfrac{50}{100\\ln(1.12)}$ and $T=\\dfrac{\\ln(50/(100\\ln(1.12)))}{\\ln(1.12)}=13.097\\ldots$. To the nearest integer, $T=13$."}, {"question": "Express $f(x)=\\sqrt3\\sin 2x-3\\cos 2x$ as $R\\sin(2x-\\alpha)$, where $R>0$ and $0<\\alpha<\\pi/2$. Give exact $R$ and $\\alpha$.", "answer": "Expand $R\\sin(2x-\\alpha)=(R\\cos\\alpha)\\sin2x-(R\\sin\\alpha)\\cos2x$. Hence $R\\cos\\alpha=\\sqrt3$ and $R\\sin\\alpha=3$. Dividing gives $\\tan\\alpha=\\sqrt3$, so the stated range gives $\\alpha=\\pi/3$. Squaring and adding gives $R^2=3+9=12$, so $R=2\\sqrt3$. Therefore $f(x)=2\\sqrt3\\sin(2x-\\pi/3)$."}, {"question": "After obtaining $R\\cos\\alpha=\\sqrt3$ and $R\\sin\\alpha=3$ with $R>0$ and $0<\\alpha<\\pi/2$, why should you divide to find $\\alpha$ and square-and-add to find $R$?", "answer": "Dividing cancels $R$: $\\tan\\alpha=3/\\sqrt3=\\sqrt3$. The range $0<\\alpha<\\pi/2$ places $\\alpha$ in the first quadrant, so $\\alpha=\\pi/3$. Squaring and adding eliminates the angle through $\\sin^2\\alpha+\\cos^2\\alpha=1$, giving $R^2=12$ and $R=2\\sqrt3$. This keeps the result exact and avoids propagating a rounded angle."}, {"question": "Given $f(x)=2\\sqrt3\\sin(2x-\\pi/3)$ and $g(x)=\\dfrac{18}{f(3x)+4\\sqrt3}$ for $x>0$, find the exact minimum of $g(x)$.", "answer": "Substitution gives $f(3x)=2\\sqrt3\\sin(6x-\\pi/3)$. Since the numerator is fixed and positive and the denominator is always positive, $g$ is smallest when its denominator is largest. The largest sine value is 1, so the maximum denominator is $2\\sqrt3+4\\sqrt3=6\\sqrt3$. Hence $g_{\\min}=18/(6\\sqrt3)=\\sqrt3$."}, {"question": "Find the smallest $x>0$ for which $\\sin(6x-\\pi/3)=1$.", "answer": "The general solution is $6x-\\pi/3=\\pi/2+2n\\pi$, where $n\\in\\mathbb Z$. Thus $x=5\\pi/36+n\\pi/3$. For $n=0$, $x=5\\pi/36>0$; for $n=-1$, $x=-7\\pi/36<0$. Therefore the smallest positive value is $5\\pi/36$."}, {"question": "For $N(t)=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$, find the number of squirrels at the start of the study.", "answer": "The start means $t=0$. Since $e^0=1$, $N(0)=4000/(19+1)=4000/20=200$. The key arithmetic check is that the denominator is 20, not 19."}, {"question": "Differentiate $N(t)=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$ and simplify the result.", "answer": "Let $u=4000e^{0.1t}$ and $v=19+e^{0.2t}$. Then $u'=400e^{0.1t}$ and $v'=0.2e^{0.2t}$. Using $(u/v)'=(vu'-uv')/v^2$,\n\n$\\dfrac{dN}{dt}=\\dfrac{(19+e^{0.2t})400e^{0.1t}-4000e^{0.1t}(0.2e^{0.2t})}{(19+e^{0.2t})^2}=\\dfrac{7600e^{0.1t}-400e^{0.3t}}{(19+e^{0.2t})^2}$.\n\nThe minus sign is essential."}, {"question": "For $\\dfrac{dN}{dt}=\\dfrac{7600e^{0.1t}-400e^{0.3t}}{(19+e^{0.2t})^2}$, show that at a stationary point $t=T$, $e^{0.2T}=19$.", "answer": "The denominator is strictly positive, so the derivative is zero exactly when its numerator is zero. Factor the numerator: $7600e^{0.1T}-400e^{0.3T}=e^{0.1T}(7600-400e^{0.2T})$. Since $e^{0.1T}>0$, only the bracket can be zero. Thus $7600-400e^{0.2T}=0$, so $e^{0.2T}=19$."}, {"question": "For $N(t)=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$, a stationary point $t=T$ satisfies $e^{0.2T}=19$. Find the corresponding number of squirrels to the nearest whole number.", "answer": "Because $e^{0.1T}=\\sqrt{e^{0.2T}}=\\sqrt{19}$, the denominator is $19+19=38$. Therefore $N(T)=4000\\sqrt{19}/38=458.831467\\ldots$, which is 459 squirrels to the nearest whole number. This direct exact substitution avoids rounding $T$ before evaluating $N$."}, {"question": "In WMA13/01 October 2025 Q5(c), the instruction is to show that $e^{0.2T}=A$ and find $A$; Q5(d) then asks for the maximum number of squirrels. Where should the work for Q5(c) stop?", "answer": "Q5(c) should stop once $e^{0.2T}=19$ has been shown and $A=19$ stated. Solving for $T$ or substituting back into the population model belongs to Q5(d). In the lesson, continuing to solve for $T$ and initially using base-10 log were corrected: when $T$ is needed, $e^{0.2T}=19$ is solved with natural logarithms."}, {"question": "What follow-up work did the 11 July 2026 lesson and study log support after the P3/ESAT review?", "answer": "The supported next steps were to revise differentiation of $a^{kx}$ for the next-lesson starter, learn the ESAT sphere/cylinder formulae with flashcards, continue P3 paper practice including the assigned June 2024 paper, and complete the deferred Q2(c) iteration independently. The invitation to finish and send the deferred part came from the transcript; the study log separately recorded differentiation revision, ESAT formulae and the June 2024 paper."}, {"question": "What exam-entry strategy did Harry give at the end of the 11 July 2026 lesson?", "answer": "Harry said that reaching A* standard in every planned October module would be a real stretch if preparation relied only on tutorials. He suggested considering fewer—roughly three or four—well-prepared modules rather than risking weak results across too many, and asked Phuc to confirm the centre’s October entry deadlines so a sensible plan could be made. The advice was conditional planning guidance, not a final entry decision."}], "models": {"glm_1": {"label": "Curated deck", "cards": [{"question": "In the 11 July 2026 lesson, what was the status of WMA13/01 October 2025 Q1, which defined $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{3+5x}{x+2}$ for $x>-2$?", "answer": "Q1 was displayed and discussed only. Phuc reported that he had already completed the range subquestion, and the lesson moved on without working any Q1 solution. Therefore, no Q1 method or learner error should be attributed to this lesson; Q1 remained independent-practice material.", "judge_pick": true}, {"question": "For radius $r$, radius $R$ and height $h$, state the area of a circle, the surface area of a sphere, and the volume of a cylinder. How can dimensions distinguish area from volume?", "answer": "Circle area: $\\pi r^2$. Sphere surface area: $4\\pi R^2$. Cylinder volume: $\\pi r^2h$. Area expressions have units of length squared, whereas volume has units of length cubed. This check catches slips such as $\\pi r$ for an area, $4\\pi R$ for a sphere’s surface area, or $\\pi r^2h$ for a surface area.", "judge_pick": true}, {"question": "Derive the total surface area of a closed cylinder of radius $r$ and height $h$.", "answer": "The two circular ends contribute $2\\pi r^2$. Unrolling the curved side gives a rectangle of height $h$ and width equal to the circumferen const SK='harry_p3_esat_20260711_v1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  else { DATA.selected.forEach(c=>mySet.add(c.question)); saveMySet(); }
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  p.innerHTML=`<div class="mi"><span class="ml">Deck</span><span class="mv">${DATA.selected.length} cards</span></div><div class="mi"><span class="ml">Status</span><span class="mv">Audited standalone recall</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    const cardClass=im?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch&&cur!=='judge');
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to curated deck')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
