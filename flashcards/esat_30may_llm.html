1}{\\sqrt{x}}$$ is **concave up** on its domain ($$x > 0$$).\n\nIt drops steeply near $$x = 0$$ and flattens out as $$x$$ grows, curving like a \"smiling\" shape. Its slope is $$-\\frac{1}{2x^{3/2}}$$, which is negative but increasing (becoming less negative) as $$x$$ grows — increasing slope = concave up.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What does \"concave up\" vs \"concave down\" mean visually? (2 steps)", "answer": "- Step 1: A curve is **concave up** if it \"holds water\" — like a smile (U-shape). Tangent line slopes **increase** as you move right.\n+ Example: $$y = \\frac{1}{\\sqrt{x}}$$ for $$x > 0$$.\n- Step 2: A curve is **concave down** if it \"sheds water\" — like a frown ($$\\cap$$-shape). Tangent line slopes **decrease** as you move right.\n+ Example: $$y = \\sqrt{x}$$ for $$x \\geq 0$$.\n\nConcavity describes the **curvature** (which way the curve bends), not whether the function is increasing or decreasing. A function can be increasing but concave down, or decreasing but concave up.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "Show that $$y = \\frac{1}{x}$$ is decreasing on $$0 < x < 1$$. (1 step)", "answer": "- Step 1: Pick two values in the interval, e.g., $$x_1 = 0.25$$ and $$x_2 = 0.5$$.\n+ At $$x_1 = 0.25$$: $$\\frac{1}{x_1} = 4$$.\n+ At $$x_2 = 0.5$$: $$\\frac{1}{x_2} = 2$$.\n+ Since $$0.25 < 0.5$$ but $$4 > 2$$, the function value decreased as $$x$$ increased. So $$y = \\frac{1}{x}$$ is **decreasing**.\n\n(Algebraic backup: $$\\frac{dy}{dx} = -\\frac{1}{x^2} < 0$$ for all $$x \\neq 0$$, confirming strict decrease.)", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Show that $$y = \\frac{1}{\\sqrt{x}}$$ is decreasing on $$0 < x < 1$$. (1 step)", "answer": "- Step 1: Pick two values in the interval, e.g., $$x_1 = 0.25$$ and $$x_2 = 0.5$$.\n+ At $$x_1 = 0.25$$: $$\\frac{1}{\\sqrt{x_1}} = \\frac{1}{0.5} = 2$$.\n+ At $$x_2 = 0.5$$: $$\\frac{1}{\\sqrt{x_2}} = \\frac{1}{\\sqrt{0.5}} \\approx 1.41$$.\n+ Since $$0.25 < 0.5$$ but $$2 > 1.41$$, the function value decreased as $$x$$ increased. So $$y = \\frac{1}{\\sqrt{x}}$$ is **decreasing**.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What happens to the values of $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\frac{1}{1+x}$$ as $$x \\to 0^+$$? (1 step)", "answer": "- Step 1: \n+ $$x^2 \\to 0$$\n+ $$\\sqrt{x} \\to 0$$\n+ $$\\frac{1}{x} \\to +\\infty$$\n+ $$\\frac{1}{\\sqrt{x}} \\to +\\infty$$\n+ $$\\frac{1}{1+x} \\to 1$$\n\nThe \"reciprocal-of-small\" functions ($$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$) **blow up to infinity** near $$x = 0$$. The others stay bounded. This is the key reason $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are candidates for \"largest\" — only they can reach arbitrarily large values on the interval.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What happens to the values of $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\frac{1}{1+x}$$ as $$x \\to 1^-$$ (approaching 1 from below)? (1 step)", "answer": "- Step 1: \n+ $$x^2 \\to 1$$\n+ $$\\sqrt{x} \\to 1$$\n+ $$\\frac{1}{x} \\to 1$$\n+ $$\\frac{1}{\\sqrt{x}} \\to 1$$\n+ $$\\frac{1}{1+x} \\to \\frac{1}{2}$$\n\nFour of the five curves \"agree\" at the value 1 as $$x \\to 1$$. The fifth ($$\\frac{1}{1+x}$$) lands at $$\\frac{1}{2}$$ instead. This is why $$(1, 1)$$ is such a useful anchor point for sketching these curves on a single set of axes.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What does it mean geometrically for $$g$$ to be the inverse of $$f$$? (3 steps)", "answer": "- Step 1: The graph of $$g = f^{-1}$$ is the **reflection of the graph of $$f$$ across the line $$y = x$$**.\n- Step 2: This works because if $$(a, b)$$ is on the graph of $$f$$ (meaning $$f(a) = b$$), then by the definition of the inverse, $$g(b) = a$$, so the point $$(b, a)$$ is on the graph of $$g$$.\n- Step 3: Reflection across $$y = x$$ swaps the $$x$$- and $$y$$-coordinates of a point, turning $$(a, b)$$ into $$(b, a)$$. That's exactly the relationship between a point on $$f$$ and the corresponding point on $$f^{-1}$$.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Why must we restrict $$y = x^2$$ to $$x \\geq 0$$ in order to have an inverse function? (3 steps)", "answer": "- Step 1: For an inverse to exist as a function, the original function must be **one-to-one**: every output value must come from exactly one input.\n- Step 2: $$y = x^2$$ is **not** one-to-one on all of $$\\mathbb{R}$$: e.g., both $$x = 2$$ and $$x = -2$$ give $$y = 4$$. So if we tried to define the inverse, $$f^{-1}(4)$$ would need to be both 2 and $$-2$$ — impossible for a single-valued function.\n- Step 3: By restricting to $$x \\geq 0$$ (or $$x \\leq 0$$), we keep only the half where each $$y \\geq 0$$ has exactly one pre-image. The inverse $$f^{-1}(x) = \\sqrt{x}$$ is then a well-defined function.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "Does $$\\sqrt{4}$$ equal 2, $$-2$$, or both? Why? (2 steps)", "answer": "- Step 1: $$\\sqrt{4} = 2$$ only. The symbol $$\\sqrt{\\phantom{x}}$$ denotes the **principal (positive) square root** — always the non-negative value.\n- Step 2: The **equation** $$x^2 = 4$$ has two solutions: $$x = +2$$ and $$x = -2$$. But the **function** $$\\sqrt{\\cdot}$$ takes a single value per input, so it returns just the positive one.\n\nThis is why the inverse of $$y = x^2$$ (on $$x \\geq 0$$) is the curve $$y = \\sqrt{x}$$ (positive branch), and we draw $$y = -\\sqrt{x}$$ as a *separate* curve if we want the negative root.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "If we define $$f(x) = x^2$$ on the domain $$x \\geq 0$$, what is $$f^{-1}(x)$$? (2 steps)", "answer": "- Step 1: $$f^{-1}$$ is the function that \"undoes\" $$f$$. So $$f^{-1}(x)$$ should output a non-negative number whose square is $$x$$.\n- Step 2: $$f^{-1}(x) = \\sqrt{x}$$ (the principal, positive square root).\n\nNet effect: $$f \\circ f^{-1}(x) = (\\sqrt{x})^2 = x$$, and $$f^{-1} \\circ f(x) = \\sqrt{x^2} = x$$ for $$x \\geq 0$$. Both compositions return the input — confirming $$\\sqrt{x}$$ is the inverse of $$x^2$$ (on the restricted domain).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "How can you tell that two functions are inverses of each other, in two equivalent ways? (2 steps)", "answer": "- Step 1: **Algebraic test:** composing them in either order returns the input. $$f(g(x)) = x$$ **and** $$g(f(x)) = x$$.\n+ Example: $$y = x^2$$ (on $$x \\geq 0$$) and $$y = \\sqrt{x}$$ satisfy $$(\\sqrt{x})^2 = x$$ and $$\\sqrt{x^2} = x$$.\n- Step 2: **Geometric test:** their graphs are reflections of each other across the line $$y = x$$.\n+ Example: reflecting $$y = x^2$$ (right branch) across $$y = x$$ gives $$y = \\sqrt{x}$$.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "Outline a general strategy for finding the largest function among several options on the interval $$0 < x < 1$$. (4 steps)", "answer": "- Step 1: **Compute the range** of each function on $$(0, 1)$$ by checking boundary values (or limits at boundaries).\n- Step 2: **Eliminate** any function whose range is bounded above by 1. These functions can never exceed 1, so they cannot be the largest if any candidate can exceed 1.\n- Step 3: Among the remaining \"unbounded above\" candidates (typically $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$), the range analysis alone cannot break the tie. **Test one specific value** of $$x$$ (e.g., $$x = \\frac{1}{4}$$) to compare.\n- Step 4: For **monotone** functions, comparing at one point determines the order on the whole interval. So one test value is enough.\n\nThis is the standard recipe for \"which function is largest on $$(0, 1)$$\" questions in ESAT.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Why is $$x = \\frac{1}{4}$$ a particularly \"good\" test value for comparing functions on $$(0, 1)$$? (3 steps)", "answer": "- Step 1: $$\\frac{1}{4}$$ lies strictly in the open interval $$(0, 1)$$, so it satisfies the constraint.\n- Step 2: $$\\frac{1}{4}$$ has a clean square root: $$\\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$. So $$\\frac{1}{\\sqrt{x}} = \\frac{1}{1/2} = 2$$ — mental-math friendly.\n- Step 3: Similarly, $$\\frac{1}{x} = \\frac{1}{1/4} = 4$$ — also clean. No decimals, no rounding.\n\nThe principle: pick test values whose square roots (and other transforms) are simple fractions. Good choices: $$\\frac{1}{4}, \\frac{1}{9}, \\frac{1}{16}, \\frac{1}{2}, \\frac{1}{3}$$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "On $$0 < x < 1$$, which is larger: $$\\frac{1}{x}$$ or $$\\frac{1}{\\sqrt{x}}$$? (3 steps)", "answer": "- Step 1: On this interval, $$\\sqrt{x} > x$$ (square-rooting enlarges in $$(0, 1)$$).\n- Step 2: Both $$\\sqrt{x}$$ and $$x$$ are positive, so we can compare their reciprocals — reciprocation reverses inequalities.\n- Step 3: $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.\n\n**Intuition:** smaller denominator → larger fraction. Since $$x < \\sqrt{x}$$, the denominator of $$\\frac{1}{x}$$ is the smaller one, so $$\\frac{1}{x}$$ is the bigger value. Numerical check at $$x = \\frac{1}{4}$$: $$\\frac{1}{x} = 4$$ vs $$\\frac{1}{\\sqrt{x}} = 2$$. Indeed $$4 > 2$$. ✓", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why does range analysis prune the options so quickly in \"which function is largest on $$(0, 1)$$\" problems? (2 steps)", "answer": "- Step 1: On $$(0, 1)$$, three of the five common functions have ranges entirely **below 1**: $$x^2 \\in (0, 1)$$, $$\\sqrt{x} \\in (0, 1)$$, $$\\frac{1}{1+x} \\in (\\frac{1}{2}, 1)$$. None of them can ever reach 1.\n- Step 2: The remaining two — $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ — have range $$(1, +\\infty)$$, meaning they exceed 1 throughout $$(0, 1)$$. So the three \"below 1\" options are **eliminated immediately** without any further work; the contest is only between the two \"above 1\" candidates.\n\nRange analysis is the single most efficient first move on these questions.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "Why is **one** test value (e.g., $$x = \\frac{1}{4}$$) sufficient to compare $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ on the entire interval $$(0, 1)$$? (2 steps)", "answer": "- Step 1: Both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are **strictly decreasing** on $$(0, 1)$$. So if we know which is larger at one point, we know the order is preserved (or reversed, consistently) across the whole interval.\n- Step 2: At $$x = \\frac{1}{4}$$: $$\\frac{1}{x} = 4 > 2 = \\frac{1}{\\sqrt{x}}$$. So $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ for **all** $$x \\in (0, 1)$$.\n\nThis is the **monotonicity shortcut**: for two functions that are monotone in the same direction on an interval, one comparison test point settles the question globally.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "Write the proportionality $$P \\propto \\frac{1}{Q^2}$$ as an equation involving a constant. (1 step)", "answer": "- Step 1: $$P = \\frac{k}{Q^2}$$ where $$k$$ is the **constant of proportionality**.\n\nThis is the standard form for \"$$P$$ is inversely proportional to $$Q^2$$\". The constant $$k$$ depends on the specific situation (units, initial conditions), but for *percentage change* problems, $$k$$ cancels out — only the **shape** of the relationship matters.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is multiplied by some factor $$m$$ (i.e., $$Q_{\\text{new}} = mQ_{\\text{old}}$$), by what factor does $$P$$ change? (3 steps)", "answer": "- Step 1: Write the new value: $$P_{\\text{new}} = \\frac{k}{Q_{\\text{new}}^2} = \\frac{k}{(mQ)^2}$$.\n- Step 2: Expand $$(mQ)^2 = m^2 Q^2$$, so $$P_{\\text{new}} = \\frac{k}{m^2 Q^2} = \\frac{1}{m^2} \\cdot \\frac{k}{Q^2}$$.\n- Step 3: Recognise that $$\\frac{k}{Q^2} = P_{\\text{old}}$$, so $$P_{\\text{new}} = \\frac{1}{m^2} \\cdot P_{\\text{old}}$$.\n\n**Key takeaway:** when $$Q$$ scales by $$m$$, $$P$$ scales by $$\\frac{1}{m^2}$$ — the reciprocal of the square. The squaring in the denominator is what makes $$P$$ respond \"faster\" than $$Q$$ does.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "If $$P \\propto Q$$ (linear proportionality) and $$Q$$ is multiplied by $$m$$, what happens to $$P$$? (1 step)", "answer": "- Step 1: $$P_{\\text{new}} = k \\cdot (mQ) = m \\cdot (kQ) = m \\cdot P_{\\text{old}}$$.\n\n$$P$$ is multiplied by the **same** factor $$m$$. The relationship is symmetric: $$P$$ and $$Q$$ grow (or shrink) together in lockstep.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "If $$P \\propto Q^2$$ and $$Q$$ is multiplied by $$m$$, what happens to $$P$$? (1 step)", "answer": "- Step 1: $$P_{\\text{new}} = k \\cdot (mQ)^2 = k \\cdot m^2 Q^2 = m^2 \\cdot P_{\\text{old}}$$.\n\n$$P$$ is multiplied by $$m^2$$ — the **square** of the factor. Doubling $$Q$$ quadruples $$P$$. The \"squared\" relationship amplifies: small changes in $$Q$$ cause big changes in $$P$$.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q}$$ and $$Q$$ is multiplied by $$m$$, what happens to $$P$$? (1 step)", "answer": "- Step 1: $$P_{\\text{new}} = \\frac{k}{mQ} = \\frac{1}{m} \\cdot \\frac{k}{Q} = \\frac{1}{m} \\cdot P_{\\text{old}}$$.\n\n$$P$$ is multiplied by $$\\frac{1}{m}$$ — the **reciprocal** of the factor. Doubling $$Q$$ halves $$P$$; halving $$Q$$ doubles $$P$$.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 40%, by what factor does $$P$$ change? (2 steps)", "answer": "- Step 1: Convert the percentage to a multiplier: $$Q_{\\text{new}} = 1.4 Q = \\frac{7}{5} Q$$. So $$m = \\frac{7}{5}$$.\n- Step 2: Apply the rule: $$m^2 = \\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$, so $$\\frac{1}{m^2} = \\frac{25}{49}$$.\n\n$$P_{\\text{new}} = \\frac{25}{49} \\cdot P_{\\text{old}} \\approx 0.51 \\, P_{\\text{old}}$$. So $$P$$ becomes about 51% of its old value.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 40%, what is the percentage change in $$P$$ to the nearest whole number? (3 steps)", "answer": "- Step 1: From the previous question, $$P_{\\text{new}} = \\frac{25}{49} P_{\\text{old}}$$.\n- Step 2: Percentage change formula: $$\\%\\Delta P = \\left(\\frac{P_{\\text{new}}}{P_{\\text{old}}} - 1\\right) \\times 100\\% = \\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\%$$.\n- Step 3: $$-\\frac{24}{49} \\approx -0.4898 = -48.98\\% \\approx -49\\%$$. So $$P$$ **decreases by about 49%**.\n\nThe exact value is $$-\\frac{24}{49} \\times 100\\%$$ — not exactly 50% (which a naive \"square the 40%\" would suggest) and not 40% (which would be wrong because of the squaring).", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Why is it better to use $$\\frac{7}{5}$$ (exact fraction) rather than $$1.4$$ (decimal) when computing the percentage change? (2 steps)", "answer": "- Step 1: $$\\frac{7}{5}$$ is the **exact** equivalent of $$1.4$$. Using the exact fraction keeps every step of the calculation exact.\n- Step 2: With decimals, errors accumulate:\n+ $$1.4^2 = 1.96$$ (exact).\n+ $$\\frac{1}{1.96} \\approx 0.5102$$ (already rounded).\n+ $$0.5102 - 1 = -0.4898$$ (more rounding).\n\nWith fractions: $$\\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$ (exact), $$\\frac{1}{49/25} = \\frac{25}{49}$$ (exact), $$\\frac{25}{49} - 1 = -\\frac{24}{49}$$ (exact, no decimals). The exact fraction avoids cumulative rounding and gives a clean rational answer.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "When $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases, why must $$P$$ decrease? (2 steps)", "answer": "- Step 1: \"$$P$$ is inversely proportional to $$Q^2$$\" literally means $$P$$ **shrinks** as $$Q$$ **grows** — the relationship is built-in antagonistic.\n- Step 2: Concretely: $$Q$$ is in the denominator with a positive exponent, so as $$Q$$ increases, the fraction $$\\frac{k}{Q^2}$$ gets smaller. The \"squared\" makes the effect even stronger (faster shrinking than a plain $$1/Q$$ would give).\n\nSo increasing $$Q$$ forces a decrease in $$P$$ — and not just a small decrease, a *squared* decrease.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Why is the change in $$P$$ about $$-49\\%$$ (not $$-40\\%$$) when $$Q$$ increases by 40% and $$P \\propto \\frac{1}{Q^2}$$? (3 steps)", "answer": "- Step 1: $$P \\propto \\frac{1}{Q^2}$$ means $$P$$ depends on the **square** of $$Q$$ in the denominator. Squaring amplifies the effect of any change in $$Q$$.\n- Step 2: If $$Q \\to \\frac{7}{5} Q$$, then $$Q^2 \\to \\left(\\frac{7}{5}\\right)^2 Q = \\frac{49}{25} Q$$, an increase by a factor of $$\\frac{49}{25}$$. The denominator grows by *more* than $$Q$$ itself did.\n- Step 3: So $$P = \\frac{k}{Q^2}$$ shrinks by $$\\frac{25}{49} \\approx 0.51$$, which is a decrease of about 49% — more than the 40% increase in $$Q$$.\n\nThe general rule: for $$P \\propto 1/Q^n$$, an increase in $$Q$$ causes a **larger** percentage decrease in $$P$$ (the more so the bigger the exponent $$n$$).", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What's the relationship between the percentage change in $$Q$$ and the percentage change in $$P$$ when $$P \\propto \\frac{1}{Q^2}$$? (2 steps)", "answer": "- Step 1: The relationship is **non-linear and asymmetric**: if $$Q$$ increases by $$p\\%$$, then $$P$$ decreases by **more** than $$p\\%$$.\n- Step 2: The exact rule: if $$Q \\to (1 + p/100) Q$$, then $$P \\to \\frac{1}{(1 + p/100)^2} P$$, and the % change in $$P$$ is:\n$$\\%\\Delta P = \\left(\\frac{1}{(1 + p/100)^2} - 1\\right) \\times 100\\%$$\n\nFor $$p = 40$$: $$\\frac{1}{(1.4)^2} = \\frac{25}{49} \\approx 0.51$$, so $$\\%\\Delta P \\approx -49\\%$$.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "State the general rule: if $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by $$p\\%$$, what is the percentage change in $$P$$? (3 steps)", "answer": "- Step 1: Convert the percentage to a multiplier: $$m = 1 + \\frac{p}{100}$$.\n- Step 2: Apply the scaling rule: $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$.\n- Step 3: Percentage change: $$\\%\\Delta P = \\left(\\frac{1}{m^2} - 1\\right) \\times 100\\% = \\left(\\frac{1}{(1 + p/100)^2} - 1\\right) \\times 100\\%$$.\n\nFor $$p = 40$$: $$m = 1.4 = \\frac{7}{5}$$, $$m^2 = \\frac{49}{25}$$, $$\\frac{1}{m^2} = \\frac{25}{49}$$, change = $$\\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\% \\approx -49\\%$$.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "How do you convert \"$$X$$ increased by $$p\\%$$\" into a numerical multiplier, and \"the new value is $$m$$ times the old\" into a percentage change? (2 steps)", "answer": "- Step 1: **Percentage increase → multiplier:** $$m = 1 + \\frac{p}{100}$$.\n+ \"Increased by 40%\" → $$m = 1.4 = \\frac{7}{5}$$.\n+ \"Increased by 20%\" → $$m = 1.2 = \\frac{6}{5}$$.\n- Step 2: **Multiplier → percentage change:** $$\\%\\Delta = (m - 1) \\times 100\\%$$.\n+ $$m = 1.5$$ → $$+50\\%$$ (50% increase).\n+ $$m = 0.51$$ → $$-49\\%$$ (49% decrease).\n+ $$m = 1$$ → $$0\\%$$ (no change).\n\nMultiplier above 1 means increase; below 1 means decrease.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "What is the \"constant of proportionality\" in the equation $$P = \\frac{k}{Q^2}$$? (1 step)", "answer": "- Step 1: $$k$$ is the constant of proportionality. It is the **fixed value** that links $$P$$ and $$Q$$ for a particular situation, set by the initial conditions or units of the problem.\n\nFor example, if $$P = 50$$ when $$Q = 2$$, then $$k = P \\cdot Q^2 = 50 \\cdot 4 = 200$$. The relationship is then $$P = \\frac{200}{Q^2}$$. But for *percentage change* questions, $$k$$ cancels out — only the structure of the relationship matters.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What is the Archimedes sphere-in-cylinder result? State the answer and where it comes from. (1 step)", "answer": "- Step 1: When a sphere of radius $$r$$ fits **exactly** inside a cylinder (cylinder's internal diameter = sphere's diameter = $$2r$$, and cylinder's height = sphere's diameter = $$2r$$), the sphere occupies $$\\frac{2}{3}$$ of the cylinder's volume.\n+ $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$\n+ $$V_{\\text{cylinder}} = \\pi r^2 \\cdot 2r = 2\\pi r^3$$\n+ Ratio: $$\\frac{4/3 \\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{2}{3}$$\n\nThis is one of Archimedes' classical results, and a useful memorisation fact for ESAT.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In the sphere-in-cylinder problem, why does the cylinder's height equal $$2r$$ (the sphere's diameter), not $$r$$ (the sphere's radius)? (2 steps)", "answer": "- Step 1: The problem says the cylinder has the \"same internal diameter and length as the diameter of the sphere.\" Reading carefully: cylinder diameter = sphere diameter (both = $$2r$$), AND cylinder **length** = sphere diameter (also = $$2r$$).\n- Step 2: So the cylinder's height is $$2r$$, not $$r$$. If you used $$h = r$$, the volume would be $$\\pi r^3$$, and the ratio $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{4}{3} > 1$$ — which is impossible (the sphere can't take up more space than the whole cylinder).\n\nThe trap option tests whether you confused radius with diameter. Always read the problem wording precisely.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "Why is $$\\frac{1}{1+x} < 1$$ for **all** $$x > 0$$ (not just on $$(0, 1)$$)? (2 steps)", "answer": "- Step 1: For $$x > 0$$, we have $$1 + x > 1$$ (the denominator is strictly greater than 1).\n- Step 2: Both sides are positive, so taking reciprocals reverses the inequality: $$\\frac{1}{1+x} < 1$$.\n\nThis is true for any positive $$x$$ — the value 1 at $$x = 0$$ is the **maximum**, and any positive $$x$$ strictly decreases it. So $$\\frac{1}{1+x}$$ is never a candidate for \"largest value\" on any interval with $$x > 0$$.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "Apply the comparison strategy: rank $$\\frac{1}{x}$$, $$x^2$$, $$\\frac{1}{1+x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\sqrt{x}$$ from smallest to largest for $$0 < x < 1$$, using the test value $$x = \\frac{1}{4}$$. (1 step)", "answer": "- Step 1: At $$x = \\frac{1}{4}$$:\n+ $$x^2 = \\frac{1}{16} = 0.0625$$\n+ $$\\sqrt{x} = \\frac{1}{2} = 0.5$$\n+ $$\\frac{1}{1+x} = \\frac{1}{5/4} = \\frac{4}{5} = 0.8$$\n+ $$\\frac{1}{\\sqrt{x}} = 2$$\n+ $$\\frac{1}{x} = 4$$\n\n**Order:** $$x^2 < \\sqrt{x} < \\frac{1}{1+x} < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. The largest is $$\\boxed{\\frac{1}{x}}$$.\n\n(This is the answer to the original Q3 in the lesson. Note that the rank of $$\\frac{1}{1+x}$$ vs $$\\sqrt{x}$$ is not globally fixed; at this particular $$x = \\frac{1}{4}$$, $$\\frac{1}{1+x} > \\sqrt{x}$$. The unbounded pair $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are always the two largest, with $$\\frac{1}{x}$$ being the largest of all.)", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is multiplied by 3, by what factor does $$P$$ change? (2 steps)", "answer": "- Step 1: $$m = 3$$, so $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}} = \\frac{1}{9} P_{\\text{old}}$$.\n- Step 2: $$P$$ becomes **$$\\frac{1}{9}$$** of its old value (about an 89% decrease).\n\nTripling $$Q$$ makes $$P$$ nine times smaller. The inverse-square relationship makes $$P$$ collapse fast when $$Q$$ grows.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "For $$0 < x < 1$$, at the specific test value $$x = \\frac{1}{9}$$, which is larger: $$\\frac{1}{\\sqrt{x}}$$ or $$\\frac{1}{x}$$? (2 steps)", "answer": "- Step 1: At $$x = \\frac{1}{9}$$: $$\\sqrt{x} = \\frac{1}{3}$$, so $$\\frac{1}{\\sqrt{x}} = 3$$. And $$\\frac{1}{x} = 9$$.\n- Step 2: $$9 > 3$$, so $$\\frac{1}{x}$$ is larger.\n\nThis confirms the general rule: on $$(0, 1)$$, $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ (since $$x < \\sqrt{x}$$ and reciprocating reverses the inequality).", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Outline a complete solution to the lesson's main function-comparison question: \"Which of $$\\frac{1}{x}, x^2, \\frac{1}{1+x}, \\frac{1}{\\sqrt{x}}, \\sqrt{x}$$ has the largest value for $$0 < x < 1$$?\" (4 steps)", "answer": "- Step 1: **Step 1 — Range analysis.** Determine the range of each function on $$(0, 1)$$:\n+ $$x^2$$: range $$(0, 1)$$ — bounded above by 1.\n+ $$\\sqrt{x}$$: range $$(0, 1)$$ — bounded above by 1.\n+ $$\\frac{1}{1+x}$$: range $$(\\frac{1}{2}, 1)$$ — bounded above by 1.\n+ $$\\frac{1}{\\sqrt{x}}$$: range $$(1, +\\infty)$$ — unbounded above. ✓ Candidate.\n+ $$\\frac{1}{x}$$: range $$(1, +\\infty)$$ — unbounded above. ✓ Candidate.\n- Step 2: **Step 2 — Eliminate.** Three options ($$x^2, \\sqrt{x}, \\frac{1}{1+x}$$) can never exceed 1, so they cannot be the largest. Down to two candidates.\n- Step 3: **Step 3 — Tiebreaker.** Both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are strictly decreasing on $$(0, 1)$$, so testing one $$x$$ value settles the comparison for the whole interval. Test $$x = \\frac{1}{4}$$:\n+ $$\\frac{1}{x} = 4$$\n+ $$\\frac{1}{\\sqrt{x}} = 2$$\n- Step 4: **Step 4 — Conclude.** $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ at $$x = \\frac{1}{4}$$, and by monotonicity, everywhere on $$(0, 1)$$. **The largest function is $$\\frac{1}{x}$$.**", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "For the same five functions, give a one-line intuition for why $$\\frac{1}{x}$$ ends up being the largest. (1 step)", "answer": "- Step 1: Among the candidates with range above 1, $$\\frac{1}{x}$$ has the **smallest denominator** on $$(0, 1)$$ (since $$x < \\sqrt{x}$$), so the **largest** value of the fraction.\n\nThe three functions that are bounded above by 1 lose immediately. Among the two that exceed 1, the one with the smaller denominator wins. Smaller denominator = bigger fraction.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "Why is the function $$f(x) = \\frac{1}{x}$$ its **own** inverse? What does that imply about its graph? (2 steps)", "answer": "- Step 1: Apply $$f$$ twice: $$f(f(x)) = \\frac{1}{1/x} = x$$. So $$f \\circ f$$ is the identity, which is the definition of being one's own inverse.\n- Step 2: For a function that is its own inverse, the graph must be **symmetric about the line $$y = x$$** (the axis of reflection that maps a function to its inverse). So the graph of $$y = \\frac{1}{x}$$ — the two branches of the hyperbola in the first and third quadrants — is symmetric about $$y = x$$.\n\nThis is a special property, not shared by all functions. Most functions are not self-inverse.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": true}, {"question": "As $$x \\to +\\infty$$, what happens to the values of $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$, and $$\\frac{1}{1+x}$$? (1 step)", "answer": "- Step 1: \n+ $$x^2 \\to +\\infty$$ (grows quadratically, fastest).\n+ $$\\sqrt{x} \\to +\\infty$$ (grows, but slowly).\n+ $$\\frac{1}{x} \\to 0$$ (decays to 0).\n+ $$\\frac{1}{\\sqrt{x}} \\to 0$$ (decays to 0).\n+ $$\\frac{1}{1+x} \\to 0$$ (decays to 0).\n\nSo for **large** $$x$$, the unbounded-growth functions ($$x^2, \\sqrt{x}$$) take over, while the reciprocal functions collapse toward 0. The behaviour is the **mirror image** of what happens near $$x = 0$$: \"blow up\" functions there are the \"decay\" functions here, and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": true}, {"question": "Misconception probe: a student claims that \"since $$\\sqrt{}$$ and $$1/$$ both involve 'shrinking' operations, $$\\frac{1}{\\sqrt{x}}$$ should give the smallest value on $$(0, 1)$$.\" What is the flaw in this reasoning? (2 steps)", "answer": "- Step 1: The student is conflating two different effects. Taking the square root of a number in $$(0, 1)$$ **enlarges** the value (e.g., $$\\sqrt{0.25} = 0.5 > 0.25$$). Then taking the reciprocal of that enlarged value makes it **larger still** (e.g., $$\\frac{1}{0.5} = 2$$).\n- Step 2: So $$\\frac{1}{\\sqrt{x}}$$ on $$(0, 1)$$ is actually **greater than 1** for all $$x \\in (0, 1)$$. It is one of the **largest** candidates, not the smallest. The error is in thinking \"more operations = more shrinking\" — the opposite is true: each operation tends to *increase* the value on $$(0, 1)$$.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "Misconception probe: a student computes $$(1.4)^2 = 1.96$$ and then claims the change in $$P$$ is $$-96\\%$$ when $$Q$$ is up 40% and $$P \\propto \\frac{1}{Q^2}$$. What went wrong? (2 steps)", "answer": "- Step 1: The student took $$(1.4)^2 = 1.96$$ and subtracted from 1, getting $$-0.96 = -96\\%$$. This treats $$1.96$$ as the *change* in $$P$$, not the *multiplier* on the denominator.\n- Step 2: The correct interpretation: $$1.96$$ is the factor by which $$Q^2$$ grows. The factor on $$P = \\frac{k}{Q^2}$$ is therefore $$\\frac{1}{1.96} = \\frac{1}{1.96} \\approx 0.51$$ (or exactly $$\\frac{25}{49}$$). The percentage change is $$(0.51 - 1) \\times 100\\% \\approx -49\\%$$, **not** $$-96\\%$$.\n\nThe trap: $$Q^2$$ grows by a factor of 1.96, but that translates to a **decrease** in $$P$$, not an increase. The transformation flips.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": true}, {"question": "Concept check: a student says \"since $$P \\propto \\frac{1}{Q^2}$$, doubling $$Q$$ should halve $$P$$.\" Is this right? (1 step)", "answer": "- Step 1: **No.** The proportionality is to $$\\frac{1}{Q^2}$$, **not** $$\\frac{1}{Q}$$. So doubling $$Q$$ doesn't halve $$P$$ — it **quarters** it.\n+ $$m = 2$$, so $$P_{\\text{new}} = \\frac{1}{2^2} P_{\\text{old}} = \\frac{1}{4} P_{\\text{old}}$$ (a 75% decrease, not 50%).\n\nThe squared exponent in the denominator means the effect is amplified. A common student error is to confuse $$P \\propto 1/Q^2$$ with $$P \\propto 1/Q$$.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": true}, {"question": "Visualisation: imagine sketching all five functions on the same axes for $$0 < x < 1$$. Roughly where does each one \"live\"? (1 step)", "answer": "- Step 1: \n+ $$x^2$$ and $$\\sqrt{x}$$ both stay in the **lower strip** $$0 < y < 1$$, with $$x^2$$ below $$\\sqrt{x}$$. Both pass through $$(0, 0)$$ and $$(1, 1)$$.\n+ $$\\frac{1}{1+x}$$ starts at $$(0, 1)$$ and **descends** to $$(1, \\frac{1}{2})$$, also in the lower strip but never reaching $$y = 0$$.\n+ $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ live in the **upper region** $$y > 1$$, with both shooting up to $$+\\infty$$ near the $$y$$-axis and both passing through $$(1, 1)$$. $$\\frac{1}{x}$$ is **above** $$\\frac{1}{\\sqrt{x}}$$ throughout $$(0, 1)$$.\n\nThe picture has a clear \"split\": below 1, we have the power-of-$$x$$ and shift-and-reciprocal functions; above 1, we have the reciprocal functions.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "Why does the lesson emphasise the \"test value\" approach (substituting one specific $$x$$) when comparing functions, instead of always deriving things algebraically? (2 steps)", "answer": "- Step 1: Algebraic derivations can be slow and error-prone, especially when the functions are all standard. A single **specific test value** of $$x$$ gives numerical values that can be compared directly.\n- Step 2: For **monotone** functions on an interval, the test value approach is **complete**: if two functions are both monotone in the same direction, knowing which is larger at one point tells you the order on the whole interval. So you don't need to derive inequalities or compute derivatives — one substitution suffices.\n\nThis is a \"shortcut\" with the same logical strength as the formal approach, and it's much faster on timed exams.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}], "count": 60}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For a number $$x$$ strictly between 0 and 1, is it true that $$x^2 < x$$ or $$x^2 > x$$? Explain using the geometric meaning of \"squaring\". (2 steps)", "answer": "- Step 1: Squaring a positive number means multiplying it by itself. When $$0 < x < 1$$, you're multiplying a \"small\" positive number by another \"small\" positive number, so the result is even smaller.\n- Step 2: Concretely, $$x \\cdot x < x \\cdot 1 = x$$ whenever $$0 < x < 1$$, because multiplying by $$x$$ (less than 1) shrinks the value. So $$x^2 < x$$ for $$0 < x < 1$$. (Visual: on the graph, the curve $$y = x^2$$ lies *below* the line $$y = x$$ in this interval.)\n\nKey takeaway: squaring a number between 0 and 1 *shrinks* it toward 0; this is the opposite of what happens for $$x > 1$$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For $$0 < x < 1$$, why is $$\\sqrt{x} > x$$? Give a quick reasoning in terms of the function and the inverse of squaring. (2 steps)", "answer": "- Step 1: We just established $$x^2 < x$$ for $$0 < x < 1$$. Since $$\\sqrt{x}$$ is the *inverse* of $$x^2$$ (on the non-negative branch), applying $$\\sqrt{\\phantom{x}}$$ to both sides of $$x^2 < x$$ gives $$x < \\sqrt{x}$$.\n- Step 2: Equivalently, $$\\sqrt{x}$$ is the number which, when squared, gives $$x$$. If $$\\sqrt{x} \\leq x$$ and we squared both sides, we'd get $$x \\leq x^2$$, contradicting the fact that $$x > x^2$$ here. So $$\\sqrt{x} > x$$.\n\nTakeaway: for fractions between 0 and 1, the square root \"boosts\" the number upward toward 1.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For $$0 < x < 1$$, the expression $$\\tfrac{1}{x}$$ must be greater than 1. Explain the *direction* of the inequality when you take the reciprocal of a positive number less than 1. (2 steps)", "answer": "- Step 1: A general rule for positive numbers: if $$0 < a < b$$, then $$\\tfrac{1}{a} > \\tfrac{1}{b}$$ — the inequality *flips* when you reciprocate.\n- Step 2: Apply this with $$a = x$$ and $$b = 1$$. Since $$0 < x < 1$$, we have $$x < 1$$, so $$\\tfrac{1}{x} > \\tfrac{1}{1} = 1$$. (Test value: $$x = 0.25 \\Rightarrow \\tfrac{1}{x} = 4$$, definitely bigger than 1.)\n\nTakeaway: for any positive number smaller than 1, its reciprocal is bigger than 1, and the closer $$x$$ is to 0, the more astronomical $$\\tfrac{1}{x}$$ becomes.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "For $$0 < x < 1$$, why is $$\\tfrac{1}{x}$$ *larger* than $$\\tfrac{1}{\\sqrt{x}}$$? (1 step)", "answer": "- Step 1: Both denominators are positive and, in this interval, $$\\sqrt{x} > x$$ (because $$\\sqrt{x}$$ is bigger than $$x$$ when both are in $$[0,1]$$). A fraction with the smaller denominator has the larger value, so $$\\tfrac{1}{x} > \\tfrac{1}{\\sqrt{x}}$$. Test at $$x = \\tfrac{1}{4}$$: $$\\tfrac{1}{x} = 4$$ and $$\\tfrac{1}{\\sqrt{x}} = 2$$, confirming the inequality.\n\nTakeaway: the ordering of reciprocals is the *reverse* of the ordering of the denominators.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the full ordering (smallest to largest) of these six quantities for $$0 < x < 1$$: $$x^2,\\ x,\\ \\sqrt{x},\\ 1,\\ \\tfrac{1}{\\sqrt{x}},\\ \\tfrac{1}{x}$$? (1 step)", "answer": "- Step 1: The ordering is $$x^2 < x < \\sqrt{x} < 1 < \\tfrac{1}{\\sqrt{x}} < \\tfrac{1}{x}$$. This combines three facts: $$x^2 < x < \\sqrt{x}$$ (squaring shrinks, square root grows for $$0<x<1$$), the value 1 is the \"boundary\" of the interval, and reciprocals of values in $$(0,1)$$ land in $$(1,\\infty)$$, with smaller originals producing larger reciprocals.\n\nTest at $$x = \\tfrac{1}{4}$$: $$\\tfrac{1}{16} < \\tfrac{1}{4} < \\tfrac{1}{2} < 1 < 2 < 4$$ — checks out perfectly.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Where does $$\\tfrac{1}{1+x}$$ fit relative to the value 1, when $$0 < x < 1$$? Explain in terms of the denominator. (1 step)", "answer": "- Step 1: For $$0 < x < 1$$, the denominator $$1+x$$ lies in $$(1, 2)$$. Since the denominator is strictly greater than 1, the fraction $$\\tfrac{1}{1+x}$$ is strictly *less* than 1. The closer $$x$$ is to 0, the closer $$\\tfrac{1}{1+x}$$ is to 1 (from below); at $$x=1$$ it equals $$\\tfrac{1}{2}$$. So $$\\tfrac{1}{2} < \\tfrac{1}{1+x} < 1$$ on this interval.\n\nTakeaway: $$\\tfrac{1}{1+x}$$ is always *below* 1 for any positive $$x$$, and its range in $$(0,1)$$ is squeezed into the upper half of the unit interval.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A student says \"since $$x < 1$$ and I'm dividing 1 by it, $$\\tfrac{1}{x}$$ should be smaller than 1, like 0.5 or something.\" Why is this wrong? (1 step)", "answer": "- Step 1: The student's mistake is applying the rule \"$$\\text{smaller dividend} \\Rightarrow \\text{smaller quotient}$$\" to division by a number *less than 1*. In reality, dividing by a number smaller than 1 *enlarges* the result, just like dividing a cake into 4 pieces gives you bigger slices than dividing it into 8 pieces. So $$1 \\div 0.5 = 2 > 1$$, and generally $$\\tfrac{1}{x} > 1$$ whenever $$0 < x < 1$$.\n\nTakeaway: division by a small positive number produces a *large* result; the inequality *flips* when you divide both sides of an inequality by something less than 1.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "A \"test value\" approach was used in the lesson to break a tie between two candidate functions. Describe the strategy: when would you use it, and what makes a good test value? (2 steps)", "answer": "- Step 1: When you've narrowed a problem down to two functions whose ranges on the interval both look the same qualitatively (e.g., both have range $$(1, \\infty)$$), the ranges don't tell you which is bigger. The test-value strategy plugs in one specific value of $$x$$ in the open interval, computes both function values, and uses that to pick a winner.\n- Step 2: Good test values are (a) strictly inside the interval, (b) *easy to compute* (e.g., $$x = \\tfrac{1}{4}$$ gives a clean $$\\sqrt{x} = \\tfrac{1}{2}$$ and $$\\tfrac{1}{x} = 4$$), and (c) \"deep\" enough into the interval that the behaviour is unambiguous (not too close to an endpoint where the values nearly coincide).", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What does it mean geometrically that $$\\sqrt{x}$$ is the *inverse* of $$x^2$$? What line do you reflect across, and what coordinate swap happens? (2 steps)", "answer": "- Step 1: To get the inverse function's graph, you reflect the original function's graph across the line $$y = x$$. The point $$(a, b)$$ on the original graph (meaning $$b = a^2$$) becomes the point $$(b, a)$$ on the inverse's graph (meaning $$a = \\sqrt{b}$$).\n- Step 2: Reflecting across $$y = x$$ *swaps* the roles of the input and output. So the inverse of $$f(x) = x^2$$ is the function $$f^{-1}$$ that takes a $$y$$-value back to an $$x$$-value: $$f^{-1}(y) = \\sqrt{y}$$. Renaming the input variable, $$f^{-1}(x) = \\sqrt{x}$$.\n\nTakeaway: the inverse \"undoes\" the original; graphically, you swap the $$x$$- and $$y$$-coordinates of every point.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Why must we restrict $$f(x) = x^2$$ to $$x \\geq 0$$ in order to define a function called $$\\sqrt{x}$$ as its inverse? (1 step)", "answer": "- Step 1: An inverse function is only well-defined when the original function is *one-to-one* (injective): each output corresponds to a unique input. But $$x^2$$ is not one-to-one on all of $$\\mathbb{R}$$: both $$x = 2$$ and $$x = -2$$ give the output 4. Restricting to $$x \\geq 0$$ removes this duplication, so each non-negative output has exactly one non-negative input, and $$\\sqrt{x}$$ is a genuine function.\n\nTakeaway: the restriction to $$x \\geq 0$$ is what makes the inverse *exist as a function*; without it, we'd have an ambiguous \"two-valued\" relation.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Is $$\\sqrt{4} = -2$$ correct? State the *principal* root convention and explain the role of the equation $$x^2 = 4$$. (2 steps)", "answer": "- Step 1: No, $$\\sqrt{4} \\neq -2$$. The symbol $$\\sqrt{\\phantom{x}}$$ denotes the *principal* (positive) square root, so $$\\sqrt{4} = 2$$ by convention. Writing $$\\sqrt{4} = -2$$ is wrong because $$-2$$ is the *negative* square root, written separately as $$-\\sqrt{4} = -2$$.\n- Step 2: The *equation* $$x^2 = 4$$ has two solutions, $$x = \\pm 2$$; this is where the \"$$\\pm$$\" lives. But the *function* $$\\sqrt{x}$$ is single-valued and always returns the non-negative root. Keep these separate: equations can have $$\\pm$$ solutions; the $$\\sqrt{\\phantom{x}}$$ symbol picks the positive one.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "On the same axes, sketch the curves $$y = \\sqrt{x}$$ (in green) and $$y = \\tfrac{1}{\\sqrt{x}}$$ (in red) for $$x > 0$$. What is the one point they share, and what happens to each as $$x \\to 0^+$$? (2 steps)", "answer": "- Step 1: They both pass through the point $$(1, 1)$$ (since $$\\sqrt{1} = 1$$ and $$\\tfrac{1}{\\sqrt{1}} = 1$$). That's their only intersection.\n- Step 2: As $$x \\to 0^+$$, $$\\sqrt{x} \\to 0$$ (green curve dives *down* toward the origin), while $$\\tfrac{1}{\\sqrt{x}} \\to \\infty$$ (red curve shoots *up* toward infinity, with a vertical asymptote at $$x = 0$$). For $$0 < x < 1$$, the red curve is always above the green one; for $$x > 1$$, the order reverses.\n\nTakeaway: both curves are reflections of each other in some sense around $$(1, 1)$$, but with very different behaviour near the origin.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "The statement \"$$P$$ is proportional to $$\\tfrac{1}{Q^2}$$\" is written symbolically as $$P \\propto \\tfrac{1}{Q^2}$$. What does it mean, and how do you convert it to an equation? (1 step)", "answer": "- Step 1: The symbol \"$$\\propto$$\" means \"is proportional to\" or \"scales with.\" To turn it into a usable equation, introduce a constant of proportionality $$k$$: $$P = \\tfrac{k}{Q^2}$$. The constant $$k$$ is fixed for a given relationship but unknown until a specific data point is given. Crucially, $$k$$ does not change as $$P$$ and $$Q$$ change; only the powers of $$Q$$ affect the multiplier.\n\nTakeaway: \"proportional to\" becomes a multiplication by a fixed constant, and the *power* of the variable determines how it scales under change.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "If $$P = \\tfrac{k}{Q^2}$$ and $$Q$$ is multiplied by some factor $$m$$ (so $$Q_{\\text{new}} = mQ$$), what is $$P_{\\text{new}}$$ in terms of $$P_{\\text{old}}$$ and $$m$$? (1 step)", "answer": "- Step 1: Substituting, $$P_{\\text{new}} = \\tfrac{k}{(mQ)^2} = \\tfrac{k}{m^2 Q^2} = \\tfrac{1}{m^2} \\cdot \\tfrac{k}{Q^2} = \\tfrac{1}{m^2} P_{\\text{old}}$$. So $$P$$ is multiplied by the factor $$\\tfrac{1}{m^2}$$.\n\nTakeaway: for $$P \\propto 1/Q^2$$, the multiplier on $$P$$ is the *reciprocal of the square* of the multiplier on $$Q$$. This is the key power-of-2 behaviour.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A lesson example used the multiplier $$m = 1.4$$ for a 40% increase in $$Q$$, but recommended writing it as the exact fraction $$m = \\tfrac{7}{5}$$. Why use the exact fraction when computing $$P_{\\text{new}} = \\tfrac{1}{m^2} P_{\\text{old}}$$? (2 steps)", "answer": "- Step 1: Using the exact fraction keeps the arithmetic exact: $$\\left(\\tfrac{7}{5}\\right)^2 = \\tfrac{49}{25}$$, so $$P_{\\text{new}} = \\tfrac{25}{49} P_{\\text{old}}$$ — a clean rational number.\n- Step 2: If you used the decimal $$1.4$$ throughout, you'd hit $$1.4^2 = 1.96$$ and then $$\\tfrac{1}{1.96} \\approx 0.5102$$; converting to a percentage gives $$51.02\\%$$ (rounded) and a percentage change of $$-48.98\\% \\approx -49\\%$$ — but only *if* you don't round prematurely. The fraction path is exact and gives the same final answer; the decimal path invites rounding errors.\n\nTakeaway: keep the multiplier as a fraction when squaring it, since fractions of integers often have clean squares.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "If $$P \\propto \\tfrac{1}{Q^2}$$ and $$Q$$ is increased by 40%, what is the percentage change in $$P$$? (3 steps)", "answer": "- Step 1: New multiplier on $$Q$$ is $$m = 1.4 = \\tfrac{7}{5}$$.\n- Step 2: New multiplier on $$P$$ is $$\\tfrac{1}{m^2} = \\tfrac{1}{(7/5)^2} = \\tfrac{25}{49}$$.\n- Step 3: Percentage change $$= \\left(\\tfrac{P_{\\text{new}}}{P_{\\text{old}}} - 1\\right) \\times 100\\% = \\left(\\tfrac{25}{49} - 1\\right) \\times 100\\% = -\\tfrac{24}{49} \\times 100\\% \\approx -48.98\\% \\approx -49\\%$$.\n\nSo $$P$$ *decreases* by about 49%. The 40% increase in $$Q$$ causes a *larger* percentage decrease in $$P$$ (because of the squared reciprocal), but not as large as the naïve \"double\" intuition.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A question asks for the *percentage change* in $$P$$, not the new value. What is the trap here, and what formula should you use? (1 step)", "answer": "- Step 1: The trap is reporting $$\\tfrac{25}{49}$$ or \"51% of original\" as the answer — that's the *new value as a fraction of old*, not the percentage change. The correct formula is $$\\%\\Delta = \\left(\\tfrac{P_{\\text{new}}}{P_{\\text{old}}} - 1\\right) \\times 100\\%$$. Here, $$\\tfrac{25}{49} - 1 = -\\tfrac{24}{49} \\approx -48.98\\%$$ — the minus sign indicates a *decrease*, and the magnitude is 49%.\n\nTakeaway: \"percentage change\" always means (new − old) / old × 100%, with a sign indicating direction.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Generalize: if $$P \\propto \\tfrac{1}{Q^2}$$ and $$Q$$ increases by $$p\\%$$, what is the percentage decrease in $$P$$? (2 steps)", "answer": "- Step 1: $$Q_{\\text{new}} = \\left(1 + \\tfrac{p}{100}\\right) Q$$, so the multiplier is $$m = 1 + \\tfrac{p}{100}$$.\n- Step 2: $$P_{\\text{new}} = \\tfrac{1}{m^2} P_{\\text{old}}$$, so the percentage change is $$\\left(\\tfrac{1}{m^2} - 1\\right) \\times 100\\% = \\left(\\tfrac{1}{(1+p/100)^2} - 1\\right) \\times 100\\%$$, which is always *negative* (a decrease) for any positive $$p$$.\n\nTakeaway: any positive increase in $$Q$$ causes a *decrease* in $$P$$ under $$P \\propto 1/Q^2$$, and the percentage decrease grows as $$p$$ grows (but slower than linearly).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "The \"burger method\" rule is $$\\tfrac{a/b}{c/d} = \\tfrac{ad}{bc}$$. Explain *why* this works in terms of dividing by a fraction. (2 steps)", "answer": "- Step 1: Dividing by a fraction is the same as multiplying by its *reciprocal* (flip): $$\\tfrac{a}{b} \\div \\tfrac{c}{d} = \\tfrac{a}{b} \\times \\tfrac{d}{c}$$.\n- Step 2: When you multiply two fractions, you multiply numerators together and denominators together: $$\\tfrac{a}{b} \\times \\tfrac{d}{c} = \\tfrac{ad}{bc}$$. Combining both steps: $$\\tfrac{a/b}{c/d} = \\tfrac{ad}{bc}$$.\n\nTakeaway: the burger method is just \"flip the divisor, then multiply across\" packaged in a memorable shape.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Describe the \"burger\" visual mnemonic. What are the \"bun\" parts and the \"filling\"? (1 step)", "answer": "- Step 1: The mnemonic treats $$\\tfrac{a/b}{c/d}$$ as a stacked fraction (a \"burger\"). The \"outer\" parts $$a$$ and $$d$$ form the top and bottom *bun*; the \"inner\" parts $$b$$ and $$c$$ form the *filling*. After applying the rule, the bun pieces ($$a$$ and $$d$$) sit side-by-side in the numerator, and the filling pieces ($$b$$ and $$c$$) sit side-by-side in the denominator. Arrows from $$a$$ down to $$d$$ and from $$b$$ up to $$c$$ highlight the \"cross\" — hence \"cross-multiplication\" is the same idea.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What's the burger-method version of $$\\tfrac{a}{b} \\div c$$ where $$c$$ is a whole number? Derive it. (2 steps)", "answer": "- Step 1: Treat the whole number $$c$$ as the fraction $$\\tfrac{c}{1}$$.\n- Step 2: Apply the rule: $$\\tfrac{a/b}{c/1} = \\tfrac{a \\cdot 1}{b \\cdot c} = \\tfrac{a}{bc}$$. So $$\\tfrac{a}{b} \\div c = \\tfrac{a}{bc}$$.\n\nTakeaway: dividing a fraction by a whole number means multiplying the *denominator* by that whole number; the numerator stays the same.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A sphere of radius $$r$$ fits snugly inside a cylinder such that the cylinder's internal diameter equals the sphere's diameter and the cylinder's height also equals the sphere's diameter. What is the cylinder's height $$h$$ in terms of $$r$$, and why? (1 step)", "answer": "- Step 1: The sphere's diameter is $$2r$$, so the cylinder's height $$h = 2r$$ (the cylinder must be exactly as tall as the sphere is wide, so the sphere just fits touching top and bottom). The cylinder's *internal* radius is $$r$$ (matching the sphere), so its diameter is also $$2r$$.\n\nTakeaway: \"fits snugly\" in a sphere-in-cylinder problem means cylinder height = sphere diameter = $$2r$$, *not* the sphere's radius.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Compute the fraction of the cylinder's volume taken up by the sphere in the snug-fit case. State the formula for each volume, then the ratio. (3 steps)", "answer": "- Step 1: Cylinder volume: $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 \\cdot 2r = 2\\pi r^3$$.\n- Step 2: Sphere volume: $$V_{\\text{sphere}} = \\tfrac{4}{3}\\pi r^3$$ (given).\n- Step 3: Fraction $$= \\tfrac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\tfrac{(4/3)\\pi r^3}{2\\pi r^3} = \\tfrac{4/3}{2} = \\tfrac{4}{3} \\times \\tfrac{1}{2} = \\tfrac{4}{6} = \\tfrac{2}{3}$$.\n\nSo the sphere fills $$\\tfrac{2}{3}$$ of the cylinder — this is the famous Archimedes result.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the ratio $$\\tfrac{(4/3)\\pi r^3}{2\\pi r^3}$$, you can cancel $$\\pi r^3$$ \"early\" before doing any arithmetic. Why is this allowed, and what is the result? (1 step)", "answer": "- Step 1: Both the numerator and denominator contain the common factor $$\\pi r^3$$ (note: $$r > 0$$). Cancelling a common non-zero factor from top and bottom of a fraction is the basic rule $$\\tfrac{ka}{kb} = \\tfrac{a}{b}$$. After cancellation, the fraction simplifies to $$\\tfrac{4/3}{2}$$ — a much simpler expression to divide.\n\nTakeaway: cancel common factors *before* doing arithmetic; this is faster and less error-prone, especially with $$\\pi$$ and powers of $$r$$.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A student reads \"fits inside a cylinder\" and assumes the cylinder's height is $$r$$ (the sphere's *radius*) rather than $$2r$$ (its *diameter*). What answer do they get, and why is it obviously wrong? (1 step)", "answer": "- Step 1: With $$h = r$$, the cylinder volume is $$V_{\\text{cyl}} = \\pi r^2 \\cdot r = \\pi r^3$$, and the ratio becomes $$\\tfrac{(4/3)\\pi r^3}{\\pi r^3} = \\tfrac{4}{3}$$. This is greater than 1, which is impossible: the sphere is *inside* the cylinder, so it must occupy *less* (not more) than the cylinder's volume. The error flags itself.\n\nTakeaway: any time a \"fraction\" answer exceeds 1 in a \"fits inside\" geometry problem, you've made an error in the dimensions.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "What is the area of a right-angled triangle with legs $$a$$ and $$b$$? What is the *first* step in evaluating $$\\tfrac{1}{2}(4+\\sqrt{2})(2-\\sqrt{2})$$ to minimise errors? (2 steps)", "answer": "- Step 1: Area formula: $$A = \\tfrac{1}{2} \\times \\text{base} \\times \\text{height} = \\tfrac{1}{2}ab$$.\n- Step 2: Recommended first step: expand the bracket $$(4+\\sqrt{2})(2-\\sqrt{2})$$ *fully* (using FOIL) *before* introducing the $$\\tfrac{1}{2}$$. This isolates all the surd arithmetic into one block, after which dividing by 2 is mechanical.\n\nTakeaway: do all your expanding first, *then* the fraction multiplies — this reduces the number of \"live\" surd terms in flight at any moment.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Expand $$(4+\\sqrt{2})(2-\\sqrt{2})$$ using FOIL, and simplify. (2 steps)", "answer": "- Step 1: FOIL gives $$4 \\cdot 2 + 4 \\cdot (-\\sqrt{2}) + \\sqrt{2} \\cdot 2 + \\sqrt{2} \\cdot (-\\sqrt{2}) = 8 - 4\\sqrt{2} + 2\\sqrt{2} - 2$$.\n- Step 2: Collect like terms: $$(8 - 2) + (-4\\sqrt{2} + 2\\sqrt{2}) = 6 - 2\\sqrt{2}$$. Multiplying by $$\\tfrac{1}{2}$$ gives $$3 - \\sqrt{2}$$. (Note: the cross-terms $$-4\\sqrt{2} + 2\\sqrt{2}$$ combine to $$-2\\sqrt{2}$$; they do *not* cancel to zero.)\n\nTakeaway: FOIL works the same with surds as with numbers — be careful with signs in the last term (the \"outer-inner\" pair).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In the FOIL expansion of $$(a+b)(c-d)$$, the last term is $$-bd$$. When does this term *not* vanish in a \"nice\" way? (1 step)", "answer": "- Step 1: The $$-bd$$ term vanishes if and only if $$b = 0$$ or $$d = 0$$ — in this problem, neither is true (both are $$\\sqrt{2}$$), so it contributes $$-2$$ to the rational part. The cross-terms $$-ad + bc$$ can sometimes *combine* with the $$-bd$$ in a special pattern called the *difference of two squares* — that would require $$c = b$$ and the plus/minus to align, which is *not* the case here.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Two triangles are similar by AA. If $$\\triangle ABC \\sim \\triangle ADE$$ with $$BC \\parallel DE$$, what three things must be true about the angles? (1 step)", "answer": "- Step 1: AA similarity requires two pairs of equal angles. Here: (1) $$\\angle BAC = \\angle DAE$$ (the *same* angle $$\\angle A$$, common to both triangles — it's automatically equal to itself); (2) $$\\angle ABC = \\angle ADE$$ (corresponding angles from the parallel lines $$BC \\parallel DE$$, with $$AB$$ and $$AD$$ as the transversal cutting those parallels). The third pair follows: $$\\angle ACB = \\angle AED$$ (angles in a triangle sum to 180°, so the third pair must be equal too).\n\nTakeaway: a shared angle + one pair of parallel-line angles is enough to nail AA similarity; the third pair comes for free.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "In a similar-triangle problem, the figure shows a small triangle inside a larger one with a shared vertex $$A$$ and parallel bases. If you're given $$AB$$ and $$BD$$ (the small-triangle side and the gap between the two triangles), how do you find $$AD$$? (1 step)", "answer": "- Step 1: $$AD = AB + BD$$ — the side of the *larger* triangle is the sum of the small-triangle side and the gap between them along the same straight line through $$A$$. This is a very common source of error: students set up the proportion using $$AB$$ where they should have used $$AD$$, then get the wrong answer.\n\nTakeaway: in nested-triangle problems with shared vertex, the \"long side\" is always the \"short side + gap\" — recompute it from the diagram, don't trust a labelled value you don't see.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "Given $$\\tfrac{AB}{AD} = \\tfrac{BC}{DE}$$, why is this the correct proportion and not, say, $$\\tfrac{AD}{AB} = \\tfrac{DE}{BC}$$? (1 step)", "answer": "- Step 1: The correct proportion pairs *corresponding* sides: in $$\\triangle ABC \\sim \\triangle ADE$$, side $$AB$$ (in the small triangle) corresponds to side $$AD$$ (in the big triangle), and side $$BC$$ corresponds to $$DE$$. So the \"small : big\" pairing is correct: $$AB/AD = BC/DE = AC/AE$$. Using $$AD/AB$$ inverts the ratio — it would still be numerically equal (because of the same similarity), but it's the *reciprocal*, which is not the form that drops out of similar-triangle proofs. Pick the form that matches the small triangle on top.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "After setting up a similar-triangle proportion, you cross-multiply and get a quadratic like $$x^2 - 4x - 12 = 0$$. Why prefer manual factoring over the quadratic formula here? (2 steps)", "answer": "- Step 1: The quadratic formula works in general but requires computing a discriminant, a square root, and a fraction — three steps that each invite arithmetic error. For ESAT problems, the coefficients are usually chosen so that the roots are *integers* or simple surds.\n- Step 2: Manual factoring: find two numbers whose *product* is the constant term $$-12$$ and whose *sum* is the linear coefficient $$-4$$. Scanning pairs: $$(-2, 6)$$ works (product $$-12$$, sum $$4$$) — no, that sums to $$+4$$. Try $$(-6, 2)$$: product $$-12$$, sum $$-4$$ ✓. So $$(x - 6)(x + 2) = 0$$, giving $$x = 6$$ or $$x = -2$$.\n\nTakeaway: factor-by-inspection is faster and reveals whether the answer will be \"nice\" — useful for MCQ checking.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "The quadratic $$(x+2)(x-6) = 0$$ gives solutions $$x = -2$$ and $$x = 6$$. In a similar-triangle length problem, why do you reject $$x = -2$$? (1 step)", "answer": "- Step 1: A length cannot be negative. The variable $$x$$ represents a side or a length in the diagram, and physical lengths are non-negative — in fact, strictly positive for a non-degenerate triangle. So $$x = -2$$ is extraneous; the only valid solution is $$x = 6$$.\n\nTakeaway: always check that algebraic solutions are *physically meaningful* in context (positive length, valid probability, real number where required, etc.).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Given $$a = \\tfrac{b^2 + 2}{3b^2 - 1}$$, the goal is to express $$b$$ in terms of $$a$$. Walk through the *order* of algebraic moves, and explain *why* each move is chosen. (4 steps)", "answer": "- Step 1: **Cross-multiply** to clear the fraction: $$a(3b^2 - 1) = b^2 + 2$$. This converts one equation in two variables into a polynomial relation.\n- Step 2: **Expand**: $$3ab^2 - a = b^2 + 2$$. Now you can see all the terms.\n- Step 3: **Collect** the $$b^2$$ terms on the left and constants on the right: $$3ab^2 - b^2 = a + 2$$. This sets up the next step.\n- Step 4: **Factor out** $$b^2$$: $$b^2(3a - 1) = a + 2$$. Now $$b^2$$ is isolated as a single term, ready to be divided out.\n\nThe next steps (not asked, but completing the picture): divide by $$(3a-1)$$ to get $$b^2 = \\tfrac{a+2}{3a-1}$$, then take $$\\pm\\sqrt{}$$ to get $$b = \\pm\\sqrt{\\tfrac{a+2}{3a-1}}$$.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Why is the answer to a \"$$b$$ in terms of $$a$$\" rearrangement often a \"$$\\pm$$\" expression? (1 step)", "answer": "- Step 1: The final step is taking the square root of $$b^2$$, and every non-negative number has *two* square roots (positive and negative). The original equation involves $$b^2$$ — which is the same for $$b = +k$$ and $$b = -k$$ — so both values are valid. The \"$$\\pm$$\" captures both solutions at once.\n\nTakeaway: \"$$b$$ in terms of $$a$$\" where the equation is quadratic in $$b$$ generally yields *two* solutions, hence the $$\\pm$$.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A common student error in the rearrangement problem is moving both $$-a$$ and $$+2$$ to the *same* side, getting $$3ab^2 - b^2 - a + 2 = 0$$. Why is this technically legal but *strategically* worse? (1 step)", "answer": "- Step 1: It's \"legal\" because adding the same thing to both sides preserves equality. But once you have $$3ab^2 - b^2 - a + 2 = 0$$, factoring $$b^2$$ out of the left side now leaves a $$-a + 2$$ remainder, and you have to re-arrange to isolate that. The cleaner strategy — keep $$b^2$$ terms on the left and constants on the right — sets up the factorisation directly in one line: $$3ab^2 - b^2 = a + 2$$.\n\nTakeaway: choose your rearrangement to make the *next* step obvious; don't just shuffle terms aimlessly.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A \"burger\" mnemonic is for dividing fractions. But the lesson also showed a quick rewrite: $$\\tfrac{(4/3)\\pi r^3}{2\\pi r^3} \\to \\tfrac{4/3}{2}$$. Why is the rewrite valid? (1 step)", "answer": "- Step 1: The common factor $$\\pi r^3$$ appears in both the numerator and denominator (since $$r > 0$$ and $$\\pi > 0$$), so you can divide both by it without changing the value. The rewrite is just the cancel-early principle: $$\\tfrac{ka}{kb} = \\tfrac{a}{b}$$ for any non-zero $$k$$. The \"burger\" then operates on the much simpler fraction $$\\tfrac{4/3}{2}$$.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "For the proportion $$\\tfrac{AB}{AD} = \\tfrac{BC}{DE}$$, the cross-multiplied form is $$AB \\cdot DE = AD \\cdot BC$$. Why is this useful, and what's the *trap* with the direction of the cross? (1 step)", "answer": "- Step 1: Cross-multiplication turns a proportion (a division equality) into a multiplication equality, which is easier to expand and rearrange, especially when one side has a sum (like $$AD = AB + BD$$). The *trap*: students sometimes cross-multiply in the wrong direction, getting $$AD \\cdot BC = AB \\cdot DE$$ (still valid, same equality) — but if they start with the *inverted* proportion $$\\tfrac{AD}{AB} = \\tfrac{DE}{BC}$$, the cross-multiplication gives a *different* (but reciprocal) equation, leading to a wrong answer.\n\nTakeaway: the proportion you start with matters; cross-multiplying preserves the proportion you wrote, not the \"true\" one.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "\"Cancel before you compute\" is a lesson technique. Apply the principle: what is the simplest form of $$\\tfrac{6\\pi r^3}{4\\pi r^2}$$? (1 step)", "answer": "- Step 1: Cancel $$\\pi$$ (top and bottom), one factor of $$r^2$$ (leaving $$r^1$$ in the top), and the common factor 2 (leaving 3 on top, 2 on bottom): $$\\tfrac{6\\pi r^3}{4\\pi r^2} = \\tfrac{3r}{2}$$. Each cancellation is a single application of the rule $$\\tfrac{ka}{kb} = \\tfrac{a}{b}$$ with $$k$$ being the cancelled factor.\n\nTakeaway: cancellation is repeated application of the \"common factor\" rule; do as many cancellations as you can in one pass.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "\"For $$\\tfrac{1}{x}$$ to be larger than $$\\tfrac{1}{\\sqrt{x}}$$ in $$0 < x < 1$$, you need the denominator of the first to be *smaller* than the denominator of the second.\" Explain why smaller denominators give larger fractions (when numerators are equal positive). (1 step)", "answer": "- Step 1: If both numerators are the same positive value (here, both 1), then the fraction with the smaller denominator is the larger one. Concretely: $$\\tfrac{1}{2} > \\tfrac{1}{3}$$ because dividing 1 into 2 equal parts gives bigger parts than dividing it into 3 equal parts. So with $$x < \\sqrt{x}$$ in the interval, the denominator $$x$$ of $$\\tfrac{1}{x}$$ is smaller, making $$\\tfrac{1}{x}$$ larger.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "A student says \"if $$Q$$ is increased by 40%, then $$P \\propto 1/Q^2$$ should *also* increase by 40% because proportional means 'same direction'.\" What's wrong with this reasoning? (2 steps)", "answer": "- Step 1: \"Proportional to\" describes the *form* of the relationship, not the *direction* of the change. $$P \\propto 1/Q^2$$ means $$P$$ scales like $$1/Q^2$$, which is an *inverse* relationship in $$Q$$: as $$Q$$ grows, the $$1/Q^2$$ factor shrinks.\n- Step 2: Concretely, $$P_{\\text{new}} = \\tfrac{1}{(7/5)^2} P_{\\text{old}} = \\tfrac{25}{49} P_{\\text{old}} \\approx 0.51 P_{\\text{old}}$$, which is *less* than the original — a 49% *decrease*, not a 40% increase. The \"proportional\" part means the *constant of proportionality* $$k$$ is unchanged; the $$1/Q^2$$ part is doing the inverse scaling.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "The sphere:cylinder volume ratio $$\\tfrac{2}{3}$$ is sometimes called \"Archimedes' result.\" Why is this a memorable number for ESAT? (1 step)", "answer": "- Step 1: It's a *classical* result — Archimedes discovered that a sphere inscribed in a cylinder occupies exactly $$\\tfrac{2}{3}$$ of the cylinder's volume. ESAT problems often test this directly or as a multiple-choice distractor (with other fractions like $$\\tfrac{1}{3}$$, $$\\tfrac{1}{2}$$, $$\\tfrac{3}{4}$$). Memorising $$\\tfrac{2}{3}$$ saves computation time and gives you a sanity check on your derivation.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A function problem asks which of the following is largest for $$0 < x < 1$$: $$\\tfrac{1}{x},\\ x^2,\\ \\tfrac{1}{1+x},\\ \\tfrac{1}{\\sqrt{x}},\\ \\sqrt{x}$$. Describe the *systematic* elimination strategy used in the lesson. (2 steps)", "answer": "- Step 1: First, find the *range* of each function on the open interval $$(0, 1)$$. This categorises the options:\n  - Range $$(0, 1)$$ (always below 1): $$x^2$$, $$\\sqrt{x}$$ — eliminate.\n  - Range $$(\\tfrac{1}{2}, 1)$$ (also below 1): $$\\tfrac{1}{1+x}$$ — eliminate.\n  - Range $$(1, \\infty)$$ (above 1): $$\\tfrac{1}{x}$$, $$\\tfrac{1}{\\sqrt{x}}$$ — candidates.\n- Step 2: For the two remaining candidates whose ranges look identical, *test a single value* of $$x$$. Pick $$x = \\tfrac{1}{4}$$ (clean arithmetic): $$\\tfrac{1}{x} = 4$$, $$\\tfrac{1}{\\sqrt{x}} = 2$$. The larger is $$\\tfrac{1}{x}$$.\n\nTakeaway: range analysis eliminates ~60% of options instantly, leaving a tie-break you can resolve with one substitution.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In the range analysis above, why was $$\\tfrac{1}{1+x}$$ ruled out *as soon as* we noted the denominator exceeds 1? (1 step)", "answer": "- Step 1: Whenever the denominator of a fraction is *greater than 1* and the numerator is positive, the fraction is *less than 1*. Here, $$1+x > 1$$ whenever $$x > 0$$, so $$\\tfrac{1}{1+x} < 1$$ for all $$x > 0$$. Since the question asks for the *largest* value and the other candidates (like $$\\tfrac{1}{x}$$) can exceed 1, anything stuck below 1 is automatically a non-winner.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What does the order $$x^2 < x < \\sqrt{x}$$ for $$0 < x < 1$$ look like as a *graphical* picture? Sketch it briefly. (1 step)", "answer": "- Step 1: All three curves pass through $$(0, 0)$$ and $$(1, 1)$$. In between, the line $$y = x$$ is straight; the parabola $$y = x^2$$ curves *below* it (because squaring shrinks); the square-root curve $$y = \\sqrt{x}$$ curves *above* it (because square root grows). So the visual is three curves stacked: $$x^2$$ on the bottom, $$x$$ in the middle, $$\\sqrt{x}$$ on top, all meeting at the endpoints.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "Why is the principal-root convention ($$\\sqrt{x} \\geq 0$$) relevant to *inverses*, not just to arithmetic? (2 steps)", "answer": "- Step 1: An inverse function must be single-valued: for each input $$x$$, there's exactly one output. If we defined \"$$\\sqrt{x}$$\" to mean \"$$\\pm$$ the square root\", it wouldn't be a function — it would be a multi-valued relation.\n- Step 2: To make $$\\sqrt{x}$$ a function, we restrict it to the non-negative output, called the *principal* root. This is why the inverse of $$f(x) = x^2$$ (restricted to $$x \\geq 0$$) is $$f^{-1}(x) = \\sqrt{x}$$ (always non-negative) — both sides of the inverse pair use the same consistent choice of branch.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": true}, {"question": "\"Expand brackets before introducing fractions\" was a tutor rule. Apply the principle to simplify $$\\tfrac{1}{3}(5 + \\sqrt{2})^2$$. Describe the order of moves. (3 steps)", "answer": "- Step 1: First, expand the *inner* square: $$(5 + \\sqrt{2})^2 = 25 + 10\\sqrt{2} + 2 = 27 + 10\\sqrt{2}$$.\n- Step 2: Now distribute the outer factor: $$\\tfrac{1}{3}(27 + 10\\sqrt{2}) = 9 + \\tfrac{10\\sqrt{2}}{3}$$.\n- Step 3: This is the simplified form. The \"expand first\" rule prevented you from computing $$\\tfrac{1}{3} \\cdot 5 = \\tfrac{5}{3}$$ and $$\\tfrac{1}{3} \\cdot \\sqrt{2}$$ separately *before* squaring the inside — which would have been a recipe for losing track of the structure.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "An equation rearrangement gives $$b^2 = \\tfrac{a+2}{3a-1}$$. What is the final expression for $$b$$, and why does it have a \"$$\\pm$$\" sign? (1 step)", "answer": "- Step 1: $$b = \\pm\\sqrt{\\tfrac{a+2}{3a-1}}$$. The \"$$\\pm$$\" appears because taking the square root of $$b^2$$ yields two numbers that square to the same value: $$+k$$ and $$-k$$. Both are valid because the original equation only involved $$b^2$$ (which is symmetric in $$\\pm b$$). The \"$$\\pm$$\" captures both solutions in one expression.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A student solves a similar-triangle problem correctly, getting $$x = 6$$ cm, but writes the answer as the value of $$x$$ (i.e., 6) rather than the *length of DE* (which is $$x + 3 = 9$$). What's the conceptual trap? (1 step)", "answer": "- Step 1: The problem asked for $$DE$$, not for the variable $$x$$ used in the setup. The student solved for the algebraic variable, not the geometric quantity. The final step is to *re-read* the question and translate the algebraic result back into the geometric quantity asked for. Here, $$DE = x + 3 = 9$$ cm.\n\nTakeaway: after solving, always check what the question actually asked for; it's a common last-step error.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "Describe the overall exam strategy of \"do quick questions first, return to hard ones later.\" Why is this especially relevant in multiple-choice ESAT? (2 steps)", "answer": "- Step 1: ESAT questions are not in strict order of difficulty, and many questions (e.g., sphere:cylinder, equation rearrangement once you see the trick) can be solved in under 60 seconds. Easy marks are \"free\" if you grab them first.\n- Step 2: The hard questions (e.g., function behaviour, similar triangles + quadratic) often need careful analysis, drawing, or algebraic manipulation; they may take 3–5 minutes. Doing them first risks running out of time *and* losing the easy marks. Flag and return: spend 30–60 seconds on a question, skip if stuck, and come back with time remaining.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "\"For the proportionality question, use the exact fraction $$\\tfrac{7}{5}$$ for the multiplier, not the decimal $$1.4$$.\" Verify this numerically: does $$\\left(\\tfrac{7}{5}\\right)^2 = \\tfrac{49}{25}$$, and is this *exactly* the same as $$1.4^2 = 1.96$$? (1 step)", "answer": "- Step 1: Yes, $$\\left(\\tfrac{7}{5}\\right)^2 = \\tfrac{49}{25} = 1.96$$ — the two are exactly equal. But working with the fraction $$\\tfrac{49}{25}$$ keeps the *form* of the answer rational, so its reciprocal $$\\tfrac{25}{49}$$ is also rational, and the percentage change $$-\\tfrac{24}{49} \\times 100\\%$$ can be reported as an *exact* decimal in the original chain. The decimal $$1.96$$ would round at some point; the fraction doesn't.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "A \"limiting case\" sanity check for function behaviour: as $$x \\to 0^+$$, what happens to $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$\\tfrac{1}{x}$$, $$\\tfrac{1}{\\sqrt{x}}$$, $$\\tfrac{1}{1+x}$$? (1 step)", "answer": "- Step 1: \n  - $$x^2 \\to 0$$ (very slowly — smaller than $$x$$)\n  - $$x \\to 0$$\n  - $$\\sqrt{x} \\to 0$$ (faster than $$x$$ approaches 0, but still to 0)\n  - $$\\tfrac{1}{x} \\to +\\infty$$\n  - $$\\tfrac{1}{\\sqrt{x}} \\to +\\infty$$ (even faster than $$\\tfrac{1}{x}$$ approaches $$\\infty$$)\n  - $$\\tfrac{1}{1+x} \\to 1$$ (from above as $$x \\to 0^+$$, but already less than 1 for any $$x > 0$$)\n\nTakeaway: the \"small-$$x$$\" limit separates functions that go to 0 (shrinking) from those that go to $$\\infty$$ (growing); it's a quick way to order candidates.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "Why is it useful to know the test value of each function at $$x = \\tfrac{1}{4}$$? Specifically, name each value. (1 step)", "answer": "- Step 1: \n  - $$x^2 = \\tfrac{1}{16}$$\n  - $$x = \\tfrac{1}{4}$$\n  - $$\\sqrt{x} = \\tfrac{1}{2}$$\n  - $$\\tfrac{1}{\\sqrt{x}} = 2$$\n  - $$\\tfrac{1}{x} = 4$$\n  - $$\\tfrac{1}{1+x} = \\tfrac{1}{1.25} = \\tfrac{4}{5}$$\n\nThese values are clean, easy to remember, and confirm the full ordering: $$\\tfrac{1}{16} < \\tfrac{1}{4} < \\tfrac{1}{2} < \\tfrac{4}{5} < 1 < 2 < 4$$. A good \"anchor\" set for quick reasoning.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "For the percentage-change question on $$P \\propto 1/Q^2$$ with $$Q$$ up 40%, Harry drew two rectangles: one labelled \"100%\" and another labelled \"51% left.\" What's the intuition behind this visualisation? (1 step)", "answer": "- Step 1: The first rectangle represents $$P_{\\text{old}}$$ as a full 100% bar. The second rectangle, at \"51% left\", represents $$P_{\\text{new}}$$ as a *shorter* bar at about 51% of the original length. The visual gap between them is roughly half the bar, intuitively showing that the new $$P$$ is just over half the old $$P$$ — i.e., a *decrease* of just under 50%. This is a quick mental check against the more precise answer of 49% decrease.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "The lesson ended with \"A-level foundations matter more than ESAT tactics alone.\" Connect this advice to the specific topics covered: which A-level skills were reinforced by the ESAT problems? (1 step)", "answer": "- Step 1: The ESAT problems drew directly on: surd manipulation (Q1: expanding $$(4+\\sqrt{2})(2-\\sqrt{2})$$); volume formulas and ratio reasoning (Q2: cylinder + sphere); algebraic fluency with fractions (burger method, Q5, Q6); function analysis including range, monotonicity, and inverses (Q3: comparing five functions on $$(0,1)$$); similarity and quadratic solving (Q4); proportionality and percentage change (Q5); equation rearrangement (Q6). All of these are *core* A-level topics — preparing them prepares ESAT, and strong A-level performance itself matters for university admission.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}], "count": 55}}, "meta": {}};
