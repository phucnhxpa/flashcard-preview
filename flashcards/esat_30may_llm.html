tional relationships? (2 steps)", "answer": "- Step 1: Using the exact fraction preserves precision throughout the calculation. With $$m = \\frac{7}{5}$$, we get $$m^2 = \\frac{49}{25}$$ and $$\\frac{1}{m^2} = \\frac{25}{49}$$, which is exact. The percentage change is $$\\frac{25}{49} - 1 = -\\frac{24}{49}$$, a clean fraction we can evaluate at the end.\n- Step 2: Using 1.4 introduces $$m^2 = 1.96$$, and then $$\\frac{1}{1.96} = 0.510204...$$, which requires rounding at some point. If you round too early (say to 0.51), you get a 49% decrease. If you round differently, you might get 51% decrease — which is a *different answer option* in a multiple-choice exam. Exact fractions eliminate this risk entirely.\n\nThe principle: stay in fractions as long as possible; convert to decimals only at the final step, if at all.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "What is the \"burger method\" for dividing one fraction by another, and what is the visual intuition behind it? (3 steps)", "answer": "- Step 1: The rule is $$\\frac{a/b}{c/d} = \\frac{a \\times d}{b \\times c}$$. You multiply the \"outer\" pair ($$a$$ and $$d$$) for the numerator and the \"inner\" pair ($$b$$ and $$c$$) for the denominator.\n- Step 2: The visual: imagine the fractions stacked vertically. Draw an arrow from the top-left ($$a$$) to the bottom-right ($$d$$) — these form the top of the \"burger bun.\" Draw an arrow from the bottom-left ($$b$$) to the top-right ($$c$$) — these form the \"filling.\" The bun (outer product) goes on top; the filling (inner product) goes on the bottom.\n- Step 3: Why it works: dividing by $$\\frac{c}{d}$$ is the same as multiplying by its reciprocal $$\\frac{d}{c}$$. So $$\\frac{a}{b} \\div \\frac{c}{d} = \\frac{a}{b} \\times \\frac{d}{c} = \\frac{ad}{bc}$$. The burger method is just a mnemonic for \"flip the bottom fraction and multiply across.\"\n\nThe burger method is a shortcut for: flip the divisor, then multiply numerators and denominators separately.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When dividing a fraction by a whole number, like $$\\frac{a/b}{c}$$, how does the burger method apply, and what is the result? (2 steps)", "answer": "- Step 1: Treat the whole number $$c$$ as the fraction $$\\frac{c}{1}$$. Now apply the burger method: $$\\frac{a/b}{c/1} = \\frac{a \\times 1}{b \\times c} = \\frac{a}{bc}$$.\n- Step 2: The result is that dividing a fraction by a whole number simply multiplies the denominator by that number. For example, $$\\frac{3/7}{5} = \\frac{3}{7 \\times 5} = \\frac{3}{35}$$. The numerator stays the same; the denominator absorbs the whole number.\n\nIntuition: dividing by $$c$$ means splitting into $$c$$ equal parts, which is the same as making each part $$c$$ times smaller — hence multiplying the denominator by $$c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "When forming a ratio like $$\\frac{(4/3)\\pi r^3}{2\\pi r^3}$$, why should you cancel common factors before doing any arithmetic, and what happens if you don't? (3 steps)", "answer": "- Step 1: Both numerator and denominator share the factor $$\\pi r^3$$. Cancelling immediately gives $$\\frac{4/3}{2}$$, a much simpler expression. Now just apply the burger method: $$\\frac{4}{3} \\times \\frac{1}{2} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 2: If you don't cancel first, you might try multiplying out: numerator = $$\\frac{4}{3}\\pi r^3 \\approx 4.189\\pi r^3$$, denominator = $$2\\pi r^3 \\approx 6.283\\pi r^3$$, and then divide — introducing decimals, rounding errors, and unnecessary complexity.\n- Step 3: The general principle: in any ratio, cancel *everything* you can before computing. Algebraic cancellation is exact; decimal computation is approximate. Cancelling $$\\pi r^3$$ removes three symbols from the page and eliminates any chance of mis-entering them into a calculator.\n\nCancel first, compute last. This is the single most important algebraic habit for ratio problems.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A sphere of radius $$r$$ fits exactly inside a cylinder (same diameter, same height as the sphere's diameter). What fraction of the cylinder's volume does the sphere occupy, and why is this a result worth memorizing? (3 steps)", "answer": "- Step 1: The cylinder has radius $$r$$ and height $$2r$$ (the sphere's diameter). So $$V_{\\text{cyl}} = \\pi r^2 \\times 2r = 2\\pi r^3$$. The sphere has $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$.\n- Step 2: Form the ratio and cancel: $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{(4/3)\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 3: This is Archimedes' classical result: a sphere always fills exactly $$\\frac{2}{3}$$ of its circumscribing cylinder. It's worth memorizing because it's a fixed ratio — it doesn't depend on $$r$$. If you see \"sphere inside cylinder, same diameter and height,\" you can immediately write $$\\frac{2}{3}$$ without any calculation.\n\nArchimedes was so proud of this result that he reportedly asked for a sphere and cylinder to be engraved on his tombstone.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "When rearranging an equation of the form $$a = \\frac{b^2 + p}{qb^2 + r}$$ to solve for $$b$$, what is the strategy, and why is it important to collect all $$b^2$$ terms on one side before factoring? (4 steps)", "answer": "- Step 1: Cross-multiply to clear the fraction: $$a(qb^2 + r) = b^2 + p$$, which expands to $$aqb^2 + ar = b^2 + p$$.\n- Step 2: Now collect all $$b^2$$ terms on one side and all constant terms on the other: $$aqb^2 - b^2 = p - ar$$. This is the critical step — if you move terms to the wrong side or mix up signs, the factorisation won't work.\n- Step 3: Factor out $$b^2$$: $$b^2(aq - 1) = p - ar$$. Then divide: $$b^2 = \\frac{p - ar}{aq - 1}$$. Finally, take the square root of both sides: $$b = \\pm\\sqrt{\\frac{p - ar}{aq - 1}}$$.\n- Step 4: A common mistake is writing $$aqb^2 - b^2 + ar - p = 0$$ (moving everything to one side). While technically correct, this makes the $$b^2$$ factorisation harder to spot because the equation looks like it should be factored differently. Keeping $$b^2$$ terms on the left and constants on the right makes the structure transparent.\n\nThe key insight: equations of this form always reduce to \"factor out $$b^2$$, then divide.\" Set up the algebra to make that step obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "After isolating $$b^2 = \\frac{a+2}{3a-1}$$, why must you write $$b = \\pm\\sqrt{\\frac{a+2}{3a-1}}$$ with both signs, rather than just the positive root? (2 steps)", "answer": "- Step 1: In the original equation $$a = \\frac{b^2+2}{3b^2-1}$$, the variable $$b$$ only appears as $$b^2$$. This means both $$b = +c$$ and $$b = -c$$ (for any value $$c$$) produce the same $$b^2 = c^2$$ and therefore give the same value of $$a$$. The equation cannot distinguish between positive and negative $$b$$.\n- Step 2: Therefore, both roots are valid solutions. Writing only $$b = +\\sqrt{\\ldots}$$ would miss half the solution set. The $$\\pm$$ is not optional — it is required by the algebraic structure of the problem. Only if the problem stated \"$$b > 0$$\" could you discard the negative root.\n\nWhen the unknown appears only as its square, the equation is symmetric under sign flip, so both signs must be included.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In a similar-triangles problem where BC is parallel to DE and both triangles share vertex A, what is the proportion you set up, and what is the most common setup mistake? (3 steps)", "answer": "- Step 1: By AA similarity (angle A is shared, and corresponding angles are equal due to parallel lines), the triangles are similar. The proportion is $$\\frac{AB}{AD} = \\frac{BC}{DE}$$ — each ratio compares a side of the smaller triangle to the corresponding side of the larger triangle.\n- Step 2: The most common mistake is using $$DB$$ instead of $$AD$$ in the proportion. The side of the larger triangle is $$AD$$, which equals $$AB + BD$$. If the problem gives $$AB = 4$$ and $$DB = x - 4$$, then $$AD = 4 + (x-4) = x$$. Using $$DB$$ instead of $$AD$$ would give the wrong proportion.\n- Step 3: A reliable check: each ratio must compare \"small triangle side\" to \"large triangle side\" for the *same* position. $$AB$$ and $$AD$$ are both sides emanating from vertex A on the left, so they correspond. $$BC$$ and $$DE$$ are both the \"top\" sides opposite A, so they correspond. Mixing small-side with wrong large-side breaks the correspondence.\n\nAlways verify: does each fraction compare corresponding sides? And is the \"large\" side the full length, not just the extension?", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When factoring a quadratic like $$x^2 - 4x - 12 = 0$$, what is the product-sum method, and why is it preferred over the quadratic formula for ESAT-style questions? (3 steps)", "answer": "- Step 1: The product-sum method: you need two numbers whose product equals the constant term ($$-12$$) and whose sum equals the coefficient of $$x$$ ($$-4$$). List factor pairs of 12 with signs: $$(1, -12)$$ sum = $$-11$$; $$(2, -6)$$ sum = $$-4$$ ✓. Found it: the numbers are 2 and $$-6$$.\n- Step 2: Write the factorisation: $$(x + 2)(x - 6) = 0$$, giving $$x = -2$$ or $$x = 6$$. Since $$x$$ represents a length, reject $$x = -2$$.\n- Step 3: The quadratic formula $$x = \\frac{4 \\pm \\sqrt{16+48}}{2} = \\frac{4 \\pm \\sqrt{64}}{2} = \\frac{4 \\pm 8}{2}$$ also works but requires computing the discriminant, taking a square root, and simplifying — more steps, more places to make arithmetic errors. For clean integer answers (common in ESAT), inspection factoring is typically 10–15 seconds faster and less error-prone.\n\nThe product-sum method is a targeted search; the quadratic formula is a general algorithm. For integer solutions, targeted beats general.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "When expanding surd expressions like $$(4+\\sqrt{2})(2-\\sqrt{2})$$, what is the correct expansion, and what is the common sign error? (3 steps)", "answer": "- Step 1: Use FOIL (First, Outer, Inner, Last): $$4 \\times 2 = 8$$; $$4 \\times (-\\sqrt{2}) = -4\\sqrt{2}$$; $$\\sqrt{2} \\times 2 = 2\\sqrt{2}$$; $$\\sqrt{2} \\times (-\\sqrt{2}) = -2$$.\n- Step 2: Combine: $$8 - 4\\sqrt{2} + 2\\sqrt{2} - 2 = (8-2) + (-4\\sqrt{2}+2\\sqrt{2}) = 6 - 2\\sqrt{2}$$. The surd terms combine to $$-2\\sqrt{2}$$, not zero — they don't fully cancel.\n- Step 3: The common error is mishandling the signs on the cross terms. Students sometimes write $$+4\\sqrt{2}$$ instead of $$-4\\sqrt{2}$$, or think $$-4\\sqrt{2} + 2\\sqrt{2} = -2\\sqrt{4}$$ (incorrectly combining under one root). Each surd term keeps its own root; you combine only the coefficients: $$-4\\sqrt{2} + 2\\sqrt{2} = (-4+2)\\sqrt{2} = -2\\sqrt{2}$$.\n\nSurd terms combine like like-terms in algebra: same root, combine coefficients only. Different roots don't combine at all.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Why does the tutor recommend expanding brackets *before* multiplying by $$\\frac{1}{2}$$ when computing the area of a triangle with surd sides? (2 steps)", "answer": "- Step 1: The area is $$A = \\frac{1}{2}(4+\\sqrt{2})(2-\\sqrt{2})$$. If you distribute the $$\\frac{1}{2}$$ first — e.g., writing $$\\frac{4+\\sqrt{2}}{2} \\times (2-\\sqrt{2})$$ — you introduce fractions into the expansion immediately, creating more terms to track and more opportunities for sign/coefficient errors.\n- Step 2: Expanding $$(4+\\sqrt{2})(2-\\sqrt{2})$$ first gives clean integer and surd terms: $$6 - 2\\sqrt{2}$$. Then multiplying by $$\\frac{1}{2}$$ is trivial: $$3 - \\sqrt{2}$$. The principle: do the \"hard\" algebraic step (FOIL expansion) with clean integers, and introduce the fraction at the end when the expression is simpler.\n\nExpand first, fraction last. This reduces the number of terms carrying fractions at any given time.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "The function $$y = \\frac{1}{1+x}$$ has asymptotes at $$x = -1$$ and $$y = 0$$. For $$0 < x < 1$$, where does this function sit relative to the value 1, and why? (2 steps)", "answer": "- Step 1: At $$x = 0$$, $$y = \\frac{1}{1+0} = 1$$. At $$x = 1$$, $$y = \\frac{1}{1+1} = \\frac{1}{2}$$. The function is decreasing on this interval (as $$x$$ increases, the denominator grows, so the value shrinks).\n- Step 2: So on $$0 < x < 1$$, the function ranges from just below 1 (approaching from $$x=0^+$$) down to just above $$\\frac{1}{2}$$ (approaching $$x=1^-$$). It is always strictly less than 1 (except at the endpoint $$x=0$$, which is excluded by the strict inequality). This immediately eliminates it from any \"largest value\" comparison where other functions exceed 1.\n\nThe \"$$+1$$\" in the denominator shifts the reciprocal function rightward and ensures the denominator always exceeds 1 for positive $$x$$, keeping the whole expression below 1.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "For $$0 < x < 1$$, the functions $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ both pass through $$(1,1)$$. How do their shapes differ on this interval, and what does this tell you about their concavity? (3 steps)", "answer": "- Step 1: $$y = \\sqrt{x}$$ starts at $$(0,0)$$ and rises to $$(1,1)$$. It increases, but the rate of increase slows down as $$x$$ approaches 1 — the curve bends downward. This is **concave down** (like an inverted bowl).\n- Step 2: $$y = \\frac{1}{\\sqrt{x}}$$ starts at infinity (as $$x \\to 0^+$$) and falls to $$(1,1)$$. It decreases, but the rate of decrease slows down as $$x$$ approaches 1 — the curve bends upward. This is **concave up** (like a right-side-up bowl).\n- Step 3: The concavity difference has a practical consequence: for any $$x$$ strictly between 0 and 1, $$\\frac{1}{\\sqrt{x}}$$ is always above $$\\sqrt{x}$$. They only meet at $$(1,1)$$. The concave-up curve (falling from infinity) stays above the concave-down curve (rising from zero) throughout the entire interval.\n\nOne rises slowly from 0; the other falls slowly from infinity. They pinch together at $$(1,1)$$ but never cross on $$(0,1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q}$$ (simple inverse, not inverse-square), and $$Q$$ increases by 40%, does $$P$$ decrease by more or less than 40% — and why? (2 steps)", "answer": "- Step 1: With $$P = k/Q$$ and $$Q_{\\text{new}} = 1.4Q$$, we get $$P_{\\text{new}} = \\frac{k}{1.4Q} = \\frac{1}{1.4} P_{\\text{old}} \\approx 0.714 P_{\\text{old}}$$. The change is $$(0.714 - 1) \\times 100\\% \\approx -28.6\\%$$, which is less than a 40% decrease.\n- Step 2: For a simple inverse proportion, the percentage decrease in $$P$$ is always *less* than the percentage increase in $$Q$$. This contrasts with inverse-square ($$P \\propto 1/Q^2$$), where a 40% increase in $$Q$$ causes a 49% decrease in $$P$$ — *more* than the original change. The extra power in the denominator amplifies the effect.\n\nSimple inverse: $$P$$ changes less than $$Q$$. Inverse-square: $$P$$ changes more than $$Q$$. The power in the denominator determines whether the response is dampened or amplified.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "In the equation rearrangement problem, a student writes $$3ab^2 - b^2 - a + 2 = 0$$ after cross-multiplying and expanding. What is wrong with the sign of the constant term, and how did the error arise? (3 steps)", "answer": "- Step 1: Starting from $$3ab^2 - a = b^2 + 2$$, the student moves everything to the left side: subtract $$b^2$$ and subtract 2 from both sides.\n- Step 2: $$3ab^2 - a - b^2 - 2 = 0$$. The constant should be $$-2$$, not $$+2$$. The student likely moved the $$+2$$ to the left without changing its sign, writing $$-a + 2$$ instead of $$-a - 2$$.\n- Step 3: This is a classic sign error when rearranging: every term that crosses the equals sign must flip sign. The $$+2$$ on the right becomes $$-2$$ on the left. With the wrong sign, the subsequent factorisation $$b^2(3a-1) = a+2$$ would give $$b^2(3a-1) - (a+2) = 0$$, and the student's version $$b^2(3a-1) - a + 2 = 0$$ doesn't factor cleanly — it's a different equation entirely.\n\nWhen moving terms across the equals sign, every single term flips sign. No exceptions.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "When solving a quadratic from a geometry problem, you get $$x = -2$$ and $$x = 6$$. Why must you reject $$x = -2$$, and are there situations where a negative algebraic solution *is* valid? (2 steps)", "answer": "- Step 1: In this problem, $$x$$ represents a physical length (the side BC of a triangle). Lengths cannot be negative, so $$x = -2$$ is rejected as physically meaningless. This is a domain restriction imposed by the real-world context of the problem.\n- Step 2: Negative solutions *are* valid when the variable represents a quantity that can be negative — for example, if $$x$$ represents a coordinate on a number line, a temperature below zero, or a debt. The algebra doesn't care about sign; the interpretation does. Always check: what does $$x$$ represent, and can that quantity be negative?\n\nAlgebra gives you all solutions; the problem context tells you which ones to keep. Always filter mathematical solutions through physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "Why is it useful to scan the multiple-choice answer options *before* starting algebra on a rearrangement problem? Give a concrete example of how this saves time. (2 steps)", "answer": "- Step 1: In the rearrangement problem, all answer options have the form $$b = \\pm\\sqrt{\\frac{(\\text{something})}{(\\text{something})}}$$. This immediately tells you three things: (1) you'll need to isolate $$b^2$$, (2) you'll take a square root at the end, and (3) both $$\\pm$$ signs are expected. You now know the destination before you start.\n- Step 2: Without scanning, you might waste time exploring dead-end algebra paths — e.g., trying to solve for $$b$$ directly without first isolating $$b^2$$, or wondering whether the answer should have a $$\\pm$$. The options act as a roadmap: they confirm the structure of the answer, so you can work backward from the expected form and avoid unnecessary detours.\n\nReading the options first is like checking the answer format before writing an essay — it tells you what shape your working should take.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "When comparing two functions over an interval and systematic analysis leaves two candidates, what is the most efficient way to break the tie — and what makes a \"good\" test value? (2 steps)", "answer": "- Step 1: Pick a single specific value of $$x$$ within the interval and evaluate both functions. The one that gives the larger value at that point is the winner (assuming both functions are monotonic in the same direction, which they are in this context).\n- Step 2: A \"good\" test value is one that makes arithmetic trivial. For the interval $$0 < x < 1$$, pick $$x = \\frac{1}{4}$$ because $$\\sqrt{1/4} = 1/2$$, $$1/\\sqrt{1/4} = 2$$, and $$1/(1/4) = 4$$ — all clean numbers. Avoid values like $$x = 0.3$$ that produce messy decimals. The test value doesn't need to be \"representative\"; it just needs to distinguish the two candidates.\n\nOne clean test value beats a lengthy general argument. Pick fractions with simple square roots: $$\\frac{1}{4}$$, $$\\frac{1}{9}$$, $$\\frac{1}{16}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "The proportionality $$P \\propto \\frac{1}{Q^2}$$ can be written as $$P = \\frac{k}{Q^2}$$. What is $$k$$, and why does it cancel out when computing percentage change? (2 steps)", "answer": "- Step 1: $$k$$ is the constant of proportionality — it encodes the specific relationship between $$P$$ and $$Q$$ (determined by the physical setup, units, etc.). We don't need to know its value to solve the problem.\n- Step 2: When computing percentage change, we form the ratio $$\\frac{P_{\\text{new}}}{P_{\\text{old}}} = \\frac{k/(mQ)^2}{k/Q^2} = \\frac{k}{m^2 Q^2} \\times \\frac{Q^2}{k} = \\frac{1}{m^2}$$. The $$k$$ appears in both numerator and denominator and cancels completely. This is why we never need to know $$k$$ — it's irrelevant to the *relative* change.\n\nAny time you're computing a *ratio* of two values of the same proportional relationship, the constant of proportionality always cancels. Only the *multiplier* matters.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A student sees the fraction $$\\frac{4/3}{2}$$ and isn't sure how to simplify it. Using the burger method, walk through the simplification step by step. (3 steps)", "answer": "- Step 1: Write the denominator 2 as the fraction $$\\frac{2}{1}$$. Now the expression is $$\\frac{4/3}{2/1}$$.\n- Step 2: Apply the burger method: multiply outer terms for the numerator, inner terms for the denominator. Outer: $$4 \\times 1 = 4$$. Inner: $$3 \\times 2 = 6$$.\n- Step 3: Result: $$\\frac{4}{6} = \\frac{2}{3}$$. Alternatively, you can think of it as $$\\frac{4}{3} \\div 2 = \\frac{4}{3} \\times \\frac{1}{2} = \\frac{4}{6} = \\frac{2}{3}$$. Both approaches give the same answer; the burger method just makes the \"flip and multiply\" step visual.\n\nDividing by 2 is the same as multiplying by $$\\frac{1}{2}$$. The burger method makes this explicit by converting the whole number into a fraction first.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "The graph of $$y = x^2$$ and $$y = \\sqrt{x}$$ are reflections of each other across $$y = x$$. If the point $$(0.25, 0.0625)$$ lies on $$y = x^2$$, what point must lie on $$y = \\sqrt{x}$$, and why? (2 steps)", "answer": "- Step 1: Reflection across $$y = x$$ swaps the coordinates. The point $$(0.25, 0.0625)$$ on $$y = x^2$$ becomes $$(0.0625, 0.25)$$ on $$y = \\sqrt{x}$$.\n- Step 2: Verify: $$\\sqrt{0.0625} = \\sqrt{1/16} = 1/4 = 0.25$$. ✓ The inverse function takes the output of the original and returns the input. Since $$f(0.25) = 0.0625$$, we have $$f^{-1}(0.0625) = 0.25$$, which is exactly the swapped coordinates.\n\nEvery point on the inverse curve is the coordinate-swap of a point on the original curve. This is the geometric meaning of \"undoing\" a function.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "For the function $$y = \\frac{1}{x}$$ on $$0 < x < 1$$, the range is $$(1, \\infty)$$. What happens to the value of $$\\frac{1}{x}$$ as $$x$$ approaches 0 from the right, and why does this make $$\\frac{1}{x}$$ the \"winner\" among the five candidate functions? (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, the denominator approaches 0 while staying positive, so $$\\frac{1}{x} \\to +\\infty$$. The function grows without bound as you move closer to 0.\n- Step 2: Among the five options, only $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ produce values above 1. But as $$x \\to 0^+$$, $$\\frac{1}{x}$$ grows faster than $$\\frac{1}{\\sqrt{x}}$$ because the denominator $$x$$ shrinks faster than $$\\sqrt{x}$$. At every point in $$(0,1)$$, $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$, and the gap between them widens as $$x$$ approaches 0.\n\n$$\\frac{1}{x}$$ wins because it has the smallest denominator among the candidates that exceed 1, and a smaller denominator means a larger fraction.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Suppose $$P \\propto Q^3$$ instead of $$P \\propto 1/Q^2$$. If $$Q$$ increases by 10%, does $$P$$ increase or decrease, and by approximately what percentage? (2 steps)", "answer": "- Step 1: With $$P = kQ^3$$ and $$Q_{\\text{new}} = 1.1Q$$, we get $$P_{\\text{new}} = k(1.1Q)^3 = 1.1^3 \\times kQ^3 = 1.331 \\times P_{\\text{old}}$$. So $$P$$ increases.\n- Step 2: The percentage change is $$(1.331 - 1) \\times 100\\% = 33.1\\%$$ increase. Notice this is roughly 3 times the original 10% change — because the power is 3, the effect is approximately amplified by that factor for small percentage changes. This is a useful rule of thumb: for $$P \\propto Q^n$$, a small $$p\\%$$ change in $$Q$$ produces roughly $$n \\times p\\%$$ change in $$P$$.\n\nFor direct proportionality with power $$n$$: changes are amplified by factor $$n$$. For inverse proportionality with power $$n$$: changes are amplified and reversed.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "On an ESAT-style multiple-choice exam, why might the tutor advise doing \"quick questions first\" rather than working through in order? (2 steps)", "answer": "- Step 1: Not all questions are equally time-consuming. A rearrangement problem (like Q6) might take 30 seconds if you spot the cross-multiply trick, while a function behaviour analysis (like Q3) might take 3–4 minutes of graphing and testing. All questions carry equal marks.\n- Step 2: Spending 5 minutes on one hard question means 5 minutes not available for several easy ones. By collecting all the \"quick wins\" first, you bank guaranteed marks and reduce time pressure for the fiddly questions you return to. The strategy is: scan, sort by speed, then execute.\n\nEqual marks, unequal time. Maximize marks-per-minute by prioritizing speed, not difficulty.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "A student computes $$\\frac{1}{1.96} \\approx 0.51$$ and concludes that $$P$$ decreases by 51%. Identify and correct the error. (2 steps)", "answer": "- Step 1: The value 0.51 represents the fraction of $$P$$ that *remains*, not the fraction that was *lost*. If $$P_{\\text{new}} = 0.51 \\times P_{\\text{old}}$$, then the change is $$0.51 - 1 = -0.49$$, meaning a 49% decrease.\n- Step 2: The student confused \"51% remains\" with \"51% decrease.\" These are complementary: if 51% remains, then 49% was lost. The percentage decrease is always the complement of the remaining percentage (relative to 100%).\n\nRemaining fraction ≠ change fraction. Change = remaining − 1 (or equivalently, 100% − remaining %).", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "In the similar triangles problem, the proportion $$\\frac{4}{x} = \\frac{x}{x+3}$$ is set up. Why does cross-multiplying give a quadratic rather than a linear equation? (2 steps)", "answer": "- Step 1: Cross-multiplying: $$4(x+3) = x \\times x$$, which gives $$4x + 12 = x^2$$. The $$x \\times x$$ term produces $$x^2$$, making this a quadratic equation.\n- Step 2: The quadratic arises because the unknown $$x$$ appears in *both* the numerator of one ratio and the denominator of the other. When you cross-multiply, the two $$x$$'s multiply together, creating the $$x^2$$ term. This is a structural feature of problems where the same variable appears in corresponding positions of both ratios.\n\nWhen the unknown appears on both sides of the proportion (numerator on one side, denominator on the other), cross-multiplication always produces a quadratic.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "The expression $$(3+\\sqrt{5})(3-\\sqrt{5})$$ simplifies to just 4, with no surd term at all. What pattern does this illustrate, and why does the surd cancel? (2 steps)", "answer": "- Step 1: This is the **difference of two squares**: $$(a+b)(a-b) = a^2 - b^2$$. Here $$a = 3$$ and $$b = \\sqrt{5}$$, so the product is $$3^2 - (\\sqrt{5})^2 = 9 - 5 = 4$$.\n- Step 2: The surd cancels because the cross terms $$+a\\sqrt{5}$$ and $$-a\\sqrt{5}$$ are equal and opposite — they sum to zero. This always happens with conjugate pairs $$(a+\\sqrt{b})(a-\\sqrt{b})$$: the irrational parts annihilate, leaving only rational numbers. This is why rationalizing denominators works.\n\nConjugate surd pairs always produce rational results. This is the algebraic basis for rationalizing denominators and simplifying surd expressions.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "If $$Q$$ *decreases* by 20% in a relationship where $$P \\propto 1/Q^2$$, does $$P$$ increase or decrease, and by what approximate percentage? (2 steps)", "answer": "- Step 1: A 20% decrease means $$Q_{\\text{new}} = 0.8Q = \\frac{4}{5}Q$$. Then $$P_{\\text{new}} = \\frac{k}{(0.8Q)^2} = \\frac{k}{0.64Q^2} = \\frac{1}{0.64} P_{\\text{old}} = 1.5625 P_{\\text{old}}$$.\n- Step 2: Since $$P_{\\text{new}} > P_{\\text{old}}$$, $$P$$ increases. The percentage change is $$(1.5625 - 1) \\times 100\\% = 56.25\\%$$ increase. Notice: a 20% decrease in $$Q$$ causes a 56% increase in $$P$$ — the inverse-square relationship amplifies and reverses the direction of change.\n\nInverse proportionality reverses the direction (decrease → increase), and the square amplifies the magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "Why is the line $$y = x$$ the \"mirror\" for reflecting a function to its inverse, rather than the x-axis or y-axis? (2 steps)", "answer": "- Step 1: Reflecting across the x-axis swaps $$(a,b)$$ to $$(a,-b)$$ — this negates the output. Reflecting across the y-axis swaps $$(a,b)$$ to $$(-a,b)$$ — this negates the input. Neither of these produces the inverse function.\n- Step 2: The inverse function swaps the *roles* of input and output: if $$f$$ maps $$a \\to b$$, then $$f^{-1}$$ maps $$b \\to a$$. Geometrically, this means swapping the coordinates: $$(a,b) \\to (b,a)$$. The line $$y = x$$ is exactly the set of points where the two coordinates are equal, so it acts as the mirror line for this coordinate swap. Reflecting $$(a,b)$$ across $$y = x$$ gives $$(b,a)$$, which is precisely the inverse relationship.\n\nThe line $$y = x$$ is the geometric locus of \"input = output.\" Reflecting across it swaps input and output, which is the algebraic definition of an inverse.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "A student claims that since $$\\sqrt{x} > x$$ for $$0 < x < 1$$, then $$\\sqrt{x}$$ must also be greater than 1 on this interval. Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: The fact that $$\\sqrt{x} > x$$ only tells us the square root is *larger than the original number* — it doesn't tell us the square root exceeds 1. For example, at $$x = 0.25$$: $$\\sqrt{0.25} = 0.5$$, which is indeed larger than 0.25 but still less than 1.\n- Step 2: The correct bound comes from the endpoint: at $$x = 1$$, $$\\sqrt{1} = 1$$; and for all $$0 < x < 1$$, $$\\sqrt{x} < 1$$ (which we can verify by squaring both sides: $$\\sqrt{x} < 1 \\iff x < 1$$, which is true). So $$\\sqrt{x}$$ is between $$x$$ and 1 on this interval — larger than $$x$$ but still below 1.\n\n\"Greater than $$x$$\" does not mean \"greater than 1.\" On $$(0,1)$$, $$\\sqrt{x}$$ sits in the gap between $$x$$ and 1.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "Conceptually, why does $$\\frac{1}{\\sqrt{x}}$$ approach infinity as $$x \\to 0^+$$, but approach 1 as $$x \\to 1^-$$? Walk through the logic without computing specific values. (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, the denominator $$\\sqrt{x}$$ approaches 0 (the square root of a very small positive number is still a very small positive number). Dividing 1 by a quantity approaching 0 produces an arbitrarily large result — hence $$\\frac{1}{\\sqrt{x}} \\to \\infty$$.\n- Step 2: As $$x \\to 1^-$$, the denominator $$\\sqrt{x}$$ approaches $$\\sqrt{1} = 1$$. Dividing 1 by a quantity approaching 1 gives a result approaching 1 — hence $$\\frac{1}{\\sqrt{x}} \\to 1$$. The function smoothly descends from infinity to 1 across the interval, always staying above 1 because the denominator is always less than 1 (for $$0 < x < 1$$).\n\nThe behaviour is entirely controlled by the denominator: small denominator → large value; denominator near 1 → value near 1.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "If a problem gives you $$P \\propto \\frac{1}{Q^2}$$ and asks \"what is the new value of $$P$$ when $$Q$$ triples?\", why do you not need to know the original value of $$P$$ or the constant $$k$$? (2 steps)", "answer": "- Step 1: The proportional relationship means $$P = k/Q^2$$. When $$Q$$ triples to $$3Q$$, the new value is $$P_{\\text{new}} = k/(3Q)^2 = k/(9Q^2) = \\frac{1}{9} \\cdot k/Q^2 = \\frac{1}{9} P_{\\text{old}}$$.\n- Step 2: The original value of $$P$$ and the constant $$k$$ both appear in the expression $$k/Q^2 = P_{\\text{old}}$$, and they cancel when we form the ratio $$P_{\\text{new}}/P_{\\text{old}} = 1/9$$. We only need the *multiplier* on $$Q$$ (tripling = factor of 3) and the *power* in the relationship (square = power 2) to determine the relative change.\n\nProportional reasoning is about *multipliers*, not absolute values. The constant and original value are irrelevant for relative changes.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "A right triangle has sides $$(5+\\sqrt{3})$$ and $$(5-\\sqrt{3})$$. Without fully expanding, what pattern do you notice, and what is the area? (3 steps)", "answer": "- Step 1: The two sides are conjugate surds: $$(5+\\sqrt{3})$$ and $$(5-\\sqrt{3})$$. Their product is a difference of two squares: $$5^2 - (\\sqrt{3})^2 = 25 - 3 = 22$$.\n- Step 2: The area is $$\\frac{1}{2} \\times 22 = 11$$. No surd appears in the final answer because the conjugate pair eliminates the irrational part.\n- Step 3: This illustrates why spotting the difference-of-two-squares pattern is powerful: it bypasses the entire FOIL expansion. When you see $$(a+\\sqrt{b})(a-\\sqrt{b})$$, go straight to $$a^2 - b$$.\n\nConjugate sides in a right triangle always give a rational area. Spot the pattern, skip the expansion.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "A student solving $$a = \\frac{b^2+2}{3b^2-1}$$ for $$b$$ gets $$b = \\sqrt{\\frac{a+2}{3a-1}}$$ (positive root only). Their answer matches one of the options exactly. Why is their answer still wrong? (2 steps)", "answer": "- Step 1: The original equation involves only $$b^2$$, so both $$b = +c$$ and $$b = -c$$ satisfy the equation for any valid $$c$$. The student's answer misses the negative root entirely.\n- Step 2: The correct answer is $$b = \\pm\\sqrt{\\frac{a+2}{3a-1}}$$. Even if the positive-root-only version happens to appear as a distractor option in multiple choice, the correct option includes the $$\\pm$$. The student was likely drawn to the option that matched their incomplete working.\n\nWhen the unknown appears only as its square, the solution must include both signs. An answer without $$\\pm$$ is incomplete.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "Why does the tutor advise focusing on A-level foundations rather than ESAT-exclusive preparation? What is the strategic reasoning? (2 steps)", "answer": "- Step 1: The ESAT tests core mathematical skills — graph sketching, surd manipulation, proportional reasoning, quadratic algebra — which are all A-level content. There is no separate \"ESAT syllabus\" with unique topics you need to learn from scratch.\n- Step 2: Strong A-level performance matters for university admission independently of ESAT scores. Time spent reinforcing A-level foundations improves both your ESAT performance *and* your A-level grades. Time spent on ESAT-specific \"tricks\" only helps the ESAT. The return on investment favors foundational depth over tactical breadth.\n\nThe ESAT is a subset of A-level maths. Mastering A-level maths automatically prepares you for the ESAT, but not vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}], "count": 45}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Conceptually, why does the inequality $$x^2 < x < \\sqrt{x}$$ hold true for all $$x$$ in the interval $$0 < x < 1$$, and how does this relate to the geometric interpretation of squaring and square-rooting a fraction? (3 steps)", "answer": "- Step 1: Consider the operation of squaring a number between 0 and 1. Multiplying a proper fraction by itself yields a smaller fraction (e.g., $$0.5 \\times 0.5 = 0.25$$). Geometrically, this means the area of a square with side length $$x < 1$$ is smaller than its side length. Thus, $$x^2 < x$$.\n- Step 2: Consider the square root operation, which asks \"what side length gives an area of $$x$$?\". Since the area $$x$$ is larger than the area $$x^2$$, the required side length $$\\sqrt{x}$$ must be larger than $$x$$. Thus, $$x < \\sqrt{x}$$.\n- Step 3: Combining these gives the strict ordering $$x^2 < x < \\sqrt{x}$$. The core intuition is that for proper fractions, integer exponentiation shrinks the value toward zero, while fractional exponentiation (roots) expands it toward one, all bounded strictly between 0 and 1.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Given the ordering $$x^2 < x < \\sqrt{x}$$ for $$0 < x < 1$$, how can you deduce the relative sizes of their reciprocals $$\\frac{1}{x^2}$$, $$\\frac{1}{x}$$, and $$\\frac{1}{\\sqrt{x}}$$ without plugging in numbers, and what is the underlying mathematical principle? (2 steps)", "answer": "- Step 1: Apply the reciprocal function $$f(t) = \\frac{1}{t}$$ to the inequality. Because all terms are positive and the reciprocal function is strictly decreasing for $$t > 0$$, taking the reciprocal reverses the direction of the inequalities.\n- Step 2: Reversing $$x^2 < x < \\sqrt{x}$$ yields $$\\frac{1}{x^2} > \\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$. The underlying principle is that dividing 1 by a progressively larger denominator results in a progressively smaller quotient. Since $$\\sqrt{x}$$ is the largest denominator among the three, $$\\frac{1}{\\sqrt{x}}$$ is the smallest of the reciprocals.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "A student claims that for $$0 < x < 1$$, the function $$y = \\frac{1}{1+x}$$ will approach infinity as $$x \\to 0^+$$, similar to $$y = \\frac{1}{x}$$. Explain why this is a misconception by analyzing the denominator's limiting behaviour and the function's actual range on this interval. (2 steps)", "answer": "- Step 1: Analyze the denominator $$1+x$$. As $$x \\to 0^+$$, the denominator approaches $$1 + 0 = 1$$, not $$0$$. Therefore, the fraction approaches $$\\frac{1}{1} = 1$$, not infinity. The vertical asymptote for $$\\frac{1}{1+x}$$ is at $$x = -1$$, which is completely outside the interval $$0 < x < 1$$.\n- Step 2: Determine the actual range. At $$x \\to 0^+$$, $$y \\to 1$$. At $$x = 1$$, $$y = \\frac{1}{2}$$. Since the function is strictly decreasing, its range on $$0 < x < 1$$ is strictly bounded between $$\\frac{1}{2}$$ and $$1$$. It never exceeds 1, making it fundamentally different from $$\\frac{1}{x}$$, which is unbounded.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "When defining the inverse of $$f(x) = x^2$$, why must we restrict the domain to $$x \\geq 0$$ and define $$f^{-1}(x) = \\sqrt{x}$$ as strictly the positive root, rather than allowing $$\\sqrt{4} = \\pm 2$$? (2 steps)", "answer": "- Step 1: A mathematical function must pass the vertical line test, meaning each input maps to exactly one output. If we allowed $$\\sqrt{4} = \\pm 2$$, the inverse relation would map a single input (like 4) to two outputs (2 and -2), failing the strict definition of a function.\n- Step 2: To make the inverse a valid function, we restrict the original function $$f(x) = x^2$$ to a domain where it is one-to-one (bijective), typically $$x \\geq 0$$. The inverse of this restricted function is the principal (positive) square root, $$f^{-1}(x) = \\sqrt{x}$$. The negative branch is treated as a separate, distinct function, $$y = -\\sqrt{x}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In proportional reasoning, if $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by $$40\\%$$, why is it conceptually and practically superior to use the exact fraction multiplier $$\\frac{7}{5}$$ rather than the decimal $$1.4$$ when calculating the new value of $$P$$? (2 steps)", "answer": "- Step 1: Using the exact fraction $$\\frac{7}{5}$$ allows you to square the multiplier exactly: $$\\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$. The new value of $$P$$ is then exactly $$\\frac{25}{49} P_{\\text{old}}$$. This avoids any intermediate rounding errors or messy long division that occur when squaring $$1.4$$ to get $$1.96$$ and then computing $$\\frac{1}{1.96}$$.\n- Step 2: Exact fractions make percentage change calculations cleaner and more intuitive. The change is exactly $$\\frac{25}{49} - 1 = -\\frac{24}{49}$$, which is easily estimated mentally as slightly less than $$-\\frac{24}{48} = -50\\%$$ (specifically $$\\approx -49\\%$$). Decimals obscure these clean relational bounds and force reliance on calculator arithmetic.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "If a variable $$P$$ is inversely proportional to the square of $$Q$$ ($$P \\propto \\frac{1}{Q^2}$$), and $$Q$$ is scaled by a factor of $$m$$, what is the exact conceptual relationship between the scaling of $$Q$$ and the resulting scaling of $$P$$, and how does this explain the \"dampening\" effect of inverse-square laws? (2 steps)", "answer": "- Step 1: When $$Q$$ is scaled by $$m$$ ($$Q_{\\text{new}} = mQ$$), the new value of $$P$$ becomes $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{1}{m^2} \\frac{k}{Q^2} = \\frac{1}{m^2} P_{\\text{old}}$$. Thus, $$P$$ scales by the factor $$\\frac{1}{m^2}$$.\n- Step 2: This reveals the \"dampening\" effect: because the scaling factor $$m$$ is squared and then inverted, any increase in $$Q$$ causes a disproportionately large decrease in $$P$$. \n+ For example, doubling $$Q$$ ($$m=2$$) quarters $$P$$ ($$\\frac{1}{4}$$).\n+ Tripling $$Q$$ ($$m=3$$) reduces $$P$$ to a ninth ($$\\frac{1}{9}$$). \nThe squared term amplifies the magnitude of the change, and the inverse relationship flips its direction.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "When rearranging an equation of the form $$a = \\frac{b^2 + p}{qb^2 + r}$$ to solve for $$b$$, what is the most efficient conceptual sequence of algebraic moves to isolate $$b$$, and why should you avoid moving all terms to one side to equal zero? (3 steps)", "answer": "- Step 1: Clear the denominator by cross-multiplying to get $$a(qb^2 + r) = b^2 + p$$, then expand to $$aqb^2 + ar = b^2 + p$$. This removes the fraction, which is the primary structural barrier to isolation.\n- Step 2: Group all terms containing $$b^2$$ on one side and all constant terms (relative to $$b$$) on the other side, yielding $$aqb^2 - b^2 = p - ar$$. Avoid moving everything to one side (e.g., $$... = 0$$) because it obscures the factorisation step and makes it harder to visually isolate the $$b^2$$ cluster.\n- Step 3: Factor out $$b^2$$ to get $$b^2(aq - 1) = p - ar$$, divide to isolate $$b^2$$, and finally take the square root. Crucially, you must include the $$\\pm$$ sign ($$b = \\pm\\sqrt{\\dots}$$) because squaring destroys sign information, meaning both positive and negative roots are valid mathematical solutions for $$b$$.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Conceptually, why does a sphere inscribed perfectly inside a cylinder (where the cylinder's height and diameter both equal the sphere's diameter) always occupy exactly $$\\frac{2}{3}$$ of the cylinder's volume, regardless of the sphere's radius? (3 steps)", "answer": "- Step 1: Define the dimensions in terms of the sphere's radius $$r$$. The sphere has radius $$r$$. The cylinder perfectly encloses it, so the cylinder's base radius is also $$r$$, and its height $$h$$ is equal to the sphere's diameter, $$2r$$.\n- Step 2: Write the volume formulas. The cylinder's volume is $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$. The sphere's volume is $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$.\n- Step 3: Form the ratio and cancel the common scaling factor $$\\pi r^3$$. The ratio is $$\\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{2}{3}$$. Because both volumes scale with $$r^3$$, the $$r^3$$ term cancels out entirely, proving the $$\\frac{2}{3}$$ ratio is a universal geometric constant for this configuration, independent of the actual size.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "The \"burger method\" for dividing fractions states that $$\\frac{a/b}{c/d} = \\frac{ad}{bc}$$. Beyond memorizing the cross-multiplication visual, what is the fundamental algebraic justification for why multiplying by the reciprocal ($$\\frac{d}{c}$$) correctly evaluates the division? (2 steps)", "answer": "- Step 1: Division by a fraction is defined as multiplication by its multiplicative inverse. The expression $$\\frac{a/b}{c/d}$$ can be rewritten as $$\\frac{a}{b} \\div \\frac{c}{d}$$. To clear the complex fraction, you multiply the entire expression by $$1$$ in the form of $$\\frac{d/c}{d/c}$$.\n- Step 2: Multiplying the denominator $$\\frac{c}{d}$$ by $$\\frac{d}{c}$$ yields $$1$$. Multiplying the numerator $$\\frac{a}{b}$$ by $$\\frac{d}{c}$$ yields $$\\frac{ad}{bc}$$. The expression simplifies to $$\\frac{ad/bc}{1} = \\frac{ad}{bc}$$. The \"burger\" visual (outer terms multiply, inner terms multiply) is simply a mnemonic for this algebraic cancellation of the denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "In a problem where a smaller triangle is inscribed inside a larger triangle with a parallel base (e.g., $$\\triangle ABC$$ inside $$\\triangle ADE$$ with $$BC \\parallel DE$$), what is the most common conceptual trap when setting up the proportionality ratio for the sides, and how do you avoid it? (2 steps)", "answer": "- Step 1: The most common trap is using the segment between the parallel lines (e.g., $$BD$$) as the side length for the larger triangle, rather than the full side length from the common vertex (e.g., $$AD$$). Similarity ratios must compare the *entire* corresponding sides of the two triangles, not just the disjoint segments.\n- Step 2: To avoid this, explicitly define the full side lengths from the shared vertex. If $$AB$$ is given and $$BD$$ is given, you must calculate the full side $$AD = AB + BD$$ before setting up the ratio $$\\frac{BC}{DE} = \\frac{AB}{AD}$$. Always anchor your proportions to the shared vertex of the similar triangles.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Evaluate the limiting behaviour of the functions $$y = x^2$$, $$y = \\sqrt{x}$$, and $$y = \\frac{1}{x}$$ as $$x \\to 0^+$$ and as $$x \\to \\infty$$. How do these limits conceptually separate the functions into distinct growth/decay categories? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, both $$x^2$$ and $$\\sqrt{x}$$ decay to $$0$$, but $$x^2$$ decays much faster (it approaches 0 quicker than $$\\sqrt{x}$$). Conversely, $$\\frac{1}{x}$$ exhibits a vertical asymptote, growing unboundedly towards $$+\\infty$$.\n- Step 2: As $$x \\to \\infty$$, the behaviour flips. $$x^2$$ grows unboundedly towards $$+\\infty$$ (fastest growth), $$\\sqrt{x}$$ also grows towards $$+\\infty$$ but much slower, and $$\\frac{1}{x}$$ decays towards $$0$$ (horizontal asymptote).\n- Step 3: These limits separate them into categories: $$x^2$$ is a fast-growing polynomial, $$\\sqrt{x}$$ is a slow-growing fractional power, and $$\\frac{1}{x}$$ is a decaying rational function. The transition at $$x=1$$ (where all three equal 1) is the pivot point where their relative ordering reverses.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "If $$y \\propto \\frac{1}{x^2}$$, and $$x$$ is halved (multiplied by $$\\frac{1}{2}$$), by what factor does $$y$$ change? Explain the mental steps without using a calculator. (2 steps)", "answer": "- Step 1: Identify the scaling factor for $$x$$, which is $$m = \\frac{1}{2}$$. According to the inverse-square rule, $$y$$ scales by the factor $$\\frac{1}{m^2}$$.\n- Step 2: Calculate $$\\frac{1}{m^2}$$. Squaring $$\\frac{1}{2}$$ gives $$\\frac{1}{4}$$. Inverting $$\\frac{1}{4}$$ gives $$4$$. Therefore, $$y$$ increases by a factor of $$4$$ (it quadruples). Halving the denominator of an inverse-square relationship quadruples the result.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "Without calculating exact decimals, determine which is larger for $$x = \\frac{1}{9}$$: $$y = \\frac{1}{\\sqrt{x}}$$ or $$y = \\frac{1}{x}$$? Explain the conceptual shortcut. (2 steps)", "answer": "- Step 1: Recognize that for any $$x$$ in the interval $$0 < x < 1$$, the inequality $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ always holds because $$x < \\sqrt{x}$$, making the denominator of $$\\frac{1}{x}$$ smaller.\n- Step 2: Apply this to $$x = \\frac{1}{9}$$. Since $$\\frac{1}{9}$$ is between 0 and 1, $$\\frac{1}{x}$$ must be larger. \n+ Mental check: $$\\sqrt{1/9} = 1/3$$, so $$1/\\sqrt{x} = 3$$.\n+ Meanwhile, $$1/x = 9$$. \nIndeed, $$9 > 3$$. The conceptual shortcut bypasses the need to compute the roots entirely by relying on the established interval inequality.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Rearrange the formula $$k = \\frac{v^2}{v^2 + 1}$$ to make $$v$$ the subject. Walk through the conceptual steps to isolate $$v^2$$ and then $$v$$. (3 steps)", "answer": "- Step 1: Clear the fraction by multiplying both sides by $$(v^2 + 1)$$, yielding $$k(v^2 + 1) = v^2$$. Expand the left side to get $$kv^2 + k = v^2$$.\n- Step 2: Group the $$v^2$$ terms on one side. Subtract $$kv^2$$ from both sides and subtract $$k$$ from both sides to get $$v^2 - kv^2 = k$$. Factor out $$v^2$$ to get $$v^2(1 - k) = k$$, then divide to isolate $$v^2 = \\frac{k}{1 - k}$$.\n- Step 3: Take the square root of both sides to solve for $$v$$. Remember to include the $$\\pm$$ sign, resulting in $$v = \\pm\\sqrt{\\frac{k}{1 - k}}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": true}, {"question": "In the proportional relationship $$P = \\frac{k}{Q^2}$$, what happens conceptually and mathematically if $$Q = 0$$, and how does this dictate the domain of the function in physical applications (e.g., Newton's law of gravitation where $$Q$$ is distance)? (2 steps)", "answer": "- Step 1: Mathematically, substituting $$Q = 0$$ results in division by zero ($$P = \\frac{k}{0}$$), which is undefined. The function has a vertical asymptote at $$Q = 0$$, meaning $$P$$ approaches infinity as $$Q$$ approaches zero.\n- Step 2: In physical applications like gravity or electrostatics, this implies that as the distance between two point masses/charges approaches zero, the force approaches infinity. This singularity indicates the breakdown of the classical inverse-square model at $$Q=0$$, requiring quantum mechanics or a different physical model to describe the interaction at infinitesimally small distances. Thus, the physical domain is strictly $$Q > 0$$.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Conceptually, why does the inequality $$x^2 < x < \\sqrt{x}$$ hold true for all $$x$$ in the interval $$0 < x < 1$$, and how does this relate to the geometric meaning of squaring and square-rooting a fraction? (3 steps)", "answer": "- Step 1: Consider the effect of multiplying a fraction by itself. Since $$0 < x < 1$$, multiplying $$x$$ by a number less than 1 makes it smaller, so $$x \\cdot x < x \\cdot 1$$, which means $$x^2 < x$$.\n- Step 2: Consider the square root as the inverse operation. If squaring makes a fraction smaller, then taking the square root must make it larger to return to the original value. Thus, $$\\sqrt{x} > x$$.\n- Step 3: Combine these insights. Squaring shrinks the value below the identity line $$y=x$$, while square-rooting expands it above the identity line, yielding the strict ordering $$x^2 < x < \\sqrt{x}$$ for any proper fraction.\n\nTakeaway: Operations on fractions between 0 and 1 behave inversely to operations on numbers greater than 1.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Given the ordering $$x^2 < x < \\sqrt{x}$$ for $$0 < x < 1$$, how can you logically deduce the ordering of their reciprocals $$\\frac{1}{x^2}$$, $$\\frac{1}{x}$$, and $$\\frac{1}{\\sqrt{x}}$$ without testing specific numbers? (2 steps)", "answer": "- Step 1: Recall the property of reciprocals for positive numbers: if $$0 < a < b$$, then taking the reciprocal reverses the inequality, so $$\\frac{1}{a} > \\frac{1}{b}$$. This happens because dividing 1 by a smaller denominator yields a larger quotient.\n- Step 2: Apply this reversal to the known ordering $$x^2 < x < \\sqrt{x}$$. Reversing the inequalities gives $$\\frac{1}{x^2} > \\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.\n\nTakeaway: Taking the reciprocal of an ordered set of positive fractions flips the entire sequence.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Why is the function $$y = \\frac{1}{1+x}$$ strictly bounded between $$\\frac{1}{2}$$ and $$1$$ for the interval $$0 < x < 1$$, and why does this immediately eliminate it from being the \"largest\" function in this domain? (2 steps)", "answer": "- Step 1: Analyze the denominator $$1+x$$. Since $$0 < x < 1$$, adding 1 shifts the interval to $$1 < 1+x < 2$$.\n- Step 2: Take the reciprocal of the denominator's bounds. Since the denominator is strictly between 1 and 2, the fraction $$\\frac{1}{1+x}$$ must be strictly between $$\\frac{1}{2}$$ and $$\\frac{1}{1}$$ (which is 1). Because its maximum possible value is less than 1, it can never be the largest function when compared to functions that approach infinity (like $$\\frac{1}{x}$$).\n\nTakeaway: Bounding the denominator first provides a quick, calculation-free way to bound the entire rational function.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "If a variable $$P$$ is inversely proportional to the square of $$Q$$ ($$P \\propto \\frac{1}{Q^2}$$), and $$Q$$ is scaled by a factor of $$m$$, conceptually explain why $$P$$ scales by $$\\frac{1}{m^2}$$ rather than just $$\\frac{1}{m}$$. (2 steps)", "answer": "- Step 1: Write the proportionality as an equation with a constant $$k$$: $$P = \\frac{k}{Q^2}$$. When $$Q$$ is replaced by the new value $$mQ$$, the new denominator becomes $$(mQ)^2$$.\n- Step 2: Expand the new denominator to get $$m^2 Q^2$$. The new equation is $$P_{new} = \\frac{k}{m^2 Q^2} = \\frac{1}{m^2} \\left(\\frac{k}{Q^2}\\right)$$. The squaring operation applies to the scaling factor $$m$$ as well as the variable $$Q$$, resulting in a squared scaling effect on the denominator, and thus an inverse-squared effect on $$P$$.\n\nTakeaway: In inverse-square relationships, scaling the independent variable scales the dependent variable by the inverse square of that factor.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "When calculating the percentage change in $$P \\propto \\frac{1}{Q^2}$$ after a 40% increase in $$Q$$, why is it conceptually and practically superior to use the exact fraction $$\\frac{7}{5}$$ rather than the decimal $$1.4$$? (2 steps)", "answer": "- Step 1: Using the fraction $$\\frac{7}{5}$$ allows you to square the numerator and denominator independently: $$\\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$. This keeps the arithmetic in the realm of exact integers, avoiding floating-point errors or messy decimal multiplication ($$1.4 \\times 1.4 = 1.96$$).\n- Step 2: Finding the percentage change requires subtracting 1 from the scaling factor. With fractions, $$\\frac{25}{49} - 1 = -\\frac{24}{49}$$, which is immediately recognizable as slightly less than $$-\\frac{24}{48} = -0.5$$, giving an intuitive estimate of roughly a 49% decrease. Decimals like $$\\frac{1}{1.96} - 1$$ require long division or a calculator to achieve the same insight.\n\nTakeaway: Exact fractions preserve structural relationships and make mental estimation of percentage changes significantly easier.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "When reflecting the graph of $$y = x^2$$ across the line $$y = x$$ to find its inverse, why must we restrict the domain of $$y = x^2$$ to $$x \\geq 0$$, and what is the conceptual consequence for the notation $$\\sqrt{x}$$? (3 steps)", "answer": "- Step 1: A function must be one-to-one (pass the horizontal line test) to have a valid inverse function. The full parabola $$y = x^2$$ fails this test because both $$x = 2$$ and $$x = -2$$ map to $$y = 4$$.\n- Step 2: By restricting the domain to $$x \\geq 0$$, we isolate the right half of the parabola, which is strictly increasing and one-to-one. Reflecting this specific branch across $$y = x$$ yields the top half of a sideways parabola.\n- Step 3: This geometric restriction defines the principal square root. The notation $$\\sqrt{x}$$ exclusively represents this positive, upper branch. Therefore, $$\\sqrt{4} = 2$$ strictly, and writing $$\\sqrt{4} = -2$$ is conceptually incorrect because it belongs to the discarded negative branch.\n\nTakeaway: The square root symbol denotes a function, and functions must have a single output, forcing the convention of the positive principal root.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "When rearranging an equation of the form $$a = \\frac{b^2 + p}{qb^2 + r}$$ to solve for $$b$$, why is it strategically better to collect all $$b^2$$ terms on one side and constants on the other, rather than moving everything to one side to equal zero? (2 steps)", "answer": "- Step 1: Moving everything to one side (e.g., $$aqb^2 + ar - b^2 - p = 0$$) creates a quadratic equation in terms of $$b$$. While technically solvable via the quadratic formula, it obscures the simple linear relationship that exists with respect to $$b^2$$.\n- Step 2: Grouping $$b^2$$ terms on one side (e.g., $$aqb^2 - b^2 = p - ar$$) allows you to factor out $$b^2$$ directly: $$b^2(aq - 1) = p - ar$$. This reduces the problem to simple division followed by a square root, bypassing the unnecessary complexity of the quadratic formula.\n\nTakeaway: Treat $$b^2$$ as a single atomic variable during rearrangement to keep the algebra linear and straightforward.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "After isolating $$b^2$$ in an algebraic rearrangement to get $$b^2 = \\text{expression}$$, why must the final step to isolate $$b$$ include a $$\\pm$$ sign, and how does this differ from simplifying an expression like $$\\sqrt{b^2}$$? (2 steps)", "answer": "- Step 1: When solving an equation like $$b^2 = 9$$, you are asking \"what numbers, when squared, give 9?\" Both $$3$$ and $$-3$$ satisfy this condition, so the solution set is $$b = \\pm 3$$. The $$\\pm$$ captures both valid algebraic roots.\n- Step 2: This is fundamentally different from evaluating the function $$\\sqrt{b^2}$$, which by definition returns the principal (non-negative) root, yielding $$|b|$$. When *solving* an equation, you must manually introduce the $$\\pm$$ to account for the negative branch that the radical symbol inherently hides.\n\nTakeaway: The radical symbol $$\\sqrt{}$$ evaluates to a single positive number, but the algebraic *action* of taking a square root to solve an equation requires $$\\pm$$ to find all solutions.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "Conceptually, why does the ratio of the volume of a sphere to the volume of its circumscribing cylinder (where height equals diameter) always equal exactly $$\\frac{2}{3}$$, regardless of the sphere's radius? (2 steps)", "answer": "- Step 1: Both the sphere's volume ($$\\frac{4}{3}\\pi r^3$$) and the cylinder's volume ($$\\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$) scale with the cube of the radius. Because they share the exact same dimensional scaling factor ($$r^3$$), the radius completely cancels out when forming the ratio.\n- Step 2: The remaining constant coefficients are $$\\frac{4}{3}$$ for the sphere and $$2$$ (which is $$\\frac{6}{3}$$) for the cylinder. Dividing these constants yields $$\\frac{4/3}{6/3} = \\frac{4}{6} = \\frac{2}{3}$$. This geometric invariant is Archimedes' famous discovery.\n\nTakeaway: When comparing volumes of geometrically similar or tightly bound shapes, the variable dimensions cancel out, leaving a pure constant ratio.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "In a problem where a smaller triangle $$ABC$$ is inside a larger triangle $$ADE$$ with $$BC \\parallel DE$$, why is it a common trap to use the segment $$DB$$ directly in the similarity ratio $$\\frac{AB}{DB} = \\frac{BC}{DE}$$, and what is the correct conceptual setup? (2 steps)", "answer": "- Step 1: The similarity ratio must compare corresponding *full* sides of the two similar triangles, originating from the common vertex $$A$$. The segment $$DB$$ is not a side of either triangle; it is merely the difference in length between the full side $$AD$$ and the smaller side $$AB$$.\n- Step 2: The correct setup uses the full side of the larger triangle, which is $$AD = AB + DB$$. The valid proportion is therefore $$\\frac{AB}{AD} = \\frac{BC}{DE}$$. Using $$DB$$ instead of $$AD$$ incorrectly compares a side of the small triangle to a partial segment of the large triangle.\n\nTakeaway: Similarity ratios strictly require corresponding full side lengths from the shared vertex, not the intermediate segments between the parallel lines.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "When calculating the area of a right triangle with surd sides like $$(4+\\sqrt{2})$$ and $$(2-\\sqrt{2})$$, why is it strategically safer to fully expand the brackets before multiplying by the $$\\frac{1}{2}$$ from the area formula? (2 steps)", "answer": "- Step 1: Multiplying by $$\\frac{1}{2}$$ first forces you to distribute the fraction into one of the surd brackets (e.g., $$\\frac{4+\\sqrt{2}}{2} \\times (2-\\sqrt{2})$$), creating messy fractional surds like $$2 + \\frac{\\sqrt{2}}{2}$$ which are highly prone to arithmetic errors during the subsequent FOIL expansion.\n- Step 2: Expanding the brackets first keeps all terms as integers and simple surds ($$8 - 4\\sqrt{2} + 2\\sqrt{2} - 2 = 6 - 2\\sqrt{2}$$). Only after collecting like terms do you apply the $$\\frac{1}{2}$$, resulting in a clean, single-step halving: $$\\frac{1}{2}(6 - 2\\sqrt{2}) = 3 - \\sqrt{2}$$.\n\nTakeaway: Delaying fraction multiplication until after polynomial expansion minimizes the number of fractional operations and reduces cognitive load.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Conceptually, why does the \"burger method\" (cross-multiplying diagonals) work for dividing fractions, such as $$\\frac{a/b}{c/d} = \\frac{ad}{bc}$$, and what does it represent in terms of fraction operations? (2 steps)", "answer": "- Step 1: Dividing by a fraction is mathematically defined as multiplying by its reciprocal. So, $$\\frac{a}{b} \\div \\frac{c}{d}$$ is exactly equivalent to $$\\frac{a}{b} \\times \\frac{d}{c}$$.\n- Step 2: When multiplying two fractions, you multiply the numerators together and the denominators together. The \"outer\" terms $$a$$ and $$d$$ become the new numerator ($$ad$$), and the \"inner\" terms $$b$$ and $$c$$ become the new denominator ($$bc$$). The cross-multiplication visual is just a mnemonic for this standard multiplication of reciprocals.\n\nTakeaway: The burger method is not a new rule; it is a visual shortcut for multiplying by the reciprocal and combining the numerators and denominators.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 20%, how can you use exact fractions to quickly determine the approximate percentage decrease in $$P$$ without a calculator? (3 steps)", "answer": "- Step 1: Convert the 20% increase into an exact fraction multiplier. A 20% increase means the new value is 120% of the old, which simplifies to $$\\frac{120}{100} = \\frac{6}{5}$$.\n- Step 2: Apply the inverse-square relationship to the multiplier. The new $$P$$ scales by the inverse square of $$\\frac{6}{5}$$, which is $$\\left(\\frac{5}{6}\\right)^2 = \\frac{25}{36}$$.\n- Step 3: Estimate the percentage change. The fraction $$\\frac{25}{36}$$ is slightly less than $$\\frac{25}{35}$$ (which is $$\\frac{5}{7} \\approx 0.71$$) and close to $$\\frac{24}{36} = \\frac{2}{3} \\approx 0.67$$. Since $$\\frac{25}{36} \\approx 0.69$$, the value decreases by roughly $$1 - 0.69 = 0.31$$, or a 31% decrease.\n\nTakeaway: Converting percentages to simple fractions allows for exact squaring and easy mental approximation of the final percentage change.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "To prove that $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ for $$0 < x < 1$$, how does testing the limiting case as $$x \\to 0^+$$ provide a stronger conceptual argument than just testing a single mid-point like $$x = 0.5$$? (2 steps)", "answer": "- Step 1: Testing a single point (like $$x=0.5$$) only proves the inequality holds at that specific coordinate; it doesn't guarantee the functions don't cross elsewhere in the interval.\n- Step 2: Analyzing the limit as $$x \\to 0^+$$ shows that both functions approach infinity, but $$\\frac{1}{x}$$ grows much faster because its denominator shrinks quadratically relative to $$\\frac{1}{\\sqrt{x}}$$. Since both functions are continuous, strictly decreasing, and only intersect at $$x=1$$, the one that grows faster near the asymptote ($$x=0$$) must remain strictly above the other for the entire interval $$0 < x < 1$$.\n\nTakeaway: Limits and intersection points define the global behavior of functions over an interval, whereas single test points only offer local snapshots.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": true}, {"question": "Without calculating exact values, how can you systematically eliminate $$x^2$$, $$\\sqrt{x}$$, and $$\\frac{1}{1+x}$$ as candidates for the \"largest function\" on the interval $$0 < x < 1$$, leaving only $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$? (3 steps)", "answer": "- Step 1: Evaluate the upper bound of the \"shrinking\" functions. For $$0 < x < 1$$, both $$x^2$$ and $$\\sqrt{x}$$ are positive numbers strictly less than 1. Thus, their maximum possible value is less than 1, eliminating them.\n- Step 2: Evaluate the bounds of the shifted reciprocal. For $$\\frac{1}{1+x}$$, the denominator is strictly between 1 and 2, meaning the entire fraction is strictly between $$\\frac{1}{2}$$ and 1. Since it never exceeds 1, it is eliminated.\n- Step 3: Evaluate the pure reciprocals. Both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ have denominators less than 1, meaning their values are strictly greater than 1 (approaching infinity as $$x \\to 0$$). These are the only two candidates that can achieve large values.\n\nTakeaway: Grouping functions by their range boundaries (below 1 vs. above 1) rapidly filters out incorrect options in comparative function problems.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "When using the \"burger method\" to divide a fraction by a whole number, such as $$\\frac{a/b}{c}$$, why is it conceptually necessary to treat the whole number $$c$$ as $$\\frac{c}{1}$$ before applying the diagonal multiplication rule? (2 steps)", "answer": "- Step 1: The burger method's diagonal rule ($$\\frac{\\text{outer}}{\\text{inner}}$$) strictly relies on having four distinct terms: a numerator and denominator for both the dividend and the divisor. A standalone whole number lacks an explicit denominator.\n- Step 2: By rewriting $$c$$ as $$\\frac{c}{1}$$, you establish the missing \"1\" in the bottom-right position. The outer terms are now $$a$$ and $$1$$ (giving $$a \\times 1 = a$$), and the inner terms are $$b$$ and $$c$$ (giving $$b \\times c = bc$$), correctly yielding $$\\frac{a}{bc}$$. Without this step, students often mistakenly multiply the numerator by $$c$$ instead of the denominator.\n\nTakeaway: Every integer in a fraction operation must be explicitly formatted as a rational number to maintain the structural integrity of the cross-multiplication algorithm.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "In the context of time-pressured multiple-choice exams like the ESAT, why is using a product-sum table to factor a quadratic like $$x^2 - 4x - 12 = 0$$ conceptually and practically superior to applying the quadratic formula? (2 steps)", "answer": "- Step 1: ESAT questions are deliberately designed with clean, integer, or simple surd roots to test algebraic intuition rather than brute-force calculation. The product-sum method (finding two numbers that multiply to $$-12$$ and add to $$-4$$) directly exploits this design, usually resolving in 10–15 seconds of mental math.\n- Step 2: The quadratic formula ($$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$) introduces unnecessary procedural overhead: calculating the discriminant ($$16 - 4(1)(-12) = 64$$), taking its square root ($$8$$), and performing fraction arithmetic. This triples the cognitive load and creates multiple opportunities for sign errors without providing any additional insight.\n\nTakeaway: Match your solving method to the exam's design philosophy; clean coefficients are a signal to use mental factoring over mechanical formulas.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}], "count": 17}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Why is the interval $$0 < x < 1$$ sometimes called the \"inversion zone\" for elementary operations? (3 steps)", "answer": "- Step 1: The interval $$(0, 1)$$ consists of positive numbers strictly less than 1. Numbers in this range flip the usual effect of multiplying, taking square roots, and reciprocating.\n- Step 2: For any $$x \\in (0, 1)$$:\n+ Squaring **shrinks** the value: $$x^2 < x$$ (multiplying by something <1 makes things smaller).\n+ Square-rooting **enlarges** the value: $$\\sqrt{x} > x$$ (it undoes the squaring shrink).\n+ Reciprocating **pushes past 1**: $$\\frac{1}{x} > 1$$ (a fraction less than 1 has a reciprocal greater than 1).\n- Step 3: The result is a clean ordering on this interval: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. The interval $$(0, 1)$$ is where standard operations behave \"upside-down\" compared to $$x > 1$$.\n\nThis is the master insight of the lesson — once you know this ordering, the function-comparison problems become almost trivial.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "Why does squaring a number in $$(0, 1)$$ make it smaller? (2 steps)", "answer": "- Step 1: Squaring means multiplying a number by itself. If $$0 < x < 1$$, then $$x$$ is a positive multiplier less than 1 — so multiplying anything by $$x$$ shrinks it.\n- Step 2: Applying this twice: $$x \\cdot x = x^2$$, and since the first multiplication by $$x$$ shrinks, the second one shrinks further. So $$x^2 < x$$.\n\nExamples: $$0.5 \\times 0.5 = 0.25 < 0.5$$; $$0.9 \\times 0.9 = 0.81 < 0.9$$. The same logic explains why $$x^3 < x^2 < x$$ on $$(0, 1)$$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why does taking the square root of a number in $$(0, 1)$$ make it larger? (2 steps)", "answer": "- Step 1: The square root operation is the **inverse** of squaring. Since squaring shrinks on $$(0, 1)$$, un-squaring (taking the square root) enlarges.\n- Step 2: If $$\\sqrt{x} = y$$, then $$y^2 = x$$. Since $$y^2 < y$$ on $$(0, 1)$$, we have $$x < y$$, i.e., $$\\sqrt{x} > x$$.\n\nExamples: $$\\sqrt{0.25} = 0.5 > 0.25$$; $$\\sqrt{0.81} = 0.9 > 0.81$$. The square root \"pays back\" the squaring that wasn't lost.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Why is $$\\frac{1}{x} > 1$$ for every $$x \\in (0, 1)$$? (2 steps)", "answer": "- Step 1: On $$(0, 1)$$, we have $$x < 1$$. Both sides are positive, so we can multiply both sides by $$\\frac{1}{x}$$ without flipping the inequality:\n+ $$x \\cdot \\frac{1}{x} < 1 \\cdot \\frac{1}{x}$$\n+ $$1 < \\frac{1}{x}$$\n- Step 2: So the reciprocal of a number in $$(0, 1)$$ is always greater than 1. As $$x \\to 0^+$$, $$\\frac{1}{x} \\to +\\infty$$ — without bound.\n\nThe same argument works for any positive number less than 1: its reciprocal exceeds 1, and the smaller the number, the bigger the reciprocal.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "On the interval $$0 < x < 1$$, what is the ordering of $$x^2$$, $$x$$, and $$\\sqrt{x}$$? (1 step)", "answer": "- Step 1: $$x^2 < x < \\sqrt{x}$$.\n+ $$x^2 < x$$ because squaring shrinks on $$(0, 1)$$.\n+ $$x < \\sqrt{x}$$ because square-rooting enlarges on $$(0, 1)$$.\n+ By transitivity, $$x^2 < \\sqrt{x}$$ as well.\n\nNumeric check at $$x = \\frac{1}{4}$$: $$x^2 = \\frac{1}{16}$$, $$x = \\frac{1}{4}$$, $$\\sqrt{x} = \\frac{1}{2}$$. Indeed $$\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2}$$. ✓", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is the range of $$y = x^2$$ on the interval $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: At the boundaries: as $$x \\to 0^+$$, $$x^2 \\to 0$$; at $$x = 1$$, $$x^2 = 1$$.\n- Step 2: The function is continuous and strictly increasing on this interval, so it takes every value strictly between 0 and 1. **Range: $$(0, 1)$$.**\n\nThis range is bounded above by 1, which is why $$x^2$$ can never be the largest of a list when $$0 < x < 1$$ — it can never even reach 1, let alone exceed it.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the range of $$y = \\sqrt{x}$$ on the interval $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\sqrt{x} \\to 0$$; at $$x = 1$$, $$\\sqrt{x} = 1$$.\n- Step 2: The function is continuous and strictly increasing on this interval, so the range is **$$(0, 1)$$** — values strictly between 0 and 1.\n\nLike $$x^2$$, $$\\sqrt{x}$$ cannot exceed 1 on $$(0, 1)$$. This is one of the key eliminations in the function-comparison problem.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the range of $$y = \\frac{1}{x}$$ on the interval $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\frac{1}{x} \\to +\\infty$$; at $$x = 1$$, $$\\frac{1}{x} = 1$$.\n- Step 2: The function is continuous and strictly **decreasing** on this interval, so the range is **$$(1, +\\infty)$$** — values strictly greater than 1.\n\nThis is what makes $$\\frac{1}{x}$$ a top candidate in \"largest value\" problems: its range on $$(0, 1)$$ is unbounded above.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is the range of $$y = \\frac{1}{\\sqrt{x}}$$ on the interval $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\frac{1}{\\sqrt{x}} \\to +\\infty$$; at $$x = 1$$, $$\\frac{1}{\\sqrt{x}} = 1$$.\n- Step 2: The function is continuous and strictly **decreasing** on this interval, so the range is **$$(1, +\\infty)$$** — values strictly greater than 1.\n\nSame unbounded range as $$\\frac{1}{x}$$. This is why $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ tie at the range-analysis step, and we need a tiebreaker to pick between them.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is the range of $$y = \\frac{1}{1+x}$$ on the interval $$0 < x < 1$$? (3 steps)", "answer": "- Step 1: Evaluate at the boundaries: at $$x = 0$$, $$\\frac{1}{1+0} = 1$$; at $$x = 1$$, $$\\frac{1}{1+1} = \\frac{1}{2}$$.\n- Step 2: As $$x$$ increases, $$1+x$$ increases, so the fraction $$\\frac{1}{1+x}$$ decreases. The function is continuous and strictly decreasing on $$(0, 1)$$.\n- Step 3: The range is **$$\\left(\\frac{1}{2}, 1\\right)$$** — values strictly between $$\\frac{1}{2}$$ and 1.\n\nNote: even though $$\\frac{1}{1+x}$$ starts at 1 (at $$x = 0$$), it immediately drops below 1 for any $$x > 0$$. So on the open interval $$(0, 1)$$, $$\\frac{1}{1+x} < 1$$ strictly.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What are the asymptotes of the curve $$y = \\frac{1}{x}$$? (1 step)", "answer": "- Step 1: Two asymptotes:\n+ **Vertical asymptote at $$x = 0$$** (the $$y$$-axis): as $$x \\to 0^+$$, $$\\frac{1}{x} \\to +\\infty$$, so the curve shoots up along the $$y$$-axis but never touches it.\n+ **Horizontal asymptote at $$y = 0$$** (the $$x$$-axis): as $$x \\to +\\infty$$, $$\\frac{1}{x} \\to 0^+$$, so the curve approaches the $$x$$-axis from above but never touches it.\n+ **Anchor point:** the curve passes through $$(1, 1)$$, so both asymptotes are at distance 1 from this point.\n\nA sketch that omits either asymptote is incomplete — asymptotes are essential features of this curve.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "What are the asymptotes of the curve $$y = \\frac{1}{1+x}$$? (1 step)", "answer": "- Step 1: Two asymptotes:\n+ **Vertical asymptote at $$x = -1$$**: the denominator $$1 + x$$ is zero there, so the function is undefined. As $$x \\to -1^+$$, $$\\frac{1}{1+x} \\to +\\infty$$.\n+ **Horizontal asymptote at $$y = 0$$**: as $$x \\to +\\infty$$, $$1+x$$ grows, so $$\\frac{1}{1+x} \\to 0^+$$.\n+ **Key points:** passes through $$(0, 1)$$ and $$(1, \\frac{1}{2})$$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Do the curves $$y = x^2$$ and $$y = \\sqrt{x}$$ have any asymptotes? (1 step)", "answer": "- Step 1: **No** — neither curve has asymptotes.\n+ $$y = x^2$$: a parabola opening upward, defined for all real $$x$$, grows without bound slowly. No asymptotes.\n+ $$y = \\sqrt{x}$$: a sideways half-parabola, defined only for $$x \\geq 0$$. No asymptotes — the boundary at $$x = 0$$ is a hard wall (the function is defined as 0 there), not an asymptote.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "Where do the curves $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ intersect? (3 steps)", "answer": "- Step 1: Set $$\\sqrt{x} = \\frac{1}{\\sqrt{x}}$$.\n- Step 2: Multiply both sides by $$\\sqrt{x}$$ (positive, so inequality-safe): $$x = 1$$.\n- Step 3: The curves meet at exactly one point: $$(1, 1)$$.\n\nBehaviour: for $$0 < x < 1$$, $$\\frac{1}{\\sqrt{x}} > \\sqrt{x}$$ (the reciprocal curve is above). For $$x > 1$$, the relationship reverses ($$\\sqrt{x} > \\frac{1}{\\sqrt{x}}$$). They \"kiss\" at $$(1, 1)$$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "Is the curve $$y = \\sqrt{x}$$ concave up or concave down? (1 step)", "answer": "- Step 1: $$y = \\sqrt{x}$$ is **concave down** on its domain ($$x \\geq 0$$).\n\nIt curves like the right half of a downward-opening parabola: starts flat-ish at the origin and bends over as $$x$$ grows. The slope (derivative) of $$\\sqrt{x}$$ is $$\\frac{1}{2\\sqrt{x}}$$, which decreases as $$x$$ increases — and a decreasing slope means concave down.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Is the curve $$y = \\frac{1}{\\sqrt{x}}$$ concave up or concave down? (1 step)", "answer": "- Step 1: $$y = \\frac{
