)^2 = k \\cdot m^2 Q^2 = m^2 \\cdot P_{\\text{old}}$$.\n\n$$P$$ is multiplied by $$m^2$$ — the **square** of the factor. Doubling $$Q$$ quadruples $$P$$. The \"squared\" relationship amplifies: small changes in $$Q$$ cause big changes in $$P$$.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "After isolating $$b^2$$ in an algebraic rearrangement to get $$b^2 = \\text{expression}$$, why must the final step to isolate $$b$$ include a $$\\pm$$ sign, and how does this differ from simplifying an expression like $$\\sqrt{b^2}$$? (2 steps)", "answer": "- Step 1: When solving an equation like $$b^2 = 9$$, you are asking \"what numbers, when squared, give 9?\" Both $$3$$ and $$-3$$ satisfy this condition, so the solution set is $$b = \\pm 3$$. The $$\\pm$$ captures both valid algebraic roots.\n- Step 2: This is fundamentally different from evaluating the function $$\\sqrt{b^2}$$, which by definition returns the principal (non-negative) root, yielding $$|b|$$. When *solving* an equation, you must manually introduce the $$\\pm$$ to account for the negative branch that the radical symbol inherently hides.\n\nTakeaway: The radical symbol $$\\sqrt{}$$ evaluates to a single positive number, but the algebraic *action* of taking a square root to solve an equation requires $$\\pm$$ to find all solutions.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "When expanding $$(4+\\sqrt{2})(2-\\sqrt{2})$$, what do the \"cross terms\" simplify to, and why is it a common error to think they cancel completely? (2 steps)", "answer": "- Step 1: Using FOIL: $$4 \\times 2 = 8$$, $$4 \\times (-\\sqrt{2}) = -4\\sqrt{2}$$, $$\\sqrt{2} \\times 2 = 2\\sqrt{2}$$, $$\\sqrt{2} \\times (-\\sqrt{2}) = -2$$. The cross terms are $$-4\\sqrt{2} + 2\\sqrt{2} = -2\\sqrt{2}$$.\n- Step 2: The error comes from seeing two terms with $$\\sqrt{2}$$ and assuming they cancel. But they have different coefficients ($$-4$$ and $$+2$$), so they combine to $$-2\\sqrt{2}$$, not zero. Only in a difference-of-two-squares like $$(a+\\sqrt{b})(a-\\sqrt{b}) = a^2 - b$$ do the cross terms cancel — because the coefficients of $$\\sqrt{b}$$ are $$+a$$ and $$-a$$, which are equal in magnitude.\n\nTakeaway: Cross terms with surds combine like terms — they don't cancel unless the coefficients are equal and opposite.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "If $$Q$$ *decreases* by 20% in a relationship where $$P \\propto 1/Q^2$$, does $$P$$ increase or decrease, and by what approximate percentage? (2 steps)", "answer": "- Step 1: A 20% decrease means $$Q_{\\text{new}} = 0.8Q = \\frac{4}{5}Q$$. Then $$P_{\\text{new}} = \\frac{k}{(0.8Q)^2} = \\frac{k}{0.64Q^2} = \\frac{1}{0.64} P_{\\text{old}} = 1.5625 P_{\\text{old}}$$.\n- Step 2: Since $$P_{\\text{new}} > P_{\\text{old}}$$, $$P$$ increases. The percentage change is $$(1.5625 - 1) \\times 100\\% = 56.25\\%$$ increase. Notice: a 20% decrease in $$Q$$ causes a 56% increase in $$P$$ — the inverse-square relationship amplifies and reverses the direction of change.\n\nInverse proportionality reverses the direction (decrease → increase), and the square amplifies the magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "As $$x \\to +\\infty$$, what happens to the values of $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$, and $$\\frac{1}{1+x}$$? (1 step)", "answer": "- Step 1: \n+ $$x^2 \\to +\\infty$$ (grows quadratically, fastest).\n+ $$\\sqrt{x} \\to +\\infty$$ (grows, but slowly).\n+ $$\\frac{1}{x} \\to 0$$ (decays to 0).\n+ $$\\frac{1}{\\sqrt{x}} \\to 0$$ (decays to 0).\n+ $$\\frac{1}{1+x} \\to 0$$ (decays to 0).\n\nSo for **large** $$x$$, the unbounded-growth functions ($$x^2, \\sqrt{x}$$) take over, while the reciprocal functions collapse toward 0. The behaviour is the **mirror image** of what happens near $$x = 0$$: \"blow up\" functions there are the \"decay\" functions here, and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_54"}, {"question": "For $$0 < x < 1$$, the expression $$\\tfrac{1}{x}$$ must be greater than 1. Explain the *direction* of the inequality when you take the reciprocal of a positive number less than 1. (2 steps)", "answer": "- Step 1: A general rule for positive numbers: if $$0 < a < b$$, then $$\\tfrac{1}{a} > \\tfrac{1}{b}$$ — the inequality *flips* when you reciprocate.\n- Step 2: Apply this with $$a = x$$ and $$b = 1$$. Since $$0 < x < 1$$, we have $$x < 1$$, so $$\\tfrac{1}{x} > \\tfrac{1}{1} = 1$$. (Test value: $$x = 0.25 \\Rightarrow \\tfrac{1}{x} = 4$$, definitely bigger than 1.)\n\nTakeaway: for any positive number smaller than 1, its reciprocal is bigger than 1, and the closer $$x$$ is to 0, the more astronomical $$\\tfrac{1}{x}$$ becomes.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "On an ESAT-style multiple-choice exam, why might the tutor advise doing \"quick questions first\" rather than working through in order? (2 steps)", "answer": "- Step 1: Not all questions are equally time-consuming. A rearrangement problem (like Q6) might take 30 seconds if you spot the cross-multiply trick, while a function behaviour analysis (like Q3) might take 3–4 minutes of graphing and testing. All questions carry equal marks.\n- Step 2: Spending 5 minutes on one hard question means 5 minutes not available for several easy ones. By collecting all the \"quick wins\" first, you bank guaranteed marks and reduce time pressure for the fiddly questions you return to. The strategy is: scan, sort by speed, then execute.\n\nEqual marks, unequal time. Maximize marks-per-minute by prioritizing speed, not difficulty.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "Why is the principal-root convention ($$\\sqrt{x} \\geq 0$$) relevant to *inverses*, not just to arithmetic? (2 steps)", "answer": "- Step 1: An inverse function must be single-valued: for each input $$x$$, there's exactly one output. If we defined \"$$\\sqrt{x}$$\" to mean \"$$\\pm$$ the square root\", it wouldn't be a function — it would be a multi-valued relation.\n- Step 2: To make $$\\sqrt{x}$$ a function, we restrict it to the non-negative output, called the *principal* root. This is why the inverse of $$f(x) = x^2$$ (restricted to $$x \\geq 0$$) is $$f^{-1}(x) = \\sqrt{x}$$ (always non-negative) — both sides of the inverse pair use the same consistent choice of branch.", "source": "MiniMax ②", "_id": "minimax_2_45"}, {"question": "Many ESAT questions can be solved by testing a specific value within the given interval. For a function‑comparison problem like Q3 (largest for $$0<x<1$$), why is it safe to test just one value, e.g., $$x=1/4$$? Under what circumstances could a single test point lead you astray? (2 steps)", "answer": "- Step 1: If you already know the candidate functions are monotonic (always increasing or always decreasing) on the interval and you’ve narrowed down the candidates, a single test point can confirm the ordering because the relative order won’t change throughout the interval.\n- Step 2: However, a single test point could mislead if the functions cross somewhere inside the interval (i.e., their order changes). For instance, if you had $$y=x$$ and $$y=1/(1+x)$$, they could cross at some $$x$$, so testing at one point might not give the full picture. In Q3, the two remaining candidates were $$1/x$$ and $$1/\\sqrt{x}$$, both purely decreasing, and we already established $$x<\\sqrt{x}$$ gives a global inequality, so no crossing.", "source": "DeepSeek ②", "_id": "deepseek_2_41"}, {"question": "When rearranging an equation of the form $$a = \\frac{b^2 + p}{qb^2 + r}$$ to solve for $$b$$, why is it strategically better to collect all $$b^2$$ terms on one side and constants on the other, rather than moving everything to one side to equal zero? (2 steps)", "answer": "- Step 1: Moving everything to one side (e.g., $$aqb^2 + ar - b^2 - p = 0$$) creates a quadratic equation in terms of $$b$$. While technically solvable via the quadratic formula, it obscures the simple linear relationship that exists with respect to $$b^2$$.\n- Step 2: Grouping $$b^2$$ terms on one side (e.g., $$aqb^2 - b^2 = p - ar$$) allows you to factor out $$b^2$$ directly: $$b^2(aq - 1) = p - ar$$. This reduces the problem to simple division followed by a square root, bypassing the unnecessary complexity of the quadratic formula.\n\nTakeaway: Treat $$b^2$$ as a single atomic variable during rearrangement to keep the algebra linear and straightforward.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "A student computes $$\\left(\\frac{1}{2}\\right)^2 = 1$$. What conceptual error are they making, and how would you explain the correct result? (2 steps)", "answer": "- Step 1: The student is squaring only the numerator: $$(1/2)^2 \\neq 1/2$$. They seem to think squaring a fraction means squaring the top only, or they confuse $$\\left(\\frac{1}{2}\\right)^2$$ with $$\\frac{1}{2^2}$$ (which is actually the same correct thing, $$\\frac{1}{4}$$) — so they may be computing $$1^2 / 2 = 1/2$$ instead.\n- Step 2: The correct rule: $$\\left(\\frac{a}{b}\\right)^2 = \\frac{a^2}{b^2}$$. So $$\\left(\\frac{1}{2}\\right)^2 = \\frac{1^2}{2^2} = \\frac{1}{4}$$. Both numerator and denominator must be squared separately. Think of it as $$\\frac{1}{2} \\times \\frac{1}{2} = \\frac{1}{4}$$ — taking half of a half gives a quarter.\n\nTakeaway: When squaring a fraction, square BOTH the numerator and the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_35"}, {"question": "A student says \"since $$x < 1$$ and I'm dividing 1 by it, $$\\tfrac{1}{x}$$ should be smaller than 1, like 0.5 or something.\" Why is this wrong? (1 step)", "answer": "- Step 1: The student's mistake is applying the rule \"$$\\text{smaller dividend} \\Rightarrow \\text{smaller quotient}$$\" to division by a number *less than 1*. In reality, dividing by a number smaller than 1 *enlarges* the result, just like dividing a cake into 4 pieces gives you bigger slices than dividing it into 8 pieces. So $$1 \\div 0.5 = 2 > 1$$, and generally $$\\tfrac{1}{x} > 1$$ whenever $$0 < x < 1$$.\n\nTakeaway: division by a small positive number produces a *large* result; the inequality *flips* when you divide both sides of an inequality by something less than 1.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "A student solves a similar-triangle problem correctly, getting $$x = 6$$ cm, but writes the answer as the value of $$x$$ (i.e., 6) rather than the *length of DE* (which is $$x + 3 = 9$$). What's the conceptual trap? (1 step)", "answer": "- Step 1: The problem asked for $$DE$$, not for the variable $$x$$ used in the setup. The student solved for the algebraic variable, not the geometric quantity. The final step is to *re-read* the question and translate the algebraic result back into the geometric quantity asked for. Here, $$DE = x + 3 = 9$$ cm.\n\nTakeaway: after solving, always check what the question actually asked for; it's a common last-step error.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "Misconception probe: a student computes $$(1.4)^2 = 1.96$$ and then claims the change in $$P$$ is $$-96\\%$$ when $$Q$$ is up 40% and $$P \\propto \\frac{1}{Q^2}$$. What went wrong? (2 steps)", "answer": "- Step 1: The student took $$(1.4)^2 = 1.96$$ and subtracted from 1, getting $$-0.96 = -96\\%$$. This treats $$1.96$$ as the *change* in $$P$$, not the *multiplier* on the denominator.\n- Step 2: The correct interpretation: $$1.96$$ is the factor by which $$Q^2$$ grows. The factor on $$P = \\frac{k}{Q^2}$$ is therefore $$\\frac{1}{1.96} = \\frac{1}{1.96} \\approx 0.51$$ (or exactly $$\\frac{25}{49}$$). The percentage change is $$(0.51 - 1) \\times 100\\% \\approx -49\\%$$, **not** $$-96\\%$$.\n\nThe trap: $$Q^2$$ grows by a factor of 1.96, but that translates to a **decrease** in $$P$$, not an increase. The transformation flips.", "source": "MiniMax ①", "_id": "minimax_1_56"}, {"question": "Quick exercise: Using the burger method, what is $$\\frac{1/3}{1/4}$$? Is the result greater than 1 or less than 1 — and can you predict this before computing? (2 steps)", "answer": "- Step 1: Before computing: $$\\frac{1}{3} < \\frac{1}{4}$$ is FALSE — actually $$\\frac{1}{3} > \\frac{1}{4}$$ (smaller denominator = larger fraction). Dividing a larger fraction by a smaller one should give a result greater than 1.\n- Step 2: Apply the burger method: $$\\frac{1/3}{1/4} = \\frac{1 \\times 4}{3 \\times 1} = \\frac{4}{3} \\approx 1.33$$. Indeed greater than 1, as predicted.\n\nTakeaway: You can often predict whether a fraction division exceeds 1 by comparing the relative sizes of numerator and denominator fractions first.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "Why must we include both positive and negative solutions when solving $$b^2 = \\frac{a+2}{3a-1}$$? (2 steps)", "answer": "- Step 1: The original equation $$a = \\frac{b^2 + 2}{3b^2 - 1}$$ only contains $$b^2$$ terms, never $$b$$ by itself\n- Step 2: This means both $$b = +\\sqrt{\\frac{a+2}{3a-1}}$$ and $$b = -\\sqrt{\\frac{a+2}{3a-1}}$$ will give the same value of $$a$$ when substituted back\n+ For example, $$b = 3$$ and $$b = -3$$ both give $$b^2 = 9$$\n+ The equation is symmetric in $$b$$, so we can't determine the sign from the given information\n\nThis is different from word problems where context (like \"length must be positive\") eliminates one solution.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_14"}, {"question": "Why is $$\\frac{1}{1+x} < 1$$ for **all** $$x > 0$$ (not just on $$(0, 1)$$)? (2 steps)", "answer": "- Step 1: For $$x > 0$$, we have $$1 + x > 1$$ (the denominator is strictly greater than 1).\n- Step 2: Both sides are positive, so taking reciprocals reverses the inequality: $$\\frac{1}{1+x} < 1$$.\n\nThis is true for any positive $$x$$ — the value 1 at $$x = 0$$ is the **maximum**, and any positive $$x$$ strictly decreases it. So $$\\frac{1}{1+x}$$ is never a candidate for \"largest value\" on any interval with $$x > 0$$.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "For $$x > 1$$, does the ordering $$x^2 < x < \\sqrt{x}$$ still hold? If not, what changes and why? (3 steps)", "answer": "- Step 1: For $$x>1$$, multiplying by $$x$$ (which is >1) results in a larger number: $$x^2 = x \\cdot x > x \\cdot 1 = x$$. Thus $$x^2 > x$$.\n- Step 2: The square root of a number greater than 1 is smaller than the number itself. For example, $$\\sqrt{4}=2 < 4$$. In general, if $$x>1$$, then $$\\sqrt{x} < x$$ because squaring $$\\sqrt{x}$$ gives $$x$$, and since $$\\sqrt{x}>1$$, squaring a number greater than 1 increases it, so the unsquared number is smaller.\n- Step 3: Therefore for $$x>1$$ the ordering flips: $$\\sqrt{x} < x < x^2$$. The reciprocal functions follow the reversed inequality: since $$\\frac{1}{x} < 1$$ and $$\\frac{1}{\\sqrt{x}} < 1$$, and because $$\\sqrt{x} < x$$ implies $$\\frac{1}{\\sqrt{x}} > \\frac{1}{x}$$ (reciprocals reverse), we get $$\\frac{1}{x} < \\frac{1}{\\sqrt{x}} < 1 < \\sqrt{x} < x < x^2$$. So the entire inequality flips direction compared to $$0<x<1$$.", "source": "DeepSeek ①", "_id": "deepseek_1_7"}, {"question": "Given the ordering $$x^2 < x < \\sqrt{x}$$ for $$0 < x < 1$$, how can you logically deduce the ordering of their reciprocals $$\\frac{1}{x^2}$$, $$\\frac{1}{x}$$, and $$\\frac{1}{\\sqrt{x}}$$ without testing specific numbers? (2 steps)", "answer": "- Step 1: Recall the property of reciprocals for positive numbers: if $$0 < a < b$$, then taking the reciprocal reverses the inequality, so $$\\frac{1}{a} > \\frac{1}{b}$$. This happens because dividing 1 by a smaller denominator yields a larger quotient.\n- Step 2: Apply this reversal to the known ordering $$x^2 < x < \\sqrt{x}$$. Reversing the inequalities gives $$\\frac{1}{x^2} > \\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.\n\nTakeaway: Taking the reciprocal of an ordered set of positive fractions flips the entire sequence.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "What is the volume formula for a cylinder, and what is the most common trap when applying it in ratio problems? (2 steps)", "answer": "- Step 1: The volume of a cylinder is $$V = \\pi r^2 h$$, where $$r$$ is the radius and $$h$$ is the height. This is the area of the circular base ($$\\pi r^2$$) multiplied by the height.\n- Step 2: The most common trap is confusing radius with diameter. If the problem says \"diameter = $$2r$$,\" the radius is $$r$$, not $$2r$$. Another trap is misidentifying the height — in the sphere-in-cylinder problem, the height equals the sphere's diameter ($$2r$$), not its radius ($$r$$). Using $$h = r$$ gives $$V = \\pi r^3$$, leading to a ratio of $$\\frac{4}{3}$$, which is impossible (greater than 1).\n\nTakeaway: Always distinguish radius from diameter, and read the problem carefully for what \"height\" or \"length\" refers to.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "In a similar-triangle problem, the figure shows a small triangle inside a larger one with a shared vertex $$A$$ and parallel bases. If you're given $$AB$$ and $$BD$$ (the small-triangle side and the gap between the two triangles), how do you find $$AD$$? (1 step)", "answer": "- Step 1: $$AD = AB + BD$$ — the side of the *larger* triangle is the sum of the small-triangle side and the gap between them along the same straight line through $$A$$. This is a very common source of error: students set up the proportion using $$AB$$ where they should have used $$AD$$, then get the wrong answer.\n\nTakeaway: in nested-triangle problems with shared vertex, the \"long side\" is always the \"short side + gap\" — recompute it from the diagram, don't trust a labelled value you don't see.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "As $$x \\to 0^{+}$$, both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ tend to infinity. Which one grows faster, and why? (2 steps)", "answer": "- Step 1: Observe that for very small $$x$$ (say $$x = 10^{-6}$$), $$\\sqrt{x} = 10^{-3}$$. Then $$\\frac{1}{x} = 10^6$$ while $$\\frac{1}{\\sqrt{x}} = 10^3$$. So $$\\frac{1}{x}$$ is much larger.\n- Step 2: Algebraically, $$\\frac{1/x}{1/\\sqrt{x}} = \\frac{\\sqrt{x}}{x} = \\frac{1}{\\sqrt{x}}$$, which itself blows up as $$x\\to0^{+}$$. Thus the ratio $$\\frac{1/x}{1/\\sqrt{x}} \\to \\infty$$, meaning $$1/x$$ diverges faster. This “dominance” explains why $$1/x$$ is always larger than $$1/\\sqrt{x}$$ for all $$0<x<1$$, not just at one test point.", "source": "DeepSeek ①", "_id": "deepseek_1_22"}, {"question": "What is the complete ordering of the six expressions $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$1$$, $$1/\\sqrt{x}$$, and $$1/x$$ for any value of $$x$$ strictly between 0 and 1? Explain why each inequality holds. (4 steps)", "answer": "- Step 1: The ordering is $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. Let's build it from the inside out.\n- Step 2: The first three: Since $$0 < x < 1$$, squaring shrinks ($$x^2 < x$$) and square root grows ($$\\sqrt{x} > x$$). Also $$\\sqrt{x} < 1$$ because squaring both sides gives $$x < 1$$, which is true. So $$x^2 < x < \\sqrt{x} < 1$$.\n- Step 3: The reciprocal relationships: Taking reciprocals of positive numbers *reverses* inequalities. Since $$x < \\sqrt{x}$$, we get $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$. And since $$\\sqrt{x} < 1$$, taking reciprocals gives $$\\frac{1}{\\sqrt{x}} > 1$$. So $$1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$.\n- Step 4: Combining both halves: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. A quick sanity check at $$x = \\frac{1}{4}$$: $$\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2} < 1 < 2 < 4$$. ✓\n\nThe entire ordering is dictated by one fact: numbers between 0 and 1 shrink under squaring and grow under square roots, and reciprocals flip inequalities.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Where do the curves $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ intersect? (3 steps)", "answer": "- Step 1: Set $$\\sqrt{x} = \\frac{1}{\\sqrt{x}}$$.\n- Step 2: Multiply both sides by $$\\sqrt{x}$$ (positive, so inequality-safe): $$x = 1$$.\n- Step 3: The curves meet at exactly one point: $$(1, 1)$$.\n\nBehaviour: for $$0 < x < 1$$, $$\\frac{1}{\\sqrt{x}} > \\sqrt{x}$$ (the reciprocal curve is above). For $$x > 1$$, the relationship reverses ($$\\sqrt{x} > \\frac{1}{\\sqrt{x}}$$). They \"kiss\" at $$(1, 1)$$.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "What does it mean conceptually that $$x^2 < x < \\sqrt{x}$$ for $$0 < x < 1$$, and how does this relate to the \"power hierarchy\"? (4 steps)", "answer": "- Step 1: This ordering shows how different \"powers\" of the same number behave when that number is a fraction between $$0$$ and $$1$$\n- Step 2: Moving \"up\" in power (from $$x^{1/2}$$ to $$x^1$$ to $$x^2$$) makes fractions progressively smaller\n+ $$\\sqrt{x} = x^{1/2}$$ (power $$\\frac{1}{2}$$) is largest\n+ $$x = x^1$$ (power $$1$$) is in the middle  \n+ $$x^2$$ (power $$2$$) is smallest\n- Step 3: This is the opposite of what happens with numbers greater than $$1$$, where higher powers give larger results\n+ For $$x = 2$$: $$\\sqrt{2} < 2 < 4$$, which reverses the inequality\n+ The \"crossover point\" is at $$x = 1$$ where all three expressions equal $$1$$\n- Step 4: This power hierarchy explains why reciprocals $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are so large — they flip fractions into numbers greater than $$1$$\n\nUnderstanding this hierarchy helps predict function behavior without memorizing specific cases.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_19"}, {"question": "If $$Q$$ increases by 40%, $$P \\propto 1/Q^2$$ decreases by about 49%. Is this decline larger or smaller than if $$P$$ were simply inversely proportional ($$P \\propto 1/Q$$)? Why?", "answer": "- If $$P \\propto 1/Q$$, a 40% increase in $$Q$$ (multiplier $$\\frac{7}{5}$$) would multiply $$P$$ by $$\\frac{5}{7} \\approx 0.714$$, a decrease of about 29%.\n- With $$P \\propto 1/Q^2$$, the multiplier is squared, so the decrease is larger: from -29% to -49%. The squaring in the denominator amplifies the effect of changes in $$Q$$. So the decline is definitely larger than for the simple inverse relation.", "source": "DeepSeek ②", "_id": "deepseek_2_17"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When a number between 0 and 1 is squared, does the result get larger or smaller? Explain why this happens intuitively. (2 steps)", "answer": "- Step 1: The result gets **smaller**. For example, $$0.5^2 = 0.25$$, which is less than $$0.5$$. This is because multiplying a fraction by itself means taking \"a fraction of a fraction\" — you're shrinking it further.\n- Step 2: More formally, for $$0 < x < 1$$, we have $$x < 1$$, so multiplying both sides by $$x$$ (which is positive) gives $$x \\cdot x < x \\cdot 1$$, i.e., $$x^2 < x$$. The key insight is that multiplying by a number less than 1 always reduces the magnitude.\n\nTakeaway: Squaring a fraction is like taking \"a fraction of a fraction\" — it always shrinks.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When you take the square root of a number between 0 and 1, does the result get larger or smaller than the original number? Why? (2 steps)", "answer": "- Step 1: The result gets **larger**. For example, $$\\sqrt{0.25} = 0.5$$, which is greater than $$0.25$$.\n- Step 2: The square root is the inverse of squaring. Since squaring a fraction makes it smaller, the inverse operation (square root) must do the opposite — it \"undoes\" the shrinking, pulling the value back up. Formally, if $$0 < x < 1$$, then $$\\sqrt{x} > x$$ because squaring both sides gives $$x > x^2$$, which we already know is true.\n\nTakeaway: Square root and squaring are inverses — since squaring shrinks fractions, square root expands them.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For $$0 < x < 1$$, rank these three expressions from smallest to largest: $$x^2$$, $$x$$, $$\\sqrt{x}$$. What single test value can confirm this ordering? (2 steps)", "answer": "- Step 1: The ordering is $$x^2 < x < \\sqrt{x}$$. This follows from two facts: squaring a fraction shrinks it ($$x^2 < x$$), and taking the square root expands it ($$\\sqrt{x} > x$$).\n- Step 2: Test with $$x = \\frac{1}{4}$$: $$x^2 = \\frac{1}{16} = 0.0625$$, $$x = \\frac{1}{4} = 0.25$$, $$\\sqrt{x} = \\frac{1}{2} = 0.5$$. Indeed $$0.0625 < 0.25 < 0.5$$.\n\nTakeaway: On $$(0,1)$$, the operations form a clear chain: squaring pulls down, square root pulls up, and the identity sits in between.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "For $$0 < x < 1$$, both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ produce values greater than 1. Which one is always larger, and why? (3 steps)", "answer": "- Step 1: Since $$0 < x < 1$$, we know $$x < \\sqrt{x}$$ (square root makes fractions larger). Both $$x$$ and $$\\sqrt{x}$$ are positive, so we can compare their reciprocals.\n- Step 2: When comparing reciprocals of positive numbers, the **smaller** denominator gives the **larger** fraction. Since $$x < \\sqrt{x}$$, the denominator of $$\\frac{1}{x}$$ is smaller than the denominator of $$\\frac{1}{\\sqrt{x}}$$.\n- Step 3: Therefore $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ for all $$0 < x < 1$$. Quick check: at $$x = 0.25$$, $$\\frac{1}{x} = 4$$ vs $$\\frac{1}{\\sqrt{x}} = 2$$.\n\nTakeaway: Reciprocals flip the inequality direction — the smaller the denominator, the larger the fraction.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "For $$0 < x < 1$$, what is the range of $$\\frac{1}{1+x}$$? Why can this function never reach a value of 1 or above on this interval? (2 steps)", "answer": "- Step 1: When $$0 < x < 1$$, the denominator $$1+x$$ ranges from just above 1 to just below 2. So $$\\frac{1}{1+x}$$ ranges from just below 1 (when $$x \\to 0^+$$) down to $$\\frac{1}{2}$$ (when $$x \\to 1^-$$). The range is $$(\\frac{1}{2}, 1)$$.\n- Step 2: The function can never reach 1 because that would require $$1+x = 1$$, i.e., $$x = 0$$, which is excluded. And it can never exceed 1 because the denominator $$1+x > 1$$ for all $$x > 0$$, making the fraction less than 1.\n\nTakeaway: Adding a positive number to the denominator of a reciprocal always pushes the value below 1 — this function is \"trapped\" between ½ and 1.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Write the complete ordering of all five functions — $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\frac{1}{x}$$ — for $$0 < x < 1$$, from smallest to largest. Where does $$\\frac{1}{1+x}$$ fit? (2 steps)", "answer": "- Step 1: The full ordering is: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. The first three are below 1 (squaring shrinks, identity stays, root expands — but still below 1). The last two are above 1 (reciprocals of small numbers are large).\n- Step 2: The function $$\\frac{1}{1+x}$$ sits in $$(\\frac{1}{2}, 1)$$, which places it between $$\\sqrt{x}$$ and 1 (though not at a fixed position relative to $$\\sqrt{x}$$ for all $$x$$ — it depends on the specific value). The key point: it's always below 1, so it's eliminated as a candidate for \"largest value.\"\n\nTakeaway: The number 1 acts as a natural dividing line — three functions stay below it, two shoot above it.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What does it mean for $$\\sqrt{x}$$ to be the inverse of $$x^2$$? Why must we restrict $$x^2$$ to $$x \\geq 0$$ for this to work? (3 steps)", "answer": "- Step 1: An inverse function $$f^{-1}$$ satisfies $$f^{-1}(f(x)) = x$$. If $$f(x) = x^2$$, then applying $$\\sqrt{\\phantom{x}}$$ after squaring gives $$\\sqrt{x^2} = x$$ — but only when $$x \\geq 0$$.\n- Step 2: The problem is that $$x^2$$ is not one-to-one on all of $$\\mathbb{R}$$. Both $$x = 3$$ and $$x = -3$$ map to $$9$$. If we tried to define an inverse on all reals, we wouldn't know whether $$f^{-1}(9)$$ should be $$3$$ or $$-3$$.\n- Step 3: By restricting the domain to $$x \\geq 0$$, the function becomes one-to-one (each output has exactly one input), and the inverse is well-defined as $$f^{-1}(x) = \\sqrt{x}$$.\n\nTakeaway: Inverses require one-to-one correspondence — restricting the domain of $$x^2$$ to non-negative values makes this possible.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What is the geometric relationship between the graph of $$y = x^2$$ (for $$x \\geq 0$$) and the graph of $$y = \\sqrt{x}$$? (2 steps)", "answer": "- Step 1: The graph of $$y = \\sqrt{x}$$ is the **reflection** of $$y = x^2$$ (for $$x \\geq 0$$) across the line $$y = x$$. This is a general property: the graph of any inverse function is the reflection of the original function across $$y = x$$.\n- Step 2: Geometrically, reflecting across $$y = x$$ swaps coordinates. If $$(a, b)$$ lies on $$y = x^2$$ (meaning $$b = a^2$$), then $$(b, a)$$ lies on $$y = \\sqrt{x}$$ (meaning $$a = \\sqrt{b}$$). For example, $$(2, 4)$$ on $$y = x^2$$ becomes $$(4, 2)$$ on $$y = \\sqrt{x}$$.\n\nTakeaway: Inverse functions swap the roles of input and output — visually, this is a mirror flip across the diagonal $$y = x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A student writes \"$$\\sqrt{9} = \\pm 3$$.\" Is this correct? Explain the distinction between the principal square root and the solutions to $$x^2 = 9$$. (2 steps)", "answer": "- Step 1: This is **incorrect**. The symbol $$\\sqrt{9}$$ denotes the **principal (positive) square root**, so $$\\sqrt{9} = 3$$ only. The square root function, by definition, always returns the non-negative value.\n- Step 2: The equation $$x^2 = 9$$ has two solutions: $$x = 3$$ and $$x = -3$$. These are distinct from the function value $$\\sqrt{9}$$. Writing $$\\sqrt{9} = -3$$ is wrong because the square root function is defined to be single-valued — it must produce exactly one output for each input.\n\nTakeaway: $$\\sqrt{x}$$ is a function (one output), not an equation solver. The equation $$x^2 = k$$ has two solutions; the expression $$\\sqrt{k}$$ has one value.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is multiplied by a factor $$m$$, what happens to $$P$$? Derive the relationship. (3 steps)", "answer": "- Step 1: Write the proportionality as an equation: $$P = \\frac{k}{Q^2}$$, where $$k$$ is a constant of proportionality.\n- Step 2: Substitute $$Q_{\\text{new}} = mQ$$: $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{k}{m^2 Q^2}$$.\n- Step 3: Recognize that $$\\frac{k}{Q^2} = P_{\\text{old}}$$, so $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$. The new $$P$$ is the old $$P$$ divided by $$m^2$$.\n\nTakeaway: For inverse-square proportionality, any multiplicative change in $$Q$$ gets squared and inverted when propagated to $$P$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 40%, why is it better to write the multiplier as $$\\frac{7}{5}$$ rather than $$1.4$$? (2 steps)", "answer": "- Step 1: Using the exact fraction $$\\frac{7}{5}$$ keeps all arithmetic exact. Squaring gives $$\\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$, and inverting gives $$\\frac{25}{49}$$. The percentage change is then $$\\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\%$$, which is exactly $$-48.979...\\%$$.\n- Step 2: Using the decimal $$1.4$$, you compute $$1.4^2 = 1.96$$, then $$\\frac{1}{1.96} = 0.5102...$$, which introduces rounding at every step. The final answer might be off by a percentage point depending on when you round. Exact fractions avoid this cascade of rounding errors entirely.\n\nTakeaway: Fractions are closed under the operations needed here (squaring, inverting, subtracting from 1) — decimals are not.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ *decreases* by 20%, does $$P$$ increase or decrease? By roughly what factor? (2 steps)", "answer": "- Step 1: A 20% decrease means $$Q_{\\text{new}} = 0.8Q = \\frac{4}{5}Q$$. The multiplier is $$m = \\frac{4}{5}$$.\n- Step 2: Using the rule $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$: $$P_{\\text{new}} = \\frac{1}{(4/5)^2} P_{\\text{old}} = \\frac{25}{16} P_{\\text{old}} \\approx 1.5625 \\, P_{\\text{old}}$$. So $$P$$ **increases** by about 56%. This makes physical sense: if $$Q$$ shrinks, and $$P$$ is inversely related to $$Q^2$$, then $$P$$ must grow — and the square amplifies the effect.\n\nTakeaway: A decrease in $$Q$$ causes an increase in $$P$$ (inverse relationship), and the square amplifies the magnitude of the change.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What is the \"burger method\" for dividing one fraction by another? State the rule and explain the visual mnemonic. (2 steps)", "answer": "- Step 1: The rule is $$\\frac{a/b}{c/d} = \\frac{a \\times d}{b \\times c} = \\frac{ad}{bc}$$. You multiply the \"outer\" pair ($$a$$ and $$d$$) for the numerator, and the \"inner\" pair ($$b$$ and $$c$$) for the denominator.\n- Step 2: The visual mnemonic: draw arrows from top-left $$a$$ to bottom-right $$d$$ (the \"bun top\" and \"bun bottom\"), and from bottom-left $$b$$ to top-right $$c$$ (the \"filling\"). The cross shape resembles a burger. This is just a memorable way of encoding \"keep-change-flip\": keep $$a/b$$, change $$\\div$$ to $$\\times$$, flip $$c/d$$ to $$d/c$$.\n\nTakeaway: Dividing fractions = multiply by the reciprocal. The \"burger\" cross-multiplication diagram is just a visual shortcut for the same rule.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Using the burger method, what is $$\\frac{a/b}{c}$$ (a fraction divided by a whole number)? Explain why. (2 steps)", "answer": "- Step 1: Treat the whole number $$c$$ as $$\\frac{c}{1}$$. Then apply the burger method: $$\\frac{a/b}{c/1} = \\frac{a \\times 1}{b \\times c} = \\frac{a}{bc}$$.\n- Step 2: Intuitively, dividing by $$c$$ is the same as multiplying by $$\\frac{1}{c}$$. So $$\\frac{a}{b} \\div c = \\frac{a}{b} \\times \\frac{1}{c} = \\frac{a}{bc}$$. The denominator absorbs the whole number.\n\nTakeaway: Dividing a fraction by a whole number simply multiplies the denominator by that number.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "In the sphere-in-cylinder problem, why is it important to cancel common factors before doing arithmetic? Illustrate with $$\\frac{(4/3)\\pi r^3}{2\\pi r^3}$$. (2 steps)", "answer": "- Step 1: If you cancel $$\\pi r^3$$ first (it appears in both numerator and denominator), the expression simplifies immediately to $$\\frac{4/3}{2}$$. Then apply the burger method: $$\\frac{4}{3} \\times \\frac{1}{2} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 2: Without cancelling, you'd compute the numerator as $$\\frac{4}{3}\\pi r^3$$ and the denominator as $$2\\pi r^3$$ separately, then divide — more steps, more chances for arithmetic errors, and no clearer understanding. Cancelling early removes irrelevant complexity and exposes the essential ratio.\n\nTakeaway: Cancel common factors first — it reduces the problem to its bare structure before you do any heavy lifting.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A sphere of radius $$r$$ fits exactly inside a cylinder (same diameter, same height as the sphere's diameter). What fraction of the cylinder's volume does the sphere occupy, and why is the cylinder's height $$2r$$ rather than $$r$$? (3 steps)", "answer": "- Step 1: The sphere has diameter $$2r$$. The problem states the cylinder has the same internal diameter **and length** as the sphere's diameter. So the cylinder's height equals the sphere's diameter: $$h = 2r$$, not $$r$$. Using $$h = r$$ is a common trap that gives an impossible ratio greater than 1.\n- Step 2: Compute both volumes: $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$ and $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 \\times 2r = 2\\pi r^3$$.\n- Step 3: Form the ratio and cancel: $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{(4/3)\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{2}{3}$$. This is Archimedes' classical result — the sphere fills exactly two-thirds of its circumscribing cylinder.\n\nTakeaway: The height is $$2r$$ (the diameter), and the ratio $$\\frac{2}{3}$$ is a famous result worth memorising.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "When rearranging an equation of the form $$a = \\frac{b^2 + p}{qb^2 + r}$$ to solve for $$b$$, what is the strategy? List the key steps. (3 steps)", "answer": "- Step 1: **Clear the fraction** by cross-multiplying: $$a(qb^2 + r) = b^2 + p$$. This eliminates the denominator and gives a linear equation in $$b^2$$.\n- Step 2: **Collect all $$b^2$$ terms on one side** and all constant terms on the other. Expand the left side: $$aqb^2 + ar = b^2 + p$$, then move: $$aqb^2 - b^2 = p - ar$$, and factorise: $$b^2(aq - 1) = p - ar$$.\n- Step 3: **Isolate $$b^2$$ and take the square root**: $$b^2 = \\frac{p - ar}{aq - 1}$$, so $$b = \\pm\\sqrt{\\frac{p - ar}{aq - 1}}$$. The $$\\pm$$ is essential because $$b$$ appears only as $$b^2$$ in the original equation, so both positive and negative roots are valid.\n\nTakeaway: Cross-multiply → collect $$b^2$$ terms → factorise → divide → square root with $$\\pm$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "After cross-multiplying $$a(3b^2 - 1) = b^2 + 2$$, a student writes $$3ab^2 - b^2 - a + 2 = 0$$. What's wrong with the sign, and why does the alternative approach avoid this error? (2 steps)", "answer": "- Step 1: Expanding gives $$3ab^2 - a = b^2 + 2$$. Moving everything to the left: $$3ab^2 - a - b^2 - 2 = 0$$, i.e., $$3ab^2 - b^2 - a - 2 = 0$$. The student wrote $$+2$$ instead of $$-2$$ — the sign flips when moving $$+2$$ from the right side to the left.\n- Step 2: The alternative approach avoids this entirely: instead of moving everything to one side (which invites sign errors), keep $$b^2$$ terms on the left and constants on the right: $$3ab^2 - b^2 = a + 2$$. This immediately sets up the factorisation $$b^2(3a - 1) = a + 2$$ with no sign ambiguity.\n\nTakeaway: Don't default to \"move everything to one side = 0.\" Instead, group the variable you're solving for on one side and constants on the other.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "When solving for $$b$$ from an equation where $$b$$ only appears as $$b^2$$, why must you include the $$\\pm$$ sign when taking the square root? What would go wrong if you omitted it? (2 steps)", "answer": "- Step 1: If $$b^2 = k$$ (where $$k > 0$$), then both $$b = +\\sqrt{k}$$ and $$b = -\\sqrt{k}$$ satisfy the equation, since $$(+\\sqrt{k})^2 = k$$ and $$(-\\sqrt{k})^2 = k$$. Omitting the negative root discards a valid solution.\n- Step 2: In the original equation $$a = \\frac{b^2 + 2}{3b^2 - 1}$$, since $$b$$ only appears as $$b^2$$, substituting either $$+\\sqrt{k}$$ or $$-\\sqrt{k}$$ gives the same value of $$b^2$$, hence the same value of $$a$$. Both are equally valid unless the problem context restricts $$b$$ (e.g., $$b$$ represents a physical length).\n\nTakeaway: $$b^2 = k$$ has two solutions. Always write $$b = \\pm\\sqrt{k}$$ unless context eliminates one.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "In a similar-triangles problem where triangle ABC sits inside triangle ADE with BC ∥ DE, how do you set up the proportion? What's a common trap when identifying the side lengths? (3 steps)", "answer": "- Step 1: By AA similarity (angle A is shared; corresponding angles are equal because BC ∥ DE), the triangles are similar. The proportion is $$\\frac{AB}{AD} = \\frac{BC}{DE} = \\frac{AC}{AE}$$.\n- Step 2: The common trap is misidentifying $$AD$$. If the problem gives $$AB = 4$$ and $$BD = x - 4$$, then $$AD = AB + BD = 4 + (x - 4) = x$$. Students sometimes use $$AD = 4$$ (forgetting to add the segment BD) or $$AD = x - 4$$ (using only the extra piece).\n- Step 3: Always verify: the full side of the larger triangle is the sum of the corresponding parts. In this case, $$AD$$ is the entire side from A to D, not just the segment AB.\n\nTakeaway: When nesting triangles, the outer triangle's side = inner triangle's side + the extra segment. Don't confuse the part with the whole.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "After solving a quadratic from a geometry problem, you get $$x = -2$$ or $$x = 6$$. Why must you reject $$x = -2$$? (2 steps)", "answer": "- Step 1: The variable $$x$$ represents a physical length (e.g., the side BC of a triangle). Lengths cannot be negative — this is a constraint from the real-world context of the problem.\n- Step 2: Even though $$x = -2$$ is algebraically valid (it satisfies the quadratic equation), substituting it back gives a negative length, which is physically meaningless. Always check whether solutions make sense in the problem's context.\n\nTakeaway: Algebra gives candidates; context selects the answer. Negative lengths, negative times, and negative counts are always rejected.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Why does the tutor recommend manual factoring over the quadratic formula for ESAT-style questions with integer answers? (2 steps)", "answer": "- Step 1: The quadratic formula requires computing $$\\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$, which involves multiple arithmetic steps (squaring, multiplying, subtracting, square-rooting, dividing) — each one a potential error point under time pressure.\n- Step 2: Manual factoring (finding two numbers with a given product and sum) is typically 10–15 seconds faster for clean integer solutions, which ESAT questions are designed to have. You list factor pairs systematically: e.g., for product $$-12$$ and sum $$-4$$, try $$(1,-12)$$, $$(2,-6)$$ — found it. No radicals, no fractions, no calculator needed.\n\nTakeaway: When the answer is a nice integer, factoring by inspection is faster and safer than the formula.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Before starting algebra on a rearrangement problem, you scan the answer options and notice they all have the form $$\\pm\\sqrt{(\\ldots)/(\\ldots)}$$. What does this tell you about your solving strategy? (2 steps)", "answer": "- Step 1: The $$\\sqrt{\\phantom{x}}$$ tells you the final step will be taking a square root, which means you need to isolate something of the form $$b^2 = \\text{expression}$$. The $$\\pm$$ confirms both roots are valid. The fraction form $$(\\ldots)/(\\ldots)$$ tells you the answer won't simplify to a single term.\n- Step 2: This pre-reading saves you from dead-end paths. For instance, you won't waste time trying to expand or simplify the square root — you know the answer stays as a fraction under a radical. You also know that cross-multiplying to clear the denominator is the right first move, since the target form has a single fraction.\n\nTakeaway: The answer options are a roadmap. Read them first to know the destination before choosing the route.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When comparing two functions over an interval and your systematic analysis leaves two candidates, what strategy does the tutor recommend to break the tie? Give an example. (2 steps)", "answer": "- Step 1: **Test one specific value** in the interval — preferably a \"nice\" fraction like $$x = \\frac{1}{4}$$ or $$x = \\frac{1}{2}$$ that makes the arithmetic easy. This is faster than a general proof and sufficient for multiple-choice.\n- Step 2: Example: comparing $$\\frac{1}{x}$$ vs $$\\frac{1}{\\sqrt{x}}$$ on $$(0,1)$$. At $$x = \\frac{1}{4}$$: $$\\frac{1}{x} = 4$$ and $$\\frac{1}{\\sqrt{x}} = \\frac{1}{1/2} = 2$$. Since $$4 > 2$$, the answer is $$\\frac{1}{x}$$. One well-chosen value resolves the question.\n\nTakeaway: When analysis narrows it to two candidates, don't overthink — pick a clean test value and compute.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "For the function $$y = \\frac{1}{\\sqrt{x}}$$ on the interval $$0 < x < 1$$, what is the range, and what happens as $$x \\to 0^+$$? (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\sqrt{x} \\to 0^+$$, so $$\\frac{1}{\\sqrt{x}} \\to +\\infty$$. At $$x = 1$$, the value is $$\\frac{1}{\\sqrt{1}} = 1$$. The function is decreasing on this interval, so the range is $$(1, \\infty)$$.\n- Step 2: This means $$\\frac{1}{\\sqrt{x}}$$ is always greater than 1 on $$(0,1)$$, but it grows without bound as $$x$$ approaches 0. This is why it's a \"candidate\" for the largest function — it can be arbitrarily large.\n\nTakeaway: $$\\frac{1}{\\sqrt{x}}$$ diverges as $$x \\to 0^+$$, but it diverges more slowly than $$\\frac{1}{x}$$ because $$\\sqrt{x} > x$$ on this interval.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Compare the concavity of $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ for $$x > 0$$. Which is concave up and which is concave down, and what does this mean visually? (2 steps)", "answer": "- Step 1: $$y = \\sqrt{x}$$ is **concave down** — it rises from the origin but bends toward the horizontal, like a decaying growth curve. Each additional unit of $$x$$ produces a smaller increase in $$y$$.\n- Step 2: $$y = \\frac{1}{\\sqrt{x}}$$ is **concave up** — it falls from infinity but the rate of decrease slows down, like a curve flattening out as it approaches the x-axis. Each additional unit of $$x$$ produces a smaller decrease in $$y$$. Visually, concave up curves \"bowl upward\"; concave down curves \"sag downward.\"\n\nTakeaway: Both functions approach $$(1,1)$$ from different directions — $$\\sqrt{x}$$ curves upward but bends right, while $$1/\\sqrt{x}$$ curves downward but flattens right.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A student claims that for $$0 < x < 1$$, the function $$\\frac{1}{1+x}$$ should be larger than 1 because \"you're taking a reciprocal.\" What's the flaw in this reasoning? (2 steps)", "answer": "- Step 1: The student is thinking of $$\\frac{1}{x}$$, where the denominator is less than 1, so the result exceeds 1. But for $$\\frac{1}{1+x}$$, the denominator is $$1 + x$$, which is **greater than 1** (since $$x > 0$$).\n- Step 2: When the denominator exceeds 1, the fraction is less than 1. The reciprocal of a number greater than 1 is always between 0 and 1. For example, $$\\frac{1}{1.5} \\approx 0.67$$. The key is what the denominator actually is, not whether a reciprocal is involved.\n\nTakeaway: \"Taking a reciprocal\" only gives a value greater than 1 if the denominator is less than 1. Always check what the denominator actually evaluates to.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "What is the general formula for percentage change when a quantity goes from an old value to a new value? Why is it important to subtract 1 before multiplying by 100%? (2 steps)", "answer": "- Step 1: The formula is $$\\%\\Delta = \\left(\\frac{\\text{new value}}{\\text{old value}} - 1\\right) \\times 100\\%$$. This gives a positive number for an increase and a negative number for a decrease.\n- Step 2: Subtracting 1 is essential because $$\\frac{\\text{new}}{\\text{old}}$$ gives the **ratio** (e.g., 0.51 means the new value is 51% of the old), not the **change**. The change is the ratio minus 1 (e.g., 0.51 − 1 = −0.49, meaning a 49% decrease). Without subtracting 1, you'd report \"51%\" when the answer is \"49% decrease\" — a completely different meaning.\n\nTakeaway: Ratio tells you \"what's left\"; ratio minus 1 tells you \"what changed.\" The question asks for the change.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "When expanding $$(4+\\sqrt{2})(2-\\sqrt{2})$$, what do the \"cross terms\" simplify to, and why is it a common error to think they cancel completely? (2 steps)", "answer": "- Step 1: Using FOIL: $$4 \\times 2 = 8$$, $$4 \\times (-\\sqrt{2}) = -4\\sqrt{2}$$, $$\\sqrt{2} \\times 2 = 2\\sqrt{2}$$, $$\\sqrt{2} \\times (-\\sqrt{2}) = -2$$. The cross terms are $$-4\\sqrt{2} + 2\\sqrt{2} = -2\\sqrt{2}$$.\n- Step 2: The error comes from seeing two terms with $$\\sqrt{2}$$ and assuming they cancel. But they have different coefficients ($$-4$$ and $$+2$$), so they combine to $$-2\\sqrt{2}$$, not zero. Only in a difference-of-two-squares like $$(a+\\sqrt{b})(a-\\sqrt{b}) = a^2 - b$$ do the cross terms cancel — because the coefficients of $$\\sqrt{b}$$ are $$+a$$ and $$-a$$, which are equal in magnitude.\n\nTakeaway: Cross terms with surds combine like terms — they don't cancel unless the coefficients are equal and opposite.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Why does the tutor recommend expanding brackets *before* multiplying by $$\\frac{1}{2}$$ in a triangle area calculation like $$\\frac{1}{2}(4+\\sqrt{2})(2-\\sqrt{2})$$? (2 steps)", "answer": "- Step 1: Expanding first gives $$(4+\\sqrt{2})(2-\\sqrt{2}) = 6 - 2\\sqrt{2}$$, and then multiplying by $$\\frac{1}{2}$$ gives $$3 - \\sqrt{2}$$. This is clean: the factor of 2 in $$-2\\sqrt{2}$$ cancels neatly with the $$\\frac{1}{2}$$.\n- Step 2: If you multiply by $$\\frac{1}{2}$$ first (e.g., computing $$\\frac{4+\\sqrt{2}}{2} = 2 + \\frac{\\sqrt{2}}{2}$$), you introduce fractions into every subsequent step — multiplying $$\\left(2 + \\frac{\\sqrt{2}}{2}\\right)$$ by $$(2 - \\sqrt{2})$$ is messier and more error-prone. Working with integers and surds as long as possible keeps arithmetic simpler.\n\nTakeaway: Delay introducing fractions until the last possible step — integer/surd arithmetic is cleaner than fraction/surd arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "Both $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ pass through the point $$(1, 1)$$. What happens on either side of $$x = 1$$? Describe the qualitative behaviour. (2 steps)", "answer": "- Step 1: For $$0 < x < 1$$: $$\\sqrt{x}$$ gives values between 0 and 1 (below the point), while $$\\frac{1}{\\sqrt{x}}$$ gives values above 1 (above the point). They diverge — $$\\sqrt{x}$$ drops toward 0 and $$\\frac{1}{\\sqrt{x}}$$ shoots toward infinity.\n- Step 2: For $$x > 1$$: $$\\sqrt{x}$$ gives values above 1 (above the point), while $$\\frac{1}{\\sqrt{x}}$$ gives values between 0 and 1 (below the point). Their roles swap — now $$\\sqrt{x}$$ grows and $$\\frac{1}{\\sqrt{x}}$$ decays. The point $$(1,1)$$ is the crossover where they are equal.\n\nTakeaway: $$(1,1)$$ is the pivot point. Below it, $$1/\\sqrt{x}$$ dominates; above it, $$\\sqrt{x}$$ dominates.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "If $$P \\propto Q^2$$ and $$Q$$ is tripled, by what factor does $$P$$ change? If instead $$P \\propto \\frac{1}{Q}$$ and $$Q$$ is tripled, what happens? (2 steps)", "answer": "- Step 1: For $$P \\propto Q^2$$: $$P = kQ^2$$. If $$Q_{\\text{new}} = 3Q$$, then $$P_{\\text{new}} = k(3Q)^2 = 9kQ^2 = 9P_{\\text{old}}$$. So $$P$$ increases by a factor of 9 (an 800% increase).\n- Step 2: For $$P \\propto \\frac{1}{Q}$$: $$P = \\frac{k}{Q}$$. If $$Q_{\\text{new}} = 3Q$$, then $$P_{\\text{new}} = \\frac{k}{3Q} = \\frac{1}{3}P_{\\text{old}}$$. So $$P$$ decreases to one-third of its original value (a 67% decrease). The direction of change is opposite because of the inverse relationship.\n\nTakeaway: Direct proportionality amplifies changes (powers > 1); inverse proportionality dampens them.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "A student sees $$\\frac{4/3}{2}$$ and doesn't know whether to compute $$\\frac{4}{3 \\times 2} = \\frac{4}{6}$$ or $$\\frac{4/3}{2} = \\frac{4}{3} \\div 2$$. Are these the same thing? Explain using the burger method. (2 steps)", "answer": "- Step 1: Yes, they are the same. $$\\frac{4/3}{2}$$ means $$\\frac{4}{3} \\div 2$$. Using the burger method for dividing a fraction by a whole number: $$\\frac{a/b}{c} = \\frac{a}{bc}$$. Here $$a = 4$$, $$b = 3$$, $$c = 2$$, so $$\\frac{4}{3 \\times 2} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 2: Alternatively, think of 2 as $$\\frac{2}{1}$$ and apply the full burger method: $$\\frac{4/3}{2/1} = \\frac{4 \\times 1}{3 \\times 2} = \\frac{4}{6} = \\frac{2}{3}$$. Both approaches give the same result — they are just different ways of seeing the same operation.\n\nTakeaway: Dividing by a whole number = multiplying the denominator by that number. The burger method with $$c/1$$ confirms this.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "What is the difference-of-two-squares shortcut, and how could it have been applied to $$(4+\\sqrt{2})(2-\\sqrt{2})$$? Why doesn't it fully apply here? (2 steps)", "answer": "- Step 1: The difference of two squares pattern is $$(a+b)(a-b) = a^2 - b^2$$. This works when both factors share the same first term and opposite second terms. For example, $$(2+\\sqrt{2})(2-\\sqrt{2}) = 4 - 2 = 2$$.\n- Step 2: In $$(4+\\sqrt{2})(2-\\sqrt{2})$$, the first terms are different (4 and 2), so this is NOT a difference-of-two-squares situation. The cross terms don't cancel. However, the tutor showed the sub-expression $$(2+\\sqrt{2})(2-\\sqrt{2})$$ as a verification check — if the problem had been structured that way, the shortcut would apply.\n\nTakeaway: Difference of two squares requires matching first terms. Don't force the pattern when it doesn't fit.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "For the five functions $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\frac{1}{x}$$, at what point(s) do any of them share the same value? Why is this significant? (2 steps)", "answer": "- Step 1: All five functions equal 1 when $$x = 1$$: $$1^2 = 1$$, $$1 = 1$$, $$\\sqrt{1} = 1$$, $$\\frac{1}{\\sqrt{1}} = 1$$, $$\\frac{1}{1} = 1$$. Also, $$x^2$$, $$x$$, and $$\\sqrt{x}$$ all equal 0 at $$x = 0$$.\n- Step 2: The point $$(1, 1)$$ is significant because it's the common anchor where all five curves meet. It serves as a reference: for $$0 < x < 1$$, the functions spread out from this point — some drop below 1, others rise above 1. Knowing they all pass through $$(1,1)$$ lets you quickly determine whether each function is above or below 1 on the interval.\n\nTakeaway: $$(1,1)$$ is the universal crossing point. On either side, the functions diverge predictably.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A student computes $$\\left(\\frac{1}{2}\\right)^2 = 1$$. What conceptual error are they making, and how would you explain the correct result? (2 steps)", "answer": "- Step 1: The student is squaring only the numerator: $$(1/2)^2 \\neq 1/2$$. They seem to think squaring a fraction means squaring the top only, or they confuse $$\\left(\\frac{1}{2}\\right)^2$$ with $$\\frac{1}{2^2}$$ (which is actually the same correct thing, $$\\frac{1}{4}$$) — so they may be computing $$1^2 / 2 = 1/2$$ instead.\n- Step 2: The correct rule: $$\\left(\\frac{a}{b}\\right)^2 = \\frac{a^2}{b^2}$$. So $$\\left(\\frac{1}{2}\\right)^2 = \\frac{1^2}{2^2} = \\frac{1}{4}$$. Both numerator and denominator must be squared separately. Think of it as $$\\frac{1}{2} \\times \\frac{1}{2} = \\frac{1}{4}$$ — taking half of a half gives a quarter.\n\nTakeaway: When squaring a fraction, square BOTH the numerator and the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": true}, {"question": "As $$x \\to 0^+$$, both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ tend to infinity. Which one grows faster, and how can you tell from the relationship between their denominators? (2 steps)", "answer": "- Step 1: $$\\frac{1}{x}$$ grows faster. As $$x \\to 0^+$$, the denominator $$x$$ approaches 0 faster than $$\\sqrt{x}$$ does (because squaring is the inverse of square root, and $$x = (\\sqrt{x})^2$$, so $$x$$ is the square of a small number — much smaller than the number itself).\n- Step 2: Since $$x < \\sqrt{x}$$ for small positive $$x$$, the denominator of $$\\frac{1}{x}$$ is smaller, making the fraction larger. At $$x = 0.01$$: $$\\frac{1}{x} = 100$$ vs $$\\frac{1}{\\sqrt{x}} = 10$$. The gap widens as $$x$$ gets smaller — $$\\frac{1}{x}$$ diverges much faster.\n\nTakeaway: Both blow up, but $$1/x$$ wins because its denominator shrinks faster (it's the square of an already-small number).", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "In the proportionality problem, the tutor draws two rectangles — one labelled \"100%\" and one labelled \"51% left.\" What's the purpose of this visual, and what common mistake does it prevent? (2 steps)", "answer": "- Step 1: The visual shows that after the change, roughly half the original $$P$$ remains (specifically $$\\frac{25}{49} \\approx 51\\%$$). The rectangle makes it immediately obvious that the new value is about half of the original — the change is roughly a halving.\n- Step 2: This prevents the common mistake of confusing \"51% remaining\" with \"51% decrease.\" If 51% remains, the decrease is $$100\\% - 51\\% = 49\\%$$. Students sometimes see 0.51 and write \"51% decrease,\" but that's the remaining proportion, not the change. The visual reinforces: the lost portion is the gap between the two rectangles.\n\nTakeaway: \"What's left\" ≠ \"what changed.\" The visual makes the gap (the change) tangible.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 100% (i.e., doubles), what is the percentage change in $$P$$? Work through the logic without heavy calculation. (2 steps)", "answer": "- Step 1: $$Q$$ doubling means $$Q_{\\text{new}} = 2Q$$, so the multiplier is $$m = 2$$. Using the rule $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$: $$P_{\\text{new}} = \\frac{1}{4} P_{\\text{old}}$$.\n- Step 2: If $$P_{\\text{new}} = \\frac{1}{4} P_{\\text{old}} = 0.25 \\, P_{\\text{old}}$$, then the percentage change is $$(0.25 - 1) \\times 100\\% = -75\\%$$. A 75% decrease. Intuitively: doubling $$Q$$ squares to 4, and inverting gives $$\\frac{1}{4}$$ — you lose three-quarters of $$P$$.\n\nTakeaway: Doubling $$Q$$ in an inverse-square relationship quarters $$P$$ — a 75% decrease.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "For $$y = \\frac{1}{1+x}$$, what are the asymptotes, and why does the function only have values between $$\\frac{1}{2}$$ and 1 when $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: The vertical asymptote is at $$x = -1$$ (where the denominator equals zero). The horizontal asymptote is $$y = 0$$ (as $$x \\to \\infty$$, the fraction approaches 0). The function passes through $$(0, 1)$$ and $$(1, \\frac{1}{2})$$.\n- Step 2: On $$(0, 1)$$, the denominator $$1 + x$$ ranges from 1 (at $$x = 0$$) to 2 (at $$x = 1$$). Since the function is decreasing on this interval, the maximum is $$\\frac{1}{1} = 1$$ (approached but not reached) and the minimum is $$\\frac{1}{2}$$ (approached but not reached). So the range is $$(\\frac{1}{2}, 1)$$.\n\nTakeaway: The denominator $$1+x$$ shifts the standard reciprocal left by 1, moving the asymptote to $$x = -1$$ and compressing the range on $$(0,1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "You're given a multiple-choice question asking which function is largest on $$0 < x < 1$$. Two options produce values above 1, and three produce values below 1. What's the most efficient first step to eliminate candidates? (2 steps)", "answer": "- Step 1: The most efficient first step is to determine whether each function is above or below 1 on the interval. Any function that stays below 1 cannot be the largest and can be immediately eliminated. This is a coarse filter that typically eliminates most options.\n- Step 2: For the remaining candidates (those above 1), compare them at one convenient test value like $$x = \\frac{1}{4}$$. This breaks the tie without needing a full analytical proof. The strategy is: coarse filter first (above/below 1), then fine comparison (specific test value).\n\nTakeaway: Don't compare all five at once. First, eliminate those below 1. Then, test one value to rank the survivors.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "A student argues: \"Since $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ both go to infinity as $$x \\to 0^+$$, they're equally large on $$(0,1)$$.\" Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: Both functions tending to infinity doesn't mean they're equal — infinity is not a number, and functions can approach it at different rates. The question asks which is **larger at any given $$x$$**, not whether they both diverge.\n- Step 2: At every point in $$(0,1)$$, $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ because $$x < \\sqrt{x}$$ on this interval (smaller denominator = larger fraction). For instance, at $$x = 0.01$$: $$\\frac{1}{x} = 100$$ vs $$\\frac{1}{\\sqrt{x}} = 10$$. The ratio between them grows without bound as $$x \\to 0^+$$.\n\nTakeaway: \"Both go to infinity\" ≠ \"both are equal.\" Rate matters. Compare point-by-point.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Quick mental check: at $$x = \\frac{1}{4}$$, what are the values of $$x^2$$, $$\\sqrt{x}$$, and $$\\frac{1}{x}$$? (No calculator — use the fact that $$\\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$.) (2 steps)", "answer": "- Step 1: $$x^2 = \\left(\\frac{1}{4}\\right)^2 = \\frac{1}{16}$$ (square both numerator and denominator). $$\\sqrt{x} = \\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$ (square root of numerator and denominator separately).\n- Step 2: $$\\frac{1}{x} = \\frac{1}{1/4} = 4$$ (reciprocal of a fraction: flip it). So the three values are $$\\frac{1}{16}$$, $$\\frac{1}{2}$$, and $$4$$ — confirming the ordering $$x^2 < \\sqrt{x} < \\frac{1}{x}$$.\n\nTakeaway: $$x = \\frac{1}{4}$$ is the ideal test value because all operations produce clean fractions.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Why is the graph of $$y = -\\sqrt{x}$$ not the same as the graph of $$y = \\sqrt{x}$$, and why does the tutor cross it out on the board? (2 steps)", "answer": "- Step 1: $$y = \\sqrt{x}$$ produces only non-negative values (it lives in the first quadrant), while $$y = -\\sqrt{x}$$ produces only non-positive values (it lives in the fourth quadrant). They are reflections of each other across the x-axis — completely different curves.\n- Step 2: The tutor crosses out $$y = -\\sqrt{x}$$ because the inverse function of $$y = x^2$$ (restricted to $$x \\geq 0$$) is $$y = \\sqrt{x}$$ (positive branch only), not $$y = -\\sqrt{x}$$. Including the negative branch would make the \"inverse\" fail the vertical line test — it wouldn't be a function at all.\n\nTakeaway: $$y = \\sqrt{x}$$ and $$y = -\\sqrt{x}$$ are distinct curves. Only the positive branch is the inverse of $$y = x^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "The tutor's strategic advice is to focus on A-level foundations rather than ESAT-exclusive prep. Why? What's the underlying reasoning? (2 steps)", "answer": "- Step 1: The skills tested on the ESAT (graph sketching, surds, quadratics, function analysis, proportionality) are all core A-level maths topics. Preparing for A-level automatically prepares you for the ESAT — the overlap is nearly complete.\n- Step 2: University admissions consider A-level grades alongside (or even above) ESAT scores. Over-focusing on ESAT-specific tactics at the expense of deep A-level understanding risks weakening both. Strong fundamentals handle ESAT questions; clever tricks alone don't build lasting competence.\n\nTakeaway: Build the foundation (A-level), and the ESAT takes care of itself. Don't sacrifice depth for test-specific shortcuts.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "In the similar-triangles problem, the proportion $$\\frac{x}{x+3} = \\frac{4}{x}$$ is set up. A student instead writes $$\\frac{x}{4} = \\frac{x-4}{x+3}$$. Is this also valid? Why or why not? (2 steps)", "answer": "- Step 1: Let's check. The correct proportion from AA similarity is $$\\frac{BC}{DE} = \\frac{AB}{AD}$$, i.e., $$\\frac{x}{x+3} = \\frac{4}{x}$$. The student's version $$\\frac{x}{4} = \\frac{x-4}{x+3}$$ would correspond to $$\\frac{BC}{AB} = \\frac{BD}{DE}$$.\n- Step 2: The ratio $$\\frac{BD}{DE}$$ is NOT guaranteed by the similarity. The correct corresponding ratios are $$\\frac{AB}{AD} = \\frac{BC}{DE} = \\frac{AC}{AE}$$. The student is mixing sides from different correspondence pairs. The correct equation $$\\frac{x}{x+3} = \\frac{4}{x}$$ cross-multiplies to $$x^2 = 4(x+3)$$, while the student's gives $$x(x+3) = 4(x-4)$$, which is a different (and incorrect) quadratic.\n\nTakeaway: Always match corresponding sides using the same similarity ratio. Mixing and matching sides from different pairs produces wrong equations.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "Suppose $$P \\propto Q^3$$ and $$Q$$ is halved. What happens to $$P$$ — does it increase or decrease, and by what factor? (2 steps)", "answer": "- Step 1: Since $$P \\propto Q^3$$, we write $$P = kQ^3$$. Halving $$Q$$ means $$Q_{\\text{new}} = \\frac{1}{2}Q$$.\n- Step 2: $$P_{\\text{new}} = k\\left(\\frac{1}{2}Q\\right)^3 = k \\cdot \\frac{1}{8} Q^3 = \\frac{1}{8} P_{\\text{old}}$$. So $$P$$ **decreases** to one-eighth of its original value (an 87.5% decrease). The cube of a half is one-eighth — the power amplifies the reduction.\n\nTakeaway: Direct proportionality with higher powers amplifies changes: halving $$Q$$ doesn't halve $$P$$ — it divides $$P$$ by $$2^3 = 8$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "What is the volume formula for a cylinder, and what is the most common trap when applying it in ratio problems? (2 steps)", "answer": "- Step 1: The volume of a cylinder is $$V = \\pi r^2 h$$, where $$r$$ is the radius and $$h$$ is the height. This is the area of the circular base ($$\\pi r^2$$) multiplied by the height.\n- Step 2: The most common trap is confusing radius with diameter. If the problem says \"diameter = $$2r$$,\" the radius is $$r$$, not $$2r$$. Another trap is misidentifying the height — in the sphere-in-cylinder problem, the height equals the sphere's diameter ($$2r$$), not its radius ($$r$$). Using $$h = r$$ gives $$V = \\pi r^3$$, leading to a ratio of $$\\frac{4}{3}$$, which is impossible (greater than 1).\n\nTakeaway: Always distinguish radius from diameter, and read the problem carefully for what \"height\" or \"length\" refers to.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "Quick exercise: If $$P \\propto \\frac{1}{Q}$$ (inverse, not inverse-square) and $$Q$$ increases by 50%, does $$P$$ increase or decrease, and by roughly what percentage? (2 steps)", "answer": "- Step 1: $$Q$$ increasing by 50% means $$Q_{\\text{new}} = 1.5Q = \\frac{3}{2}Q$$. Since $$P = \\frac{k}{Q}$$, we get $$P_{\\text{new}} = \\frac{k}{(3/2)Q} = \\frac{2}{3} \\cdot \\frac{k}{Q} = \\frac{2}{3} P_{\\text{old}}$$.\n- Step 2: $$P$$ decreases to two-thirds of its original value. The percentage change is $$\\left(\\frac{2}{3} - 1\\right) \\times 100\\% = -33.3\\%$$. Roughly a 33% decrease. Note: for inverse (not inverse-square) proportionality, the change is milder — only one factor of $$m$$ in the denominator, not two.\n\nTakeaway: Inverse proportionality ($$1/Q$$) is less dramatic than inverse-square ($$1/Q^2$$). A 50% increase in $$Q$$ causes a 33% decrease in $$P$$, not 56%.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Quick exercise: Using the burger method, what is $$\\frac{1/3}{1/4}$$? Is the result greater than 1 or less than 1 — and can you predict this before computing? (2 steps)", "answer": "- Step 1: Before computing: $$\\frac{1}{3} < \\frac{1}{4}$$ is FALSE — actually $$\\frac{1}{3} > \\frac{1}{4}$$ (smaller denominator = larger fraction). Dividing a larger fraction by a smaller one should give a result greater than 1.\n- Step 2: Apply the burger method: $$\\frac{1/3}{1/4} = \\frac{1 \\times 4}{3 \\times 1} = \\frac{4}{3} \\approx 1.33$$. Indeed greater than 1, as predicted.\n\nTakeaway: You can often predict whether a fraction division exceeds 1 by comparing the relative sizes of numerator and denominator fractions first.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}], "count": 50}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "For numbers between 0 and 1, does squaring make them larger or smaller — and why? (3 steps)", "answer": "- Step 1: Take any number $$x$$ where $$0 < x < 1$$. By definition, this means $$x$$ is a fraction less than 1. When you multiply $$x$$ by itself to get $$x^2$$, you are multiplying a number less than 1 by another number less than 1.\n- Step 2: Multiplying a positive number by something less than 1 always shrinks it. For example, $$0.5 \\times 0.5 = 0.25$$, which is smaller than 0.5. This is the same logic as \"half of half is a quarter.\" So $$x^2 < x$$ for all $$0 < x < 1$$.\n- Step 3: The deeper intuition: squaring is repeated multiplication. When the base is between 0 and 1, each multiplication by $$x$$ pulls the result closer to 0. This is the opposite of what happens when $$x > 1$$, where each multiplication pushes the result further from 1.\n\nKey takeaway: On $$0 < x < 1$$, squaring is a *shrinking* operation: $$x^2 < x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "For numbers between 0 and 1, does taking the square root make them larger or smaller — and why? (3 steps)", "answer": "- Step 1: Consider what the square root does: it finds the number which, when squared, gives you back $$x$$. If $$0 < x < 1$$, then we need a number whose square equals $$x$$.\n- Step 2: Since squaring shrinks numbers in this range (from Q1), to *undo* that shrinking and get back to $$x$$, the square root must be *larger* than $$x$$. For example, $$\\sqrt{0.25} = 0.5$$, and $$0.5 > 0.25$$.\n- Step 3: Another way to see it: $$\\sqrt{x}$$ is the number $$y$$ such that $$y^2 = x$$. Since $$x < 1$$ and squaring anything between 0 and 1 makes it smaller, the pre-image $$y$$ must be bigger than $$x$$ to compensate. So $$\\sqrt{x} > x$$ for all $$0 < x < 1$$.\n\nKey takeaway: On $$0 < x < 1$$, square root is a *growing* operation: $$\\sqrt{x} > x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is the complete ordering of the six expressions $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$1$$, $$1/\\sqrt{x}$$, and $$1/x$$ for any value of $$x$$ strictly between 0 and 1? Explain why each inequality holds. (4 steps)", "answer": "- Step 1: The ordering is $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. Let's build it from the inside out.\n- Step 2: The first three: Since $$0 < x < 1$$, squaring shrinks ($$x^2 < x$$) and square root grows ($$\\sqrt{x} > x$$). Also $$\\sqrt{x} < 1$$ because squaring both sides gives $$x < 1$$, which is true. So $$x^2 < x < \\sqrt{x} < 1$$.\n- Step 3: The reciprocal relationships: Taking reciprocals of positive numbers *reverses* inequalities. Since $$x < \\sqrt{x}$$, we get $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$. And since $$\\sqrt{x} < 1$$, taking reciprocals gives $$\\frac{1}{\\sqrt{x}} > 1$$. So $$1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$.\n- Step 4: Combining both halves: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. A quick sanity check at $$x = \\frac{1}{4}$$: $$\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2} < 1 < 2 < 4$$. ✓\n\nThe entire ordering is dictated by one fact: numbers between 0 and 1 shrink under squaring and grow under square roots, and reciprocals flip inequalities.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Between $$1/x$$ and $$1/\\sqrt{x}$$, which is larger for $$0 < x < 1$$, and what is the single key fact that determines this? (2 steps)", "answer": "- Step 1: The key fact is that $$\\sqrt{x} > x$$ when $$0 < x < 1$$ (the square root of a fraction is larger than the fraction itself). This means the denominator of $$\\frac{1}{\\sqrt{x}}$$ is larger than the denominator of $$\\frac{1}{x}$$.\n- Step 2: For positive fractions, a larger denominator gives a smaller value. Since $$\\sqrt{x} > x > 0$$, we have $$\\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. Therefore $$\\frac{1}{x}$$ is always the larger of the two on this interval.\n\nThe entire comparison reduces to one inequality: $$\\sqrt{x} > x$$ on $$(0,1)$$, which flips when you take reciprocals.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why is $$\\frac{1}{1+x}$$ always less than 1 for any positive $$x$$, and why does this immediately eliminate it as a candidate for \"largest value on $$0 < x < 1$$\"? (2 steps)", "answer": "- Step 1: When $$x > 0$$, the denominator $$1 + x$$ is strictly greater than 1. Dividing 1 by something greater than 1 always gives a result less than 1. So $$\\frac{1}{1+x} < 1$$ for all $$x > 0$$.\n- Step 2: Meanwhile, both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ produce values strictly greater than 1 on $$0 < x < 1$$ (since their denominators are less than 1). Since $$\\frac{1}{1+x}$$ never even reaches 1, it cannot compete with functions that exceed 1, so it is eliminated immediately.\n\nThe trap: students see a reciprocal and assume it must be large. But $$1+x > 1$$, so the reciprocal is small — the extra \"$$+1$$\" in the denominator keeps it bounded below 1.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Geometrically, what does it mean for two functions to be inverses of each other, and what does the graph of the inverse look like relative to the original? (3 steps)", "answer": "- Step 1: Two functions $$f$$ and $$f^{-1}$$ are inverses if $$f^{-1}(f(x)) = x$$ and $$f(f^{-1}(x)) = x$$. This means one function \"undoes\" the other: apply $$f$$ then $$f^{-1}$$ and you're back where you started.\n- Step 2: Geometrically, if the point $$(a, b)$$ lies on the graph of $$y = f(x)$$, then the point $$(b, a)$$ lies on the graph of $$y = f^{-1}(x)$$. Swapping the coordinates of every point on the curve is equivalent to reflecting the entire graph across the line $$y = x$$.\n- Step 3: For example, $$f(x) = x^2$$ (restricted to $$x \\geq 0$$) passes through $$(2, 4)$$ and $$(3, 9)$$. Its inverse $$f^{-1}(x) = \\sqrt{x}$$ passes through $$(4, 2)$$ and $$(9, 3)$$. The curve $$y = \\sqrt{x}$$ is the mirror image of $$y = x^2$$ across the diagonal line $$y = x$$.\n\nThe reflection-in-$$y=x$$ property is the universal geometric test for inverse functions.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why must we restrict $$f(x) = x^2$$ to $$x \\geq 0$$ before we can define an inverse, and what goes wrong if we don't? (3 steps)", "answer": "- Step 1: For a function to have an inverse, it must be one-to-one (injective): each output must come from exactly one input. If two different inputs produce the same output, the inverse cannot \"know\" which one to return to.\n- Step 2: $$f(x) = x^2$$ on all of $$\\mathbb{R}$$ fails this: both $$f(2) = 4$$ and $$f(-2) = 4$$. If we tried to define $$f^{-1}(4)$$, should it return 2 or -2? There's no unique answer, so no inverse function exists on the full domain.\n- Step 3: By restricting to $$x \\geq 0$$, we keep only the \"right half\" of the parabola, which is strictly increasing and therefore one-to-one. Now each output has exactly one input, and the inverse $$f^{-1}(x) = \\sqrt{x}$$ is well-defined.\n\nWithout the restriction, $$x^2$$ is a two-to-one mapping (except at 0), and you can't invert a two-to-one mapping into a function.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "What is the difference between the statements \"$$x^2 = 4$$\" and \"$$\\sqrt{4}$$\", and why is writing $$\\sqrt{4} = -2$$ wrong? (3 steps)", "answer": "- Step 1: The *equation* $$x^2 = 4$$ asks \"what numbers, when squared, give 4?\" There are two answers: $$x = 2$$ and $$x = -2$$. Both are valid solutions to the equation.\n- Step 2: The *function* $$\\sqrt{x}$$ is defined as the **principal** (non-negative) square root. By convention, $$\\sqrt{4} = 2$$ only — never -2. This is not a mathematical ambiguity; it is a definition that makes $$\\sqrt{x}$$ a proper function (single-valued output).\n- Step 3: Confusing these two is a common error. The equation $$x^2 = 4$$ has two solutions, but the expression $$\\sqrt{4}$$ has one value. If you need both roots, you must write $$x = \\pm\\sqrt{4}$$, where the $$\\pm$$ is explicit and outside the square root symbol.\n\nThe square root symbol $$\\sqrt{\\phantom{x}}$$ always means the positive root. The $$\\pm$$ comes from solving an equation, not from the square root function itself.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "When $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is multiplied by some factor $$m$$, what happens to $$P$$ — and why does the square in the denominator matter? (3 steps)", "answer": "- Step 1: Writing the proportionality as an equation: $$P = \\frac{k}{Q^2}$$. When $$Q$$ becomes $$mQ$$, substitute into the formula: $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{k}{m^2 Q^2}$$.\n- Step 2: Factor out the old value: $$P_{\\text{new}} = \\frac{1}{m^2} \\cdot \\frac{k}{Q^2} = \\frac{1}{m^2} P_{\\text{old}}$$. The key insight is that the $$m$$ gets squared because it's inside a squared term in the denominator. If $$Q$$ doubles ($$m=2$$), then $$P$$ doesn't just halve — it quarters ($$1/4$$).\n- Step 3: The squaring amplifies the effect. A 40% increase in $$Q$$ ($$m = 1.4$$) gives $$m^2 = 1.96$$, so $$P$$ drops to about $$1/1.96 \\approx 0.51$$ of its original — nearly a halving, not just a 40% decrease. The inverse-square relationship means small changes in $$Q$$ produce larger changes in $$P$$.\n\nThe square in the denominator means $$P$$ is *more* sensitive to changes in $$Q$$ than a simple inverse relationship would suggest.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When a problem asks for \"percentage change in $$P$$,\" what is the formula, and what is the common trap of giving the new value instead? (3 steps)", "answer": "- Step 1: The percentage change formula is: $$\\%\\Delta P = \\left(\\frac{P_{\\text{new}} - P_{\\text{old}}}{P_{\\text{old}}}\\right) \\times 100\\%$$. Equivalently, $$\\%\\Delta P = \\left(\\frac{P_{\\text{new}}}{P_{\\text{old}}} - 1\\right) \\times 100\\%$$.\n- Step 2: The trap: if $$P_{\\text{new}} = 0.51 \\times P_{\\text{old}}$$, some students answer \"51%\" because 51% of the original remains. But the *change* is $$0.51 - 1 = -0.49$$, so the answer is a 49% decrease. The new value (51% of original) and the percentage change (49% decrease) are different numbers.\n- Step 3: A reliable mental check: if something decreases, the percentage change should be negative. If you get a positive number for a decrease, you've likely reported the \"remaining fraction\" rather than the change. Always subtract 1 from the ratio before converting to a percentage.\n\nPercentage change = (new/old − 1) × 100%. The \"−1\" is what converts \"how much remains\" into \"how much it changed.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Why is it better to use the exact fraction $$\\frac{7}{5}$$ instead of the decimal 1.4 when computing percentage changes in propor
