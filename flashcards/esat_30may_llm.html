<script>
const DATA={"selected": [{"question": "For $$0 < x < 1$$, rank these three expressions from smallest to largest: $$x^2$$, $$x$$, $$\\sqrt{x}$$. What single test value can confirm this ordering? (2 steps)", "answer": "- Step 1: The ordering is $$x^2 < x < \\sqrt{x}$$. This follows from two facts: squaring a fraction shrinks it ($$x^2 < x$$), and taking the square root expands it ($$\\sqrt{x} > x$$).\n- Step 2: Test with $$x = \\frac{1}{4}$$: $$x^2 = \\frac{1}{16} = 0.0625$$, $$x = \\frac{1}{4} = 0.25$$, $$\\sqrt{x} = \\frac{1}{2} = 0.5$$. Indeed $$0.0625 < 0.25 < 0.5$$.\n\nTakeaway: On $$(0,1)$$, the operations form a clear chain: squaring pulls down, square root pulls up, and the identity sits in between.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "In the similar-triangles problem, the proportion $$\\frac{x}{x+3} = \\frac{4}{x}$$ is set up. A student instead writes $$\\frac{x}{4} = \\frac{x-4}{x+3}$$. Is this also valid? Why or why not? (2 steps)", "answer": "- Step 1: Let's check. The correct proportion from AA similarity is $$\\frac{BC}{DE} = \\frac{AB}{AD}$$, i.e., $$\\frac{x}{x+3} = \\frac{4}{x}$$. The student's version $$\\frac{x}{4} = \\frac{x-4}{x+3}$$ would correspond to $$\\frac{BC}{AB} = \\frac{BD}{DE}$$.\n- Step 2: The ratio $$\\frac{BD}{DE}$$ is NOT guaranteed by the similarity. The correct corresponding ratios are $$\\frac{AB}{AD} = \\frac{BC}{DE} = \\frac{AC}{AE}$$. The student is mixing sides from different correspondence pairs. The correct equation $$\\frac{x}{x+3} = \\frac{4}{x}$$ cross-multiplies to $$x^2 = 4(x+3)$$, while the student's gives $$x(x+3) = 4(x-4)$$, which is a different (and incorrect) quadratic.\n\nTakeaway: Always match corresponding sides using the same similarity ratio. Mixing and matching sides from different pairs produces wrong equations.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Concept check: a student says \"since $$P \\propto \\frac{1}{Q^2}$$, doubling $$Q$$ should halve $$P$$.\" Is this right? (1 step)", "answer": "- Step 1: **No.** The proportionality is to $$\\frac{1}{Q^2}$$, **not** $$\\frac{1}{Q}$$. So doubling $$Q$$ doesn't halve $$P$$ — it **quarters** it.\n+ $$m = 2$$, so $$P_{\\text{new}} = \\frac{1}{2^2} P_{\\text{old}} = \\frac{1}{4} P_{\\text{old}}$$ (a 75% decrease, not 50%).\n\nThe squared exponent in the denominator means the effect is amplified. A common student error is to confuse $$P \\propto 1/Q^2$$ with $$P \\propto 1/Q$$.", "source": "MiniMax ①", "_id": "minimax_1_57"}, {"question": "Why is the graph of $$y = -\\sqrt{x}$$ not the same as the graph of $$y = \\sqrt{x}$$, and why does the tutor cross it out on the board? (2 steps)", "answer": "- Step 1: $$y = \\sqrt{x}$$ produces only non-negative values (it lives in the first quadrant), while $$y = -\\sqrt{x}$$ produces only non-positive values (it lives in the fourth quadrant). They are reflections of each other across the x-axis — completely different curves.\n- Step 2: The tutor crosses out $$y = -\\sqrt{x}$$ because the inverse function of $$y = x^2$$ (restricted to $$x \\geq 0$$) is $$y = \\sqrt{x}$$ (positive branch only), not $$y = -\\sqrt{x}$$. Including the negative branch would make the \"inverse\" fail the vertical line test — it wouldn't be a function at all.\n\nTakeaway: $$y = \\sqrt{x}$$ and $$y = -\\sqrt{x}$$ are distinct curves. Only the positive branch is the inverse of $$y = x^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "In the similar triangles problem, the proportion $$\\frac{4}{x} = \\frac{x}{x+3}$$ is set up. Why does cross-multiplying give a quadratic rather than a linear equation? (2 steps)", "answer": "- Step 1: Cross-multiplying: $$4(x+3) = x \\times x$$, which gives $$4x + 12 = x^2$$. The $$x \\times x$$ term produces $$x^2$$, making this a quadratic equation.\n- Step 2: The quadratic arises because the unknown $$x$$ appears in *both* the numerator of one ratio and the denominator of the other. When you cross-multiply, the two $$x$$'s multiply together, creating the $$x^2$$ term. This is a structural feature of problems where the same variable appears in corresponding positions of both ratios.\n\nWhen the unknown appears on both sides of the proportion (numerator on one side, denominator on the other), cross-multiplication always produces a quadratic.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by 100% (i.e., doubles), what is the percentage change in $$P$$? Work through the logic without heavy calculation. (2 steps)", "answer": "- Step 1: $$Q$$ doubling means $$Q_{\\text{new}} = 2Q$$, so the multiplier is $$m = 2$$. Using the rule $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$: $$P_{\\text{new}} = \\frac{1}{4} P_{\\text{old}}$$.\n- Step 2: If $$P_{\\text{new}} = \\frac{1}{4} P_{\\text{old}} = 0.25 \\, P_{\\text{old}}$$, then the percentage change is $$(0.25 - 1) \\times 100\\% = -75\\%$$. A 75% decrease. Intuitively: doubling $$Q$$ squares to 4, and inverting gives $$\\frac{1}{4}$$ — you lose three-quarters of $$P$$.\n\nTakeaway: Doubling $$Q$$ in an inverse-square relationship quarters $$P$$ — a 75% decrease.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Why does range analysis prune the options so quickly in \"which function is largest on $$(0, 1)$$\" problems? (2 steps)", "answer": "- Step 1: On $$(0, 1)$$, three of the five common functions have ranges entirely **below 1**: $$x^2 \\in (0, 1)$$, $$\\sqrt{x} \\in (0, 1)$$, $$\\frac{1}{1+x} \\in (\\frac{1}{2}, 1)$$. None of them can ever reach 1.\n- Step 2: The remaining two — $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ — have range $$(1, +\\infty)$$, meaning they exceed 1 throughout $$(0, 1)$$. So the three \"below 1\" options are **eliminated immediately** without any further work; the contest is only between the two \"above 1\" candidates.\n\nRange analysis is the single most efficient first move on these questions.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "Do the curves $$y = x^2$$ and $$y = \\sqrt{x}$$ have any asymptotes? (1 step)", "answer": "- Step 1: **No** — neither curve has asymptotes.\n+ $$y = x^2$$: a parabola opening upward, defined for all real $$x$$, grows without bound slowly. No asymptotes.\n+ $$y = \\sqrt{x}$$: a sideways half-parabola, defined only for $$x \\geq 0$$. No asymptotes — the boundary at $$x = 0$$ is a hard wall (the function is defined as 0 there), not an asymptote.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "If $$y \\propto \\frac{1}{x^2}$$, and $$x$$ is halved (multiplied by $$\\frac{1}{2}$$), by what factor does $$y$$ change? Explain the mental steps without using a calculator. (2 steps)", "answer": "- Step 1: Identify the scaling factor for $$x$$, which is $$m = \\frac{1}{2}$$. According to the inverse-square rule, $$y$$ scales by the factor $$\\frac{1}{m^2}$$.\n- Step 2: Calculate $$\\frac{1}{m^2}$$. Squaring $$\\frac{1}{2}$$ gives $$\\frac{1}{4}$$. Inverting $$\\frac{1}{4}$$ gives $$4$$. Therefore, $$y$$ increases by a factor of $$4$$ (it quadruples). Halving the denominator of an inverse-square relationship quadruples the result.", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "On a single set of axes, sketch the mental image of $$y=x^2$$, $$y=x$$, and $$y=\\sqrt{x}$$. For $$0<x<1$$, which graph lies above which, and why does the concave shape cause this ordering?", "answer": "- All three curves pass through $$(0,0)$$ and $$(1,1)$$.\n- For $$0<x<1$$, the parabola $$y=x^2$$ is concave up and stays below the straight line $$y=x$$, because squaring a fraction yields a smaller number.\n- The curve $$y=\\sqrt{x}$$ is concave down and lies above the line $$y=x$$, because taking the square root gives a larger number.\n- So visually: lowest curve is $$x^2$$, middle is the line $$x$$, top is $$\\sqrt{x}$$. At any vertical slice, the vertical order is $$x^2 < x < \\sqrt{x}$$.", "source": "DeepSeek ①", "_id": "deepseek_1_8"}, {"question": "In the similar triangles problem, you have $$\\triangle ABC \\sim \\triangle ADE$$ with $$BC \\parallel DE$$. Explain why the ratio $$\\frac{BC}{DE}$$ equals $$\\frac{AB}{AD}$$, and why it is **not** $$\\frac{BC}{DE} = \\frac{AB}{BD}$$. (3 steps)", "answer": "- Step 1: Because $$BC \\parallel DE$$, corresponding angles are equal (AA similarity). Hence the triangles are similar, meaning all corresponding side ratios are equal.\n- Step 2: $$AB$$ in the small triangle corresponds to $$AD$$ in the large triangle because both are the segments from the common vertex $$A$$ to the parallel line endpoints. Similarly, $$BC$$ corresponds to $$DE$$. So the proportion is $$\\frac{BC}{DE} = \\frac{AB}{AD}$$.\n- Step 3: $$BD$$ is not a side of the small triangle; it’s a piece of $$AD$$, so it does not directly correspond to $$BC$$. The full side $$AD = AB + BD$$ is the correct partner. Using $$BD$$ instead of $$AD$$ is a common trap.", "source": "DeepSeek ②", "_id": "deepseek_2_13"}, {"question": "In the proportional relationship $$P = \\frac{k}{Q^2}$$, what happens conceptually and mathematically if $$Q = 0$$, and how does this dictate the domain of the function in physical applications (e.g., Newton's law of gravitation where $$Q$$ is distance)? (2 steps)", "answer": "- Step 1: Mathematically, substituting $$Q = 0$$ results in division by zero ($$P = \\frac{k}{0}$$), which is undefined. The function has a vertical asymptote at $$Q = 0$$, meaning $$P$$ approaches infinity as $$Q$$ approaches zero.\n- Step 2: In physical applications like gravity or electrostatics, this implies that as the distance between two point masses/charges approaches zero, the force approaches infinity. This singularity indicates the breakdown of the classical inverse-square model at $$Q=0$$, requiring quantum mechanics or a different physical model to describe the interaction at infinitesimally small distances. Thus, the physical domain is strictly $$Q > 0$$.", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "What misconception might students have about the behavior of $$\\frac{1}{1+x}$$ as $$x$$ increases from 0 to 1? (2 steps)", "answer": "- Step 1: Students might think that since $$x$$ is in the denominator, the function should increase as $$x$$ increases (like $$\\frac{1}{x}$$ would if $$x$$ were decreasing).\n- Step 2: However, $$\\frac{1}{1+x}$$ actually decreases as $$x$$ increases because the entire denominator $$1+x$$ is increasing. As the denominator gets larger, the fraction gets smaller.\n\nThe key insight is that it's the behavior of the entire denominator, not just the variable part, that determines whether a reciprocal function increases or decreases.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_24"}, {"question": "Why is $$x = \\frac{1}{4}$$ a particularly \"good\" test value for comparing functions on $$(0, 1)$$? (3 steps)", "answer": "- Step 1: $$\\frac{1}{4}$$ lies strictly in the open interval $$(0, 1)$$, so it satisfies the constraint.\n- Step 2: $$\\frac{1}{4}$$ has a clean square root: $$\\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$. So $$\\frac{1}{\\sqrt{x}} = \\frac{1}{1/2} = 2$$ — mental-math friendly.\n- Step 3: Similarly, $$\\frac{1}{x} = \\frac{1}{1/4} = 4$$ — also clean. No decimals, no rounding.\n\nThe principle: pick test values whose square roots (and other transforms) are simple fractions. Good choices: $$\\frac{1}{4}, \\frac{1}{9}, \\frac{1}{16}, \\frac{1}{2}, \\frac{1}{3}$$.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "Misconception probe: A student claims that \"because $$(-2)^2 = 4$$, it must be true that $$\\sqrt{4} = \\pm 2$$.\" Explain why this is mathematically incorrect when treating $$\\sqrt{x}$$ as a function. (3 steps)", "answer": "- Step 1: The symbol $$\\sqrt{x}$$ specifically denotes the **principal (positive) square root**. By definition, $$\\sqrt{4} = 2$$ only. Writing $$\\sqrt{4} = -2$$ is strictly wrong.\n- Step 2: The confusion arises from solving equations. If you are solving $$x^2 = 4$$, the solutions are indeed $$x = \\pm \\sqrt{4}$$, which simplifies to $$x = \\pm 2$$. The $$\\pm$$ comes from the algebraic act of solving the equation, not from the square root function itself.\n- Step 3: For $$\\sqrt{x}$$ to be a valid mathematical function, it must pass the vertical line test—it can only have one output for each input. If $$\\sqrt{4}$$ outputted both $$2$$ and $$-2$$, it would not be a function.", "source": "Gemini 2.5 ②", "_id": "gemini_2_5"}, {"question": "To prove that $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ for $$0 < x < 1$$, how does testing the limiting case as $$x \\to 0^+$$ provide a stronger conceptual argument than just testing a single mid-point like $$x = 0.5$$? (2 steps)", "answer": "- Step 1: Testing a single point (like $$x=0.5$$) only proves the inequality holds at that specific coordinate; it doesn't guarantee the functions don't cross elsewhere in the interval.\n- Step 2: Analyzing the limit as $$x \\to 0^+$$ shows that both functions approach infinity, but $$\\frac{1}{x}$$ grows much faster because its denominator shrinks quadratically relative to $$\\frac{1}{\\sqrt{x}}$$. Since both functions are continuous, strictly decreasing, and only intersect at $$x=1$$, the one that grows faster near the asymptote ($$x=0$$) must remain strictly above the other for the entire interval $$0 < x < 1$$.\n\nTakeaway: Limits and intersection points define the global behavior of functions over an interval, whereas single test points only offer local snapshots.", "source": "Qwen 3 ②", "_id": "qwen_2_13"}, {"question": "Why is the line $$y = x$$ the \"mirror\" for reflecting a function to its inverse, rather than the x-axis or y-axis? (2 steps)", "answer": "- Step 1: Reflecting across the x-axis swaps $$(a,b)$$ to $$(a,-b)$$ — this negates the output. Reflecting across the y-axis swaps $$(a,b)$$ to $$(-a,b)$$ — this negates the input. Neither of these produces the inverse function.\n- Step 2: The inverse function swaps the *roles* of input and output: if $$f$$ maps $$a \\to b$$, then $$f^{-1}$$ maps $$b \\to a$$. Geometrically, this means swapping the coordinates: $$(a,b) \\to (b,a)$$. The line $$y = x$$ is exactly the set of points where the two coordinates are equal, so it acts as the mirror line for this coordinate swap. Reflecting $$(a,b)$$ across $$y = x$$ gives $$(b,a)$$, which is precisely the inverse relationship.\n\nThe line $$y = x$$ is the geometric locus of \"input = output.\" Reflecting across it swaps input and output, which is the algebraic definition of an inverse.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "When a problem asks for \"percentage change in $$P$$,\" what is the formula, and what is the common trap of giving the new value instead? (3 steps)", "answer": "- Step 1: The percentage change formula is: $$\\%\\Delta P = \\left(\\frac{P_{\\text{new}} - P_{\\text{old}}}{P_{\\text{old}}}\\right) \\times 100\\%$$. Equivalently, $$\\%\\Delta P = \\left(\\frac{P_{\\text{new}}}{P_{\\text{old}}} - 1\\right) \\times 100\\%$$.\n- Step 2: The trap: if $$P_{\\text{new}} = 0.51 \\times P_{\\text{old}}$$, some students answer \"51%\" because 51% of the original remains. But the *change* is $$0.51 - 1 = -0.49$$, so the answer is a 49% decrease. The new value (51% of original) and the percentage change (49% decrease) are different numbers.\n- Step 3: A reliable mental check: if something decreases, the percentage change should be negative. If you get a positive number for a decrease, you've likely reported the \"remaining fraction\" rather than the change. Always subtract 1 from the ratio before converting to a percentage.\n\nPercentage change = (new/old − 1) × 100%. The \"−1\" is what converts \"how much remains\" into \"how much it changed.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "If instead $$P$$ were directly proportional to $$Q^2$$ (i.e., $$P \\propto Q^2$$), and $$Q$$ increased by 40%, by what factor would $$P$$ increase? How does this compare to the inverse‑square case?", "answer": "For direct square proportionality, $$P \\propto Q^2$$, the equation is $$P = k Q^2$$. If $$Q$$ becomes $$1.4 Q$$, then $$P_{\\text{new}} = k (1.4 Q)^2 = 1.96\\, k Q^2 = 1.96\\, P_{\\text{old}}$$. Thus $$P$$ increases by 96%. In contrast, for inverse square $$P \\propto 1/Q^2$$, the same 40% increase in $$Q$$ causes $$P$$ to multiply by $$1/1.96 \\approx 0.51$$, a 49% **decrease**. So the direction and magnitude are dramatically different: direct square amplifies the increase (nearly doubling), while inverse square shrinks it by roughly half.", "source": "DeepSeek ①", "_id": "deepseek_1_25"}, {"question": "When solving a quadratic from a geometry problem, you get $$x = -2$$ and $$x = 6$$. Why must you reject $$x = -2$$, and are there situations where a negative algebraic solution *is* valid? (2 steps)", "answer": "- Step 1: In this problem, $$x$$ represents a physical length (the side BC of a triangle). Lengths cannot be negative, so $$x = -2$$ is rejected as physically meaningless. This is a domain restriction imposed by the real-world context of the problem.\n- Step 2: Negative solutions *are* valid when the variable represents a quantity that can be negative — for example, if $$x$$ represents a coordinate on a number line, a temperature below zero, or a debt. The algebra doesn't care about sign; the interpretation does. Always check: what does $$x$$ represent, and can that quantity be negative?\n\nAlgebra gives you all solutions; the problem context tells you which ones to keep. Always filter mathematical solutions through physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "The tutor noted that “manual factoring is faster than the quadratic formula” for ESAT multiple‑choice questions. In what situation is factoring by inspection especially efficient, and when might you resort to the formula? (2 steps)", "answer": "- Step 1: Factoring is fastest when the quadratic has integer roots and the coefficient of $$x^2$$ is 1, and you can spot two numbers that multiply to $$c$$ and add to $$b$$ by scanning factor pairs (as in $$x^2-4x-12$$). This avoids writing the bulky formula and simplifying.\n- Step 2: You might use the quadratic formula if the numbers are non‑integer surds, or the coefficient of $$x^2$$ is not 1 and factoring by grouping seems messy. But even then, sometimes factoring with rational roots is still possible. The key is to assess the numbers: ESAT often gives “nice” integer roots to reward factoring speed.", "source": "DeepSeek ②", "_id": "deepseek_2_46"}, {"question": "Why must we restrict $$y = x^2$$ to $$x \\geq 0$$ in order to have an inverse function? (3 steps)", "answer": "- Step 1: For an inverse to exist as a function, the original function must be **one-to-one**: every output value must come from exactly one input.\n- Step 2: $$y = x^2$$ is **not** one-to-one on all of $$\\mathbb{R}$$: e.g., both $$x = 2$$ and $$x = -2$$ give $$y = 4$$. So if we tried to define the inverse, $$f^{-1}(4)$$ would need to be both 2 and $$-2$$ — impossible for a single-valued function.\n- Step 3: By restricting to $$x \\geq 0$$ (or $$x \\leq 0$$), we keep only the half where each $$y \\geq 0$$ has exactly one pre-image. The inverse $$f^{-1}(x) = \\sqrt{x}$$ is then a well-defined function.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "For the five functions $$x^2$$, $$x$$, $$\\sqrt{x}$$, $$\\frac{1}{\\sqrt{x}}$$, $$\\frac{1}{x}$$, at what point(s) do any of them share the same value? Why is this significant? (2 steps)", "answer": "- Step 1: All five functions equal 1 when $$x = 1$$: $$1^2 = 1$$, $$1 = 1$$, $$\\sqrt{1} = 1$$, $$\\frac{1}{\\sqrt{1}} = 1$$, $$\\frac{1}{1} = 1$$. Also, $$x^2$$, $$x$$, and $$\\sqrt{x}$$ all equal 0 at $$x = 0$$.\n- Step 2: The point $$(1, 1)$$ is significant because it's the common anchor where all five curves meet. It serves as a reference: for $$0 < x < 1$$, the functions spread out from this point — some drop below 1, others rise above 1. Knowing they all pass through $$(1,1)$$ lets you quickly determine whether each function is above or below 1 on the interval.\n\nTakeaway: $$(1,1)$$ is the universal crossing point. On either side, the functions diverge predictably.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why is the interval $$0 < x < 1$$ sometimes called the \"inversion zone\" for elementary operations? (3 steps)", "answer": "- Step 1: The interval $$(0, 1)$$ consists of positive numbers strictly less than 1. Numbers in this range flip the usual effect of multiplying, taking square roots, and reciprocating.\n- Step 2: For any $$x \\in (0, 1)$$:\n+ Squaring **shrinks** the value: $$x^2 < x$$ (multiplying by something <1 makes things smaller).\n+ Square-rooting **enlarges** the value: $$\\sqrt{x} > x$$ (it undoes the squaring shrink).\n+ Reciprocating **pushes past 1**: $$\\frac{1}{x} > 1$$ (a fraction less than 1 has a reciprocal greater than 1).\n- Step 3: The result is a clean ordering on this interval: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$. The interval $$(0, 1)$$ is where standard operations behave \"upside-down\" compared to $$x > 1$$.\n\nThis is the master insight of the lesson — once you know this ordering, the function-comparison problems become almost trivial.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "For $$y = \\frac{1}{1+x}$$, what are the asymptotes, and why does the function only have values between $$\\frac{1}{2}$$ and 1 when $$0 < x < 1$$? (2 steps)", "answer": "- Step 1: The vertical asymptote is at $$x = -1$$ (where the denominator equals zero). The horizontal asymptote is $$y = 0$$ (as $$x \\to \\infty$$, the fraction approaches 0). The function passes through $$(0, 1)$$ and $$(1, \\frac{1}{2})$$.\n- Step 2: On $$(0, 1)$$, the denominator $$1 + x$$ ranges from 1 (at $$x = 0$$) to 2 (at $$x = 1$$). Since the function is decreasing on this interval, the maximum is $$\\frac{1}{1} = 1$$ (approached but not reached) and the minimum is $$\\frac{1}{2}$$ (approached but not reached). So the range is $$(\\frac{1}{2}, 1)$$.\n\nTakeaway: The denominator $$1+x$$ shifts the standard reciprocal left by 1, moving the asymptote to $$x = -1$$ and compressing the range on $$(0,1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "A solid sphere of radius $$r$$ fits exactly inside a hollow cylinder – the cylinder's internal diameter and its length both equal the sphere's diameter. Without doing any arithmetic, explain why the sphere occupies less than the cylinder but more than half of it.", "answer": "- The sphere is tangent to the cylinder’s inner surface, so the cylinder’s height is $$2r$$, giving it volume $$V_{\\text{cyl}} = \\pi r^2 \\cdot 2r = 2\\pi r^3$$. The sphere’s volume is $$\\frac{4}{3}\\pi r^3$$.\n- The ratio $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{(4/3)\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{2}{3}$$.\n- $$\\frac{2}{3}$$ is less than 1 (obviously) but greater than $$\\frac{1}{2}$$ because the sphere bulges to fill the cylinder’s centre while leaving curved “corners” empty. Intuitively, the sphere touches the cylinder only along the middle circumference, so there is wasted space near the ends, but the sphere still occupies two thirds of the volume.", "source": "DeepSeek ②", "_id": "deepseek_2_2"}, {"question": "What does \"concave up\" vs \"concave down\" mean visually? (2 steps)", "answer": "- Step 1: A curve is **concave up** if it \"holds water\" — like a smile (U-shape). Tangent line slopes **increase** as you move right.\n+ Example: $$y = \\frac{1}{\\sqrt{x}}$$ for $$x > 0$$.\n- Step 2: A curve is **concave down** if it \"sheds water\" — like a frown ($$\\cap$$-shape). Tangent line slopes **decrease** as you move right.\n+ Example: $$y = \\sqrt{x}$$ for $$x \\geq 0$$.\n\nConcavity describes the **curvature** (which way the curve bends), not whether the function is increasing or decreasing. A function can be increasing but concave down, or decreasing but concave up.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Why does the tutor recommend expanding brackets *before* multiplying by $$\\frac{1}{2}$$ in a triangle area calculation like $$\\frac{1}{2}(4+\\sqrt{2})(2-\\sqrt{2})$$? (2 steps)", "answer": "- Step 1: Expanding first gives $$(4+\\sqrt{2})(2-\\sqrt{2}) = 6 - 2\\sqrt{2}$$, and then multiplying by $$\\frac{1}{2}$$ gives $$3 - \\sqrt{2}$$. This is clean: the factor of 2 in $$-2\\sqrt{2}$$ cancels neatly with the $$\\frac{1}{2}$$.\n- Step 2: If you multiply by $$\\frac{1}{2}$$ first (e.g., computing $$\\frac{4+\\sqrt{2}}{2} = 2 + \\frac{\\sqrt{2}}{2}$$), you introduce fractions into every subsequent step — multiplying $$\\left(2 + \\frac{\\sqrt{2}}{2}\\right)$$ by $$(2 - \\sqrt{2})$$ is messier and more error-prone. Working with integers and surds as long as possible keeps arithmetic simpler.\n\nTakeaway: Delay introducing fractions until the last possible step — integer/surd arithmetic is cleaner than fraction/surd arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "When isolating $$b^2$$ to find $$b$$ in an algebraic rearrangement (e.g., reaching the step $$b^2 = K$$), you must write $$b = \\pm \\sqrt{K}$$. Why is the $$\\pm$$ absolutely required here, but strictly forbidden when evaluating a standalone function like $$y = \\sqrt{x}$$? (3 steps)", "answer": "- Step 1: In algebraic rearrangement, you are **solving an equation**. You must account for ALL possible values of $$b$$ that make the original statement true. \n- Step 2: Because both a positive and a negative number yield a positive result when squared, both $$+\\sqrt{K}$$ and $$-\\sqrt{K}$$ are valid algebraic solutions for $$b$$.\n- Step 3: Evaluating $$y = \\sqrt{x}$$ is executing a specific **function**. Functions are mathematically defined to yield exactly one output (the principal root) to maintain predictability and pass the vertical line test.", "source": "Gemini 2.5 ①", "_id": "gemini_1_11"}, {"question": "When factoring a quadratic like $$x^2 - 4x - 12 = 0$$, what is the product-sum method, and why is it preferred over the quadratic formula for ESAT-style questions? (3 steps)", "answer": "- Step 1: The product-sum method: you need two numbers whose product equals the constant term ($$-12$$) and whose sum equals the coefficient of $$x$$ ($$-4$$). List factor pairs of 12 with signs: $$(1, -12)$$ sum = $$-11$$; $$(2, -6)$$ sum = $$-4$$ ✓. Found it: the numbers are 2 and $$-6$$.\n- Step 2: Write the factorisation: $$(x + 2)(x - 6) = 0$$, giving $$x = -2$$ or $$x = 6$$. Since $$x$$ represents a length, reject $$x = -2$$.\n- Step 3: The quadratic formula $$x = \\frac{4 \\pm \\sqrt{16+48}}{2} = \\frac{4 \\pm \\sqrt{64}}{2} = \\frac{4 \\pm 8}{2}$$ also works but requires computing the discriminant, taking a square root, and simplifying — more steps, more places to make arithmetic errors. For clean integer answers (common in ESAT), inspection factoring is typically 10–15 seconds faster and less error-prone.\n\nThe product-sum method is a targeted search; the quadratic formula is a general algorithm. For integer solutions, targeted beats general.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "A student claims that for $$0 < x < 1$$, the function $$\\frac{1}{1+x}$$ should be larger than 1 because \"you're taking a reciprocal.\" What's the flaw in this reasoning? (2 steps)", "answer": "- Step 1: The student is thinking of $$\\frac{1}{x}$$, where the denominator is less than 1, so the result exceeds 1. But for $$\\frac{1}{1+x}$$, the denominator is $$1 + x$$, which is **greater than 1** (since $$x > 0$$).\n- Step 2: When the denominator exceeds 1, the fraction is less than 1. The reciprocal of a number greater than 1 is always between 0 and 1. For example, $$\\frac{1}{1.5} \\approx 0.67$$. The key is what the denominator actually is, not whether a reciprocal is involved.\n\nTakeaway: \"Taking a reciprocal\" only gives a value greater than 1 if the denominator is less than 1. Always check what the denominator actually evaluates to.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "If $$P \\propto \\frac{1}{Q}$$ and $$Q$$ is multiplied by $$m$$, what happens to $$P$$? (1 step)", "answer": "- Step 1: $$P_{\\text{new}} = \\frac{k}{mQ} = \\frac{1}{m} \\cdot \\frac{k}{Q} = \\frac{1}{m} \\cdot P_{\\text{old}}$$.\n\n$$P$$ is multiplied by $$\\frac{1}{m}$$ — the **reciprocal** of the factor. Doubling $$Q$$ halves $$P$$; halving $$Q$$ doubles $$P$$.", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "If $$P \\propto Q^2$$ and $$Q$$ is tripled, by what factor does $$P$$ change? If instead $$P \\propto \\frac{1}{Q}$$ and $$Q$$ is tripled, what happens? (2 steps)", "answer": "- Step 1: For $$P \\propto Q^2$$: $$P = kQ^2$$. If $$Q_{\\text{new}} = 3Q$$, then $$P_{\\text{new}} = k(3Q)^2 = 9kQ^2 = 9P_{\\text{old}}$$. So $$P$$ increases by a factor of 9 (an 800% increase).\n- Step 2: For $$P \\propto \\frac{1}{Q}$$: $$P = \\frac{k}{Q}$$. If $$Q_{\\text{new}} = 3Q$$, then $$P_{\\text{new}} = \\frac{k}{3Q} = \\frac{1}{3}P_{\\text{old}}$$. So $$P$$ decreases to one-third of its original value (a 67% decrease). The direction of change is opposite because of the inverse relationship.\n\nTakeaway: Direct proportionality amplifies changes (powers > 1); inverse proportionality dampens them.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "For $$0 < x < 1$$, the functions $$y = \\sqrt{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ both pass through $$(1,1)$$. How do their shapes differ on this interval, and what does this tell you about their concavity? (3 steps)", "answer": "- Step 1: $$y = \\sqrt{x}$$ starts at $$(0,0)$$ and rises to $$(1,1)$$. It increases, but the rate of increase slows down as $$x$$ approaches 1 — the curve bends downward. This is **concave down** (like an inverted bowl).\n- Step 2: $$y = \\frac{1}{\\sqrt{x}}$$ starts at infinity (as $$x \\to 0^+$$) and falls to $$(1,1)$$. It decreases, but the rate of decrease slows down as $$x$$ approaches 1 — the curve bends upward. This is **concave up** (like a right-side-up bowl).\n- Step 3: The concavity difference has a practical consequence: for any $$x$$ strictly between 0 and 1, $$\\frac{1}{\\sqrt{x}}$$ is always above $$\\sqrt{x}$$. They only meet at $$(1,1)$$. The concave-up curve (falling from infinity) stays above the concave-down curve (rising from zero) throughout the entire interval.\n\nOne rises slowly from 0; the other falls slowly from infinity. They pinch together at $$(1,1)$$ but never cross on $$(0,1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "What's the burger-method version of $$\\tfrac{a}{b} \\div c$$ where $$c$$ is a whole number? Derive it. (2 steps)", "answer": "- Step 1: Treat the whole number $$c$$ as the fraction $$\\tfrac{c}{1}$$.\n- Step 2: Apply the rule: $$\\tfrac{a/b}{c/1} = \\tfrac{a \\cdot 1}{b \\cdot c} = \\tfrac{a}{bc}$$. So $$\\tfrac{a}{b} \\div c = \\tfrac{a}{bc}$$.\n\nTakeaway: dividing a fraction by a whole number means multiplying the *denominator* by that whole number; the numerator stays the same.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "Why is it useful to scan the multiple-choice answer options *before* starting algebra on a rearrangement problem? Give a concrete example of how this saves time. (2 steps)", "answer": "- Step 1: In the rearrangement problem, all answer options have the form $$b = \\pm\\sqrt{\\frac{(\\text{something})}{(\\text{something})}}$$. This immediately tells you three things: (1) you'll need to isolate $$b^2$$, (2) you'll take a square root at the end, and (3) both $$\\pm$$ signs are expected. You now know the destination before you start.\n- Step 2: Without scanning, you might waste time exploring dead-end algebra paths — e.g., trying to solve for $$b$$ directly without first isolating $$b^2$$, or wondering whether the answer should have a $$\\pm$$. The options act as a roadmap: they confirm the structure of the answer, so you can work backward from the expected form and avoid unnecessary detours.\n\nReading the options first is like checking the answer format before writing an essay — it tells you what shape your working should take.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Why is $$\\frac{1}{x} > 1$$ for every $$x \\in (0, 1)$$? (2 steps)", "answer": "- Step 1: On $$(0, 1)$$, we have $$x < 1$$. Both sides are positive, so we can multiply both sides by $$\\frac{1}{x}$$ without flipping the inequality:\n+ $$x \\cdot \\frac{1}{x} < 1 \\cdot \\frac{1}{x}$$\n+ $$1 < \\frac{1}{x}$$\n- Step 2: So the reciprocal of a number in $$(0, 1)$$ is always greater than 1. As $$x \\to 0^+$$, $$\\frac{1}{x} \\to +\\infty$$ — without bound.\n\nThe same argument works for any positive number less than 1: its reciprocal exceeds 1, and the smaller the number, the bigger the reciprocal.", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "A sphere of radius $$r$$ fits exactly inside a cylinder (same diameter, same height as the sphere's diameter). What fraction of the cylinder's volume does the sphere occupy, and why is this a result worth memorizing? (3 steps)", "answer": "- Step 1: The cylinder has radius $$r$$ and height $$2r$$ (the sphere's diameter). So $$V_{\\text{cyl}} = \\pi r^2 \\times 2r = 2\\pi r^3$$. The sphere has $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$.\n- Step 2: Form the ratio and cancel: $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{(4/3)\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 3: This is Archimedes' classical result: a sphere always fills exactly $$\\frac{2}{3}$$ of its circumscribing cylinder. It's worth memorizing because it's a fixed ratio — it doesn't depend on $$r$$. If you see \"sphere inside cylinder, same diameter and height,\" you can immediately write $$\\frac{2}{3}$$ without any calculation.\n\nArchimedes was so proud of this result that he reportedly asked for a sphere and cylinder to be engraved on his tombstone.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "A student claims that for $$0 < x < 1$$, the function $$y = \\frac{1}{1+x}$$ will approach infinity as $$x \\to 0^+$$, similar to $$y = \\frac{1}{x}$$. Explain why this is a misconception by analyzing the denominator's limiting behaviour and the function's actual range on this interval. (2 steps)", "answer": "- Step 1: Analyze the denominator $$1+x$$. As $$x \\to 0^+$$, the denominator approaches $$1 + 0 = 1$$, not $$0$$. Therefore, the fraction approaches $$\\frac{1}{1} = 1$$, not infinity. The vertical asymptote for $$\\frac{1}{1+x}$$ is at $$x = -1$$, which is completely outside the interval $$0 < x < 1$$.\n- Step 2: Determine the actual range. At $$x \\to 0^+$$, $$y \\to 1$$. At $$x = 1$$, $$y = \\frac{1}{2}$$. Since the function is strictly decreasing, its range on $$0 < x < 1$$ is strictly bounded between $$\\frac{1}{2}$$ and $$1$$. It never exceeds 1, making it fundamentally different from $$\\frac{1}{x}$$, which is unbounded.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "The lesson advises “cancel early” in ratio problems. Why does cancelling $$\\pi r^3$$ in $$\\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3}$$ before dealing with the fractions reduce error? (2 steps)", "answer": "- Step 1: Cancelling the common factor $$\\pi r^3$$ immediately simplifies the expression to $$\\frac{4/3}{2}$$. This leaves only the rational coefficient, eliminating any risk of misapplying $$\\pi$$ or forgetting to cancel it.\n- Step 2: If you instead compute $$2\\pi r^3$$ as $$2 \\times 3.14 \\times r^3$$ or keep symbolic, you’re holding more symbols, which increases the chance of a slip. Early cancellation reduces the problem to a simple fraction division, where the burger method or reciprocal rule is trivial.", "source": "DeepSeek ②", "_id": "deepseek_2_31"}, {"question": "Why does the tutor advise focusing on A-level foundations rather than ESAT-exclusive preparation? What is the strategic reasoning? (2 steps)", "answer": "- Step 1: The ESAT tests core mathematical skills — graph sketching, surd manipulation, proportional reasoning, quadratic algebra — which are all A-level content. There is no separate \"ESAT syllabus\" with unique topics you need to learn from scratch.\n- Step 2: Strong A-level performance matters for university admission independently of ESAT scores. Time spent reinforcing A-level foundations improves both your ESAT performance *and* your A-level grades. Time spent on ESAT-specific \"tricks\" only helps the ESAT. The return on investment favors foundational depth over tactical breadth.\n\nThe ESAT is a subset of A-level maths. Mastering A-level maths automatically prepares you for the ESAT, but not vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "How do you convert \"$$X$$ increased by $$p\\%$$\" into a numerical multiplier, and \"the new value is $$m$$ times the old\" into a percentage change? (2 steps)", "answer": "- Step 1: **Percentage increase → multiplier:** $$m = 1 + \\frac{p}{100}$$.\n+ \"Increased by 40%\" → $$m = 1.4 = \\frac{7}{5}$$.\n+ \"Increased by 20%\" → $$m = 1.2 = \\frac{6}{5}$$.\n- Step 2: **Multiplier → percentage change:** $$\\%\\Delta = (m - 1) \\times 100\\%$$.\n+ $$m = 1.5$$ → $$+50\\%$$ (50% increase).\n+ $$m = 0.51$$ → $$-49\\%$$ (49% decrease).\n+ $$m = 1$$ → $$0\\%$$ (no change).\n\nMultiplier above 1 means increase; below 1 means decrease.", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "In the proportionality problem, the tutor draws two rectangles — one labelled \"100%\" and one labelled \"51% left.\" What's the purpose of this visual, and what common mistake does it prevent? (2 steps)", "answer": "- Step 1: The visual shows that after the change, roughly half the original $$P$$ remains (specifically $$\\frac{25}{49} \\approx 51\\%$$). The rectangle makes it immediately obvious that the new value is about half of the original — the change is roughly a halving.\n- Step 2: This prevents the common mistake of confusing \"51% remaining\" with \"51% decrease.\" If 51% remains, the decrease is $$100\\% - 51\\% = 49\\%$$. Students sometimes see 0.51 and write \"51% decrease,\" but that's the remaining proportion, not the change. The visual reinforces: the lost portion is the gap between the two rectangles.\n\nTakeaway: \"What's left\" ≠ \"what changed.\" The visual makes the gap (the change) tangible.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "A student solving $$a = \\frac{b^2+2}{3b^2-1}$$ for $$b$$ gets $$b = \\sqrt{\\frac{a+2}{3a-1}}$$ (positive root only). Their answer matches one of the options exactly. Why is their answer still wrong? (2 steps)", "answer": "- Step 1: The original equation involves only $$b^2$$, so both $$b = +c$$ and $$b = -c$$ satisfy the equation for any valid $$c$$. The student's answer misses the negative root entirely.\n- Step 2: The correct answer is $$b = \\pm\\sqrt{\\frac{a+2}{3a-1}}$$. Even if the positive-root-only version happens to appear as a distractor option in multiple choice, the correct option includes the $$\\pm$$. The student was likely drawn to the option that matched their incomplete working.\n\nWhen the unknown appears only as its square, the solution must include both signs. An answer without $$\\pm$$ is incomplete.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "A student claims that since $$\\sqrt{x} > x$$ for $$0 < x < 1$$, then $$\\sqrt{x}$$ must also be greater than 1 on this interval. Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: The fact that $$\\sqrt{x} > x$$ only tells us the square root is *larger than the original number* — it doesn't tell us the square root exceeds 1. For example, at $$x = 0.25$$: $$\\sqrt{0.25} = 0.5$$, which is indeed larger than 0.25 but still less than 1.\n- Step 2: The correct bound comes from the endpoint: at $$x = 1$$, $$\\sqrt{1} = 1$$; and for all $$0 < x < 1$$, $$\\sqrt{x} < 1$$ (which we can verify by squaring both sides: $$\\sqrt{x} < 1 \\iff x < 1$$, which is true). So $$\\sqrt{x}$$ is between $$x$$ and 1 on this interval — larger than $$x$$ but still below 1.\n\n\"Greater than $$x$$\" does not mean \"greater than 1.\" On $$(0,1)$$, $$\\sqrt{x}$$ sits in the gap between $$x$$ and 1.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "State the general rule: if $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ increases by $$p\\%$$, what is the percentage change in $$P$$? (3 steps)", "answer": "- Step 1: Convert the percentage to a multiplier: $$m = 1 + \\frac{p}{100}$$.\n- Step 2: Apply the scaling rule: $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$.\n- Step 3: Percentage change: $$\\%\\Delta P = \\left(\\frac{1}{m^2} - 1\\right) \\times 100\\% = \\left(\\frac{1}{(1 + p/100)^2} - 1\\right) \\times 100\\%$$.\n\nFor $$p = 40$$: $$m = 1.4 = \\frac{7}{5}$$, $$m^2 = \\frac{49}{25}$$, $$\\frac{1}{m^2} = \\frac{25}{49}$$, change = $$\\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\% \\approx -49\\%$$.", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "Why is **one** test value (e.g., $$x = \\frac{1}{4}$$) sufficient to compare $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ on the entire interval $$(0, 1)$$? (2 steps)", "answer": "- Step 1: Both $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ are **strictly decreasing** on $$(0, 1)$$. So if we know which is larger at one point, we know the order is preserved (or reversed, consistently) across the whole interval.\n- Step 2: At $$x = \\frac{1}{4}$$: $$\\frac{1}{x} = 4 > 2 = \\frac{1}{\\sqrt{x}}$$. So $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ for **all** $$x \\in (0, 1)$$.\n\nThis is the **monotonicity shortcut**: for two functions that are monotone in the same direction on an interval, one comparison test point settles the question globally.", "source": "MiniMax ①", "_id": "minimax_1_30"}, {"question": "Why is it better to use $$\\frac{7}{5}$$ (exact fraction) rather than $$1.4$$ (decimal) when computing the percentage change? (2 steps)", "answer": "- Step 1: $$\\frac{7}{5}$$ is the **exact** equivalent of $$1.4$$. Using the exact fraction keeps every step of the calculation exact.\n- Step 2: With decimals, errors accumulate:\n+ $$1.4^2 = 1.96$$ (exact).\n+ $$\\frac{1}{1.96} \\approx 0.5102$$ (already rounded).\n+ $$0.5102 - 1 = -0.4898$$ (more rounding).\n\nWith fractions: $$\\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$ (exact), $$\\frac{1}{49/25} = \\frac{25}{49}$$ (exact), $$\\frac{25}{49} - 1 = -\\frac{24}{49}$$ (exact, no decimals). The exact fraction avoids cumulative rounding and gives a clean rational answer.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "Two triangles are similar by AA. If $$\\triangle ABC \\sim \\triangle ADE$$ with $$BC \\parallel DE$$, what three things must be true about the angles? (1 step)", "answer": "- Step 1: AA similarity requires two pairs of equal angles. Here: (1) $$\\angle BAC = \\angle DAE$$ (the *same* angle $$\\angle A$$, common to both triangles — it's automatically equal to itself); (2) $$\\angle ABC = \\angle ADE$$ (corresponding angles from the parallel lines $$BC \\parallel DE$$, with $$AB$$ and $$AD$$ as the transversal cutting those parallels). The third pair follows: $$\\angle ACB = \\angle AED$$ (angles in a triangle sum to 180°, so the third pair must be equal too).\n\nTakeaway: a shared angle + one pair of parallel-line angles is enough to nail AA similarity; the third pair comes for free.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "In the sphere-in-cylinder problem, why does the cylinder's height equal $$2r$$ (the sphere's diameter), not $$r$$ (the sphere's radius)? (2 steps)", "answer": "- Step 1: The problem says the cylinder has the \"same internal diameter and length as the diameter of the sphere.\" Reading carefully: cylinder diameter = sphere diameter (both = $$2r$$), AND cylinder **length** = sphere diameter (also = $$2r$$).\n- Step 2: So the cylinder's height is $$2r$$, not $$r$$. If you used $$h = r$$, the volume would be $$\\pi r^3$$, and the ratio $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{4}{3} > 1$$ — which is impossible (the sphere can't take up more space than the whole cylinder).\n\nThe trap option tests whether you confused radius with diameter. Always read the problem wording precisely.", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "When rearranging $$a = \\frac{b^2 + 2}{3b^2 - 1}$$ to solve for $$b$$, what's the key strategic insight? (3 steps)", "answer": "- Step 1: After cross-multiplying to get $$a(3b^2 - 1) = b^2 + 2$$, the key is to collect all $$b^2$$ terms on one side: $$3ab^2 - b^2 = a + 2$$\n- Step 2: Factor out $$b^2$$: $$b^2(3a - 1) = a + 2$$, which immediately isolates $$b^2 = \\frac{a+2}{3a-1}$$\n+ This is much cleaner than moving everything to one side and trying to use the quadratic formula\n+ The factoring step is only possible if we keep $$b^2$$ terms together\n- Step 3: Take the square root with both signs: $$b = \\pm\\sqrt{\\frac{a+2}{3a-1}}$$\n\nThe strategy is to preserve the structure that lets $$b^2$$ factor out cleanly, rather than expanding everything into standard quadratic form.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_13"}, {"question": "If a variable $$P$$ is inversely proportional to the square of $$Q$$ ($$P \\propto \\frac{1}{Q^2}$$), and $$Q$$ is scaled by a factor of $$m$$, conceptually explain why $$P$$ scales by $$\\frac{1}{m^2}$$ rather than just $$\\frac{1}{m}$$. (2 steps)", "answer": "- Step 1: Write the proportionality as an equation with a constant $$k$$: $$P = \\frac{k}{Q^2}$$. When $$Q$$ is replaced by the new value $$mQ$$, the new denominator becomes $$(mQ)^2$$.\n- Step 2: Expand the new denominator to get $$m^2 Q^2$$. The new equation is $$P_{new} = \\frac{k}{m^2 Q^2} = \\frac{1}{m^2} \\left(\\frac{k}{Q^2}\\right)$$. The squaring operation applies to the scaling factor $$m$$ as well as the variable $$Q$$, resulting in a squared scaling effect on the denominator, and thus an inverse-squared effect on $$P$$.\n\nTakeaway: In inverse-square relationships, scaling the independent variable scales the dependent variable by the inverse square of that factor.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "Conceptually, why does the ratio of the volume of a sphere to the volume of its circumscribing cylinder (where height equals diameter) always equal exactly $$\\frac{2}{3}$$, regardless of the sphere's radius? (2 steps)", "answer": "- Step 1: Both the sphere's volume ($$\\frac{4}{3}\\pi r^3$$) and the cylinder's volume ($$\\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$) scale with the cube of the radius. Because they share the exact same dimensional scaling factor ($$r^3$$), the radius completely cancels out when forming the ratio.\n- Step 2: The remaining constant coefficients are $$\\frac{4}{3}$$ for the sphere and $$2$$ (which is $$\\frac{6}{3}$$) for the cylinder. Dividing these constants yields $$\\frac{4/3}{6/3} = \\frac{4}{6} = \\frac{2}{3}$$. This geometric invariant is Archimedes' famous discovery.\n\nTakeaway: When comparing volumes of geometrically similar or tightly bound shapes, the variable dimensions cancel out, leaving a pure constant ratio.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "What is the general formula for percentage change when a quantity goes from an old value to a new value? Why is it important to subtract 1 before multiplying by 100%? (2 steps)", "answer": "- Step 1: The formula is $$\\%\\Delta = \\left(\\frac{\\text{new value}}{\\text{old value}} - 1\\right) \\times 100\\%$$. This gives a positive number for an increase and a negative number for a decrease.\n- Step 2: Subtracting 1 is essential because $$\\frac{\\text{new}}{\\text{old}}$$ gives the **ratio** (e.g., 0.51 means the new value is 51% of the old), not the **change**. The change is the ratio minus 1 (e.g., 0.51 − 1 = −0.49, meaning a 49% decrease). Without subtracting 1, you'd report \"51%\" when the answer is \"49% decrease\" — a completely different meaning.\n\nTakeaway: Ratio tells you \"what's left\"; ratio minus 1 tells you \"what changed.\" The question asks for the change.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "Why is the function $$f(x) = \\frac{1}{x}$$ its **own** inverse? What does that imply about its graph? (2 steps)", "answer": "- Step 1: Apply $$f$$ twice: $$f(f(x)) = \\frac{1}{1/x} = x$$. So $$f \\circ f$$ is the identity, which is the definition of being one's own inverse.\n- Step 2: For a function that is its own inverse, the graph must be **symmetric about the line $$y = x$$** (the axis of reflection that maps a function to its inverse). So the graph of $$y = \\frac{1}{x}$$ — the two branches of the hyperbola in the first and third quadrants — is symmetric about $$y = x$$.\n\nThis is a special property, not shared by all functions. Most functions are not self-inverse.", "source": "MiniMax ①", "_id": "minimax_1_53"}, {"question": "Evaluate the limiting behaviour of the functions $$y = x^2$$, $$y = \\sqrt{x}$$, and $$y = \\frac{1}{x}$$ as $$x \\to 0^+$$ and as $$x \\to \\infty$$. How do these limits conceptually separate the functions into distinct growth/decay categories? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, both $$x^2$$ and $$\\sqrt{x}$$ decay to $$0$$, but $$x^2$$ decays much faster (it approaches 0 quicker than $$\\sqrt{x}$$). Conversely, $$\\frac{1}{x}$$ exhibits a vertical asymptote, growing unboundedly towards $$+\\infty$$.\n- Step 2: As $$x \\to \\infty$$, the behaviour flips. $$x^2$$ grows unboundedly towards $$+\\infty$$ (fastest growth), $$\\sqrt{x}$$ also grows towards $$+\\infty$$ but much slower, and $$\\frac{1}{x}$$ decays towards $$0$$ (horizontal asymptote).\n- Step 3: These limits separate them into categories: $$x^2$$ is a fast-growing polynomial, $$\\sqrt{x}$$ is a slow-growing fractional power, and $$\\frac{1}{x}$$ is a decaying rational function. The transition at $$x=1$$ (where all three equal 1) is the pivot point where their relative ordering reverses.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "A student reads \"fits inside a cylinder\" and assumes the cylinder's height is $$r$$ (the sphere's *radius*) rather than $$2r$$ (its *diameter*). What answer do they get, and why is it obviously wrong? (1 step)", "answer": "- Step 1: With $$h = r$$, the cylinder volume is $$V_{\\text{cyl}} = \\pi r^2 \\cdot r = \\pi r^3$$, and the ratio becomes $$\\tfrac{(4/3)\\pi r^3}{\\pi r^3} = \\tfrac{4}{3}$$. This is greater than 1, which is impossible: the sphere is *inside* the cylinder, so it must occupy *less* (not more) than the cylinder's volume. The error flags itself.\n\nTakeaway: any time a \"fraction\" answer exceeds 1 in a \"fits inside\" geometry problem, you've made an error in the dimensions.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Conceptually, why does $$\\frac{1}{\\sqrt{x}}$$ approach infinity as $$x \\to 0^+$$, but approach 1 as $$x \\to 1^-$$? Walk through the logic without computing specific values. (2 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, the denominator $$\\sqrt{x}$$ approaches 0 (the square root of a very small positive number is still a very small positive number). Dividing 1 by a quantity approaching 0 produces an arbitrarily large result — hence $$\\frac{1}{\\sqrt{x}} \\to \\infty$$.\n- Step 2: As $$x \\to 1^-$$, the denominator $$\\sqrt{x}$$ approaches $$\\sqrt{1} = 1$$. Dividing 1 by a quantity approaching 1 gives a result approaching 1 — hence $$\\frac{1}{\\sqrt{x}} \\to 1$$. The function smoothly descends from infinity to 1 across the interval, always staying above 1 because the denominator is always less than 1 (for $$0 < x < 1$$).\n\nThe behaviour is entirely controlled by the denominator: small denominator → large value; denominator near 1 → value near 1.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "What's the conceptual significance of the $$\\frac{2}{3}$$ ratio for sphere-in-cylinder volume, and why is this result historically important? (3 steps)", "answer": "- Step 1: The $$\\frac{2}{3}$$ ratio means that even when a sphere fits \"perfectly\" inside a cylinder (touching all surfaces), it only occupies about 67% of the space\n- Step 2: This leaves $$\\frac{1}{3}$$ (about 33%) as \"wasted space\" — a surprisingly large amount given the tight fit\n+ This ratio is independent of the actual size — it's the same for a ping-pong ball or a planet\n+ The result comes purely from the geometric relationship, not the specific dimensions\n- Step 3: This is Archimedes' famous discovery (circa 250 BCE) and was so important to him that he requested it be carved on his tombstone\n+ It demonstrates the power of mathematical reasoning to find exact relationships in geometry\n+ The result connects two fundamental 3D shapes through a simple fraction\n\nThis ratio appears throughout physics and engineering wherever spherical objects are packed or contained.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_22"}, {"question": "Given $$\\tfrac{AB}{AD} = \\tfrac{BC}{DE}$$, why is this the correct proportion and not, say, $$\\tfrac{AD}{AB} = \\tfrac{DE}{BC}$$? (1 step)", "answer": "- Step 1: The correct proportion pairs *corresponding* sides: in $$\\triangle ABC \\sim \\triangle ADE$$, side $$AB$$ (in the small triangle) corresponds to side $$AD$$ (in the big triangle), and side $$BC$$ corresponds to $$DE$$. So the \"small : big\" pairing is correct: $$AB/AD = BC/DE = AC/AE$$. Using $$AD/AB$$ inverts the ratio — it would still be numerically equal (because of the same similarity), but it's the *reciprocal*, which is not the form that drops out of similar-triangle proofs. Pick the form that matches the small triangle on top.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "\"For $$\\tfrac{1}{x}$$ to be larger than $$\\tfrac{1}{\\sqrt{x}}$$ in $$0 < x < 1$$, you need the denominator of the first to be *smaller* than the denominator of the second.\" Explain why smaller denominators give larger fractions (when numerators are equal positive). (1 step)", "answer": "- Step 1: If both numerators are the same positive value (here, both 1), then the fraction with the smaller denominator is the larger one. Concretely: $$\\tfrac{1}{2} > \\tfrac{1}{3}$$ because dividing 1 into 2 equal parts gives bigger parts than dividing it into 3 equal parts. So with $$x < \\sqrt{x}$$ in the interval, the denominator $$x$$ of $$\\tfrac{1}{x}$$ is smaller, making $$\\tfrac{1}{x}$$ larger.", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "A student computes $$\\frac{1}{1.96} \\approx 0.51$$ and concludes that $$P$$ decreases by 51%. Identify and correct the error. (2 steps)", "answer": "- Step 1: The value 0.51 represents the fraction of $$P$$ that *remains*, not the fraction that was *lost*. If $$P_{\\text{new}} = 0.51 \\times P_{\\text{old}}$$, then the change is $$0.51 - 1 = -0.49$$, meaning a 49% decrease.\n- Step 2: The student confused \"51% remains\" with \"51% decrease.\" These are complementary: if 51% remains, then 49% was lost. The percentage decrease is always the complement of the remaining percentage (relative to 100%).\n\nRemaining fraction ≠ change fraction. Change = remaining − 1 (or equivalently, 100% − remaining %).", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student says \"if $$Q$$ is increased by 40%, then $$P \\propto 1/Q^2$$ should *also* increase by 40% because proportional means 'same direction'.\" What's wrong with this reasoning? (2 steps)", "answer": "- Step 1: \"Proportional to\" describes the *form* of the relationship, not the *direction* of the change. $$P \\propto 1/Q^2$$ means $$P$$ scales like $$1/Q^2$$, which is an *inverse* relationship in $$Q$$: as $$Q$$ grows, the $$1/Q^2$$ factor shrinks.\n- Step 2: Concretely, $$P_{\\text{new}} = \\tfrac{1}{(7/5)^2} P_{\\text{old}} = \\tfrac{25}{49} P_{\\text{old}} \\approx 0.51 P_{\\text{old}}$$, which is *less* than the original — a 49% *decrease*, not a 40% increase. The \"proportional\" part means the *constant of proportionality* $$k$$ is unchanged; the $$1/Q^2$$ part is doing the inverse scaling.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "The expression $$(3+\\sqrt{5})(3-\\sqrt{5})$$ simplifies to just 4, with no surd term at all. What pattern does this illustrate, and why does the surd cancel? (2 steps)", "answer": "- Step 1: This is the **difference of two squares**: $$(a+b)(a-b) = a^2 - b^2$$. Here $$a = 3$$ and $$b = \\sqrt{5}$$, so the product is $$3^2 - (\\sqrt{5})^2 = 9 - 5 = 4$$.\n- Step 2: The surd cancels because the cross terms $$+a\\sqrt{5}$$ and $$-a\\sqrt{5}$$ are equal and opposite — they sum to zero. This always happens with conjugate pairs $$(a+\\sqrt{b})(a-\\sqrt{b})$$: the irrational parts annihilate, leaving only rational numbers. This is why rationalizing denominators works.\n\nConjugate surd pairs always produce rational results. This is the algebraic basis for rationalizing denominators and simplifying surd expressions.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "In the proportion $$\\frac{x}{x+3} = \\frac{4}{x}$$ (coming from similar triangles), cross‑multiplying gives $$x^2 = 4x + 12$$. Before solving, why do we immediately know one solution must be negative? (2 steps)", "answer": "- Step 1: The equation is quadratic: $$x^2 - 4x - 12 = 0$$. The constant term is negative (-12). For a quadratic $$ax^2+bx+c=0$$, the product of the roots is $$c/a$$, which here is $$-12$$ (since $$a=1$$). A negative product means one root is positive, the other negative.\n- Step 2: Since $$x$$ represents a length ($$BC$$), the negative root ($$x=-2$$) is extraneous physically. The positive root ($$x=6$$) is the valid length. This checks that the math yields an automatic rejection based on context.", "source": "DeepSeek ②", "_id": "deepseek_2_14"}, {"question": "Conceptually, why does the inequality $$x^2 < x < \\sqrt{x}$$ hold true for all $$x$$ in the interval $$0 < x < 1$$, and how does this relate to the geometric interpretation of squaring and square-rooting a fraction? (3 steps)", "answer": "- Step 1: Consider the operation of squaring a number between 0 and 1. Multiplying a proper fraction by itself yields a smaller fraction (e.g., $$0.5 \\times 0.5 = 0.25$$). Geometrically, this means the area of a square with side length $$x < 1$$ is smaller than its side length. Thus, $$x^2 < x$$.\n- Step 2: Consider the square root operation, which asks \"what side length gives an area of $$x$$?\". Since the area $$x$$ is larger than the area $$x^2$$, the required side length $$\\sqrt{x}$$ must be larger than $$x$$. Thus, $$x < \\sqrt{x}$$.\n- Step 3: Combining these gives the strict ordering $$x^2 < x < \\sqrt{x}$$. The core intuition is that for proper fractions, integer exponentiation shrinks the value toward zero, while fractional exponentiation (roots) expands it toward one, all bounded strictly between 0 and 1.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "Misconception probe: a student claims that \"since $$\\sqrt{}$$ and $$1/$$ both involve 'shrinking' operations, $$\\frac{1}{\\sqrt{x}}$$ should give the smallest value on $$(0, 1)$$.\" What is the flaw in this reasoning? (2 steps)", "answer": "- Step 1: The student is conflating two different effects. Taking the square root of a number in $$(0, 1)$$ **enlarges** the value (e.g., $$\\sqrt{0.25} = 0.5 > 0.25$$). Then taking the reciprocal of that enlarged value makes it **larger still** (e.g., $$\\frac{1}{0.5} = 2$$).\n- Step 2: So $$\\frac{1}{\\sqrt{x}}$$ on $$(0, 1)$$ is actually **greater than 1** for all $$x \\in (0, 1)$$. It is one of the **largest** candidates, not the smallest. The error is in thinking \"more operations = more shrinking\" — the opposite is true: each operation tends to *increase* the value on $$(0, 1)$$.", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "When finding the area of a triangle with surd sides, what is the difference‑of‑squares pattern, and why might a student mistakenly think $$(4+\\sqrt{2})(2-\\sqrt{2})$$ simplifies to something like $$8-2$$ only? (3 steps)", "answer": "- Step 1: The difference of two squares is $$(a+b)(a-b)=a^2-b^2$$. For example, $$(4+\\sqrt{2})(4-\\sqrt{2}) = 16 - 2 = 14$$.\n- Step 2: The given expression has different first terms (4 and 2), not the same, so it is NOT a difference of squares. A student might erroneously assume that because both contain $$\\sqrt{2}$$, only the outer and inner terms cancel completely, leaving just the product of the rational parts.\n- Step 3: Proper FOIL gives cross terms $$-4\\sqrt{2}+2\\sqrt{2} = -2\\sqrt{2}$$, which do not cancel out. So the mistake is over‑applying the pattern without checking that the rational parts are identical.", "source": "DeepSeek ②", "_id": "deepseek_2_21"}, {"question": "The principal square root function $$f(x)=\\sqrt{x}$$ is defined only for $$x\\ge 0$$ and yields the non‑negative root. If we defined a “negative square root function” $$g(x)=-\\sqrt{x}$$, what would its graph look like relative to $$f(x)$$? Why do we usually not call it “the square root”?", "answer": "- $$g(x)=-\\sqrt{x}$$ is a reflection of $$f(x)=\\sqrt{x}$$ across the x‑axis. It passes through $$(0,0)$$ and $$(1,-1)$$. Both satisfy $$(g(x))^2 = x$$, but $$g(x)$$ gives the non‑positive root. The notation $$\\sqrt{x}$$ is reserved for the principal (non‑negative) root to keep the square root a function. The complete set of solutions to $$y^2 = x$$ is $$y=\\pm\\sqrt{x}$$, which includes both branches.", "source": "DeepSeek ②", "_id": "deepseek_2_42"}, {"question": "At what point do the graphs of $$y = \\frac{1}{x}$$ and $$y = \\frac{1}{\\sqrt{x}}$$ intersect? For $$x>1$$, which function is larger? (2 steps)", "answer": "- Step 1: Set $$\\frac{1}{x} = \\frac{1}{\\sqrt{x}}$$. Multiplying both sides by $$x\\sqrt{x}$$ gives $$\\sqrt{x} = x$$. Since $$x>0$$, squaring yields $$x = x^2$$, so $$x(x-1)=0$$. The only positive solution is $$x=1$$. Thus the two curves intersect at the single point $$(1,1)$$.\n- Step 2: For $$x>1$$, we have $$\\sqrt{x} < x$$ (since squaring a number >1 makes it larger, so the root is smaller). Taking reciprocals reverses the inequality: $$\\frac{1}{\\sqrt{x}} > \\frac{1}{x}$$. Consequently, for $$x>1$$, the curve $$y=\\frac{1}{\\sqrt{x}}$$ lies **above** the hyperbola $$y=\\frac{1}{x}$$. So the larger function switches at $$x=1$$: below 1 it’s $$\\frac{1}{x}$$, and above 1 it’s $$\\frac{1}{\\sqrt{x}}$$.", "source": "DeepSeek ①", "_id": "deepseek_1_23"}, {"question": "Conceptually, why does the \"burger method\" (cross-multiplying diagonals) work for dividing fractions, such as $$\\frac{a/b}{c/d} = \\frac{ad}{bc}$$, and what does it represent in terms of fraction operations? (2 steps)", "answer": "- Step 1: Dividing by a fraction is mathematically defined as multiplying by its reciprocal. So, $$\\frac{a}{b} \\div \\frac{c}{d}$$ is exactly equivalent to $$\\frac{a}{b} \\times \\frac{d}{c}$$.\n- Step 2: When multiplying two fractions, you multiply the numerators together and the denominators together. The \"outer\" terms $$a$$ and $$d$$ become the new numerator ($$ad$$), and the \"inner\" terms $$b$$ and $$c$$ become the new denominator ($$bc$$). The cross-multiplication visual is just a mnemonic for this standard multiplication of reciprocals.\n\nTakeaway: The burger method is not a new rule; it is a visual shortcut for multiplying by the reciprocal and combining the numerators and denominators.", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "What's the relationship between the percentage change in $$Q$$ and the percentage change in $$P$$ when $$P \\propto \\frac{1}{Q^2}$$? (2 steps)", "answer": "- Step 1: The relationship is **non-linear and asymmetric**: if $$Q$$ increases by $$p\\%$$, then $$P$$ decreases by **more** than $$p\\%$$.\n- Step 2: The exact rule: if $$Q \\to (1 + p/100) Q$$, then $$P \\to \\frac{1}{(1 + p/100)^2} P$$, and the % change in $$P$$ is:\n$$\\%\\Delta P = \\left(\\frac{1}{(1 + p/100)^2} - 1\\right) \\times 100\\%$$\n\nFor $$p = 40$$: $$\\frac{1}{(1.4)^2} = \\frac{25}{49} \\approx 0.51$$, so $$\\%\\Delta P \\approx -49\\%$$.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "After cross-multiplying $$a(3b^2 - 1) = b^2 + 2$$, a student writes $$3ab^2 - b^2 - a + 2 = 0$$. What's wrong with the sign, and why does the alternative approach avoid this error? (2 steps)", "answer": "- Step 1: Expanding gives $$3ab^2 - a = b^2 + 2$$. Moving everything to the left: $$3ab^2 - a - b^2 - 2 = 0$$, i.e., $$3ab^2 - b^2 - a - 2 = 0$$. The student wrote $$+2$$ instead of $$-2$$ — the sign flips when moving $$+2$$ from the right side to the left.\n- Step 2: The alternative approach avoids this entirely: instead of moving everything to one side (which invites sign errors), keep $$b^2$$ terms on the left and constants on the right: $$3ab^2 - b^2 = a + 2$$. This immediately sets up the factorisation $$b^2(3a - 1) = a + 2$$ with no sign ambiguity.\n\nTakeaway: Don't default to \"move everything to one side = 0.\" Instead, group the variable you're solving for on one side and constants on the other.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "A right triangle has sides $$(5+\\sqrt{3})$$ and $$(5-\\sqrt{3})$$. Without fully expanding, what pattern do you notice, and what is the area? (3 steps)", "answer": "- Step 1: The two sides are conjugate surds: $$(5+\\sqrt{3})$$ and $$(5-\\sqrt{3})$$. Their product is a difference of two squares: $$5^2 - (\\sqrt{3})^2 = 25 - 3 = 22$$.\n- Step 2: The area is $$\\frac{1}{2} \\times 22 = 11$$. No surd appears in the final answer because the conjugate pair eliminates the irrational part.\n- Step 3: This illustrates why spotting the difference-of-two-squares pattern is powerful: it bypasses the entire FOIL expansion. When you see $$(a+\\sqrt{b})(a-\\sqrt{b})$$, go straight to $$a^2 - b$$.\n\nConjugate sides in a right triangle always give a rational area. Spot the pattern, skip the expansion.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "For $$0<x<1$$, why is $$\\sqrt{x} > x$$ but for $$x>1$$, $$\\sqrt{x} < x$$? Use the idea of what “square root” does to numbers relative to 1. (2 steps)", "answer": "- Step 1: The number 1 is the fixed point: $$\\sqrt{1}=1$$. For any $$x>0$$, if $$x<1$$, squaring reduces it, so taking the square root (the inverse operation) must increase it to get back to the original $$x$$ – thus $$\\sqrt{x} > x$$.\n- Step 2: If $$x>1$$, squaring enlarges a number, so the square root (being the inverse) shrinks it: $$\\sqrt{x} < x$$. This can be seen as a reflection across the line $$y=x$$; the two curves are symmetric, and the inequality flips at 1.", "source": "DeepSeek ②", "_id": "deepseek_2_38"}, {"question": "Suppose $$P \\propto Q^3$$ instead of $$P \\propto 1/Q^2$$. If $$Q$$ increases by 10%, does $$P$$ increase or decrease, and by approximately what percentage? (2 steps)", "answer": "- Step 1: With $$P = kQ^3$$ and $$Q_{\\text{new}} = 1.1Q$$, we get $$P_{\\text{new}} = k(1.1Q)^3 = 1.1^3 \\times kQ^3 = 1.331 \\times P_{\\text{old}}$$. So $$P$$ increases.\n- Step 2: The percentage change is $$(1.331 - 1) \\times 100\\% = 33.1\\%$$ increase. Notice this is roughly 3 times the original 10% change — because the power is 3, the effect is approximately amplified by that factor for small percentage changes. This is a useful rule of thumb: for $$P \\propto Q^n$$, a small $$p\\%$$ change in $$Q$$ produces roughly $$n \\times p\\%$$ change in $$P$$.\n\nFor direct proportionality with power $$n$$: changes are amplified by factor $$n$$. For inverse proportionality with power $$n$$: changes are amplified and reversed.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Outline a general strategy for finding the largest function among several options on the interval $$0 < x < 1$$. (4 steps)", "answer": "- Step 1: **Compute the range** of each function on $$(0, 1)$$ by checking boundary values (or limits at boundaries).\n- Step 2: **Eliminate** any function whose range is bounded above by 1. These functions can never exceed 1, so they cannot be the largest if any candidate can exceed 1.\n- Step 3: Among the remaining \"unbounded above\" candidates (typically $$\\frac{1}{x}$$, $$\\frac{1}{\\sqrt{x}}$$), the range analysis alone cannot break the tie. **Test one specific value** of $$x$$ (e.g., $$x = \\frac{1}{4}$$) to compare.\n- Step 4: For **monotone** functions, comparing at one point determines the order on the whole interval. So one test value is enough.\n\nThis is the standard recipe for \"which function is largest on $$(0, 1)$$\" questions in ESAT.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "In the similar triangles quadratic, the factor pair that worked was $$2$$ and $$-6$$ because their product is $$-12$$ and sum is $$-4$$. Why does the “sum” need to be $$-4$$ rather than the coefficient $$b$$ (which is $$-4$$) for the factored form $$(x+p)(x+q)=x^2+bx+c$$? (2 steps)", "answer": "- Step 1: When expanding $$(x+p)(x+q)$$ you get $$x^2 + (p+q)x + pq$$. So the coefficient of $$x$$ is the sum $$p+q$$, and the constant term is the product $$pq$$. For $$x^2 - 4x -12$$, $$b=-4$$ and $$c=-12$$, so we need two numbers $$p,q$$ with sum $$-4$$ and product $$-12$$.\n- Step 2: $$2$$ and $$-6$$ indeed sum to $$-4$$. The mistake would be looking for a sum equal to the absolute value (4) or misreading signs. The sign of $$b$$ directly gives the sum with its sign.", "source": "DeepSeek ②", "_id": "deepseek_2_45"}, {"question": "A student argues: \"Since $$\\frac{1}{x}$$ and $$\\frac{1}{\\sqrt{x}}$$ both go to infinity as $$x \\to 0^+$$, they're equally large on $$(0,1)$$.\" Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: Both functions tending to infinity doesn't mean they're equal — infinity is not a number, and functions can approach it at different rates. The question asks which is **larger at any given $$x$$**, not whether they both diverge.\n- Step 2: At every point in $$(0,1)$$, $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$ because $$x < \\sqrt{x}$$ on this interval (smaller denominator = larger fraction). For instance, at $$x = 0.01$$: $$\\frac{1}{x} = 100$$ vs $$\\frac{1}{\\sqrt{x}} = 10$$. The ratio between them grows without bound as $$x \\to 0^+$$.\n\nTakeaway: \"Both go to infinity\" ≠ \"both are equal.\" Rate matters. Compare point-by-point.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "The tutor stressed “Write your working out; don’t use AI; show your thinking.” How does externalising your thought process through writing help build deeper mathematical understanding, even if you make mistakes? (2 steps)", "answer": "- Step 1: Writing forces you to articulate each step, revealing gaps or incorrect assumptions that might stay hidden if you only do mental jumps. It transforms vague ideas into clear logical sequences.\n- Step 2: Mistakes become visible and can be diagnosed. The act of organizing thoughts on paper also consolidates memory and builds stronger mental models. By writing, you are not just computing; you are explaining to yourself, which deepens understanding.", "source": "DeepSeek ②", "_id": "deepseek_2_40"}, {"question": "Why do inverse square relationships (like $$P \\propto \\frac{1}{Q^2}$$) create such dramatic changes when the input variable changes? (3 steps)", "answer": "- Step 1: The inverse square means changes in $$Q$$ get \"squared\" in the denominator, amplifying their effect on $$P$$\n- Step 2: For example, a 40% increase in $$Q$$ becomes a $$(1.4)^2 = 1.96$$ factor in the denominator, making $$P$$ become $$\\frac{1}{1.96} \\approx 0.51$$ of its original value\n+ This $$\\approx 49\\%$$ decrease is larger than the original 40% increase\n+ Small changes in $$Q$$ create disproportionately large changes in $$P$$\n- Step 3: This sensitivity explains why inverse square laws are so important in physics — gravity, electric fields, and light intensity all follow $$\\frac{1}{r^2}$$ patterns\n+ Doubling distance reduces force/intensity to $$\\frac{1}{4}$$ the original value\n+ This creates the rapid falloff we observe with distance in nature\n\nInverse square relationships are nature's way of distributing effects over expanding surfaces (like spheres).", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_23"}, {"question": "How can you tell that two functions are inverses of each other, in two equivalent ways? (2 steps)", "answer": "- Step 1: **Algebraic test:** composing them in either order returns the input. $$f(g(x)) = x$$ **and** $$g(f(x)) = x$$.\n+ Example: $$y = x^2$$ (on $$x \\geq 0$$) and $$y = \\sqrt{x}$$ satisfy $$(\\sqrt{x})^2 = x$$ and $$\\sqrt{x^2} = x$$.\n- Step 2: **Geometric test:** their graphs are reflections of each other across the line $$y = x$$.\n+ Example: reflecting $$y = x^2$$ (right branch) across $$y = x$$ gives $$y = \\sqrt{x}$$.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "If a problem gives you $$P \\propto \\frac{1}{Q^2}$$ and asks \"what is the new value of $$P$$ when $$Q$$ triples?\", why do you not need to know the original value of $$P$$ or the constant $$k$$? (2 steps)", "answer": "- Step 1: The proportional relationship means $$P = k/Q^2$$. When $$Q$$ triples to $$3Q$$, the new value is $$P_{\\text{new}} = k/(3Q)^2 = k/(9Q^2) = \\frac{1}{9} \\cdot k/Q^2 = \\frac{1}{9} P_{\\text{old}}$$.\n- Step 2: The original value of $$P$$ and the constant $$k$$ both appear in the expression $$k/Q^2 = P_{\\text{old}}$$, and they cancel when we form the ratio $$P_{\\text{new}}/P_{\\text{old}} = 1/9$$. We only need the *multiplier* on $$Q$$ (tripling = factor of 3) and the *power* in the relationship (square = power 2) to determine the relative change.\n\nProportional reasoning is about *multipliers*, not absolute values. The constant and original value are irrelevant for relative changes.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Suppose $$P \\propto Q^3$$ and $$Q$$ is halved. What happens to $$P$$ — does it increase or decrease, and by what factor? (2 steps)", "answer": "- Step 1: Since $$P \\propto Q^3$$, we write $$P = kQ^3$$. Halving $$Q$$ means $$Q_{\\text{new}} = \\frac{1}{2}Q$$.\n- Step 2: $$P_{\\text{new}} = k\\left(\\frac{1}{2}Q\\right)^3 = k \\cdot \\frac{1}{8} Q^3 = \\frac{1}{8} P_{\\text{old}}$$. So $$P$$ **decreases** to one-eighth of its original value (an 87.5% decrease). The cube of a half is one-eighth — the power amplifies the reduction.\n\nTakeaway: Direct proportionality with higher powers amplifies changes: halving $$Q$$ doesn't halve $$P$$ — it divides $$P$$ by $$2^3 = 8$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "For the interval $$0 < x < 1$$, what happens to the value of $$x^2$$ compared to $$x$$? How does this differ from what happens when $$x > 1$$? (3 steps)", "answer": "- Step 1: When $$0 < x < 1$$, we have $$x^2 < x$$ because squaring a fraction makes it smaller. For example, $$(\\frac{1}{2})^2 = \\frac{1}{4} < \\frac{1}{2}$$.\n- Step 2: This is the opposite of what happens when $$x > 1$$, where $$x^2 > x$$. For instance, $$2^2 = 4 > 2$$.\n- Step 3: The boundary case is $$x = 1$$, where $$x^2 = x = 1$$. This reversal of behavior at $$x = 1$$ is crucial for understanding function comparisons on fractional intervals.\n\nThe key insight is that standard algebraic operations behave counter-intuitively for numbers between 0 and 1.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_0"}, {"question": "In the context of function behavior on $$(0,1)$$, what is the fundamental reason why reciprocal functions like $$\\frac{1}{x}$$ dominate polynomial functions like $$x^2$$? (2 steps)", "answer": "- Step 1: Polynomial functions with positive exponents make small numbers even smaller ($$x^2 < x$$ when $$0 < x < 1$$), while reciprocal functions make small numbers large ($$\\frac{1}{x} > 1$$ when $$0 < x < 1$$).\n- Step 2: As $$x$$ approaches 0, polynomial functions approach 0, but reciprocal functions approach infinity. This creates entirely different scales of magnitude.\n\nThe reciprocal operation fundamentally inverts the \"smallness\" of fractional inputs into \"largeness\" of outputs.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_17"}, {"question": "Rearrange the formula $$k = \\frac{v^2}{v^2 + 1}$$ to make $$v$$ the subject. Walk through the conceptual steps to isolate $$v^2$$ and then $$v$$. (3 steps)", "answer": "- Step 1: Clear the fraction by multiplying both sides by $$(v^2 + 1)$$, yielding $$k(v^2 + 1) = v^2$$. Expand the left side to get $$kv^2 + k = v^2$$.\n- Step 2: Group the $$v^2$$ terms on one side. Subtract $$kv^2$$ from both sides and subtract $$k$$ from both sides to get $$v^2 - kv^2 = k$$. Factor out $$v^2$$ to get $$v^2(1 - k) = k$$, then divide to isolate $$v^2 = \\frac{k}{1 - k}$$.\n- Step 3: Take the square root of both sides to solve for $$v$$. Remember to include the $$\\pm$$ sign, resulting in $$v = \\pm\\sqrt{\\frac{k}{1 - k}}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_13"}, {"question": "What are the asymptotes of the curve $$y = \\frac{1}{x}$$? (1 step)", "answer": "- Step 1: Two asymptotes:\n+ **Vertical asymptote at $$x = 0$$** (the $$y$$-axis): as $$x \\to 0^+$$, $$\\frac{1}{x} \\to +\\infty$$, so the curve shoots up along the $$y$$-axis but never touches it.\n+ **Horizontal asymptote at $$y = 0$$** (the $$x$$-axis): as $$x \\to +\\infty$$, $$\\frac{1}{x} \\to 0^+$$, so the curve approaches the $$x$$-axis from above but never touches it.\n+ **Anchor point:** the curve passes through $$(1, 1)$$, so both asymptotes are at distance 1 from this point.\n\nA sketch that omits either asymptote is incomplete — asymptotes are essential features of this curve.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "If $$P \\propto Q^2$$ and $$Q$$ is multiplied by $$m$$, what happens to $$P$$? (1 step)", "answer": "- Step 1: $$P_{\\text{new}} = k \\cdot (mQ
