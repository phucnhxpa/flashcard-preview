<script>
const DATA={"selected": [{"question": "What is the geometric transformation that maps the graph of a function $$y = f(x)$$ to its inverse $$y = f^{-1}(x)$$, and why does this specific transformation conceptually achieve the goal of an inverse function? (3 steps)", "answer": "- Step 1: The geometric transformation is a reflection across the line $$y = x$$.\n- Step 2: Conceptually, a function maps an input $$x$$ to an output $$y$$, creating coordinate pairs $$(x, y)$$. The inverse function reverses this process, mapping the original output back to the original input, which means it needs to produce the coordinate pairs $$(y, x)$$.\n- Step 3: In the Cartesian plane, swapping the $$x$$ and $$y$$ coordinates of any point is geometrically equivalent to reflecting that point across the diagonal line $$y = x$$. Therefore, reflecting the entire graph across this line generates the graph of the inverse function.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "A solid sphere of radius $$r$$ fits exactly inside a hollow cylinder that has the same internal diameter and the same length as the sphere's diameter. Why must the cylinder's height be $$2r$$ rather than $$r$$? (3 steps)", "answer": "- Step 1: The diameter of a sphere of radius $$r$$ is $$2r$$. The problem states the cylinder's length (height) equals that diameter, so $$h = 2r$$.\n- Step 2: If you used $$h = r$$, the cylinder would only be as tall as the radius; a sphere of radius $$r$$ would protrude both above and below, making it impossible for the sphere to be contained completely inside.\n- Step 3: Therefore, the correct dimension for a snug‑fitting cylinder is height $$2r$$, leading to cylinder volume $$V_{\\text{cyl}} = \\pi r^2 \\cdot 2r = 2\\pi r^3$$.\n\nThe physical picture prevents misreading “diameter” as “radius”.", "source": "DeepSeek ②", "_id": "deepseek_2_0"}, {"question": "True or False: $$\\sqrt{4} = \\pm 2$$. Explain the \"Principal Root Convention\" and contrast it with solving an equation. (2 steps)", "answer": "- Step 1: False. $$\\sqrt{4} = 2$$ only. The radical symbol $$\\sqrt{\\phantom{x}}$$ inherently denotes the *principal* (positive) square root. Writing $$\\sqrt{4} = -2$$ is mathematically incorrect.\n- Step 2: This is often confused with solving the algebraic equation $$x^2 = 4$$.\n+ When you actively take the square root of both sides of an equation to solve for $$x$$, you must account for both possibilities: $$x = \\pm\\sqrt{4}$$, which simplifies to $$x = \\pm 2$$.\n+ However, the function evaluation of $$\\sqrt{4}$$ itself is strictly positive to ensure it remains a valid, single-valued function.", "source": "Gemini 2.5 ①", "_id": "gemini_1_8"}, {"question": "Using the mental anchor of $$x = \\frac{1}{4}$$, quickly evaluate and compare the values of $$y = x^2$$, $$y = \\sqrt{x}$$, and $$y = \\frac{1}{x}$$ to verify their theoretical ordering for $$0 < x < 1$$. (3 steps)", "answer": "- Step 1: Evaluate the base and square. For $$x = \\frac{1}{4}$$, the base value is $$0.25$$. Squaring it gives $$x^2 = \\left(\\frac{1}{4}\\right)^2 = \\frac{1}{16}$$ (or $$0.0625$$).\n- Step 2: Evaluate the square root. The square root of $$\\frac{1}{4}$$ is $$\\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$ (or $$0.5$$).\n- Step 3: Evaluate the reciprocal and compare. The reciprocal is $$\\frac{1}{1/4} = 4$$. Comparing the results: $$\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2} < 4$$, which perfectly confirms the theoretical ordering $$x^2 < x < \\sqrt{x} < \\frac{1}{x}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "In a large triangle $$ADE$$, a smaller triangle $$ABC$$ is formed inside it by drawing a line $$BC$$ parallel to the base $$DE$$. When setting up the similarity ratio between the sides, what is the most common trap students fall into regarding the side lengths? (2 steps)", "answer": "- Step 1: To use AA similarity, you must relate the *full side lengths* of the small triangle to the corresponding *full side lengths* of the large triangle.\n- Step 2: The trap occurs when students are given the length of the top segment $$AB$$ and the bottom segment $$BD$$. They mistakenly use $$BD$$ in their ratio instead of calculating the full side of the large triangle, which requires addition: $$AD = AB + BD$$.", "source": "Gemini 2.5 ②", "_id": "gemini_2_18"}, {"question": "If a student incorrectly treats $$P \\propto 1/Q$$ instead of $$1/Q^2$$ when $$Q$$ increases by 40%, what percentage decrease would they calculate, and why is it wrong? (2 steps)", "answer": "- Step 1: Under $$P \\propto 1/Q$$, a 40% increase in $$Q$$ gives multiplier $$m = 1.4 = 7/5$$, so $$P_{\\text{new}} = \\frac{1}{1.4} P_{\\text{old}} \\approx 0.714 P_{\\text{old}}$$, corresponding to about a **29% decrease**.\n- Step 2: However, the correct relation is $$P \\propto 1/Q^2$$, which magnifies the effect: the multiplier becomes $$1/1.4^2 = 1/1.96 \\approx 0.51$$, yielding about a **49% decrease**. Squaring the change factor is essential; omitting it underestimates the drop.", "source": "DeepSeek ②", "_id": "deepseek_2_18"}, {"question": "As $$x \\to 0^+$$, how do the behaviours of $$y = \\frac{1}{x}$$ and $$y = \\frac{1}{1+x}$$ diverge, and what does this tell us about their respective ranges on the interval $$(0, 1)$$? (2 steps)", "answer": "- Step 1: Analyze the limits as $$x$$ approaches 0 from the right.\n+ For $$y = \\frac{1}{x}$$, the denominator approaches 0, causing the function to grow without bound ($$y \\to \\infty$$).\n+ For $$y = \\frac{1}{1+x}$$, the denominator approaches $$1 + 0 = 1$$, so the function approaches $$\\frac{1}{1} = 1$$.\n- Step 2: Determine the ranges on $$(0, 1)$$.\n+ Since $$\\frac{1}{x}$$ goes to infinity and equals $$1$$ at $$x=1$$, its range is $$(1, \\infty)$$.\n+ Since $$\\frac{1}{1+x}$$ starts near $$1$$ and decreases to $$\\frac{1}{2}$$ (at $$x=1$$), its range is strictly bounded between $$\\frac{1}{2}$$ and $$1$$.\nThis divergence shows $$\\frac{1}{x}$$ can be arbitrarily large, while $$\\frac{1}{1+x}$$ is always less than 1.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "For a number $$x$$ between $$0$$ and $$1$$ ($$0 < x < 1$$), which is larger: $$x^2$$ or $$x$$? Provide an intuitive reason and an algebraic proof. (2 steps)", "answer": "- Step 1: Intuitively, multiplying a fraction by another fraction smaller than 1 makes the product even smaller. For example, $$0.5 \\times 0.5 = 0.25$$, which is less than $$0.5$$.\n- Step 2: Algebraically, $$x - x^2 = x(1-x)$$. Both $$x$$ and $$(1-x)$$ are positive for $$0<x<1$$, so the difference is positive, meaning $$x > x^2$$. Therefore $$x^2$$ is always the smaller quantity on this interval.\n\nConclusion: $$x^2 < x$$ for $$0<x<1$$.", "source": "DeepSeek ②", "_id": "deepseek_2_6"}, {"question": "For $$0 < x < 1$$, explain conceptually why $$\\frac{1}{x}$$ is always strictly greater than $$\\frac{1}{\\sqrt{x}}$$, using the properties of inequalities and reciprocals. (3 steps)", "answer": "- Step 1: Recall the base inequality. From the properties of fractions between 0 and 1, we know that $$x < \\sqrt{x}$$ (a number is smaller than its square root).\n- Step 2: Apply the reciprocal rule. Taking the reciprocal of both sides of an inequality involving positive numbers flips the direction of the inequality sign.\n- Step 3: Conclude the relationship. Flipping $$x < \\sqrt{x}$$ yields $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$. Conceptually, dividing 1 by a smaller denominator ($$x$$) results in a larger quotient than dividing 1 by a larger denominator ($$\\sqrt{x}$$).", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Why is the inverse of the function $$f(x) = x^2$$ defined strictly as $$f^{-1}(x) = \\sqrt{x}$$ for $$x \\ge 0$$, rather than over all real numbers? (Misconception Probe) (3 steps)", "answer": "- Step 1: For a function to have an inverse, it must be \"one-to-one\" (it must pass the horizontal line test). Each output must come from exactly one unique input.\n- Step 2: The full parabola $$y = x^2$$ is many-to-one. For example, both $$x = 2$$ and $$x = -2$$ map to $$y = 4$$. If you try to reverse this, the \"inverse\" wouldn't know whether to send $$4$$ back to $$2$$ or $$-2$$, thus failing the definition of a function.\n- Step 3: To fix this, mathematicians restrict the domain of $$y = x^2$$ to only $$x \\ge 0$$. When reflected across $$y = x$$, this positive branch perfectly forms the square root function $$y = \\sqrt{x}$$.", "source": "Gemini 2.5 ①", "_id": "gemini_1_7"}, {"question": "Derive the exact volume ratio of a sphere perfectly inscribed inside a cylinder, explaining the geometric constraints that define the cylinder's dimensions. (3 steps)", "answer": "- Step 1: Identify the geometric constraints. For a sphere of radius $$r$$ to fit perfectly inside a cylinder, the cylinder's internal diameter must equal the sphere's diameter ($$2r$$), meaning the cylinder's radius is also $$r$$. Furthermore, the cylinder's height $$h$$ must equal the sphere's diameter, so $$h = 2r$$.\n- Step 2: Formulate the volume expressions. The volume of the sphere is $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$. The volume of the cylinder is $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$.\n- Step 3: Calculate the ratio. Dividing the sphere's volume by the cylinder's volume gives $$\\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3}$$. The $$\\pi r^3$$ terms cancel out early, leaving $$\\frac{4/3}{2} = \\frac{4}{6} = \\frac{2}{3}$$. This is Archimedes' classical result.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "Without calculating the exact volumes, determine the ratio of the *empty space* inside a perfectly enclosing cylinder to the volume of the sphere itself. (2 steps)", "answer": "- Step 1: Recall that the sphere occupies exactly $$\\frac{2}{3}$$ of the cylinder's total volume. Therefore, the empty space must occupy the remaining $$1 - \\frac{2}{3} = \\frac{1}{3}$$ of the cylinder's volume.\n- Step 2: To find the ratio of empty space to the sphere, divide the empty space fraction by the sphere fraction: $$\\frac{1/3}{2/3} = \\frac{1}{2}$$. The empty space is exactly half the volume of the sphere.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "How does the geometric reflection of $$y = x^2$$ across $$y = x$$ to form $$y = \\sqrt{x}$$ visually explain why $$\\sqrt{x} > x$$ for the interval $$0 < x < 1$$? (3 steps)", "answer": "- Step 1: Visualize the graph of $$y = x^2$$ on the interval $$(0, 1)$$.\n+ Because squaring a proper fraction makes it smaller, the $$y$$-values are less than the $$x$$-values.\n+ The curve $$y = x^2$$ bows *downward*, lying strictly below the diagonal line $$y = x$$.\n- Step 2: Apply the geometric reflection across the line $$y = x$$.\n+ Every point on the curve that was below the diagonal is mirrored to a position *above* the diagonal.\n+ The $$x$$ and $$y$$ coordinates of every point are swapped.\n- Step 3: The reflected curve is $$y = \\sqrt{x}$$.\n+ Because it lies strictly above the line $$y = x$$ on this interval, its $$y$$-values are strictly greater than the $$x$$-values.\n+ This visually and geometrically proves that $$\\sqrt{x} > x$$ for $$0 < x < 1$$.", "source": "Qwen 3 ①", "_id": "qwen_1_16"}, {"question": "When multiple-choice questions ask you to compare complex algebraic behaviors over an interval like $$0 < x < 1$$, what is the \"Specific Value Strategy\" and what makes a good test value? (2 steps)", "answer": "- Step 1: The strategy involves picking a single, easy-to-compute number within the interval to break ties between candidate functions that you can't easily visualize.\n- Step 2: A \"good\" test value is a perfect square fraction, such as $$x = \\frac{1}{4}$$.\n+ This avoids surds in your calculations. For example, $$\\sqrt{1/4} = 1/2$$, and $$\\frac{1}{1/4} = 4$$, allowing rapid mental math to confirm that $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.", "source": "Gemini 2.5 ①", "_id": "gemini_1_5"}, {"question": "For the interval $$0 < x < 1$$, qualitatively rank the functions $$y=x^2$$, $$y=x$$, and $$y=\\sqrt{x}$$ from smallest to largest, and explain the conceptual reason for this ordering without using specific numbers. (3 steps)", "answer": "- Step 1: Establish the anchor. The linear function $$y=x$$ serves as the baseline. For any proper fraction (a number between 0 and 1), the value is strictly between 0 and 1.\n- Step 2: Analyze squaring. Multiplying a proper fraction by itself yields a smaller proper fraction (e.g., taking a fraction of a fraction). Therefore, $$x^2 < x$$ on this interval.\n- Step 3: Analyze square rooting. The square root is the inverse operation of squaring. Since squaring makes the number smaller, taking the square root must make the number larger to return to the original value. Therefore, $$\\sqrt{x} > x$$. The final ordering is $$x^2 < x < \\sqrt{x}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "A student claims that the expression $$\\frac{1}{1+x}$$ must be greater than $$1$$ for $$0 < x < 1$$, because taking the reciprocal of a fraction usually results in a number larger than $$1$$. Identify the flaw in this conceptual model. (3 steps)", "answer": "- Step 1: The student is assuming that the entire denominator $$(1+x)$$ is a fraction between $$0$$ and $$1$$.\n- Step 2: However, if $$x$$ is between $$0$$ and $$1$$, adding $$1$$ shifts the denominator's range. The denominator $$(1+x)$$ is actually between $$1$$ and $$2$$.\n- Step 3: Dividing $$1$$ by a number strictly greater than $$1$$ yields a result that is strictly *less* than $$1$$ (specifically, between $$0.5$$ and $$1$$). Therefore, it cannot be the largest function in the group.", "source": "Gemini 2.5 ②", "_id": "gemini_2_4"}, {"question": "If $$P$$ is proportional to $$\\frac{1}{Q^2}$$, written as $$P = \\frac{k}{Q^2}$$, and $$Q$$ is multiplied by a factor $$m$$ (so $$Q_{\\text{new}} = mQ$$), what multiplier applies to $$P$$? (3 steps)", "answer": "- Step 1: Substitute the new $$Q$$: $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{k}{m^2 Q^2}$$.\n- Step 2: Recognize $$\\frac{k}{Q^2}$$ as the original $$P_{\\text{old}}$$, so $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$.\n- Step 3: Hence $$P$$ is scaled by the factor $$\\frac{1}{m^2}$$. If $$Q$$ increases ($$m > 1$$), $$P$$ decreases; if $$Q$$ decreases ($$m < 1$$), $$P$$ increases. The squared relationship makes the response more sensitive than a direct inverse proportion.", "source": "DeepSeek ②", "_id": "deepseek_2_15"}, {"question": "If a student mistakenly assumes the cylinder's height is equal to the sphere's radius ($$h=r$$) rather than its diameter when calculating the inscribed sphere-to-cylinder volume ratio, what impossible mathematical result do they get, and what physical reality does this violate? (2 steps)", "answer": "- Step 1: Calculate the flawed ratio. If $$h=r$$, the cylinder volume becomes $$V_{\\text{cyl}} = \\pi r^2 (r) = \\pi r^3$$. The ratio of the sphere to this flawed cylinder is $$\\frac{\\frac{4}{3}\\pi r^3}{\\pi r^3} = \\frac{4}{3}$$.\n- Step 2: Identify the violation. A ratio of $$\\frac{4}{3}$$ (or $$>1$$) implies the sphere has a larger volume than the cylinder containing it. This violates the physical reality that a contained object must have a strictly smaller volume than its container.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "When calculating the area of a right-angled triangle with surd side lengths via the formula $$A = \\frac{1}{2} \\times \\text{base} \\times \\text{height}$$, why is it strategically better to expand the brackets of the base and height *before* multiplying by $$\\frac{1}{2}$$? (2 steps)", "answer": "- Step 1: Calculating $$(a+\\sqrt{b})(c-\\sqrt{b})$$ requires a careful FOIL expansion to correctly pair and sum the rational numbers and the surds.\n- Step 2: Introducing a fraction like $$\\frac{1}{2}$$ into the brackets *before* expanding forces you to multiply fractions and surds simultaneously. This drastically increases the cognitive load and the likelihood of sign/arithmetic errors. Expanding fully first isolates the messy surd arithmetic from the final scaling step.", "source": "Gemini 2.5 ②", "_id": "gemini_2_19"}, {"question": "Explain the conceptual justification for the \"burger method\" (cross-multiplication) when dividing two fractions, $$\\frac{a/b}{c/d}$$, rather than just treating it as a memorized visual trick. (2 steps)", "answer": "- Step 1: Recognize that dividing by a fraction is mathematically equivalent to multiplying by its reciprocal. Thus, $$\\frac{a}{b} \\div \\frac{c}{d}$$ is fundamentally $$\\frac{a}{b} \\times \\frac{d}{c}$$.\n- Step 2: Apply standard fraction multiplication. When multiplying two fractions, you multiply the numerators together and the denominators together. This yields $$\\frac{a \\times d}{b \\times c}$$. The \"burger\" visual (connecting outer terms $$a$$ and $$d$$, and inner terms $$b$$ and $$c$$) is simply a spatial mnemonic for this exact algebraic sequence.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "As $$x \\to 0^+$$ in the ordering $$x^2,\\; x,\\; \\sqrt{x}$$, which tends to zero fastest and which slowest? How does this compare with the behaviour of the reciprocals $$1/\\sqrt{x}$$ and $$1/x$$? (3 steps)", "answer": "- Step 1: For $$x$$ near 0, $$x^2$$ shrinks the fastest (quadratic in $$x$$), $$x$$ shrinks linearly, and $$\\sqrt{x}$$ shrinks slowest (like $$\\sqrt{x}$$). So $$x^2 < x < \\sqrt{x}$$ still holds but all approach 0.\n- Step 2: The reciprocals blow up: $$1/\\sqrt{x}$$ and $$1/x$$ both tend to infinity, but $$1/x$$ dominates; because $$x < \\sqrt{x}$$, $$1/x > 1/\\sqrt{x}$$ and grows faster.\n- Step 3: Thus the hierarchy remains even in the limit: for tiny $$x$$, the ordering is preserved, with the reciprocals becoming extremely large and $$1/x$$ the largest among all.", "source": "DeepSeek ②", "_id": "deepseek_2_19"}, {"question": "What is the complete ascending chain of inequalities for the values $$1$$, $$x$$, $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{x}$$, and $$\\frac{1}{\\sqrt{x}}$$ when $$0 < x < 1$$? (3 steps)", "answer": "- Step 1: Group the terms that are strictly less than $$1$$. Squaring shrinks the fraction, and rooting grows it, giving us: $$x^2 < x < \\sqrt{x} < 1$$.\n- Step 2: Group the reciprocal terms. Because their denominators are less than $$1$$, their values are pushed strictly greater than $$1$$. Since $$x < \\sqrt{x}$$, their reciprocals flip order: $$1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$.\n- Step 3: Stitching the two halves together across the boundary of $$1$$ yields the full chain: $$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$.", "source": "Gemini 2.5 ②", "_id": "gemini_2_3"}, {"question": "After successfully isolating $$b^2$$ in a rearrangement problem to get $$b^2 = \\frac{a+2}{3a-1}$$, a student takes the square root and writes their final answer as $$b = \\sqrt{\\frac{a+2}{3a-1}}$$. What critical piece is missing and why? (2 steps)", "answer": "- Step 1: The student missed the $$\\pm$$ symbol. The answer should be $$b = \\pm\\sqrt{\\frac{a+2}{3a-1}}$$.\n- Step 2: Whenever you solve an equation by taking the square root of a squared variable (like $$x^2 = k$$), there are two valid algebraic states: the positive root and the negative root. Unless the physical context of the problem (like a physical length) restricts the answer to positive values, both must be stated.", "source": "Gemini 2.5 ②", "_id": "gemini_2_17"}, {"question": "In inverse square proportionality ($$P \\propto \\frac{1}{Q^2}$$), if $$Q$$ increases by a certain percentage, what is the conceptual difference between finding the \"new value of $$P$$\" and the \"percentage change in $$P$$\", and how is the latter calculated from the former? (2 steps)", "answer": "- Step 1: Distinguish the concepts. The \"new value\" is the absolute multiplier applied to the original $$P$$ (e.g., if $$P$$ scales by $$\\frac{25}{49}$$, the new value is $$\\frac{25}{49} P_{\\text{old}}$$). The \"percentage change\" measures the relative difference between the new and old values.\n- Step 2: Calculate the change. To find the percentage change, you subtract 1 (representing the original 100%) from the multiplier, and then multiply by 100%. For example, a multiplier of $$\\frac{25}{49}$$ gives a percentage change of $$\\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\%$$, which represents a decrease.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "At $$x = 1$$, all five quantities $$x^2,\\; x,\\; \\sqrt{x},\\; 1/\\sqrt{x},\\; 1/x$$ equal 1. What does this tell you about the ordering on $$0<x<1$$ versus $$x>1$$? (2 steps)", "answer": "- Step 1: At $$x=1$$, the functions coincide. For $$x<1$$, the inequalities are $$x^2 < x < \\sqrt{x} < 1 < 1/\\sqrt{x} < 1/x$$. For $$x>1$$, the inequalities reverse for the non‑reciprocal ones: $$x^2 > x > \\sqrt{x} > 1$$, and the reciprocal ones become less than 1, with $$1/x < 1/\\sqrt{x} < 1$$, so the full order flips.\n- Step 2: This symmetry around $$x=1$$ occurs because each function’s behavior is mirrored if you replace $$x$$ by $$1/x$$ (reciprocals swap). Understanding this pivot point helps predict how the curves behave on either side of 1.", "source": "DeepSeek ②", "_id": "deepseek_2_20"}, {"question": "Walk through the conceptual steps to find the percentage change in $$P$$ if $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ experiences a $$20\\%$$ increase. (Use simple mental math fractions). (4 steps)", "answer": "- Step 1: A $$20\\%$$ increase means the new $$Q$$ is $$1.2$$ times the old $$Q$$. Convert this multiplier to an exact improper fraction: $$m = \\frac{12}{10} = \\frac{6}{5}$$.\n- Step 2: Because the relationship is an inverse square, the new $$P$$ will be multiplied by $$\\frac{1}{m^2}$$.\n- Step 3: Calculate the multiplier for $$P$$.\n+ $$\\frac{1}{(6/5)^2} = \\frac{1}{36/25} = \\frac{25}{36}$$\n- Step 4: Calculate the percentage change using $$(\\text{Multiplier} - 1) \\times 100\\%$$.\n+ $$\\left(\\frac{25}{36} - 1\\right) \\times 100\\% = -\\frac{11}{36} \\times 100\\%$$. The negative sign indicates an $$11/36$$ percentage decrease.", "source": "Gemini 2.5 ②", "_id": "gemini_2_15"}, {"question": "When calculating percentage changes in proportionality problems (e.g., $$Q$$ increases by 40%), why is it conceptually and practically advantageous to use exact fractions (like $$\\frac{7}{5}$$) rather than decimals (like $$1.4$$)? (2 steps)", "answer": "- Step 1: Avoid rounding errors. Decimals like $$1.4$$ squared become $$1.96$$. Finding the reciprocal $$\\frac{1}{1.96}$$ results in a non-terminating decimal ($$0.510204...$$), which forces premature rounding and can lead to selecting the wrong multiple-choice option.\n- Step 2: Preserve exactness for clean subtraction. Using the exact fraction $$\\frac{7}{5}$$ squared gives $$\\frac{49}{25}$$. The reciprocal is exactly $$\\frac{25}{49}$$. Subtracting 1 yields exactly $$-\\frac{24}{49}$$, which can be accurately estimated or converted to a percentage without losing precision in the intermediate steps.", "source": "Qwen 3 ②", "_id": "qwen_2_10"}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is doubled, use mental math to determine the exact fractional multiplier for the new value of $$P$$, and then state the exact percentage decrease. (3 steps)", "answer": "- Step 1: Identify the scaling factor. Doubling $$Q$$ means the scaling factor is $$m = 2$$.\n- Step 2: Apply the inverse square rule. The new value of $$P$$ is scaled by $$\\frac{1}{m^2} = \\frac{1}{2^2} = \\frac{1}{4}$$. Thus, the new value is $$\\frac{1}{4}$$ of the original.\n- Step 3: Calculate the percentage decrease. A multiplier of $$\\frac{1}{4}$$ means $$P$$ retains 25% of its original value. The decrease is $$100\\% - 25\\% = 75\\%$$.", "source": "Qwen 3 ②", "_id": "qwen_2_13"}, {"question": "For $$0 < x < 1$$, how does $$\\sqrt{x}$$ compare with $$x$$? Use a simple numeric example and the squaring trick. (3 steps)", "answer": "- Step 1: A numeric check: take $$x = 0.25$$; $$\\sqrt{0.25} = 0.5 > 0.25$$, so $$\\sqrt{x} > x$$.\n- Step 2: More formally, suppose $$\\sqrt{x} \\le x$$; squaring both sides (both non‑negative) gives $$x \\le x^2$$, which contradicts the known fact that $$x > x^2$$ for $$0<x<1$$. Hence $$\\sqrt{x} > x$$ must hold.\n- Step 3: Because both are less than 1, the ordering becomes $$x^2 < x < \\sqrt{x} < 1$$.", "source": "DeepSeek ②", "_id": "deepseek_2_7"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Conceptually derive the ratio of the volume of a sphere to the volume of a cylinder that perfectly encloses it (where the cylinder's height and diameter equal the sphere's diameter), explaining the cancellation of common terms. (4 steps)", "answer": "- Step 1: Identify the dimensions of both shapes in terms of the sphere's radius $$r$$. The sphere has radius $$r$$. The enclosing cylinder must have an internal radius of $$r$$ and a height equal to the sphere's diameter, so $$h = 2r$$.\n- Step 2: Write the volume formulas for both shapes. The volume of the sphere is $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$. The volume of the cylinder is $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$.\n- Step 3: Set up the ratio and cancel the common geometric scaling factor $$\\pi r^3$$. This leaves $$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}} = \\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3} = \\frac{4/3}{2}$$.\n- Step 4: Simplify the remaining numerical fraction (using the \"burger method\" or standard division) to get $$\\frac{4}{3} \\times \\frac{1}{2} = \\frac{4}{6} = \\frac{2}{3}$$. This is Archimedes' classical result.\n\nTakeaway: The ratio is purely a numerical constant ($$\\frac{2}{3}$$) independent of the sphere's actual size.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "If a student mistakenly uses the sphere's radius $$r$$ as the cylinder's height instead of its diameter $$2r$$ when calculating the volume fraction, what impossible physical result do they get, and why does this serve as a vital sanity check?", "answer": "If the height is incorrectly set to $$h = r$$, the cylinder's volume becomes $$V_{\\text{cyl}} = \\pi r^2(r) = \\pi r^3$$. The calculated fraction would then be $$\\frac{\\frac{4}{3}\\pi r^3}{\\pi r^3} = \\frac{4}{3}$$. Since a fraction representing a part of a whole cannot exceed $$1$$ (the sphere cannot take up more physical space than the container holding it), getting $$\\frac{4}{3}$$ immediately flags a dimensional error in the setup.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Without calculating the exact volumes, determine the ratio of the *empty space* inside a perfectly enclosing cylinder to the volume of the sphere itself. (2 steps)", "answer": "- Step 1: Recall that the sphere occupies exactly $$\\frac{2}{3}$$ of the cylinder's total volume. Therefore, the empty space must occupy the remaining $$1 - \\frac{2}{3} = \\frac{1}{3}$$ of the cylinder's volume.\n- Step 2: To find the ratio of empty space to the sphere, divide the empty space fraction by the sphere fraction: $$\\frac{1/3}{2/3} = \\frac{1}{2}$$. The empty space is exactly half the volume of the sphere.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Explain the conceptual justification for the \"burger method\" of dividing fractions, specifically why $$\\frac{a/b}{c/d}$$ simplifies to $$\\frac{ad}{bc}$$. (3 steps)", "answer": "- Step 1: Recognize that dividing by a fraction is mathematically equivalent to multiplying by its reciprocal. Thus, $$\\frac{a/b}{c/d}$$ is exactly the same as $$\\frac{a}{b} \\div \\frac{c}{d}$$.\n- Step 2: Apply the reciprocal rule for division: dividing by $$\\frac{c}{d}$$ means multiplying by $$\\frac{d}{c}$$. The expression becomes $$\\frac{a}{b} \\times \\frac{d}{c}$$.\n- Step 3: Multiply the numerators together and the denominators together. The numerator becomes $$a \\times d = ad$$ (the \"outer\" terms or \"buns\"), and the denominator becomes $$b \\times c = bc$$ (the \"inner\" terms or \"filling\"), yielding $$\\frac{ad}{bc}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "When applying the burger method to divide a fraction by a whole number, such as $$\\frac{a/b}{c}$$, what common visual error do students make, and what is the correct conceptual setup to avoid it? (2 steps)", "answer": "- Step 1: The common error is treating the whole number $$c$$ as just $$c$$ and incorrectly \"cross-multiplying\" it with the numerator $$a$$, or placing it in the numerator.\n+ This happens because the visual \"cross\" of the burger method implicitly requires four terms (two numerators, two denominators).\n+ Students might wrongly write $$\\frac{a \\times c}{b}$$ or $$\\frac{a}{b \\times 1}$$.\n- Step 2: The correct setup is to explicitly write the whole number as a fraction over 1: $$\\frac{c}{1}$$.\n+ Now the expression is $$\\frac{a/b}{c/1}$$.\n+ Applying the burger method correctly gives $$\\frac{a \\times 1}{b \\times c} = \\frac{a}{bc}$$. The whole number always multiplies the denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Use the conceptual burger method to mentally evaluate the expression $$\\frac{3/4}{2}$$. (2 steps)", "answer": "- Step 1: Rewrite the whole number $$2$$ as the fraction $$\\frac{2}{1}$$, making the expression $$\\frac{3/4}{2/1}$$.\n- Step 2: Apply the burger method (multiply outers, multiply inners): the numerator is $$3 \\times 1 = 3$$, and the denominator is $$4 \\times 2 = 8$$. The result is $$\\frac{3}{8}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "For the interval $$0 < x < 1$$, explain intuitively why the ordering $$x^2 < x < \\sqrt{x}$$ holds true, without relying on calculus or plugging in specific numbers. (3 steps)", "answer": "- Step 1: Consider the base value $$x$$, which is a proper fraction (between 0 and 1).\n- Step 2: Squaring a proper fraction ($$x^2 = x \\times x$$) means multiplying it by a number less than 1, which inherently scales it down, making it strictly smaller than the original $$x$$. Thus, $$x^2 < x$$.\n- Step 3: Taking the square root ($$\\sqrt{x}$$) asks \"what number, when multiplied by itself, gives $$x$$?\" Since multiplying two proper fractions makes them smaller, the original root must have been larger than the result $$x$$. Thus, $$\\sqrt{x} > x$$. Combining these gives $$x^2 < x < \\sqrt{x}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is $$\\frac{1}{x}$$ strictly greater than $$\\frac{1}{\\sqrt{x}}$$ for all $$x$$ in the interval $$(0, 1)$$? Explain this using the relationship between their denominators. (2 steps)", "answer": "- Step 1: Establish the relationship between the denominators. As proven previously, for $$0 < x < 1$$, the square root of a fraction is larger than the fraction itself, meaning $$\\sqrt{x} > x$$.\n- Step 2: Apply the rule of reciprocals: when comparing two positive fractions with the same numerator (1), the one with the *smaller* denominator is the *larger* fraction. Since $$x < \\sqrt{x}$$, it strictly follows that $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "As $$x \\to 0^+$$, how do the behaviours of $$y = \\frac{1}{x}$$ and $$y = \\frac{1}{1+x}$$ diverge, and what does this tell us about their respective ranges on the interval $$(0, 1)$$? (2 steps)", "answer": "- Step 1: Analyze the limits as $$x$$ approaches 0 from the right.\n+ For $$y = \\frac{1}{x}$$, the denominator approaches 0, causing the function to grow without bound ($$y \\to \\infty$$).\n+ For $$y = \\frac{1}{1+x}$$, the denominator approaches $$1 + 0 = 1$$, so the function approaches $$\\frac{1}{1} = 1$$.\n- Step 2: Determine the ranges on $$(0, 1)$$.\n+ Since $$\\frac{1}{x}$$ goes to infinity and equals $$1$$ at $$x=1$$, its range is $$(1, \\infty)$$.\n+ Since $$\\frac{1}{1+x}$$ starts near $$1$$ and decreases to $$\\frac{1}{2}$$ (at $$x=1$$), its range is strictly bounded between $$\\frac{1}{2}$$ and $$1$$.\nThis divergence shows $$\\frac{1}{x}$$ can be arbitrarily large, while $$\\frac{1}{1+x}$$ is always less than 1.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "Mentally rank the following four values from smallest to largest for $$x = 0.01$$: $$x^2$$, $$\\sqrt{x}$$, $$\\frac{1}{\\sqrt{x}}$$, and $$\\frac{1}{x}$$. (2 steps)", "answer": "- Step 1: Evaluate the base and its direct transformations. $$x = 0.01$$. Squaring it gives $$x^2 = 0.0001$$. The square root is $$\\sqrt{0.01} = 0.1$$. So far: $$0.0001 < 0.01 < 0.1$$, meaning $$x^2 < x < \\sqrt{x}$$.\n- Step 2: Evaluate the reciprocals. $$\\frac{1}{\\sqrt{x}} = \\frac{1}{0.1} = 10$$. $$\\frac{1}{x} = \\frac{1}{0.01} = 100$$. Combining all parts yields the final order: $$x^2 < \\sqrt{x} < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$ (or $$0.0001 < 0.1 < 10 < 100$$).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "What is the geometric transformation that maps the graph of a function $$y = f(x)$$ to its inverse $$y = f^{-1}(x)$$, and why does this specific transformation conceptually achieve the goal of an inverse function? (3 steps)", "answer": "- Step 1: The geometric transformation is a reflection across the line $$y = x$$.\n- Step 2: Conceptually, a function maps an input $$x$$ to an output $$y$$, creating coordinate pairs $$(x, y)$$. The inverse function reverses this process, mapping the original output back to the original input, which means it needs to produce the coordinate pairs $$(y, x)$$.\n- Step 3: In the Cartesian plane, swapping the $$x$$ and $$y$$ coordinates of any point is geometrically equivalent to reflecting that point across the diagonal line $$y = x$$. Therefore, reflecting the entire graph across this line generates the graph of the inverse function.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "Why is the statement \"$$\\sqrt{4} = \\pm 2$$\" mathematically incorrect in the context of functions, and how does the concept of the \"principal root\" resolve the issue of $$y = x^2$$ not being one-to-one? (3 steps)", "answer": "- Step 1: By definition, a mathematical function must map each input to exactly *one* output (it must pass the vertical line test). If $$\\sqrt{4}$$ could be both $$2$$ and $$-2$$, it would not be a function.\n- Step 2: The original function $$f(x) = x^2$$ is not one-to-one because both $$x = 2$$ and $$x = -2$$ map to $$y = 4$$. To create a valid inverse, we must restrict the domain of $$f(x)$$ so it passes the horizontal line test.\n+ We conventionally restrict the domain of $$x^2$$ to $$x \\ge 0$$.\n+ This restricted function is now one-to-one and passes the horizontal line test.\n- Step 3: The inverse of this restricted function is the \"principal (positive) square root\", denoted by $$\\sqrt{x}$$. Thus, $$\\sqrt{4}$$ strictly equals $$2$$. The negative solution only appears when solving the *equation* $$x^2 = 4$$, yielding $$x = \\pm\\sqrt{4} = \\pm 2$$.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "If the point $$(a, b)$$ lies on the curve $$y = x^2$$ (restricted to $$x \\ge 0$$), what specific point must lie on the curve $$y = \\sqrt{x}$$, and what is the conceptual reason for this?", "answer": "The point $$(b, a)$$ must lie on the curve $$y = \\sqrt{x}$$. Conceptually, if $$f(a) = b$$ (meaning $$a^2 = b$$), then the inverse function must reverse this operation, meaning $$f^{-1}(b) = a$$ (or $$\\sqrt{b} = a$$). Geometrically, this is the reflection of the point $$(a, b)$$ across the line $$y = x$$.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "If two variables are related by $$P \\propto \\frac{1}{Q^2}$$, and $$Q$$ is multiplied by a scaling factor $$m$$, derive the exact multiplier for the new value of $$P$$ in terms of $$m$$. (3 steps)", "answer": "- Step 1: Convert the proportionality into an equation using a constant of proportionality $$k$$: $$P_{\\text{old}} = \\frac{k}{Q^2}$$.\n- Step 2: Substitute the new value of $$Q$$, which is $$mQ$$, into the equation to find $$P_{\\text{new}}$$: $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{k}{m^2 Q^2}$$.\n- Step 3: Separate the scaling factor from the original expression: $$P_{\\text{new}} = \\frac{1}{m^2} \\times \\left(\\frac{k}{Q^2}\\right)$$. Since $$\\frac{k}{Q^2} = P_{\\text{old}}$$, we get $$P_{\\text{new}} = \\frac{1}{m^2} P_{\\text{old}}$$. The exact multiplier is $$\\frac{1}{m^2}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "When calculating the percentage change in $$P$$ after a $$40\\%$$ increase in $$Q$$ (where $$P \\propto 1/Q^2$$), why is it conceptually and computationally superior to use the exact fraction $$\\frac{7}{5}$$ rather than the decimal $$1.4$$? (2 steps)", "answer": "- Step 1: Using the exact fraction $$m = \\frac{7}{5}$$ allows for precise algebraic squaring: $$m^2 = \\left(\\frac{7}{5}\\right)^2 = \\frac{49}{25}$$.\n+ The new proportion is exactly the reciprocal: $$\\frac{25}{49}$$.\n+ The percentage change is exactly $$1 - \\frac{25}{49} = \\frac{24}{49}$$, which is roughly $$49\\%$$.\n- Step 2: Using the decimal $$1.4$$ requires calculating $$1.4^2 = 1.96$$, and then performing the division $$\\frac{1}{1.96}$$.\n+ This results in a non-terminating decimal ($$0.510204...$$).\n+ This invites premature rounding errors and obscures the exact rational relationship between the old and new states.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is doubled (a $$100\\%$$ increase), what is the exact percentage change in $$P$$? Walk through the mental math using the scaling factor. (2 steps)", "answer": "- Step 1: Identify the scaling factor for $$Q$$. Doubling means $$m = 2$$. Apply the inverse-square multiplier to $$P$$: the new value is multiplied by $$\\frac{1}{m^2} = \\frac{1}{2^2} = \\frac{1}{4}$$.\n- Step 2: Calculate the percentage change. Since $$P$$ is now $$\\frac{1}{4}$$ (or $$25\\%$$) of its original value, it has decreased by $$100\\% - 25\\% = 75\\%$$. The exact percentage change is a $$75\\%$$ decrease.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How does the geometric reflection of $$y = x^2$$ across $$y = x$$ to form $$y = \\sqrt{x}$$ visually explain why $$\\sqrt{x} > x$$ for the interval $$0 < x < 1$$? (3 steps)", "answer": "- Step 1: Visualize the graph of $$y = x^2$$ on the interval $$(0, 1)$$.\n+ Because squaring a proper fraction makes it smaller, the $$y$$-values are less than the $$x$$-values.\n+ The curve $$y = x^2$$ bows *downward*, lying strictly below the diagonal line $$y = x$$.\n- Step 2: Apply the geometric reflection across the line $$y = x$$.\n+ Every point on the curve that was below the diagonal is mirrored to a position *above* the diagonal.\n+ The $$x$$ and $$y$$ coordinates of every point are swapped.\n- Step 3: The reflected curve is $$y = \\sqrt{x}$$.\n+ Because it lies strictly above the line $$y = x$$ on this interval, its $$y$$-values are strictly greater than the $$x$$-values.\n+ This visually and geometrically proves that $$\\sqrt{x} > x$$ for $$0 < x < 1$$.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": true}, {"question": "In the context of the sphere-in-cylinder problem, how does the \"burger method\" conceptually simplify the evaluation of the volume ratio $$\\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3}$$ without getting bogged down in complex arithmetic? (2 steps)", "answer": "- Step 1: First, apply the conceptual rule of cancelling common scaling factors. The $$\\pi r^3$$ terms represent the geometric scaling and cancel out entirely, reducing the complex expression to the purely numerical fraction $$\\frac{4/3}{2}$$.\n- Step 2: Apply the burger method to $$\\frac{4/3}{2/1}$$. Multiply the outers ($$4 \\times 1 = 4$$) and the inners ($$3 \\times 2 = 6$$) to instantly get $$\\frac{4}{6}$$, which simplifies to $$\\frac{2}{3}$$. This bypasses the need to multiply by reciprocals in a multi-step written format.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}], "count": 18}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Derive the exact volume ratio of a sphere perfectly inscribed inside a cylinder, explaining the geometric constraints that define the cylinder's dimensions. (3 steps)", "answer": "- Step 1: Identify the geometric constraints. For a sphere of radius $$r$$ to fit perfectly inside a cylinder, the cylinder's internal diameter must equal the sphere's diameter ($$2r$$), meaning the cylinder's radius is also $$r$$. Furthermore, the cylinder's height $$h$$ must equal the sphere's diameter, so $$h = 2r$$.\n- Step 2: Formulate the volume expressions. The volume of the sphere is $$V_{\\text{sphere}} = \\frac{4}{3}\\pi r^3$$. The volume of the cylinder is $$V_{\\text{cyl}} = \\pi r^2 h = \\pi r^2 (2r) = 2\\pi r^3$$.\n- Step 3: Calculate the ratio. Dividing the sphere's volume by the cylinder's volume gives $$\\frac{\\frac{4}{3}\\pi r^3}{2\\pi r^3}$$. The $$\\pi r^3$$ terms cancel out early, leaving $$\\frac{4/3}{2} = \\frac{4}{6} = \\frac{2}{3}$$. This is Archimedes' classical result.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "If a student mistakenly assumes the cylinder's height is equal to the sphere's radius ($$h=r$$) rather than its diameter when calculating the inscribed sphere-to-cylinder volume ratio, what impossible mathematical result do they get, and what physical reality does this violate? (2 steps)", "answer": "- Step 1: Calculate the flawed ratio. If $$h=r$$, the cylinder volume becomes $$V_{\\text{cyl}} = \\pi r^2 (r) = \\pi r^3$$. The ratio of the sphere to this flawed cylinder is $$\\frac{\\frac{4}{3}\\pi r^3}{\\pi r^3} = \\frac{4}{3}$$.\n- Step 2: Identify the violation. A ratio of $$\\frac{4}{3}$$ (or $$>1$$) implies the sphere has a larger volume than the cylinder containing it. This violates the physical reality that a contained object must have a strictly smaller volume than its container.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Explain the conceptual justification for the \"burger method\" (cross-multiplication) when dividing two fractions, $$\\frac{a/b}{c/d}$$, rather than just treating it as a memorized visual trick. (2 steps)", "answer": "- Step 1: Recognize that dividing by a fraction is mathematically equivalent to multiplying by its reciprocal. Thus, $$\\frac{a}{b} \\div \\frac{c}{d}$$ is fundamentally $$\\frac{a}{b} \\times \\frac{d}{c}$$.\n- Step 2: Apply standard fraction multiplication. When multiplying two fractions, you multiply the numerators together and the denominators together. This yields $$\\frac{a \\times d}{b \\times c}$$. The \"burger\" visual (connecting outer terms $$a$$ and $$d$$, and inner terms $$b$$ and $$c$$) is simply a spatial mnemonic for this exact algebraic sequence.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "How does the \"burger method\" adapt conceptually when dividing a fraction by a whole number (e.g., $$\\frac{a/b}{c}$$), and why does the denominator become a product? (2 steps)", "answer": "- Step 1: Recontextualize the whole number. Any whole number $$c$$ can be written as a fraction with a denominator of 1, i.e., $$\\frac{c}{1}$$. The expression becomes $$\\frac{a/b}{c/1}$$.\n- Step 2: Apply the standard rule. Using the reciprocal method, this is $$\\frac{a}{b} \\times \\frac{1}{c} = \\frac{a \\times 1}{b \\times c} = \\frac{a}{bc}$$. The denominator becomes a product because you are effectively scaling the original denominator $$b$$ by the whole number $$c$$, making the fractional pieces $$c$$ times smaller.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For the interval $$0 < x < 1$$, qualitatively rank the functions $$y=x^2$$, $$y=x$$, and $$y=\\sqrt{x}$$ from smallest to largest, and explain the conceptual reason for this ordering without using specific numbers. (3 steps)", "answer": "- Step 1: Establish the anchor. The linear function $$y=x$$ serves as the baseline. For any proper fraction (a number between 0 and 1), the value is strictly between 0 and 1.\n- Step 2: Analyze squaring. Multiplying a proper fraction by itself yields a smaller proper fraction (e.g., taking a fraction of a fraction). Therefore, $$x^2 < x$$ on this interval.\n- Step 3: Analyze square rooting. The square root is the inverse operation of squaring. Since squaring makes the number smaller, taking the square root must make the number larger to return to the original value. Therefore, $$\\sqrt{x} > x$$. The final ordering is $$x^2 < x < \\sqrt{x}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "For $$0 < x < 1$$, explain conceptually why $$\\frac{1}{x}$$ is always strictly greater than $$\\frac{1}{\\sqrt{x}}$$, using the properties of inequalities and reciprocals. (3 steps)", "answer": "- Step 1: Recall the base inequality. From the properties of fractions between 0 and 1, we know that $$x < \\sqrt{x}$$ (a number is smaller than its square root).\n- Step 2: Apply the reciprocal rule. Taking the reciprocal of both sides of an inequality involving positive numbers flips the direction of the inequality sign.\n- Step 3: Conclude the relationship. Flipping $$x < \\sqrt{x}$$ yields $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$. Conceptually, dividing 1 by a smaller denominator ($$x$$) results in a larger quotient than dividing 1 by a larger denominator ($$\\sqrt{x}$$).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "Why is the function $$y = \\frac{1}{1+x}$$ always strictly less than 1 for all $$x > 0$$, and what common misconception leads students to think it might be greater than 1? (2 steps)", "answer": "- Step 1: Analyze the denominator. For any $$x > 0$$, the denominator $$(1+x)$$ is strictly greater than 1. When the numerator is 1 and the denominator is greater than 1, the resulting fraction is a proper fraction, meaning it is strictly less than 1.\n- Step 2: Address the misconception. Students often see the \"1\" in the numerator and the \"1\" in the denominator and incorrectly assume the value hovers around or above 1, or they confuse the behavior with $$\\frac{1}{x}$$ (which is $$>1$$ for $$0<x<1$$). The crucial distinction is the \"$$+1$$\" in the denominator, which permanently shifts the denominator above 1, capping the function's maximum value at 1 (when $$x=0$$).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Geometrically, how is the graph of $$y = \\sqrt{x}$$ derived from $$y = x^2$$, and why must the negative branch of the parabola be excluded to form a valid inverse function? (3 steps)", "answer": "- Step 1: Geometric derivation. The inverse of a function is found by reflecting its graph across the line $$y = x$$. This swaps the $$x$$ and $$y$$ coordinates of every point on the curve.\n- Step 2: The one-to-one requirement. For a relation to be a valid mathematical function, it must pass the vertical line test (each input $$x$$ maps to exactly one output $$y$$). The full parabola $$y=x^2$$ fails the horizontal line test, meaning its reflection would fail the vertical line test.\n- Step 3: Domain restriction. To fix this, we restrict the domain of $$y=x^2$$ to $$x \\geq 0$$ (the right half of the parabola). Reflecting only this positive branch across $$y=x$$ yields the principal square root function $$y=\\sqrt{x}$$, which only outputs non-negative values. Thus, $$\\sqrt{4} = 2$$, not $$\\pm 2$$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "If a variable $$P$$ is inversely proportional to the square of $$Q$$ ($$P \\propto \\frac{1}{Q^2}$$), conceptually explain what happens to the value of $$P$$ if $$Q$$ is scaled by a factor of $$m$$. (2 steps)", "answer": "- Step 1: Express the scaling algebraically. The relationship is $$P = \\frac{k}{Q^2}$$. If $$Q$$ becomes $$mQ$$, the new value is $$P_{\\text{new}} = \\frac{k}{(mQ)^2} = \\frac{k}{m^2 Q^2}$$.\n- Step 2: Relate to the original value. We can factor out the $$\\frac{1}{m^2}$$ to get $$P_{\\text{new}} = \\frac{1}{m^2} \\left(\\frac{k}{Q^2}\\right) = \\frac{1}{m^2} P_{\\text{old}}$$. Conceptually, scaling the input by $$m$$ scales the output by the inverse square of that factor, $$\\frac{1}{m^2}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "In inverse square proportionality ($$P \\propto \\frac{1}{Q^2}$$), if $$Q$$ increases by a certain percentage, what is the conceptual difference between finding the \"new value of $$P$$\" and the \"percentage change in $$P$$\", and how is the latter calculated from the former? (2 steps)", "answer": "- Step 1: Distinguish the concepts. The \"new value\" is the absolute multiplier applied to the original $$P$$ (e.g., if $$P$$ scales by $$\\frac{25}{49}$$, the new value is $$\\frac{25}{49} P_{\\text{old}}$$). The \"percentage change\" measures the relative difference between the new and old values.\n- Step 2: Calculate the change. To find the percentage change, you subtract 1 (representing the original 100%) from the multiplier, and then multiply by 100%. For example, a multiplier of $$\\frac{25}{49}$$ gives a percentage change of $$\\left(\\frac{25}{49} - 1\\right) \\times 100\\% = -\\frac{24}{49} \\times 100\\%$$, which represents a decrease.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "When calculating percentage changes in proportionality problems (e.g., $$Q$$ increases by 40%), why is it conceptually and practically advantageous to use exact fractions (like $$\\frac{7}{5}$$) rather than decimals (like $$1.4$$)? (2 steps)", "answer": "- Step 1: Avoid rounding errors. Decimals like $$1.4$$ squared become $$1.96$$. Finding the reciprocal $$\\frac{1}{1.96}$$ results in a non-terminating decimal ($$0.510204...$$), which forces premature rounding and can lead to selecting the wrong multiple-choice option.\n- Step 2: Preserve exactness for clean subtraction. Using the exact fraction $$\\frac{7}{5}$$ squared gives $$\\frac{49}{25}$$. The reciprocal is exactly $$\\frac{25}{49}$$. Subtracting 1 yields exactly $$-\\frac{24}{49}$$, which can be accurately estimated or converted to a percentage without losing precision in the intermediate steps.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": true}, {"question": "Without calculating specific numerical values, synthesize the rules of function behavior for $$0 < x < 1$$ to rank the following four expressions from strictly smallest to strictly largest: $$x^2$$, $$x$$, $$\\frac{1}{\\sqrt{x}}$$, and $$\\frac{1}{x}$$. (4 steps)", "answer": "- Step 1: Establish the baseline. The linear term $$x$$ is a proper fraction (between 0 and 1). Squaring it makes it smaller, so $$x^2 < x$$. Both are strictly less than 1.\n- Step 2: Analyze the reciprocals. Both $$\\frac{1}{\\sqrt{x}}$$ and $$\\frac{1}{x}$$ have numerators of 1 and denominators less than 1, meaning both evaluate to strictly greater than 1.\n- Step 3: Order the greater-than-1 group. Since $$x < \\sqrt{x}$$ for proper fractions, taking the reciprocal flips the inequality, making $$\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$$.\n- Step 4: Combine the groups. The sub-1 group ($$x^2$$ and $$x$$) is strictly smaller than the greater-than-1 group ($$\\frac{1}{\\sqrt{x}}$$ and $$\\frac{1}{x}$$). The final strict ordering is $$x^2 < x < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Using the mental anchor of $$x = \\frac{1}{4}$$, quickly evaluate and compare the values of $$y = x^2$$, $$y = \\sqrt{x}$$, and $$y = \\frac{1}{x}$$ to verify their theoretical ordering for $$0 < x < 1$$. (3 steps)", "answer": "- Step 1: Evaluate the base and square. For $$x = \\frac{1}{4}$$, the base value is $$0.25$$. Squaring it gives $$x^2 = \\left(\\frac{1}{4}\\right)^2 = \\frac{1}{16}$$ (or $$0.0625$$).\n- Step 2: Evaluate the square root. The square root of $$\\frac{1}{4}$$ is $$\\sqrt{\\frac{1}{4}} = \\frac{1}{2}$$ (or $$0.5$$).\n- Step 3: Evaluate the reciprocal and compare. The reciprocal is $$\\frac{1}{1/4} = 4$$. Comparing the results: $$\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2} < 4$$, which perfectly confirms the theoretical ordering $$x^2 < x < \\sqrt{x} < \\frac{1}{x}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "If $$P \\propto \\frac{1}{Q^2}$$ and $$Q$$ is doubled, use mental math to determine the exact fractional multiplier for the new value of $$P$$, and then state the exact percentage decrease. (3 steps)", "answer": "- Step 1: Identify the scaling factor. Doubling $$Q$$ means the scaling factor is $$m = 2$$.\n- Step 2: Apply the inverse square rule. The new value of $$P$$ is scaled by $$\\frac{1}{m^2} = \\frac{1}{2^2} = \\frac{1}{4}$$. Thus, the new value is $$\\frac{1}{4}$$ of the original.\n- Step 3: Calculate the percentage decrease. A multiplier of $$\\frac{1}{4}$$ means $$P$$ retains 25% of its original value. The decrease is $$100\\% - 25\\% = 75\\%$$.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": true}, {"question": "Conceptually, why does reflecting the graph of $$y = x^2$$ across the line $$y = x$$ yield the inverse function, and what does this geometric transformation do to the coordinates of any given point? (2 steps)", "answer": "- Step 1: Understand the definition of an inverse. An inverse function reverses the mapping of the original function. If the original function maps an input $$x$$ to an output $$y$$, the inverse must map that output $$y$$ back to the original input $$x$$.\n- Step 2: Apply the geometric transformation. Reflecting a point $$(a, b)$$ across the line $$y = x$$ swaps its coordinates, resulting in the point $$(b, a)$$. This perfectly mirrors the algebraic requirement of swapping the input and output variables, thereby generating the graph of the inverse function.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}}, "meta": {}};
const SK='esat_30may_llm';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
