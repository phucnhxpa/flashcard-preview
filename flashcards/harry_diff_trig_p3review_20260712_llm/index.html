60px}.hdr h1{font-size:26px}.cd{padding:14px}.ctrl{padding:10px}}</style></head><body><main class="ctr"><header class="hdr"><h1>Harry Maths — differentiation, trigonometry + P3 review</h1><p class="sub">12 July 2026 · curated standalone recall</p><span class="bdg">✓ Independently audited curated deck · 101 cards</span></header><section class="ctrl"><button class="bl" onclick="all(true)">Reveal all</button><button onclick="all(false)">Hide all</button><button class="pp" onclick="shuffleDeck()">Shuffle</button><button onclick="copyDeck()">Copy deck</button><span class="sp"></span><span id="count" class="count"></span></section><section id="cards" class="cl"></section></main><div id="toast" class="toast"></div><script>const DATA=[{"question": "Harry lesson differentiation warm-up — what derivative should immediately be recalled for $$a^x$$, and when is it valid?", "answer": "For a positive constant base $$a$$,\n$$\\frac{d}{dx}\\left(a^x\\right)=a^x\\ln a.$$\nThe exponential remains unchanged because its rate of growth is proportional to its current value; $$\\ln a$$ measures the growth rate associated with the base. The real-valued rule assumes $$a>0$$."}, {"question": "In the R-formula expansion $$R \\sin(2x + \\alpha)$$, why is it dangerous to use only $$\\tan \\alpha = b/a$$ to find $$\\alpha$$, and what is the robust alternative? (Harry Lesson §8.3)", "answer": "- Step 1: Recognize that $$\\tan \\alpha$$ has period $$\\pi$$, so $$\\tan \\alpha = k$$ has two solutions in $$[0, 2\\pi)$$ (opposite quadrants).\n- Step 2: Using only $$\\tan$$ loses information about whether $$\\sin \\alpha$$ and $$\\cos \\alpha$$ are positive or negative.\n- Step 3: **Robust Alternative**: Use the signs of $$a$$ and $$b$$ from $$R \\cos \\alpha = a$$ and $$R \\sin \\alpha = b$$.\n+ Determine the quadrant *first*, then use the calculator’s $$\\arctan$$ as a reference angle only.\n+ Or use the `atan2(y, x)` function if permitted/available, which takes both arguments.\n- Step 4: In P3 June 2024 Q4b, $$a=4, b=2$$ (both positive) confirms Q1. If $$a=-4, b=2$$, $$\\tan$$ is same but quadrant is Q2.\n+ **Harry’s Warning:** Relying solely on $$\\tan^{-1}$$ is the most common source of sign errors in R-formula questions."}, {"question": "Why does $$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$$ require modulus signs, and when can you drop them?", "answer": "- Step 1: The natural log is only defined for positive arguments in the reals. So $$\\ln|f(x)|$$ keeps the expression real even when $$f(x) < 0$$.\n- Step 2: In Q2(b), the limits are 4 and 8, so $$x - 2 \\in [2, 6] > 0$$. The argument is positive throughout, so the modulus signs are technically unnecessary — but keeping them is safe.\n- Step 3: Drop the modulus only when you've verified the argument is positive on the entire interval of integration. Otherwise, keep $$|\\cdot|$$.\n\nTakeaway: When in doubt, keep the modulus. It's never wrong; dropping it can be."}, {"question": "What's the difference between the three Pythagorean identities, and what's the common confusion?", "answer": "- Step 1: $$\\sin^2 A + \\cos^2 A = 1$$ is the master identity.\n- Step 2: $$1 + \\tan^2 A = \\sec^2 A$$ comes from dividing the master by $$\\cos^2 A$$.\n- Step 3: $$1 + \\cot^2 A = \\text{cosec}^2 A$$ comes from dividing the master by $$\\sin^2 A$$.\n- Common confusion: Phuc wrote $$\\cot^2 A$$ instead of $$\\sec^2 A$$ for $$1 + \\tan^2 A$$. The trap is mixing up which reciprocal goes with which ratio.\n\nTakeaway: Divide by $$\\cos^2$$ → sec appears. Divide by $$\\sin^2$$ → cosec appears."}, {"question": "Why does Harry's \"carry forward a plausible value\" strategy specifically help in multi-part P3 questions, and what's the danger of NOT doing it? (2 steps)", "answer": "- Step 1: P3 multi-part questions are designed so each part uses the result of the previous one. The mark scheme gives method marks for correct procedure in each part, independent of whether the previous answer was right.\n- Step 2: If you leave a later part blank because you couldn't do an earlier one, you forfeit ALL the method marks in that later part. Carrying forward a \"wrong but plausible\" value lets you earn those method marks.\n\nThe danger of NOT doing it: even if your earlier answer is wrong, the LATER method might be perfect — and the examiner can only award marks for what you actually write. A blank is a guaranteed zero."}, {"question": "What's the derivative of $$\\sec x$$, and how does it mirror the cosec derivative?", "answer": "- Step 1: $$\\frac{d}{dx}(\\sec x) = \\sec x \\tan x$$ (positive).\n- Step 2: Compare with cosec: $$\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$$ (negative).\n- Step 3: The mirror structure: sec gives (sec)(tan) with +; cosec gives (cosec)(cot) with −. Both are \"function × partner\" with the sign from the pattern.\n\nTakeaway: sec and cosec derivatives are mirror images — same structure, opposite signs."}, {"question": "Edexcel IAL P3 — what pattern justifies $$\\int\\frac{f'(x)}{f(x)}\\,dx=\\ln|f(x)|+C$$?", "answer": "It is the reverse of the logarithmic chain rule: differentiating $$\\ln|f(x)|$$ produces $$\\frac{f'(x)}{f(x)}$$ wherever $$f(x)\\neq0$$. The numerator must match the derivative of the denominator, possibly up to a constant factor."}, {"question": "When evaluating a definite integral like $$\\int_{4}^{8} (2x - 1) dx$$, what is the step-by-step method to avoid sign errors? (3 steps)", "answer": "- Step 1: Find the antiderivative: $$x^2 - x$$.\n- Step 2: Evaluate at the upper limit first: $$(8)^2 - 8 = 64 - 8 = 56$$.\n- Step 3: Evaluate at the lower limit and subtract: $$56 - ((4)^2 - 4) = 56 - (16 - 4) = 56 - 12 = 44$$.\n\nAlways bracket the lower limit evaluation to avoid subtracting a negative incorrectly."}, {"question": "Simple conceptual exercise — without expanding, how should $$\\frac{d}{dx}\\ln(x^2+1)$$ be structured? (2 steps)", "answer": "- Step 1: Differentiate the argument to obtain $$2x$$.\n- Step 2: Divide by the unchanged argument:\n$$\\frac{d}{dx}\\ln(x^2+1)=\\frac{2x}{x^2+1}.$$\n\nThis directly exhibits the “inside derivative over inside” pattern."}, {"question": "Harry follow-up guidance — why should a previously tutored question later be attempted again from scratch?", "answer": "Solving with tutor prompts can create an illusion of mastery because support supplies the next step. A delayed, unaided reattempt tests whether the learner can independently recognise the trigger, select the method, execute it, and finish accurately."}, {"question": "What's the \"polynomial long division\" procedure, and what's the key subtraction step?", "answer": "- Step 1: Divide leading terms. $$2x^2 \\div x = 2x$$.\n- Step 2: Multiply and subtract. $$2x \\cdot (x - 2) = 2x^2 - 4x$$. Subtract: $$(2x^2 - 5x) - (2x^2 - 4x) = -x$$.\n- Step 3: Bring down the next term. $$-x + 8$$. Repeat: $$-x \\div x = -1$$. Multiply: $$-1 \\cdot (x - 2) = -x + 2$$. Subtract: $$8 - 2 = 6$$. Remainder is 6.\n\nTakeaway: The key step is the subtraction. Bracket what you subtract to avoid sign errors."}, {"question": "What is the derivative of $$\\ln f(x)$$, what condition must $$f(x)$$ satisfy, and what's the common error?", "answer": "- Step 1: The derivative is $$\\frac{f'(x)}{f(x)}$$, valid when $$f(x) > 0$$ (so $$\\ln f(x)$$ is real).\n- Step 2: \"Differentiate the argument, put it on top\" — the numerator is $$f'(x)$$, not $$f(x)$$.\n- Step 3: Common error: writing $$\\frac{1}{f(x)}$$ (missing the $$f'(x)$$ on top) or $$\\frac{f(x)}{f'(x)}$$ (inverted). For $$\\ln(x^2 + 3x + 5)$$, the correct answer is $$\\frac{2x + 3}{x^2 + 3x + 5}$$.\n\nTakeaway: The numerator is the derivative of the denominator. If they're the same, you've made an error."}, {"question": "Misconception probe — why is a calculator decimal not automatically an acceptable replacement for an exact surd?", "answer": "A decimal records only an approximation, while a surd preserves the exact algebraic value. Exact forms can also simplify later symbolic work without accumulated rounding error. When the question says “exact,” a decimal fails the requested mathematical form."}, {"question": "What's the \"second smallest positive solution\" interpretation in Q4(c)(ii), and how do you find it systematically?", "answer": "- Step 1: \"Second smallest positive\" means the second value of $$x > 0$$ (in increasing order) that satisfies the equation.\n- Step 2: Solve for the whole angle first: $$2x + \\alpha = \\pi/2 + 2n\\pi$$.\n- Step 3: The first positive solution is $$n = 0$$; the second is $$n = 1$$. Compute both and pick the second.\n\nTakeaway: \"Second smallest positive\" = the $$n = 1$$ case (after $$n = 0$$). The general solution gives all candidates at once."}, {"question": "In Q1, the vertex of $$y = a|x - h| + k$$ is $$(h, k)$$. What's the underlying reason — why is this true for any $$a \\neq 0$$? (2 steps)", "answer": "- Step 1: The function $$y = a|x - h| + k$$ is a V-shape with the corner at the point where $$|x - h| = 0$$, i.e. $$x = h$$. At this point, $$y = a \\cdot 0 + k = k$$, so the corner is $$(h, k)$$.\n- Step 2: For $$a > 0$$, the V opens upward; for $$a < 0$$, the V opens downward. But the vertex is always $$(h, k)$$ regardless of the sign of $$a$$ — the corner location depends only on $$h$$ and $$k$$, not on the steepness factor.\n\nThis is a structural property: the modulus creates a non-differentiable point exactly at $$x = h$$, and that's the vertex regardless of $$a$$."}, {"question": "What is the derivative of $$\\cot x$$, and how does it link to the identity $$1 + \\cot^2 A = \\text{cosec}^2 A$$?", "answer": "- Step 1: $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$.\n- Step 2: The right-hand side matches the identity: $$\\text{cosec}^2 x = 1 + \\cot^2 x$$, so $$\\frac{d}{dx}(\\cot x) = -(1 + \\cot^2 x)$$.\n- Step 3: This is the integration counterpart: $$\\int \\text{cosec}^2 x \\, dx = -\\cot x + c$$.\n\nTakeaway: Derivative ↔ identity pairing works for cot just as it does for tan. The negative sign is part of the pattern."}, {"question": "Besides long division, what is the alternative \"substitution/identity\" method to express $$\\frac{2x^2 - 5x + 8}{x-2}$$ in the form $$Ax + B + \\frac{C}{x-2}$$? (3 steps)", "answer": "- Step 1: Multiply both sides by $$(x-2)$$ to clear the fraction: $$2x^2 - 5x + 8 = (Ax + B)(x - 2) + C$$.\n- Step 2: Pick strategic values for $$x$$. The best choice is the root of the divisor: $$x = 2$$. This zeroes out the $$(x-2)$$ term: $$2(4) - 5(2) + 8 = C \\Rightarrow C = 6$$.\n- Step 3: Pick two other easy numbers (like $$x=0$$ and $$x=1$$) to form two equations in A and B. For $$x=0$$: $$8 = -2B + 6 \\Rightarrow B = -1$$. For $$x=1$$: $$5 = -(A-1) + 6 \\Rightarrow A = 2$$."}, {"question": "For Q2(a)'s \"$$Ax + B + \\frac{C}{x-2}$$\" partial fraction form, why must the numerator of the proper fraction be a CONSTANT (not a linear in $$x$$)? (2 steps)", "answer": "- Step 1: The proper fraction form requires the numerator's degree to be LESS than the denominator's degree. The denominator $$x - 2$$ is degree 1, so the numerator must be degree 0 — a constant.\n- Step 2: If the numerator were linear in $$x$$ (e.g. $$Dx + E$$), you could perform polynomial long division and pull another term into the quotient $$Ax + B$$, leaving a constant remainder. The form $$Ax + B + \\frac{C}{x-2}$$ with $$C$$ constant is the canonical result of doing this division.\n\nThis is why the partial fraction has exactly three parameters $$A, B, C$$ and the numerator of the proper fraction is just $$C$$."}, {"question": "Harry lesson differentiation warm-up — why is $$e^x$$ called its own derivative?", "answer": "Since $$\\ln e=1$$, the general rule gives\n$$\\frac{d}{dx}\\left(e^x\\right)=e^x\\ln e=e^x.$$\nThe base $$e$$ is uniquely chosen so that the exponential’s instantaneous growth rate equals its value."}, {"question": "Harry lesson, 12 July 2026 — how should the sign of the derivative of $$e^{-x}$$ be predicted before any algebra?", "answer": "The exponent has inner derivative $$-1$$, so the chain rule must produce a negative factor: $$\\frac{d}{dx}\\left(e^{-x}\\right)=-e^{-x}$$. This also fits the intuition that $$e^{-x}$$ decreases as $$x$$ increases."}, {"question": "What's the connection between the derivative of $$\\ln x$$ and the integral of $$\\frac{1}{x}$$?", "answer": "- Step 1: $$\\frac{d}{dx}(\\ln x) = \\frac{1}{x}$$ (for $$x > 0$$).\n- Step 2: So $$\\int \\frac{1}{x} dx = \\ln|x| + c$$ — the integral reverses the derivative.\n- Step 3: The modulus appears because $$\\ln x$$ is only defined for $$x > 0$$, but $$\\frac{1}{x}$$ is defined for $$x < 0$$ too. The modulus extends the formula.\n\nTakeaway: Derivative and integral are inverse operations. The modulus in the integral compensates for the domain restriction in the derivative."}, {"question": "What are the three forms of $$\\cos 2A$$, and why does Harry emphasise memorising all three rather than deriving them in the exam?", "answer": "- Step 1: The three forms are:\n+ $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ (the master form, cosine first)\n+ $$\\cos 2A = 1 - 2\\sin^2 A$$ (isolates $$\\sin^2 A$$)\n+ $$\\cos 2A = 2\\cos^2 A - 1$$ (isolates $$\\cos^2 A$$)\n- Step 2: Deriving them takes 30+ seconds each — costly under exam time pressure. Memorising gives instant access.\n- Step 3: Different problems need different forms. Q4(a) required rearranging $$4\\cos^2 x$$ into $$2\\cos 2x + 2$$, which uses the third form.\n\nTakeaway: All three forms are flashcards-worthy — derivation is for understanding, not exam recall."}, {"question": "June 2024 P3 Q1(c) — how should the combined transformation $$y=3f(x-2)$$ be interpreted?", "answer": "A point $$(x,y)$$ maps to\n$$(x+2,3y).$$\nThe input change $$x-2$$ shifts right by $$2$$, while the external factor $$3$$ stretches vertically by scale factor $$3$$."}, {"question": "Misconception probe — why can the rule $$\\int\\frac{f'(x)}{f(x)}\\,dx=\\ln|f(x)|+C$$ not be applied when the numerator merely resembles, but is not proportional to, $$f'(x)$$?", "answer": "The reverse chain rule depends on the numerator matching the denominator’s derivative up to a constant factor. If additional non-proportional terms remain, differentiating $$\\ln|f(x)|$$ will not reproduce the integrand. The expression must first be rearranged, divided, or decomposed."}, {"question": "Why do the trig derivative formulae ($$\\frac{d}{dx}(\\sin x) = \\cos x$$, etc.) require the angle to be in radians? (2 steps)", "answer": "- Step 1: The proof of $$\\frac{d}{dx}(\\sin x) = \\cos x$$ relies on the small-angle limit $$\\lim_{\\theta \\to 0} \\frac{\\sin \\theta}{\\theta} = 1$$, which is only true when $$\\theta$$ is measured in radians.\n- Step 2: If the angle is in degrees, the limit is $$\\frac{\\pi}{180}$$, and every trig derivative would require an ugly factor of $$\\frac{\\pi}{180}$$. Radians make the derivative mathematically \"clean\" and are assumed unless degrees are explicitly stated."}, {"question": "What is the power rule for $$x^n$$, and why must it be kept separate from the rule for $$a^x$$?", "answer": "For constant $$n$$,\n$$\\frac{d}{dx}\\left(x^n\\right)=n x^{n-1}.$$\nIt applies because the variable is in the base and the exponent is fixed. For $$a^x$$ the variable is in the exponent, so the correct derivative instead contains $$\\ln a$$."}, {"question": "What's the \"domain of validity\" for the trig derivative formulae, and what assumption is built in?", "answer": "- Step 1: The formulae assume $$x$$ is in **radians**.\n- Step 2: For tan and sec, $$x \\neq \\pi/2 + n\\pi$$ (where cos x = 0).\n- Step 3: For cot and cosec, $$x \\neq n\\pi$$ (where sin x = 0).\n\nTakeaway: Default to radians. Check for vertical asymptotes (undefined points) when applying the derivative."}, {"question": "What's the R-formula strategy for rewriting $$a\\sin\\theta + b\\cos\\theta$$ as $$R\\sin(\\theta + \\alpha)$$, and what are the two equations you must set up before computing? (4 steps)", "answer": "- Step 1: Expand the target. $$R\\sin(\\theta + \\alpha) = R\\sin\\theta\\cos\\alpha + R\\cos\\theta\\sin\\alpha$$.\n- Step 2: Match coefficients. Comparing with $$a\\sin\\theta + b\\cos\\theta$$:\n+ $$R\\cos\\alpha = a$$\n+ $$R\\sin\\alpha = b$$\n- Step 3: Compute $$R$$ via Pythagoras. $$R^2 = a^2 + b^2$$, so $$R = \\sqrt{a^2 + b^2}$$ (exact surd form, no decimals).\n- Step 4: Find $$\\alpha$$. Divide: $$\\tan\\alpha = b/a$$. The quadrant of $$\\alpha$$ is fixed by the signs of $$a$$ and $$b$$ (use $$\\text{atan2}$$ thinking, not just $$\\arctan$$).\n\nFor $$4\\sin 2x + 2\\cos 2x$$: $$R = \\sqrt{16 + 4} = \\sqrt{20} = 2\\sqrt{5}$$, $$\\tan\\alpha = 2/4 = 1/2$$, first quadrant (both positive) → $$\\alpha \\approx 0.464$$ rad.\n\nTakeaway: The two matching equations $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$ come first — always."}, {"question": "What derivative–identity pair should be recalled together for $$\\tan x$$?", "answer": "Recall\n$$\\frac{d}{dx}(\\tan x)=\\sec^2x$$\ntogether with\n$$1+\\tan^2x\\equiv\\sec^2x.$$\nThe repeated appearance of $$\\sec^2x$$ binds the derivative to its matching Pythagorean identity."}, {"question": "In Q1(b) of June 2024 P3, you must solve $$2|x-5| + 10 > 6x$$ \"by algebra\" with calculator solutions disallowed. What is the strategic insight before you do the algebra? (3 steps)", "answer": "- Step 1: Sketch both branches. The left branch of $$y = 2|x-5|+10$$ is the line $$y = -2x + 20$$ (slope -2), and $$y = 6x$$ has slope 6 — so $$6x$$ is steeper.\n- Step 2: Graphically, $$y = 2|x-5|+10$$ is ABOVE the line $$y = 6x$$ on the left side (where $$x < 5$$) and below on the right side. So the inequality $$2|x-5|+10 > 6x$$ holds for the left branch.\n- Step 3: Solve $$6x = -2x + 20 \\Rightarrow 8x = 20 \\Rightarrow x = 5/2$$. The left-branch solution is $$x < 5/2$$.\n\nHarry's strategic principle: \"Think graphically first to pick the right branch, then do the algebra.\" Picking the wrong branch (solving on $$x \\geq 5$$ with $$2x + 10 > 6x$$) gives the wrong inequality direction."}, {"question": "[Discussed only] June 2024 P3 Q3 — what is the exam distinction between a “sketch” and a “plot”?", "answer": "[Discussed only] A sketch requires the correct overall shape and clearly labelled key features but not a precise scale. A plot requires points to be positioned accurately according to a scale, so it demands greater graphical precision."}, {"question": "Differentiate $$\\ln(x^2 + 3x + 5)$$. How do you apply the $$\\ln(f(x))$$ rule here, and what is a common algebraic mistake to avoid? (2 steps)", "answer": "- Step 1: Identify $$f(x) = x^2 + 3x + 5$$, so $$f'(x) = 2x + 3$$. The derivative is $$\\frac{2x + 3}{x^2 + 3x + 5}$$.\n- Step 2: A common mistake is trying to split the log first (e.g., $$2\\ln(x) + \\dots$$) before differentiating, which is much slower and prone to sign errors. The rule applies directly to the composite argument. Do not expand the logarithm; just differentiate the inside and divide by the outside."}, {"question": "Harry follow-up guidance — why is there a place for both familiar reattempts and unseen papers?", "answer": "Familiar reattempts verify that previously taught methods can now be reproduced independently. Unseen papers test whether those methods can be recognised and transferred without knowing which technique is coming. The first consolidates; the second diagnoses flexible exam readiness."}, {"question": "Harry identity drill — what reciprocal definition produces $$\\tan A$$, and where is it undefined?", "answer": "The definition is\n$$\\tan A=\\frac{\\sin A}{\\cos A}.$$\nIt is undefined wherever $$\\cos A=0$$ because division by zero is impossible."}, {"question": "What is the master Pythagorean identity from which the tan–sec and cot–cosec identities can be derived?", "answer": "$$\\sin^2A+\\cos^2A\\equiv1.$$\nIt expresses that the point $$(\\cos A,\\sin A)$$ lies on the unit circle, whose equation is $$x^2+y^2=1$$."}, {"question": "Edexcel IAL P3 — when should the quotient rule be used, and what numerator order protects the sign?", "answer": "For $$y=\\frac{u}{v}$$ with $$v\\neq0$$, use $$\\frac{dy}{dx}=\\frac{vu'-uv'}{v^2}$$. Remember “bottom times derivative of top minus top times derivative of bottom”; reversing the subtraction changes the derivative’s sign."}, {"question": "What's the \"period halving\" effect when the angle inside sin or cos is $$2x$$ instead of $$x$$, and why does it matter for Q4(c)(ii)?", "answer": "- Step 1: $$\\sin(2x)$$ has period $$\\pi$$, not $$2\\pi$$. The function completes a full cycle when $$2x$$ increases by $$2\\pi$$, i.e., $$x$$ increases by $$\\pi$$.\n- Step 2: For $$\\sin(2x + \\alpha)$$, the period is still $$\\pi$$ (the $$\\alpha$$ just shifts the phase).\n- Step 3: So the second positive maximum is the first plus $$\\pi$$, not $$2\\pi$$. Phuc's error was adding $$2\\pi$$ to $$x$$.\n\nTakeaway: The period of $$\\sin(kx)$$ is $$2\\pi/k$$. For $$k = 2$$, the period is $$\\pi$$."}, {"question": "State the six trigonometric derivative rules Harry drilled in the order $$\\sin, \\cos, \\tan, \\text{cosec}, \\sec, \\cot$$. What sign pattern do they form? (2 steps)", "answer": "- Step 1: The six derivatives in order:\n+ $$\\frac{d}{dx}(\\sin x) = \\cos x$$\n+ $$\\frac{d}{dx}(\\cos x) = -\\sin x$$\n+ $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$\n+ $$\\frac{d}{dx}(\\text{cosec}\\, x) = -\\text{cosec}\\, x \\cot x$$\n+ $$\\frac{d}{dx}(\\sec x) = \\sec x \\tan x$$\n+ $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$\n- Step 2: The signs run $$+ - + - + -$$ in this exact order. Harry's hook: \"If we write them down in that order, there's a really nice pattern with the plus and minus. It goes plus, minus, plus, minus, plus, minus.\"\n\nThis pattern is Harry's remedy for Phuc's confusion about which trig function gets the plus sign vs the minus. Memorise the order, then the signs follow automatically."}, {"question": "Edexcel IAL P3 — how does the chain rule change the derivative of $$\\sin(kx)$$?", "answer": "The outer derivative gives $$\\cos(kx)$$ and the inner derivative contributes $$k$$, so $$\\frac{d}{dx}(\\sin(kx))=k\\cos(kx)$$. Omitting $$k$$ means the rate at which the angle changes has been ignored."}, {"question": "Edexcel IAL P3 — what visual meaning does R-form give to $$a\\sin\\theta+b\\cos\\theta$$?", "answer": "R-form rewrites the combination as one sinusoid with amplitude $$R=\\sqrt{a^2+b^2}$$ and phase shift $$\\alpha$$. The coefficients $$a$$ and $$b$$ can be viewed as perpendicular components of a vector whose length is $$R$$."}, {"question": "Edexcel IAL P3 — when is $$\\cos2A=1-2\\sin^2A$$ the strategically useful double-angle form?", "answer": "Use it when the expression contains $$\\sin^2A$$ and the goal is to replace the square by a constant plus a double-angle term. It can be rearranged as $$2\\sin^2A=1-\\cos2A$$."}, {"question": "When may the real-valued rule $$\\frac{d}{dx}\\ln f(x)=\\frac{f'(x)}{f(x)}$$ be used without changing the logarithm’s meaning?", "answer": "The original logarithm requires\n$$f(x)>0.$$\nThe derivative formula is applied on intervals where this condition holds. It is not enough merely to require $$f(x)\\neq0$$, because a real-valued $$\\ln f(x)$$ is undefined when $$f(x)<0$$."}, {"question": "What's the difference between a \"method mark\" (M mark) and an \"accuracy mark\" (A mark) in Edexcel IAL marking, and how does this affect partial-credit strategy? (3 steps)", "answer": "- Step 1: A method mark rewards correct mathematical procedure, regardless of whether the final numerical answer is right. An accuracy mark requires the final answer to be correct (often to within a tolerance or rounding rule).\n- Step 2: Most P3 questions have a 2–4 mark structure with M marks for setting up and A marks for the final answer. So a question worth 6 marks might have M1, M1, M1, A1, A1, A1 — three setup marks and three answer marks.\n- Step 3: Strategy: even if your final answer is wrong, you can still earn M marks for correct procedure. The \"carry forward a plausible value\" strategy leverages this — you earn M marks in later parts even if your earlier value was wrong.\n\nThis is why showing full working matters: the M marks are awarded for visible method, not for the answer alone."}, {"question": "Edexcel IAL P3 — what tangent double-angle identity is expected knowledge, and what denominator restriction accompanies it?", "answer": "$$\\tan2A=\\frac{2\\tan A}{1-\\tan^2A}$$ wherever the displayed expressions are defined. In particular, the fraction is undefined when $$1-\\tan^2A=0$$, corresponding to angles where $$\\tan2A$$ is undefined."}, {"question": "For an equation whose whole angle is $$kx+\\alpha$$, how does the coefficient $$k$$ affect the spacing between repeated solutions?", "answer": "If the underlying trigonometric solutions repeat every $$2\\pi$$ in the whole angle, then\n$$kx+\\alpha\\mapsto kx+\\alpha+2\\pi$$\ncorresponds to\n$$x\\mapsto x+\\frac{2\\pi}{|k|}.$$\nThe internal coefficient compresses the period in $$x$$."}, {"question": "June 2024 P3 Q4(b) — what accuracy and calculator-mode checks are needed when reporting the phase angle $$\\alpha$$?", "answer": "Check the required unit and accuracy before writing the answer. Here the angle is required in radians and to three significant figures, so $$\\alpha=\\arctan\\left(\\frac12\\right)\\approx0.464$$ radians; degree mode or three decimal places would not satisfy the instruction."}, {"question": "Simple conceptual exercise — without carrying out a long calculation, decide the first rule needed for $$\\frac{d}{dx}\\left(7^{3x}\\right)$$ and explain the trigger. (2 steps)", "answer": "- Step 1: The variable is in the exponent, so use the exponential rule rather than the power rule.\n- Step 2: The exponent is $$3x$$, so the chain rule contributes $$3$$:\n$$\\frac{d}{dx}\\left(7^{3x}\\right)=3\\cdot7^{3x}\\ln7.$$"}, {"question": "June 2024 P3 Q2(a) — what form is polynomial division trying to produce from $$\\frac{2x^2-5x+8}{x-2}$$?", "answer": "It seeks a linear quotient plus a proper remainder term: $$Ax+B+\\frac{C}{x-2}$$. This form separates the polynomial part from the logarithm-producing reciprocal part needed in the following integration."}, {"question": "June 2024 P3 Q4(b) — what happens to an existing vertical constant when the sine and cosine terms are compressed into R-form?", "answer": "The vertical constant is carried over unchanged. R-form combines only the sine and cosine terms, so $$4\\sin 2x+2\\cos 2x-1$$ becomes $$2\\sqrt5\\sin(2x+\\alpha)-1$$, not an expression with the constant absorbed into $$R$$."}, {"question": "What's the \"exact surd form\" for $$\\sqrt{20}$$, and why is it preferred over $$4.472$$?", "answer": "- Step 1: $$\\sqrt{20} = \\sqrt{4 \\cdot 5} = 2\\sqrt{5}$$.\n- Step 2: $$2\\sqrt{5}$$ is exact; $$4.472$$ is an approximation (truncated, not exact).\n- Step 3: The question demanded \"exact,\" so $$2\\sqrt{5}$$ is correct and $$4.472$$ is wrong.\n\nTakeaway: Simplify surds by extracting perfect square factors. $$\\sqrt{20} = 2\\sqrt{5}$$ because $$20 = 4 \\times 5$$."}, {"question": "Harry lesson differentiation warm-up — what is the strategy for differentiating $$e^{kx}$$?", "answer": "Apply the chain rule:\n$$\\frac{d}{dx}\\left(e^{kx}\\right)=k e^{kx}.$$\nThe outer exponential stays unchanged, while the derivative of the inner exponent $$kx$$ contributes the factor $$k$$. This is the $$a^{kx}$$ rule with $$a=e$$."}, {"question": "In Q4, the function $$f(x) = 8\\sin x \\cos x + 4\\cos^2 x - 3$$ combines a double-angle term with a squared term. What's the general strategy for linearising products and squares of trig functions? (2 steps)", "answer": "- Step 1: For products like $$\\sin x \\cos x$$, use the double-angle identity $$\\sin 2x = 2\\sin x \\cos x$$ to convert to a single-angle function. The factor of 2 is absorbed into the coefficient.\n- Step 2: For squares like $$\\cos^2 x$$, use the rearranged double-angle $$2\\cos^2 x = \\cos 2x + 1$$ (or $$2\\sin^2 x = 1 - \\cos 2x$$) to express as a single-angle function plus a constant.\n\nThe combined effect: any expression of the form $$A\\sin x \\cos x + B\\cos^2 x + C\\sin^2 x + D$$ can be written as $$a\\sin 2x + b\\cos 2x + c$$. This is the canonical \"linearise first, then R-formula\" pipeline for P3 trig."}, {"question": "Harry's follow-up email emphasises the \"forgetting curve.\" What's the practical revision strategy this implies for P3? (3 steps)", "answer": "- Step 1: Space your practice over time — don't cram all your revision into one session. Revisit material at increasing intervals (e.g. 1 day, 3 days, 1 week, 2 weeks) to combat forgetting.\n- Step 2: Interleave modules and revisit papers over time. Don't just drill P3 once and move on — circle back to it after working on other modules.\n- Step 3: Re-attempt covered questions from scratch, without hints, after some time has passed. This tests retention and confirms internalisation.\n\nThe forgetting curve (Ebbinghaus) shows that memory decays exponentially without reinforcement. Spaced, interleaved practice is the empirically validated antidote."}, {"question": "Simple conceptual exercise — if $$h(x)=5\\sin(2x+\\alpha)-3$$, what determines its maximum value and what determines where that maximum occurs? (2 steps)", "answer": "- Step 1: The amplitude and vertical shift determine the value:\n$$h_{\\max}=5-3.$$\n- Step 2: The internal angle determines the locations, found from\n$$\\sin(2x+\\alpha)=1.$$\n\nAmplitude controls height; phase and frequency control position."}, {"question": "In Q4(a), $$f(x) = 8\\sin x \\cos x + 4\\cos^2 x - 3$$ must be written as $$a\\sin 2x + b\\cos 2x + c$$. Walk through the substitution of double-angle identities. (3 steps)", "answer": "- Step 1: For $$8\\sin x \\cos x$$: use $$\\sin 2x = 2\\sin x \\cos x$$, so $$8\\sin x \\cos x = 4 \\cdot (2\\sin x \\cos x) = 4\\sin 2x$$. Hence $$a = 4$$.\n- Step 2: For $$4\\cos^2 x$$: rearrange $$\\cos 2x = 2\\cos^2 x - 1$$ to get $$2\\cos^2 x = \\cos 2x + 1$$, so $$4\\cos^2 x = 2(\\cos 2x + 1) = 2\\cos 2x + 2$$. Hence $$b = 2$$.\n- Step 3: Combine with the constant $$-3$$: $$f(x) = 4\\sin 2x + 2\\cos 2x + 2 - 3 = 4\\sin 2x + 2\\cos 2x - 1$$. So $$a = 4, b = 2, c = -1$$.\n\nTakeaway: this is the EXAM payoff for memorising the three forms of $$\\cos 2A$$. The rearrangement $$2\\cos^2 x = \\cos 2x + 1$$ is the key trick."}, {"question": "What is the underlying reason for the sign pattern $$+ - + - + -$$ in the six trig derivatives? Is there a deeper \"why\" or is it pure memorisation? (3 steps)", "answer": "- Step 1: For $$\\sin, \\cos$$, the sign comes from the cyclic nature of differentiation: $$\\sin \\to \\cos \\to -\\sin \\to -\\cos \\to \\sin$$ (a 4-cycle). Position 1 ($$\\sin$$) gets $$+$$, position 2 ($$\\cos$$) gets $$-$$.\n- Step 2: For $$\\tan, \\sec, \\text{cosec}, \\cot$$, the sign is determined by the structure of the derivative:\n+ $$\\tan x = \\sin x / \\cos x$$ (positive in Q1)\n+ $$\\sec x = 1/\\cos x$$ (positive in Q1)\n+ $$\\text{cosec}\\, x = 1/\\sin x$$ (positive in Q1, but its derivative involves both factors, hence the negative sign)\n+ $$\\cot x = \\cos x / \\sin x$$ (positive in Q1)\n- Step 3: The $$+ - + - + -$$ pattern across all six is essentially mnemonic — there isn't a single deep principle that produces it. It's a memorisation aid for a set of six facts.\n\nTakeaway: don't search for a deeper \"why\" beyond what's stated — the pattern is a memory device, not a derived rule."}, {"question": "June 2024 P3 Q2(b) — what logarithm law converts a difference such as $$\\ln6-\\ln2$$ into a single logarithm?", "answer": "Use $$\\ln p-\\ln q=\\ln\\left(\\frac{p}{q}\\right)$$ for positive $$p$$ and $$q$$. Thus $$\\ln6-\\ln2=\\ln3$$; subtraction of logarithms corresponds to division of their arguments."}, {"question": "Harry lesson, 12 July 2026 — what structure should immediately trigger the logarithmic chain-rule formula?", "answer": "An expression of the form $$\\ln(f(x))$$ triggers $$\\frac{d}{dx}\\left(\\ln(f(x))\\right)=\\frac{f'(x)}{f(x)}$$. Harry’s memory instruction was: differentiate the argument, place that derivative on top, and retain the original argument underneath."}, {"question": "June 2024 P3 Q4(a) — why must constant terms be collected after applying double-angle identities?", "answer": "Rewriting $$\\cos^2x$$ introduces a constant as well as a $$\\cos2x$$ term. If that new constant is not combined with the original constant, the final coefficient $$c$$ in\n$$a\\sin2x+b\\cos2x+c$$\nwill be wrong even when the trigonometric terms are correct."}, {"question": "June 2024 P3 Q1 — how is $$2|x-5|+10$$ written as a piecewise function, and what determines the branch boundary? (3 steps)", "answer": "- Step 1: The expression inside the modulus changes sign at $$x=5$$, so this is the branch boundary.\n- Step 2: For $$x\\geq5$$, use $$|x-5|=x-5$$, giving $$f(x)=2x$$.\n- Step 3: For $$x<5$$, use $$|x-5|=5-x$$, giving $$f(x)=-2x+20$$."}, {"question": "Harry double-angle drill — what identity should be recalled immediately for $$\\sin2A$$?", "answer": "$$\\sin2A=2\\sin A\\cos A.$$\nIt is the double-angle specialization of the sine addition formula, but Harry’s exam strategy was to recall it directly rather than re-derive it under time pressure."}, {"question": "June 2024 P3 Q2(b) — why does $$\\int\\frac{k}{x-a}\\,dx$$ become $$k\\ln|x-a|$$ without an extra chain-rule correction?", "answer": "Since\n$$\\frac{d}{dx}(x-a)=1,$$\nthe numerator already matches the derivative of the denominator:\n$$\\int\\frac{k}{x-a}\\,dx=k\\ln|x-a|+C.$$\nAn additional factor would be needed only if the derivative of the denominator were not already accounted for."}, {"question": "Edexcel IAL P3 — when should the product rule be used, and what is its structural formula?", "answer": "Use it when two non-constant functions are multiplied. If $$y=u(x)v(x)$$, then $$\\frac{dy}{dx}=u'v+uv'$$. Each term differentiates one factor while preserving the other, ensuring that both sources of variation are counted."}, {"question": "In Edexcel IAL P3 differentiation, what is the immediate diagnostic check you must perform *before* differentiating an expression like $$x^a$$ versus $$a^x$$ to avoid the \"Phuc Trap\"?", "answer": "- Step 1: Identify the location of the variable $$x$$.\n+ If $$x$$ is in the **base** ($$x^a$$), the exponent is constant $\\Rightarrow$ use the Power Rule ($$a x^{a-1}$$).\n+ If $$x$$ is in the **exponent** ($$a^x$$), the base is constant $\\Rightarrow$ use the Exponential Rule ($$a^x \\ln a$$).\n- Step 2: Recognize that applying the power rule to $$a^x$$ (getting $$x a^{x-1}$$) is a fundamental category error because the power rule is derived for polynomial structures, not exponential growth.\n- Step 3: Apply the correct rule. For $$a^x$$, the function remains unchanged and is merely scaled by $$\\ln a$$.\n\nThis diagnostic prevents the most common differentiation error seen in P3 warm-ups: misapplying polynomial rules to exponential functions."}, {"question": "June 2024 P3 Q4(c)(i) — how is the maximum of $$R\\sin(2x+\\alpha)+c$$ found without differentiation? (2 steps)", "answer": "- Step 1: Use the range $$-1\\leq\\sin(2x+\\alpha)\\leq1$$.\n- Step 2: Since $$R>0$$, the maximum occurs when the sine equals $$1$$, giving a maximum value of $$R+c$$."}, {"question": "Harry lesson, 12 July 2026 — how can $$1+\\cot^2A=\\cosec^2A$$ be reconstructed if it is forgotten? (2 steps)", "answer": "- Step 1: Divide $$\\sin^2A+\\cos^2A=1$$ by $$\\sin^2A$$, assuming $$\\sin A\\neq0$$.\n- Step 2: Simplify to $$1+\\cot^2A=\\cosec^2A$$."}, {"question": "For the question \"show that $$\\int_4^8 g(x)\\, dx = \\alpha + \\beta \\ln 3$$\", what's the structure of the working the mark scheme expects? (3 steps)", "answer": "- Step 1: Use the result of part (a) — the partial-fraction form $$g(x) = 2x - 1 + \\frac{6}{x-2}$$ — to set up the integral. The \"show that\" structure means the parts are linked: part (a) gives the form, part (b) uses it.\n- Step 2: Integrate term by term, applying the standard result $$\\int \\frac{6}{x-2} dx = 6\\ln|x-2|$$ (from $$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$$ with $$f(x) = x-2$$, $$f'(x) = 1$$, constant 6 pulled out).\n- Step 3: Apply the limits, simplify the difference, and use the log law $$\\ln 6 - \\ln 2 = \\ln(6/2) = \\ln 3$$ to reach $$\\alpha + \\beta \\ln 3$$. Identify $$\\alpha = 44, \\beta = 6$$.\n\nTakeaway: \"show that\" questions chain parts. Don't skip using part (a) — that's where the method marks live."}, {"question": "When applying the chain rule to $$\\ln f(x)$$, the numerator is $$f'(x)$$ and the denominator is $$f(x)$$. What is the conceptual reason for this structure? (2 steps)", "answer": "- Step 1: The chain rule says $$\\frac{d}{dx}\\ln(g(x)) = \\frac{g'(x)}{g(x)}$$ because $$\\ln$$ is the inverse of $$\\exp$$: if $$y = \\ln(g(x))$$, then $$e^y = g(x)$$. Differentiating both sides: $$e^y \\cdot \\frac{dy}{dx} = g'(x)$$, so $$\\frac{dy}{dx} = \\frac{g'(x)}{e^y} = \\frac{g'(x)}{g(x)}$$.\n- Step 2: The numerator carries the derivative of the inside, the denominator carries the inside itself. This is the structural reason for the \"differentiate the argument, put it on top\" mnemonic.\n\nTakeaway: understanding the inverse-function origin of this rule makes the structure less arbitrary — it's not just a formula to memorise, it's a consequence of $$\\ln$$ and $$\\exp$$ being inverses."}, {"question": "Harry identity drill — what is the reciprocal identity for $$\\cot A$$?", "answer": "$$\\cot A=\\frac1{\\tan A}=\\frac{\\cos A}{\\sin A}.$$\nThe first form emphasizes that cotangent is the reciprocal of tangent; the second follows from the sine–cosine definition of tangent."}, {"question": "What's the \"exact value\" rule for $$R$$ in the R-formula, and what's the trap with decimals?", "answer": "- Step 1: If the question says \"exact\" or \"in surd form,\" write $$R = \\sqrt{a^2 + b^2}$$ and simplify. For $$a = 4, b = 2$$: $$R = \\sqrt{20} = 2\\sqrt{5}$$.\n- Step 2: A decimal like $$4.472$$ is an approximation, not an exact value. It loses the \"exact\" mark.\n- Step 3: The trap: the calculator displays $$4.472...$$, and students copy it down without simplifying. Always simplify surds before writing.\n\nTakeaway: \"Exact\" means no decimals. Simplify $$\\sqrt{n}$$ to $$k\\sqrt{m}$$ where $$m$$ is square-free."}, {"question": "Edexcel IAL P3 — why must a proposed R-form answer be expanded as a final check?", "answer": "Expanding verifies the signs and coefficient placement. For $$R\\sin(\\theta+\\alpha)$$, the sine coefficient must be $$R\\cos\\alpha$$ and the cosine coefficient must be $$R\\sin\\alpha$$; confusing these is a common source of an incorrect phase."}, {"question": "June 2024 P3 Q1(c) — how does replacing $$f(x)$$ by $$f(x-h)$$ transform a point on its graph?", "answer": "It shifts the graph right by $$h$$:\n$$(x,y)\\mapsto(x+h,y).$$\nThe apparent minus sign is reversed because the new input must be $$h$$ larger to feed the old value of $$x$$ into $$f$$."}, {"question": "In Q4(c)(ii), after finding the second smallest positive $$x$$, the answer is given as $$3.69$$ (3 s.f.). What is the underlying exact value, and what would you write if the question asked for an exact answer? (2 steps)", "answer": "- Step 1: Exact: $$x_2 = \\frac{5\\pi/2 - \\alpha}{2} = \\frac{5\\pi}{4} - \\frac{\\alpha}{2}$$, where $$\\alpha = \\arctan(1/2)$$. This is not a \"nice\" closed form — it involves the arctangent.\n- Step 2: If the question demanded an exact answer, you'd write $$x = \\frac{5\\pi - 2\\arctan(1/2)}{4}$$ or equivalent. But since the question allows 3 s.f. (and $$\\alpha$$ itself is given to 3 s.f.), the numerical answer $$3.69$$ is appropriate.\n\nTakeaway: when an answer involves $$\\arctan$$ of a non-special value, the question will usually allow a decimal approximation. If it doesn't, the answer is necessarily messy — and that's the question's design."}, {"question": "Edexcel IAL P3 — why is the chain rule needed whenever one function is nested inside another?", "answer": "A change in the outer function is driven by the change in its input, and that input itself changes with $$x$$. Thus $$\\frac{d}{dx}f(g(x))=f'(g(x))g'(x)$$; the factor $$g'(x)$$ converts change in the inner variable into change with respect to $$x$$."}, {"question": "Harry lesson warm-up — what is the role of the constant-multiple rule when differentiating expressions such as $$5a^x$$ or $$3e^{2x}$$?", "answer": "A constant outside a function remains outside its derivative:\n$$\\frac{d}{dx}\\left(c f(x)\\right)=c f'(x).$$\nIt scales the derivative but does not alter which inner differentiation rule applies. For example, $$3e^{2x}$$ requires both the external factor $$3$$ and the chain-rule factor $$2$$."}, {"question": "June 2024 P3 Q2(a) — after division gives quotient $$2x-1$$ and remainder $$6$$, where must the remainder appear in the decomposed fraction?", "answer": "The remainder alone sits over the original divisor: $$\\frac{2x^2-5x+8}{x-2}=2x-1+\\frac{6}{x-2}$$. The quotient is not left multiplied by the divisor inside the final fraction."}, {"question": "June 2024 P3 Q4(a) — when an expression contains $$8\\sin x\\cos x$$ and must be rewritten using $$\\sin 2x$$, what coefficient-handling trick should be used? (2 steps)", "answer": "- Step 1: Expose the identity-sized product by writing $$8\\sin x\\cos x=4(2\\sin x\\cos x)$$.\n- Step 2: Replace the bracket with $$\\sin 2x$$, giving $$4\\sin 2x$$. The key is to factor out the surplus coefficient before applying the identity."}, {"question": "What is the general solution for $$\\sin \\theta = 1$$, and why is it critical to find ALL solutions for the whole angle before dividing by a coefficient? (2 steps)", "answer": "- Step 1: The general solution for $$\\sin \\theta = 1$$ is $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$ for any integer $$n$$. The sine function only peaks at 1 at the top of its cycle.\n- Step 2: It is critical to list these whole-angle solutions first (e.g., $$\\frac{\\pi}{2}, \\frac{5\\pi}{2}$$) before dividing by 2 (if the angle is $$2x + \\alpha$$). Dividing the period $$2\\pi$$ by 2 gives a period of $$\\pi$$ for $$x$$, meaning adding $$2\\pi$$ to $$x$$ skips a valid solution."}, {"question": "June 2024 P3 Q2(b) — why should the decomposition from part (a) be used before integrating the rational function?", "answer": "The original quotient hides two different antiderivative types. Decomposition exposes an elementary polynomial part and a reciprocal linear part, allowing direct use of the power rule for integration and the logarithmic rule for $$\\frac{1}{x-a}$$."}, {"question": "Why does $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$ hold, conceptually? What's the intuition?", "answer": "- Step 1: tan x is undefined at $$x = \\pi/2$$ (vertical asymptote), and its slope there is infinite — matching $$\\sec^2 x \\to \\infty$$.\n- Step 2: At $$x = 0$$, tan x = 0 and its slope is 1 — matching $$\\sec^2 0 = 1$$.\n- Step 3: The derivative is always positive (tan is always increasing on each branch), and $$\\sec^2 x > 0$$ always.\n\nTakeaway: The derivative matches the qualitative behaviour of tan — positive everywhere, blowing up at the asymptotes."}, {"question": "June 2024 P3 Q1(b) — when a question says calculator solutions are not acceptable, what evidence must the response show?", "answer": "Show the branch selection, the algebraic equality that locates the boundary, and the resulting inequality interval. A calculator-generated decimal or graph alone does not demonstrate the required algebraic method."}, {"question": "Harry lesson, 12 July 2026 — what final-answer checklist should be applied after the main mathematics is complete? (4 steps)", "answer": "- Step 1: Check every derivative and identity sign.\n- Step 2: Preserve exact values when “exact” is requested, especially surds.\n- Step 3: Check angle units and distinguish significant figures from decimal places.\n- Step 4: Confirm that periodicity, domain restrictions, and logarithmic modulus signs were handled at the correct stage."}, {"question": "Edexcel IAL P3 — when is it strategically better to convert a squared cosine term using $$2\\cos^2A=1+\\cos2A$$ rather than use $$\\cos^2A=1-\\sin^2A$$?", "answer": "Use $$2\\cos^2A=1+\\cos2A$$ when the target form requires a single double-angle function or when the expression already contains terms in $$2A$$. The alternative leaves a squared sine term and moves away from the requested form."}, {"question": "June 2024 P3 Q4(b) — how should exact and approximate R-form parameters be presented differently?", "answer": "Keep $$R$$ exact when requested, usually as a simplified surd. Give $$\\alpha$$ to the specified accuracy and in the specified angular unit. Do not silently present a rounded angle as exact or turn an exact amplitude into a decimal."}, {"question": "Misconception probe — why is deriving every trig identity during an exam not a reliable substitute for memorising them?", "answer": "Derivation can recover a forgotten identity, but it adds time and creates extra sign and algebra risks. In a question combining several identities, repeated derivation also obscures the larger solving strategy. Use derivation as an emergency reconstruction tool, not the default workflow."}, {"question": "June 2024 P3 Q4(b) — how is the amplitude $$R$$ found in $$a\\sin\\theta+b\\cos\\theta=R\\sin(\\theta+\\alpha)$$, and why?", "answer": "Square and add the matching equations:\n$$R^2\\cos^2\\alpha+R^2\\sin^2\\alpha=a^2+b^2.$$\nSince $$\\sin^2\\alpha+\\cos^2\\alpha=1$$,\n$$R=\\sqrt{a^2+b^2},$$\nwith $$R>0$$ by convention."}, {"question": "Edexcel IAL P3 R-form — how would the maximum-value strategy change if the coefficient multiplying the sine were negative?", "answer": "If the expression were $$R\\sin\\theta+c$$ with $$R<0$$, its largest value would occur when $$\\sin\\theta=-1$$, because multiplying by a negative reverses the order. The standard R-form convention avoids this complication by requiring $$R>0$$."}, {"question": "Edexcel IAL P3 — why does the antiderivative of $$\\frac{1}{x}$$ contain $$\\ln|x|$$ rather than merely $$\\ln x$$?", "answer": "The integrand $$\\frac{1}{x}$$ exists on both $$x>0$$ and $$x<0$$. Since $$\\frac{d}{dx}\\ln|x|=\\frac{1}{x}$$ on either interval, the modulus gives a real antiderivative on both sides of zero; $$\\ln x$$ covers only the positive side."}, {"question": "June 2024 P3 Q4(c)(ii) — how should the “second smallest positive solution” be selected? (3 steps)", "answer": "- Step 1: Generate solutions using successive valid integer values of $$n$$ in the whole-angle equation.\n- Step 2: Rearrange each candidate for $$x$$ and discard values that are not positive.\n- Step 3: Order the remaining values numerically and choose the second one.\n\nDo not assume that an arbitrary “second” value of $$n$$ automatically gives the second positive solution."}, {"question": "Harry lesson, 12 July 2026 — what is the strategy for differentiating $$Ce^{kx}$$, where $$C$$ and $$k$$ are constants? (2 steps)", "answer": "- Step 1: Keep the constant multiplier $$C$$ outside the differentiation.\n- Step 2: Differentiate $$e^{kx}$$ by the chain rule, producing $$ke^{kx}$$. Hence $$\\frac{d}{dx}\\left(Ce^{kx}\\right)=Cke^{kx}$$."}, {"question": "Phuc confused the signs of $$\\frac{d}{dx}(\\sin x)$$ and $$\\frac{d}{dx}(\\cos x)$$. What's the cleanest way to remember which is positive and which is negative?", "answer": "- Step 1: Use the $$+ \\; - \\; + \\; - \\; + \\; -$$ pattern. sin is position 1 (+), cos is position 2 (−).\n- Step 2: Sanity-check with values. At $$x = 0$$: $$\\sin x$$ is increasing through 0, so its derivative ($$\\cos x$$) is positive. $$\\cos x$$ is decreasing through 1, so its derivative (−sin x) is negative.\n- Step 3: The pattern works because of how the functions oscillate — sin leads cos by a quarter cycle, so their derivatives have opposite signs at the same point.\n\nTakeaway: The pattern is reliable, but the \"increasing at x = 0\" check is a useful backup."}, {"question": "Harry lesson log trap — how should a constant multiplier outside a logarithm be handled in an expression such as $$5\\ln(2x)$$? (2 steps)", "answer": "- Step 1: Keep the external constant $$5$$ as a multiplier.\n- Step 2: Differentiate the logarithm using its inner derivative:\n$$\\frac{d}{dx}\\left(5\\ln(2x)\\right)\n=5\\left(\\frac{2}{2x}\\right)=\\frac5x.$$\n\nThe $$2$$ inside the logarithm cancels; it must not be multiplied into the final numerator a second time."}, {"question": "In Q2(b), the integral evaluated to $$44 + 6\\ln 3$$. Walk through the full evaluation from the antiderivative. (4 steps)", "answer": "- Step 1: Antiderivative. $$\\int \\left(2x - 1 + \\frac{6}{x-2}\\right) dx = x^2 - x + 6\\ln|x - 2| + c$$.\n- Step 2: Upper limit ($$x = 8$$). $$8^2 - 8 + 6\\ln 6 = 64 - 8 + 6\\ln 6 = 56 + 6\\ln 6$$.\n- Step 3: Lower limit ($$x = 4$$). $$4^2 - 4 + 6\\ln 2 = 16 - 4 + 6\\ln 2 = 12 + 6\\ln 2$$.\n- Step 4: Subtract. $$(56 + 6\\ln 6) - (12 + 6\\ln 2) = 44 + 6(\\ln 6 - \\ln 2) = 44 + 6\\ln 3$$.\n\nTakeaway: The polynomial part gives $$44$$; the log part collapses to $$6\\ln 3$$ via $$\\ln 6 - \\ln 2 = \\ln 3$$."}, {"question": "[Discussed only] June 2024 P3 Q3 — what must be labelled when sketching a straight line on axes $$\\log_{10}y$$ against $$\\log_{10}x$$?", "answer": "[Discussed only] Label key intercepts as full coordinate pairs, such as $$(0,6)$$ and $$(2,0)$$. A lone number is ambiguous because it does not identify which transformed axis it belongs to."}, {"question": "Harry makes a distinction between \"three significant figures\" and \"three decimal places.\" For Q4(c)(ii), the unrounded answer is $$x \\approx 3.694$$. To 3 s.f., what is the answer, and why does this distinction matter? (2 steps)", "answer": "- Step 1: 3.694 to 3 s.f. is $$3.69$$ (the first three significant digits are 3, 6, 9; the next digit 4 rounds down).\n- Step 2: To 3 d.p. it would be $$3.694$$ — the first three digits after the decimal point. Significant figures count from the first non-zero digit, ignoring decimal placement; decimal places count digits after the decimal point.\n\nTakeaway: s.f. and d.p. give different answers whenever the number is not in the range [1, 10). For exam questions saying \"to 3 s.f.\", write 3.69; for \"to 3 d.p.\", write 3.694. Reading the question wrong loses easy marks."}, {"question": "What derivative–identity pair should be recalled together for $$\\cot x$$?", "answer": "Recall\n$$\\frac{d}{dx}(\\cot x)=-\\cosec^2x$$\ntogether with\n$$1+\\cot^2x\\equiv\\cosec^2x.$$\nThe identity recalls the squared reciprocal function; Harry’s alternating pattern supplies the derivative’s negative sign."}, {"question": "June 2024 P3 Q1(a) — why does writing a modulus function piecewise help reveal its graph? (3 steps)", "answer": "- Step 1: Split according to the sign of the expression inside the modulus.\n- Step 2: Where $$x-h\\geq0$$, use $$|x-h|=x-h$$; where $$x-h<0$$, use $$|x-h|=-(x-h)$$.\n- Step 3: The result exposes two straight-line branches with opposite gradient signs meeting at $$x=h$$.\n\nThis is slower than the vertex shortcut but clarifies which branch applies in an inequality."}, {"question": "Edexcel IAL P3 — what is the range of $$R\\sin\\theta+c$$ when $$R>0$$?", "answer": "Since $$-1\\leq\\sin\\theta\\leq1$$, multiplication and translation give $$c-R\\leq R\\sin\\theta+c\\leq c+R$$. Thus $$R$$ is the amplitude and $$c$$ is the centre line."}, {"question": "Edexcel IAL P3 — how does the chain rule change the derivative of $$\\cos(kx)$$?", "answer": "The derivative is $$\\frac{d}{dx}(\\cos(kx))=-k\\sin(kx)$$. The negative sign comes from differentiating cosine, while $$k$$ comes from differentiating the inner angle."}, {"question": "Why does $$\\frac{d}{dx}(\\ln(kx)) = \\frac{1}{x}$$ even though the argument is $$kx$$, not $$x$$? Walk through the cancellation.", "answer": "- Step 1: Apply the log-of-a-function rule. $$\\frac{d}{dx}(\\ln f(x)) = \\frac{f'(x)}{f(x)}$$, valid when $$f(x) > 0$$.\n- Step 2: Identify $$f(x) = kx$$, so $$f'(x) = k$$. Substituting: $$\\frac{d}{dx}(\\ln(kx)) = \\frac{k}{kx}$$.\n- Step 3: Simplify. $$\\frac{k}{kx} = \\frac{1}{x}$$ — the constant $$k$$ cancels.\n\nTakeaway: The numerator is the derivative of the **argument**, not the argument itself. Forgetting to put $$f'(x)$$ on top (Phuc's mistake with $$\\ln 3x$$) leaves a wrong denominator."}, {"question": "Edexcel IAL P3 — what common mistake does the product rule prevent?", "answer": "It prevents the false rule $$(uv)'=u'v'$$. When both factors vary, the first-order change contains one contribution from changing $$u$$ while holding $$v$$ locally fixed and another from changing $$v$$ while holding $$u$$ locally fixed; hence $$(uv)'=u'v+uv'$$."}];
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
/* SAFE: fmt escapes every model-supplied string before inserting fixed formatting tags. */
function fmt(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^- Step (\d+):/gm,'<div class="stp"><strong>Step $1:</strong>').replace(/\n(?=\S)/g,'<br>')}
function draw(){const e=document.getElementById('cards');e.innerHTML=DATA.map((c,i)=>`<article class="cd" data-i="${i}"><div class="q" tabindex="0" role="button" aria-expanded="false" onclick="toggle(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggle(${i})}">${fmt(c.question)}</div><div class="a">${fmt(c.answer)}</div></article>`).join('');document.getElementById('count').textContent=DATA.length+' cards';math()}
function toggle(i){const e=document.querySelector(`[data-i="${i}"]`);e.classList.toggle('op');e.querySelector('.q').setAttribute('aria-expanded',e.classList.contains('op'));math()}
function all(x){document.querySelectorAll('.cd').forEach(e=>{e.classList.toggle('op',x);e.querySelector('.q').setAttribute('aria-expanded',x)});math()}
function shuffleDeck(){for(let i=DATA.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[DATA[i],DATA[j]]=[DATA[j],DATA[i]]}draw()}
function math(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cards'),{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})}
function copyDeck(){navigator.clipboard.writeText(DATA.map(c=>'Q: '+c.question+'\nA: '+c.answer).join('\n\n')).then(()=>toast('Deck copied'))}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('sh');setTimeout(()=>e.classList.remove('sh'),1800)}
document.addEventListener('DOMContentLoaded',draw);</script></body></html>
