$. A common error is writing $$-2x \\frac{dy}{dx} + 2y$$ by forgetting that the negative multiplier applies to the second term of the product rule as well.\n- Step 3: Collect $$dy/dx$$ terms. The correct collection leads to $$(2y - 2x)\\frac{dy}{dx}$$ on the LHS. If the sign error occurred in Step 2, you would incorrectly get $$(2y + 2x)\\frac{dy}{dx}$$, resulting in a wrong denominator of $$y+x$$ instead of $$y-x$$.\n+ *Conceptual Check:* The term $$-2xy$$ represents a coupling between $$x$$ and $$y$$. Its rate of change has two components (change in $$x$$, change in $$y$$), and the negative coefficient acts as a global modifier to *both* components simultaneously.\n\n**Takeaway:** Always bracket composite derivatives (product/chain rule) before distribution to prevent partial negation errors."},{"question":"When finding coordinates on an implicit curve given a specific gradient (e.g., $$dy/dx = 2$$), why is it conceptually necessary to treat the gradient equation and the curve equation as a **simultaneous system**, and what does each equation represent geometrically? (2 steps)","answer":"- Step 1: The gradient equation (e.g., $$\\frac{12-4x+y}{y-x} = 2$$) defines a **locus of points** where the tangent slope is 2. Simplifying this typically yields a linear relation (e.g., $$y = 12-2x$$). This line contains *all* points in the plane with that slope, not just those on the curve.\n- Step 2: The curve equation ($$4x^2 + y^2 - 2xy = 24x$$) defines the specific **constraint** of the problem. The intersection of the \"slope locus\" and the \"curve constraint\" isolates the exact point(s) $$P$$ that satisfy both conditions. Solving one without the other leaves you with either infinite candidates or no gradient information.\n+ *Misconception Probe:* Students sometimes try to integrate $$dy/dx = 2$$ to get $$y=2x+c$$. This is wrong because $$dy/dx=2$$ is only true *at the specific point P*, not everywhere on the curve. The gradient condition is a point-wise filter, not a global differential equation.\n\n**Takeaway:** Gradient conditions provide a linear filter; curve equations provide the nonlinear constraint; their intersection yields the solution."},{"question":"For intersecting vector lines $$\\mathbf{r}_1 = \\mathbf{a} + \\lambda \\mathbf{b}$$ and $$\\mathbf{r}_2 = \\mathbf{c} + \\mu \\mathbf{d}$$, explain the strategic reasoning for selecting specific component equations to solve for parameters $$\\lambda$$ and $$\\mu$$, and how the third component functions differently. (3 steps)","answer":"- Step 1: Equating vectors generates three scalar equations (for $$x, y, z$$). However, there are only two unknowns ($$\\lambda, \\mu$$). This makes the system **overdetermined**. You cannot use all three simultaneously to find the parameters; you must select two.\n- Step 2: Select the two equations that are **algebraically simplest** (e.g., avoid equations containing the unknown constant $$\\beta$$ or complex coefficients). Solve this $$2 \\times 2$$ system to find unique values for $$\\lambda$$ and $$\\mu$$.\n- Step 3: Use the third, unused equation as a **consistency check** or **definition source**. If the lines are stated to intersect, substituting your $$\\lambda, \\mu$$ into the third equation must yield a valid identity or define the unknown constant (like $$\\beta$$). If it yields a contradiction, the lines are skew, not intersecting.\n+ *Practical Tip:* Never include the equation with the unknown constant ($$\\beta$$) in your initial solving pair, as you have three unknowns ($$\\lambda, \\mu, \\beta$$) and only two equations available for solving.\n\n**Takeaway:** In 3D intersection problems, two components solve for parameters; the third component validates intersection or defines missing constants."},{"question":"In the trigonometric substitution $$u = 3 + \\cos \\theta$$ for the integral $$\\int \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos \\theta}} d\\theta$$, explain why $$\\cos \\theta$$ in the numerator cannot be treated as a constant and how the double-angle identity facilitates the variable change. (3 steps)","answer":"- Step 1: Recognize that $$\\cos \\theta$$ varies with $$\\theta$$, so it cannot be factored out of the integral. It must be expressed in terms of $$u$$. Rearranging the substitution gives $$\\cos \\theta = u - 3$$.\n- Step 2: Expand $$\\sin 2\\theta$$ as $$2 \\sin \\theta \\cos \\theta$$. This is crucial because the derivative of the substitution is $$du = -\\sin \\theta \\, d\\theta$$. The $$\\sin \\theta$$ factor in the numerator acts as the **Jacobian bridge**, cancelling with the $$d\\theta$$ conversion and leaving only algebraic terms in $$u$$.\n- Step 3: Substitute fully. The integrand becomes $$\\frac{2(u-3)}{\\sqrt{u}} (-du)$$. Without the double-angle expansion, you would have $$\\sin 2\\theta$$ which does not match the $$-\\sin \\theta \\, d\\theta$$ differential, making direct substitution impossible without messy inverse trig conversions.\n+ *Why-not:* Trying to integrate $$\\sin 2\\theta / \\sqrt{u}$$ directly fails because the differential relationship is tied to $$\\sin \\theta$$, not $$\\sin 2\\theta$$. The identity aligns the integrand's structure with the substitution's differential.\n\n**Takeaway:** Trigonometric substitutions rely on matching the differential; identities like $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ expose the necessary cancelling factor."},{"question":"When transforming limits for the definite integral substitution $$u = 3 + \\cos \\theta$$ with original bounds $$\\theta \\in [0, \\pi/2]$$, walk through the evaluation and explain why the order of limits might appear \"reversed.\" (2 steps)","answer":"- Step 1: Evaluate the mapping strictly. Lower bound: $$\\theta = 0 \\implies u = 3 + \\cos(0) = 4$$. Upper bound: $$\\theta = \\pi/2 \\implies u = 3 + \\cos(\\pi/2) = 3$$.\n- Step 2: Interpret the direction. The new integral runs from $$u=4$$ to $$u=3$$. This \"reverse\" order is correct and necessary because $$\\cos \\theta$$ is decreasing on $$[0, \\pi/2]$$. The negative sign in $$du = -\\sin \\theta \\, d\\theta$$ combined with the reversed limits ($$\\int_4^3$$) results in a positive net value, consistent with the original positive integrand.\n+ *Common Error:* Students often swap limits back to \"small-to-large\" ($$\\int_3^4$$) out of habit without adjusting the sign of $$du$$, leading to a sign error. Always follow the functional mapping faithfully.\n\n**Takeaway:** Limit order is dictated by the substitution function's monotonicity; \"reversed\" limits naturally compensate for negative differentials."},{"question":"For the binomial expansion of $$(2+5x)^{-2}$$, explain the conceptual necessity of factoring out $$2^{-2}$$ before applying the general binomial series, and why the standard $$(a+b)^n$$ formula for integer $$n$$ does not apply here. (3 steps)","answer":"- Step 1: The general binomial series $$(1+X)^n = 1 + nX + \\dots$$ is defined **only** for a leading term of 1 when $$n$$ is non-integer or negative. The expression $$(2+5x)^{-2}$$ has a leading term of 2, violating this form.\n- Step 2: Factorize to normalize. $$(2+5x)^{-2} = [2(1 + \\frac{5}{2}x)]^{-2} = 2^{-2}(1 + \\frac{5}{2}x)^{-2}$$. This isolates the valid binomial structure $$(1+X)^n$$ where $$X = \\frac{5}{2}x$$.\n- Step 3: Contrast with integer powers. For positive integer $$n$$, $$(a+b)^n$$ expands via Pascal's triangle regardless of leading coefficients. For negative $$n$$, the series is an infinite Taylor series derived from derivatives at $$X=0$$; shifting the base from 1 to 2 changes the center of expansion, requiring normalization to maintain validity.\n+ *Validity Implication:* The normalized form also reveals the convergence condition directly: $$|X| < 1 \\implies |\\frac{5}{2}x| < 1 \\implies |x| < \\frac{2}{5}$$. Without normalization, determining validity is non-trivial.\n\n**Takeaway:** General binomial series requires a unit leading term; factoring normalizes the expression and simultaneously exposes the convergence radius."},{"question":"In the context of the October 2025 P4 Q6, why is the result of the integration $$-2 \\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$ expressed as $$a\\sqrt{3} + b$$, and what conceptual distinction exists between the intermediate factor $$-2$$ and the final constant $$a$$? (2 steps)","answer":"- Step 1: The factor $$-2$$ is a **scalar multiplier** arising from the differential substitution ($$d\\theta = -du/\\sin\\theta$$ and the identity $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$). It scales the entire integrated function but is not itself a coefficient of the final surd form.\n- Step 2: The constants $$a$$ and $$b$$ emerge **after** evaluating the definite integral and combining like terms. The integration of powers of $$u$$ produces terms involving $$\\sqrt{3}$$ and rational numbers. Only after multiplying by $$-2$$ and collecting terms do you identify $$a=8$$ and $$b=-40/3$$.\n+ *Misconception Probe:* Confusing the pre-integral constant with the post-integral coefficient leads to incorrect answers. Always complete the evaluation fully before mapping to the target form $$a\\sqrt{3} + b$$.\n\n**Takeaway:** Intermediate constants scale the process; final constants are structural properties of the evaluated result."},{"question":"Why is the scalar (dot) product listed as \"Not Printed\" in the P4 formula booklet while integration by parts is printed, and what does this imply about the expected fluency level for vector geometry versus calculus in this exam? (2 steps)","answer":"- Step 1: Integration by parts is a **procedural algorithm** with variable choices ($$u, dv$$) that benefits from reference to ensure correct setup. The dot product $$\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta = a_1b_1 + a_2b_2 + a_3b_3$$ is considered a **fundamental definition** in P4, akin to basic arithmetic or Pythagoras.\n- Step 2: The omission signals that vector operations are expected to be **automatic and internalized**. While calculus methods are tools to be applied, vector algebra is viewed as core language. In revision, this means drilling dot product manipulation until it is as fluent as addition, rather than treating it as a formula to be looked up.\n+ *Exam Strategy:* Do not waste mental energy worrying about forgetting the dot product; instead, focus memory on unprinted but required formulas like volume of revolution $$\\pi \\int y^2 dx$$ which are also absent from some booklets but essential.\n\n**Takeaway:** Formula booklet absence indicates foundational status; fluency is assumed, not supported."},{"question":"When solving for intersection parameters in vector lines, why is it permissible to use a calculator for simultaneous equations in Q5 but prohibited in Q4 (implicit differentiation), based on the question rubrics? (2 steps)","answer":"- Step 1: Check the **specific prohibition clause**. Q4 explicitly states \"solutions relying entirely on calculator technology are not acceptable,\" targeting the *method* of differentiation. Q5 lacks this clause, implying standard calculator assistance for algebraic solving is permitted.\n- Step 2: Distinguish **skill assessment targets**. Q4 tests the *calculus technique* of implicit differentiation; using a solver bypasses the assessed skill. Q5 tests the *vector concept* of intersection setup; the algebraic solution of the resulting linear system is secondary to the formulation.\n+ *Practical Note:* Even when allowed, understand the manual method (as practiced in the lesson) because calculator failure or mis-entry is a single point of failure. The lesson's manual derivation of $$\\lambda, \\mu$$ builds resilience.\n\n**Takeaway:** Rubric prohibitions target specific assessed skills; absence of prohibition permits technological assistance for non-core algebra."},{"question":"For the self-assessed gap on volume of revolution ($$y = \\frac{5}{3}\\sqrt{x-1}$$), explain conceptually why the integral setup involves $$y^2$$ rather than $$y$$, and how the constant coefficient $$\\frac{5}{3}$$ behaves differently than in linear integration. (2 steps)","answer":"- Step 1: Volume of revolution sums infinitesimal **disks** with area $$\\pi r^2$$. Since the radius $$r = y$$, the cross-sectional area is proportional to $$y^2$$. Integrating $$y$$ would calculate the area under the curve, not the volume of the solid.\n- Step 2: Squaring the function squares the coefficient: $$(\\frac{5}{3}\\sqrt{x-1})^2 = \\frac{25}{9}(x-1)$$. Unlike linear integration where constants factor out linearly, here the constant scales the volume by its **square**. This amplifies errors in coefficient handling significantly.\n+ *Mental Check:* If you double the function $$y$$, the volume should quadruple (since area scales with square of radius). Your setup must reflect this quadratic sensitivity.\n\n**Takeaway:** Volume integration is inherently quadratic; coefficients and functions are squared before integration."}]},"minimax_1":{"label":"MiniMax M3 ①","cards":[{"question":"In the ESAT nested-squares warm-up, a square has its sides joined at points one-third of the way along, forming an inner square. If the outer square has side split into pieces of length 1 and 2, what is the one-step area ratio of the inner square to the outer square, and why does this ratio stay the same regardless of the original square's size? (3 steps)","answer":"- Step 1: The inner square's side is the hypotenuse of a right triangle with legs 1 and 2 (the two pieces of the outer side). By Pythagoras, inner side = √(1² + 2²) = √5, so inner area = 5.\n- Step 2: The outer square has side 1 + 2 = 3, so outer area = 9. The one-step area ratio is inner/outer = 5/9.\n- Step 3: This ratio is *scale-invariant* because both areas scale as the *square* of any overall length factor k. If we scaled the original square by k, both areas would be multiplied by k², and the ratio (k²·5)/(k²·9) = 5/9 would be unchanged. The fraction depends only on the *relative* position of the join point, not on absolute size.\n\nThe takeaway: when an answer is a pure fraction, you may pick a convenient size because scaling cancels."},{"question":"Going from the first square to the fourth square in the ESAT nested-squares problem, how many times is the area ratio 5/9 applied, and what is the resulting area of the fourth square as a fraction of the original? (2 steps)","answer":"- Step 1: Each iteration multiplies the area by 5/9. Moving from square 1 (outermost) → square 2 → square 3 → square 4 requires **three** applications of the ratio (one per transition).\n- Step 2: The fourth square's area as a fraction of the first is therefore (5/9)³ = 5³/9³ = 125/729. Cubing preserves the numerator/denominator structure because both 5 and 9 are cubed independently.\n\nTakeaway: the exponent on the ratio equals the *number of transitions* between shapes, not the shape number itself."},{"question":"For the ESAT warm-up, why is it strategically sensible to stop over-calculating once the multiple-choice answer 125/729 is identified, and what mental-math items help you reach it quickly? (2 steps)","answer":"- Step 1: In timed multiple-choice, once a unique option matches your derived value, additional computation is wasted time and risks introducing errors. The correct answer is locked in by uniqueness.\n- Step 2: Useful mental-math anchors: 5³ = 125, 9³ = 729, and small cubes/cubes-squares like 2³ = 8, 3³ = 27, 4³ = 64, 9² = 81. Recognising 125 and 729 instantly confirms the structure of (5/9)³ without long division.\n\nTakeaway: memorise the small cubes and squares so structural answers like (5/9)³ are immediately recognisable."},{"question":"Why does the range of f(x) = ln(x² + 3) start at ln 3 and not at −∞, even though ln itself is defined on all positive reals? (3 steps)","answer":"- Step 1: The *input* to ln here is x² + 3, not a free variable. The minimum of x² is 0 (attained at x = 0), so x² + 3 has a *minimum* of 3, not 0.\n- Step 2: Because ln is a *strictly increasing* function, it preserves order. So the smallest value of ln(x² + 3) is attained when x² + 3 is smallest, giving ln(3). All larger inputs give larger outputs, ranging up to +∞.\n- Step 3: Therefore the range is f(x) ≥ ln 3. A common misconception is to say \"the range is all reals\" because ln can output all reals — but here the input is *constrained* by x² + 3 ≥ 3, so the output is constrained correspondingly.\n\nTakeaway: always check the *range of the inner expression* before applying a monotonic function like ln to it."},{"question":"For g(x) = (3 + 5x)/(x + 2), how do you rewrite it in the form A + B/(x+2) to expose its asymptotes, and what are the vertical and horizontal asymptotes? (3 steps)","answer":"- Step 1: Perform polynomial long division of (3 + 5x) by (x + 2). Dividing gives quotient 5 and remainder −7 (since 5(x+2) = 5x+10, and 5x+10 − 7 = 5x+3, which is the original numerator up to sign convention).\n- Step 2: So g(x) = 5 − 7/(x+2). The form A + B/(x+2) has A = 5 (horizontal asymptote) and vertical asymptote at x = −2 (where the denominator vanishes).\n- Step 3: The sign of B = −7 tells you which branch of the hyperbola: negative B means the function is on the side where the original 1/x graph is reflected in x (h(x) = −1/x shape). The vertical asymptote is *always* at the zero of the denominator; the horizontal asymptote is *always* the quotient A.\n\nTakeaway: rewriting as A + B/(x+a) is the cleanest way to read off both asymptotes at once."},{"question":"For g(x) = 5 − 7/(x + 2) with x > −2, what is the range of g, and what is the domain of its inverse function g⁻¹? (3 steps)","answer":"- Step 1: The graph is a hyperbola with vertical asymptote x = −2 and horizontal asymptote y = 5. With x > −2, only the *right* branch is kept. The right branch of 5 − 7/(x+2) lies *below* the horizontal asymptote y = 5 (because as x → −2⁺, the term −7/(x+2) → −∞, and as x → +∞, the term → 0⁻ from below).\n- Step 2: So the range of g (the set of y-values achieved) is y < 5.\n- Step 3: An inverse function g⁻¹ swaps inputs and outputs. The domain of g⁻¹ equals the range of g, and the range of g⁻¹ equals the domain of g. So the domain of g⁻¹ is x < 5. Always state the inverse's domain using x and the original function's range using y to avoid confusion.\n\nTakeaway: when stating inverses, use x for the new function's domain and y for the original's range — they swap roles."},{"question":"In the prior P3 review on function composition, what is the diagnostic error Harry flagged, and why does substituting the functions in the wrong order produce \"logarithms on both sides\"? (2 steps)","answer":"- Step 1: The error was substituting f and g in the *wrong order* in a composition. If a problem asks for an expression like f(g(x)) but the learner plugs x into f first and g second (or vice versa), the inner and outer functions are swapped.\n- Step 2: For functions involving ln, the wrong order typically forces you to take a logarithm of an already-logarithmic expression, leading to ln(ln(...)) or similar nested logs on both sides of an equation — a structural signal that the composition order is wrong. The fix is to identify which function is the *outer* one (applied last) and which is *inner* (applied first), then substitute accordingly.\n\nTakeaway: when you see nested logs or transcendental functions appearing on \"both sides,\" check the composition order before doing more algebra."},{"question":"In October 2025 P4 Q4, the curve C is given by 4x² + y² − 2xy = 24x. When differentiating implicitly, what is the derivative of y² with respect to x, and what is the derivative of the product xy? (2 steps)","answer":"- Step 1: d/dx(y²) = 2y·(dy/dx) by the chain rule. The derivative of the inside y is dy/dx, and the power rule gives the outer factor 2y.\n- Step 2: d/dx(xy) = x·(dy/dx) + y by the product rule (first·d(second) + second·d(first)). The \"first\" is x, the \"second\" is y, so d(xy)/dx = 1·y + x·(dy/dx) = y + x·(dy/dx).\n\nTakeaway: in implicit differentiation, every occurrence of y contributes a factor of dy/dx via the chain rule, and every product of x and y contributes via the product rule — combine them carefully."},{"question":"In the worked correction of Q4(a), the learner got the numerator right (12 − 4x + y) but the denominator wrong (just y, missing −x). What is the correct way to bracket the product-rule term so the −x survives? (3 steps)","answer":"- Step 1: The original equation is 4x² + y² − 2xy = 24x. Differentiating term by term gives 8x + 2y·(dy/dx) − 2·d(xy)/dx = 24.\n- Step 2: The trap is to expand d(xy)/dx as y + x·(dy/dx) immediately, then distribute the −2. The distribution gives −2y − 2x·(dy/dx), and the −2x on dy/dx can be visually confused with the 2y·(dy/dx) term. To keep things clean, keep the *whole* product-rule derivative bracketed first: −2·(x·(dy/dx) + y).\n- Step 3: Then gather the dy/dx terms: 2y·(dy/dx) − 2x·(dy/dx) = (2y − 2x)·(dy/dx). Move the non-dy/dx terms to the right: (2y − 2x)·(dy/dx) = 24 − 8x + 2y. Divide to get dy/dx = (12 − 4x + y)/(y − x). Bracketing *first* then distributing is the safe habit.\n\nTakeaway: when a product-rule derivative is multiplied by a constant, bracket the whole thing before expanding — otherwise signs on x and y get tangled."},{"question":"For Q4(b), why is the fact that P(a, b) lies on the curve C the *second* equation needed, and what is the second equation? (2 steps)","answer":"- Step 1: The gradient equation dy/dx = 2 at P gives one relation between a and b. With two unknowns and one equation, you cannot solve — you need a second, independent equation.\n- Step 2: Because P(a, b) lies on the curve, it must satisfy the curve's equation. Substituting x = a and y = b into 4x² + y² − 2xy = 24x gives 4a² + b² − 2ab = 24a. This is the second equation, and together with b = 12 − 2a (from the gradient condition), the system is solvable.\n\nTakeaway: \"lies on the curve\" is a hidden second equation whenever you have a point on an implicit curve."},{"question":"In Q4(b), the linear relation from the gradient condition is b = 12 − 2a. Where does this come from, and what is the tutor slip recorded about choosing a vs b? (3 steps)","answer":"- Step 1: Set dy/dx = 2 at P(a, b): (12 − 4a + b)/(b − a) = 2. Cross-multiply: 12 − 4a + b = 2(b − a) = 2b − 2a. Rearrange: 12 − 4a + b − 2b + 2a = 0, so 12 − 2a − b = 0, giving b = 12 − 2a.\n- Step 2: Substitute b = 12 − 2a into 4a² + b² − 2ab = 24a. Expanding: 4a² + (12 − 2a)² − 2a(12 − 2a) = 24a. Compute (12 − 2a)² = 144 − 48a + 4a², and −2a(12 − 2a) = −24a + 4a². Sum: 4a² + 144 − 48a + 4a² − 24a + 4a² = 24a, so 12a² − 72a + 144 = 24a, giving 12a² − 96a + 144 = 0, i.e. a² − 8a + 12 = 0.\n- Step 3: Factor: (a − 2)(a − 6) = 0, so a = 2 or a = 6, giving b = 8 or b = 0. The constraint b > 0 selects b = 8, so P = (2, 8). *Tutor slip:* Harry suggested in lesson that Phuc might get one positive and one negative b and reject the negative — but the actual algebra gives b = 0 and b = 8, so the rejection is of b = 0, not a negative b.\n\nTakeaway: when filtering solutions, always plug back to see the actual values, not the expected sign pattern."},{"question":"In Q5, two lines are given in vector form. Write down the two vector equations and identify the system of component equations that arises when the lines intersect. (2 steps)","answer":"- Step 1: l₁: r = (2, −1, 3) + λ(1, 4, 2); l₂: r = (−1, β, 6) + μ(2, −1, 7). At the intersection, r₁ = r₂.\n- Step 2: Equating components gives three scalar equations: (1) 2 + λ = −1 + 2μ; (2) −1 + 4λ = β − μ; (3) 3 + 2λ = 6 + 7μ. With three equations and three unknowns (λ, μ, β), the system is determined. The first and third equations have no β, so solve them first to get λ and μ, then use the second to find β.\n\nTakeaway: at the intersection of two 3D lines, you always get exactly three scalar equations — one per coordinate. Choose the pair without the parameter you want to find last."},{"question":"In Q5, why does Harry allow a calculator's simultaneous-equation solver here, and what are the values of λ and μ from the official solution? (2 steps)","answer":"- Step 1: Q5 has *no* \"calculator technology not acceptable\" instruction, unlike many other P4 questions. The 2025 paper prints that restriction only on questions where algebraic working is essential (e.g. Q4, Q6). So in Q5, the simultaneous equations can be solved with a calculator's solver.\n- Step 2: From equations (1) and (3): 2 + λ = −1 + 2μ gives λ = −3 + 2μ. Substituting into (3): 3 + 2(−3 + 2μ) = 6 + 7μ ⇒ 3 − 6 + 4μ = 6 + 7μ ⇒ −3 + 4μ = 6 + 7μ ⇒ −3μ = 9 ⇒ μ = −3. Then λ = −3 + 2(−3) = −9. The values are λ = −9 and μ = −3.\n\nTakeaway: the \"no calculator\" instruction is question-specific — check the printed rubric on the question you're working."},{"question":"With λ = −9 and μ = −3 in Q5, find β and the coordinates of the intersection point P. (2 steps)","answer":"- Step 1: From equation (2), −1 + 4λ = β − μ. Substitute λ = −9 and μ = −3: −1 + 4(−9) = β − (−3) ⇒ −1 − 36 = β + 3 ⇒ −37 = β + 3 ⇒ β = −40.\n- Step 2: Substitute λ = −9 into l₁: P = (2, −1, 3) + (−9)(1, 4, 2) = (2 − 9, −1 − 36, 3 − 18) = (−7, −37, −15). So β = −40 and P = (−7, −37, −15). Both row-vector and column-vector presentations are accepted.\n\nTakeaway: when you find the parameter, plug into *either* line equation (they agree at intersection) — the one with the simpler arithmetic."},{"question":"In Q6, the integral is ∫₀^{π/2} sin 2θ / √(3 + cos θ) dθ. The substitution u = 3 + cos θ is given. Express du/dθ and the new limits when θ goes from 0 to π/2. (2 steps)","answer":"- Step 1: du/dθ = −sin θ (the derivative of cos θ is −sin θ, and 3 is constant). So dθ = −du/sin θ.\n- Step 2: When θ = 0, u = 3 + cos 0 = 3 + 1 = 4. When θ = π/2, u = 3 + cos(π/2) = 3 + 0 = 3. So θ: 0 → π/2 maps to u: 4 → 3. Note the order: the upper θ-limit maps to the *lower* u-limit, so the integral's direction in u is \"from 4 down to 3\" before flipping with the minus sign from dθ.\n\nTakeaway: when changing variables, transform limits in the same direction (θ = 0 maps first, θ = upper-limit maps second) — don't reorder them."},{"question":"In Q6, sin 2θ needs to be replaced before the substitution can proceed. Use the double-angle identity to write sin 2θ in a form that uses sin θ (which the dθ substitution will cancel). (2 steps)","answer":"- Step 1: The double-angle identity is sin 2θ = 2 sin θ cos θ. This is essential because dθ = −du/sin θ, so a sin θ in the numerator will cancel against the sin θ in dθ, leaving a clean du-integral.\n- Step 2: The integrand becomes (2 sin θ cos θ)/√(3 + cos θ) dθ. Replace cos θ with (u − 3) (from u = 3 + cos θ) and dθ with −du/sin θ. The sin θ cancels: (2 sin θ (u − 3))/√u · (−du/sin θ) = −2(u − 3)/√u · du. The new integrand in u is −2(u − 3)/u^{1/2}.\n\nTakeaway: choose the substitution so that the leftover differential cancels a factor in the integrand — this is the structural reason for picking u = 3 + cos θ."},{"question":"After the substitution in Q6, the integrand becomes −2(u − 3)/u^{1/2}. Why is \"taking cos θ outside as a constant\" wrong here, and what is the right way to handle the (u − 3) factor? (2 steps)","answer":"- Step 1: cos θ is *not* constant across the integration — it varies from 1 (at θ = 0) to 0 (at θ = π/2). Treating it as a constant would be a fundamental error. The correct way is to replace cos θ with u − 3, *inside* the integrand, so it becomes a function of u only.\n- Step 2: Once in u, split the factor: (u − 3)/u^{1/2} = u/u^{1/2} − 3/u^{1/2} = u^{1/2} − 3u^{−1/2}. The integral is now −2 ∫₄³ (u^{1/2} − 3u^{−1/2}) du — a sum of two simple power-rule integrals.\n\nTakeaway: after substitution, every remaining trig function must be expressed in u before any further manipulation; constants must come only from things that are actually constant."},{"question":"Complete the Q6 integration: evaluate −2 ∫₄³ (u^{1/2} − 3u^{−1/2}) du. What are the constants a and b in the result a√3 + b? (3 steps)","answer":"- Step 1: Apply the power rule. ∫ u^{1/2} du = (2/3)u^{3/2} and ∫ u^{−1/2} du = 2u^{1/2}. So the antiderivative is −2·[(2/3)u^{3/2} − 3·2u^{1/2}] = −2·[(2/3)u^{3/2} − 6u^{1/2}] = −(4/3)u^{3/2} + 12u^{1/2}.\n- Step 2: Evaluate from 4 to 3. At u = 3: −(4/3)·3^{3/2} + 12·3^{1/2} = −(4/3)·3√3 + 12√3 = −4√3 + 12√3 = 8√3. At u = 4: −(4/3)·4^{3/2} + 12·4^{1/2} = −(4/3)·8 + 12·2 = −32/3 + 24 = (−32 + 72)/3 = 40/3.\n- Step 3: Subtract: [value at 3] − [value at 4] = 8√3 − 40/3. So the integral equals 8√3 − 40/3, giving a = 8 and b = −40/3. The outside −2 from the substitution is *not* a — a and b are read off the final evaluated expression.\n\nTakeaway: a and b in \"a√3 + b\" are the literal coefficients in the simplified final form; intermediate factors like the leading −2 don't survive into a and b."},{"question":"Q1(a) asks for the first four terms, in ascending powers of x, of (2 + 5x)⁻². Why is the general binomial series needed (not the simple \"1 + nx\" formula), and what is the *first* algebraic move? (2 steps)","answer":"- Step 1: The simple binomial approximation 1 + nx is only valid for n = 1 or as a first-order approximation when x is small. Here, n = −2 is a *negative integer*, so the expansion is an *infinite* series with alternating signs and growing coefficients — only the general binomial series handles it.\n- Step 2: The first move is to factor out 2 from the bracket so that the bracket starts with 1: (2 + 5x)⁻² = 2⁻² · (1 + (5/2)x)⁻². The general series (1 + y)ⁿ = 1 + ny + n(n−1)y²/2! + n(n−1)(n−2)y³/3! + ... can now be applied with y = (5/2)x and n = −2.\n\nTakeaway: a negative index on a binomial always triggers the *general* series, never a finite expansion."},{"question":"For (2 + 5x)⁻² = 2⁻²(1 + (5/2)x)⁻², write out the first four terms in ascending powers of x. (2 steps)","answer":"- Step 1: Apply (1 + y)ⁿ with n = −2, y = (5/2)x. The general term coefficient is n(n−1)(n−2)...(n−k+1)/k!. For k = 0: 1. k = 1: −2. k = 2: (−2)(−3)/2 = 6/2 = 3. k = 3: (−2)(−3)(−4)/6 = −24/6 = −4. So (1 + y)⁻² = 1 − 2y + 3y² − 4y³ + ...\n- Step 2: Substitute y = (5/2)x and multiply by 2⁻² = 1/4. Term 0: (1/4)·1 = 1/4. Term 1: (1/4)·(−2)·(5/2)x = (1/4)·(−5)x = −5x/4. Term 2: (1/4)·3·(5/2)²x² = (1/4)·3·(25/4)x² = 75x²/16. Term 3: (1/4)·(−4)·(5/2)³x³ = (1/4)·(−4)·(125/8)x³ = −125x³/8. The first four terms are 1/4 − 5x/4 + 75x²/16 − 125x³/8.\n\nTakeaway: in the general binomial, the pattern of coefficients 1, n, n(n−1)/2, ... continues for as many terms as needed; substitute y and the outside factor at the end."},{"question":"Q1(b) asks for the values of x for which the expansion of (2 + 5x)⁻² is valid. What is the validity condition, and what does it mean? (2 steps)","answer":"- Step 1: The general binomial series (1 + y)ⁿ converges for |y| < 1 (the formula booklet states this). Here y = (5/2)x, so the validity condition is |(5/2)x| < 1, i.e. |x| < 2/5.\n- Step 2: This means the *approximation* given by the truncated series is only accurate when x is small enough in magnitude — strictly less than 2/5 in absolute value. Outside this range, the series diverges or the truncated polynomial no longer approximates the original function.\n\nTakeaway: for any (1 + (something)x)ⁿ form, the validity interval is determined by |(something)x| < 1, and \"something\" is the coefficient of x in the bracket."},{"question":"Q1(c) says 4/(2 + 5x)² ≈ a + bx + cx². Using Q1(a)'s expansion, what are a, b, c? (1 step)","answer":"- Step 1: Note 4/(2 + 5x)² = 4·(2 + 5x)⁻² = 4·(1/4 − 5x/4 + 75x²/16 − 125x³/8 + ...) = 1 − 5x + 75x²/4 − ... So a = 1, b = −5, c = 75/4. *Wait — the official mark scheme gives a = 4, b = −20, c = 75.* This means Q1(c) is *not* 4/(2+5x)² in the simplified form; rather, the question asks for 4/(2+5x)² written *as* a + bx + cx² where the coefficients come from a different scaling. The official values 4, −20, 75 suggest the question form is 4·(1 + (5/2)x)⁻² ≈ a + bx + cx², with a = 4·(1/4)·4 = ... Actually, the cleanest reading is that the \"4\" in the numerator multiplies (1/4 − 5x/4 + 75x²/16) to give 1 − 5x + 75x²/4 — but the official 4, −20, 75 is 4× scaled: 4·(1/4) = 1, but they want 4 — so the question is stated as 4/(2+5x)² = 4·(2+5x)⁻² with the expansion of (2+5x)⁻² giving 1/4 − 5x/4 + 75x²/16; multiplying by 4 gives 1 − 5x + 75x²/4. If the official answer is a = 4, b = −20, c = 75, the question's actual form must be different — likely 16/(2+5x)² or similar. The reference Q1(c) answer a = 4, b = −20, c = 75 is taken from the official mark scheme and treated as authoritative; the algebraic derivation depends on the exact wording which the lesson deferred to Phuc.\n\nTakeaway: when an expansion is multiplied by a constant, every coefficient is multiplied by that constant — but the *given* form in Q1(c) must be read carefully before claiming the multiplication."},{"question":"Q2 is the volume of revolution of y = (5/3)√(x−1) for 2 ≤ x ≤ 8, rotated 2π about the x-axis. What is the formula for volume of revolution about the x-axis, and what is the conceptual reason for the π∫y²dx formula? (2 steps)","answer":"- Step 1: The volume formula is V = π ∫ₐᵇ y² dx, where y is expressed as a function of x. The factor π accounts for the rotational symmetry (each thin disk has area π·y²), and the integral sums the disk volumes along the axis.\n- Step 2: Conceptually, imagine slicing the solid perpendicular to the x-axis into infinitesimally thin disks of thickness dx. Each disk has radius |y(x)| and volume π·y²·dx. The integral sums all these disks from x = a to x = b, giving the total volume.\n\nTakeaway: volume of revolution about the x-axis is the integral of *disk areas* πy² along the x-direction; about the y-axis it would be πx² along the y-direction."},{"question":"Q8 is the differential equation dV/dt = 12t·e⁻ᵗ with V(0) = 6. What type of ODE is this, and what is the *first* integration step? (2 steps)","answer":"- Step 1: This is a *first-order separable* ODE: dV/dt is expressed as a function of t alone, and there is no V on the right-hand side. Separation gives dV = 12t·e⁻ᵗ dt, which can be integrated directly.\n- Step 2: Integrate both sides: V = ∫ 12t·e⁻ᵗ dt. This is an *integration by parts* integral (because it's a product of a polynomial and an exponential). Set u = 12t, dv = e⁻ᵗ dt (or equivalently u = t, dv = 12e⁻ᵗ dt). The result, with the initial condition V(0) = 6 applied, gives the official V = 18 − 12te⁻ᵗ − 12e⁻ᵗ.\n\nTakeaway: \"separable\" means dV/dt = f(t)g(V); here g(V) = 1, so V is recovered by a pure t-integral, but the integrand's structure (t·e⁻ᵗ) requires integration by parts."},{"question":"Q8's official solution is V = 18 − 12te⁻ᵗ − 12e⁻ᵗ. The question is about whether a capacity of 20 is ever reached. Conceptually, why is the answer \"no\" and what does this mean for V as t → ∞? (2 steps)","answer":"- Step 1: As t → ∞, both te⁻ᵗ and e⁻ᵗ → 0 (exponential decay beats polynomial growth). So V(t) → 18 − 0 − 0 = 18. The volume approaches a horizontal asymptote at V = 18.\n- Step 2: Since 18 < 20, the capacity of 20 is *never* reached. The \"tank\" fills asymptotically toward 18, never crossing the 20 threshold. This is a hallmark of decay-modulated filling: dV/dt = 12t·e⁻ᵗ decays (after its maximum) because e⁻ᵗ dominates, so the inflow rate diminishes to zero.\n\nTakeaway: when modelling capacity questions, examine the long-term limit of the solution; if it asymptotes below the capacity, the capacity is never reached regardless of time elapsed."},{"question":"Phuc's self-assessed note for Q6 said \"using cosine rule.\" Why is this mistaken, and what method does Q6 actually require? (2 steps)","answer":"- Step 1: Q6 is a trigonometric integration, not a geometry problem. The \"cosine rule\" applies to side-angle-side relationships in triangles; it has no direct role in evaluating ∫ sin 2θ / √(3 + cos θ) dθ.\n- Step 2: Q6 requires the *double-angle identity* sin 2θ = 2 sin θ cos θ and the *substitution* u = 3 + cos θ. The double-angle identity converts the integrand into a form where the sin θ factor cancels against dθ, leaving a power-rule integral in u. There is no triangle and no cosine rule involved.\n\nTakeaway: always re-read the question stem and identify the *actual* technique required; a self-note that names an unrelated method is a red flag for misreading the problem."},{"question":"In the formula register, the general binomial series is marked as \"Printed\" in the booklet but P4 *assesses rational n*. What is the difference between \"printed\" and \"assessed,\" and why does this matter for revision? (2 steps)","answer":"- Step 1: \"Printed in the booklet\" means the *formula* is supplied in the exam — you don't need to memorise it. \"Assessed with rational n\" means the *type of problem* involves rational (not just integer) indices, so you must understand the structure of the series, not just look it up.\n- Step 2: For revision, this means: you can save memorisation effort on the formula itself, but you must *practise* applying it with rational n, with the validity condition |y| < 1, and with multiple bracket transformations (factor out the leading constant first).\n\nTakeaway: \"printed\" frees you from memorising the formula but doesn't free you from understanding the *conditions* and the *technique* of applying it."},{"question":"The scalar (dot) product is marked as \"Not printed — must be remembered\" for P4. Why is this one of the few P4 formulas that isn't in the booklet, and what is the scalar product formula you must recall? (2 steps)","answer":"- Step 1: The formula booklet supplies standard algebraic, trigonometric, and calculus identities, but vector operations (dot product, cross product) are not in the booklet. This is a deliberate specification choice — P4 candidates are expected to know and apply vector formulas from memory.\n- Step 2: The scalar product is **a·b = |a||b|cos θ** (where θ is the angle between them) and equivalently **a·b = a₁b₁ + a₂b₂ + a₃b₃** in components. Both forms are essential: the angle form for finding angles, the component form for computation.\n\nTakeaway: the scalar product is one of the small set of P4 formulas you *must* memorise — know both the angle and component forms and when each is useful."},{"question":"Q4(b) was deferred to Phuc with the sticky \"Phuc to finish this one off.\" What three concrete sub-tasks does this deferral involve? (3 steps)","answer":"- Step 1: Substitute b = 12 − 2a into 4a² + b² − 2ab = 24a, expanding carefully. The b² term gives (12 − 2a)² = 144 − 48a + 4a², and the −2ab term gives −2a(12 − 2a) = −24a + 4a². Combine with 4a² to get 12a² − 72a + 144 = 24a, i.e. 12a² − 96a + 144 = 0, simplifying to a² − 8a + 12 = 0.\n- Step 2: Factor the quadratic: (a − 2)(a − 6) = 0, giving a = 2 or a = 6. Compute the corresponding b values: if a = 2, b = 12 − 4 = 8; if a = 6, b = 12 − 12 = 0.\n- Step 3: Apply the constraint b > 0: b = 0 is rejected, b = 8 is accepted. So P = (2, 8). Write the final answer with a, b clearly stated and the rejection of the other candidate explained.\n\nTakeaway: deferred questions need three things — substitution, solving, and selection with the constraint explicitly invoked."},{"question":"In the formula register, the volume of revolution formula π∫y²dx is \"Not printed as such\" but is \"Required\" for P4. What is the conceptual reasoning behind rotating a curve y = f(x) about the x-axis producing π∫y²dx? (2 steps)","answer":"- Step 1: At each x-value, the curve y = f(x) sits at height f(x) above the x-axis. When the curve is rotated 2π about the x-axis, it sweeps out a circular disk of radius |f(x)| and area π·(f(x))². The disk's thickness is dx, so its volume is π·(f(x))²·dx.\n- Step 2: To get the total volume, sum (integrate) these infinitesimal disk volumes along the x-axis from the start of the region to the end: V = ∫ₐᵇ π·y² dx = π∫ₐᵇ y² dx. The π is a constant factor outside the integral.\n\nTakeaway: π∫y²dx is the \"stack of disks\" picture — each disk has area π·radius², and integrating stacks them along the rotation axis."},{"question":"In the formula register, \"π∫x² dy\" is listed as \"mathematically valid but not required for P4.\" What does this represent, and why isn't it in P4's assessed formula set? (2 steps)","answer":"- Step 1: π∫x² dy is the volume of revolution when the curve is rotated about the *y*-axis (so the radius is x, and the integration is along y). It is the y-axis analogue of π∫y²dx for the x-axis.\n- Step 2: P4's specification only requires volumes of revolution about the x-axis using π∫y²dx. The π∫x²dy form is mathematically equivalent in concept but not in the assessed formula set, so P4 students need only memorise the x-axis form. Spec boundaries — not just mathematical validity — determine what to revise.\n\nTakeaway: knowing the spec's required formulas saves revision time; \"mathematically valid\" doesn't mean \"in the exam.\""},{"question":"Q1 was hinted at the very end of the lesson. What is the single algebraic transformation Harry told Phuc to perform, and why does it work for a negative index? (2 steps)","answer":"- Step 1: Harry told Phuc to factor out 2 from the bracket: (2 + 5x)⁻² = 2⁻² · (1 + (5/2)x)⁻². The 2⁻² becomes a constant multiplier (1/4), and the bracket now begins with 1, which is the form required by the general binomial series.\n- Step 2: This works for any index — including negative ones — because (ka)ⁿ = kⁿ·aⁿ distributes the constant k outside, leaving the (1 + ...) form ready for the general series. The general series only applies to expansions of (1 + y)ⁿ, so restructuring the bracket to start with 1 is *always* the first move.\n\nTakeaway: the first move in any general binomial expansion is to make the bracket start with 1 — factor out the constant, then apply the series."},{"question":"The lesson closed with a clear exchange and not an abrupt cut-off. What were the immediate to-dos that emerged from the lesson, and which are P4-paper tasks vs which are meta-tasks? (2 steps)","answer":"- Step 1: **P4 paper tasks (deferred work):** (1) Finish Q4(b) — substitute b = 12 − 2a, solve, select P = (2, 8) by b > 0. (2) Finish Q5 — compute β = −40 and P = (−7, −37, −15) from λ = −9, μ = −3. (3) Finish Q6 — integrate to get 8√3 − 40/3, so a = 8 and b = −40/3. (4) Continue Q1 — expand 2⁻²(1 + (5/2)x)⁻² for parts (a)–(c).\n- Step 2: **Meta-tasks (not P4 paper questions):** (5) Revise self-assessed gaps (Q2, Q8, Q9) before the next session. (6) Harry will mark Google Drive work and send a link. (7) Return to the skipped ESAT item. (8) Continue the prior P3 review (range, inverse, composition order).\n\nTakeaway: a \"deferred to Phuc\" sticky is a paper task, not a meta-task; a \"next session\" item is meta. The two must be tracked separately so neither is forgotten."},{"question":"Q3, Q7, Q9(b) and Q10 carry \"no lesson status\" in this guide. What does this label mean, and how should a learner treat such questions? (2 steps)","answer":"- Step 1: \"No lesson status\" means the question was *not* discussed in this lesson — neither attempted, corrected, nor referenced with an official answer. The label is *neutral*: it does not mean the learner has mastered or failed the question, nor that it was deliberately skipped. It simply was not part of the 26 June 2026 lesson.\n- Step 2: A learner should treat such questions as \"untouched\" — to be attempted independently, with marking against the official mark scheme later. Drawing any conclusion about mastery from \"no lesson status\" is unwarranted.\n\nTakeaway: distinguish between \"self-assessed gap\" (learner flagged, not taught) and \"no lesson status\" (not even mentioned) — both are untouched but the labels mean different things."},{"question":"In the ESAT warm-up, Phuc recognised that scaling the original square does not change a fractional answer. Why is this property (scale-invariance of ratios) a useful test before doing any work on a similar-fraction problem? (2 steps)","answer":"- Step 1: If the answer is asked as a *fraction* of an original quantity, you can choose the most convenient size for the original (e.g. side = 3) without loss of generality. The ratio is dimensionless, so the units/size cancel.\n- Step 2: This saves time: instead of carrying a variable like L through the whole calculation, set L to a number that makes arithmetic easy (like 1, 2, or 3), and the final fraction is the same. It's a special case of \"WLOG\" (without loss of generality) reasoning.\n\nTakeaway: whenever a problem asks for a ratio, fraction, or percentage, ask \"can I set the original size to a convenient number?\" If yes, do so before computing."},{"question":"Harry recommended memorising common squares and cubes (2³, 3³, 4³, 5³ = 125, 9³ = 729) for the ESAT. How does this connect to the structural recognition of (5/9)³ = 125/729? (2 steps)","answer":"- Step 1: The answer (5/9)³ has the structure \"small integer cubed over small integer cubed.\" If you instantly know 5³ = 125 and 9³ = 729, you can verify the answer structure without doing long division or repeated multiplication.\n- Step 2: In a multiple-choice context, recognising 125 and 729 in the options (and confirming they are 5³ and 9³) tells you the answer matches (5/9)³ without computing the cube the long way. This shifts the time cost from \"compute\" to \"recognise,\" freeing mental bandwidth for harder questions.\n\nTakeaway: pre-computed small powers are *pattern-matching* tools — they let you verify structural answers quickly rather than compute them."},{"question":"In Q4(a), the printed instruction says \"show all stages; solutions relying entirely on calculator technology are not acceptable.\" What does this restriction forbid, and what does it *not* forbid? (2 steps)","answer":"- Step 1: It forbids using a calculator's symbolic-differentiation or implicit-differentiation feature (e.g. CAS) to produce the derivative in one step without showing the chain rule, product rule, and algebra. The *method* must be visible.\n- Step 2: It does *not* forbid using a calculator for arithmetic (e.g. multiplying out terms, simplifying a fraction numerically). It also does not forbid a calculator for questions *without* this instruction (like Q5). The restriction is method-specific, not blanket.\n\nTakeaway: read the printed rubric on each question — \"no calculator\" in P4 is question-specific, not paper-wide."},{"question":"In Q5, Harry advised writing the final coordinates of P as a row rather than a column. The official mark scheme also accepts a column vector. What is the rationale for the row recommendation, and when might a column vector be preferable? (2 steps)","answer":"- Step 1: The row form (x, y, z) is faster to write and matches the way the question's position vectors were given (as rows). For a single-point answer, it's the most economical presentation.\n- Step 2: A column vector is preferable when the answer is to be used in *further* vector operations (like computing a direction vector by subtraction, or multiplying by a scalar matrix) — column vectors compose more naturally with linear-algebra notation. Since Q5's answer is a final stand-alone point, the row form is preferred for clarity and speed.\n\nTakeaway: choose the vector presentation to match the operation — rows for \"read this off,\" columns for \"operate on this.\""},{"question":"Q6's official answer is 8√3 − 40/3. The lesson stopped at the integrand −2∫₄³(u^{1/2} − 3u^{−1/2}) du. Walk through the integration of this final form step by step, treating it as a *conceptual* exercise, not a calculation drill. (3 steps)","answer":"- Step 1: The integrand is a sum of two power functions in u. The power rule ∫uⁿ du = uⁿ⁺¹/(n+1) applies to each. For u^{1/2}, the antiderivative is u^{3/2}/(3/2) = (2/3)u^{3/2}. For −3u^{−1/2}, the antiderivative is −3·u^{1/2}/(1/2) = −6u^{1/2}. So the *un-evaluated* antiderivative (inside the brackets) is (2/3)u^{3/2} − 6u^{1/2}.\n- Step 2: Multiply by the leading −2 outside: −2·[(2/3)u^{3/2} − 6u^{1/2}] = −(4/3)u^{3/2} + 12u^{1/2}. Evaluate at u = 3: −(4/3)·3√3 + 12·√3 = −4√3 + 12√3 = 8√3. Evaluate at u = 4: −(4/3)·8 + 12·2 = −32/3 + 24 = 40/3.\n- Step 3: Subtract [u = 3] − [u = 4] = 8√3 − 40/3. So the integral equals 8√3 − 40/3, giving a = 8 (coefficient of √3) and b = −40/3 (constant term). The a and b are *read off* the final expression, not the leading factor.\n\nTakeaway: when an integral evaluates to a√3 + b, the values of a and b are extracted by inspecting the final simplified form — no intermediate leading factor (like −2) survives into a or b."},{"question":"Author-created practice: find the volume when y = √x, 0 ≤ x ≤ 4, is rotated 2π about the x-axis. Why is this a good warm-up for Q2's full method? (2 steps)","answer":"- Step 1: The setup π∫y² dx applies directly: y² = (√x)² = x, so V = π∫₀⁴ x dx. The integration is the simplest power rule: ∫x dx = x²/2, evaluated from 0 to 4: (4² − 0²)/2 = 16/2 = 8. So V = 8π.\n- Step 2: This isolates the *structural* steps of volume of revolution (identify the formula, square y, integrate over x, evaluate) without any of Q2's complicating factors (a constant multiple 5/3, a shift x − 1, a non-unit lower bound). Practising it as a warm-up builds the muscle memory before tackling the harder Q2.\n\nTakeaway: drill the structure of a technique with the simplest possible example before applying it to a harder one — same shape, less arithmetic noise."},{"question":"In Q6, Phuc correctly mapped the lower limit (θ = 0) to u = 4 after discussion. Why might a learner get the limit mapping wrong, and what's the conceptual fix? (2 steps)","answer":"- Step 1: A common error is to swap the limits — thinking \"u goes from 3 to 4 because the lower θ-limit is at the smaller u-value\" — but the substitution *preserves* the order of integration. θ increasing from 0 to π/2 means u *decreasing* from 4 to 3, so the u-integral naturally has lower limit 4 and upper limit 3.\n- Step 2: The conceptual fix is to remember: limits are transformed in the *same* direction as the original variable. Don't reorder them to \"look nice\"; instead, let the minus sign from dθ = −du/sin θ compensate. If you accidentally swap limits, the minus sign will appear twice (once from dθ, once from the swap) and cancel — leading to a wrong sign in the answer. The correct form keeps the original order (4 to 3) and the minus sign once.\n\nTakeaway: in definite integrals under substitution, transform limits in the same direction as the original; don't reorder to \"make it look increasing\" — let the differential's sign handle the direction."},{"question":"Q4(a) requires \"simplest form\" for dy/dx. The lesson reached dy/dx = (12 − 4x + y)/(y − x). What simplification checks confirm this is in simplest form? (2 steps)","answer":"- Step 1: Check that the numerator and denominator share no common factor. 12, −4, 1, 1 (coefficients of 1, x, y in the numerator; 1, −1 in the denominator) — gcd of all six coefficients is 1, so no scalar factor to extract. The numerator has three terms; the denominator has two; they are not multiples of each other.\n- Step 2: Check that the form is \"factor-of-dy/dx = expression.\" The factor (y − x) is non-zero wherever the curve has a defined gradient (it is the implicit-curve analogue of dx/dy ≠ 0). The simplest form is achieved when no further cancellation is possible, which it isn't here.\n\nTakeaway: \"simplest form\" for a derivative means no common factor between numerator and denominator, and no obvious rearrangement that would make the structure clearer."},{"question":"In Q4(b), once Phuc had b = 12 − 2a, he proposed substituting into the curve equation. Why is substitution the right next move, and what role does the \"lies on the curve\" condition play conceptually? (2 steps)","answer":"- Step 1: Substitution reduces a two-variable system (a, b) to a one-variable equation in a alone. Once b is expressed in terms of a, the curve equation 4a² + b² − 2ab = 24a becomes a quadratic in a, which is solvable.\n- Step 2: Conceptually, the gradient condition tells you the *direction* of the curve at P, and the curve-equation condition tells you the *position* of P. Together they pin down the point. Without either, you have an underdetermined system.\n\nTakeaway: gradient + lies-on-curve is a complete \"where + how steep\" pair; each gives one equation, and together they fix the point on a 1D curve in 2D."},{"question":"In Q5, Phuc was told to use equations (1) and (3) — the ones without β — to find λ and μ first. Why is this a sound strategy? (2 steps)","answer":"- Step 1: Equations (1) and (3) involve only λ and μ (no β), so they form a 2×2 system that can be solved directly. Once λ and μ are known, equation (2) becomes a single-variable equation in β, trivially solved by substitution.\n- Step 2: This is the general strategy for \"find three unknowns with three equations, one of which has a special parameter\": solve the equations *without* the special parameter first, then back-substitute. It minimises algebra because the special parameter is isolated to one equation.\n\nTakeaway: when one unknown is \"special\" (e.g. a parameter to be found), solve for the other unknowns first, then back-substitute to find the special one. The special unknown's equation is your *last* step, not your *first*."},{"question":"In Q4(a), the lesson used the bracket-first approach: −2(x·(dy/dx) + y) before expanding. What is the parallel lesson for the volume-of-revolution formula π∫y²dx when y is a sum (e.g. y = a + b)? (1 step)","answer":"- Step 1: By analogy, when y = a + b, you must square the *whole* sum: y² = (a + b)² = a² + 2ab + b². You cannot square a and b separately and add — (a + b)² ≠ a² + b². The same \"bracket the whole thing first\" habit applies: don't expand prematurely, keep the structure intact until you're ready to use a known identity (like (a+b)² = a² + 2ab + b² or the product rule expansion).\n\nTakeaway: a common algebraic habit — bracket first, then expand using a known identity — applies across differentiation, integration, and algebraic manipulation."},{"question":"Phuc's self-assessment for Q9(a) was \"might be able to do (a)\" — a tentative note. How should a learner act on a tentative self-assessment, and why is it useful to record the *degree* of confidence? (2 steps)","answer":"- Step 1: Act on it by *trying* Q9(a) independently with a time limit (say, 10 minutes for a 3-mark part). If the attempt succeeds, mark it against the official mark scheme; if it fails, the attempt itself reveals the specific gap (e.g. method choice, algebraic error, misreading the question).\n- Step 2: Recording confidence (\"might,\" \"definitely can't,\" \"sure\") creates a *graded* gap tracker, not a binary one. Tentative gaps are the most useful because they have a real chance of resolution with a small effort, while confident-failures may need more substantial teaching. This prioritises revision time.\n\nTakeaway: use confidence-graded self-assessment (sure / maybe / can't) to triage revision; \"maybe\" items are the highest-leverage place to spend effort."},{"question":"Q6's \"show that\" structure requires the final form to be a√3 + b, with a and b as constants. Why does the examiner phrase the question this way, and what does it tell Phuc about the answer's expected shape? (2 steps)","answer":"- Step 1: \"Show that\" questions tell you the *target form* of the answer before you begin. The examiner is giving away the structure (one √3 term plus one rational constant) so the candidate can verify their work against the expected shape. The a and b are the unknown constants you need to find.\n- Step 2: This tells Phuc the answer should simplify to *exactly* one term involving √3 and one purely rational term — no other surds, no logarithms, no fractions inside fractions. If the final expression has any other structure, an error has occurred somewhere in the substitution or integration.\n\nTakeaway: \"show that\" questions are signposts — the stated target form is a structural check on your work. If your answer doesn't match the form, look for an error before submitting."},{"question":"In the lesson, Harry distinguished \"printed in the formula booklet\" from \"in P4 assessment scope.\" Why are these two axes independent, and what confusion does conflating them cause? (2 steps)","answer":"- Step 1: A formula can be *printed* (in the booklet, so you don't memorise it) but *not in scope* (you won't be tested on it). Conversely, a formula can be *in scope* (you'll be tested on it) but *not printed* (you must memorise it). The two properties are orthogonal: one is about *availability*, the other is about *relevance*.\n- Step 2: Conflating them leads to mistakes like \"I don't need to memorise the scalar product because it's not in the booklet\" (wrong — it's in scope, so memorise it) or \"I need to memorise the general binomial series because it's in scope\" (wrong — it's printed, so look it up). The two-axis classification prevents both errors.\n\nTakeaway: separate *availability* (in booklet?) from *relevance* (in spec?) — they're independent properties and a formula can have any combination."},{"question":"Q1's expansion is for (2 + 5x)⁻² in *ascending* powers of x. Why does the direction (ascending vs descending) matter, and what convention does the exam follow? (2 steps)","answer":"- Step 1: \"Ascending powers of x\" means the series is written as a₀ + a₁x + a₂x² + a₃x³ + ... with powers increasing from 0 upward. \"Descending\" would be a₃x³ + a₂x² + a₁x + a₀. The two are reverses of each other, but the coefficients stay attached to their respective powers.\n- Step 2: P4 (and the Edexcel IAL specification) follows the *ascending* convention for binomial series unless explicitly told otherwise. The general binomial expansion (1 + y)ⁿ naturally produces ascending powers, so this convention aligns with the natural form of the series. Miswriting the order (descending) would not lose marks if the terms are correctly identified, but ascending is expected.\n\nTakeaway: the Edexcel convention for binomial series is ascending powers; match the convention to avoid reader confusion and signal fluency."},{"question":"Across the deferred tasks (Q4(b), Q5, Q6, Q1), what is the common thread in *how* they were left unfinished, and what is the most efficient way for Phuc to work through them? (2 steps)","answer":"- Step 1: All four were left at a *well-defined resumption point* — the substitution was identified in Q4(b), λ and μ were found in Q5, the integrand in u was reached in Q6, and the bracket transformation was done in Q1. None of them were abandoned mid-thought; each has a clear \"from here, the next 1–2 lines give the answer\" structure.\n- Step 2: The efficient order is: (1) Q5 first, because λ and μ are already on the board and finishing is two short substitutions. (2) Q4(b) next, because the substitution b = 12 − 2a is set up and the quadratic factoring is mechanical. (3) Q6, because the integrand in u is the *hardest* part to reach, and only the integration and evaluation remain. (4) Q1, because the bracket is transformed and only the term-by-term expansion and validity check remain.\n\nTakeaway: deferred tasks should be ordered by *ease of completion* — finish the ones closest to done first, build momentum, and tackle the longer ones with energy."},{"question":"In Q6, after applying sin 2θ = 2 sin θ cos θ and substituting u = 3 + cos θ, the integrand becomes −2(u − 3)/√u. What is the conceptual reason for splitting (u − 3)/√u into u^{1/2} − 3u^{−1/2} rather than integrating it as a single fraction? (2 steps)","answer":"- Step 1: The power rule ∫uⁿ du = uⁿ⁺¹/(n+1) applies to *single* power terms — it doesn't directly apply to a *sum* in the numerator divided by u^{1/2}. Splitting into u/u^{1/2} − 3/u^{1/2} converts each piece into a single power of u, making each piece integrable by the power rule.\n- Step 2: The rule for splitting integrals is linear: ∫(f(u) + g(u)) du = ∫f(u) du + ∫g(u) du. After splitting, both pieces are pure power terms. This is a standard \"make the integrand a sum of integrable pieces\" move that appears throughout integration technique.\n\nTakeaway: when an integrand is a single fraction with a sum in the numerator, split it into separate power terms before integrating — the power rule applies term-by-term, not to the sum as a whole."},{"question":"The lesson's structure (ESAT warm-up → P3 review → P4 Q4–Q6 → Q1 hint → close) is a deliberate ordering. What is the pedagogical purpose of starting with a fast ESAT problem, then doing P3 review, then moving to P4? (2 steps)","answer":"- Step 1: The ESAT warm-up (5/9)³ = 125/729 is a *quick win* — it builds confidence, activates scale-invariance reasoning, and primes the substitution/multi-step thinking needed later. Doing it first means Phuc enters the harder P4 work with a sense of recent success.\n- Step 2: The P3 review (range, inverse, composition) addresses *prior* gaps that may still be flaring in P4 contexts (e.g. domain issues in implicit differentiation, inverse-function reasoning in vector lines). Catching these before P4 prevents the prior material from contaminating new learning. The ordering is: easy win → fix foundations → tackle new material.\n\nTakeaway: a well-ordered lesson builds confidence before foundations before new material — each phase primes the next."},{"question":"Q6's official answer is a = 8, b = −40/3. The \"outside −2\" from the substitution is an intermediate factor, not a. What is the test for distinguishing a *factor of the integrand* from a *coefficient in the final answer*? (2 steps)","answer":"- Step 1: A factor of the *integrand* is part of the input to the integration process — it's the multiplier of the du term *before* integration. A coefficient in the *final answer* is part of the output, *after* integration and evaluation. They are different objects at different stages.\n- Step 2: The test: if you can distribute the factor inside the integral (e.g. −2·(u^{1/2} − 3u^{−1/2}) = −2u^{1/2} + 6u^{−1/2}) and integrate, the factor *modifies* the antiderivative and ends up in the final value. But the −2 here is the *constant multiple* of the entire integral, not a hidden coefficient; it ends up modifying the antiderivative's coefficients. The final a and b are read off the *evaluated, simplified* result, where the −2 has already been distributed.\n\nTakeaway: coefficients and factors in the answer are read off the *final evaluated form*, not the integrand — every multiplicative factor in the integrand has already been \"absorbed\" by the integration step."},{"question":"Q2 is the volume of revolution of y = (5/3)√(x−1) for 2 ≤ x ≤ 8, rotated 2π about the x-axis. The official volume is 200π/3. Without doing the full arithmetic, what is the *structure* of the solution? (3 steps)","answer":"- Step 1: Apply V = π∫₂⁸ y² dx. Square y: y² = ((5/3)√(x−1))² = (25/9)(x−1). The integrand becomes π·(25/9)·(x−1) = (25π/9)·(x−1).\n- Step 2: Integrate (x − 1) from 2 to 8: ∫(x−1) dx = (x−1)²/2, evaluated from 2 to 8: (7)²/2 − (1)²/2 = 49/2 − 1/2 = 48/2 = 24. So the integral equals 24, and the volume is (25π/9)·24 = 600π/9 = 200π/3.\n- Step 3: The structure: identify the formula, square y (paying attention to the constant 5/3 and the shift x−1), extract the constant (25/9), integrate the simple (x−1) factor, multiply. The \"shift\" x−1 does *not* affect the constant 5/3 when squaring — both square to 25/9 — and the integration is straightforward.\n\nTakeaway: for V = π∫y² dx, the constant multiple (5/3)² and the integration variable (x − 1) factor independently — square the constant first, integrate the variable second, then multiply."},{"question":"Q8 is dV/dt = 12t·e⁻ᵗ with V(0) = 6. The official V = 18 − 12te⁻ᵗ − 12e⁻ᵗ. Conceptually, why does V(t) approach a finite limit (18) as t → ∞, and what does this say about the long-run behaviour of the system? (2 steps)","answer":"- Step 1: The term te⁻ᵗ has a well-known limit: as t → ∞, the exponential decay e⁻ᵗ dominates the linear growth of t, so te⁻ᵗ → 0. Similarly, e⁻ᵗ → 0. So V(t) → 18 − 0 − 0 = 18.\n- Step 2: The \"system\" is a tank being filled at a rate that *itself* decays to zero (the inflow 12te⁻ᵗ rises briefly then falls toward zero as t grows). Even though there is *no explicit maximum* on the inflow, the inflow rate decays so that the total volume approaches a horizontal asymptote. This is the mathematical signature of a \"self-limiting\" filling process.\n\nTakeaway: when a derivative involves an exponentially decaying factor times a polynomial, the integrated function has a finite limit — the exponential decay wins over polynomial growth in the long run."},{"question":"Across the lesson, several \"common misconception\" traps appear: (1) saying the range of ln(x²+3) is all reals; (2) missing the −x in the implicit derivative denominator; (3) saying the gradient asymptote is \"unchanged\" before correcting to y = 5. What unifies these misconceptions? (1 step)","answer":"- Step 1: All three misconceptions arise from *under-counting constraints*. (1) Forgetting that x² + 3 has a *minimum* (a constraint from the inner expression) — the learner assumed \"ln is unbounded\" without checking what the input can actually do. (2) Distributing the −2 too early in the product rule and losing track of which terms carry dy/dx — the learner under-counted the dy/dx contributions. (3) Reading the graph of −1/(x+2) and forgetting the +5 translation — the learner under-counted the vertical shift. In every case, the *correction* was to identify the missing or under-tracked term and add it back in.\n\nTakeaway: many algebra misconceptions come from *losing* a term (sign, constant, factor) during manipulation. The fix is usually to slow down, bracket more, and verify term-by-term."},{"question":"Q6's \"show that\" target is a√3 + b. The lesson reached the integrand in u. What is the *single* remaining algebraic move that produces the final a and b? (2 steps)","answer":"- Step 1: Integrate the power terms: ∫u^{1/2} du = (2/3)u^{3/2} and ∫u^{−1/2} du = 2u^{1/2}, so the antiderivative of (u^{1/2} − 3u^{−1/2}) is (2/3)u^{3/2} − 6u^{1/2}. Multiply by the leading −2: the full antiderivative is −(4/3)u^{3/2} + 12u^{1/2}.\n- Step 2: Evaluate from 4 to 3: at u = 3, −(4/3)·3√3 + 12√3 = 8√3; at u = 4, −(4/3)·8 + 12·2 = 40/3. Subtract: 8√3 − 40/3. So a = 8 (coefficient of √3) and b = −40/3. The single remaining move is \"integrate, evaluate, simplify.\"\n\nTakeaway: from a correctly-set-up integral in u, the path to the"}]},"minimax_2":{"label":"MiniMax M3 ②","cards":[{"question":"In the ESAT nested-squares warm-up, a second square is formed inside the first by joining points one third of the way along the sides. The learner chose the original side to be split into pieces 1 and 2 (so side length 3). Why is it valid to *choose* the original side length when the answer is a fraction of the original area? (2 steps)","answer":"- Step 1: The question asks for the inner square's area *as a fraction of the original area*. Any specific side length you pick produces the same fraction, because the ratio is dimensionless.\n- Step 2: Choosing side 3 (pieces 1 and 2) is convenient because the inner side becomes $$\\sqrt{1^2+2^2}=\\sqrt{5}$$ by Pythagoras, and the area ratio is then $$\\frac{5}{9}$$ — clean integers, no decimal arithmetic.\n\nTakeaway: scaling freedom is a legitimate simplification tool whenever a problem asks for a ratio or fraction, not an absolute value."},{"question":"In the ESAT warm-up, the inner square's area was 5/9 of the outer square's area in one step. The learner reached the answer 125/729 for the *fourth* square. Walk through why the exponent on both numerator and denominator is exactly 3, not 2 or 4. (3 steps)","answer":"- Step 1: Number the squares 1 (outermost), 2, 3, 4 (innermost). Going from square 1 to square 2 is *one* application of the area ratio 5/9.\n- Step 2: Going from square 1 to square 4 is three successive applications: 1→2, 2→3, 3→4. So the ratio is raised to the power 3, not 2 (which would only reach square 3) or 4 (which would apply the ratio one time too many).\n- Step 3: Therefore the fourth square's area as a fraction of the original is $$\\left(\\frac{5}{9}\\right)^3=\\frac{5^3}{9^3}=\\frac{125}{729}.$$\n\nMisconception probe: a common error is to write $$(5/9)^4$$ because the question mentions \"the fourth square\" — the exponent counts *transitions*, not the square's index."},{"question":"The lesson flagged a tutor slip on Q4(b): Harry said the discarded root might have a *negative* b, but the official algebra gives b = 0 or b = 8. Walk through the official algebra so you can see why b = 0 is the value rejected, not a negative b. (4 steps)","answer":"- Step 1: From the gradient condition in Q4(a), the relation is $$b=12-2a$$ (equivalently $$2a+b=12$$).\n- Step 2: Substitute into the curve $$4a^2+b^2-2ab=24a$$ and expand:\n$$4a^2+(12-2a)^2-2a(12-2a)=24a.$$\n- Step 3: Expanding gives $$12a^2-96a+144=0$$, which divides by 12 to $$a^2-8a+12=0$$, factorising as $$(a-2)(a-6)=0$$, so $$a=2$$ or $$a=6$$.\n- Step 4: Plug back: if $$a=2$$ then $$b=12-4=8$$; if $$a=6$$ then $$b=12-12=0$$. The constraint is $$b>0$$ (and $$a>0$$), so the rejected root is $$b=0$$, not a negative $$b$$."},{"question":"In Q4(a), the curve is $$4x^2+y^2-2xy=24x$$. The learner's submitted numerator was correct ($$12-4x+y$$) but the denominator was missing a term. Identify the missing term and explain *why* it disappeared in the learner's working. (3 steps)","answer":"- Step 1: The product-rule derivative of $$-2xy$$ is $$-2\\left(x\\frac{dy}{dx}+y\\right)$$, *not* $$-2\\cdot y$$ alone and not $$-2\\cdot x\\frac{dy}{dx}$$ alone.\n- Step 2: When you isolate $$\\frac{dy}{dx}$$, both the $$-2x\\frac{dy}{dx}$$ term and the $$-2y$$ term inside that bracket must be carried across the equals sign. Forgetting to expand the *whole* bracket means the $$-x$$ in the denominator is lost.\n- Step 3: The correct denominator is $$(2y-2x)$$ which simplifies to $$y-x$$, giving the official answer:\n$$\\frac{dy}{dx}=\\frac{12-4x+y}{y-x}.$$\n\nMisconception probe: students often write $$-2xy$$'s derivative as just $$-2y$$ (treating $$x$$ as constant) or just $$-2x\\frac{dy}{dx}$$ (treating $$y$$ as constant). Both $$x$$ and $$y$$ are functions, so the product rule gives *both* terms."},{"question":"In implicit differentiation, the printed instruction \"show all stages; solutions relying entirely on calculator technology are not acceptable\" appears on Q4. Why does the Edexcel IAL P4 paper require this explicit instruction on implicit-differentiation questions? (2 steps)","answer":"- Step 1: Modern calculators can perform symbolic differentiation, including implicit differentiation, which would let a candidate bypass the entire reasoning that the question is designed to test.\n- Step 2: The instruction forces the candidate to demonstrate the *chain rule on $$y^2$$* (giving $$2y\\frac{dy}{dx}$$) and the *product rule on $$xy$$*, which is the actual assessed skill — not just the final boxed answer.\n\nThe instruction is therefore an assessment-integrity safeguard, not a stylistic preference."},{"question":"On Q4(b), once the linear relation $$b=12-2a$$ has been derived from the gradient condition, the *second* equation needed to find a and b comes from where, and why is it valid? (2 steps)","answer":"- Step 1: The second equation comes from the fact that the point $$P(a,b)$$ *lies on the curve* C. So its coordinates must satisfy C's equation: $$4a^2+b^2-2ab=24a$$.\n- Step 2: This is valid because \"lies on C\" is a geometric condition that translates directly into the algebraic substitution of $$(a,b)$$ for $$(x,y)$$ in the original equation — giving one extra equation in two unknowns, which together with the linear relation is a solvable 2×2 system.\n\nConceptual point: implicit-differentiation \"gradient at a point\" problems typically bundle *two* pieces of information — the gradient equation (from the derivative) and the curve equation (from the original relation). Both must be used."},{"question":"In Q5, the two lines are\n$$l_1: \\mathbf{r}=\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}+\\lambda\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix},\\quad l_2: \\mathbf{r}=\\begin{pmatrix}-1\\\\\\beta\\\\6\\end{pmatrix}+\\mu\\begin{pmatrix}2\\\\-1\\\\7\\end{pmatrix}.$$\nAt the intersection P, you get three component equations. The lesson used equations (1) and (3) to solve for $$\\lambda$$ and $$\\mu$$. Why can equations (1) and (3) alone determine $$\\lambda$$ and $$\\mu$$, even though there are three unknowns total ($$\\lambda, \\mu, \\beta$$)? (3 steps)","answer":"- Step 1: Equations (1) and (3) contain only $$\\lambda$$ and $$\\mu$$ — the unknown $$\\beta$$ appears only in equation (2) (the $$y$$-component). So equations (1) and (3) form a 2×2 linear system in the two unknowns $$\\lambda, \\mu$$.\n- Step 2: Once $$\\lambda$$ and $$\\mu$$ are known, equation (2) is just an arithmetic step that gives $$\\beta$$ — no further elimination needed.\n- Step 3: This is the standard strategy for vector-line intersections with a parameter in a constant: pick the two component equations that *don't* contain the unknown constant to solve for the parameters first.\n\nStrategy probe: a common error is to try to use all three equations simultaneously, which is wasteful and risks over-constraining the system."},{"question":"Q5 has *no* \"show all stages\" or calculator-prohibition sentence, unlike Q4 and Q6. What does this absence imply about which solution methods are acceptable on Q5? (2 steps)","answer":"- Step 1: The paper's instruction \"solutions relying entirely on calculator technology are not acceptable\" is *printed* on certain questions (Q4, Q6 here). Q5 does not carry it.\n- Step 2: Therefore, on Q5, using a calculator's simultaneous-equation solver (or any other technology) is permitted *provided* the candidate's working still demonstrates understanding — e.g. the setup of equating position vectors and the component equations.\n\nThe absence of the instruction is itself a signal: it widens the acceptable methods."},{"question":"The Q5 official mark scheme accepts the point P as either a row vector or a column vector. The lesson advised writing it as a row. What is the underlying notational convention that makes both acceptable? (2 steps)","answer":"- Step 1: In 3D coordinate geometry, a point is *defined* by an ordered triple of coordinates; the triple is the geometric object.\n- Step 2: Whether you write the triple as a row $$(x,y,z)$$ or as a column $$\\begin{pmatrix}x\\\\y\\\\z\\end{pmatrix}$$ is a typographical choice — the *vector* from the origin to the point is the column, but the *point's coordinates* are just the triple, and either rendering represents the same point.\n\nThe Edexcel mark scheme therefore doesn't penalise a row, because the mark is for the *correct coordinates*, not the layout."},{"question":"Q6 asks to show that\n$$\\int_0^{\\pi/2}\\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta=a\\sqrt{3}+b.$$\nThe substitution is $$u=3+\\cos\\theta$$. Walk through *why* $$\\sin 2\\theta$$ becomes $$2\\sin\\theta\\cos\\theta$$, and why this rewriting is the key move. (3 steps)","answer":"- Step 1: The denominator contains $$\\cos\\theta$$, not $$\\sin 2\\theta$$ directly. The double-angle identity $$\\sin 2\\theta=2\\sin\\theta\\cos\\theta$$ rewrites the numerator so a factor of $$\\cos\\theta$$ appears, which will later combine with $$u=3+\\cos\\theta$$ to give a polynomial in $$u$$.\n- Step 2: After substitution, the $$\\sin\\theta\\,d\\theta$$ piece is absorbed by $$du=-\\sin\\theta\\,d\\theta$$, i.e. $$\\sin\\theta\\,d\\theta=-du$$.\n- Step 3: The remaining $$\\cos\\theta$$ is then replaced using $$\\cos\\theta=u-3$$. So the integrand becomes a polynomial in $$u$$ (specifically $$u^{1/2}$$ and $$u^{-1/2}$$), which is integrable by the power rule.\n\nConceptual point: the \"show that\" structure in P4 trigonometric substitutions almost always hinges on a double-angle identity to introduce the missing factor of $$\\sin\\theta$$ or $$\\cos\\theta$$ that matches the differential."},{"question":"In the Q6 substitution $$u=3+\\cos\\theta$$, $$\\frac{du}{d\\theta}=-\\sin\\theta$$, so $$d\\theta=\\frac{-du}{\\sin\\theta}$$. The lesson's working showed the integrand becoming\n$$-2\\int_4^3\\frac{u-3}{\\sqrt{u}}\\,du=-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)du.$$\nExplain *why the limits are 4 and 3, in that order*, and why the negative sign in front of the integral matters. (3 steps)","answer":"- Step 1: At $$\\theta=0$$, $$\\cos\\theta=1$$ so $$u=3+1=4$$. At $$\\theta=\\pi/2$$, $$\\cos\\theta=0$$ so $$u=3+0=3$$. As $$\\theta$$ increases from 0 to $$\\pi/2$$, $$u$$ decreases from 4 to 3 — so the lower limit is 4 and the upper is 3.\n- Step 2: Because the lower limit exceeds the upper, $$\\int_4^3=-\\int_3^4$$. The negative sign from $$d\\theta=-du/\\sin\\theta$$ *combines* with this swap convention; the lesson kept the limits as 4 → 3 and pulled the minus sign outside.\n- Step 3: If you accidentally swapped the limits to 3 → 4 *and* kept the minus sign, you would have double-negated and obtained the wrong sign. The minus sign and the limit order must move together.\n\nMisconception probe: a frequent error is to \"fix\" the reversed limits by flipping them to 3 → 4 while keeping the outside minus sign, double-applying the sign change."},{"question":"A learner in the Q6 lesson proposed taking $$\\cos\\theta$$ *outside* the integral as a constant, and was corrected. Why is $$\\cos\\theta$$ not a constant, and what is the correct replacement? (2 steps)","answer":"- Step 1: $$\\cos\\theta$$ varies with $$\\theta$$; on the interval $$[0,\\pi/2]$$ it runs from 1 down to 0. A constant means a fixed number, which $$\\cos\\theta$$ is not.\n- Step 2: Under the substitution $$u=3+\\cos\\theta$$, the rule is $$\\cos\\theta=u-3$$. So wherever $$\\cos\\theta$$ appears inside the integrand, it must be replaced by the expression $$u-3$$ (which is *itself* a function of $$u$$, and that's exactly what makes the integrand a polynomial in $$u$$).\n\nTakeaway: substitution replaces *every* occurrence of the original variable (here, both inside trig functions and in differentials) — not just in the differential."},{"question":"The Q6 lesson stopped with the integrand written as\n$$-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)du.$$\nThe official mark-scheme answer is $$8\\sqrt{3}-\\frac{40}{3}$$, so $$a=8,\\ b=-\\frac{40}{3}$$. Walk through the power-rule integration and evaluation conceptually, without writing out every term. (4 steps)","answer":"- Step 1: Apply the power rule $$\\int u^n\\,du=\\frac{u^{n+1}}{n+1}$$ to each piece: $$u^{1/2}\\to\\frac{2}{3}u^{3/2}$$ and $$u^{-1/2}\\to 2u^{1/2}$$. The factor $$-3$$ on the second piece becomes $$-3\\cdot 2u^{1/2}=-6u^{1/2}$$.\n- Step 2: The antiderivative inside the brackets is therefore $$\\frac{2}{3}u^{3/2}-6u^{1/2}$$. Multiply by the outside $$-2$$ to get the full antiderivative: $$-\\frac{4}{3}u^{3/2}+12u^{1/2}$$.\n- Step 3: Evaluate from 4 to 3. At $$u=3$$: $$-\\frac{4}{3}\\cdot 3\\sqrt{3}+12\\sqrt{3}=-4\\sqrt{3}+12\\sqrt{3}=8\\sqrt{3}$$. At $$u=4$$: $$-\\frac{4}{3}\\cdot 8+12\\cdot 2=-\\frac{32}{3}+24=-\\frac{32}{3}+\\frac{72}{3}=\\frac{40}{3}$$.\n- Step 4: Subtract: $$8\\sqrt{3}-\\frac{40}{3}$$, so $$a=8$$ and $$b=-\\frac{40}{3}$$.\n\nTakeaway: a \"show that\" question in P4 expects the *form* $$a\\sqrt{3}+b$$. If you obtain $$-8\\sqrt{3}+\\frac{40}{3}$$, that's a sign error somewhere in the limit evaluation."},{"question":"Q1(a) of the paper asks for the first four terms, in ascending powers of $$x$$, of $$(2+5x)^{-2}$$. The lesson factored this as $$2^{-2}\\left(1+\\tfrac{5}{2}x\\right)^{-2}$$. Explain *why* this factorisation is necessary, rather
