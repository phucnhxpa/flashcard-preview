e shifts the graph 5 units up, moving the horizontal asymptote from $$y=0$$ to $$y=5$$.\n- Step 3: The domain $$x > -2$$ means we only accept inputs to the right of the vertical asymptote $$x=-2$$. This completely excludes the left-hand branch of the transformed curve. Therefore, the graph consists solely of the right-hand branch, which approaches $$y=5$$ from below, yielding the range $$y < 5$$.\n\nTakeaway: A domain restriction like $$x > -2$$ acts as a spatial filter, slicing away entire branches of a rational curve."},{"question":"Why is it essential to state both an equation and a domain when specifying an inverse function, and how does the domain of the original function dictate the range of the inverse? (2 steps)","answer":"- Step 1: An inverse function must map every output of the original function back to its unique input. If the original function has a restricted domain (e.g., $$x > -2$$), its range is restricted (e.g., $$y < 5$$). The inverse function's domain must be exactly this original range, otherwise it would attempt to process inputs the original never produced, breaking the function definition.\n- Step 2: Because we state domains in terms of the independent variable (traditionally $$x$$), we must relabel. The original range $$y < 5$$ becomes the inverse's domain $$x < 5$$. Stating only the inverse equation (e.g., $$g^{-1}(x) = \\frac{2x-3}{5-x}$$) without the domain $$x < 5$$ leaves the inverse ambiguous—it wouldn't be clear which branch of the rational curve to use.\n+ A common misconception is swapping $$x$$ and $$y$$, solving for $$y$$, and declaring the job done. Without explicitly stating the inherited domain, the inverse is not fully defined.\n\nTakeaway: A function without a domain is just a curve; a function *is* its domain plus its rule."},{"question":"When composing two functions, say $$f(g(x))$$, what does the notation strictly dictate about the order of substitution, and why does reversing the order typically yield a completely different result? (2 steps)","answer":"- Step 1: The notation $$f(g(x))$$ dictates an \"inside-out\" execution. The innermost function, $$g$$, acts first on the raw input $$x$$, transforming it into $$g(x)$$. The outermost function, $$f$$, then acts on that result. You substitute the entire expression for $$g(x)$$ into every instance of the input variable inside $$f$$.\n- Step 2: Reversing the order to $$g(f(x))$$ means $$f$$ acts on $$x$$ first, and $$g$$ acts on $$f(x)$$ second. Unless $$f$$ and $$g$$ are specially symmetric (like inverse pairs), applying a logarithmic rule before a rational transformation is algebraically entirely different from applying the rational transformation before the logarithmic rule.\n+ A common error is substituting the outer function into the inner function, effectively calculating $$g(f(x))$$ when $$f(g(x))$$ was asked for. This happens when one instinctively replaces the \"first letter\" with the \"second letter\" without visualising the nesting.\n\nTakeaway: Function composition is not commutative; the inner function always runs first."},{"question":"In implicit differentiation of $$4x^2 + y^2 - 2xy = 24x$$, why does the product rule term $$-2xy$$ require bracketing the *entire* derivative before expanding, and what term is lost if you expand prematurely? (2 steps)","answer":"- Step 1: The term $$-2xy$$ is a product of three factors: the constant $$-2$$, the variable $$x$$, and the variable $$y$$. Applying the product rule to $$x \\cdot y$$ gives $$x \\frac{dy}{dx} + y \\cdot 1$$. Because the entire derivative is multiplied by the constant $$-2$$, you must write $$-2\\left(x \\frac{dy}{dx} + y\\right)$$.\n- Step 2: If you fail to bracket and instead write $$-2x \\frac{dy}{dx} - y$$, you have only multiplied the $$\\frac{dy}{dx}$$ part by $$-2$$, but multiplied the $$y$$ part by $$-1$$ instead of $$-2$$. This prematurely \"simplified\" expansion drops a factor of 2 from the $$y$$ term, which ultimately causes the $$-x$$ term in the denominator to be lost, leaving an incorrect denominator of just $$y$$ instead of $$y - x$$.\n+ Bracketing first, then expanding to $$-2x \\frac{dy}{dx} - 2y$$, ensures the constant multiplier distributes correctly to both parts of the product-rule result.\n\nTakeaway: Constants attached to multi-variable products must bracket the entire derivative before distributing."},{"question":"After differentiating $$4x^2 + y^2 - 2xy = 24x$$ implicitly, how do you isolate $$\\frac{dy}{dx}$$, and why does the denominator end up as $$y - x$$ rather than just $$y$$? (3 steps)","answer":"- Step 1: Differentiate term by term: $$8x + 2y\\frac{dy}{dx} - 2\\left(x\\frac{dy}{dx} + y\\right) = 24$$.\n- Step 2: Expand the product rule bracket and gather all terms containing $$\\frac{dy}{dx}$$ on one side, and all terms not containing it on the other: $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} = 24 - 8x + 2y$$.\n- Step 3: Factor out $$\\frac{dy}{dx}$$ from the left side: $$\\frac{dy}{dx}(2y - 2x) = 24 - 8x + 2y$$. Divide both sides by the factor $$2y - 2x$$, and cancel the common factor of 2 from the numerator and denominator: $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$.\n+ The $$-x$$ in the denominator survives because the $$-2x$$ from the product-rule expansion combines with the $$2y$$ from the $$y^2$$ derivative. If the product rule had been botched, those terms wouldn't combine, and the denominator would erroneously be just $$y$$.\n\nTakeaway: Implicit differentiation requires factoring $$\\frac{dy}{dx}$$ from a multi-term coefficient; every surviving variable in that coefficient contributes to the final denominator."},{"question":"When a point $$P(a,b)$$ lies on a curve and has a specific gradient, why do you need *two* equations to find $$a$$ and $$b$$, and what geometric facts do each of these equations represent? (2 steps)","answer":"- Step 1: You are solving for two unknowns, $$a$$ and $$b$$. A single equation in two unknowns defines a one-dimensional locus (a curve of possible solutions), not a unique point. To pin down a unique pair $$(a,b)$$, you need two independent equations that intersect at a single solution.\n- Step 2: The two equations come from two distinct geometric facts about $$P$$:\n+ The gradient condition $$\\frac{dy}{dx} = 2$$ at $$P$$ gives a linear equation (here, $$2a + b = 12$$), representing the constraint that the tangent slope at $$P$$ is exactly 2.\n+ The curve equation $$4x^2 + y^2 - 2xy = 24x$$ evaluated at $$P$$ gives a quadratic equation, representing the constraint that $$P$$ physically sits on the curve itself.\n\nTakeaway: A point is uniquely determined only when both its tangent constraint and its position constraint are enforced simultaneously."},{"question":"Substituting $$b = 12 - 2a$$ into the curve equation for Q4(b) yields the quadratic $$a^2 - 8a + 12 = 0$$, giving candidate points $$(6, 0)$$ and $$(2, 8)$. Why is the point $$(6, 0)$$ rejected, and what does this rejection illustrate about solving geometric problems? (2 steps)","answer":"- Step 1: The question explicitly states the constraint $$b > 0$$ (and $$a > 0$$). The candidate $$(6,0)$$ has $$b = 0$$, which violates $$b > 0$$ because 0 is not strictly greater than 0. The point sits exactly on the x-axis, not above it.\n- Step 2: This illustrates that algebraic solutions to quadratic systems often produce extraneous candidates that satisfy the algebraic equations but violate the contextual or stated geometric constraints. Always filter algebraic results against the original problem's inequalities.\n+ A common misconception is assuming the rejected point will always have a negative coordinate. Here, the rejected value is zero, which is just as invalid for a strict inequality like $$> 0$$.\n\nTakeaway: Algebra gives candidates; context and strict inequalities act as the final gatekeepers."},{"question":"When setting two vector line equations equal to find an intersection, why must you equate all *three* components, and why is it mathematically safe to use only two of the resulting equations to solve for the parameters $$\\lambda$$ and $$\\mu$$? (2 steps)","answer":"- Step 1: A 3D position vector $$\\mathbf{r}$$ has three components $$(x, y, z)$$, so equality of vectors $$\\mathbf{r}_1 = \\mathbf{r}_2$$ demands equality in all three dimensions simultaneously. This yields three equations. You must check all three to ensure the lines truly meet in 3D space, rather than passing close in two dimensions but missing each other in the third (which would mean they are skew).\n- Step 2: You only *solve* using two equations because you have two unknowns ($$\\lambda$$ and $$\\mu$$). Two independent linear equations are sufficient to determine a unique pair of parameters. The third equation is then used as a verification check: if the found $$\\lambda$$ and $$\\mu$$ satisfy it, the lines intersect; if not, they are skew.\n+ In Q5, equations (1) and (3) were chosen because they contained no $$\\beta$$, making them a clean 2-variable system for $$\\lambda$$ and $$\\mu$$.\n\nTakeaway: Three equations guarantee 3D intersection; two equations are enough to solve the parameter system, leaving the third for verification."},{"question":"Once you find the parameters $$\\lambda$$ and $$\\mu$$ at the intersection of two lines, why must you substitute back into *one* of the original line equations to find the coordinates of $$P$$, and why does substituting into the *other* line serve as a verification rather than a new calculation? (2 steps)","answer":"- Step 1: The parameters $$\\lambda$$ and $$\\mu$$ are scaling factors along their respective direction vectors. To find the actual 3D coordinates of the intersection point, you must scale the direction vector and add it to the base point. Substituting $$\\lambda$$ into $$l_1$$ (e.g., $$\\lambda = -9$$ into $$(2,-1,3) + \\lambda(1,4,2)$$) performs this vector addition and outputs the position $$P = (-7, -37, -15)$$.\n- Step 2: Because $$l_1$$ and $$l_2$$ represent the *same* physical point $$P$$ at the intersection, substituting $$\\mu$$ into $$l_2$$ must yield the identical coordinates. It is not a new calculation for a different point, but an algebraic proof that the two parametric descriptions converge on the same location.\n+ If substituting into the second line yielded a different point, your $$\\lambda$$ and $$\\mu$$ would be wrong, or the lines would be skew.\n\nTakeaway: Parameters translate lines into points; the second line provides redundancy, not a second answer."},{"question":"In the integral $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3 + \\cos \\theta}} d\\theta$$ with substitution $$u = 3 + \\cos \\theta$$, why is it critical to replace $$\\cos \\theta$$ with $$u - 3$$, and what conceptual error does treating $$\\cos \\theta$$ as a constant represent? (2 steps)","answer":"- Step 1: The substitution changes the variable of integration from $$\\theta$$ to $$u$$. The new integral must be entirely in terms of $$u$$ and $$du$$; no $$\\theta$$ or functions of $$\\theta$$ can remain, because we no longer have a $$d\\theta$$ to integrate them against. Since $$u = 3 + \\cos \\theta$$, rearranging gives $$\\cos \\theta = u - 3$$, which successfully eliminates $$\\theta$$.\n- Step 2: Treating $$\\cos \\theta$$ as a constant during the integration is a severe conceptual error: $$\\cos \\theta$$ varies continuously as $$\\theta$$ sweeps from 0 to $$\\frac{\\pi}{2}$$ (dropping from 1 to 0). A constant can be pulled outside the integral; a varying function cannot. Pulling $$\\cos \\theta$$ out would pretend its value is frozen, entirely breaking the geometry of the accumulation.\n+ The only parts that can be pulled out as constants are genuine numerical constants (like the 2 from $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$) or parameters that don't depend on the variable of integration.\n\nTakeaway: After a substitution, every trace of the old variable must be converted; varying functions are never constants."},{"question":"When transforming the limits for $$u = 3 + \\cos \\theta$$ with $$\\theta$$ going from 0 to $$\\frac{\\pi}{2}$$, why does the lower limit $$\\theta = 0$$ map to $$u = 4$$ and the upper limit $$\\theta = \\frac{\\pi}{2}$$ map to $$u = 3$$, resulting in an integral that runs \"backwards\" from 4 to 3? (2 steps)","answer":"- Step 1: Evaluate the substitution function at the original limits. At the lower limit $$\\theta = 0$$, $$\\cos(0) = 1$$, so $$u = 3 + 1 = 4$$. At the upper limit $$\\theta = \\frac{\\pi}{2}$$, $$\\cos\\left(\\frac{\\pi}{2}\\right) = 0$$, so $$u = 3 + 0 = 3$$.\n+ A common slip is evaluating $$\\cos(\\frac{\\pi}{2})$$ as $$\\frac{1}{2}$$ instead of 0, which would incorrectly map the upper limit to $$u = 3.5$$.\n- Step 2: Because cosine decreases over this interval, the $$u$$-values decrease as $$\\theta$$ increases. This reverses the standard order, making the integral $$\\int_4^3$$ rather than $$\\int_3^4$$. This is perfectly valid; the negative sign from the differential $$d\\theta = -\\frac{du}{\\sin\\theta}$$ naturally cancels the reversed limits, flipping the bounds back to $$3 \\to 4$$ and keeping the overall integral positive.\n\nTakeaway: Substitutions with decreasing functions reverse the limits; the negative differential compensates automatically."},{"question":"After substituting $$u = 3 + \\cos \\theta$$ into the Q6 integral, the integrand simplifies to $$-2\\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$. Why does this require the power rule for integration (yielding terms like $$u^{3/2}$$), rather than the natural logarithm rule? (2 steps)","answer":"- Step 1: The logarithm rule, $$\\int \\frac{1}{u} du = \\ln|u|$$, applies strictly when the integrand is exactly $$u^{-1}$$ with no other variable terms multiplying it. Our integrand contains $$u^{1/2}$$ and $$u^{-1/2}$$, which are powers of $$u$$ offset from $$-1$$.\n- Step 2: For any power $$u^n$$ where $$n \\neq -1$$, the power rule applies: $$\\int u^n du = \\frac{u^{n+1}}{n+1}$$.\n+ Applying this: $$\\int u^{1/2} du = \\frac{2}{3}u^{3/2}$$, and $$\\int u^{-1/2} du = 2u^{1/2}$$.\n+ A common misconception is reaching for the ln rule whenever a fraction or a negative power appears, without checking if the exponent is exactly $$-1$$.\n\nTakeaway: The ln rule is the exception for the isolated exponent $$-1$$; all other rational powers fall under the power rule."},{"question":"When expanding $$(2 + 5x)^{-2}$$ using the general binomial series, why must you first factor out the 2 to write it as $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$, rather than applying the series directly to the $$(2 + 5x)$$ bracket? (2 steps)","answer":"- Step 1: The general binomial series $$(1 + z)^n = 1 + nz + \\frac{n(n-1)}{2!}z^2 + \\dots$$ is explicitly defined for a bracket that *starts with 1*. This is because the series is derived from the Maclaurin expansion of $$(1+z)^n$$ evaluated at $$z=0$$, which requires the base value to be 1 to produce the clean factorial denominators.\n- Step 2: The bracket $$(2 + 5x)$$ starts with 2, not 1. If you blindly substituted $$z = 5x$$ into the series formula, you would be expanding $$(1 + 5x)^{-2}$$, which is a completely different function. Factoring out the 2 as $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$ scales the entire expression correctly and forces the inner bracket to start with 1, making $$z = \\frac{5}{2}x$$ the valid input for the series.\n+ The $$2^{-2}$$ outside becomes the constant multiplier $$\\frac{1}{4}$$ for every term in the expansion.\n\nTakeaway: The binomial series template demands a leading 1; factoring out the constant achieves this without altering the function's value."},{"question":"For the expansion of $$(1 + \\frac{5}{2}x)^{-2}$$, what is the validity condition on $$x$$, and why does the original factor of 2 not affect this interval? (2 steps)","answer":"- Step 1: The general binomial series $$(1+z)^n$$ converges only when $$|z| < 1$$, ensuring the successive terms shrink towards zero. Here, $$z = \\frac{5}{2}x$$, so the convergence condition is $$\\left|\\frac{5}{2}x\\right| < 1$$.\n- Step 2: Solving $$\\left|\\frac{5}{2}x\\right| < 1$$ gives $$|x| < \\frac{2}{5}$$. The factor of $$2^{-2}$$ pulled outside the bracket is a finite, non-zero constant. Multiplying an infinite divergent series by a constant still yields divergence; multiplying a convergent series by a constant preserves convergence. Therefore, the outside factor does not shift the boundary of validity at all.\n+ The validity interval depends entirely on the ratio inside the $$(1 + \\dots)$$ bracket.\n\nTakeaway: Convergence is determined by the variable ratio inside the normalised bracket; external numerical constants cannot expand or shrink the validity interval."},{"question":"In Q1(c), you approximate $$(\\frac{4}{2+5x})^2$$ by squaring the binomial expansion of $$(2+5x)^{-2}$$ up to the $$x^2$$ term. Conceptually, why does squaring a truncated series require multiplying out the terms (like $$(-\\frac{5x}{4}) \\cdot (-\\frac{5x}{4})$$) rather than just squaring the coefficients individually? (2 steps)","answer":"- Step 1: Squaring an expression $$(A + B + C)^2$$ means forming the product $$(A + B + C)(A + B + C)$$, which generates cross-terms like $$2AB$$, $$2AC$$, and $$B^2$$. These cross-terms mix different powers of $$x$$, and their coefficients arise from the product of two different coefficients from the original series.\n- Step 2: If you just squared the coefficients individually (turning $$a + bx + cx^2$$ into $$a^2 + b^2x^2 + c^2x^4$$), you would be evaluating the series term-by-term at $$x$$ and then squaring the numerical result, which is $$(f(x))^2$$ at a specific $$x$$, not the *series expansion* of $$f(x)^2$$. You would completely miss the $$x$$ term (coming from $$2 \\times \\text{const} \\times \\text{linear}$$) and miscalculate the $$x^2$$ term.\n+ For instance, the $$bx$$ term in the squared series comes from $$2 \\cdot a \\cdot b \\cdot x$$, not from $$b^2 x^2$$.\n\nTakeaway: A series for $$f(x)^2$$ is built by the algebra of multiplication, preserving cross-terms; it is not the term-by-term squaring of coefficients."},{"question":"When computing a volume of revolution about the x-axis (e.g., rotating $$y = \\sqrt{x}$$ from 0 to 4), why does the formula involve integrating $$y^2$$ rather than just $$y$$? (2 steps)","answer":"- Step 1: Rotating a curve about the x-axis sweeps each point $$(x, y)$$ into a circular disc of radius $$y$$ perpendicular to the x-axis. The area of a circle is $$\\pi r^2$$, so the area of this infinitesimal disc is $$\\pi y^2$$.\n- Step 2: The total volume is the continuous accumulation of these infinitesimal disc areas along the x-axis. We sum them by integrating $$\\pi y^2$$ with respect to $$x$$ over the interval, giving $$V = \\pi \\int y^2 dx$$. Integrating just $$y$$ would accumulate circumferences ($$2\\pi y$$), yielding a surface-area-like quantity, not a volume.\n+ For $$y = \\sqrt{x}$$, $$y^2 = x$$, so the integral $$\\pi \\int_0^4 x dx = \\pi \\left[\\frac{x^2}{2}\\right]_0^4 = 8\\pi$$ directly gives the volume.\n\nTakeaway: The $$y^2$$ in the volume formula comes from the area of the circular cross-section; volume is the integral of area, not circumference."},{"question":"For the differential equation $$\\frac{dV}{dt} = 12te^{-t}$$ with $$V(0) = 6$$, why is finding the general solution $$V(t)$$ not enough to answer whether the capacity of 20 is ever reached? (2 steps)","answer":"- Step 1: Solving the ODE requires integrating $$12te^{-t}$$ with respect to $$t$$, which demands integration by parts. The result is an expression containing $$-12te^{-t} - 12e^{-t}$$ plus a constant of integration, $$C$$. Using the initial condition $$V(0) = 6$$ allows you to solve for $$C$$, pinning down the specific particular solution.\n- Step 2: To determine if $$V$$ ever reaches 20, you must analyse the long-run behaviour of the particular solution. As $$t \\to \\infty$$, the exponential terms $$e^{-t}$$ and $$te^{-t}$$ decay to 0. The function approaches a horizontal asymptote at the constant $$C + 6 = 18$$ (from the official reference). Since 18 is strictly less than 20, the volume asymptotically approaches 18 but never actually touches 20.\n+ A common misconception is that if a function grows continuously, it must surpass any number. Here, the growth rate $$12te^{-t}$$ shrinks rapidly, choking off the accumulation before it reaches 20.\n\nTakeaway: ODE solutions often asymptote; checking capacity limits requires evaluating the limit of the particular solution, not just assuming unbounded growth."},{"question":"Among the formulas required for P4, which one is notably *not printed* in the exam formula booklet and must be remembered unaided, and why is this distinction important for exam strategy? (2 steps)","answer":"- Step 1: The scalar (dot) product formula, $$\\mathbf{a} \\cdot \\mathbf{b} = a_1b_1 + a_2b_2 + a_3b_3$$, is not printed in the Pearson formula booklet, yet it is explicitly required for P4 (Section 7.7). You must commit it to memory.\n- Step 2: This distinction is crucial because a blanket assumption that \"all formulas are given\" would leave you helpless on any vector question requiring dot products (e.g., finding angles between vectors or checking perpendicularity). Conversely, the general binomial series *is* printed, so spending time memorising its exact factorial structure is less efficient than knowing how to apply it.\n+ The volume of revolution formula $$\\pi \\int y^2 dx$$ is also not printed as such and must be remembered.\n\nTakeaway: Exam strategy requires sorting formulas into \"booklet-provided\" (apply, don't memorise) versus \"unaided-required\" (memorise definitively)."},{"question":"A common self-assessed error was labelling the Q6 trigonometric substitution method as \"using the cosine rule.\" Why does this label fundamentally misidentify the mathematical domain and tools actually required? (2 steps)","answer":"- Step 1: The \"cosine rule\" ($$c^2 = a^2 + b^2 - 2ab\\cos C$$) belongs to Euclidean geometry and relates the sides and angles of a single triangle. It is used to find unknown lengths or angles in static spatial configurations.\n- Step 2: Q6 is a calculus integration problem requiring the double-angle identity ($$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$) and a functional substitution ($$u = 3 + \\cos\\theta$$). These are tools of analytic trigonometry and transformation of integrals, operating on continuous functions over an interval, not on the fixed edges of a triangle.\n+ Mislabelling it as \"cosine rule\" suggests a geometric, non-calculus approach, which would entirely miss the need for substitution, limit transformation, and power-rule integration.\n\nTakeaway: Trigonometry in calculus (identities, substitutions) is fundamentally different from trigonometry in geometry (sine/cosine rules); confusing the two misdirects the entire solution strategy."},{"question":"Why is the method of \"implicit differentiation\" considered a *method* rather than a *formula*, and what does this imply about how you must prepare for it on the P4 exam? (2 steps)","answer":"- Step 1: A formula is a fixed symbolic relationship (like $$\\frac{d}{dx}[\\sin x] = \\cos x$$) that you can plug numbers into. Implicit differentiation is an algorithmic process: you differentiate both sides with respect to $$x$$, apply the chain rule to $$y$$-terms (generating $$\\frac{dy}{dx}$$), apply the product rule to mixed terms, and then algebraically rearrange to isolate $$\\frac{dy}{dx}$$.\n- Step 2: Because it is a method, you cannot simply \"look it up\" in a formula booklet or recall a single equation. You must practise the *sequence of decisions*: when to use the chain rule, when to use the product rule, and how to gather and factor the $$\\frac{dy}{dx}$$ terms. Your preparation must be procedural fluency, not factual memorisation.\n+ The formula booklet lists integration by parts, but it does not—and cannot—list \"implicit differentiation\" because the algebraic rearrangement depends entirely on the specific equation given.\n\nTakeaway: Methods require procedural rehearsal; formulas require factual recall. P4 tests both."},{"question":"When the lesson transcript notes a \"tutor slip\" where Harry suggested Phuc might get one positive and one negative $$b$$-value to reject, but the official algebra actually gives $$b = 0$$ and $$b = 8$$, what does this discrepancy reveal about the danger of predicting algebraic outcomes before doing the algebra? (2 steps)","answer":"- Step 1: The tutor made an intuitive guess about the shape of the quadratic solution—expecting a symmetric positive/negative pair like $$+8$$ and $$-8$$—based on a rough mental model of the constraints. However, substituting $$b = 12 - 2a$$ into the curve equation actually produces a quadratic whose roots yield $$b = 0$$ and $$b = 8$$.\n- Step 2: This reveals that intuitive predictions about the sign or nature of roots can easily be wrong if you haven't tracked the exact coefficients. The constant term, linear coefficient, and factorisation all depend on the precise substitution. Guessing bypasses the algebraic reality and can lead you to invent a rejection criterion (e.g., \"reject the negative\") that doesn't even match the actual candidates (where the rejection is \"reject the zero\").\n+ The only reliable way to know what to reject is to execute the algebra first, then apply the strict inequality $$b > 0$$ to the actual results.\n\nTakeaway: Algebraic outcomes are determined by calculation, not by intuition; never pre-guess which values to reject."},{"question":"In the ESAT warm-up, Harry advised stopping calculation once the correct multiple-choice option is secure. Why is this timing strategy specifically important for aptitude tests like ESAT, and how does it differ from the strategy for A-Level papers? (2 steps)","answer":"- Step 1: Aptitude tests like ESAT are strictly time-pressured with many questions; the scoring rewards breadth of correct attempts over depth of simplification. Once you have matched your derived fraction (e.g., $$\\frac{125}{729}$$) to one of the listed options and verified it is unique, further calculation (like reducing fractions or calculating decimals) yields zero additional marks and consumes time better spent on the next question.\n- Step 2: A-Level papers (like P4) often require exact simplified forms or specific decimal places, and every step of working may be required for method marks. Stopping early on an A-Level paper could lose you simplification marks or final-answer marks. The strategy shifts entirely: ESAT demands strategic abandonment; A-Level demands complete execution.\n+ Memorising common cubes ($$5^3 = 125$$, $$9^3 = 729$$) accelerates the matching step, making the abandonment strategy faster to execute.\n\nTakeaway: Match the strategy to the assessment format: abandon early on multiple-choice aptitude tests, execute fully on step-marked A-Level papers."}]},"glm_2":{"label":"GLM 5.1 ②","cards":[{"question":"In a sequence of nested squares, each inner square is formed by joining points one-third of the way along the sides of the outer square. How does the area of each square relate to the area of the one before it, and why does the original side length not matter when finding the fractional area ratio? (2 steps)","answer":"- Step 1: To find the area ratio, we can assume any convenient side length for the outer square because area ratios are scale-invariant. If we split a side of length 3 into pieces of 1 and 2, the inner square has a side length found via Pythagoras: $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 2: The area of the outer square is $$3^2 = 9$$ and the inner square is $$(\\sqrt{5})^2 = 5$$. The one-step area ratio is $$5/9$$. Changing the initial side length scales both the inner and outer areas by the same square factor, which cancels out in the fraction.\n\nThe one-step scaling factor for the area is always $$5/9$$, regardless of the starting size."},{"question":"If the area ratio between a nested inner square and its outer square is 5/9, what fraction of the original area is the *fourth* square in the sequence, and what is a common pitfall when counting the iterations? (2 steps)","answer":"- Step 1: Going from the 1st square to the 4th square requires *three* applications of the scaling ratio, not four. A common pitfall is to raise the ratio to the power of 4. Let the squares be $$S_1, S_2, S_3, S_4$$. The transitions are $$S_1 \\to S_2$$, $$S_2 \\to S_3$$, and $$S_3 \\to S_4$$.\n- Step 2: The area fraction is therefore $$\\left(\\frac{5}{9}\\right)^3 = \\frac{5^3}{9^3} = \\frac{125}{729}$$. \n\nWhen counting iterations between item $$n$$ and item $$n+k$$, apply the ratio $$k$$ times."},{"question":"For the function $$f(x) = \\ln(x^2 + 3)$$ where $$x \\in \\mathbb{R}$$, how do you find its range, and why can't the range simply be stated as \"all real numbers\"? (3 steps)","answer":"- Step 1: Analyze the argument of the natural logarithm. Since $$x^2 \\ge 0$$ for all real $$x$$, adding 3 gives $$x^2 + 3 \\ge 3$$.\n- Step 2: The natural logarithm $$\\ln(t)$$ is an increasing function. This means that larger inputs produce larger outputs. If the input $$t = x^2+3$$ is always at least 3, the output is always at least the value of the logarithm at 3.\n- Step 3: Therefore, $$f(x) \\ge \\ln 3$$. The range is not \"all real numbers\" because $$x^2 + 3$$ can never be between 0 and 3, meaning the logarithm can never output values less than $$\\ln 3$$.\n\nThe range is $$f(x) \\ge \\ln 3$$, or $$[\\ln 3, \\infty)$$."},{"question":"Given $$g(x) = \\frac{3+5x}{x+2}$$ for $$x > -2$$, algebraically rewriting it as $$g(x) = 5 - \\frac{7}{x+2}$$ makes the asymptotes and range obvious. Why does this form directly reveal the horizontal asymptote and the range? (3 steps)","answer":"- Step 1: The term $$\\frac{7}{x+2}$$ controls the behavior as $$x$$ becomes very large. As $$x \\to \\infty$$, the fraction $$\\frac{7}{x+2}$$ approaches 0, meaning the function values approach $$5 - 0 = 5$$. Thus, the horizontal asymptote is $$y = 5$$.\n- Step 2: Because $$x > -2$$, the denominator $$(x+2)$$ is always positive. This means $$\\frac{7}{x+2}$$ is always strictly positive. Therefore, we are always subtracting a positive quantity from 5.\n- Step 3: Subtracting a positive quantity from 5 makes the result strictly less than 5. The function approaches 5 but never reaches it, so the range is $$y < 5$$.\n\nThe rewritten form separates the constant asymptote from the strictly varying fraction, immediately bounding the output."},{"question":"How does restricting the domain of $$g(x) = 5 - \\frac{7}{x+2}$$ to $$x > -2$$ select a specific branch of the curve, and how does this determine the domain of the inverse $$g^{-1}(x)$$? (2 steps)","answer":"- Step 1: The parent function $$h(x) = \\frac{-1}{x}$$ has two disjoint branches (in Quadrants II and IV). The transformation $$g(x) = 7h(x+2) + 5$$ shifts the vertical asymptote to $$x = -2$$. The restriction $$x > -2$$ keeps only the right-hand branch, which lies entirely below the horizontal asymptote $$y = 5$$.\n- Step 2: The range of a function becomes the domain of its inverse. Because the restricted domain forces the range to be $$y < 5$$, the inverse function $$g^{-1}$$ must have the domain $$x < 5$$.\n\nA domain restriction on the original function isolates a one-to-one branch, directly defining the valid inputs for its inverse."},{"question":"When finding a composition like $$fg(x)$$, a common error is to substitute the outer function into the inner function. Conceptually, how should the substitution be ordered, and what goes wrong if you reverse it? (2 steps)","answer":"- Step 1: For $$fg(x)$$, the inner function $$g$$ acts first on the input $$x$$, and then the outer function $$f$$ acts on the result. You must substitute the *entire* expression for $$g(x)$$ in place of the variable inside $$f$$. Think of it as $$f(\\text{blank})$$ where the blank is $$g(x)$$.\n- Step 2: Reversing the order means you are computing $$gf(x)$$ instead of $$fg(x)$$. If you substitute $$f(x)$$ into the formula for $$g$$, you have performed the operations in the wrong sequence. For example, if $$f(x) = \\ln(x)$$ and $$g(x) = x^2+3$$, putting $$g$$ inside $$f$$ gives $$\\ln(x^2+3)$$, but putting $$f$$ inside $$g$$ gives $$(\\ln x)^2 + 3$$, which are totally different functions.\n\nComposition is not commutative; always apply the function written closest to the input first."},{"question":"When implicitly differentiating the equation $$4x^2 + y^2 - 2xy = 24x$$, why is the product rule required for the $$-2xy$$ term, and what is the most common algebraic mistake when isolating $$dy/dx$$? (3 steps)","answer":"- Step 1: In the term $$-2xy$$, both $$x$$ and $$y$$ are variables. When differentiating with respect to $$x$$, $$y$$ cannot be treated as a constant because it implicitly depends on $$x$$. The product rule must be applied: differentiate $$-2x$$ (keeping $$y$$ constant) then differentiate $$y$$ (keeping $$-2x$$ constant).\n- Step 2: Applying the product rule gives $$-2\\left(x \\frac{dy}{dx} + y \\cdot 1\\right)$$. The most common mistake is failing to bracket the entire product-rule result before expanding. If you write $$-2x \\frac{dy}{dx} + y$$ without expanding the $$-2$$ across the $$+y$$, the $$-x$$ term will be lost from the denominator later.\n- Step 3: Expanding correctly yields $$-2x \\frac{dy}{dx} - 2y$$. Grouping the $$\\frac{dy}{dx}$$ terms on one side gives $$2y \\frac{dy}{dx} - 2x \\frac{dy}{dx}$$, which factors to $$(2y - 2x)\\frac{dy}{dx}$$. If the $$-2y$$ had been missed, the factor would incorrectly be just $$2y$$.\n\nAlways bracket the entire product-rule derivative before distributing coefficients."},{"question":"After implicitly differentiating $$4x^2 + y^2 - 2xy = 24x$$ and isolating $$dy/dx$$, you find $$dy/dx = \\frac{12 - 4x + y}{y - x}$$. If a point $$P(a, b)$$ on the curve has a gradient of 2, why does setting the derivative equal to 2 give only one equation for two unknowns, and where do you find the second equation? (2 steps)","answer":"- Step 1: Substituting $$x=a$$, $$y=b$$, and $$dy/dx=2$$ yields $$\\frac{12 - 4a + b}{b - a} = 2$$. This is a single linear equation relating $$a$$ and $$b$$ (which simplifies to $$2a + b = 12$$). One equation with two unknowns has infinitely many solutions, so it cannot uniquely determine the point.\n- Step 2: The second equation comes from the fact that the point $$P(a,b)$$ *lies on the curve*. This means the original curve equation must be satisfied at that point, providing the second relation: $$4a^2 + b^2 - 2ab = 24a$$.\n\nTo find a specific point on a curve given a gradient, you must always use both the derivative condition and the original curve equation."},{"question":"When solving the system for point $$P(a, b)$$ on the curve $$4x^2 + y^2 - 2xy = 24x$$ with gradient 2, substituting the linear relation yields two candidate points: $$(6, 0)$$ and $$(2, 8)$$. How does the problem's constraint \"$$a > 0, b > 0$$\" select the final answer, and why is strict inequality important here? (2 steps)","answer":"- Step 1: The constraint $$b > 0$$ strictly requires the y-coordinate to be positive. The candidate $$(6, 0)$$ has $$b = 0$$, which fails this strict inequality (0 is not greater than 0). The candidate $$(2, 8)$$ has $$b = 8 > 0$$ and $$a = 2 > 0$$, satisfying both conditions.\n- Step 2: The strict inequality is important because at a point where $$b=0$$, the curve's behavior might be at a boundary or endpoint, or the derivative expression might be undefined (e.g., if evaluating required dividing by $$y$$). The constraint ensures we pick the point in the strictly positive quadrant.\n\nAlways check candidate points against the exact strict inequalities given in the problem; a value of 0 does not satisfy $$>0$$."},{"question":"To find where two vector lines $$l_1: \\mathbf{r} = (2, -1, 3) + \\lambda(1, 4, 2)$$ and $$l_2: \\mathbf{r} = (-1, \\beta, 6) + \\mu(2, -1, 7)$$ intersect, you set their position vectors equal. Why does this yield exactly three equations, and why do you only need two of them to find the parameters $$\\lambda$$ and $$\\mu$$? (2 steps)","answer":"- Step 1: A position vector in 3D space has three components (x, y, and z). Setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$ means equating the x-components, the y-components, and the z-components separately. This produces three distinct simultaneous equations involving $$\\lambda$$ and $$\\mu$$.\n- Step 2: To solve for two unknowns ($$\\lambda$$ and $$\\mu$$), you only need two independent equations. You choose the two equations that do *not* contain the unknown constant $$\\beta$$, allowing you to solve for the parameters first without dealing with $$\\beta$$.\n\nUse the two parameter-free equations to find $$\\lambda$$ and $$\\mu$$, then use the remaining equation to find $$\\beta$$."},{"question":"When solving for the intersection of vector lines, you find $$\\lambda = -9$$ and $$\\mu = -3$$. Conceptually, what is the difference between substituting these values back into $$l_1$$ versus $$l_2$$ to find the coordinates of P? (2 steps)","answer":"- Step 1: If the lines truly intersect, substituting $$\\lambda$$ into $$l_1$$ and $$\\mu$$ into $$l_2$$ must yield the exact same position vector for point P. Mathematically, it does not matter which line you use.\n- Step 2: Practically, it is useful to substitute into *both* lines as a check. If the resulting coordinates are not identical, the lines do not intersect (they are skew). If they are identical, you have verified your parameters and found the correct point.\n\nAlways verify your intersection point by checking it satisfies both line equations."},{"question":"In an integration by substitution, why must the original limits of integration be changed, and what happens if you forget to change them but still integrate with respect to the new variable $$u$$? (3 steps)","answer":"- Step 1: The definite integral $$\\int_a^b f(x) dx$$ calculates the area under the curve $$f(x)$$ from $$x=a$$ to $$x=b$$. When you substitute $$u = g(x)$$, you are changing the horizontal axis from $$x$$ to $$u$$. The same physical area now corresponds to a different interval on the $$u$$-axis.\n- Step 2: If you forget to change the limits, you would integrate your new $$u$$-function from $$u=a$$ to $$u=b$$. This calculates the area under a completely different curve over a completely different interval, giving a numerically wrong answer.\n- Step 3: To change the limits correctly, substitute the original $$x$$-limits into the substitution equation $$u = g(x)$$. For example, if $$u = 3 + \\cos\\theta$$, then $$\\theta=0 \\implies u=4$$ and $$\\theta=\\pi/2 \\implies u=3$$.\n\nChanging limits maps the boundary of the area from the $$x$$-world to the $$u$$-world."},{"question":"When substituting $$u = 3 + \\cos\\theta$$ into the integral $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}} d\\theta$$, the transformed limits become $$u=4$$ (lower) and $$u=3$$ (upper). Why is it acceptable to leave the limits in this \"backwards\" order, and what would happen if you swapped them? (2 steps)","answer":"- Step 1: Leaving the limits as $$\\int_4^3$$ is perfectly valid because the Fundamental Theorem of Calculus accounts for the order: evaluating $$F(3) - F(4)$$ will naturally produce a negative value if the antiderivative is increasing, correctly handling the area. The negative sign from $$d\\theta = -du/\\sin\\theta$$ combined with the reversed limits cancels out.\n- Step 2: If you swap the limits to $$\\int_3^4$$, you must also flip the sign of the integral. Since you already have a negative sign from $$d\\theta = -du/\\sin\\theta$$, swapping the limits cancels that negative sign, leaving you with a standard positive integral $$\\int_3^4 \\dots du$$. Either way, the final arithmetic is identical.\n\nYou can leave the limits backwards if you respect the algebra, or swap them to cancel the negative differential sign."},{"question":"In the substitution for $$\\int \\frac{2\\sin\\theta\\cos\\theta}{\\sqrt{u}} d\\theta$$ with $$u = 3+\\cos\\theta$$, why can't you treat $$\\cos\\theta$$ as a constant and pull it out of the integral? (2 steps)","answer":"- Step 1: The variable of integration is $$\\theta$$. A constant must have a fixed value that does not depend on $$\\theta$$. However, $$\\cos\\theta$$ is a trigonometric function that varies as $$\\theta$$ changes over the interval $$[0, \\pi/2]$$.\n- Step 2: Because $$\\cos\\theta$$ varies with $$\\theta$$, it must be integrated along with the rest of the integrand. To perform the integration with respect to $$u$$, you must express $$\\cos\\theta$$ entirely in terms of $$u$$ using the substitution equation: $$\\cos\\theta = u - 3$$.\n\nNever pull a function of the integration variable out of the integral; replace it using the substitution relation."},{"question":"After applying the substitution $$u = 3+\\cos\\theta$$ to the integral $$\\int \\frac{2\\sin\\theta\\cos\\theta}{\\sqrt{u}} d\\theta$$, you arrive at the integrand $$-2 \\cdot \\frac{u-3}{\\sqrt{u}}$$. Why must you simplify this to powers of $$u$$ before integrating, rather than applying a natural log rule? (3 steps)","answer":"- Step 1: A common misconception is that integrating a fraction always results in a natural logarithm. The log rule $$\\int \\frac{1}{x} dx = \\ln|x|$$ only applies when the numerator is exactly the derivative of the denominator. Here, the numerator is $$(u-3)$$ and the derivative of the denominator $$\\sqrt{u} = u^{1/2}$$ is $$\\frac{1}{2}u^{-1/2}$$, which are not related this way.\n- Step 2: Instead of looking for a log rule, split the fraction: $$\\frac{u-3}{\\sqrt{u}} = \\frac{u}{\\sqrt{u}} - \\frac{3}{\\sqrt{u}}$$.\n- Step 3: Simplify using exponent rules: $$\\frac{u}{u^{1/2}} = u^{1/2}$$ and $$\\frac{3}{u^{1/2}} = 3u^{-1/2}$$. Now the integral is $$-2 \\int (u^{1/2} - 3u^{-1/2}) du$$, which can be easily solved using the standard power rule.\n\nConvert rational expressions to negative and fractional exponents to use the power rule, reserving the log rule for when the numerator is precisely the derivative of the denominator."},{"question":"When expanding $$(2 + 5x)^{-2}$$ using the general binomial series, why must you first factor out the 2 to write it as $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$ instead of expanding directly? (3 steps)","answer":"- Step 1: The general binomial series $$(1+w)^n = 1 + nw + \\frac{n(n-1)}{2!}w^2 + \\dots$$ is only valid when the bracket begins with exactly 1. The expression $$(2 + 5x)^{-2}$$ starts with 2, so the standard formula cannot be applied directly to it.\n- Step 2: Factoring out the 2 from the bracket converts the base into the required form. $$(2 + 5x)^{-2} = (2(1 + \\frac{5}{2}x))^{-2}$$.\n- Step 3: Using index laws, the power applies to both factors: $$(2)^{-2} \\cdot (1 + \\frac{5}{2}x)^{-2}$$. Now the second bracket starts with 1, and $$w = \\frac{5}{2}x$$, so the series formula can be safely applied.\n\nThe binomial series template strictly requires a leading 1; factor out the constant to create it."},{"question":"For the expansion of $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$, what is the condition for the series to converge (be valid), and how does this translate to a constraint on $$x$$? (2 steps)","answer":"- Step 1: The general binomial series $$(1+w)^n$$ converges only when the magnitude of the term inside the bracket is strictly less than 1, i.e., $$|w| < 1$$. Here, $$w = \\frac{5}{2}x$$, so the condition is $$|\\frac{5}{2}x| < 1$$.\n- Step 2: Solving for $$x$$, multiply both sides by $$\\frac{2}{5}$$ to isolate $$x$$. This gives $$|x| < \\frac{2}{5}$$. Outside this interval, the infinite series diverges and does not equal the original function.\n\nThe validity condition $$|w|<1$$ of the series directly defines the interval of $$x$$ for which the approximation is mathematically sound."},{"question":"A separable differential equation is given as $$dV/dt = 12te^{-t}$$ with $$V(0) = 6$$. Conceptually, what do the initial condition and the differential equation separately tell you about the solution? (2 steps)","answer":"- Step 1: The differential equation $$dV/dt = 12te^{-t}$$ tells you the *rate of change* of $$V$$ at any time $$t$$. Integrating this gives the general family of curves (volume over time), which will include a constant of integration, $$+ C$$.\n- Step 2: The initial condition $$V(0) = 6$$ provides one specific point $$(t=0, V=6)$$ that the solution curve must pass through. This allows you to solve for the exact value of $$C$$, selecting the one specific curve from the family that models this scenario.\n\nThe differential equation defines the shape of the solution, and the initial condition pins down its exact position."},{"question":"For the differential equation $$dV/dt = 12te^{-t}$$, the solution involves integrating by parts. If you choose $$u = 12t$$ and $$dv = e^{-t}dt$$, why is it a mistake to stop integrating after the first step and just write $$V = -12te^{-t} + C$$? (2 steps)","answer":"- Step 1: Integration by parts states $$\\int u dv = uv - \\int v du$$. With $$u = 12t$$ and $$dv = e^{-t}dt$$, we get $$v = -e^{-t}$$ and $$du = 12 dt$$. The formula gives $$-12te^{-t} - \\int (-e^{-t}) \\cdot 12 dt$$.\n- Step 2: A common mistake is to ignore the second integral $$\\int v du$$. You must continue to integrate $$12e^{-t}$$ to get $$-12e^{-t}$$. The full indefinite integral is $$-12te^{-t} - 12e^{-t} + C$$.\n\nIntegration by parts always leaves a new integral to evaluate; the process is incomplete until that secondary integral is resolved."},{"question":"If the solution to a differential equation models volume $$V(t)$$ approaching a maximum capacity of 20, how can you determine from the solution function $$V(t) = 18 - 12te^{-t} - 12e^{-t}$$ that the capacity is never actually reached? (2 steps)","answer":"- Step 1: To see if the capacity is reached, set $$V(t) = 20$$ and solve for $$t$$. This gives $$18 - 12te^{-t} - 12e^{-t} = 20$$, which simplifies to $$12e^{-t}(t+1) = -2$$.\n- Step 2: Analyze the equation. The term $$e^{-t}$$ is always positive for all real $$t$$. The term $$(t+1)$$ is positive for any time $$t > -1$$. Therefore, the left side is strictly positive for any physically meaningful time, while the right side is negative (-2). A positive number can never equal a negative number, meaning no finite time $$t$$ solves the equation.\n\nThe capacity is an asymptote; the function approaches 20 as $$t \\to \\infty$$ but never equals it."},{"question":"To find the volume of revolution when $$y = \\sqrt{x}$$ is rotated $$2\\pi$$ radians about the x-axis from $$x=0$$ to $$x=4$$, what is the geometric intuition behind the formula $$\\pi \\int y^2 dx$$? (3 steps)","answer":"- Step 1: Imagine slicing the solid of revolution into incredibly thin disks perpendicular to the x-axis. Each disk has a thickness of $$dx$$ and a radius equal to the y-value of the curve at that x-position.\n- Step 2: The area of the circular face of one disk is $$\\pi r^2 = \\pi y^2$$. The volume of that single disk is approximately its area times its thickness: $$\\pi y^2 dx$$.\n- Step 3: Summing the volumes of all these infinitely thin disks from $$x=0$$ to $$x=4$$ gives the definite integral $$\\pi \\int_0^4 y^2 dx$$. Substituting $$y = \\sqrt{x}$$ yields $$\\pi \\int_0^4 x dx$$.\n\nThe volume of revolution formula is just the continuous sum of the volumes of infinitesimally thin circular disks."},{"question":"For the volume of revolution of $$y = \\frac{5}{3}\\sqrt{x-1}$$ from $$x=2$$ to $$x=8$$, the integral setup is $$\\pi \\int_2^8 \\frac{25}{9}(x-1) dx$$. Why is it crucial that the limits of integration are in terms of $$x$$ and not $$y$$? (2 steps)","answer":"- Step 1: The variable of integration in the formula $$\\pi \\int y^2 dx$$ is $$x$$ (indicated by the $$dx$$). The limits must match the variable of integration. The values $$x=2$$ and $$x=8$$ represent the starting and ending positions along the x-axis where the disks are being stacked.\n- Step 2: If you wanted to use y-limits (integrating with respect to $$y$$), you would have to use the alternative formula $$\\pi \\int x^2 dy$$ and rewrite the curve equation as $$x$$ in terms of $$y$$. Mixing x-limits with a $$dy$$ integral (or vice versa) is a dimensional mismatch that yields a meaningless number.\n\nThe limits and the differential ($$dx$$ or $$dy$$) must always describe the same axis along which the disks are being accumulated."},{"question":"Which formula required for P4 is explicitly NOT printed in the exam formula booklet, making it the one you must memorize unaided? (1 step)","answer":"The scalar (dot) product of two vectors, $$\\mathbf{a} \\cdot \\mathbf{b} = a_1b_1 + a_2b_2 + a_3b_3$$ (or $$|\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$), is not printed in the booklet and must be committed to memory. While methods like implicit differentiation are also not printed, the scalar product is a specific algebraic formula you are expected to recall precisely during the exam."},{"question":"Why is it incorrect to label the general binomial series and integration by parts as \"formulas not given in the exam\"? (2 steps)","answer":"- Step 1: The general binomial series expansion $$(1+x)^n$$ is explicitly printed in the formula booklet (valid for $$n \\in \\mathbb{R}, |x|<1$$), so you do not need to memorize the pattern of the coefficients.\n- Step 2: Integration by parts is also explicitly printed in the booklet ($$\\int u \\frac{dv}{dx}dx = uv - \\int v \\frac{du}{dx}dx$$). While you must know *when* and *how* to apply them, the formulas themselves are provided.\n\nYou must distinguish between methods you need to learn (implicit differentiation) and formulas that are physically provided on the reference sheet."},{"question":"When expanding $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$ to find the first four terms, the first term is simply $$\\frac{1}{4}$$. If you forgot the $$2^{-2}$$ factor, how would your final coefficients be wrong? (2 steps)","answer":"- Step 1: The expansion of the bracket $$(1 + \\frac{5}{2}x)^{-2}$$ yields coefficients based on $$n=-2$$ and $$w=\\frac{5}{2}x$$. The first term is 1, the second is $$-5x$$, etc.\n- Step 2: If you forget to multiply the entire series by $$2^{-2} = \\frac{1}{4}$$, all your coefficients will be 4 times too large. For example, the correct first term is $$\\frac{1}{4}(1) = \\frac{1}{4}$$, but without the factor you would write 1. The correct second term is $$\\frac{1}{4}(-5x) = -\\frac{5}{4}x$$, but you would write $$-5x$$.\n\nThe constant factored out the front is a scalar multiplier for the entire infinite series; omitting it scales every term incorrectly."}]},"glm_3":{"label":"GLM 5.1 ③","cards":[{"question":"In a nested-squares design, each inner square is formed by joining points one third of the way along the sides of the outer square. What is the ratio of the area of one square to the square immediately outside it, and why does the absolute size of the original square not matter when finding this fractional ratio? (3 steps)","answer":"- Step 1: Because the problem asks for a *fraction* of the original area, scaling the entire figure up or down multiplies both the inner and outer areas by the same square factor, which cancels out in the ratio. Therefore, we can choose a convenient side length for the outer square, such as 3, making the segments 1 and 2.\n- Step 2: The inner square's side is the hypotenuse of a right triangle with legs 1 and 2. By Pythagoras, the inner side length is $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 3: The outer area is $$3^2 = 9$$ and the inner area is $$(\\sqrt{5})^2 = 5$$. The one-step area ratio is $$5/9$$.\n\nScaling invariance means the ratio depends only on the proportional split (1/3), not on absolute lengths."},{"question":"If the one-step area ratio between successive nested squares is 5/9, what fraction of the original area is the *fourth* square in the sequence, and what is a common counting pitfall when determining this? (3 steps)","answer":"- Step 1: Identify the number of scaling applications. The \"fourth square\" means the original is the 1st, so there are exactly 3 transitions (1st→2nd, 2nd→3rd, 3rd→4th).\n- Step 2: The cumulative area ratio is the one-step ratio raised to the power of the number of transitions: $$(5/9)^3$$.\n+ A common pitfall is raising to the 4th power by counting the squares rather than the transitions between them.\n- Step 3: Evaluate the cubes: $$5^3 = 125$$ and $$9^3 = 729$$. The fourth square's area is $$125/729$$ of the original.\n\nIn a timed multiple-choice setting, once you identify the correct power, stop and select the matching option rather than over-calculating."},{"question":"For the function $$f(x) = \\ln(x^2 + 3)$$ where $$x \\in \\mathbb{R}$$, how do you determine its range, and what is the critical lower bound? (2 steps)","answer":"- Step 1: Analyze the argument of the logarithm. Since $$x^2 \\geq 0$$ for all real $$x$$, adding 3 gives $$x^2 + 3 \\geq 3$$.\n- Step 2: The natural logarithm function $$\\ln(u)$$ is strictly increasing. Therefore, the minimum value of $$f(x)$$ occurs at the minimum value of its argument. Applying the logarithm to the inequality: $$f(x) \\geq \\ln 3$$.\n+ A common misconception is stating the range as \"all real numbers\" just because the domain is all reals. The range is bounded below by $$\\ln 3$$.\n\nThe range is $$f(x) \\geq \\ln 3$$, or $$[\\ln 3, \\infty)$$."},{"question":"How do you rewrite the rational function $$g(x) = \\frac{3+5x}{x+2}$$ (for $$x > -2$$) into a form that reveals its asymptotes, and what are those asymptotes? (3 steps)","answer":"- Step 1: Perform algebraic division (or equate coefficients) to split the function into a constant and a reciprocal term. Dividing $$3+5x$$ by $$x+2$$ gives a quotient of 5 and a remainder of -7.\n- Step 2: Rewrite the function as $$g(x) = 5 - \\frac{7}{x+2}$$. This is equivalent to $$7\\left(-\\frac{1}{x+2}\\right) + 5$$, which is a transformation of the $$-1/x$$ graph.\n- Step 3: Read the asymptotes from this form. The vertical asymptote is where the denominator is zero: $$x = -2$$. The horizontal asymptote is the constant added outside: $$y = 5$$.\n+ A common error is to assume the horizontal asymptote is always $$y = 0$$; it shifts up by the outside constant (here, +5).\n\nThe graph is the right-hand branch of $$-1/x$$ (since $$x > -2$$), shifted left by 2, vertically stretched by 7, and shifted up by 5."},{"question":"Given $$g(x) = 5 - \\frac{7}{x+2}$$ with domain $$x > -2$$, what is the range of $$g$$, and why must the domain of the inverse be stated explicitly alongside its equation? (2 steps)","answer":"- Step 1: Since $$x > -2$$, we are on the right side of the vertical asymptote. For $$x+2 > 0$$, the fraction $$-\\frac{7}{x+2}$$ is strictly negative. Thus, $$g(x)$$ is always strictly less than the horizontal asymptote: range is $$y < 5$$.\n- Step 2: The inverse function $$g^{-1}$$ swaps the domain and range. Therefore, the equation of the inverse must be paired with the domain $$x < 5$$ (which was the range of $$g$$).\n+ Stating only the inverse equation without its domain is incomplete; an inverse is defined by *both* its rule and its domain.\n\nThe range of $$g$$ is $$y < 5$$, and the domain of $$g^{-1}$$ is $$x < 5$$."},{"question":"When finding a composite function such as $$fg(x)$$, what is the correct order of substitution, and what visual analogy helps prevent getting the order backwards? (2 steps)","answer":"- Step 1: The notation $$fg(x)$$ means \"apply $$g$$ first, then apply $$f$$ to the result\". Algebraically, you substitute the entire expression for $$g(x)$$ in place of the $$x$$ inside $$f(x)$$.\n- Step 2: A helpful visual analogy is an assembly line or a function machine: the input goes into the rightmost machine first ($$g$$), and its output is fed into the machine to its left ($$f$$).\n+ A common error is substituting $$f(x)$$ into $$g$$, which would yield $$gf(x)$$. This often creates algebraic nonsense (like a logarithm inside a linear function) that signals the order is wrong.\n\nAlways work from right to left for composition: $$fg(x) = f(g(x))$$."},{"question":"When implicitly differentiating the equation $$4x^2 + y^2 - 2xy = 24x$$, what is the most common algebraic mistake when differentiating the product $$-2xy$$, and how do you avoid it? (2 steps)","answer":"- Step 1: The term $$-2xy$$ is a product of $$x$$ and $$y$$, so it requires the product rule. Differentiating with respect to $$x$$ gives $$-2\\left(x \\cdot \\frac{dy}{dx} + y \\cdot 1\\right)$$.\n- Step 2: The most common mistake is failing to distribute the negative sign from the $$-2$$ across the entire bracket, leading to $$-2x\\frac{dy}{dx} - y$$ instead of the correct $$-2x\\frac{dy}{dx} - 2y$$.\n+ To avoid this, bracket the entire product-rule derivative first: $$-2[x\\frac{dy}{dx} + y]$$, and only then expand the $$-2$$.\n\nBracketing the product rule derivative before expanding ensures the negative sign survives on both terms."},{"question":"After differentiating $$4x^2 + y^2 - 2xy = 24x$$ implicitly, you reach $$8x + 2y\\frac{dy}{dx} - 2\\left(x\\frac{dy}{dx} + y\\right) = 24$$. Walk through the algebraic steps to isolate $$\\frac{dy}{dx}$$. (3 steps)","answer":"- Step 1: Expand the bracket carefully: $$8x + 2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} - 2y = 24$$.\n- Step 2: Group the $$\\frac{dy}{dx}$$ terms on one side and the rest on the other: $$(2y - 2x)\\frac{dy}{dx} = 24 - 8x + 2y$$.\n- Step 3: Factor out and divide to isolate $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx} = \\frac{24 - 8x + 2y}{2y - 2x}$$. Dividing numerator and denominator by 2 gives the simplest form: $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$.\n\nThe key is expanding correctly, then grouping all $$\\frac{dy}{dx}$$ terms before factoring."},{"question":"A point $$P(a, b)$$ lies on the curve $$4x^2 + y^2 - 2xy = 24x$$ and the gradient at $$P$$ is 2. Given $$a > 0$$ and $$b > 0$$, why does setting the derivative equal to 2 not give enough information to find $$a$$ and $$b$$ immediately, and what second piece of information must you use? (2 steps)","answer":"- Step 1: Setting the derivative $$\\frac{12 - 4a + b}{b - a} = 2$$ yields one linear equation relating $$a$$ and $$b$$ (specifically, $$2a + b = 12$$). With two unknowns, one equation has infinitely many solutions.\n- Step 2: The second piece of information is that $$P(a, b)$$ *lies on the curve*. This means its coordinates satisfy the original equation: $$4a^2 + b^2 - 2ab = 24a$$.\n+ A common pitfall is forgetting that \"lies on the curve\" is a mathematical statement that translates directly into a substitution equation.\n\nYou must solve the linear relation and the curve equation simultaneously to find the exact coordinates."},{"question":"Substituting $$b = 12 - 2a$$ into the curve equation $$4a^2 + b^2 - 2ab = 24a$$ yields the candidates $$(6, 0)$$ and $$(2, 8)$$. How do the constraints $$a > 0$$ and $$b > 0$$ dictate which point is selected, and what is a subtle trap here? (2 steps)","answer":"- Step 1: Evaluate $$b$$ for both candidates. For $$a = 6$$, $$b = 0$$. For $$a = 2$$, $$b = 8$$.\n- Step 2: The constraint is $$b > 0$$ (strictly greater than zero). The point $$(6, 0)$$ is rejected because $$b = 0$$ fails this strict inequality. The point $$(2, 8)$$ is selected because both $$2 > 0$$ and $$8 > 0$$.\n+ The subtle trap is assuming the rejected candidate will always have a negative coordinate. Here, the rejected value is exactly zero. $$b > 0$$ excludes zero just as firmly as it excludes negatives.\n\nAlways check strict inequalities ($$>$$) carefully; zero is not positive."},{"question":"To find where two vector lines $$l_1$$ and $$l_2$$ intersect, you set their position vectors equal. If this yields three component equations but only two unknown parameters ($$\\lambda$$ and $$\\mu$$), what is the correct strategy to solve for the parameters? (2 steps)","answer":"- Step 1: Choose any *two* of the three component equations to solve simultaneously for $$\\lambda$$ and $$\\mu$$. Typically, you pick the two equations that look algebraically simplest to eliminate one variable.\n- Step 2: Once you have found $$\\lambda$$ and $$\\mu$$, you *must* substitute them back into the *third* (unused) equation to verify the lines actually intersect. If the third equation holds true, they intersect; if it yields a contradiction, the lines are skew.\n+ A common error is assuming that solving two equations guarantees an intersection. Skew lines will give inconsistent parameters across the three equations.\n\nSolve two equations, then validate with the third."},{"question":"For the intersecting lines $$l_1: r = (2, -1, 3) + \\lambda(1, 4, 2)$$ and $$l_2: r = (-1, \\beta, 6) + \\mu(2, -1, 7)$$, solving equations (1) and (3) gives $$\\lambda = -9$$ and $$\\mu = -3$$. How do you then find the unknown $$\\beta$$ and the coordinates of intersection $$P$$? (3 steps)","answer":"- Step 1: To find $$\\beta$$, substitute $$\\lambda$$ and $$\\mu$$ into the second component equation (the one containing $$\\beta$$): $$-1 + 4(-9) = \\beta - (-3)$$. This gives $$-37 = \\beta + 3$$, so $$\\beta = -40$$.\n- Step 2: To find the coordinates of $$P$$, substitute $$\\lambda = -9$$ into the equation for $$l_1$$: $$P = (2, -1, 3) - 9(1, 4, 2) = (2-9, -1-36, 3-18) = (-7, -37, -15)$$.\n- Step 3: As a verification, substitute $$\\mu = -3$$ into $$l_2$$ (using the now-known $$\\beta = -40$$): $$P = (-1, -40, 6) - 3(2, -1, 7) = (-7, -37, -15)$$. Both lines yield the same point, confirming the intersection.\n\nAlways substitute back into the original line equations to find the point, rather than trying to read it from the parameter relations."},{"question":"When using the substitution $$u = 3 + \\cos\\theta$$ to evaluate an integral, you find $$\\frac{du}{d\\theta} = -\\sin\\theta$$. Why is it critically important to rewrite this as $$d\\theta = \\frac{-du}{\\sin\\theta}$$ instead of just replacing $$d\\theta$$ with $$du$$? (2 steps)","answer":"- Step 1: The substitution changes the variable from $$\\theta$$ to $$u$$, so the differential $$d\\theta$$ must be correctly scaled to the new variable. Replacing $$d\\theta$$ with $$du$$ ignores the rate of change (the derivative) entirely.\n- Step 2: Rearranging to $$d\\theta = \\frac{-du}{\\sin\\theta}$$ allows the $$\\sin\\theta$$ in the numerator of the integral to cancel with the $$\\sin\\theta$$ in the denominator of the differential replacement, cleanly removing all $$\\theta$$'s from the integral.\n+ A common error is dropping the negative sign during this rearrangement, which flips the limits of integration and changes the sign of the final answer.\n\nThe differential relationship is what allows you to trade out the old variable and its $$d\\theta$$ for the new variable and its $$du$$."},{"question":"Using the substitution $$u = 3 + \\cos\\theta$$ for the integral $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3 + \\cos\\theta}} d\\theta$$, the lower limit $$\\theta = 0$$ maps to $$u = 4$$ and the upper limit $$\\theta = \\pi/2$$ maps to $$u = 3$$. What trigonometric mistake often happens when calculating these limits, and how does the integral's structure change because of this ordering? (3 steps)","answer":"- Step 1: The common mistake is evaluating $$\\cos(\\pi/2)$$ as $$1/2$$ instead of $$0$$. Correctly, $$u(\\pi/2) = 3 + 0 = 3$$, and $$u(0) = 3 + 1 = 4$$.\n- Step 2: Because the lower limit (4) is larger than the upper limit (3), the integral is \"upside down.\" When we substitute $$d\\theta = \\frac{-du}{\\sin\\theta}$$, the negative sign from the derivative flips the limits back to the standard ascending order: $$4 \\to 3$$.\n- Step 3: The integral becomes $$-\\int_4^3 \\dots du$$, which is equivalent to $$+\\int_3^4 \\dots du$$. However, keeping the limits as $$-\\int_4^3$$ is perfectly valid and often easier to evaluate by simply plugging in 4 and 3 and subtracting.\n\nAlways evaluate trigonometric limits carefully, and let the negative sign from the derivative handle the reversed limits naturally."},{"question":"After applying the double angle identity and the substitution, the integral becomes $$-2\\int_4^3 \\frac{u - 3}{\\sqrt{u}} du$$. Why can't we treat the $$(u-3)$$ in the numerator as a constant, and how must we proceed? (2 steps)","answer":"- Step 1: The variable of integration is now $$u$$, so $$(u-3)$$ is a function of $$u$$, not a constant. Pulling it outside the integral would be mathematically invalid.\n- Step 2: We must divide the numerator by the denominator to express the integrand as a sum of powers of $$u$$. $$\\frac{u - 3}{\\sqrt{u}} = \\frac{u}{u^{1/2}} - \\frac{3}{u^{1/2}} = u^{1/2} - 3u^{-1/2}$$.\n+ A common misconception is thinking this leads to a logarithmic integral because of the $$u^{-1/2}$$ term. However, the power rule applies to *any* real power except $$-1$$, so we integrate normally without needing natural logs.\n\nRewrite as power rules: $$-2\\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$."},{"question":"To expand $$(2 + 5x)^{-2}$$ using the general binomial series, what algebraic manipulation must you perform first, and why is it necessary? (3 steps)","answer":"- Step 1: The general binomial series $$(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\dots$$ is only valid when the bracket starts exactly with $$1$$, not any other constant.\n- Step 2: We must factor out the leading coefficient from the bracket. Factor out 2: $$(2 + 5x)^{-2} = (2(1 + \\frac{5}{2}x))^{-2}$$.\n- Step 3: Apply the power of $$-2$$ to both factors: $$2^{-2}(1 + \\frac{5}{2}x)^{-2} = \\frac{1}{4}(1 + \\frac{5}{2}x)^{-2}$$.\n+ A common error is trying to apply the series directly to $$(2 + 5x)^{-2}$$, which yields incorrect coefficients because the \"1\" in the standard series formula would incorrectly align with the \"2\".\n\nAlways normalize the bracket to start with 1 before applying the general binomial expansion."},{"question":"For the expansion $$(1 + \\frac{5}{2}x)^{-2}$$, what is the condition for convergence (the validity interval), and how is it derived from the standard binomial series rule? (2 steps)","answer":"- Step 1: The general binomial series $$(1 + w)^n$$ converges only when the absolute value of the term after the 1 is less than 1: $$|w| < 1$$.\n- Step 2: In this case, $$w = \\frac{5}{2}x$$. Therefore, the condition is $$|\\frac{5}{2}x| < 1$$, which simplifies to $$|x| < \\frac{2}{5}$$.\n+ A common pitfall is forgetting to account for the fraction inside the absolute value, leading to $$|x| < 1$$ or $$|x| < 5/2$$, which are both incorrect.\n\nThe expansion is valid only for $$|x| < 2/5$$."},{"question":"The volume of revolution formula $$V = \\pi \\int y^2 dx$$ is not printed in the Edexcel formula booklet. Conceptually, where does the $$y^2$$ come from, and why is the $$\\pi$$ necessary? (2 steps)","answer":"- Step 1: When the curve $$y = f(x)$$ is rotated $$2\\pi$$ about the x-axis, it sweeps out a 3D solid. At any slice $$x$$, the cross-section is a circle with radius $$y$$. The area of this circular slice is $$\\pi r^2 = \\pi y^2$$.\n- Step 2: The volume is the continuous sum (integral) of all these infinitesimally thin circular cross-sectional areas along the x-axis. Thus, we integrate the area $$\\pi y^2$$ with respect to $$x$$.\n+ A common misconception is confusing this with arc length or surface area, which involve square roots of derivatives, not the square of the function.\n\nThe formula is simply the integral of the circular cross-sectional area: $$V = \\pi \\int_a^b y^2 dx$$."},{"question":"A curve $$y = \\sqrt{x}$$ is rotated $$2\\pi$$ about the x-axis from $$x=0$$ to $$x=4$$. Set up the volume of revolution integral and conceptually describe how the limits are used to find the exact volume. (2 steps)","answer":"- Step 1: Substitute $$y = \\sqrt{x}$$ into the volume formula: $$V = \\pi \\int_0^4 (\\sqrt{x})^2 dx = \\pi \\int_0^4 x dx$$.\n- Step 2: The limits 0 and 4 define the physical boundaries of the solid. Evaluating the integral $$[\\frac{x^2}{2}]_0^4$$ gives the difference between the area at the far end (x=4) and the start (x=0), yielding $$\\pi(\\frac{16}{2} - 0) = 8\\pi$$.\n+ Notice how squaring the $$\\sqrt{x}$$ simplified the integrand to a basic power rule. This cancellation is a common feature in volume of revolution problems.\n\nThe volume is $$8\\pi$$, derived from integrating the area of circular discs from the origin to $$x=4$$."},{"question":"For the differential equation $$\\frac{dV}{dt} = 12te^{-t}$$ with initial condition $$V(0) = 6$$, what is the conceptual sequence of steps to find the function $$V(t)$$? (3 steps)","answer":"- Step 1: Integrate both sides with respect to $$t$$ to reverse the differentiation. The right side requires integration by parts because it is a product of a polynomial ($$t$$) and an exponential ($$e^{-t}$$).\n- Step 2: When integrating, an arbitrary constant of integration $$+C$$ appears. To find its specific value, substitute the initial condition: set $$t=0$$ and $$V=6$$ into the integrated equation.\n- Step 3: Solve the resulting linear equation for $$C$$, and write the final specific function $$V(t)$$.\n+ A common error is forgetting the constant of integration entirely, or trying to substitute the initial condition before integrating.\n\nIntegrate, add $$+C$$, then use the initial condition to pin down the exact solution."},{"question":"The scalar (dot) product $$\\mathbf{a} \\cdot \\mathbf{b}$$ is a key P4 tool that is NOT printed in the exam formula booklet. Conceptually, what two pieces of information does the dot product encode, and what does it mean if the dot product is zero? (2 steps)","answer":"- Step 1: The dot product encodes both the magnitudes of the vectors and the angle between them: $$\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$. It also equals the sum of the products of their components: $$a_1b_1 + a_2b_2 + a_3b_3$$.\n- Step 2: If the dot product is zero, and neither vector is the zero vector, then $$\\cos\\theta = 0$$. This means the angle $$\\theta$$ is $$90^\\circ$$, so the vectors are perpendicular.\n+ A common misconception is thinking a zero dot product means one of the vectors is \"zero\". It purely indicates orthogonality (assuming non-zero vectors).\n\nYou must memorize the dot product formula; it is the primary way to test for perpendicularity and find angles between vectors in P4."},{"question":"When expanding $$\\frac{1}{4}(1 + \\frac{5}{2}x)^{-2}$$, the first term is $$\\frac{1}{4}$$. If the question then asks for the expansion of $$(\\frac{4}{2+5x})^2$$, how does this relate to your previous result, and what happens to the coefficients? (2 steps)","answer":"- Step 1: Recognize that $$(\\frac{4}{2+5x})^2$$ is exactly $$4^2 \\cdot (2+5x)^{-2} = 16(2+5x)^{-2}$$.\n- Step 2: We already know $$(2+5x)^{-2} = \\frac{1}{4}(1 + \\frac{5}{2}x)^{-2}$$. Multiplying by 16 gives $$16 \\times \\frac{1}{4} = 4$$ as the new outside factor. Every coefficient in the expansion of $$(2+5x)^{-2}$$ is simply multiplied by 16.\n+ This is a common exam trick: part (c) often requires scaling the series found in part (a) rather than re-expanding from scratch.\n\nMultiply the entire part (a) series by 16 to get the part (c) series efficiently."},{"question":"When evaluating the integral $$-2\\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$, a student gets a negative number for the area. What is the conceptual reason for this sign, and does it mean the physical area is negative? (2 steps)","answer":"- Step 1: The negative sign arises because the limits of integration are \"backwards\" (the lower limit 4 is greater than the upper limit 3). Reversing the limits of a definite integral flips the sign of the result.\n- Step 2: A definite integral calculates the *signed* area relative to the axis. While the physical geometric area is always positive, the algebraic calculation correctly yields a negative value when integrating from right to left on the number line.\n+ To find the standard positive area, you can either swap the limits (removing the negative sign) or just take the absolute value of the final evaluated result.\n\nThe negative result is algebraically correct for the given limits; it does not imply \"negative area\" in the geometric sense."},{"question":"In vector line equations like $$r = (2, -1, 3) + \\lambda(1, 4, 2)$$, what is the geometric meaning of the first bracket $$(2, -1, 3)$$ versus the second bracket $$(1, 4, 2)$$? (2 steps)","answer":"- Step 1: The first bracket is the position vector of a specific point that the line passes through. It acts as an \"anchor\" fixing the line in space.\n- Step 2: The second bracket is the direction vector. It dictates the line's orientation and slope in 3D space. As $$\\lambda$$ varies, you slide along this direction vector starting from the anchor point.\n+ A common error is confusing the two, leading to a line that passes through the origin (if the direction vector is used as the position) or has the wrong slope.\n\nThe first bracket is \"where\" (position), the second bracket is \"which way\" (direction)."},{"question":"When integrating $$-2\\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$, why does the $$u^{-1/2}$$ term NOT require the natural logarithm $$\\ln(u)$$? (2 steps)","answer":"- Step 1: The power rule for integration, $$\\int u^n du = \\frac{u^{n+1}}{n+1}$$, applies to *all* real values of $$n$$ *except* $$n = -1$$. If $$n = -1$$, the denominator becomes 0, which is undefined, and that specific case requires the natural logarithm.\n- Step 2: Here, the power is $$n = -1/2$$. Since $$-1/2 \\neq -1$$, we simply add 1 to the power to get $$1/2$$, and divide by the new power $$1/2$$ (which is the same as multiplying by 2).\n+ A common reflex is to use $$\\ln(u)$$ for *any* negative power. Only $$u^{-1}$$ integrates to $$\\ln|u|$$.\n\nThe power rule works perfectly for $$u^{-1/2}$$; reserve the logarithm exclusively for the $$-1$$ power."}]},"qwen_1":{"label":"Qwen 3.7 Max ①","cards":[{"question":"In the ESAT nested-squares problem where inner vertices divide outer sides in a 1:2 ratio, why is it mathematically valid to assign specific integer lengths (e.g., 1 and 2) to the segments rather than using algebraic variables like $$x$$ and $$2x$$ when finding the area fraction? (3 steps)","answer":"- Step 1: Recognize that the question asks for a **dimensionless ratio** (area of inner / area of outer), which is scale-invariant. If you scale the entire geometric figure by a factor $$k$$, both the numerator and denominator scale by $$k^2$$, leaving the fraction unchanged.\n- Step 2: By choosing convenient integers (segments 1 and 2), the outer side becomes $$1+2=3$$ and the inner side becomes $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$ via Pythagoras. This avoids carrying algebraic clutter through the calculation.\n- Step 3: Calculate the single-step area ratio directly as $$(\\sqrt{5})^2 / 3^2 = 5/9$$. Since the process is iterative and self-similar, the ratio for the 4th square is simply $$(5/9)^3$$.\n+ *Misconception Probe:* Students often fear picking specific numbers is \"cheating\" or lacks rigor. In reality, for homogeneous geometric ratios, specific cases are mathematically equivalent to the general case and reduce cognitive load.\n\n**Takeaway:** Scale invariance allows specific numerical substitution for ratio problems, converting algebra into arithmetic."},{"question":"When iterating the nested-square construction to find the fourth square, why is the exponent applied to the area ratio 3 rather than 4, and how does this relate to the definition of the sequence? (2 steps)","answer":"- Step 1: Define the sequence explicitly. Let $$S_1$$ be the original square. The first application of the ratio produces $$S_2$$. The second produces $$S_3$$. The third produces $$S_4$$.\n- Step 2: Count the **transitions**, not the objects. To get from the 1st term to the 4th term requires exactly $$4 - 1 = 3$$ multiplications by the common ratio $$r$$. Thus, $$\\text{Area}(S_4) = \\text{Area}(S_1) \\times r^3$$.\n+ *Edge Case:* If the question asked for the \"area of the square formed after 4 iterations,\" that would indeed be $$r^4$$. Always map the wording (\"fourth square\" vs. \"after four steps\") to the index count carefully.\n\n**Takeaway:** Geometric sequences count transitions ($$n-1$$) when indexing objects ($$n$$); always verify if the prompt counts the starting object or the operations performed."},{"question":"For the function $$f(x) = \\ln(x^2 + 3)$$ with domain $$x \\in \\mathbb{R}$$, explain the logical chain required to determine the range correctly, and identify the specific flaw in assuming the range is simply \"all real numbers.\" (3 steps)","answer":"- Step 1: Analyze the **inner function** first. Since $$x^2 \\geq 0$$ for all real $$x$$, it follows that $$x^2 + 3 \\geq 3$$. The argument of the logarithm is strictly bounded below by 3; it never approaches 0 or becomes negative.\n- Step 2: Apply the **outer function** properties. The natural logarithm $$\\ln(u)$$ is a strictly increasing function. Therefore, the minimum value of the composite function occurs at the minimum value of the argument: $$\\ln(x^2+3) \\geq \\ln(3)$$.\n- Step 3: Conclude the range is $$[\\ln 3, \\infty)$$. The flaw in assuming \"all reals\" ignores the vertical shift inside the log; $$\\ln(u)$$ only spans $$(-\\infty, \\infty)$$ if $$u$$ can span $$(0, \\infty)$$. Here, $$u$$ is restricted to $$[3, \\infty)$$.\n+ *Visual Intuition:* The graph of $$y=x^2+3$$ is a parabola with vertex at $$(0,3)$$. Applying $$\\ln$$ lifts this vertex to $$(0, \\ln 3)$$ and compresses the vertical scale, but the \"floor\" remains at $$y=\\ln 3$$.\n\n**Takeaway:** For composite functions $$f(g(x))$$, determine the range of $$g$$ first, then treat that range as the domain for $$f$$."},{"question":"When analyzing the rational function $$g(x) = \\frac{3+5x}{x+2}$$ to find its range, why is rewriting it in the form $$A + \\frac{B}{x+2}$$ superior to analyzing the quotient directly, and what are the specific transformation parameters? (3 steps)","answer":"- Step 1: Perform algebraic division to isolate the constant behavior. $$\\frac{5x+3}{x+2} = \\frac{5(x+2)-7}{x+2} = 5 - \\frac{7}{x+2}$$. This separates the function into a **horizontal asymptote** ($$y=5$$) and a **hyperbolic deviation** term.\n- Step 2: Identify the transformations relative to the parent function $$y = -1/x$$. The form reveals a vertical stretch by factor 7, a reflection (due to negative sign), a horizontal shift left by 2, and a vertical shift up by 5.\n- Step 3: Determine the range from the transformed structure. Since $$\\frac{-7}{x+2}$$ can take any non-zero real value, the total expression can take any real value *except* the asymptote value 5. Combined with the domain restriction $$x > -2$$ (right branch only), the term $$\\frac{-7}{x+2}$$ is always negative, so the range is strictly $$y < 5$$.\n+ *Why-not:* Analyzing $$\\frac{5x+3}{x+2}$$ directly obscures the sign of the remainder term. You might know the asymptote is 5, but without the split form, determining whether the curve approaches from above or below requires testing points or calculus.\n\n**Takeaway:** Rewriting rational functions as $$\\text{Asymptote} + \\frac{\\text{Remainder}}{\\text{Divisor}}$$ exposes the sign and magnitude of deviations, making range determination immediate."},{"question":"In implicit differentiation of $$4x^2 + y^2 - 2xy = 24x$$, explain why bracketing the product rule derivative of the $$-2xy$$ term *before* expanding is critical for avoiding sign errors in the final expression for $$dy/dx$$. (3 steps)","answer":"- Step 1: Differentiate the product term $$-2xy$$ with respect to $$x$$. The derivative is $$-2 \\left( x \\frac{dy}{dx} + y \\cdot 1 \\right)$$. Keeping the $$-2$$ outside the bracket preserves the distribution logic.\n- Step 2: Distribute carefully. Expanding yields $$-2x \\frac{dy}{dx} - 2y$
