<script>const DATA={"selected":[{"question":"The volume of revolution formula $$V = \\pi \\int y^2 dx$$ is not printed in the Edexcel formula booklet. Conceptually, where does the $$y^2$$ come from, and why is the $$\\pi$$ necessary? (2 steps)","answer":"- Step 1: When the curve $$y = f(x)$$ is rotated $$2\\pi$$ about the x-axis, it sweeps out a 3D solid. At any slice $$x$$, the cross-section is a circle with radius $$y$$. The area of this circular slice is $$\\pi r^2 = \\pi y^2$$.\n- Step 2: The volume is the continuous sum (integral) of all these infinitesimally thin circular cross-sectional areas along the x-axis. Thus, we integrate the area $$\\pi y^2$$ with respect to $$x$$.\n+ A common misconception is confusing this with arc length or surface area, which involve square roots of derivatives, not the square of the function.\n\nThe formula is simply the integral of the circular cross-sectional area: $$V = \\pi \\int_a^b y^2 dx$$."},{"question":"**[Prior P3 review — not an October 2025 P4 question]** For \\(f(x)=\\ln(x^2+3)\\), where \\(x\\in\\mathbb R\\), determine the exact range of \\(f\\) and explain why saying only that the range is “real” is insufficient.","answer":"Since \\(x^2\\ge 0\\),\n\\[\nx^2+3\\ge 3.\n\\]\nThe natural logarithm is strictly increasing, so\n\\[\n\\ln(x^2+3)\\ge \\ln 3.\n\\]\nEquality occurs at \\(x=0\\), and \\(f(x)\\to\\infty\\) as \\(|x|\\to\\infty\\). Hence the range is\n\\[\n\\boxed{[\\ln 3,\\infty)}.\n\\]\nSaying merely “real” wrongly includes values below \\(\\ln3\\). **Status: the lower-bound error was corrected and the result completed live during prior P3 review.**"},{"question":"In the ESAT warm-up, Harry advised stopping calculation once the correct multiple-choice option is secure. Why is this timing strategy specifically important for aptitude tests like ESAT, and how does it differ from the strategy for A-Level papers? (2 steps)","answer":"- Step 1: Aptitude tests like ESAT are strictly time-pressured with many questions; the scoring rewards breadth of correct attempts over depth of simplification. Once you have matched your derived fraction (e.g., $$\\frac{125}{729}$$) to one of the listed options and verified it is unique, further calculation (like reducing fractions or calculating decimals) yields zero additional marks and consumes time better spent on the next question.\n- Step 2: A-Level papers (like P4) often require exact simplified forms or specific decimal places, and every step of working may be required for method marks. Stopping early on an A-Level paper could lose you simplification marks or final-answer marks. The strategy shifts entirely: ESAT demands strategic abandonment; A-Level demands complete execution.\n+ Memorising common cubes ($$5^3 = 125$$, $$9^3 = 729$$) accelerates the matching step, making the abandonment strategy faster to execute.\n\nTakeaway: Match the strategy to the assessment format: abandon early on multiple-choice aptitude tests, execute fully on step-marked A-Level papers."},{"question":"In Q5, Phuc was told to use equations (1) and (3) — the ones without β — to find λ and μ first. Why is this a sound strategy? (2 steps)","answer":"- Step 1: Equations (1) and (3) involve only λ and μ (no β), so they form a 2×2 system that can be solved directly. Once λ and μ are known, equation (2) becomes a single-variable equation in β, trivially solved by substitution.\n- Step 2: This is the general strategy for \"find three unknowns with three equations, one of which has a special parameter\": solve the equations *without* the special parameter first, then back-substitute. It minimises algebra because the special parameter is isolated to one equation.\n\nTakeaway: when one unknown is \"special\" (e.g. a parameter to be found), solve for the other unknowns first, then back-substitute to find the special one. The special unknown's equation is your *last* step, not your *first*."},{"question":"The scalar (dot) product is flagged as \"Not printed — expected to be remembered\" and is required for P4 §7.7. By contrast, integration by parts is *printed* in the booklet. What is the *assessment implication* of the booklet/not-in-booklet distinction for revision priorities? (2 steps)","answer":"- Step 1: Anything in the booklet does *not* need to be memorised verbatim — the candidate can quote it. The dot product, being off-booklet, must be memorised: definition, formula, and the angle-form $$\\mathbf{a}\\cdot\\mathbf{b}=|\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$.\n- Step 2: Revision time should be allocated proportionally: heavy drilling on the dot product (because it's a recall question on the paper), lighter revision on integration by parts (just practising its application, not memorising the formula).\n\nTakeaway: a \"formulas not given\" blanket label is misleading — the booklet has *some* formulae, and the dot product is the specific P4 formula to remember."},{"question":"The closing-action list identifies five immediate todos (finish Q4(b), Q5, Q6, Q1, revise self-gaps). The lesson explicitly said the recording *does not cut off abruptly* and ends with a clear goodbye. What does this observation about the recording's end tell you about the *completeness* of the in-lesson work? (2 steps)","answer":"- Step 1: A clean closing exchange means the tutor chose to stop at a planned boundary, not because of technical interruption. So the \"deferred to Phuc\" items (Q4(b) finish, Q5 finish, Q6 finish, Q1 expansion) are *deliberately* incomplete, not accidentally so.\n- Step 2: Therefore the lesson's *job* was to set up these problems and correct the conceptual foundations; the *finish-line* work is the learner's responsibility between lessons. The \"official MS reference\" blocks in the guide exist precisely so Phuc has the target answer to check against, without the lesson having to re-derive it.\n\nConceptual point: a deliberately-deferred problem is a *flipped-classroom* signal — the learner finishes it as deliberate practice."},{"question":"**[ESAT warm-up — recording/board-derived, not a Pearson P4 question]** A square is transformed by joining points one third of the way along its sides to form an inner square, and the process is repeated. Find the area of the fourth square as a fraction of the original square’s area. State how many times the area ratio is applied.","answer":"Choose the original side length as \\(3\\). A side of the next square is the hypotenuse of a right triangle with legs \\(1\\) and \\(2\\), so its length is \\(\\sqrt{1^2+2^2}=\\sqrt5\\). Thus the one-step area ratio is\n\\[\n\\frac{(\\sqrt5)^2}{3^2}=\\frac59.\n\\]\nGoing from the first square to the fourth requires three transformations, so\n\\[\n\\left(\\frac59\\right)^3=\\frac{125}{729}.\n\\]\nTherefore the fourth square has area \\(\\boxed{\\frac{125}{729}}\\) of the original. **Status: completed correctly in the lesson, substantially learner-led.**"},{"question":"Why is it incorrect to label the general binomial series and integration by parts as \"formulas not given in the exam\"? (2 steps)","answer":"- Step 1: The general binomial series expansion $$(1+x)^n$$ is explicitly printed in the formula booklet (valid for $$n \\in \\mathbb{R}, |x|<1$$), so you do not need to memorize the pattern of the coefficients.\n- Step 2: Integration by parts is also explicitly printed in the booklet ($$\\int u \\frac{dv}{dx}dx = uv - \\int v \\frac{du}{dx}dx$$). While you must know *when* and *how* to apply them, the formulas themselves are provided.\n\nYou must distinguish between methods you need to learn (implicit differentiation) and formulas that are physically provided on the reference sheet."},{"question":"Compare and contrast the *two* integration techniques used in this lesson: integration by substitution (Q6) and integration by parts (mentioned in the formula register as \"Printed, in P4 §6.2 scope\"). At a conceptual level, when is each technique the right one? (2 steps)","answer":"- Step 1: **Substitution** is the right tool when the integrand contains a function *and* its derivative (or something close), so a new variable $$u$$ can absorb the derivative. Q6's $$\\cos\\theta$$ and $$\\sin\\theta\\,d\\theta$$ is the classic example.\n- Step 2: **Integration by parts** is the right tool when the integrand is a *product of two \"different-type\" functions* (e.g. polynomial × exponential, polynomial × trig, log × polynomial), where neither is the derivative of the other. The booklet gives the formula $$\\int u\\,dv=uv-\\int v\\,du$$.\n\nMental model: substitution \"collapses\" a chain rule; integration by parts \"undoes\" a product rule."},{"question":"A separable differential equation is given as $$dV/dt = 12te^{-t}$$ with $$V(0) = 6$$. Conceptually, what do the initial condition and the differential equation separately tell you about the solution? (2 steps)","answer":"- Step 1: The differential equation $$dV/dt = 12te^{-t}$$ tells you the *rate of change* of $$V$$ at any time $$t$$. Integrating this gives the general family of curves (volume over time), which will include a constant of integration, $$+ C$$.\n- Step 2: The initial condition $$V(0) = 6$$ provides one specific point $$(t=0, V=6)$$ that the solution curve must pass through. This allows you to solve for the exact value of $$C$$, selecting the one specific curve from the family that models this scenario.\n\nThe differential equation defines the shape of the solution, and the initial condition pins down its exact position."},{"question":"Q1's expansion is for (2 + 5x)⁻² in *ascending* powers of x. Why does the direction (ascending vs descending) matter, and what convention does the exam follow? (2 steps)","answer":"- Step 1: \"Ascending powers of x\" means the series is written as a₀ + a₁x + a₂x² + a₃x³ + ... with powers increasing from 0 upward. \"Descending\" would be a₃x³ + a₂x² + a₁x + a₀. The two are reverses of each other, but the coefficients stay attached to their respective powers.\n- Step 2: P4 (and the Edexcel IAL specification) follows the *ascending* convention for binomial series unless explicitly told otherwise. The general binomial expansion (1 + y)ⁿ naturally produces ascending powers, so this convention aligns with the natural form of the series. Miswriting the order (descending) would not lose marks if the terms are correctly identified, but ascending is expected.\n\nTakeaway: the Edexcel convention for binomial series is ascending powers; match the convention to avoid reader confusion and signal fluency."},{"question":"The Q6 lesson had a step where Phuc \"recognised the -1/x graph family\" and \"vertical/horizontal transformations.\" For a function of the form $$A+\\frac{B}{x+c}$$, what is the *complete* description of its graph in terms of the basic $$y=\\frac{1}{x}$$ graph? (3 steps)","answer":"- Step 1: Start with $$y=\\frac{1}{x}$$. Multiply by $$B$$: stretches vertically by factor $$|B|$$ (and reflects if $$B<0$$). So $$y=\\frac{B}{x}$$ is a vertical stretch.\n- Step 2: Replace $$x$$ by $$x+c$$: shifts the graph *horizontally* by $$-c$$ (i.e. left if $$c>0$$, right if $$c<0$$). So $$y=\\frac{B}{x+c}$$ is the previous graph shifted.\n- Step 3: Add $$A$$: shifts *vertically* by $$+A$$. So the final graph has vertical asymptote $$x=-c$$, horizontal asymptote $$y=A$$, and shape determined by $$B$$'s sign.\n\nFor $$g(x)=5-\\frac{7}{x+2}$$: vertical asymptote $$x=-2$$, horizontal asymptote $$y=5$$, reflected (because $$-7<0$$) — and the right branch ($$x>-2$$) sits *below* the horizontal asymptote, giving the range $$y<5$$."},{"question":"Q3, Q7, Q9(b) and Q10 carry \"no lesson status\" in this guide. What does this label mean, and how should a learner treat such questions? (2 steps)","answer":"- Step 1: \"No lesson status\" means the question was *not* discussed in this lesson — neither attempted, corrected, nor referenced with an official answer. The label is *neutral*: it does not mean the learner has mastered or failed the question, nor that it was deliberately skipped. It simply was not part of the 26 June 2026 lesson.\n- Step 2: A learner should treat such questions as \"untouched\" — to be attempted independently, with marking against the official mark scheme later. Drawing any conclusion about mastery from \"no lesson status\" is unwarranted.\n\nTakeaway: distinguish between \"self-assessed gap\" (learner flagged, not taught) and \"no lesson status\" (not even mentioned) — both are untouched but the labels mean different things."},{"question":"The scalar (dot) product $$\\mathbf{a} \\cdot \\mathbf{b}$$ is a key P4 tool that is NOT printed in the exam formula booklet. Conceptually, what two pieces of information does the dot product encode, and what does it mean if the dot product is zero? (2 steps)","answer":"- Step 1: The dot product encodes both the magnitudes of the vectors and the angle between them: $$\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$. It also equals the sum of the products of their components: $$a_1b_1 + a_2b_2 + a_3b_3$$.\n- Step 2: If the dot product is zero, and neither vector is the zero vector, then $$\\cos\\theta = 0$$. This means the angle $$\\theta$$ is $$90^\\circ$$, so the vectors are perpendicular.\n+ A common misconception is thinking a zero dot product means one of the vectors is \"zero\". It purely indicates orthogonality (assuming non-zero vectors).\n\nYou must memorize the dot product formula; it is the primary way to test for perpendicularity and find angles between vectors in P4."},{"question":"In the trigonometric substitution $$u = 3 + \\cos \\theta$$ for the integral $$\\int \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos \\theta}} d\\theta$$, explain why $$\\cos \\theta$$ in the numerator cannot be treated as a constant and how the double-angle identity facilitates the variable change. (3 steps)","answer":"- Step 1: Recognize that $$\\cos \\theta$$ varies with $$\\theta$$, so it cannot be factored out of the integral. It must be expressed in terms of $$u$$. Rearranging the substitution gives $$\\cos \\theta = u - 3$$.\n- Step 2: Expand $$\\sin 2\\theta$$ as $$2 \\sin \\theta \\cos \\theta$$. This is crucial because the derivative of the substitution is $$du = -\\sin \\theta \\, d\\theta$$. The $$\\sin \\theta$$ factor in the numerator acts as the **Jacobian bridge**, cancelling with the $$d\\theta$$ conversion and leaving only algebraic terms in $$u$$.\n- Step 3: Substitute fully. The integrand becomes $$\\frac{2(u-3)}{\\sqrt{u}} (-du)$$. Without the double-angle expansion, you would have $$\\sin 2\\theta$$ which does not match the $$-\\sin \\theta \\, d\\theta$$ differential, making direct substitution impossible without messy inverse trig conversions.\n+ *Why-not:* Trying to integrate $$\\sin 2\\theta / \\sqrt{u}$$ directly fails because the differential relationship is tied to $$\\sin \\theta$$, not $$\\sin 2\\theta$$. The identity aligns the integrand's structure with the substitution's differential.\n\n**Takeaway:** Trigonometric substitutions rely on matching the differential; identities like $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ expose the necessary cancelling factor."},{"question":"When finding a composition like $$fg(x)$$, a common error is to substitute the outer function into the inner function. Conceptually, how should the substitution be ordered, and what goes wrong if you reverse it? (2 steps)","answer":"- Step 1: For $$fg(x)$$, the inner function $$g$$ acts first on the input $$x$$, and then the outer function $$f$$ acts on the result. You must substitute the *entire* expression for $$g(x)$$ in place of the variable inside $$f$$. Think of it as $$f(\\text{blank})$$ where the blank is $$g(x)$$.\n- Step 2: Reversing the order means you are computing $$gf(x)$$ instead of $$fg(x)$$. If you substitute $$f(x)$$ into the formula for $$g$$, you have performed the operations in the wrong sequence. For example, if $$f(x) = \\ln(x)$$ and $$g(x) = x^2+3$$, putting $$g$$ inside $$f$$ gives $$\\ln(x^2+3)$$, but putting $$f$$ inside $$g$$ gives $$(\\ln x)^2 + 3$$, which are totally different functions.\n\nComposition is not commutative; always apply the function written closest to the input first."},{"question":"Author-created practice: find the volume when y = √x, 0 ≤ x ≤ 4, is rotated 2π about the x-axis. Why is this a good warm-up for Q2's full method? (2 steps)","answer":"- Step 1: The setup π∫y² dx applies directly: y² = (√x)² = x, so V = π∫₀⁴ x dx. The integration is the simplest power rule: ∫x dx = x²/2, evaluated from 0 to 4: (4² − 0²)/2 = 16/2 = 8. So V = 8π.\n- Step 2: This isolates the *structural* steps of volume of revolution (identify the formula, square y, integrate over x, evaluate) without any of Q2's complicating factors (a constant multiple 5/3, a shift x − 1, a non-unit lower bound). Practising it as a warm-up builds the muscle memory before tackling the harder Q2.\n\nTakeaway: drill the structure of a technique with the simplest possible example before applying it to a harder one — same shape, less arithmetic noise."},{"question":"The Q6 paper instruction says \"Using $$u=3+\\cos\\theta$$, show that [integral] = $$a\\sqrt{3}+b$$.\" The phrase \"show that\" carries a specific marker in P4: it usually means the answer is *given* and the candidate must *derive* it without skipping steps. What is the practical implication for the amount of working shown? (2 steps)","answer":"- Step 1: \"Show that\" questions typically allocate marks to *key intermediate steps* (the substitution, the new limits, the rewritten integrand, the antiderivative, the substitution of limits). The final numerical answer is usually worth only 1 mark, because the examiner already gave it.\n- Step 2: Practically, this means a candidate should write out each transformation *one line at a time* (substitution stated, differential computed, limits transformed, integrand rewritten, integrated, evaluated) — not jump from the original integral to the final answer.\n\nShow-that = earn the intermediate marks; the final answer is just confirmation."},{"question":"**[Lesson source/status audit]** In the 26 June 2026 lesson, classify the status of October 2025 P4 Q9(a), Q3, Q7, Q9(b), and Q10. What official-reference fact, if any, may be attached to Q9(a)?","answer":"Q9(a) had only the tentative learner self-assessment “might be able to do (a)”; it was not worked or taught. Its official-reference \\(y\\)-coordinate is\n\\[\n\\boxed{\\frac43},\n\\]\nbut this must not be presented as a live result.\n\nQ3, Q7, Q9(b), and Q10 were not discussed and therefore have **no lesson status**. Their absence does not establish mastery, a self-assessed gap, or a deliberate decision to omit them."},{"question":"After differentiating $$4x^2 + y^2 - 2xy = 24x$$ implicitly, how do you isolate $$\\frac{dy}{dx}$$, and why does the denominator end up as $$y - x$$ rather than just $$y$$? (3 steps)","answer":"- Step 1: Differentiate term by term: $$8x + 2y\\frac{dy}{dx} - 2\\left(x\\frac{dy}{dx} + y\\right) = 24$$.\n- Step 2: Expand the product rule bracket and gather all terms containing $$\\frac{dy}{dx}$$ on one side, and all terms not containing it on the other: $$2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} = 24 - 8x + 2y$$.\n- Step 3: Factor out $$\\frac{dy}{dx}$$ from the left side: $$\\frac{dy}{dx}(2y - 2x) = 24 - 8x + 2y$$. Divide both sides by the factor $$2y - 2x$$, and cancel the common factor of 2 from the numerator and denominator: $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$.\n+ The $$-x$$ in the denominator survives because the $$-2x$$ from the product-rule expansion combines with the $$2y$$ from the $$y^2$$ derivative. If the product rule had been botched, those terms wouldn't combine, and the denominator would erroneously be just $$y$$.\n\nTakeaway: Implicit differentiation requires factoring $$\\frac{dy}{dx}$$ from a multi-term coefficient; every surviving variable in that coefficient contributes to the final denominator."},{"question":"**[Formula register — booklet availability and P4 scope are separate axes]** Classify each of the following by whether it is printed in the exam formula booklet and whether it is required or usable in P4: the general binomial series, integration by parts, scalar product, \\(\\pi\\int y^2\\,dx\\), implicit differentiation, and vector-line intersection.","answer":"The two classifications must not be merged:\n\n- **General binomial series:** printed in the formula booklet for \\(n\\in\\mathbb R\\), \\(|x|<1\\); in P4 scope, where rational indices are assessed.\n- **Integration by parts:** printed in the booklet and in P4 scope.\n- **Scalar product:** not printed; it must be remembered and is required in P4.\n- **Volume of revolution \\(\\pi\\int y^2\\,dx\\):** not printed as such; required in P4.\n- **Implicit differentiation:** a method rather than a printed formula; in P4 scope.\n- **Vector-line intersection:** a method rather than a printed formula; in P4 scope.\n\nTherefore it is inaccurate to place all these items under a blanket claim that “P4 formulas are not given.”"},{"question":"In a sequence of nested squares, each inner square is formed by joining points one-third of the way along the sides of the outer square. How does the area of each square relate to the area of the one before it, and why does the original side length not matter when finding the fractional area ratio? (2 steps)","answer":"- Step 1: To find the area ratio, we can assume any convenient side length for the outer square because area ratios are scale-invariant. If we split a side of length 3 into pieces of 1 and 2, the inner square has a side length found via Pythagoras: $$\\sqrt{1^2 + 2^2} = \\sqrt{5}$$.\n- Step 2: The area of the outer square is $$3^2 = 9$$ and the inner square is $$(\\sqrt{5})^2 = 5$$. The one-step area ratio is $$5/9$$. Changing the initial side length scales both the inner and outer areas by the same square factor, which cancels out in the fraction.\n\nThe one-step scaling factor for the area is always $$5/9$$, regardless of the starting size."},{"question":"For the self-assessed gap on volume of revolution ($$y = \\frac{5}{3}\\sqrt{x-1}$$), explain conceptually why the integral setup involves $$y^2$$ rather than $$y$$, and how the constant coefficient $$\\frac{5}{3}$$ behaves differently than in linear integration. (2 steps)","answer":"- Step 1: Volume of revolution sums infinitesimal **disks** with area $$\\pi r^2$$. Since the radius $$r = y$$, the cross-sectional area is proportional to $$y^2$$. Integrating $$y$$ would calculate the area under the curve, not the volume of the solid.\n- Step 2: Squaring the function squares the coefficient: $$(\\frac{5}{3}\\sqrt{x-1})^2 = \\frac{25}{9}(x-1)$$. Unlike linear integration where constants factor out linearly, here the constant scales the volume by its **square**. This amplifies errors in coefficient handling significantly.\n+ *Mental Check:* If you double the function $$y$$, the volume should quadruple (since area scales with square of radius). Your setup must reflect this quadratic sensitivity.\n\n**Takeaway:** Volume integration is inherently quadratic; coefficients and functions are squared before integration."},{"question":"On Q4(b), once the linear relation $$b=12-2a$$ has been derived from the gradient condition, the *second* equation needed to find a and b comes from where, and why is it valid? (2 steps)","answer":"- Step 1: The second equation comes from the fact that the point $$P(a,b)$$ *lies on the curve* C. So its coordinates must satisfy C's equation: $$4a^2+b^2-2ab=24a$$.\n- Step 2: This is valid because \"lies on C\" is a geometric condition that translates directly into the algebraic substitution of $$(a,b)$$ for $$(x,y)$$ in the original equation — giving one extra equation in two unknowns, which together with the linear relation is a solvable 2×2 system.\n\nConceptual point: implicit-differentiation \"gradient at a point\" problems typically bundle *two* pieces of information — the gradient equation (from the derivative) and the curve equation (from the original relation). Both must be used."},{"question":"A learner in the Q6 lesson proposed taking $$\\cos\\theta$$ *outside* the integral as a constant, and was corrected. Why is $$\\cos\\theta$$ not a constant, and what is the correct replacement? (2 steps)","answer":"- Step 1: $$\\cos\\theta$$ varies with $$\\theta$$; on the interval $$[0,\\pi/2]$$ it runs from 1 down to 0. A constant means a fixed number, which $$\\cos\\theta$$ is not.\n- Step 2: Under the substitution $$u=3+\\cos\\theta$$, the rule is $$\\cos\\theta=u-3$$. So wherever $$\\cos\\theta$$ appears inside the integrand, it must be replaced by the expression $$u-3$$ (which is *itself* a function of $$u$$, and that's exactly what makes the integrand a polynomial in $$u$$).\n\nTakeaway: substitution replaces *every* occurrence of the original variable (here, both inside trig functions and in differentials) — not just in the differential."},{"question":"In the ESAT warm-up, the inner square's area was 5/9 of the outer square's area in one step. The learner reached the answer 125/729 for the *fourth* square. Walk through why the exponent on both numerator and denominator is exactly 3, not 2 or 4. (3 steps)","answer":"- Step 1: Number the squares 1 (outermost), 2, 3, 4 (innermost). Going from square 1 to square 2 is *one* application of the area ratio 5/9.\n- Step 2: Going from square 1 to square 4 is three successive applications: 1→2, 2→3, 3→4. So the ratio is raised to the power 3, not 2 (which would only reach square 3) or 4 (which would apply the ratio one time too many).\n- Step 3: Therefore the fourth square's area as a fraction of the original is $$\\left(\\frac{5}{9}\\right)^3=\\frac{5^3}{9^3}=\\frac{125}{729}.$$\n\nMisconception probe: a common error is to write $$(5/9)^4$$ because the question mentions \"the fourth square\" — the exponent counts *transitions*, not the square's index."},{"question":"The P3 review's graphical-calculator comment: Harry said a calculator might make a range/domain step \"quicker\" but he preferred \"deep mathematical understanding.\" What is the deeper pedagogical reason for this preference, beyond the immediate time saving? (2 steps)","answer":"- Step 1: A range/domain question like \"$$g(x)=5-\\frac{7}{x+2}$$, $$x>-2$$\" is testing the candidate's *graphical* and *algebraic* understanding of transformations of the reciprocal function — not the answer $$y<5$$ in isolation.\n- Step 2: If a calculator is used to plot and read off the range, the candidate bypasses the *reason* the range is what it is (the horizontal asymptote, the branch selection, the behaviour near the vertical asymptote). At A-level, the reasoning carries the marks; the answer is just one mark.\n\nPedagogical point: tools can shortcut the *answer* but not the *understanding*, and exam marks are awarded primarily for demonstrated understanding."},{"question":"The Q5 lesson advice to \"write the final coordinates as a row rather than a column\" is a *presentation* tip, not a correctness tip. What is the underlying reason rows are preferred in IAL P4, and is it a *mark-loss* issue if you use a column? (2 steps)","answer":"- Step 1: Rows are easier to typeset inline and read as \"a point's coordinates.\" Columns signal \"this is a vector\" — which is what you use for *direction* vectors and position vectors, but for a *point* a row is more natural.\n- Step 2: No — the mark scheme accepts both. So the preference is purely for *clarity* (e.g. when a point's coordinates are inline with surrounding text), not for *marks*. A column-vector answer is fully correct."},{"question":"For the differential equation $$dV/dt = 12te^{-t}$$, the solution involves integrating by parts. If you choose $$u = 12t$$ and $$dv = e^{-t}dt$$, why is it a mistake to stop integrating after the first step and just write $$V = -12te^{-t} + C$$? (2 steps)","answer":"- Step 1: Integration by parts states $$\\int u dv = uv - \\int v du$$. With $$u = 12t$$ and $$dv = e^{-t}dt$$, we get $$v = -e^{-t}$$ and $$du = 12 dt$$. The formula gives $$-12te^{-t} - \\int (-e^{-t}) \\cdot 12 dt$$.\n- Step 2: A common mistake is to ignore the second integral $$\\int v du$$. You must continue to integrate $$12e^{-t}$$ to get $$-12e^{-t}$$. The full indefinite integral is $$-12te^{-t} - 12e^{-t} + C$$.\n\nIntegration by parts always leaves a new integral to evaluate; the process is incomplete until that secondary integral is resolved."},{"question":"**[October 2025 P4 Q2 — self-assessed gap; official reference only]** The curve\n\\[\ny=\\frac53\\sqrt{x-1},\\qquad 2\\le x\\le 8,\n\\]\nis rotated through \\(2\\pi\\) about the \\(x\\)-axis. Find the exact volume, while stating its lesson status.","answer":"The volume of revolution about the \\(x\\)-axis is\n\\[\nV=\\pi\\int_2^8y^2\\,dx.\n\\]\nSince\n\\[\ny^2=\\frac{25}{9}(x-1),\n\\]\n\\[\nV=\\frac{25\\pi}{9}\\int_2^8(x-1)\\,dx\n=\\frac{25\\pi}{9}\\left[\\frac{(x-1)^2}{2}\\right]_2^8.\n\\]\nHence\n\\[\nV=\\frac{25\\pi}{18}(49-1)\n=\\frac{25\\pi}{18}\\cdot48\n=\\boxed{\\frac{200\\pi}{3}}.\n\\]\n**Status: Q2 was a self-assessed gap and was not taught or worked in the lesson; \\(\\frac{200\\pi}{3}\\) is official-reference work only.**"},{"question":"When substituting $$u = 3 + \\cos\\theta$$ into the integral $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}} d\\theta$$, the transformed limits become $$u=4$$ (lower) and $$u=3$$ (upper). Why is it acceptable to leave the limits in this \"backwards\" order, and what would happen if you swapped them? (2 steps)","answer":"- Step 1: Leaving the limits as $$\\int_4^3$$ is perfectly valid because the Fundamental Theorem of Calculus accounts for the order: evaluating $$F(3) - F(4)$$ will naturally produce a negative value if the antiderivative is increasing, correctly handling the area. The negative sign from $$d\\theta = -du/\\sin\\theta$$ combined with the reversed limits cancels out.\n- Step 2: If you swap the limits to $$\\int_3^4$$, you must also flip the sign of the integral. Since you already have a negative sign from $$d\\theta = -du/\\sin\\theta$$, swapping the limits cancels that negative sign, leaving you with a standard positive integral $$\\int_3^4 \\dots du$$. Either way, the final arithmetic is identical.\n\nYou can leave the limits backwards if you respect the algebra, or swap them to cancel the negative differential sign."},{"question":"**[October 2025 P4 Q1 — hints only live; coefficients official reference only]** For\n\\[\n(2+5x)^{-2},\n\\]\nstate the normalisation reached in the lesson. Then, clearly as official-reference work not completed live, give the first four terms, the interval of validity, and the quadratic approximation coefficients in\n\\[\n\\left(\\frac4{2+5x}\\right)^2\\approx a+bx+cx^2.\n\\]","answer":"**Reached live — hint/start only:**\n\\[\n(2+5x)^{-2}\n=2^{-2}\\left(1+\\frac52x\\right)^{-2}\n=\\frac14\\left(1+\\frac52x\\right)^{-2}.\n\\]\nThe lesson stopped after this normalisation; no coefficients, validity interval or part (c) calculation was completed.\n\n**Official mark-scheme reference — not completed in the lesson:** Using\n\\[\n(1+z)^{-2}=1-2z+3z^2-4z^3+\\cdots\n\\]\nwith \\(z=\\frac52x\\),\n\\[\n(2+5x)^{-2}\n=\\boxed{\\frac14-\\frac54x+\\frac{75}{16}x^2-\\frac{125}{8}x^3+\\cdots}.\n\\]\nValidity requires\n\\[\n\\left|\\frac52x\\right|<1\n\\quad\\Longrightarrow\\quad\n\\boxed{|x|<\\frac25}.\n\\]\nAlso,\n\\[\n\\left(\\frac4{2+5x}\\right)^2\n=16(2+5x)^{-2}\n\\approx 4-20x+75x^2,\n\\]\nso\n\\[\n\\boxed{a=4,\\quad b=-20,\\quad c=75}.\n\\]"},{"question":"**[October 2025 P4 Q6 — live stopping point plus official reference]** Evaluate\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\n\\]\nusing \\(u=3+\\cos\\theta\\). State exactly where the lesson stopped, then give the official-reference completion in the form \\(a\\sqrt3+b\\).","answer":"Using \\(\\sin2\\theta=2\\sin\\theta\\cos\\theta\\),\n\\[\nu=3+\\cos\\theta,\\qquad du=-\\sin\\theta\\,d\\theta,\\qquad \\cos\\theta=u-3.\n\\]\nThe limits transform as\n\\[\n\\theta=0\\Rightarrow u=4,\\qquad\n\\theta=\\frac{\\pi}{2}\\Rightarrow u=3.\n\\]\nThus\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\n=-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)\\,du.\n\\]\n**Reached live:** the lesson stopped at precisely this transformed integral.\n\n**Official mark-scheme reference — not completed in the lesson:**\n\\[\n-2\\left[\\frac23u^{3/2}-6u^{1/2}\\right]_4^3\n=8\\sqrt3-\\frac{40}{3}.\n\\]\nTherefore\n\\[\n\\boxed{a=8,\\qquad b=-\\frac{40}{3}}.\n\\]\nThe outside factor \\(-2\\) belongs to the transformed integral; it is not the requested value of \\(a\\)."},{"question":"Harry recommended memorising common squares and cubes (2³, 3³, 4³, 5³ = 125, 9³ = 729) for the ESAT. How does this connect to the structural recognition of (5/9)³ = 125/729? (2 steps)","answer":"- Step 1: The answer (5/9)³ has the structure \"small integer cubed over small integer cubed.\" If you instantly know 5³ = 125 and 9³ = 729, you can verify the answer structure without doing long division or repeated multiplication.\n- Step 2: In a multiple-choice context, recognising 125 and 729 in the options (and confirming they are 5³ and 9³) tells you the answer matches (5/9)³ without computing the cube the long way. This shifts the time cost from \"compute\" to \"recognise,\" freeing mental bandwidth for harder questions.\n\nTakeaway: pre-computed small powers are *pattern-matching* tools — they let you verify structural answers quickly rather than compute them."},{"question":"In October 2025 P4 Q4, the curve C is given by 4x² + y² − 2xy = 24x. When differentiating implicitly, what is the derivative of y² with respect to x, and what is the derivative of the product xy? (2 steps)","answer":"- Step 1: d/dx(y²) = 2y·(dy/dx) by the chain rule. The derivative of the inside y is dy/dx, and the power rule gives the outer factor 2y.\n- Step 2: d/dx(xy) = x·(dy/dx) + y by the product rule (first·d(second) + second·d(first)). The \"first\" is x, the \"second\" is y, so d(xy)/dx = 1·y + x·(dy/dx) = y + x·(dy/dx).\n\nTakeaway: in implicit differentiation, every occurrence of y contributes a factor of dy/dx via the chain rule, and every product of x and y contributes via the product rule — combine them carefully."},{"question":"When using the substitution $$u = 3 + \\cos\\theta$$ to evaluate an integral, you find $$\\frac{du}{d\\theta} = -\\sin\\theta$$. Why is it critically important to rewrite this as $$d\\theta = \\frac{-du}{\\sin\\theta}$$ instead of just replacing $$d\\theta$$ with $$du$$? (2 steps)","answer":"- Step 1: The substitution changes the variable from $$\\theta$$ to $$u$$, so the differential $$d\\theta$$ must be correctly scaled to the new variable. Replacing $$d\\theta$$ with $$du$$ ignores the rate of change (the derivative) entirely.\n- Step 2: Rearranging to $$d\\theta = \\frac{-du}{\\sin\\theta}$$ allows the $$\\sin\\theta$$ in the numerator of the integral to cancel with the $$\\sin\\theta$$ in the denominator of the differential replacement, cleanly removing all $$\\theta$$'s from the integral.\n+ A common error is dropping the negative sign during this rearrangement, which flips the limits of integration and changes the sign of the final answer.\n\nThe differential relationship is what allows you to trade out the old variable and its $$d\\theta$$ for the new variable and its $$du$$."},{"question":"In vector line equations like $$r = (2, -1, 3) + \\lambda(1, 4, 2)$$, what is the geometric meaning of the first bracket $$(2, -1, 3)$$ versus the second bracket $$(1, 4, 2)$$? (2 steps)","answer":"- Step 1: The first bracket is the position vector of a specific point that the line passes through. It acts as an \"anchor\" fixing the line in space.\n- Step 2: The second bracket is the direction vector. It dictates the line's orientation and slope in 3D space. As $$\\lambda$$ varies, you slide along this direction vector starting from the anchor point.\n+ A common error is confusing the two, leading to a line that passes through the origin (if the direction vector is used as the position) or has the wrong slope.\n\nThe first bracket is \"where\" (position), the second bracket is \"which way\" (direction)."},{"question":"Q8's official solution is V = 18 − 12te⁻ᵗ − 12e⁻ᵗ. The question is about whether a capacity of 20 is ever reached. Conceptually, why is the answer \"no\" and what does this mean for V as t → ∞? (2 steps)","answer":"- Step 1: As t → ∞, both te⁻ᵗ and e⁻ᵗ → 0 (exponential decay beats polynomial growth). So V(t) → 18 − 0 − 0 = 18. The volume approaches a horizontal asymptote at V = 18.\n- Step 2: Since 18 < 20, the capacity of 20 is *never* reached. The \"tank\" fills asymptotically toward 18, never crossing the 20 threshold. This is a hallmark of decay-modulated filling: dV/dt = 12t·e⁻ᵗ decays (after its maximum) because e⁻ᵗ dominates, so the inflow rate diminishes to zero.\n\nTakeaway: when modelling capacity questions, examine the long-term limit of the solution; if it asymptotes below the capacity, the capacity is never reached regardless of time elapsed."},{"question":"For g(x) = (3 + 5x)/(x + 2), how do you rewrite it in the form A + B/(x+2) to expose its asymptotes, and what are the vertical and horizontal asymptotes? (3 steps)","answer":"- Step 1: Perform polynomial long division of (3 + 5x) by (x + 2). Dividing gives quotient 5 and remainder −7 (since 5(x+2) = 5x+10, and 5x+10 − 7 = 5x+3, which is the original numerator up to sign convention).\n- Step 2: So g(x) = 5 − 7/(x+2). The form A + B/(x+2) has A = 5 (horizontal asymptote) and vertical asymptote at x = −2 (where the denominator vanishes).\n- Step 3: The sign of B = −7 tells you which branch of the hyperbola: negative B means the function is on the side where the original 1/x graph is reflected in x (h(x) = −1/x shape). The vertical asymptote is *always* at the zero of the denominator; the horizontal asymptote is *always* the quotient A.\n\nTakeaway: rewriting as A + B/(x+a) is the cleanest way to read off both asymptotes at once."},{"question":"To find where two vector lines $$l_1: \\mathbf{r} = (2, -1, 3) + \\lambda(1, 4, 2)$$ and $$l_2: \\mathbf{r} = (-1, \\beta, 6) + \\mu(2, -1, 7)$$ intersect, you set their position vectors equal. Why does this yield exactly three equations, and why do you only need two of them to find the parameters $$\\lambda$$ and $$\\mu$$? (2 steps)","answer":"- Step 1: A position vector in 3D space has three components (x, y, and z). Setting $$\\mathbf{r}_1 = \\mathbf{r}_2$$ means equating the x-components, the y-components, and the z-components separately. This produces three distinct simultaneous equations involving $$\\lambda$$ and $$\\mu$$.\n- Step 2: To solve for two unknowns ($$\\lambda$$ and $$\\mu$$), you only need two independent equations. You choose the two equations that do *not* contain the unknown constant $$\\beta$$, allowing you to solve for the parameters first without dealing with $$\\beta$$.\n\nUse the two parameter-free equations to find $$\\lambda$$ and $$\\mu$$, then use the remaining equation to find $$\\beta$$."},{"question":"In Q4(a), the printed instruction says \"show all stages; solutions relying entirely on calculator technology are not acceptable.\" What does this restriction forbid, and what does it *not* forbid? (2 steps)","answer":"- Step 1: It forbids using a calculator's symbolic-differentiation or implicit-differentiation feature (e.g. CAS) to produce the derivative in one step without showing the chain rule, product rule, and algebra. The *method* must be visible.\n- Step 2: It does *not* forbid using a calculator for arithmetic (e.g. multiplying out terms, simplifying a fraction numerically). It also does not forbid a calculator for questions *without* this instruction (like Q5). The restriction is method-specific, not blanket.\n\nTakeaway: read the printed rubric on each question — \"no calculator\" in P4 is question-specific, not paper-wide."},{"question":"Phuc's self-assessed note for Q6 said \"using cosine rule.\" Why is this mistaken, and what method does Q6 actually require? (2 steps)","answer":"- Step 1: Q6 is a trigonometric integration, not a geometry problem. The \"cosine rule\" applies to side-angle-side relationships in triangles; it has no direct role in evaluating ∫ sin 2θ / √(3 + cos θ) dθ.\n- Step 2: Q6 requires the *double-angle identity* sin 2θ = 2 sin θ cos θ and the *substitution* u = 3 + cos θ. The double-angle identity converts the integrand into a form where the sin θ factor cancels against dθ, leaving a power-rule integral in u. There is no triangle and no cosine rule involved.\n\nTakeaway: always re-read the question stem and identify the *actual* technique required; a self-note that names an unrelated method is a red flag for misreading the problem."},{"question":"For $$g(x) = \\frac{3+5x}{x+2}$$, $$x > -2$$, rewriting it as $$g(x) = 5 - \\frac{7}{x+2}$$ reveals its graph as a transformation of $$h(x) = -\\frac{1}{x}$$. What is the sequence of transformations, and why does $$x > -2$$ restrict us to only one branch? (3 steps)","answer":"- Step 1: Identify the base graph $$h(x) = -\\frac{1}{x}$$, which has branches in the top-left (2nd quadrant) and bottom-right (4th quadrant), with asymptotes at $$x=0$$ and $$y=0$$.\n- Step 2: Apply the transformations in order: $$g(x) = 7 \\cdot h(x+2) + 5$$.\n+ The $$+2$$ inside shifts the graph 2 units left, moving the vertical asymptote from $$x=0$$ to $$x=-2$$.\n+ The $$7\\cdot$$ stretches the graph vertically by a factor of 7.\n+ The $$+5$$ outside shifts the graph 5 units up, moving the horizontal asymptote from $$y=0$$ to $$y=5$$.\n- Step 3: The domain $$x > -2$$ means we only accept inputs to the right of the vertical asymptote $$x=-2$$. This completely excludes the left-hand branch of the transformed curve. Therefore, the graph consists solely of the right-hand branch, which approaches $$y=5$$ from below, yielding the range $$y < 5$$.\n\nTakeaway: A domain restriction like $$x > -2$$ acts as a spatial filter, slicing away entire branches of a rational curve."},{"question":"In Q6, the limit $$\\theta=\\pi/2$$ gives $$\\cos\\theta=0$$, so $$u=3+0=3$$. The lesson initially had a slip where Phuc said $$\\cos(\\pi/2)=\\tfrac{1}{2}$$. Why is this kind of slip a high-risk error in a \"show that\" question, and what is the conceptual fix? (2 steps)","answer":"- Step 1: A wrong limit value propagates through the whole evaluation. If you use $$u=3+\\tfrac{1}{2}=\\tfrac{7}{2}$$ at the upper limit, the final answer is wrong even if every other step is correct — and the *form* $$a\\sqrt{3}+b$$ would no longer match.\n- Step 2: The conceptual fix is to remember that $$\\cos\\theta$$ at the *standard angles* is one of $$\\{1, \\tfrac{1}{2}, 0, -1\\}$$ for $$\\theta\\in\\{0,\\tfrac{\\pi}{3},\\tfrac{\\pi}{2},\\pi\\}$$. Drilling these four values is essential for P4."},{"question":"When expanding $$(2 + 5x)^{-2}$$ using the general binomial series, why must you first factor out the 2 to write it as $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$ instead of expanding directly? (3 steps)","answer":"- Step 1: The general binomial series $$(1+w)^n = 1 + nw + \\frac{n(n-1)}{2!}w^2 + \\dots$$ is only valid when the bracket begins with exactly 1. The expression $$(2 + 5x)^{-2}$$ starts with 2, so the standard formula cannot be applied directly to it.\n- Step 2: Factoring out the 2 from the bracket converts the base into the required form. $$(2 + 5x)^{-2} = (2(1 + \\frac{5}{2}x))^{-2}$$.\n- Step 3: Using index laws, the power applies to both factors: $$(2)^{-2} \\cdot (1 + \\frac{5}{2}x)^{-2}$$. Now the second bracket starts with 1, and $$w = \\frac{5}{2}x$$, so the series formula can be safely applied.\n\nThe binomial series template strictly requires a leading 1; factor out the constant to create it."},{"question":"Why is the method of \"implicit differentiation\" considered a *method* rather than a *formula*, and what does this imply about how you must prepare for it on the P4 exam? (2 steps)","answer":"- Step 1: A formula is a fixed symbolic relationship (like $$\\frac{d}{dx}[\\sin x] = \\cos x$$) that you can plug numbers into. Implicit differentiation is an algorithmic process: you differentiate both sides with respect to $$x$$, apply the chain rule to $$y$$-terms (generating $$\\frac{dy}{dx}$$), apply the product rule to mixed terms, and then algebraically rearrange to isolate $$\\frac{dy}{dx}$$.\n- Step 2: Because it is a method, you cannot simply \"look it up\" in a formula booklet or recall a single equation. You must practise the *sequence of decisions*: when to use the chain rule, when to use the product rule, and how to gather and factor the $$\\frac{dy}{dx}$$ terms. Your preparation must be procedural fluency, not factual memorisation.\n+ The formula booklet lists integration by parts, but it does not—and cannot—list \"implicit differentiation\" because the algebraic rearrangement depends entirely on the specific equation given.\n\nTakeaway: Methods require procedural rehearsal; formulas require factual recall. P4 tests both."},{"question":"In Q4(a), the lesson used the bracket-first approach: −2(x·(dy/dx) + y) before expanding. What is the parallel lesson for the volume-of-revolution formula π∫y²dx when y is a sum (e.g. y = a + b)? (1 step)","answer":"- Step 1: By analogy, when y = a + b, you must square the *whole* sum: y² = (a + b)² = a² + 2ab + b². You cannot square a and b separately and add — (a + b)² ≠ a² + b². The same \"bracket the whole thing first\" habit applies: don't expand prematurely, keep the structure intact until you're ready to use a known identity (like (a+b)² = a² + 2ab + b² or the product rule expansion).\n\nTakeaway: a common algebraic habit — bracket first, then expand using a known identity — applies across differentiation, integration, and algebraic manipulation."},{"question":"After implicitly differentiating $$4x^2 + y^2 - 2xy = 24x$$ and isolating $$dy/dx$$, you find $$dy/dx = \\frac{12 - 4x + y}{y - x}$$. If a point $$P(a, b)$$ on the curve has a gradient of 2, why does setting the derivative equal to 2 give only one equation for two unknowns, and where do you find the second equation? (2 steps)","answer":"- Step 1: Substituting $$x=a$$, $$y=b$$, and $$dy/dx=2$$ yields $$\\frac{12 - 4a + b}{b - a} = 2$$. This is a single linear equation relating $$a$$ and $$b$$ (which simplifies to $$2a + b = 12$$). One equation with two unknowns has infinitely many solutions, so it cannot uniquely determine the point.\n- Step 2: The second equation comes from the fact that the point $$P(a,b)$$ *lies on the curve*. This means the original curve equation must be satisfied at that point, providing the second relation: $$4a^2 + b^2 - 2ab = 24a$$.\n\nTo find a specific point on a curve given a gradient, you must always use both the derivative condition and the original curve equation."},{"question":"**[October 2025 P4 Q4(b) — live stopping point plus official reference]** A point \\(P(a,b)\\), with \\(a>0\\) and \\(b>0\\), lies on\n\\[\n4x^2+y^2-2xy=24x,\n\\]\nand the gradient there is \\(2\\). Given\n\\[\n\\frac{dy}{dx}=\\frac{12-4x+y}{y-x},\n\\]\nstate the exact live stopping point, then complete the solution as an explicitly labelled official-reference calculation. Include the recorded tutor slip and its correction.","answer":"Substituting \\(x=a\\), \\(y=b\\) and gradient \\(2\\) gives\n\\[\n\\frac{12-4a+b}{b-a}=2\n\\quad\\Longrightarrow\\quad\n12-4a+b=2b-2a\n\\quad\\Longrightarrow\\quad\n\\boxed{2a+b=12}.\n\\]\nTogether with the point-on-curve condition,\n\\[\n4a^2+b^2-2ab=24a.\n\\]\n**Reached live:** the lesson reached these two relations, equivalently \\(b=12-2a\\), and then stopped. The substitution was deferred to Phuc.\n\n**Official mark-scheme reference — not completed in the lesson:** Substitute \\(b=12-2a\\):\n\\[\n4a^2+(12-2a)^2-2a(12-2a)=24a,\n\\]\n\\[\n12a^2-96a+144=0,\n\\]\n\\[\na^2-8a+12=0=(a-2)(a-6).\n\\]\nThus \\(a=2\\) or \\(a=6\\). Since \\(b=12-2a\\), the candidates are\n\\[\n(a,b)=(2,8)\\quad\\text{or}\\quad(6,0).\n\\]\nThe condition \\(b>0\\) rejects \\(b=0\\), so the official result is\n\\[\n\\boxed{P=(2,8)}.\n\\]\n**Tutor-slip disclosure:** Harry suggested that the two values of \\(b\\) might be positive and negative. The official candidates actually give \\(b=8\\) and \\(b=0\\); it is \\(b>0\\), not a sign comparison, that rejects \\(0\\)."},{"question":"Q1's expansion of $$(2+5x)^{-2}$$ uses the *general* binomial series (with $$n\\in\\mathbb{R}$$), not the *finite* binomial expansion (which would be the case for positive-integer $$n$$). What is the key difference in the *output*, and why does the choice matter? (2 steps)","answer":"- Step 1: For positive-integer $$n$$, the binomial expansion is *finite* (it terminates after $$n+1$$ terms). For rational $$n$$ (like $$-2$$ here), the expansion is *infinite* — every term is nonzero.\n- Step 2: This is why Q1(a) asks for \"the first four terms\" (acknowledging the expansion is infinite) and Q1(b) asks for the validity interval $$|x|<\\tfrac{2}{5}$$ (acknowledging convergence is conditional). For a positive-integer exponent, no validity interval would be needed.\n\nStrategy probe: students sometimes mistakenly use the finite form for negative indices, producing an expansion that \"stops\" after a few terms incorrectly."},{"question":"After substituting $$u = 3 + \\cos \\theta$$ into the Q6 integral, the integrand simplifies to $$-2\\int_4^3 (u^{1/2} - 3u^{-1/2}) du$$. Why does this require the power rule for integration (yielding terms like $$u^{3/2}$$), rather than the natural logarithm rule? (2 steps)","answer":"- Step 1: The logarithm rule, $$\\int \\frac{1}{u} du = \\ln|u|$$, applies strictly when the integrand is exactly $$u^{-1}$$ with no other variable terms multiplying it. Our integrand contains $$u^{1/2}$$ and $$u^{-1/2}$$, which are powers of $$u$$ offset from $$-1$$.\n- Step 2: For any power $$u^n$$ where $$n \\neq -1$$, the power rule applies: $$\\int u^n du = \\frac{u^{n+1}}{n+1}$$.\n+ Applying this: $$\\int u^{1/2} du = \\frac{2}{3}u^{3/2}$$, and $$\\int u^{-1/2} du = 2u^{1/2}$$.\n+ A common misconception is reaching for the ln rule whenever a fraction or a negative power appears, without checking if the exponent is exactly $$-1$$.\n\nTakeaway: The ln rule is the exception for the isolated exponent $$-1$$; all other rational powers fall under the power rule."},{"question":"In the formula register, \"π∫x² dy\" is listed as \"mathematically valid but not required for P4.\" What does this represent, and why isn't it in P4's assessed formula set? (2 steps)","answer":"- Step 1: π∫x² dy is the volume of revolution when the curve is rotated about the *y*-axis (so the radius is x, and the integration is along y). It is the y-axis analogue of π∫y²dx for the x-axis.\n- Step 2: P4's specification only requires volumes of revolution about the x-axis using π∫y²dx. The π∫x²dy form is mathematically equivalent in concept but not in the assessed formula set, so P4 students need only memorise the x-axis form. Spec boundaries — not just mathematical validity — determine what to revise.\n\nTakeaway: knowing the spec's required formulas saves revision time; \"mathematically valid\" doesn't mean \"in the exam.\""},{"question":"In Q5, two lines are given in vector form. Write down the two vector equations and identify the system of component equations that arises when the lines intersect. (2 steps)","answer":"- Step 1: l₁: r = (2, −1, 3) + λ(1, 4, 2); l₂: r = (−1, β, 6) + μ(2, −1, 7). At the intersection, r₁ = r₂.\n- Step 2: Equating components gives three scalar equations: (1) 2 + λ = −1 + 2μ; (2) −1 + 4λ = β − μ; (3) 3 + 2λ = 6 + 7μ. With three equations and three unknowns (λ, μ, β), the system is determined. The first and third equations have no β, so solve them first to get λ and μ, then use the second to find β.\n\nTakeaway: at the intersection of two 3D lines, you always get exactly three scalar equations — one per coordinate. Choose the pair without the parameter you want to find last."},{"question":"In the ESAT nested-squares warm-up, a second square is formed inside the first by joining points one third of the way along the sides. The learner chose the original side to be split into pieces 1 and 2 (so side length 3). Why is it valid to *choose* the original side length when the answer is a fraction of the original area? (2 steps)","answer":"- Step 1: The question asks for the inner square's area *as a fraction of the original area*. Any specific side length you pick produces the same fraction, because the ratio is dimensionless.\n- Step 2: Choosing side 3 (pieces 1 and 2) is convenient because the inner side becomes $$\\sqrt{1^2+2^2}=\\sqrt{5}$$ by Pythagoras, and the area ratio is then $$\\frac{5}{9}$$ — clean integers, no decimal arithmetic.\n\nTakeaway: scaling freedom is a legitimate simplification tool whenever a problem asks for a ratio or fraction, not an absolute value."},{"question":"When implicitly differentiating the equation $$4x^2 + y^2 - 2xy = 24x$$, what is the most common algebraic mistake when differentiating the product $$-2xy$$, and how do you avoid it? (2 steps)","answer":"- Step 1: The term $$-2xy$$ is a product of $$x$$ and $$y$$, so it requires the product rule. Differentiating with respect to $$x$$ gives $$-2\\left(x \\cdot \\frac{dy}{dx} + y \\cdot 1\\right)$$.\n- Step 2: The most common mistake is failing to distribute the negative sign from the $$-2$$ across the entire bracket, leading to $$-2x\\frac{dy}{dx} - y$$ instead of the correct $$-2x\\frac{dy}{dx} - 2y$$.\n+ To avoid this, bracket the entire product-rule derivative first: $$-2[x\\frac{dy}{dx} + y]$$, and only then expand the $$-2$$.\n\nBracketing the product rule derivative before expanding ensures the negative sign survives on both terms."},{"question":"For the differential equation $$\\frac{dV}{dt} = 12te^{-t}$$ with initial condition $$V(0) = 6$$, what is the conceptual sequence of steps to find the function $$V(t)$$? (3 steps)","answer":"- Step 1: Integrate both sides with respect to $$t$$ to reverse the differentiation. The right side requires integration by parts because it is a product of a polynomial ($$t$$) and an exponential ($$e^{-t}$$).\n- Step 2: When integrating, an arbitrary constant of integration $$+C$$ appears. To find its specific value, substitute the initial condition: set $$t=0$$ and $$V=6$$ into the integrated equation.\n- Step 3: Solve the resulting linear equation for $$C$$, and write the final specific function $$V(t)$$.\n+ A common error is forgetting the constant of integration entirely, or trying to substitute the initial condition before integrating.\n\nIntegrate, add $$+C$$, then use the initial condition to pin down the exact solution."},{"question":"In the lesson, Harry distinguished \"printed in the formula booklet\" from \"in P4 assessment scope.\" Why are these two axes independent, and what confusion does conflating them cause? (2 steps)","answer":"- Step 1: A formula can be *printed* (in the booklet, so you don't memorise it) but *not in scope* (you won't be tested on it). Conversely, a formula can be *in scope* (you'll be tested on it) but *not printed* (you must memorise it). The two properties are orthogonal: one is about *availability*, the other is about *relevance*.\n- Step 2: Conflating them leads to mistakes like \"I don't need to memorise the scalar product because it's not in the booklet\" (wrong — it's in scope, so memorise it) or \"I need to memorise the general binomial series because it's in scope\" (wrong — it's printed, so look it up). The two-axis classification prevents both errors.\n\nTakeaway: separate *availability* (in booklet?) from *relevance* (in spec?) — they're independent properties and a formula can have any combination."},{"question":"After differentiating $$4x^2 + y^2 - 2xy = 24x$$ implicitly, you reach $$8x + 2y\\frac{dy}{dx} - 2\\left(x\\frac{dy}{dx} + y\\right) = 24$$. Walk through the algebraic steps to isolate $$\\frac{dy}{dx}$$. (3 steps)","answer":"- Step 1: Expand the bracket carefully: $$8x + 2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} - 2y = 24$$.\n- Step 2: Group the $$\\frac{dy}{dx}$$ terms on one side and the rest on the other: $$(2y - 2x)\\frac{dy}{dx} = 24 - 8x + 2y$$.\n- Step 3: Factor out and divide to isolate $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx} = \\frac{24 - 8x + 2y}{2y - 2x}$$. Dividing numerator and denominator by 2 gives the simplest form: $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$.\n\nThe key is expanding correctly, then grouping all $$\\frac{dy}{dx}$$ terms before factoring."},{"question":"In the formula register, the general binomial series is marked as \"Printed\" in the booklet but P4 *assesses rational n*. What is the difference between \"printed\" and \"assessed,\" and why does this matter for revision? (2 steps)","answer":"- Step 1: \"Printed in the booklet\" means the *formula* is supplied in the exam — you don't need to memorise it. \"Assessed with rational n\" means the *type of problem* involves rational (not just integer) indices, so you must understand the structure of the series, not just look it up.\n- Step 2: For revision, this means: you can save memorisation effort on the formula itself, but you must *practise* applying it with rational n, with the validity condition |y| < 1, and with multiple bracket transformations (factor out the leading constant first).\n\nTakeaway: \"printed\" frees you from memorising the formula but doesn't free you from understanding the *conditions* and the *technique* of applying it."},{"question":"**[October 2025 P4 Q4(a) — corrected and completed live]** The curve\n\\[\n4x^2+y^2-2xy=24x\n\\]\nis defined implicitly. Differentiate it with respect to \\(x\\) and obtain \\(\\frac{dy}{dx}\\) in simplest form. Identify the learner’s corrected error.","answer":"Differentiating term by term, with \\(y=y(x)\\),\n\\[\n8x+2y\\frac{dy}{dx}-2\\left(x\\frac{dy}{dx}+y\\right)=24.\n\\]\nCollecting the derivative terms gives\n\\[\n(2y-2x)\\frac{dy}{dx}=24-8x+2y.\n\\]\nHence\n\\[\n\\boxed{\\frac{dy}{dx}=\\frac{12-4x+y}{y-x}}.\n\\]\nThe learner’s original numerator was correct, but the denominator was missing the \\(-x\\). The live correction was to bracket the entire product-rule derivative\n\\[\n-2\\left(x\\frac{dy}{dx}+y\\right),\n\\]\nwhich preserves the \\(-2x\\frac{dy}{dx}\\) term. Part (a) was corrected and completed live."},{"question":"**[October 2025 P4 Q8 — self-assessed gap; official reference only]** A quantity \\(V\\) satisfies\n\\[\n\\frac{dV}{dt}=12te^{-t},\\qquad V(0)=6.\n\\]\nFind \\(V\\) as a function of \\(t\\) and determine whether \\(V\\) ever reaches a capacity of \\(20\\). Do not use integrating factors.","answer":"Integrate directly:\n\\[\nV=\\int12te^{-t}\\,dt.\n\\]\nSince\n\\[\n\\int te^{-t}\\,dt=-(t+1)e^{-t}+C,\n\\]\n\\[\nV=-12(t+1)e^{-t}+C.\n\\]\nUsing \\(V(0)=6\\),\n\\[\n6=-12+C\\quad\\Longrightarrow\\quad C=18.\n\\]\nTherefore\n\\[\n\\boxed{V=18-12te^{-t}-12e^{-t}}.\n\\]\nFor \\(t\\ge0\\),\n\\[\n\\frac{dV}{dt}=12te^{-t}\\ge0,\n\\]\nso \\(V\\) increases, while\n\\[\n\\lim_{t\\to\\infty}V=18.\n\\]\nThus \\(V<18\\) for finite \\(t\\ge0\\) and never reaches \\(20\\). **Status: Q8 was a self-assessed gap and was not taught in the lesson; the formula and capacity conclusion are official-reference only.**"},{"question":"**[Prior P3 review — not an October 2025 P4 question]** Let\n\\[\ng(x)=\\frac{3+5x}{x+2},\\qquad x>-2.\n\\]\nRewrite \\(g\\) in transformed-reciprocal form, identify its asymptotes, determine its range, and hence state the domain required for \\(g^{-1}\\).","answer":"Polynomial division gives\n\\[\n3+5x=5(x+2)-7,\n\\]\nso\n\\[\ng(x)=5-\\frac7{x+2}.\n\\]\nIts vertical asymptote is \\(x=-2\\), and its horizontal asymptote is \\(y=5\\). Because the domain is restricted to \\(x>-2\\), we have \\(x+2>0\\), so\n\\[\n-\\frac7{x+2}<0\n\\quad\\Longrightarrow\\quad\ng(x)<5.\n\\]\nEvery value below \\(5\\) is attained, so the range is\n\\[\n\\boxed{y<5}.\n\\]\nThe domain of the inverse equals the range of the original function:\n\\[\n\\boxed{\\operatorname{dom}(g^{-1})=\\{x:x<5\\}}.\n\\]\n**Status: the range and inverse-domain reasoning was corrected live; the full inverse algebra was prior work/reference, not freshly derived in this lesson.**"},{"question":"When setting two vector line equations equal to find an intersection, why must you equate all *three* components, and why is it mathematically safe to use only two of the resulting equations to solve for the parameters $$\\lambda$$ and $$\\mu$$? (2 steps)","answer":"- Step 1: A 3D position vector $$\\mathbf{r}$$ has three components $$(x, y, z)$$, so equality of vectors $$\\mathbf{r}_1 = \\mathbf{r}_2$$ demands equality in all three dimensions simultaneously. This yields three equations. You must check all three to ensure the lines truly meet in 3D space, rather than passing close in two dimensions but missing each other in the third (which would mean they are skew).\n- Step 2: You only *solve* using two equations because you have two unknowns ($$\\lambda$$ and $$\\mu$$). Two independent linear equations are sufficient to determine a unique pair of parameters. The third equation is then used as a verification check: if the found $$\\lambda$$ and $$\\mu$$ satisfy it, the lines intersect; if not, they are skew.\n+ In Q5, equations (1) and (3) were chosen because they contained no $$\\beta$$, making them a clean 2-variable system for $$\\lambda$$ and $$\\mu$$.\n\nTakeaway: Three equations guarantee 3D intersection; two equations are enough to solve the parameter system, leaving the third for verification."},{"question":"Why is it essential to state both an equation and a domain when specifying an inverse function, and how does the domain of the original function dictate the range of the inverse? (2 steps)","answer":"- Step 1: An inverse function must map every output of the original function back to its unique input. If the original function has a restricted domain (e.g., $$x > -2$$), its range is restricted (e.g., $$y < 5$$). The inverse function's domain must be exactly this original range, otherwise it would attempt to process inputs the original never produced, breaking the function definition.\n- Step 2: Because we state domains in terms of the independent variable (traditionally $$x$$), we must relabel. The original range $$y < 5$$ becomes the inverse's domain $$x < 5$$. Stating only the inverse equation (e.g., $$g^{-1}(x) = \\frac{2x-3}{5-x}$$) without the domain $$x < 5$$ leaves the inverse ambiguous—it wouldn't be clear which branch of the rational curve to use.\n+ A common misconception is swapping $$x$$ and $$y$$, solving for $$y$$, and declaring the job done. Without explicitly stating the inherited domain, the inverse is not fully defined.\n\nTakeaway: A function without a domain is just a curve; a function *is* its domain plus its rule."},{"question":"Finally, connect everything: the lesson spans ESAT, P3 review, and P4 questions. What is the *overarching* learning theme, and how does each piece (ESAT warm-up, P3 corrections, P4 Q4–Q6) contribute to it? (2 steps)","answer":"- Step 1: The overarching theme is *conceptual fluency under exam conditions* — the ability to recognise patterns, choose techniques, and avoid the small slips (signs, brackets, normalisations) that lose marks.\n- Step 2: \n+ ESAT warm-up: pattern recognition (geometric series via Pythagoras) and *timed*-multiple-choice efficiency.\n+ P3 review: refreshing reciprocal-graph transformations, range/inverse-domain, composition order — all *foundational* for P4.\n+ P4 Q4: implicit differentiation discipline (bracket everything, don't drop terms).\n+ P4 Q5: vector-line intersection strategy (use clean component equations, check by both lines).\n+ P4 Q6: trigonometric substitution (double-angle rewrite, differential, limits, sign handling).\n\nThe lesson is therefore a *targeted* review that mixes warm-up, foundation, and P4-specific technique — not a \"do a paper from start to finish\" lesson."},{"question":"**[ESAT warm-up — recording/board-derived, NOT a Pearson P4 question]** A square is transformed by joining points one third of the way along its sides, producing an inner square; the process is repeated. Taking each original side as \\(3\\), explain why the area of the fourth square is \\(\\frac{125}{729}\\) of the area of the first square. State the lesson status.","answer":"Each side is split into lengths \\(1\\) and \\(2\\), so an inner-square side has length\n\\[\n\\sqrt{1^2+2^2}=\\sqrt5.\n\\]\nThe outer and inner areas are therefore \\(3^2=9\\) and \\((\\sqrt5)^2=5\\), giving a one-step area ratio of \\(\\frac59\\). From the first square to the fourth square there are three transformations, so\n\\[\n\\left(\\frac59\\right)^3=\\frac{5^3}{9^3}=\\frac{125}{729}.\n\\]\nThis was completed correctly and substantially learner-led in the lesson. Its exact official ESAT-paper identity was not established, and it is not an October 2025 P4 question."},{"question":"**[Prior P3 review — correction/explanation only, not an October 2025 P4 question]** If a composition problem involving functions \\(f\\) and \\(g\\) produces logarithms on both sides because the functions were substituted in the wrong order, state the reliable procedure for distinguishing \\(f\\circ g\\) from \\(g\\circ f\\), and state how far this issue was taken in the lesson.","answer":"Function composition is read from right to left:\n\\[\n(f\\circ g)(x)=f(g(x)),\n\\]\nso first evaluate \\(g(x)\\), then substitute the entire expression into every occurrence of the input in \\(f\\). Conversely,\n\\[\n(g\\circ f)(x)=g(f(x)),\n\\]\nso first evaluate \\(f(x)\\), then substitute it into \\(g\\). Parentheses should be retained until the substitution is complete; reversing the order generally gives a different expression.\n\n**Status:** Harry diagnosed that \\(f\\) and \\(g\\) had been substituted in the wrong order and identified which expression belonged inside which function. This was **prior P3 correction/explanation only**; no complete solution to that composition part was worked through, and it was not an October 2025 P4 question."},{"question":"Putting together the lesson's evidence, what are the *three* P4 skill categories Phuc demonstrated strengths in, and the *three* categories flagged as gaps? Use the lessons' own labels and corrections. (1 step with six sub-points)","answer":"- Step 1: \n+ **Strengths:** (i) ESAT-style multiple-choice reasoning (nested squares: scaling freedom, Pythagoras, cube counting). (ii) Recognition of standard forms ($$\\sin 2\\theta$$ as $$2\\sin\\theta\\cos\\theta$$, reciprocal-graph family). (iii) Setting up vector-line intersections (three-component equations, choice of \"clean\" 2×2 system).\n+ **Gaps:** (i) Implicit differentiation: forgetting the *whole* product-rule bracket, dropping the $$-x$$ term. (ii) Substitution: treating $$\\cos\\theta$$ as a constant rather than replacing it via $$u=3+\\cos\\theta$$. (iii) Binomial series: not normalising the bracket to start with 1 (initially missed the $$\\tfrac{5}{2}$$ factor).\n\nThis is the diagnostic snapshot from the lesson, useful for directing Phuc's revision time."},{"question":"For the expansion of $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$, what is the condition for the series to converge (be valid), and how does this translate to a constraint on $$x$$? (2 steps)","answer":"- Step 1: The general binomial series $$(1+w)^n$$ converges only when the magnitude of the term inside the bracket is strictly less than 1, i.e., $$|w| < 1$$. Here, $$w = \\frac{5}{2}x$$, so the condition is $$|\\frac{5}{2}x| < 1$$.\n- Step 2: Solving for $$x$$, multiply both sides by $$\\frac{2}{5}$$ to isolate $$x$$. This gives $$|x| < \\frac{2}{5}$$. Outside this interval, the infinite series diverges and does not equal the original function.\n\nThe validity condition $$|w|<1$$ of the series directly defines the interval of $$x$$ for which the approximation is mathematically sound."},{"question":"Q6's \"show that\" structure requires the final form to be a√3 + b, with a and b as constants. Why does the examiner phrase the question this way, and what does it tell Phuc about the answer's expected shape? (2 steps)","answer":"- Step 1: \"Show that\" questions tell you the *target form* of the answer before you begin. The examiner is giving away the structure (one √3 term plus one rational constant) so the candidate can verify their work against the expected shape. The a and b are the unknown constants you need to find.\n- Step 2: This tells Phuc the answer should simplify to *exactly* one term involving √3 and one purely rational term — no other surds, no logarithms, no fractions inside fractions. If the final expression has any other structure, an error has occurred somewhere in the substitution or integration.\n\nTakeaway: \"show that\" questions are signposts — the stated target form is a structural check on your work. If your answer doesn't match the form, look for an error before submitting."},{"question":"Q1 was hinted at the very end of the lesson. What is the single algebraic transformation Harry told Phuc to perform, and why does it work for a negative index? (2 steps)","answer":"- Step 1: Harry told Phuc to factor out 2 from the bracket: (2 + 5x)⁻² = 2⁻² · (1 + (5/2)x)⁻². The 2⁻² becomes a constant multiplier (1/4), and the bracket now begins with 1, which is the form required by the general binomial series.\n- Step 2: This works for any index — including negative ones — because (ka)ⁿ = kⁿ·aⁿ distributes the constant k outside, leaving the (1 + ...) form ready for the general series. The general series only applies to expansions of (1 + y)ⁿ, so restructuring the bracket to start with 1 is *always* the first move.\n\nTakeaway: the first move in any general binomial expansion is to make the bracket start with 1 — factor out the constant, then apply the series."},{"question":"In Q6, after applying sin 2θ = 2 sin θ cos θ and substituting u = 3 + cos θ, the integrand becomes −2(u − 3)/√u. What is the conceptual reason for splitting (u − 3)/√u into u^{1/2} − 3u^{−1/2} rather than integrating it as a single fraction? (2 steps)","answer":"- Step 1: The power rule ∫uⁿ du = uⁿ⁺¹/(n+1) applies to *single* power terms — it doesn't directly apply to a *sum* in the numerator divided by u^{1/2}. Splitting into u/u^{1/2} − 3/u^{1/2} converts each piece into a single power of u, making each piece integrable by the power rule.\n- Step 2: The rule for splitting integrals is linear: ∫(f(u) + g(u)) du = ∫f(u) du + ∫g(u) du. After splitting, both pieces are pure power terms. This is a standard \"make the integrand a sum of integrable pieces\" move that appears throughout integration technique.\n\nTakeaway: when an integrand is a single fraction with a sum in the numerator, split it into separate power terms before integrating — the power rule applies term-by-term, not to the sum as a whole."},{"question":"In Q5, the *third* component equation (the $$z$$-component) is $$3+2\\lambda=6+7\\mu$$. The lesson worked with equations (1) and (3) to solve. Why is it strategically better to use equations that are *simple in form*, like (1) and (3) here, rather than (2) which contains the unknown $$\\beta$$? (2 steps)","answer":"- Step 1: Equations (1) and (3) involve only the two parameters $$\\lambda$$ and $$\\mu$$ and the known components, giving a clean 2×2 system in $$\\lambda,\\mu$$.\n- Step 2: Equation (2) introduces $$\\beta$$, a third unknown. Using it for elimination would force you to handle three unknowns at once, requiring more elimination steps and more opportunities for arithmetic error.\n\nStrategy: in vector-line intersections with a parameter in a constant, isolate the \"clean\" 2×2 system first; the parameterised equation becomes a single back-substitution at the end."},{"question":"Q5(ii) asks for the *coordinates* of P. Once you have $$\\lambda=-9$$ and $$\\mu=-3$$, you can substitute into either $$l_1$$ or $$l_2$$ to get P, and both should give the same answer. Why is this a useful *self-check*? (2 steps)","answer":"- Step 1: The two lines are claimed to intersect at a single point P, so substituting $$\\lambda$$ into $$l_1$$ and $$\\mu$$ into $$l_2$$ must yield the *same triple*. If they don't, you have an arithmetic error in either $$\\lambda$$, $$\\mu$$, or the component equations.\n- Step 2: This redundancy is a built-in consistency check — using both lines doubles the chance of catching a sign or arithmetic slip."},{"question":"Phuc's self-assessment for Q9(a) was \"might be able to do (a)\" — a tentative note. How should a learner act on a tentative self-assessment, and why is it useful to record the *degree* of confidence? (2 steps)","answer":"- Step 1: Act on it by *trying* Q9(a) independently with a time limit (say, 10 minutes for a 3-mark part). If the attempt succeeds, mark it against the official mark scheme; if it fails, the attempt itself reveals the specific gap (e.g. method choice, algebraic error, misreading the question).\n- Step 2: Recording confidence (\"might,\" \"definitely can't,\" \"sure\") creates a *graded* gap tracker, not a binary one. Tentative gaps are the most useful because they have a real chance of resolution with a small effort, while confident-failures may need more substantial teaching. This prioritises revision time.\n\nTakeaway: use confidence-graded self-assessment (sure / maybe / can't) to triage revision; \"maybe\" items are the highest-leverage place to spend effort."},{"question":"**[October 2025 P4 Q5]** The lines\n\\[\nl_1:\\ \\mathbf r=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n+\\lambda\n\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix},\n\\qquad\nl_2:\\ \\mathbf r=\n\\begin{pmatrix}-1\\\\\\beta\\\\6\\end{pmatrix}\n+\\mu\n\\begin{pmatrix}2\\\\-1\\\\7\\end{pmatrix}\n\\]\nintersect at \\(P\\). Given that the lesson reached \\(\\lambda=-9\\) and \\(\\mu=-3\\), find \\(\\beta\\) and \\(P\\), while preserving the source boundary.","answer":"Equating second components,\n\\[\n-1+4\\lambda=\\beta-\\mu.\n\\]\nTherefore\n\\[\n\\beta=-1+4\\lambda+\\mu\n      =-1+4(-9)+(-3)\n      =\\boxed{-40}.\n\\]\nUsing \\(\\lambda=-9\\) in \\(l_1\\),\n\\[\nP=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n-9\n\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix}\n=\n\\begin{pmatrix}-7\\\\-37\\\\-15\\end{pmatrix}.\n\\]\nHence\n\\[\n\\boxed{P=(-7,-37,-15)}.\n\\]\n\nThe live lesson reached only \\(\\lambda=-9\\) and \\(\\mu=-3\\); \\(\\beta=-40\\) and \\(P=(-7,-37,-15)\\) are official mark-scheme reference results and were not completed live. A row or position/column-vector presentation of \\(P\\) is acceptable."},{"question":"Q4(a) requires \"simplest form\" for dy/dx. The lesson reached dy/dx = (12 − 4x + y)/(y − x). What simplification checks confirm this is in simplest form? (2 steps)","answer":"- Step 1: Check that the numerator and denominator share no common factor. 12, −4, 1, 1 (coefficients of 1, x, y in the numerator; 1, −1 in the denominator) — gcd of all six coefficients is 1, so no scalar factor to extract. The numerator has three terms; the denominator has two; they are not multiples of each other.\n- Step 2: Check that the form is \"factor-of-dy/dx = expression.\" The factor (y − x) is non-zero wherever the curve has a defined gradient (it is the implicit-curve analogue of dx/dy ≠ 0). The simplest form is achieved when no further cancellation is possible, which it isn't here.\n\nTakeaway: \"simplest form\" for a derivative means no common factor between numerator and denominator, and no obvious rearrangement that would make the structure clearer."}],"models":{"glm_1":{"label":"GLM 5.1 ①","cards":[{"question":"When a square is constructed by joining the points one-third of the way along the sides of an outer square, why does choosing a specific numerical side length (like 3) for the outer square not change the final fractional area answer? (2 steps)","answer":"- Step 1: The problem asks for the area of the fourth inner square as a *fraction* of the original. A fraction is a ratio of two areas, meaning it is scale-invariant. If you scale the entire figure by a factor $$k$$, both the inner and outer areas scale by $$k^2$$, so the ratio $$\\frac{\\text{inner}}{\\text{outer}}$$ remains exactly the same.\n+ For example, if the ratio is $$\\frac{5}{9}$$ for a square of side 3, it is still $$\\frac{5}{9}$$ for a square of side 300. The $$k^2$$ cancels out.\n- Step 2: Because the ratio is invariant, we are free to choose the most convenient side length to minimise calculation. Choosing side 3 splits it into pieces 1 and 2, allowing us to use simple integer Pythagoras ($$1^2 + 2^2 = 5$$) rather than dealing with messy fractions like $$\\frac{1}{3}$$ and $$\\frac{2}{3}$$ right from the start.\n\nTakeaway: Scale-invariance lets you replace abstract fractions with clean integers for the geometry, without altering the final ratio."},{"question":"Using a square of side 3, the inner square formed by joining the one-third points has area 5. What is the single-step area scaling ratio, and why must you cube it to find the area of the *fourth* square relative to the original? (2 steps)","answer":"- Step 1: The outer square has area $$3^2 = 9$$, and the inner square has area $$5$$. The single-step area ratio (each new square's area relative to the one immediately enclosing it) is therefore $$\\frac{5}{9}$$.\n- Step 2: The \"fourth square\" means we have applied this scaling process three times: Original $$\\to$$ 2nd $$\\to$$ 3rd $$\\to$$ 4th. Because each step multiplies the area by $$\\frac{5}{9}$$, three independent steps multiply the original area by $$\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}$$.\n+ A common misconception is to raise the ratio to the power of 4 because it is the \"4th square\". The power must match the *number of transitions* between squares, which is 3.\n\nTakeaway: The exponent in a repeated-scaling problem counts the *iterations* (transitions), not the *final label*."},{"question":"For $$f(x) = \\ln(x^2 + 3)$$ where $$x \\in \\mathbb{R}$$, why is the range $$f(x) \\geq \\ln 3$$ rather than just \"all real numbers\"? (2 steps)","answer":"- Step 1: We must track the minimum value of the argument inside the logarithm. Since $$x^2 \\geq 0$$ for all real $$x$$, adding 3 gives $$x^2 + 3 \\geq 3$$. The smallest possible input to the ln function is exactly 3 (when $$x=0$$).\n- Step 2: The natural logarithm $$\\ln$$ is a strictly increasing function. This means it preserves inequalities: if the input is always $$\\geq 3$$, the output is always $$\\geq \\ln 3$$. As $$x^2 + 3$$ grows without bound, $$\\ln(x^2 + 3)$$ also grows without bound, so the range is $$[\\ln 3, \\infty)$$.\n+ A common misconception is that because ln outputs \"all real numbers\" for $$x>0$$, the range must be all real numbers. This forgets that the *domain* of ln is restricted here—it never receives inputs between 0 and 3, so it never outputs values below $$\\ln 3$$.\n\nTakeaway: The range of a composite function depends critically on the restricted range of the inner function."},{"question":"For $$g(x) = \\frac{3+5x}{x+2}$$, $$x > -2$$, rewriting it as $$g(x) = 5 - \\frac{7}{x+2}$$ reveals its graph as a transformation of $$h(x) = -\\frac{1}{x}$$. What is the sequence of transformations, and why does $$x > -2$$ restrict us to only one branch? (3 steps)","answer":"- Step 1: Identify the base graph $$h(x) = -\\frac{1}{x}$$, which has branches in the top-left (2nd quadrant) and bottom-right (4th quadrant), with asymptotes at $$x=0$$ and $$y=0$$.\n- Step 2: Apply the transformations in order: $$g(x) = 7 \\cdot h(x+2) + 5$$.\n+ The $$+2$$ inside shifts the graph 2 units left, moving the vertical asymptote from $$x=0$$ to $$x=-2$$.\n+ The $$7\\cdot$$ stretches the graph vertically by a factor of 7.\n+ The $$+5$$ outsid
