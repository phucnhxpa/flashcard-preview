 than just plugging directly into a binomial formula. (3 steps)","answer":"- Step 1: The general binomial series $$(1+x)^n=\\sum\\binom{n}{k}x^k$$ is valid only when the bracket is of the form $$(1+\\text{something})$$ — i.e. the constant term of the bracket must be 1.\n- Step 2: The given expression is $$(2+5x)^{-2}$$, whose bracket has constant term 2, not 1. You cannot apply $$(1+x)^n$$ directly to $$(2+5x)^{-2}$$.\n- Step 3: Factor out the 2: $$(2+5x)^{-2}=\\left(2\\left(1+\\tfrac{5}{2}x\\right)\\right)^{-2}=2^{-2}\\left(1+\\tfrac{5}{2}x\\right)^{-2}$$. The leading factor $$2^{-2}=\\frac{1}{4}$$ is a constant multiplier; the bracket is now in the $$(1+\\text{var})$$ form, ready for the general binomial series with argument $$\\tfrac{5}{2}x$$ and exponent $$-2$$.\n\nThis is the standard \"normalisation\" step required whenever the bracket doesn't already start with 1."},{"question":"For the expansion of $$(2+5x)^{-2}=\\frac{1}{4}\\left(1+\\tfrac{5}{2}x\\right)^{-2}$$, the general binomial series uses the formula $$\\binom{n}{k}=\\frac{n(n-1)(n-2)\\cdots(n-k+1)}{k!}$$. For $$n=-2$$ and $$k=0,1,2,3$$, what is the conceptual pattern of the first four coefficients, and why does the *fourth* term have no denominator beyond the constants? (2 steps)","answer":"- Step 1: For $$n=-2$$:\n+ $$k=0$$: coefficient $$1$$ (the leading 1)\n+ $$k=1$$: $$\\frac{-2}{1}=-2$$\n+ $$k=2$$: $$\\frac{(-2)(-3)}{2!}=\\frac{6}{2}=3$$\n+ $$k=3$$: $$\\frac{(-2)(-3)(-4)}{3!}=\\frac{-24}{6}=-4$$\n+ Pattern: the coefficients are $$1,-2,3,-4,\\dots$$ — alternating in sign, with magnitude $$k+1$$ (for these early terms).\n- Step 2: The fourth term corresponds to $$k=3$$, and $$k=3$$ means the numerator product has exactly three factors; the $$3!$$ in the denominator cancels them. So the coefficient is a pure integer; the only \"denominator\" left in the term is the $$2^3=8$$ from $$(\\tfrac{5}{2}x)^3$$.\n\nEdge-case probe: as $$k$$ grows, the coefficient magnitude will eventually decrease (after a peak), because the numerator has more factors of approximately $$-k$$ and the denominator $$k!$$ grows faster than the product's magnitude. The \"infinite\" series therefore converges."},{"question":"The Q1(b) validity interval is $$|x|<\\tfrac{2}{5}$$. Why does the validity come from $$|\\tfrac{5}{2}x|<1$$ and *not* from the original $$(2+5x)$$ bracket directly? (2 steps)","answer":"- Step 1: The general binomial series $$(1+y)^n$$ converges for $$|y|<1$$. Here $$y=\\tfrac{5}{2}x$$.\n- Step 2: So the condition is $$\\left|\\tfrac{5}{2}x\\right|<1\\ \\Rightarrow\\ |x|<\\tfrac{2}{5}$$. The original bracket $$(2+5x)$$ plays no direct role in the *convergence* — it would only matter if the series were rewritten in a different form (which it isn't here).\n\nConceptual point: the validity interval is determined by the *normalised* bracket, not the raw bracket."},{"question":"Q1(c) notes that $$\\left(\\frac{4}{2+5x}\\right)^2\\approx a+bx+cx^2$$ for some constants $$a,b,c$$. Explain *why* the coefficients $$a,b,c$$ are *exactly* the first three coefficients of the expansion of $$(2+5x)^{-2}$$ multiplied by 16 — i.e. why Q1(c) doesn't require re-expanding from scratch. (3 steps)","answer":"- Step 1: $$\\left(\\frac{4}{2+5x}\\right)^2=\\frac{16}{(2+5x)^2}=16(2+5x)^{-2}$$.\n- Step 2: The first three terms of $$(2+5x)^{-2}$$ are, from Q1(a), $$\\frac{1}{4}-\\frac{5}{4}x+\\frac{75}{16}x^2+\\cdots$$\n- Step 3: Multiply through by 16: $$16\\cdot\\frac{1}{4}=4,\\ 16\\cdot\\left(-\\frac{5}{4}\\right)=-20,\\ 16\\cdot\\frac{75}{16}=75$$. So $$a=4,\\ b=-20,\\ c=75$$.\n\nConceptual point: a question that asks for \"values\" of constants linked to a previous expansion is really testing whether you can *use* a prior result without redoing the algebra."},{"question":"The P3 review section asked for the range of $$f(x)=\\ln(x^2+3)$$. The learner first said \"real\" and was corrected. Walk through the conceptual reason why the range is *not* all of $$\\mathbb{R}$$, and what it actually is. (2 steps)","answer":"- Step 1: The argument of the ln is $$x^2+3$$. Since $$x^2\\ge 0$$ for all real $$x$$, we have $$x^2+3\\ge 3$$. The ln is defined and increasing on $$(0,\\infty)$$, so $$\\ln(x^2+3)\\ge\\ln 3$$.\n- Step 2: Therefore the range is $$[\\ln 3,\\ \\infty)$$, not all of $$\\mathbb{R}$$. The function has a strict lower bound of $$\\ln 3$$ (achieved at $$x=0$$) and grows without bound as $$|x|\\to\\infty$$.\n\nConceptual point: range ≠ codomain, and a function with a minimum argument (here, 3) automatically has a minimum output (here, $$\\ln 3$$)."},{"question":"For $$g(x)=\\frac{3+5x}{x+2}$$, the lesson rewrote this as $$5-\\frac{7}{x+2}$$ by polynomial division. Explain *why* this form makes the asymptotes and range immediately readable. (3 steps)","answer":"- Step 1: The form $$A+\\frac{B}{x+c}$$ is a *vertical shift by $$A$$* and *horizontal shift by $$-c$$* of the basic reciprocal $$\\frac{B}{x}$$. So the horizontal asymptote is $$y=A=5$$ and the vertical asymptote is $$x=-c=-2$$.\n- Step 2: For the range, on the branch $$x>-2$$ (i.e. to the right of the vertical asymptote), the function $$\\frac{7}{x+2}$$ is positive and decreasing. So $$-\\frac{7}{x+2}$$ is negative and *increasing* from 0 (at $$x\\to\\infty$$) down toward $$-\\infty$$ (as $$x\\to-2^+$$).\n- Step 3: Therefore $$5-\\frac{7}{x+2}$$ takes values *strictly less than 5*, with no upper bound on the negative side. The range is $$y<5$$.\n\nStrategy probe: writing a rational function in \"constant + reciprocal\" form converts a question about asymptotes and range into a question about the graph of $$\\pm\\frac{1}{x}$$, which is far easier."},{"question":"The lesson insisted that an *inverse* answer must include both an *equation* and a *domain*. Why is the domain of the inverse equal to the range of the original, and why does stating only the range of $$g$$ (here $$y<5$$) not finish the inverse problem? (2 steps)","answer":"- Step 1: By definition, the inverse function $$g^{-1}$$ takes inputs in the range of $$g$$. So the *domain* of $$g^{-1}$$ is exactly the *range* of $$g$$, which is $$x<5$$ (renaming $$y\\to x$$).\n- Step 2: Saying only \"range of $$g$$ is $$y<5$$\" gives you the *input set* for $$g^{-1}$$, but not the *rule* $$g^{-1}(x)=?$$ (the algebraic expression). The full inverse requires both pieces: the formula and the domain.\n\nConceptual point: a function and its inverse swap domains and ranges — remembering this swap is the key to writing inverse answers correctly."},{"question":"The P3 review composition-order error: a learner wrote something like \"$$f(g(x))=\\ln(\\text{something containing }g(x))$$\" but the resulting equation had ln on *both* sides, and the diagnosis was that $$f$$ and $$g$$ were substituted in the *wrong order*. Explain, conceptually, why the order of substitution matters and what the diagnostic symptom is. (3 steps)","answer":"- Step 1: In a composition $$f\\circ g$$, the *output* of $$g$$ is fed into $$f$$ as *input*. So if $$f(u)=\\ln u$$ and $$g(x)=(\\text{some expression})$$, then $$f(g(x))=\\ln(g(x))$$ — the argument of the ln is the *whole* expression $$g(x)$$.\n- Step 2: A common error is to swap the roles: writing $$g(f(x))$$ instead of $$f(g(x))$$ (or vice versa). If the inner function is itself a logarithm, you end up with a logarithm of a logarithm — a nested ln.\n- Step 3: A nested ln equation is the diagnostic symptom of the order being wrong (assuming the original problem is set up so that the *correct* order produces a polynomial or linear equation, not a nested transcendental one)."},{"question":"The volume-of-revolution formula $$\\pi\\int_a^b y^2\\,dx$$ is described in the formula register as \"Required P4 volume formula\" and *not* printed in the booklet. By contrast, $$\\pi\\int x^2\\,dy$$ is \"mathematically valid but not required for P4.\" Why is the second formula *valid* but not part of P4 scope, and what does the P4 scope specifically cover? (2 steps)","answer":"- Step 1: The Pappus-style formula $$\\pi\\int x^2\\,dy$$ arises if you rotate about the $$y$$-axis (rather than the $$x$$-axis); it's a real formula in calculus, just used in a different syllabus topic.\n- Step 2: P4 (§6.1) only requires rotation about the $$x$$-axis using $$y=f(x)$$. So $$\\pi\\int x^2\\,dy$$ would be off-spec for P4 even though it's not mathematically wrong.\n\nScope note: \"valid\" and \"in spec\" are different — the formula register distinguishes them on purpose."},{"question":"The scalar (dot) product is flagged as \"Not printed — expected to be remembered\" and is required for P4 §7.7. By contrast, integration by parts is *printed* in the booklet. What is the *assessment implication* of the booklet/not-in-booklet distinction for revision priorities? (2 steps)","answer":"- Step 1: Anything in the booklet does *not* need to be memorised verbatim — the candidate can quote it. The dot product, being off-booklet, must be memorised: definition, formula, and the angle-form $$\\mathbf{a}\\cdot\\mathbf{b}=|\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$.\n- Step 2: Revision time should be allocated proportionally: heavy drilling on the dot product (because it's a recall question on the paper), lighter revision on integration by parts (just practising its application, not memorising the formula).\n\nTakeaway: a \"formulas not given\" blanket label is misleading — the booklet has *some* formulae, and the dot product is the specific P4 formula to remember."},{"question":"The general binomial series is in the booklet with the condition $$n\\in\\mathbb{R}$$, $$|x|<1$$. P4 *assesses* rational $$n$$ (i.e. negative or fractional indices). What does the booklet *not* specify about $$n$$, and what is the additional revision needed beyond the printed statement? (2 steps)","answer":"- Step 1: The booklet says $$n\\in\\mathbb{R}$$ but the paper, and the P4 specification, narrows this to *rational* $$n$$ in assessed questions. So candidates are not asked to handle, say, $$n=\\pi$$.\n- Step 2: What *is* assessed is the *technique* of normalising the bracket so it starts with 1, then applying the general binomial formula $$\\binom{n}{k}=\\frac{n(n-1)\\cdots(n-k+1)}{k!}$$ term by term. The booklet gives the formula; the P4 skill is the *normalisation step* (e.g. factoring out the 2 in $$(2+5x)^{-2}$$).\n\nThe booklet covers the *tool*; the lesson covers the *craft*."},{"question":"Q5(ii) asks for the *coordinates* of P. Once you have $$\\lambda=-9$$ and $$\\mu=-3$$, you can substitute into either $$l_1$$ or $$l_2$$ to get P, and both should give the same answer. Why is this a useful *self-check*? (2 steps)","answer":"- Step 1: The two lines are claimed to intersect at a single point P, so substituting $$\\lambda$$ into $$l_1$$ and $$\\mu$$ into $$l_2$$ must yield the *same triple*. If they don't, you have an arithmetic error in either $$\\lambda$$, $$\\mu$$, or the component equations.\n- Step 2: This redundancy is a built-in consistency check — using both lines doubles the chance of catching a sign or arithmetic slip."},{"question":"In Q6, after the substitution the integrand becomes $$-2\\int_4^3(u^{1/2}-3u^{-1/2})\\,du$$. A common student error is to drop the outer $$-2$$ and treat the answer as just $$\\int(u^{1/2}-3u^{-1/2})\\,du$$. Walk through why this loses a factor and changes the final $$a$$ and $$b$$. (2 steps)","answer":"- Step 1: The $$-2$$ is a multiplicative constant of the integrand after substitution. Constants must be carried *outside* the integral sign, not dropped.\n- Step 2: If you drop the $$-2$$, your antiderivative is $$\\frac{2}{3}u^{3/2}-6u^{1/2}$$ evaluated from 4 to 3, which gives $$-\\frac{4}{3}\\sqrt{3}+6=-\\frac{4\\sqrt{3}}{3}+6$$, a different value from the official $$8\\sqrt{3}-\\frac{40}{3}$$. The \"show that\" structure $$a\\sqrt{3}+b$$ would then have entirely different $$a$$ and $$b$$.\n\nMisconception probe: dropping constant factors is one of the most common \"small\" errors that wipes a 7-mark question."},{"question":"In Q5, the *third* component equation (the $$z$$-component) is $$3+2\\lambda=6+7\\mu$$. The lesson worked with equations (1) and (3) to solve. Why is it strategically better to use equations that are *simple in form*, like (1) and (3) here, rather than (2) which contains the unknown $$\\beta$$? (2 steps)","answer":"- Step 1: Equations (1) and (3) involve only the two parameters $$\\lambda$$ and $$\\mu$$ and the known components, giving a clean 2×2 system in $$\\lambda,\\mu$$.\n- Step 2: Equation (2) introduces $$\\beta$$, a third unknown. Using it for elimination would force you to handle three unknowns at once, requiring more elimination steps and more opportunities for arithmetic error.\n\nStrategy: in vector-line intersections with a parameter in a constant, isolate the \"clean\" 2×2 system first; the parameterised equation becomes a single back-substitution at the end."},{"question":"The P3 review's graphical-calculator comment: Harry said a calculator might make a range/domain step \"quicker\" but he preferred \"deep mathematical understanding.\" What is the deeper pedagogical reason for this preference, beyond the immediate time saving? (2 steps)","answer":"- Step 1: A range/domain question like \"$$g(x)=5-\\frac{7}{x+2}$$, $$x>-2$$\" is testing the candidate's *graphical* and *algebraic* understanding of transformations of the reciprocal function — not the answer $$y<5$$ in isolation.\n- Step 2: If a calculator is used to plot and read off the range, the candidate bypasses the *reason* the range is what it is (the horizontal asymptote, the branch selection, the behaviour near the vertical asymptote). At A-level, the reasoning carries the marks; the answer is just one mark.\n\nPedagogical point: tools can shortcut the *answer* but not the *understanding*, and exam marks are awarded primarily for demonstrated understanding."},{"question":"Q4's curve $$4x^2+y^2-2xy=24x$$ has a $$y^2$$ term, an $$xy$$ term, and a constant. Why is this *not* a conic in the standard form, and what kind of curve is it likely to be? (Conceptual only — no classification calculation needed.) (2 steps)","answer":"- Step 1: The presence of an $$xy$$ term (the $$-2xy$$) means the curve's axes are *rotated* relative to the coordinate axes. The general second-degree equation $$Ax^2+Bxy+Cy^2+Dx+Ey+F=0$$ with $$B\\ne 0$$ represents a conic with rotated principal axes.\n- Step 2: Without the $$xy$$ term, you could read off the conic type from the sign of $$B^2-4AC$$ (or its analogue). With the $$xy$$ term, the conic is rotated, so the standard classification doesn't directly apply — but the *type* (ellipse, hyperbola, parabola) is preserved under rotation.\n\nThis is why the question uses implicit differentiation rather than asking for the curve's standard form: P4 is assessing the differentiation skill, not conic classification."},{"question":"The closing-action list identifies five immediate todos (finish Q4(b), Q5, Q6, Q1, revise self-gaps). The lesson explicitly said the recording *does not cut off abruptly* and ends with a clear goodbye. What does this observation about the recording's end tell you about the *completeness* of the in-lesson work? (2 steps)","answer":"- Step 1: A clean closing exchange means the tutor chose to stop at a planned boundary, not because of technical interruption. So the \"deferred to Phuc\" items (Q4(b) finish, Q5 finish, Q6 finish, Q1 expansion) are *deliberately* incomplete, not accidentally so.\n- Step 2: Therefore the lesson's *job* was to set up these problems and correct the conceptual foundations; the *finish-line* work is the learner's responsibility between lessons. The \"official MS reference\" blocks in the guide exist precisely so Phuc has the target answer to check against, without the lesson having to re-derive it.\n\nConceptual point: a deliberately-deferred problem is a *flipped-classroom* signal — the learner finishes it as deliberate practice."},{"question":"In the Q6 substitution, the integrand has $$\\sqrt{3+\\cos\\theta}$$ in the denominator. The double-angle rewrite $$\\sin 2\\theta=2\\sin\\theta\\cos\\theta$$ puts a $$\\cos\\theta$$ in the *numerator*, which will then cancel against the bracket in the denominator. Why is the cancellation of a *single* factor of $$\\cos\\theta$$ enough — i.e. why doesn't the square root matter for the cancellation? (2 steps)","answer":"- Step 1: The denominator is $$\\sqrt{3+\\cos\\theta}=(3+\\cos\\theta)^{1/2}$$, not $$(3+\\cos\\theta)^1$$. So writing $$\\cos\\theta=u-3$$ in the numerator produces a polynomial *linear* in $$u$$, which gets divided by $$u^{1/2}$$ to give $$u^{1/2}$$ (i.e. $$\\sqrt{u}$$).\n- Step 2: The result is a polynomial in $$u$$ with half-integer powers — integrable term by term with the power rule. No further $$\\cos\\theta$$ is needed; the square root has been \"absorbed\" into the fractional exponents.\n\nConceptual point: the half-integer power is the *signature* of a \"square root in the denominator\" integrand, and the power rule handles it cleanly."},{"question":"Q1's expansion of $$(2+5x)^{-2}$$ uses the *general* binomial series (with $$n\\in\\mathbb{R}$$), not the *finite* binomial expansion (which would be the case for positive-integer $$n$$). What is the key difference in the *output*, and why does the choice matter? (2 steps)","answer":"- Step 1: For positive-integer $$n$$, the binomial expansion is *finite* (it terminates after $$n+1$$ terms). For rational $$n$$ (like $$-2$$ here), the expansion is *infinite* — every term is nonzero.\n- Step 2: This is why Q1(a) asks for \"the first four terms\" (acknowledging the expansion is infinite) and Q1(b) asks for the validity interval $$|x|<\\tfrac{2}{5}$$ (acknowledging convergence is conditional). For a positive-integer exponent, no validity interval would be needed.\n\nStrategy probe: students sometimes mistakenly use the finite form for negative indices, producing an expansion that \"stops\" after a few terms incorrectly."},{"question":"In Q4(b), the lesson reached the linear relation $$2a+b=12$$ (i.e. $$b=12-2a$$) by cross-multiplying the gradient equation. The learner said \"I'm stuck with two unknowns and one equation.\" Walk through why the *curve equation* provides the second equation, and what type of system results. (2 steps)","answer":"- Step 1: The curve equation $$4a^2+b^2-2ab=24a$$ is one equation in the two unknowns $$a,b$$. Together with $$b=12-2a$$, we have two equations in two unknowns — a *nonlinear* 2×2 system (because the curve equation has quadratic terms).\n- Step 2: The standard strategy is to substitute the linear relation into the quadratic one, turning it into a single equation in one unknown. Here, that gives a quadratic in $$a$$ (factorising as $$(a-2)(a-6)=0$$), and each root feeds back through the linear relation to give a $$b$$.\n\nTakeaway: \"two unknowns, one equation\" is the cue to find the second equation from a *geometric* or *given* condition — here, the curve membership."},{"question":"The Q6 lesson had a step where Phuc \"recognised the -1/x graph family\" and \"vertical/horizontal transformations.\" For a function of the form $$A+\\frac{B}{x+c}$$, what is the *complete* description of its graph in terms of the basic $$y=\\frac{1}{x}$$ graph? (3 steps)","answer":"- Step 1: Start with $$y=\\frac{1}{x}$$. Multiply by $$B$$: stretches vertically by factor $$|B|$$ (and reflects if $$B<0$$). So $$y=\\frac{B}{x}$$ is a vertical stretch.\n- Step 2: Replace $$x$$ by $$x+c$$: shifts the graph *horizontally* by $$-c$$ (i.e. left if $$c>0$$, right if $$c<0$$). So $$y=\\frac{B}{x+c}$$ is the previous graph shifted.\n- Step 3: Add $$A$$: shifts *vertically* by $$+A$$. So the final graph has vertical asymptote $$x=-c$$, horizontal asymptote $$y=A$$, and shape determined by $$B$$'s sign.\n\nFor $$g(x)=5-\\frac{7}{x+2}$$: vertical asymptote $$x=-2$$, horizontal asymptote $$y=5$$, reflected (because $$-7<0$$) — and the right branch ($$x>-2$$) sits *below* the horizontal asymptote, giving the range $$y<5$$."},{"question":"The Q6 paper instruction says \"Using $$u=3+\\cos\\theta$$, show that [integral] = $$a\\sqrt{3}+b$$.\" The phrase \"show that\" carries a specific marker in P4: it usually means the answer is *given* and the candidate must *derive* it without skipping steps. What is the practical implication for the amount of working shown? (2 steps)","answer":"- Step 1: \"Show that\" questions typically allocate marks to *key intermediate steps* (the substitution, the new limits, the rewritten integrand, the antiderivative, the substitution of limits). The final numerical answer is usually worth only 1 mark, because the examiner already gave it.\n- Step 2: Practically, this means a candidate should write out each transformation *one line at a time* (substitution stated, differential computed, limits transformed, integrand rewritten, integrated, evaluated) — not jump from the original integral to the final answer.\n\nShow-that = earn the intermediate marks; the final answer is just confirmation."},{"question":"Compare and contrast the *two* integration techniques used in this lesson: integration by substitution (Q6) and integration by parts (mentioned in the formula register as \"Printed, in P4 §6.2 scope\"). At a conceptual level, when is each technique the right one? (2 steps)","answer":"- Step 1: **Substitution** is the right tool when the integrand contains a function *and* its derivative (or something close), so a new variable $$u$$ can absorb the derivative. Q6's $$\\cos\\theta$$ and $$\\sin\\theta\\,d\\theta$$ is the classic example.\n- Step 2: **Integration by parts** is the right tool when the integrand is a *product of two \"different-type\" functions* (e.g. polynomial × exponential, polynomial × trig, log × polynomial), where neither is the derivative of the other. The booklet gives the formula $$\\int u\\,dv=uv-\\int v\\,du$$.\n\nMental model: substitution \"collapses\" a chain rule; integration by parts \"undoes\" a product rule."},{"question":"The Q1 series validity $$|x|<\\tfrac{2}{5}$$ is a *strict* inequality. Why is it strict (not $$\\le$$), and what is the geometric meaning at the boundary? (2 steps)","answer":"- Step 1: At $$|x|=\\tfrac{2}{5}$$, the substituted argument $$\\tfrac{5}{2}x$$ has magnitude 1, so the general binomial series hits the *boundary* of its convergence condition. The series diverges there (or, for some exponents, the formula's derivation breaks down).\n- Step 2: Geometrically, at $$|x|=\\tfrac{2}{5}$$ the original bracket $$1+\\tfrac{5}{2}x=0$$, so $$(1+\\tfrac{5}{2}x)^{-2}$$ has a *vertical asymptote* — the function is undefined, so the series cannot represent it.\n\nStrict inequality is the consequence of the *radius of convergence* being open at the boundary."},{"question":"The lesson's ESAT timing advice: \"once the correct option is secure, stop rather than over-calculate.\" Why is this advice specific to *timed multiple-choice* rather than a general exam technique? (2 steps)","answer":"- Step 1: In a multiple-choice, you score by *selecting* the right option, not by deriving it. So once you're confident, additional calculation is wasted time.\n- Step 2: In a *written* exam (like P4), however, the marks are for *showing* the work, so over-calculating is a feature, not a bug — each intermediate step can earn a mark.\n\nTakeaway: ESAT and P4 have different scoring structures, so the optimal time-allocation strategy differs."},{"question":"In Q4(a), the printed instruction is \"show all stages; solutions relying entirely on calculator technology are not acceptable.\" What does \"entirely\" qualify, and what does it permit? (2 steps)","answer":"- Step 1: \"Entirely\" means the candidate cannot rely *solely* on the calculator to bypass all reasoning. A candidate who writes nothing and just types into a CAS would fail.\n- Step 2: However, a candidate who shows all the differentiation steps by hand, then uses the calculator to check or to do a small arithmetic simplification, would still be acceptable — provided the *reasoning* is fully demonstrated.\n\nThe keyword is \"entirely\" — partial use of technology alongside demonstrated working is fine."},{"question":"Across the four worked questions (Q1 hints, Q4, Q5, Q6), which is the *most* conceptual, and which is the *most* computational? Give a one-sentence justification for each. (1 step with two sub-points)","answer":"- Step 1: \n+ **Most conceptual:** Q4(b) — finding $$P(2,8)$$ requires combining *two* sources of information (gradient condition + curve membership), interpreting the geometric conditions, and selecting the correct root. The setup is the question; the arithmetic is short.\n+ **Most computational:** Q6 — once the substitution is set up, the work is a straightforward (if multi-step) power-rule integration with careful limit handling and a sign-flip. The conceptual move is one (the double-angle rewrite); the rest is calculation.\n\nThis is why Q4(b) and Q6 sit at opposite ends of the P4 cognitive spectrum."},{"question":"The lesson's status labels include \"Official mark-scheme reference (NOT completed in the lesson).\" Why is the mark-scheme reference included in the guide, rather than kept off the page? (2 steps)","answer":"- Step 1: For Phuc's self-study, the *target* of each \"deferred\" problem needs to be visible so the learner can check their independent work — without it, the learner wouldn't know whether their finish-line algebra was right.\n- Step 2: The label \"NOT completed in the lesson\" is the *honesty marker*: it tells Phuc (and any reader) that the answer is from the official MS, not from the lesson's working. The status label preserves the lesson's chronology while still giving Phuc the reference he needs.\n\nThis is a transparency device: the guide mixes lesson evidence with reference answers but *labels which is which*."},{"question":"In Q6, the limit $$\\theta=\\pi/2$$ gives $$\\cos\\theta=0$$, so $$u=3+0=3$$. The lesson initially had a slip where Phuc said $$\\cos(\\pi/2)=\\tfrac{1}{2}$$. Why is this kind of slip a high-risk error in a \"show that\" question, and what is the conceptual fix? (2 steps)","answer":"- Step 1: A wrong limit value propagates through the whole evaluation. If you use $$u=3+\\tfrac{1}{2}=\\tfrac{7}{2}$$ at the upper limit, the final answer is wrong even if every other step is correct — and the *form* $$a\\sqrt{3}+b$$ would no longer match.\n- Step 2: The conceptual fix is to remember that $$\\cos\\theta$$ at the *standard angles* is one of $$\\{1, \\tfrac{1}{2}, 0, -1\\}$$ for $$\\theta\\in\\{0,\\tfrac{\\pi}{3},\\tfrac{\\pi}{2},\\pi\\}$$. Drilling these four values is essential for P4."},{"question":"The Q5 lesson advice to \"write the final coordinates as a row rather than a column\" is a *presentation* tip, not a correctness tip. What is the underlying reason rows are preferred in IAL P4, and is it a *mark-loss* issue if you use a column? (2 steps)","answer":"- Step 1: Rows are easier to typeset inline and read as \"a point's coordinates.\" Columns signal \"this is a vector\" — which is what you use for *direction* vectors and position vectors, but for a *point* a row is more natural.\n- Step 2: No — the mark scheme accepts both. So the preference is purely for *clarity* (e.g. when a point's coordinates are inline with surrounding text), not for *marks*. A column-vector answer is fully correct."},{"question":"The formula register classifies formulae on two axes: (1) booklet vs. not, (2) P4 scope vs. not. Why are these *two* axes instead of a single \"formulas you need to memorise\" axis? (2 steps)","answer":"- Step 1: Some formulae are in the booklet but *not* in P4 scope (e.g. $$\\pi\\int x^2\\,dy$$ isn't required for P4), and some are in P4 scope *and* in the booklet (general binomial series). Merging the axes would lose this distinction.\n- Step 2: A two-axis classification tells the candidate three different things: (a) \"memorise this\" (not in booklet, in scope — e.g. dot product), (b) \"you can quote it\" (in booklet, in scope — e.g. integration by parts), (c) \"you won't be asked\" (in booklet, not in scope — e.g. $$\\pi\\int x^2\\,dy$$).\n\nThis is why the register is presented as a 2D table, not a list."},{"question":"The self-assessed gap tracker flags Q2 (volume of revolution, $$y=\\tfrac{5}{3}\\sqrt{x-1}$$), Q8 (separable ODE $$\\tfrac{dV}{dt}=12te^{-t}$$, $$V(0)=6$$), and Q9(a) (tentative). Of these, which is *most* aligned with a P4 topic that was worked in the lesson, and which is least? (1 step with three sub-points)","answer":"- Step 1: \n+ **Most aligned:** Q8 — separable first-order ODEs are *explicitly* in P4 scope (§6.4, per the formula register), and the method is parallel to Q6's substitution. It's a deferred-technique gap, not a topic gap.\n+ **Middle:** Q2 — volume of revolution is in P4 scope (§6.1) but wasn't worked in the lesson. The technique (set up $$\\pi\\int y^2\\,dx$$, evaluate) is mechanical once you know the formula.\n+ **Least aligned with lesson work:** Q9(a) — flagged as \"tentative\" by Phuc; no P4 *lesson work* touches on whatever Q9 is about, and the topic is unknown from the guide. The other-author practice problem $$\\pi\\int_0^4 x\\,dx=8\\pi$$ is a warm-up but not a Q2 substitute.\n\nThe hierarchy: lesson-relevant gap > on-spec gap > off-spec gap."},{"question":"The lesson's author-created practice is to compute $$\\pi\\int_0^4\\sqrt{x}^2\\,dx=\\pi\\int_0^4 x\\,dx=8\\pi$$ for $$y=\\sqrt{x}$$ rotated $$2\\pi$$ about the $$x$$-axis. Why is this *deliberately* a simpler problem than Q2 (which has $$y=\\tfrac{5}{3}\\sqrt{x-1}$$)? (2 steps)","answer":"- Step 1: The simpler problem tests the *core idea* — set up the integral as $$\\pi\\int y^2\\,dx$$, evaluate — without the complications of a horizontal shift ($$\\sqrt{x-1}$$) or a constant factor ($$\\tfrac{5}{3}$$) that obscure the structure.\n- Step 2: Once the core idea is solid, the learner can add the layers back: $$y=\\sqrt{x-1}$$ shifts the lower limit to 1; $$y=\\tfrac{5}{3}\\sqrt{x-1}$$ squares to give $$\\tfrac{25}{9}(x-1)$$, which integrates to a multiple of $$x^2/2$$.\n\nPractice design: dumb down the *difficulty* while preserving the *concept*. This is the author-created-practice philosophy in action."},{"question":"Q6's \"show that\" answer is in the form $$a\\sqrt{3}+b$$, and the official answer is $$8\\sqrt{3}-\\tfrac{40}{3}$$. A common error after integrating and evaluating is to *rearrange* the result, e.g. writing it as $$-8\\sqrt{3}+\\tfrac{40}{3}$$ or as $$\\tfrac{24\\sqrt{3}-40}{3}$$. Why is rearranging a \"show that\" answer risky? (2 steps)","answer":"- Step 1: The question specifies the *form* $$a\\sqrt{3}+b$$. If you present $$-8\\sqrt{3}+\\tfrac{40}{3}$$, you are claiming $$a=-8$$, $$b=\\tfrac{40}{3}$$ — which is wrong.\n- Step 2: If you combine over a common denominator to get $$\\tfrac{24\\sqrt{3}-40}{3}$$, the form is no longer recognisable as $$a\\sqrt{3}+b$$ without the examiner doing extra work to extract $$a$$ and $$b$$ — and an unwritten step risks a mark.\n\nTakeaway: respect the requested form in a \"show that\" — the examiner is testing whether you can isolate the requested structure."},{"question":"Putting together the lesson's evidence, what are the *three* P4 skill categories Phuc demonstrated strengths in, and the *three* categories flagged as gaps? Use the lessons' own labels and corrections. (1 step with six sub-points)","answer":"- Step 1: \n+ **Strengths:** (i) ESAT-style multiple-choice reasoning (nested squares: scaling freedom, Pythagoras, cube counting). (ii) Recognition of standard forms ($$\\sin 2\\theta$$ as $$2\\sin\\theta\\cos\\theta$$, reciprocal-graph family). (iii) Setting up vector-line intersections (three-component equations, choice of \"clean\" 2×2 system).\n+ **Gaps:** (i) Implicit differentiation: forgetting the *whole* product-rule bracket, dropping the $$-x$$ term. (ii) Substitution: treating $$\\cos\\theta$$ as a constant rather than replacing it via $$u=3+\\cos\\theta$$. (iii) Binomial series: not normalising the bracket to start with 1 (initially missed the $$\\tfrac{5}{2}$$ factor).\n\nThis is the diagnostic snapshot from the lesson, useful for directing Phuc's revision time."},{"question":"The closing exchange of the recording at 56:31 included \"Harry will mark the Google Drive work thoroughly\" and \"Phuc is to look things up and retry the paper.\" What does this imply about the *iterative* nature of the P4 review process, and how does it fit with the \"deferred to Phuc\" stickies? (2 steps)","answer":"- Step 1: The lesson is a *checkpoint* in a longer review loop: Phuc attempts the paper → Google Drive submission → lesson identifies the conceptual errors and corrects them → Phuc retries the unfinished parts → next lesson reviews the retry.\n- Step 2: The \"deferred to Phuc\" stickies are *the* retry tasks — they are the unfinished work the lesson deliberately hands back to Phuc to complete in his own time, with the official mark-scheme answers as a reference. The lesson is therefore a *scaffolded* intervention, not a complete walkthrough.\n\nPedagogical pattern: a one-to-one tutor session is most valuable when it (a) fixes the *conceptual* errors and (b) sets up the *deliberate practice* tasks for in-between-lesson work."},{"question":"Finally, connect everything: the lesson spans ESAT, P3 review, and P4 questions. What is the *overarching* learning theme, and how does each piece (ESAT warm-up, P3 corrections, P4 Q4–Q6) contribute to it? (2 steps)","answer":"- Step 1: The overarching theme is *conceptual fluency under exam conditions* — the ability to recognise patterns, choose techniques, and avoid the small slips (signs, brackets, normalisations) that lose marks.\n- Step 2: \n+ ESAT warm-up: pattern recognition (geometric series via Pythagoras) and *timed*-multiple-choice efficiency.\n+ P3 review: refreshing reciprocal-graph transformations, range/inverse-domain, composition order — all *foundational* for P4.\n+ P4 Q4: implicit differentiation discipline (bracket everything, don't drop terms).\n+ P4 Q5: vector-line intersection strategy (use clean component equations, check by both lines).\n+ P4 Q6: trigonometric substitution (double-angle rewrite, differential, limits, sign handling).\n\nThe lesson is therefore a *targeted* review that mixes warm-up, foundation, and P4-specific technique — not a \"do a paper from start to finish\" lesson."}]},"gpt56sol_1":{"label":"GPT-5.6 Sol ①","cards":[{"question":"**[ESAT warm-up — recording/board-derived, not a Pearson P4 question]** A square is transformed by joining points one third of the way along its sides to form an inner square, and the process is repeated. Find the area of the fourth square as a fraction of the original square’s area. State how many times the area ratio is applied.","answer":"Choose the original side length as \\(3\\). A side of the next square is the hypotenuse of a right triangle with legs \\(1\\) and \\(2\\), so its length is \\(\\sqrt{1^2+2^2}=\\sqrt5\\). Thus the one-step area ratio is\n\\[\n\\frac{(\\sqrt5)^2}{3^2}=\\frac59.\n\\]\nGoing from the first square to the fourth requires three transformations, so\n\\[\n\\left(\\frac59\\right)^3=\\frac{125}{729}.\n\\]\nTherefore the fourth square has area \\(\\boxed{\\frac{125}{729}}\\) of the original. **Status: completed correctly in the lesson, substantially learner-led.**"},{"question":"**[Prior P3 review — not an October 2025 P4 question]** For \\(f(x)=\\ln(x^2+3)\\), where \\(x\\in\\mathbb R\\), determine the exact range of \\(f\\) and explain why saying only that the range is “real” is insufficient.","answer":"Since \\(x^2\\ge 0\\),\n\\[\nx^2+3\\ge 3.\n\\]\nThe natural logarithm is strictly increasing, so\n\\[\n\\ln(x^2+3)\\ge \\ln 3.\n\\]\nEquality occurs at \\(x=0\\), and \\(f(x)\\to\\infty\\) as \\(|x|\\to\\infty\\). Hence the range is\n\\[\n\\boxed{[\\ln 3,\\infty)}.\n\\]\nSaying merely “real” wrongly includes values below \\(\\ln3\\). **Status: the lower-bound error was corrected and the result completed live during prior P3 review.**"},{"question":"**[Prior P3 review — not an October 2025 P4 question]** Let\n\\[\ng(x)=\\frac{3+5x}{x+2},\\qquad x>-2.\n\\]\nRewrite \\(g\\) in transformed-reciprocal form, identify its asymptotes, determine its range, and hence state the domain required for \\(g^{-1}\\).","answer":"Polynomial division gives\n\\[\n3+5x=5(x+2)-7,\n\\]\nso\n\\[\ng(x)=5-\\frac7{x+2}.\n\\]\nIts vertical asymptote is \\(x=-2\\), and its horizontal asymptote is \\(y=5\\). Because the domain is restricted to \\(x>-2\\), we have \\(x+2>0\\), so\n\\[\n-\\frac7{x+2}<0\n\\quad\\Longrightarrow\\quad\ng(x)<5.\n\\]\nEvery value below \\(5\\) is attained, so the range is\n\\[\n\\boxed{y<5}.\n\\]\nThe domain of the inverse equals the range of the original function:\n\\[\n\\boxed{\\operatorname{dom}(g^{-1})=\\{x:x<5\\}}.\n\\]\n**Status: the range and inverse-domain reasoning was corrected live; the full inverse algebra was prior work/reference, not freshly derived in this lesson.**"},{"question":"**[October 2025 P4 Q4(a) — corrected and completed live]** The curve \\(C\\) has equation\n\\[\n4x^2+y^2-2xy=24x.\n\\]\nFind \\(\\frac{dy}{dx}\\) in terms of \\(x\\) and \\(y\\), showing how the product-rule term must be handled.","answer":"Differentiate implicitly:\n\\[\n8x+2y\\frac{dy}{dx}-2\\left(x\\frac{dy}{dx}+y\\right)=24.\n\\]\nThe brackets are essential because \\(-2\\) multiplies the whole derivative of \\(xy\\). Collecting derivative terms gives\n\\[\n(2y-2x)\\frac{dy}{dx}=24-8x+2y.\n\\]\nTherefore\n\\[\n\\frac{dy}{dx}\n=\\frac{24-8x+2y}{2y-2x}\n=\\boxed{\\frac{12-4x+y}{y-x}}.\n\\]\nThe corrected denominator is \\(y-x\\), not merely \\(y\\). **Status: corrected and completed in the lesson.**"},{"question":"**[October 2025 P4 Q4(b) — live stopping point plus official reference]** A point \\(P(a,b)\\), with \\(a>0\\) and \\(b>0\\), lies on\n\\[\n4x^2+y^2-2xy=24x,\n\\]\nand the gradient there is \\(2\\). Given\n\\[\n\\frac{dy}{dx}=\\frac{12-4x+y}{y-x},\n\\]\nstate the exact live stopping point, then complete the solution as an explicitly labelled official-reference calculation. Include the recorded tutor slip and its correction.","answer":"Substituting \\(x=a\\), \\(y=b\\) and gradient \\(2\\) gives\n\\[\n\\frac{12-4a+b}{b-a}=2\n\\quad\\Longrightarrow\\quad\n12-4a+b=2b-2a\n\\quad\\Longrightarrow\\quad\n\\boxed{2a+b=12}.\n\\]\nTogether with the point-on-curve condition,\n\\[\n4a^2+b^2-2ab=24a.\n\\]\n**Reached live:** the lesson reached these two relations, equivalently \\(b=12-2a\\), and then stopped. The substitution was deferred to Phuc.\n\n**Official mark-scheme reference — not completed in the lesson:** Substitute \\(b=12-2a\\):\n\\[\n4a^2+(12-2a)^2-2a(12-2a)=24a,\n\\]\n\\[\n12a^2-96a+144=0,\n\\]\n\\[\na^2-8a+12=0=(a-2)(a-6).\n\\]\nThus \\(a=2\\) or \\(a=6\\). Since \\(b=12-2a\\), the candidates are\n\\[\n(a,b)=(2,8)\\quad\\text{or}\\quad(6,0).\n\\]\nThe condition \\(b>0\\) rejects \\(b=0\\), so the official result is\n\\[\n\\boxed{P=(2,8)}.\n\\]\n**Tutor-slip disclosure:** Harry suggested that the two values of \\(b\\) might be positive and negative. The official candidates actually give \\(b=8\\) and \\(b=0\\); it is \\(b>0\\), not a sign comparison, that rejects \\(0\\)."},{"question":"**[October 2025 P4 Q5 — deferred live, final values official reference only]** The lines\n\\[\nl_1:\\mathbf r=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n+\\lambda\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix},\n\\qquad\nl_2:\\mathbf r=\n\\begin{pmatrix}-1\\\\\\beta\\\\6\\end{pmatrix}\n+\\mu\\begin{pmatrix}2\\\\-1\\\\7\\end{pmatrix}\n\\]\nintersect at \\(P\\). The lesson supplied \\(\\lambda=-9\\) and \\(\\mu=-3\\) but stopped before finding \\(\\beta\\) or \\(P\\). Complete those final steps and preserve their source status.","answer":"Equality of the second components gives\n\\[\n-1+4\\lambda=\\beta-\\mu.\n\\]\nTherefore\n\\[\n\\beta=-1+4\\lambda+\\mu\n=-1+4(-9)+(-3)\n=\\boxed{-40}.\n\\]\nUsing \\(\\lambda=-9\\) in \\(l_1\\),\n\\[\nP=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n-9\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix}\n=\n\\begin{pmatrix}-7\\\\-37\\\\-15\\end{pmatrix}.\n\\]\nHence\n\\[\n\\boxed{P=(-7,-37,-15)}.\n\\]\n**Status:** \\(\\lambda=-9\\) and \\(\\mu=-3\\) were supplied live; calculating \\(\\beta=-40\\) and \\(P=(-7,-37,-15)\\) was deferred. These final values are **official mark-scheme reference only, not completed in the lesson**. A row or position/column-vector presentation of \\(P\\) is acceptable."},{"question":"**[October 2025 P4 Q6 — live stopping point plus official reference]** Evaluate\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\n\\]\nusing \\(u=3+\\cos\\theta\\). State exactly where the lesson stopped, then give the official-reference completion in the form \\(a\\sqrt3+b\\).","answer":"Using \\(\\sin2\\theta=2\\sin\\theta\\cos\\theta\\),\n\\[\nu=3+\\cos\\theta,\\qquad du=-\\sin\\theta\\,d\\theta,\\qquad \\cos\\theta=u-3.\n\\]\nThe limits transform as\n\\[\n\\theta=0\\Rightarrow u=4,\\qquad\n\\theta=\\frac{\\pi}{2}\\Rightarrow u=3.\n\\]\nThus\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\n=-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)\\,du.\n\\]\n**Reached live:** the lesson stopped at precisely this transformed integral.\n\n**Official mark-scheme reference — not completed in the lesson:**\n\\[\n-2\\left[\\frac23u^{3/2}-6u^{1/2}\\right]_4^3\n=8\\sqrt3-\\frac{40}{3}.\n\\]\nTherefore\n\\[\n\\boxed{a=8,\\qquad b=-\\frac{40}{3}}.\n\\]\nThe outside factor \\(-2\\) belongs to the transformed integral; it is not the requested value of \\(a\\)."},{"question":"**[October 2025 P4 Q6 — lesson corrections]** In the substitution \\(u=3+\\cos\\theta\\) for\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta,\n\\]\nexplain why each of the following proposed steps is wrong: (i) \\(\\cos(\\pi/2)=1/2\\); (ii) taking \\(\\cos\\theta\\) outside the integral as a constant; (iii) integrating the resulting powers using a logarithm.","answer":"(i) The correct exact value is\n\\[\n\\cos\\left(\\frac{\\pi}{2}\\right)=0,\n\\]\nso the upper transformed limit is \\(u=3\\), not \\(7/2\\).\n\n(ii) \\(\\cos\\theta\\) varies with \\(\\theta\\), so it cannot be removed as a constant. Under the substitution,\n\\[\n\\cos\\theta=u-3.\n\\]\n\n(iii) After substitution, the integrand contains\n\\[\nu^{1/2}-3u^{-1/2}.\n\\]\nBoth terms use the power rule because neither exponent is \\(-1\\):\n\\[\n\\int u^{1/2}\\,du=\\frac23u^{3/2},\\qquad\n\\int -3u^{-1/2}\\,du=-6u^{1/2}.\n\\]\nA logarithm arises from \\(\\int u^{-1}\\,du\\), which is not present. **Status: all three points were Harry corrections made live.**"},{"question":"**[October 2025 P4 Q1 — hints only live; coefficients official reference only]** For\n\\[\n(2+5x)^{-2},\n\\]\nstate the normalisation reached in the lesson. Then, clearly as official-reference work not completed live, give the first four terms, the interval of validity, and the quadratic approximation coefficients in\n\\[\n\\left(\\frac4{2+5x}\\right)^2\\approx a+bx+cx^2.\n\\]","answer":"**Reached live — hint/start only:**\n\\[\n(2+5x)^{-2}\n=2^{-2}\\left(1+\\frac52x\\right)^{-2}\n=\\frac14\\left(1+\\frac52x\\right)^{-2}.\n\\]\nThe lesson stopped after this normalisation; no coefficients, validity interval or part (c) calculation was completed.\n\n**Official mark-scheme reference — not completed in the lesson:** Using\n\\[\n(1+z)^{-2}=1-2z+3z^2-4z^3+\\cdots\n\\]\nwith \\(z=\\frac52x\\),\n\\[\n(2+5x)^{-2}\n=\\boxed{\\frac14-\\frac54x+\\frac{75}{16}x^2-\\frac{125}{8}x^3+\\cdots}.\n\\]\nValidity requires\n\\[\n\\left|\\frac52x\\right|<1\n\\quad\\Longrightarrow\\quad\n\\boxed{|x|<\\frac25}.\n\\]\nAlso,\n\\[\n\\left(\\frac4{2+5x}\\right)^2\n=16(2+5x)^{-2}\n\\approx 4-20x+75x^2,\n\\]\nso\n\\[\n\\boxed{a=4,\\quad b=-20,\\quad c=75}.\n\\]"},{"question":"**[October 2025 P4 Q2 — self-assessed gap; official reference only]** The curve\n\\[\ny=\\frac53\\sqrt{x-1},\\qquad 2\\le x\\le 8,\n\\]\nis rotated through \\(2\\pi\\) about the \\(x\\)-axis. Find the exact volume, while stating its lesson status.","answer":"The volume of revolution about the \\(x\\)-axis is\n\\[\nV=\\pi\\int_2^8y^2\\,dx.\n\\]\nSince\n\\[\ny^2=\\frac{25}{9}(x-1),\n\\]\n\\[\nV=\\frac{25\\pi}{9}\\int_2^8(x-1)\\,dx\n=\\frac{25\\pi}{9}\\left[\\frac{(x-1)^2}{2}\\right]_2^8.\n\\]\nHence\n\\[\nV=\\frac{25\\pi}{18}(49-1)\n=\\frac{25\\pi}{18}\\cdot48\n=\\boxed{\\frac{200\\pi}{3}}.\n\\]\n**Status: Q2 was a self-assessed gap and was not taught or worked in the lesson; \\(\\frac{200\\pi}{3}\\) is official-reference work only.**"},{"question":"**[October 2025 P4 Q8 — self-assessed gap; official reference only]** A quantity \\(V\\) satisfies\n\\[\n\\frac{dV}{dt}=12te^{-t},\\qquad V(0)=6.\n\\]\nFind \\(V\\) as a function of \\(t\\) and determine whether \\(V\\) ever reaches a capacity of \\(20\\). Do not use integrating factors.","answer":"Integrate directly:\n\\[\nV=\\int12te^{-t}\\,dt.\n\\]\nSince\n\\[\n\\int te^{-t}\\,dt=-(t+1)e^{-t}+C,\n\\]\n\\[\nV=-12(t+1)e^{-t}+C.\n\\]\nUsing \\(V(0)=6\\),\n\\[\n6=-12+C\\quad\\Longrightarrow\\quad C=18.\n\\]\nTherefore\n\\[\n\\boxed{V=18-12te^{-t}-12e^{-t}}.\n\\]\nFor \\(t\\ge0\\),\n\\[\n\\frac{dV}{dt}=12te^{-t}\\ge0,\n\\]\nso \\(V\\) increases, while\n\\[\n\\lim_{t\\to\\infty}V=18.\n\\]\nThus \\(V<18\\) for finite \\(t\\ge0\\) and never reaches \\(20\\). **Status: Q8 was a self-assessed gap and was not taught in the lesson; the formula and capacity conclusion are official-reference only.**"},{"question":"**[Prior P3 review — correction/explanation only, not an October 2025 P4 question]** If a composition problem involving functions \\(f\\) and \\(g\\) produces logarithms on both sides because the functions were substituted in the wrong order, state the reliable procedure for distinguishing \\(f\\circ g\\) from \\(g\\circ f\\), and state how far this issue was taken in the lesson.","answer":"Function composition is read from right to left:\n\\[\n(f\\circ g)(x)=f(g(x)),\n\\]\nso first evaluate \\(g(x)\\), then substitute the entire expression into every occurrence of the input in \\(f\\). Conversely,\n\\[\n(g\\circ f)(x)=g(f(x)),\n\\]\nso first evaluate \\(f(x)\\), then substitute it into \\(g\\). Parentheses should be retained until the substitution is complete; reversing the order generally gives a different expression.\n\n**Status:** Harry diagnosed that \\(f\\) and \\(g\\) had been substituted in the wrong order and identified which expression belonged inside which function. This was **prior P3 correction/explanation only**; no complete solution to that composition part was worked through, and it was not an October 2025 P4 question."}]},"gpt56sol_2":{"label":"GPT-5.6 Sol ②","cards":[{"question":"**[ESAT warm-up — recording/board-derived, NOT a Pearson P4 question]** A square is transformed by joining points one third of the way along its sides, producing an inner square; the process is repeated. Taking each original side as \\(3\\), explain why the area of the fourth square is \\(\\frac{125}{729}\\) of the area of the first square. State the lesson status.","answer":"Each side is split into lengths \\(1\\) and \\(2\\), so an inner-square side has length\n\\[\n\\sqrt{1^2+2^2}=\\sqrt5.\n\\]\nThe outer and inner areas are therefore \\(3^2=9\\) and \\((\\sqrt5)^2=5\\), giving a one-step area ratio of \\(\\frac59\\). From the first square to the fourth square there are three transformations, so\n\\[\n\\left(\\frac59\\right)^3=\\frac{5^3}{9^3}=\\frac{125}{729}.\n\\]\nThis was completed correctly and substantially learner-led in the lesson. Its exact official ESAT-paper identity was not established, and it is not an October 2025 P4 question."},{"question":"**[Prior P3 review — NOT an October 2025 P4 question]** For\n\\[\nf(x)=\\ln(x^2+3),\\qquad x\\in\\mathbb R,\n\\]\ndetermine the range of \\(f\\), justify the endpoint, and state what was corrected live.","answer":"Since \\(x^2\\ge 0\\),\n\\[\nx^2+3\\ge 3.\n\\]\nThe natural logarithm is strictly increasing, so\n\\[\n\\ln(x^2+3)\\ge \\ln3.\n\\]\nEquality occurs at \\(x=0\\), so the range is\n\\[\n\\boxed{[\\ln3,\\infty)}.\n\\]\nIn the prior P3 review, the learner had identified \\(x^2+3\\ge3\\), but Harry corrected the conclusion from merely “real” to \\(f(x)\\ge\\ln3\\). This correction was completed live; it was not a P4 question."},{"question":"**[Prior P3 review — NOT an October 2025 P4 question]** Given\n\\[\ng(x)=\\frac{3+5x}{x+2},\\qquad x>-2,\n\\]\nrewrite \\(g\\) in transformed-reciprocal form, then determine its range and the domain required for \\(g^{-1}\\). State the live-work boundary.","answer":"Polynomial division gives\n\\[\n3+5x=5(x+2)-7,\n\\]\nso\n\\[\ng(x)=5-\\frac7{x+2}.\n\\]\nBecause \\(x>-2\\), we have \\(x+2>0\\), hence\n\\[\n-\\frac7{x+2}<0\n\\quad\\Longrightarrow\\quad\ng(x)<5.\n\\]\nAs \\(x\\to-2^+\\), \\(g(x)\\to-\\infty\\), and as \\(x\\to\\infty\\), \\(g(x)\\to5^-\\). Therefore the range is\n\\[\n\\boxed{(-\\infty,5)}.\n\\]\nThe domain of the inverse equals the range of \\(g\\), so\n\\[\n\\boxed{\\operatorname{dom}(g^{-1})=(-\\infty,5)}.\n\\]\nThe range and inverse-domain correction was completed live in the prior P3 review. The full inverse algebra visible on the inherited board was prior work/reference, not freshly derived during this lesson."},{"question":"**[October 2025 P4 Q4(a) — corrected and completed live]** The curve\n\\[\n4x^2+y^2-2xy=24x\n\\]\nis defined implicitly. Differentiate it with respect to \\(x\\) and obtain \\(\\frac{dy}{dx}\\) in simplest form. Identify the learner’s corrected error.","answer":"Differentiating term by term, with \\(y=y(x)\\),\n\\[\n8x+2y\\frac{dy}{dx}-2\\left(x\\frac{dy}{dx}+y\\right)=24.\n\\]\nCollecting the derivative terms gives\n\\[\n(2y-2x)\\frac{dy}{dx}=24-8x+2y.\n\\]\nHence\n\\[\n\\boxed{\\frac{dy}{dx}=\\frac{12-4x+y}{y-x}}.\n\\]\nThe learner’s original numerator was correct, but the denominator was missing the \\(-x\\). The live correction was to bracket the entire product-rule derivative\n\\[\n-2\\left(x\\frac{dy}{dx}+y\\right),\n\\]\nwhich preserves the \\(-2x\\frac{dy}{dx}\\) term. Part (a) was corrected and completed live."},{"question":"**[October 2025 P4 Q4(b)]** A point \\(P(a,b)\\), with \\(a>0\\) and \\(b>0\\), lies on\n\\[\n4x^2+y^2-2xy=24x.\n\\]\nAt \\(P\\), the gradient is \\(2\\), and\n\\[\n\\frac{dy}{dx}=\\frac{12-4x+y}{y-x}.\n\\]\nSeparate precisely what was reached live from the official-reference completion, and disclose the recorded tutor slip.","answer":"**Reached live:** Substituting \\(x=a\\), \\(y=b\\) and gradient \\(2\\),\n\\[\n\\frac{12-4a+b}{b-a}=2.\n\\]\nThus\n\\[\n12-4a+b=2b-2a\n\\quad\\Longrightarrow\\quad\n\\boxed{2a+b=12},\n\\]\nso \\(b=12-2a\\). The second relation,\n\\[\n4a^2+b^2-2ab=24a,\n\\]\nwas identified because \\(P\\) lies on the curve. The lesson stopped before substitution; the remainder was deferred to Phuc.\n\n**Official mark-scheme reference only:** Substituting \\(b=12-2a\\),\n\\[\n12a^2-96a+144=0,\n\\]\nso\n\\[\na^2-8a+12=0\n\\quad\\Longrightarrow\\quad\n(a-2)(a-6)=0.\n\\]\nThis gives\n\\[\n(a,b)=(2,8)\\quad\\text{or}\\quad(6,0).\n\\]\nSince \\(b>0\\), reject \\((6,0)\\), obtaining\n\\[\n\\boxed{P=(2,8)}.\n\\]\n\n**Tutor slip:** Harry suggested that the two values of \\(b\\) might be positive and negative. The official candidates actually give \\(b=8\\) or \\(b=0\\); the condition \\(b>0\\) rejects \\(0\\)."},{"question":"**[October 2025 P4 Q5]** The lines\n\\[\nl_1:\\ \\mathbf r=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n+\\lambda\n\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix},\n\\qquad\nl_2:\\ \\mathbf r=\n\\begin{pmatrix}-1\\\\\\beta\\\\6\\end{pmatrix}\n+\\mu\n\\begin{pmatrix}2\\\\-1\\\\7\\end{pmatrix}\n\\]\nintersect at \\(P\\). Given that the lesson reached \\(\\lambda=-9\\) and \\(\\mu=-3\\), find \\(\\beta\\) and \\(P\\), while preserving the source boundary.","answer":"Equating second components,\n\\[\n-1+4\\lambda=\\beta-\\mu.\n\\]\nTherefore\n\\[\n\\beta=-1+4\\lambda+\\mu\n      =-1+4(-9)+(-3)\n      =\\boxed{-40}.\n\\]\nUsing \\(\\lambda=-9\\) in \\(l_1\\),\n\\[\nP=\n\\begin{pmatrix}2\\\\-1\\\\3\\end{pmatrix}\n-9\n\\begin{pmatrix}1\\\\4\\\\2\\end{pmatrix}\n=\n\\begin{pmatrix}-7\\\\-37\\\\-15\\end{pmatrix}.\n\\]\nHence\n\\[\n\\boxed{P=(-7,-37,-15)}.\n\\]\n\nThe live lesson reached only \\(\\lambda=-9\\) and \\(\\mu=-3\\); \\(\\beta=-40\\) and \\(P=(-7,-37,-15)\\) are official mark-scheme reference results and were not completed live. A row or position/column-vector presentation of \\(P\\) is acceptable."},{"question":"**[October 2025 P4 Q6]** Using \\(u=3+\\cos\\theta\\), the lesson transformed\n\\[\n\\int_0^{\\pi/2}\\frac{\\sin2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\n\\]\nto\n\\[\n-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)\\,du\n\\]\nand stopped there. Complete the evaluation and identify \\(a,b\\) in \\(a\\sqrt3+b\\), while preserving the source boundary.","answer":"Using the power rule,\n\\[\n\\int\\left(u^{1/2}-3u^{-1/2}\\right)\\,du\n=\\frac23u^{3/2}-6u^{1/2}.\n\\]\nTherefore\n\\[\n-2\\left[\\frac23u^{3/2}-6u^{1/2}\\right]_4^3.\n\\]\nAt \\(u=3\\),\n\\[\n\\frac23(3\\sqrt3)-6\\sqrt3=-4\\sqrt3.\n\\]\nAt \\(u=4\\),\n\\[\n\\frac23(8)-6(2)=\\frac{16}{3}-12=-\\frac{20}{3}.\n\\]\nHence\n\\[\n-2\\left(-4\\sqrt3+\\frac{20}{3}\\right)\n=\\boxed{8\\sqrt3-\\frac{40}{3}}.\n\\]\nThus\n\\[\n\\boxed{a=8,\\qquad b=-\\frac{40}{3}}.\n\\]\nThe transformed integral was the live stopping point. Its integration, final value, and constants are official-reference completion only."},{"question":"**[October 2025 P4 Q1 — hints only in the lesson]** For\n\\[\n(2+5x)^{-2},\n\\]\nfind the first four terms in ascending powers of \\(x\\), determine the interval of validity, and hence find \\(a,b,c\\) such that\n\\[\n\\left(\\frac4{2+5x}\\right)^2\\approx a+bx+cx^2.\n\\]\nDistinguish the live hint from the official-reference results.","answer":"**Live hint only:** Harry prompted the normalisation\n\\[\n(2+5x)^{-2}=2^{-2}\\left(1+\\frac52x\\right)^{-2}\n=\\frac14\\left(1+\\frac52x\\right)^{-2}.\n\\]\nNo coefficients, validity interval, or final \\(a,b,c\\) values were worked in the lesson.\n\n**Official-reference completion:** Using\n\\[\n(1+z)^{-2}=1-2z+3z^2-4z^3+\\cdots\n\\]\nwith \\(z=\\frac52x\\),\n\\[\n(2+5x)^{-2}\n=\\frac14-\\frac54x+\\frac{75}{16}x^2-\\frac{125}{8}x^3+\\cdots.\n\\]\nValidity requires\n\\[\n\\left|\\frac52x\\right|<1\n\\quad\\Longrightarrow\\quad\n\\boxed{|x|<\\frac25}.\n\\]\nAlso,\n\\[\n\\left(\\frac4{2+5x}\\right)^2\n=16(2+5x)^{-2}\n\\approx 4-20x+75x^2.\n\\]\nTherefore\n\\[\n\\boxed{a=4,\\qquad b=-20,\\qquad c=75}.\n\\]"},{"question":"**[October 2025 P4 Q2 — self-assessed gap; official reference only]** The curve\n\\[\ny=\\frac53\\sqrt{x-1},\\qquad 2\\le x\\le8,\n\\]\nis rotated through \\(2\\pi\\) about the \\(x\\)-axis. Find the exact volume generated and state its lesson status.","answer":"The volume about the \\(x\\)-axis is\n\\[\nV=\\pi\\int_2^8y^2\\,dx.\n\\]\nSince\n\\[\ny^2=\\frac{25}{9}(x-1),\n\\]\nwe obtain\n\\[\nV=\\frac{25\\pi}{9}\\int_2^8(x-1)\\,dx\n=\\frac{25\\pi}{9}\\left[\\frac{x^2}{2}-x\\right]_2^8.\n\\]\nThus\n\\[\nV=\\frac{25\\pi}{9}(24)=\\boxed{\\frac{200\\pi}{3}}.\n\\]\nQ2 appeared only as a self-assessed gap in this lesson. The calculation and result are official-reference material, not work completed or taught live."},{"question":"**[October 2025 P4 Q8 — self-assessed gap; official reference only]** A volume \\(V\\) satisfies\n\\[\n\\frac{dV}{dt}=12te^{-t},\\qquad V(0)=6,\\qquad t\\ge0.\n\\]\nFind \\(V(t)\\) and determine whether a capacity of \\(20\\) is ever reached. State the lesson status.","answer":"Direct integration gives\n\\[\nV=\\int12te^{-t}\\,dt.\n\\]\nSince\n\\[\n\\int te^{-t}\\,dt=-(t+1)e^{-t}+C,\n\\]\nwe have\n\\[\nV=-12(t+1)e^{-t}+C.\n\\]\nUsing \\(V(0)=6\\),\n\\[\n6=-12+C,\n\\]\nso \\(C=18\\). Therefore\n\\[\n\\boxed{V(t)=18-12te^{-t}-12e^{-t}}.\n\\]\nFor \\(t\\ge0\\),\n\\[\n\\frac{dV}{dt}=12te^{-t}\\ge0,\n\\]\nso \\(V\\) is non-decreasing, and\n\\[\n\\lim_{t\\to\\infty}V(t)=18.\n\\]\nIt approaches \\(18\\) from below and therefore never reaches \\(20\\).\n\nQ8 was only a self-assessed gap in the lesson. The formula and capacity conclusion are official-reference results, not live lesson work."},{"question":"**[Lesson source/status audit]** In the 26 June 2026 lesson, classify the status of October 2025 P4 Q9(a), Q3, Q7, Q9(b), and Q10. What official-reference fact, if any, may be attached to Q9(a)?","answer":"Q9(a) had only the tentative learner self-assessment “might be able to do (a)”; it was not worked or taught. Its official-reference \\(y\\)-coordinate is\n\\[\n\\boxed{\\frac43},\n\\]\nbut this must not be presented as a live result.\n\nQ3, Q7, Q9(b), and Q10 were not discussed and therefore have **no lesson status**. Their absence does not establish mastery, a self-assessed gap, or a deliberate decision to omit them."},{"question":"**[Formula register — booklet availability and P4 scope are separate axes]** Classify each of the following by whether it is printed in the exam formula booklet and whether it is required or usable in P4: the general binomial series, integration by parts, scalar product, \\(\\pi\\int y^2\\,dx\\), implicit differentiation, and vector-line intersection.","answer":"The two classifications must not be merged:\n\n- **General binomial series:** printed in the formula booklet for \\(n\\in\\mathbb R\\), \\(|x|<1\\); in P4 scope, where rational indices are assessed.\n- **Integration by parts:** printed in the booklet and in P4 scope.\n- **Scalar product:** not printed; it must be remembered and is required in P4.\n- **Volume of revolution \\(\\pi\\int y^2\\,dx\\):** not printed as such; required in P4.\n- **Implicit differentiation:** a method rather than a printed formula; in P4 scope.\n- **Vector-line intersection:** a method rather than a printed formula; in P4 scope.\n\nTherefore it is inaccurate to place all these items under a blanket claim that “P4 formulas are not given.”"}]}},"meta":{"glm_1":{"model":"z-ai/glm-5.1","provider":"glm","route":"openrouter","reasoning_effort":null,"cards":25},"glm_2":{"model":"z-ai/glm-5.1","provider":"glm","route":"openrouter","reasoning_effort":null,"cards":25},"glm_3":{"model":"z-ai/glm-5.1","provider":"glm","route":"openrouter","reasoning_effort":null,"cards":25},"qwen_1":{"model":"qwen/qwen3.7-max","provider":"qwen","route":"openrouter","reasoning_effort":null,"cards":14},"minimax_1":{"model":"minimax/minimax-m3","provider":"minimax","route":"openrouter","reasoning_effort":null,"cards":57},"minimax_2":{"model":"minimax/minimax-m3","provider":"minimax","route":"openrouter","reasoning_effort":null,"cards":50},"gpt56sol_1":{"model":"gpt-5.6-sol","provider":"openai-codex","route":"hermes-chat-openai-codex","reasoning_effort":"medium","cards":12},"gpt56sol_2":{"model":"gpt-5.6-sol","provider":"openai-codex","route":"hermes-chat-openai-codex","reasoning_effort":"medium","cards":12}},"judge":{"model":"gpt-5.6-sol","route":"hermes-chat-openai-codex","reasoning_effort":"medium","method":"source-blind exact-count tournament"}};const SK='harry_p4_20260626_ui_rebuild_v2';let cur='mysel',mySet=new Set(),myCards=[];
function init(){try{mySet=new Set(JSON.parse(localStorage.getItem(SK)||'[]'))}catch(e){}rebuild()}function rebuild(){const q={};DATA.selected.forEach(c=>{if(mySet.has(c.question))q[c.question]=c});Object.values(DATA.models).forEach(m=>m.cards.forEach(c=>{if(mySet.has(c.question)&&!q[c.question])q[c.question]=c}));myCards=[];mySet.forEach(x=>{if(q[x])myCards.push(q[x])})}function save(){localStorage.setItem(SK,JSON.stringify([...mySet]))}function add(c){mySet.add(c.question);save();rebuild()}function rem(c){mySet.delete(c.question);save();rebuild()}function has(c){return mySet.has(c.question)}function e(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}function present(t){return t.replace('$$(2, 8)$. Why is the point',' $$(2, 8)$$. Why is the point')}function fmt(t){return e(present(t)).replace(/\n/g,'<br>')}function toast(s){const t=document.getElementById('tst');t.textContent=s;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),1800)}
function tabs(){let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button><button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;for(const[k,m]of Object.entries(DATA.models))h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${m.cards.filter(has).length}/${m.cards.length})</button>`;document.getElementById('tabs').innerHTML=h}
function view(){return cur==='mysel'?myCards:cur==='judge'?DATA.selected:DATA.models[cur].cards}function mp(){const p=document.getElementById('mp');if(cur==='mysel')p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Runs</span><span class="mv">8</span></div>`;else if(cur==='judge')p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Judge</span><span class="mv mo">GPT-5.6 Sol</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">medium</span></div><div class="mi"><span class="ml">Selection</span><span class="mv">source-blind</span></div>`;else{const m=DATA.meta[cur];p.innerHTML=`<div class="mi"><span class="ml">Run</span><span class="mv">${DATA.models[cur].label}</span></div><div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider}</span></div><div class="mi"><span class="ml">Route</span><span class="mv mo">${m.route}</span></div><div class="mi"><span class="ml">Cards</span><span class="mv">${m.cards}</span></div>${m.reasoning_effort?`<div class="mi"><span class="ml">Reasoning</span><span class="mv">${m.reasoning_effort}</span></div>`:''}`}}
function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\\\[',right:'\\\\]',display:true},{left:'\\\\(',right:'\\\\)',display:false}],throwOnError:false})}function cards(){const v=view(),l=document.getElementById('cl');document.getElementById('cc').textContent=v.length+' cards';document.getElementById('sc').textContent=myCards.length+' in My Selection';if(!v.length){l.innerHTML='<div class="es">No cards. Select from Judge or a run.</div>';return}l.innerHTML=v.map((c,i)=>`<div class="cd ${has(c)?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${has(c)?'checked':''} onchange="tog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${e(present(c.question))}</div></div></div><div class="a">${fmt(c.answer)}<div class="cf">${cur!=='mysel'&&cur!=='judge'?`<span class="sb">${e(DATA.models[cur].label)}</span>`:''}<button class="cpb" onclick="cp(${i})">📋</button></div></div></div>`).join('');rr()}function redraw(){tabs();mp();cards()}function sw(x){cur=x;redraw()}function tog(i,on){on?add(view()[i]):rem(view()[i]);redraw()}function selAll(){view().forEach(add);redraw();toast('All selected')}function deAll(){view().forEach(rem);redraw();toast('All deselected')}function rstJ(){mySet=new Set(DATA.selected.map(c=>c.question));save();rebuild();redraw();toast('Reset to judge')}function rvAll(){document.querySelectorAll('.cd').forEach(x=>x.classList.add('op'));rr()}function hdAll(){document.querySelectorAll('.cd').forEach(x=>x.classList.remove('op'))}function shuf(){const l=document.getElementById('cl'),a=[...l.children];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}a.forEach(x=>l.append(x));rr()}function cp(i){const c=view()[i];navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied'))}function cpTbl(){const s='| Question | Answer |\n| --- | --- |\n'+myCards.map(c=>'| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |').join('\n');navigator.clipboard.writeText(s).then(()=>toast(myCards.length+' copied'))}function expN(){cpTbl()}init();document.addEventListener('DOMContentLoaded',redraw);</script></body></html>
