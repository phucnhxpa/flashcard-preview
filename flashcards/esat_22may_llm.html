<script>
const DATA={"selected": [{"question": "In Q2 the answer came out as $20/\\sqrt{5}$, but the matching option is $4\\sqrt{5}$. What technique converts one into the other, and why is it almost always needed on the ESAT? (2 steps)", "answer": "- Step 1: **Rationalise the denominator** by multiplying by $\\tfrac{\\sqrt{5}}{\\sqrt{5}}$:\n$$\\frac{20}{\\sqrt{5}} \\cdot \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5} = 4\\sqrt{5}$$\n- Step 2: ESAT options are conventionally written with **no surds in the denominator**. If you stop at $20/\\sqrt{5}$ you will scan the options and panic. Rationalising takes 3 seconds and is essentially mandatory.\n\n**Takeaway:** End every surd answer by rationalising. A useful template: $\\tfrac{a}{\\sqrt{b}} = \\tfrac{a\\sqrt{b}}{b}$.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "Why does the ESAT's \"final answer only\" marking scheme fundamentally change how you should approach problem-solving compared to traditional exams?", "answer": "In traditional exams, you can afford to use longer, more systematic methods because partial credit rewards your process even if you make a computational error. But in ESAT, since only the final answer matters, you must prioritize **speed and accuracy over completeness**. This means using shortcuts like the \"two-area trick\" for triangle altitudes ($$\\frac{1}{2} \\cdot a \\cdot b = \\frac{1}{2} \\cdot c \\cdot h$$) rather than deriving similarity ratios, and using elimination to narrow options before calculating rather than solving from scratch. A beautiful derivation that leads to a wrong final answer scores zero.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_1"}, {"question": "When finding the distance from a vertex of a unit cube to the *midpoint* of an opposite face, why is it incorrect to simply use the standard 3D body diagonal formula $$\\sqrt{x^2+y^2+z^2}$$ with all coordinates as 1, and what is the correct conceptual breakdown of the path? (3 steps)", "answer": "- Step 1: The standard body diagonal formula with coordinates $$(1,1,1)$$ calculates the distance from one corner of the cube to the *exact opposite corner* (the far vertex), not the center of the opposite face.\n- Step 2: To reach the midpoint of the opposite face, the path must traverse the full length of one axis (e.g., $$x=1$$), but only half the length of the other two axes (e.g., $$y=\\frac{1}{2}$$ and $$z=\\frac{1}{2}$$) to hit the center of that face.\n- Step 3: The correct conceptual breakdown uses two 2D Pythagorean steps: first, find the diagonal across the base to the point directly below the target ($$\\sqrt{1^2 + (\\frac{1}{2})^2} = \\frac{\\sqrt{5}}{2}$$), then use that as a leg with the remaining height ($$\\frac{1}{2}$$) to find the final hypotenuse ($$\\sqrt{\\frac{5}{4} + \\frac{1}{4}} = \\frac{\\sqrt{6}}{2}$$).", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "In the ratio problem “Q : R = 5 : 2 and R : S = 3 : 10”, why must you make the middle term $$R$$ match before you can read off $$Q:S$$? (2 steps)", "answer": "- Step 1: A three‑way ratio $$Q:R:S$$ is an ordered comparison where the number next to $$R$$ in both pairwise ratios must be the same, otherwise you aren’t comparing the same “part” of the whole.  \n- Step 2: By scaling the first ratio by 3 and the second by 2, you obtain $$Q:R = 15:6$$ and $$R:S = 6:20$$. Now $$R$$ is 6 in both, so you can combine them directly as $$15:6:20$$, and extract $$Q:S = 15:20 = 3:4$$. Without this scaling, you would mix different “units” of $$R$$ and get a wrong ratio like $$5:10$$ or $$15:10$$.\n\nThe principle is: the common term must carry the same number across all ratios before you can merge them.", "source": "DeepSeek ①", "_id": "deepseek_1_11"}, {"question": "Why does the semicircle area formula contain the factor $$\\frac{1}{2}$$ while the semicircle perimeter formula is $$\\pi r + 2r$$ rather than $$\\frac{1}{2} \\cdot 2\\pi r + 2r$$? (3 steps)", "answer": "- Step 1: **Area scales quadratically with linear dimensions** — when you cut a circle in half, you get exactly half the area because area is a 2D quantity. So semicircle area = $$\\frac{1}{2}\\pi r^2$$.\n- Step 2: **Perimeter is the actual boundary length** — the semicircle's perimeter includes the curved arc (half the full circumference: $$\\frac{1}{2} \\cdot 2\\pi r = \\pi r$$) plus the straight diameter ($$2r$$).\n- Step 3: **The diameter is added, not scaled** — unlike area, the perimeter includes new boundary (the diameter) that doesn't exist in the full circle.\n\nThis explains why area formulas have simple $$\\frac{1}{2}$$ factors while perimeter formulas require geometric reasoning about boundaries.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_13"}, {"question": "For the ratio problem with $$Q:R = 5:2$$ and $$R:S = 3:10$$, a student adds the $$R$$ values to get $$5:5:10$$ and concludes $$Q:S = 1:2$$. What is the fundamental conceptual error in adding ratios across different pairs, and why does the correct method require scaling instead of addition? (3 steps)", "answer": "- Step 1: Ratios in different statements are anchored to different total scales. In $$Q:R = 5:2$$, the unit “share” is defined relative to that pair’s specific total. In $$R:S = 3:10$$, the share size is different. Adding the raw numbers assumes the share size is identical in both statements, which is false.\n- Step 2: Scaling preserves the proportional relationship within each pair while forcing the common term $$R$$ to represent the same absolute quantity in both contexts. Multiplying $$5:2$$ by $$3$$ and $$3:10$$ by $$2$$ makes $$R = 6$$ in both lines, creating a consistent bridge.\n- Step 3: Once $$R$$ is identical, the three quantities can be placed on a single continuous number line: $$Q = 15$$, $$R = 6$$, $$S = 20$$. Only then does $$Q:S$$ become a meaningful comparison. Adding raw ratio numbers mixes incomparable share units and destroys the proportional chain.", "source": "Kimi K2.6 ①", "_id": "kimi_1_7"}, {"question": "In the lesson, Phuc's first attempt at Q1 used full-circle area; his first attempt at Q4 forgot to scale S. What *single* meta-skill would have caught both errors? (2 steps)", "answer": "- Step 1: **Compare the intermediate form to the answer options** before finalising. For Q1, \"if I used $\\pi r^2$ instead of $\\tfrac{1}{2}\\pi r^2$, my denominator would be $4-\\pi$, not $8-\\pi$; I can see that $4-\\pi$ is an option (B, E), so I should re-check.\" For Q4, \"the question asks for $Q:S$ in simplest form, so my final answer $3:2$ should be checked by recomputing $Q$ and $S$ independently.\"\n- Step 2: This is the **diagnostic loop**: after solving, ask \"could this answer be wrong in a *specific* way?\" and look for that signature in the options or by recomputation. AI homework hides this loop; honest self-marking reveals it.\n\n**Takeaway:** Build the habit of asking \"what could go wrong here?\" before declaring an answer final. The most common ESAT errors have predictable signatures.", "source": "MiniMax ①", "_id": "minimax_1_59"}, {"question": "Why does the answer to Q3, $\\sqrt{6}/2$, also equal $\\sqrt{3/2}$? When might you see each form? (1 step)", "answer": "- Step 1: $\\sqrt{6}/2 = \\sqrt{6}/\\sqrt{4} = \\sqrt{6/4} = \\sqrt{3/2}$. The two forms are algebraically identical. ESAT options may write the same number as $\\sqrt{6}/2$ (rationalised) or $\\sqrt{3/2}$ (under one radical). **Always rationalise** so that the surd is in the numerator — but recognise both forms as the same value.\n\n**Takeaway:** Don't be fooled by equivalent forms. $\\sqrt{6}/2 = \\sqrt{3/2} = \\tfrac{1}{2}\\sqrt{6}$.", "source": "MiniMax ①", "_id": "minimax_1_50"}, {"question": "In similarity, once you know two angles of one triangle equal two angles of another, the third is automatically equal. How does this property enable you to quickly pair up sides when an altitude is drawn in a right triangle? (2 steps)", "answer": "- Step 1: In the big right triangle with acute angles α and β, the altitude creates two smaller right triangles. The left small triangle shares α with the big one and has a right angle, so its third angle = β. The right small triangle shares β and has a right angle, so its third angle = α. Thus all three triangles have angles {90°, α, β}.\n- Step 2: In similar triangles, corresponding sides lie opposite equal angles. So, for example, the side opposite β in the big triangle is one leg, while the side opposite β in the left small triangle is the altitude segment, and so on. This gives the proportion $$ \\frac{\\text{altitude}}{\\text{leg adjacent to α}} = \\frac{\\text{leg opposite α}}{\\text{hypotenuse}} $$. This logic is automatic if you mark the angles, and it’s the foundation of the two‑area trick.\n\n**Insight:** Angle marking is the cheat code to similarity; once angles are assigned, proportions are direct.", "source": "DeepSeek ②", "_id": "deepseek_2_27"}, {"question": "In a unit cube, what is the conceptual and geometric difference between the \"body diagonal\" (corner to opposite corner) and the line from a vertex to the midpoint of the opposite face? (3 steps)", "answer": "- Step 1: The body diagonal connects $$(0,0,0)$$ to $$(1,1,1)$$, traversing the full length, width, and height of the cube. Its length is calculated as $$\\sqrt{1^2+1^2+1^2} = \\sqrt{3}$$.\n- Step 2: The vertex-to-face-midpoint line connects $$(0,0,0)$$ to $$(1, 0.5, 0.5)$$. It traverses the full length of one dimension, but only *half* the length of the other two dimensions, stopping at the center of the face rather than the far corner.\n- Step 3: Geometrically, the face-midpoint line is shorter. Its length is $$\\sqrt{1^2 + 0.5^2 + 0.5^2} = \\sqrt{1 + 0.25 + 0.25} = \\sqrt{1.5} = \\frac{\\sqrt{6}}{2}$$. Confusing these two distinct paths is a common trap in 3D geometry problems.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "In the similar triangles problem, the scale factor from the large triangle to a sub-triangle is $$\\div\\sqrt{5}$$. Where does the $$\\sqrt{5}$$ come from? (2 steps)", "answer": "- Step 1: The hypotenuse of the large triangle is $$PR = 10\\sqrt{5}$$, found via Pythagoras: $$\\sqrt{20^2 + 10^2} = \\sqrt{500} = 10\\sqrt{5}$$. The hypotenuse of the sub-triangle $$QTR$$ is the leg $$RQ = 10$$ of the large triangle.\n- Step 2: The ratio of the large hypotenuse to the sub-triangle hypotenuse is $$\\frac{10\\sqrt{5}}{10} = \\sqrt{5}$$. So the large triangle is $$\\sqrt{5}$$ times bigger than the sub-triangle, meaning every side of the sub-triangle is the corresponding side of the large triangle divided by $$\\sqrt{5}$$. The altitude $$QT$$ corresponds to leg $$PQ = 20$$, so $$QT = 20/\\sqrt{5} = 4\\sqrt{5}$$.\n\nThe $$\\sqrt{5}$$ is the ratio of the hypotenuses — it emerges from the Pythagorean calculation of the large triangle's hypotenuse.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Quick conceptual exercise: A right triangle has legs 3 and 4. What is the altitude to the hypotenuse? (You should be able to do this mentally — what's the shortcut?) (2 steps)", "answer": "- Step 1: The hypotenuse is 5 (a 3-4-5 triangle — one of the Pythagorean triples worth memorising). Using the two-area trick: $$h = ab/c = (3 \\times 4)/5 = 12/5 = 2.4$$.\n- Step 2: Verification: area = $$\\tfrac{1}{2}(3)(4) = 6$$. Also area = $$\\tfrac{1}{2}(5)(h) = 2.5h$$. So $$2.5h = 6$$, giving $$h = 2.4$$. Consistent.\n\nFor any 3-4-5 triangle, the altitude to the hypotenuse is 2.4. The two-area trick makes this a one-liner.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "When combining two ratios (e.g., $$Q:R = 5:2$$ and $$R:S = 3:10$$) into a single three-way ratio $$Q:R:S$$, what is the core algebraic principle, and what common scaling mistake must be avoided? (3 steps)", "answer": "- Step 1: The core principle is to find a common currency. You must identify the shared variable (in this case, $$R$$) and find the Lowest Common Multiple (LCM) of its two values ($$2$$ and $$3$$, which is $$6$$).\n- Step 2: To turn the $$2$$ into a $$6$$, you multiply the first ratio by $$3$$. To turn the $$3$$ into a $$6$$, you multiply the second ratio by $$2$$.\n- Step 3: The critical trap is forgetting to apply the multiplier to the unshared terms. If you multiply $$R$$ by $$2$$, you MUST multiply $$S$$ by $$2$$ as well (turning $$10$$ into $$20$$). Failing to scale both sides of the ratio breaks the proportion.", "source": "Gemini 2.5 ①", "_id": "gemini_1_9"}, {"question": "Consider the clock-angle formula $$\\theta = |30H - 5.5M|$$. What happens conceptually at times near 12:00, and why must the absolute value be supplemented by a “minimum angle” check taking $$\\min(\\theta, 360^\\circ - \\theta)$$? (2 steps)", "answer": "- Step 1: Near 12:00, say 12:50, the raw formula gives $$|0 - 275| = 275^\\circ$$. Geometrically the hands are indeed separated by $$275^\\circ$$ if you measure the reflex angle going clockwise from hour to minute hand.\n- Step 2: However, clock-angle questions conventionally ask for the smaller angle between the two rays. Since two rays define two angles that sum to $$360^\\circ$$, the smaller one is $$360^\\circ - 275^\\circ = 85^\\circ$$. Without the minimum check, any raw angle exceeding $$180^\\circ$$ would be reported incorrectly. Thus the ESAT answer is always the interior (convex) angle, not the reflex one.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "For Q5, the tutor's first move is to write $\\frac{9.75}{12} \\times 360°$ for the hour-hand position. Where does the $9.75$ come from? (1 step)", "answer": "- Step 1: $9.75$ hours is the time in hours: $9$ hours $45$ minutes $= 9 + 45/60 = 9.75$ hours. The hour hand has completed $\\frac{9.75}{12}$ of a full revolution. Multiplying by $360°$ gives its position in degrees from 12: $0.8125 \\times 360° = 292.5°$.\n\n**Takeaway:** Converting \"h:mm\" to \"decimal hours\" by $H + M/60$ is the cleanest setup for clock-angle work.", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "Why is the \"acute\" angle not always the answer for a clock question? Give an example. (2 steps)", "answer": "- Step 1: The formula $|30H - 5.5M|$ returns the **difference in degrees along the same rotational direction**. If the two hands are far apart (e.g., at 6:00 they are $180°$ apart, but the smaller arc is still $180°$), the result can be larger than the \"obvious\" acute angle.\n- Step 2: The convention is to give the angle **between** the two hands, taken as the smaller of the two arcs. So if the formula gives a value $\\theta$ with $\\theta > 180°$, the actual answer is $360° - \\theta$. For 9:45, $22.5° < 180°$ so no adjustment needed.\n\n**Takeaway:** Always check: if the formula gives a number bigger than $180°$, take the complement to $360°$.", "source": "MiniMax ①", "_id": "minimax_1_19"}, {"question": "How can you quickly estimate the clock angle at 9:45 without precise arithmetic? (2 steps)", "answer": "- Step 1: The minute hand is exactly on the 9. If the hour hand were exactly on the 9 as well, the angle would be 0°. But the hour hand moves continuously; after 45 minutes, it has covered ¾ of the gap between 9 and 10.\n- Step 2: The gap between two numbers is 30°, so ¾ of that is 22.5°. Therefore the angle is about 22.5°. This mental estimate matches the exact formula and gives you confidence that 22.5° is the only sensible choice among 0°, 7.5°, 15°, 22.5°, 30°.\n\nA rough proportionality check can often eliminate all distractors instantly — that’s the power of estimation under time pressure.", "source": "DeepSeek ①", "_id": "deepseek_1_34"}, {"question": "A full circle of radius $$r$$ has area $$\\pi r^2$$. What is the area of a semicircle of the same radius, and why is the factor of $$\\frac{1}{2}$$ so frequently forgotten? (2 steps)", "answer": "- Step 1: A semicircle is exactly half of a circle — cut a circle along its diameter and each piece is a semicircle. Therefore: $$\\text{Semicircle area} = \\frac{1}{2} \\times \\pi r^2 = \\frac{\\pi r^2}{2}$$\n- Step 2: The factor of $$\\frac{1}{2}$$ is forgotten because students see \"circle\" in the problem, recall $$\\pi r^2$$, and write it down without pausing to note that only half the circle is present. On the ESAT, this mistake produces a wrong denominator ($$4 - \\pi$$ instead of $$8 - \\pi$$), leading you straight to a deliberately placed distractor option.\n\nAlways write the full formula with the $$\\frac{1}{2}$$ before substituting any values.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "State the formula for surd splitting: how do you simplify $$\\sqrt{\\tfrac{a}{b}}$$ and why does this rule hold? (2 steps)", "answer": "- Step 1: The rule is $$\\sqrt{\\tfrac{a}{b}} = \\tfrac{\\sqrt{a}}{\\sqrt{b}}$$.\n- Step 2: This holds because the square root of a quotient equals the quotient of the square roots, by the general property that $$\\sqrt{xy} = \\sqrt{x}\\sqrt{y}$$ applied to $$y = 1/b$$ (so that $$\\sqrt{a \\cdot 1/b} = \\sqrt{a}\\sqrt{1/b} = \\sqrt{a}/\\sqrt{b}$$). This is the rule that allows the final form $$20\\sqrt{2/(8-\\pi)}$$ to be obtained from the un-split $$\\sqrt{800/(8-\\pi)}$$ in Q1.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "In the semicircle-in-square problem, one answer option has $$8 + \\pi$$ in the denominator instead of $$8 - \\pi$$. How can you eliminate this option without doing any algebra? (2 steps)", "answer": "- Step 1: The problem involves cutting a semicircle out of a square, so the remaining area is the square minus the semicircle: $$m^2 - \\frac{1}{2}\\pi r^2 = 100$$. When you rearrange, the subtraction produces $$m^2(1 - \\frac{\\pi}{8}) = 100$$, giving a denominator of $$8 - \\pi$$.\n- Step 2: An option with $$8 + \\pi$$ would correspond to adding the semicircle area rather than subtracting it — meaning the \"remaining\" area is larger than the whole square. This is physically impossible (you can't cut out a piece and have more area left), so $$8 + \\pi$$ can be eliminated immediately by sign inspection alone.\n\nThis is a powerful ESAT technique: before solving, check whether the operation should be addition or subtraction, and eliminate options with the wrong sign. This can remove 1–2 options instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "You are given $$Q:R = 5:2$$ and $$R:S = 3:10$$. Why can you not simply write $$Q:S = 5:10$$ or $$15:10$$ by ignoring the $$R$$ values, and what is the fundamental principle that fixes this? (3 steps)", "answer": "- Step 1: Ratios are relative scales, not absolute quantities. The \"unit\" of $$R$$ in the first ratio is $$\\frac{2}{5}$$ of $$Q$$'s scale, while in the second ratio it is $$\\frac{10}{3}$$ of $$S$$'s scale. These units are incompatible until aligned.\n- Step 2: The fundamental principle is that $$R$$ must represent the same actual quantity in both statements before the ratios can be chained. You achieve this by scaling each ratio so the $$R$$-term becomes the least common multiple of the two $$R$$-values (here, $$6$$).\n- Step 3: Only after $$Q:R = 15:6$$ and $$R:S = 6:20$$ does $$R$$ act as a consistent bridge, yielding $$Q:S = 15:20 = 3:4$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_10"}, {"question": "What is the general formula for the body (space) diagonal of a rectangular cuboid with sides $a$, $b$, $c$? Why does this generalise 2D Pythagoras? (2 steps)", "answer": "- Step 1: Body diagonal $d = \\sqrt{a^2 + b^2 + c^2}$.\n- Step 2: Generalisation: in 2D, $c = \\sqrt{a^2 + b^2}$. In 3D, the diagonal from a corner to the opposite corner traverses *three* mutually perpendicular displacements ($a$, $b$, $c$). Each can be combined two-at-a-time via 2D Pythagoras, and the final result is the same. The formula is just the natural extension — \"sum of squares of the perpendicular components.\"\n\n**Takeaway:** You don't need a derivation; the formula is intuitive. For a cube ($a = b = c = 1$), it gives $\\sqrt{3}$.", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "Why does the ESAT not provide a formula sheet, and how should this affect your preparation? What is the most efficient way to ensure you have all necessary formulas memorised? (2 steps)", "answer": "- Step 1: The ESAT tests not just problem-solving ability but also fluency — whether you can recall and apply formulas instantly under time pressure. Providing a formula sheet would eliminate this component. With ~90 seconds per question, you cannot afford even 10 seconds trying to recall whether the semicircle area has a $$\\tfrac{1}{2}$$ factor.\n- Step 2: The most efficient preparation: create a \"must-memorise\" sheet (like Section 12 of the lesson notes), review it daily using spaced repetition, and — critically — practice applying each formula in context. Memorising $$\\tfrac{1}{2}\\pi r^2$$ in isolation is less effective than solving three semicircle problems that force you to recall and use it. As Harry advised: do not use AI for homework, because it masks your formula gaps.\n\nMemorisation without application is fragile. Apply each formula in problems to cement it.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "The perimeter of a semicircle of radius $$r$$ is NOT just $$\\pi r$$. What is the full perimeter, and why must the straight edge be included?", "answer": "The perimeter of a semicircle consists of two parts:\n+ The curved arc — half the circumference of a full circle: $$\\frac{1}{2} \\times 2\\pi r = \\pi r$$\n+ The straight diameter — the cut edge created when the circle was split: $$2r$$\n\nSo the total perimeter is: $$\\text{Semicircle perimeter} = \\pi r + 2r$$\n\nThe diameter must be included because \"perimeter\" means the total length of the entire boundary. When you cut a circle in half, the cut creates a new straight edge that must be counted. A common mistake is to only count the curved part, giving $$\\pi r$$ instead of $$\\pi r + 2r$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "When a problem states that the mean of a group changes after new members join, why is it conceptually necessary to convert the means into *total sums* ($$\\Sigma$$) before finding the properties of the new members? (2 steps)", "answer": "- Step 1: The mean is an \"intensive\" property (an average rate), meaning you cannot simply add two means together to get a combined mean. Total sum ($$\\Sigma$$) is an \"extensive\" property, meaning the sums of subgroups can be directly added together to find the total sum of the combined group.\n- Step 2: By converting the initial mean to an initial sum ($$\\Sigma_1 = n_1 \\times \\bar{x}_1$$) and the final mean to a final sum ($$\\Sigma_2 = n_2 \\times \\bar{x}_2$$), you can isolate the exact contribution of the new members by simply subtracting the sums ($$\\Sigma_{\\text{new}} = \\Sigma_2 - \\Sigma_1$$).", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "When you encounter a problem where a shape has a piece cut out (like the semicircle from a square), what universal strategy should guide your equation? (2 steps)", "answer": "- Step 1: **Area(remaining) = Area(whole figure) – Area(removed part)**. For the square, whole = $$m^2$$, removed = semicircle area.\n- Step 2: Express the removed area in terms of the same unknown (the side length) so the equation has a single variable. Then solve. This subtraction‑of‑areas principle is the same whether the cutout is a semicircle, a triangle, a circle, etc. — it’s the basic “conservation” of area.\n\nNo matter how complex the shape looks, the foundational equation is always “big shape minus cutout = leftover”.", "source": "DeepSeek ①", "_id": "deepseek_1_38"}, {"question": "In the lesson, Harry showed two *paths* to the same answer in Q1: a direct expansion (Phuc's approach) and a \"relabel the side as $$2m$$\" alternative. The relabelling produces a formula with $$8-\\pi$$ and coefficient 10, but the *final* answer matches Phuc's. Why does relabelling preserve the final answer, and what is the test you can apply to check you haven't broken the relabelling? (2 steps)", "answer": "- Step 1: Relabelling the side as $$2m$$ (instead of the original side, call it $$S$$) means you are computing with $$m = S/2$$. So whatever you derive for $$m$$ in the new variable gives the original side $$S = 2m$$. As long as you translate back at the end, the final answer in terms of $$S$$ is preserved.\n- Step 2: The sanity test: if your \"side\" answer comes out as $$10\\sqrt{\\text{something}}$$ in one derivation and $$20\\sqrt{\\text{other thing}}$$ in another, you should get numerically equal values. The \"something\" and \"other thing\" should differ by exactly a factor of 4 (because the squaring of the factor of 2). For Q1: $$10\\sqrt{2/(8-\\pi)} \\times 2 = 20\\sqrt{2/(8-\\pi)}$$ ✓ — they match by construction. If the two answers don't match numerically, you've made a translation error.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "In the ESAT, a geometry problem asks for an area and gives options: one with $$+\\pi$$ in the denominator, one with $$-\\pi$$, one with no $$\\pi$$ at all. Without calculating anything, what does the presence or absence of $$\\pi$$ tell you about the shape described in the problem statement, and how can this guide a triage decision? (2 steps)", "answer": "- Step 1: The constant $$\\pi$$ originates from circular or rotational geometry. If the problem involves cutting, drilling, or removing a circular feature from a polygonal framework, the remaining area formula must contain $$-\\pi$$. If $$+\\pi$$ appears, it suggests adding a circular cap; if no $$\\pi$$ appears, the shape is purely rectilinear or polygonal with no curved elements.\n- Step 2: This structural knowledge lets you classify the problem before drawing. If the stem mentions a “semicircular piece cut out,” you can pre-emptively reject any option with $$+\\pi$$ or without $$\\pi$$, halving the search space instantly. In a 90-second-per-question exam, this pattern recognition is faster than deriving the exact algebra from scratch.", "source": "Kimi K2.6 ①", "_id": "kimi_1_24"}, {"question": "The lesson's Q2 result is $x = 4\\sqrt{5}$. What would change in the problem if the ratio $RQ:PQ$ were $1:\\sqrt{3}$ instead of $1:2$? Sketch the conceptual impact on the answer. (2 steps)", "answer": "- Step 1: The general shape of the problem is unchanged: a right triangle, drop altitude to hypotenuse, use two-areas trick.\n- Step 2: But the numbers shift: if $PQ = 20$ and $RQ = 20/\\sqrt{3}$, then $PR = \\sqrt{400 + 400/3} = \\sqrt{1600/3} = 40/\\sqrt{3}$. The altitude $h = ab/c = (20 \\cdot 20/\\sqrt{3})/(40/\\sqrt{3}) = 10$. So the answer would be a clean integer instead of a surd.\n\n**Takeaway:** The \"shape\" of the problem (right triangle, altitude, similar triangles, two-areas trick) is invariant; only the *numbers* and thus the *form* of the final answer change. Recognise the shape first, then plug in.", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "The body diagonal of a unit cube (corner to opposite corner) is $$\\sqrt{3}$$. The vertex-to-face-midpoint distance is $$\\sqrt{6}/2$$. Without calculating, how can you tell that $$\\sqrt{6}/2$$ should be less than $$\\sqrt{3}$$? (2 steps)", "answer": "- Step 1: The face-midpoint is closer to the starting vertex than the opposite corner — it's \"partway\" along the far face, not at the far extreme. So the distance must be less than the body diagonal $$\\sqrt{3}$$.\n- Step 2: Compare numerically: $$\\sqrt{6}/2 \\approx 2.449/2 \\approx 1.225$$, while $$\\sqrt{3} \\approx 1.732$$. Indeed $$1.225 < 1.732$$. Alternatively, note that $$\\sqrt{6}/2 = \\sqrt{6/4} = \\sqrt{1.5}$$, and $$\\sqrt{1.5} < \\sqrt{3}$$ since $$1.5 < 3$$. The exam includes $$\\sqrt{3}$$ as a distractor option precisely because students confuse the body diagonal with the vertex-to-midpoint distance.\n\nIf the target isn't the opposite corner, the answer isn't $$\\sqrt{3}$$. The geometry of the endpoint matters.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "What makes pace the \"primary challenge\" of ESAT rather than difficulty, and how should this influence your preparation strategy?", "answer": "With only 90 seconds per question for 27 questions, ESAT tests mathematical fluency and pattern recognition rather than deep problem-solving ability. Individual questions are typically at A-level standard, but the time constraint means you cannot afford to derive formulas, draw detailed diagrams, or work through multiple approaches. This suggests preparation should emphasize immediate formula recall, rapid diagram sketching, and recognizing standard problem types rather than practicing complex multi-step proofs or novel problem-solving techniques.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_11"}, {"question": "In word problems where the mean of a group changes after new members join, why is it mathematically invalid to work directly with the mean values (e.g., adding or subtracting the old mean from the new mean)? What absolute quantity must you convert the mean into to solve the problem? (3 steps)", "answer": "- Step 1: **The nature of the mean**\n+ The mean is an artificial, distributed average ($$\\bar{x} = \\frac{\\Sigma x}{n}$$). It does not represent a physical sum that can be linearly added or subtracted when the size of the group ($$n$$) changes, because the \"weight\" of the mean shifts.\n- Step 2: **The absolute quantity required**\n+ You must always convert the mean back into the **Total Sum** ($$\\Sigma x$$). The total sum is a tangible, absolute quantity (like total combined age or total combined weight) that is conserved and can be added to or subtracted from.\n- Step 3: **The conceptual formula shift**\n+ You rearrange the mean formula to $$\\Sigma x = n \\cdot \\bar{x}$$. You calculate the total sum of the original group, calculate the total sum of the new group, and the difference between these two absolute sums represents the exact contribution of the new members.", "source": "Gemini 2.5 ②", "_id": "gemini_2_12"}, {"question": "If a question asked for the perimeter of the remaining shape in the semicircle-in-square problem, why would using $$\\pi r$$ alone be incomplete, and what additional lengths must be included? (2 steps)", "answer": "- Step 1: The perimeter of the remaining metal includes the curved cut edge, which is the semicircular arc length $$\\pi r$$. However, the perimeter also includes the outer boundary of the square.\n- Step 2: Crucially, the side of the square where the semicircle is cut is not fully removed; only the semicircular arc replaces the middle of that side. The two straight segments of that side (each of length $$\\frac{m}{2}$$) remain part of the perimeter. Thus total perimeter involves three full sides of the square plus the arc, not simply the arc.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "The ESAT gives you ~90 seconds per question. What is the \"triage\" strategy, and why is it essential? (2 steps)", "answer": "- Step 1: Triage means: if you're stuck after ~30 seconds on a question, **flag it and move on** to the next one. Don't spend 3 minutes on a single problem — that's 2–3 other questions you won't have time to attempt.\n- Step 2: Return to flagged questions with whatever time remains at the end. Often, seeing a fresh problem after solving several others puts you in a better frame of mind. The key insight: every question is worth the same marks. A quick solve on an easy question is worth exactly as much as grinding through a hard one.\n\nThe ESAT does not penalise wrong answers (it uses positive marking only), so it's always worth guessing on any question you can't solve — but only after you've attempted all the questions you can solve.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Across the six ESAT problems in the lesson, what is the *most consistent* type of student error, and what does this tell you about the bottleneck in ESAT preparation? (2 steps)", "answer": "- Step 1: The errors observed were: (i) Phuc's first attempt on Q1 — using $$\\pi r^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi r^2$$ (semicircle); (ii) Phuc's first attempt on Q4 — scaling $$R$$ but not $$S$$; (iii) the conceptual trap on Q5 — assuming the hour hand is stationary at 9; (iv) the conceptual trap on Q6 — using the wrong count in the mean formula. These are *not* arithmetic errors — they are *formula misapplication* and *geometric assumption* errors.\n- Step 2: The bottleneck is therefore not arithmetic speed (Phuc could compute each step correctly once the right formula was given) but *recognising the right formula in context*. This means rote memorisation of formulas is necessary but not sufficient — the harder skill is *pattern recognition* (this problem is \"a semicircle in a shape\" → use $$\\tfrac{1}{2}\\pi r^2$$). Harry's advice to do *untimed* practice first directly targets this: you cannot build pattern recognition under clock pressure, but you can build it with deliberate, reflective practice.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Synthesis question: A right triangle has legs in ratio 1:3 (instead of 1:2 as in the lesson). If the shorter leg is 5, find the altitude to the hypotenuse conceptually — what are the steps, and how does the ratio affect the answer? (3 steps)", "answer": "- Step 1: The legs are 5 and 15 (ratio 1:3, shorter = 5). The hypotenuse is $$\\sqrt{5^2 + 15^2} = \\sqrt{25 + 225} = \\sqrt{250} = 5\\sqrt{10}$$.\n- Step 2: Using the two-area trick: $$h = \\frac{ab}{c} = \\frac{5 \\times 15}{5\\sqrt{10}} = \\frac{75}{5\\sqrt{10}} = \\frac{15}{\\sqrt{10}}$$.\n- Step 3: Rationalise: $$\\frac{15}{\\sqrt{10}} \\cdot \\frac{\\sqrt{10}}{\\sqrt{10}} = \\frac{15\\sqrt{10}}{10} = \\frac{3\\sqrt{10}}{2}$$. The ratio 1:3 (vs 1:2 in the lesson) changes the hypotenuse and thus the altitude. A more unequal leg ratio produces a longer hypotenuse relative to the product of legs, which tends to give a smaller altitude.\n\nThe altitude depends on all three sides; changing the leg ratio changes the hypotenuse, which changes $$h = ab/c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "When working with mean problems involving group changes, why is it more efficient to work with total sums ($$\\Sigma = n\\bar{x}$$) rather than trying to track individual values? (2 steps)", "answer": "- Step 1: **Sums are additive, means are not** — when two groups combine, their total sums simply add together, but their means require weighted averaging. Working with sums avoids the complexity of weighted averages.\n- Step 2: **Each constraint gives one equation for sums** — \"mean of 20 is 28\" directly gives $$\\Sigma_1 = 560$$, \"new mean of 22 is 30\" gives $$\\Sigma_2 = 660$$, so the new members' sum is $$660 - 560 = 100$$.\n\nThis sum-based approach converts word problems into simple arithmetic.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_9"}, {"question": "For Q3, an alternative to the two-step method is to use the 3D distance formula directly. Why does the two-step method still get taught, and when is it actually necessary? (2 steps)", "answer": "- Step 1: The two-step method is taught because not all 3D problems have a clean corner-to-corner path. The vertex-to-face-midpoint problem is one of them — the \"target\" is at $(\\tfrac{1}{2}, \\tfrac{1}{2}, 1)$ relative to the origin, and the distance formula *does* apply directly, giving $\\sqrt{(\\tfrac{1}{2})^2 + (\\tfrac{1}{2})^2 + 1^2} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2}$ in one line.\n- Step 2: The two-step method is essential when the geometry has a **right-angle break** that is not aligned with the cube axes — for example, if a point lies on a face diagonal or a body diagonal that doesn't reach a corner. The two-step approach makes the right angle visible at each stage and is the only safe way for those cases.\n\n**Takeaway:** Direct formula works when the displacement is along the cube axes. Two-step is the universal fallback.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "A student solves a ratio problem by cross-multiplying: $$\\frac{Q}{R} = \\frac{5}{2}$$ and $$\\frac{R}{S} = \\frac{3}{10}$$, then multiplies the two equations to get $$\\frac{Q}{S} = \\frac{5}{2} \\times \\frac{3}{10} = \\frac{15}{20} = \\frac{3}{4}$$. Conceptually, why does this cross-multiplication shortcut happen to yield the correct answer here, and what algebraic trap hides inside it? (3 steps)", "answer": "- Step 1: Multiplying the two ratio equations gives $$\\frac{Q}{R} \\cdot \\frac{R}{S} = \\frac{Q}{S}$$ on the left because the shared $$R$$ cancels. The right-hand product is indeed $$\\frac{5}{2} \\times \\frac{3}{10} = \\frac{3}{4}$$. This is algebraically valid because ratios are fractions, and fraction multiplication chains through common factors.\n- Step 2: The trap is that this method only works cleanly when the common term $$R$$ occupies the opposite corner in the two fractions (denominator of first, numerator of second), allowing cancellation. If the ratios were presented as $$Q:R = 5:2$$ and $$S:R = 10:3$$, blind multiplication would place $$R$$ incorrectly and fail.\n- Step 3: More subtly, this shortcut obscures the unit-scaling issue. While the algebra of fractions handles the cancellation automatically, it does so by assuming the $$R$$ values are identical absolute quantities. The vertical scaling method makes this assumption explicit and verifiable, whereas the fraction multiplication conceals it behind symbolic luck.", "source": "Kimi K2.6 ①", "_id": "kimi_1_23"}, {"question": "In Q1, the answer form is $20\\sqrt{2/(8-\\pi)}$. Why is it valid to write $\\sqrt{2}/(8-\\pi)$ *under* the same square root? What is the underlying rule? (1 step)", "answer": "- Step 1: The rule is $\\sqrt{a}\\cdot\\sqrt{b} = \\sqrt{ab}$ (and conversely $\\sqrt{a/b} = \\sqrt{a}/\\sqrt{b}$). So $20\\sqrt{2}/\\sqrt{8-\\pi} = 20 \\cdot \\sqrt{2}/\\sqrt{8-\\pi} = 20\\sqrt{2/(8-\\pi)}$. Combining back into a single radical is *allowed* because both numerator and denominator are positive.\n\n**Takeaway:** You can fold numerator and denominator into a single square root when both are positive. This is how option forms are usually written on the ESAT.", "source": "MiniMax ①", "_id": "minimax_1_40"}, {"question": "Before writing down any algebraic equations for a geometry problem in a multiple-choice exam, why is it a critical strategic step to look at the answer options first? (3 steps)", "answer": "- Step 1: The answer options reveal the specific variable and format the examiner wants. For example, if a square has side length $$m$$, the options will likely be in terms of $$m$$.\n- Step 2: If a semicircle is cut from this square, its radius is $$r = \\frac{m}{2}$$. If you set up your equation using $$r$$, you will eventually have to substitute $$m$$ back in, wasting time and risking algebraic errors.\n- Step 3: By checking the options first, you can instantly substitute $$r = \\frac{m}{2}$$ into your initial equation, ensuring your algebra targets the exact form of the multiple-choice answers from line one.", "source": "Gemini 2.5 ①", "_id": "gemini_1_1"}, {"question": "A student is stuck on a right-triangle altitude problem and considers using the geometric mean theorem: the altitude $$x$$ satisfies $$x = \\sqrt{pq}$$ where $$p$$ and $$q$$ are the projections of the legs onto the hypotenuse. Why is this theorem applicable, and what does it reveal about the deep relationship between similar triangles and mean proportions? (3 steps)", "answer": "- Step 1: In a right triangle, dropping the altitude creates two smaller triangles that are similar to each other and to the original. The leg $$PQ = 20$$ becomes the geometric mean of the hypotenuse segment adjacent to $$P$$ (call it $$p$$) and the full hypotenuse $$c$$: $$PQ^2 = p \\cdot c$$. Likewise $$RQ^2 = q \\cdot c$$.\n- Step 2: The altitude itself is the geometric mean of the two hypotenuse segments: $$x^2 = p \\cdot q$$. This is a direct consequence of the similarity ratios; cross-multiplying the proportions yields exactly these product equations.\n- Step 3: This reveals that the altitude is not merely a linear measurement but a proportional bridge. The term “geometric mean” arises because the altitude is the mean proportion between the two segments. While ESAT may not require this theorem by name, recognising that the altitude equals $$\\frac{ab}{c}$$ (the area shortcut) is equivalent and computationally faster.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "In ESAT problems that involve a “perpendicular to the hypotenuse”, what is the most common mistake students make when using similar‑triangle ratios? How can you avoid it?", "answer": "- Step 1: The mistake is **matching non‑corresponding sides**. For example, a student might set up $$\\frac{\\text{leg}}{\\text{altitude}} = \\frac{\\text{hypotenuse}}{\\text{leg}}$$ when the correct correspondence is different. Because all three triangles have the same shape, the mapping of which side of the small triangle corresponds to which side of the large triangle must be done via the equal angles.\n- Step 2: To avoid the error, always label the triangles with the same angle patterns (single and double arcs). Then, when writing the proportion, pair the sides opposite the same arc mark across the triangles. Alternatively, use the two‑area trick — it bypasses similarity mismatching entirely.\n\nSimilarity is powerful but demands careful bookkeeping; if you’re short on time, the area method is less fragile.", "source": "DeepSeek ①", "_id": "deepseek_1_30"}, {"question": "Several ESAT geometry problems follow a pattern: \"shape with piece cut out, remaining area given, find a dimension.\" What is the general approach, and how does the type of cut-out affect the algebra? (3 steps)", "answer": "- Step 1: The general equation is: $$\\text{Area of whole shape} - \\text{Area of cut-out} = \\text{Remaining area}$$. Express both areas in terms of the unknown dimension, set up the equation, and solve.\n- Step 2: The type of cut-out determines the formula and the resulting denominator:\n  + Semicircle cut-out (diameter = side $$s$$): $$s^2 - \\frac{1}{2}\\pi\\left(\\frac{s}{2}\\right)^2 = A$$ → denominator involves $$8 - \\pi$$\n  + Quarter-circle cut-out (radius = side $$s$$): $$s^2 - \\frac{1}{4}\\pi s^2 = A$$ → denominator involves $$4 - \\pi$$\n  + Full circle cut-out (diameter = side $$s$$): $$s^2 - \\pi\\left(\\frac{s}{2}\\right)^2 = A$$ → denominator involves $$4 - \\pi$$ (same denominator as quarter-circle, but for a different geometric reason)\n- Step 3: The key trap in all variants: use the correct fractional area formula. Mixing up $$\\frac{1}{2}\\pi r^2$$ (semicircle), $$\\frac{1}{4}\\pi r^2$$ (quarter-circle), and $$\\pi r^2$$ (full circle) produces distractor options with wrong denominators. Always identify the fraction of a circle before writing the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Harry stated that formulas must be memorised because there is no formula sheet. Why is \"deriving on the fly\" a dangerous strategy for the ESAT even if you are capable of reconstructing a formula? (2 steps)", "answer": "- Step 1: Derivation consumes working memory and time. At 90 seconds per question, spending 30 seconds reconstructing the semicircle area or the clock-angle relation leaves insufficient time for calculation and checking.\n- Step 2: Memorized formulas are retrieved from long-term memory almost instantly, freeing cognitive resources for the specific algebraic or numerical demands of the problem at hand.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "In the square‑minus‑semicircle problem, after algebraic simplification you get $$ m = \\sqrt{\\frac{800}{8-\\pi}} $$. Without computing numbers, which of these is larger: $$ m $$ when π is 3.14 vs when π is 3.2? Why? (2 steps)", "answer": "- Step 1: The denominator is $$ 8 - \\pi $$. As π increases, the denominator becomes smaller, so the fraction $$ \\frac{800}{8-\\pi} $$ increases, hence $$ m $$ increases. Conversely, a smaller π (like 3.14 vs 3.2) makes the denominator larger, so m is smaller.\n- Step 2: Physically, if π were larger, the semicircle would cut out more area for the same side length, so to keep the remaining area at 100, the square must be larger. That matches: larger π → larger m. This simple monotonicity check can be used to eliminate options that don’t behave accordingly (e.g., options with $$ 8+\\pi $$ would have the opposite trend).\n\n**Inequality reasoning:** The relationship $$ m \\propto 1/\\sqrt{8-\\pi} $$ is a quick mental tool.", "source": "DeepSeek ②", "_id": "deepseek_2_40"}, {"question": "The two‑area trick for altitude: $$ h = \\frac{ab}{c} $$. Show why this formula fails if the triangle is not right‑angled, and what you would need instead. (2 steps)", "answer": "- Step 1: In a non‑right triangle, the altitude from one vertex to the opposite side does not split the triangle into two smaller similar triangles in the same way, and the area cannot be expressed as simply $$ \\frac{1}{2} \\times \\text{leg} \\times \\text{leg} $$ using only two given sides without an included angle. The formula $$ \\frac{1}{2}ab $$ only gives the area if the angle between a and b is 90°.\n- Step 2: For an arbitrary triangle with sides a, b, and angle C between them, area = $$ \\frac{1}{2}ab\\sin C $$. Then the altitude to side c is $$ h = \\frac{ab\\sin C}{c} $$. So the simple product‑over‑hypotenuse is a special case where sin 90° = 1. ESAT right‑triangle problems exploit this simplification.\n\n**Insight:** The altitude shortcut is possible only because the right angle makes the legs perfectly orthogonal, so the area is just half the rectangle’s area.", "source": "DeepSeek ②", "_id": "deepseek_2_46"}, {"question": "The mean is defined as $$\\bar{x} = \\frac{\\Sigma x}{n}$$. Why is the rearranged form $$\\Sigma x = n\\bar{x}$$ more useful for ESAT problems involving changing groups? (2 steps)", "answer": "- Step 1: The rearranged form lets you convert a mean directly into a total sum. If the mean age of 20 people is 28, you immediately know the sum of all their ages is $$20 \\times 28 = 560$$. Sums are far more useful than means because **sums can be added and subtracted, while means cannot**.\n- Step 2: Once you have sums, you can track changes. If 2 new members join and the new mean is 30 for 22 people, the new sum is $$22 \\times 30 = 660$$. The combined age of the 2 new members is $$660 - 560 = 100$$, so their mean age is 50. The key principle: **always convert means to sums before doing any arithmetic with changing groups**.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "What is the **misconception** that leads some students to think that rationalising a denominator changes the value of the expression?", "answer": "Rationalising involves multiplying the fraction by a form of 1 (like $$\\frac{\\sqrt{5}}{\\sqrt{5}}$$). Since multiplying by 1 doesn’t change a number, the value stays identical. The confusion arises because the appearance changes drastically — from $$\\frac{20}{\\sqrt{5}}$$ to $$4\\sqrt{5}$$ — and students sometimes think they have “solved” an equation or performed an operation that alters the quantity. Understanding that rationalisation is a **cosmetic rewriting**, not a transformation, eliminates this worry. (For instance, $$4\\sqrt{5} \\approx 8.944$$ and $$\\frac{20}{\\sqrt{5}} \\approx 8.944$$ — they’re the same.)", "source": "DeepSeek ①", "_id": "deepseek_1_36"}, {"question": "What geometric insight explains why dropping a perpendicular from a right-angle vertex to the hypotenuse creates similar triangles? (2 steps)", "answer": "- Step 1: The original right triangle has two acute angles that sum to 90°. When you drop the perpendicular, it creates two smaller right triangles, each sharing one of these acute angles with the original.\n- Step 2: Since each smaller triangle has a right angle plus one of the original acute angles, its third angle must equal the other original acute angle, creating the angle-angle-angle correspondence needed for similarity.\n\nThis is why all three triangles (original and both smaller ones) are similar to each other — they all share the same set of three angles.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_14"}, {"question": "In the cube problem, the answer $$ \\sqrt{6}/2 $$ is equivalent to $$ \\sqrt{3/2} $$. Why might an examiner present it as $$ \\sqrt{6}/2 $$ rather than $$ \\sqrt{3/2} $$? (2 steps)", "answer": "- Step 1: Rationalising the denominator inside the root: $$ \\sqrt{\\frac{3}{2}} = \\frac{\\sqrt{3}}{\\sqrt{2}} $$. But ESAT options typically avoid surds in the denominator, so they rationalise: $$ \\frac{\\sqrt{3}}{\\sqrt{2}} = \\frac{\\sqrt{6}}{2} $$. This is the standard “clean” form.\n- Step 2: Therefore, if you obtain $$ \\sqrt{3/2} $$, you must recognise that it matches $$ \\frac{\\sqrt{6}}{2} $$, which is the listed option. Being able to quickly convert between these forms is essential for matching your answer to the choices.\n\n**Takeaway:** Equivalent surd expressions abound; practice recognising $$ \\sqrt{a/b} = \\frac{\\sqrt{a}}{\\sqrt{b}} $$ and subsequent rationalisation.", "source": "DeepSeek ②", "_id": "deepseek_2_45"}, {"question": "When solving the semicircle-in-square problem, Option B has $$4 - \\pi$$ in the denominator while Option A has $$8 - \\pi$$. What specific error leads to the $$4 - \\pi$$ version? (2 steps)", "answer": "- Step 1: If you forget the $$\\tfrac{1}{2}$$ in the semicircle area formula and write the cut-out area as $$\\pi r^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi r^2$$, the equation becomes $$m^2 - \\pi(m/2)^2 = 100$$, which expands to $$m^2 - \\pi m^2/4 = 100$$.\n- Step 2: Factoring: $$m^2(1 - \\pi/4) = 100$$, so $$m^2 = \\frac{100}{1 - \\pi/4} = \\frac{400}{4 - \\pi}$$. The denominator is $$4 - \\pi$$ instead of $$8 - \\pi$$. This is exactly Option B's structure (with a different coefficient). The exam designers placed this distractor deliberately to catch the missing-$$\\tfrac{1}{2}$$ error.\n\nEach wrong option often corresponds to a specific, common mistake. Recognising which error produces which distractor helps you self-check.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "In similar triangles, if the scale factor from the large triangle to a small sub-triangle is $$\\frac{1}{\\sqrt{5}}$$, what does this tell you about the area scale factor, and why is this useful for checking answer plausibility? (2 steps)", "answer": "- Step 1: The area scale factor is the square of the linear scale factor, so it is $$\\left(\\frac{1}{\\sqrt{5}}\\right)^2 = \\frac{1}{5}$$. Each small triangle therefore has one-fifth the area of the large triangle.\n- Step 2: This serves as a quick plausibility check: if you compute an altitude or side using similarity, its square should relate to the area proportionally. It also explains why lengths involving $$\\sqrt{5}$$ appear, but areas would involve simple rational numbers like $$\\frac{1}{5}$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "The two-step Pythagoras method in the unit cube generalizes to any rectangular box with side lengths $$a, b, c$$. Explain why the face diagonal $$\\sqrt{a^2+b^2}$$ and the space diagonal $$\\sqrt{a^2+b^2+c^2}$$ are structurally identical to the unit-cube calculation, just with rescaled axes. (2 steps)", "answer": "- Step 1: Pythagoras depends only on orthogonality, not on the specific lengths. If you stretch the $$x$$-dimension from 1 to $$a$$, the contribution to the squared distance changes from $$1^2$$ to $$a^2$$, but the theorem still applies because the edges remain mutually perpendicular.\n- Step 2: Therefore, the unit-cube result is a template: replace each unit square with the appropriate squared side length. The midpoint problem similarly generalizes; if the target is at fractions of the sides, the displacements scale linearly, and the same two-step logic applies unchanged.", "source": "Kimi K2.6 ②", "_id": "kimi_2_29"}, {"question": "What is the relationship between body diagonal, face diagonal, and edge of a cube of side $s$? Order them from smallest to largest. (2 steps)", "answer": "- Step 1: For a cube of side $s$:\n+ **Edge:** $s$\n+ **Face diagonal:** $\\sqrt{2}\\,s$ (across one face: $\\sqrt{s^2 + s^2}$)\n+ **Body diagonal:** $\\sqrt{3}\\,s$ (corner to opposite corner: $\\sqrt{(\\sqrt{2}\\,s)^2 + s^2} = \\sqrt{3}\\,s$)\n- Step 2: So the order is $s < \\sqrt{2}\\,s < \\sqrt{3}\\,s$, or numerically $1 < 1.414 < 1.732$ for $s=1$. The vertex-to-face-midpoint distance $\\sqrt{6}/2 \\approx 1.225$ lies between the edge and the face diagonal, as it must.\n\n**Takeaway:** Knowing this hierarchy lets you sanity-check any cube answer in seconds.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "At 9:45 on a clock, why is the angle between the hands NOT 0°, even though the minute hand points at the 9? What is the key insight about the hour hand? (2 steps)", "answer": "- Step 1: The minute hand at 9:45 points at the 9 position (270° from 12). If the hour hand also sat at the 9, the angle would be 0°. But the hour hand does not sit at the 9 — it moves continuously and smoothly between hour markers.\n- Step 2: By 9:45, the hour hand has been moving from 9 toward 10 for 45 minutes. Since it takes 60 minutes to move from one hour mark to the next (a 30° arc), in 45 minutes it has moved $$\\frac{45}{60} \\times 30° = 22.5°$$ past the 9. So the hour hand is at $$270° + 22.5° = 292.5°$$, and the angle between the hands is $$292.5° - 270° = 22.5°$$.\n\nThe hour hand never \"jumps\" — it creeps forward at 0.5° per minute. This continuous motion is the key to every clock angle problem.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "In a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$, the altitude from the right angle to the hypotenuse has length $$h = \\frac{ab}{c}$$. Derive this using the two-area trick. (3 steps)", "answer": "- Step 1: Compute the area of the triangle using the two legs as base and height: $$\\text{Area} = \\frac{1}{2} \\times a \\times b$$\n- Step 2: Compute the same area using the hypotenuse as the base and the altitude as the height: $$\\text{Area} = \\frac{1}{2} \\times c \\times h$$\n- Step 3: Equate the two expressions for area and solve for $$h$$: $$\\frac{1}{2}ab = \\frac{1}{2}ch \\implies ab = ch \\implies h = \\frac{ab}{c}$$\n\nThis is the \"two-area trick\" — you express the same area in two different ways and equate them. It avoids the need to identify which sides correspond in similar triangles, making it faster and less error-prone under time pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Edge case: In a clock angle problem, what happens at 6:00? What about at 6:30? Explain why these give very different angles even though the hour hand is \"at 6\" in both cases. (3 steps)", "answer": "- Step 1: At 6:00: $$|30(6) - 5.5(0)| = |180 - 0| = 180°$$. The hands point in opposite directions — the maximum possible angle.\n- Step 2: At 6:30: $$|30(6) - 5.5(30)| = |180 - 165| = 15°$$. The hands are nearly overlapping! Even though it's \"6:30,\" the hour hand has moved halfway from 6 to 7 (by 15°), and the minute hand has come all the way around to the 6, nearly catching up.\n- Step 3: The dramatic difference (180° vs 15°) illustrates the hour hand's continuous movement. At 6:00 the hands are maximally separated; by 6:30 the minute hand has nearly closed the gap because it moves 12 times faster than the hour hand. \"At 6\" does not mean the hour hand sits at the 6 mark — it only passes through that mark at exactly 6:00.\n\nThe hour hand is at the 6 only at exactly 6:00. Every minute after that, it drifts forward.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "When the options for a geometry problem include forms like $$20\\sqrt{\\frac{2}{8-\\pi}}$$ and $$10\\sqrt{\\frac{1}{8-\\pi}}$$, what does the presence of $$\\pi$$ in the denominator tell you conceptually about the original shape, and how can you use this to eliminate wrong options before finishing the algebra? (2 steps)", "answer": "- Step 1: The presence of $$\\pi$$ indicates that a circular or semicircular area was subtracted from a rectilinear area (square). The algebraic structure must involve area of square minus area of curved region. Because area is subtracted, the denominator must combine the square’s constant with a minus sign attached to $$\\pi$$; any option with $$8 + \\pi$$ or $$4 + \\pi$$ implies area was added, which contradicts the word “cut out.”\n- Step 2: The coefficient 20 versus 10 reveals whether the algebra treated the side as $$m$$ or perhaps $$2m$$ at an intermediate stage. By anticipating that the side length should scale with $$\\sqrt{100} = 10$$ as a baseline, you can discard options with coefficients that are off by obvious powers or factors.", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "A student is stuck on a right-triangle altitude problem and considers redrawing the triangle with legs 6 and 8 instead of 20 and 10 to test their method. Why is this “dumbed-down” substitution a valid conceptual check, and what simple integer result should the altitude yield for that check? (2 steps)", "answer": "- Step 1: The geometric relationship is scale-invariant in logic but not in number. Using smaller integers preserves the same proportional structure (hypotenuse from Pythagoras, altitude from area equality) while making mental arithmetic trivial. If the method fails with 6 and 8, it will fail with 20 and 10.\n- Step 2: For legs 6 and 8, the hypotenuse is 10. Equating areas: $$\\frac{1}{2} \\cdot 6 \\cdot 8 = \\frac{1}{2} \\cdot 10 \\cdot h$$ gives $$h = \\frac{48}{10} = 4.8$$. Since 4.8 is less than both legs and less than the hypotenuse, it passes a sanity check. A method producing $$h > 6$$, for instance, would be immediately exposed as nonsense.", "source": "Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "Quick conceptual exercise: The ratio X:Y = 7:5 and Y:Z = 5:3. What is X:Z? (This should be doable mentally — what simplifies it?) (2 steps)", "answer": "- Step 1: Notice that Y = 5 in both ratios — the shared variable already has the same value! No scaling needed.\n- Step 2: Directly read off: X:Y:Z = 7:5:3, so X:Z = 7:3. When the shared variable matches in both ratios, you can combine immediately without any multiplication.\n\nAlways check: if the shared variable already matches, skip the LCM step entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "In ESAT preparation, why should you practice problems untimed first before introducing time pressure? (2 steps)", "answer": "- Step 1: **Technique mastery requires deliberate practice** — when learning new problem types (similar triangles, 3D geometry, ratio alignment), you need time to understand the conceptual approach and develop systematic methods without rushing.\n- Step 2: **Time pressure amplifies existing weaknesses** — if you haven't mastered the techniques, adding time constraints will cause you to make more errors and develop bad habits (like skipping steps or using unreliable shortcuts).\n\nThe progression from untimed mastery to timed practice mirrors athletic training: perfect form first, then add speed.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_22"}, {"question": "A quick sanity check: if the mean age of a group increases when new members join, what must be true about the mean age of the new members compared to the old mean? Why? (2 steps)", "answer": "- Step 1: The new members must have a mean age **greater** than the old mean. This is a necessary condition for the overall mean to increase. Think of the mean as a balance point: adding weight (people) on the \"older\" side of the balance shifts the average upward.\n- Step 2: In the running club problem, the old mean is 28 and the new mean is 30. So the new members' mean must exceed 28 — in fact it must exceed 30, because the 20 original members are pulling the average down to 28, and only 2 new members are pulling it up to 30. The two new members must be substantially older than 30 to overcome the inertia of 20 people at 28. The answer (50 years) is consistent with this: two people at 50 are \"heavy enough\" to lift the average of 22 people from 28 to 30.\n\nIf the mean goes up, the newcomers are above the old mean. If it goes down, they're below. This sanity check catches sign errors.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "In a unit cube, what limiting-case reasoning shows that the distance from a vertex to the midpoint of the opposite face must lie strictly between the edge length $$1$$ and the face diagonal $$\\sqrt{2}$$? (2 steps)", "answer": "- Step 1: The path travels the full unit length in one dimension (say $$x$$ from 0 to 1) but only half a unit in the other two dimensions ($$y$$ and $$z$$ each go from 0 to $$\\frac{1}{2}$$). Because it has a nonzero component in all three axes, it must be longer than a straight edge, which has length $$1$$. This lower bound is strict.\n- Step 2: A face diagonal sweeps full unit components in two axes ($$1^2 + 1^2 = 2$$), giving $$\\sqrt{2} \\approx 1.414$$. Our target only sweeps one full axis and two half-axes ($$1 + \\frac{1}{4} + \\frac{1}{4} = 1.5$$), yielding $$\\sqrt{1.5} \\approx 1.225$$. Since two full axes accumulate more squared distance than one full plus two halves, the face diagonal is strictly larger. Thus the true distance is squeezed between $$1$$ and $$\\sqrt{2}$$, immediately excluding options like $$\\sqrt{3}$$ or anything less than $$1$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "What is the conceptual relationship between the *altitude of a right triangle* formula $$h = ab/c$$ and the *similar triangles* approach used in the lesson? Are they the same insight in disguise, or genuinely different? (2 steps)", "answer": "- Step 1: They are *the same geometric insight* expressed in two algebraic languages. The similar-triangles approach uses the *ratio* of corresponding sides in similar triangles: in a right triangle with altitude to the hypotenuse, the small triangle is similar to the large, so the altitude's length is determined by the scale factor. The area approach uses the *invariance* of area: computing it as $$\\tfrac{1}{2}ab$$ (using the legs) and as $$\\tfrac{1}{2}ch$$ (using the hypotenuse) and equating them.\n- Step 2: The reason they give the same answer is that *similarity ratios and area invariance are mathematically equivalent statements about right triangles*. Two similar triangles have the same angle, so the side ratio equals the altitude ratio, and this is exactly the relation $$h/c = b/a$$ (rearranged: $$h = bc/a$$ — but with the labelling in the lesson, it becomes $$h = ab/c$$). So whichever you use, you're really using the same fact. The lesson shows both so you can pick whichever feels faster.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "In the semicircle‑in‑square problem, the final answer is $$20\\sqrt{\\frac{2}{8-\\pi}}$$. Without looking at options, explain how the factor 20 and the denominator $$8-\\pi$$ emerge from the geometry. (3 steps)", "answer": "- Step 1: Setting up the area equation: $$m^2 - \\frac12 \\pi (m/2)^2 = 100 \\;\\Rightarrow\\; m^2\\left(1 - \\frac{\\pi}{8}\\right) = 100$$.\n- Step 2: Multiply both sides by $$\\frac{8}{8-\\pi}$$: $$m^2 = \\frac{800}{8-\\pi}$$.\n- Step 3: Take the square root: $$m = \\frac{\\sqrt{800}}{\\sqrt{8-\\pi}}$$. Simplify $$\\sqrt{800} = 20\\sqrt{2}$$, yielding $$20\\frac{\\sqrt{2}}{\\sqrt{8-\\pi}} = 20\\sqrt{\\frac{2}{8-\\pi}}$$. The 20 comes from the square root of 400, which is inside 800; the denominator $$8-\\pi$$ comes from the factor $$\\left(1 - \\frac{\\pi}{8}\\right)$$ transformed.\n\nSo the numbers are not arbitrary — they directly reflect the area condition and the fact that the semicircle’s area formula introduces a factor of 1/8.", "source": "DeepSeek ①", "_id": "deepseek_1_27"}, {"question": "At exactly 12:00, the clock hands overlap (angle = 0°). Roughly how long does it take for them to overlap again, and why isn't it exactly 60 minutes? (2 steps)", "answer": "- Step 1: The minute hand gains 5.5° on the hour hand every minute (relative speed = 5.5°/min). To lap the hour hand (gain a full 360°), the minute hand needs $$360/5.5 \\approx 65.45$$ minutes, which is about 1 hour and 5.5 minutes.\n- Step 2: It's not 60 minutes because in 60 minutes, the hour hand has moved forward by 30° (from one hour mark to the next). The minute hand returns to the top but the hour hand has shifted, so they don't overlap. The minute hand must travel a full 360° plus that extra 30° to catch up, which takes longer than 60 minutes.\n\nThe hands overlap roughly every 65.5 minutes, not every 60 minutes — the hour hand's continuous drift is the reason.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "A square of side $$s$$ has a semicircle of diameter $$s$$ removed. If the remaining area is $$8 - \\pi$$, what is the value of $$s$$? Work through the logic without heavy calculation. (3 steps)", "answer": "- Step 1: The area of the square is $$s^2$$. The semicircle has radius $$\\frac{s}{2}$$, so its area is $$\\frac{1}{2}\\pi\\left(\\frac{s}{2}\\right)^2 = \\frac{\\pi s^2}{8}$$.\n- Step 2: The remaining area equation is $$s^2 - \\frac{\\pi s^2}{8} = s^2\\left(1 - \\frac{\\pi}{8}\\right) = 8 - \\pi$$. Notice that $$8 - \\pi = 8\\left(1 - \\frac{\\pi}{8}\\right)$$.\n- Step 3: Thus $$s^2\\left(1 - \\frac{\\pi}{8}\\right) = 8\\left(1 - \\frac{\\pi}{8}\\right)$$, which implies $$s^2 = 8$$, so $$s = \\sqrt{8} = 2\\sqrt{2}$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "In the ratio problem, the two ratios share the variable $$R$$ but with different values (2 and 3). Why do we use the LCM (6) rather than simply multiplying both ratios to make R = 6? Could we use any other common multiple? (2 steps)", "answer": "- Step 1: We could use any common multiple of 2 and 3 — 6, 12, 18, etc. Using 12: scale $$Q:R$$ by $$\\times 6$$ to get $$30:12$$, and $$R:S$$ by $$\\times 4$$ to get $$12:40$$. Then $$Q:S = 30:40 = 3:4$$. Same final answer.\n- Step 2: The LCM is preferred because it keeps the numbers smallest, reducing arithmetic errors. Using 12 instead of 6 works but involves larger numbers. The final simplified ratio is always the same regardless of which common multiple you choose, because simplification cancels any common factor.\n\nAlways use the LCM for efficiency, but know that any common multiple gives the correct simplified result.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "In Q2, both legs are 20 and 10. What is the *dimension* of the altitude $x$? Sanity-check that $4\\sqrt{5}$ is plausible. (2 steps)", "answer": "- Step 1: All three sides (20, 10, $10\\sqrt{5}$) and the altitude $x$ are lengths, so the answer should have units of cm. $4\\sqrt{5} \\approx 8.94$ cm.\n- Step 2: The altitude to the hypotenuse must be **shorter than each leg** (it sits inside the triangle). $4\\sqrt{5} \\approx 8.94 < 10 < 20$ — both legs are longer. ✓ Also, the altitude is **less than half the longer leg**, which is geometrically reasonable. So the answer is dimensionally and geometrically sensible.\n\n**Takeaway:** Always sanity-check an answer's magnitude against the known sides. A \"right\" algebraic answer with a \"wrong\" magnitude is a sign of an error somewhere.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "The mean age of 20 runners is 28. Why is the statement \"the total of all their ages is 560\" an equivalence, not just a consequence, and how does this equivalence let you solve for unknown group additions? (2 steps)", "answer": "- Step 1: By definition, $$\\text{mean} = \\frac{\\Sigma}{n}$$, which rearranges to $$\\Sigma = n \\times \\text{mean}$$. This is a bidirectional relationship: knowing any two values determines the third exactly.\n- Step 2: When new members join, both the total sum and the count change. By computing the old sum ($$560$$) and the required new sum ($$22 \\times 30 = 660$$), the difference $$100$$ is exactly the combined age of the newcomers, bypassing any need to know individual ages.", "source": "Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "After solving a problem, what quick mental substitution can you use to sanity‑check your expression? For example, in the semicircle problem, if $$ \\pi $$ were exactly 3, what would the side length be, and does that make sense? (2 steps)", "answer": "- Step 1: Plug π=3 (a rough approximation) into the final expression: $$ m = 20\\sqrt{\\frac{2}{8-3}} = 20\\sqrt{\\frac{2}{5}} \\approx 20 \\times \\sqrt{0.4} \\approx 20 \\times 0.632 = 12.64 $$ cm. If we go back to the original equation with π=3: $$ m^2 - \\frac{1}{2}\\cdot3\\cdot(\\frac{m}{2})^2 = m^2 - \\frac{3}{8}m^2 = \\frac{5}{8}m^2 = 100 \\Rightarrow m^2 = 160 \\Rightarrow m = \\sqrt{160} \\approx 12.65 $$. Consistency holds.\n- Step 2: If an option gave, say, $$ m = 10\\sqrt{\\frac{2}{8-\\pi}} $$, with π=3 it would be about 6.32, too small. So a rough numeric check can eliminate options. This doesn’t require a calculator; just approximate π as 3.\n\n**Strategy:** Use π≈3 for quick order‑of‑magnitude checks; it’s often enough to distinguish plausible answers.", "source": "DeepSeek ②", "_id": "deepseek_2_49"}, {"question": "ESAT answer options are deliberately spaced using different *forms* of the correct expression. For Q1 (semicircle-in-square), the options use different denominators ($$4-\\pi$$ vs $$8-\\pi$$) and different coefficients (10 vs 20). What is the purpose of this design, and how should you use it to your advantage? (2 steps)", "answer": "- Step 1: The spread of options tests whether you can spot the *structural features* of the correct expression. The denominator $$4-\\pi$$ vs $$8-\\pi$$ is exactly the distinction between using full circle area ($$\\pi r^2$$) vs semicircle area ($$\\tfrac{1}{2}\\pi r^2$$) — a distractor for students who forget the $$\\tfrac{1}{2}$$. The coefficient 10 vs 20 is the distinction between whether $$\\sqrt{800}$$ was simplified correctly. So each wrong option tests a *specific* mistake.\n- Step 2: To use this to your advantage: after you derive an answer, *work backwards* through the options to see which mistake each wrong option would come from. If your algebra is correct, your answer will have features (e.g., $$8-\\pi$$ in the denominator) that match only one option. If you're uncertain, you can sometimes eliminate 2-3 options by structural inspection alone — e.g., \"+π\" in the denominator would correspond to *adding* a semicircle, which is the wrong operation for this problem.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "What is the AA similarity criterion, and why is \"two pairs of equal angles\" enough to guarantee triangles are similar? (2 steps)", "answer": "- Step 1: **AA (angle-angle) similarity:** if two triangles have two pairs of corresponding angles equal, they are similar. (In fact, you only need *two* pairs — the third is forced because angles in a triangle sum to $180°$.)\n- Step 2: This is enough because **similarity only cares about shape, not size**, and shape is fully determined by the two smallest angles of a triangle. Once those match, all corresponding sides are in the same ratio, so ratios of sides can be set up directly.\n\n**Takeaway:** AA is the workhorse of ESAT geometry. Look for right angles (trivial equal pair) plus one more shared angle and similarity is in your hands.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "For multi-sentence word problems like the mean-age question, Harry recommended translating each sentence into one equation before solving anything. Why does this \"line-by-line\" approach reduce errors compared to trying to write a single grand equation at the start? (2 steps)", "answer": "- Step 1: Each sentence typically contains one atomic fact (e.g., \"mean of 20 is 28\" $$\\rightarrow \\Sigma/20=28$$; \"mean increases by 2\" $$\\rightarrow$$ new mean = 30). Isolating these facts prevents conflating the old count with the new mean or vice versa.\n- Step 2: A single grand equation forces you to hold multiple logical relationships in working memory simultaneously, increasing the chance of mis-assigning a variable or using the wrong denominator. Line-by-line parsing externalizes each constraint cleanly.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "What is the **underlying principle** that makes the method for finding the altitude from the hypotenuse work even if the triangle is not isosceles or has unusual leg lengths? (2 steps)", "answer": "- Step 1: The altitude from the right angle always creates two smaller right triangles whose acute angles match those of the original triangle — this is a generic geometric fact, not dependent on equal legs. Therefore similarity holds for any right triangle.\n- Step 2: Because similarity holds, the ratio of corresponding sides is fixed, which means the altitude always satisfies $$h = \\frac{ab}{c}$$ regardless of whether the triangle is scalene. So the method (either similarity ratios or the two‑area trick) is universal — it works for 3‑4‑5 triangles, 5‑12‑13, or any other.\n\nThe altitude formula is a consequence of right‑angle geometry, not a special‑case trick.", "source": "DeepSeek ①", "_id": "deepseek_1_45"}, {"question": "In Q2, Harry drew the sub-triangle $$RQT$$ *separately* below the main diagram. What is the pedagogical reason for *extracting* the sub-triangle rather than working entirely on the main diagram? (2 steps)", "answer": "- Step 1: The main diagram has three triangles (the big $$PQR$$ and the two sub-triangles $$PQT$$ and $$RQT$$), all sharing vertices and angles. Trying to label all the angles and sides on one diagram creates visual clutter and makes it hard to *isolate* the relationship between two specific triangles.\n- Step 2: By extracting the sub-triangle $$RQT$$ and redrawing it at a larger scale below the main diagram, Harry makes the relevant side lengths ($$RQ = 10$$, $$QT = x$$) and the relevant angles (the double arc at $$R$$ and the right angle at $$T$$) immediately visible. This is a general *visualisation technique* for any \"altitude from a vertex\" problem: identify the smaller triangle of interest and isolate it. The main diagram is for context; the sub-diagram is for computation.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "When scaling the ratio $$R:S = 3:10$$ by multiplying by 2 to make $$R = 6$$, a student writes $$6:10$$ instead of $$6:20$$. What conceptual error causes this? (2 steps)", "answer": "- Step 1: The student correctly multiplied R (3 → 6) but forgot to multiply S (10 should become 20). The error is treating the ratio as two independent numbers rather than a **relationship** — a ratio $$a:b$$ means \"for every $$a$$ of the first, there are $$b$$ of the second.\" If you double $$a$$, you must also double $$b$$ to preserve the same relationship.\n- Step 2: Writing $$6:10$$ actually simplifies to $$3:5$$, which is a completely different ratio from $$3:10$$. The safeguard: always write the multiplier next to the entire ratio (e.g., \"$$3:10 \\times 2 = 6:20$$\"), and verify that both numbers were multiplied.\n\nOn the ESAT, the answer $$3:2$$ (from $$15:10$$) is a deliberate distractor targeting this exact mistake.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What is the AA similarity criterion's role in Q2 — i.e., how many angle pairs do you actually need to identify, and which are they? (2 steps)", "answer": "- Step 1: In Q2, the **right angle** is shared: the big triangle has a right angle at $Q$, and the sub-triangle has a right angle at $T$ (foot of altitude). That is one pair of equal angles.\n- Step 2: The **angle at $P$** is shared between the big triangle and the sub-triangle $\\triangle PQT$ (it is literally the same angle, not just equal). That is the second pair. By AA, the two triangles are similar — and we never even had to think about the third angle.\n\n**Takeaway:** Look for a right angle first (it is the easiest equal pair) and then one more shared or equal angle. Similarity follows automatically.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "When should you use elimination to narrow ESAT multiple choice options before attempting full calculations? (3 steps)", "answer": "- Step 1: **Check dimensional consistency first** — if the problem involves removing material (like cutting a semicircle from a square), expressions with addition in the denominator (like $$8 + \\pi$$) would increase the result, which is physically impossible.\n- Step 2: **Look for coefficient patterns** — if your setup gives $$m^2 = \\frac{800}{8-\\pi}$$, then $$m = \\sqrt{800}/\\sqrt{8-\\pi}$$. Since $$\\sqrt{800} = 20\\sqrt{2}$$, options with coefficient 10 instead of 20 can be eliminated.\n- Step 3: **Use limiting cases** — if $$\\pi \\to 0$$ (no semicircle removed), the expression should approach the case of full square area = 100, giving side = 10. Check which options satisfy this limit.\n\nElimination can often reduce 5 options to 2 before any algebra, saving crucial time.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_14"}, {"question": "When setting up an equation for the remaining area of a square (side $$m$$) after a semicircle is cut out, what is the most common algebraic trap regarding the semicircle's area formula, and how does this error manifest in the final simplified expression? (2 steps)", "answer": "- Step 1: The trap is forgetting the $$\\frac{1}{2}$$ factor in the semicircle area formula ($$\\frac{1}{2}\\pi r^2$$) and incorrectly using the full circle area ($$\\pi r^2$$). Since the
