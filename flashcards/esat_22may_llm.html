<script>
const DATA={"selected": [{"question": "Suppose you find that the perpendicular length is $$20/\\sqrt{5}$$. The answer choices show $$4\\sqrt{5}$$. Why do you need to multiply numerator and denominator by $$\\sqrt{5}$$ to match the format, and does this change the numerical value? (2 steps)", "answer": "- Step 1: Rationalising the denominator means rewriting $$\\frac{20}{\\sqrt{5}}$$ as $$\\frac{20\\sqrt{5}}{\\sqrt{5}\\cdot\\sqrt{5}} = \\frac{20\\sqrt{5}}{5}$$. The operation multiplies the fraction by $$\\frac{\\sqrt{5}}{\\sqrt{5}} = 1$$, so the value does **not** change.\n- Step 2: ESAT answer options often express surds in simplest form with integer denominators, so $$\\frac{20\\sqrt{5}}{5}$$ simplifies to $$4\\sqrt{5}$$. Failing to rationalise might leave you with a numerically correct but unrecognisable form, costing precious time matching options.", "source": "DeepSeek ②", "_id": "deepseek_2_4"}, {"question": "To find the distance from a corner of a 3D unit cube to the center of the opposite face, why is it conceptually necessary to use Pythagoras' theorem twice, and what does the intermediate hypotenuse represent in physical space? (3 steps)", "answer": "- Step 1: Pythagoras' theorem ($$a^2 + b^2 = c^2$$) only works on 2D planes. A diagonal moving through 3D space does not lie on any single face of the cube.\n- Step 2: We must construct a 2D plane that cuts through the inside of the cube. This plane is a right-angled triangle where the vertical leg is the height of the cube, and the horizontal leg is a line drawn flat across the floor of the cube.\n- Step 3: The intermediate hypotenuse represents that line drawn flat across the floor. You must use Pythagoras the first time to find the length of this floor-line, and then use Pythagoras a second time (using the floor-line and the height) to find the true 3D diagonal.", "source": "Gemini 2.5 ①", "_id": "gemini_1_6"}, {"question": "When subtracting a semicircular cutout from a square to find the remaining area, what is the most common mathematical trap, and how does it distort the final algebraic expression? (2 steps)", "answer": "- Step 1: The trap is forgetting the $$\\frac{1}{2}$$ factor and writing the subtracted area as $$\\pi r^2$$ (a full circle) instead of $$\\frac{1}{2}\\pi r^2$$.\n- Step 2: This distortion carries entirely through the algebra. \n+ Correct: $$m^2 - \\frac{1}{2}\\pi(\\frac{m}{2})^2 \\implies m^2(1 - \\frac{\\pi}{8}) \\implies m^2(\\frac{8-\\pi}{8})$$. This leaves an $$(8-\\pi)$$ in the denominator of the answer.\n+ Incorrect: $$m^2 - \\pi(\\frac{m}{2})^2 \\implies m^2(1 - \\frac{\\pi}{4}) \\implies m^2(\\frac{4-\\pi}{4})$$. This leaves a $$(4-\\pi)$$ in the denominator, which is a deliberately planted distractor option on the exam.", "source": "Gemini 2.5 ②", "_id": "gemini_2_1"}, {"question": "If a square has a piece cut out of it, and you must choose between multiple-choice side length expressions containing $$(8-\\pi)$$ or $$(8+\\pi)$$ in the denominator, how can you conceptually eliminate one without doing the algebra? (3 steps)", "answer": "- Step 1: Look at the physical reality of the problem: material is being *removed* from the square, so the remaining area is smaller than a full square.\n- Step 2: If the denominator contained $$(8+\\pi)$$, it would be a larger number than $$(8-\\pi)$$. Dividing by a larger number results in a *smaller* overall side length for a given area.\n+ Conversely, dividing by $$(8-\\pi)$$ yields a larger side length, which compensates for the fact that a chunk of the square is missing.\n- Step 3: Because material is subtracted, the algebraic equation must feature a minus sign (e.g., $$m^2 - \\text{cutout} = \\text{Area}$$). This subtraction naturally carries through to the denominator when rearranged, making $$(8-\\pi)$$ the logically consistent choice.", "source": "Gemini 2.5 ①", "_id": "gemini_1_2"}, {"question": "When calculating clock angles, what geometric edge case occurs if the formula $$\\theta = |30H - 5.5M|$$ yields a result like $$250^\\circ$$, and how do you resolve it? (2 steps)", "answer": "- Step 1: The edge case is that you have calculated the *reflex angle* (the long way around the outside of the hands) rather than the interior angle. \n- Step 2: Standard convention for \"the angle between two hands\" implies the shortest distance, which must be $$\\le 180^\\circ$$. To resolve it, simply subtract your result from a full circle: $$360^\\circ - 250^\\circ = 110^\\circ$$.", "source": "Gemini 2.5 ②", "_id": "gemini_2_11"}, {"question": "When solving problems where the mean of a group changes after adding new members, why is it conceptually essential to convert the given means into \"total sums\" ($$\\Sigma = n\\bar{x}$$) rather than trying to average the old mean and the new members' mean directly? (2 steps)", "answer": "- Step 1: The mean is an *intensive* property; it does not scale with the size of the group. You cannot simply average two means (e.g., $$\\frac{\\text{old mean} + \\text{new mean}}{2}$$) because this ignores the *weight* (number of people) of each group. A mean of 20 for a group of 2 people has a vastly different impact on the total than a mean of 20 for a group of 100 people.\n- Step 2: The total sum ($$\\Sigma$$) is an *extensive* property; it is additive. By converting means to sums ($$\\Sigma = n\\bar{x}$$), you translate the problem into absolute quantities. You can then simply subtract the old sum from the new sum to find the exact total contribution of the new members, bypassing the weighting problem entirely.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "A square of side $$4$$ has a semicircle cut out from one side (diameter = $$4$$). Without calculating the exact decimal, what is the exact expression for the remaining area, and which is larger: the remaining area or the cutout area? (2 steps)", "answer": "- Step 1: The square area is $$4^2 = 16$$. The semicircle has radius $$r = 2$$, so its area is $$\\frac{1}{2}\\pi(2^2) = 2\\pi$$. The exact expression for the remaining area is $$16 - 2\\pi$$.\n- Step 2: To compare them mentally, approximate $$\\pi \\approx 3.14$$. The cutout area is $$2 \\times 3.14 = 6.28$$. The remaining area is $$16 - 6.28 = 9.72$$. Since $$9.72 > 6.28$$, the remaining metal area is larger than the cutout area.\n\nThis mental check confirms that the semicircle takes up less than half the square (since $$\\frac{\\pi}{8} \\approx \\frac{3.14}{8} < 0.5$$).", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "You are given that Q : R = 5 : 2 and R : S = 3 : 10. Why must you adjust the ratios so that the **R** portion is the same number in both before combining them? (3 steps)", "answer": "- Step 1: A ratio like Q : R = 5 : 2 means Q is 5 parts and R is 2 parts *for some common unit*. Similarly, R : S = 3 : 10 means R is 3 parts and S is 10 parts *for a different unit*.\n- Step 2: To combine into a single three‑way ratio Q : R : S, you need the R value to represent the same number of identical parts. Find a common multiple of the two R numbers (2 and 3 → LCM 6). Scale the first ratio by 3: Q : R = 15 : 6; scale the second by 2: R : S = 6 : 20.\n- Step 3: Now R = 6 in both, so Q : R : S = 15 : 6 : 20. The required Q : S is then 15 : 20, which simplifies to 3 : 4. If you skip scaling the R values, you get the mismatched units and may mistakenly think Q : S = 5 : 10 = 1 : 2, not the correct 3 : 4.", "source": "DeepSeek ②", "_id": "deepseek_2_7"}, {"question": "A room is $$3$$m wide, $$4$$m long, and $$12$$m high. What is the length of the longest straight pole that can fit inside (the body diagonal)? (2 steps)", "answer": "- Step 1: Calculate the diagonal across the floor using the 3-4-5 Pythagorean triple: $$d_{\\text{floor}} = \\sqrt{3^2 + 4^2} = 5$$m.\n- Step 2: Use the floor diagonal and the height to find the body diagonal. This forms a new right triangle with legs $$5$$ and $$12$$. Recognising the 5-12-13 Pythagorean triple, the body diagonal is exactly $$13$$m.\n\nMemorising common Pythagorean triples (3-4-5, 5-12-13, 8-15-17) allows you to solve 3D Pythagoras problems entirely in your head.", "source": "Qwen 3 ①", "_id": "qwen_1_16"}, {"question": "If a group of 20 people has a mean age of 28, and 2 new people join causing the mean to increase by 2, what are the two common mathematical traps students fall into when calculating the new sum? (2 steps)", "answer": "- Step 1: The \"New Mean\" trap: Students forget to increment the mean. They calculate the new sum as $$n \\times 28$$ instead of $$n \\times (28+2) = n \\times 30$$.\n- Step 2: The \"New Count\" trap: Students forget that the population size changed. They calculate the new sum as $$20 \\times 30$$ instead of $$(20+2) \\times 30 = 22 \\times 30 = 660$$.", "source": "Gemini 2.5 ②", "_id": "gemini_2_13"}, {"question": "To find the distance from a vertex of a unit cube to the center of the opposite face, why can we not simply use the 3D body diagonal formula $$\\sqrt{1^2+1^2+1^2}$$, and how must the path be conceptually broken down into two 2D Pythagorean steps? (3 steps)", "answer": "- Step 1: The body diagonal formula $$\\sqrt{x^2+y^2+z^2}$$ calculates the distance to the *opposite vertex* (coordinates $$1,1,1$$). The center of the opposite face is at coordinates $$(1, 0.5, 0.5)$$, meaning the displacements in the $$y$$ and $$z$$ directions are only half a unit, not a full unit.\n- Step 2: The first 2D step calculates the diagonal across the base face to the point directly beneath the target. Using the full length in one direction ($$1$$) and half length in the other ($$0.5$$), the base diagonal is $$\\sqrt{1^2 + 0.5^2} = \\sqrt{1.25}$$.\n- Step 3: The second 2D step uses this base diagonal and the vertical rise to the face center ($$0.5$$). The final distance is $$\\sqrt{(\\sqrt{1.25})^2 + 0.5^2} = \\sqrt{1.25 + 0.25} = \\sqrt{1.5} = \\frac{\\sqrt{6}}{2}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "In the clock angle problem, at what time between 9 and 10 o'clock are the hands exactly coincident (angle 0°)? (2 steps)", "answer": "- Step 1: Let the time be 9:M. The hour hand position = 270 + 0.5M. Minute hand = 6M. Set equal: 270 + 0.5M = 6M ⇒ 270 = 5.5M ⇒ M = 270/5.5 = 540/11 ≈ 49.09 minutes.\n- Step 2: So at approximately 9:49:05, the hands overlap. This is a nice extension: the hands are not together at 9:45; they meet later. This reinforces the continuous motion concept.", "source": "DeepSeek ①", "_id": "deepseek_1_33"}, {"question": "At 9:45, why is the angle between the clock hands **not** 0° even though both hands appear to be near the 9 mark? (2 steps)", "answer": "- Step 1: The minute hand moves strictly in discrete 6° jumps each minute, so at 45 minutes it points exactly at the 9 (270° from 12).\n- Step 2: The hour hand moves **continuously** as time passes, not jumping from number to number. At 9:00 it is at exactly 9 (270°). By 9:45, 45 minutes (i.e., 3/4 of an hour) have elapsed. The hour hand moves 0.5° per minute, so in 45 minutes it advances 22.5°, reaching 292.5°. The difference is 292.5° − 270° = 22.5°, **not** 0°.", "source": "DeepSeek ②", "_id": "deepseek_2_9"}, {"question": "A running club has an original mean age of 28 for 20 members. Two new members join, raising the mean to exactly 30. Without computing the sum of the new members' ages, explain qualitatively why their mean age must be greater than 30. (2 steps)", "answer": "- Step 1: The original mean is 28. To raise the overall mean to 30, the new members must pull the average upward. The magnitude of increase in the overall mean depends on both the extra total age they contribute and the size of the group after they join.\n- Step 2: If the new members' mean age were exactly 30, adding them would leave the overall mean unchanged at 28 (since 30 is above 28 but only partially; actually if new mean = 30, the new weighted average would be between 28 and 30, not 30). To shift the mean all the way to 30, the new members' mean must exceed 30 — specifically, the extra total from the two members must cover the deficit of 2 years per original member (2×20 = 40) plus provide the extra 2 years for each new member as well. Solving exactly yields 50, but the conceptual point is that the new mean must be substantially higher than the new overall mean.", "source": "DeepSeek ②", "_id": "deepseek_2_13"}, {"question": "When a problem involves a semicircle, why does it matter whether the straight edge of the semicircle is counted as part of the \"area removed\"? Does the ESAT problem consider area only or perimeter? (1 step)", "answer": "- Step 1: The problem asks for remaining **area**. The semicircular cut implies the area of the semicircle is removed; the straight edge is just the boundary of the cut. The area formula uses only the circular part — the flat side doesn’t affect area calculation. However, be attentive: if a question asked for *perimeter* of the remaining shape, you would need to account for the straight cut edge and the arc length.", "source": "DeepSeek ②", "_id": "deepseek_2_24"}, {"question": "Without using the formula, conceptually determine the exact angle between the hands at 6:30. Explain why it is not $$180^\\circ$$. (2 steps)", "answer": "- Step 1: At 6:30, the minute hand is pointing exactly at the 6, which is the $$180^\\circ$$ position.\n- Step 2: The hour hand does not sit exactly on the 6. Because 30 minutes is exactly half an hour, the hour hand has moved halfway between the 6 and the 7. Since the distance between 6 and 7 is $$30^\\circ$$, the hour hand has moved $$15^\\circ$$ past the 6. Therefore, the angle between the minute hand (at the 6) and the hour hand ($$15^\\circ$$ past the 6) is exactly $$15^\\circ$$. It is not $$180^\\circ$$ because that would only occur at exactly 6:00.", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "In the context of the ESAT exam, why is inspecting the multiple-choice options *before* starting algebraic manipulation a critical time-saving strategy, particularly for geometry problems involving variables like radius $$r$$ and side length $$m$$?", "answer": "Inspecting the options allows you to reverse-engineer the required final form of your answer. If a problem gives you a radius $$r$$ but all five multiple-choice options are expressed in terms of the square's side length $$m$$, you immediately know you must substitute $$r = \\frac{m}{2}$$ at the very beginning of your algebra. If you fail to check the options and solve for $$r$$, you will waste precious time trying to algebraically manipulate your final answer to match the options, or worse, panic when your correct numerical answer doesn't visually match any of the choices.", "source": "Qwen 3 ②", "_id": "qwen_2_14"}, {"question": "Derive the angular speed (in degrees per minute) of both the minute hand and the hour hand on a standard 12-hour clock. (3 steps)", "answer": "- Step 1: A full circle is $$360^\\circ$$. \n- Step 2: The minute hand completes one full circle in 60 minutes. \n+ Speed = $$\\frac{360^\\circ}{60 \\text{ min}} = 6^\\circ \\text{ per minute}$$.\n- Step 3: The hour hand completes one full circle in 12 hours (which is $$12 \\times 60 = 720$$ minutes).\n+ Speed = $$\\frac{360^\\circ}{720 \\text{ min}} = 0.5^\\circ \\text{ per minute}$$.", "source": "Gemini 2.5 ①", "_id": "gemini_1_11"}, {"question": "Conceptually, why must the area of a semicircle cut from a square's edge be calculated as $$\\frac{1}{2}\\pi r^2$$ rather than $$\\pi r^2$$, and what is the geometric and algebraic consequence of forgetting the $$\\frac{1}{2}$$ factor when finding the remaining area of the square?", "answer": "A semicircle is exactly half of a full circle, so its area is inherently half of $$\\pi r^2$$. Geometrically, forgetting the $$\\frac{1}{2}$$ factor means you are subtracting the area of a *full* circle from the square, which removes far more material than actually exists. Algebraically, if the square side is $$m$$ and radius is $$\\frac{m}{2}$$, using the full circle area yields $$m^2 - \\pi(\\frac{m}{2})^2 = m^2(1 - \\frac{\\pi}{4})$$, leading to a denominator of $$4-\\pi$$. Using the correct semicircle area yields $$m^2 - \\frac{1}{2}\\pi(\\frac{m}{2})^2 = m^2(1 - \\frac{\\pi}{8})$$, leading to the correct denominator of $$8-\\pi$$. This factor of $$2$$ is the most common trap in such geometry problems.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "In the 3D Pythagoras problem, why is it essential to correctly identify the coordinates of the face midpoint? What would happen if you mistakenly used the midpoint of an edge? (2 steps)", "answer": "- Step 1: The face midpoint has two coordinates at 0.5 and one at 0 or 1 (depending on the face). An edge midpoint would have one coordinate 0.5 and two at 0 or 1, e.g., (1, 0.5, 0). That's a different point, giving a different distance.\n- Step 2: For the edge midpoint (1,0.5,0), distance = $$\\sqrt{1^2+0.5^2+0^2} = \\sqrt{1.25} \\approx 1.118$$, not $$\\sqrt{1.5}$$. So careful reading of \"midpoint of a face\" vs \"midpoint of an edge\" is crucial.", "source": "DeepSeek ①", "_id": "deepseek_1_36"}, {"question": "In the ratio problem, if the ratio Q:R were given as 5:2 and R:S as 3:10, what would be the ratio Q:S if, instead of combining, you multiplied the ratios directly? Why is that incorrect? (2 steps)", "answer": "- Step 1: Multiplying the corresponding terms: (5×3) : (2×10) = 15:20 = 3:4. That actually gives the correct Q:S in this case? Wait, careful: The operation to get Q:S from Q:R and R:S is to multiply the ratios in the sense that Q/S = (Q/R) × (R/S). So (5/2) × (3/10) = 15/20 = 3/4. So multiplying the fractions directly works! But you must interpret it as fractions, not as term-by-term multiplication of the ratio notation. The common mistake is to think you can just multiply the numbers across without considering the 'R' cancels. The vertical alignment method is safer and avoids fraction multiplication errors.\n- Step 2: The vertical method makes the cancellation explicit by equalising the middle term.", "source": "DeepSeek ①", "_id": "deepseek_1_34"}, {"question": "Conceptually, why does the hour hand on an analog clock not remain stationary at the exact hour mark (e.g., exactly on the 9 at 9:45), and how does this continuous movement mathematically affect the angle calculation compared to a discrete jump model? (2 steps)", "answer": "- Step 1: Mechanically, the hour and minute hands are linked by gears. As the minute hand completes a full $$360^\\circ$$ revolution, it physically drives the hour hand forward by one hour mark ($$\\frac{1}{12}$$ of a circle, or $$30^\\circ$$). Therefore, the hour hand moves continuously and proportionally to the minutes passed.\n- Step 2: Mathematically, this means the hour hand's position is not just $$30 \\times H$$, but $$30 \\times H + 0.5 \\times M$$. At 9:45, a discrete model would place the hour hand at exactly $$270^\\circ$$, yielding a $$0^\\circ$$ angle with the minute hand. The continuous model correctly places it $$75\\%$$ of the way to the 10 ($$270^\\circ + 22.5^\\circ = 292.5^\\circ$$), yielding the true angle of $$22.5^\\circ$$.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "In the mean problem, if the original mean is 28 and two new members join, why can't we simply say the new members' mean age must be 28 + something? What is the correct way to think about the \"extra\" sum contributed? (3 steps)", "answer": "- Step 1: The new mean is 30, which is 2 higher than the original 28. But the two new members are only 2 out of 22 total members. Their ages must pull the average of all 22 up by 2.\n- Step 2: The total sum increase needed is 22 × 2 = 44 (since the mean increase of 2 applies to all 22 members). However, careful: the original sum was 20×28=560. New sum 22×30=660, increase = 100. That's the combined age of the two new members.\n- Step 3: So their mean is 50. The intuitive leap is that the new members are much older than 28, not just 30, because they have to compensate for the fact that they are only two people lifting the average of 22. The \"extra\" per new member is (increase in total sum)/(number of new members) = 100/2 = 50.", "source": "DeepSeek ①", "_id": "deepseek_1_16"}, {"question": "In the mean problem, if instead of two new members, one member left and the mean increased by 2, how would you set up the equation? (2 steps)", "answer": "- Step 1: Original: 20 members, mean 28, total sum = 560. After one leaves, 19 members, new mean = 30. So new total sum = 19 × 30 = 570.\n- Step 2: The sum increased by 10 despite one person leaving, which means the person who left had age 560 + x? Wait, careful: The new sum is the old sum minus the age of the leaver. So 560 - age = 570? That's impossible if age is positive. Actually, if mean increases when someone leaves, the leaver must be younger than the mean. Let's compute: 560 - L = 19×30 = 570 ⇒ L = -10, impossible. So this scenario is impossible with positive ages. This illustrates that adding older members increases mean; removing younger members also increases mean. The conceptual point: you must set up the equation correctly based on the event.", "source": "DeepSeek ①", "_id": "deepseek_1_22"}, {"question": "When identifying similar triangles formed by an altitude to the hypotenuse, why is it conceptually safer to use the \"Two-Area Trick\" rather than relying on visual scale factors, and if you must use scale factors, how do you rigorously determine the correct ratio without mixing up corresponding sides? (2 steps)", "answer": "- Step 1: Visual scale factors are highly prone to error because the sub-triangles are rotated and reflected relative to the main triangle. This spatial disorientation makes it easy to mismatch the \"short leg\" of one triangle with the \"long leg\" of another. The Two-Area Trick bypasses this entirely by relying purely on scalar area invariance.\n- Step 2: If you must use scale factors, you must rigorously map the sides by their *opposite angles*, not by their visual orientation. The side opposite the shared angle in the large triangle corresponds to the side opposite that exact same angle in the sub-triangle. The ratio of these specific corresponding sides gives the true, error-free scale factor.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "When calculating the angle between clock hands at 9:45, a common intuitive mistake is to assume the hour hand is exactly on the 9. Conceptually, why is this false, and how does the hour hand actually behave? (2 steps)", "answer": "- Step 1: The assumption treats the clock like a digital display that \"jumps\" from 9 to 10 only when the hour changes. \n- Step 2: Conceptually, analog clock hands are geared together and move in continuous, proportional motion. As the minute hand completes its 60-minute sweep, the hour hand slowly sweeps through the $$30^\\circ$$ gap between 9 and 10. At 45 minutes, the hour hand has completed exactly $$\\frac{3}{4}$$ of its journey toward the 10.", "source": "Gemini 2.5 ①", "_id": "gemini_1_10"}, {"question": "A right triangle has legs $$3$$ and $$4$$. Use the \"Two-Area Trick\" to mentally calculate the altitude to the hypotenuse. (2 steps)", "answer": "- Step 1: First, find the hypotenuse using the Pythagorean triple: $$c = \\sqrt{3^2 + 4^2} = 5$$. Calculate the area using the legs: $$\\text{Area} = \\frac{1}{2}(3)(4) = 6$$.\n- Step 2: Set up the second area equation using the hypotenuse and altitude $$h$$: $$\\text{Area} = \\frac{1}{2}(5)(h) = 6$$. This simplifies to $$5h = 12$$, so $$h = \\frac{12}{5} = 2.4$$.\n\nThe Two-Area trick turns a potentially messy similar-triangle ratio problem into a simple mental division.", "source": "Qwen 3 ①", "_id": "qwen_1_15"}, {"question": "How is the 3D Pythagoras theorem ($$d = \\sqrt{x^2+y^2+z^2}$$) derived from the 2D version, and why does finding the distance to a *face midpoint* require a modified application compared to a *body diagonal*? (3 steps)", "answer": "- Step 1: The 3D theorem is just two successive applications of 2D Pythagoras. First, find the diagonal across the base rectangle: $$d_{\\text{base}} = \\sqrt{x^2 + y^2}$$. Then, use this base diagonal and the vertical height $$z$$ to find the full space diagonal: $$d = \\sqrt{d_{\\text{base}}^2 + z^2} = \\sqrt{x^2 + y^2 + z^2}$$.\n- Step 2: A \"body diagonal\" travels from one corner of the cuboid to the exact opposite corner, meaning it traverses the full length of all three dimensions ($$x, y, z$$).\n- Step 3: A line to a \"face midpoint\" stops at the centre of one of the faces. This means it traverses the full length of two dimensions, but only *half* the length of the third dimension (e.g., $$z/2$$). The formula modifies to $$d = \\sqrt{x^2 + y^2 + \\left(\\frac{z}{2}\\right)^2}$$.\n\nThe critical conceptual check is always to ask: \"Does the line go all the way to the opposite corner, or does it stop halfway along one of the axes?\"", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "The mean age of 4 people is 10. A 5th person joins, and the new mean age becomes 12. Conceptually, how much \"extra\" age did the 5th person bring to the group, and what is their exact age? Walk through the sum differences. (3 steps)", "answer": "- Step 1: Calculate the original total sum of ages. With 4 people and a mean of 10, the original sum is $$4 \\times 10 = 40$$.\n- Step 2: Calculate the new total sum of ages. With 5 people and a new mean of 12, the new sum is $$5 \\times 12 = 60$$.\n- Step 3: The 5th person's exact age is the difference between the new sum and the old sum: $$60 - 40 = 20$$. Conceptually, the 5th person had to bring enough age to cover their own share of the new mean ($$12$$) *plus* an extra $$2$$ years for each of the 4 original people to raise their mean from 10 to 12 ($$12 + 4 \\times 2 = 20$$).", "source": "Qwen 3 ②", "_id": "qwen_2_13"}, {"question": "If a square with a semicircular cutout (diameter = side) is scaled up by a linear factor of $$k$$, how does the remaining area scale, and why does the algebraic expression for the side length inherently contain a square root? (2 steps)", "answer": "- Step 1: Area is a 2-dimensional property. If the linear dimensions (side length) are scaled by $$k$$, the area scales by $$k^2$$. If the original remaining area is $$A$$, the new area is $$k^2 A$$.\n- Step 2: The side length $$m$$ is a 1-dimensional property. Since the area equation is fundamentally of the form $$m^2 \\times (\\text{constant}) = \\text{Area}$$, solving for the 1D side length $$m$$ requires taking the square root of the area. This is why the correct multiple-choice options for side length always feature a $$\\sqrt{}$$ symbol encompassing the area value.\n\nDimensional analysis is a powerful tool: if you are solving for a length, the answer must have the dimensions of $$\\sqrt{\\text{Area}}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_12"}, {"question": "The shortcut formula for the angle between clock hands is $$\\theta = |30H - 5.5M|$$. Conceptually break down where the $$30H$$ and the $$-5.5M$$ come from based on the angular speeds of the hands. (4 steps)", "answer": "- Step 1: Position everything relative to the 12 o'clock mark ($$0^\\circ$$).\n- Step 2: The minute hand moves at $$6^\\circ/\\text{min}$$. So at minute $$M$$, its position is $$6M$$.\n- Step 3: The hour hand starts at a base position depending on the hour $$H$$. Each hour mark is $$30^\\circ$$ apart (since $$360/12 = 30$$). So at hour $$H$$, its base position is $$30H$$. However, it also creeps forward by $$0.5^\\circ$$ for every minute $$M$$ that passes. Its true position is $$30H + 0.5M$$.\n- Step 4: The angle between them is the difference between their positions: \n+ $$\\text{Difference} = |(30H + 0.5M) - 6M|$$\n+ $$\\text{Difference} = |30H - 5.5M|$$", "source": "Gemini 2.5 ①", "_id": "gemini_1_12"}, {"question": "In a mean problem where a group's mean increases after new members join, what is the specific algebraic trap regarding the denominator, and how does it lead to a distractor answer? (2 steps)", "answer": "- Step 1: The trap occurs when calculating the *new* total sum. Students often multiply the *new mean* by the *original* group size $$n$$, instead of the *new* group size $$n + k$$ (where $$k$$ is the number of new members).\n- Step 2: This error artificially deflates the new total sum. When you subtract the original sum to find the sum of the new members, the result is too low, yielding an incorrectly low mean for the new members. Exam writers deliberately calculate this exact wrong value and include it as a distractor option (e.g., getting $$20$$ instead of the correct $$50$$).\n\nAlways explicitly write down the new count $$n_{\\text{new}} = n_{\\text{old}} + \\text{added members}$$ before doing any multiplication.", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "If a right triangle has legs $$a$$ and $$b$$, and hypotenuse $$c$$, what is the ratio of the areas of the two sub-triangles formed by the altitude to the hypotenuse, and how does this relate to the original legs? (3 steps)", "answer": "- Step 1: As established, dropping the altitude creates two sub-triangles that are similar to each other and to the original triangle.\n- Step 2: The ratio of the corresponding sides of these two sub-triangles is exactly the ratio of the legs of the original triangle, which is $$a : b$$. (Specifically, the hypotenuse of the smaller sub-triangle is $$a$$, and the hypotenuse of the larger is $$b$$).\n- Step 3: For any similar 2D shapes, the ratio of their areas is the square of the ratio of their corresponding lengths. Therefore, the ratio of the areas of the two sub-triangles is $$a^2 : b^2$$.\n\nThis is a beautiful geometric synthesis: the altitude splits the original triangle's area into two pieces whose ratio is simply the squares of the original legs.", "source": "Qwen 3 ①", "_id": "qwen_1_13"}, {"question": "When calculating the distance from a vertex of a unit cube to the midpoint of the opposite face, a common error is to assume the distance is simply $$\\sqrt{3}$$. Conceptually, what physical path does $$\\sqrt{3}$$ actually represent, and why is it a trap? (2 steps)", "answer": "- Step 1: In a unit cube, $$\\sqrt{3}$$ is the length of the \"body diagonal\"—the line connecting a vertex to the absolute opposite vertex at the far corner of the cube (since $$d = \\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3}$$).\n- Step 2: The trap occurs because students memorize $$\\sqrt{3}$$ as \"the 3D Pythagoras answer for a cube.\" However, the question asks for the distance to the *midpoint of a face*, meaning one of the coordinate distances traveled is only $$\\frac{1}{2}$$, not $$1$$.", "source": "Gemini 2.5 ①", "_id": "gemini_1_7"}, {"question": "When combining two ratios $$A:B$$ and $$B:C$$ into a single ratio $$A:B:C$$, why is it mathematically necessary to scale *both* terms of each ratio by a multiplier, and what specific logical error occurs if a student only scales the $$B$$ term in the second ratio to match the first? (2 steps)", "answer": "- Step 1: A ratio represents a fixed relative proportion between two quantities. If $$B:C$$ is $$3:10$$, it means for every $$3$$ units of $$B$$, there are exactly $$10$$ units of $$C$$. Scaling the ratio means you are zooming in or out on this relationship while preserving the proportion.\n- Step 2: If a student only scales the $$B$$ term (e.g., multiplying $$B$$ by $$2$$ to get $$6$$) but leaves $$C$$ as $$10$$, they destroy the fundamental proportion. The new ratio $$6:10$$ implies a different relationship ($$3:5$$) than the original $$3:10$$. You must multiply *both* terms by the same scalar to maintain the true relative size of $$C$$ with respect to $$A$$.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "Why does the altitude from the right angle to the hypotenuse always equal the geometric mean of the two segments into which the altitude divides the hypotenuse? Is that fact used in the ESAT solution given in the notes? (2 steps)", "answer": "- Step 1: In a right triangle, the altitude is the geometric mean of the two hypotenuse segments, $$h^2 = d \\cdot e$$, because the two smaller triangles are similar to each other and to the original, leading to the proportion $$\\frac{d}{h} = \\frac{h}{e}$$. This is a known property.\n- Step 2: The lesson did **not** use this property; it used either similarity ratios directly or the two‑area method. Both are more straightforward and less error‑prone than solving for hypotenuse segments. The two‑area method bypasses any segment lengths entirely, which is why it's recommended.", "source": "DeepSeek ②", "_id": "deepseek_2_19"}, {"question": "Suppose the original group had mean 28, and after two new members joined the mean stayed at 28. What can you deduce about the mean age of the two new members? (2 steps)", "answer": "- Step 1: If the mean remains unchanged, the extra total contributed by the new members must exactly balance the effect of increasing the denominator. Setting new mean = old mean, we have $$\\frac{20 \\cdot 28 + 2x}{22} = 28$$.\n- Step 2: Subtract 28×20 from both sides: $$2x = 28 \\times 2 \\Rightarrow x = 28$$. Thus the two new members also have mean age 28. This is intuitive: if they’re exactly at the average, the mean doesn’t shift. If they’re above 28, the mean rises; if below, it falls. This is a quick reasonableness check.", "source": "DeepSeek ②", "_id": "deepseek_2_15"}, {"question": "In the ratio problem, if the given ratios were Q:R = 5:2 and R:S = 3:10, can you find Q:R:S directly without scaling? (2 steps)", "answer": "- Step 1: Yes, by representing Q and S in terms of R. Q = (5/2)R, S = (10/3)R. Then Q:R:S = (5/2)R : R : (10/3)R. Multiply by 6 to clear denominators: 15R : 6R : 20R → 15:6:20.\n- Step 2: This fractional method is another valid approach, but the vertical alignment method is often quicker and less error-prone for many students.", "source": "DeepSeek ①", "_id": "deepseek_1_39"}, {"question": "The remaining area after cutting out a semicircle of radius $$m/2$$ from a square of side $$m$$ is $$100$$. Without doing detailed algebra, how would you qualitatively decide whether the answer option with denominator $$8+\\pi$$ is immediately wrong? (2 steps)", "answer": "- Step 1: The remaining area is $$m^2 - \\frac{1}{2}\\pi r^2$$. After substituting $$r = m/2$$, that becomes $$m^2 - \\frac{\\pi m^2}{8} = m^2\\!\\left(1 - \\frac{\\pi}{8}\\right)$$.\n- Step 2: Since $$1 - \\frac{\\pi}{8}$$ is positive ($$\\pi/8 \\approx 0.39$$), the equation $$m^2(8-\\pi)/8 = 100$$ yields a divisor of $$8-\\pi$$. A denominator like $$8+\\pi$$ would come from a sign error (adding areas instead of subtracting). The physical situation demands removal of area, so the denominator must contain a minus sign — elimination by physical reasoning.", "source": "DeepSeek ②", "_id": "deepseek_2_1"}, {"question": "When setting up an algebraic equation like $$m^2 - \\frac{1}{2}\\pi(\\frac{m}{2})^2 = 100$$, why is it strategically better to factor out $$m^2$$ immediately rather than expanding the terms and trying to isolate $$m$$ later? (3 steps)", "answer": "- Step 1: Expanding first creates messy fractions that obscure the relationship between the variable and the constant. \n- Step 2: By recognizing that $$m^2$$ is a common factor in both the square's area ($$m^2$$) and the semicircle's area (which scales with $$m^2$$), you can immediately separate the variable from the constants.\n- Step 3: Factoring yields $$m^2(1 - \\frac{\\pi}{8}) = 100$$. Now, the entire bracket is just a single constant scalar. You can divide 100 by this scalar in one clean move, drastically reducing the chance of arithmetic errors under time pressure.", "source": "Gemini 2.5 ②", "_id": "gemini_2_2"}, {"question": "In a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$, the altitude to the hypotenuse is $$h$$. Explain the conceptual basis of the \"Two-Area Trick\" ($$h = \\frac{ab}{c}$$) and why it is computationally faster than using similar triangle ratios. (2 steps)", "answer": "- Step 1: The area of a triangle is an invariant scalar quantity, regardless of which side you choose as the base. If you use the legs as base and height, the area is $$\\frac{1}{2}ab$$. If you rotate the triangle and use the hypotenuse as the base, the corresponding height is the altitude $$h$$, making the area $$\\frac{1}{2}ch$$.\n- Step 2: Equating the two area expressions ($$\\frac{1}{2}ab = \\frac{1}{2}ch$$) and solving for $$h$$ instantly yields $$h = \\frac{ab}{c}$$. This is computationally faster than using similar triangles because it bypasses the need to identify corresponding sides, determine scale factors, and set up proportions, reducing the entire process to a single multiplication and division.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "When an altitude is dropped from the right angle of a right-angled triangle to its hypotenuse, it creates two smaller triangles. Conceptually, why are these two smaller triangles guaranteed to be similar to the original large triangle and to each other? (3 steps)", "answer": "- Step 1: The original large triangle has a $$90^\\circ$$ angle and two acute angles, say $$\\alpha$$ and $$\\beta$$, where $$\\alpha + \\beta = 90^\\circ$$.\n- Step 2: Dropping the altitude creates two new right-angled triangles. The first sub-triangle shares the angle $$\\alpha$$ with the large triangle and has a new $$90^\\circ$$ angle (from the altitude), forcing its third angle to be $$\\beta$$. The second sub-triangle shares $$\\beta$$, has a $$90^\\circ$$ angle, and its third angle must be $$\\alpha$$.\n- Step 3: Because all three triangles (the large one and the two sub-triangles) possess the exact same set of three angles ($$90^\\circ, \\alpha, \\beta$$), they are similar by Angle-Angle (AA) similarity. This transitive similarity is the foundation for all altitude-to-hypotenuse theorems.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Why is $$7.5°$$ a plausible distractor for the clock angle at 9:45? What mistaken reasoning would produce that value? (2 steps)", "answer": "- Step 1: Someone might incorrectly think the hour hand moves only $$0.5° \\times 15 = 7.5°$$ from 9:00 to 9:45 (i.e., treating 45 minutes as 15 minutes’ worth of hour‑hand movement — confusing the minute count for hour count).\n- Step 2: More commonly, a student might calculate the angle as if the hour hand had only moved 7.5° because they used $$\\frac{15}{60}$$ of 30° (which is 7.5°) instead of $$\\frac{45}{60}$$ of 30° = 22.5°. They might mistakenly think the minute hand’s position corresponds to the fraction of hour passed, but incorrectly take the fraction as minutes past quarter rather than three‑quarters. This yields a small but wrong angle.", "source": "DeepSeek ②", "_id": "deepseek_2_11"}, {"question": "In a rectangular cuboid with dimensions $$x, y, z$$, what is the conceptual difference between the \"body diagonal\" and the \"face diagonal\", and how does the 3D Pythagorean theorem $$d = \\sqrt{x^2+y^2+z^2}$$ inherently account for both depending on which coordinates change?", "answer": "The \"body diagonal\" spans the entire interior of the 3D shape from one corner to the exact opposite corner, requiring a change in all three spatial dimensions ($$x, y,$$ and $$z$$). A \"face diagonal\" spans only across a single 2D surface of the cuboid, meaning there is zero displacement in the third dimension perpendicular to that face. The 3D Pythagorean theorem inherently accounts for both: if you are calculating a face diagonal on the $$xy$$-plane, the change in the $$z$$-direction is $$0$$, so the formula naturally collapses to $$d = \\sqrt{x^2+y^2+0^2} = \\sqrt{x^2+y^2}$$, seamlessly reducing to the standard 2D Pythagorean theorem.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "Why do standardised exams like the ESAT consistently present answers with rationalised denominators (e.g., $$4\\sqrt{5}$$ instead of $$\\frac{20}{\\sqrt{5}}$$), and what is the conceptual mathematical reason for preferring rationalised forms in pre-calculator eras? (2 steps)", "answer": "- Step 1: Mathematically, rationalising the denominator ensures a unique, canonical representation for expressions involving surds. Just as we reduce fractions to their simplest form ($$\\frac{2}{4} \\rightarrow \\frac{1}{2}$$), moving irrational numbers to the numerator standardises the format, making it easier to compare, add, or subtract expressions without ambiguity.\n- Step 2: Historically, before calculators, division was performed by hand. Dividing by an irrational number like $$\\sqrt{5} \\approx 2.236$$ requires long division with a messy decimal divisor. By rationalising to $$\\frac{20\\sqrt{5}}{5}$$, the calculation becomes multiplying by a known decimal ($$20 \\times 2.236$$) and then dividing by a clean integer ($$5$$), which is computationally much faster and less prone to arithmetic errors.", "source": "Qwen 3 ②", "_id": "qwen_2_15"}, {"question": "In a unit cube (side length 1), what is the conceptual difference between the \"body diagonal\" and the \"vertex-to-opposite-face-midpoint\" line, and how do their lengths compare qualitatively? (2 steps)", "answer": "- Step 1: The body diagonal goes from corner to opposite corner, traversing $$1$$ unit in all three perpendicular directions. Its length is $$\\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3} \\approx 1.732$$.\n- Step 2: The vertex-to-face-midpoint line goes from a corner to the centre of an opposite face. It traverses $$1$$ unit in two directions, but only $$0.5$$ units in the third direction. Its length is $$\\sqrt{1^2 + 1^2 + 0.5^2} = \\sqrt{2.25} = 1.5$$ (or $$\\frac{\\sqrt{6}}{2}$$).\n\nBecause the face midpoint line does not traverse the full length of the third dimension, it must be strictly shorter than the body diagonal ($$1.5 < 1.732$$). This inequality is a great sanity check when eliminating multiple-choice options.", "source": "Qwen 3 ①", "_id": "qwen_1_6"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Conceptually, why is the area of a semicircle $$\\frac{1}{2}\\pi r^2$$ and not $$\\pi r^2$$, and what is the most common algebraic trap when a semicircle is inscribed in a square of side $$m$$ such that its diameter equals the side length? (2 steps)", "answer": "- Step 1: A semicircle is exactly half of a full circle. The area of a full circle is $$\\pi r^2$$, so the semicircle area must be halved to $$\\frac{1}{2}\\pi r^2$$. Forgetting this $$\\frac{1}{2}$$ factor is the most common conceptual error.\n- Step 2: When the diameter equals the square's side $$m$$, the radius is $$r = \\frac{m}{2}$$. The algebraic trap is substituting $$m$$ directly for $$r$$ (giving $$\\frac{1}{2}\\pi m^2$$) or forgetting to square the denominator when substituting $$\\frac{m}{2}$$ (giving $$\\frac{1}{2}\\pi \\frac{m^2}{2}$$ instead of the correct $$\\frac{1}{2}\\pi \\frac{m^2}{4} = \\frac{\\pi m^2}{8}$$).\n\nThe core insight is to always explicitly write $$r = \\frac{\\text{diameter}}{2}$$ before substituting into the halved area formula.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "When solving for the side length $$m$$ of a square with a semicircular cutout (where the remaining area is $$A$$), why is it conceptually and procedurally superior to factor out $$m^2$$ immediately rather than expanding the terms? (2 steps)", "answer": "- Step 1: The equation for the remaining area is $$m^2 - \\frac{\\pi m^2}{8} = A$$. By factoring out $$m^2$$ immediately, we get $$m^2\\left(1 - \\frac{\\pi}{8}\\right) = A$$, which simplifies to $$m^2\\left(\\frac{8-\\pi}{8}\\right) = A$$.\n- Step 2: This approach keeps the algebra compact and avoids messy fractions or decimal approximations. It directly isolates $$m^2$$ as $$m^2 = \\frac{8A}{8-\\pi}$$, making the final square root step straightforward: $$m = \\sqrt{\\frac{8A}{8-\\pi}}$$. Expanding first often leads to arithmetic errors and makes it harder to match the simplified surd forms found in multiple-choice options.\n\nFactoring preserves the structural relationship between the geometric area and the squared side length.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When an altitude is dropped from the right angle of a right-angled triangle to its hypotenuse, why are the two newly formed sub-triangles similar to the original triangle and to each other? (3 steps)", "answer": "- Step 1: Identify the angles of the original right-angled triangle. Let the right angle be $$90^\\circ$$, and the other two acute angles be $$\\alpha$$ and $$\\beta$$. By the angle sum of a triangle, $$\\alpha + \\beta = 90^\\circ$$.\n- Step 2: Dropping the altitude creates two smaller triangles, each sharing one of the original acute angles ($$\\alpha$$ or $$\\beta$$) and each containing a new $$90^\\circ$$ angle created by the perpendicular altitude.\n  + The first sub-triangle has angles $$90^\\circ$$, $$\\alpha$$, and therefore its third angle must be $$\\beta$$.\n  + The second sub-triangle has angles $$90^\\circ$$, $$\\beta$$, and therefore its third angle must be $$\\alpha$$.\n- Step 3: Because all three triangles (the original and the two sub-triangles) share the exact same three angles ($$90^\\circ, \\alpha, \\beta$$), they are all similar by Angle-Angle (AA) similarity.\n\nThis geometric property is the foundation for all altitude-to-hypotenuse theorems and ratio calculations.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the \"Two-Area Trick\" conceptually bypass similar triangles to find the altitude $$h$$ to the hypotenuse $$c$$ of a right triangle with legs $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: The area of a triangle is an absolute physical quantity that doesn't change regardless of which side you designate as the \"base\". Using the legs as base and height, the area is $$\\text{Area} = \\frac{1}{2}ab$$.\n- Step 2: If you rotate your perspective and use the hypotenuse $$c$$ as the base, the corresponding perpendicular height is the altitude $$h$$. The area is also $$\\text{Area} = \\frac{1}{2}ch$$. Equating the two expressions gives $$\\frac{1}{2}ab = \\frac{1}{2}ch$$, which simplifies to $$ab = ch$$, and solving for the altitude yields $$h = \\frac{ab}{c}$$.\n\nThis trick is vastly faster on timed exams because it avoids setting up and solving similarity ratios entirely.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why do standardised exams like the ESAT require rationalising the denominator (e.g., converting $$\\frac{a}{\\sqrt{b}}$$ to $$\\frac{a\\sqrt{b}}{b}$$), and what is the conceptual justification for multiplying by $$\\frac{\\sqrt{b}}{\\sqrt{b}}$$? (2 steps)", "answer": "- Step 1: Historically and practically, rationalising the denominator standardises the format of answers, making them easier to compare, add, or compute without a calculator (since dividing by an irrational number like $$\\sqrt{5}$$ is mentally difficult, but dividing by an integer like $$5$$ is easy). Exam options are almost always presented in this standardised form.\n- Step 2: The conceptual justification is that $$\\frac{\\sqrt{b}}{\\sqrt{b}} = 1$$. Multiplying any expression by $$1$$ does not change its intrinsic mathematical value; it merely changes its \"clothing\" or representation. By multiplying the top and bottom by $$\\sqrt{b}$$, the denominator becomes $$\\sqrt{b} \\times \\sqrt{b} = b$$, moving the irrationality to the numerator.\n\nAlways rationalise at the very end of your working before scanning the multiple-choice options.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How is the 3D Pythagoras theorem ($$d = \\sqrt{x^2+y^2+z^2}$$) derived from the 2D version, and why does finding the distance to a *face midpoint* require a modified application compared to a *body diagonal*? (3 steps)", "answer": "- Step 1: The 3D theorem is just two successive applications of 2D Pythagoras. First, find the diagonal across the base rectangle: $$d_{\\text{base}} = \\sqrt{x^2 + y^2}$$. Then, use this base diagonal and the vertical height $$z$$ to find the full space diagonal: $$d = \\sqrt{d_{\\text{base}}^2 + z^2} = \\sqrt{x^2 + y^2 + z^2}$$.\n- Step 2: A \"body diagonal\" travels from one corner of the cuboid to the exact opposite corner, meaning it traverses the full length of all three dimensions ($$x, y, z$$).\n- Step 3: A line to a \"face midpoint\" stops at the centre of one of the faces. This means it traverses the full length of two dimensions, but only *half* the length of the third dimension (e.g., $$z/2$$). The formula modifies to $$d = \\sqrt{x^2 + y^2 + \\left(\\frac{z}{2}\\right)^2}$$.\n\nThe critical conceptual check is always to ask: \"Does the line go all the way to the opposite corner, or does it stop halfway along one of the axes?\"", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "In a unit cube (side length 1), what is the conceptual difference between the \"body diagonal\" and the \"vertex-to-opposite-face-midpoint\" line, and how do their lengths compare qualitatively? (2 steps)", "answer": "- Step 1: The body diagonal goes from corner to opposite corner, traversing $$1$$ unit in all three perpendicular directions. Its length is $$\\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3} \\approx 1.732$$.\n- Step 2: The vertex-to-face-midpoint line goes from a corner to the centre of an opposite face. It traverses $$1$$ unit in two directions, but only $$0.5$$ units in the third direction. Its length is $$\\sqrt{1^2 + 1^2 + 0.5^2} = \\sqrt{2.25} = 1.5$$ (or $$\\frac{\\sqrt{6}}{2}$$).\n\nBecause the face midpoint line does not traverse the full length of the third dimension, it must be strictly shorter than the body diagonal ($$1.5 < 1.732$$). This inequality is a great sanity check when eliminating multiple-choice options.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "When combining two ratios $$A:B$$ and $$B:C$$ into a single $$A:B:C$$ ratio, why must we find the Lowest Common Multiple (LCM) of the $$B$$ values, and what is the fatal error students make during this step? (3 steps)", "answer": "- Step 1: The variable $$B$$ represents the exact same absolute quantity in both ratios. To merge them, the scaled value of $$B$$ must be identical in both rows so they can \"link\" together. The LCM ensures we use the smallest possible integer scaling factors, keeping the numbers manageable.\n- Step 2: Once the LCM is found, you calculate the multiplier for each ratio (e.g., if $$B$$ is $$2$$ and $$3$$, LCM is $$6$$, so multipliers are $$\\times 3$$ and $$\\times 2$$).\n- Step 3: The fatal error is applying the multiplier *only* to the $$B$$ value to make it match, while forgetting to multiply the corresponding $$A$$ or $$C$$ value by the exact same factor. A ratio is a proportional relationship; scaling one part requires scaling the other to maintain the equivalence.\n\nAlways write the ratios vertically, circle the common term, and explicitly write the multiplier (e.g., $$\\times 3$$) next to the entire row.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is it conceptually incorrect to assume the hour hand points exactly at the hour number (e.g., exactly at 9) when the time is 9:45, and how far has it actually moved past the 9? (2 steps)", "answer": "- Step 1: Clock hands are physically linked gears; the hour hand moves continuously as the minutes pass, it does not \"jump\" discretely from hour to hour. Assuming it sits exactly on the 9 ignores the $$45$$ minutes of progress it has made toward the 10.\n- Step 2: The distance between any two hour marks is $$30^\\circ$$ (since $$360^\\circ / 12 = 30^\\circ$$). In $$60$$ minutes, the hour hand moves $$30^\\circ$$. In $$45$$ minutes (which is $$\\frac{3}{4}$$ of an hour), it moves $$\\frac{3}{4} \\times 30^\\circ = 22.5^\\circ$$ past the 9.\n\nThis continuous movement is the sole reason the angle at 9:45 is $$22.5^\\circ$$ and not $$0^\\circ$$.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How is the clock angle formula $$\\theta = |30H - 5.5M|$$ derived from the individual angular speeds of the hour and minute hands? (3 steps)", "answer": "- Step 1: Determine the speed of the minute hand. It covers $$360^\\circ$$ in $$60$$ minutes, so its speed is $$\\frac{360}{60} = 6^\\circ$$ per minute. Its position from 12 o'clock is $$6M$$.\n- Step 2: Determine the speed of the hour hand. It covers $$360^\\circ$$ in $$12$$ hours ($$720$$ minutes), so its speed is $$\\frac{360}{720} = 0.5^\\circ$$ per minute. Its position from 12 o'clock is $$30H + 0.5M$$ (the starting hour position plus the continuous minute movement).\n- Step 3: The angle between them is the absolute difference of their positions: $$\\theta = |(30H + 0.5M) - 6M|$$. Combining the $$M$$ terms gives $$\\theta = |30H - 5.5M|$$.\n\nThis formula elegantly packages the continuous movement of both hands into a single, fast calculation.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Conceptually, why is it more robust to translate \"mean\" problems into \"total sum\" ($$\\Sigma = n\\bar{x}$$) rather than trying to work directly with the averages, especially when group sizes change? (2 steps)", "answer": "- Step 1: A mean is an \"intensive\" property (a ratio) that does not add linearly. You cannot simply add two means together to get a combined mean. However, a total sum is an \"extensive\" property that *does* add linearly.\n- Step 2: By converting all given means into total sums using $$\\Sigma = n \\times \\text{mean}$$, you can simply add or subtract the sums when members join or leave. This avoids the conceptual trap of trying to calculate weighted averages on the fly and reduces the problem to basic addition and subtraction.\n\nAlways treat the mean as just a \"disguised sum\" waiting to be unpacked.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "In a mean problem where a group's mean increases after new members join, what is the specific algebraic trap regarding the denominator, and how does it lead to a distractor answer? (2 steps)", "answer": "- Step 1: The trap occurs when calculating the *new* total sum. Students often multiply the *new mean* by the *original* group size $$n$$, instead of the *new* group size $$n + k$$ (where $$k$$ is the number of new members).\n- Step 2: This error artificially deflates the new total sum. When you subtract the original sum to find the sum of the new members, the result is too low, yielding an incorrectly low mean for the new members. Exam writers deliberately calculate this exact wrong value and include it as a distractor option (e.g., getting $$20$$ instead of the correct $$50$$).\n\nAlways explicitly write down the new count $$n_{\\text{new}} = n_{\\text{old}} + \\text{added members}$$ before doing any multiplication.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "If a square with a semicircular cutout (diameter = side) is scaled up by a linear factor of $$k$$, how does the remaining area scale, and why does the algebraic expression for the side length inherently contain a square root? (2 steps)", "answer": "- Step 1: Area is a 2-dimensional property. If the linear dimensions (side length) are scaled by $$k$$, the area scales by $$k^2$$. If the original remaining area is $$A$$, the new area is $$k^2 A$$.\n- Step 2: The side length $$m$$ is a 1-dimensional property. Since the area equation is fundamentally of the form $$m^2 \\times (\\text{constant}) = \\text{Area}$$, solving for the 1D side length $$m$$ requires taking the square root of the area. This is why the correct multiple-choice options for side length always feature a $$\\sqrt{}$$ symbol encompassing the area value.\n\nDimensional analysis is a powerful tool: if you are solving for a length, the answer must have the dimensions of $$\\sqrt{\\text{Area}}$$.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": true}, {"question": "If a right triangle has legs $$a$$ and $$b$$, and hypotenuse $$c$$, what is the ratio of the areas of the two sub-triangles formed by the altitude to the hypotenuse, and how does this relate to the original legs? (3 steps)", "answer": "- Step 1: As established, dropping the altitude creates two sub-triangles that are similar to each other and to the original triangle.\n- Step 2: The ratio of the corresponding sides of these two sub-triangles is exactly the ratio of the legs of the original triangle, which is $$a : b$$. (Specifically, the hypotenuse of the smaller sub-triangle is $$a$$, and the hypotenuse of the larger is $$b$$).\n- Step 3: For any similar 2D shapes, the ratio of their areas is the square of the ratio of their corresponding lengths. Therefore, the ratio of the areas of the two sub-triangles is $$a^2 : b^2$$.\n\nThis is a beautiful geometric synthesis: the altitude splits the original triangle's area into two pieces whose ratio is simply the squares of the original legs.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": true}, {"question": "A square of side $$4$$ has a semicircle cut out from one side (diameter = $$4$$). Without calculating the exact decimal, what is the exact expression for the remaining area, and which is larger: the remaining area or the cutout area? (2 steps)", "answer": "- Step 1: The square area is $$4^2 = 16$$. The semicircle has radius $$r = 2$$, so its area is $$\\frac{1}{2}\\pi(2^2) = 2\\pi$$. The exact expression for the remaining area is $$16 - 2\\pi$$.\n- Step 2: To compare them mentally, approximate $$\\pi \\approx 3.14$$. The cutout area is $$2 \\times 3.14 = 6.28$$. The remaining area is $$16 - 6.28 = 9.72$$. Since $$9.72 > 6.28$$, the remaining metal area is larger than the cutout area.\n\nThis mental check confirms that the semicircle takes up less than half the square (since $$\\frac{\\pi}{8} \\approx \\frac{3.14}{8} < 0.5$$).", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "A right triangle has legs $$3$$ and $$4$$. Use the \"Two-Area Trick\" to mentally calculate the altitude to the hypotenuse. (2 steps)", "answer": "- Step 1: First, find the hypotenuse using the Pythagorean triple: $$c = \\sqrt{3^2 + 4^2} = 5$$. Calculate the area using the legs: $$\\text{Area} = \\frac{1}{2}(3)(4) = 6$$.\n- Step 2: Set up the second area equation using the hypotenuse and altitude $$h$$: $$\\text{Area} = \\frac{1}{2}(5)(h) = 6$$. This simplifies to $$5h = 12$$, so $$h = \\frac{12}{5} = 2.4$$.\n\nThe Two-Area trick turns a potentially messy similar-triangle ratio problem into a simple mental division.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": true}, {"question": "A room is $$3$$m wide, $$4$$m long, and $$12$$m high. What is the length of the longest straight pole that can fit inside (the body diagonal)? (2 steps)", "answer": "- Step 1: Calculate the diagonal across the floor using the 3-4-5 Pythagorean triple: $$d_{\\text{floor}} = \\sqrt{3^2 + 4^2} = 5$$m.\n- Step 2: Use the floor diagonal and the height to find the body diagonal. This forms a new right triangle with legs $$5$$ and $$12$$. Recognising the 5-12-13 Pythagorean triple, the body diagonal is exactly $$13$$m.\n\nMemorising common Pythagorean triples (3-4-5, 5-12-13, 8-15-17) allows you to solve 3D Pythagoras problems entirely in your head.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": true}, {"question": "If $$A:B = 2:3$$ and $$B:C = 4:5$$, what is $$A:C$$? Use the LCM method mentally. (3 steps)", "answer": "- Step 1: Identify the common term $$B$$. The values are $$3$$ and $$4$$. The LCM of $$3$$ and $$4$$ is $$12$$.\n- Step 2: Scale the first ratio by $$4$$ (to make $$B=12$$): $$2 \\times 4 : 3 \\times 4 \\rightarrow 8:12$$. Scale the second ratio by $$3$$ (to make $$B=12$$): $$4 \\times 3 : 5 \\times 3 \\rightarrow 12:15$$.\n- Step 3: Link them together: $$A:B:C = 8:12:15$$. Extracting just $$A$$ and $$C$$ gives the final ratio $$A:C = 8:15$$.\n\nAlways scale the *entire* ratio pair, never just the common term.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "What is the exact angle between the hands at 3:15? Use the continuous movement concept rather than just the formula. (2 steps)", "answer": "- Step 1: At exactly 3:15, the minute hand is pointing directly at the $$3$$ (the $$90^\\circ$$ position).\n- Step 2: The hour hand started at the $$3$$ and has been moving for $$15$$ minutes. Since $$15$$ minutes is $$\\frac{1}{4}$$ of an hour, the hour hand has moved $$\\frac{1}{4}$$ of the way toward the $$4$$. The distance between the $$3$$ and $$4$$ is $$30^\\circ$$, so the hour hand has moved $$\\frac{1}{4} \\times 30^\\circ = 7.5^\\circ$$ past the $$3$$.\n\nBecause the minute hand is exactly on the $$3$$ and the hour hand is $$7.5^\\circ$$ past it, the angle between them is exactly $$7.5^\\circ$$.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "The mean of $$4$$ numbers is $$10$$. A $$5$$th number is added, and the new mean is $$12$$. What is the $$5$$th number? (2 steps)", "answer": "- Step 1: Calculate the original total sum: $$\\Sigma_{\\text{old}} = 4 \\times 10 = 40$$. Calculate the new total sum with the $$5$$th number included: $$\\Sigma_{\\text{new}} = 5 \\times 12 = 60$$.\n- Step 2: The value of the $$5$$th number is simply the difference between the new sum and the old sum: $$60 - 40 = 20$$.\n\nBy converting means to sums, the problem reduces to a single, trivial subtraction.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Conceptually, why must the area of a semicircle cut from a square's edge be calculated as $$\\frac{1}{2}\\pi r^2$$ rather than $$\\pi r^2$$, and what is the geometric and algebraic consequence of forgetting the $$\\frac{1}{2}$$ factor when finding the remaining area of the square?", "answer": "A semicircle is exactly half of a full circle, so its area is inherently half of $$\\pi r^2$$. Geometrically, forgetting the $$\\frac{1}{2}$$ factor means you are subtracting the area of a *full* circle from the square, which removes far more material than actually exists. Algebraically, if the square side is $$m$$ and radius is $$\\frac{m}{2}$$, using the full circle area yields $$m^2 - \\pi(\\frac{m}{2})^2 = m^2(1 - \\frac{\\pi}{4})$$, leading to a denominator of $$4-\\pi$$. Using the correct semicircle area yields $$m^2 - \\frac{1}{2}\\pi(\\frac{m}{2})^2 = m^2(1 - \\frac{\\pi}{8})$$, leading to the correct denominator of $$8-\\pi$$. This factor of $$2$$ is the most common trap in such geometry problems.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "When solving for the side length $$m$$ of a square given the remaining area after a semicircular cutout, why is it conceptually and computationally superior to factor out $$m^2$$ immediately (e.g., $$m^2(1 - \\frac{\\pi}{8}) = A$$) rather than expanding and trying to isolate $$m$$ later? (2 steps)", "answer": "- Step 1: Factoring immediately groups all instances of the target variable into a single term, transforming the equation into the form $$m^2 \\cdot k = A$$. This isolates the geometric scaling factor ($$k$$) from the variable, treating the shape's proportions as a single constant multiplier.\n- Step 2: It prevents algebraic errors associated with distributing constants and later trying to \"undistribute\" them. By keeping the expression factored, taking the square root yields $$m = \\sqrt{\\frac{A}{k}}$$, which directly matches the nested radical format typical of multiple-choice options (e.g., $$\\sqrt{\\frac{2}{8-\\pi}}$$) without requiring messy fraction addition or common denominator steps at the end.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "When an altitude is dropped from the right angle of a right-angled triangle to its hypotenuse, it creates two smaller triangles. Conceptually, why are these two smaller triangles guaranteed to be similar to the original large triangle and to each other? (3 steps)", "answer": "- Step 1: The original large triangle has a $$90^\\circ$$ angle and two acute angles, say $$\\alpha$$ and $$\\beta$$, where $$\\alpha + \\beta = 90^\\circ$$.\n- Step 2: Dropping the altitude creates two new right-angled triangles. The first sub-triangle shares the angle $$\\alpha$$ with the large triangle and has a new $$90^\\circ$$ angle (from the altitude), forcing its third angle to be $$\\beta$$. The second sub-triangle shares $$\\beta$$, has a $$90^\\circ$$ angle, and its third angle must be $$\\alpha$$.\n- Step 3: Because all three triangles (the large one and the two sub-triangles) possess the exact same set of three angles ($$90^\\circ, \\alpha, \\beta$$), they are similar by Angle-Angle (AA) similarity. This transitive similarity is the foundation for all altitude-to-hypotenuse theorems.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "In a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$, the altitude to the hypotenuse is $$h$$. Explain the conceptual basis of the \"Two-Area Trick\" ($$h = \\frac{ab}{c}$$) and why it is computationally faster than using similar triangle ratios. (2 steps)", "answer": "- Step 1: The area of a triangle is an invariant scalar quantity, regardless of which side you choose as the base. If you use the legs as base and height, the area is $$\\frac{1}{2}ab$$. If you rotate the triangle and use the hypotenuse as the base, the corresponding height is the altitude $$h$$, making the area $$\\frac{1}{2}ch$$.\n- Step 2: Equating the two area expressions ($$\\frac{1}{2}ab = \\frac{1}{2}ch$$) and solving for $$h$$ instantly yields $$h = \\frac{ab}{c}$$. This is computationally faster than using similar triangles because it bypasses the need to identify corresponding sides, determine scale factors, and set up proportions, reducing the entire process to a single multiplication and division.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "When identifying similar triangles formed by an altitude to the hypotenuse, why is it conceptually safer to use the \"Two-Area Trick\" rather than relying on visual scale factors, and if you must use scale factors, how do you rigorously determine the correct ratio without mixing up corresponding sides? (2 steps)", "answer": "- Step 1: Visual scale factors are highly prone to error because the sub-triangles are rotated and reflected relative to the main triangle. This spatial disorientation makes it easy to mismatch the \"short leg\" of one triangle with the \"long leg\" of another. The Two-Area Trick bypasses this entirely by relying purely on scalar area invariance.\n- Step 2: If you must use scale factors, you must rigorously map the sides by their *opposite angles*, not by their visual orientation. The side opposite the shared angle in the large triangle corresponds to the side opposite that exact same angle in the sub-triangle. The ratio of these specific corresponding sides gives the true, error-free scale factor.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "To find the distance from a vertex of a unit cube to the center of the opposite face, why can we not simply use the 3D body diagonal formula $$\\sqrt{1^2+1^2+1^2}$$, and how must the path be conceptually broken down into two 2D Pythagorean steps? (3 steps)", "answer": "- Step 1: The body diagonal formula $$\\sqrt{x^2+y^2+z^2}$$ calculates the distance to the *opposite vertex* (coordinates $$1,1,1$$). The center of the opposite face is at coordinates $$(1, 0.5, 0.5)$$, meaning the displacements in the $$y$$ and $$z$$ directions are only half a unit, not a full unit.\n- Step 2: The first 2D step calculates the diagonal across the base face to the point directly beneath the target. Using the full length in one direction ($$1$$) and half length in the other ($$0.5$$), the base diagonal is $$\\sqrt{1^2 + 0.5^2} = \\sqrt{1.25}$$.\n- Step 3: The second 2D step uses this base diagonal and the vertical rise to the face center ($$0.5$$). The final distance is $$\\sqrt{(\\sqrt{1.25})^2 + 0.5^2} = \\sqrt{1.25 + 0.25} = \\sqrt{1.5} = \\frac{\\sqrt{6}}{2}$$.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "In a rectangular cuboid with dimensions $$x, y, z$$, what is the conceptual difference between the \"body diagonal\" and the \"face diagonal\", and how does the 3D Pythagorean theorem $$d = \\sqrt{x^2+y^2+z^2}$$ inherently account for both depending on which coordinates change?", "answer": "The \"body diagonal\" spans the entire interior of the 3D shape from one corner to the exact opposite corner, requiring a change in all three spatial dimensions ($$x, y,$$ and $$z$$). A \"face diagonal\" spans only across a single 2D surface of the cuboid, meaning there is zero displacement in the third dimension perpendicular to that face. The 3D Pythagorean theorem inherently accounts for both: if you are calculating a face diagonal on the $$xy$$-plane, the change in the $$z$$-direction is $$0$$, so the formula naturally collapses to $$d = \\sqrt{x^2+y^2+0^2} = \\sqrt{x^2+y^2}$$, seamlessly reducing to the standard 2D Pythagorean theorem.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "When combining two ratios $$A:B$$ and $$B:C$$ into a single ratio $$A:B:C$$, why is it mathematically necessary to scale *both* terms of each ratio by a multiplier, and what specific logical error occurs if a student only scales the $$B$$ term in the second ratio to match the first? (2 steps)", "answer": "- Step 1: A ratio represents a fixed relative proportion between two quantities. If $$B:C$$ is $$3:10$$, it means for every $$3$$ units of $$B$$, there are exactly $$10$$ units of $$C$$. Scaling the ratio means you are zooming in or out on this relationship while preserving the proportion.\n- Step 2: If a student only scales the $$B$$ term (e.g., multiplying $$B$$ by $$2$$ to get $$6$$) but leaves $$C$$ as $$10$$, they destroy the fundamental proportion. The new ratio $$6:10$$ implies a different relationship ($$3:5$$) than the original $$3:10$$. You must multiply *both* terms by the same scalar to maintain the true relative size of $$C$$ with respect to $$A$$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "If the ratio of apples to bananas is $$2:3$$ and bananas to oranges is $$4:5$$, what is the combined ratio of apples to oranges in simplest form? Walk through the alignment and scaling process. (3 steps)", "answer": "- Step 1: Align the ratios vertically by the common term (bananas):\n  + Apples : Bananas = $$2 : 3$$\n  + Bananas : Oranges = $$4 : 5$$\n- Step 2: Find the Least Common Multiple (LCM) of the banana values ($$3$$ and $$4$$), which is $$12$$. Scale the first ratio by $$4$$ (yielding $$8:12$$) and the second ratio by $$3$$ (yielding $$12:15$$).\n- Step 3: Combine them into a three-way ratio: Apples : Bananas : Oranges = $$8 : 12 : 15$$. Extract apples to oranges, which is $$8:15$$. Since $$8$$ and $$15$$ share no common factors, the simplest form is $$8:15$$.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Conceptually, why does the hour hand on an analog clock not remain stationary at the exact hour mark (e.g., exactly on the 9 at 9:45), and how does this continuous movement mathematically affect the angle calculation compared to a discrete jump model? (2 steps)", "answer": "- Step 1: Mechanically, the hour and minute hands are linked by gears. As the minute hand completes a full $$360^\\circ$$ revolution, it physically drives the hour hand forward by one hour mark ($$\\frac{1}{12}$$ of a circle, or $$30^\\circ$$). Therefore, the hour hand moves continuously and proportionally to the minutes passed.\n- Step 2: Mathematically, this means the hour hand's position is not just $$30 \\times H$$, but $$30 \\times H + 0.5 \\times M$$. At 9:45, a discrete model would place the hour hand at exactly $$270^\\circ$$, yielding a $$0^\\circ$$ angle with the minute hand. The continuous model correctly places it $$75\\%$$ of the way to the 10 ($$270^\\circ + 22.5^\\circ = 292.5^\\circ$$), yielding the true angle of $$22.5^\\circ$$.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "Derive the conceptual basis for the clock angle formula $$\\theta = |30H - 5.5M|$$. Specifically, explain where the coefficients $$30$$ and $$5.5$$ come from in terms of the angular speeds of the hour and minute hands. (3 steps)", "answer": "- Step 1: The minute hand completes $$360^\\circ$$ in $$60$$ minutes, giving it an angular speed of $$\\frac{360}{60} = 6^\\circ$$ per minute. Its absolute position from 12 o'clock is $$6M$$.\n- Step 2: The hour hand completes $$360^\\circ$$ in $$12$$ hours ($$720$$ minutes), giving it an angular speed of $$\\frac{360}{720} = 0.5^\\circ$$ per minute. Its absolute position from 12 o'clock is the starting hour position ($$30H$$) plus the distance moved in $$M$$ minutes ($$0.5M$$), totaling $$30H + 0.5M$$.\n- Step 3: The angle between them is the absolute difference of their positions: $$|(30H + 0.5M) - 6M| = |30H - 5.5M|$$. The coefficient $$5.5$$ conceptually represents the *relative* angular speed ($$6 - 0.5$$) at which the minute hand catches up to or pulls away from the hour hand.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Without using the formula, conceptually determine the exact angle between the hands at 6:30. Explain why it is not $$180^\\circ$$. (2 steps)", "answer": "- Step 1: At 6:30, the minute hand is pointing exactly at the 6, which is the $$180^\\circ$$ position.\n- Step 2: The hour hand does not sit exactly on the 6. Because 30 minutes is exactly half an hour, the hour hand has moved halfway between the 6 and the 7. Since the distance between 6 and 7 is $$30^\\circ$$, the hour hand has moved $$15^\\circ$$ past the 6. Therefore, the angle between the minute hand (at the 6) and the hour hand ($$15^\\circ$$ past the 6) is exactly $$15^\\circ$$. It is not $$180^\\circ$$ because that would only occur at exactly 6:00.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "When solving problems where the mean of a group changes after adding new members, why is it conceptually essential to convert the given means into \"total sums\" ($$\\Sigma = n\\bar{x}$$) rather than trying to average the old mean and the new members' mean directly? (2 steps)", "answer": "- Step 1: The mean is an *intensive* property; it does not scale with the size of the group. You cannot simply average two means (e.g., $$\\frac{\\text{old mean} + \\text{new mean}}{2}$$) because this ignores the *weight* (number of people) of each group. A mean of 20 for a group of 2 people has a vastly different impact on the total than a mean of 20 for a group of 100 people.\n- Step 2: The total sum ($$\\Sigma$$) is an *extensive* property; it is additive. By converting means to sums ($$\\Sigma = n\\bar{x}$$), you translate the problem into absolute quantities. You can then simply subtract the old sum from the new sum to find the exact total contribution of the new members, bypassing the weighting problem entirely.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "The mean age of 4 people is 10. A 5th person joins, and the new mean age becomes 12. Conceptually, how much \"extra\" age did the 5th person bring to the group, and what is their exact age? Walk through the sum differences. (3 steps)", "answer": "- Step 1: Calculate the original total sum of ages. With 4 people and a mean of 10, the original sum is $$4 \\times 10 = 40$$.\n- Step 2: Calculate the new total sum of ages. With 5 people and a new mean of 12, the new sum is $$5 \\times 12 = 60$$.\n- Step 3: The 5th person's exact age is the difference between the new sum and the old sum: $$60 - 40 = 20$$. Conceptually, the 5th person had to bring enough age to cover their own share of the new mean ($$12$$) *plus* an extra $$2$$ years for each of the 4 original people to raise their mean from 10 to 12 ($$12 + 4 \\times 2 = 20$$).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": true}, {"question": "In the context of the ESAT exam, why is inspecting the multiple-choice options *before* starting algebraic manipulation a critical time-saving strategy, particularly for geometry problems involving variables like radius $$r$$ and side length $$m$$?", "answer": "Inspecting the options allows you to reverse-engineer the required final form of your answer. If a problem gives you a radius $$r$$ but all five multiple-choice options are expressed in terms of the square's side length $$m$$, you immediately know you must substitute $$r = \\frac{m}{2}$$ at the very beginning of your algebra. If you fail to check the options and solve for $$r$$, you will waste precious time trying to algebraically manipulate your final answer to match the options, or worse, panic when your correct numerical answer doesn't visually match any of the choices.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": true}, {"question": "Why do standardised exams like the ESAT consistently present answers with rationalised denominators (e.g., $$4\\sqrt{5}$$ instead of $$\\frac{20}{\\sqrt{5}}$$), and what is the conceptual mathematical reason for preferring rationalised forms in pre-calculator eras? (2 steps)", "answer": "- Step 1: Mathematically, rationalising the denominator ensures a unique, canonical representation for expressions involving surds. Just as we reduce fractions to their simplest form ($$\\frac{2}{4} \\rightarrow \\frac{1}{2}$$), moving irrational numbers to the numerator standardises the format, making it easier to compare, add, or subtract expressions without ambiguity.\n- Step 2: Historically, before calculators, division was performed by hand. Dividing by an irrational number like $$\\sqrt{5} \\approx 2.236$$ requires long division with a messy decimal divisor. By rationalising to $$\\frac{20\\sqrt{5}}{5}$$, the calculation becomes multiplying by a known decimal ($$20 \\times 2.236$$) and then dividing by a clean integer ($$5$$), which is computationally much faster and less prone to arithmetic errors.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": true}], "count": 16}}, "meta": {}};
const SK='esat_22may_llm';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
