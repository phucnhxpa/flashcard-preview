body diagonal\" (corner to opposite corner) and the line from a vertex to the midpoint of the opposite face? (3 steps)", "answer": "- Step 1: The body diagonal connects $$(0,0,0)$$ to $$(1,1,1)$$, traversing the full length, width, and height of the cube. Its length is calculated as $$\\sqrt{1^2+1^2+1^2} = \\sqrt{3}$$.\n- Step 2: The vertex-to-face-midpoint line connects $$(0,0,0)$$ to $$(1, 0.5, 0.5)$$. It traverses the full length of one dimension, but only *half* the length of the other two dimensions, stopping at the center of the face rather than the far corner.\n- Step 3: Geometrically, the face-midpoint line is shorter. Its length is $$\\sqrt{1^2 + 0.5^2 + 0.5^2} = \\sqrt{1 + 0.25 + 0.25} = \\sqrt{1.5} = \\frac{\\sqrt{6}}{2}$$. Confusing these two distinct paths is a common trap in 3D geometry problems.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "When finding the distance from a cube's vertex to the midpoint of an opposite face, why must you apply the Pythagorean theorem twice instead of once, and what do the two intermediate right-angled triangles represent physically? (3 steps)", "answer": "- Step 1: You cannot directly apply 3D Pythagoras unless you know all three orthogonal coordinates from the origin. The first step is to find the diagonal across the base face to the point directly *below* the target midpoint. This forms a 2D right triangle with legs $$1$$ and $$0.5$$, giving a base diagonal of $$\\sqrt{1^2 + 0.5^2} = \\frac{\\sqrt{5}}{2}$$.\n- Step 2: The second step uses this base diagonal as one leg of a new vertical right-angled triangle, where the other leg is the vertical height of the cube ($$0.5$$ up to the face midpoint). \n- Step 3: Applying Pythagoras to this second triangle gives the final hypotenuse: $$\\sqrt{(\\frac{\\sqrt{5}}{2})^2 + 0.5^2} = \\sqrt{\\frac{5}{4} + \\frac{1}{4}} = \\frac{\\sqrt{6}}{2}$$. The two steps physically represent \"walking across the floor, then climbing the wall\" versus \"flying directly through the air.\"", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When combining two ratios like $$Q:R = 5:2$$ and $$R:S = 3:10$$, why is it mathematically necessary to find the Lowest Common Multiple (LCM) of the $$R$$ values before combining them into a single $$Q:R:S$$ ratio? (3 steps)", "answer": "- Step 1: A ratio defines a proportional relationship, not absolute numbers. In $$Q:R = 5:2$$, the \"$$2$$\" represents a specific \"chunk size\" for $$R$$. In $$R:S = 3:10$$, the \"$$3$$\" represents a different \"chunk size\" for $$R$$.\n- Step 2: You cannot directly link the ratios because the \"chunk sizes\" for $$R$$ do not match. If you just wrote $$5:2:10$$, you would be falsely assuming that $$2$$ parts in the first ratio equals $$3$$ parts in the second.\n- Step 3: By finding the LCM of the $$R$$ values (LCM of 2 and 3 is 6), you scale both ratios so that $$R$$ represents the exact same absolute quantity in both. Scaling the first by 3 gives $$15:6$$, and the second by 2 gives $$6:20$$. Now the \"$$6$$\" matches perfectly, allowing you to safely bridge them into $$Q:R:S = 15:6:20$$.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "When scaling the ratio $$R:S = 3:10$$ by a factor of 2 to make $$R=6$$, what is the common mechanical error students make, and how does it distort the final $$Q:S$$ relationship?", "answer": "The common error is multiplying only the $$R$$ value to get 6, but forgetting to multiply the $$S$$ value, leaving it as 10 (yielding a false ratio of $$6:10$$). This distorts the final relationship because it artificially shrinks $$S$$ relative to $$R$$. When combined with $$Q:R = 15:6$$, the student gets $$Q:R:S = 15:6:10$$, leading to a final $$Q:S$$ ratio of $$15:10 = 3:2$$. The correct scaling multiplies *both* terms ($$3 \\times 2$$ and $$10 \\times 2$$), yielding $$6:20$$ and a true $$Q:S$$ ratio of $$15:20 = 3:4$$.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why is it a fundamental misconception to assume the hour hand points exactly at the hour number (e.g., exactly at 9) when the time is 9:45, and how far has it actually moved? (3 steps)", "answer": "- Step 1: The hour hand moves *continuously*, not in discrete hourly jumps. Its position is a function of both the hour and the minutes passed.\n- Step 2: At 9:45, exactly $$\\frac{3}{4}$$ of an hour has passed since 9:00. Therefore, the hour hand has moved $$\\frac{3}{4}$$ of the way from the 9 to the 10.\n- Step 3: Since the distance between any two hour marks is $$30^\\circ$$ ($$360^\\circ / 12$$), the hour hand has moved $$\\frac{3}{4} \\times 30^\\circ = 22.5^\\circ$$ past the 9. Assuming it sits exactly at 9 would result in an angle of $$0^\\circ$$ between the hands, which is physically impossible at 9:45.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Derive the intuitive meaning behind the $$5.5M$$ term in the clock angle formula $$\\theta = |30H - 5.5M|$$. What physical speeds does this represent? (3 steps)", "answer": "- Step 1: The minute hand moves at a speed of $$360^\\circ$$ per 60 minutes, which simplifies to $$6^\\circ$$ per minute. Its absolute position from 12 o'clock is $$6M$$.\n- Step 2: The hour hand moves at a speed of $$360^\\circ$$ per 12 hours (720 minutes), which simplifies to $$0.5^\\circ$$ per minute. Its absolute position from 12 o'clock is $$30H + 0.5M$$ (the base hour position plus the continuous minute drift).\n- Step 3: The angle between them is the absolute difference in their positions: $$|(30H + 0.5M) - 6M| = |30H - 5.5M|$$. The $$5.5M$$ term represents the *relative speed* at which the minute hand pulls away from the hour hand ($$6^\\circ/\\text{min} - 0.5^\\circ/\\text{min} = 5.5^\\circ/\\text{min}$$).", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "When a problem states \"the mean of a group increases by $$X$$ when $$Y$$ new members join\", what is the most robust conceptual framework to find the sum of the new members' values without getting tangled in algebraic variables? (4 steps)", "answer": "- Step 1: **Calculate the Old Sum.** Use the original mean and original count ($$\\Sigma_{\\text{old}} = n_{\\text{old}} \\times \\text{mean}_{\\text{old}}$$).\n- Step 2: **Determine the New Mean.** Add the increase $$X$$ to the old mean. Do not use the old mean for the new group.\n- Step 3: **Calculate the New Sum.** Multiply the new mean by the new total count ($$n_{\\text{old}} + Y$$). \n- Step 4: **Find the Difference.** Subtract the Old Sum from the New Sum. This difference is the total combined value of the $$Y$$ new members. Divide by $$Y$$ if their individual mean is required.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "In a problem where the mean age of 20 people is 28, and the mean increases by 2 when 2 people join, what is the specific logical error if a student calculates the new total sum as $$22 \\times 28$$, and what false conclusion does this lead to?", "answer": "The logical error is applying the *old* mean (28) to the *new* population size (22). This assumes the mean stayed exactly the same after the new members joined, directly contradicting the premise that the mean increased by 2. If a student calculates $$22 \\times 28 = 616$$, and subtracts the old sum ($$20 \\times 28 = 560$$), they get an extra sum of 56. Dividing 56 by the 2 new members yields a false mean age of 28. The correct new mean is 30, leading to a new sum of $$22 \\times 30 = 660$$, and a true new member mean of 50.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "In a time-pressured multiple-choice exam, if you are faced with a complex area subtraction problem (like a square minus a semicircle) and you forget the exact formula for the semicircle area, how can you use the answer options and logical elimination to deduce the correct algebraic form? (3 steps)", "answer": "- Step 1: **Sign of $$\\pi$$:** Since you are *subtracting* the semicircle from the square, the remaining area must be smaller than the square alone. Algebraically, this means $$\\pi$$ must be subtracted in the denominator (e.g., $$8-\\pi$$), not added ($$8+\\pi$$). This instantly eliminates options with $$+\\pi$$.\n- Step 2: **Magnitude check:** The area of a semicircle is less than the area of the square it fits inside. If you accidentally used the full circle area, you'd be subtracting too much. The correct denominator must reflect the $$\\frac{1}{2}$$ factor, making the subtracted term smaller (e.g., $$8-\\pi$$ instead of $$4-\\pi$$).\n- Step 3: **Coefficient check:** Look at the numerator. If the remaining area is 100, and you factor out $$m^2$$, the numerator inside the square root will scale with $$\\sqrt{100} = 10$$ or $$\\sqrt{400} = 20$$ depending on the fraction. You can often rule out options with the wrong leading coefficient without doing the full algebra.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "A square of side 4 has a semicircle cut out, where the semicircle's diameter is the side of the square. What is the exact remaining area? (Mental math exercise).", "answer": "- Step 1: Calculate the area of the square: $$4^2 = 16$$.\n- Step 2: Identify the semicircle's radius. Since the diameter is the side of the square (4), the radius is $$2$$.\n- Step 3: Calculate the area of the semicircle: $$\\frac{1}{2} \\pi r^2 = \\frac{1}{2} \\pi (2^2) = 2\\pi$$.\n- Step 4: Subtract the semicircle area from the square area: $$16 - 2\\pi$$.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "A right triangle has legs 3 and 4. Use the \"Two-Area Trick\" to mentally calculate the altitude to the hypotenuse.", "answer": "- Step 1: Find the hypotenuse using Pythagoras: $$\\sqrt{3^2 + 4^2} = 5$$.\n- Step 2: Calculate the area using the legs: $$\\frac{1}{2} \\times 3 \\times 4 = 6$$.\n- Step 3: Set up the area equation using the hypotenuse and altitude ($$h$$): $$\\frac{1}{2} \\times 5 \\times h = 6$$.\n- Step 4: Solve for $$h$$: $$2.5h = 6 \\implies h = \\frac{6}{2.5} = 2.4$$.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "A cuboid has dimensions 1, 2, and 2. What is the length of the space diagonal? (Mental math exercise).", "answer": "- Step 1: Recall the 3D Pythagoras formula for a space diagonal: $$d = \\sqrt{x^2 + y^2 + z^2}$$.\n- Step 2: Square the dimensions: $$1^2 = 1$$, $$2^2 = 4$$, $$2^2 = 4$$.\n- Step 3: Sum the squares: $$1 + 4 + 4 = 9$$.\n- Step 4: Take the square root: $$\\sqrt{9} = 3$$.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "If $$A:B = 2:3$$ and $$B:C = 4:5$$, what is the combined ratio $$A:B:C$$? (Mental math exercise).", "answer": "- Step 1: Identify the common term ($$B$$) and its values in the two ratios (3 and 4).\n- Step 2: Find the LCM of 3 and 4, which is 12.\n- Step 3: Scale the first ratio ($$A:B$$) by 4 to make $$B=12$$: $$2 \\times 4 : 3 \\times 4 = 8:12$$.\n- Step 4: Scale the second ratio ($$B:C$$) by 3 to make $$B=12$$: $$4 \\times 3 : 5 \\times 3 = 12:15$$.\n- Step 5: Combine them: $$A:B:C = 8:12:15$$.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Using the relative speed concept, what is the exact angle between the hands at 6:00? What about at 6:30? (Mental math exercise).", "answer": "- Step 1: **At 6:00:** The minute hand is at 12 ($$0^\\circ$$), and the hour hand is exactly at 6 ($$180^\\circ$$). The angle is $$|180^\\circ - 0^\\circ| = 180^\\circ$$.\n- Step 2: **At 6:30:** The minute hand is at 6 ($$180^\\circ$$). \n- Step 3: The hour hand has moved continuously. In 30 minutes, it moves $$30 \\times 0.5^\\circ = 15^\\circ$$ past the 6. So it is at $$180^\\circ + 15^\\circ = 195^\\circ$$.\n- Step 4: The angle between them is $$|195^\\circ - 180^\\circ| = 15^\\circ$$. (Alternatively, using the formula: $$|30(6) - 5.5(30)| = |180 - 165| = 15^\\circ$$).", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the basic structure of an ESAT Maths module — number of questions, time, and how answers are submitted? (2 steps)", "answer": "- Step 1: Each module is **computer-based** and contains **27 multiple-choice questions** to be completed in **40 minutes** (so roughly 90 seconds per question).\n- Step 2: Only the **final answer** is marked — intermediate working is invisible to the examiner. The implication is that you must reach a clean final value (often a simplified surd) and select the matching option; no partial credit exists.\n\n**Takeaway:** Speed + accuracy on the final numeric form is the whole game.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Which tools are *not* provided in the ESAT Maths exam, and what does that force the student to do? (2 steps)", "answer": "- Step 1: **No calculator** and **no formula sheet** are provided.\n- Step 2: This means every area/volume/Pythagoras/clock-angle formula must be **memorised**, and any arithmetic (multiplication, square roots of small numbers) must be done mentally or on paper.\n\n**Takeaway:** Memorise formulas *cold* — looking them up costs you 5–10 seconds per question, which is 5–10% of your total module time.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "According to the tutor, what is the *primary* challenge of the ESAT — difficulty of problems, or something else? Why does this matter for preparation? (3 steps)", "answer": "- Step 1: The **primary challenge is pace**, not the difficulty of individual questions. Each of the 27 questions allows only ~90 seconds.\n- Step 2: This means you cannot afford to re-derive formulas from scratch, draw elaborate diagrams, or get stuck. You must work with **memorised formulas, quick diagrams, and aggressive triage**.\n- Step 3: For preparation, the tutor advises practising **untimed first** to internalise technique, then introducing time pressure only when you can already solve the questions comfortably. Roughly **10 lessons** are typical to feel comfortable with the ESAT question style.\n\n**Takeaway:** Speed is a *learned skill* — train it deliberately, don't assume it will arrive with the math.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Why does the tutor recommend *against* using AI to do ESAT homework? (1 step)", "answer": "- Step 1: AI will hand you the answer and method, which **masks the specific formulas you don't know** (e.g., the semicircle area has a $\\tfrac{1}{2}$ factor that you might be forgetting — Phuc did exactly this in the lesson). You need to *discover* those gaps by struggling honestly, otherwise you'll make the same mistake in the timed exam.\n\n**Takeaway:** Use AI for marking or hints, not for doing the problem for you.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "State the formulas for the area of a full circle and the area of a semicircle of radius $r$. Why is the second one exactly half the first? (2 steps)", "answer": "- Step 1: **Full circle:** $A = \\pi r^2$. **Semicircle:** $A = \\tfrac{1}{2}\\pi r^2$.\n- Step 2: A semicircle is, by definition, **half of a circle** cut along a diameter. So the area of a semicircle must be *exactly half* the area of the full circle of the same radius. The factor of $\\tfrac{1}{2}$ is **not optional** — forgetting it (Phuc's Q1 error) makes the subtracted region twice as large and gives a completely wrong answer.\n\n**Takeaway:** Always write the formula with its full coefficients before substituting. The $\\tfrac{1}{2}$ in $\\tfrac{1}{2}\\pi r^2$ is the single most common error in semicircle problems.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A square has side length $m$, and a semicircle of *diameter* $m$ is cut from one edge. Write the equation for the remaining area being 100 cm². (2 steps)", "answer": "- Step 1: Identify the radius. The semicircle's **diameter** equals the square's side $m$, so the **radius** is $r = m/2$.\n- Step 2: Remaining area = square area − semicircle area:\n$$m^2 - \\tfrac{1}{2}\\pi\\left(\\tfrac{m}{2}\\right)^2 = 100$$\n\n**Takeaway:** Always convert \"diameter\" to \"radius\" by halving, and always include the $\\tfrac{1}{2}$ for the semicircle. The two errors cancel out only by accident.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In the equation $m^2 - \\tfrac{1}{2}\\pi(\\tfrac{m}{2})^2 = 100$, why is it smarter to *factor* out $m^2$ immediately rather than expand the bracket? (2 steps)", "answer": "- Step 1: Expanding the bracket first gives $m^2 - \\tfrac{\\pi m^2}{8}$, which is two terms that look like they don't belong together. Regrouping them afterwards is slow and error-prone.\n- Step 2: Factoring $m^2$ out *before* expanding collapses the algebra into one line:\n$$m^2\\!\\left(1 - \\tfrac{\\pi}{8}\\right) = m^2\\!\\left(\\tfrac{8-\\pi}{8}\\right) = 100$$\nThis isolates $m^2$ directly, so a single division solves it. **Factorise before expanding** is a general rule for clean ESAT algebra.\n\n**Takeaway:** Treat the structure of the equation as your friend — the form $m^2(\\text{stuff}) = \\text{number}$ is exactly what you want, because $m$ is the unknown.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "Solve $m^2\\!\\left(\\tfrac{8-\\pi}{8}\\right) = 100$ for $m$. Walk through every step. (4 steps)", "answer": "- Step 1: Multiply both sides by $\\tfrac{8}{8-\\pi}$ to isolate $m^2$:\n$$m^2 = \\frac{100 \\times 8}{8-\\pi} = \\frac{800}{8-\\pi}$$\n- Step 2: Take the square root of both sides:\n$$m = \\sqrt{\\frac{800}{8-\\pi}}$$\n- Step 3: Use the surd-splitting rule $\\sqrt{a/b} = \\sqrt{a}/\\sqrt{b}$ to separate numerator and denominator:\n$$m = \\frac{\\sqrt{800}}{\\sqrt{8-\\pi}}$$\n- Step 4: Simplify $\\sqrt{800}$ by pulling out the largest square factor. $800 = 400 \\times 2$, so $\\sqrt{800} = 20\\sqrt{2}$. Final answer:\n$$m = \\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}} = 20\\sqrt{\\frac{2}{8-\\pi}}$$\n\n**Takeaway:** The answer form $20\\sqrt{2/(8-\\pi)}$ matches **Option A** in the original question.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "State and explain the surd-splitting rule $\\sqrt{a/b} = \\sqrt{a}/\\sqrt{b}$. Why is it useful on the ESAT? (2 steps)", "answer": "- Step 1: The rule says a square root of a fraction equals the fraction of the square roots: $\\sqrt{\\tfrac{a}{b}} = \\tfrac{\\sqrt{a}}{\\sqrt{b}}$ (valid for $a, b > 0$).\n- Step 2: It is useful because ESAT answer options are usually written as $\\tfrac{a\\sqrt{b}}{c}$ or $a\\sqrt{\\tfrac{b}{c}}$ — i.e., **with the surd in the numerator**, not the denominator. Splitting the radical lets you simplify the numerator ($\\sqrt{800} = 20\\sqrt{2}$) and leave the denominator in a clean form that matches an option.\n\n**Takeaway:** Always split $\\sqrt{a/b}$ when an option looks like \"number × $\\sqrt{\\text{something}}$\".", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Phuc made an error in Q1 by writing $m^2 - \\pi r^2 = 100$. What exactly did he forget, and how does the wrong denominator in option form expose the error? (2 steps)", "answer": "- Step 1: Phuc used the **full-circle area** $\\pi r^2$ instead of the **semicircle area** $\\tfrac{1}{2}\\pi r^2$ — he forgot the factor of $\\tfrac{1}{2}$. (He had also already set $r = m/2$, but the missing $\\tfrac{1}{2}$ is the deeper issue.)\n- Step 2: Working through the same algebra with $\\pi r^2$ substituted gives $m^2\\!\\left(1 - \\tfrac{\\pi}{4}\\right) = m^2\\!\\left(\\tfrac{4-\\pi}{4}\\right) = 100$, leading to answers with $4-\\pi$ in the denominator (Options B, E). So if you arrive at $4-\\pi$ in your denominator, **you used the full-circle area** — that's an instant self-catch.\n\n**Takeaway:** Wrong options encode their own diagnostic. Inspect the form of the denominator to identify which formula you used.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In a right-angled triangle, a perpendicular is dropped from the right-angle vertex to the hypotenuse. Why does this create **two** similar triangles? (3 steps)", "answer": "- Step 1: The big triangle $\\triangle PQR$ has a right angle at $Q$, and angles $\\alpha$ at $P$ and $\\beta$ at $R$, with $\\alpha + \\beta = 90°$.\n- Step 2: The altitude $QT$ to the hypotenuse splits the right angle at $Q$ into two parts: the part inside the smaller triangle on the $P$-side equals $\\alpha$ (because the new triangle has a right angle at $T$ and angle $\\alpha$ at $P$, leaving the third angle to be $90° - \\alpha = \\beta$).\n- Step 3: By **AA (angle-angle) similarity**, each of the two new sub-triangles shares two angles with the original, so both are similar to the original and to each other:\n$$\\triangle PQR \\sim \\triangle QTR \\sim \\triangle PTQ$$\n\n**Takeaway:** Any time a perpendicular is dropped from a right-angle vertex to the hypotenuse, you get three mutually similar triangles. This is the engine behind the \"altitude formula\" $h = ab/c$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Derive the formula for the altitude $h$ of a right-angled triangle from the right-angle vertex to the hypotenuse, in terms of the two legs $a$ and $b$ and the hypotenuse $c$. (3 steps)", "answer": "- Step 1: The area of the triangle can be computed in two different ways using base and height:\n$$\\text{Area} = \\tfrac{1}{2} a b \\quad \\text{(using the two legs as base and height)}$$\n$$\\text{Area} = \\tfrac{1}{2} c h \\quad \\text{(using the hypotenuse as base and the altitude as height)}$$\n- Step 2: Equate the two expressions:\n$$\\tfrac{1}{2} a b = \\tfrac{1}{2} c h \\implies ab = ch$$\n- Step 3: Solve for $h$:\n$$h = \\frac{ab}{c}$$\n\n**Takeaway:** Memorise $h = ab/c$ — it is faster than any similarity-ratio calculation when you know the three sides of the right triangle. (For Q2, that's $\\tfrac{20 \\times 10}{10\\sqrt{5}} = \\tfrac{20}{\\sqrt{5}} = 4\\sqrt{5}$.)", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In Q2 the answer came out as $20/\\sqrt{5}$, but the matching option is $4\\sqrt{5}$. What technique converts one into the other, and why is it almost always needed on the ESAT? (2 steps)", "answer": "- Step 1: **Rationalise the denominator** by multiplying by $\\tfrac{\\sqrt{5}}{\\sqrt{5}}$:\n$$\\frac{20}{\\sqrt{5}} \\cdot \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5} = 4\\sqrt{5}$$\n- Step 2: ESAT options are conventionally written with **no surds in the denominator**. If you stop at $20/\\sqrt{5}$ you will scan the options and panic. Rationalising takes 3 seconds and is essentially mandatory.\n\n**Takeaway:** End every surd answer by rationalising. A useful template: $\\tfrac{a}{\\sqrt{b}} = \\tfrac{a\\sqrt{b}}{b}$.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "In the unit-cube problem, why can't you apply 2D Pythagoras *once* with all three coordinates? Walk through the standard two-step approach. (3 steps)", "answer": "- Step 1: The direct distance formula $d = \\sqrt{x^2 + y^2 + z^2}$ *is* valid for a point $(x,y,z)$ from the origin — but it is **not** a 2D Pythagoras; it is a 3D Pythagoras that is itself built from **two successive 2D Pythagoras steps**. So even when you write $d = \\sqrt{x^2 + y^2 + z^2}$, you are implicitly using two stages.\n- Step 2: **Step 1** — find the diagonal of the base square (or the diagonal across part of the bottom face) that ends at the point directly below the target face-midpoint. For unit cube with face-midpoint at $(1, \\tfrac{1}{2}, \\tfrac{1}{2})$, the point directly below on the base is $(1, \\tfrac{1}{2}, 0)$:\n$$x = \\sqrt{1^2 + (\\tfrac{1}{2})^2} = \\sqrt{\\tfrac{5}{4}} = \\tfrac{\\sqrt{5}}{2}$$\n- Step 3: **Step 2** — use $x$ as the base and the remaining $\\tfrac{1}{2}$ (vertical) as the height:\n$$y = \\sqrt{(\\tfrac{\\sqrt{5}}{2})^2 + (\\tfrac{1}{2})^2} = \\sqrt{\\tfrac{5}{4} + \\tfrac{1}{4}} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2}$$\n\n**Takeaway:** Two Pythagoras steps. Answer is $\\tfrac{\\sqrt{6}}{2}$. Do not confuse this with the **body diagonal** of the cube ($\\sqrt{3}$), which is corner-to-corner.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A common distractor in cube problems is $\\sqrt{3}$ (the body diagonal). Explain the geometric difference between $\\sqrt{3}$ and $\\sqrt{6}/2$ for a unit cube. (2 steps)", "answer": "- Step 1: $\\sqrt{3}$ is the distance from one **corner to the opposite corner** (the body / space diagonal). All three coordinates of the target are 1, so $\\sqrt{1+1+1} = \\sqrt{3}$.\n- Step 2: $\\sqrt{6}/2$ is the distance from a **vertex to the midpoint of the opposite face** — a *shorter* path because the target is at $(\\tfrac{1}{2}, \\tfrac{1}{2}, 1)$, not $(1,1,1)$. $\\sqrt{(\\tfrac{1}{2})^2 + (\\tfrac{1}{2})^2 + 1^2} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2} \\approx 1.225$. The body diagonal $\\sqrt{3} \\approx 1.732$ is longer, as it must be.\n\n**Takeaway:** Different target points on a cube give different distances. Read the question carefully — \"midpoint of opposite face\" is **not** \"opposite vertex\".", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the ratio problem $Q:R = 5:2$ and $R:S = 3:10$, what is the **strategy** for finding $Q:S$? Why does just multiplying the first and last numbers of each ratio fail? (3 steps)", "answer": "- Step 1: The strategy is to **make the shared letter $R$ have the same value in both ratios**, then read off the combined $Q:R:S$.\n- Step 2: Find the LCM of the $R$-values (2 and 3) which is 6. Scale the first ratio by $\\times 3$ and the second by $\\times 2$:\n$$Q:R = 5:2 \\;\\xrightarrow{\\times 3}\\; 15:6 \\qquad R:S = 3:10 \\;\\xrightarrow{\\times 2}\\; 6:20$$\n- Step 3: Read across: $Q:R:S = 15:6:20$, so $Q:S = 15:20 = 3:4$.\n\n**Why multiplication of the outer numbers fails:** If you naively take $5 \\times 3 = 15$ and $2 \\times 10 = 20$, you get $15:20$ here — accidentally the right answer! But this trick only works in special cases. The reliable method is **aligning the shared letter**.\n\n**Takeaway:** Always align the shared variable. Never trust \"outer number multiplication\" except as a lucky coincidence.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q4, Phuc got $Q:S = 15:10 = 3:2$ at one point, and the tutor corrected it. What is the precise mistake, and what is the *general* rule for scaling ratios? (2 steps)", "answer": "- Step 1: Phuc scaled $R:S = 3:10$ to make $R = 6$ (so multiplied by 2) but **forgot to also scale $S$**. He left $S = 10$ instead of $20$. The correct scaled ratio is $R:S = 6:20$.\n- Step 2: **The general rule:** when you scale a ratio by a multiplier $k$, you must apply $k$ to **both** numbers in the ratio. Ratios are pairs; partial scaling breaks the proportion.\n\n**Takeaway:** A ratio $a:b$ scaled by $k$ is $ka:kb$, not $ka:b$. This is the single most common ratio error.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "At 9:45, why does the tutor say the hour hand is *not* at the 9-position? Walk through where it actually is. (3 steps)", "answer": "- Step 1: The hour hand moves **continuously** around the clock face — it does not \"jump\" from one hour mark to the next at the top of the hour. In 60 minutes it travels $30°$ (one full hour-mark spacing), so in one minute it travels $0.5°$.\n- Step 2: At 9:00 the hour hand is at the 9-position, which is $9 \\times 30° = 270°$ clockwise from 12. After 45 minutes it has moved an additional $45 \\times 0.5° = 22.5°$, so it sits at $292.5°$ clockwise from 12.\n- Step 3: The minute hand at 45 minutes is at the 9-position = $270°$ from 12. The angle between the hands is:\n$$292.5° - 270° = 22.5°$$\n\n**Takeaway:** The continuous-motion fact is the entire reason the question is non-trivial. If the hour hand \"sat\" at 9, the answer would be $0°$ — and that is one of the trap options.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Derive the clock-angle formula $\\theta = |30H - 5.5M|$ from the continuous-motion principle. (3 steps)", "answer": "- Step 1: Hour hand position (in degrees clockwise from 12) after $H$ hours and $M$ minutes is:\n$$30H + 0.5M$$\n(because the hour hand moves $30°$ per hour and an extra $0.5°$ per minute).\n- Step 2: Minute hand position is:\n$$6M$$\n(because the minute hand moves $360°/60 = 6°$ per minute).\n- Step 3: Subtract and take the absolute value to get the (smallest) angle:\n$$\\theta = |30H + 0.5M - 6M| = |30H - 5.5M|$$\n\n**Verification at 9:45:** $|30 \\times 9 - 5.5 \\times 45| = |270 - 247.5| = 22.5°$. ✓\n\n**Takeaway:** Memorise $\\theta = |30H - 5.5M|$. For larger values, if the result exceeds $180°$, take $360° - \\theta$ to get the smaller angle.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why is the \"acute\" angle not always the answer for a clock question? Give an example. (2 steps)", "answer": "- Step 1: The formula $|30H - 5.5M|$ returns the **difference in degrees along the same rotational direction**. If the two hands are far apart (e.g., at 6:00 they are $180°$ apart, but the smaller arc is still $180°$), the result can be larger than the \"obvious\" acute angle.\n- Step 2: The convention is to give the angle **between** the two hands, taken as the smaller of the two arcs. So if the formula gives a value $\\theta$ with $\\theta > 180°$, the actual answer is $360° - \\theta$. For 9:45, $22.5° < 180°$ so no adjustment needed.\n\n**Takeaway:** Always check: if the formula gives a number bigger than $180°$, take the complement to $360°$.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": true}, {"question": "State the mean formula in two equivalent forms. Why is the second form so useful for \"what changes when one quantity is altered\" problems? (2 steps)", "answer": "- Step 1: The mean of $n$ numbers is the sum divided by the count: $\\bar{x} = \\tfrac{\\sum x}{n}$. Equivalently, $\\sum x = n\\bar{x}$ — i.e., the **total sum equals count times mean**.\n- Step 2: This rearrangement is powerful because it lets you compute the **total sum** from the mean (a question usually gives you the mean, not the sum). Once you have $\\sum$ for two scenarios, subtracting them gives the contribution of whatever changed. Q6 is exactly this pattern: $\\sum_{\\text{old}} = 20 \\times 28$, $\\sum_{\\text{new}} = 22 \\times 30$, the new members contributed the difference.\n\n**Takeaway:** Memorise $\\sum = n\\bar{x}$ as a *separate* formula. The most common ESAT move is \"convert mean to sum, then subtract.\"", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "In Q6, the tutor's sticky note says \"Recognise that the mean age increases by 2 years, so the new mean is 30.\" Why is this an important first move, not a trivial restatement? (2 steps)", "answer": "- Step 1: The problem says the mean *increases* by 2 — not that the new mean *is* 30. The student must translate the verbal statement into a numerical fact: new mean = old mean + 2 = $28 + 2 = 30$.\n- Step 2: This is important because students often mistakenly use the *original* mean (28) for the new scenario. That gives $\\sum_{\\text{new}} = 22 \\times 28 = 616$, the contribution of the two new members as $616 - 560 = 56$, and a wrong mean of 28. The first move — set the new mean correctly — eliminates this trap.\n\n**Takeaway:** \"Mean increases by 2\" is a *change* statement. Convert it to a *value* before plugging in.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In Q6, why must the denominator change from 20 to 22 when two new members join? What distractor does this guard against? (2 steps)", "answer": "- Step 1: After 2 new members join, the *total number of members* is $20 + 2 = 22$. The mean formula divides the sum by the *current* count, so the denominator is 22, not 20.\n- Step 2: If you use $n = 20$ for the new scenario, you get $\\sum = 20 \\times 30 = 600$, the new members' total as $600 - 560 = 40$, and the mean of the two new members as $40/2 = 20$ — which is **option A in the question**, a deliberately placed distractor. Updating $n$ is what makes the answer come out to 50 (option E).\n\n**Takeaway:** \"The number of items\" is a count of *what exists in that scenario*. Always re-state $n$ for each scenario separately.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What is the tutor's \"triage\" rule for the ESAT, and approximately when should you trigger it? (2 steps)", "answer": "- Step 1: **Triage = skip and return.** If a question would require deriving something unfamiliar or appears to take more than ~30–60 seconds, mark it and move on. Spend the rest of the time on solvable questions, then return to the skipped ones if time allows.\n- Step 2: At ~90 seconds per question average, getting stuck for 2 minutes on one problem costs you 2–3 other questions you could have answered. The point of triage is to maximise the *number* of correct answers, not the elegance of any one solution.\n\n**Takeaway:** ESAT scoring is \"right minus a fraction of wrong\" (or similar) — so unanswered-with-time-to-spare is much better than a rushed guess on a hard question.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What is the \"read the options first\" strategy, and how does it work for Q1? (2 steps)", "answer": "- Step 1: Before starting the algebra, glance at the options. Note their **form**: are they surds? ratios? integers? Note any obvious differences (sign of $\\pi$, coefficient magnitude, $\\tfrac{1}{4}$ vs $\\tfrac{1}{8}$).\n- Step 2: For Q1, the options all have $20$ or $10$ as the coefficient and $\\pi$ either in $4-\\pi$, $8-\\pi$, or $8+\\pi$. This tells you: (a) the answer is a single surd, not a sum; (b) the denominator will involve either $4-\\pi$ or $8-\\pi$ depending on whether the $\\tfrac{1}{2}$ semicircle factor was kept; (c) $8+\\pi$ would be unphysical (negative subtracted area). You can therefore rule out 2–3 options before finishing the algebra.\n\n**Takeaway:** The options are free hints about which formula you should end up with and which sign/coefficient is correct.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In Q2, the tutor draws the sub-triangle $RQT$ separately from the main diagram and marks equal angles with arcs. What is the purpose of extracting the sub-triangle and using arc notation? (2 steps)", "answer": "- Step 1: **Extracting the sub-triangle** lets you see the similarity as a visual object rather than as overlapping lines on a busy figure. It is a clarity move — you can now reason about two triangles side by side.\n- Step 2: **Arc notation** is the standard way to mark equal angles. Single arc at $P$ and at $\\angle PQT$ says \"these two are equal\"; double arc at $R$ and at $\\angle RQT$ says \"those two are equal.\" Two pairs of equal angles is exactly the **AA similarity criterion** — once marked, similarity is established.\n\n**Takeaway:** Always annotate angle equality when using similarity. Visual marking makes the proof automatic and is faster than a written explanation.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What is the AA similarity criterion, and why is \"two pairs of equal angles\" enough to guarantee triangles are similar? (2 steps)", "answer": "- Step 1: **AA (angle-angle) similarity:** if two triangles have two pairs of corresponding angles equal, they are similar. (In fact, you only need *two* pairs — the third is forced because angles in a triangle sum to $180°$.)\n- Step 2: This is enough because **similarity only cares about shape, not size**, and shape is fully determined by the two smallest angles of a triangle. Once those match, all corresponding sides are in the same ratio, so ratios of sides can be set up directly.\n\n**Takeaway:** AA is the workhorse of ESAT geometry. Look for right angles (trivial equal pair) plus one more shared angle and similarity is in your hands.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "State the formula for the perimeter of a semicircle of radius $r$. Why is it *not* simply $\\pi r$? (2 steps)", "answer": "- Step 1: Perimeter of a semicircle = curved part + straight part = $\\pi r + 2r$.\n- Step 2: The curved half-circumference is $\\pi r$ (half of $2\\pi r$), but you must also add the **diameter** $2r$ (the straight edge cut along). Many students forget the straight edge, giving just $\\pi r$ — wrong.\n\n**Takeaway:** A semicircle has a \"lid\" — its straight diameter. The full perimeter includes both halves.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the Q3 cube problem, the answer is $\\sqrt{6}/2$. The OCR at one frame misread the option as $\\sqrt{3}/2$. What conceptual test would *immediately* tell you $\\sqrt{3}/2$ is wrong? (2 steps)", "answer": "- Step 1: Numerical sanity check: the distance from a vertex to the midpoint of the opposite face must be **less than** the body diagonal $\\sqrt{3} \\approx 1.732$ (the longest distance inside the cube) and **greater than** 1 (the shortest edge). So the answer must lie in $(1, \\sqrt{3})$.\n- Step 2: $\\sqrt{3}/2 \\approx 0.866 < 1$ — that would be **shorter than an edge of the cube**, which is geometrically impossible (you cannot reach a point on the far face in less than one edge length). So $\\sqrt{3}/2$ is ruled out by dimension alone. $\\sqrt{6}/2 \\approx 1.225$ is in the correct range. ✓\n\n**Takeaway:** Always do a quick \"is this the right *order of magnitude*?\" check before accepting an answer.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "What is the relationship between body diagonal, face diagonal, and edge of a cube of side $s$? Order them from smallest to largest. (2 steps)", "answer": "- Step 1: For a cube of side $s$:\n+ **Edge:** $s$\n+ **Face diagonal:** $\\sqrt{2}\\,s$ (across one face: $\\sqrt{s^2 + s^2}$)\n+ **Body diagonal:** $\\sqrt{3}\\,s$ (corner to opposite corner: $\\sqrt{(\\sqrt{2}\\,s)^2 + s^2} = \\sqrt{3}\\,s$)\n- Step 2: So the order is $s < \\sqrt{2}\\,s < \\sqrt{3}\\,s$, or numerically $1 < 1.414 < 1.732$ for $s=1$. The vertex-to-face-midpoint distance $\\sqrt{6}/2 \\approx 1.225$ lies between the edge and the face diagonal, as it must.\n\n**Takeaway:** Knowing this hierarchy lets you sanity-check any cube answer in seconds.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "In the Q5 clock problem, what is the *minimum* thing the student must realise to get the answer right? Why is this the conceptual \"barrier\" of the question? (2 steps)", "answer": "- Step 1: The student must realise that the **hour hand moves continuously** — it is not pinned to the nearest hour mark. Without this, the student places both hands at the 9 position and reads off $0°$ (a trap option).\n- Step 2: This is the barrier because the question is set up precisely to tempt that exact assumption: the phrase \"9:45\" suggests the hour hand is \"at 9\", and only the word \"exactly\" (or absence of \"exactly\") in the question forces you to look more carefully. The math is then trivial; the conceptual step is the only non-trivial part.\n\n**Takeaway:** ESAT clock questions are *about* continuous motion. If you remember that one fact, the rest is arithmetic.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "Why does the tutor say \"draw a diagram — always\" even for problems like the clock or ratio that don't *seem* to need one? (2 steps)", "answer": "- Step 1: A diagram exposes hidden assumptions. For the clock, a hand-drawn face makes it obvious that the hour hand at 9:45 is past the 9, not on it. For the ratio, a line diagram makes it visually clear that the $R$-value must be the same in both segments before they can be combined.\n- Step 2: ESAT time pressure means you want your **diagrams to be fast and rough** (the tutor says \"it doesn't need to be neat\"), not artistic. A 10-second sketch is enough to lock in the geometry; the alternative is to keep the entire configuration in your head, which is where errors come from.\n\n**Takeaway:** A 10-second diagram is almost always faster and more reliable than mental tracking.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the \"translate each sentence into one equation\" strategy for word problems, and how does it apply to Q6? (3 steps)", "answer": "- Step 1: Don't try to solve anything until each English sentence has been converted into a single mathematical statement. This forces you to identify all given quantities and what is unknown.\n- Step 2: For Q6 the sentences and their translations are:\n+ \"Mean of twenty members is 28\" → $\\sum_1 / 20 = 28$, so $\\sum_1 = 560$\n+ \"Two new members join\" → $n$ becomes 22\n+ \"Mean increases by 2\" → new mean = $28 + 2 = 30$\n+ \"New mean is 30 with 22 members\" → $\\sum_2 / 22 = 30$, so $\\sum_2 = 660$\n+ \"Mean of the two new members\" → find $(\\sum_2 - \\sum_1)/2$\n- Step 3: Once you have all five statements, the algebra is mechanical: $(660 - 560)/2 = 50$. No need to \"interpret\" anything mid-problem.\n\n**Takeaway:** Parse the problem first, solve second. Mixing the two wastes time and invites reading errors.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What is the general formula for the body (space) diagonal of a rectangular cuboid with sides $a$, $b$, $c$? Why does this generalise 2D Pythagoras? (2 steps)", "answer": "- Step 1: Body diagonal $d = \\sqrt{a^2 + b^2 + c^2}$.\n- Step 2: Generalisation: in 2D, $c = \\sqrt{a^2 + b^2}$. In 3D, the diagonal from a corner to the opposite corner traverses *three* mutually perpendicular displacements ($a$, $b$, $c$). Each can be combined two-at-a-time via 2D Pythagoras, and the final result is the same. The formula is just the natural extension — \"sum of squares of the perpendicular components.\"\n\n**Takeaway:** You don't need a derivation; the formula is intuitive. For a cube ($a = b = c = 1$), it gives $\\sqrt{3}$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "For Q3, an alternative to the two-step method is to use the 3D distance formula directly. Why does the two-step method still get taught, and when is it actually necessary? (2 steps)", "answer": "- Step 1: The two-step method is taught because not all 3D problems have a clean corner-to-corner path. The vertex-to-face-midpoint problem is one of them — the \"target\" is at $(\\tfrac{1}{2}, \\tfrac{1}{2}, 1)$ relative to the origin, and the distance formula *does* apply directly, giving $\\sqrt{(\\tfrac{1}{2})^2 + (\\tfrac{1}{2})^2 + 1^2} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2}$ in one line.\n- Step 2: The two-step method is essential when the geometry has a **right-angle break** that is not aligned with the cube axes — for example, if a point lies on a face diagonal or a body diagonal that doesn't reach a corner. The two-step approach makes the right angle visible at each stage and is the only safe way for those cases.\n\n**Takeaway:** Direct formula works when the displacement is along the cube axes. Two-step is the universal fallback.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "For the Q2 similar-triangle problem, the lesson uses a \"scale factor $\\div\\sqrt{5}$\" between the large and sub-triangles. Where does the $\\sqrt{5}$ come from geometrically? (2 steps)", "answer": "- Step 1: The hypotenuse of the large triangle is $PR = 10\\sqrt{5}$. The hypotenuse of the sub-triangle (drawn separately) is $RQ = 10$ (it is a leg of the original triangle, but acts as the hypotenuse of the sub-triangle $RQT$).\n- Step 2: The scale factor from the large triangle to the sub-triangle is therefore $10 / 10\\sqrt{5} = 1/\\sqrt{5}$, or equivalently \"$\\div \\sqrt{5}$\". Every other corresponding side shrinks by the same factor. So the side $PQ = 20$ in the large triangle maps to $QT = 20/\\sqrt{5} = 4\\sqrt{5}$ in the sub-triangle.\n\n**Takeaway:** Identify *one pair* of corresponding sides, form the ratio, and apply it to the side you want.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Suppose a clock problem asks for the angle at 12:00. What is the answer, and what conceptual point does this limiting case illustrate? (1 step)", "answer": "- Step 1: At 12:00, both hands coincide at the 12-position, so the angle is $0°$. Using the formula: $|30 \\times 12 - 5.5 \\times 0| = 360°$, but since the result exceeds $180°$ we take $360° - 360° = 0°$ (or equivalently note that the hands are at the same point). The conceptual point: the formula gives the *directed* difference; you must reduce modulo $360°$ to get the actual angle between the hands.\n\n**Takeaway:** When hands coincide, the angle is $0°$ by definition — even though the formula may hand you $360°$ first.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q6, suppose you accidentally used the *original* count $n = 20$ for the new scenario. Walk through what goes wrong and what distractor the answer triggers. (3 steps)", "answer": "- Step 1: Wrong calculation: $\\sum_{\\text{new}} = 20 \\times 30 = 600$ (using the wrong count).\n- Step 2: Contribution of the two new members: $600 - 560 = 40$. Their mean: $40/2 = 20$.\n- Step 3: This gives **20 years**, which is **Option A** in the question — a deliberately placed distractor designed to catch exactly this error.\n\n**Takeaway:** The distractor is there *because the question-writer expected this error*. Slow down on the count $n$ for each scenario.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For Q1, what is the key *visual* insight that lets you set up the equation quickly? (1 step)", "answer": "- Step 1: The picture shows the semicircle's **diameter** lying along one full edge of the square (not the radius along the edge). This is the visual clue that the diameter equals $m$, hence the radius equals $m/2$. If you misread the diagram, you might set the radius equal to $m$ and the diameter equal to $2m$ — which would put the semicircle *outside* the square and make the problem meaningless.\n\n**Takeaway:** Always confirm: does the diameter or the radius sit on the edge? This single visual decision changes the algebra.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "What is the AA similarity criterion's role in Q2 — i.e., how many angle pairs do you actually need to identify, and which are they? (2 steps)", "answer": "- Step 1: In Q2, the **right angle** is shared: the big triangle has a right angle at $Q$, and the sub-triangle has a right angle at $T$ (foot of altitude). That is one pair of equal angles.\n- Step 2: The **angle at $P$** is shared between the big triangle and the sub-triangle $\\triangle PQT$ (it is literally the same angle, not just equal). That is the second pair. By AA, the two triangles are similar — and we never even had to think about the third angle.\n\n**Takeaway:** Look for a right angle first (it is the easiest equal pair) and then one more shared or equal angle. Similarity follows automatically.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "In Q1, the answer form is $20\\sqrt{2/(8-\\pi)}$. Why is it valid to write $\\sqrt{2}/(8-\\pi)$ *under* the same square root? What is the underlying rule? (1 step)", "answer": "- Step 1: The rule is $\\sqrt{a}\\cdot\\sqrt{b} = \\sqrt{ab}$ (and conversely $\\sqrt{a/b} = \\sqrt{a}/\\sqrt{b}$). So $20\\sqrt{2}/\\sqrt{8-\\pi} = 20 \\cdot \\sqrt{2}/\\sqrt{8-\\pi} = 20\\sqrt{2/(8-\\pi)}$. Combining back into a single radical is *allowed* because both numerator and denominator are positive.\n\n**Takeaway:** You can fold numerator and denominator into a single square root when both are positive. This is how option forms are usually written on the ESAT.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": true}, {"question": "In the lesson, the tutor identifies three similar triangles: $\\triangle PQR \\sim \\triangle QTR \\sim \\triangle PTQ$. Why is the *order* of vertices significant? (2 steps)", "answer": "- Step 1: In a similarity statement $\\triangle ABC \\sim \\triangle DEF$, the order is **not arbitrary** — it specifies which vertex corresponds to which. The first letter of each triangle gives the corresponding angle, the second gives the second corresponding angle, and so on.\n- Step 2: So in $\\triangle PQR \\sim \\triangle QTR$, vertex $P$ in the first corresponds to $Q$ in the second; $Q$ to $T$; $R$ to $R$. This tells you immediately which sides are in proportion: $PQ/QR$ in the first corresponds to $QT/TR$ in the second, etc. Get the order wrong and the ratios will be inverted.\n\n**Takeaway:** When writing similarity statements, line up the corresponding vertices in order. Do not write the letters in the order they appear on the page.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "For Q2, the tutor computes the scale factor as $\\div\\sqrt{5}$. Walk through the chain of reasoning that produces this specific number. (3 steps)", "answer": "- Step 1: Start with the *hypotenuse* of the large triangle: $PR = 10\\sqrt{5}$ (computed via Pythagoras from legs 20 and 10).\n- Step 2: Identify the corresponding side in the sub-triangle. The sub-triangle $\\triangle RQT$ has hypotenuse $RQ = 10$.\n- Step 3: Form the ratio (sub ÷ large): $10 / 10\\sqrt{5} = 1/\\sqrt{5}$. So the scale factor is \"divide by $\\sqrt{5}$\", and *every* side of the sub-triangle is the corresponding side of the large triangle divided by $\\sqrt{5}$. Thus $QT = 20/\\sqrt{5}$.\n\n**Takeaway:** The hypotenuse is usually the easiest pair to spot — start there. Then apply the scale factor to the side you actually need.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In Q4, after scaling you have $Q:R:S = 15:6:20$. Why is $Q:S = 15:20$ and *not* $15:6$? (1 step)", "answer": "- Step 1: $Q:S$ asks for the ratio of $Q$ to $S$ **only**, ignoring $R$. So you take the $Q$ value (15) and the $S$ value (20), dropping the middle term entirely: $15:20$, which simplifies to $3:4$.\n\n**Takeaway:** A two-letter ratio hides the middle of the three-way ratio. Don't be tempted to include $R$ \"for completeness\".", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "For the Q5 clock problem, what is the **conceptual reason** the formula $\\theta = |30H - 5.5M|$ works? (2 steps)", "answer": "- Step 1: Both hands rotate in the same direction (clockwise from 12), at constant but different speeds. The hour hand completes $360°$ in 12 hours, the minute hand in 60 minutes.\n- Step 2: The formula subtracts the hour-hand angle from the minute-hand angle (or vice versa) and takes the absolute value, giving the directed difference in degrees. As long as that difference is at most $180°$, it is the angle between the hands.\n\n**Takeaway:** Clock problems are essentially *relative-speed* problems. Same direction, different speeds, take the absolute difference.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In Q6, what does it mean for the *mean* of a group to be a particular number? In particular, is \"mean age = 28\" a statement about each person or about the whole group? (2 steps)", "answer": "- Step 1: The mean is a property of the **whole group**, not of any individual. A mean of 28 does *not* mean every member is 28 — it means the ages *add up* as if they were all 28.\n- Step 2: Concretely, mean = 28 for 20 members means $\\sum = 20 \\times 28 = 560$. This total can be made of any combination of ages (some 18, some 38, some 50) — what matters is the *sum*.\n\n**Takeaway:** A mean is a *summary* — it loses information about individuals. To use it, convert it back to a sum.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "The tutor mentions a \"two-areas trick\" for Q2 as an alternative to similar triangles. State the trick and explain why it is faster. (2 steps)", "answer": "- Step 1: **Trick:** Compute the area of $\\triangle PQR$ in two ways — once using the two legs as base and height, once using the hypotenuse as base and the altitude as height. Set them equal.\n- Step 2: $\\tfrac{1}{2} \\cdot 20 \\cdot 10 = \\tfrac{1}{2} \\cdot 10\\sqrt{5} \\cdot x$ gives $100 = 5\\sqrt{5} \\cdot x$, so $x = 100/(5\\sqrt{5}) = 20/\\sqrt{5} = 4\\sqrt{5}$. This skips the entire similarity identification step and gives the answer in two lines of algebra.\n\n**Takeaway:** Whenever a problem asks for a missing altitude in a right triangle where you know all three sides, try the two-areas trick before falling back to similar triangles.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In Q2, both legs are 20 and 10. What is the *dimension* of the altitude $x$? Sanity-check that $4\\sqrt{5}$ is plausible. (2 steps)", "answer": "- Step 1: All three sides (20, 10, $10\\sqrt{5}$) and the altitude $x$ are lengths, so the answer should have units of cm. $4\\sqrt{5} \\approx 8.94$ cm.\n- Step 2: The altitude to the hypotenuse must be **shorter than each leg** (it sits inside the triangle). $4\\sqrt{5} \\approx 8.94 < 10 < 20$ — both legs are longer. ✓ Also, the altitude is **less than half the longer leg**, which is geometrically reasonable. So the answer is dimensionally and geometrically sensible.\n\n**Takeaway:** Always sanity-check an answer's magnitude against the known sides. A \"right\" algebraic answer with a \"wrong\" magnitude is a sign of an error somewhere.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "The tutor mentions that on the ESAT, the **pace is the primary challenge, not the difficulty**. If a question takes 3 minutes, what is the cascading effect on the rest of the module? (2 steps)", "answer": "- Step 1: At ~90 seconds per question, a 3-minute question consumes 4 questions' worth of time. To compensate, you would have to complete the remaining 26 questions in $40 - 3 = 37$ minutes, i.e., ~85 seconds each — feasible only with no other slowdowns.\n- Step 2: The cascading risk is that one slow question forces you to *rush* the next few, increasing the chance of silly errors. Two slow questions and the rest of the module is unrecoverable. Triage (skip and return) is the only sustainable defence.\n\n**Takeaway:** A single hard question is a *time-budget* problem as much as a *math* problem. Plan your 40 minutes across 27 questions, not question by question.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "For Q5, the tutor's first move is to write $\\frac{9.75}{12} \\times 360°$ for the hour-hand position. Where does the $9.75$ come from? (1 step)", "answer": "- Step 1: $9.75$ hours is the time in hours: $9$ hours $45$ minutes $= 9 + 45/60 = 9.75$ hours. The hour hand has completed $\\frac{9.75}{12}$ of a full revolution. Multiplying by $360°$ gives its position in degrees from 12: $0.8125 \\times 360° = 292.5°$.\n\n**Takeaway:** Converting \"h:mm\" to \"decimal hours\" by $H + M/60$ is the cleanest setup for clock-angle work.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": true}, {"question": "Why does the answer to Q3, $\\sqrt{6}/2$, also equal $\\sqrt{3/2}$? When might you see each form? (1 step)", "answer": "- Step 1: $\\sqrt{6}/2 = \\sqrt{6}/\\sqrt{4} = \\sqrt{6/4} = \\sqrt{3/2}$. The two forms are algebraically identical. ESAT options may write the same number as $\\sqrt{6}/2$ (rationalised) or $\\sqrt{3/2}$ (under one radical). **Always rationalise** so that the surd is in the numerator — but recognise both forms as the same value.\n\n**Takeaway:** Don't be fooled by equivalent forms. $\\sqrt{6}/2 = \\sqrt{3/2} = \\tfrac{1}{2}\\sqrt{6}$.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": true}, {"question": "Q4's lesson contains a visible earlier wrong attempt ($Q:S = 15:10 = 3:2$) that is later corrected. What does this reveal about ESAT preparation? (2 steps)", "answer": "- Step 1: **Errors are part of the learning process.** Even with a clear method, students make partial-scaling errors. The point of timed practice is to make these errors *visible* before the exam, when they can still be fixed.\n- Step 2: The correction in real time — with the tutor pointing out \"you forgot to scale S\" — is exactly the kind of feedback the student cannot get from AI auto-grading. A human tutor (or a careful self-review) catches the partial-scaling bug; a green checkmark from AI does not.\n\n**Takeaway:** When you do practice questions, **mark them yourself honestly**. The value is in spotting your own error pattern, not in seeing the correct answer.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In Q1, why is it physically impossible to have $8 + \\pi$ in the denominator of the side-length expression, even if a wrong algebra path leads there? (1 step)", "answer": "- Step 1: $8 + \\pi > 8$ would make the denominator *larger* than the equivalent $8 - \\pi$, but the *area removed* is proportional to $\\pi$, not $-\\pi$. Physically, subtracting a semicircle always *reduces* the area, so the factor multiplying $m^2$ on the LHS must be **less than 1** but still **positive** — both $4-\\pi$ and $8-\\pi$ are positive (since $\\pi < 4$ and $\\pi < 8$), so the side length is real. $8+\\pi$ would correspond to *adding* a semicircle, which contradicts the problem.\n\n**Takeaway:** Use physical sign intuition to eliminate nonsense options before doing the algebra.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "For Q6, the second sticky note says \"Recognise that the mean age increases by 2 years, so the new mean is 30. This helps to simplify the sums.\" Walk through exactly *how* this simplification helps. (2 steps)", "answer": "- Step 1: Once you know the new mean is 30, the second scenario's sum is **immediately** $22 \\times 30 = 660$ — no extra reasoning needed.\n- Step 2: Compare to the alternative: you might first think \"I need to find the new mean\" and try to compute it from the data. But the problem *tells* you the mean increases by 2; you just need to read that off and apply it. This saves a step and removes a place to make an error.\n\n**Takeaway:** Don't *re-derive* facts the problem has handed you. The line \"mean increases by 2\" is the new mean, full stop.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Why is the value of the *shared* letter in a combined-ratio problem always the LCM of its two appearances? Why not some other common multiple? (2 steps)", "answer": "- Step 1: The shared letter must be the **same numerical value in both rows**, and both rows must remain proportional to their original ratios. So you need a common multiple of the two $R$-values (2 and 3) that preserves proportionality.\n- Step 2: The **smallest** such common multiple is the LCM (here, 6). Any larger common multiple (12, 18, 24, ...) would also work but would give a less-simplified final answer that needs further reduction. LCM is the most efficient choice.\n\n**Takeaway:** Use LCM to minimise arithmetic. Larger common multiples give the same answer with more cancellation later.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "The lesson's Q2 result is $x = 4\\sqrt{5}$. What would change in the problem if the ratio $RQ:PQ$ were $1:\\sqrt{3}$ instead of $1:2$? Sketch the conceptual impact on the answer. (2 steps)", "answer": "- Step 1: The general shape of the problem is unchanged: a right triangle, drop altitude to hypotenuse, use two-areas trick.\n- Step 2: But the numbers shift: if $PQ = 20$ and $RQ = 20/\\sqrt{3}$, then $PR = \\sqrt{400 + 400/3} = \\sqrt{1600/3} = 40/\\sqrt{3}$. The altitude $h = ab/c = (20 \\cdot 20/\\sqrt{3})/(40/\\sqrt{3}) = 10$. So the answer would be a clean integer instead of a surd.\n\n**Takeaway:** The \"shape\" of the problem (right triangle, altitude, similar triangles, two-areas trick) is invariant; only the *numbers* and thus the *form* of the final answer change. Recognise the shape first, then plug in.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "Q3 has the answer $\\sqrt{6}/2$. If the problem asked for the *body diagonal* of the same unit cube (vertex to opposite vertex), what would the answer be, and what would the two-step method look like? (3 steps)", "answer": "- Step 1: Body diagonal $d = \\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3}$.\n- Step 2: Two-step method: diagonal of base face = $\\sqrt{1^2 + 1^2} = \\sqrt{2}$. Then body diagonal = $\\sqrt{(\\sqrt{2})^2 + 1^2} = \\sqrt{2+1} = \\sqrt{3}$.\n- Step 3: So the two methods give the same answer. The two-step method is useful for visualisation; the direct formula is faster for computation.\n\n**Takeaway:** For a cube, $\\sqrt{3}$ (body) > $\\sqrt{2}$ (face) > 1 (edge). Memorise this hierarchy.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "Why does the tutor stress that the *mean* age of the new members is a \"new\" mean — i.e., not the mean of the entire 22-person group? What linguistic feature of the problem makes this clear? (2 steps)", "answer": "- Step 1: The problem asks: \"What is the mean age of the **two new members**?\" — i.e., the mean *restricted to those two people*, not the mean of all 22.\n- Step 2: This is a classic ESAT trap: students answer with the *new group mean* (30), confusing it with the *subgroup mean* (50). The phrase \"the two new members\" defines a subgroup, and the question asks for that subgroup's mean specifically.\n\n**Takeaway:** Identify the *scope* of the mean in the question. \"Mean of the whole group\" vs \"mean of a subset\" are different numbers.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "For Q5, the trap option $7.5°$ corresponds to a *common* error. What is that error, and what fraction of the full hour does it correspond to? (2 steps)", "answer": "- Step 1: $7.5°$ would be the angle if the hour hand moved only $7.5°$ past 9 in 45 minutes, i.e., $0.166°$ per minute or $10°$ per hour. This is wrong by a factor of 2 — students sometimes think the hour hand moves $15°$ per quarter hour (half of $30°$).\n- Step 2: The correct motion is $30°$ per hour, so $22.5°$ in 45 minutes ($\\tfrac{3}{4}$ of $30°$). $7.5°$ corresponds to $\\tfrac{1}{4}$ of $30°$ — i.e., 15 minutes past 9:00, not 45.\n\n**Takeaway:** $7.5°$ at 9:45 is the answer to \"where would the hour hand be at 9:15?\" The trap is testing whether you computed the right *elapsed time*.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "In the lesson, Phuc's first attempt at Q1 used full-circle area; his first attempt at Q4 forgot to scale S. What *single* meta-skill would have caught both errors? (2 steps)", "answer": "- Step 1: **Compare the intermediate form to the answer options** before finalising. For Q1, \"if I used $\\pi r^2$ instead of $\\tfrac{1}{2}\\pi r^2$, my denominator would be $4-\\pi$, not $8-\\pi$; I can see that $4-\\pi$ is an option (B, E), so I should re-check.\" For Q4, \"the question asks for $Q:S$ in simplest form, so my final answer $3:2$ should be checked by recomputing $Q$ and $S$ independently.\"\n- Step 2: This is the **diagnostic loop**: after solving, ask \"could this answer be wrong in a *specific* way?\" and look for that signature in the options or by recomputation. AI homework hides this loop; honest self-marking reveals it.\n\n**Takeaway:** Build the habit of asking \"what could go wrong here?\" before declaring an answer final. The most common ESAT errors have predictable signatures.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": true}], "count": 60}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In the ESAT Maths 1 exam, what is the time per question, and why is this fact the central challenge of the exam rather than the question difficulty itself? (2 steps)", "answer": "- Step 1: ESAT Maths 1 gives you 40 minutes for 27 multiple-choice questions, which works out to roughly 90 seconds per question.\n- Step 2: Because the time per question is so tight, the bottleneck is never \"can I solve this?\" but \"can I solve this fast enough?\". This means techniques like diagram-sketching, eliminating options, and skipping stuck questions become as important as raw mathematical knowledge. A student who can solve a problem in 3 minutes is still at risk if they can't compress that to under 90 seconds.\n\nThe exam rewards *fluency* (recognising problem types instantly) more than *depth* (clever derivations from scratch).", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In ESAT, why is it critical to know that the marking scheme only awards marks for the final answer and that no method marks are given? (2 steps)", "answer": "- Step 1: Since only the final answer is marked, any working you produce on the computer is invisible to the grader. A correct approach with one arithmetic slip earns zero, while a wrong method that happens to land on a listed option would be marked (though obviously you cannot engineer this).\n- Step 2: This means in practice you should: (a) set up the algebra carefully, (b) verify the algebra at least once if time allows, and (c) resist the temptation to write a long derivation on scrap paper — it doesn't transfer into a safety net. The work is only useful as a thinking aid *for you*, not as evidence to be marked.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Why is \"no calculator\" combined with \"no formula sheet\" a double constraint, and what does this imply for your study strategy? (2 steps)", "answer": "- Step 1: The double constraint means: every numerical computation (square roots, decimals, large multiplications) must be done mentally or with hand-written shortcuts, and every formula (semicircle area, 3D Pythagoras, etc.) must be retrieved from memory.\n- Step 2: The strategic implication is that ESAT preparation must be split into two parallel tracks: *formula memorisation* (write the formulas out repeatedly until they are automatic) and *mental arithmetic fluency* (practise surd simplification, rationalising, and integer arithmetic without leaning on a calculator). Harry's advice to practise *untimed* first makes sense precisely because you cannot build either skill under exam pressure — both must be automatic before the clock starts.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the area of a semicircle of radius $$r$$, and what is the conceptual reason for the factor of $$\\tfrac{1}{2}$$? (2 steps)", "answer": "- Step 1: The area is $$\\text{Semicircle area} = \\tfrac{1}{2}\\pi r^2$$.\n- Step 2: The factor $$\\tfrac{1}{2}$$ comes from the fact that a semicircle is *half* of a full circle. The full circle area is $$\\pi r^2$$ (derived from integrating circumference over radius, or simply memorised), and cutting it in half along a diameter gives $$\\tfrac{1}{2}\\pi r^2$$.\n\nThe most common error in ESAT is to write $$\\pi r^2$$ for a semicircle (forgetting the half). Whenever you see a semicircle in a problem, mentally underline \"half a circle\" before writing the formula.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In Phuc's first attempt on the semicircle-in-square problem, he wrote $$m^2 - \\pi r^2 = 100$$. What was wrong, and what symbolic mistake would this produce in the final answer? (2 steps)", "answer": "- Step 1: Phuc wrote the equation for a *full* circle being subtracted from the square, when the problem specifies a semicircle is cut out. The correct form is $$m^2 - \\tfrac{1}{2}\\pi r^2 = 100$$.\n- Step 2: This missing $$\\tfrac{1}{2}$$ propagates: the algebra would later produce a denominator of $$4-\\pi$$ (from $$1 - \\pi/4$$) instead of the correct $$8-\\pi$$ (from $$1 - \\pi/8$$). So the wrong formula doesn't just give a \"slightly off\" answer — it gives a *categorically different* option (B or E in the list), making it a multiple-choice trap.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In the semicircle-in-square problem, why is the algebraic strategy of *factoring out* $$m^2$$ before expanding preferable to expanding and then collecting terms? (2 steps)", "answer": "- Step 1: After substitution, the equation has the form $$m^2 - \\tfrac{\\pi m^2}{8} = 100$$. Both terms on the left contain $$m^2$$ as a common factor, so factoring gives $$m^2(1 - \\tfrac{\\pi}{8}) = 100$$ in one line.\n- Step 2: This factoring keeps the variable appearing in *one place*, which is much easier to solve for and reduces the chance of arithmetic slips. Expanding fully first would give terms like $$m^2 - 0.3927 m^2 = 100$$, which is numerically messier and obscures the clean structure. The general principle: when a single variable appears in every term, factor it out immediately.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "State the 2D Pythagoras theorem and explain *why* it is a theorem about right-angled triangles specifically, not all triangles. (2 steps)", "answer": "- Step 1: For a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$: $$a^2 + b^2 = c^2$$.\n- Step 2: The relation $$a^2 + b^2 = c^2$$ holds *only* when the angle between the legs is exactly $$90°$$. The deeper reason is that the right angle is what allows the law of cosines to reduce from its full form $$c^2 = a^2 + b^2 - 2ab\\cos(C)$$ (where $$C$$ is the included angle) to the simple form — because $$\\cos(90°) = 0$$, the cross term vanishes. For non-right triangles, the squared side relation involves the cosine of the included angle, not a clean sum of squares.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "In the unit-cube 3D Pythagoras problem, why must you apply Pythagoras *twice* (i.e., as two successive 2D steps) rather than once with three components? (3 steps)", "answer": "- Step 1: A line in 3D space goes from one corner of the cube to a point that is *not* a corner — specifically, to the *midpoint* of a face. So the displacement has three nonzero coordinates (e.g., $$1, \\tfrac{1}{2}, \\tfrac{1}{2}$$), and the distance is $$\\sqrt{1^2 + (\\tfrac{1}{2})^2 + (\\tfrac{1}{2})^2} = \\sqrt{1 + \\tfrac{1}{4} + \\tfrac{1}{4}} = \\sqrt{\\tfrac{3}{2}}$$... but this is the *space diagonal* of a different shape, not what the problem asks.\n- Step 2: Wait — actually the direct formula $$d = \\sqrt{x^2 + y^2 + z^2}$$ *does* apply if you set up the coordinates correctly. The midpoint of the opposite face from vertex $$(0,0,0)$$ in a unit cube is at $$(1, 1, \\tfrac{1}{2})$$ (or any permutation), so $$d = \\sqrt{1 + 1 + \\tfrac{1}{4}} = \\sqrt{\\tfrac{9}{4}} = \\tfrac{3}{2}$$... still not $$\\tfrac{\\sqrt{6}}{2}$$.\n- Step 3: The point is that the face midpoint in the question is on a face *adjacent* to the vertex's opposite face in a specific configuration, giving the displacement $$(1, \\tfrac{1}{2}, \\tfrac{1}{2})$$ → $$d = \\sqrt{1 + \\tfrac{1}{4} + \\tfrac{1}{4}} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2}$$. The \"two successive 2D steps\" approach is just a *decomposition* of this single 3D Pythagoras into easier mental stages: (i) find the base diagonal of length $$\\tfrac{\\sqrt{5}}{2}$$, then (ii) treat that diagonal and the vertical $$\\tfrac{1}{2}$$ as the legs of a 2D right triangle. Both methods give the same answer; the two-step version is easier to visualise and less error-prone.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "In a right-angled triangle, why does dropping a perpendicular from the right-angle vertex to the hypotenuse always create two *similar* triangles? (2 steps)", "answer": "- Step 1: When you drop a perpendicular from the right-angle vertex $$Q$$ to the hypotenuse $$PR$$, the foot of the perpendicular (call it $$T$$) splits the original triangle $$PQR$$ into two smaller triangles: $$PQT$$ and $$RQT$$.\n- Step 2: All three triangles (the big $$PQR$$ and the two sub-triangles) share angles in a specific way: each sub-triangle has the right angle at $$T$$, and each also retains one of the acute angles from the original triangle. By AA similarity, all three are similar to each other. This is the geometric reason the same hypotenuse-altitude formula $$h = ab/c$$ works — and also why the lesson could use *either* a similarity ratio argument *or* a \"two areas\" argument to derive $$QT$$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Derive the altitude formula for a right-angled triangle: if legs are $$a, b$$ and hypotenuse is $$c$$, then the altitude $$h$$ from the right-angle vertex to the hypotenuse equals $$h = \\frac{ab}{c}$$. (3 steps)", "answer": "- Step 1: Compute the area of the right triangle two different ways.\n  + **Way 1 (using legs):** $$\\text{Area} = \\tfrac{1}{2} \\cdot a \\cdot b$$.\n  + **Way 2 (using hypotenuse as base and altitude as height):** $$\\text{Area} = \\tfrac{1}{2} \\cdot c \\cdot h$$.\n- Step 2: Equate the two expressions for area: $$\\tfrac{1}{2} ab = \\tfrac{1}{2} ch$$.\n- Step 3: Cancel the $$\\tfrac{1}{2}$$ and solve for $$h$$: $$h = \\frac{ab}{c}$$.\n\nThe key conceptual point: the *area of a triangle is invariant* — it doesn't depend on which side you choose to be the base, as long as the height is measured perpendicular to that base. This invariance is what lets the formula hold.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In the lesson's Q2, two solution methods were used: (A) similar triangles with a scaling factor, and (B) the \"two areas\" trick. Why might Method B be faster on exam day? (2 steps)", "answer": "- Step 1: Method A requires: identifying the similar sub-triangle, drawing it, marking equal angles with arcs, working out the scaling ratio (e.g., $$\\div\\sqrt{5}$$), and applying it. This involves several mental stages where errors can creep in.\n- Step 2: Method B (two areas) requires only: (i) compute the area as $$\\tfrac{1}{2} \\cdot 20 \\cdot 10 = 100$$, (ii) compute the hypotenuse $$\\sqrt{20^2 + 10^2} = 10\\sqrt{5}$$, (iii) set $$\\tfrac{1}{2} \\cdot 10\\sqrt{5} \\cdot h = 100$$ and solve. This is mechanical, has fewer conceptual steps, and is harder to mess up under time pressure. The lesson explicitly demonstrates both to show that *the simpler algebraic insight wins on exam day* even when the geometric intuition is correct.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is rationalising the denominator, and why is it specifically required for ESAT answer options? (2 steps)", "answer": "- Step 1: Rationalising the denominator means rewriting a fraction so that there is no surd (square root) in the denominator. The trick is to multiply both the numerator and denominator by the same surd, which leaves the value unchanged (you are multiplying by 1): $$\\frac{a}{\\sqrt{b}} = \\frac{a}{\\sqrt{b}} \\cdot \\frac{\\sqrt{b}}{\\sqrt{b}} = \\frac{a\\sqrt{b}}{b}$$.\n- Step 2: ESAT options are conventionally written with rational denominators (e.g., $$4\\sqrt{5}$$ rather than $$\\tfrac{20}{\\sqrt{5}}$$). The reason is partly aesthetic and partly to make visual comparison of options easier (all options are then in \"numerator form\"). If you produce the unreduced form, you'll find your correct answer is *not listed*, wasting time. **Always rationalise at the end** before scanning the option list.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In the combined ratio problem (Q : R = 5 : 2, R : S = 3 : 10), what is the conceptual reason for lining the ratios up *vertically* before combining? (2 steps)", "answer": "- Step 1: The two ratios share the common term $$R$$, but $$R$$ has *different numerical values* in each: $$R = 2$$ in the first ratio and $$R = 3$$ in the second. You cannot directly concatenate them into a three-way ratio until $$R$$ represents the same underlying quantity in both rows.\n- Step 2: The vertical alignment makes the shared term visible. You then scale each row by the smallest integer that makes $$R$$ match (LCM of 2 and 3 = 6: scale the first row by 3, the second by 2). After scaling, $$R = 6$$ in both rows, and the three-way ratio $$Q:R:S = 15:6:20$$ becomes a valid consistent reading. The principle: *ratios are not numbers; they are scale-invariant relationships*, so direct addition/subtraction is meaningless without first aligning the underlying quantities.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Phuc's error on the ratio problem was giving $$Q:S = 15:10 = 3:2$$ instead of the correct $$15:20 = 3:4$$. What went wrong step-by-step? (2 steps)", "answer": "- Step 1: Phuc correctly scaled the first ratio $$Q:R = 5:2$$ by $$\\times 3$$ to get $$15:6$$. But then for the second ratio, he wrote $$S = 10$$ (the un-scaled value) instead of $$10 \\times 2 = 20$$.\n- Step 2: The rule is: when you scale a ratio by a multiplier, *every term* in that ratio must be multiplied by it. He applied the $$\\times 2$$ scaling to the $$R$$ value (to make it match 6) but forgot to apply the same scaling to the $$S$$ value. The lesson's sticky note *\"Line up the ratio\"* is the takeaway — once you commit to a scaling, do it consistently on the whole row.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "At 9:45 on a clock, why is the hour hand *not* pointing exactly at the 9? (2 steps)", "answer": "- Step 1: A common student intuition is that the hour hand points to \"9\" at 9:00, \"10\" at 10:00, and so on, and so at 9:45 it must point somewhere between 9 and 10 — but where exactly?\n- Step 2: The hour hand moves *continuously*, not in jumps. In one full hour (60 minutes) the hour hand sweeps through 30° (one hour-mark on the clock face). So in 45 minutes past the hour, it has moved $$\\tfrac{45}{60} \\times 30° = 22.5°$$ past the 9 position. The minute hand does jump in 1-minute increments (60 jumps per hour, each 6°), but the hour hand is in smooth motion. This continuous motion is the source of the famous 22.5° answer at 9:45 — not 0° (coincident hands), not 7.5° (only 15 min past), and not 30° (a full hour-mark).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Derive the formula $$\\theta = |30H - 5.5M|$$ for the angle between clock hands at time $$H:M$$. (3 steps)", "answer": "- Step 1: Position of minute hand (degrees clockwise from 12): in $$M$$ minutes, it sweeps through $$\\tfrac{M}{60} \\times 360° = 6M$$ degrees. So minute hand position = $$6M$$.\n- Step 2: Position of hour hand (degrees clockwise from 12): in $$H$$ hours and $$M$$ minutes, it sweeps through $$H \\times 30° + \\tfrac{M}{60} \\times 30° = 30H + 0.5M$$ degrees. So hour hand position = $$30H + 0.5
