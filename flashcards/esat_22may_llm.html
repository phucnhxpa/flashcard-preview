diameter equals the side $$m$$, the radius is $$\\frac{m}{2}$$.\n- Step 2: This error manifests clearly in the final denominator. The correct subtraction yields $$m^2 - \\frac{\\pi m^2}{8}$$, factoring to $$m^2(\\frac{8-\\pi}{8})$$, leading to an $$8-\\pi$$ term. The incorrect full-circle subtraction yields $$m^2 - \\frac{\\pi m^2}{4}$$, factoring to $$m^2(\\frac{4-\\pi}{4})$$, which incorrectly produces a $$4-\\pi$$ term in the final answer options.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "If the mean age problem had stated that the mean increased by exactly 2 years when *twenty* new members joined instead of two, why would the newcomers’ mean age still need to be higher than 30, but by a smaller margin? (2 steps)", "answer": "- Step 1: Pulling an average up requires the incoming batch to lie above the target average. With twenty newcomers and twenty originals, the new group has equal weight from both cohorts. The new mean is the simple average of the old mean (28) and the newcomers’ mean ($$\\bar{x}_{\\text{new}}$$). To land at 30, the equation $$\\frac{28 + \\bar{x}_{\\text{new}}}{2} = 30$$ gives $$\\bar{x}_{\\text{new}} = 32$$.\n- Step 2: With only two newcomers, those two individuals must drag twenty people upward, so their mean is 50. With twenty newcomers, the burden is shared across a much larger incoming group; each newcomer only needs to be slightly above the desired final mean. This illustrates the general principle: the smaller the incoming group relative to the existing population, the more extreme its average must be to shift the overall mean by a fixed amount.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "At 9:45, the minute hand points at the 9 position. One student says the angle is 0° (both hands at 9); another says 7.5° (hour hand moved a quarter of 30°). Why are both wrong? (2 steps)", "answer": "- Step 1: The 0° answer assumes the hour hand sits at the 9 mark because it's \"9-something.\" But the hour hand moves continuously — at 9:45, it has been 45 minutes (¾ of an hour) since 9:00, so it has moved $$\\frac{3}{4} \\times 30° = 22.5°$$ past the 9, not 0°.\n- Step 2: The 7.5° answer calculates ¼ of 30° instead of ¾. This confuses \"quarter of an hour\" (15 minutes) with the actual time elapsed (45 minutes). At 9:45, 45 minutes have passed since 9:00, which is ¾ of the way from 9 to 10. The correct additional movement is $$\\frac{45}{60} \\times 30° = 22.5°$$, giving an angle of 22.5° between the hands.\n\nBoth 0° and 7.5° are deliberate distractor options on the ESAT, targeting these two specific misconceptions.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Across all six worked problems, five of them eventually reduce to an algebraic equation of the form $$\\text{(known)} = \\text{(unknown)} \\times \\text{(factor)}$$. Why is “isolate the unknown by dividing by the factor” the dominant conceptual move in ESAT geometry, and what does this imply about how you should read the answer options? (2 steps)", "answer": "- Step 1: Geometry formulas are multiplicative: area = base × height, mean = sum ÷ count, similar-triangle ratios are proportions. The unknown side or length is almost always embedded inside a product or quotient with known numbers. Isolation therefore requires one division (or root extraction), which is why the answer options are invariably fractions or surds rather than integers.\n- Step 2: This implies that when reading options, you should look for the structural skeleton $$k\\sqrt{\\frac{a}{b}}$$ or $$\\frac{p\\sqrt{q}}{r}$$ rather than mentally computing decimal values. If your derived expression has the same algebraic skeleton as one option, you can select it without evaluating the radical numerically, saving precious seconds.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "Quick conceptual exercise: At 12:10, are the clock hands closer together or farther apart than at 12:00? By roughly how many degrees? (2 steps)", "answer": "- Step 1: At 12:00 the hands overlap (0°). At 12:10, the minute hand has moved to the 2 position ($$10 \\times 6° = 60°$$ from 12), while the hour hand has crept forward by $$10 \\times 0.5° = 5°$$.\n- Step 2: The angle is $$|60° - 5°| = 55°$$. The hands are now 55° apart — they've separated significantly in just 10 minutes because the minute hand moves much faster than the hour hand.\n\nThe minute hand gains 5.5° per minute on the hour hand. In 10 minutes: $$10 \\times 5.5° = 55°$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "You encounter an ESAT geometry question where the answer options include both $$8+\\pi$$ and $$8-\\pi$$ in denominators. How can you use physical reasoning to eliminate one without solving? (2 steps)", "answer": "- Step 1: Consider what the expression represents. In the semicircle-in-square problem, the denominator comes from $$(1 - \\pi/8)$$, which is the fraction of the square that remains after cutting out the semicircle. Since $$\\pi/8 \\approx 0.393$$, the remaining fraction is about 0.607 — a positive number less than 1.\n- Step 2: If the denominator were $$8 + \\pi$$, that would correspond to $$(1 + \\pi/8)$$, implying the remaining area is more than the full square — physically impossible when material has been removed. So $$8 + \\pi$$ in the denominator is wrong by a sign check. The correct denominator must be $$8 - \\pi$$ because we subtracted area.\n\nUse physical constraints (areas must be positive, removing material reduces area) to eliminate options before computing.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "Suppose an ESAT problem states that a square’s side is expressed as $$m = 20\\sqrt{\\frac{2}{8-\\pi}}$$. A student plugs in $$\\pi \\approx 3$$ and estimates $$m \\approx 20\\sqrt{\\frac{2}{5}} \\approx 20 \\times 0.63 \\approx 12.6$$. Why is this estimation useful as a sanity check, and what would it reveal if their algebra had accidentally produced an option like $$m = 20\\sqrt{\\frac{2}{4-\\pi}}$$? (2 steps)", "answer": "- Step 1: Approximating $$\\pi$$ as 3 turns the denominator into a small integer, letting you estimate the radicand and square root mentally. This yields a rough numeric sense of the side length (around 12–13 cm) that you can compare against the diagram’s “not to scale” but still suggestive proportions.\n- Step 2: If the algebra had mistakenly used $$4 - \\pi$$ (the half-circle error), the radicand becomes $$\\frac{2}{4-\\pi} \\approx \\frac{2}{1} = 2$$, giving $$m \\approx 20\\sqrt{2} \\approx 28.3$$. This is nearly triple the previous estimate and visually inconsistent with a shape whose remaining area is only 100 cm². The discrepancy flags the algebraic error immediately.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "In Q6, what does it mean for the *mean* of a group to be a particular number? In particular, is \"mean age = 28\" a statement about each person or about the whole group? (2 steps)", "answer": "- Step 1: The mean is a property of the **whole group**, not of any individual. A mean of 28 does *not* mean every member is 28 — it means the ages *add up* as if they were all 28.\n- Step 2: Concretely, mean = 28 for 20 members means $\\sum = 20 \\times 28 = 560$. This total can be made of any combination of ages (some 18, some 38, some 50) — what matters is the *sum*.\n\n**Takeaway:** A mean is a *summary* — it loses information about individuals. To use it, convert it back to a sum.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "In the similar-triangles problem, the side lengths 10, 20, and $$10\\sqrt{5}$$ form a right triangle. Without computing, how can you recognize that $$\\sqrt{5}$$ will appear in the similarity scale factor, and why does this make rationalization inevitable? (2 steps)", "answer": "- Step 1: The legs are in ratio $$1:2$$. Any right triangle with legs in ratio $$1:2$$ has hypotenuse $$\\sqrt{1^2+2^2} = \\sqrt{5}$$ times the shorter leg. Here the shorter leg is 10, giving hypotenuse $$10\\sqrt{5}$$.\n- Step 2: Because the hypotenuse introduces a $$\\sqrt{5}$$ and the altitude formula involves dividing the product of legs by the hypotenuse, the raw result naturally contains $$\\sqrt{5}$$ in the denominator. Since ESAT surd answers are rationalized, you must anticipate this step.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "In a right-angled triangle, when you drop a perpendicular from the right-angle vertex to the hypotenuse, why are the two smaller triangles similar to each other and to the original? (3 steps)", "answer": "- Step 1: Consider the original triangle $$\\triangle PQR$$ with right angle at $$Q$$. Drop a perpendicular from $$Q$$ to point $$T$$ on hypotenuse $$PR$$. This creates two smaller triangles: $$\\triangle PQT$$ and $$\\triangle RQT$$.\n- Step 2: All three triangles share the same set of three angles:\n  + $$\\triangle PQR$$ has angles: 90° at Q, angle P, angle R\n  + $$\\triangle PQT$$ has angles: 90° at T, angle P (shared with original), so the third angle must equal angle R\n  + $$\\triangle RQT$$ has angles: 90° at T, angle R (shared with original), so the third angle must equal angle P\n- Step 3: Since all three triangles have the same three angle measures (just rearranged into different positions), they are all similar by the AA (angle-angle) criterion. This means their corresponding sides are in proportion — which is the key to computing the altitude length.\n\nThe deep insight: dropping the altitude doesn't create \"new\" angles — it just redistributes the same three angles into different triangle configurations.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "In a square of side $$m$$ with a semicircle removed from one edge (diameter equal to the full side), the remaining area is 100 cm². What is the fundamental \"conservation of area\" equation that relates these quantities, and why is it crucial to express the radius in terms of $$m$$ before solving? (2 steps)", "answer": "- Step 1: The equation is $$\\text{Area}_{\\text{square}} - \\text{Area}_{\\text{semicircle}} = 100$$, which becomes $$m^2 - \\frac{1}{2}\\pi\\left(\\frac{m}{2}\\right)^2 = 100$$. This reflects that the metal left over equals the original square minus the piece cut out.\n- Step 2: Expressing the radius as $$r = \\frac{m}{2}$$ immediately ensures the equation has only one variable, matching the answer options which are all expressed solely in terms of $$m$$. Introducing a separate variable $$r$$ creates an extra unknown that must be eliminated later, wasting precious seconds and adding a point of failure.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "Why does the area of a semicircle equal $$\\tfrac{1}{2}\\pi r^2$$ rather than $$\\pi r^2$$? Explain the intuition and what goes wrong if you forget the half. (2 steps)", "answer": "- Step 1: A full circle has area $$\\pi r^2$$. A semicircle is exactly half of a full circle — it spans 180° instead of 360°. By symmetry, cutting a circle along any diameter splits it into two equal halves, so each semicircle has area $$\\tfrac{1}{2}\\pi r^2$$. This is a direct consequence of the proportionality of area to the central angle.\n- Step 2: If you forget the $$\\tfrac{1}{2}$$ and write $$\\pi r^2$$ for the semicircle, you are subtracting **twice** the correct amount from the enclosing shape. In the semicircle-in-square problem from the lesson, this error replaces $$8 - \\pi$$ in the denominator with $$4 - \\pi$$ — a completely different expression that matches a wrong option. The exam deliberately includes such distractors.\n\nThe $$\\tfrac{1}{2}$$ is the single most common slip in semicircle problems; always write the full formula first, then substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "When solving the semicircle-in-square problem, a student factors to $$m^2\\left(1 - \\frac{\\pi}{8}\\right) = 100$$. Intuitively, what does the bracketed term $$\\left(1 - \\frac{\\pi}{8}\\right)$$ represent about the remaining shape, and why does this make it obvious that the answer must involve division by $$8 - \\pi$$ rather than $$8 + \\pi$$? (2 steps)", "answer": "- Step 1: The term $$1$$ represents the whole square (normalized to unit side), while $$\\frac{\\pi}{8}$$ represents the fraction of the square’s area occupied by the semicircle. Their difference is the fraction of the square that remains. Because you are removing area, the remaining fraction must be smaller than 1, so you must subtract $$\\pi$$; addition would imply the semicircle somehow adds material.\n- Step 2: Since the remaining fraction is $$\\frac{8 - \\pi}{8}$$, solving for $$m^2$$ requires dividing by that fraction, which inverts to multiplication by $$\\frac{8}{8 - \\pi}$$. This structural necessity guarantees the denominator contains $$8 - \\pi$$ with a minus sign, immediately eliminating any answer options with $$8 + \\pi$$ from consideration.", "source": "Kimi K2.6 ①", "_id": "kimi_1_1"}, {"question": "After solving for $$ m = 20\\sqrt{\\frac{2}{8-\\pi}} $$ in the semicircle problem, you quickly check that the expression under the square root is positive. Why is that check important, and what would a negative radicand imply about the problem? (2 steps)", "answer": "- Step 1: $$ 8-\\pi \\approx 8-3.1416 = 4.8584 > 0 $$, so the radicand is positive, and the side length is real. If instead an algebraic slip produced $$ 8+\\pi $$ or $$ 4-\\pi $$ in the denominator, the expression would still be positive, so sign alone may not flag errors, but checking positivity ensures no imaginary lengths.\n- Step 2: However, if you ever get an expression like $$ \\sqrt{\\frac{2}{\\pi-8}} $$, it’s undefined (since π≈3.14, π-8 negative), warning you that the equation was set up incorrectly (maybe you subtracted square from semicircle). So always mentally assess the radicand’s sign: for a length, the argument must be positive. This sanity check catches swapped subtraction.\n\n**Habit:** Quick numeric approximation of π helps you verify that denominators remain positive.", "source": "DeepSeek ②", "_id": "deepseek_2_34"}, {"question": "In a unit cube, the body diagonal (corner to opposite corner) has length $$\\sqrt{3}$$, but the distance from a vertex to the midpoint of the opposite face is $$\\frac{\\sqrt{6}}{2}$$. Why are these different, and which is larger? (2 steps)", "answer": "- Step 1: The body diagonal goes from $$(0,0,0)$$ to $$(1,1,1)$$ — all three perpendicular displacements are 1. So $$d = \\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3} \\approx 1.732$$.\n- Step 2: The vertex-to-face-midpoint goes from $$(0,0,0)$$ to $$(1, \\frac{1}{2}, \\frac{1}{2})$$ — two of the three displacements are only $$\\frac{1}{2}$$. So $$d = \\sqrt{1 + \\frac{1}{4} + \\frac{1}{4}} = \\sqrt{\\frac{3}{2}} = \\frac{\\sqrt{6}}{2} \\approx 1.225$$.\n\nThe body diagonal is longer because the endpoint is a far corner (all three displacements are maximal), while the face midpoint is only halfway across two of the three dimensions. On the ESAT, $$\\sqrt{3}$$ appears as a distractor option for vertex-to-face-midpoint questions.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why does $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$, and how does this identity help you rewrite $$\\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}}$$ into the form seen in the answer options? (2 steps)", "answer": "- Step 1: The identity holds because $$\\left(\\frac{\\sqrt{a}}{\\sqrt{b}}\\right)^2 = \\frac{a}{b} = \\left(\\sqrt{\\frac{a}{b}}\\right)^2$$, and both expressions are positive, so they must be equal. It lets you move a denominator inside or outside a square root freely.\n- Step 2: Applying it to $$\\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}}$$: treat the numerator as $$\\sqrt{400 \\times 2} = \\sqrt{800}$$, so the whole expression is $$\\frac{\\sqrt{800}}{\\sqrt{8-\\pi}} = \\sqrt{\\frac{800}{8-\\pi}}$$. Then simplify $$800 = 400 \\times 2$$ to get $$20\\sqrt{\\frac{2}{8-\\pi}}$$. This matches Option A exactly.\n\nThis identity is the bridge between \"fraction with surd denominator\" and \"single surd expression\" — both appear in ESAT options.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "In the mean-age problem, the original count is 20 and the new count is 22. Why does it matter which count you use in the denominator of the mean formula, and what error does forgetting this produce? (2 steps)", "answer": "- Step 1: The mean formula is $$\\bar{x} = \\Sigma/n$$, equivalently $$\\Sigma = n\\bar{x}$$. The variable $$n$$ (the count) appears explicitly, and it must reflect the actual number of members at the time the mean is being calculated.\n- Step 2: Forgetting to change the count from 20 to 22 after the two new members join gives: new sum = $$22 \\times 30 = 660$$ becomes a wrong $$20 \\times 30 = 600$$, then \"extra = 40\", then \"mean of two = 20\" — which is exactly option A in the question. This is a deliberately planted distractor that targets the slip. Always pause and ask: *how many members are in the group at this point in the problem?* before plugging in.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "In the similar triangles problem, the perpendicular from Q to PR creates two sub-triangles. One student claims the altitude equals the geometric mean of the two segments of the hypotenuse (i.e., $$h^2 = PT \\times TR$$). Is this claim correct, and where does it come from? (3 steps)", "answer": "- Step 1: Yes, this is a well-known geometric theorem. It follows directly from the similarity of the two sub-triangles. $$\\triangle PTQ \\sim \\triangle QTR$$ (both are similar to the original and hence to each other).\n- Step 2: From the similarity, the ratio of corresponding sides gives: $$PT/QT = QT/TR$$, which rearranges to $$QT^2 = PT \\times TR$$, i.e., $$h^2 = PT \\times TR$$.\n- Step 3: In the lesson's problem: $$PR = 10\\sqrt{5}$$, and the segments can be found from similarity. $$PT = PQ^2/PR = 400/(10\\sqrt{5}) = 40/\\sqrt{5} = 8\\sqrt{5}$$. $$TR = PR - PT = 10\\sqrt{5} - 8\\sqrt{5} = 2\\sqrt{5}$$. Check: $$h^2 = 8\\sqrt{5} \\times 2\\sqrt{5} = 16 \\times 5 = 80$$, so $$h = \\sqrt{80} = 4\\sqrt{5}$$. Consistent!\n\nThe geometric mean property is a bonus shortcut: $$h = \\sqrt{PT \\times TR}$$. It's equivalent to the two-area trick but derived from similarity instead of area.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "Why does $$\\sqrt{800} = 20\\sqrt{2}$$? State the general rule for simplifying surds of the form $$\\sqrt{N}$$. (2 steps)", "answer": "- Step 1: Factor $$N$$ to find the largest perfect square factor. For 800: $$800 = 400 \\times 2$$, and 400 is a perfect square ($$20^2$$).\n- Step 2: Apply the rule $$\\sqrt{k^2 \\times m} = k\\sqrt{m}$$: $$\\sqrt{800} = \\sqrt{400 \\times 2} = \\sqrt{400} \\times \\sqrt{2} = 20\\sqrt{2}$$\n\nThe general rule: to simplify $$\\sqrt{N}$$, factor $$N$$ into its largest perfect square factor times a remainder. Pull the square root of the perfect square outside the radical. Common perfect squares to check for: 4, 9, 16, 25, 36, 49, 64, 100, 400.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "What's the conceptual difference between a space diagonal of a cube and a vertex-to-face-midpoint distance, and why are their formulas different? (2 steps)", "answer": "- Step 1: A space diagonal connects two opposite corners, traveling the full cube dimensions $$(1,1,1)$$ to give distance $$\\sqrt{1^2+1^2+1^2} = \\sqrt{3}$$.\n- Step 2: A vertex-to-face-midpoint path goes from a corner like $$(0,0,0)$$ to the center of the opposite face at $$(1, \\frac{1}{2}, \\frac{1}{2})$$, giving distance $$\\sqrt{1^2 + (\\frac{1}{2})^2 + (\\frac{1}{2})^2} = \\sqrt{\\frac{3}{2}} = \\frac{\\sqrt{6}}{2}$$.\n\nThe face midpoint is \"halfway\" along two dimensions but \"full-way\" along the third, making it shorter than the full space diagonal.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_17"}, {"question": "In the lesson, the same problem (Q2) was solved two different ways: (A) using a similarity ratio, and (B) using two expressions for area. Both are correct, and Method B was deemed faster. What is the deeper lesson here about *choosing* techniques in ESAT? (2 steps)", "answer": "- Step 1: The lesson demonstrates that for any given problem there is usually a *geometric* way (similar triangles, scaling, etc.) and an *algebraic* way (using invariants like area). The geometric method is often more visually intuitive and easier to invent; the algebraic method is often more mechanical and faster once the relevant invariant is spotted.\n- Step 2: The takeaway for exam preparation: for each problem type, learn *both* the geometric intuition and the algebraic shortcut, then *default to the algebraic shortcut* under time pressure. Harry shows the geometric method (similarity ratio) in detail because Phuc benefits from the visual understanding, but then implicitly recommends the area-based method for speed. This is the meta-skill: knowing multiple paths and choosing the one with the lowest *time-to-answer* on exam day.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "With roughly 90 seconds per question, what is the rational stopping point for attempting a question before marking it for review, and what cognitive bias does this strategy combat? (2 steps)", "answer": "- Step 1: The rational stopping point is approximately 30 seconds of being stuck or going in circles. After this point, the expected return on continued investment drops sharply because ESAT questions are designed to be solvable quickly if you see the path.\n- Step 2: This combats the sunk-cost fallacy, where a student clings to a difficult question because they have already spent time on it, thereby sacrificing multiple easier questions later in the paper.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "Why do ESAT problems often include \"trap\" answers that result from common mistakes, and how should this influence your solving approach? (2 steps)", "answer": "- Step 1: Trap answers are systematically generated by applying common student errors (like forgetting the $$\\frac{1}{2}$$ in semicircle area, or using wrong denominators in mean problems) to create plausible but incorrect options.\n- Step 2: This means you should always double-check your setup equations and key algebraic steps, and be especially careful with factors, denominators, and unit conversions that are easy to miss under time pressure.\n\nRecognizing that wrong answers are deliberately constructed from predictable mistakes helps you avoid falling into these carefully laid traps.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_19"}, {"question": "In the equation $m^2 - \\tfrac{1}{2}\\pi(\\tfrac{m}{2})^2 = 100$, why is it smarter to *factor* out $m^2$ immediately rather than expand the bracket? (2 steps)", "answer": "- Step 1: Expanding the bracket first gives $m^2 - \\tfrac{\\pi m^2}{8}$, which is two terms that look like they don't belong together. Regrouping them afterwards is slow and error-prone.\n- Step 2: Factoring $m^2$ out *before* expanding collapses the algebra into one line:\n$$m^2\\!\\left(1 - \\tfrac{\\pi}{8}\\right) = m^2\\!\\left(\\tfrac{8-\\pi}{8}\\right) = 100$$\nThis isolates $m^2$ directly, so a single division solves it. **Factorise before expanding** is a general rule for clean ESAT algebra.\n\n**Takeaway:** Treat the structure of the equation as your friend — the form $m^2(\\text{stuff}) = \\text{number}$ is exactly what you want, because $m$ is the unknown.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "In the mean‑age problem, if the original mean were 28 and two new members joined with a mean age of 50, the new mean becomes 30. But what if the original group size were 10 instead of 20, with the same old mean 28 and same new members’ mean 50? Would the new mean be higher, lower, or the same? (Conceptual only—no calculation.)", "answer": "- Step 1: If the group is smaller, each new member’s high age has a greater impact on the overall mean. With 10 members, the original sum is $$10 \\times 28 = 280$$. Adding two 50‑year‑olds (total 100) gives new sum = 380, new count = 12, mean = 380/12 ≈ 31.67, which is higher than 30. So the increase would be larger.\n- Step 2: The original problem’s group of 20 dilutes the effect: the 100 extra years spread over 22 members yield a 2‑year rise. The underlying concept is that the weight of the new members relative to the old group size determines the mean shift: $$ \\Delta \\overline{x} = \\frac{\\text{sum\\_new} - 28\\times2}{n_{\\text{new}}} $$, but more importantly, smaller original group → bigger increase for the same new members.\n\n**Takeaway:** Always consider the denominator effect; the same added total shifts a smaller group more.", "source": "DeepSeek ②", "_id": "deepseek_2_39"}, {"question": "The philosophy behind 3D Pythagoras is \"reduce 3D to 2D by finding intermediate right triangles.\" How does this philosophy apply beyond cubes — for example, to a cuboid? (2 steps)", "answer": "- Step 1: In any 3D distance problem, the strategy is the same: identify a path from start to end point that consists of perpendicular segments. Find an intermediate point where you can form a right triangle, compute that distance (2D), then use it as a leg in a second right triangle to reach the final point.\n- Step 2: In a cuboid with dimensions $$a \\times b \\times c$$, the space diagonal from one corner to the opposite is found by:\n  + First: face diagonal $$= \\sqrt{a^2 + b^2}$$\n  + Then: space diagonal $$= \\sqrt{(\\sqrt{a^2+b^2})^2 + c^2} = \\sqrt{a^2 + b^2 + c^2}$$\n\nFor irregular shapes, the same principle applies — you just need to identify the right intermediate point. The universal key: find perpendicular displacements, apply Pythagoras to pairs of them.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "After two new members join, the mean increases by exactly 2 years. Why must the new mean be 30 applied to 22 people, and what hidden trap appears if a student incorrectly keeps the denominator at 20? (3 steps)", "answer": "- Step 1: “Increases by exactly 2” means we add 2 to the old mean of 28, giving a new mean of 30. The new group contains the original 20 members plus 2 newcomers, so the count is $$20 + 2 = 22$$. The defining equation is therefore $$\\frac{\\Sigma_{\\text{new}}}{22} = 30$$.\n- Step 2: If a student mistakenly divides by 20, they compute $$\\Sigma_{\\text{new}} = 20 \\times 30 = 600$$, implying the two newcomers contribute only $$600 - 560 = 40$$ combined years, or 20 years each.\n- Step 3: This trap answer is actually listed as an option (20 years), making it especially dangerous. It is conceptually wrong because the mean of 30 applies to the enlarged group; dividing by the old count conflates the population sizes and underestimates the total age needed to raise the average across a larger ensemble.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "Synthesis question: A rectangle has sides 6 and 8. A semicircle is drawn on the longer side as diameter, entirely outside the rectangle. What is the total area of the rectangle-plus-semicircle shape? Walk through the conceptual steps. (3 steps)", "answer": "- Step 1: Identify the two component areas. The rectangle has area $$6 \\times 8 = 48$$. The semicircle has diameter 8 (the longer side), so radius $$r = 4$$.\n- Step 2: The semicircle area is $$\\tfrac{1}{2}\\pi r^2 = \\tfrac{1}{2}\\pi(16) = 8\\pi$$. Note the $$\\tfrac{1}{2}$$ — it's a semicircle, not a full circle.\n- Step 3: Total area = rectangle + semicircle = $$48 + 8\\pi$$. The key conceptual points: (1) identify which dimension is the diameter, (2) compute radius = diameter/2, (3) use the semicircle formula with the $$\\tfrac{1}{2}$$, (4) add (since the semicircle is outside, not cut out).\n\nWhen the semicircle is added (outside), you add areas. When it's cut out (inside), you subtract. The sign depends on the physical configuration.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "In the lesson, the tutor identifies three similar triangles: $\\triangle PQR \\sim \\triangle QTR \\sim \\triangle PTQ$. Why is the *order* of vertices significant? (2 steps)", "answer": "- Step 1: In a similarity statement $\\triangle ABC \\sim \\triangle DEF$, the order is **not arbitrary** — it specifies which vertex corresponds to which. The first letter of each triangle gives the corresponding angle, the second gives the second corresponding angle, and so on.\n- Step 2: So in $\\triangle PQR \\sim \\triangle QTR$, vertex $P$ in the first corresponds to $Q$ in the second; $Q$ to $T$; $R$ to $R$. This tells you immediately which sides are in proportion: $PQ/QR$ in the first corresponds to $QT/TR$ in the second, etc. Get the order wrong and the ratios will be inverted.\n\n**Takeaway:** When writing similarity statements, line up the corresponding vertices in order. Do not write the letters in the order they appear on the page.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "In the mean age problem, the answer is 50 years. The original members have mean age 28. Explain intuitively why the two new members must be so much older than 28 to raise the mean by only 2 years. (2 steps)", "answer": "- Step 1: There are 20 original members at mean 28, and only 2 new members. The new members are vastly outnumbered (20 vs 2), so each new member has a much larger \"lever arm\" on the average — but they must overcome the inertia of 20 people pulling the average toward 28.\n- Step 2: To raise the average of 22 people from 28 to 30, the total must increase by $$22 \\times 30 - 20 \\times 28 = 660 - 560 = 100$$. These 100 extra years must come from just 2 people, so each contributes 50 on average. The intuition: 2 people must \"donate\" enough extra years to lift 20 people's average by 2, which requires $$20 \\times 2 = 40$$ extra years for the old members' \"share\" plus $$2 \\times 30 = 60$$ for the new members' own contribution to the new mean, totaling 100.\n\nFewer new members means each must be further from the old mean to shift the average. This is a \"leverage\" effect.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Why does the factor $$\\frac{8-\\pi}{8}$$ appear in the semicircle-in-square problem, and what would happen if you used a quarter-circle instead? (2 steps)", "answer": "- Step 1: The factor comes from $$s^2 - \\frac{\\pi s^2}{8} = s^2(1 - \\frac{\\pi}{8}) = s^2 \\cdot \\frac{8-\\pi}{8}$$, where 8 comes from the denominator when the semicircle radius $$s/2$$ is squared: $$\\frac{1}{2}\\pi(s/2)^2 = \\frac{\\pi s^2}{8}$$.\n- Step 2: For a quarter-circle with the same radius, the area would be $$\\frac{1}{4}\\pi(s/2)^2 = \\frac{\\pi s^2}{16}$$, giving the factor $$\\frac{16-\\pi}{16}$$ instead.\n\nThe denominator always equals $$4/\\text{fraction of circle}$$ times the radius denominator squared.", "source": "Claude Sonnet 4 ①", "_id": "openrouter_1_12"}, {"question": "What is the single most important piece of advice from Harry regarding homework: why should you avoid using AI to solve problems? Relate this to the concept of “discoverable gaps.”", "answer": "- Step 1: Harry explicitly says: “Do not use AI for homework—need to identify real knowledge gaps (e.g., circle formula).” The reasoning is that if you let an AI give you the answer or fill in steps, you skip the moment of struggle where your brain confronts the gap. That struggle is precisely what tells you which formulas and concepts you haven’t fully memorised or understood.\n- Step 2: In spaced‑repetition terms, the *productive discomfort* of failing to recall a formula without hints strengthens your memory and reveals what needs drilling. If AI fills the gap, you might never realise that you always forget the ½ in the semicircle area until the exam. So treat homework as a diagnostic; only after genuine attempts should you seek feedback.\n\n**Mindset shift:** Homework is not for grades—it’s for finding your weaknesses. AI hides them.", "source": "DeepSeek ②", "_id": "deepseek_2_36"}, {"question": "In Q4, Phuc got $Q:S = 15:10 = 3:2$ at one point, and the tutor corrected it. What is the precise mistake, and what is the *general* rule for scaling ratios? (2 steps)", "answer": "- Step 1: Phuc scaled $R:S = 3:10$ to make $R = 6$ (so multiplied by 2) but **forgot to also scale $S$**. He left $S = 10$ instead of $20$. The correct scaled ratio is $R:S = 6:20$.\n- Step 2: **The general rule:** when you scale a ratio by a multiplier $k$, you must apply $k$ to **both** numbers in the ratio. Ratios are pairs; partial scaling breaks the proportion.\n\n**Takeaway:** A ratio $a:b$ scaled by $k$ is $ka:kb$, not $ka:b$. This is the single most common ratio error.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "State the 2D Pythagoras theorem and explain *why* it is a theorem about right-angled triangles specifically, not all triangles. (2 steps)", "answer": "- Step 1: For a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$: $$a^2 + b^2 = c^2$$.\n- Step 2: The relation $$a^2 + b^2 = c^2$$ holds *only* when the angle between the legs is exactly $$90°$$. The deeper reason is that the right angle is what allows the law of cosines to reduce from its full form $$c^2 = a^2 + b^2 - 2ab\\cos(C)$$ (where $$C$$ is the included angle) to the simple form — because $$\\cos(90°) = 0$$, the cross term vanishes. For non-right triangles, the squared side relation involves the cosine of the included angle, not a clean sum of squares.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "A student argues that at 9:45 the hour hand has moved $$\\frac{3}{4}$$ of the way from 9 to 10, so the angle should be $$\\frac{3}{4} \\times 30^\\circ = 22.5^\\circ$$. Another student thinks it should be $$\\frac{1}{4} \\times 30^\\circ = 7.5^\\circ$$ because there are only 15 minutes left until 10. Why is the first reasoning correct and the second a misapplication of fractions? (2 steps)", "answer": "- Step 1: The elapsed time since 9:00 is 45 minutes, which is $$\\frac{3}{4}$$ of an hour. The hour hand therefore covers $$\\frac{3}{4}$$ of the $$30^\\circ$$ gap between 9 and 10, yielding $$22.5^\\circ$$ past the 9.\n- Step 2: The remaining 15 minutes until 10:00 is the complementary fraction $$\\frac{1}{4}$$, but that measures how far the hand still has to travel, not how far it has already travelled from the 9. Using $$7.5^\\circ$$ confuses distance-yet-to-go with distance-already-moved. The question asks for the current separation from the minute hand at 9, which depends on current displacement, not future displacement.", "source": "Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "In the Q3 cube problem, the answer is $\\sqrt{6}/2$. The OCR at one frame misread the option as $\\sqrt{3}/2$. What conceptual test would *immediately* tell you $\\sqrt{3}/2$ is wrong? (2 steps)", "answer": "- Step 1: Numerical sanity check: the distance from a vertex to the midpoint of the opposite face must be **less than** the body diagonal $\\sqrt{3} \\approx 1.732$ (the longest distance inside the cube) and **greater than** 1 (the shortest edge). So the answer must lie in $(1, \\sqrt{3})$.\n- Step 2: $\\sqrt{3}/2 \\approx 0.866 < 1$ — that would be **shorter than an edge of the cube**, which is geometrically impossible (you cannot reach a point on the far face in less than one edge length). So $\\sqrt{3}/2$ is ruled out by dimension alone. $\\sqrt{6}/2 \\approx 1.225$ is in the correct range. ✓\n\n**Takeaway:** Always do a quick \"is this the right *order of magnitude*?\" check before accepting an answer.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "Why do the three triangles in problem 2 ($$PQR$$, $$QTR$$, $$PTQ$$) all have the same angles? (2 steps)", "answer": "- Step 1: Start with the large triangle $$PQR$$ — it has a right angle at $$Q$$, and some acute angles at $$P$$ and $$R$$.  \n- Step 2: The line $$QT$$ is perpendicular to $$PR$$, so in triangle $$PTQ$$ the angle at $$T$$ is 90°. Since $$PQR$$ shares angle $$\\angle P$$ with $$PTQ$$, the two triangles are similar (AA). Similarly, triangle $$QTR$$ has a right angle at $$T$$ and shares $$\\angle R$$ with the large triangle. Hence all three have the same three angle measures — just the labelling of vertices changes.\n\nThis similarity is why the altitude can be found by scaling — you can map corresponding sides between the large triangle and either small one.", "source": "DeepSeek ①", "_id": "deepseek_1_7"}, {"question": "Synthesis question: A group of 15 people has mean score 40. Five people leave and the mean drops to 36. What was the mean score of the five who left — is it above or below 36, and why? Then compute it. (3 steps)", "answer": "- Step 1: Since the mean decreased when these five left, they must have been pulling the average **up** — meaning their mean score is above the old mean of 40 (and certainly above the new mean of 36). Removing below-average people would raise the mean, not lower it.\n- Step 2: Old total = $$15 \\times 40 = 600$$. New total = $$10 \\times 36 = 360$$. The five who left had a combined score of $$600 - 360 = 240$$.\n- Step 3: Mean of the five who left = $$240 / 5 = 48$$. This is above 40 (the old mean), confirming the intuition: they were above-average members, so removing them decreased the mean.\n\nDirection check: if the mean goes down when people leave, those people were above average. If it goes up, they were below average.", "source": "GLM 5.1 ①", "_id": "glm_1_35"}, {"question": "In the Q5 clock problem, what is the *minimum* thing the student must realise to get the answer right? Why is this the conceptual \"barrier\" of the question? (2 steps)", "answer": "- Step 1: The student must realise that the **hour hand moves continuously** — it is not pinned to the nearest hour mark. Without this, the student places both hands at the 9 position and reads off $0°$ (a trap option).\n- Step 2: This is the barrier because the question is set up precisely to tempt that exact assumption: the phrase \"9:45\" suggests the hour hand is \"at 9\", and only the word \"exactly\" (or absence of \"exactly\") in the question forces you to look more carefully. The math is then trivial; the conceptual step is the only non-trivial part.\n\n**Takeaway:** ESAT clock questions are *about* continuous motion. If you remember that one fact, the rest is arithmetic.", "source": "MiniMax ①", "_id": "minimax_1_30"}, {"question": "A student solves the semicircle-in-square problem and gets $$m = 10\\sqrt{\\frac{2}{4-\\pi}}$$. Without recalculating, how can you tell this is wrong, and which specific error produced it? (2 steps)", "answer": "- Step 1: Compare with the correct answer $$m = 20\\sqrt{\\frac{2}{8-\\pi}}$$. The denominator $$4 - \\pi$$ instead of $$8 - \\pi$$ suggests that the semicircle area was computed as $$\\pi(m/2)^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi(m/2)^2$$ (semicircle). This halves the subtracted area, changing the factor from $$8 - \\pi$$ to $$4 - \\pi$$.\n- Step 2: The coefficient 10 instead of 20 also signals an error. If the student used $$4 - \\pi$$ in the denominator, they would get $$m^2 = 400/(4-\\pi)$$, so $$m = 20/\\sqrt{4-\\pi} = 20\\sqrt{1/(4-\\pi)}$$. The student's answer of $$10\\sqrt{2/(4-\\pi)}$$ suggests an additional algebraic slip. The key diagnostic: **$$4 - \\pi$$ in the denominator always indicates the missing $$\\tfrac{1}{2}$$ error**.\n\nThe denominator is a fingerprint of the formula used. $$8 - \\pi$$ → semicircle correct; $$4 - \\pi$$ → full circle used by mistake.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "The calculated mean age of the two new members is 50. Without performing the full calculation, explain conceptually why this figure must be significantly higher than the new group mean of 30, and why it is unnecessary to know the individual ages of the original twenty members. (2 steps)", "answer": "- Step 1: To raise the average of 20 people from 28 to 30, the newcomers must “donate” excess age above the old mean to pull the overall average upward. Because there are only two newcomers but twenty original members, the two newcomers must compensate for the entire deficit. Their average must therefore sit well above 30; if they were only 30 themselves, the mean would stay at 28.\n- Step 2: The original twenty ages are irrelevant beyond their total because mean problems are linear. Any distribution summing to 560 yields the same effect. We only need the aggregate, not the individuals, which is why converting to total sum immediately removes the need for individual data.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "Why does the ESAT clock‑angle problem use 9:45 specifically, and what conceptual mistake does the 0° distractor target? (2 steps)", "answer": "- Step 1: 9:45 is chosen because the minute hand points exactly at 9, while intuitively you might think “it’s 9:45, so the hour hand is also at 9, they overlap, angle = 0°.” That’s a classic misconception that ignores continuous movement.\n- Step 2: In reality, the hour hand is not fixed; it travels 0.5° per minute. Over 45 minutes, it’s moved 22.5° past 9, creating a non‑zero angle. The 0° option traps those who treat the hour hand as a digital counter that only updates on the hour. This problem type is a favourite in speed‑math exams because it’s easy once you know the trick, but deadly if you don’t.\n\n**Moral:** Always treat clock hands as sweeping continuously; never assume they align at “o’clock plus minutes” unless it’s an exact overlap time.", "source": "DeepSeek ②", "_id": "deepseek_2_32"}, {"question": "Why is the \"two-area trick\" method faster than the similarity ratio method for finding the altitude to the hypotenuse, and when should you use it on the ESAT? (2 steps)", "answer": "- Step 1: **Direct calculation vs. multi-step ratios** — the two-area method gives $$h = \\frac{ab}{c}$$ in one step by equating $$\\frac{1}{2}ab = \\frac{1}{2}ch$$, while similarity requires finding the hypotenuse, identifying corresponding sides, setting up ratios, and solving.\n- Step 2: **Time pressure favors shortcuts** — with only 90 seconds per question, the two-area trick saves 30-45 seconds that can be used on harder problems or double-checking.\n\nUse the two-area trick whenever you see \"perpendicular from vertex to opposite side\" in any triangle problem.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_5"}, {"question": "Why is the expression $$20\\sqrt{\\frac{2}{8-\\pi}}$$ equivalent to $$\\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}}$$ but not to $$20\\sqrt{2} \\cdot \\sqrt{8-\\pi}$$? (2 steps)", "answer": "- Step 1: **Square root of quotient equals quotient of square roots** — the identity $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$ allows us to split the fraction inside the radical: $$\\sqrt{\\frac{2}{8-\\pi}} = \\frac{\\sqrt{2}}{\\sqrt{8-\\pi}}$$.\n- Step 2: **Multiplication vs. division under radicals** — $$\\sqrt{a \\cdot b} = \\sqrt{a} \\cdot \\sqrt{b}$$ (product rule), but $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$ (quotient rule). The denominator $$8-\\pi$$ stays in the denominator after taking the square root.\n\nThese surd manipulation rules are essential for matching ESAT answer formats.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_15"}, {"question": "Using the clock angle formula $$\\theta = |30H - 5.5M|$$, what is the angle between the hands at 12:30? What extra step is needed? (2 steps)", "answer": "- Step 1: Apply the formula: $$\\theta = |30(12) - 5.5(30)| = |360 - 165| = 195°$$\n- Step 2: Since 195° > 180°, take the smaller angle: $$360° - 195° = 165°$$\n\nAt 12:30, the hour hand has moved halfway from 12 to 1 (15° past 12), while the minute hand is at the 6 position (180°). The angle between them is $$180° - 15° = 165°$$. This is an edge case where the formula gives the reflex angle and you must subtract from 360°.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "Why do multiple-choice options in maths exams often present answers in the form $$4\\sqrt{5}$$ instead of $$\\frac{20}{\\sqrt{5}}$$, and what is the algebraic mechanism to convert the latter to the former? (2 steps)", "answer": "- Step 1: By mathematical convention, fractions are simplified by \"rationalizing the denominator\"—meaning we remove any irrational numbers (like surds) from the bottom of the fraction to make it easier to compare values and add fractions together.\n- Step 2: To convert it, you multiply the fraction by a clever form of $$1$$. Specifically, multiply the top and bottom by the surd in the denominator: \n+ $$\\frac{20}{\\sqrt{5}} \\times \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5}$$\n+ The integer part then simplifies ($$20 \\div 5 = 4$$), yielding $$4\\sqrt{5}$$.", "source": "Gemini 2.5 ①", "_id": "gemini_1_6"}, {"question": "When a problem states \"the mean of a group increases by $$X$$ when $$Y$$ new members join\", what is the most robust conceptual framework to find the sum of the new members' values without getting tangled in algebraic variables? (4 steps)", "answer": "- Step 1: **Calculate the Old Sum.** Use the original mean and original count ($$\\Sigma_{\\text{old}} = n_{\\text{old}} \\times \\text{mean}_{\\text{old}}$$).\n- Step 2: **Determine the New Mean.** Add the increase $$X$$ to the old mean. Do not use the old mean for the new group.\n- Step 3: **Calculate the New Sum.** Multiply the new mean by the new total count ($$n_{\\text{old}} + Y$$). \n- Step 4: **Find the Difference.** Subtract the Old Sum from the New Sum. This difference is the total combined value of the $$Y$$ new members. Divide by $$Y$$ if their individual mean is required.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "ESAT problems frequently combine *geometric setup* with *algebraic simplification*. Looking at Q1 and Q2, what is the common pattern of \"geometry-then-algebra\" that ESAT rewards? (2 steps)", "answer": "- Step 1: In both Q1 and Q2, the geometric setup produces an *equation* linking the unknown to given quantities. Q1: \"remaining area = 100\" translates to $$m^2 - \\tfrac{1}{2}\\pi r^2 = 100$$. Q2: \"right triangle with given legs\" translates to PR = 10$$\\sqrt{5}$$ and then to $$x = 20/\\sqrt{5}$$. In each case, the geometry is the source of the equation.\n- Step 2: After the geometric setup, the problem is *pure algebra*: solve for the variable, simplify surds, rationalise. The algebra is mechanical and doesn't require geometric insight. The pattern is: spend ~30-40% of the time on the geometric setup (translating the problem into an equation), and the remaining ~60% on algebraic manipulation. Under time pressure, the bottleneck is almost always the *setup* phase, not the *algebra* phase — so practising quick geometric translation is more valuable than practising algebraic manipulation per se.", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "In the cube problem, what is the difference between the distance from a vertex to the **centre of the opposite face** and to the **midpoint of an opposite edge**? How do the coordinates change? (2 steps)", "answer": "- Step 1: For the centre of the opposite face (midpoint of the face), coordinates relative to vertex (0,0,0) are (1, 1/2, 1/2) — two coordinates are halves. The squared distance = 1 + 1/4 + 1/4 = 6/4 → √6/2.\n- Step 2: For a midpoint of an opposite edge, say the edge where x=1 and y=0, the point might be (1, 0, 1/2) — only one coordinate is a half. Squared distance = 1 + 0 + 1/4 = 5/4 → √5/2. So the two lengths differ by the factor inside the root. Recognising these patterns helps you quickly pick the correct formula without re‑deriving every time.\n\nFace‑midpoint vs edge‑midpoint vs vertex — the key is how many coordinates are 0, 1, or 1/2; the more halves, the smaller the sum of squares (often).", "source": "DeepSeek ①", "_id": "deepseek_1_35"}, {"question": "Derive the intuitive meaning behind the $$5.5M$$ term in the clock angle formula $$\\theta = |30H - 5.5M|$$. What physical speeds does this represent? (3 steps)", "answer": "- Step 1: The minute hand moves at a speed of $$360^\\circ$$ per 60 minutes, which simplifies to $$6^\\circ$$ per minute. Its absolute position from 12 o'clock is $$6M$$.\n- Step 2: The hour hand moves at a speed of $$360^\\circ$$ per 12 hours (720 minutes), which simplifies to $$0.5^\\circ$$ per minute. Its absolute position from 12 o'clock is $$30H + 0.5M$$ (the base hour position plus the continuous minute drift).\n- Step 3: The angle between them is the absolute difference in their positions: $$|(30H + 0.5M) - 6M| = |30H - 5.5M|$$. The $$5.5M$$ term represents the *relative speed* at which the minute hand pulls away from the hour hand ($$6^\\circ/\\text{min} - 0.5^\\circ/\\text{min} = 5.5^\\circ/\\text{min}$$).", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "The lesson covers six problems across geometry, ratios, clocks, and statistics. What unifying strategy connects all of them, and how does it relate to the ESAT's emphasis on pace? (2 steps)", "answer": "- Step 1: The unifying strategy is **translation**: converting each word problem into precise mathematical notation before solving. \"Area of remaining metal is 100\" → $$m^2 - \\tfrac{1}{2}\\pi(m/2)^2 = 100$$. \"Mean of 20 members is 28\" → $$\\Sigma = 560$$. \"Ratio Q:R is 5:2\" → align vertically with R:S. Each problem requires you to parse English into equations.\n- Step 2: This translation step is where most time is lost or saved. If you translate correctly and quickly, the algebra/computation follows mechanically. If you mistranslate (forgetting the $$\\tfrac{1}{2}$$, misreading the ratio, ignoring hour-hand movement), no amount of algebraic skill saves you. Pace comes from fast, accurate translation, not from faster computation.\n\nMaster the translation step: read the problem, write the equation, then solve. The ESAT rewards this discipline.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "Using the clock angle formula $$\\theta = |30H - 5.5M|$$, at 3:15 the angle is 7.5°. At 9:45 the angle is 22.5°. Both are \"quarter past\" an hour — why are the angles different? (2 steps)", "answer": "- Step 1: At 3:15: $$|30(3) - 5.5(15)| = |90 - 82.5| = 7.5°$$. At 9:45: $$|30(9) - 5.5(45)| = |270 - 247.5| = 22.5°$$. The formula gives different results because the hour value $$H$$ is different.\n- Step 2: The hour hand's base position ($$30H$$) changes with each hour. At 3:00 the hands are 90° apart; at 9:00 they are also 90° apart (but on opposite sides). As the minute hand moves from the top of the hour, it closes the gap at 5.5°/min. In 15 minutes it closes $$15 \\times 5.5 = 82.5°$$, leaving $$90 - 82.5 = 7.5°$$ at 3:15. At 9:45, the minute hand has moved 45 minutes from the top, closing $$45 \\times 5.5 = 247.5°$$ from the 9:00 position of 270°, leaving $$270 - 247.5 = 22.5°$$.\n\nThe angle depends on both the starting separation (determined by $$H$$) and how long the minute hand has been closing the gap (determined by $$M$$).", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "When solving the cube problem, why does the first 2D Pythagoras step use the *base face* diagonal (length $$\\tfrac{\\sqrt{5}}{2}$$ in a unit cube) and not the *side face* diagonal? How do you decide which \"intermediate\" 2D step to use? (2 steps)", "answer": "- Step 1: The line from the corner to the face midpoint can be decomposed in *multiple* ways depending on which 2D \"slice\" you draw first. The key is to choose a slice that produces a right angle at the intermediate point — otherwise Pythagoras doesn't apply.\n- Step 2: The lesson's choice — base face diagonal plus a vertical rise — is one valid decomposition. The base face contains two of the three coordinates (the two \"in-plane\" dimensions), and the vertical edge contributes the third. As long as the intermediate 2D triangle is *right-angled* (with the right angle at the corner or the foot of the altitude), Pythagoras applies. If you choose a \"slice\" that isn't right-angled, you cannot use the simple $$a^2 + b^2 = c^2$$ and must fall back on the full 3D formula. The general principle: *for 3D Pythagoras, always find a right-angled 2D triangle as your intermediate step*.", "source": "MiniMax ②", "_id": "minimax_2_36"}, {"question": "In the mean-age problem, the mean increases when two new members join. Without calculating, explain why this implies the mean age of the two newcomers must be strictly greater than the original mean of 28, and why it must also exceed the new mean of 30. (2 steps)", "answer": "- Step 1: Adding values above the current mean pulls the average upward. If the newcomers were each 28, the mean would stay 28. Since the mean rises to 30, their combined age must be high enough to drag the average of all 22 people up to 30.\n- Step 2: Because the new mean (30) is a weighted average of the old 20 members (mean 28) and the 2 new members, the newcomers' mean must be higher than 30 to compensate for the 20 members below 30. Mathematically, any weighted average of two groups lies strictly between the two group means.", "source": "Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "Why is it crucial to identify similar triangles using angle markings rather than just assuming similarity from the diagram appearance? (2 steps)", "answer": "- Step 1: **Visual proportions can be misleading** — ESAT problems often state \"diagram not to scale,\" meaning the drawn proportions don't reflect the actual measurements. Triangles that look similar might not be, and vice versa.\n- Step 2: **Angle equality provides rigorous proof** — marking equal angles with arc symbols (single arc for $$\\angle P = \\angle PQT$$, double arc for $$\\angle R = \\angle RQT$$) proves AA similarity mathematically. This guarantees the ratio relationships you'll use for calculations.\n\nRigorous angle identification prevents errors from visual assumptions and provides confidence in your scaling factors.", "source": "Claude Sonnet 4 ②", "_id": "openrouter_2_21"}, {"question": "If a semicircle has area $$\\frac{1}{2}\\pi r^2$$, what is the area of a quarter-circle of radius $$r$$, and what denominator would appear if a quarter-circle were cut from a square of side $$s$$? (2 steps)", "answer": "- Step 1: A quarter-circle is one-fourth of a full circle: $$\\text{Quarter-circle area} = \\frac{1}{4}\\pi r^2$$. The pattern is: fractional circle area = fraction × full circle area.\n- Step 2: If a quarter-circle of radius $$s$$ is cut from a square of side $$s$$, the equation becomes $$s^2 - \\frac{1}{4}\\pi s^2 = A$$, which factors as $$s^2\\left(1 - \\frac{\\pi}{4}\\right) = A$$, giving $$s^2 \\cdot \\frac{4-\\pi}{4} = A$$. The denominator here is $$4 - \\pi$$ — which looks identical to the *wrong* answer from the semicircle problem, but for a completely different (correct) reason.\n\nSame denominator, different geometry — the ESAT exploits this visual similarity.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "The rule $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$ is used in the semicircle-in-square problem to match the answer format. When is this useful, and how does it work in practice? (2 steps)", "answer": "- Step 1: This rule is useful when you have a fraction under a square root and need to separate it into a form that matches the answer options. In the semicircle problem, you reach $$m = \\sqrt{\\frac{800}{8-\\pi}}$$, which the options express as $$20\\sqrt{\\frac{2}{8-\\pi}}$$.\n- Step 2: Applying the rule: $$\\sqrt{\\frac{800}{8-\\pi}} = \\frac{\\sqrt{800}}{\\sqrt{8-\\pi}} = \\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}} = 20\\sqrt{\\frac{2}{8-\\pi}}$$\n\nThe last step uses the rule in reverse: $$\\frac{\\sqrt{a}}{\\sqrt{b}} = \\sqrt{\\frac{a}{b}}$$. This puts the expression into the compact single-radical form that ESAT options use. Without this manipulation, your answer won't match any option even though it's numerically correct.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "State the mean formula in two equivalent forms. Why is the second form so useful for \"what changes when one quantity is altered\" problems? (2 steps)", "answer": "- Step 1: The mean of $n$ numbers is the sum divided by the count: $\\bar{x} = \\tfrac{\\sum x}{n}$. Equivalently, $\\sum x = n\\bar{x}$ — i.e., the **total sum equals count times mean**.\n- Step 2: This rearrangement is powerful because it lets you compute the **total sum** from the mean (a question usually gives you the mean, not the sum). Once you have $\\sum$ for two scenarios, subtracting them gives the contribution of whatever changed. Q6 is exactly this pattern: $\\sum_{\\text{old}} = 20 \\times 28$, $\\sum_{\\text{new}} = 22 \\times 30$, the new members contributed the difference.\n\n**Takeaway:** Memorise $\\sum = n\\bar{x}$ as a *separate* formula. The most common ESAT move is \"convert mean to sum, then subtract.\"", "source": "MiniMax ①", "_id": "minimax_1_20"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In the ESAT Maths exam, only the final answer is marked — no method marks. What does this imply about how you should allocate your time during the exam, and what is the approximate time per question? (2 steps)", "answer": "- Step 1: The ESAT Maths 1 module gives you 40 minutes for 27 multiple-choice questions. That works out to roughly $$40/27 \\approx 90$$ seconds per question. Since only the final answer is scored, spending time on neat working or elegant derivations earns zero extra credit — only the correct option matters.\n- Step 2: The key implication is **triage**: if a question will take more than ~90 seconds to derive, flag it and move on. Return with remaining time. The primary challenge is pace, not difficulty — you must be decisive and avoid getting stuck on any single problem.\n\nThe exam rewards speed and accuracy of the final choice, not the beauty of your working.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Why does the area of a semicircle equal $$\\tfrac{1}{2}\\pi r^2$$ rather than $$\\pi r^2$$? Explain the intuition and what goes wrong if you forget the half. (2 steps)", "answer": "- Step 1: A full circle has area $$\\pi r^2$$. A semicircle is exactly half of a full circle — it spans 180° instead of 360°. By symmetry, cutting a circle along any diameter splits it into two equal halves, so each semicircle has area $$\\tfrac{1}{2}\\pi r^2$$. This is a direct consequence of the proportionality of area to the central angle.\n- Step 2: If you forget the $$\\tfrac{1}{2}$$ and write $$\\pi r^2$$ for the semicircle, you are subtracting **twice** the correct amount from the enclosing shape. In the semicircle-in-square problem from the lesson, this error replaces $$8 - \\pi$$ in the denominator with $$4 - \\pi$$ — a completely different expression that matches a wrong option. The exam deliberately includes such distractors.\n\nThe $$\\tfrac{1}{2}$$ is the single most common slip in semicircle problems; always write the full formula first, then substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "A square of side $$m$$ has a semicircle cut out, where the semicircle's diameter equals the full side $$m$$. When setting up the equation for the remaining area, why is it important to express the radius as $$r = m/2$$ rather than introducing $$r$$ as a separate variable? (2 steps)", "answer": "- Step 1: The question asks for the side of the square, and the answer options are all expressed in terms of $$m$$ (the side length). If you keep $$r$$ as a separate variable, you end up with an equation in two unknowns ($$m$$ and $$r$$), which you then must relate via $$r = m/2$$. This adds an extra substitution step and increases the chance of algebraic error.\n- Step 2: By substituting $$r = m/2$$ immediately, you write a single equation in one unknown: $$m^2 - \\tfrac{1}{2}\\pi(m/2)^2 = 100$$. This directly targets the form seen in the answer options. The strategic lesson: **read the options first** to see what variable the answer is expressed in, then reduce everything to that variable before solving.\n\nAlways let the answer format guide your choice of variable.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Starting from $$m^2 - \\tfrac{\\pi m^2}{8} = 100$$, why is it better to factor out $$m^2$$ before doing anything else, rather than expanding and regrouping? (2 steps)", "answer": "- Step 1: Factoring gives $$m^2(1 - \\pi/8) = 100$$, which immediately isolates $$m^2$$ as a product: $$m^2 \\cdot \\frac{8-\\pi}{8} = 100$$. From here, one division and one square root get you to the answer. The structure is clean because $$m^2$$ appears in every term.\n- Step 2: If instead you tried to \"combine\" by finding a common denominator without factoring, you'd write $$\\frac{8m^2 - \\pi m^2}{8} = 100$$, which is the same thing but harder to read and more prone to errors when solving. Factoring first keeps the algebra compact and makes the relationship between $$m^2$$ and the constant transparent.\n\nThe general rule: **factorise before expanding** — work with the structure the equation already has.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How do you simplify $$\\sqrt{800}$$ into the form $$k\\sqrt{2}$$, and why is this skill essential for matching ESAT answer options? (3 steps)", "answer": "- Step 1: Look for the largest perfect square factor of 800. Since $$800 = 400 \\times 2$$, and 400 is $$20^2$$, we can write $$\\sqrt{800} = \\sqrt{400 \\times 2}$$.\n- Step 2: Use the surd splitting rule $$\\sqrt{ab} = \\sqrt{a}\\sqrt{b}$$: $$\\sqrt{400 \\times 2} = \\sqrt{400} \\cdot \\sqrt{2} = 20\\sqrt{2}$$.\n- Step 3: ESAT options are always presented in simplified surd form (integer coefficient times an irreducible surd). If you leave $$\\sqrt{800}$$ unsimplified, it won't match any option. This skill — extracting the largest perfect square from under a root — is needed on virtually every geometry question involving Pythagoras.\n\nAlways check: is there a perfect square factor hiding under the root?", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Why does $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$, and how does this identity help you rewrite $$\\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}}$$ into the form seen in the answer options? (2 steps)", "answer": "- Step 1: The identity holds because $$\\left(\\frac{\\sqrt{a}}{\\sqrt{b}}\\right)^2 = \\frac{a}{b} = \\left(\\sqrt{\\frac{a}{b}}\\right)^2$$, and both expressions are positive, so they must be equal. It lets you move a denominator inside or outside a square root freely.\n- Step 2: Applying it to $$\\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}}$$: treat the numerator as $$\\sqrt{400 \\times 2} = \\sqrt{800}$$, so the whole expression is $$\\frac{\\sqrt{800}}{\\sqrt{8-\\pi}} = \\sqrt{\\frac{800}{8-\\pi}}$$. Then simplify $$800 = 400 \\times 2$$ to get $$20\\sqrt{\\frac{2}{8-\\pi}}$$. This matches Option A exactly.\n\nThis identity is the bridge between \"fraction with surd denominator\" and \"single surd expression\" — both appear in ESAT options.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "When you drop a perpendicular from the right-angle vertex of a right triangle to the hypotenuse, why are the two smaller triangles formed similar to the original triangle and to each other? (3 steps)", "answer": "- Step 1: Consider the original right triangle $$PQR$$ with the right angle at $$Q$$. Drop perpendicular $$QT$$ to hypotenuse $$PR$$, creating two sub-triangles: $$\\triangle PTQ$$ and $$\\triangle QTR$$.\n- Step 2: In $$\\triangle PTQ$$: it shares angle $$P$$ with $$\\triangle PQR$$, and both contain a right angle ($$\\angle PTQ = \\angle PQR = 90°$$). By the AA (angle-angle) similarity criterion, $$\\triangle PTQ \\sim \\triangle PQR$$. The same argument applies to $$\\triangle QTR$$ sharing angle $$R$$ with the original.\n- Step 3: Since both sub-triangles are similar to the original, they are similar to each other (by transitivity). This means all three triangles have the same angles and their sides are in proportion. This is why we can set up ratios between corresponding sides to find unknown lengths.\n\nThe altitude-to-hypotenuse construction is one of the most productive geometric setups in exam questions — always check for similarity.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "In a right triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$, the altitude from the right-angle vertex to the hypotenuse is $$h$$. Derive the \"two-area trick\" formula $$h = \\frac{ab}{c}$$ by using the area of the triangle in two different ways. (2 steps)", "answer": "- Step 1: The area of the right triangle can be computed using the two legs as base and height: $$\\text{Area} = \\tfrac{1}{2}ab$$. This is the most natural way since the legs are perpendicular.\n- Step 2: The same area can also be computed using the hypotenuse as the base and the altitude as the height: $$\\text{Area} = \\tfrac{1}{2}ch$$. Setting these equal: $$\\tfrac{1}{2}ab = \\tfrac{1}{2}ch$$, which simplifies to $$h = \\frac{ab}{c}$$. This is faster than using similarity ratios — it gives the altitude in one clean step without identifying which sub-triangle corresponds to which.\n\nThe two-area trick is the fastest route to an altitude in any right triangle. Memorise $$h = ab/c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "After computing an altitude as $$\\frac{20}{\\sqrt{5}}$$, why must you rationalise the denominator before scanning the answer options, and what is the result? (2 steps)", "answer": "- Step 1: ESAT answer options always present surds in the numerator, not the denominator. The expression $$\\frac{20}{\\sqrt{5}}$$ is numerically correct but will not appear as an option. You must convert it to the form $$k\\sqrt{5}$$.\n- Step 2: Multiply numerator and denominator by $$\\sqrt{5}$$: $$\\frac{20}{\\sqrt{5}} \\cdot \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5} = 4\\sqrt{5}$$. This matches Option E in the exam question.\n\nRationalising is not optional — it is the final step you must always perform before looking for your answer among the options.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the general rule for rationalising $$\\frac{a}{\\sqrt{b}}$$, and why does multiplying by $$\\frac{\\sqrt{b}}{\\sqrt{b}}$$ work? (2 steps)", "answer": "- Step 1: The rule is $$\\frac{a}{\\sqrt{b}} = \\frac{a\\sqrt{b}}{b}$$. You multiply both numerator and denominator by $$\\sqrt{b}$$, which is valid because $$\\frac{\\sqrt{b}}{\\sqrt{b}} = 1$$ — you are multiplying by 1, which doesn't change the value.\n- Step 2: The denominator becomes $$\\sqrt{b} \\cdot \\sqrt{b} = b$$, eliminating the surd from the bottom. The numerator becomes $$a\\sqrt{b}$$. This is the standard \"rationalised\" form because the denominator is now a rational number (an integer if $$b$$ is an integer).\n\nThe key insight: you're exploiting $$\\sqrt{b} \\times \\sqrt{b} = b$$ to clear the root from the denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Why can't you find the distance from a vertex of a unit cube to the midpoint of the opposite face using a single application of Pythagoras? What two-step procedure is needed instead? (3 steps)", "answer": "- Step 1: A single application of 2D Pythagoras finds the diagonal across a flat (2D) right triangle. But the path from a vertex to the face-midpoint of a cube travels through three-dimensional space — it has components in three mutually perpendicular directions (e.g., 1 unit across, ½ unit sideways, ½ unit up).\n- Step 2: The two-step procedure: first, find the diagonal across the base (or any face) to the point directly below the target. This is a 2D Pythagoras step: $$x = \\sqrt{1^2 + (1/2)^2} = \\sqrt{5}/2$$. This gives the \"floor distance.\"\n- Step 3: Then, use this floor distance and the vertical component ($$\\frac{1}{2}$$) in a second Pythagoras step: $$y = \\sqrt{x^2 + (1/2)^2} = \\sqrt{5/4 + 1/4} = \\sqrt{6/4} = \\sqrt{6}/2$$. Each step handles two of the three perpendicular components.\n\n3D Pythagoras is always two successive 2D applications — never try to jump to the answer in one go.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "The body diagonal of a unit cube (corner to opposite corner) is $$\\sqrt{3}$$. The vertex-to-face-midpoint distance is $$\\sqrt{6}/2$$. Without calculating, how can you tell that $$\\sqrt{6}/2$$ should be less than $$\\sqrt{3}$$? (2 steps)", "answer": "- Step 1: The face-midpoint is closer to the starting vertex than the opposite corner — it's \"partway\" along the far face, not at the far extreme. So the distance must be less than the body diagonal $$\\sqrt{3}$$.\n- Step 2: Compare numerically: $$\\sqrt{6}/2 \\approx 2.449/2 \\approx 1.225$$, while $$\\sqrt{3} \\approx 1.732$$. Indeed $$1.225 < 1.732$$. Alternatively, note that $$\\sqrt{6}/2 = \\sqrt{6/4} = \\sqrt{1.5}$$, and $$\\sqrt{1.5} < \\sqrt{3}$$ since $$1.5 < 3$$. The exam includes $$\\sqrt{3}$$ as a distractor option precisely because students confuse the body diagonal with the vertex-to-midpoint distance.\n\nIf the target isn't the opposite corner, the answer isn't $$\\sqrt{3}$$. The geometry of the endpoint matters.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "When combining two ratios $$Q:R = 5:2$$ and $$R:S = 3:10$$ into a single three-way ratio, why must you make the shared variable $$R$$ the same number in both rows, and what goes wrong if you don't? (3 steps)", "answer": "- Step 1: The ratio $$Q:R = 5:2$$ means \"for every 2 units of R, there are 5 units of Q.\" The ratio $$R:S = 3:10$$ means \"for every 3 units of R, there are 10 units of S.\" But the \"2 units of R\" in the first ratio and the \"3 units of R\" in the second are different amounts — you can't directly compare Q and S unless R represents the same quantity in both.\n- Step 2: Find the LCM of the two R-values (2 and 3), which is 6. Scale the first ratio by $$\\times 3$$ to get $$Q:R = 15:6$$, and the second by $$\\times 2$$ to get $$R:S = 6:20$$. Now R = 6 in both, so you can chain them: $$Q:R:S = 15:6:20$$.\n- Step 3: The common mistake (made in the lesson) is to scale only R and forget to scale the other number in the same ratio. For example, scaling $$R:S = 3:10$$ by $$\\times 2$$ gives $$R = 6$$, but if you forget to also multiply $$S$$, you write $$S = 10$$ instead of $$S = 20$$. This gives $$Q:S = 15:10 = 3:2$$, which is wrong. **Always multiply both numbers in a ratio by the same factor.**\n\nThe shared variable is the \"bridge\" — it must be the same on both sides for the bridge to work.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "After combining ratios to get $$Q:R:S = 15:6:20$$, you need $$Q:S$$ in simplest form. Why is the answer 3:4 and not 15:20? (2 steps)", "answer": "- Step 1: The ratio $$Q:S = 15:20$$ is correct but not in simplest form. A ratio should be expressed using the smallest whole numbers possible, just like a fraction should be simplified.\n- Step 2: Both 15 and 20 are divisible by 5: $$15 \\div 5 = 3$$ and $$20 \\div 5 = 4$$. So $$Q:S = 3:4$$. The exam will always present the simplified form as the correct option; the unsimplified form is either not listed or listed as a distractor.\n\nAlways simplify ratios by dividing both sides by their GCD, just as you would simplify a fraction.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "At 9:45 on a clock, why is the angle between the hands NOT 0°, even though the minute hand points at the 9? What is the key insight about the hour hand? (2 steps)", "answer": "- Step 1: The minute hand at 9:45 points at the 9 position (270° from 12). If the hour hand also sat at the 9, the angle would be 0°. But the hour hand does not sit at the 9 — it moves continuously and smoothly between hour markers.\n- Step 2: By 9:45, the hour hand has been moving from 9 toward 10 for 45 minutes. Since it takes 60 minutes to move from one hour mark to the next (a 30° arc), in 45 minutes it has moved $$\\frac{45}{60} \\times 30° = 22.5°$$ past the 9. So the hour hand is at $$270° + 22.5° = 292.5°$$, and the angle between the hands is $$292.5° - 270° = 22.5°$$.\n\nThe hour hand never \"jumps\" — it creeps forward at 0.5° per minute. This continuous motion is the key to every clock angle problem.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "Derive the clock angle formula $$\\theta = |30H - 5.5M|$$ by calculating the position of each hand independently. Why does the 5.5 appear? (3 steps)", "answer": "- Step 1: The **minute hand** moves at $$360°/60 = 6°$$ per minute. At $$M$$ minutes past the hour, its position from 12 o'clock is $$6M$$ degrees.\n- Step 2: The **hour hand** moves at $$360°/12 = 30°$$ per hour, which is $$30°/60 = 0.5°$$ per minute. At $$H$$ hours and $$M$$ minutes, its position from 12 is $$30H + 0.5M$$ degrees. (The $$30H$$ gives the base position at the hour mark; the $$0.5M$$ adds the creep past it.)\n- Step 3: The angle between them is $$|30H + 0.5M - 6M| = |30H - 5.5M|$$. The 5.5 appears because $$6 - 0.5 = 5.5$$ — the minute hand gains 5.5° on the hour hand every minute. This is the relative speed of the two hands.\n\nThe formula compresses the two-position calculation into one line; the 5.5 is the net angular speed difference.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Using the clock angle formula $$\\theta = |30H - 5.5M|$$, at 3:15 the angle is 7.5°. At 9:45 the angle is 22.5°. Both are \"quarter past\" an hour — why are the angles different? (2 steps)", "answer": "- Step 1: At 3:15: $$|30(3) - 5.5(15)| = |90 - 82.5| = 7.5°$$. At 9:45: $$|30(9) - 5.5(45)| = |270 - 247.5| = 22.5°$$. The formula gives different results because the hour value $$H$$ is different.\n- Step 2: The hour hand's base position ($$30H$$) changes with each hour. At 3:00 the hands are 90° apart; at 9:00 they are also 90° apart (but on opposite sides). As the minute hand moves from the top of the hour, it closes the gap at 5.5°/min. In 15 minutes it closes $$15 \\times 5.5 = 82.5°$$, leaving $$90 - 82.5 = 7.5°$$ at 3:15. At 9:45, the minute hand has moved 45 minutes from the top, closing $$45 \\times 5.5 = 247.5°$$ from the 9:00 position of 270°, leaving $$270 - 247.5 = 22.5°$$.\n\nThe angle depends on both the starting separation (determined by $$H$$) and how long the minute hand has been closing the gap (determined by $$M$$).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "In a mean age problem, why is it essential to convert \"the mean of $$n$$ items is $$\\bar{x}$$\" into \"the total sum is $$n\\bar{x}$$\" before doing anything else? (2 steps)", "answer": "- Step 1: The mean alone doesn't tell you the total. Twenty people with mean age 28 could have a total age of $$20 \\times 28 = 560$$, but the mean by itself is just an average — you can't add or subtract individuals from an average directly.\n- Step 2: When new members join, you need to find the new total sum and subtract the old total sum to find the combined age of the new members. This requires knowing both sums: $$\\Sigma_{\\text{new}} = n_{\\text{new}} \\times \\bar{x}_{\\text{new}}$$ and $$\\Sigma_{\\text{old}} = n_{\\text{old}} \\times \\bar{x}_{\\text{old}}$$. The difference $$\\Sigma_{\\text{new}} - \\Sigma_{\\text{old}}$$ gives the total added by the new members. You cannot get this from the means alone without converting to sums first.\n\nAlways translate \"mean = ...\" into \"sum = ...\" as your very first step in any statistics word problem.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "In the running club problem, the mean increases from 28 to 30 when 2 new members join. Why is it a mistake to use $$\\bar{x}_{\\text{new}} = 28$$ (the old mean) when computing the new total sum? (2 steps)", "answer": "- Step 1: The problem states the mean *increases by 2*, so the new mean is $$28 + 2 = 30$$, not 28. Using the old mean would give a new total of $$22 \\times 28 = 616$$, but the correct new total is $$22 \\times 30 = 660$$.\n- Step 2: The difference matters enormously: the correct extra sum is $$660 - 560 = 100$$ (mean age of new members = 50), while the incorrect calculation gives $$616 - 560 = 56$$ (mean age = 28). The exam includes 20 years and 40 years as distractors that arise from similar errors (e.g., using the wrong count or the wrong mean).\n\nRead each sentence carefully: \"increases by 2\" means the new mean is 30, not 28. Parse line by line.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A quick sanity check: if the mean age of a group increases when new members join, what must be true about the mean age of the new members compared to the old mean? Why? (2 steps)", "answer": "- Step 1: The new members must have a mean age **greater** than the old mean. This is a necessary condition for the overall mean to increase. Think of the mean as a balance point: adding weight (people) on the \"older\" side of the balance shifts the average upward.\n- Step 2: In the running club problem, the old mean is 28 and the new mean is 30. So the new members' mean must exceed 28 — in fact it must exceed 30, because the 20 original members are pulling the average down to 28, and only 2 new members are pulling it up to 30. The two new members must be substantially older than 30 to overcome the inertia of 20 people at 28. The answer (50 years) is consistent with this: two people at 50 are \"heavy enough\" to lift the average of 22 people from 28 to 30.\n\nIf the mean goes up, the newcomers are above the old mean. If it goes down, they're below. This sanity check catches sign errors.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "When solving the semicircle-in-square problem, Option B has $$4 - \\pi$$ in the denominator while Option A has $$8 - \\pi$$. What specific error leads to the $$4 - \\pi$$ version? (2 steps)", "answer": "- Step 1: If you forget the $$\\tfrac{1}{2}$$ in the semicircle area formula and write the cut-out area as $$\\pi r^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi r^2$$, the equation becomes $$m^2 - \\pi(m/2)^2 = 100$$, which expands to $$m^2 - \\pi m^2/4 = 100$$.\n- Step 2: Factoring: $$m^2(1 - \\pi/4) = 100$$, so $$m^2 = \\frac{100}{1 - \\pi/4} = \\frac{400}{4 - \\pi}$$. The denominator is $$4 - \\pi$$ instead of $$8 - \\pi$$. This is exactly Option B's structure (with a different coefficient). The exam designers placed this distractor deliberately to catch the missing-$$\\tfrac{1}{2}$$ error.\n\nEach wrong option often corresponds to a specific, common mistake. Recognising which error produces which distractor helps you self-check.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "In the similar triangles problem, the scale factor from the large triangle to a sub-triangle is $$\\div\\sqrt{5}$$. Where does the $$\\sqrt{5}$$ come from? (2 steps)", "answer": "- Step 1: The hypotenuse of the large triangle is $$PR = 10\\sqrt{5}$$, found via Pythagoras: $$\\sqrt{20^2 + 10^2} = \\sqrt{500} = 10\\sqrt{5}$$. The hypotenuse of the sub-triangle $$QTR$$ is the leg $$RQ = 10$$ of the large triangle.\n- Step 2: The ratio of the large hypotenuse to the sub-triangle hypotenuse is $$\\frac{10\\sqrt{5}}{10} = \\sqrt{5}$$. So the large triangle is $$\\sqrt{5}$$ times bigger than the sub-triangle, meaning every side of the sub-triangle is the corresponding side of the large triangle divided by $$\\sqrt{5}$$. The altitude $$QT$$ corr
