M$$.\n- Step 3: The angle between them is the absolute difference: $$|30H + 0.5M - 6M| = |30H - 5.5M|$$.\n\nIf this exceeds 180°, subtract from 360° to get the smaller angle. (At 9:45: $$|30 \\cdot 9 - 5.5 \\cdot 45| = |270 - 247.5| = 22.5°$$ — confirmed.)", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In the mean-age problem, the *mean* increases by exactly 2 years. What is the new mean, and what is the most common wrong interpretation of this phrasing? (2 steps)", "answer": "- Step 1: The new mean is the *old* mean plus 2: $$28 + 2 = 30$$. This is what the problem means by \"increases by exactly 2 years.\"\n- Step 2: A common trap is to interpret \"increases by 2\" as \"becomes 2\" or \"increases to 2\" — both of which would give 2 as the new mean, which is absurd in context but illustrates the kind of misreading that costs marks. A more subtle trap is to use 28 (the old mean) as the *new* mean when computing the new total, forgetting to add the 2. The lesson's sticky note says it directly: *\"Recognise that the mean age increases by 2 years, so the new mean is 30.\"* — making this distinction explicit prevents the error.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In the mean-age problem, the original count is 20 and the new count is 22. Why does it matter which count you use in the denominator of the mean formula, and what error does forgetting this produce? (2 steps)", "answer": "- Step 1: The mean formula is $$\\bar{x} = \\Sigma/n$$, equivalently $$\\Sigma = n\\bar{x}$$. The variable $$n$$ (the count) appears explicitly, and it must reflect the actual number of members at the time the mean is being calculated.\n- Step 2: Forgetting to change the count from 20 to 22 after the two new members join gives: new sum = $$22 \\times 30 = 660$$ becomes a wrong $$20 \\times 30 = 600$$, then \"extra = 40\", then \"mean of two = 20\" — which is exactly option A in the question. This is a deliberately planted distractor that targets the slip. Always pause and ask: *how many members are in the group at this point in the problem?* before plugging in.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "Harry's sticky note said *\"Using this information, what could I work?\"*. What is the pedagogical purpose of asking this question before solving? (2 steps)", "answer": "- Step 1: The prompt forces Phuc to *scan each sentence* of the word problem and translate it into a quantity that can be computed. It's a structured way to break a multi-sentence problem into atomic equations.\n- Step 2: This is a transferable ESAT technique: rather than diving into algebra immediately, list the *knowns* (mean = 28, count = 20, change in mean = +2, new count = 22) and ask \"what can I derive from each?\". The first sentence gives total sum = 560; the change in mean plus new count gives new sum = 660; the difference gives the two new members' combined age; dividing by 2 gives the mean age. The chain of one-sentence-to-one-equation parsing prevents the most common error in word problems: skipping a constraint and producing a self-consistent but wrong equation.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "State the formula for surd splitting: how do you simplify $$\\sqrt{\\tfrac{a}{b}}$$ and why does this rule hold? (2 steps)", "answer": "- Step 1: The rule is $$\\sqrt{\\tfrac{a}{b}} = \\tfrac{\\sqrt{a}}{\\sqrt{b}}$$.\n- Step 2: This holds because the square root of a quotient equals the quotient of the square roots, by the general property that $$\\sqrt{xy} = \\sqrt{x}\\sqrt{y}$$ applied to $$y = 1/b$$ (so that $$\\sqrt{a \\cdot 1/b} = \\sqrt{a}\\sqrt{1/b} = \\sqrt{a}/\\sqrt{b}$$). This is the rule that allows the final form $$20\\sqrt{2/(8-\\pi)}$$ to be obtained from the un-split $$\\sqrt{800/(8-\\pi)}$$ in Q1.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "In Q1's alternative route, the side of the square was relabelled as $$2m$$ (so the *new* variable is half the side). Why is relabelling a variable sometimes a useful algebraic move, even though it seems to add complexity? (2 steps)", "answer": "- Step 1: When the original problem's side length appears in complicated positions (e.g., $$m/2$$ as the radius), a substitution can simplify the algebra. In the alternative route, replacing the side with $$2m$$ makes the radius simply $$m$$ — no more fractions.\n- Step 2: The cost of relabelling is that you must remember to translate the final answer back to the original variable. If you skip that step, your answer will be off by a factor of 2 (or whatever the substitution was). Used carefully, relabelling is a powerful *de-complexification* tool; used carelessly, it's a source of off-by-constant errors.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Why does ESAT's computer-based format, combined with no method marks, change the optimal problem-solving strategy compared to a written exam? (2 steps)", "answer": "- Step 1: In a written exam, you can show partial work and earn partial credit, which encourages careful derivation. In ESAT, only the final answer counts, so any work that doesn't lead to a final answer is \"wasted time\" in the sense that it doesn't directly earn marks.\n- Step 2: The optimal ESAT strategy is therefore: (a) read the *options* first to see what form the answer is in (this tells you what form your algebra should target), (b) sketch the *minimum* diagram needed (elaborate diagrams are time-expensive), (c) work in a single pass with as few intermediate steps as possible, and (d) verify only the final computation, not the whole chain. This is closer to \"calculation strategy\" than \"mathematical exposition\".", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "What is the \"triage\" strategy, and why is it essential in ESAT despite feeling wasteful? (2 steps)", "answer": "- Step 1: Triage means: if a question is not yielding to your first 30 seconds of analysis, mark it mentally and move to the next. After clearing the easier questions, return to the skipped ones with whatever time remains.\n- Step 2: It feels wasteful because you're \"leaving points on the table\" while other questions are still in front of you — but the opposite is worse. Spending 4 minutes on a hard question and getting it right still gives you 1 point, but costs you 4 minutes you could have spent on 2-3 other questions. The expected-value calculation favours triage: a hard question solved in 4 min = 1 point; an easy question solved in 90 s = 1 point; so spending 4 min on the hard one is a *net loss* of 1-2 easy questions. Harry's framing is exact: *\"60 seconds on a solvable question rather than getting stuck\"*.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "The cube problem distinguishes three lengths: the *body diagonal* (corner to opposite corner), the *face diagonal*, and the *vertex-to-opposite-face-midpoint*. Rank these three lengths from shortest to longest, and explain the reasoning. (2 steps)", "answer": "- Step 1: For a unit cube (side = 1):\n  + Face diagonal = $$\\sqrt{1^2 + 1^2} = \\sqrt{2} \\approx 1.414$$\n  + Vertex to opposite face midpoint = $$\\sqrt{1^2 + (\\tfrac{1}{2})^2 + (\\tfrac{1}{2})^2} = \\sqrt{\\tfrac{6}{4}} = \\tfrac{\\sqrt{6}}{2} \\approx 1.225$$\n  + Body diagonal (corner to opposite corner) = $$\\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3} \\approx 1.732$$\n- Step 2: Ranking: vertex-to-face-midpoint (1.225) < face diagonal (1.414) < body diagonal (1.732). The face diagonal sits in between because it spans *two* unit dimensions but not three, while the vertex-to-midpoint spans three dimensions but one of them is halved. The body diagonal is the longest because it spans all three unit dimensions in full.\n\nThis is why $$\\sqrt{3}$$ is a *distractor* in the cube problem — it's the answer to a *different* (longer) line in the same cube.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the lesson, the same problem (Q2) was solved two different ways: (A) using a similarity ratio, and (B) using two expressions for area. Both are correct, and Method B was deemed faster. What is the deeper lesson here about *choosing* techniques in ESAT? (2 steps)", "answer": "- Step 1: The lesson demonstrates that for any given problem there is usually a *geometric* way (similar triangles, scaling, etc.) and an *algebraic* way (using invariants like area). The geometric method is often more visually intuitive and easier to invent; the algebraic method is often more mechanical and faster once the relevant invariant is spotted.\n- Step 2: The takeaway for exam preparation: for each problem type, learn *both* the geometric intuition and the algebraic shortcut, then *default to the algebraic shortcut* under time pressure. Harry shows the geometric method (similarity ratio) in detail because Phuc benefits from the visual understanding, but then implicitly recommends the area-based method for speed. This is the meta-skill: knowing multiple paths and choosing the one with the lowest *time-to-answer* on exam day.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "In Q1, the algebraic derivation involves the step $$m^2 \\cdot \\tfrac{8-\\pi}{8} = 100 \\Rightarrow m^2 = \\tfrac{800}{8-\\pi}$$. What is the conceptual justification for multiplying by $$\\tfrac{8}{8-\\pi}$$ rather than dividing by $$\\tfrac{8-\\pi}{8}$$? (2 steps)", "answer": "- Step 1: Algebraically, both operations produce the same result: dividing by $$\\tfrac{8-\\pi}{8}$$ is the same as multiplying by $$\\tfrac{8}{8-\\pi}$$. So the question is purely about which is easier to write down correctly.\n- Step 2: The convention \"multiply by the reciprocal\" is safer because it avoids a notational trap: if you write \"$$m^2 = 100 \\div (8-\\pi)/8$$\", the order of operations becomes ambiguous (does the division by 8 happen before or after the subtraction of $$\\pi$$?). Multiplying by $$\\tfrac{8}{8-\\pi}$$ makes the intent — invert the entire fraction — visually unambiguous. This is a small but important symbolic discipline: *the way you write an operation should make the result obvious without re-deriving the algebra each time*.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "ESAT answer options are deliberately spaced using different *forms* of the correct expression. For Q1 (semicircle-in-square), the options use different denominators ($$4-\\pi$$ vs $$8-\\pi$$) and different coefficients (10 vs 20). What is the purpose of this design, and how should you use it to your advantage? (2 steps)", "answer": "- Step 1: The spread of options tests whether you can spot the *structural features* of the correct expression. The denominator $$4-\\pi$$ vs $$8-\\pi$$ is exactly the distinction between using full circle area ($$\\pi r^2$$) vs semicircle area ($$\\tfrac{1}{2}\\pi r^2$$) — a distractor for students who forget the $$\\tfrac{1}{2}$$. The coefficient 10 vs 20 is the distinction between whether $$\\sqrt{800}$$ was simplified correctly. So each wrong option tests a *specific* mistake.\n- Step 2: To use this to your advantage: after you derive an answer, *work backwards* through the options to see which mistake each wrong option would come from. If your algebra is correct, your answer will have features (e.g., $$8-\\pi$$ in the denominator) that match only one option. If you're uncertain, you can sometimes eliminate 2-3 options by structural inspection alone — e.g., \"+π\" in the denominator would correspond to *adding* a semicircle, which is the wrong operation for this problem.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Quick exercise (no calculator): A square has a semicircular notch cut from one side. If the side of the square is 4, what is the remaining area? (Express using $$\\pi$$.) (2 steps)", "answer": "- Step 1: The semicircle has diameter equal to the side, so radius $$r = 2$$. Its area is $$\\tfrac{1}{2}\\pi r^2 = \\tfrac{1}{2}\\pi(4) = 2\\pi$$.\n- Step 2: The square area is $$4^2 = 16$$, so the remaining area is $$16 - 2\\pi$$ square units.\n\nThe conceptual check: the remaining area is *less than* 16 (because we removed material), and the subtracted piece involves $$\\pi$$ — both features are present. If your answer came out larger than 16, you have a sign error; if it doesn't involve $$\\pi$$, you forgot the curved boundary.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Quick exercise (no calculator): A right-angled triangle has legs 5 and 12. Using only mental math and the formula $$h = ab/c$$, what is the altitude from the right-angle vertex to the hypotenuse? (2 steps)", "answer": "- Step 1: Hypotenuse $$c = \\sqrt{5^2 + 12^2} = \\sqrt{25 + 144} = \\sqrt{169} = 13$$.\n- Step 2: Altitude $$h = \\tfrac{5 \\times 12}{13} = \\tfrac{60}{13}$$.\n\nYou don't need to simplify further — the answer is just $$\\tfrac{60}{13}$$. The conceptual check: the altitude should be *less than both legs* (it's the shortest line from the right-angle vertex to the hypotenuse), and indeed $$60/13 \\approx 4.6 < 5$$ ✓.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Quick exercise (no calculator): At 3:00, what is the angle between the clock hands? At 3:15, what is the angle? (1 step)", "answer": "- Step 1: Use the formula $$\\theta = |30H - 5.5M|$$.\n  + At 3:00: $$|30 \\cdot 3 - 5.5 \\cdot 0| = 90°$$ (the classic right angle).\n  + At 3:15: $$|30 \\cdot 3 - 5.5 \\cdot 15| = |90 - 82.5| = 7.5°$$.\n\nThe conceptual point: at 3:15, the minute hand has moved a quarter of the way around (to the 3), and the hour hand has crept 1/4 of an hour-mark past the 3 — which is $$\\tfrac{1}{4} \\times 30° = 7.5°$$. The two hands are now *very close* but not coincident. (The first time the hands coincide after 3:00 is around 3:16:22.)", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Quick exercise (no calculator): The mean of 4 numbers is 7. A 5th number is added, and the new mean becomes 9. What is the 5th number? (3 steps)", "answer": "- Step 1: Old total $$\\Sigma_1 = 4 \\times 7 = 28$$.\n- Step 2: New total $$\\Sigma_2 = 5 \\times 9 = 45$$.\n- Step 3: 5th number = $$45 - 28 = 17$$.\n\nThe conceptual check: adding one number raised the mean by 2, so the new number must be *larger* than the old mean (otherwise the mean would have dropped). Indeed, 17 > 7, and adding 17 to a sum of 28 across 5 numbers gives an average of 45/5 = 9 ✓.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Quick exercise (no calculator): A cube has side length 2 (not unit). What is the distance from one vertex to the midpoint of the *opposite face*? (2 steps)", "answer": "- Step 1: In a cube of side 2, the vertex-to-opposite-face-midpoint displacement has coordinates $$(2, 1, 1)$$ (one full edge, two half-edges). The direct 3D Pythagoras gives $$d = \\sqrt{2^2 + 1^2 + 1^2} = \\sqrt{6}$$.\n- Step 2: Sanity check via two-step: base diagonal across a face = $$\\sqrt{2^2 + 2^2} = 2\\sqrt{2}$$... no wait, we need the diagonal of the *face that includes the target midpoint* — that's the face whose side is 2 and which has a midpoint at distance 1 from two edges. So that face's diagonal-to-midpoint = $$\\sqrt{2^2 + 1^2} = \\sqrt{5}$$. Then the full distance = $$\\sqrt{(\\sqrt{5})^2 + 1^2} = \\sqrt{6}$$ ✓.\n\nBoth methods agree. Notice that the answer is just $$\\sqrt{6}$$ (not rationalised, no denominator) — this is what changes when the cube is not unit-sized.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Quick exercise (no calculator): In the ratio chain $$A:B = 2:3$$ and $$B:C = 4:5$$, what is $$A:C$$ in simplest form? (2 steps)", "answer": "- Step 1: Find the LCM of $$B$$'s values (3 and 4) = 12. Scale the first ratio by 4: $$A:B = 8:12$$. Scale the second ratio by 3: $$B:C = 12:15$$.\n- Step 2: $$A:C = 8:15$$. Check: GCD(8, 15) = 1, so already in simplest form.\n\nThe conceptual check: I have $$A:B = 2:3$$ so $$A < B$$, and $$B:C = 4:5$$ so $$B < C$$, so I expect $$A < C$$ in the combined ratio — and indeed 8 < 15 ✓.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In the lesson, Harry showed two *paths* to the same answer in Q1: a direct expansion (Phuc's approach) and a \"relabel the side as $$2m$$\" alternative. The relabelling produces a formula with $$8-\\pi$$ and coefficient 10, but the *final* answer matches Phuc's. Why does relabelling preserve the final answer, and what is the test you can apply to check you haven't broken the relabelling? (2 steps)", "answer": "- Step 1: Relabelling the side as $$2m$$ (instead of the original side, call it $$S$$) means you are computing with $$m = S/2$$. So whatever you derive for $$m$$ in the new variable gives the original side $$S = 2m$$. As long as you translate back at the end, the final answer in terms of $$S$$ is preserved.\n- Step 2: The sanity test: if your \"side\" answer comes out as $$10\\sqrt{\\text{something}}$$ in one derivation and $$20\\sqrt{\\text{other thing}}$$ in another, you should get numerically equal values. The \"something\" and \"other thing\" should differ by exactly a factor of 4 (because the squaring of the factor of 2). For Q1: $$10\\sqrt{2/(8-\\pi)} \\times 2 = 20\\sqrt{2/(8-\\pi)}$$ ✓ — they match by construction. If the two answers don't match numerically, you've made a translation error.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "ESAT problems frequently combine *geometric setup* with *algebraic simplification*. Looking at Q1 and Q2, what is the common pattern of \"geometry-then-algebra\" that ESAT rewards? (2 steps)", "answer": "- Step 1: In both Q1 and Q2, the geometric setup produces an *equation* linking the unknown to given quantities. Q1: \"remaining area = 100\" translates to $$m^2 - \\tfrac{1}{2}\\pi r^2 = 100$$. Q2: \"right triangle with given legs\" translates to PR = 10$$\\sqrt{5}$$ and then to $$x = 20/\\sqrt{5}$$. In each case, the geometry is the source of the equation.\n- Step 2: After the geometric setup, the problem is *pure algebra*: solve for the variable, simplify surds, rationalise. The algebra is mechanical and doesn't require geometric insight. The pattern is: spend ~30-40% of the time on the geometric setup (translating the problem into an equation), and the remaining ~60% on algebraic manipulation. Under time pressure, the bottleneck is almost always the *setup* phase, not the *algebra* phase — so practising quick geometric translation is more valuable than practising algebraic manipulation per se.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "In the cube problem (Q3), the *canonical* 3D Pythagoras formula is $$d = \\sqrt{x^2 + y^2 + z^2}$$, but the lesson broke it into *two successive 2D Pythagoras* steps. What is the conceptual equivalence between the single 3D formula and the two-step decomposition? (2 steps)", "answer": "- Step 1: Mathematically, the two-step decomposition is just the *associativity of addition* applied inside the square root. The single formula says $$d^2 = x^2 + y^2 + z^2$$. The two-step version says: (i) first compute $$d_1^2 = x^2 + y^2$$, then (ii) compute $$d^2 = d_1^2 + z^2$$. By associativity, $$(x^2 + y^2) + z^2 = x^2 + y^2 + z^2$$, so the results are identical.\n- Step 2: The *practical* difference is purely in cognitive load. The single formula requires visualising a 3D displacement with three components at once, which is error-prone under exam pressure. The two-step version reduces each step to a 2D right triangle (which is concrete and visual), then chains them. The trade-off: two-step is *slower* (more operations) but *more reliable* (each step is a familiar 2D case). The lesson's choice to use the two-step version reflects an exam-day prioritisation of reliability over raw speed.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "When solving the cube problem, why does the first 2D Pythagoras step use the *base face* diagonal (length $$\\tfrac{\\sqrt{5}}{2}$$ in a unit cube) and not the *side face* diagonal? How do you decide which \"intermediate\" 2D step to use? (2 steps)", "answer": "- Step 1: The line from the corner to the face midpoint can be decomposed in *multiple* ways depending on which 2D \"slice\" you draw first. The key is to choose a slice that produces a right angle at the intermediate point — otherwise Pythagoras doesn't apply.\n- Step 2: The lesson's choice — base face diagonal plus a vertical rise — is one valid decomposition. The base face contains two of the three coordinates (the two \"in-plane\" dimensions), and the vertical edge contributes the third. As long as the intermediate 2D triangle is *right-angled* (with the right angle at the corner or the foot of the altitude), Pythagoras applies. If you choose a \"slice\" that isn't right-angled, you cannot use the simple $$a^2 + b^2 = c^2$$ and must fall back on the full 3D formula. The general principle: *for 3D Pythagoras, always find a right-angled 2D triangle as your intermediate step*.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "Across the six ESAT problems in the lesson, what is the *most consistent* type of student error, and what does this tell you about the bottleneck in ESAT preparation? (2 steps)", "answer": "- Step 1: The errors observed were: (i) Phuc's first attempt on Q1 — using $$\\pi r^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi r^2$$ (semicircle); (ii) Phuc's first attempt on Q4 — scaling $$R$$ but not $$S$$; (iii) the conceptual trap on Q5 — assuming the hour hand is stationary at 9; (iv) the conceptual trap on Q6 — using the wrong count in the mean formula. These are *not* arithmetic errors — they are *formula misapplication* and *geometric assumption* errors.\n- Step 2: The bottleneck is therefore not arithmetic speed (Phuc could compute each step correctly once the right formula was given) but *recognising the right formula in context*. This means rote memorisation of formulas is necessary but not sufficient — the harder skill is *pattern recognition* (this problem is \"a semicircle in a shape\" → use $$\\tfrac{1}{2}\\pi r^2$$). Harry's advice to do *untimed* practice first directly targets this: you cannot build pattern recognition under clock pressure, but you can build it with deliberate, reflective practice.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "What is the conceptual relationship between the *altitude of a right triangle* formula $$h = ab/c$$ and the *similar triangles* approach used in the lesson? Are they the same insight in disguise, or genuinely different? (2 steps)", "answer": "- Step 1: They are *the same geometric insight* expressed in two algebraic languages. The similar-triangles approach uses the *ratio* of corresponding sides in similar triangles: in a right triangle with altitude to the hypotenuse, the small triangle is similar to the large, so the altitude's length is determined by the scale factor. The area approach uses the *invariance* of area: computing it as $$\\tfrac{1}{2}ab$$ (using the legs) and as $$\\tfrac{1}{2}ch$$ (using the hypotenuse) and equating them.\n- Step 2: The reason they give the same answer is that *similarity ratios and area invariance are mathematically equivalent statements about right triangles*. Two similar triangles have the same angle, so the side ratio equals the altitude ratio, and this is exactly the relation $$h/c = b/a$$ (rearranged: $$h = bc/a$$ — but with the labelling in the lesson, it becomes $$h = ab/c$$). So whichever you use, you're really using the same fact. The lesson shows both so you can pick whichever feels faster.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "ESAT preparation involves \"10 lessons\" of structured practice, per Harry. If you only had time to drill *one* type of problem until automatic, which would give the highest expected-value return based on the lesson content? (2 steps)", "answer": "- Step 1: Looking at the six problems, the most *recurring* skill across them is *formula recognition and translation*: turning a word problem into an equation involving a known formula. Q1 needs the semicircle area formula. Q2 needs Pythagoras and the altitude formula. Q3 needs 3D Pythagoras. Q4 needs the ratio alignment technique. Q5 needs the clock angle formula. Q6 needs the mean formula. The only skill that appears in *every single* problem is \"translate text into equation and solve\".\n- Step 2: This is also the bottleneck in Harry's framing — the *algebraic* part is mechanical, but the *translational* part (which formula? which relation? which constraint?) is where students get stuck. So the highest-expected-value drill is: take any word problem and practise the *first* 30 seconds — reading the problem and writing down (a) the knowns, (b) the unknowns, (c) which formula links them, (d) the equation. This skill transfers across all six problem types and is the rate-limiting step on exam day.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In Q2, Harry drew the sub-triangle $$RQT$$ *separately* below the main diagram. What is the pedagogical reason for *extracting* the sub-triangle rather than working entirely on the main diagram? (2 steps)", "answer": "- Step 1: The main diagram has three triangles (the big $$PQR$$ and the two sub-triangles $$PQT$$ and $$RQT$$), all sharing vertices and angles. Trying to label all the angles and sides on one diagram creates visual clutter and makes it hard to *isolate* the relationship between two specific triangles.\n- Step 2: By extracting the sub-triangle $$RQT$$ and redrawing it at a larger scale below the main diagram, Harry makes the relevant side lengths ($$RQ = 10$$, $$QT = x$$) and the relevant angles (the double arc at $$R$$ and the right angle at $$T$$) immediately visible. This is a general *visualisation technique* for any \"altitude from a vertex\" problem: identify the smaller triangle of interest and isolate it. The main diagram is for context; the sub-diagram is for computation.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}], "count": 41}}, "meta": {}};
const SK='esat_22may_llm';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
