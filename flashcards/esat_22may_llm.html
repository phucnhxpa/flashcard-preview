esponds to leg $$PQ = 20$$, so $$QT = 20/\\sqrt{5} = 4\\sqrt{5}$$.\n\nThe $$\\sqrt{5}$$ is the ratio of the hypotenuses — it emerges from the Pythagorean calculation of the large triangle's hypotenuse.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Why is the two-area trick ($$h = ab/c$$) faster than the similarity-ratio method for finding the altitude from the right-angle vertex to the hypotenuse? (2 steps)", "answer": "- Step 1: The similarity method requires you to: (1) identify which sub-triangle is similar to the original, (2) determine which sides correspond, (3) compute the scale factor, and (4) apply it to the correct side. This involves multiple conceptual steps where you can misidentify correspondences.\n- Step 2: The two-area trick bypasses all of that. You only need the two legs ($$a$$, $$b$$) and the hypotenuse ($$c$$), then compute $$h = ab/c$$. No similarity identification, no correspondence matching. In the lesson's problem: $$h = (20 \\times 10)/(10\\sqrt{5}) = 200/(10\\sqrt{5}) = 20/\\sqrt{5} = 4\\sqrt{5}$$. Same answer, fewer steps, less room for error.\n\nOn a timed exam, always prefer the method with fewer conceptual decisions.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In 3D Pythagoras problems, you can either apply two successive 2D Pythagoras steps or use the direct formula $$d = \\sqrt{x^2 + y^2 + z^2}$$. When is each approach preferable? (2 steps)", "answer": "- Step 1: The direct formula $$d = \\sqrt{x^2 + y^2 + z^2}$$ is fastest when you can immediately read off the three perpendicular components from the problem. For the vertex-to-face-midpoint problem, the components are $$(1, \\tfrac{1}{2}, \\tfrac{1}{2})$$, so $$d = \\sqrt{1 + 1/4 + 1/4} = \\sqrt{3/2} = \\sqrt{6}/2$$. One step, done.\n- Step 2: The two-step approach is preferable when the problem gives you intermediate lengths naturally (e.g., \"first find the diagonal of the base, then...\"), or when you need to show working, or when the components aren't immediately obvious and you need to build up geometrically. It's also useful when the problem asks for an intermediate answer.\n\nBoth give the same result; the direct formula is just the two-step version compressed. Use whichever the problem structure suggests.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A cube has side length 2 (not 1). Without doing full calculations, how would the vertex-to-opposite-face-midpoint distance change compared to the unit cube answer of $$\\sqrt{6}/2$$? (2 steps)", "answer": "- Step 1: All lengths in the cube scale linearly with the side length. If the side doubles from 1 to 2, every distance in the cube doubles. The three perpendicular components become $$(2, 1, 1)$$ instead of $$(1, \\tfrac{1}{2}, \\tfrac{1}{2})$$.\n- Step 2: The distance becomes $$\\sqrt{2^2 + 1^2 + 1^2} = \\sqrt{4 + 1 + 1} = \\sqrt{6}$$, which is exactly $$2 \\times \\sqrt{6}/2 = \\sqrt{6}$$. Scaling the side by factor $$k$$ scales all distances by factor $$k$$.\n\nGeometric scaling: if you multiply all linear dimensions by $$k$$, all lengths (including diagonals) multiply by $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "In the ratio problem, the two ratios share the variable $$R$$ but with different values (2 and 3). Why do we use the LCM (6) rather than simply multiplying both ratios to make R = 6? Could we use any other common multiple? (2 steps)", "answer": "- Step 1: We could use any common multiple of 2 and 3 — 6, 12, 18, etc. Using 12: scale $$Q:R$$ by $$\\times 6$$ to get $$30:12$$, and $$R:S$$ by $$\\times 4$$ to get $$12:40$$. Then $$Q:S = 30:40 = 3:4$$. Same final answer.\n- Step 2: The LCM is preferred because it keeps the numbers smallest, reducing arithmetic errors. Using 12 instead of 6 works but involves larger numbers. The final simplified ratio is always the same regardless of which common multiple you choose, because simplification cancels any common factor.\n\nAlways use the LCM for efficiency, but know that any common multiple gives the correct simplified result.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "For clock angle problems, if the formula $$|30H - 5.5M|$$ gives a value greater than 180°, what should you do and why? (2 steps)", "answer": "- Step 1: The angle between two lines is always taken as the smaller of the two possible angles (the acute or obtuse one, not the reflex angle). A full circle is 360°, so if the formula gives an angle $$\\theta > 180°$$, the actual angle between the hands is $$360° - \\theta$$.\n- Step 2: For example, at 2:50: $$|30(2) - 5.5(50)| = |60 - 275| = 215°$$. Since $$215° > 180°$$, the actual angle is $$360° - 215° = 145°$$. The two hands always form two angles that sum to 360°; the question asks for the smaller one.\n\nAlways check: if your answer exceeds 180°, subtract from 360° to get the correct angle.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "At exactly 12:00, the clock hands overlap (angle = 0°). Roughly how long does it take for them to overlap again, and why isn't it exactly 60 minutes? (2 steps)", "answer": "- Step 1: The minute hand gains 5.5° on the hour hand every minute (relative speed = 5.5°/min). To lap the hour hand (gain a full 360°), the minute hand needs $$360/5.5 \\approx 65.45$$ minutes, which is about 1 hour and 5.5 minutes.\n- Step 2: It's not 60 minutes because in 60 minutes, the hour hand has moved forward by 30° (from one hour mark to the next). The minute hand returns to the top but the hour hand has shifted, so they don't overlap. The minute hand must travel a full 360° plus that extra 30° to catch up, which takes longer than 60 minutes.\n\nThe hands overlap roughly every 65.5 minutes, not every 60 minutes — the hour hand's continuous drift is the reason.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "In the mean age problem, the answer is 50 years. The original members have mean age 28. Explain intuitively why the two new members must be so much older than 28 to raise the mean by only 2 years. (2 steps)", "answer": "- Step 1: There are 20 original members at mean 28, and only 2 new members. The new members are vastly outnumbered (20 vs 2), so each new member has a much larger \"lever arm\" on the average — but they must overcome the inertia of 20 people pulling the average toward 28.\n- Step 2: To raise the average of 22 people from 28 to 30, the total must increase by $$22 \\times 30 - 20 \\times 28 = 660 - 560 = 100$$. These 100 extra years must come from just 2 people, so each contributes 50 on average. The intuition: 2 people must \"donate\" enough extra years to lift 20 people's average by 2, which requires $$20 \\times 2 = 40$$ extra years for the old members' \"share\" plus $$2 \\times 30 = 60$$ for the new members' own contribution to the new mean, totaling 100.\n\nFewer new members means each must be further from the old mean to shift the average. This is a \"leverage\" effect.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "You encounter an ESAT geometry question where the answer options include both $$8+\\pi$$ and $$8-\\pi$$ in denominators. How can you use physical reasoning to eliminate one without solving? (2 steps)", "answer": "- Step 1: Consider what the expression represents. In the semicircle-in-square problem, the denominator comes from $$(1 - \\pi/8)$$, which is the fraction of the square that remains after cutting out the semicircle. Since $$\\pi/8 \\approx 0.393$$, the remaining fraction is about 0.607 — a positive number less than 1.\n- Step 2: If the denominator were $$8 + \\pi$$, that would correspond to $$(1 + \\pi/8)$$, implying the remaining area is more than the full square — physically impossible when material has been removed. So $$8 + \\pi$$ in the denominator is wrong by a sign check. The correct denominator must be $$8 - \\pi$$ because we subtracted area.\n\nUse physical constraints (areas must be positive, removing material reduces area) to eliminate options before computing.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "Why does the ESAT advise you to \"draw a diagram, even for clock problems,\" and how does this prevent the most common clock-angle error? (2 steps)", "answer": "- Step 1: Without a diagram, it's easy to reason abstractly: \"at 9:45, the minute hand is at 9, and it's 9 o'clock, so the hour hand is at 9 too — angle is 0°.\" A diagram forces you to physically place both hands and see that the hour hand cannot be at 9 when 45 minutes have elapsed.\n- Step 2: Drawing the clock face with the minute hand at 9 and the hour hand between 9 and 10 makes the 22.5° gap visually obvious. The diagram externalises the continuous-movement fact that your verbal reasoning might skip. It doesn't need to be neat — just accurate enough to show relative positions.\n\nDiagrams prevent logical shortcuts that feel correct but ignore key constraints (like continuous hour-hand movement).", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A semicircle is cut from a square, leaving area 100 cm². If instead a full circle of the same radius were cut from the square, would the remaining area be larger or smaller than 100 cm², and why? (2 steps)", "answer": "- Step 1: A full circle has twice the area of a semicircle with the same radius. Cutting out a full circle removes more material than cutting out a semicircle.\n- Step 2: Therefore, the remaining area would be smaller than 100 cm². Specifically, the extra removed area is $$\\tfrac{1}{2}\\pi r^2$$, so the remaining area would be $$100 - \\tfrac{1}{2}\\pi r^2$$, which is clearly less than 100.\n\nMore material removed → less remaining area. This directional reasoning helps you check whether your algebra gives a sensible answer.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "In the unit cube 3D Pythagoras problem, what would the distance be from a vertex to the **centre** of the opposite face (not the midpoint of one edge of the opposite face, but the true centre)? How does this compare to $$\\sqrt{6}/2$$? (2 steps)", "answer": "- Step 1: The centre of the opposite face has coordinates $$(1, \\tfrac{1}{2}, \\tfrac{1}{2})$$ — wait, that IS the midpoint of the opposite face (the face opposite a vertex is a square, and its centre/midpoint is the same point). So the distance is the same: $$\\sqrt{6}/2$$.\n- Step 2: However, if the question asked for the midpoint of one *edge* of the opposite face (e.g., $$(1, 1, \\tfrac{1}{2})$$), the distance would be $$\\sqrt{1 + 1 + 1/4} = \\sqrt{9/4} = 3/2$$, which is larger. The face-centre is the closest point on the opposite face to the starting vertex because it minimises the sum of the squared perpendicular distances.\n\nThe face-centre is the closest point on the opposite face to a vertex — this is why the vertex-to-face-centre distance ($$\\sqrt{6}/2$$) is less than the body diagonal ($$\\sqrt{3}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Synthesis question: A rectangle has sides 6 and 8. A semicircle is drawn on the longer side as diameter, entirely outside the rectangle. What is the total area of the rectangle-plus-semicircle shape? Walk through the conceptual steps. (3 steps)", "answer": "- Step 1: Identify the two component areas. The rectangle has area $$6 \\times 8 = 48$$. The semicircle has diameter 8 (the longer side), so radius $$r = 4$$.\n- Step 2: The semicircle area is $$\\tfrac{1}{2}\\pi r^2 = \\tfrac{1}{2}\\pi(16) = 8\\pi$$. Note the $$\\tfrac{1}{2}$$ — it's a semicircle, not a full circle.\n- Step 3: Total area = rectangle + semicircle = $$48 + 8\\pi$$. The key conceptual points: (1) identify which dimension is the diameter, (2) compute radius = diameter/2, (3) use the semicircle formula with the $$\\tfrac{1}{2}$$, (4) add (since the semicircle is outside, not cut out).\n\nWhen the semicircle is added (outside), you add areas. When it's cut out (inside), you subtract. The sign depends on the physical configuration.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Synthesis question: A right triangle has legs in ratio 1:3 (instead of 1:2 as in the lesson). If the shorter leg is 5, find the altitude to the hypotenuse conceptually — what are the steps, and how does the ratio affect the answer? (3 steps)", "answer": "- Step 1: The legs are 5 and 15 (ratio 1:3, shorter = 5). The hypotenuse is $$\\sqrt{5^2 + 15^2} = \\sqrt{25 + 225} = \\sqrt{250} = 5\\sqrt{10}$$.\n- Step 2: Using the two-area trick: $$h = \\frac{ab}{c} = \\frac{5 \\times 15}{5\\sqrt{10}} = \\frac{75}{5\\sqrt{10}} = \\frac{15}{\\sqrt{10}}$$.\n- Step 3: Rationalise: $$\\frac{15}{\\sqrt{10}} \\cdot \\frac{\\sqrt{10}}{\\sqrt{10}} = \\frac{15\\sqrt{10}}{10} = \\frac{3\\sqrt{10}}{2}$$. The ratio 1:3 (vs 1:2 in the lesson) changes the hypotenuse and thus the altitude. A more unequal leg ratio produces a longer hypotenuse relative to the product of legs, which tends to give a smaller altitude.\n\nThe altitude depends on all three sides; changing the leg ratio changes the hypotenuse, which changes $$h = ab/c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "Synthesis question: A group of 15 people has mean score 40. Five people leave and the mean drops to 36. What was the mean score of the five who left — is it above or below 36, and why? Then compute it. (3 steps)", "answer": "- Step 1: Since the mean decreased when these five left, they must have been pulling the average **up** — meaning their mean score is above the old mean of 40 (and certainly above the new mean of 36). Removing below-average people would raise the mean, not lower it.\n- Step 2: Old total = $$15 \\times 40 = 600$$. New total = $$10 \\times 36 = 360$$. The five who left had a combined score of $$600 - 360 = 240$$.\n- Step 3: Mean of the five who left = $$240 / 5 = 48$$. This is above 40 (the old mean), confirming the intuition: they were above-average members, so removing them decreased the mean.\n\nDirection check: if the mean goes down when people leave, those people were above average. If it goes up, they were below average.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": true}, {"question": "Synthesis question: The ratio A:B = 2:3 and B:C = 5:7. When combining these into A:C, a student writes A:C = 10:21. Is this correct? Walk through the proper method. (3 steps)", "answer": "- Step 1: Write both ratios vertically and find the LCM of the B-values. B = 3 in the first ratio and B = 5 in the second. LCM of 3 and 5 is 15.\n- Step 2: Scale: $$A:B = 2:3 \\xrightarrow{\\times 5} 10:15$$. $$B:C = 5:7 \\xrightarrow{\\times 3} 15:21$$. Now B = 15 in both.\n- Step 3: Combine: $$A:B:C = 10:15:21$$, so $$A:C = 10:21$$. The student got the right answer, but let's check if they used correct reasoning. If they simply multiplied $$2 \\times 5 = 10$$ and $$3 \\times 7 = 21$$, that happens to work here because the LCM method gives the same result when the B-values (3 and 5) are coprime. But if B were 4 and 6 (LCM = 12, not 24), simple cross-multiplication would fail. Always use the LCM method to be safe.\n\nThe \"cross-multiply\" shortcut works only when the shared variable's values are coprime. The LCM method always works.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Why does the ESAT not provide a formula sheet, and how should this affect your preparation? What is the most efficient way to ensure you have all necessary formulas memorised? (2 steps)", "answer": "- Step 1: The ESAT tests not just problem-solving ability but also fluency — whether you can recall and apply formulas instantly under time pressure. Providing a formula sheet would eliminate this component. With ~90 seconds per question, you cannot afford even 10 seconds trying to recall whether the semicircle area has a $$\\tfrac{1}{2}$$ factor.\n- Step 2: The most efficient preparation: create a \"must-memorise\" sheet (like Section 12 of the lesson notes), review it daily using spaced repetition, and — critically — practice applying each formula in context. Memorising $$\\tfrac{1}{2}\\pi r^2$$ in isolation is less effective than solving three semicircle problems that force you to recall and use it. As Harry advised: do not use AI for homework, because it masks your formula gaps.\n\nMemorisation without application is fragile. Apply each formula in problems to cement it.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "The lesson notes mention that at ~58:30, a frame appears to show 7.5° checked for the clock problem, but the correct answer is 22.5°. What kind of error is this, and how should you handle conflicting information during revision? (2 steps)", "answer": "- Step 1: This is likely a \"review artefact\" — the tutor may have scrolled back to show a different option for discussion, or the camera captured a moment when the cursor/selection was on the wrong option. The arithmetic at ~50:00 clearly derives 22.5°, and the calculation is unambiguous. This is not a mathematical disagreement but a recording/frame-capture issue.\n- Step 2: When conflicting information appears during revision, always trust: (1) the arithmetic/derivation over a single frame, (2) consistent evidence across multiple frames over a single anomalous frame, and (3) your own independent verification. Recompute: at 9:45, the hour hand has moved $$\\tfrac{3}{4}$$ of 30° = 22.5° past the 9. The minute hand is at the 9. Angle = 22.5°. The derivation confirms itself.\n\nAlways verify anomalies by re-deriving. A single frame can lie; a correct derivation cannot.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Edge case: In a clock angle problem, what happens at 6:00? What about at 6:30? Explain why these give very different angles even though the hour hand is \"at 6\" in both cases. (3 steps)", "answer": "- Step 1: At 6:00: $$|30(6) - 5.5(0)| = |180 - 0| = 180°$$. The hands point in opposite directions — the maximum possible angle.\n- Step 2: At 6:30: $$|30(6) - 5.5(30)| = |180 - 165| = 15°$$. The hands are nearly overlapping! Even though it's \"6:30,\" the hour hand has moved halfway from 6 to 7 (by 15°), and the minute hand has come all the way around to the 6, nearly catching up.\n- Step 3: The dramatic difference (180° vs 15°) illustrates the hour hand's continuous movement. At 6:00 the hands are maximally separated; by 6:30 the minute hand has nearly closed the gap because it moves 12 times faster than the hour hand. \"At 6\" does not mean the hour hand sits at the 6 mark — it only passes through that mark at exactly 6:00.\n\nThe hour hand is at the 6 only at exactly 6:00. Every minute after that, it drifts forward.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A student solves the semicircle-in-square problem and gets $$m = 10\\sqrt{\\frac{2}{4-\\pi}}$$. Without recalculating, how can you tell this is wrong, and which specific error produced it? (2 steps)", "answer": "- Step 1: Compare with the correct answer $$m = 20\\sqrt{\\frac{2}{8-\\pi}}$$. The denominator $$4 - \\pi$$ instead of $$8 - \\pi$$ suggests that the semicircle area was computed as $$\\pi(m/2)^2$$ (full circle) instead of $$\\tfrac{1}{2}\\pi(m/2)^2$$ (semicircle). This halves the subtracted area, changing the factor from $$8 - \\pi$$ to $$4 - \\pi$$.\n- Step 2: The coefficient 10 instead of 20 also signals an error. If the student used $$4 - \\pi$$ in the denominator, they would get $$m^2 = 400/(4-\\pi)$$, so $$m = 20/\\sqrt{4-\\pi} = 20\\sqrt{1/(4-\\pi)}$$. The student's answer of $$10\\sqrt{2/(4-\\pi)}$$ suggests an additional algebraic slip. The key diagnostic: **$$4 - \\pi$$ in the denominator always indicates the missing $$\\tfrac{1}{2}$$ error**.\n\nThe denominator is a fingerprint of the formula used. $$8 - \\pi$$ → semicircle correct; $$4 - \\pi$$ → full circle used by mistake.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "Quick conceptual exercise: A right triangle has legs 3 and 4. What is the altitude to the hypotenuse? (You should be able to do this mentally — what's the shortcut?) (2 steps)", "answer": "- Step 1: The hypotenuse is 5 (a 3-4-5 triangle — one of the Pythagorean triples worth memorising). Using the two-area trick: $$h = ab/c = (3 \\times 4)/5 = 12/5 = 2.4$$.\n- Step 2: Verification: area = $$\\tfrac{1}{2}(3)(4) = 6$$. Also area = $$\\tfrac{1}{2}(5)(h) = 2.5h$$. So $$2.5h = 6$$, giving $$h = 2.4$$. Consistent.\n\nFor any 3-4-5 triangle, the altitude to the hypotenuse is 2.4. The two-area trick makes this a one-liner.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Quick conceptual exercise: The ratio X:Y = 7:5 and Y:Z = 5:3. What is X:Z? (This should be doable mentally — what simplifies it?) (2 steps)", "answer": "- Step 1: Notice that Y = 5 in both ratios — the shared variable already has the same value! No scaling needed.\n- Step 2: Directly read off: X:Y:Z = 7:5:3, so X:Z = 7:3. When the shared variable matches in both ratios, you can combine immediately without any multiplication.\n\nAlways check: if the shared variable already matches, skip the LCM step entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "Quick conceptual exercise: At 12:10, are the clock hands closer together or farther apart than at 12:00? By roughly how many degrees? (2 steps)", "answer": "- Step 1: At 12:00 the hands overlap (0°). At 12:10, the minute hand has moved to the 2 position ($$10 \\times 6° = 60°$$ from 12), while the hour hand has crept forward by $$10 \\times 0.5° = 5°$$.\n- Step 2: The angle is $$|60° - 5°| = 55°$$. The hands are now 55° apart — they've separated significantly in just 10 minutes because the minute hand moves much faster than the hour hand.\n\nThe minute hand gains 5.5° per minute on the hour hand. In 10 minutes: $$10 \\times 5.5° = 55°$$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "Why does Harry advise practising ESAT problems untimed first, and what is the risk of introducing time pressure too early? (2 steps)", "answer": "- Step 1: Untimed practice lets you focus on learning the technique — understanding *why* each step works, identifying which formula to use, and building the conceptual framework. If you rush from the start, you reinforce shallow pattern-matching rather than deep understanding.\n- Step 2: The risk of early time pressure: you learn to guess rather than solve, you skip understanding the \"why\" behind each method, and you fail to identify genuine knowledge gaps (e.g., not knowing the semicircle formula). Once you can solve problems correctly without time pressure, then introduce the clock to build speed. Speed without accuracy is worthless in a negative-marking-free MCQ exam where wrong answers simply score zero.\n\nLearn technique first, then build speed. Accuracy is the foundation; pace is the structure built on top.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Harry says \"do not use AI for homework.\" What is the pedagogical reasoning behind this, specifically in the context of formula memorisation? (2 steps)", "answer": "- Step 1: When you use AI to solve a problem, the AI supplies the correct formula and executes the algebra. You see the right answer but skip the active recall of *which* formula to use and *how* to apply it. This masks your knowledge gaps — you don't discover that you forgot the $$\\tfrac{1}{2}$$ in the semicircle formula because the AI filled it in for you.\n- Step 2: The ESAT requires instant formula recall under time pressure with no reference materials. If you've been outsourcing formula selection to AI, you won't know which formulas you've truly internalised and which you've been leaning on AI for. Homework is diagnostic — it should reveal gaps so you can fix them before the exam.\n\nHomework is not just about getting the right answer; it's about discovering what you don't know. AI hides those discoveries.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "In the similar triangles problem, the perpendicular from Q to PR creates two sub-triangles. One student claims the altitude equals the geometric mean of the two segments of the hypotenuse (i.e., $$h^2 = PT \\times TR$$). Is this claim correct, and where does it come from? (3 steps)", "answer": "- Step 1: Yes, this is a well-known geometric theorem. It follows directly from the similarity of the two sub-triangles. $$\\triangle PTQ \\sim \\triangle QTR$$ (both are similar to the original and hence to each other).\n- Step 2: From the similarity, the ratio of corresponding sides gives: $$PT/QT = QT/TR$$, which rearranges to $$QT^2 = PT \\times TR$$, i.e., $$h^2 = PT \\times TR$$.\n- Step 3: In the lesson's problem: $$PR = 10\\sqrt{5}$$, and the segments can be found from similarity. $$PT = PQ^2/PR = 400/(10\\sqrt{5}) = 40/\\sqrt{5} = 8\\sqrt{5}$$. $$TR = PR - PT = 10\\sqrt{5} - 8\\sqrt{5} = 2\\sqrt{5}$$. Check: $$h^2 = 8\\sqrt{5} \\times 2\\sqrt{5} = 16 \\times 5 = 80$$, so $$h = \\sqrt{80} = 4\\sqrt{5}$$. Consistent!\n\nThe geometric mean property is a bonus shortcut: $$h = \\sqrt{PT \\times TR}$$. It's equivalent to the two-area trick but derived from similarity instead of area.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "The lesson covers six problems across geometry, ratios, clocks, and statistics. What unifying strategy connects all of them, and how does it relate to the ESAT's emphasis on pace? (2 steps)", "answer": "- Step 1: The unifying strategy is **translation**: converting each word problem into precise mathematical notation before solving. \"Area of remaining metal is 100\" → $$m^2 - \\tfrac{1}{2}\\pi(m/2)^2 = 100$$. \"Mean of 20 members is 28\" → $$\\Sigma = 560$$. \"Ratio Q:R is 5:2\" → align vertically with R:S. Each problem requires you to parse English into equations.\n- Step 2: This translation step is where most time is lost or saved. If you translate correctly and quickly, the algebra/computation follows mechanically. If you mistranslate (forgetting the $$\\tfrac{1}{2}$$, misreading the ratio, ignoring hour-hand movement), no amount of algebraic skill saves you. Pace comes from fast, accurate translation, not from faster computation.\n\nMaster the translation step: read the problem, write the equation, then solve. The ESAT rewards this discipline.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}], "count": 48}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "On the ESAT Maths paper, what is the primary challenge — the difficulty of individual problems, or something else? Why? (2 steps)", "answer": "- Step 1: The primary challenge is **pace**, not difficulty. With 27 questions in 40 minutes, you have roughly 90 seconds per question. The individual maths is typically at a manageable level, but the time pressure is extreme.\n- Step 2: This means you cannot afford to re-derive formulas from scratch, draw elaborate diagrams, or get stuck on any single problem. The exam tests whether you can recognise the right approach quickly and execute efficiently — not whether you can eventually solve a hard problem given unlimited time.\n\nThe ESAT rewards fast recognition and clean execution, not deep exploration.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "The ESAT does not allow calculators or formula sheets. What are the strategic implications for how you prepare and solve problems? (3 steps)", "answer": "- Step 1: Since no formula sheet is provided, you must **memorise every formula** you might need — circle area, semicircle area, volume formulas, Pythagoras, etc. If you have to derive a formula from scratch during the exam, you've already lost 30–60 seconds you don't have.\n- Step 2: Since no calculator is allowed, all arithmetic must be done by hand. This means answers are designed to be **clean surds, simple fractions, or small integers**. If your working produces something messy, you've likely made an error.\n- Step 3: The preparation strategy follows from these constraints: first practise **untimed** to learn technique and identify formula gaps, then introduce time pressure. Do not use AI for homework — it masks your knowledge gaps (e.g., not realising you've forgotten the semicircle formula) that will cost you on exam day.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A full circle of radius $$r$$ has area $$\\pi r^2$$. What is the area of a semicircle of the same radius, and why is the factor of $$\\frac{1}{2}$$ so frequently forgotten? (2 steps)", "answer": "- Step 1: A semicircle is exactly half of a circle — cut a circle along its diameter and each piece is a semicircle. Therefore: $$\\text{Semicircle area} = \\frac{1}{2} \\times \\pi r^2 = \\frac{\\pi r^2}{2}$$\n- Step 2: The factor of $$\\frac{1}{2}$$ is forgotten because students see \"circle\" in the problem, recall $$\\pi r^2$$, and write it down without pausing to note that only half the circle is present. On the ESAT, this mistake produces a wrong denominator ($$4 - \\pi$$ instead of $$8 - \\pi$$), leading you straight to a deliberately placed distractor option.\n\nAlways write the full formula with the $$\\frac{1}{2}$$ before substituting any values.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "In the semicircle-in-square problem, the correct equation is $$m^2 - \\frac{1}{2}\\pi\\left(\\frac{m}{2}\\right)^2 = 100$$. If a student forgets the $$\\frac{1}{2}$$ and writes $$m^2 - \\pi\\left(\\frac{m}{2}\\right)^2 = 100$$, what goes wrong algebraically? (3 steps)", "answer": "- Step 1: With the correct $$\\frac{1}{2}$$, expanding gives $$m^2 - \\frac{\\pi m^2}{8} = 100$$, which factors as $$m^2 \\cdot \\frac{8-\\pi}{8} = 100$$, producing the denominator $$8 - \\pi$$.\n- Step 2: Without the $$\\frac{1}{2}$$, expanding gives $$m^2 - \\frac{\\pi m^2}{4} = 100$$, which factors as $$m^2 \\cdot \\frac{4-\\pi}{4} = 100$$, producing the denominator $$4 - \\pi$$.\n- Step 3: The ESAT options include both $$8-\\pi$$ and $$4-\\pi$$ in denominators — the $$4-\\pi$$ version is a deliberate distractor for students who forget the semicircle factor. The $$\\frac{1}{2}$$ doubles the denominator from 4 to 8, changing $$4-\\pi$$ to $$8-\\pi$$.\n\nThis is a textbook example of how a single forgotten factor redirects you to a trap answer.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "If a semicircle has area $$\\frac{1}{2}\\pi r^2$$, what is the area of a quarter-circle of radius $$r$$, and what denominator would appear if a quarter-circle were cut from a square of side $$s$$? (2 steps)", "answer": "- Step 1: A quarter-circle is one-fourth of a full circle: $$\\text{Quarter-circle area} = \\frac{1}{4}\\pi r^2$$. The pattern is: fractional circle area = fraction × full circle area.\n- Step 2: If a quarter-circle of radius $$s$$ is cut from a square of side $$s$$, the equation becomes $$s^2 - \\frac{1}{4}\\pi s^2 = A$$, which factors as $$s^2\\left(1 - \\frac{\\pi}{4}\\right) = A$$, giving $$s^2 \\cdot \\frac{4-\\pi}{4} = A$$. The denominator here is $$4 - \\pi$$ — which looks identical to the *wrong* answer from the semicircle problem, but for a completely different (correct) reason.\n\nSame denominator, different geometry — the ESAT exploits this visual similarity.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "The perimeter of a semicircle of radius $$r$$ is NOT just $$\\pi r$$. What is the full perimeter, and why must the straight edge be included?", "answer": "The perimeter of a semicircle consists of two parts:\n+ The curved arc — half the circumference of a full circle: $$\\frac{1}{2} \\times 2\\pi r = \\pi r$$\n+ The straight diameter — the cut edge created when the circle was split: $$2r$$\n\nSo the total perimeter is: $$\\text{Semicircle perimeter} = \\pi r + 2r$$\n\nThe diameter must be included because \"perimeter\" means the total length of the entire boundary. When you cut a circle in half, the cut creates a new straight edge that must be counted. A common mistake is to only count the curved part, giving $$\\pi r$$ instead of $$\\pi r + 2r$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "In a right-angled triangle, when you drop a perpendicular from the right-angle vertex to the hypotenuse, why are the two smaller triangles similar to each other and to the original? (3 steps)", "answer": "- Step 1: Consider the original triangle $$\\triangle PQR$$ with right angle at $$Q$$. Drop a perpendicular from $$Q$$ to point $$T$$ on hypotenuse $$PR$$. This creates two smaller triangles: $$\\triangle PQT$$ and $$\\triangle RQT$$.\n- Step 2: All three triangles share the same set of three angles:\n  + $$\\triangle PQR$$ has angles: 90° at Q, angle P, angle R\n  + $$\\triangle PQT$$ has angles: 90° at T, angle P (shared with original), so the third angle must equal angle R\n  + $$\\triangle RQT$$ has angles: 90° at T, angle R (shared with original), so the third angle must equal angle P\n- Step 3: Since all three triangles have the same three angle measures (just rearranged into different positions), they are all similar by the AA (angle-angle) criterion. This means their corresponding sides are in proportion — which is the key to computing the altitude length.\n\nThe deep insight: dropping the altitude doesn't create \"new\" angles — it just redistributes the same three angles into different triangle configurations.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "In a right-angled triangle with legs $$a$$ and $$b$$ and hypotenuse $$c$$, the altitude from the right angle to the hypotenuse has length $$h = \\frac{ab}{c}$$. Derive this using the two-area trick. (3 steps)", "answer": "- Step 1: Compute the area of the triangle using the two legs as base and height: $$\\text{Area} = \\frac{1}{2} \\times a \\times b$$\n- Step 2: Compute the same area using the hypotenuse as the base and the altitude as the height: $$\\text{Area} = \\frac{1}{2} \\times c \\times h$$\n- Step 3: Equate the two expressions for area and solve for $$h$$: $$\\frac{1}{2}ab = \\frac{1}{2}ch \\implies ab = ch \\implies h = \\frac{ab}{c}$$\n\nThis is the \"two-area trick\" — you express the same area in two different ways and equate them. It avoids the need to identify which sides correspond in similar triangles, making it faster and less error-prone under time pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "To find the altitude from the right angle to the hypotenuse, you can use either the two-area trick or similarity ratios. Which is faster for ESAT, and why?", "answer": "The **two-area trick** is faster. Here's why:\n\n+ **Similarity method**: You must identify which sides correspond between the original triangle and the sub-triangle, set up a proportion carefully, and solve. This requires tracking angle correspondences — easy to get wrong under time pressure.\n+ **Two-area method**: You write area = $$\\frac{1}{2}ab$$ (using the legs) and area = $$\\frac{1}{2}ch$$ (using the hypotenuse and altitude). Equate them, cancel the $$\\frac{1}{2}$$, and solve: $$h = \\frac{ab}{c}$$. One equation, no correspondence tracking.\n\nOn the ESAT, with ~90 seconds per question, the two-area trick saves 20–30 seconds. However, understanding similarity is still essential for problems that don't involve altitudes (e.g., finding an unknown side using a scale factor).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "To find the distance from one vertex of a unit cube to the midpoint of the opposite face, the lesson applies Pythagoras twice. Why can't you just apply a single 3D Pythagoras formula? (2 steps)", "answer": "- Step 1: The direct 3D Pythagoras formula $$d = \\sqrt{x^2 + y^2 + z^2}$$ does apply in a single step — but only if you can identify the three perpendicular displacements from the start point to the end point. For a vertex at $$(0,0,0)$$ to the opposite face midpoint at $$(1, \\frac{1}{2}, \\frac{1}{2})$$, this gives $$d = \\sqrt{1 + \\frac{1}{4} + \\frac{1}{4}} = \\sqrt{\\frac{3}{2}} = \\frac{\\sqrt{6}}{2}$$.\n- Step 2: The reason the lesson uses \"two steps\" is visual: from a diagram, you often can't directly read off all three perpendicular components. So you first find the diagonal across the base face (Step 1: 2D Pythagoras with displacements $$x$$ and $$y$$), then use that intermediate distance as one leg of a second right triangle going up to the target (Step 2: another 2D Pythagoras adding displacement $$z$$).\n\nThe two-step method is a visual strategy for discovering the perpendicular components — it's not a different formula, just a different way of organising the same calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "In a unit cube, the body diagonal (corner to opposite corner) has length $$\\sqrt{3}$$, but the distance from a vertex to the midpoint of the opposite face is $$\\frac{\\sqrt{6}}{2}$$. Why are these different, and which is larger? (2 steps)", "answer": "- Step 1: The body diagonal goes from $$(0,0,0)$$ to $$(1,1,1)$$ — all three perpendicular displacements are 1. So $$d = \\sqrt{1^2 + 1^2 + 1^2} = \\sqrt{3} \\approx 1.732$$.\n- Step 2: The vertex-to-face-midpoint goes from $$(0,0,0)$$ to $$(1, \\frac{1}{2}, \\frac{1}{2})$$ — two of the three displacements are only $$\\frac{1}{2}$$. So $$d = \\sqrt{1 + \\frac{1}{4} + \\frac{1}{4}} = \\sqrt{\\frac{3}{2}} = \\frac{\\sqrt{6}}{2} \\approx 1.225$$.\n\nThe body diagonal is longer because the endpoint is a far corner (all three displacements are maximal), while the face midpoint is only halfway across two of the three dimensions. On the ESAT, $$\\sqrt{3}$$ appears as a distractor option for vertex-to-face-midpoint questions.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "In the 3D Pythagoras formula $$d = \\sqrt{x^2 + y^2 + z^2}$$, what do $$x$$, $$y$$, and $$z$$ represent physically? How does this connect to the two-step visual method? (2 steps)", "answer": "- Step 1: $$x$$, $$y$$, and $$z$$ represent the three **perpendicular displacements** between the start and end points — how far you must travel along three mutually perpendicular directions. In a cube aligned with axes, these are simply the coordinate differences: $$x = |\\Delta x|$$, $$y = |\\Delta y|$$, $$z = |\\Delta z|$$.\n- Step 2: The two-step visual method computes these displacements in stages:\n  + Step 1 (base diagonal): combines two displacements into an intermediate distance $$d_1 = \\sqrt{x^2 + y^2}$$\n  + Step 2 (full diagonal): adds the third displacement: $$d = \\sqrt{d_1^2 + z^2} = \\sqrt{x^2 + y^2 + z^2}$$\n\nBoth methods give the same result. The coordinate method is faster if you can immediately read off the displacements; the two-step method is better if you need to work from a diagram where the perpendicular components aren't immediately obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Given $$Q:R = 5:2$$ and $$R:S = 3:10$$, why must you align the ratios vertically and make the shared variable ($$R$$) equal in both rows before combining? (3 steps)", "answer": "- Step 1: The ratio $$Q:R = 5:2$$ says \"for every 2 units of R, there are 5 units of Q.\" The ratio $$R:S = 3:10$$ says \"for every 3 units of R, there are 10 units of S.\" But the \"2 units of R\" and \"3 units of R\" are different quantities — you can't directly compare Q and S because they're expressed relative to different amounts of R.\n- Step 2: To connect the two ratios, R must be the same number in both. Find the LCM of the two R-values (2 and 3), which is 6. Scale the first ratio by ×3 and the second by ×2: $$Q:R = 15:6$$ and $$R:S = 6:20$$.\n- Step 3: Now that R = 6 in both rows, you can read off the combined three-way ratio $$Q:R:S = 15:6:20$$, and extract any pair: $$Q:S = 15:20 = 3:4$$.\n\nRatios can only be combined when the shared quantity is expressed in the same \"currency.\" Vertical alignment makes this visually obvious and prevents the common error of only scaling one number.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "When scaling the ratio $$R:S = 3:10$$ by multiplying by 2 to make $$R = 6$$, a student writes $$6:10$$ instead of $$6:20$$. What conceptual error causes this? (2 steps)", "answer": "- Step 1: The student correctly multiplied R (3 → 6) but forgot to multiply S (10 should become 20). The error is treating the ratio as two independent numbers rather than a **relationship** — a ratio $$a:b$$ means \"for every $$a$$ of the first, there are $$b$$ of the second.\" If you double $$a$$, you must also double $$b$$ to preserve the same relationship.\n- Step 2: Writing $$6:10$$ actually simplifies to $$3:5$$, which is a completely different ratio from $$3:10$$. The safeguard: always write the multiplier next to the entire ratio (e.g., \"$$3:10 \\times 2 = 6:20$$\"), and verify that both numbers were multiplied.\n\nOn the ESAT, the answer $$3:2$$ (from $$15:10$$) is a deliberate distractor targeting this exact mistake.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "On an analogue clock, the hour hand does not jump from one hour mark to the next — it moves continuously. How many degrees does the hour hand move per minute, and what fraction of the inter-hour gap does it cover each minute? (3 steps)", "answer": "- Step 1: The hour hand completes a full revolution (360°) in 12 hours = 720 minutes.\n- Step 2: Therefore, the hour hand moves at a rate of $$\\frac{360°}{720 \\text{ min}} = 0.5°$$ per minute.\n- Step 3: The gap between consecutive hour marks is 30° (360°/12). Each minute, the hour hand covers $$\\frac{0.5°}{30°} = \\frac{1}{60}$$ of the inter-hour gap. So at 9:45, the hour hand has covered $$\\frac{45}{60} = \\frac{3}{4}$$ of the gap from 9 to 10, placing it 22.5° past the 9 mark.\n\nThe critical insight: at any time \"H:M\", the hour hand has moved an additional $$M \\times 0.5°$$ past the H mark. Ignoring this is the single most common mistake in clock angle problems.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Derive the clock angle formula $$\\theta = |30H - 5.5M|$$, where $$H$$ is the hour and $$M$$ is the minutes past the hour. (3 steps)", "answer": "- Step 1: Position of the hour hand (degrees from 12 o'clock, clockwise): The hour hand moves 30° per hour plus 0.5° per minute. At time $$H:M$$: $$\\text{Hour position} = 30H + 0.5M$$\n- Step 2: Position of the minute hand (degrees from 12 o'clock, clockwise): The minute hand moves 6° per minute (360°/60). At time $$H:M$$: $$\\text{Minute position} = 6M$$\n- Step 3: The angle between the hands is the absolute difference: $$\\theta = |(30H + 0.5M) - 6M| = |30H - 5.5M|$$\n\nThis formula gives the angle measured the \"short way\" around only if the result is ≤ 180°. If it exceeds 180°, subtract from 360° to get the smaller angle.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "At 9:45, the minute hand points at the 9 position. One student says the angle is 0° (both hands at 9); another says 7.5° (hour hand moved a quarter of 30°). Why are both wrong? (2 steps)", "answer": "- Step 1: The 0° answer assumes the hour hand sits at the 9 mark because it's \"9-something.\" But the hour hand moves continuously — at 9:45, it has been 45 minutes (¾ of an hour) since 9:00, so it has moved $$\\frac{3}{4} \\times 30° = 22.5°$$ past the 9, not 0°.\n- Step 2: The 7.5° answer calculates ¼ of 30° instead of ¾. This confuses \"quarter of an hour\" (15 minutes) with the actual time elapsed (45 minutes). At 9:45, 45 minutes have passed since 9:00, which is ¾ of the way from 9 to 10. The correct additional movement is $$\\frac{45}{60} \\times 30° = 22.5°$$, giving an angle of 22.5° between the hands.\n\nBoth 0° and 7.5° are deliberate distractor options on the ESAT, targeting these two specific misconceptions.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "The clock angle formula $$\\theta = |30H - 5.5M|$$ sometimes gives a value greater than 180°. What should you do in that case, and why?", "answer": "Two hands on a clock define two angles that sum to 360° — one acute/obtuse and one reflex. The convention is to report the **smaller** angle. If $$|30H - 5.5M| > 180°$$, the smaller angle is $$360° - |30H - 5.5M|$$.\n\nFor example, at 2:50: $$|30(2) - 5.5(50)| = |60 - 275| = 215°$$. The smaller angle is $$360° - 215° = 145°$$.\n\nThis edge case doesn't arise at 9:45 (which gives 22.5°), but it's essential to check whenever the hands are nearly opposite each other — typically when the minute hand is in the second half of the hour and the hour is small.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "The mean is defined as $$\\bar{x} = \\frac{\\Sigma x}{n}$$. Why is the rearranged form $$\\Sigma x = n\\bar{x}$$ more useful for ESAT problems involving changing groups? (2 steps)", "answer": "- Step 1: The rearranged form lets you convert a mean directly into a total sum. If the mean age of 20 people is 28, you immediately know the sum of all their ages is $$20 \\times 28 = 560$$. Sums are far more useful than means because **sums can be added and subtracted, while means cannot**.\n- Step 2: Once you have sums, you can track changes. If 2 new members join and the new mean is 30 for 22 people, the new sum is $$22 \\times 30 = 660$$. The combined age of the 2 new members is $$660 - 560 = 100$$, so their mean age is 50. The key principle: **always convert means to sums before doing any arithmetic with changing groups**.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "In a mean-age problem, when 2 new members join a group of 20, the denominator changes from 20 to 22. A student writes $$\\frac{\\Sigma}{20} = 30$$ for the new mean. What goes wrong, and how does this produce a distractor option? (2 steps)", "answer": "- Step 1: After 2 new members join, there are 22 people, not 20. Writing $$\\frac{\\Sigma}{20} = 30$$ gives $$\\Sigma = 600$$, which is wrong — the correct new sum is $$22 \\times 30 = 660$$.\n- Step 2: Using the wrong sum (600 instead of 660), the \"extra\" age contributed by the new members would be $$600 - 560 = 40$$, giving a mean age of 20 for the two newcomers. This value (20 years) appears as a deliberate distractor option on the ESAT — it's placed there to catch this exact error of forgetting to update the denominator.\n\nAfter any group change, always re-count the total number of members before computing the new sum.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "The value $$\\frac{20}{\\sqrt{5}}$$ is numerically correct but will not appear as an ESAT answer option. Why not, and what must you do instead?", "answer": "ESAT answer options present surds in the **numerator**, not the denominator. The option will be written as $$4\\sqrt{5}$$, not $$\\frac{20}{\\sqrt{5}}$$, even though they are equal: $$\\frac{20}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5} = 4\\sqrt{5}$$\n\nIf you don't rationalise, you'll scan the options, not see $$\\frac{20}{\\sqrt{5}}$$, and think you've made an error — potentially wasting precious time reworking the entire problem. Always rationalise denominators as your final step before checking options.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Explain the mechanical steps of rationalising $$\\frac{a}{\\sqrt{b}}$$. Why does multiplying by $$\\frac{\\sqrt{b}}{\\sqrt{b}}$$ eliminate the surd from the denominator? (2 steps)", "answer": "- Step 1: Multiply both numerator and denominator by $$\\sqrt{b}$$: $$\\frac{a}{\\sqrt{b}} \\times \\frac{\\sqrt{b}}{\\sqrt{b}} = \\frac{a\\sqrt{b}}{\\sqrt{b} \\times \\sqrt{b}} = \\frac{a\\sqrt{b}}{b}$$\n- Step 2: This works because $$\\sqrt{b} \\times \\sqrt{b} = b$$, which is a rational number — the square root has been eliminated from the denominator. The value is unchanged because $$\\frac{\\sqrt{b}}{\\sqrt{b}} = 1$$ — you've multiplied by 1 in a strategic form.\n\nThe result has the surd in the numerator only, which is the standard form for ESAT answers. For example: $$\\frac{20}{\\sqrt{5}} = \\frac{20\\sqrt{5}}{5} = 4\\sqrt{5}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Why does $$\\sqrt{800} = 20\\sqrt{2}$$? State the general rule for simplifying surds of the form $$\\sqrt{N}$$. (2 steps)", "answer": "- Step 1: Factor $$N$$ to find the largest perfect square factor. For 800: $$800 = 400 \\times 2$$, and 400 is a perfect square ($$20^2$$).\n- Step 2: Apply the rule $$\\sqrt{k^2 \\times m} = k\\sqrt{m}$$: $$\\sqrt{800} = \\sqrt{400 \\times 2} = \\sqrt{400} \\times \\sqrt{2} = 20\\sqrt{2}$$\n\nThe general rule: to simplify $$\\sqrt{N}$$, factor $$N$$ into its largest perfect square factor times a remainder. Pull the square root of the perfect square outside the radical. Common perfect squares to check for: 4, 9, 16, 25, 36, 49, 64, 100, 400.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "The rule $$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$ is used in the semicircle-in-square problem to match the answer format. When is this useful, and how does it work in practice? (2 steps)", "answer": "- Step 1: This rule is useful when you have a fraction under a square root and need to separate it into a form that matches the answer options. In the semicircle problem, you reach $$m = \\sqrt{\\frac{800}{8-\\pi}}$$, which the options express as $$20\\sqrt{\\frac{2}{8-\\pi}}$$.\n- Step 2: Applying the rule: $$\\sqrt{\\frac{800}{8-\\pi}} = \\frac{\\sqrt{800}}{\\sqrt{8-\\pi}} = \\frac{20\\sqrt{2}}{\\sqrt{8-\\pi}} = 20\\sqrt{\\frac{2}{8-\\pi}}$$\n\nThe last step uses the rule in reverse: $$\\frac{\\sqrt{a}}{\\sqrt{b}} = \\sqrt{\\frac{a}{b}}$$. This puts the expression into the compact single-radical form that ESAT options use. Without this manipulation, your answer won't match any option even though it's numerically correct.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "Several ESAT geometry problems follow a pattern: \"shape with piece cut out, remaining area given, find a dimension.\" What is the general approach, and how does the type of cut-out affect the algebra? (3 steps)", "answer": "- Step 1: The general equation is: $$\\text{Area of whole shape} - \\text{Area of cut-out} = \\text{Remaining area}$$. Express both areas in terms of the unknown dimension, set up the equation, and solve.\n- Step 2: The type of cut-out determines the formula and the resulting denominator:\n  + Semicircle cut-out (diameter = side $$s$$): $$s^2 - \\frac{1}{2}\\pi\\left(\\frac{s}{2}\\right)^2 = A$$ → denominator involves $$8 - \\pi$$\n  + Quarter-circle cut-out (radius = side $$s$$): $$s^2 - \\frac{1}{4}\\pi s^2 = A$$ → denominator involves $$4 - \\pi$$\n  + Full circle cut-out (diameter = side $$s$$): $$s^2 - \\pi\\left(\\frac{s}{2}\\right)^2 = A$$ → denominator involves $$4 - \\pi$$ (same denominator as quarter-circle, but for a different geometric reason)\n- Step 3: The key trap in all variants: use the correct fractional area formula. Mixing up $$\\frac{1}{2}\\pi r^2$$ (semicircle), $$\\frac{1}{4}\\pi r^2$$ (quarter-circle), and $$\\pi r^2$$ (full circle) produces distractor options with wrong denominators. Always identify the fraction of a circle before writing the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "The philosophy behind 3D Pythagoras is \"reduce 3D to 2D by finding intermediate right triangles.\" How does this philosophy apply beyond cubes — for example, to a cuboid? (2 steps)", "answer": "- Step 1: In any 3D distance problem, the strategy is the same: identify a path from start to end point that consists of perpendicular segments. Find an intermediate point where you can form a right triangle, compute that distance (2D), then use it as a leg in a second right triangle to reach the final point.\n- Step 2: In a cuboid with dimensions $$a \\times b \\times c$$, the space diagonal from one corner to the opposite is found by:\n  + First: face diagonal $$= \\sqrt{a^2 + b^2}$$\n  + Then: space diagonal $$= \\sqrt{(\\sqrt{a^2+b^2})^2 + c^2} = \\sqrt{a^2 + b^2 + c^2}$$\n\nFor irregular shapes, the same principle applies — you just need to identify the right intermediate point. The universal key: find perpendicular displacements, apply Pythagoras to pairs of them.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "In the semicircle-in-square problem, one answer option has $$8 + \\pi$$ in the denominator instead of $$8 - \\pi$$. How can you eliminate this option without doing any algebra? (2 steps)", "answer": "- Step 1: The problem involves cutting a semicircle out of a square, so the remaining area is the square minus the semicircle: $$m^2 - \\frac{1}{2}\\pi r^2 = 100$$. When you rearrange, the subtraction produces $$m^2(1 - \\frac{\\pi}{8}) = 100$$, giving a denominator of $$8 - \\pi$$.\n- Step 2: An option with $$8 + \\pi$$ would correspond to adding the semicircle area rather than subtracting it — meaning the \"remaining\" area is larger than the whole square. This is physically impossible (you can't cut out a piece and have more area left), so $$8 + \\pi$$ can be eliminated immediately by sign inspection alone.\n\nThis is a powerful ESAT technique: before solving, check whether the operation should be addition or subtraction, and eliminate options with the wrong sign. This can remove 1–2 options instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "In the semicircle-in-square algebra, you reach $$m^2 - \\frac{\\pi m^2}{8} = 100$$. Why is it better to factorise (factor out $$m^2$$) rather than combine terms by finding a common denominator? (2 steps)", "answer": "- Step 1: Factorising gives $$m^2\\left(1 - \\frac{\\pi}{8}\\right) = m^2 \\cdot \\frac{8-\\pi}{8} = 100$$, which immediately isolates $$m^2 = \\frac{800}{8-\\pi}$$ ready for taking the square root.\n- Step 2: Combining without factoring gives $$\\frac{8m^2 - \\pi m^2}{8} = 100$$. This works but is more error-prone — you might make a sign mistake in the numerator or forget the denominator when rearranging. Factoring out $$m^2$$ first keeps the algebra compact and makes the structure visually clear.\n\nThe general principle: when a variable appears in every term, factor it out before doing anything else. This is faster and less error-prone — especially under ESAT time pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Before starting algebra on an ESAT geometry problem, why should you look at the answer options first? Give a concrete example from the semicircle-in-square problem.", "answer": "Looking at the options first tells you what **form** your answer should take — which variable to use, whether surds should be in the numerator, and whether the expression is a single radical or a fraction. This directs your algebra toward the target format and prevents you from going down a path that produces a correct but non-matching expression.\n\nIn the semicircle problem, all options express the answer in terms of $$m$$ (the side length), not $$r$$ (the radius). If you solved in terms of $$r$$, you'd get a correct but non-matching answer and would need to backtrack. Noticing this upfront lets you set $$r = m/2$$ from the start, ensuring your algebra targets the form in the options.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "The ESAT gives you ~90 seconds per question. What is the \"triage\" strategy, and why is it essential? (2 steps)", "answer": "- Step 1: Triage means: if you're stuck after ~30 seconds on a question, **flag it and move on** to the next one. Don't spend 3 minutes on a single problem — that's 2–3 other questions you won't have time to attempt.\n- Step 2: Return to flagged questions with whatever time remains at the end. Often, seeing a fresh problem after solving several others puts you in a better frame of mind. The key insight: every question is worth the same marks. A quick solve on an easy question is worth exactly as much as grinding through a hard one.\n\nThe ESAT does not penalise wrong answers (it uses positive marking only), so it's always worth guessing on any question you can't solve — but only after you've attempted all the questions you can solve.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A right-angled triangle has legs of length 6 and 8. Using the altitude formula, what is the length of the altitude from the right angle to the hypotenuse? (2 steps)", "answer": "- Step 1: Find the hypotenuse: $$c = \\sqrt{6^2 + 8^2} = \\sqrt{36 + 64} = \\sqrt{100} = 10$$\n- Step 2: Apply the altitude formula $$h = \\frac{ab}{c}$$: $$h = \\frac{6 \\times 8}{10} = \\frac{48}{10} = 4.8$$\n\nThe two-area trick confirms this: area = $$\\frac{1}{2}(6)(8) = 24$$, and also area = $$\\frac{1}{2}(10)(h) = 5h$$, so $$5h = 24$$, giving $$h = 4.8$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Using the clock angle formula $$\\theta = |30H - 5.5M|$$, what is the angle between the hands at 12:30? What extra step is needed? (2 steps)", "answer": "- Step 1: Apply the formula: $$\\theta = |30(12) - 5.5(30)| = |360 - 165| = 195°$$\n- Step 2: Since 195° > 180°, take the smaller angle: $$360° - 195° = 165°$$\n\nAt 12:30, the hour hand has moved halfway from 12 to 1 (15° past 12), while the minute hand is at the 6 position (180°). The angle between them is $$180° - 15° = 165°$$. This is an edge case where the formula gives the reflex angle and you must subtract from 360°.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "If $$A:B = 3:2$$ and $$B:C = 4:5$$, what is $$A:C$$ in simplest form? (3 steps)", "answer": "- Step 1: Align vertically with B as the common variable. The B-values are 2 and 4; LCM = 4.\n- Step 2: Scale the first ratio by ×2: $$A:B = 6:4$$. The second ratio already has B = 4: $$B:C = 4:5$$.\n- Step 3: Combine: $$A:B:C = 6:4:5$$. Extract $$A:C = 6:5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "The mean of 10 numbers is 5. A new number is added and the mean becomes 6. What is the new number? (3 steps)", "answer": "- Step 1: Original sum: $$\\Sigma_1 = 10 \\times 5 = 50$$\n- Step 2: New sum: $$\\Sigma_2 = 11 \\times 6 = 66$$\n- Step 3: The new number: $$66 - 50 = 16$$\n\nSanity check: the new number (16) is much larger than the original mean (5), which makes sense — it pulled the mean up from 5 to 6. If you'd forgotten to update the denominator (using 10 instead of 11), you'd get $$10 \\times 6 = 60$$, extra = 10, which would be wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A full circle has radius 4. What is the area of a semicircle with the same radius? Give the exact expression.", "answer": "$$\\text{Semicircle area} = \\frac{1}{2}\\pi r^2 = \\frac{1}{2}\\pi(4^2) = \\frac{1}{2}\\pi(16) = 8\\pi$$\n\nThe key is remembering the $$\\frac{1}{2}$$ factor. A common mistake would be to write $$16\\pi$$ (the full circle area) instead of $$8\\pi$$ (the semicircle area).", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}], "count": 35}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "In a fast-paced, no-calculator multiple-choice exam like the ESAT, why is it strategically crucial to inspect the answer options *before* beginning algebraic manipulation on a geometry problem?", "answer": "Inspecting the options first allows you to reverse-engineer the required form of your final answer, saving time and preventing unnecessary algebraic detours. For example, if all options are expressed in terms of the square's side length $$m$$ rather than the semicircle's radius $$r$$, you immediately know to substitute $$r = \\frac{m}{2}$$ at the very beginning. It also allows you to note the presence of surds, rationalized denominators, or specific constants (like $$8-\\pi$$ vs $$4-\\pi$$), which acts as a roadmap for your simplification steps and helps you aggressively eliminate distractors.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "When setting up an equation for the remaining area of a square (side $$m$$) after a semicircle is cut out, what is the most common algebraic trap regarding the semicircle's area formula, and how does this error manifest in the final simplified expression? (2 steps)", "answer": "- Step 1: The trap is forgetting the $$\\frac{1}{2}$$ factor in the semicircle area formula ($$\\frac{1}{2}\\pi r^2$$) and incorrectly using the full circle area ($$\\pi r^2$$). Since the diameter equals the side $$m$$, the radius is $$\\frac{m}{2}$$.\n- Step 2: This error manifests clearly in the final denominator. The correct subtraction yields $$m^2 - \\frac{\\pi m^2}{8}$$, factoring to $$m^2(\\frac{8-\\pi}{8})$$, leading to an $$8-\\pi$$ term. The incorrect full-circle subtraction yields $$m^2 - \\frac{\\pi m^2}{4}$$, factoring to $$m^2(\\frac{4-\\pi}{4})$$, which incorrectly produces a $$4-\\pi$$ term in the final answer options.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "When solving an equation like $$m^2 - \\frac{\\pi m^2}{8} = 100$$ for $$m$$, why is it strategically better to factor out $$m^2$$ immediately rather than finding a common denominator and expanding first? (2 steps)", "answer": "- Step 1: Factoring out $$m^2$$ immediately gives $$m^2(1 - \\frac{\\pi}{8}) = 100$$, which keeps the algebra compact and isolates the variable term in a single step without altering the coefficients or introducing complex fractions.\n- Step 2: Finding a common denominator first (e.g., $$\\frac{8m^2 - \\pi m^2}{8} = 100$$) introduces larger numbers and requires an extra algebraic step to isolate $$m^2$$, increasing the cognitive load and the risk of arithmetic errors in a timed, no-calculator environment.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "To find the length of an altitude dropped from the right angle to the hypotenuse of a right-angled triangle, you can use similar triangles or the \"two-area\" trick. Conceptually, why is the \"two-area\" trick generally faster and less prone to error in a timed exam? (3 steps)", "answer": "- Step 1: The \"two-area\" trick relies on calculating the triangle's area in two ways: $$\\text{Area} = \\frac{1}{2} \\times \\text{leg}_1 \\times \\text{leg}_2$$ and $$\\text{Area} = \\frac{1}{2} \\times \\text{hypotenuse} \\times \\text{altitude}$$. Equating them directly yields $$\\text{altitude} = \\frac{\\text{leg}_1 \\times \\text{leg}_2}{\\text{hypotenuse}}$$.\n- Step 2: The similar triangles method requires identifying the correct corresponding sides across three different triangles (the main triangle and the two sub-triangles), setting up a proportion, and ensuring the scale factor is applied to the correct vertices.\n- Step 3: The area method is faster because it bypasses the need to visually map corresponding angles and sides, reducing the problem to a single, foolproof algebraic equation that only requires the three side lengths of the main triangle.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In surd-based geometry problems, why must you always rationalize the denominator (e.g., converting $$\\frac{20}{\\sqrt{5}}$$ to $$4\\sqrt{5}$$) before scanning the multiple-choice options?", "answer": "Standard mathematical convention and exam design dictate that final answers are rarely left with a surd in the denominator. Exam boards intentionally format their options in rationalized form to test this specific algebraic skill. If you fail to rationalize, your numerically correct answer (like $$\\frac{20}{\\sqrt{5}}$$) will not visually match any of the provided options (like $$4\\sqrt{5}$$), causing unnecessary panic or forcing you to waste precious time evaluating decimal approximations to find the match.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "When finding the distance from a vertex of a unit cube to the *midpoint* of an opposite face, why is it incorrect to simply use the standard 3D body diagonal formula $$\\sqrt{x^2+y^2+z^2}$$ with all coordinates as 1, and what is the correct conceptual breakdown of the path? (3 steps)", "answer": "- Step 1: The standard body diagonal formula with coordinates $$(1,1,1)$$ calculates the distance from one corner of the cube to the *exact opposite corner* (the far vertex), not the center of the opposite face.\n- Step 2: To reach the midpoint of the opposite face, the path must traverse the full length of one axis (e.g., $$x=1$$), but only half the length of the other two axes (e.g., $$y=\\frac{1}{2}$$ and $$z=\\frac{1}{2}$$) to hit the center of that face.\n- Step 3: The correct conceptual breakdown uses two 2D Pythagorean steps: first, find the diagonal across the base to the point directly below the target ($$\\sqrt{1^2 + (\\frac{1}{2})^2} = \\frac{\\sqrt{5}}{2}$$), then use that as a leg with the remaining height ($$\\frac{1}{2}$$) to find the final hypotenuse ($$\\sqrt{\\frac{5}{4} + \\frac{1}{4}} = \\frac{\\sqrt{6}}{2}$$).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "When combining two ratios like $$Q:R = 5:2$$ and $$R:S = 3:10$$ by scaling them to make the common term $$R$$ equal, what is the specific mechanical trap students fall into, and how does it distort the final ratio? (2 steps)", "answer": "- Step 1: The mechanical trap is multiplying only the common term $$R$$ to make it match the Lowest Common Multiple (LCM), while forgetting to multiply the other term in that specific ratio by the same scale factor.\n- Step 2: For example, scaling $$R:S = 3:10$$ by $$\\times 2$$ to make $$R=6$$, a student might incorrectly write $$6:10$$ instead of $$6:20$$. This distorts the final combined ratio (yielding $$15:6:10$$ instead of $$15:6:20$$) and produces an incorrect simplified ratio for the outer terms ($$3:2$$ instead of $$3:4$$).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "When calculating the angle between clock hands at a time like 9:45, what is the fundamental misconception about the hour hand's position, and how do you conceptually adjust for its true location? (2 steps)", "answer": "- Step 1: The fundamental misconception is assuming the hour hand sits stationary exactly on the hour mark (the 9) until the next hour begins, which would incorrectly place it at exactly $$270^\\circ$$.\n- Step 2: Conceptually, the hour hand moves continuously. You must adjust for its true location by calculating the fraction of the hour that has passed (45 minutes is $$\\frac{3}{4}$$ of an hour) and adding that fraction of the $$30^\\circ$$ distance between hour marks ($$\\frac{3}{4} \\times 30^\\circ = 22.5^\\circ$$) to the base hour position.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "The formula for the angle between clock hands is $$\\theta = |30H - 5.5M|$$. Conceptually, where do the coefficients $$30$$ and $$5.5$$ come from in terms of the angular speeds of the hour and minute hands? (3 steps)", "answer": "- Step 1: The coefficient $$30$$ represents the initial angular offset of the hour hand at the start of the hour, as each of the 12 hour marks is separated by $$\\frac{360^\\circ}{12} = 30^\\circ$$.\n- Step 2: The minute hand moves at a speed of $$\\frac{360^\\circ}{60 \\text{ min}} = 6^\\circ$$ per minute, so its position from 12 o'clock is $$6M$$.\n- Step 3: The hour hand moves at a speed of $$\\frac{30^\\circ}{60 \\text{ min}} = 0.5^\\circ$$ per minute. The relative speed between the minute hand and the hour hand is $$6^\\circ - 0.5^\\circ = 5.5^\\circ$$ per minute. Thus, the formula calculates the initial hour offset ($$30H$$) minus the relative distance the minute hand has gained ($$5.5M$$).", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "When a problem states that the mean of a group changes after new members join, why is it conceptually necessary to convert the means into *total sums* ($$\\Sigma$$) before finding the properties of the new members? (2 steps)", "answer": "- Step 1: The mean is an \"intensive\" property (an average rate), meaning you cannot simply add two means together to get a combined mean. Total sum ($$\\Sigma$$) is an \"extensive\" property, meaning the sums of subgroups can be directly added together to find the total sum of the combined group.\n- Step 2: By converting the initial mean to an initial sum ($$\\Sigma_1 = n_1 \\times \\bar{x}_1$$) and the final mean to a final sum ($$\\Sigma_2 = n_2 \\times \\bar{x}_2$$), you can isolate the exact contribution of the new members by simply subtracting the sums ($$\\Sigma_{\\text{new}} = \\Sigma_2 - \\Sigma_1$$).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "In a problem where a group of 20 people (mean age 28) is joined by 2 new people, raising the mean to 30, what is the specific error in calculating the new total sum as $$20 \\times 30$$, and what does this incorrect calculation actually represent? (2 steps)", "answer": "- Step 1: The specific error is using the *old* count ($$n=20$$) with the *new* mean ($$30$$). The new total sum must use the updated count of people, which is $$20 + 2 = 22$$, making the correct new sum $$22 \\times 30 = 660$$.\n- Step 2: The incorrect calculation ($$20 \\times 30 = 600$$) conceptually represents the total sum of the *original* 20 people if their mean age had magically increased to 30, completely ignoring the physical addition of the 2 new members to the group's headcount.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "In a multiple-choice geometry question where you are subtracting an area (e.g., Square - Semicircle), how can you use the structure of the algebraic options to eliminate incorrect choices without doing the full derivation? (2 steps)", "answer": "- Step 1: **Sign inspection:** Since you are removing material (subtracting the semicircle from the square), the $$\\pi$$ term in the denominator of the final expression must be negative (e.g., $$8-\\pi$$). Any option with a positive sign (e.g., $$8+\\pi$$) implies the areas were added, which contradicts the physical setup.\n- Step 2: **Coefficient inspection:** Look at the leading coefficients. If your quick mental estimate of the unsimplified numerator is $$\\sqrt{800}$$, you can immediately eliminate options with a coefficient of $$10$$ (which would come from $$\\sqrt{100}$$) in favor of options with $$20$$ (which comes from $$\\sqrt{400}$$), narrowing the choices down instantly.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "A square of side 4 has a semicircle cut out from one edge. Without calculating the exact decimal, what is the exact expression for the remaining area, and why is the radius 2 and not 4? (2 steps)", "answer": "- Step 1: The radius is 2 because the problem states the semicircle is cut from *one edge*, meaning its diameter spans the full length of that edge (4). The radius is always half the diameter ($$\\frac{4}{2} = 2$$).\n- Step 2: The remaining area is the square's area minus the semicircle's area: $$4^2 - \\frac{1}{2}\\pi(2)^2 = 16 - 2\\pi$$.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "A right triangle has legs 3 and 4. Using the \"two-area\" trick, what is the exact length of the altitude to the hypotenuse? Walk through the mental steps. (3 steps)", "answer": "- Step 1: Find the hypotenuse using Pythagoras: $$\\sqrt{3^2 + 4^2} = \\sqrt{9+16} = \\sqrt{25} = 5$$.\n- Step 2: Calculate the area using the legs: $$\\text{Area} = \\frac{1}{2} \\times 3 \\times 4 = 6$$.\n- Step 3: Equate to the hypotenuse-area formula to find the altitude ($$h$$): $$6 = \\frac{1}{2} \\times 5 \\times h \\implies 12 = 5h \\implies h = \\frac{12}{5}$$ (or $$2.4$$).", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "If $$A:B = 2:3$$ and $$B:C = 4:5$$, what is the combined ratio $$A:B:C$$? Walk through the scaling steps mentally. (3 steps)", "answer": "- Step 1: Identify the common term $$B$$ and find the Lowest Common Multiple (LCM) of its values (3 and 4), which is 12.\n- Step 2: Scale the first ratio ($$A:B$$) by $$\\times 4$$ to make $$B=12$$, resulting in $$8:12$$.\n- Step 3: Scale the second ratio ($$B:C$$) by $$\\times 3$$ to make $$B=12$$, resulting in $$12:15$$. Combine them to get $$A:B:C = 8:12:15$$.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Using the conceptual relative speed method, what is the exact angle between the hands at 6:00, and why does the formula $$|30H - 5.5M|$$ naturally yield this result? (2 steps)", "answer": "- Step 1: At exactly 6:00, the minute hand is at 12 ($$0^\\circ$$) and the hour hand is at 6 ($$180^\\circ$$), so the exact angle is $$180^\\circ$$.\n- Step 2: The formula yields $$|30(6) - 5.5(0)| = |180 - 0| = 180^\\circ$$. This works because at exactly the hour ($$M=0$$), the relative distance gained by the minute hand is zero, leaving only the initial $$30^\\circ$$ offset per hour mark.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "The mean of 4 numbers is 5. A fifth number is added, and the new mean is 6. What is the fifth number? Walk through the sum logic. (3 steps)", "answer": "- Step 1: Calculate the initial total sum: $$\\Sigma_1 = 4 \\times 5 = 20$$.\n- Step 2: Calculate the new total sum with the fifth number included (count is now 5): $$\\Sigma_2 = 5 \\times 6 = 30$$.\n- Step 3: The fifth number is the difference between the new sum and the old sum: $$30 - 20 = 10$$.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}], "count": 17}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "When solving a geometry problem where a shape is inscribed in or cut from another (like a semicircle cut from a square), how should the multiple-choice answer options dictate your initial variable assignment?", "answer": "Before writing any equations, scan the answer options to see which variable is being solved for. If the options are expressed in terms of the square's side length (e.g., $$m$$), you must define your primary variable as the side length $$m$$, and express all other dimensions (like the semicircle's radius $$r = m/2$$) in terms of $$m$$. This ensures your final algebraic manipulation naturally targets the form shown in the options, saving time and preventing conversion errors at the end.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "In a problem involving the remaining area after a semicircle is removed from a square, what is the most common algebraic trap regarding the semicircle's area formula, and how does it manifest in the final algebraic expression? (3 steps)", "answer": "- Step 1: The most common trap is using the full circle area formula ($$\\pi r^2$$) instead of the semicircle area ($$\\frac{1}{2}\\pi r^2$$). \n- Step 2: If the square has side $$m$$, the semicircle's radius is $$m/2$$. Using the incorrect full circle area subtracts $$\\pi(m/2)^2 = \\frac{\\pi m^2}{4}$$ from the square's area $$m^2$$.\n- Step 3: This error leads to a final expression with $$(4-\\pi)$$ in the denominator. The correct subtraction of the semicircle area ($$\\frac{\\pi m^2}{8}$$) yields $$(8-\\pi)$$ in the denominator. Spotting $$(4-\\pi)$$ vs $$(8-\\pi)$$ in the options is a quick way to verify if you remembered the $$\\frac{1}{2}$$ factor.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "When solving an equation like $$m^2 - \\frac{\\pi m^2}{8} = 100$$ for $$m$$, why is it conceptually and computationally superior to factor out $$m^2$$ immediately rather than trying to find a common denominator and expand? (3 steps)", "answer": "- Step 1: Factoring out $$m^2$$ immediately gives $$m^2(1 - \\frac{\\pi}{8}) = 100$$. This keeps the algebra compact and avoids creating large, messy numerators.\n- Step 2: If you expand first to find a common denominator, you get $$\\frac{8m^2 - \\pi m^2}{8} = 100$$, which then requires you to multiply by 8 and re-factor $$m^2$$ anyway, introducing extra steps where arithmetic mistakes can happen.\n- Step 3: By factoring first, you isolate $$m^2$$ in one clean move: $$m^2 = \\frac{100}{1 - \\pi/8} = \\frac{800}{8-\\pi}$$. This directly sets you up to take the square root and match the surd format of the answer options.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does dropping a perpendicular from the right-angle vertex to the hypotenuse of a right-angled triangle always create two smaller triangles that are similar to the original triangle? (3 steps)", "answer": "- Step 1: Let the original triangle be $$\\triangle PQR$$ with the right angle at $$Q$$. The two acute angles are $$\\angle P$$ and $$\\angle R$$, and they must sum to $$90^\\circ$$.\n- Step 2: When you drop an altitude from $$Q$$ to the hypotenuse $$PR$$ (meeting at $$T$$), it creates two new right-angled triangles: $$\\triangle PQT$$ and $$\\triangle RQT$$. \n- Step 3: In $$\\triangle PQT$$, the angles are $$90^\\circ$$, $$\\angle P$$, and therefore the third angle must be $$\\angle R$$ (since they sum to $$180^\\circ$$). Because $$\\triangle PQT$$ shares the exact same three angles as the original $$\\triangle PQR$$, they are similar by Angle-Angle (AA) similarity. The same logic applies to $$\\triangle RQT$$.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How can you find the length of the altitude to the hypotenuse of a right-angled triangle without using similar triangle ratios, and why is this method often faster in a time-pressured exam? (3 steps)", "answer": "- Step 1: Calculate the area of the triangle using the two legs as the base and height: $$\\text{Area} = \\frac{1}{2} \\times \\text{leg}_1 \\times \\text{leg}_2$$.\n- Step 2: Express the exact same area using the hypotenuse as the base and the altitude ($$h$$) as the height: $$\\text{Area} = \\frac{1}{2} \\times \\text{hypotenuse} \\times h$$.\n- Step 3: Equate the two area expressions and solve for $$h$$. This \"Two-Area Trick\" is faster because it bypasses the need to identify corresponding sides in similar triangles and set up proportion equations; it relies purely on the invariant property of the triangle's area.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why must you always rationalize the denominator (e.g., converting $$\\frac{20}{\\sqrt{5}}$$ to $$4\\sqrt{5}$$) before checking multiple-choice options in exams like the ESAT?", "answer": "Exam setters deliberately format answer options with surds in the numerator to test algebraic manipulation skills and to ensure a single standard form. If you leave your answer as $$\\frac{20}{\\sqrt{5}}$$, it will not visually match the option $$4\\sqrt{5}$$, causing panic or forcing you to waste time doing mental decimal approximations. Rationalizing immediately bridges the gap between your correct numerical value and the required algebraic format.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "In a unit cube, what is the conceptual and geometric difference between the \"
