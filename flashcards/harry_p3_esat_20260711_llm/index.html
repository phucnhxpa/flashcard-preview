<script>
const DATA={"selected": [{"question": "WMA13/01 Q4(b)(i) — When minimising a fraction $$g(x) = \\frac{k}{f(3x) + C}$$ where the numerator $$k$$ is a fixed positive constant, what strategy avoids differentiating the entire fraction? (2 steps)", "answer": "- Step 1: A fraction with a fixed positive numerator is *smallest* when its denominator is *largest*. So instead of differentiating $$g(x)$$, just find the maximum value of the denominator $$f(3x) + C$$.\n- Step 2: The denominator contains a sine function: $$f(3x) + C = R\\sin(\\ldots) + C$$. The maximum of $$R\\sin(\\ldots) + C$$ is $$R + C$$ (when the sine hits 1). Plug this maximum denominator into the fraction to get the minimum of $$g(x)$$ — no quotient rule needed.\n\nTakeaway: fixed positive numerator → minimise the fraction by maximising the denominator. This is a structural shortcut, not a calculus grind."}, {"question": "What is the general principle for choosing which logarithm to use when solving $$a^{kx} = c$$? (synthesis card) (2 steps)", "answer": "- Step 1: Match the logarithm base to the exponential base. If the equation is $$10^{kx} = c$$, use $$\\log_{10}$$; if it is $$e^{kx} = c$$, use $$\\ln$$; if it is $$2^{kx} = c$$, use $$\\log_2$$ (or change-of-base).\n- Step 2: The reason: taking $$\\log_a$$ of $$a^{kx}$$ directly gives $$kx$$ (since $$\\log_a(a^{kx}) = kx$$), which is the cleanest one-step inverse. Using a mismatched base requires the change-of-base formula and introduces extra computation — more steps, more error opportunities."}, {"question": "ESAT warm-up — How do you simplify $$\\sqrt{420r^2}$$ into a form that reveals the exact answer, and why does pulling out the square factor matter? (2 steps)", "answer": "- Step 1: Factor 420 under the root: $$420 = 4 \\times 105$$, so $$\\sqrt{420r^2} = \\sqrt{4 \\times 105 \\times r^2} = 2r\\sqrt{105}$$.\n- Step 2: Pulling out the perfect square (4 and $$r^2$$) gives a clean exact expression. If you left $$\\sqrt{420}$$ unsimplified, you'd reach for a decimal approximation and lose exactness. The exam wants $$R = r(10 + \\sqrt{105})$$, not a decimal.\n\nTakeaway: always factor out perfect squares from under a radical before deciding whether to approximate."}, {"question": "When a question says \"the rate of increase is £50/year,\" what two mathematical translations must you make? (Q3(c) — Phuc trap)", "answer": "1. **\"Rate\"** = derivative: $$\\frac{dV}{dt}$$, not an arithmetic series or anything else. Phuc guessed \"arithmetic series\" — that's the trap.\n2. **\"Increase\"** = positive: set $$\\frac{dV}{dt} = +50$$, not $$-50$$. A *decrease* would be $$-50$$.\n\nThe motivation: \"rate of change\" is the definition of the derivative in applied contexts. \"Rate of increase\" further specifies the sign — the quantity is going up, so the derivative is positive. If you set $$\\frac{dV}{dt} = -50$$, you'd be solving for when the price is *falling* at £50/year, which is the opposite of what the question asks."}, {"question": "Synthesis probe: three separate parts of this paper (Q3(c), Q4(a), Q5(d)) share one exam discipline. What is it, and give the one-line version for each?", "answer": "- Step 1: The shared discipline: **carry exact values through, round only at the very end.**\n- Step 2: Q3(c): differentiate the exact base $$10^{0.05}$$, not the rounded $$1.12$$.\n+ Q4(a): use square-and-add for exact $$R$$, don't substitute a rounded $$\\alpha$$.\n+ Q5(d): substitute the *stored* $$T$$ (via $$e^{0.2T}=19$$), not a rounded $$14.72$$.\n- Step 3: Motivation: premature rounding can flip an answer across a boundary; exactness makes the method robust rather than accidentally right."}, {"question": "Q3(c) — the \"calculator technology not acceptable\" rule means you must show algebraic working. What's the minimum **algebra** chain you must write on the page? (3 steps)", "answer": "- Step 1: Differentiate exactly: $$\\dfrac{dV}{dt} = 100 \\cdot 10^{0.05 T} \\cdot 0.05 \\ln 10 = 5 \\ln 10 \\cdot 10^{0.05 T}$$ (after combining $$100 \\cdot 0.05 = 5$$).\n- Step 2: Set equal to 50: $$5 \\ln 10 \\cdot 10^{0.05 T} = 50 \\Rightarrow 10^{0.05 T} = \\dfrac{10}{\\ln 10}$$.\n- Step 3: Take $$\\log_{10}$$: $$0.05 T = \\log_{10}\\!\\left(\\dfrac{10}{\\ln 10}\\right) \\Rightarrow T = \\dfrac{\\log_{10}(10/\\ln 10)}{0.05}$$. Then evaluate numerically at the end.\n+ The mark-scheme rule: every transformation of the equation must be shown, even if intermediate numbers are obvious. The chain is the *evidence* of method, not just the route to the answer."}, {"question": "WMA13/01 Q4(b)(i) — Why is the minimum of $$g(x) = \\frac{18}{f(3x) + 4\\sqrt{3}}$$ found without any calculus, and what property of the numerator makes this possible? (2 steps)", "answer": "- Step 1: The numerator 18 is a *fixed positive constant* — it doesn't vary with $$x$$. A fraction with a constant positive numerator decreases when the denominator increases, and increases when the denominator decreases. So the fraction's minimum coincides with the denominator's maximum.\n- Step 2: This is a *monotone* relationship: for $$k > 0$$, the function $$h(y) = \\frac{k}{y}$$ is strictly decreasing in $$y$$ (for $$y > 0$$). No turning points, no calculus needed — just find where the denominator peaks and plug that peak in.\n\nTakeaway: fixed positive numerator + positive denominator → min of fraction = max of denominator. No differentiation required."}, {"question": "Why is continuity essential for the Intermediate Value Theorem — what happens if a function has a sign change on an interval but is not continuous there? (Q2(a) conceptual depth) (2 steps)", "answer": "- Step 1: A sign change alone only tells you the function values straddle zero. If the function is continuous, the graph is an unbroken curve connecting the negative value to the positive value, so it **must** cross zero somewhere in between — that's the IVT guarantee.\n- Step 2: If the function is discontinuous (e.g., has a jump discontinuity or a vertical asymptote within the interval), it can leap from negative to positive without ever equalling zero. Example: $$f(x) = \\frac{1}{x}$$ on $$[-1,1]$$ — $$f(-1)=-1$$, $$f(1)=1$$ (sign change), but $$f$$ never equals zero because it jumps through an asymptote at $$x=0$$.\n\nThat's why Edexcel awards one mark for sign change and one mark for continuity — both are logically necessary."}, {"question": "A student writes $$\\pi r^2 h$$ as the \"surface area of a cylinder.\" What did they actually write, and how do you catch this error by inspection?", "answer": "- Step 1: $$\\pi r^2 h$$ is the **volume** of the cylinder (cross-sectional area $$\\pi r^2$$ times height $$h$$ — the prism rule), not the surface area.\n- Step 2: Catch it by units/dimension thinking: an area must have exactly two length factors, but $$\\pi r^2 h$$ has three ($$r\\cdot r\\cdot h$$), so it is a volume.\n- Step 3: The correct surface area is $$2\\pi r^2 + 2\\pi r h$$ (two length factors in each term).\n\nTakeaway: three length dimensions = volume; two = area — a quick sanity filter."}, {"question": "Q4(a) — Harry explicitly warns: \"for an exact-value question, do not substitute a rounded decimal for $$\\alpha$$ to get $$R$$.\" List the **two** calculator pitfalls Phuc hit in Q4 and the rule that prevents each. (2 steps)", "answer": "- Step 1: Calculator mode — must be in **radians**. A decimal $$\\alpha$$ answer that's only correct in radians (like $$\\pi/3 \\approx 1.047$$) silently goes wrong in degrees.\n- Step 2: Inverse-trig choice — for $$\\tan\\alpha = b/a$$, use $$\\tan^{-1}(b/a)$$, **not** $$\\sin^{-1}(b/a)$$. Phuc reached for $$\\sin^{-1}$$; Harry corrected: \"Use $$\\tan^{-1}$$.\"\n+ General rule: before any inverse trig, check (i) calculator mode, (ii) which ratio you're inverting."}, {"question": "WMA13/01 Q3(a) — When calculating the gradient from two points on a straight-line graph of $$\\log_{10} V$$ vs $$t$$, what is the correct formula and what variable names go in it? (2 steps)", "answer": "- Step 1: The gradient is $$m = \\frac{\\Delta(\\log_{10} V)}{\\Delta t} = \\frac{\\log_{10} V_2 - \\log_{10} V_1}{t_2 - t_1}$$, using the *transformed* y-variable ($$\\log_{10} V$$) and the x-variable ($$t$$).\n- Step 2: With points (0, 2) and (5, 2.25): $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$, and $$c = 2$$ (the intercept at $$t = 0$$). Do not compute $$\\frac{V_2 - V_1}{t_2 - t_1}$$ — that's the gradient of the raw data, not the log-transformed line.\n\nTakeaway: the gradient uses the *axis variables as labelled* — if the y-axis is $$\\log_{10} V$$, the gradient is $$\\frac{\\Delta(\\log_{10} V)}{\\Delta t}$$, not $$\\frac{\\Delta V}{\\Delta t}$$."}, {"question": "(ESAT warm-up) Phuc offered \"$$\\pi r^2 h$$\" as the cylinder's *surface area*. What quantity does that formula actually compute, and why was Harry's correction crucial? (2 steps)", "answer": "- Step 1: $$\\pi r^2 h$$ is the **volume** of a cylinder — cross-sectional area ($$\\pi r^2$$) times height ($$h$$). Its units are length³, not length², so it cannot be a surface area.\n- Step 2: The distinction matters because ESAT-style \"compare the surface area of one shape to another\" questions will silently fail if you mix volume and surface area. Harry's mnemonic: surface area = the *covering* of the outside of the 3-D shape (think wrapping paper); volume = the *space inside* (think water in a glass)."}, {"question": "(Q5 — meta) Why is the squirrel model written as a fraction $$\\frac{4000 e^{0.1 t}}{19 + e^{0.2 t}}$$ rather than something simpler, and what does the structure tell you about the qualitative behaviour?", "answer": "- The structure is **logistic-style growth with a ceiling**: the numerator grows like $$e^{0.1 t}$$, but the denominator grows like $$e^{0.2 t}$$ — twice as fast. So for large $$t$$, the fraction behaves like $$\\frac{e^{0.1 t}}{e^{0.2 t}} = e^{-0.1 t}$$, which *decays* to zero.\n- The intermediate behaviour: at small $$t$$, the $$+19$$ in the denominator dominates the $$e^{0.2 t}$$, so $$N \\approx \\frac{4000}{20} = 200$$ initially, then rises as $$e^{0.1 t}$$ outpaces the still-modest denominator growth, peaks, and decays.\n- Reading the structure of a model BEFORE computing anything tells you what shape the answer should have (here: starts at 200, rises to a single maximum, decays to 0). This is a sanity-check: if your calculus gives a different qualitative behaviour, you've made an error."}, {"question": "WMA13/01 Q3(b) → (c) — Why must you keep the exact base $$10^{0.05}$$ when differentiating, rather than using the rounded value $$b = 1.12$$? (2 steps)", "answer": "- Step 1: Differentiating $$V = 100(10^{0.05})^t$$ gives $$\\frac{dV}{dt} = 100 \\cdot (10^{0.05})^t \\cdot 0.05 \\ln 10$$, which is exact. Differentiating the rounded $$V = 100(1.12)^t$$ gives $$\\frac{dV}{dt} = 100 \\cdot 1.12^t \\cdot \\ln(1.12)$$, which introduces rounding error *inside the derivative*.\n- Step 2: In Q3(c) this rounding shifts the answer from $$T \\approx 12.76$$ to $$T \\approx 13.10$$ — they both round to 13, but that's luck. In other problems the shift could change the rounded integer. The rule: round only the *final* answer, never intermediate values that feed into further calculation.\n\nTakeaway: a rounded base is an intermediate value — carry exact expressions through all algebraic steps."}, {"question": "When a question asks for the \"smallest positive\" value of $$x$$ satisfying a trig equation, what two-step verification do you perform? (Q4(b)(ii) strategy) (2 steps)", "answer": "- Step 1: Find the **principal solution** — the smallest angle in the standard range that satisfies the equation. For $$\\sin\\theta = 1$$, this is $$\\theta = \\frac{\\pi}{2}$$.\n- Step 2: Write the **general solution** ($$\\theta = \\frac{\\pi}{2} + 2n\\pi$$ for sine = 1) and check the next value ($$n=1$$) to confirm it gives a larger $$x$$. Harry sketched a sine wave for visual confirmation. Never assume the principal solution is the smallest without checking — for some equations (e.g., $$\\cos\\theta = \\frac{1}{2}$$), the principal solution in $$[0, 2\\pi]$$ might not be the smallest positive angle."}, {"question": "Why did Harry advise using the quotient rule for $$N = \\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$ rather than rewriting as $$u \\cdot v^{-1}$$ and using the product rule? (Q5(b))", "answer": "The quotient rule is **safer for this shape** because:\n- It keeps the minus sign explicit in the formula $$\\frac{vu' - uv'}{v^2}$$, making sign errors less likely.\n- The product rule on $$u \\cdot v^{-1}$$ requires you to differentiate $$v^{-1}$$ correctly (bringing down a $$-1$$ exponent), creating two separate sign traps: one from the $$-1$$ power rule and one from the product rule's plus sign. Two minus signs to track vs. one — the quotient rule is simpler.\n- The quotient rule is in the formula book, so you can read it directly rather than reconstructing $$v^{-1}$$ differentiation from scratch.\n\nThe motivation: when the formula book gives you a reliable tool that handles the structure directly, use it — don't improvise a more error-prone alternative."}, {"question": "WMA13/01 Q2(c) — For the iteration $$x_{n+1} = \\sqrt[3]{\\frac{e^{x_n} + 4x_n^2}{2x_n + 3}}$$ with $$x_1 = 1$$, what three practical rules must you follow when computing iterates? (2 steps)", "answer": "- Step 1: (i) Keep the calculator in the correct mode (radians if trig appears, though this iteration is purely algebraic); (ii) Do *not* round intermediate iterates — store each $$x_n$$ to full precision and use the stored value as input for the next step; (iii) Quote $$x_3$$ and the convergent $$\\alpha$$ each to 4 decimal places as the question requests.\n- Step 2: Rounding an intermediate iterate (e.g., writing $$x_2 = 1.2345$$ and re-typing it) introduces compounding error — each step amplifies the previous rounding, and by $$x_3$$ or $$x_4$$ you may be off by several decimal places. The stored value preserves full calculator precision.\n\nTakeaway: iterate → store, not round. Only round the *final reported value* to the requested precision."}, {"question": "What is the word-equation strategy for modelling problems, and why is it essential before substituting formulae? (ESAT + Q5 — general technique)", "answer": "Before substituting any formulae, write a **word equation** stating what equals what in plain English. Examples:\n- ESAT: \"surface area of sphere = 10 × surface area of one closed cylinder\"\n- Q5(a): \"squirrels at the start = value of N when t = 0\"\n\nThe motivation: the word equation forces you to identify the correct quantities and relationships before reaching for formulae. It prevents errors like using only one cylinder end (Phuc's error), confusing volume with surface area, or substituting the wrong time value. It's a planning step that costs 10 seconds but saves minutes of error-correction later."}, {"question": "What is the surface area of a closed cylinder, and how do you derive it from first principles so you never confuse it with volume? (ESAT warm-up — Phuc trap)", "answer": "A closed cylinder has surface area $$2\\pi r^2 + 2\\pi rh$$. Derivation from two parts:\n- **Two flat circular ends**: each end has area $$\\pi r^2$$, so both ends give $$2\\pi r^2$$.\n- **Curved side**: imagine unrolling it into a rectangle. One side of the rectangle is the height $$h$$; the other side is the circumference $$2\\pi r$$ (the distance around the cylinder). So the curved area is $$2\\pi r \\times h = 2\\pi rh$$.\n\nPhuc offered $$\\pi r^2 h$$ — that is the *volume* (cross-section × height, prism formula), not surface area. The trap is confusing \"how much space it holds\" (volume, 3D units m³) with \"how much paint covers the outside\" (surface area, 2D units m²). If you can derive it from \"two circles + one unrolled rectangle,\" you'll never accidentally write the volume formula."}, {"question": "Q5(b) — When differentiating $$N = \\frac{u}{v}$$ with the quotient rule, what is the sign trap, and why did Harry advise against using the product-rule alternative $$u \\cdot v^{-1}$$? (∼17:00 seg.3) (3 steps)", "answer": "- Step 1: The quotient rule is $$\\frac{dN}{dt} = \\frac{v\\frac{du}{dt} - u\\frac{dv}{dt}}{v^2}$$ — note the **minus** sign between the two terms in the numerator. Phuc dropped this minus, which flips the sign of the entire derivative and breaks the maximum-finding in part (c).\n- Step 2: Harry's advice: read the quotient rule from the formula book — it's there, with the minus sign clearly printed. Don't try to memorise it; just look it up.\n- Step 3: Why not rewrite as $$u \\cdot v^{-1}$$ and use the product rule? It works mathematically but requires differentiating $$v^{-1}$$ correctly (another sign trap: $$\\frac{d}{dt}(v^{-1}) = -v^{-2}\\frac{dv}{dt}$$). The quotient rule is safer because it's a single printed formula with fewer opportunities for sign errors."}, {"question": "Synthesis probe: match each trigger phrase to the action it forces — \"given the rate,\" \"show that…,\" \"exact value,\" \"at the start.\"", "answer": "- Step 1: \"the rate (of increase)\" → **differentiate** and set the derivative equal to the given (positive) value.\n- Step 2: \"show that [result]\" → reach exactly the stated line and **stop**; don't solve further.\n- Step 3: \"exact value\" → keep surds/logs, use square-and-add and divide (no rounded decimals).\n+ \"at the start\" → substitute $$t=0$$, remembering $$e^0=1$$.\n\nCommand-word recognition is half the battle: the phrase dictates the method before you touch the numbers."}, {"question": "When applying the quadratic formula to $$R^2 - 20rR - 5r^2 = 0$$, why must you reject one root, and which physical principle dictates the choice? (ESAT warm-up)", "answer": "The quadratic formula gives two roots, but a radius must be positive — that's the physical constraint. One root will be negative (or involve subtracting a larger quantity from a smaller one), and you reject it because a negative radius is meaningless in geometry. The motivation: algebra gives you all mathematical solutions, but the problem's physical context (a real solid object) filters them. Always ask \"does this answer make physical sense?\" — if you get a negative length, area, or count, discard it."}, {"question": "Q4 part (b)(ii) — the minimum of $$g$$ occurs when $$\\sin(6x - \\pi/3) = 1$$. What's the **smallest positive** $$x$$? Why do you take the principal angle, not $$5\\pi/2$$? (2 steps)", "answer": "- Step 1: $$\\sin\\theta = 1 \\Rightarrow \\theta = \\dfrac{\\pi}{2} + 2n\\pi$$ for integer $$n$$. So $$6x - \\dfrac{\\pi}{3} = \\dfrac{\\pi}{2} \\Rightarrow 6x = \\dfrac{\\pi}{2} + \\dfrac{\\pi}{3} = \\dfrac{3\\pi + 2\\pi}{6} = \\dfrac{5\\pi}{6} \\Rightarrow x = \\dfrac{5\\pi}{36}$$.\n- Step 2: The \"smallest positive\" means the smallest with $$n = 0$$ in the general solution. The next value $$n = 1$$ would give $$\\theta = \\dfrac{\\pi}{2} + 2\\pi = \\dfrac{5\\pi}{2}$$, hence $$x = \\dfrac{17\\pi}{36}$$, which is larger. So the smallest positive $$x$$ is $$\\dfrac{5\\pi}{36}$$.\n+ Harry sketched a sine wave to confirm visually that the next peak sits further right."}, {"question": "Simple mental-math drill capturing Q5's structure: for $$N=\\dfrac{10e^{t}}{1+e^{2t}}$$, at what value of $$e^{t}$$ is $$N$$ stationary, using the numerator-only method? (3 steps)", "answer": "- Step 1: Numerator of $$\\frac{dN}{dt}$$ (quotient rule): $$(1+e^{2t})(10e^t) - (10e^t)(2e^{2t})$$; set $$=0$$.\n- Step 2: Factor $$10e^t$$ (never zero): $$1+e^{2t}-2e^{2t}=0 \\Rightarrow 1-e^{2t}=0$$.\n- Step 3: So $$e^{2t}=1$$, i.e. $$e^t=1$$ (at $$t=0$$). Same mechanics as Q5: factor the exponential, discard it, solve the bracket.\n\nThe point isn't the numbers — it's the \"factor the positive exponential, solve the bracket\" move."}, {"question": "General exam technique — When a question specifies \"nearest whole number\" or \"3 significant figures,\" what must you do with your final decimal, and what must you *not* do with intermediate values? (2 steps)", "answer": "- Step 1: Apply the rounding instruction *only* to the final answer. \"Nearest whole number\" means round your last computed value to the nearest integer (e.g., 458.83 → 459). \"3 s.f.\" means round to three significant figures at the end.\n- Step 2: Do *not* round intermediate values that feed into further computation. Harry praised Phuc for \"now picking up on the little details\" like these rounding instructions, but also corrected him for rounding $$T$$ before substituting back. The rule: compute with full precision throughout, round once at the exit.\n\nTakeaway: rounding instructions apply to the *final output only* — intermediate precision must be preserved."}, {"question": "Give a concrete counterexample showing why continuity is essential for the IVT — a function with a sign change on an interval but no root. (Q2(a) — misconception probe)", "answer": "Consider $$f(x) = \\frac{1}{x}$$ on $$[-1, 1]$$. Then $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$ — a sign change exists. But $$f$$ is discontinuous at $$x = 0$$ (it jumps from $$-\\infty$$ to $$+\\infty$$), so it never actually equals zero on this interval. There is no root. This is exactly why the IVT requires continuity: without it, the function can \"skip\" over zero via a discontinuity. Every IVT answer you write must include the continuity statement to rule out this kind of jump."}, {"question": "Q3(a) WMA13/01 Oct 2025 — When the question says \"a graph of $$\\log_{10} V$$ against $$t$$,\" what variable goes on each axis, and what is the trap? (∼19:57 / ∼03:19 seg.2) (2 steps)", "answer": "- Step 1: \"Against\" tells you the layout: the first-named quantity ($$\\log_{10} V$$) is on the **y-axis**, and the second-named quantity ($$t$$) is on the **x-axis**. The equation of the line is therefore $$\\log_{10} V = mt + c$$, not $$V = mt + c$$.\n- Step 2: The trap is writing $$V$$ (or $$y$$) as the vertical variable. Phuc tried to use $$V$$ directly, and Harry corrected: *\"It's not V. Be careful.\"* The y-axis is $$\\log_{10} V$$ — a transformed variable — and you must work with that transformed variable until you \"undo\" the log in part (b)."}, {"question": "Q5(c) — When finding the maximum of $$N(t)$$, you set $$\\frac{dN}{dt} = 0$$. Why can you ignore the denominator $$(19+e^{0.2t})^2$$, and what property of $$e^x$$ lets you reject one factor of the numerator? (∼02:12 seg.4) (3 steps)", "answer": "- Step 1: The denominator $$(19+e^{0.2t})^2$$ is always positive (a square of a sum of positive terms), so it can never be zero. A fraction equals zero only when its numerator equals zero (provided the denominator isn't zero). So you only need $$7600e^{0.1T} - 400e^{0.3T} = 0$$.\n- Step 2: Factor the numerator: $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$. This gives two possibilities: $$e^{0.1T} = 0$$ or $$7600 - 400e^{0.2T} = 0$$.\n- Step 3: $$e^{0.1T} = 0$$ is impossible because $$e^x > 0$$ for all real $$x$$ (Harry sketched $$y=e^x$$ to show it never touches zero). So reject that factor and solve $$7600 - 400e^{0.2T} = 0 \\Rightarrow e^{0.2T} = 19$$."}, {"question": "Q4 part (b)(i) — $$g(x) = \\dfrac{18}{f(3x) + 4\\sqrt{3}}$$. Why is the minimum of $$g$$ obtained by **maximising** the denominator, and what's the resulting minimum value? (2 steps)", "answer": "- Step 1: The numerator 18 is fixed and positive. For a fraction with positive numerator and positive denominator, the fraction gets *smaller* as the denominator gets *bigger*. So min $$g$$ ⇔ max denominator.\n- Step 2: The denominator $$f(3x) + 4\\sqrt{3} = 2\\sqrt{3}\\sin(6x - \\pi/3) + 4\\sqrt{3}$$ is largest when $$\\sin(6x - \\pi/3) = 1$$, giving max denominator $$= 2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$.\n+ Minimum value: $$g_{\\min} = \\dfrac{18}{6\\sqrt{3}} = \\dfrac{3}{\\sqrt{3}} = \\sqrt{3}$$ (after rationalising: $$\\dfrac{3}{\\sqrt{3}} \\cdot \\dfrac{\\sqrt{3}}{\\sqrt{3}} = \\dfrac{3\\sqrt{3}}{3} = \\sqrt{3}$$)."}, {"question": "Q5(b) — when simplifying the numerator, why does $$4000e^{0.1t}\\cdot 0.2e^{0.2t}$$ become a term in $$e^{0.3t}$$? (2 steps)", "answer": "- Step 1: Multiplying powers with the same base adds exponents: $$e^{0.1t}\\cdot e^{0.2t} = e^{(0.1+0.2)t} = e^{0.3t}$$.\n- Step 2: So the two products give $$7600e^{0.1t}$$ (from $$19\\cdot 400e^{0.1t}$$ and $$400e^{0.3t}$$) and $$-800e^{0.3t}$$, combining to numerator $$7600e^{0.1t} - 400e^{0.3t}$$ over $$(19+e^{0.2t})^2$$.\n\nTakeaway: same-base exponentials multiply by adding exponents — $$0.1t + 0.2t = 0.3t$$."}, {"question": "ESAT warm-up — When asked to draw the solid in the question, a student draws a cylinder instead of a sphere. What exam technique prevents this misread? (2 steps)", "answer": "- Step 1: Read the noun in the question carefully — \"solid sphere\" means draw a sphere, not a cylinder. Phuc said \"I wrote the wrong one\" because he glanced at \"solid\" and defaulted to the shape he'd been working with most recently (cylinders).\n- Step 2: Draw *both* solids separately on the diagram (sphere on one side, cylinder on the other), label each with its variables ($$R$$ for sphere, $$r$$ and $$h$$ for cylinder), then write the word equation linking them. Harry re-drew both shapes to fix the confusion.\n\nTakeaway: sketch each distinct solid the question names, labelled with its own variables, before writing any algebra."}, {"question": "Q4(a) — why do you find $$R$$ by *squaring and adding* the two equations, and why is this preferred over substituting a decimal $$\\alpha$$? (3 steps)", "answer": "- Step 1: Square and add: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = (\\sqrt3)^2 + 3^2 = 3 + 9 = 12$$.\n- Step 2: The left side is $$R^2(\\cos^2\\alpha + \\sin^2\\alpha) = R^2$$ by the Pythagorean identity, so $$R = \\sqrt{12} = 2\\sqrt{3}$$ — an **exact** value.\n- Step 3: Substituting a rounded decimal $$\\alpha$$ into $$R = \\sqrt3/\\cos\\alpha$$ would inject rounding error into an \"exact value\" answer. Harry: \"your method could be quite dangerous.\"\n\nTakeaway: square-and-add uses $$\\sin^2+\\cos^2=1$$ to give $$R$$ exactly, sidestepping rounding."}, {"question": "(Q5 part (c)) Why is it safe to divide by $$e^{0.1 T}$$ when finding the maximum, and what's the general principle?", "answer": "- The exponential function satisfies $$e^x > 0$$ for every real $$x$$ (Harry sketched $$y = e^x$$ to show this on the board). So $$e^{0.1 T} > 0$$ for all $$T$$, and dividing by a positive quantity is safe — it never makes an expression undefined and never flips an inequality.\n- The general principle: any factor you can prove is *strictly nonzero on the entire domain* can be divided out without losing solutions. Exponentials, squares, and absolute values are usually safe; factors involving the variable itself (e.g. $$x$$) usually are not, because $$x = 0$$ might be a solution."}, {"question": "What visual derivation helps you remember the curved-surface area of a cylinder, and how does the \"unrolling\" analogy work? (ESAT warm-up / Harry's derivation) (2 steps)", "answer": "- Step 1: Imagine peeling the label off a tin can. The label is a rectangle: its height matches the cylinder's height $$h$$, and its width matches the circumference $$2\\pi r$$ (the distance around the can).\n- Step 2: Rectangle area = height × width = $$h \\times 2\\pi r = 2\\pi rh$$. This is the curved-surface area. The \"unroll\" transformation turns a hard-to-visualise curved surface into a simple rectangle — a powerful geometric trick for remembering the formula."}, {"question": "Final synthesis — Phuc's recurring failure mode across the session is best described as: (a) algebra mistakes, (b) formula recall gaps, (c) misreading questions. Which is it, and what's the evidence from the diagnostic table? (1 step)", "answer": "- Step 1: **(b) Formula recall gaps**, with (c) as a secondary theme. The diagnostic table is dominated by formula slips: $$\\pi r$$ vs. $$\\pi r^2$$, $$4\\pi r$$ vs. $$4\\pi R^2$$, missing cylinder ends, quotient-rule minus sign, $$a^{kx}$$ derivative coefficient, $$e^0 = 1$$. The misreading slips (Q3 \"$$V$$\" for \"log V\", Q3(c) \"arithmetic series\", Q4(a) coefficient misread) are present but secondary.\n+ The formula recall gap is fixable with flashcards + paper volume (Harry's prescription). The misreading slips are fixable with a \"read twice, write as you read\" discipline."}, {"question": "WMA13/01 Q4(a) — After matching coefficients, what method gives the exact value of $$\\alpha$$, and why is $$\\tan^{-1}$$ preferred over $$\\sin^{-1}$$? (2 steps)", "answer": "- Step 1: Divide the two equations: $$\\frac{R \\sin \\alpha}{R \\cos \\alpha} = \\frac{b}{a}$$, giving $$\\tan \\alpha = \\frac{b}{a}$$, so $$\\alpha = \\tan^{-1}\\!\\left(\\frac{b}{a}\\right)$$.\n- Step 2: Why $$\\tan^{-1}$$ not $$\\sin^{-1}$$? $$\\sin^{-1}$$ only has range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$ and can't distinguish quadrants correctly when both $$a$$ and $$b$$ determine the quadrant of $$\\alpha$$. $$\\tan^{-1}$$ combined with the signs of $$a$$ and $$b$$ gives the correct quadrant. Additionally, for exact fractions like $$\\frac{3}{\\sqrt{3}} = \\sqrt{3}$$, $$\\tan^{-1}(\\sqrt{3}) = \\frac{\\pi}{3}$$ is a known exact angle; $$\\sin^{-1}$$ of the same ratio may not be.\n\nTakeaway: divide for $$\\alpha$$ (gives $$\\tan \\alpha$$), never use $$\\sin^{-1}$$ — quadrant ambiguity and exact-value access favor $$\\tan^{-1}$$."}, {"question": "Q3 part (b) — the equation $$\\log_{10} V = 0.05 t + 2$$ needs to be rewritten as $$V = a b^t$$. What's the index-law step, and why do you keep the *exact* $$10^{0.05}$$ (not $$1.12$$) when you differentiate in part (c)? (2 steps)", "answer": "- Step 1: Raise 10 to both sides and split the exponent:\n$$V = 10^{0.05 t + 2} = 10^{0.05 t} \\cdot 10^2 = 100 \\cdot (10^{0.05})^t.$$ So $$a = 100$$ (exact), $$b = 10^{0.05} \\approx 1.12201$$ which rounds to $$1.12$$ (3 s.f.) for the answer line of (b).\n- Step 2: Differentiation must use the **exact** base $$10^{0.05}$$, not the rounded $$1.12$$. The rule $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ is exact; substituting a rounded base introduces a propagation error and is \"not appropriately exact\" — Harry's rule is carry the exact form and only round the final answer."}, {"question": "(Calculus — meta) Compare the derivatives of $$a^{kx}$$, $$e^{kx}$$, and $$kx$$. What's the pattern?", "answer": "- $$\\frac{d}{dx}(kx) = k$$ (constant times $$x$$).\n- $$\\frac{d}{dx}(e^{kx}) = k e^{kx}$$ — same shape as the function, scaled by $$k$$.\n- $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$ — same shape as the function, scaled by $$k \\ln a$$.\n- The pattern: each derivative is **the original function times a constant**. The constant is $$k$$ for $$kx$$, $$k$$ for $$e^{kx}$$, and $$k \\ln a$$ for $$a^{kx}$$. So $$e^x$$ is just $$a^x$$ with $$a = e$$, giving the constant $$1 \\cdot \\ln e = 1 \\cdot 1 = 1$$, which is why $$\\frac{d}{dx}(e^x) = e^x$$."}, {"question": "Q3(c): differentiate the model $$V = 100(10^{0.05})^t = 100\\cdot 10^{0.05t}$$ with respect to $$t$$. Which base do you differentiate and why?", "answer": "- Step 1: Differentiate the **exact** base $$10^{0.05t}$$ (base $$a=10$$, $$k=0.05$$), not the rounded $$1.12$$.\n- Step 2: $$\\dfrac{dV}{dt} = 100\\cdot 10^{0.05t}\\cdot 0.05\\ln 10 = 0.05\\ln(10)\\,V$$.\n- Step 3: Why exact: rounding the base to $$1.12$$ before differentiating is not \"appropriately exact\" and can shift the answer; carry $$10^{0.05}$$ through and round only $$T$$ at the end."}, {"question": "(Q5 part (d)) When computing the maximum number of squirrels, what's the *order of operations* Harry insists on, and why does it matter?", "answer": "- Step 1: **Do NOT round $$T$$ before substituting back.** Compute $$T = \\frac{\\ln 19}{0.2} \\approx 14.72$$ and *store* this value in the calculator (or write the exact expression down).\n- Step 2: When computing $$N_{\\max} = \\frac{4000 e^{0.1 T}}{19 + e^{0.2 T}}$$, substitute the stored (un-rounded) $$T$$. Harry's shortcut: use the result of part (c), namely $$e^{0.2 T} = 19$$, so $$e^{0.1 T} = (e^{0.2 T})^{1/2} = \\sqrt{19}$$ and the denominator is $$19 + 19 = 38$$. So $$N_{\\max} = \\frac{4000 \\sqrt{19}}{38} = 458.83\\ldots \\to 459$$.\n- Step 3: **Round only at the final answer.** Harry's verbatim: \"We only round at the very final answer. Use the stored value.\" Rounding $$T$$ to 15 before substitution would change the answer."}, {"question": "Q3 part (c) — given $$0.05 \\ln 10 \\cdot V = 50$$ and $$V = 100 \\cdot 10^{0.05 T}$$, derive the clean expression $$T = \\dfrac{\\log_{10}(10/\\ln 10)}{0.05}$$ that the official mark scheme rewards. (3 steps)", "answer": "- Step 1: Substitute $$V$$: $$100 \\cdot 10^{0.05 T} \\cdot 0.05 \\ln 10 = 50 \\;\\Rightarrow\\; 10^{0.05 T} = \\dfrac{50}{100 \\cdot 0.05 \\ln 10} = \\dfrac{50}{5 \\ln 10} = \\dfrac{10}{\\ln 10}$$.\n- Step 2: Take $$\\log_{10}$$ of both sides: $$0.05 T = \\log_{10}\\!\\left(\\dfrac{10}{\\ln 10}\\right)$$.\n- Step 3: Solve: $$T = \\dfrac{\\log_{10}(10/\\ln 10)}{0.05} \\approx \\dfrac{0.6377}{0.05} \\approx 12.7557 \\;\\Rightarrow\\; T = 13$$ years (nearest integer).\n+ Note the \"calculator technology is not acceptable\" rule — the algebra is the *show*, the numerical evaluation is the final step."}, {"question": "Edge-case probe: why can you assert that $$(19+e^{0.2t})^2$$ is never zero, and how does that fact simplify *any* \"maximum of a quotient\" question?", "answer": "- Step 1: $$e^{0.2t}>0$$ for all real $$t$$, so $$19+e^{0.2t}>19>0$$, and its square is strictly positive — never zero.\n- Step 2: Therefore $$\\frac{dN}{dt}=0$$ can only come from the numerator being zero; the denominator contributes no stationary points.\n- Step 3: General principle: for a quotient with an always-positive denominator, stationary points are found purely from numerator $$=0$$ — you never solve the denominator."}, {"question": "WMA13/01 Q3(c) — What is the general rule for differentiating $$a^{kx}$$, and how does the chain rule produce the extra factor $$k$$? (3 steps)", "answer": "- Step 1: Start from the base case: $$\\frac{d}{dx} a^x = a^x \\ln a$$. This comes from writing $$a^x = e^{x \\ln a}$$ and differentiating: $$\\frac{d}{dx} e^{x \\ln a} = e^{x \\ln a} \\cdot \\ln a = a^x \\ln a$$.\n- Step 2: For $$a^{kx}$$, treat the exponent as an inner function: $$a^{kx} = e^{kx \\ln a}$$, so by the chain rule $$\\frac{d}{dx} e^{kx \\ln a} = e^{kx \\ln a} \\cdot k \\ln a = a^{kx} \\cdot k \\ln a$$.\n- Step 3: The factor $$k$$ comes from differentiating the inner function $$kx$$ (derivative = $$k$$). It multiplies the existing $$\\ln a$$ factor, giving $$k \\ln a$$ as the combined coefficient. This is why $$\\frac{d}{dx} 3^{6x} = 3^{6x} \\cdot 6 \\ln 3$$, not $$3^{6x} \\cdot \\ln(6x)$$.\n\nTakeaway: $$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$ — the $$k$$ is from the chain rule, not from inside the logarithm."}, {"question": "When solving the quadratic $$R^2 - 20rR - 5r^2 = 0$$ for $$R$$, how do you simplify $$\\sqrt{420r^2}$$, and why does the positive root matter? (ESAT warm-up) (3 steps)", "answer": "- Step 1: Apply the quadratic formula with $$a=1$$, $$b=-20r$$, $$c=-5r^2$$:\n$$R = \\frac{20r \\pm \\sqrt{400r^2 + 20r^2}}{2} = \\frac{20r \\pm \\sqrt{420r^2}}{2}$$\n- Step 2: Simplify the radical: $$\\sqrt{420r^2} = \\sqrt{4 \\times 105 \\times r^2} = 2r\\sqrt{105}$$ (factor out the perfect square 4 and $$r^2$$).\n- Step 3: So $$R = \\frac{20r \\pm 2r\\sqrt{105}}{2} = 10r \\pm r\\sqrt{105} = r(10 \\pm \\sqrt{105})$$.\n\nSince a radius must be positive and $$\\sqrt{105} > 10$$, the \"minus\" root gives a negative $$R$$ — physically impossible. Always take the positive root: $$R = r(10 + \\sqrt{105})$$."}, {"question": "(Q5 — meta) In Q5(d), the cleanest substitution uses $$e^{0.1 T} = \\sqrt{e^{0.2 T}} = \\sqrt{19}$$. Where does the half-exponent trick come from, and why does it work? (2 steps)", "answer": "- The trick uses the index law $$(e^a)^b = e^{ab}$$. So $$e^{0.1 T} = (e^{0.2 T})^{0.5}$$ because $$0.2 \\times 0.5 = 0.1$$.\n- Since part (c) gave you $$e^{0.2 T} = 19$$ for free, you immediately get $$e^{0.1 T} = \\sqrt{19}$$ without solving for $$T$$ at all. This bypasses the calculation of $$T$$ entirely (you still need it for the denominator check, but the numerator becomes trivial). It also avoids any rounding from $$T$$ propagating into the final answer."}, {"question": "Q2 part (b) — Harry's strategy for the rearrangement is \"look at the target and work towards it.\" The target has a cube root on the right. What's the cue that tells you \"cube root both sides at the end,\" and what's the cue in the original equation that tells you **what to factor** before you cube root? (2 steps)", "answer": "- Step 1: Cube root on the right ⇒ the algebraic step just before it must be $$x^3 = (\\text{stuff})$$. So the cue is: get the left-hand side to look like a perfect cube.\n- Step 2: The target has a denominator $$2x + 3$$. Look at the original left-hand side and try to factor out $$(2x + 3)$$. In fact $$2x^4 + 3x^3 = x^3(2x + 3)$$, so factor the left as $$x^3(2x + 3) = e^x + 4x^2$$, divide both sides by $$(2x + 3)$$ to get $$x^3 = \\dfrac{e^x + 4x^2}{2x + 3}$$, then cube root to reach the target."}, {"question": "Q5 part (d) — from $$e^{0.2 T} = 19$$, find $$T$$. Then find the maximum $$N$$. What's the trap with the base of the logarithm and with intermediate rounding? (3 steps)", "answer": "- Step 1: Take $$\\ln$$ (not $$\\log_{10}$$ — the base of the exponent is $$e$$, so the inverse is $$\\ln$$): $$0.2 T = \\ln 19 \\Rightarrow T = \\dfrac{\\ln 19}{0.2} \\approx 14.72$$. **Keep this stored**; do not round.\n- Step 2: Substitute back. Note $$e^{0.1 T} = (e^{0.2 T})^{1/2} = \\sqrt{19}$$. So\n$$N = \\dfrac{4000 \\sqrt{19}}{19 + 19} = \\dfrac{4000\\sqrt{19}}{38} \\approx 458.83\\ldots$$\n- Step 3: Round **only at the very final answer**: $$N = 459$$ squirrels (nearest whole number).\n+ Phuc traps: using $$\\log_{10}$$ instead of $$\\ln$$; rounding $$T$$ to 14.7 or 15 before substituting. Harry: \"We only round at the very final answer… use the stored value.\""}, {"question": "What is the surface area of a *closed* cylinder of radius $$r$$ and height $$h$$, and why does the word \"closed\" change the formula?", "answer": "- Step 1: A closed cylinder has two flat circular ends plus the curved side. Each end has area $$\\pi r^2$$, so both ends give $$2\\pi r^2$$.\n- Step 2: The curved side unrolls into a rectangle of height $$h$$ and length equal to the circumference $$2\\pi r$$, giving area $$2\\pi r\\,h$$.\n- Step 3: Total $$=2\\pi r^2 + 2\\pi r h$$. \"Closed\" is what forces the $$2\\pi r^2$$ term — an open tube would have only the curved side.\n\nTakeaway: the word \"closed\" is a trigger to include *both* end-caps."}, {"question": "Q2(b) — the target is $$x = \\sqrt[3]{\\dfrac{e^x + 4x^2}{2x+3}}$$. What overall *strategy* does Harry use to reach a rearrangement target like this?", "answer": "- Step 1: **Look at the target and work towards it** — the answer's shape tells you what operations you'll need.\n- Step 2: A **cube root** in the target says \"you will cube-root both sides at the end,\" so aim to isolate $$x^3$$ first.\n- Step 3: A **$$2x+3$$ in the denominator** of the target says \"factor $$x^3(2x+3)$$ out of the left side\" so that dividing by $$(2x+3)$$ leaves $$x^3$$ alone.\n\nTakeaway: reverse-engineer the manipulations from the structure of the target expression."}, {"question": "Why is $$e^x > 0$$ for all real $$x$$, and how does this property function as a problem-solving tool? (conceptual depth) (2 steps)", "answer": "- Step 1: $$e^x$$ is defined as the limit of $$\\left(1+\\frac{x}{n}\\right)^n$$ as $$n\\to\\infty$$, or equivalently as the function satisfying $$\\frac{d}{dx}(e^x)=e^x$$ with $$e^0=1$$. Since the derivative is always positive (equal to the function value, which starts at 1 and grows), the function is always increasing and never crosses zero.\n- Step 2: As a problem-solving tool: whenever you factor an equation and get $$e^{(\\cdots)} = 0$$ as a possibility, **immediately reject it**. This eliminates false solutions without any further algebra. In Q5(c), it eliminated $$e^{0.1T}=0$$ instantly, leaving only the meaningful factor to solve."}, {"question": "(Q5 part (d)) For the \"show that\" command in (c) versus the \"find\" command in (d), what is the difference in expected working, and why is \"show that\" not the same as \"find\"?", "answer": "- \"Show that $$X = A$$\" means: *demonstrate* that $$X$$ simplifies to $$A$$, by algebraic manipulation. You don't need to compute the numerical value of $$X$$ or $$A$$; you just need to show the equality. Stop at the shown line.\n- \"Find the maximum number of squirrels (nearest whole number)\" means: *compute* the numerical value to the required precision. Here you must do the full substitution and round to a whole number (459).\n- The trap (Phuc's mistake): pushing on to solve for $$T$$ inside part (c). The \"show that\" line is the deliverable — going further is wasted effort at best and risks an error at worst."}, {"question": "WMA13/01 Q2(a) — When proving a root exists in an interval using the Intermediate Value Theorem, what *two* things must you state to earn full marks, and what happens if you omit one? (2 steps)", "answer": "- Step 1: You must state **both**: (i) a sign change — substitute the actual endpoints $$f(1)$$ and $$f(2)$$, show one is positive and one is negative; (ii) continuity — state that $$f$$ is continuous on $$[1,2]$$.\n- Step 2: If you omit continuity, you score only one mark out of two. Harry's verbatim warning: \"The bit that everyone forgets is continuity. You must remember sign change and continuity. Otherwise you'll only score one mark.\" A sign change alone only proves a root if the function doesn't jump across zero — continuity guarantees no jump.\n\nTakeaway: IVT = sign change + continuity. Neither alone is sufficient."}, {"question": "(Q5 — meta) Compare the structure of the squirrel model $$N(t) = \\frac{4000 e^{0.1 t}}{19 + e^{0.2 t}}$$ to the logistic model $$L(t) = \\frac{K}{1 + Ae^{-rt}}$$. What's similar and what's different? (2 steps)", "answer": "- **Similar**: both have the form \"constant divided by (constant + exponential)\" or similar. Both rise from an initial value, peak, then either plateau (logistic) or decay (this squirrel model).\n- **Different**: the squirrel model has *different* exponents in the numerator ($$e^{0.1 t}$$) and denominator ($$e^{0.2 t}$$), which causes the denominator to dominate for large $$t$$, forcing $$N \\to 0$$. A true logistic model has the denominator growing *slower* than the numerator overall, so it plateaus at $$K$$ instead of decaying to 0.\n- The take-away: the squirrel model is \"growth-then-collapse,\" not \"growth-then-saturation.\" Reading the exponents tells you which regime you're in."}, {"question": "WMA13/01 Q3(c) — What is the common misapplication when differentiating $$3^{6x}$$, and why is $$\\ln(6x)$$ wrong? (2 steps)", "answer": "- Step 1: Students write $$\\frac{d}{dx} 3^{6x} = 3^{6x} \\ln(6x)$$, treating the entire exponent $$6x$$ as if it goes inside the log. This is wrong because the derivative rule is $$a^{kx} \\cdot k \\ln a$$ — the $$k$$ multiplies $$\\ln a$$, it doesn't become the argument of the log.\n- Step 2: The correct answer is $$3^{6x} \\cdot 6 \\ln 3$$. The chain rule brings down the derivative of the inner function ($$k = 6$$), which multiplies $$\\ln a = \\ln 3$$. $$\\ln(6x)$$ would be the derivative of $$6x$$ itself (treated as a standalone function), which has nothing to do with the exponential differentiation rule.\n\nTakeaway: the factor from the chain rule is a *multiplier* outside $$\\ln a$$, never a new argument inside the log."}, {"question": "(Exam technique — meta) Why does Harry insist that \"calculator-only solutions are not acceptable\" in Q3, and what does that change about your working? (2 steps)", "answer": "- Step 1: The rubric explicitly forbids it because the question is testing whether you can manipulate the **algebraic structure** of exponential/log models — knowing that $$\\log_{10} V = mt + c$$ converts to $$V = 10^{mt+c}$$ via index laws, and that $$\\frac{d}{dt}(10^{0.05 t}) = 10^{0.05 t} \\cdot 0.05 \\ln 10$$.\n- Step 2: The implication for your working: every step must be shown as algebra, not just calculator entries. You must write the model in exact form, the derivative in exact form, and solve the equation with ln/log manipulation. Only at the very end may you reach for a decimal."}, {"question": "Why does this guide trust the *derivation* $$R = r(10+\\sqrt{105})$$ rather than the on-screen multiple-choice option letters for the ESAT question?", "answer": "The multiple-choice list sat on a Miro board and was not reliably transcribed — the captured option labels are garbled and don't match the worked answer. The transferable, reliable thing is the *method* (know the two solid formulae, substitute $$h=4R$$, form a quadratic, keep the positive root); on the day you match your derived value to whichever lettered option carries it. This is the general lesson: trust a sound derivation over a poorly-captured option list."}, {"question": "(P3 Q5b) When differentiating a complex fraction like $$\\frac{4000e^{0.1t}}{19 + e^{0.2t}}$$, why is the quotient rule strongly preferred over rewriting it as a product with a negative exponent, and what sign must you be hyper-vigilant about?", "answer": "The quotient rule $$\\left( \\frac{vu' - uv'}{v^2} \\right)$$ is preferred because it is explicitly provided in the formula book and structurally prevents the chain-rule sign errors that occur when differentiating $$(19 + e^{0.2t})^{-1}$$. \n+ *Hyper-vigilance:* You must be extremely careful with the **minus sign** in the numerator ($$vu' \\mathbf{-} uv'$$). Dropping this minus sign when multiplying the $$u$$ and $$v'$$ terms is the most common reason students lose marks on this specific question type."}, {"question": "Q2(b) WMA13/01 Oct 2025 — When asked to rearrange $$f(x)=0$$ into a specific target form containing a cube root and a denominator $$(2x+3)$$, what two structural clues in the target tell you which algebraic moves to make? (∼13:50) (2 steps)", "answer": "- Step 1: **Cube root in the target** → the last move is \"cube-root both sides.\" If the answer has $$x = \\sqrt[3]{\\cdots}$$, then at some point you must have had $$x^3 = \\cdots$$ and taken the cube root. This tells you to aim for collecting an $$x^3$$ on one side.\n- Step 2: **The denominator $$(2x+3)$$ in the target** → you need to divide by $$(2x+3)$$ at some stage. This tells you to **factor** $$(2x+3)$$ out of whichever side of the equation contains it, rather than expanding and hoping it appears.\n\nHarry's strategy: *\"Look at the target and work towards it.\"* Don't just expand everything and get stuck — let the structure of the answer guide your factorisation decisions."}, {"question": "Phuc slipped on \"$$e^0 = 1$$\" in Q5(a). State the rule, give the two nearby facts that go with it, and explain why \"losing the one\" is a common algebra slip. (2 steps)", "answer": "- Step 1: $$e^0 = 1$$. Nearby facts: $$e^x > 0$$ for all real $$x$$ (always — sketch $$y = e^x$$); $$\\ln e = 1$$.\n- Step 2: The slip happens because $$e^{0.1 \\cdot 0}$$ \"looks like\" zero or \"nothing\" when read quickly, especially inside a denominator where you focus on the $$19 + \\cdots$$ structure. The discipline: write $$e^{0.1 \\cdot 0} = e^0 = 1$$ explicitly on the page *before* you simplify. Harry's cue: \"Be careful not to lose the one.\""}, {"question": "Across the whole session Harry named one recurring gap as the \"main\" one. What is it, and what fix did he prescribe?", "answer": "- Step 1: The main gap was **formula recall** — sphere/cylinder/circle geometry and the $$a^{kx}$$ derivative rule.\n- Step 2: Fix 1: learn the ESAT \"cheat sheet\" of formulae with **flashcards** (\"learning formulae is something your flashcards could really help with\").\n- Step 3: Fix 2: build fluency by doing volume — \"8 to 10 papers\" — so the formulae \"become second nature.\"\n\nRecall gaps are fixed by memorisation drills plus repetition, not by re-deriving under exam pressure."}, {"question": "IVT — *why* does a sign change plus continuity give a root? Sketch the one-sentence intuition that would earn you the conclusion mark. (1 step)", "answer": "- Step 1: If a continuous function takes a positive value at one end of an interval and a negative value at the other, it cannot \"jump\" over zero — to get from positive to negative it must pass smoothly through every value in between, including 0. So there is at least one $$x = \\alpha$$ where $$f(\\alpha) = 0$$.\n+ Without continuity, the function could teleport from positive to negative (e.g. $$f(x) = 1/x$$ is undefined at 0, so it skips 0). Continuity is what rules that jump out."}, {"question": "When setting a derivative to zero yields an equation like $$A e^{pt} - B e^{qt} = 0$$ (where $$q > p$$), what is the standard factorisation strategy to isolate the remaining exponential term? (2 steps)", "answer": "- Step 1: **Factor out the smaller exponential.** Factor out $$e^{pt}$$ to get $$e^{pt}(A - B e^{(q-p)t}) = 0$$.\n- Step 2: **Divide out the exponential.** Because the exponential function $$e^{pt}$$ is strictly greater than $$0$$ for all real $$t$$, it can never equal zero. Therefore, you can safely divide both sides by $$e^{pt}$$, leaving only $$A - B e^{(q-p)t} = 0$$ to solve."}, {"question": "(Q4 part (a)) For an exact-value question, what calculator-mode and inverse-trig choices does Harry insist on, and why?", "answer": "- **Radians mode**, not degrees — the question's domain $$\\alpha \\in (0, \\frac{\\pi}{2})$$ is written in radians, and the answer is expected in radians. Mixing modes silently corrupts $$\\alpha$$ and then $$R$$.\n- **Use $$\\tan^{-1}$$** to extract $$\\alpha$$, not $$\\sin^{-1}$$ or $$\\cos^{-1}$$. The reason: you have $$\\tan\\alpha = \\frac{b}{a}$$ directly from the ratio of coefficients, so $$\\alpha = \\tan^{-1}\\!\\left(\\frac{b}{a}\\right)$$ is one clean button-press. Going via $$\\sin^{-1}$$ or $$\\cos^{-1}$$ requires you to compute $$R$$ first (which would itself need a square root) and risks the calculator returning an angle in the wrong quadrant."}, {"question": "(Q4 part (b)(i)) For a fraction $$g(x) = \\frac{\\text{positive constant}}{\\text{denominator}(x)}$$, what's the trick for finding its minimum, and why does it work? (2 steps)", "answer": "- Step 1: A positive numerator divided by a denominator is **smallest when the denominator is largest**. So to minimise $$g(x)$$, you maximise the denominator.\n- Step 2: The denominator is $$f(3x) + 4\\sqrt{3}$$. The first term $$f(3x) = 2\\sqrt{3}\\sin\\!\\left(6x - \\frac{\\pi}{3}\\right)$$ ranges between $$-2\\sqrt{3}$$ and $$+2\\sqrt{3}$$, so its maximum value is $$+2\\sqrt{3}$$ (when $$\\sin = 1$$). Then the denominator's max is $$2\\sqrt{3} + 4\\sqrt{3} = 6\\sqrt{3}$$, and the minimum value of $$g$$ is $$\\frac{18}{6\\sqrt{3}} = \\sqrt{3}$$. The trick inverts the problem from \"minimise a ratio\" to \"maximise a sine,\" which is much easier because sine's maximum is just 1."}, {"question": "Micro-example (mental maths): show $$h(x) = x^3 - 2$$ has a root in $$[1,2]$$ by IVT. Write the complete mark-winning answer.", "answer": "- Step 1: Sign change: $$h(1) = 1 - 2 = -1 < 0$$ and $$h(2) = 8 - 2 = 6 > 0$$ — opposite signs.\n- Step 2: Continuity: $$h$$ is a polynomial, so it is continuous on $$[1,2]$$.\n- Step 3: Conclusion: by the sign change and continuity, there is a root of $$h$$ in $$[1,2]$$.\n\nTakeaway: the three-line template — sign change (both values), continuity, conclusion — earns both marks every time."}, {"question": "Micro-example (mental maths): $$e^{0.5T} = 4$$. Find $$T$$ and also $$e^{0.25T}$$ without a calculator.", "answer": "- Step 1: Take $$\\ln$$ (base is $$e$$): $$0.5T = \\ln 4$$, so $$T = 2\\ln 4 = \\ln 16$$.\n- Step 2: For $$e^{0.25T}$$, note $$0.25T = \\tfrac12(0.5T)$$, so $$e^{0.25T} = (e^{0.5T})^{1/2} = \\sqrt{4} = 2$$.\n- Step 3: This mirrors the Q5(d) trick: $$e^{\\text{half the exponent}} = \\sqrt{\\text{the known value}}$$, avoiding recomputing $$T$$.\n\nTakeaway: to halve an exponent, square-root the known exponential value — a shortcut back-substitution."}, {"question": "When the question asks for the \"exact minimum\" of a function, what does \"exact\" prohibit, and what format must your answer take? (Q4(b)(i) exam technique) (2 steps)", "answer": "- Step 1: \"Exact\" means no decimals anywhere in the answer. You must express the result using surds, fractions, $$\\pi$$, $$e$$, or integers — never a rounded decimal like \"1.73.\"\n- Step 2: Here the minimum is $$\\sqrt{3}$$ — a surd, which is exact. Writing $$1.73$$ would lose the \"exact\" marks. Similarly, $$R = 2\\sqrt{3}$$ is exact; $$R = 3.46$$ is not."}, {"question": "(Q5 part (a)) For the squirrel model $$N(t) = \\frac{4000 e^{0.1 t}}{19 + e^{0.2 t}}$$, what's the value at the *start* of the study ($$t = 0$$), and what's the trap?", "answer": "- Plug in $$t = 0$$: numerator becomes $$4000 \\cdot e^0 = 4000 \\cdot 1 = 4000$$; denominator becomes $$19 + e^0 = 19 + 1 = 20$$. So $$N(0) = \\frac{4000}{20} = 200$$ squirrels.\n- The trap (Phuc's mistake): losing the \"+1\" from the denominator because $$e^0 = 1$$ is \"obvious\" — Harry's verbatim warning: \"be careful not to lose the one.\" The general rule: $$e^0 = 1$$ is the single most-skipped constant in P3, and it appears in every initial-value question."}, {"question": "(ESAT warm-up) Why is the formula for the surface area of a sphere $$4\\pi R^2$$ and not, as Phuc first wrote, $$4\\pi r$$? What's the geometric reason the exponent is 2?", "answer": "- The sphere is a 2-D surface wrapping a 3-D solid, so its \"size\" must scale as (length)² — just like any area. The numerical coefficient $$4\\pi$$ comes from Archimedes' theorem that the surface area of a sphere equals the lateral (curved) area of its circumscribing cylinder. So the answer is dimensionally area, and the 2 in the exponent reflects the 2-D nature of the surface.\n- The trap: writing $$4\\pi r$$ has units of *length*, not *area*, which is an instant dimensional giveaway that something is wrong. Always sanity-check that a \"surface area\" formula has units of length²."}, {"question": "Micro-example (mental maths): a sphere and a closed cylinder both have radius 1, and the cylinder has $$h=1$$. Which has the larger surface area?", "answer": "- Step 1: Sphere: $$4\\pi R^2 = 4\\pi(1)^2 = 4\\pi$$.\n- Step 2: Cylinder: $$2\\pi r^2 + 2\\pi r h = 2\\pi + 2\\pi = 4\\pi$$.\n- Step 3: They're equal here ($$4\\pi$$ each) — a coincidence for these particular dimensions, useful for checking you've recalled both formulae correctly.\n\nTakeaway: plugging in $$r=R=h=1$$ is a fast way to test whether you've remembered the formulae right."}, {"question": "Q4(a) — expressing $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ as $$R\\sin(2x-\\alpha)$$. What compound-angle expansion do you write first, and how do you match coefficients? (2 steps)", "answer": "- Step 1: Expand from the formula book: $$R\\sin(2x-\\alpha) = (R\\cos\\alpha)\\sin 2x - (R\\sin\\alpha)\\cos 2x$$.\n- Step 2: Match against $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$.\n\nWriting the expansion first turns the problem into two simultaneous equations for $$R$$ and $$\\alpha$$."}, {"question": "Q3(c) — After setting $$\\frac{dV}{dt} = 50$$, how do you solve for $$T$$, and what two logarithm steps are involved? (3 steps)", "answer": "- Step 1: $$100 \\cdot 10^{0.05T} \\cdot 0.05\\ln 10 = 50$$, so $$10^{0.05T} = \\frac{50}{5\\ln 10} = \\frac{10}{\\ln 10}$$.\n- Step 2: Take $$\\log_{10}$$ of both sides (since the base is 10): $$0.05T = \\log_{10}\\left(\\frac{10}{\\ln 10}\\right)$$.\n- Step 3: $$T = \\frac{\\log_{10}(10/\\ln 10)}{0.05} \\approx 12.756$$, rounding to nearest integer: $$T = 13$$.\n\nNote: you use $$\\log_{10}$$ here because the base is 10, not $$e$$ — match the logarithm to the exponential base (contrast with Q5 where the base is $$e$$ and you use $$\\ln$$)."}, {"question": "(Exam technique — meta) Harry's overall message was that reaching A* in every module for October is \"going to be a real stretch\" if tutorials are the only study input. What's the underlying principle, and how does it shape a study plan?", "answer": "- **Tutorials show you the method; independent practice cements it.** A one-hour tutorial can demonstrate every technique needed for P3, but the muscle memory (formula recall, algebraic manipulation speed, exam-time decision-making) only comes from doing 8–10 papers under timed conditions.\n- **Volume + feedback = fluency.** Each paper you do surfaces specific weaknesses (e.g. \"I always forget to square R in the sphere formula\"), which you then drill. Without the volume, you don't know what to drill.\n- **Selective entry > reckless entry.** Harry's advice: enter only the 3 or 4 modules you're most ready for, rather than risk low grades across all of them. The strategic principle: optimise your grade distribution, not your module count."}, {"question": "Q4(b)(ii) — How do you find the smallest positive $$x$$ where $$\\sin(6x - \\frac{\\pi}{3}) = 1$$, and why must you check that your answer is genuinely the smallest? (2 steps)", "answer": "- Step 1: Set $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2}$$ (the principal solution where sine equals 1). Solve: $$6x = \\frac{\\pi}{2} + \\frac{\\pi}{3} = \\frac{5\\pi}{6}$$, so $$x = \\frac{5\\pi}{36}$$.\n- Step 2: The general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$, giving $$x = \\frac{5\\pi}{36} + \\frac{n\\pi}{3}$$. For $$n=1$$, $$x = \\frac{17\\pi}{36}$$, which is larger. So $$\\frac{5\\pi}{36}$$ is confirmed as the smallest positive $$x$$.\n\nHarry sketched a sine wave to visually confirm that the next solution is further along — always verify \"smallest\" claims against the general solution, don't just assume the principal value is sufficient."}, {"question": "In the R-form method, what is the complete procedure from \"expand and match\" to \"final answer,\" and what is the motivation for each step's order? (Q4(a) — synthesis) (4 steps)", "answer": "- Step 1: **Expand** $$R\\sin(x - \\alpha)$$ using the compound-angle formula, producing $$a\\sin x + b\\cos x$$ structure with unknown coefficients $$R\\cos\\alpha$$ and $$R\\sin\\alpha$$.\n- Step 2: **Match coefficients** with the given expression to get $$R\\cos\\alpha = a$$ and $$R\\sin\\alpha = b$$ — two equations, two unknowns.\n- Step 3: **Divide** for $$\\tan\\alpha = \\frac{b}{a}$$ — this eliminates $$R$$ and solves for $$\\alpha$$ exactly without needing $$R$$.\n- Step 4: **Square-and-add** for $$R^2 = a^2 + b^2$$ — this eliminates $$\\alpha$$ using the Pythagorean identity and gives $$R$$ exactly without needing $$\\alpha$$.\n\nThe order matters: dividing first (for $$\\alpha$$) is simpler than squaring-and-adding first, because division is a one-line step. Squaring-and-adding must come after matching (you need the coefficients first) but doesn't depend on knowing $$\\alpha$$, so the two final steps are independent and can be done in either order — though divide-then-square-add is the conventional flow."}, {"question": "(Q3 part (a)) For a straight line through $$(0, 2)$$ and $$(5, 2.25)$$, what is the slope and y-intercept, and what's the cleanest way to write down the line equation without making arithmetic slips?", "answer": "- The y-intercept is read directly from the point on the y-axis: $$c = 2$$ (because the line passes through $$(0,2)$$). You don't need to compute it.\n- The slope is the rise over run between the two given points: $$m = \\frac{2.25 - 2}{5 - 0} = \\frac{0.25}{5} = 0.05$$.\n- Write the line as $$\\log_{10} V = 0.05 t + 2$$ (point-slope form from $$(0, 2)$$). The \"+2\" being so clean is itself a hint that the intercept was the given point, not something you had to calculate — so don't lose the 2 by accident."}, {"question": "(P3 Q3c) When a modelling question states \"the rate of increase is $$k$$\", what two mathematical translations must you immediately make before doing any calculus?", "answer": "- Step 1: **\"Rate\" translates to the derivative.** You must set up the equation $$\\frac{dV}{dt} = k$$.\n- Step 2: **\"Increase\" translates to a positive sign.** The value $$k$$ must be positive (e.g., $$+50$$, not $$-50$$). If the question said \"rate of decrease\", you would set the derivative to $$-k$$."}, {"question": "When solving for the smallest $$x > 0$$ in a trig equation like $$\\sin(6x - \\frac{\\pi}{3}) = 1$$, why must you check the next periodic solution, and how do you do this efficiently? (Q4(b)(ii) — completeness)", "answer": "The general solution is $$6x - \\frac{\\pi}{3} = \\frac{\\pi}{2} + 2n\\pi$$, giving a family of $$x$$-values for different integers $$n$$. You must check whether $$n = 0$$ gives the smallest positive $$x$$, or whether a negative $$n$$ could give a smaller positive value. For this equation:\n- $$n = 0$$: $$x = \\frac{5\\pi}{36} \\approx 0.436$$ (positive, small).\n- $$n = -1$$: $$6x = \\frac{\\pi}{2} + \\frac{\\pi}{3} - 2\\pi = \\frac{5\\pi}{6} - 2\\pi = -\\frac{7\\pi}{6}$$, giving $$x = -\\frac{7\\pi}{36} < 0$$ (negative, rejected).\n\nSo $$n = 0$$ gives the smallest positive $$x$$. The check is quick: test $$n = 0$$ and $$n = -1$$ (the next lower integer). If $$n = -1$$ gives a negative $$x$$, then $$n = 0$$ is your answer. If $$n = -1$$ gives a positive $$x$$ smaller than $$n = 0$$, use that instead."}, {"question": "WMA13/01 Q2(a) — Why must you substitute the *actual* endpoints of the interval, not values \"near\" them, when applying the IVT? (2 steps)", "answer": "- Step 1: The IVT requires a sign change on the *closed* interval $$[1, 2]$$, so you must evaluate $$f(1)$$ and $$f(2)$$ exactly. Using $$f(1.1)$$ and $$f(1.9)$$ doesn't prove anything about the boundary interval — the root could sit between 1 and 1.1, which your test skips.\n- Step 2: Additionally, the mark scheme awards the substitution mark for the specific endpoint values named in the question. Arbitrary nearby values don't match what the examiner expects and may not even produce a sign change if the function behaves unexpectedly near the boundary.\n\nTakeaway: always use the exact endpoints the question gives — never \"close enough\" substitutes."}, {"question": "(Q2 part (a)) Why does the IVT argument FAIL if you only write \"there is a sign change\" without mentioning continuity?", "answer": "- The IVT conclusion requires both a sign change *and* continuity. If a function has a sign change but is discontinuous (think: jumps over zero without touching it), you cannot guarantee a root — the function might leap from positive to negative in mid-interval without ever being zero.\n- The exam-specific trap: a discontinuity can hide where the function is undefined. So you must explicitly check that $$f$$ is defined (and therefore continuous — most P3 functions are made of continuous pieces) for **every** $$x \\in [a, b]$$. Harry's rule: in any IVT question, scan the function for any \"undefined\" point (e.g. $$\\ln$$, division by zero, $$x^{1/2}$$ of a negative) that lies *inside* the interval — if one does, the continuity statement is more delicate."}, {"question": "Conceptual — why does the quotient rule have a **minus** sign (rather than plus), and what's the geometric intuition? (1 step)", "answer": "- Step 1: A fraction $$u/v$$ can be written as $$u \\cdot v^{-1}$$. Differentiating $$v^{-1}$$ brings down a factor of $$-1$$ (power rule on a negative exponent), and then the product rule expands $$u \\cdot v^{-1}$$ into $$u' v^{-1} + u (-1) v^{-2} v'$$. Putting over a common denominator $$v^2$$ gives $$\\dfrac{v u' - u v'}{v^2}$$ — the minus sign is the $$-1$$ from differentiating $$v^{-1}$$.\n+ Intuition: as the denominator grows, the fraction shrinks — that's the minus sign at work, capturing the \"denominator-getting-bigger-makes-the-ratio-smaller\" effect."}, {"question": "Q2(b) final two moves: from $$x^3(2x+3) = e^x + 4x^2$$ to the cube-root form. Why divide before cube-rooting? (2 steps)", "answer": "- Step 1: Divide by $$(2x+3)$$ to isolate $$x^3$$: $$x^3 = \\dfrac{e^x + 4x^2}{2x+3}$$. You must isolate the pure $$x^3$$ before you can take a clean cube root.\n- Step 2: Cube-root both sides: $$x = \\sqrt[3]{\\dfrac{e^x + 4x^2}{2x+3}}$$.\n\nThe cube root in the target is your signal that the second-to-last line should be \"$$x^3 = \\text{something}$$.\""}, {"question": "Q5(c) — from $$7600e^{0.1T} - 400e^{0.3T} = 0$$, how do you reach $$e^{0.2T} = 19$$, and why can you discard one factor? (3 steps)", "answer": "- Step 1: Factor out $$e^{0.1T}$$: $$e^{0.1T}(7600 - 400e^{0.2T}) = 0$$ (using $$e^{0.3T} = e^{0.1T}e^{0.2T}$$).\n- Step 2: Since $$e^{0.1T} > 0$$ for all $$T$$ (the exponential is always positive — Harry sketched $$y=e^x$$ to show this), it can never be zero, so reject that factor.\n- Step 3: Hence $$7600 - 400e^{0.2T} = 0 \\Rightarrow e^{0.2T} = \\dfrac{7600}{400} = 19$$. So $$A = 19$$.\n\nTakeaway: $$e^{\\text{anything}} > 0$$ always, so that factor is discarded, leaving the bracket to solve."}, {"question": "Q5 — sanity-check the final answer $$N = 459$$. Without doing the arithmetic, why is \"in the hundreds\" the right order of magnitude? (1 step)", "answer": "- Step 1: At $$t = 0$$, $$N = 200$$. The model has a finite carrying capacity — the denominator $$19 + e^{0.2 t}$$ grows without bound, while the numerator grows like $$e^{0.1 t}$$ (slower). So $$N$$ increases from $$200$$ towards a finite limit, never exploding. The maximum must be **modestly larger** than $$200$$, not orders of magnitude bigger. $$459$$ is \"$$200 \\to 459$$\" — plausible. A reading like $$959$$ would be roughly a 5$$\\times$$ jump, which would suggest unbounded growth — wrong shape.\n+ Order-of-magnitude check: $$N_{\\max}$$ should be within a small multiple of $$N(0)$$ when the denominator dominates."}, {"question": "\"Show that\" command — what's the marking convention and what's the cost of over-running? (1 step)", "answer": "- Step 1: \"Show that [intermediate expression]\" awards marks **only** for getting to that expression. Marks for the lines you write *after* the shown expression in the same part are typically zero, even if those lines are correct — because you've answered a question that wasn't asked in that part.\n+ The discipline: when you see \"show that…\", circle the target expression on the question paper, work towards it, write \"QED\" (or similar) when you reach it, and **stop**. Move on to the next part."}, {"question": "Conceptual — why does differentiating $$a^{kx}$$ require the chain rule's factor of $$k$$, and what goes wrong if you forget it? (1 step)", "answer": "- Step 1: $$a^{kx}$$ is a composition: outer function $$a^{(\\cdot)}$$, inner function $$kx$$. The chain rule says $$\\frac{d}{dx}[\\text{outer}(\\text{inner})] = \\text{outer}'(\\text{inner}) \\cdot \\text{inner}'$$. The outer derivative is $$a^{(\\cdot)} \\ln a$$, evaluated at $$kx$$, gives $$a^{kx} \\ln a$$. The inner derivative is $$k$$. Multiplying: $$a^{kx} \\cdot k \\ln a$$.\n+ If you forget the $$k$$, you get $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\ln a$$, which is wrong by a factor of $$k$$. For example, $$\\dfrac{d}{dx}(5^{2x})$$ would be $$5^{2x} \\ln 5$$ instead of the correct $$5^{2x} \\cdot 2 \\ln 5$$ — a 100% error."}, {"question": "(Q3 part (b)) Starting from $$\\log_{10} V = 0.05 t + 2$$, what is the step-by-step algebraic move to extract the form $$V = a \\cdot b^t$$ with exact values of $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: Raise 10 to both sides (the inverse of $$\\log_{10}$$): $$V = 10^{0.05t + 2}$$.\n- Step 2: Split the exponent using $$10^{p+q} = 10^p \\cdot 10^q$$: $$V = 10^{0.05t} \\cdot 10^2 = 100 \\cdot 10^{0.05t}$$.\n- Step 3: Recognise the shape $$V = a \\cdot b^t$$ with $$a = 100$$ (exact) and $$b = 10^{0.05}$$ (exact). For 3-s.f. reporting, $$b = 10^{0.05} = 1.12201\\ldots \\approx 1.12$$.\n- Trap: don't lose the \"$$100 \\cdot$$\" when rewriting — it is the multiplier $$a$$, not the base."}, {"question": "(Q3 — meta) Why does Harry say \"differentiate the EXACT base, not the rounded base,\" and what's the *philosophical* point about exactness vs. approximation?", "answer": "- The exact base $$b = 10^{0.05}$$ encodes the true growth rate. The rounded $$b \\approx 1.12$$ is a numerical approximation that introduces a multiplicative error of about $$0.18\\%$$ in the derivative.\n- The philosophical point: **differentiation is an exact operation**. If you start with an exact expression, the derivative is exact. If you start with an approximation, the derivative is an approximation of the derivative, and you can no longer cleanly justify \"this equals exactly 50\" when you set up the equation. The mark scheme wants the algebraic setup; the rounded base fails it (even if the final number happens to round to the same answer).\n- The general rule: carry exact expressions through algebraic manipulations; only convert to decimals at the very end (or when the question explicitly asks for a decimal)."}, {"question": "Q5(d) — given $$e^{0.2 T} = 19$$, you compute $$\\dfrac{4000 e^{0.1 T}}{19 + e^{0.2 T}} = \\dfrac{4000\\sqrt{19}}{38}$$. Where does the $$\\sqrt{19}$$ come from? (1 step)", "answer": "- Step 1: $$e^{0.1 T} = (e^{0.2 T})^{1/2} = \\sqrt{19}$$ — the half-power trick. If $$e^{0.2 T} = 19$$, then raising both sides to the $$1/2$$ power gives $$e^{0.1 T} = 19^{1/2} = \\sqrt{19}$$.\n+ The trick works because exponents are linear: $$0.1 T = \\tfrac{1}{2}(0.2 T)$$, so $$e^{0.1 T} = (e^{0.2 T})^{1/2}$$. No need to take a logarithm and substitute a numerical $$T$$."}, {"question": "Sphere = 10 cylinders edge case — what would change if the problem said \"**10 open** cylinders\" instead of closed cylinders? (1 step)", "answer": "- Step 1: An open cylinder has only one end (or no ends, depending on convention), so the formula changes. If \"open\" means no ends at all, the surface area is just the curved side $$2\\pi r h$$. The equation would become $$4\\pi R^2 = 10 \\cdot 2\\pi r h = 20\\pi r h$$. With $$h = 4R$$: $$4\\pi R^2 = 80\\pi r R \\Rightarrow R = 20 r$$, no quadratic needed.\n+ If \"open\" means one end (like a tin can without a lid), the formula is $$\\pi r^2 + 2\\pi r h$$. The lesson's solid is \"**closed** cylinder,\" so the formula is $$2\\pi r^2 + 2\\pi r h$$ — both ends counted."}, {"question": "(Q5 part (c)) When the question says \"show that at the maximum time $$T$$, $$e^{0.2 T} = A$$ (find $$A$$),\" what's the strategic instruction and what's the first move? (3 steps)", "answer": "- Step 1: **Read the command word.** \"Show that . . . \" means *stop* at the shown line. Do NOT go further and solve for $$T$$ — that's part (d)'s job.\n- Step 2: The first move is to set $$\\frac{dN}{dt} = 0$$ at $$t = T$$. The denominator $$(19 + e^{0.2 T})^2$$ is always positive, so only the numerator matters: $$7600 e^{0.1 T} - 400 e^{0.3 T} = 0$$.\n- Step 3: Factor out $$e^{0.1 T}$$ (which is always positive, so you can divide by it safely): $$e^{0.1 T}(7600 - 400 e^{0.2 T}) = 0$$, giving $$7600 - 400 e^{0.2 T} = 0$$, hence $$e^{0.2 T} = \\frac{7600}{400} = 19$$. So $$A = 19$$. Stop here — don't solve for $$T$$."}, {"question": "Misconception probe: on a log-linear plot $$\\log_{10}V = mt+c$$, what do the gradient $$m$$ and intercept $$c$$ physically represent for the model $$V=ab^t$$?", "answer": "- Step 1: The intercept $$c$$ satisfies $$10^c = a$$ — it's $$\\log_{10}$$ of the *starting* value (here $$c=2 \\Rightarrow a=100$$).\n- Step 2: The gradient $$m$$ satisfies $$10^m = b$$ — it encodes the growth base per unit $$t$$ (here $$m=0.05\\Rightarrow b=10^{0.05}$$).\n- Step 3: So a straight log-linear line ⇔ genuine exponential growth; the line's slope and intercept decode directly into $$b$$ and $$a$$.\n\nTaking logs turns exponential growth into a straight line — that's the whole point of the linearisation."}, {"question": "Q5 — the numerator is $$4000 e^{0.1 t}$$ and the denominator is $$19 + e^{0.2 t}$$. As $$t \\to \\infty$$, what does $$N(t)$$ approach, and why is there a finite maximum? (1 step)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{0.1 t}$$ and $$e^{0.2 t}$$ both grow, but $$e^{0.2 t}$$ grows faster. So $$N \\sim \\dfrac{4000 e^{0.1 t}}{e^{0.2 t}} = 4000 e^{-0.1 t} \\to 0^+$$ eventually? No — that's the tail. The function rises from $$N(0) = 200$$, peaks at some finite $$T$$ (where the derivative is zero), then decays toward zero as the denominator's faster exponential outruns the numerator.\n+ The maximum exists because the numerator and denominator are both increasing exponentials with different rates — the denominator's faster rate eventually \"wins,\" forcing $$N$$ back down. A logistic-style maximum."}, {"question": "Differentiate each exactly (mental drill): (i) $$3^x$$, (ii) $$3^{6x}$$, (iii) $$5^{2x}$$, (iv) $$1.12^t$$. Give the rule you applied.", "answer": "- Step 1: (i) $$3^x \\Rightarrow 3^x\\ln 3$$ (base rule, $$k=1$$).\n- Step 2: (ii) $$3^{6x} \\Rightarrow 3^{6x}\\cdot 6\\ln 3$$ (chain brings down $$k=6$$; note it's $$6\\ln 3$$, not $$\\ln(6x)$$).\n- Step 3: (iii) $$5^{2x} \\Rightarrow 5^{2x}\\cdot 2\\ln 5$$; (iv) $$1.12^t \\Rightarrow 1.12^t\\ln(1.12)$$ ($$k=1$$).\n\nEvery answer is (original) $$\\times\\ (k\\ln a)$$."}, {"question": "WMA13/01 Q5(a) — When evaluating $$N = \\frac{4000e^{0}}{19 + e^{0}}$$ at $$t = 0$$, what is the trap, and what is the correct denominator? (2 steps)", "answer": "- Step 1: The trap is treating $$e^0$$ as 0 instead of 1. Students see \"e to the power of nothing\" and write 0, making the denominator $$19 + 0 = 19$$ and getting $$N \\approx 211$$.\n- Step 2: $$e^0 = 1$$ always (any non-zero number raised to the power 0 equals 1). So the denominator is $$19 + 1 = 20$$, and $$N = \\frac{4000}{20} = 200$$. Harry's warning: \"Be careful not to lose the one.\"\n\nTakeaway: $$e^0 = 1$$, not 0. The \"+1\" from $$e^0$$ in the denominator is never optional."}, {"question": "(ESAT — meta) Why does Harry specifically insist on a \"cheat sheet\" / flashcards for the geometry formulae, and what's the broader principle about P3 preparation?", "answer": "- Harry's diagnosis: Phuc's main gap is **formula recall**, not concept understanding. He knows what to do (sphere = sum of cylinder areas, quotient rule, $$a^{kx}$$ derivative) but forgets the exact formula at the moment of writing.\n- The principle: in a timed exam, you have ~10 minutes per question. Spending 2 of those minutes reconstructing \"is it $$4\\pi R^2$$ or $$4\\pi R$$?\" is a luxury you can't afford. Fluency comes from having the formulae at your fingertips, which is built by **rote recall practice** (flashcards, cheat sheets) and by **volume** (doing 8–10 papers so the formulae become automatic).\n- The lesson's broader message: independent study between tutorials matters as much as the tutorials themselves. Tutorials can show you the method, but only repetition cements the formulae."}, {"question": "(Q5 — meta) The maximum number of squirrels (459) is closer to the starting value (200) than to the asymptotic ceiling (0). What does this tell you about the *speed* of growth and decay in the model? (2 steps)", "answer": "- The model rises from 200 at $$t = 0$$ to 459 at $$t \\approx 14.72$$, then decays. The peak (459) is about 2.3× the starting value.\n- The reason the peak is moderate (not, say, 5000): the denominator's $$e^{0.2 t}$$ term grows twice as fast as the numerator's $$e^{0.1 t}$$ term, so the \"drag\" of the denominator kicks in early. If the exponents were reversed (e.g. numerator $$e^{0.2 t}$$, denominator $$19 + e^{0.1 t}$$), the peak would be much higher and later.\n- The lesson: in logistic-style models, the *relative* growth rates of numerator and denominator determine the peak height and timing. Reading the model structure tells you what order of magnitude to expect — a sanity check on your final answer."}, {"question": "WMA13/01 Q2(b) — What is the step-by-step algebraic chain from $$f(x) = 0$$ to the cube-root iteration form, and what is the structural logic at each stage? (5 steps)", "answer": "- Step 1: Set $$f(x) = 0$$: $$\\frac{2x^2 + 3x - 4}{e^x \\cdot x} - \\frac{1}{x^2} = 0$$.\n- Step 2: Move $$\\frac{1}{x^2}$$ across: $$\\frac{2x^2 + 3x - 4}{e^x \\cdot x} = \\frac{1}{x^2}$$.\n- Step 3: Multiply both sides by $$e^x x^2$$ (clears both denominators): $$x^2(2x^2 + 3x - 4) = e^x$$, i.e., $$2x^4 + 3x^3 - 4x^2 = e^x$$.\n- Step 4: Move $$4x^2$$ to the right (to enable factorisation): $$2x^4 + 3x^3 = e^x + 4x^2$$, then factor the left: $$x^3(2x + 3) = e^x + 4x^2$$.\n- Step 5: Divide by $$2x + 3$$:"}, {"question": "When a question gives $$h = 4R$$ as a relationship between cylinder height and sphere radius, what is the substitution strategy and why must you substitute before forming the quadratic? (ESAT warm-up)", "answer": "Substitute $$h = 4R$$ into the surface-area equation **before** collecting terms into a quadratic. The equation $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r \\cdot 4R)$$ becomes $$4\\pi R^2 = 20\\pi r^2 + 80\\pi rR$$, which after dividing by $$4\\pi$$ gives $$R^2 = 5r^2 + 20rR$$ — a clean quadratic in $$R$$.\n\nThe motivation: substituting the relationship early eliminates one variable ($$h$$), reducing the problem to a single-variable quadratic. If you tried to form the quadratic while $$h$$ was still present, you'd have two unknowns ($$R$$ and $$h$$) and couldn't apply the quadratic formula. Always reduce unknowns by substituting given relationships as early as possible."}, {"question": "(Q2 part (b) — meta) When you have $$f(x) = 0$$ and need to rearrange to an iteration form $$x_{n+1} = g(x_n)$$, what's the most reliable first move?", "answer": "- **Move the $$x$$ on one si
