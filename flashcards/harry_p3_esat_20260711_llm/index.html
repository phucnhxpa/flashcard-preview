de and everything else on the other.** If the equation has an $$x$$ in an exponent (like $$e^x$$) and an algebraic $$x$$, try to isolate the exponential first by moving the algebraic terms.\n- Then **factor** until one side is a single power of $$x$$ (e.g. $$x^3$$) and the other is the rest. Then take the appropriate root (cube root, square root, etc.) to leave $$x = (\\ldots)$$.\n- The end-state shape must be exactly $$x = (\\text{expression involving } x)$$ with no $$x$$ on the left except the lone one. That expression becomes $$g(x)$$, and the iteration is $$x_{n+1} = g(x_n)$$."}, {"question": "Exam technique — what's the **first thing** you should write on the page when an IVT question gives you a closed interval? (1 step)", "answer": "- Step 1: Substitute the endpoints and write down **both** numerical values, one per line:\n$$f(1) = \\ldots = (\\text{sign}), \\qquad f(2) = \\ldots = (\\text{sign}).$$\nThen state the sign change explicitly: \"$$f(1) > 0$$ and $$f(2) < 0$$\" (or whichever way the signs go). Then the second required line: \"$$f$$ is continuous on $$[1, 2]$$.\" Then the conclusion: \"By the IVT, there exists $$\\alpha \\in [1, 2]$$ with $$f(\\alpha) = 0$$.\"\n+ The two-line scaffold (sign change + continuity) is what earns both marks. Missing either one costs a mark."}, {"question": "Q3(b) — why is linearising an exponential model as $$\\log_{10}V$$ against $$t$$ a straight line in the first place? (3 steps)", "answer": "- Step 1: The model is $$V = ab^t$$. Take $$\\log_{10}$$ of both sides: $$\\log_{10}V = \\log_{10}(ab^t)$$.\n- Step 2: Use log laws: $$\\log_{10}V = \\log_{10}a + t\\log_{10}b$$.\n- Step 3: This is $$Y = c + mX$$ with $$Y=\\log_{10}V$$, $$X = t$$, gradient $$m = \\log_{10}b$$ and intercept $$c = \\log_{10}a$$. So plotting $$\\log_{10}V$$ vs $$t$$ straightens the exponential.\n\nTakeaway: taking logs turns products/powers into sums/multiples, converting $$ab^t$$ into a straight line."}, {"question": "Q4(a): why does \"square-and-add\" give $$R$$ exactly while \"divide\" gives $$\\alpha$$ exactly — and why is this the *safe* method for an exact-value question? (3 steps)", "answer": "- Step 1: Squaring and adding: $$(R\\cos\\alpha)^2 + (R\\sin\\alpha)^2 = R^2(\\cos^2\\alpha+\\sin^2\\alpha)=R^2$$, so $$R = \\sqrt{(\\sqrt3)^2+3^2}=\\sqrt{12}=2\\sqrt3$$. The Pythagorean identity eliminates $$\\alpha$$ entirely.\n- Step 2: Dividing: $$\\dfrac{R\\sin\\alpha}{R\\cos\\alpha}=\\tan\\alpha = \\dfrac{3}{\\sqrt3}=\\sqrt3$$, so $$\\alpha=\\tfrac{\\pi}{3}$$. The $$R$$ cancels, isolating $$\\alpha$$ exactly.\n- Step 3: Harry's warning: substituting a *rounded* decimal $$\\alpha$$ to back out $$R$$ is \"quite dangerous\" — it injects rounding error into an exact answer. Square-and-add / divide keep everything exact."}, {"question": "What is the derivative of $$e^{kx}$$, and how does it differ from the derivative of $$a^{kx}$$? (P3 formulae — Harry drilled)", "answer": "$$\\frac{d}{dx}\\left(e^{kx}\\right) = ke^{kx}$$ — the factor is just $$k$$, with no logarithm needed. For $$a^{kx}$$: $$\\frac{d}{dx}\\left(a^{kx}\\right) = a^{kx} \\cdot k\\ln(a)$$ — the factor is $$k\\ln(a)$$.\n\nThe difference: when the base is $$e$$, $$\\ln(e) = 1$$, so the $$\\ln(a)$$ factor collapses to 1 and you get just $$k$$. For any other base $$a$$, you must include $$\\ln(a)$$ because converting $$a^{kx}$$ to base $$e$$ gives $$e^{kx\\ln(a)}$$, and the $$\\ln(a)$$ is embedded in the exponent's coefficient. The special case $$a = e$$ is simpler — memorise both rules and recognise when each applies."}, {"question": "(Q3 — meta) The whole Q3 hinges on the linearisation trick \"take logs to turn exponential growth into a straight line.\" What is the conceptual reason this works, and when does it fail? (2 steps)", "answer": "- Step 1: If $$V = a b^t$$, then $$\\log_{10} V = \\log_{10} a + t \\log_{10} b$$ — this is linear in $$t$$ with slope $$\\log_{10} b$$ and intercept $$\\log_{10} a$$. So plotting $$\\log V$$ vs $$t$$ straightens out exponential growth, and the slope tells you the growth factor.\n- Step 2: It fails when the underlying model is *not* pure exponential — e.g. logistic growth, polynomial growth, or a sum of exponentials with different rates. There, $$\\log V$$ vs $$t$$ would be curved, and the linear fit would be misleading. Always check the residuals or curvature before committing to an exponential model."}, {"question": "(Exam technique — meta) Harry flagged \"read the command word\" as a top-of-list trap. What are the standard P3 command words, and what does each one *demand* of your working?", "answer": "- **\"Show that . . . \"**: prove the equality by algebraic manipulation. Stop at the shown line. No need to compute a numerical value beyond it.\n- **\"Find . . . \"**: compute the numerical value (or exact expression) to the precision specified (3 s.f., 4 d.p., nearest whole number, etc.).\n- **\"State . . . \"**: write down the answer with no working required (e.g. the range of a function read off a graph).\n- **\"Hence . . . \" / \"Hence, or otherwise . . . \"**: use the previous result to inform this one. If you skipped the previous part, \"otherwise\" lets you start fresh — but \"hence\" requires the chain.\n- The Phuc-trap: in Q5(c), the \"show that\" was mis-read as a \"find,\" causing him to solve for $$T$$ prematurely (using the wrong log base, no less)."}, {"question": "Misconception probe: why is $$\\dfrac{d}{dx}a^{kx} = a^{kx}k\\ln a$$ and NOT $$a^{kx}\\ln(ka)$$ or $$k\\,a^{kx}\\ln(kx)$$?", "answer": "- Step 1: Write $$a^{kx}=e^{kx\\ln a}$$. The exponent is $$kx\\ln a$$, a product of the constant $$k\\ln a$$ with $$x$$.\n- Step 2: Differentiating $$e^{(\\text{const})x}$$ gives (const)$$\\times e^{(\\text{const})x}$$, so the multiplier is exactly the constant $$k\\ln a$$.\n- Step 3: $$\\ln(ka)$$ and $$\\ln(kx)$$ are wrong because the log only ever acts on the **base** $$a$$; $$k$$ enters as a separate chain-rule factor *outside* the log, not inside it."}, {"question": "Q3 part (c) — Phuc initially suggested \"arithmetic series.\" Why is that wrong, and what does \"rate of increase\" force you to do? (2 steps)", "answer": "- Step 1: \"Arithmetic series\" would give a constant *increment* per year, but the question says the graph is exponential (log-linear), so the increments grow — that is *not* arithmetic.\n- Step 2: \"Rate of increase\" = the derivative $$\\dfrac{dV}{dt}$$. \"Increase\" means positive, so set $$\\dfrac{dV}{dt} = +50$$ (not $$-50$$). Phuc's first guess had the wrong sign; Harry caught it."}, {"question": "(ESAT warm-up) What's the difference between the *circumference* of a circle ($$2\\pi r$$) and the *area of a circle* ($$\\pi r^2$$), and where does each one appear in the cylinder-surface-area calculation?", "answer": "- Step 1: Circumference is a length — how far it is around the circle: $$C = 2\\pi r$$. It has units of length.\n- Step 2: Area is a length squared — how much flat 2-D space the disc fills: $$A = \\pi r^2$$. It has units of length².\n- Step 3: In the closed cylinder, the **two flat ends** are circles and use the area formula: total end area = $$2 \\times \\pi r^2 = 2\\pi r^2$$. The **curved side**, when unrolled, becomes a rectangle whose short side is the cylinder's height $$h$$ and whose long side is the circle's circumference $$2\\pi r$$, giving curved area = $$2\\pi r \\cdot h = 2\\pi rh$$. Total surface area of the closed cylinder is $$2\\pi r^2 + 2\\pi rh$$."}, {"question": "Q3 part (c) — state the differentiation rule for $$a^{kx}$$ (chain rule version). Then apply it to $$V = 100 \\cdot (10^{0.05})^t$$ with $$a = 10$$, $$k = 0.05$$, and confirm the multiplier is $$0.05 \\ln 10$$, **not** $$\\ln(0.05 t)$$. (2 steps)", "answer": "- Step 1: $$\\dfrac{d}{dx}(a^{kx}) = a^{kx} \\cdot k \\ln a$$. The chain rule brings down the inner derivative $$k$$ and multiplies the standard $$a^x$$ derivative (which is $$a^x \\ln a$$) by $$k$$.\n- Step 2: With $$a = 10$$ and $$k = 0.05$$: $$\\dfrac{dV}{dt} = 100 \\cdot (10^{0.05})^t \\cdot 0.05 \\ln 10 = 0.05 \\ln(10) \\cdot V$$.\n+ Trap: do **not** write $$\\ln(k t)$$ — the multiplier is $$k \\ln a$$, two separate constants multiplied together."}, {"question": "(Q4 — meta) What's the difference between \"exact value\" questions and \"numerical value\" questions in P3 trig, and how does it affect your choice of method?", "answer": "- **Exact value**: the answer must be in exact form, e.g. $$R = 2\\sqrt{3}$$, $$\\alpha = \\frac{\\pi}{3}$$. Decimal approximations are not acceptable. Method: square-and-add (Pythagoras) for $$R$$, divide for $$\\tan\\alpha$$, take $$\\tan^{-1}$$ for the angle. Keep everything in radicals and fractions of $$\\pi$$.\n- **Numerical value**: the answer can be a decimal, e.g. $$R = 3.46$$, $$\\alpha = 1.0472$$. Method: any calculator approach is fine, as long as you show the steps.\n- The Phuc trap: treating an \"exact value\" question as if it were \"numerical\" by rounding $$\\alpha$$ early, then propagating the rounding into $$R$$. Harry: \"your method could be quite dangerous.\""}, {"question": "When solving $$\\sin(6x - \\tfrac{\\pi}{3}) = 1$$, why must you be careful that the *smallest $$x$$* corresponds to the principal angle $$\\tfrac{\\pi}{2}$$ and not just $$x=0$$? (2 steps)", "answer": "- Step 1: You cannot just set $$x=0$$ — the condition is on the *whole argument* $$6x - \\tfrac{\\pi}{3}$$ equalling $$\\tfrac{\\pi}{2}$$ (where sine peaks), not on $$x$$ itself.\n- Step 2: Because the argument has a $$-\\tfrac{\\pi}{3}$$ phase shift and a factor 6, the smallest valid $$x$$ is found by solving the argument equation, giving $$\\tfrac{5\\pi}{36}$$. Ignoring the phase/scale would give the wrong $$x$$.\n\nTakeaway: peaks are located by the *argument* of the sine, not the bare variable."}, {"question": "(Q3 part (c)) Why does Harry insist on differentiating the EXACT base $$10^{0.05}$$ rather than the rounded base $$1.12$$? What's the actual loss of marks (not just style)?", "answer": "- The question stem says \"solutions relying entirely on calculator technology are not acceptable\" — so you MUST show the algebraic differentiation of the exact model. Differentiating $$100(1.12)^t$$ would give a numerically similar answer here (it rounds to $$T=13$$ either way), but it fails the \"show your working\" test.\n- Beyond the rubric: rounding the base before differentiating introduces a small multiplicative error in the derivative (about $$0.18\\%$$ here, since $$\\ln 1.12 \\neq 0.05 \\ln 10$$ exactly). Over a long calculation that error compounds; the algebraic method is exact and immune to it. The general rule: differentiate the exact expression, round only at the final answer."}, {"question": "Differentiate $$\\sqrt{19}$$ w.r.t. $$T$$. Why does this joke-question illustrate a key trap in Q5(d)? (1 step)", "answer": "- Step 1: $$\\sqrt{19}$$ is a **constant** (it doesn't depend on $$T$$), so its derivative is $$0$$. The trap in Q5(d) is replacing $$e^{0.1 T}$$ with $$\\sqrt{19}$$ and then differentiating as if it were a function of $$T$$ — you'd get $$0$$, which would kill the whole calculation.\n+ The discipline: when you make a substitution like $$e^{0.1 T} = \\sqrt{19}$$ to simplify the algebra, the substitution is for the **original expression's evaluation at $$T$$**, not for differentiation. Differentiate first, *then* substitute — or substitute carefully and only after the derivative step is complete."}, {"question": "(Q5 — meta) For the squirrel model $$N(t) = \\frac{4000 e^{0.1 t}}{19 + e^{0.2 t}}$$, what's the qualitative behaviour as $$t \\to \\infty$$ and as $$t \\to 0$$, and why does this guarantee a finite maximum? (3 steps)", "answer": "- Step 1: As $$t \\to \\infty$$, $$e^{0.2 t}$$ grows much faster than $$e^{0.1 t}$$ in the numerator. So $$N(t) \\approx \\frac{4000 e^{0.1 t}}{e^{0.2 t}} = 4000 e^{-0.1 t} \\to 0$$.\n- Step 2: At $$t = 0$$, $$N(0) = 200$$ (computed in part (a)).\n- Step 3: A continuous function that starts at 200 and decays to 0 must attain a maximum somewhere — in this case the maximum is at $$t \\approx 14.72$$ and equals 459 squirrels. The qualitative picture (start at 200, rise to a peak, decay to 0) is consistent with the calculus result."}, {"question": "ESAT problem: sphere surface area $$= 10 \\times$$ (closed-cylinder surface area), with $$h = 4R$$. What's the *strategy* to get $$R$$ in terms of $$r$$? (5 steps)", "answer": "- Step 1: Write the word equation with the correct formulae: $$4\\pi R^2 = 10(2\\pi r^2 + 2\\pi r h)$$.\n- Step 2: Substitute the constraint $$h = 4R$$ immediately: $$4\\pi R^2 = 10(2\\pi r^2 + 8\\pi r R) = 20\\pi r^2 + 80\\pi r R$$.\n- Step 3: Divide throughout by $$4\\pi$$ to strip constants: $$R^2 = 5r^2 + 20rR$$.\n- Step 4: Collect as a **quadratic in $$R$$** (treat $$r$$ as a constant): $$R^2 - 20rR - 5r^2 = 0$$.\n- Step 5: Apply the quadratic formula and keep the **positive** root (a radius can't be negative).\n\nThe transferable idea: substitute the geometric constraint early, then recognise you have a quadratic in the unknown radius."}, {"question": "Micro-example (mental maths): a straight line of $$\\log_{10}V$$ against $$t$$ passes through $$(0,1)$$ and $$(2,2)$$. Write $$V$$ in the form $$ab^t$$.", "answer": "- Step 1: Gradient $$m = \\frac{2-1}{2-0} = 0.5$$, intercept $$c = 1$$, so $$\\log_{10}V = 0.5t + 1$$.\n- Step 2: Raise 10 to each side: $$V = 10^{0.5t+1} = 10^1\\cdot 10^{0.5t} = 10\\,(10^{0.5})^t$$.\n- Step 3: So $$a = 10$$, $$b = 10^{0.5} = \\sqrt{10}$$. The intercept becomes $$a$$; the gradient becomes $$\\log_{10}b$$.\n\nTakeaway: intercept $$\\to a = 10^c$$, gradient $$\\to b = 10^m$$ — the whole log-linear recovery in miniature."}, {"question": "Why does the curved side of a cylinder contribute area $$2\\pi r h$$ — where does the $$2\\pi r$$ come from? (2 steps)", "answer": "- Step 1: Imagine cutting the curved surface vertically and unrolling it flat — it becomes a rectangle. One side of that rectangle is the height $$h$$.\n- Step 2: The *other* side is whatever wrapped all the way around the circle, i.e. the circumference $$2\\pi r$$ — NOT the diameter (Phuc's slip was calling it the \"diameter\"). Area of rectangle $$= 2\\pi r \\times h = 2\\pi r h$$.\n\nTakeaway: the unrolled length is circumference, so it is $$2\\pi r$$, not $$2r$$."}, {"question": "(Q5 — meta) In Q5(c), the algebraic step from $$7600 e^{0.1 T} - 400 e^{0.3 T} = 0$$ to $$e^{0.1 T}(7600 - 400 e^{0.2 T}) = 0$$ requires dividing the second term by $$e^{0.1 T}$$. How do you do this algebraically? (2 steps)", "answer": "- Use the index law: $$e^{0.3 T} = e^{0.1 T} \\cdot e^{0.2 T}$$. So the term $$400 e^{0.3 T}$$ becomes $$400 e^{0.1 T} \\cdot e^{0.2 T}$$.\n- Factor out $$e^{0.1 T}$$ from the whole expression: $$7600 e^{0.1 T} - 400 e^{0.1 T} \\cdot e^{0.2 T} = e^{0.1 T}(7600 - 400 e^{0.2 T})$$. Now the equation is $$e^{0.1 T}(7600 - 400 e^{0.2 T}) = 0$$, and since $$e^{0.1 T} > 0$$, you must have $$7600 - 400 e^{0.2 T} = 0$$.\n- The trap: trying to divide the original expression $$7600 e^{0.1 T} - 400 e^{0.3 T}$$ by $$e^{0.1 T}$$ without first converting $$e^{0.3 T}$$ to $$e^{0.1 T} \\cdot e^{0.2 T}$$. The factor-out doesn't work on a mismatched exponent."}, {"question": "ESAT warm-up — What is the surface-area formula for a sphere of radius $$R$$, and what physical intuition explains the \"4\"? (2 steps)", "answer": "- Step 1: The formula is $$A = 4\\pi R^2$$. Harry's phrasing: \"the total area around the outside of the 3D shape.\"\n- Step 2: Why 4? Imagine four great circles (each of area $$\\pi R^2$$) wrapped around the sphere — longitude, latitude, and two diagonal great circles. Their total area is $$4\\pi R^2$$, which exactly equals the sphere's surface. Alternatively, a sphere of radius $$R$$ has exactly four times the area of its equatorial cross-section (a disk of area $$\\pi R^2$$).\n\nTakeaway: the \"4\" is not arbitrary — it comes from the geometry of wrapping flat disks around a curved surface."}, {"question": "Final meta-lesson from the lesson — what are the **three habits** Harry tried to drill into Phuc across the whole session? (3 steps)", "answer": "- Step 1: **Know the formulae cold.** Sphere SA, cylinder SA, cylinder volume, $$a^{kx}$$ derivative, quotient rule — these are the \"you have to know these\" foundation. Flashcards are the explicit tool Harry recommended.\n- Step 2: **Read the question, especially the command words.** \"Show that\" = stop at the shown line. \"Rate of increase\" = positive derivative. \"Exact value\" = no decimals. Each command word changes the answer shape.\n- Step 3: **Round only at the very end.** Carry exact symbolic forms through every intermediate step. Use the calculator's stored value for substitution; never retype a rounded intermediate."}, {"question": "When differentiating $$V = 100 \\cdot 10^{0.05t}$$, why does the derivative equal $$0.05\\ln(10) \\cdot V$$, and what conceptual insight does this reveal? (Q3(c) depth) (2 steps)", "answer": "- Step 1: $$\\frac{dV}{dt} = 100 \\cdot 10^{0.05t} \\cdot 0.05\\ln 10 = V \\cdot 0.05\\ln 10$$, because $$V = 100 \\cdot 10^{0.05t}$$ appears as a factor in its own derivative.\n- Step 2: This is the general property of exponential functions: $$\\frac{d}{dt}(ab^t) = ab^t \\ln b = V\\ln b$$, i.e., the derivative of an exponential is proportional to the function itself. The proportionality constant is $$\\ln b$$ (or $$k\\ln a$$ for $$a^{kt}$$). This is why exponential growth has a constant **relative** rate — the rate as a fraction of the current value is fixed."}, {"question": "Why does $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k\\ln(a)$$ reduce to $$\\frac{d}{dx}(e^{kx}) = ke^{kx}$$ when $$a = e$$, and what does this tell you about the relationship between the two rules? (P3 calculus — conceptual link)", "answer": "When $$a = e$$: $$k\\ln(a) = k\\ln(e) = k \\cdot 1 = k$$, so $$a^{kx} \\cdot k\\ln(a) = e^{kx} \\cdot k = ke^{kx}$$.\n\nThis tells you the $$a^{kx}$$ rule is the **general rule** and the $$e^{kx}$$ rule is the **special case** when the base happens to be $$e$$. The $$\\ln(a)$$ factor is always present in principle — it just becomes 1 when $$a = e$$ because $$\\ln(e) = 1$$ by definition. So you only need to memorise one rule ($$a^{kx} \\cdot k\\ln(a)$$) and the $$e^{kx}$$ result follows automatically. Harry drilled both separately for fluency, but conceptually they are one unified principle."}, {"question": "Why is the domain restriction $$x > -2$$ essential to the function $$g(x) = \\dfrac{3+5x}{x+2}$$ in Q1?", "answer": "- Step 1: At $$x = -2$$ the denominator $$x+2 = 0$$, so $$g$$ is undefined there — a vertical asymptote.\n- Step 2: Restricting to $$x > -2$$ keeps $$g$$ well-defined and, importantly, makes it **one-to-one**, which is the precondition for the inverse $$g^{-1}$$ to exist as a function.\n\nTakeaway: domain restrictions on rational functions exclude the zero of the denominator and secure invertibility."}, {"question": "What is the relationship between \"show that\" and \"hence\" command words in multi-part questions, and how does misreading them cost marks? (Q5(c)/(d) — exam technique)", "answer": "\"Show that $$e^{0.2T} = A$$\" in part (c) means: derive this result and **stop**. Part (d) then asks you to \"find the maximum number of squirrels\" — this is where you **use** the result from (c) to go further. The \"hence\" or sequential structure means part (d) builds on part (c).\n\nPhuc's error: he tried to solve for $$T$$ in part (c), going beyond the \"show that\" target. This wastes time and risks using the wrong log base (he used log₁₀ instead of ln). The motivation: multi-part questions are engineered so each part gives you a stepping stone. Overstepping in part (c) means you're doing part (d)'s work in the wrong place, potentially with the wrong method, and you may not earn the method marks allocated to part (d). Respect the part boundaries."}, {"question": "What is the general derivative rule for $$a^{kx}$$, and what is the step-by-step chain-rule reasoning behind it? (Q3(c) — Harry drilled this)", "answer": "$$\\frac{d}{dx}\\left(a^{kx}\\right) = a^{kx} \\cdot k \\ln(a)$$. Derivation via chain rule:\n- Step 1: Rewrite $$a^{kx} = e^{kx \\ln(a)}$$ (since $$a = e^{\\ln(a)}$$, so $$a^{kx} = \\left(e^{\\ln(a)}\\right)^{kx} = e^{kx\\ln(a)}$$).\n- Step 2: Differentiate $$e^{u}$$ where $$u = kx\\ln(a)$$: the derivative of $$e^u$$ is $$e^u \\cdot \\frac{du}{dx} = e^{kx\\ln(a)} \\cdot k\\ln(a)$$.\n- Step 3: Convert back: $$e^{kx\\ln(a)} = a^{kx}$$, so the result is $$a^{kx} \\cdot k\\ln(a)$$.\n\nThe factor $$k$$ comes from the chain rule (the inner function $$kx$$ contributes its derivative $$k$$), and $$\\ln(a)$$ comes from converting to base $$e$$ first. Together they give $$k\\ln(a)$$ as the multiplicative factor."}, {"question": "What is the complete list of Harry's 10 flagged traps (the exam checklist), and what is the common theme connecting them? (Exam technique)", "answer": "1. IVT: state **both** sign change and continuity, or lose a mark.\n2. Circle area is $$\\pi r^2$$, not $$\\pi r$$; cylinder SA ≠ volume.\n3. $$\\frac{d}{dx}(a^{kx}) = a^{kx} \\cdot k\\ln(a)$$ — the factor is $$k\\ln(a)$$, never $$\\ln(kx)$$.\n4. \"Rate\" = derivative; \"increase\" ⇒ set it = + (positive) value.\n5. Exact-value trig: square-and-add for $$R$$, divide for $$\\tan\\alpha$$; no decimals.\n6. Radians mode; use $$\\tan^{-1}$$ for $$\\alpha$$, not $$\\sin^{-1}$$.\n7. Quotient rule: keep the minus sign; it is in the formula book.\n8. Models: $$e^0 = 1$$, keep the \"+1\"; use ln (base e), not log₁₀.\n9. Round only at the final answer; substitute the stored value.\n10. Read the command word: \"show that\" means stop at the shown line.\n\nThe common theme: **precision and completeness** — most traps come from omitting a step (continuity, the +1, the minus sign), using a wrong form (decimal vs exact, wrong log base, wrong trig inverse), or going beyond what the question asks. Exam technique is about disciplined, complete execution, not just knowing the maths."}, {"question": "WMA13/01 Q5(d) — How do you simplify the substitution for maximum $$N$$ using the relation $$e^{0.2T} = 19$$, and what trick avoids computing $$e^{0.1T}$$ separately? (3 steps)", "answer": "- Step 1: The maximum $$N$$ is $$\\frac{4000e^{0.1T}}{19 + e^{0.2T}}$$, and you know $$e^{0.2T} = 19$$, so the denominator becomes $$19 + 19 = 38$$.\n- Step 2: For the numerator, note $$e^{0.1T} = (e^{0.2T})^{1/2} = \\sqrt{e^{0.2T}} = \\sqrt{19}$$, because halving the exponent corresponds to taking the square root. This avoids computing $$T$$ and then evaluating $$e^{0.1T}$$ separately.\n- Step 3: So $$N = \\frac{4000\\sqrt{19}}{38} = \\frac{4000}{38}\\sqrt{19} \\approx 458.83 \\approx 459$$ squirrels. The trick: use the *relationship* between exponents ($$e^{0.1T} = \\sqrt{e^{0.2T}}$$) instead of numerical substitution.\n\nTakeaway: $$e^{kT/2} = \\sqrt{e^{kT}}$$ — halving the exponent = square root. Use this to jump from part (c)'s result directly into part (d)."}, {"question": "ESAT warm-up — After solving the quadratic in $$R$$, you get two roots. What physical reason forces you to take only the positive root? (2 steps)", "answer": "- Step 1: The quadratic $$R^2 - 20rR - 5r^2 = 0$$ gives $$R = r(10 \\pm \\sqrt{105})$$. Since $$\\sqrt{105} \\approx 10.25$$, the \"minus\" root gives $$R = r(10 - 10.25) = -0.25r$$, which is negative.\n- Step 2: A radius is a physical length — it must be positive. The negative root is mathematically valid but physically meaningless, so reject it. Always check the sign of each root against the physical constraints of the problem.\n\nTakeaway: \"radius must be positive\" is the rejection criterion — always state it."}, {"question": "Why does the $$R\\sin(x-\\alpha)$$ form make finding maxima and minima of trig expressions straightforward, and what is the key insight? (Q4 conceptual depth) (2 steps)", "answer": "- Step 1: Once you write $$a\\sin\\theta - b\\cos\\theta = R\\sin(\\theta - \\alpha)$$, the amplitude is exactly $$R$$ — the expression oscillates between $$-R$$ and $$+R$$, because $$\\sin$$ ranges from $$-1$$ to $$1$$.\n- Step 2: The maximum occurs when $$\\sin(\\theta-\\alpha)=1$$ (giving value $$R$$) and the minimum when $$\\sin(\\theta-\\alpha)=-1$$ (giving value $$-R$$). No calculus needed — just read off the amplitude. This is why the R-form is the standard tool for trig optimisation: it converts a two-term mess into a single sine wave with known bounds."}, {"question": "Q1 (functions) — $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\dfrac{3+5x}{x+2}$$, $$x > -2$$. This wasn't worked in the lesson — why should you still prioritise it in independent practice?", "answer": "- Step 1: Inverse-function and composite-function questions ($$g^{-1}$$, $$fg(0)$$, range of $$f$$) are **standard opening marks** — reliable, well-rehearsed technique.\n- Step 2: They appear early in the paper, so securing them builds momentum and banks marks before the harder questions.\n- Step 3: Phuc had done only part (a) and moved on, leaving (b)–(d) unpractised — exactly the routine marks worth locking down.\n\nTakeaway: don't skip \"easy\" opening function questions — they're free, high-confidence marks."}, {"question": "Q4 part (a) — for $$3\\sin 2x - 3\\cos 2x = R\\sin(2x - \\alpha)$$, match coefficients to find $$R\\cos\\alpha$$, $$R\\sin\\alpha$$, then $$\\alpha$$ and $$R$$. (3 steps)", "answer": "- Step 1: Expand: $$R\\sin(2x - \\alpha) = R\\sin 2x \\cos\\alpha - R\\cos 2x \\sin\\alpha = (R\\cos\\alpha)\\sin 2x - (R\\sin\\alpha)\\cos 2x$$.\n- Step 2: Match: $$R\\cos\\alpha = \\sqrt{3}$$ and $$R\\sin\\alpha = 3$$. Divide: $$\\tan\\alpha = \\dfrac{3}{\\sqrt{3}} = \\sqrt{3} \\Rightarrow \\alpha = \\dfrac{\\pi}{3}$$ (since $$0 < \\alpha < \\pi/2$$).\n- Step 3: Square-and-add: $$R^2 = 3 + 9 = 12 \\Rightarrow R = 2\\sqrt{3}$$.\n+ Final: $$f(x) = 2\\sqrt{3}\\,\\sin\\!\\left(2x - \\dfrac{\\pi}{3}\\right)$$."}, {"question": "(Q4 part (b)) The function $$g(x) = \\frac{18}{f(3x) + 4\\sqrt{3}}$$ has its minimum at $$x = \\frac{5\\pi}{36}$$. Without computing, would you expect $$g$$ to be *increasing* or *decreasing* just before this point, and why? (2 steps)", "answer": "- Just before the minimum, $$g$$ is **decreasing** (it has to come down to reach the minimum).\n- Just after, $$g$$ is **increasing** (it has to come back up). So $$x = \\frac{5\\pi}{36}$$ is a local (and global, since the sine is periodic and there are no other minima in the principal period) minimum, and $$g$$ switches from decreasing to increasing there.\n- The underlying reason: the sine function increases through the value $$1$$ at its peak, then decreases. So $$f(3x)$$ peaks, the denominator peaks, and $$g$$ (which is inversely related to the denominator) bottoms out."}, {"question": "Micro-example (mental maths): minimise $$g = \\dfrac{12}{2\\sin\\theta + 4}$$ over all $$\\theta$$. What is the minimum and where?", "answer": "- Step 1: Numerator 12 is a fixed positive constant, so $$g$$ is smallest when the denominator is largest.\n- Step 2: Denominator $$2\\sin\\theta + 4$$ is largest when $$\\sin\\theta = 1$$: max $$= 2(1)+4 = 6$$.\n- Step 3: So $$\\min g = \\dfrac{12}{6} = 2$$, occurring at $$\\theta = \\tfrac{\\pi}{2}$$ (where $$\\sin\\theta = 1$$).\n\nTakeaway: same pattern as Q4(b) — max the denominator via $$\\sin = 1$$, then divide."}]};
const SK='harry_p3_esat_20260711_full';
let mySet=new Set();
let myCards=[];
function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  else { DATA.selected.forEach(c=>mySet.add(c.question)); saveMySet(); }
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function renderMeta(){
  const p=document.getElementById('mp');
  p.innerHTML=`<div class="mi"><span class="ml">Deck</span><span class="mv">${DATA.selected.length} cards</span></div>`
    +`<div class="mi"><span class="ml">Status</span><span class="mv">Audited · standalone</span></div>`
    +`<div class="mi"><span class="ml">Curation</span><span class="mv">Blind Opus judge</span></div>`;
}
function getCur(){return DATA.selected}
function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const cardClass=im?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf"><button class="cpb" onclick="cpC(${i})">📋 copy</button></div></div></div>`
  list.innerHTML=h;rr();
}
function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderMeta();document.getElementById('sc').textContent=myCards.length+' in selection';}
function rr(){if(window.MathJax)MathJax.typesetPromise&&MathJax.typesetPromise([document.getElementById('cl')]).catch(()=>{});}
function selAll(){getCur().forEach(c=>addM(c));renderMeta();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderMeta();renderCards();toast('All deselected')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function mdTable(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return md;
}
function cpTbl(){const md=mdTable();if(!md)return;navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))}
function expN(){const md=mdTable();if(!md)return;navigator.clipboard.writeText(md).then(()=>toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')).catch(()=>toast('Clipboard failed'))}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}
initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderMeta();renderCards()});
</script>
