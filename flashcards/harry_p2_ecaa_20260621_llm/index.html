<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pure P2 + historical ECAA recall</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E"><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script><style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f7;color:#1d1d1f;font:16px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif}main{max-width:920px;margin:auto;padding:28px 18px 72px}header{text-align:center;padding:20px 0 24px}h1{font-size:clamp(28px,6vw,42px);letter-spacing:-1.4px;margin:0}header p{color:#6e6e73;margin:8px 0 0}.toolbar,.card{background:#fff;border-radius:16px;box-shadow:0 1px 5px #00000012}.toolbar{display:flex;gap:9px;flex-wrap:wrap;padding:12px;margin-bottom:14px;position:sticky;top:8px;z-index:2}button{font:inherit;font-size:14px;font-weight:600;border:1px solid #d2d2d7;background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer;color:#1d1d1f}button:hover,button:focus-visible{outline:3px solid #0071e355;background:#f5f5f7}.primary{background:#0071e3;border-color:#0071e3;color:#fff}.count{margin-left:auto;align-self:center;color:#6e6e73;font-size:14px;font-weight:600}#deck{display:grid;gap:12px}.card{padding:18px 18px 16px;min-width:0;overflow:hidden}.number{color:#0071e3;font-size:12px;font-weight:700;letter-spacing:.08em}.question{font-weight:650;margin:6px 0 12px;overflow-wrap:anywhere;min-width:0}.answer{border-top:1px solid #e8e8ed;padding-top:12px;color:#424245;overflow-wrap:anywhere;min-width:0}.answer[hidden]{display:none}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;min-width:0}.small{font-size:13px}mjx-container{max-width:100%!important;overflow-x:auto!important;overflow-y:hidden!important;vertical-align:middle}mjx-container[display="true"]{display:block!important;width:100%!important}@media(max-width:430px){main{padding:16px 10px 44px;overflow-x:hidden}.toolbar{top:4px}.card{padding:15px}button{padding:8px 10px}.count{width:100%;margin-left:0}}
</style></head><body><main><header><h1>Pure P2 + historical ECAA</h1><p>Curated recall · October 2025 paper review + ESAT-style predecessor practice</p></header><nav class="toolbar" aria-label="Deck controls"><button class="primary" id="revealAll">Reveal all</button><button id="hideAll">Hide all</button><button id="shuffle">Shuffle</button><button id="copyAll">Copy Q&amp;A</button><span class="count" id="count"></span></nav><section id="deck" aria-live="polite"></section></main><script>const DATA=[{"question": "Historical ECAA predecessor / ESAT-style practice, not a current ESAT question: ECAA 2020 specimen Q15 rotates a labelled square with vertices $(\\pm1,\\pm1)$ by $90^\\circ$ clockwise, then reflects it in $y=x$. Using the recorded lesson method of labelled-vertex tracking, identify the combined transformation, its inverse and the official option. Give the matrix composition only as a derived verification check—not as the recorded lesson method.", "answer": "Labelled tracking gives $(x,y)\\mapsto(y,-x)\\mapsto(-x,y)$, so the combined transformation is reflection in the $y$-axis. Its inverse is the same reflection, since a reflection is self-inverse. Official option: **B**. Derived verification check, not a recorded lesson method: $$\\begin{pmatrix}0&1\\\\1&0\\end{pmatrix}\\begin{pmatrix}0&1\\\\-1&0\\end{pmatrix}=\\begin{pmatrix}-1&0\\\\0&1\\end{pmatrix}.$$"}, {"question": "Historical ECAA predecessor / ESAT-style practice, not a current ESAT question: in ECAA 2020 specimen Q16, $P(O)=0.6$, $P(C\\mid O)=0.8$ and $P(C\\mid O^c)=0.6$, where $O$ is “bus on time” and $C$ is “catches train”. Find $P(O\\mid C)$ and the official option.", "answer": "$$P(O\\cap C)=0.6(0.8)=0.48,\\qquad P(C)=0.48+0.4(0.6)=0.72.$$ Therefore $$P(O\\mid C)=\\frac{0.48}{0.72}=\\frac23.$$ Official option: **E**."}, {"question": "For WMA12/01 P81269A (15 October 2025), the arithmetic progression is $78,75,72,\\ldots$. Find $a$, $d$, $u_{18}$ and $S_{100}$.", "answer": "$a=78$ and $d=-3$. $$u_{18}=78+17(-3)=27.$$ $$S_{100}=\\frac{100}{2}[2(78)+99(-3)]=50(-141)=-7050.$$"}, {"question": "For WMA12/01 P81269A Q2, the first four terms of $(1+px)^{10}$ are $1+15x+qx^2+rx^3$. Find $p$, $q$ and $r$ by completing the expansion and comparing coefficients.", "answer": "$$ (1+px)^{10}=1+10px+45p^2x^2+120p^3x^3+\\cdots.$$ Thus $10p=15$, so $p=\\frac32$. Hence $$q=45\\left(\\frac32\\right)^2=\\frac{405}{4}=101.25,\\qquad r=120\\left(\\frac32\\right)^3=405.$$"}, {"question": "For WMA12/01 P81269A Q3, $y=3\\times2^{-x}$ passes through $(k,300000)$. Find $k$. Then use six equally spaced ordinates from $x=-0.5$ to $x=7$ to estimate the stated integral by the trapezium rule, including the correct number of strips.", "answer": "$3\\times2^{-k}=300000$, so $$k=-\\frac{\\log(100000)}{\\log2}\\approx-16.61.$$ Six ordinates make five gaps, hence $h=(7-(-0.5))/5=1.5$. The trapezium estimate is $6.6255$, so $6.63$. The correction is to count gaps (strips), not ordinates."}, {"question": "For WMA12/01 P81269A Q4, let $f(x)=4x^3+13x^2-10x+8$. Find the quotient and remainder on division by $x-2$; then use $f(-4)=0$ to determine the only real root; finally find where $f$ is decreasing.", "answer": "$$f(x)=(x-2)(4x^2+21x+32)+72,$$ so the quotient is $4x^2+21x+32$ and the remainder is $72$. Since $f(-4)=0$, $$f(x)=(x+4)(4x^2-3x+2).$$ The quadratic discriminant is $(-3)^2-4(4)(2)=-23<0$, so the only real root is $x=-4$. Also the derivative is $12x^2+26x-10=2(3x-1)(2x+5)$, so $f$ decreases for $-\\frac52<x<\\frac13$."}, {"question": "For WMA12/01 P81269A Q5, solve $4\\tan\\theta+5\\sin\\theta=0$ for $0^\\circ<\\theta\\le360^\\circ$, respecting $\\cos\\theta\\ne0$. Then solve $\\frac{\\sin x}{\\cos x}+\\frac{\\cos x}{\\sin x}=\\frac5{\\cos x}$ for $0<x<\\pi$, respecting $\\sin x\\ne0$ and $\\cos x\\ne0$; give radians to $3$ s.f. from unrounded values.", "answer": "$$\\sin\\theta\\left(\\frac4{\\cos\\theta}+5\\right)=0,$$ so $\\sin\\theta=0$ or $\\cos\\theta=-\\frac45$. Thus $\\theta=143.1^\\circ,180^\\circ,216.9^\\circ,360^\\circ$. For $x$, multiplying by nonzero $\\sin x\\cos x$ gives $\\sin^2x+\\cos^2x=5\\sin x$, so $\\sin x=0.2$. Thus $x=0.201,2.94$ radians (3 s.f.)."}, {"question": "For WMA12/01 P81269A Q6, $A(-2,18)$ and $B(14,6)$ are endpoints of a diameter of $C_1$. Find $C_1$. A circle $C_2$, centred at the origin, touches $C_1$; account for both configurations and find both equations of $C_2$.", "answer": "The midpoint is $(6,12)$ and the radius is $10$, so $$C_1:(x-6)^2+(y-12)^2=100.$$ The centre distance from the origin is $6\\sqrt5$. The two possible radii of $C_2$ are $6\\sqrt5-10$ and $6\\sqrt5+10$, hence $$C_2:x^2+y^2=280-120\\sqrt5\\quad\\text{or}\\quad x^2+y^2=280+120\\sqrt5.$$ A diagram first reveals the two possible touching circles."}, {"question": "For WMA12/01 P81269A Q7, the derivative at the stationary point $x=9$ gives $k=6$. The exact shaded area is $6939/28$. State the value of $k$ and the area to $3$ significant figures, including the required sign sense-check.", "answer": "At the stationary point, substituting $x=9$ into $\\frac{dy}{dx}=3x^2-10x^{3/2}-k^2x^{-1/2}+28$ and setting it to zero gives $k=6$. The area is $$\\frac{6939}{28}\\approx247.821,$$ so it is $248$ to $3$ s.f. Area must be positive: when the curve is above the line, integrate curve minus line."}, {"question": "DEFERRED — official reference only, not a taught lesson method: for WMA12/01 P81269A Q8, prove the finite geometric-sum formula and evaluate $U_6=150(0.92)^6$ and $\\frac{138(1-0.92^{40})}{1-0.92}$.", "answer": "DEFERRED — official reference only, not a taught lesson method. With $S_n=a+ar+\\cdots+ar^{n-1}$, subtracting $rS_n$ gives $(1-r)S_n=a(1-r^n)$, hence $$S_n=\\frac{a(1-r^n)}{1-r}.$$ Also $U_6=150(0.92)^6=90.9532\\ldots\\approx91\\text{ L}$, and $$\\frac{138(1-0.92^{40})}{1-0.92}=1663.58\\ldots\\approx1664\\text{ L}.$$"}, {"question": "Official reference only: NOT DISCUSSED — for WMA12/01 P81269A Q9(i), solve $2\\log_3(4x+5)-\\log_3(x+3)=2$. NOT DISCUSSED — for Q9(ii)(a), derive $a$ from $\\log_{10}a+\\log_{10}b=\\log_{10}(a+b)$. DEFERRED — for Q9(ii)(b), state the full restriction on $b$.", "answer": "NOT DISCUSSED — official reference only: logarithm domains require $x>-\\frac54$, and combining gives $\\frac{(4x+5)^2}{x+3}=9$. The candidates are $x=\\frac1{16}$ and $x=-2$; reject $-2$, so $x=\\frac1{16}$ only. NOT DISCUSSED — $ab=a+b$, so $a=\\frac{b}{b-1}$. DEFERRED — the full restriction is $b>1$."}, {"question": "State the separately sourced current ESAT module format: question count, time, delivery, calculator policy and approximate time per question. Distinguish the ECAA 2020 specimen warm-ups from current ESAT, and state the allowed formula-booklet claim.", "answer": "A current ESAT module has $27$ multiple-choice questions in $40$ minutes, is on-screen and calculator-free: $40\\times60/27\\approx89$ seconds per question. ECAA 2020 is a historical predecessor with different timing, used here only as ESAT-style practice—not current ESAT. No current-ESAT formula-booklet availability claim is made because it was not independently verified."}]; const deck=document.getElementById('deck');const count=document.getElementById('count');function esc(s){const e=document.createElement('div');e.textContent=s;return e.innerHTML}function maths(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}function render(){deck.innerHTML=DATA.map((c,i)=>`<article class="card"><div class="number">CARD ${i+1}</div><div class="question">${maths(c.question)}</div><div class="row"><button class="small primary" aria-expanded="false" aria-controls="answer-${i}" data-i="${i}">Reveal answer</button><button class="small" data-copy="${i}">Copy</button></div><div id="answer-${i}" class="answer" hidden>${maths(c.answer)}</div></article>`).join('');count.textContent=DATA.length+' cards';if(window.MathJax)MathJax.typesetPromise([deck]);}function toggle(b,open){const a=document.getElementById('answer-'+b.dataset.i);a.hidden=!open;b.setAttribute('aria-expanded',String(open));b.textContent=open?'Hide answer':'Reveal answer';if(open&&window.MathJax)MathJax.typesetPromise([a]);}deck.addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(b)toggle(b,b.getAttribute('aria-expanded')!=='true');const c=e.target.closest('[data-copy]');if(c)navigator.clipboard.writeText(DATA[c.dataset.copy].question+'\n\n'+DATA[c.dataset.copy].answer);});document.getElementById('revealAll').onclick=()=>document.querySelectorAll('[data-i]').forEach(b=>toggle(b,true));document.getElementById('hideAll').onclick=()=>document.querySelectorAll('[data-i]').forEach(b=>toggle(b,false));document.getElementById('shuffle').onclick=()=>{for(let i=DATA.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[DATA[i],DATA[j]]=[DATA[j],DATA[i]]}render()};document.getElementById('copyAll').onclick=()=>navigator.clipboard.writeText(DATA.map(c=>c.question+'\n'+c.answer).join('\n\n'));render();</script></body></html>
