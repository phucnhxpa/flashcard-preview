_1 = R_2$$: $$\\int_0^k f(x)\\,dx = -\\int_k^4 f(x)\\,dx$$. - Step 2: Move the right side over: $$\\int_0^k f(x)\\,dx + \\int_k^4 f(x)\\,dx = 0$$. By the additive property of integrals, this collapses to $$\\int_0^4 f(x)\\,dx = 0$$. This means the total signed area from 0 to 4 is zero. - Step 3: Compute $$\\int_0^4 f(x)\\,dx$$ directly. For $$f(x) = 8x^{3/2} - 2x^{5/2}$$: the antiderivative is $$\\frac{16}{5}x^{5/2} - \\frac{4}{7}x^{7/2}$$. Evaluating at 4 and 0 gives the total signed area, which must equal zero. This yields an equation in $$k$$ after using the fact that the area from 0 to $$k$$ equals the negative of the area from $$k$$ to 4. The shortcut: equal areas above and below the axis means the total signed integral over the full interval is zero — this collapses the problem to a single equation."}, {"question": "Q9(b) — after setting up $$\\tfrac{16}{5}k^{5/2} - \\tfrac{4}{7}k^{7/2} = 0$$, what's the factoring trick to solve, and why reject one root? (3 steps)", "answer": "- Step 1: Factor out the common lowest power $$k^{5/2}$$: $$k^{5/2}\\left(\\tfrac{16}{5} - \\tfrac{4}{7}k\\right) = 0$$. - Step 2: This gives $$k=0$$ or $$\\tfrac{16}{5} = \\tfrac{4}{7}k \\Rightarrow k = \\tfrac{16}{5}\\cdot\\tfrac{7}{4} = \\tfrac{28}{5}$$. - Step 3: Reject $$k=0$$ using the diagram (the region requires $$k>4$$, so $$k=0$$ is geometrically meaningless). Exact value: $$k=\\tfrac{28}{5}$$. Takeaway: factor out the common power to expose the roots, then reject the physically-impossible one using the picture."}, {"question": "When solving for $$k$$ and getting solutions $$k = 0$$ and $$k = \\frac{28}{5}$$, why do you reject $$k = 0$$? (P2 May 2024 Q9b)", "answer": "Because the diagram in the question paper shows $$k > 4$$ (the point $$k$$ is to the right of $$x = 4$$, where the curve meets the axis). $$k = 0$$ is the origin, which doesn't match the diagram's configuration. Always use the diagram to reject solutions that are geometrically impossible — the algebra doesn't know about the picture, but you do."}, {"question": "For a geometric model where a population of 2000 grows by 3% per year, what is the formula for the population after $$t$$ years, and what is the common indexing error? (P2 May 2024 Q10a) (2 steps)", "answer": "- Step 1: Growth of 3% per year means multiplying by 1.03 each year. After $$t$$ years: $$N = 2000 \\times 1.03^t$$. - Step 2: The common error is $$n$$ vs $$t$$ confusion. Phuc initially used $$1.03^{t-1}$$ (thinking of the \"nth term\" formula $$ar^{n-1}$$). But \"t years after the start\" means $$t = 0$$ gives 2000 (the start), $$t = 1$$ gives $$2000 \\times 1.03$$, etc. — so the exponent is $$t$$, not $$t-1$$. Harry's strategy for wordy sequence questions: **write out the first few terms explicitly** (2000, 2060, 2121.8, ...) to see the pattern, then decide on the formula."}, {"question": "In a geometric sequence word problem, how do you distinguish between using an exponent of $$n$$ versus $$n-1$$ (or $$t$$ versus $$t-1$$)?", "answer": "Read the time reference carefully. - If it says \"in the $$n$$th year\" or \"the $$n$$th term\", the first term is $$n=1$$, so the exponent is $$n-1$$ (e.g., $$ar^{n-1}$$). - If it says \"$$t$$ years *after* the start\", the start is $$t=0$$, so the exponent is simply $$t$$ (e.g., $$ar^t$$)."}, {"question": "For $$+r\\%$$ per year growth, why is the multiplier $$(1+r/100)$$ per year, and how does the value after $$t$$ years follow?", "answer": "- Step 1: Adding $$r\\%$$ means the new amount is the old plus $$\\tfrac{r}{100}$$ of it: $$\\text{old}\\times(1+\\tfrac{r}{100})$$ — a single multiplication captures \"keep 100% and add $$r\\%$$\". - Step 2: Applying this each year compounds it: after $$t$$ years the factor is $$(1+\\tfrac{r}{100})^t$$. - Step 3: So value $$=\\text{(start)}\\times(1+\\tfrac{r}{100})^t$$; e.g. $$+3\\% \\Rightarrow \\times 1.03$$ per year, $$\\times 1.03^t$$ over $$t$$ years. Takeaway: Percentage growth is a geometric process — the multiplier is $$(1+r/100)$$ and it stacks as a power of the number of years."}, {"question": "When a population model has $$b \\approx 0.98$$ (declining), how do you know the population is decreasing, and what does $$b < 1$$ mean geometrically? (2 steps)", "answer": "- Step 1: In $$N = ab^t$$, if $$b < 1$$, each multiplication by $$b$$ reduces the value. $$0.98 < 1$$ means the population is 98% of the previous year's — a 2% annual decline. - Step 2: Geometrically, the terms form a decreasing sequence approaching zero. This contrasts with $$b > 1$$ (like $$b = 1.03$$ for the dormice), where terms grow. When $$b = 1$$, the population is constant. The sign of $$(b - 1)$$ tells you growth vs decline. The magnitude $$|b - 1|$$ tells you the rate."}, {"question": "Simple mental-math analogue of the $$n$$-vs-$$t$$ indexing trap: a population is 500 and grows $$\\times 2$$ each year. What is it after 3 years, and why exponent 3 not 2?", "answer": "- Step 1: Start ($$t=0$$) is 500. After $$t$$ years the value is $$500\\times 2^t$$. - Step 2: \"After 3 years\" means $$t=3$$, so exponent is 3: $$500\\times 2^3 = 500\\times 8 = 4000$$. - Step 3: Using $$t-1=2$$ (the $$n$$th-term habit) would wrongly give $$500\\times4=2000$$ — that convention belongs to sequences whose *first term* is $$n=1$$, not to a start-at-$$t=0$$ growth model. Takeaway: Start-at-zero growth uses exponent $$t$$; the $$-1$$ only appears when the first listed term is indexed $$n=1$$."}, {"question": "Harry's checklist — what's the difference between \"3 s.f.\", \"3 d.p.\", and \"2 d.p.\", and what's the default rubric when unspecified? (2 steps)", "answer": "- Step 1: **Significant figures** count from the first non-zero digit (so $$2390$$ is 3 s.f.); **decimal places** count digits after the point ($$1.91$$ is 2 d.p.). They are not interchangeable — $$1.911$$ is 4 s.f. but 3 d.p. - Step 2: The Pearson default is **3 s.f. unless otherwise stated**. Harry's habit: underline the stated precision and tick it off, because giving the wrong *type* of rounding is a pure, avoidable accuracy loss."}, {"question": "After computing $$2000 \\times 1.03^6 = 2388.1\\ldots$$, the question asks for the answer \"to 3 s.f.\" What is the correct answer, and what is the rounding trap? (2 steps)", "answer": "- Step 1: 3 significant figures: 2388.1... rounds to **2390** (3 s.f.). The third significant figure is the 8, and the next digit is 8 (≥ 5), so round up the 8 to 9, giving 2390. - Step 2: The rounding trap is confusing **3 s.f.** with **3 d.p.** Three decimal places would give 2388.101 (nonsensical for a count of dormice). Another trap: writing 239 without the trailing zero — 239 is 3 s.f. but represents a completely different number (two hundred thirty-nine, not two thousand three hundred ninety). The trailing zero in 2390 is a significant figure. Context check: 2390 is sensible (slightly more than 2000 after 6 years of 3% growth). If you got 239, that would be a decrease — clearly wrong."}, {"question": "For a geometric model where the answer after 6 years is 2392.46..., and the question asks for 3 s.f., why is the answer 2390 and not 2392? (2 steps)", "answer": "- Step 1: $$2000 \\times 1.03^6 = 2392.46...$$. For 3 s.f., look at the first three significant digits: 2, 3, 9. The fourth digit is 2, so round down. - Step 2: 3 s.f. of 2392.46 is **2390** (the zero is a placeholder maintaining the magnitude — it's significant in the s.f. sense, not a decimal place). Do NOT write 239 (that's only 2 s.f. and changes the magnitude)."}, {"question": "What is the \"sanity check\" for geometric population answers, and why does it matter? (2 steps)", "answer": "- Step 1: After computing, ask: does this answer make sense given the starting value? A population of 2000 growing at 3%/yr for 6 years should be somewhat above 2000 — 2390 is reasonable. - Step 2: If you got 239 (missing a zero) or 23900 (extra zero), the context immediately flags the error. Harry emphasised this: \"2390 is sensible from a start of 2000; 239 would be nonsense.\" This is especially important when rounding or calculator errors could shift the decimal point."}, {"question": "For the voles model $$N = ab^t$$ with data points $$(t=4, N=3690)$$ and $$(t=7, N=3470)$$, what is the strategy to find $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: Write two equations: $$3690 = ab^4$$ and $$3470 = ab^7$$. - Step 2: Divide the second by the first to eliminate $$a$$: $$\\frac{3470}{3690} = \\frac{ab^7}{ab^4} = b^3$$. So $$b^3 = \\frac{3470}{3690} \\approx 0.9404$$, giving $$b = 0.9404^{1/3} \\approx 0.98$$. Since $$b < 1$$, the vole population is *decreasing* — consistent with the data. - Step 3: Substitute back to find $$a$$: $$a = \\frac{3690}{b^4} = \\frac{3690}{0.98^4} \\approx 4000$$. So the model is $$N \\approx 4000 \\times 0.98^t$$. The key trick: dividing the two equations eliminates one unknown immediately. This works whenever you have two data points for a two-parameter model."}, {"question": "P2 May 2024 Q10(b) — voles follow $$N=ab^t$$ with $$N=3690$$ at $$t=4$$ and $$N=3470$$ at $$t=7$$. What's the strategy to find $$b$$ first, then $$a$$? (3 steps)", "answer": "- Step 1: Divide the two equations to eliminate $$a$$: $$\\dfrac{ab^7}{ab^4} = \\dfrac{3470}{3690} \\Rightarrow b^3 = 0.940\\ldots$$ - Step 2: Cube-root to get $$b$$: $$b = 0.98$$ (2 s.f.) — the ratio of the two data points isolates the growth factor. - Step 3: Back-substitute into either equation to get $$a$$: $$a = \\dfrac{3690}{0.98^4} \\approx 4000$$. So $$N = 4000\\times 0.98^t$$. Takeaway: For $$N=ab^t$$ with two data points, DIVIDE to kill $$a$$ and solve for $$b$$, then substitute back for $$a$$ — never try to solve both at once."}, {"question": "To find when two geometric populations are equal (dormice: $$2000 \\times 1.03^T$$, voles: $$4000 \\times 0.98^T$$), what is the algebraic strategy? (3 steps)", "answer": "- Step 1: Set equal: $$2000 \\times 1.03^T = 4000 \\times 0.98^T$$. - Step 2: Rearrange: $$\\frac{1.03^T}{0.98^T} = 2$$, i.e., $$\\left(\\frac{1.03}{0.98}\\right)^T = 2$$. - Step 3: Take logs: $$T \\ln\\left(\\frac{1.03}{0.98}\\right) = \\ln 2$$, so $$T = \\frac{\\ln 2}{\\ln(1.03/0.98)} \\approx 13.9$$ (1 d.p.). The key move is collecting all the $$T$$-exponents onto one side so you can take a single logarithm. Do NOT take logs of each side separately while terms are still mixed."}, {"question": "Why does taking logs solve for an unknown *exponent* like $$T$$ in $$r^T = 2$$ — what property is doing the work? (2 steps)", "answer": "- Step 1: The power law $$\\log(r^T) = T\\log r$$ pulls the exponent down into a *coefficient*. This converts an equation where the unknown is trapped in the exponent into a linear one. - Step 2: Then $$T = \\dfrac{\\log 2}{\\log r}$$ — a simple division. Logs are the inverse operation to exponentiation, so they're the natural tool whenever the unknown sits in the power."}, {"question": "Synthesis — why does the *same* underlying idea (an unknown in an exponent) show up in both Q3 logs and Q10(c), and what universal tool handles both? (3 steps)", "answer": "- Step 1: In Q3 you solve $$\\log_2(\\ldots)=\\ldots$$ and in Q10(c) you solve $$r^T=2$$ — both have the variable tangled with exponentiation/logarithms. - Step 2: The universal move is that **logs and exponentials are inverse operations**: take logs to free an unknown exponent; exponentiate (or equate arguments) to free an unknown inside a log. - Step 3: So Q3 uses log laws to collapse to equal arguments, and Q10(c) uses the power law $$\\log(r^T)=T\\log r$$ to bring $$T$$ down. Recognising the shared structure means one toolkit covers both."}, {"question": "What is Harry's \"underline and tick off\" strategy for precision and units, and why is it necessary? (2 steps)", "answer": "- Step 1: When you read the question, physically underline the precision requirement (e.g., \"3 s.f.\", \"2 d.p.\", \"to the nearest minute\") and the units (e.g., \"°C\", \"radians\"). These are easy to miss in the heat of the exam, and missing them costs marks even with correct calculations. - Step 2: After computing your answer, tick off each underlined requirement to verify you've met it. Phuc gave 1.911 (4 s.f.) instead of 1.91 (3 s.f.), and omitted the °C unit — both are precision/unit errors, not mathematical errors. The underline-and-tick system creates a physical checkpoint that prevents these \"silly\" mark losses, which are especially frustrating because the maths was correct."}, {"question": "What is Harry's practical checklist for preventing the most common precision and mode errors on a P2 paper? Name the four checks. (4 steps)", "answer": "- Step 1: **Significant figures vs decimal places**: underline the requested precision (e.g. \"3 s.f.\") in the question and tick it off when you write your answer. 3 s.f. ≠ 3 d.p. ≠ 2 d.p. - Step 2: **Calculator mode**: check degrees vs radians for each question. A $$(\\ldots)°$$ symbol in the model means degrees; the phrase \"in radians\" means radians. Verify your calculator mode before computing. - Step 3: **Exact values**: if the question says \"exact,\" give surds and fractions — no decimals. If it says \"to 2 d.p.\" or \"3 s.f.,\" round accordingly. - Step 4: **Units**: if the answer is a temperature, write °C; if it is a time of day, convert decimal hours to a clock time. A bare number without units is incomplete. These four checks address the cross-paper pattern of precision and mode errors that cost Phuc marks in Q8 and Q10."}, {"question": "State the four log rules and the one safety check that applies after every equation. (1 step)", "answer": "- Step 1: (1) p log_b X = log_b X^p (power rule); (2) log_b X + log_b Y = log_b XY (product rule); (3) log_b X − log_b Y = log_b (X/Y) (quotient rule); (4) c = log_b b^c (constant to log). Safety check: arguments must stay > 0 — verify every candidate solution against the domain of every original log. Takeaway: four rules + one domain check. The check is what people miss."}, {"question": "Geometric series term and sum. What's the formula, and what's different from arithmetic? (1 step)", "answer": "- Step 1: nth term: a · r^(n−1). Sum of first n terms: S_n = a(1 − r^n)/(1 − r) when r ≠ 1. Unlike arithmetic (linear), geometric (exponential) grows/shrinks by the common ratio, not by adding a constant. Takeaway: arithmetic = +d; geometric = ×r. Both have sum and term formulas; the SUM differs structurally."}, {"question": "What is the arithmetic series formula for the sum of the first $$n$$ terms, and what is the alternative (paired) form? (2 steps)", "answer": "- Step 1: $$S_n = \\frac{n}{2}[2a + (n-1)d]$$ — this is the standard form using the first term $$a$$ and common difference $$d$$. - Step 2: The alternative form is $$S_n = \\frac{n}{2}(a + l)$$ where $$l = a + (n-1)d$$ is the last term. Use whichever is more convenient given the information in the question."}, {"question": "Harry's general strategy for \"wordy sequence\" questions — before computing anything, what's the routine? (3 steps)", "answer": "- Step 1: **Write out a few terms first.** Concretely listing $$t=0,1,2,\\ldots$$ values reveals the pattern and pins down the indexing (does $$t=0$$ or $$t=1$$ give the start?). - Step 2: **Decide what's being asked:** a single term, the $$n$$th term, or a *sum* of terms? These need different formulas — confusing them (Phuc's earlier \"sum vs nth term\" weakness) loses marks. - Step 3: **Mind $$n$$ vs $$t$$ indexing** — a \"years after start\" $$t$$ often differs by one from a \"$$n$$th term\" index. Getting this straight determines whether the exponent is $$t$$ or $$t-1$$. Takeaway: terms-first, then classify (term / nth / sum), then fix the index."}, {"question": "Why is it acceptable to skip terms in the binomial expansion when only the \"coefficient of $$x^3$$\" is needed, and what must you NOT skip? (1 step)", "answer": "You can skip writing out terms whose power exceeds your target, because they can never contribute to lower powers. However, you must NOT skip any term at or below the target power in EITHER bracket of a product, because each such term could pair with a complementary term from the other bracket. In Q1(b), the $$x^4$$ and higher terms from $$(1 - \\frac{x}{6})^9$$ are irrelevant for $$x^3$$, but the constant, $$x$$, $$x^2$$, and $$x^3$$ terms must all be available for pairing with terms from $$(10x + 3)$$."}];
const SK='harry_p2_may2024_v2';
let mySet=new Set();
let myCards=[];
function initMySet(){const s=localStorage.getItem(SK+'_myset');if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}rebuildMyCards()}
function rebuildMyCards(){const qm={};DATA.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])})}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}
function renderMeta(){document.getElementById('mp').innerHTML=
  `<div class="mi"><span class="ml">Cards</span><span class="mv">${DATA.length}</span></div>`+
  `<div class="mi"><span class="ml">In Selection</span><span class="mv">${myCards.length}</span></div>`+
  `<div class="mi"><span class="ml">Curation</span><span class="mv">expert-reviewed</span></div>`}
function getCur(){return DATA}
function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    h+=`<div class="cd" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}</div></div></div><div class="a">${fA(c.answer)}<div class="cf"><button class="cpb" onclick="cpC(${i})">📋 Copy card</button></div></div></div>`
  }
  list.innerHTML=h;rr();
}
function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  renderMeta();document.getElementById('sc').textContent=myCards.length+' in My Selection'}
function rr(){if(window.MathJax)MathJax.typesetPromise&&MathJax.typesetPromise([document.getElementById('cl')])}
function selAll(){getCur().forEach(c=>addM(c));renderMeta();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderMeta();renderCards();toast('All deselected')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'	'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function mdEsc(s){return s.replace(/\|/g,'\u007C').replace(/\n/g,' ')}
function buildMd(){let md='| Question | Answer |\n| --- | --- |\n';myCards.forEach(c=>{md+='| '+mdEsc(c.question)+' | '+mdEsc(c.answer)+' |\n'});return md}
function cpTbl(){if(!myCards.length){toast('Empty!');return}navigator.clipboard.writeText(buildMd()).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))}
function _ntbCopy(){return navigator.clipboard.writeText(buildMd()).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})}
// Notion export = client-side clipboard markdown (Notion auto-formats pasted
// tables). Deliberately NO network call — the curated public deck must not embed
// any internal endpoint/private path (allowlist = question+answer only).
function expN(){if(!myCards.length){toast('Empty!');return}_ntbCopy()}
initMySet();
window.addEventListener('load',()=>{renderMeta();renderCards()});
</script>
</body></html>
