s).\n- Step 2: For rotation by any angle, $\\det = 1$. For stretch by factor $k$ in one direction (with the other direction unchanged), $\\det = k$. So if $A$ is a stretch by 3 in the y-direction, $\\det(A) = 3$, and $\\det(BA) = 1 \\times 3 = 3$.\n\n[This property makes computing area scale factors for compositions very quick—no need to multiply the matrices first.]", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "What is the area scale factor when a hexagon of area 5 is transformed by matrix $C = \\begin{pmatrix} -\\frac{\\sqrt{3}}{2} & \\frac{3}{2} \\\\ -\\frac{1}{2} & -\\frac{3\\sqrt{3}}{2} \\end{pmatrix}$? (2 steps)", "answer": "- Step 1: Compute $\\det(C) = (-\\frac{\\sqrt{3}}{2})(-\\frac{3\\sqrt{3}}{2}) - (\\frac{3}{2})(-\\frac{1}{2}) = \\frac{9}{4} + \\frac{3}{4} = \\frac{12}{4} = 3$\n- Step 2: Area scale factor = $|det(C)| = 3$. So the new area = $3 \\times 5 = 15$ square units.\n\n[Alternatively: det(stretch by 3) × det(rotation by 210°) = 3 × 1 = 3.]", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "For the complex number $z = -6 + 8i$, find $\\arg(z)$ in radians to 3 significant figures. (3 steps)", "answer": "- Step 1: Plot on Argand diagram: Re = -6 < 0, Im = 8 > 0. This is Quadrant 2.\n- Step 2: Reference angle $\\alpha = \\arctan(\\frac{|8|}{|-6|}) = \\arctan(\\frac{4}{3}) \\approx 0.9273$ radians.\n- Step 3: In Q2, $\\arg(z) = \\pi - \\alpha \\approx 3.1416 - 0.9273 = 2.2143$. To 3 s.f., this is 2.21 radians.\n\n[Common error: Forgetting to adjust for the quadrant and just writing $\\arctan(4/3)$.]", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In proof by induction for matrix powers, what do you do in Step 1 (base case) when $n=1$? (2 steps)", "answer": "- Step 1: Compute the left-hand side: $A^1 = A$ (the original matrix).\n- Step 2: Compute the right-hand side with $n=1$: if target is $3^{n-1} \\begin{pmatrix} 2n+3 & -n \\\\ 4n & 3-2n \\end{pmatrix}$, then for $n=1$, this is $3^0 \\begin{pmatrix} 5 & -1 \\\\ 4 & 1 \\end{pmatrix} = \\begin{pmatrix} 5 & -1 \\\\ 4 & 1 \\end{pmatrix}$. Verify LHS = RHS.\n\n[This establishes that the formula works for the smallest value. Without this, the induction has no starting point.]", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": true}, {"question": "What is the \"pick p = 1\" trick in roots-of-polynomials questions, and when is it used? (2 steps)", "answer": "- Step 1: When building a quadratic with transformed roots, you often have 3 unknowns ($p, q, r$) in $px^2 + qx + r = 0$ but only 2 equations (sum and product of new roots).\n- Step 2: You're free to choose one value. Setting $p = 1$ gives the standard form $x^2 - Sx + P = 0$. Then multiply through by an integer to clear any fractions.\n\n[Tutor's explanation: \"Because we are free to select one, it will just scale the Q and R accordingly; anyway, you are not losing anything.\"]", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "When finding the second intersection of a normal with a parabola, why is using Vieta's formulas faster than solving the quadratic? (2 steps)", "answer": "- Step 1: If you substitute the normal equation into $y^2 = 4ax$, you get a quadratic in $x$. One root is the point where you drew the normal.\n- Step 2: Let the known point be $x_1$ and the unknown be $x_2$. By Vieta, $x_1 + x_2 = -\\frac{b}{a}$, so $x_2 = -\\frac{b}{a} - x_1$. This avoids the quadratic formula entirely.\n\n[This technique appears in Paper 2 Q2.7 and is much faster than computing $\\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$.]", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "For $f(x) = x^3 - 5x^{1/2} - 4x + 7$, verify there is a root in the interval [0.25, 1] and use linear interpolation once to approximate it. (3 steps)", "answer": "- Step 1: Evaluate at endpoints: $f(0.25) = 0.015625 - 2.5 - 1 + 7 = 3.515625 > 0$. $f(1) = 1 - 5 - 4 + 7 = -1 < 0$. Sign change confirms a root in (0.25, 1).\n- Step 2: Apply linear interpolation formula: $\\alpha \\approx a - \\frac{f(a)(b-a)}{f(b)-f(a)} = 0.25 - \\frac{3.515625 \\times 0.75}{-1 - 3.515625} = 0.25 + 0.5839... = 0.8339...$\n- Step 3: To 3 d.p., $\\alpha \\approx 0.834$.", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "In the context of FP1, what does it mean for a matrix to be singular, and what is the geometric interpretation? (2 steps)", "answer": "- Step 1: A matrix is singular if its determinant equals zero. This means it has no inverse.\n- Step 2: Geometrically, a singular transformation collapses the plane into a line or point (dimension reduction). The area of any region becomes zero. Such transformations cannot be \"undone.\"", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "If asked to prove a matrix is non-singular for all real $k$, what common mistake should you avoid? (1 step)", "answer": "Don't set $\\det(M) = 0$ and solve for $k$ to find the values that make it singular. Instead, show the determinant expression can never be zero by completing the square.\n\n[This is the opposite of what you do when finding $k$ for which a matrix IS singular. The question asks to prove it NEVER is singular.]", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": false}, {"question": "In FP1, what is the typical structure of an 8-10 mark proof by induction question? (1 step)", "answer": "Often there are two parts: (i) matrix power induction (5 marks), (ii) divisibility induction (5 marks). Each follows the 4-step template. Sometimes summation induction appears instead of one of these.\n\n[Induction is guaranteed on every FP1 paper. Master all three types: summation, matrix power, divisibility.]", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "What are the three key formulas for the parabola $y^2 = 4ax$ that are NOT in the formula booklet? (1 step)", "answer": "You must memorize:\n- Normal at $t$: $y + tx = 2at + at^3$\n- Focus: $(a, 0)$\n- Directrix: $x = -a$\n\n[The tangent $ty = x + at^2$ IS in the booklet, but the normal is NOT.]", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "When simplifying $\\frac{6\\lambda}{\\lambda^2 + 16}$ and $\\frac{\\lambda^2 - 8}{\\lambda^2 + 16}$ from the complex division question, what should you notice about the denominator? (1 step)", "answer": "The denominator $\\lambda^2 + 16$ is always positive for all real $\\lambda$ (since $\\lambda^2 \\geq 0$, so $\\lambda^2 + 16 \\geq 16$). This means the sign of $x$ and $y$ depends only on the numerators.\n\n[This property is useful when checking quadrant conditions for argument questions.]", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "In matrix transformation questions, if asked for \"M followed by N\", how do you determine which matrix multiplies which? (1 step)", "answer": "The transformation applied FIRST corresponds to the matrix on the RIGHT. So \"M followed by N\" means apply M first, then N: $N(M\\mathbf{x}) = (NM)\\mathbf{x}$. The overall matrix is $NM$.\n\n[This is a common source of errors. Mnemonic: \"First applied → Rightmost matrix.\"]", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "What is the key formula when dealing with the area of a triangle formed by a line intersecting the axes? (1 step)", "answer": "If a line $y = mx + c$ intersects the x-axis at $(a, 0)$ and y-axis at $(0, b)$, then $a = -c/m$ (if $m \\neq 0$) and $b = c$. The area of the triangle with vertices $(0,0)$, $(a,0)$, $(0,b)$ is $\\frac{1}{2}|a| \\cdot |b|$.\n\n[For the rectangular hyperbola tangent $x + t^2y = 2ct$, the intercepts are $(2ct, 0)$ and $(0, 2c/t)$, giving area $2c^2$.]", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "If you have a cubic $z^3 - 13z^2 + 59z + p = 0$ and are told $z = 3$ is a root, how do you find $p$ and the other roots? (3 steps)", "answer": "- Step 1: Substitute $z = 3$: $27 - 117 + 177 + p = 0 \\Rightarrow p = -87$.\n- Step 2: Factor out $(z-3)$ by polynomial division: $z^3 - 13z^2 + 59z - 87 = (z-3)(z^2 - 10z + 29)$.\n- Step 3: Solve the quadratic: $z = \\frac{10 \\pm \\sqrt{100-116}}{2} = \\frac{10 \\pm \\sqrt{-16}}{2} = 5 \\pm 2i$.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "What is the relationship between the distance formula in the Argand diagram and the modulus of a complex number? (1 step)", "answer": "For points $z_1$ and $z_2$, the distance between them is $|z_1 - z_2|$. The modulus of a complex number represents its distance from the origin: $|z| = \\sqrt{(\\text{Re }z)^2 + (\\text{Im }z)^2}$.", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}], "count": 70}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 35803, "out_tokens": 22516, "reasoning_chars": 4225, "cost_eur": 0.1071, "elapsed_s": 818, "content_chars": 63153}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 35803, "out_tokens": 30988, "reasoning_chars": 9062, "cost_eur": 0.1344, "elapsed_s": 667, "content_chars": 87746}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 35803, "out_tokens": 22001, "reasoning_chars": 2983, "cost_eur": 0.1054, "elapsed_s": 373, "content_chars": 63886}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 33873, "out_tokens": 32336, "reasoning_chars": 66657, "cost_eur": 0.1617, "elapsed_s": 599, "content_chars": 44995}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 33872, "out_tokens": 32768, "reasoning_chars": 65002, "cost_eur": 0.1635, "elapsed_s": 779, "content_chars": 46795}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 33042, "out_tokens": 11090, "reasoning_chars": 1743, "cost_eur": 0.0173, "elapsed_s": 86, "content_chars": 30542}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 33042, "out_tokens": 14580, "reasoning_chars": 976, "cost_eur": 0.0208, "elapsed_s": 116, "content_chars": 45292}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 36742, "out_tokens": 3032, "reasoning_chars": 1948, "cost_eur": 0.0101, "elapsed_s": 69, "content_chars": 8008}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 36742, "out_tokens": 3182, "reasoning_chars": 4087, "cost_eur": 0.0103, "elapsed_s": 68, "content_chars": 7743}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 36742, "out_tokens": 3550, "reasoning_chars": 3539, "cost_eur": 0.0107, "elapsed_s": 83, "content_chars": 8372}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 36742, "out_tokens": 4260, "reasoning_chars": 3720, "cost_eur": 0.0115, "elapsed_s": 88, "content_chars": 9104}}};
const SK='fp1_past_papers';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  fetch('/api/notion',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>r.json()).then(d=>{if(d.url){toast('Done!');window.open(d.url)}else toast('Error: '+(d.error||'?'))}).catch(e=>toast('Error: '+e.message))
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
