xpressions clés :\n- « Allô ? » — utilisé SEULEMENT au téléphone (jamais en face à face)\n- « C'est... » — pour s'identifier : « Allô, c'est Patricia ! »\n- « Je voudrais parler à..., s'il vous plaît. »\n- « Un instant, s'il vous plaît ! » / « Ne quittez pas ! » (ne pas raccrocher)\n- Step 2: Quand on ne comprend pas : « Pardon ? » / « Comment ? » — jamais « Qu'est-ce que tu dis ? » qui est impoli au téléphone.\n\n+ Note culturelle : les Français répondent souvent par leur nom ou entreprise (« Cabinet du docteur Gaillard, bonjour ! »), pas juste « Allô ».", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Dans le dialogue médical, pourquoi la secrétaire dit « C'est urgent ? » et comment la patiente répond-elle si c'est « un peu urgent » ? (2 steps)", "answer": "- Step 1: « C'est urgent ? » est une question fermée (oui/non) — la réponse peut être « Oui, c'est urgent » ou « Un peu, oui ! » ou « Non, pas urgent, c'est pour un contrôle. »\n- Step 2: Dans le dialogue, Colette répond « Un peu, oui ! » — ce qui signifie qu'elle a besoin d'un rendez-vous assez rapide, mais pas une urgence vitale. Cela permet à la secrétaire de proposer un créneau plus tôt.\n\n+ En français médical, on distingue : « urgent » (immédiat), « assez urgent » (dans les jours), « pas urgent » (dans les semaines).", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Comment réserve-t-on un taxi en français ? Mentionnez les informations essentielles à donner. (3 steps)", "answer": "- Step 1: On appelle et on dit : « Je voudrais réserver un taxi pour aller à l'aéroport, s'il vous plaît. »\n- Step 2: La standardiste demande : « Pour quel jour et pour quelle heure ? » — il faut répondre avec le jour et l'heure (système officiel).\n- Step 3: Autres informations nécessaires : l'adresse de prise en charge (« 67, avenue Jean-Jaurès ») et le numéro de téléphone. En retour, on reçoit un « numéro de réservation » (ex. : J 68 93).\n\n+ Exemple du dialogue : « Pour samedi 31, à 6 heures. » — notez qu'on dit « à 6 heures du matin » pour clarifier (car 6h00 vs 18h00).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Dans le dialogue du taxi, pourquoi la standardiste demande-t-elle « À 6 heures ou à 18 heures ? » ? Quel est le risque si on ne précise pas ? (2 steps)", "answer": "- Step 1: Parce que « 6 heures » seul est ambigu — ça peut être 6h du matin (6:00) ou 18h (6h du soir). En français, sans précision, il y a confusion possible.\n- Step 2: Le client répond « À 6 heures du matin ! J'ai un vol pour Budapest à 7 heures 50. » — il a précisé « du matin » pour éviter tout malentendu. C'est crucial pour un vol !\n\n+ Conseil : en cas de doute, toujours préciser « du matin » / « de l'après-midi » / « du soir ».", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Conjuguez le verbe « être » au présent à toutes les personnes. (2 steps)", "answer": "- Step 1: **Affirmatif** : je **suis**, tu **es**, il/elle/on **est**, nous **sommes**, vous **êtes**, ils/elles **sont**.\n- Step 2: Mémorisez avec des phrases utiles : « Je suis là. » « Tu es libre ? » « Elle est en réunion. » « Nous sommes lundi. » « Vous êtes en retard. » « Ils sont à Paris. »\n\n+ Les formes « nous sommes » et « ils/elles sont » sont souvent confondues — attention à la pronunciation : [sɔm] vs [sɔ̃].", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Comment former la forme négative du verbe « être » ? Donnez trois exemples à différentes personnes. (2 steps)", "answer": "- Step 1: La négation se forme avec **ne + verbe + pas** : je **ne suis pas**, tu **n'es pas**, il/elle/on **n'est pas**, nous **ne sommes pas**, vous **n'êtes pas**, ils/elles **ne sont pas**.\n- Step 2: Exemples :\n- « Non, je ne suis pas là demain. »\n- « Elle n'est pas libre, elle est en réunion. »\n- « Nous ne sommes pas en vacances. »\n\n+ Notez l'élision : « n'est », « n'es » — le « e » de « ne » disparaît devant une voyelle.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Quelle est la règle d'accord quand on utilise « être » + adjectif ? Donnez un exemple au masculin et un au féminin. (2 steps)", "answer": "- Step 1: Avec « être », l'adjectif s'accorde avec le sujet (masculin/féminin, singulier/pluriel) : « Il **est** pérdant**u**. » / « Elle **est** pérdant**e**. » / « Ils **sont** perdida**s**. » / « Elles **sont** perdida**es**. »\n- Step 2: Exemples du chapitre : « La réunion **est** importante. » (féminin singulier) ; « Ils **sont** en retard. » (masculin pluriel) ; « Elle **est** désolée. » (féminin singulier).\n\n+ Rappel : les adjectifs en français se terminent souvent par -e au féminin, et -s au pluriel.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Mettez à la forme négative : « Elle est là demain. » / « Ils sont occupés. » / « C'est urgent. » (3 steps)", "answer": "- Step 1: « Elle est là demain. » → « Elle n'est pas là demain. »\n- Step 2: « Ils sont occupés. » → « Ils ne sont pas occupés. » (l'adjectif reste au masculin pluriel)\n- Step 3: « C'est urgent. » → « Ce n'est pas urgent. » (avec « ce » → « ce n'est pas »)\n\n+ Rappel : avec « c'est », la négation est « ce n'est pas » (pas « c'est pas » — incorrect en français formel).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Comment pose-t-on une question avec « être » pour obtenir une的信息 sur un nom ou une date ? Donnez 4 exemples avec « quel/quelle ». (3 steps)", "answer": "- Step 1: Les questions avec « être » utilisent les adjectifs interrogatifs qui s'accordent :\n- **Quel** (m. sg.) : « **Quel** est votre numéro de téléphone ? »\n- **Quelle** (f. sg.) : « **Quelle** est votre adresse ? »\n- **Quels** (m. pl.) : « **Quels** sont les clients importants ? »\n- **Quelles** (f. pl.) : « **Quelles** sont les réunions importantes ? »\n- Step 2: Notez que « quel » est SUJET de la phrase, donc le verbe s'accorde avec le sujet réel (votre numéro, votre adresse, etc.).\n- Step 3: Ces questions servent à obtenir une information précise — il faut répondre par un nom ou une liste.\n\n+ Erreur fréquente : dire « Quel est tes coordonnées ? » au lieu de « Quelles sont tes coordonnées ? » (coordonnées est toujours pluriel).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Quelle est la différence entre « Quel est... ? » et « C'est... ? » pour poser une question ? (2 steps)", "answer": "- Step 1: « Quel est votre numéro ? » → on attend un nom comme réponse (« C'est le 06... ») — la question porte sur le SUJET.\n- Step 2: « C'est urgent ? » → on attend « oui » ou « non » — c'est une question fermée sur une affirmation.\n\n+ Dans la pratique, « Quel est votre numéro ? » et « C'est quoi votre numéro ? » sont interchangeables à l'oral, mais « quel est » est plus formel.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": true}, {"question": "Utilisez « c'est » + adjectif pour décrire : something important / something not urgent / something perfect. (2 steps)", "answer": "- Step 1: **Affirmatif** : « C'est urgent ! » / « C'est parfait ! » / « C'est important ! »\n- Step 2: **Négatif** : « Ce n'est pas urgent. » / « Ce n'est pas grave. » / « Ce n'est pas parfait. »\n\n+ Notez que « c'est » au singulier prend TOUJOURS l'adjectif au masculin singulier. On ne dit jamais « c'est urgente » — incorrect.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Pourquoi dit-on « C'est urgent » et non « Il est urgent » dans le dialogue médical ? (2 steps)", "answer": "- Step 1: « C'est urgent » = description générale d'une situation (« c'est » + adjectif =评价 générale). « Il est urgent » = il (la personne/le patient) est urgent — ça ne s'utilise pas vraiment.\n- Step 2: La règle : pour caractériser qqchose de manière générale (un événement, une situation), on utilise « c'est + adjectif ». Pour caractériser une personne, on utilise « il/elle est + adjectif » : « Le patient est urgent » (mais ça sonne bizarre, on dirait plutôt « le patient a besoin d'être vu rapidement »).\n\n+ Autres exemples : « C'est parfait ! » (la situation) vs « Elle est parfaite ! » (la personne).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Quelle est la structure de « je voudrais + infinitif » ? Donnez 3 exemples de demandes polies. (2 steps)", "answer": "- Step 1: « Je voudrais + infinitif » est une forme polie pour exprimer un désir ou une demande. L'infinitif est le verbe qui décrit l'action voulue.\n- Step 2: Exemples du chapitre :\n- « Je voudrais **réserver** un taxi. »\n- « Je voudrais **parler** à Véronique Dumaurier. »\n- « Je voudrais **un rendez-vous** avec le docteur Gaillard. »\n\n+ Variante plus polie encore : « Je voudrais réserver une table, s'il vous plaît. »", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Pourquoi utilise-t-on « je voudrais » plutôt que « je veux » dans les dialogues français ? Donnez un exemple de situation. (2 steps)", "answer": "- Step 1: « Je voudrais » est plus poli et indirect que « je veux » — c'est une forme de politesse qui exprime un désir, pas un ordre. « Je veux » peut sembler impoli ou trop direct.\n- Step 2: Exemple : au lieu de « Je veux un café », on dit « Je voudrais un café, s'il vous plaît. » Au téléphone : « Je voudrais parler à... » plutôt que « Je veux parler à... »\n\n+ Dans les dialogues du chapitre, on voit toujours « je voudrais » — c'est le standard pour les demandes polies en français.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Comment dit-on les nombres suivants en français : 21, 31, 40, 41, 60, 70, 71, 80, 81, 90, 91, 100 ? Expliquez les particularités. (3 steps)", "answer": "- Step 1: Les bases : 21 = **vingt et un** (注意 « et »), 31 = **trente et un**, 40 = **quarante**, 41 = **quarante et un**, 60 = **soixante**.\n- Step 2: 70 = **soixante-dix** (60 + 10), 71 = **soixante et onze** (60 + 11), 80 = **quatre-vingts** (4 × 20), 81 = **quatre-vingt-un**, 90 = **quatre-vingt-dix**, 91 = **quatre-vingt-onze**.\n- Step 3: 100 = **cent** (pas « un cent »). Le système français est basé sur 60 (soixante) et 80 (quatre-vingts) — c'est hérité des Gaulois !\n\n+ Particularités : « et » n'apparaît qu'à 21, 31, 41, 51, 61, 71 — pas à 81, 91.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Pourquoi le nombre 70 pose-t-il souvent problème aux francophones ? Comment dit-on 72, 85, 99 en français ? (2 steps)", "answer": "- Step 1: Car le français utilise un système mixesixagesimal : 70 = 60 + 10 (« soixante-dix »), 71 = 60 + 11 (« soixante et onze »), 72 = 60 + 12 (« soixante-douze »)... jusqu'à 79.\n- Step 2: 72 = soixante-douze, 85 = quatre-vingt-cinq, 99 = quatre-vingt-dix-neuf. Pour 99, c'est littéralement « 4 × 20 + 19 » — quatre-vingt-dix-neuf.\n\n+ Mémo : pour 70-79, think « 60 + X ». Pour 80-99, think « 4 × 20 + X ».", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Lisez ce numéro : 01 45 66 11 27. Comment le prononce-t-on en français ? (2 steps)", "answer": "- Step 1: On lit chaque paire de chiffres séparément : **zéro un**, **quarante-cinq**, **soixante-six**, **onze**, **vingt-sept**.\n- Step 2: Pour les numéros de téléphone français, on dit :\n- 0 = zéro\n- 1 = un (ou « une » mais rare)\n- 2-9 se disent normalement\n- On prononce chaque paire comme un nombre entier (01 = zéro un, pas « zéro-un »).\n\n+ Exemple : 06 00 57 98 75 = « zéro six, zéro zéro, cinquante-sept, quatre-vingt-dix-huit, soixante-quinze ».", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Quelles sont les expressions de politesse entre amis (tu) et entre adultes (vous) ? Donnez 3 paires. (3 steps)", "answer": "- Step 1: **Entre amis (tu)** :\n- « S'il te plaît » (svp en informel)\n- « Excuse-moi ! » / « Pardon ! »\n- « Ce n'est rien ! » / « T'en fais pas ! »\n- Step 2: **Entre adultes/formel (vous)** :\n- « S'il vous plaît »\n- « Excusez-moi, monsieur/madame ! »\n- « Je vous en prie ! » (pour répondre à un merci)\n- Step 3: La réponse à « Merci ! » est « Je vous en prie ! » (pas « De rien » qui est très informel).\n\n+ Différence clé : « s'il te plaît » vs « s'il vous plaît » — l'accord dépend du vouvoiement.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Comment répondre poliment quand quelqu'un s'excuse en français ? Donnez les expressions formelles et informelles. (2 steps)", "answer": "- Step 1: **Formel (vous)** :\n- « Je vous en prie, madame ! » (en réponse à « Merci »)\n- « Ce n'est pas grave ! » (en réponse à « Désolé(e) »)\n- « Je vous en prie, ce n'est rien. »\n- Step 2: **Informel (tu)** :\n- « T'en fais pas ! » / « C'est pas grave ! »\n- « De rien ! » (réponse à merci, très courant entre amis)\n\n+ Dans le dialogue : « — Je suis désolé(e) ! — Ce n'est pas grave ! »", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Dans le dialogue de politesse, Solange demande « Tu es là, demain ? » à Sébastien. Pourquoi utilise-t-elle « tu » et pas « vous » ? (2 steps)", "answer": "- Step 1: Parce que Solange et Sébastien se connaissent probablement bien (collègues, amis). « Tu » est utilisé entre amis, en famille, ou entre connaissances proches. « Vous » serait plus formel avec quelqu'un qu'on ne connaît pas bien ou un supérieur hiérarchique.\n- Step 2: Dans le dialogue, ils utilisent « tu » et « Salut » (informel), ce qui indique une relation décontractée. Si Solange appelait un client, elle utiliserait « vous ».\n\n+ Au travail, le « tu » vs « vous » dépend de la culture d'entreprise — certaines entreprises sont très « tu » d'emblée, d'autres restent « vous » longtemps.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Comment écrit-on et lit-on une adresse française comme « 67, avenue Jean-Jaurès » ? Pourquoi y a-t-il une virgule ? (2 steps)", "answer": "- Step 1: On lit le numéro, puis le type de voie (avenue, rue, boulevard...), puis le nom propre : « soixante-sept, avenue Jean-Jaurès ». La virgule sépare le numéro du nom de la rue.\n- Step 2: Types de voies courants : avenue, rue, boulevard (bd), place, chemin, route. Les noms propres sont toujours capitalisés en français : « avenue Jean-Jaurès », « rue de la République ».\n\n+ Note : on dit « au 67, avenue Jean-Jaurès » pour指示 l'adresse exacte.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Dans le dialogue médical, la patiente dit « Langlois : l-a-n-g-l-o-i-s ». Pourquoi épèle-t-on son nom en français ? (2 steps)", "answer": "- Step 1: Quand on donne son nom au téléphone ou dans un formulaire, on épèle souvent pour éviter les erreurs — surtout les noms étrangers ou complexes. La стандартная méthode est de dire chaque lettre : « L comme Louis, A comme Antoine, N comme Nicolas... »\n- Step 2: Dans ce dialogue, la secrétaire demande « Vous êtes madame... ? » et la patiente donne son nom. Pour les noms avec des lettres potentiellementconfuses (comme « s » vs « x », ou « t » vs « те »), l'épellation est essentielle.\n\n+ En français, on épelle parfois avec des noms de villes : « A comme Athènes », « B comme Bordeaux », etc.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Quelles sont les formules de politesse pour un email professionnel en français ? Donnez un exemple complet. (2 steps)", "answer": "- Step 1: Les formules classiques d'un email pro :\n- **Salutation** : « Bonjour, Monsieur / Madame [Nom], »\n- **Corps** : « Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ? »\n- **Formule de politesse** : « Merci d'avance de votre réponse. » (remerciement anticipé)\n- **Signature** : « Cordialement, » / « Bien cordialement, » / « Salutations distinguées, »\n- Step 2: Ces formules sont standard en français professionnel — jamais « Bises » ou « À plus » dans un contexte formel.\n\n+ Le ton reste poli et formel : « Merci d'avance » est très courant, pas « Merci d'avance de votre réponse » (redondant mais accepté).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Comment dire « See you later » au téléphone en français ? Donnez 2 expressions équivalentes. (2 steps)", "answer": "- Step 1: Les expressions pour « à plus tard » au téléphone :\n- « À tout à l'heure ! » (dans quelques heures, même jour)\n- « À bientôt ! » (bientôt, indéterminé)\n- « À plus tard ! » (très informel, entre amis)\n- Step 2: Dans le dialogue, Véronique dit « À tout à l'heure, Matthieu ! » car ils ont rendez-vous à 16h, donc quelques heures plus tard.\n\n+ Note : « À tout à l'heure » sous-entend un revoir dans la journée. « À bientôt » peut être dans quelques jours.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Dans le dialogue du bureau, Sébastien dit « Philippe est là aujourd'hui, mais il est en réunion. » Quel temps verbal est utilisé et pourquoi ? (2 steps)", "answer": "- Step 1: C'est le **présent de l'indicatif** (« est », « est »). En français, on utilise souvent le présent pour parler d'un fait actuel ou d'un planning futur proche — c'est le « présent pour le futur » (present for future).\n- Step 2: « Philippe est là aujourd'hui » = fait actuel. « Demain, il n'est pas libre » = planning futur proche (même verbe au présent). En français, le présent peut描述 un计划 très proche (aujourd'hui, demain, ce soir).\n\n+ C'est une différence avec l'anglais qui utiliserait « will be » ou « is going to be » — le français utilise souvent le présent tout simplement.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "Pourquoi la standardiste dit-elle « Un instant, ne quittez pas ! » et non « Attendez » ? (2 steps)", "answer": "- Step 1: « Ne quittez pas ! » est une expression figée qui signifie « ne raccrochez pas, restez en ligne ». C'est la politesse professionnelle standard.\n- Step 2: « Attendez » peut sembler trop direct ou même impoli au téléphone. Les alternatives polies : « Un instant, s'il vous plaît », « Ne quittez pas, je vous prie », ou « Veuillez patienter, s'il vous plaît. »\n\n+ Au téléphone français, on utilise rarement « attends » ou « attendez » seul — c'est perçu comme un peu brutal.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Comment la réceptionniste du cabinet médical demande-t-elle le nom de la patiente ? Comment la patiente donne-t-elle son nom ? (2 steps)", "answer": "- Step 1: La question : « Vous êtes madame... ? » — on utilise « Madame/Mademoiselle/Monsieur » pour demander poliment l'identité.\n- Step 2: La réponse : « Langlois. » ou « Langlois, L-A-N-G-L-O-I-S. » — on peut épeler pour éviter les erreurs, surtout au téléphone où les sons se ressemblent.\n\n+ Notons que la réponse est souvent donnée sans « je m'appelle » dans un contexte formel — c'est plus direct et efficace.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Quelle est la différence entre « nous sommes » (jour de la semaine) et « je suis » (état) dans les expressions du chapitre ? (2 steps)", "answer": "- Step 1: « Nous sommes + jour » = « It's + day » en anglais. Ex. : « Nous sommes samedi. » C'est la façon française de dire quel jour on est.\n- Step 2: « Je suis + adjectif/état » = « I am + adjective/state ». Ex. : « Je suis désolé. » / « Je suis en réunion. » / « Je suis libre. »\n\n+ Attention : on dit « Nous sommes combien aujourd'hui ? » (What day is it today?), pas « Quel jour sommes-nous ? » est plus poli/formel.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Dans le dialogue du taxi, le client donne son numéro de réservation « J 68 93 ». Comment ce numéro est-il structuré ? Pourquoi commence-t-il par une lettre ? (2 steps)", "answer": "- Step 1: Les numéros de réservation en taxi commencent souvent par une lettre (J, A, V...) pour identifier la catégorie ou la région du service. Ici, « J 68 93 » = une lettre + 4 chiffres.\n- Step 2: Cette lettre peut indiquer : la ville, le type de service (J = parfois pour les courses spéciales), ou simplement un code interne de l'entreprise.\n\n+ C'est similaire aux numéros de vol ou de réservation bancaire — la lettre donne une信息 rapide sur le type de réservation.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Quand utilise-t-on « allô » et quand utilise-t-on « bonjour » au téléphone ? Donnez un exemple de chaque. (2 steps)", "answer": "- Step 1: « Allô ? » = réponse au téléphone quand on décroche, pour demander « who is this? ». ONLY au téléphone. On ne dit jamais « allô » en face à face.\n- Step 2: « Bonjour + [nom/entreprise] » = salutation initiale. Exemples :\n- « Allô ? C'est Patricia ! »\n- « Entreprise Béraut, bonjour. » (standardiste répond par le nom de l'entreprise + bonjour)\n- « Cabinet du доктора Gaillard, bonjour ! »\n\n+ « Allô » peut aussi être utilisé comme打招呼 quand on reconnaît la voix de l'interlocuteur.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Comment répondre poliment à une demande de rendez-vous médical ? La secretary propose « mercredi à 12 heures » et la patiente accepte. (2 steps)", "answer": "- Step 1: La réponse positive : « D'accord, c'est parfait ! » / « Oui, ça me va. » / « Merci, à mercredi. »\n- Step 2: Si ça ne convient pas, on peut négocier : « Non, je ne suis pas libre à cette heure-là. Est-ce que vous avez quelque chose à... ? » Dans le dialogue, Colette accepte : « D'accord, oui, mercredi à midi, c'est parfait. »\n\n+ Noter que « Wednesday à midi » = 12h00, car c'est le système officiel.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Quelles sont les expressions pour accepter ou refuser poliment une proposition en français ? Donnez 3 exemples. (2 steps)", "answer": "- Step 1: **Accepter** :\n- « D'accord ! » / « Oui, ça me va. »\n- « C'est parfait ! » / « Ça me convient. »\n- Step 2: **Refuser poliment** :\n- « Non, désolée, je ne suis pas libre. »\n- « Je suis désolée, je ne peux pas. » / « Je suis malheureusement occupé(e). »\n\n+ Dans le dialogue : « — Tu es là, demain ? — Non, je suis désolée, demain je ne suis pas libre... »", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Donnez la forme négative de ces phrases :\n1. « Elle est là. »\n2. « Nous sommes en retard. »\n3. « Ils sont occupés. »\n4. « C'est grave. » (2 steps)", "answer": "- Step 1:\n1. « Elle n'est pas là. »\n2. « Nous ne sommes pas en retard. »\n3. « Ils ne sont pas occupés. »\n- Step 2:\n4. « Ce n'est pas grave. » (note : « c'est » → « ce n'est pas »)\n\n+ Rappel : pour « être », la négation est « ne... pas » avec élision du « e » devant une voyelle.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Transformez ces questions ouvertes en questions fermées (oui/non) :\n1. « Quel jour sommes-nous ? »\n2. « Quelle heure est-il ? »\n3. « Est-ce qu'il est là ? » (2 steps)", "answer": "- Step 1:\n1. « Est-ce que nous sommes samedi ? » / « On est samedi ? » (plus oral)\n2. « Est-ce qu'il est 7 heures ? » / « Il est 7 heures ? »\n- Step 2:\n3. La question 3 est déjà fermée (elle attend « oui » ou « non ») — on peut aussi dire « Il est là ? » ou « Il est là, demain ? »\n\n+ En français oral, les questions fermées perdent souvent « est-ce que » : « Tu es libre ? » « C'est urgent ? »", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Comment dit-on « I'm sorry, I can't make it » (je suis en retard) au téléphone en français ? Donnez la phrase exacte du dialogue. (2 steps)", "answer": "- Step 1: La phrase dans le dialogue : « Nous avons rendez-vous à 16 heures, mais j'ai un petit problème, je suis en retard, je suis désolé. »\n- Step 2: Pour s'excuser au téléphone, on peut dire :\n- « Je suis désolé(e), je suis en retard. »\n- « Excusez-moi pour le retard. »\n- « Je ne peux pas venir à l'heure, désolé(e). »\n\n+ « Je suis désolé » = I'm sorry (excuse). En français, « désolé » s'accorde : désolé (m), désolée (f).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Dans le contexte professionnel français, quelle est la différence entre « en déplacement » et « en voyage » ? (2 steps)", "answer": "- Step 1: **En déplacement** = voyage d'affaires, déplacement professionnel (chez des clients, dans une autre ville pour le travail). « Philippe est en déplacement à Dijon, chez des clients. »\n- Step 2: **En voyage** = vacances ou déplacement personnel (rarement utilisé dans un contexte professionnel, plutôt « en vacances »). « En vacances » = holidays.\n\n+ Dans le dialogue, on dit « en déplacement » pour le travail, et « en voyage » pourrait sonner comme des vacances.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Pourquoi le standardiste de l'entreprise répond-il « Entreprise Béraut, bonjour » et non juste « Allô » ? (2 steps)", "answer": "- Step 1: C'est la norme professionnelle française : répondre en donnant le nom de l'entreprise (ou le service), puis « bonjour » — ainsi l'appelant sait qu'il a composé le bon numéro.\n- Step 2: Cela permet aussi d'identifier immédiatement le contexte et de diriger l'appel vers le bon service. C'est une politesse professionnelle standard.\n\n+ Autres exemples : « Cabinet du доктора Gaillard, bonjour ! » / « Taxis verts, bonjour ! »", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Dans un email professionnel, comment formuler une proposition d'horaire ? Donnez un exemple. (2 steps)", "answer": "- Step 1: On utilise souvent « Est-ce que + conditionnel » ou « Est-ce que + futur proche » :\n- « Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ? »\n- « Mardi à 9h30, ça vous va ? » / « Mardi à 9h30, ça vous convient ? »\n- Step 2: Pour accepter : « Mardi à 9h30, ça me va très bien. » / « Oui, ça me convient. »\n\n+ Ces formulations sont polies et laisse de la flexibilité à l'interlocuteur.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Comment la cliente accepte-t-elle l'heure proposée dans le dialogue médical ? Quelle expression utilise-t-elle ? (2 steps)", "answer": "- Step 1: « D'accord, oui, Wednesday à midi, c'est parfait. » Elle utilise « D'accord » (OK), puis confirme avec « c'est parfait » (it's perfect).\n- Step 2: On peut aussi accepter avec :\n- « Oui, ça me va. »\n- « Oui, ça me convient. »\n- « Parfait ! »\n\n+ Noter que la cliente comprend « midi » (12h00) après clarification de la standardiste.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Quelle est la différence entre « je ne suis pas libre » et « je suis occupé » en contexte professionnel ? (2 steps)", "answer": "- Step 1: Les deux signifient « unavailable », mais :\n- **« Je ne suis pas libre »** = je n'ai pas de temps, je suis pris(e) — peut être pour travail ou raisons personnelles. Plus poli.\n- **« Je suis occupé »** = je suis en train de faire qqchose — sonne plus occupé, moins diplomatique si dit trop souvent.\n- Step 2: Dans le dialogue, Solange dit « Non, je suis désolée, demain, je ne suis pas libre, je suis en déplacement. » — elle utilise « pas libre » car c'est plus doux que « occupée ».\n\n+ Pour refuser poliment, combinez : « Je suis désolée, je ne suis pas libre ce jour-là. »", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Pourquoi le nombre 81 se dit-il « quatre-vingt-un » et non « huitante-un » en français standard ? (2 steps)", "answer": "- Step 1: Le système français de numération est historique : il utilise la base 20 (vigesimal) pour 80 et au-delà. « Quatre-vingts » = 4 × 20. Donc 81 = 4 × 20 + 1 = « quatre-vingt-un ».\n- Step 2: Certaines régions (Suisse romande, Belgique) utilisent « huitante » pour 80 et « nonante » pour 90 — c'est différent du français de France. En France métropolitaine, c'est toujours « quatre-vingts » et « quatre-vingt-dix ».\n\n+ C'est un point de diversité régionale — le système français standard peut sembler complexe, mais c'est la norme dans la majorité des pays francophones.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Dans le dialogue du taxi, pourquoi le client précise-t-il « J'ai un vol pour Budapest à 7 heures 50 » ? Pourquoi cette信息 est-elle importante ? (2 steps)", "answer": "- Step 1: Car il doit arriver à l'aéroport AVANT son vol — il faut du temps pour y aller. Si le vol est à 7h50, il veut partir tôt pour être à l'aéroport vers 7h00-7h15.\n- Step 2: La standardiste doit connaître l'heure du vol pour calculer l'heure de prise en charge. « 6 heures du matin » (6h00) permet d'arriver à temps.\n\n+ C'est un exemple typique de raisonnement en français : on calcule à l'envers (vol à 7h50 → taxi à 6h00 → arrive à l'aéroport ~7h00).", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": true}, {"question": "Dans le dialogue de bureau, Sébastien explique le planning de Philippe. Résumez où sera Philippe aujourd'hui, demain, et samedi. (2 steps)", "answer": "- Step 1: **Aujourd'hui** : Philippe est là (dans le bureau), mais il est en réunion.\n- Step 2: **Demain** : Il n'est pas libre — il est en rendez-vous. L'après-midi, il est à Dijon, chez des clients.\n- **Samedi** : Il est à Budapest.\n\n+ On voit l'utilisation du présent pour décrire un planning futur : « demain, il n'est pas libre » (present pour le futur).", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "Pourquoi dit-on « Nous avons rendez-vous à 16 heures » plutôt que « Je'ai un rendez-vous à 16 heures » ? (2 steps)", "answer": "- Step 1: « Nous avons rendez-vous » = « We have an appointment » — le « nous » inclut les deux personnes concernées (Matthieu et Véronique). C'est plus naturel en français quand on parle d'un rendez-vous mutuel.\n- Step 2: On peut aussi dire « J'ai rendez-vous à 16 heures » (sans article) pour exprimer qu'on a un rendez-vous prévu. Noter que « rendez-vous » est invariable (toujours « un/des rendez-vous »).\n\n+ La forme « j'ai un rendez-vous » est aussi correcte, mais « nous avons rendez-vous » met l'accent sur le fait que les deux personnes sont concernées.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Comment la réceptionniste confirme-t-elle le rendez-vous médical ? Quelle expression utilise-t-elle ? (2 steps)", "answer": "- Step 1: Elle dit : « C'est noté, madame Langlois, mercredi à 12 heures. » L'expression clé est « C'est noté ! » (= It's noted / recorded).\n- Step 2: Pour confirmer, on peut aussi dire :\n- « C'est confirmé. »\n- « Votre rendez-vous est enregistré. »\n- « Très bien, à mercredi ! »\n\n+ « C'est noté » est une expression très courante en français professionnel pour confirmer une information.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Donnez 3 expressions pour répondre au téléphone de manière informelle en français. (2 steps)", "answer": "- Step 1: **Entre amis/famille** :\n- « Allô ? » (le plus courant)\n- « Oui, allô ? »\n- « C'est moi ! » (en décrochant, pour dire que c'est bien moi)\n- Step 2: **Plus formel (professionnel)** :\n- « [Nom de l'entreprise], bonjour ! »\n- « [Nom], j'écoute. » (je suis à l'écoute = I'm listening)\n- « Oui, allô, qui est à l'appareil ? » (qui est-ce ?)\n\n+ « Allô ? » est universel mais très informel — dans un contexte pro, on utilise le nom de l'entreprise ou du service.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "Quel est le registre de langue approprié pour chaque situation :\n1. Demander un café au café\n2. Réserver un taxi\n3. Appeler un ami (3 steps)", "answer": "- Step 1: **Au café** : registre semi-formel à formel — « Je voudrais un café, s'il vous plaît. » On utilise « vous » et « voudrais ».\n- Step 2: **Réserver un taxi** : registre formel — même structure, politesse standard avec « s'il vous plaît », informations complètes (adresse, heure).\n- Step 3: **Appeler un ami** : registre informel — « Salut ! Tu es là, demain ? » / « Tu veux aller au cinéma ? » On utilise « tu » et des phrases courtes.\n\n+ Le registre change selon la relation (tu/vous) et le contexte (public/privé).", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "Dans le dialogue médical, la patiente demande « Pardon ? À deux heures ? »Pourquoi répète-t-elle l'heure ? (2 steps)", "answer": "- Step 1: Car elle n'a pas bien compris — elle a entendu « deux heures » (2h00) au lieu de « douze heures » (midi). Elle demande donc confirmation poliment.\n- Step 2: « Pardon ? » est une expression pour demander de répéter quand on n'a pas bien compris. C'est plus poli que « Comment ? » ou « Quoi ? »\n\n+ La réponse de la standardiste est alors « Non, à douze heures ! À midi ! » — elle reformule et utilise un synonym (midi) pourClarifier.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "Quelle est la structure d'une phrase avec « je voudrais + infinitif » ? Peut-on mettre deux verbes à la suite ? (2 steps)", "answer": "- Step 1: La structure est : **je voudrais + verbe à l'infinitif**. « Je voudrais parler », « Je voudrais réserver », « Je voudrais manger ».\n- Step 2: Oui, on peut enchaîner les infinitifs : « Je voudrais réserver un taxi et aller à l'aéroport. » Mais si on veut une liste d'actions, on utilise souvent « je voudrais + infinitif1 + et + infinitif2 ».\n\n+ Exemple : « Je voudrais changer l'heure de mon rendez-vous. » (changer = infinitif après voudrais)", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "Comment la politesse française diffère-t-elle de l'anglais dans les demandes au téléphone ? Donnez un exemple du dialogue. (2 steps)", "answer": "- Step 1: En français, on utilise beaucoup plus de formules de politesse : « s'il vous plaît », « je voudrais », « un instant », « ne quittez pas ». En anglais, on peut être plus direct (« I want to speak to... »).\n- Step 2: Exemple du dialogue : « Je voudrais parler à Véronique Dumaurier, s'il vous plaît. » / « Un instant, ne quittez pas ! » / « Merci, au revoir ! »\n\n+ La politesse française demande plus de particules (« s'il vous plaît », « je vous en prie ») et une formulation indirecte (« je voudrais » plutôt que « je veux »).", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "Dans les expressions de politesse, quelle est la différence entre « Excusez-moi » et « Pardon » ? (2 steps)", "answer": "- Step 1: **Excusez-moi** = je vous demande pardon pour une faute ou un dérangement (excuse me). Plus formel.\n- Step 2: **Pardon** = excusez-moi pour une petite erreur ou pour attirer l'attention. Plus informel. Dans le dialogue médical, « Pardon ? » signifie « Qu'est-ce que vous avez dit ? » — on demande de répéter.\n\n+ En français, « Pardon » peut aussi signifier « je suis désolé » dans un contexte d'excuse.", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": true}, {"question": "Comment responder à « Merci ! » de manière polie en français ? Donnez 2 expressions formelles et 2 informelles. (2 steps)", "answer": "- Step 1: **Formel** :\n- « Je vous en prie ! »\n- « De rien, monsieur/madame. » (un peu moins formel)\n- **Informel** :\n- « De rien ! »\n- « Pas de quoi ! » / « C'est rien ! »\n- Step 2: « Je vous en prie » est la réponse la plus polie et la plus utilisée dans un contexte formel.\n\n+ Au téléphone professionnel, on utilise quasi exclusivement « Je vous en prie ! » en réponse à « Merci ! ».", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "Dans le dialogue du taxi, pourquoi le client donne-t-il son numéro de téléphone ? Est-ce toujours nécessaire ? (2 steps)", "answer": "- Step 1: Car la compagnie de taxi peut avoir besoin de le contacter en cas de retard, de changement, ou pour confirmer la course. C'est une pratique standard pour les réservations.\n- Step 2: Oui, c'est presque toujours nécessaire pour une réservation de taxi ou de service à domicile — cela permet la confirmation et le suivi.\n\n+ Le numéro est donné sous forme de « C'est le 06... » — le « le » est obligatoire devant un numéro de téléphone en français.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "Quand utilise-t-on « allô » et quand utilise-t-on « bonjour » au téléphone ? Donnez un exemple de phrase complète pour chaque. (2 steps)", "answer": "- Step 1: **Allô** = pour répondre au téléphone et demander qui est à l'appareil (souvent avec un ton montant). « Allô, c'est qui ? » / « Allô, oui ? »\n- Step 2: **Bonjour** = salutation initiale au téléphone (souvent combiné avec le nom). « Entreprise Béraut, bonjour ! » / « Cabinet du доктора Gaillard, bonjour ! » On peut ensuite dire « Allô ? » si on ne reconnaît pas la voix.\n\n+ En pratique, beaucoup de Français répondent par « Allô ? » tout court — c'est très courant.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "Donnez la forme négative de ces phrases avec « être » :\n1. « Elle est en réunion. »\n2. « Nous sommes à Paris. »\n3. « Ils sont disponibles. » (2 steps)", "answer": "- Step 1:\n1. « Elle n'est pas en réunion. »\n2. « Nous ne sommes pas à Paris. »\n- Step 2:\n3. « Ils ne sont pas disponibles. »\n\n+ Rappel : la négation « ne... pas » entoure toujours le verbe « être » — pas de changement de préposition.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "Quelle est la différence entre « Quel » et « Quelle » ? Donnez un exemple pour un numéro et une adresse. (2 steps)", "answer": "- Step 1: **Quel** (masculin singulier) → « Quel est votre numéro de téléphone ? » / « Quel jour sommes-nous ? »\n- Step 2: **Quelle** (féminin singulier) → « Quelle est votre adresse ? » / « Quelle heure est-il ? »\n\n+ L'accord se fait avec le nom qui suit : « numéro » (masc.) → « quel » ; « adresse » (fém.) → « quelle ».", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "Dans le dialogue de l'entreprise, pourquoi le standardiste dit-il « Un instant, ne quittez pas ! » ? Quel est le but de cette phrase ? (2 steps)", "answer": "- Step 1: Car il doit-transfertl'appel à Véronique Dumaurier. Il demande à l'appelant de rester en ligne (ne pas raccrocher) pendant qu'il fait le transfert.\n- Step 2: C'est une politesse professionnelle — on indique à l'appelant ce qu'on va faire (« je vous mets en attente ») et on lui demande de patienter.\n\n+ En français, « ne quittez pas » est l'équivalent de l'anglais « hold on, please ».", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "Dans le dialogue du cabinet médical, la patiente doit-elle confirmer son rendez-vous ? Comment ? (2 steps)", "answer": "- Step 1: Non, la réceptionniste confirme le rendez-vous pour elle : « C'est noté, madame Langlois, mercredi à 12 heures. »\n- Step 2: La patiente confirme en acceptant : « D'accord, oui, Wednesday à midi, c'est parfait. » Elle n'a pas besoin de répéter tous les détails, juste confirmer que ça lui convient.\n\n+ La confirmation est importante pour éviter les malentendus — en France, on confirme toujours un rendez-vous.", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "Quelle est la structure de politesse la plus élevée pour faire une demande en français ? Donnez un exemple complet. (2 steps)", "answer": "- Step 1: La structure la plus polie combine :\n- « Je voudrais + infinitif »\n- « s'il vous plaît »\n- Formule de politesse tambahan (« Excusez-moi de vous déranger, ... »)\n- Step 2: Exemple complet : « Excusez-moi, je voudrais réserver un taxi pour demain matin à 7 heures, s'il vous plaît. » / « Je voudrais parler à Monsieur Dupont, s'il vous plaît. »\n\n+ Le niveau de politesse monte avec chaque élément ajouté.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "Dans le contexte professionnel, comment décrire le planning d'un collègue ? Donnez un exemple avec « être » au présent. (2 steps)", "answer": "- Step 1: On utilise « être » + état/lieu pour décrire où quelqu'un se trouve ou ce qu'il fait :\n- « Philippe est là aujourd'hui, mais il est en réunion. »\n- « Demain, il n'est pas libre, il est en rendez-vous. »\n- « Samedi, il est à Budapest. »\n- Step 2: C'est la structure standard : **[Personne] + être + [état/lieu]**.\n\n+ On peut aussi utiliser « a + nom » pour les activités : « Il a une réunion à 14h. »", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}], "count": 70}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "How do you say \"What day is it today?\" and \"What day is it tomorrow?\" in French? (2 steps)", "answer": "- Step 1: The question \"What day is it today?\" is « Quel jour sommes-nous, aujourd'hui ? » — the verb « sommes-nous » literally means \"are we\" (from être), because days of the week work with \"we are\" in French.\n- Step 2: The answer uses « nous sommes » (we are): « Aujourd'hui, nous sommes samedi. Demain, c'est dimanche. » Notice that days of the week in French are NOT capitalized.\n\n+ Note: The response uses « c'est » for tomorrow because you're stating a single fact about a day, not describing an ongoing state.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "List all seven days of the week in French, then explain how the weekend days are grouped. (2 steps)", "answer": "- Step 1: The seven days are: lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche. Notice that in French, days of the week are NOT capitalized (unlike in English).\n- Step 2: Saturday and Sunday together are called « le week-end » (the weekend). The question \"What day is it today?\" literally translates as \"Which day are we [on], today?\" — showing that French treats days as a collective \"we.\"\n\n+ Common mistake: Don't capitalize « lundi » or « mardi » in French writing — only proper nouns and the first word of a sentence get capitals.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "In the official time system (trains, flights, appointments), how do you say 7:30 AM and 6:45 PM in French? (2 steps)", "answer": "- Step 1: The official system uses the 24-hour clock. 7:30 AM is « sept heures trente » and 6:45 PM is « dix-huit heures quarante-cinq ».\n- Step 2: Notice that in the official system, you literally say the numbers: 18 h 45 → \"dix-huit heures quarante-cinq.\" This is the system used for train/plane schedules, business appointments, and official meetings.\n\n+ Contrast with familiar system: In casual conversation, you'd say 6:45 PM as « sept heures moins le quart » or 7:30 AM as « sept heures et demie ».", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "How do you say 6:15, 6:30, and 6:40 in the familiar (casual) French time system? (2 steps)", "answer": "- Step 1: 6:15 = « six heures et quart » (a quarter past); 6:30 = « six heures et demie » (half past); 6:40 = « sept heures moins vingt » (twenty to seven).\n- Step 2: The familiar system works like this: minutes 1-29 use \"et\" (and), adding to the hour. Minutes 31-59 subtract from the next hour: 40 = 60 - 20, so \"20 to\" the next hour. Similarly, 6:45 = « sept heures moins le quart » (a quarter to seven).\n\n+ Common confusion: « et demie » vs « et demi » — use « demie » (feminine) because « heure » is feminine: « six heures et demie ». But in « midi et demi » (12:30), « demi » is masculine because it's describing « midi ».", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": true}, {"question": "What does « ne... pas » mean, and where does it go with the verb « être »? Give an example with « je ». (2 steps)", "answer": "- Step 1: « Ne... pas » is the basic way to make a sentence negative in French. It wraps around the verb: « ne + verb + pas ». With « être », you say « je ne suis pas », « tu n'es pas », « il n'est pas », etc.\n- Step 2: Example: « Tu es là, demain ? — Non, je ne suis pas là demain. » Notice that with « je », you keep « je ne suis pas » (the 'e' of « je » doesn't elide before « ne »), but with il/elle/on, you drop the vowel: « il n'est pas ».\n\n+ Elision rule: The 'e' in « je » does NOT elide before « ne », but il/elle/on DO elide: « il n'est pas », « elle n'est pas », « on n'est pas ».", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Conjugate the verb « être » (to be) in the negative form for all six subject pronouns. (2 steps)", "answer": "- Step 1: Negative form = « ne + verb + pas ». For « être »:\n  - je ne suis pas\n  - tu n'es pas\n  - il/elle/on n'est pas\n  - nous ne sommes pas\n  - vous n'êtes pas\n  - ils/elles ne sont pas\n\n- Step 2: Note the elision patterns: « tu n'es pas » (not « tu ne es pas »), « il n'est pas », « elle n'est pas », « on n'est pas ». The pronouns nous/vous/ils/elles do NOT elide because they end in consonants.\n\n+ Misconception check: Don't say « je ne suis pas » as two separate words — in speech, it flows as one unit. Also, don't forget the 's' in « nous sommes » stays — it's « nous ne sommes pas », not « nous ne sommes pas ».", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Explain the pattern « être + adjective » and how the adjective changes. Give an example with « il est » and « elle est ». (2 steps)", "answer": "- Step 1: When you use « être » + adjective, the adjective must AGREE with the subject in gender and number. This means:\n  - Masculine singular: no ending (ex: « il est urgent »)\n  - Feminine singular: add -e (ex: « elle est urgente »)\n  - Masculine plural: add -s (ex: « ils sont urgents »)\n  - Feminine plural: add -es (ex: « elles sont urgentes »)\n\n- Step 2: Example from the chapter: « Il est urgent. » (masculine) → « La réunion est importante. » (feminine, because « réunion » is feminine). Notice that adjectives after « être » describe the state of the subject.\n\n+ Quick check: « désolé » (masculine) becomes « désolée » for a woman: « Je suis désolé(e). » — the (e) shows the feminine ending that women would add when speaking.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "How do you form a yes/no question with « être » in French? Give three different methods, using « Il est là ? » as an example. (3 steps)", "answer": "- Step 1: Method 1 — Intonation: Simply raise your voice at the end: « Il est là ? » (same word order as statement).\n- Step 2: Method 2 — « Est-ce que + statement »: « Est-ce qu'il est là ? » (adds a question word in front).\n- Step 3: Method 3 — Inversion (formal): « Est-il là ? » (verb comes before subject; requires a hyphen). Inversion is most common in writing or formal speech.\n\n+ Note: In everyday spoken French, « Est-ce que... ? » is the most common question form. Inversion sounds formal: « Est-il là, demain ? » is very formal.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What is the difference between « Quel », « Quelle », « Quels », and « Quelles »? When do you use each? (2 steps)", "answer": "- Step 1: These are interrogative adjectives (like \"what\" or \"which\") that MUST agree with the noun they modify:\n  - « Quel » = masculine singular (Quel numéro ?)\n  - « Quelle » = feminine singular (Quelle adresse ?)\n  - « Quels » = masculine plural (Quels clients ?)\n  - « Quelles » = feminine plural (Quelles réunions ?)\n\n- Step 2: From the chapter: « Quel est votre numéro de téléphone ? » (numéro is masculine) vs « Quelle est votre adresse ? » (adresse is feminine). Notice that after these question words, the verb « être » follows directly: « Quel est... », « Quelle est... », « Quels sont... », « Quelles sont... ».\n\n+ Common mistake: Don't use « quel » before a feminine noun like « adresse » — you must use « quelle ».", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "How do you use « c'est » + adjective? Explain the difference between « C'est urgent ! » and « Ce n'est pas urgent. » (2 steps)", "answer": "- Step 1: « C'est + adjective » is used to describe something with an adjective. Note that in this construction, the adjective is ALWAYS masculine singular (because « ce » = it/this, which is grammatically masculine):\n  - « C'est urgent ! » (It's urgent!)\n  - « C'est parfait. » (It's perfect.)\n  - « C'est grave ? » (Is it serious?)\n\n- Step 2: For the negative, you say « Ce n'est pas + adjective »:\n  - « Ce n'est pas urgent. » (It's not urgent.)\n  - « Ce n'est pas grave. » (It's not a problem / No worries.)\n\n+ Key difference: With « c'est + adjective », the adjective is ALWAYS masculine singular, regardless of what you're describing. Don't add -e for feminine nouns: NOT « c'est urgente » — always « c'est urgent ».", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Explain the pattern « je voudrais + infinitif ». What does « infinitif » mean, and give three examples from the chapter. (2 steps)", "answer": "- Step 1: « Vouloir » in the conditional (« voudrais ») means \"would like.\" When followed by another verb, that verb stays in the INFINITIVE (the base form, like \"to speak,\" \"to reserve\"):\n  - « Je voudrais réserver un taxi. » (I would like to reserve a taxi.)\n  - « Je voudrais être là. » (I would like to be there.)\n  - « Je voudrais changer l'heure de mon rendez-vous. » (I would like to change the time of my appointment.)\n\n- Step 2: The infinitif is the base form of a verb (like « parler », « être », « changer »). After « je voudrais », you NEVER conjugate the second verb — you leave it in its infinitive form.\n\n+ Politeness tip: « Je voudrais... » is more polite than « Je veux... » (I want...). It expresses a polite request, like \"I would like...\"", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "How do you count from 21 to 69 in French? Explain the pattern and give examples. (2 steps)", "answer": "- Step 1: The pattern is straightforward for 21-69:\n  - 21 = « vingt et un » (twenty and one)\n  - 22 = « vingt-deux », 23 = « vingt-trois », etc.\n  - 30 = « trente », 31 = « trente et un », 40 = « quarante », 41 = « quarante et un », 50 = « cinquante », 51 = « cinquante et un », 60 = « soixante », 61 = « soixante et un »\n\n- Step 2: Notice the \"et\" appears only in numbers ending in 1: « vingt et un », « trente et un », « quarante et un », « cinquante et un », « soixante et un ». All other numbers use hyphens: « vingt-deux », « soixante-neuf », etc.\n\n+ Memory trick: Think of French numbers 21-69 as almost exactly like English, just with French words. « Vingt » = 20, « trente » = 30, « quarante » = 40, « cinquante » = 50, « soixante » = 60.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "How do you say 70, 80, 90, and 100 in French? Explain the French numbering system for 70-99. (3 steps)", "answer": "- Step 1: Key numbers:\n  - 70 = « soixante-dix » (60 + 10) — NOT \"seventy\"\n  - 80 = « quatre-vingts » (4 × 20) — NOT \"eighty\"\n  - 90 = « quatre-vingt-dix » (4 × 20 + 10) — NOT \"ninety\"\n  - 100 = « cent » (one hundred)\n\n- Step 2: This system comes from ancient French (vigesimal = base-20 counting). For 71-79: « soixante-et-onze » (60+11), « soixante-douze » (60+12)... « soixante-dix-neuf » (60+19). For 81-99: « quatre-vingt-un », « quatre-vingt-douze »... « quatre-vingt-dix-neuf ».\n\n- Step 3: Special rules:\n  - « quatre-vingts » takes an -s when it's exactly 80 (no number after it)\n  - But: « quatre-vingt-un » (no -s because 1 follows)\n  - 100 = « cent » — NOT « un cent » (don't say \"a hundred\")\n\n+ Misconception: French doesn't have \"seventy\" or \"ninety\" — it uses the base-20 system. 71 = 60 + 11 = « soixante-et-onze », NOT « soixante et onze ».", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the taxi dialogue, Philippe gives his phone number as \"06 00 57 98 75.\" How do you read this number in French? (2 steps)", "answer": "- Step 1: The number is read as: « le zéro six, zéro zéro, cinquante-sept, quatre-vingt-dix-huit, soixante-quinze. » In French, phone numbers are read in pairs (or sometimes individually), like this:\n  - 06 → « zéro six » (or « zéro-six »)\n  - 00 → « zéro zéro »\n  - 57 → « cinquante-sept »\n  - 98 → « quatre-vingt-dix-huit »\n  - 75 → « soixante-quinze »\n\n- Step 2: Notice how phone numbers are typically given as pairs: the area code (06 for mobile), then the rest. In France, mobile numbers start with 06, landlines often start with 01 (Paris area), 02, 03, 04, 05.\n\n+ Contrast: In the dialogue, the secretary asks: « Quel est votre numéro de téléphone ? » and Philippe answers: « C'est le 06 00 57 98 75. » — notice the article « le » before the number.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What does the phrase « Un instant, ne quittez pas ! » mean, and when is it used? (1 step)", "answer": "This phrase means \"One moment, don't hang up!\" It's what a receptionist or switchboard operator says when they need to put you on hold while they transfer your call or find the person you want to speak with. In the enterprise dialogue, the standardiste says this when Matthieu asks to speak to Véronique Dumaurier.\n\n+ Key phrase: « Ne quittez pas » literally means \"don't leave\" — as in \"don't leave the line.\" The full expression reassures the caller that you haven't hung up on them — please wait.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the medical dialogue, Colette says « Un peu, oui ! » in response to « C'est urgent ? » What does this mean, and why is it a polite way to say yes? (1 step)", "answer": "« Un peu, oui ! » means \"A little bit, yes!\" or \"Yes, somewhat!\" It's Colette's way of saying the appointment is somewhat urgent — not an emergency, but she does need to see the doctor reasonably soon. By saying « un peu » (a little), she's being honest but not alarmist. The secretary then offers « Wednesday at 12:00 » — a same-day appointment showing she took the \"urgent\" request seriously.\n\n+ Politeness note: In French, when someone asks « C'est urgent ? », answering just « Oui ! » might sound too direct. Adding « Un peu » softens the answer while still being truthful.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "In the office dialogue, Sébastien says « Philippe est là aujourd'hui, mais il est en réunion. » What does « en réunion » mean, and how does it differ from « il a une réunion »? (2 steps)", "answer": "- Step 1: « En réunion » means \"in a meeting\" — it describes Philippe's current state or activity. It's like saying \"he's in a meeting right now.\"\n- Step 2: The difference: « être en réunion » describes the STATE of being in a meeting (he's currently occupied). « Avoir une réunion » means he HAS a scheduled meeting (an appointment). Both are correct but emphasize different things: state vs. possession/schedule.\n\n+ From the dialogue: « Philippe est là aujourd'hui, mais il est en réunion. » (He's at work today, but he's in a meeting right now — so you can't talk to him.)", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What do the following office states mean: « en déplacement », « en retard », « en avance », « en vacances »? Give a quick mental example for each. (2 steps)", "answer": "- Step 1: These are preposition + noun phrases describing someone's work state:\n  - « en déplacement » = on a business trip / away traveling for work\n  - « en retard » = late (arriving after the expected time: meeting at 9h, arrives at 14h15)\n  - « en avance » = early (arriving before the expected time: meeting at 14h, arrives at 13h45)\n  - « en vacances » = on vacation / on holiday\n\n- Step 2: Examples from the dialogue: « Demain, je ne suis pas libre, je suis en déplacement. » (I'm away on business tomorrow.) And: « Je suis désolé, je suis en retard. » (I'm sorry, I'm late.)\n\n+ Note: « en » always precedes these states. It's NOT « dans un déplacement » or « à des vacances » — it's always « en + noun ».", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is the difference between « Salut ! » and « Bonjour »? When is each appropriate? (2 steps)", "answer": "- Step 1: « Bonjour » is the standard greeting (literally \"good day\") used in most situations — with strangers, in shops, with colleagues, etc. « Salut ! » is informal — used between friends, young people, or people who know each other well.\n- Step 2: « Salut » can ALSO mean \"goodbye\" when parting from friends. So between friends, « Salut ! » can mean either \"hello\" or \"bye\" depending on context. « Bonjour » is never used for goodbye.\n\n+ From the civilisation section: « Salut ! » is listed as an alternative to « bonjour » between friends or young people. It's the informal equivalent and should NOT be used with strangers or in formal situations.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Complete the politeness exchange: Person A says « Excusez-moi, monsieur ! » What does Person B say in response? Then Person A says « Je suis désolé(e), Sylvie ! » What does Person B reply? (2 steps)", "answer": "- Step 1: After « Excusez-moi, monsieur ! », the response is « Je vous en prie, madame ! » or « Je vous en prie ! » This means \"You're welcome\" or \"Don't mention it.\"\n- Step 2: After « Je suis désolé(e), Sylvie ! », the response is « Ce n'est pas grave ! » (It's nothing / No problem / Don't worry about it). Note: « désolé(e) » agrees with the speaker: « désolé » (masculine) or « désolée » (feminine).\n\n+ Key exchanges from the civilisation section:\n  - « Pardon, excusez-moi ! — Je t'en prie ! / Je vous en prie ! »\n  - « Excusez-moi, monsieur ! — Je vous en prie, madame ! »\n  - « Je suis désolé(e), Sylvie ! — Ce n'est pas grave ! »", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In the taxi dialogue, Philippe reserves a taxi for \"samedi 31, à 6 heures\" but the operator asks \"À 6 heures ou à 18 heures?\" Why does the operator need to clarify, and how does Philippe clarify? (2 steps)", "answer": "- Step 1: The operator needs to clarify because Philippe said \"6 heures\" but in French, you need to specify morning vs. evening when using the 12-hour clock. Without clarification, 6:00 could mean 6 AM or 6 PM.\n- Step 2: Philippe clarifies by saying « À 6 heures du matin ! » (At 6 in the morning!) — he adds « du matin » to specify AM. If he meant evening, he'd say « du soir. » The 24-hour clock would also solve this: 6:00 = 6h00, 18:00 = 18h00.\n\n+ Note: In the official time system, « 6 heures » (6:00) would be understood as 6:00 AM, but in casual conversation, ambiguity can occur, which is why the operator asked.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "In the medical dialogue, the secretary asks « Vous êtes madame ? » and Colette answers « Langlois : l-a-n-g-l-o-i-s. » Explain this exchange. (2 steps)", "answer": "- Step 1: « Vous êtes madame ? » is a shortened way of asking \"Are you Mrs. [surname]?\" The secretary wants to confirm Colette's last name before booking the appointment.\n- Step 2: Colette responds by spelling her surname: « Langlois, L-A-N-G-L-O-I-S. » In French, when giving information over the phone, spelling is common because names can be confused. Notice French uses letters: « elle » for E, « ache » for H, « ce » for C, etc. (not English alphabet names).\n\n+ Cultural note: French speakers often spell out names and numbers over the phone to avoid confusion, especially with similar-sounding letters.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "How would you reserve a table at a restaurant in French using « je voudrais »? Create a sentence with: tomorrow, 7:30 PM, 2 people, your name. (2 steps)", "answer": "- Step 1: The pattern is: « Je voudrais + infinitif + [details] ». For a restaurant reservation:\n  - « Je voudrais réserver une table pour demain, à 19 heures [or 7h30 du soir], pour deux personnes, au nom de [Votre nom]. »\n\n- Step 2: Breaking it down:\n  - « Je voudrais réserver une table » = I would like to reserve a table\n  - « pour demain » = for tomorrow\n  - « à 19 heures » = at 7 PM (or « à 19h30 » for 7:30 PM)\n  - « pour deux personnes » = for two people\n  - « au nom de... » = in the name of...\n\n+ Compare to taxi: « Je voudrais réserver un taxi pour aller à l'aéroport. » Same pattern — « je voudrais + verb in infinitive ».", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the office dialogue, Sébastien says « Philippe est là aujourd'hui, mais il est en réunion. Demain, il n'est pas libre, il est en rendez-vous. » What is the difference between « être en réunion » and « être en rendez-vous »? (2 steps)", "answer": "- Step 1: « Être en réunion » means \"to be in a meeting\" — typically a scheduled group meeting with multiple people.\n- Step 2: « Être en rendez-vous » means \"to have an appointment\" — typically a one-on-one meeting, like a client meeting or a doctor's appointment. In the dialogue, Philippe is \"en rendez-vous\" tomorrow because he's visiting clients in Dijon: « demain après-midi, il est à Dijon, chez des clients. »\n\n+ Synonym note: You can also say « avoir un rendez-vous » (to have an appointment), similar to « avoir une réunion ».", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "What does « Ça vous va ? — Oui, ça me va. » mean? Explain the pronouns « vous » and « me ». (2 steps)", "answer": "- Step 1: « Ça vous va ? » means \"Does that work for you?\" or \"Is that okay with you?\" The response « Oui, ça me va. » means \"Yes, that works for me.\"\n- Step 2: The key is pronoun agreement:\n  - « vous » = you (formal singular or plural)\n  - « me » (me) = me (object pronoun)\n  - So: « Ça vous va ? » = \"Does that go to you?\" → \"Does that suit you?\"\n  - « Ça me va » = \"That goes to me\" → \"That suits me\"\n\n+ From the key expressions: « Ça vous va ? — Oui, ça me va. » This is a very common way to check if a time or plan works for someone.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In the email document (page 25), what are the four key formal phrases used? List them and explain when each is used. (2 steps)", "answer": "- Step 1: The four formal email phrases are:\n  1. « Bonjour, Monsieur / Madame » — formal greeting (never \"Hi\" or \"Salut\" in formal emails)\n  2. « Merci d'avance de votre réponse. » — \"Thank you in advance for your reply.\" (polite request)\n  3. « Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ? » — asking about availability\n  4. « Cordialement, » — formal closing (\"Kind regards\")\n\n- Step 2: These phrases show the difference between spoken French (dialogues) and written formal French. Notice « Merci d'avance » is a polite way to nudge someone to respond, and « Cordialement » is a standard business closing (less formal than « Sent sincerely » but appropriate for work emails).\n\n+ Usage: In formal French writing (emails, letters), always start with « Bonjour Monsieur/Madame » and end with « Cordialement » or « Bien cordialement ». Never use « Salut » in formal writing.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Complete with the correct form of « être » (affirmative or negative): « Tu ___ là, demain ? — Non, je ___ pas là demain. » (2 steps)", "answer": "- Step 1: First blank: « Tu es là, demain ? » — simple present affirmative of être with « tu ».\n- Step 2: Second blank: « Non, je ne suis pas là demain. » — negative form with « je ne suis pas ».\n\n+ From the dialogue: « Tu es là, demain ? — Non, je ne suis pas là demain. » This is a classic example of asking about someone's availability using « être » in question form.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Fill in the blank with the correct politeness expression: « ___ ! » can mean both hello and goodbye between friends. (1 step)", "answer": "The answer is « Salut ! » — this informal greeting (or farewell) is used between friends and young people. It can mean either \"hello\" or \"goodbye,\" depending on context. It's the informal equivalent of « bonjour / au revoir ».\n\n+ From the civilisation section: « Salut ! » is listed as « bonjour » OR « au revoir » between friends/young people.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Match the time expression with its meaning:\n- « midi »\n- « minuit »\n- « six heures et demie »\n- « sept heures moins le quart » (2 steps)", "answer": "- Step 1:\n  - « midi » = 12:00 noon (12 h)\n  - « minuit » = 12:00 midnight (0 h)\n\n- Step 2:\n  - « six heures et demie » = 6:30 (30 minutes past = \"and a half\")\n  - « sept heures moins le quart » = 6:45 (15 minutes to 7 = \"less a quarter\")\n\n+ Note: « moins le quart » = \"minus a quarter\" = 15 minutes before the hour. So 6:45 = 7:00 - 15 min = 7 heures moins le quart.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "In the dialogue « Une réservation de taxi », what is the reservation number, and how is it read? Also, what does « Votre numéro de réservation est le J 68 93 » tell us about French reservation numbers? (2 steps)", "answer": "- Step 1: The reservation number is « J 68 93 » (read as « J 68 93 » or \"J, soixante-huit, quatre-vingt-treize\"). Philippe notes this number to give to the taxi driver or to reference his booking.\n- Step 2: Notice that French reservation numbers can include LETTERS (like « J ») combined with numbers. This is common in France — for example, train tickets have booking references like « FB 1234 ». You must give this number when you call back to modify or check your reservation.\n\n+ From the dialogue: The standardiste says « Votre numéro de réservation est le J 68 93. » Philippe should write this down.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is the difference between « Allô ? » and « Bonjour »? When do you use each? (1 step)", "answer": "« Allô ? » is ONLY used when answering the telephone — it's the French equivalent of \"Hello?\" on a phone call. You would never say « Allô ? » in person. « Bonjour » is used when greeting someone face-to-face (or in any non-telephone context).\n\n+ From the vocabulary: « Allô ? » is listed under \"Au téléphone\" (on the telephone). It's the standard way to answer the phone in French.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "How would you ask someone's phone number in French, and how would they respond? Write a complete dialogue. (2 steps)", "answer": "- Step 1: Question: « Quel est votre numéro de téléphone ? » or informal « C'est quoi, ton numéro ? »\n- Step 2: Response: « C'est le 01 45 66 11 27 » (read as « le zéro un, quarante-cinq, soixante-six, onze, vingt-sept »).\n\n+ From the vocabulary section: The example given is « C'est le 01 45 66 11 27. » — notice the article « le » before the phone number, and the way each pair of numbers is read.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the medical dialogue, the secretary offers « mercredi à 12 heures » and Colette responds « Pardon ? À deux heures ? » Why is Colette confused, and what does her mistake reveal about French time-telling? (2 steps)", "answer": "- Step 1: Colette mishears « 12 heures » (noon/midday) as « 2 heures » (2 PM). She asks to confirm: « À deux heures ? » (At 2 o'clock?)\n- Step 2: The secretary clarifies: « Non, à douze heures ! À midi ! » — she's offering noon (12:00), not 2:00. This confusion happens because in the 24-hour system, 12:00 = noon and 00:00 = midnight. Colette may have been thinking in the familiar system (where \"two o'clock\" would be 14:00 in official time).\n\n+ Vocabulary: « midi » = noon, « minuit » = midnight. In the official system, these are always 12:00 and 0:00 (or 24:00).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Explain the difference between « je ne suis pas là » and « je ne suis pas libre ». When would you use each? (2 steps)", "answer": "- Step 1: « Je ne suis pas là » = \"I'm not there / I'm not in\" — means the person is physically absent from the location (not at the office, not at home).\n- Step 2: « Je ne suis pas libre » = \"I'm not free / I'm unavailable\" — means the person is busy (in a meeting, occupied with something) even if they're physically present.\n\n+ From the dialogue: « Tu es là, demain ? — Non, je suis désolée, demain, je ne suis pas libre, je suis en déplacement. » Solange isn't free (has other commitments), not just \"not there.\"", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In the expression « Je vous en prie ! », what does « en » refer to, and what is the literal meaning? (1 step)", "answer": "« Je vous en prie ! » literally means \"I beg you for it\" — but it's the French way of saying \"You're welcome\" after someone says « Merci ! » or « Merci beaucoup ! ». The word « en » refers to the act of thanking — \"for that\" (i.e., you're welcome for [the help/thanking me]).\n\n+ Related expressions:\n  - « Je t'en prie ! » — informal (between friends)\n  - « Je vous en prie, madame ! » — formal (with title)\n  - « De rien ! » — another way to say \"You're welcome\" (literally \"of nothing\")", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "In the email document, the sender proposes « Lundi à 9h30, ça me va très bien. » What does « ça me va très bien » mean, and how does it differ from « ça me va »? (1 step)", "answer": "« Ça me va très bien » means \"That suits me perfectly\" or \"That works great for me.\" The addition of « très bien » (very well) emphasizes that the proposed time is ideal — not just acceptable, but very good. « Ça me va » alone means \"that works for me\" / \"that's fine.\"\n\n+ From the document: « Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ? — Lundi à 9h30, ça me va très bien. » The sender confirms Monday at 9:30 works perfectly.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In French, how do you say \"weekend\"? What two days does it include, and is it capitalized? (1 step)", "answer": "The French for \"weekend\" is « le week-end » (pronounced like the English word). It includes Saturday (« samedi ») and Sunday (« dimanche »). Note: In French, « week-end » IS capitalized when written, but the days of the week themselves are NOT capitalized.\n\n+ From the vocabulary: « dimanche (= le week-end) » — the chapter shows that Sunday is part of le week-end.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What is the pattern for asking \"Is [someone] available?\" in French, using « être »? Give an example. (2 steps)", "answer": "- Step 1: The pattern is: « Est-ce que [pronoun] est libre ? » or simply « [Pronoun] est libre ? »\n- Step 2: Examples from the dialogue:\n  - « Tu es là, demain ? » — Are you there/available tomorrow?\n  - « Demain, il n'est pas libre, il est en rendez-vous. » — Tomorrow he's not free.\n  - « Est-ce que vous êtes libre vendredi après-midi ? » — Are you free Friday afternoon?\n\n+ Note: « être libre » = \"to be free\" (available). The opposite is « être occupé » (to be busy).", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In the dialogue « En entreprise », Matthieu says « Nous avons rendez-vous à 16 heures, mais j'ai un petit problème, je suis en retard. » What does « j'ai un petit problème » mean, and how is the verb « avoir » used here? (2 steps)", "answer": "- Step 1: « J'ai un petit problème » means \"I have a small problem\" — in this context, it means \"something has come up\" or \"there's a minor issue.\"\n- Step 2: Notice the verb « avoir » here: « j'ai » = I have. In French, you use « avoir » for \"having\" a problem, not « être » (to be). This is different from English where you might say \"I am in trouble\" — French says « j'ai un problème » (I have a problem).\n\n+ Contrast: « être en retard » (to be late) uses « être », while « avoir un problème » (to have a problem) uses « avoir ». These are different from English patterns!", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "Put the following in order from most formal to most informal: « Bonjour », « Salut », « Allô ». Explain your ordering. (2 steps)", "answer": "- Step 1: From most formal to most informal:\n  1. « Bonjour » — formal greeting, used with everyone\n  2. « Allô » — neutral/telephone-specific, not formal or informal, just the way you answer the phone\n  3. « Salut » — informal, only between friends\n\n- Step 2: « Bonjour » opens doors in any formal or semi-formal situation. « Allô » is neutral — it's simply the telephone convention, not a statement about politeness. « Salut » is exclusively informal and should never be used with strangers, elders, or in professional settings.\n\n+ Note: « Allô » can ONLY be used on the phone — it's never said face-to-face. « Bonjour » can be used anytime, anywhere, as a greeting or to get attention politely.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What is the negative of « C'est urgent »? How do you say \"It's not urgent\" and \"It's not a problem\"? (1 step)", "answer": "The negative is formed by adding « ne... pas » around « c'est »:\n- « Ce n'est pas urgent. » (It's not urgent.)\n- « Ce n'est pas grave. » (It's not a problem / Don't worry about it.)\n\n+ From the grammaire: « C'est urgent ! » → « Ce n'est pas urgent. » The pattern is always « Ce n'est pas + adjective » (masculine singular).", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In French, how do you say \"the day after tomorrow\"? And \"the day before yesterday\"? (1 step)", "answer": "- « The day after tomorrow » = « après-demain »\n- « The day before yesterday » = « avant-hier »\n\nThese are useful time expressions not in the chapter but good to know:\n- « Aujourd'hui » = today\n- « Demain » = tomorrow\n- « Hier » = yesterday\n\n+ From the vocabulary: « Demain, c'est dimanche. » (Tomorrow is Sunday.) You can build from this: « Après-demain » literally means \"after-tomorrow.\"", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In the dialogue, Sébastien says « Nous avons une réunion importante, de 14 heures à 15 heures. » What does the preposition « de... à... » mean, and how would you say \"from 2 PM to 3 PM\" in the familiar system? (2 steps)", "answer": "- Step 1: « De... à... » means \"from... to...\" So « de 14 heures à 15 heures » = \"from 2 PM to 3 PM\" (in 24-hour official time).\n- Step 2: In the familiar system, you'd say: « de deux heures à trois heures de l'après-midi. » (« de l'après-midi » = in the afternoon). Or you could simply say « de deux heures à trois heures » if context makes it clear it's afternoon.\n\n+ Note: « l'après-midi » (afternoon) distinguishes from « du matin » (morning) and « du soir » (evening).", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "What is the difference between « numéro de téléphone » and « numéro de portable » (or « numéro de mobile »)? Are they the same? (1 step)", "answer": "« Numéro de téléphone » is the general term for \"phone number\" (can be home, office, or mobile). « Numéro de portable » or « numéro de mobile » specifically means \"mobile/cell phone number.\" In the dialogue, both are used to ask for phone numbers.\n\n+ From the vocabulary: « Quel est votre numéro de portable / mobile ? » — these are listed as alternatives to « numéro de téléphone ». In France, « portable » is the most common word for \"cell phone\" (mobile).", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": true}, {"question": "In the dialogue, Philippe says « J'ai un vol pour Budapest à 7 heures 50. » What does « un vol » mean, and how would you say \"flight\" in French? (1 step)", "answer": "« Un vol » means \"a flight.\" It's used for airplane travel: « un vol pour » = \"a flight to.\" In the dialogue, Philippe needs to leave early because his flight to Budapest is at 7:50 AM.\n\n+ Vocabulary: « le vol » (flight) comes from the verb « voler » (to fly). Related: « l'aéroport » (airport), « le billet » (ticket).", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}], "count": 45}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In French phone etiquette, what is the difference in usage between \"Allô ?\" and \"Bonjour\" when answering or initiating a phone call?", "answer": "- Step 1: \"Allô ?\" is used **exclusively on the telephone** — it is the sound you make to check that the line is open and that someone is there. You would never say \"Allô\" face-to-face.\n- Step 2: \"Bonjour\" is the universal greeting used everywhere, including the phone. In professional contexts, a receptionist typically opens with the company name + \"bonjour\" (e.g., \"Entreprise Béraut, bonjour\").\n- Step 3: A typical phone exchange therefore mixes both:\n+ Caller: \"Allô ?\" (to confirm connection) → then \"Bonjour, monsieur…\"\n+ Receiver in a company: \"Entreprise X, bonjour.\" (no \"allô\" needed — they know it's a phone)\n\nTakeaway: \"Allô\" = phone-only line check; \"Bonjour\" = universal greeting.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What is the polite formula in French to say \"I would like to speak to Mr Lemaire, please\" on the phone?", "answer": "The standard polite formula is **\"Je voudrais parler à monsieur Lemaire, s'il vous plaît.\"** The key piece is \"je voudrais\" (literally \"I would like\"), which is the conditional of \"vouloir\" — softer and more polite than \"je veux\" (\"I want\"), which would sound demanding. Note the preposition **\"à\"** after \"parler\" (to speak *to* someone). Always add \"s'il vous plaît\" with strangers/professionals (vous form).", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What does \"Un instant, ne quittez pas !\" mean and when is it used? (2 steps)", "answer": "- Step 1: Literal meaning: \"One moment, do not leave!\" — \"ne quittez pas\" is the negative imperative of \"quitter\" (to leave/hang up). On the phone, \"quitter\" means to hang up, so the phrase means \"don't hang up.\"\n- Step 2: It is used by a receptionist or switchboard operator when they are about to **transfer your call** or briefly put you on hold while they fetch the person you asked for.\n\nTakeaway: French equivalent of English \"One moment, please — hold the line.\"", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Conjugate the verb \"être\" in the present tense (affirmative) for all six persons. (6 steps)", "answer": "- Step 1: **je suis** — \"I am\"\n- Step 2: **tu es** — \"you are\" (informal singular)\n- Step 3: **il / elle / on est** — \"he / she / one is\"\n- Step 4: **nous sommes** — \"we are\"\n- Step 5: **vous êtes** — \"you are\" (formal or plural) — note the circumflex on ê and the liaison \"vous‿êtes\"\n- Step 6: **ils / elles sont
