<script>
const DATA={"selected": [{"question": "Give the full present-tense affirmative conjugation of \"être\" with each subject pronoun.", "answer": "je **suis**, tu **es**, il/elle/on **est**, nous **sommes**, vous **êtes**, ils/elles **sont**. Note that \"être\" is highly irregular — none of these forms look much like the infinitive \"être\". This is because \"être\" (like \"to be\" in English) is one of the most-used verbs in the language, and frequent verbs tend to preserve archaic, irregular forms over centuries of change.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "How do you form the negative of \"être\" in the present tense? Give the pattern and show what happens before a vowel. (3 steps)", "answer": "- Step 1: French negation wraps the verb with **\"ne … pas\"**: subject + ne + verb + pas. So \"je suis\" → \"je **ne** suis **pas**.\"\n- Step 2: When the verb starts with a vowel sound (es, est, êtes), **\"ne\" elides to \"n'\"**:\n+ tu es → tu **n'**es pas\n+ il/elle/on est → il **n'**est pas\n+ vous êtes → vous **n'**êtes pas\n- Step 3: When the verb starts with a consonant (suis, sommes, sont), \"ne\" stays full:\n+ je **ne** suis pas, nous **ne** sommes pas, ils **ne** sont pas\n\nTakeaway: Elision of \"ne\" → \"n'\" is purely a pronunciation rule to avoid two vowels colliding.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Edge case: Why does \"Vous êtes\" have a circumflex on the \"ê\", but \"Tu es\" doesn't? (2 steps)", "answer": "- Step 1: The circumflex (^) on \"ê\" in **êtes** (and in the infinitive **être**) historically marks a lost \"s\" — Old French was \"estes\" / \"estre\", from Latin \"estis\" / \"essere\". As the \"s\" disappeared in pronunciation, the circumflex stayed to commemorate it.\n- Step 2: \"Es\" (tu form) never had a written \"s\" after the \"e\" historically (Latin \"es\"), so no circumflex is needed. The pattern: circumflex often signals a vanished consonant — île (← isle), forêt (← forest), hôpital (← hospital).\n\nThis isn't an A1 essential, but it explains why French spelling looks the way it does — it's a window into the language's history.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What is the difference between \"C'est urgent\" and \"Il est urgent\" — when do you use \"c'est\" versus \"il est\" + adjective?", "answer": "In this beginner chapter, **\"c'est + adjectif\"** is the general, impersonal way to comment on a situation (\"It's urgent!\", \"It's perfect!\"). The adjective stays in the **masculine singular** because \"ce\" is a neutral, default pronoun referring to a whole idea/situation, not a specific noun. In contrast, \"il est urgent\" would refer to a specific masculine noun (e.g., \"Le rendez-vous? Il est urgent\" — *he/it* is urgent, pointing at \"le rendez-vous\"). Rule of thumb at A1: when commenting on a situation in general, use **c'est + masculine adjective**.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "How do you make \"C'est parfait\" negative, and why does the spelling change? (2 steps)", "answer": "- Step 1: Apply the \"ne … pas\" sandwich: \"C'**est** parfait\" → \"Ce **n'**est **pas** parfait.\"\n- Step 2: Two things happen:\n+ \"C'\" expands back to **\"Ce\"** because we need to insert \"ne\" — and \"Ce ne\" would be awkward, so we write \"Ce n'\" (the apostrophe shifts from \"C'\" to \"n'\").\n+ The adjective stays masculine singular (\"parfait\"), because \"c'est\" is always followed by masculine singular regardless.\n\nTakeaway: \"C'est\" → \"Ce n'est pas\" — the contraction simply moves to a different word.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "What is the gender of \"heure\", \"adresse\", \"réunion\", \"rendez-vous\", \"numéro\", \"problème\"? Why does this matter for interrogatives? (2 steps)", "answer": "- Step 1: Feminine: **une** heure, **une** adresse, **une** réunion. Masculine: **un** rendez-vous, **un** numéro, **un** problème.\n- Step 2: This matters because **quel/quelle** must agree with the noun's gender:\n+ \"**Quelle** heure est-il ?\" (f.)\n+ \"**Quelle** est votre adresse ?\" (f.)\n+ \"**Quel** est votre numéro ?\" (m.)\n+ \"Vous avez **un** problème ? — Oui, **un** petit.\" (m.)\n\nBe especially careful with **problème** — despite ending in -e (which usually signals feminine), it is masculine. Many Greek-origin words ending in -ème are masculine exceptions (système, problème, thème).", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why is it \"Quel est votre numéro\" but \"Quelle est votre adresse\"? (2 steps)", "answer": "- Step 1: \"Quel\" must agree with the noun that follows the verb \"être,\" not with \"votre\" (which is invariable for singular).\n- Step 2: \n+ \"numéro\" is a **masculine** noun (un numéro) → masculine singular form: **quel**.\n+ \"adresse\" is a **feminine** noun (une adresse) → feminine singular form: **quelle**.\n\nThe trick: when you see \"Quel est…\" or \"Quelle est…\", look at the noun on the right side of the verb to decide.\n\nTakeaway: Agreement of \"quel\" follows the predicate noun, not the subject pronoun \"ce\" or any possessive.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "French has four forms of the interrogative \"which/what\" — quel, quelle, quels, quelles. What determines which one to use? (2 steps)", "answer": "- Step 1: The form agrees with the **gender and number of the noun** it asks about, not the answer. It's an adjective in disguise.\n+ **quel** — masculine singular: \"Quel est votre numéro de téléphone ?\"\n+ **quelle** — feminine singular: \"Quelle est votre adresse ?\"\n+ **quels** — masculine plural: \"Quels sont les clients importants ?\"\n+ **quelles** — feminine plural: \"Quelles sont les réunions importantes ?\"\n- Step 2: All four are pronounced identically $$/kɛl/$$ — the distinction is purely written. So in speech you don't have to \"choose\" audibly, but in writing you must.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why is 70 in French \"soixante-dix\" and 71 \"soixante et onze\" instead of having their own word? (3 steps)", "answer": "- Step 1: French preserved an old **vigesimal (base-20)** counting system inherited from Celtic/Gaulish influence. Instead of inventing a new word for 70, the language extends 60 by adding 10, 11, 12...\n- Step 2: So: 70 = 60 + 10 = **soixante-dix**, 71 = 60 + 11 = **soixante et onze** (the \"et\" mirrors \"soixante et un\"), 72 = soixante-douze, ..., 79 = soixante-dix-neuf.\n- Step 3: Then 80 restarts as **quatre-vingts** (\"four-twenties\" = 4 × 20). 90 = quatre-vingt-dix (\"four-twenties-ten\"). This is why French numbers feel so unusual to learners — you're literally doing arithmetic.\n\nBelgian and Swiss French actually use *septante* (70) and *nonante* (90), which are cleaner — but standard French keeps the historical base-20 forms.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why is 80 \"quatre-vingts\" with an -s but 81 \"quatre-vingt-un\" without, and what does the literal meaning reveal? (3 steps)", "answer": "- Step 1: **\"Quatre-vingts\" = 4 × 20 = 80** — this is the clearest case of the vigesimal (base-20) system. Literally \"four-twenties.\"\n- Step 2: \"Vingts\" takes an **-s** because it is multiplied (four groups of twenty), so it behaves like a plural noun. BUT when another number follows (81, 82, …), the -s **drops**:\n+ 80 = quatre-vingt**s**\n+ 81 = quatre-vingt-un (no s)\n+ 82 = quatre-vingt-deux (no s)\n- Step 3: The same logic governs \"cent\" (100): \"cent\" alone has no s, but \"deux cents\" (200) takes an s, which drops when followed by another number (\"deux cent un\" = 201).\n\nTakeaway: Multiplied-twenty/hundred takes -s, but only when it's the final element of the number.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "How do you form the numbers 21 and 31 in French, and why do they look different from 22 or 32? (3 steps)", "answer": "- Step 1: **21 = \"vingt et un\"** and **31 = \"trente et un\"** — they insert the word **\"et\"** (and) between the tens and the units when the unit is 1.\n- Step 2: This \"et\" appears for all multiples of ten + 1: 21, 31, 41, 51, 61, and historically **71** (\"soixante et onze\"). It does **not** appear for 81 (\"quatre-vingt-un\") or 91 (\"quatre-vingt-onze\").\n- Step 3: For other digits (22, 32, 42…), the numbers are joined with a **hyphen** and no \"et\": \"vingt-deux,\" \"trente-trois,\" \"quarante-quatre.\"\n\nTakeaway: \"et\" is reserved for the unit 1 (and 11 in 71); all others use hyphens.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Why should you NOT say \"un cent\" for 100 in French?", "answer": "Unlike English (\"one hundred\") or Spanish (\"cien\" with no article), French simply uses **\"cent\"** by itself to mean 100. Saying \"un cent\" is grammatically wrong because \"cent\" already conveys the idea of \"one hundred\" on its own — adding \"un\" would be redundant and unnatural. Compare with \"mille\" (1000), which also stands alone without \"un.\" However, for multiples you do add the multiplier: \"deux cents\" (200), \"trois cents\" (300), etc. Quick rule: **single 100 = \"cent\"; multiple hundreds = number + \"cents.\"**", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "What are the two systems for telling time in French and when is each used? (3 steps)", "answer": "- Step 1: **Official / 24-hour system** — used for schedules: trains, planes, appointments, business meetings, TV programs. Hours go from 0 to 23. Example: \"Il est 18 h 45\" → \"dix-huit heures quarante-cinq.\"\n- Step 2: **Familiar / 12-hour system** — used at home, with friends, in casual conversation. Hours go 1–12, with descriptive add-ons:\n+ \"six heures et quart\" (6:15 — *and a quarter*)\n+ \"six heures et demie\" (6:30 — *and a half*)\n+ \"sept heures moins vingt\" (6:40 — *seven minus twenty*)\n+ \"sept heures moins le quart\" (6:45 — *seven minus the quarter*)\n- Step 3: Two special words: **midi** (12:00 noon) and **minuit** (00:00 midnight) — never say \"douze heures\" in casual speech for noon/midnight, although \"douze heures\" is technically used in the official system.\n\nTakeaway: official = precise numbers; familiar = quarters and halves around the hour.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why might a French speaker confuse \"à deux heures\" with \"à douze heures\" on the phone, and how does this illustrate a phonetic feature of French numbers? (2 steps)", "answer": "- Step 1: \"Deux\" $$/dø/$$ and \"douze\" $$/duz/$$ sound similar over a noisy phone line — both are short, both begin with /d/, and the vowel difference can be missed.\n- Step 2: This is exactly why French often uses **midi** for 12 h in spoken contexts: it removes ambiguity. In the dialogue, the secretary clarifies \"À douze heures ! À midi !\" — switching systems to disambiguate.\n\nTakeaway: choice of time system isn't just style — it's also clarity insurance.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "How do French speakers express 6:40 in the familiar (non-official) time system, and why does the phrasing flip? (3 steps)", "answer": "- Step 1: 6:40 in familiar speech is **\"sept heures moins vingt\"** — literally \"seven hours minus twenty.\"\n- Step 2: The logic: once the minute hand passes the half-hour, French speakers mentally **look ahead to the next hour** and subtract. So instead of \"six forty,\" they think \"twenty minutes before seven.\"\n- Step 3: This applies to anything past :30:\n+ 6:45 → \"sept heures moins le quart\" (seven minus a quarter)\n+ 6:50 → \"sept heures moins dix\"\n+ 6:55 → \"sept heures moins cinq\"\n\nTakeaway: After the half-hour mark, French \"rounds up\" to the next hour and counts down.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "What does \"Je voudrais\" literally mean, and why is it preferred over \"Je veux\" in polite requests? (3 steps)", "answer": "- Step 1: \"Je voudrais\" is the **conditional form** of the verb \"vouloir\" (to want). Literally: \"I would like / I would want.\"\n- Step 2: \"Je veux\" (present tense) means \"I want\" — direct and blunt, the way a child might phrase a demand. To French ears it sounds rude or impatient when addressing strangers.\n- Step 3: \"Je voudrais\" softens the request by putting it in a hypothetical mode (\"I would like, if it's possible…\"), which conveys politeness and gives the listener space to refuse. It is the default polite request form at restaurants, hotels, by phone, etc.\n\nTakeaway: Conditional = politeness softener, much like English \"I'd like\" vs. \"I want.\"", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "How would you say \"I would like to reserve a taxi to go to the airport, please\"?", "answer": "\"Je voudrais réserver un taxi pour aller à l'aéroport, s'il vous plaît.\" Key building blocks: **Je voudrais + infinitive** (réserver) for a polite request, **pour + infinitive** (pour aller) to express purpose (\"in order to go\"), and **à + l'aéroport** with elision because \"aéroport\" begins with a vowel (à le → contracted, then \"le\" → \"l'\").", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "How does \"Salut !\" function differently from \"Bonjour\" and \"Au revoir\"? (3 steps)", "answer": "- Step 1: **\"Salut\"** is informal and **bidirectional** — it can mean either \"hi\" or \"bye\" depending on context. Like English \"hey\" or Italian \"ciao.\"\n- Step 2: It is reserved for **friends, family, young people, and casual peers**. Never use \"Salut\" with a stranger, a shopkeeper, your boss, or anyone older you don't know well — it would be impolite.\n- Step 3: \"Bonjour\" (= hello, used only on arrival/meeting) and \"Au revoir\" (= goodbye, only on parting) are **directional** and universal — appropriate in all formal and informal settings.\n\nTakeaway: Salut = casual two-way greeting; Bonjour/Au revoir = formal, direction-specific.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "In French phone dialogues, which single word is used to answer the phone, and why is it restricted to that context?", "answer": "The word is \"Allô ?\". It is used exclusively when picking up or speaking on the phone — never as a greeting in person. In person you would say \"Bonjour\" instead. \"Allô\" essentially functions as \"Can you hear me? / Are you there?\" — it's a check that the line is open, which is why it doesn't make sense outside of telephony.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "What does \"Un instant, ne quittez pas !\" mean and when is it used? (2 steps)", "answer": "- Step 1: Literal meaning: \"One moment, do not leave!\" — \"ne quittez pas\" is the negative imperative of \"quitter\" (to leave/hang up). On the phone, \"quitter\" means to hang up, so the phrase means \"don't hang up.\"\n- Step 2: It is used by a receptionist or switchboard operator when they are about to **transfer your call** or briefly put you on hold while they fetch the person you asked for.\n\nTakeaway: French equivalent of English \"One moment, please — hold the line.\"", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why does French use \"avoir\" (not \"être\") in \"J'ai un rendez-vous\" and \"J'ai une réunion\"? (3 steps)", "answer": "- Step 1: French distinguishes between **possessing/having an event scheduled** (avoir) and **being in the middle of one** (être + en).\n- Step 2: \n+ \"J'ai un rendez-vous à 16 h\" = I have an appointment at 4 PM (it's on my calendar).\n+ \"Je suis en rendez-vous\" = I am currently in an appointment (right now, can't talk).\n- Step 3: The same logic applies to \"réunion\":\n+ \"Nous avons une réunion demain\" = we have a meeting tomorrow.\n+ \"Il est en réunion\" = he's in a meeting right now.\n\nTakeaway: \"avoir\" = scheduled/owned event; \"être en\" = current state of being in it.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What does \"Rémi est en déplacement\" tell you about Rémi's location, and how does it differ from \"en vacances\" or \"en voyage\"?", "answer": "All three expressions use the preposition **\"en\"** to describe a state/situation Rémi is currently in:\n- **en déplacement** — on a business trip; he's traveling for work, away from the office but still working.\n- **en voyage** — traveling more generally (could be business or personal, often longer or more open-ended).\n- **en vacances** — on vacation/holiday; not working, leisure.\n\nThe pattern **\"en + noun\"** describes a temporary state. Other similar phrases in this chapter: **en réunion** (in a meeting), **en rendez-vous** (in an appointment), **en retard** (late), **en avance** (early). Notice that English would use different prepositions (on, in, at) but French consistently uses \"en\" for these states.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "In dialogue 2, why does Sébastien say \"Philippe est là aujourd'hui, mais il est en réunion\" — what's the contrast being made? (2 steps)", "answer": "- Step 1: \"Là\" here means **present / on site / physically here** (not the meaning \"there\"). So \"Philippe est là\" = Philippe is in the office today.\n- Step 2: The contrast: even though Philippe is physically present, he's **en réunion** (in a meeting), so he's not available. Being \"là\" (present) and being \"libre\" (free) are two different things.\n\nThis is a useful office distinction: presence ≠ availability.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Misconception check: A learner writes \"Je suis en réunion à Paris demain.\" Another writes \"J'ai une réunion à Paris demain.\" Are both correct, and what's the nuance? (2 steps)", "answer": "- Step 1: Both are grammatically correct, but they describe different things.\n+ **\"Je suis en réunion\"** = \"I am in a meeting\" — describes a current state of being unavailable. Usually used now/today.\n+ **\"J'ai une réunion\"** = \"I have a meeting\" — describes a scheduled event on your calendar. Works for past, present, or future.\n- Step 2: With \"demain\" (tomorrow), **\"J'ai une réunion à Paris demain\"** is more natural because you're talking about what's on the schedule. \"Je suis en réunion demain\" sounds odd because being \"in\" something implies right-now-state, hard to project into tomorrow.\n\nA natural office sentence: \"Demain, **j'ai** une réunion, mais aujourd'hui **je suis en** déplacement.\"", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "What is the difference between \"en retard\" and \"en avance,\" and how would you illustrate each with a concrete situation? (2 steps)", "answer": "- Step 1: **\"en retard\"** = late (arriving after the scheduled time). Example: the meeting is at 9 h, Rémi arrives at 14 h 15 → \"Rémi est en retard.\"\n- Step 2: **\"en avance\"** = early (arriving before the scheduled time). Example: the meeting is at 14 h, Rémi arrives at 9 h 45 → \"Rémi est en avance.\"\n\nBoth use the same \"en + noun\" structure with \"être.\" Note that English uses an adjective (\"late,\" \"early\"), but French treats it as a state with a noun. The opposite-direction nuance: \"retard\" comes from \"retarder\" (to delay), \"avance\" from \"avancer\" (to move forward).", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Translate and explain the politeness exchange: \"— Excusez-moi, monsieur ! — Je vous en prie, madame !\" (3 steps)", "answer": "- Step 1: \"**Excusez-moi**\" = \"Excuse me\" / \"I'm sorry\" — the polite (vous) imperative of \"excuser.\" Used to apologize for a small mistake (bumping into someone, interrupting).\n- Step 2: \"**Je vous en prie**\" literally = \"I beg/pray you of it\" — but functionally means \"You're welcome\" / \"It's nothing\" / \"Please, don't worry about it.\" It's the polite (vous) response to apologies AND to \"merci.\"\n- Step 3: Between friends, the same exchange becomes informal:\n+ \"Pardon, excuse-moi !\" — \"Je **t'**en prie ! Ce n'est rien !\"\n+ Note \"vous\" → \"t'\" (tu form), reflecting the closer relationship.\n\nTakeaway: \"Je vous/t'en prie\" is the universal polite deflection of thanks or apologies.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Why is \"Ce n'est rien !\" a common response to \"Pardon !\", and how does it differ in tone from \"Ce n'est pas grave !\"? (2 steps)", "answer": "- Step 1: **\"Ce n'est rien !\"** literally = \"It's nothing!\" Used for minor things — bumping into someone, small interruptions. Light, dismissive in a friendly way.\n- Step 2: **\"Ce n'est pas grave !\"** literally = \"It's not serious!\" Used for bigger apologies (being late, forgetting something). Reassures the apologizer that no real harm was done.\n\nBoth are forms of forgiveness but on different scales. A friend stepping on your toe: \"Ce n'est rien !\" A friend arriving 30 minutes late: \"Ce n'est pas grave !\"", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "What's the difference between \"S'il vous plaît\" and \"S'il te plaît\", and how is this related to broader French politeness? (2 steps)", "answer": "- Step 1: Both mean \"please\", but they differ by formality:\n+ **S'il vous plaît** — formal/plural (matches \"vous\"): with strangers, in service contexts, with anyone you'd address as \"vous\".\n+ **S'il te plaît** — informal singular (matches \"tu\"): with friends, family, children.\n- Step 2: Literally \"If it pleases you\" — the verb \"plaire\" (to please) governs an indirect object (te/vous). This same tu/vous split appears throughout politeness: \"Je t'en prie / Je vous en prie\", \"Excuse-moi / Excusez-moi\".\n\nChoosing the right register is essential — using \"tu\" with a stranger can sound rude or overly familiar.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "When giving a French phone number like \"01 45 66 11 27,\" how do you read it aloud and why? (3 steps)", "answer": "- Step 1: French phone numbers are spoken in **pairs of two digits**, not digit by digit as in English. So \"01 45 66 11 27\" becomes \"zéro un, quarante-cinq, soixante-six, onze, vingt-sept.\"\n- Step 2: This grouping reflects how the number is **written** (always in pairs) and forces the speaker to use the larger number system (60s, 70s, 80s, 90s) fluently.\n- Step 3: The question form: **\"Quel est votre numéro de téléphone ?\"** Response begins with **\"C'est le …\"** — note the definite article \"le\" because a phone number is treated as a specific identifier.\n+ For mobile: \"Quel est votre numéro de portable / mobile ?\"\n\nTakeaway: Two-by-two grouping is the French standard; practice the 60s–90s to read numbers fluently.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "List the seven days of the week in French in order, starting from Monday. Are they capitalized? (2 steps)", "answer": "- Step 1: **lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche.**\n- Step 2: Unlike in English, days of the week in French are **not capitalized** unless they begin a sentence. They are common nouns, not proper nouns. Also, the French week starts on **Monday** (lundi), not Sunday. \"Samedi + dimanche = le week-end.\"\n\nTakeaway: lowercase days, week starts Monday.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "How would you ask and answer \"What day is it today?\" in conversational French?", "answer": "Ask: **\"Quel jour sommes-nous, aujourd'hui ?\"** (literally \"What day are we, today?\" — French uses \"nous sommes\" + day, treating the week as a collective \"we\").\nAnswer: **\"Aujourd'hui, nous sommes samedi.\"** (Today, we are Saturday.)\nA more casual alternative: \"On est quel jour ?\" / \"On est samedi.\"\nThe verb is \"être,\" not \"avoir\" — note that English uses \"to be\" too (\"today **is** Saturday\"), but French structures it as \"we are [on the day] Saturday.\"", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "\"Demain après-midi, il est à Dijon, chez des clients.\" What does the preposition \"chez\" mean here? (2 steps)", "answer": "- Step 1: **Chez** = \"at the place of / at someone's (home or business)\". It always precedes a person, a profession, or a pronoun referring to people.\n- Step 2: \"Chez des clients\" = \"at clients' (offices) / visiting clients\". Other examples:\n+ \"chez le médecin\" = at the doctor's\n+ \"chez moi\" = at my place / at home\n+ \"chez Renault\" = at Renault (the company)\n\n\"Chez\" has no single-word English equivalent — it captures the relational sense of being at someone's territory.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "In \"Nous avons rendez-vous à 16 heures\", why is there no article before \"rendez-vous\"? (2 steps)", "answer": "- Step 1: With **avoir rendez-vous** (to have an appointment), the article is often dropped — it's treated as a fixed expression, like English \"to have lunch\" (not \"a lunch\").\n- Step 2: Compare:\n+ \"J'ai **un** rendez-vous\" — emphasizes \"an appointment\" as one specific thing.\n+ \"J'ai rendez-vous **avec** Paul\" — fixed expression meaning \"I have an appointment with Paul\".\n\nBoth are correct; the article-less version is more idiomatic when followed by a time or person.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Distinguish \"à tout à l'heure,\" \"à demain,\" and \"au revoir\" — when is each used? (3 steps)", "answer": "- Step 1: **\"Au revoir\"** = \"Goodbye\" — the general, universal farewell. Works in any context, any time of day, when you don't know when you'll see the person again.\n- Step 2: **\"À tout à l'heure !\"** = \"See you later (today)!\" — specifically means you'll see/speak to the person again the same day, often within hours. Common after arranging a meet-up later in the day.\n- Step 3: **\"À demain\"** = \"See you tomorrow.\" Other variants follow the same pattern:\n+ \"À lundi\" (See you Monday)\n+ \"À la semaine prochaine\" (See you next week)\n+ \"À bientôt\" (See you soon — unspecified)\n\nTakeaway: \"À + time marker\" = a precise rendez-vous-style goodbye; \"au revoir\" is the neutral default.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "What does \"Ça vous va ?\" mean and how do you respond? (2 steps)", "answer": "- Step 1: Literally \"Does it go to/for you?\" — functionally **\"Does that work for you?\"** or \"Is that OK with you?\" Used to check if a proposed time, date, or arrangement suits the other person.\n- Step 2: Standard response: \n+ Affirmative: \"**Oui, ça me va**\" (Yes, that works for me) — note \"vous\" → \"me\" in the response (the listener replies about themselves).\n+ Or: \"Ça me va très bien\" (That works very well for me).\n+ Negative: \"Non, ça ne me va pas\" or \"Ça ne me va pas du tout.\"\n\nTakeaway: The verb \"aller\" here means \"to suit/work for someone,\" using indirect-object pronouns (me, te, lui, nous, vous, leur).", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why must adjectives following \"être\" agree with the subject? Illustrate with the four forms of \"important.\" (3 steps)", "answer": "- Step 1: In French, adjectives are not invariable like in English — they reflect the **gender and number** of the noun (or subject pronoun) they describe. This is a fundamental concordance principle: the adjective \"matches\" its subject.\n- Step 2: The four forms of \"important\":\n+ masculine singular: **important** — \"Le rendez-vous est important.\"\n+ feminine singular: **importante** (add -e) — \"La réunion est importante.\"\n+ masculine plural: **importants** (add -s) — \"Les clients sont importants.\"\n+ feminine plural: **importantes** (add -es) — \"Les réunions sont importantes.\"\n- Step 3: With \"ils/elles sont\" + adjective, you always think: who/what is the subject? Mixed-gender groups default to masculine plural.\n\nTakeaway: Agreement is grammatical \"echoing\" — the adjective mirrors the noun's identity.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the question \"Quelle heure est-il ?\", explain the inversion and why it isn't \"Quelle heure il est ?\" (3 steps)", "answer": "- Step 1: French has three main ways to ask questions: rising intonation (\"Il est quelle heure?\"), \"est-ce que\" (\"Quelle heure est-ce qu'il est ?\"), and **inversion** (verb + subject pronoun joined by a hyphen).\n- Step 2: \"**Quelle heure est-il ?**\" uses inversion: the verb \"est\" comes before the subject pronoun \"il,\" joined by a hyphen. This is the most **formal/standard** form, taught in textbooks and used in writing.\n- Step 3: \"Quelle heure il est ?\" (subject before verb) is the **casual spoken** form — grammatically a statement word order with a question intonation. Common in everyday speech but less appropriate in formal writing or with strangers.\n\nTakeaway: Inversion = formal register; subject-verb order with intonation = informal.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "What is the difference in formality between \"Est-ce que Paul est là ?\" and \"Paul est là ?\" — and which would you use on the phone with a colleague's office?", "answer": "Both ask the same yes/no question (\"Is Paul there?\"), but they differ in register:\n- **\"Paul est là ?\"** uses pure intonation — relying only on the rising voice at the end. It is the most casual/everyday form, fine in conversation between equals or friends.\n- **\"Est-ce que Paul est là ?\"** adds the question marker \"est-ce que\" (literally \"is it that\"), making it slightly more **formal and explicit**. It is also more common in writing and when you want to be unambiguous on the phone (where intonation can be hard to hear).\n\nFor a professional phone call asking about a colleague, **\"Est-ce que Paul est là, s'il vous plaît ?\"** is the safer, polite choice — formal enough for an unknown receptionist but not stiff.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "When writing a formal email in French, what are three standard formulas: opening greeting, polite closing-thanks, and sign-off? (3 steps)", "answer": "- Step 1: **Opening**: \"Bonjour, Monsieur\" or \"Bonjour, Madame\" — comma after Bonjour, capital M, no name needed in a first contact. (More formal: \"Madame, Monsieur,\".)\n- Step 2: **Polite closing-thanks**: \"Merci d'avance de votre réponse.\" (\"Thanks in advance for your reply.\") The structure \"de + noun\" expresses what you're thanking for.\n- Step 3: **Sign-off**: \"Cordialement,\" — neutral professional equivalent of \"Best regards,\". More formal: \"Bien cordialement,\" or \"Cordialement vôtre,\".\n\nFor a request inside the email: \"Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ?\" — uses **est-ce que** to form a polite yes/no question.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Dans le dialogue du bureau, Sébastien dit « Philippe est là aujourd'hui, mais il est en réunion. » Quel temps verbal est utilisé et pourquoi ? (2 steps)", "answer": "- Step 1: C'est le **présent de l'indicatif** (« est », « est »). En français, on utilise souvent le présent pour parler d'un fait actuel ou d'un planning futur proche — c'est le « présent pour le futur » (present for future).\n- Step 2: « Philippe est là aujourd'hui » = fait actuel. « Demain, il n'est pas libre » = planning futur proche (même verbe au présent). En français, le présent peut描述 un计划 très proche (aujourd'hui, demain, ce soir).\n\n+ C'est une différence avec l'anglais qui utiliserait « will be » ou « is going to be » — le français utilise souvent le présent tout simplement.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "In the office dialogue, Sébastien says « Philippe est là aujourd'hui, mais il est en réunion. Demain, il n'est pas libre, il est en rendez-vous. » What is the difference between « être en réunion » and « être en rendez-vous »? (2 steps)", "answer": "- Step 1: « Être en réunion » means \"to be in a meeting\" — typically a scheduled group meeting with multiple people.\n- Step 2: « Être en rendez-vous » means \"to have an appointment\" — typically a one-on-one meeting, like a client meeting or a doctor's appointment. In the dialogue, Philippe is \"en rendez-vous\" tomorrow because he's visiting clients in Dijon: « demain après-midi, il est à Dijon, chez des clients. »\n\n+ Synonym note: You can also say « avoir un rendez-vous » (to have an appointment), similar to « avoir une réunion ».", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "In the dialogue « En entreprise », Matthieu says « Nous avons rendez-vous à 16 heures, mais j'ai un petit problème, je suis en retard. » What does « j'ai un petit problème » mean, and how is the verb « avoir » used here? (2 steps)", "answer": "- Step 1: « J'ai un petit problème » means \"I have a small problem\" — in this context, it means \"something has come up\" or \"there's a minor issue.\"\n- Step 2: Notice the verb « avoir » here: « j'ai » = I have. In French, you use « avoir » for \"having\" a problem, not « être » (to be). This is different from English where you might say \"I am in trouble\" — French says « j'ai un problème » (I have a problem).\n\n+ Contrast: « être en retard » (to be late) uses « être », while « avoir un problème » (to have a problem) uses « avoir ». These are different from English patterns!", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "In the dialogue, Matthieu says \"Je suis en retard, je suis désolé.\" Why \"désolé\" and not \"désolée\"? When would it change? (2 steps)", "answer": "- Step 1: Because Matthieu is **masculine**, the adjective stays in its base form **désolé**. Adjectives after \"être\" must agree with the subject in gender and number.\n- Step 2: Variations:\n+ A woman would say: \"Je suis désol**ée**\" (add -e for feminine).\n+ Multiple men: \"Nous sommes désol**és**\" (add -s for plural).\n+ Multiple women: \"Nous sommes désol**ées**\" (add -es).\n\nSolange in dialogue 2 says \"Je suis désolée\" — note the final -e because she's female. This is \"être + adjective\" agreement in action.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "How do you say 6:15, 6:30, and 6:40 in the familiar (casual) French time system? (2 steps)", "answer": "- Step 1: 6:15 = « six heures et quart » (a quarter past); 6:30 = « six heures et demie » (half past); 6:40 = « sept heures moins vingt » (twenty to seven).\n- Step 2: The familiar system works like this: minutes 1-29 use \"et\" (and), adding to the hour. Minutes 31-59 subtract from the next hour: 40 = 60 - 20, so \"20 to\" the next hour. Similarly, 6:45 = « sept heures moins le quart » (a quarter to seven).\n\n+ Common confusion: « et demie » vs « et demi » — use « demie » (feminine) because « heure » is feminine: « six heures et demie ». But in « midi et demi » (12:30), « demi » is masculine because it's describing « midi ».", "source": "MiniMax ②", "_id": "minimax_2_3"}, {"question": "Build a single sentence using \"quel,\" \"être,\" and \"votre\" to ask for someone's email address (adresse e-mail, feminine). (2 steps)", "answer": "- Step 1: Identify the gender of the noun: \"adresse\" is **feminine singular**, so we need **\"quelle\"** (feminine singular form of quel).\n- Step 2: Standard structure: \"Quel/Quelle + est + votre + noun ?\" → **\"Quelle est votre adresse e-mail ?\"**\n\nThe same template generates: \"Quel est votre nom ?\" (nom = masc.), \"Quelle est votre adresse ?\" (adresse = fem.), \"Quels sont vos numéros ?\" (plural), \"Quelles sont vos questions ?\" (fem. pl.).\n\nTakeaway: This is a high-frequency phone/admin question template — master the agreement and you can ask for any piece of info.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What's wrong with: \"Je suis désolé, je suis en retard pour la réunion à neuf heures et quart de matin\" — what subtle issue is there with the time expression? (2 steps)", "answer": "- Step 1: The sentence is grammatically fine but **mixes registers**. \"Neuf heures et quart\" is the *informal* time system, while business contexts (like apologizing for being late to a meeting) usually use the *official* system: \"neuf heures quinze\" or \"9h15\".\n- Step 2: Also, \"de matin\" should be \"**du matin**\" (de + le = du): \"neuf heures du matin\" = \"9 in the morning\". But in the official 24-hour system, you wouldn't need \"du matin\" at all because the number itself disambiguates (9h vs 21h).\n\nSo the cleaner version: \"...je suis en retard pour la réunion de 9h15.\"", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "How would you explain the two time systems in French using 6:45 as an example? (3 steps)", "answer": "- Step 1: Official 24h system: \"18h45\" (pronounced \"dix-huit heures quarante-cinq\")\n- Step 2: Colloquial system: \"Sept heures moins le quart\" (literally \"seven hours minus a quarter\")\n- Step 3: Contextual use: Choose train schedule vs casual conversation\n+ Misconception: Learners often confuse \"moins le quart\" (45min) with \"moins quart\" (missing \"le\")\n\n[Takeaway: Context determines which system to use - formal schedules vs daily conversation.]", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "Complétez : Il est ___ (12h00) / Il est ___ (0h00) en français. Quelle est la règle pour ces deux heures spéciales ? (2 steps)", "answer": "- Step 1: Il est **midi** (12h00) / Il est **minuit** (0h00). Ce sont les deux heures spéciales qui ne suivent pas le pattern normal.\n- Step 2: On dit « midi » et « minuit », jamais « douze heures » ou « zéro heure » dans le langage quotidien. Pour préciser, on peut dire « midi » (le matin) ou « minuit » (la nuit), ou encore « midi pile » / « minuit pile » pour insister.\n\n+ Expressions utiles : « à midi pile » (= exactement midi), « à minuit précises ».", "source": "MiniMax ①", "_id": "minimax_1_5"}, {"question": "In the medical dialogue, Colette says « Un peu, oui ! » in response to « C'est urgent ? » What does this mean, and why is it a polite way to say yes? (1 step)", "answer": "« Un peu, oui ! » means \"A little bit, yes!\" or \"Yes, somewhat!\" It's Colette's way of saying the appointment is somewhat urgent — not an emergency, but she does need to see the doctor reasonably soon. By saying « un peu » (a little), she's being honest but not alarmist. The secretary then offers « Wednesday at 12:00 » — a same-day appointment showing she took the \"urgent\" request seriously.\n\n+ Politeness note: In French, when someone asks « C'est urgent ? », answering just « Oui ! » might sound too direct. Adding « Un peu » softens the answer while still being truthful.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "A receptionist asks \"Vous êtes madame ?\" — what does this mean and how do you answer? (2 steps)", "answer": "- Step 1: Literally \"You are Mrs. …?\" — the receptionist is asking the caller to **provide her surname** (last name) so it can be recorded. It's a polite way of saying \"May I have your name, ma'am?\"\n- Step 2: Standard answer: state your surname clearly, often followed by spelling it out:\n+ \"Langlois : l-a-n-g-l-o-i-s.\"\n+ Spelling aloud (épeler) is common in French phone calls because many names sound similar.\n\nFor men: \"Vous êtes monsieur ?\" — answer the same way.\n\nTakeaway: French phone culture relies heavily on confirming and spelling names; \"madame/monsieur ?\" with rising intonation = \"What's your name?\"", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In the taxi dialogue, Philippe reserves a taxi for \"samedi 31, à 6 heures\" but the operator asks \"À 6 heures ou à 18 heures?\" Why does the operator need to clarify, and how does Philippe clarify? (2 steps)", "answer": "- Step 1: The operator needs to clarify because Philippe said \"6 heures\" but in French, you need to specify morning vs. evening when using the 12-hour clock. Without clarification, 6:00 could mean 6 AM or 6 PM.\n- Step 2: Philippe clarifies by saying « À 6 heures du matin ! » (At 6 in the morning!) — he adds « du matin » to specify AM. If he meant evening, he'd say « du soir. » The 24-hour clock would also solve this: 6:00 = 6h00, 18:00 = 18h00.\n\n+ Note: In the official time system, « 6 heures » (6:00) would be understood as 6:00 AM, but in casual conversation, ambiguity can occur, which is why the operator asked.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "Match the time expression with its meaning:\n- « midi »\n- « minuit »\n- « six heures et demie »\n- « sept heures moins le quart » (2 steps)", "answer": "- Step 1:\n  - « midi » = 12:00 noon (12 h)\n  - « minuit » = 12:00 midnight (0 h)\n\n- Step 2:\n  - « six heures et demie » = 6:30 (30 minutes past = \"and a half\")\n  - « sept heures moins le quart » = 6:45 (15 minutes to 7 = \"less a quarter\")\n\n+ Note: « moins le quart » = \"minus a quarter\" = 15 minutes before the hour. So 6:45 = 7:00 - 15 min = 7 heures moins le quart.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Why does the receptionist say \"C'est noté !\" and what does it tell you about French phone etiquette? (2 steps)", "answer": "- Step 1: \"**C'est noté !**\" literally = \"It is noted!\" — meaning \"I've written it down / I've got it / Confirmed.\" It is a brisk, professional acknowledgment.\n- Step 2: French phone professionals frequently confirm details (name, time, address, reservation number) using short formulas:\n+ \"C'est noté.\" (Got it.)\n+ \"Très bien.\" (Very good.)\n+ \"Parfait.\" (Perfect.)\nThis reflects a culture where verbal confirmation of details is expected to avoid misunderstandings — much like reading back a flight reservation.\n\nTakeaway: \"C'est noté\" = professional verbal receipt of information.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "In the expression « Je vous en prie ! », what does « en » refer to, and what is the literal meaning? (1 step)", "answer": "« Je vous en prie ! » literally means \"I beg you for it\" — but it's the French way of saying \"You're welcome\" after someone says « Merci ! » or « Merci beaucoup ! ». The word « en » refers to the act of thanking — \"for that\" (i.e., you're welcome for [the help/thanking me]).\n\n+ Related expressions:\n  - « Je t'en prie ! » — informal (between friends)\n  - « Je vous en prie, madame ! » — formal (with title)\n  - « De rien ! » — another way to say \"You're welcome\" (literally \"of nothing\")", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "What is the difference between « numéro de téléphone » and « numéro de portable » (or « numéro de mobile »)? Are they the same? (1 step)", "answer": "« Numéro de téléphone » is the general term for \"phone number\" (can be home, office, or mobile). « Numéro de portable » or « numéro de mobile » specifically means \"mobile/cell phone number.\" In the dialogue, both are used to ask for phone numbers.\n\n+ From the vocabulary: « Quel est votre numéro de portable / mobile ? » — these are listed as alternatives to « numéro de téléphone ». In France, « portable » is the most common word for \"cell phone\" (mobile).", "source": "MiniMax ②", "_id": "minimax_2_43"}, {"question": "What is the difference between *\"excusez-moi\"* and *\"je suis désolé(e)\"* in phone calls? When would you NOT use them? (3 steps)", "answer": "- Step 1: *\"Excusez-moi\"* = general apology or interruption request (e.g., asking for clarification: *\"Excusez-moi, vous pouvez répéter?\"*).\n- Step 2: *\"Je suis désolé(e)\"* = sincere regret for causing inconvenience (e.g., *\"Je suis désolé, je suis en retard\"*).\n- Step 3: When NOT to use:\n+ *Excusez-moi* isn’t used for accepting apologies (use *\"Je vous en prie\"* instead)\n+ *Désolé(e)* isn’t appropriate for casual interruptions (use *\"Pardon\"* informally)\n\n**Takeaway:** Politeness requires matching the phrase to the level of formality and intent.", "source": "Qwen 3 ④", "_id": "qwen_4_5"}, {"question": "A friend asks \"Tu es là, demain ?\" and you want to reply that you are NOT there because you'll be on a business trip. Compose the answer. (3 steps)", "answer": "- Step 1: Start with a polite \"no\": \"**Non,**\" optionally followed by \"je suis désolé(e)\" (I'm sorry — agree the -e if feminine).\n- Step 2: State the negative fact: \"**je ne suis pas là demain**\" — apply ne … pas around \"suis.\"\n- Step 3: Give the reason using \"en + noun\": \"**je suis en déplacement.**\"\n\nFull sentence: \"Non, je suis désolé(e), demain je ne suis pas là, je suis en déplacement.\"\n\nThis mirrors the dialogue between Solange and Sébastien. Notice how French stacks polite apology + negation + explanation in three clean pieces.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Synthesis: Build a complete polite phone reservation for a doctor's appointment, including: greeting, your request, asking for an urgent slot, confirming you got the day/time. (4 steps)", "answer": "- Step 1: Greeting: \"Allô, bonjour, madame.\" (Allô because it's by phone; bonjour for politeness; madame because the receptionist is female.)\n- Step 2: Request: \"Je voudrais un rendez-vous avec le docteur Gaillard, s'il vous plaît.\" (je voudrais + noun object, no infinitive needed since you're requesting a thing.)\n- Step 3: Urgency: \"C'est un peu urgent.\" (using **c'est + adjective**, impersonal.)\n- Step 4: Confirming a proposed slot: \"Mercredi à midi, c'est parfait.\" (Acknowledging with c'est + parfait — masculine singular default.)\n\nPolish: end with \"Au revoir, madame.\" Phone politeness always closes with a farewell + title.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Form a complete polite phone request to book a taxi for tomorrow at 7 AM, including the politeness markers covered in this chapter. (3 steps)", "answer": "- Step 1: Open with the greeting: \"**Bonjour, madame / monsieur,**\" — always greet the receiver first.\n- Step 2: State the request using \"je voudrais + infinitive\": \"**je voudrais réserver un taxi**\" (I'd like to reserve a taxi). Then add the destination/details: \"**pour aller à l'aéroport**\" (to go to the airport), \"**pour demain, à 7 heures du matin**\" (for tomorrow at 7 AM).\n- Step 3: End with politeness: \"**s'il vous plaît**.\" Full sentence: \"Bonjour, madame, je voudrais réserver un taxi pour aller à l'aéroport, pour demain à 7 heures du matin, s'il vous plaît.\"\n\nNote: \"du matin\" disambiguates from \"du soir\" (PM) — important in the familiar/12-hour system.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "In the dialogue, Sébastien says « Nous avons une réunion importante, de 14 heures à 15 heures. » What does the preposition « de... à... » mean, and how would you say \"from 2 PM to 3 PM\" in the familiar system? (2 steps)", "answer": "- Step 1: « De... à... » means \"from... to...\" So « de 14 heures à 15 heures » = \"from 2 PM to 3 PM\" (in 24-hour official time).\n- Step 2: In the familiar system, you'd say: « de deux heures à trois heures de l'après-midi. » (« de l'après-midi » = in the afternoon). Or you could simply say « de deux heures à trois heures » if context makes it clear it's afternoon.\n\n+ Note: « l'après-midi » (afternoon) distinguishes from « du matin » (morning) and « du soir » (evening).", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "Quelle est la différence entre « Quel est... ? » et « C'est... ? » pour poser une question ? (2 steps)", "answer": "- Step 1: « Quel est votre numéro ? » → on attend un nom comme réponse (« C'est le 06... ») — la question porte sur le SUJET.\n- Step 2: « C'est urgent ? » → on attend « oui » ou « non » — c'est une question fermée sur une affirmation.\n\n+ Dans la pratique, « Quel est votre numéro ? » et « C'est quoi votre numéro ? » sont interchangeables à l'oral, mais « quel est » est plus formel.", "source": "MiniMax ①", "_id": "minimax_1_19"}, {"question": "Dans le dialogue du taxi, pourquoi le client précise-t-il « J'ai un vol pour Budapest à 7 heures 50 » ? Pourquoi cette信息 est-elle importante ? (2 steps)", "answer": "- Step 1: Car il doit arriver à l'aéroport AVANT son vol — il faut du temps pour y aller. Si le vol est à 7h50, il veut partir tôt pour être à l'aéroport vers 7h00-7h15.\n- Step 2: La standardiste doit connaître l'heure du vol pour calculer l'heure de prise en charge. « 6 heures du matin » (6h00) permet d'arriver à temps.\n\n+ C'est un exemple typique de raisonnement en français : on calcule à l'envers (vol à 7h50 → taxi à 6h00 → arrive à l'aéroport ~7h00).", "source": "MiniMax ①", "_id": "minimax_1_51"}, {"question": "Dans les expressions de politesse, quelle est la différence entre « Excusez-moi » et « Pardon » ? (2 steps)", "answer": "- Step 1: **Excusez-moi** = je vous demande pardon pour une faute ou un dérangement (excuse me). Plus formel.\n- Step 2: **Pardon** = excusez-moi pour une petite erreur ou pour attirer l'attention. Plus informel. Dans le dialogue médical, « Pardon ? » signifie « Qu'est-ce que vous avez dit ? » — on demande de répéter.\n\n+ En français, « Pardon » peut aussi signifier « je suis désolé » dans un contexte d'excuse.", "source": "MiniMax ①", "_id": "minimax_1_60"}, {"question": "You want to confirm an appointment on Wednesday at noon. Write the sentence using both the day and the unambiguous noon term. (2 steps)", "answer": "- Step 1: Day: \"mercredi\" (lowercase, no preposition needed when stating a specific day in French — \"mercredi\" alone means \"on Wednesday\").\n- Step 2: Time: use \"**midi**\" (12:00 noon) to avoid the \"12 h / 2 h\" confusion seen in the medical dialogue. Combine: \"**Mercredi à midi, c'est parfait.**\"\n\nAlternative formal: \"Mercredi à 12 heures.\" Both are correct, but \"midi\" is conversationally cleaner.\n\nTakeaway: Day name + \"à + time\" + reaction (\"c'est parfait / d'accord / ça me va\") is the standard confirmation template.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How do you ask \"Are you free tomorrow?\" in French during a work-related phone call? (2 steps)", "answer": "- Step 1: Use the formal \"vous\" form of \"être\": \"êtes\"\n- Step 2: Add the question structure \"Est-ce que...?\" and time expression: \"Est-ce que vous êtes libre demain ?\"\n+ Example alternative: \"Vous êtes dispo demain ?\" (informal peer-to-peer)\n\n[Takeaway: Formal business communication requires full conjugation and standard phrasing.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why doesn't \"Jeudi matin\" use an article in French like \"Le jeudi matin\"? (3 steps)", "answer": "- Step 1: Understand time expressions without articles when indicating regularity: \"Je suis en réunion jeudi matin\"\n- Step 2: Contrast with specific instances requiring articles: \"Le jeudi matin dernier, j'ai eu un problème\"\n- Step 3: Recognize exception for days used adverbially: \"Je travaille jeudi matin\" (general) vs \"Ce jeudi matin\" (specific)\n\n[Takeaway: Articles differentiate between habitual actions and specific events in time expressions.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How would you explain the two time systems in French using 6:45 as an example? (3 steps)", "answer": "- Step 1: Official 24h system: \"18h45\" (pronounced \"dix-huit heures quarante-cinq\")\n- Step 2: Colloquial system: \"Sept heures moins le quart\" (literally \"seven hours minus a quarter\")\n- Step 3: Contextual use: Choose train schedule vs casual conversation\n+ Misconception: Learners often confuse \"moins le quart\" (45min) with \"moins quart\" (missing \"le\")\n\n[Takeaway: Context determines which system to use - formal schedules vs daily conversation.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Which form do you use: \"C'est parfait\" or \"Elles sont parfaites\"? Why? (3 steps)", "answer": "- Step 1: Analyze \"c'est\" structure requiring masculine singular: \"C'est parfait\"\n- Step 2: Contrast with noun agreement: \"Les réunions sont parfaites\"\n- Step 3: Apply to dialogue example: \"C'est noté! C'est parfait\" from the taxi reservation dialogue\n+ Edge case: \"C'est\" can take feminine when referring to abstract concepts ending in -é: \"C'est une idée géniale\"\n\n[Takeaway: \"C'est\" + adj uses masculine singular regardless of antecedent type.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you correctly pronounce French phone numbers using the example \"06 00 57 98 75\"? (3 steps)", "answer": "- Step 1: Use \"zéro\" for initial 0: \"le zéro six\"\n- Step 2: Group numbers by twos: \"zéro six, zéro zéro, cinquante-sept, quatre-vingt-dix-huit, soixante-dix-sept\"\n- Step 3: Practice rhythm: Maintain equal stress on each pair as distinct units\n+ Common mistake: Learners often say \"six zéro\" instead of \"zéro six\" for initial digits\n\n[Takeaway: Phone number pronunciation follows specific pairing and stress patterns.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does \"soixante-dix\" (70) exist instead of \"septante\" in French? (3 steps)", "answer": "- Step 1: Historical counting system: French uses vigesimal (base-20) for 70-99\n- Step 2: Regional variations: \"septante\" survives in Belgian/Swiss French\n- Step 3: Practice pattern: Soixante + dix = 60 + 10 = 70\n+ Visual: Draw number line showing 60→70→80→90 with their unique constructions\n\n[Takeaway: French counting reflects Celtic/Germanic influences in specific ranges.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Compare the use of \"être\" vs \"avoir\" in these dialogue fragments: (3 steps)\n1) \"Elle est en retard\"\n2) \"J'ai un problème\"", "answer": "- Step 1: \"être\" expresses state/location: \"être en retard\", \"être au bureau\"\n- Step 2: \"avoir\" indicates possession/conditions: \"avoir un rendez-vous\", \"avoir un problème\"\n- Step 3: Apply to dialogue: \"J'ai un petit problème\" vs \"Je suis en retard\"\n+ Misconception: \"J'ai retard\" would mean \"I have a delay\" rather than \"I'm late\"\n\n[Takeaway: Verb choice depends on whether describing state (être) or possession/condition (avoir).]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How would you translate \"I would like to change my appointment time\" using Unit 2 grammar? (2 steps)", "answer": "- Step 1: Use conditional \"voudrais\": \"Je voudrais\"\n- Step 2: Add infinitive construction: \"Je voudrais changer l'heure de mon rendez-vous\"\n+ Compare: \"Je veux changer\" = direct desire vs \"Je voudrais\" = polite request\n\n[Takeaway: \"voudrais + inf\" expresses polite requests, not just desires.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is \"Ce n'est pas grave\" used instead of \"Il n'est pas grave\" in the dialogue? (3 steps)", "answer": "- Step 1: \"Ce\" as impersonal subject for abstract concepts\n- Step 2: \"Il est\" would require specific masculine noun antecedent\n- Step 3: Apply to context: Situation (apology) justifies impersonal construction\n+ Compare: \"Ce n'est pas grave\" (situation) vs \"Il n'est pas grave\" (specific man)\n\n[Takeaway: \"Ce\" vs \"Il\" depends on whether referring to a general situation or specific noun.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "When would you use \"Quelle est votre adresse?\" vs \"Quels sont les clients importants?\" (3 steps)", "answer": "- Step 1: Gender agreement - \"quelle\" for feminine \"adresse\", \"quels\" for masculine plural \"clients\"\n- Step 2: Number agreement - singular vs plural interrogative\n- Step 3: Apply to dialogue contexts: Address (singular/feminine) vs business clients (plural/masculine)\n+ Misconception: Forgetting plural \"s\" in \"quels\" for plural nouns\n\n[Takeaway: \"quel/quelle/quels/quelles\" must agree with the noun in gender and number.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How does French politeness differ between \"S'il vous plaît\" and \"S'il te plaît\"? (3 steps)", "answer": "- Step 1: \"vous\" formality: Business settings (standardiste dialogue)\n- Step 2: \"tu\" informality: Friends/family (salut greeting)\n- Step 3: Apply to Unit 2 examples: \"S'il vous plaît\" in taxi reservation vs \"S'il te plaît\" between colleagues\n+ Edge case: \"S'il te plaît\" can sometimes be used professionally in informal startups\n\n[Takeaway: Formality level determines \"vous\" vs \"tu\" in polite expressions.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why doesn't \"cent\" take \"un\" in French numbers? (2 steps)", "answer": "- Step 1: \"Cent\" as abstract quantity: \"cent euros\" not \"un cent euros\"\n- Step 2: Compare with \"mille\": \"mille euros\" (no article) vs \"un millier d'euros\"\n+ Practice: \"Cent\" functions like \"hundred\" in English without article: \"cent, deux cents\"\n\n[Takeaway: Higher numbers in French don't require indefinite articles like smaller numbers.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How would you structure a formal French phone call based on the dialogues? (4 steps)", "answer": "- Step 1: Opening: \"Entreprise Béraut, bonjour\" (company identity first)\n- Step 2: Request: \"Je voudrais parler à...\" with polite \"s'il vous plaît\"\n- Step 3: Hold: \"Un instant, ne quittez pas!\"\n- Step 4: Transfer: \"Elle est là\" confirmation before connection\n+ Contrast: Informal calls start with \"Allô?\"\n\n[Takeaway: Business calls follow strict protocol unlike casual phone conversations.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why does \"Il est urgent\" not agree with feminine \"réunion\"? (3 steps)", "answer": "- Step 1: \"être\" + adjective agreement rules: \"La réunion est urgente\"\n- Step 2: Contrast with \"c'est\": \"C'est urgent\" remains masculine regardless\n- Step 3: Apply to dialogue: \"Il est urgent\" uses impersonal \"il\" for general urgency\n+ Misconception: Learners might incorrectly say \"Elle est urgente\" for \"It's urgent\"\n\n[Takeaway: \"Il est\" + adj describes general states, not noun-specific attributes.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How do you express \"I'm on a business trip\" using Unit 2 vocabulary? (2 steps)", "answer": "- Step 1: Use \"en déplacement\" from office states\n- Step 2: Complete with context: \"Je suis en déplacement à Dijon chez des clients\"\n+ Compare: \"en voyage\" (general travel) vs \"en déplacement professionnel\" (formal business)\n\n[Takeaway: \"Déplacement\" specifically indicates work-related travel in French.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "In the business call dialogue (Entreprise Béraut), what does the switchboard operator say to connect a call to Véronique Dumaurier? Explain the full sequence of actions implied by their conversation. (5 steps)", "answer": "- Step 1: The standardiste says \"Oui, elle est là. Un instant, ne quittez pas!\" (Yes, she is here. One moment, don't hang up!). This indicates the operator confirms Véronique's availability.\n- Step 2: The phrase \"Un instant\" signals the operator needs time to transfer the call.\n- Step 3: \"Ne quittez pas!\" (Don't hang up!) instructs Matthieu to stay on the line, a common French telephone etiquette.\n- Step 4: The operator likely presses a button to connect the call internally, as implied by the dialogue structure.\n- Step 5: Véronique then answers \"Oui, allô?\" (Yes, hello?) to receive the transferred call.\n+ Cultural insight: In French offices, operators often avoid saying \"wait\" directly, instead using \"Un instant\" to maintain politeness.\n\n[Optional: one-sentence takeaway tying it together]\nIn French business calls, operators use \"Un instant, ne quittez pas!\" to signal a transfer while maintaining professional courtesy.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you express 6:45 PM in the **familiar time system** (used with friends)? Compare this to the formal system. (3 steps)", "answer": "- Step 1: In the familiar system, you say \"Sept heures moins le quart\" (literally: 7 hours minus a quarter). This reflects the French tendency to calculate time backward from the next hour.\n- Step 2: In the formal system (used for schedules/trains), you'd say \"18 h 45\" (18 hours 45 minutes).\n- Step 3: The familiar system uses \"moins\" (minus) for times between 31-59 minutes past the hour, while the formal system always counts forward.\n+ Note: \"Sept heures moins le quart\" literally translates to \"a quarter to seven\" but follows French syntax.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What does \"Rémi est en déplacement\" mean? Provide three other possible states of Rémi at the office using \"être\" + prepositional phrase. (4 steps)", "answer": "- Step 1: \"Rémi est en déplacement\" means \"Rémi is on a business trip.\" The phrase \"en déplacement\" specifically refers to professional travel.\n- Step 2: \"Rémi est en réunion\" - Rémi is in a meeting.\n- Step 3: \"Rémi est en retard\" - Rémi is late.\n- Step 4: \"Rémi est en vacances\" - Rémi is on vacation.\n+ Common mistake: \"en voyage\" refers to travel for personal reasons, not business trips.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why do we say \"Ce n'est pas grave\" instead of \"Elle n'est pas grave\" when responding to an apology? Explain the grammatical rule. (3 steps)", "answer": "- Step 1: \"Ce n'est pas grave\" uses \"c'est\" (from \"ce + être\") to describe an impersonal situation, not a specific noun.\n- Step 2: \"C'est + adjective\" always uses masculine singular agreement (\"grave\" instead of \"graves\" even if plural contexts exist).\n- Step 3: \"Elle n'est pas grave\" would only work if referring to a specific feminine noun (e.g., \"La situation n'est pas grave\"), but \"ce n'est pas grave\" responds generally to apologies.\n+ Contrast: \"La réponse n'est pas grave\" (The answer isn't serious) uses adjective agreement with \"réponse\" (feminine).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What are the four forms of \"quels\" and when do you use them? Provide example questions for each. (4 steps)", "answer": "- Step 1: **Quel** (masculine singular): \"Quel est votre numéro de téléphone?\" (What is your phone number?)\n- Step 2: **Quelle** (feminine singular): \"Quelle est votre adresse?\" (What is your address?)\n- Step 3: **Quels** (masculine plural): \"Quels sont les clients importants?\" (Which are the important clients?)\n- Step 4: **Quelles** (feminine plural): \"Quelles sont les réunions importantes?\" (Which are the important meetings?)\n+ Note: The form must match the gender/number of the noun that follows, not the answer.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you pronounce the phone number \"06 00 57 98 75\" in French? Explain the special pronunciation rules. (3 steps)", "answer": "- Step 1: Say \"le zéro six\" instead of \"six\" for the first digit to avoid confusion with \"six\" (6) vs \"dix\" (10).\n- Step 2: Group all digits into pairs: \"zéro six, zéro zéro, cinquante-sept, quatre-vingt-dix-huit, soixante-quinze.\"\n- Step 3: For \"00,\" say \"zéro zéro\" (not \"double zéro\"), and \"98\" becomes \"quatre-vingt-dix-huit\" (literally 4×20+18).\n+ Tip: In formal contexts, \"numéro de portable\" refers to mobile numbers, while \"numéro de téléphone fixe\" specifies landlines.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "When should you use \"Salut!\" versus \"Bonjour!\" in French? Provide three appropriate contexts for each. (3 steps)", "answer": "- Step 1: Use \"Salut!\" (Hi/Bye) with friends, family, or peers of similar age/status. Examples: texting a friend, greeting a classmate, ending a call with a sibling.\n- Step 2: Use \"Bonjour!\" (Good day) in formal situations, with strangers, or to show respect. Examples: entering a store, greeting a professor, starting a phone call with a business contact.\n- Step 3: \"Salut\" can mean both hello and goodbye among friends, while \"Au revoir\" is the formal goodbye.\n+ Warning: Using \"Salut!\" with a professor or CEO would be considered impolite in most contexts.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What are the three differences between French telephone number formatting and English-speaking countries? (3 steps)", "answer": "- Step 1: French numbers start with \"zéro\" (0) instead of \"zero,\" and the first digit is always said as \"le zéro\" (e.g., \"le zéro six\").\n- Step 2: Numbers are grouped in pairs: 06 00 57 98 75 vs. 0600579875, making them easier to remember.\n- Step 3: France uses a 10-digit system (e.g., 06 00 57 98 75) instead of the 10-digit North American format (country code + area code + number) or the variable-length UK system.\n+ Example: The French \"06\" prefix indicates mobile numbers, while \"01-05\" are landline prefixes.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does the French numerical system handle 70, 80, and 90 differently from other languages? Explain the historical origin. (3 steps)", "answer": "- Step 1: 70 = \"soixante-dix\" (60+10), 80 = \"quatre-vingts\" (4×20), 90 = \"quatre-vingt-dix\" (4×20+10). This reflects the ancient Celtic vigesimal (base-20) counting system.\n- Step 2: Numbers 21-69 follow the standard Latin pattern (\"vingt et un\", \"trente et un\", etc.).\n- Step 3: This system creates irregularities like \"soixante et onze\" (71) vs. \"soixante-dix\" (70), requiring careful hyphenation.\n+ Note: Belgian/French-Swiss French use \"septante\" (70), \"huitante\" (80), and \"nonante\" (90), similar to Italian.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "In the medical appointment dialogue, why does the secretary say \"non, à douze heures! À midi!\" instead of \"12 heures\"? Explain French time conventions. (3 steps)", "answer": "- Step 1: The secretary clarifies \"douze heures\" (12 o'clock) as \"midi\" (noon) because \"12 heures\" could ambiguously mean noon or midnight in 24-hour notation.\n- Step 2: In spoken French, \"midi\" (noon) and \"minuit\" (midnight) are always used instead of \"12 heures\" to avoid confusion.\n- Step 3: This reflects the formal time system's requirement for clarity in medical appointments, where precision matters.\n+ Example: A doctor might write \"12 h 00\" in notes but say \"midi\" in conversation.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What does \"Je voudrais un rendez-vous avec le docteur Gaillard\" imply about the speaker's intent compared to \"Je veux un rendez-vous\"? Explain the nuance. (3 steps)", "answer": "- Step 1: \"Je voudrais\" (I would like) creates a conditional request, making the statement more polite and less direct than \"Je veux\" (I want).\n- Step 2: In formal contexts like medical offices, using the conditional softens demands and shows respect to the secretary.\n- Step 3: Changing \"voudrais\" to \"veux\" would sound abrupt or even rude, similar to saying \"Give me an appointment!\" in English.\n+ Cultural insight: The conditional is essential in service-based interactions to maintain professionalism.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How do you say \"I'm sorry, tomorrow I'm in a meeting\" in French? Explain the conjugation choices. (3 steps)", "answer": "- Step 1: \"Je suis désolé(e), demain je suis en réunion.\" (\"Désolé\" agrees with the speaker's gender: \"désolé\" for male, \"désolée\" for female.)\n- Step 2: Use \"je suis\" (first person singular of être) for both parts of the sentence to describe the speaker's state.\n- Step 3: \"En réunion\" (in a meeting) follows the structure \"être + preposition + noun\" for temporary states.\n+ Common mistake: Using \"j'ai\" (to have) instead of \"je suis\" for states like \"en réunion.\"", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "What's the difference between \"Il est urgent\" and \"C'est urgent\"? When would you use each? (3 steps)", "answer": "- Step 1: \"Il est urgent\" describes something specific (masculine noun): \"Le problème est urgent\" → \"Il est urgent.\"\n- Step 2: \"C'est urgent\" makes a general statement about urgency without referring to a specific noun (masculine singular regardless of context).\n- Step 3: Use \"c'est\" for abstract qualities or impersonal statements, \"il/elle est\" when referring to a specific masculine/feminine noun.\n+ Example: \"La réponse est urgente\" → \"Elle est urgente,\" but \"C'est urgent\" works for any context.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "In the taxi reservation, why does Philippe clarify \"À 6 heures du matin!\" instead of just \"6 heures\"? Explain French time ambiguity. (3 steps)", "answer": "- Step 1: French uses a 24-hour clock formally (\"18 h 00\" for 6 PM), but informally says \"6 heures\" without specifying AM/PM.\n- Step 2: In taxi reservations, precision matters: \"6 heures\" could mean either time depending on context.\n- Step 3: Adding \"du matin\" (in the morning) or \"de l'après-midi\" (in the afternoon) clarifies the time, avoiding confusion with \"18 h 00.\"\n+ Example: \"6 h 00\" = \"6 heures du matin,\" \"18 h 00\" = \"6 heures de l'après-midi.\"", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What does \"Philippe est à Dijon, chez des clients\" reveal about French preposition usage compared to English? (3 steps)", "answer": "- Step 1: The preposition \"à\" is used for cities (\"à Dijon\"), unlike English \"in Dijon.\"\n- Step 2: \"Chez\" indicates location within a person's home or business (\"at [someone's] clients' office\").\n- Step 3: \"Chez\" replaces \"at the office of\" in this context, showing proximity to clients rather than a specific building.\n+ Common error: Using \"dans\" (in) with cities instead of \"à\" (à Paris vs dans Paris).", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Comment dit-on « What day is it today? » et « What day is it tomorrow? » en français ? (2 steps)", "answer": "- Step 1: La question pour demander le jour est : « Quel jour sommes-nous, aujourd'hui ? » — on utilise le verbe « être » car on décrit un état, pas une action.\n- Step 2: Pour demain, on demande « Quel jour sommes-nous, demain ? » — la réponse suit le même pattern : « Aujourd'hui, nous sommes samedi. Demain, c'est dimanche. »\n\n+ Notez que « nous sommes » (être) est utilisé, et non « il est » comme pour l'heure — c'est une exception française où les jours se conjuguent avec « être », comme les dates.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Quels sont les sept jours de la semaine en français, dans l'ordre ? Pourquoi le dimanche est-il spécial ? (2 steps)", "answer": "- Step 1: Les jours sont : **lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche**. Le week-end désigne samedi et dimanche ensemble : « le week-end ».\n- Step 2: Le dimanche est souvent considéré comme le jour de repos en France (jour de famille, courses le matin, repos l'après-midi). Dans la culture française, beaucoup de shops ferment le dimanche, sauf dans les grandes villes.\n\n+ Exemple : « Je suis libre samedi, mais dimanche je suis en déplacement. »", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Quelle est la différence entre le système officiel et le système familier pour dire l'heure en français ? Donnez un exemple pour 6h45 dans chaque système. (3 steps)", "answer": "- Step 1: Le **système officiel** (utilisé pour les trains, avions, rendez-vous professionnels) utilise les nombres de 0 à 24 : « Il est 18 heures 45 » (ou « dix-huit heures quarante-cinq »).\n- Step 2: Le **système familier** (à la maison, entre amis) utilise des expressions comme « et quart », « et demie », « moins le quart » : 6h45 = « sept heures moins le quart » (ou « six heures quarante-cinq »).\n- Step 3: Pour 6h45, on peut aussi dire « sept heures moins quart » — c'est courant et plus rapide. Le quart et la demie sont essentiels à connaître : et demie (30), et quart (15), moins le quart (45).\n\n+ Attention : « moins le quart » = 45 minutes, « et quart » = 15 minutes.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Comment dit-on 7h30 et 6h40 en français dans le système familier ? Expliquez la logique de « moins ». (2 steps)", "answer": "- Step 1: 7h30 = « sept heures et demie » (toujours « et demie », pas « et trente »). 6h40 = « sept heures moins vingt » (parce que 20 minutes avant 7h).\n- Step 2: La logique de « moins » : on dit l'heure PROCHAINE (ici 7h) moins le nombre de minutes qu'il faut retirer. Donc 6h40 = 20 minutes avant 7h = « sept heures moins vingt ».\n\n+ Voici lesrepères clés : et quart (15), et demie (30), moins le quart (45). Les autres minutes se disent normalement (moins cinq, moins dix, moins vingt, moins vingt-cinq).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Dans le système officiel français, comment dit-on 18h45 et 7h00 ? Pourquoi ce système est-il préféré pour les horaires de transport ? (2 steps)", "answer": "- Step 1: 18h45 = « dix-huit heures quarante-cinq » ; 7h00 = « sept heures » (pas « sept heures zéro zéro »). On utilise simplement les nombres de 0 à 24.\n- Step 2: Ce système évite toute confusion AM/PM (matin/soir), ce qui est crucial pour les trains, avions et rendez-vous professionnels. En France, les billets de train, les programmes TV et les emploi du temps utilisent toujours le système 24h.\n\n+ Exemple du dialogue : « J'ai un vol pour Budapest à 7 heures 50. » (système officiel)", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Complétez : Il est ___ (12h00) / Il est ___ (0h00) en français. Quelle est la règle pour ces deux heures spéciales ? (2 steps)", "answer": "- Step 1: Il est **midi** (12h00) / Il est **minuit** (0h00). Ce sont les deux heures spéciales qui ne suivent pas le pattern normal.\n- Step 2: On dit « midi » et « minuit », jamais « douze heures » ou « zéro heure » dans le langage quotidien. Pour préciser, on peut dire « midi » (le matin) ou « minuit » (la nuit), ou encore « midi pile » / « minuit pile » pour insister.\n\n+ Expressions utiles : « à midi pile » (= exactement midi), « à minuit précises ».", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Au bureau, comment décrire les états suivants : someone is traveling for work / someone has a meeting / someone is late / someone is early ? (3 steps)", "answer": "- Step 1: **en déplacement** = traveling for work (business trip) — « Philippe est en déplacement à Dijon. »\n- Step 2: **en réunion** = in a meeting — « Philippe est en réunion maintenant. » / **en retard** = late (arriving after the scheduled time) — « Il est en retard, la réunion est à 9h et il arrive à 9h15. » / **en avance** = early — « Il est en avance, la réunion est à 14h et il arrive à 13h45. »\n- Step 3: Autres états importants : **libre** (available), **occupé** (busy), **là** (here/present), **en vacances** (on vacation), **en voyage** (traveling).\n\n+ Ces expressions utilisent « en + nom » (en réunion, en déplacement) — c'est un pattern fixe en français professionnel.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Quelle est la différence entre « être en retard » et « être en avance » ? Donnez un exemple concret avec une réunion à 14h00. (2 steps)", "answer": "- Step 1: « Être en retard » = arriver APRÈS l'heure prévue (ex. réunion à 14h, tu arrives à 14h20). « Être en avance » = arriver AVANT l'heure prévue (ex. réunion à 14h, tu arrives à 13h45).\n- Step 2: Exemple : « La réunion est à 14 heures. Rémi arrive à 14h15 → il est en retard. Rémi arrive à 13h45 → il est en avance. »\n\n+ Notez que « en retard » et « en avance » sont des expressions figées — on ne dit jamais « en arrière » ou « en avant ».", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Dans un contexte professionnel, comment demander si quelqu'un est disponible ? Comment répondre qu'on est occupé ? (2 steps)", "answer": "- Step 1: Pour demander : « Tu es là, demain ? » / « Est-ce que tu es libre demain ? » / « Tu es disponible lundi ? »\n- Step 2: Pour répondre négatif : « Non, je ne suis pas libre, je suis en déplacement. » / « Non, je suis occupé, j'ai une réunion. »\n\n+ « Être là » signifie « être présent » (dans le bureau, au travail). « Être libre » = disponible. « Être occupé » = pas disponible.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Comment donner son numéro de téléphone en français ? Donnez un exemple avec le 06 00 57 98 75. (2 steps)", "answer": "- Step 1: On demande : « Quel est votre numéro de téléphone ? » La réponse : « C'est le 06 00 57 98 75. »\n- Step 2: On lit chaque paire de chiffres séparément : « le zéro six, zéro zéro, cinquante-sept, quatre-vingt-dix-huit, soixante-quinze. » Pour le 01 45 66 11 27 : « le zéro un, quarante-cinq, soixante-six, onze, vingt-sept. »\n\n+ On peut aussi demander : « Quel est votre numéro de portable ? » ou « votre numéro mobile ? » — même réponse.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Quelles sont les expressions essentielles pour répondre au téléphone en français ? Quand utilise-t-on « Allô ? » ? (2 steps)", "answer": "- Step 1: Les e
