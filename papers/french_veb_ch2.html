** — \"they are\"\n\nTakeaway: \"être\" is highly irregular — the stem changes (su-, e-, somm-, êt-, sont) so it must simply be memorized.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "How do you form the negative of \"être\" in the present tense? Give the pattern and show what happens before a vowel. (3 steps)", "answer": "- Step 1: French negation wraps the verb with **\"ne … pas\"**: subject + ne + verb + pas. So \"je suis\" → \"je **ne** suis **pas**.\"\n- Step 2: When the verb starts with a vowel sound (es, est, êtes), **\"ne\" elides to \"n'\"**:\n+ tu es → tu **n'**es pas\n+ il/elle/on est → il **n'**est pas\n+ vous êtes → vous **n'**êtes pas\n- Step 3: When the verb starts with a consonant (suis, sommes, sont), \"ne\" stays full:\n+ je **ne** suis pas, nous **ne** sommes pas, ils **ne** sont pas\n\nTakeaway: Elision of \"ne\" → \"n'\" is purely a pronunciation rule to avoid two vowels colliding.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why must adjectives following \"être\" agree with the subject? Illustrate with the four forms of \"important.\" (3 steps)", "answer": "- Step 1: In French, adjectives are not invariable like in English — they reflect the **gender and number** of the noun (or subject pronoun) they describe. This is a fundamental concordance principle: the adjective \"matches\" its subject.\n- Step 2: The four forms of \"important\":\n+ masculine singular: **important** — \"Le rendez-vous est important.\"\n+ feminine singular: **importante** (add -e) — \"La réunion est importante.\"\n+ masculine plural: **importants** (add -s) — \"Les clients sont importants.\"\n+ feminine plural: **importantes** (add -es) — \"Les réunions sont importantes.\"\n- Step 3: With \"ils/elles sont\" + adjective, you always think: who/what is the subject? Mixed-gender groups default to masculine plural.\n\nTakeaway: Agreement is grammatical \"echoing\" — the adjective mirrors the noun's identity.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "What is the difference between \"C'est urgent\" and \"Il est urgent\" — when do you use \"c'est\" versus \"il est\" + adjective?", "answer": "In this beginner chapter, **\"c'est + adjectif\"** is the general, impersonal way to comment on a situation (\"It's urgent!\", \"It's perfect!\"). The adjective stays in the **masculine singular** because \"ce\" is a neutral, default pronoun referring to a whole idea/situation, not a specific noun. In contrast, \"il est urgent\" would refer to a specific masculine noun (e.g., \"Le rendez-vous? Il est urgent\" — *he/it* is urgent, pointing at \"le rendez-vous\"). Rule of thumb at A1: when commenting on a situation in general, use **c'est + masculine adjective**.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "How do you make \"C'est parfait\" negative, and why does the spelling change? (2 steps)", "answer": "- Step 1: Apply the \"ne … pas\" sandwich: \"C'**est** parfait\" → \"Ce **n'**est **pas** parfait.\"\n- Step 2: Two things happen:\n+ \"C'\" expands back to **\"Ce\"** because we need to insert \"ne\" — and \"Ce ne\" would be awkward, so we write \"Ce n'\" (the apostrophe shifts from \"C'\" to \"n'\").\n+ The adjective stays masculine singular (\"parfait\"), because \"c'est\" is always followed by masculine singular regardless.\n\nTakeaway: \"C'est\" → \"Ce n'est pas\" — the contraction simply moves to a different word.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "What does \"Je voudrais\" literally mean, and why is it preferred over \"Je veux\" in polite requests? (3 steps)", "answer": "- Step 1: \"Je voudrais\" is the **conditional form** of the verb \"vouloir\" (to want). Literally: \"I would like / I would want.\"\n- Step 2: \"Je veux\" (present tense) means \"I want\" — direct and blunt, the way a child might phrase a demand. To French ears it sounds rude or impatient when addressing strangers.\n- Step 3: \"Je voudrais\" softens the request by putting it in a hypothetical mode (\"I would like, if it's possible…\"), which conveys politeness and gives the listener space to refuse. It is the default polite request form at restaurants, hotels, by phone, etc.\n\nTakeaway: Conditional = politeness softener, much like English \"I'd like\" vs. \"I want.\"", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "What grammatical form follows \"je voudrais\" when you want to express the action you'd like to do? Illustrate with examples.", "answer": "\"Je voudrais\" is followed directly by the **infinitive** (the unconjugated dictionary form of a verb). No preposition is needed in between — the two verbs simply stack. Examples:\n- \"Je voudrais **réserver** un taxi\" — I'd like to reserve a taxi.\n- \"Je voudrais **être** là\" — I'd like to be there.\n- \"Je voudrais **parler** à Madame Dupont\" — I'd like to speak to Madame Dupont.\n- \"Je voudrais **changer** l'heure de mon rendez-vous\" — I'd like to change the time of my appointment.\n\nThe structure mirrors English \"I would like to + verb.\"", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "List the seven days of the week in French in order, starting from Monday. Are they capitalized? (2 steps)", "answer": "- Step 1: **lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche.**\n- Step 2: Unlike in English, days of the week in French are **not capitalized** unless they begin a sentence. They are common nouns, not proper nouns. Also, the French week starts on **Monday** (lundi), not Sunday. \"Samedi + dimanche = le week-end.\"\n\nTakeaway: lowercase days, week starts Monday.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "How would you ask and answer \"What day is it today?\" in conversational French?", "answer": "Ask: **\"Quel jour sommes-nous, aujourd'hui ?\"** (literally \"What day are we, today?\" — French uses \"nous sommes\" + day, treating the week as a collective \"we\").\nAnswer: **\"Aujourd'hui, nous sommes samedi.\"** (Today, we are Saturday.)\nA more casual alternative: \"On est quel jour ?\" / \"On est samedi.\"\nThe verb is \"être,\" not \"avoir\" — note that English uses \"to be\" too (\"today **is** Saturday\"), but French structures it as \"we are [on the day] Saturday.\"", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "What are the two systems for telling time in French and when is each used? (3 steps)", "answer": "- Step 1: **Official / 24-hour system** — used for schedules: trains, planes, appointments, business meetings, TV programs. Hours go from 0 to 23. Example: \"Il est 18 h 45\" → \"dix-huit heures quarante-cinq.\"\n- Step 2: **Familiar / 12-hour system** — used at home, with friends, in casual conversation. Hours go 1–12, with descriptive add-ons:\n+ \"six heures et quart\" (6:15 — *and a quarter*)\n+ \"six heures et demie\" (6:30 — *and a half*)\n+ \"sept heures moins vingt\" (6:40 — *seven minus twenty*)\n+ \"sept heures moins le quart\" (6:45 — *seven minus the quarter*)\n- Step 3: Two special words: **midi** (12:00 noon) and **minuit** (00:00 midnight) — never say \"douze heures\" in casual speech for noon/midnight, although \"douze heures\" is technically used in the official system.\n\nTakeaway: official = precise numbers; familiar = quarters and halves around the hour.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "How do French speakers express 6:40 in the familiar (non-official) time system, and why does the phrasing flip? (3 steps)", "answer": "- Step 1: 6:40 in familiar speech is **\"sept heures moins vingt\"** — literally \"seven hours minus twenty.\"\n- Step 2: The logic: once the minute hand passes the half-hour, French speakers mentally **look ahead to the next hour** and subtract. So instead of \"six forty,\" they think \"twenty minutes before seven.\"\n- Step 3: This applies to anything past :30:\n+ 6:45 → \"sept heures moins le quart\" (seven minus a quarter)\n+ 6:50 → \"sept heures moins dix\"\n+ 6:55 → \"sept heures moins cinq\"\n\nTakeaway: After the half-hour mark, French \"rounds up\" to the next hour and counts down.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Why is \"midi\" (12:00) sometimes confused on the phone with \"deux heures\" (2:00), as in the medical dialogue? (2 steps)", "answer": "- Step 1: In the dialogue, the secretary says \"à 12 heures\" and Colette mishears \"à deux heures.\" In the official system, **12 h = midi (noon)**, but the digit \"12\" can be mentally heard as \"douze\" — which sounds nothing like \"deux,\" yet in fast speech with phone-quality audio, \"douze\" and \"deux\" share the same \"d\" + vowel onset and can blur.\n- Step 2: The secretary clarifies by switching to the familiar word **\"midi\"** — which is unambiguous because it can ONLY mean 12:00 noon. This shows the practical value of having both systems: the official one is precise, the familiar one is unambiguous in different ways.\n\nTakeaway: When confusion arises, switching to \"midi\" or \"minuit\" resolves the ambiguity instantly.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "What does \"Rémi est en déplacement\" tell you about Rémi's location, and how does it differ from \"en vacances\" or \"en voyage\"?", "answer": "All three expressions use the preposition **\"en\"** to describe a state/situation Rémi is currently in:\n- **en déplacement** — on a business trip; he's traveling for work, away from the office but still working.\n- **en voyage** — traveling more generally (could be business or personal, often longer or more open-ended).\n- **en vacances** — on vacation/holiday; not working, leisure.\n\nThe pattern **\"en + noun\"** describes a temporary state. Other similar phrases in this chapter: **en réunion** (in a meeting), **en rendez-vous** (in an appointment), **en retard** (late), **en avance** (early). Notice that English would use different prepositions (on, in, at) but French consistently uses \"en\" for these states.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "What is the difference between \"en retard\" and \"en avance,\" and how would you illustrate each with a concrete situation? (2 steps)", "answer": "- Step 1: **\"en retard\"** = late (arriving after the scheduled time). Example: the meeting is at 9 h, Rémi arrives at 14 h 15 → \"Rémi est en retard.\"\n- Step 2: **\"en avance\"** = early (arriving before the scheduled time). Example: the meeting is at 14 h, Rémi arrives at 9 h 45 → \"Rémi est en avance.\"\n\nBoth use the same \"en + noun\" structure with \"être.\" Note that English uses an adjective (\"late,\" \"early\"), but French treats it as a state with a noun. The opposite-direction nuance: \"retard\" comes from \"retarder\" (to delay), \"avance\" from \"avancer\" (to move forward).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why does French use \"avoir\" (not \"être\") in \"J'ai un rendez-vous\" and \"J'ai une réunion\"? (3 steps)", "answer": "- Step 1: French distinguishes between **possessing/having an event scheduled** (avoir) and **being in the middle of one** (être + en).\n- Step 2: \n+ \"J'ai un rendez-vous à 16 h\" = I have an appointment at 4 PM (it's on my calendar).\n+ \"Je suis en rendez-vous\" = I am currently in an appointment (right now, can't talk).\n- Step 3: The same logic applies to \"réunion\":\n+ \"Nous avons une réunion demain\" = we have a meeting tomorrow.\n+ \"Il est en réunion\" = he's in a meeting right now.\n\nTakeaway: \"avoir\" = scheduled/owned event; \"être en\" = current state of being in it.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "When giving a French phone number like \"01 45 66 11 27,\" how do you read it aloud and why? (3 steps)", "answer": "- Step 1: French phone numbers are spoken in **pairs of two digits**, not digit by digit as in English. So \"01 45 66 11 27\" becomes \"zéro un, quarante-cinq, soixante-six, onze, vingt-sept.\"\n- Step 2: This grouping reflects how the number is **written** (always in pairs) and forces the speaker to use the larger number system (60s, 70s, 80s, 90s) fluently.\n- Step 3: The question form: **\"Quel est votre numéro de téléphone ?\"** Response begins with **\"C'est le …\"** — note the definite article \"le\" because a phone number is treated as a specific identifier.\n+ For mobile: \"Quel est votre numéro de portable / mobile ?\"\n\nTakeaway: Two-by-two grouping is the French standard; practice the 60s–90s to read numbers fluently.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Explain the four forms of the interrogative adjective \"quel\" and when each is used. (4 steps)", "answer": "- Step 1: **\"Quel\"** means \"which\" or \"what\" when asking about a specific noun. It is an **adjective**, so it agrees in gender and number with the noun it modifies.\n- Step 2: **Quel** (masculine singular) — \"Quel est votre numéro de téléphone ?\" / \"Quel jour sommes-nous ?\"\n- Step 3: **Quelle** (feminine singular) — \"Quelle est votre adresse ?\" / \"Quelle heure est-il ?\"\n- Step 4: **Quels** (masculine plural) — \"Quels sont les clients importants ?\" / **Quelles** (feminine plural) — \"Quelles sont les réunions importantes ?\"\n\nPronunciation note: all four forms sound **identical** (/kɛl/); the difference is only visible in writing.\n\nTakeaway: \"quel\" mimics adjective agreement rules — match it to the noun's gender and number.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why is it \"Quel est votre numéro\" but \"Quelle est votre adresse\"? (2 steps)", "answer": "- Step 1: \"Quel\" must agree with the noun that follows the verb \"être,\" not with \"votre\" (which is invariable for singular).\n- Step 2: \n+ \"numéro\" is a **masculine** noun (un numéro) → masculine singular form: **quel**.\n+ \"adresse\" is a **feminine** noun (une adresse) → feminine singular form: **quelle**.\n\nThe trick: when you see \"Quel est…\" or \"Quelle est…\", look at the noun on the right side of the verb to decide.\n\nTakeaway: Agreement of \"quel\" follows the predicate noun, not the subject pronoun \"ce\" or any possessive.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Translate and explain the politeness exchange: \"— Excusez-moi, monsieur ! — Je vous en prie, madame !\" (3 steps)", "answer": "- Step 1: \"**Excusez-moi**\" = \"Excuse me\" / \"I'm sorry\" — the polite (vous) imperative of \"excuser.\" Used to apologize for a small mistake (bumping into someone, interrupting).\n- Step 2: \"**Je vous en prie**\" literally = \"I beg/pray you of it\" — but functionally means \"You're welcome\" / \"It's nothing\" / \"Please, don't worry about it.\" It's the polite (vous) response to apologies AND to \"merci.\"\n- Step 3: Between friends, the same exchange becomes informal:\n+ \"Pardon, excuse-moi !\" — \"Je **t'**en prie ! Ce n'est rien !\"\n+ Note \"vous\" → \"t'\" (tu form), reflecting the closer relationship.\n\nTakeaway: \"Je vous/t'en prie\" is the universal polite deflection of thanks or apologies.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "What does \"Ce n'est pas grave\" mean and in what situation would you use it? (2 steps)", "answer": "- Step 1: Literally \"It is not serious/severe.\" Functionally it means \"No worries / It's no big deal / Don't worry about it.\"\n- Step 2: It is the standard polite response when someone apologizes:\n+ \"Je suis désolé, je suis en retard.\" → \"Ce n'est pas grave !\"\n+ It signals that you accept their apology and the issue is minor. Compare to \"Ce n'est rien\" (\"It's nothing\"), which is roughly synonymous but slightly more emphatic.\n\nTakeaway: Pair \"désolé(e)\" (sorry) ↔ \"ce n'est pas grave\" (no worries) as a standard exchange.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "How does \"Salut !\" function differently from \"Bonjour\" and \"Au revoir\"? (3 steps)", "answer": "- Step 1: **\"Salut\"** is informal and **bidirectional** — it can mean either \"hi\" or \"bye\" depending on context. Like English \"hey\" or Italian \"ciao.\"\n- Step 2: It is reserved for **friends, family, young people, and casual peers**. Never use \"Salut\" with a stranger, a shopkeeper, your boss, or anyone older you don't know well — it would be impolite.\n- Step 3: \"Bonjour\" (= hello, used only on arrival/meeting) and \"Au revoir\" (= goodbye, only on parting) are **directional** and universal — appropriate in all formal and informal settings.\n\nTakeaway: Salut = casual two-way greeting; Bonjour/Au revoir = formal, direction-specific.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "How do you form the numbers 21 and 31 in French, and why do they look different from 22 or 32? (3 steps)", "answer": "- Step 1: **21 = \"vingt et un\"** and **31 = \"trente et un\"** — they insert the word **\"et\"** (and) between the tens and the units when the unit is 1.\n- Step 2: This \"et\" appears for all multiples of ten + 1: 21, 31, 41, 51, 61, and historically **71** (\"soixante et onze\"). It does **not** appear for 81 (\"quatre-vingt-un\") or 91 (\"quatre-vingt-onze\").\n- Step 3: For other digits (22, 32, 42…), the numbers are joined with a **hyphen** and no \"et\": \"vingt-deux,\" \"trente-trois,\" \"quarante-quatre.\"\n\nTakeaway: \"et\" is reserved for the unit 1 (and 11 in 71); all others use hyphens.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Why is 70 in French \"soixante-dix\" instead of having its own word, and how does this logic continue to 79? (3 steps)", "answer": "- Step 1: Standard metropolitan French uses a partly **vigesimal (base-20)** counting system inherited from Celtic/Gallic. So instead of inventing a new word for 70, French says \"60 + 10\" = **soixante-dix**.\n- Step 2: This means 70–79 are built as 60 + (10 to 19):\n+ 71 = soixante **et** onze (60 + 11) — note \"et\" because the unit chunk is \"onze\" (11)\n+ 72 = soixante-douze (60 + 12)\n+ 75 = soixante-quinze\n+ 79 = soixante-dix-neuf (60 + 19)\n- Step 3: To read 75, you mentally compute 60 + 15. To listen, you hear \"soixante\" first and must wait for the second part before knowing the actual number.\n\nTakeaway: 70s = 60s extended; mental math becomes part of the language.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why is 80 \"quatre-vingts\" with an -s but 81 \"quatre-vingt-un\" without, and what does the literal meaning reveal? (3 steps)", "answer": "- Step 1: **\"Quatre-vingts\" = 4 × 20 = 80** — this is the clearest case of the vigesimal (base-20) system. Literally \"four-twenties.\"\n- Step 2: \"Vingts\" takes an **-s** because it is multiplied (four groups of twenty), so it behaves like a plural noun. BUT when another number follows (81, 82, …), the -s **drops**:\n+ 80 = quatre-vingt**s**\n+ 81 = quatre-vingt-un (no s)\n+ 82 = quatre-vingt-deux (no s)\n- Step 3: The same logic governs \"cent\" (100): \"cent\" alone has no s, but \"deux cents\" (200) takes an s, which drops when followed by another number (\"deux cent un\" = 201).\n\nTakeaway: Multiplied-twenty/hundred takes -s, but only when it's the final element of the number.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "How would you say 91 and 95 in French, and what makes the 90s tricky? (3 steps)", "answer": "- Step 1: 90 = **quatre-vingt-dix** (4 × 20 + 10). The system stacks the 80-base with 10-additions.\n- Step 2: 91 = **quatre-vingt-onze** (80 + 11, NOT 80 + 1). Notice there's **no \"et\"** before onze (unlike 71).\n- Step 3: 95 = **quatre-vingt-quinze** (80 + 15). The pattern continues:\n+ 92 = quatre-vingt-douze\n+ 96 = quatre-vingt-seize\n+ 99 = quatre-vingt-dix-neuf (80 + 19)\n\nTakeaway: 90s = \"80 + (10 to 19)\"; you must hear the entire phrase before knowing the number.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why should you NOT say \"un cent\" for 100 in French?", "answer": "Unlike English (\"one hundred\") or Spanish (\"cien\" with no article), French simply uses **\"cent\"** by itself to mean 100. Saying \"un cent\" is grammatically wrong because \"cent\" already conveys the idea of \"one hundred\" on its own — adding \"un\" would be redundant and unnatural. Compare with \"mille\" (1000), which also stands alone without \"un.\" However, for multiples you do add the multiplier: \"deux cents\" (200), \"trois cents\" (300), etc. Quick rule: **single 100 = \"cent\"; multiple hundreds = number + \"cents.\"**", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Form a complete polite phone request to book a taxi for tomorrow at 7 AM, including the politeness markers covered in this chapter. (3 steps)", "answer": "- Step 1: Open with the greeting: \"**Bonjour, madame / monsieur,**\" — always greet the receiver first.\n- Step 2: State the request using \"je voudrais + infinitive\": \"**je voudrais réserver un taxi**\" (I'd like to reserve a taxi). Then add the destination/details: \"**pour aller à l'aéroport**\" (to go to the airport), \"**pour demain, à 7 heures du matin**\" (for tomorrow at 7 AM).\n- Step 3: End with politeness: \"**s'il vous plaît**.\" Full sentence: \"Bonjour, madame, je voudrais réserver un taxi pour aller à l'aéroport, pour demain à 7 heures du matin, s'il vous plaît.\"\n\nNote: \"du matin\" disambiguates from \"du soir\" (PM) — important in the familiar/12-hour system.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Transform the affirmative sentence \"Philippe est libre demain\" into the negative, and explain each piece. (3 steps)", "answer": "- Step 1: Identify the verb to negate: **\"est\"** (3rd person singular of être).\n- Step 2: Wrap it with \"ne … pas.\" Because \"est\" starts with a vowel, \"ne\" elides to \"n'\": → \"Philippe **n'**est **pas** libre demain.\"\n- Step 3: Notice:\n+ The adjective \"libre\" doesn't change — negation doesn't affect adjective agreement.\n+ Word order: subject + ne/n' + verb + pas + rest of sentence.\n+ \"demain\" can sit at the start or end; both are correct: \"Demain, Philippe n'est pas libre.\"\n\nTakeaway: Negation only wraps the conjugated verb, leaving everything else intact.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What does \"Ça vous va ?\" mean and how do you respond? (2 steps)", "answer": "- Step 1: Literally \"Does it go to/for you?\" — functionally **\"Does that work for you?\"** or \"Is that OK with you?\" Used to check if a proposed time, date, or arrangement suits the other person.\n- Step 2: Standard response: \n+ Affirmative: \"**Oui, ça me va**\" (Yes, that works for me) — note \"vous\" → \"me\" in the response (the listener replies about themselves).\n+ Or: \"Ça me va très bien\" (That works very well for me).\n+ Negative: \"Non, ça ne me va pas\" or \"Ça ne me va pas du tout.\"\n\nTakeaway: The verb \"aller\" here means \"to suit/work for someone,\" using indirect-object pronouns (me, te, lui, nous, vous, leur).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why does the receptionist say \"C'est noté !\" and what does it tell you about French phone etiquette? (2 steps)", "answer": "- Step 1: \"**C'est noté !**\" literally = \"It is noted!\" — meaning \"I've written it down / I've got it / Confirmed.\" It is a brisk, professional acknowledgment.\n- Step 2: French phone professionals frequently confirm details (name, time, address, reservation number) using short formulas:\n+ \"C'est noté.\" (Got it.)\n+ \"Très bien.\" (Very good.)\n+ \"Parfait.\" (Perfect.)\nThis reflects a culture where verbal confirmation of details is expected to avoid misunderstandings — much like reading back a flight reservation.\n\nTakeaway: \"C'est noté\" = professional verbal receipt of information.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "In the question \"Quelle heure est-il ?\", explain the inversion and why it isn't \"Quelle heure il est ?\" (3 steps)", "answer": "- Step 1: French has three main ways to ask questions: rising intonation (\"Il est quelle heure?\"), \"est-ce que\" (\"Quelle heure est-ce qu'il est ?\"), and **inversion** (verb + subject pronoun joined by a hyphen).\n- Step 2: \"**Quelle heure est-il ?**\" uses inversion: the verb \"est\" comes before the subject pronoun \"il,\" joined by a hyphen. This is the most **formal/standard** form, taught in textbooks and used in writing.\n- Step 3: \"Quelle heure il est ?\" (subject before verb) is the **casual spoken** form — grammatically a statement word order with a question intonation. Common in everyday speech but less appropriate in formal writing or with strangers.\n\nTakeaway: Inversion = formal register; subject-verb order with intonation = informal.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A friend asks \"Tu es là, demain ?\" and you want to reply that you are NOT there because you'll be on a business trip. Compose the answer. (3 steps)", "answer": "- Step 1: Start with a polite \"no\": \"**Non,**\" optionally followed by \"je suis désolé(e)\" (I'm sorry — agree the -e if feminine).\n- Step 2: State the negative fact: \"**je ne suis pas là demain**\" — apply ne … pas around \"suis.\"\n- Step 3: Give the reason using \"en + noun\": \"**je suis en déplacement.**\"\n\nFull sentence: \"Non, je suis désolé(e), demain je ne suis pas là, je suis en déplacement.\"\n\nThis mirrors the dialogue between Solange and Sébastien. Notice how French stacks polite apology + negation + explanation in three clean pieces.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "What is the difference in formality between \"Est-ce que Paul est là ?\" and \"Paul est là ?\" — and which would you use on the phone with a colleague's office?", "answer": "Both ask the same yes/no question (\"Is Paul there?\"), but they differ in register:\n- **\"Paul est là ?\"** uses pure intonation — relying only on the rising voice at the end. It is the most casual/everyday form, fine in conversation between equals or friends.\n- **\"Est-ce que Paul est là ?\"** adds the question marker \"est-ce que\" (literally \"is it that\"), making it slightly more **formal and explicit**. It is also more common in writing and when you want to be unambiguous on the phone (where intonation can be hard to hear).\n\nFor a professional phone call asking about a colleague, **\"Est-ce que Paul est là, s'il vous plaît ?\"** is the safer, polite choice — formal enough for an unknown receptionist but not stiff.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Build a single sentence using \"quel,\" \"être,\" and \"votre\" to ask for someone's email address (adresse e-mail, feminine). (2 steps)", "answer": "- Step 1: Identify the gender of the noun: \"adresse\" is **feminine singular**, so we need **\"quelle\"** (feminine singular form of quel).\n- Step 2: Standard structure: \"Quel/Quelle + est + votre + noun ?\" → **\"Quelle est votre adresse e-mail ?\"**\n\nThe same template generates: \"Quel est votre nom ?\" (nom = masc.), \"Quelle est votre adresse ?\" (adresse = fem.), \"Quels sont vos numéros ?\" (plural), \"Quelles sont vos questions ?\" (fem. pl.).\n\nTakeaway: This is a high-frequency phone/admin question template — master the agreement and you can ask for any piece of info.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "A receptionist asks \"Vous êtes madame ?\" — what does this mean and how do you answer? (2 steps)", "answer": "- Step 1: Literally \"You are Mrs. …?\" — the receptionist is asking the caller to **provide her surname** (last name) so it can be recorded. It's a polite way of saying \"May I have your name, ma'am?\"\n- Step 2: Standard answer: state your surname clearly, often followed by spelling it out:\n+ \"Langlois : l-a-n-g-l-o-i-s.\"\n+ Spelling aloud (épeler) is common in French phone calls because many names sound similar.\n\nFor men: \"Vous êtes monsieur ?\" — answer the same way.\n\nTakeaway: French phone culture relies heavily on confirming and spelling names; \"madame/monsieur ?\" with rising intonation = \"What's your name?\"", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Conceptually, why does French use \"être\" + location (e.g., \"Il est à Dijon, chez des clients\") instead of a verb like \"stay\" or \"visit\"?", "answer": "French uses \"être\" as the all-purpose **verb of location and state**. Saying \"Il est à Dijon\" simply states the fact that the subject is *located in* Dijon — without specifying the action. It's analogous to English \"He's in Dijon\" (also using \"to be\"). The preposition **\"à\"** marks the location (a city), and **\"chez\"** + person means \"at the home/place of\" that person. So \"Il est à Dijon, chez des clients\" = \"He's in Dijon, at (some) clients' place.\" French doesn't need an extra verb because location IS a state. Contrast with English which sometimes adds \"staying,\" \"visiting\" — French keeps it minimal and lets context fill in the activity.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Translate and analyze \"Nous avons une réunion importante, de 14 heures à 15 heures.\" (3 steps)", "answer": "- Step 1: \"Nous avons\" = \"We have\" (avoir, 1st pers. plural). French uses **\"avoir\"** for scheduled events (a meeting, an appointment, a class), parallel to English \"to have a meeting.\"\n- Step 2: \"une réunion importante\" — note the **feminine agreement**: \"réunion\" is feminine, so \"importante\" takes the feminine -e. If it were \"un rendez-vous important,\" no -e (rendez-vous is masculine).\n- Step 3: \"de 14 heures à 15 heures\" — the structure **\"de X à Y\"** = \"from X to Y.\" Time uses the **official 24-hour system** (\"14 heures\" = 2 PM) because it's a business context.\n\nTakeaway: \"avoir\" + event, agreement of \"importante,\" and \"de…à…\" for time ranges — three compact structures in one sentence.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "You want to confirm an appointment on Wednesday at noon. Write the sentence using both the day and the unambiguous noon term. (2 steps)", "answer": "- Step 1: Day: \"mercredi\" (lowercase, no preposition needed when stating a specific day in French — \"mercredi\" alone means \"on Wednesday\").\n- Step 2: Time: use \"**midi**\" (12:00 noon) to avoid the \"12 h / 2 h\" confusion seen in the medical dialogue. Combine: \"**Mercredi à midi, c'est parfait.**\"\n\nAlternative formal: \"Mercredi à 12 heures.\" Both are correct, but \"midi\" is conversationally cleaner.\n\nTakeaway: Day name + \"à + time\" + reaction (\"c'est parfait / d'accord / ça me va\") is the standard confirmation template.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Distinguish \"à tout à l'heure,\" \"à demain,\" and \"au revoir\" — when is each used? (3 steps)", "answer": "- Step 1: **\"Au revoir\"** = \"Goodbye\" — the general, universal farewell. Works in any context, any time of day, when you don't know when you'll see the person again.\n- Step 2: **\"À tout à l'heure !\"** = \"See you later (today)!\" — specifically means you'll see/speak to the person again the same day, often within hours. Common after arranging a meet-up later in the day.\n- Step 3: **\"À demain\"** = \"See you tomorrow.\" Other variants follow the same pattern:\n+ \"À lundi\" (See you Monday)\n+ \"À la semaine prochaine\" (See you next week)\n+ \"À bientôt\" (See you soon — unspecified)\n\nTakeaway: \"À + time marker\" = a precise rendez-vous-style goodbye; \"au revoir\" is the neutral default.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}], "count": 42}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In French phone dialogues, which single word is used to answer the phone, and why is it restricted to that context?", "answer": "The word is \"Allô ?\". It is used exclusively when picking up or speaking on the phone — never as a greeting in person. In person you would say \"Bonjour\" instead. \"Allô\" essentially functions as \"Can you hear me? / Are you there?\" — it's a check that the line is open, which is why it doesn't make sense outside of telephony.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "A receptionist wants to say politely \"One moment, hold the line!\" on the phone. What is the standard French formula? (2 steps)", "answer": "- Step 1: The formula is \"Un instant, ne quittez pas !\"\n- Step 2: Literally \"ne quittez pas\" = \"don't leave (the line)\". \"Quitter\" means to leave/abandon, so it's a polite imperative asking the caller not to hang up. \"Un instant\" softens it by promising it's brief.\n\nTogether it's the equivalent of English \"One moment, please hold.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What polite formula do you use in French to say \"I would like to speak to Mr Lemaire, please\" on the phone?", "answer": "\"Je voudrais parler à monsieur Lemaire, s'il vous plaît.\" The key building block is **je voudrais + infinitive** (\"I would like to ...\"), which is much more polite than \"je veux\" (I want). The preposition **à** is required after \"parler\" to indicate the person you're speaking *to*.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "List the seven days of the week in French in order, starting with Monday, and note their capitalization rule. (2 steps)", "answer": "- Step 1: lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche.\n- Step 2: Unlike English, the days are **NOT capitalized** in French unless they start a sentence. \"Le week-end\" refers to samedi + dimanche together.\n\nTakeaway: French treats days like ordinary nouns, not proper nouns.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What's the difference between the \"official\" and \"familier\" (informal) ways of telling time in French, and when is each used? (3 steps)", "answer": "- Step 1: The **official system** uses the 24-hour clock with the format \"X heures Y\" (no fractions). It's used for trains, flights, appointments, official schedules. Example: 18 h 45 = \"dix-huit heures quarante-cinq\".\n- Step 2: The **familier system** uses the 12-hour clock with fractions (quart, demie) and \"moins\" for the second half of the hour. It's used at home, with friends.\n+ 6 h 15 = \"six heures et quart\"\n+ 6 h 30 = \"six heures et demie\"\n+ 6 h 45 = \"sept heures moins le quart\"\n+ 6 h 40 = \"sept heures moins vingt\"\n- Step 3: Noon and midnight have special words: **midi** (12 h) and **minuit** (0 h), used in both systems instead of \"douze heures\" in casual speech.\n\nThis is why in the dialogue Colette is confused by \"12 heures\" — she expects to hear \"midi\" in conversation.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why might a French speaker confuse \"à deux heures\" with \"à douze heures\" on the phone, and how does this illustrate a phonetic feature of French numbers? (2 steps)", "answer": "- Step 1: \"Deux\" $$/dø/$$ and \"douze\" $$/duz/$$ sound similar over a noisy phone line — both are short, both begin with /d/, and the vowel difference can be missed.\n- Step 2: This is exactly why French often uses **midi** for 12 h in spoken contexts: it removes ambiguity. In the dialogue, the secretary clarifies \"À douze heures ! À midi !\" — switching systems to disambiguate.\n\nTakeaway: choice of time system isn't just style — it's also clarity insurance.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Give the full present-tense affirmative conjugation of \"être\" with each subject pronoun.", "answer": "je **suis**, tu **es**, il/elle/on **est**, nous **sommes**, vous **êtes**, ils/elles **sont**. Note that \"être\" is highly irregular — none of these forms look much like the infinitive \"être\". This is because \"être\" (like \"to be\" in English) is one of the most-used verbs in the language, and frequent verbs tend to preserve archaic, irregular forms over centuries of change.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "How do you form the negative of \"être\" in the present tense, and what spelling adjustment happens before vowel-starting forms? (2 steps)", "answer": "- Step 1: French negation wraps the verb with **ne ... pas**: je **ne** suis **pas**, tu **n'**es **pas**, il **n'**est **pas**, nous **ne** sommes **pas**, vous **n'**êtes **pas**, ils **ne** sont **pas**.\n- Step 2: \"Ne\" becomes **n'** before a vowel or silent h. Since \"es\", \"est\", \"êtes\" all begin with vowels, they take **n'**. With consonant-initial forms (suis, sommes, sont), \"ne\" stays full.\n\nThis elision rule is purely about pronunciation flow — French dislikes vowel-vowel collisions.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Translate and explain: \"Demain, je ne suis pas libre, je suis en déplacement.\" (2 steps)", "answer": "- Step 1: \"Tomorrow, I am not free, I am on a business trip / away.\"\n- Step 2: Two key office expressions:\n+ **être libre** = to be free/available (for a meeting). Negated here with ne...pas.\n+ **être en déplacement** = to be travelling for work (away from the office). The pattern **être en + [noun]** describes a state someone is in.\n\nThis pattern recurs: en réunion, en retard, en avance, en vacances, en voyage, en rendez-vous.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Explain the difference between \"être en retard\" and \"être en avance\", and give a concrete example illustrating each. (2 steps)", "answer": "- Step 1: **En retard** = late; **en avance** = early. They describe arrival relative to a scheduled time.\n- Step 2: Examples from the textbook:\n+ The meeting is at 9 h, Rémi arrives at 14 h 15 → he is *en retard* (very late!).\n+ The meeting is at 14 h, Rémi arrives at 9 h 45 → he is *en avance* (very early).\n\nThe structure is always **être + en + [state]**, with no article — \"en\" plus a bare noun forms a fixed adverbial state.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What's the difference between \"avoir un rendez-vous\" and \"être en rendez-vous\"? (2 steps)", "answer": "- Step 1: **Avoir un rendez-vous** = to have an appointment (scheduled, possibly future). Uses *avoir* + indefinite article.\n- Step 2: **Être en rendez-vous** = to be currently in a meeting/appointment (right now, unavailable). Uses *être* + en (state of being).\n\nSo \"J'ai un rendez-vous à 16 h\" describes the schedule; \"Il est en rendez-vous\" describes his current unavailability. The same logic distinguishes \"avoir une réunion\" (have a meeting on the schedule) vs \"être en réunion\" (be in a meeting now).", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "When forming a yes/no question with \"être\" in spoken French, what's the simplest method, and how does it differ from English? (2 steps)", "answer": "- Step 1: The simplest method is just **intonation**: keep the statement word order and raise your voice at the end. \"Tu es là ?\" \"Elle est à Lyon ?\" \"Il est libre, lundi matin ?\"\n- Step 2: This is very different from English, which requires inverting the verb (\"Are you there?\"). French does also have inversion (\"Es-tu là ?\") and \"est-ce que\" (\"Est-ce que tu es là ?\"), but the intonation-only version is by far the most common in everyday speech.\n\nTakeaway: rising pitch alone turns any French statement into a question.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "French has four forms of the interrogative \"which/what\" — quel, quelle, quels, quelles. What determines which one to use? (2 steps)", "answer": "- Step 1: The form agrees with the **gender and number of the noun** it asks about, not the answer. It's an adjective in disguise.\n+ **quel** — masculine singular: \"Quel est votre numéro de téléphone ?\"\n+ **quelle** — feminine singular: \"Quelle est votre adresse ?\"\n+ **quels** — masculine plural: \"Quels sont les clients importants ?\"\n+ **quelles** — feminine plural: \"Quelles sont les réunions importantes ?\"\n- Step 2: All four are pronounced identically $$/kɛl/$$ — the distinction is purely written. So in speech you don't have to \"choose\" audibly, but in writing you must.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why does \"Quelle est votre adresse ?\" use \"quelle\" with double-l + e, when \"Quel est votre numéro ?\" uses \"quel\"? (2 steps)", "answer": "- Step 1: Because **adresse** is a feminine noun (une adresse) and **numéro** is masculine (un numéro). \"Quel/quelle\" must agree with the noun being asked about.\n- Step 2: A useful memory hook: many French nouns ending in silent -e tend to be feminine (adresse, table, réunion-style endings vary), but you should learn each noun's gender with the article. The interrogative adjective then mirrors that gender automatically.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "What's the difference between \"il est\" and \"c'est\" when followed by an adjective, using \"urgent\" as the example? (3 steps)", "answer": "- Step 1: **\"Il est urgent\"** — \"il\" refers to a *specific masculine thing* previously mentioned. \"Le problème ? Il est urgent.\" The adjective must agree with that thing.\n- Step 2: **\"C'est urgent\"** — a general, impersonal evaluation of a situation. \"Vous voulez un rendez-vous ? — Oui, c'est urgent !\" Here \"c'\" doesn't refer to one specific noun; it's the situation as a whole.\n- Step 3: With **c'est**, the adjective stays in **masculine singular** by default (\"C'est parfait\", \"C'est grave\"), even if the situation involves feminine things — because \"ce\" is a neutral pronoun.\n\nNegative form: **\"Ce n'est pas urgent / grave.\"** The \"ce\" elides to \"c'\" only before vowels (c'est) but stays \"ce\" before \"n'\" (ce n'est).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "What does \"Je voudrais\" literally mean, what tense is it, and why is it the polite way to make a request? (3 steps)", "answer": "- Step 1: \"Je voudrais\" = \"I would like\". It's the **conditional** of the verb \"vouloir\" (to want).\n- Step 2: The conditional adds politeness because it makes the wish hypothetical/softened, rather than a blunt demand. Compare:\n+ \"Je **veux** un taxi\" = \"I want a taxi\" (sounds rude/abrupt)\n+ \"Je **voudrais** un taxi\" = \"I would like a taxi\" (polite, neutral)\n- Step 3: It is followed directly by an **infinitive** (no preposition) when expressing what you'd like to do: \"Je voudrais **réserver** un taxi\", \"Je voudrais **parler** à...\", \"Je voudrais **être** là\". With a noun object, no infinitive needed: \"Je voudrais un rendez-vous.\"\n\nThis is the workhorse polite-request structure for an A1 learner.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "How do you say the numbers 21, 31, 41, 51, 61 in French, and what's the special connector word? (2 steps)", "answer": "- Step 1: 21 = **vingt et un**, 31 = **trente et un**, 41 = **quarante et un**, 51 = **cinquante et un**, 61 = **soixante et un**.\n- Step 2: For the multiples of ten + 1, French inserts **\"et\"** (and) with no hyphens, unlike 22, 23, etc. which use hyphens (vingt-deux, vingt-trois).\n\nBe careful: this \"et\" pattern **stops** at 71 (soixante et onze — special case) and **does NOT apply** to 81 (quatre-vingt-un) or 91 (quatre-vingt-onze). More on those next.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why is 70 in French \"soixante-dix\" and 71 \"soixante et onze\" instead of having their own word? (3 steps)", "answer": "- Step 1: French preserved an old **vigesimal (base-20)** counting system inherited from Celtic/Gaulish influence. Instead of inventing a new word for 70, the language extends 60 by adding 10, 11, 12...\n- Step 2: So: 70 = 60 + 10 = **soixante-dix**, 71 = 60 + 11 = **soixante et onze** (the \"et\" mirrors \"soixante et un\"), 72 = soixante-douze, ..., 79 = soixante-dix-neuf.\n- Step 3: Then 80 restarts as **quatre-vingts** (\"four-twenties\" = 4 × 20). 90 = quatre-vingt-dix (\"four-twenties-ten\"). This is why French numbers feel so unusual to learners — you're literally doing arithmetic.\n\nBelgian and Swiss French actually use *septante* (70) and *nonante* (90), which are cleaner — but standard French keeps the historical base-20 forms.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Why is 80 written \"quatre-vingts\" with an -s, but 81 is \"quatre-vingt-un\" without an -s? (2 steps)", "answer": "- Step 1: When **quatre-vingts** stands alone as a round number, the \"vingts\" takes a plural -s because it literally means \"four twenties\" (a count of twenties).\n- Step 2: When it's followed by another number (81, 82, ..., 89), the -s **drops**: quatre-vingt-**un**, quatre-vingt-deux, quatre-vingt-trois, ..., quatre-vingt-neuf, quatre-vingt-dix, etc. Same rule applies to \"cent\" (100 = cent; 200 = deux cents; 201 = deux cent un — no s when followed).\n\nThis is a written rule only — pronunciation is identical either way.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What's wrong with saying \"un cent\" for 100 in French, and what should you say instead?", "answer": "You should simply say **\"cent\"** — never \"un cent\". Unlike English (\"a hundred / one hundred\"), French uses bare **cent** with no article or \"un\". The same applies to \"mille\" (1000 = mille, not \"un mille\"). The \"un\" is only added inside compound numbers like \"cent un\" (101) where it's part of the ones digit, not a determiner on cent itself.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "How do French speakers read out a phone number like 01 45 66 11 27, and what's the structure? (2 steps)", "answer": "- Step 1: Phone numbers in France are grouped in **pairs of two digits** and read as two-digit numbers: \"**zéro un, quarante-cinq, soixante-six, onze, vingt-sept**\".\n- Step 2: This means you must be fluent in numbers up to 99 to give or take down a phone number. You also say \"**C'est le** [number]\" — the definite article \"le\" is used because the number is treated as a specific identifier (\"the number ...\").\n\nFor mobiles, ask \"Quel est votre numéro de **portable** / **mobile** ?\" — both terms are used.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "In the dialogue, Matthieu says \"Je suis en retard, je suis désolé.\" Why \"désolé\" and not \"désolée\"? When would it change? (2 steps)", "answer": "- Step 1: Because Matthieu is **masculine**, the adjective stays in its base form **désolé**. Adjectives after \"être\" must agree with the subject in gender and number.\n- Step 2: Variations:\n+ A woman would say: \"Je suis désol**ée**\" (add -e for feminine).\n+ Multiple men: \"Nous sommes désol**és**\" (add -s for plural).\n+ Multiple women: \"Nous sommes désol**ées**\" (add -es).\n\nSolange in dialogue 2 says \"Je suis désolée\" — note the final -e because she's female. This is \"être + adjective\" agreement in action.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "What's the polite exchange when someone apologizes to you in French — both formal and informal versions? (2 steps)", "answer": "- Step 1: When apologized to, the standard polite response is:\n+ Formal (vous): \"— Excusez-moi ! — **Je vous en prie** !\" (literally \"I beg of you\" → \"Don't mention it / You're welcome\").\n+ Informal (tu): \"— Pardon ! — **Je t'en prie** ! Ce n'est rien !\" (\"It's nothing!\")\n- Step 2: For a stronger apology like \"Je suis désolé(e)\", the reply is \"**Ce n'est pas grave !**\" (\"It's not serious / no big deal\").\n\nThese phrases are also used to wave off thanks, similar to \"you're welcome\".", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "What does \"Salut !\" mean in French, and what's tricky about its usage? (2 steps)", "answer": "- Step 1: \"Salut !\" is an informal greeting used **only between friends, family, or young people** — never with strangers or in formal/professional settings (use \"Bonjour\" there).\n- Step 2: The tricky part: \"Salut\" means **both \"hello\" AND \"goodbye\"**, depending on context — like Italian \"ciao\". Tone and timing tell you which one.\n\nSo a casual French exchange might literally be: \"Salut !\" (arriving) ... \"Salut !\" (leaving) — using the exact same word twice.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What's the difference between \"S'il vous plaît\" and \"S'il te plaît\", and how is this related to broader French politeness? (2 steps)", "answer": "- Step 1: Both mean \"please\", but they differ by formality:\n+ **S'il vous plaît** — formal/plural (matches \"vous\"): with strangers, in service contexts, with anyone you'd address as \"vous\".\n+ **S'il te plaît** — informal singular (matches \"tu\"): with friends, family, children.\n- Step 2: Literally \"If it pleases you\" — the verb \"plaire\" (to please) governs an indirect object (te/vous). This same tu/vous split appears throughout politeness: \"Je t'en prie / Je vous en prie\", \"Excuse-moi / Excusez-moi\".\n\nChoosing the right register is essential — using \"tu\" with a stranger can sound rude or overly familiar.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Translate and explain the structure: \"Pour quel jour et pour quelle heure ?\" (asked by a taxi dispatcher) (2 steps)", "answer": "- Step 1: \"For which day and for which time?\"\n- Step 2: Structure breakdown:\n+ **Pour** = \"for\" (the day/time of the reservation).\n+ **Quel jour** uses masculine \"quel\" because \"jour\" is masculine (un jour).\n+ **Quelle heure** uses feminine \"quelle\" because \"heure\" is feminine (une heure).\n\nSo \"quel\" agrees with the noun even though the question feels parallel — gender drives the spelling, not the question structure.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "What does \"Ça vous va ?\" mean, and what's the typical response? (2 steps)", "answer": "- Step 1: \"Ça vous va ?\" literally = \"Does that go for you?\" → idiomatically = \"Does that work for you? / Is that OK?\" Used to check if a proposal (time, date, plan) is acceptable.\n- Step 2: The typical response is \"Oui, ça me va\" (\"Yes, that works for me\"). Informal version with a friend: \"Ça te va ?\" / \"Oui, ça me va.\"\n\nThis is a polite way to confirm appointments — much softer than \"D'accord ?\" which is more like \"Agreed?\".", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A friend asks if you can meet Monday at 9:30 am. Give a polite confirmation in French.", "answer": "\"Lundi à 9h30, ça me va très bien.\" This combines: the day (lundi, no article), the time in formal style (9h30 = \"neuf heures trente\"), and the acceptance phrase \"ça me va\" intensified with \"très bien\" (very well). Alternative: \"D'accord pour lundi à 9h30.\"", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "How would you say \"I would like to reserve a taxi to go to the airport, please\"?", "answer": "\"Je voudrais réserver un taxi pour aller à l'aéroport, s'il vous plaît.\" Key building blocks: **Je voudrais + infinitive** (réserver) for a polite request, **pour + infinitive** (pour aller) to express purpose (\"in order to go\"), and **à + l'aéroport** with elision because \"aéroport\" begins with a vowel (à le → contracted, then \"le\" → \"l'\").", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "In dialogue 2, why does Sébastien say \"Philippe est là aujourd'hui, mais il est en réunion\" — what's the contrast being made? (2 steps)", "answer": "- Step 1: \"Là\" here means **present / on site / physically here** (not the meaning \"there\"). So \"Philippe est là\" = Philippe is in the office today.\n- Step 2: The contrast: even though Philippe is physically present, he's **en réunion** (in a meeting), so he's not available. Being \"là\" (present) and being \"libre\" (free) are two different things.\n\nThis is a useful office distinction: presence ≠ availability.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "\"Demain après-midi, il est à Dijon, chez des clients.\" What does the preposition \"chez\" mean here? (2 steps)", "answer": "- Step 1: **Chez** = \"at the place of / at someone's (home or business)\". It always precedes a person, a profession, or a pronoun referring to people.\n- Step 2: \"Chez des clients\" = \"at clients' (offices) / visiting clients\". Other examples:\n+ \"chez le médecin\" = at the doctor's\n+ \"chez moi\" = at my place / at home\n+ \"chez Renault\" = at Renault (the company)\n\n\"Chez\" has no single-word English equivalent — it captures the relational sense of being at someone's territory.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Form the negation: take \"Je suis libre demain\" and make it negative. Then take \"Elle est en réunion\" and do the same.", "answer": "\"Je **ne** suis **pas** libre demain.\" / \"Elle **n'**est **pas** en réunion.\" The pattern is rigid: **ne** (or **n'** before a vowel) goes immediately before the verb, **pas** goes immediately after. In \"elle est\", \"est\" begins with a vowel so \"ne\" elides to \"n'\". In \"je suis\", \"suis\" begins with a consonant, so \"ne\" stays full.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Build the question: someone gave you their phone number but you didn't catch it. Ask politely. (2 steps)", "answer": "- Step 1: \"**Pardon ?**\" is the all-purpose \"Excuse me?\" / \"Sorry, what?\" — used to ask for repetition.\n- Step 2: For a more complete request: \"Pardon, quel est votre numéro de téléphone, s'il vous plaît ?\" Using **quel** (masculine) because **numéro** is masculine. You could also say \"Excusez-moi, pouvez-vous répéter ?\" but at A1 level, \"Pardon ?\" alone is enough.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Convert these official times into the familier system (informal speech): 14h15, 18h30, 19h45, 20h40. (4 steps)", "answer": "- Step 1: 14h15 → \"deux heures et quart\" (2:15 pm in informal terms; the 24-hour figure gets reduced by 12).\n- Step 2: 18h30 → \"six heures et demie\".\n- Step 3: 19h45 → \"huit heures moins le quart\" (a quarter to eight — note we jump up to the *next* hour).\n- Step 4: 20h40 → \"neuf heures moins vingt\" (twenty to nine — same logic: past 30 min, we count down from the next hour).\n\nRule of thumb: after :30, switch to \"[next hour] moins [minutes remaining]\".", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What is the gender of \"heure\", \"adresse\", \"réunion\", \"rendez-vous\", \"numéro\", \"problème\"? Why does this matter for interrogatives? (2 steps)", "answer": "- Step 1: Feminine: **une** heure, **une** adresse, **une** réunion. Masculine: **un** rendez-vous, **un** numéro, **un** problème.\n- Step 2: This matters because **quel/quelle** must agree with the noun's gender:\n+ \"**Quelle** heure est-il ?\" (f.)\n+ \"**Quelle** est votre adresse ?\" (f.)\n+ \"**Quel** est votre numéro ?\" (m.)\n+ \"Vous avez **un** problème ? — Oui, **un** petit.\" (m.)\n\nBe especially careful with **problème** — despite ending in -e (which usually signals feminine), it is masculine. Many Greek-origin words ending in -ème are masculine exceptions (système, problème, thème).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "In \"Nous avons rendez-vous à 16 heures\", why is there no article before \"rendez-vous\"? (2 steps)", "answer": "- Step 1: With **avoir rendez-vous** (to have an appointment), the article is often dropped — it's treated as a fixed expression, like English \"to have lunch\" (not \"a lunch\").\n- Step 2: Compare:\n+ \"J'ai **un** rendez-vous\" — emphasizes \"an appointment\" as one specific thing.\n+ \"J'ai rendez-vous **avec** Paul\" — fixed expression meaning \"I have an appointment with Paul\".\n\nBoth are correct; the article-less version is more idiomatic when followed by a time or person.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Numbers practice (mental, no calculation): How would you read 75, 85, 91, 99 aloud in French? (4 steps)", "answer": "- Step 1: 75 = soixante-quinze (60 + 15).\n- Step 2: 85 = quatre-vingt-cinq (4 × 20 + 5).\n- Step 3: 91 = quatre-vingt-onze (4 × 20 + 11). Note: NO \"et\" here — unlike 21, 31, 41, 51, 61, 71.\n- Step 4: 99 = quatre-vingt-dix-neuf (4 × 20 + 10 + 9).\n\nWhy no \"et\" in the 80s/90s? Because they're not \"X + 1\" in spelling — they're \"4 × 20 + n\", which already has a different internal structure. The \"et\" rule applies only to round-ten + un (and to soixante et onze, which is the special exception).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Compare: \"Il est urgent.\" vs \"C'est urgent.\" vs \"Ce n'est pas urgent.\" — explain each. (3 steps)", "answer": "- Step 1: **\"Il est urgent.\"** — Refers to a specific masculine noun (\"le problème est urgent\" → \"il est urgent\"). Personal pronoun usage.\n- Step 2: **\"C'est urgent.\"** — Impersonal/general evaluation. The situation, in vague terms, is urgent. Adjective stays masculine singular by default.\n- Step 3: **\"Ce n'est pas urgent.\"** — Negative of c'est. Notice \"ce\" stays full (not \"c'\") because the following word \"n'\" starts with a consonant. The \"n'\" itself is elided from \"ne\" before the vowel of \"est\".\n\nMini-rule: in c'est/ce n'est, the elision is always driven by the next sound. \"C'est\" because of vowel \"est\"; \"Ce n'est\" because \"n'\" is consonant-like at the start, even if it then elides further.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "You want to book a table for tomorrow at 7:30 pm for 2 people. Give a complete polite phone sentence. (2 steps)", "answer": "- Step 1: \"Bonjour, je voudrais réserver une table pour demain, à 19h30, pour deux personnes, s'il vous plaît.\"\n- Step 2: Building blocks:\n+ Polite request: **je voudrais + infinitive** (réserver).\n+ Time: **à 19h30** (official 24-hour system, appropriate for reservations).\n+ Day: **pour demain** (no article with \"demain\").\n+ Number of people: **pour [X] personnes**.\n\nThe restaurant will then likely ask for \"votre nom\" and \"votre numéro de téléphone\".", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "What's wrong with: \"Je suis désolé, je suis en retard pour la réunion à neuf heures et quart de matin\" — what subtle issue is there with the time expression? (2 steps)", "answer": "- Step 1: The sentence is grammatically fine but **mixes registers**. \"Neuf heures et quart\" is the *informal* time system, while business contexts (like apologizing for being late to a meeting) usually use the *official* system: \"neuf heures quinze\" or \"9h15\".\n- Step 2: Also, \"de matin\" should be \"**du matin**\" (de + le = du): \"neuf heures du matin\" = \"9 in the morning\". But in the official 24-hour system, you wouldn't need \"du matin\" at all because the number itself disambiguates (9h vs 21h).\n\nSo the cleaner version: \"...je suis en retard pour la réunion de 9h15.\"", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Why is \"Ce n'est rien !\" a common response to \"Pardon !\", and how does it differ in tone from \"Ce n'est pas grave !\"? (2 steps)", "answer": "- Step 1: **\"Ce n'est rien !\"** literally = \"It's nothing!\" Used for minor things — bumping into someone, small interruptions. Light, dismissive in a friendly way.\n- Step 2: **\"Ce n'est pas grave !\"** literally = \"It's not serious!\" Used for bigger apologies (being late, forgetting something). Reassures the apologizer that no real harm was done.\n\nBoth are forms of forgiveness but on different scales. A friend stepping on your toe: \"Ce n'est rien !\" A friend arriving 30 minutes late: \"Ce n'est pas grave !\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Synthesis: Build a complete polite phone reservation for a doctor's appointment, including: greeting, your request, asking for an urgent slot, confirming you got the day/time. (4 steps)", "answer": "- Step 1: Greeting: \"Allô, bonjour, madame.\" (Allô because it's by phone; bonjour for politeness; madame because the receptionist is female.)\n- Step 2: Request: \"Je voudrais un rendez-vous avec le docteur Gaillard, s'il vous plaît.\" (je voudrais + noun object, no infinitive needed since you're requesting a thing.)\n- Step 3: Urgency: \"C'est un peu urgent.\" (using **c'est + adjective**, impersonal.)\n- Step 4: Confirming a proposed slot: \"Mercredi à midi, c'est parfait.\" (Acknowledging with c'est + parfait — masculine singular default.)\n\nPolish: end with \"Au revoir, madame.\" Phone politeness always closes with a farewell + title.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "When writing a formal email in French, what are three standard formulas: opening greeting, polite closing-thanks, and sign-off? (3 steps)", "answer": "- Step 1: **Opening**: \"Bonjour, Monsieur\" or \"Bonjour, Madame\" — comma after Bonjour, capital M, no name needed in a first contact. (More formal: \"Madame, Monsieur,\".)\n- Step 2: **Polite closing-thanks**: \"Merci d'avance de votre réponse.\" (\"Thanks in advance for your reply.\") The structure \"de + noun\" expresses what you're thanking for.\n- Step 3: **Sign-off**: \"Cordialement,\" — neutral professional equivalent of \"Best regards,\". More formal: \"Bien cordialement,\" or \"Cordialement vôtre,\".\n\nFor a request inside the email: \"Est-ce que vous êtes libre vendredi après-midi ou lundi prochain ?\" — uses **est-ce que** to form a polite yes/no question.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Misconception check: A learner writes \"Je suis en réunion à Paris demain.\" Another writes \"J'ai une réunion à Paris demain.\" Are both correct, and what's the nuance? (2 steps)", "answer": "- Step 1: Both are grammatically correct, but they describe different things.\n+ **\"Je suis en réunion\"** = \"I am in a meeting\" — describes a current state of being unavailable. Usually used now/today.\n+ **\"J'ai une réunion\"** = \"I have a meeting\" — describes a scheduled event on your calendar. Works for past, present, or future.\n- Step 2: With \"demain\" (tomorrow), **\"J'ai une réunion à Paris demain\"** is more natural because you're talking about what's on the schedule. \"Je suis en réunion demain\" sounds odd because being \"in\" something implies right-now-state, hard to project into tomorrow.\n\nA natural office sentence: \"Demain, **j'ai** une réunion, mais aujourd'hui **je suis en** déplacement.\"", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Edge case: Why does \"Vous êtes\" have a circumflex on the \"ê\", but \"Tu es\" doesn't? (2 steps)", "answer": "- Step 1: The circumflex (^) on \"ê\" in **êtes** (and in the infinitive **être**) historically marks a lost \"s\" — Old French was \"estes\" / \"estre\", from Latin \"estis\" / \"essere\". As the \"s\" disappeared in pronunciation, the circumflex stayed to commemorate it.\n- Step 2: \"Es\" (tu form) never had a written \"s\" after the \"e\" historically (Latin \"es\"), so no circumflex is needed. The pattern: circumflex often signals a vanished consonant — île (← isle), forêt (← forest), hôpital (← hospital).\n\nThis isn't an A1 essential, but it explains why French spelling looks the way it does — it's a window into the language's history.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Quick recall: which verb (\"être\" or \"avoir\") goes with each office state? - libre - un rendez-vous - en réunion - un problème - en retard - une question (6 items)", "answer": "- Step 1: **être** + libre (state of being free).\n- Step 2: **avoir** + un rendez-vous (possession of a scheduled item).\n- Step 3: **être** + en réunion (state of being in a meeting).\n- Step 4: **avoir** + un problème (possession of a problem).\n- Step 5: **être** + en retard (state of being late).\n- Step 6: **avoir** + une question (possession of a question).\n\nPattern: **être + adjective/preposition phrase** (describes state), **avoir + noun with article** (describes possession of a thing/event).", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}], "count": 46}}, "meta": {"minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 4274, "out_tokens": 14224, "reasoning_chars": 2245, "cost_eur": 0.0152, "elapsed_s": 137, "content_chars": 48350}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 4274, "out_tokens": 10988, "reasoning_chars": 1718, "cost_eur": 0.0119, "elapsed_s": 103, "content_chars": 38240}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 6897, "out_tokens": 16557, "reasoning_chars": 0, "cost_eur": 1.2376, "elapsed_s": 234, "content_chars": 38996}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 6897, "out_tokens": 15724, "reasoning_chars": 0, "cost_eur": 1.1801, "elapsed_s": 223, "content_chars": 36916}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 4659, "out_tokens": 3462, "reasoning_chars": 3869, "cost_eur": 0.0047, "elapsed_s": 59, "content_chars": 9093}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 4659, "out_tokens": 4525, "reasoning_chars": 5431, "cost_eur": 0.0059, "elapsed_s": 75, "content_chars": 11497}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 4659, "out_tokens": 2774, "reasoning_chars": 3803, "cost_eur": 0.0039, "elapsed_s": 47, "content_chars": 6259}}};

}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
