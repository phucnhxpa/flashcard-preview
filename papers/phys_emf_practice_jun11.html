nstant — chemical and thermal effects make $$r$$ drift.\n- Step 2: This makes the slope at high $$I$$ unreliable; the line bends away from straight.\n- Step 3: Use only the low-current, linear portion to compute the gradient. If asked to explain the curvature: *the internal resistance is not constant at large currents.*", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "What are \"lost volts\" and why must they exist whenever current flows through a cell? (3 steps)", "answer": "- Step 1: \"Lost volts\" is the quantity $$\\varepsilon - V = Ir$$ — the energy per coulomb that's dissipated *inside* the cell before the charge even reaches the external circuit.\n- Step 2: They exist because the cell itself has internal resistance $$r$$. Any current $$I$$ flowing through that resistance drops a voltage $$Ir$$ across it, so each coulomb arrives at the terminals with less than its starting energy.\n- Step 3: This is why the voltmeter at the terminals can never read the full $$\\varepsilon$$ while current flows — some energy has already been wasted as heat in the cell.\n\nThe bigger the current, the bigger the lost volts — every extra ampere \"costs\" you more voltage off the top.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Synthesis: a thermistor is part of a temperature-protection circuit on a motor. Use $$I = nAve$$ and circuit reasoning to explain how warming the motor reduces the current flowing through it via the thermistor. (4 steps)", "answer": "- Step 1: Place an NTC thermistor in series with the motor. When the motor is cool, the thermistor's resistance is high (low $$n$$ in the thermistor at low temperature).\n- Step 2: Wait — for protection, you usually want *less* current when the motor is *hot*. With an NTC in series, hot ⇒ low $$R_{\\text{th}}$$ ⇒ *more* current. That's bad. So the circuit must use the thermistor differently: e.g., as part of a sensor that triggers a relay.\n- Step 3: Alternatively, use a PTC thermistor (positive temperature coefficient — resistance *rises* with heat) in series. Hot motor heats the PTC ⇒ $$R_{\\text{PTC}}$$ rises ⇒ total resistance rises ⇒ current $$I = \\varepsilon/R_{\\text{total}}$$ falls ⇒ motor protected.\n- Step 4: Via $$I = nAve$$: in the PTC, rising temperature *traps* carriers (in some materials, ions or domain effects reduce $$n$$ or carrier mobility), so $$n$$ effectively falls and resistance rises.\n\nThe synthesis: the same equation $$I = nAve$$ explains both NTC and PTC behaviour, depending on how $$n$$ changes with $$T$$ in the specific material.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "In Core Practical 8, why is it important to take readings over a **wide range** of currents (from as low as readable to as high as safe), rather than clustering readings in a narrow band? (2 steps)", "answer": "- Step 1: A wide spread of data points makes the **gradient calculation more accurate**. When you draw a line of best fit through points that span a large range on the x-axis, the triangle you use for the gradient has a large base ($$\\Delta I$$ is big), which reduces the fractional error in $$\\Delta I$$ and hence in the gradient.\n- Step 2: Clustered points (all in a narrow range of $$I$$) would make the line's slope very sensitive to small measurement errors — a tiny vertical scatter could swing the gradient significantly. A wide spread \"pins down\" both the slope and the intercept with much more confidence. This is why Alex targeted currents from 0.10 A to 0.50 A (a 5:1 range), not 0.40 A to 0.50 A.\n\nSpread your points wide: low current at one end, high current at the other. This is standard good practice for any graph-based determination.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "What is the physical significance of the **x-intercept** (where the V–I line crosses the current axis) on a V–I graph for a cell? What real situation does $$V = 0$$ correspond to? (2 steps)", "answer": "- Step 1: At the x-intercept, the terminal p.d. $$V = 0$$. From $$V = \\varepsilon - rI$$, this means $$\\varepsilon = rI$$, i.e. **all** the e.m.f. is being lost across the internal resistance. The entire energy per coulomb from the cell is dissipated as heat *inside the cell itself*, with nothing left for the external circuit.\n- Step 2: This corresponds to a **short circuit** — the external resistance $$R = 0$$ (imagine connecting a wire directly across the terminals). The current is then $$I_{\\text{max}} = \\varepsilon / r$$, which can be very large if $$r$$ is small. This is dangerous: a shorted car battery ($$\\varepsilon = 12$$ V, $$r \\approx 0.01\\;\\Omega$$) would deliver $$I = 1200$$ A and overheat violently.\n\nThe x-intercept shows the maximum current the cell can deliver — and it's the current when the external circuit offers zero resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "\"Charlie the clown / fuel tank\" intuition: how does it explain why $$V_{\\text{out}}$$ falls across one component when another component's resistance rises? (3 steps)", "answer": "- Step 1: Imagine each charge carries a fixed \"fuel tank\" of voltage (the e.m.f.) round the loop. Each resistor it passes through consumes some of this fuel, in proportion to the resistor's resistance.\n- Step 2: If one resistor gets bigger, it greedily eats a larger share of the fuel. Since the total amount of fuel is fixed (the e.m.f.), there's less left over for every other component.\n- Step 3: So $$V$$ across the *other* component must fall. This is the entire physics of a potential divider — voltage is a finite resource being shared according to resistance.\n\nThe intuition pump: voltage is the energy budget per coulomb; resistors are stores competing for shares.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A cell does work on charges, like a pump does work on water. The e.m.f. is the energy it gives each coulomb. But is e.m.f. energy being supplied *to* the charges, or energy transferred *by* the charges to something else?", "answer": "E.m.f. ($$\\varepsilon$$) is energy **supplied to** the charges by the source — it is the *cause*. Terminal p.d. ($$V$$) is energy transferred *by* the charges to the external circuit — it is the *effect*. Both share the same unit (volt), but they play opposite roles. Think: the cell *gives* energy (e.m.f.), the load *takes* energy (terminal p.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "What is meant by the term \"lost volts\" in a circuit? Derive the expression for lost volts and explain why this term is appropriate. (3 steps)", "answer": "- Step 1: \"Lost volts\" refers to the voltage drop across the internal resistance of a power source. It is the energy per coulomb that is dissipated as heat inside the cell itself rather than being delivered to the external load.\n\n- Step 2: From ε = V + Ir, rearranged as ε − V = Ir. The term Ir is the lost volts — it represents voltage \"lost\" before charges reach the terminals.\n\n- Step 3: The term is appropriate because this energy is not available to do useful work in the external circuit — it is \"lost\" as thermal energy in the internal resistance. The more current you draw, the greater the lost volts, so heavy loads make the terminal voltage drop significantly.\n\n[Takeaway: Lost volts = Ir, increases with current]", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "Alex's analogy: \"Charlie the clown has a fuel tank of voltage.\" Explain this analogy and use it to explain why, in a potential divider, increasing one resistor's value causes the voltage across the *other* resistor to decrease. (3 steps)", "answer": "- Step 1: The \"fuel tank\" represents the e.m.f. $$\\varepsilon$$ — the total energy per coulomb the cell provides. Each coulomb (Charlie) starts with a full tank of voltage and must \"spend\" it all by the time it goes around the loop. The total spent equals the total available: $$\\varepsilon = V_1 + V_2$$.\n- Step 2: In a potential divider with two resistors in series, each resistor \"eats\" a share of the tank proportional to its resistance. If $$R_1$$ increases, it demands a **bigger gulp** of the voltage tank — more energy per coulomb is dropped across it.\n- Step 3: Since the total tank is fixed ($$\\varepsilon$$ is constant), if $$R_1$$ takes more, there is **less left** for $$R_2$$. So $$V_1$$ increases and $$V_2$$ decreases. Charlie can't spend more than he has — it's conservation of energy per coulomb in action.\n\nThe fuel-tank analogy makes voltage division intuitive: a bigger resistor claims a bigger share of the fixed \"tank\" of voltage, leaving less for everything else.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "In the PhET simulation, Alex kept telling Phuc to \"keep the wire resistivity at zero\" and not to adjust the battery resistance slider. Explain why wire resistivity being zero is important for CP8's validity. (2 steps)", "answer": "- Step 1: CP8 models the circuit as having only two resistances: the internal resistance $$r$$ and the external load $$R$$. If the connecting wires also have resistance, that adds a third resistance in series, and the simple equation $$\\varepsilon = V + Ir$$ no longer applies directly (the voltmeter reading would be affected by the wire resistance too).\n- Step 2: Setting wire resistivity to zero ensures the wires are ideal conductors with no resistance, so the only resistances in the circuit are $$r$$ and $$R$$. In a real lab, we use thick, short copper wires to minimise wire resistance for the same reason.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "The Edexcel data booklet gives the formula as $$I = nqvA$$ instead of $$I = nAve$$. Reconcile these two forms — what corresponds to what? (2 steps)", "answer": "- Step 1: Both forms are the same equation with the symbols in a different order. In the data booklet: $$n$$ = number density, $$q$$ = charge on each carrier, $$v$$ = drift velocity, $$A$$ = cross-sectional area. In the lesson form: $$n$$ = number density, $$A$$ = area, $$v$$ = drift velocity, $$e$$ = electron charge.\n- Step 2: The only symbol difference is $$q$$ vs $$e$$. $$q$$ is the general symbol for the charge on any carrier; $$e$$ specifically means the electron charge ($$1.6 \\times 10^{-19}\\;C$$). When the carriers are electrons, $$q = e$$ and the two forms are identical. Use $$e$$ when dealing with metals (electron conductors); use $$q$$ for other carriers (e.g. ions in solution).", "source": "GLM 5.1 ②", "_id": "glm_2_59"}, {"question": "Conceptually, why does Alex's \"Charlie the clown / shopping bags\" intuition fit $$I = nAve$$? (3 steps)", "answer": "- Step 1: The shopping bags analogy: $$n$$ = how many bags you're carrying (number of charge carriers); $$v$$ = how fast you can walk while carrying them.\n- Step 2: Carrying many bags at once (high $$n$$) lets you deliver lots of goods even if you walk slowly (low $$v$$). Few bags but fast running (low $$n$$, high $$v$$) can deliver the same total.\n- Step 3: Current is the \"delivery rate\" — it depends on the *product* of how many carriers and how fast each moves, not either alone.\n\nThis makes the trade-off intuitive: in metals, $$n$$ is enormous and $$v$$ is tiny; in semiconductors, both are smaller, which is why their currents are limited.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why does the $$V$$–$$I$$ method (CP8) for finding $$\\varepsilon$$ and $$r$$ work even though you can never *directly* measure the e.m.f. while current flows? (3 steps)", "answer": "- Step 1: Whenever current flows, the voltmeter reads only the terminal p.d. $$V = \\varepsilon - Ir$$, not the e.m.f. itself. So a single measurement can't give you $$\\varepsilon$$.\n- Step 2: But by collecting *many* ($$V, I$$) pairs and fitting a straight line, you can *extrapolate* the line back to $$I = 0$$ — the hypothetical no-current case where the lost volts vanish.\n- Step 3: At $$I = 0$$, $$V = \\varepsilon$$ exactly. The $$y$$-intercept of the best-fit line is the e.m.f., even though you never actually measure with zero current. This is the elegance of CP8: the *graph* tells you what no single measurement can.\n\nThe line \"remembers\" what the cell would do at $$I = 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Why does the $$V$$–$$I$$ line slope *downward* rather than upward, and what would an upward slope physically mean?", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, since $$r > 0$$, increasing $$I$$ subtracts more from $$\\varepsilon$$, so $$V$$ falls.\n- Step 2: An upward slope would require $$r < 0$$ — i.e. the cell would *gain* terminal voltage as you drew more current, which violates energy conservation (you'd be getting more out than you put in).\n- Step 3: So a downward slope is a direct fingerprint of the cell being a passive energy source with real internal dissipation.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Alex's \"shopping bags\" analogy: carrying many bags at once vs. carrying few bags but walking faster. How does this map onto the equation $$I = nAve$$, and what is the trade-off it illustrates? (2 steps)", "answer": "- Step 1: \"Many bags at once\" represents **high number density $$n$$** — lots of charge carriers moving simultaneously. \"Few bags but walking faster\" represents **high drift velocity $$v$$** — fewer carriers but each moving quickly. Current $$I = nAve$$ is the product of these: it's the *total flow rate* of charge, which can be achieved either way.\n- Step 2: The trade-off: in a given material (fixed $$n$$), if you want more current, you must increase $$v$$ (by applying a larger voltage, which creates a stronger electric field). But in a material with higher $$n$$ (like copper vs. a semiconductor), you need a **smaller** drift velocity to achieve the same current — the carriers don't have to move as fast because there are so many of them.\n\nHigh $$n$$ (metals) → slow drift is enough. Low $$n$$ (semiconductors) → carriers must drift faster for the same current, or you need a larger area $$A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Derive $$I = nAve$$ from first principles, starting from $$I = Q/t$$. (5 steps)", "answer": "- Step 1: Start with the definition of current: $$I = \\frac{Q}{t}$$, where $$Q$$ is the charge passing a point in time $$t$$.\n- Step 2: Express the total charge. The charge in a length of wire = (carriers per $$m^3$$) × (volume) × (charge per carrier): $$Q = n \\times \\text{Volume} \\times e$$.\n- Step 3: The volume of a cylindrical section of wire = cross-sectional area × length = $$A \\times s$$, where $$s$$ is the length. So $$Q = nAse$$.\n- Step 4: Substitute into the current formula: $$I = \\frac{nAse}{t} = nAe\\left(\\frac{s}{t}\\right)$$.\n- Step 5: The distance $$s$$ travelled in time $$t$$ gives the drift velocity: $$v = \\frac{s}{t}$$. Therefore $$I = nAve$$.\n\nThis derivation shows that current depends on *how many* carriers there are ($$n$$), *how much area* they flow through ($$A$$), *how fast* they drift ($$v$$), and *how much charge* each carries ($$e$$).", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "A student computes a gradient of $$-14.29\\;V\\,A^{-1}$$ from a $$V$$–$$I$$ graph and writes \"$$r = -14.29\\;\\Omega$$\". Identify the error and give the correct answer. (2 steps)", "answer": "- Step 1: The gradient equals $$-r$$, so $$r = -(\\text{gradient})$$. The student forgot the minus sign — they wrote $$r$$ equal to the gradient instead of the *negative* of the gradient.\n- Step 2: Correct: $$r = -(-14.29) = 14.3\\;\\Omega$$ (rounded to 3 significant figures). Internal resistance must be positive. This is exam trap #1: always apply $$r = -(\\text{gradient})$$, not $$r = \\text{gradient}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "A student says: \"If I double the external resistance $$R$$, the terminal p.d. $$V$$ also doubles.\" Is this correct? Use the cell equation to explain why or why not. (3 steps)", "answer": "- Step 1: This is **incorrect** — the relationship between $$R$$ and $$V$$ is not proportional. From $$V = IR$$ and $$I = \\varepsilon/(R+r)$$, we get $$V = \\frac{\\varepsilon R}{R+r}$$.\n- Step 2: If $$R$$ doubles (say from $$R$$ to $$2R$$), the new terminal p.d. is $$V' = \\frac{\\varepsilon \\cdot 2R}{2R + r}$$. This is **not** twice $$\\frac{\\varepsilon R}{R+r}$$, because the denominator also changes. Doubling $$R$$ reduces the current (which reduces the lost volts), but the terminal p.d. increases by **less** than a factor of two.\n- Step 3: In the limiting case where $$R \\gg r$$, doubling $$R$$ barely changes $$V$$ (it's already close to $$\\varepsilon$$). Where $$R \\ll r$$, doubling $$R$$ approximately doubles $$V$$ (since $$V \\approx \\varepsilon R / r$$ when $$R \\ll r$$). The relationship is nonlinear — $$V$$ approaches $$\\varepsilon$$ asymptotically as $$R$$ increases.\n\n$$V$$ and $$R$$ are not proportional — the internal resistance \"buffers\" the relationship. More $$R$$ means more $$V$$, but with diminishing returns.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Two identical cells are connected in **parallel** (same polarity). What is the total e.m.f. and the total internal resistance? Explain using the physical reasoning. (2 steps)", "answer": "- Step 1: The total e.m.f. is **still $$\\varepsilon$$**, not $$2\\varepsilon$$. In parallel, both cells are connected across the same two terminals — a coulomb passing through the combination only goes through *one* cell (not both), so it only receives the energy from one cell. The e.m.f. doesn't add in parallel.\n- Step 2: The total internal resistance **halves** to $$r/2$$. Two resistances $$r$$ in parallel give $$r_{\\text{total}} = r/2$$. Physically, the current splits between the two cells, so each carries half the total current — each cell's internal resistance \"sees\" less current and wastes less voltage. The combination can deliver more current with less internal loss.\n\nParallel cells: same e.m.f., half the internal resistance. Useful when you need high current delivery without the voltage doubling.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the definition of electromotive force (e.m.f.), and why is the term \"force\" misleading? (3 steps)", "answer": "- Step 1: E.m.f. ($$\\varepsilon$$) is defined as the energy supplied per unit charge by the source, converting other forms of energy into electrical energy.\n- Step 2: Mathematically, it is expressed as $$\\varepsilon = \\frac{W}{Q}$$, where $$W$$ is the energy converted and $$Q$$ is the charge passing.\n- Step 3: The term \"force\" is misleading because e.m.f. is not a mechanical push or a Newtonian force; it is an energy per unit charge, measured in volts ($$1\\text{ V} = 1\\text{ J C}^{-1}$$).\n\nTakeaway: E.m.f. is about energy transfer *to* the charges, not a physical force acting on them.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Both e.m.f. ($$\\varepsilon$$) and terminal potential difference ($$V$$) are measured in volts, but they represent opposite energy directions. What is the distinction between them? (2 steps)", "answer": "- Step 1: E.m.f. is the energy *supplied to* each coulomb by the source (the cause of the current).\n- Step 2: Terminal p.d. is the energy *transferred by* each coulomb to the external circuit (the effect). They have the same unit but opposite roles in the energy transfer process.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Starting from conservation of energy for one coulomb traveling around a series circuit containing a cell and an external resistor, derive the cell equation linking e.m.f. ($$\\varepsilon$$), terminal p.d. ($$V$$), current ($$I$$), and internal resistance ($$r$$). (3 steps)", "answer": "- Step 1: The energy supplied per coulomb by the cell ($$\\varepsilon$$) must equal the energy used per coulomb in the external resistor ($$V_1$$) plus the energy used per coulomb in the internal resistance ($$V_2$$). So, $$\\varepsilon = V_1 + V_2$$.\n- Step 2: Use Ohm's law ($$V = IR$$) for each resistance. The terminal p.d. is the p.d. across the external resistor, so $$V = V_1 = IR$$. The p.d. across the internal resistance is $$V_2 = Ir$$.\n- Step 3: Substitute these into the energy conservation equation to get the cell equation: $$\\varepsilon = V + Ir$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "What are the \"lost volts\" in a circuit, and how do they explain why terminal p.d. is less than e.m.f. when a current flows? (2 steps)", "answer": "- Step 1: \"Lost volts\" is the term for the potential difference dropped across the internal resistance of the cell, calculated as $$Ir$$.\n- Step 2: From the rearranged cell equation $$V = \\varepsilon - Ir$$, whenever a current $$I$$ flows, some e.m.f. is \"lost\" inside the cell ($$Ir$$), leaving the terminal p.d. $$V$$ strictly smaller than the e.m.f. $$\\varepsilon$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A voltmeter is connected across the terminals of an isolated cell with no external circuit attached. What does the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter reads the e.m.f. ($$\\varepsilon$$) of the cell.\n- Step 2: With no external circuit, the current $$I = 0$$. Therefore, the lost volts $$Ir = 0$$, and the cell equation $$V = \\varepsilon - Ir$$ simplifies to $$V = \\varepsilon$$. The terminal p.d. equals the full e.m.f. (This is the \"open circuit\" condition).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "To find the e.m.f. and internal resistance of a cell, a $$V-I$$ graph is plotted. By comparing $$V = \\varepsilon - rI$$ to the straight-line equation $$y = mx + c$$, what do the y-intercept and gradient represent? (2 steps)", "answer": "- Step 1: The y-intercept (where $$I = 0$$) represents the e.m.f. $$\\varepsilon$$. This is the terminal p.d. when no current flows and no voltage is lost internally.\n- Step 2: The gradient represents $$-r$$. Because internal resistance $$r$$ is a positive physical quantity, the graph slopes downwards (negative gradient), and $$r = -(\\text{gradient})$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In Core Practical 8, what is the purpose of the variable resistor in the circuit, and what must remain constant throughout the experiment? (2 steps)", "answer": "- Step 1: The variable resistor acts as the external load $$R$$, allowing you to change and control the current $$I$$ in the circuit to take a range of readings for the terminal p.d. $$V$$.\n- Step 2: The internal resistance $$r$$ of the cell must remain constant. If $$r$$ changes between readings, the data points will not lie on a single straight line, making the gradient calculation meaningless.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "In a real experiment, the $$V-I$$ graph for a cell may curve downwards at large currents. Why does this happen, and what does it imply about the internal resistance? (2 steps)", "answer": "- Step 1: At large currents, more power is dissipated as heat inside the cell ($$P = I^2r$$), causing the cell's temperature to rise significantly.\n- Step 2: This heating can cause the internal resistance $$r$$ to change (typically increase). Since the straight-line graph method assumes $$r$$ is a constant, a changing $$r$$ causes the line to curve, making the gradient steeper at high currents.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In a simple series circuit with a cell and one external resistor, a voltmeter across the cell's terminals and a voltmeter across the external resistor give the same reading. Why? (2 steps)", "answer": "- Step 1: The terminal p.d. ($$V$$) is the voltage available to the external circuit after the lost volts are dropped inside the cell.\n- Step 2: Since the external resistor is the *only* component in the external circuit, all of the remaining terminal p.d. must be dropped across it. Therefore, $$V_{\\text{terminal}} = V_R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A cell has an e.m.f. of $$12\\text{ V}$$ and an internal resistance of $$2.0\\ \\Omega$$. If a current of $$1.0\\text{ A}$$ flows, what is the terminal p.d.? (2 steps)", "answer": "- Step 1: Write down the cell equation for terminal p.d.: $$V = \\varepsilon - Ir$$.\n- Step 2: Substitute the values: $$V = 12 - (1.0 \\times 2.0) = 10\\text{ V}$$. The lost volts are $$2\\text{ V}$$, leaving $$10\\text{ V}$$ delivered to the external circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A $$V-I$$ graph for a cell has a y-intercept of $$9.0\\text{ V}$$ and passes through the point $$(2.0\\text{ A}, 5.0\\text{ V})$$. What are the e.m.f. and internal resistance? (3 steps)", "answer": "- Step 1: The y-intercept represents the e.m.f. when $$I = 0$$, so $$\\varepsilon = 9.0\\text{ V}$$.\n- Step 2: Calculate the gradient using the intercept $$(0, 9.0)$$ and the data point $$(2.0, 5.0)$$: $$\\text{gradient} = \\frac{5.0 - 9.0}{2.0 - 0} = \\frac{-4.0}{2.0} = -2.0\\ \\text{V A}^{-1}$$.\n- Step 3: The internal resistance is $$r = -(\\text{gradient}) = -(-2.0) = 2.0\\ \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When determining the gradient of a $$V-I$$ graph, why is it important to use a large triangle that spans most of the line of best fit? (2 steps)", "answer": "- Step 1: All experimental data has uncertainty in reading the coordinates. Using a small triangle magnifies the relative error in reading the graph.\n- Step 2: A large triangle maximizes $$\\Delta V$$ and $$\\Delta I$$, reducing the percentage error in the gradient calculation and giving a much more accurate value for $$r$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Starting from the definition of current $$I = Q/t$$, derive the formula $$I = nAve$$, explaining what each term represents. (4 steps)", "answer": "- Step 1: Consider a length of wire with cross-sectional area $$A$$. The total charge $$Q$$ flowing is the number of carriers per unit volume ($$n$$) times the volume ($$A \\times s$$, where $$s$$ is length) times the charge of each carrier ($$e$$). So, $$Q = n A s e$$.\n- Step 2: Substitute this into the current equation: $$I = \\frac{Q}{t} = \\frac{n A s e}{t}$$.\n- Step 3: Rearrange to group terms: $$I = n A e \\left(\\frac{s}{t}\\right)$$.\n- Step 4: Recognize that distance over time is velocity, so $$\\frac{s}{t} = v$$ (the drift velocity). Thus, $$I = n A v e$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "In the equation $$I = nAve$$, what does the variable $$n$$ represent, and what are its SI units? Why is it incorrect to think of it as a per-unit-area quantity? (2 steps)", "answer": "- Step 1: $$n$$ represents the charge-carrier (number) density, which is the number of free charge carriers per unit volume. Its SI unit is $$\\text{m}^{-3}$$.\n- Step 2: It is a volume density because we are counting how many carriers exist within a 3D section of the wire (volume $$= A \\times s$$), not just across a 2D cross-sectional area.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Typical drift velocities of electrons in a wire are extremely slow (fractions of a mm/s). Intuitively, why doesn't it take hours for a light to turn on when you flip a switch? (2 steps)", "answer": "- Step 1: The number density $$n$$ of free electrons in a conductor like copper is enormous (around $$10^{28} \\text{ m}^{-3}$$). Because there are so many charge carriers, a very slow drift velocity is sufficient to carry a large current ($$I = nAve$$).\n- Step 2: When the switch is closed, the electric field propagates through the wire at near the speed of light, causing *all* electrons along the wire to start drifting almost simultaneously, so the light turns on instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "An NTC thermistor is heated. Explain what happens to its resistance by referencing the charge-carrier density $$n$$. (3 steps)", "answer": "- Step 1: As temperature increases, more electrons are freed from the atoms in the thermistor material, so the charge-carrier density $$n$$ increases.\n- Step 2: From the equation $$I = nAve$$, an increase in $$n$$ means more current can flow for the same applied voltage (assuming $$A$$, $$v$$, and $$e$$ remain relatively constant or their product is dominated by the $$n$$ increase).\n- Step 3: Since $$R = \\frac{V}{I}$$, if $$I$$ increases for a constant $$V$$, the resistance $$R$$ must decrease.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "How does the resistance of an LDR change when it is placed in the dark, and why? (2 steps)", "answer": "- Step 1: In the dark, fewer photons are available to liberate electrons, so the charge-carrier density $$n$$ decreases.\n- Step 2: With fewer free charge carriers, less current can flow for a given voltage, meaning the resistance increases.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A student calculates the gradient of a $$V-I$$ graph for a cell as $$-3.0\\ \\text{V A}^{-1}$$ and writes that the internal resistance $$r = -3.0\\ \\Omega$$. What is their mistake? (2 steps)", "answer": "- Step 1: The student forgot that the gradient equals $$-r$$, not $$r$$. Internal resistance is a positive physical quantity and cannot be negative.\n- Step 2: The correct calculation is $$r = -(\\text{gradient}) = -(-3.0) = 3.0\\ \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "If a student accidentally plots current $$I$$ on the vertical axis and voltage $$V$$ on the horizontal axis instead of the standard $$V-I$$ graph, how would the relationship between the gradient and the internal resistance $$r$$ change? (2 steps)", "answer": "- Step 1: The original relationship is $$V = \\varepsilon - rI$$. Rearranging for $$I$$ as the dependent variable gives $$rI = \\varepsilon - V$$, so $$I = \\frac{\\varepsilon}{r} - \\frac{1}{r}V$$.\n- Step 2: Comparing to $$y = mx + c$$, the new gradient is $$-\\frac{1}{r}$$, not $$-r$$. Therefore, the internal resistance would be found using $$r = -\\frac{1}{\\text{gradient}}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student says \"In a parallel circuit, voltage is shared across the branches.\" Correct this statement and explain the actual rule. (2 steps)", "answer": "- Step 1: In a parallel circuit, the voltage is the *same* across all branches, not shared. The total voltage of the source is dropped across each parallel branch independently.\n- Step 2: It is the *current* that is shared (splits) between the branches. The total current from the source equals the sum of the currents in the parallel branches.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "To use the formula $$I = nAve$$, a student has a wire cross-sectional area given as $$1 \\text{ mm}^2$$ and a carrier density of $$10^{20} \\text{ mm}^{-3}$$. Why must they convert these to meters before calculating, and what is $$1 \\text{ mm}^2$$ in $$\\text{m}^2$$? (2 steps)", "answer": "- Step 1: The formula relies on SI base units to be dimensionally consistent. Mixing millimeters and meters will result in an answer that is off by orders of magnitude.\n- Step 2: Since $$1 \\text{ mm} = 10^{-3} \\text{ m}$$, squaring the length gives $$1 \\text{ mm}^2 = (10^{-3} \\text{ m})^2 = 10^{-6} \\text{ m}^2$$. Similarly, cubing gives $$1 \\text{ mm}^3 = 10^{-9} \\text{ m}^3$$, so the density $$n$$ becomes $$10^{29} \\text{ m}^{-3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When preparing for the ESAT (Cambridge admissions test), why is it inefficient to study entire A-Level Physics chapters from start to finish? (2 steps)", "answer": "- Step 1: The ESAT does not cover whole chapters; it only tests specific sections of some chapters (e.g., only the first section of Atomic Structure, or a couple of sections of Radioactive Decay).\n- Step 2: Therefore, you must prioritize the ESAT-relevant sections first to optimize your time before the October/January sittings, rather than wasting time on content that won't be tested.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}], "count": 22}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A cell does work on charges, like a pump does work on water. The e.m.f. is the energy it gives each coulomb. But is e.m.f. energy being supplied *to* the charges, or energy transferred *by* the charges to something else?", "answer": "E.m.f. ($$\\varepsilon$$) is energy **supplied to** the charges by the source — it is the *cause*. Terminal p.d. ($$V$$) is energy transferred *by* the charges to the external circuit — it is the *effect*. Both share the same unit (volt), but they play opposite roles. Think: the cell *gives* energy (e.m.f.), the load *takes* energy (terminal p.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "Define e.m.f. using a formula involving energy and charge, and state its SI unit. (2 steps)", "answer": "- Step 1: The definition formula is $$\\varepsilon = \\frac{W}{Q}$$, where $$W$$ is the energy converted into electrical energy by the source and $$Q$$ is the charge passing through. In words: e.m.f. is the energy per unit charge converted into electrical energy by the source.\n- Step 2: The SI unit is the volt ($$V$$), which equals $$J\\,C^{-1}$$ (joules per coulomb). This follows directly from the formula: energy (J) divided by charge (C).\n\nThe exam-safe one-liner: \"energy supplied per unit charge\" — not \"a force,\" not \"voltage across the terminals.\"", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Why is it wrong to define e.m.f. as \"a force that pushes electrons around a circuit\"?", "answer": "E.m.f. is **not** a force despite its name (\"electromotive *force*\"). It is an energy per unit charge, measured in volts ($$J\\,C^{-1}$$). A force would be measured in newtons ($$N$$). The historical name is misleading — the e.m.f. tells you how much *energy* each coulomb receives from the source, not how much *mechanical force* acts on the charges. This is a classic exam trap: never define e.m.f. as a force.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "On a circuit diagram, a cell of e.m.f. $$\\varepsilon$$ has internal resistance $$r$$ in series with an external resistor $$R$$. A voltmeter reads $$V$$ across $$R$$. Starting from conservation of energy for one coulomb going round the loop, derive $$\\varepsilon = V + Ir$$. (3 steps)", "answer": "- Step 1: Conservation of energy per coulomb: the total energy supplied by the cell must equal the total energy used in the circuit. So $$\\varepsilon = V_1 + V_2$$, where $$V_1$$ is the p.d. across the external resistor $$R$$ and $$V_2$$ is the p.d. across the internal resistance $$r$$.\n- Step 2: Express each p.d. using Ohm's law. The same current $$I$$ flows through both (series circuit), so $$V_1 = IR$$ and $$V_2 = Ir$$.\n- Step 3: The terminal p.d. is what the voltmeter across $$R$$ reads: $$V \\equiv V_1 = IR$$. Substituting: $$\\varepsilon = V + Ir$$.\n\nThis is the foundational cell equation — everything else in this topic is a rearrangement of this.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "From $$\\varepsilon = V + Ir$$, rearrange to get the form that is directly useful for a $$V$$–$$I$$ graph. What does each term correspond to in $$y = mx + c$$? (2 steps)", "answer": "- Step 1: Rearrange $$\\varepsilon = V + Ir$$ by subtracting $$Ir$$ from both sides: $$V = \\varepsilon - Ir$$, or equivalently $$V = -rI + \\varepsilon$$.\n- Step 2: Compare with $$y = mx + c$$: $$y = V$$, $$x = I$$, the gradient $$m = -r$$, and the $$y$$-intercept $$c = \\varepsilon$$. This means plotting $$V$$ (vertical) against $$I$$ (horizontal) gives a straight line sloping downwards, meeting the $$V$$-axis at the e.m.f.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Write the four forms of the cell equation and state when each is most useful. (2 steps)", "answer": "- Step 1: The four forms are:\n+ $$\\varepsilon = V + Ir$$ — the fundamental form; useful when you know terminal p.d. and want lost volts or e.m.f.\n+ $$V = \\varepsilon - Ir$$ — rearranged for the graph; directly maps to $$y = mx + c$$\n+ $$\\varepsilon = I(R + r)$$ — \"circuit e.m.f.\"; treats $$r$$ as just another series resistor; useful for finding total current\n+ $$I = \\frac{\\varepsilon}{R + r}$$ — solved for current; useful when you need the current through the whole loop\n- Step 2: All four are the same physics — they are algebraic rearrangements of energy conservation per coulomb. Pick the one that has the unknown you want isolated on one side.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "What are the \"lost volts\" in a circuit with a real cell, and why can a voltmeter at the terminals never read the full e.m.f. while current flows? (2 steps)", "answer": "- Step 1: \"Lost volts\" = $$\\varepsilon - V = Ir$$. This is the energy per coulomb dissipated (wasted) inside the cell itself due to its internal resistance. Every coulomb must push through $$r$$ to leave the cell, spending some energy there before reaching the terminals.\n- Step 2: The voltmeter at the terminals reads only the terminal p.d. $$V = \\varepsilon - Ir$$, which is always less than $$\\varepsilon$$ when $$I > 0$$. The voltmeter cannot \"see\" the energy already lost inside the cell — it only measures what arrives at the terminals.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A cell is connected to an open circuit (no external load, so $$I = 0$$). What does the voltmeter across its terminals read, and why? (2 steps)", "answer": "- Step 1: Substitute $$I = 0$$ into $$V = \\varepsilon - Ir$$: $$V = \\varepsilon - 0 = \\varepsilon$$.\n- Step 2: With no current flowing, there are no lost volts ($$Ir = 0$$), so no energy is wasted inside the cell. The voltmeter reads the full e.m.f. This is the only situation where terminal p.d. equals e.m.f.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A cell of e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ is short-circuited (external resistance $$R = 0$$). What is the terminal p.d. and the current? Qualitatively, why is this dangerous? (3 steps)", "answer": "- Step 1: With $$R = 0$$, the current is $$I = \\frac{\\varepsilon}{R + r} = \\frac{\\varepsilon}{r}$$. Since $$r$$ is typically small (fractions of an ohm), this current is very large.\n- Step 2: The terminal p.d. is $$V = \\varepsilon - Ir = \\varepsilon - \\varepsilon = 0$$. All the e.m.f. is dropped across the internal resistance — the entire energy per coulomb is \"lost volts.\"\n- Step 3: This is dangerous because the huge current through $$r$$ dissipates power $$P = I^2 r$$ inside the cell, generating intense heat. The cell can overheat, leak, or explode. This is why you never short-circuit a real battery.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "On a $$V$$–$$I$$ graph for a real cell, the line slopes downwards. Explain physically why the gradient must be negative — what does each extra ampere of current *do*? (2 steps)", "answer": "- Step 1: Each extra ampere of current increases the lost volts by $$Ir$$. More current means more energy wasted inside the cell per coulomb.\n- Step 2: Since $$V = \\varepsilon - Ir$$, as $$I$$ increases, $$V$$ decreases. The gradient is $$-r$$, which is negative because $$r$$ is positive. Physically: every additional ampere \"costs\" you $$r$$ volts of terminal p.d. The line must slope down — a positive gradient would imply that pulling more current *increases* the terminal p.d., which violates energy conservation.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "On a $$V$$–$$I$$ graph, you accidentally plot $$I$$ on the vertical axis and $$V$$ on the horizontal axis. What would the gradient of this graph represent, and why is this wrong for finding $$r$$ directly? (2 steps)", "answer": "- Step 1: The correct graph plots $$V$$ (y) against $$I$$ (x), giving gradient $$= -r$$. If you swap the axes, you are plotting $$I$$ against $$V$$, i.e. $$I = \\frac{1}{r}V - \\frac{\\varepsilon}{r}$$, so the gradient becomes $$\\frac{1}{r}$$ (or more precisely $$-\\frac{1}{r}$$ depending on orientation), not $$-r$$.\n- Step 2: You would need to take the *reciprocal* of the gradient (and handle the sign) to recover $$r$$, which is an extra step that introduces error. The exam expects you to plot $$V$$ vertically and $$I$$ horizontally — always check your axes before computing.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "From a $$V$$–$$I$$ graph, you read the $$y$$-intercept as 6.0 V and the gradient as $$-1.5\\;V\\,A^{-1}$$. State the e.m.f. and internal resistance with units. (2 steps)", "answer": "- Step 1: The $$y$$-intercept (where $$I = 0$$) equals the e.m.f.: $$\\varepsilon = 6.0\\;V$$.\n- Step 2: The gradient equals $$-r$$, so $$r = -(\\text{gradient}) = -(-1.5) = 1.5\\;\\Omega$$. The unit follows from $$V\\,A^{-1} = \\Omega$$. Never quote a negative internal resistance — the negative sign belongs to the gradient, not to $$r$$ itself.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Why must you never quote a negative value for internal resistance $$r$$, even though the gradient of the $$V$$–$$I$$ graph is negative? (2 steps)", "answer": "- Step 1: The gradient equals $$-r$$, so $$r = -(\\text{gradient})$$. The gradient is negative, so $$r = -(\\text{negative}) = \\text{positive}$$. Resistance is a positive physical quantity — it represents opposition to current flow and cannot be negative for a passive component.\n- Step 2: The exam trap is writing \"$$r = -1.5\\;\\Omega$$\" because you read the gradient as $$-1.5$$ and forgot the extra minus sign. Always: $$r = -(\\text{gradient})$$, which flips the sign back to positive.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "In Core Practical 8, what is the purpose of the variable resistor (rheostat), and why must you change *only* this resistor — never the internal resistance — between readings? (2 steps)", "answer": "- Step 1: The variable resistor is the external load $$R$$. Changing it varies the current $$I$$ through the circuit, giving you different ($$I$$, $$V$$) data points to plot. You need a spread of currents to draw a meaningful line of best fit.\n- Step 2: The entire method assumes $$r$$ is a single, constant unknown you are trying to measure. If you change $$r$$ between readings, the data points no longer lie on one straight line — each point would correspond to a *different* cell. The gradient would be meaningless. Set $$r$$ once at the start and never touch it again.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "In the CP8 circuit, a voltmeter is placed across the cell's terminals and another across the external resistor $$R$$. Why do both read the same value? (2 steps)", "answer": "- Step 1: With only one external resistor in the loop, the terminal p.d. (voltage at the cell's output) is entirely dropped across $$R$$. There are no other external components sharing the voltage.\n- Step 2: Therefore $$V_{\\text{terminal}} = V_R$$. Both voltmeters measure the same potential difference. In practice, you only need one voltmeter — you can delete the other.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In CP8, at very large currents the $$V$$–$$I$$ graph may curve instead of staying straight. Explain why, and state what this means about the internal resistance. (2 steps)", "answer": "- Step 1: At large currents, the cell heats up significantly. Heating changes the material properties inside the cell, so the internal resistance $$r$$ is no longer constant — it depends on temperature.\n- Step 2: Since the straight-line method assumes constant $$r$$, the data points at high $$I$$ deviate from the straight line. The gradient at low currents (where $$r$$ is stable) gives the true $$r$$. If asked why your line curves: \"the internal resistance is not constant at large currents.\"", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "When computing the gradient of a $$V$$–$$I$$ graph for CP8, why should you choose two points far apart on the line of best fit rather than two adjacent data points? (2 steps)", "answer": "- Step 1: The gradient is $$\\frac{\\Delta V}{\\Delta I}$$. Any uncertainty in reading coordinates (say ± a small amount) becomes a *fraction* of $$\\Delta V$$ and $$\\Delta I$$. A larger triangle means larger $$\\Delta V$$ and $$\\Delta I$$, so the fractional uncertainty is smaller.\n- Step 2: Using two close-together points amplifies the effect of reading errors on the gradient. A big triangle minimises this — it's a standard graph skill the exam rewards. Also, use points *on the line of best fit*, not raw data points, since the line smooths out random error.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 12\\;V$$ and $$r = 2\\;\\Omega$$. It is connected to an external resistor $$R = 10\\;\\Omega$$. Find the current and the terminal p.d. (3 steps)", "answer": "- Step 1: Use $$I = \\frac{\\varepsilon}{R + r} = \\frac{12}{10 + 2} = \\frac{12}{12} = 1.0\\;A$$.\n- Step 2: Find terminal p.d. using $$V = \\varepsilon - Ir = 12 - (1.0)(2) = 10\\;V$$. Alternatively, $$V = IR = (1.0)(10) = 10\\;V$$ — both methods agree.\n- Step 3: Check: lost volts $$= Ir = 2\\;V$$, and indeed $$\\varepsilon = V + Ir = 10 + 2 = 12\\;V$$. ✓ The terminal p.d. is less than the e.m.f. because 2 V is lost internally.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A $$V$$–$$I$$ graph for a cell has $$y$$-intercept 9.0 V and passes through the point ($$0.50\\;A$$, $$5.5\\;V$$). Find $$\\varepsilon$$ and $$r$$. (3 steps)", "answer": "- Step 1: The $$y$$-intercept gives the e.m.f.: $$\\varepsilon = 9.0\\;V$$.\n- Step 2: The gradient $$= \\frac{\\Delta V}{\\Delta I} = \\frac{5.5 - 9.0}{0.50 - 0} = \\frac{-3.5}{0.50} = -7.0\\;V\\,A^{-1}$$.\n- Step 3: Internal resistance $$r = -(\\text{gradient}) = 7.0\\;\\Omega$$. Check: $$V = \\varepsilon - Ir = 9.0 - (0.50)(7.0) = 9.0 - 3.5 = 5.5\\;V$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 9.0\\;V$$ and $$r = 1.0\\;\\Omega$$ is connected to an $$8.0\\;\\Omega$$ resistor. Find the current and the lost volts. (3 steps)", "answer": "- Step 1: Current: $$I = \\frac{\\varepsilon}{R + r} = \\frac{9.0}{8.0 + 1.0} = \\frac{9.0}{9.0} = 1.0\\;A$$.\n- Step 2: Lost volts $$= Ir = (1.0)(1.0) = 1.0\\;V$$.\n- Step 3: Terminal p.d. $$= \\varepsilon - Ir = 9.0 - 1.0 = 8.0\\;V$$, which matches $$V = IR = (1.0)(8.0) = 8.0\\;V$$. ✓ One volt is wasted inside the battery.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Explain in one sentence why the terminal p.d. of a cell falls when the load current increases. (2 steps)", "answer": "- Step 1: The lost volts are $$Ir$$. As $$I$$ increases, $$Ir$$ increases — more energy per coulomb is dissipated inside the cell.\n- Step 2: Since $$V = \\varepsilon - Ir$$ and $$\\varepsilon$$ is fixed, a larger $$Ir$$ means a smaller $$V$$. The terminal p.d. falls because the lost volts grow with current.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Two students discuss a $$V$$–$$I$$ graph. Student A says \"the e.m.f. is the voltage at any point on the line.\" Student B says \"the e.m.f. is only the $$y$$-intercept.\" Who is correct and why? (2 steps)", "answer": "- Step 1: Student B is correct. The e.m.f. $$\\varepsilon$$ is the $$y$$-intercept — the terminal p.d. when $$I = 0$$. It is a fixed property of the cell.\n- Step 2: Points on the line represent terminal p.d. $$V$$ at various currents, and $$V < \\varepsilon$$ whenever $$I > 0$$. Student A is confusing terminal p.d. (which varies along the line) with e.m.f. (which is the single intercept value). They are only equal at $$I = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Derive $$I = nAve$$ from first principles, starting from $$I = Q/t$$. (5 steps)", "answer": "- Step 1: Start with the definition of current: $$I = \\frac{Q}{t}$$, where $$Q$$ is the charge passing a point in time $$t$$.\n- Step 2: Express the total charge. The charge in a length of wire = (carriers per $$m^3$$) × (volume) × (charge per carrier): $$Q = n \\times \\text{Volume} \\times e$$.\n- Step 3: The volume of a cylindrical section of wire = cross-sectional area × length = $$A \\times s$$, where $$s$$ is the length. So $$Q = nAse$$.\n- Step 4: Substitute into the current formula: $$I = \\frac{nAse}{t} = nAe\\left(\\frac{s}{t}\\right)$$.\n- Step 5: The distance $$s$$ travelled in time $$t$$ gives the drift velocity: $$v = \\frac{s}{t}$$. Therefore $$I = nAve$$.\n\nThis derivation shows that current depends on *how many* carriers there are ($$n$$), *how much area* they flow through ($$A$$), *how fast* they drift ($$v$$), and *how much charge* each carries ($$e$$).", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "In the equation $$I = nAve$$, what does each symbol represent, and what are its SI units? (2 steps)", "answer": "- Step 1: The symbols and their meanings:\n+ $$n$$ = charge-carrier (number) density = number of free charge carriers per cubic metre, unit $$m^{-3}$$\n+ $$A$$ = cross-sectional area of the conductor, unit $$m^2$$\n+ $$v$$ = mean drift velocity of the charge carriers, unit $$m\\,s^{-1}$$\n+ $$e$$ = charge on each carrier (e.g. electron), unit $$C$$\n- Step 2: The current $$I$$ has unit $$A$$ (amperes). Dimensional check: $$m^{-3} \\times m^2 \\times m\\,s^{-1} \\times C = C\\,s^{-1} = A$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why is the drift velocity of electrons in a typical wire extremely slow (order of $$mm\\,s^{-1}$$), even though the current appears to flow \"instantly\" when you flip a switch? (2 steps)", "answer": "- Step 1: From $$I = nAve$$, the drift velocity $$v = \\frac{I}{nAe}$$. In a metal like copper, the number density $$n$$ is enormous ($$\\sim 10^{28}\\;m^{-3}$$) — there are vast numbers of free electrons. With so many carriers, each one only needs to drift very slowly to carry a significant current.\n- Step 2: The \"instant\" response when you close a switch is due to the electric field propagating at near the speed of light along the wire — all electrons start drifting almost simultaneously. The signal travels fast, but the individual electrons move slowly. Think of a crowded corridor: a push at one end is felt quickly at the other, even though each person shuffles slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A thermistor (NTC) is heated. Using $$I = nAve$$, explain step by step why its resistance decreases. (3 steps)", "answer": "- Step 1: When the thermistor is heated, more electrons are freed from the atomic lattice — they gain enough thermal energy to become mobile charge carriers. This increases the charge-carrier density $$n$$.\n- Step 2: From $$I = nAve$$, a larger $$n$$ means more current flows for the same applied voltage (assuming $$A$$, $$v$$ adjust only modestly). More current at the same voltage means lower resistance.\n- Step 3: The exam-mark causal chain: \"As temperature increases, more free electrons are released, so $$n$$ increases, so resistance decreases.\" The keyword \"number of free electrons increases\" (or \"$$n$$ increases\") is what earns the explanation mark.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "An LDR is moved from darkness into bright light. Using $$I = nAve$$, explain what happens to its resistance. (3 steps)", "answer": "- Step 1: When light intensity increases, photons deliver energy to electrons in the LDR's semiconductor material, freeing more of them to conduct. The charge-carrier density $$n$$ increases.\n- Step 2: From $$I = nAve$$, a larger $$n$$ means more current for the same voltage, i.e. lower resistance.\n- Step 3: In the dark, fewer electrons are free ($$n$$ is small), so resistance is high. In bright light, $$n$$ increases and resistance drops. The exam sentence: \"As light intensity increases, more free electrons are released, so $$n$$ increases, so resistance decreases.\"", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "In a potential divider circuit, an LDR is in series with a fixed resistor. The LDR is in the dark. What happens to the output voltage across the fixed resistor, and why? (3 steps)", "answer": "- Step 1: In the dark, the LDR has fewer free electrons ($$n$$ decreases), so its resistance is high.\n- Step 2: In a series potential divider, the voltage splits in proportion to the resistances. The LDR's large resistance claims a larger share of the total voltage, leaving less for the fixed resistor.\n- Step 3: Therefore the output voltage across the fixed resistor *decreases* when the LDR is in the dark. Conversely, when light shines on the LDR, its resistance drops and the output voltage across the fixed resistor rises.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A student says \"number density is the number of free charges per square metre of the wire's cross-section.\" Correct this misconception. (2 steps)", "answer": "- Step 1: Number density $$n$$ is the number of free charge carriers per **cubic metre** ($$m^{-3}$$), not per square metre. It is a *volume* density, not an area density.\n- Step 2: This makes physical sense: $$n$$ counts how many carriers exist in a given *volume* of material. In $$I = nAve$$, multiplying $$n$$ (carriers per $$m^3$$) by $$A$$ ($$m^2$$) and $$v$$ ($$m\\,s^{-1}$$) gives carriers per second flowing past a point — which, times $$e$$, gives current in amperes. If $$n$$ were per $$m^2$$, the units would not work out.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A copper wire has $$A = 1\\;mm^2$$ and carries $$I = 10\\;A$$. The carrier density is $$n \\approx 10^{20}\\;mm^{-3}$$. Without doing the full calculation, estimate whether the drift velocity is roughly: (a) $$10\\;m\\,s^{-1}$$, (b) $$0.1\\;m\\,s^{-1}$$, or (c) $$10^{-4}\\;m\\,s^{-1}$$. Explain your reasoning. (3 steps)", "answer": "- Step 1: Convert units mentally: $$A = 1\\;mm^2 = 10^{-6}\\;m^2$$, $$n = 10^{20}\\;mm^{-3} = 10^{20} \\times 10^9 = 10^{29}\\;m^{-3}$$, $$e = 1.6 \\times 10^{-19}\\;C$$.\n- Step 2: Use $$v = \\frac{I}{nAe} = \\frac{10}{10^{29} \\times 10^{-6} \\times 1.6 \\times 10^{-19}} = \\frac{10}{1.6 \\times 10^4} \\approx \\frac{10}{16000} \\approx 6 \\times 10^{-4}\\;m\\,s^{-1}$$.\n- Step 3: This is closest to (c) $$10^{-4}\\;m\\,s^{-1}$$ — a tiny fraction of a millimetre per second. Drift velocities in metals are extremely slow because the carrier density is so high that barely any movement is needed to carry the current.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A student claims \"in a parallel circuit, the voltage is shared between the branches using the reciprocal rule.\" What is wrong with this statement? (2 steps)", "answer": "- Step 1: In a parallel circuit, the voltage is the **same** across each branch — it is not shared or split. Each branch connects directly across the same two nodes, so the potential difference across each branch is identical.\n- Step 2: It is the *current* that splits in parallel — the total current divides among the branches inversely proportional to their resistances (which is where the reciprocal rule applies: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$). The student has confused the behaviour of current with the behaviour of voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A student writes the energy formula $$E = IVt$$ when asked for the circuit relation linking e.m.f., terminal p.d., current and internal resistance. Why is this the wrong formula for this purpose, and what should they use instead? (2 steps)", "answer": "- Step 1: $$E = IVt$$ is the energy dissipated by a component over time — it is a power/energy formula, not a circuit relation. It doesn't involve internal resistance at all and doesn't describe how $$\\varepsilon$$, $$V$$, $$I$$, and $$r$$ are connected.\n- Step 2: The correct circuit relation is $$\\varepsilon = V + Ir$$ (or any of its rearrangements). This comes from energy conservation per coulomb around the loop, not from power calculations. If you blank in the exam, draw the circuit diagram and write $$\\varepsilon = V_1 + V_2$$, then substitute Ohm's law.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "Alex uses the analogy \"Charlie the clown has a fuel tank of voltage.\" Explain how this analogy helps you understand why $$V < \\varepsilon$$ and why changing one resistor in a potential divider affects the voltage across another. (3 steps)", "answer": "- Step 1: Each coulomb (Charlie) starts with a full \"tank\" of voltage equal to the e.m.f. $$\\varepsilon$$. As the coulomb travels through the circuit, it \"spends\" voltage at each resistor.\n- Step 2: The internal resistance is like a toll gate right at the exit of the fuel station — Charlie must spend some voltage there before even reaching the external circuit. That's the lost volts $$Ir$$. What remains ($$V = \\varepsilon - Ir$$) is what Charlie has left for the external load.\n- Step 3: In a potential divider with two external resistors, if one resistor gets bigger, it demands more of Charlie's remaining tank, leaving less for the other resistor. This is why $$V_{out}$$ falls when one resistance rises — Charlie spends more voltage at the bigger resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "Alex uses the \"shopping bags\" analogy: carrying all bags at once = high $$n$$ but slower movement; carrying fewer bags = low $$n$$ but you can move faster. How does this illustrate the relationship in $$I = nAve$$? (2 steps)", "answer": "- Step 1: The \"bags\" are charge carriers. High carrier density $$n$$ means many carriers are available (like carrying all bags at once), but the drift velocity $$v$$ tends to be lower because of interactions and crowding. Low $$n$$ means fewer carriers, but they can drift faster for the same current.\n- Step 2: The current $$I = nAve$$ is the product — what matters is the total \"delivery rate\" of charge. You can achieve the same current with many slow carriers (high $$n$$, low $$v$$ — metals) or fewer faster carriers (low $$n$$, higher $$v$$ — semiconductors). The analogy captures the trade-off between quantity and speed.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "You are setting up CP8 in a simulation. You accidentally nudge the \"battery resistance\" slider between readings. What goes wrong with your results, and how would the $$V$$–$$I$$ graph look different from expected? (3 steps)", "answer": "- Step 1: The method assumes $$r$$ is a constant unknown. Each ($$I$$, $$V$$) reading should lie on the same straight line $$V = \\varepsilon - rI$$ with a single value of $$r$$.\n- Step 2: If you change $$r$$ between readings, each data point corresponds to a *different* internal resistance. The points no longer fall on a single straight line.\n- Step 3: The graph would show scatter or a curve rather than a clean straight line. The gradient of any line of best fit would not correspond to any single value of $$r$$. The fix: set $$r$$ once at the start and never touch it again — only vary the external load $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 1.5\\;V$$ and $$r = 0.30\\;\\Omega$$. It drives a current of $$0.50\\;A$$. What is the terminal p.d.? (2 steps)", "answer": "- Step 1: Use $$V = \\varepsilon - Ir = 1.5 - (0.50)(0.30) = 1.5 - 0.15 = 1.35\\;V$$.\n- Step 2: Check: lost volts $$= Ir = 0.15\\;V$$, and $$\\varepsilon = V + Ir = 1.35 + 0.15 = 1.5\\;V$$. ✓ The terminal p.d. is slightly less than the e.m.f. because the current is modest and $$r$$ is small.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Synthesis question: A student measures a cell and finds $$\\varepsilon = 6.0\\;V$$ and $$r = 2.0\\;\\Omega$$. They then connect this cell to a $$4.0\\;\\Omega$$ resistor. Another student claims \"the voltmeter will read 6.0 V because that's the e.m.f.\" Evaluate this claim. (3 steps)", "answer": "- Step 1: The e.m.f. is 6.0 V, but this is the terminal p.d. *only* when $$I = 0$$ (open circuit). With a resistor connected, current flows and lost volts appear.\n- Step 2: Calculate the current: $$I = \\frac{\\varepsilon}{R + r} = \\frac{6.0}{4.0 + 2.0} = 1.0\\;A$$. Then terminal p.d.: $$V = \\varepsilon - Ir = 6.0 - (1.0)(2.0) = 4.0\\;V$$.\n- Step 3: The claim is wrong. The voltmeter reads 4.0 V, not 6.0 V. The 2.0 V difference is the lost volts ($$Ir$$). You only read the full e.m.f. at the terminals when no current flows.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Synthesis question: A $$V$$–$$I$$ graph for a cell gives $$\\varepsilon = 4.5\\;V$$ and $$r = 3.0\\;\\Omega$$. If you wanted the maximum possible current from this cell, what external resistance would you choose, and what would that current be? What would the terminal p.d. be? (3 steps)", "answer": "- Step 1: From $$I = \\frac{\\varepsilon}{R + r}$$, the current is maximised when $$R$$ is minimised. The smallest possible external resistance is $$R = 0$$ (short circuit).\n- Step 2: Maximum current: $$I_{max} = \\frac{\\varepsilon}{0 + r} = \\frac{4.5}{3.0} = 1.5\\;A$$.\n- Step 3: Terminal p.d. at this current: $$V = \\varepsilon - Ir = 4.5 - (1.5)(3.0) = 0\\;V$$. All the e.m.f. is lost internally. This is the extreme case — maximum current but zero useful voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "Synthesis question: A thermistor is connected to a cell with internal resistance. As the thermistor is heated, its resistance decreases. What happens to (a) the current, (b) the lost volts, and (c) the terminal p.d.? Explain the chain of cause and effect. (4 steps)", "answer": "- Step 1: Heating the thermistor increases $$n$$ (more free electrons), so its resistance $$R$$ decreases.\n- Step 2: From $$I = \\frac{\\varepsilon}{R + r}$$, a smaller $$R$$ means a larger current $$I$$.\n- Step 3: The lost volts $$= Ir$$. Since $$I$$ has increased and $$r$$ is constant, the lost volts increase.\n- Step 4: The terminal p.d. $$V = \\varepsilon - Ir$$. Since $$Ir$$ has increased, $$V$$ decreases. Chain: heat → $$R$$ decreases → $$I$$ increases → lost volts increase → terminal p.d. decreases. This is a key insight: even though the *external* resistance dropped, the *terminal* p.d. also drops because the cell loses more voltage internally.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "Edge case: A \"perfect\" cell has zero internal resistance ($$r = 0$$). What would its $$V$$–$$I$$ graph look like, and what would the terminal p.d. always equal? (2 steps)", "answer": "- Step 1: With $$r = 0$$, the cell equation becomes $$V = \\varepsilon - 0 \\times I = \\varepsilon$$. The terminal p.d. always equals the e.m.f., regardless of current.\n- Step 2: The $$V$$–$$I$$ graph would be a horizontal line at $$V = \\varepsilon$$ — gradient = 0, confirming $$r = 0$$. There are no lost volts. In reality, all cells have some internal resistance, but an ideal voltage source in circuit theory has $$r = 0$$ by definition.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "A student draws a $$V$$–$$I$$ graph and the line slopes *upwards*. They claim the internal resistance is negative. Is this physically possible for a normal cell? What might have gone wrong? (3 steps)", "answer": "- Step 1: A positive internal resistance always gives a *downward* slope (gradient $$= -r < 0$$). A negative internal resistance would mean the cell *gains* energy from the current rather than losing it — this is not physically possible for a passive cell.\n- Step 2: The most likely error is that the student swapped the axes — plotting $$I$$ on the vertical and $$V$$ on the horizontal. In that orientation, the line would slope upward, but the gradient represents $$1/r$$ (or similar), not $$-r$$.\n- Step 3: Another possibility: the data is for a different component (e.g. a diode or a component with negative differential resistance), not a simple cell. For CP8 with a normal cell, the line must slope downward. Check the axes first.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "In the formula $$I = nAve$$, if you double the cross-sectional area $$A$$ of a wire while keeping everything else the same, what happens to the drift velocity $$v$$? Explain why this makes physical sense. (3 steps)", "answer": "- Step 1: From $$I = nAve$$, if $$I$$, $$n$$, and $$e$$ are fixed, then $$v = \\frac{I}{nAe}$$. Doubling $$A$$ halves $$v$$.\n- Step 2: Physical intuition: a wider wire has more cross-sectional area, so the same number of charge carriers per second can flow through at a slower pace. It's like a wider pipe — the same volume flow rate requires a slower flow speed.\n- Step 3: This is why thick wires can carry large currents with low drift velocities — the large area compensates, reducing the need for fast carrier movement and reducing resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "A copper wire carries $$I = 10\\;A$$. How many electrons per second pass a point in the wire? ($$e = 1.6 \\times 10^{-19}\\;C$$) (2 steps)", "answer": "- Step 1: In one second, the charge passing is $$Q = It = 10 \\times 1 = 10\\;C$$.\n- Step 2: Number of electrons $$= \\frac{Q}{e} = \\frac{10}{1.6 \\times 10^{-19}} \\approx 6.3 \\times 10^{19}$$ electrons per second. This enormous number explains why the drift velocity can be so slow — with $$\\sim 10^{20}$$ electrons passing per second, each one barely needs to move.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Why is the unit of internal resistance the ohm ($$\\Omega$$), and how does this follow from the $$V$$–$$I$$ graph? (2 steps)", "answer": "- Step 1: On the $$V$$–$$I$$ graph, the gradient has units of $$\\frac{V}{A}$$ (volts per ampere). By definition, $$1\\;\\Omega = 1\\;V\\,A^{-1}$$.\n- Step 2: Since $$r = -(\\text{gradient})$$, the internal resistance inherits the unit $$V\\,A^{-1} = \\Omega$$. This is consistent with Ohm's law ($$V = IR$$, so $$R$$ has units $$V/A$$). Internal resistance is a resistance like any other — it just happens to be inside the cell. Forgetting the unit ($$\\Omega$$) on an exam answer loses the final mark.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "In CP8, Alex targeted neat current values ($$0.10, 0.20, 0.30, 0.40, 0.50\\;A$$). Why is it important to get a *spread* of currents rather than clustering them all near one value? (2 steps)", "answer": "- Step 1: A spread of currents gives data points that are well-distributed along the $$I$$-axis, making the line of best fit more reliable. If all points cluster together, the line's position (and especially its gradient) becomes highly sensitive to any single measurement error.\n- Step 2: A wide range also lets you detect non-linearity (curving at high currents) if it exists. With clustered data, you'd never notice the curve. Aim for the lowest readable current at one end and a significantly larger one at the other.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "When converting units for $$I = nAve$$, a wire has $$A = 1\\;mm^2$$ and $$n = 10^{20}\\;mm^{-3}$$. Convert both to SI base units. (2 steps)", "answer": "- Step 1: Area: $$1\\;mm^2 = 1 \\times (10^{-3}\\;m)^2 = 10^{-6}\\;m^2$$. (Remember: square the conversion factor for area.)\n- Step 2: Number density: $$10^{20}\\;mm^{-3} = 10^{20} \\times (10^3)^3\\;m^{-3} = 10^{20} \\times 10^9 = 10^{29}\\;m^{-3}$$. (Remember: cube the conversion factor for volume — $$1\\;mm^{-3} = 10^9\\;m^{-3}$$.) A common mistake is only multiplying by $$10^3$$ instead of $$10^9$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Synthesis: A student has two identical cells, each with $$\\varepsilon = 1.5\\;V$$ and $$r = 0.5\\;\\Omega$$. They connect them in series to an $$8\\;\\Omega$$ load. What is the total e.m.f., total internal resistance, and the current? (3 steps)", "answer": "- Step 1: Cells in series: the total e.m.f. adds ($$\\varepsilon_{total} = 1.5 + 1.5 = 3.0\\;V$$) and the total internal resistance adds ($$r_{total} = 0.5 + 0.5 = 1.0\\;\\Omega$$). Think of it as one bigger cell.\n- Step 2: Use $$I = \\frac{\\varepsilon_{total}}{R + r_{total}} = \\frac{3.0}{8.0 + 1.0} = \\frac{3.0}{9.0} = 0.33\\;A$$.\n- Step 3: Terminal p.d. across the load: $$V = IR = 0.33 \\times 8.0 \\approx 2.67\\;V$$, or equivalently $$V = \\varepsilon_{total} - Ir_{total} = 3.0 - 0.33 = 2.67\\;V$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "The ESAT (Cambridge admissions test) does not cover whole A-Level Physics chapters — only specific sections. Give two examples from the lesson of chapters where only partial content is in ESAT scope. Why does this matter for study planning? (2 steps)", "answer": "- Step 1: Two examples discussed: (1) Radioactive decay — only a couple of sections are in ESAT scope, not the whole chapter. (2) Atomic structure (Year 2, Chapter 7) — only the first section is in scope.\n- Step 2: This matters because ESAT sittings are in October and January, before the full A-Level course is typically finished. Prioritising ESAT-relevant sections first ensures you're prepared for the admissions test on time, without wasting effort on content that won't be tested. Alex agreed to reorder lessons to hit ESAT-relevant sections first.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Alex says \"derive, don't memorise blindly.\" If you blank on the cell equation in an exam, what two-step recovery method did Alex recommend? (2 steps)", "answer": "- Step 1: Draw the circuit diagram — a cell with $$\\varepsilon$$ and $$r$$ in series with external $$R$$, a voltmeter across $$R$$, and an ammeter in series. Label the p.d. across $$R$$ as $$V_1$$ and across $$r$$ as $$V_2$$.\n- Step 2: Write energy conservation per coulomb: $$\\varepsilon = V_1 + V_2$$. Then substitute Ohm's law: $$V_1 = IR$$ and $$V_2 = Ir$$. Since $$V = V_1$$, you get $$\\varepsilon = V + Ir$$. From this one equation, all four forms can be derived by rearrangement.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "A student computes a gradient of $$-14.29\\;V\\,A^{-1}$$ from a $$V$$–$$I$$ graph and writes \"$$r = -14.29\\;\\Omega$$\". Identify the error and give the correct answer. (2 steps)", "answer": "- Step 1: The gradient equals $$-r$$, so $$r = -(\\text{gradient})$$. The student forgot the minus sign — they wrote $$r$$ equal to the gradient instead of the *negative* of the gradient.\n- Step 2: Correct: $$r = -(-14.29) = 14.3\\;\\Omega$$ (rounded to 3 significant figures). Internal resistance must be positive. This is exam trap #1: always apply $$r = -(\\text{gradient})$$, not $$r = \\text{gradient}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "A $$V$$–$$I$$ graph for a cell has $$y$$-intercept $$5.0\\;V$$ and the line passes through ($$0.35\\;A$$, $$0\\;V$$). Find $$\\varepsilon$$ and $$r$$. (3 steps)", "answer": "- Step 1: The $$y$$-intercept gives $$\\varepsilon = 5.0\\;V$$.\n- Step 2: The gradient $$= \\frac{0 - 5.0}{0.35 - 0} = \\frac{-5.0}{0.35} \\approx -14.3\\;V\\,A^{-1}$$.\n- Step 3: $$r = -(\\text{gradient}) = 14.3\\;\\Omega$$. The point ($$0.35, 0$$) is the $$x$$-intercept — where the terminal p.d. drops to zero, meaning all the e.m.f. is lost internally (short-circuit condition).", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "What does the $$x$$-intercept of a $$V$$–$$I$$ graph represent physically? (2 steps)", "answer": "- Step 1: The $$x$$-intercept is where $$V = 0$$, i.e. $$\\varepsilon - Ir = 0$$, so $$I = \\frac{\\varepsilon}{r}$$. This is the short-circuit current — the maximum current the cell can deliver when the external resistance is zero.\n- Step 2: At this point, all the e.m.f. is dropped across the internal resistance. The terminal p.d. is zero because there is no external load to deliver voltage to. This is the extreme right end of the line.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "Alex's exam coaching: for a 4-mark question asking you to find $$\\varepsilon$$ and $$r$$ from a $$V$$–$$I$$ graph, where do the 4 marks typically come from? (2 steps)", "answer": "- Step 1: The marks typically break down as: (1) reading the $$y$$-intercept for $$\\varepsilon$$, (2) constructing a gradient triangle with well-separated points on the line, (3) computing the gradient correctly with units, and (4) stating $$r = -(\\text{gradient})$$ with the correct unit ($$\\Omega$$).\n- Step 2: The skill being tested is \"getting data from the graph\" — not memorisation. Show your working: write the gradient formula, substitute the coordinates you read, compute, and state the final values with units. Never just write the answer without showing the graph-reading steps.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "A thermistor is at constant temperature. If you double the voltage across it, does the current necessarily double? Why or why not? (2 steps)", "answer": "- Step 1: At constant temperature, an NTC thermistor behaves approximately ohmically — its resistance stays roughly constant because $$n$$ doesn't change (temperature is fixed, so no additional electrons are freed).\n- Step 2: So yes, at constant temperature, doubling the voltage approximately doubles the current ($$I = V/R$$ with $$R$$ constant). However, if the thermistor heats up due to the increased current (which it often does in practice), then $$n$$ increases, $$R$$ decreases, and the current more than doubles — the device becomes non-ohmic. The key qualifier is \"constant temperature.\"", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Misconception probe: A student says \"e.m.f. and terminal p.d. are the same thing — they're both measured in volts.\" Why is this statement incomplete and potentially misleading? (2 steps)", "answer": "- Step 1: While both are measured in volts, they describe different energy directions. E.m.f. is energy *supplied to* each coulomb *by* the source (cause). Terminal p.d. is energy *transferred by* each coulomb *to* the external circuit (effect). Same unit, opposite roles.\n- Step 2: They are only numerically equal when $$I = 0$$ (open circuit). Whenever current flows, $$V = \\varepsilon - Ir < \\varepsilon$$. Treating them as \"the same thing\" would mean you can't explain why the voltmeter reading drops when you connect a load — a core concept in this topic.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Synthesis: You have a cell with unknown $$\\varepsilon$$ and $$r$$. You connect a $$10\\;\\Omega$$ resistor and measure $$V = 8.0\\;V$$. You then connect a $$4\\;\\Omega$$ resistor and measure $$V = 6.0\\;V$$. Find $$\\varepsilon$$ and $$r$$. (4 steps)", "answer": "- Step 1: For the first measurement, $$I_1 = \\frac{V_1}{R_1} = \\frac{8.0}{10} = 0.80\\;A$$. The cell equation gives $$\\varepsilon = 8.0 + 0.80r$$.\n- Step 2: For the second measurement, $$I_2 = \\frac{V_2}{R_2} = \\frac{6.0}{4} = 1.50\\;A$$. The cell equation gives $$\\varepsilon = 6.0 + 1.50r$$.\n- Step 3: Set the two expressions for $$\\varepsilon$$ equal: $$8.0 + 0.80r = 6.0 + 1.50r$$, so $$2.0 = 0.70r$$, giving $$r = \\frac{2.0}{0.70} \\approx 2.86\\;\\Omega$$.\n- Step 4: Substitute back: $$\\varepsilon = 8.0 + 0.80(2.86) = 8.0 + 2.29 \\approx 10.3\\;V$$. Check: $$\\varepsilon = 6.0 + 1.50(2.86) = 6.0 + 4.29 \\approx 10.3\\;V$$. ✓ This is essentially what CP8 does — two points determine the line.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "Limiting case: What happens to the terminal p.d. as the external resistance $$R$$ approaches infinity? What is the current, and what does the voltmeter read? (2 steps)", "answer": "- Step 1: As $$R \\to \\infty$$, the current $$I = \\frac{\\varepsilon}{R + r} \\to 0$$. The circuit is effectively open — no current flows.\n- Step 2: With $$I = 0$$, the lost volts $$Ir = 0$$, so the terminal p.d. $$V = \\varepsilon - 0 = \\varepsilon$$. The voltmeter reads the full e.m.f. This is the open-circuit condition — the $$y$$-intercept of the $$V$$–$$I$$ graph.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "In the PhET simulation, Alex kept telling Phuc to \"keep the wire resistivity at zero\" and not to adjust the battery resistance slider. Explain why wire resistivity being zero is important for CP8's validity. (2 steps)", "answer": "- Step 1: CP8 models the circuit as having only two resistances: the internal resistance $$r$$ and the external load $$R$$. If the connecting wires also have resistance, that adds a third resistance in series, and the simple equation $$\\varepsilon = V + Ir$$ no longer applies directly (the voltmeter reading would be affected by the wire resistance too).\n- Step 2: Setting wire resistivity to zero ensures the wires are ideal conductors with no resistance, so the only resistances in the circuit are $$r$$ and $$R$$. In a real lab, we use thick, short copper wires to minimise wire resistance for the same reason.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "A student performing CP8 records only 2 data points. Why is this insufficient, even though two points determine a straight line? (2 steps)", "answer": "- Step 1: Two points always define a straight line, but with only two measurements you have no way to detect errors. If one reading is faulty, the line will be wrong and you'd never know.\n- Step 2: With 5–6 points, you can draw a line of best fit that averages out random errors, and you can identify anomalous points that lie far from the line. The reliability of your $$\\varepsilon$$ and $$r$$ values depends on having enough data to confirm the linear relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "The Edexcel data booklet gives the formula as $$I = nqvA$$ instead of $$I = nAve$$. Reconcile these two forms — what corresponds to what? (2 steps)", "answer": "- Step 1: Both forms are the same equation with the symbols in a different order. In the data booklet: $$n$$ = number density, $$q$$ = charge on each carrier, $$v$$ = drift velocity, $$A$$ = cross-sectional area. In the lesson form: $$n$$ = numb
