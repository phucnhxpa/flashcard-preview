<script>
const cards = [{"q": "What does EMF ($$\\varepsilon$$) physically represent, and why is it measured in Volts despite being called an \"electromotive force\"? (2 steps)", "a": "- Step 1: EMF is the total electrical energy *supplied* to each unit of charge by the source (e.g., a cell). It is the \"cause\" that pushes the circuit.\n- Step 2: It is measured in Volts ($$V$$) because $$1V = 1JC^{-1}$$. Since $$\\varepsilon = W/Q$$, the unit is Joules per Coulomb, which is exactly a Volt. The word \"force\" is a historical misnomer; it is an energy per charge, not a mechanical push measured in Newtons.\n\nTakeaway: EMF is an energy density for charge, not a Newtonian force.", "source": "GLM 5.1"}, {"q": "How do the roles of EMF ($$\\varepsilon$$) and Terminal PD ($$V$$) differ in a circuit, in terms of cause and effect? (2 steps)", "a": "- Step 1: EMF ($$\\varepsilon$$) is the *cause* \u2014 it is the energy supplied to the charges by the cell to drive them around the circuit.\n- Step 2: Terminal PD ($$V$$) is the *effect* \u2014 it is the energy actually *delivered* (transferred) by those charges to the external circuit. The two have the same unit (Volts) but opposite roles in the energy story.", "source": "GLM 5.1"}, {"q": "Why is it incorrect to define EMF as \"the force pushing electrons around the circuit\"?", "a": "EMF is a measure of energy conversion per unit charge ($$J C^{-1}$$), not a mechanical force ($$N$$). It quantifies how much energy the source injects into each coulomb, which *results* in a driving force, but the EMF itself is an energy density, not a push.", "source": "GLM 5.1"}, {"q": "Derive the cell equation $$\\varepsilon = V + Ir$$ from the principle of conservation of energy for a single coulomb moving around a series circuit containing a cell, internal resistance $$r$$, and external resistance $$R$$. (3 steps)", "a": "- Step 1: Conservation of energy dictates that the energy supplied to 1 coulomb by the cell (the EMF, $$\\varepsilon$$) must equal the total energy used by that coulomb in the rest of the loop.\n- Step 2: The energy is used in two places: the external resistor (Terminal PD, $$V$$) and the internal resistance (lost volts, $$V_{internal}$$). So, $$\\varepsilon = V + V_{internal}$$.\n- Step 3: Using Ohm's law for the internal resistance, the p.d. across it is $$V_{internal} = I \\times r$$. Substituting this gives the cell equation: $$\\varepsilon = V + Ir$$.", "source": "GLM 5.1"}, {"q": "What are the \"lost volts\" in a circuit, and qualitatively, what happens to them if the load current $$I$$ increases? (2 steps)", "a": "- Step 1: \"Lost volts\" is the p.d. dropped across the internal resistance ($$\\varepsilon - V = Ir$$). It represents the energy per coulomb wasted inside the cell as heat.\n- Step 2: If current $$I$$ increases, the lost volts $$Ir$$ also increase. This means a larger fraction of the cell's EMF is wasted internally, leaving less usable voltage for the external circuit.", "source": "GLM 5.1"}, {"q": "What is the terminal PD ($$V$$) across a cell when it is on an open circuit (no external load connected), and why? (2 steps)", "a": "- Step 1: On an open circuit, there is no complete path for charges, so the current $$I = 0$$.\n- Step 2: From the equation $$V = \\varepsilon - Ir$$, if $$I = 0$$, then $$Ir = 0$$, meaning $$V = \\varepsilon$$. With no current, there are no lost volts, so a voltmeter across the terminals reads the full EMF.", "source": "GLM 5.1"}, {"q": "Using the \"fuel tank\" analogy for a charge moving through a circuit, explain why the terminal PD across an external resistor drops if another component in series with it increases its resistance. (3 steps)", "a": "- Step 1: A charge has a fixed \"tank\" of voltage (the EMF $$\\varepsilon$$) supplied by the cell.\n- Step 2: Each resistor the charge travels through \"eats\" a portion of this voltage tank proportional to its resistance.\n- Step 3: If one component's resistance increases, it claims a larger share of the EMF tank, leaving less voltage (a lower terminal PD) for the other components downstream.", "source": "GLM 5.1"}, {"q": "Map the equation $$V = \\varepsilon - rI$$ to the straight-line equation $$y = mx + c$$. What do the gradient and y-intercept represent physically? (3 steps)", "a": "- Step 1: Align the variables: let $$y = V$$, $$x = I$$, $$c = \\varepsilon$$, and $$m = -r$$.\n- Step 2: The y-intercept occurs when $$I = 0$$, which physically represents the open-circuit voltage, so the intercept is the EMF $$\\varepsilon$$.\n- Step 3: The gradient $$m$$ equals $$-r$$. Because internal resistance is always positive, the line always slopes downwards (negative gradient), and the magnitude of the gradient gives the internal resistance.", "source": "GLM 5.1"}, {"q": "A V-I graph for a cell slopes downwards. If you calculate the gradient as a negative number, how do you find the internal resistance $$r$$, and why can't $$r$$ be negative? (2 steps)", "a": "- Step 1: Since the gradient $$m = -r$$, you find $$r$$ by taking the negative of the gradient ($$r = -m$$).\n- Step 2: Resistance is a physical property that always opposes the flow of charge, dissipating energy as heat. It cannot be a negative value in a standard ohmic cell; the negative sign in the gradient simply reflects the inverse relationship between V and I.", "source": "GLM 5.1"}, {"q": "In Core Practical 8, why is it crucial that the internal resistance $$r$$ of the cell remains constant throughout the experiment? (2 steps)", "a": "- Step 1: The V-I graph method relies on the assumption that the relationship $$V = \\varepsilon - rI$$ is linear, which requires $$r$$ to be a constant slope.\n- Step 2: If $$r$$ changes between readings (e.g., by accidentally adjusting a simulator slider, or the cell heating up), the data points will no longer lie on a single straight line, making the gradient calculation meaningless.", "source": "GLM 5.1"}, {"q": "Why might the V-I graph for a real cell curve away from a straight line at very high currents? (2 steps)", "a": "- Step 1: At high currents, the power dissipated inside the cell ($$I^2r$$) becomes significant, causing the cell to heat up.\n- Step 2: Heating often alters the internal structure of the cell, changing its internal resistance $$r$$. Since $$r$$ is no longer constant, the linearity of the graph breaks down and the line curves.", "source": "GLM 5.1"}, {"q": "In the CP8 circuit, the voltmeter is placed across the cell's terminals. Why does it read the Terminal PD $$V$$ instead of the EMF $$\\varepsilon$$ when the circuit is complete? (2 steps)", "a": "- Step 1: The voltmeter is external to the cell; it only measures the potential difference *across its own terminals*.\n- Step 2: Because the internal resistance $$r$$ drops some voltage before the charges even exit the cell, the voltmeter only \"sees\" what's left. It reads $$V = \\varepsilon - Ir$$, missing the lost volts.", "source": "GLM 5.1"}, {"q": "Derive the equation $$I = nAve$$ by considering the total charge passing a cross-section of a wire in time $$t$$. (4 steps)", "a": "- Step 1: Start with the definition of current: $$I = Q/t$$, where $$Q$$ is the total charge passing a point.\n- Step 2: Express $$Q$$ in terms of carriers: $$Q = (\\text{number of carriers}) \\times (\\text{charge per carrier})$$. The number of carriers in a volume is $$n \\times \\text{Volume}$$. So $$Q = n \\times \\text{Volume} \\times e$$.\n- Step 3: The volume of wire swept by carriers in time $$t$$ is a cylinder of cross-section $$A$$ and length $$vt$$ (since distance = velocity $$\\times$$ time). So $$\\text{Volume} = A \\times vt$$, giving $$Q = n(Avt)e$$.\n- Step 4: Substitute back into $$I = Q/t$$: $$I = nAvt e / t = nAve$$.", "source": "GLM 5.1"}, {"q": "In the equation $$I = nAve$$, why is the drift velocity $$v$$ typically very small (e.g., fractions of a mm/s) in a standard copper wire? (2 steps)", "a": "- Step 1: Copper has an enormous number density $$n$$ (roughly $$10^{28} m^{-3}$$), meaning there is a vast multitude of free electrons available to carry charge.\n- Step 2: Because $$n$$ is so astronomically large, the product $$nAve$$ yields a macroscopic current $$I$$ even when the drift velocity $$v$$ is barely perceptible. The sheer number of carriers compensates for their slow speed.", "source": "GLM 5.1"}, {"q": "Explain why the resistance of an NTC thermistor decreases as temperature increases, using the concept of number density $$n$$. (2 steps)", "a": "- Step 1: Increasing temperature provides thermal energy that liberates more electrons from the atomic lattice, increasing the charge-carrier density $$n$$.\n- Step 2: From $$I = nAve$$, a larger $$n$$ means more charge flows per second for the same applied voltage. Since $$R = V/I$$, a larger current implies a lower resistance.", "source": "GLM 5.1"}, {"q": "In darkness, an LDR has a very high resistance. Explain this behavior using the variable $$n$$ from the equation $$I = nAve$$. (2 steps)", "a": "- Step 1: In the dark, there is insufficient photon energy to free electrons from the semiconductor lattice, so the number density of free charge carriers $$n$$ is very small.\n- Step 2: With a tiny $$n$$, the current $$I$$ is negligible for any given voltage, which mathematically corresponds to a very high resistance.", "source": "GLM 5.1"}, {"q": "What is the SI unit for number density $$n$$, and why is it NOT measured per square metre ($$m^{-2}$$)? (2 steps)", "a": "- Step 1: The unit for number density is $$m^{-3}$$ (per cubic metre).\n- Step 2: It counts the number of free charges within a 3D *volume* of the material, not just across a 2D surface area, because the carriers are distributed throughout the entire bulk of the conductor.", "source": "GLM 5.1"}, {"q": "A common misconception is that voltage is \"shared\" or calculated via \"reciprocals\" in parallel branches, similar to resistance. Correct this by stating the actual rule for voltage and current in parallel circuits. (2 steps)", "a": "- Step 1: In a parallel circuit, the voltage is identical across all parallel branches; it is not shared or split.\n- Step 2: It is the *current* that splits and is shared among the branches inversely proportional to their resistances, while the voltage remains common to all paths.", "source": "GLM 5.1"}, {"q": "If a student accidentally plots Current $$I$$ on the y-axis and Voltage $$V$$ on the x-axis for a cell, how would the calculation for internal resistance $$r$$ change compared to the standard V-I graph? (2 steps)", "a": "- Step 1: Rearranging $$V = \\varepsilon - rI$$ for $$I$$ gives $$I = (-1/r)V + (\\varepsilon/r)$$. This is now of the form $$y = mx + c$$, where the gradient $$m = -1/r$$.\n- Step 2: Therefore, the internal resistance is no longer the negative of the gradient; instead, you must take the negative reciprocal of the gradient ($$r = -1/m$$) to find the resistance.", "source": "GLM 5.1"}, {"q": "A cell has an EMF of 12 V and an internal resistance of 2 $$\\Omega$$. If a current of 1 A flows, what are the \"lost volts\" and the terminal PD? (2 steps)", "a": "- Step 1: Lost volts $$= Ir = 1A \\times 2\\Omega = 2V$$.\n- Step 2: Terminal PD $$= \\varepsilon - Ir = 12V - 2V = 10V$$.", "source": "GLM 5.1"}, {"q": "A battery with internal resistance 1 $$\\Omega$$ is connected to a 3 $$\\Omega$$ external resistor. If the terminal PD is measured as 6 V, what is the current, and what is the EMF? (2 steps)", "a": "- Step 1: Current through the external resistor is $$I = V/R = 6V / 3\\Omega = 2A$$. This is the same current through the whole series loop.\n- Step 2: EMF $$\\varepsilon = V + Ir = 6V + (2A \\times 1\\Omega) = 8V$$.", "source": "GLM 5.1"}, {"q": "What happens to the terminal PD $$V$$ and the current $$I$$ if a cell is short-circuited (external resistance $$R = 0$$), and why is this dangerous? (3 steps)", "a": "- Step 1: With $$R=0$$, the total resistance is just $$r$$. The current is maximized: $$I = \\varepsilon / (R+r) = \\varepsilon / r$$.\n- Step 2: The terminal PD drops to zero because all the EMF is dropped internally: $$V = \\varepsilon - I r = 0$$.\n- Step 3: This is dangerous because a huge current flows, dissipating massive power inside the cell ($$P = I^2 r$$), causing rapid overheating, melting, or explosion.", "source": "GLM 5.1"}, {"q": "A V-I graph for a cell cuts the y-axis at 9V and the x-axis at 3A. What is the EMF and the internal resistance? (2 steps)", "a": "- Step 1: The EMF is the y-intercept (where $$I=0$$), so $$\\varepsilon = 9V$$.\n- Step 2: The internal resistance is the negative gradient. The line drops 9V over a run of 3A, so gradient = -3 V/A. Thus, $$r = 3\\Omega$$.", "source": "GLM 5.1"}, {"q": "Copper has a number density $$n \\approx 10^{28} m^{-3}$$. If you double the cross-sectional area of a copper wire but keep the current the same, what happens to the drift velocity $$v$$? (2 steps)", "a": "- Step 1: From $$I = nAve$$, if $$I$$, $$n$$, and $$e$$ are constant, then drift velocity $$v$$ is inversely proportional to area $$A$$ ($$v \\propto 1/A$$).\n- Step 2: Doubling the area halves the drift velocity, because the same current can now be carried by twice as many charge carriers moving at half the speed.", "source": "GLM 5.1"}, {"q": "How do electromotive force (e.m.f., $$\\varepsilon$$) and terminal potential difference ($$V$$) fundamentally differ in terms of the direction of energy transfer in a circuit?", "a": "- Step 1: Think of the cell as a pump and the charges as water. The cell *does work* on the charges to give them energy.\n- Step 2: E.m.f. ($$\\varepsilon$$) is the energy **supplied to** each coulomb of charge by the source (the \"cause\"). It is the total voltage the cell produces internally.\n- Step 3: Terminal p.d. ($$V$$) is the energy **transferred by** each coulomb of charge to the external circuit (the \"effect\"). It is what the voltmeter actually reads across the cell's terminals when the circuit is running.\n+ Both are measured in Volts, but they represent opposite roles in the energy's journey: cause vs. effect.\n\nTakeaway: E.m.f. is what the cell *gives*, terminal p.d. is what the external circuit *gets*.", "source": "GLM 5.1"}, {"q": "What is the exact, exam-safe definition of electromotive force (e.m.f.)? (2 steps)", "a": "- Step 1: Identify the core quantity: it is an energy per unit charge.\n- Step 2: Specify the direction and source: it is the electrical energy **supplied per unit charge** by the source (e.g., the cell).\n+ Misconception trap: Despite the word \"force\" in the name, e.m.f. is *not* a force. It is a voltage (energy/coulomb). Never define it as a push or a mechanical force.", "source": "GLM 5.1"}, {"q": "Derive the fundamental cell equation $$\\varepsilon = V + Ir$$ starting from the principle of conservation of energy for one coulomb of charge moving around a series circuit with a cell and an external resistor. (3 steps)", "a": "- Step 1: State energy conservation. The total energy per coulomb supplied by the cell (the e.m.f., $$\\varepsilon$$) must equal the total energy per coulomb used up in the entire loop. Therefore, $$\\varepsilon = V_1 + V_2$$, where $$V_1$$ is the p.d. across the external resistor $$R$$, and $$V_2$$ is the p.d. across the internal resistance $$r$$.\n- Step 2: Express the p.d.s using Ohm's law ($$V = IR$$). Since the current $$I$$ is the same everywhere in a series circuit, we have $$V_1 = IR$$ and $$V_2 = Ir$$.\n- Step 3: Substitute back into the energy conservation equation: $$\\varepsilon = IR + Ir$$. Since the terminal p.d. $$V$$ is defined as the p.d. across the external resistor ($$V = IR$$), we substitute $$V$$ for $$IR$$ to get the final form: $$\\varepsilon = V + Ir$$.", "source": "GLM 5.1"}, {"q": "What are \"lost volts\" in a circuit, and why must the terminal p.d. always be less than the e.m.f. whenever a current is flowing? (2 steps)", "a": "- Step 1: Define lost volts. When current flows, some energy per coulomb is unavoidably dissipated inside the cell itself due to its internal resistance $$r$$. This energy drop is $$Ir$$, known as the \"lost volts.\"\n- Step 2: Connect to the equation. Because $$\\varepsilon = V + Ir$$, rearranging gives $$V = \\varepsilon - Ir$$. As long as current $$I$$ is greater than zero, $$Ir$$ is positive, meaning $$V$$ must be strictly less than $$\\varepsilon$$.\n+ Edge case: If the circuit is open (no current, $$I=0$$), then $$Ir = 0$$, and the lost volts vanish. Only then does the terminal p.d. equal the e.m.f. ($$V = \\varepsilon$$).", "source": "GLM 5.1"}, {"q": "How does the terminal p.d. equation $$V = \\varepsilon - rI$$ map onto the straight-line equation $$y = mx + c$$, and what does this reveal about the physical features of the graph? (2 steps)", "a": "- Step 1: Align the variables. Plotting terminal p.d. $$V$$ on the y-axis and current $$I$$ on the x-axis gives $$y \\to V$$, $$x \\to I$$, intercept $$c \\to \\varepsilon$$, and gradient $$m \\to -r$$.\n- Step 2: Interpret the features. The y-intercept represents the e.m.f. $$\\varepsilon$$ (the voltage when $$I=0$$). The gradient is negative, meaning the line slopes downwards; its magnitude is the internal resistance, so $$r = -(\\text{gradient})$$.\n+ Misconception trap: Do not just say gradient = $$r$$. The gradient is *negative* because internal resistance is a positive physical quantity that *subtracts* from the e.m.f. as current increases.", "source": "GLM 5.1"}, {"q": "In Core Practical 8 (determining $$\\varepsilon$$ and $$r$$), what is the independent variable, the dependent variable, and the crucial controlled variable regarding the cell itself? Why must this controlled variable remain fixed? (2 steps)", "a": "- Step 1: Identify the variables. Independent: the current $$I$$ (changed via a variable resistor). Dependent: the terminal p.d. $$V$$. Controlled: the internal resistance $$r$$ of the cell.\n- Step 2: Explain why $$r$$ must be fixed. The entire method relies on plotting a straight line where the gradient equals $$-r$$. If you alter the internal resistance between readings (e.g., by changing a \"battery resistance\" slider in a simulation), the data points will no longer lie on a single straight line, rendering the gradient calculation meaningless.", "source": "GLM 5.1"}, {"q": "Why might a V-I graph for a real cell curve away from a straight line at very high currents, and what does this imply about the cell's internal resistance? (2 steps)", "a": "- Step 1: Consider the thermal effect. At high currents, the power dissipated inside the cell ($$I^2r$$) increases dramatically, causing the cell to heat up significantly.\n- Step 2: Relate heat to resistance. For many real cells, heating changes the internal structure, altering the internal resistance $$r$$. Because $$r$$ is no longer a constant, the linear relationship $$V = \\varepsilon - rI$$ breaks down, and the line curves.", "source": "GLM 5.1"}, {"q": "Derive the equation for current $$I = nAve$$ starting from the definition of current and considering the volume of charge carriers moving through a wire. (4 steps)", "a": "- Step 1: Start with the definition of current as the rate of flow of charge: $$I = Q/t$$.\n- Step 2: Express the total charge $$Q$$. If there are $$n$$ carriers per cubic metre, the volume of wire containing the carriers is Area $$\\times$$ length ($$A \\times s$$). So, the number of carriers is $$n \\times A \\times s$$. The total charge is this number times the charge of one carrier $$e$$: $$Q = nAse$$.\n- Step 3: Substitute $$Q$$ into the current equation: $$I = (nAse) / t$$.\n- Step 4: Recognize velocity. The length $$s$$ divided by time $$t$$ is the drift velocity $$v$$. Substituting $$v = s/t$$ gives the final equation: $$I = nAve$$.", "source": "GLM 5.1"}, {"q": "Using the equation $$I = nAve$$, explain why the resistance of an NTC thermistor decreases as its temperature increases. (3 steps)", "a": "- Step 1: Identify what changes with temperature. In an NTC thermistor, increasing temperature releases more electrons from the atoms, increasing the charge-carrier density $$n$$.\n- Step 2: Consider the effect on current. For a given applied voltage, if $$n$$ increases, the current $$I$$ must increase (since $$I = nAve$$ and $$A, e$$ are constant, and $$v$$ adjusts to the new field).\n- Step 3: Relate current to resistance. Resistance is defined as $$R = V/I$$. If the current $$I$$ increases for the same voltage $$V$$, the resistance $$R$$ must decrease.\n+ The exam-mark sentence: \"The resistance decreases because the number density of free charge carriers increases, increasing the current for a given p.d.\"", "source": "GLM 5.1"}, {"q": "What happens to the number density $$n$$ and the resistance of a Light Dependent Resistor (LDR) when it is placed in the dark? (2 steps)", "a": "- Step 1: Effect on $$n$$. In the dark, there are fewer photons to liberate electrons into the conduction band. Therefore, the number density of free charge carriers $$n$$ decreases.\n- Step 2: Effect on resistance. With fewer charge carriers available to carry a current, the current $$I$$ drops for a given voltage. Since $$R = V/I$$, a smaller current means a larger resistance. The LDR's resistance increases in the dark.", "source": "GLM 5.1"}, {"q": "Using the \"shopping bags\" analogy for $$I = nAve$$, explain the trade-off between the number density of charge carriers ($$n$$) and their drift velocity ($$v$$) to maintain the same current. (2 steps)", "a": "- Step 1: Map the analogy. Imagine you need to move a certain number of shopping bags per second (analogous to current $$I$$). You can either carry many bags at once (high $$n$$) or carry a few bags but walk very fast (high $$v$$).\n- Step 2: Apply to physics. For a fixed current $$I$$ and cross-sectional area $$A$$, the product $$n \\times v$$ must remain constant. If a material has a very high number density of free electrons (like copper, $$n \\approx 10^{28} \\text{ m}^{-3}$$), the electrons only need to drift at a very slow velocity to achieve the current. If $$n$$ is low, $$v$$ must be high to carry the same current.", "source": "GLM 5.1"}, {"q": "If you accidentally plot a graph of Current ($$I$$) on the y-axis and Terminal P.D. ($$V$$) on the x-axis, how would you extract the internal resistance $$r$$ from this incorrectly oriented graph? (2 steps)", "a": "- Step 1: Rearrange the cell equation to make $$I$$ the subject. From $$V = \\varepsilon - rI$$, we get $$rI = \\varepsilon - V$$, so $$I = (\\varepsilon/r) - (1/r)V$$.\n- Step 2: Map to $$y = mx + c$$. Here, $$y \\to I$$ and $$x \\to V$$. The gradient $$m$$ is now $$-1/r$$. To find the internal resistance, you must calculate $$r = -1 / (\\text{gradient})$$.\n+ Exam trap: Always check which variable is on which axis. Swapping the axes inverts the gradient!", "source": "GLM 5.1"}, {"q": "Contrast how voltage and current behave in series versus parallel circuits. (2 steps)", "a": "- Step 1: Series circuits. The current is identical through all components (no junctions to split it). The voltage from the e.m.f. is shared (adds up) across the components.\n- Step 2: Parallel circuits. The voltage is identical across all parallel branches (each branch connects directly to the cell's terminals). The current splits at junctions, so the total current is the sum of the branch currents.\n+ Misconception trap: Voltage is NOT shared in parallel, and current is NOT shared in series. Voltage is \"common\" in parallel; current is \"common\" in series.", "source": "GLM 5.1"}, {"q": "A cell has an e.m.f. of 12 V and an internal resistance of 1 $$\\Omega$$. If a current of 2 A flows, what is the terminal p.d. and the \"lost volts\"? (2 steps)", "a": "- Step 1: Calculate the lost volts. Lost volts = $$Ir = 2 \\text{ A} \\times 1 \\ \\Omega = 2 \\text{ V}$$. This is the energy per coulomb wasted inside the cell.\n- Step 2: Calculate the terminal p.d. Using $$V = \\varepsilon - Ir$$, we get $$V = 12 \\text{ V} - 2 \\text{ V} = 10 \\text{ V}$$. The voltmeter across the cell's terminals will read 10 V, not 12 V.", "source": "GLM 5.1"}, {"q": "In a simple circuit with one cell and one external resistor $$R$$, why does a voltmeter across the cell's terminals read the exact same value as a voltmeter across the resistor $$R$$? (2 steps)", "a": "- Step 1: Define terminal p.d. The terminal p.d. is the voltage actually delivered to the external circuit.\n- Step 2: Apply circuit rules. Since $$R$$ is the *only* component in the external circuit, all of the terminal p.d. must be dropped across it. There are no other components to share the voltage with. Therefore, $$V_{\\text{terminal}} = V_R$$.", "source": "GLM 5.1"}, {"q": "A V-I graph line passes through the points (1 A, 4 V) and (3 A, 2 V). Find the internal resistance $$r$$ and the e.m.f. $$\\varepsilon$$. (3 steps)", "a": "- Step 1: Calculate the gradient. $$m = \\Delta V / \\Delta I = (2 - 4) / (3 - 1) = -2 / 2 = -1 \\text{ V/A}$$.\n- Step 2: Find internal resistance. Since gradient = $$-r$$, we have $$r = -(\\text{gradient}) = -(-1) = 1 \\ \\Omega$$.\n- Step 3: Find e.m.f. The e.m.f. is the y-intercept. Using $$y - y_1 = m(x - x_1)$$ with point (1, 4): $$V - 4 = -1(I - 1) \\Rightarrow V = -I + 5$$. The intercept is 5 V, so $$\\varepsilon = 5 \\text{ V}$$.", "source": "GLM 5.1"}, {"q": "If a problem gives number density $$n$$ as $$10^{20} \\text{ mm}^{-3}$$, what must you do before using it in the equation $$I = nAve$$, and what is the converted value? (2 steps)", "a": "- Step 1: Identify the required SI unit. In the equation $$I = nAve$$, the area $$A$$ is in $$\\text{m}^2$$ and velocity $$v$$ is in $$\\text{m/s}$$, so the number density $$n$$ must be in $$\\text{m}^{-3}$$ (carriers per cubic metre), not per cubic millimetre.\n- Step 2: Perform the conversion. Since $$1 \\text{ mm} = 10^{-3} \\text{ m}$$, a cubic millimetre is $$(10^{-3})^3 = 10^{-9} \\text{ m}^3$$. Therefore, $$10^{20}$$ carriers per $$\\text{mm}^3$$ equals $$10^{20} / 10^{-9} = 10^{29} \\text{ m}^{-3}$$.\n+ Exam trap: Forgetting to convert $$\\text{mm}^2$$ to $$\\text{m}^2$$ or $$\\text{mm}^3$$ to $$\\text{m}^3$$ is a guaranteed way to lose marks.", "source": "GLM 5.1"}, {"q": "Using \"Charlie the clown\" and his \"fuel tank\" of voltage, explain why the voltage across a component in a series circuit drops if another component's resistance increases. (3 steps)", "a": "- Step 1: Imagine the charge as Charlie, who starts with a full \"tank\" of voltage equal to the e.m.f. $$\\varepsilon$$.\n- Step 2: As Charlie travels through each resistor, he \"spends\" some of his voltage tank to get through. The amount he spends at each resistor is proportional to the resistance (since $$V = IR$$ and $$I$$ is the same in series).\n- Step 3: If one resistor gets larger, Charlie must spend *more* of his tank to get through it. Because his total tank was fixed at the start by $$\\varepsilon$$, spending more on the larger resistor leaves less voltage for the remaining resistors. Thus, the p.d. across the other components falls.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
</html>
