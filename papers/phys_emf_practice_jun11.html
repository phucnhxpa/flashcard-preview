<script>
const DATA={"selected": [{"question": "A student writes the energy formula $$E = IVt$$ when asked for the circuit relation linking e.m.f., terminal p.d., current and internal resistance. Why is this the wrong formula for this purpose, and what should they use instead? (2 steps)", "answer": "- Step 1: $$E = IVt$$ is the energy dissipated by a component over time — it is a power/energy formula, not a circuit relation. It doesn't involve internal resistance at all and doesn't describe how $$\\varepsilon$$, $$V$$, $$I$$, and $$r$$ are connected.\n- Step 2: The correct circuit relation is $$\\varepsilon = V + Ir$$ (or any of its rearrangements). This comes from energy conservation per coulomb around the loop, not from power calculations. If you blank in the exam, draw the circuit diagram and write $$\\varepsilon = V_1 + V_2$$, then substitute Ohm's law.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "Why does a car battery need a **very low** internal resistance, while a digital multimeter's internal battery can have a relatively high internal resistance with no problem? (2 steps)", "answer": "- Step 1: A car battery must deliver **very large currents** (hundreds of amps to the starter motor). If $$r$$ were even 1 Ω, the lost volts at 200 A would be $$Ir = 200$$ V — far exceeding the e.m.f. of 12 V, which is impossible. The battery would effectively short itself out. Car batteries have $$r \\approx 0.01\\;\\Omega$$ so lost volts are only ~2 V at 200 A.\n- Step 2: A multimeter's battery powers only tiny internal electronics drawing microamps. At $$I = 1\\;\\mu\\text{A}$$, even a large internal resistance of 100 Ω produces lost volts of only 0.1 mV — negligible. The current demand is so small that internal resistance barely matters.\n\nLow $$r$$ is critical when you need high current; it's irrelevant when the current is tiny. The \"cost\" of internal resistance scales with the current you draw.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "Real cells produce a $$V$$–$$I$$ graph that is approximately linear at low currents but may curve at high currents. What's the physical reason?", "answer": "The model $$V = \\varepsilon - rI$$ treats $$r$$ as a constant, but a real cell's internal resistance is not perfectly fixed. At high currents, the cell heats up (internal $$I^2 r$$ dissipation), and the resistance of the electrolyte/electrodes changes with temperature. The cell may also undergo chemical changes (polarization, electrode depletion) at high current draw. Once $$r$$ stops being constant, the linear relationship breaks down and the graph curves. Practical fix: only use the linear (low-current) portion of the graph to extract the gradient and hence $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "In CP8, Alex targeted neat current values ($$0.10, 0.20, 0.30, 0.40, 0.50\\;A$$). Why is it important to get a *spread* of currents rather than clustering them all near one value? (2 steps)", "answer": "- Step 1: A spread of currents gives data points that are well-distributed along the $$I$$-axis, making the line of best fit more reliable. If all points cluster together, the line's position (and especially its gradient) becomes highly sensitive to any single measurement error.\n- Step 2: A wide range also lets you detect non-linearity (curving at high currents) if it exists. With clustered data, you'd never notice the curve. Aim for the lowest readable current at one end and a significantly larger one at the other.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "From $$\\varepsilon = V + Ir$$, rearrange to get the form that is directly useful for a $$V$$–$$I$$ graph. What does each term correspond to in $$y = mx + c$$? (2 steps)", "answer": "- Step 1: Rearrange $$\\varepsilon = V + Ir$$ by subtracting $$Ir$$ from both sides: $$V = \\varepsilon - Ir$$, or equivalently $$V = -rI + \\varepsilon$$.\n- Step 2: Compare with $$y = mx + c$$: $$y = V$$, $$x = I$$, the gradient $$m = -r$$, and the $$y$$-intercept $$c = \\varepsilon$$. This means plotting $$V$$ (vertical) against $$I$$ (horizontal) gives a straight line sloping downwards, meeting the $$V$$-axis at the e.m.f.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "During Core Practical 8, a student keeps adjusting the battery's internal resistance slider between readings to \"get better data.\" Why does this destroy the experiment? (2 steps)", "answer": "- Step 1: The entire V–I graph method assumes that **$$r$$ is a single, constant value** throughout the experiment. The equation $$V = \\varepsilon - rI$$ describes a straight line only if both $$\\varepsilon$$ and $$r$$ stay fixed. If $$r$$ changes between readings, each data point corresponds to a *different* line — the points won't lie on one straight line.\n- Step 2: A gradient computed from points that don't share the same $$r$$ is **meaningless** — it won't equal any single internal resistance. You would be measuring a mixture of different resistances, and neither the gradient nor the intercept would correctly give you $$\\varepsilon$$ or $$r$$. Set $$r$$ once at the start, then vary *only* the external resistor $$R$$.\n\nInternal resistance is the thing you're *measuring* — it must be the controlled constant, not the variable you change.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Two students argue: A says \"current is the same in a series circuit because charge can't pile up\"; B says \"voltage is the same in parallel because it's a shared rule.\" Which framings are correct, and why? (3 steps)", "answer": "- Step 1: A is correct and well-reasoned: charge conservation forces the same current at every cross-section in a series loop — no charge accumulates anywhere in steady state.\n- Step 2: B is correct but the *reason* is sharper: parallel branches connect the same two nodes, and the voltage between two nodes is unique. Branches share the *same two terminal points*, so they share the voltage.\n- Step 3: These two complementary rules (series → same I, parallel → same V) plus Kirchhoff's loop/junction laws handle every DC circuit you'll meet at this level.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Qualitatively, how does the terminal p.d. $$V$$ of a cell change as the external load draws more current, and what is the underlying mechanism? (3 steps)", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, the terminal p.d. is the e.m.f. minus the lost volts $$Ir$$.\n- Step 2: As the load resistance $$R$$ decreases, the current $$I = \\varepsilon / (R+r)$$ increases, so the lost volts $$Ir$$ grows.\n- Step 3: Since $$\\varepsilon$$ is fixed, more lost volts means a smaller $$V$$ — the terminal p.d. falls as more current is drawn. This is why a torch dims when you short the battery, or your car headlights flicker when you start the engine (the starter motor draws huge current, dropping the battery's terminal p.d. momentarily).\n\nBigger demand on the cell ⇒ bigger internal loss ⇒ less left for the outside.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "A student claims \"in a parallel circuit, the voltage across the branches is reciprocal.\" Identify the misconception and state what's actually true. (2 steps)", "answer": "- Step 1: The confusion is between voltage and resistance. The *reciprocal* rule applies to **resistance** in parallel: $$1/R_\\text{total} = \\sum 1/R_i$$, not to voltage.\n- Step 2: In parallel, the **voltage is the same** across each branch (they share the same two nodes); the **current** is what splits between branches. In series, the opposite: current is the same, voltages add.\n\nMnemonic: same nodes ⇒ same voltage. Same wire ⇒ same current.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "When computing the gradient of a $$V$$–$$I$$ graph for CP8, why should you choose two points far apart on the line of best fit rather than two adjacent data points? (2 steps)", "answer": "- Step 1: The gradient is $$\\frac{\\Delta V}{\\Delta I}$$. Any uncertainty in reading coordinates (say ± a small amount) becomes a *fraction* of $$\\Delta V$$ and $$\\Delta I$$. A larger triangle means larger $$\\Delta V$$ and $$\\Delta I$$, so the fractional uncertainty is smaller.\n- Step 2: Using two close-together points amplifies the effect of reading errors on the gradient. A big triangle minimises this — it's a standard graph skill the exam rewards. Also, use points *on the line of best fit*, not raw data points, since the line smooths out random error.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "When mapping the equation $$V = \\varepsilon - rI$$ onto $$y = mx + c$$, what does the y-intercept represent physically, and what does it mean if the line passes through the origin? (3 steps)", "answer": "- Step 1: Comparing $$V = \\varepsilon - rI$$ with $$y = mx + c$$, the y-intercept ($$I = 0$$) is **$$\\varepsilon$$**, the e.m.f. Physically, this is the terminal p.d. when no current flows — the open-circuit voltage of the cell.\n- Step 2: If the line passed through the origin ($$V = 0$$ when $$I = 0$$), that would mean $$\\varepsilon = 0$$ — the cell provides no energy per coulomb at all. This would describe a \"dead\" cell with zero e.m.f., which is physically a cell that has no chemical energy left to convert.\n- Step 3: A real, functioning cell always has a **positive y-intercept** on a V–I graph. The intercept being $$\\varepsilon > 0$$ is what makes the line start above zero on the voltage axis and slope downward from there.\n\nThe y-intercept is your most direct measurement of e.m.f. — it's the voltage the cell gives \"for free\" when nothing is drawing current.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A student is asked: \"Define the e.m.f. of a battery.\" They write: \"The voltage across the battery terminals.\" Why does this score zero marks, and what is the correct definition? (2 steps)", "answer": "- Step 1: \"Voltage across the battery terminals\" describes the **terminal potential difference** $$V$$, not the e.m.f. $$\\varepsilon$$. These are different quantities — $$V < \\varepsilon$$ whenever current flows. The terminal p.d. is the *effect* (energy delivered), while e.m.f. is the *cause* (energy supplied).\n- Step 2: The correct definition: **\"The e.m.f. of a battery is the energy supplied per unit charge by the source\"** (or equivalently, \"the electrical energy produced per unit charge\"). The key word is **supplied** (or \"converted to electrical energy\"), distinguishing it from the energy *delivered* to the external circuit.\n\nE.m.f. = energy *supplied* per charge (cause). Terminal p.d. = energy *delivered* per charge (effect). Use the word \"supplied\" in your definition.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "On a circuit diagram, a cell of e.m.f. $$\\varepsilon$$ has internal resistance $$r$$ in series with an external resistor $$R$$. A voltmeter reads $$V$$ across $$R$$. Starting from conservation of energy for one coulomb going round the loop, derive $$\\varepsilon = V + Ir$$. (3 steps)", "answer": "- Step 1: Conservation of energy per coulomb: the total energy supplied by the cell must equal the total energy used in the circuit. So $$\\varepsilon = V_1 + V_2$$, where $$V_1$$ is the p.d. across the external resistor $$R$$ and $$V_2$$ is the p.d. across the internal resistance $$r$$.\n- Step 2: Express each p.d. using Ohm's law. The same current $$I$$ flows through both (series circuit), so $$V_1 = IR$$ and $$V_2 = Ir$$.\n- Step 3: The terminal p.d. is what the voltmeter across $$R$$ reads: $$V \\equiv V_1 = IR$$. Substituting: $$\\varepsilon = V + Ir$$.\n\nThis is the foundational cell equation — everything else in this topic is a rearrangement of this.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Limiting case: what happens to the current and terminal p.d. as $$R \\to 0$$ (short circuit) and as $$R \\to \\infty$$ (open circuit)? (3 steps)", "answer": "- Step 1: **Short circuit** ($$R = 0$$): $$I = \\varepsilon/r$$, which is the maximum possible current the cell can deliver. Terminal p.d. $$V = \\varepsilon - Ir = \\varepsilon - (\\varepsilon/r)r = 0$$. All the e.m.f. is now \"lost\" inside the cell, and the cell heats up dangerously.\n- Step 2: **Open circuit** ($$R \\to \\infty$$): $$I = \\varepsilon/(R+r) \\to 0$$. Lost volts $$\\to 0$$. Terminal p.d. $$V \\to \\varepsilon$$ — the cell's full e.m.f. appears across the terminals.\n- Step 3: These two limits sit at opposite ends of the $$V$$–$$I$$ graph: open circuit is the $$y$$-intercept ($$V = \\varepsilon$$, $$I = 0$$); short circuit is the $$x$$-intercept ($$V = 0$$, $$I = \\varepsilon/r$$). Real circuits operate somewhere between.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why does the terminal p.d. drop noticeably when you turn on the headlights of a car (large load) even though the battery's EMF is unchanged? (3 steps)", "answer": "- Step 1: The EMF is fixed by the battery's chemistry — it doesn't change when you add a load.\n- Step 2: But headlights draw a large current, so $$I$$ rises sharply, making the lost volts $$Ir$$ much bigger.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$ correspondingly drops. This is also why dashboard lights can momentarily dim when you crank the starter motor — huge $$I$$, huge $$Ir$$.\n\nThe bigger and more demanding the load, the more the terminal voltage sags.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why do we vary the *external* resistor $$R$$ rather than the internal $$r$$ in CP8, given that both would change the current?", "answer": "- Step 1: $$r$$ is the unknown we're trying to *measure* — treating it as the independent variable would be circular.\n- Step 2: Varying $$R$$ changes $$I$$ (since $$I = \\varepsilon/(R+r)$$) without disturbing $$r$$, giving multiple ($$I, V$$) pairs that all obey the same straight line.\n- Step 3: The straight line's intercept and slope then jointly reveal both $$\\varepsilon$$ and $$r$$ — two unknowns from one well-controlled experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "An LDR is moved from darkness into bright light. Using $$I = nAve$$, explain what happens to its resistance. (3 steps)", "answer": "- Step 1: When light intensity increases, photons deliver energy to electrons in the LDR's semiconductor material, freeing more of them to conduct. The charge-carrier density $$n$$ increases.\n- Step 2: From $$I = nAve$$, a larger $$n$$ means more current for the same voltage, i.e. lower resistance.\n- Step 3: In the dark, fewer electrons are free ($$n$$ is small), so resistance is high. In bright light, $$n$$ increases and resistance drops. The exam sentence: \"As light intensity increases, more free electrons are released, so $$n$$ increases, so resistance decreases.\"", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Why must you never quote a negative value for internal resistance $$r$$, even though the gradient of the $$V$$–$$I$$ graph is negative? (2 steps)", "answer": "- Step 1: The gradient equals $$-r$$, so $$r = -(\\text{gradient})$$. The gradient is negative, so $$r = -(\\text{negative}) = \\text{positive}$$. Resistance is a positive physical quantity — it represents opposition to current flow and cannot be negative for a passive component.\n- Step 2: The exam trap is writing \"$$r = -1.5\\;\\Omega$$\" because you read the gradient as $$-1.5$$ and forgot the extra minus sign. Always: $$r = -(\\text{gradient})$$, which flips the sign back to positive.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In Core Practical 8, why must the internal resistance $$r$$ be held constant throughout the experiment, and what goes wrong if it isn't?", "answer": "- Step 1: The whole method assumes $$V = \\varepsilon - rI$$ is a *single* straight line whose slope reveals one fixed value of $$r$$.\n- Step 2: If $$r$$ changes between readings, each data point lies on a *different* line — the plotted points scatter or curve, and the gradient no longer corresponds to any single internal resistance.\n- Step 3: In practice this means: set the cell once and never touch it again; only vary the external load $$R$$ to change the current.\n\nGarbage in, garbage out — a changing $$r$$ makes the gradient meaningless.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Synthesis: You have a cell with unknown $$\\varepsilon$$ and $$r$$. You connect a $$10\\;\\Omega$$ resistor and measure $$V = 8.0\\;V$$. You then connect a $$4\\;\\Omega$$ resistor and measure $$V = 6.0\\;V$$. Find $$\\varepsilon$$ and $$r$$. (4 steps)", "answer": "- Step 1: For the first measurement, $$I_1 = \\frac{V_1}{R_1} = \\frac{8.0}{10} = 0.80\\;A$$. The cell equation gives $$\\varepsilon = 8.0 + 0.80r$$.\n- Step 2: For the second measurement, $$I_2 = \\frac{V_2}{R_2} = \\frac{6.0}{4} = 1.50\\;A$$. The cell equation gives $$\\varepsilon = 6.0 + 1.50r$$.\n- Step 3: Set the two expressions for $$\\varepsilon$$ equal: $$8.0 + 0.80r = 6.0 + 1.50r$$, so $$2.0 = 0.70r$$, giving $$r = \\frac{2.0}{0.70} \\approx 2.86\\;\\Omega$$.\n- Step 4: Substitute back: $$\\varepsilon = 8.0 + 0.80(2.86) = 8.0 + 2.29 \\approx 10.3\\;V$$. Check: $$\\varepsilon = 6.0 + 1.50(2.86) = 6.0 + 4.29 \\approx 10.3\\;V$$. ✓ This is essentially what CP8 does — two points determine the line.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Why is the drift velocity of electrons in a typical wire extremely slow (order of $$mm\\,s^{-1}$$), even though the current appears to flow \"instantly\" when you flip a switch? (2 steps)", "answer": "- Step 1: From $$I = nAve$$, the drift velocity $$v = \\frac{I}{nAe}$$. In a metal like copper, the number density $$n$$ is enormous ($$\\sim 10^{28}\\;m^{-3}$$) — there are vast numbers of free electrons. With so many carriers, each one only needs to drift very slowly to carry a significant current.\n- Step 2: The \"instant\" response when you close a switch is due to the electric field propagating at near the speed of light along the wire — all electrons start drifting almost simultaneously. The signal travels fast, but the individual electrons move slowly. Think of a crowded corridor: a push at one end is felt quickly at the other, even though each person shuffles slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Why is the EMF of a cell only *exactly* equal to the terminal p.d. when the cell is disconnected (open circuit)?", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, the lost volts $$Ir$$ vanish only when $$I = 0$$.\n- Step 2: Open circuit means no current can flow (the load is effectively infinite resistance), so no energy is dissipated in $$r$$.\n- Step 3: With zero internal losses, every coulomb (conceptually — none actually flow) would arrive at the terminals with all of $$\\varepsilon$$ intact. A high-impedance voltmeter draws negligible current and so measures essentially $$\\varepsilon$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "What is meant by *number density* (or *charge-carrier density*) of a material, and what are its SI units? Why is the volumetric (per m$$^3$$) rather than per-area (per m$$^2$$) interpretation correct?", "answer": "Number density $$n$$ is the number of free charge carriers per unit *volume* of the material, with SI units of **m$$^{-3}$$**. The volumetric interpretation is correct because the carriers fill the bulk of the conductor in three dimensions — not just a surface layer. When you derive $$I = nAve$$, the volume of wire that passes a cross-section per second is $$A \\times v$$ (area times length-per-second), and the carriers in that volume are $$n \\times (Av)$$. The \"per m$$^3$$\" structure is what makes the dimensions of $$nAv$$ work out to (m$$^{-3}$$)(m$$^2$$)(m s$$^{-1}$$) = s$$^{-1}$$, so $$nAve$$ has units of C s$$^{-1}$$ = A. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A copper wire has cross-sectional area $$A = 1\\;\\text{mm}^2$$ and carries a current of 10 A. The number density of free electrons is approximately $$10^{29}\\;\\text{m}^{-3}$$. Without detailed calculation, estimate the order of magnitude of the drift velocity. Is it closer to mm/s, m/s, or km/s? (3 steps)", "answer": "- Step 1: Rearrange $$I = nAve$$ to solve for $$v$$: $$v = \\frac{I}{nAe}$$. Convert area: $$A = 1\\;\\text{mm}^2 = 10^{-6}\\;\\text{m}^2$$.\n- Step 2: Estimate the denominator: $$nAe \\approx 10^{29} \\times 10^{-6} \\times 1.6 \\times 10^{-19} = 1.6 \\times 10^{4}\\;\\text{C m}^{-1}$$. Then $$v = 10 / (1.6 \\times 10^4) \\approx 6 \\times 10^{-4}\\;\\text{m s}^{-1} \\approx 0.6\\;\\text{mm s}^{-1}$$.\n- Step 3: The drift velocity is on the order of **mm/s** — astonishingly slow. Despite 10 A being a substantial current, the sheer number of carriers ($$n \\sim 10^{29}$$) means they barely need to crawl. This is not km/s or even m/s.\n\nDrift velocity in metals is ~0.1–1 mm/s — about the speed of a snail. The signal (electromagnetic wave) travels near light speed, but the actual carriers barely move.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "An NTC thermistor is heated. Using the equation $$I = nAve$$, explain step by step why its resistance decreases. What is the causal chain that earns exam marks? (3 steps)", "answer": "- Step 1: Heating the thermistor **releases more electrons** from the atoms of the semiconductor material. This increases the number density of free charge carriers: $$n$$ increases.\n- Step 2: From $$I = nAve$$, if $$n$$ increases (while $$A$$, $$e$$, and approximately $$v$$ stay the same for a given voltage), then **more current** flows for the same applied voltage.\n- Step 3: Resistance is defined as $$R = V/I$$. If the same voltage $$V$$ now drives a larger current $$I$$, then $$R$$ must be **smaller**. The exam-mark causal chain: **\"As temperature increases, more free electrons are released, so $$n$$ increases, so resistance decreases.\"**\n\nNTC = Negative Temperature Coefficient — resistance goes *down* as temperature goes *up*. The mechanism is always: more thermal energy → more free carriers → lower resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "On a V–I graph for a cell, the line has a negative gradient. Explain *why* the gradient must be negative, in terms of the physics of what happens inside the cell as current increases. (2 steps)", "answer": "- Step 1: The gradient is $$-r$$, which is negative because internal resistance $$r$$ is always a **positive** quantity (resistance can't be negative). Every extra amp of current means an extra $$Ir$$ of \"lost volts\" inside the cell, so the terminal p.d. $$V = \\varepsilon - Ir$$ **decreases** as $$I$$ increases.\n- Step 2: Physically, more current means more charge carriers per second pass through the internal resistance, dissipating more energy as heat inside the cell. Each coulomb has less energy left over to deliver to the external circuit. The line slopes downward because the cell \"leaks\" more voltage internally as you demand more current from it.\n\nNegative gradient = positive internal resistance. If you ever calculate a negative $$r$$, you've made a sign error.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "An LDR and a fixed resistor form a potential divider across a battery, with the output taken across the LDR. The light intensity decreases. What happens to the output voltage? Walk through the causal chain. (3 steps)", "answer": "- Step 1: Decreasing light intensity means fewer photons hit the LDR → fewer free electrons released → number density $$n$$ **decreases** → LDR's resistance **increases**.\n- Step 2: In the potential divider, $$V_{\\text{LDR}} = \\varepsilon \\times \\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}}$$, where $$\\varepsilon$$ is the terminal p.d. As $$R_{\\text{LDR}}$$ increases, the fraction $$\\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}}$$ **increases** — the LDR claims a larger share of the voltage.\n- Step 3: Therefore, the output voltage across the LDR **increases** when it gets darker. This is how darkness-sensing circuits work: dark → high LDR resistance → high voltage across LDR → triggers a light to turn on.\n\nDark → $$n$$↓ → $$R_{\\text{LDR}}$$↑ → $$V_{\\text{LDR}}$$↑. When the output is across the LDR itself, darkness *increases* the output voltage.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "What does the phrase \"lost volts\" mean in cell circuits, and why is it given that name?", "answer": "\"Lost volts\" refers to the quantity $$\\varepsilon - V = Ir$$ — the energy per coulomb that is dissipated inside the cell as the current passes through the internal resistance. It's called \"lost\" because, from the perspective of the external circuit, this energy is unavailable: the charge starts with $$\\varepsilon$$ joules per coulomb at the source but arrives at the external terminals with only $$V = \\varepsilon - Ir$$ joules per coulomb. The \"missing\" $$Ir$$ has been spent on the way out, converted to heat in the cell itself.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A wire of cross-sectional area $$A$$ carries current $$I$$. If the area is doubled (same material, same current), what happens to the drift velocity? Explain using $$I = nAve$$. (2 steps)", "answer": "- Step 1: From $$I = nAve$$, solving for drift velocity: $$v = I/(nAe)$$. Since $$I$$, $$n$$, and $$e$$ are all held constant, doubling $$A$$ means $$v$$ is **halved**.\n- Step 2: Physically, a wider wire has more charge carriers per cross-section (more \"lanes on the highway\"). With twice the area, twice as many carriers pass a point simultaneously, so each one only needs to drift at half the speed to maintain the same total current. It's like a wider pipe carrying the same volume flow rate — the water moves slower.\n\nDouble the area → half the drift velocity (for fixed current). More \"lanes\" means each \"car\" can go slower while maintaining the same throughput.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "A cell of EMF 6 V and internal resistance 1 Ω is connected to a 5 Ω resistor. Without computing exact decimals, estimate the current and the terminal p.d., and explain the relative size of the \"lost volts.\" (3 steps)", "answer": "- Step 1: Total circuit resistance is $$R + r = 5 + 1 = 6\\ \\Omega$$, so $$I = \\varepsilon/(R+r) = 6/6 = 1\\ \\text{A}$$.\n- Step 2: Lost volts $$= Ir = 1 \\times 1 = 1\\ \\text{V}$$. Terminal p.d. $$V = \\varepsilon - Ir = 6 - 1 = 5\\ \\text{V}$$.\n- Step 3: The fraction lost internally equals $$r/(R+r) = 1/6$$ — about 17%. This is because the cell's $$r$$ is one-sixth of the total resistance, so one-sixth of the energy per coulomb is wasted inside.\n\nLost-volt fraction is just the ratio of $$r$$ to total resistance — a useful mental shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Alex says \"derive, don't memorise blindly.\" If you blank on the cell equation in an exam, what two-step recovery method did Alex recommend? (2 steps)", "answer": "- Step 1: Draw the circuit diagram — a cell with $$\\varepsilon$$ and $$r$$ in series with external $$R$$, a voltmeter across $$R$$, and an ammeter in series. Label the p.d. across $$R$$ as $$V_1$$ and across $$r$$ as $$V_2$$.\n- Step 2: Write energy conservation per coulomb: $$\\varepsilon = V_1 + V_2$$. Then substitute Ohm's law: $$V_1 = IR$$ and $$V_2 = Ir$$. Since $$V = V_1$$, you get $$\\varepsilon = V + Ir$$. From this one equation, all four forms can be derived by rearrangement.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "A cell with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ is short-circuited ($$R = 0$$). Derive an expression for the current, and explain why this situation is dangerous for a car battery but not for a small button cell. (3 steps)", "answer": "- Step 1: With $$R = 0$$, the cell equation $$I = \\frac{\\varepsilon}{R + r}$$ becomes $$I_{\\text{short}} = \\frac{\\varepsilon}{r}$$. All the e.m.f. drives current only through the internal resistance.\n- Step 2: Power dissipated inside the cell is $$P = I^2 r = \\frac{\\varepsilon^2}{r}$$. For a car battery ($$\\varepsilon = 12$$ V, $$r \\approx 0.01\\;\\Omega$$): $$I \\approx 1200$$ A, $$P \\approx 14{,}400$$ W — enormous heat generated inside the battery, causing fire or explosion.\n- Step 3: For a button cell ($$\\varepsilon = 1.5$$ V, $$r \\approx 1\\;\\Omega$$ or more): $$I \\approx 1.5$$ A, $$P \\approx 2.25$$ W — warm but manageable. The danger scales with $$\\varepsilon^2/r$$: high e.m.f. and low internal resistance make short circuits catastrophic.\n\nLow internal resistance is desirable for delivering power to a load — but it makes short circuits far more dangerous.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Why does a real cell have internal resistance, and what physically does the symbol $$r$$ represent?", "answer": "Internal resistance $$r$$ represents the resistance inherent to the materials *inside* the cell — the electrolyte, the electrodes, and the contacts. Charges moving through the cell to gain energy must also push through these imperfect conductors, and some of the energy the source gives them is immediately dissipated as heat inside the cell itself. It is modelled as a resistor of resistance $$r$$ in series with an ideal source of e.m.f. $$\\varepsilon$$, even though physically there is no separate component — it's a property of the cell as a whole.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A copper wire and a semiconductor wire have the same cross-section and carry the same current. Which has the higher drift velocity, and why does this matter physically? (3 steps)", "answer": "- Step 1: Copper has $$n \\sim 10^{28}$$ m$$^{-3}$$ (one free electron per atom). A semiconductor has dramatically fewer free carriers, often $$n \\sim 10^{16}$$ m$$^{-3}$$ or lower — many orders of magnitude smaller.\n- Step 2: From $$v = I/(nAe)$$, the semiconductor needs a much higher drift velocity to deliver the same current with so few carriers.\n- Step 3: This is why semiconductors are more resistive: to push few carriers fast you need a strong field, hence a large p.d. for a given current. Conversely, in copper, an enormous reservoir of slow-drifting electrons easily delivers high current.\n\nFewer carriers ⇒ they have to work harder (faster) ⇒ higher resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why is internal resistance often modelled as a separate \"resistor\" in series with an ideal e.m.f. source, even though physically the cell is a single object? (3 steps)", "answer": "- Step 1: Real cells have e.m.f. (from chemistry) *and* dissipative losses (from material resistance of the electrolyte, electrodes, etc.) happening within the same physical object.\n- Step 2: For circuit analysis, it's mathematically convenient to *separate* these two effects: an ideal e.m.f. source (no losses) in series with a resistor $$r$$ that captures all the loss.\n- Step 3: This works because the two effects add together in exactly the way a series combination would, by Kirchhoff's voltage law. You get the right predictions ($$V = \\varepsilon - Ir$$, lost volts, etc.) by treating them as separate components, even though they coexist in the same physical chunk of cell.\n\nThis is the standard physicist's move: replace a complicated real object with an idealised circuit equivalent that gives the same external behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "In the derivation of I = nAve, explain what each symbol represents and why drift velocity is much slower than the random thermal velocity of electrons. (3 steps)", "answer": "- Step 1: I = nAve where:\n  - I = current (A)\n  - n = number density of free charge carriers per m³ (m⁻³)\n  - A = cross-sectional area of conductor (m²)\n  - v = mean drift velocity of carriers (m s⁻¹)\n  - e = charge on each carrier (e = 1.6 × 10⁻¹⁹ C for electrons)\n\n- Step 2: Electrons in a conductor have very high random thermal velocities (~10⁵ m/s), but this motion is random and produces no net current. Drift velocity is the small net velocity in one direction due to the electric field (~10⁻⁴ m/s).\n\n- Step 3: Drift velocity is tiny because n is enormous (∼10²⁸ m⁻³ for copper). Even a slow drift of many electrons moving together produces measurable current. The random thermal motion is fast but cancels out; only the tiny net drift contributes to current.\n\n[Takeaway: High n and low v combine to give practical current values]", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "Synthesis question: A $$V$$–$$I$$ graph for a cell gives $$\\varepsilon = 4.5\\;V$$ and $$r = 3.0\\;\\Omega$$. If you wanted the maximum possible current from this cell, what external resistance would you choose, and what would that current be? What would the terminal p.d. be? (3 steps)", "answer": "- Step 1: From $$I = \\frac{\\varepsilon}{R + r}$$, the current is maximised when $$R$$ is minimised. The smallest possible external resistance is $$R = 0$$ (short circuit).\n- Step 2: Maximum current: $$I_{max} = \\frac{\\varepsilon}{0 + r} = \\frac{4.5}{3.0} = 1.5\\;A$$.\n- Step 3: Terminal p.d. at this current: $$V = \\varepsilon - Ir = 4.5 - (1.5)(3.0) = 0\\;V$$. All the e.m.f. is lost internally. This is the extreme case — maximum current but zero useful voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Why are drift velocities in metals so slow (millimetres per second), even though electrical signals propagate near light speed?", "answer": "- Step 1: From $$I = nAve$$, drift velocity is $$v = I/(nAe)$$. In copper, $$n \\approx 10^{28}\\ \\text{m}^{-3}$$ — an enormous number of free electrons per cubic metre.\n- Step 2: Because $$n$$ is so huge, even a modest current $$I$$ requires only a tiny $$v$$ to deliver enough charge per second.\n- Step 3: The *signal* speed is unrelated to drift speed: when you flip a switch, the electric field propagates through the wire near the speed of light, nudging every electron almost simultaneously. The individual electrons drift slowly, but the whole population starts moving together immediately.\n\nMany slow carriers ⇒ slow drift but huge current. The signal is the wave, not the carriers themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Why is it wrong to define e.m.f. as \"a force that pushes electrons around a circuit\"?", "answer": "E.m.f. is **not** a force despite its name (\"electromotive *force*\"). It is an energy per unit charge, measured in volts ($$J\\,C^{-1}$$). A force would be measured in newtons ($$N$$). The historical name is misleading — the e.m.f. tells you how much *energy* each coulomb receives from the source, not how much *mechanical force* acts on the charges. This is a classic exam trap: never define e.m.f. as a force.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Number density $$n$$ has units of $$\\text{m}^{-3}$$. A student writes \"$$n$$ is the number of free electrons per unit area of the wire.\" Why is this wrong, and what is the correct description? (2 steps)", "answer": "- Step 1: $$n$$ is a **volume** density — number of free charge carriers per cubic metre ($$\\text{m}^{-3}$$), not per square metre ($$\\text{m}^{-2}$$). It counts how many carriers exist in a *volume* of the material, not on a surface or cross-section.\n- Step 2: The cross-sectional area $$A$$ (in $$\\text{m}^2$$) is a *separate* variable in $$I = nAve$$. If $$n$$ were already \"per area,\" then $$nA$$ would have units of $$\\text{m}^{-2} \\times \\text{m}^2 = \\text{dimensionless}$$, which wouldn't work. The correct product $$n \\times A$$ gives carriers per metre of wire length ($$\\text{m}^{-3} \\times \\text{m}^2 = \\text{m}^{-1}$$), which then multiplies by drift velocity and charge to give current.\n\n$$n$$ = carriers per cubic metre (volume density). The area $$A$$ is the separate geometric factor. Don't conflate them.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Synthesis question: A thermistor is connected to a cell with internal resistance. As the thermistor is heated, its resistance decreases. What happens to (a) the current, (b) the lost volts, and (c) the terminal p.d.? Explain the chain of cause and effect. (4 steps)", "answer": "- Step 1: Heating the thermistor increases $$n$$ (more free electrons), so its resistance $$R$$ decreases.\n- Step 2: From $$I = \\frac{\\varepsilon}{R + r}$$, a smaller $$R$$ means a larger current $$I$$.\n- Step 3: The lost volts $$= Ir$$. Since $$I$$ has increased and $$r$$ is constant, the lost volts increase.\n- Step 4: The terminal p.d. $$V = \\varepsilon - Ir$$. Since $$Ir$$ has increased, $$V$$ decreases. Chain: heat → $$R$$ decreases → $$I$$ increases → lost volts increase → terminal p.d. decreases. This is a key insight: even though the *external* resistance dropped, the *terminal* p.d. also drops because the cell loses more voltage internally.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "What is the unit of charge-carrier density $ n $, and why is it per cubic meter? (2 steps)", "answer": "- Step 1: **Unit**  \n$ n $ has units of $ \\text{m}^{-3} $, representing the number of free charges per cubic meter.  \n- Step 2: **Volume vs. Area**  \nCharge carriers are distributed in 3D space, so density must account for volume, not just area or length.  \n\n+ **Misconception Probe**: Confusing $ n $ with surface density (per $ \\text{m}^2 $) would be incorrect.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "Both e.m.f. $$\\varepsilon$$ and terminal potential difference $$V$$ are measured in volts. What is the fundamental distinction between what each one *represents* in a circuit? (2 steps)", "answer": "- Step 1: **E.m.f. $$\\varepsilon$$** is the energy *supplied to* each coulomb by the source — it is the **cause**. It tells you how much energy the cell injects per coulomb. **Terminal p.d. $$V$$** is the energy *transferred by* each coulomb to the external circuit — it is the **effect**. It tells you how much energy each coulomb actually delivers to the load.\n- Step 2: They share the same unit (volt) but play opposite roles in the energy story: $$\\varepsilon$$ is what goes in, $$V$$ is what comes out. The gap between them is the \"lost volts\" $$Ir$$ — energy wasted inside the cell itself. Only when no current flows ($$I = 0$$) do they become equal: $$V = \\varepsilon$$.\n\nSame unit, opposite direction of energy flow — \"supplied\" vs \"delivered.\"", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A cell is described as having an e.m.f. of 6 V. In terms of energy and charge, what exactly does this mean — and why is the word \"force\" in \"electromotive force\" misleading? (2 steps)", "answer": "- Step 1: The e.m.f. $$\\varepsilon$$ is the **energy supplied per unit charge** by the source (the cell). Mathematically, $$\\varepsilon = \\frac{W}{Q}$$, where $$W$$ is the energy converted from chemical to electrical form and $$Q$$ is the charge passing through. So 6 V means **6 joules of chemical energy are converted to electrical energy for every coulomb** that passes through the cell.\n- Step 2: Despite the name \"electromotive *force*,\" e.m.f. is **not a force** at all — it has units of joules per coulomb ($$\\text{J C}^{-1}$$ = volts), not newtons. The historical name is a relic; exam-wise, never define e.m.f. as a force. It is an **energy-per-charge** quantity — think of it as the \"voltage budget\" the cell gives each coulomb before they leave.\n\nThink of e.m.f. as a pump pushing water uphill — it *supplies* energy to the flow, it doesn't push with a mechanical force.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "When does maximum power transfer from a cell to an external load occur, conceptually? (3 steps)", "answer": "- Step 1: Power to external load: $$P = I^2 R = \\left(\\dfrac{\\varepsilon}{R+r}\\right)^2 R$$.\n- Step 2: Two competing effects as $$R$$ varies: increasing $$R$$ raises the voltage share across $$R$$ but reduces the current. There's a sweet spot.\n- Step 3: Maximum power to the load occurs when $$R = r$$ — the external load \"matches\" the internal resistance. At this point, exactly half the EMF is dropped across $$r$$ (wasted) and half across $$R$$ (used), so the efficiency is only 50%.\n\nMaximum *power* transfer is not the same as maximum *efficiency* — efficiency is highest when $$R \\gg r$$ (less waste in $$r$$, but less power overall).", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What does the symbol $$\\varepsilon$$ represent in a cell, and what is the precise directional meaning (cause vs effect) of this quantity?", "answer": "$$\\varepsilon$$ is the **electromotive force (e.m.f.)** of the source, defined as the energy supplied to each unit charge by the source as it converts other forms of energy (chemical, mechanical, etc.) into electrical energy. The key directional nuance is that e.m.f. is a **cause**: it is energy *given to* the charges by the source, not energy *taken from* them. The unit is the volt ($$\\text{V} = \\text{J C}^{-1}$$). Despite the historical name, it is not a force — it has units of energy per charge, not newtons.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "A voltmeter connected across the terminals of a 12 V car battery reads only 10 V while the starter motor is running. Where did the \"missing\" 2 volts go, and what physical quantity inside the battery is responsible? (2 steps)", "answer": "- Step 1: The 2 V is the **\"lost volts\"** — energy per coulomb dissipated (as heat) *inside* the battery itself. The formula is $$\\varepsilon - V = Ir$$, so $$12 - 10 = Ir$$, meaning the lost volts equal the current times the internal resistance.\n- Step 2: The physical quantity responsible is the **internal resistance $$r$$** of the battery. It is the resistance of the chemicals and electrodes inside the cell. When a large current flows (a starter motor draws hundreds of amps), even a small $$r$$ produces a significant voltage drop $$Ir$$ across it, stealing energy before it ever reaches the terminals.\n\nThe bigger the current drawn, the more voltage is \"lost\" inside — this is why car batteries are designed with very low internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A cell of e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ is short-circuited (external resistance $$R = 0$$). What is the terminal p.d. and the current? Qualitatively, why is this dangerous? (3 steps)", "answer": "- Step 1: With $$R = 0$$, the current is $$I = \\frac{\\varepsilon}{R + r} = \\frac{\\varepsilon}{r}$$. Since $$r$$ is typically small (fractions of an ohm), this current is very large.\n- Step 2: The terminal p.d. is $$V = \\varepsilon - Ir = \\varepsilon - \\varepsilon = 0$$. All the e.m.f. is dropped across the internal resistance — the entire energy per coulomb is \"lost volts.\"\n- Step 3: This is dangerous because the huge current through $$r$$ dissipates power $$P = I^2 r$$ inside the cell, generating intense heat. The cell can overheat, leak, or explode. This is why you never short-circuit a real battery.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "For maximum **power transfer** to the load, what should the relationship between $$R$$ and $$r$$ be? Give a quick intuitive argument. (2 steps)", "answer": "- Step 1: Maximum power in the load occurs when $$R = r$$ (the external resistance equals the internal resistance). Intuitively: if $$R$$ is very small, most voltage is lost internally (low $$V$$, high $$I$$, but $$P = VI$$ is small because $$V \\approx 0$$). If $$R$$ is very large, current is tiny (high $$V$$, low $$I$$, but $$P$$ is small because $$I \\approx 0$$).\n- Step 2: Somewhere in between, there's a sweet spot where the product $$VI$$ is maximized. That sweet spot is $$R = r$$ — half the e.m.f. appears across the load, and the current is $$\\varepsilon/(2r)$$. This is the **maximum power transfer theorem**.\n\nMaximum power delivery requires matching the load to the source: $$R = r$$. But note: this also means 50% of the power is wasted inside the cell — it's efficient for *power*, not for *energy*.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "A student is asked to explain why $$V < \\varepsilon$$ when a current flows. They write: \"because some voltage is used up inside the cell.\" The examiner awards only 1 out of 3 marks. What is missing from the answer to get full marks? (3 steps)", "answer": "- Step 1: The phrase \"some voltage is used up\" is vague and doesn't identify *what* voltage or *where* exactly it's lost. It earns 1 mark for the general idea but lacks precision.\n- Step 2: To earn full marks, the answer must: (a) state that the e.m.f. is split between the external and internal resistances: $$\\varepsilon = V + Ir$$; (b) identify the \"lost volts\" specifically as $$Ir$$ — the p.d. across the internal resistance; and (c) conclude that therefore $$V = \\varepsilon - Ir < \\varepsilon$$.\n- Step 3: A full-marks answer: \"By conservation of energy per coulomb, $$\\varepsilon = V + Ir$$. Some of the e.m.f. is lost across the internal resistance ($$Ir$$, the 'lost volts'), so the terminal p.d. $$V = \\varepsilon - Ir$$ is less than $$\\varepsilon$$ whenever current flows.\" Three specific elements: conservation statement, identification of lost volts as $$Ir$$, conclusion.\n\nDon't be vague — name the quantity ($$Ir$$), name the mechanism (internal resistance), and show the algebra. Precision earns marks.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "Alex uses the analogy \"Charlie the clown has a fuel tank of voltage.\" Explain how this analogy helps you understand why $$V < \\varepsilon$$ and why changing one resistor in a potential divider affects the voltage across another. (3 steps)", "answer": "- Step 1: Each coulomb (Charlie) starts with a full \"tank\" of voltage equal to the e.m.f. $$\\varepsilon$$. As the coulomb travels through the circuit, it \"spends\" voltage at each resistor.\n- Step 2: The internal resistance is like a toll gate right at the exit of the fuel station — Charlie must spend some voltage there before even reaching the external circuit. That's the lost volts $$Ir$$. What remains ($$V = \\varepsilon - Ir$$) is what Charlie has left for the external load.\n- Step 3: In a potential divider with two external resistors, if one resistor gets bigger, it demands more of Charlie's remaining tank, leaving less for the other resistor. This is why $$V_{out}$$ falls when one resistance rises — Charlie spends more voltage at the bigger resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Why is EMF defined as \"energy per unit charge\" rather than as a force, despite the word \"electromotive force\"?", "answer": "- Step 1: The historical name is misleading. EMF has units of volts ($$\\text{J C}^{-1}$$), not newtons — it's an energy-per-charge quantity, not a force.\n- Step 2: Physically, the cell converts some other form of energy (chemical, in a battery) into electrical energy and hands it to each coulomb passing through. The defining ratio is $$\\varepsilon = W/Q$$ — joules of electrical energy produced per coulomb of charge moved.\n- Step 3: Calling it a \"force\" in an exam loses marks. The safe one-liner: *energy supplied to each unit charge by the source, converted into electrical energy.*", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "A common exam answer to \"why does $$V < \\varepsilon$$ when current flows?\" loses marks if it just says \"because of internal resistance.\" What's the full, mark-securing explanation? (3 steps)", "answer": "- Step 1: State the energy conservation: $$\\varepsilon = V_1 + V_2$$ around the loop, where $$V_2 = Ir$$ is the p.d. across the internal resistance.\n- Step 2: Explain that some of the energy per coulomb supplied by the cell is dissipated as heat in $$r$$ — these are the \"lost volts.\"\n- Step 3: Conclude: $$V = \\varepsilon - Ir$$, so as long as $$I > 0$$, $$V$$ must be smaller than $$\\varepsilon$$ by an amount equal to the lost volts.\n\nThe marks come from naming the mechanism (lost volts), the equation, and the directional logic — not just the buzzword.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "A thin wire and a thick wire (different cross-sectional areas $$A$$) carry the same current $$I$$. Which has the higher drift velocity, and why? (3 steps)", "answer": "- Step 1: From $$I = nAve$$, rearrange: $$v = I/(nAe)$$. With $$n$$ and $$e$$ fixed (same material), $$v \\propto 1/A$$.\n- Step 2: The *thinner* wire (smaller $$A$$) must have a *higher* drift velocity to push the same amount of charge per second through a smaller cross-section.\n- Step 3: Intuition: same number of cars per minute through a narrow road vs a wide road — the narrow-road cars must drive faster. This is why fuses are made of thin wire: they're forced into high-current-density operation, get hot, and melt at a chosen current threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Explain why the voltmeter must be connected across the cell terminals in Core Practical 8. (2 steps)", "answer": "- Step 1: **Terminal P.D. Measurement**  \nThe voltmeter measures the potential difference across the cell's terminals, which is the energy delivered to the external circuit.  \n- Step 2: **Excluding Internal Resistance**  \nConnecting across the terminals excludes the internal resistance $ r $, ensuring the reading reflects the usable voltage $ V = \\varepsilon - Ir $.  \n\n+ **Contrast**: Measuring across the internal resistance would give $ Ir $, not terminal p.d.", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "Typical drift velocities of electrons in a wire are extremely slow (fractions of a mm/s). Intuitively, why doesn't it take hours for a light to turn on when you flip a switch? (2 steps)", "answer": "- Step 1: The number density $$n$$ of free electrons in a conductor like copper is enormous (around $$10^{28} \\text{ m}^{-3}$$). Because there are so many charge carriers, a very slow drift velocity is sufficient to carry a large current ($$I = nAve$$).\n- Step 2: When the switch is closed, the electric field propagates through the wire at near the speed of light, causing *all* electrons along the wire to start drifting almost simultaneously, so the light turns on instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A voltmeter is connected across the terminals of an isolated cell with no external circuit attached. What does the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter reads the e.m.f. ($$\\varepsilon$$) of the cell.\n- Step 2: With no external circuit, the current $$I = 0$$. Therefore, the lost volts $$Ir = 0$$, and the cell equation $$V = \\varepsilon - Ir$$ simplifies to $$V = \\varepsilon$$. The terminal p.d. equals the full e.m.f. (This is the \"open circuit\" condition).", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "In the CP8 circuit, a student places a voltmeter across the cell terminals and a second voltmeter across the external resistor $$R$$. Why do both voltmeters read the same value? (2 steps)", "answer": "- Step 1: In this simple series circuit, the external resistor $$R$$ is the **only** component in the external circuit (besides the ammeter, which has negligible resistance). Therefore, all the terminal p.d. $$V$$ that appears across the cell's output terminals must be entirely dropped across $$R$$.\n- Step 2: By Kirchhoff's voltage law applied to the external loop: $$V_{\\text{terminal}} = V_R$$. There is nowhere else in the external loop for voltage to drop (the ammeter is assumed to have zero resistance). So both voltmeters measure the same potential difference — one at the source, one at the load, but they're the same number.\n\nYou only need one voltmeter; the second is redundant in this simple circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Derive the equation $$ \\varepsilon = I(R + r) $$ using Kirchhoff’s voltage law. (4 steps)", "answer": "- Step 1: Consider a closed loop with a cell (EMF $$ \\varepsilon $$), internal resistance ($$ r $$), and external resistor ($$ R $$).  \n- Step 2: Apply Kirchhoff’s voltage law: The sum of potential differences around the loop equals zero.  \n- Step 3: $$ \\varepsilon = V_R + V_r $, where $$ V_R = IR $$ and $$ V_r = Ir $$.  \n- Step 4: Substitute: $$ \\varepsilon = IR + Ir = I(R + r) $$.  \n\n**Synthesis:** This shows the EMF is the total voltage across both the internal and external resistances.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "Alex's teaching point: \"if you blank in the exam, draw the circuit and write $$\\varepsilon = V_1 + V_2$$.\" Why is this a powerful recovery strategy, and how does it lead you to the cell equation? (3 steps)", "answer": "- Step 1: Drawing the circuit forces you to identify the two \"voltage drops\" in the loop: $$V_1$$ across the external resistor and $$V_2$$ across the internal resistance. Writing $$\\varepsilon = V_1 + V_2$$ is just energy conservation — the cell supplies, the resistances consume.\n- Step 2: Apply Ohm's law to each resistance: $$V_1 = IR$$ (external) and $$V_2 = Ir$$ (internal). The current $$I$$ is the same through both (series circuit). So $$\\varepsilon = IR + Ir$$.\n- Step 3: Recognise that $$IR = V$$ (the terminal p.d., what the voltmeter reads). So $$\\varepsilon = V + Ir$$, which rearranges to $$V = \\varepsilon - Ir$$. From this single starting point, you can derive all four forms of the cell equation — no memorisation needed.\n\nIf you forget the formula, don't panic — draw the circuit, apply conservation of energy, and let Ohm's law do the rest. The derivation takes 30 seconds and always works.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "What's the difference between \"energy\" and \"power\" in cell-circuit equations, and why might $$E = IVt$$ confuse a student into using it for the cell equation? (3 steps)", "answer": "- Step 1: $$E = IVt$$ (or equivalently $$E = Pt$$ where $$P = IV$$) gives the *total energy* delivered over a time $$t$$. It's a power × time relation, not a circuit law.\n- Step 2: The cell equation $$\\varepsilon = V + Ir$$ relates *voltages* — energy *per coulomb* — and contains no time. It tells you how voltage is shared, not how energy accumulates.\n- Step 3: A student mixing these up might write \"$$\\varepsilon = IVt$$\" or try to substitute energy formulas into the loop equation. The fix: $$V = IR$$ is the right \"circuit\" companion to $$\\varepsilon = V + Ir$$; energy formulas like $$E = IVt$$ come *after* you've found currents and voltages.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In a potential divider circuit, the output voltage is taken across one of two resistors in series. Explain why the output voltage changes when the resistance of one component changes (e.g., thermistor or LDR). (3 steps)", "answer": "- Step 1: In a potential divider, the input voltage is shared between the two resistors according to their ratio: V_out = V_in × (R₂ / (R₁ + R₂))\n\n- Step 2: When one resistance changes (like a thermistor decreasing with temperature, or LDR decreasing with light), the ratio changes, so V_out changes.\n\n+ For example, if R_thermistor decreases: the fraction R/(R+R_fixed) decreases, so V_out decreases.\n\n- Step 3: This is because voltage is shared in series: lower resistance takes lower voltage drop (V = IR). If the thermistor resistance drops, it \"uses up\" less voltage, leaving more for the fixed resistor, and vice versa.\n\n+ This is the principle behind using thermistors/LDRs as sensors — they translate temperature/light into voltage.\n\n**Takeaway:** In a potential divider, output voltage depends on resistance ratio. Changing one resistance changes how voltage is shared.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "Starting from conservation of energy for one coulomb traveling around a series circuit containing a cell and an external resistor, derive the cell equation linking e.m.f. ($$\\varepsilon$$), terminal p.d. ($$V$$), current ($$I$$), and internal resistance ($$r$$). (3 steps)", "answer": "- Step 1: The energy supplied per coulomb by the cell ($$\\varepsilon$$) must equal the energy used per coulomb in the external resistor ($$V_1$$) plus the energy used per coulomb in the internal resistance ($$V_2$$). So, $$\\varepsilon = V_1 + V_2$$.\n- Step 2: Use Ohm's law ($$V = IR$$) for each resistance. The terminal p.d. is the p.d. across the external resistor, so $$V = V_1 = IR$$. The p.d. across the internal resistance is $$V_2 = Ir$$.\n- Step 3: Substitute these into the energy conservation equation to get the cell equation: $$\\varepsilon = V + Ir$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "Why does converting from millimetres to metres matter so much when applying $$I = nAve$$, and what's the conversion for areas and volumes?", "answer": "Because $$I = nAve$$ must be evaluated in SI units to give amperes. If $$A$$ is in mm$$^2$$ instead of m$$^2$$, or $$n$$ is in mm$$^{-3}$$ instead of m$$^{-3}$$, the result will be wrong by factors of $$10^6$$ or $$10^9$$. The conversions:\n- 1 mm = $$10^{-3}$$ m, so 1 mm$$^2$$ = $$10^{-6}$$ m$$^2$$ and 1 mm$$^3$$ = $$10^{-9}$$ m$$^3$$.\n- Hence 1 mm$$^{-3}$$ (a density per cubic mm) = $$10^{9}$$ m$$^{-3}$$.\n\nAlways check the units before plugging in. A common exam trap is being given $$n$$ in carriers per mm$$^3$$ and area in mm$$^2$$, then forgetting the conversion and producing an answer wrong by a factor of $$10^{15}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Suppose you double the internal resistance of a cell while keeping $$\\varepsilon$$ and the external resistor $$R$$ fixed. What happens to (a) the current, (b) the terminal p.d., and (c) the lost volts? (3 steps)", "answer": "- Step 1: Current $$I = \\varepsilon/(R+r)$$. Doubling $$r$$ increases the denominator (but not by a factor of 2 — only by $$r/(R+r)$$). Current *decreases*, but only modestly if $$r \\ll R$$.\n- Step 2: Lost volts = $$Ir$$. Although $$I$$ has fallen, $$r$$ has doubled — and since $$r$$ doubles in full while $$I$$ falls by a smaller fractional amount, lost volts *increase*.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$, so $$V$$ *decreases*. The cell delivers less to the external circuit because more is now wasted internally.\n\nBigger $$r$$ = more internal waste = less useful output. This is why old/cold/depleted batteries fail to power devices: not because $$\\varepsilon$$ drops dramatically, but because $$r$$ has risen.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "In CP8, why is varying the external resistor $$R$$ the correct way to generate different data points on the $$V$$–$$I$$ graph?", "answer": "Because changing $$R$$ changes the current $$I = \\varepsilon/(R+r)$$ flowing in the loop, which in turn changes the terminal p.d. $$V = \\varepsilon - Ir$$. Each setting of $$R$$ gives a single ($$I, V$$) data point. By sweeping $$R$$ across a wide range, you get a spread of currents and terminal voltages that traces out the straight line $$V = \\varepsilon - rI$$. Crucially, varying $$R$$ leaves $$\\varepsilon$$ and $$r$$ (the things you're trying to measure) untouched — they remain the fixed properties of the cell.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why can’t the terminal potential difference (V) ever exceed the EMF (ε) of the cell when current is flowing? (3 steps)", "answer": "- Step 1: Terminal voltage is given by $$ V = \\varepsilon - Ir $$.  \n- Step 2: The term $$ Ir $$ (lost volts) is always positive (since $$ I $$ and $$ r $$ are positive).  \n- Step 3: Subtracting $$ Ir $$ from $$ \\varepsilon $$ ensures $$ V < \\varepsilon $$.  \n\n**Exception:** In an open circuit ($$ I = 0 $$), $$ V = \\varepsilon $$.", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "In the PhET simulation for CP8, why do voltmeters placed (a) across the cell's terminals and (b) across the external resistor $$R$$ read identical values, when only one external resistor is present? (3 steps)", "answer": "- Step 1: Apply Kirchhoff's voltage law around the loop: $$\\varepsilon = V_{\\text{across } r} + V_{\\text{across } R}$$.\n- Step 2: The voltmeter across the cell's terminals reads everything *outside* the internal resistance, which is exactly $$V_{\\text{across } R}$$ when $$R$$ is the only external component.\n- Step 3: So $$V_{\\text{terminals}} = V_R = IR$$. Both voltmeters measure the same thing, just from different vantage points. You can delete one without losing information.\n\nIf you added a second external resistor, this would break — terminal p.d. would then equal the sum of the p.d.s across both external resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why is the \"lost volts\" $$Ir$$ specifically the energy *per coulomb* lost inside the cell, rather than just an arbitrary voltage drop? (3 steps)", "answer": "- Step 1: The cell does work on each coulomb passing through, depositing $$\\varepsilon$$ joules per coulomb. But to deliver that, the coulomb must traverse the cell's internal resistance $$r$$.\n- Step 2: The energy dissipated by a coulomb crossing resistance $$r$$ at current $$I$$ is $$W = Vq = (Ir)(1\\text{ C}) = Ir$$ joules per coulomb — exactly the lost volts.\n- Step 3: So $$Ir$$ is literally the joules of energy *each individual coulomb* loses to heat inside the cell. The total power wasted inside is $$I \\times (Ir) = I^2 r$$ (per second, since $$I$$ is coulombs per second). The \"per coulomb\" framing is what makes it a voltage; the \"per second\" framing makes it a power.\n\nSame physics, two scales of bookkeeping.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "You are setting up CP8 in a simulation. You accidentally nudge the \"battery resistance\" slider between readings. What goes wrong with your results, and how would the $$V$$–$$I$$ graph look different from expected? (3 steps)", "answer": "- Step 1: The method assumes $$r$$ is a constant unknown. Each ($$I$$, $$V$$) reading should lie on the same straight line $$V = \\varepsilon - rI$$ with a single value of $$r$$.\n- Step 2: If you change $$r$$ between readings, each data point corresponds to a *different* internal resistance. The points no longer fall on a single straight line.\n- Step 3: The graph would show scatter or a curve rather than a clean straight line. The gradient of any line of best fit would not correspond to any single value of $$r$$. The fix: set $$r$$ once at the start and never touch it again — only vary the external load $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student plots a V–I graph but accidentally puts current $$I$$ on the vertical axis and voltage $$V$$ on the horizontal axis. What would the gradient of this graph represent, and how would it relate to the internal resistance $$r$$? (3 steps)", "answer": "- Step 1: With the axes swapped, the relationship becomes $$I$$ as a function of $$V$$. Starting from $$V = \\varepsilon - rI$$, rearrange: $$rI = \\varepsilon - V$$, so $$I = \\frac{\\varepsilon}{r} - \\frac{1}{r}V$$. This is a straight line with gradient $$-\\frac{1}{r}$$ and y-intercept $$\\frac{\\varepsilon}{r}$$.\n- Step 2: The gradient of this swapped-axis graph is **$$-1/r$$**, not $$-r$$. So the internal resistance would be $$r = -1/(\\text{gradient})$$, a different formula entirely from the standard method.\n- Step 3: This is a common exam trap. The standard CP8 method assumes $$V$$ on the y-axis and $$I$$ on the x-axis. Swapping the axes inverts the relationship — the gradient changes from $$-r$$ to $$-1/r$$. Always check which variable is on which axis before computing.\n\nPlot V vertically, I horizontally — or your gradient means something completely different.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "In the equation $$I = nAve$$, the drift velocity $$v$$ of electrons in a typical copper wire carrying a normal current is extremely slow — on the order of mm/s. Why isn't the current zero if the carriers are moving so slowly? (2 steps)", "answer": "- Step 1: The drift velocity is slow, but there are an **enormous number** of charge carriers. In copper, $$n \\approx 10^{29}\\;\\text{m}^{-3}$$ — roughly one free electron per atom. Even though each electron crawls at ~0.1 mm/s, the *total* charge per second passing a cross-section is huge because so many electrons are moving simultaneously.\n- Step 2: Think of it like a congested highway: each car crawls slowly, but if there are millions of lanes (large $$A$$) and bumper-to-bumper traffic (huge $$n$$), the total number of cars passing a point per second is still very large. Current is the *aggregate* flow of charge — it's the product of all four factors, not just velocity alone.\n\nSlow drift + astronomical carrier density = significant current. It's the $$n$$ term that compensates for the tiny $$v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "A student calculates the internal resistance from a V–I graph and writes just \"7.1\" with no unit. How many marks would this likely lose in an Edexcel exam, and why is the unit essential? (2 steps)", "answer": "- Step 1: Writing a bare number with no unit would **lose the final mark** for that calculation (typically the answer mark in a \"show that\" or \"calculate\" question). Edexcel mark schemes require both the correct numerical value *and* the correct unit.\n- Step 2: The unit for internal resistance is the **ohm** ($$\\Omega$$), which is equivalent to $$\\text{V A}^{-1}$$. Since you computed the gradient in $$\\text{V A}^{-1}$$ and then took its magnitude, the unit naturally comes out as $$\\Omega$$. Writing \"7.1 $$\\Omega$$\" is complete; writing \"7.1\" is ambiguous — it could be ohms, kilohms, or anything.\n\nAlways pair your numerical answer with its unit. For resistance from a V–I graph, the gradient unit $$\\text{V A}^{-1}$$ = $$\\Omega$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "Why is \"energy supplied to the charges\" the correct framing for e.m.f., while \"energy transferred by the charges\" is the correct framing for terminal p.d.?", "answer": "Both quantities are measured in volts (joules per coulomb), but they describe energy flow in opposite directions relative to the charge:\n- **E.m.f.**: the source *gives* energy to the charge. The chemical (or other) energy of the cell is converted and *deposited into* the moving charge. Direction: source → charge.\n- **Terminal p.d.**: the charge *gives* energy to the external circuit (resistor, lamp, etc.). The charge arrives at the load carrying energy and *deposits it into* heating the resistor or lighting the bulb. Direction: charge → load.\n\nSame unit, opposite roles. Saying \"supplied\" for e.m.f. and \"transferred\" or \"delivered\" for terminal p.d. captures this — it's the language that earns the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Drift velocity in a copper wire is typically very slow (millimetres per second). Given that turning on a light is essentially instant, how can both facts be true? (3 steps)", "answer": "- Step 1: Drift velocity is slow because $$n$$ in copper is enormous ($$\\sim 10^{28}$$ m$$^{-3}$$). From $$I = nAve$$, a modest current $$I$$ in a thin wire requires only a tiny $$v$$ when $$n$$ is huge.\n- Step 2: But the wire is *already full* of free electrons everywhere. When you close the switch, an electric field propagates through the wire at near light speed, pushing on *every* electron simultaneously.\n- Step 3: So even though individual electrons drift slowly, the *signal* (the field) arrives essentially instantly, and electrons at the bulb start moving at the same moment as electrons at the battery. Analogy: a long tube already full of marbles — pushing one in at the back instantly pushes one out at the front, even though each marble barely moves.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Why is it sensible to use a wide range of currents (from a low value to a relatively high value) in CP8, rather than clustering all data points near one current?", "answer": "A wider spread of currents gives a longer \"lever arm\" along the horizontal axis when you compute the gradient. Since gradient $$= \\Delta V / \\Delta I$$, any uncertainty in reading $$V$$ becomes a smaller fraction of the change when $$\\Delta I$$ is large. Tightly clustered points are vulnerable to random scatter dominating the apparent slope, giving a poor estimate of $$r$$. Equally, the extrapolation back to $$I = 0$$ for the intercept ($$\\varepsilon$$) is more reliable when the line is well-constrained by points spanning a wide range.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why would using a single-resistor reading (just one value of $$V$$ at one current) be worse than a $$V$$–$$I$$ graph for finding $$\\varepsilon$$ and $$r$$? (3 steps)", "answer": "- Step 1: With one reading, you have one equation and two unknowns — you can't solve uniquely without an extra assumption (like measuring $$\\varepsilon$$ separately first).\n- Step 2: Even with two readings you'd be susceptible to single-measurement errors; one bad data point throws off the answer.\n- Step 3: A graph with many data points lets you average over random scatter (line of best fit), simultaneously finds *both* unknowns from one fit, and lets you visually spot anomalies or non-linearity (e.g. cell heating).\n\nMore data → robustness + better precision + free diagnostic.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "In Core Practical 8, why must the internal resistance $$r$$ be kept constant throughout the experiment, and what happens to the $$V$$–$$I$$ data if it isn't? (3 steps)", "answer": "- Step 1: The whole method assumes $$V = \\varepsilon - rI$$ is a straight line with a single fixed gradient $$-r$$. The point of the experiment is to *measure* that one value of $$r$$.\n- Step 2: If $$r$$ changes between data points, then different points correspond to different gradients, so the points won't lie on one straight line — they'll scatter or curve, and any gradient you extract will be physically meaningless.\n- Step 3: The control is therefore: set $$r$$ once (e.g., the PhET \"Battery Resistance\" slider) and only ever change the external load $$R$$ to sweep out different currents. This is why Alex kept warning \"don't touch that slider again.\"\n\nOne control variable rule: vary $$R$$, never $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Two resistors are in parallel across a battery. A student says \"the voltage is shared between the branches — each branch gets half the total voltage.\" Why is this wrong, and what is the correct rule? (2 steps)", "answer": "- Step 1: In a **parallel** circuit, the voltage across **each branch is the same** — it equals the terminal p.d. of the supply. The branches are connected to the same two nodes, so the potential difference across each one is identical. It is **not** shared or divided.\n- Step 2: What *is* shared in parallel is the **current** — the total current splits between the branches (Kirchhoff's current law). The branch with lower resistance gets more current, but both branches see the same voltage. Voltage sharing (adding up) is the rule for **series** circuits, not parallel.\n\nParallel: same voltage, current splits. Series: same current, voltage splits. Mixing these up is a common exam error.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "How does varying the external resistor $ R $ affect the current $ I $ and terminal p.d. $ V $? (2 steps)", "answer": "- Step 1: **Effect on Current**  \nIncreasing $ R $ decreases current $ I = \\frac{\\varepsilon}{R + r} $, as total resistance $ R + r $ increases.  \n- Step 2: **Effect on Terminal P.D.**  \nTerminal p.d. $ V = \\varepsilon - Ir $ increases when $ I $ decreases because less energy is lost to internal resistance.  \n\n+ **Example**: If $ R \\to \\infty $ (open circuit), $ I = 0 $ and $ V = \\varepsilon $.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why does Alex insist you should be able to *derive* the cell equation from first principles rather than just memorise it? (3 steps)", "answer": "- Step 1: In an exam, blanking on a formula is common — but if you understand the underlying physics (energy per coulomb is conserved around a loop), you can reconstruct it from a circuit diagram in 30 seconds.\n- Step 2: Memorisation without understanding fails when the problem is dressed up differently — e.g. a circuit with two cells, or a question phrased about energy rather than voltage.\n- Step 3: The energy-conservation derivation also makes clear *why* each term appears, which helps you spot when a formula doesn't apply (e.g. non-series circuits, or when $$r$$ varies).\n\nThe derivation is also a recall scaffold: draw circuit → write $$\\varepsilon = V_1 + V_2$$ → apply $$V = IR$$ to each → done.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Derive the equation $$I = nAve$$ from the basic definition of current. (5 steps)", "answer": "- Step 1: Start with the definition $$I = Q/t$$ — current is charge per unit time.\n- Step 2: For a wire of cross-section $$A$$, consider a length $$s$$. The volume is $$As$$, and the number of free charge carriers in it is $$n \\times As$$ (where $$n$$ is carriers per cubic metre).\n- Step 3: Each carrier has charge $$e$$, so the total charge in that length is $$Q = nAse$$.\n- Step 4: Now ask: how long does it take for *all* of that charge to drift past a fixed cross-section? If carriers drift at mean speed $$v$$, time taken is $$t = s/v$$.\n- Step 5: Substituting: $$I = Q/t = nAse \\cdot (v/s) = nAve$$.\n\nThe factor $$s$$ cancels — the result is independent of how long a slug of wire you chose, as it should be.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "In a copper wire with $$n \\sim 10^{29}$$ m$$^{-3}$$, area $$1$$ mm$$^2$$, carrying $$10$$ A, the drift velocity is roughly... conceptually, what order of magnitude, and why is it so slow? (3 steps)", "answer": "- Step 1: Rearrange $$I = nAve$$: $$v = I/(nAe)$$.\n- Step 2: Plug in orders of magnitude: numerator $$\\sim 10$$; denominator $$\\sim 10^{29} \\times 10^{-6} \\times 10^{-19} \\sim 10^{4}$$. So $$v \\sim 10/10^4 = 10^{-3}$$ m s$$^{-1}$$, i.e., about 1 mm per second.\n- Step 3: This is millimetres per second — astonishingly slow compared to everyday motion. The reason is the huge $$n$$: copper is *packed* with free electrons, so each only needs to drift very slowly to collectively deliver a large current. The shopping-bags analogy: lots of porters carrying bags slowly = lots of bags delivered overall.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "An LDR (light-dependent resistor) is moved from a dark room into bright sunlight. Explain via $$n$$ what happens to its resistance, and what would happen if it were placed back in the dark. (3 steps)", "answer": "- Step 1: An LDR is a semiconductor where incoming photons release electrons from atoms (photoelectric-style effect within the material). More light ⇒ more photons ⇒ more electrons released ⇒ $$n$$ increases.\n- Step 2: From $$I = nAve$$, higher $$n$$ means more current for the same p.d., so resistance decreases. In bright light, the LDR has low resistance.\n- Step 3: In the dark, no photons release electrons, $$n$$ is small, and resistance is high. So an LDR acts as a \"light sensor\": low $$R$$ in light, high $$R$$ in dark.\n\nThis is why street lights with LDR sensors switch on at dusk: in darkness, the LDR's high resistance triggers the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "On a V–I graph, a student calculates the gradient as $$-5.0\\;\\text{V A}^{-1}$$ and writes \"$$r = -5.0\\;\\Omega$$.\" What mistake has been made, and what is the correct value of $$r$$? (2 steps)", "answer": "- Step 1: The gradient of the V–I graph is $$-r$$, not $$r$$. The student has written the gradient directly as the internal resistance, forgetting to account for the **negative sign**. The equation is $$V = \\varepsilon - rI$$, so gradient = $$-r$$.\n- Step 2: The correct relationship is $$r = -(\\text{gradient}) = -(-5.0) = 5.0\\;\\Omega$$. Internal resistance is always a **positive** quantity — if you get a negative value, you've made a sign error. This is the single most common exam trap on V–I graphs.\n\nGradient = $$-r$$, so $$r$$ = minus the gradient. Never report a negative internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Explain why connecting batteries in parallel can be useful despite not increasing the e.m.f. What advantage does this configuration provide? (2 steps)", "answer": "- Step 1: In parallel, each cell supplies part of the current to the external load. The total internal resistance is halved (for two identical cells), so the \"lost volts\" Ir are reduced for a given load current.\n\n- Step 2: This means the terminal voltage stays higher under load, and each cell supplies only half the current it would if alone. This reduces the strain (current demand) on each cell and extends battery life. It's useful when you need to deliver high current while keeping terminal voltage stable.\n\n[Takeaway: Parallel cells share the load current, reducing internal resistance and voltage drop]", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "Why might a real cell's $$V$$–$$I$$ graph curve at large currents, and how should you handle this in analysis? (3 steps)", "answer": "- Step 1: At large currents, the cell heats up (Joule heating $$I^2 r$$ inside it), and its internal resistance is not truly co
