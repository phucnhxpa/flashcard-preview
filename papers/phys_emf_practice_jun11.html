er density, $$A$$ = area, $$v$$ = drift velocity, $$e$$ = electron charge.\n- Step 2: The only symbol difference is $$q$$ vs $$e$$. $$q$$ is the general symbol for the charge on any carrier; $$e$$ specifically means the electron charge ($$1.6 \\times 10^{-19}\\;C$$). When the carriers are electrons, $$q = e$$ and the two forms are identical. Use $$e$$ when dealing with metals (electron conductors); use $$q$$ for other carriers (e.g. ions in solution).", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "A semiconductor has $$n \\approx 10^{16}\\;m^{-3}$$ (much lower than copper's $$\\sim 10^{29}\\;m^{-3}$$). If the same current flows through a semiconductor and a copper wire of the same cross-sectional area, which has the higher drift velocity, and roughly by how many orders of magnitude? (3 steps)", "answer": "- Step 1: From $$I = nAve$$, the drift velocity $$v = \\frac{I}{nAe}$$. For the same $$I$$, $$A$$, and $$e$$, the drift velocity is inversely proportional to $$n$$.\n- Step 2: The ratio of drift velocities is $$\\frac{v_{\\text{semi}}}{v_{\\text{Cu}}} = \\frac{n_{\\text{Cu}}}{n_{\\text{semi}}} = \\frac{10^{29}}{10^{16}} = 10^{13}$$.\n- Step 3: The semiconductor's drift velocity is roughly $$10^{13}$$ times higher than copper's. With far fewer carriers, each one must move much faster to carry the same current. This doesn't mean the current flows faster in a practical sense — the signal speed depends on the electric field, not the drift velocity.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "Why does the specification for CP8 say \"Determine the e.m.f. and internal resistance of an *electrical cell*\" — why specifically a cell, and not any component? (2 steps)", "answer": "- Step 1: A cell (or battery) is a source of e.m.f. that has an inherent internal resistance. The $$V$$–$$I$$ graph method relies on the linear relationship $$V = \\varepsilon - rI$$, which describes how the terminal voltage of a source drops as current increases.\n- Step 2: A passive component (like a resistor) doesn't have an e.m.f. — it has no \"energy source\" inside it. You can't measure an e.m.f. or \"internal resistance\" for a resistor in the same way. The concept of internal resistance only makes sense for a source that *provides* energy and *loses* some internally before delivering it.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}], "count": 62}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A cell is described as having an e.m.f. of 6 V. In terms of energy and charge, what exactly does this mean — and why is the word \"force\" in \"electromotive force\" misleading? (2 steps)", "answer": "- Step 1: The e.m.f. $$\\varepsilon$$ is the **energy supplied per unit charge** by the source (the cell). Mathematically, $$\\varepsilon = \\frac{W}{Q}$$, where $$W$$ is the energy converted from chemical to electrical form and $$Q$$ is the charge passing through. So 6 V means **6 joules of chemical energy are converted to electrical energy for every coulomb** that passes through the cell.\n- Step 2: Despite the name \"electromotive *force*,\" e.m.f. is **not a force** at all — it has units of joules per coulomb ($$\\text{J C}^{-1}$$ = volts), not newtons. The historical name is a relic; exam-wise, never define e.m.f. as a force. It is an **energy-per-charge** quantity — think of it as the \"voltage budget\" the cell gives each coulomb before they leave.\n\nThink of e.m.f. as a pump pushing water uphill — it *supplies* energy to the flow, it doesn't push with a mechanical force.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "Both e.m.f. $$\\varepsilon$$ and terminal potential difference $$V$$ are measured in volts. What is the fundamental distinction between what each one *represents* in a circuit? (2 steps)", "answer": "- Step 1: **E.m.f. $$\\varepsilon$$** is the energy *supplied to* each coulomb by the source — it is the **cause**. It tells you how much energy the cell injects per coulomb. **Terminal p.d. $$V$$** is the energy *transferred by* each coulomb to the external circuit — it is the **effect**. It tells you how much energy each coulomb actually delivers to the load.\n- Step 2: They share the same unit (volt) but play opposite roles in the energy story: $$\\varepsilon$$ is what goes in, $$V$$ is what comes out. The gap between them is the \"lost volts\" $$Ir$$ — energy wasted inside the cell itself. Only when no current flows ($$I = 0$$) do they become equal: $$V = \\varepsilon$$.\n\nSame unit, opposite direction of energy flow — \"supplied\" vs \"delivered.\"", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A voltmeter connected across the terminals of a 12 V car battery reads only 10 V while the starter motor is running. Where did the \"missing\" 2 volts go, and what physical quantity inside the battery is responsible? (2 steps)", "answer": "- Step 1: The 2 V is the **\"lost volts\"** — energy per coulomb dissipated (as heat) *inside* the battery itself. The formula is $$\\varepsilon - V = Ir$$, so $$12 - 10 = Ir$$, meaning the lost volts equal the current times the internal resistance.\n- Step 2: The physical quantity responsible is the **internal resistance $$r$$** of the battery. It is the resistance of the chemicals and electrodes inside the cell. When a large current flows (a starter motor draws hundreds of amps), even a small $$r$$ produces a significant voltage drop $$Ir$$ across it, stealing energy before it ever reaches the terminals.\n\nThe bigger the current drawn, the more voltage is \"lost\" inside — this is why car batteries are designed with very low internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "A student says: \"When I disconnect the external circuit entirely, the voltmeter across the cell reads zero because there's no complete circuit.\" Is this correct? What does the voltmeter actually read, and why? (3 steps)", "answer": "- Step 1: The student is **incorrect**. A voltmeter across the terminals of an open-circuited cell does **not** read zero.\n- Step 2: When the external circuit is disconnected, the current $$I = 0$$. From the cell equation $$V = \\varepsilon - Ir$$, substituting $$I = 0$$ gives $$V = \\varepsilon - 0 = \\varepsilon$$. The voltmeter reads the **full e.m.f.** of the cell.\n- Step 3: The physical reason: with no current flowing, there are **no lost volts** ($$Ir = 0$$). None of the energy per coulomb is wasted inside the cell, so every joule per coulomb the cell provides arrives at the terminals. The voltmeter (which draws negligible current) effectively sees the open-circuit voltage, which equals $$\\varepsilon$$.\n\nOpen circuit → no current → no lost volts → voltmeter reads the full e.m.f.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Starting from energy conservation for one coulomb travelling around a series loop (cell with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, plus external resistor $$R$$), derive the cell equation $$\\varepsilon = V + Ir$$. Explain each step physically. (3 steps)", "answer": "- Step 1: Apply **conservation of energy per coulomb** around the loop. The energy each coulomb receives from the cell ($$\\varepsilon$$) must equal the total energy it delivers to all resistances in the loop. There are two resistances in series: the external resistor $$R$$ (p.d. $$V_1$$ across it) and the internal resistance $$r$$ (p.d. $$V_2$$ across it). So: $$\\varepsilon = V_1 + V_2$$.\n- Step 2: Express each p.d. using Ohm's law $$V = IR$$. The same current $$I$$ flows through both resistances (they are in series), so $$V_1 = IR$$ and $$V_2 = Ir$$. The terminal p.d. is what the voltmeter across the external resistor reads: $$V \\equiv V_1 = IR$$.\n- Step 3: Substitute back: $$\\varepsilon = IR + Ir = V + Ir$$. This is the cell equation. It says: *energy supplied per coulomb = energy delivered to the load + energy wasted inside the cell*.\n\nEvery form of the cell equation is just this one conservation statement rearranged.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Given the four forms of the cell equation — $$\\varepsilon = V + Ir$$, $$V = \\varepsilon - Ir$$, $$\\varepsilon = I(R+r)$$, and $$I = \\frac{\\varepsilon}{R+r}$$ — which form is the \"starting point\" for plotting a V–I graph, and why is it the right choice? (2 steps)", "answer": "- Step 1: The form for the V–I graph is **$$V = \\varepsilon - rI$$**, because it is already arranged with $$V$$ (the dependent variable, what you measure) expressed as a function of $$I$$ (the independent variable, what you vary).\n- Step 2: This form maps directly onto the straight-line equation $$y = mx + c$$, with $$y = V$$, $$x = I$$, $$m = -r$$, and $$c = \\varepsilon$$. The other forms don't naturally give $$V$$ as a function of $$I$$ in a linear form — for instance, $$\\varepsilon = I(R+r)$$ hides $$V$$ entirely, and $$I = \\frac{\\varepsilon}{R+r}$$ gives $$I$$ as a function of $$R$$, not $$V$$ as a function of $$I$$.\n\nChoosing the right rearrangement is what makes the graph method work — always start from $$V = \\varepsilon - rI$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When mapping the equation $$V = \\varepsilon - rI$$ onto $$y = mx + c$$, what does the y-intercept represent physically, and what does it mean if the line passes through the origin? (3 steps)", "answer": "- Step 1: Comparing $$V = \\varepsilon - rI$$ with $$y = mx + c$$, the y-intercept ($$I = 0$$) is **$$\\varepsilon$$**, the e.m.f. Physically, this is the terminal p.d. when no current flows — the open-circuit voltage of the cell.\n- Step 2: If the line passed through the origin ($$V = 0$$ when $$I = 0$$), that would mean $$\\varepsilon = 0$$ — the cell provides no energy per coulomb at all. This would describe a \"dead\" cell with zero e.m.f., which is physically a cell that has no chemical energy left to convert.\n- Step 3: A real, functioning cell always has a **positive y-intercept** on a V–I graph. The intercept being $$\\varepsilon > 0$$ is what makes the line start above zero on the voltage axis and slope downward from there.\n\nThe y-intercept is your most direct measurement of e.m.f. — it's the voltage the cell gives \"for free\" when nothing is drawing current.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "On a V–I graph for a cell, the line has a negative gradient. Explain *why* the gradient must be negative, in terms of the physics of what happens inside the cell as current increases. (2 steps)", "answer": "- Step 1: The gradient is $$-r$$, which is negative because internal resistance $$r$$ is always a **positive** quantity (resistance can't be negative). Every extra amp of current means an extra $$Ir$$ of \"lost volts\" inside the cell, so the terminal p.d. $$V = \\varepsilon - Ir$$ **decreases** as $$I$$ increases.\n- Step 2: Physically, more current means more charge carriers per second pass through the internal resistance, dissipating more energy as heat inside the cell. Each coulomb has less energy left over to deliver to the external circuit. The line slopes downward because the cell \"leaks\" more voltage internally as you demand more current from it.\n\nNegative gradient = positive internal resistance. If you ever calculate a negative $$r$$, you've made a sign error.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A student plots a V–I graph but accidentally puts current $$I$$ on the vertical axis and voltage $$V$$ on the horizontal axis. What would the gradient of this graph represent, and how would it relate to the internal resistance $$r$$? (3 steps)", "answer": "- Step 1: With the axes swapped, the relationship becomes $$I$$ as a function of $$V$$. Starting from $$V = \\varepsilon - rI$$, rearrange: $$rI = \\varepsilon - V$$, so $$I = \\frac{\\varepsilon}{r} - \\frac{1}{r}V$$. This is a straight line with gradient $$-\\frac{1}{r}$$ and y-intercept $$\\frac{\\varepsilon}{r}$$.\n- Step 2: The gradient of this swapped-axis graph is **$$-1/r$$**, not $$-r$$. So the internal resistance would be $$r = -1/(\\text{gradient})$$, a different formula entirely from the standard method.\n- Step 3: This is a common exam trap. The standard CP8 method assumes $$V$$ on the y-axis and $$I$$ on the x-axis. Swapping the axes inverts the relationship — the gradient changes from $$-r$$ to $$-1/r$$. Always check which variable is on which axis before computing.\n\nPlot V vertically, I horizontally — or your gradient means something completely different.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "In Core Practical 8, why is a **variable resistor** (rheostat) used as the external load rather than a fixed resistor? What would go wrong with only a fixed resistor? (2 steps)", "answer": "- Step 1: A variable resistor allows you to **change the current $$I$$** to a range of different values. Each setting of the rheostat gives a different $$R$$, which produces a different $$I$$ (since $$I = \\varepsilon/(R+r)$$), and you record the corresponding terminal p.d. $$V$$ for each. This gives you a spread of data points across the V–I graph.\n- Step 2: With only a fixed resistor, you would get **one single data point** (one value of $$I$$ and one value of $$V$$). You cannot draw a line — and therefore cannot find a gradient or an intercept — from a single point. The whole method requires multiple ($$I$$, $$V$$) pairs to plot a straight line and determine $$\\varepsilon$$ and $$r$$.\n\nThe variable resistor is the tool that generates the *range* of data needed for the graph method.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "During Core Practical 8, a student keeps adjusting the battery's internal resistance slider between readings to \"get better data.\" Why does this destroy the experiment? (2 steps)", "answer": "- Step 1: The entire V–I graph method assumes that **$$r$$ is a single, constant value** throughout the experiment. The equation $$V = \\varepsilon - rI$$ describes a straight line only if both $$\\varepsilon$$ and $$r$$ stay fixed. If $$r$$ changes between readings, each data point corresponds to a *different* line — the points won't lie on one straight line.\n- Step 2: A gradient computed from points that don't share the same $$r$$ is **meaningless** — it won't equal any single internal resistance. You would be measuring a mixture of different resistances, and neither the gradient nor the intercept would correctly give you $$\\varepsilon$$ or $$r$$. Set $$r$$ once at the start, then vary *only* the external resistor $$R$$.\n\nInternal resistance is the thing you're *measuring* — it must be the controlled constant, not the variable you change.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "In the CP8 circuit, a student places a voltmeter across the cell terminals and a second voltmeter across the external resistor $$R$$. Why do both voltmeters read the same value? (2 steps)", "answer": "- Step 1: In this simple series circuit, the external resistor $$R$$ is the **only** component in the external circuit (besides the ammeter, which has negligible resistance). Therefore, all the terminal p.d. $$V$$ that appears across the cell's output terminals must be entirely dropped across $$R$$.\n- Step 2: By Kirchhoff's voltage law applied to the external loop: $$V_{\\text{terminal}} = V_R$$. There is nowhere else in the external loop for voltage to drop (the ammeter is assumed to have zero resistance). So both voltmeters measure the same potential difference — one at the source, one at the load, but they're the same number.\n\nYou only need one voltmeter; the second is redundant in this simple circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "A student's V–I graph for a real cell is straight at low currents but **curves** at high currents. Explain why this happens, and what it tells you about the assumption behind the standard V–I method. (2 steps)", "answer": "- Step 1: At high currents, the cell heats up significantly inside. The internal resistance $$r$$ **is not perfectly constant** — it changes with temperature (typically increases for many cell chemistries). This means $$r$$ is no longer the same value it was at low currents, so the data points at high $$I$$ deviate from the original straight line.\n- Step 2: The standard V–I method *assumes* $$r$$ is constant (that's what makes the line straight). The curve at high currents tells you this assumption is breaking down. To get an accurate value of $$r$$, you should use the **gradient from the straight (low-current) portion** of the graph, where $$r$$ is approximately constant.\n\nIf an exam asks \"why does the line curve at high I?\" — the answer: the internal resistance is not constant at large currents because the cell heats up.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "You are given a V–I graph where the line crosses the V-axis at 9.0 V and the I-axis at 1.5 A. Without doing any complex arithmetic, explain how you would find both $$\\varepsilon$$ and $$r$$, and give their approximate values. (3 steps)", "answer": "- Step 1: The **y-intercept** (where $$I = 0$$) gives the e.m.f. directly: $$\\varepsilon = 9.0$$ V. This is the terminal p.d. when no current flows — all the cell's energy per coulomb reaches the terminals.\n- Step 2: The **x-intercept** (where $$V = 0$$) tells us the current at which the terminal p.d. drops to zero. At this point, all the e.m.f. is lost internally: $$0 = \\varepsilon - rI_{\\text{max}}$$, so $$r = \\varepsilon / I_{\\text{max}} = 9.0 / 1.5 = 6.0\\;\\Omega$$.\n- Step 3: Alternatively, the gradient is $$\\frac{\\Delta V}{\\Delta I} = \\frac{0 - 9.0}{1.5 - 0} = -6.0\\;\\text{V A}^{-1}$$, so $$r = -(\\text{gradient}) = 6.0\\;\\Omega$$. Both methods give the same answer — they're just different ways of reading the same line.\n\nThe two intercepts of the V–I line give you everything: y-intercept → $$\\varepsilon$$, x-intercept → $$\\varepsilon/r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is the physical significance of the **x-intercept** (where the V–I line crosses the current axis) on a V–I graph for a cell? What real situation does $$V = 0$$ correspond to? (2 steps)", "answer": "- Step 1: At the x-intercept, the terminal p.d. $$V = 0$$. From $$V = \\varepsilon - rI$$, this means $$\\varepsilon = rI$$, i.e. **all** the e.m.f. is being lost across the internal resistance. The entire energy per coulomb from the cell is dissipated as heat *inside the cell itself*, with nothing left for the external circuit.\n- Step 2: This corresponds to a **short circuit** — the external resistance $$R = 0$$ (imagine connecting a wire directly across the terminals). The current is then $$I_{\\text{max}} = \\varepsilon / r$$, which can be very large if $$r$$ is small. This is dangerous: a shorted car battery ($$\\varepsilon = 12$$ V, $$r \\approx 0.01\\;\\Omega$$) would deliver $$I = 1200$$ A and overheat violently.\n\nThe x-intercept shows the maximum current the cell can deliver — and it's the current when the external circuit offers zero resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "A cell with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ is short-circuited ($$R = 0$$). Derive an expression for the current, and explain why this situation is dangerous for a car battery but not for a small button cell. (3 steps)", "answer": "- Step 1: With $$R = 0$$, the cell equation $$I = \\frac{\\varepsilon}{R + r}$$ becomes $$I_{\\text{short}} = \\frac{\\varepsilon}{r}$$. All the e.m.f. drives current only through the internal resistance.\n- Step 2: Power dissipated inside the cell is $$P = I^2 r = \\frac{\\varepsilon^2}{r}$$. For a car battery ($$\\varepsilon = 12$$ V, $$r \\approx 0.01\\;\\Omega$$): $$I \\approx 1200$$ A, $$P \\approx 14{,}400$$ W — enormous heat generated inside the battery, causing fire or explosion.\n- Step 3: For a button cell ($$\\varepsilon = 1.5$$ V, $$r \\approx 1\\;\\Omega$$ or more): $$I \\approx 1.5$$ A, $$P \\approx 2.25$$ W — warm but manageable. The danger scales with $$\\varepsilon^2/r$$: high e.m.f. and low internal resistance make short circuits catastrophic.\n\nLow internal resistance is desirable for delivering power to a load — but it makes short circuits far more dangerous.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 1.5$$ V and $$r = 0.5\\;\\Omega$$. It drives a current of 0.2 A through an external resistor. Qualitatively, are the \"lost volts\" a large or small fraction of the e.m.f. here? What if the current were 2.0 A instead? (2 steps)", "answer": "- Step 1: Lost volts = $$Ir$$. At $$I = 0.2$$ A: lost volts = $$0.2 \\times 0.5 = 0.1$$ V, which is $$0.1/1.5 \\approx 7\\%$$ of the e.m.f. — a **small** fraction. The terminal p.d. is $$1.5 - 0.1 = 1.4$$ V, close to the full e.m.f.\n- Step 2: At $$I = 2.0$$ A: lost volts = $$2.0 \\times 0.5 = 1.0$$ V, which is $$1.0/1.5 \\approx 67\\%$$ of the e.m.f. — a **large** fraction. The terminal p.d. drops to just $$0.5$$ V. The cell is \"wasting\" most of its energy internally.\n\nThe fraction of e.m.f. lost internally scales linearly with current — doubling the current doubles the lost volts. At high currents, the cell becomes very inefficient.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Starting from $$I = \\frac{Q}{t}$$, derive the equation $$I = nAve$$ step by step, explaining what each symbol means physically. (5 steps)", "answer": "- Step 1: Start with the definition of current: $$I = \\frac{Q}{t}$$, where $$Q$$ is the total charge passing a point in time $$t$$.\n- Step 2: Express the total charge $$Q$$ in terms of charge carriers. If there are $$n$$ free charge carriers per cubic metre (number density), the volume of wire they occupy is $$A \\times s$$ (cross-sectional area × length), and each carries charge $$e$$, then: $$Q = n \\times A \\times s \\times e$$.\n- Step 3: Substitute into the current definition: $$I = \\frac{nAse}{t}$$.\n- Step 4: Recognize that $$\\frac{s}{t}$$ — distance along the wire divided by time — is the **mean drift velocity** $$v$$ of the charge carriers. So: $$I = nAve$$.\n- Step 5: Physical meaning — current depends on: how many carriers there are per unit volume ($$n$$), how wide the pipe is ($$A$$), how fast they drift ($$v$$), and how much charge each one carries ($$e$$). It's a \"flow rate\" equation, analogous to volume flow rate in a pipe.\n\n$$I = nAve$$ is the microscopic explanation of current — it tells you *why* current has the value it does, not just that it equals $$V/R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In the equation $$I = nAve$$, the drift velocity $$v$$ of electrons in a typical copper wire carrying a normal current is extremely slow — on the order of mm/s. Why isn't the current zero if the carriers are moving so slowly? (2 steps)", "answer": "- Step 1: The drift velocity is slow, but there are an **enormous number** of charge carriers. In copper, $$n \\approx 10^{29}\\;\\text{m}^{-3}$$ — roughly one free electron per atom. Even though each electron crawls at ~0.1 mm/s, the *total* charge per second passing a cross-section is huge because so many electrons are moving simultaneously.\n- Step 2: Think of it like a congested highway: each car crawls slowly, but if there are millions of lanes (large $$A$$) and bumper-to-bumper traffic (huge $$n$$), the total number of cars passing a point per second is still very large. Current is the *aggregate* flow of charge — it's the product of all four factors, not just velocity alone.\n\nSlow drift + astronomical carrier density = significant current. It's the $$n$$ term that compensates for the tiny $$v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "Number density $$n$$ has units of $$\\text{m}^{-3}$$. A student writes \"$$n$$ is the number of free electrons per unit area of the wire.\" Why is this wrong, and what is the correct description? (2 steps)", "answer": "- Step 1: $$n$$ is a **volume** density — number of free charge carriers per cubic metre ($$\\text{m}^{-3}$$), not per square metre ($$\\text{m}^{-2}$$). It counts how many carriers exist in a *volume* of the material, not on a surface or cross-section.\n- Step 2: The cross-sectional area $$A$$ (in $$\\text{m}^2$$) is a *separate* variable in $$I = nAve$$. If $$n$$ were already \"per area,\" then $$nA$$ would have units of $$\\text{m}^{-2} \\times \\text{m}^2 = \\text{dimensionless}$$, which wouldn't work. The correct product $$n \\times A$$ gives carriers per metre of wire length ($$\\text{m}^{-3} \\times \\text{m}^2 = \\text{m}^{-1}$$), which then multiplies by drift velocity and charge to give current.\n\n$$n$$ = carriers per cubic metre (volume density). The area $$A$$ is the separate geometric factor. Don't conflate them.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "An NTC thermistor is heated. Using the equation $$I = nAve$$, explain step by step why its resistance decreases. What is the causal chain that earns exam marks? (3 steps)", "answer": "- Step 1: Heating the thermistor **releases more electrons** from the atoms of the semiconductor material. This increases the number density of free charge carriers: $$n$$ increases.\n- Step 2: From $$I = nAve$$, if $$n$$ increases (while $$A$$, $$e$$, and approximately $$v$$ stay the same for a given voltage), then **more current** flows for the same applied voltage.\n- Step 3: Resistance is defined as $$R = V/I$$. If the same voltage $$V$$ now drives a larger current $$I$$, then $$R$$ must be **smaller**. The exam-mark causal chain: **\"As temperature increases, more free electrons are released, so $$n$$ increases, so resistance decreases.\"**\n\nNTC = Negative Temperature Coefficient — resistance goes *down* as temperature goes *up*. The mechanism is always: more thermal energy → more free carriers → lower resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "An LDR is moved from darkness into bright light. Using the causal chain via $$n$$, explain what happens to its resistance. What happens to the p.d. across the LDR if it is in a potential divider? (3 steps)", "answer": "- Step 1: When light intensity increases, photons **release more electrons** in the semiconductor material of the LDR. This increases the number density of free charge carriers: $$n$$ increases.\n- Step 2: By the same logic as the thermistor: more free carriers means more current for the same voltage, so **resistance decreases**. In the dark, $$n$$ is small (few free electrons), so resistance is **high**. In bright light, $$n$$ is large, so resistance is **low**.\n- Step 3: In a potential divider, if the LDR's resistance decreases, it takes a **smaller share** of the total voltage. So the p.d. across the LDR *decreases* and the p.d. across the other component *increases*. This is how LDRs are used in light-sensing circuits — the output voltage changes with light level.\n\nDark → high $$R$$ → large share of voltage. Light → low $$R$$ → small share of voltage. The causal chain is: light → $$n$$ ↑ → $$R$$ ↓.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A student writes: \"The e.m.f. of a battery is 9 V, so it pushes charges with a force of 9 N.\" Identify and correct the misconception. (2 steps)", "answer": "- Step 1: The misconception is treating e.m.f. as a **force**. E.m.f. is **energy per unit charge**, not a mechanical force. 9 V means 9 joules of energy are supplied per coulomb — it has nothing to do with newtons.\n- Step 2: The unit volt equals $$\\text{J C}^{-1}$$ (joules per coulomb), not newtons. The name \"electromotive force\" is a historical artefact from the 19th century before the concept was properly understood. In exams, never define e.m.f. as a force — it will score zero marks.\n\nE.m.f. is an energy-per-charge concept, like the \"height\" of an energy hill, not a \"push.\"", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "On a V–I graph, a student calculates the gradient as $$-5.0\\;\\text{V A}^{-1}$$ and writes \"$$r = -5.0\\;\\Omega$$.\" What mistake has been made, and what is the correct value of $$r$$? (2 steps)", "answer": "- Step 1: The gradient of the V–I graph is $$-r$$, not $$r$$. The student has written the gradient directly as the internal resistance, forgetting to account for the **negative sign**. The equation is $$V = \\varepsilon - rI$$, so gradient = $$-r$$.\n- Step 2: The correct relationship is $$r = -(\\text{gradient}) = -(-5.0) = 5.0\\;\\Omega$$. Internal resistance is always a **positive** quantity — if you get a negative value, you've made a sign error. This is the single most common exam trap on V–I graphs.\n\nGradient = $$-r$$, so $$r$$ = minus the gradient. Never report a negative internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "Two resistors are in parallel across a battery. A student says \"the voltage is shared between the branches — each branch gets half the total voltage.\" Why is this wrong, and what is the correct rule? (2 steps)", "answer": "- Step 1: In a **parallel** circuit, the voltage across **each branch is the same** — it equals the terminal p.d. of the supply. The branches are connected to the same two nodes, so the potential difference across each one is identical. It is **not** shared or divided.\n- Step 2: What *is* shared in parallel is the **current** — the total current splits between the branches (Kirchhoff's current law). The branch with lower resistance gets more current, but both branches see the same voltage. Voltage sharing (adding up) is the rule for **series** circuits, not parallel.\n\nParallel: same voltage, current splits. Series: same current, voltage splits. Mixing these up is a common exam error.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "A student calculates the internal resistance from a V–I graph and writes just \"7.1\" with no unit. How many marks would this likely lose in an Edexcel exam, and why is the unit essential? (2 steps)", "answer": "- Step 1: Writing a bare number with no unit would **lose the final mark** for that calculation (typically the answer mark in a \"show that\" or \"calculate\" question). Edexcel mark schemes require both the correct numerical value *and* the correct unit.\n- Step 2: The unit for internal resistance is the **ohm** ($$\\Omega$$), which is equivalent to $$\\text{V A}^{-1}$$. Since you computed the gradient in $$\\text{V A}^{-1}$$ and then took its magnitude, the unit naturally comes out as $$\\Omega$$. Writing \"7.1 $$\\Omega$$\" is complete; writing \"7.1\" is ambiguous — it could be ohms, kilohms, or anything.\n\nAlways pair your numerical answer with its unit. For resistance from a V–I graph, the gradient unit $$\\text{V A}^{-1}$$ = $$\\Omega$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "Alex's analogy: \"Charlie the clown has a fuel tank of voltage.\" Explain this analogy and use it to explain why, in a potential divider, increasing one resistor's value causes the voltage across the *other* resistor to decrease. (3 steps)", "answer": "- Step 1: The \"fuel tank\" represents the e.m.f. $$\\varepsilon$$ — the total energy per coulomb the cell provides. Each coulomb (Charlie) starts with a full tank of voltage and must \"spend\" it all by the time it goes around the loop. The total spent equals the total available: $$\\varepsilon = V_1 + V_2$$.\n- Step 2: In a potential divider with two resistors in series, each resistor \"eats\" a share of the tank proportional to its resistance. If $$R_1$$ increases, it demands a **bigger gulp** of the voltage tank — more energy per coulomb is dropped across it.\n- Step 3: Since the total tank is fixed ($$\\varepsilon$$ is constant), if $$R_1$$ takes more, there is **less left** for $$R_2$$. So $$V_1$$ increases and $$V_2$$ decreases. Charlie can't spend more than he has — it's conservation of energy per coulomb in action.\n\nThe fuel-tank analogy makes voltage division intuitive: a bigger resistor claims a bigger share of the fixed \"tank\" of voltage, leaving less for everything else.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "Alex's \"shopping bags\" analogy: carrying many bags at once vs. carrying few bags but walking faster. How does this map onto the equation $$I = nAve$$, and what is the trade-off it illustrates? (2 steps)", "answer": "- Step 1: \"Many bags at once\" represents **high number density $$n$$** — lots of charge carriers moving simultaneously. \"Few bags but walking faster\" represents **high drift velocity $$v$$** — fewer carriers but each moving quickly. Current $$I = nAve$$ is the product of these: it's the *total flow rate* of charge, which can be achieved either way.\n- Step 2: The trade-off: in a given material (fixed $$n$$), if you want more current, you must increase $$v$$ (by applying a larger voltage, which creates a stronger electric field). But in a material with higher $$n$$ (like copper vs. a semiconductor), you need a **smaller** drift velocity to achieve the same current — the carriers don't have to move as fast because there are so many of them.\n\nHigh $$n$$ (metals) → slow drift is enough. Low $$n$$ (semiconductors) → carriers must drift faster for the same current, or you need a larger area $$A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "When converting units for $$I = nAve$$, a copper wire has $$A = 1\\;\\text{mm}^2$$ and carrier density $$n = 10^{20}\\;\\text{mm}^{-3}$$. What are these values in SI base units (m² and m⁻³), and why must you convert before using the formula? (2 steps)", "answer": "- Step 1: Convert area: $$1\\;\\text{mm}^2 = 1 \\times 10^{-6}\\;\\text{m}^2$$ (since $$1\\;\\text{mm} = 10^{-3}\\;\\text{m}$$, squaring gives $$10^{-6}\\;\\text{m}^2$$). Convert number density: $$10^{20}\\;\\text{mm}^{-3} = 10^{20} \\times 10^9\\;\\text{m}^{-3} = 10^{29}\\;\\text{m}^{-3}$$ (since $$1\\;\\text{mm}^3 = 10^{-9}\\;\\text{m}^3$$, inverting gives the factor of $$10^9$$).\n- Step 2: The formula $$I = nAve$$ only works in SI units: $$n$$ in $$\\text{m}^{-3}$$, $$A$$ in $$\\text{m}^2$$, $$v$$ in $$\\text{m s}^{-1}$$, $$e$$ in coulombs. Mixing mm and m produces wrong answers by factors of $$10^6$$ or more — a silent, catastrophic error. Always convert to metres first.\n\n$$1\\;\\text{mm}^2 = 10^{-6}\\;\\text{m}^2$$, $$1\\;\\text{mm}^3 = 10^{-9}\\;\\text{m}^3$$, so $$n$$ in $$\\text{mm}^{-3}$$ needs ×$$10^9$$ to get $$\\text{m}^{-3}$$. This is a top exam trap.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 6$$ V and $$r = 2\\;\\Omega$$ is connected to a load resistor $$R = 4\\;\\Omega$$. Without doing exact arithmetic, determine: (a) will the terminal p.d. be closer to 6 V or closer to 0 V? (b) is the current closer to 1 A or 6 A? (2 steps)", "answer": "- Step 1: The total resistance in the circuit is $$R + r = 4 + 2 = 6\\;\\Omega$$. The current is $$I = \\varepsilon/(R+r) = 6/6 = 1$$ A. The lost volts are $$Ir = 1 \\times 2 = 2$$ V, so the terminal p.d. is $$V = 6 - 2 = 4$$ V — closer to 6 V than to 0 V.\n- Step 2: The key insight: since the external resistance ($$4\\;\\Omega$$) is **larger** than the internal resistance ($$2\\;\\Omega$$), most of the e.m.f. is delivered to the load (4 V out of 6 V) and only a minority is lost internally (2 V). The current (1 A) is much less than the short-circuit current (3 A), because the external resistance limits the flow.\n\nWhen $$R \\gg r$$: most voltage reaches the load, current is small. When $$R \\ll r$$: most voltage is lost internally, current approaches $$\\varepsilon/r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "A student says: \"If I double the external resistance $$R$$, the terminal p.d. $$V$$ also doubles.\" Is this correct? Use the cell equation to explain why or why not. (3 steps)", "answer": "- Step 1: This is **incorrect** — the relationship between $$R$$ and $$V$$ is not proportional. From $$V = IR$$ and $$I = \\varepsilon/(R+r)$$, we get $$V = \\frac{\\varepsilon R}{R+r}$$.\n- Step 2: If $$R$$ doubles (say from $$R$$ to $$2R$$), the new terminal p.d. is $$V' = \\frac{\\varepsilon \\cdot 2R}{2R + r}$$. This is **not** twice $$\\frac{\\varepsilon R}{R+r}$$, because the denominator also changes. Doubling $$R$$ reduces the current (which reduces the lost volts), but the terminal p.d. increases by **less** than a factor of two.\n- Step 3: In the limiting case where $$R \\gg r$$, doubling $$R$$ barely changes $$V$$ (it's already close to $$\\varepsilon$$). Where $$R \\ll r$$, doubling $$R$$ approximately doubles $$V$$ (since $$V \\approx \\varepsilon R / r$$ when $$R \\ll r$$). The relationship is nonlinear — $$V$$ approaches $$\\varepsilon$$ asymptotically as $$R$$ increases.\n\n$$V$$ and $$R$$ are not proportional — the internal resistance \"buffers\" the relationship. More $$R$$ means more $$V$$, but with diminishing returns.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "For maximum **power transfer** to the load, what should the relationship between $$R$$ and $$r$$ be? Give a quick intuitive argument. (2 steps)", "answer": "- Step 1: Maximum power in the load occurs when $$R = r$$ (the external resistance equals the internal resistance). Intuitively: if $$R$$ is very small, most voltage is lost internally (low $$V$$, high $$I$$, but $$P = VI$$ is small because $$V \\approx 0$$). If $$R$$ is very large, current is tiny (high $$V$$, low $$I$$, but $$P$$ is small because $$I \\approx 0$$).\n- Step 2: Somewhere in between, there's a sweet spot where the product $$VI$$ is maximized. That sweet spot is $$R = r$$ — half the e.m.f. appears across the load, and the current is $$\\varepsilon/(2r)$$. This is the **maximum power transfer theorem**.\n\nMaximum power delivery requires matching the load to the source: $$R = r$$. But note: this also means 50% of the power is wasted inside the cell — it's efficient for *power*, not for *energy*.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "In Core Practical 8, why is it important to take readings over a **wide range** of currents (from as low as readable to as high as safe), rather than clustering readings in a narrow band? (2 steps)", "answer": "- Step 1: A wide spread of data points makes the **gradient calculation more accurate**. When you draw a line of best fit through points that span a large range on the x-axis, the triangle you use for the gradient has a large base ($$\\Delta I$$ is big), which reduces the fractional error in $$\\Delta I$$ and hence in the gradient.\n- Step 2: Clustered points (all in a narrow range of $$I$$) would make the line's slope very sensitive to small measurement errors — a tiny vertical scatter could swing the gradient significantly. A wide spread \"pins down\" both the slope and the intercept with much more confidence. This is why Alex targeted currents from 0.10 A to 0.50 A (a 5:1 range), not 0.40 A to 0.50 A.\n\nSpread your points wide: low current at one end, high current at the other. This is standard good practice for any graph-based determination.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "A V–I graph for a cell has y-intercept 4.5 V. The line passes through the point (0.30 A, 3.0 V). Find the internal resistance $$r$$ and the e.m.f. $$\\varepsilon$$. (3 steps)", "answer": "- Step 1: The e.m.f. comes from the y-intercept: $$\\varepsilon = 4.5$$ V. This is the terminal p.d. when no current flows.\n- Step 2: Compute the gradient using the intercept point (0, 4.5) and the data point (0.30, 3.0): gradient = $$\\frac{3.0 - 4.5}{0.30 - 0} = \\frac{-1.5}{0.30} = -5.0\\;\\text{V A}^{-1}$$.\n- Step 3: Internal resistance $$r = -(\\text{gradient}) = -(-5.0) = 5.0\\;\\Omega$$. Verify: $$V = \\varepsilon - Ir = 4.5 - 0.30 \\times 5.0 = 4.5 - 1.5 = 3.0$$ V ✓.\n\nTwo points on the line are enough to find both $$\\varepsilon$$ and $$r$$ — one gives the intercept, both together give the gradient.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A copper wire has cross-sectional area $$A = 1\\;\\text{mm}^2$$ and carries a current of 10 A. The number density of free electrons is approximately $$10^{29}\\;\\text{m}^{-3}$$. Without detailed calculation, estimate the order of magnitude of the drift velocity. Is it closer to mm/s, m/s, or km/s? (3 steps)", "answer": "- Step 1: Rearrange $$I = nAve$$ to solve for $$v$$: $$v = \\frac{I}{nAe}$$. Convert area: $$A = 1\\;\\text{mm}^2 = 10^{-6}\\;\\text{m}^2$$.\n- Step 2: Estimate the denominator: $$nAe \\approx 10^{29} \\times 10^{-6} \\times 1.6 \\times 10^{-19} = 1.6 \\times 10^{4}\\;\\text{C m}^{-1}$$. Then $$v = 10 / (1.6 \\times 10^4) \\approx 6 \\times 10^{-4}\\;\\text{m s}^{-1} \\approx 0.6\\;\\text{mm s}^{-1}$$.\n- Step 3: The drift velocity is on the order of **mm/s** — astonishingly slow. Despite 10 A being a substantial current, the sheer number of carriers ($$n \\sim 10^{29}$$) means they barely need to crawl. This is not km/s or even m/s.\n\nDrift velocity in metals is ~0.1–1 mm/s — about the speed of a snail. The signal (electromagnetic wave) travels near light speed, but the actual carriers barely move.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "A thermistor and a fixed resistor are connected in series across a battery, forming a potential divider. The temperature increases. Explain what happens to the output voltage (taken across the fixed resistor), using the causal chain through $$n$$ and $$R$$. (3 steps)", "answer": "- Step 1: As temperature increases, the thermistor releases more free electrons → $$n$$ increases → thermistor's resistance **decreases** (NTC behaviour).\n- Step 2: The thermistor and fixed resistor form a potential divider. The total e.m.f. is shared: $$V_{\\text{fixed}} = \\varepsilon \\times \\frac{R_{\\text{fixed}}}{R_{\\text{therm}} + R_{\\text{fixed}}}$$. As $$R_{\\text{therm}}$$ decreases, the fraction $$\\frac{R_{\\text{fixed}}}{R_{\\text{therm}} + R_{\\text{fixed}}}$$ **increases** — the fixed resistor claims a larger share of the voltage.\n- Step 3: Therefore, the output voltage across the fixed resistor **increases** when the thermistor is heated. This is how temperature-sensing circuits work: the thermistor's changing resistance shifts the voltage division.\n\nHeating → $$n$$↑ → $$R_{\\text{therm}}$$↓ → $$V_{\\text{fixed}}$$↑. The output voltage rises with temperature when measured across the *other* component.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "An LDR and a fixed resistor form a potential divider across a battery, with the output taken across the LDR. The light intensity decreases. What happens to the output voltage? Walk through the causal chain. (3 steps)", "answer": "- Step 1: Decreasing light intensity means fewer photons hit the LDR → fewer free electrons released → number density $$n$$ **decreases** → LDR's resistance **increases**.\n- Step 2: In the potential divider, $$V_{\\text{LDR}} = \\varepsilon \\times \\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}}$$, where $$\\varepsilon$$ is the terminal p.d. As $$R_{\\text{LDR}}$$ increases, the fraction $$\\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}}$$ **increases** — the LDR claims a larger share of the voltage.\n- Step 3: Therefore, the output voltage across the LDR **increases** when it gets darker. This is how darkness-sensing circuits work: dark → high LDR resistance → high voltage across LDR → triggers a light to turn on.\n\nDark → $$n$$↓ → $$R_{\\text{LDR}}$$↑ → $$V_{\\text{LDR}}$$↑. When the output is across the LDR itself, darkness *increases* the output voltage.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "The ESAT (Cambridge admissions test) does not cover entire A-level physics chapters — only specific sections. Give two concrete examples from the lesson of chapters where only partial content is in scope. Why does this matter for revision planning? (2 steps)", "answer": "- Step 1: Two examples from the lesson: (1) **Radioactive decay** — only a couple of sections are in ESAT scope, not the whole chapter. (2) **Atomic structure** (Year 2, Chapter 7) — only the first section is in scope, not the full chapter.\n- Step 2: This matters because if you revise whole chapters equally, you waste time on material that won't appear on the ESAT. The strategic approach is to **prioritise the ESAT-relevant sections first**, especially with October and January sittings approaching. Alex agreed to reorder upcoming lessons to hit ESAT-relevant content first, based on Phuc's study plan sheet.\n\nDon't revise everything equally — target the sections the exam actually tests. The detailed per-chapter mapping lives in the ESAT study plan sheet.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A student is asked: \"Define the e.m.f. of a battery.\" They write: \"The voltage across the battery terminals.\" Why does this score zero marks, and what is the correct definition? (2 steps)", "answer": "- Step 1: \"Voltage across the battery terminals\" describes the **terminal potential difference** $$V$$, not the e.m.f. $$\\varepsilon$$. These are different quantities — $$V < \\varepsilon$$ whenever current flows. The terminal p.d. is the *effect* (energy delivered), while e.m.f. is the *cause* (energy supplied).\n- Step 2: The correct definition: **\"The e.m.f. of a battery is the energy supplied per unit charge by the source\"** (or equivalently, \"the electrical energy produced per unit charge\"). The key word is **supplied** (or \"converted to electrical energy\"), distinguishing it from the energy *delivered* to the external circuit.\n\nE.m.f. = energy *supplied* per charge (cause). Terminal p.d. = energy *delivered* per charge (effect). Use the word \"supplied\" in your definition.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "A battery with $$\\varepsilon = 12$$ V and $$r = 0.5\\;\\Omega$$ is connected to a 3.5 Ω resistor. Find the current, the terminal p.d., and the power wasted inside the battery. Conceptually walk through the logic. (3 steps)", "answer": "- Step 1: Find the current using $$I = \\varepsilon/(R+r) = 12/(3.5 + 0.5) = 12/4.0 = 3.0$$ A. The total resistance limits the current — both the internal and external resistances act in series.\n- Step 2: Find the terminal p.d.: $$V = \\varepsilon - Ir = 12 - 3.0 \\times 0.5 = 12 - 1.5 = 10.5$$ V. Alternatively, $$V = IR = 3.0 \\times 3.5 = 10.5$$ V. Either route works — they're the same physics. The \"lost volts\" are 1.5 V.\n- Step 3: Power wasted inside the battery: $$P_{\\text{wasted}} = I^2 r = 3.0^2 \\times 0.5 = 9 \\times 0.5 = 4.5$$ W. Power delivered to the load: $$P_{\\text{load}} = I^2 R = 9 \\times 3.5 = 31.5$$ W. So 4.5 W out of 36 W total is wasted — about 12.5%, reasonable since $$r$$ is small compared to $$R$$.\n\nCurrent → terminal p.d. → power split. The internal resistance \"steals\" $$I^2 r$$ of power; the load gets the rest.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A student claims: \"If you add a second identical cell in **series** with the first, the e.m.f. doubles but the internal resistance stays the same.\" Is this correct? Explain. (2 steps)", "answer": "- Step 1: The e.m.f. does **double**: two cells in series add their e.m.f.s, so the total e.m.f. becomes $$2\\varepsilon$$. This is correct — each cell pumps its coulombs up the same \"energy hill,\" and going through two pumps in sequence doubles the total energy per coulomb.\n- Step 2: The internal resistance also **doubles** to $$2r$$, not stays the same. The two internal resistances are in series (each is inside its own cell, and the cells are in series), so they add: $$r_{\\text{total}} = r + r = 2r$$. The student's claim about internal resistance is wrong — both the e.m.f. and the internal resistance double.\n\nSeries cells: $$\\varepsilon_{\\text{total}} = 2\\varepsilon$$, $$r_{\\text{total}} = 2r$$. Both double. The current through a given load is $$I = 2\\varepsilon/(R + 2r)$$, which is more than one cell would give, but less than twice (because $$r$$ also doubled).", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Two identical cells are connected in **parallel** (same polarity). What is the total e.m.f. and the total internal resistance? Explain using the physical reasoning. (2 steps)", "answer": "- Step 1: The total e.m.f. is **still $$\\varepsilon$$**, not $$2\\varepsilon$$. In parallel, both cells are connected across the same two terminals — a coulomb passing through the combination only goes through *one* cell (not both), so it only receives the energy from one cell. The e.m.f. doesn't add in parallel.\n- Step 2: The total internal resistance **halves** to $$r/2$$. Two resistances $$r$$ in parallel give $$r_{\\text{total}} = r/2$$. Physically, the current splits between the two cells, so each carries half the total current — each cell's internal resistance \"sees\" less current and wastes less voltage. The combination can deliver more current with less internal loss.\n\nParallel cells: same e.m.f., half the internal resistance. Useful when you need high current delivery without the voltage doubling.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "A V–I graph experiment is done on a cell. The student's data points scatter randomly above and below the line of best fit. Is this a problem? What does the scatter represent, and how should the student handle it? (2 steps)", "answer": "- Step 1: Random scatter is **normal and expected** — it represents **measurement uncertainty** (random errors in reading the ammeter and voltmeter, contact resistance fluctuations, etc.). It is *not* a sign that the experiment failed. The line of best fit averages out this random scatter.\n- Step 2: The student should **draw the line of best fit** (minimising the distances of points from the line) and read the intercept and gradient from the *line*, not from any individual data point. Never \"connect the dots\" — that would amplify the random errors. The gradient and intercept of the best-fit line give the most reliable estimates of $$r$$ and $$\\varepsilon$$.\n\nScatter is fine — it's random error. Systematic deviation (all points curving in one direction) would be more concerning, as it suggests $$r$$ is changing or there's a calibration issue.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "In the formula $$\\varepsilon = \\frac{W}{Q}$$, a student calculates e.m.f. by dividing total power by total charge. Is this the same formula? Explain why or why not. (2 steps)", "answer": "- Step 1: This is **not** the same formula. $$\\varepsilon = W/Q$$ uses **energy** (work $$W$$ in joules) divided by **charge** ($$Q$$ in coulombs), giving units of $$\\text{J C}^{-1} = \\text{V}$$. Dividing *power* (watts) by *charge* (coulombs) gives units of $$\\text{W C}^{-1} = \\text{J s}^{-1}\\text{C}^{-1}$$, which is **not** volts.\n- Step 2: Power is energy *per second* ($$P = W/t$$), so dividing power by charge introduces an extra factor of $$1/t$$ that doesn't belong. The correct approach is: total energy $$W$$ divided by total charge $$Q$$. If you have power instead, first multiply by time to get energy: $$W = Pt$$, then $$\\varepsilon = Pt/Q$$. The confusion between energy and power is a common slip.\n\n$$\\varepsilon = W/Q$$ (energy ÷ charge), not $$P/Q$$ (power ÷ charge). Energy and power differ by a factor of time.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Alex's teaching point: \"if you blank in the exam, draw the circuit and write $$\\varepsilon = V_1 + V_2$$.\" Why is this a powerful recovery strategy, and how does it lead you to the cell equation? (3 steps)", "answer": "- Step 1: Drawing the circuit forces you to identify the two \"voltage drops\" in the loop: $$V_1$$ across the external resistor and $$V_2$$ across the internal resistance. Writing $$\\varepsilon = V_1 + V_2$$ is just energy conservation — the cell supplies, the resistances consume.\n- Step 2: Apply Ohm's law to each resistance: $$V_1 = IR$$ (external) and $$V_2 = Ir$$ (internal). The current $$I$$ is the same through both (series circuit). So $$\\varepsilon = IR + Ir$$.\n- Step 3: Recognise that $$IR = V$$ (the terminal p.d., what the voltmeter reads). So $$\\varepsilon = V + Ir$$, which rearranges to $$V = \\varepsilon - Ir$$. From this single starting point, you can derive all four forms of the cell equation — no memorisation needed.\n\nIf you forget the formula, don't panic — draw the circuit, apply conservation of energy, and let Ohm's law do the rest. The derivation takes 30 seconds and always works.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "A cell's V–I graph has y-intercept 3.0 V and the line passes through (0.5 A, 0 V). What is the internal resistance, and what physical situation does the point (0.5 A, 0 V) represent? (2 steps)", "answer": "- Step 1: The gradient is $$\\frac{0 - 3.0}{0.5 - 0} = \\frac{-3.0}{0.5} = -6.0\\;\\text{V A}^{-1}$$, so $$r = -(\\text{gradient}) = 6.0\\;\\Omega$$. The e.m.f. is 3.0 V.\n- Step 2: The point (0.5 A, 0 V) represents a **short circuit** — the external resistance is zero, the terminal p.d. is zero (all the e.m.f. is lost internally), and the current is the maximum the cell can deliver: $$I_{\\text{max}} = \\varepsilon/r = 3.0/6.0 = 0.5$$ A. This is the x-intercept of the V–I line.\n\nThe x-intercept gives you the short-circuit current directly: $$I_{\\text{short}} = \\varepsilon/r$$. Combined with the y-intercept ($$\\varepsilon$$), you can find $$r$$ from just the two intercepts.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A student measures the \"voltage of a battery\" with a voltmeter and gets 9 V. Then they connect a lamp and the voltmeter now reads 8.5 V. Explain both readings — which quantity does each one represent? (2 steps)", "answer": "- Step 1: The first reading (9 V with nothing connected) is the **e.m.f.** $$\\varepsilon$$. With no external circuit, $$I = 0$$, so no lost volts, and the voltmeter reads the full open-circuit voltage: $$V = \\varepsilon = 9$$ V.\n- Step 2: The second reading (8.5 V with the lamp connected) is the **terminal p.d.** $$V$$. With current flowing, some e.m.f. is lost internally: $$V = \\varepsilon - Ir = 9 - Ir = 8.5$$ V. The lost volts are 0.5 V, dissipated as heat inside the battery. The difference between the two readings tells you the lost volts for that particular load.\n\nNo load → voltmeter reads e.m.f. Load connected → voltmeter reads terminal p.d. The drop tells you the lost volts: $$Ir = \\varepsilon - V$$.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "Why does a car battery need a **very low** internal resistance, while a digital multimeter's internal battery can have a relatively high internal resistance with no problem? (2 steps)", "answer": "- Step 1: A car battery must deliver **very large currents** (hundreds of amps to the starter motor). If $$r$$ were even 1 Ω, the lost volts at 200 A would be $$Ir = 200$$ V — far exceeding the e.m.f. of 12 V, which is impossible. The battery would effectively short itself out. Car batteries have $$r \\approx 0.01\\;\\Omega$$ so lost volts are only ~2 V at 200 A.\n- Step 2: A multimeter's battery powers only tiny internal electronics drawing microamps. At $$I = 1\\;\\mu\\text{A}$$, even a large internal resistance of 100 Ω produces lost volts of only 0.1 mV — negligible. The current demand is so small that internal resistance barely matters.\n\nLow $$r$$ is critical when you need high current; it's irrelevant when the current is tiny. The \"cost\" of internal resistance scales with the current you draw.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "A student is asked to explain why $$V < \\varepsilon$$ when a current flows. They write: \"because some voltage is used up inside the cell.\" The examiner awards only 1 out of 3 marks. What is missing from the answer to get full marks? (3 steps)", "answer": "- Step 1: The phrase \"some voltage is used up\" is vague and doesn't identify *what* voltage or *where* exactly it's lost. It earns 1 mark for the general idea but lacks precision.\n- Step 2: To earn full marks, the answer must: (a) state that the e.m.f. is split between the external and internal resistances: $$\\varepsilon = V + Ir$$; (b) identify the \"lost volts\" specifically as $$Ir$$ — the p.d. across the internal resistance; and (c) conclude that therefore $$V = \\varepsilon - Ir < \\varepsilon$$.\n- Step 3: A full-marks answer: \"By conservation of energy per coulomb, $$\\varepsilon = V + Ir$$. Some of the e.m.f. is lost across the internal resistance ($$Ir$$, the 'lost volts'), so the terminal p.d. $$V = \\varepsilon - Ir$$ is less than $$\\varepsilon$$ whenever current flows.\" Three specific elements: conservation statement, identification of lost volts as $$Ir$$, conclusion.\n\nDon't be vague — name the quantity ($$Ir$$), name the mechanism (internal resistance), and show the algebra. Precision earns marks.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "A wire of cross-sectional area $$A$$ carries current $$I$$. If the area is doubled (same material, same current), what happens to the drift velocity? Explain using $$I = nAve$$. (2 steps)", "answer": "- Step 1: From $$I = nAve$$, solving for drift velocity: $$v = I/(nAe)$$. Since $$I$$, $$n$$, and $$e$$ are all held constant, doubling $$A$$ means $$v$$ is **halved**.\n- Step 2: Physically, a wider wire has more charge carriers per cross-section (more \"lanes on the highway\"). With twice the area, twice as many carriers pass a point simultaneously, so each one only needs to drift at half the speed to maintain the same total current. It's like a wider pipe carrying the same volume flow rate — the water moves slower.\n\nDouble the area → half the drift velocity (for fixed current). More \"lanes\" means each \"car\" can go slower while maintaining the same throughput.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}], "count": 50}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define electromotive force (EMF) in terms of energy and charge, and explain its role in a circuit. (3 steps)", "answer": "- Step 1: **Definition**  \nEMF (ε) is the energy supplied per unit charge by a source (e.g., a cell) to move charges through a circuit.  \n- Step 2: **Energy Conversion**  \nIt represents the conversion of chemical energy (in a cell) to electrical energy, expressed as $ \\varepsilon = \\frac{W}{Q} $, where $ W $ is energy in joules and $ Q $ is charge in coulombs.  \n- Step 3: **Role in Circuits**  \nEMF is the \"cause\" of current flow, providing the energy that drives charges through the circuit, including overcoming internal resistance.  \n\n+ **Misconception Probe**: EMF is not a force but a measure of energy per unit charge (unit: volts).", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does terminal potential difference (V) differ from EMF? Include the concept of \"lost volts.\" (2 steps)", "answer": "- Step 1: **Terminal P.D. vs. EMF**  \nTerminal potential difference (V) is the energy per unit charge delivered to the external circuit, measured across the cell's terminals. EMF (ε) is the total energy supplied by the cell.  \n- Step 2: **Lost Volts**  \nWhen current flows, some energy is lost overcoming the cell's internal resistance (r), causing $ V = \\varepsilon - Ir $. The \"lost volts\" $ Ir $ reduces the terminal p.d. compared to EMF.  \n\n+ **Contrast**: EMF is the energy supplied; terminal p.d. is the energy delivered.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Derive the equation $ \\varepsilon = V + Ir $ using energy conservation in a circuit with a cell and resistor. (3 steps)", "answer": "- Step 1: **Circuit Setup**  \nA cell with EMF $ \\varepsilon $ and internal resistance $ r $ is connected to an external resistor $ R $.  \n- Step 2: **Energy Conservation**  \nEach coulomb gains energy $ \\varepsilon $ from the cell, then loses energy $ V $ in $ R $ and $ Ir $ in $ r $.  \n- Step 3: **Equation Derivation**  \nTotal energy per coulomb: $ \\varepsilon = V + Ir $. Rearranged as $ V = \\varepsilon - Ir $, showing terminal p.d. depends on current and internal resistance.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does varying the external resistor $ R $ affect the current $ I $ and terminal p.d. $ V $? (2 steps)", "answer": "- Step 1: **Effect on Current**  \nIncreasing $ R $ decreases current $ I = \\frac{\\varepsilon}{R + r} $, as total resistance $ R + r $ increases.  \n- Step 2: **Effect on Terminal P.D.**  \nTerminal p.d. $ V = \\varepsilon - Ir $ increases when $ I $ decreases because less energy is lost to internal resistance.  \n\n+ **Example**: If $ R \\to \\infty $ (open circuit), $ I = 0 $ and $ V = \\varepsilon $.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "Sketch the expected $ V-I $ graph for a cell and explain its gradient and intercept. (3 steps)", "answer": "- Step 1: **Graph Equation**  \nThe equation $ V = \\varepsilon - Ir $ is a straight line with $ V $ on the y-axis and $ I $ on the x-axis.  \n- Step 2: **Gradient**  \nThe gradient is $ -r $, representing the negative of the internal resistance. A steeper negative slope indicates higher $ r $.  \n- Step 3: **Intercept**  \nThe y-intercept (when $ I = 0 $) is $ \\varepsilon $, the EMF of the cell.  \n\n+ **Visual Intuition**: The line slopes downward because increasing current causes more \"lost volts\" $ Ir $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why must the internal resistance $ r $ be kept constant during Core Practical 8? (3 steps)", "answer": "- Step 1: **Experimental Assumption**  \nThe derivation $ V = \\varepsilon - Ir $ assumes $ r $ is constant. If $ r $ changes, the relationship between $ V $ and $ I $ becomes non-linear.  \n- Step 2: **Impact on Graph**  \nA varying $ r $ would cause the $ V-I $ graph to curve, making gradient and intercept analysis invalid.  \n- Step 3: **Controlled Variable**  \nOnly $ R $ should vary to ensure a straight line with consistent gradient $ -r $, allowing accurate determination of $ \\varepsilon $ and $ r $.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Explain why the $ V-I $ graph may become non-linear at high currents. (2 steps)", "answer": "- Step 1: **Internal Resistance Variation**  \nAt high currents, the cell heats up, increasing its internal resistance $ r $. This violates the assumption $ r = \\text{constant} $.  \n- Step 2: **Effect on Graph**  \nThe gradient $ -r $ changes with current, causing the line to curve upward. The straight-line model $ V = \\varepsilon - Ir $ only holds for small currents.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Compare EMF and terminal p.d. using \"cause-effect\" terminology. (2 steps)", "answer": "- Step 1: **Cause (EMF)**  \nEMF is the cause of current flow, representing the energy per unit charge supplied by the cell.  \n- Step 2: **Effect (Terminal P.D.)**  \nTerminal p.d. is the effect of this energy being used in the external circuit, reduced by internal resistance losses $ Ir $.  \n\n+ **Contrast**: EMF drives the system; terminal p.d. is the usable output.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How does the drift velocity $ v $ relate to current $ I $? Derive the formula $ I = nAvq $. (3 steps)", "answer": "- Step 1: **Charge in a Conductor**  \nTotal charge $ Q = nAvte $, where $ n $ is charge-carrier density, $ A $ is cross-sectional area, $ v $ is drift velocity, $ t $ is time, and $ q $ is charge per carrier.  \n- Step 2: **Current Definition**  \nCurrent $ I = \\frac{Q}{t} = nAvq $.  \n- Step 3: **Physical Intuition**  \nHigher $ n $, $ A $, or $ v $ increases current, while larger $ q $ (e.g., heavier ions) decreases it.  \n\n+ **Example**: Copper has $ n \\approx 10^{28} \\, \\text{m}^{-3} $, leading to small $ v $ for large $ I $.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does increasing temperature decrease the resistance of a thermistor? (Link to $ n $) (2 steps)", "answer": "- Step 1: **Thermistor Behavior**  \nIn a negative temperature coefficient (NTC) thermistor, resistance decreases with temperature.  \n- Step 2: **Role of $ n $**  \nHigher temperature releases more free electrons, increasing $ n $. With more charge carriers, current increases for the same voltage (Ohm's law: $ R = \\frac{V}{I} $).  \n\n+ **Contrast**: Metals have $ n \\approx \\text{constant} $, so resistance increases with temperature due to lattice vibrations.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "What is the unit of charge-carrier density $ n $, and why is it per cubic meter? (2 steps)", "answer": "- Step 1: **Unit**  \n$ n $ has units of $ \\text{m}^{-3} $, representing the number of free charges per cubic meter.  \n- Step 2: **Volume vs. Area**  \nCharge carriers are distributed in 3D space, so density must account for volume, not just area or length.  \n\n+ **Misconception Probe**: Confusing $ n $ with surface density (per $ \\text{m}^2 $) would be incorrect.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "Explain why the voltmeter must be connected across the cell terminals in Core Practical 8. (2 steps)", "answer": "- Step 1: **Terminal P.D. Measurement**  \nThe voltmeter measures the potential difference across the cell's terminals, which is the energy delivered to the external circuit.  \n- Step 2: **Excluding Internal Resistance**  \nConnecting across the terminals excludes the internal resistance $ r $, ensuring the reading reflects the usable voltage $ V = \\varepsilon - Ir $.  \n\n+ **Contrast**: Measuring across the internal resistance would give $ Ir $, not terminal p.d.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "How does internal resistance affect the maximum current a cell can provide? (3 steps)", "answer": "- Step 1: **Short-Circuit Current**  \nMaximum current occurs when $ R = 0 $ (short circuit): $ I_{\\text{max}} = \\frac{\\varepsilon}{r} $.  \n- Step 2: **Practical Limitation**  \nHigh $ r $ limits $ I_{\\text{max}} $, making cells with low internal resistance more efficient for high-current applications.  \n- Step 3: **Energy Loss**  \nAt $ I_{\\text{max}} $, all EMF is lost to internal resistance ($ V = 0 $), so no power is delivered to the external circuit.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Derive $ \\varepsilon = I(R + r) $ from $ \\varepsilon = V + Ir $ and Ohm's law. (3 steps)", "answer": "- Step 1: **Start with**: $ \\varepsilon = V + Ir $.  \n- Step 2: **Apply Ohm's Law**: $ V = IR $.  \n- Step 3: **Substitute**: Replace $ V $ in the first equation: $ \\varepsilon = IR + Ir = I(R + r) $.  \n\n+ **Physical Intuition**: The EMF equals the total voltage drop across $ R $ and $ r $.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is EMF sometimes called \"voltage\" despite not being a potential difference? (2 steps)", "answer": "- Step 1: **Historical Usage**  \n\"EMF\" originated as \"electromotive force,\" but the unit (volt) is energy per charge, like potential difference.  \n- Step 2: **Misleading Terminology**  \nThough EMF is not a \"force,\" the term persists. Terminal p.d. is a potential difference, but both are measured in volts.  \n\n+ **Clarification**: EMF refers to energy supplied; terminal p.d. refers to energy delivered.  \n``` \n\n### Jargon Table\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **EMF & Internal Resistance** | |\n| Electromotive Force (EMF) $ \\varepsilon $ | Energy supplied per unit charge by a source (unit: volt). |\n| Terminal Potential Difference $ V $ | Energy delivered per unit charge to the external circuit (unit: volt). |\n| Internal Resistance $ r $ | Resistance within the power supply (unit: ohm). |\n| Lost Volts $ Ir $ | Energy per unit charge dissipated inside the cell (unit: volt). |\n| Drift Velocity $ v $ | Mean velocity of charge carriers in a conductor (unit: m/s). |\n| Charge-Carrier Density $ n $ | Number of free charges per cubic meter (unit: $ \\text{m}^{-3} $). |\n| **Thermistors & LDRs** | |\n| NTC Thermistor | Resistance decreases with increasing temperature due to increased $ n $. |\n| LDR (Light-Dependent Resistor) | Resistance decreases with increased light intensity due to increased $ n $. |\n\n### Formula Table\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **EMF & Internal Resistance** | | |\n| $$\\varepsilon = ?$$ | $$= \\frac{W}{Q}$$ | Definition of EMF: energy per unit charge. |\n| $$\\varepsilon = ?$$ | $$= V + Ir$$ | Cell equation (energy conservation). |\n| $$V = ?$$ | $$= \\varepsilon - Ir$$ | Terminal p.d. rearranged for graph. |\n| $$\\varepsilon = ?$$ | $$= I(R + r)$$ | Circuit EMF with series resistors. |\n| **Current & Drift Velocity** | | |\n| $$I = ?$$ | $$= nAvq$$ | Current in terms of charge carriers. |\n| **Graph Interpretation** | | |\n| $$V = ?$$ | $$= -rI + \\varepsilon$$ | Straight-line equation for $ V-I $ graph. |", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define electromotive force (EMF) and state its unit. (3 steps)", "answer": "- Step 1: **EMF** (ε) is the energy supplied per unit charge by a source (e.g., a cell) to move charges through a circuit.  \n- Step 2: Mathematically, $$ \\varepsilon = \\frac{W}{Q} $$, where $$ W $$ is the energy converted to electrical energy (in joules) and $$ Q $$ is the charge (in coulombs).  \n- Step 3: **Unit:** volts (V), equivalent to $$ \\text{J C}^{-1} $$.  \n\n**Key distinction:** EMF is energy supplied (cause), while terminal potential difference (V) is energy delivered (effect).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How is terminal potential difference (V) related to EMF (ε) and current (I) in a circuit with internal resistance (r)? Provide the equation and explain its derivation. (4 steps)", "answer": "- Step 1: The equation is $$ \\varepsilon = V + Ir $$.  \n- Step 2: This comes from energy conservation: The total energy supplied by the cell (ε) equals the sum of energy delivered to the external circuit (V) and energy lost across the internal resistance (Ir, the \"lost volts\").  \n- Step 3: Rearranged for terminal voltage: $$ V = \\varepsilon - Ir $$.  \n- Step 4: Intuition: Terminal voltage decreases as current increases because more energy is lost to the internal resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Explain why the terminal voltage of a cell decreases when the current through it increases. (4 steps)", "answer": "- Step 1: Terminal voltage $$ V = \\varepsilon - Ir $$, where $$ Ir $$ is the \"lost volts.\"  \n- Step 2: As current $$ I $$ increases, the voltage drop across the internal resistance ($$ Ir $$) increases.  \n- Step 3: This reduces the terminal voltage ($$ V $$) because part of the EMF is \"lost\" as heat inside the cell.  \n- Step 4: If no current flows ($$ I = 0 $$), the terminal voltage equals the EMF ($$ V = \\varepsilon $$).  \n\n**Edge case:** In a short circuit ($$ R = 0 $$), $$ I = \\frac{\\varepsilon}{r} $$, and $$ V = 0 $$.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How can the internal resistance (r) of a cell be determined from a V–I graph? (3 steps)", "answer": "- Step 1: Rearrange $$ V = \\varepsilon - Ir $$ to match the linear equation $$ y = mx + c $$.  \n- Step 2: Plotting $$ V $$ (y-axis) against $$ I $$ (x-axis) gives a straight line with **gradient** $$ -r $$ and **y-intercept** $$ \\varepsilon $$.  \n- Step 3: Calculate the gradient of the line. Since $$ r = -(\\text{gradient}) $$, invert the sign to find $$ r $$.  \n\n**Example:** A gradient of $$-14.3 \\, \\Omega$$ implies $$ r = 14.3 \\, \\Omega $$.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does the y-intercept of a V–I graph give the EMF of the cell? (3 steps)", "answer": "- Step 1: The equation $$ V = \\varepsilon - Ir $$ shows that when $$ I = 0 $$ (no current), $$ V = \\varepsilon $$.  \n- Step 2: The y-intercept corresponds to $$ I = 0 $$, where the terminal voltage equals the full EMF (no \"lost volts\").  \n- Step 3: This is why the graph is extrapolated to the voltage axis: it represents the open-circuit condition.  \n\n**Misconception probe:** The y-intercept isn’t a measurement but a prediction of what the cell could supply without losses.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Describe the experimental setup used to determine the EMF and internal resistance of a cell. (5 steps)", "answer": "- Step 1: **Components:** A cell with internal resistance ($$ r $$), variable resistor ($$ R $$), ammeter (in series), and voltmeter (across the cell).  \n- Step 2: **Procedure:** Adjust the variable resistor to vary the current ($$ I $$) and record the corresponding terminal voltage ($$ V $$).  \n- Step 3: **Data collection:** Take multiple $$ I, V $$ readings (e.g., 0.1 A to 0.5 A).  \n- Step 4: **Graphing:** Plot $$ V $$ vs. $$ I $$. Draw the line of best fit.  \n- Step 5: **Analysis:** The y-intercept is $$ \\varepsilon $$, and the gradient is $$ -r $$.  \n\n**Critical precaution:** Ensure the cell’s internal resistance ($$ r $$) remains constant during the experiment.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Derive the equation $$ \\varepsilon = I(R + r) $$ using Kirchhoff’s voltage law. (4 steps)", "answer": "- Step 1: Consider a closed loop with a cell (EMF $$ \\varepsilon $$), internal resistance ($$ r $$), and external resistor ($$ R $$).  \n- Step 2: Apply Kirchhoff’s voltage law: The sum of potential differences around the loop equals zero.  \n- Step 3: $$ \\varepsilon = V_R + V_r $, where $$ V_R = IR $$ and $$ V_r = Ir $$.  \n- Step 4: Substitute: $$ \\varepsilon = IR + Ir = I(R + r) $$.  \n\n**Synthesis:** This shows the EMF is the total voltage across both the internal and external resistances.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Compare and contrast EMF (ε) and terminal potential difference (V). (4 steps)", "answer": "- Step 1: **Definition:**  \n  - EMF ($$ \\varepsilon $$): Energy supplied per unit charge (cause).  \n  - Terminal PD ($$ V $$): Energy delivered per unit charge (effect).  \n- Step 2: **Equation:** $$ \\varepsilon = V + Ir $$, so $$ V = \\varepsilon - Ir $$.  \n- Step 3: **Conditions:**  \n  - $$ V = \\varepsilon $$ only when $$ I = 0 $$ (open circuit).  \n  - $$ V < \\varepsilon $$ when current flows.  \n- Step 4: **Units:** Both are measured in volts (V).  \n\n**Misconception probe:** EMF is not a \"force\" but an energy per charge.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What precautions must be taken during the V–I graph experiment to ensure accurate results? (4 steps)", "answer": "- Step 1: **Constant internal resistance:** Ensure the cell’s internal resistance ($$ r $$) does not change during the experiment. Avoid overheating by limiting current.  \n- Step 2: **Accurate measurements:** Use precise ammeters and voltmeters. Calibrate instruments if necessary.  \n- Step 3: **Graph construction:** Use a ruler to draw the line of best fit. Select well-separated data points for gradient calculations.  \n- Step 4: **Avoid extreme currents:** At high currents, the internal resistance may vary, causing the graph to curve. Focus on the linear region.  \n\n**Edge case:** If the graph curves at high $$ I $$, it indicates $$ r $$ is no longer constant.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why the gradient of a V–I graph is negative. How does this relate to the internal resistance? (3 steps)", "answer": "- Step 1: Rearrange $$ V = \\varepsilon - Ir $$ to $$ V = -rI + \\varepsilon $$, which matches the linear equation $$ y = mx + c $$.  \n- Step 2: The gradient ($$ m $$) is $$ -r $$, so the graph slopes downward.  \n- Step 3: Since resistance ($$ r $$) is positive, the gradient must be negative. Thus, $$ r = -(\\text{gradient}) $$.  \n\n**Intuition:** As current increases, more voltage is lost to internal resistance, reducing terminal voltage.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Calculate the internal resistance ($$ r $$) of a cell given a V–I graph with two points: (0.1 A, 8.33 V) and (0.5 A, 5.50 V). (4 steps)", "answer": "- Step 1: Calculate the gradient:  \n  $$ \\text{Gradient} = \\frac{\\Delta V}{\\Delta I} = \\frac{5.50 - 8.33}{0.50 - 0.10} = \\frac{-2.83}{0.40} = -7.08 \\, \\Omega $$.  \n- Step 2: The internal resistance is the negative of the gradient:  \n  $$ r = -(\\text{Gradient}) = 7.08 \\, \\Omega $$.  \n- Step 3: Check units: $$ \\text{gradient units} = \\text{V A}^{-1} = \\Omega $$.  \n- Step 4: Round to 2 significant figures: $$ r \\approx 7.1 \\, \\Omega $$.  \n\n**Key equation:** $$ r = -(\\text{Gradient}) $$.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why can’t the terminal potential difference (V) ever exceed the EMF (ε) of the cell when current is flowing? (3 steps)", "answer": "- Step 1: Terminal voltage is given by $$ V = \\varepsilon - Ir $$.  \n- Step 2: The term $$ Ir $$ (lost volts) is always positive (since $$ I $$ and $$ r $$ are positive).  \n- Step 3: Subtracting $$ Ir $$ from $$ \\varepsilon $$ ensures $$ V < \\varepsilon $$.  \n\n**Exception:** In an open circuit ($$ I = 0 $$), $$ V = \\varepsilon $$.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "What is the significance of the gradient in a V–I graph for a cell with internal resistance? (3 steps)", "answer": "- Step 1: The gradient represents the negative of the internal resistance: $$ \\text{Gradient} = -r $$.  \n- Step 2: A steeper negative slope (more negative) indicates a higher internal resistance.  \n- Step 3: A flat line (gradient = 0) implies no internal resistance ($$ r = 0 $$), which is idealized.  \n\n**Visual intuition:** The slope’s steepness reflects how quickly the terminal voltage drops with increasing current.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why is it incorrect to define EMF as a \"force\"? (2 steps)", "answer": "- Step 1: **EMF is not a force.** It is a measure of energy per unit charge ($$ \\varepsilon = W/Q $$), with units of volts (J/C).  \n- Step 2: The term \"force\" is misleading because EMF describes energy transfer, not mechanical force.  \n\n**Cont
