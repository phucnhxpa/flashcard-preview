rast:** Terminal potential difference (V) is also not a force—it is energy delivered per charge.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Describe the circuit setup for measuring EMF and internal resistance. Why must only the external resistor be varied? (4 steps)", "answer": "- Step 1: **Circuit components:** A cell with internal resistance ($$ r $$), a variable resistor ($$ R $$), an ammeter (in series), and a voltmeter (across the cell).  \n- Step 2: **External resistor variation:** Adjust $$ R $$ to change the current ($$ I $$) and record corresponding $$ V $$.  \n- Step 3: **Internal resistance constancy:** $$ r $$ must remain fixed. Altering $$ r $$ would invalidate the straight-line assumption.  \n- Step 4: **Purpose:** The experiment assumes a constant $$ r $$; varying $$ R $$ isolates the relationship between $$ V $$ and $$ I $$.  \n\n**Critical error:** Changing $$ r $$ during the experiment would produce a non-linear graph, invalidating results.  \n```", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A voltmeter connected across a battery terminals reads 1.45 V when no current flows, but only 1.20 V when a lamp is connected. Explain why these readings are different, referring to the concept of \"lost volts.\" (3 steps)", "answer": "- Step 1: When no current flows (open circuit), there are no \"lost volts\" inside the battery, so the voltmeter reads the full e.m.f. — the total energy supplied to each coulomb.\n\n- Step 2: When current flows, energy is dissipated inside the battery itself due to its internal resistance r. The term Ir (current × internal resistance) represents this energy loss per coulomb — called the \"lost volts.\"\n\n- Step 3: By the conservation equation ε = V + Ir, we have V = ε − Ir. With the lamp connected, some voltage is lost internally, so the terminal p.d. V (1.20 V) is less than the e.m.f. (1.45 V).\n\n[Takeaway: V < ε whenever current flows because internal resistance \"steals\" energy]", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Write down the four equivalent forms of the cell equation that relate e.m.f. (ε), terminal p.d. (V), current (I), external resistance (R), and internal resistance (r). Explain what each form reveals about the circuit. (2 steps)", "answer": "- Step 1: The four forms are:\n  - ε = V + Ir (e.m.f. = terminal p.d. + lost volts)\n  - V = ε − Ir (terminal p.d. = e.m.f. minus lost volts)\n  - ε = I(R + r) (e.m.f. = current × total resistance)\n  - I = ε/(R + r) (current = e.m.f. / total resistance)\n\n- Step 2: Each form emphasizes different perspectives: the first two show energy conservation per coulomb; the third treats internal resistance as a series resistor with the external load; the fourth is the solved form for calculating current given resistances.\n\n[Takeaway: All four are mathematically equivalent — choose based on what's unknown]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "In a V-I graph for a cell, the line has a negative gradient. Explain why the gradient is negative and what physical quantity this gradient represents. (2 steps)", "answer": "- Step 1: The equation for the graph is V = ε − rI, which rearranges to V = (−r)I + ε. Comparing with y = mx + c, the gradient m = −r.\n\n- Step 2: Since resistance r is always positive, the gradient is negative. This means as current I increases, the terminal p.d. V decreases because more voltage is \"lost\" across the internal resistance (Ir increases). The magnitude of the gradient equals the internal resistance: r = −(gradient).\n\n[Takeaway: Negative gradient → positive internal resistance]", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A student plots current (I) on the vertical axis and terminal p.d. (V) on the horizontal axis instead of the standard orientation. How would this affect the values obtained for ε and r? (2 steps)", "answer": "- Step 1: The standard graph plots V (y-axis) against I (x-axis), giving gradient = −r and y-intercept = ε. If swapped, the graph becomes I = (−1/r)V + (ε/r), so the gradient would be −1/r and the x-intercept would be ε.\n\n- Step 2: To extract ε and r correctly from the swapped graph, you'd need to take the reciprocal of the gradient and read the x-intercept instead of the y-intercept. This is a common exam trap — always check axis labels carefully.\n\n[Takeaway: Always verify which variable is on which axis]", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In Core Practical 8, a student adjusts both the variable resistor AND the internal resistance slider while taking measurements. Explain why this would give incorrect results. (2 steps)", "answer": "- Step 1: The entire method assumes that internal resistance r is a single constant value that stays fixed throughout the experiment. The linear relationship V = ε − rI only holds if r is constant.\n\n- Step 2: If r changes between readings, the data points no longer lie on a single straight line. The \"gradient\" would be some meaningless average, and the extracted ε and r would be incorrect. The procedure explicitly requires setting r once at the start and never touching it again.\n\n[Takeaway: Only vary the external load R; keep internal resistance fixed]", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A cell has ε = 9.0 V and r = 5.0 Ω. Calculate the terminal p.d. when the current is (a) 0 A, (b) 1.0 A, and (c) 2.0 A. Explain the trend observed. (3 steps)", "answer": "- Step 1: Using V = ε − Ir:\n  - (a) I = 0 A: V = 9.0 − (0)(5.0) = 9.0 V\n  - (b) I = 1.0 A: V = 9.0 − (1.0)(5.0) = 4.0 V\n  - (c) I = 2.0 A: V = 9.0 − (2.0)(5.0) = −1.0 V\n\n- Step 2: The terminal p.d. decreases linearly as current increases because more voltage is lost across the internal resistance (Ir grows).\n\n- Step 3: Note that at I = 2.0 A, V becomes negative — this means the internal resistance drop exceeds the e.m.f., which can happen in practice with a high-resistance load or weak cell; the terminal p.d. can reverse polarity.\n\n[Takeaway: Higher current → greater \"lost volts\" → lower terminal p.d.]", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Explain why the V-I graph for a real cell may curve at high currents, and how this affects determining the internal resistance. (2 steps)", "answer": "- Step 1: At low currents, internal resistance r is approximately constant, giving a straight line. At high currents, the cell heats up due to I²r power dissipation, which changes the material properties of the cell — r is no longer constant.\n\n- Step 2: The graph curves upward (becomes less steep), meaning r appears to increase at high currents. To find the \"true\" internal resistance, you should draw a line of best fit through the linear (low-current) region and use its gradient. The exam might ask why the line isn't straight — this is the reason.\n\n[Takeaway: Use the linear region to find r; r increases at high currents due to heating]", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A V-I graph has points at (0.20 A, 7.80 V) and (0.60 A, 6.20 V). Calculate the e.m.f. and internal resistance of the cell. (3 steps)", "answer": "- Step 1: Calculate the gradient:\n  gradient = ΔV/ΔI = (6.20 − 7.80)/(0.60 − 0.20) = (−1.60)/(0.40) = −4.0 V A⁻¹\n\n- Step 2: The internal resistance r = −(gradient) = 4.0 Ω\n\n- Step 3: Find ε from the y-intercept. Using V = ε − Ir at point (0.20 A, 7.80 V):\n  7.80 = ε − (0.20)(4.0) = ε − 0.80\n  ε = 7.80 + 0.80 = 8.60 V\n\n[Answer: ε ≈ 8.6 V, r ≈ 4.0 Ω]", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is meant by the term \"lost volts\" in a circuit? Derive the expression for lost volts and explain why this term is appropriate. (3 steps)", "answer": "- Step 1: \"Lost volts\" refers to the voltage drop across the internal resistance of a power source. It is the energy per coulomb that is dissipated as heat inside the cell itself rather than being delivered to the external load.\n\n- Step 2: From ε = V + Ir, rearranged as ε − V = Ir. The term Ir is the lost volts — it represents voltage \"lost\" before charges reach the terminals.\n\n- Step 3: The term is appropriate because this energy is not available to do useful work in the external circuit — it is \"lost\" as thermal energy in the internal resistance. The more current you draw, the greater the lost volts, so heavy loads make the terminal voltage drop significantly.\n\n[Takeaway: Lost volts = Ir, increases with current]", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "In the derivation of I = nAve, explain what each symbol represents and why drift velocity is much slower than the random thermal velocity of electrons. (3 steps)", "answer": "- Step 1: I = nAve where:\n  - I = current (A)\n  - n = number density of free charge carriers per m³ (m⁻³)\n  - A = cross-sectional area of conductor (m²)\n  - v = mean drift velocity of carriers (m s⁻¹)\n  - e = charge on each carrier (e = 1.6 × 10⁻¹⁹ C for electrons)\n\n- Step 2: Electrons in a conductor have very high random thermal velocities (~10⁵ m/s), but this motion is random and produces no net current. Drift velocity is the small net velocity in one direction due to the electric field (~10⁻⁴ m/s).\n\n- Step 3: Drift velocity is tiny because n is enormous (∼10²⁸ m⁻³ for copper). Even a slow drift of many electrons moving together produces measurable current. The random thermal motion is fast but cancels out; only the tiny net drift contributes to current.\n\n[Takeaway: High n and low v combine to give practical current values]", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "A copper wire has cross-sectional area 1 mm² and carries 10 A. Given that copper has approximately 10²⁹ free electrons per m³, estimate the order of magnitude of the drift velocity. Show your reasoning. (2 steps)", "answer": "- Step 1: Convert units: A = 1 mm² = 1 × 10⁻⁶ m². Use I = nAve, rearrange: v = I/(nAe)\n  \n  v = 10 / (10²⁹ × 10⁻⁶ × 1.6 × 10⁻¹⁹)\n  v = 10 / (10²⁹ × 10⁻⁶ × 1.6 × 10⁻¹⁹)\n  v = 10 / (1.6 × 10⁴)\n  v ≈ 6 × 10⁻⁴ m/s\n\n- Step 2: This is about 0.6 mm/s — extremely slow! Even for a 10 A current, electrons drift at less than 1 mm per second. This illustrates that current is not electrons \"shooting\" through the wire; it's a slow drift superimposed on rapid random motion.\n\n[Takeaway: Drift velocity is typically < 1 mm/s — current is slow drift of enormous numbers of electrons]", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A thermistor's resistance decreases when its temperature increases. Explain this behavior in terms of the number density n of charge carriers. (2 steps)", "answer": "- Step 1: A thermistor (specifically an NTC thermistor) is a semiconductor. As temperature increases, more electrons gain enough energy to escape their atoms and become free charge carriers.\n\n- Step 2: This increases the number density n (free electrons per m³). From I = nAve, for the same voltage, a higher n means more charge carriers can flow, so current increases — which means resistance decreases (R = V/I). The causal chain: higher temperature → more free electrons → higher n → lower resistance.\n\n[Takeaway: Thermistor resistance falls because n increases with temperature]", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "An LDR (light-dependent resistor) has high resistance in darkness but low resistance in bright light. Explain this using the concept of number density n. (2 steps)", "answer": "- Step 1: In darkness, few electrons have enough energy to jump into the conduction band, so the number of free charge carriers n is small. With few carriers, the current for a given voltage is small, meaning high resistance.\n\n- Step 2: When light shines on the LDR, photons transfer energy to electrons, freeing many more electrons into the conduction band. This dramatically increases n. More charge carriers mean larger current for the same voltage, so resistance decreases. The relationship is inverse: light intensity ↑ → n ↑ → R ↓.\n\n[Takeaway: LDR resistance falls because light releases more free electrons, increasing n]", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In a potential divider circuit, a student says \"the voltage is shared between the components, so each gets a fraction of the total voltage based on their resistances.\" Explain why this statement needs qualification and what the correct relationship is. (2 steps)", "answer": "- Step 1: The statement is partially correct for components in series — the sum of voltage drops equals the total (ε = V₁ + V₂). However, it's not a simple \"fraction based on resistance\" in the sense of a fixed ratio independent of other factors.\n\n- Step 2: For two resistors in series, the voltage across each is proportional to its resistance: V₁ = (R₁/(R₁ + R₂)) × ε and V₂ = (R₂/(R₁ + R₂)) × ε. This is because current is the same through both (series), and V = IR. So the voltage division depends on the ratio of each resistance to the total resistance.\n\n[Takeaway: Voltage divides according to resistance ratio: Vₙ = (Rₙ/R_total) × ε]", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A battery with ε = 12 V and internal resistance r = 2 Ω is connected to an external resistor R. If the terminal p.d. is 10 V, calculate the external resistance R and the current flowing. (3 steps)", "answer": "- Step 1: We know ε = 12 V, V = 10 V, r = 2 Ω. Using ε = V + Ir, find the current:\n  12 = 10 + I(2) → 2 = 2I → I = 1.0 A\n\n- Step 2: Now use V = IR to find the external resistance R:\n  10 = (1.0) × R → R = 10 Ω\n\n- Step 3: Check using I = ε/(R + r) = 12/(10 + 2) = 12/12 = 1.0 A ✓\n\n[Answer: R = 10 Ω, I = 1.0 A]", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why does a voltmeter connected across the terminals of a battery read the e.m.f. only when no current is drawn from the battery? (2 steps)", "answer": "- Step 1: An ideal voltmeter has very high resistance, so it draws negligible current. When connected with no other load, essentially I ≈ 0 flows in the circuit.\n\n- Step 2: With I ≈ 0, the \"lost volts\" (Ir) term becomes zero. From V = ε − Ir, we get V = ε. The voltmeter then reads the full e.m.f. because no voltage is dropped across the internal resistance. As soon as any current flows (even through the voltmeter), some voltage is lost internally and V < ε.\n\n[Takeaway: Open-circuit (I = 0) → V = ε; any load → V < ε]", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Two identical cells, each with e.m.f. ε and internal resistance r, are connected (a) in series and (b) in parallel. Derive expressions for the total e.m.f. and total internal resistance for each case. (3 steps)", "answer": "- Step 1: (a) In series: e.m.f.s add, resistances add:\n  - Total ε_series = ε + ε = 2ε\n  - Total r_series = r + r = 2r\n\n- Step 2: (b) In parallel: The e.m.f. is the same as one cell (they have same potential difference), but the internal resistance decreases because they share the current:\n  - Total ε_parallel = ε (same as one cell)\n  - Total r_parallel = r/2 (two r's in parallel: 1/r_total = 1/r + 1/r = 2/r)\n\n- Step 3: For the parallel case, the lower internal resistance means the battery can supply higher currents without as much voltage drop. However, the e.m.f. is unchanged.\n\n[Takeaway: Series: ε doubles, r doubles. Parallel: ε unchanged, r halves]", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Explain why connecting batteries in parallel can be useful despite not increasing the e.m.f. What advantage does this configuration provide? (2 steps)", "answer": "- Step 1: In parallel, each cell supplies part of the current to the external load. The total internal resistance is halved (for two identical cells), so the \"lost volts\" Ir are reduced for a given load current.\n\n- Step 2: This means the terminal voltage stays higher under load, and each cell supplies only half the current it would if alone. This reduces the strain (current demand) on each cell and extends battery life. It's useful when you need to deliver high current while keeping terminal voltage stable.\n\n[Takeaway: Parallel cells share the load current, reducing internal resistance and voltage drop]", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "In the expression I = nAve, if the cross-sectional area of a wire is doubled while keeping the current the same, what happens to the drift velocity? Explain your reasoning. (2 steps)", "answer": "- Step 1: From I = nAve, keeping I constant means nAv must be constant (since e is fixed). If A doubles, then the product Av must halve to maintain the same I.\n\n- Step 2: Assuming n (the number density of charge carriers) stays the same material, if A doubles and n is constant, then v must halve. Physically, with a wider wire, the same number of coulombs per second can spread across a larger area, so each carrier can move more slowly while still carrying the same total charge per second.\n\n[Takeaway: Wider wire → lower drift velocity for same current (if n unchanged)]", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A student measures the terminal p.d. across a battery connected to a load. When the ammeter reads 0.5 A, the voltmeter reads 4.0 V. When the current increases to 1.0 A, the voltmeter reads 3.0 V. Determine the e.m.f. and internal resistance of the battery. (3 steps)", "answer": "- Step 1: Use the two data points to find the gradient:\n  Gradient = ΔV/ΔI = (3.0 − 4.0)/(1.0 − 0.5) = (−1.0)/(0.5) = −2.0 V A⁻¹\n  \n  Therefore, r = −(gradient) = 2.0 Ω\n\n- Step 2: Find ε using either point and V = ε − Ir. Using (0.5 A, 4.0 V):\n  4.0 = ε − (0.5)(2.0) = ε − 1.0\n  ε = 5.0 V\n\n- Step 3: Check with second point: V = 5.0 − (1.0)(2.0) = 3.0 V ✓\n\n[Answer: ε = 5.0 V, r = 2.0 Ω]", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is it important to use a \"line of best fit\" rather than simply connecting all the data points when analyzing V-I graph data in Core Practical 8? (2 steps)", "answer": "- Step 1: Real measurements contain random errors (ammeter and voltmeter readings aren't perfectly precise). Connecting every point would create a jagged line that doesn't represent the underlying linear relationship.\n\n- Step 2: A line of best fit averages out these random errors, giving a more accurate determination of the true gradient (and hence r) and intercept (ε). It also makes it easier to identify and ignore any anomalous points that don't fit the straight-line relationship.\n\n[Takeaway: Best fit minimizes error and reveals the true linear relationship]", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Explain the difference between e.m.f. and terminal potential difference in terms of energy direction. Which represents the \"cause\" and which represents the \"effect\"? (2 steps)", "answer": "- Step 1: E.m.f. (ε) is the energy supplied BY the source TO each coulomb — it's the cause. The source does work on the charges, giving them electrical potential energy.\n\n- Step 2: Terminal p.d. (V) is the energy transferred BY the charges TO the external circuit — it's the effect. The charges give up their energy to do work in the lamp, resistor, or other load.\n\nBoth have units of volts (J/C) but represent opposite energy flow directions: source → charges (ε), charges → load (V).\n\n[Takeaway: ε = cause (energy in), V = effect (energy out)]", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A battery has internal resistance r = 0.5 Ω. If you connect a voltmeter directly across its terminals (no external load), what will the voltmeter read and why? (2 steps)", "answer": "- Step 1: A voltmeter has very high (ideally infinite) resistance, so it draws negligible current from the battery.\n\n- Step 2: With essentially zero current flowing, the current I through the internal resistance is approximately 0. Using V = ε − Ir, we get V ≈ ε − 0 = ε. The voltmeter reads the e.m.f. directly because there are no \"lost volts\" when no current flows.\n\n[Takeaway: Open-circuit voltmeter reads ε]", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A wire is made of a material with twice the number density of free electrons compared to another wire of the same dimensions. If the same current flows through both, compare their drift velocities. (2 steps)", "answer": "- Step 1: From I = nAve, for the same I, same A, and same e, we have n₁v₁ = n₂v₂.\n\n- Step 2: If n₂ = 2n₁ (the second wire has double the number density), then:\n  v₂ = (n₁v₁)/n₂ = (n₁v₁)/(2n₁) = v₁/2\n  \n  The drift velocity in the higher-n material is half as much. More charge carriers means each one can move more slowly to carry the same total current.\n\n[Takeaway: Higher n → lower v for same current]", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In Core Practical 8, explain why it is important to take readings across a wide range of currents (from low to high). What would happen if you only took readings near zero current? (2 steps)", "answer": "- Step 1: Taking readings across a wide range gives a more reliable gradient calculation. Using points far apart reduces the percentage uncertainty in the gradient calculation — this is why using a \"big triangle\" for the gradient is important.\n\n- Step 2: If you only take readings near zero current, all your points cluster in a small region of the graph. Small errors in reading the coordinates become large percentage errors in the gradient, making r (the negative gradient) very inaccurate. A good spread of currents gives a more accurate result.\n\n[Takeaway: Wide current range → accurate gradient; narrow range → large uncertainty]", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A circuit has a battery, internal resistance, and an external resistor R. If R is decreased (made smaller), what happens to (a) the current in the circuit, (b) the terminal p.d., and (c) the \"lost volts\"? Explain each. (3 steps)", "answer": "- Step 1: (a) Current increases. From I = ε/(R + r), if R decreases, the denominator decreases, so I increases.\n\n- Step 2: (b) Terminal p.d. decreases. Using V = ε − Ir, since I has increased and r is constant, the Ir term (lost volts) increases, so V = ε − Ir decreases.\n\n- Step 3: (c) Lost volts (Ir) increase. Since I has increased and r is constant, the product Ir increases. This is why connecting too low a resistance load to a battery causes a significant drop in terminal voltage — the battery \"struggles\" to maintain voltage.\n\n[Takeaway: Lower external R → higher current → lower terminal V → higher lost volts]", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What does the y-intercept of a V-I graph represent physically? Under what condition would the y-intercept equal the terminal p.d.? (2 steps)", "answer": "- Step 1: The y-intercept is where I = 0 (no current flows). At this point, there are no \"lost volts\" (Ir = 0), so V = ε. The y-intercept represents the e.m.f. of the cell — the maximum terminal voltage when no current is drawn.\n\n- Step 2: The y-intercept equals the terminal p.d. only when I = 0 (open circuit). At any non-zero current, V < ε. The points on the line between the axes represent actual terminal p.d. values at those currents.\n\n[Takeaway: y-intercept = ε (only when I = 0)]", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A battery is labelled \"9.0 V\" but a voltmeter reads only 8.2 V when a flashlight is connected. Explain this difference and calculate the internal resistance if the current is 0.80 A. (3 steps)", "answer": "- Step 1: The difference is due to \"lost volts\" across the internal resistance. Not all the e.m.f. reaches the terminals because some voltage is dropped internally.\n\n- Step 2: Using ε = V + Ir:\n  9.0 = 8.2 + (0.80)r\n  0.8 = 0.80r\n  r = 1.0 Ω\n\n- Step 3: The internal resistance of 1.0 Ω causes a voltage drop of Ir = 0.80 V when 0.80 A flows, leaving only 8.2 V at the terminals. This is normal — no real battery has zero internal resistance.\n\n[Answer: r = 1.0 Ω]", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "When deriving I = nAve, we consider a cylinder of wire of length s. Explain how this geometric picture leads to the final equation. (3 steps)", "answer": "- Step 1: Consider charge flowing through a cross-section. In time t, charges travel distance s = vt (their drift velocity times time).\n\n- Step 2: The volume of wire that charges pass through is A × s = Avt. With n charge carriers per m³, the total number of charges is n × Avt.\n\n- Step 3: Total charge Q = (number) × (charge each) = nAvte. Since current I = Q/t = (nAvte)/t = nAve. This derivation shows current depends on how many carriers (n), how big the wire (A), how fast they move (v), and how much charge each carries (e).\n\n[Takeaway: Current = (carrier density) × (area) × (drift speed) × (carrier charge)]", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why does an NTC thermistor show a decrease in resistance with increasing temperature, while most metals show an increase in resistance with temperature? (2 steps)", "answer": "- Step 1: Thermistors are semiconductors, not metals. In semiconductors, increasing temperature causes more electrons to gain enough energy to jump from the valence band to the conduction band, creating many more free charge carriers. This dominates over any lattice vibration effects.\n\n- Step 2: In metals, the number of free electrons is essentially constant; what changes is that lattice ions vibrate more, causing more electron scattering. This increases resistance with temperature. In thermistors, the massive increase in n (carrier density) overwhelms this effect, causing net resistance to decrease.\n\n[Takeaway: Semiconductors: n increases dramatically with T → R decreases. Metals: n constant, lattice scattering increases → R increases]", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the context of ESAT exam preparation, what does \"scope\" mean, and why is it important to prioritize certain sections over others? (2 steps)", "answer": "- Step 1: \"Scope\" refers to the specific sections of each chapter that actually appear in the ESAT test. ESAT does not cover entire chapters — only selected sections are included.\n\n- Step 2: Prioritizing the in-scope sections ensures efficient preparation: you focus your limited study time on material that will actually be tested. For example, ESAT might cover only part of the radioactive decay chapter or the atomic structure chapter, not the entirety. Knowing the scope prevents wasted effort on non-tested content.\n\n[Takeaway: Scope = testable sections; prioritize these for efficient ESAT prep]", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A student connects a voltmeter across a battery and reads 1.50 V. They then connect a 10 Ω resistor and measure the terminal voltage as 1.35 V. Calculate the internal resistance of the battery. (3 steps)", "answer": "- Step 1: Open-circuit voltage = ε = 1.50 V (voltmeter draws negligible current)\n  With resistor connected: V = 1.35 V, R = 10 Ω\n\n- Step 2: Find the current using V = IR: I = V/R = 1.35/10 = 0.135 A\n\n- Step 3: Use ε = V + Ir to find r:\n  1.50 = 1.35 + (0.135)r\n  0.15 = 0.135r\n  r = 0.15/0.135 = 1.11 Ω\n\n[Answer: r ≈ 1.1 Ω]", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Explain why the current in a simple circuit is the same at all points in the series loop. What principle does this illustrate? (2 steps)", "answer": "- Step 1: In a series circuit, charge cannot accumulate at any point. If more charge entered a point than left, the buildup would create an electric field that would immediately stop that flow imbalance.\n\n- Step 2: This illustrates the conservation of charge (continuity equation for steady currents). The same rate of charge flow (current) passes through every component in series. In contrast, in parallel, current splits but charge is still conserved — the sum of branch currents equals the total current entering.\n\n[Takeaway: Series circuit: same current everywhere. This is charge conservation.]", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A potentiometer (variable resistor) is used to vary current in Core Practical 8. What properties make it suitable for this purpose? (2 steps)", "answer": "- Step 1: A potentiometer (or rheostat) provides a continuously variable resistance. By sliding the contact, you can smoothly adjust R from near zero to some maximum value.\n\n- Step 2: This allows you to take multiple readings at different currents. As you increase R, total resistance (R + r) increases, so current I = ε/(R + r) decreases. This gives you a range of (I, V) data points to plot. Being able to set specific target currents (e.g., 0.10 A, 0.20 A) makes data collection systematic.\n\n[Takeaway: Variable resistor enables systematic variation of current for multiple readings]", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "If you wanted to maximize the power delivered to an external load from a battery with internal resistance r, what should the load resistance R be? Show your reasoning. (3 steps)", "answer": "- Step 1: Power delivered to load: P = I²R = [ε/(R + r)]² × R\n\n- Step 2: To find maximum P, differentiate with respect to R and set dP/dR = 0. This calculus gives R = r.\n\n- Step 3: This is a classic result: maximum power transfer occurs when load resistance equals internal resistance. At this point, exactly half the power is delivered to the load and half is lost in the internal resistance (efficiency = 50%). For maximum efficiency (not maximum power), you'd want R >> r.\n\n[Takeaway: Maximum power to load when R = r]", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In a V-I graph, what does it mean if the data points show significant scatter rather than lying close to a straight line? (2 steps)", "answer": "- Step 1: Significant scatter indicates large random errors in measurement — the ammeter and voltmeter readings are not precise, or there's variation in the experimental conditions.\n\n- Step 2: Possible causes include: unstable contact resistance, fluctuating internal resistance (cell heating), parallax errors in reading instruments, or simply poor-quality measurements. You should still draw a best-fit line, but the uncertainty in gradient and intercept will be larger.\n\n[Takeaway: Scatter = measurement errors; best-fit still gives best estimate but with larger uncertainty]", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Explain why connecting cells in series increases the total e.m.f., but connecting them in parallel does not. (2 steps)", "answer": "- Step 1: In series, the cells work \"one after another\" in the energy boost they give to charges. Each cell adds its e.m.f. to the total energy per coulomb, so ε_total = ε₁ + ε₂ + ...\n\n- Step 2: In parallel, cells are connected across the same two points. The potential difference between those points cannot be more than what one cell alone can provide — they can't \"add\" voltage because they're connected to the same terminals. Each cell contributes current, but the voltage across the terminals remains that of a single cell.\n\n[Takeaway: Series adds ε; parallel keeps ε same but adds current capacity]", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A wire of length L and cross-sectional area A has resistance R. If the wire is stretched to twice its length while keeping volume constant, what happens to its resistance? Explain. (3 steps)", "answer": "- Step 1: Original volume = A × L. New volume must equal original: A_new × (2L) = A × L, so A_new = A/2 (half the original cross-section).\n\n- Step 2: Resistance R = ρL/A. Original R = ρL/A. New R_new = ρ(2L)/(A/2) = ρ(2L)(2/A) = 4ρL/A = 4R.\n\n- Step 3: Stretching a wire to twice its length (while conserving volume) increases its resistance by a factor of 4. This is because halving the area (thinner wire) has a bigger effect than doubling the length. This phenomenon is relevant to strain gauges.\n\n[Answer: Resistance increases by factor of 4]", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In the formula I = nAve, state whether each quantity is a property of the material, the geometry, or the conditions, and explain: (a) n, (b) A, (c) v, (d) e (2 steps)", "answer": "- Step 1:\n  - n (number density): Property of the material — depends on the type of conductor (copper has ~10²⁹ m⁻³, silicon much less)\n  - A (cross-sectional area): Geometry of the wire\n  - v (drift velocity): Depends on conditions — increases with current and decreases with higher n or A\n  - e (elementary charge): Fundamental constant\n\n- Step 2: For a given material at given current, n and e are fixed; you can control A (choose wire thickness) and v (by varying current). This equation shows how these factors combine to determine the current.\n\n[Takeaway: n = material property; A = geometry; v = condition-dependent; e = constant]", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A battery with EMF 12V and internal resistance 0.5Ω is connected to an external resistor. When the current is 4A, what is the terminal potential difference across the battery terminals? Explain why this is less than 12V. (3 steps)", "answer": "- Step 1: Use the cell equation: V = ε - Ir\n\n- Step 2: Substitute the values: V = 12V - (4A × 0.5Ω) = 12V - 2V = 10V\n\n+ The terminal p.d. is 10V.\n\n- Step 3: The terminal p.d. is less than the EMF because energy is \"lost\" inside the battery across its internal resistance. This \"lost volts\" (Ir = 2V) is the energy per coulomb dissipated as heat inside the cell itself before charges reach the external circuit.\n\n**Takeaway:** V < ε whenever current flows because internal resistance consumes some of the EMF as \"lost volts.\"", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In a circuit with a cell, variable resistor, ammeter and voltmeter, you obtain the following data: at current 0.20A, terminal voltage is 7.6V; at current 0.50A, terminal voltage is 5.5V. Determine the EMF and internal resistance of the cell. (3 steps)", "answer": "- Step 1: Use the two data points in V = ε - Ir. This gives two equations:\n+ Point 1: 7.6 = ε - 0.20r\n+ Point 2: 5.5 = ε - 0.50r\n\n- Step 2: Subtract the equations to eliminate ε:\n+ 7.6 - 5.5 = (ε - 0.20r) - (ε - 0.50r)\n+ 2.1 = 0.30r\n+ r = 2.1 ÷ 0.30 = 7.0 Ω\n\n- Step 3: Find ε using either point: ε = 7.6 + 0.20(7.0) = 7.6 + 1.4 = 9.0 V\n+ Alternatively: ε = 5.5 + 0.50(7.0) = 5.5 + 3.5 = 9.0 V ✓\n\n**Takeaway:** Internal resistance = 7.0 Ω, EMF = 9.0 V. You can use any two points on the V-I graph to find r and ε.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A V-I graph for a cell is plotted with voltage on the vertical axis and current on the horizontal axis. The graph is a straight line with negative gradient, crossing the voltage axis at 3.0V. When current is 0.25A, the voltage is 2.5V. Find the internal resistance of the cell. (2 steps)", "answer": "- Step 1: The y-intercept (where I = 0) gives the EMF directly: ε = 3.0V\n\n- Step 2: Use V = ε - Ir to find r:\n+ 2.5 = 3.0 - 0.25r\n+ 0.25r = 3.0 - 2.5 = 0.5\n+ r = 0.5 ÷ 0.25 = 2.0 Ω\n\n**Takeaway:** Internal resistance = 2.0 Ω. The negative gradient of the V-I graph equals -r, so r = -gradient.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In Core Practical 8 to find EMF and internal resistance, why must you keep the internal resistance fixed while varying the current? What would happen to your V-I graph if you changed the internal resistance between readings? (2 steps)", "answer": "- Step 1: The entire method assumes r is a single constant value. The equation V = ε - Ir only produces a straight line if r remains constant. The gradient of the V-I graph equals -r, which only has meaning if r doesn't change.\n\n- Step 2: If you change r between readings, your data points will no longer lie on a single straight line. Instead, you'd get a scattered plot with no consistent gradient, making it impossible to determine a meaningful ε and r. The experiment would fail.\n\n+ In the PhET simulation, Alex had to keep telling Phuc \"don't touch that [internal resistance slider] again\" — moving it would ruin the linear relationship.\n\n**Takeaway:** Only vary the external load resistor R; keep the cell's internal resistance constant throughout the experiment.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain why the V-I graph for a real cell may not be perfectly straight at high currents. (2 steps)", "answer": "- Step 1: At low currents, the internal resistance r is approximately constant, so V = ε - Ir gives a straight line.\n\n- Step 2: At high currents, the cell heats up due to power dissipation (I²r). This heating changes the physical properties of the cell — the internal resistance increases (especially in batteries with electrolyte chemistry changes). Since r is no longer constant, the relationship becomes non-linear, and the graph curves away from straight.\n\n+ The textbook explicitly notes this: \"the line may not be straight at large currents.\" For exam purposes, use the linear (low-current) region to find r.\n\n**Takeaway:** At high currents, internal resistance is not constant — the V-I graph curves. Use the straight portion to find r.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A battery has EMF 9.0V and internal resistance 1.2Ω. It is connected to an external resistor of resistance 6.0Ω. Calculate (a) the current in the circuit, (b) the terminal voltage, and (c) the \"lost volts.\" (3 steps)", "answer": "- Step 1: Total resistance in circuit = R + r = 6.0 + 1.2 = 7.2Ω\n+ Use I = ε/(R+r) = 9.0 ÷ 7.2 = 1.25 A\n\n- Step 2: Terminal voltage V = IR = 1.25 × 6.0 = 7.5 V\n+ Alternatively: V = ε - Ir = 9.0 - (1.25 × 1.2) = 9.0 - 1.5 = 7.5 V ✓\n\n- Step 3: Lost volts = Ir = 1.25 × 1.2 = 1.5 V\n+ Check: ε - V = 9.0 - 7.5 = 1.5 V ✓\n\n**Takeaway:** Current = 1.25 A, terminal voltage = 7.5 V, lost volts = 1.5 V. These always sum to ε.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What does the y-intercept of a V-I graph represent, and what does the x-intercept represent? Explain physically what each means. (2 steps)", "answer": "- Step 1: The y-intercept (at I = 0) represents the EMF (ε). When no current flows, there are no \"lost volts\" (Ir = 0), so the terminal voltage equals the full EMF of the cell.\n\n+ This is why measuring voltage across an open circuit (no current) gives you the EMF directly.\n\n- Step 2: The x-intercept (at V = 0) would represent the short-circuit current — the current that would flow if the terminals were connected with no external resistance (R = 0). Here, ε = Ir_short, so I_short = ε/r.\n\n+ In practice, this current can be very high and dangerous for real batteries.\n\n**Takeaway:** y-intercept = ε (open-circuit voltage), x-intercept = ε/r (short-circuit current).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Why does terminal voltage decrease when you connect more resistors in parallel to a circuit (increasing the load)? Explain using the concept of \"lost volts.\" (3 steps)", "answer": "- Step 1: Adding more resistors in parallel decreases the total external resistance R_total. This lowers the total resistance in the circuit (R + r).\n\n- Step 2: With lower total resistance, the current I = ε/(R+r) increases.\n\n- Step 3: The \"lost volts\" (Ir) increases because it depends on current: more current means more energy dissipated inside the cell. Since V = ε - Ir, the terminal voltage drops.\n\n+ Simple analogy: think of the cell's EMF as a fuel tank. More current is like drawing fuel faster — more spills inside the tank (lost volts), less reaches the outside.\n\n**Takeaway:** Higher load current → larger Ir lost → lower terminal voltage V.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A student measures the EMF of a battery by connecting a voltmeter directly across its terminals with no load connected. The voltmeter reads exactly the EMF. But when a lamp is connected, the voltmeter reading drops. Explain why this happens in terms of energy conservation per coulomb. (3 steps)", "answer": "- Step 1: With no load (open circuit), current I = 0. The \"lost volts\" (Ir) = 0, so the voltmeter reads the full EMF: V = ε - I(0) = ε.\n\n- Step 2: When the lamp is connected, current flows. The cell must do work on each coulomb twice:\n+ (a) Supply energy ε joules per coulomb (the EMF)\n+ (b) But as charges pass through the cell's internal resistance, Ir joules per coulomb are dissipated as heat inside the cell\n\n- Step 3: Energy conservation per coulomb: ε = V + Ir. The terminal voltage V is what's left after losing Ir inside the cell. That's why V < ε when current flows.\n\n**Takeaway:** With no load, no current → no lost volts → V = ε. With a load, current flows → energy lost inside cell → V < ε.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In the formula I = nAve, what does each symbol represent, and what are their SI units? (2 steps)", "answer": "- Step 1: I = nAvq in the data booklet form (or I = nAve for electrons):\n+ I = current (amperes, A)\n+ n = number density of charge carriers (m⁻³, carriers per cubic metre)\n+ A = cross-sectional area of conductor (m²)\n+ v = mean drift velocity of carriers (m s⁻¹)\n+ q = charge on each carrier (coulombs, C); for electrons, q = e = 1.6 × 10⁻¹⁹ C\n\n- Step 2: For electrons, the formula is written as I = nAve, where e is the electron charge. For positive ions, you'd use the appropriate charge q.\n\n**Takeaway:** All quantities must be in SI base units when using this formula — convert mm² to m², mm³ to m³, etc.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Derive the formula I = nAve from first principles, starting from I = Q/t. (4 steps)", "answer": "- Step 1: Start with I = Q/t, the definition of current as charge per unit time.\n\n- Step 2: Consider a section of conductor of length s (the distance charges travel in time t). The volume containing charge carriers is A × s, where A is cross-sectional area.\n\n+ Number of carriers in this volume = n × (A × s), where n is number density (per m³).\n+ Total charge in this volume = (n × A × s) × q, where q is the charge on each carrier.\n\n- Step 3: So Q = nAsq. Substitute into I = Q/t:\n+ I = (nAsq)/t = nA × (s/t) × q\n\n- Step 4: Since s/t = v (drift velocity), we get I = nAvq\n+ For electrons, q = e, so I = nAve\n\n**Takeaway:** Current depends on how many carriers (n), how big the wire is (A), how fast they move (v), and how much charge each carries (e or q).", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A copper wire has cross-sectional area 1 mm² and carries a current of 10 A. Given that copper has approximately 8.5 × 10²⁸ free electrons per m³, estimate the drift velocity of electrons in this wire. Show your reasoning. (3 steps)", "answer": "- Step 1: Convert to SI units: A = 1 mm² = 1 × 10⁻⁶ m². The electron charge e = 1.6 × 10⁻¹⁹ C.\n\n- Step 2: Use I = nAve, rearranged for v: v = I/(nA e)\n\n+ v = 10 / (8.5 × 10²⁸ × 1 × 10⁻⁶ × 1.6 × 10⁻¹⁹)\n\n- Step 3: Calculate step by step:\n+ Denominator = 8.5 × 1 × 1.6 × 10^(28-6-19) = 13.6 × 10³ = 1.36 × 10⁴\n+ v = 10 / (1.36 × 10⁴) ≈ 7.4 × 10⁻⁴ m/s ≈ 0.74 mm/s\n\n**Takeaway:** Drift velocity is incredibly slow — about 0.7 mm per second, even for a 10 A current. This seems paradoxically slow, but there are so many electrons (high n) that the current is still large.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Explain why a thermistor's resistance decreases when its temperature increases, using the concept of number density n. (2 steps)", "answer": "- Step 1: A thermistor (specifically NTC — negative temperature coefficient) is a semiconductor. When temperature increases, more electron-hole pairs are thermally generated.\n\n- Step 2: This means the number density n of free charge carriers increases. From I = nAve, for the same voltage, a larger n means more current can flow. Since R = V/I, more current at the same voltage means lower resistance.\n\n+ In exams, the key phrase is: \"more free electrons are released, so n increases, therefore resistance decreases.\"\n\n**Takeaway:** Higher temperature → more charge carriers (higher n) → lower resistance.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Explain why an LDR (light-dependent resistor) has lower resistance in bright light than in darkness, using the number density concept. (2 steps)", "answer": "- Step 1: An LDR is made of a semiconductor material (typically cadmium sulphide). In darkness, very few electrons have enough energy to jump to the conduction band — the number density n of free electrons is low.\n\n- Step 2: When light shines on the LDR, photons transfer energy to electrons, freeing more of them into the conduction band. This increases n significantly. With more charge carriers (higher n), current increases for the same voltage, so resistance decreases.\n\n+ Exam answer: \"Light releases more free electrons, so n increases, therefore resistance decreases.\"\n\n**Takeaway:** Bright light → more photoelectrons (higher n) → lower resistance. In darkness, few carriers → high resistance.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A student says that in the formula I = nAve, n is the number of free electrons per metre of wire. Explain what's wrong with this and state the correct interpretation. (2 steps)", "answer": "- Step 1: The student's statement is incorrect. n is not per metre — it's per cubic metre (volume density), not per unit length.\n\n- Step 2: n represents the number of free charge carriers per unit volume of the conductor. It has units m⁻³. In copper, n ≈ 8.5 × 10²⁸ m⁻³ — that's roughly one free electron per copper atom.\n\n+ Common error: confusing n (per m³) with linear charge density (per m). The correct unit is carriers per cubic metre.\n\n**Takeaway:** n is number density per unit volume (m⁻³), not per unit length. Always use volume when calculating with I = nAve.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Two wires of the same material and same length but different cross-sectional areas carry the same current. Which wire has higher drift velocity, and why? (2 steps)", "answer": "- Step 1: From I = nAve, for the same current I, if A is larger, then v must be smaller (assuming same n and same charge e).\n\n- Step 2: The wire with the smaller cross-sectional area has higher drift velocity because there are fewer paths for charges to flow through. To carry the same current with less area, the charges must move faster on average.\n\n+ Intuition: Think of traffic — a narrow road (small A) needs faster cars to match the flow of a wide highway (large A).\n\n**Takeaway:** Thinner wire → higher drift velocity for the same current. Drift velocity is inversely proportional to cross-sectional area.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In a V-I graph experiment, you plot V on the vertical axis and I on the horizontal axis. The graph gives a straight line with equation V = 3.2 - 0.8I. What are the EMF and internal resistance of the cell? (2 steps)", "answer": "- Step 1: Compare with V = ε - Ir, which is in the form y = c + mx (or y = mx + c).\n\n+ V = 3.2 - 0.8I can be written as V = (-0.8)I + 3.2\n\n- Step 2: The constant term (y-intercept) = ε = 3.2 V\n+ The coefficient of I is the negative of internal resistance: -r = -0.8, so r = 0.8 Ω\n\n**Takeaway:** EMF = 3.2 V, internal resistance = 0.8 Ω. The gradient is -r, so r = -gradient.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A battery has internal resistance r. When connected to a resistor R, the power dissipated in R is P. What happens to the power dissipated in R if you (a) double R, or (b) halve R? Explain using the concept of current. (3 steps)", "answer": "- Step 1: Power in the external resistor: P = I²R = V²/R. Using I = ε/(R+r):\n\n+ P = [ε/(R+r)]² × R\n\n- Step 2: (a) Doubling R doesn't double P because current decreases. More precisely, P = ε²R/(R+r)² — the relationship is not linear. When R is much larger than r, doubling R roughly halves the current, and P ≈ I²R changes in a complex way. For maximum power transfer, R = r — not when R is maximized.\n\n- Step 3: (b) Halving R similarly doesn't halve P. In fact, as R approaches zero, current approaches ε/r, but P = I²R also approaches zero because R is so small. Maximum power transfer occurs when R = r (the \"matching\" condition), not when R is minimized or maximized.\n\n**Takeaway:** Power doesn't scale linearly with R. Maximum power in the load occurs when R = r (the internal resistance matches the load).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A circuit has a cell with EMF 6.0V and internal resistance 2.0Ω. If the terminal voltage is measured to be 5.0V, what is the current flowing in the circuit? (2 steps)", "answer": "- Step 1: Use V = ε - Ir, rearranged: Ir = ε - V\n\n- Step 2: I = (ε - V)/r = (6.0 - 5.0)/2.0 = 1.0/2.0 = 0.50 A\n\n**Takeaway:** Current = 0.50 A. The \"lost volts\" is ε - V = 1.0 V, and with r = 2.0 Ω, I = 1.0/2.0 = 0.5 A.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Explain why connecting batteries in series adds their EMFs, while connecting identical batteries in parallel increases the total current capability but doesn't change the EMF. (2 steps)", "answer": "- Step 1: In series, the charges pass through each cell in turn. Each cell supplies its ε joules per coulomb, so the total energy supplied per coulomb (the combined EMF) is the sum: ε_total = ε₁ + ε₂ + ...\n\n+ Since V = ε - Ir, adding cells adds the \"push\" per coulomb.\n\n- Step 2: In parallel (same EMF cells), each cell supplies the same ε, but they share the load current. The combined source has the same EMF as one cell, but lower total internal resistance (resistors in parallel). This allows more current without overheating any single cell.\n\n+ Think of it as multiple people pushing the same load — the push per person (ε) is the same, but more people share the strain.\n\n**Takeaway:** Series: EMFs add. Parallel: same EMF, lower effective internal resistance → higher current capability.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A student plots I on the vertical axis and V on the horizontal axis instead of the standard V-I graph. How would they extract ε and r from this graph? What would the gradient and intercept represent? (3 steps)", "answer": "- Step 1: If plotting I (y) against V (x), the relationship is I = (ε/r) - (V/r), which can be written as I = -(1/r)V + (ε/r).\n\n- Step 2: Compare to y = mx + c:\n+ Gradient = -1/r, so r = -1/(gradient)\n+ y-intercept (at V = 0) = ε/r, so ε = (y-intercept) × r\n\n- Step 3: This is mathematically equivalent but less intuitive. The standard V-I graph (V on y-axis, I on x-axis) is preferred because gradient directly gives -r and intercept gives ε directly.\n\n**Takeaway:** Same information, but harder to read. Always use V on vertical axis, I on horizontal axis: gradient = -r, intercept = ε.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In the circuit for Core Practical 8, a voltmeter is connected across the cell terminals and an ammeter in series. Why can the voltmeter be connected either across the cell or across the external resistor and still read the same value? (2 steps)", "answer": "- Step 1: In a simple series circuit with only one external resistor R, the voltage drop across the resistor equals the terminal voltage of the cell. There's no other component to create a different potential difference.\n\n- Step 2: This is because in a single-loop circuit, all components are in series, so the sum of voltage drops equals the EMF. The voltmeter across R measures IR; the voltmeter across the cell terminals also measures IR (since V_terminal = V_across_R). They're measuring the same point-to-point potential difference.\n\n+ Note: In more complex circuits with multiple branches, this equivalence doesn't hold.\n\n**Takeaway:** With a single load resistor, the voltage across the cell terminals equals the voltage across the resistor.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A battery is labeled \"9V\" but when you measure with a high-resistance voltmeter, you get 9.5V. Explain why the labeled value might differ from the measured EMF. (2 steps)", "answer": "- Step 1: The labeled \"9V\" is the nominal EMF — the design value under standard conditions. The actual EMF depends on the cell chemistry, age, temperature, and state of charge.\n\n- Step 2: A fresh alkaline cell might have an EMF slightly above its nominal value (like 9.5V for a \"9V\" battery). As the battery discharges, its EMF gradually decreases. The labeled value is a typical working voltage, not a precise measurement.\n\n+ Additionally, different chemistries have different standard EMFs (carbon-zinc: ~1.5V, alkaline: ~1.5V, lithium: ~3.0V, etc.).\n\n**Takeaway:** The labeled voltage is nominal/average. Actual EMF depends on chemistry, age, temperature, and load.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Explain what is meant by \"lost volts\" in a circuit with internal resistance. Why is this terminology appropriate? (2 steps)", "answer": "- Step 1: Lost volts = Ir, the voltage drop across the internal resistance. It's the energy per coulomb that doesn't reach the external circuit — it's \"lost\" as heat inside the cell.\n\n- Step 2: The term is appropriate because this voltage doesn't do useful work in the external circuit. It's dissipated as thermal energy in the cell's internal resistance. The charges lose energy (have their voltage reduced) as they pass through the cell.\n\n+ Alternative terminology: \"internal voltage drop\" — but \"lost volts\" emphasizes that this energy is not available to the load.\n\n**Takeaway:** Lost volts = Ir, the energy per coulomb dissipated inside the source, unavailable to the external circuit.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A wire carries current I. If you halve both the cross-sectional area and the drift velocity while keeping the number density n constant, what happens to the current? Explain using I = nAve. (2 steps)", "answer": "- Step 1: Original current: I = n × A × v × e\n\n- Step 2: New area = A/2, new drift velocity = v/2, so new current:\n+ I_new = n × (A/2) × (v/2) × e = nAv e × (1/4) = I/4\n\n+ The current becomes one-quarter of the original value.\n\n**Takeaway:** Current is proportional to both area and drift velocity. Halving both reduces current by a factor of 4.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In a V-I graph for a cell, the line doesn't pass through the origin. Why is this? Shouldn't zero current give zero voltage? (2 steps)", "answer": "- Step 1: The graph doesn't pass through the origin because the y-axis represents terminal voltage V, not the internal \"lost\" voltage. At I = 0, the terminal voltage equals the EMF (the full \"push\" from the cell).\n\n- Step 2: The x-axis (current) is zero at the y-intercept because no charges are flowing, so there's no energy loss inside the cell. The terminal voltage is at maximum — it equals ε. The origin would represent both V = 0 and I = 0 simultaneously, which is physically impossible (if V = 0, there'd be no \"push\" to cause current, but if I = 0, we'd be at open circuit with V = ε).\n\n+ Actually, (0,0) would represent a cell with ε = 0 — a dead battery.\n\n**Takeaway:** At I = 0, V = ε (maximum), not zero. The graph crosses the V-axis at ε, not at the origin.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What are the key practical sources of error in Core Practical 8, and how do they affect the results? (3 steps)", "answer": "- Step 1: Connecting wires have resistance — even small wire resistance adds to the external circuit, making R larger than intended. This slightly affects the gradient.\n\n- Step 2: The ammeter has resistance — adding it in series slightly increases total resistance. Similarly, the voltmeter draws a small current (though high resistance minimizes this), slightly reducing the current through the main circuit.\n\n- Step 3: Contact resistance at connections can vary, introducing inconsistency. The internal resistance may not be constant (especially at high currents). Limited number of data points and human reaction time in reading meters also contribute.\n\n+ To minimize: use thick connecting wires, choose meters with low/internal resistance appropriate to the range, take multiple readings, use a large current range.\n\n**Takeaway:** Systematic errors (wire resistance, meter resistance) shift the intercept/gradient slightly. Random errors (reading timing, contact variation) cause scatter.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A battery is short-circuited (terminals connected with a wire of negligible resistance). What is the current flowing? What does this imply about measuring internal resistance by short-circuiting a real battery? (2 steps)", "answer": "- Step 1: With R = 0 (short circuit), the total resistance is just r. Current I = ε/r. This can be very large because r is typically small (fractions of an ohm for many batteries).\n\n- Step 2: For a 12V car battery with r ≈ 0.01Ω, short-circuit current would be 1200A — enough to melt wires and cause fires. For this reason, you should NEVER short-circuit a real battery to measure internal resistance. Instead, use the V-I graph method with modest currents.\n\n**Takeaway:** Short-circuit current = ε/r, which is dangerously large for low internal resistance batteries. Never measure r this way.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "When might the V-I graph for a cell be curved rather than straight at low currents? (2 steps)", "answer": "- Step 1: At very low currents, the relationship can still be non-linear if the cell is in a transient state — for example, if it's a rechargeable battery that was just charged or discharged, or if polarization effects at the electrodes haven't stabilized.\n\n- Step 2: Temperature changes during the experiment can also cause non-linearity: as current flows, the cell warms, changing r. If measurements are taken too quickly before equilibrium, the graph can curve.\n\n+ The standard assumption is that r is constant, which is only approximately true. At low currents, polarization effects can also cause deviation from straight-line behavior.\n\n**Takeaway:** Even at low currents, non-ideal cell behavior (temperature, polarization, chemical equilibrium) can cause slight curvature. Use the linear region for best results.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Explain why the current in a simple circuit is the same everywhere in the series loop, but the voltage is shared across different components. (2 steps)", "answer": "- Step 1: In a series circuit, charge carriers form a continuous chain — the same electrons flow through each component in sequence. Since charge is conserved (electrons don't disappear or appear), the rate of flow (current) must be the same at every point in the loop.\n\n- Step 2: Voltage (potential difference) represents energy per unit charge. As charges move around the circuit, they lose different amounts of energy at different components — some resistor loses more, the internal resistance loses some, etc. The total drop around the loop equals the EMF, but it's distributed (shared) among components.\n\n+ Think of water in a closed pipe system: the flow rate is same everywhere, but pressure drops across different sections of pipe.\n\n**Takeaway:** Current is the same (conserved) in series; voltage is shared (sums to EMF) across series components.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A student measures the voltage across a battery with no load as 8.1V, then connects a 100Ω resistor and measures 7.9V. Estimate the internal resistance of the battery. (3 steps)", "answer": "- Step 1: With no load, current I = 0, so V = ε = 8.1V (the EMF)\n\n- Step 2: With the 100Ω load, current I = V/R = 7.9V / 100Ω = 0.079 A\n\n- Step 3: Lost volts = ε - V = 8.1 - 7.9 = 0.2 V\n+ r = (lost volts)/I = 0.2V / 0.079A ≈ 2.5 Ω\n\n**Takeaway:** Internal resistance ≈ 2.5 Ω. The small voltage drop (0.2V) at this current gives r via r = ΔV/I.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why can't you use Ohm's law (V = IR) to find the internal resistance of a battery by measuring voltage under two different load conditions? (2 steps)", "answer": "- Step 1: You CAN find internal resistance this way — it's exactly what the V-I graph method does! You measure terminal voltage at two different currents, then solve two equations: V₁ = ε - Ir₁ and V₂ = ε - Ir₂.\n\n- Step 2: The key is you need TWO measurements at different currents AND you need to know or find ε. The simplest approach: measure V at open circuit (I = 0) to get ε, then measure V at some current I, then r = (ε - V)/I.\n\n+ Alternatively, use two load measurements and eliminate ε: V₁ - V₂ = r(I₂ - I₁), so r = (V₁ - V₂)/(I₂ - I₁).\n\n**Takeaway:** You CAN find r this way — you need measurements at different currents, and knowing ε (from open-circuit) makes it simpler.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the formula P = I²R for power dissipated in a resistor, what does each quantity represent, and what are the units? (2 steps)", "answer": "- Step 1: P = I²R is the power (rate of energy transfer) dissipated as heat in a resistor.\n+ P = power in watts (W = J/s)\n+ I = current in amperes (A)\n+ R = resistance in ohms (Ω)\n\n- Step 2: Alternative forms: P = V²/R = VI (using V = IR). All three give the same result.\n\n+ The I²R form is most useful when current is constant (e.g., in series circuits). The V²/R form is useful when voltage is constant (e.g., in parallel circuits).\n\n**Takeaway:** Power in a resistor can be calculated as P = I²R, P = V²/R, or P = VI, depending on what quantities are known.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A copper wire and an aluminum wire of the same length and same diameter carry the same current. Which has higher drift velocity, and why? (2 steps)", "answer": "- Step 1: Different materials have different number densities n of free electrons. Copper has approximately n ≈ 8.5 × 10²⁸ m⁻³ (one free electron per atom). Aluminum has approximately n ≈ 6.0 × 10²⁸ m⁻³ (three free electrons per atom, but different atomic spacing).\n\n- Step 2: From I = nAve, for the same I and A, the material with LOWER n will have HIGHER drift velocity v. Aluminum has a slightly lower n than copper (accounting for atomic differences), so aluminum would have slightly higher drift velocity for the same current.\n\n+ Actually, since aluminum has three valence electrons vs copper's one, and similar lattice spacing, the effective n in aluminum can be higher. The key point is: different n → different v for same I and A.\n\n**Takeaway:** Drift velocity depends on number density. Same I, same A: lower n → higher v.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "If you triple the length of a wire while keeping its cross-sectional area and material the same, what happens to its resistance? What happens to the drift velocity if you connect it to the same voltage source? (3 steps)", "answer": "- Step 1: Resistance R = ρL/A. Tripling the length L triples the resistance (R ∝ L), assuming resistivity ρ and area A stay constant.\n\n- Step 2: With the same voltage source V, current I = V/R = V/(3R_original) = I_original/3. The current drops to one-third.\n\n- Step 3: Drift velocity v = I/(nAe). With I reduced to one-third (and same A, n, e), v is also reduced to one-third of its original value.\n\n**Takeaway:** Longer wire → higher R → lower I → lower drift velocity for the same applied voltage.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "What is the purpose of the variable resistor in Core Practical 8? Why not just use fixed resistors? (2 steps)", "answer": "- Step 1: The variable resistor (rheostat) allows you to take many readings of current and voltage quickly and continuously. You can smoothly vary the current from near-zero to a maximum, obtaining a wide range of data points.\n\n- Step 2: With fixed resistors, you'd need many different resistor values to get enough data points. The variable resistor is more efficient and allows you to easily find the full range of currents for a good V-I graph.\n\n+ Additionally, you can fine-tune to get \"nice\" current values (e.g., exactly 0.10A, 0.20A) for easier reading.\n\n**Takeaway:** Variable resistor enables many data points efficiently, covering a wide current range for an accurate V-I graph.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a V-I graph, how do you determine whether to draw a line of best fit or connect the dots directly? Which is more appropriate for Core Practical 8? (2 steps)", "answer": "- Step 1: \"Connect the dots\" (joining consecutive points) is only appropriate when you expect the relationship to be exactly linear with no scatter, and when there are no measurement errors. This is rare in real experiments.\n\n- Step 2: For Core Practical 8, you should draw a line of best fit. This accounts for experimental uncertainties and gives the most accurate estimate of the true linear relationship. The line should be drawn to minimize the distance of points from the line overall, ignoring outliers.\n\n+ For exam questions with given data, you typically draw a best-fit straight line through the points.\n\n**Takeaway:** Always draw a line of best fit for experimental data to account for measurement uncertainties and find the true relationship.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A circuit contains a 6V battery with internal resistance 1Ω and two resistors: R1 = 2Ω and R2 = 3Ω connected in series. Find (a) the total resistance, (b) the current, (c) the terminal voltage, and (d) the voltage across each resistor. (4 steps)", "answer": "- Step 1: Total resistance: R_total = r + R1 + R2 = 1 + 2 + 3 = 6 Ω\n\n- Step 2: Current: I = ε / R_total = 6V / 6Ω = 1.0 A\n\n- Step 3: Terminal voltage: V = ε - Ir = 6V - (1A × 1Ω) = 5 V\n+ Or: V = IR_external = 1A × (2+3)Ω = 5 V ✓\n\n- Step 4: Voltage across each resistor:\n+ V_R1 = IR1 = 1A × 2Ω = 2 V\n+ V_R2 = IR2 = 1A × 3Ω = 3 V\n+ Check: V_R1 + V_R2 = 2 + 3 = 5 V = terminal voltage ✓\n\n**Takeaway:** Total R = 6Ω, current = 1A, terminal V = 5V, V across R1 = 2V, V across R2 = 3V.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Explain why the internal resistance of a battery is sometimes modeled as being \"in series\" with the EMF, rather than being a separate property. (2 steps)", "answer": "- Step 1: The internal resistance r is physically inside the battery, in the path that charges must travel to leave the terminal. When current flows, charges must pass through this internal material, losing energy (voltage drop) just as they would passing through any other resistor.\n\n- Step 2: Mathematically, this behaves exactly like a series circuit: ε (the \"push\") is at the \"start,\" then r, then the external circuit. The series model captures the voltage drop Ir that occurs before charges reach the terminal. This is why the equation is ε = V + Ir — it's exactly like having r in series with the external load.\n\n+ The model works perfectly: when current flows, some EMF is \"used up\" across r, leaving less for the terminals.\n\n**Takeaway:** Internal resistance acts as a series resistor because charges must pass through it to get to the terminals, losing voltage Ir in the process.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A student measures the current from a battery as 0.5A when connected to a 10Ω resistor, and 0.25A when connected to a 20Ω resistor. Find the EMF and internal resistance of the battery. (3 steps)", "answer": "- Step 1: Use the two measurements:\n+ Measurement 1: I₁ = 0.5A, R₁ = 10Ω → V₁ = I₁R₁ = 0.5 × 10 = 5 V\n+ Measurement 2: I₂ = 0.25A, R₂ = 20Ω → V₂ = I₂R₂ = 0.25 × 20 = 5 V\n\n- Step 2: Use V = ε - Ir for each:\n+ For measurement 1: 5 = ε - 0.5r ...(1)\n+ For measurement 2: 5 = ε - 0.25r ...(2)\n\n+ Subtract: 0 = -0.5r + 0.25r = -0.25r → r = 0\n\n- Step 3: If r = 0, then from either equation: 5 = ε → ε = 5 V\n+ The battery appears to have zero internal resistance — it's an \"ideal\" battery or the internal resistance is negligible compared to the external resistors used.\n\n**Takeaway:** EMF = 5V, internal resistance ≈ 0Ω (negligible for these load values).", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In a potential divider circuit, the output voltage is taken across one of two resistors in series. Explain why the output voltage changes when the resistance of one component changes (e.g., thermistor or LDR). (3 steps)", "answer": "- Step 1: In a potential divider, the input voltage is shared between the two resistors according to their ratio: V_out = V_in × (R₂ / (R₁ + R₂))\n\n- Step 2: When one resistance changes (like a thermistor decreasing with temperature, or LDR decreasing with light), the ratio changes, so V_out changes.\n\n+ For example, if R_thermistor decreases: the fraction R/(R+R_fixed) decreases, so V_out decreases.\n\n- Step 3: This is because voltage is shared in series: lower resistance takes lower voltage drop (V = IR). If the thermistor resistance drops, it \"uses up\" less voltage, leaving more for the fixed resistor, and vice versa.\n\n+ This is the principle behind using thermistors/LDRs as sensors — they translate temperature/light into voltage.\n\n**Takeaway:** In a potential divider, output voltage depends on resistance ratio. Changing one resistance changes how voltage is shared.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "What is the difference between the EMF of a battery and the terminal potential difference? Under what condition are they equal? (2 steps)", "answer": "- Step 1: EMF (ε) is the energy per unit charge supplied BY the source — the \"push\" the battery gives to charges. Terminal p.d. (V) is the energy per unit charge delivered TO the external circuit.\n\n- Step 2: They are equal ONLY when no current flows (open circuit, I = 0). In this case, there are no \"lost volts\" (Ir = 0), so V = ε - I(0) = ε. As soon as current flows, V < ε because some energy is lost across internal resistance.\n\n**Takeaway:** V = ε only at open circuit (I = 0). Whenever current flows, V < ε.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A battery has EMF ε and internal resistance r. Derive the condition for maximum power transfer to the external load resistor R. (3 steps)", "answer": "- Step 1: Power in load: P = I²R, where I = ε/(R+r)\n\n+ So P = [ε/(R+r)]² × R = ε²R/(R+r)²\n\n- Step 2: To find maximum P, differentiate with respect to R and set dP/dR = 0, OR use the insight that maximum occurs when R = r.\n\n+ Proof: Let R = r + δ, then P = ε²(r+δ)/(2r+δ)². This is maximum when δ = 0, i.e., R = r.\n\n- Step 3: So maximum power transfer occurs when the external load resistance equals the internal resistance: R = r. In this condition, half the power is dissipated in the battery's internal resistance, half in the load.\n\n**Takeaway:** Maximum power to load when R = r. This is called \"impedance matching\" in AC circuits.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "A battery is connected to a circuit. If the internal resistance is 2Ω and the EMF is 12V, what is the maximum possible current that can be drawn from this battery? (2 steps)", "answer": "- Step 1: Maximum current occurs when external resistance R = 0 (short circuit).\n\n- Step 2: I_max = ε/r = 12V / 2Ω = 6 A\n\n+ This is the short-circuit current. In practice, attempting to draw this current would likely damage the battery or wires.\n\n**Takeaway:** Maximum current = ε/r = 6A (short-circuit condition). Real circuits should have R > 0.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the context of ESAT (Cambridge admissions test) preparation, what guidance did Alex give about prioritizing topics? (2 steps)", "answer": "- Step 1: Alex agreed to prioritize topics based on the ESAT scope — only specific sections of some chapters are tested, not entire chapters.\n\n- Step 2: Phuc highlighted examples: radioactive decay has only certain sections in scope, and atomic structure (Year 2, \"chapter 7\") has only the first section in scope. Alex was asked to read Phuc's study plan and reorder lessons accordingly to focus on ESAT-relevant sections first.\n\n+ The action was for Alex to review Phuc's ESAT study plan sheet and adjust teaching order.\n\n**Takeaway:** For ESAT, focus on specific sections within chapters rather than all material. Check the official scope.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A wire has resistance R. If you stretch it to double its length while keeping its volume constant, what happens to its resistance? (3 steps)", "answer": "- Step 1: Volume V = A × L is constant. If L doubles, then A must halve (to keep A × L constant).\n\n- Step 2: Resistance R = ρL/A. With new length 2L and new area A/2:\n+ R_new = ρ × (2L) / (A/2) = ρ × 2L × 2/A = 4ρL/A = 4R\n\n+ The resistance becomes four times the original.\n\n- Step 3: Intuition: stretching makes the wire longer (R ∝ L) but also thinner (R ∝ 1/A), and since volume constancy means halving A when doubling L, the combined effect is R × 4.\n\n**Takeaway:** Doubling length (with constant volume) → resistance increases by factor of 4.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In a V-I graph for a cell, you draw a best-fit line. What does the y-intercept represent, and what assumption are you making when you use it to find ε? (2 steps)", "answer": "- Step 1: The y-intercept (extrapolating the line to I = 0) represents the EMF ε — the terminal voltage when no current flows.\n\n- Step 2: This assumes that internal resistance r remains constant over the current range used, and that the relationship V = ε - Ir holds perfectly (i.e., no other non-ideal effects). The extrapolation assumes the linear relationship continues to zero current.\n\n+ In reality, if r changes slightly at very low currents, this could introduce small error.\n\n**Takeaway:** y-intercept = ε, assuming constant r and linear V-I relationship.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A student says that the internal resistance of a battery is always constant. Explain why this is only approximately true and when it might fail. (2 steps)", "answer": "- Step 1: For small currents and short time periods, internal resistance is approximately constant — that's why the V-I graph method works well.\n\n- Step 2: Internal resistance can change due to:\n+ Temperature: as the battery works, it heats up, changing r\n+ Chemical changes: as battery discharges, its chemistry changes, altering r\n+ Current magnitude: at high currents, r often increases (more heating, electrode polarization)\n+ Age: older batteries have different internal resistance\n\n+ For most A-level experiments with low currents, assuming constant r is acceptable.\n\n**Takeaway:** r is approximately constant for low currents and short durations, but varies with temperature, discharge state, current magnitude, and age.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "Explain why connecting a high-resistance voltmeter across a battery gives a reading closer to the true EMF than connecting a low-resistance voltmeter. (2 steps)", "answer": "- Step 1: A voltmeter is connected in parallel to the component. Any voltmeter draws some current — the higher its resistance, the less current it draws.\n\n- Step 2: A low-resistance voltmeter draws significant current from the circuit, effectively putting a parallel resistor across the battery terminals. This changes the external load and causes a voltage drop due to internal resistance, making the reading lower than the true EMF. A high-resistance voltmeter draws negligible current, so it doesn't disturb the circuit significantly.\n\n+ For accurate EMF measurement, use a voltmeter with resistance much larger than the internal resistance (ideally > 1 MΩ).\n\n**Takeaway:** High-resistance voltmeter → minimal current drawn → minimal circuit disturbance → accurate EMF reading.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does the symbol $$\\varepsilon$$ represent in a cell, and what is the precise directional meaning (cause vs effect) of this quantity?", "answer": "$$\\varepsilon$$ is the **electromotive force (e.m.f.)** of the source, defined as the energy supplied to each unit charge by the source as it converts other forms of energy (chemical, mechanical, etc.) into electrical energy. The key directional nuance is that e.m.f. is a **cause**: it is energy *given to* the charges by the source, not energy *taken from* them. The unit is the volt ($$\\text{V} = \\text{J C}^{-1}$$). Despite the historical name, it is not a force — it has units of energy per charge, not newtons.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "What is the difference between e.m.f. $$\\varepsilon$$ and terminal potential difference $$V$$, given that both are measured in volts? (3 steps)", "answer": "- Step 1: Both have units of $$\\text{J C}^{-1}$$ (volts), so dimensionally they are identical — the difference is in *role*, not units.\n- Step 2: $$\\varepsilon$$ is the
