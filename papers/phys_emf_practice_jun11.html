energy per coulomb **supplied** by the source (the \"tank\" the source fills the charge with). $$V$$ is the energy per coulomb **delivered** by the charge to the external circuit (what the charge actually arrives with at the load).\n- Step 3: The relationship is $$\\varepsilon = V + Ir$$, so $$V < \\varepsilon$$ whenever current flows, because some energy ($$Ir$$ per coulomb) is spent inside the cell before reaching the terminals.\n\nCause vs effect: $$\\varepsilon$$ is what's given; $$V$$ is what arrives.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does a real cell have internal resistance, and what physically does the symbol $$r$$ represent?", "answer": "Internal resistance $$r$$ represents the resistance inherent to the materials *inside* the cell — the electrolyte, the electrodes, and the contacts. Charges moving through the cell to gain energy must also push through these imperfect conductors, and some of the energy the source gives them is immediately dissipated as heat inside the cell itself. It is modelled as a resistor of resistance $$r$$ in series with an ideal source of e.m.f. $$\\varepsilon$$, even though physically there is no separate component — it's a property of the cell as a whole.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Starting from energy conservation for one coulomb travelling around a single-loop circuit (cell $$\\varepsilon$$, internal $$r$$, external $$R$$), derive the cell equation $$\\varepsilon = V + Ir$$. (4 steps)", "answer": "- Step 1: For one coulomb going round the loop, energy supplied by the source must equal energy used everywhere else: $$\\varepsilon = V_1 + V_2$$, where $$V_1$$ is the p.d. across $$R$$ and $$V_2$$ is the p.d. across $$r$$.\n- Step 2: Use Ohm's law on each resistor. Since it's a series loop, the same current $$I$$ flows everywhere: $$V_1 = IR$$ and $$V_2 = Ir$$.\n- Step 3: The terminal p.d. $$V$$ is what a voltmeter across the terminals (equivalently across $$R$$, since $$R$$ is the only external component) reads, so $$V = V_1 = IR$$.\n- Step 4: Substitute $$V_2 = Ir$$ into the energy equation: $$\\varepsilon = V + Ir$$.\n\nThe whole derivation is just \"energy in = energy out, per coulomb.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What are the four equivalent algebraic forms of the cell equation, and what is each form most useful for? (4 steps)", "answer": "- Step 1: $$\\varepsilon = V + Ir$$ — the energy-conservation statement; use when you know terminal p.d. and want e.m.f. (or vice versa).\n- Step 2: $$V = \\varepsilon - Ir$$ — rearranged to make $$V$$ the subject; this is the form that maps onto $$y = mx + c$$ for the $$V$$–$$I$$ graph.\n- Step 3: $$\\varepsilon = I(R + r) = IR + Ir$$ — treats $$r$$ as just another series resistor; use when you have $$R$$ and need to relate it to the current.\n- Step 4: $$I = \\dfrac{\\varepsilon}{R + r}$$ — solved for the current; use when you know e.m.f., $$r$$ and $$R$$ and want the current that flows.\n\nAll four are the same physics — just rearranged for different unknowns.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What does the phrase \"lost volts\" mean in cell circuits, and why is it given that name?", "answer": "\"Lost volts\" refers to the quantity $$\\varepsilon - V = Ir$$ — the energy per coulomb that is dissipated inside the cell as the current passes through the internal resistance. It's called \"lost\" because, from the perspective of the external circuit, this energy is unavailable: the charge starts with $$\\varepsilon$$ joules per coulomb at the source but arrives at the external terminals with only $$V = \\varepsilon - Ir$$ joules per coulomb. The \"missing\" $$Ir$$ has been spent on the way out, converted to heat in the cell itself.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "When does the voltmeter across a cell's terminals actually read the full e.m.f. $$\\varepsilon$$, and why?", "answer": "When the current is zero — i.e., when the cell is in an **open circuit** (or connected only to an ideal voltmeter of infinite resistance). The reason is direct from $$V = \\varepsilon - Ir$$: if $$I = 0$$, the \"lost volts\" $$Ir$$ vanishes, so the terminal p.d. equals the full e.m.f. With any real current flowing, $$Ir > 0$$ and the terminals read less than $$\\varepsilon$$.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Qualitatively, how does the terminal p.d. $$V$$ of a cell change as the external load draws more current, and what is the underlying mechanism? (3 steps)", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, the terminal p.d. is the e.m.f. minus the lost volts $$Ir$$.\n- Step 2: As the load resistance $$R$$ decreases, the current $$I = \\varepsilon / (R+r)$$ increases, so the lost volts $$Ir$$ grows.\n- Step 3: Since $$\\varepsilon$$ is fixed, more lost volts means a smaller $$V$$ — the terminal p.d. falls as more current is drawn. This is why a torch dims when you short the battery, or your car headlights flicker when you start the engine (the starter motor draws huge current, dropping the battery's terminal p.d. momentarily).\n\nBigger demand on the cell ⇒ bigger internal loss ⇒ less left for the outside.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "A student plots terminal p.d. $$V$$ on the vertical axis against current $$I$$ on the horizontal axis for a cell. By mapping $$V = \\varepsilon - rI$$ onto $$y = mx + c$$, what do the gradient and $$y$$-intercept of the line represent? (3 steps)", "answer": "- Step 1: Compare term-by-term: $$y = mx + c$$ versus $$V = (-r)I + \\varepsilon$$. So $$y \\leftrightarrow V$$, $$x \\leftrightarrow I$$, $$m \\leftrightarrow -r$$, $$c \\leftrightarrow \\varepsilon$$.\n- Step 2: The $$y$$-intercept (the value of $$V$$ when $$I = 0$$) is therefore $$\\varepsilon$$ — the e.m.f. of the cell. This makes physical sense: at zero current there are no lost volts, so the terminal p.d. equals the e.m.f.\n- Step 3: The gradient is $$-r$$ (negative because $$r > 0$$ but the line slopes downward). To get internal resistance, take the magnitude: $$r = -(\\text{gradient})$$.\n\nOne-liner: intercept = $$\\varepsilon$$, $$-$$gradient = $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why does a $$V$$–$$I$$ graph for a cell slope *downwards* (negative gradient), and what would a positive or zero gradient mean physically? (3 steps)", "answer": "- Step 1: The downward slope comes from $$V = \\varepsilon - rI$$: every extra ampere of current produces an extra $$r$$ volts of lost voltage, so $$V$$ drops by $$r$$ for each unit increase in $$I$$.\n- Step 2: A **zero gradient** would mean $$r = 0$$ (an ideal cell with no internal resistance): terminal p.d. would equal the e.m.f. regardless of current — physically impossible for a real cell but useful as an idealisation.\n- Step 3: A **positive gradient** would mean $$r < 0$$, which is unphysical for a passive cell — it would imply the cell *gains* energy as current flows. Wouldn't happen in CP8.\n\nThe slope is the price you pay per amp.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "In Core Practical 8, why must the internal resistance $$r$$ be kept constant throughout the experiment, and what happens to the $$V$$–$$I$$ data if it isn't? (3 steps)", "answer": "- Step 1: The whole method assumes $$V = \\varepsilon - rI$$ is a straight line with a single fixed gradient $$-r$$. The point of the experiment is to *measure* that one value of $$r$$.\n- Step 2: If $$r$$ changes between data points, then different points correspond to different gradients, so the points won't lie on one straight line — they'll scatter or curve, and any gradient you extract will be physically meaningless.\n- Step 3: The control is therefore: set $$r$$ once (e.g., the PhET \"Battery Resistance\" slider) and only ever change the external load $$R$$ to sweep out different currents. This is why Alex kept warning \"don't touch that slider again.\"\n\nOne control variable rule: vary $$R$$, never $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "In CP8, why is varying the external resistor $$R$$ the correct way to generate different data points on the $$V$$–$$I$$ graph?", "answer": "Because changing $$R$$ changes the current $$I = \\varepsilon/(R+r)$$ flowing in the loop, which in turn changes the terminal p.d. $$V = \\varepsilon - Ir$$. Each setting of $$R$$ gives a single ($$I, V$$) data point. By sweeping $$R$$ across a wide range, you get a spread of currents and terminal voltages that traces out the straight line $$V = \\varepsilon - rI$$. Crucially, varying $$R$$ leaves $$\\varepsilon$$ and $$r$$ (the things you're trying to measure) untouched — they remain the fixed properties of the cell.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why is it sensible to use a wide range of currents (from a low value to a relatively high value) in CP8, rather than clustering all data points near one current?", "answer": "A wider spread of currents gives a longer \"lever arm\" along the horizontal axis when you compute the gradient. Since gradient $$= \\Delta V / \\Delta I$$, any uncertainty in reading $$V$$ becomes a smaller fraction of the change when $$\\Delta I$$ is large. Tightly clustered points are vulnerable to random scatter dominating the apparent slope, giving a poor estimate of $$r$$. Equally, the extrapolation back to $$I = 0$$ for the intercept ($$\\varepsilon$$) is more reliable when the line is well-constrained by points spanning a wide range.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "In the PhET simulation for CP8, why do voltmeters placed (a) across the cell's terminals and (b) across the external resistor $$R$$ read identical values, when only one external resistor is present? (3 steps)", "answer": "- Step 1: Apply Kirchhoff's voltage law around the loop: $$\\varepsilon = V_{\\text{across } r} + V_{\\text{across } R}$$.\n- Step 2: The voltmeter across the cell's terminals reads everything *outside* the internal resistance, which is exactly $$V_{\\text{across } R}$$ when $$R$$ is the only external component.\n- Step 3: So $$V_{\\text{terminals}} = V_R = IR$$. Both voltmeters measure the same thing, just from different vantage points. You can delete one without losing information.\n\nIf you added a second external resistor, this would break — terminal p.d. would then equal the sum of the p.d.s across both external resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Real cells produce a $$V$$–$$I$$ graph that is approximately linear at low currents but may curve at high currents. What's the physical reason?", "answer": "The model $$V = \\varepsilon - rI$$ treats $$r$$ as a constant, but a real cell's internal resistance is not perfectly fixed. At high currents, the cell heats up (internal $$I^2 r$$ dissipation), and the resistance of the electrolyte/electrodes changes with temperature. The cell may also undergo chemical changes (polarization, electrode depletion) at high current draw. Once $$r$$ stops being constant, the linear relationship breaks down and the graph curves. Practical fix: only use the linear (low-current) portion of the graph to extract the gradient and hence $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "A $$V$$–$$I$$ graph for a cell has a $$y$$-intercept of $$6.0$$ V and passes through the point $$(2.0\\text{ A}, 4.0\\text{ V})$$. Find $$\\varepsilon$$ and $$r$$ conceptually. (3 steps)", "answer": "- Step 1: The $$y$$-intercept *is* the e.m.f., so $$\\varepsilon = 6.0$$ V directly — no calculation needed.\n- Step 2: The gradient is $$\\dfrac{\\Delta V}{\\Delta I} = \\dfrac{4.0 - 6.0}{2.0 - 0} = -1.0\\text{ V A}^{-1}$$.\n- Step 3: Internal resistance is the *magnitude* of the gradient (with sign flipped), so $$r = 1.0$$ Ω. Always quote the unit — a bare number scores no mark.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A cell of e.m.f. $$1.5$$ V and internal resistance $$0.30$$ Ω drives a current of $$0.50$$ A. Conceptually, what is its terminal p.d., and how much energy per coulomb is \"wasted\" inside? (3 steps)", "answer": "- Step 1: Lost volts = $$Ir = 0.50 \\times 0.30 = 0.15$$ V — this is the energy per coulomb dissipated inside the cell.\n- Step 2: Terminal p.d. = $$\\varepsilon - Ir = 1.5 - 0.15 = 1.35$$ V — what each coulomb actually delivers to the external circuit.\n- Step 3: Sanity check: $$V < \\varepsilon$$ ✓, and only 10% of the e.m.f. is wasted internally (small $$r$$ relative to load — efficient).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A $$9.0$$ V battery with internal resistance $$1.0$$ Ω is connected to an $$8.0$$ Ω external resistor. Without heavy arithmetic, reason out the current and the lost volts. (3 steps)", "answer": "- Step 1: Total resistance in the loop is $$R + r = 8 + 1 = 9$$ Ω. The cell's e.m.f. is shared across this total: $$I = \\varepsilon/(R+r) = 9/9 = 1.0$$ A.\n- Step 2: Lost volts inside the cell = $$Ir = 1.0 \\times 1.0 = 1.0$$ V.\n- Step 3: Terminal p.d. = $$\\varepsilon - Ir = 9 - 1 = 8.0$$ V — exactly the p.d. across the $$8$$ Ω external resistor, as required by Kirchhoff. The fraction wasted internally is $$r/(R+r) = 1/9 \\approx 11\\%$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is it incorrect to define e.m.f. as \"the voltage of a battery\" or \"a force from a battery\", and what's the precise definition that earns marks?", "answer": "Calling e.m.f. \"the voltage\" is vague — terminal p.d. is also a voltage, but is generally different from e.m.f. Calling it \"a force\" is dimensionally wrong: it's not a push or pull, despite the historical name \"electromotive force.\" The mark-scoring definition is: **the energy converted from other forms (chemical, mechanical, etc.) into electrical energy per unit charge passing through the source**, with units $$\\text{J C}^{-1} = \\text{V}$$. The key phrases are \"energy per unit charge\" and \"converted\" (i.e., supplied by the source).", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Common confusion: in a series circuit, what is the same at every component, and in a parallel arrangement, what is the same across every branch?", "answer": "- In **series**, the *current* $$I$$ is the same through every component (charge can't pile up), while the *voltage* divides between them and adds to the total e.m.f.\n- In **parallel**, the *voltage* across every branch is the same (each branch connects the same two nodes), while the *current* splits between branches and adds to the total.\n\nMisconception: students sometimes say \"the resistances are reciprocal in parallel\" and confuse this with the voltage rule. The reciprocal formula $$1/R_{\\text{tot}} = \\sum 1/R_i$$ relates resistances, not voltages. Voltage is *common* across parallel branches.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why might a student incorrectly write a negative number for internal resistance after reading a $$V$$–$$I$$ graph, and how do you avoid it?", "answer": "The mistake comes from writing $$r = \\text{gradient}$$ directly. Since the gradient of a $$V$$–$$I$$ graph is $$-r$$ (the line slopes down), reading off a slope of, say, $$-7.1$$ and reporting \"$$r = -7.1$$ Ω\" is wrong: internal resistance is a physical resistance, always positive. The correct move is $$r = -(\\text{gradient})$$, taking the magnitude. A quick sanity check: $$r$$ should always be a positive number of ohms; if you get a negative value, you've forgotten the sign flip from $$y = -rI + \\varepsilon$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "If a student accidentally plots $$I$$ on the vertical axis and $$V$$ on the horizontal axis instead of the standard convention, how does the interpretation of the gradient change? (3 steps)", "answer": "- Step 1: With $$V$$ vertical and $$I$$ horizontal: $$V = -rI + \\varepsilon$$, so gradient = $$-r$$.\n- Step 2: If you swap axes, you're now plotting $$I$$ vs $$V$$, which is $$I = (\\varepsilon - V)/r = -V/r + \\varepsilon/r$$. Gradient is now $$-1/r$$.\n- Step 3: So the gradient gives you the *reciprocal* of $$-r$$, and the intercept becomes $$\\varepsilon/r$$ (not $$\\varepsilon$$ directly). It's easy to muddle these. Stick to the convention: $$V$$ vertical, $$I$$ horizontal.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Starting from $$I = Q/t$$, derive the formula $$I = nAve$$ for current in terms of charge carriers, and identify each symbol's meaning. (5 steps)", "answer": "- Step 1: Begin with the definition of current: $$I = Q/t$$, where $$Q$$ is the charge passing a cross-section in time $$t$$.\n- Step 2: Count the charge in a section of wire of length $$s$$. The number of carriers in that section is (carriers per unit volume) × (volume) = $$n \\times (A s)$$, where $$n$$ is the number density (m$$^{-3}$$) and $$A$$ is the cross-sectional area (m$$^2$$).\n- Step 3: Each carrier has charge $$e$$, so total charge in the section is $$Q = nAse$$.\n- Step 4: Substitute into the current formula: $$I = Q/t = nAse/t = nA(s/t)e$$.\n- Step 5: Distance over time is velocity — specifically the **drift velocity** $$v = s/t$$, the average speed of carriers. Hence $$I = nAve$$.\n\nEach symbol: $$n$$ = number density (m$$^{-3}$$), $$A$$ = cross-section area (m$$^2$$), $$v$$ = drift velocity (m s$$^{-1}$$), $$e$$ = carrier charge (C).", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Drift velocity in a copper wire is typically very slow (millimetres per second). Given that turning on a light is essentially instant, how can both facts be true? (3 steps)", "answer": "- Step 1: Drift velocity is slow because $$n$$ in copper is enormous ($$\\sim 10^{28}$$ m$$^{-3}$$). From $$I = nAve$$, a modest current $$I$$ in a thin wire requires only a tiny $$v$$ when $$n$$ is huge.\n- Step 2: But the wire is *already full* of free electrons everywhere. When you close the switch, an electric field propagates through the wire at near light speed, pushing on *every* electron simultaneously.\n- Step 3: So even though individual electrons drift slowly, the *signal* (the field) arrives essentially instantly, and electrons at the bulb start moving at the same moment as electrons at the battery. Analogy: a long tube already full of marbles — pushing one in at the back instantly pushes one out at the front, even though each marble barely moves.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "A thin wire and a thick wire (different cross-sectional areas $$A$$) carry the same current $$I$$. Which has the higher drift velocity, and why? (3 steps)", "answer": "- Step 1: From $$I = nAve$$, rearrange: $$v = I/(nAe)$$. With $$n$$ and $$e$$ fixed (same material), $$v \\propto 1/A$$.\n- Step 2: The *thinner* wire (smaller $$A$$) must have a *higher* drift velocity to push the same amount of charge per second through a smaller cross-section.\n- Step 3: Intuition: same number of cars per minute through a narrow road vs a wide road — the narrow-road cars must drive faster. This is why fuses are made of thin wire: they're forced into high-current-density operation, get hot, and melt at a chosen current threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A copper wire and a semiconductor wire have the same cross-section and carry the same current. Which has the higher drift velocity, and why does this matter physically? (3 steps)", "answer": "- Step 1: Copper has $$n \\sim 10^{28}$$ m$$^{-3}$$ (one free electron per atom). A semiconductor has dramatically fewer free carriers, often $$n \\sim 10^{16}$$ m$$^{-3}$$ or lower — many orders of magnitude smaller.\n- Step 2: From $$v = I/(nAe)$$, the semiconductor needs a much higher drift velocity to deliver the same current with so few carriers.\n- Step 3: This is why semiconductors are more resistive: to push few carriers fast you need a strong field, hence a large p.d. for a given current. Conversely, in copper, an enormous reservoir of slow-drifting electrons easily delivers high current.\n\nFewer carriers ⇒ they have to work harder (faster) ⇒ higher resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What is meant by *number density* (or *charge-carrier density*) of a material, and what are its SI units? Why is the volumetric (per m$$^3$$) rather than per-area (per m$$^2$$) interpretation correct?", "answer": "Number density $$n$$ is the number of free charge carriers per unit *volume* of the material, with SI units of **m$$^{-3}$$**. The volumetric interpretation is correct because the carriers fill the bulk of the conductor in three dimensions — not just a surface layer. When you derive $$I = nAve$$, the volume of wire that passes a cross-section per second is $$A \\times v$$ (area times length-per-second), and the carriers in that volume are $$n \\times (Av)$$. The \"per m$$^3$$\" structure is what makes the dimensions of $$nAv$$ work out to (m$$^{-3}$$)(m$$^2$$)(m s$$^{-1}$$) = s$$^{-1}$$, so $$nAve$$ has units of C s$$^{-1}$$ = A. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A thermistor (NTC type) is warmed up. Explain, using $$I = nAve$$, why its resistance decreases. This is a marked exam sentence — what's the full causal chain? (4 steps)", "answer": "- Step 1: A thermistor is a semiconductor. At low temperature, few electrons have enough thermal energy to escape their atoms and become free carriers, so $$n$$ is small.\n- Step 2: As temperature rises, thermal energy releases more electrons into the conduction band — $$n$$ **increases**.\n- Step 3: From $$I = nAve$$, with $$A$$, $$v$$ and $$e$$ approximately unchanged for a given p.d., a larger $$n$$ means more current flows for the same voltage.\n- Step 4: Since $$R = V/I$$, more current at the same voltage means **lower resistance**. So resistance decreases as temperature rises.\n\nThe mark-scoring sentence: \"The resistance of the thermistor decreases because the number density of free electrons $$n$$ increases.\"", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "An LDR (light-dependent resistor) is moved from a dark room into bright sunlight. Explain via $$n$$ what happens to its resistance, and what would happen if it were placed back in the dark. (3 steps)", "answer": "- Step 1: An LDR is a semiconductor where incoming photons release electrons from atoms (photoelectric-style effect within the material). More light ⇒ more photons ⇒ more electrons released ⇒ $$n$$ increases.\n- Step 2: From $$I = nAve$$, higher $$n$$ means more current for the same p.d., so resistance decreases. In bright light, the LDR has low resistance.\n- Step 3: In the dark, no photons release electrons, $$n$$ is small, and resistance is high. So an LDR acts as a \"light sensor\": low $$R$$ in light, high $$R$$ in dark.\n\nThis is why street lights with LDR sensors switch on at dusk: in darkness, the LDR's high resistance triggers the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "In a potential-divider circuit using an LDR in series with a fixed resistor, why does the output voltage across the *fixed* resistor *fall* when the light intensity *increases*? (3 steps)", "answer": "- Step 1: In a potential divider, the e.m.f. is shared between the two components in proportion to their resistances: $$V_{\\text{component}} = \\varepsilon \\cdot R_{\\text{component}}/R_{\\text{total}}$$.\n- Step 2: When light intensity rises, the LDR's resistance falls (more $$n$$). So the LDR takes a *smaller* share of the total voltage, leaving more for the fixed resistor... wait — be careful which output you mean.\n- Step 3: If $$V_{\\text{out}}$$ is across the fixed resistor, $$V_{\\text{out}} = \\varepsilon \\cdot R_{\\text{fixed}}/(R_{\\text{LDR}} + R_{\\text{fixed}})$$. As $$R_{\\text{LDR}}$$ falls, the denominator falls, so $$V_{\\text{out}}$$ *rises*. Conversely, $$V_{\\text{out}}$$ across the *LDR* would fall as $$R_{\\text{LDR}}$$ falls.\n\nThe key skill: identify which component $$V_{\\text{out}}$$ is across, then track how its resistance share changes.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "\"Charlie the clown / fuel tank\" intuition: how does it explain why $$V_{\\text{out}}$$ falls across one component when another component's resistance rises? (3 steps)", "answer": "- Step 1: Imagine each charge carries a fixed \"fuel tank\" of voltage (the e.m.f.) round the loop. Each resistor it passes through consumes some of this fuel, in proportion to the resistor's resistance.\n- Step 2: If one resistor gets bigger, it greedily eats a larger share of the fuel. Since the total amount of fuel is fixed (the e.m.f.), there's less left over for every other component.\n- Step 3: So $$V$$ across the *other* component must fall. This is the entire physics of a potential divider — voltage is a finite resource being shared according to resistance.\n\nThe intuition pump: voltage is the energy budget per coulomb; resistors are stores competing for shares.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A copper wire of cross-section $$1$$ mm$$^2$$ carries a current of $$10$$ A. Conceptually, how many electrons flow past a cross-section per second? (3 steps)", "answer": "- Step 1: Charge flowing in one second: $$Q = I t = 10 \\times 1 = 10$$ C.\n- Step 2: Each electron carries $$e = 1.6 \\times 10^{-19}$$ C.\n- Step 3: Number per second = $$Q/e = 10/(1.6 \\times 10^{-19}) \\approx 6 \\times 10^{19}$$ electrons per second.\n\nRoughly $$10^{20}$$ electrons every second through a square-millimetre cross-section. This is a staggering count, but plausible because $$n \\sim 10^{28}$$ m$$^{-3}$$ in copper — there are loads of carriers available.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "In a copper wire with $$n \\sim 10^{29}$$ m$$^{-3}$$, area $$1$$ mm$$^2$$, carrying $$10$$ A, the drift velocity is roughly... conceptually, what order of magnitude, and why is it so slow? (3 steps)", "answer": "- Step 1: Rearrange $$I = nAve$$: $$v = I/(nAe)$$.\n- Step 2: Plug in orders of magnitude: numerator $$\\sim 10$$; denominator $$\\sim 10^{29} \\times 10^{-6} \\times 10^{-19} \\sim 10^{4}$$. So $$v \\sim 10/10^4 = 10^{-3}$$ m s$$^{-1}$$, i.e., about 1 mm per second.\n- Step 3: This is millimetres per second — astonishingly slow compared to everyday motion. The reason is the huge $$n$$: copper is *packed* with free electrons, so each only needs to drift very slowly to collectively deliver a large current. The shopping-bags analogy: lots of porters carrying bags slowly = lots of bags delivered overall.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "If the current in a copper wire is reduced from $$10$$ A to $$10$$ mA (a factor of 1000), what happens to the drift velocity, and what's the underlying reason? (3 steps)", "answer": "- Step 1: From $$v = I/(nAe)$$, with $$n$$, $$A$$ and $$e$$ unchanged, $$v \\propto I$$.\n- Step 2: So a factor-1000 reduction in current means a factor-1000 reduction in drift velocity.\n- Step 3: If $$v$$ was $$\\sim 1$$ mm s$$^{-1}$$ at 10 A, it becomes $$\\sim 1$$ μm s$$^{-1}$$ at 10 mA. The electrons crawl. To travel just 1 mm at this drift speed would take about $$10^3$$ seconds (≈ 17 minutes). This dramatises how slowly carriers actually move, despite \"electricity\" feeling instantaneous.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does converting from millimetres to metres matter so much when applying $$I = nAve$$, and what's the conversion for areas and volumes?", "answer": "Because $$I = nAve$$ must be evaluated in SI units to give amperes. If $$A$$ is in mm$$^2$$ instead of m$$^2$$, or $$n$$ is in mm$$^{-3}$$ instead of m$$^{-3}$$, the result will be wrong by factors of $$10^6$$ or $$10^9$$. The conversions:\n- 1 mm = $$10^{-3}$$ m, so 1 mm$$^2$$ = $$10^{-6}$$ m$$^2$$ and 1 mm$$^3$$ = $$10^{-9}$$ m$$^3$$.\n- Hence 1 mm$$^{-3}$$ (a density per cubic mm) = $$10^{9}$$ m$$^{-3}$$.\n\nAlways check the units before plugging in. A common exam trap is being given $$n$$ in carriers per mm$$^3$$ and area in mm$$^2$$, then forgetting the conversion and producing an answer wrong by a factor of $$10^{15}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Why does the $$V$$–$$I$$ method (CP8) for finding $$\\varepsilon$$ and $$r$$ work even though you can never *directly* measure the e.m.f. while current flows? (3 steps)", "answer": "- Step 1: Whenever current flows, the voltmeter reads only the terminal p.d. $$V = \\varepsilon - Ir$$, not the e.m.f. itself. So a single measurement can't give you $$\\varepsilon$$.\n- Step 2: But by collecting *many* ($$V, I$$) pairs and fitting a straight line, you can *extrapolate* the line back to $$I = 0$$ — the hypothetical no-current case where the lost volts vanish.\n- Step 3: At $$I = 0$$, $$V = \\varepsilon$$ exactly. The $$y$$-intercept of the best-fit line is the e.m.f., even though you never actually measure with zero current. This is the elegance of CP8: the *graph* tells you what no single measurement can.\n\nThe line \"remembers\" what the cell would do at $$I = 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Why is internal resistance often modelled as a separate \"resistor\" in series with an ideal e.m.f. source, even though physically the cell is a single object? (3 steps)", "answer": "- Step 1: Real cells have e.m.f. (from chemistry) *and* dissipative losses (from material resistance of the electrolyte, electrodes, etc.) happening within the same physical object.\n- Step 2: For circuit analysis, it's mathematically convenient to *separate* these two effects: an ideal e.m.f. source (no losses) in series with a resistor $$r$$ that captures all the loss.\n- Step 3: This works because the two effects add together in exactly the way a series combination would, by Kirchhoff's voltage law. You get the right predictions ($$V = \\varepsilon - Ir$$, lost volts, etc.) by treating them as separate components, even though they coexist in the same physical chunk of cell.\n\nThis is the standard physicist's move: replace a complicated real object with an idealised circuit equivalent that gives the same external behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "What's the difference between \"energy\" and \"power\" in cell-circuit equations, and why might $$E = IVt$$ confuse a student into using it for the cell equation? (3 steps)", "answer": "- Step 1: $$E = IVt$$ (or equivalently $$E = Pt$$ where $$P = IV$$) gives the *total energy* delivered over a time $$t$$. It's a power × time relation, not a circuit law.\n- Step 2: The cell equation $$\\varepsilon = V + Ir$$ relates *voltages* — energy *per coulomb* — and contains no time. It tells you how voltage is shared, not how energy accumulates.\n- Step 3: A student mixing these up might write \"$$\\varepsilon = IVt$$\" or try to substitute energy formulas into the loop equation. The fix: $$V = IR$$ is the right \"circuit\" companion to $$\\varepsilon = V + Ir$$; energy formulas like $$E = IVt$$ come *after* you've found currents and voltages.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "A cell drives current through an open circuit (no external resistor connected). What does a voltmeter across its terminals read, and what is the lost volts? (2 steps)", "answer": "- Step 1: An ideal voltmeter has near-infinite resistance, so essentially no current flows in the loop: $$I \\approx 0$$.\n- Step 2: With $$I = 0$$: lost volts $$= Ir = 0$$, and terminal p.d. $$V = \\varepsilon - 0 = \\varepsilon$$. So the voltmeter reads the full e.m.f.\n\nThis is the cleanest way to \"measure\" e.m.f. directly — open-circuit voltage — but in practice CP8 uses the graph extrapolation because real voltmeters draw small but nonzero currents.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is \"energy supplied to the charges\" the correct framing for e.m.f., while \"energy transferred by the charges\" is the correct framing for terminal p.d.?", "answer": "Both quantities are measured in volts (joules per coulomb), but they describe energy flow in opposite directions relative to the charge:\n- **E.m.f.**: the source *gives* energy to the charge. The chemical (or other) energy of the cell is converted and *deposited into* the moving charge. Direction: source → charge.\n- **Terminal p.d.**: the charge *gives* energy to the external circuit (resistor, lamp, etc.). The charge arrives at the load carrying energy and *deposits it into* heating the resistor or lighting the bulb. Direction: charge → load.\n\nSame unit, opposite roles. Saying \"supplied\" for e.m.f. and \"transferred\" or \"delivered\" for terminal p.d. captures this — it's the language that earns the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "Suppose you double the internal resistance of a cell while keeping $$\\varepsilon$$ and the external resistor $$R$$ fixed. What happens to (a) the current, (b) the terminal p.d., and (c) the lost volts? (3 steps)", "answer": "- Step 1: Current $$I = \\varepsilon/(R+r)$$. Doubling $$r$$ increases the denominator (but not by a factor of 2 — only by $$r/(R+r)$$). Current *decreases*, but only modestly if $$r \\ll R$$.\n- Step 2: Lost volts = $$Ir$$. Although $$I$$ has fallen, $$r$$ has doubled — and since $$r$$ doubles in full while $$I$$ falls by a smaller fractional amount, lost volts *increase*.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$, so $$V$$ *decreases*. The cell delivers less to the external circuit because more is now wasted internally.\n\nBigger $$r$$ = more internal waste = less useful output. This is why old/cold/depleted batteries fail to power devices: not because $$\\varepsilon$$ drops dramatically, but because $$r$$ has risen.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Limiting case: what happens to the current and terminal p.d. as $$R \\to 0$$ (short circuit) and as $$R \\to \\infty$$ (open circuit)? (3 steps)", "answer": "- Step 1: **Short circuit** ($$R = 0$$): $$I = \\varepsilon/r$$, which is the maximum possible current the cell can deliver. Terminal p.d. $$V = \\varepsilon - Ir = \\varepsilon - (\\varepsilon/r)r = 0$$. All the e.m.f. is now \"lost\" inside the cell, and the cell heats up dangerously.\n- Step 2: **Open circuit** ($$R \\to \\infty$$): $$I = \\varepsilon/(R+r) \\to 0$$. Lost volts $$\\to 0$$. Terminal p.d. $$V \\to \\varepsilon$$ — the cell's full e.m.f. appears across the terminals.\n- Step 3: These two limits sit at opposite ends of the $$V$$–$$I$$ graph: open circuit is the $$y$$-intercept ($$V = \\varepsilon$$, $$I = 0$$); short circuit is the $$x$$-intercept ($$V = 0$$, $$I = \\varepsilon/r$$). Real circuits operate somewhere between.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Synthesis: why does a torch with a fresh battery shine brightly, but as the battery ages, the same torch dims even though the voltage on the label hasn't changed? (4 steps)", "answer": "- Step 1: A fresh battery has small internal resistance $$r$$ — most of $$\\varepsilon$$ reaches the bulb as terminal p.d.\n- Step 2: As the battery ages (chemistry depletes, electrolyte degrades), the internal resistance $$r$$ grows substantially, often by an order of magnitude. The e.m.f. $$\\varepsilon$$ on the label changes only slightly.\n- Step 3: The current through the bulb $$I = \\varepsilon/(R_{\\text{bulb}}+r)$$ drops because the denominator grows. Also, terminal p.d. across the bulb $$V = \\varepsilon - Ir$$ falls because lost volts grow.\n- Step 4: Bulb brightness depends on power $$P = IV = I^2 R_{\\text{bulb}}$$, which drops sharply with smaller $$I$$. So a battery doesn't \"run out of voltage\" — it runs out of *low internal resistance*.\n\nThis connects everything: e.m.f., internal resistance, the cell equation, and real-world consequence.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Synthesis exercise: a $$V$$–$$I$$ graph for cell A has a steep slope and high intercept; cell B has a shallow slope and lower intercept. Compare the two cells in terms of $$\\varepsilon$$ and $$r$$, and predict which is more useful for a high-current device. (3 steps)", "answer": "- Step 1: Cell A: high intercept ⇒ large $$\\varepsilon$$. Steep slope ⇒ large $$|r|$$ (high internal resistance).\n- Step 2: Cell B: lower intercept ⇒ smaller $$\\varepsilon$$. Shallow slope ⇒ small $$|r|$$ (low internal resistance).\n- Step 3: For a high-current device, the dominant issue is voltage drop: at high $$I$$, lost volts $$Ir$$ matter most. Cell A might have a big \"tank\" but loses lots of it inside; cell B has a smaller tank but loses very little. Cell B's terminal p.d. at high $$I$$ may actually exceed cell A's. The answer depends on the operating current, but **low $$r$$ is critical** for high-current applications (car batteries, power tools).\n\nThis is why car batteries are physically large: not for high $$\\varepsilon$$ (still 12 V), but for *low $$r$$* to deliver hundreds of amps to a starter motor.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Synthesis: a thermistor is part of a temperature-protection circuit on a motor. Use $$I = nAve$$ and circuit reasoning to explain how warming the motor reduces the current flowing through it via the thermistor. (4 steps)", "answer": "- Step 1: Place an NTC thermistor in series with the motor. When the motor is cool, the thermistor's resistance is high (low $$n$$ in the thermistor at low temperature).\n- Step 2: Wait — for protection, you usually want *less* current when the motor is *hot*. With an NTC in series, hot ⇒ low $$R_{\\text{th}}$$ ⇒ *more* current. That's bad. So the circuit must use the thermistor differently: e.g., as part of a sensor that triggers a relay.\n- Step 3: Alternatively, use a PTC thermistor (positive temperature coefficient — resistance *rises* with heat) in series. Hot motor heats the PTC ⇒ $$R_{\\text{PTC}}$$ rises ⇒ total resistance rises ⇒ current $$I = \\varepsilon/R_{\\text{total}}$$ falls ⇒ motor protected.\n- Step 4: Via $$I = nAve$$: in the PTC, rising temperature *traps* carriers (in some materials, ions or domain effects reduce $$n$$ or carrier mobility), so $$n$$ effectively falls and resistance rises.\n\nThe synthesis: the same equation $$I = nAve$$ explains both NTC and PTC behaviour, depending on how $$n$$ changes with $$T$$ in the specific material.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why is the \"lost volts\" $$Ir$$ specifically the energy *per coulomb* lost inside the cell, rather than just an arbitrary voltage drop? (3 steps)", "answer": "- Step 1: The cell does work on each coulomb passing through, depositing $$\\varepsilon$$ joules per coulomb. But to deliver that, the coulomb must traverse the cell's internal resistance $$r$$.\n- Step 2: The energy dissipated by a coulomb crossing resistance $$r$$ at current $$I$$ is $$W = Vq = (Ir)(1\\text{ C}) = Ir$$ joules per coulomb — exactly the lost volts.\n- Step 3: So $$Ir$$ is literally the joules of energy *each individual coulomb* loses to heat inside the cell. The total power wasted inside is $$I \\times (Ir) = I^2 r$$ (per second, since $$I$$ is coulombs per second). The \"per coulomb\" framing is what makes it a voltage; the \"per second\" framing makes it a power.\n\nSame physics, two scales of bookkeeping.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why does the $$V$$–$$I$$ graph method (CP8) work for cells but would *not* work straightforwardly for, say, an inductor or a capacitor? (3 steps)", "answer": "- Step 1: The method assumes a linear relationship $$V = \\varepsilon - rI$$ — i.e., the device is well-modelled by an e.m.f. in series with a constant resistance.\n- Step 2: A capacitor's voltage depends on accumulated *charge* ($$V = Q/C$$), and an inductor's voltage depends on $$dI/dt$$. Neither is described by $$V = \\text{const} - rI$$.\n- Step 3: So plotting $$V$$ against $$I$$ for these would not produce a straight line corresponding to e.m.f. and a resistance. The method is specific to sources that can be modelled as ideal e.m.f. + series resistance — like cells, batteries, and (approximately) DC power supplies.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Suppose two identical cells, each with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, are connected in series. What is the equivalent e.m.f. and equivalent internal resistance of the combination? (3 steps)", "answer": "- Step 1: In series, e.m.f.s add (each cell pumps charges through the next). Total e.m.f. = $$2\\varepsilon$$.\n- Step 2: In series, internal resistances also add (they're in series in the loop). Total $$r_{\\text{eq}} = 2r$$.\n- Step 3: The combination behaves like a single cell of e.m.f. $$2\\varepsilon$$ and internal resistance $$2r$$. Doubles voltage, but also doubles internal loss. Useful when you need higher voltage and can tolerate higher $$r$$.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Suppose two identical cells, each with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, are connected in parallel. What is the equivalent e.m.f. and equivalent internal resistance? (3 steps)", "answer": "- Step 1: In parallel, both cells provide the same voltage across the same terminals, so total e.m.f. = $$\\varepsilon$$ (not doubled).\n- Step 2: In parallel, internal resistances combine reciprocally: $$1/r_{\\text{eq}} = 1/r + 1/r$$, so $$r_{\\text{eq}} = r/2$$.\n- Step 3: The combination acts like a single cell of e.m.f. $$\\varepsilon$$ but *half* the internal resistance. Same voltage, but can deliver more current with less internal loss. Useful when you need high current at modest voltage (e.g., paralleling car batteries for jump-starting).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Compare the practical roles of series vs parallel cell connections: when would you choose one over the other? (3 steps)", "answer": "- Step 1: **Series** doubles e.m.f. but also doubles $$r$$. Choose this when you need higher voltage — e.g., a 9 V smoke alarm built from six 1.5 V cells in series.\n- Step 2: **Parallel** keeps e.m.f. fixed but halves $$r$$. Choose this when you need higher current capability at the same voltage — e.g., paralleling batteries to power a high-current motor.\n- Step 3: Often real packs combine both: a \"12 V 100 Ah\" battery pack might be cells in series (for 12 V) within branches, and those branches in parallel (for 100 Ah capacity). Engineering trade-off: series for voltage, parallel for current.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the conceptual distinction between EMF ($$\\varepsilon$$) and terminal potential difference ($$V$$), given that both are measured in volts?", "answer": "- Step 1: EMF is the *cause* side of the energy story — it's the energy per unit charge **supplied to** the charges by the source as they pass through it. The cell does work on each coulomb, lifting it to a higher electrical potential.\n- Step 2: Terminal p.d. is the *effect* side — it's the energy per unit charge **delivered by** the charges to the external circuit (what the voltmeter across the cell terminals reads).\n- Step 3: They share the unit volt ($$\\text{J C}^{-1}$$) because both are \"energy per coulomb,\" but they describe opposite roles: EMF is energy *injected*, terminal p.d. is energy *extracted* by the load.\n+ Open circuit ($$I = 0$$): no energy is lost internally, so $$V = \\varepsilon$$ — the only time they're equal.\n+ Closed circuit ($$I > 0$$): some energy is wasted inside the cell, so $$V < \\varepsilon$$.\n\nSame unit, opposite roles — cause vs effect.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is EMF defined as \"energy per unit charge\" rather than as a force, despite the word \"electromotive force\"?", "answer": "- Step 1: The historical name is misleading. EMF has units of volts ($$\\text{J C}^{-1}$$), not newtons — it's an energy-per-charge quantity, not a force.\n- Step 2: Physically, the cell converts some other form of energy (chemical, in a battery) into electrical energy and hands it to each coulomb passing through. The defining ratio is $$\\varepsilon = W/Q$$ — joules of electrical energy produced per coulomb of charge moved.\n- Step 3: Calling it a \"force\" in an exam loses marks. The safe one-liner: *energy supplied to each unit charge by the source, converted into electrical energy.*", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "Using conservation of energy on a single coulomb travelling around a loop containing a cell ($$\\varepsilon, r$$) and external resistor $$R$$, derive the cell equation. (4 steps)", "answer": "- Step 1: Track one coulomb around the loop. It picks up energy $$\\varepsilon$$ joules from the cell, then dumps that energy at two places: the internal resistance $$r$$ and the external resistor $$R$$.\n- Step 2: By conservation of energy per coulomb: $$\\varepsilon = V_1 + V_2$$, where $$V_1$$ is the p.d. across $$R$$ and $$V_2$$ is the p.d. across $$r$$.\n- Step 3: In a series loop the current $$I$$ is the same everywhere, so apply $$V = IR$$ to each: $$V_1 = IR$$ and $$V_2 = Ir$$.\n- Step 4: The voltmeter at the terminals reads $$V \\equiv V_1 = IR$$, so substituting gives $$\\varepsilon = V + Ir$$.\n\nThe whole circuit just enforces energy bookkeeping per coulomb — nothing more.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What are the four algebraically equivalent forms of the cell equation, and when is each most useful? (4 steps)", "answer": "- Step 1: $$\\varepsilon = V + Ir$$ — the fundamental energy-conservation form. Use it when you have terminal p.d. and current.\n- Step 2: $$V = \\varepsilon - Ir$$ — the straight-line form for plotting $$V$$ against $$I$$. This is the CP8 workhorse.\n- Step 3: $$\\varepsilon = I(R + r)$$ — treats $$r$$ as just another series resistor. Use it when you know $$R$$ and want $$I$$.\n- Step 4: $$I = \\dfrac{\\varepsilon}{R + r}$$ — solved for the current. Use when finding the current drawn by a given load.\n\nAll four are the same physics rearranged; pick whichever matches the unknowns you have.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What are \"lost volts\" and why must they exist whenever current flows through a cell? (3 steps)", "answer": "- Step 1: \"Lost volts\" is the quantity $$\\varepsilon - V = Ir$$ — the energy per coulomb that's dissipated *inside* the cell before the charge even reaches the external circuit.\n- Step 2: They exist because the cell itself has internal resistance $$r$$. Any current $$I$$ flowing through that resistance drops a voltage $$Ir$$ across it, so each coulomb arrives at the terminals with less than its starting energy.\n- Step 3: This is why the voltmeter at the terminals can never read the full $$\\varepsilon$$ while current flows — some energy has already been wasted as heat in the cell.\n\nThe bigger the current, the bigger the lost volts — every extra ampere \"costs\" you more voltage off the top.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "On a $$V$$–$$I$$ graph for a cell, what do the y-intercept and gradient physically represent, and why? (3 steps)", "answer": "- Step 1: Rearrange the cell equation into straight-line form: $$V = -rI + \\varepsilon$$. Compare with $$y = mx + c$$.\n- Step 2: The y-intercept ($$I = 0$$) equals $$\\varepsilon$$ — at zero current there are no lost volts, so the terminal p.d. equals the EMF.\n- Step 3: The gradient equals $$-r$$, so internal resistance is the negative of the slope. The line slopes *down* because every extra amp costs more lost volts, dragging $$V$$ below $$\\varepsilon$$.\n\nIntercept gives you the cell's \"true voltage\"; slope magnitude gives you its internal resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why does the $$V$$–$$I$$ line slope *downward* rather than upward, and what would an upward slope physically mean?", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, since $$r > 0$$, increasing $$I$$ subtracts more from $$\\varepsilon$$, so $$V$$ falls.\n- Step 2: An upward slope would require $$r < 0$$ — i.e. the cell would *gain* terminal voltage as you drew more current, which violates energy conservation (you'd be getting more out than you put in).\n- Step 3: So a downward slope is a direct fingerprint of the cell being a passive energy source with real internal dissipation.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "In Core Practical 8, why must the internal resistance $$r$$ be held constant throughout the experiment, and what goes wrong if it isn't?", "answer": "- Step 1: The whole method assumes $$V = \\varepsilon - rI$$ is a *single* straight line whose slope reveals one fixed value of $$r$$.\n- Step 2: If $$r$$ changes between readings, each data point lies on a *different* line — the plotted points scatter or curve, and the gradient no longer corresponds to any single internal resistance.\n- Step 3: In practice this means: set the cell once and never touch it again; only vary the external load $$R$$ to change the current.\n\nGarbage in, garbage out — a changing $$r$$ makes the gradient meaningless.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Why do we vary the *external* resistor $$R$$ rather than the internal $$r$$ in CP8, given that both would change the current?", "answer": "- Step 1: $$r$$ is the unknown we're trying to *measure* — treating it as the independent variable would be circular.\n- Step 2: Varying $$R$$ changes $$I$$ (since $$I = \\varepsilon/(R+r)$$) without disturbing $$r$$, giving multiple ($$I, V$$) pairs that all obey the same straight line.\n- Step 3: The straight line's intercept and slope then jointly reveal both $$\\varepsilon$$ and $$r$$ — two unknowns from one well-controlled experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "When using a simulated circuit with one external resistor and one cell, why does a voltmeter across the terminals read the same as a voltmeter across $$R$$? (3 steps)", "answer": "- Step 1: The terminal p.d. is whatever voltage appears between the two external terminals of the cell.\n- Step 2: If the only external component is $$R$$, then those terminals are also the two ends of $$R$$ — so both voltmeters are measuring across the same two physical points.\n- Step 3: Hence $$V_\\text{terminal} = V_R$$, and one of the voltmeters is redundant.\n\nThis breaks if there's more than one external component, because then the terminal p.d. is split between them.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Why might a real cell's $$V$$–$$I$$ graph curve at large currents, and how should you handle this in analysis? (3 steps)", "answer": "- Step 1: At large currents, the cell heats up (Joule heating $$I^2 r$$ inside it), and its internal resistance is not truly constant — chemical and thermal effects make $$r$$ drift.\n- Step 2: This makes the slope at high $$I$$ unreliable; the line bends away from straight.\n- Step 3: Use only the low-current, linear portion to compute the gradient. If asked to explain the curvature: *the internal resistance is not constant at large currents.*", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "When extracting a gradient from a $$V$$–$$I$$ best-fit line, why should you choose two points that are far apart on the line rather than close together?", "answer": "- Step 1: The gradient is $$\\Delta V / \\Delta I$$. Small differences in $$\\Delta V$$ and $$\\Delta I$$ amplify any reading error from the graph.\n- Step 2: Using a large triangle makes $$\\Delta V$$ and $$\\Delta I$$ much bigger than the reading uncertainty, so the percentage error in the gradient shrinks.\n- Step 3: Also, pick points that lie *on the line of best fit*, not raw data points — this averages out random scatter.\n\nBig triangle = small relative error.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A cell of EMF 6 V and internal resistance 1 Ω is connected to a 5 Ω resistor. Without computing exact decimals, estimate the current and the terminal p.d., and explain the relative size of the \"lost volts.\" (3 steps)", "answer": "- Step 1: Total circuit resistance is $$R + r = 5 + 1 = 6\\ \\Omega$$, so $$I = \\varepsilon/(R+r) = 6/6 = 1\\ \\text{A}$$.\n- Step 2: Lost volts $$= Ir = 1 \\times 1 = 1\\ \\text{V}$$. Terminal p.d. $$V = \\varepsilon - Ir = 6 - 1 = 5\\ \\text{V}$$.\n- Step 3: The fraction lost internally equals $$r/(R+r) = 1/6$$ — about 17%. This is because the cell's $$r$$ is one-sixth of the total resistance, so one-sixth of the energy per coulomb is wasted inside.\n\nLost-volt fraction is just the ratio of $$r$$ to total resistance — a useful mental shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "A $$V$$–$$I$$ graph for a cell crosses the V-axis at 9 V and crosses the I-axis at 3 A. What are $$\\varepsilon$$ and $$r$$, and what does the I-axis crossing physically represent? (3 steps)", "answer": "- Step 1: y-intercept gives $$\\varepsilon = 9\\ \\text{V}$$ directly (no current, no lost volts).\n- Step 2: Gradient magnitude: line falls 9 V over a run of 3 A, so slope $$= -3\\ \\text{V A}^{-1}$$, giving $$r = 3\\ \\Omega$$.\n- Step 3: The I-axis crossing ($$V = 0$$) is the **short-circuit current** — when external $$R = 0$$, all of $$\\varepsilon$$ is dropped across $$r$$ alone, so $$I_\\text{max} = \\varepsilon/r = 9/3 = 3\\ \\text{A}$$.\n\nThe two intercepts encode both unknowns and also reveal the worst-case short-circuit current.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Conceptually, why does the terminal p.d. of a cell approach the EMF as the external load resistance becomes very large? (3 steps)", "answer": "- Step 1: From $$I = \\varepsilon/(R+r)$$, as $$R \\to \\infty$$ the current $$I \\to 0$$.\n- Step 2: Lost volts $$Ir \\to 0$$ as well, because there's negligible current flowing through the internal resistance.\n- Step 3: Hence $$V = \\varepsilon - Ir \\to \\varepsilon$$ — with virtually no current, no energy is wasted internally, and the terminals report the cell's full EMF.\n\nA high-impedance voltmeter exploits exactly this: by drawing essentially no current it reads $$\\varepsilon$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "If you accidentally plotted $$I$$ on the vertical axis and $$V$$ on the horizontal axis, what would the gradient and y-intercept of the resulting straight line represent? (3 steps)", "answer": "- Step 1: Rearrange $$\\varepsilon = V + Ir$$ for $$I$$: $$I = \\dfrac{\\varepsilon}{r} - \\dfrac{V}{r}$$.\n- Step 2: Comparing with $$y = mx + c$$: gradient $$= -1/r$$ (so $$r = -1/\\text{gradient}$$), and y-intercept $$= \\varepsilon/r$$ (the short-circuit current).\n- Step 3: You can still extract $$\\varepsilon$$ and $$r$$, but the formulas are messier. Standard convention is $$V$$ on the y-axis precisely because the intercept is then $$\\varepsilon$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "A student claims \"in a parallel circuit, the voltage across the branches is reciprocal.\" Identify the misconception and state what's actually true. (2 steps)", "answer": "- Step 1: The confusion is between voltage and resistance. The *reciprocal* rule applies to **resistance** in parallel: $$1/R_\\text{total} = \\sum 1/R_i$$, not to voltage.\n- Step 2: In parallel, the **voltage is the same** across each branch (they share the same two nodes); the **current** is what splits between branches. In series, the opposite: current is the same, voltages add.\n\nMnemonic: same nodes ⇒ same voltage. Same wire ⇒ same current.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why is \"$$E = IVt$$\" not the right equation to use when analysing a $$V$$–$$I$$ graph for a cell?", "answer": "- Step 1: $$E = IVt$$ is an *energy* formula — it tells you the total energy dissipated by a current $$I$$ at p.d. $$V$$ over time $$t$$.\n- Step 2: A $$V$$–$$I$$ graph at a fixed instant isn't about accumulated energy over time; it's about the instantaneous relationship between terminal voltage and current.\n- Step 3: The right relation is the circuit equation $$V = \\varepsilon - Ir$$ (or $$V = IR$$ for a pure resistor), which links voltage and current directly without involving time.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Derive the equation $$I = nAve$$ from the basic definition of current. (5 steps)", "answer": "- Step 1: Start with the definition $$I = Q/t$$ — current is charge per unit time.\n- Step 2: For a wire of cross-section $$A$$, consider a length $$s$$. The volume is $$As$$, and the number of free charge carriers in it is $$n \\times As$$ (where $$n$$ is carriers per cubic metre).\n- Step 3: Each carrier has charge $$e$$, so the total charge in that length is $$Q = nAse$$.\n- Step 4: Now ask: how long does it take for *all* of that charge to drift past a fixed cross-section? If carriers drift at mean speed $$v$$, time taken is $$t = s/v$$.\n- Step 5: Substituting: $$I = Q/t = nAse \\cdot (v/s) = nAve$$.\n\nThe factor $$s$$ cancels — the result is independent of how long a slug of wire you chose, as it should be.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "In the equation $$I = nAve$$, what is each symbol, with units, and what's the conceptual role of each? (4 steps)", "answer": "- Step 1: $$n$$ = number density of free charge carriers, units $$\\text{m}^{-3}$$. *How many* movable carriers per unit volume — a material property.\n- Step 2: $$A$$ = cross-sectional area of the wire, units $$\\text{m}^2$$. *How wide* a channel the carriers flow through — a geometric property.\n- Step 3: $$v$$ = drift velocity, units $$\\text{m s}^{-1}$$. *How fast* the carriers drift on average (typically slow — millimetres per second in copper).\n- Step 4: $$e$$ = charge per carrier, $$1.6 \\times 10^{-19}\\ \\text{C}$$ for electrons. *How much* charge each carrier carries.\n\nCurrent = (number) × (area) × (speed) × (charge each). Intuitively: \"how many\" × \"how fast\" × \"how much each.\"", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why are drift velocities in metals so slow (millimetres per second), even though electrical signals propagate near light speed?", "answer": "- Step 1: From $$I = nAve$$, drift velocity is $$v = I/(nAe)$$. In copper, $$n \\approx 10^{28}\\ \\text{m}^{-3}$$ — an enormous number of free electrons per cubic metre.\n- Step 2: Because $$n$$ is so huge, even a modest current $$I$$ requires only a tiny $$v$$ to deliver enough charge per second.\n- Step 3: The *signal* speed is unrelated to drift speed: when you flip a switch, the electric field propagates through the wire near the speed of light, nudging every electron almost simultaneously. The individual electrons drift slowly, but the whole population starts moving together immediately.\n\nMany slow carriers ⇒ slow drift but huge current. The signal is the wave, not the carriers themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Using $$I = nAve$$, if a wire is replaced by one of double the cross-sectional area carrying the same current, what happens to the drift velocity and why? (3 steps)", "answer": "- Step 1: Rearrange: $$v = I/(nAe)$$.\n- Step 2: With $$I$$, $$n$$, $$e$$ fixed and $$A$$ doubled, $$v$$ is halved.\n- Step 3: Intuitively, doubling the area gives the same number of carriers per second crossing the cross-section even if each one drifts only half as fast — the wider channel makes up for the slower flow.\n\nThis is also Alex's \"shopping bags\" intuition: more carriers in cross-section ⇒ slower drift needed for same current.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Explain, using $$I = nAve$$, why the resistance of a thermistor (NTC) decreases when warmed. (3 steps)", "answer": "- Step 1: Warming a semiconductor thermistor releases more electrons from their bound states into the conduction band, so the number density $$n$$ of free charge carriers increases.\n- Step 2: For a fixed applied voltage (and hence a fixed electric field driving the same drift velocity), $$I = nAve$$ now gives a larger current.\n- Step 3: Larger current at the same voltage means resistance $$R = V/I$$ has dropped — the thermistor's resistance falls as it warms.\n\nThe exam-mark sentence: *resistance decreases because the number of free electrons (n) increases.*", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Explain via $$I = nAve$$ why an LDR's resistance is high in the dark and low in bright light. (3 steps)", "answer": "- Step 1: In the dark, very few electrons have enough energy to be free to conduct, so $$n$$ is small. With small $$n$$, $$I = nAve$$ gives only a small current for a given voltage — hence high resistance.\n- Step 2: Light shining on the LDR supplies energy (photons) that release more electrons into the conduction band, so $$n$$ increases sharply.\n- Step 3: Larger $$n$$ ⇒ larger $$I$$ at the same voltage ⇒ lower resistance. So bright light = low resistance; darkness = high resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A student writes \"number density is the number of electrons per square metre.\" Identify and correct the misconception.", "answer": "- Step 1: Number density is per **cubic metre** ($$\\text{m}^{-3}$$), not per square metre. It's a volume density, counting carriers in a 3D region of material.\n- Step 2: Per square metre would suggest a surface property — but free electrons fill the bulk of the metal in 3D, so volume is the right denominator.\n- Step 3: The \"area\" $$A$$ in $$I = nAve$$ already separately accounts for the cross-section the carriers flow through — don't conflate the two.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A copper wire of cross-section $$1\\ \\text{mm}^2$$ carries $$10\\ \\text{A}$$. Given $$n \\approx 10^{20}\\ \\text{mm}^{-3}$$ and $$e = 1.6 \\times 10^{-19}\\ \\text{C}$$, qualitatively describe how to find the drift velocity, and how the result would change if the current dropped to $$10\\ \\text{mA}$$. (4 steps)", "answer": "- Step 1: Use $$v = I/(nAe)$$. The conceptual move: divide current by \"carriers per second-times-charge\" capacity of the cross-section.\n- Step 2: Unit conversion matters — convert $$\\text{mm}^2 \\to \\text{m}^2$$ ($$1\\ \\text{mm}^2 = 10^{-6}\\ \\text{m}^2$$) and $$\\text{mm}^{-3} \\to \\text{m}^{-3}$$ ($$10^{20}\\ \\text{mm}^{-3} = 10^{29}\\ \\text{m}^{-3}$$) before plugging in.\n- Step 3: For $$10\\ \\text{A}$$, the drift velocity comes out tiny (sub-mm/s) — confirming that conductors carry large currents via huge numbers of slowly drifting electrons.\n- Step 4: If $$I$$ drops to $$10\\ \\text{mA}$$ (a factor of 1000 smaller), then $$v$$ drops by the same factor of 1000 — drift velocity is *linearly proportional* to current when geometry and material are fixed.\n\nTo drift 1 mm at this even slower speed would take 1000 times longer.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why is it crucial to convert mm to m before substituting into $$I = nAve$$, and what's a typical error if you don't? (3 steps)", "answer": "- Step 1: SI consistency: $$I$$ in amperes, $$e$$ in coulombs — so $$n$$ must be in $$\\text{m}^{-3}$$ and $$A$$ in $$\\text{m}^2$$ for $$v$$ to come out in $$\\text{m s}^{-1}$$.\n- Step 2: $$1\\ \\text{mm}^2 = 10^{-6}\\ \\text{m}^2$$ and $$1\\ \\text{mm}^3 = 10^{-9}\\ \\text{m}^3$$. So a density of $$10^{20}\\ \\text{mm}^{-3}$$ equals $$10^{29}\\ \\text{m}^{-3}$$ — a factor of $$10^9$$ difference.\n- Step 3: Forgetting this gives a drift velocity off by many orders of magnitude — typically you get an unphysical answer (kilometres per second, or near-zero).", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A cell of EMF 1.5 V and internal resistance 0.3 Ω drives 0.5 A through a circuit. Conceptually walk through finding the terminal p.d. (3 steps)", "answer": "- Step 1: Identify what's \"lost\" inside the cell: lost volts $$= Ir = 0.5 \\times 0.3 = 0.15\\ \\text{V}$$.\n- Step 2: Apply $$V = \\varepsilon - Ir = 1.5 - 0.15 = 1.35\\ \\text{V}$$.\n- Step 3: Sanity check: the terminal p.d. is *less than* but close to the EMF, because $$Ir$$ is only 10% of $$\\varepsilon$$ — consistent with a small internal resistance relative to the load.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Compare what happens to the terminal p.d. of two cells with the same EMF but very different internal resistances when both drive the same external load. (3 steps)", "answer": "- Step 1: From $$I = \\varepsilon/(R+r)$$: the cell with larger $$r$$ produces a smaller current through the same $$R$$.\n- Step 2: But the lost volts $$Ir$$ depend on both $$I$$ and $$r$$. Substituting: lost volts $$= \\varepsilon r/(R+r)$$, which *grows* monotonically with $$r$$.\n- Step 3: So the higher-$$r$$ cell has both lower current *and* a larger fraction of its EMF wasted internally — its terminal p.d. is noticeably lower than the low-$$r$$ cell's.\n\nPractical consequence: a \"tired\" battery still has near-1.5 V open-circuit EMF, but its terminal p.d. sags badly under load because $$r$$ has risen.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "When does maximum power transfer from a cell to an external load occur, conceptually? (3 steps)", "answer": "- Step 1: Power to external load: $$P = I^2 R = \\left(\\dfrac{\\varepsilon}{R+r}\\right)^2 R$$.\n- Step 2: Two competing effects as $$R$$ varies: increasing $$R$$ raises the voltage share across $$R$$ but reduces the current. There's a sweet spot.\n- Step 3: Maximum power to the load occurs when $$R = r$$ — the external load \"matches\" the internal resistance. At this point, exactly half the EMF is dropped across $$r$$ (wasted) and half across $$R$$ (used), so the efficiency is only 50%.\n\nMaximum *power* transfer is not the same as maximum *efficiency* — efficiency is highest when $$R \\gg r$$ (less waste in $$r$$, but less power overall).", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why does Alex insist you should be able to *derive* the cell equation from first principles rather than just memorise it? (3 steps)", "answer": "- Step 1: In an exam, blanking on a formula is common — but if you understand the underlying physics (energy per coulomb is conserved around a loop), you can reconstruct it from a circuit diagram in 30 seconds.\n- Step 2: Memorisation without understanding fails when the problem is dressed up differently — e.g. a circuit with two cells, or a question phrased about energy rather than voltage.\n- Step 3: The energy-conservation derivation also makes clear *why* each term appears, which helps you spot when a formula doesn't apply (e.g. non-series circuits, or when $$r$$ varies).\n\nThe derivation is also a recall scaffold: draw circuit → write $$\\varepsilon = V_1 + V_2$$ → apply $$V = IR$$ to each → done.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "In CP8, why might choosing currents like 0.10, 0.20, 0.30, 0.40, 0.50 A give a better experiment than collecting points randomly? (3 steps)", "answer": "- Step 1: An even spread of currents covers a wide range of the line, making the gradient triangle large and reducing relative error in slope.\n- Step 2: Round-number targets are easier to set precisely with the variable resistor and easier to read accurately on the ammeter.\n- Step 3: Avoiding clustering means the line of best fit isn't dominated by points in one region — outliers near the cluster would skew the gradient disproportionately.\n\nWide range + even spacing = best-fit line is well-constrained.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "A $$V$$–$$I$$ graph has y-intercept 6.0 V and passes through (2.0 A, 4.0 V). Conceptually determine $$\\varepsilon$$ and $$r$$. (3 steps)", "answer": "- Step 1: y-intercept directly gives $$\\varepsilon = 6.0\\ \\text{V}$$ (the terminal p.d. extrapolated to zero current).\n- Step 2: Gradient = $$(4.0 - 6.0)/(2.0 - 0) = -1.0\\ \\text{V A}^{-1}$$.\n- Step 3: Internal resistance $$r = -\\text{gradient} = 1.0\\ \\Omega$$.\n\nCheck: at $$I = 2.0\\ \\text{A}$$, lost volts $$= Ir = 2.0 \\times 1.0 = 2.0\\ \\text{V}$$, giving $$V = 6.0 - 2.0 = 4.0\\ \\text{V}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why is the EMF of a cell only *exactly* equal to the terminal p.d. when the cell is disconnected (open circuit)?", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, the lost volts $$Ir$$ vanish only when $$I = 0$$.\n- Step 2: Open circuit means no current can flow (the load is effectively infinite resistance), so no energy is dissipated in $$r$$.\n- Step 3: With zero internal losses, every coulomb (conceptually — none actually flow) would arrive at the terminals with all of $$\\varepsilon$$ intact. A high-impedance voltmeter draws negligible current and so measures essentially $$\\varepsilon$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Conceptually, why does Alex's \"Charlie the clown / shopping bags\" intuition fit $$I = nAve$$? (3 steps)", "answer": "- Step 1: The shopping bags analogy: $$n$$ = how many bags you're carrying (number of charge carriers); $$v$$ = how fast you can walk while carrying them.\n- Step 2: Carrying many bags at once (high $$n$$) lets you deliver lots of goods even if you walk slowly (low $$v$$). Few bags but fast running (low $$n$$, high $$v$$) can deliver the same total.\n- Step 3: Current is the \"delivery rate\" — it depends on the *product* of how many carriers and how fast each moves, not either alone.\n\nThis makes the trade-off intuitive: in metals, $$n$$ is enormous and $$v$$ is tiny; in semiconductors, both are smaller, which is why their currents are limited.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A student measures the open-circuit voltage of a cell as 1.5 V, then connects it to a 1 Ω load and measures 1.0 V across the terminals. What is the cell's internal resistance? (3 steps)", "answer": "- Step 1: Open circuit gives $$\\varepsilon = 1.5\\ \\text{V}$$ (no current, no lost volts).\n- Step 2: With the load: terminal p.d. is 1.0 V, so lost volts $$= \\varepsilon - V = 1.5 - 1.0 = 0.5\\ \\text{V}$$. Current through the load $$I = V/R = 1.0/1 = 1.0\\ \\text{A}$$.\n- Step 3: From $$Ir = $$ lost volts: $$r = 0.5/1.0 = 0.5\\ \\Omega$$.\n\nThis is essentially CP8 with just two data points — open-circuit and one loaded reading.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does the terminal p.d. drop noticeably when you turn on the headlights of a car (large load) even though the battery's EMF is unchanged? (3 steps)", "answer": "- Step 1: The EMF is fixed by the battery's chemistry — it doesn't change when you add a load.\n- Step 2: But headlights draw a large current, so $$I$$ rises sharply, making the lost volts $$Ir$$ much bigger.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$ correspondingly drops. This is also why dashboard lights can momentarily dim when you crank the starter motor — huge $$I$$, huge $$Ir$$.\n\nThe bigger and more demanding the load, the more the terminal voltage sags.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Two students argue: A says \"current is the same in a series circuit because charge can't pile up\"; B says \"voltage is the same in parallel because it's a shared rule.\" Which framings are correct, and why? (3 steps)", "answer": "- Step 1: A is correct and well-reasoned: charge conservation forces the same current at every cross-section in a series loop — no charge accumulates anywhere in steady state.\n- Step 2: B is correct but the *reason* is sharper: parallel branches connect the same two nodes, and the voltage between two nodes is unique. Branches share the *same two terminal points*, so they share the voltage.\n- Step 3: These two complementary rules (series → same I, parallel → same V) plus Kirchhoff's loop/junction laws handle every DC circuit you'll meet at this level.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why, when extracting an EMF from a $$V$$–$$I$$ graph, do you sometimes have to *extrapolate* the line back to $$I = 0$$ rather than just reading a measured value?", "answer": "- Step 1: In a real experiment, you can't make $$I$$ exactly zero (open circuit) and simultaneously read a voltmeter that's part of the same loop — the voltmeter itself would have to draw zero current.\n- Step 2: Instead, you collect points at convenient currents (say 0.1–0.5 A) and fit a straight line.\n- Step 3: Extrapolating that line back to the $$V$$-axis ($$I = 0$$) recovers the EMF you couldn't directly measure — it's the *intercept of the model*, not a measured datum.\n\nThe graph \"imagines\" the no-current case for you.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "A common exam answer to \"why does $$V < \\varepsilon$$ when current flows?\" loses marks if it just says \"because of internal resistance.\" What's the full, mark-securing explanation? (3 steps)", "answer": "- Step 1: State the energy conservation: $$\\varepsilon = V_1 + V_2$$ around the loop, where $$V_2 = Ir$$ is the p.d. across the internal resistance.\n- Step 2: Explain that some of the energy per coulomb supplied by the cell is dissipated as heat in $$r$$ — these are the \"lost volts.\"\n- Step 3: Conclude: $$V = \\varepsilon - Ir$$, so as long as $$I > 0$$, $$V$$ must be smaller than $$\\varepsilon$$ by an amount equal to the lost volts.\n\nThe marks come from naming the mechanism (lost volts), the equation, and the directional logic — not just the buzzword.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A cell drives current through a 9 Ω external resistor; the lost volts are measured as 1 V and the terminal p.d. as 9 V. Find the EMF, the current, and the internal resistance. (3 steps)", "answer": "- Step 1: EMF $$\\varepsilon = V + Ir = 9 + 1 = 10\\ \\text{V}$$ (terminal p.d. plus lost volts).\n- Step 2: Current $$I = V/R = 9/9 = 1\\ \\text{A}$$.\n- Step 3: Internal resistance $$r = Ir/I = 1/1 = 1\\ \\Omega$$.\n\nSanity check via $$I = \\varepsilon/(R+r) = 10/(9+1) = 1\\ \\text{A}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "When mapping a physics equation onto $$y = mx + c$$ to extract two unknowns from a graph, what's the general strategy? (3 steps)", "answer": "- Step 1: Rearrange so that one measurable quantity is alone on the left (the \"$$y$$\") and the other measurable quantity is the coefficient of a variable on the right (the \"$$x$$\").\n- Step 2: Identify which of the rearranged equation's coefficients corresponds to the gradient ($$m$$) and which to the intercept ($$c$$). These will involve the unknowns you want to find.\n- Step 3: Plot the data, draw the line of best fit, then back-solve: the unknowns drop out of the intercept and gradient values.\n\nFor CP8: $$V = -rI + \\varepsilon$$ → intercept = $$\\varepsilon$$, gradient = $$-r$$. Same trick works for many practicals (e.g. finding resistivity, Planck's constant, etc.).", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why would using a single-resistor reading (just one value of $$V$$ at one current) be worse than a $$V$$–$$I$$ graph for finding $$\\varepsilon$$ and $$r$$? (3 steps)", "answer": "- Step 1: With one reading, you have one equation and two unknowns — you can't solve uniquely without an extra assumption (like measuring $$\\varepsilon$$ separately first).\n- Step 2: Even with two readings you'd be susceptible to single-measurement errors; one bad data point throws off the answer.\n- Step 3: A graph with many data points lets you average over random scatter (line of best fit), simultaneously finds *both* unknowns from one fit, and lets you visually spot anomalies or non-linearity (e.g. cell heating).\n\nMore data → robustn
