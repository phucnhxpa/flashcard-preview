e side of the coil carries current toward you (out of the page) and the other side carries current away from you (into the page). The magnetic field runs from left (North) to right (South). Use Fleming's Left-Hand Rule to find the direction of force on each side of the coil. (3 steps)", "answer": "- Step 1: For the wire with current toward you (out of page): \n+ First finger: left to right (field, N→S)\n+ Second finger: toward you (out of page)\n+ Thumb points UP\n\n+ Therefore, this side experiences an UPWARD force.\n\n- Step 2: For the wire with current away from you (into page):\n+ First finger: left to right (field)\n+ Second finger: into the page\n+ Thumb points DOWN\n\n+ Therefore, this side experiences a DOWNWARD force.\n\n- Step 3: One side is pushed up, the other is pushed down — this creates a couple (pair of forces in opposite directions) that makes the coil spin clockwise (or counterclockwise depending on orientation).", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why does a wire lying PARALLEL to a magnetic field experience ZERO force, even when current flows through it? (2 steps)", "answer": "- Step 1: The force on a current-carrying wire comes from the interaction between the external magnetic field and the magnetic field produced by the current in the wire. This interaction only occurs where the wire cuts ACROSS the external field lines.\n\n- Step 2: When the wire is parallel to the field, the wire's own magnetic field circles around the wire in a plane perpendicular to the wire. Since the wire runs parallel to the external field lines, the two fields never \"interact\" in the sense of one reinforcing on one side and cancelling on the other — the wire is always \"along\" the field lines, not crossing them.\n\n+ Mathematically, this is captured by $$\\sin \\theta$$ in $$F = BIL \\sin \\theta$$. When $$\\theta = 0^\\circ$$ (parallel), $$\\sin 0^\\circ = 0$$, so $$F = 0$$.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student says: \"A wire in a magnetic field experiences a force because the external magnetic field pushes on the electrons in the wire.\" Identify two problems with this statement and explain the correct reasoning. (2 steps)", "answer": "- Step 1: Problem 1 — It mentions electrons. The correct analysis uses conventional current (+ → −), not electron flow. Fleming's Left-Hand Rule uses conventional current. If electron flow is given, you must reverse the direction before applying the rule.\n\n- Step 2: Problem 2 — The force is not on the electrons specifically; it's on the wire itself (the conductor) as a whole. The magnetic field doesn't \"push\" on charges the way you might push a shopping cart — it's a field interaction. The current-carrying wire produces its own magnetic field, and this field interacts with the external field. The net result is a force on the wire.\n\n+ The correct picture: The external field and the wire's own field interact. On one side of the wire they reinforce (crowded lines); on the other side they cancel (sparse lines). This pressure difference (the \"catapult effect\") pushes the wire from the crowded side toward the sparse side.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A wire lies at 45° to a magnetic field. Compare the force on this wire to the maximum possible force (when $$\\theta = 90^\\circ$$). What is the ratio? (2 steps)", "answer": "- Step 1: The force at angle $$\\theta$$ is $$F = BIL \\sin \\theta$$. The maximum force (at 90°) is $$F_{max} = BIL$$.\n\n- Step 2: At $$\\theta = 45^\\circ$$, $$\\sin 45^\\circ = \\frac{1}{\\sqrt{2}} \\approx 0.707$$\n\n+ Therefore: $$F_{45^\\circ} = BIL \\sin 45^\\circ = BIL \\times 0.707 = 0.707 \\times F_{max}$$\n\n+ The ratio is approximately 1:$$\\sqrt{2}$$ or about 70.7% of the maximum force. This is a useful intuition check — at 45°, you still get most of the force, but not all.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "State the specification points from Unit 4, Topic 4.4 that were covered in this lesson. What are the numbers and what does each mean? (1 step)", "answer": "The lesson covered these Edexcel IAL specification points:\n+ Point 105: Understand and use the terms magnetic flux density $$B$$, flux $$\\phi$$, and flux linkage $$N\\phi$$\n+ Point 107: Use $$F = BIl \\sin \\theta$$ and apply Fleming's left-hand rule to current-carrying conductors (the motor effect)\n+ Point 108: Understand the factors affecting the e.m.f. induced in a coil when there is relative motion between the coil and a permanent magnet (the generator)\n+ Point 110: Faraday's law and the combined Faraday/Lenz equation $$\\mathcal{E} = -\\frac{d(N\\phi)}{dt}$$ (covered in the next lesson)", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In an AC generator, as the coil rotates, the induced e.m.f. follows a sine wave. At one instant the e.m.f. is at its maximum positive value. Describe what is happening to the coil at this instant and why the e.m.f. is maximum. (3 steps)", "answer": "- Step 1: When the induced e.m.f. is at its maximum positive value, the coil is perpendicular to the magnetic field lines (the plane of the coil is parallel to the field).\n\n- Step 2: At this position, the two long sides of the coil are moving directly ACROSS the field lines at the fastest rate. One side moves up through the field, the other moves down — both are cutting across the field lines perpendicularly, maximizing the rate of cutting.\n\n- Step 3: According to Faraday's law, the induced e.m.f. is proportional to the rate at which the coil cuts magnetic field lines. This rate is maximum when the motion is perpendicular to the field, so e.m.f. is maximum. When the coil passes through the position where its plane is perpendicular to the field (i.e., the coil is horizontal), the sides are moving parallel to the field lines, so no cutting occurs → e.m.f. = 0.\n\n+ The sine wave output reflects this: maximum e.m.f. when cutting most rapidly, zero when not cutting at all (moving parallel), and reversing direction when the coil passes through.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A student uses the RIGHT hand to find the force on a current-carrying wire in a magnetic field. What will likely go wrong? Why is this a common mistake? (2 steps)", "answer": "- Step 1: Using the right hand gives the WRONG direction. The correct force direction will be reversed because the right hand follows a different rule (the right-hand rule is for induced current/generator effect, not for force on a current).\n\n- Step 2: This is a common mistake because:\n+ Students sometimes confuse which rule applies to which situation\n+ The left-hand rule and right-hand rule sound similar\n+ In the heat of an exam, muscle memory might default to the \"dominant\" hand\n\n+ Prevention: Memorise the distinction clearly: LEFT hand = Motor (force on current), RIGHT hand = Generator (induced current). A common mnemonic: \"Left Motor, Right Generator.\"", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the difference between an \"electromagnet\" and an \"induced magnet\"? Why does using the wrong term lose marks in an exam? (2 steps)", "answer": "- Step 1: An electromagnet is a magnet that becomes magnetic ONLY when current flows through it. Its magnetism comes from the current in the wire — no current, no magnetism. This is what happens in a motor coil or a wire in a field.\n\n- Step 2: An induced magnet (like iron or steel) becomes magnetic when placed in an external magnetic field, but this is due to alignment of magnetic domains inside the material. Remove the external field, and it loses most of its magnetism.\n\n+ Using \"induced magnet\" for a current-carrying wire in a field is incorrect — the wire is an electromagnet (magnetic because of its current), not an induced magnet. Examiners look for precise vocabulary; using the wrong term signals a conceptual misunderstanding and loses marks.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the formula $$F = BIL$$, does the length $$L$$ refer to the total length of wire in the circuit, or only the portion that lies inside the magnetic field? (1 step)", "answer": "Only the portion of the wire that lies INSIDE the magnetic field contributes to the force. The length $$L$$ is specifically \"the length of wire in the field.\"\n\nIf only 5 cm of a 20 cm wire sits between the magnet poles, only those 5 cm experience a force. The rest of the wire, outside the field, feels no magnetic force (though it still carries current and has resistance).\n\n+ This is a common trick in exam questions — always check whether the wire length given is the total wire length or only the part in the field.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain why the negative half of an AC generator's output graph does NOT mean \"no current.\" What does it actually represent? (2 steps)", "answer": "- Step 1: The AC output is a sine wave that goes positive, passes through zero, goes negative, passes through zero, and repeats. The positive part represents current flowing in one direction; the negative part represents current flowing in the OPPOSITE direction.\n\n- Step 2: The negative half of the sine wave is not \"no current\" — it's current flowing the other way through the circuit. The sign is just a convention to show direction. In a household AC supply (230 V in the UK), the voltage alternates between +325 V and −325 V (peak values), and the current alternates accordingly.\n\n+ This is why it's called \"alternating\" current — the current alternates (reverses) direction repeatedly, typically 50 times per second in the UK (50 Hz).", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A student asks: \"How can a wire experience a force when there's nothing touching it?\" Explain how this is possible using the concept of non-contact forces. (2 steps)", "answer": "- Step 1: This is a non-contact force — similar to gravity, which pulls objects toward Earth without any physical connection. The wire experiences a force because it is immersed in a magnetic field, and the current in the wire creates its own magnetic field. These two fields interact.\n\n- Step 2: On one side of the wire, the external field and the wire's field point in the SAME direction and reinforce each other (field lines bunch together). On the other side, they point in OPPOSITE directions and cancel. This creates a pressure difference — the wire is \"pushed\" from the crowded-field side toward the less crowded side. This is sometimes called the \"catapult effect.\"\n\n+ You can't see the magnetic field lines with the naked eye, but the effects are very real — the force is measurable ($$F = BIL$$). In the exam, just apply the formula and Fleming's rule; the intuition is for your understanding.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "State the three ways to strengthen an electromagnet. How is this different from the three ways to make a motor spin faster? (2 steps)", "answer": "- Step 1: Three ways to strengthen an electromagnet:\n+ More turns of wire (more coils)\n+ More current (higher current)\n+ Use an iron core (iron is easily magnetised)\n\n- Step 2: Three ways to make a motor spin faster (from $$F = BIL$$):\n+ More current (higher $$I$$)\n+ Stronger magnets (higher $$B$$)\n+ More turns on the coil (effectively more $$L$$)\n\n+ The overlap is \"more coils\" and \"more current,\" but the reasoning differs. For an electromagnet, you're making a stronger magnet. For a motor, you're increasing the force on the coil. The exam sometimes swaps the question to catch students who memorise without understanding — read carefully whether it asks about an electromagnet or a motor.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In the DC motor diagram, the commutator is described as having a \"gap.\" What happens at this gap, and why is it important? (2 steps)", "answer": "- Step 1: The split-ring commutator is literally a circular conductor split into two halves with a small gap between them. As the coil rotates, each brush (stationary carbon contact) touches one half of the ring. At one point in every rotation, the gap passes under the brushes — for a brief moment, the circuit is broken (no contact).\n\n- Step 2: This break happens exactly when the coil passes through the vertical position (perpendicular to the field), where the forces on both sides would cancel anyway (no turning effect). The brief break doesn't stop the motor because there's no turning force at that instant. Immediately after, the other half of the ring makes contact, reversing the current.\n\n+ This is different from slip rings in a generator, where the circuit NEVER breaks — the rings are complete circles, so contact is continuous.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the difference between magnetic flux $$\\phi$$ and magnetic flux density $$B$$? (1 step)", "answer": "- Magnetic flux density $$B$$ is the strength of the magnetic field (how concentrated the field lines are) — measured in tesla (T).\n- Magnetic flux $$\\phi$$ is the TOTAL quantity of magnetic field passing through an area — measured in weber (Wb).\n\nThe relationship is: $$\\phi = BA \\cos \\theta$$, where $$A$$ is the area and $$\\theta$$ is the angle between the field and the normal to the surface. If you think of $$B$$ as \"how dense the rain is,\" then $$\\phi$$ is \"how much rain falls on your umbrella.\"\n\n+ This distinction matters for spec point 105 and later when learning Faraday's law ($$\\mathcal{E} = -\\frac{d(N\\phi)}{dt}$$).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A wire is placed in a magnetic field but no force is measured on it. Give three possible reasons why the force might be zero, based on the formula $$F = BIL \\sin \\theta$$. (3 steps)", "answer": "Based on the formula $$F = BIL \\sin \\theta$$, a zero force could result from:\n\n+ Reason 1: Zero current ($$I = 0$$) — the wire is not connected to a power supply, or the circuit is open\n+ Reason 2: Zero magnetic flux density ($$B = 0$$) — there's no magnetic field present (perhaps the magnets are not positioned correctly)\n+ Reason 3: Wire parallel to the field ($$\\theta = 0^\\circ$$) — if the wire lies along the direction of the field lines, $$\\sin 0^\\circ = 0$$, so no force\n\n+ A fourth possibility: Zero length in the field ($$L = 0$$) — the wire lies entirely outside the region where the magnetic field exists", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Explain why, in an AC generator, the induced e.m.f. is zero when the coil is in the horizontal position (plane of coil parallel to the field lines). (3 steps)", "answer": "- Step 1: When the coil is horizontal (its plane parallel to the field), the two long sides of the coil are moving vertically — one up, one down. BUT at this instant, this vertical motion is PARALLEL to the magnetic field lines.\n\n- Step 2: Remember: induction requires the conductor to CUT ACROSS the field lines, not move along them. When moving parallel to the field lines, no field lines are being \"cut,\" so no e.m.f. is induced.\n\n- Step 3: This is the zero-crossing point on the AC sine wave. After this instant, the sides start moving in the opposite direction relative to the field, so the induced e.m.f. reverses (goes negative).\n\n+ The e.m.f. is maximum when the coil sides move PERPENDICULAR to the field (cutting across it most rapidly), and zero when they move PARALLEL (not cutting at all).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A DC motor is connected to a battery. If you reverse the battery connections (swap + and −), which way does the motor spin? (1 step)", "answer": "The motor spins in the REVERSE direction.\n\nWhen you reverse the battery, the current direction reverses throughout the entire circuit. By Fleming's Left-Hand Rule, reversing the current (while keeping the magnetic field the same) reverses the force direction on each side of the coil. What was \"up\" becomes \"down,\" and vice versa — so the motor spins the opposite way.\n\n+ This is useful to know: to reverse a motor's direction, either reverse the current OR reverse the magnetic field (swap the magnet poles). Do both, and it spins the same way as before.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What would happen if you used slip rings in a DC motor instead of a split-ring commutator? (2 steps)", "answer": "- Step 1: Slip rings are two complete rings that maintain continuous contact with the external circuit. Each coil end stays permanently connected to one ring. This means the current direction in the coil never reverses — it stays the same regardless of rotation.\n\n- Step 2: Without current reversal, after half a rotation the forces on the coil sides would reverse (one side that was pushed up is now on the opposite side). The forces would now oppose each other, canceling the turning effect. The motor would only turn a half revolution at most, then get stuck.\n\n+ Slip rings give AC output (generator); commutator gives DC output (motor). Using the wrong one breaks the device's function.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A student writes in an exam: \"The commutator stops the wires from getting tangled.\" Why is this incorrect, and what is the correct explanation? (2 steps)", "answer": "- Step 1: This is one of Alex's \"three mistakes\" that was deliberately planted for correction. The statement is wrong because the commutator's purpose has nothing to do with preventing tangling.\n\n- Step 2: The correct explanation: The split-ring commutator reverses the direction of the current in the coil every half turn. This keeps the force on each side of the coil pointing in the same direction (one side always pushed up, the other always pushed down), so the coil continues rotating continuously in one direction.\n\n+ The word \"tangling\" has no place in a description of how a commutator works. This kind of error would lose marks in an exam — learn the precise explanation.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "Calculate the force on a 30 cm wire carrying 4.0 A perpendicular to a 0.25 T field. Then state what the force would be if the wire were turned to lie at 30° to the field. (3 steps)", "answer": "- Step 1: For perpendicular wire ($$\\theta = 90^\\circ$$):\n$$F = BIL = (0.25)(4.0)(0.30) = 0.30 \\text{ N}$$\n\n- Step 2: For wire at 30° to the field:\n$$\\sin 30^\\circ = 0.5$$\n$$F = BIL \\sin \\theta = (0.25)(4.0)(0.30)(0.5) = 0.15 \\text{ N}$$\n\n- Step 3: The force at 30° is exactly half the perpendicular force. This makes sense — only the component of the wire perpendicular to the field contributes to the cutting action.\n\n+ This illustrates the general principle: the force decreases as the wire aligns more with the field direction, reaching zero when perfectly parallel.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a DC motor, what holds the rotating coil in place and completes the electrical circuit? Name the two components involved. (1 step)", "answer": "- The coil (also called the armature) is held in place and can rotate between the magnet poles, typically mounted on a shaft/axle.\n- The circuit is completed by the brushes — stationary carbon blocks that press against the rotating commutator (or slip rings in a generator). The brushes are fixed, while the commutator rotates, maintaining electrical contact.\n\n+ In a motor: magnets (provide field) → coil (carries current) → commutator (reverses current) → brushes (complete circuit to battery).", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Explain why an AC generator produces a smooth sine wave output, not a square wave or some other shape. (2 steps)", "answer": "- Step 1: As the coil rotates uniformly in the magnetic field, the rate at which the coil sides cut across the field lines changes smoothly. When the coil plane is parallel to the field (vertical), the sides cut across most rapidly → maximum e.m.f. When the coil passes through horizontal, the sides move parallel to the field → zero cutting → zero e.m.f.\n\n- Step 2: Between these extremes, the cutting rate changes smoothly. The mathematics of uniform circular motion means the induced e.m.f. follows a sine function: $$\\mathcal{E} = \\mathcal{E}_{max} \\sin(\\omega t)$$. The sine function is the natural result of uniform rotation in a uniform magnetic field.\n\n+ This is different from a square wave, which would imply sudden reversals — not what happens in a smoothly rotating coil.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A student forgets which hand to use for Fleming's rule and guesses. What is the simplest way to remember whether it's left or right, and what each hand is used for? (1 step)", "answer": "Memorise this distinction:\n\n- **LEFT hand = MOTOR** (force on a current-carrying conductor, like a motor spinning)\n- **RIGHT hand = GENERATOR** (induced current, like a generator producing electricity)\n\nSimple memory aid: \"Left Motor, Right Generator\" — both start with L and R respectively, and the words also hint at the function (M for Motion/Force in motor, G for Generate in generator).", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "When calculating the force on a wire, what unit conversion is most commonly forgotten, leading to wrong answers? (1 step)", "answer": "Converting centimetres to metres. Length must be in metres for the formula to yield force in newtons with the correct unit (tesla).\n\nFor example, a 12 cm wire must be entered as 0.12 m, not 12. Forgetting this converts 0.24 N into 0.0024 N — a 100× error that's easy to make but devastating to the answer.\n\n+ Always write \"L = ... cm = ... m\" as your first step in calculations. This habit prevents the most common calculation error in this topic.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In the AC generator, the coil is connected to the external circuit through slip rings and brushes. Why are brushes necessary if the rings already conduct? (1 step)", "answer": "The slip rings rotate with the coil, but the external circuit (wires leading to the load) must remain stationary. The brushes are stationary carbon blocks that press against the rotating rings, maintaining electrical contact while allowing rotation.\n\nWithout brushes (or some sliding contact), the rotating coil would have wires twisted around it instantly. The brushes allow continuous electrical connection while the coil spins freely.\n\n+ In a motor, the same principle applies — brushes press against the rotating commutator to complete the circuit to the stationary battery wires.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "A wire is placed in a uniform magnetic field. If you gradually rotate the wire from perpendicular to parallel to the field, describe how the force changes. (2 steps)", "answer": "- Step 1: At perpendicular ($$\\theta = 90^\\circ$$), force is maximum: $$F = BIL$$\n\n- Step 2: As the wire rotates toward parallel:\n+ At 60°: $$\\sin 60^\\circ \\approx 0.866$$ → $$F \\approx 0.866 BIL$$ (about 87% of max)\n+ At 45°: $$\\sin 45^\\circ \\approx 0.707$$ → $$F \\approx 0.707 BIL$$ (about 71% of max)\n+ At 30°: $$\\sin 30^\\circ = 0.5$$ → $$F = 0.5 BIL$$ (half of max)\n+ At 0° (parallel): $$\\sin 0^\\circ = 0$$ → $$F = 0$$\n\n+ The force decreases smoothly (not linearly — it's the sine function) until it reaches zero when perfectly parallel.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Why can't a simple straight wire in a magnetic field be used to build a practical motor? (2 steps)", "answer": "- Step 1: A straight wire experiencing a force would just move sideways and exit the magnetic field — it can't rotate continuously. There's no mechanism to convert the linear force into rotational motion.\n\n- Step 2: A motor needs a LOOP or COIL of wire. When formed into a loop:\n+ One side of the loop is pushed up, the other is pushed down\n+ These opposite forces create a turning effect (a couple)\n+ The loop rotates around the central axis\n+ With a commutator, this rotation continues indefinitely\n\n+ The coil shape is essential — it converts the linear force into continuous rotation. This is exactly what happens in every real motor, from tiny DC motors to massive industrial motors.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What evidence shows that electromagnetic induction is a reversible process with motors? (1 step)", "answer": "The same device can often act as both a motor and a generator:\n\n- If you supply electrical energy (a battery), it spins (motor)\n- If you spin it mechanically (with your hand or a turbine), it generates electrical energy (generator)\n\nThis is why the equations and rules are mirror images:\n+ Motor: electrical energy → kinetic energy ($$F = BIL$$)\n+ Generator: kinetic energy → electrical energy (induced e.m.f.)\n\nIn fact, an ideal motor-generator (like a flywheel system) could theoretically convert back and forth with no energy loss — showing they're truly the reverse of each other.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}], "count": 44}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why does a current-carrying wire placed in an external magnetic field experience a force, even though nothing is physically touching it? (3 steps)", "answer": "- Step 1: A current is just moving charge, and any moving charge produces its own magnetic field — concentric circles around the wire (right-hand grip rule). So the wire is itself a tiny electromagnet.\n- Step 2: When you place this wire inside another magnetic field, the two fields overlap and interact. On one side of the wire the two fields add (denser lines), on the other side they cancel (sparser lines). This produces an asymmetric \"catapult field.\"\n- Step 3: Field lines behave like stretched elastic — they want to straighten out. The bunched-up side pushes the wire toward the sparse side, producing a net force perpendicular to both the wire and the external field. This is a non-contact (field) force, analogous to gravity.\n\nTakeaway: the force arises from two magnetic fields interacting, not from any mechanical contact.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "State the formula for the force on a current-carrying conductor in a magnetic field, and identify what each symbol and its SI unit represents.", "answer": "The formula is $$F = BIL\\sin\\theta$$. Here $$F$$ is the force on the wire in newtons (N), $$B$$ is the magnetic flux density in tesla (T), $$I$$ is the current through the wire in amperes (A), $$L$$ is the length of wire inside the field in metres (m), and $$\\theta$$ is the angle between the wire and the magnetic field direction. The crucial detail is that $$\\theta$$ is measured between the wire and $$B$$ — NOT between the wire and the force. The force itself always comes out perpendicular to both $$B$$ and the wire.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does the factor $$\\sin\\theta$$ appear in $$F = BIL\\sin\\theta$$ rather than $$\\cos\\theta$$ or no angle term at all? (3 steps)", "answer": "- Step 1: Only the component of the wire that lies across the field lines actually \"cuts\" the field and contributes to the force. If the wire is parallel to $$B$$, no current crosses any field line, so no interaction occurs.\n- Step 2: Decomposing the wire's direction into a component perpendicular to $$B$$ (which is $$L\\sin\\theta$$) and a component parallel to $$B$$ (which is $$L\\cos\\theta$$), only the perpendicular component generates force.\n- Step 3: Hence $$F = BI(L\\sin\\theta)$$. This gives maximum force at $$\\theta = 90°$$ (wire fully across the field) and zero force at $$\\theta = 0°$$ (wire lying along the field).", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "When a wire is rotated from perpendicular to a field down to an angle of 30° with the field, how does the force change qualitatively?", "answer": "At 90° the force is at its maximum value $$F_{\\max} = BIL$$. At 30°, the factor $$\\sin 30° = 0.5$$, so the force is exactly half of the maximum. The intuition: tilting the wire reduces how much of it is \"across\" the field — at 30° only half of its length is effectively cutting field lines. At 0° (wire parallel to $$B$$) the force vanishes entirely because nothing crosses the field.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Define magnetic flux density $$B$$ operationally from the motor-effect equation, and give its SI unit in base units. (2 steps)", "answer": "- Step 1: Rearranging $$F = BIL$$ (for perpendicular orientation) gives $$B = \\frac{F}{IL}$$. So $$B$$ is the force per unit current per unit length on a wire placed perpendicular to the field.\n- Step 2: Its SI unit follows directly: $$[B] = \\frac{\\text{N}}{\\text{A}\\cdot\\text{m}} = \\text{N A}^{-1}\\text{m}^{-1}$$, which is defined as one tesla (T).\n\nPhysical picture: $$B$$ measures how densely packed the field lines are — a strong field means lines crammed close together.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Roughly how strong is a 1 T magnetic field compared to everyday references, and what does this tell you about typical lab values?", "answer": "One tesla is an extremely strong field — about $$10^4$$ times the Earth's magnetic field in Europe (~50 μT). A typical lab ceramic magnet produces about 0.1–0.5 T, while an MRI machine reaches ~1.5–3 T. So if a calculation gives you several tesla for a small bar magnet, you've made an error; if it gives microtesla, that's probably the Earth's field territory.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "State Fleming's left-hand rule completely: which hand, which digit represents what, and which directions do they point in? (3 steps)", "answer": "- Step 1: Use the LEFT hand (left = motor / force on a current). The right hand is reserved for induced current in a generator — mixing them is a classic error.\n- Step 2: Hold thumb and first two fingers mutually perpendicular:\n+ First finger → Field $$B$$, pointing from N to S\n+ seCond finger → Current $$I$$, pointing in the direction of conventional current (+ to −)\n+ thuMb → Motion / Force $$F$$, the direction the wire is pushed\n- Step 3: Memory hook: First = Field, seCond = Current, thuMb = Motion. The thumb's direction is always perpendicular to both the field and the wire.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why must you fix the field and current fingers FIRST and only then read off the thumb's direction, rather than rotating your hand to match an expected answer?", "answer": "Because the geometry of the rule is rigid: the force direction is uniquely determined once you lock the field and current. If you try to twist your hand so the thumb points where you \"think\" the answer should be, you'll inevitably misalign one of the other two fingers and get the wrong force, the wrong current, or the wrong field direction. The discipline is: First finger onto the field (N→S), seCond finger onto the conventional current, then accept whatever direction the thumb naturally lands in.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "A question gives you electron flow rather than conventional current. How does this affect your application of Fleming's left-hand rule? (2 steps)", "answer": "- Step 1: Conventional current is defined as the direction positive charge would move (from + terminal to − terminal externally). Electrons, being negative, flow in the opposite direction.\n- Step 2: So if the question states electrons flow east, you must point your seCond finger west (the conventional current direction). Forget this flip and every force direction you derive will be reversed.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "On a radial-field diagram with a North pole at the centre and South poles all around, the field at a marked point runs vertically up the page and the current at that point runs horizontally to the right. Which way does the force point? (3 steps)", "answer": "- Step 1: The field points from N (centre) outward to S, i.e. up the page at this location. Place your left First finger pointing up the page.\n- Step 2: The current runs to the right. Rotate your hand so the seCond finger points to the right while keeping the First finger up.\n- Step 3: Your thuMb now naturally points OUT of the page (toward you). So the force on the wire is out of the page.\n\nCommon pitfall: don't read a 2-D diagram as if the poles are stacked vertically in 3-D — they lie in the same plane. The field is purely radial in the plane of the page.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why do the two sides of a single rectangular coil placed between N and S magnetic poles experience forces in opposite directions? (3 steps)", "answer": "- Step 1: Current must enter the coil at one terminal, loop around, and exit at the other terminal. This means on one side of the coil the current flows (say) into the page, and on the opposite side it flows out of the page.\n- Step 2: The external field $$B$$ runs in a single direction (N→S) across both wires. Applying Fleming's left-hand rule to each side:\n+ Side with current out of the page: thumb points up — force upward\n+ Side with current into the page: thumb points down — force downward\n- Step 3: The two opposing forces form a couple (a turning effect) that rotates the coil — this is the principle of a motor.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Without a commutator, a simple current loop in a magnetic field rotates only a half-turn and then gets stuck. Why? (3 steps)", "answer": "- Step 1: Initially the two coil sides experience equal and opposite forces (one up, one down), which form a couple that rotates the coil.\n- Step 2: After a half-turn, the side that was originally going \"up\" is now on the bottom — but the current direction in that side hasn't changed, while its position relative to the field poles has flipped. So the force on that side still pushes \"up,\" but \"up\" is now the wrong direction to continue the rotation.\n- Step 3: At the vertical position the forces line up along the axis of the coil, producing zero turning moment — the coil overshoots slightly and then oscillates back. It cannot complete a full rotation.\n\nThis is exactly the problem the split-ring commutator solves.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Explain mechanically and electrically what a split-ring commutator does every half rotation of a DC motor's coil. (4 steps)", "answer": "- Step 1: The commutator is one ring split into two semicircular halves separated by small gaps. Each half is connected to one end of the coil.\n- Step 2: Two stationary carbon brushes press against the rotating ring, one on each side. As the coil rotates, each half of the ring slides past the brushes.\n- Step 3: Every half-turn, the gap passes under each brush. After the gap, the brush that was previously touching half-A now touches half-B (and vice versa). This swaps which end of the coil is connected to + and which is connected to −, effectively reversing the current direction inside the coil.\n- Step 4: Because the coil has also physically rotated by 180°, the side that was going \"up\" is now on the bottom — but with its current reversed, Fleming's rule still gives it an upward force. Result: the force on each side always pushes in the direction that continues the rotation.\n\nNet effect: continuous rotation in one direction from a steady DC supply.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Identify the three independent ways to make a DC motor spin faster, and justify each by referring to $$F = BIL$$. (3 steps)", "answer": "- Step 1: From $$F = BIL$$, the force (and hence turning effect) is proportional to each of $$B$$, $$I$$, and $$L$$. Increase any one and the force on the coil increases.\n- Step 2: The three practical changes:\n+ Increase the current $$I$$ (e.g. higher battery voltage, or use a lower-resistance conductor like copper)\n+ Use stronger permanent magnets (higher $$B$$)\n+ Add more turns to the coil (increases effective $$L$$ in the field — each extra turn adds another length of wire experiencing the force)\n- Step 3: More force on each side of the coil means a bigger couple, larger angular acceleration, higher rotational speed.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why does \"more turns of wire\" on the coil make a motor stronger, given that the coil itself doesn't physically grow larger?", "answer": "Each turn of wire adds another length of conductor that sits inside the magnetic field and carries the current. From the motor's perspective, $$N$$ turns is equivalent to one wire of total length $$N \\times L$$ experiencing the field. So the total force on each side of the coil scales with the number of turns. Crucially, the extra wire stays packed in the same small region close to the magnets where $$B$$ is strongest — you get more length without enlarging the device or moving wires into weaker field regions.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Distinguish carefully between the recipe for a stronger electromagnet and the recipe for a faster motor. Why does this distinction trip students up? (2 steps)", "answer": "- Step 1: The recipes look almost identical but apply to different devices:\n+ Stronger electromagnet: more coils, more current, add an iron core\n+ Faster motor: more current, stronger (permanent) magnet, more coils\n- Step 2: The trap is the iron core vs. stronger magnet swap. An electromagnet creates its own field from current, so an iron core (which becomes magnetised) amplifies it. A motor already uses permanent magnets to provide the external field, so you don't \"add a core\" — you use bigger/stronger permanent magnets. Read whether the question is about electromagnet or motor before choosing the recipe.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "State the energy transformation that takes place in a DC motor and in an AC generator, in the correct direction for each.", "answer": "A DC motor takes in electrical energy (from a battery or supply) and converts it into kinetic energy (rotational motion of the coil). An AC generator does the exact reverse: kinetic energy is supplied (something must physically spin the coil — wind, steam turbine, hand-crank) and is converted into electrical energy that flows out into the circuit. The two devices are mechanically and structurally very similar; the difference is purely which way energy flows. Examiners reward explicit statements like \"electrical energy in → kinetic energy out.\"", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "State the principle of electromagnetic induction and identify the two conditions that must be met for an e.m.f. to be induced. (3 steps)", "answer": "- Step 1: Principle: when there is relative motion between a conductor and a magnetic field, an e.m.f. (voltage) is induced across the conductor. If the conductor forms a closed circuit, a current flows.\n- Step 2: Two essential conditions:\n+ There must be relative motion between the conductor and the field (either the wire moves, or the magnet moves — only the relative motion matters)\n+ The conductor must cut across the field lines, not move along them\n- Step 3: No battery is needed — the energy comes from whatever does the moving (the kinetic energy of the mover is converted into electrical energy in the circuit).", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why does moving a conductor parallel to the magnetic field lines induce no e.m.f., even though the conductor is clearly moving?", "answer": "Induction requires the conductor to cut through field lines — i.e. to cross them transversely. If the conductor slides along the direction of the field lines, it doesn't intersect any new lines: the same field lines stay alongside it the whole time. Geometrically, only the component of velocity perpendicular to the field counts. Physically, an e.m.f. is induced because charges in the wire experience a force ($$F = qv \\times B$$) when they move across $$B$$; if $$v$$ is parallel to $$B$$, this force is zero. So \"cutting field lines\" is not a metaphor — it's a literal description of the motion that produces induction.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Compare the structure and function of a split-ring commutator versus slip rings, and explain why the choice determines whether the device outputs DC or AC. (4 steps)", "answer": "- Step 1: Split-ring commutator: one ring split into two semicircular halves with small gaps. Each coil end is connected to one half. Used in DC motors and DC generators.\n- Step 2: Slip rings: two complete, separate rings — no gaps. Each coil end stays permanently connected to its own ring. Used in AC generators.\n- Step 3: Functional consequence:\n+ With a commutator, every half-turn the brushes swap which half they touch — this reverses the current direction inside the coil but keeps the force (or external current) in the same sense\n+ With slip rings, no swapping occurs — the natural reversal of induced current as the coil flips sides is passed straight through to the external circuit\n- Step 4: Result: commutator → steady (one-direction) current externally (DC); slip rings → current that reverses every half-turn (AC, a sine wave).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why does the output of an AC generator naturally form a sine wave when plotted against time? (4 steps)", "answer": "- Step 1: As the coil rotates, the rate at which each side cuts field lines varies smoothly with the angle of rotation.\n- Step 2: When the coil is horizontal (its plane parallel to $$B$$), the wires are sweeping perpendicular to the field — they cut field lines at the maximum rate, so the induced e.m.f. is at its peak.\n- Step 3: When the coil is vertical (its plane perpendicular to $$B$$), the wires are momentarily moving parallel to the field — they cut no field lines, so the induced e.m.f. is zero.\n- Step 4: Between these positions the rate of cutting varies as $$\\sin$$ of the rotation angle. Since the angle increases linearly with time at constant rotation, the output traces a sine curve. The negative half of the curve corresponds to current flowing the other way (the coil sides have swapped positions relative to the magnets).", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "On the sine-wave output of an AC generator, what does the negative half of the cycle physically represent, and why is it not \"no current\"?", "answer": "The negative half is just as real as the positive half — it represents current of the same magnitude as the positive peak but flowing in the opposite direction round the circuit. The sign on the y-axis is a convention to indicate direction, not magnitude. Calling it \"alternating current\" literally means the current alternates direction every half cycle: forward, then backward, then forward, etc. Zero only occurs at the crossings (where the coil's plane is briefly perpendicular to $$B$$ and no field lines are being cut at that instant).", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why does a generator require a mechanical input even though it produces electrical energy — and where does that energy ultimately come from?", "answer": "Energy conservation: electrical energy doesn't appear from nothing. Something must do work against the resistive forces on the rotating coil. As current flows through the coil, that current itself experiences a force in the magnetic field ($$F = BIL$$) — and by Lenz's law, this force opposes the rotation. So the person/machine spinning the coil must continually push against this opposing force, doing mechanical work. That work is converted into electrical energy in the circuit. Energy chain: kinetic energy of the turbine/wind/hand → work against the induced opposing force → electrical energy in the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "A straight wire 0.12 m long carries 4.0 A perpendicular to a uniform field, and the measured force is 0.24 N. Conceptually, what is the field strength and is the answer physically reasonable? (3 steps)", "answer": "- Step 1: With wire perpendicular to field, $$F = BIL$$, so $$B = F/(IL) = 0.24/(4.0 \\times 0.12)$$.\n- Step 2: The denominator is about 0.48, giving $$B \\approx 0.5$$ T.\n- Step 3: Sense-check: 0.5 T is a strong but realistic lab magnet — about $$10^4$$ times the Earth's field, consistent with a pair of ceramic magnets. If you'd got several tesla, that would have suggested an arithmetic slip.\n\nTakeaway: always sanity-check $$B$$ against everyday references (Earth ~50 μT, fridge magnet ~5 mT, lab magnet ~0.5 T, MRI ~2 T).", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A 0.25 m wire carrying 3.0 A sits in a 0.40 T field. Without computing exact numbers, compare the force when the wire is perpendicular versus at 30° to the field. (2 steps)", "answer": "- Step 1: At 90° (perpendicular), $$F = BIL$$ gives the maximum force.\n- Step 2: At 30°, the $$\\sin\\theta$$ factor becomes $$\\sin 30° = 0.5$$, exactly halving the force. So the 30° case produces half the perpendicular value.\n\nConceptual point: only the component of the wire across the field contributes. Tilting from 90° down to 30° drops the effective \"crossing\" length to half, hence half the force.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "In a DC motor diagram, the left magnet is South, the right is North, and the coil sits horizontally between them. One side of the coil has current flowing out of the page. Which way is the force on that side, and what about the other side? (3 steps)", "answer": "- Step 1: The field $$B$$ runs from N to S — in this case, from right to left across the page.\n- Step 2: Apply Fleming's left-hand rule to the side with current out of the page: First finger points left (field direction), seCond finger points out of the page (current). Thumb points upward — force is UP on this side.\n- Step 3: The other side of the coil carries current INTO the page (since it's a single loop). Re-applying the rule with the seCond finger reversed flips the thumb — force is DOWN on the other side. This produces the couple that rotates the coil.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why is the force on a current-carrying wire described as a \"non-contact force,\" and what familiar everyday force is it analogous to?", "answer": "The force acts across empty space between the magnet and the wire — there's no rod, string, or solid object physically connecting them. The magnetic field is the mediator: one magnet sets up the field, the current's own field interacts with it, and the result is a push or pull transmitted through the field itself. This is the same character of force as gravity (a planet pulls a satellite without touching it) or the electric force between charges. Non-contact forces feel mysterious because we can't see the mediator, but they obey precise mathematical rules — in this case $$F = BIL\\sin\\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why is the wire in a magnetic field correctly called an \"electromagnet\" rather than an \"induced magnet\"? (2 steps)", "answer": "- Step 1: An induced magnet is one that becomes magnetic temporarily because another magnet's field aligns the domains inside a ferromagnetic material (e.g. an iron nail near a magnet). The magnetism comes from the proximity of another magnet.\n- Step 2: A current-carrying wire is magnetic because the current itself generates a magnetic field — this happens regardless of whether any other magnet is nearby. The source of magnetism is electrical (moving charge), so the correct name is electromagnet. This vocabulary distinction matters in exam answers.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "In the AC generator, the brushes touch the slip rings rather than touching the rotating coil directly. Why is this physically necessary?", "answer": "The coil is rotating continuously, so any wire directly attached to it would twist and snap after a few rotations. The slip rings solve this: they are fixed to the rotating coil and turn with it, but their cylindrical surface is smooth and continuous. Stationary brushes (typically carbon blocks pressed against the rings by springs) maintain sliding electrical contact without any wires having to twist. Current can therefore pass from the rotating coil into the stationary external circuit indefinitely. The same principle applies to commutators in motors — the brushes are the bridge between the rotating and stationary parts.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "When a coil in an AC generator is in the vertical position (its plane perpendicular to the field), the induced e.m.f. is momentarily zero. Why, when the coil is still rotating just as fast?", "answer": "At that instant, each side of the coil is moving directly along the field lines (parallel to $$B$$), not across them. Even though the angular speed is unchanged, the velocity of each wire is momentarily parallel to the magnetic field, so the wires cut no field lines — no induction. A fraction of a second later the coil has rotated enough that the wires start moving across the field again, and the e.m.f. begins climbing back. This is why the sine-wave output passes smoothly through zero twice per revolution.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Why is it crucial in induction questions to specify \"relative motion\" rather than just \"moving the conductor\" or \"moving the magnet\"? (2 steps)", "answer": "- Step 1: From the conductor's perspective, the only thing that matters physically is whether the magnetic field lines are sweeping past it. Whether you move the wire while the magnet is still, or move the magnet while the wire is still, or move both — the induced e.m.f. depends only on the rate at which their relative positions change.\n- Step 2: Saying \"relative motion\" makes this symmetry explicit. In a power-station generator, the coil rotates while the magnets are fixed; in some designs the magnets rotate inside a fixed coil — both work identically because what matters is the relative cutting of field lines.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Suppose you connected a DC motor backwards by spinning its shaft mechanically instead of supplying current. What would happen and what does this reveal about motors and generators? (3 steps)", "answer": "- Step 1: Spinning the shaft forces the coil to rotate through the magnetic field. Its sides now cut field lines, so an e.m.f. is induced in the coil — exactly the generator effect.\n- Step 2: Because the motor uses a split-ring commutator, the induced current direction in the external circuit gets reversed every half-turn back to the same sense — so you'd actually get pulsed DC output, not AC.\n- Step 3: Reveals: motors and generators are the same machine in principle, distinguished only by which way energy flows (electrical in vs. electrical out) and whether you use a commutator (DC) or slip rings (AC). The underlying physics — current, field, force, motion — is identical.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A wire of length 0.080 m sits perpendicular to a 0.60 T field. Without doing precise calculation, roughly what current is needed to produce 0.12 N of force? (2 steps)", "answer": "- Step 1: From $$F = BIL$$, rearrange to $$I = F/(BL)$$. The denominator is roughly $$0.6 \\times 0.08 \\approx 0.05$$.\n- Step 2: So $$I \\approx 0.12/0.05 \\approx 2.5$$ A. Sanity check: this is a typical lab current, achievable from a small power supply, so the answer is physically reasonable.\n\nConceptual takeaway: to get force in the range of tenths of a newton with a strong (~0.5 T) magnet and a few-cm wire, you need amps, not milliamps.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why does pushing a bar magnet quickly into a coil produce a larger induced e.m.f. than pushing it slowly? (3 steps)", "answer": "- Step 1: The induced e.m.f. depends on how rapidly field lines are cut by the conductor (or equivalently, how rapidly the flux through the coil changes).\n- Step 2: Pushing the magnet faster means each turn of wire intercepts the same field lines in less time — the rate of cutting is higher.\n- Step 3: Higher rate of flux change → larger induced e.m.f. This previews Faraday's law: $$\\mathcal{E} = -d(N\\phi)/dt$$, which makes this quantitative. The qualitative version (faster motion → bigger e.m.f.) is examinable without the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "What three factors affect the e.m.f. induced in a coil when there is relative motion between the coil and a magnet?", "answer": "Three factors determine the magnitude of the induced e.m.f.: (1) the strength of the magnet (larger $$B$$ means more field lines for the conductor to cut); (2) the speed of relative motion (faster motion cuts lines more rapidly); (3) the number of turns on the coil (each turn contributes to the total induced e.m.f., so $$N$$ turns gives $$N$$ times the e.m.f. of one turn). Together these correspond to the factors in Faraday's law $$\\mathcal{E} \\propto d(N\\phi)/dt$$, where $$\\phi = BA$$ scales with field strength, $$N$$ is turns, and $$d/dt$$ is set by the speed.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A model answer to \"explain how a DC motor works\" should follow a logical chain. State the six-step structure that earns full marks. (6 steps)", "answer": "- Step 1: When current flows through the coil, each side carries current — but in opposite directions on opposite sides of the loop.\n- Step 2: Both sides of the coil sit in a magnetic field produced by the permanent magnets.\n- Step 3: By Fleming's left-hand rule (since the wire is an electromagnet whose field interacts with the external field), each side experiences a force perpendicular to both the current and the field.\n- Step 4: Because the currents on opposite sides flow in opposite directions, the forces on the two sides point in opposite directions — one up, one down. This forms a couple that rotates the coil.\n- Step 5: Every half-turn, the split-ring commutator reverses the direction of current in the coil.\n- Step 6: This reversal keeps the force on each side acting in the same rotational direction, so the coil continues to spin one way continuously rather than oscillating. Electrical energy in → kinetic energy out.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why does the split-ring commutator briefly break the circuit at the vertical coil position, and why doesn't this stop the motor?", "answer": "The split ring has two small gaps where the brushes pass over the cut between the two halves. At the instant the coil is vertical (its plane along the field), each brush sits over a gap, so current momentarily stops. But this is also the instant when the coil's plane is along the field and the force-arms produce no useful turning effect anyway. The coil's rotational inertia carries it through this dead position; on the other side of the gap, the brushes contact the opposite half of the ring, reversing the current direction just as needed. The momentary break is a feature, not a bug — it coincides with the moment when current direction needs to swap.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why are commutator and slip rings such a frequent exam trap, and what is the foolproof one-line distinction?", "answer": "Both devices look superficially similar — a rotating cylindrical connector with stationary brushes — and both are taught in the same lesson, so students confuse them. The foolproof one-liner: a split-ring commutator reverses the coil's current every half-turn (turning AC inside the coil into DC outside, or letting DC input produce continuous rotation), while slip rings do NOT reverse anything — they simply maintain continuous contact, so the natural reversal of induced current is passed straight through, giving AC output. Commutator = forces current to \"behave\"; slip rings = lets nature take its course.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "When stating the direction of \"magnetic field\" in any physics answer, what is the universal convention?", "answer": "Magnetic field lines always point from North to South outside the magnet (and from South to North inside it, completing closed loops). So whenever a question asks \"which way does the field point?\" between two opposite poles, the answer is always from the N pole toward the S pole. Inside a horseshoe magnet's gap, this is typically drawn as horizontal arrows from N to S. This convention is non-negotiable — get it wrong and every Fleming-left-hand answer that follows will be reversed.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Suppose a wire is laid exactly along the direction of the magnetic field. Why is the force on it zero — and is this true regardless of how large the current is? (3 steps)", "answer": "- Step 1: Apply $$F = BIL\\sin\\theta$$ with $$\\theta = 0°$$. Then $$\\sin\\theta = 0$$, so $$F = 0$$ regardless of the values of $$B$$, $$I$$, or $$L$$.\n- Step 2: Physical reason: the current's own circular magnetic field wraps around the wire perpendicular to the wire's axis. If the external field is parallel to the wire's axis, the two fields are everywhere perpendicular to each other and the interaction produces no net push in any one direction — by symmetry, any small force on one side cancels with the force on the opposite side.\n- Step 3: So yes, even with enormous current, no force. You can pour 1000 A through a wire that lies along the field and it won't budge. This is why orientation matters as much as magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "In a generator, why does the induced current oppose the motion that creates it (Lenz's law preview), and how does this connect to energy conservation? (3 steps)", "answer": "- Step 1: When the coil rotates, an e.m.f. is induced, driving a current. That current itself flows in the magnetic field, so by $$F = BIL$$ the wires of the coil now experience a force.\n- Step 2: The direction of this force, you'd find by Fleming's left-hand rule, opposes the rotation that created the induced current. (If it didn't oppose, the system would self-accelerate from nothing — perpetual motion.)\n- Step 3: Energy conservation demands this opposition: whoever spins the coil must do work against the resisting force, and that work is precisely what becomes electrical energy in the circuit. No mechanical input → no electrical output. This is the qualitative content of Lenz's law.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Compare a hair dryer's motor and a wind turbine's generator: structurally similar, functionally opposite. What's the same, what's different?", "answer": "Same: both have a coil of wire, magnets (or electromagnets), some kind of brushes-and-rings system, and a spinning shaft. The geometry is essentially identical. Different: the hair dryer plugs into the wall — electrical energy flows in, the coil experiences $$F = BIL$$, and the shaft spins to drive the fan (electrical → kinetic). The wind turbine has wind pushing the blades — mechanical energy flows in, the coil cuts field lines and induces an e.m.f., and current flows out to the grid (kinetic → electrical). The split between motor and generator is therefore not a structural one but an energetic one: which direction does the energy flow.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why does adding an iron core to an electromagnet strengthen its field, but adding an iron core to the permanent magnets of a DC motor is not the standard way to make it faster?", "answer": "An electromagnet has no inherent field — it relies entirely on the current. The iron core becomes magnetised by the current's field and adds its own induced field, dramatically amplifying $$B$$. In a DC motor, however, the source of $$B$$ is already a permanent magnet (or sometimes a separate electromagnet). The standard ways to boost the motor are: increase the supply current, use stronger permanent magnets, or add more turns to the coil. While you can build motors with iron-cored field electromagnets (and many real motors do), in a typical exam question with permanent magnets, \"add an iron core\" doesn't apply to the rotor — it would be muddling the two device types.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "A power station typically has a turbine spun by steam, wind, or falling water, connected to a generator. Trace the energy chain from raw fuel to the electricity in your home. (4 steps)", "answer": "- Step 1: Fuel source (nuclear fission, coal combustion, wind kinetic energy, or gravitational PE of stored water) provides primary energy.\n- Step 2: This energy is converted to mechanical (kinetic) energy of motion — steam pushes turbine blades, wind directly turns the blades, water flows past a hydroturbine. The shaft spins.\n- Step 3: The spinning shaft turns the coil of a generator inside a magnetic field. Each wire of the coil cuts field lines, inducing an e.m.f.; via slip rings the alternating current flows out to the grid.\n- Step 4: Transformers raise the voltage for long-distance transmission, then drop it back down for home use. Energy chain: fuel → heat/kinetic → mechanical → electrical → delivered to homes. Every step is governed by the same principles met in this lesson.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why does a wire moving across a magnetic field develop an e.m.f. between its two ends, even before any current flows? (3 steps)", "answer": "- Step 1: Inside the wire are free electrons. When the wire moves through the field with velocity $$v$$ perpendicular to $$B$$, each electron experiences a magnetic force $$F = qv \\times B$$.\n- Step 2: This force pushes the electrons along the length of the wire toward one end, leaving the other end positively charged. A potential difference (e.m.f.) builds up between the two ends.\n- Step 3: The e.m.f. exists even in an open circuit — no current need flow. If you then connect a closed external circuit, the e.m.f. drives a current through it. This is why we talk about \"induced e.m.f.\" (always present when conditions are met) and \"induced current\" (only present when there's a complete circuit).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does the motor effect describe, and what causes the force on the wire? (3 steps)", "answer": "- Step 1: A current flowing in a wire produces its own circular magnetic field around the wire. This is a key prior fact — every current is a tiny magnet.\n- Step 2: If that current-carrying wire is placed inside an external magnetic field, the two magnetic fields interact. The field lines distort and \"pile up\" on one side of the wire and cancel on the other, producing what Alex called a *catapult field*.\n- Step 3: The imbalance pushes the wire sideways — perpendicular to both the external field and the current. This sideways push is the motor effect.\n\nThe takeaway: no field lines interacting means no force. The force exists because two fields can't occupy the same space comfortably.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "State the formula for the force on a current-carrying conductor in a magnetic field, naming every symbol and its SI unit.", "answer": "The formula is $$F = BIL \\sin\\theta$$, where:\n- $$F$$ is the force on the wire, in newtons (N).\n- $$B$$ is the magnetic flux density of the external field, in tesla (T).\n- $$I$$ is the conventional current in the wire, in amperes (A).\n- $$L$$ is the length of wire that lies inside the field, in metres (m).\n- $$\\theta$$ is the angle between the wire and the field direction (not between the wire and the force).\n\nThe angle is the most-confused symbol: it's measured from wire to field, so a wire perpendicular to the field has $$\\theta = 90^\\circ$$ and gets the maximum force.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does $$F = BIL\\sin\\theta$$ contain $$\\sin\\theta$$ and not $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: Only the component of the wire that lies *across* the field contributes to the force. The component lying *along* the field experiences no force because there's nothing for its own field to push against perpendicular to itself.\n- Step 2: If $$\\theta$$ is the angle between wire and field, then the \"across-the-field\" component of the wire's length is $$L\\sin\\theta$$ (the perpendicular projection), not $$L\\cos\\theta$$.\n- Step 3: Check the limits — at $$\\theta = 90^\\circ$$ (wire perpendicular to field), $$\\sin\\theta = 1$$ and force is maximum. At $$\\theta = 0^\\circ$$ (wire parallel to field), $$\\sin\\theta = 0$$ and force vanishes. Both match physical intuition.\n\nSo $$\\sin\\theta$$ encodes \"how much of the wire actually cuts across the field.\"", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Show how the tesla (T) is built from more fundamental SI units, starting from $$F = BIL$$. (2 steps)", "answer": "- Step 1: Rearrange to isolate $$B$$: $$B = \\dfrac{F}{IL}$$. Substitute the SI units of each quantity on the right.\n- Step 2: Units become $$\\dfrac{\\text{N}}{\\text{A} \\cdot \\text{m}} = \\text{N A}^{-1}\\text{m}^{-1}$$.\n\nSo $$1\\,\\text{T} = 1\\,\\text{N A}^{-1}\\text{m}^{-1}$$. This also tells you what 1 tesla \"means physically\": it's the field strength needed to exert 1 newton on each metre of wire carrying 1 amp.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Roughly how strong is 1 tesla compared to the Earth's magnetic field, and what does this tell you about typical lab values of $$B$$?", "answer": "The Earth's field in Europe is around 50 microtesla ($$\\sim 5 \\times 10^{-5}$$ T), so 1 T is roughly $$10^4$$ times stronger than Earth's field. A lab field of 0.5 T (a strong ceramic magnet) is therefore about 10,000× Earth's field — still well short of MRI magnets which sit at a few tesla. This sense-check matters: if you calculate a \"lab\" $$B$$ of 50 T from a school problem, something is wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "State Fleming's left-hand rule, including which digit represents what and the direction each digit points along.", "answer": "Hold the thumb and first two fingers of your **left** hand mutually perpendicular:\n- **First finger** = **Field** $$B$$, points from North to South.\n- **seCond finger** = **Current** $$I$$, points along conventional current (+ → −).\n- **thuMb** = **Motion/force** $$F$$, points the direction the wire is pushed.\n\nMnemonic: First-Field, seCond-Current, thuMb-Motion. The force is always perpendicular to both the field and the wire.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why must Fleming's *left* hand (not the right) be used for the motor effect? (2 steps)", "answer": "- Step 1: Two separate rules exist — the left-hand rule is for the *force on a current in a field* (motor effect), and the right-hand rule is for the *direction of induced current in a moving wire* (generator effect).\n- Step 2: They are physically opposite scenarios: in the motor, current is given and force results; in the generator, motion is given and current results. Using the wrong hand flips your direction by 180° and is a classic auto-loss-of-marks mistake.\n\nSo: motor → left. Generator → right.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "When applying Fleming's left-hand rule, why should you set the field and current fingers first, and read the thumb last?", "answer": "Because the thumb's direction is the *result* of physics, not your guess. If you pre-decide where the force \"should\" point and try to twist your hand to match, you'll often end up forcing the field or current fingers to point in unphysical directions. The disciplined order is: lock first finger on N→S (field), lock second finger on conventional current direction, then read off whatever direction your thumb naturally lands in — even if it surprises you.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "A question gives you the *electron flow* direction in a wire. How should you set the second finger of your left hand?", "answer": "Set the second finger *opposite* to the electron flow. Conventional current is defined as the direction positive charge would move, which is from + to −, while electrons (being negative) drift the other way. Fleming's rule uses **conventional current**, so always flip electron flow before placing the second finger. Forgetting this reverses the predicted force direction entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "A magnetic field points to the right and conventional current flows into the page. In which direction is the force on the wire? (3 steps)", "answer": "- Step 1: First finger (field) points to the right.\n- Step 2: Second finger (current) points into the page.\n- Step 3: Adjust your wrist until both fingers are in those directions — your thumb naturally points downward.\n\nSo the force is **downward**. (Practise this physically with your actual hand — it's faster than reasoning algebraically.)", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "In the radial-field motor diagram (N pole in centre, S ring outside), the field at a point runs upward and the current at that point runs left-to-right. Where does the force point? (3 steps)", "answer": "- Step 1: First finger up (field), seCond finger to the right (current).\n- Step 2: Position the left hand so both fingers point those ways.\n- Step 3: The thumb points **out of the screen** toward the reader.\n\nThis is exactly what happens at every point of a current loop in a radial field: the force at every point is tangential and consistent, which is why radial-field motors give very smooth torque.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why might a learner wrongly think the poles in a 2-D radial-field diagram are \"stacked\" in 3-D, and what's the correct reading?", "answer": "Because we instinctively read a circle around a dot as a sphere around a point — like a planet seen from above. But the diagram is *flat*: the N pole and the S pole both lie in the plane of the page, with N in the centre and S forming a ring around it. The field lines therefore radiate outward in the *plane*, not vertically. Don't invent a third dimension that isn't drawn.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "In a single-loop motor coil placed between N and S poles, why does one side of the loop get pushed up while the other gets pushed down? (3 steps)", "answer": "- Step 1: The two sides of a single loop are parts of the *same* wire, so by definition they carry current in opposite directions — one side carries current into the page, the other out of the page.\n- Step 2: Both sides sit in the same external field (N to S). Applying Fleming's left-hand rule to each side separately:\n+ Side with current out of the page → thumb points up → force up.\n+ Side with current into the page → second finger reverses → thumb points down → force down.\n- Step 3: Two equal and opposite forces acting on opposite sides of the coil form a *couple* — a turning effect. This is what spins the motor.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A simple coil placed in a magnetic field would only turn a half-turn and stick. Why does it stick, and what fixes it? (3 steps)", "answer": "- Step 1: Initially, the coil sides experience opposite forces (one up, one down) creating a couple that rotates the coil.\n- Step 2: After a half turn, the side that was \"up\" is now physically where the \"down\" side was. With the *same* current direction in the loop, Fleming's rule still pushes the same side upward, which now *opposes* further rotation — the coil oscillates and gets stuck.\n- Step 3: A split-ring commutator fixes this. Every half turn, it reverses the current direction in the coil, so the side that's now on top gets pushed up and the side on bottom gets pushed down. The couple keeps acting in the same rotational sense, and the coil keeps spinning one way.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Describe the role of the split-ring commutator in a DC motor, in one precise sentence.", "answer": "The split-ring commutator reverses the direction of current in the coil every half turn so that the force on each side of the coil remains in the same rotational sense, allowing continuous one-way rotation. This is the exam-marking sentence — note that \"stops the wires getting tangled\" is a planted error: that's not its job.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Walk through what physically happens at the commutator during one full rotation of a DC motor's coil. (4 steps)", "answer": "- Step 1: The brushes (stationary contacts connected to the battery) press against the rotating split ring. Each half of the ring is connected to one end of the coil.\n- Step 2: For the first half rotation, brush A touches half-ring A → current flows one way through the coil → force pushes side X up, side Y down.\n- Step 3: At the vertical position, the gap (split) in the ring passes under the brushes. The circuit *briefly breaks*, then reconnects with brush A now touching half-ring B (because the ring rotated with the coil).\n- Step 4: Current direction in the coil is now reversed. But the coil has also physically flipped, so the side now on top (formerly side Y) gets pushed up — rotation continues in the same direction.\n\nNet effect: the current reverses every half turn at the exact moment the coil flips, keeping the force always rotating the coil one way.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What three changes would make a DC motor spin faster, and why does each work? (3 steps)", "answer": "- Step 1: Increase the **current** $$I$$ (e.g. higher battery voltage, lower-resistance wire like copper). Since $$F = BIL$$, doubling $$I$$ doubles the force on each coil side.\n- Step 2: Use **stronger magnets** (larger $$B$$). Again from $$F = BIL$$, stronger field gives proportionally larger force.\n- Step 3: Add **more turns of wire** on the coil. Each turn adds another length of wire in the field; the total force is effectively multiplied by the number of turns. Adding turns also keeps the conductor close to the strong-field region near the magnets.\n\nAll three flow directly from reading $$F = BIL$$ as a multiplication.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What's the difference between \"how to make a stronger electromagnet\" and \"how to make a faster motor\"? Why does this distinction matter for exam wording?", "answer": "A **stronger electromagnet** needs: more coils, more current, and an iron core (the iron concentrates and amplifies the field). A **faster motor** needs: more current, stronger permanent magnets, and more coils on the rotating armature. They look similar but the iron-core/permanent-magnet swap is the giveaway — an electromagnet *generates* the field, whereas a motor *uses* an external field. Read the question carefully: \"electromagnet\" vs \"motor\" determines which recipe applies. Alex deliberately tests this swap.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "State the energy transfer happening in a DC motor, and contrast it with that in an AC generator.", "answer": "A DC motor converts **electrical energy in → kinetic energy out** (the battery supplies energy; the coil spins). An AC generator does the exact reverse: **kinetic energy in → electrical energy out** (something turns the coil; current flows in the wire). Examiners reward you for naming the energy transfer explicitly — write \"electrical energy in\" or \"kinetic energy in\" on the diagram if possible.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "What is electromagnetic induction in plain words, and what two conditions must be met for it to occur? (3 steps)", "answer": "- Step 1: Electromagnetic induction is the phenomenon where moving a conductor through a magnetic field (or moving a field past a conductor) produces a voltage (e.m.f.) in the conductor. If the conductor is part of a closed circuit, a current flows.\n- Step 2: Condition 1 — there must be **relative motion** between the conductor and the magnetic field. A stationary wire in a stationary field gives nothing.\n- Step 3: Condition 2 — the motion must **cut across the field lines**, not slide along them. Moving parallel to the lines doesn't sweep through any field, so no e.m.f. is induced.\n\nMemory phrase: \"cut across the field lines, not along them.\"", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why does moving a wire *along* a magnetic field line produce no induced e.m.f., even though the wire is moving?", "answer": "Induction requires the wire to sweep through field lines — to encounter new field as it moves. Moving along a field line means the wire stays on the same line, never crossing into different field. Equivalently, no magnetic flux is \"cut\" because the flux through any imagined sweep area is unchanged. Without flux change, no e.m.f. ($$\\mathcal{E} \\propto -\\mathrm{d}\\Phi/\\mathrm{d}t$$, and $$\\mathrm{d}\\Phi/\\ma
