thrm{d}t = 0$$ here).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does an AC generator produce alternating current rather than direct current? (4 steps)", "answer": "- Step 1: As the coil rotates, one side sweeps *up* through the field for a half rotation, then *down* through the field for the next half rotation.\n- Step 2: By the right-hand rule (induced current), the direction of induced current in that side depends on the direction of its motion relative to the field. So the current direction in each side of the coil reverses every half turn — this is inherent to the geometry.\n- Step 3: A generator uses **slip rings** (two complete rings, not split). Each end of the coil stays connected to its own ring throughout the rotation, so the natural reversal of current is passed straight through to the external circuit.\n- Step 4: The output current therefore alternates direction once per half-turn — i.e. it's alternating current (AC). Plotted against time, this gives a sine wave.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Compare a split-ring commutator and slip rings in a table-like answer: shape, connection, effect on current, and resulting output. (4 steps)", "answer": "- Step 1: **Shape** — Commutator: one ring split into two halves with a gap. Slip rings: two separate complete rings (no gap).\n- Step 2: **Connection to coil** — Commutator: each coil end swaps which brush it touches every half turn. Slip rings: each coil end stays connected to its own ring permanently.\n- Step 3: **Effect on current** — Commutator: actively reverses the current direction in the external circuit every half turn (and briefly breaks contact at the gap). Slip rings: don't reverse anything; let the coil's natural current direction pass through.\n- Step 4: **Output** — Commutator: keeps force in one rotational sense in a motor (so steady rotation from DC input). Slip rings: pass through alternating current to the external circuit.\n\nRule of thumb: commutator → DC motor; slip rings → AC generator.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "On a sine-wave AC output plot, what does the *negative* half of the wave actually represent physically?", "answer": "It represents the current flowing in the *opposite direction* in the external circuit — not zero current, not \"no current.\" The horizontal axis is the zero-current line; values above are current flowing one way, values below are current flowing the other way. The current never disconnects (slip rings maintain contact throughout), so the wave is continuous. \"Alternating\" literally means alternating direction.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Why is the magnetic flux through a rotating generator coil a *cosine* wave while the induced e.m.f. is a *sine* wave?", "answer": "As the coil rotates uniformly, the angle $$\\theta$$ between the coil's normal and the field is $$\\theta = \\omega t$$. Flux is maximum when the coil face directly faces the field, giving $$\\Phi = BA\\cos(\\omega t)$$ — a cosine. The induced e.m.f. is $$\\mathcal{E} = -\\mathrm{d}\\Phi/\\mathrm{d}t = BA\\omega\\sin(\\omega t)$$ — a sine. They are 90° out of phase: when flux is at a maximum (coil face perpendicular to field), the rate of change is zero, so e.m.f. = 0. When flux passes through zero (coil edge-on to field), it's changing fastest, so e.m.f. is at peak. The phase shift is geometric, not mysterious.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "A wire is \"an electromagnet\" but not \"an induced magnet\" when current flows through it. Why does this wording distinction matter?", "answer": "The wire is magnetic *because of its own current* — that's the definition of an **electromagnet**. An **induced magnet** would be a piece of soft iron that becomes magnetic only because another magnet is held near it (the field lines induce magnetisation in the iron). A current-carrying wire's magnetism doesn't depend on a nearby magnet — switch off the current and the magnetism vanishes. Using the wrong term loses marks because it implies the wrong physical mechanism.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "The motor effect is a \"non-contact\" force. What does that mean and what's a good analogy?", "answer": "Non-contact means the force acts through space without anything solid linking the source to the affected object — there's no string, push, or collision. Gravity is the classic non-contact force: the Earth pulls you down without touching you. Similarly, the magnetic field exerts a force on the current-carrying wire through the field itself, not through any material contact. In exams, just use $$F = BIL\\sin\\theta$$ and Fleming's rule — but knowing the conceptual category (non-contact / field force) helps explain it in words.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A 0.15 m wire carries 5.0 A perpendicular to a 0.20 T magnetic field. Walk through how to find the force conceptually (no calculator). (3 steps)", "answer": "- Step 1: Perpendicular means $$\\theta = 90^\\circ$$, so $$\\sin\\theta = 1$$, and the formula reduces to $$F = BIL$$.\n- Step 2: Estimate the orders of magnitude: $$B = 0.2$$, $$I = 5$$, $$L = 0.15$$. Multiply pairs: $$0.2 \\times 5 = 1$$, then $$1 \\times 0.15 = 0.15$$.\n- Step 3: So $$F \\approx 0.15\\,\\text{N}$$.\n\nSanity check: the force is in the \"small newtons\" range — reasonable for a thin wire in a modest field, not enough to lift a book but enough to deflect the wire visibly.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "If a wire is rotated from perpendicular to the field down to $$30^\\circ$$ from the field, by what factor does the force change, and why? (3 steps)", "answer": "- Step 1: At $$90^\\circ$$, $$\\sin\\theta = 1$$. At $$30^\\circ$$, $$\\sin\\theta = 0.5$$.\n- Step 2: Since $$F \\propto \\sin\\theta$$ (with $$B$$, $$I$$, $$L$$ unchanged), the force becomes half its perpendicular value.\n- Step 3: Intuition: only the *across-field* component of the wire contributes, and tilting reduces that projection. At $$30^\\circ$$, only half of the wire effectively cuts the field.\n\nSo tilting from 90° to 30° halves the force.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "You measure a force of 0.24 N on a 12 cm wire perpendicular to a field, carrying 4.0 A. Conceptually, how do you find $$B$$ and roughly what value should you expect? (3 steps)", "answer": "- Step 1: Convert length to metres: $$L = 0.12\\,\\text{m}$$ (this is essential — using cm gives a $$B$$ off by a factor of 100).\n- Step 2: Rearrange $$F = BIL$$ to get $$B = F/(IL)$$. The denominator $$IL$$ is roughly $$4 \\times 0.12 \\approx 0.5\\,\\text{A m}$$.\n- Step 3: So $$B \\approx 0.24 / 0.5 \\approx 0.5\\,\\text{T}$$.\n\nSense check: 0.5 T is a strong lab magnet, about 10,000× the Earth's field — physically reasonable for a pair of ceramic magnets used in school experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why must wire length always be converted from cm to m before applying $$F = BIL$$?", "answer": "Because $$B$$ is defined in tesla, and 1 T = 1 N A⁻¹ m⁻¹. The unit explicitly contains *metres*, not centimetres. If you plug in length in cm, your answer for $$F$$ comes out 100× too large (or your $$B$$ comes out 100× too small). The fix is mechanical: always convert to metres first, then compute. This is one of the most common unforced errors on this topic.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A motor uses a coil with $$N$$ turns instead of a single loop. Why does adding turns multiply the force on the coil by $$N$$?", "answer": "Each turn of wire is itself a complete loop carrying current $$I$$ in the field. Each loop experiences its own pair of forces (one side up, one side down) with magnitude $$F = BIL$$ per side. Stacking $$N$$ turns together effectively means $$N$$ wires all carry current along the same path, so the total force on each side is $$NBIL$$. This is why motors are wound with many turns — it's a cheap way to multiply force without needing huge currents or magnets. Equivalently, you can think of the effective wire length in the field as $$NL$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why does a generator output a sine wave specifically (rather than, say, a square wave or sawtooth)?", "answer": "Because the coil rotates *uniformly* (constant angular speed). The flux through the coil at angle $$\\theta = \\omega t$$ is $$\\Phi = BA\\cos(\\omega t)$$, which is naturally sinusoidal because the geometry projects onto the field as a cosine. The induced e.m.f. is its time derivative, $$\\mathcal{E} = BA\\omega\\sin(\\omega t)$$, also sinusoidal. A square wave would require sudden flips in flux, which is impossible for a smoothly rotating coil. The sine wave is a direct consequence of circular geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "What is the relationship between the frequency of AC output from a generator and the rotational speed of the coil?", "answer": "They are directly proportional — one full rotation of the coil produces exactly one complete cycle of the AC output (one positive half + one negative half). So if the coil spins at $$f$$ revolutions per second, the AC frequency is also $$f$$ Hz. Spinning the coil faster increases both the frequency *and* the peak voltage (since $$\\mathcal{E}_{\\text{peak}} = BA\\omega$$ scales with $$\\omega = 2\\pi f$$). UK mains AC is at 50 Hz, meaning the generator rotates effectively 50 times per second (for a single-pole-pair design).", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "State the four factors that affect the e.m.f. induced in a coil rotating in a magnetic field, and how each scales the output. (4 steps)", "answer": "- Step 1: **Magnetic flux density** $$B$$ — stronger field means more flux change per unit time, larger peak e.m.f.\n- Step 2: **Coil area** $$A$$ — larger area means more flux enclosed, so more flux change per rotation, larger peak e.m.f.\n- Step 3: **Number of turns** $$N$$ — each turn contributes its own induced e.m.f. and they add in series, multiplying total e.m.f. by $$N$$.\n- Step 4: **Angular speed** $$\\omega$$ (or frequency) — faster rotation means faster rate of flux change, larger peak e.m.f. ($$\\mathcal{E}_{\\text{peak}} = NBA\\omega$$).\n\nSo to increase generator output: stronger magnets, larger or more numerous coils, faster rotation.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "In the \"3 mistakes\" exercise, one planted error was \"each side feels a force upwards.\" Why is that wrong, and what's the correct statement?", "answer": "It's wrong because the two sides of a single coil carry current in *opposite* directions (they're parts of the same loop). When you apply Fleming's left-hand rule to each side, the field is the same but the current direction is reversed, so the forces come out in opposite directions — one side up, one side down. This couple is precisely what produces rotation. If both sides felt force in the same direction, the coil would just translate, not rotate, and no motor would work.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Why doesn't a DC motor need slip rings, and why doesn't an AC generator need a commutator?", "answer": "A DC motor takes in *direct current* from a battery (always one direction) and needs to actively *reverse* the coil current every half turn to keep rotation going — that reversal is exactly what a split-ring commutator does. Slip rings would just pass the DC through unchanged and the motor would stall. An AC generator does the opposite: it *wants* the natural reversal to reach the external circuit (to produce AC), so slip rings — which preserve the current direction in each coil end — are perfect. Adding a commutator to a generator would actively undo the reversal, giving a \"bumpy DC\" output instead of clean AC.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "A wire of length 0.30 m carries 4.0 A in a 0.25 T field, at 30° to the field. Walk through the force calculation conceptually. (3 steps)", "answer": "- Step 1: Start with $$F = BIL\\sin\\theta$$. Plug in: $$B = 0.25$$, $$I = 4.0$$, $$L = 0.30$$, $$\\sin 30^\\circ = 0.5$$.\n- Step 2: First multiply $$BIL$$ without the angle: $$0.25 \\times 4 = 1$$, then $$1 \\times 0.3 = 0.3\\,\\text{N}$$ (this would be the force at 90°).\n- Step 3: Apply the angle factor: $$0.3 \\times 0.5 = 0.15\\,\\text{N}$$.\n\nHabit tip: always compute $$BIL$$ first (the \"max force\"), then multiply by $$\\sin\\theta$$. It's easier than handling all four numbers at once.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why is the angle $$\\theta$$ in $$F = BIL\\sin\\theta$$ measured between the *wire* and the *field*, not between the wire and the force?", "answer": "Because the formula encodes \"how much of the wire cuts across the field.\" The component of the wire perpendicular to the field is $$L\\sin\\theta$$ when $$\\theta$$ is the wire-field angle. Measuring $$\\theta$$ to the force would be circular — the force direction is what we're trying to determine, not a given input. Also, the force is *always* perpendicular to the wire (by construction of Fleming's rule), so the angle between wire and force is always 90° and would carry no information. Watch out: some textbooks define $$\\theta$$ from the perpendicular instead, but the Edexcel spec uses wire-to-field.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "If a wire is parallel to the magnetic field ($$\\theta = 0°$$), explain physically why the force is zero — not just mathematically.", "answer": "When the wire lies along the field, its own circular magnetic field (around the wire) sits in a plane perpendicular to the external field. The two fields don't oppose each other on one side and reinforce on the other — they distribute symmetrically around the wire. There's no asymmetric \"piling up\" of field lines, so no catapult effect. Equivalently, no field lines are being \"cut\" by the wire's position relative to the external field. The $$\\sin 0° = 0$$ in the formula is just the mathematical expression of this geometric symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "In Faraday's-style thinking, what does it mean physically for a conductor to \"cut\" a magnetic field line?", "answer": "It means the conductor sweeps through space that has field lines passing through it, such that — as the conductor moves — field lines pass *across* the conductor's body. Imagine field lines drawn as physical strings: the wire moves sideways through them, and each string it passes across \"cuts\" against it. Mathematically, this corresponds to the wire sweeping out an area whose flux changes with time. Faster cutting = more lines crossed per second = larger induced e.m.f. Moving along the lines (parallel to them) cuts nothing because the wire stays on the same line.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Why does the brief circuit-break at the commutator's split gap *not* stop the motor from running smoothly?", "answer": "Because the break is extremely brief — it happens only at the instant the coil is vertical (where the force would be zero anyway, since the coil sides are moving along the field, not across it). At that instant, the motor's rotational inertia carries it past the dead point, and the moment the gap clears the brushes, the new half-ring connects and current flows in the reversed direction, immediately producing torque again. So the gap aligns with the dead point of zero torque — a clever bit of timing. Examiners may ask why the gap doesn't ruin the motion; this is the answer.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Inside a power station, what's the chain of energy conversions that leads to the electricity in your home? (3 steps)", "answer": "- Step 1: A primary energy source (nuclear fission, burning coal, wind, falling water) heats steam or turns blades, producing **rotational kinetic energy** in a turbine shaft.\n- Step 2: The shaft turns the coil of a large AC **generator**, with rotational kinetic energy as the input. Magnetic induction converts this to electrical energy.\n- Step 3: AC electricity is sent through transformers (stepping up to high voltage for long-distance transmission, then back down for safe domestic use) along power lines to homes.\n\nThe generator is the heart of every power station: kinetic in, electrical out.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why is the force on a wire always perpendicular to both the current and the field, never along either of them?", "answer": "Because the force arises from the interaction of two magnetic fields (the wire's own field and the external field). Both fields have geometric structure — the wire's field circles the wire, the external field is uniform. The asymmetric pressure produced by their superposition pushes the wire sideways. By symmetry, \"sideways\" means perpendicular to the wire (along its length there's no preferred direction) and also perpendicular to the field (the asymmetry is in the field plane). The only direction perpendicular to both is the mutual perpendicular — exactly what Fleming's thumb gives. This is also why the formula has $$\\sin\\theta$$: the perpendicular component of the wire is what matters.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "What is meant by \"induced e.m.f.\" and how does it differ from a battery's e.m.f.?", "answer": "Induced e.m.f. is the voltage generated in a conductor by changing magnetic flux through it (Faraday's law) — it has no chemical or external power source other than the kinetic energy of whatever is doing the moving. A battery's e.m.f. comes from chemical reactions inside the cell that separate charge and maintain a voltage. Both can drive currents in a circuit, but the induced e.m.f. lasts only as long as the flux is changing — stop the motion, and the e.m.f. drops to zero. A battery's e.m.f. persists until the chemicals are exhausted.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A common misconception is that a generator \"creates\" energy out of nothing because it makes current without a battery. Refute this. (3 steps)", "answer": "- Step 1: A generator doesn't create energy — it *converts* it. The input is mechanical (kinetic) energy from whatever turns the shaft (steam turbine, wind, hand crank).\n- Step 2: As the coil rotates, induced currents in the coil create their own magnetic fields that *push back* against the rotation (Lenz's law). To keep spinning the coil at the same speed, you must do work *against* this opposing force.\n- Step 3: The work you do (mechanical energy) is converted into electrical energy in the circuit (minus heat losses). Energy is conserved exactly. If you tried to draw electrical power without supplying mechanical input, the coil would simply decelerate and stop.\n\nSo: kinetic in → electrical out, with conservation of energy intact.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Why does an AC generator's output reach peak voltage when the coil is parallel to the field (edge-on), not perpendicular?", "answer": "Because peak voltage corresponds to peak *rate of change* of flux, not peak flux itself. When the coil is parallel to the field (edge-on), no flux passes through it, but as it rotates from this position, flux changes rapidly — the coil is sweeping through field lines at maximum speed. When the coil is perpendicular to the field (face-on), maximum flux passes through, but at that instant the rate of change is momentarily zero (the coil is at a turning point in flux). Since $$\\mathcal{E} = -\\mathrm{d}\\Phi/\\mathrm{d}t$$, e.m.f. peaks when flux is changing fastest — edge-on — and is zero when flux is at extreme — face-on. This 90° offset is why flux is cosine and e.m.f. is sine.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "A 0.080 m wire perpendicular to a 0.60 T field needs to feel a force of 0.12 N. What current is required, conceptually? (3 steps)", "answer": "- Step 1: Use $$F = BIL$$ (perpendicular, so no $$\\sin\\theta$$). Rearrange: $$I = F/(BL)$$.\n- Step 2: Compute the denominator: $$BL = 0.6 \\times 0.08 \\approx 0.048\\,\\text{T m}$$.\n- Step 3: Divide: $$I = 0.12 / 0.048 = 2.5\\,\\text{A}$$.\n\nSense check: a few amps in a strong half-tesla field producing ~0.1 N is reasonable for a tabletop demonstration.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "State the maximum-force condition for $$F = BIL\\sin\\theta$$ and explain why this geometry maximises force.", "answer": "Maximum force occurs when the wire is *perpendicular* to the field ($$\\theta = 90^\\circ$$, $$\\sin\\theta = 1$$), giving $$F = BIL$$. In this orientation, every part of the wire's length contributes fully to cutting across the field — none of the wire is \"wasted\" lying parallel. Geometrically, the wire's own circular field is maximally asymmetric relative to the external field, producing the strongest catapult effect. Tilting the wire away from perpendicular reduces the effective cutting length to $$L\\sin\\theta$$, lowering the force.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Synthesise: imagine a single device that operates as a motor when connected to a battery and as a generator when its shaft is spun by hand. What component design would allow both modes? (4 steps)", "answer": "- Step 1: Mechanically, both motors and generators share the same core structure — a coil rotating between magnets.\n- Step 2: The key difference is the brush/ring system: a commutator gives DC behaviour, slip rings give AC behaviour. So a true reversible device with DC input/output would use a split-ring commutator.\n- Step 3: In motor mode: feed DC current → coil experiences forces → coil rotates → commutator reverses current every half turn → continuous rotation.\n- Step 4: In generator mode: spin the coil by hand → induced current alternates in the coil every half turn → commutator *re-reverses* it back to one direction in the external circuit → DC output appears. (This is exactly how a \"DC dynamo\" works — the same device, just driven the other way.)\n\nReal motors are often used in regenerative braking precisely this way — switching from drawing current to generating current as the vehicle slows.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "A wire is rotated about its own long axis (spun like a drill bit) inside a magnetic field, but its position doesn't change. Is any e.m.f. induced? Why or why not?", "answer": "No e.m.f. is induced. Even though the wire is \"moving\" in a sense, no part of it is sweeping through field lines — every point on the wire stays at the same position in the field, just rotating about its own axis. There's no change in flux through any circuit, and no relative motion of the wire across the field. Induction requires the wire to *translate* across field lines, not rotate about itself. This is a useful edge case: motion alone isn't enough; it must be motion that cuts field lines.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Synthesise: a student claims that doubling the rotation speed of a g const SK='phys_dc_motor_generator_jun20';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
