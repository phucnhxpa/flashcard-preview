<script>
const DATA={"selected": [{"question": "State the maximum-force condition for $$F = BIL\\sin\\theta$$ and explain why this geometry maximises force.", "answer": "Maximum force occurs when the wire is *perpendicular* to the field ($$\\theta = 90^\\circ$$, $$\\sin\\theta = 1$$), giving $$F = BIL$$. In this orientation, every part of the wire's length contributes fully to cutting across the field — none of the wire is \"wasted\" lying parallel. Geometrically, the wire's own circular field is maximally asymmetric relative to the external field, producing the strongest catapult effect. Tilting the wire away from perpendicular reduces the effective cutting length to $$L\\sin\\theta$$, lowering the force.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is the magnetic flux through a rotating generator coil a *cosine* wave while the induced e.m.f. is a *sine* wave?", "answer": "As the coil rotates uniformly, the angle $$\\theta$$ between the coil's normal and the field is $$\\theta = \\omega t$$. Flux is maximum when the coil face directly faces the field, giving $$\\Phi = BA\\cos(\\omega t)$$ — a cosine. The induced e.m.f. is $$\\mathcal{E} = -\\mathrm{d}\\Phi/\\mathrm{d}t = BA\\omega\\sin(\\omega t)$$ — a sine. They are 90° out of phase: when flux is at a maximum (coil face perpendicular to field), the rate of change is zero, so e.m.f. = 0. When flux passes through zero (coil edge-on to field), it's changing fastest, so e.m.f. is at peak. The phase shift is geometric, not mysterious.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "If a DC motor coil had no commutator and was connected directly to a battery, what would happen to its rotation after the first half-turn, and why? (3 steps)", "answer": "- Step 1: In the first half-turn, the upward and downward forces on the coil sides create a torque that rotates the coil from horizontal to vertical.\n- Step 2: As the coil passes the vertical position, the current is still flowing in the same direction in each side. The forces are still up and down, but now the coil is vertical, so the forces act along the same straight line through the rotation axis.\n- Step 3: Forces acting through the axis produce zero torque. The coil's momentum might carry it slightly past vertical, but the same up/down forces will now act to push it back toward the vertical equilibrium. The coil will oscillate and finally stick at vertical, unable to complete a full continuous rotation.\nTakeaway: Without a commutator, the forces align through the rotation axis at the vertical position, killing the turning effect and stalling the motor.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "A device has a coil spinning in a magnetic field. How do the connections to the external circuit determine whether the output is AC or DC, and what are the names of these connecting components? (2 steps)", "answer": "- Step 1: If connected via **slip rings** (two continuous, unbroken rings), the current in the external circuit alternates direction (AC) because each side of the coil stays connected to the same brush as it sweeps up and down through the field.\n- Step 2: If connected via a **split-ring commutator** (one ring split in two halves with a gap), the connections swap every half turn. This reverses the current in the external circuit back to the same direction each time it tries to alternate, producing a steady-direction DC output.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Why is it crucial in induction questions to specify \"relative motion\" rather than just \"moving the conductor\" or \"moving the magnet\"? (2 steps)", "answer": "- Step 1: From the conductor's perspective, the only thing that matters physically is whether the magnetic field lines are sweeping past it. Whether you move the wire while the magnet is still, or move the magnet while the wire is still, or move both — the induced e.m.f. depends only on the rate at which their relative positions change.\n- Step 2: Saying \"relative motion\" makes this symmetry explicit. In a power-station generator, the coil rotates while the magnets are fixed; in some designs the magnets rotate inside a fixed coil — both work identically because what matters is the relative cutting of field lines.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "On a sine-wave AC output plot, what does the *negative* half of the wave actually represent physically?", "answer": "It represents the current flowing in the *opposite direction* in the external circuit — not zero current, not \"no current.\" The horizontal axis is the zero-current line; values above are current flowing one way, values below are current flowing the other way. The current never disconnects (slip rings maintain contact throughout), so the wave is continuous. \"Alternating\" literally means alternating direction.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "What is the difference between an \"electromagnet\" and an \"induced magnet\"? Why does this distinction matter?", "answer": "- Step 1: An **electromagnet** is magnetic because it has current flowing through it — it becomes magnetic only when current is applied (like the coil in a motor)\n- Step 2: An **induced magnet** (like iron near a magnet) becomes magnetic due to the presence of another magnetic field, not because of its own current\n- Step 3: In the motor, the wire is NOT an \"induced magnet\" — it's an electromagnet (it has its own current creating its own magnetic field that interacts with the external field)\n- Step 4: Using the wrong term in an exam loses marks — examiners want precise vocabulary\n\n**Takeaway:** The wire in a motor is an electromagnet (current-carrying), not an induced magnet (influenced by external field).", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "Suppose a wire is laid exactly along the direction of the magnetic field. Why is the force on it zero — and is this true regardless of how large the current is? (3 steps)", "answer": "- Step 1: Apply $$F = BIL\\sin\\theta$$ with $$\\theta = 0°$$. Then $$\\sin\\theta = 0$$, so $$F = 0$$ regardless of the values of $$B$$, $$I$$, or $$L$$.\n- Step 2: Physical reason: the current's own circular magnetic field wraps around the wire perpendicular to the wire's axis. If the external field is parallel to the wire's axis, the two fields are everywhere perpendicular to each other and the interaction produces no net push in any one direction — by symmetry, any small force on one side cancels with the force on the opposite side.\n- Step 3: So yes, even with enormous current, no force. You can pour 1000 A through a wire that lies along the field and it won't budge. This is why orientation matters as much as magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "A wire is \"an electromagnet\" but not \"an induced magnet\" when current flows through it. Why does this wording distinction matter?", "answer": "The wire is magnetic *because of its own current* — that's the definition of an **electromagnet**. An **induced magnet** would be a piece of soft iron that becomes magnetic only because another magnet is held near it (the field lines induce magnetisation in the iron). A current-carrying wire's magnetism doesn't depend on a nearby magnet — switch off the current and the magnetism vanishes. Using the wrong term loses marks because it implies the wrong physical mechanism.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why does \"more turns of wire\" on the coil make a motor stronger, given that the coil itself doesn't physically grow larger?", "answer": "Each turn of wire adds another length of conductor that sits inside the magnetic field and carries the current. From the motor's perspective, $$N$$ turns is equivalent to one wire of total length $$N \\times L$$ experiencing the field. So the total force on each side of the coil scales with the number of turns. Crucially, the extra wire stays packed in the same small region close to the magnets where $$B$$ is strongest — you get more length without enlarging the device or moving wires into weaker field regions.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why does the output of an AC generator naturally form a sine wave when plotted against time? (4 steps)", "answer": "- Step 1: As the coil rotates, the rate at which each side cuts field lines varies smoothly with the angle of rotation.\n- Step 2: When the coil is horizontal (its plane parallel to $$B$$), the wires are sweeping perpendicular to the field — they cut field lines at the maximum rate, so the induced e.m.f. is at its peak.\n- Step 3: When the coil is vertical (its plane perpendicular to $$B$$), the wires are momentarily moving parallel to the field — they cut no field lines, so the induced e.m.f. is zero.\n- Step 4: Between these positions the rate of cutting varies as $$\\sin$$ of the rotation angle. Since the angle increases linearly with time at constant rotation, the output traces a sine curve. The negative half of the curve corresponds to current flowing the other way (the coil sides have swapped positions relative to the magnets).", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Distinguish carefully between the recipe for a stronger electromagnet and the recipe for a faster motor. Why does this distinction trip students up? (2 steps)", "answer": "- Step 1: The recipes look almost identical but apply to different devices:\n+ Stronger electromagnet: more coils, more current, add an iron core\n+ Faster motor: more current, stronger (permanent) magnet, more coils\n- Step 2: The trap is the iron core vs. stronger magnet swap. An electromagnet creates its own field from current, so an iron core (which becomes magnetised) amplifies it. A motor already uses permanent magnets to provide the external field, so you don't \"add a core\" — you use bigger/stronger permanent magnets. Read whether the question is about electromagnet or motor before choosing the recipe.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "In a generator, why does the induced current oppose the motion that creates it (Lenz's law preview), and how does this connect to energy conservation? (3 steps)", "answer": "- Step 1: When the coil rotates, an e.m.f. is induced, driving a current. That current itself flows in the magnetic field, so by $$F = BIL$$ the wires of the coil now experience a force.\n- Step 2: The direction of this force, you'd find by Fleming's left-hand rule, opposes the rotation that created the induced current. (If it didn't oppose, the system would self-accelerate from nothing — perpetual motion.)\n- Step 3: Energy conservation demands this opposition: whoever spins the coil must do work against the resisting force, and that work is precisely what becomes electrical energy in the circuit. No mechanical input → no electrical output. This is the qualitative content of Lenz's law.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "The motor effect is a \"non-contact\" force. What does that mean and what's a good analogy?", "answer": "Non-contact means the force acts through space without anything solid linking the source to the affected object — there's no string, push, or collision. Gravity is the classic non-contact force: the Earth pulls you down without touching you. Similarly, the magnetic field exerts a force on the current-carrying wire through the field itself, not through any material contact. In exams, just use $$F = BIL\\sin\\theta$$ and Fleming's rule — but knowing the conceptual category (non-contact / field force) helps explain it in words.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "What is the relationship between the frequency of AC output from a generator and the rotational speed of the coil?", "answer": "They are directly proportional — one full rotation of the coil produces exactly one complete cycle of the AC output (one positive half + one negative half). So if the coil spins at $$f$$ revolutions per second, the AC frequency is also $$f$$ Hz. Spinning the coil faster increases both the frequency *and* the peak voltage (since $$\\mathcal{E}_{\\text{peak}} = BA\\omega$$ scales with $$\\omega = 2\\pi f$$). UK mains AC is at 50 Hz, meaning the generator rotates effectively 50 times per second (for a single-pole-pair design).", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why does moving a conductor parallel to the magnetic field lines induce no e.m.f., even though the conductor is clearly moving?", "answer": "Induction requires the conductor to cut through field lines — i.e. to cross them transversely. If the conductor slides along the direction of the field lines, it doesn't intersect any new lines: the same field lines stay alongside it the whole time. Geometrically, only the component of velocity perpendicular to the field counts. Physically, an e.m.f. is induced because charges in the wire experience a force ($$F = qv \\times B$$) when they move across $$B$$; if $$v$$ is parallel to $$B$$, this force is zero. So \"cutting field lines\" is not a metaphor — it's a literal description of the motion that produces induction.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does pushing a bar magnet quickly into a coil produce a larger induced e.m.f. than pushing it slowly? (3 steps)", "answer": "- Step 1: The induced e.m.f. depends on how rapidly field lines are cut by the conductor (or equivalently, how rapidly the flux through the coil changes).\n- Step 2: Pushing the magnet faster means each turn of wire intercepts the same field lines in less time — the rate of cutting is higher.\n- Step 3: Higher rate of flux change → larger induced e.m.f. This previews Faraday's law: $$\\mathcal{E} = -d(N\\phi)/dt$$, which makes this quantitative. The qualitative version (faster motion → bigger e.m.f.) is examinable without the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "What is meant by \"induced e.m.f.\" and how does it differ from a battery's e.m.f.?", "answer": "Induced e.m.f. is the voltage generated in a conductor by changing magnetic flux through it (Faraday's law) — it has no chemical or external power source other than the kinetic energy of whatever is doing the moving. A battery's e.m.f. comes from chemical reactions inside the cell that separate charge and maintain a voltage. Both can drive currents in a circuit, but the induced e.m.f. lasts only as long as the flux is changing — stop the motion, and the e.m.f. drops to zero. A battery's e.m.f. persists until the chemicals are exhausted.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A wire carrying current is placed exactly along Earth's magnetic field axis. Does the wire feel a force from Earth's field?", "answer": "Practically no — to a very good approximation, the force is zero. The wire is parallel to the field ($$\\theta = 0°$$), so $$\\sin\\theta = 0$$ and $$F = BIL\\sin\\theta = 0$$. Even if it carried a large current, the parallel geometry means no force. To get a force from Earth's field, the wire must run roughly east-west (perpendicular to magnetic north-south). Even then, the force is tiny because Earth's $$B \\approx 50\\,\\mu\\text{T}$$ — for a 1 m wire at 1 A, $$F \\approx 5 \\times 10^{-5}\\,\\text{N}$$, barely perceptible.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A wire is rotated about its own long axis (spun like a drill bit) inside a magnetic field, but its position doesn't change. Is any e.m.f. induced? Why or why not?", "answer": "No e.m.f. is induced. Even though the wire is \"moving\" in a sense, no part of it is sweeping through field lines — every point on the wire stays at the same position in the field, just rotating about its own axis. There's no change in flux through any circuit, and no relative motion of the wire across the field. Induction requires the wire to *translate* across field lines, not rotate about itself. This is a useful edge case: motion alone isn't enough; it must be motion that cuts field lines.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "A student writes in an exam: \"The commutator stops the wires from getting tangled.\" Why is this incorrect, and what is the correct explanation? (2 steps)", "answer": "- Step 1: This is one of Alex's \"three mistakes\" that was deliberately planted for correction. The statement is wrong because the commutator's purpose has nothing to do with preventing tangling.\n\n- Step 2: The correct explanation: The split-ring commutator reverses the direction of the current in the coil every half turn. This keeps the force on each side of the coil pointing in the same direction (one side always pushed up, the other always pushed down), so the coil continues rotating continuously in one direction.\n\n+ The word \"tangling\" has no place in a description of how a commutator works. This kind of error would lose marks in an exam — learn the precise explanation.", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "Suppose a motor is running and you suddenly increase the load (make it harder to spin). What happens to the current it draws, and why?", "answer": "The current *increases*. Here's why: when the coil spins, it also acts like a generator (induced \"back e.m.f.\"), which opposes the supply voltage. The actual current through the motor is determined by $$(V_{\\text{supply}} - V_{\\text{back}})/R$$. If you load the motor and it slows down, the back e.m.f. (proportional to rotation speed) drops, so the net driving voltage increases, and the current rises. The motor automatically pulls more current to try to maintain torque against the load. This is why a stalled motor can draw dangerously high current and overheat.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "When applying Fleming's left-hand rule, why should you set the field and current fingers first, and read the thumb last?", "answer": "Because the thumb's direction is the *result* of physics, not your guess. If you pre-decide where the force \"should\" point and try to twist your hand to match, you'll often end up forcing the field or current fingers to point in unphysical directions. The disciplined order is: lock first finger on N→S (field), lock second finger on conventional current direction, then read off whatever direction your thumb naturally lands in — even if it surprises you.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Synthesise: a student claims that doubling the rotation speed of a generator doubles the *frequency* of AC output but not the peak voltage. Is this correct? (3 steps)", "answer": "- Step 1: Doubling rotation speed does double the frequency — one rotation = one AC cycle, so cycles per second scales with rotations per second. So the student is right about frequency.\n- Step 2: But peak voltage is $$\\mathcal{E}_{\\text{peak}} = NBA\\omega$$. Since $$\\omega$$ doubles, the peak voltage also doubles. So the student is wrong about peak voltage.\n- Step 3: Intuitively: spinning faster means flux changes faster, so the rate of change of flux (= e.m.f.) is larger at every instant — including the peak. Both frequency and amplitude grow together when speed increases.\n\nCommon mistake: confusing this with capacitors/inductors where impedance changes with frequency in complex ways — for a generator, it's simpler: faster spin = both higher frequency and higher voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why must you fix the field and current fingers FIRST and only then read off the thumb's direction, rather than rotating your hand to match an expected answer?", "answer": "Because the geometry of the rule is rigid: the force direction is uniquely determined once you lock the field and current. If you try to twist your hand so the thumb points where you \"think\" the answer should be, you'll inevitably misalign one of the other two fingers and get the wrong force, the wrong current, or the wrong field direction. The discipline is: First finger onto the field (N→S), seCond finger onto the conventional current, then accept whatever direction the thumb naturally lands in.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why is the force on a wire always perpendicular to both the current and the field, never along either of them?", "answer": "Because the force arises from the interaction of two magnetic fields (the wire's own field and the external field). Both fields have geometric structure — the wire's field circles the wire, the external field is uniform. The asymmetric pressure produced by their superposition pushes the wire sideways. By symmetry, \"sideways\" means perpendicular to the wire (along its length there's no preferred direction) and also perpendicular to the field (the asymmetry is in the field plane). The only direction perpendicular to both is the mutual perpendicular — exactly what Fleming's thumb gives. This is also why the formula has $$\\sin\\theta$$: the perpendicular component of the wire is what matters.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "When a coil in an AC generator is in the vertical position (its plane perpendicular to the field), the induced e.m.f. is momentarily zero. Why, when the coil is still rotating just as fast?", "answer": "At that instant, each side of the coil is moving directly along the field lines (parallel to $$B$$), not across them. Even though the angular speed is unchanged, the velocity of each wire is momentarily parallel to the magnetic field, so the wires cut no field lines — no induction. A fraction of a second later the coil has rotated enough that the wires start moving across the field again, and the e.m.f. begins climbing back. This is why the sine-wave output passes smoothly through zero twice per revolution.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Why does a generator output a sine wave specifically (rather than, say, a square wave or sawtooth)?", "answer": "Because the coil rotates *uniformly* (constant angular speed). The flux through the coil at angle $$\\theta = \\omega t$$ is $$\\Phi = BA\\cos(\\omega t)$$, which is naturally sinusoidal because the geometry projects onto the field as a cosine. The induced e.m.f. is its time derivative, $$\\mathcal{E} = BA\\omega\\sin(\\omega t)$$, also sinusoidal. A square wave would require sudden flips in flux, which is impossible for a smoothly rotating coil. The sine wave is a direct consequence of circular geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "What's the difference between \"how to make a stronger electromagnet\" and \"how to make a faster motor\"? Why does this distinction matter for exam wording?", "answer": "A **stronger electromagnet** needs: more coils, more current, and an iron core (the iron concentrates and amplifies the field). A **faster motor** needs: more current, stronger permanent magnets, and more coils on the rotating armature. They look similar but the iron-core/permanent-magnet swap is the giveaway — an electromagnet *generates* the field, whereas a motor *uses* an external field. Read the question carefully: \"electromagnet\" vs \"motor\" determines which recipe applies. Alex deliberately tests this swap.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why doesn't a DC motor need slip rings, and why doesn't an AC generator need a commutator?", "answer": "A DC motor takes in *direct current* from a battery (always one direction) and needs to actively *reverse* the coil current every half turn to keep rotation going — that reversal is exactly what a split-ring commutator does. Slip rings would just pass the DC through unchanged and the motor would stall. An AC generator does the opposite: it *wants* the natural reversal to reach the external circuit (to produce AC), so slip rings — which preserve the current direction in each coil end — are perfect. Adding a commutator to a generator would actively undo the reversal, giving a \"bumpy DC\" output instead of clean AC.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Inside a power station, what's the chain of energy conversions that leads to the electricity in your home? (3 steps)", "answer": "- Step 1: A primary energy source (nuclear fission, burning coal, wind, falling water) heats steam or turns blades, producing **rotational kinetic energy** in a turbine shaft.\n- Step 2: The shaft turns the coil of a large AC **generator**, with rotational kinetic energy as the input. Magnetic induction converts this to electrical energy.\n- Step 3: AC electricity is sent through transformers (stepping up to high voltage for long-distance transmission, then back down for safe domestic use) along power lines to homes.\n\nThe generator is the heart of every power station: kinetic in, electrical out.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why does the brief circuit-break at the commutator's split gap *not* stop the motor from running smoothly?", "answer": "Because the break is extremely brief — it happens only at the instant the coil is vertical (where the force would be zero anyway, since the coil sides are moving along the field, not across it). At that instant, the motor's rotational inertia carries it past the dead point, and the moment the gap clears the brushes, the new half-ring connects and current flows in the reversed direction, immediately producing torque again. So the gap aligns with the dead point of zero torque — a clever bit of timing. Examiners may ask why the gap doesn't ruin the motion; this is the answer.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Why must wire length always be converted from cm to m before applying $$F = BIL$$?", "answer": "Because $$B$$ is defined in tesla, and 1 T = 1 N A⁻¹ m⁻¹. The unit explicitly contains *metres*, not centimetres. If you plug in length in cm, your answer for $$F$$ comes out 100× too large (or your $$B$$ comes out 100× too small). The fix is mechanical: always convert to metres first, then compute. This is one of the most common unforced errors on this topic.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Why does $$F = BIL\\sin\\theta$$ contain $$\\sin\\theta$$ and not $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: Only the component of the wire that lies *across* the field contributes to the force. The component lying *along* the field experiences no force because there's nothing for its own field to push against perpendicular to itself.\n- Step 2: If $$\\theta$$ is the angle between wire and field, then the \"across-the-field\" component of the wire's length is $$L\\sin\\theta$$ (the perpendicular projection), not $$L\\cos\\theta$$.\n- Step 3: Check the limits — at $$\\theta = 90^\\circ$$ (wire perpendicular to field), $$\\sin\\theta = 1$$ and force is maximum. At $$\\theta = 0^\\circ$$ (wire parallel to field), $$\\sin\\theta = 0$$ and force vanishes. Both match physical intuition.\n\nSo $$\\sin\\theta$$ encodes \"how much of the wire actually cuts across the field.\"", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Why is the angle $$\\theta$$ in $$F = BIL\\sin\\theta$$ measured between the *wire* and the *field*, not between the wire and the force?", "answer": "Because the formula encodes \"how much of the wire cuts across the field.\" The component of the wire perpendicular to the field is $$L\\sin\\theta$$ when $$\\theta$$ is the wire-field angle. Measuring $$\\theta$$ to the force would be circular — the force direction is what we're trying to determine, not a given input. Also, the force is *always* perpendicular to the wire (by construction of Fleming's rule), so the angle between wire and force is always 90° and would carry no information. Watch out: some textbooks define $$\\theta$$ from the perpendicular instead, but the Edexcel spec uses wire-to-field.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why does a generator require a mechanical input even though it produces electrical energy — and where does that energy ultimately come from?", "answer": "Energy conservation: electrical energy doesn't appear from nothing. Something must do work against the resistive forces on the rotating coil. As current flows through the coil, that current itself experiences a force in the magnetic field ($$F = BIL$$) — and by Lenz's law, this force opposes the rotation. So the person/machine spinning the coil must continually push against this opposing force, doing mechanical work. That work is converted into electrical energy in the circuit. Energy chain: kinetic energy of the turbine/wind/hand → work against the induced opposing force → electrical energy in the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "A common misconception is that a generator \"creates\" energy out of nothing because it makes current without a battery. Refute this. (3 steps)", "answer": "- Step 1: A generator doesn't create energy — it *converts* it. The input is mechanical (kinetic) energy from whatever turns the shaft (steam turbine, wind, hand crank).\n- Step 2: As the coil rotates, induced currents in the coil create their own magnetic fields that *push back* against the rotation (Lenz's law). To keep spinning the coil at the same speed, you must do work *against* this opposing force.\n- Step 3: The work you do (mechanical energy) is converted into electrical energy in the circuit (minus heat losses). Energy is conserved exactly. If you tried to draw electrical power without supplying mechanical input, the coil would simply decelerate and stop.\n\nSo: kinetic in → electrical out, with conservation of energy intact.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Why are commutator and slip rings such a frequent exam trap, and what is the foolproof one-line distinction?", "answer": "Both devices look superficially similar — a rotating cylindrical connector with stationary brushes — and both are taught in the same lesson, so students confuse them. The foolproof one-liner: a split-ring commutator reverses the coil's current every half-turn (turning AC inside the coil into DC outside, or letting DC input produce continuous rotation), while slip rings do NOT reverse anything — they simply maintain continuous contact, so the natural reversal of induced current is passed straight through, giving AC output. Commutator = forces current to \"behave\"; slip rings = lets nature take its course.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "State the four factors that affect the e.m.f. induced in a coil rotating in a magnetic field, and how each scales the output. (4 steps)", "answer": "- Step 1: **Magnetic flux density** $$B$$ — stronger field means more flux change per unit time, larger peak e.m.f.\n- Step 2: **Coil area** $$A$$ — larger area means more flux enclosed, so more flux change per rotation, larger peak e.m.f.\n- Step 3: **Number of turns** $$N$$ — each turn contributes its own induced e.m.f. and they add in series, multiplying total e.m.f. by $$N$$.\n- Step 4: **Angular speed** $$\\omega$$ (or frequency) — faster rotation means faster rate of flux change, larger peak e.m.f. ($$\\mathcal{E}_{\\text{peak}} = NBA\\omega$$).\n\nSo to increase generator output: stronger magnets, larger or more numerous coils, faster rotation.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Suppose you connected a DC motor backwards by spinning its shaft mechanically instead of supplying current. What would happen and what does this reveal about motors and generators? (3 steps)", "answer": "- Step 1: Spinning the shaft forces the coil to rotate through the magnetic field. Its sides now cut field lines, so an e.m.f. is induced in the coil — exactly the generator effect.\n- Step 2: Because the motor uses a split-ring commutator, the induced current direction in the external circuit gets reversed every half-turn back to the same sense — so you'd actually get pulsed DC output, not AC.\n- Step 3: Reveals: motors and generators are the same machine in principle, distinguished only by which way energy flows (electrical in vs. electrical out) and whether you use a commutator (DC) or slip rings (AC). The underlying physics — current, field, force, motion — is identical.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why is the force on a current-carrying wire described as a \"non-contact force,\" and what familiar everyday force is it analogous to?", "answer": "The force acts across empty space between the magnet and the wire — there's no rod, string, or solid object physically connecting them. The magnetic field is the mediator: one magnet sets up the field, the current's own field interacts with it, and the result is a push or pull transmitted through the field itself. This is the same character of force as gravity (a planet pulls a satellite without touching it) or the electric force between charges. Non-contact forces feel mysterious because we can't see the mediator, but they obey precise mathematical rules — in this case $$F = BIL\\sin\\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A simple coil placed in a magnetic field would only turn a half-turn and stick. Why does it stick, and what fixes it? (3 steps)", "answer": "- Step 1: Initially, the coil sides experience opposite forces (one up, one down) creating a couple that rotates the coil.\n- Step 2: After a half turn, the side that was \"up\" is now physically where the \"down\" side was. With the *same* current direction in the loop, Fleming's rule still pushes the same side upward, which now *opposes* further rotation — the coil oscillates and gets stuck.\n- Step 3: A split-ring commutator fixes this. Every half turn, it reverses the current direction in the coil, so the side that's now on top gets pushed up and the side on bottom gets pushed down. The couple keeps acting in the same rotational sense, and the coil keeps spinning one way.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "In Faraday's-style thinking, what does it mean physically for a conductor to \"cut\" a magnetic field line?", "answer": "It means the conductor sweeps through space that has field lines passing through it, such that — as the conductor moves — field lines pass *across* the conductor's body. Imagine field lines drawn as physical strings: the wire moves sideways through them, and each string it passes across \"cuts\" against it. Mathematically, this corresponds to the wire sweeping out an area whose flux changes with time. Faster cutting = more lines crossed per second = larger induced e.m.f. Moving along the lines (parallel to them) cuts nothing because the wire stays on the same line.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Why does the factor $$\\sin\\theta$$ appear in $$F = BIL\\sin\\theta$$ rather than $$\\cos\\theta$$ or no angle term at all? (3 steps)", "answer": "- Step 1: Only the component of the wire that lies across the field lines actually \"cuts\" the field and contributes to the force. If the wire is parallel to $$B$$, no current crosses any field line, so no interaction occurs.\n- Step 2: Decomposing the wire's direction into a component perpendicular to $$B$$ (which is $$L\\sin\\theta$$) and a component parallel to $$B$$ (which is $$L\\cos\\theta$$), only the perpendicular component generates force.\n- Step 3: Hence $$F = BI(L\\sin\\theta)$$. This gives maximum force at $$\\theta = 90°$$ (wire fully across the field) and zero force at $$\\theta = 0°$$ (wire lying along the field).", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why does adding an iron core to an electromagnet strengthen its field, but adding an iron core to the permanent magnets of a DC motor is not the standard way to make it faster?", "answer": "An electromagnet has no inherent field — it relies entirely on the current. The iron core becomes magnetised by the current's field and adds its own induced field, dramatically amplifying $$B$$. In a DC motor, however, the source of $$B$$ is already a permanent magnet (or sometimes a separate electromagnet). The standard ways to boost the motor are: increase the supply current, use stronger permanent magnets, or add more turns to the coil. While you can build motors with iron-cored field electromagnets (and many real motors do), in a typical exam question with permanent magnets, \"add an iron core\" doesn't apply to the rotor — it would be muddling the two device types.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Why does an AC generator's output reach peak voltage when the coil is parallel to the field (edge-on), not perpendicular?", "answer": "Because peak voltage corresponds to peak *rate of change* of flux, not peak flux itself. When the coil is parallel to the field (edge-on), no flux passes through it, but as it rotates from this position, flux changes rapidly — the coil is sweeping through field lines at maximum speed. When the coil is perpendicular to the field (face-on), maximum flux passes through, but at that instant the rate of change is momentarily zero (the coil is at a turning point in flux). Since $$\\mathcal{E} = -\\mathrm{d}\\Phi/\\mathrm{d}t$$, e.m.f. peaks when flux is changing fastest — edge-on — and is zero when flux is at extreme — face-on. This 90° offset is why flux is cosine and e.m.f. is sine.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why does a current-carrying wire placed in an external magnetic field experience a force, even though nothing is physically touching it? (3 steps)", "answer": "- Step 1: A current is just moving charge, and any moving charge produces its own magnetic field — concentric circles around the wire (right-hand grip rule). So the wire is itself a tiny electromagnet.\n- Step 2: When you place this wire inside another magnetic field, the two fields overlap and interact. On one side of the wire the two fields add (denser lines), on the other side they cancel (sparser lines). This produces an asymmetric \"catapult field.\"\n- Step 3: Field lines behave like stretched elastic — they want to straighten out. The bunched-up side pushes the wire toward the sparse side, producing a net force perpendicular to both the wire and the external field. This is a non-contact (field) force, analogous to gravity.\n\nTakeaway: the force arises from two magnetic fields interacting, not from any mechanical contact.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Why does the split-ring commutator briefly break the circuit at the vertical coil position, and why doesn't this stop the motor?", "answer": "The split ring has two small gaps where the brushes pass over the cut between the two halves. At the instant the coil is vertical (its plane along the field), each brush sits over a gap, so current momentarily stops. But this is also the instant when the coil's plane is along the field and the force-arms produce no useful turning effect anyway. The coil's rotational inertia carries it through this dead position; on the other side of the gap, the brushes contact the opposite half of the ring, reversing the current direction just as needed. The momentary break is a feature, not a bug — it coincides with the moment when current direction needs to swap.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "In the \"3 mistakes\" exercise, one planted error was \"each side feels a force upwards.\" Why is that wrong, and what's the correct statement?", "answer": "It's wrong because the two sides of a single coil carry current in *opposite* directions (they're parts of the same loop). When you apply Fleming's left-hand rule to each side, the field is the same but the current direction is reversed, so the forces come out in opposite directions — one side up, one side down. This couple is precisely what produces rotation. If both sides felt force in the same direction, the coil would just translate, not rotate, and no motor would work.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What physical interaction causes a current-carrying wire to feel a force when placed in an external magnetic field? (3 steps)", "answer": "- Step 1: A current flowing through a wire generates its own magnetic field around it.\n- Step 2: When this wire is placed inside an external magnetic field (from permanent magnets or another electromagnet), the two magnetic fields interact and distort each other.\n- Step 3: The combined field lines behave as if they are elastic bands trying to straighten out and escape the dense region. This creates a \"catapult field\" that pushes the wire away from the region of highest field density, resulting in a measurable force.\nTakeaway: The motor effect is a field-field interaction, not a physical contact; it is a non-contact force.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "In the formula $$F = BIL \\sin \\theta$$, what exactly does the angle $$\\theta$$ represent, and what are its two extreme limiting cases? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the direction of the magnetic field $$B$$ and the direction of the current $$I$$ in the wire.\n+ Misconception alert: $$\\theta$$ is NOT the angle between the force and the field, or the force and the wire. The force is always 90 degrees to both.\n- Step 2: Limiting case 1: When the wire is perpendicular to the field ($$\\theta = 90^\\circ$$), $$\\sin 90^\\circ = 1$$, so the force is maximum ($$F = BIL$$). This is when the wire \"cuts\" across the most field lines per unit length.\n- Step 3: Limiting case 2: When the wire is parallel to the field ($$\\theta = 0^\\circ$$), $$\\sin 0^\\circ = 0$$, so the force is zero. The wire slides along the field lines without cutting them, so no perpendicular interaction occurs.\nTakeaway: To feel a force, the wire must have a component perpendicular to the field; parallel motion yields zero force.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What does the quantity $$B$$ (magnetic flux density) physically represent, and how is its SI unit, the tesla (T), fundamentally defined from the motor effect equation? (3 steps)", "answer": "- Step 1: $$B$$ represents the strength of the magnetic field. Visually, it corresponds to how close together (dense) the magnetic field lines are. A denser field means a stronger push on the wire.\n- Step 2: $$B$$ is defined as the constant of proportionality in the motor effect equation. If we rearrange $$F = BIL$$ (for maximum force, $$\\theta = 90^\\circ$$), we get $$B = \\frac{F}{IL}$$.\n- Step 3: This rearrangement directly gives the fundamental definition of the unit: 1 Tesla is the flux density that produces a force of 1 Newton on a 1-meter length of wire carrying 1 Ampere of current perpendicular to the field. Therefore, $$1 \\text{ T} \\equiv 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$.\nTakeaway: The Tesla is not arbitrary; it is derived directly from the force a field exerts on a current.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How does the strength of a 1 Tesla magnetic field compare to the Earth's natural magnetic field, and what kind of magnet is typically required to produce a field close to 1 T?", "answer": "- Step 1: A field of 1 T is extremely strong by everyday standards. The Earth's magnetic field is roughly $$50 \\text{ \\mu T}$$ (microteslas).\n- Step 2: Comparing the magnitudes, $$1 \\text{ T}$$ is approximately 10,000 times stronger than the Earth's field ($$1 \\text{ T} / 50 \\times 10^{-6} \\text{ T} = 20,000$$, order of magnitude is ~$$10^4$$).\n- Step 3: To achieve ~1 T, you need strong permanent magnets like ceramic or neodymium magnets, or powerful electromagnets with iron cores. A typical small fridge magnet is only around 0.01 T.\nTakeaway: 1 T is a massive field; exam questions involving ~0.5 T to 1 T imply strong lab magnets, not the Earth's background field.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "What does each digit (finger/thumb) represent in Fleming's Left-Hand Rule, and what is the mnemonic for remembering them?", "answer": "- Step 1: The rule uses the left hand with the thumb and first two fingers held mutually at right angles ($$90^\\circ$$ to each other).\n- Step 2: The assignments are:\n+ First finger represents the Field ($$B$$), pointing from North to South.\n+ seCond finger represents the Current ($$I$$), pointing in the direction of conventional current (positive to negative).\n+ thuMb represents the Motion / Force / Thrust ($$F$$), pointing in the direction the wire is pushed.\n- Step 3: The mnemonic matches the letters: **F**irst = **F**ield, **seC**ond = **C**urrent, **thuM**b = **M**otion. The force is always perpendicular to both the field and the current.\nTakeaway: Lock the Field and Current fingers first; the thumb dictates the force, never force the thumb to where you want it.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Why must you strictly use your LEFT hand for the motor effect, and what physical scenario requires the RIGHT hand instead? (2 steps)", "answer": "- Step 1: The Left-Hand Rule is exclusively for the motor effect: predicting the direction of a Force (Motion) produced on a wire carrying a Current in a magnetic Field. It deals with causes ($$I$$, $$B$$) leading to an effect ($$F$$).\n- Step 2: The Right-Hand Rule is used for the generator effect (electromagnetic induction): predicting the direction of an induced Current (or e.m.f.) when a wire experiences Motion in a magnetic Field. It deals with causes (Motion, $$B$$) leading to an effect ($$I$$).\n+ Misconception trap: Mixing them up flips the predicted direction entirely. If you use the right hand for a motor, you will state the force pushes the wrong way.\nTakeaway: Left = Motor (Electricity in → Motion out). Right = Generator (Motion in → Electricity out).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "If a physics problem states that \"electrons flow to the left,\" in which direction should you point your seCond finger in Fleming's Left-Hand Rule, and why? (3 steps)", "answer": "- Step 1: Fleming's rule is strictly defined using conventional current, which is the hypothetical flow of positive charge from the positive terminal to the negative terminal.\n- Step 2: Electrons are negatively charged, so their physical flow direction is exactly opposite to conventional current.\n- Step 3: If electrons flow to the left, conventional current flows to the right. Therefore, you must point your seCond finger to the right to correctly apply the rule. Pointing it left based on electron flow will yield a completely incorrect force direction.\nTakeaway: Always translate electron flow into conventional current (reverse it) before applying the left-hand rule.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What is the geometric relationship between the direction of the magnetic force on a wire and the directions of the magnetic field and the current? (3 steps)", "answer": "- Step 1: The magnetic force $$F$$ is always perpendicular (at $$90^\\circ$$) to the plane formed by the magnetic field $$B$$ and the current $$I$$.\n- Step 2: This means the force pushes the wire \"out\" of the field-current plane. If the field is horizontal and the current is horizontal but perpendicular to the field, the force is purely vertical (up or down).\n- Step 3: If the current and field are not perpendicular, the force is still perpendicular to both the actual field direction and the actual current direction, but its magnitude is reduced because only the perpendicular component of the current contributes to the force.\nTakeaway: The force never has a component in the direction of the field or the direction of the current; it always deflects sideways.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How does a single loop of wire (a coil) placed in a uniform magnetic field produce a rotational spinning motion rather than just a linear push? (3 steps)", "answer": "- Step 1: Current flows around the entire loop. Because it's a loop, the current in the two opposite straight sides of the coil flows in opposite directions (e.g., out of the page on the left side, into the page on the right side).\n- Step 2: Applying Fleming's Left-Hand Rule to both sides simultaneously: the side with current out gets pushed upward, and the side with current in gets pushed downward.\n- Step 3: These two opposite, parallel forces acting on different sides of the same coil create a \"couple\" (a turning effect/torque). Instead of translating the coil linearly, this couple rotates the coil around its central axis.\nTakeaway: A motor spins because the two sides of the coil experience forces in opposite vertical directions, creating a torque.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "If a DC motor coil had no commutator and was connected directly to a battery, what would happen to its rotation after the first half-turn, and why? (3 steps)", "answer": "- Step 1: In the first half-turn, the upward and downward forces on the coil sides create a torque that rotates the coil from horizontal to vertical.\n- Step 2: As the coil passes the vertical position, the current is still flowing in the same direction in each side. The forces are still up and down, but now the coil is vertical, so the forces act along the same straight line through the rotation axis.\n- Step 3: Forces acting through the axis produce zero torque. The coil's momentum might carry it slightly past vertical, but the same up/down forces will now act to push it back toward the vertical equilibrium. The coil will oscillate and finally stick at vertical, unable to complete a full continuous rotation.\nTakeaway: Without a commutator, the forces align through the rotation axis at the vertical position, killing the turning effect and stalling the motor.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "What is the physical structure of a split-ring commutator, and how does its connection to the coil differ from a solid ring? (3 steps)", "answer": "- Step 1: A split-ring commutator is a single cylindrical ring made of conductive material that has been split into two distinct halves with a small insulating gap between them.\n- Step 2: The two ends of the motor coil are connected to the two separate halves of this ring.\n- Step 3: As the coil and the commutator rotate together, the stationary brushes (which supply current from the battery) slide against the commutator. Because of the split, each coil end swaps which brush it is touching every half turn as the gap passes the brushes.\nTakeaway: The \"split\" creates two electrical halves that allow the coil's connection to the external battery to swap polarity every 180 degrees.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "How does the split-ring commutator enable continuous rotation of the DC motor coil, and what happens to the circuit at the exact moment the coil is vertical? (3 steps)", "answer": "- Step 1: Every half turn, as the coil passes the vertical position, the split in the commutator passes under the brushes. This causes each coil end to disconnect from its current brush and reconnect to the opposite brush.\n- Step 2: This swapping of connections reverses the direction of the current flowing through the coil. The side that was being pushed up now has its current reversed so it is pushed down, and vice versa.\n- Step 3: This reversal ensures that the side of the coil currently moving upwards always experiences an upward force, and the side moving down always experiences a downward force. The torque is maintained in the same rotational sense, allowing continuous spinning.\n+ Edge case: At the exact vertical moment, the brushes touch the insulating gap, briefly breaking the circuit. However, the coil's momentum carries it past this dead zone before the new connection is made.\nTakeaway: The commutator flips the current polarity every half turn so the torque always pushes in the same rotational direction.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What is the primary energy transfer taking place in a DC motor, and where does the input energy originate?", "answer": "- Step 1: A DC motor converts electrical energy into kinetic energy (movement).\n- Step 2: The input electrical energy is supplied by the DC battery or power source connected to the brushes, which drives the current through the coil.\n- Step 3: The motor effect forces act on this current, doing mechanical work to spin the coil, thereby transforming the electrical input into kinetic energy output.\nTakeaway: Motor = Electrical IN, Kinetic OUT.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What three modifications will make a DC motor spin faster, and why does adding an iron core (which makes an electromagnet stronger) NOT achieve this specific goal? (3 steps)", "answer": "- Step 1: To make the motor spin faster, we need a larger force on the coil, which means increasing the variables in $$F = BIL$$:\n+ Increase the current $$I$$ (use a higher voltage battery or lower resistance wires).\n+ Increase the magnetic flux density $$B$$ (use stronger permanent magnets).\n+ Increase the effective length $$L$$ (add more turns to the coil, keeping it near the strong magnets).\n- Step 2: Adding an iron core inside the coil strengthens the coil's own electromagnet field, which is useful if you want the coil to attract things (like in an electromagnetic crane).\n- Step 3: However, the motor effect force depends on the *external* permanent magnet field $$B$$ interacting with the coil's *current* $$I$$, not the coil's own magnetic field strength. An iron core makes the coil a better magnet, but it doesn't directly increase the $$B$$, $$I$$, or $$L$$ that govern the force pushing the coil sideways.\n+ Misconception trap: \"More coils, more current, iron core\" is the recipe for a stronger electromagnet. \"More current, stronger magnet, more coils\" is the recipe for a faster motor.\nTakeaway: A stronger electromagnet attracts iron better; a faster motor requires more force from the external field on the current.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "What is electromagnetic induction (the generator effect), and what fundamental condition must be met for it to occur? (3 steps)", "answer": "- Step 1: Electromagnetic induction is the process where movement induces a voltage (e.m.f.) and, if the circuit is closed, a current in a conductor.\n- Step 2: The fundamental condition is relative motion between a conductor and a magnetic field. No battery is needed; the energy comes from whatever does the moving.\n- Step 3: Crucially, the conductor must \"cut across\" the magnetic field lines. Moving the conductor along (parallel to) the field lines induces zero e.m.f. The component of motion must be perpendicular to the field.\nTakeaway: Induction requires movement + cutting field lines; parallel sliding yields nothing.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the physical structure of slip rings in an AC generator, and how do they differ from a split-ring commutator? (3 steps)", "answer": "- Step 1: Slip rings consist of two separate, complete, unbroken cylindrical rings made of conductive material. There are no gaps or splits.\n- Step 2: Each end of the generator coil is permanently attached to its own specific slip ring. As the coil rotates, each coil end stays connected to the same ring throughout the entire rotation.\n- Step 3: Because the rings are complete, the stationary brushes maintain continuous, unbroken contact with the rings. The circuit is never broken, unlike the commutator which has a brief dead zone at the gap.\nTakeaway: Slip rings = two full, unbroken rings; each coil end stays on its own ring forever.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Why does the use of slip rings in a generator naturally result in an alternating current (AC) output rather than a direct current (DC) output? (3 steps)", "answer": "- Step 1: As the generator coil spins, each side of the coil sweeps up through the magnetic field in one half-turn, and then sweeps down through the field in the next half-turn.\n- Step 2: According to induction rules, sweeping up induces a current in one direction, while sweeping down induces a current in the opposite direction. The induced current in the coil naturally reverses every half-turn.\n- Step 3: Because slip rings do not swap the coil's connections to the external circuit, this naturally reversing internal current is transmitted directly to the external circuit. The output therefore alternates direction continuously, producing AC.\nTakeaway: Slip rings let the natural back-and-forth induced current pass straight through to the output without reversing it.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "In the graphical output of an AC generator (a sine wave), what is the physical meaning of the curve dipping into the negative region below the zero line? (2 steps)", "answer": "- Step 1: The zero line represents the moment the coil is moving parallel to the field (no cutting, zero induced e.m.f.).\n- Step 2: The negative region represents real current flowing in the opposite direction to the positive region. It is not \"no current\" or \"less current\"—it is the same magnitude of current but with reversed polarity, because the coil side is now sweeping through the field in the opposite direction (e.g., down instead of up).\n+ Misconception trap: Thinking the negative half means the current stops or disappears. It means the current alternates its direction of flow.\nTakeaway: Positive peak = current one way; negative peak = current the opposite way; zero crossing = coil parallel to field.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Compare the split-ring commutator and slip rings in terms of their shape, effect on the current, circuit continuity, and ultimate purpose/output. (4 steps)", "answer": "- Step 1: Shape: A commutator is one ring split into two halves with a gap; slip rings are two separate, complete rings with no gaps.\n- Step 2: Effect on current: The commutator reverses the coil's current direction every half turn relative to the external circuit, forcing a one-way (DC) output. Slip rings do not reverse the connections, allowing the naturally alternating induced current to pass through as AC.\n- Step 3: Circuit continuity: The commutator briefly breaks the circuit each half turn as the gap passes the brushes. Slip rings maintain continuous, unbroken contact throughout the rotation.\n- Step 4: Purpose/output: The commutator is used in a DC motor to keep the rotational force in one direction (DC electricity in, steady rotation out). Slip rings are used in an AC generator to produce alternating current (kinetic motion in, AC electricity out).\nTakeaway: Commutator = swaps connections → DC output / steady motor. Slip rings = fixed connections → AC output / alternating generator.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "What is the primary energy transfer taking place in an AC generator, and what external source provides the input energy?", "answer": "- Step 1: A generator converts kinetic energy into electrical energy.\n- Step 2: The input kinetic energy comes from whatever force is physically turning the coil (e.g., steam turbines in a power station, wind turning a turbine, or hand-cranking a dynamo).\n- Step 3: This mechanical work moves the conductor through the magnetic field, inducing the e.m.f. and driving the current, thereby transforming the kinetic input into electrical output. No battery is involved.\nTakeaway: Generator = Kinetic IN, Electrical OUT.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A wire of length 0.20 m carries a current of 2.0 A. It sits perfectly perpendicular to a magnetic field of flux density 0.50 T. What is the magnitude of the force on the wire, and how would it change if the length was doubled? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular, $$\\theta = 90^\\circ$$ and $$\\sin \\theta = 1$$, so we use $$F = BIL$$.\nSubstituting: $$F = 0.50 \\text{ T} \\times 2.0 \\text{ A} \\times 0.20 \\text{ m} = 0.20 \\text{ N}$$.\n- Step 2: The force is directly proportional to the length $$L$$ in the field. If the length is doubled (from 0.20 m to 0.40 m), the force simply doubles to 0.40 N. More wire in the field means more field-line cutting and thus more force.\nTakeaway: $$F$$ scales linearly with $$B$$, $$I$$, and $$L$$ when perpendicular.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A wire carrying a current of 3.0 A with a length of 0.10 m is in a 0.40 T field. If the force is calculated as 0.06 N, what is the approximate angle $$\\theta$$ between the wire and the field, and why? (3 steps)", "answer": "- Step 1: First, find the maximum possible force if the wire were perpendicular ($$\\theta = 90^\\circ$$): $$F_{max} = BIL = 0.40 \\times 3.0 \\times 0.10 = 0.12 \\text{ N}$$.\n- Step 2: The actual force is 0.06 N, which is exactly half of the maximum force ($$0.06 / 0.12 = 0.5$$).\n- Step 3: Since $$F = F_{max} \\sin \\theta$$, we have $$0.5 = \\sin \\theta$$. The angle whose sine is 0.5 is $$30^\\circ$$ (or $$150^\\circ$$). Tilting the wire to $$30^\\circ$$ with the field halves the effective perpendicular component, halving the force.\nTakeaway: If the calculated force is half of $$BIL$$, the wire must be at $$30^\\circ$$ (or $$150^\\circ$$) to the field direction.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A 0.10 m long wire carrying 5.0 A perpendicular to a magnetic field experiences a force of 0.25 N. What is the flux density $$B$$, and does this value represent a weak or strong field context? (3 steps)", "answer": "- Step 1: Rearrange the motor effect formula to solve for $$B$$: $$B = \\frac{F}{IL}$$.\n- Step 2: Substitute the values: $$B = \\frac{0.25 \\text{ N}}{5.0 \\text{ A} \\times 0.10 \\text{ m}} = \\frac{0.25}{0.50} = 0.50 \\text{ T}$$.\n- Step 3: A flux density of 0.50 T represents a very strong field. It is roughly 10,000 times stronger than the Earth's magnetic field (~$$50 \\text{ \\mu T}$$) and is typical of strong permanent magnets (like ceramic or neodymium) used in lab motors, not everyday weak fields.\nTakeaway: $$B = 0.5 \\text{ T}$$ implies strong lab magnets; the Tesla is a massive unit.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When reading a 2D diagram of a radial magnetic field (like a North pole in the center and South pole around the outside), what common 3D assumption must you avoid making when applying Fleming's Left-Hand Rule? (3 steps)", "answer": "- Step 1: A common error is to assume the poles are stacked vertically in 3D (like a bar magnet standing up, with N physically \"above\" S).\n- Step 2: In a radial field diagram drawn on a flat page, the poles are typically in the same flat plane. N is in the center, S is the outer ring, and the field lines simply radiate outward across the 2D plane from the center to the edge.\n- Step 3: You must read only what is drawn. If the field arrows point horizontally across the page, your First finger must point horizontally across the page, not vertically up/down based on an imagined 3D stacking that isn't in the diagram.\nTakeaway: Don't invent hidden 3D depth; apply the rule strictly to the 2D vectors drawn on the page.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}], "count": 24}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Why does a current-carrying wire feel a force when placed in an external magnetic field? (2 steps)", "answer": "- Step 1: The current in the wire produces its own magnetic field around it. This field interacts with the external magnetic field the wire is sitting in.\n- Step 2: The two fields overlap and \"push\" against each other. This interaction creates a force on the wire, which is the motor effect.\n\nThe motor effect is fundamentally a field-field interaction, a non-contact force.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In the formula $$F = BIL \\sin\\theta$$, what does each symbol represent, and crucially, what is the angle $$\\theta$$ defined as? (2 steps)", "answer": "- Step 1: $$F$$ is force (N), $$B$$ is magnetic flux density (T), $$I$$ is current (A), $$L$$ is length of wire in the field (m). $$\\theta$$ is the angle between the wire (direction of current) and the direction of the external magnetic field $$B$$.\n- Step 2: A common misconception is that $$\\theta$$ is the angle between the force and the field, or the force and the wire. It is strictly the angle between the wire and the field lines. Max force occurs when they are perpendicular ($$\\theta = 90^\\circ$$).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Why does the formula $$F = BIL \\sin\\theta$$ contain a $$\\sin\\theta$$ term? What happens physically when the wire is parallel to the field? (2 steps)", "answer": "- Step 1: The force depends on how much of the wire is \"cutting across\" the magnetic field lines perpendicularly. Only the perpendicular component of the wire's length relative to the field contributes to the force.\n- Step 2: When the wire is parallel to the field ($$\\theta = 0^\\circ$$), $$\\sin 0^\\circ = 0$$. Physically, the wire is moving along the field lines, not cutting across them, so there is no field interaction and no force is produced.\n\nForce requires cutting across field lines; parallel motion yields zero force.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "What is magnetic flux density $$B$$ conceptually, and how is it formally defined from the motor effect formula? What are its SI base units? (3 steps)", "answer": "- Step 1: Conceptually, $$B$$ represents the strength of the magnetic field—how close together the field lines are.\n- Step 2: It is formally defined as the constant of proportionality when the wire is perpendicular to the field ($$\\theta = 90^\\circ$$). Rearranging $$F = BIL$$ gives $$B = F / (IL)$$.\n- Step 3: The SI unit is the tesla (T). From the definition, its base units are $$\\text{N} \\cdot \\text{A}^{-1} \\cdot \\text{m}^{-1}$$. \n\n1 T is the flux density that produces 1 N of force on 1 m of wire carrying 1 A perpendicularly.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How strong is a 1 Tesla magnetic field in practical terms, compared to the Earth's magnetic field? (1 step)", "answer": "- Step 1: A field of 1 T is very strong—about 10,000 times stronger than the Earth's magnetic field in Europe (which is roughly $$50 \\mu\\text{T}$$). A typical strong lab magnet might be around 0.5 T.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When applying Fleming's Left-Hand Rule, what does each digit represent, and in what direction must they point? (2 steps)", "answer": "- Step 1: Hold your left thumb and first two fingers at right angles. First finger = Field ($$B$$), pointing from North to South. seCond finger = Current ($$I$$), pointing in the direction of conventional current (+ to −).\n- Step 2: thuMb = Motion/Force ($$F$$), pointing in the direction the wire is pushed. The force is always perpendicular to both the field and the current.\n\nMemory hook: First = Field, seCond = Current, thuMb = Motion.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why must you use your *left* hand for the motor effect, and what is a common trap regarding the right hand? (2 steps)", "answer": "- Step 1: The left hand is strictly for the motor effect (finding the force on a current-carrying conductor in a field). \n- Step 2: The right hand is used for the generator effect (finding the direction of induced current). A classic trap is using the wrong hand, which automatically gives you the exact opposite direction for the force or current.\n\nLeft = Motor (Force on Current), Right = Generator (Induced Current).", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "If an exam question states that electrons flow to the right, which direction do you point your second finger when using Fleming's Left-Hand Rule, and why? (2 steps)", "answer": "- Step 1: You must point your second finger to the LEFT.\n- Step 2: The second finger represents conventional current, which is the direction positive charges would move (+ to −). Electrons are negative, so their flow direction is exactly opposite to conventional current. Pointing the finger with the electrons will give the wrong force direction.\n\nAlways convert electron flow to conventional current before applying the rule.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the correct step-by-step method for applying Fleming's Left-Hand Rule to avoid \"forcing\" the answer? (2 steps)", "answer": "- Step 1: First, identify the direction of the magnetic field ($$B$$) and physically point your First finger in that direction (N to S). Lock your wrist.\n- Step 2: Next, identify the direction of conventional current ($$I$$) and physically point your seCond finger in that direction. Your thumb will now naturally point in the direction of the force—never pre-decide where the thumb should go and twist your hand to make it work.\n\nSet fingers first (Field, then Current), read the thumb (Force).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When reading a 2D diagram of a magnetic field and a wire, what is a common visual trap regarding the poles, and how should you read the diagram? (2 steps)", "answer": "- Step 1: A common trap is to assume one pole is physically \"on top\" of the other in 3D space, importing a vertical stacking that isn't drawn.\n- Step 2: You must read only what is drawn. If N is in the center and S is around the outside in the same flat plane, the field simply points radially outward from N to S within that plane, not \"up and out\" of the page.\n\nTrust the 2D layout; don't invent 3D depth that isn't indicated.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "How does a single force on a straight wire translate into the rotational spinning of a DC motor coil? (3 steps)", "answer": "- Step 1: Instead of a single wire, a loop of wire (coil/armature) is placed in the magnetic field.\n- Step 2: The current flows in one direction down one side of the loop, and in the opposite direction up the other side.\n- Step 3: Applying Fleming's Left-Hand Rule to both sides shows one side is pushed UP and the other is pushed DOWN. These two opposite, parallel forces create a \"couple\" (a turning effect), causing the coil to rotate.\n\nA coil turns because its two sides experience forces in opposite vertical directions.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "If a DC motor consisted of just a plain coil without a commutator, why would it only turn half a revolution and then get stuck? (2 steps)", "answer": "- Step 1: After half a turn, the sides of the coil swap places. The side that was pushed up is now at the bottom, and the side pushed down is at the top.\n- Step 2: Because the current direction in the wire hasn't changed, the force on the bottom wire is still pushing up, and the top wire pushing down. These forces now act to rotate the coil backwards, but momentum carries it to the vertical position where the forces align vertically, cancel the turning effect, and it sticks.\n\nWithout reversing the current, the forces reverse their turning effect every half turn.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What is the specific job of the split-ring commutator in a DC motor, and when does it act? (2 steps)", "answer": "- Step 1: The split-ring commutator reverses the direction of the current in the coil every half turn.\n- Step 2: It acts exactly when the coil is in the vertical position. By flipping the current at this precise moment, it ensures that the force on each side of the coil always pushes in the same rotational direction (e.g., the left side always up, the right side always down), maintaining continuous rotation.\n\nCommutator = flips current every half turn to keep force in the same sense.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "How does the split-ring commutator physically achieve the current reversal every half turn? (3 steps)", "answer": "- Step 1: The commutator is one ring split into two halves with a small gap between them. Each half is connected to one end of the coil. The brushes (connected to the battery) stay still and press against the rotating ring.\n- Step 2: As the coil rotates, each end of the coil swaps which brush it is touching. For half a turn, end A touches the positive brush and end B touches the negative brush.\n- Step 3: After half a turn, the gap passes the brushes, and end A now touches the negative brush while end B touches the positive brush. The circuit is briefly broken at the gap, then reconnected with reversed polarity, flipping the current.\n\nThe physical swapping of brush contacts reverses the current direction in the coil.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student writes: \"The commutator stops the wires from getting tangled.\" Why is this wrong, and what is the correct explanation? (2 steps)", "answer": "- Step 1: The wires do not tangle because the coil is rotating and the brushes maintain a sliding contact; the commutator's shape has nothing to do with preventing physical tangling.\n- Step 2: The correct explanation is that the commutator reverses the current in the coil every half turn, which keeps the force acting in the same rotational direction, allowing continuous spinning.\n\nCommutator is for electrical reversal (force direction), not mechanical wire management.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "What is the energy transfer that takes place in a DC motor? (1 step)", "answer": "- Step 1: A DC motor converts electrical energy into kinetic energy. The electrical energy from the battery input provides the current, and the motor outputs kinetic energy as rotational movement.\n\nMotor = Electrical IN → Kinetic OUT.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A student is asked how to make a DC motor spin faster. They suggest \"add an iron core.\" Why is this incorrect for a motor, and what are the three correct ways? (2 steps)", "answer": "- Step 1: Adding an iron core is the recipe for making a stronger *electromagnet*, not a faster motor. A faster motor requires a greater force on the coil.\n- Step 2: To make the motor spin faster (increase force), you must increase the variables in $$F = BIL$$: 1) Increase the current $$I$$ (higher voltage), 2) Use stronger magnets (increase $$B$$), 3) Add more turns of wire to the coil (effectively increases length $$L$$ in the field).\n\nFaster motor = ↑I, ↑B, ↑L(turns). Electromagnet = ↑I, ↑turns, add iron core.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is electromagnetic induction (the generator effect), and what is the critical requirement for it to occur? (2 steps)", "answer": "- Step 1: Electromagnetic induction is the process where moving a conductor through a magnetic field (or moving a magnetic field past a conductor) induces an electromotive force (e.m.f.) / voltage in the conductor. If it's in a complete circuit, a current flows.\n- Step 2: The critical requirement is *relative motion* between the conductor and the magnetic field, and specifically, the conductor must \"cut across\" the field lines. Moving the conductor *along* the field lines induces nothing.\n\nInduction requires relative motion and cutting across field lines.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What energy transfer occurs in an AC generator, and is a battery needed? (2 steps)", "answer": "- Step 1: An AC generator converts kinetic energy into electrical energy. The kinetic energy comes from whatever is turning the coil (e.g., a turbine), and electrical energy is the output.\n- Step 2: No battery is needed. The energy source is the mechanical movement doing the turning, not an electrical input.\n\nGenerator = Kinetic IN → Electrical OUT. No battery required.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Contrast the physical structure and the electrical effect of slip rings (in a generator) versus a split-ring commutator (in a motor). (3 steps)", "answer": "- Step 1: Physical structure: A split-ring commutator is one ring split into two halves with a gap. Slip rings are two separate, complete rings with no gaps.\n- Step 2: Connection to coil: In a commutator, each coil end swaps which brush it touches every half turn. With slip rings, each coil end stays connected to its own specific ring/brush the whole time.\n- Step 3: Electrical effect: The commutator reverses the current in the coil every half turn (producing steady DC rotation). Slip rings do not reverse the current, allow
