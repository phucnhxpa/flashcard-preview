ing the naturally alternating induced current to flow out as AC.\n\nCommutator = split, swaps contacts, reverses current (DC). Slip rings = complete, fixed contacts, no reversal (AC).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Why does an AC generator naturally produce alternating current (AC) rather than direct current (DC)? (3 steps)", "answer": "- Step 1: As the coil spins, one side sweeps up through the magnetic field, inducing a current in one direction.\n- Step 2: On the next half turn, that same side of the coil sweeps down through the field, inducing a current in the opposite direction.\n- Step 3: Because the coil uses slip rings, it stays connected to the same external circuit brushes throughout. The induced current in the external circuit therefore reverses direction every half turn, which is the definition of alternating current.\n\nThe continuous spinning + fixed slip ring connections means the current alternates direction as the wire sweeps up then down.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "When the output of an AC generator is plotted as a sine wave, what does the negative half of the curve physically represent? (2 steps)", "answer": "- Step 1: A common trap is thinking the negative half means \"no current.\"\n- Step 2: The negative half represents real current flowing in the *opposite direction* to the positive half. The current alternates direction, and the negative region of the graph simply maps this reverse flow.\n\nNegative AC voltage/current = flow in the opposite direction, not zero current.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "How does the circuit continuity differ between a motor using a split-ring commutator and a generator using slip rings? (2 steps)", "answer": "- Step 1: In a motor with a split-ring commutator, the circuit is briefly broken at the gap every half turn when the brushes transition between the two halves of the ring.\n- Step 2: In a generator with slip rings, there are no gaps. The brushes maintain constant contact with the smooth rings, so the circuit stays connected throughout the entire rotation.\n\nCommutator briefly breaks the circuit; slip rings keep it continuously connected.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "A student says a current-carrying wire in a field is an \"induced magnet.\" Why is this vocabulary wrong, and what is the correct term? (2 steps)", "answer": "- Step 1: An \"induced magnet\" refers to a material that becomes magnetic because a *different* permanent magnet is brought near it (like a paperclip attracted to a bar magnet).\n- Step 2: The wire is an *electromagnet* because it generates its own magnetic field due to the electric current flowing through it, not because another magnet is nearby.\n\nWire with current = electromagnet. Paperclip near magnet = induced magnet.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "How can the magnetic field push a wire when there is \"nothing in between\" physically touching it? (1 step)", "answer": "- Step 1: The force is a non-contact force, similar to gravity. The magnetic field fills the space between the magnets and the wire. The wire's own field interacts with this external field in the space around them, resulting in a force without physical solid contact.\n\nMagnetic forces are non-contact field forces.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Compare the energy inputs/outputs and the key mechanical component that determines whether a device acts as a DC motor or an AC generator. (3 steps)", "answer": "- Step 1: Energy: A motor takes electrical energy in and outputs kinetic energy. A generator takes kinetic energy in and outputs electrical energy.\n- Step 2: Component: A DC motor uses a split-ring commutator to reverse the coil's current and keep it spinning in one direction. An AC generator uses slip rings to let the current alternate naturally.\n- Step 3: Connection: A motor is essentially a generator run backwards. If you put current in, it spins (motor). If you spin it, it gives current out (generator).\n\nMotor = Elec→Kinetic + Commutator; Generator = Kinetic→Elec + Slip rings.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A wire of length $$0.10 \\text{ m}$$ carries a current of $$2.0 \\text{ A}$$. It sits perpendicular to a uniform magnetic field of flux density $$0.50 \\text{ T}$$. What is the magnitude of the force on the wire? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field, $$\\theta = 90^\\circ$$ and $$\\sin 90^\\circ = 1$$. The formula simplifies to $$F = BIL$$.\n- Step 2: Substitute the values: $$F = 0.50 \\times 2.0 \\times 0.10 = 0.10 \\text{ N}$$.\n\nFor perpendicular wires, just multiply B, I, and L directly.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A wire carrying $$3.0 \\text{ A}$$ is in a magnetic field. Initially, it is perpendicular to the field and experiences a force of $$0.60 \\text{ N}$$. The wire is then rotated so it makes an angle of $$30^\\circ$$ with the field. What is the new force? (2 steps)", "answer": "- Step 1: The force is given by $$F = BIL \\sin\\theta$$. The maximum force (at $$90^\\circ$$) is $$F_{max} = BIL = 0.60 \\text{ N}$$.\n- Step 2: At $$30^\\circ$$, the force is scaled by $$\\sin 30^\\circ$$. Since $$\\sin 30^\\circ = 0.5$$, the new force is $$0.60 \\times 0.5 = 0.30 \\text{ N}$$. Tilting the wire halves the force.\n\nThe force scales directly with the sine of the angle between the wire and the field.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A uniform magnetic field points to the Right. A wire carries a conventional current straight Into the page. What is the direction of the force on the wire? (3 steps)", "answer": "- Step 1: Apply Fleming's Left-Hand Rule. Point the First finger (Field) to the Right.\n- Step 2: Point the seCond finger (Current) straight Into the page.\n- Step 3: The thuMb (Force) will point Downwards.\n\nLeft hand: Field (First) Right, Current (seCond) In ⇒ Force (thuMb) Down.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A wire carries a current of $$4.0 \\text{ A}$$ perpendicular to a $$0.25 \\text{ T}$$ magnetic field. The force on the wire is measured as $$0.20 \\text{ N}$$. What length of the wire is actually inside the magnetic field? (2 steps)", "answer": "- Step 1: Rearrange the formula $$F = BIL$$ to solve for length: $$L = F / (BI)$$.\n- Step 2: Substitute the values: $$L = 0.20 / (0.25 \\times 4.0) = 0.20 / 1.0 = 0.20 \\text{ m}$$ (or 20 cm). Only the portion of the wire inside the field contributes to the force.\n\nThe length L in the formula is strictly the portion submerged in the magnetic field.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}], "count": 30}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A wire carrying a current is placed in an external magnetic field and experiences a force. Conceptually, why does this force arise? (2 steps)", "answer": "- Step 1: The current in the wire generates its own circular magnetic field around it.\n- Step 2: This wire's magnetic field interacts with the external magnetic field. The fields superimpose, adding together on one side of the wire (creating high magnetic pressure) and cancelling on the other (low pressure), pushing the wire away from the high pressure region.\n\nThe motor effect is fundamentally a result of two magnetic fields interacting to create a pressure difference.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In the motor effect formula $$F = BIL \\sin\\theta$$, what do the variables $$B$$, $$I$$, and $$L$$ represent, and what are their SI units?", "answer": "The variables represent: $$B$$ is magnetic flux density (unit: Tesla, T), $$I$$ is the current in the wire (unit: Ampere, A), and $$L$$ is the length of the wire inside the magnetic field (unit: metre, m). The force $$F$$ is measured in Newtons (N).", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Magnetic flux density $$B$$ is defined as the constant of proportionality in the relationship $$F \\propto IL$$. How is the Tesla (T) derived and defined from this relationship? (2 steps)", "answer": "- Step 1: Rearranging $$F = BIL$$ gives $$B = \\frac{F}{IL}$$. The Tesla is defined by setting the force, current, and length to 1 in their respective SI units.\n- Step 2: Therefore, 1 T is the magnetic flux density that produces a force of 1 N on a 1 m wire carrying a current of 1 A perpendicular to the field. This means $$1 \\text{ T} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In the formula $$F = BIL \\sin\\theta$$, what does the angle $$\\theta$$ represent, and what is a common misconception about it? (2 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the direction of the magnetic field ($$B$$) and the direction of the current ($$I$$) in the wire.\n- Step 2: The common misconception is that $$\\theta$$ is the angle between the wire and the force. In reality, the force is always perpendicular to the plane formed by $$B$$ and $$I$$, so the angle to the force is always $$90^\\circ$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A wire in a magnetic field experiences maximum force when $$\\theta = 90^\\circ$$ and zero force when $$\\theta = 0^\\circ$$. Explain the physical intuition behind these two limiting cases. (2 steps)", "answer": "- Step 1: At $$90^\\circ$$, the wire is perpendicular to the field, meaning it cuts directly across the maximum number of field lines per unit length. This yields maximum field interaction and maximum force ($$\\sin 90^\\circ = 1$$).\n- Step 2: At $$0^\\circ$$, the wire is parallel to the field. It moves *along* the field lines rather than cutting across them. No field lines are intersected, so there is no interaction and zero force ($$\\sin 0^\\circ = 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What do the First finger, seCond finger, and thuMb represent in Fleming's Left-Hand Rule, and what is the mnemonic?", "answer": "First finger represents the magnetic Field ($$B$$), seCond finger represents the Current ($$I$$), and thuMb represents the Motion or Force ($$F$$). The mnemonic is: First = Field, seCond = Current, thuMb = Motion.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When applying Fleming's Left-Hand Rule, how should the First finger (Field) be oriented?", "answer": "The First finger must point from the North pole to the South pole of the magnetic field (N $$\\rightarrow$$ S). This is the defined direction of the external magnetic field $$B$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "If an exam question states that electrons flow to the right through a wire in a magnetic field, how must you adjust your Fleming's left-hand rule application, and why? (2 steps)", "answer": "- Step 1: You must point your seCond finger (Current) to the LEFT.\n- Step 2: Fleming's rule uses conventional current, which is the direction positive charges would move (from + to -). Since electrons are negative, their flow is opposite to conventional current.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Why is it critical to use the LEFT hand for the motor effect, and what is the right hand reserved for? (2 steps)", "answer": "- Step 1: The left hand is used when a current (that you already have) is placed in a field, causing a force (motor effect: electricity in $$\\rightarrow$$ motion out).\n- Step 2: The right hand is reserved for the generator effect (electromagnetic induction), where motion in a field induces a current (motion in $$\\rightarrow$$ electricity out). Mixing them up reverses the direction of the force or current.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A rectangular coil of wire is placed in a uniform magnetic field and connected to a DC supply. Explain how the forces on the coil cause it to spin. (3 steps)", "answer": "- Step 1: Current flows around the coil. On the two sides of the coil that are perpendicular to the field, the current flows in opposite directions.\n- Step 2: Applying Fleming's Left-Hand Rule to these two sides shows that one side experiences an upward force, while the opposite side experiences a downward force.\n- Step 3: These equal and opposite forces, acting on opposite sides of the coil, create a \"couple\" (a turning effect or torque) that causes the coil to rotate.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Without a commutator, a DC motor coil would oscillate and stop rather than spin continuously. Explain the physical reason it stops. (2 steps)", "answer": "- Step 1: After half a turn, the sides of the coil swap positions. The side that was pushed up is now on the other side, but the current still flows the same way around the coil.\n- Step 2: This means the force on that side is still \"upward\" relative to the field, which now pushes it back the way it came. The forces align vertically and act as a restoring force trying to hold the coil in a vertical position, rather than a turning effect.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "What is the structural feature of a split-ring commutator, and how does it allow a DC motor to spin continuously? (3 steps)", "answer": "- Step 1: The split-ring commutator is a single ring split into two halves with a small gap between them; the coil ends connect to each half.\n- Step 2: As the coil passes the vertical position, the gaps in the commutator pass the brushes, briefly breaking the circuit.\n- Step 3: When contact resumes, each half of the commutator connects to the opposite brush, reversing the current direction in the coil. This ensures the force on each side of the coil always pushes in the same rotational direction.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "In a DC motor, the stationary brushes press against the rotating commutator. What is their essential function? (2 steps)", "answer": "- Step 1: They provide a sliding electrical connection between the stationary external circuit (battery/wires) and the rotating coil.\n- Step 2: This allows current to flow continuously into the coil without the wires twisting and snapping as the coil spins.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "What is the energy transfer that takes place in a DC motor?", "answer": "A DC motor converts electrical energy (from the battery or power supply) into kinetic energy (movement of the coil). Some energy is also dissipated as thermal energy due to resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Based on the formula $$F = BIL$$, what are three ways to increase the force and therefore the speed of a DC motor? (2 steps)", "answer": "- Step 1: The formula shows force is directly proportional to $$B$$, $$I$$, and $$L$$.\n- Step 2: Therefore, you can increase the force/speed by: 1) increasing the current $$I$$ (e.g., higher voltage), 2) using stronger magnets to increase magnetic flux density $$B$$, or 3) increasing the length of wire in the field $$L$$ (by adding more turns to the coil).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A student says \"To make a motor spin faster, add an iron core.\" Explain why this is a misconception, and clarify the difference between strengthening an electromagnet and speeding up a motor. (2 steps)", "answer": "- Step 1: Adding an iron core strengthens an *electromagnet* (the coil itself becomes a stronger magnet), but it does not directly increase the current, the external magnetic field $$B$$, or the length of wire in that external field.\n- Step 2: To make a motor spin faster, you must increase the force on the coil in the external field. This requires more current, stronger external magnets, or more turns of wire in the coil.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "What are the two essential conditions for electromagnetic induction to occur in a circuit, and what is the most common way students misunderstand the motion requirement? (2 steps)", "answer": "- Step 1: There must be relative motion between the conductor and the magnetic field, and the conductor must be part of a complete circuit (to allow current to flow).\n- Step 2: The misunderstanding is assuming any motion works; the conductor must *cut across* the field lines. Moving the conductor *along* the field lines induces zero e.m.f.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A wire is moved inside a uniform magnetic field. Under what condition will the induced e.m.f. be zero, even though there is relative motion? (2 steps)", "answer": "- Step 1: The induced e.m.f. will be zero if the wire moves parallel to the direction of the magnetic field lines.\n- Step 2: This is because the wire must \"cut across\" the field lines to induce an e.m.f. Moving along them means no field lines are being intersected or cut per unit time, so no e.m.f. is generated.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the energy transfer that takes place in an AC generator?", "answer": "An AC generator converts kinetic energy (the mechanical work done to spin the coil) into electrical energy (the induced current in the circuit).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A device has a coil spinning in a magnetic field. How do the connections to the external circuit determine whether the output is AC or DC, and what are the names of these connecting components? (2 steps)", "answer": "- Step 1: If connected via **slip rings** (two continuous, unbroken rings), the current in the external circuit alternates direction (AC) because each side of the coil stays connected to the same brush as it sweeps up and down through the field.\n- Step 2: If connected via a **split-ring commutator** (one ring split in two halves with a gap), the connections swap every half turn. This reverses the current in the external circuit back to the same direction each time it tries to alternate, producing a steady-direction DC output.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "An AC generator uses slip rings to connect the spinning coil to the external circuit. Explain how slip rings result in an alternating current output rather than a direct current. (3 steps)", "answer": "- Step 1: Slip rings are two continuous rings. Each end of the coil is permanently attached to its own ring, meaning each side of the coil always connects to the same brush in the external circuit.\n- Step 2: As the coil spins, one side sweeps up through the field (inducing a current in one direction) and then sweeps down through the field on the next half-turn (inducing a current in the opposite direction).\n- Step 3: Because the connections don't swap, this reversing current is fed directly into the external circuit, creating alternating current (AC).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "On an oscilloscope trace of an AC generator's output, the voltage follows a sine wave with positive and negative peaks. What does the negative half of the sine wave physically represent? (2 steps)", "answer": "- Step 1: It represents the current flowing in the opposite direction to the positive half.\n- Step 2: As the coil rotates, the sides sweep through the field in one direction for the first half-turn (positive peak), and then sweep through in the reverse direction for the second half-turn (negative peak), causing the current to alternate direction.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "How does the energy transfer and primary physical mechanism of a DC motor compare to that of an AC generator? (2 steps)", "answer": "- Step 1: A DC motor uses the motor effect: it takes electrical energy in (current supplied) and uses the force on a current-carrying wire in a field to produce kinetic energy out (spinning).\n- Step 2: An AC generator runs this process in reverse (generator effect): it takes kinetic energy in (spinning the coil) and uses electromagnetic induction (cutting field lines) to produce electrical energy out (induced current).", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "When a current-carrying wire is placed in a uniform magnetic field, the two fields interact to form a \"catapult field.\" How does this field distribution explain the direction of the motor force? (3 steps)", "answer": "- Step 1: The circular magnetic field of the wire adds to the uniform external field on one side of the wire, causing the field lines to bunch up (high magnetic pressure).\n- Step 2: On the other side of the wire, the wire's field subtracts from the external field, causing the field lines to spread out (low magnetic pressure).\n- Step 3: The field lines act like stretched elastic bands trying to straighten out; the high pressure \"catapults\" the wire away from the bunched lines towards the spread-out lines, creating the force.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "In the formula $$F = BIL$$, what is a common trap regarding the length $$L$$, and how should you correctly identify it? (2 steps)", "answer": "- Step 1: The trap is assuming $$L$$ is the total length of the wire in the circuit, or failing to convert units to metres.\n- Step 2: $$L$$ is strictly only the length of the wire that is *inside* the magnetic field. If a 1 m wire only has 0.2 m inside the field, then $$L = 0.2 \\text{ m}$$. Always convert cm to m before calculating.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In a \"describe how a DC motor works\" exam answer, students often make three specific errors: calling the wire an \"induced magnet,\" saying both sides feel force \"upwards,\" and saying the commutator stops wires \"tangling.\" Correct each of these. (3 steps)", "answer": "- Step 1: \"Induced magnet\" is wrong; the wire is an **electromagnet** because it is magnetic due to its own current, not because a magnet is nearby.\n- Step 2: Both sides don't feel force \"upwards\"; by Fleming's Left-Hand Rule, the two sides of the coil carry current in opposite directions, so one side feels an upward force and the other a downward force (creating a couple).\n- Step 3: The commutator doesn't stop wires tangling; it **reverses the current every half turn** to keep the force acting in the same rotational direction, ensuring continuous spin.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A wire of length $$0.50 \\text{ m}$$ carries a current of $$2.0 \\text{ A}$$ perpendicular to a $$1.0 \\text{ T}$$ magnetic field. What is the force on the wire? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field, $$\\theta = 90^\\circ$$ and $$\\sin\\theta = 1$$. Use the formula $$F = BIL$$.\n- Step 2: Substitute the values: $$F = 1.0 \\times 2.0 \\times 0.50 = 1.0 \\text{ N}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "The same wire ($$0.50 \\text{ m}$$, $$2.0 \\text{ A}$$, $$1.0 \\text{ T}$$) is tilted so it makes an angle of $$30^\\circ$$ to the magnetic field. Qualitatively and quantitatively, how does the force change? (2 steps)", "answer": "- Step 1: The force is scaled by $$\\sin 30^\\circ = 0.5$$. The force decreases because a smaller component of the wire's length is effectively cutting across the field lines.\n- Step 2: The new force is $$F = BIL \\sin 30^\\circ = 1.0 \\times 0.5 = 0.50 \\text{ N}$$. The force is halved.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A $$0.50 \\text{ m}$$ wire carrying $$2.0 \\text{ A}$$ is placed perpendicular to a magnetic field and experiences a force of $$1.0 \\text{ N}$$. What is the magnetic flux density $$B$$? (2 steps)", "answer": "- Step 1: Rearrange the formula $$F = BIL$$ to solve for $$B$$: $$B = \\frac{F}{IL}$$.\n- Step 2: Substitute the values: $$B = \\frac{1.0}{2.0 \\times 0.50} = \\frac{1.0}{1.0} = 1.0 \\text{ T}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A wire carries a conventional current straight downwards, and the magnetic field points to the right. What is the direction of the force on the wire? (2 steps)", "answer": "- Step 1: Apply Fleming's Left-Hand Rule: point the First finger (Field) to the right, and the seCond finger (Current) downwards.\n- Step 2: Your thuMb (Motion/Force) will point into the screen/page. The force is directed into the screen.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}], "count": 30}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "State the formula for the force on a current-carrying conductor in a magnetic field, define each symbol, and explain when the force is maximum and zero. (3 steps)", "answer": "- Step 1: **Formula**: $ F = BIL \\sin\\theta $.  \n- Step 2: **Definitions**:  \n  - $ F $: Force (N), perpendicular to both $ B $ and the wire.  \n  - $ B $: Magnetic flux density (T), strength of the field.  \n  - $ I $: Current (A), conventional direction.  \n  - $ L $: Length of wire in the field (m).  \n  - $ \\theta $: Angle between the wire and the magnetic field.  \n- Step 3: **Max/Zero Cases**:  \n  - Maximum force when $ \\theta = 90^\\circ $ ($ \\sin\\theta = 1 $): $ F = BIL $.  \n  - Zero force when $ \\theta = 0^\\circ $ ($ \\sin\\theta = 0 $): Wire parallel to the field.  \n\n**Takeaway**: The force depends on $ B $, $ I $, $ L $, and the angle $ \\theta $, with direction determined by Fleming’s left-hand rule.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does Fleming’s left-hand rule determine the direction of force on a current-carrying conductor? (3 steps)", "answer": "- Step 1: **Hand Orientation**: Use the **left hand** (key rule!).  \n- Step 2: **Fingers' Directions**:  \n  - First finger: **Field** (N→S).  \n  - Second finger: **Current** (conventional, + to -).  \n- Step 3: **Thumb Points**: **Force** (or motion). Forces are perpendicular to both $ B $ and $ I $.  \n  + Example: If $ B $ is rightward and $ I $ into the page, force is downward.  \n\n**Takeaway**: Direction errors arise from using the wrong hand or misaligned fingers. Always align field and current first.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does a DC motor require a split-ring commutator to rotate continuously? (4 steps)", "answer": "- Step 1: **Torque from Current Loop**: Opposite sides of the coil have opposite currents, creating upward and downward forces (Fleming’s rule).  \n- Step 2: **Problem Without Commutator**: At $ 180^\\circ $, forces reverse, causing the coil to stop.  \n- Step 3: **Commutator Function**: Reverses current direction every half-turn, flipping forces to maintain rotation.  \n  + Example: At vertical position, commutator breaks contact, then reconnects opposite brushes, flipping current.  \n- Step 4: **Energy Transfer**: Electrical energy (from battery) → kinetic energy (rotation).  \n\n**Takeaway**: The commutator ensures unidirectional torque by current reversal, enabling continuous rotation.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Compare slip rings (AC generator) and split-ring commutators (DC motor). Why does a generator produce AC? (4 steps)", "answer": "- Step 1: **Slip Rings**: Two complete rings; coil ends stay connected to same rings.  \n- Step 2: **Commutator**: Split into two halves; reverses current every half-turn.  \n- Step 3: **Generator Operation**: Rotating coil cuts field lines. Induced current reverses direction every half-turn (Faraday’s Law).  \n  + Example: When coil side sweeps up, current flows one way; when sweeps down, reverses.  \n- Step 4: **AC Output**: Slip rings allow reversal → alternating current (sine wave with positive/negative halves).  \n\n**Takeaway**: Slip rings allow natural current reversal (AC), while commutators enforce unidirectional force (DC).", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why does electromagnetic induction require relative motion between a conductor and a magnetic field? (3 steps)", "answer": "- Step 1: **Key Condition**: Conductor must \"cut\" field lines (motion across them, not along).  \n  + Example: Moving a wire perpendicular to $ B $ induces e.m.f.  \n- Step 2: **No Motion, No Induction**: If conductor and field are stationary, no field lines are cut; no current.  \n- Step 3: **Energy Transfer**: Kinetic energy (motion) → electrical energy (current).  \n\n**Takeaway**: Induction relies on changing magnetic flux linkage (Δ$ N\\phi $/Δt), requiring relative motion.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "A wire in a magnetic field experiences maximum force. What is the angle $ \\theta $? If the wire is turned to $ 30^\\circ $, how does the force change? (2 steps)", "answer": "- Step 1: **Maximum Force**: $ \\theta = 90^\\circ $, as $ \\sin\\theta = 1 $.  \n- Step 2: **At $ 30^\\circ $**: $ \\sin\\theta = 0.5 $, so force halves ($ F = BIL \\times 0.5 $).  \n  + Example: If initial force was 10 N, it becomes 5 N.  \n\n**Takeaway**: Force scales with $ \\sin\\theta $; tilting reduces effective interaction with the field.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are three ways to increase the speed of a DC motor? Explain each using $ F = BIL $. (3 steps)", "answer": "- Step 1: **Increase Magnetic Field $ B $**: Stronger magnets boost $ B $, directly increasing $ F $.  \n- Step 2: **Increase Current $ I $**: Higher $ I $ raises force (e.g., via higher voltage battery).  \n- Step 3: **More Coils/Turns $ N $**: Adds effective length $ L $ (each turn contributes $ L $, so $ L_{\\text{total}} = N \\times L $).  \n\n**Takeaway**: Speed depends on torque, which is proportional to $ F $; all factors increase $ F $.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "A conductor moves upward through a magnetic field pointing into the page. What is the direction of induced current? (Use right-hand rule.) (3 steps)", "answer": "- Step 1: **Right-Hand Rule**: For induction (generator effect), use the **right hand**.  \n- Step 2: **Fingers**:  \n  - First finger: Field (into the page).  \n  - Thumb: Motion (upward).  \n- Step 3: **Second Finger**: Induced current direction (out of page → left to right).  \n\n**Takeaway**: Motion + field determine current direction; right hand for generators, left for motors.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does a generator not require a battery? (1 step)", "answer": "- Step 1: **Energy Source**: Kinetic energy from external motion (e.g., turbine) is converted to electrical energy via induction. No need for a battery.  \n\n**Takeaway**: Generators produce current from motion; motors consume current to create motion.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "A 0.20 m wire carries 3.0 A at $ 45^\\circ $ to a 0.50 T field. Calculate $ F $. (3 steps)", "answer": "- Step 1: **Formula**: $ F = BIL \\sin\\theta $.  \n- Step 2: **Substitute**: $ F = 0.50 \\times 3.0 \\times 0.20 \\times \\sin45^\\circ $.  \n- Step 3: **Calculate**: $ \\sin45^\\circ \\approx 0.707 $, so $ F \\approx 0.50 \\times 3.0 \\times 0.20 \\times 0.707 = 0.21 \\, \\text{N} $.  \n\n**Takeaway**: Always ensure $ \\theta $ is the angle between the wire and the field.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the angle θ in **F = BIL sinθ** specifically the angle between the wire and the magnetic field direction? (3 steps)", "answer": "- Step 1: The angle θ determines the effective component of the wire’s length moving perpendicular to the magnetic field. Only this perpendicular component contributes to the force.  \n- Step 2: The sine function quantifies this: when θ = 90°, sinθ = 1 (maximum force); when θ = 0°, sinθ = 0 (no force).  \n+ Example: A vertical wire in a horizontal magnetic field (θ = 90°) experiences maximum force.  \n+ Example: A wire aligned with the field (θ = 0°) feels no force.  \n- Step 3: The force arises from the interaction between the magnetic field and the moving charges in the current. Charges moving parallel to the field experience no force (Lorentz force law).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Explain why the unit of magnetic flux density **T (tesla)** is equivalent to **N A⁻¹ m⁻¹** using the formula F = BIL.", "answer": "Rearranging F = BIL:  \nB = F / (IL).  \nForce (F) is in newtons (N), current (I) in amperes (A), length (L) in meters (m).  \nThus, B has units N / (A·m) = N A⁻¹ m⁻¹.  \nThis reflects B as force per unit current-length product.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "A wire carries current **perpendicular to B** (θ = 90°). If the wire’s length is doubled and the current halved, what happens to the force? (2 steps)", "answer": "- Step 1: F = BIL → F ∝ I·L. Doubling L (×2) and halving I (÷2) gives (2 × ½) = 1.  \n- Step 2: The force remains unchanged.  \n+ Example: If original F = 10 N, new F = B·(I/2)·(2L) = BIL = 10 N.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How does **Fleming’s left-hand rule** predict the force direction for an electron beam (negative charges) moving east in a magnetic field pointing north? (3 steps)", "answer": "- Step 1: Fleming’s rule uses conventional current (positive charge motion). Electrons moving east = current west.  \n- Step 2: First finger (field) north, second finger (current) west. Thumb points downward.  \n- Step 3: The force on the electron beam is downward.  \n+ Misconception: Using right hand or ignoring charge direction leads to wrong answer.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does a **DC motor** require a **split-ring commutator** to spin continuously? (3 steps)", "answer": "- Step 1: In a coil, the current direction reverses every half-turn to maintain the same torque direction.  \n- Step 2: The commutator’s split rings disconnect the coil briefly at vertical positions, reversing current.  \n- Step 3: This ensures the force on each coil side always pushes in the same rotational direction.  \n+ Edge case: Without a commutator (e.g., slip rings), the motor would oscillate instead of rotating.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How would the **DC motor’s speed** change if:  \n(a) The number of turns in the coil increases?  \n(b) A weaker magnet is used?  \n(c) The current decreases? (3 steps)", "answer": "- Step 1: Torque (F) ∝ B, I, and L (effective length). More turns = longer L in field → higher force.  \n- Step 2: Weaker B → lower F → slower rotation. Lower I → lower F → slower rotation.  \n+ Example: Doubling turns while halving B keeps F the same.  \n+ Limiting case: If B = 0, no rotation occurs.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Compare the **AC generator** and **DC motor** in terms of:  \n(a) Energy transfer  \n(b) Role of the magnetic field  \n(c) Output current type (3 steps)", "answer": "- Step 1: Energy transfer:  \n+ Generator: Kinetic → electrical.  \n+ Motor: Electrical → kinetic.  \n- Step 2: Magnetic field role:  \n+ Generator: Induces current via motion cutting field lines.  \n+ Motor: Produces force on current-carrying conductor.  \n- Step 3: Output current:  \n+ Generator: AC (due to slip rings).  \n+ Motor: DC (via commutator).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does an **AC generator** produce a **sine wave** when the coil rotates at constant speed in a uniform magnetic field? (3 steps)", "answer": "- Step 1: The induced EMF depends on the rate of change of flux linkage (Faraday’s law).  \n- Step 2: Flux linkage varies as cosθ (θ = angle between field and coil’s normal vector).  \n- Step 3: EMF = -d(NΦ)/dt ⇒ derivative of cosθ = sinθ ⇒ sine wave.  \n+ Example: At θ = 0° (coil face perpendicular to B), EMF is zero (max flux).  \n+ Example: At θ = 90°, EMF peaks (flux changing fastest).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What happens to the induced current in a generator if:  \n(a) The coil rotates twice as fast?  \n(b) A stronger magnet is used?  \n(c) The number of coil turns is halved?", "answer": "- Step 1: Induced EMF ∝ rate of flux change, B, and N (turns).  \n- Step 2: Doubling speed doubles EMF and frequency.  \n- Step 3: Stronger B increases EMF; halved turns reduce EMF by half.  \n+ Misconception: Faster rotation only affects EMF magnitude, not direction.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why a conductor moving **parallel to magnetic field lines** does not induce an EMF. (2 steps)", "answer": "- Step 1: Induction requires the conductor to cut across field lines (ΔΦ≠0).  \n- Step 2: Movement along lines → no flux change → no EMF.  \n+ Example: Wire sliding along a rail in a uniform field (no perpendicular motion) → no induced EMF.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write down the formula for the force on a current-carrying conductor in a magnetic field, state what each symbol represents, and give the SI units for each quantity. (5 parts)", "answer": "- Step 1: The formula is $$F = BIL \\sin \\theta$$\n- Step 2: Each symbol represents:\n  + $$F$$ = force on the wire (newton, N)\n  + $$B$$ = magnetic flux density (tesla, T)\n  + $$I$$ = current in the wire (ampere, A)\n  + $$L$$ = length of wire in the field (metre, m)\n  + $$\\theta$$ = angle between the wire and the magnetic field (degrees or radians)\n- Step 3: The unit of magnetic flux density comes from rearranging: $$B = \\frac{F}{IL}$$, so $$1 \\text{ T} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$\n\n**Takeaway:** This is the fundamental equation for the motor effect — every term matters for the force.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A straight wire carries a current perpendicular to a uniform magnetic field. If you tilt the wire so it makes an angle of 30° with the field instead of 90°, what happens to the force? Explain why using the equation.", "answer": "- Step 1: At 90° (perpendicular), $$\\sin 90° = 1$$, so the force is maximum: $$F_{max} = BIL$$\n- Step 2: At 30°, $$\\sin 30° = 0.5$$, so the force becomes $$F = BIL \\times 0.5 = 0.5 \\times F_{max}$$\n- Step 3: Only the component of the wire that cuts across the field contributes to the force. When the wire is parallel to the field ($$\\theta = 0°$$), it doesn't cut across any field lines, so $$\\sin 0° = 0$$ and the force is zero.\n\n**Takeaway:** The $$\\sin \\theta$$ factor means the force is proportional to how much the wire is \"cutting across\" the field lines.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What does magnetic flux density $$B$$ actually represent physically? Why is 1 tesla considered a very strong field?", "answer": "- Step 1: Magnetic flux density $$B$$ is a measure of the strength of the magnetic field — physically, it relates to how close together the magnetic field lines are packed.\n- Step 2: From $$B = \\frac{F}{IL}$$, a field of 1 tesla means that a 1 metre wire carrying 1 ampere of current perpendicular to the field experiences a force of 1 newton.\n- Step 3: A 1 T field is very strong — it's about 10,000 times stronger than Earth's magnetic field in Europe (which is only about 50 μT). Most lab magnets produce fields around 0.1–1 T.\n\n**Takeaway:** Think of $$B$$ as \"field line density\" — more lines per unit area means stronger field and larger force.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "State Fleming's Left-Hand Rule and explain what each finger represents. Why must you use your LEFT hand specifically?", "answer": "- Step 1: Hold your left hand with the first two fingers and thumb at right angles to each other:\n  + First finger points along the magnetic field (from North to South)\n  + Second finger points along the conventional current (from positive to negative terminal)\n  + Thumb points in the direction of the force (or motion)\n- Step 2: The memory hook: **F**irst = **F**ield, se**C**ond = **C**urrent, thu**M**b = **M**otion\n- Step 3: You must use your LEFT hand because this is the motor rule (force on a current-carrying wire). The RIGHT hand is reserved for the generator effect (induced current).\n\n**Takeaway:** This rule tells you the direction of the non-contact force — no physical touching required.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In a diagram, the magnetic field points to the right, and the conventional current flows INTO the page (away from you). Using Fleming's Left-Hand Rule, which direction does the force act?", "answer": "- Step 1: First finger (field) points to the RIGHT\n- Step 2: Second finger (current) points INTO the page — this is represented by the tail of an arrow (×) or the symbol ⊗\n- Step 3: With these two fingers set, the thumb points DOWNWARD\n- Step 4: So the force acts downward, perpendicular to both the field direction and the current direction.\n\n**Takeaway:** The force is always perpendicular to both B and I — that's why we need a rule to find which perpendicular direction.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A wire carries electron flow (the actual movement of electrons) from left to right. If the magnetic field points upward, what is the direction of the force on the wire? Hint: conventional current is opposite to electron flow.", "answer": "- Step 1: Electron flow is from left to right, so conventional current $$I$$ flows from right to left (opposite direction)\n- Step 2: With field $$B$$ pointing UP and conventional current $$I$$ pointing LEFT, apply Fleming's Left-Hand Rule:\n  + First finger UP (field)\n  + Second finger LEFT (current, right to left)\n- Step 3: The thumb points INTO the page\n- Step 4: So the force acts into the page. A common mistake is using electron flow directly without reversing it first.\n\n**Takeaway:** Always convert electron flow to conventional current first (+ → −) before applying the left-hand rule.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Why does a simple current loop in a magnetic field only rotate half a turn and then stop?", "answer": "- Step 1: When the loop is horizontal, the two sides of the wire carry current in opposite directions\n- Step 2: Using Fleming's Left-Hand Rule, one side experiences an upward force, the other a downward force — this creates a couple that makes the loop rotate\n- Step 3: After rotating 90°, the forces now act vertically upward and downward along the same line — they cancel each other out with no turning effect, so the loop stops\n- Step 4: After another 90° (now upside down), the forces reverse direction relative to the loop, creating a tendency to spin back the way it came — it oscillates rather than spins continuously\n\n**Takeaway:** Without a commutator, the forces eventually align and cancel the turning effect.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the purpose of the split-ring commutator in a DC motor? Explain how it works.", "answer": "- Step 1: The split-ring commutator is a ring split into two halves with a small gap between them\n- Step 2: Each half of the ring is connected to one end of the coil\n- Step 3: As the coil rotates, the gap (split) passes the brushes every half turn, briefly breaking and reconnecting the circuit\n- Step 4: This reversal swaps which brush connects to which end of the coil, effectively reversing the current direction in the coil every half turn\n- Step 5: Result: even though the coil has flipped over, the force on each side still pushes the same way (one side always up, the other always down), so the coil keeps spinning in the same direction\n\n**Takeaway:** The commutator converts the natural AC reversal in the coil into unidirectional rotation (DC output in mechanical form).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "State three ways to make a DC motor spin faster, and explain why each works using $$F = BIL$$", "answer": "- Step 1: **Increase the current $$I$$** — from $$F = BIL$$, larger $$I$$ directly gives larger force, so the motor spins faster\n- Step 2: **Use stronger magnets (larger $$B$$)** — stronger field means more field lines for the wire to interact with, increasing the force $$F$$\n- Step 3: **Add more turns of wire to the coil** — more turns means more wire length $$L$$ in the field, increasing the total force (each turn feels a force, and they add up)\n\n**Takeaway:** Every variable in $$F = BIL$$ that increases also increases the turning force, making the motor spin faster.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is the difference between an \"electromagnet\" and an \"induced magnet\"? Why does this distinction matter?", "answer": "- Step 1: An **electromagnet** is magnetic because it has current flowing through it — it becomes magnetic only when current is applied (like the coil in a motor)\n- Step 2: An **induced magnet** (like iron near a magnet) becomes magnetic due to the presence of another magnetic field, not because of its own current\n- Step 3: In the motor, the wire is NOT an \"induced magnet\" — it's an electromagnet (it has its own current creating its own magnetic field that interacts with the external field)\n- Step 4: Using the wrong term in an exam loses marks — examiners want precise vocabulary\n\n**Takeaway:** The wire in a motor is an electromagnet (current-carrying), not an induced magnet (influenced by external field).", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "Describe the energy conversion in a DC motor. Then describe the reverse process in an AC generator.", "answer": "- Step 1: **DC Motor**: Electrical energy (from the battery) → Kinetic energy (rotational movement of the coil)\n  + The current in the wire interacts with the magnetic field, creating a force that does work and makes things move\n- Step 2: **AC Generator**: Kinetic energy (spinning the coil) → Electrical energy (induced current in the external circuit)\n  + Moving the conductor through the magnetic field \"cuts\" field lines, inducing a voltage that drives current\n- Step 3: The generator is simply running the motor in reverse — you put in movement, you get out electricity\n\n**Takeaway:** Motors convert electrical→kinetic; generators convert kinetic→electrical. These are inverse processes.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is electromagnetic induction? What two conditions must be met for an e.m.f. to be induced in a conductor?", "answer": "- Step 1: Electromagnetic induction (the generator effect) is the phenomenon where moving a conductor through a magnetic field produces an induced voltage (e.m.f.) and potentially a current\n- Step 2: Two conditions must be met:\n  + There must be **relative motion** between the conductor and the magnetic field (either move the wire or move the magnet)\n  + The conductor must **cut across** the field lines, not move along them — moving parallel to the field induces nothing\n- Step 3: No battery is needed — the energy comes from whatever is doing the moving (kinetic energy in)\n\n**Takeaway:** \"Cut across the field lines, not along them\" — this phrase is worth memorising verbatim for exams.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "An AC generator produces alternating current, but a DC motor runs on direct current. Why does the generator output alternate while the motor input doesn't alternate?", "answer": "- Step 1: In an AC generator, the coil connects to the external circuit via **slip rings** — two separate complete rings, one for each end of the coil\n- Step 2: Each ring stays in permanent contact with its brush throughout the entire rotation\n- Step 3: As one side of the coil sweeps upward through the field, the induced current flows one way; on the next half turn, that same side sweeps downward, so the induced current reverses direction\n- Step 4: The output is therefore alternating — it follows a sine wave pattern over time, with the negative half representing current flowing the opposite direction\n- Step 5: In contrast, the DC motor uses a split-ring commutator that actively reverses the current every half turn to maintain unidirectional rotation\n\n**Takeaway:** Slip rings let the natural current reversal pass through unchanged → AC. Commutator reverses the current → keeps rotation one way (DC).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Compare the commutator in a DC motor with the slip rings in an AC generator. What does each device do, and why is the distinction important?", "answer": "- Step 1: **Split-ring commutator (DC motor)**:\n  + Shape: one ring split into two halves with a gap\n  + Connection: each coil end swaps which brush it touches every half turn\n  + Effect: reverses the coil current every half turn\n  + Purpose: keeps the force in the same direction → continuous rotation\n- Step 2: **Slip rings (AC generator)**:\n  + Shape: two separate complete rings\n  + Connection: each coil end stays connected to its own ring permanently\n  + Effect: does NOT reverse the current — lets the natural reversal through\n  + Purpose: output is alternating current (sine wave)\n- Step 3: The key difference: the commutator actively intervenes to reverse current; slip rings passively allow the induced current to alternate\n\n**Takeaway:** Commutator = DC (reverses to keep rotation steady); Slip rings = AC (lets alternation through).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A wire of length 0.15 m carries a current of 5.0 A perpendicular to a 0.20 T magnetic field. Calculate the force on the wire.", "answer": "- Step 1: The wire is perpendicular to the field, so $$\\theta = 90°$$ and $$\\sin \\theta = 1$$\n- Step 2: Use the formula $$F = BIL$$\n- Step 3: Substitute the values: $$F = (0.20 \\text{ T}) \\times (5.0 \\text{ A}) \\times (0.15 \\text{ m})$$\n- Step 4: Calculate: $$F = 0.20 \\times 5.0 \\times 0.15 = 0.15 \\text{ N}$$\n\n**Takeaway:** Quick mental check: 0.2 × 5 × 0.15 = 0.15. Units are newtons. Reasonable force for a lab magnet.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A wire of length 0.30 m carries 4.0 A in a 0.25 T field at an angle of 30° to the field. Calculate the force.", "answer": "- Step 1: Use $$F = BIL \\sin \\theta$$ with $$\\theta = 30°$$\n- Step 2: $$\\sin 30° = 0.5$$ (remember: sin 30° = 0.5, sin 60° = √3/2 ≈ 0.87)\n- Step 3: Substitute: $$F = 0.25 \\times 4.0 \\times 0.30 \\times 0.5$$\n- Step 4: Calculate step by step: First, $$0.25 \\times 4.0 = 1.0$$; then $$1.0 \\times 0.30 = 0.30$$; finally $$0.30 \\times 0.5 = 0.15 \\text{ N}$$\n\n**Takeaway:** The angle factor halves the force compared to the perpendicular case (which would be 0.30 N).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A wire perpendicular to a 0.50 T field experiences a force of 0.060 N when carrying 2.0 A. What is the length of wire in the field?", "answer": "- Step 1: Rearrange the formula $$F = BIL$$ to solve for $$L$$: $$L = \\frac{F}{BI}$$\n- Step 2: Substitute: $$L = \\frac{0.060 \\text{ N}}{(0.50 \\text{ T}) \\times (2.0 \\text{ A})}$$\n- Step 3: Denominator: $$0.50 \\times 2.0 = 1.0$$\n- Step 4: Calculate: $$L = \\frac{0.060}{1.0} = 0.060 \\text{ m} = 6.0 \\text{ cm}$$\n\n**Takeaway:** 6 cm is a reasonable length for a wire in a typical lab field setup.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What is the key difference between how a DC motor gets its rotational motion and how an AC generator creates an electric current? In other words, what's the fundamental operating principle of each?", "answer": "- Step 1: **DC Motor**: Uses the **motor effect** — a current-carrying conductor in a magnetic field experiences a force ($$F = BIL$$). This force directly causes rotation.\n- Step 2: **AC Generator**: Uses **electromagnetic induction** — moving a conductor across magnetic field lines induces an e.m.f. (no current needed to start; movement creates the voltage).\n- Step 3: The motor takes electrical energy and produces kinetic energy; the generator takes kinetic energy and produces electrical energy. They are inverse processes.\n\n**Takeaway:** Motor: electricity in → force → movement. Generator: movement → electricity out. One needs current to create force; the other creates current from movement.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Why is it wrong to say the commutator's job is to \"stop the wires from getting tangled\"? What is its actual job?", "answer": "- Step 1: This is a classic trap — the commutator has nothing to do with preventing wires from tangling\n- Step 2: Its actual job is to **reverse the direction of the current in the coil every half turn**\n- Step 3: This reversal keeps the force on each side of the coil pointing in the same direction (one side always pushed up, the other always pushed down), so the coil continues rotating in the same sense\n- Step 4: Without the commutator, the forces would eventually align and cancel, and the motor would stop after half a turn\n\n**Takeaway:** The commutator's purpose is current reversal for continuous rotation — not physical wire management.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In the AC generator output graph (a sine wave), the negative half of the wave goes below the x-axis. Does this mean \"no current\" during that time? Explain.", "answer": "- Step 1: No — the negative half represents current flowing in the opposite direction through the external circuit\n- Step 2: When the coil is at the top of its rotation, induced e.m.f. is zero (moving parallel to field lines); as it sweeps down, e.m.f. builds to a maximum in one polarity; crossing the horizontal position, it passes through zero again; then sweeps up on the other side, inducing maximum e.m.f. in the opposite polarity\n- Step 3: The negative portion is just as \"real\" as the positive — it's current flowing the other way through whatever is connected (like a light bulb, which doesn't care which direction current flows through it)\n- Step 4: AC appliances work fine with current alternating both directions — that's why it's called \"alternating\" current\n\n**Takeaway:** The negative half is real current flowing the opposite direction — not \"no current.\"", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "When calculating the force on a current-carrying wire, why must you ensure the length $$L$$ is in metres rather than centimetres?", "answer": "- Step 1: The SI unit of magnetic flux density $$B$$ is defined as $$\\text{tesla} = \\text{N A}^{-1} \\text{m}^{-1}$$\n- Step 2: The formula $$F = BIL$$ only gives an answer in newtons if $$L$$ is in metres — the units must be consistent with the definition\n- Step 3: If you mistakenly use $$L$$ in centimetres, your answer will be 100 times too small\n- Step 4: Always convert: $$12 \\text{ cm} = 0.12 \\text{ m}$$, $$25 \\text{ cm} = 0.25 \\text{ m}$$, etc.\n\n**Takeaway:** Unit conversion is not optional — using cm instead of m introduces a systematic factor of 100 error.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A student says: \"For electromagnetic induction, you need to move the magnet, not the coil.\" Is this correct? Explain.", "answer": "- Step 1: Not correct — what matters is **relative motion** between the magnetic field and the conductor\n- Step 2: You can either:\n  + Move the magnet (the field) past a stationary coil, OR\n  + Move the coil through a stationary magnetic field\n- Step 3: Both produce the same induced e.m.f. because the key is the conductor **cutting across field lines** — the relative motion is what counts\n- Step 4: In a generator, we typically spin the coil while the magnets stay stationary, but you could equally spin magnets around a stationary coil\n\n**Takeaway:** Relative motion is the key — either the field or the conductor can move; what matters is the cutting of field lines.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Explain why the force from the motor effect is considered a \"non-contact force.\" Give an analogy to another non-contact force you know.", "answer": "- Step 1: A non-contact force is a force that acts on an object without physical contact — the wire feels a push even though nothing is touching it\n- Step 2: In the motor effect, the current in the wire creates its own magnetic field, which interacts with the external magnetic field — the \"push\" comes from this field-field interaction, not from a physical object touching the wire\n- Step 3: This is analogous to **gravity** — a mass doesn't need to \"touch\" Earth to feel gravitational attraction, and the wire doesn't need to \"touch\" the magnets to feel the motor force\n- Step 4: In exam questions, you can simply apply $$F = BIL$$ and the left-hand rule without needing to explain the underlying field interaction\n\n**Takeaway:** Field forces can act at a distance — the motor effect is non-contact, just like gravity.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A wire lies along the direction of a magnetic field (parallel to it). What force does it experience? Explain using the formula.", "answer": "- Step 1: When the wire is parallel to the field, the angle $$\\theta = 0°$$\n- Step 2: $$\\sin 0° = 0$$\n- Step 3: Therefore $$F = BIL \\sin 0° = BIL \\times 0 = 0$$\n- Step 4: Physically, this makes sense: when the wire runs along the field lines, it isn't cutting across any field lines — it's moving parallel to them, so there's nothing to \"push\" it sideways\n\n**Takeaway:** Maximum force at 90° (perpendicular), zero force at 0° (parallel). Only the component of the wire perpendicular to the field contributes.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the DC motor diagram, one side of the coil has current flowing \"towards you\" and the other side has current flowing \"away from you.\" How does this result in a turning force?", "answer": "- Step 1: Consider the two sides of the coil separately\n- Step 2: Side 1: Current towards you (out of page, ⊙), field runs N→S (say, left to right). Using left-hand rule: thumb points UP → force upward\n- Step 3: Side 2: Current away from you (into page, ⊗), same field direction. Using left-hand rule: thumb points DOWN → force downward\n- Step 4: These two forces are equal in magnitude but opposite in direction, and they act on opposite sides of the coil — this creates a **couple** (a pair of forces producing rotation)\n- Step 5: Without the commutator, after half a turn these forces would reverse and the coil would tend to rotate back — the commutator fixes this by flipping the current\n\n**Takeaway:** Opposite currents on opposite sides → opposite forces → creates the turning couple that spins the motor.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A student applies Fleming's Left-Hand Rule but gets the wrong answer. Give three common mistakes that could cause this error.", "answer": "- Step 1: **Using the wrong hand** — the motor effect (force on current) requires the LEFT hand. The RIGHT hand is for the generator effect (induced current).\n- Step 2: **First finger not pointing N→S** — the field finger must point from north pole to south pole, not the other way\n- Step 3: **Using electron flow instead of conventional current** — the second finger follows conventional current (+ → −). If the question gives electron flow, reverse it first\n- Step 4: **Forcing the thumb to the expected answer** — set the two fingers first (B and I), then read the thumb. Don't decide the answer first and try to fit your hand to it\n\n**Takeaway:** These are the most common direction errors in exams — triple-check each one.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What would happen if an AC generator were built with a split-ring commutator instead of slip rings? Describe the output.", "answer": "- Step 1: The split-ring commutator would reverse the coil current every half turn\n- Step 2: This would cancel out the natural alternating direction change in the induced current\n- Step 3: The external circuit would receive a smoothed, direct current (pulsing DC, but always the same polarity)\n- Step 4: Effectively, you'd get a DC generator (a dynamo) — this is actually how early DC dynamos worked\n- Step 5: So slip rings → AC output; commutator → DC output. The device choice determines the output type\n\n**Takeaway:** The same mechanical rotation can give either AC or DC depending on how you connect the coil to the external circuit.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In terms of magnetic fields, explain why a current-carrying wire experiences a force when placed in an external magnetic field.", "answer": "- Step 1: A current-carrying wire produces its own magnetic field around it (circulating around the wire, direction given by the right-hand grip rule)\n- Step 2: When this wire is placed in an external magnetic field, the two magnetic fields interact\n- Step 3: On one side of the wire, the external field and the wire's own field point in the same direction → they add together → stronger field\n- Step 4: On the other side, they point in opposite directions → they subtract → weaker field\n- Step 5: The wire experiences a force pushing it from the stronger field side toward the weaker field side — this is sometimes called the \"catapult effect\" (the fields \"want to straighten out\")\n\n**Takeaway:** The force arises from the interaction between the external field and the magnetic field created by the current in the wire itself.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Can an AC generator ever produce DC (direct current)? If so, how?", "answer": "- Step 1: Yes, by adding a **commutator** (split-ring) to the design\n- Step 2: The commutator reverses the connection every half turn, which cancels out the natural current reversal\n- Step 3: This device is called a **DC generator** or **dynamo** — it's the electrical inverse of a DC motor\n- Step 4: However, most practical generators produce AC because it's easier to transform (step up/down voltage) and transmit over long distances\n\n**Takeaway:** A generator with a commutator produces DC; with slip rings, it produces AC. The connection method determines the output type.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "State the specification points covered in this lesson. Which ones relate to the motor effect, which to electromagnetic induction, and which to magnetic flux concepts?", "answer": "- Step 1: **Specification point 105**: understand and use the terms magnetic flux density $$B$$, flux $$\\Phi$$, flux linkage $$N\\Phi$$\n- Step 2: **Specification point 107**: use $$F = BIl \\sin \\theta$$ and apply Fleming's left-hand rule to current-carrying conductors — this is the **motor effect**\n- Step 3: **Specification point 108**: the factors affecting the e.m.f. induced in a coil when there is relative motion between the coil and a permanent magnet — this is the **generator/induction**\n- Step 4: **Specification point 110**: Faraday's law and the combined Faraday/Lenz equation $$\\mathcal{E} = -\\frac{d(N\\Phi)}{dt}$$ — this was scheduled for the next lesson\n\n**Takeaway:** Know which spec point maps to which concept: 107 = motor, 108 = generator, 105 = flux terminology, 110 = Faraday's law (next lesson).", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}], "count": 30}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A wire of length 15 cm carries a current of 4.0 A perpendicular to a uniform magnetic field. The force measured is 0.24 N. Find the magnetic flux density $$B$$. Show your working. (3 steps)", "answer": "- Step 1: Identify the correct equation. Since the wire is perpendicular to the field, $$\\theta = 90^\\circ$$ and $$\\sin \\theta = 1$$. The formula simplifies to $$F = BIL$$.\n\n- Step 2: Convert all quantities to SI units. Length must be in metres: $$L = 15 \\text{ cm} = 0.15 \\text{ m}$$.\n\n- Step 3: Rearrange for $$B$$ and substitute:\n$$B = \\frac{F}{IL} = \\frac{0.24 \\text{ N}}{(4.0 \\text{ A})(0.15 \\text{ m})} = \\frac{0.24}{0.60} = 0.40 \\text{ T}$$\n\n+ Sense-check: 0.40 T is a strong laboratory magnet — about 8,000 times stronger than Earth's magnetic field (~50 μT). This is reasonable for two permanent magnets in a school lab setup.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain what is meant by \"magnetic flux density\" $$B$$. Why is 1 tesla defined as 1 N A⁻¹ m⁻¹? (2 steps)", "answer": "- Step 1: Magnetic flux density $$B$$ is the strength of a magnetic field — it tells you how \"intense\" the field is at a point. You can picture it as how closely spaced the magnetic field lines are; denser lines mean a stronger field (higher $$B$$).\n\n- Step 2: From the force equation $$F = BIL$$, we can derive the unit:\n$$B = \\frac{F}{IL}$$\nSubstituting the SI base units: $$\\frac{\\text{newton}}{\\text{ampere} \\times \\text{metre}} = \\frac{\\text{N}}{\\text{A} \\cdot \\text{m}} = \\text{N A}^{-1} \\text{m}^{-1} \\equiv \\text{tesla (T)}$$\n\n+ Intuition: A field of 1 T means that a 1 m wire carrying 1 A of current perpendicular to the field experiences exactly 1 N of force. This is a very strong field — typical laboratory magnets produce around 0.1–1 T, while Earth's magnetic field is only about 50 μT (microtesla).", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "State Fleming's Left-Hand Rule and explain how to apply it correctly. Why must it be the LEFT hand, not the right? (3 steps)", "answer": "- Step 1: Fleming's Left-Hand Rule gives the direction of the force on a current-carrying conductor in a magnetic field. Hold your LEFT hand with the first two fingers and thumb at right angles to each other:\n\n- First finger → Field direction (from North to South)\n- seCond finger → Current direction (conventional current, + to −)\n- Thumb → Motion/Force/Thrust (the direction the wire is pushed)\n\n+ Memory hook: \"First = Field, seCond = Current, thuMb = Motion\"\n\n- Step 2: To apply: (1) point your first finger in the direction of the magnetic field (N→S), (2) point your second finger in the direction of conventional current (+→−), (3) read the direction your thumb points — that's the force.\n\n- Step 3: It MUST be the LEFT hand because this rule applies to the MOTOR effect (force on a current). The RIGHT hand is used for the GENERATOR effect (induced current). Mixing them up is one of the most common exam errors.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A magnetic field points to the right, and a conventional current flows upward. Use Fleming's Left-Hand Rule to find the direction of the force on the wire. (3 steps)", "answer": "- Step 1: Set up your left hand. Point your first finger (Field) to the RIGHT, as given.\n\n- Step 2: Point your second finger (Current) UPWARD. This represents conventional current flowing from positive to negative terminal.\n\n- Step 3: Read your thumb. With fingers pointing right and up, your thumb points OUT OF THE SCREEN (towards you).\n\n+ Alternative representation: If this were drawn on paper, with field right and current up, the force would be \"out of the page\" — often shown with a dot (•) symbol.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A wire carries current INTO the page (away from you), and the magnetic field points UPWARD. Use Fleming's Left-Hand Rule to find the force direction. (3 steps)", "answer": "- Step 1: Set first finger (Field) pointing UP.\n\n- Step 2: Set second finger (Current) pointing INTO the page. Since current is into the page, your second finger points away from you (you can imagine pointing your finger into the page).\n\n- Step 3: With these orientations, your thumb points to the RIGHT.\n\n+ Therefore, the force on the wire is to the RIGHT.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why does a current-carrying wire in a magnetic field experience a force? What two magnetic fields are interacting? (2 steps)", "answer": "- Step 1: A current-carrying wire produces its own magnetic field around it (circulating around the wire, direction given by the right-hand grip rule). When this wire is placed in an external magnetic field, the two fields interact.\n\n- Step 2: If the external field and the wire's field are in the same direction on one side, they reinforce each other (field lines bunch together). On the opposite side of the wire, the fields are opposite and cancel. This imbalance creates a net force pushing the wire from the crowded-field side toward the weak-field side.\n\n+ This is a non-contact force, similar to how gravity works — no physical connection is needed, just the interaction of fields. The force is always perpendicular to both the field direction and the wire direction.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In the formula $$F = BIL \\sin \\theta$$, what is $$\\theta$$? Is it the angle between the wire and the force, or between the wire and the magnetic field? (2 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the wire and the magnetic field direction (not the angle to the force). It is the angle at which the wire \"cuts across\" the field lines.\n\n- Step 2: This gives two critical limiting cases:\n+ When $$\\theta = 90^\\circ$$ (wire perpendicular to field): $$\\sin 90^\\circ = 1$$, so force is maximum: $$F = BIL$$\n+ When $$\\theta = 0^\\circ$$ (wire parallel to field): $$\\sin 0^\\circ = 0$$, so force is zero: $$F = 0$$\n\n+ Common misconception: Students sometimes think $$\\theta$$ is the angle to the force. It is not. The force is always perpendicular to both the field and the wire — that's why Fleming's rule works.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A 25 cm wire carries 3.0 A at an angle of 30° to a 0.40 T magnetic field. Calculate the force on the wire. (3 steps)", "answer": "- Step 1: Write down the full formula: $$F = BIL \\sin \\theta$$\n\n- Step 2: Convert to SI units: $$L = 25 \\text{ cm} = 0.25 \\text{ m}$$. Identify $$\\sin 30^\\circ = 0.5$$.\n\n- Step 3: Substitute all values:\n$$F = (0.40 \\text{ T})(3.0 \\text{ A})(0.25 \\text{ m})(0.5)$$\n$$F = 0.40 \\times 3.0 \\times 0.25 \\times 0.5 = 0.15 \\text{ N}$$\n\n+ Note: This is exactly half the force (0.30 N) that would act if the wire were perpendicular to the field. This makes sense — at 30°, only $$\\sin 30^\\circ = 0.5$$ of the wire's effective length is cutting across the field lines.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A wire of length 0.080 m sits perpendicular to a 0.60 T field. What current is needed to produce a force of 0.12 N? (3 steps)", "answer": "- Step 1: Start with the force formula for perpendicular wire: $$F = BIL$$\n\n- Step 2: Rearrange to solve for current: $$I = \\frac{F}{BL}$$\n\n- Step 3: Substitute and calculate:\n$$I = \\frac{0.12 \\text{ N}}{(0.60 \\text{ T})(0.080 \\text{ m})} = \\frac{0.12}{0.048} = 2.5 \\text{ A}$$\n\n+ Check: $$F = BIL = (0.60)(2.5)(0.080) = 0.12 \\text{ N}$$ ✓", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Explain why a DC motor needs a split-ring commutator. What would happen without it? (3 steps)", "answer": "- Step 1: In a simple current loop in a magnetic field, one side of the loop is pushed up and the other is pushed down — this creates a turning effect (a couple) that makes the coil rotate.\n\n- Step 2: However, after half a rotation, the side that was pushed UP is now on the opposite side of the loop. If the current direction stayed the same, this side would now be pushed DOWN instead. The forces would cancel out, and the coil would stop rotating (or vibrate).\n\n- Step 3: The split-ring commutator fixes this. Every half turn, it automatically swaps which terminal connects to which side of the coil, reversing the current direction. This keeps the force pointing the same way on each side of the coil — one side always pushed up, the other always pushed down — so the coil continues rotating in the same direction.\n\n+ Key phrase to memorise: \"It reverses the current every half turn so the force stays in the same direction.\"", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Describe three ways to make a DC motor spin faster, and explain why each works using $$F = BIL$$. (3 steps)", "answer": "- Step 1: From the formula $$F = BIL$$, a bigger force on the coil means faster rotation. Each method increases one of the three factors:\n\n+ Method 1: Increase the current $$I$$ — a higher current directly increases the force $$F$$ ($$F \\propto I$$). This is why using a higher-voltage battery makes a motor spin faster.\n\n+ Method 2: Use stronger magnets (increase $$B$$) — a stronger magnetic field increases the force ($$F \\propto B$$). This is why powerful motors use strong permanent magnets or electromagnets.\n\n+ Method 3: Add more turns of wire to the coil — more turns effectively increases the total length $$L$$ of wire in the field. Each turn experiences a force, so more turns = more total force.\n\n+ Note: Make sure to distinguish this from making a stronger electromagnet, which uses \"more coils, more current, iron core\" — the motor question specifically asks how to make it spin faster.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is the energy transfer in a DC motor? State whether electrical energy goes in or out, and what form of energy comes out. (1 step)", "answer": "In a DC motor, electrical energy is converted into kinetic energy (mechanical movement). The battery supplies electrical energy → the current in the coil experiences forces in the magnetic field → these forces cause the coil to rotate, producing kinetic energy.\n\n+ Alex emphasised: Write \"ELECTRICAL ENERGY IN\" explicitly in exam answers — examiners reward this explicit energy statement. This applies to hair dryers, electric cars, and any device with an electric motor.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is electromagnetic induction? What two conditions are needed to induce an e.m.f. in a conductor? (2 steps)", "answer": "- Step 1: Electromagnetic induction (also called the generator effect) is the process of generating an e.m.f. (voltage) in a conductor by moving it relative to a magnetic field. If the conductor is part of a complete circuit, this induced e.m.f. causes a current to flow — all without any battery.\n\n- Step 2: Two conditions must be met:\n+ There must be relative motion between the conductor and the magnetic field (either move the wire through the field, or move the field past the wire)\n+ The conductor must \"cut across\" the field lines — it must move ACROSS them, not along them. Moving parallel to the field lines induces no e.m.f.\n\n+ Key phrase to memorise: \"Cut across the field lines, not along them.\" This is worth writing verbatim in exam answers.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "An AC generator produces alternating current. Explain why the output is alternating rather than direct, focusing on the role of slip rings. (3 steps)", "answer": "- Step 1: In an AC generator (dynamo), a coil rotates in a magnetic field. As one side of the coil sweeps UP through the field, the induced current flows in one direction.\n\n- Step 2: On the next half turn, that same side sweeps DOWN through the field. Because the motion direction relative to the field has reversed, the induced current now flows in the opposite direction.\n\n- Step 3: The coil connects to the external circuit via SLIP RINGS — two complete, unbroken rings. Each end of the coil stays permanently connected to its own ring. Since the rings never reverse connections, the natural reversal of induced current every half turn passes straight through to the external circuit.\n\n+ This produces alternating current (AC) — a current that changes direction, shown as a sine wave on an oscilloscope. The negative half of the sine wave represents current flowing the other way; it's not \"no current.\"", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is the key difference between slip rings and a split-ring commutator? Why does a motor use one and a generator use the other? (3 steps)", "answer": "- Step 1: Compare the physical structure:\n+ Split-ring commutator: one ring split into two halves with a gap\n+ Slip rings: two separate, complete rings with no gap\n\n- Step 2: Compare their effects on current:\n+ Split-ring commutator: each coil end SWAPS which brush it touches every half turn → reverses the current direction in the coil\n+ Slip rings: each coil end stays connected to its own ring → does NOT reverse the current\n\n- Step 3: Why each is used:\n+ Motor (DC input): needs the current reversed every half turn to keep forces pointing the same way → uses commutator\n+ Generator (AC output): wants the natural current reversal to pass through to the external circuit → uses slip rings\n\n+ This is a favourite exam comparison. If asked \"What is the difference between a commutator and slip rings?\" — this table is your answer.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What is the energy transfer in an AC generator? (1 step)", "answer": "In a generator, kinetic energy (mechanical movement) is converted into electrical energy. Something (wind turbine, steam turbine, hand crank) provides the mechanical motion → the coil rotates in the magnetic field → an electrical current is induced → electrical energy comes out.\n\n+ This is the reverse of a motor: Motor = electrical in → kinetic out; Generator = kinetic in → electrical out.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In a DC motor, on
