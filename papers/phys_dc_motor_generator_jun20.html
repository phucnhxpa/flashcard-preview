<script>
const cards = [{"q": "A current-carrying wire sits in an external magnetic field and experiences a force. What is the name of this phenomenon, and why does the force arise at a fundamental level? (2 steps)", "a": "- Step 1: This is the **motor effect** \u2014 a current-carrying conductor in a magnetic field experiences a force. The key insight is that the current in the wire produces its *own* magnetic field, and this field *interacts* with the external field.\n- Step 2: The two fields superpose (add together). On one side of the wire the fields reinforce (stronger field), on the other they partially cancel (weaker field). The wire is pushed from the region of stronger field toward the region of weaker field \u2014 this distorted resultant is sometimes called the **catapult field**.\n\nThe force is a *non-contact* force \u2014 nothing solid pushes the wire, just as gravity needs no contact. The field itself mediates the interaction.", "source": "GLM 5.1"}, {"q": "State the formula for the force on a current-carrying conductor in a magnetic field, and identify every symbol, its physical quantity, and its SI unit. (3 steps)", "a": "- Step 1: The formula is $$F = BIL \\sin\\theta$$\n- Step 2: Each symbol:\n  + $$F$$ \u2014 force on the wire \u2014 newton (N)\n  + $$B$$ \u2014 magnetic flux density \u2014 tesla (T)\n  + $$I$$ \u2014 current in the wire \u2014 ampere (A)\n  + $$L$$ \u2014 length of wire *inside* the field \u2014 metre (m)\n  + $$\\theta$$ \u2014 angle between the wire and the magnetic field \u2014 degree or radian\n- Step 3: Only the portion of the wire physically within the field counts for $$L$$. If a 1 m wire has only 20 cm between the magnet poles, then $$L = 0.20$$ m, not 1 m.", "source": "GLM 5.1"}, {"q": "In $$F = BIL\\sin\\theta$$, what exactly does the angle $$\\theta$$ represent? A common exam trap is to confuse it with another angle \u2014 which one, and why is that wrong? (2 steps)", "a": "- Step 1: $$\\theta$$ is the angle **between the wire (direction of current) and the magnetic field** $$B$$. It is *not* the angle between the force and the field, nor the angle between the force and the wire.\n- Step 2: The force is *always* perpendicular to both the wire and the field (by the nature of the cross-product / Fleming's rule). So the angle between the force and either the wire or the field is always 90\u00b0 regardless of $$\\theta$$. If you confused $$\\theta$$ with the force-to-field angle, you'd always get $$\\sin 90\u00b0 = 1$$ and miss the real dependence.", "source": "GLM 5.1"}, {"q": "What are the two limiting cases of $$F = BIL\\sin\\theta$$, and what is the physical intuition for why the force behaves this way in each case? (3 steps)", "a": "- Step 1: **Wire perpendicular to the field** ($$\\theta = 90\u00b0$$, $$\\sin\\theta = 1$$): force is *maximum*, $$F = BIL$$. The wire cuts directly across the maximum number of field lines per unit length.\n- Step 2: **Wire parallel to the field** ($$\\theta = 0\u00b0$$, $$\\sin\\theta = 0$$): force is *zero*. The wire runs *along* the field lines, so it never cuts across them \u2014 there is no perpendicular component of current to interact with the field.\n- Step 3: Intuition: only the *component of the current perpendicular to the field* contributes to the force. Mathematically, this perpendicular component is $$I\\sin\\theta$$, which is exactly what the formula captures. At 0\u00b0, the perpendicular component vanishes; at 90\u00b0, the entire current is perpendicular.", "source": "GLM 5.1"}, {"q": "Magnetic flux density $$B$$ is defined by rearranging $$F = BIL$$. Walk through the formal definition, derive the SI unit of $$B$$ in terms of base units, and give a real-world sense of how strong 1 tesla is. (3 steps)", "a": "- Step 1: Rearranging $$F = BIL$$ (at $$\\theta = 90\u00b0$$): $$B = \\frac{F}{IL}$$. This is the *defining equation* \u2014 $$B$$ is the force per unit current per unit length on a conductor placed perpendicular to the field.\n- Step 2: Unit derivation: $$[B] = \\frac{[F]}{[I][L]} = \\frac{\\text{N}}{\\text{A\u00b7m}} = \\text{N A}^{-1}\\text{ m}^{-1} \\equiv \\text{tesla (T)}$$.\n- Step 3: 1 T is a very strong field. Earth's magnetic field in Europe is about $$50\\;\\mu\\text{T}$$, so 1 T is roughly **10 000 times stronger** than Earth's field. A typical lab ceramic magnet might produce ~0.5 T between its poles. Visually, picture $$B$$ as \"how densely packed the field lines are\" \u2014 more lines per area = stronger field = larger $$B$$.", "source": "GLM 5.1"}, {"q": "Why does the formula $$F = BIL\\sin\\theta$$ contain a $$\\sin\\theta$$ rather than a $$\\cos\\theta$$? Build the intuition from the idea of \"cutting field lines.\" (3 steps)", "a": "- Step 1: Imagine the wire at angle $$\\theta$$ to the field. The wire's direction can be split into two components: one *along* the field and one *perpendicular* to the field.\n- Step 2: Only the perpendicular component of the wire \"cuts across\" field lines as current flows. The parallel component runs *along* the lines and never cuts any. The perpendicular component of the wire's current contribution is proportional to $$\\sin\\theta$$ (opposite over hypotenuse, where the \"opposite\" side is the perpendicular reach across the field).\n- Step 3: Therefore the effective current that interacts with the field is $$I\\sin\\theta$$, giving $$F = B(IL\\sin\\theta) = BIL\\sin\\theta$$. If we had used $$\\cos\\theta$$, it would mean the *parallel* component matters \u2014 but running along the field lines produces zero force, contradicting the physics.", "source": "GLM 5.1"}, {"q": "Which hand do you use for the motor effect, and what would go wrong if you used the other hand? (2 steps)", "a": "- Step 1: You must use your **left hand** for the motor effect (force on a current-carrying conductor). The right hand is for the *generator effect* (induced current from motion).\n- Step 2: Using the right hand reverses *every* direction answer. For example, if the correct force is upward, the right hand would give downward. In an exam this is an automatic zero on any direction question \u2014 there is no partial credit for \"right hand, wrong answer.\"", "source": "GLM 5.1"}, {"q": "State Fleming's Left-Hand Rule: what does each digit represent, and what is the memory hook? (3 steps)", "a": "- Step 1: Hold your left hand with thumb and first two fingers at right angles:\n  + **First finger** \u2192 **Field** ($$B$$), pointing from North to South (N \u2192 S)\n  + **seCond finger** \u2192 **Current** ($$I$$), pointing in the direction of conventional current (+ \u2192 \u2212)\n  + **thuMb** \u2192 **Motion / force** ($$F$$), pointing in the direction the wire is pushed\n- Step 2: The memory hook: **First** = **F**ield, **seCond** = **C**urrent, **thuMb** = **M**otion. The bold letters match.\n- Step 3: The force (thumb) is always *perpendicular* to both the field and the current \u2014 the geometry of your hand enforces this. You cannot point all three in the same plane; the thumb always juts out at 90\u00b0 to both fingers.", "source": "GLM 5.1"}, {"q": "When applying Fleming's Left-Hand Rule, what is the correct procedure to avoid forcing the answer, and why does this matter? (2 steps)", "a": "- Step 1: **Set the two fingers first** \u2014 lock your first finger on the field direction (N\u2192S) and your second finger on the conventional current direction. *Then* read off the thumb for the force. Do not pre-decide where the force should go and then rotate your hand to match.\n- Step 2: If you force the thumb first, you will unconsciously twist your fingers to \"agree,\" often misaligning the field or current finger. The exam deliberately sets up scenarios where the force direction is unintuitive (e.g., downward or into the page). Trust the rule, not your intuition about \"which way it should go.\"", "source": "GLM 5.1"}, {"q": "A question gives you the direction of *electron flow* rather than conventional current. How do you adjust when applying Fleming's Left-Hand Rule, and why? (2 steps)", "a": "- Step 1: Fleming's rule uses **conventional current** \u2014 the direction positive charge would move (from + terminal to \u2212 terminal). Electrons are negative, so electron flow is in the *opposite* direction to conventional current.\n- Step 2: Before setting your second finger, **reverse** the given electron-flow direction. If electrons move to the left, conventional current is to the right \u2014 point your second finger to the right. If you forget to reverse, every direction answer will be wrong by 180\u00b0.", "source": "GLM 5.1"}, {"q": "In the motor effect, the force on the wire is described as a \"non-contact force.\" What does this mean, and what other familiar force shares this property? Why might a student find this surprising? (2 steps)", "a": "- Step 1: A non-contact force acts across empty space without any solid object physically touching. The magnetic field itself is the intermediary \u2014 it exerts the force on the wire even though nothing visible \"pushes\" it. Gravity is another non-contact force: the Earth pulls you down without touching you.\n- Step 2: Students often find this surprising because everyday pushing/pulling involves contact (your hand on a door). But fields \u2014 gravitational, electric, and magnetic \u2014 can exert forces at a distance. In the exam, you don't need to explain *how* the field mediates the force; just use $$F = BIL\\sin\\theta$$ and the left-hand rule.", "source": "GLM 5.1"}, {"q": "Why does a current-carrying *loop* (coil) in a magnetic field rotate rather than just get pushed in one direction? Walk through the physics step by step. (3 steps)", "a": "- Step 1: Consider a rectangular coil between N and S poles. The two opposite sides of the coil carry current in *opposite* directions (current flows around the loop).\n- Step 2: Apply Fleming's Left-Hand Rule to each side separately:\n  + Side 1 (current out of page): force is *upward*\n  + Side 2 (current into page): force is *downward*\n- Step 3: These two forces form a **couple** \u2014 equal and opposite forces that don't act along the same line. A couple produces a *turning effect* (torque), not linear motion. One side is pushed up, the other down, so the coil *rotates*. This is the fundamental operating principle of every DC motor.", "source": "GLM 5.1"}, {"q": "Without a commutator, a DC motor coil would only rotate half a turn and then stop (or oscillate). Explain *why* this happens by tracking the forces through a full rotation. (3 steps)", "a": "- Step 1: During the first half-turn, the upward force on one side and downward force on the other produce a turning effect that rotates the coil from horizontal toward vertical.\n- Step 2: Once the coil passes the vertical position, the sides have swapped places \u2014 the side that was on the left is now on the right. But the *current direction in each side hasn't changed* (no commutator), so the force on each side still points the same absolute way (e.g., the side now on the right is still pushed upward).\n- Step 3: Now the forces produce a turning effect in the *opposite* direction \u2014 they try to push the coil *back* the way it came. The coil oscillates back and forth around the vertical position and eventually settles there. Without the commutator, there is no continuous one-way rotation.", "source": "GLM 5.1"}, {"q": "What is the job of the split-ring commutator in a DC motor? Explain *how* it achieves continuous one-way rotation. (3 steps)", "a": "- Step 1: The split-ring commutator is a single ring split into two halves with a small gap between them. Each half connects to one end of the coil. Stationary carbon brushes press against the rotating ring to maintain electrical contact.\n- Step 2: Every half turn, the gap passes a brush. At that moment, each coil end *swaps* which half-ring (and therefore which brush) it is connected to. This **reverses the direction of current in the coil**.\n- Step 3: Because the current reverses exactly when the coil passes the vertical position, the force on each side *also* reverses \u2014 but the side has physically moved to the opposite position. The net effect: the force on each side always acts in the *same rotational sense* (e.g., one side always gets pushed upward at that position, the other downward). The coil keeps spinning the same way continuously.", "source": "GLM 5.1"}, {"q": "At the exact moment the commutator gap passes a brush, the circuit briefly breaks. Why doesn't the motor stop at that instant? (2 steps)", "a": "- Step 1: The break is extremely brief \u2014 it occurs only while the gap is passing the brush. In practice, the coil's rotational **inertia** (its existing kinetic energy of rotation) carries it through this tiny dead zone.\n- Step 2: By the time the circuit reconnects (the other half of the ring now touching the brush, current reversed), the coil has already passed the vertical position and the new force direction keeps it spinning the same way. The brief disconnect is a feature, not a bug \u2014 it is the moment the current reversal happens.", "source": "GLM 5.1"}, {"q": "List the three ways to make a DC motor spin faster, and explain why each one works by linking back to the formula $$F = BIL$$. (3 steps)", "a": "- Step 1: **Increase the current** $$I$$ \u2014 use a higher voltage battery or lower-resistance wire (e.g., copper). From $$F = BIL$$, doubling $$I$$ doubles the force on each side, producing a larger torque and faster acceleration.\n- Step 2: **Use stronger magnets** (increase $$B$$) \u2014 a larger flux density means each ampere of current experiences a larger force. Again, $$F = BIL$$: double $$B$$, double $$F$$.\n- Step 3: **More turns of wire on the coil** (increase effective $$L$$) \u2014 each additional turn adds another length of wire in the field experiencing force. Crucially, adding turns keeps the wire *close to the magnets* where $$B$$ is strongest, rather than making the coil physically wider (which would place wire in weaker field regions). More turns = more total force = faster rotation.", "source": "GLM 5.1"}, {"q": "\"More coils, more current, iron core\" is the recipe for a stronger electromagnet. \"More current, stronger magnet, more coils\" is the recipe for a faster motor. Why is the iron core listed for the electromagnet but NOT for the motor? (2 steps)", "a": "- Step 1: An **iron core** inside an electromagnet's coil concentrates and amplifies the magnetic field the coil produces \u2014 it magnetises easily and greatly increases $$B$$ *produced by* the coil. This is exactly what you want in an electromagnet: a stronger field from the same current.\n- Step 2: In a **motor**, the magnetic field is produced by the *permanent magnets* (or a separate field coil), not by the rotating armature. Adding an iron core to the armature doesn't increase the permanent magnets' field \u2014 it just adds mass and inertia, making the motor *slower* to accelerate. The motor needs a larger *force*, which comes from $$B$$, $$I$$, and $$L$$, not from magnetising the core. This distinction is a deliberate exam trap.", "source": "GLM 5.1"}, {"q": "What is electromagnetic induction (the generator effect)? State the condition required for it to occur, and contrast it with the motor effect in terms of energy transfer. (3 steps)", "a": "- Step 1: **Electromagnetic induction**: if you move a conductor through a magnetic field (or move the field past the conductor), a voltage (e.m.f.) is *induced* in the conductor. If the conductor is part of a complete circuit, an induced current flows.\n- Step 2: The essential condition is **relative motion between the conductor and the magnetic field, and the conductor must cut *across* the field lines** (perpendicular to them). Moving *along* the field lines induces nothing.\n- Step 3: Energy contrast:\n  + **Motor**: electrical energy *in* \u2192 kinetic energy *out* (electricity makes it move)\n  + **Generator**: kinetic energy *in* \u2192 electrical energy *out* (movement makes electricity)\n\nThe generator is the motor run backwards. No battery is needed in a generator \u2014 the energy comes from whatever does the moving.", "source": "GLM 5.1"}, {"q": "\"The conductor must cut across the field lines, not along them.\" Why is motion *along* the field lines useless for induction, and what is the simplest physical picture to remember this? (2 steps)", "a": "- Step 1: Think of field lines as physical strings stretching from N to S. If you move a wire *perpendicular* to these strings, the wire \"cuts through\" them \u2014 the changing magnetic environment around the wire induces an e.m.f. If you move the wire *parallel* to the strings, it slides along them without cutting any \u2014 the magnetic environment around the wire doesn't change, so no e.m.f. is induced.\n- Step 2: This is directly analogous to the motor effect: a wire parallel to the field feels zero force ($$\\theta = 0\u00b0$$, $$\\sin\\theta = 0$$). The same geometry governs both \u2014 only the perpendicular component of motion (or current) interacts with the field.", "source": "GLM 5.1"}, {"q": "An AC generator uses slip rings, not a split-ring commutator. What are slip rings physically, and why do they produce AC output rather than DC? (3 steps)", "a": "- Step 1: **Slip rings** are two separate, *complete* (unbroken) rings. Each end of the coil is permanently connected to its own ring. Stationary brushes press against the rings to maintain contact with the external circuit as the coil rotates.\n- Step 2: Because each coil end stays on its *own* ring throughout the rotation, the current direction in the external circuit reflects *exactly* what is happening in the coil at that moment. As a coil side sweeps *up* through the field, the induced current flows one way; half a turn later, that same side sweeps *down*, and the induced current flows the *opposite* way.\n- Step 3: The output therefore **alternates direction** every half turn \u2014 this is **alternating current (AC)**. There is no mechanism to reverse the current to keep it one-way (that's what a commutator would do, producing DC). The circuit never breaks because the rings are complete \u2014 no gap.", "source": "GLM 5.1"}, {"q": "Compare the split-ring commutator and slip rings across four categories: shape, connection to coil, effect on current direction, and purpose/output. (4 steps)", "a": "- Step 1: **Shape**: Commutator = one ring split into two halves with a gap. Slip rings = two separate, complete (unbroken) rings.\n- Step 2: **Connection to coil**: Commutator \u2014 each coil end *swaps* which brush it touches every half turn. Slip rings \u2014 each coil end *stays* on its own ring permanently.\n- Step 3: **Effect on current direction**: Commutator \u2014 *reverses* the current in the coil every half turn. Slip rings \u2014 does *not* reverse; the natural reversal of induced current passes through to the external circuit.\n- Step 4: **Purpose/output**: Commutator \u2014 keeps the force in one rotational sense \u2192 steady rotation with DC input. Slip rings \u2014 lets the alternating induced current through \u2192 AC output from the generator.", "source": "GLM 5.1"}, {"q": "The output of an AC generator plotted against time is a sine wave. What does the negative half of the sine wave physically represent, and what is a common misconception about it? (2 steps)", "a": "- Step 1: The negative half represents **real current flowing in the opposite direction**. When the coil side that was sweeping upward through the field now sweeps downward, the induced e.m.f. reverses polarity, and the current reverses direction. This is exactly what \"alternating\" means \u2014 the current *alternates direction*.\n- Step 2: Common misconception: students think the negative half means \"no current\" or \"current dropping below zero and disappearing.\" It doesn't \u2014 the current is just as strong as in the positive half, but flowing the other way. The zero crossings (where the graph crosses the time axis) are the moments the coil is momentarily moving *along* the field lines (no cutting), so the induced e.m.f. is instantaneously zero.", "source": "GLM 5.1"}, {"q": "When the coil in an AC generator is at the position where its plane is perpendicular to the field (coil face-on to the field), the induced e.m.f. is zero. When the coil's plane is parallel to the field (coil edge-on), the e.m.f. is maximum. Explain this counterintuitive result. (3 steps)", "a": "- Step 1: What matters for induction is the *rate at which the conductor cuts field lines*, which depends on the component of the coil's velocity that is *perpendicular* to the field.\n- Step 2: When the coil is face-on to the field (maximum flux *through* the coil), the sides of the coil are moving *along* the field lines (parallel to $$B$$). They are not cutting across any lines, so the rate of cutting is zero \u2192 e.m.f. = 0.\n- Step 3: When the coil is edge-on (minimum flux through the coil), the sides are moving *perpendicular* to the field lines, cutting across the maximum number of lines per second \u2192 e.m.f. is maximum. This is why the e.m.f. sine wave is 90\u00b0 out of phase with the flux: flux is maximum when e.m.f. is zero, and vice versa.", "source": "GLM 5.1"}, {"q": "A student says: \"The wire in a magnetic field becomes an induced magnet.\" This is wrong. What is the correct term, and why is the distinction important? (2 steps)", "a": "- Step 1: The correct term is **electromagnet**. An electromagnet is magnetic *because current flows through it* \u2014 the magnetic field comes from the current itself. An \"induced magnet\" is a different concept: a piece of magnetic material that becomes temporarily magnetised when a *permanent* magnet is brought near it (with no current involved).\n- Step 2: The distinction matters because the wire's magnetism is *caused by its own current*, not by the external field. Calling it \"induced\" implies the external magnet made it magnetic by proximity, which is wrong. Examiners mark this vocabulary precisely.", "source": "GLM 5.1"}, {"q": "A student writes: \"The commutator stops the wires getting tangled.\" This was a planted error in the lesson. What is the *actual* function of the commutator, and why is the \"tangled wires\" explanation completely wrong? (2 steps)", "a": "- Step 1: The commutator's actual function: it **reverses the current direction in the coil every half turn**, ensuring the force on each side always acts in the same rotational sense, producing continuous one-way rotation.\n- Step 2: The \"tangled wires\" explanation is wrong because the commutator is an *electrical* component, not a mechanical guide. The wires don't tangle because the coil is rigid and the brushes are stationary \u2014 the commutator's split design is about *switching electrical connections*, not about physical wire management. This is a classic exam planted-error designed to test whether you understand the *purpose* vs. just the *appearance* of the component.", "source": "GLM 5.1"}, {"q": "In a radial magnetic field (N pole in the centre, S pole around the outside), a current loop experiences a force that always points in the same sense (e.g., always out of the screen). Explain why, using Fleming's Left-Hand Rule. (3 steps)", "a": "- Step 1: In a radial field, the field lines point outward from N in the centre toward S around the edge. At any point on the loop, the field $$B$$ points radially outward (from centre to edge).\n- Step 2: The current in the loop runs circumferentially (around the centre). At every point, the current direction is *perpendicular* to the radial field direction. Apply Fleming's LHR: first finger points radially outward (field), second finger points along the current (tangentially) \u2014 the thumb consistently points in the same direction (e.g., out of the screen) at every point.\n- Step 3: Because the field is radial (not uniform between flat poles), the geometry always keeps $$B$$ perpendicular to the current, so $$\\sin\\theta = 1$$ everywhere and the force is always maximum and in the same sense. This is why radial fields are used in real motors \u2014 they give a constant torque at all angles.", "source": "GLM 5.1"}, {"q": "You see a 2D diagram of a magnetic field with N and S poles drawn flat in the same plane. A common mistake is to assume one pole is \"stacked on top\" of the other in 3D. Why does this error completely ruin your Fleming's LHR answer? (2 steps)", "a": "- Step 1: If you incorrectly imagine N above and S below (3D stacking), you'll point your first finger *vertically* (up or down) for the field direction. But if the poles are actually flat in the same plane, the field runs *horizontally* across the page (N\u2192S in the plane).\n- Step 2: Getting the field direction wrong by 90\u00b0 means your first finger is off by 90\u00b0, which rotates the entire hand and makes the thumb (force) point in a completely wrong direction. The rule: **read only what is drawn**. If the poles are shown in the same plane, the field is in that plane. Don't import a 3D stacking that isn't drawn.", "source": "GLM 5.1"}, {"q": "A wire of length 0.10 m carries 2.0 A perpendicular to a 0.50 T field. Without doing a full calculation, estimate the force and state whether it is closer to 0.01 N, 0.1 N, or 1 N. Then verify. (2 steps)", "a": "- Step 1: Quick mental estimate: $$F = BIL = 0.5 \\times 2 \\times 0.1 = 0.5 \\times 0.2 = 0.1$$ N. The answer is closest to **0.1 N**.\n- Step 2: Verification: $$F = (0.50)(2.0)(0.10) = 0.10$$ N \u2713. The key insight: with values of order ~0.1\u20131 in each variable, the force comes out in the 0.01\u20131 N range. If you ever get an answer of 10,000 N from a lab magnet, you forgot to convert cm to m.", "source": "GLM 5.1"}, {"q": "A wire is perpendicular to a 0.60 T field and carries 2.5 A. The measured force is 0.15 N. Without solving algebraically, reason about whether the length of wire in the field is closer to 1 cm, 10 cm, or 1 m. (2 steps)", "a": "- Step 1: We know $$F = BIL$$, so $$L = F/(BI)$$. Mentally: $$B \\times I = 0.6 \\times 2.5 = 1.5$$. Then $$L = 0.15/1.5 = 0.10$$ m.\n- Step 2: 0.10 m = 10 cm. This is a typical lab scale \u2014 a few centimetres of wire between magnet poles. If you had gotten 1 cm (0.01 m) or 1 m, the numbers would not have been self-consistent with the 0.15 N force. The takeaway: the length in a motor-effect calculation is always the *small* portion of wire physically between the poles, typically centimetres, not metres.", "source": "GLM 5.1"}, {"q": "A wire makes an angle of 30\u00b0 with the magnetic field instead of being perpendicular. By what factor does the force change, and why? (2 steps)", "a": "- Step 1: The force formula includes $$\\sin\\theta$$. At 90\u00b0 (perpendicular), $$\\sin 90\u00b0 = 1$$. At 30\u00b0, $$\\sin 30\u00b0 = 0.5$$. The force is therefore **halved** \u2014 it changes by a factor of 0.5.\n- Step 2: The physical reason: only the component of the wire's current *perpendicular* to the field contributes to the force. At 30\u00b0 to the field, the perpendicular component is $$I\\sin 30\u00b0 = 0.5I$$ \u2014 half the current is \"wasted\" running along the field lines where it produces no force. This is why the motor effect is maximised when the wire is perpendicular to the field.", "source": "GLM 5.1"}, {"q": "Name the energy transfer for (a) a DC motor and (b) an AC generator. Why is it important to state this explicitly in an exam answer? (2 steps)", "a": "- Step 1:\n  + (a) **Motor**: electrical energy *in* \u2192 kinetic energy *out* (the battery supplies electrical energy; the motor produces movement)\n  + (b) **Generator**: kinetic energy *in* \u2192 electrical energy *out* (something moves the coil; the generator produces electricity)\n- Step 2: Examiners reward an explicit energy statement because it demonstrates you understand the *purpose* of the device, not just its structure. Alex made \"a big deal\" of writing \"ELECTRICAL ENERGY IN\" on the motor diagram. Without this, a \"how a motor works\" answer is incomplete \u2014 it's like describing a car's engine without mentioning it converts chemical energy to kinetic energy.", "source": "GLM 5.1"}, {"q": "A motor and a generator are structurally almost identical (coil, magnets, brushes). What is the fundamental difference in *what you do with them*, and how does this relate to the energy transfers? (2 steps)", "a": "- Step 1: The difference is what you *input* and what you *get out*:\n  + **Motor**: you *connect a battery* (electrical input) \u2192 the coil *spins* (kinetic output)\n  + **Generator**: you *spin the coil* (kinetic input) \u2192 you *get a current out* (electrical output)\n- Step 2: They are the same device run in reverse. The motor uses the motor effect ($$F = BIL$$) to convert electrical energy to kinetic. The generator uses electromagnetic induction to convert kinetic energy to electrical. The structural similarity is why a motor can act as a generator if you spin it \u2014 this is the principle behind regenerative braking in electric cars.", "source": "GLM 5.1"}, {"q": "What is the complete chain of explanation for \"how a DC motor works\" that would earn full marks on a 6-mark structured question? List each step. (6 steps)", "a": "- Step 1: A current-carrying coil is placed in a magnetic field (between N and S poles).\n- Step 2: The current in the two opposite sides of the coil flows in *opposite* directions.\n- Step 3: By Fleming's Left-Hand Rule, each side experiences a force in the *opposite* direction (one upward, one downward).\n- Step 4: These opposite forces form a couple, producing a turning effect that makes the coil rotate.\n- Step 5: The split-ring commutator reverses the current in the coil every half turn.\n- Step 6: This ensures the force on each side always acts in the same rotational sense, so the coil rotates continuously in one direction. Electrical energy is converted to kinetic energy.", "source": "GLM 5.1"}, {"q": "What is the complete chain of explanation for \"how an AC generator works\" that would earn full marks? List each step. (5 steps)", "a": "- Step 1: A coil is rotated in a magnetic field (between N and S poles) by some external mechanical force.\n- Step 2: As the coil rotates, the sides of the coil cut across the magnetic field lines, and the rate of cutting changes continuously as the angle changes.\n- Step 3: By electromagnetic induction, an e.m.f. is induced in the coil. If the coil is part of a complete circuit, an induced current flows.\n- Step 4: The coil connects to the external circuit through slip rings and brushes (not a commutator). Each coil end stays on its own ring.\n- Step 5: As each side of the coil sweeps up then down through the field, the induced current reverses direction every half turn, producing alternating current (AC). Kinetic energy is converted to electrical energy.", "source": "GLM 5.1"}, {"q": "Why can't you just use a commutator in a generator to get DC output? What would happen if you tried? (2 steps)", "a": "- Step 1: You *can* use a commutator in a generator \u2014 that's exactly how a **DC generator** (dynamo) works. The commutator reverses the external connection every half turn, so the output current always flows the same way through the external circuit (DC).\n- Step 2: However, the IAL specification focuses on the **AC generator with slip rings**. The key point: if you *want* AC output, you must use slip rings to let the natural current reversal through. If you use a commutator, you *force* the output to be DC by undoing the natural reversal. The exam expects you to know that slip rings \u2192 AC, commutator \u2192 DC, and to explain *why*.", "source": "GLM 5.1"}, {"q": "A student claims: \"The magnetic field is produced by the wire, so we call it an electromagnetic field.\" This was corrected in the lesson. What is the correct terminology, and why? (2 steps)", "a": "- Step 1: The correct term is simply **magnetic field**. A current-carrying wire produces a magnetic field \u2014 not an \"electromagnetic field.\" The word \"electromagnetic\" refers to *electromagnetic waves* (light, radio, etc.) or the full electromagnetic interaction, not to a static magnetic field around a wire.\n- Step 2: The field around a current-carrying wire is a *purely magnetic* field (in the steady-current limit). There is no oscillating electric component, so it's not \"electromagnetic\" in the wave sense. Precision in terminology is marked at A-level: say \"magnetic field,\" not \"electromagnetic field.\"", "source": "GLM 5.1"}, {"q": "In the formula $$F = BIL\\sin\\theta$$, a student forgets to convert the wire length from cm to m. If the length is 25 cm and they use $$L = 25$$, by what factor is their force wrong? (2 steps)", "a": "- Step 1: The correct value is $$L = 0.25$$ m. Using $$L = 25$$ makes the force too large by a factor of $$25 / 0.25 = 100$$.\n- Step 2: This is the single most common numerical error in motor-effect calculations. A force of 0.30 N would be reported as 30 N \u2014 a clearly impossible answer for a lab magnet. Always check: if your force comes out in the hundreds or thousands of newtons, you almost certainly forgot the cm\u2192m conversion. The tesla unit ($$T = \\text{N A}^{-1}\\text{ m}^{-1}$$) *requires* metres in the denominator.", "source": "GLM 5.1"}, {"q": "A wire carries 3.0 A perpendicular to a 0.40 T field, with 0.25 m in the field. Now the wire is tilted to 30\u00b0 to the field. Qualitatively: does the force increase, decrease, or stay the same? By roughly what factor? (2 steps)", "a": "- Step 1: The force **decreases**. Going from perpendicular ($$\\theta = 90\u00b0$$, $$\\sin\\theta = 1$$) to 30\u00b0 ($$\\sin 30\u00b0 = 0.5$$) introduces the $$\\sin\\theta$$ factor, which is 0.5.\n- Step 2: The force is roughly **halved**. The perpendicular case gives $$F = 0.40 \\times 3.0 \\times 0.25 = 0.30$$ N. At 30\u00b0, $$F = 0.30 \\times 0.5 = 0.15$$ N. The key conceptual point: tilting the wire away from perpendicular *always* reduces the force, reaching zero when the wire is parallel to the field.", "source": "GLM 5.1"}, {"q": "Why is the force on a current-carrying wire always perpendicular to *both* the field and the current? Give both the rule-based answer and the deeper mathematical reason. (2 steps)", "a": "- Step 1: By Fleming's Left-Hand Rule, the thumb (force) is at right angles to both the first finger (field) and second finger (current) \u2014 the geometry of three mutually perpendicular directions on your hand guarantees this.\n- Step 2: The deeper reason: the force arises from the **Lorentz force law** $$\\vec{F} = I\\vec{L} \\times \\vec{B}$$, which is a *cross product*. The cross product of two vectors is always perpendicular to both of them. This is why no component of the force ever acts along the field or along the wire \u2014 it always pushes the wire *sideways* out of the plane containing $$B$$ and $$I$$.", "source": "GLM 5.1"}, {"q": "A student is asked \"which way does the field point?\" and answers \"from south to north.\" What is wrong, and why is this the first thing you must get right before using Fleming's LHR? (2 steps)", "a": "- Step 1: The field points from **North to South** (N \u2192 S), not south to north. This is the universally agreed convention for the direction of magnetic field lines outside a magnet.\n- Step 2: Getting the field direction wrong means your first finger points the wrong way, which flips the entire answer. Every subsequent step (current direction, force direction) will be wrong. Alex drilled this as the very first retrieval question because it is the foundation of every direction problem. Always confirm N \u2192 S before setting your first finger.", "source": "GLM 5.1"}, {"q": "What does \"conventional current\" mean, and why is it called \"conventional\"? What is the relationship to actual electron flow? (2 steps)", "a": "- Step 1: Conventional current is the direction that *positive charge* would move \u2014 from the positive terminal to the negative terminal. It is called \"conventional\" because it was agreed upon *before* electrons were discovered; the convention stuck even after we learned that electrons (negative charge) actually move the other way.\n- Step 2: In a metal wire, the actual charge carriers are electrons, which move from the negative terminal to the positive terminal \u2014 the *opposite* direction to conventional current. For Fleming's LHR, you must always use conventional current. If a question specifies electron flow, reverse it before setting your second finger.", "source": "GLM 5.1"}, {"q": "In the motor-effect formula $$F = BIL\\sin\\theta$$, what is the physical significance of the $$\\sin\\theta$$ term? Derive it from the idea of resolving the current into components. (3 steps)", "a": "- Step 1: A wire at angle $$\\theta$$ to the field carries current that can be resolved into two components: one *parallel* to the field ($$I\\cos\\theta$$) and one *perpendicular* to the field ($$I\\sin\\theta$$).\n- Step 2: Only the perpendicular component interacts with the magnetic field to produce a force. The parallel component runs along the field lines and produces zero force (just as a wire parallel to the field feels no force).\n- Step 3: Substituting the effective (perpendicular) current component into $$F = BIL$$: $$F = B(I\\sin\\theta)L = BIL\\sin\\theta$$. The $$\\sin\\theta$$ naturally appears from the vector decomposition. This is why at 90\u00b0 all the current is perpendicular (max force), and at 0\u00b0 none of it is (zero force).", "source": "GLM 5.1"}, {"q": "In the lesson's radial-field direction problem, the force on the wire was \"out of the screen\" at multiple points around the loop. Why is this consistent result important for motor design? (2 steps)", "a": "- Step 1: A consistent force direction around the entire loop means the turning effect (torque) is the same at every angular position. The coil experiences a constant, smooth rotational force \u2014 no \"dead spots\" where the torque drops to zero.\n- Step 2: This is exactly why real motors use radial (curved) magnetic fields rather than flat uniform fields. In a uniform field between flat poles, the effective component of force changes as the coil rotates (the angle $$\\theta$$ between the coil sides and the field changes). A radial field keeps the coil sides always perpendicular to the field, maintaining maximum and constant torque. Alex noted this radial case is \"harder than what you'll get\" in the exam, but understanding *why* it works gives you the deeper insight.", "source": "GLM 5.1"}, {"q": "A generator's output is a sine wave. At two specific points in each cycle the e.m.f. is zero. At two other points it reaches maximum magnitude. What physical positions of the coil correspond to each, and why? (4 steps)", "a": "- Step 1: **Zero e.m.f.** occurs when the coil's plane is *perpendicular* to the field (face-on). At this position, the coil sides move *along* the field lines (parallel to $$B$$), cutting zero lines \u2192 zero induced e.m.f.\n- Step 2: **Maximum e.m.f.** occurs when the coil's plane is *parallel* to the field (edge-on). The coil sides move *perpendicular* to the field lines, cutting the maximum number of lines per second \u2192 maximum induced e.m.f.\n- Step 3: This is why the e.m.f. is a sine (or cosine) wave \u2014 the rate of cutting field lines varies sinusoidally with the angle of rotation. The rate of change of flux through the coil is greatest at the edge-on position and zero at the face-on position.\n- Step 4: The flux through the coil and the e.m.f. are 90\u00b0 out of phase: flux is maximum when e.m.f. is zero and vice versa. This is Faraday's law in action \u2014 e.m.f. depends on the *rate of change* of flux, not the flux itself.", "source": "GLM 5.1"}, {"q": "The lesson mentioned that the next topic is Faraday's law: $$\\mathcal{E} = -\\frac{d(N\\Phi)}{dt}$$. Without deriving it, explain intuitively why there is a *minus* sign and why the e.m.f. depends on the *rate of change* of flux, not the flux itself. (2 steps)", "a": "- Step 1: The e.m.f. depends on the **rate of change** of flux ($$d\\Phi/dt$$), not the flux $$\\Phi$$ itself, because induction is caused by *changing* the magnetic environment around the conductor. A stationary conductor in a constant field has flux through it but zero e.m.f. \u2014 nothing is changing. Only when the flux *changes* (by moving the conductor or changing the field) is an e.m.f. induced.\n- Step 2: The **minus sign** is **Lenz's law**: the induced e.m.f. always acts in a direction that *opposes* the change that produced it. If you push a magnet toward a coil, the induced current creates a field that *repels* the magnet. This is nature's way of conserving energy \u2014 if the induced current *helped* the change, you'd get energy for free, violating conservation of energy.", "source": "GLM 5.1"}, {"q": "A student mixes up the conditions for the motor effect and the generator effect. Create a clear comparison: what must you *do* to each device, and what is the *result*? (2 steps)", "a": "- Step 1:\n  + **Motor effect**: you *supply current* to a wire in a magnetic field \u2192 the wire *experiences a force* and moves. (You put electricity in, you get movement out.)\n  + **Generator effect**: you *move* a wire through a magnetic field \u2192 an e.m.f. is *induced* and current flows. (You put movement in, you get electricity out.)\n- Step 2: The trigger for each is different: the motor needs *current supplied*, the generator needs *motion supplied*. The result of each is the other: the motor produces motion from current; the generator produces current from motion. They are inverse processes. The left-hand rule applies to the motor (given current, find force). The right-hand rule (or Lenz's law) applies to the generator (given motion, find induced current direction).", "source": "GLM 5.1"}, {"q": "A student is asked: \"How could you make the motor spin faster?\" and answers: \"Add an iron core.\" Why is this wrong, and what should they have said instead? (2 steps)", "a": "- Step 1: An iron core is the correct answer for making a stronger **electromagnet** (it concentrates the field the coil produces). But a motor's field comes from the *permanent magnets*, not from the rotating coil. Adding an iron core to the armature adds mass and inertia without increasing the force \u2014 it actually makes the motor *slower* to accelerate.\n- Step 2: The correct answers for a faster motor come directly from $$F = BIL$$: **increase the current** $$I$$, **use stronger magnets** (increase $$B$$), or **add more turns to the coil** (increase effective $$L$$). The exam deliberately swaps \"electromagnet\" and \"motor\" questions to catch students who memorise one list and apply it to the other.", "source": "GLM 5.1"}, {"q": "The lesson noted that the commutator \"briefly breaks\" the circuit each half turn, while slip rings \"stay connected throughout.\" Why is this break *necessary* in the commutator but *undesirable* in the generator? (2 steps)", "a": "- Step 1: In the **commutator**, the break is *necessary* because it is the exact moment when the current must reverse. The gap forces each coil end to disconnect from one brush and reconnect to the other, swapping the current direction. Without the break, there is no reversal, and the motor would stall at the vertical position.\n- Step 2: In the **generator with slip rings**, a break would *interrupt* the AC output \u2014 the current would momentarily stop flowing to the external circuit, causing glitches. Since the generator *wants* the current to alternate naturally, there is no need for a break; the slip rings maintain continuous contact so the AC sine wave is smooth and unbroken.", "source": "GLM 5.1"}, {"q": "A 0.20 m wire carries 5.0 A at 90\u00b0 to a 0.30 T field. Now the current is reduced to 2.5 A. Without recalculating from scratch, what happens to the force, and what is the new force? (2 steps)", "a": "- Step 1: Since $$F = BIL$$ and only $$I$$ changes (halved from 5.0 A to 2.5 A), the force is also **halved**. The relationship is directly proportional.\n- Step 2: Original force: $$F = 0.30 \\times 5.0 \\times 0.20 = 0.30$$ N. New force: $$F = 0.30 / 2 = 0.15$$ N. The key insight: in $$F = BIL$$, force is linearly proportional to each variable. Halving any one variable halves the force.", "source": "GLM 5.1"}, {"q": "Why is it important that the brushes in both a motor and a generator are *stationary* (fixed in place) while the commutator or slip rings rotate? (2 steps)", "a": "- Step 1: The brushes must be stationary so they can connect the rotating internal components (commutator or slip rings) to the *fixed external circuit* (battery, load, wires). If the brushes rotated with the coil, the external wires would twist and tangle.\n- Step 2: The brushes are typically made of carbon because it is a good conductor that also provides low friction \u2014 they \"brush\" against the rotating metal surface, maintaining electrical contact while allowing free rotation. The name \"brushes\" comes from early designs that used actual wire brushes; modern ones are carbon blocks, but the name stuck.", "source": "GLM 5.1"}, {"q": "A student sees a magnetic field drawn with arrows pointing from S to N inside a magnet and concludes \"the field goes from S to N everywhere.\" What is wrong with this reasoning? (2 steps)", "a": "- Step 1: Outside the magnet (where the wire sits), field lines go from **N to S**. Inside the magnet, they complete the loop from S back to N. The full field line is a closed loop: N \u2192 S (outside) \u2192 S \u2192 N (inside) \u2192 back to N.\n- Step 2: For the motor effect and Fleming's LHR, you only care about the field *outside* the magnet (where the wire is), which is always **N \u2192 S**. The internal direction is irrelevant for these problems. The exam will always place the wire in the external field between the poles, where the direction is unambiguously N \u2192 S.", "source": "GLM 5.1"}, {"q": "Synthesis question: A student builds a simple motor but it only rocks back and forth instead of spinning continuously. They also notice the force seems weaker than expected. Identify the two most likely problems and how to fix each. (3 steps)", "a": "- Step 1: **Problem 1 \u2014 rocking instead of spinning**: The split-ring commutator is likely missing or broken. Without it, the current doesn't reverse at the vertical position, so the force reverses direction each half turn and the coil oscillates. **Fix**: install a working split-ring commutator that reverses the current every half turn.\n- Step 2: **Problem 2 \u2014 weaker than expected force**: Check the three factors in $$F = BIL$$:\n  + Is the current too low? (Weak battery, high-resistance wire) \u2192 increase voltage or use thicker copper wire.\n  + Are the magnets weak? \u2192 use stronger permanent magnets.\n  + Are there too few turns on the coil? \u2192 add more turns to increase effective $$L$$.\n- Step 3: Also check the angle: if the wire isn't perpendicular to the field, the $$\\sin\\theta$$ factor reduces the force. Ensure the coil is oriented so its sides cut across the field at 90\u00b0 for maximum force.", "source": "GLM 5.1"}, {"q": "Synthesis question: A generator produces an AC output. A student replaces the slip rings with a split-ring commutator. Describe what changes in the output and explain why. (3 steps)", "a": "- Step 1: The output changes from **AC to DC** (more precisely, pulsating DC). The sine wave that previously went positive and negative now stays on one side of the time axis.\n- Step 2: The commutator reverses the external connection every half turn, exactly when the natural induced e.m.f. would reverse direction. This reversal cancels out the natural reversal, so the current in the external circuit always flows the same way.\n- Step 3: The output is not smooth DC \u2014 it still pulses from zero to maximum and back (a rectified sine wave). To get smoother DC, you would need multiple coils offset at different angles, or additional circuitry (capacitors, voltage regulators). But the basic change is: slip rings \u2192 AC; commutator \u2192 DC.", "source": "GLM 5.1"}, {"q": "In $$F = BIl\\sin\\theta$$, what does the $$\\sin\\theta$$ factor physically represent? Why is the force maximum at $$\\theta = 90\u00b0$$ and zero at $$\\theta = 0\u00b0$$? (3 steps)", "a": "- Step 1: $$\\theta$$ is the angle **between the wire and the magnetic field** (not between the wire and the force). The $$\\sin\\theta$$ factor captures how much of the wire's length is effectively \"cutting across\" the field lines.\n- Step 2: At $$\\theta = 90\u00b0$$, the wire is **perpendicular** to the field \u2014 it cuts across the maximum number of field lines per unit length. Here $$\\sin 90\u00b0 = 1$$, so $$F = BIl$$ (maximum force).\n+ Think of it like a knife cutting through wheat: the knife works best when it swings *across* the stalks, not *along* them.\n- Step 3: At $$\\theta = 0\u00b0$$, the wire is **parallel** to the field \u2014 it runs along the field lines and doesn't cut across any of them. Here $$\\sin 0\u00b0 = 0$$, so $$F = 0$$. No cutting = no force.\n\nThe key insight: only the component of the wire that crosses the field lines contributes to the force. The $$\\sin\\theta$$ factor is that crossing component.", "source": "GLM 5.1"}, {"q": "What is magnetic flux density $$B$$? How is it formally defined from the motor effect formula, and what is its SI unit (expressed two ways)? (3 steps)", "a": "- Step 1: $$B$$ measures the **strength** of a magnetic field \u2014 intuitively, \"how close together the field lines are.\" Densely packed lines = high $$B$$; sparse lines = low $$B$$.\n- Step 2: Formally, $$B$$ is defined as the constant of proportionality in $$F \\propto Il$$ (for a perpendicular wire). Rearranging $$F = BIl$$: $$B = \\frac{F}{Il}$$. This is the operational definition \u2014 place a wire of known length carrying known current perpendicular to the field, measure the force, and compute $$B$$.\n- Step 3: From the definition, the SI unit is: $$[B] = \\frac{\\text{N}}{\\text{A} \\cdot \\text{m}} = \\text{N A}^{-1}\\text{ m}^{-1}$$, which is given the special name **tesla (T)**. So $$1 \\text{ T} = 1 \\text{ N A}^{-1}\\text{ m}^{-1}$$.\n\nA 1 T field is very strong \u2014 roughly 10,000\u00d7 the Earth's magnetic field (~50 \u03bcT). Lab magnets are typically 0.1\u20131 T.", "source": "GLM 5.1"}, {"q": "Fleming's left-hand rule assigns three physical quantities to three digits of your left hand. What are they, and what is the memory hook that links each digit to its quantity? (2 steps)", "a": "- Step 1: Hold your **left hand** with thumb, first finger, and second finger all at right angles:\n+ **First finger** \u2192 **Field** ($$B$$), pointing from N \u2192 S\n+ **seCond finger** \u2192 **Current** ($$I$$), pointing in the direction of conventional current (+ \u2192 \u2212)\n+ **thuMb** \u2192 **Motion / force** ($$F$$), pointing in the direction the wire is pushed\n- Step 2: The memory hook matches the starting letters: **First = Field, seCond = Current, thuMb = Motion.** The force (thumb) is always **perpendicular** to both the field and the current \u2014 the three directions are mutually orthogonal.\n\nCritical: it MUST be the left hand. The right hand is for the generator effect (induced current). Mixing them up gives the wrong direction every time.", "source": "GLM 5.1"}, {"q": "When applying Fleming's left-hand rule, what is the correct procedure to avoid \"forcing\" the answer? Why must you set the two fingers first and read the thumb last? (2 steps)", "a": "- Step 1: The correct procedure is: (1) point your **first finger** along the field direction (N \u2192 S), (2) point your **second finger** along the conventional current direction, and (3) **read** your thumb \u2014 it now tells you the force direction. Do not pre-decide where the force should go.\n- Step 2: The reason for this order is that the field and current are the **inputs** (given by the problem), and the force is the **output** (what you're solving for). If you try to force your thumb to a \"expected\" direction first and then twist your fingers to match, you'll almost certainly get the wrong answer \u2014 the geometry of three mutually perpendicular directions doesn't allow you to freely choose all three.\n\nThink of it like a coordinate system: you set two axes, and the third is determined.", "source": "GLM 5.1"}, {"q": "A problem states that \"electrons flow to the left\" through a wire in a magnetic field. When applying Fleming's left-hand rule, which direction should your second finger point \u2014 and why? (2 steps)", "a": "- Step 1: Fleming's left-hand rule uses **conventional current**, which is the direction positive charges would move: from + terminal to \u2212 terminal. Electron flow is in the **opposite** direction to conventional current.\n- Step 2: Since electrons flow to the left, conventional current flows to the **right**. Your second finger must point to the **right**. If you mistakenly point it to the left (following the electrons), your thumb will give the wrong force direction.\n\nThis is one of the most common traps: the second finger follows conventional current, not electron flow. If a question gives electron flow, **reverse it** before applying the rule.", "source": "GLM 5.1"}, {"q": "A rectangular coil of wire carrying current sits in a uniform magnetic field between two poles. Explain why the coil rotates \u2014 what creates the turning effect? (3 steps)", "a": "- Step 1: The coil has two sides that carry current in **opposite directions** (current flows one way along one side, and the opposite way along the other side, because it's a single loop).\n- Step 2: Apply Fleming's left-hand rule to each side separately. For one side, the force points **upward**; for the other side (current reversed, same field), the force points **downward**.\n- Step 3: These two forces are equal in magnitude, opposite in direction, and act on opposite sides of the coil \u2014 they form a **couple** (a pair of forces that produces rotation without translation). This couple is what makes the coil spin.\n\nWithout the opposite currents on the two sides, there would be no couple and no rotation \u2014 it's the geometry of the loop that makes a motor possible.", "source": "GLM 5.1"}, {"q": "Without a commutator, a current-carrying coil in a magnetic field would only rotate half a turn and then stop. Explain physically why it gets stuck at the half-turn position. (3 steps)", "a": "- Step 1: During the first half-turn, the forces on the two sides of the coil (one up, one down) produce a couple that rotates the coil. So far, so good.\n- Step 2: After the coil passes the half-turn (vertical position), the coil has physically flipped \u2014 the side that was on the left is now on the right, and vice versa. But the **current direction in each side hasn't changed**, so the force on each side now acts in the **opposite rotational sense** compared to before.\n- Step 3: Instead of continuing to spin, the coil is pushed back the way it came. It oscillates and settles at the vertical position where the forces act directly along the coil's axis \u2014 they produce **no turning effect** (the lever arm is zero), and the coil sticks.\n\nThis is exactly why a DC motor needs a commutator: to flip the current at the critical moment and prevent this \"sticking.\"", "source": "GLM 5.1"}, {"q": "What is the job of the split-ring commutator in a DC motor? Describe what happens at the exact moment the coil passes the vertical (half-turn) position. (3 steps)", "a": "- Step 1: The split-ring commutator is **one ring split into two halves with a gap** between them. Each end of the coil connects to one half. Stationary brushes press against the ring to maintain electrical contact.\n- Step 2: As the coil rotates, each half of the commutator rotates with it. At the vertical position, the **gap passes between the brushes**, briefly breaking the circuit. Then each coil end **swaps** which brush it touches \u2014 the half that was connected to the + brush is now connected to the \u2212 brush, and vice versa.\n- Step 3: This swap **reverses the current direction in the coil**. So even though the coil has flipped physically, the current in each side is also reversed \u2014 meaning the force on each side stays in the **same rotational sense** as before. The coil continues spinning in one direction.\n\nOne-liner: the commutator reverses the current every half turn so the force stays in the same direction and the coil keeps spinning continuously.", "source": "GLM 5.1"}, {"q": "A common misconception is that the commutator \"stops the wires getting tangled.\" Why is this wrong, and what is the actual purpose? (2 steps)", "a": "- Step 1: The wires don't tangle because the coil is a rigid loop mounted on an axle \u2014 it doesn't need the commutator to prevent tangling. This is a planted-error distractor that examiners use.\n- Step 2: The **actual purpose** of the split-ring commutator is to **reverse the current in the coil every half turn**, ensuring the force on each side of the coil always acts in the same rotational direction. Without this reversal, the coil would oscillate back and forth and settle at the vertical position (zero turning effect).\n\nIf you see \"prevents tangling\" in an exam answer, it's wrong. The correct chain is: gap passes brushes \u2192 current reverses \u2192 force stays in same sense \u2192 continuous rotation.", "source": "GLM 5.1"}, {"q": "From the formula $$F = BIl$$, identify the three ways to make a DC motor spin faster (i.e., with more force). For each, explain the formula connection. (3 steps)", "a": "- Step 1: **Increase the current $$I$$** \u2014 use a higher battery voltage or lower-resistance wire (e.g., copper). Since $$F \\propto I$$, doubling the current doubles the force on each side of the coil, producing a larger couple and faster rotation.\n- Step 2: **Use stronger magnets (increase $$B$$)** \u2014 stronger magnets mean a larger magnetic flux density, and since $$F \\propto B$$, the force on each side increases proportionally.\n- Step 3: **Add more turns of wire to the coil (effectively increase $$l$$)** \u2014 more turns means more total length of wire sitting in the field. Since $$F \\propto l$$, more length means more force. Importantly, adding turns keeps the wire close to the magnets where $$B$$ is strongest, rather than making the coil physically wider (which would place wire in weaker field regions).\n\nNote the deliberate distinction: \"more coils, more current, iron core\" makes a stronger **electromagnet**; \"more current, stronger magnet, more coils\" makes a faster **motor**. The iron core helps an electromagnet but doesn't appear in $$F = BIl$$.", "source": "GLM 5.1"}, {"q": "What is electromagnetic induction (the generator effect)? What two conditions must be met for an e.m.f. to be induced in a conductor? (3 steps)", "a": "- Step 1: Electromagnetic induction is the phenomenon where moving a conductor through a magnetic field (or moving a magnetic field past a conductor) **induces a voltage (e.m.f.)** across the conductor. If the conductor is part of a complete circuit, a current flows.\n- Step 2: The two conditions are:\n+ **Relative motion** between the conductor and the magnetic field \u2014 either the conductor moves or the field moves; it's the relative motion that matters.\n+ The conductor must **cut across the field lines** \u2014 moving *along* the field lines induces nothing, because the conductor isn't \"crossing\" any flux.\n- Step 3: No battery is needed \u2014 the energy comes from whatever provides the motion (kinetic energy in \u2192 electrical energy out). This is the reverse of the motor effect.\n\nThe phrase \"cutting field lines\" is worth memorising verbatim \u2014 it's the exam-friendly way to describe what the conductor must do.", "source": "GLM 5.1"}, {"q": "A motor transforms electrical energy into kinetic energy. What energy transformation does a generator perform, and why does no battery need to be connected to the generator's coil? (2 steps)", "a": "- Step 1: A generator performs the **reverse** transformation: **kinetic energy in \u2192 electrical energy out**. Whatever provides the motion (e.g., a turbine in a power station, hand-cranking, wind) supplies the input kinetic energy, and the induced current is the output electrical energy.\n- Step 2: No battery is needed because the e.m.f. is **induced** by the relative motion between the coil and the magnetic field. The energy source is mechanical (the turning), not chemical (a battery). The generator *creates* its own voltage \u2014 that's the whole point of electromagnetic induction.\n\nIn a power station chain: nuclear/wind/coal \u2192 movement \u2192 generator \u2192 electrical energy \u2192 homes.", "source": "GLM 5.1"}, {"q": "An AC generator uses slip rings, not a split-ring commutator. What is the structural difference, and why does this produce alternating current rather than direct current? (3 steps)", "a": "- Step 1: **Slip rings** are two separate, complete, unbroken rings. Each end of the coil is permanently connected to its own ring. **Split-ring commutator** is one ring split into two halves with a gap; each coil end swaps which brush it touches every half turn.\n- Step 2: Because each coil end stays on its own slip ring, as the coil rotates, one side of the coil sweeps **up** through the field on the first half-turn (inducing current in one direction) and sweeps **down** through the field on the next half-turn (inducing current in the **opposite** direction). The current naturally reverses every half turn.\n- Step 3: Since the slip rings don't reverse the current (unlike the commutator), this natural reversal is preserved in the output \u2014 producing **alternating current (AC)**. The output is a sine wave: positive peak \u2192 zero \u2192 negative peak \u2192 zero \u2192 repeat.\n\nThe key contrast: the commutator *forces* the current to stay in one direction (DC motor); slip rings *allow* the current to alternate (AC generator).", "source": "GLM 5.1"}, {"q": "Compare the split-ring commutator and slip rings across four properties: shape, how each coil end connects, effect on current direction, and whether the circuit breaks. (2 steps)", "a": "- Step 1: **Split-ring commutator (DC motor):**\n+ Shape: one ring split into two halves with a gap\n+ Connection: each coil end **swaps** which brush it touches every half turn\n+ Effect on current: **reverses** the coil current every half turn\n+ Circuit: **briefly breaks** at the gap each half turn\n- Step 2: **Slip rings (AC generator):**\n+ Shape: two separate complete rings (no gap)\n+ Connection: each coil end **stays** on its own ring permanently\n+ Effect on current: does **not** reverse it \u2014 lets the natural reversal through\n+ Circuit: **stays connected** throughout (no break)\n\nOne-liner summary: commutator = flip current for steady rotation (DC); slip rings = preserve current reversal for AC output.", "source": "GLM 5.1"}, {"q": "On the AC generator's output graph (voltage or current vs. time), the waveform is a sine wave with positive and negative halves. What does the negative half physically represent? (2 steps)", "a": "- Step 1: The negative half of the sine wave represents current flowing in the **opposite direction** to the positive half. AC literally means \"alternating current\" \u2014 it alternates direction.\n- Step 2: This happens because the coil side sweeps up through the field (inducing current one way) and then sweeps down through the field (inducing current the other way). The slip rings preserve this reversal, so the graph goes positive, through zero, negative, through zero, and repeats.\n\nCommon trap: the negative half is NOT \"no current\" or \"zero energy.\" It is real current flowing in the reverse direction. The current is zero only at the exact moments the graph crosses the time axis (when the coil is momentarily moving parallel to the field).", "source": "GLM 5.1"}, {"q": "At what point in the AC generator's rotation is the induced e.m.f. exactly zero? Explain using the concept of \"cutting field lines.\" (2 steps)", "a": "- Step 1: The induced e.m.f. is zero when the coil is in the **vertical position** (coil plane perpendicular to the field), because at that instant the sides of the coil are moving **parallel** to the field lines \u2014 they are not cutting across any field lines.\n- Step 2: The induced e.m.f. is **maximum** when the coil is in the **horizontal position** (coil plane parallel to the field), because the sides are moving **perpendicular** to the field lines \u2014 cutting across the maximum number of lines per instant.\n\nThis is why the output is sinusoidal: the rate of line-cutting varies smoothly as the coil rotates, going from maximum \u2192 zero \u2192 maximum (opposite direction) \u2192 zero \u2192 repeat.", "source": "GLM 5.1"}, {"q": "A 2-D diagram shows a North pole in the centre and a South pole around the outside, with field lines radiating outward. A current-carrying wire circles the centre. A student mistakenly assumes the poles are stacked vertically (N above, S below). How would this error change their force direction calculation? (3 steps)", "a": "- Step 1: If the student assumes N is \"above\" and S is \"below\" (3-D stacking), they would point their first finger **downward** (N above \u2192 S below = field pointing down). But the actual field in this radial diagram points **horizontally outward** from the centre (N at centre \u2192 S at outside = field radiating outward in the plane of the page).\n- Step 2: With the wrong field direction (downward instead of outward), the second finger (current) stays the same, but the thumb (force) will point in a completely different direction \u2014 likely rotated by 90\u00b0 from the correct answer.\n- Step 3: The correct approach: read **only what is drawn**. The N pole is in the centre, S is around the outside, and the field points radially outward in the 2-D plane. Don't import 3-D stacking that isn't in the diagram.\n\nThis was an actual error caught in the lesson: don't invent a third dimension that the diagram doesn't show.", "source": "GLM 5.1"}, {"q": "In a motor diagram, wire 1 carries current out of the page and wire 2 carries current into the page, with the field running horizontally from N (right) to S (left). Use Fleming's left-hand rule to find the force on each wire. What turning effect does this produce? (3 steps)", "a": "- Step 1: For **wire 1** (current out of page): first finger points left (field N\u2192S is right-to-left in this setup... actually, N is right, S is left, so field goes **right to left**... Wait \u2014 field goes from N to S. If N is on the right and S is on the left, field points from right to left. First finger points to the left. Second finger points out of the page (towards you). Thumb points **upward**. Force on wire 1 is upward.\n- Step 2: For **wire 2** (current into page): first finger still points to the left (same field). Second finger points into the page (away from you). Thumb points **downward**. Force on wire 2 is downward.\n- Step 3: One side pushed up, the other pushed down \u2014 this is a **couple** that produces rotation. The coil spins because the two forces act in opposite directions on opposite sides, creating a turning effect (torque).\n\nThis is the fundamental mechanism of every DC motor: opposite currents on opposite sides \u2192 opposite forces \u2192 rotation.", "source": "GLM 5.1"}, {"q": "Why is the magnetic field around a current-carrying wire described as a \"magnetic field\" and not an \"induced field\" or \"electromagnetic field\" in the exam? What terminology trap should you avoid? (2 steps)", "a": "- Step 1: A current-carrying wire produces a **magnetic field**. This is the correct term. The wire acts as an **electromagnet** \u2014 it is magnetic *because current flows through it*, not because another magnet has induced magnetism in it.\n- Step 2: The trap is calling it an \"induced magnet\" or \"electromagnetic field.\" An **induced magnet** is a material that becomes magnetic because a permanent magnet is brought near it (like a paper clip attracted to a fridge magnet). That's a different mechanism. And \"electromagnetic field\" is vague and imprecise \u2014 the correct term is simply **magnetic field**.\n\nExaminers mark vocabulary precisely. \"Electromagnet\" = correct. \"Induced magnet\" = wrong for a current-carrying wire.", "source": "GLM 5.1"}, {"q": "A student says: \"The motor effect requires the wire to touch the magnet for the force to act.\" Why is this physically incorrect, and what type of force is actually involved? (2 steps)", "a": "- Step 1: The motor effect is a **non-contact force** \u2014 it acts through the magnetic field, with no physical contact needed between the wire and the magnet. The field fills the space between them and transmits the force, just as gravity acts through empty space between masses.\n- Step 2: The force arises from the **interaction of two magnetic fields**: the field produced by the current in the wire, and the external field from the magnets. Where these fields superpose, they create an asymmetric field pattern (stronger on one side, weaker on the other) that pushes the wire. No touching required.\n\nThis is analogous to how two magnets repel or attract at a distance \u2014 the field is the mediator, not a solid object.", "source": "GLM 5.1"}, {"q": "The formula $$F = BIl\\sin\\theta$$ contains $$l$$ \u2014 \"length of wire in the field.\" If a 50 cm wire passes through a magnetic field region that is only 10 cm wide, what value of $$l$$ do you use, and why? (2 steps)", "a": "- Step 1: You use $$l = 10 \\text{ cm} = 0.10 \\text{ m}$$ \u2014 only the portion of the wire that is **inside the field** contributes to the force. The 40 cm of wire outside the field experiences no force from that field.\n- Step 2: Physically, the motor effect requires the wire to be in the field. The portions of wire outside the field region don't interact with it \u2014 there's no field there to interact with. So only the \"in-field\" length counts.\n\nAlso remember: always convert cm to m before substituting into $$F = BIl$$, or the tesla unit won't work out correctly.", "source": "GLM 5.1"}, {"q": "A wire carries 3 A perpendicular to a 0.4 T field, with 25 cm in the field. Qualitatively, if you tilt the wire from 90\u00b0 to 30\u00b0 relative to the field, what happens to the force and by roughly what factor? (2 steps)", "a": "- Step 1: At 90\u00b0 ($$\\sin 90\u00b0 = 1$$), the force is at maximum: $$F = BIl$$. At 30\u00b0 ($$\\sin 30\u00b0 = 0.5$$), the force becomes $$F = BIl\\sin 30\u00b0 = 0.5 \\times BIl$$.\n- Step 2: The force is **halved**. Tilting from perpendicular to 30\u00b0 reduces the force by a factor of $$\\sin 30\u00b0 = 0.5$$. This is because only the component of the wire that crosses the field lines contributes \u2014 tilting reduces that crossing component.\n\nQuick rule of thumb: the $$\\sin\\theta$$ factor directly scales the force. $$\\theta = 90\u00b0$$ \u2192 full force; $$\\theta = 30\u00b0$$ \u2192 half force; $$\\theta = 0\u00b0$$ \u2192 zero force.", "source": "GLM 5.1"}, {"q": "You need to produce a force of 0.12 N using a 0.60 T field and a wire 8 cm long in the field (perpendicular). Qualitatively, is the required current roughly small, moderate, or large for a lab setup? Walk through the reasoning. (2 steps)", "a": "- Step 1: Rearrange $$F = BIl$$ to $$I = \\frac{F}{Bl}$$. The numerator is 0.12 N. The denominator is roughly $$0.60 \\times 0.08 \\approx 0.048$$. So $$I \\approx \\frac{0.12}{0.048} \\approx 2.5 \\text{ A}$$.\n- Step 2: 2.5 A is a **moderate** current \u2014 easily achievable with a lab power supply and copper wire. It's not tiny (like mA) and not dangerously large (like tens of amps). This is a reasonable value for a motor or electromagnet demonstration.\n\nSense-check principle: if you got an answer of 0.002 A or 500 A, something would be wrong with the order of magnitude. Lab magnets and reasonable wire lengths give forces in the range of 0.01\u20131 N for currents of 1\u201310 A.", "source": "GLM 5.1"}, {"q": "The magnetic field points to the right. Conventional current flows into the page. Use Fleming's left-hand rule to determine the force direction. Walk through the hand placement. (3 steps)", "a": "- Step 1: **First finger** (Field): point it to the **right**, in the direction of the magnetic field (N \u2192 S).\n- Step 2: **Second finger** (Current): point it **into the page** (away from you), in the direction of conventional current. Your hand will need to rotate so that the first finger points right and the second finger points into the page.\n- Step 3: **Thumb** (Force): it now points **downward**. The force on the wire is directed downward.\n\nRemember: set the two fingers first (field and current are given), then read the thumb (force is the unknown). Never try to force the thumb to where you \"think\" the force should go.", "source": "GLM 5.1"}, {"q": "What is the relationship between the magnetic flux ($$\\phi$$), magnetic flux density ($$B$$), and the area ($$A$$) the field passes through? How does flux linkage extend this for a coil with $$N$$ turns? (2 steps)", "a": "- Step 1: Magnetic **flux** $$\\phi$$ is the total magnetic field passing through an area. For a uniform field perpendicular to an area: $$\\phi = BA$$. The unit is the weber (Wb). Think of flux as \"how many field lines pass through the loop.\"\n- Step 2: **Flux linkage** extends this to a coil: if the coil has $$N$$ turns, each turn links the same flux, so the total flux linkage is $$N\\phi = BAN$$. This is the quantity that matters for electromagnetic induction \u2014 Faraday's law says the induced e.m.f. depends on the **rate of change of flux linkage**.\n\nThe specification points (105, 110) connect these: $$B$$ (flux density) \u2192 $$\\phi$$ (flux) \u2192 $$N\\phi$$ (flux linkage) \u2192 $$\\mathcal{E} = -\\frac{d(N\\phi)}{dt}$$ (Faraday's law, covered next lesson).", "source": "GLM 5.1"}, {"q": "A student argues: \"In a DC motor, the commutator briefly breaks the circuit every half turn, so the motor must stop momentarily each time.\" Evaluate this claim. (3 steps)", "a": "- Step 1: It's true that the commutator **briefly breaks** the circuit when the gap passes between the brushes. During this instant, no current flows through the coil.\n- Step 2: However, the coil doesn't stop because it has **rotational inertia** (momentum). It's already spinning and carries enough angular momentum to coast through the brief break. The break is extremely short \u2014 a fraction of a rotation.\n- Step 3: By the time the break ends, the other half of the commutator has reconnected to the brushes with reversed polarity, current flows again (in the reversed direction), and the force continues in the same rotational sense. The motor runs smoothly.\n\nThe circuit break is a feature, not a bug \u2014 it's the exact mechanism that allows the current reversal. Without it, the motor would oscillate and stall.", "source": "GLM 5.1"}, {"q": "Synthesis question: A DC motor and an AC generator have nearly identical physical structures (coil between magnets, brushes). What are the two critical structural differences, and what do they each achieve? How do the energy transfers compare? (3 steps)", "a": "- Step 1: **Critical structural difference 1 \u2014 the connector between coil and circuit.** The motor uses a **split-ring commutator** (reverses current every half turn to keep force in one sense). The generator uses **slip rings** (two complete rings that let the current alternate naturally).\n- Step 2: **Critical structural difference 2 \u2014 the energy source.** The motor has a **battery/DC supply** connected (electrical energy input). The generator has **no battery** \u2014 it has a mechanical input (something turns the coil) and the induced e.m.f. drives current through an external load.\n- Step 3: **Energy transfers are opposite.** Motor: electrical energy in \u2192 kinetic energy out (current in, rotation out). Generator: kinetic energy in \u2192 electrical energy out (rotation in, current out). They are the reverse of each other \u2014 a motor run in reverse becomes a generator, and vice versa.\n\nThis is why Alex said the generator is \"running the motor backwards\" \u2014 same physics, reversed energy flow and reversed connector choice.", "source": "GLM 5.1"}, {"q": "Why can't you make a DC motor spin faster simply by making the coil much larger (with the same number of turns and same current)? What does this reveal about the practical way to increase $$l$$ in $$F = BIl$$? (3 steps)", "a": "- Step 1: Making the coil much larger increases $$l$$ (total wire length in the field), which would increase $$F = BIl$$ \u2014 but only if $$B$$ stays the same. In practice, the magnetic field between two magnets is strongest **close to the poles** and weakens significantly with distance.\n- Step 2: A larger coil places much of its wire in **weaker field regions** (far from the magnets), where $$B$$ is smaller. So even though $$l$$ increases, the effective $$Bl$$ product may not increase \u2014 and could even decrease.\n- Step 3: The practical solution is to add **more turns of wire on the same-sized coil**. This increases $$l$$ (more wire length) while keeping the wire close to the magnets where $$B$$ is strongest. More turns = more force without wasting wire in weak-field regions.\n\nThis is why real motors have tightly wound
