 coils with many turns, not single giant loops.", "source": "GLM 5.1"}, {"q": "A student claims: \"Moving a conductor near a magnet always induces a current.\" What is wrong with this statement? Give a specific counterexample. (2 steps)", "a": "- Step 1: The statement is missing the crucial condition: the conductor must **cut across the field lines**, not just move near the magnet. Relative motion alone is necessary but not sufficient.\n- Step 2: **Counterexample**: move a wire **along** the direction of the field lines (parallel to them). Even though there is relative motion between the wire and the magnet, the wire is sliding along the lines rather than crossing them \u2014 no field lines are \"cut,\" and no e.m.f. is induced. The force is zero by the same logic as $$\\theta = 0\u00b0$$ in $$F = BIl\\sin\\theta$$.\n\nCorrect statement: \"Moving a conductor so that it cuts across magnetic field lines induces an e.m.f.\" The cutting is essential.", "source": "GLM 5.1"}, {"q": "In the IAL specification, point 107 covers $$F = BIl\\sin\\theta$$ and Fleming's left-hand rule, while point 108 covers factors affecting induced e.m.f. How do these two specification points correspond to the two devices (motor and generator) studied in this lesson? (2 steps)", "a": "- Step 1: **Spec point 107** (force on a current-carrying conductor + Fleming's left-hand rule) corresponds to the **DC motor**. The motor applies a current to a coil in a field, and the resulting force (found via left-hand rule) makes it spin. This is the motor effect.\n- Step 2: **Spec point 108** (factors affecting the e.m.f. induced in a coil by relative motion) corresponds to the **AC generator**. The generator moves a coil through a field, inducing an e.m.f. The factors (speed of rotation, field strength, number of turns) determine the size of the induced e.m.f.\n\nSpec point 110 (Faraday's law: $$\\mathcal{E} = -\\frac{d(N\\phi)}{dt}$$) is the quantitative version of point 108, covered in the next lesson.", "source": "GLM 5.1"}, {"q": "Simple skill check: A 0.15 m wire carries 5 A perpendicular to a 0.20 T field. What is the force, and is this a tiny or moderate force? (2 steps)", "a": "- Step 1: Wire is perpendicular to field, so $$\\theta = 90\u00b0$$, $$\\sin\\theta = 1$$, and $$F = BIl = 0.20 \\times 5 \\times 0.15 = 0.15 \\text{ N}$$.\n- Step 2: 0.15 N is a **moderate** force \u2014 about the weight of a 15 g mass. It's easily measurable in a lab (you could feel it tugging on the wire) but not enormous. This is typical for school-level motor effect demonstrations with lab magnets and a few amps of current.\n\nQuick mental math pattern: $$0.2 \\times 5 = 1$$, then $$1 \\times 0.15 = 0.15$$. Always multiply $$B \\times I$$ first, then by $$l$$.", "source": "GLM 5.1"}, {"q": "Simple skill check: The same 0.15 m wire carrying 5 A is now rotated to lie **along** the field lines (still in the 0.20 T field). What happens to the force? (1 step)", "a": "- Step 1: When the wire lies along the field, $$\\theta = 0\u00b0$$ and $$\\sin 0\u00b0 = 0$$, so $$F = BIl\\sin 0\u00b0 = 0$$. The force is **zero**. The wire is moving parallel to the field lines, not cutting across them \u2014 no interaction, no force. This is the limiting case of the motor effect.", "source": "GLM 5.1"}, {"q": "Simple skill check: A wire perpendicular to a 0.50 T field feels 0.060 N of force when carrying 2.0 A. Roughly how long is the wire segment inside the field? (2 steps)", "a": "- Step 1: Rearrange $$F = BIl$$ to $$l = \\frac{F}{BI} = \\frac{0.060}{0.50 \\times 2.0} = \\frac{0.060}{1.0} = 0.060 \\text{ m}$$.\n- Step 2: That's 6.0 cm \u2014 a reasonable length for a wire between two lab magnets. The wire is short because the force is small (0.06 N) and the field is moderately strong with 2 A of current.\n\nMental math shortcut: $$0.5 \\times 2 = 1$$, so $$l = 0.060/1 = 0.06$$ m. When $$BI$$ products are close to 1, the arithmetic is very clean.", "source": "GLM 5.1"}, {"q": "Simple skill check: A 0.30 m wire carries 4.0 A in a 0.25 T field, but the wire makes a 30\u00b0 angle with the field (not perpendicular). What is the force, and how does it compare to the maximum possible force on this wire? (2 steps)", "a": "- Step 1: Use $$F = BIl\\sin\\theta$$. First compute the max: $$BIl = 0.25 \\times 4.0 \\times 0.30 = 0.30 \\text{ N}$$. Then apply $$\\sin 30\u00b0 = 0.5$$: $$F = 0.30 \\times 0.5 = 0.15 \\text{ N}$$.\n- Step 2: The force is **half** the maximum (0.15 N vs. 0.30 N). This makes sense: tilting the wire to 30\u00b0 from the field means only half the \"crossing component\" contributes. At 90\u00b0 (perpendicular), you'd get the full 0.30 N.\n\nThe $$\\sin\\theta$$ factor is a simple scaling: 30\u00b0 \u2192 0.5, 90\u00b0 \u2192 1, 0\u00b0 \u2192 0. No complex calculation needed \u2014 just identify the angle and multiply by its sine.", "source": "GLM 5.1"}, {"q": "What are the three ways to strengthen an **electromagnet**, and how do they differ from the three ways to make a **motor** spin faster? Identify the overlap and the difference. (3 steps)", "a": "- Step 1: **Stronger electromagnet**: (1) more turns/coils of wire, (2) more current, (3) **iron core**. The iron core concentrates and amplifies the magnetic field produced by the coil.\n- Step 2: **Faster motor**: (1) more turns/coils, (2) more current, (3) **stronger magnet** (bigger $$B$$). These come directly from $$F = BIl$$ \u2014 increase any factor and the force increases.\n- Step 3: The **overlap** is \"more coils\" and \"more current\" \u2014 both help. The **difference** is the third factor: an electromagnet benefits from an **iron core** (which enhances the field the coil itself produces), while a motor benefits from **stronger external magnets** (which increase $$B$$ in the formula). An iron core in the motor's coil makes it a better electromagnet but doesn't directly appear in $$F = BIl$$ for the external field.\n\nExaminers deliberately swap these questions to catch students who memorise one list and apply it to the wrong context.", "source": "GLM 5.1"}, {"q": "Explain how a DC motor works in a structured 6-point chain suitable for an exam \"explain\" question. (6 steps)", "a": "- Step 1: A coil of wire (armature) sits in a magnetic field between two permanent magnets.\n- Step 2: A DC current flows through the coil from an external battery/supply.\n- Step 3: The current-carrying coil acts as an **electromagnet** (not an \"induced magnet\") \u2014 it produces its own magnetic field because current flows through it.\n- Step 4: The two sides of the coil carry current in **opposite directions**, so by Fleming's left-hand rule, one side experiences an upward force and the other a downward force (forces in **opposite** directions, not both upward).\n- Step 5: These opposite forces form a **couple**, creating a turning effect that makes the coil rotate.\n- Step 6: The **split-ring commutator** reverses the current in the coil every half turn, so the forces always act in the same rotational direction and the coil spins continuously. (Not \"to stop wires tangling.\")\n\nThis 6-point chain is the corrected version of the \"3 mistakes\" exercise from the lesson \u2014 it's a ready-made full-mark answer.", "source": "GLM 5.1"}, {"q": "Why does a DC motor use a **split-ring** commutator while an AC generator uses **slip rings**? Connect this to the desired output of each device. (3 steps)", "a": "- Step 1: A DC motor's goal is **continuous one-direction rotation**. The split-ring commutator reverses the coil current every half turn, ensuring the force always pushes in the same rotational direction. Without this reversal, the coil would oscillate and stop.\n- Step 2: An AC generator's goal is **alternating current output**. The coil naturally produces current that reverses direction every half turn (as each side sweeps up then down through the field). Slip rings preserve this natural reversal \u2014 they don't interfere with it.\n- Step 3: If you put a commutator on a generator, it would force the current to stay in one direction (producing pulsed DC, not AC). If you put slip rings on a motor, the force would reverse every half turn and the coil would oscillate back and forth instead of spinning continuously. **The connector must match the device's purpose.**\n\nThe connector is the single component that determines whether the device behaves as a motor (DC in, steady rotation) or a generator (rotation in, AC out).", "source": "GLM 5.1"}, {"q": "A student says: \"The negative half of the AC generator's sine wave output means the generator has stopped producing current.\" Why is this wrong, and what does the negative half actually indicate? (2 steps)", "a": "- Step 1: The negative half does NOT mean \"no current\" or \"generator stopped.\" The magnitude of the current during the negative half can be just as large as during the positive half \u2014 the graph dips to the same amplitude below the axis.\n- Step 2: The negative half means the current is flowing in the **opposite direction**. AC alternates direction: positive half = current one way, negative half = current the other way. The generator is still producing current throughout \u2014 it's just flowing the other way.\n\nThe only moments of zero current are the **zero crossings** of the sine wave (when the coil is momentarily parallel to the field and not cutting any lines).", "source": "GLM 5.1"}, {"q": "What is the formal specification point 110 (to be covered in the next lesson), and how does it relate to what you've already learned about the AC generator? (2 steps)", "a": "- Step 1: Specification point 110 is Faraday's law, expressed as $$\\mathcal{E} = -\\frac{d(N\\phi)}{dt}$$. This says the induced e.m.f. equals the negative rate of change of flux linkage. The minus sign is Lenz's law (the induced e.m.f. opposes the change that causes it).\n- Step 2: This is the **quantitative version** of what you've already learned qualitatively: the AC generator produces an e.m.f. because the coil rotates, causing the flux linkage through the coil to change continuously. The faster the flux linkage changes (faster rotation, stronger field, more turns), the larger the induced e.m.f. \u2014 which is exactly what spec point 108 describes qualitatively and what Faraday's law describes mathematically.\n\nNext lesson will formalise this: the sine wave output of the generator comes directly from the rate of change of a sinusoidally varying flux linkage.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
