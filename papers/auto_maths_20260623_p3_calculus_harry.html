const DATA={"selected": [{"question": "Evaluate the definite integral $$\int_0^{\pi} \cos x \, dx$$. What does the result represent geometrically? (3 steps)", "answer": "- Step 1: Find the antiderivative: $$\int \cos x \, dx = \sin x + C$$. Apply the limits using square bracket notation: $$[\sin x]_0^{\pi} = \sin(\pi) - \sin(0) = 0 - 0 = 0$$.
- Step 2: Geometrically, this integral represents the **signed area** between the curve $$y = \cos x$$ and the x-axis, from $$x = 0$$ to $$x = \pi$$.
- Step 3: The result is zero because the positive area (above the x-axis, from $$0$$ to $$\pi/2$$) exactly cancels the negative area (below the x-axis, from $$\pi/2$$ to $$\pi$$). The curve $$y = \cos x$$ is symmetric about the point $$(\pi/2, 0)$$ in this interval.

A zero definite integral doesn't mean \"nothing is there\" — it means equal amounts of positive and negative area.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_36"}, {"question": "Why is it that when solving $$f(x) = x$$, the solutions are exactly the x-coordinates where $$y = f(x)$$ and $$y = f^{-1}(x)$$ intersect on the line $$y = x$$? (3 steps)", "answer": "- Step 1: If $$f(a) = a$$, then the point $$(a, a)$$ lies on both $$y = f(x)$$ (since $$f(a) = a$$) and $$y = x$$ (since the coordinates are equal). It also lies on $$y = f^{-1}(x)$$ because $$f^{-1}(a) = a$$ (if f maps a to a, then $$f^{-1}$$ maps a back to a).
- Step 2: Conversely, if $$y = f(x)$$ and $$y = f^{-1}(x)$$ intersect at a point on $$y = x$$, say $$(c, c)$$, then $$f(c) = c$$ — which means c is a fixed point of f.
- Step 3: The key insight: f and $$f^{-1}$$ are reflections in $$y = x$$. If f crosses $$y = x$$, then $$f^{-1}$$ crosses at the same point (a point on the mirror line is its own reflection). So intersections on $$y = x$$ are shared intersection points.

Caution: f and $$f^{-1}$$ can also intersect at points **not** on $$y = x$$ (symmetric pairs about $$y = x$$), but those don't correspond to fixed points.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_56"}, {"question": "If f(x) = ln(x) and you reflect it in y = x, what is the equation of the reflected curve? What are the domain and range of this reflected function? (2 steps)", "answer": "- Step 1: Reflecting ln(x) in y = x gives eˣ (the inverse function).
- Step 2: The domain of eˣ is all real numbers (ℝ), and the range is y > 0. This swaps the domain and range of ln(x).", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_40"}, {"question": "What does it mean to say that fg(x) = f(g(x))? How is this different from gf(x)?", "answer": "- fg(x) means \"apply g first, then apply f to the result\" — you work from the inside out
- gf(x) means \"apply f first, then apply g to that result\"
- In general, fg(x) ≠ gf(x) — order matters for composite functions
- Example: if f(x) = x² and g(x) = x + 1, then fg(2) = f(3) = 9, but gf(2) = g(4) = 5", "source": "MiniMax M1 ②", "_id": "minimax_m1_②_8"}, {"question": "Evaluate $$\int 2\sin 3x \, dx$$. Walk through the process and verify by differentiation. (2 steps)", "answer": "- Step 1: Use the rule $$\int \sin(ax) \, dx = -\frac{1}{a}\cos(ax) + C$$. With $$a = 3$$: $$\int \sin 3x \, dx = -\frac{1}{3}\cos 3x + C$$. Multiply by the coefficient 2: $$\int 2\sin 3x \, dx = 2 \cdot \left(-\frac{1}{3}\cos 3x\right) + C = -\frac{2}{3}\cos 3x + C$$.
- Step 2: Check by differentiating: $$\frac{d}{dx}\left(-\frac{2}{3}\cos 3x\right) = -\frac{2}{3} \cdot (-\sin 3x) \cdot 3 = 2\sin 3x$$. ✓", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_44"}, {"question": "Derive the double angle formula $$\sin 2A = 2 \sin A \cos A$$ by treating $$2A$$ as $$(A + A)$$ and applying a compound angle identity. Why is the coefficient 2 critical and not just a typographical detail? (3 steps)", "answer": "- Step 1: Start with the compound angle formula: $$\sin(A + B) = \sin A \cos B + \cos A \sin B$$.
- Step 2: Substitute $$B = A$$, so we are finding $$\sin(A + A) = \sin 2A$$. This gives $$\sin A \cos A + \cos A \sin A$$.
- Step 3: Since $$\sin A \cos A$$ appears twice, they combine to $$2 \sin A \cos A$$. The coefficient 2 is critical because without it, you are effectively saying that doubling the angle only requires multiplying the sine and cosine once, which severely underestimates the rate of change of the sine wave. Omitting the 2 breaks the fundamental scaling relationship between $$A$$ and $$2A$$.

The factor of 2 arises from the two identical cross-terms in the compound angle expansion; dropping it fundamentally misrepresents the function's geometry.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_20"}, {"question": "Sketch the graph of y = ln(x). What are three key reference points you should remember, and where is the asymptote?", "answer": "The graph of y = ln(x):
- Passes through (1, 0) — because ln(1) = 0
- Passes through (e, 1) — because ln(e) = 1
- Passes through (1/e, −1) — because ln(1/e) = −1
- Has a vertical asymptote at x = 0 (the y-axis)
- Increases very slowly as x increases
- Is the reflection of y = eˣ in the line y = x", "source": "MiniMax M1 ②", "_id": "minimax_m1_②_2"}, {"question": "How do you verify that your iterated root is correct? (2 steps)", "answer": "- Step 1: Substitute your answer back into the original equation $$f(x) = 0$$. If your root is correct, f(x) should be very close to zero.
- Step 2: For example, if your iteration gives $$x \approx 2.0945$$ and $$f(2.0945) \approx 0.0001$$, this is extremely close to zero, confirming the root. A large residual would suggest an error in the iteration or the rearrangement.", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_29"}, {"question": "The formula for $$\cos 2A$$ has **three** equivalent forms. Write all three and explain when you would choose each one. (3 steps)", "answer": "- Step 1: The three forms are:
  + $$\cos 2A = \cos^2 A - \sin^2 A$$ (the \"difference\" form)
  + $$\cos 2A = 2\cos^2 A - 1$$ (the \"cosine-only\" form)
  + $$\cos 2A = 1 - 2\sin^2 A$$ (the \"sine-only\" form)
- Step 2: Choose the **cosine-only form** when your target expression involves only cosines, or when you want to replace $$\cos^2 A$$ with something simpler. This form rearranges to $$\cos^2 A = \frac{1 + \cos 2A}{2}$$.
- Step 3: Choose the **sine-only form** when your target expression involves only sines, or when you want to eliminate $$\sin^2 A$$. This form rearranges to $$\sin^2 A = \frac{1 - \cos 2A}{2}$$. The \"difference\" form is useful when both sin and cos appear and you want to keep both.

The key strategy: match the form to the target. If you're proving something in terms of $$\sin x$$ only, use the sine-only form of $$\cos 2A$$.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_29"}, {"question": "For composite functions, the notation $$fg(x)$$ means \"apply $$g$$ first, then $$f$$\". Explain the \"inside-out\" logic of why $$g$$ must be evaluated first, and why $$fg(x) \neq gf(x)$$ in general. (2 steps)", "answer": "- Step 1: The notation $$f(g(x))$$ means $$f$$ is acting on the result of $$g(x)$$. You must compute the inner bracket $$g(x)$$ first because its output becomes the necessary input for the outer function $$f$$. You cannot apply $$f$$ until you know what number $$g$$ produced.
- Step 2: $$fg(x) \neq gf(x)$$ generally because the operations are applied in reverse order. In $$fg(x)$$, the output of $$g$$ goes through the transformation of $$f$$. In $$gf(x)$$, the output of $$f$$ goes through the transformation of $$g$$. Unless $$f$$ and $$g$$ are identical functions or special inverses, feeding a number into $$f$$ then $$g$$ yields a different final result than feeding it into $$g$$ then $$f$$.

Composite functions are evaluated inside-out; swapping the order of transformations swaps the final outcome.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_9"}, {"question": "For f(x) = x² + 1 (x ≥ 0), why is the domain of f⁻¹(x) x ≥ 1? (3 steps)", "answer": "- Step 1: f(x) = x² + 1. Since x ≥ 0, x² ≥ 0 → f(x) ≥ 1.  
- Step 2: Range of f(x) is [1, ∞).  
- Step 3: Domain of f⁻¹(x) = range of f(x) → x ≥ 1.  
**Common Mistake:** Confusing input/output variables when stating domain/range.", "source": "Qwen 3 235B ①", "_id": "qwen_3_235b_①_6"}, {"question": "Given $$f(x) = x^2 + 2$$ and $$g(x) = 1 - x$$, find $$fg(x)$$ and $$gf(x)$$. Show that they are different. (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = f(1 - x) = (1 - x)^2 + 2 = 1 - 2x + x^2 + 2 = x^2 - 2x + 3$$.
- Step 2: $$gf(x) = g(f(x)) = g(x^2 + 2) = 1 - (x^2 + 2) = -x^2 - 1$$.

These are clearly different: $$fg(x) = x^2 - 2x + 3$$ (a positive parabola) vs $$gf(x) = -x^2 - 1$$ (a negative parabola). Order matters.", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_21"}, {"question": "The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. If the original function passes through the point $$(a, b)$$, what point must the inverse function pass through, and why does swapping coordinates create this reflection? (2 steps)", "answer": "- Step 1: If $$f$$ passes through $$(a, b)$$, then $$f^{-1}$$ passes through $$(b, a)$$. The inverse function reverses the mapping: if an input of $$a$$ gives an output of $$b$$, then feeding that output $$b$$ into the inverse will return the original input $$a$$.
- Step 2: Geometrically, reflecting a point $$(a, b)$$ across the line $$y = x$$ literally swaps the $$x$$ and $$y$$ coordinates, producing $$(b, a)$$. This is why the inverse graph is the exact mirror image of the original across this diagonal line.

Reflecting across $$y=x$$ swaps the input and output roles, which is exactly what an inverse function does algebraically.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_17"}, {"question": "Describe the algebraic process to find the inverse function f⁻¹(x) from f(x). In your answer, include what happens to the variables and what you must state at the end.", "answer": "- Step 1: Write y = f(x) (replace f(x) with y)
- Step 2: Swap x and y — this is the critical step that creates the inverse relationship
- Step 3: Make y the subject of the equation
- Step 4: Replace y with f⁻¹(x)

At the end, you MUST state the domain of f⁻¹. This equals the range of the original function f, and must be written in terms of x (not y).", "source": "MiniMax M1 ②", "_id": "minimax_m1_②_5"}, {"question": "Solve f(x) = x for f(x) = x² + 1 where x ≥ 0. What does this solution represent geometrically? (3 steps)", "answer": "- Step 1: Set x² + 1 = x, so x² - x + 1 = 0. Calculate discriminant: (-1)² - 4(1)(1) = 1 - 4 = -3 < 0.
- Step 2: No real solutions exist.
- Step 3: Geometrically, this means the graph of y = f(x) never crosses the line y = x. These solutions (if they existed) would be the fixed points where f(x) = x, and also the intersection points of f and f⁻¹.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_19"}, {"question": "The sign change method states: if $$f(a)$$ and $$f(b)$$ have opposite signs and f is continuous on $$[a,b]$$, then there's a root in $$(a,b)$$. Why is the continuity condition essential — what goes wrong without it? (3 steps)", "answer": "- Step 1: Continuity means the function has no jumps, breaks, or gaps — it can be drawn without lifting your pen. If f is continuous and goes from negative to positive, it must cross zero somewhere in between (by the Intermediate Value Theorem).
- Step 2: Without continuity, a function could jump from negative to positive without ever being zero. For example, define $$f(x) = -1$$ for $$x < 2$$ and $$f(x) = 1$$ for $$x \geq 2$$. Then $$f(1) = -1 < 0$$ and $$f(3) = 1 > 0$$ — there's a sign change on $$[1,3]$$ — but $$f(x) = 0$$ has **no solution**. The function jumps over zero at $$x = 2$$.
- Step 3: Therefore, the sign change alone is **not sufficient** to guarantee a root. You must also verify continuity. For polynomials, this is automatic (polynomials are continuous everywhere). For functions involving fractions, logs, or square roots, you must check that the function is defined and continuous on the entire interval.

The continuity condition is not a mere technicality — it is logically necessary for the conclusion to follow.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_17"}, {"question": "Find $$\int 3\cos 2x \, dx$$. Walk through the steps, including the check by differentiation. (3 steps)", "answer": "- Step 1: Factor out the constant: $$3\int \cos 2x \, dx$$. For the integral of $$\cos 2x$$: the coefficient of x is 2, so divide by 2: $$\int \cos 2x \, dx = \frac{1}{2}\sin 2x + C$$.
- Step 2: Therefore: $$\int 3\cos 2x \, dx = 3 \cdot \frac{1}{2}\sin 2x + C = \frac{3}{2}\sin 2x + C$$.
- Step 3: Check by differentiating: $$\frac{d}{dx}\left[\frac{3}{2}\sin 2x\right] = \frac{3}{2} \cdot 2\cos 2x = 3\cos 2x$$. ✓ This matches the integrand.

The division by 2 (from the coefficient of x) and the multiplication by 3 (the outer constant) are independent operations — don't confuse them.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_35"}, {"question": "What is the domain of f(x) = ln(x)? What is the range? Explain why.", "answer": "- Domain: x > 0 (strictly positive). This is because the natural logarithm is only defined for positive arguments — you cannot take ln of zero or a negative number.
- Range: All real numbers (f(x) ∈ ℝ). As x approaches 0 from the right, ln(x) tends to −∞. As x tends to ∞, ln(x) tends to ∞. Since it's a continuous, strictly increasing function that spans all real values, its range is (−∞, ∞).", "source": "MiniMax M1 ②", "_id": "minimax_m1_②_1"}, {"question": "Construct a conceptual counterexample: A function where $$f(1) < 0$$ and $$f(2) > 0$$, but there is NO root in the interval $$(1, 2)$$. How does this prove the necessity of stating continuity in exams? (2 steps)", "answer": "- Step 1: Imagine a piecewise function defined as $$f(x) = -1$$ for $$1 \le x < 1.5$$, and $$f(x) = 1$$ for $$1.5 \le x \le 2$$. At $$x=1$$, $$f(1) = -1$$ (negative). At $$x=2$$, $$f(2) = 1$$ (positive). There is a sign change.
- Step 2: However, at $$x = 1.5$$, the function instantly jumps from $$-1$$ to $$1$$. It never takes the value $$0$$. There is no root in the interval because the function is discontinuous. This proves that merely writing \"change of sign\" is insufficient; you must explicitly state \"and $$f$$ is continuous\" to justify the existence of a root.

A jump discontinuity allows a sign change without a root, making the explicit statement of continuity a mandatory mark-scheme requirement.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_13"}, {"question": "Prove that tan 2A = 2 tan A / (1 − tan²A). What is the strategy for proving trig identities involving tan?", "answer": "- Step 1: Write tan 2A = sin 2A / cos 2A (definition of tan)
- Step 2: Substitute sin 2A = 2 sin A cos A and cos 2A = cos²A − sin²A
- Step 3: tan 2A = (2 sin A cos A) / (cos²A − sin²A)
- Step 4: Divide numerator and denominator by cos²A: = (2 tan A) / (1 − tan²A)

Strategy: Express tan in terms of sin and cos, then apply double angle formulas to the numerator and denominator separately, then simplify.", "source": "MiniMax M1 ②", "_id": "minimax_m1_②_39"}, {"question": "Why does the domain of $$f^{-1}$$ equal the range of f, and not the domain of f?", "answer": "The inverse function $$f^{-1}$$ takes as input the *outputs* of f and returns the *inputs* of f. So the valid inputs to $$f^{-1}$$ are exactly the values that f can produce — which is the range of f. Similarly, the outputs of $$f^{-1}$$ are the valid inputs of f, so the range of $$f^{-1}$$ equals the domain of f. In short: $$f^{-1}$$ reverses the input-output relationship of f, so domain and range swap roles.", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_12"}, {"question": "Given f(x) = 2x - 5, find f⁻¹(x) and state its domain. Then given g(x) = x² + 1 for x ≥ 0, find g⁻¹(x) and its domain. Why do these have different domains? (3 steps)", "answer": "- Step 1: For f(x) = 2x - 5: y = 2x - 5 → x = 2y - 5 → y = (x + 5)/2. So f⁻¹(x) = (x + 5)/2. Since f has domain ℝ and range ℝ, f⁻¹ has domain ℝ.
- Step 2: For g(x) = x² + 1 with x ≥ 0: y = x² + 1 → x = y² + 1 → y = √(x - 1). So g⁻¹(x) = √(x - 1).
- Step 3: The domain of g⁻¹ is x ≥ 1 (not all real numbers) because the range of g is y ≥ 1. The restricted domain x ≥ 0 on g was needed to make g one-to-one and invertible.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_6"}, {"question": "When using the iteration $$x_{n+1} = g(x_n)$$, convergence is not guaranteed. What condition on $$g'(x)$$ near the root determines whether the iteration converges, and what is the intuitive meaning? (2 steps)", "answer": "- Step 1: The iteration converges to a fixed point $$x^*$$ if $$|g'(x^*)| < 1$$ — the magnitude of the derivative of g at the root is less than 1. If $$|g'(x^*)| > 1$$, the iteration **diverges**.

Evaluating signs is only half the method; explicitly invoking continuity is the other half required for full marks.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_14"}, {"question": "What is the range of $$\ln(x)$$, and what visual feature of the graph confirms it includes all real numbers? (2 steps)", "answer": "- Step 1: The range of $$\ln(x)$$ is $$\mathbb{R}$$, all real numbers. As $$x \to 0^+$$, $$\ln(x) \to -\infty$$, and as $$x \to \infty$$, $$\ln(x) \to +\infty$$ (though slowly). Since ln is continuous and unbounded in both directions, it achieves every real value.

- Step 2: Since the discriminant is positive, there are two distinct real roots, meaning two intersection points. If the discriminant were zero: one intersection (the line is tangent to the curve). If negative: no intersection (the line misses the curve entirely).", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_3"}, {"question": "In numerical iteration, we rearrange $$f(x) = 0$$ into the form $$x = g(x)$$ and compute $$x_{n+1} = g(x_n)$$. Conceptually, what does it mean if this sequence of values converges (stabilizes to a fixed number)? (2 steps)", "answer": "- Step 1: If the sequence converges to a limit $$L$$, then as $$n$$ gets very large, both $$x_n$$ and $$x_{n+1}$$ approach $$L$$. In the iteration formula $$x_{n+1} = g(x_n)$$, this means $$L = g(L)$$.

Convergence means the input and output of the iteration function $$g$$ have become identical; the function has found a fixed point, which is the root.", "source": "GLM 5.1 ③", "_id": "glm_5.1_③_15"}, {"question": "Why does $$f(x) = x^2 + 1$$ (with domain all real numbers) not have an inverse, but $$f(x) = x^2 + 1$$ with $$x \geq 0$$ does? (3 steps)", "answer": "- Step 1: A function has an inverse **if and only if** it is one-to-one (injective). One-to-one means: different inputs always give different outputs. No two x-values map to the same y-value.

Restricting the domain to make the function one-to-one is called \"restricting to make invertible\" — it's standard practice for even-degree polynomials.", "source": "GLM 5.1 ②", "_id": "glm_5.1_②_50"}, {"question": "Explain why we need to check BOTH the domain of g AND the domain of f when finding the domain of the composite function fg. Provide an example where the second condition is the limiting factor. (2 steps)", "answer": "- Step 1: For fg(x) = f(g(x)) to be defined, x must first be valid for g (condition 1), AND the output g(x) must be valid for f (condition 2).
- Step 2: Example: f(x) = √x (domain x ≥ 0), g(x) = x - 2 (domain all real). For fg(x) = √(x - 2), condition 1 (g) allows any x, but condition 2 requires x - 2 ≥ 0, so x ≥ 2. The domain of fg is limited by f, not g.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_38"}, {"question": "When setting up $$f(x) = g(x)$$ to find intersection points, what practical strategy prevents the most common arithmetic error (copying a term incorrectly)?", "answer": "After writing the equation $$f(x) = g(x)$$ and before rearranging or simplifying, pause and verify each term against the original problem statement. The most common error is miscopying a coefficient or exponent (e.g., writing $$2x^2$$ instead of $$x^2$$). This single mistake cascades through the entire solution, producing wrong roots and wrong intersection points. The fix: after writing \"$$f(x) = g(x)$$\" in its raw form, do a term-by-term visual check against the source before moving any terms or factoring.", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_2"}, {"question": "Prove that $$\cos 3x = 4\cos^3 x - 3\cos x$$. This is the cosine analogue of the $$\sin 3x$$ proof — which form of $$\cos 2x$$ should you use this time, and why? (5 steps)", "answer": "- Step 1: Write $$\cos 3x = \cos(2x + x)$$ and apply $$\cos(A+B) = \cos A \cos B - \sin A \sin B$$ with $$A = 2x, B = x$$: $$\cos 3x = \cos 2x \cos x - \sin 2x \sin x$$.

- Step 2: In the exam, write down all intermediate values (x₀, x₁, x₂, ...) to show your working. State the final answer to the required degree of accuracy (usually 3 or 4 decimal places).", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_16"}, {"question": "Solving the equation $$f(x) = x$$ finds the \"fixed points\" of a function. Explain visually what a fixed point represents on a graph, and why it is also the intersection point of $$y = f(x)$$ and $$y = f^{-1}(x)$$ (provided they intersect off the line $$y=x$$). (3 steps)", "answer": "- Step 1: Visually, $$f(x) = x$$ means the output of the function equals the input. This occurs exactly where the curve $$y = f(x)$$ crosses the line $$y = x$$. At this crossing point, the $$y$$-coordinate and $$x$$-coordinate are identical.

- Step 2: These come directly from differentiation in reverse. Since $$\frac{d}{dx}(\cos x) = -\sin x$$, integrating sin x gives $$-\cos x$$. Since $$\frac{d}{dx}(\sin x) = \cos x$$, integrating cos x gives sin x. Since $$\frac{d}{dx}(\tan x) = \sec^2 x$$, integrating $$\sec^2 x$$ gives tan x.", "source": "GLM 5.1 ①", "_id": "glm_5.1_①_40"}, {"question": "When integrating $$\cos(ax)$$ or $$\sin(ax)$$, why do you divide by a? Walk through the reasoning. (2 steps)", "answer": "- Step 1: We know $$\frac{d}{dx}[\sin(ax)] = a\cos(ax)$$ by the chain rule — the derivative picks up a factor of a from the inner function. So when we go in reverse (integration), we must undo this factor.

- Step 2: Solving: 2x > 3, so x > 3/2 (or x > 1.5). The range remains all real numbers since ln outputs can be any real value.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_3"}, {"question": "A student sketches ln(x) but draws eˣ instead. What visual features would they have drawn incorrectly, and why does this happen? (2 steps)", "answer": "- Step 1: Common confusion: students reverse the function and its inverse. The student would have drawn a curve passing through (0, 1) with a horizontal asymptote at y = 0, instead of passing through (1, 0) with a vertical asymptote at x = 0.
- Step 2: ln(x) and eˣ are inverse functions — their graphs are reflections in y = x. This misconception likely occurs because students memorize both graphs separately without remembering they're inverses.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_4"}, {"question": "Describe the algebraic process to find f⁻¹(x) from f(x). After finding f⁻¹(x), why must you state its domain, and what is that domain in terms of? (3 steps)", "answer": "- Step 1: Steps: (1) Write y = f(x), (2) swap x and y to get x = f(y), (3) solve for y, (4) replace y with f⁻¹(x).

- Step 3: Always state domain using x (the input variable of f⁻¹), never y.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_5"}, {"question": "Given f(x) = 2x - 5, find f⁻¹(x) and state its domain. Then given g(x) = x² + 1 for x ≥ 0, find g⁻¹(x) and its domain. Why do these have different domains? (3 steps)", "answer": "- Step 1: For f(x) = 2x - 5: y = 2x - 5 → x = 2y - 5 → y = (x + 5)/2. So f⁻¹(x) = (x + 5)/2. Since f has domain ℝ and range ℝ, f⁻¹ has domain ℝ.
- Step 2: For g(x) = x² + 1 with x ≥ 0: y = x² + 1 → x = y² + 1 → y = √(x - 1). So g⁻¹(x) = √(x - 1).
- Step 3: The domain of g⁻¹ is x ≥ 1 (not all real numbers) because the range of g is y ≥ 1. The restricted domain x ≥ 0 on g was needed to make g one-to-one and invertible.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_6"}, {"question": "A student finds f⁻¹(x) = √(x - 1) but states \"the domain is y ≥ 1.\" What's wrong with this answer, and how should it be corrected? (2 steps)", "answer": "- Step 1: The student used y instead of x. The domain describes the input values of f⁻¹, which is always expressed in terms of x (the independent variable of the inverse function).
- Step 2: Correction: \"domain of f⁻¹ is {x : x ≥ 1}\" or simply \"x ≥ 1.\" Never use y for a domain — y represents the output, not the input.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_7"}, {"question": "What does fg(x) mean notation-wise, and how do you compute it? Why is fg(x) generally not equal to gf(x)? (2 steps)", "answer": "- Step 1: fg(x) means \"f of g of x\" — apply g first, then apply f to the result. So fg(x) = f(g(x)). Work from the inside out.
- Step 2: Order matters: fg(x) ≠ gf(x) in general because composition is not commutative. For example, if f(x) = x² and g(x) = x + 1, then fg(2) = f(3) = 9, but gf(2) = g(4) = 5.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_8"}, {"question": "Given f(x) = x² + 1 and g(x) = 3x - 2, find fg(x) and gf(x). Show that they are different. (2 steps)", "answer": "- Step 1: fg(x) = f(g(x)) = f(3x - 2) = (3x - 2)² + 1 = 9x² - 12x + 4 + 1 = 9x² - 12x + 5.
- Step 2: gf(x) = g(f(x)) = g(x² + 1) = 3(x² + 1) - 2 = 3x² + 3 - 2 = 3x² + 1. These are clearly different (9x² - 12x + 5 vs 3x² + 1), confirming composition is not commutative.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_9"}, {"question": "When finding the domain of fg(x), what two conditions must you check? Explain with an example. (2 steps)", "answer": "- Step 1: Two conditions: (1) x must be in the domain of g, AND (2) g(x) must be in the domain of f.
- Step 2: Example: if f(x) = √x and g(x) = x - 5, then fg(x) = √(x - 5). Condition 1: x can be any real number (domain of g is ℝ). Condition 2: g(x) = x - 5 must be ≥ 0 for √ to be defined, so x ≥ 5. The domain of fg is x ≥ 5.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_10"}, {"question": "State the conditions required to apply the sign change method (interval bisection/root location theorem). Why is the continuity condition essential? (2 steps)", "answer": "- Step 1: Two conditions: (1) f(a) and f(b) have opposite signs (f(a) · f(b) < 0), AND (2) f is continuous on the closed interval [a, b].
- Step 2: Continuity is essential because without it, a sign change doesn't guarantee a root. A function could jump from positive to negative at a discontinuity without ever being zero. Polynomials are always continuous, so this condition is automatically satisfied for polynomial functions.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_11"}, {"question": "Show that f(x) = x³ - 2x - 5 has a root between x = 2 and x = 3 using the sign change method. Write the full statement including continuity. (2 steps)", "answer": "- Step 1: Evaluate: f(2) = 8 - 4 - 5 = -1 (negative). f(3) = 27 - 6 - 5 = 16 (positive). So there is a sign change.
- Step 2: Since f(x) is a polynomial, it is continuous on [2, 3]. Because f(2) < 0, f(3) > 0, and f is continuous on the interval, there exists a root in (2, 3). Full statement required for the mark.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_12"}, {"question": "A student says \"f(1) = -2 and f(2) = 3, so there's definitely a root between 1 and 2.\" What's missing from this statement, and why might the student be wrong in some cases? (2 steps)", "answer": "- Step 1: The student hasn't stated that f is continuous on [1, 2].
- Step 2: While this is usually fine for polynomials (which are always continuous), the statement could be wrong for non-continuous functions. For example, a function could be -2 at x = 1, jump to 3 at x = 2 (discontinuity), and never cross zero — yet still show a sign change. The continuity condition must be explicitly stated for full marks.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_13"}, {"question": "Explain the iteration process for solving x³ - 2x - 5 = 0 given the rearrangement x = g(x). What does it mean for the iteration to \"converge\"? (2 steps)", "answer": "- Step 1: Rearrange f(x) = 0 into x = g(x) form. Start with an initial guess x₀, then compute x₁ = g(x₀), x₂ = g(x₁), and so on: xₙ₊₁ = g(xₙ).
- Step 2: Convergence means the values x₀, x₁, x₂, ... approach a fixed value that satisfies x = g(x) (and thus f(x) = 0). If successful, the sequence stabilises and gives the root to the required accuracy.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_14"}, {"question": "Using the iteration xₙ₊₁ = ∛(2xₙ + 5) with x₀ = 2, calculate the first three iterations. What does this converge to, and how can you check if it's correct? (3 steps)", "answer": "- Step 1: x₀ = 2. x₁ = ∛(2(2) + 5) = ∛9 ≈ 2.0801.

- Step 3: The values converge to approximately x ≈ 2.0945. Check by substituting back: f(2.0945) = (2.0945)³ - 2(2.0945) - 5 ≈ 0.0001, close to zero — confirms the root.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_15"}, {"question": "On a calculator, how do you efficiently perform iteration calculations? What should you do in the exam to show your working? (2 steps)", "answer": "- Step 1: Store x₀ in ANS memory, type the formula using ANS, then press equals repeatedly. Each press uses the previous answer as the next input.
- Step 2: In the exam, write down all intermediate values (x₀, x₁, x₂, ...) to show your working. State the final answer to the required degree of accuracy (usually 3 or 4 decimal places).", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_16"}, {"question": "The graph of y = f⁻¹(x) is a reflection of y = f(x) in what line? If f passes through (2, 5), what point does f⁻¹ pass through? (2 steps)", "answer": "- Step 1: The graph of y = f⁻¹(x) is the reflection of y = f(x) in the line y = x.

- Step 2: Range of f⁻¹ = Domain of f. This is because the output of f⁻¹ must come from what f can accept as input.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_18"}, {"question": "Solve f(x) = x for f(x) = x² + 1 where x ≥ 0. What does this solution represent geometrically? (3 steps)", "answer": "- Step 1: Set x² + 1 = x, so x² - x + 1 = 0. Calculate discriminant: (-1)² - 4(1)(1) = 1 - 4 = -3 < 0.

- Step 2: The point (3, 3) lies on both y = f(x) and y = x. This is also where f and f⁻¹ intersect (since f⁻¹ = f for a function that equals its own inverse at that point).", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_20"}, {"question": "Write out all four double angle formulas from memory: sin 2A, and three forms of cos 2A. Why do we need three different forms for cos 2A? (2 steps)", "answer": "- Step 1: sin 2A = 2 sin A cos A. Cos 2A has three forms: (1) cos²A - sin²A, (2) 2 cos²A - 1, (3) 1 - 2 sin²A.
- Step 2: We need three forms because depending on what variables appear in the rest of the problem, one form will be more convenient than the others. For example, if working with sin²A, use form (3); if working with cos²A, use form (2).", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_21"}, {"question": "A student writes \"sin 2A = sin A cos A.\" What's wrong with this, and what is the correct formula? (1 step)", "answer": "- The student forgot the coefficient 2. The correct formula is sin 2A = 2 sin A cos A. The factor of 2 is critical and is a common source of marks lost. Drill this daily until automatic.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_22"}, {"question": "Prove that sin 3x = 3 sin x - 4 sin³x. Outline the strategy and key steps. (4 steps)", "answer": "- Step 1: Write sin 3x = sin(2x + x) and use the compound angle formula: sin(A + B) = sin A cos B + cos A sin B.

- Step 3: Apply double angle: sin 2x = 2 sin x cos x, cos 2x = 1 - 2 sin²x. Substitute: sin 3x = (2 sin x cos x)cos x + (1 - 2 sin²x)sin x = 2 sin x cos²x + sin x - 2 sin³x.
- Step 4: Replace cos²x with 1 - sin²x: = 2 sin x(1 - sin²x) + sin x - 2 sin³x = 2 sin x - 2 sin³x + sin x - 2 sin³x = 3 sin x - 4 sin³x. ✓ Q.E.D.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_23"}, {"question": "Prove that cos 3x = 4 cos³x - 3 cos x. What form of cos 2A should you choose and why? (4 steps)", "answer": "- Step 1: Write cos 3x = cos(2x + x) = cos 2x cos x - sin 2x sin x (using cos(A+B)).

- Step 3: Use sin²x = 1 - cos²x: = 2 cos³x - cos x - 2(1 - cos²x)cos x = 2 cos³x - cos x - 2 cos x + 2 cos³x.

- Step 2: = -0 + 1 = 1. So ∫π/2₀ sin x dx = 1.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_27"}, {"question": "When integrating sin(ax + b), what common mistake leads to lost marks? Provide the correct general formula. (1 step)", "answer": "- Common mistake: forgetting to divide by a. Many students write ∫ sin(ax) dx = -cos(ax) + C, missing the 1/a factor.

- Step 2: Range: all real numbers (ℝ), since ln outputs any real value as its argument goes from 0+ to ∞.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_31"}, {"question": "Find the domain and range of g(x) = ln(x² + 1). How does this differ from ln(x)? (2 steps)", "answer": "- Step 1: For ln(x² + 1): x² + 1 > 0 for all real x (since x² ≥ 0, so x² + 1 ≥ 1 > 0). Domain: all real numbers (ℝ).
- Step 2: Range: x² + 1 ≥ 1, so ln(x² + 1) ≥ ln(1) = 0. Range: y ≥ 0. Unlike ln(x) which has domain x > 0, here x² + 1 is always positive, so the domain is unrestricted.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_32"}, {"question": "Given f(x) = x² + 2 and g(x) = 1 - x, find fg(x) and gf(x). Then solve fg(x) = gf(x). (3 steps)", "answer": "- Step 1: fg(x) = f(g(x)) = f(1 - x) = (1 - x)² + 2 = x² - 2x + 1 + 2 = x² - 2x + 3.

- Step 2: Domain of f⁻¹: f has domain x > 1, and as x → 1+, f(x) → ∞, and as x → ∞, f(x) → 0+. So range of f is (0, ∞). Thus domain of f⁻¹ is x > 0.
- Step 3: Solve f(x) = x: 2/(x - 1) = x → 2 = x(x - 1) → x² - x - 2 = 0 → (x - 2)(x + 1) = 0. Since domain is x > 1, x = 2. Check: f(2) = 2/(1) = 2. ✓", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_36"}, {"question": "Evaluate: (a) ∫ 2 sin 3x dx, (b) ∫π₀ cos x dx, (c) ∫ 4 sec²x dx. (3 steps)", "answer": "- Step 1: (a) ∫ 2 sin 3x dx = 2 × (-1/3) cos 3x + C = -(2/3) cos 3x + C.

- Step 3: (c) ∫ 4 sec²x dx = 4 tan x + C.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_37"}, {"question": "Explain why we need to check BOTH the domain of g AND the domain of f when finding the domain of the composite function fg. Provide an example where the second condition is the limiting factor. (2 steps)", "answer": "- Step 1: For fg(x) = f(g(x)) to be defined, x must first be valid for g (condition 1), AND the output g(x) must be valid for f (condition 2).
- Step 2: Example: f(x) = √x (domain x ≥ 0), g(x) = x - 2 (domain all real). For fg(x) = √(x - 2), condition 1 (g) allows any x, but condition 2 requires x - 2 ≥ 0, so x ≥ 2. The domain of fg is limited by f, not g.", "source": "MiniMax M1 ①", "_id": "minimax_m1_①_38"}, {"question": "Why can the sign change method not be applied to show a root of f(x) = 1/x between x = -1 and x = 1, even though f(-1) = -1 and f(1) = 1? (2 steps)", "answer": "- Step 1: f(-1) = -1 and f(1) = 1 show a sign change, BUT f(x) = 1/x is not continuous on [-1, 1] — it has a discontinuity at x = 0.

const SK='auto_maths_20260623_p3_calculus_harry';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;

}

  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}

}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){

  let md='| Question | Answer |\n| --- | --- |\n';

function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})

function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
