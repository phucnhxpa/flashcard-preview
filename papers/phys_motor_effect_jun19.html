<script>
const DATA={"selected": [{"question": "S on left, N on right (field leftward), current OUT of the page (⊙). What is the force direction? Compare this result to Q18 and Q19 to reveal what happens when you reverse *both* the magnets and the current simultaneously. (3 steps)", "answer": "- Step 1: **Field**: leftward (←). First finger points left.\n- Step 2: **Current**: ⊙ = out of the page. Second finger points out (towards you).\n- Step 3: **Force**: first finger left, second finger out of page → left thumb points **DOWNWARD** (↓).\n\nNow compare:\n+ Q18: N|S (field right), ⊙ (current out) → force UP\n+ This question: S|N (field left), ⊙ (current out) → force DOWN\n\nReversing the magnets alone flipped the force. But compare to Q17: N|S, ⊗ → DOWN. Here: S|N, ⊙ → DOWN. Same force! We reversed *both* magnets and current, and the two reversals cancelled out. **Reverse both → force unchanged.** This is the principle behind the DC motor: if you don't flip the current, the coil would oscillate instead of spinning continuously.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "A student carefully sets up Fleming's left-hand rule: first finger pointing right for the field, second finger pointing into the page for the current. But they used their **right hand** by accident. Their thumb points upward. Is this the correct force direction — and if not, which way should the force actually point? (2 steps)", "answer": "- Step 1: Using the **right hand** with the same finger assignments gives the *opposite* direction to the correct answer. The right-hand thumb points up, but the correct (left-hand) answer is **downward**.\n- Step 2: The right-hand rule corresponds to the cross product $$\\vec{B} \\times \\vec{I}$$ (field cross current), whereas the motor effect follows $$\\vec{I} \\times \\vec{B}$$ (current cross field). These two cross products give opposite results: $$\\vec{B} \\times \\vec{I} = -(\\vec{I} \\times \\vec{B})$$. So the right hand always flips the force.\n\nThis is Trap 4: for the force on a current (motor effect), always use the LEFT hand. The right hand is for other rules (like the grip rule for the field around a wire).", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "If you double the number of turns in a coil while keeping current the same, what happens to the force/torque, and why? (3 steps)", "answer": "- Step 1: Each turn of the coil carries the same current $$I$$ and has effective length $$L$$ inside the field. By $$F = BIL$$, each turn experiences the same force.\n- Step 2: With $$N$$ turns, you effectively have $$N$$ parallel wires each contributing the same force. The total force (and the torque on the coil) scales linearly with $$N$$.\n- Step 3: So doubling the number of turns doubles the total force/torque. This is why motors and electromagnets use many turns of wire: it's a cheap way to multiply the mechanical effect without needing a stronger magnet or higher current.\n\nA subtle point: in the formula, you can think of \"$$L$$\" as the total length of wire in the field, so a coil with $$N$$ turns of length $$\\ell$$ each effectively has $$L = N\\ell$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why does a current flowing along a wire produce a circular magnetic field around the wire, and how does this relate to the motor effect when an external field is applied? (3 steps)", "answer": "- Step 1: A moving charge generates a magnetic field around itself. A current is a stream of moving charges, so a current-carrying wire is surrounded by a magnetic field that loops around it in circles (right-hand grip rule — thumb along current, fingers curl in the field direction).\n- Step 2: When this wire is placed inside an **external** field, the wire's own circular field and the external field **superpose**. On one side of the wire the two fields add (stronger total field); on the other side they subtract (weaker total field).\n- Step 3: This asymmetry — field bunched up on one side, sparse on the other — is what physically pushes the wire towards the weaker-field side. The motor effect can be understood as the wire being squeezed sideways by the imbalance in field-line density it creates around itself.\n\nThis is the deeper \"why\" behind $$F = BIL$$: the formula just quantifies the squeeze.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "In $$F = BIL\\sin\\theta$$, what exactly does the angle $$\\theta$$ measure? A common mistake is to define it relative to the wrong thing — what is the correct reference, and what is the trap? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **direction of the current** (the wire's orientation) and the **direction of the magnetic field** $$B$$.\n- Step 2: The trap: some students instinctively measure $$\\theta$$ from the *perpendicular* to the field (i.e., they think $$\\theta = 0°$$ means perpendicular). That is wrong. $$\\theta$$ is measured the standard way — from the field direction itself. So $$\\theta = 0°$$ means the wire is **parallel** to the field, and $$\\theta = 90°$$ means the wire is **perpendicular**.\n- Step 3: Quick sanity check: when the wire is perpendicular to the field (the strongest-push case), $$\\theta = 90°$$ and $$\\sin 90° = 1$$, giving maximum force $$F = BIL$$. When the wire is parallel (no push at all), $$\\theta = 0°$$ and $$\\sin 0° = 0$$, giving zero force. If you had defined $$\\theta$$ from the perpendicular, these would be swapped — contradicting the physics.\n\nThink of it as: \"How far is the wire from being aligned *with* the field?\" — $$\\theta = 0°$$ = fully aligned = no force.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "A square coil with $$N$$ turns sits between two magnet poles with two of its sides (say, top and bottom) inside the field. Why does the force on each side cause a *torque* (a turning effect) rather than just translating the coil sideways? (3 steps)", "answer": "- Step 1: The two sides inside the field carry current in *opposite directions* (because the current goes round the loop — what enters the top side from one end exits from the other, and the bottom side carries current the opposite way).\n- Step 2: By Fleming's left-hand rule applied to each side: the top side gets pushed one way (say, up), and the bottom side gets pushed the *opposite* way (down) — because reversing the current reverses the force, and the field is the same on both sides.\n- Step 3: Equal and opposite forces on the two sides, applied at different positions (top vs bottom of the coil), don't translate the coil — they rotate it. This is a *couple* (a pure torque), and it spins the coil about its central axis.\n\nThis is the operating principle of every electric motor: the magnetic forces on opposite sides of a current loop are arranged to produce rotation, not translation.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "When facing a curved or awkwardly shaped current-carrying object in a magnetic field (like a circular coil, a bent wire, or a 3D arrangement), what is the correct problem-solving strategy, and why does trying to reason about the whole object at once fail? (3 steps)", "answer": "- Step 1: The strategy: **pick one point** on the object, determine the local field direction and the local current direction at that point, apply Fleming's LHR to find the force at that single point. Then repeat for other points if needed.\n- Step 2: Trying to reason about the whole object at once fails because different points on a curved object have *different* current directions (the current turns as it flows around the curve) and possibly different field directions (as in the radial magnet). The force at each point depends on the *local* relationship between current and field — there is no single \"overall\" direction that applies everywhere.\n- Step 3: However, in special geometries like the radial magnet, solving one point may reveal a pattern that holds everywhere (force always out of the page). You still start with one point to discover that pattern — you don't assume it.\n\nAlex's coaching: \"Just consider one point.\" Solve that single point with Fleming, then check another point to see if the pattern repeats.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Misconception probe: a student says \"if I reverse the current AND reverse the field, the force reverses twice, so it goes back to the original direction — that means the force is unchanged.\" Another student says \"reversing two things should make the force twice as strong.\" Which student is correct about the *direction*, and why is the second student wrong about the *magnitude*? (3 steps)", "answer": "- Step 1: The **first student** is correct about the direction: reversing both $$\\vec{I}$$ and $$\\vec{B}$$ gives $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$ — the two negatives cancel, and the force direction is unchanged.\n- Step 2: The **second student** is wrong about magnitude. Reversing a vector changes its *direction* (sign), not its *magnitude* (size). $$-\\vec{I}$$ has the same magnitude as $$\\vec{I}$$, just opposite direction. So $$|(-\\vec{I}) \\times (-\\vec{B})| = |\\vec{I} \\times \\vec{B}|$$ — the force magnitude is also unchanged, not doubled.\n- Step 3: The complete picture: reversing both inputs leaves *both* the direction and the magnitude of the force **unchanged**. No doubling, no extra reversal. The force is exactly the same as before.\n\nThis is the principle that makes the DC motor work with a commutator: flipping the current each half-turn (while the coil's orientation effectively flips the field relative to the wire) keeps the force consistent.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "What do the symbols $$\\odot$$ (dot) and $$\\otimes$$ (cross) mean when drawn on a wire in a diagram, and what's the visual mnemonic for remembering which is which? (3 steps)", "answer": "- Step 1: $$\\odot$$ (dot) = current flowing **OUT of the page**, towards the viewer.\n- Step 2: $$\\otimes$$ (cross) = current flowing **INTO the page**, away from the viewer.\n- Step 3: The mnemonic comes from imagining an arrow:\n+ Looking at an arrow flying **towards you**, you see the pointy **tip** — that's the dot.\n+ Looking at an arrow flying **away from you**, you see the **tail feathers** (the fletching, which form an X) — that's the cross.\n\nThis is the single most common slip in motor-effect problems, so always re-read the legend before answering.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "For the radial coil \"super challenge,\" Alex advised: \"don't try to do the whole circle at once — look at one point at a time.\" Why is this approach necessary, and what would go wrong if you tried to reason about the entire circle simultaneously? (2 steps)", "answer": "- Step 1: At each point on the circle, the field direction and current direction are *different* — the field is radial (pointing outward from centre) and the current is tangent (along the coil). If you try to reason about \"the whole circle,\" you're trying to simultaneously handle many different field-current pairs, which is cognitively overwhelming. There's no single \"the field\" or \"the current\" for the whole loop — they vary point by point.\n- Step 2: By solving one point (e.g., the top), you discover the force is out of the page. Then you check another point (e.g., the right side) and find the same result. The pattern emerges: force is uniform. You don't need to prove it for all 360° — two or three points convince you, and the co-rotation argument (both vectors rotate together, so the cross product is constant) seals it. One point at a time reduces a 3D circular problem to a single Fleming's-rule application.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Why is the motor effect called the \"motor effect\"? What device does it power, and how does the force-on-a-wire principle translate into rotational motion?", "answer": "It's called the \"motor effect\" because it's the principle behind **electric motors**. A DC motor has a coil of wire sitting in a magnetic field. When current flows through the coil, each side of the coil experiences a force (one side pushed up, the other pushed down, because current flows in opposite directions on opposite sides). These opposing forces create a **couple** (a torque), causing the coil to rotate rather than just translate.\n\nThe key transition: a single straight wire gets pushed in one direction (linear force). But a coil has current going one way on the left and the opposite way on the right, so the left side is pushed up and the right side is pushed down — this pair of forces rotates the coil. The split-ring commutator keeps reversing the current every half-turn so the rotation continues rather than oscillating.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "If you reverse BOTH the current direction AND the field direction simultaneously, what happens to the force? Explain using two lines of reasoning. (2 steps)", "answer": "- Step 1: The force **stays the same** — it does NOT reverse. Two flips cancel. From the formula perspective: $$F \\propto I \\times B$$; if you negate both $$I$$ and $$B$$, the product $$(-I) \\times (-B) = I \\times B$$ — two negatives cancel, force unchanged.\n- Step 2: From Fleming's rule: reversing the field swings your first finger to the opposite direction; reversing the current swings your second finger opposite. Both fingers flip, so the thumb (which is perpendicular to both) stays where it was. Think of it like a 180° rotation of the whole hand — the thumb doesn't flip, it rotates in place but ends up pointing the same way.\n\nTakeaway: One reversal → force flips. Two reversals → force unchanged. This is the mathematical property of the cross product with double negation.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "In the \"super challenge\" problem, a circular coil sits flat inside a radial magnet (N in the centre, S around the outside). At any point on the coil, which way does the field point, and why? (2 steps)", "answer": "- Step 1: The field points **radially outward** from the centre at every point on the coil — away from the central N pole, towards the outer S pole.\n- Step 2: This is because field lines always run $$N \\rightarrow S$$, and in this geometry the N is at the centre and the S is all around the perimeter. So at the top of the coil, the field points upward (away from centre); at the right of the coil, the field points rightward; at the bottom, downward; at the left, leftward. The field direction *rotates* as you move around the circle, always pointing outward.\n\nThis radial geometry is special: unlike a uniform field between two bar magnets (which points one direction everywhere), the radial field turns continuously, always perpendicular to the coil at every point.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "Two parallel wires carry currents in the *same* direction, separated by some distance. Qualitatively, do they attract or repel, and how can you see this from Fleming's left-hand rule applied to one wire in the field produced by the other? (3 steps)", "answer": "- Step 1: Each wire produces its own circular magnetic field (by the right-hand grip rule). At the location of wire 2, the field from wire 1 points perpendicular to the line joining them — specifically, if both currents flow into the page, the field at wire 2 from wire 1 circles around wire 1, and at wire 2's position points *transverse* to the wire-wire line.\n- Step 2: Apply Fleming's left hand to wire 2: its current direction × the field from wire 1 gives the force on wire 2. Working out the geometry, this force points *towards* wire 1.\n- Step 3: By symmetry, wire 1 is pulled towards wire 2 too. So parallel currents in the same direction **attract**. (Antiparallel currents repel — flip one current, and the force flips.)\n\nThis is the basis of the original SI definition of the ampere — defined via the force between two parallel current-carrying wires.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Why is the length $$L$$ in $$F = BIL$$ defined as only the length of wire *within the magnetic field*, not the total wire length? What happens to wire sections outside the field region?", "answer": "Only the wire sitting inside the field experiences the motor-effect force. Wire outside the field region has $$B = 0$$ (no field to push on it), so those sections contribute zero force regardless of their length or current.\n\nThat's why $$L$$ in the formula is specifically the length *within the field*. If a 1-metre wire passes through a 0.3-metre gap between magnets, only $$L = 0.3$$ m goes into the formula — the other 0.7 m is outside and unaffected. Including the full 1 m would overcount the force.\n\nPhysically: the field only exists between the poles. Outside, there's nothing to push the charges sideways. The motor effect is local — it only acts where both $$B$$ and $$I$$ are present.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "When a wire sits perpendicular to a magnetic field ($$\\theta = 90°$$), what happens to the motor-effect formula, and what is the physical significance of this being the \"maximum force\" case? (2 steps)", "answer": "- Step 1: When $$\\theta = 90°$$, $$\\sin 90° = 1$$, so the formula reduces to $$F = BIL$$ — the full, uncompromised force with no trig reduction.\n- Step 2: This is the maximum force because the *entire* field $$B$$ is acting across (perpendicular to) the wire. There is no component of the field running along the wire — every bit of the field is \"pushing sideways\" on the current. In all nine grid problems from the lesson, the wire was drawn perpendicular to the field, so $$F = BIL$$ applied directly every time.\n\nIf you tilt the wire away from perpendicular, you're \"wasting\" some of the field strength — the component along the wire does no work (no push), and only the perpendicular component $$B_\\perp = B\\sin\\theta$$ actually contributes.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Fleming's left-hand rule uses \"current\" — but does it refer to conventional current or electron flow? What must you do if a question gives you electron-flow direction? (3 steps)", "answer": "- Step 1: Fleming's rule uses **conventional current**, which is defined as the direction positive charges would flow ($$+ \\to -$$, i.e. from the positive terminal of the battery, through the external circuit, to the negative terminal).\n- Step 2: Real electrons drift in the **opposite** direction (since they carry negative charge). So if a question says \"electrons flow to the left,\" the conventional current is actually to the **right**.\n- Step 3: Before pointing your second finger, **flip** the electron-flow direction to get the conventional current direction. Forgetting this flip reverses every force you predict.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "In the loudspeaker geometry, why does Alex insist on \"just consider one point\" when applying Fleming's rule, rather than trying to reason about the whole circular coil at once? (2 steps)", "answer": "- Step 1: A circular current loop has the current direction changing continuously as you walk around it — there's no single \"current direction\" for the whole loop. So Fleming's rule, which needs a single direction for the second finger, can't be applied to the whole loop in one go.\n- Step 2: But Fleming's rule applies locally at *any single point* on the loop, where the current does have a definite direction. You pick one point (say, the top), solve it with the rule, get one force direction, then check a second point to confirm the pattern. By symmetry, if every point gives the same axial force direction, you know the whole loop is pushed that way.\n\nThe general lesson: when a geometry looks complicated, *localise* — solve at one point, then use symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A wire passes between angled (tilted) magnets, so the field line through the gap is along a diagonal rather than horizontal or vertical. Does Fleming's rule still work, and if so, how do you apply it? (3 steps)", "answer": "- Step 1: Yes — Fleming's left-hand rule works at **any** angle. The rule is geometric, not tied to vertical/horizontal axes.\n- Step 2: The key adjustment: align your **first finger with the actual field direction** (along the diagonal N → S line), not with \"up the page\" by default.\n- Step 3: With the first finger tilted along the diagonal field and the second finger along the current direction, the thumb naturally points along the force — which will also come out at a diagonal, perpendicular to both the field and the current.\n\nThe lesson: don't let the orientation of the page bias your hand. Always align first finger to the **real** field direction, no matter how that's drawn.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "When a wire is parallel to a magnetic field ($$\\theta = 0°$$), the force is zero. Explain *why* this makes physical sense — what is happening at the level of field and current interaction? (3 steps)", "answer": "- Step 1: Mathematically, $$\\theta = 0°$$ gives $$\\sin 0° = 0$$, so $$F = 0$$.\n- Step 2: Physically, when the wire runs along the same direction as the field lines, the current is flowing *in the same direction as* (or opposite to) the field. There is no \"sideways\" component of the field relative to the current — the field and current are collinear.\n- Step 3: The motor effect is a cross-product phenomenon: $$F \\propto I \\times B$$. A cross product is zero when the two vectors are parallel (or antiparallel). The push only exists when there is a *perpendicular* relationship between current and field — a \"twisting\" interaction. Parallel vectors don't twist; they just slide along each other, producing no lateral force.\n\nAnalogy: imagine trying to push a door open by pushing *along* the door's surface instead of perpendicular to it — you'd just slide your hand along the door, it wouldn't swing.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Fleming's left-hand rule uses a specific hand. Which hand, and what would go wrong if you used the other one? Connect this to the underlying vector mathematics. (3 steps)", "answer": "- Step 1: It must be the **LEFT hand**. This is for the motor effect — the force on a current-carrying wire in a field.\n- Step 2: If you used your right hand with the same finger assignments (First = Field, Second = Current, Thumb = Force), your thumb would point in the **opposite** direction — you'd get the wrong force direction every time.\n- Step 3: The mathematical reason: the motor effect obeys $$F \\propto I \\times B$$ (current cross field). This specific ordering ($$I \\times B$$, not $$B \\times I$$) is a left-hand rule convention. The cross product $$B \\times I$$ would give the opposite direction, which would correspond to a right-hand rule. The physics dictates that the force on a *positive* current in a field follows $$I \\times B$$, hence the left hand.\n\nRight-hand rules exist in physics (e.g., the grip rule for the field around a wire), but they apply to *different* physical relationships. For the force on a current, it's always left.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "A DC motor has a coil spinning in a magnetic field. Without a split-ring commutator, the coil would oscillate back and forth instead of spinning continuously. Explain why, using the force-reversal principles from the grid problems. (3 steps)", "answer": "- Step 1: As the coil rotates, the current direction in each side of the coil stays the same (same wire, same current direction). But the coil's orientation relative to the field changes — after half a turn, the side that was on the left is now on the right.\n- Step 2: This is equivalent to **reversing the magnets** relative to the current (same effect as Problems 1→3 in the grid). Reversing the field direction relative to the current **reverses the force**. So after half a turn, the force that was pushing the coil clockwise now pushes it anticlockwise — the coil decelerates and reverses.\n- Step 3: The split-ring commutator fixes this by **reversing the current** every half-turn (the brushes swap which terminal connects to which side of the coil). Reversing the current *and* the effective field direction (due to rotation) means *both* are reversed — and reversing both leaves the force unchanged (as we saw in the grid). The coil keeps spinning the same way.\n\nDouble reversal = unchanged force. That's the whole operating principle of the DC motor.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "What happens to the force on a coil in a magnetic field as the coil rotates, and how is this problem solved in a practical DC motor? (3 steps)", "answer": "- Step 1: As a current-carrying coil rotates in a fixed magnetic field, the wires that were initially on (say) the left of the field are now on the right after half a rotation. The current is still flowing in the same direction relative to the coil, but relative to the field, it's now flowing the opposite way through the same region of field.\n- Step 2: By the \"reverse the geometry\" pattern, this would reverse the force — meaning the coil would now experience a torque trying to **stop** the rotation, then push it backwards. Without intervention, the motor would oscillate or stall.\n- Step 3: A **split-ring commutator** solves this by mechanically reversing the current direction every half-rotation. The reversal of current cancels the reversal-from-rotation, so the net torque on the coil keeps driving it the same way round → continuous spinning.\n\nThis is exactly the application of \"reverse both ⇒ unchanged\" from the motor-effect rules.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Synthesis: A student understands $$F = BIL$$ and Fleming's LHR separately, but hasn't connected them. Explain why the *magnitude* formula and the *direction* rule are really two parts of the same physical law, and what would be inconsistent if you used one without the other. (3 steps)", "answer": "- Step 1: The full motor-effect law is a *vector* equation: $$\\vec{F} = IL\\vec{I_{\\text{dir}}} \\times \\vec{B}$$ (cross product). The magnitude formula $$F = BIL\\sin\\theta$$ gives the *size* of this vector (the cross product magnitude). Fleming's LHR gives the *direction* of this vector (the cross product direction). They are the magnitude and direction of the *same* vector.\n- Step 2: If you used only the magnitude formula, you could calculate how *strong* the push is, but you'd have no idea which *way* the wire moves. If you used only Fleming's LHR, you'd know the direction but not whether the force is strong enough to actually move the wire.\n- Step 3: An inconsistency would arise if you used the wrong hand for direction but the correct formula for magnitude: you'd calculate $$F = 2.4\\;\\text{N}$$ (correct size) but claim it pushes upward when it actually pushes downward. The magnitude is right but the direction is wrong — the vector is wrong. Both parts must agree.\n\nThe motor effect is one phenomenon with two aspects: how hard (formula) and which way (Fleming). You need both for a complete answer.", "source": "GLM 5.1 ①", "_id": "glm_1_66"}, {"question": "A circular coil in a *uniform* (non-radial) magnetic field — say, a flat horizontal field pointing right — has current circulating around the loop. At the top, current runs left; at the bottom, current runs right. What are the force directions at top and bottom, and why don't they produce a uniform push like the radial case? (3 steps)", "answer": "- Step 1: At the **top**: current leftward, field rightward. Fleming's LHR: first finger right, second finger left → thumb points **out of the page**. Force is out.\n- Step 2: At the **bottom**: current rightward, field rightward. Fleming's LHR: first finger right, second finger right → these are *parallel*, so the cross product is zero. Wait — actually, the current at the bottom runs rightward, same direction as the field. So $$\\theta = 0°$$ at the bottom, and the force is **zero** (or very small, depending on exact angles).\n- Step 3: More precisely, in a uniform horizontal field, the top and bottom of the coil experience forces in *opposite* out-of-page directions (top: out, bottom: into page) or different magnitudes, creating a **torque** (turning effect) rather than a uniform push. This is exactly how a DC motor works — the coil *rotates* rather than translating. The radial field is special because it eliminates this torque variation and produces a uniform axial push (for a loudspeaker).\n\nThe key contrast: uniform field → torque → rotation (motor); radial field → uniform force → in/out translation (speaker).", "source": "GLM 5.1 ①", "_id": "glm_1_51"}, {"question": "When $$\\theta = 90°$$, the force reaches its maximum $$F = BIL$$. Explain why this is the maximum possible force for given values of $$B$$, $$I$$, and $$L$$, using two different lines of reasoning.", "answer": "**Formula reasoning:** $$\\sin\\theta$$ ranges from 0 to 1. Its maximum value is 1, reached at $$\\theta = 90°$$. So $$F = BIL\\sin\\theta \\leq BIL$$ — you can never exceed $$BIL$$.\n\n**Physical reasoning:** At $$\\theta = 90°$$, the entire field $$B$$ is perpendicular to the wire — the full field strength is \"across\" the current, maximally pushing the charges sideways. At any other angle, some of the field is wasted running along the wire (the parallel component $$B_\\cos\\theta$$), which produces no force. Only the perpendicular slice $$B\\sin\\theta$$ does useful work. When $$\\theta = 90°$$, nothing is wasted — 100% of $$B$$ is perpendicular.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why does the same physics (motor effect) underlie both a DC motor and a loudspeaker, even though they look so different mechanically? (3 steps)", "answer": "- Step 1: Both devices use the same core equation $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$ — a current-carrying coil sitting in a magnetic field experiences a force.\n- Step 2: The difference is in the *geometry* and the *current type*. A DC motor uses a coil in a uniform field with a commutator switching the current every half-turn — converts steady DC into continuous rotation. A loudspeaker uses a coil in a *radial* field with AC current — converts oscillating AC into back-and-forth linear motion of a diaphragm.\n- Step 3: In both cases, the magnetic force on the current does mechanical work. The same Fleming-left-hand-rule logic determines direction; the same $$F = BIL$$ logic determines magnitude. Different mechanical arrangements give rotation vs. linear oscillation, but the physics is identical.\n\nThis is why understanding the motor effect deeply unlocks a huge range of real-world devices, not just one.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "The Earth's magnetic field in London is roughly 50 μT, while a lab U-magnet produces a field of roughly 0.1–0.5 T. Roughly how many times stronger is the U-magnet than the Earth's field, and what does this imply about using the Earth's field for motor-effect experiments?", "answer": "Convert to the same units: 50 μT = 50 × 10⁻⁶ T = 5 × 10⁻⁵ T. A U-magnet at ~0.3 T is about $$\\frac{0.3}{5 \\times 10^{-5}} = 6000$$ times stronger.\n\nThis means the Earth's field is far too weak to produce a noticeable motor-effect force on a lab wire. You need the concentrated field between magnet poles — thousands of times stronger — to get forces you can actually measure with a balance or see as visible wire deflection. The Earth's field can deflect a compass needle (which is tiny and lightweight), but not a chunk of copper wire carrying a few amps.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Why is the force on a current-carrying wire always perpendicular to *both* the field and the current, and what mathematical object captures this geometric structure? (3 steps)", "answer": "- Step 1: The underlying physics is the Lorentz force on individual moving charges: $$\\mathbf{F} = q\\mathbf{v} \\times \\mathbf{B}$$. The cross product, by definition, produces a vector perpendicular to both inputs.\n- Step 2: Summing over all the moving charges in a wire of length $$L$$ carrying current $$I$$, this becomes $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$ — same cross-product structure, just at the macro level.\n- Step 3: Geometrically, two non-parallel vectors define a plane; the cross product points *out* of that plane, perpendicular to both. So the force can only ever point in the one direction perpendicular to the field-current plane. That's why a hand (a 3D object with three mutually perpendicular axes — thumb, index, middle) is exactly the right tool to read off the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Compare $$F = BIL\\sin\\theta$$ (force on a current) and $$F = Bqv\\sin\\theta$$ (force on a moving charge): how are they related, and why do they look so similar? (3 steps)", "answer": "- Step 1: A current is just a stream of moving charges. If $$n$$ charges of charge $$q$$ each move with drift velocity $$v$$ through a wire of cross-section $$A$$ and length $$L$$, the total charge in the wire is $$nALq$$, and the time to traverse is $$L/v$$, so the current is $$I = nAqv$$.\n- Step 2: The force on one charge is $$F_1 = Bqv\\sin\\theta$$. The total force on all $$nAL$$ charges in the wire is $$F = nAL \\cdot Bqv\\sin\\theta = B(nAqv)L\\sin\\theta = BIL\\sin\\theta$$.\n- Step 3: So $$F = BIL\\sin\\theta$$ is literally the sum of $$F = Bqv\\sin\\theta$$ over all moving charges in a wire — they're the same physics at different scales. Both use Fleming's left-hand rule for direction (for positive charges; flip for electrons).\n\nThis is why both formulas have the same $$B$$, the same $$\\sin\\theta$$, and obey the same direction rule.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why is a split-ring commutator essential in a simple DC motor, in terms of the symmetries of $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$? (3 steps)", "answer": "- Step 1: As the coil rotates inside the magnetic field, after half a turn the side of the coil that was on the left is now on the right — its position relative to the fixed magnets has reversed.\n- Step 2: If the current direction stayed the same in absolute terms, the force on that wire segment would now push it the *wrong* way (back to where it came from), and the coil would just oscillate, not spin.\n- Step 3: The split-ring commutator reverses the current in the coil every half-turn at exactly the right moment. This second reversal cancels the orientation reversal, so the force continues to drive the rotation in the same direction. It's the \"reverse both ⇒ no change\" symmetry exploited deliberately.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "In the limit where a wire is nearly parallel to the field (small $$\\theta$$), how does the force scale with $$\\theta$$, and what's the intuition? (3 steps)", "answer": "- Step 1: For small angles, $$\\sin\\theta \\approx \\theta$$ (in radians). So $$F \\approx BIL\\theta$$ — the force grows **linearly** with the small tilt away from parallel.\n- Step 2: This means tiny misalignments give tiny forces. A wire 1° off from parallel feels only about 1.7% of the maximum force.\n- Step 3: Intuition: at $$\\theta = 0$$, the field has zero perpendicular component, so no force. As you tilt slightly, a small perpendicular component appears — and only that component does work. The force grows in proportion to how much perpendicular field you've \"uncovered\" by tilting.\n\nContrast: near $$\\theta = 90°$$, the force is at maximum and **insensitive** to small variations in angle (because $$\\sin$$ is flat at its peak). So perpendicular alignment is the robust regime; near-parallel alignment is the fragile regime.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "In a magnet/wire diagram, what are the two independent \"reversal symmetries,\" and what happens if you reverse both at once? (3 steps)", "answer": "- Step 1: **Reverse the current** (dot ↔ cross) ⇒ the force direction flips (e.g. down → up). This is because the second finger flips, dragging the thumb with it.\n- Step 2: **Reverse the magnets** (swap N and S) ⇒ the force also flips, because the field arrow now points the other way, flipping the first finger.\n- Step 3: **Reverse both at once** ⇒ the force is unchanged. The two flips cancel.\n\nThis isn't just a curiosity — it's the entire operating principle of a DC motor. A split-ring commutator flips the current direction every half-rotation so that, even though the coil rotates (effectively flipping its orientation relative to the magnets), the force keeps driving the coil round the same way.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why is it that in all nine grid problems, the formula $$F = BIL$$ (without $$\\sin\\theta$$) could be used directly, even though the full formula is $$F = BIL\\sin\\theta$$? What geometric fact about the diagram setup makes this possible? (2 steps)", "answer": "- Step 1: In every grid problem, the wire is drawn as a dot or cross (viewed end-on, bird's-eye view), meaning the wire runs **perpendicular to the page** — either straight out of the page (⊙) or straight into the page (⊗).\n- Step 2: The field runs **across the page** (horizontally, from N to S). A wire running perpendicular to the page is automatically perpendicular to any field lying in the page plane. So $$\\theta = 90°$$ always, $$\\sin 90° = 1$$, and $$F = BIL$$ applies directly every time.\n\nThis is a deliberate design choice in the grid: the bird's-eye view guarantees perpendicularity. In other problems (like a wire drawn at an angle within the page), you'd need the $$\\sin\\theta$$ factor.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Why does the general formula contain $$\\sin\\theta$$ rather than $$\\cos\\theta$$? Explain using the \"only the perpendicular bit counts\" argument. (3 steps)", "answer": "- Step 1: The motor-effect force arises from the component of the magnetic field that is **perpendicular** (across) the wire. Call this $$B_\\perp$$. A field running along the wire (parallel to the current) produces no force — it just \"slides past\" the charges without pushing them sideways.\n- Step 2: When the field makes angle $$\\theta$$ with the wire, the perpendicular component is $$B_\\perp = B\\sin\\theta$$ (the \"opposite side\" of the right triangle formed by decomposing $$B$$). The parallel component is $$B_\\parallel = B\\cos\\theta$$, which contributes zero force.\n- Step 3: Substituting $$B_\\perp$$ into the perpendicular-case formula: $$F = B_\\perp IL = (B\\sin\\theta)(IL) = BIL\\sin\\theta$$.\n\nTakeaway: $$\\sin\\theta$$ appears because we need the perpendicular component of the field, and perpendicular = sine in the standard angle convention. If someone defined $$\\theta$$ as the angle from the perpendicular instead, it would be $$\\cos$$ — but the standard convention is angle from parallel, so it's $$\\sin$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why does the force come out the same direction at *every* point on the circular coil in a radial magnet, even though the field and current directions are both changing as you go around the circle? Explain the geometric reason. (3 steps)", "answer": "- Step 1: As you move around the coil, the radial field direction rotates — at the top it's up, at the right it's right, at the bottom it's down, at the left it's left. The current direction also rotates by exactly the same amount (the current circulates around the loop).\n- Step 2: Because both $$\\vec{I}$$ and $$\\vec{B}$$ rotate together (by the same angle), their *relative* orientation stays constant. At every point, the current is always tangent to the circle and the field is always radial — they are always at 90° to each other, and the cross product $$\\vec{I} \\times \\vec{B}$$ always points in the same axial direction (out of the page).\n- Step 3: This is why the radial geometry is so powerful: it guarantees a *uniform* force direction on the entire coil. In a uniform (non-radial) field between flat magnets, different parts of a circular coil would experience forces in different directions — some pushing up, some pushing down, potentially cancelling. The radial field eliminates this problem, which is why loudspeakers use radial magnets.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "The motor effect formula $$F = BIL\\sin\\theta$$ applies to a current-carrying conductor. There is a closely related formula for a single moving charge: $$F = Bqv\\sin\\theta$$. Explain the conceptual connection — why do these formulas look so similar, and how does a current-carrying wire relate to individual moving charges? (3 steps)", "answer": "- Step 1: A current $$I$$ in a wire is really just **many individual charges** flowing with drift velocity $$v$$. If each charge $$q$$ moving at speed $$v$$ in field $$B$$ feels a force $$F = Bqv\\sin\\theta$$, then the total force on all the charges in length $$L$$ of wire is the sum of all these individual forces.\n- Step 2: The number of charges in length $$L$$ depends on the charge density and cross-section, but the current $$I$$ is defined as total charge passing per second: $$I = nqvA$$ (where $$n$$ is charge carrier density, $$A$$ is cross-sectional area). The total force on length $$L$$ becomes $$F = BIL\\sin\\theta$$ when you sum up all the individual $$Bqv$$ forces.\n- Step 3: So $$F = BIL\\sin\\theta$$ is really just $$F = Bqv\\sin\\theta$$ *aggregated over all the moving charges in the wire*. The wire formula is the macroscopic version; the charge formula is the microscopic version. Both use Fleming's LHR for direction, and both have the same $$\\sin\\theta$$ factor for the same geometric reason (only the perpendicular component of the field matters).\n\nThis connection is listed in the Edexcel Data Booklet: both formulas appear together (statements 106 and 107).", "source": "GLM 5.1 ①", "_id": "glm_1_64"}, {"question": "What is the relationship between Fleming's left-hand rule and the vector cross product, and why does this connection guarantee the rule is mathematically rigorous? (3 steps)", "answer": "- Step 1: The force on a current-carrying wire is given by the vector equation $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$, where $$\\mathbf{L}$$ is a vector along the wire in the current direction and $$\\mathbf{B}$$ is the field vector.\n- Step 2: The cross product produces a vector **perpendicular to both** input vectors, with magnitude $$|\\mathbf{L}||\\mathbf{B}|\\sin\\theta$$ — which is exactly $$BL\\sin\\theta$$, matching $$F = BIL\\sin\\theta$$.\n- Step 3: The **direction** of $$\\mathbf{I} \\times \\mathbf{B}$$ follows the right-hand rule of cross products — but because we're handling conventional positive current, the way the geometry resolves on your hand corresponds to the **left**-hand configuration in Fleming's rule. So Fleming's left hand is a physical mnemonic for evaluating $$\\mathbf{I} \\times \\mathbf{B}$$.\n\nThis is why every answer in the lesson could be independently verified via $$\\mathbf{I} \\times \\mathbf{B}$$ — the rule and the cross product are the same thing.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why is it not just acceptable but actually expected for students to physically make the Fleming's left-hand gesture during an exam?", "answer": "Because Fleming's rule is fundamentally a **3-D geometric** statement that can't easily be visualised on flat paper — the force, field, and current are all mutually perpendicular, which is exactly what your three fingers naturally form. Using your hand is the rule. As Alex put it: \"you certainly in the exam room and you see people doing this\" — examiners expect it. Trying to do it purely in your head invites errors (especially flipping a sign or swapping a finger). Always physically set up the hand, chant \"Force, Field, Current\" as you assign the fingers, and read off the answer. There's no embarrassment — everyone does it, and it's the correct method.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Why does the magnetic force on a current never do work on the wire as a whole in the direction of current flow, only in the perpendicular direction?", "answer": "Because the force is always perpendicular to both the current and the field by the cross-product structure $$\\mathbf{F} \\propto \\mathbf{I} \\times \\mathbf{B}$$. Perpendicularity to the current means: along the direction the charges are moving (i.e. along the wire), the magnetic force has zero component. So the magnetic force can't speed up or slow down the charges within the wire — it can only push the wire sideways. This is why the motor effect produces **mechanical motion of the wire** (in the perpendicular direction) but doesn't change the current itself. Energy flows from the electrical circuit into mechanical work done by displacing the wire sideways, not from the field directly speeding up the electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "In the \"super challenge\" problem, a circular coil sits flat inside a radial magnet (N at the centre, S around the outside). At every point on the coil, the force direction is the same (out of the page). Why doesn't the force direction vary around the circle, even though both the field and the current change direction at each point? (3 steps)", "answer": "- Step 1: At any point on the coil, the field points **radially outward** from the centre (N→S, from the central N pole towards the outer S ring). And the current flows **tangent** to the circle at that point (along the coil). These two directions are always perpendicular to each other — the radial field is perpendicular to the tangent current at every point on a circle.\n- Step 2: The force is perpendicular to *both* the radial field and the tangent current. At the top of the coil: field points up, current points right → force = out of page. At the right of the coil: field points right, current points down → force = out of page. The field and current both rotate by the same angle as you move around the circle, so their cross product always gives the same direction.\n- Step 3: Mathematically, this is because rotating both input vectors of a cross product by the same angle preserves the output direction. The field vector and current vector co-rotate around the circle, so $$\\vec{I} \\times \\vec{B}$$ stays constant — always pointing out of the page (along the axis of the coil).\n\nTakeaway: In a radial field, a circular coil experiences a **uniform axial force** — the same push at every point. This is what makes loudspeakers work.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "A common misconception: a student says \"since the field points right and the current is into the page, the wire is pushed to the right because the field 'carries' it along.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: The force on a current-carrying wire is *not* in the direction of the field. The wire isn't \"carried along\" by the field like a leaf in a river.\n- Step 2: By Fleming's left-hand rule (and the underlying cross product $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$), the force is *perpendicular* to both the field and the current — never along either of them.\n- Step 3: For field right and current into the page, Fleming gives force *down* (not right). The intuition \"field pushes wire along the field\" is completely wrong; the correct intuition is \"field and current together produce a sideways perpendicular push.\"\n\nThe cross-product structure of the force is what makes electromagnetism *non-obvious* — it took centuries to figure out, and you must trust the rule rather than naive \"pushing\" intuition.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "A student draws the field arrow from S to N in the gap between magnets (backwards). They then apply Fleming's LHR perfectly with their hand. Will the force direction be correct? If not, how is it related to the correct answer? (2 steps)", "answer": "- Step 1: The force direction will be **wrong** — specifically, it will be the **exact opposite** of the correct force direction.\n- Step 2: The first finger (field) is pointing the wrong way (S→N instead of N→S). This reverses the field direction input. Reversing the field direction reverses the force (as we saw in the grid: same current, reversed magnets → reversed force). Everything else (hand, current, method) was correct, but one backwards arrow flips the whole answer.\n\nThis is Trap 5. The fix: always draw the field arrow N→S first, before touching your hand. \"Which direction does the field always go?\" — N to S.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Misconception probe: a student says \"the force on the wire points in the same direction as the magnetic field.\" Why is this fundamentally wrong, and what is the correct geometric relationship between the force and the field? (2 steps)", "answer": "- Step 1: The force is **never** in the same direction as the field (unless the force is zero). The motor-effect force is always **perpendicular** to the field direction — this is a cross-product result: $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$, and a cross product is always perpendicular to both input vectors.\n- Step 2: The correct relationship: the force is perpendicular to *both* the field $$\\vec{B}$$ and the current $$\\vec{I}$$ simultaneously. It points in the *third* direction — the one that is at 90° to both of the other two. In 3D, if the field is along $$\\hat{x}$$ and the current along $$\\hat{z}$$, the force is along $$\\hat{y}$$ — none of them are parallel.\n\nThis is why you need a 3D tool (your hand) to find the force direction — it lives in a direction that isn't the field direction or the current direction, but a new direction perpendicular to both.", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "Why does the $$\\sin\\theta$$ factor appear in $$F = BIL\\sin\\theta$$? Explain using the idea of \"only the perpendicular bit counts,\" and show how this leads to the formula. (3 steps)", "answer": "- Step 1: The force on the wire depends only on the component of the magnetic field that is **perpendicular** to the current direction. Call this $$B_\\perp$$.\n- Step 2: From trigonometry, if the total field is $$B$$ at angle $$\\theta$$ to the wire, the perpendicular component is $$B_\\perp = B\\sin\\theta$$ (and the parallel component, which does nothing, is $$B_\\parallel = B\\cos\\theta$$).\n- Step 3: Substituting: the force formula becomes $$F = B_\\perp IL = (B\\sin\\theta)IL = BIL\\sin\\theta$$.\n\nThe $$\\sin\\theta$$ is not arbitrary — it is the geometric projection that extracts the \"across-the-wire\" portion of the field. The \"along-the-wire\" portion ($$B\\cos\\theta$$) contributes nothing, which is why $$\\theta = 0°$$ (all parallel, no perpendicular) gives zero force.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "A student says: \"A stronger magnet (higher $$B$$) makes the wire accelerate faster.\" Is this correct? What else determines the acceleration, and why might two different wires in the same field accelerate at different rates even if they carry the same current? (3 steps)", "answer": "- Step 1: The statement is *partially* correct: a stronger $$B$$ produces a larger force $$F = BIL$$, and by Newton's second law ($$F = ma$$), a larger force does produce a larger acceleration — *if the mass is the same*.\n- Step 2: The acceleration is $$a = \\frac{F}{m} = \\frac{BIL}{m}$$. It depends on the **mass of the wire** as well as the force. A thicker, heavier wire (more mass) will accelerate more slowly than a thin, light wire, even if both carry the same current in the same field.\n- Step 3: Two wires with the same current in the same field but different masses will experience the *same force* but *different accelerations*. The force depends on $$B$$, $$I$$, and $$L$$ (not mass), but the resulting motion depends on both force and mass.\n\nThe motor effect tells you the *force*, not the *acceleration*. To find acceleration, you need to know the mass too — that's Newton's domain, not Fleming's.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "Conceptually, why does an AC (alternating current) signal driven through a loudspeaker coil produce *sound*, while a DC signal would just push the coil to one side and hold it there? (3 steps)", "answer": "- Step 1: With DC, the current direction is constant, so by Fleming's rule the force on the coil is constant and points one fixed way (e.g. out of the page). The coil shifts to a new equilibrium position and stays there — no oscillation, no sound.\n- Step 2: With AC, the current reverses direction many times per second (e.g. at audio frequencies, hundreds to thousands of times per second). Each reversal reverses the force direction (by the \"reverse current ⇒ reverse force\" symmetry).\n- Step 3: So the coil oscillates back and forth at the AC frequency. It's attached to a diaphragm that pushes air, and these rapid air-pressure oscillations are what your ear interprets as sound. A 1000 Hz AC current ⇒ coil oscillates at 1000 Hz ⇒ you hear a 1000 Hz tone.\n\nThe audio waveform is literally encoded as the time-varying current, and the motor effect converts it directly into mechanical air motion.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A question shows a wire between two magnets and asks for the force direction. The wire symbol is a dot (⊙). A student correctly identifies this as \"out of the page\" and correctly reads the field as leftward. They set up Fleming's LHR: first finger left, second finger out of the page. Their thumb points downward. Verify this is correct using the cross product. (2 steps)", "answer": "- Step 1: $$\\vec{B} = B(-\\hat{x})$$ (leftward), $$\\vec{I} = I\\hat{z}$$ (out of page). Cross product: $$\\vec{I} \\times \\vec{B} = I\\hat{z} \\times B(-\\hat{x}) = -IB(\\hat{z} \\times \\hat{x}) = -IB\\hat{y}$$.\n- Step 2: $$-IB\\hat{y}$$ points in the negative $$\\hat{y}$$ direction = **downward**. ✓ Fleming's LHR and the cross product agree: force is downward.\n\nThis is Problem 9 from the grid — the one Alex finished with a smiley face.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "The principle \"reverse both current and field → force unchanged\" is the key insight behind the DC motor. How does the split-ring commutator exploit this, and why can't a DC motor work without one? (2 steps)", "answer": "- Step 1: In a DC motor, a coil spins in a fixed magnetic field. As the coil rotates past the halfway point (180°), the current direction through the coil would normally reverse relative to the field (because the sides of the coil swap positions). If the current stayed the same, the force would reverse and the coil would bounce back instead of continuing to spin.\n- Step 2: The split-ring commutator **reverses the current** every half-turn, right at the moment the coil's orientation reverses relative to the field. So both the current and the effective field-direction-relative-to-the-coil reverse simultaneously — and by the \"double reversal = unchanged\" principle, the force keeps pushing the coil the same way. Without the commutator, the force would alternate direction every half-turn and the coil would just oscillate back and forth, never spinning continuously.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "In the grid of 9 problems, two key patterns emerged: (A) reversing the current reverses the force, and (B) reversing the magnets reverses the force. Explain why pattern (A) is really just a property of the cross product $$\\vec{I} \\times \\vec{B}$$, and show that pattern (B) follows from the same mathematics. (3 steps)", "answer": "- Step 1: Pattern (A): reversing the current means $$\\vec{I} \\rightarrow -\\vec{I}$$, so $$(-\\vec{I}) \\times \\vec{B} = -(\\vec{I} \\times \\vec{B})$$ — the cross product flips sign, so the force reverses. This is a general property of cross products: negating one input negates the output.\n- Step 2: Pattern (B): reversing the magnets reverses the field direction: $$\\vec{B} \\rightarrow -\\vec{B}$$, so $$\\vec{I} \\times (-\\vec{B}) = -(\\vec{I} \\times \\vec{B})$$ — again the output flips sign, so the force reverses.\n- Step 3: Combining both: $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$ — two negatives cancel, force is unchanged. This is the double-reversal principle and the mathematical basis of the DC motor's commutator logic.\n\nThe cross product elegantly encodes all three patterns in one line: negate one factor → negate result; negate both → result unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "What's the difference between $$F = BIL\\sin\\theta$$ (force on a current) and $$F = Bqv\\sin\\theta$$ (force on a moving charge), and why is one essentially a consequence of the other? (3 steps)", "answer": "- Step 1: $$F = Bqv\\sin\\theta$$ gives the force on a single charge $$q$$ moving with velocity $$v$$ through a field $$B$$, at angle $$\\theta$$ to the field.\n- Step 2: A current in a wire is a stream of moving charges. If $$n$$ is the charge density and $$A$$ is the wire's cross-sectional area, the current is $$I = nAqv$$. The total number of charges in length $$L$$ is $$nAL$$, each feeling $$Bqv\\sin\\theta$$.\n- Step 3: Summing: total force $$= (nAL)(Bqv\\sin\\theta) = B(nAqv)L\\sin\\theta = BIL\\sin\\theta$$. So the force on a current is just the sum of the forces on all the individual moving charges inside it. $$F = BIL$$ is $$F = Bqv$$ in collective form.\n\nBoth use Fleming's left-hand rule for direction.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why does Fleming's left-hand rule still work when the magnetic field is tilted at a diagonal angle (not purely horizontal or vertical on the page)? What must you do differently compared to a standard horizontal-field problem? (3 steps)", "answer": "- Step 1: The rule never changes — it works at *any* angle. The field still runs from N to S, but now along a slanted line instead of a horizontal one.\n- Step 2: What you must do differently: **align your first finger with the actual, tilted field direction**, not with \"up\" or \"right\" on the page. Your finger must point along the exact N→S line as drawn, even if that line is at 45° or 60° to the horizontal.\n- Step 3: Once the first finger is genuinely aligned with the tilted field, and the second finger is on the current, the thumb gives a force that is perpendicular to *that* tilted field — which will also come out at a diagonal angle. The force is always perpendicular to both the field and the current, regardless of their orientations.\n\nAlex corrected you twice on this during the radial problem: \"your field finger needs to go straight up the page, North to South\" — the finger must be parallel with the actual field direction on the diagram, not tilted out of the page plane.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "A student asks: \"Can I just remember that N|S with ⊗ always gives down, and memorise all nine answers?\" Why is this a bad strategy for exams, and what strategy should they use instead? (2 steps)", "answer": "- Step 1: Memorising nine specific answers is brittle — an exam question can present the magnets in a different orientation (vertical, diagonal, 3D), use a curved wire, or give electron flow instead of conventional current. None of these match the memorised grid, and the student would be lost.\n- Step 2: The correct strategy: **learn the 3-step method** (field → current → force via Fleming's LHR) and the underlying principles (dot/cross, N→S, conventional current, perpendicularity). This method works for *any* configuration — flat, tilted, radial, 3D, electron flow, any angle $$\\theta$$. The grid answers are a *practice tool*, not a *memorisation target*.\n\nAlex's point: \"same sort of thing, just looks a bit different… I'm trying to get us into situations we don't quite know.\" The exam will deliberately present unfamiliar geometries to test whether you can *apply* the rule, not whether you can *recall* a grid.", "source": "GLM 5.1 ①", "_id": "glm_1_63"}, {"question": "In a loudspeaker (radial-field coil arrangement), the magnet has N at the centre and S all around the outside. A circular coil carries a circulating current. Why does the entire coil experience a single uniform force out of (or into) the page, even though different parts of the coil have current pointing in different directions? (3 steps)", "answer": "- Step 1: At every point on the coil, the field points *radially outward* (from the central N pole to the outer S ring). At the top of the coil, the field is up; at the right of the coil, the field is right; at every other point, it points outward along the radius.\n- Step 2: At every point on the coil, the current is tangent to the circle. At the top, it might flow rightward; at the right side, downward; at the bottom, leftward; at the left, upward — all consistent with circulating around the loop.\n- Step 3: At each point, the field and current are perpendicular to each other but both rotate by the same angle as you walk around the coil. Applying Fleming's left hand at any single point gives a force pointing the same way — out of the page everywhere. So all force contributions add up axially, pushing the whole coil out of the page as one rigid piston.\n\nReverse the current and the whole coil is pushed *into* the page. Drive it with AC and the coil oscillates in and out — that motion pushes air, creating sound. This is literally how the speaker in your headphones works.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "A circular coil of current sits in a **uniform** (non-radial) magnetic field. Will every point of the coil experience a force in the same direction? Why does this differ from the loudspeaker (radial) geometry? (3 steps)", "answer": "- Step 1: In a **uniform** field, the field direction is the same everywhere, but the **current direction varies** around the coil (tangential at every point, but rotating).\n- Step 2: At different points on the coil, applying Fleming's gives different force directions. For example, at the top of the coil the force might push up and out; at the bottom, push down and in. The forces don't all add up in one direction — they tend to **twist** the coil (creating a torque), and net translational force often cancels.\n- Step 3: In the **radial** (loudspeaker) field, both the field and the current rotate **together** around the coil. Their relative orientation is the same at every point, so Fleming's gives the same answer everywhere — and the forces all add up coherently in one direction (axial). That's why radial geometry produces translation (in/out motion), while uniform geometry produces rotation (torque).\n\nThis is the geometric insight behind why speakers use radial magnets but motors use uniform-field magnets.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Consider a U-shaped wire (a horseshoe of wire) with current flowing around it, placed in a uniform magnetic field. Why do the two parallel sides experience opposite forces, and what does this produce? (3 steps)", "answer": "- Step 1: The two parallel sides of the U carry current in **opposite directions** (current flows up one side and down the other, by continuity of the circuit).\n- Step 2: Both sides sit in the same external field $$B$$, but because the current directions are reversed between them, applying Fleming's rule to each gives **opposite force directions** — one side pushed up, the other pushed down (or one in, one out).\n- Step 3: Two equal-and-opposite forces acting on different parts of a rigid object produce a **couple** — a pure torque with no net translation. This torque is what makes the coil rotate, and is the fundamental mechanism inside every electric motor.\n\nThis is also why motors use coils, not just single straight wires: a coil naturally produces torque, not just translation.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Why doesn't the force on a current-carrying wire depend on the wire's thickness or material (within the formula $$F = BIL$$)? (3 steps)", "answer": "- Step 1: The motor-effect force ultimately arises from the magnetic force on each moving charge carrier in the wire, summed up. The total force depends on how many charges are moving and how fast — but those combine to give the current $$I$$.\n- Step 2: A thick wire can carry more current (lower resistance) but if you specify $$I$$ directly, the thickness is already accounted for. Similarly, material matters for resistance but not for the force once $$I$$ is known.\n- Step 3: So $$F = BIL$$ depends only on:\n+ How strong the field is ($$B$$)\n+ How much charge per second is flowing ($$I$$)\n+ How long the wire's exposure to the field is ($$L$$)\n\nThickness and material affect what current you **can** drive through with a given voltage, but not the force per amp.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "In physics diagrams, a dot (⊙) and a cross (⊗) are used to represent directions perpendicular to the page. Which direction does each symbol represent, and what is the arrow analogy that makes them memorable? (3 steps)", "answer": "- Step 1: **Dot ⊙ = current (or vector) OUT of the page**, towards you.\n- Step 2: **Cross ⊗ = current (or vector) INTO the page**, away from you.\n- Step 3: The arrow analogy: imagine an arrow flying through the air.\n+ If the arrow is flying **towards you**, you see its pointed **tip** — that looks like a dot ⊙. So dot = coming towards you = out of the page.\n+ If the arrow is flying **away from you**, you see its **tail feathers** (the fletching) — that looks like a cross ⊗. So cross = going away from you = into the page.\n\nThis was the slip you made in the lesson (calling a dot \"into the page\"). The arrow analogy fixes it permanently: tip = dot = out; tail = cross = in.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "A student is working on a force-direction problem and says: \"I'll just figure out the force direction by thinking about which way the wire would logically move.\" Why is this approach unreliable, and what should they do instead? (2 steps)", "answer": "- Step 1: \"Logical\" guessing is unreliable because the motor-effect force is **perpendicular to both** the field and the current — it often points in a direction that feels surprising or counter-intuitive. There is no obvious \"logical\" reason why a current going into the page in a rightward field should push the wire downward rather than upward — both seem equally \"logical\" if you're just guessing.\n- Step 2: The reliable method: use the **3-step process** (field → current → force via Fleming's LHR) or the **cross product** $$\\vec{I} \\times \\vec{B}$$. These are deterministic — they always give the same, correct answer with no ambiguity. Fleming's LHR is literally a physical algorithm that removes the need for intuition.\n\nThe force direction is a mathematical fact (cross product), not something you can reason out from \"common sense.\" That's why Alex insisted on the hand rule every single time.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "Synthesis question: A loudspeaker coil in a radial magnet carries AC current. A DC motor coil in a uniform field has a commutator. Both produce continuous motion. Explain the key *difference* in what kind of motion each produces, and how the field geometry enables it. (3 steps)", "answer": "- Step 1: The **loudspeaker** produces **back-and-forth linear motion** (translation in and out). The radial field ensures that at every point on the coil, the force is in the same axial direction (all pushing out, or all pushing in when current reverses). The coil oscillates along one axis — perfect for driving a speaker cone to create sound waves.\n- Step 2: The **DC motor** produces **continuous rotational motion** (spinning). The uniform field means that opposite sides of the coil experience forces in *opposite* directions (one side pushed up, the other pushed down), creating a torque that rotates the coil. The commutator flips the current every half-turn so the torque always drives the same rotational direction.\n- Step 3: The field geometry is the key: **radial field** → forces on all parts of the coil are *parallel* (same direction) → linear push. **Uniform field** → forces on opposite parts of the coil are *antiparallel* (opposite directions) → rotational torque. Same law ($$F = BIL$$, Fleming's LHR), but different field shape → fundamentally different type of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_57"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What physical quantity does the symbol $$B$$ represent in electromagnetism, and what does it actually measure about a magnetic field? (2 steps)", "answer": "- Step 1: $$B$$ stands for **magnetic flux density**. It is the quantitative measure of the *strength* of a magnetic field — how forcefully the field pushes on a current-carrying wire placed in it.\n- Step 2: Crucially, $$B$$ is a **vector**, not just a number. It has a direction: the direction a free North pole would be pushed, which is the same direction as the field lines ($$N \\rightarrow S$$). So $$B$$ tells you both *how strong* the field is and *which way* it points.\n\nA field with $$B = 0.5\\;\\text{T}$$ pointing rightward is fundamentally different from $$B = 0.5\\;\\text{T}$$ pointing leftward — the forces they produce on the same wire will be opposite.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What is the SI unit of magnetic flux density $$B$$, and how can it be expressed in more fundamental SI units? Why does that breakdown make sense? (3 steps)", "answer": "- Step 1: The SI unit of $$B$$ is the **tesla (T)**.\n- Step 2: A tesla can be broken down into fundamental units: $$1\\;\\text{T} = 1\\;\\text{N}\\;\\text{A}^{-1}\\;\\text{m}^{-1}$$.\n- Step 3: This breakdown makes perfect sense from the defining equation $$B = \\frac{F}{IL}$$ (for the perpendicular case). Force $$F$$ is in newtons, current $$I$$ in amperes, length $$L$$ in metres — so dividing N by (A × m) gives exactly $$\\text{N}\\;\\text{A}^{-1}\\;\\text{m}^{-1}$$, which we just rename \"tesla\" for convenience.\n\nOne tesla means: a wire carrying 1 A of current, with 1 m of its length sitting perpendicular to the field, experiences a force of exactly 1 N.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "How is magnetic flux density $$B$$ *defined* through the force on a current-carrying wire? Give the rearranged formula and explain what condition must hold for this definition to apply directly. (3 steps)", "answer": "- Step 1: From the motor-effect formula $$F = BIL\\sin\\theta$$, when the wire is **perpendicular** to the field ($$\\theta = 90°$$, so $$\\sin 90° = 1$$), the force simplifies to $$F = BIL$$.\n- Step 2: Rearranging: $$B = \\frac{F}{IL}$$.\n- Step 3: This rearrangement is the *operational definition* of $$B$$: you place a wire of known length $$L$$ carrying known current $$I$$ perpendicular to the field, measure the force $$F$$ on it, and compute $$B$$. The perpendicular condition is essential — if the wire is tilted, you'd be measuring a reduced force and would get a wrong (too small) value for $$B$$ unless you account for $$\\sin\\theta$$.\n\nThis is exactly how $$B$$ is measured in a lab: a wire on a balance between magnet poles, current switched on, read the force.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "For scale: roughly how does the strength of the Earth's magnetic field compare to a typical laboratory U-magnet? What order-of-magnitude difference are we talking about? (2 steps)", "answer": "- Step 1: The Earth's magnetic field in London is approximately $$50\\;\\mu\\text{T} = 5 \\times 10^{-5}\\;\\text{T}$$.\n- Step 2: A typical lab U-magnet produces a field on the order of $$0.1$$ to $$0.5\\;\\text{T}$$ — that is roughly **thousands of times stronger** than the Earth's field. Even a small lab magnet completely dominates the Earth's field in its gap, which is why we ignore the Earth's field when doing motor-effect experiments between magnet poles.\n\nThis巨大差距 is why a compass needle (responding to ~50 μT) slowly drifts, but a wire between lab magnets (responding to ~0.3 T) gets snapped sideways instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "State the full motor-effect formula for the force on a current-carrying conductor in a magnetic field, and identify what each symbol represents physically. (2 steps)", "answer": "- Step 1: The formula is $$F = BIL\\sin\\theta$$.\n- Step 2: Each symbol:\n+ $$F$$ — force on the wire, in newtons (N). This is the push the field exerts on the current.\n+ $$B$$ — magnetic flux density (field strength), in tesla (T).\n+ $$I$$ — current in the wire, in amperes (A).\n+ $$L$$ — length of wire that is actually *inside* the magnetic field, in metres (m). Only the portion sitting in the field gets pushed.\n+ $$\\theta$$ — the angle between the **direction of the current** (i.e., the wire) and the **direction of the field** $$B$$.\n\nThe key insight: only the portion of wire inside the field contributes, and only the perpendicular component of the field relative to the wire contributes — hence the $$\\sin\\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "In $$F = BIL\\sin\\theta$$, what exactly does the angle $$\\theta$$ measure? A common mistake is to define it relative to the wrong thing — what is the correct reference, and what is the trap? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **direction of the current** (the wire's orientation) and the **direction of the magnetic field** $$B$$.\n- Step 2: The trap: some students instinctively measure $$\\theta$$ from the *perpendicular* to the field (i.e., they think $$\\theta = 0°$$ means perpendicular). That is wrong. $$\\theta$$ is measured the standard way — from the field direction itself. So $$\\theta = 0°$$ means the wire is **parallel** to the field, and $$\\theta = 90°$$ means the wire is **perpendicular**.\n- Step 3: Quick sanity check: when the wire is perpendicular to the field (the strongest-push case), $$\\theta = 90°$$ and $$\\sin 90° = 1$$, giving maximum force $$F = BIL$$. When the wire is parallel (no push at all), $$\\theta = 0°$$ and $$\\sin 0° = 0$$, giving zero force. If you had defined $$\\theta$$ from the perpendicular, these would be swapped — contradicting the physics.\n\nThink of it as: \"How far is the wire from being aligned *with* the field?\" — $$\\theta = 0°$$ = fully aligned = no force.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "When a wire sits perpendicular to a magnetic field ($$\\theta = 90°$$), what happens to the motor-effect formula, and what is the physical significance of this being the \"maximum force\" case? (2 steps)", "answer": "- Step 1: When $$\\theta = 90°$$, $$\\sin 90° = 1$$, so the formula reduces to $$F = BIL$$ — the full, uncompromised force with no trig reduction.\n- Step 2: This is the maximum force because the *entire* field $$B$$ is acting across (perpendicular to) the wire. There is no component of the field running along the wire — every bit of the field is \"pushing sideways\" on the current. In all nine grid problems from the lesson, the wire was drawn perpendicular to the field, so $$F = BIL$$ applied directly every time.\n\nIf you tilt the wire away from perpendicular, you're \"wasting\" some of the field strength — the component along the wire does no work (no push), and only the perpendicular component $$B_\\perp = B\\sin\\theta$$ actually contributes.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "When a wire is parallel to a magnetic field ($$\\theta = 0°$$), the force is zero. Explain *why* this makes physical sense — what is happening at the level of field and current interaction? (3 steps)", "answer": "- Step 1: Mathematically, $$\\theta = 0°$$ gives $$\\sin 0° = 0$$, so $$F = 0$$.\n- Step 2: Physically, when the wire runs along the same direction as the field lines, the current is flowing *in the same direction as* (or opposite to) the field. There is no \"sideways\" component of the field relative to the current — the field and current are collinear.\n- Step 3: The motor effect is a cross-product phenomenon: $$F \\propto I \\times B$$. A cross product is zero when the two vectors are parallel (or antiparallel). The push only exists when there is a *perpendicular* relationship between current and field — a \"twisting\" interaction. Parallel vectors don't twist; they just slide along each other, producing no lateral force.\n\nAnalogy: imagine trying to push a door open by pushing *along* the door's surface instead of perpendicular to it — you'd just slide your hand along the door, it wouldn't swing.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Why does the $$\\sin\\theta$$ factor appear in $$F = BIL\\sin\\theta$$? Explain using the idea of \"only the perpendicular bit counts,\" and show how this leads to the formula. (3 steps)", "answer": "- Step 1: The force on the wire depends only on the compone
