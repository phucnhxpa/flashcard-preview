\"", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In physics diagrams, a dot (⊙) is drawn on a wire cross-section. What does this symbol indicate about current direction, and what is the visual analogy that makes it memorable?", "answer": "A dot (⊙) means current is **coming OUT of the page** — flowing towards you, the viewer.\n\nThe visual analogy: imagine an arrow flying towards you. You see the **pointed tip** of the arrowhead — a dot. The arrow is approaching, so the current is coming out towards you. This is the opposite of a cross (⊗), where you see the tail feathers of an arrow flying away.\n\nMemory hook: **Dot = tip coming at you = OUT. Cross = tail going away = IN.**", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A cross (⊗) on a wire cross-section indicates current direction. What direction is it, and what is the arrow analogy?", "answer": "A cross (⊗) means current is **going INTO the page** — flowing away from you, the viewer.\n\nThe arrow analogy: imagine an arrow flying away from you. You see the **tail feathers** (the fletching) — which look like a cross or × shape. The arrow is receding, so the current goes into the page, away from you.\n\nMemory hook: **Cross = tail feathers receding = IN. Dot = arrow tip approaching = OUT.**", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Outside a magnet, magnetic field lines run in a specific direction between the poles. If the left pole is N and the right pole is S, which way does the field arrow point in the gap? What if the poles are reversed (S on left, N on right)?", "answer": "Field lines always run **from North to South** outside the magnet.\n\n- Left pole = N, right pole = S: field points **RIGHT** (→) across the gap, from N towards S.\n- Left pole = S, right pole = N: field points **LEFT** (←) across the gap, from the N pole (right) towards the S pole (left).\n\nAlways draw this arrow first before touching your hand. The field direction is determined purely by the poles — it's always N→S. Getting this backwards flips your first finger and therefore flips the force.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When solving a force-direction problem, Alex insists on a specific 3-step sequence. What is the order, and why is it crucial to start with step 1 rather than step 2 or 3? (2 steps)", "answer": "- Step 1: The order is: **(1) Field** — read the poles, draw the field arrow N→S. **(2) Current** — read the dot/cross, determine current direction. **(3) Force** — set your left hand (first finger on field, second on current) and read off the thumb.\n- Step 2: Why start with the field? Because the field is the easiest thing to get right (just read N→S) and the hardest thing to guess. If you skip it and try to reason from current alone, you have no reference direction for your first finger — you'll likely point it in a default \"up\" or \"right\" that may be wrong. Drawing the field arrow first locks in a correct reference, making the rest mechanical. Alex: \"Which direction does the field always go?\" — establish it first, then everything else follows.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Two magnets are arranged with N on the left and S on the right. A wire between them shows a cross (⊗). Walk through the 3-step method to find the force direction. (3 steps)", "answer": "- Step 1: **Field.** N on left, S on right → field arrow points RIGHT (→) across the gap. Point your first finger right.\n- Step 2: **Current.** Cross (⊗) → current goes INTO the page (away from you). Point your second finger into the page (push it forward away from your face).\n- Step 3: **Force.** With first finger right and second finger into the page, your left thumb points **DOWNWARD** (↓). The force pushes the wire down.\n\nThis is Problem 1 from the grid — the one Alex worked through with you to set the pattern.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Same magnets as before (N left, S right), but now the wire shows a dot (⊙) instead of a cross. Without redoing all three steps from scratch, how can you determine the new force direction, and what general principle does this illustrate?", "answer": "You reversed the current (from into-page to out-of-page) while keeping the field the same. The general principle: **reversing the current reverses the force.** The previous answer was DOWN (↓); reversing the current flips it to **UP** (↑).\n\nYou can verify: first finger still points right (field unchanged), second finger now points OUT of the page (towards you) — thumb swings UP. This is Problem 2 from the grid, and it illustrates that the force direction is linearly dependent on current direction: flip the current, flip the force.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Now flip the magnets instead: S on the left, N on the right (field reversed), but keep the current as a dot (⊙, out of page). The original configuration (N left, S right, dot) gave force UP. What is the new force direction, and what principle does this illustrate?", "answer": "You reversed the field while keeping the current the same. The general principle: **reversing the field reverses the force.** The previous answer was UP; reversing the field flips it to **DOWN** (↓).\n\nVerification: S on left, N on right → field points LEFT (←). First finger points left. Second finger points out of page. Left thumb points DOWN. This is Problem 9 from the grid — the one Alex finished with a smiley face.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "If you reverse BOTH the current direction AND the field direction simultaneously, what happens to the force? Explain using two lines of reasoning. (2 steps)", "answer": "- Step 1: The force **stays the same** — it does NOT reverse. Two flips cancel. From the formula perspective: $$F \\propto I \\times B$$; if you negate both $$I$$ and $$B$$, the product $$(-I) \\times (-B) = I \\times B$$ — two negatives cancel, force unchanged.\n- Step 2: From Fleming's rule: reversing the field swings your first finger to the opposite direction; reversing the current swings your second finger opposite. Both fingers flip, so the thumb (which is perpendicular to both) stays where it was. Think of it like a 180° rotation of the whole hand — the thumb doesn't flip, it rotates in place but ends up pointing the same way.\n\nTakeaway: One reversal → force flips. Two reversals → force unchanged. This is the mathematical property of the cross product with double negation.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "The principle \"reverse both current and field → force unchanged\" is the key insight behind the DC motor. How does the split-ring commutator exploit this, and why can't a DC motor work without one? (2 steps)", "answer": "- Step 1: In a DC motor, a coil spins in a fixed magnetic field. As the coil rotates past the halfway point (180°), the current direction through the coil would normally reverse relative to the field (because the sides of the coil swap positions). If the current stayed the same, the force would reverse and the coil would bounce back instead of continuing to spin.\n- Step 2: The split-ring commutator **reverses the current** every half-turn, right at the moment the coil's orientation reverses relative to the field. So both the current and the effective field-direction-relative-to-the-coil reverse simultaneously — and by the \"double reversal = unchanged\" principle, the force keeps pushing the coil the same way. Without the commutator, the force would alternate direction every half-turn and the coil would just oscillate back and forth, never spinning continuously.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "The magnets in a problem are drawn tilted (diagonal), so the field doesn't run horizontally or vertically. Does Fleming's left-hand rule still work, and what adjustment must you make to your hand position? (2 steps)", "answer": "- Step 1: Yes, Fleming's rule still works — it works at **any angle**. The rule is about the relative orientation of three perpendicular directions, not about \"horizontal\" or \"vertical.\" The field direction is whatever direction the field actually points, even if that's diagonal.\n- Step 2: The adjustment: **align your first finger with the actual field direction**, not with \"up on the page\" or any default. If the field runs diagonally from upper-left N to lower-right S, point your first finger along that diagonal. Keep your second finger on the current direction (which may also be diagonal or out-of-page), and your thumb will give the force — which will also come out diagonal, perpendicular to both. Alex corrected this in the lesson: \"your field finger needs to go straight up the page, North to South\" — meaning, align it with the *real* field, not a guessed direction.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "In the \"super challenge\" problem, a circular coil sits flat inside a radial magnet (N at the centre, S around the outside). At every point on the coil, the force direction is the same (out of the page). Why doesn't the force direction vary around the circle, even though both the field and the current change direction at each point? (3 steps)", "answer": "- Step 1: At any point on the coil, the field points **radially outward** from the centre (N→S, from the central N pole towards the outer S ring). And the current flows **tangent** to the circle at that point (along the coil). These two directions are always perpendicular to each other — the radial field is perpendicular to the tangent current at every point on a circle.\n- Step 2: The force is perpendicular to *both* the radial field and the tangent current. At the top of the coil: field points up, current points right → force = out of page. At the right of the coil: field points right, current points down → force = out of page. The field and current both rotate by the same angle as you move around the circle, so their cross product always gives the same direction.\n- Step 3: Mathematically, this is because rotating both input vectors of a cross product by the same angle preserves the output direction. The field vector and current vector co-rotate around the circle, so $$\\vec{I} \\times \\vec{B}$$ stays constant — always pointing out of the page (along the axis of the coil).\n\nTakeaway: In a radial field, a circular coil experiences a **uniform axial force** — the same push at every point. This is what makes loudspeakers work.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "A loudspeaker has a circular coil in a radial magnetic field, driven by AC (alternating) current. Explain how this setup converts electrical signals into sound. (2 steps)", "answer": "- Step 1: The radial field + circular coil produces a uniform axial force (out of the page or into the page, depending on current direction). When the AC current flows one way, the coil is pushed out; when the current reverses, the coil is pushed in. The coil is attached to a cone/diaphragm, so it punches in and out alternately.\n- Step 2: These in-and-out movements compress and rarefy the air in front of the cone — producing sound waves whose frequency matches the AC frequency. A low-frequency AC signal makes the coil oscillate slowly → low-pitched sound. A high-frequency signal → high-pitched sound. As Alex said: \"little coil, little magnet, it goes in and out and makes a sound.\"\n\nThe key physics: the radial field geometry ensures the force is always axial (along the coil's axis), regardless of where on the coil you look. This gives a clean, uniform push — no wobbling or twisting.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A common trap is swapping the dot and cross conventions. If you mistakenly read a dot (⊙) as \"into the page\" instead of \"out of the page,\" how does this affect your final force direction, and why is this trap so dangerous?", "answer": "Swapping dot/cross reverses your second finger direction (current flips). Since the force depends on current direction, **your final force answer reverses** — you'd say UP when it should be DOWN, or vice versa.\n\nThis trap is dangerous because it's **silent** — if you get the field right and apply Fleming's rule correctly with the wrong current direction, your hand gesture feels right and the answer seems self-consistent. There's no obvious red flag. The only defence is memorising the convention cold: **dot = OUT (arrow tip towards you), cross = IN (tail feathers away)**. Re-read the legend before every question.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "On a bird's-eye view diagram (wire viewed end-on between horizontal magnets), the force comes out as up or down *on the page*. A common slip is calling it \"in/out of the page.\" Why is this wrong, and what should you say instead? (2 steps)", "answer": "- Step 1: In the bird's-eye view, the wire runs perpendicular to the page (that's why it appears as a dot or cross). The field runs horizontally across the page (left or right). The current runs in or out of the page. So the force — perpendicular to both — must lie **in the plane of the page** (up or down), not in/out of the page.\n- Step 2: Calling the force \"in/out of the page\" confuses the current direction with the force direction. The current is the one going in/out; the force is the one going up/down. When your thumb points up or down on the page, say \"up\" or \"down\" — not \"out of the page.\" Only say \"out of/in the page\" for the force when the geometry genuinely produces that direction (as in the radial coil problem).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "If you accidentally use your RIGHT hand instead of your left for Fleming's rule, how does your force answer change? Give a concrete example. (2 steps)", "answer": "- Step 1: Using the right hand computes $$\\vec{B} \\times \\vec{I}$$ instead of $$\\vec{I} \\times \\vec{B}$$, which reverses the direction. Your force answer **flips** — you'd get DOWN where it should be UP, or LEFT where it should be RIGHT.\n- Step 2: Concrete example: field RIGHT, current OUT of page. Left hand: first finger right, second finger out → thumb UP ✓. Right hand: first finger right, second finger out → thumb DOWN ✗. Every direction problem would give the opposite answer.\n\nThe right hand has its own valid use in electromagnetism — the grip rule for the field *around* a wire — but for the motor-effect force, it's always LEFT.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A wire makes angle $$\\theta = 30°$$ with the magnetic field. A student calculates $$F = BIL$$, ignoring the $$\\sin\\theta$$ factor. Is their answer too large, too small, or correct? By roughly what factor is it off?", "answer": "Their answer is **too large** — by a factor of roughly **2x** (specifically, $$\\frac{1}{\\sin 30°} = 2$$).\n\nThe correct formula is $$F = BIL\\sin 30° = BIL \\times 0.5$$, so the true force is only half of $$BIL$$. The student's answer of $$BIL$$ is double the actual force. This is because at $$\\theta = 30°$$, only half the field is perpendicular to the wire ($$B_\\perp = B\\sin 30° = 0.5B$$); the other half runs along the wire and contributes nothing. Ignoring $$\\sin\\theta$$ means pretending the entire field is perpendicular when it isn't.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A student draws the field arrow from S to N in the gap (backwards). How does this affect their force direction answer, and what is the underlying reason?", "answer": "The force direction **reverses**. Drawing the field from S to N means pointing the first finger opposite to the real field direction. Since the force is proportional to $$\\vec{I} \\times \\vec{B}$$, flipping $$\\vec{B}$$ flips the cross product and thus flips the force.\n\nFor example: N left, S right, current out of page. Correct field = RIGHT → force UP. Backwards field = LEFT → force DOWN. The student would get the opposite answer, and there's no way to catch this except by remembering: **field always goes N→S, never S→N.** Draw the arrow first, every time.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A wire of length 2 m carries current 3 A perpendicular to a field of 0.4 T. Calculate the force mentally — the numbers are chosen to multiply easily. Then explain what would happen to this force if the wire were tilted to 30° to the field.", "answer": "$$F = BIL = 0.4 \\times 3 \\times 2 = 2.4$$ N.\n\nThe multiplication: 0.4 × 3 = 1.2, then 1.2 × 2 = 2.4. Straightforward.\n\nIf tilted to $$\\theta = 30°$$: $$F = BIL\\sin 30° = 2.4 \\times 0.5 = 1.2$$ N — exactly half. The force drops to half because only half the field is now perpendicular to the wire. This illustrates the $$\\sin\\theta$$ factor in action: at 30°, you lose 50% of the force.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A wire carrying 5 A runs parallel to a 0.3 T magnetic field for 0.2 m. What is the force, and explain why using two different arguments?", "answer": "The force is **zero** (0 N).\n\n**Formula argument:** $$\\theta = 0°$$ (wire parallel to field), so $$F = BIL\\sin 0° = BIL \\times 0 = 0$$.\n\n**Physical argument:** The field runs along the wire — it has zero perpendicular component ($$B_\\perp = 0$$). With nothing pushing across the current, the charges experience no sideways force. The field just \"slides past\" the wire without interacting. No perpendicular component = no motor effect.\n\nThis is the other extreme from $$\\theta = 90°$$: maximum alignment = zero force.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A wire at $$\\theta = 30°$$ to a 0.5 T field carries 4 A through 0.1 m. Conceptually, why is the force exactly half of the perpendicular-case force, and what is the numerical value?", "answer": "The force is half because $$\\sin 30° = 0.5$$ — exactly half the field is perpendicular to the wire, and the other half runs along it (contributing nothing). So the effective field strength is only $$0.5 \\times 0.5 = 0.25$$ T of perpendicular component.\n\nNumerical: perpendicular-case force would be $$BIL = 0.5 \\times 4 \\times 0.1 = 0.2$$ N. At 30°: $$F = 0.2 \\times \\sin 30° = 0.2 \\times 0.5 = 0.1$$ N.\n\nKey insight: $$\\theta = 30°$$ always gives exactly half the maximum force, regardless of the specific values of $$B$$, $$I$$, $$L$$ — it's purely the $$\\sin 30° = 0.5$$ factor. This is a useful mental checkpoint: if someone claims the force at 30° is the same as at 90°, you immediately know it's wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Electrons flow to the LEFT along a wire. The magnetic field points INTO the page. Walk through the full reasoning to find the force direction on the wire. (3 steps)", "answer": "- Step 1: **Convert to conventional current.** Electrons flow left → conventional current flows RIGHT (opposite to electron drift). This is the direction your second finger must use.\n- Step 2: **Field.** Field points into the page — point your first finger into the page (away from you).\n- Step 3: **Apply Fleming's LHR.** Left hand: first finger into the page (field), second finger right (conventional current). Thumb points **UP** (↑). The force pushes the wire upward.\n\nCross-product check: $$\\vec{I}$$ (right) × $$\\vec{B}$$ (into page) → using right-hand coordinates (x = right, y = up, z = out): $$\\hat{x} \\times (-\\hat{z}) = \\hat{y}$$ → UP. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "If you know the field points RIGHT and the current is OUT of the page, can you predict the force direction without physically using your hand? Explain using cross-product reasoning. (2 steps)", "answer": "- Step 1: Set up coordinates: let $$\\hat{x}$$ = right, $$\\hat{y}$$ = up, $$\\hat{z}$$ = out of page. Then field $$\\vec{B}$$ is along $$\\hat{x}$$ (right) and current $$\\vec{I}$$ is along $$\\hat{z}$$ (out of page).\n- Step 2: The force is proportional to $$\\vec{I} \\times \\vec{B} = \\hat{z} \\times \\hat{x}$$. In right-hand coordinates, $$\\hat{z} \\times \\hat{x} = \\hat{y}$$ (up). So the force points **UP** (↑).\n\nThis matches Fleming's LHR: first finger right (field), second finger out (current) → thumb up. The cross product is the mathematical backbone of the hand rule — they always agree.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Alex's mantra for the lesson was \"Force, Field, Current.\" This maps to thuMb, First finger, seCond finger. Why does chanting the order out loud prevent a specific common mistake?", "answer": "Chanting prevents **swapping the first and second fingers** — i.e., accidentally putting the field on the middle finger and the current on the index finger. This swap would give the opposite force direction because you'd be computing $$\\vec{B} \\times \\vec{I}$$ instead of $$\\vec{I} \\times \\vec{B}$$.\n\nThe mantra locks the assignment: Force (thuMb) → Field (First) → Current (seCond). If you say it as you set each finger, you can't swap them because the word you're saying forces the finger you're adjusting. Without the chant, it's easy to instinctively point the index finger at whatever seems \"first\" on the diagram (often the current), which reverses the answer.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "For the radial coil \"super challenge,\" Alex advised: \"don't try to do the whole circle at once — look at one point at a time.\" Why is this approach necessary, and what would go wrong if you tried to reason about the entire circle simultaneously? (2 steps)", "answer": "- Step 1: At each point on the circle, the field direction and current direction are *different* — the field is radial (pointing outward from centre) and the current is tangent (along the coil). If you try to reason about \"the whole circle,\" you're trying to simultaneously handle many different field-current pairs, which is cognitively overwhelming. There's no single \"the field\" or \"the current\" for the whole loop — they vary point by point.\n- Step 2: By solving one point (e.g., the top), you discover the force is out of the page. Then you check another point (e.g., the right side) and find the same result. The pattern emerges: force is uniform. You don't need to prove it for all 360° — two or three points convince you, and the co-rotation argument (both vectors rotate together, so the cross product is constant) seals it. One point at a time reduces a 3D circular problem to a single Fleming's-rule application.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "A wire between magnets experiences a downward force. If you double the current but also halve the magnetic field strength (perhaps by using weaker magnets), what happens to the force magnitude and direction?", "answer": "The force magnitude is **unchanged**, and the direction is still **downward**.\n\nFrom $$F = BIL$$: doubling $$I$$ gives $$2I$$, halving $$B$$ gives $$0.5B$$, so $$F = (0.5B)(2I)(L) = BIL$$ — the two changes cancel exactly. The direction doesn't change because neither the field direction nor the current direction reversed — only their magnitudes changed. Fleming's rule gives the same direction: field still points the same way, current still flows the same way → thumb still points down.\n\nThis illustrates that force depends on the *product* $$B \\times I$$, so proportional changes in $$B$$ and $$I$$ can compensate each other.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Why is the length $$L$$ in $$F = BIL$$ defined as only the length of wire *within the magnetic field*, not the total wire length? What happens to wire sections outside the field region?", "answer": "Only the wire sitting inside the field experiences the motor-effect force. Wire outside the field region has $$B = 0$$ (no field to push on it), so those sections contribute zero force regardless of their length or current.\n\nThat's why $$L$$ in the formula is specifically the length *within the field*. If a 1-metre wire passes through a 0.3-metre gap between magnets, only $$L = 0.3$$ m goes into the formula — the other 0.7 m is outside and unaffected. Including the full 1 m would overcount the force.\n\nPhysically: the field only exists between the poles. Outside, there's nothing to push the charges sideways. The motor effect is local — it only acts where both $$B$$ and $$I$$ are present.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "Synthesis check: A wire carries current upward on the page, and the magnetic field points to the right on the page. Without using your hand, determine the force direction. Then verify with Fleming's LHR. (2 steps)", "answer": "- Step 1: Cross-product reasoning. Set coordinates: $$\\hat{x}$$ = right (field direction), $$\\hat{y}$$ = up (current direction). Force ∝ $$\\vec{I} \\times \\vec{B} = \\hat{y} \\times \\hat{x} = -\\hat{z}$$, which is **into the page** (since $$\\hat{z}$$ = out of page, $$-\\hat{z}$$ = into page).\n- Step 2: Fleming's LHR verification. Left hand: first finger points RIGHT (field), second finger points UP (current). Thumb points **INTO the page** ✓.\n\nThis is a case where the force genuinely goes in/out of the page (not up/down) — because both the field and current lie in the plane of the page, so the perpendicular force must point out of that plane.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Edge case: What happens to the motor-effect force if the current is zero (the wire is in the field but not connected to a power supply)? Explain using both the formula and physical reasoning.", "answer": "The force is **zero**.\n\n**Formula:** $$F = BIL = B \\times 0 \\times L = 0$$.\n\n**Physical reasoning:** With no current, no charge is flowing through the wire. The field has nothing to push on — there are no moving charges to deflect. A stationary wire in a magnetic field feels no motor-effect force. (It would feel no force even if it had static charge, since the motor effect requires *moving* charge — that's why the moving-charge formula is $$F = Bqv\\sin\\theta$$, and $$v = 0$$ also gives $$F = 0$$.)\n\nThis reinforces: the motor effect needs *both* a field AND a current. Missing either one → no force.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A student reasons: \"The force is $$F = BIL\\sin\\theta$$, and $$\\theta$$ is the angle between the force and the field.\" Is this correct? If not, what is $$\\theta$$ actually the angle between, and why does the student's definition lead to a contradiction?", "answer": "This is **incorrect**. $$\\theta$$ is the angle between the **current direction** and the **field direction**, not between the force and the field.\n\nThe student's definition leads to a contradiction because the force is always perpendicular to the field (by the cross-product nature of $$\\vec{I} \\times \\vec{B}$$). If $$\\theta$$ were the angle between force and field, it would always be 90°, and $$\\sin 90° = 1$$ always — meaning there'd be no $$\\sin\\theta$$ variation at all, and the formula would just be $$F = BIL$$ for every orientation. But we know the force varies with wire angle (zero when parallel, maximum when perpendicular), so $$\\theta$$ can't be the force-field angle.\n\nThe correct $$\\theta$$ (current-field angle) does vary: 0° when wire is parallel to field, 90° when perpendicular — exactly matching the observed force variation.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Simple exercise: A 0.5 m wire carries 2 A perpendicular to a 0.2 T field. Find the force. Then state what the force would be if the same wire were at 60° to the field instead of 90°.", "answer": "Perpendicular case: $$F = BIL = 0.2 \\times 2 \\times 0.5 = 0.2$$ N.\n\nAt 60°: $$F = BIL\\sin 60° = 0.2 \\times \\sin 60° \\approx 0.2 \\times 0.866 \\approx 0.17$$ N.\n\nConceptual insight: at 60°, the force is about 87% of the maximum (since $$\\sin 60° \\approx 0.87$$). It's still fairly large because 60° is close to perpendicular — most of the field is still across the wire. Only at small angles (like 10° or 20°) does the force drop dramatically, because $$\\sin\\theta$$ falls steeply near 0°.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A student says: \"A stronger magnet always produces a bigger force on a current-carrying wire.\" Is this statement always true, or is there a configuration where even an infinitely strong magnet produces zero force?", "answer": "The statement is **not always true**. If the wire is **parallel** to the field ($$\\theta = 0°$$), the force is zero regardless of how strong the magnet is: $$F = BIL\\sin 0° = 0$$ for any value of $$B$$.\n\nEven an \"infinitely strong\" magnet ($$B \\to \\infty$$) would produce zero force on a parallel wire, because $$\\sin 0° = 0$$ kills the product. The perpendicular component of the field is what matters, and for a parallel wire, that component is zero no matter how large $$B$$ is.\n\nTakeaway: field strength alone doesn't guarantee a force. Orientation matters equally. A moderate field at 90° produces more force than an extreme field at 0°.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Why is the motor effect called the \"motor effect\"? What device does it power, and how does the force-on-a-wire principle translate into rotational motion?", "answer": "It's called the \"motor effect\" because it's the principle behind **electric motors**. A DC motor has a coil of wire sitting in a magnetic field. When current flows through the coil, each side of the coil experiences a force (one side pushed up, the other pushed down, because current flows in opposite directions on opposite sides). These opposing forces create a **couple** (a torque), causing the coil to rotate rather than just translate.\n\nThe key transition: a single straight wire gets pushed in one direction (linear force). But a coil has current going one way on the left and the opposite way on the right, so the left side is pushed up and the right side is pushed down — this pair of forces rotates the coil. The split-ring commutator keeps reversing the current every half-turn so the rotation continues rather than oscillating.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "The lesson showed a bench apparatus: a power supply driving current through a wire sitting between the poles of a U-magnet. This is the lab demonstration of the motor effect. Explain what you would observe when the current is switched on, and what would happen if you reversed the current direction.", "answer": "When the current is switched on, the wire **deflects** — it jumps up or down between the magnet poles (depending on the current direction and field direction). This visible kick is the motor-effect force in action. The wire moves because $$F = BIL$$ pushes it perpendicular to both the field and the current.\n\nIf you reverse the current direction (swap the power supply connections), the wire deflects in the **opposite direction** — it jumps the other way. This demonstrates the principle \"reverse the current → reverse the force.\" If you then also reverse the magnet (flip the U-magnet so N and S swap), the wire goes back to the original direction — demonstrating \"reverse both → force unchanged.\"\n\nThis experiment is also how $$B$$ can be measured: weigh the wire's deflection force (using a balance), measure $$I$$ and $$L$$, then compute $$B = \\frac{F}{IL}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}], "count": 48}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "How is the magnetic flux density $$B$$ formally defined from the force on a current-carrying wire, and what is its SI unit broken down into base-derived units? (3 steps)", "answer": "- Step 1: Magnetic flux density $$B$$ is defined via the maximum force on a wire perpendicular to the field, using the relation $$B = \\frac{F}{IL}$$.\n- Step 2: The SI unit of $$B$$ is the tesla (T). Breaking it down from the definition: $$1 \\text{ T} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$.\n- Step 3: $$B$$ is a vector, meaning it has both magnitude and direction (the direction a free North pole would be pushed). For scale, Earth's field is roughly $$50 \\, \\mu\\text{T}$$, whereas a lab magnet is a fraction of a tesla (thousands of times stronger).\n\nA tesla is not just an arbitrary unit; it directly measures how many newtons of force per ampere-metre of current-length a field can produce.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the \"motor effect\"? (2 steps)", "answer": "- Step 1: The motor effect is the phenomenon where a current-carrying wire placed within an external magnetic field experiences a force.\n- Step 2: This force arises because the wire's own circular magnetic field interacts with the external field, creating an imbalance in field lines on either side of the wire, which pushes the wire away from the region of higher field density.\n\nThe motor effect is the fundamental mechanism behind electric motors and loudspeakers.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Why does the formula for the force on a current-carrying wire include a $$\\sin \\theta$$ term, and what are the two extreme angle cases? (3 steps)", "answer": "- Step 1: Only the component of the magnetic field that runs *perpendicular* to the wire can push it. If the field is at angle $$\\theta$$ to the wire, this perpendicular component is $$B_\\perp = B \\sin \\theta$$.\n- Step 2: Substituting this perpendicular component into the base formula gives $$F = B_\\perp I L = B I L \\sin \\theta$$. A field running perfectly parallel to the wire ($$\\theta = 0^\\circ$$) has no perpendicular component, so it produces zero force.\n- Step 3: The two extremes are:\n+ $$\\theta = 90^\\circ$$ (wire perpendicular to field): $$\\sin 90^\\circ = 1$$, so $$F = BIL$$ (maximum force).\n+ $$\\theta = 0^\\circ$$ (wire parallel to field): $$\\sin 0^\\circ = 0$$, so $$F = 0$$ (no force).\n\nThe $$\\sin \\theta$$ captures the geometric fact that parallel field lines slide right past the wire without pushing it sideways.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In Fleming's Left-Hand Rule, what does each digit (thumb, first finger, second finger) represent, and what is the memory hook for each? (3 steps)", "answer": "- Step 1: The **thuMb** represents the **Motion** or force ($$F$$). (Memory: thuMb = Motion).\n- Step 2: The **First finger** represents the **Field** ($$B$$). (Memory: First = Field).\n- Step 3: The **seCond finger** represents the **Current** ($$I$$). (Memory: seCond = Current).\n\nAll three digits must be held at right angles to each other, reflecting the 3-D nature of the interaction where the force is perpendicular to both the field and the current.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is the visual intuition behind the dot (⊙) and cross (⊗) symbols used to represent current direction in 3-D diagrams? (2 steps)", "answer": "- Step 1: Think of the symbol as the end of an arrow traveling in 3-D space.\n- Step 2: \n+ A **dot (⊙)** represents current coming **OUT of the page** — you are looking at the sharp tip of the arrow flying towards you.\n+ A **cross (⊗)** represents current going **INTO the page** — you are looking at the feathered tail of the arrow flying away from you.\n\nThis convention makes it easy to instantly assign the second finger in Fleming's LHR without needing to redraw the wire.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In the gap between two bar magnets, which direction does the magnetic field point, and why is it critical to establish this before using your left hand? (2 steps)", "answer": "- Step 1: Magnetic field lines always run from North to South (outside the magnet). Therefore, in the gap, the field arrow points from the N pole towards the S pole.\n- Step 2: It is critical to draw this arrow first because pointing your First finger the wrong way (S to N) will flip your resulting force direction entirely. Getting the field right makes the rest of the rule mechanical.\n\nIf N is on the left and S is on the right, the field points RIGHT (→). If S is on the left and N is on the right, the field points LEFT (←).", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Why must Fleming's Left-Hand Rule use *conventional current* rather than electron flow? What must you do if a question specifies electron flow direction? (2 steps)", "answer": "- Step 1: The rule maps to the vector cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$, where $$\\vec{I}$$ is historically defined as the flow of positive charge (+ to −), known as conventional current.\n- Step 2: Electrons are negative and drift opposite to conventional current. If a question states electrons flow left, you must flip the direction to right (conventional current) before pointing your seCond finger.\n\nUsing electron flow directly with the left hand would yield a force in the exact opposite direction to the real physical force.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "What happens to the direction of the force if you accidentally use your *right* hand instead of your left hand for the motor effect? (2 steps)", "answer": "- Step 1: The right-hand rule corresponds to the cross product $$\\vec{I} \\times \\vec{B}$$, but Fleming's Left-Hand Rule effectively calculates $$\\vec{B} \\times \\vec{I}$$ (or the negative of the standard right-hand cross product).\n- Step 2: Using the right hand will point your thumb in the exact **opposite** direction to the correct force, leading to a completely reversed answer.\n\nThe left hand is specifically required for the motor effect (force on a current). Save the right hand for other phenomena, like the field around a straight wire.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "If you reverse the direction of the current in a wire, what happens to the motor effect force? What if you reverse the magnetic field instead? (3 steps)", "answer": "- Step 1: Reversing the current reverses the direction of the seCond finger in Fleming's LHR.\n- Step 2: This causes the thumb to point in the opposite direction. Therefore, reversing the current **reverses the force**.\n- Step 3: Similarly, reversing the magnetic field (swapping N and S poles) reverses the First finger, which also **reverses the force**.\n\nA single reversal (current OR field) always flips the force direction.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "If you reverse BOTH the current direction and the magnetic field direction simultaneously, what is the resulting direction of the force? (2 steps)", "answer": "- Step 1: Reversing the current flips the force direction once. Reversing the field flips it again.\n- Step 2: Two flips cancel out, so the force direction remains **UNCHANGED**.\n\nThis is the principle behind the DC motor: if the coil rotates past the vertical, both the current and the relative field direction flip, so a split-ring commutator is used to flip the current again (double flip) to keep the torque in the same rotational direction.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A wire sits at an angle of $$30^\\circ$$ to a magnetic field. Is the force on it greater than, less than, or equal to the maximum possible force? (2 steps)", "answer": "- Step 1: The maximum force occurs when the wire is perpendicular to the field ($$\\theta = 90^\\circ$$, $$\\sin 90^\\circ = 1$$).\n- Step 2: At $$\\theta = 30^\\circ$$, the perpendicular component of the field is $$B \\sin 30^\\circ = 0.5B$$. Because only half the field is perpendicular to the wire, the force is **less than** the maximum force (exactly half of it).\n\nOnly the perpendicular slice of the field contributes to the push; the parallel slice slides by uselessly.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In a \"super challenge\" radial field setup (like a loudspeaker), a circular coil sits flat around a central North pole, with South poles on the outside. How do you determine the force direction on the coil? (3 steps)", "answer": "- Step 1: Do not try to solve the whole circle at once. Pick a single point on the coil.\n- Step 2: At that point, the field points radially outward (from the center N to the outside S). Find the current direction at that specific point (tangent to the circle). Apply Fleming's LHR.\n- Step 3: Repeat for another point. You will find that because the field and the current both rotate together around the circle, the cross product yields a force in the **same uniform direction** (e.g., out of the page) at every single point.\n\nThis creates one unified axial push on the whole coil, which is exactly how a loudspeaker cone is driven in and out to create sound.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Does Fleming's Left-Hand Rule still work if the magnets are drawn diagonally or tilted in a 3-D-looking diagram? (2 steps)", "answer": "- Step 1: Yes, the rule never changes; only the visual dressing does.\n- Step 2: You must align your First finger with the *actual* tilted direction of the field (from N to S), rather than just defaulting to horizontal or vertical. Your thumb will then naturally point in a diagonal or out-of-plane direction for the force.\n\nThe physics is invariant; just strictly map your fingers to the true vector directions, no matter how the diagram is oriented.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Using the 3-step method, find the force direction: Magnets are N(left) | S(right), wire has a cross (⊗). (3 steps)", "answer": "- Step 1: **Field** — N is on the left, S on the right, so field points RIGHT (→). Point First finger right.\n- Step 2: **Current** — Cross (⊗) means current is INTO the page (away from you). Point seCond finger into the page.\n- Step 3: **Force** — With First finger right and seCond finger in, the thuMb is forced to point DOWNWARD (↓).\n\nForce is downward.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Using the 3-step method, find the force direction: Magnets are S(left) | N(right), wire has a dot (⊙). (3 steps)", "answer": "- Step 1: **Field** — S is on the left, N on the right, so field points LEFT (←). Point First finger left.\n- Step 2: **Current** — Dot (⊙) means current is OUT of the page (towards you). Point seCond finger out of the page.\n- Step 3: **Force** — With First finger left and seCond finger out, the thuMb is forced to point DOWNWARD (↓).\n\nForce is downward. Notice this is the same outcome as reversing *both* current and field from the standard N(left)|S(right) with ⊗ setup!", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A wire carries $$2 \\text{ A}$$ of current through $$0.5 \\text{ m}$$ of a $$0.2 \\text{ T}$$ magnetic field, perpendicular to the field lines. What is the force? (2 steps)", "answer": "- Step 1: Because the wire is perpendicular to the field, $$\\theta = 90^\\circ$$ and we use the maximum force formula $$F = BIL$$.\n- Step 2: $$F = 0.2 \\times 2 \\times 0.5 = 0.2 \\text{ N}$$.\n\nThe force is $$0.2 \\text{ N}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A wire carrying $$4 \\text{ A}$$ runs through a $$0.5 \\text{ T}$$ field over a length of $$0.1 \\text{ m}$$. The wire makes a $$30^\\circ$$ angle with the field. What is the force? (2 steps)", "answer": "- Step 1: Since the wire is not perpendicular, we must include the angle factor: $$F = BIL \\sin \\theta$$.\n- Step 2: $$F = 0.5 \\times 4 \\times 0.1 \\times \\sin 30^\\circ = 0.2 \\times 0.5 = 0.1 \\text{ N}$$.\n\nThe force is $$0.1 \\text{ N}$$, exactly half of what it would be if the wire were perpendicular.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Electrons flow to the RIGHT along a wire sitting in a magnetic field pointing INTO the page. Which way is the force on the wire? (3 steps)", "answer": "- Step 1: Convert electron flow to conventional current. Electrons moving right means conventional current moves LEFT.\n- Step 2: Apply Fleming's LHR. First finger points INTO the page (Field). seCond finger points LEFT (Current).\n- Step 3: Your thuMb will point DOWNWARD (↓).\n\nThe force on the wire is downward. Always translate electron flow to conventional current first!", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A wire is placed exactly parallel to the magnetic field lines. Why does it experience zero force? (2 steps)", "answer": "- Step 1: The formula is $$F = BIL \\sin \\theta$$. When the wire is parallel to the field, the angle $$\\theta = 0^\\circ$$.\n- Step 2: $$\\sin 0^\\circ = 0$$, so $$F = 0$$. Geometrically, this is because there is zero perpendicular component of the field to \"push\" against the current. The field lines simply slide along the wire.\n\nA parallel alignment means absolutely no motor effect force, no matter how strong the current or field.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "What are the two reflexes you should apply to ANY odd, curved, or 3-D magnetic field diagram before trying to use your hand? (2 steps)", "answer": "- Step 1: Draw the explicit field arrow first. Always establish the $$N \\rightarrow S$$ direction on the page so your First finger has a clear target.\n- Step 2: For any curved or awkward shape (like a loop), reduce it to a single point. Solve that microscopic straight-line segment with Fleming's LHR, then repeat for other points if necessary.\n\nDon't try to visualize a whole 3-D field interacting with a whole 3-D wire at once; break it down into atomic point-interactions.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}], "count": 20}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define magnetic flux density (B) and state its SI unit. (3 steps)", "answer": "- Step 1: Magnetic flux density (B) measures the strength of a magnetic field. It is defined as the force per unit length on a current-carrying wire perpendicular to the field.  \n- Step 2: The formula is $ B = \\frac{F}{IL} $, where $ F $ is force (N), $ I $ current (A), and $ L $ length (m).  \n- Step 3: The SI unit is the tesla (T), where $ 1\\ \\text{T} = 1\\ \\text{N A}^{-1} \\text{m}^{-1} $.  \n+ Tesla is a large unit; Earth’s field ≈ 50 µT, lab magnets ≈ 0.1–1 T.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does the angle θ between a wire and a magnetic field affect the force on the wire? (3 steps)", "answer": "- Step 1: The force is given by $ F = BIL \\sin\\theta $, where θ is the angle between the wire and the field.  \n- Step 2: When θ = 90° (wire perpendicular to field), $ \\sin\\theta = 1 $, so force is maximum: $ F = BIL $.  \n- Step 3: When θ = 0° (wire parallel to field), $ \\sin\\theta = 0 $, so force is zero.  \n+ Only the perpendicular component of the field ($ B_{\\perp} = B \\sin\\theta $) contributes to the force.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does reversing the current or magnetic field reverse the force direction in the motor effect? (2 steps)", "answer": "- Step 1: The force direction depends on the cross product $ \\mathbf{F} \\propto \\mathbf{I} \\times \\mathbf{B} $. Reversing either $ \\mathbf{I} $ or $ \\mathbf{B} $ flips the cross product’s sign.  \n- Step 2: For example, if current reverses (e.g., from ⊗ to ⊙), the second finger in Fleming’s rule flips, reversing the thumb’s direction.  \n+ Reversing both current and field cancels the effect (force remains same), as in DC motors.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Explain Fleming’s Left-Hand Rule (F-L-R) for determining force direction on a current-carrying wire. (3 steps)", "answer": "- Step 1: Use the left hand: thumb (Force), first finger (Field N→S), middle finger (Current, conventional +→−).  \n- Step 2: Align the first finger with the external magnetic field (N→S). Point the middle finger along conventional current (not electron flow).  \n- Step 3: The thumb gives the force direction, perpendicular to both field and current.  \n+ Mnemonic: **F**orce = **F**irst finger (thumb), **F**ield = first finger, **C**urrent = second finger.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is the force direction for Problem 1 (N|S magnets, current ⊗)? Walk through the steps. (3 steps)", "answer": "- Step 1: Field direction: N→S (rightward across the gap).  \n- Step 2: Current ⊗ = into page (second finger points into page).  \n- Step 3: Thumb points DOWN. Force = downward (↓).  \n+ Cross-check: Right hand (field) × In (current) = Down (force).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is conventional current used in Fleming’s Rule, not electron flow? (2 steps)", "answer": "- Step 1: Fleming’s Rule is defined for conventional current (+→−), which is opposite to electron flow.  \n- Step 2: If electrons move left, conventional current is right. Flip the current direction before applying F-L-R.  \n+ Example: Electrons left → current right → middle finger points right.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "For Problem 9 (S|N magnets, current ⊙), what is the force direction? Justify it. (3 steps)", "answer": "- Step 1: Field direction: S|N → field points left (from N to S outside the magnet).  \n- Step 2: Current ⊙ = out of page (second finger points out).  \n- Step 3: Thumb points DOWN. Force = downward (↓).  \n+ Cross-check: Left-hand rule: Left field × Out current = Down force.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the force direction for a radial magnetic field in a loudspeaker coil? (3 steps)", "answer": "- Step 1: Field radiates outward from the center (N→S radially at every point).  \n- Step 2: At a point on the coil, field and current are tangential. Example: Field up, current right.  \n- Step 3: Thumb points OUT of the page. Force is uniform outward for all points on the coil.  \n+ Real-world application: Headphone speakers use this principle for axial vibration.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What are the three diagram conventions for magnetic fields and currents? (3 steps)", "answer": "- Step 1: Magnetic field lines run N→S outside the magnet.  \n- Step 2: Dot ⊙ = current OUT of the page (arrow tip toward you).  \n- Step 3: Cross ⊗ = current INTO page (arrow tail feathers away).  \n+ Always draw the field arrow first (N→S) before applying F-L-R.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does a wire parallel to the magnetic field experience zero force? (2 steps)", "answer": "- Step 1: The angle θ between the wire and field is 0°, so $ \\sin\\theta = 0 $.  \n- Step 2: No perpendicular component of the field acts on the current.  \n+ Formula: $ F = BIL \\sin 0° = 0 $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How does reversing both current and magnetic field affect the force direction? (2 steps)", "answer": "- Step 1: Reversing current flips the middle finger; reversing field flips the first finger.  \n- Step 2: The cross product $ \\mathbf{I} \\times \\mathbf{B} $ remains the same (two negatives cancel).  \n+ Example: DC motor uses this to maintain force direction with split-ring commutator.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the force direction for a diagonal magnet setup (field tilted at 45°)? (3 steps)", "answer": "- Step 1: Align the first finger along the actual field direction (e.g., 45° upward).  \n- Step 2: Point the middle finger along the current direction.  \n- Step 3: Thumb gives a force perpendicular to both (e.g., if field is 45° up-right and current is out, force is diagonally outward).  \n+ Fleming’s Rule works for any angle, not just cardinal directions.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the force on a wire when θ = 30°, B = 0.5 T, I = 4 A, L = 0.1 m? (2 steps)", "answer": "- Step 1: Use $ F = BIL \\sin\\theta $.  \n- Step 2: $ F = 0.5 \\times 4 \\times 0.1 \\times \\sin 30° = 0.2 \\times 0.5 = 0.1\\ \\text{N} $.  \n+ Direction: Perpendicular to both field and wire (use F-L-R).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is the force maximum when θ = 90° between wire and field? (2 steps)", "answer": "- Step 1: $ \\sin\\theta $ is maximum (1) at θ = 90°, so $ F = BIL $.  \n- Step 2: The entire field interacts perpendicularly with the current.  \n+ No component of the field is wasted along the wire.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the force direction for Problem 3 (S|N magnets, current ⊗)? (3 steps)", "answer": "- Step 1: Field direction: S|N → field points left.  \n- Step 2: Current ⊗ = into page.  \n- Step 3: Thumb points UP. Force = upward (↑).  \n+ Cross-check: Left field × In current = Up force.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define magnetic flux density B in terms of the force on a current-carrying wire. Include the formula, SI units, and the vector nature of B (3 steps).", "answer": "- Step 1: **Define the formula**. Magnetic flux density B is defined by the equation $$F = BIL$$ when the wire is perpendicular to the field. This rearranges to $$B = \\frac{F}{IL}$$, where F is force (N), I is current (A), and L is length (m).  \n- Step 2: **SI units**. The unit of B is the tesla (T), where $$1 \\, T = 1 \\, N A^{-1} m^{-1}$$.  \n- Step 3: **Vector nature**. B has direction: it points along the direction a free north pole would move. For example, Earth’s field in London is ~50 μT northward.  \n\nKey takeaway: B quantifies magnetic field strength via its force on a current, with direction and magnitude.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the formula for force on a current-carrying wire include a sinθ term (i.e., $$F = BIL \\sin\\theta$$)?", "answer": "- Step 1: **Identify the perpendicular component**. Only the component of B perpendicular to the wire produces a force.  \n- Step 2: **Decompose B**. The perpendicular component is $$B_\\perp = B \\sin\\theta$$, where θ is the angle between the wire and B.  \n- Step 3: **Derive the formula**. Substituting $$B_\\perp$$ into $$F = BIL$$ gives $$F = BIL \\sin\\theta$$.  \n+ When θ = 0° (parallel), sinθ = 0 ⇒ F = 0.  \n+ When θ = 90° (perpendicular), sinθ = 1 ⇒ F = BIL (maximum).  \n\nMisconception probe: The sinθ term isn’t arbitrary—it ensures only the field component cutting across the wire contributes to the force.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Explain each finger in Fleming’s Left-Hand Rule (F, B, I) and their mnemonic. Why must the left hand be used?", "answer": "- Step 1: **Finger assignments**.  \n  - **Thumb** = **Force** (thrust direction).  \n  - **First finger** = **Field** (B, from N to S).  \n  - **Second finger** = **Current** (conventional, + to −).  \n- Step 2: **Mnemonic**. “F, B, I” (Force, Field, Current) corresponds to thumb, first, second fingers.  \n- Step 3: **Left-hand requirement**. The left hand ensures the correct cross product direction (F ∝ I × B). Using the right hand would reverse the force direction.  \n\nMisconception probe: The right hand is reserved for generator rules or magnetic field patterns, not the motor effect.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you determine the direction of the magnetic field in a gap between two bar magnets? Why is this step critical before applying Fleming’s Rule?", "answer": "- Step 1: **Field direction rule**. Magnetic field lines always run from **N to S** outside the magnet.  \n- Step 2: **Apply to gaps**.  \n  - If the **left magnet is N and right is S**, the field points **right** (→).  \n  - If the **left is S and right is N**, the field points **left** (←).  \n- Step 3: **Importance**. The field direction is the first input to Fleming’s Rule. A reversed field arrow (e.g., S → N in the gap) would flip the force result.  \n\nExample: For S(left) | N(right) magnets, draw the field arrow left (←) before placing your hand.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Outline the 3-step method for determining the direction of the motor effect force. Apply it to a wire with current **into the page** (⊗) in a field from **N (left) → S (right)** (3 steps).", "answer": "- Step 1: **Field**. The field points right (→) (N→S). Point the first finger right.  \n- Step 2: **Current**. The current is into the page (⊗). Point the second finger into the page (away from you).  \n- Step 3: **Force**. The thumb points **down** (↓).  \n+ Visual check: Right × into-page (via right-hand cross product) gives down.\n\nMisconception probe: Always draw the field arrow first to avoid confusion. Reversing the current (⊙) would flip the force to up (↑).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you handle electron flow (e.g., electrons moving left) when applying Fleming’s Left-Hand Rule?", "answer": "- Step 1: **Identify conventional current**. Electrons move opposite to conventional current. If electrons flow left, the current is **rightward**.  \n- Step 2: **Apply Fleming’s Rule**. Use the conventional current direction (right) for the second finger.  \n- Step 3: **Avoid confusion**. Treat all current inputs as conventional flow (+ → −), not electron motion.  \n\nExample: If electrons move left, point the second finger **right**, not left.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What happens to the force on a wire when:  \n1. The current direction is reversed?  \n2. The magnetic poles are swapped (N ↔ S)?  \n3. Both current and poles are reversed?", "answer": "- Step 1: **Reversing current**. The force direction flips. For example, if the force was up (↑), reversing the current makes it down (↓).  \n- Step 2: **Swapping poles**. Reversing the field direction (N ↔ S) also flips the force.  \n- Step 3: **Both reversed**. Reversing both current and field cancels their effects: the force direction **remains unchanged**.  \n+ This underpins the DC motor’s operation: a split-ring commutator reverses current each half-turn to maintain continuous rotation.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does the motor effect force behave when the wire is parallel to the magnetic field? Why?", "answer": "- Step 1: **Angle θ = 0°**. The angle between the wire and B is 0°, so sinθ = 0.  \n- Step 2: **Force formula**. Substituting into $$F = BIL \\sin\\theta$$ gives F = 0.  \n- Step 3: **Intuition**. The magnetic field lines run *along* the wire, not cutting across it. No perpendicular component means no force.  \n\nEdge case: A wire aligned with B experiences zero motor effect force.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Describe how to apply Fleming’s Left-Hand Rule to a **radial magnetic field** (e.g., a circular coil in a loudspeaker). What is the net force direction?", "answer": "- Step 1: **Radial field structure**. Each point on the radial field points **directly outward** from the center.  \n- Step 2: **Current direction**. At any point, the current flows tangentially (e.g., up at the top, down at the bottom).  \n- Step 3: **Force at each point**. Apply Fleming’s Rule locally:  \n  - **Top point**: Field (up) × current (right) ⇒ force **out of the page**.  \n  - **Right point**: Field (right) × current (down) ⇒ force **out of the page**.  \n- Step 4: **Net effect**. All individual forces combine to push the coil **axially outward**.  \n\nBonus insight: Reversing the current inverts the force (into the page), enabling oscillation for sound production.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "For a wire carrying current **out of the page** (⊙) between S (left) and N (right) magnets, what is the direction of the force? Walk through the logic.", "answer": "- Step 1: **Field direction**. S(left) → N(right) ⇒ field points **left** (←).  \n- Step 2: **Current direction**. Out of the page (⊙).  \n- Step 3: **Apply Fleming’s Rule**.  \n  - First finger left (←), second finger out (⊙).  \n  - Thumb points **up** (↑).  \n+ Visual confirmation: Left × Out = Up (via right-hand cross product).  \n\nCommon trap: Confusing field direction when magnets are S-N (left → right) vs. N-S (right → left).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define magnetic flux density B and state its SI unit. What does 1 tesla represent in terms of the force on a wire? (3 steps)", "answer": "- Step 1: Magnetic flux density B is the strength of a magnetic field, defined through the force on a current-carrying wire.\n- Step 2: The SI unit of B is the tesla (T), where $$1 T = 1 N A^{-1} m^{-1}$$.\n+ This means: a 1 T field exerts a force of 1 N on a 1 m wire carrying 1 A of current, when the wire is perpendicular to the field.\n- Step 3: For scale, Earth's magnetic field in London is only ≈ 50 μT, while a lab U-magnet is a fraction of a tesla (thousands of times stronger).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A wire carrying 2 A of current sits perpendicularly in a magnetic field of strength 0.5 T. The wire has length 0.3 m in the field. What is the force on the wire? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field (θ = 90°), we use F = BIL (sin 90° = 1).\n- Step 2: $$F = 0.5 \\times 2 \\times 0.3 = 0.3 N$$\n\nThis is a straightforward application — the key is recognizing \"perpendicular\" means sin θ = 1.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why does the force formula include sin θ? What happens when the wire is parallel to the field versus perpendicular? (3 steps)", "answer": "- Step 1: Only the component of the magnetic field perpendicular to the wire produces a force. This perpendicular component is $$B_\\perp = B \\sin \\theta$$.\n- Step 2: When the wire is perpendicular to the field (θ = 90°), sin 90° = 1, giving maximum force F = BIL.\n+ When the wire is parallel to the field (θ = 0°), sin 0° = 0, so F = 0 — no force at all.\n- Step 3: The sin θ factor captures this: more \"across\" the wire the field is, the stronger the push. A field running along the wire has no perpendicular component to push on it.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In Fleming's left-hand rule, what do each of the three fingers represent, and why must it be the LEFT hand specifically? (2 steps)", "answer": "- Step 1: With your left hand, hold thumb and first two fingers at right angles:\n  + First finger → Field B (points N → S)\n  + seCond finger → Current I (conventional, + → −)\n  + thuMb → Motion/Force F (the thrust)\n- Step 2: It must be the LEFT hand because this is the motor effect (force on a current-carrying wire). The right hand is used for different rules (like the field-around-a-wire grip rule). Using the wrong hand flips the force direction.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Alex's mantra was \"Force, Field, Current.\" How does this map to Fleming's left-hand rule, and why is saying it out loud helpful? (2 steps)", "answer": "- Step 1: \"Force, Field, Current\" maps directly to: thuMb = Force, First finger = Field, seCond finger = Current. This ordering matches the thumb-first-second finger sequence.\n- Step 2: Saying it out loud as you set your hand prevents swapping fingers — a common error. The chant creates a motor pattern that keeps your fingers in the correct positions throughout the problem.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is conventional current, and why does Fleming's rule use it rather than electron flow direction? (2 steps)", "answer": "- Step 1: Conventional current is the direction positive charge flows (from positive terminal to negative terminal, + → −). This is the opposite direction to electron flow.\n- Step 2: Fleming's left-hand rule is derived from the force on positive charges. If a question gives electron flow direction, you must flip it to conventional current before applying the rule. For example: electrons flow left → conventional current flows right.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In a 2D diagram showing a wire end-on (bird's-eye view), what do a dot (⊙) and a cross (⊗) represent? How do you remember which is which? (2 steps)", "answer": "- Step 1: Dot ⊙ = current OUT of the page (towards you) — think of the point/tip of an arrow flying toward you. Cross ⊗ = current INTO the page (away from you) — think of the tail feathers of an arrow flying away.\n- Step 2: This is the single most common slip in the entire topic. Before every question, re-read the legend. Getting these backwards reverses your current finger and therefore reverses your final force direction.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In the gap between two bar magnets, which way does the magnetic field point? How do you determine this quickly? (2 steps)", "answer": "- Step 1: Magnetic field lines always run from North to South outside the magnet. In the gap between two magnets: if N is on the left and S on the right, the field points RIGHT (→); if S is on the left and N on the right, the field points LEFT (←).\n- Step 2: Always establish the field direction FIRST before touching your hand. Draw the field arrow across the gap. This single step removes most confusion — once the field arrow is on the page, you only need to add the current direction.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Apply the 3-step method: N pole on left, S pole on right, current is into the page (⊗). What is the force direction? (3 steps)", "answer": "- Step 1 (Field): N(left) → S(right) means B points RIGHT.\n- Step 2 (Current): ⊗ means INTO the page.\n- Step 3 (Force): First finger RIGHT (along B), second finger INTO page → thumb points DOWN.\n\nAnswer: Force is downward (↓). You can verify with the cross product: right × in = down.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Same magnets (N left, S right), but current is OUT of the page (⊙). What is the force direction now? What does this illustrate? (3 steps)", "answer": "- Step 1 (Field): Still RIGHT (N → S).\n- Step 2 (Current): ⊙ means OUT of the page.\n- Step 3 (Force): First finger RIGHT, second finger OUT → thumb points UP.\n\nAnswer: Force is upward (↑). This illustrates: **reversing the current reverses the force** — same magnets, opposite current gives opposite force direction.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "S pole on left, N pole on right, current into the page (⊗). What is the force direction? (3 steps)", "answer": "- Step 1 (Field): S(left) → N(right) means B points LEFT.\n- Step 2 (Current): ⊗ means INTO the page.\n- Step 3 (Force): First finger LEFT, second finger INTO page → thumb points UP.\n\nAnswer: Force is upward (↑). Notice: reversing the magnets (compared to Q9) also reverses the force direction.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "If you reverse BOTH the magnets and the current direction (compared to a working configuration), what happens to the force? Why is this important? (2 steps)", "answer": "- Step 1: The force stays the SAME direction. This is because you're reversing two factors in the cross product I × B — reversing both cancels out.\n- Step 2: This is exactly the principle of a DC motor: a split-ring commutator flips the current every half-turn (reversing one factor), which keeps the force driving the coil the same way round. Without this, the coil would oscillate back and forth.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A wire carries electrons to the left. The magnetic field points into the page. Using Fleming's left-hand rule, which way is the force on the wire? (3 steps)", "answer": "- Step 1: Electrons flow LEFT means conventional current flows RIGHT (+ → − is opposite).\n- Step 2: Field B = INTO the page.\n- Step 3: Current RIGHT, field INTO page → first finger IN, second finger RIGHT → thumb points UP.\n\nAnswer: Force is upward (↑). Key point: always convert electron flow to conventional current FIRST.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the \"super challenge\" with a circular coil in a radial magnetic field (N in centre, S outside), what is the direction of the force at the top point of the coil? (3 steps)", "answer": "- Step 1: At the top point, the radial field points UP (radially outward from centre). The current at the top runs left-to-right across the coil.\n- Step 2: Apply Fleming's rule: first finger UP (along field), second finger RIGHT (along current).\n- Step 3: Up × right = OUT of the page. The force at the top point is out of the page.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the same radial field problem, what is the force direction at the RIGHT side of the circular coil? How does this compare to the top point? (3 steps)", "answer": "- Step 1: At the right side, the radial field points RIGHT (radially out). The current there runs downward (around the coil).\n- Step 2: First finger RIGHT (along field), second finger DOWN (along current).\n- Step 3: Right × down = OUT of the page — the same as the top point! At EVERY point around the coil, the force comes out of the page uniformly.\n\nThis is why a speaker works: the whole coil gets pushed out/in together, punching the air to make sound.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why is the radial coil problem considered \"super challenging,\" and what's Alex's trick for solving it? (2 steps)", "answer": "- Step 1: It looks overwhelming — you have a whole circle of current in a rotating field. Most students try to reason about the whole circle at once and get lost.\n- Step 2: Alex's trick: \"Just consider one point.\" Solve that single point with Fleming's rule, then check another point. You don't need to do all of them — you realize the pattern is the same everywhere (the field and current both rotate together).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is the dot/cross convention for current direction, and why is it essential to get this correct? (2 steps)", "answer": "- Step 1: Dot (⊙) = current OUT of the page (towards you). Cross (⊗) = current INTO the page (away from you). Think: dot = point of arrow coming at you; cross = tail feathers going away.\n- Step 2: Getting this backwards is the single most common error in the entire topic. It reverses your current finger, which reverses your final force direction. Always re-check the legend before each question.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Can Fleming's left-hand rule be applied when the magnetic field is at an angle (not just horizontal/vertical)? How? (2 steps)", "answer": "- Step 1: Yes — Fleming's rule works at ANY angle. The method doesn't change: you must align your first finger with the actual field direction, whatever angle it's drawn at.\n- Step 2: On diagonal problems, some students align with \"up\" or \"right\" on the page, not with the actual tilted field. This is wrong. Your first finger must point along the field arrow, even if it's drawn diagonally. The force then comes out perpendicular to that tilted field.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A wire is placed parallel to a magnetic field (θ = 0°). Using F = BIL sin θ, what force do you calculate? Is this physically meaningful? (2 steps)", "answer": "- Step 1: F = BIL sin 0° = BIL × 0 = 0. There is zero force on the wire.\n- Step 2: This makes physical sense: if the field runs along the same direction as the wire, there's no \"across\" component pushing on the charges. Only when the field crosses the wire (perpendicular component) does a force arise.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why does the motor effect only produce a force perpendicular to both the current and the field? (2 steps)", "answer": "- Step 1: The force is given by the vector cross product F ∝ I × B. By definition, a cross product produces a vector perpendicular to both input vectors.\n- Step 2: This is why Fleming's rule gives a 3D twist — you're finding the direction that's perpendicular to both the field finger and current finger. This perpendicular force is what drives a motor rotor around.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In a loudspeaker, what physically makes the sound? (2 steps)", "answer": "- Step 1: A loudspeaker contains a coil of wire sitting in a radial magnetic field. When current flows, the whole coil is pushed uniformly (either into or out of the page).\n- Step 2: When the current alternates (AC audio signal), the coil punches in and out rapidly, pushing the air and creating sound waves. As Alex said: \"it goes in and out and makes a sound.\"", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A wire of length 0.5 m carries 3 A of current at an angle of 30° to a 0.4 T magnetic field. What is the force on the wire? (2 steps)", "answer": "- Step 1: Use F = BIL sin θ = 0.4 × 3 × 0.5 × sin 30°.\n- Step 2: sin 30° = 0.5, so F = 0.4 × 3 × 0.5 × 0.5 = 0.3 N.\n\nThis captures the key: when θ ≠ 90°, you must include sin θ to get only the perpendicular component.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What are two situations where the force on a current-carrying wire is ZERO, and why does each happen? (2 steps)", "answer": "- Step 1: When the wire is parallel to the field (θ = 0°): sin 0° = 0, so F = 0. There's no perpendicular component of field to push on the wire.\n- Step 2: When there's no current (I = 0): F = B × 0 × L = 0. No moving charges means no magnetic force.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A student says \"the force is coming out of the page\" for a grid problem. Why might this be imprecise language, and what's the better way to describe it? (2 steps)", "answer": "- Step 1: In the \"grid of 9\" bird's-eye view, the wire is end-on and the force on the page is actually UP or DOWN. Saying \"out of the page\" describes a different geometry (like the radial coil).\n- Step 2: The force is \"out of the page\" only when the current and field are both IN the page's plane (giving a force perpendicular to it). In the grid problems where everything is drawn in the plane, state the direction as up/down/left/right on the page.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What does the rearranged formula B = F/(IL) tell you about how to measure magnetic field strength in a lab? (2 steps)", "answer": "- Step 1: Place a wire of known length L perpendicularly in the field, pass a known current I through it, measure the force F on the wire.\n- Step 2: Then B = F/(IL). This is exactly how the apparatus Alex showed works: a power supply drives current through a wire between magnet poles, and you measure the force to calculate B.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What are the three most common traps/errors students make with Fleming's left-hand rule? (3 steps)", "answer": "- Step 1 (Dot/cross): Getting ⊙ and ⊗ backwards. This reverses your current finger.\n- Step 2 (Wrong hand): Using the RIGHT hand instead of LEFT. This flips the entire force direction.\n- Step 3 (Field direction): Forgetting field runs N → S, or drawing it the wrong way in the gap.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In the grid of 9 problems, what do all nine configurations have in common that lets us use F = BIL (without sin θ)? (1 step)", "answer": "**A:** In every cell of the grid, the wire is drawn perpendicular to the field (bird's-eye view shows the field going across the gap and the wire coming straight at you). This means θ = 90° for all nine, so sin 90° = 1 and F = BIL applies directly.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "If you hold your left hand correctly for Fleming's rule but your first finger isn't aligned with the actual field direction (e.g., it's tilted out of the page), what goes wrong? (2 steps)", "answer": "- Step 1: Your field finger must lie flat in the plane of the page, pointing along the actual field arrow. If it drifts out of the page or tilts, you're applying the rule to the wrong direction.\n- Step 2: Alex corrected this twice during the radial problem: \"your field finger needs to go straight up the page, North to South.\" Keeping the hand in plane is essential — the force direction depends critically on accurate finger alignment.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "How does a DC motor use the principle that reversing both current and field keeps the force direction the same? (2 steps)", "answer": "- Step 1: In a DC motor, the coil rotates. After every half-turn, the current direction would normally reverse (trying to push the coil back).\n- Step 2: The split-ring commutator flips the current every half-turn, effectively reversing one factor. This keeps the force driving the coil in the same rotational direction — continuous rotation instead of oscillation.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A student applies Fleming's rule to a wire where the current is given as \"electrons flowing upward.\" They get the wrong answer. What's likely went wrong, and how should they have done it? (2 steps)", "answer": "- Step 1: They likely used the electron flow direction directly in Fleming's rule. But Fleming's rule uses conventional current (+ → −), which is opposite to electron flow.\n- Step 2: Electrons upward means conventional current downward. They should have flipped the direction first, THEN applied the rule with the conventional current direction.", "source"
