: "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What is the physical interpretation of the formula F = BIL? How does each factor affect the force magnitude? (2 steps)", "answer": "- Step 1: F = BIL says the force is proportional to: the field strength B (stronger magnet → bigger push), the current I (more charge flow → bigger push), and the length of wire in the field L (more wire for the field to push on → bigger push).\n- Step 2: To maximize the motor effect, you want: strongest possible magnet, highest possible current, longest possible wire in the field. Miniaturized motors use strong magnets and lots of coil turns.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In the radial field \"super challenge,\" what would happen to the force direction if you reversed the current in the coil? (2 steps)", "answer": "- Step 1: Currently (with current one direction), the force at every point is OUT of the page.\n- Step 2: If you reverse the current, you reverse the I factor in I × B. This flips every individual force vector. The whole coil would then be pushed uniformly INTO the page instead. AC current alternates this continuously, creating the in-out oscillation that makes sound.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A wire sits in a uniform magnetic field. Describe what happens to the force if you triple the current, keeping everything else the same. What if you halve the field strength? (2 steps)", "answer": "- Step 1: Force is directly proportional to current (F ∝ I), so tripling the current triples the force. Double the current → double the force.\n- Step 2: Force is also directly proportional to field strength (F ∝ B), so halving the field strength halves the force. Halve B → halve F.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Alex mentioned this physics is \"what's in your headphones.\" Explain the connection between the radial coil problem and a pair of headphones. (2 steps)", "answer": "- Step 1: Headphones contain small speakers. Each speaker has a coil of wire attached to a cone, sitting in a radial magnetic field from a small magnet.\n- Step 2: When the audio signal (AC current) flows through the coil, it gets pushed in and out, vibrating the cone to create sound waves. Same physics as the \"super challenge\" — just scaled down to fit in your ear.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why can't a wire parallel to a magnetic field experience a motor effect force, even if there's a strong current through it? (2 steps)", "answer": "- Step 1: The force comes from the magnetic field pushing on moving charges. The force magnitude depends on the perpendicular component of field: F = B⟂IL, where B⟂ = B sin θ.\n- Step 2: When the wire is parallel to the field (θ = 0°), the field runs along the wire — there's NO perpendicular component. The field is \"alongside\" the charges, not pushing across them, so the magnetic force is zero.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}], "count": 35}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A wire carries current perpendicular to a uniform magnetic field. If you double the current, triple the wire length, and double the magnetic field strength, by what factor does the force change? (2 steps)", "answer": "- Step 1: Start with F = BIL (perpendicular case). If B→2B, I→2I, and L→3L, then the new force F' = (2B)(2I)(3L) = 12BIL.\n- Step 2: Since the original force is F = BIL, the ratio F'/F = 12. The force increases by a factor of 12.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why does the formula F = BIL sinθ contain the sinθ term? What does it mean physically when sinθ = 0? (2 steps)", "answer": "- Step 1: Only the component of the magnetic field perpendicular to the wire produces a force. If the wire makes angle θ with the field, the perpendicular component is B⊥ = B sinθ. This gives F = B⊥IL = BIL sinθ.\n- Step 2: When sinθ = 0 (θ = 0° or 180°), the wire is parallel to the field. There is no perpendicular component, so the force is zero. When θ = 90° (perpendicular), sin90° = 1 and force is maximum: F = BIL.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "State Fleming's Left-Hand Rule. Which finger represents which quantity, and why must it be the LEFT hand specifically? (2 steps)", "answer": "- Step 1: Hold your LEFT hand with thumb, forefinger, and middle finger all at right angles. The **First finger** points along the **Field** (N → S). The **seCond finger** points along the **Current** (conventional, + → −). The **thuMb** points in the direction of the **Motion/force** (thrust). Memory hook: \"Force, Field, Current\" maps to Thumb, First, Second.\n- Step 2: It must be the LEFT hand because this is the convention that correctly predicts the direction of the force on a current-carrying wire in a magnetic field (the motor effect). Using the RIGHT hand would give the opposite direction. The right hand is reserved for other rules (like the field around a wire).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In a 2D diagram viewed \"bird's-eye\" (end-on), what does a dot (⊙) represent, and what does a cross (⊗) represent? Give the physical picture. (2 steps)", "answer": "- Step 1: A **dot ⊙** means current flowing **OUT of the page** toward you. Think of it as the pointed tip of an arrow flying directly toward your face — you see just the point.\n- Step 2: A **cross ⊗** means current flowing **INTO the page** away from you. Think of it as the tail feathers (fletching) of an arrow flying away from you — you see the cross pattern of the feathers.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In the gap between two bar magnets, which direction does the magnetic field always point? (1 step)", "answer": "- Step 1: The field always runs from the **North pole toward the South pole** (N → S). So if the left magnet shows N and the right shows S, the field in the gap points RIGHT. If left is S and right is N, the field points LEFT. Always draw the field arrow from N toward S before applying Fleming's rule.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A wire sits between two bar magnets (N on left, S on right). The current flows INTO the page (⊗). Use the 3-step method to find the force direction. (3 steps)", "answer": "- Step 1 (Field): Left pole is N, right pole is S, so the field points from left to right (N → S). Point your first finger RIGHT.\n- Step 2 (Current): The cross ⊗ means current INTO the page. Point your second finger INTO the page (away from you).\n- Step 3 (Force): With first finger right and second finger into the page, your thumb now points DOWN. The force is downward (↓).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Same magnets (N left, S right), but now the current flows OUT of the page (⊙). What is the force direction? (2 steps)", "answer": "- Step 1: Field still points RIGHT (N → S), so first finger points right. Current is OUT (⊙), so second finger points out of the page toward you.\n- Step 2: First finger right × second finger out-of-page gives thumb UP. The force is upward (↑). Notice: reversing the current (from into to out of page) reverses the force direction.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "You reverse the magnets (S on left, N on right) and keep the current OUT of page (⊙). Now what is the force direction? (2 steps)", "answer": "- Step 1: Now the field points LEFT (from S toward N), so first finger points left. Current is still out (⊙), so second finger points out of the page.\n- Step 2: Left × out-of-page = thumb DOWN. The force is downward (↓). Compare to the previous question: reversing the magnets (reversing the field) reverses the force, even though current stayed the same.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What happens to the force if you reverse BOTH the magnetic field direction AND the current direction? Explain using the grid patterns. (2 steps)", "answer": "- Step 1: If you reverse the field AND reverse the current, the force direction stays the SAME. This is because the cross product F ∝ I × B involves two vectors — flipping both changes the sign twice, so the result doesn't change.\n- Step 2: This is the fundamental principle of a DC motor: a split-ring commutator flips the current every half-turn so the force always pushes the coil in the same rotational direction, regardless of the coil's orientation.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A wire carries electrons flowing to the left. The magnetic field points INTO the page. What is the direction of the force on the wire? (Hint: think about conventional current first.) (2 steps)", "answer": "- Step 1: Electrons flow opposite to conventional current. Electrons moving left means conventional current flows RIGHT.\n- Step 2: Now apply Fleming: Field is into the page (second finger), Current is right (first finger). Right × into-page gives force UP (thumb). So the wire experiences an upward force.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In the \"super challenge\" — a circular coil flat on top of a radial magnet (N in centre, S outside) — at the top point of the coil, the field points radially outward (upward on the diagram) and the current flows left-to-right. What is the force direction? (2 steps)", "answer": "- Step 1: At the top point, the radial field points straight up (away from the centre N). The current flows left to right. First finger UP, second finger RIGHT.\n- Step 2: Up × right = out of the page. The force at the top point points OUT of the page. (At every other point around the coil, the same relationship holds — field and current always rotate together, so the force always points out. This is how a speaker works.)", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Why does the radial coil (speaker) experience a uniform force in one direction at all points, rather than the coil being pulled apart in different directions? (2 steps)", "answer": "- Step 1: The key is that at every point on the circular coil, both the field direction and the current direction rotate by the same amount. The current flows around the circle while the radial field also rotates to always point outward.\n- Step 2: So at the top: field up × current right = out. At the right side: field right × current down = out. At every point, the perpendicular relationship produces a force pointing out of the page uniformly. The coil moves as one piece — it's pushed outward (or inward if current reverses), not torn apart.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A wire of length 0.25 m carries 2.0 A of current perpendicular to a 0.40 T magnetic field. Calculate the force on the wire. (2 steps)", "answer": "- Step 1: Use F = BIL since the wire is perpendicular to the field (θ = 90°, sinθ = 1).\n- Step 2: F = 0.40 T × 2.0 A × 0.25 m = 0.20 N. The force is 0.20 newtons in the direction given by Fleming's left-hand rule (which depends on the relative orientations, not calculated here).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "The same wire now lies PARALLEL to the same 0.40 T field. What is the force now? (2 steps)", "answer": "- Step 1: When the wire is parallel to the field, the angle θ between the wire and field is 0°. The force formula is F = BIL sinθ.\n- Step 2: sin(0°) = 0, so F = 0.40 × 2.0 × 0.25 × 0 = 0 N. There is zero force when the wire is parallel to the field — only the perpendicular component of the field contributes to the force.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A wire at 30° to a 0.50 T field carries 4.0 A current through 0.15 m of wire. Calculate the force. (2 steps)", "answer": "- Step 1: Use F = BIL sinθ = 0.50 × 4.0 × 0.15 × sin(30°).\n- Step 2: sin(30°) = 0.5, so F = 0.50 × 4.0 × 0.15 × 0.5 = 0.15 N. The force is 0.15 newtons.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the grid of 9 problems, problems 1, 6, and 8 all have the same magnet arrangement (N left, S right) and the same current direction (into page). What is the force direction for all three? Why is there no contradiction? (2 steps)", "answer": "- Step 1: All three (problems 1, 6, and 8) give force DOWN (↓). The force depends only on the relative orientations of field and current — since these are identical in all three cases, the force is identical.\n- Step 2: The visual representation may differ (different drawing angles of the wire), but the physics is the same: field right + current into page always yields force down, every time. The grid simply repeats configurations to build fluency.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why is it essential to draw the field arrow (N → S) on the diagram BEFORE applying Fleming's rule, rather than just \"imagining\" it? (1 step)", "answer": "- Step 1: Drawing the field arrow explicitly prevents the most common error: getting the field direction backwards. If you point your first finger the wrong way, your thumb (force) will be 180° wrong. Establishing \"field first, N → S\" as a habit ensures the rest of the procedure follows correctly.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A student says \"I got the dot and cross the wrong way round — I thought dot meant into page.\" What is wrong with this, and how would you remember it correctly? (2 steps)", "answer": "- Step 1: The student has it backwards. The correct convention: **dot (⊙) = OUT** (arrow tip coming toward you), **cross (⊗) = IN** (feathers going away).\n- Step 2: Memory trick: The dot looks like the point of an arrow tip coming OUT at you. The cross looks like the tail end (×) going INTO the page away from you. Re-read the legend on every diagram to avoid this slip — it's the most common error.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What would happen if you accidentally used your RIGHT hand instead of your LEFT hand when applying Fleming's rule? (1 step)", "answer": "- Step 1: You would get the force direction completely reversed (180° wrong). The right hand gives the opposite result because the cross product I × B changes sign. Always double-check it's your LEFT hand for the motor effect (force on a current-carrying wire).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In the radial magnet \"super challenge,\" Alex said \"this is what's in your headphones.\" How does this physics apply to a loudspeaker? (2 steps)", "answer": "- Step 1: A loudspeaker contains a coil of wire attached to a cone, sitting in a radial magnetic field. When alternating current flows through the coil, the force pushes the coil outward on one half-cycle and inward on the other.\n- Step 2: This oscillating force makes the cone vibrate back and forth, pushing air to create sound waves. The same physics in reverse (moving a magnet in a coil) generates current — that's how a microphone works.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "When solving problems with curved wires or unusual geometries, what single strategy did Alex emphasize, and why does it work? (2 steps)", "answer": "- Step 1: Alex's key strategy: \"Just consider one point.\" Don't try to reason about the entire curved wire at once. Pick a single point, determine the field direction at that point and the current direction at that point, then apply Fleming's rule.\n- Step 2: This works because the force is local — at any point, the force depends only on the local field direction and local current direction. Once you understand one point, you can check other points (as in the radial coil) or recognize that the answer is the same everywhere (straight wire section).", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Can the force on a current-carrying wire ever be in the same direction as the current? Can it ever be in the same direction as the magnetic field? Explain using the perpendicular nature of the force. (2 steps)", "answer": "- Step 1: No. The force is always perpendicular to BOTH the current and the field (F ∝ I × B). This is a fundamental property of the cross product.\n- Step 2: Therefore, the force can never point along the wire (same as current) and can never point along the field lines. It always comes out at right angles to both, \"out of the page\" or \"into the page\" in the 2D bird's-eye view, or up/down/left/right on the flat page depending on orientation.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A wire is drawn diagonally in a magnetic field. How should you orient your left hand when applying Fleming's rule? (1 step)", "answer": "- Step 1: Align your first finger with the actual direction of the field (the diagonal), not with \"up\" or \"down\" on the page. Your hand should match the physical geometry — if the field is tilted at an angle, your finger should be tilted at that same angle. The force will then come out at 90° to that diagonal direction.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Summarize the relationship between the motor effect and the DC motor. How does the split-ring commutator use this physics? (2 steps)", "answer": "- Step 1: In a DC motor, a current-carrying coil sits in a magnetic field and experiences a force that tries to rotate the coil. But after half a rotation, the coil is now on the opposite side — if the current kept flowing the same way, the force would now push it back the other way.\n- Step 2: The split-ring commutator reverses the current direction every half-turn, so the force always pushes the coil in the same rotational direction. This keeps the motor spinning in one direction. (Recall: reverse both field and current → force unchanged. The commutator effectively flips the current to compensate for the flipped coil orientation.)", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}], "count": 24}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What physical phenomenon is called the \"motor effect,\" and what are the three ingredients required for it to occur?", "answer": "The motor effect is the phenomenon where a current-carrying wire placed in an external magnetic field experiences a mechanical force pushing it sideways. The three ingredients are: (1) a wire carrying a current $$I$$, (2) an external magnetic field $$B$$ that the wire sits inside, and (3) a non-zero angle between the current direction and the field direction (specifically, the current must have *some* component perpendicular to the field). This is the operating principle behind every electric motor and every loudspeaker — electrical energy gets converted into mechanical motion because the field pushes on the moving charges inside the wire.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Write down the full expression for the magnitude of the force on a current-carrying wire in a magnetic field, identify every symbol with its SI unit, and state when the simpler form $$F = BIL$$ applies. (3 steps)", "answer": "- Step 1: The general expression is $$F = BIL\\sin\\theta$$, where $$\\theta$$ is the angle between the wire (current direction) and the magnetic field.\n- Step 2: Unit-by-unit: $$F$$ is force in newtons (N); $$B$$ is magnetic flux density in tesla (T), equivalent to $$\\text{N A}^{-1}\\text{m}^{-1}$$; $$I$$ is current in amperes (A); $$L$$ is the length of wire sitting inside the field in metres (m); $$\\theta$$ is dimensionless.\n- Step 3: The simpler form $$F = BIL$$ applies only when $$\\theta = 90^\\circ$$ (wire perpendicular to field), because $$\\sin 90^\\circ = 1$$. This is the maximum-force case, and it's the case in all nine grid problems Alex drilled.\n\nThe takeaway: $$F = BIL$$ is just the perpendicular special case of $$F = BIL\\sin\\theta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Conceptually, why does the factor $$\\sin\\theta$$ appear in $$F = BIL\\sin\\theta$$ — what is it physically picking out? (3 steps)", "answer": "- Step 1: Only the component of the field that is *perpendicular* to the wire can push it sideways. A field running along the wire cannot exert any sideways force on the moving charges in that wire — it's parallel to their motion.\n- Step 2: Decomposing $$B$$ relative to the wire: the perpendicular component is $$B_\\perp = B\\sin\\theta$$, and the parallel component is $$B_\\parallel = B\\cos\\theta$$.\n- Step 3: Only $$B_\\perp$$ contributes, so $$F = B_\\perp I L = BIL\\sin\\theta$$. The $$\\sin\\theta$$ is literally the geometric factor that extracts \"the useful (perpendicular) bit\" of the field.\n\nThis is why a wire lying *along* the field direction feels no force at all — the field has no perpendicular bit to push it with.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Define magnetic flux density $$B$$ operationally — i.e., how is it actually defined in terms of measurable quantities, and what does 1 tesla mean physically? (3 steps)", "answer": "- Step 1: $$B$$ is defined through the force it produces on a current-carrying wire: rearranging $$F = BIL$$ gives $$B = \\dfrac{F}{IL}$$ (for a wire perpendicular to the field).\n- Step 2: So $$B$$ is \"force per unit (current × length)\" — it tells you how hard the field pushes per amp of current per metre of wire.\n- Step 3: 1 tesla = $$1\\text{ N A}^{-1}\\text{m}^{-1}$$. Physically: a 1 T field would exert 1 N of force on every 1 metre of wire carrying 1 A perpendicular to it. That's a *huge* field — for comparison, Earth's field is only about $$50\\,\\mu\\text{T}$$, so a 1 T lab magnet is roughly 20,000× stronger.\n\nThe key idea: $$B$$ isn't just \"field strength\" in the abstract — it's defined by *what it does* to a current.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "State Fleming's left-hand rule completely: which hand, which digit points where, and what mnemonic links each digit to its quantity?", "answer": "Use the **LEFT** hand, with the thumb and first two fingers held mutually perpendicular (at right angles like a 3D axis). The First finger points along the **Field** $$B$$ (from N to S), the seCond finger points along the **Current** $$I$$ (conventional, + to −), and the thuMb points along the **Motion** (the force $$F$$). The mnemonic exploits the capitalised letters: **F**irst = **F**ield, se**C**ond = **C**urrent, thu**M**b = **M**otion. Alex's mantra was \"Force, Field, Current\" said in the order thumb-first-second. Crucially, the force is always perpendicular to both $$B$$ and $$I$$ — this is the right-angle 3D geometry of the cross product $$\\mathbf{F} \\propto \\mathbf{I} \\times \\mathbf{B}$$, which is exactly why you need a *hand* (a 3D object) to read it.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why must it be the LEFT hand specifically for the motor effect, and what goes wrong if you accidentally use the right hand? (2 steps)", "answer": "- Step 1: The force on a positive current in a field follows the cross product $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$. The handedness of this cross product matches the left hand for the (thumb, index, middle) → (F, B, I) assignment chosen historically.\n- Step 2: If you use the right hand instead, you get exactly the opposite force direction — every answer flips. Right-hand rules exist for other things (e.g., the field circling *around* a current-carrying wire, by the grip rule), but for the *force on* a current in an external field, it must be left.\n\nMemory anchor: \"Left for the motor.\"", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "What does \"conventional current\" mean, and why does this distinction matter when applying Fleming's left-hand rule to a problem stated in terms of electron flow? (3 steps)", "answer": "- Step 1: Conventional current is defined as the direction *positive* charge would flow — from + terminal to − terminal in an external circuit. This was the convention adopted before electrons were discovered.\n- Step 2: Electrons (the actual mobile charge carriers in a metal) drift in the *opposite* direction — from − to +.\n- Step 3: Fleming's left-hand rule is set up for conventional current. So if a problem says \"electrons flow to the left,\" you must flip it: the conventional current points to the *right*, and that's what your second finger follows. Skipping this flip reverses your final force direction — a classic exam trap.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What do the dot ($$\\odot$$) and cross ($$\\otimes$$) symbols represent in current/field diagrams, and what's the intuitive memory hook for each? (2 steps)", "answer": "- Step 1: The dot $$\\odot$$ represents something coming OUT of the page (towards you). Memory hook: imagine looking at the tip/point of an arrow flying directly at your face — you see the sharp point as a dot.\n- Step 2: The cross $$\\otimes$$ represents something going INTO the page (away from you). Memory hook: imagine looking at the tail feathers (the X-shaped fletching) of an arrow flying away from you.\n\nCritical: Alex caught you once mid-lesson saying a dot was \"into the page\" — getting these swapped is *the* most common direction error and reverses every force you derive.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Given two bar magnets with N on the left and S on the right, which way does the magnetic field point in the gap between them, and why?", "answer": "The field points to the **right**, from the N pole towards the S pole. The rule is that magnetic field lines always emerge from the N pole and terminate at the S pole (outside the magnet). In the gap between two facing poles, this means the field arrow runs from the N face to the S face. So \"N on left, S on right\" gives a rightward field; \"S on left, N on right\" gives a leftward field. Alex's lesson reflex: *always draw the field arrow on the diagram first* before reaching for your hand — once that arrow is on the page, the rest is mechanical.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Walk through the 3-step procedure Alex used to solve every \"grid of 9\" force-direction problem. (3 steps)", "answer": "- Step 1: **Field.** Read the magnet poles, then draw the field arrow across the gap from N to S. Point your First finger along this arrow.\n- Step 2: **Current.** Identify the current symbol on the wire — dot $$\\odot$$ means out of the page, cross $$\\otimes$$ means into the page. Point your seCond finger along this direction.\n- Step 3: **Force.** With your left hand now locked into position (first finger on field, second finger on current, all at right angles), read off where your thuMb points — that's the force direction (up, down, left, or right on the page).\n\nThe mantra \"field first, then current, then read the thumb\" removes nearly all confusion.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "A wire is viewed end-on in a \"bird's-eye view\" diagram, with N pole on the left and S pole on the right of the wire, and the wire carries current INTO the page. Which way is the force?", "answer": "Field points right (N → S). Current is into the page. Applying Fleming's left hand: first finger to the right, second finger into the page, and the thumb naturally drops downward. Force is **DOWN ↓**. Cross-product check using $$\\hat{x}$$ = right, $$\\hat{y}$$ = up, $$\\hat{z}$$ = out of page: $$\\mathbf{I} \\times \\mathbf{B} = (-\\hat{z}) \\times \\hat{x} = -\\hat{y}$$, confirming the force points in the $$-\\hat{y}$$ direction (down). ✓", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Bird's-eye view: N pole on the left, S pole on the right of a wire that carries current OUT of the page. Which way does the wire get pushed?", "answer": "Field points right (N → S). Current is out of the page. With Fleming's left hand: first finger right, second finger out of the page, thumb points UP. Force is **UP ↑**. Cross-product check: $$\\hat{z} \\times \\hat{x} = \\hat{y}$$ — pointing up. ✓ Notice this is the same magnet configuration as a current-into-page wire but with reversed current, and the force has correspondingly reversed (down → up). This is the core principle of how reversing current reverses motor force.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Bird's-eye view: S pole on the left, N pole on the right of a wire carrying current INTO the page. Force direction?", "answer": "Field points left (because N is on the right, so N → S means right → left). Current is into the page. Left hand: first finger left, second finger into the page, thumb points UP. Force is **UP ↑**. Cross-product check: $$(-\\hat{z}) \\times (-\\hat{x}) = \\hat{z} \\times \\hat{x} = \\hat{y}$$ — up. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Bird's-eye view: S pole on the left, N pole on the right of a wire carrying current OUT of the page. Force direction?", "answer": "Field points left. Current is out of the page. Fleming's left hand: first finger left, second finger out of page, thumb points DOWN. Force is **DOWN ↓**. Cross-product check: $$\\hat{z} \\times (-\\hat{x}) = -\\hat{y}$$ — down. ✓ Compare this with the same magnet arrangement but current-into-page (which gave up): reversing the current reverses the force.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "In a magnet/wire diagram, what are the two independent \"reversal symmetries,\" and what happens if you reverse both at once? (3 steps)", "answer": "- Step 1: **Reverse the current** (dot ↔ cross) ⇒ the force direction flips (e.g. down → up). This is because the second finger flips, dragging the thumb with it.\n- Step 2: **Reverse the magnets** (swap N and S) ⇒ the force also flips, because the field arrow now points the other way, flipping the first finger.\n- Step 3: **Reverse both at once** ⇒ the force is unchanged. The two flips cancel.\n\nThis isn't just a curiosity — it's the entire operating principle of a DC motor. A split-ring commutator flips the current direction every half-rotation so that, even though the coil rotates (effectively flipping its orientation relative to the magnets), the force keeps driving the coil round the same way.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why is a split-ring commutator essential in a simple DC motor, in terms of the symmetries of $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$? (3 steps)", "answer": "- Step 1: As the coil rotates inside the magnetic field, after half a turn the side of the coil that was on the left is now on the right — its position relative to the fixed magnets has reversed.\n- Step 2: If the current direction stayed the same in absolute terms, the force on that wire segment would now push it the *wrong* way (back to where it came from), and the coil would just oscillate, not spin.\n- Step 3: The split-ring commutator reverses the current in the coil every half-turn at exactly the right moment. This second reversal cancels the orientation reversal, so the force continues to drive the rotation in the same direction. It's the \"reverse both ⇒ no change\" symmetry exploited deliberately.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "In a loudspeaker (radial-field coil arrangement), the magnet has N at the centre and S all around the outside. A circular coil carries a circulating current. Why does the entire coil experience a single uniform force out of (or into) the page, even though different parts of the coil have current pointing in different directions? (3 steps)", "answer": "- Step 1: At every point on the coil, the field points *radially outward* (from the central N pole to the outer S ring). At the top of the coil, the field is up; at the right of the coil, the field is right; at every other point, it points outward along the radius.\n- Step 2: At every point on the coil, the current is tangent to the circle. At the top, it might flow rightward; at the right side, downward; at the bottom, leftward; at the left, upward — all consistent with circulating around the loop.\n- Step 3: At each point, the field and current are perpendicular to each other but both rotate by the same angle as you walk around the coil. Applying Fleming's left hand at any single point gives a force pointing the same way — out of the page everywhere. So all force contributions add up axially, pushing the whole coil out of the page as one rigid piston.\n\nReverse the current and the whole coil is pushed *into* the page. Drive it with AC and the coil oscillates in and out — that motion pushes air, creating sound. This is literally how the speaker in your headphones works.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "In the loudspeaker geometry, why does Alex insist on \"just consider one point\" when applying Fleming's rule, rather than trying to reason about the whole circular coil at once? (2 steps)", "answer": "- Step 1: A circular current loop has the current direction changing continuously as you walk around it — there's no single \"current direction\" for the whole loop. So Fleming's rule, which needs a single direction for the second finger, can't be applied to the whole loop in one go.\n- Step 2: But Fleming's rule applies locally at *any single point* on the loop, where the current does have a definite direction. You pick one point (say, the top), solve it with the rule, get one force direction, then check a second point to confirm the pattern. By symmetry, if every point gives the same axial force direction, you know the whole loop is pushed that way.\n\nThe general lesson: when a geometry looks complicated, *localise* — solve at one point, then use symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "If a magnet/wire diagram is drawn with the magnets tilted diagonally (Alex's \"3D-looking\" attempt), how does this change the application of Fleming's left-hand rule? (2 steps)", "answer": "- Step 1: The rule itself does not change at all. The first finger must always align with the actual field direction — which is still N → S, just along a tilted line instead of horizontal/vertical.\n- Step 2: You physically rotate your left hand so the first finger lies along the tilted field axis; the second finger still goes along the current direction (e.g. out of the page for a dot); your thumb then points in a tilted/diagonal direction giving the force.\n\nThe general principle: Fleming's rule works at any orientation in 3D space. Don't lock your hand to \"up/down/left/right\" — lock the first finger to the *real* field direction in the problem.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A 5 A current flows through a 20 cm length of wire sitting perpendicular to a 0.3 T magnetic field. Without computing exactly, roughly how big is the force, and would doubling the field have a bigger or smaller effect than doubling the current? (3 steps)", "answer": "- Step 1: Use $$F = BIL$$ (perpendicular case). Order-of-magnitude estimate: $$B \\sim 0.3$$, $$I = 5$$, $$L = 0.2$$, product is roughly $$0.3 \\times 5 \\times 0.2 = 0.3$$ N.\n- Step 2: Doubling $$B$$ doubles $$F$$ (linear in $$B$$); doubling $$I$$ also doubles $$F$$ (linear in $$I$$). They have *equal* effect — the formula is symmetric in $$B$$ and $$I$$.\n- Step 3: So the force grows linearly in any of the three factors $$B$$, $$I$$, $$L$$. To make the wire push 10× harder, you can use a 10× stronger magnet, a 10× larger current, a 10× longer wire, or any combination whose product multiplies by 10.\n\nThis is why real motors use many turns of wire (effectively a much larger $$L$$), and strong permanent magnets (large $$B$$) to maximise force without burning huge currents.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "A wire carries current parallel to a magnetic field. What is the force on the wire, and why does this make physical sense?", "answer": "The force is exactly zero. Applying $$F = BIL\\sin\\theta$$ with $$\\theta = 0^\\circ$$ gives $$\\sin 0^\\circ = 0$$, so $$F = 0$$. Physically, the field has no component perpendicular to the wire — every field line runs *along* the wire's direction, so there's nothing to push the moving charges sideways. The moving charges in the wire experience no Lorentz force component perpendicular to their motion when the field is parallel to that motion. This is the limiting case that bookends the $$\\sin\\theta$$ dependence: $$\\theta = 0$$ gives zero force, $$\\theta = 90^\\circ$$ gives maximum force.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A wire carries 4 A through 0.1 m of field at 30° to a 0.5 T field. Conceptually describe how to find the force without doing the multiplication digit-by-digit. (3 steps)", "answer": "- Step 1: Use $$F = BIL\\sin\\theta$$. Recognise $$\\sin 30^\\circ = 1/2$$, a clean fraction that simplifies the calculation.\n- Step 2: Compute the perpendicular-case force first: $$BIL = 0.5 \\times 4 \\times 0.1 = 0.2$$ N. This is what the force would be if the wire were perpendicular to the field.\n- Step 3: Then multiply by $$\\sin 30^\\circ = 0.5$$ to account for the actual tilt: $$F = 0.2 \\times 0.5 = 0.1$$ N.\n\nIntuition: at 30° the wire only has \"half-efficiency\" capturing the field, so it gets half the force of the perpendicular case.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why is the force on a current-carrying wire always perpendicular to *both* the field and the current, and what mathematical object captures this geometric structure? (3 steps)", "answer": "- Step 1: The underlying physics is the Lorentz force on individual moving charges: $$\\mathbf{F} = q\\mathbf{v} \\times \\mathbf{B}$$. The cross product, by definition, produces a vector perpendicular to both inputs.\n- Step 2: Summing over all the moving charges in a wire of length $$L$$ carrying current $$I$$, this becomes $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$ — same cross-product structure, just at the macro level.\n- Step 3: Geometrically, two non-parallel vectors define a plane; the cross product points *out* of that plane, perpendicular to both. So the force can only ever point in the one direction perpendicular to the field-current plane. That's why a hand (a 3D object with three mutually perpendicular axes — thumb, index, middle) is exactly the right tool to read off the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "A horseshoe (U-shaped) magnet has a wire suspended between its poles. List four independent ways to increase the force on the wire. (4 steps)", "answer": "- Step 1: **Use a stronger magnet** (increase $$B$$). Force scales linearly with field strength — replace a weak ferrite magnet with a neodymium one and the force can grow 10× or more.\n- Step 2: **Increase the current** (increase $$I$$). Force scales linearly with current. Driven by a higher-voltage supply or lower-resistance circuit.\n- Step 3: **Use a longer wire in the field** (increase $$L$$). Only the length actually *inside* the field region counts — extending the wire outside the gap doesn't help.\n- Step 4: **Adjust the orientation** to make the wire perpendicular to the field ($$\\theta = 90^\\circ$$). If the wire is already perpendicular, this is maximised; if tilted, straightening it can dramatically increase the force.\n\nAll four follow directly from $$F = BIL\\sin\\theta$$ — each factor is a tunable knob.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Why does Earth's magnetic field ($$\\sim 50\\,\\mu\\text{T}$$) not noticeably push the wires inside your appliances around, even though the same wires can be strongly pushed by a small lab magnet? (3 steps)", "answer": "- Step 1: The force scales linearly with $$B$$. Earth's field is $$\\sim 5 \\times 10^{-5}$$ T; a lab U-magnet is on the order of $$10^{-1}$$ T — roughly 2000× stronger.\n- Step 2: For a typical household wire carrying a few amps over a metre, Earth's field would produce a force on the order of $$F \\sim (5\\times 10^{-5})(5)(1) \\sim 2.5 \\times 10^{-4}$$ N — about a quarter of a millinewton, far too small to feel or see.\n- Step 3: The same wire near a lab magnet feels a force thousands of times larger — easily a fraction of a newton, enough to make the wire visibly jump. The physics is identical; only the magnitude of $$B$$ differs by orders of magnitude.\n\nThis is why motor and speaker design demands strong, localised fields — the motor effect is real at all scales but only *useful* with strong $$B$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "When solving a force-direction problem, why does Alex insist on drawing the field arrow on the diagram *before* reaching for your hand? (2 steps)", "answer": "- Step 1: The field direction is a physical fact about the diagram, independent of you — it's set by the magnet orientation (N → S always). By committing it to paper first, you remove one degree of freedom from the problem and prevent your hand from drifting in mid-derivation.\n- Step 2: With the field arrow drawn, you only have two things left to align (current and then thumb), which is the bare minimum your hand has to handle. If you try to keep the field direction \"in your head\" while also positioning current and reading off thumb, the hand often tilts the first finger to whatever's convenient, giving a wrong answer.\n\nPractical reflex: pencil the field arrow in the gap on every diagram before the hand goes up.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "A student applies Fleming's left-hand rule but gets the force opposite to the textbook answer. What are the five most likely sources of error to check? (5 steps)", "answer": "- Step 1: **Hand used.** Did you use the right hand instead of the left? Left hand for motor effect — always.\n- Step 2: **Dot/cross interpretation.** Did you confuse $$\\odot$$ (out) with $$\\otimes$$ (in)? This was Alex's most-flagged trap.\n- Step 3: **Field direction.** Did you draw the field N→S, or accidentally S→N? Reverse field reverses force.\n- Step 4: **Conventional vs electron current.** If the problem stated electron flow, did you flip it to get conventional current before pointing the second finger?\n- Step 5: **Angle factor.** If the wire wasn't perpendicular, did you include $$\\sin\\theta$$? (This affects magnitude, but if $$\\theta = 0$$ it makes the force zero — sometimes mistaken for a \"wrong direction.\")\n\nAny one of (1)–(4) reverses the answer. Always re-check these in order before re-doing the geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Conceptually, why does an AC (alternating current) signal driven through a loudspeaker coil produce *sound*, while a DC signal would just push the coil to one side and hold it there? (3 steps)", "answer": "- Step 1: With DC, the current direction is constant, so by Fleming's rule the force on the coil is constant and points one fixed way (e.g. out of the page). The coil shifts to a new equilibrium position and stays there — no oscillation, no sound.\n- Step 2: With AC, the current reverses direction many times per second (e.g. at audio frequencies, hundreds to thousands of times per second). Each reversal reverses the force direction (by the \"reverse current ⇒ reverse force\" symmetry).\n- Step 3: So the coil oscillates back and forth at the AC frequency. It's attached to a diaphragm that pushes air, and these rapid air-pressure oscillations are what your ear interprets as sound. A 1000 Hz AC current ⇒ coil oscillates at 1000 Hz ⇒ you hear a 1000 Hz tone.\n\nThe audio waveform is literally encoded as the time-varying current, and the motor effect converts it directly into mechanical air motion.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "A wire lies flat in the plane of the page running left-right, with current flowing rightward. A magnetic field points directly INTO the page. Which way does the wire get pushed?", "answer": "Apply Fleming's left hand: first finger into the page (along the field), second finger to the right (along the current). With your hand in this orientation, the thumb points **upward** in the plane of the page. So the wire is pushed up. Cross-product check using $$\\hat{x}$$ = right, $$\\hat{y}$$ = up, $$\\hat{z}$$ = out of page: $$\\mathbf{I} \\times \\mathbf{B} = \\hat{x} \\times (-\\hat{z}) = \\hat{y}$$, confirming the force points up. ✓ The pattern: current and field both in the page (one along, one perpendicular to the page) gives a force *in* the page perpendicular to the current.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Electrons flow to the LEFT along a wire; the magnetic field points INTO the page. Which way is the force on the wire? (3 steps)", "answer": "- Step 1: **Translate to conventional current.** Electrons flow left ⇒ conventional current flows RIGHT (opposite to electron flow).\n- Step 2: **Apply Fleming's left hand.** First finger into the page (along field $$B$$); second finger to the right (along conventional current $$I$$).\n- Step 3: **Read the thumb.** It points UP. So the force on the wire is **UP ↑**.\n\nCritical step was the first one: had you skipped the electron→conventional flip, you'd point the second finger left, giving a force pointing down — exactly the wrong answer. This is precisely the conventional-vs-electron trap.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Two parallel wires carry currents in the *same* direction, separated by some distance. Qualitatively, do they attract or repel, and how can you see this from Fleming's left-hand rule applied to one wire in the field produced by the other? (3 steps)", "answer": "- Step 1: Each wire produces its own circular magnetic field (by the right-hand grip rule). At the location of wire 2, the field from wire 1 points perpendicular to the line joining them — specifically, if both currents flow into the page, the field at wire 2 from wire 1 circles around wire 1, and at wire 2's position points *transverse* to the wire-wire line.\n- Step 2: Apply Fleming's left hand to wire 2: its current direction × the field from wire 1 gives the force on wire 2. Working out the geometry, this force points *towards* wire 1.\n- Step 3: By symmetry, wire 1 is pulled towards wire 2 too. So parallel currents in the same direction **attract**. (Antiparallel currents repel — flip one current, and the force flips.)\n\nThis is the basis of the original SI definition of the ampere — defined via the force between two parallel current-carrying wires.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "What does the bird's-eye-view convention in the grid-of-9 problems mean, and why does it matter for how you state the answer direction?", "answer": "\"Bird's-eye view\" means you're looking *down* on the wire from above — so the wire is oriented perpendicular to the page, going into or out of it, shown only as a single point (dot or cross). The two bar magnets sit on either side, drawn as rectangles in the plane of the page. This matters because the force on the wire lies *in the plane of the page* (up/down/left/right relative to the diagram), not into or out of it. So when you read the force off your thumb, you state it as \"up\", \"down\", \"left\", or \"right\" — not as \"out of the page\" or \"into the page.\" Alex flagged this when you slipped on grid problems 7–9, saying \"coming out of the page\" when the force was actually directional in the plane. The only configuration where the force comes out of the page is when the *current* is in the plane of the page and the field is also in the plane (different geometry — like the loudspeaker problem).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Compare $$F = BIL\\sin\\theta$$ (force on a current) and $$F = Bqv\\sin\\theta$$ (force on a moving charge): how are they related, and why do they look so similar? (3 steps)", "answer": "- Step 1: A current is just a stream of moving charges. If $$n$$ charges of charge $$q$$ each move with drift velocity $$v$$ through a wire of cross-section $$A$$ and length $$L$$, the total charge in the wire is $$nALq$$, and the time to traverse is $$L/v$$, so the current is $$I = nAqv$$.\n- Step 2: The force on one charge is $$F_1 = Bqv\\sin\\theta$$. The total force on all $$nAL$$ charges in the wire is $$F = nAL \\cdot Bqv\\sin\\theta = B(nAqv)L\\sin\\theta = BIL\\sin\\theta$$.\n- Step 3: So $$F = BIL\\sin\\theta$$ is literally the sum of $$F = Bqv\\sin\\theta$$ over all moving charges in a wire — they're the same physics at different scales. Both use Fleming's left-hand rule for direction (for positive charges; flip for electrons).\n\nThis is why both formulas have the same $$B$$, the same $$\\sin\\theta$$, and obey the same direction rule.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "If you place a current-carrying wire in a uniform magnetic field but along the *axis* parallel to the field, then slowly rotate it through 90°, how does the force change as a function of angle? (3 steps)", "answer": "- Step 1: At $$\\theta = 0^\\circ$$ (wire parallel to field), $$\\sin\\theta = 0$$, so $$F = 0$$. No force.\n- Step 2: As you rotate, $$\\sin\\theta$$ grows. At $$\\theta = 30^\\circ$$, force is half the maximum. At $$\\theta = 45^\\circ$$, force is about 71% of maximum ($$\\sin 45^\\circ \\approx 0.71$$). At $$\\theta = 60^\\circ$$, about 87%.\n- Step 3: At $$\\theta = 90^\\circ$$ (perpendicular), $$\\sin\\theta = 1$$, force reaches maximum $$F_{\\max} = BIL$$.\n\nThe growth isn't linear — it's sinusoidal. Force grows fast at first (the derivative of $$\\sin\\theta$$ is largest near 0) and then slowly tapers as you approach 90°.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does the force on a wire NOT depend on whether the wire is thick or thin, or on the material of the wire, as long as the current is the same?", "answer": "The formula $$F = BIL\\sin\\theta$$ contains no parameter for wire thickness, cross-sectional area, or material — only the *total current* $$I$$ matters. Physically, the force comes from the magnetic field pushing on each moving charge, and the *total* push depends on the *total* charge flowing per second (which is exactly the current), not on how those charges are distributed across the wire's cross-section. A thick copper wire and a thin tungsten wire carrying the same 5 A in the same field experience the same force, even though the thick one has many more, more slowly moving charges, and the thin one has fewer, faster ones. The product $$nAv$$ (charge density × area × drift velocity) is what equals $$I/q$$, and only that combination matters for the force.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A square coil with $$N$$ turns sits between two magnet poles with two of its sides (say, top and bottom) inside the field. Why does the force on each side cause a *torque* (a turning effect) rather than just translating the coil sideways? (3 steps)", "answer": "- Step 1: The two sides inside the field carry current in *opposite directions* (because the current goes round the loop — what enters the top side from one end exits from the other, and the bottom side carries current the opposite way).\n- Step 2: By Fleming's left-hand rule applied to each side: the top side gets pushed one way (say, up), and the bottom side gets pushed the *opposite* way (down) — because reversing the current reverses the force, and the field is the same on both sides.\n- Step 3: Equal and opposite forces on the two sides, applied at different positions (top vs bottom of the coil), don't translate the coil — they rotate it. This is a *couple* (a pure torque), and it spins the coil about its central axis.\n\nThis is the operating principle of every electric motor: the magnetic forces on opposite sides of a current loop are arranged to produce rotation, not translation.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "In a real lab demonstration (the bench setup Alex showed), a power supply drives current through a wire sitting between the poles of a U-magnet. If you wanted to use this setup to measure $$B$$, what would you do, and what equation would you use? (3 steps)", "answer": "- Step 1: Rearrange the motor-effect equation: from $$F = BIL$$ (with the wire perpendicular to the field), solve for $$B = \\dfrac{F}{IL}$$.\n- Step 2: Measure the three known quantities: set the current $$I$$ to a known value using the power supply (ammeter readout); measure the length $$L$$ of wire actually inside the field gap with a ruler; measure the force $$F$$ — typically by mounting the magnet on a top-pan balance and reading the change in apparent weight when the current is turned on.\n- Step 3: Compute $$B = F / (IL)$$. Typical values: $$F \\sim 10^{-3}$$ N, $$I = 5$$ A, $$L = 0.05$$ m gives $$B \\sim 4 \\times 10^{-3}$$ T — a few mT, which is realistic for a lab U-magnet's gap field.\n\nThe clever bit: Newton's third law means the force on the wire is matched by an equal and opposite force on the *magnet*, so weighing the magnet gives you direct access to the wire's force.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Sketch how the magnetic field around a straight current-carrying wire looks, and explain how this combines with an external field to produce the motor effect. (3 steps)", "answer": "- Step 1: A current-carrying wire produces its own magnetic field that *circles* the wire — closed concentric loops perpendicular to the wire. The direction follows the right-hand grip rule: point your right thumb along the conventional current, and your fingers curl in the direction of the circular field.\n- Step 2: When this current-carrying wire is placed in an *external* uniform field, the two fields superpose (add as vectors). On one side of the wire, the wire's circular field reinforces the external field (lines bunch up, dense field); on the other side, they oppose (lines spread out, sparse field).\n- Step 3: This asymmetric \"catapult\" or \"squeezed\" field pattern pushes the wire from the strong (compressed) side towards the weak (rarefied) side — and that push is the motor-effect force. Fleming's left-hand rule is the shortcut that gives this direction without having to draw the combined field every time.\n\nSo the motor effect isn't magic — it's the wire being squeezed sideways by an asymmetric superposed field.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "A common misconception: a student says \"since the field points right and the current is into the page, the wire is pushed to the right because the field 'carries' it along.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: The force on a current-carrying wire is *not* in the direction of the field. The wire isn't \"carried along\" by the field like a leaf in a river.\n- Step 2: By Fleming's left-hand rule (and the underlying cross product $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$), the force is *perpendicular* to both the field and the current — never along either of them.\n- Step 3: For field right and current into the page, Fleming gives force *down* (not right). The intuition \"field pushes wire along the field\" is completely wrong; the correct intuition is \"field and current together produce a sideways perpendicular push.\"\n\nThe cross-product structure of the force is what makes electromagnetism *non-obvious* — it took centuries to figure out, and you must trust the rule rather than naive \"pushing\" intuition.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "In an exam, are you allowed to physically hold your left hand in position with your fingers extended to apply Fleming's rule, or does this look unprofessional? (2 steps)", "answer": "- Step 1: Yes, you are absolutely allowed and expected to do this. Alex confirmed it directly when asked: \"Yeah.\" Fleming's left-hand rule is a *technique* explicitly taught in the syllabus — using your hand is the standard, accepted way to apply it.\n- Step 2: Alex's joke was that in any exam room you'll see many students doing the gesture — it's universal. Don't be shy or self-conscious. The only thing to be careful about is making sure the hand is genuinely in the right orientation: first finger truly along the field (in the plane of the page if the field is in the page), fingers at proper right angles to each other.\n\nThe \"professional\" thing is to get the right answer, not to look stoic.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Synthesis question: a wire 0.5 m long carries 2 A and lies at 90° to a uniform 0.4 T field. The current is then redirected so it flows the opposite way along the same wire, while the wire is simultaneously tilted to be at 30° to the field. Describe qualitatively how the force changes in *magnitude and direction*. (3 steps)", "answer": "- Step 1: **Initial situation.** $$F = BIL\\sin 90^\\circ = 0.4 \\times 2 \\times 0.5 \\times 1 = 0.4$$ N, in a direction set by Fleming's rule (say, upward).\n- Step 2: **Direction change.** Reversing the current flips the force direction by 180°. So whatever direction it pointed before (e.g. up), it now points opposite (down). Tilting the wire to 30° changes the *magnitude* of the perpendicular component but doesn't independently flip the direction.\n- Step 3: **Magnitude change.** New force: $$F' = BIL\\sin 30^\\circ = 0.4 \\times 2 \\times 0.5 \\times 0.5 = 0.2$$ N. So the force has halved in magnitude *and* reversed in direction.\n\nCombined effect: from 0.4 N up to 0.2 N down — a complete inversion plus a halving.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why does the same physics (motor effect) underlie both a DC motor and a loudspeaker, even though they look so different mechanically? (3 steps)", "answer": "- Step 1: Both devices use the same core equation $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$ — a current-carrying coil sitting in a magnetic field experiences a force.\n- Step 2: The difference is in the *geometry* and the *current type*. A DC motor uses a coil in a uniform field with a commutator switching the current every half-turn — converts steady DC into continuous rotation. A loudspeaker uses a coil in a *radial* field with AC current — converts oscillating AC into back-and-forth linear motion of a diaphragm.\n- Step 3: In both cases, the magnetic force on the current does mechanical work. The same Fleming-left-hand-rule logic determines direction; the same $$F = BIL$$ logic determines magnitude. Different mechanical arrangements give rotation vs. linear oscillation, but the physics is identical.\n\nThis is why understanding the motor effect deeply unlocks a huge range of real-world devices, not just one.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Quick recall: state the three columns of the Fleming's left-hand rule table (digit ↔ quantity ↔ memory hook).", "answer": "The three rows of the table are: (1) **First finger** points along the **Field** $$B$$ (N → S) — memory: \"**F**irst = **F**ield\"; (2) **se**C**ond finger** points along the **Current** $$I$$ (conventional, + → −) — memory: \"se**C**ond = **C**urrent\"; (3) **thuMb** points along the **Motion**/force $$F$$ — memory: \"thu**M**b = **M**otion.\" The capitalised letter in each digit's name matches the first letter of the quantity it represents. Alex's chant condenses it: \"Force, Field, Current\" = thumb, first, second.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "If a wire carries no current at all but sits in a strong magnetic field, what force does it experience, and why?", "answer": "Zero. The motor-effect equation $$F = BIL\\sin\\theta$$ has $$I = 0$$, so $$F = 0$$ regardless of how strong the field is or how the wire is oriented. Physically, the magnetic force acts only on *moving* charges; if no current flows, no net charge motion exists, and there's nothing for the field to push on. (Strictly, there are still random thermal motions of individual electrons, but they cancel out on average — no net force.) The wire only feels a force when current flows. This is the basic asymmetry: a magnet feels nothing from a static wire, but the moment you switch the current on, both feel a sudden force (by Newton's third law, the force on the wire is matched by an equal and opposite force on the magnet).", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "A wire is partially inside a magnetic field region (only part of its length $$L$$ sits in the field; the rest sticks out into field-free space). Which length matters in $$F = BIL$$, and why? (2 steps)", "answer": "- Step 1: Only the length actually *inside the field region* contributes to the force. The portion of wire outside the field experiences no magnetic force (because $$B = 0$$ there, regardless of how much current flows).\n- Step 2: So if the wire is 30 cm long total but only 10 cm of it lies within the field, use $$L = 0.10$$ m in $$F = BIL$$. The \"extra\" wire outside is just for connection — it doesn't add force.\n\nThis is a subtle but common trap in exam questions: the diagram might show a long wire, but the answer depends only on the length *inside the field gap*. Always identify what fraction of the wire is genuinely in the field before plugging in.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What physical phenomenon is being described when a current-carrying wire placed in a magnetic field experiences a push, and what is the name given to this effect?", "answer": "This is called the **motor effect**. When a wire carrying current sits inside an external magnetic field, the field exerts a force on the wire, pushing it sideways. The reason this happens conceptually: the moving charges (the current) each feel a magnetic force, and collectively those forces add up to a macroscopic push on the wire itself. It's called the \"motor effect\" because this is the exact principle that makes electric motors spin — a current in a magnetic field gets pushed, and if the wire is part of a coil that can rotate, the push becomes rotation.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "State the formula for the force on a current-carrying conductor in a magnetic field, including the angle dependence, and identify every symbol with its SI unit. (3 steps)", "answer": "- Step 1: The full formula is $$F = BIL\\sin\\theta$$, where $$\\theta$$ is the angle between the wire (direction of current) and the magnetic field $$B$$.\n- Step 2: The symbols and units are:\n+ $$F$$ = force on the wire, in newtons (N)\n+ $$B$$ = magnetic flux density, in tesla (T)\n+ $$I$$ = current, in amperes (A)\n+ $$L$$ = length of wire inside the field, in metres (m)\n+ $$\\theta$$ = angle between current direction and field direction\n- Step 3: When the wire is perpendicular to the field, $$\\sin\\theta = 1$$ and the formula reduces to $$F = BIL$$, which is the maximum possible force for given $$B$$, $$I$$, $$L$$.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does the force on a current-carrying wire depend on $$\\sin\\theta$$ rather than the full field $$B$$? Explain the geometric intuition. (3 steps)", "answer": "- Step 1: A magnetic field only exerts a force on a current via the component of the field that is **perpendicular** to the wire. Any component running along (parallel to) the wire produces no force.\n- Step 2: Decompose $$B$$ into two pieces relative to the wire:\n+ Perpendicular component: $$B_\\perp = B\\sin\\theta$$ — this is the part that does work in producing force.\n+ Parallel component: $$B_\\parallel = B\\cos\\theta$$ — this part does nothing.\n- Step 3: The force is then $$F = B_\\perp I L = BIL\\sin\\theta$$. So the $$\\sin\\theta$$ factor isn't arbitrary — it's literally projecting out the useful (perpendicular) part of the field.\n\nTakeaway: only the field \"across\" the wire counts; a field running along the wire is invisible to it.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What is the magnitude of the force on a wire that is aligned **parallel** to the magnetic field, and why?", "answer": "The force is **zero**. Conceptually, only the perpendicular component of the field produces a force on the current, and when the wire is parallel to $$B$$, that perpendicular component is zero ($$\\sin 0° = 0$$). Another way to see it: the magnetic force on a moving charge is $$qv \\times B$$ — a cross product — which vanishes when $$v$$ (the drift direction of charges, i.e. the current) is parallel to $$B$$. So a wire lying along the field lines feels nothing at all.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Define magnetic flux density $$B$$ operationally (i.e. through the force it produces), and state its SI unit broken down into base units. (3 steps)", "answer": "- Step 1: Magnetic flux density $$B$$ is defined through the force on a perpendicular current-carrying wire: $$B = \\dfrac{F}{IL}$$.\n- Step 2: This says: $$B$$ is the force per unit current per unit length of wire (when the wire is perpendicular to the field). It tells you how \"strong\" the field is at pushing currents around.\n- Step 3: The SI unit is the **tesla (T)**, which in base units is $$1\\,\\text{T} = 1\\,\\text{N A}^{-1}\\,\\text{m}^{-1}$$ — i.e. newtons per (amp · metre).\n\nConceptual note: defining $$B$$ this way is operational — you don't say what $$B$$ \"is\" abstractly; you say how to measure it via the force it exerts.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "How does the Earth's magnetic field compare in strength to a typical lab U-magnet, and roughly by what factor? Why does this matter for experiments?", "answer": "The Earth's field in a place like London is roughly $$50\\,\\mu\\text{T}$$ (i.e. $$5 \\times 10^{-5}\\,\\text{T}$$), whereas a lab U-magnet has a field of order a fraction of a tesla, say $$0.1$$–$$1\\,\\text{T}$$. That's about **a few thousand to ten thousand times stronger** than the Earth's field. This matters because when you do a benchtop motor-effect experiment, the lab magnet completely dominates — you can safely ignore the Earth's contribution. If you tried to do the same experiment with only the Earth's field, the force would be a few thousand times smaller and very hard to detect.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "State Fleming's left-hand rule by assigning each digit of the left hand to its physical quantity, including the memory hook for each. (3 steps)", "answer": "- Step 1: Hold the **left** hand with thumb, first finger and second finger all mutually perpendicular (at right angles to each other).\n- Step 2: The assignments are:\n+ **First finger** → **F**ield $$B$$ (points along the field, i.e. $$N \\to S$$). Memory: \"**First** = **F**ield.\"\n+ **se**C**ond finger** → **C**urrent $$I$$ (conventional current, $$+ \\to -$$). Memory: \"se**C**ond = **C**urrent.\"\n+ **thu**M**b** → **M**otion/force $$F$$. Memory: \"thu**M**b = **M**otion.\"\n- Step 3: The mantra to chant when setting up the hand is \"**Force, Field, Current**\" — thumb, first finger, second finger.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why must Fleming's rule for the motor effect specifically use the **left** hand and not the right hand? What goes wrong if you accidentally use the right?", "answer": "It must be the left hand because the cross-product $$\\mathbf{F} \\propto \\mathbf{I} \\times \\mathbf{B}$$ for the force on a positive (conventional) current produces a direction that matches the left-hand configuration in 3-D. If you use the right hand instead, you'd get a force pointing in exactly the **opposite** direction — every answer reversed. (The right-hand rule applies to other things, like the direction of the magnetic field circulating around a current-carrying wire, or to the force on a positive charge in some other conventions, but for the motor effect on conventional current it is unambiguously LEFT.) The reason a hand is needed at all is that the force is genuinely a 3-D twist — perpendicular to both field and current — which can't be captured by 2-D arrows alone.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Fleming's left-hand rule uses \"current\" — but does it refer to conventional current or electron flow? What must you do if a question gives you electron-flow direction? (3 steps)", "answer": "- Step 1: Fleming's rule uses **conventional current**, which is defined as the direction positive charges would flow ($$+ \\to -$$, i.e. from the positive terminal of the battery, through the external circuit, to the negative terminal).\n- Step 2: Real electrons drift in the **opposite** direction (since they carry negative charge). So if a question says \"electrons flow to the left,\" the conventional current is actually to the **right**.\n- Step 3: Before pointing your second finger, **flip** the electron-flow direction to get the conventional current direction. Forgetting this flip reverses every force you predict.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "When two magnets face each other across a gap, how do you determine the direction of the magnetic field in that gap?", "answer": "The rule is that magnetic field lines (outside a magnet) always run from **North to South**. So in the gap between two facing magnets, the field points from the N pole towards the S pole. Concretely: if the N pole is on the left and S on the right, the field arrow points to the **right** ($$\\rightarrow$$). If S is on the left and N is on the right, the field arrow points to the **left** ($$\\leftarrow$$). Drawing this arrow first, before doing anything with your hand, removes most of the confusion in these problems.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What do the symbols $$\\odot$$ (dot) and $$\\otimes$$ (cross) mean when drawn on a wire in a diagram, and what's the visual mnemonic for remembering which is which? (3 steps)", "answer": "- Step 1: $$\\odot$$ (dot) = current flowing **OUT of the page**, towards the viewer.\n- Step 2: $$\\otimes$$ (cross) = current flowing **INTO the page**, away from the viewer.\n- Step 3: The mnemonic comes from imagining an arrow:\n+ Looking at an arrow flying **towards you**, you see the pointy **tip** — that's the dot.\n+ Looking at an arrow flying **away from you**, you see the **tail feathers** (the fletching, which form an X) — that's the cross.\n\nThis is the single most common slip in motor-effect problems, so always re-read the legend before answering.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "A wire sits in the gap between two bar magnets: N on the left, S on the right. The wire carries current **into the page**. Which way is the force on the wire? (3 steps)", "answer": "- Step 1: Field direction: N(left) → S(right), so $$B$$ points to the **right** ($$\\rightarrow$$).\n- Step 2: Current is into the page ($$\\otimes$$). Set up Fleming's left hand: first finger right, second finger into page.\n- Step 3: The thumb then points **downwards** ($$\\downarrow$$). Cross-product sanity check: right × in = down. ✓\n\nForce: **downward**.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A wire sits between magnets with N on the left, S on the right, and carries current **out of the page**. Which way is the force, and how does this compare to the case where the current is reversed? (3 steps)", "answer": "- Step 1: Field points right (N → S). Current is out of page ($$\\odot$$).\n- Step 2: First finger right, second finger out of page, thumb points **up** ($$\\uparrow$$). Cross-product check: right × out = up. ✓\n- Step 3: Comparing to the reversed-current case (current into page, force down): reversing the current reverses the force. This is a key pattern — and it's exactly why DC motors need a commutator to keep flipping the current direction each half-rotation so that the force keeps driving the coil the same way.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A wire sits between magnets with S on the left, N on the right, and carries current into the page. Which way is the force? (3 steps)", "answer": "- Step 1: Field direction: S(left) ← N(right) means the field points from N to S, i.e. from right to left, so $$B$$ points **left** ($$\\leftarrow$$).\n- Step 2: Current is into the page ($$\\otimes$$). First finger left, second finger into page.\n- Step 3: Thumb points **up** ($$\\uparrow$$). Cross-product check: left × in = up. ✓\n\nForce: **upward**.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Without doing the hand sign, what are the two general rules for how the force changes when you reverse (a) the current, (b) the magnets, and (c) both? Why does this lead directly to the design of a DC motor? (3 steps)", "answer": "- Step 1: **Reverse the current** ⇒ force reverses direction.\n- Step 2: **Reverse the magnets** (swap N and S) ⇒ force also reverses direction.\n- Step 3: **Reverse both** ⇒ the two reversals cancel, so the force is **unchanged**.\n\nWhy this matters for motors: a coil in a magnetic field gets pushed and starts rotating. After half a rotation, the wire that was on the left is now on the right — relative to the (fixed) magnets, this is equivalent to having reversed the magnets, so the force would now push the coil **backwards**, stalling it. To prevent that, a **split-ring commutator** flips the current direction at exactly that moment. Reversing the current cancels the reversal-from-rotation, so the force keeps driving the coil the same way round. Continuous rotation.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "In the \"radial field\" loudspeaker geometry — a circular coil sits flat above a magnet with N at the centre and S all around the outside — what is the field direction at any point on the coil, and what direction is the force on the entire coil? (3 steps)", "answer": "- Step 1: At every point on the circular coil, the field points **radially outwards** (from the central N pole towards the surrounding S ring), because field lines always go N → S.\n- Step 2: Pick one point on the coil and apply Fleming's at that point:\n+ Top of coil: field points up (radial), current flows tangentially (say, to the right). First finger up, second finger right → thumb points **out of the page**.\n+ Right side of coil: field points right (radial), current there flows downwards (still tangential). First finger right, second finger down → thumb again **out of the page**.\n- Step 3: As you go around the loop, both the field and the current rotate by the same amount at every point, so the cross product always points the same way: **out of the page**. The entire coil experiences a uniform axial force.\n\nWhen the current alternates (AC), the coil punches in-and-out, pushing the air to make sound — that's the principle of the speaker in your headphones.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When facing a tricky-looking shape (a coil, a curved wire, a tilted set of magnets), what is the strategic move for applying Fleming's rule, and why does it work? (3 steps)", "answer": "- Step 1: **Consider one point at a time.** Don't try to reason about the whole shape simultaneously.\n- Step 2: At that single point, treat the wire as a tiny straight segment with a definite local current direction and a definite local field direction. Apply Fleming's rule there. Read off the force.\n- Step 3: Then pick another point and repeat. Build up the picture of the total force from local pieces.\n\nWhy it works: the formula $$F = BIL\\sin\\theta$$ is genuinely local — it applies to each small segment of wire independently. The total force is the sum of the small forces on every piece. So decomposing the problem into points is not a trick, it's the natural way the physics actually combines.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "A wire of length 0.2 m carries 5 A perpendicular to a 0.3 T magnetic field. Without grinding through arithmetic, describe the conceptual steps to find the force and roughly its size. (3 steps)", "answer": "- Step 1: Check geometry: the wire is perpendicular to the field, so $$\\theta = 90°$$ and $$\\sin\\theta = 1$$. Use $$F = BIL$$, no sine factor needed.\n- Step 2: Multiply $$B \\times I \\times L = 0.3 \\times 5 \\times 0.2$$. Mentally: $$0.3 \\times 5 = 1.5$$, then $$1.5 \\times 0.2 = 0.3$$.\n- Step 3: So $$F = 0.3\\,\\text{N}$$. Direction comes from Fleming's left hand using whatever field and current orientation are in the problem.\n\nThe point of this exercise: notice that even moderate $$B$$, $$I$$, $$L$$ give forces on the order of fractions of a newton — small but easily measurable on a bench.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A wire makes a 30° angle with a 0.5 T field, carries 4 A, length 0.1 m. Conceptually walk through how to find the force, and explain what the $$\\sin\\theta$$ factor does to the answer compared with the perpendicular case. (3 steps)", "answer": "- Step 1: The wire isn't perpendicular, so we need the full formula: $$F = BIL\\sin\\theta = 0.5 \\times 4 \\times 0.1 \\times \\sin 30°$$.\n- Step 2: $$\\sin 30° = 0.5$$, so we have $$0.5 \\times 4 \\times 0.1 \\times 0.5$$. Mentally: $$0.5 \\times 4 = 2$$, then $$2 \\times 0.1 = 0.2$$, then $$0.2 \\times 0.5 = 0.1\\,\\text{N}$$.\n- Step 3: Compare to perpendicular case (same $$B$$, $$I$$, $$L$$ but $$\\theta = 90°$$): the force would have been $$0.5 \\times 4 \\times 0.1 = 0.2\\,\\text{N}$$. So tilting the wire to 30° **halves** the force. The $$\\sin\\theta$$ factor literally scales the force down by the projection of the field perpendicular to the wire.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why does a current flowing along a wire produce a circular magnetic field around the wire, and how does t
