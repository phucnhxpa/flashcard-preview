nt of the magnetic field that is **perpendicular** to the current direction. Call this $$B_\\perp$$.\n- Step 2: From trigonometry, if the total field is $$B$$ at angle $$\\theta$$ to the wire, the perpendicular component is $$B_\\perp = B\\sin\\theta$$ (and the parallel component, which does nothing, is $$B_\\parallel = B\\cos\\theta$$).\n- Step 3: Substituting: the force formula becomes $$F = B_\\perp IL = (B\\sin\\theta)IL = BIL\\sin\\theta$$.\n\nThe $$\\sin\\theta$$ is not arbitrary — it is the geometric projection that extracts the \"across-the-wire\" portion of the field. The \"along-the-wire\" portion ($$B\\cos\\theta$$) contributes nothing, which is why $$\\theta = 0°$$ (all parallel, no perpendicular) gives zero force.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Fleming's left-hand rule uses a specific hand. Which hand, and what would go wrong if you used the other one? Connect this to the underlying vector mathematics. (3 steps)", "answer": "- Step 1: It must be the **LEFT hand**. This is for the motor effect — the force on a current-carrying wire in a field.\n- Step 2: If you used your right hand with the same finger assignments (First = Field, Second = Current, Thumb = Force), your thumb would point in the **opposite** direction — you'd get the wrong force direction every time.\n- Step 3: The mathematical reason: the motor effect obeys $$F \\propto I \\times B$$ (current cross field). This specific ordering ($$I \\times B$$, not $$B \\times I$$) is a left-hand rule convention. The cross product $$B \\times I$$ would give the opposite direction, which would correspond to a right-hand rule. The physics dictates that the force on a *positive* current in a field follows $$I \\times B$$, hence the left hand.\n\nRight-hand rules exist in physics (e.g., the grip rule for the field around a wire), but they apply to *different* physical relationships. For the force on a current, it's always left.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "In Fleming's left-hand rule, each of the three digits (thumb, first finger, second finger) maps to one of the three vectors (Force, Field, Current). State the mapping, and give the memory hooks that lock each one in place. (3 steps)", "answer": "- Step 1: **Thumb** → **Motion/Force** (the \"thrust\" or push on the wire). Memory hook: **thuMb = Motion** (the M matches).\n- Step 2: **First finger (index)** → **Field** $$B$$ (direction $$N \\rightarrow S$$). Memory hook: **First = Field** (the F matches).\n- Step 3: **seCond finger (middle)** → **Current** $$I$$ (conventional current, $$+ \\rightarrow -$$). Memory hook: **seCond = Current** (the C matches).\n\nAlex's chant: \"Force, Field, Current\" maps to Thumb, First finger, Second finger — in that order. Saying it aloud as you set your hand prevents you from swapping fingers, which is one of the most common exam errors.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When setting up Fleming's left-hand rule, your three digits must be arranged in a specific geometric relationship to each other. What is it, and why does it matter physically? (2 steps)", "answer": "- Step 1: The thumb, first finger, and second finger must all be at **right angles (90°)** to each other — like the three axes of a 3D coordinate system ($$x$$, $$y$$, $$z$$).\n- Step 2: This matters because the force $$F$$ is perpendicular to *both* the field $$B$$ and the current $$I$$ simultaneously — it's a cross-product result. No two of the three vectors are ever parallel; they live in three mutually perpendicular directions. That's exactly why you need a *hand* (a 3D tool) to visualise it, and why a flat 2D diagram can be confusing — the force often points out of the plane of the page.\n\nIf you let your fingers drift into the same plane or collapse together, you're no longer representing the 3D perpendicularity that the physics demands.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Fleming's left-hand rule uses \"conventional current,\" not electron flow. What is conventional current, and what practical step must you take if a question gives you electron-flow direction? (3 steps)", "answer": "- Step 1: **Conventional current** is the direction that *positive* charge would flow: from the positive terminal ($$+$$) to the negative terminal ($$-$$) of the supply. This is the historical and exam-standard definition.\n- Step 2: In reality, in a metal wire, the charge carriers are *electrons* (negative), and they drift in the **opposite** direction to conventional current — from $$-$$ to $$+$$.\n- Step 3: If a question states \"electrons flow to the left,\" you must **flip it** before pointing your second finger: conventional current flows to the *right*. Then apply Fleming's LHR with that flipped direction. If you forget to flip, your second finger points the wrong way, and your force direction is reversed.\n\nThis is Trap 2 from the lesson: always check whether the question gives you conventional current or electron flow. Edexcel explicitly states the left-hand rule applies to conventional current.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "In physics diagrams, a dot (⊙) and a cross (⊗) are used to represent directions perpendicular to the page. Which direction does each symbol represent, and what is the arrow analogy that makes them memorable? (3 steps)", "answer": "- Step 1: **Dot ⊙ = current (or vector) OUT of the page**, towards you.\n- Step 2: **Cross ⊗ = current (or vector) INTO the page**, away from you.\n- Step 3: The arrow analogy: imagine an arrow flying through the air.\n+ If the arrow is flying **towards you**, you see its pointed **tip** — that looks like a dot ⊙. So dot = coming towards you = out of the page.\n+ If the arrow is flying **away from you**, you see its **tail feathers** (the fletching) — that looks like a cross ⊗. So cross = going away from you = into the page.\n\nThis was the slip you made in the lesson (calling a dot \"into the page\"). The arrow analogy fixes it permanently: tip = dot = out; tail = cross = in.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "Outside a magnet, magnetic field lines run in a specific direction between the poles. What is it, and how do you use the pole labels to figure out the field direction in a gap? (2 steps)", "answer": "- Step 1: Magnetic field lines always run from **North to South** outside the magnet. This is the universal convention.\n- Step 2: In the gap between two bar magnets (as in all the grid problems), you simply read the pole labels and draw an arrow from the N pole towards the S pole:\n+ N on the left, S on the right → field points **rightward** (→)\n+ S on the left, N on the right → field points **leftward** (←)\n\nThis is Step 1 of the 3-step method — always do it first, before touching your hand. A wrong field arrow makes everything else wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the 3-step method for solving any force-direction problem with Fleming's left-hand rule, and why is the ordering important? (3 steps)", "answer": "- Step 1: **Field first.** Read the magnet poles, draw the field arrow across the gap from N to S. Point your **First finger** along this arrow.\n- Step 2: **Current second.** Read the dot/cross symbol on the wire (dot ⊙ = out of page, cross ⊗ = into page). Point your **seCond finger** along the current direction.\n- Step 3: **Force last.** Your **thuMb** now automatically points along the force direction. Read it off: up, down, left, right, in, or out of the page.\n\nThe ordering matters because the field is usually the easiest thing to get right (just read N→S), and getting it locked in first prevents you from accidentally pointing your field finger in a direction that \"feels convenient\" but is wrong. Current is also straightforward (just read dot/cross). Once both are set correctly, the thumb gives the answer mechanically — no further thinking needed.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Two bar magnets are arranged with N on the left and S on the right. A wire between them carries current INTO the page (⊗). Which way does the force on the wire point? Walk through the 3-step method. (3 steps)", "answer": "- Step 1: **Field**: N on left, S on right → field points **rightward** (→). Point your first finger to the right.\n- Step 2: **Current**: cross ⊗ = into the page (away from you). Point your second finger into the page (push it forward, away from your face).\n- Step 3: **Force**: with first finger right and second finger into the page, your left thumb points **DOWNWARD** (↓). The force pushes the wire down on the page.\n\nThis was Problem 1 in the grid — the one Alex worked through with you to set the pattern.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Same magnets as Q17 (N left, S right → field rightward), but now the current is OUT of the page (⊙). Without redoing every step from scratch, how can you immediately deduce the force direction, and what general principle does this illustrate? (2 steps)", "answer": "- Step 1: Reversing the current (from ⊗ in to ⊙ out) reverses the direction of your second finger. With field still rightward but current now *out of the page* (towards you), your left thumb flips from down to **UPWARD** (↑).\n- Step 2: This illustrates the principle: **reverse the current → reverse the force**. The field is unchanged, so only the current flip matters. This was Problem 2 in the grid, and it's the same principle that a DC motor exploits — flip the current every half-turn to keep the force driving the coil the same rotational way.\n\nThe cross-product check: right × out = up (compared to right × in = down). One sign change in the input → one sign change in the output.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Now the magnets are swapped: S on the left, N on the right. The wire carries current INTO the page (⊗). What is the force direction, and what does comparing this to Q17 reveal about the effect of reversing the magnets? (3 steps)", "answer": "- Step 1: **Field**: S on left, N on right → field points **leftward** (←). Point your first finger to the left.\n- Step 2: **Current**: ⊗ = into the page. Point your second finger into the page.\n- Step 3: **Force**: with first finger left and second finger into the page, your left thumb points **UPWARD** (↑).\n\nComparing to Q17 (N|S, ⊗ → force down): the current is the same (into page), but the field reversed (right → left), and the force reversed (down → up). This illustrates: **reverse the field (magnets) → reverse the force**. The cross-product check: left × in = up, whereas right × in = down.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "S on left, N on right (field leftward), current OUT of the page (⊙). What is the force direction? Compare this result to Q18 and Q19 to reveal what happens when you reverse *both* the magnets and the current simultaneously. (3 steps)", "answer": "- Step 1: **Field**: leftward (←). First finger points left.\n- Step 2: **Current**: ⊙ = out of the page. Second finger points out (towards you).\n- Step 3: **Force**: first finger left, second finger out of page → left thumb points **DOWNWARD** (↓).\n\nNow compare:\n+ Q18: N|S (field right), ⊙ (current out) → force UP\n+ This question: S|N (field left), ⊙ (current out) → force DOWN\n\nReversing the magnets alone flipped the force. But compare to Q17: N|S, ⊗ → DOWN. Here: S|N, ⊙ → DOWN. Same force! We reversed *both* magnets and current, and the two reversals cancelled out. **Reverse both → force unchanged.** This is the principle behind the DC motor: if you don't flip the current, the coil would oscillate instead of spinning continuously.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "A student does a force-direction problem and gets \"force is out of the page.\" But the diagram shows two bar magnets left and right, and a wire viewed end-on (bird's-eye). Is \"out of the page\" a sensible answer for this setup — and if not, what direction vocabulary should they have used? (2 steps)", "answer": "- Step 1: In the standard bird's-eye grid setup, the field runs horizontally (left/right) across the page, and the current goes in/out of the page. The force — being perpendicular to *both* — must lie **in the plane of the page**, pointing **up or down** (or possibly left/right if the current were drawn differently).\n- Step 2: Saying \"out of the page\" for this geometry is a vocabulary slip. The *numerical* direction might have been correct (the student may have meant \"up on the page\" but said \"out\" by reflex). The fix: always state the direction **as it sits on the diagram** — up, down, left, or right — unless the geometry genuinely produces an in/out-of-page force (which happens in the radial coil problem, not in the flat grid).\n\nThis was Trap from the lesson: you sometimes called the force \"in/out\" when it was actually up/down. The rule of thumb: if the field and current are both drawn in the page plane (or one in, one across), the force is in the page plane.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "What are the three ways to make the motor-effect force on a wire larger, and for each one, explain the physical intuition behind why it works? (3 steps)", "answer": "- Step 1: **Stronger magnetic field** (increase $$B$$). A stronger field pushes harder on the current — more field lines per unit area means more \"grip\" on the moving charges. Use bigger or more powerful magnets.\n- Step 2: **More current** (increase $$I$$). More current means more charge carriers flowing per second through the wire. Each carrier feels the field's push, so more carriers = more total force. Increase the supply voltage or decrease the circuit resistance.\n- Step 3: **Longer wire in the field** (increase $$L$$). Only the portion of wire actually sitting inside the magnetic field gets pushed. More length in the field means more wire being acted on simultaneously — it's like having more people pushing the same object from the same direction.\n\nAll three appear multiplicatively in $$F = BIL$$: doubling any one of them doubles the force. Doubling all three triples the doubling — 8× force.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A wire carries 2 A of current through 0.5 m of a 0.4 T magnetic field, and the wire is perpendicular to the field. What is the force, and why can you use $$F = BIL$$ directly without any trig? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field, $$\\theta = 90°$$ and $$\\sin 90° = 1$$, so $$F = BIL$$ applies directly: $$F = 0.4 \\times 2 \\times 0.5 = 0.4\\;\\text{N}$$.\n- Step 2: The mental calculation: $$0.4 \\times 2 = 0.8$$, then $$0.8 \\times 0.5 = 0.4$$. No trig needed because \"perpendicular\" is the maximum-force case — the full field strength is acting across the wire.\n\nThe key conceptual point: whenever a problem states \"perpendicular\" or shows the wire at 90° to the field lines, you can drop the $$\\sin\\theta$$ and use $$F = BIL$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "The same wire as Q23 (2 A, 0.5 m, 0.4 T field) is now rotated to be **parallel** to the field. What happens to the force, and why? (2 steps)", "answer": "- Step 1: When the wire is parallel to the field, $$\\theta = 0°$$, so $$\\sin 0° = 0$$, and $$F = BIL \\times 0 = 0\\;\\text{N}$$.\n- Step 2: Physically, the field is now running *along* the wire in the same direction as the current. There is zero perpendicular component of the field — no \"sideways push\" whatsoever. The current and field are collinear, so their cross product vanishes.\n\nThis is the most extreme edge case: full field strength, full current, but zero force because the geometry is wrong. It drives home that force depends on the *angle*, not just the raw values of $$B$$, $$I$$, and $$L$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A wire carries 4 A through 0.1 m of a 0.5 T field, at $$\\theta = 30°$$ to the field direction. Calculate the force qualitatively — is it the maximum, zero, or somewhere in between? What single trig value determines the reduction? (3 steps)", "answer": "- Step 1: At $$\\theta = 30°$$, the wire is neither perpendicular nor parallel, so the force is **somewhere between maximum and zero** — specifically reduced by the factor $$\\sin 30°$$.\n- Step 2: $$\\sin 30° = 0.5$$, so the force is exactly **half** of what it would be if the wire were perpendicular: $$F = BIL\\sin 30° = 0.5 \\times 4 \\times 0.1 \\times 0.5 = 0.1\\;\\text{N}$$.\n- Step 3: The perpendicular-case force would have been $$F = BIL = 0.5 \\times 4 \\times 0.1 = 0.2\\;\\text{N}$$, and the $$\\sin 30° = 0.5$$ cuts it exactly in half. This is why knowing the key sin values ($$\\sin 0° = 0$$, $$\\sin 30° = 0.5$$, $$\\sin 90° = 1$$) is enough for exam problems — they are the only angles Edexcel typically uses.\n\nThe conceptual takeaway: $$\\theta = 30°$$ means only half the field is \"across\" the wire. The other half ($$B\\cos 30°$$) runs along the wire and does nothing.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Why does Fleming's left-hand rule still work when the magnetic field is tilted at a diagonal angle (not purely horizontal or vertical on the page)? What must you do differently compared to a standard horizontal-field problem? (3 steps)", "answer": "- Step 1: The rule never changes — it works at *any* angle. The field still runs from N to S, but now along a slanted line instead of a horizontal one.\n- Step 2: What you must do differently: **align your first finger with the actual, tilted field direction**, not with \"up\" or \"right\" on the page. Your finger must point along the exact N→S line as drawn, even if that line is at 45° or 60° to the horizontal.\n- Step 3: Once the first finger is genuinely aligned with the tilted field, and the second finger is on the current, the thumb gives a force that is perpendicular to *that* tilted field — which will also come out at a diagonal angle. The force is always perpendicular to both the field and the current, regardless of their orientations.\n\nAlex corrected you twice on this during the radial problem: \"your field finger needs to go straight up the page, North to South\" — the finger must be parallel with the actual field direction on the diagram, not tilted out of the page plane.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "In the \"super challenge\" problem, a circular coil sits flat inside a radial magnet (N in the centre, S around the outside). At any point on the coil, which way does the field point, and why? (2 steps)", "answer": "- Step 1: The field points **radially outward** from the centre at every point on the coil — away from the central N pole, towards the outer S pole.\n- Step 2: This is because field lines always run $$N \\rightarrow S$$, and in this geometry the N is at the centre and the S is all around the perimeter. So at the top of the coil, the field points upward (away from centre); at the right of the coil, the field points rightward; at the bottom, downward; at the left, leftward. The field direction *rotates* as you move around the circle, always pointing outward.\n\nThis radial geometry is special: unlike a uniform field between two bar magnets (which points one direction everywhere), the radial field turns continuously, always perpendicular to the coil at every point.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "In the radial-magnet super challenge, Alex advised: \"don't try to do the whole circle at once — just consider one point.\" Apply this to the **top** of the circular coil: the field points upward (radially out) and the current runs left-to-right. Which way does the force point? (3 steps)", "answer": "- Step 1: At the top of the coil, the field points **upward** (radially outward, away from the centre). Point your first finger upward on the page.\n- Step 2: The current at the top of the coil runs **left to right** (conventional current direction along that segment). Point your second finger to the right.\n- Step 3: With first finger up and second finger right on your LEFT hand, your thumb points **out of the page** (towards you). The force at the top of the coil is out of the page.\n\nCross-product check (with $$x$$ = right, $$y$$ = up, $$z$$ = out): $$\\vec{I} \\times \\vec{B}$$ = right × up = out of page. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Now check the **right** point of the same circular coil in the radial magnet. The field points rightward (radially out) and the current runs downward. Which way does the force points? What pattern is emerging? (3 steps)", "answer": "- Step 1: At the right point, the field points **rightward** (radially outward from centre). First finger points right.\n- Step 2: The current at this point runs **downward** (the coil current circulates, and at the rightmost point it flows downward). Second finger points down.\n- Step 3: First finger right, second finger down on your LEFT hand → thumb points **out of the page**. Same as the top point!\n\nThe pattern: at every point on the coil, both the field direction and the current direction rotate by the same amount as you move around the circle. The cross product $$\\vec{I} \\times \\vec{B}$$ always gives the same result: **out of the page**. The entire coil experiences one uniform axial force pushing it out of the page.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why does the force come out the same direction at *every* point on the circular coil in a radial magnet, even though the field and current directions are both changing as you go around the circle? Explain the geometric reason. (3 steps)", "answer": "- Step 1: As you move around the coil, the radial field direction rotates — at the top it's up, at the right it's right, at the bottom it's down, at the left it's left. The current direction also rotates by exactly the same amount (the current circulates around the loop).\n- Step 2: Because both $$\\vec{I}$$ and $$\\vec{B}$$ rotate together (by the same angle), their *relative* orientation stays constant. At every point, the current is always tangent to the circle and the field is always radial — they are always at 90° to each other, and the cross product $$\\vec{I} \\times \\vec{B}$$ always points in the same axial direction (out of the page).\n- Step 3: This is why the radial geometry is so powerful: it guarantees a *uniform* force direction on the entire coil. In a uniform (non-radial) field between flat magnets, different parts of a circular coil would experience forces in different directions — some pushing up, some pushing down, potentially cancelling. The radial field eliminates this problem, which is why loudspeakers use radial magnets.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "A loudspeaker uses a circular coil in a radial magnet. If you drive the coil with AC (alternating current that reverses direction periodically), what happens to the coil's motion, and how does this produce sound? (3 steps)", "answer": "- Step 1: With conventional current in one direction, the force on the entire coil is **out of the page** (as we established). The coil pushes outward, compressing the air in front of it.\n- Step 2: When the AC reverses the current direction, the force reverses too: the entire coil is now pushed **into the page**. The coil pulls inward, rarefying the air.\n- Step 3: As the AC oscillates back and forth, the coil **punches in and out** rhythmically — pushing and pulling the air, creating alternating compressions and rarefactions. That is a sound wave. As Alex said: \"little coil, little magnet, it goes in and out and makes a sound.\"\n\nThe radial magnet is essential here: it ensures the entire coil moves as one unit (all parts push out simultaneously, then all pull in simultaneously), rather than different parts fighting each other.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A DC motor has a coil spinning in a magnetic field. Without a split-ring commutator, the coil would oscillate back and forth instead of spinning continuously. Explain why, using the force-reversal principles from the grid problems. (3 steps)", "answer": "- Step 1: As the coil rotates, the current direction in each side of the coil stays the same (same wire, same current direction). But the coil's orientation relative to the field changes — after half a turn, the side that was on the left is now on the right.\n- Step 2: This is equivalent to **reversing the magnets** relative to the current (same effect as Problems 1→3 in the grid). Reversing the field direction relative to the current **reverses the force**. So after half a turn, the force that was pushing the coil clockwise now pushes it anticlockwise — the coil decelerates and reverses.\n- Step 3: The split-ring commutator fixes this by **reversing the current** every half-turn (the brushes swap which terminal connects to which side of the coil). Reversing the current *and* the effective field direction (due to rotation) means *both* are reversed — and reversing both leaves the force unchanged (as we saw in the grid). The coil keeps spinning the same way.\n\nDouble reversal = unchanged force. That's the whole operating principle of the DC motor.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "A student carefully sets up Fleming's left-hand rule: first finger pointing right for the field, second finger pointing into the page for the current. But they used their **right hand** by accident. Their thumb points upward. Is this the correct force direction — and if not, which way should the force actually point? (2 steps)", "answer": "- Step 1: Using the **right hand** with the same finger assignments gives the *opposite* direction to the correct answer. The right-hand thumb points up, but the correct (left-hand) answer is **downward**.\n- Step 2: The right-hand rule corresponds to the cross product $$\\vec{B} \\times \\vec{I}$$ (field cross current), whereas the motor effect follows $$\\vec{I} \\times \\vec{B}$$ (current cross field). These two cross products give opposite results: $$\\vec{B} \\times \\vec{I} = -(\\vec{I} \\times \\vec{B})$$. So the right hand always flips the force.\n\nThis is Trap 4: for the force on a current (motor effect), always use the LEFT hand. The right hand is for other rules (like the grip rule for the field around a wire).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "A student reads a ⊗ symbol on a wire and says \"current is out of the page.\" They then apply Fleming's LHR correctly with their hand. Will they get the right force direction? Explain what goes wrong and where. (3 steps)", "answer": "- Step 1: The student misread the symbol: ⊗ = current **into** the page, not out. So their second finger is pointing in the *wrong* direction (out instead of in).\n- Step 2: With the second finger reversed, the thumb (force) also reverses. They will get a force direction that is the **exact opposite** of the correct answer.\n- Step 3: The field finger was fine (N→S is straightforward), and the hand rule was applied correctly — the *only* error was the dot/cross misread. But that single misread propagates through the entire calculation and flips the final answer. This is why Alex emphasised: \"re-read the legend before every question.\"\n\nThis is Trap 1 — the single most common slip. Dot ⊙ = OUT (arrow tip), cross ⊗ = IN (arrow tail). One symbol swap = one reversed force.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A question states: \"Electrons flow to the left in a wire. The magnetic field points into the page.\" A student points their second finger to the left (where the electrons go) and applies Fleming's LHR. What went wrong, and what is the correct force direction? (3 steps)", "answer": "- Step 1: The student used **electron-flow direction** for the second finger, but Fleming's LHR requires **conventional current** direction. Electrons flow left means conventional current flows **right** (the opposite direction, since electrons are negative).\n- Step 2: Correct setup: first finger = field into the page; second finger = conventional current to the **right**. On the LEFT hand: first finger into the page, second finger right → thumb points **UPWARD**.\n- Step 3: The student's wrong setup (second finger left) would give thumb **DOWNWARD** — the opposite answer. The fix is always: flip electron flow to get conventional current before touching your hand.\n\nThis is Trap 2. The rule: \"If a question ever gives you electron-flow direction, flip it before pointing your second finger.\"", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A wire carries current at 60° to a magnetic field. A student calculates the force using $$F = BIL$$ (without the $$\\sin\\theta$$ factor). Will their answer be too large, too small, or exactly right? By roughly what factor? (2 steps)", "answer": "- Step 1: The answer will be **too large**. The correct formula is $$F = BIL\\sin\\theta$$, and $$\\sin 60° \\approx 0.87$$, so the true force is only about 87% of what the student calculated.\n- Step 2: The student used $$F = BIL$$, which assumes $$\\theta = 90°$$ (perpendicular, maximum force). By omitting $$\\sin\\theta$$, they implicitly assumed the wire is perpendicular when it's actually tilted, overcounting the effective field strength. The \"missing\" factor $$\\sin\\theta$$ accounts for the fact that only the perpendicular component of the field contributes.\n\nThis is Trap 3: $$F = BIL$$ is only the perpendicular case. Any other angle requires $$F = BIL\\sin\\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A student draws the field arrow from S to N in the gap between magnets (backwards). They then apply Fleming's LHR perfectly with their hand. Will the force direction be correct? If not, how is it related to the correct answer? (2 steps)", "answer": "- Step 1: The force direction will be **wrong** — specifically, it will be the **exact opposite** of the correct force direction.\n- Step 2: The first finger (field) is pointing the wrong way (S→N instead of N→S). This reverses the field direction input. Reversing the field direction reverses the force (as we saw in the grid: same current, reversed magnets → reversed force). Everything else (hand, current, method) was correct, but one backwards arrow flips the whole answer.\n\nThis is Trap 5. The fix: always draw the field arrow N→S first, before touching your hand. \"Which direction does the field always go?\" — N to S.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "When facing a curved or awkwardly shaped current-carrying object in a magnetic field (like a circular coil, a bent wire, or a 3D arrangement), what is the correct problem-solving strategy, and why does trying to reason about the whole object at once fail? (3 steps)", "answer": "- Step 1: The strategy: **pick one point** on the object, determine the local field direction and the local current direction at that point, apply Fleming's LHR to find the force at that single point. Then repeat for other points if needed.\n- Step 2: Trying to reason about the whole object at once fails because different points on a curved object have *different* current directions (the current turns as it flows around the curve) and possibly different field directions (as in the radial magnet). The force at each point depends on the *local* relationship between current and field — there is no single \"overall\" direction that applies everywhere.\n- Step 3: However, in special geometries like the radial magnet, solving one point may reveal a pattern that holds everywhere (force always out of the page). You still start with one point to discover that pattern — you don't assume it.\n\nAlex's coaching: \"Just consider one point.\" Solve that single point with Fleming, then check another point to see if the pattern repeats.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "A wire carrying 3 A has 2 m of its length inside a uniform magnetic field of strength 0.4 T. The wire is perpendicular to the field. What is the force on the wire? (This is the calculation from Alex's second worksheet.) (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field, use $$F = BIL$$ directly: $$F = 0.4 \\times 3 \\times 2$$.\n- Step 2: Mental calculation: $$0.4 \\times 3 = 1.2$$, then $$1.2 \\times 2 = 2.4\\;\\text{N}$$.\n\nThe key conceptual point: only 2 m of wire is *inside* the field. If the wire were 5 m long but only 2 m sat between the magnet poles, you'd still use $$L = 2$$ m, not 5 m. The force only acts on the portion actually in the field.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Verify the cross-product rule $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ for Problem 1 from the grid: field rightward ($$\\hat{x}$$), current into the page ($$-\\hat{z}$$). Compute $$\\vec{I} \\times \\vec{B}$$ and confirm it matches the Fleming's LHR answer. (3 steps)", "answer": "- Step 1: Set up coordinates: $$\\hat{x}$$ = right, $$\\hat{y}$$ = up, $$\\hat{z}$$ = out of page. Then $$\\vec{B} = B\\hat{x}$$ (field rightward) and $$\\vec{I} = I(-\\hat{z})$$ (current into the page = negative z).\n- Step 2: Compute the cross product: $$\\vec{I} \\times \\vec{B} = I(-\\hat{z}) \\times B\\hat{x} = -IB(\\hat{z} \\times \\hat{x})$$. Using the right-hand coordinate cycle: $$\\hat{z} \\times \\hat{x} = \\hat{y}$$ (up). So $$\\vec{I} \\times \\vec{B} = -IB\\hat{y}$$, which points in the **negative $$\\hat{y}$$** direction = **downward**.\n- Step 3: Fleming's LHR gave: force **downward** (↓). The cross product gives: force in $$-\\hat{y}$$ = downward. ✓ They match perfectly.\n\nThis confirms that Fleming's LHR is really just a physical embodiment of the mathematical cross product $$\\vec{I} \\times \\vec{B}$$ — and explains why it must be the left hand (the ordering $$I \\times B$$, not $$B \\times I$$).", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Verify the cross product for Problem 9: field leftward ($$-\\hat{x}$$), current out of the page ($$+\\hat{z}$$). Compute $$\\vec{I} \\times \\vec{B}$$ and confirm it matches the Fleming answer of \"force downward.\" (3 steps)", "answer": "- Step 1: $$\\vec{B} = B(-\\hat{x})$$ (field leftward), $$\\vec{I} = I\\hat{z}$$ (current out of page).\n- Step 2: $$\\vec{I} \\times \\vec{B} = I\\hat{z} \\times B(-\\hat{x}) = -IB(\\hat{z} \\times \\hat{x}) = -IB\\hat{y}$$ (since $$\\hat{z} \\times \\hat{x} = \\hat{y}$$).\n- Step 3: The result is $$-IB\\hat{y}$$, which points in the **negative $$\\hat{y}$$** direction = **downward**. Fleming's LHR also gives downward. ✓\n\nNotice: both Problem 1 (field right, current in) and Problem 9 (field left, current out) give the same force direction — downward. This is the \"reverse both → unchanged\" principle: reversing field AND current together doesn't change the cross product sign.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "In the grid of 9 problems, two key patterns emerged: (A) reversing the current reverses the force, and (B) reversing the magnets reverses the force. Explain why pattern (A) is really just a property of the cross product $$\\vec{I} \\times \\vec{B}$$, and show that pattern (B) follows from the same mathematics. (3 steps)", "answer": "- Step 1: Pattern (A): reversing the current means $$\\vec{I} \\rightarrow -\\vec{I}$$, so $$(-\\vec{I}) \\times \\vec{B} = -(\\vec{I} \\times \\vec{B})$$ — the cross product flips sign, so the force reverses. This is a general property of cross products: negating one input negates the output.\n- Step 2: Pattern (B): reversing the magnets reverses the field direction: $$\\vec{B} \\rightarrow -\\vec{B}$$, so $$\\vec{I} \\times (-\\vec{B}) = -(\\vec{I} \\times \\vec{B})$$ — again the output flips sign, so the force reverses.\n- Step 3: Combining both: $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$ — two negatives cancel, force is unchanged. This is the double-reversal principle and the mathematical basis of the DC motor's commutator logic.\n\nThe cross product elegantly encodes all three patterns in one line: negate one factor → negate result; negate both → result unchanged.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "A student asks: \"If the force on the wire is downward, does that mean the wire accelerates downward forever?\" What physical reality limits the wire's motion, and what does this look like in a real motor? (3 steps)", "answer": "- Step 1: In the grid problems, we're finding the *direction* of the force at a single instant. If the wire is free to move, it will indeed accelerate in the force direction — but only until it leaves the magnetic field region (or until something stops it).\n- Step 2: In a real motor, the wire is part of a coil that can rotate. The downward force on one side of the coil and the upward force on the other side create a **torque** (a turning effect). The coil spins, but as it rotates, the angle $$\\theta$$ between the wire and the field changes — the force decreases as the coil moves away from perpendicular.\n- Step 3: At the position where the coil plane is perpendicular to the field ($$\\theta = 0°$$ for the wires), the force is momentarily zero (parallel to field). The coil's momentum carries it through this dead point, and the commutator flips the current so the force starts pushing the same rotational direction again.\n\nThe motor doesn't accelerate forever — it reaches a steady speed where the motor-effect torque balances the friction/load torque.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "A question shows a wire between two magnets and asks for the force direction. The wire symbol is a dot (⊙). A student correctly identifies this as \"out of the page\" and correctly reads the field as leftward. They set up Fleming's LHR: first finger left, second finger out of the page. Their thumb points downward. Verify this is correct using the cross product. (2 steps)", "answer": "- Step 1: $$\\vec{B} = B(-\\hat{x})$$ (leftward), $$\\vec{I} = I\\hat{z}$$ (out of page). Cross product: $$\\vec{I} \\times \\vec{B} = I\\hat{z} \\times B(-\\hat{x}) = -IB(\\hat{z} \\times \\hat{x}) = -IB\\hat{y}$$.\n- Step 2: $$-IB\\hat{y}$$ points in the negative $$\\hat{y}$$ direction = **downward**. ✓ Fleming's LHR and the cross product agree: force is downward.\n\nThis is Problem 9 from the grid — the one Alex finished with a smiley face.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A student is working on a force-direction problem and says: \"I'll just figure out the force direction by thinking about which way the wire would logically move.\" Why is this approach unreliable, and what should they do instead? (2 steps)", "answer": "- Step 1: \"Logical\" guessing is unreliable because the motor-effect force is **perpendicular to both** the field and the current — it often points in a direction that feels surprising or counter-intuitive. There is no obvious \"logical\" reason why a current going into the page in a rightward field should push the wire downward rather than upward — both seem equally \"logical\" if you're just guessing.\n- Step 2: The reliable method: use the **3-step process** (field → current → force via Fleming's LHR) or the **cross product** $$\\vec{I} \\times \\vec{B}$$. These are deterministic — they always give the same, correct answer with no ambiguity. Fleming's LHR is literally a physical algorithm that removes the need for intuition.\n\nThe force direction is a mathematical fact (cross product), not something you can reason out from \"common sense.\" That's why Alex insisted on the hand rule every single time.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "What is the definition of the tesla expressed as a complete sentence (not just a unit breakdown)? In other words, what physical scenario produces exactly 1 tesla? (2 steps)", "answer": "- Step 1: A magnetic field has a flux density of **1 tesla** if a wire carrying **1 ampere** of current, with **1 metre** of its length sitting **perpendicular** to the field, experiences a force of **1 newton**.\n- Step 2: This is just the formula $$B = \\frac{F}{IL}$$ with all values set to 1: $$B = \\frac{1\\;\\text{N}}{1\\;\\text{A} \\times 1\\;\\text{m}} = 1\\;\\text{T}$$.\n\nThe perpendicular condition is essential in this definition. If the wire were at an angle, the force would be less than 1 N even in a 1 T field, and you couldn't define $$B$$ simply as force divided by IL.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "A very strong electromagnet produces a field of 1.5 T. A weak lab magnet produces 0.15 T. If you place the same wire (same current, same length, perpendicular) in each field, how do the forces compare? No exact calculation needed — just the ratio. (2 steps)", "answer": "- Step 1: Since $$F = BIL$$ and everything except $$B$$ is the same, the force is directly proportional to $$B$$: $$F \\propto B$$.\n- Step 2: The ratio of forces equals the ratio of field strengths: $$\\frac{F_{\\text{strong}}}{F_{\\text{weak}}} = \\frac{1.5}{0.15} = 10$$. The strong magnet produces **10 times** the force on the same wire.\n\nThis illustrates the linear dependence on $$B$$: double the field → double the force; ten times the field → ten times the force. No other factors intervene.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "You have a wire in a magnetic field and you want to double the force on it. You can't change the magnet or the wire's length. What single parameter can you adjust, and by what factor? (2 steps)", "answer": "- Step 1: From $$F = BIL$$, if $$B$$ and $$L$$ are fixed, the only remaining variable is the current $$I$$.\n- Step 2: To double $$F$$, you must double $$I$$: $$F_{\\text{new}} = B(2I)L = 2BIL = 2F$$. Increase the current by a factor of **2**.\n\nThis is why motors have a rated current — pushing more current through makes them spin harder (more force), but also heats the windings more (resistance losses).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A wire 0.3 m long carries 5 A in a 0.2 T field, perpendicular. A second wire 0.6 m long carries 5 A in the same 0.2 T field, also perpendicular. How do the forces compare, and why? (2 steps)", "answer": "- Step 1: Both wires have the same $$B$$ and $$I$$, but the second wire has twice the length in the field: $$L_2 = 2L_1$$.\n- Step 2: $$F = BIL$$, so $$F_2 = BI(2L) = 2(BIL) = 2F_1$$. The second wire experiences **twice the force** because twice the length of wire is being pushed by the field simultaneously.\n\nConceptual intuition: it's like having twice as many people pushing the same object — each metre of wire in the field contributes its own share of force, and more metres means more total force.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A student sees a diagram where the field arrows point upward on the page and the current symbol is a cross (⊗). They want to find the force direction. Walk through the 3-step method. (3 steps)", "answer": "- Step 1: **Field**: the arrows point upward on the page (this could be from a magnet below the page with N pointing up, or any configuration where $$\\vec{B}$$ is upward). Point your first finger upward.\n- Step 2: **Current**: ⊗ = into the page (away from you). Point your second finger into the page (push it forward, away from your face).\n- Step 3: **Force**: on your LEFT hand, first finger up, second finger into the page → your thumb points to the **RIGHT** (→). The force pushes the wire to the right on the page.\n\nCross-product check: $$\\vec{I} = -\\hat{z}$$ (into page), $$\\vec{B} = \\hat{y}$$ (up). $$\\vec{I} \\times \\vec{B} = (-\\hat{z}) \\times \\hat{y} = -(\\hat{z} \\times \\hat{y}) = -(-\\hat{x}) = \\hat{x}$$ = rightward. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Why is it that in all nine grid problems, the formula $$F = BIL$$ (without $$\\sin\\theta$$) could be used directly, even though the full formula is $$F = BIL\\sin\\theta$$? What geometric fact about the diagram setup makes this possible? (2 steps)", "answer": "- Step 1: In every grid problem, the wire is drawn as a dot or cross (viewed end-on, bird's-eye view), meaning the wire runs **perpendicular to the page** — either straight out of the page (⊙) or straight into the page (⊗).\n- Step 2: The field runs **across the page** (horizontally, from N to S). A wire running perpendicular to the page is automatically perpendicular to any field lying in the page plane. So $$\\theta = 90°$$ always, $$\\sin 90° = 1$$, and $$F = BIL$$ applies directly every time.\n\nThis is a deliberate design choice in the grid: the bird's-eye view guarantees perpendicularity. In other problems (like a wire drawn at an angle within the page), you'd need the $$\\sin\\theta$$ factor.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "A circular coil in a *uniform* (non-radial) magnetic field — say, a flat horizontal field pointing right — has current circulating around the loop. At the top, current runs left; at the bottom, current runs right. What are the force directions at top and bottom, and why don't they produce a uniform push like the radial case? (3 steps)", "answer": "- Step 1: At the **top**: current leftward, field rightward. Fleming's LHR: first finger right, second finger left → thumb points **out of the page**. Force is out.\n- Step 2: At the **bottom**: current rightward, field rightward. Fleming's LHR: first finger right, second finger right → these are *parallel*, so the cross product is zero. Wait — actually, the current at the bottom runs rightward, same direction as the field. So $$\\theta = 0°$$ at the bottom, and the force is **zero** (or very small, depending on exact angles).\n- Step 3: More precisely, in a uniform horizontal field, the top and bottom of the coil experience forces in *opposite* out-of-page directions (top: out, bottom: into page) or different magnitudes, creating a **torque** (turning effect) rather than a uniform push. This is exactly how a DC motor works — the coil *rotates* rather than translating. The radial field is special because it eliminates this torque variation and produces a uniform axial push (for a loudspeaker).\n\nThe key contrast: uniform field → torque → rotation (motor); radial field → uniform force → in/out translation (speaker).", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": true}, {"question": "What is the significance of the phrase \"Force, Field, Current\" as Alex's mantra for the lesson? How does it map to Fleming's LHR, and what practical exam mistake does it prevent? (2 steps)", "answer": "- Step 1: \"Force, Field, Current\" maps to **thuMb, First finger, seCond finger** — in that exact order. The mnemonic letters match: thuMb = Motion (force), First = Field, seCond = Current.\n- Step 2: The practical mistake it prevents is **swapping the field and current fingers**. If you point your first finger at the current and your second finger at the field (swapped), the cross product ordering changes from $$I \\times B$$ to $$B \\times I$$, and the force direction flips. Chanting \"Force, Field, Current\" as you physically set each finger forces you to assign them correctly every time.\n\nAlex repeated this mantra constantly throughout the lesson precisely because finger-swapping is one of the most common silent errors — you don't realise you've swapped because the hand \"looks fine,\" but the answer is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "Edge case: a wire is at $$\\theta = 45°$$ to the field. Without calculating an exact number, describe how the force compares to the maximum (perpendicular) case. Is it closer to maximum or closer to zero? (2 steps)", "answer": "- Step 1: $$\\sin 45° \\approx 0.71$$, so the force is about **71%** of the maximum $$BIL$$ value.\n- Step 2: This is significantly closer to the **maximum** than to zero. The force doesn't drop off linearly with angle — the $$\\sin\\theta$$ function means that even at 45° (halfway between 0° and 90° in angle), you still retain most of the force. The force only drops to zero at the extreme case of $$\\theta = 0°$$ (parallel).\n\nKey intuition: $$\\sin\\theta$$ is curved, not linear. Small tilts away from perpendicular don't cost you much force, but small deviations away from parallel (near $$\\theta = 0°$$) create force very rapidly.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "Misconception probe: a student says \"the force on the wire points in the same direction as the magnetic field.\" Why is this fundamentally wrong, and what is the correct geometric relationship between the force and the field? (2 steps)", "answer": "- Step 1: The force is **never** in the same direction as the field (unless the force is zero). The motor-effect force is always **perpendicular** to the field direction — this is a cross-product result: $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$, and a cross product is always perpendicular to both input vectors.\n- Step 2: The correct relationship: the force is perpendicular to *both* the field $$\\vec{B}$$ and the current $$\\vec{I}$$ simultaneously. It points in the *third* direction — the one that is at 90° to both of the other two. In 3D, if the field is along $$\\hat{x}$$ and the current along $$\\hat{z}$$, the force is along $$\\hat{y}$$ — none of them are parallel.\n\nThis is why you need a 3D tool (your hand) to find the force direction — it lives in a direction that isn't the field direction or the current direction, but a new direction perpendicular to both.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": true}, {"question": "Misconception probe: a student says \"if I reverse the current AND reverse the field, the force reverses twice, so it goes back to the original direction — that means the force is unchanged.\" Another student says \"reversing two things should make the force twice as strong.\" Which student is correct about the *direction*, and why is the second student wrong about the *magnitude*? (3 steps)", "answer": "- Step 1: The **first student** is correct about the direction: reversing both $$\\vec{I}$$ and $$\\vec{B}$$ gives $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$ — the two negatives cancel, and the force direction is unchanged.\n- Step 2: The **second student** is wrong about magnitude. Reversing a vector changes its *direction* (sign), not its *magnitude* (size). $$-\\vec{I}$$ has the same magnitude as $$\\vec{I}$$, just opposite direction. So $$|(-\\vec{I}) \\times (-\\vec{B})| = |\\vec{I} \\times \\vec{B}|$$ — the force magnitude is also unchanged, not doubled.\n- Step 3: The complete picture: reversing both inputs leaves *both* the direction and the magnitude of the force **unchanged**. No doubling, no extra reversal. The force is exactly the same as before.\n\nThis is the principle that makes the DC motor work with a commutator: flipping the current each half-turn (while the coil's orientation effectively flips the field relative to the wire) keeps the force consistent.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}, {"question": "A student says: \"A stronger magnet (higher $$B$$) makes the wire accelerate faster.\" Is this correct? What else determines the acceleration, and why might two different wires in the same field accelerate at different rates even if they carry the same current? (3 steps)", "answer": "- Step 1: The statement is *partially* correct: a stronger $$B$$ produces a larger force $$F = BIL$$, and by Newton's second law ($$F = ma$$), a larger force does produce a larger acceleration — *if the mass is the same*.\n- Step 2: The acceleration is $$a = \\frac{F}{m} = \\frac{BIL}{m}$$. It depends on the **mass of the wire** as well as the force. A thicker, heavier wire (more mass) will accelerate more slowly than a thin, light wire, even if both carry the same current in the same field.\n- Step 3: Two wires with the same current in the same field but different masses will experience the *same force* but *different accelerations*. The force depends on $$B$$, $$I$$, and $$L$$ (not mass), but the resulting motion depends on both force and mass.\n\nThe motor effect tells you the *force*, not the *acceleration*. To find acceleration, you need to know the mass too — that's Newton's domain, not Fleming's.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "Synthesis question: A loudspeaker coil in a radial magnet carries AC current. A DC motor coil in a uniform field has a commutator. Both produce continuous motion. Explain the key *difference* in what kind of motion each produces, and how the field geometry enables it. (3 steps)", "answer": "- Step 1: The **loudspeaker** produces **back-and-forth linear motion** (translation in and out). The radial field ensures that at every point on the coil, the force is in the same axial direction (all pushing out, or all pushing in when current reverses). The coil oscillates along one axis — perfect for driving a speaker cone to create sound waves.\n- Step 2: The **DC motor** produces **continuous rotational motion** (spinning). The uniform field means that opposite sides of the coil experience forces in *opposite* directions (one side pushed up, the other pushed down), creating a torque that rotates the coil. The commutator flips the current every half-turn so the torque always drives the same rotational direction.\n- Step 3: The field geometry is the key: **radial field** → forces on all parts of the coil are *parallel* (same direction) → linear push. **Uniform field** → forces on opposite parts of the coil are *antiparallel* (opposite directions) → rotational torque. Same law ($$F = BIL$$, Fleming's LHR), but different field shape → fundamentally different type of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": true}, {"question": "Quick conceptual drill: N on left, S on right, wire ⊗. Force direction? Then: same magnets, wire ⊙. Force direction? What changed and what stayed the same? (2 steps)", "answer": "- Step 1: N left, S right → field rightward. Wire ⊗ (into page): first finger right, second finger into page → thumb **DOWN**.\n- Step 2: Same magnets (field still rightward), wire ⊙ (out of page): first finger right, second finger out of page → thumb **UP**.\n\nWhat changed: the current direction (into → out of page). What stayed the same: the field direction (rightward). Result: force flipped (down → up). This is the \"reverse current → reverse force\" pattern.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Quick conceptual drill: S on left, N on right, wire ⊗. Force direction? Compare to Q59's first case (N left, S right, ⊗ → down). What changed and what stayed the same? (2 steps)", "answer": "- Step 1: S left, N right → field leftward. Wire ⊗ (into page): first finger left, second finger into page → thumb **UP**.\n- Step 2: Compared to Q59's first case (field rightward, ⊗ → down): the current is the same (into page), but the field reversed (right → left). Result: force reversed (down → up). This is the \"reverse magnets → reverse force\" pattern.\n\nSame current, reversed field → reversed force. The cross product confirms: $$(-\\hat{x}) \\times (-\\hat{z}) = \\hat{y}$$ (up), versus $$\\hat{x} \\times (-\\hat{z}) = -\\hat{y}$$ (down).", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "Quick conceptual drill: S on left, N on right, wire ⊙. Force direction? Compare to Q59's second case (N|S, ⊙ → up). Both current and magnets are reversed relative to that case — does the force reverse or stay the same? (2 steps)", "answer": "- Step 1: S left, N right → field leftward. Wire ⊙ (out of page): first finger left, second finger out of page → thumb **DOWN**.\n- Step 2: Compared to Q59's second case (N|S, ⊙ → up): we reversed *both* the magnets (N|S → S|N) and the current direction is the same (⊙), wait — actually the current is the same (⊙ out), but the field reversed. So this is only one reversal (field), and force reversed (up → down).\n\nLet me re-compare to Q59's first case (N|S, ⊗ → down): here we have S|N, ⊙. Both magnets AND current are reversed relative to that case. Result: force is DOWN — same as Q59's first case. **Reverse both → force unchanged.** ✓", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "A student is doing a force-direction problem and their left hand keeps drifting — the first finger tilts out of the page plane instead of staying flat along the field direction on the page. What goes wrong, and how did Alex correct this during the lesson? (2 steps)", "answer": "- Step 1: If the first finger drifts out of the page plane, it's no longer pointing along the *actual* field direction as drawn on the diagram. The finger is now pointing at some angled direction that doesn't match the physics, and the thumb (force) will give a wrong or ambiguous result.\n- Step 2: Alex corrected this twice during the radial problem, saying: \"your field finger needs to go straight up the page, North to South\" and \"parallel with your screen, up the page.\" The fix: keep the first finger **flat to the page** (or screen), pointing exactly along the N→S direction as drawn. Don't let it tilt out of the plane.\n\nThe hand must be a faithful 3D model of the 3D vector relationship. If any finger drifts away from its assigned direction, the model is broken and the answer is unreliable.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "A problem shows a 3D arrangement: magnets tilted at an angle, wire running in an unusual direction. A student panics and says \"Fleming's LHR only works for flat diagrams.\" Is this true? Explain why the rule is actually fully 3D and how to apply it. (2 steps)", "answer": "- Step 1: This is **false**. Fleming's LHR is inherently a **3D rule** — your three fingers represent three mutually perpendicular directions in 3D space. It works for *any* orientation of field and current, not just flat page layouts.\n- Step 2: The method is always the same: identify the *actual* direction of the field (even if tilted), point your first finger along that exact direction. Identify the *actual* direction of the current, point your second finger along it. The thumb gives the force — which may also come out at a diagonal or unusual angle. The rule doesn't change; only the finger alignments change to match the 3D geometry.\n\nThe diagonal problem from the lesson demonstrated exactly this: tilted magnets → tilted field → diagonal force. Same rule, different angles. \"The rule never changes — only the dressing does.\"", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "A student asks: \"Can I just remember that N|S with ⊗ always gives down, and memorise all nine answers?\" Why is this a bad strategy for exams, and what strategy should they use instead? (2 steps)", "answer": "- Step 1: Memorising nine specific answers is brittle — an exam question can present the magnets in a different orientation (vertical, diagonal, 3D), use a curved wire, or give electron flow instead of conventional current. None of these match the memorised grid, and the student would be lost.\n- Step 2: The correct strategy: **learn the 3-step method** (field → current → force via Fleming's LHR) and the underlying principles (dot/cross, N→S, conventional current, perpendicularity). This method works for *any* configuration — flat, tilted, radial, 3D, electron flow, any angle $$\\theta$$. The grid answers are a *practice tool*, not a *memorisation target*.\n\nAlex's point: \"same sort of thing, just looks a bit different… I'm trying to get us into situations we don't quite know.\" The exam will deliberately present unfamiliar geometries to test whether you can *apply* the rule, not whether you can *recall* a grid.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": true}, {"question": "The motor effect formula $$F = BIL\\sin\\theta$$ applies to a current-carrying conductor. There is a closely related formula for a single moving charge: $$F = Bqv\\sin\\theta$$. Explain the conceptual connection — why do these formulas look so similar, and how does a current-carrying wire relate to individual moving charges? (3 steps)", "answer": "- Step 1: A current $$I$$ in a wire is really just **many individual charges** flowing with drift velocity $$v$$. If each charge $$q$$ moving at speed $$v$$ in field $$B$$ feels a force $$F = Bqv\\sin\\theta$$, then the total force on all the charges in length $$L$$ of wire is the sum of all these individual forces.\n- Step 2: The number of charges in length $$L$$ depends on the charge density and cross-section, but the current $$I$$ is defined as total charge passing per second: $$I = nqvA$$ (where $$n$$ is charge carrier density, $$A$$ is cross-sectional area). The total force on length $$L$$ becomes $$F = BIL\\sin\\theta$$ when you sum up all the individual $$Bqv$$ forces.\n- Step 3: So $$F = BIL\\sin\\theta$$ is really just $$F = Bqv\\sin\\theta$$ *aggregated over all the moving charges in the wire*. The wire formula is the macroscopic version; the charge formula is the microscopic version. Both use Fleming's LHR for direction, and both have the same $$\\sin\\theta$$ factor for the same geometric reason (only the perpendicular component of the field matters).\n\nThis connection is listed in the Edexcel Data Booklet: both formulas appear together (statements 106 and 107).", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": true}, {"question": "A wire carries zero current ($$I = 0$$) but sits in a strong magnetic field. What is the force on the wire? Explain why, and connect this to the definition of $$B$$. (2 steps)", "answer": "- Step 1: $$F = BIL\\sin\\theta = B \\times 0 \\times L \\times \\sin\\theta = 0\\;\\text{N}$$. No current → no force, regardless of how strong the field is.\n- Step 2: This makes physical sense: the motor effect is the field pushing on *moving charges*. If there's no current (no charges flowing), there's nothing for the field to push on. The definition $$B = F/(IL)$$ requires both $$I > 0$$ and $$L > 0$$ — you can't measure $$B$$ by placing a dead wire in the field and feeling for a force.\n\nA magnet sitting in a field with no current feels no motor-effect force. (It might feel other magnetic forces — attraction/repulsion to other magnets — but those are different physics, not the motor effect.)", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "Synthesis: A student understands $$F = BIL$$ and Fleming's LHR separately, but hasn't connected them. Explain why the *magnitude* formula and the *direction* rule are really two parts of the same physical law, and what would be inconsistent if you used one without the other. (3 steps)", "answer": "- Step 1: The full motor-effect law is a *vector* equation: $$\\vec{F} = IL\\vec{I_{\\text{dir}}} \\times \\vec{B}$$ (cross product). The magnitude formula $$F = BIL\\sin\\theta$$ gives the *size* of this vector (the cross product magnitude). Fleming's LHR gives the *direction* of this vector (the cross product direction). They are the magnitude and direction of the *same* vector.\n- Step 2: If you used only the magnitude formula, you could calculate how *strong* the push is, but you'd have no idea which *way* the wire moves. If you used only Fleming's LHR, you'd know the direction but not whether the force is strong enough to actually move the wire.\n- Step 3: An inconsistency would arise if you used the wrong hand for direction but the correct formula for magnitude: you'd calculate $$F = 2.4\\;\\text{N}$$ (correct size) but claim it pushes upward when it actually pushes downward. The magnitude is right but the direction is wrong — the vector is wrong. Both parts must agree.\n\nThe motor effect is one phenomenon with two aspects: how hard (formula) and which way (Fleming). You need both for a complete answer.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": true}], "count": 67}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Magnetic flux density $$B$$ is defined through the motor effect formula. What is the operational definition of $$B$$, and why is it defined this way rather than as \"how strong the magnet feels\"? (2 steps)", "answer": "- Step 1: The operational definition comes from rearranging $$F = BIL$$ (perpendicular case): $$B = \\frac{F}{IL}$$. This means $$B$$ is defined as **the force per unit current per unit length** on a straight wire placed perpendicular to the field. You literally measure the force on a known current in a known length of wire, and divide — that gives you $$B$$.\n- Step 2: Why define it this way? Because \"field strength\" is invisible — you can't measure it directly. But you *can* measure a force on a wire with an ammeter and a ruler. The definition ties the abstract quantity $$B$$ to something measurable. This is the same logic as defining electric field $$E = \\frac{F}{q}$$ — force on a test charge, per charge.\n\nTakeaway: $$B$$ is not \"how the magnet feels\" — it's the force-per-current-per-length that the field *produces* on a test wire.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "The SI unit of magnetic flux density is the tesla (T). What does 1 T decompose into in terms of newtons, amperes, and metres, and what does this decomposition reveal about what a tesla physically represents?", "answer": "From $$B = \\frac{F}{IL}$$, substituting SI units: $$1 \\text{ T} = \\frac{1 \\text{ N}}{1 \\text{ A} \\times 1 \\text{ m}} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$.\n\nThis decomposition tells you exactly what one tesla means physically: **a field of 1 T produces a force of 1 N on a 1-metre wire carrying 1 A, when the wire is perpendicular to the field.** The tesla is just a shorthand name for N A⁻¹ m⁻¹ — it wraps three familiar units into one convenient label.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Magnetic flux density $$B$$ is a vector, not just a number. What does the direction of $$B$$ represent physically, and why does this matter for the motor effect?", "answer": "The direction of $$B$$ is the direction a free North pole would be pushed — i.e., the direction of the field line at that point. Since field lines run from N to S (outside the magnet), $$B$$ points from N towards S.\n\nThis matters for the motor effect because the force depends on the *angle between* the current direction and the field direction ($$\\theta$$ in $$F = BIL\\sin\\theta$$). If $$B$$ were just a number with no direction, there would be no angle to measure, no $$\\sin\\theta$$ factor, and no Fleming's rule. The vector nature of $$B$$ is what makes the force directional and three-dimensional.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "The Earth's magnetic field in London is roughly 50 μT, while a lab U-magnet produces a field of roughly 0.1–0.5 T. Roughly how many times stronger is the U-magnet than the Earth's field, and what does this imply about using the Earth's field for motor-effect experiments?", "answer": "Convert to the same units: 50 μT = 50 × 10⁻⁶ T = 5 × 10⁻⁵ T. A U-magnet at ~0.3 T is about $$\\frac{0.3}{5 \\times 10^{-5}} = 6000$$ times stronger.\n\nThis means the Earth's field is far too weak to produce a noticeable motor-effect force on a lab wire. You need the concentrated field between magnet poles — thousands of times stronger — to get forces you can actually measure with a balance or see as visible wire deflection. The Earth's field can deflect a compass needle (which is tiny and lightweight), but not a chunk of copper wire carrying a few amps.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "In the formula $$F = BIL$$ (perpendicular case), what does each symbol represent physically, and what are their SI units?", "answer": "Each symbol and its meaning:\n- $$F$$: the **force** on the wire due to the magnetic field — the \"push\" the motor effect produces. Unit: newtons (N).\n- $$B$$: **magnetic flux density** — the strength of the field the wire sits in. Unit: tesla (T).\n- $$I$$: **current** flowing through the wire — the rate of charge flow. Unit: amperes (A).\n- $$L$$: **length of wire** that is actually inside the magnetic field — only the portion sitting in the field contributes. Unit: metres (m).\n\nKey nuance: $$L$$ is not the total wire length — it's only the length *within the field region*. Wire outside the magnets experiences no force from that field.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "The formula $$F = BIL$$ is a special case of the more general $$F = BIL\\sin\\theta$$. What specific condition about the wire's orientation makes the simplified $$F = BIL$$ valid?", "answer": "$$F = BIL$$ applies only when the wire is **perpendicular** to the magnetic field, meaning $$\\theta = 90°$$ between the current direction and the field direction. At $$\\theta = 90°$$, $$\\sin 90° = 1$$, so the $$\\sin\\theta$$ factor disappears and you get the maximum force $$F = BIL$$.\n\nIn all 9 grid problems from the lesson, the wire (shown as a dot or cross, meaning it runs perpendicular to the page) sits between horizontal magnets — the wire is perpendicular to the field by construction, so $$F = BIL$$ applies to every one.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Alex's notes list three physical ways to increase the motor-effect force on a wire. What are they, and how does each map to a variable in $$F = BIL$$?", "answer": "The three ways, each corresponding to one factor in the formula:\n1. **Stronger magnets** → increases $$B$$. A bigger magnetic flux density means a stronger field pushing on the wire.\n2. **More current** → increases $$I$$. More charge flowing means more \"stuff\" for the field to push on.\n3. **Longer wire in the field** → increases $$L$$. More length sitting between the magnets means more wire experiencing the push.\n\nThe formula makes this transparent: $$F = B \\times I \\times L$$ — increase any one factor and the force scales up proportionally. Double the current → double the force. Triple the field → triple the force.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "In the general formula $$F = BIL\\sin\\theta$$, what exactly does the angle $$\\theta$$ measure? Be specific — it is the angle between which two things?", "answer": "$$\\theta$$ is the angle **between the direction of the current** (i.e., the wire's orientation) **and the direction of the magnetic field** $$B$$.\n\nIt is NOT the angle between the force and the field, nor the angle between the force and the current, nor the angle the wire makes with the horizontal. It is specifically the angle where the current vector and the field vector meet. When they're at 90° to each other, $$\\theta = 90°$$ and the force is maximum; when they're aligned (parallel), $$\\theta = 0°$$ and there's no force at all.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Why does the general formula contain $$\\sin\\theta$$ rather than $$\\cos\\theta$$? Explain using the \"only the perpendicular bit counts\" argument. (3 steps)", "answer": "- Step 1: The motor-effect force arises from the component of the magnetic field that is **perpendicular** (across) the wire. Call this $$B_\\perp$$. A field running along the wire (parallel to the current) produces no force — it just \"slides past\" the charges without pushing them sideways.\n- Step 2: When the field makes angle $$\\theta$$ with the wire, the perpendicular component is $$B_\\perp = B\\sin\\theta$$ (the \"opposite side\" of the right triangle formed by decomposing $$B$$). The parallel component is $$B_\\parallel = B\\cos\\theta$$, which contributes zero force.\n- Step 3: Substituting $$B_\\perp$$ into the perpendicular-case formula: $$F = B_\\perp IL = (B\\sin\\theta)(IL) = BIL\\sin\\theta$$.\n\nTakeaway: $$\\sin\\theta$$ appears because we need the perpendicular component of the field, and perpendicular = sine in the standard angle convention. If someone defined $$\\theta$$ as the angle from the perpendicular instead, it would be $$\\cos$$ — but the standard convention is angle from parallel, so it's $$\\sin$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A wire carrying current runs exactly parallel to the magnetic field direction ($$\\theta = 0°$$). What is the force on the wire, and give two ways to explain why? (2 steps)", "answer": "- Step 1: The force is **zero**. From the formula: $$F = BIL\\sin 0° = BIL \\times 0 = 0$$.\n- Step 2: Two conceptual explanations:\n  + **Component argument:** When $$\\theta = 0°$$, the perpendicular component of the field is $$B_\\perp = B\\sin 0° = 0$$. There is no field across the wire, so nothing pushes the charges sideways.\n  + **Fleming's rule argument:** If the current and field point along the same line, you can't form a perpendicular force — the force must be perpendicular to *both*, but when two vectors are parallel, there's no unique perpendicular direction. The cross product $$\\vec{I} \\times \\vec{B}$$ is zero when the vectors are parallel.\n\nTakeaway: Parallel alignment = zero force. This is why you must angle the wire relative to the field to get a motor effect.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When $$\\theta = 90°$$, the force reaches its maximum $$F = BIL$$. Explain why this is the maximum possible force for given values of $$B$$, $$I$$, and $$L$$, using two different lines of reasoning.", "answer": "**Formula reasoning:** $$\\sin\\theta$$ ranges from 0 to 1. Its maximum value is 1, reached at $$\\theta = 90°$$. So $$F = BIL\\sin\\theta \\leq BIL$$ — you can never exceed $$BIL$$.\n\n**Physical reasoning:** At $$\\theta = 90°$$, the entire field $$B$$ is perpendicular to the wire — the full field strength is \"across\" the current, maximally pushing the charges sideways. At any other angle, some of the field is wasted running along the wire (the parallel component $$B_\\cos\\theta$$), which produces no force. Only the perpendicular slice $$B\\sin\\theta$$ does useful work. When $$\\theta = 90°$$, nothing is wasted — 100% of $$B$$ is perpendicular.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Fleming's left-hand rule assigns three physical quantities to three digits of the left hand. Which digit (first finger, second finger, thumb) maps to which quantity (Field $$B$$, Current $$I$$, Force/Motion $$F$$), and what is the memory hook for each?", "answer": "The assignments and their hooks:\n- **First finger (index finger)** → **Field** $$B$$ (direction $$N \\to S$$). Hook: **F**irst = **F**ield.\n- **seCond finger (middle finger)** → **Current** $$I$$ (conventional, + to −). Hook: se**C**ond = **C**urrent.\n- **thuMb** → **Motion/Force** $$F$$ (the \"thrust\"). Hook: thu**Mb** = **M**otion.\n\nThe three fingers must be held at right angles to each other — reflecting the fact that the force is perpendicular to both the field and the current. Alex's mantra \"Force, Field, Current\" maps to thuMb, First, seCond — chanting this order stops you swapping fingers.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Why must Fleming's rule use the LEFT hand specifically? What would go wrong if you used your right hand, and what is the right hand used for in electromagnetism? (2 steps)", "answer": "- Step 1: The left hand encodes the direction of the cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ (current cross field). This is a left-hand convention for the motor effect — the force on a current in a field. If you swap to the right hand, you're computing $$\\vec{B} \\times \\vec{I}$$ instead of $$\\vec{I} \\times \\vec{B}$$, which gives the **opposite** direction. Your force answer flips — you'd get UP where it should be DOWN, etc.\n- Step 2: The RIGHT hand is used for a different physics — the **corkscrew/grip rule** for the magnetic field *produced by* a current (field around a wire). That's a creation rule (current → field), not a force rule (current + field → force). Mixing them up reverses your answer.\n\nTakeaway: Left = force on a current (motor effect). Right = field created by a current. Don't mix them.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "The motor-effect force is always perpendicular to both the magnetic field and the current. What mathematical operation captures this \"perpendicular to both\" property, and how does this explain why you need a 3D hand gesture? (2 steps)", "answer": "- Step 1: The **vector cross product** $$\\vec{I} \\times \\vec{B}$$ produces a vector that is perpendicular to both inputs. The magnitude is $$|\\vec{I}||\\vec{B}|\\sin\\theta$$ (where $$\\theta$$ is the angle between them), and the direction follows a left-hand rule. This is exactly $$F \\propto IL\\sin\\theta$$ with Fleming's direction.\n- Step 2: A cross product takes two vectors in a plane and produces a third vector pointing *out of that plane*. This is inherently 3D — you can't represent it with a flat diagram alone. Your hand is a 3D object: the three fingers at right angles represent three mutually perpendicular directions in space, which is exactly what the cross product requires. A flat 2D sketch can show two of the three directions, but the third (the force) inevitably points \"out of\" or \"into\" the page — hence the need for dots, crosses, and a physical hand gesture.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Fleming's left-hand rule uses conventional current (positive charge flow, + to −), not electron flow. If a question states \"electrons flow to the left,\" what must you do before applying the rule, and why?", "answer": "You must **flip the direction** before pointing your second finger. Electrons are negative charges, so they drift opposite to conventional current. \"Electrons flow left\" means conventional current flows **right** — point your second finger right, not left.\n\nWhy: Fleming's rule was derived from the force on positive charges moving in a field ($$\\vec{F} = q\\vec{v} \\times \\vec{B}$$ with $$q > 0$$). For negative charges, the force flips because $$q$$ is negative: $$\\vec{F} = (-|q|)\\vec{v} \\times \\vec{B}$$ reverses direction. But rather than remembering \"flip the force at the end,\" it's simpler to flip the current at the start: use conventional current direction, then apply the rule normally. Edexcel explicitly states: \"the left-hand rule applies to the sense of conventional current…not the direction of motion of negatively charged electrons.
