his relate to the motor effect when an external field is applied? (3 steps)", "answer": "- Step 1: A moving charge generates a magnetic field around itself. A current is a stream of moving charges, so a current-carrying wire is surrounded by a magnetic field that loops around it in circles (right-hand grip rule — thumb along current, fingers curl in the field direction).\n- Step 2: When this wire is placed inside an **external** field, the wire's own circular field and the external field **superpose**. On one side of the wire the two fields add (stronger total field); on the other side they subtract (weaker total field).\n- Step 3: This asymmetry — field bunched up on one side, sparse on the other — is what physically pushes the wire towards the weaker-field side. The motor effect can be understood as the wire being squeezed sideways by the imbalance in field-line density it creates around itself.\n\nThis is the deeper \"why\" behind $$F = BIL$$: the formula just quantifies the squeeze.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "What three factors can be changed to increase the force on a current-carrying wire in a magnetic field, and what's the proportionality of each?", "answer": "Looking at $$F = BIL$$, the force scales **linearly** with each of three quantities:\n- A **stronger magnet** (larger $$B$$) — doubling $$B$$ doubles $$F$$.\n- A **larger current** (larger $$I$$) — doubling $$I$$ doubles $$F$$.\n- A **longer length of wire in the field** (larger $$L$$) — doubling the length of wire inside the field doubles $$F$$.\n\nAll three are independent linear levers. So if you want a 10× stronger force, you could (for example) double $$B$$, increase $$I$$ by 5×, and keep $$L$$ the same — any combination that multiplies to 10. This is why real motors use strong magnets, high currents, and many turns of wire (each turn adds to the effective $$L$$).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "A wire passes between angled (tilted) magnets, so the field line through the gap is along a diagonal rather than horizontal or vertical. Does Fleming's rule still work, and if so, how do you apply it? (3 steps)", "answer": "- Step 1: Yes — Fleming's left-hand rule works at **any** angle. The rule is geometric, not tied to vertical/horizontal axes.\n- Step 2: The key adjustment: align your **first finger with the actual field direction** (along the diagonal N → S line), not with \"up the page\" by default.\n- Step 3: With the first finger tilted along the diagonal field and the second finger along the current direction, the thumb naturally points along the force — which will also come out at a diagonal, perpendicular to both the field and the current.\n\nThe lesson: don't let the orientation of the page bias your hand. Always align first finger to the **real** field direction, no matter how that's drawn.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "In a \"bird's-eye view\" diagram of a wire between two magnets, the force usually comes out as up or down on the page rather than into or out of the page. Why is this geometrically the case? (3 steps)", "answer": "- Step 1: In a bird's-eye view, the wire is shown **end-on** (you see the end of the wire as a dot or cross), so the current is flowing into or out of the page.\n- Step 2: The magnetic field, meanwhile, runs **across the page** (left or right) from one pole to the other — it lies in the plane of the page.\n- Step 3: The force must be perpendicular to **both** the field and the current. If the current is into/out of the page (perpendicular to the page) and the field is left/right (in the page), then the only remaining perpendicular direction is **up/down within the page**. That's why bird's-eye motor-effect problems always give up/down forces.\n\nIf instead the current were in the plane of the page (e.g. the radial coil viewed from above), the force could come out of the page — but for these end-on diagrams, force is always vertical on the page.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Suppose a wire carries a current of 3 A through 2 m of length inside a 0.4 T magnetic field, perpendicular to the field. Walk through how to find the force conceptually. (3 steps)", "answer": "- Step 1: The wire is perpendicular to the field, so $$\\theta = 90°$$ and we use $$F = BIL$$ with no sine factor.\n- Step 2: Substitute: $$F = 0.4 \\times 3 \\times 2$$. Mentally: $$0.4 \\times 3 = 1.2$$, then $$1.2 \\times 2 = 2.4$$.\n- Step 3: So $$F = 2.4\\,\\text{N}$$. Notice how a fairly modest current and a few metres of wire in a sub-tesla field give a force on the order of a couple of newtons — comparable to the weight of a small object. This is why bench-scale motor-effect demos are so visible.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Why is it not just acceptable but actually expected for students to physically make the Fleming's left-hand gesture during an exam?", "answer": "Because Fleming's rule is fundamentally a **3-D geometric** statement that can't easily be visualised on flat paper — the force, field, and current are all mutually perpendicular, which is exactly what your three fingers naturally form. Using your hand is the rule. As Alex put it: \"you certainly in the exam room and you see people doing this\" — examiners expect it. Trying to do it purely in your head invites errors (especially flipping a sign or swapping a finger). Always physically set up the hand, chant \"Force, Field, Current\" as you assign the fingers, and read off the answer. There's no embarrassment — everyone does it, and it's the correct method.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "What is the relationship between Fleming's left-hand rule and the vector cross product, and why does this connection guarantee the rule is mathematically rigorous? (3 steps)", "answer": "- Step 1: The force on a current-carrying wire is given by the vector equation $$\\mathbf{F} = I\\mathbf{L} \\times \\mathbf{B}$$, where $$\\mathbf{L}$$ is a vector along the wire in the current direction and $$\\mathbf{B}$$ is the field vector.\n- Step 2: The cross product produces a vector **perpendicular to both** input vectors, with magnitude $$|\\mathbf{L}||\\mathbf{B}|\\sin\\theta$$ — which is exactly $$BL\\sin\\theta$$, matching $$F = BIL\\sin\\theta$$.\n- Step 3: The **direction** of $$\\mathbf{I} \\times \\mathbf{B}$$ follows the right-hand rule of cross products — but because we're handling conventional positive current, the way the geometry resolves on your hand corresponds to the **left**-hand configuration in Fleming's rule. So Fleming's left hand is a physical mnemonic for evaluating $$\\mathbf{I} \\times \\mathbf{B}$$.\n\nThis is why every answer in the lesson could be independently verified via $$\\mathbf{I} \\times \\mathbf{B}$$ — the rule and the cross product are the same thing.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "A wire carries current in the plane of the page, pointing to the right. The magnetic field points into the page. Which way is the force? (3 steps)", "answer": "- Step 1: Current direction: right (in the plane of the page).\n- Step 2: Field direction: into the page ($$\\otimes$$).\n- Step 3: Apply Fleming's: first finger into page, second finger right, thumb points **upwards** ($$\\uparrow$$) in the plane of the page. Cross-product check: right × in = up. ✓\n\nForce: **upward** on the page.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A question states: \"Electrons flow to the left along a horizontal wire. The magnetic field points into the page. Which way is the force on the wire?\" Walk through the reasoning. (3 steps)", "answer": "- Step 1: **Convert to conventional current first.** Electrons go left ⇒ conventional current goes **right** (opposite, because electrons are negative).\n- Step 2: Now apply Fleming's left-hand rule with conventional current = right and field = into the page. First finger into page, second finger right.\n- Step 3: Thumb points **up** ($$\\uparrow$$). So the force on the wire is **upward**.\n\nTrap: if you'd forgotten the flip and used electron direction as the current direction, you'd have predicted **downward** — exactly the wrong answer. Always convert to conventional current before pointing the second finger.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What happens to the force on a coil in a magnetic field as the coil rotates, and how is this problem solved in a practical DC motor? (3 steps)", "answer": "- Step 1: As a current-carrying coil rotates in a fixed magnetic field, the wires that were initially on (say) the left of the field are now on the right after half a rotation. The current is still flowing in the same direction relative to the coil, but relative to the field, it's now flowing the opposite way through the same region of field.\n- Step 2: By the \"reverse the geometry\" pattern, this would reverse the force — meaning the coil would now experience a torque trying to **stop** the rotation, then push it backwards. Without intervention, the motor would oscillate or stall.\n- Step 3: A **split-ring commutator** solves this by mechanically reversing the current direction every half-rotation. The reversal of current cancels the reversal-from-rotation, so the net torque on the coil keeps driving it the same way round → continuous spinning.\n\nThis is exactly the application of \"reverse both ⇒ unchanged\" from the motor-effect rules.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why is the motor effect \"self-consistent\" in the sense that a current-carrying wire in its **own** magnetic field doesn't push itself? (3 steps)", "answer": "- Step 1: A straight current-carrying wire produces a magnetic field that wraps around it in circles, with the wire itself at the centre.\n- Step 2: At the location of the wire, this self-generated field is essentially **parallel** to the wire (well, more precisely it's zero on the axis of an idealised line current, and tangent to circles around it — but never has a component perpendicular to itself that acts on its own location).\n- Step 3: Since the force is $$F = BIL\\sin\\theta$$ and the wire is \"parallel\" to its own field at its own location, $$\\sin\\theta = 0$$, and there's no self-force. A wire can only be pushed by an **external** field, not by its own. This is essential — otherwise wires would spontaneously accelerate themselves, violating conservation of momentum.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Consider a U-shaped wire (a horseshoe of wire) with current flowing around it, placed in a uniform magnetic field. Why do the two parallel sides experience opposite forces, and what does this produce? (3 steps)", "answer": "- Step 1: The two parallel sides of the U carry current in **opposite directions** (current flows up one side and down the other, by continuity of the circuit).\n- Step 2: Both sides sit in the same external field $$B$$, but because the current directions are reversed between them, applying Fleming's rule to each gives **opposite force directions** — one side pushed up, the other pushed down (or one in, one out).\n- Step 3: Two equal-and-opposite forces acting on different parts of a rigid object produce a **couple** — a pure torque with no net translation. This torque is what makes the coil rotate, and is the fundamental mechanism inside every electric motor.\n\nThis is also why motors use coils, not just single straight wires: a coil naturally produces torque, not just translation.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "If you double the number of turns in a coil while keeping current the same, what happens to the force/torque, and why? (3 steps)", "answer": "- Step 1: Each turn of the coil carries the same current $$I$$ and has effective length $$L$$ inside the field. By $$F = BIL$$, each turn experiences the same force.\n- Step 2: With $$N$$ turns, you effectively have $$N$$ parallel wires each contributing the same force. The total force (and the torque on the coil) scales linearly with $$N$$.\n- Step 3: So doubling the number of turns doubles the total force/torque. This is why motors and electromagnets use many turns of wire: it's a cheap way to multiply the mechanical effect without needing a stronger magnet or higher current.\n\nA subtle point: in the formula, you can think of \"$$L$$\" as the total length of wire in the field, so a coil with $$N$$ turns of length $$\\ell$$ each effectively has $$L = N\\ell$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why doesn't the force on a current-carrying wire depend on the wire's thickness or material (within the formula $$F = BIL$$)? (3 steps)", "answer": "- Step 1: The motor-effect force ultimately arises from the magnetic force on each moving charge carrier in the wire, summed up. The total force depends on how many charges are moving and how fast — but those combine to give the current $$I$$.\n- Step 2: A thick wire can carry more current (lower resistance) but if you specify $$I$$ directly, the thickness is already accounted for. Similarly, material matters for resistance but not for the force once $$I$$ is known.\n- Step 3: So $$F = BIL$$ depends only on:\n+ How strong the field is ($$B$$)\n+ How much charge per second is flowing ($$I$$)\n+ How long the wire's exposure to the field is ($$L$$)\n\nThickness and material affect what current you **can** drive through with a given voltage, but not the force per amp.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "A circular coil of current sits in a **uniform** (non-radial) magnetic field. Will every point of the coil experience a force in the same direction? Why does this differ from the loudspeaker (radial) geometry? (3 steps)", "answer": "- Step 1: In a **uniform** field, the field direction is the same everywhere, but the **current direction varies** around the coil (tangential at every point, but rotating).\n- Step 2: At different points on the coil, applying Fleming's gives different force directions. For example, at the top of the coil the force might push up and out; at the bottom, push down and in. The forces don't all add up in one direction — they tend to **twist** the coil (creating a torque), and net translational force often cancels.\n- Step 3: In the **radial** (loudspeaker) field, both the field and the current rotate **together** around the coil. Their relative orientation is the same at every point, so Fleming's gives the same answer everywhere — and the forces all add up coherently in one direction (axial). That's why radial geometry produces translation (in/out motion), while uniform geometry produces rotation (torque).\n\nThis is the geometric insight behind why speakers use radial magnets but motors use uniform-field magnets.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "What's the difference between $$F = BIL\\sin\\theta$$ (force on a current) and $$F = Bqv\\sin\\theta$$ (force on a moving charge), and why is one essentially a consequence of the other? (3 steps)", "answer": "- Step 1: $$F = Bqv\\sin\\theta$$ gives the force on a single charge $$q$$ moving with velocity $$v$$ through a field $$B$$, at angle $$\\theta$$ to the field.\n- Step 2: A current in a wire is a stream of moving charges. If $$n$$ is the charge density and $$A$$ is the wire's cross-sectional area, the current is $$I = nAqv$$. The total number of charges in length $$L$$ is $$nAL$$, each feeling $$Bqv\\sin\\theta$$.\n- Step 3: Summing: total force $$= (nAL)(Bqv\\sin\\theta) = B(nAqv)L\\sin\\theta = BIL\\sin\\theta$$. So the force on a current is just the sum of the forces on all the individual moving charges inside it. $$F = BIL$$ is $$F = Bqv$$ in collective form.\n\nBoth use Fleming's left-hand rule for direction.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Identify the common misconception traps in motor-effect direction problems and what each one does to your answer. (3 steps)", "answer": "- Step 1: **Dot/cross swapped.** $$\\odot$$ is OUT, $$\\otimes$$ is IN. Swapping these reverses the current finger ⇒ reverses the force.\n- Step 2: **Right hand instead of left.** Using the right hand flips the force direction. For the motor effect on conventional current, always LEFT.\n- Step 3: **Other traps:**\n+ Forgetting to flip electron-flow to conventional current ⇒ force reversed.\n+ Forgetting $$\\sin\\theta$$ when wire isn't perpendicular ⇒ overestimated force.\n+ Drawing the field arrow the wrong way (S→N instead of N→S) ⇒ force reversed.\n+ Confusing \"out of page\" with \"up on the page\" when describing the force direction in bird's-eye view.\n\nEach of these single mistakes typically just **reverses** the answer, so they're easy to fix if you catch them — but easy to miss if you don't double-check.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "In the limit where a wire is nearly parallel to the field (small $$\\theta$$), how does the force scale with $$\\theta$$, and what's the intuition? (3 steps)", "answer": "- Step 1: For small angles, $$\\sin\\theta \\approx \\theta$$ (in radians). So $$F \\approx BIL\\theta$$ — the force grows **linearly** with the small tilt away from parallel.\n- Step 2: This means tiny misalignments give tiny forces. A wire 1° off from parallel feels only about 1.7% of the maximum force.\n- Step 3: Intuition: at $$\\theta = 0$$, the field has zero perpendicular component, so no force. As you tilt slightly, a small perpendicular component appears — and only that component does work. The force grows in proportion to how much perpendicular field you've \"uncovered\" by tilting.\n\nContrast: near $$\\theta = 90°$$, the force is at maximum and **insensitive** to small variations in angle (because $$\\sin$$ is flat at its peak). So perpendicular alignment is the robust regime; near-parallel alignment is the fragile regime.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "When are the \"reverse both\" and \"reverse one\" patterns useful in solving multi-step Fleming problems quickly? Give a concrete example of using them. (3 steps)", "answer": "- Step 1: Once you've solved one configuration carefully, you can derive related ones instantly by applying:\n+ Reverse current only ⇒ flip the force.\n+ Reverse magnets only ⇒ flip the force.\n+ Reverse both ⇒ force unchanged.\n- Step 2: Example: from the lesson grid, Problem 1 (N|S, current in, force down) immediately tells you:\n+ Problem 2 (same magnets, current reversed) → force **up** (reversed once).\n+ Problem 9 (magnets reversed, current also reversed compared to P1) → force still **down** (reversed twice, cancels). Actually wait — P9 has S|N and current out, so compared to P1 (N|S, in), both are flipped ⇒ same force → down. ✓\n- Step 3: This is a quick sanity check: when scanning a grid of problems, you don't need to set up your hand for every cell — you can derive most from one or two anchor solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why does the magnetic force on a current never do work on the wire as a whole in the direction of current flow, only in the perpendicular direction?", "answer": "Because the force is always perpendicular to both the current and the field by the cross-product structure $$\\mathbf{F} \\propto \\mathbf{I} \\times \\mathbf{B}$$. Perpendicularity to the current means: along the direction the charges are moving (i.e. along the wire), the magnetic force has zero component. So the magnetic force can't speed up or slow down the charges within the wire — it can only push the wire sideways. This is why the motor effect produces **mechanical motion of the wire** (in the perpendicular direction) but doesn't change the current itself. Energy flows from the electrical circuit into mechanical work done by displacing the wire sideways, not from the field directly speeding up the electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "A wire of length 0.20 m carrying 5.0 A is parallel to a 0.30 T magnetic field. What is the force on it, and what's the conceptual reason? (2 steps)", "answer": "- Step 1: The wire is parallel to the field, so $$\\theta = 0°$$ and $$\\sin\\theta = 0$$.\n- Step 2: $$F = BIL\\sin\\theta = 0.30 \\times 5.0 \\times 0.20 \\times 0 = 0\\,\\text{N}$$.\n\nConceptual reason: a field running along the wire has no perpendicular component, so it can't push the charges sideways. No matter how strong $$B$$ is or how large $$I$$ is, a parallel field exerts no force on a current.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}], "count": 40}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 9431, "out_tokens": 22161, "reasoning_chars": 9576, "cost_eur": 0.0805, "elapsed_s": 346, "content_chars": 75534}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 9431, "out_tokens": 15690, "reasoning_chars": 12981, "cost_eur": 0.0596, "elapsed_s": 249, "content_chars": 49174}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 9431, "out_tokens": 5903, "reasoning_chars": 7059, "cost_eur": 0.0281, "elapsed_s": 138, "content_chars": 15243}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 9244, "out_tokens": 5915, "reasoning_ const SK='phys_motor_effect_jun19';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
