<script>
const cards = [{"q": "What physical quantity does magnetic flux density $$B$$ measure, and how is it operationally defined? Why is the definition tied to a force on a wire rather than something more abstract? (3 steps)", "a": "- Step 1: Magnetic flux density $$B$$ measures the *strength* of a magnetic field \u2014 how strongly the field pushes on things. It is operationally defined through the force on a current-carrying wire: when a wire of length $$L$$ carrying current $$I$$ sits perpendicular to the field, the force on it is $$F = BIL$$. Rearranging gives $$B = \\frac{F}{IL}$$.\n- Step 2: Why tie it to a force? Because what we actually *observe* and *measure* in a lab is a force \u2014 we hang a wire between magnets, send current through it, and read the force on a balance. We can't directly \"see\" a magnetic field; we infer its strength from what it *does*. The definition makes $$B$$ measurable, not just conceptual.\n+ If the field were defined abstractly (e.g., \"number of field lines per area\"), we'd still need a way to *count* those lines \u2014 which circles back to observing forces anyway.\n- Step 3: This definition also tells you the SI unit: $$1 \\text{ T} = 1 \\text{ N A}^{-1} \\text{ m}^{-1}$$ \u2014 one tesla is the flux density that produces one newton of force on a one-metre wire carrying one ampere perpendicular to the field.\n\nThe takeaway: $$B$$ is defined by what the field *does* (pushes), not by what it *is* \u2014 and that makes it experimentally accessible.", "source": "GLM 5.1"}, {"q": "A tesla is expressed in derived SI units as $$\\text{N A}^{-1} \\text{ m}^{-1}$$. Walk through why these particular units appear, starting from the defining equation. (3 steps)", "a": "- Step 1: Start from the perpendicular-case definition: $$B = \\frac{F}{IL}$$.\n- Step 2: Substitute the SI units of each variable: $$F$$ is in newtons (N), $$I$$ is in amperes (A), $$L$$ is in metres (m). So $$B = \\frac{\\text{N}}{\\text{A} \\times \\text{m}} = \\text{N A}^{-1} \\text{ m}^{-1}$$.\n+ The ampere and metre are base SI units; the newton is itself derived ($$\\text{N} = \\text{kg m s}^{-2}$$), so a tesla could also be written $$\\text{kg s}^{-2} \\text{ A}^{-1}$$ \u2014 but the N/A\u00b7m form is more intuitive because it directly reflects the force-per-current-per-length definition.\n- Step 3: \"Tesla\" is just a convenient name for this combination. It tells you: one tesla is strong enough to produce 1 N of force on a 1 m wire with 1 A of current perpendicular to the field. For scale, Earth's field is ~50 \u03bcT (tiny), while a typical lab U-magnet is a fraction of a tesla \u2014 thousands of times stronger.", "source": "GLM 5.1"}, {"q": "Is magnetic flux density $$B$$ a scalar or a vector? What does its direction represent physically, and why does that matter for the motor effect? (2 steps)", "a": "- Step 1: $$B$$ is a *vector*. Its direction is the direction a free North pole would be pushed \u2014 which is the same as the direction of the field lines (from N to S outside the magnet). This is why we say \"the field points from N to S.\"\n- Step 2: The vector nature matters because the force depends on the *angle* between the current direction and the field direction. If $$B$$ were just a number (scalar), there'd be no notion of \"perpendicular\" or \"parallel\" \u2014 and the $$\\sin\\theta$$ in $$F = BIL\\sin\\theta$$ would be meaningless. The force is zero when the wire is parallel to the field, and maximum when perpendicular; that only makes sense if $$B$$ has a direction to compare against.", "source": "GLM 5.1"}, {"q": "The general motor-effect formula is $$F = BIL\\sin\\theta$$. What is $$\\theta$$, and why does the $$\\sin\\theta$$ factor appear? Derive it from the idea of \"only the perpendicular bit counts.\" (4 steps)", "a": "- Step 1: $$\\theta$$ is the angle between the *direction of the current* (i.e., the wire) and the *direction of the magnetic field* $$B$$. It is NOT the angle between the wire and some other reference like the horizontal.\n- Step 2: The key physical insight: only the component of the field that cuts *across* (perpendicular to) the wire produces a force. A field running *along* the wire pushes nothing \u2014 imagine running alongside a river; it doesn't push you sideways.\n- Step 3: Decompose $$B$$ into two components: the perpendicular component $$B_\\perp = B\\sin\\theta$$ (across the wire) and the parallel component $$B_\\parallel = B\\cos\\theta$$ (along the wire). Only $$B_\\perp$$ contributes to force, so: $$F = B_\\perp IL = (B\\sin\\theta)IL = BIL\\sin\\theta$$.\n+ The parallel component $$B_\\parallel$$ produces *zero* force \u2014 it's like a wind blowing exactly along the direction a boat is already pointing; it doesn't push the boat sideways.\n- Step 4: Two limiting cases confirm this: when $$\\theta = 90\u00b0$$ (wire perpendicular to field), $$\\sin 90\u00b0 = 1$$, so $$F = BIL$$ (maximum). When $$\\theta = 0\u00b0$$ (wire parallel to field), $$\\sin 0\u00b0 = 0$$, so $$F = 0$$ (no force at all).\n\nThe takeaway: $$\\sin\\theta$$ isn't arbitrary \u2014 it's the geometric projection that selects the perpendicular part of the field.", "source": "GLM 5.1"}, {"q": "A wire carrying current sits in a magnetic field. What are three ways to increase the force on the wire, and what is the physical reason each one works? (3 steps)", "a": "- Step 1: From $$F = BIL\\sin\\theta$$ (assuming $$\\theta = 90\u00b0$$ so $$F = BIL$$), there are three direct leverages:\n+ **Stronger magnets** (increase $$B$$): a stronger field pushes harder per unit of current and length \u2014 more field lines cutting across the wire means more force.\n+ **More current** (increase $$I$$): more charge flowing per second means more charge carriers for the field to push on \u2014 the force is proportional to the rate of charge flow.\n+ **Longer wire in the field** (increase $$L$$): more wire sitting inside the field means more total charge carriers experiencing the push \u2014 it's like having more people in a wind; the total push scales with how many are exposed.\n- Step 2: There's also a fourth, geometric way: increase $$\\theta$$ toward $$90\u00b0$$. Tilting the wire so it cuts across the field more directly increases $$\\sin\\theta$$, increasing the perpendicular component of the field.\n- Step 3: The physical picture: the field pushes on each moving charge in the wire. More charges (higher $$I$$), more length of wire exposed (higher $$L$$), or a stronger field (higher $$B$$) \u2014 each independently scales the total push.", "source": "GLM 5.1"}, {"q": "Fleming's Left-Hand Rule uses three fingers. What does each finger represent, and what is the mnemonic that locks in the mapping? Why is it specifically the *left* hand? (3 steps)", "a": "- Step 1: The three fingers and their assignments:\n+ **First finger** (index finger) \u2192 **Field** $$B$$ (direction N\u2192S)\n+ **seCond finger** (middle finger) \u2192 **Current** $$I$$ (conventional, +\u2192\u2212)\n+ **thuMb** \u2192 **Motion/Force** $$F$$ (the \"thrust\" on the wire)\n- Step 2: The mnemonic locks the mapping through spelling: **F**irst = **F**ield, **seC**ond = **C**urrent, **thuM**b = **Motion**. The bold letters in each keyword match the bold letter in the physics term. Alex's chant \"Force, Field, Current\" maps to thuMb\u2013First\u2013seCond (thumb, then first, then second \u2014 the order you set your hand).\n- Step 3: Why the LEFT hand? The motor effect describes a force on a current *caused by* a field. In vector notation, $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ \u2014 this is a cross product where current comes first. The left-hand rule encodes this specific ordering. A right-hand rule would give $$\\vec{B} \\times \\vec{I}$$, which flips the sign (opposite direction). Different phenomena (e.g., the field *generated by* a current) use the right hand \u2014 but the force *on* a current uses the left.", "source": "GLM 5.1"}, {"q": "Why must Fleming's rule use *conventional* current (positive to negative) rather than electron flow? What happens if you mistakenly point your second finger in the electron-flow direction? (2 steps)", "a": "- Step 1: Fleming's Left-Hand Rule is derived from the physics of the Lorentz force on a *positive* charge: $$\\vec{F} = q\\vec{v} \\times \\vec{B}$$ with $$q > 0$$. Conventional current is defined as the direction positive charges *would* flow (+\u2192\u2212), which aligns with this derivation. Electrons (negative charges) drift the *opposite* way, and for a negative charge the force is $$\\vec{F} = (-|q|)\\vec{v} \\times \\vec{B}$$, which flips the direction.\n- Step 2: If you point your seCond finger in the *electron-flow* direction instead of conventional current, you've effectively reversed the current direction. This reverses the force your thumb indicates \u2014 you'd get the *wrong* force direction. The fix: whenever a question mentions \"electrons flow left,\" translate it to \"conventional current flows right\" *before* setting your hand.", "source": "GLM 5.1"}, {"q": "In diagrams, a dot \u2299 represents current out of the page and a cross \u2297 represents current into the page. What is the visual intuition behind this convention, and why is it easy to get them mixed up? (2 steps)", "a": "- Step 1: The convention comes from imagining an arrow in 3D:\n+ **Dot \u2299 = OUT of page**: picture an arrow flying *towards* you. You see the pointed *tip* \u2014 a dot.\n+ **Cross \u2297 = INTO page**: picture an arrow flying *away* from you. You see the *tail feathers* (the cross-shaped fletching) \u2014 a cross.\n- Step 2: Why easy to mix up? Because \"into\" and \"out of\" are abstract \u2014 you can't literally see 3D on a 2D page. The trap is thinking \"a cross looks like it's piercing the page, so it must be coming out\" \u2014 but the cross is the *tail*, not the tip. The fix: always re-read the legend before starting. Dot = tip towards you = OUT. Cross = tail away = IN.", "source": "GLM 5.1"}, {"q": "You see two bar magnets drawn with N on the left and S on the right, with a gap between them. Which way does the magnetic field point in the gap, and why? What if the poles are swapped to S on the left, N on the right? (2 steps)", "a": "- Step 1: Magnetic field lines always run from North to South *outside* the magnet. In the gap between the two poles, the field points from the N pole towards the S pole. So N(left) | S(right) \u2192 field points **RIGHT** (\u2192) across the gap.\n- Step 2: If the poles are swapped \u2014 S(left) | N(right) \u2014 the field still goes N\u2192S, but now N is on the right, so the field points **LEFT** (\u2190) across the gap. The rule never changes: find N, find S, draw the arrow from N to S. This is the first step you should always do before touching your hand.", "source": "GLM 5.1"}, {"q": "In the \"grid of 9\" problems, every wire was perpendicular to the field ($$\\theta = 90\u00b0$$). What does this mean for the force magnitude, and why was the lesson focused entirely on *direction* rather than *size*? (2 steps)", "a": "- Step 1: When $$\\theta = 90\u00b0$$, $$\\sin 90\u00b0 = 1$$, so the formula simplifies to $$F = BIL$$ \u2014 the force is at its *maximum* possible value for that $$B$$, $$I$$, and $$L$$. There is no reduction factor; the full field cuts across the wire.\n- Step 2: The lesson focused on direction because when $$\\theta = 90\u00b0$$, the *size* is trivially \"just $$BIL$$\" \u2014 no angles to think about. The *direction*, however, requires 3D reasoning (Fleming's Left-Hand Rule), which is where students actually struggle. The grid was pure direction practice: read the field, read the current, let your hand tell you which way the push goes. Size calculations came later on the second sheet.", "source": "GLM 5.1"}, {"q": "In the grid, Problem 1 had N|S with current into the page (\u2297), and the force was downward. Problem 2 had the same magnets but current out of the page (\u2299), and the force was upward. What general principle does this pair illustrate? (2 steps)", "a": "- Step 1: The only difference between P1 and P2 is the current direction was reversed (into\u2192out of page). The field stayed the same (right). Reversing the current reversed the force (down\u2192up).\n- Step 2: This illustrates the general principle: **reverse the current \u2192 reverse the force**. In vector terms, $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$; if you flip $$\\vec{I}$$ to $$-\\vec{I}$$, then $$\\vec{F}$$ flips to $$-\\vec{F}$$. Fleming's rule confirms it: your seCond finger points the opposite way, so your thuMb points the opposite way.", "source": "GLM 5.1"}, {"q": "Problem 2 had N|S with current out of the page (\u2299) \u2192 force upward. Problem 9 had S|N with current out of the page (\u2299) \u2192 force downward. What general principle does this pair illustrate, and what happens if you reverse *both* the current and the field? (3 steps)", "a": "- Step 1: P2 and P9 have the *same* current direction (out of page), but the *field* is reversed (N|S \u2192 right, vs S|N \u2192 left). Reversing the field reversed the force (up\u2192down).\n- Step 2: This illustrates: **reverse the field \u2192 reverse the force**. In vector terms, $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$; flipping $$\\vec{B}$$ to $$-\\vec{B}$$ flips $$\\vec{F}$$ to $$-\\vec{F}$$.\n- Step 3: What if you reverse *both*? $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$ \u2014 the two negatives cancel, and the force is *unchanged*. This is the principle behind a DC motor: as the coil rotates, both the current direction through each side and its orientation relative to the field effectively change \u2014 the split-ring commutator reverses the current every half-turn to *compensate*, keeping the force driving the coil the same way round.", "source": "GLM 5.1"}, {"q": "Describe the 3-step method for determining the force direction on a current-carrying wire in a magnetic field. Why is the order important \u2014 what goes wrong if you skip step 1? (3 steps)", "a": "- Step 1: **Field** \u2014 Read the poles, draw the field arrow across the gap (N\u2192S). Point your First finger along it.\n- Step 2: **Current** \u2014 Read the dot/cross (\u2299 = out, \u2297 = in). Point your seCond finger along it.\n- Step 3: **Force** \u2014 Your thuMb now points along the force. Read it off: up, down, left, or right.\n+ If you skip step 1 and guess the field direction, you risk pointing your First finger the wrong way (e.g., S\u2192N instead of N\u2192S). This flips your force answer. The field direction is the *foundation* \u2014 get it wrong and everything downstream is wrong. Always draw the field arrow first.", "source": "GLM 5.1"}, {"q": "In the \"super challenge\" problem, a circular coil sits in a radial magnetic field (N in the centre, S around the outside). At every point on the coil, the force came out of the page. Why is the force *uniformly* in the same direction at all points, rather than varying around the circle? (4 steps)", "a": "- Step 1: At any point on the coil, the radial field points *outward* from the centre (N\u2192S, radially). So at the top, field points up; at the right, field points right; at the bottom, field points down; etc. The field direction *rotates* as you move around the circle.\n- Step 2: The current direction *also rotates* as you move around the circle. At the top, current runs left\u2192right; at the right side, current runs downward; etc. Both the field and the current rotate by the *same angle* as you move to each new point.\n- Step 3: Because both vectors rotate together, their cross product $$\\vec{I} \\times \\vec{B}$$ gives the *same* result at every point. Check: top \u2014 field up \u00d7 current right = out of page. Right \u2014 field right \u00d7 current down = out of page. The cross product is invariant under simultaneous rotation of both inputs.\n- Step 4: This uniform axial force is exactly what a loudspeaker needs: the entire coil is pushed straight out (or straight in, if you reverse the current), driving the cone linearly. With AC, the current alternates, so the coil punches in and out \u2014 moving air to create sound.", "source": "GLM 5.1"}, {"q": "A loudspeaker has a circular coil in a radial magnetic field. If you drive the coil with DC (constant current in one direction), what happens? If you drive it with AC (current alternating back and forth), what happens and why does that produce sound? (3 steps)", "a": "- Step 1: With DC, the coil experiences a constant force in one direction (say, out of the page). It moves outward until it reaches a mechanical limit and stops. No oscillation, no sound \u2014 just a single displacement.\n- Step 2: With AC, the current direction alternates. When current flows one way, force is out of the page; when it reverses, force is into the page. The coil oscillates back and forth in sync with the AC frequency.\n- Step 3: The oscillating coil pushes and pulls the air in front of it, creating pressure waves \u2014 sound. The frequency of the AC signal determines the pitch; the amplitude determines the volume. This is why speakers need AC (audio signals), not steady DC.", "source": "GLM 5.1"}, {"q": "The force from the motor effect is always perpendicular to *both* the field and the current. What does this mean geometrically, and why does it require a 3D hand rule rather than simple 2D reasoning? (2 steps)", "a": "- Step 1: In vector language, $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ \u2014 a cross product. The cross product of two vectors is always perpendicular to *both* of them. So the force doesn't point along the field, and it doesn't point along the current; it points in a third, independent direction \u2014 the one that's at right angles to both.\n- Step 2: This is inherently 3D. If the field points right and the current points into the page, the force must point up or down \u2014 a direction that isn't in either of the two original directions. You can't reason about it in 2D because the answer lives in the third dimension. Fleming's hand rule is a 3D tool: three mutually perpendicular fingers encode the three mutually perpendicular directions of $$\\vec{F}$$, $$\\vec{B}$$, and $$\\vec{I}$$.", "source": "GLM 5.1"}, {"q": "A student sees a diagram with magnets and a wire marked with a cross \u2297. They say \"the cross means current is coming out of the page \u2014 it's piercing through.\" Identify the misconception and correct it. (2 steps)", "a": "- Step 1: The misconception: interpreting the cross as something \"piercing out\" of the page. This is a visual trap \u2014 a cross does look like it could be stabbing through the paper.\n- Step 2: The correct interpretation: the cross \u2297 represents the *tail feathers* of an arrow flying *away* from you \u2014 current going **INTO** the page. The dot \u2299 represents the *tip* of an arrow flying *towards* you \u2014 current coming **OUT OF** the page. Fix: \"Cross = tail = away = INTO. Dot = tip = towards = OUT.\"", "source": "GLM 5.1"}, {"q": "A question states \"electrons drift to the right along this wire.\" A student points their second finger to the right and reads off the force. Will they get the correct force direction? Explain why or why not. (2 steps)", "a": "- Step 1: No \u2014 they will get the *wrong* direction. Fleming's rule uses *conventional current* (the direction positive charges flow). Electrons are negative, so they drift the *opposite* way to conventional current.\n- Step 2: \"Electrons drift right\" means conventional current flows **LEFT**. The student must flip the direction before setting their hand: point the seCond finger *left*, not right. If they point right (electron flow), they've reversed the current, which reverses the force \u2014 wrong answer.", "source": "GLM 5.1"}, {"q": "A wire carrying current lies *parallel* to the magnetic field ($$\\theta = 0\u00b0$$). What is the force on the wire, and give a physical intuition for why the field can't push on a wire that runs along it? (2 steps)", "a": "- Step 1: Mathematically, $$F = BIL\\sin 0\u00b0 = BIL \\times 0 = 0$$. The force is zero.\n- Step 2: Physical intuition: the field pushes *sideways* on moving charges \u2014 perpendicular to the field direction. If the wire runs exactly along the field, there is no \"sideways\" component; the field and the charge motion are aligned, so there's nothing to deflect. Imagine walking directly downstream in a river \u2014 the current pushes you along but doesn't push you to either side. Only the cross-stream component matters, and when you're fully aligned with the stream, that component is zero.", "source": "GLM 5.1"}, {"q": "A student uses their *right* hand for Fleming's rule on a motor-effect problem. How does their answer compare to the correct answer, and why? (2 steps)", "a": "- Step 1: Using the right hand gives the *opposite* force direction to the correct answer. Where the left-hand thumb points up, the right-hand thumb points down (with the same field and current finger assignments).\n- Step 2: Why? The left-hand rule encodes $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ (current crossed into field). The right-hand rule would encode $$\\vec{F} \\propto \\vec{B} \\times \\vec{I}$$ (field crossed into current), and $$\\vec{B} \\times \\vec{I} = -(\\vec{I} \\times \\vec{B})$$ \u2014 the opposite vector. The motor effect is defined with current as the first vector in the cross product, so the left hand is mandatory. Right-hand rules are for *other* phenomena (e.g., the field generated by a current \u2014 the \"grip rule\").", "source": "GLM 5.1"}, {"q": "You're doing a Fleming's Left-Hand Rule problem with a diagonal (tilted) magnetic field. How should you align your first finger, and what is the common mistake? (2 steps)", "a": "- Step 1: Your first finger must point along the *actual* field direction \u2014 which is along the diagonal from N to S. You physically tilt your finger to match that slanted direction on the page. The thumb will then give a force that is perpendicular to that tilted field, which also comes out diagonal.\n- Step 2: The common mistake is aligning the first finger \"straight up the page\" (vertical) out of habit, ignoring the tilt. This gives a wrong force because you've substituted a fake field direction for the real one. The rule works at *any* angle \u2014 you just have to be honest about where the field actually points. Always align the first finger with the real N\u2192S direction, even if it's slanted.", "source": "GLM 5.1"}, {"q": "In the radial-field loudspeaker problem, Alex advised: \"don't try to do the whole circle at once \u2014 just consider one point.\" Why is this strategy necessary, and what would go wrong if you tried to reason about the whole circle simultaneously? (2 steps)", "a": "- Step 1: At each point on the circle, the field direction and current direction are *different* (they both rotate around the circle). If you try to reason about \"the whole circle,\" you're trying to simultaneously process multiple different field-current pairs \u2014 which is cognitively overwhelming and leads to confusion.\n- Step 2: By isolating *one point* (e.g., the top), you reduce the problem to a single, clean Fleming's rule application: one field direction, one current direction, one force. Once you get that one answer, you can check another point and discover the force is the same everywhere. The strategy turns an impossible wholesale problem into a tractable point-by-point one.", "source": "GLM 5.1"}, {"q": "The motor effect force formula $$F = BIL\\sin\\theta$$ and the moving-charge force formula $$F = Bqv\\sin\\theta$$ both appear in the Edexcel data booklet. What is the relationship between these two formulas \u2014 why are they structurally identical? (3 steps)", "a": "- Step 1: Current $$I$$ is the rate of charge flow: $$I = \\frac{\\Delta q}{\\Delta t}$$, or equivalently, for a wire of length $$L$$ with charges drifting at speed $$v$$, the total charge passing a point per second is $$I = nqvA$$ (where $$n$$ is charge carrier density and $$A$$ is cross-sectional area). But more directly, think of it this way: a wire of length $$L$$ carrying current $$I$$ contains moving charges, each with charge $$q$$ and drift speed $$v$$.\n- Step 2: The force on a *single* moving charge is $$F_{\\text{single}} = Bqv\\sin\\theta$$. In a wire of length $$L$$, the total number of moving charges contributing is proportional to $$L$$, and the current $$I$$ is proportional to $$qv$$ (for a given cross-section). So $$F_{\\text{total}} = Bqv\\sin\\theta \\times (\\text{number of charges in length } L)$$, which simplifies to $$F = BIL\\sin\\theta$$.\n+ Think of it as: $$I \\times L$$ is a macroscopic proxy for $$q \\times v$$ times the number of charges. The wire formula is just the single-charge formula *summed over all the charges in the length of wire*.\n- Step 3: Both formulas use Fleming's Left-Hand Rule for direction. For the single charge, the \"current\" finger points along the charge's velocity (conventional \u2014 positive charge moving direction). The structure is identical because the physics is identical: a field pushes on moving charge, whether it's one particle or a whole wire of them.", "source": "GLM 5.1"}, {"q": "A student reads a \"bird's-eye view\" diagram showing magnets and a wire (dot or cross) between them. They determine the force is \"out of the page.\" Is this necessarily correct terminology for this type of diagram? Explain when force is \"in/out of page\" vs \"up/down on the page.\" (2 steps)", "a": "- Step 1: In a bird's-eye view (looking down at the wire from above), the wire is viewed end-on. The field runs horizontally across the page (left/right), and the current runs vertically (in/out of the page). The force \u2014 being perpendicular to both \u2014 must run *up or down on the page* (i.e., towards/away from you in the real 3D world, but drawn as up/down arrows on the 2D diagram).\n- Step 2: Saying \"out of the page\" for the force is wrong in this context \u2014 \"out of the page\" is already used for the *current* direction (the dot \u2299). The force in these grid problems is always **up or down on the page** (drawn as \u2191 or \u2193 arrows). \"In/out of page\" force only arises in special geometries like the radial loudspeaker coil, where the field and current both lie in the plane of the page and the force genuinely points out of that plane. The terminology must match the diagram's perspective.", "source": "GLM 5.1"}, {"q": "A DC motor has a coil spinning in a magnetic field. Without a split-ring commutator, the coil would oscillate back and forth rather than spinning continuously. Explain why, using the principle that reversing the current reverses the force. (3 steps)", "a": "- Step 1: As the coil rotates, each side of the coil swings through the field. In the first half-turn, current flows one way through each side, and the force pushes that side *up* (say). The coil rotates.\n- Step 2: After half a turn, the same side is now on the opposite side of the field. The *field direction* relative to that side has effectively reversed (the side that was on the left is now on the right). Without intervention, the current still flows the same way \u2014 so the force on that side now pushes *down*, opposing the rotation. The coil would reverse direction.\n- Step 3: The split-ring commutator reverses the current *every half-turn*, right at the moment when the field reversal would have flipped the force. So the current reversal *cancels* the field reversal's effect (reverse both \u2192 force unchanged). The coil keeps getting pushed the same way round, and it spins continuously. This is exactly the principle from the grid: reverse both current and field \u2192 force stays the same.", "source": "GLM 5.1"}, {"q": "A wire of length 0.10 m carries 2.0 A of current perpendicular to a 0.50 T magnetic field. Qualitatively, what is the force, and if you doubled the current to 4.0 A, what would happen to the force? (No exact calculation needed \u2014 just the relationship.) (2 steps)", "a": "- Step 1: Since the wire is perpendicular to the field ($$\\theta = 90\u00b0$$), the force is $$F = BIL$$ \u2014 the maximum case. The force is directly proportional to each variable. So with $$B = 0.50$$ T, $$I = 2.0$$ A, $$L = 0.10$$ m, the force is some nonzero value (proportional to the product of all three).\n- Step 2: Doubling the current from 2.0 A to 4.0 A doubles the force \u2014 because $$F$$ is proportional to $$I$$ in the formula $$F = BIL$$. Double any one of $$B$$, $$I$$, or $$L$$, and you double $$F$$. This is the core proportional relationship: no squares, no roots, just direct linear scaling.", "source": "GLM 5.1"}, {"q": "A wire makes a $$30\u00b0$$ angle with the magnetic field instead of being perpendicular. Qualitatively, is the force larger, smaller, or the same compared to the perpendicular case? By roughly what factor? (2 steps)", "a": "- Step 1: The force is *smaller* than the maximum (perpendicular) case. The formula is $$F = BIL\\sin\\theta$$, and $$\\sin 30\u00b0 = 0.5$$, so only half the field's strength effectively cuts across the wire.\n- Step 2: The force is roughly *half* of what it would be at $$90\u00b0$$. More precisely, $$\\frac{F_{30\u00b0}}{F_{90\u00b0}} = \\frac{\\sin 30\u00b0}{\\sin 90\u00b0} = \\frac{0.5}{1} = 0.5$$. The $$\\sin\\theta$$ factor acts as a \"discount\" \u2014 the more aligned the wire is with the field, the bigger the discount, down to zero at $$0\u00b0$$.", "source": "GLM 5.1"}, {"q": "A student sees N on the left and S on the right, and draws the field arrow pointing LEFT (from S to N). They then apply Fleming's rule correctly from that arrow. Will their force direction be correct? Explain. (2 steps)", "a": "- Step 1: No \u2014 the force direction will be *wrong* (reversed). The field arrow was drawn backwards (S\u2192N instead of N\u2192S), so the First finger points the wrong way.\n- Step 2: A backwards field arrow is equivalent to reversing the field direction. As established: reverse the field \u2192 reverse the force. So the student's thumb will point the opposite way to the true force. The fix is simple but critical: always draw the field arrow from N to S *before* touching your hand. One wrong arrow poisons the entire result.", "source": "GLM 5.1"}, {"q": "In the lesson, Alex physically demonstrated Fleming's rule with his hand and told you to do the same in the exam. Why is physically doing the hand sign more reliable than just \"thinking through\" the directions mentally? (2 steps)", "a": "- Step 1: The force direction is a 3D cross product \u2014 perpendicular to both the field and the current. Mentally visualizing 3D perpendicularity is error-prone; it's easy to confuse which axis is which, especially under exam pressure. Your hand is a physical 3D object with three mutually perpendicular digits \u2014 it *enforces* the right angles automatically.\n- Step 2: Using your hand also prevents finger-swapping errors. The mnemonic (First=Field, seCond=Current, thuMb=Motion) is locked to specific physical digits. If you just \"think,\" you might accidentally assign current to the first finger or field to the thumb. The hand makes the mapping concrete and unambiguous \u2014 you literally can't swap them without noticing.", "source": "GLM 5.1"}, {"q": "What is the rough order-of-magnitude comparison between the Earth's magnetic field and a typical lab U-magnet? Why does this matter for the motor effect in practical experiments? (2 steps)", "a": "- Step 1: Earth's field in London is about $$50 \\text{ \u03bcT} = 5 \\times 10^{-5}$$ T. A lab U-magnet produces a field of roughly $$0.1$$\u2013$$0.5$$ T \u2014 about $$2{,}000$$\u2013$$10{,}000$$ times stronger.\n- Step 2: This matters because the motor-effect force is proportional to $$B$$. With Earth's field alone, the force on a typical lab wire ($$I \\sim 1$$ A, $$L \\sim 0.1$$ m) would be $$F \\sim 5 \\times 10^{-5} \\times 1 \\times 0.1 = 5 \\times 10^{-6}$$ N \u2014 utterly undetectable. With a U-magnet, $$F \\sim 0.3 \\times 1 \\times 0.1 = 0.03$$ N \u2014 measurable on a balance. That's why lab demonstrations of the motor effect always use strong magnets, not Earth's field.", "source": "GLM 5.1"}, {"q": "Alex's lesson mantra was \"Force, Field, Current.\" Map this to the fingers of Fleming's Left-Hand Rule, and explain why the mantra's order (Force first) differs from the order you actually *set* your hand (Field first, then Current, then read Force). (2 steps)", "a": "- Step 1: The mantra maps as: Force = thuMb, Field = First finger, Current = seCond finger. The mnemonic letters confirm this: thuMb=Motion, First=Field, seCond=Current.\n- Step 2: The mantra says \"Force, Field, Current\" \u2014 but you *set* your hand in the order Field\u2192Current\u2192Force (First finger first, then seCond finger, then read thuMb). The mantra isn't the setting order; it's a *reminder of which finger goes with which quantity*. You chant it to lock the mapping, then set your hand in the logical order: determine the field (First finger), determine the current (seCond finger), and the force (thuMb) follows automatically.", "source": "GLM 5.1"}, {"q": "A circular current-carrying coil sits flat on a table. A uniform vertical magnetic field points straight down through the table. Does the coil experience a net motor-effect force that lifts it, pushes it down, or something else? Explain using Fleming's rule at two opposite points on the coil. (3 steps)", "a": "- Step 1: Consider the top point of the coil (viewed from above). Current runs left\u2192right. Field points down (into the table). Fleming: First finger down, seCond finger right \u2192 thuMb points *towards you* (out of the page, i.e., radially outward from the coil centre at that point).\n- Step 2: Now consider the bottom point of the coil (opposite side). Current runs right\u2192left (opposite direction). Field still points down. Fleming: First finger down, seCond finger left \u2192 thuMb points *away from you* (into the page, i.e., radially inward toward the coil centre at that point).\n- Step 3: The forces at opposite points are *opposite and equal* \u2014 one pushes outward, the other pushes inward. They don't lift or push down the coil; they create a *torque* (twisting force) that tries to flip the coil flat. This is exactly how a DC motor starts: the field tries to *rotate* the coil, not translate it. A *radial* field (like in the loudspeaker) is special because it eliminates this torque and produces a uniform linear force instead.", "source": "GLM 5.1"}, {"q": "In the loudspeaker \"super challenge,\" the field was radial (pointing outward from the centre at every point). How does this differ from a uniform field between two flat magnets, and why does this difference matter for the type of force produced? (3 steps)", "a": "- Step 1: A uniform field between two flat magnets points in *one constant direction* everywhere (e.g., always right). A radial field points in *different directions at different points* \u2014 always outward from the centre, so it rotates as you go around the circle.\n- Step 2: In a uniform field, opposite sides of a circular coil experience opposite forces (one side pushed up, the other down) \u2014 creating a torque that tries to *rotate* the coil. The net linear force is zero.\n- Step 3: In a radial field, at every point the field is perpendicular to the current *and* oriented such that the cross product $$\\vec{I} \\times \\vec{B}$$ always gives the *same* direction (out of the page). There's no cancelling \u2014 every point contributes a force in the same direction. The net effect is a *linear* push, not a torque. This is why loudspeakers use radial fields: you want the cone to move straight in and out, not spin.", "source": "GLM 5.1"}, {"q": "Synthesis question: A wire carries conventional current upward. A magnetic field points into the page. Determine the force direction using Fleming's rule, and verify it using the vector cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ with a right-handed coordinate system. (3 steps)", "a": "- Step 1: Set up a right-handed coordinate system: let $$x$$ = right, $$y$$ = up, $$z$$ = out of page. Then: current $$\\vec{I}$$ is in the $$+y$$ direction (up). Field $$\\vec{B}$$ is in the $$-z$$ direction (into the page).\n- Step 2: Fleming's Left-Hand Rule: First finger points into the page (field, $$-z$$), seCond finger points up (current, $$+y$$), thuMb points\u2026 try it: your thumb points to the **LEFT** ($$-x$$ direction).\n- Step 3: Cross product verification: $$\\vec{I} \\times \\vec{B} = (+y) \\times (-z) = -(y \\times z) = -x$$ (since $$y \\times z = x$$ in a right-handed system). So $$\\vec{F}$$ is in the $$-x$$ direction = **LEFT**. Both methods agree: force is to the left.", "source": "GLM 5.1"}, {"q": "Synthesis question: Electrons flow downward in a wire. The magnetic field points to the right. What is the direction of the force on the wire? Walk through the translation from electron flow to conventional current, then apply Fleming's rule. (3 steps)", "a": "- Step 1: Electrons flow downward. Since electrons are negative, conventional current flows in the *opposite* direction: **UPWARD**.\n- Step 2: Apply Fleming's Left-Hand Rule: First finger points RIGHT (field direction). seCond finger points UP (conventional current). thuMb points\u2026 try it with your left hand: thumb points **OUT OF THE PAGE** (towards you).\n- Step 3: The force is out of the page. If you had skipped the translation and pointed your second finger downward (electron flow), your thumb would have pointed INTO the page \u2014 the wrong answer. The translation step is essential whenever electron flow is mentioned.", "source": "GLM 5.1"}, {"q": "Edge case: A wire carries current at exactly $$0\u00b0$$ to the field (fully parallel). Then the wire is rotated to $$1\u00b0$$ (almost parallel). Qualitatively, how does the force change \u2014 is it still zero, or has it jumped to something significant? What does this tell you about the behaviour of $$\\sin\\theta$$ near $$0\u00b0$$? (2 steps)", "a": "- Step 1: At $$0\u00b0$$, $$F = BIL\\sin 0\u00b0 = 0$$ \u2014 exactly zero. At $$1\u00b0$$, $$F = BIL\\sin 1\u00b0$$, which is nonzero but *tiny*: $$\\sin 1\u00b0 \\approx 0.0175$$, so the force is about 1.75% of the maximum.\n- Step 2: This shows that $$\\sin\\theta$$ is *continuous* \u2014 it doesn't jump. Near $$0\u00b0$$, $$\\sin\\theta \\approx \\theta$$ (in radians), so the force grows *linearly* from zero as you tilt the wire. There's no sudden threshold; the force smoothly increases from zero as the wire moves away from parallel. Conversely, near $$90\u00b0$$, $$\\sin\\theta$$ is nearly 1 and barely changes \u2014 tilting a nearly-perpendicular wire barely reduces the force.", "source": "GLM 5.1"}, {"q": "A student reasons: \"The force is $$F = BIL\\sin\\theta$$, so if I double the angle from $$30\u00b0$$ to $$60\u00b0$$, I double the force.\" Is this correct? Explain why or why not using the behaviour of $$\\sin\\theta$$. (2 steps)", "a": "- Step 1: This is *incorrect*. The force is proportional to $$\\sin\\theta$$, not to $$\\theta$$ itself. $$\\sin 30\u00b0 = 0.5$$, $$\\sin 60\u00b0 \\approx 0.866$$ \u2014 doubling the angle from 30\u00b0 to 60\u00b0 increases the force by a factor of $$0.866/0.5 \\approx 1.73$$, not by a factor of 2.\n- Step 2: $$\\sin\\theta$$ is nonlinear \u2014 it curves. Near $$0\u00b0$$, it's approximately proportional to $$\\theta$$ (so small angle changes cause small force changes). Near $$90\u00b0$$, it flattens out (big angle changes cause small force changes). Only in the small-angle regime does \"double the angle \u2248 double the force\" work approximately; it's never exactly true.", "source": "GLM 5.1"}, {"q": "The lesson showed a bench apparatus: a power supply, a wire between the poles of a U-magnet. How would you experimentally determine the magnetic flux density $$B$$ of that U-magnet using this setup? Describe what you'd measure and how you'd calculate $$B$$. (3 steps)", "a": "- Step 1: Set up the wire perpendicular to the field ($$\\theta = 90\u00b0$$) so the formula simplifies to $$F = BIL$$, and hence $$B = \\frac{F}{IL}$$.\n- Step 2: Measure three quantities:\n+ **$$I$$** \u2014 read the current from the power supply/ammeter.\n+ **$$L$$** \u2014 measure the length of wire that sits between the magnet poles (only the part actually in the field counts).\n+ **$$F$$** \u2014 measure the force on the wire. This is typically done by placing the magnet on a top-pan balance and reading the apparent mass change when current flows ($$F = \\Delta m \\times g$$), or by using a cantilever/lever setup.\n- Step 3: Calculate: $$B = \\frac{F}{IL}$$. For example, if $$F = 0.03$$ N, $$I = 3$$ A, $$L = 0.05$$ m, then $$B = \\frac{0.03}{3 \\times 0.05} = 0.2$$ T. This is the standard lab method for measuring $$B$$ \u2014 it's the operational definition in action.", "source": "GLM 5.1"}, {"q": "Why is a magnetic field described as a \"field\" rather than just \"a force\"? What is the conceptual difference between saying \"the magnet pushes the wire\" and \"the field exerts a force on the wire\"? (2 steps)", "a": "- Step 1: A \"force\" implies a direct, contact push between two objects. But the magnet and the wire aren't touching \u2014 the push happens across empty space. The *field* is the invisible intermediary that exists in the space around the magnet and *carries the influence* to the wire.\n- Step 2: The field concept explains *action at a distance*: the magnet modifies the space around it (creates the field), and any current-carrying wire placed in that modified space feels a force. The field also has properties (direction, strength) that exist *even when no wire is present* \u2014 it's not just \"a push happens when the wire is there.\" $$B$$ is a property of the space, not just of the interaction. This is why we can map field lines, measure $$B$$, and predict forces before placing any wire.", "source": "GLM 5.1"}, {"q": "The data booklet lists both $$F = BIl\\sin\\theta$$ and $$F = Bqv\\sin\\theta$$. In what situations would you use each one? Give a concrete example of each. (2 steps)", "a": "- Step 1: Use $$F = BIL\\sin\\theta$$ when the moving charges are *in a wire* \u2014 a macroscopic conductor with measurable current $$I$$ and length $$L$$. Example: calculating the force on a 0.10 m wire carrying 2 A between magnet poles.\n- Step 2: Use $$F = Bqv\\sin\\theta$$ when you're dealing with a *single free particle* \u2014 an electron or proton flying through a field, not confined in a wire. Example: calculating the force on an electron moving at $$10^6$$ m/s through a 0.5 T field in a particle accelerator. The wire formula sums up all the individual $$Bqv$$ forces on every charge carrier in the length $$L$$.", "source": "GLM 5.1"}, {"q": "A student asks: \"If $$F = BIL$$, then rearranging gives $$B = F/(IL)$$, so $$B$$ depends on the force, current, and length. Does that mean $$B$$ changes if I change the current?\" Identify the logical flaw in this reasoning. (2 steps)", "a": "- Step 1: The flaw: confusing the *definition* of $$B$$ with a *causal dependence*. $$B = F/(IL)$$ is how we *measure* $$B$$, not what *determines* $$B$$. The magnetic flux density is a property of the field source (the magnet) \u2014 it's set by the magnet's strength, geometry, and material.\n- Step 2: If you increase the current, the force $$F$$ increases *proportionally* (since $$F = BIL$$ with $$B$$ constant). The ratio $$F/(IL)$$ stays the same \u2014 $$B$$ doesn't change. Think of it like measuring the speed of a car: $$v = d/t$$. If you observe the car for twice the time, it covers twice the distance, but $$d/t$$ still gives the same speed. The ratio is a *measurement tool*, not a causal relationship.", "source": "GLM 5.1"}, {"q": "Simple exercise: A 0.20 m wire carries 5 A perpendicular to a 0.30 T field. What is the force? Then: the same wire is tilted to run *parallel* to the field. What happens to the force? (Walk through conceptually, minimal math.) (2 steps)", "a": "- Step 1: Perpendicular case ($$\\theta = 90\u00b0$$): $$F = BIL = 0.30 \\times 5 \\times 0.20 = 0.30$$ N. The full field cuts across the wire, producing maximum force.\n- Step 2: Parallel case ($$\\theta = 0\u00b0$$): $$\\sin 0\u00b0 = 0$$, so $$F = 0$$ N. No component of the field crosses the wire \u2014 the field runs along it, so there's no sideways push. The force drops from 0.30 N to exactly zero. This dramatic drop illustrates why orientation matters as much as strength.", "source": "GLM 5.1"}, {"q": "Simple exercise: A wire at $$30\u00b0$$ to a 0.50 T field carries 4.0 A through 0.10 m of field region. Is the force more than half, less than half, or exactly half of the maximum possible force for this $$B$$, $$I$$, and $$L$$? Why? (2 steps)", "a": "- Step 1: The maximum force (at $$90\u00b0$$) would be $$F_{\\max} = BIL = 0.50 \\times 4.0 \\times 0.10 = 0.20$$ N. At $$30\u00b0$$, the force is $$F = BIL\\sin 30\u00b0 = 0.20 \\times 0.5 = 0.10$$ N.\n- Step 2: The force is *exactly half* of the maximum, because $$\\sin 30\u00b0 = 0.5$$ exactly. This is a special angle where the fraction is clean. At most other angles, $$\\sin\\theta$$ isn't a simple fraction \u2014 e.g., $$\\sin 45\u00b0 \\approx 0.707$$, giving about 70.7% of max, not a round number.", "source": "GLM 5.1"}, {"q": "Conceptual exercise: You have a U-magnet and a wire between its poles. You double the current, halve the length of wire in the field, and rotate the wire from $$90\u00b0$$ to $$30\u00b0$$ relative to the field. Does the force increase, decrease, or stay the same compared to the original setup? Reason through each change separately, then combine. (3 steps)", "a": "- Step 1: Three separate effects on $$F = BIL\\sin\\theta$$:\n+ Double $$I$$ \u2192 force doubles (factor of 2).\n+ Halve $$L$$ \u2192 force halves (factor of 0.5).\n+ $$\\theta$$ changes from $$90\u00b0$$ to $$30\u00b0$$ \u2192 $$\\sin\\theta$$ changes from 1 to 0.5 \u2192 force halves (factor of 0.5).\n- Step 2: Combine the factors: $$2 \\times 0.5 \\times 0.5 = 0.5$$. The net effect is that the force is *halved* compared to the original.\n- Step 3: Even though doubling the current *increases* the force, the combined effect of halving the length and tilting the wire *decreases* it more than the current increase compensates. Each variable multiplies independently \u2014 you can't just count \"one increase, two decreases\" without tracking the actual numerical factors.", "source": "GLM 5.1"}, {"q": "Misconception probe: A student says \"the force on the wire points in the same direction as the magnetic field \u2014 the field pushes the wire along itself.\" Why is this wrong, and what is the correct geometric relationship? (2 steps)", "a": "- Step 1: This is wrong because the motor-effect force is *perpendicular* to the field, not along it. The force is the cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$, which by definition is perpendicular to both $$\\vec{I}$$ and $$\\vec{B}$$.\n- Step 2: The field doesn't \"push the wire along itself\" \u2014 it *deflects* the wire sideways. Imagine the field pointing right and the current pointing into the page: the force points up or down, not right. The field sets the *plane* in which the current sits, and the force is the direction *escaping* that plane \u2014 always at right angles to both. This is why you need three dimensions and three fingers to track it.", "source": "GLM 5.1"}, {"q": "Misconception probe: A student says \"if I reverse the magnetic field direction, the current direction also reverses, because the field drives the current.\" Is this correct? Explain the independence of field and current. (2 steps)", "a": "- Step 1: This is *incorrect*. The magnetic field and the current are *independent* inputs. The field is produced by the magnet (or an external source); the current is driven by the power supply connected to the wire. Reversing the magnet (field) does nothing to the power supply \u2014 the current keeps flowing the same way.\n- Step 2: The force depends on *both* independently: $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$. You can change either one without affecting the other. Reversing the field reverses the force (not the current). Reversing the current reverses the force (not the field). They are separate variables that combine to produce the force \u2014 neither controls the other.", "source": "GLM 5.1"}, {"q": "The lesson was a continuation of a previous session (17 June) that introduced magnetic fields and field lines. What is the connection between *field lines* (a visual representation) and *magnetic flux density* $$B$$ (a quantitative measure)? (2 steps)", "a": "- Step 1: Field lines are a *visual map* of the magnetic field \u2014 they show direction (N\u2192S) and relative strength (closer lines = stronger field). Magnetic flux density $$B$$ is the *quantitative measure* of that strength at a specific point: the number of field lines per unit area (conceptually) corresponds to the magnitude of $$B$$.\n- Step 2: Where field lines are densely packed (between the poles of a strong magnet), $$B$$ is large. Where they're sparse (far from the magnet), $$B$$ is small. The field lines tell you *where* the field is strong and *which way* it points; $$B$$ tells you *exactly how strong* it is at a given point in tesla. Together, they give both the geometry and the magnitude of the field.", "source": "GLM 5.1"}, {"q": "In the grid of 9 problems, the wire was always drawn as a dot or cross (viewed end-on, bird's-eye). What perspective does this view imply, and why does it make the force direction always \"up or down on the page\" rather than \"left or right\"? (2 steps)", "a": "- Step 1: The bird's-eye view means you're looking *down* at the wire from above. In this perspective: the field runs horizontally across the page (left\u2194right, between the magnets), and the current runs vertically (into\u2194out of the page, represented by \u2297 or \u2299).\n- Step 2: The force must be perpendicular to *both* the horizontal field and the vertical (in/out) current. The only direction perpendicular to both is *up or down on the page* \u2014 the remaining axis in the 3D space. So in this standard view, the force arrow is always drawn as \u2191 or \u2193. If the diagram perspective changed (e.g., side view), the force could come out as left/right or in/out \u2014 the direction depends on which axes the field and current occupy.", "source": "GLM 5.1"}, {"q": "Why does the lesson material explicitly state that every grid answer was \"independently re-derived from the vector cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$\"? What confidence does this provide, and how does the cross product serve as a mathematical \"ground truth\" for Fleming's rule? (2 steps)", "a": "- Step 1: Fleming's Left-Hand Rule is a *physical heuristic* \u2014 a mnemonic that encodes the cross product in hand geometry. But heuristics can be misapplied (wrong hand, swapped fingers, wrong field direction). The cross product $$\\vec{I} \\times \\vec{B}$$ is the *mathematical definition* \u2014 unambiguous, algorithmic, and immune to finger mistakes. Re-deriving every answer from the cross product confirms that Fleming's rule (when correctly applied) matches the mathematical truth.\n- Step 2: This provides confidence that the rule isn't just a trick that sometimes works \u2014 it's a *faithful encoding* of the underlying vector math. If you ever doubt your hand result, you can always fall back to the cross product with a coordinate system as a check. The cross product is the ground truth; Fleming's rule is the convenient physical interface to that truth.", "source": "GLM 5.1"}, {"q": "The lesson notes mention that the radial loudspeaker problem is one that \"only about two people out of twenty in Alex's top set would get.\" What makes this problem so much harder than the grid of 9, even though it uses the exact same rule? (2 steps)", "a": "- Step 1: The grid problems have *constant* field and current directions within each cell \u2014 one field arrow, one current symbol, one force answer. The radial problem has *rotating* field and current directions \u2014 they change at every point around the circle. You can't just do one Fleming application and be done; you must process multiple different configurations simultaneously, or realize the deeper pattern.\n- Step 2: The difficulty is *synthesis*: you must apply the same rule at multiple points, recognize that the force comes out the same at each point, and then generalize to \"the whole coil is pushed uniformly.\" Most students get stuck trying to reason about the whole circle at once (overwhelming) or give up after one point (incomplete). The key insight \u2014 \"both vectors rotate together, so the cross product is invariant\" \u2014 requires connecting the rule to the geometry in a way that goes beyond simple application.", "source": "GLM 5.1"}, {"q": "What is magnetic flux density $$B$$, and how is it operationally defined through the force on a current-carrying wire? (3 steps)", "a": "- Step 1: Magnetic flux density $$B$$ is the quantitative measure of the strength of a magnetic field. It is a vector \u2014 it has both magnitude and direction (the direction a free North pole would be pushed).\n- Step 2: It is operationally defined through the motor effect: when a wire of length $$L$$ carrying current $$I$$ sits perpendicular to a magnetic field, it experiences a force $$F$$. The ratio $$B = \\frac{F}{IL}$$ defines the flux density of that field.\n- Step 3: This definition is analogous to how gravitational field strength $$g$$ is defined through $$F = mg$$ \u2014 you measure a force on a known \"test object\" (here, a known current in a known length of wire) and extract the field strength from it. The wire must be perpendicular to the field for this simplest definition; if it's at an angle, you need the $$\\sin\\theta$$ correction.\n\nThe key insight: $$B$$ is not directly visible \u2014 we infer it from the force it exerts on currents.", "source": "GLM 5.1"}, {"q": "A tesla is expressed in fundamental SI units as $$1\\;\\text{T} = 1\\;\\text{N}\\;\\text{A}^{-1}\\;\\text{m}^{-1}$$. Walk through why these are exactly the units that emerge from the definition of $$B$$. (3 steps)", "a": "- Step 1: Start from the defining equation for the perpendicular case: $$B = \\frac{F}{IL}$$. The unit of $$B$$ must be the unit of the numerator divided by the units of the denominator.\n- Step 2: The numerator $$F$$ has units of newtons (N). The denominator $$IL$$ has units of amperes \u00d7 metres (A\u00b7m). So the unit of $$B$$ is $$\\frac{\\text{N}}{\\text{A\u00b7m}} = \\text{N}\\;\\text{A}^{-1}\\;\\text{m}^{-1}$$.\n- Step 3: The tesla is just a convenient name for this compound unit. It is not a base SI unit \u2014 it is derived entirely from N, A, and m. This tells you that a 1 T field exerts 1 N of force on each metre of wire carrying 1 A of current perpendicular to the field.\n\nTakeaway: the unit \"tesla\" encodes the entire physics of the definition inside it.", "source": "GLM 5.1"}, {"q": "The Earth's magnetic field in London is roughly $$50\\;\\mu\\text{T}$$, while a typical lab U-magnet produces a field on the order of a fraction of a tesla. What does this ratio (thousands of times) tell you qualitatively about the forces you'd observe in the lab vs. from the Earth's field on the same wire? (2 steps)", "a": "- Step 1: Since $$F = BIL$$ for the perpendicular case, force is directly proportional to $$B$$. If $$B$$ is thousands of times larger (lab magnet ~0.3 T vs. Earth ~0.00005 T, a ratio of ~6000), then for the same current and length of wire, the force from the lab magnet is thousands of times larger.\n- Step 2: This is precisely why the motor effect is demonstrated with lab magnets, not with the Earth's field alone. A wire carrying 2 A through 0.1 m in the Earth's field feels only about $$0.00005 \\times 2 \\times 0.1 = 0.00001\\;\\text{N}$$ \u2014 utterly invisible. The same wire in a 0.3 T lab magnet feels $$0.06\\;\\text{N}$$ \u2014 easily seen as a visible kick.\n\nThe Earth's field is real and physically important (compasses!), but far too weak to produce observable motor-effect forces on tabletop wires.", "source": "GLM 5.1"}, {"q": "The motor-effect force formula is $$F = BIL\\sin\\theta$$. Why must the $$\\sin\\theta$$ factor appear? Explain by reasoning about what component of the field actually \"does the pushing.\" (3 steps)", "a": "- Step 1: The angle $$\\theta$$ is the angle between the direction of the wire (i.e., the current direction) and the direction of the magnetic field $$B$$. Only the component of the field that is *perpendicular* to the wire can produce a force on it.\n- Step 2: Decompose the field vector into two components: one parallel to the wire ($$B_{\\parallel} = B\\cos\\theta$$) and one perpendicular to the wire ($$B_{\\perp} = B\\sin\\theta$$). The parallel component runs along the wire and produces zero force \u2014 there is no \"sideways push\" from a field that is aligned with the current. The perpendicular component is the only part that pushes.\n- Step 3: Therefore the effective field that produces force is $$B_{\\perp} = B\\sin\\theta$$, and the force becomes $$F = B_{\\perp}IL = BIL\\sin\\theta$$. This naturally gives the two extremes: when $$\\theta = 90\u00b0$$, $$\\sin 90\u00b0 = 1$$ and force is maximum; when $$\\theta = 0\u00b0$$, $$\\sin 0\u00b0 = 0$$ and there is no force at all.\n\nThe $$\\sin\\theta$$ is not arbitrary \u2014 it is the geometric projection that selects the perpendicular component of the field.", "source": "GLM 5.1"}, {"q": "A wire carrying current is placed in a magnetic field. In two extreme orientations \u2014 perpendicular to the field ($$\\theta = 90\u00b0$$) and parallel to the field ($$\\theta = 0\u00b0$$) \u2014 what is the force in each case, and physically, why does the parallel case give zero? (2 steps)", "a": "- Step 1: For $$\\theta = 90\u00b0$$ (wire perpendicular to field): $$\\sin 90\u00b0 = 1$$, so $$F = BIL$$. This is the maximum possible force. The full field strength is perpendicular to the wire, so it all contributes to the push.\n- Step 2: For $$\\theta = 0\u00b0$$ (wire parallel to field): $$\\sin 0\u00b0 = 0$$, so $$F = 0$$. The field runs along the wire's length. There is no component cutting across the wire, and therefore no sideways deflection of the moving charges \u2014 the force simply has nothing to act \"against.\" Think of it like trying to blow a sail sideways when the wind blows along the boat's length: the sail doesn't fill.\n\nThe force exists only when the field has a component crossing the wire.", "source": "GLM 5.1"}, {"q": "Fleming's left-hand rule assigns three quantities to three fingers. Which finger corresponds to which physical quantity, and what is the memory hook for each? (3 steps)", "a": "- Step 1: **First finger** (index finger) \u2192 **Field** $$B$$ (direction from North to South). Memory hook: **F**irst = **F**ield.\n- Step 2: **seCond finger** (middle finger) \u2192 **Current** $$I$$ (conventional current, + \u2192 \u2212). Memory hook: se**C**ond = **C**urrent.\n- Step 3: **thuMb** \u2192 **Motion / force** $$F$$ (the \"thrust\" on the wire). Memory hook: thu**M**b = **M**otion.\n\nAlex's chant puts them in the order you assign them during problem-solving: \"Force, Field, Current\" = thuMb, First, seCond. The three digits are held at right angles to each other, reflecting the fact that the force is perpendicular to both the field and the current.", "source": "GLM 5.1"}, {"q": "Why must Fleming's rule use the LEFT hand specifically, and what would go wrong if you used your right hand? (2 steps)", "a": "- Step 1: The motor effect describes a force on a *conventional* (positive) current in a magnetic field. The vector relationship is $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ \u2014 a cross product. The cross product follows a right-hand convention in mathematics, but the physical direction of the force on a *positive* charge in a field follows from the Lorentz force law, which yields the left-hand result for conventional current.\n- Step 2: If you use your right hand with the same finger assignments, your thumb will point in the *opposite* direction \u2014 you would predict the force to be exactly backwards. This is because the right hand gives the direction of $$\\vec{B} \\times \\vec{I}$$ rather than $$\\vec{I} \\times \\vec{B}$$, and the cross product is anti-commutative: $$\\vec{I} \\times \\vec{B} = -(\\vec{B} \\times \\vec{I})$$.\n\nThe left hand is not arbitrary \u2014 it is the correct physical direction for the motor-effect force on a conventional current.", "source": "GLM 5.1"}, {"q": "Fleming's rule uses *conventional* current. If a question states that electrons flow to the right, what must you do before applying the rule, and why? (2 steps)", "a": "- Step 1: Electrons are negatively charged. Their direction of flow is *opposite* to conventional current. Conventional current is defined as the direction positive charge would move (+ \u2192 \u2212). So if electrons drift right, conventional current flows **left**.\n- Step 2: Before pointing your second finger, you must **flip** the electron-flow direction to get conventional current. Then point your seCond finger to the left. If you forget this flip, your force direction will be exactly reversed.\n\nThis is a very common exam trap: the question gives electron flow, but Fleming's rule demands conventional current. Always translate first.", "source": "GLM 5.1"}, {"q": "In the dot-and-cross convention for diagrams, a dot \u2299 represents current going one way through the page and a cross \u2297 represents current going the other way. Which is which, and what is the visual intuition? (2 steps)", "a": "- Step 1: **Dot \u2299 = current OUT of the page** (towards you). Imagine looking at the tip (point) of an arrow flying straight towards your face \u2014 you see a dot, the sharp tip.\n- Step 2: **Cross \u2297 = current INTO the page** (away from you). Imagine the same arrow flying away from you \u2014 you see the tail feathers (the fletching), which form a cross shape.\n\nThe visual metaphor is an archery arrow viewed head-on vs. from behind. This is the single most common diagram convention in A-level physics for representing 3D directions on a 2D page.", "source": "GLM 5.1"}, {"q": "In the gap between two bar magnets, which way does the magnetic field point, and why? (2 steps)", "a": "- Step 1: Magnetic field lines always run from **North to South** *outside* the magnet. This is the fundamental convention for magnetic field direction.\n- Step 2: Therefore, in the gap between two facing poles, the field arrow points from the N pole towards the S pole. If N is on the left and S is on the right, the field in the gap points **rightward** (\u2192). If S is on the left and N is on the right, the field points **leftward** (\u2190).\n\nThis is the very first step in every force-direction problem: read the poles, draw the field arrow from N to S across the gap. Only then do you set your hand.", "source": "GLM 5.1"}, {"q": "Describe the 3-step method for finding the force direction on a current-carrying wire in a magnetic field, as used in the \"grid of 9\" problems. (3 steps)", "a": "- Step 1: **Field.** Read the two poles. Draw the field arrow across the gap from N \u2192 S. Point your First finger along this arrow.\n- Step 2: **Current.** Read the wire symbol. If it's a dot \u2299, current is out of the page \u2014 point your seCond finger towards yourself. If it's a cross \u2297, current is into the page \u2014 point your seCond finger away from yourself.\n- Step 3: **Force.** Your thuMb now points in the direction of the force. Read it off the diagram: up, down, left, or right on the page.\n\nThe order is \"Force, Field, Current\" (the chant), but you *set* the fingers in the order Field \u2192 Current \u2192 read off Force. The chant reminds you which finger is which.", "source": "GLM 5.1"}, {"q": "In the grid of 9, Problem 1 has N on the left, S on the right, and a cross \u2297 on the wire. Problem 2 has the same magnets but a dot \u2299 instead. How does the force change between these two, and what general principle does this illustrate? (2 steps)", "a": "- Step 1: In Problem 1: field points right (N\u2192S), current into page (\u2297). First finger right, second finger into page \u2192 thumb points **down**. In Problem 2: field still right, current now out of page (\u2299). First finger right, second finger out of page \u2192 thumb points **up**.\n- Step 2: The forces are opposite (down vs. up). The only change was reversing the current direction. **General principle: reverse the current \u2192 reverse the force.** This follows directly from the cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$; flipping $$\\vec{I}$$ flips $$\\vec{F}$$.\n\nThis is the core mechanism of a DC motor: the split-ring commutator reverses the current every half-turn so the force keeps pushing the coil in the same rotational direction.", "source": "GLM 5.1"}, {"q": "In the grid of 9, Problem 2 has N|S with a dot \u2299 (force up), while Problem 9 has S|N with a dot \u2299 (force down). The current direction is the same in both. What general principle does this illustrate? (2 steps)", "a": "- Step 1: In Problem 2: N on left, S on right \u2192 field points right. Current out of page \u2192 right \u00d7 out = force **up**. In Problem 9: S on left, N on right \u2192 field points left. Current out of page \u2192 left \u00d7 out = force **down**.\n- Step 2: The only change was reversing the magnet orientation, which reversed the field direction. **General principle: reverse the field \u2192 reverse the force.** This follows from $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$; flipping $$\\vec{B}$$ flips $$\\vec{F}$$.\n\nIf you reverse *both* the current and the field, the two flips cancel and the force is unchanged \u2014 which is exactly what happens inside a DC motor when the commutator reverses the current at the same moment the coil rotates past the perpendicular.", "source": "GLM 5.1"}, {"q": "The force on a current-carrying wire is always perpendicular to both the field and the current. Why is this a necessary consequence of the vector cross product, and why does it mean you can never get a force that is \"along\" either the field or the current? (2 steps)", "a": "- Step 1: The motor-effect force obeys $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$. By the geometric definition of the cross product, the result is a vector perpendicular to *both* input vectors. It points along the unique axis that is at right angles to the plane containing $$\\vec{I}$$ and $$\\vec{B}$$.\n- Step 2: Because the cross product is always perpendicular to both inputs, $$\\vec{F}$$ can never have a component along $$\\vec{I}$$ or along $$\\vec{B}$$. This is why the force is always a \"sideways push\" \u2014 it deflects the wire sideways relative to both the field and the current, never accelerating it along its own length or along the field direction.\n\nThis perpendicularity is precisely why the problem is inherently 3D and why you need your hand (a physical 3D tool) to solve it.", "source": "GLM 5.1"}, {"q": "In the \"diagonal\" problem from the second sheet, the magnets were drawn tilted (a 3D-looking arrangement). Does Fleming's rule still apply, and if so, what changes about how you use your hand? (2 steps)", "a": "- Step 1: Yes, Fleming's rule applies at any angle \u2014 it is a general vector rule. The method does not change at all. The field still runs from N \u2192 S, just along a slanted line instead of horizontally.\n- Step 2: You must physically align your First finger with the *actual* (tilted) field direction, not with \"up\" or \"down\" on the page. Your seCond finger still points along the current, and your thuMb then gives a force that is perpendicular to that slanted field \u2014 which will come out diagonally.\n\nThe lesson: never assume the field is horizontal. Read the N and S poles, draw the arrow wherever it points, and align your first finger with that real direction. The rule works universally.", "source": "GLM 5.1"}, {"q": "In the \"super challenge\" problem, a circular coil sits inside a radial magnet (N at centre, S around the outside). At every point on the coil, the force comes out of the page. Walk through why the force is the same direction at every point, even though the field and current directions are both rotating around the circle. (3 steps)", "a": "- Step 1: At any point on the coil, the radial field points outward from the centre (N \u2192 S, radially outward). At the top of the coil, the field points up; at the right, it points right; at the bottom, it points down, etc. The current also rotates: at the top it flows right, at the right it flows down, etc.\n- Step 2: The crucial observation: both the field direction and the current direction rotate by the *same* angle as you move around the circle. At the top: field up \u00d7 current right = out of page. At the right: field right \u00d7 current down = out of page. At the bottom: field down \u00d7 current left = out of page. The cross product of two vectors that rotate together always gives the same result.\n- Step 3: Therefore, at every single point on the coil, the force points out of the page (or all into the page if the current is reversed). The entire coil experiences one uniform axial force \u2014 it gets pushed straight out of (or into) the magnet as a whole.\n\nThis is exactly how a loudspeaker works: the coil is driven by AC current, so it punches in and out alternately, moving air to create sound.", "source": "GLM 5.1"}, {"q": "A loudspeaker contains a coil in a radial magnetic field driven by alternating current (AC). Explain how the motor effect produces sound, connecting the physics to the radial-field geometry. (3 steps)", "a": "- Step 1: The radial magnet (N at centre, S outside) ensures that at every point on the coil, the field is radially outward and perpendicular to the current. This means the force is always along the coil's axis (in/out of the page), as established in the super-challenge problem.\n- Step 2: When the AC current flows one way, the force pushes the coil out of the page (towards you). When the AC reverses, the force pushes the coil into the page (away from you). The coil oscillates back and forth along its axis.\n- Step 3: The coil is attached to a cone/diaphragm. As it oscillates, it pushes and pulls the air, creating compressions and rarefactions \u2014 sound waves. The frequency of the AC determines the frequency of the oscillation, and hence the pitch of the sound.\n\nAlex's summary: \"little coil, little magnet, it goes in and out and makes a sound.\"", "source": "GLM 5.1"}, {"q": "Why is it important to physically do the left-hand sign in an exam, rather than trying to reason about force direction purely mentally? (2 steps)", "a": "- Step 1: The force direction is the result of a 3D cross product \u2014 it is perpendicular to both the field and the current. Humans are notoriously bad at mentally rotating three mutually perpendicular axes and reading off the third direction. Your hand is a built-in 3D coordinate frame that handles this automatically.\n- Step 2: Even experienced physicists do it physically. Alex noted: \"you certainly in the exam room see people doing this.\" The hand eliminates the risk of swapping fingers or forgetting which is which \u2014 especially under time pressure. The chant \"Force, Field, Current\" (thuMb, First, seCond) locks the assignment in place.\n\nDon't be shy \u2014 it is the expected, legitimate technique.", "source": "GLM 5.1"}, {"q": "For a curved or irregularly shaped current-carrying conductor in a magnetic field, what strategy did Alex recommend for finding the force direction, and why can't you reason about the whole shape at once? (2 steps)", "a": "- Step 1: Alex's strategy: **pick one point on the shape**, determine the field direction and current direction at that single point, apply Fleming's rule, and find the force at that point. Then repeat at other points if needed.\n- Step 2: You cannot reason about the whole shape at once because the current direction changes along a curve \u2014 at different points the current points in different directions. The field may also vary. Each point is its own little Fleming's-rule problem. On the radial coil, it turned out every point gave the same answer \u2014 but you can only discover that by checking point-by-point, not by assuming it.\n\n\"Don't try to reason about a whole circle of current at once\" \u2014 reduce to one point, solve, then generalise.", "source": "GLM 5.1"}, {"q": "The Edexcel Data Booklet lists both $$F = BIl\\sin\\theta$$ and $$F = Bqv\\sin\\theta$$. What is the connection between these two formulas \u2014 why are they both the \"motor effect\"? (3 steps)", "a": "- Step 1: The second formula gives the force on a *single moving charge* $$q$$ travelling at velocity $$v$$ through a field $$B$$. The angle $$\\theta$$ is between the velocity and the field. This is the Lorentz force on an individual charge.\n- Step 2: A wire carrying current $$I$$ contains many moving charges. Current is defined as charge per unit time: $$I = \\frac{nqv}{L}$$ for a wire of length $$L$$ containing $$n$$ charges each of charge $$q$$ moving at drift velocity $$v$$. Substituting into $$F = BIL\\sin\\theta$$ and simplifying gives the force per charge as $$F = Bqv\\sin\\theta$$.\n- Step 3: So the two formulas are the same physics at different scales: $$F = Bqv\\sin\\theta$$ is the microscopic version (one charge), and $$F = BIL\\sin\\theta$$ is the macroscopic version (all the charges in a length of wire summed up). Both use Fleming's left-hand rule for direction, and both have the same $$\\sin\\theta$$ dependence.", "source": "GLM 5.1"}, {"q": "A student looks at a diagram with N on the left and S on the right, and a dot \u2299 on the wire. They say \"the force is into the page.\" Identify the two likely errors they made. (3 steps)", "a": "- Step 1: **Error 1 \u2014 confusing the dot.** A dot \u2299 means current is *out* of the page. The student may have read it as \"into the page\" (confusing dot with cross). This reverses the current finger.\n- Step 2: **Error 2 \u2014 misidentifying the force plane.** In this bird's-eye-view diagram, the wire is viewed end-on. The field is horizontal (rightward), the current is perpendicular to the page (out). The force must be perpendicular to *both*, which means it lies in the plane of the page \u2014 up or down. Saying \"into the page\" is geometrically impossible for this configuration.\n- Step 3: The correct answer: field right (N\u2192S), current out of page (\u2299) \u2192 First finger right, seCond finger out \u2192 thuMb points **up**. The force is upward on the page, not into it.\n\nTwo traps in one: dot/cross confusion, and naming the wrong plane for the force.", "source": "GLM 5.1"}, {"q": "A student correctly identifies the field direction and current direction, then uses their RIGHT hand with the same finger assignments (first = field, second = current, thumb = force). Will their answer be correct? If not, what is the relationship between their answer and the correct answer? (2 steps)", "a": "- Step 1: No, the answer will be **incorrect**. Using the right hand with the same finger assignments produces a thumb direction that is the *opposite* of what the left hand gives. This is because the cross product is anti-commutative: the right-hand rule gives the direction of $$\\vec{B} \\times \\vec{I}$$, but the motor effect requires $$\\vec{I} \\times \\vec{B}$$, and $$\\vec{I} \\times \\vec{B} = -(\\vec{B} \\times \\vec{I})$$.\n- Step 2: The student's answer will be exactly **reversed** \u2014 if the true force is up, they will get down; if the true force is left, they will get right. Every single direction will be wrong by 180\u00b0.\n\nThe right hand is reserved for other rules (e.g., the grip rule for the field around a wire). For the motor effect, it must be the LEFT hand.", "source": "GLM 5.1"}, {"q": "A wire makes an angle of $$30\u00b0$$ with a magnetic field. A student calculates the force using $$F = BIL$$ (without the $$\\sin\\theta$$). By what factor is their answer too large, and how would you explain conceptually why the real force is smaller? (2 steps)", "a": "- Step 1: The correct formula is $$F = BIL\\sin\\theta$$. At $$\\theta = 30\u00b0$$, $$\\sin 30\u00b0 = 0.5$$. The student used $$F = BIL$$ (which is the $$\\theta = 90\u00b0$$ case). Their answer is too large by a factor of $$\\frac{1}{\\sin 30\u00b0} = \\frac{1}{0.5} = 2$$. They overestimated the force by a factor of 2.\n- Step 2: Conceptually: only the component of the field that is perpendicular to the wire produces force. At $$30\u00b0$$, only half the field strength is perpendicular ($$B_{\\perp} = B\\sin 30\u00b0 = 0.5B$$). The other half runs along the wire and contributes nothing. So the wire \"feels\" only half the field, and the force is half the maximum.\n\nThe $$\\sin\\theta$$ factor is not a correction tacked on \u2014 it reflects the fundamental geometry of what part of the field can push.", "source": "GLM 5.1"}, {"q": "A student sees S on the left and N on the right, and draws the field arrow pointing leftward (from the S towards the N). What is wrong, and what will happen to their force direction? (2 steps)", "a": "- Step 1: The field arrow is drawn backwards. Magnetic field lines run from **North to South** outside the magnet. With N on the righ
