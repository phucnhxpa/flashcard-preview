t and S on the left, the field in the gap points **rightward** (from N to S), not leftward.\n- Step 2: If the field finger points the wrong way (left instead of right), then the entire Fleming's-rule calculation is built on a flipped input. The force direction will be **reversed** \u2014 up becomes down, left becomes right. A back-to-front field arrow back-to-fronts the force.\n\nThis is Trap 5 from the lesson: always draw the field arrow from N to S *before* touching your hand. One arrow on the page prevents this entire class of error.", "source": "GLM 5.1"}, {"q": "In the grid of 9, reversing *both* the current direction and the magnet orientation leaves the force direction unchanged. Explain this using the cross product, and connect it to the principle of the DC motor. (3 steps)", "a": "- Step 1: The force is $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$. Reversing the current gives $$(-\\vec{I}) \\times \\vec{B} = -(\\vec{I} \\times \\vec{B}) = -\\vec{F}$$ (force reverses). Reversing the field gives $$\\vec{I} \\times (-\\vec{B}) = -(\\vec{I} \\times \\vec{B}) = -\\vec{F}$$ (force reverses). Reversing both gives $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B} = \\vec{F}$$ (two negatives cancel, force is unchanged).\n- Step 2: In a DC motor, the coil rotates in a fixed magnetic field. After half a turn, the current in the coil is now going the opposite way through the field (because the coil has flipped physically). If nothing changed, the force would reverse and the coil would oscillate back and forth instead of spinning.\n- Step 3: The split-ring commutator reverses the current at exactly the half-turn point. So now *both* the physical orientation (which reversed the effective current direction) and the electrical current (reversed by the commutator) have flipped \u2014 two reverses cancel, and the force continues pushing in the same rotational direction. The motor keeps spinning.", "source": "GLM 5.1"}, {"q": "When applying Fleming's left-hand rule, Alex corrected a student twice during the radial-field problem, saying \"your field finger needs to go straight up the page\" and \"parallel with your screen.\" What specific mistake was the student making, and why does it matter? (2 steps)", "a": "- Step 1: The student's first finger (field finger) was drifting out of the plane of the page \u2014 tilting forward or backward in 3D space rather than lying flat along the field direction drawn on the 2D page. This misalignment means the seCond finger and thuMb are also mis-rotated.\n- Step 2: If the field finger is not accurately aligned with the real field direction, the thumb will point in the wrong direction. Even a small tilt can rotate the force direction significantly, since all three fingers are at right angles and an error in one propagates to the others. The fix: keep the first finger flat to the page, pointing exactly along the N\u2192S arrow you drew.\n\nYour hand must be a faithful 3D model of the vectors on the page \u2014 if one finger is off-axis, the whole answer is wrong.", "source": "GLM 5.1"}, {"q": "A student solving a bird's-eye-view grid problem says \"the force is coming out of the page\" when the correct answer is \"upward on the page.\" What conceptual confusion does this reveal? (2 steps)", "a": "- Step 1: The student is conflating the *current's* out-of-page direction with the *force's* direction. In the bird's-eye view, the current is perpendicular to the page (in or out), but the force lies *in the plane of the page* (up, down, left, or right). This is because the force is perpendicular to both the field (horizontal on the page) and the current (perpendicular to the page) \u2014 so it must lie in the page plane.\n- Step 2: The confusion likely arises from mixing up which quantity is \"out of the page.\" Only the current (or field, in some configurations) can be out of the page in these diagrams. The force is read off the thumb as a direction *on the page* \u2014 up, down, left, or right \u2014 unless the geometry genuinely produces an out-of-page force (as in the radial coil problem).\n\nState the force direction as it sits on the page: up/down/left/right, unless the problem geometry explicitly makes it in/out of the page.", "source": "GLM 5.1"}, {"q": "A wire of length 0.10 m carries a current of 3.0 A perpendicular to a magnetic field of strength 0.5 T. Without doing the full multiplication, estimate whether the force is on the order of millinewtons, newtons, or tens of newtons, and explain your reasoning. (2 steps)", "a": "- Step 1: Use the formula $$F = BIL$$ (perpendicular case, $$\\sin 90\u00b0 = 1$$). Roughly: $$B \\approx 0.5$$, $$I \\approx 3$$, $$L \\approx 0.1$$. Multiply: $$0.5 \\times 3 = 1.5$$, then $$1.5 \\times 0.1 = 0.15$$. So the force is about 0.15 N \u2014 on the order of **tenths of a newton**, i.e., fractions of a newton.\n- Step 2: This makes physical sense. A tesla is a strong field, 3 A is a moderate current, and 0.1 m is a short wire. You'd feel a gentle push, not a violent yank. For comparison, 0.15 N is roughly the weight of a 15-gram mass \u2014 noticeable but small.\n\nThe exact answer is $$F = 0.5 \\times 3.0 \\times 0.10 = 0.15\\;\\text{N}$$. The order-of-magnitude estimate confirms it's in the \"fraction of a newton\" regime.", "source": "GLM 5.1"}, {"q": "If a wire is parallel to a magnetic field and carries a current, what is the force on the wire? Explain both from the formula and from a physical intuition about what the field \"sees.\" (2 steps)", "a": "- Step 1: From the formula: $$F = BIL\\sin\\theta$$ with $$\\theta = 0\u00b0$$ (wire parallel to field). $$\\sin 0\u00b0 = 0$$, so $$F = 0$$. No force at all.\n- Step 2: Physical intuition: the field runs along the wire in the same direction as the current. There is no component of the field cutting across the wire to deflect the moving charges sideways. The charges move along the field lines, and the field lines don't push charges that are already travelling along them \u2014 they only push charges that cross them. Think of water flowing along a river bank: the bank doesn't deflect the water because the water isn't crossing it.\n\nZero force when parallel \u2014 maximum force when perpendicular. Everything in between is scaled by $$\\sin\\theta$$.", "source": "GLM 5.1"}, {"q": "A wire carries 2 A through 0.5 m of a 0.4 T field at an angle of 30\u00b0 to the field. Conceptually, why is the force less than $$0.4 \\times 2 \\times 0.5 = 0.4\\;\\text{N}$$, and roughly what fraction of 0.4 N is it? (2 steps)", "a": "- Step 1: The value 0.4 N would be the force if the wire were *perpendicular* to the field ($$\\theta = 90\u00b0$$). But the wire is at $$30\u00b0$$, so only the perpendicular component of the field contributes: $$B_{\\perp} = B\\sin 30\u00b0 = 0.5B$$. Half the field is \"wasted\" (parallel to the wire), so the force is roughly half of 0.4 N.\n- Step 2: More precisely: $$F = BIL\\sin\\theta = 0.4 \\times 2 \\times 0.5 \\times \\sin 30\u00b0 = 0.4 \\times 0.5 = 0.2\\;\\text{N}$$. The force is exactly half the perpendicular-case maximum, because $$\\sin 30\u00b0 = 0.5$$.\n\nThe $$\\sin\\theta$$ factor directly tells you what fraction of the maximum force you actually get.", "source": "GLM 5.1"}, {"q": "Electrons flow to the left along a wire in a magnetic field that points into the page. Which way is the force on the wire? Walk through the full reasoning. (3 steps)", "a": "- Step 1: Convert electron flow to conventional current. Electrons flow left, so conventional current flows **right** (opposite direction).\n- Step 2: Apply Fleming's left-hand rule. First finger: field into the page. seCond finger: conventional current to the right. Align: first finger into the page, second finger to the right.\n- Step 3: thuMb points **upward**. The force on the wire is upward.\n\nThe critical step is the conversion from electron flow to conventional current. Without it, you'd point your second finger left and get the wrong answer (downward).", "source": "GLM 5.1"}, {"q": "The study notes state that every one of the 9 grid answers was verified using the vector cross product $$\\vec{F} \\propto \\vec{I} \\times \\vec{B}$$ with the coordinate system $$x$$ = right, $$y$$ = up, $$z$$ = out of page. For Problem 1 (field right, current into page), show how the cross product confirms the force is downward. (3 steps)", "a": "- Step 1: Set up coordinates. $$x$$ = right, $$y$$ = up, $$z$$ = out of page. The field points right: $$\\vec{B}$$ is in the $$+x$$ direction. The current is into the page: $$\\vec{I}$$ is in the $$-z$$ direction.\n- Step 2: Compute the cross product $$\\vec{I} \\times \\vec{B} = (-\\hat{z}) \\times (\\hat{x})$$. Using the right-hand rule for unit vectors: $$\\hat{z} \\times \\hat{x} = \\hat{y}$$ (since $$\\hat{x} \\times \\hat{y} = \\hat{z}$$ and cyclically). So $$(-\\hat{z}) \\times \\hat{x} = -\\hat{y}$$.\n- Step 3: $$-\\hat{y}$$ means the force is in the negative $$y$$-direction, which is **downward**. This confirms Fleming's left-hand rule: field right, current in \u2192 force down.\n\nThe cross product and Fleming's rule are two ways of computing the same vector operation. They must always agree.", "source": "GLM 5.1"}, {"q": "In the radial magnet loudspeaker problem, if the AC current driving the coil has a frequency of 400 Hz, what is the frequency of the sound produced, and why? (2 steps)", "a": "- Step 1: The coil oscillates back and forth once per cycle of the AC. In one full AC cycle, the current goes positive (coil pushed out) then negative (coil pushed in), producing one complete oscillation of the coil.\n- Step 2: Therefore the coil oscillates at the same frequency as the AC: 400 Hz. The sound produced also has a frequency of 400 Hz. The AC frequency directly determines the pitch of the sound.\n\nThis is why different audio frequencies in the electrical signal produce different pitches in the speaker \u2014 the coil faithfully follows the electrical oscillation.", "source": "GLM 5.1"}, {"q": "A student argues: \"The force on a wire in a magnetic field depends on how long the wire is. So if I make the wire twice as long, the force doubles.\" Is this reasoning correct? What assumptions are they making? (2 steps)", "a": "- Step 1: The reasoning is correct *if* the additional length of wire is also sitting inside the magnetic field. The formula $$F = BIL\\sin\\theta$$ uses $$L$$ = the length of wire **in the field**, not the total length of the wire. If you double the length of wire that is immersed in the field, then yes, $$F$$ doubles.\n- Step 2: However, if the magnetic field only covers a region of fixed width (e.g., the gap between two magnets), then adding wire outside the gap does nothing \u2014 that extra wire is not in the field and experiences no force. Only the length of wire *within the field* counts.\n\nThe variable $$L$$ in the formula specifically means \"length of conductor in the field,\" not the total wire length.", "source": "GLM 5.1"}, {"q": "Why does Alex recommend drawing the field arrow on the page *before* setting your hand, rather than trying to read the poles and set your first finger simultaneously? (2 steps)", "a": "- Step 1: Reading the poles and setting the first finger at the same time creates a high cognitive load \u2014 you're trying to do two things at once (interpret the diagram + align your hand physically). This is when mistakes happen: you might point your first finger the wrong way and not notice because you're focused on the current.\n- Step 2: Drawing the arrow first externalises the thinking. The arrow is now a permanent visual reference on the page that you can simply point your first finger along. It separates the *interpretation* step (which way does the field go?) from the *physical* step (align your hand). Each step is simple on its own; combining them invites error.\n\nOne arrow on the page prevents the most common class of mistake: wrong field direction.", "source": "GLM 5.1"}, {"q": "A student says: \"A dot in a magnetic field diagram always means something is coming out of the page.\" Is this always true? Consider what else dots and crosses can represent. (2 steps)", "a": "- Step 1: In the context of this lesson, dots and crosses specifically represent **current direction** through a wire viewed end-on: dot \u2299 = current out of page, cross \u2297 = current into page. The student's statement is correct *within this context*.\n- Step 2: However, in other physics contexts, dots and crosses can represent **magnetic field direction** through a surface: a dot means field coming out of the page, a cross means field going into the page. The same visual convention is used for both quantities. You must read the diagram legend carefully to know whether the dot/cross refers to current or field.\n\nAlways check the legend or context. The convention (arrow tip = out, tail = in) is the same, but the physical quantity being represented can differ.", "source": "GLM 5.1"}, {"q": "The formula page from the lesson lists four ways to make the force on a wire bigger. Name them, and explain why each one increases the force based on the formula $$F = BIL\\sin\\theta$$. (2 steps)", "a": "- Step 1: From the formula $$F = BIL\\sin\\theta$$, the force is directly proportional to three quantities: $$B$$ (magnetic field strength), $$I$$ (current), and $$L$$ (length of wire in the field). Increasing any one of these increases the force proportionally.\n- Step 2: The four ways are: (1) **Stronger magnets** \u2192 increase $$B$$. (2) **More current** \u2192 increase $$I$$. (3) **Longer wire in the field** \u2192 increase $$L$$. (4) **Orient the wire more perpendicular to the field** \u2192 increase $$\\sin\\theta$$ (maximum at $$\\theta = 90\u00b0$$). Alex's board listed the first three; the fourth follows from the $$\\sin\\theta$$ term.\n\nAll four are levers you can pull. In practice, motor and speaker designers optimise all of them.", "source": "GLM 5.1"}, {"q": "A U-magnet sits on a bench with N on the left and S on the right. A wire runs vertically between the poles carrying current upward. In which direction is the force on the wire \u2014 towards you, away from you, or zero? Walk through Fleming's rule. (3 steps)", "a": "- Step 1: Field direction: N on left, S on right \u2192 field in the gap points **rightward** (from N to S).\n- Step 2: Current direction: current flows **upward** along the vertical wire.\n- Step 3: Apply Fleming's left-hand rule. First finger: right (field). seCond finger: up (current). thuMb points **towards you** (out of the page, if the page shows the magnet from above). The force pushes the wire towards you.\n\nThis is the classic bench demonstration of the motor effect: the wire visibly kicks towards you when you switch on the current.", "source": "GLM 5.1"}, {"q": "In the same setup as the previous question (field right, current up, force towards you), what happens to the force direction if you flip the magnet so S is on the left and N is on the right, while keeping the current upward? (2 steps)", "a": "- Step 1: Flipping the magnet reverses the field direction. Now the field points **leftward** (from N on the right to S on the left).\n- Step 2: First finger: left (field). seCond finger: up (current). thuMb now points **away from you** (into the page). The force reverses \u2014 the wire kicks away from you instead of towards you.\n\nThis illustrates the general principle: reverse the field \u2192 reverse the force. The wire kicks the opposite way when you swap the magnets.", "source": "GLM 5.1"}, {"q": "A student claims: \"If I double the current and halve the magnetic field strength, the force stays the same.\" Is this correct? Under what condition? (2 steps)", "a": "- Step 1: From $$F = BIL\\sin\\theta$$, doubling $$I$$ gives $$2I$$, and halving $$B$$ gives $$0.5B$$. The new force is $$F' = (0.5B)(2I)(L)\\sin\\theta = BIL\\sin\\theta = F$$. The force is indeed unchanged.\n- Step 2: This works because force is proportional to the *product* $$BI$$ \u2014 the two changes exactly compensate. However, this only holds if the angle $$\\theta$$ and length $$L$$ are unchanged. If the wire orientation or length also changes, all bets are off.\n\nThe force depends on the product $$B \\times I \\times L \\times \\sin\\theta$$. Changes in any factor can be offset by compensating changes in another.", "source": "GLM 5.1"}, {"q": "What is the direction of $$B$$ as a vector? Is it the direction a North pole moves, or the direction a South pole moves? Why does this matter for Fleming's rule? (2 steps)", "a": "- Step 1: The direction of $$\\vec{B}$$ is defined as the direction a **free North pole** would be pushed. This is the same as the direction from N to S along the field lines outside the magnet.\n- Step 2: This matters because Fleming's first finger must point along $$\\vec{B}$$ \u2014 which is the N\u2192S direction. If you mistakenly thought the field points from S to N (the direction a South pole would move), your first finger would be backwards and your force would be reversed.\n\nThe convention is N\u2192S for the field direction. This is not negotiable \u2014 it is baked into the definition of $$\\vec{B}$$ and into Fleming's rule.", "source": "GLM 5.1"}, {"q": "The lesson mentions that the same grid-of-9 problems are used for both GCSE and A-level students. Alex says: \"same sort of thing, just looks a bit different.\" What does he mean \u2014 what changes between GCSE and A-level, and what stays the same? (2 steps)", "a": "- Step 1: What stays the same: the core physics. Fleming's left-hand rule, $$F = BIL\\sin\\theta$$, the dot/cross convention, and the 3-step method (field \u2192 current \u2192 force) are identical at both levels. The rule never changes.\n- Step 2: What changes: the *dressing*. At A-level, the diagrams may be tilted (the diagonal problem), use radial geometries (the loudspeaker), embed the wire in more complex 3D arrangements, or combine the direction problem with a numerical calculation. The underlying method is the same, but the student must apply it in less familiar, more abstract situations.\n\nAlex's goal: \"I'm trying to get us into situations we don't quite know\" \u2014 stretching the same rule into harder contexts.", "source": "GLM 5.1"}, {"q": "A circular loop of wire sits flat on a table. A magnetic field points straight downward through the table. Current flows clockwise around the loop (viewed from above). What is the direction of the net force on the loop \u2014 and is there a simpler way to think about it than checking every point? (3 steps)", "a": "- Step 1: At the top of the loop, current flows to the right; field is down. Fleming: first finger down (field), second finger right (current) \u2192 thuMb points out of the table (towards you). At the bottom, current flows left; field is down. First finger down, second finger left \u2192 thuMb points into the table (away from you).\n- Step 2: At the left side, current flows down; field is down. First finger down, second finger down \u2014 these are parallel! The cross product of two parallel vectors is zero. No force at the left side. Same at the right side: current flows up, field is down \u2014 anti-parallel, still $$\\sin\\theta = 0$$.\n- Step 3: The forces on opposite sides of the loop are equal and opposite (top pushes out, bottom pushes in, sides have zero force). The net force on the loop is **zero** \u2014 but there is a *torque* (a turning effect) trying to flip the loop over. This is the principle of the DC motor: a coil in a uniform field experiences a torque, not a net translational force.\n\nThis contrasts with the radial-field loudspeaker, where the field is *not* uniform and the forces all add up to one direction.", "source": "GLM 5.1"}, {"q": "Why does the loudspeaker use a *radial* magnet (N at centre, S around the outside) rather than a simple uniform field between two flat poles? What advantage does the radial geometry provide? (2 steps)", "a": "- Step 1: In a uniform field (flat poles), a coil experiences a torque that tries to *rotate* it, not push it linearly. The force direction varies around the coil \u2014 some parts push in, some push out. The net translational force is zero (only a torque exists), so the coil wouldn't move in and out.\n- Step 2: In a radial field, the field is always perpendicular to the current at every point on the coil, and the force at every point is along the same axis (in/out). All the forces add up constructively to produce a single, strong axial push. This converts electrical energy directly into linear motion, which is what you need to drive a speaker cone back and forth.\n\nThe radial geometry is an engineering trick to convert what would be a rotational motor into a linear actuator.", "source": "GLM 5.1"}, {"q": "A student calculates the force on a wire as $$F = BIL$$, gets 0.8 N, then notices the wire was actually at 90\u00b0 to the field. Should they redo the calculation with $$\\sin\\theta$$? (2 steps)", "a": "- Step 1: No! When the wire is at 90\u00b0 to the field, $$\\theta = 90\u00b0$$ and $$\\sin 90\u00b0 = 1$$. So $$F = BIL\\sin 90\u00b0 = BIL \\times 1 = BIL$$. The formula $$F = BIL$$ *is* the correct formula for the perpendicular case \u2014 it is not a shortcut or approximation.\n- Step 2: The student's answer of 0.8 N is correct. The $$\\sin\\theta$$ factor only matters when the wire is at some *other* angle. At 90\u00b0, the perpendicular case is already the maximum, and no correction is needed.\n\n$$F = BIL$$ is the special case of $$F = BIL\\sin\\theta$$ when $$\\theta = 90\u00b0$$. It is exact, not approximate.", "source": "GLM 5.1"}, {"q": "In the lesson, Alex used the mantra \"Force, Field, Current\" repeatedly. But when actually solving problems, you set your fingers in the order Field \u2192 Current \u2192 read Force. Is there a contradiction? Why chant \"Force, Field, Current\" instead of \"Field, Current, Force\"? (2 steps)", "a": "- Step 1: There is no contradiction. The chant \"Force, Field, Current\" maps to the *fingers*: thuMb = Force, First finger = Field, seCond finger = Current. It tells you *which finger is which*, not the order in which you set them.\n- Step 2: The chant prevents you from swapping fingers \u2014 the most common mistake. If you chanted \"Field, Current, Force,\" you might assign Field to your thuMb by accident. \"Force, Field, Current\" locks the assignment: thuMb-First-seCond = Force-Field-Current. The *solving* order (set Field first, then Current, then read Force) is separate from the *naming* order.\n\nThe chant is a memory lock, not a procedural instruction. Both are needed: the chant to know which finger is which, and the procedure to know what to do first.", "source": "GLM 5.1"}, {"q": "Suppose you have a wire in a magnetic field and you reverse the direction of the current. The force reverses. Now suppose you also reverse the direction of the magnetic field. The force reverses again, returning to its original direction. Does this mean the wire \"can't tell\" the difference between the original setup and the doubly-reversed setup? Explain carefully. (3 steps)", "a": "- Step 1: Mathematically, yes: $$(-\\vec{I}) \\times (-\\vec{B}) = \\vec{I} \\times \\vec{B}$$. Two sign flips cancel, so the force vector is identical. The wire experiences the same force in both cases.\n- Step 2: However, the *physical situations* are different. In the original setup, the current flows one way and the field points one way. In the doubly-reversed setup, both are flipped. The force is the same, but the current is now flowing in the opposite direction through the wire, and the field is pointing the opposite direction. These are physically distinct configurations that happen to produce the same force.\n- Step 3: An analogy: if you push a door from the left, it swings right. If you stand on the other side and pull it to the right, it still swings right. Same outcome, different physical action. The wire \"can't tell\" in the sense that the force is the same, but the underlying physical arrangement is different.\n\nThis is precisely why a DC motor needs a commutator: after half a turn, the coil's orientation effectively reverses the current direction in the field. The commutator reverses the actual current to compensate, keeping the force in the same rotational direction.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
</html>
