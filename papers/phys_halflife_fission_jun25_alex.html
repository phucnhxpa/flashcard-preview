 reactor materials — much less severe.\n\nBoth rely on the same underlying principle: move toward iron-56 on the binding energy curve.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A nucleus has $$Z = 6$$ protons (mass $$1.007\\,\\text{u}$$ each) and $$N = 6$$ neutrons (mass $$1.009\\,\\text{u}$$ each), but the measured nuclear mass is $$11.99\\,\\text{u}$$. Conceptually, what's the binding energy in MeV? (3 steps)", "answer": "- Step 1: Sum of free nucleon masses: $$6(1.007) + 6(1.009) = 6.042 + 6.054 = 12.096\\,\\text{u}$$.\n- Step 2: Mass defect: $$\\Delta m = 12.096 - 11.99 = 0.106\\,\\text{u}$$. (Positive, as expected — bound nucleus is lighter.)\n- Step 3: Convert: $$0.106 \\times 931.5 \\approx 99\\,\\text{MeV}$$ total binding energy. Per nucleon: $$\\sim 8.2$$ MeV/nucleon — characteristic of a stable light nucleus like carbon-12, sitting near the top of the BE/nucleon curve.\n\nThe conceptual flow: sum free masses → subtract bound mass → multiply by 931.5 → divide by $$A$$ for per-nucleon.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why does writing mass in units of MeV/$$c^2$$ make life easier in nuclear physics, and how do you use $$E = mc^2$$ with these units? (2 steps)", "answer": "- Step 1: In MeV/$$c^2$$, the $$c^2$$ is \"baked into the unit.\" So when you compute $$E = mc^2$$, the $$c^2$$ cancels with the $$c^2$$ in the unit, leaving you with energy directly in MeV. Example: a particle of mass $$5\\,\\text{MeV}/c^2$$ has rest energy $$E = 5\\,\\text{MeV}/c^2 \\cdot c^2 = 5\\,\\text{MeV}$$. No conversion, no powers of ten, no $$3\\times 10^8$$.\n- Step 2: This is enormously convenient because all nuclear physics quantities are naturally on the MeV scale, and you avoid juggling factors of $$10^{-27}$$ kg, $$9\\times 10^{16}$$ m²/s², and $$1.6\\times 10^{-19}$$ J/eV every time. It's the same idea as using light-years for galactic distances instead of meters.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why do fission and fusion both *conserve* total mass-energy but *not* total rest mass separately? (3 steps)", "answer": "- Step 1: In Newtonian/classical thinking, mass is conserved and energy is conserved separately. In relativistic physics, only *total* mass-energy ($$E$$ including $$mc^2$$ contributions) is conserved.\n- Step 2: In nuclear reactions, some rest mass converts into kinetic energy (of fragments, neutrons) and electromagnetic radiation (gamma photons). The products have *less* rest mass than the reactants, but the missing rest mass appears as energy of motion and radiation.\n- Step 3: If you add up all the rest masses *plus* all the kinetic energies (in mass-equivalent units) *plus* radiated photon energies, the total is unchanged. So mass-energy conservation is exact; rest-mass-only conservation is a low-energy approximation that breaks down in nuclear processes.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "Imagine you're shown a decay curve that *doesn't* reach zero but levels out at, say, 25 counts/min. What does this tell you, and how does it affect half-life calculation? (3 steps)", "answer": "- Step 1: The curve leveling off at a non-zero value tells you background radiation has not been subtracted. The 25 counts/min is the background floor.\n- Step 2: To find the true half-life, you subtract 25 from every reading first, then look at how the *corrected* count rate halves.\n- Step 3: If you naively use the uncorrected curve, you'd overestimate the half-life: the curve appears to decay more slowly because it's tailing into the background floor rather than to zero. This is one of the most common exam traps.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "A common misconception is that \"alpha decay is the most ionizing because alpha particles strip lots of electrons from atoms due to weak electron binding.\" What's actually correct? (3 steps)", "answer": "- Step 1: The reason isn't about the alpha particle's own electrons (it has none — it's just two protons and two neutrons).\n- Step 2: Alpha is the most ionizing because (a) it has the largest *charge* ($$+2e$$), exerting strong electrostatic pull on nearby electrons in matter, and (b) it has the largest *mass* and slowest speed, so it spends more time near each atom it passes and is far more likely to interact.\n- Step 3: As a result, alpha rapidly transfers its energy in ionization events over a short distance ($$\\sim$$ few cm in air), making it intensely ionizing but easily stopped. The high ionization is *cause and effect* of its short range: lots of interactions per unit distance.\n\nMisconception probe: it's about the alpha's charge/mass/speed, not about its own electron structure.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Why does the activity of a sample decay exponentially rather than linearly? Give the intuitive (not algebraic) reason. (2 steps)", "answer": "- Step 1: Linear decay would happen if the same *absolute number* of nuclei decayed each second regardless of how many were left. But this isn't physically reasonable: when there are fewer nuclei, there are fewer \"candidates\" for decay.\n- Step 2: Instead, each nucleus independently has the same per-second decay probability. So the *fraction* lost each second is constant — but the absolute number lost falls as $$N$$ falls. This is exactly the condition that produces exponential decay: rate proportional to amount remaining. The same math governs cooling, capacitor discharge, and population dynamics with constant per-capita death rate.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "In a graph of $$\\ln N$$ vs. $$t$$, what shape do you get for radioactive decay, and how do you extract $$\\lambda$$ from it? (3 steps)", "answer": "- Step 1: Starting from $$N = N_0 e^{-\\lambda t}$$, take natural log: $$\\ln N = \\ln N_0 - \\lambda t$$.\n- Step 2: This is a straight line: $$y = c + m x$$ with $$y = \\ln N$$, $$x = t$$, intercept $$\\ln N_0$$, and slope $$-\\lambda$$.\n- Step 3: So a log-plot turns exponential decay into a straight line whose negative gradient is the decay constant. This is the standard experimental technique for extracting $$\\lambda$$ (and hence $$t_{1/2}$$) without curve-fitting an exponential.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Strontium-90 has $$\\lambda = 0.025/\\text{year}$$. Roughly what fraction of an initial sample remains after 1 half-life, 2 half-lives, and 5 half-lives — and what's the half-life numerically? (3 steps)", "answer": "- Step 1: Half-life: $$t_{1/2} = \\ln 2 / \\lambda \\approx 0.693/0.025 \\approx 28$$ years.\n- Step 2: After 1, 2, 5 half-lives: fractions remaining are $$1/2$$, $$1/4$$, $$1/32$$ respectively.\n- Step 3: So after about 28 years half is gone, after 56 years 75% is gone, and after $$\\sim 140$$ years roughly 97% has decayed away. This is why Sr-90 contamination from nuclear accidents (e.g., Chernobyl) is a multi-generation problem but not millennia-scale.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why can $$A = \\lambda N$$ only be used when $$N$$ means *number of nuclei*, not *mass* or *moles*? (2 steps)", "answer": "- Step 1: $$\\lambda$$ is defined as probability per nucleus per unit time. So multiplying by mass or moles wouldn't give a sensible \"decays per second\" — you'd be multiplying probability-per-nucleus by something that isn't a nucleus count.\n- Step 2: If you're given mass, you must first convert to number of nuclei using $$N = (\\text{mass}/M) \\times N_A$$, where $$M$$ is molar mass and $$N_A$$ is Avogadro's number. Common exam trap: students plug mass in grams directly into $$A = \\lambda N$$ and get nonsensical activity values.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A nuclear reactor uses control rods to keep the multiplication factor $$k$$ close to 1. Why is \"close to 1\" the right target, rather than \"as high as possible\"? (3 steps)", "answer": "- Step 1: $$k > 1$$ means the number of fissions grows exponentially each generation — runaway power increase, leading to overheating, meltdown, or explosion (Chernobyl-style).\n- Step 2: $$k < 1$$ means fissions die out — power output falls and the reactor shuts down.\n- Step 3: $$k = 1$$ (criticality) means the reaction sustains itself at a steady rate — exactly one new fission per old fission on average. Steady fission rate $$\\Rightarrow$$ steady heat output $$\\Rightarrow$$ steady electricity. Control rods absorb excess neutrons to fine-tune $$k$$ around 1 in real time. Steady operation, not maximum operation, is the goal.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Why does a nuclear bomb need a \"critical mass\" of fissile material? (3 steps)", "answer": "- Step 1: When a fission emits 2-3 neutrons, those neutrons can either (a) hit another fissile nucleus and cause more fission, or (b) escape from the surface of the lump without interacting.\n- Step 2: In a small lump, the surface-to-volume ratio is high, so most neutrons escape — $$k < 1$$ and no chain reaction. In a large lump, the ratio is lower and most neutrons stay inside, hitting other nuclei — $$k > 1$$.\n- Step 3: The critical mass is the threshold size at which neutron production exactly balances neutron loss ($$k = 1$$). Above this, the reaction grows exponentially. A bomb assembles a supercritical mass *very rapidly* (using conventional explosives) to release energy before the configuration blows itself apart. Below critical mass, you can store fissile material safely.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why is the Sun's lifetime ($$\\sim 10^{10}$$ years) so long despite fusing $$\\sim 600$$ million tons of hydrogen per second? (3 steps)", "answer": "- Step 1: The Sun has enormous mass ($$\\sim 2\\times 10^{30}$$ kg), so the fraction consumed per second is tiny.\n- Step 2: The *rate-limiting step* is the proton → neutron conversion in the first p-p chain reaction, which proceeds via the weak interaction — an extraordinarily slow process. The typical proton in the Sun's core waits *billions of years* before fusing.\n- Step 3: This slow weak-interaction step is what gives stars their long lifetimes. If proton fusion were faster, the Sun would burn out in millions of years and life couldn't have evolved. So star longevity is a direct consequence of the weakness of the weak force — a fortunate coincidence for biology.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Imagine you have two samples: one of an isotope with $$t_{1/2} = 1$$ hour, the other with $$t_{1/2} = 1000$$ years. Both have the same *number* of nuclei right now. Which is more dangerous to handle immediately, and why? (3 steps)", "answer": "- Step 1: Activity $$A = \\lambda N$$. With the same $$N$$, the sample with larger $$\\lambda$$ (shorter half-life) has higher current activity.\n- Step 2: The 1-hour isotope has $$\\lambda$$ roughly $$10^7$$ times larger than the 1000-year isotope (ratio of half-lives). So it's emitting $$\\sim 10^7$$ more radiation per second right now.\n- Step 3: The short-half-life sample is therefore vastly more dangerous *immediately*. However, after a day or so, it's effectively gone (many half-lives have passed), while the long-half-life sample is still going strong and remains a long-term contamination hazard.\n\nLesson: \"dangerous\" depends on whether you're worried about acute exposure (short $$t_{1/2}$$ is worse) or long-term environmental contamination (long $$t_{1/2}$$ is worse).", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Hydrogen-1 has zero binding energy. Why is this consistent with the binding energy graph and what does it mean physically? (2 steps)", "answer": "- Step 1: Binding energy is the energy needed to separate a nucleus into its individual nucleons. Hydrogen-1 *is* a single nucleon (one proton) — there's nothing to separate. So binding energy is zero.\n- Step 2: On the BE/nucleon curve, hydrogen sits at the origin: $$A = 1$$, BE/nucleon $$= 0$$. From there, fusing two hydrogens to form deuterium ($$\\text{BE/nucleon} \\approx 1.1$$ MeV) and then progressing toward helium-4 ($$\\sim 7$$ MeV/nucleon) gives the steep rising left slope of the curve — the source of all stellar energy. Hydrogen is the energy-rich fuel because it has the *most to gain* by climbing this slope.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "In a nuclear decay equation, what must be conserved? List the conservation laws and explain why each is required. (4 steps)", "answer": "- Step 1: **Nucleon number** ($$A$$): the total number of nucleons on the left equals the total on the right. Nucleons aren't created or destroyed in alpha/beta/gamma decay (though a neutron can convert to a proton in beta decay, the total nucleon count stays the same).\n- Step 2: **Charge** (proton number $$Z$$, including charge of beta particles): total charge before $$=$$ total charge after. Charge conservation is universal.\n- Step 3: **Lepton number**: in beta decay, the electron emitted ($$L = +1$$) must be accompanied by an antineutrino ($$L = -1$$); in beta-plus, the positron ($$L = -1$$) is accompanied by a neutrino ($$L = +1$$). This is why neutrinos must exist.\n- Step 4: **Mass-energy and momentum**: the rest-mass plus kinetic energy of products equals that of reactants. Energy conservation is what makes the mass defect = binding energy connection meaningful.\n\nIf a proposed decay violates any of these, it doesn't happen.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why do stars eventually die when they accumulate too much iron in their core? (3 steps)", "answer": "- Step 1: Stars fuse lighter elements (H → He → C → O → ... → Si → Fe) to release energy and sustain outward pressure against gravitational collapse.\n- Step 2: Once the core reaches iron-56, no more energy can be extracted by fusion — iron is at the peak of the binding-energy-per-nucleon curve. Fusing iron *consumes* energy rather than releasing it.\n- Step 3: Without fusion energy to support it, the iron core cannot resist gravity. It collapses catastrophically, triggering a supernova. So the BE/nucleon curve doesn't just explain energy release — it dictates the very life cycle and death of massive stars. Everything heavier than iron in the universe was forged in supernovae and neutron-star mergers, not in routine stellar fusion.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Compute the energy released per fission of U-235 if the mass deficit is $$\\Delta m \\approx 0.2\\,\\text{u}$$. Use the shortcut. (2 steps)", "answer": "- Step 1: $$\\Delta E = \\Delta m \\times 931.5\\,\\text{MeV/u} = 0.2 \\times 931.5 \\approx 186\\,\\text{MeV}$$.\n- Step 2: This is consistent with the textbook value of $$\\sim 200$$ MeV per fission. Compare to chemical reactions ($$\\sim$$ few eV per molecule) — fission releases about $$10^8$$ times more energy per atom than burning. That's why $$\\sim 1$$ kg of U-235 contains the energy of $$\\sim 3000$$ tonnes of coal.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why is the helium-4 nucleus anomalously stable, sitting noticeably *above* the smooth BE/nucleon curve at $$A = 4$$? (2 steps)", "answer": "- Step 1: Helium-4 has 2 protons and 2 neutrons — both filled shells in the simple nuclear shell model. It's \"doubly magic\" (magic numbers 2 and 2 for both protons and neutrons), giving extra binding from quantum-mechanical shell closure effects.\n- Step 2: This is also why alpha decay (emission of a He-4 nucleus) is so common in heavy-nucleus decay: the alpha particle is *unusually* stable, so its formation and emission is energetically favorable. Heavier nuclei effectively shed mass and charge in the most-stable possible package. Carbon-12 and oxygen-16 also lie slightly above the trend for the same shell-closure reason — they can be thought of as 3 and 4 alpha-particle clusters.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "A friend says \"fission and fusion both 'destroy mass to make energy'.\" How would you correct this informally but accurately? (3 steps)", "answer": "- Step 1: Mass isn't really \"destroyed\" — total mass-energy is conserved. What happens is that some of the *rest mass* of the reactants converts into kinetic energy of products and radiated photons.\n- Step 2: A better phrasing: \"Some rest mass is *converted* into other forms of energy.\" The total $$E$$ (including kinetic energy and photon energy) is the same before and after; only the partition between rest-mass and motion/radiation changes.\n- Step 3: The deeper insight: rest mass *is* a form of energy ($$E = mc^2$$). So \"mass converts to energy\" is a colloquial way of saying \"rest-mass energy converts to kinetic and radiative energy.\" Nothing magical disappears.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why does the radius of curvature of a charged particle track in a magnetic field tell you about its momentum, and how does this relate to interpreting nuclear-decay particle tracks? (3 steps)", "answer": "- Step 1: For a charged particle moving perpendicular to a magnetic field, the magnetic force provides centripetal force: $$qvB = mv^2/r$$, giving $$r = p/(qB)$$.\n- Step 2: So radius is proportional to momentum (for given $$q$$, $$B$$). A larger radius track means a higher-momentum particle.\n- Step 3: This is widely used in cloud chambers and bubble chambers to identify decay products. A beta particle's track tightening into a spiral as it loses energy through ionization shows momentum decreasing along its path. Tracks curving in opposite directions indicate opposite charges (e.g., electron-positron pair from gamma-ray pair production). The slow spiral of a low-momentum particle vs. the gentle curve of a fast one lets physicists \"see\" particle properties directly from a photograph.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}], "count": 51}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why is radioactive decay described as a \"random\" process at the level of a single nucleus, yet predictable at the level of a sample?", "answer": "- Step 1: At the level of a single nucleus, there is no internal \"clock\" telling it when to decay. Quantum mechanics only assigns a *probability per unit time* that decay will occur. You cannot predict which specific nucleus will go next, nor when.\n- Step 2: However, when you have a huge number of nuclei (e.g., $$10^{20}$$), the law of large numbers takes over. The fraction of nuclei decaying in any given interval becomes statistically reliable, even though each individual event is unpredictable.\n- Step 3: This is why activity curves look smooth and exponential — the randomness averages out across billions of nuclei, giving a deterministic-looking macroscopic behaviour.\n\nTakeaway: Randomness is intrinsic at the microscopic level, but statistics make the macroscopic behaviour deterministic.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What does the decay constant $$\\lambda$$ physically represent, and what are its units?", "answer": "$$\\lambda$$ is the probability per unit time that any given nucleus will decay. Its units are inverse time (e.g., $$s^{-1}$$). A larger $$\\lambda$$ means each nucleus is more \"eager\" to decay, so the sample as a whole decays faster. It is an intrinsic property of the isotope — not affected by temperature, pressure, or chemical state.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why is the relationship $$A = \\lambda N$$ intuitive? (2 steps)", "answer": "- Step 1: $$\\lambda$$ is the probability per second that one nucleus decays. If you have $$N$$ nuclei, then on average $$\\lambda N$$ of them will decay per second. That's literally the definition of activity.\n- Step 2: This explains why activity decreases over time even though $$\\lambda$$ is constant — as the sample decays, $$N$$ shrinks, so $$A = \\lambda N$$ shrinks proportionally. Activity and number of nuclei follow the *same* exponential curve.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Derive the half-life formula $$t_{1/2} = \\ln 2 / \\lambda$$ from the exponential decay law. (4 steps)", "answer": "- Step 1: Start with $$N = N_0 e^{-\\lambda t}$$, the exponential decay of nuclei.\n- Step 2: By definition, at $$t = t_{1/2}$$, the number remaining is $$N_0/2$$. Substitute: $$N_0/2 = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 3: Divide both sides by $$N_0$$: $$1/2 = e^{-\\lambda t_{1/2}}$$. Take natural log: $$\\ln(1/2) = -\\lambda t_{1/2}$$, which gives $$-\\ln 2 = -\\lambda t_{1/2}$$.\n- Step 4: Solve: $$t_{1/2} = \\ln 2 / \\lambda \\approx 0.693/\\lambda$$.\n\nTakeaway: Half-life and decay constant are inversely related — a short half-life means a large $$\\lambda$$ and rapid decay.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "A radioactive sample has an initial activity $$A_0$$. Without doing the full calculation, what is the activity after 3 half-lives, qualitatively?", "answer": "- Step 1: Each half-life multiplies the activity by $$1/2$$. After 3 half-lives, the factor is $$(1/2)^3 = 1/8$$.\n- Step 2: So the activity drops to $$A_0/8$$. The intuition: half-lives compound multiplicatively, not additively — the activity never reaches zero, just keeps halving.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why doesn't the half-life of an isotope depend on temperature, pressure, or chemical state?", "answer": "- Step 1: Radioactive decay is a *nuclear* process, governed by the strong and weak forces inside the nucleus. The energy scales involved are millions of electronvolts (MeV).\n- Step 2: Temperature, pressure, and chemistry only affect the *electrons* and the atomic-scale environment, with energy scales of eV — about a million times weaker than nuclear binding energies.\n- Step 3: So the nucleus is essentially \"shielded\" from outside conditions; its decay probability $$\\lambda$$ is fixed by nuclear physics, not by environment.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why must background radiation be subtracted from count-rate readings before doing half-life analysis?", "answer": "- Step 1: A Geiger counter detects all ionising radiation — including cosmic rays, radon, and other ambient sources, not just the source being studied.\n- Step 2: If you don't subtract background, your \"decay curve\" tends toward the background level rather than zero, distorting the apparent half-life (making it look longer than it is).\n- Step 3: The corrected count rate (source counts − background counts) gives the true activity from the sample, which is what follows $$A = A_0 e^{-\\lambda t}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Conceptually, how would you experimentally determine the half-life of an isotope whose half-life is billions of years, like uranium-238? (3 steps)", "answer": "- Step 1: You cannot wait for one half-life to pass. Instead, use $$A = \\lambda N$$ directly.\n- Step 2: Measure the activity $$A$$ of a known mass of pure isotope using a detector. From the mass and Avogadro's number, calculate $$N$$ (the number of nuclei present).\n- Step 3: Solve $$\\lambda = A/N$$, then use $$t_{1/2} = \\ln 2/\\lambda$$ to get the half-life. This lets you measure half-lives of billions of years from a single short experiment.\n\nTakeaway: For very long half-lives, you measure $$\\lambda$$ via $$A = \\lambda N$$, not by waiting.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "A sample starts with 800 Bq and the half-life is 20 minutes. Without doing exact arithmetic, what is the activity after 1 hour, and why?", "answer": "- Step 1: 1 hour = 60 minutes = 3 half-lives of 20 minutes each.\n- Step 2: Each half-life halves the activity. After 3 halvings: $$800 \\to 400 \\to 200 \\to 100$$ Bq.\n- Step 3: Equivalently, $$A = 800 \\times (1/2)^3 = 100$$ Bq. The pattern is multiplicative: each half-life is an independent factor of 1/2.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is $$N$$ in $$A = \\lambda N$$ the number of nuclei, not the mass or moles?", "answer": "- Step 1: $$\\lambda$$ is the probability that *one nucleus* decays per second. So to get total decays per second, you multiply by the *number of nuclei* available to decay.\n- Step 2: Mass and moles carry information about the amount of material, but you'd need to convert them to a count of nuclei (via molar mass and Avogadro's number) before using them in $$A = \\lambda N$$.\n- Step 3: Forgetting this leads to errors of orders of magnitude — a common exam trap.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What is the conceptual meaning of \"mass defect\" of a nucleus?", "answer": "The mass defect $$\\Delta m$$ is the difference between the sum of the individual masses of the constituent protons and neutrons, and the measured mass of the bound nucleus. The bound nucleus is *lighter* than its separated parts — this \"missing\" mass has been converted into the binding energy that holds the nucleus together, via $$\\Delta E = \\Delta m c^2$$. It is always positive for any stable bound nucleus.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why is the mass of a bound nucleus always less than the sum of its free nucleon masses? (3 steps)", "answer": "- Step 1: To assemble a nucleus, nucleons must \"fall into\" the strong nuclear potential well. Forming the bond releases energy (exothermic).\n- Step 2: By mass-energy equivalence ($$E = mc^2$$), releasing energy means the bound system has *less* total energy than the separated nucleons. Since mass and energy are equivalent, it also has *less mass*.\n- Step 3: This is the opposite of intuition from everyday life. If you tried to break the nucleus apart, you'd have to *supply* energy (the binding energy), and the system would gain that much mass back.\n\nTakeaway: A bound system is always lighter than its separated parts — that's the universal signature of binding.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why is \"binding energy\" a confusing name, and what is the correct way to think about it?", "answer": "- Step 1: The name suggests energy \"stored inside\" the nucleus, but it's actually the *opposite* — it's the energy you'd have to *put in* to pull the nucleus apart into separated nucleons.\n- Step 2: Equivalently, it's the energy *released* when free nucleons come together to form the nucleus. So a higher binding energy means the nucleus is *more* tightly bound and *more* stable, not that it's storing more usable energy.\n- Step 3: A common exam mistake is to describe binding energy as the energy \"in\" the nucleus — this is wrong. It's a *deficit* relative to the free state.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why is the atomic mass unit (u) defined as $$1/12$$ the mass of a carbon-12 atom, rather than the mass of a proton or hydrogen atom?", "answer": "- Step 1: Carbon-12 is exceptionally stable, abundant, and easy to handle. Using it as the reference gives a well-defined, reproducible standard across the world.\n- Step 2: One nucleon (proton or neutron) has a mass close to but not exactly 1 u, because each nucleon in C-12 has been \"discounted\" by C-12's binding energy. The 1/12 definition averages this out.\n- Step 3: The convenient consequence: any nucleus has a mass roughly equal to its mass number $$A$$ in u, with small deviations encoding binding-energy information.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why is $$1\\,\\text{u} \\approx 931.5\\,\\text{MeV}/c^2$$?", "answer": "- Step 1: This conversion comes from $$E = mc^2$$. Take $$1\\,\\text{u} \\approx 1.661 \\times 10^{-27}$$ kg, multiply by $$c^2 \\approx 9 \\times 10^{16}$$ m²/s² to get energy in joules.\n- Step 2: Convert from joules to electronvolts by dividing by $$1.6 \\times 10^{-19}$$ J/eV. The result is about $$1.49 \\times 10^{-10}$$ J $$\\approx 931.5$$ MeV.\n- Step 3: So 1 u of mass is equivalent to 931.5 MeV of energy. This conversion is the bridge between mass deficit (measured in u) and binding energy (expressed in MeV).\n\nTakeaway: Memorise this number — it's the universal converter between nuclear-scale mass and energy.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "If a nucleus has a mass defect of 0.03 u, what is its binding energy in MeV, conceptually?", "answer": "- Step 1: Use $$\\Delta E = \\Delta m \\cdot 931.5$$ MeV per u.\n- Step 2: $$0.03 \\times 931.5 \\approx 27.9$$ MeV. So roughly 28 MeV would be required to disassemble this nucleus into its constituent nucleons.\n- Step 3: The intuition: the mass deficit in u, times 931.5, gives binding energy in MeV — no need for explicit $$c^2$$ if you stay in these units.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What does the binding energy per nucleon ($$BE/A$$) tell you about a nucleus's stability, and why divide by $$A$$?", "answer": "- Step 1: Total binding energy grows roughly with nucleon number $$A$$, so just comparing total $$BE$$ unfairly favours heavy nuclei.\n- Step 2: Dividing by $$A$$ normalises: $$BE/A$$ measures how tightly *each individual nucleon* is bound on average. A higher value means each nucleon \"feels\" stronger net binding.\n- Step 3: This makes $$BE/A$$ the universal stability index. Iron-56 sits at the peak (~8.8 MeV/nucleon), meaning its nucleons are the most tightly bound of any element.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does the binding energy per nucleon curve peak around iron-56? (4 steps)", "answer": "- Step 1: For light nuclei, adding nucleons rapidly increases $$BE/A$$ because the strong nuclear force is short-range — more nearest neighbours means more binding bonds per nucleon. Surface effects dominate.\n- Step 2: As nuclei grow, each nucleon eventually has a \"saturated\" number of nearest neighbours (strong force only reaches ~1 fm), so adding more nucleons doesn't increase $$BE/A$$ much.\n- Step 3: Simultaneously, the long-range *electrostatic repulsion* between protons grows with $$Z^2$$ — every proton repels every other proton, not just neighbours. This destabilising force grows faster than nucleon count.\n- Step 4: The two effects balance near iron-56: beyond it, Coulomb repulsion wins and $$BE/A$$ falls; below it, surface effects make nuclei loosely bound. Iron-56 is the most stable nucleus.\n\nTakeaway: The peak is the tug-of-war between short-range nuclear attraction and long-range electric repulsion.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Why does fission release energy for heavy nuclei but not for light ones?", "answer": "- Step 1: Look at the $$BE/A$$ curve. Heavy nuclei (e.g., uranium) sit to the right of the iron-56 peak, at lower $$BE/A$$.\n- Step 2: Splitting a heavy nucleus produces two medium-mass nuclei, which sit higher on the curve — they have higher $$BE/A$$, meaning their nucleons are more tightly bound.\n- Step 3: The increase in $$BE/A$$ × number of nucleons = energy released. For light nuclei, splitting would *decrease* $$BE/A$$, costing energy rather than releasing it.\n\nTakeaway: Fission releases energy by moving rightward toward the peak from the heavy side.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why does fusion release energy for light nuclei but not for heavy ones?", "answer": "- Step 1: Light nuclei (hydrogen, deuterium, tritium) sit far to the left of the iron peak on the $$BE/A$$ curve, with very low binding energy per nucleon.\n- Step 2: Fusing two light nuclei climbs the *steep* left slope of the curve — the resulting nucleus has dramatically higher $$BE/A$$. The energy released per nucleon is much larger than in fission.\n- Step 3: For heavy nuclei, fusion would push beyond iron-56, *decreasing* $$BE/A$$ and requiring energy input. So fusion only releases energy on the light side.\n\nTakeaway: Fusion climbs the left slope; fission descends the right slope. Both move toward iron.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Per kilogram of fuel, why does fusion release more energy than fission, even though each fission event releases more energy than each fusion event?", "answer": "- Step 1: A single fission event (e.g., U-235) releases ~200 MeV; a single D-T fusion releases ~17 MeV. So per *event*, fission wins.\n- Step 2: But per *nucleon*, the picture flips. Fission's 200 MeV is spread across 235 nucleons → ~0.85 MeV/nucleon. Fusion's 17 MeV is spread across 5 nucleons → ~3.5 MeV/nucleon.\n- Step 3: Since \"per kg\" measures energy per unit *mass* (≈ per nucleon), fusion delivers roughly 4× the energy density of fission. This is why stars (powered by fusion) outshine anything we can build with fission.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Why do nuclear fission reactions typically require a slow-moving (thermal) neutron rather than a fast one?", "answer": "- Step 1: For a neutron to induce fission, it must be *absorbed* by the target nucleus (e.g., U-235). Absorption is a process where the neutron joins the nucleus, briefly forming an unstable compound nucleus.\n- Step 2: Faster neutrons spend less time near the nucleus and have less chance of being captured — they tend to scatter off rather than stick. Slow neutrons linger long enough to be absorbed.\n- Step 3: This is why reactors use *moderators* (water, graphite) to slow fast neutrons from earlier fissions down to thermal speeds, sustaining the chain reaction.\n\nTakeaway: Slow neutrons are absorbed; fast neutrons pass through. Moderation enables the chain reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What is a chain reaction in nuclear fission, and what makes it accelerate or stop? (3 steps)", "answer": "- Step 1: When U-235 absorbs a neutron and fissions, it releases 2–3 new neutrons. Each of these can be absorbed by another U-235 nucleus, triggering more fissions, which release more neutrons.\n- Step 2: If on average more than 1 neutron from each fission causes another fission, the rate grows exponentially — this is \"supercritical\" (used in bombs). Exactly 1 → steady reactor operation. Less than 1 → reaction dies out.\n- Step 3: Control rods (e.g., boron, cadmium) absorb excess neutrons in reactors to keep the rate at exactly 1, preventing runaway. Removing control rods speeds up the reaction; inserting them slows it.\n\nTakeaway: The neutron multiplication factor controls whether a chain reaction grows, stays steady, or fades.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "What is critical mass, and why does fission require a minimum amount of fissile material?", "answer": "- Step 1: When a neutron is emitted from a fission event, it might either (a) be absorbed by another nucleus inside the sample, or (b) escape through the surface of the sample without causing further fission.\n- Step 2: For a small sample, the surface area is large relative to the volume — most neutrons escape, so the chain reaction dies. As the sample grows, the volume (where absorption happens) grows faster than the surface (where escape happens).\n- Step 3: At the *critical mass*, exactly enough neutrons stay inside to sustain the chain reaction. Below this mass, fission can't be sustained; above it, the reaction can run away.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Why does nuclear fusion require extreme temperature and pressure to occur?", "answer": "- Step 1: Both nuclei being fused are positively charged. As they approach each other, they experience strong *Coulomb repulsion* that grows as $$1/r^2$$ and becomes enormous at small distances.\n- Step 2: For fusion to happen, the nuclei must get close enough (~1 fm) for the *strong nuclear force* to take over and bind them. To reach this distance, they need enough kinetic energy to overcome the Coulomb barrier.\n- Step 3: High temperature gives nuclei high kinetic energy (KE scales with T). High pressure (density) increases collision frequency. Stars achieve both via gravitational compression; on Earth, we use magnetic confinement or inertial confinement (lasers) to replicate this.\n\nTakeaway: Fusion is \"hard\" because you must beat the Coulomb barrier; that's why it requires star-like conditions.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "In the deuterium-tritium fusion reaction $$^2_1\\text{H} + ^3_1\\text{H} \\to ^4_2\\text{He} + ^1_0\\text{n}$$, why is energy released even though we're combining particles?", "answer": "- Step 1: Check the $$BE/A$$ curve. Deuterium and tritium are very light, with low $$BE/A$$. Helium-4 is exceptionally tightly bound, with much higher $$BE/A$$ (~7 MeV/nucleon).\n- Step 2: This means the total binding energy of the helium-4 nucleus exceeds the combined binding energies of the deuterium and tritium. The \"extra\" binding energy is released as kinetic energy of the products.\n- Step 3: Equivalently, the total mass of the products (He-4 + neutron) is *less* than the mass of the reactants. The mass deficit × $$c^2$$ gives the energy released (~17.6 MeV).", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "When a fission or fusion equation is written, what quantities must always balance, and why?", "answer": "- Step 1: The total nucleon number $$A$$ on the left must equal the total $$A$$ on the right — nucleons are not created or destroyed in these reactions.\n- Step 2: The total proton number $$Z$$ (charge) must balance — charge is conserved.\n- Step 3: But *mass* does not balance exactly. Some mass is converted to energy via $$\\Delta E = \\Delta m c^2$$. The \"missing\" mass (mass deficit) appears as kinetic energy of products and gamma radiation.\n\nTakeaway: Count nucleons and charges, not mass. Mass is the quantity that \"leaks\" into energy.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Conceptually, how would you calculate the energy released in a fission reaction given the masses of reactants and products? (3 steps)", "answer": "- Step 1: Sum the masses of all reactants (e.g., U-235 + neutron) in atomic mass units.\n- Step 2: Sum the masses of all products (e.g., Ba-141 + Kr-92 + 3 neutrons). Compute $$\\Delta m = m_\\text{reactants} - m_\\text{products}$$. This will be positive for an energy-releasing reaction.\n- Step 3: Multiply $$\\Delta m$$ (in u) by 931.5 to get energy released in MeV directly. For a typical fission, this comes out to ~200 MeV.\n\nTakeaway: Mass deficit × 931.5 MeV/u = energy released. Stay in u-and-MeV units to avoid messy unit conversions.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why do fission products (the \"daughter nuclei\") fly apart at high speed after splitting?", "answer": "- Step 1: Both daughter nuclei are positively charged. Immediately after the parent splits, they are very close together — the Coulomb repulsion between them is enormous.\n- Step 2: This electrostatic potential energy is rapidly converted into kinetic energy as they accelerate apart. Most of the ~200 MeV released in fission appears as kinetic energy of the two daughters.\n- Step 3: The kinetic energy of the daughters becomes heat in the surrounding material, which is what reactors harness to boil water and drive turbines.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "A sample's activity halves in 20 minutes. Roughly what fraction remains after 1 hour, and why is this *not* the same as just adding the half-life three times to the original activity?", "answer": "- Step 1: 1 hour = 3 half-lives. Each half-life multiplies the activity by 1/2.\n- Step 2: After 3 half-lives: $$(1/2)^3 = 1/8$$ remains. So ~12.5% remains.\n- Step 3: It's not additive because decay is *exponential*, not linear. You're not subtracting the same amount each half-life; you're halving the *current* amount each time. So the losses get smaller in absolute terms but stay proportionally the same.\n\nTakeaway: Half-lives compound multiplicatively. After $$n$$ half-lives, fraction remaining is $$(1/2)^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why is the exponential decay law $$N = N_0 e^{-\\lambda t}$$ the natural mathematical form of radioactive decay?", "answer": "- Step 1: The rate of decay at any instant is proportional to how many nuclei remain: $$dN/dt = -\\lambda N$$. This is because each nucleus has its own constant probability of decay, independent of others.\n- Step 2: This is a first-order linear differential equation, whose solution is $$N(t) = N_0 e^{-\\lambda t}$$. The exponential captures the idea that the *rate of loss* shrinks as the population shrinks.\n- Step 3: The same form applies to anything where the loss rate is proportional to the current amount: bacterial death, drug clearance, capacitor discharge. Radioactivity is one instance of a universal pattern.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why is fusion harder to achieve on Earth than fission, even though fusion releases more energy per kilogram?", "answer": "- Step 1: Fission only requires a neutron to approach a heavy nucleus. Neutrons are uncharged, so they feel no Coulomb barrier and can be absorbed at low energies (even at room temperature with slow neutrons).\n- Step 2: Fusion requires two *charged* nuclei to overcome their mutual Coulomb repulsion. This needs temperatures of tens of millions of kelvin to give nuclei enough kinetic energy to get close.\n- Step 3: Containing plasma at millions of degrees is enormously difficult — no material can touch it. We must use magnetic fields (tokamaks) or laser implosion. Achieving net energy gain has remained elusive for decades.\n\nTakeaway: Fission is easy because neutrons are free passes through the Coulomb barrier; fusion is hard because charged nuclei must climb it.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "If a star is \"burning\" hydrogen into helium via fusion, why does it eventually run out of fuel and die, given that hydrogen is abundant?", "answer": "- Step 1: Fusion in a star only occurs in the *core*, where temperature and density are high enough to overcome the Coulomb barrier. The outer hydrogen never reaches fusion conditions.\n- Step 2: As core hydrogen depletes, the helium \"ash\" accumulates, and fusion rate drops. The star then contracts and heats up, eventually igniting helium fusion (then carbon, etc.), climbing up the periodic table toward iron.\n- Step 3: At iron-56, fusion stops releasing energy (we're at the BE/A peak). Without an outward radiation pressure to balance gravity, the star collapses — this is the supernova mechanism. Elements heavier than iron form in the supernova itself.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Quickly: if isotope A has a half-life of 10 years and isotope B has a half-life of 100 years, which has the larger decay constant, and which has the higher activity per nucleus?", "answer": "- Step 1: Use $$\\lambda = \\ln 2 / t_{1/2}$$. Shorter half-life means larger $$\\lambda$$. So isotope A has a larger decay constant.\n- Step 2: Activity per nucleus is exactly $$\\lambda$$ (the probability of decay per second). So isotope A also has higher activity per nucleus.\n- Step 3: Intuition: a shorter half-life means each nucleus is \"more eager\" to decay — so per unit time, more of them go.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Why is the binding energy per nucleon of helium-4 anomalously high compared to its neighbours on the BE/A curve?", "answer": "- Step 1: Helium-4 has 2 protons and 2 neutrons — a \"doubly magic\" nucleus. Both proton and neutron numbers correspond to closed nuclear shells, similar to how noble gases have closed electron shells.\n- Step 2: Closed shells provide extra stability, raising BE/A above the smooth curve fit. So He-4 sits as a noticeable bump above the trend.\n- Step 3: This is why He-4 (an alpha particle) is the preferred decay product for heavy nuclei (alpha decay) and a key fusion product in stars — it's an unusually tight, stable configuration.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "A nucleus has mass defect such that 0.1% of its rest mass is \"missing.\" Roughly what is its binding energy per nucleon in MeV, and what does this say about its position on the BE/A curve?", "answer": "- Step 1: The rest mass of a nucleon is about 939 MeV/c². If 0.1% of the mass is converted to binding energy, that's about $$0.001 \\times 939 \\approx 0.94$$ MeV per nucleon.\n- Step 2: This is much lower than the peak value of ~8.8 MeV/nucleon. So this nucleus would sit far down on either the light or heavy side of the BE/A curve — not very tightly bound.\n- Step 3: For comparison, iron-56 has ~1% of its mass as binding energy. So the mass-defect fraction is roughly $$BE/A$$ divided by the nucleon rest energy.\n\nTakeaway: The fractional mass deficit (~0.01) is a quick measure of \"how close to iron\" a nucleus is.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Why does spontaneous fission occur for some heavy isotopes but not lighter ones?", "answer": "- Step 1: Spontaneous fission happens when the energy barrier between the bound nucleus and its split products is small enough that quantum tunnelling allows the split without external input.\n- Step 2: For light nuclei (below iron), splitting *costs* energy — the products are less tightly bound than the parent — so there's no driving force. The barrier is effectively infinite.\n- Step 3: For very heavy nuclei (e.g., U-238, Cf-252), the products are more tightly bound (energy is released), and the barrier is low enough that some nuclei spontaneously split via tunnelling. Heavier still → higher rate of spontaneous fission.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "What is the physical meaning of the equation $$\\Delta E = \\Delta m c^2$$ in the context of nuclear physics?", "answer": "- Step 1: Mass and energy are two forms of the same physical quantity. The constant $$c^2$$ is the conversion factor — and it's huge ($$9 \\times 10^{16}$$ in SI), meaning a tiny amount of mass corresponds to an enormous amount of energy.\n- Step 2: In nuclear reactions, *some mass disappears* from the reactants. That mass is converted into kinetic energy of products and photons. This is why nuclear processes release millions of times more energy than chemical ones (which only rearrange electrons, not nucleons).\n- Step 3: A nuclear power plant running on 1 kg of fuel converts perhaps 1 gram of mass into energy — equivalent to $$10^{-3} \\times (3 \\times 10^8)^2 = 9 \\times 10^{13}$$ J, enough to power a city for hours.\n\nTakeaway: $$c^2$$ is the universal \"exchange rate\" between matter and energy; nuclear physics exploits it.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Suppose you measure the activity of a sample at two different times: $$A_1 = 400$$ Bq at $$t_1$$, and $$A_2 = 100$$ Bq at $$t_2 = t_1 + 30$$ min. What is the half-life, conceptually?", "answer": "- Step 1: The activity dropped by a factor of 4 = $$2^2$$. So 2 half-lives elapsed in 30 minutes.\n- Step 2: Therefore, one half-life = 30/2 = 15 minutes.\n- Step 3: The general method: count how many factors of 2 the activity dropped by, divide the time by that count, and you get the half-life. No exponential math needed for nice ratios.\n\nTakeaway: For exam efficiency, recognise factors of 2, 4, 8, 16 as 1, 2, 3, 4 half-lives.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why does the activity curve of a radioactive sample look \"smooth\" on a graph, even though decay is fundamentally random?", "answer": "- Step 1: A typical sample contains $$\\sim 10^{20}$$ nuclei. Random fluctuations scale as $$\\sqrt{N}$$, so the *relative* fluctuation is $$1/\\sqrt{N} \\approx 10^{-10}$$ — completely invisible at sample scale.\n- Step 2: This means even though each individual decay is unpredictable, the *average* decay rate is incredibly stable. The graph looks smooth because the noise is buried far below the scale of the macroscopic measurement.\n- Step 3: If you instead watched a tiny sample of, say, 100 nuclei, the curve would look noticeably jagged and statistical fluctuations would be obvious.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Common misconception probe: \"Half-life is the time for *all* the nuclei to decay.\" Why is this wrong?", "answer": "- Step 1: Half-life is the time for *half* the nuclei to decay — not all. The remaining half then takes another half-life to halve again, and so on.\n- Step 2: In principle, the number of nuclei never reaches exactly zero — the exponential decay only asymptotically approaches zero. After 10 half-lives, only $$(1/2)^{10} \\approx 0.1\\%$$ remains, but not zero.\n- Step 3: In practice, after enough half-lives the activity drops below background, so we can't distinguish it. But the formal statement is: decay continues indefinitely, with halving at fixed intervals.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Why is fusion in the Sun's core a \"self-regulating\" reaction, while a fission chain reaction can run away into a bomb?", "answer": "- Step 1: In fusion, the reaction rate depends sensitively on temperature and density. If fusion speeds up, the core heats and expands; expansion lowers density, reducing the fusion rate. Gravity pulls it back in — a stable feedback loop.\n- Step 2: In fission, the chain reaction depends on neutron multiplication. If the multiplication factor exceeds 1, each generation produces more neutrons than the last, doubling exponentially in microseconds. There's no built-in damping.\n- Step 3: This is why fission needs active control (control rods); fusion is inherently stable on stellar scales. On Earth, magnetic-confinement fusion is also stable in this sense — the challenge is achieving the conditions, not preventing runaway.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Edge case: what happens if you try to split iron-56 by fission, or fuse iron-56 with another iron-56?", "answer": "- Step 1: Iron-56 sits at the peak of the BE/A curve — it's the most tightly bound nucleus per nucleon. Any move away from it (either splitting or combining) decreases BE/A.\n- Step 2: Splitting iron would produce lighter nuclei with lower BE/A → energy must be *supplied*, not released. The reaction is endothermic.\n- Step 3: Fusing iron with iron would produce a heavier nucleus past the peak, also with lower BE/A → again endothermic. This is why stars die at iron: neither fusion nor fission of iron releases energy, so no more nuclear fuel.\n\nTakeaway: Iron-56 is the universe's nuclear \"ground state\" in the sense of BE/A — energy flows toward it from both directions.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why is helium-4 the preferred end-product in stellar fusion rather than, say, helium-3 or lithium?", "answer": "- Step 1: Helium-4 is doubly magic (2 protons, 2 neutrons in closed shells), giving it exceptionally high BE/A compared to its neighbours. So fusing toward He-4 releases the most energy per nucleon in the early periodic table.\n- Step 2: Helium-3 is less bound; lithium-5 is actually unstable. So thermodynamics and stability favour the proton-proton chain ending at He-4.\n- Step 3: Once He-4 builds up, further fusion (3 He-4 → C-12, the \"triple-alpha\" process) requires much higher temperatures, occurring only in older, hotter stars.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "If 1 kg of uranium-235 undergoes complete fission, roughly what fraction of that mass is converted to energy?", "answer": "- Step 1: Each fission of U-235 releases ~200 MeV. The total binding energy of U-235 is ~1800 MeV (about 7.6 MeV/nucleon × 235). So fission converts about 200/1800 ≈ 11% of the *binding energy* into kinetic energy of products.\n- Step 2: But the fraction of *rest mass* converted is much smaller. 200 MeV / (235 × 931.5 MeV) ≈ 0.09% of the rest mass is converted to energy per fission.\n- Step 3: So 1 kg of U-235 converts roughly 1 g of mass to energy — about $$9 \\times 10^{13}$$ J, which is millions of times more than burning 1 kg of coal.\n\nTakeaway: Even nuclear reactions only convert a tiny fraction of mass to energy, but that \"tiny\" is millions of times more efficient than chemistry.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Why do uncharged neutrons not need to overcome a Coulomb barrier to be absorbed by a nucleus, but charged protons do?", "answer": "- Step 1: The Coulomb barrier comes from the electrostatic repulsion between two positive charges. A proton approaching a nucleus feels this repulsion strongly at small distances, requiring high kinetic energy to overcome.\n- Step 2: A neutron has zero charge, so it experiences no Coulomb force. It can approach the nucleus at any energy and, if it gets close enough, be captured by the strong nuclear force.\n- Step 3: This is why fission can be triggered by slow neutrons — there's no barrier. Proton-induced reactions, in contrast, require accelerators to give protons MeV-level kinetic energies.\n\nTakeaway: No charge = no Coulomb barrier. Neutrons are uniquely suited for inducing nuclear reactions at low energy.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Synthesis question: in a nuclear reactor, why is the energy production essentially continuous and controllable, while a nuclear bomb releases its energy in microseconds?", "answer": "- Step 1: In a reactor, the neutron multiplication factor is kept at exactly 1 by control rods absorbing excess neutrons. Each fission generates 1 next-generation fission on average — a steady state.\n- Step 2: In a bomb, the multiplication factor is well above 1 (e.g., 1.5 or 2). Each fission generates multiple next-generation fissions, doubling every ~$$10^{-8}$$ seconds (the time between fission events). In 80 generations, you have $$2^{80} \\approx 10^{24}$$ fissions — essentially all atoms in a kg-scale critical mass.\n- Step 3: This is why a bomb's energy output is concentrated in microseconds: the exponential explosion of fission events. Reactors avoid this by tuning the multiplication factor.\n\nTakeaway: Reactor = stable feedback (factor = 1). Bomb = runaway exponential (factor > 1). Same physics, vastly different outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Synthesis: trace conceptually why nuclear fusion of hydrogen powers the Sun for billions of years rather than exploding in seconds.", "answer": "- Step 1: Fusion requires extreme density and temperature, which only exist in the core of the Sun. Outside the core, conditions are too cool. So only a tiny fraction of the Sun's hydrogen is fusing at any moment.\n- Step 2: The fusion rate is also limited by a *weak interaction* step (proton-proton → deuterium + positron + neutrino), which has a tiny cross-section. This makes the per-proton fusion rate extremely slow.\n- Step 3: Gravity holds the Sun together against the outward radiation pressure of fusion. If fusion sped up, the core would expand and cool, reducing the rate — a negative feedback loop. This self-regulation keeps the Sun stable for ~10 billion years total.\n\nTakeaway: The Sun is a slow, regulated furnace — fast enough to outshine billions of stars, slow enough to last billions of years.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Common trap probe: a student says \"energy is released because mass *increases* during fusion.\" Why is this wrong?", "answer": "- Step 1: It's the opposite. In fusion (and fission), the total mass of *products* is *less* than the mass of reactants. The \"missing\" mass is what gets converted into energy via $$E = mc^2$$.\n- Step 2: The bound product nucleus is more tightly bound (higher BE/A), and binding energy corresponds to *lower* mass. So products are lighter than reactants by an amount equal to the energy released divided by $$c^2$$.\n- Step 3: The rule: energy is released ⟺ products are lighter than reactants ⟺ products are more tightly bound. Mass decrease, not increase, signals an exothermic nuclear reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why can you express mass in units like MeV/$$c^2$$, and what's the practical advantage in nuclear physics?", "answer": "- Step 1: Since $$E = mc^2$$, dividing an energy by $$c^2$$ gives a mass: $$m = E/c^2$$. So \"MeV/$$c^2$$\" is just a mass unit derived from an energy unit.\n- Step 2: In nuclear physics, masses and binding energies are almost always tightly linked. Using MeV/$$c^2$$ (or just MeV via implicit $$c^2$$) lets you skip annoying SI unit conversions: $$E$$ in MeV, mass in MeV/$$c^2$$, and energy = mass × $$c^2$$ becomes trivial.\n- Step 3: Example: an electron mass is 0.511 MeV/$$c^2$$. To compute its rest energy, just write 0.511 MeV — no calculator needed.\n\nTakeaway: MeV/$$c^2$$ is the natural mass unit for nuclear physics, baking in the conversion factor.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 43335, "out_tokens": 14627, "reasoning_chars": 3802, "cost_eur": 0.089, "elapsed_s": 323, "content_chars": 51365}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 43335, "out_tokens": 14783, "reasoning_chars": 1281, "cost_eur": 0.0895, "elapsed_s": 324, "content_chars": 55202}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 42168, "out_tokens": 7777, "reasoning_chars": 1692, "cost_eur": 0.0156, "elapsed_s": 78, "content_chars": 29075}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 42168, "out_tokens": 9376, "reasoning_chars": 1567, "cost_eur": 0.0172, "elapsed_s": 85, "content_chars": 35546}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 63548, "out_tokens": 20844, "reasoning_chars": 0, "cost_eur": 2.3152, "elapsed_s": 281, "content_chars": 49933}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_t const SK='phys_halflife_fission_jun25_alex';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
