rce": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Explain why nuclear fusion requires extremely high temperatures and pressures, whereas fission can occur at room temperature. (2 steps)", "answer": "- Step 1: Fusion requires two positively charged light nuclei (like hydrogen isotopes) to overcome electrostatic repulsion and get close enough (~10⁻¹⁵ m) for the strong nuclear force to bind them together. This Coulomb barrier is enormous — nuclei must have very high kinetic energy to overcome it.\n- Step 2: High temperature (millions of degrees) gives particles the kinetic energy needed to overcome repulsion. High pressure (in stars) ensures high density so collisions are frequent. In contrast, fission is induced by neutron absorption — neutrons have no charge, so they can approach nuclei without electrical repulsion. A slow neutron hitting U-235 causes fission at any temperature.\n\nThis is why fusion is so difficult to achieve on Earth — we need to recreate stellar conditions.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "Write the nuclear equation for deuterium-tritium fusion and explain why energy is released. (2 steps)", "answer": "- Step 1: The reaction is: ²H + ³H → ⁴He + ¹n + energy\n+ Deuterium (²H): 1 proton, 1 neutron\n+ Tritium (³H): 1 proton, 2 neutrons\n+ Helium-4 (⁴He): 2 protons, 2 neutrons\n+ Plus one neutron released\n- Step 2: The total mass of the products (helium-4 + neutron) is less than the total mass of the reactants (deuterium + tritium). This mass deficit Δm is converted to kinetic energy via E = Δmc² (~17.6 MeV). From the BE/nucleon perspective: deuterium and tritium have very low BE/nucleon (~1.1 MeV and ~2.8 MeV), while helium-4 has much higher BE/nucleon (~7.1 MeV). The increase in BE/nucleon releases energy.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Why is background radiation subtracted when measuring the activity of a radioactive source in the laboratory? (2 steps)", "answer": "- Step 1: Background radiation comes from natural sources: radon gas from rocks, cosmic rays from space, carbon-14 in organic material, and even traces in food/drink. It is always present in the environment, typically around 15-20 counts per minute in the UK.\n- Step 2: When measuring a radioactive source, the Geiger counter detects radiation from BOTH the source AND the background. If we don't subtract background, our measured count rate will be too high. The corrected count rate = measured count rate − background count rate. This ensures we're measuring only the radiation from our source.\n\nThis is a common exam trap — failing to account for background radiation will give incorrect half-life calculations.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Explain why the half-life of a radioactive isotope is independent of the physical or chemical conditions of the sample. (2 steps)", "answer": "- Step 1: Radioactive decay is a nuclear process driven by the instability of the nucleus. It depends only on the specific nuclear configuration — the balance of protons and neutrons.\n- Step 2: External factors like temperature, pressure, chemical bonding, or physical state (solid/liquid/gas) affect only the electrons surrounding the nucleus, not the nucleus itself. Since decay is governed by nuclear forces, not electromagnetic interactions with electrons, half-life remains constant. This has been experimentally verified — the half-life of carbon-14 is the same whether it's in a living tree or ancient charcoal.\n\nThis is why radioactive dating works reliably across different environmental conditions.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A sample of carbon-14 has a half-life of 5730 years. A fossil is found to have 1/16 of the original carbon-14 activity. How old is the fossil? (2 steps)", "answer": "- Step 1: 1/16 = (½)^n, so 2^n = 16, giving n = 4 half-lives.\n- Step 2: Age = number of half-lives × half-life = 4 × 5730 = 22,920 years.\n\nThe key is recognizing that 1/16 corresponds to 4 half-lives (since 2⁴ = 16). This is much faster than using logarithms for simple fractions.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the binding energy per nucleon graph, helium-4 sits above the smooth curve. What does this tell us about its stability, and why is this relevant to fusion energy production in stars? (2 steps)", "answer": "- Step 1: Helium-4 has abnormally high binding energy per nucleon compared to its neighbors, indicating it is particularly stable — more stable than the general trend would suggest. This \"neck\" in the curve reflects that alpha particles (helium nuclei) are especially tightly bound.\n- Step 2: This is crucial for stellar fusion. The proton-proton chain and CNO cycle both produce helium-4 as the end product. Because helium-4 is so stable, the fusion pathway is energetically favorable — moving from hydrogen (low BE/nucleon) to helium (high BE/nucleon) releases significant energy, which is what powers the Sun and other stars.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "What is the difference between spontaneous fission and induced fission? Which one occurs in nuclear power reactors? (2 steps)", "answer": "- Step 1: Spontaneous fission occurs without external trigger — a heavy nucleus splits randomly on its own, similar to alpha decay but producing two large fragments. Induced fission requires a neutron to be absorbed by the nucleus, making it unstable and causing it to split.\n- Step 2: Nuclear power reactors use induced fission. A slow (thermal) neutron is absorbed by U-235, causing it to become U-236 (excited), which then splits into two daughter nuclei + 2-3 neutrons + energy. These neutrons go on to cause more fission, sustaining the chain reaction. Control rods absorb excess neutrons to regulate the reaction rate.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why is lead used as shielding against gamma radiation, while paper is sufficient for alpha particles? (2 steps)", "answer": "- Step 1: The penetrating ability of radiation depends on its charge and mass:\n+ Alpha (α): +2 charge, mass 4 — large, heavily charged, easily stopped by a few cm of air or paper. It ionizes strongly but can't penetrate far.\n+ Gamma (γ): No charge, electromagnetic wave — penetrates deeply. It interacts with matter by photoelectric effect, Compton scattering, and pair production.\n- Step 2: Lead is dense and has high atomic number (82), providing many electrons per unit volume for gamma photons to interact with. A few centimeters of lead can significantly attenuate even high-energy gamma rays. Aluminum (a few mm) stops beta, but gamma requires the densest materials.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why can't a single gamma ray in empty space produce an electron-positron pair? (2 steps)", "answer": "- Step 1: Pair production requires a photon to convert into a particle-antiparticle pair (e.g., electron + positron). This process must conserve both energy AND momentum.\n- Step 2: A single photon has zero rest mass, so its momentum = E/c. For two particles (electron + positron), each with rest mass m_e, the minimum energy required is 2m_ec² ≈ 1.022 MeV. However, even with sufficient energy, momentum cannot be conserved with just one photon — a nearby nucleus or atom is needed to absorb the recoil momentum. In empty space, this third body doesn't exist, so pair production cannot occur.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "If a muon has a proper lifetime of 2.2 μs but is detected at sea level after traveling 10 km, does this contradict physics? Explain using relativistic effects. (2 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is indeed 2.2 μs. At relativistic speeds (e.g., 0.99c), two effects occur:\n+ Time dilation: The muon's \"clock\" runs slower from our perspective. The dilated lifetime t = γt₀ where γ = 1/√(1-v²/c²) ≈ 7 at v = 0.99c.\n+ Length contraction: The distance the muon travels is contracted in its frame.\n- Step 2: In the lab frame, the muon's lifetime appears extended to ~15 μs. At 0.99c, it can travel about 4.5 km — still less than 10 km. But more precisely, accounting for the full relativistic transformation, muons created in the upper atmosphere do reach sea level. This is direct experimental evidence for time dilation and length contraction — without relativity, they couldn't survive the journey.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "In a nuclear reactor, what is the purpose of control rods, and what would happen if they were suddenly completely removed from a critical reactor? (2 steps)", "answer": "- Step 1: Control rods (usually made of boron or cadmium) absorb excess neutrons. By sliding them in or out, operators control the neutron flux and thus the rate of the fission chain reaction.\n- Step 2: If control rods were completely removed from a reactor operating at criticality, the reactor would become supercritical. The neutron multiplication factor k would exceed 1, causing exponential growth in the fission rate. This would lead to a rapid energy release — a \"power excursion\" — and could cause a meltdown or explosion, as occurred at Chernobyl in 1986.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why does fission release energy for heavy nuclei but fusion releases energy for light nuclei, despite both processes potentially involving similar mass changes? (2 steps)", "answer": "- Step 1: Energy release in nuclear reactions comes from the increase in binding energy per nucleon. The binding energy per nucleon curve peaks at iron-56 (A ≈ 56).\n- Step 2: For heavy nuclei (A > 56), like uranium, BE/nucleon decreases as A increases. Fission splits them into two medium nuclei with higher BE/nucleon — energy is released because the products are more tightly bound. For light nuclei (A < 56), BE/nucleon increases sharply with A. Fusion combines them into a heavier nucleus with higher BE/nucleon — energy is released. Both processes move toward the peak of the curve, which is why both release energy.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "What is the relationship between activity A, number of nuclei N, and decay constant λ? If the number of nuclei decreases by a factor of 2, by what factor does the activity decrease? (2 steps)", "answer": "- Step 1: Activity A = λN. This fundamental equation shows activity is directly proportional to both the decay constant (probability per second) and the number of undecayed nuclei present.\n- Step 2: If N decreases by a factor of 2 (N → N/2), then since A is proportional to N, activity also decreases by a factor of 2 (A → A/2). This is why activity and number of nuclei both halve after one half-life — they're directly linked through the decay constant.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In the context of nuclear physics, explain why 1 GeV/c² is a convenient unit for expressing particle masses. (2 steps)", "answer": "- Step 1: In nuclear and particle physics, mass and energy are interchangeable via E = mc². Rather than constantly converting between kilograms and joules, physicists use energy units for mass: MeV/c² or GeV/c².\n- Step 2: The conversion is simple: 1 GeV/c² = 1.78 × 10⁻²⁷ kg. A proton has rest mass ~938 MeV/c² ≈ 0.938 GeV/c², close to 1 GeV/c². This makes calculations easier — in collisions, you can directly compare kinetic energy (in GeV) to rest mass energy (in GeV). It simplifies the bookkeeping in relativistic mechanics.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Explain what happens to the count rate of a GM tube placed near a radioactive source over time, and why fluctuations occur around the expected exponential decay curve. (2 steps)", "answer": "- Step 1: The count rate decreases exponentially with time according to A = A₀e^(-λt). After each half-life, it should halve.\n- Step 2: However, radioactive decay is random — each decay is independent. For small samples, statistical fluctuations cause the actual count rate to scatter around the predicted value. With large samples, the law of large numbers means the average follows the exponential curve closely. The \"noise\" is more noticeable with low activity sources. This randomness is fundamental evidence that decay is truly probabilistic at the nuclear level.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why is carbon-14 dating unsuitable for determining the age of geological formations that are millions of years old? (2 steps)", "answer": "- Step 1: Carbon-14 has a half-life of ~5730 years. After about 5 half-lives (~28,000 years), only about 3% of the original C-14 remains — too little to measure accurately.\n- Step 2: For geological timescales (millions of years), C-14 would have completely decayed away. For dating such old rocks, we use isotopes with much longer half-lives, such as uranium-238 (half-life 4.5 billion years) or potassium-40 (half-life 1.3 billion years). These isotopes are used in radiometric dating of rocks and minerals.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In a nuclear fission reaction of U-235, about 200 MeV of energy is released. Estimate the mass loss (in kg) for one fission event. (2 steps)", "answer": "- Step 1: Use ΔE = Δmc². Given ΔE = 200 MeV = 200 × 10⁶ eV = 200 × 10⁶ × 1.6 × 10⁻¹⁹ J = 3.2 × 10⁻¹¹ J.\n- Step 2: Rearranging: Δm = ΔE/c² = (3.2 × 10⁻¹¹ J) / (3 × 10⁸ m/s)² = 3.2 × 10⁻¹¹ / 9 × 10¹⁶ = 3.6 × 10⁻²⁸ kg per fission.\n\nThis tiny mass loss (~0.1% of the uranium mass) multiplied by the enormous number of fissions in a reactor (10²⁰ per second) produces gigawatts of power.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Why do both alpha and beta decay conserve nucleon number, while gamma decay does not change either nucleon or proton number? (2 steps)", "answer": "- Step 1: In alpha decay, the nucleus emits an alpha particle (²He⁴), losing 2 protons and 2 neutrons. Nucleon number decreases by 4, proton number decreases by 2. In beta-minus, a neutron converts to proton + electron + antineutrino: n → p + e⁻ + v̄. Nucleon number A stays the same, proton number Z increases by 1.\n- Step 2: Gamma decay is simply the nucleus shedding excess energy as a high-energy photon. The nucleon configuration doesn't change — no particles are emitted, only electromagnetic radiation. Therefore, both A and Z remain unchanged.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why is it theoretically impossible for a nucleus to have equal numbers of protons and neutrons for very heavy elements? (1 step)", "answer": "For very heavy nuclei (high Z), the electrostatic repulsion between protons becomes enormous. To maintain stability, these nuclei need more neutrons than protons — neutrons provide the strong nuclear force binding without adding Coulomb repulsion. Uranium-238 has 92 protons but 146 neutrons (ratio ~1:1.6). Beyond a certain point, no number of neutrons can prevent spontaneous fission — that's why the heaviest elements are unstable and radioactive.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the physical significance of the \"peak\" in the binding energy per nucleon curve at iron-56? (2 steps)", "answer": "- Step 1: Iron-56 (Fe-56) has the highest binding energy per nucleon (~8.8 MeV/nucleon) of any nucleus. This means it is the most thermodynamically stable nucleus — moving away from iron in either direction requires adding energy.\n- Step 2: For nuclei lighter than iron, fusion increases BE/nucleon (releases energy). For nuclei heavier than iron, fission increases BE/nucleon (releases energy). This is why iron is the \"ash\" at the end of stellar nucleosynthesis — fusion stops at iron because further fusion would consume energy rather than release it.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A Geiger counter reads 80 counts per minute near a radioactive source. The background count is 20 counts per minute. What is the corrected count rate? (1 step)", "answer": "The corrected count rate = measured rate − background rate = 80 − 20 = 60 counts per minute.\n\nThis is essential for accurate half-life and activity measurements — forgetting to subtract background is a common exam error.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why do positron emission and electron capture both increase atomic number by 1 while decreasing nucleon number by 0? (2 steps)", "answer": "- Step 1: In beta-plus (positron) decay, a proton converts to a neutron: p → n + e⁺ + v_e. A positron is emitted, so Z decreases by 1, but A stays the same.\n- Step 2: In electron capture, an orbital electron is absorbed by the nucleus: p + e⁻ → n + v_e. The electron combines with a proton, forming a neutron. Again, Z decreases by 1 (one fewer proton), A stays the same. Both processes move toward more neutron-rich nuclei for proton-heavy isotopes.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "If you had a sample containing 10²⁴ nuclei with a decay constant of 10⁻¹⁵ s⁻¹, what would be its activity in Bq? (2 steps)", "answer": "- Step 1: Activity A = λN = (10⁻¹⁵ s⁻¹) × (10²⁴) = 10⁹ s⁻¹.\n- Step 2: Since 1 Bq = 1 decay per second, the activity is 10⁹ Bq, or 1 GBq.\n\nThis shows how large the number of atoms must be to give measurable activity in the lab.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why does the activity of a radioactive sample decrease more rapidly at the beginning of its decay than toward the end, even though the decay constant is constant? (2 steps)", "answer": "- Step 1: The decay constant λ is indeed constant — each nucleus has the same probability of decaying per second throughout. The key is that activity depends on the number of remaining nuclei: A = λN.\n- Step 2: At the beginning, there are many nuclei (large N), so even with constant λ, many decays occur per second (high A). As time passes, N decreases (because nuclei have decayed). With fewer nuclei present, even though each still has the same probability, the absolute number decaying per second decreases. This creates the characteristic exponential decay curve — the rate of decrease in activity is proportional to the activity itself.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}], "count": 33}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What does the decay constant λ represent in radioactive decay, and how is it related to half-life? (3 steps)", "answer": "- Step 1: Define the decay constant.\n- The decay constant λ is defined as the probability per unit time that a given individual nucleus will decay. It has units of s⁻¹ (or year⁻¹).\n- Step 2: Explain its relationship with half-life.\n- The half-life t½ is the time taken for half the nuclei to decay. Through exponential decay analysis:\n- When N = N₀/2 at t = t½, we get: N₀/2 = N₀e^(-λt½)\n- Solving: 1/2 = e^(-λt½), so ln(1/2) = -λt½\n- Therefore: t½ = ln(2)/λ ≈ 0.693/λ\n- Step 3: State the key relationship.\n- λ and t½ are inversely proportional: a larger decay constant means a shorter half-life (faster decay), and vice versa.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why is radioactive decay described as a \"random\" process, and what implications does this have for predicting decay? (2 steps)", "answer": "- Step 1: Explain the nature of randomness in nuclear decay.\n- For any individual unstable nucleus, it is impossible to predict exactly when it will decay or which decay mode (alpha, beta, or gamma) it will undergo. Each nucleus has a constant probability of decay per unit time, but the exact timing is genuinely random.\n- Step 2: Explain how statistical predictions become possible.\n- However, with a large sample containing billions of nuclei, the collective behavior becomes highly predictable due to statistical averaging. This is why we can define half-life and activity as reliable measurable quantities for macroscopic samples, even though individual nuclei are unpredictable.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "Define mass defect and explain why a bound nucleus has less mass than its separate nucleons. (3 steps)", "answer": "- Step 1: Define mass defect.\n- Mass defect (or mass deficit) Δm is the difference between the measured mass of a nucleus and the sum of the masses of its individual constituent nucleons (protons and neutrons).\n- Mathematically: Δm = [Z × mₚ + (A-Z) × mₙ] - m_total\n- Step 2: Explain the mass-energy equivalence principle.\n- According to Einstein's theory of relativity, mass and energy are equivalent (E = mc²). When nucleons bind together to form a nucleus, they release energy (the binding energy). This released energy corresponds to a loss of mass.\n- Step 3: Explain the physical meaning.\n- A system of bound nucleons is more stable and has lower energy than the same nucleons separated. Since E = mc², this lower energy manifests as a smaller mass. The mass defect is always positive, meaning the nucleus is always lighter than the sum of its parts.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the atomic mass unit (u), and why is it convenient for nuclear physics calculations? (2 steps)", "answer": "- Step 1: Define the atomic mass unit.\n- The unified atomic mass unit (u) is defined as exactly 1/12 of the mass of a carbon-12 atom. It serves as a convenient unit for expressing nuclear masses.\n- Step 2: State its numerical values and utility.\n- 1 u = 1.661 × 10⁻²⁷ kg\n- Since mass and energy are related by E = mc², 1 u is also equivalent to 931.5 MeV/c²\n- This allows easy conversion between mass (in u) and energy (in MeV), which is particularly useful in nuclear physics where energies are typically in MeV rather than joules.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Using the atomic mass unit, calculate the binding energy (in MeV) released when a nucleus has a mass defect of 0.03 u. (2 steps)", "answer": "- Step 1: Apply the conversion factor.\n- We know that 1 u ≡ 931.5 MeV/c²\n- Therefore, the energy equivalent of the mass defect is:\n- ΔE = Δm × 931.5 MeV\n- ΔE = 0.03 × 931.5 MeV\n- Step 2: Calculate the result.\n- ΔE ≈ 27.945 MeV ≈ 27.9 MeV\n- This energy represents the binding energy — the energy that would be required to completely separate the nucleus into its individual protons and neutrons.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Sketch the binding energy per nucleon curve and label its key features. What does the curve tell us about nuclear stability? (3 steps)", "answer": "- Step 1: Describe the shape of the curve.\n- The curve plots binding energy per nucleon (vertical axis, typically 0-9 MeV/nucleon) against nucleon number A (horizontal axis, 1 to ~250).\n- Key features:\n  + Steep rise at low A (hydrogen/helium region)\n  + Reaches a peak near iron-56 (Fe) at approximately 8.8 MeV/nucleon\n  + Gradual decline for heavier nuclei (A > 56)\n- Step 2: Explain the stability interpretation.\n- Higher binding energy per nucleon means greater stability — more energy is required to remove a nucleon. Iron-56 is the most stable nucleus.\n- Step 3: Explain the anomalies.\n- Helium-4 (²He) sits above the smooth curve, showing exceptional stability (like a \"double magic number\" nucleus). This is why helium-4 is a common product in nuclear reactions.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Explain why nuclear fission releases energy using the binding energy per nucleon curve. (3 steps)", "answer": "- Step 1: Identify the position of fission reactants.\n- Fission typically involves heavy nuclei (like uranium-235, A ≈ 235) located on the right side of the curve where binding energy per nucleon is relatively low (about 7.6 MeV/nucleon for U-235).\n- Step 2: Identify the position of fission products.\n- When uranium splits (e.g., into barium-141 and krypton-92), these medium-mass nuclei have higher binding energy per nucleon (about 8.3-8.5 MeV/nucleon).\n- Step 3: Explain the energy release.\n- Since the products have higher binding energy per nucleon, they are more tightly bound. The increase in binding energy per nucleon (multiplied by the total number of nucleons) is released as kinetic energy of the fragments and gamma radiation. In essence, the system \"falls deeper\" into the potential well of the strong nuclear force, releasing energy in the process.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Describe the process of nuclear fission in uranium-235, including what is absorbed and what products are formed. (3 steps)", "answer": "- Step 1: Describe the initiation.\n- A slow (thermal) neutron is absorbed by a uranium-235 nucleus, forming an excited uranium-236 nucleus. This absorption makes the nucleus unstable.\n- Step 2: Describe the fission event.\n- The unstable nucleus splits into two smaller daughter nuclei (fission fragments). A typical reaction is:\n- ²³⁵U + ¹n → ¹⁴¹Ba + ⁹²Kr + 3¹n + energy\n- (Note: Many different fission products are possible, but barium-krypton is one common pathway.)\n- Step 3: Describe the products and energy.\n- Each fission releases:\n  + 2-3 fast neutrons\n  + Kinetic energy of the daughter nuclei (about 165 MeV)\n  + Gamma radiation and beta decay of fragments (about 15 MeV)\n- Total energy release ≈ 200 MeV per fission.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What is a nuclear chain reaction, and why is it important for both nuclear power and nuclear weapons? (2 steps)", "answer": "- Step 1: Define chain reaction.\n- In nuclear fission, each fission event releases 2-3 neutrons. These neutrons can be absorbed by other nearby fissile nuclei (like U-235), causing additional fission events. This creates a self-sustaining cascade — each generation of fissions triggers more fissions in the next generation.\n- Step 2: Explain the two applications.\n- **Nuclear power:** The reaction is carefully controlled using control rods (which absorb excess neutrons) to maintain a steady, subcritical rate of energy production. The heat generated is used to produce steam and drive turbines.\n- **Nuclear weapons:** A supercritical mass is assembled very quickly (before the bomb disassembles itself), causing an exponentially increasing chain reaction and enormous energy release in a fraction of a second.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Explain why nuclear fusion releases energy, using the binding energy per nucleon curve. (3 steps)", "answer": "- Step 1: Identify the starting point for fusion.\n- Fusion typically involves very light nuclei (hydrogen isotopes like deuterium ²H and tritium ³H) on the far-left of the binding energy curve. These have very low binding energy per nucleon (only about 1-2 MeV/nucleon).\n- Step 2: Identify the product.\n- When these fuse (e.g., ²H + ³H → ⁴He + n), the helium-4 product sits much higher on the curve — around 7 MeV/nucleon.\n- Step 3: Explain the energy release.\n- The binding energy per nucleon increases significantly when light nuclei fuse into heavier ones. This increase in binding energy is released as kinetic energy of the products (especially the energetic neutron in the D-T reaction). The mass of the products is less than the mass of the reactants, and this mass difference is converted to energy via E = mc².", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What conditions are required to achieve nuclear fusion on Earth, and why are these conditions so difficult to achieve? (3 steps)", "answer": "- Step 1: State the required conditions.\n- Nuclear fusion requires:\n  + Extremely high temperature (≈100 million Kelvin for D-T fusion)\n  + Sufficient density of nuclei\n  + Sufficient confinement time (the \"triple product\")\n- Step 2: Explain why high temperature is needed.\n- Light nuclei are positively charged, so they strongly repel each other due to the electrostatic (Coulomb) force. Only at extremely high temperatures do nuclei have enough kinetic energy to overcome this Coulomb barrier and get close enough for the strong nuclear force to take effect.\n- Step 3: Explain the confinement challenge.\n- No material container can withstand such temperatures. Current approaches include:\n  + Magnetic confinement (tokamaks like ITER) — using magnetic fields to contain the plasma\n  + Inertial confinement (laser fusion) — compressing a tiny fuel pellet so quickly that fusion occurs before the material disassembles", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "How does the activity of a radioactive sample change with time, and what equation describes this relationship? (2 steps)", "answer": "- Step 1: Describe the relationship.\n- Activity A is directly proportional to the number of undecayed nuclei N: A = λN\n- Since N follows exponential decay N = N₀e^(-λt), activity must also follow the same exponential law:\n- A = A₀e^(-λt)\n- where A₀ is the initial activity at t = 0.\n- Step 2: State the key implication.\n- Activity never reaches zero in finite time — it decreases exponentially and approaches zero asymptotically. After each half-life, the activity is halved.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In a nuclear reactor, what is the purpose of control rods, and what are they typically made of? (2 steps)", "answer": "- Step 1: Explain the function of control rods.\n- Control rods absorb excess neutrons in the reactor core. By inserting them deeper into the reactor or withdrawing them, operators can precisely control the rate of the fission chain reaction.\n- When fully inserted, they absorb so many neutrons that the reaction becomes subcritical and may even stop. When withdrawn, more neutrons are available to sustain a critical chain reaction.\n- Step 2: Give common examples.\n- Control rods are typically made of neutron-absorbing materials like boron, cadmium, or hafnium.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is iron-56 considered the most stable nucleus, and what does this imply about whether fission or fusion would release energy for nuclei near iron? (3 steps)", "answer": "- Step 1: Explain iron-56's position.\n- The binding energy per nucleon curve reaches its maximum at iron-56 (approximately 8.8 MeV/nucleon). This means each nucleon in iron-56 is bound as tightly as possible.\n- Step 2: Explain the implications for nuclei heavier than iron.\n- For nuclei with A > 56 (like uranium, plutonium), moving toward iron (by fission) increases binding energy per nucleon, releasing energy. This is why fission of heavy nuclei releases energy.\n- Step 3: Explain the implications for nuclei lighter than iron.\n- For nuclei with A < 56 (like hydrogen, helium), moving toward iron (by fusion) increases binding energy per nucleon, releasing energy. This is why fusion of light nuclei releases energy.\n- Iron-56 represents the \"valley of stability\" — neither fission nor fusion of nuclei near iron would release net energy.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A sample initially contains 8000 radioactive nuclei. After 4 half-lives, how many nuclei remain, and what is the elapsed time if each half-life is 30 minutes? (2 steps)", "answer": "- Step 1: Calculate the remaining nuclei.\n- After each half-life, the number halves:\n- After 1 half-life: 8000 × (1/2) = 4000\n- After 2 half-lives: 4000 × (1/2) = 2000\n- After 3 half-lives: 2000 × (1/2) = 1000\n- After 4 half-lives: 1000 × (1/2) = 500 nuclei\n- [Or: N = N₀ × (1/2)⁴ = 8000 × 1/16 = 500]\n- Step 2: Calculate the elapsed time.\n- 4 half-lives × 30 minutes/half-life = 120 minutes = 2 hours", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What is the difference between spontaneous fission and induced fission? (2 steps)", "answer": "- Step 1: Define spontaneous fission.\n- Spontaneous fission occurs when a heavy nucleus splits on its own without any external trigger, similar to other modes of radioactive decay. It happens naturally (though rarely) for very heavy elements like some isotopes of uranium and fermium.\n- Step 2: Define induced fission.\n- Induced fission occurs when a nucleus absorbs an external particle (typically a neutron) and becomes unstable, subsequently splitting. This is the type used in nuclear reactors and bombs. A slow neutron is absorbed by U-235, forming excited U-236, which then splits.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In the proton-proton chain that powers the Sun, four hydrogen nuclei (protons) combine to form helium-4. Why does this release energy, and approximately how much energy is released per reaction? (3 steps)", "answer": "- Step 1: Explain why energy is released.\n- Four individual protons have very low binding energy per nucleon (essentially zero, since they're free nucleons). Helium-4 has a much higher binding energy per nucleon (about 7 MeV). The increase in total binding energy is released as energy.\n- Step 2: Account for the intermediate steps.\n- The proton-proton chain involves multiple steps with intermediate products (deuterium, helium-3, etc.) and releases positrons, neutrinos, and gamma rays at various stages.\n- Step 3: State the energy release.\n- Approximately 26.7 MeV is released per complete proton-proton chain reaction (4p → ⁴He + 2e⁺ + 2νₑ + 2γ). This seems small per reaction, but the Sun contains enormous numbers of protons, producing the immense observed power output.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why can't alpha, beta, or gamma radiation be accurately predicted for a single atom, yet half-life is a constant property of a radioactive isotope? (2 steps)", "answer": "- Step 1: Explain the randomness at the atomic level.\n- Radioactive decay is fundamentally quantum mechanical and probabilistic. For any single nucleus, decay is entirely unpredictable in terms of timing — it could decay in the next nanosecond or in billions of years. There is no hidden \"clock\" inside the nucleus.\n- Step 2: Explain why half-life is constant and useful.\n- Each nucleus of a given isotope has the same probability λ of decaying per unit time. With billions of atoms, statistical averages become extremely reliable. The half-life (t½ = ln2/λ) emerges from this constant probability and is independent of:\n  + Temperature\n  + Pressure\n  + Chemical state\n  + External fields (except in very extreme cases)\n- This makes half-life a fundamental, intrinsic property of each radioactive isotope.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Calculate how many half-lives are required for the activity of a sample to decrease to less than 1% of its initial value. (3 steps)", "answer": "- Step 1: Set up the inequality.\n- We need A/A₀ < 0.01\n- Since A/A₀ = (1/2)^n, we need (1/2)^n < 0.01\n- Step 2: Solve using logarithms.\n- Taking natural logs: n × ln(0.5) < ln(0.01)\n- n × (-0.693) < -4.605\n- Dividing by negative (reverses inequality): n > 4.605/0.693\n- n > 6.64\n- Step 3: State the answer.\n- Since we can't have a fraction of a half-life in this context, we need 7 half-lives to get below 1%.\n\n[Check: (1/2)⁷ = 1/128 ≈ 0.78%, which is less than 1%]", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A sample has an initial activity of 3200 Bq. After 2 hours, the activity drops to 800 Bq. What is the half-life of this isotope? (3 steps)", "answer": "- Step 1: Determine how many half-lives have passed.\n- 3200 → 800 is a factor of 4 decrease.\n- Since activity halves each half-life: 3200 → 1600 (1 half-life) → 800 (2 half-lives)\n- Therefore, 2 half-lives have passed in 2 hours.\n- Step 2: Calculate the half-life.\n- 2 half-lives = 2 hours\n- Half-life = 2 hours ÷ 2 = 1 hour\n- Step 3: Express in appropriate units.\n- t½ = 1 hour = 60 minutes = 3600 seconds (depending on what's required)", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What is background radiation, and why must it be accounted for when measuring radioactivity in a laboratory? (2 steps)", "answer": "- Step 1: Define background radiation.\n- Background radiation is the low-level radiation present in the environment from natural sources (cosmic rays, radon gas from rocks, naturally occurring isotopes in soil, food, and building materials) and man-made sources (medical procedures, nuclear testing fallout).\n- It is typically around 15-20 counts per minute in most locations.\n- Step 2: Explain why it must be subtracted.\n- When measuring a radioactive source, the detector measures both the radiation from the source AND the background radiation. To find the true activity of the source, you must measure the background count rate first (with no source present) and subtract it from your measured count rate. This gives the \"corrected count rate\" attributable only to your source.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Explain why heavier elements are more likely to undergo alpha decay or fission rather than holding onto all their nucleons indefinitely. (2 steps)", "answer": "- Step 1: Explain the competition of forces.\n- In heavy nuclei, the repulsive Coulomb force between protons (which increases with Z²) grows much faster than the attractive strong nuclear force (which only acts over short distances, between nearest neighbors). The nucleus becomes increasingly unstable as it gets heavier.\n- Step 2: Explain the outcomes.\n- To achieve greater stability, the nucleus can:\n  + Emit an alpha particle (2p 2n) — reducing both proton number and size, making it more stable\n  + Undergo fission — splitting into two medium-sized nuclei that are each more stable\n  + Undergo beta decay — converting neutrons to protons or vice versa to move toward the valley of stability\n- These are all pathways the nucleus takes to increase its binding energy per nucleon and achieve greater stability.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In a particle-antimatter annihilation event, an electron and positron (antielectron) annihilate each other. If the total energy released is 1.022 MeV, what does this tell us about the rest masses of the electron and positron? (3 steps)", "answer": "- Step 1: State what happens in annihilation.\n- When a particle meets its antiparticle, both are destroyed, and their total rest mass is converted into energy in the form of gamma-ray photons.\n- Step 2: Apply E = mc².\n- The electron and positron each have the same rest mass mₑ = 9.11 × 10⁻³¹ kg = 0.511 MeV/c²\n- Total rest mass energy = 0.511 + 0.511 = 1.022 MeV\n- Step 3: Interpret the result.\n- The 1.022 MeV energy release exactly equals 2mₑc², confirming that both particles had identical rest mass. This is a direct demonstration of mass-energy equivalence — the mass \"disappears\" and appears entirely as energy (typically as two gamma photons moving in opposite directions to conserve momentum).", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Why is lead used as shielding against gamma radiation, while paper is sufficient to stop alpha particles? (2 steps)", "answer": "- Step 1: Explain alpha particle interactions.\n- Alpha particles (²He nuclei) are relatively large, doubly charged (+2e), and massive. They interact strongly with matter and quickly lose their energy through ionisation and excitation of atoms. Even a few centimeters of air or a sheet of paper provides enough material to stop them. They cannot penetrate far into any material.\n- Step 2: Explain gamma ray interactions.\n- Gamma rays are high-energy electromagnetic radiation (photons) with no charge and no rest mass. They interact with matter through different mechanisms (photoelectric effect, Compton scattering, pair production) that have much lower probabilities. Therefore, they can penetrate deeply into materials. Lead is dense and has high atomic number, providing many electrons per unit volume for gamma rays to interact with, making it an effective (though not perfect) shield. Thicker lead is needed for higher-energy gamma rays.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "What does it mean when we say a radioactive source has an activity of 1 Becquerel? (1 step)", "answer": "- Step 1: Define the Becquerel.\n- 1 Becquerel (1 Bq) = 1 decay per second\n- It is the SI unit of activity, named after Henri Becquerel who discovered radioactivity along with the Curies.\n- Therefore, a source with an activity of 100 Bq undergoes 100 radioactive decays per second on average.\n- The older unit, the Curie (Ci), was based on the activity of 1 gram of radium and is much larger: 1 Ci = 3.7 × 10¹⁰ Bq.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In the reaction ²H + ³H → ⁴He + n, identify the reactants and products, and explain why energy is released. (3 steps)", "answer": "- Step 1: Identify the participants.\n- Reactants: Deuterium (²H = 1 proton + 1 neutron) and Tritium (³H = 1 proton + 2 neutrons)\n- Products: Helium-4 (⁴He = 2 protons + 2 neutrons) and a neutron\n- Step 2: Apply conservation laws.\n- Nucleon number: 2 + 3 = 4 + 1 = 5 (conserved)\n- Charge: 1 + 1 = 2 + 0 = 2 (conserved)\n- Step 3: Explain the energy release.\n- The total mass of the products is less than the total mass of the reactants (mass defect). This mass difference is converted to kinetic energy via E = mc². Specifically, the helium-4 product is very tightly bound (high binding energy per nucleon), and the energetic neutron carries away a significant portion of the released energy (~14 MeV out of ~17.6 MeV total). The D-T reaction is the primary target for terrestrial fusion research because it has the lowest Coulomb barrier.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why does the binding energy per nucleon curve have a peak, and what is the physical significance of this peak? (2 steps)", "answer": "- Step 1: Explain the rising side of the curve.\n- For light nuclei, adding nucleons increases binding energy per nucleon because each new nucleon can form strong nuclear force bonds with multiple neighbors. The strong nuclear force is short-range but attractive, so nucleons deep inside the nucleus are more tightly bound than those on the surface.\n- Step 2: Explain the declining side and the peak.\n- For heavy nuclei, the repulsive Coulomb force between protons becomes significant. Each added proton repels all other protons, reducing the net attractive force per nucleon. Beyond iron-56, the Coulomb repulsion outweighs the strong force gains, so binding energy per nucleon decreases. Iron-56 represents the optimal balance — the most strongly bound nucleus, hence the peak.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A student measures a count rate of 85 counts per minute near a radioactive source. The background count rate is 15 counts per minute. What is the corrected count rate from the source alone? (1 step)", "answer": "- Step 1: Subtract background.\n- Corrected count rate = Measured count rate − Background count rate\n- = 85 − 15 = 70 counts per minute\n- This corrected value represents the radiation attributable specifically to the radioactive source, excluding environmental radiation that would be detected regardless of whether the source is present.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What are the three types of radioactive emission, and what is each one composed of? (1 step)", "answer": "- Step 1: List and define each type.\n- **Alpha (α) particles:** Composed of 2 protons and 2 neutrons — identical to a helium-4 nucleus (⁴He). They have charge +2e and mass 4 u.\n- **Beta (β) particles:** High-energy electrons (β⁻) emitted when a neutron converts to a proton in the nucleus. They have charge -1e and negligible mass (compared to nucleons).\n- **Gamma (γ) rays:** High-energy electromagnetic radiation (photons) emitted from excited nuclei to release excess energy. They have no charge and no rest mass.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Arrange alpha, beta, and gamma radiation in order of: (a) penetrating power (most to least), and (b) ionising ability (most to least). (2 steps)", "answer": "- Step 1: Arrange by penetrating power.\n- Most penetrating: Gamma (can pass through many centimeters of lead)\n- Medium: Beta (stopped by a few mm of aluminum)\n- Least penetrating: Alpha (stopped by paper or a few cm of air)\n- Step 2: Arrange by ionising ability.\n- Most ionising: Alpha (due to +2 charge and large mass, it collides frequently with atoms, stripping electrons efficiently)\n- Medium: Beta (charge +1, less mass)\n- Least ionising: Gamma (no charge, ionises indirectly through secondary electrons)", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why is a graph of activity vs. time for a radioactive source always exponential, and why does it never reach zero? (2 steps)", "answer": "- Step 1: Explain the mathematical origin.\n- Activity A = λN, and N follows N = N₀e^(-λt). Substituting: A = λN = λN₀e^(-λt) = A₀e^(-λt)\n- This is the mathematical definition of exponential decay.\n- Step 2: Explain why it never reaches zero.\n- The exponential function e^(-λt) approaches zero asymptotically as t → ∞ but never actually equals zero for any finite time. In practical terms, after many half-lives, the activity becomes so small it becomes indistinguishable from background radiation, but mathematically it continues decreasing infinitely.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In nuclear fission, what is the typical energy released per fission event, and how does this compare to a typical chemical combustion reaction like burning carbon? (2 steps)", "answer": "- Step 1: State typical fission energy.\n- A single U-235 fission releases approximately 200 MeV of energy (≈ 3.2 × 10⁻¹¹ J).\n- Step 2: Compare to chemical reactions.\n- A typical chemical reaction (like C + O₂ → CO₂) releases only a few electronvolts per atom (≈ 4 eV for carbon combustion). This is about 50 million times less energy per event than nuclear fission!\n- This explains why nuclear power produces enormous amounts of energy from small amounts of fuel, compared to chemical fuels like coal or oil.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "What is pair production, and why must it occur near a nucleus rather than in empty space? (2 steps)", "answer": "- Step 1: Define pair production.\n- Pair production is the creation of a particle-antiparticle pair (e.g., electron and positron) from a high-energy photon.\n- Step 2: Explain the conservation requirement.\n- A single photon cannot spontaneously create a particle-antiparticle pair because both energy and momentum must be conserved. A photon has momentum (p = E/c), but a created pair at rest would have zero total momentum. By interacting with a heavy nucleus (which can absorb some momentum), the photon can convert its energy into mass while satisfying conservation laws. The minimum photon energy required is 2mₑc² = 1.022 MeV.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Why is the binding energy of a nucleus defined as the energy required to break it apart, rather than the energy stored within it? (1 step)", "answer": "- Step 1: Clarify the definition.\n- Binding energy is defined as the energy that must be supplied to a nucleus to completely separate it into its constituent protons and neutrons (at rest, infinitely separated). This is positive energy — you must put it in to break the nucleus.\n- It's not \"stored energy\" in the intuitive sense. Rather, because the bound system has lower mass (mass defect), it is more stable. The binding energy represents the depth of the potential energy well — the energy that was released when the nucleus formed from free nucleons.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What is the relationship between the number of radioactive nuclei N, the decay constant λ, and the activity A? (1 step)", "answer": "- Step 1: State the fundamental relationship.\n- Activity A = λN\n- Where A is measured in Becquerels (Bq = decays per second), λ is the decay constant (s⁻¹), and N is the number of undecayed nuclei.\n- This shows that activity is directly proportional to both the decay probability per nucleus AND the number of nuclei present. A sample with more radioactive atoms has higher activity, and isotopes with higher decay constants are more radioactive for the same number of atoms.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A nuclide undergoes beta-minus decay. How do the nucleon number A and proton number Z change in this process? (2 steps)", "answer": "- Step 1: Describe beta-minus decay.\n- In beta-minus (β⁻) decay, a neutron inside the nucleus converts into a proton, emitting an electron (the beta particle) and an antineutrino.\n- n → p + e⁻ + ν̄ₑ\n- Step 2: Determine the changes.\n- Proton number Z increases by 1 (the nucleus gains one proton, moving to the next element up)\n- Nucleon number A stays the same (total protons + neutrons unchanged: Z → Z+1, but A-Z → A-Z-1, so total A = (Z+1) + (A-Z-1) = A)\n- Example: ¹⁴C → ¹⁴N + e⁻ + ν̄ₑ (Carbon-14 decays to Nitrogen-14)", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In beta-plus decay, a proton converts to a neutron. What particle is emitted, and how do A and Z change? (2 steps)", "answer": "- Step 1: Identify the emitted particles.\n- In beta-plus (β⁺) decay, a proton in the nucleus converts to a neutron, emitting a positron (e⁺, the antiparticle of the electron) and a neutrino.\n- p → n + e⁺ + νₑ\n- Step 2: Determine the changes.\n- Proton number Z decreases by 1 (moving to the element one position lower in the periodic table)\n- Nucleon number A remains unchanged (same reasoning as beta-minus)\n- Example: ¹¹C → ¹¹B + e⁺ + νₑ (Carbon-11 decays to Boron-11)", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why does the mass of a nucleus not equal the sum of the masses of its protons and neutrons? (1 step)", "answer": "- Step 1: Explain the mass defect.\n- The mass of a nucleus is always less than the sum of the masses of its constituent nucleons because:\n  + When nucleons bind together to form the nucleus, they release energy (the binding energy)\n  + According to E = mc², this released energy corresponds to a loss of mass (mass defect)\n  + The more tightly bound the nucleus, the greater the mass deficit\n- This is why atomic masses measured in atomic mass units are always slightly less than the integer nucleon number A.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}], "count": 38}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why is radioactive decay described as a \"random\" process, and what does this imply about predicting the behavior of a single nucleus versus a large sample? (3 steps)", "answer": "- Step 1: \"Random\" means that for any individual nucleus, the exact moment of decay cannot be predicted — it is governed only by a fixed probability per unit time of decaying. Identical nuclei sitting side by side may decay millennia apart.\n- Step 2: This is unlike a deterministic process (e.g. a swinging pendulum) where given initial conditions you can predict the future. Here, no measurement, environmental tweak, or \"energy state\" tells you when the next decay will occur.\n- Step 3: However, with a large sample ($$N \\sim 10^{20}$$ nuclei), the law of large numbers takes over: the *fraction* decaying per second is essentially constant, giving the smooth exponential decay curve. Statistics tames the underlying randomness.\n\nThe randomness is fundamental (quantum-mechanical), not a result of our ignorance of hidden variables.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is radioactive decay also called \"spontaneous,\" and what does this mean for the influence of temperature, pressure, or chemical state on half-life?", "answer": "\"Spontaneous\" means the decay is driven entirely by the internal physics of the nucleus and cannot be sped up or slowed down by external environmental conditions. Heating uranium, putting it under pressure, dissolving it in acid, or combining it in a compound has essentially no effect on its half-life. This is because nuclear binding energies are on the scale of $$\\text{MeV}$$ per nucleon, whereas chemical/thermal energies are only $$\\sim \\text{eV}$$ per atom — six orders of magnitude too small to perturb nuclear processes. Therefore, half-life is a fixed property of the isotope itself.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Define the decay constant $$\\lambda$$ in words, and explain its units. (3 steps)", "answer": "- Step 1: $$\\lambda$$ is the *probability per unit time* that any given nucleus decays. If $$\\lambda = 0.01\\,\\text{s}^{-1}$$, each nucleus has a 1% chance of decaying in the next second.\n- Step 2: Because it's \"probability per second,\" its units are $$\\text{s}^{-1}$$ (or per minute, per year, etc.).\n- Step 3: A larger $$\\lambda$$ means each nucleus is \"more eager\" to decay — so the sample's activity is higher and the half-life is shorter. Thus $$\\lambda$$ and $$t_{1/2}$$ are inversely related.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does activity $$A = \\lambda N$$ make intuitive sense? Build the reasoning from scratch. (3 steps)", "answer": "- Step 1: Activity is \"decays per second.\" If each nucleus has probability $$\\lambda$$ of decaying in 1 second, then for $$N$$ nuclei, the *expected number* of decays in 1 second is just $$\\lambda \\times N$$.\n- Step 2: This is the same reasoning as: if each lottery ticket has a 1% chance of winning and you buy 1000 tickets, you expect 10 winners. Probability $$\\times$$ population $$=$$ expected count.\n- Step 3: Hence $$A = \\lambda N$$, measured in becquerels (Bq, decays per second). Two consequences:\n+ Activity falls as $$N$$ falls — so as time passes and nuclei decay, activity drops in lockstep.\n+ A small sample of a highly radioactive (large $$\\lambda$$) isotope can be just as \"hot\" as a huge sample of a slow isotope.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Starting from $$A = \\lambda N$$ and the idea that $$A$$ is the rate at which $$N$$ decreases, derive the exponential decay law $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: Activity is the rate of loss of nuclei: $$-\\frac{dN}{dt} = \\lambda N$$. The minus sign captures that $$N$$ is decreasing.\n- Step 2: Separate variables: $$\\frac{dN}{N} = -\\lambda\\, dt$$.\n- Step 3: Integrate both sides: $$\\ln N = -\\lambda t + C$$. Applying the initial condition $$N = N_0$$ at $$t = 0$$ gives $$C = \\ln N_0$$.\n- Step 4: Rearranging: $$N = N_0 e^{-\\lambda t}$$. Activity follows the same shape ($$A = A_0 e^{-\\lambda t}$$) because $$A \\propto N$$.\n\nThe key insight: when the rate of change is proportional to the amount remaining, you always get exponential behavior.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ from the exponential decay law. (3 steps)", "answer": "- Step 1: At time $$t = t_{1/2}$$, by definition $$N = \\tfrac{1}{2}N_0$$. Substitute into $$N = N_0 e^{-\\lambda t}$$:  $$\\tfrac{1}{2}N_0 = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Cancel $$N_0$$ and take natural log: $$\\ln(\\tfrac{1}{2}) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$.\n- Step 3: Solve: $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n\nThis shows half-life and decay constant are inversely proportional — they encode the same information in two different \"languages.\"", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "A radioactive isotope has half-life 10 minutes and you start with 1600 nuclei. Without using a calculator, how many remain after 40 minutes, and what is the conceptual approach? (3 steps)", "answer": "- Step 1: Count the number of half-lives elapsed: $$40 / 10 = 4$$ half-lives.\n- Step 2: Each half-life halves the population. So multiply by $$(1/2)^4 = 1/16$$.\n- Step 3: $$1600 \\times \\frac{1}{16} = 100$$ nuclei remain.\n\nGeneral principle: $$N = N_0 \\times (1/2)^n$$ where $$n$$ is the number of half-lives. This avoids the exponential formula entirely when $$n$$ is a whole number.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "A sample's activity drops from 800 Bq to 100 Bq. Without computing $$\\lambda$$ explicitly, how many half-lives passed, and why does activity decay the same way as nucleus count? (3 steps)", "answer": "- Step 1: Ratio: $$100/800 = 1/8 = (1/2)^3$$. So 3 half-lives have passed.\n- Step 2: Activity and nucleus count decay identically because $$A = \\lambda N$$ and $$\\lambda$$ is constant. So $$A/A_0 = N/N_0$$.\n- Step 3: This means a graph of activity vs. time has exactly the same exponential shape as a graph of $$N$$ vs. time — both halve in the same interval $$t_{1/2}$$. You can read half-life off either graph in the same way.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What happens to half-life and decay constant if you somehow had a sample twice as large (more atoms)? Why? (2 steps)", "answer": "- Step 1: Half-life and decay constant are *unchanged*. They are intrinsic properties of the isotope, not of how many atoms you have.\n- Step 2: What *does* change is the absolute activity: doubling $$N$$ doubles $$A = \\lambda N$$. So the bigger sample is \"twice as hot\" (twice as many decays per second), but each individual nucleus still has the same per-second probability of decaying, and the fraction remaining after one half-life is still 1/2.\n\nCommon misconception trap: students sometimes think a bigger sample lasts longer. It doesn't — it just emits more radiation initially, then decays exponentially with the same characteristic time.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why must background radiation be subtracted from count-rate measurements before analyzing half-life from a decay graph? (3 steps)", "answer": "- Step 1: A Geiger counter detects *all* incoming radiation — from your sample plus from cosmic rays, radon, building materials, etc. (typically $$\\sim 20\\text{–}30$$ counts/min).\n- Step 2: If you don't subtract this floor, your \"decay curve\" tails off to the background level instead of to zero. The graph appears to flatten out, distorting the apparent half-life — you'd overestimate how long the source remains active.\n- Step 3: The fix: measure background separately (no source present), then subtract from every reading. The corrected count rate then decays exponentially toward zero, allowing accurate determination of $$t_{1/2}$$.\n\nExam trap: a curve that levels off at a non-zero value is a giveaway that background hasn't been subtracted.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why does a short-half-life isotope make a better medical tracer than a long-half-life one? (3 steps)", "answer": "- Step 1: A medical tracer is injected/ingested so its location in the body can be detected from outside via emitted radiation. You want a strong signal *briefly*, then it should disappear.\n- Step 2: A short half-life means high activity per nucleus ($$A = \\lambda N$$, large $$\\lambda$$), so a tiny dose produces a strong detectable signal — minimizing radiation burden to the patient.\n- Step 3: Crucially, after diagnosis the radioactivity decays away quickly (hours), so the patient isn't carrying a radioactive source around for years. A long-half-life isotope would expose the patient for decades. Compare technetium-99m ($$t_{1/2} \\approx 6$$ hours, ideal) vs. uranium-238 ($$t_{1/2} \\approx 4.5$$ billion years, useless and harmful).", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why is it possible to determine that uranium-238 has a half-life of $$\\sim 4.5$$ billion years even though no human has watched a sample for that long? (3 steps)", "answer": "- Step 1: You don't need to wait a full half-life. Measure the *current activity* $$A$$ of a known number of nuclei $$N$$ in a sample.\n- Step 2: Use $$A = \\lambda N$$ to solve for $$\\lambda$$ directly. Then $$t_{1/2} = \\ln 2 / \\lambda$$ gives the half-life.\n- Step 3: For uranium, even a small sample contains $$\\sim 10^{22}$$ nuclei, so despite the tiny per-nucleus decay probability, enough decays happen per second to be measurable. Extrapolation by formula then gives the billions-of-years figure.\n\nKey insight: half-life isn't measured by waiting — it's *inferred* from the present-day decay rate and the present nucleus count.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why does a nucleus have *less* mass than the sum of the masses of its individual protons and neutrons? (3 steps)", "answer": "- Step 1: When separated nucleons come together to form a bound nucleus, energy is *released* (it's an exothermic process — they fall into a deep potential well of the strong nuclear force).\n- Step 2: By Einstein's $$\\Delta E = \\Delta m\\, c^2$$, energy and mass are equivalent. The energy released carries away mass. So the bound system ends up with less total mass than the unbound components.\n- Step 3: This \"missing\" mass is the mass defect $$\\Delta m$$. It's not really missing — it was converted into the energy radiated away during nucleus formation. To pull the nucleus apart again, you'd need to *put back* that same amount of energy (the binding energy).\n\nA bound system *always* has less mass than its separated parts — this is a universal feature of mass-energy equivalence.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Why is \"binding energy\" a slightly confusing name, and what's the right way to think of it? (2 steps)", "answer": "- Step 1: It sounds like \"energy stored inside the nucleus,\" but that's the wrong picture. It's actually the energy you'd have to *supply from outside* to break the nucleus apart into free nucleons.\n- Step 2: Equivalently, it's the energy *released* when free nucleons assemble into the nucleus. So a *high* binding energy means a *deeply bound, very stable* nucleus — like a ball that has fallen into a deep well and would need lots of energy to lift back out. Don't think of binding energy as \"energy the nucleus has\"; think of it as \"the depth of the energy well the nucleus sits in.\"", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Write down the formula for mass defect and explain each term. (2 steps)", "answer": "- Step 1: $$\\Delta m = Z\\, m_p + (A-Z)\\, m_n - m_{\\text{nucleus}}$$.\n- Step 2: Term by term:\n+ $$Z\\, m_p$$: total mass of all $$Z$$ free protons.\n+ $$(A-Z)\\, m_n$$: total mass of all neutrons ($$A$$ nucleons total, minus the $$Z$$ protons).\n+ $$m_{\\text{nucleus}}$$: the actual measured mass of the assembled nucleus.\n\n$$\\Delta m$$ is *always positive* for bound nuclei. Multiplying by $$c^2$$ gives the binding energy.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why is the atomic mass unit (u) defined relative to carbon-12 rather than to a proton or hydrogen atom? (2 steps)", "answer": "- Step 1: Carbon-12 is exceptionally stable, abundant, and chemically convenient — masses of other isotopes are measured very precisely by mass spectrometry against carbon-12 as a reference standard.\n- Step 2: By definition, *exactly* 12 u $$=$$ mass of one carbon-12 atom, so $$1\\,\\text{u} = m(^{12}\\text{C}) / 12 \\approx 1.661 \\times 10^{-27}$$ kg. This gives a convenient unit roughly equal to the mass of one nucleon, making nucleon masses easy to think about (proton $$\\approx 1.007$$ u, neutron $$\\approx 1.009$$ u).", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Conceptually, why is $$1\\,\\text{u}$$ equivalent to $$931.5\\,\\text{MeV}/c^2$$? Walk through the chain of reasoning. (3 steps)", "answer": "- Step 1: Mass and energy are interchangeable via $$E = mc^2$$. So any mass can be expressed as an energy — just multiply by $$c^2$$.\n- Step 2: Take $$1\\,\\text{u} = 1.661 \\times 10^{-27}$$ kg. Multiply by $$c^2 = (3\\times 10^8)^2 \\approx 9\\times 10^{16}\\,\\text{m}^2/\\text{s}^2$$, giving an energy of about $$1.49 \\times 10^{-10}$$ J.\n- Step 3: Convert joules to electron-volts by dividing by $$1.6 \\times 10^{-19}$$ J/eV: this yields $$\\approx 9.3 \\times 10^8$$ eV $$= 931.5$$ MeV. So $$1\\,\\text{u}$$ of mass corresponds to $$931.5$$ MeV of energy. Writing this as MeV/$$c^2$$ ($$= 931.5\\,\\text{MeV}/c^2$$) preserves the unit \"mass\" while expressing it in particle-physics-friendly energy terms.\n\nThis conversion is the shortcut: if you know $$\\Delta m$$ in u, multiply by 931.5 to get binding energy in MeV directly.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A nucleus has mass defect $$0.05\\,\\text{u}$$. Roughly how much binding energy does it have, and what's the quickest way to get the answer? (2 steps)", "answer": "- Step 1: Use the shortcut: $$1\\,\\text{u} \\leftrightarrow 931.5\\,\\text{MeV}$$. So binding energy $$\\approx 0.05 \\times 931.5 \\approx 47\\,\\text{MeV}$$.\n- Step 2: Sanity check: this is the *total* binding energy. Divide by the nucleon number to get binding energy per nucleon — for a nucleus with $$A \\sim 6$$, that's $$\\sim 8\\,\\text{MeV}$$/nucleon, which is in the right ballpark for a moderately stable nucleus.\n\nThe trick is to never go through kg unless forced to — going u → MeV directly via 931.5 is much faster.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What is binding energy *per nucleon* and why is it more useful than total binding energy when comparing the stability of different nuclei? (3 steps)", "answer": "- Step 1: Binding energy per nucleon = total binding energy divided by nucleon number $$A$$. It tells you how tightly *each* nucleon is held in the nucleus, on average.\n- Step 2: Total binding energy increases with $$A$$ trivially (more nucleons → more total binding), so it's a misleading metric for stability. A huge uranium nucleus has more total binding than a helium nucleus, but is *less* stable per nucleon.\n- Step 3: Per-nucleon binding energy normalizes for size — it's the right measure of \"how deeply bound the average nucleon is.\" Higher per-nucleon binding $$\\Rightarrow$$ more stable nucleus. The shape of this curve (peak at iron-56) is the unifying picture explaining both fission and fusion.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Sketch the qualitative shape of the binding-energy-per-nucleon vs. nucleon-number curve, identify key features, and explain why iron-56 sits at the peak. (4 steps)", "answer": "- Step 1: The curve starts low at $$A = 1$$ (hydrogen, zero binding), rises *steeply* through light elements (with He-4, C-12, O-16 anomalously high — these \"double-magic\" nuclei are extra stable).\n- Step 2: It reaches a broad peak around $$A \\approx 56$$ (iron-56), at about $$8.8\\,\\text{MeV}$$/nucleon.\n- Step 3: It then gradually *decreases* for heavier nuclei, falling to about $$7.5\\,\\text{MeV}$$/nucleon at uranium.\n- Step 4: Why iron is the peak: it's a balance of two forces.\n+ Strong nuclear force is short-range — it binds only nearest-neighbor nucleons. Adding more nucleons increases binding linearly only up to a point.\n+ Electrostatic (Coulomb) repulsion between protons is long-range — every proton repels every other proton. As $$Z$$ grows, this destabilizes heavier nuclei.\n+ Around iron, these two effects balance optimally, giving maximum binding per nucleon.\n\nThis curve is the single most important diagram in nuclear physics — it explains *everything* about why fusion and fission release energy.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Using the binding-energy-per-nucleon curve, explain why fission of a heavy nucleus releases energy. (3 steps)", "answer": "- Step 1: A heavy nucleus like uranium-235 sits on the *right* side of the curve, at $$\\sim 7.6\\,\\text{MeV}$$/nucleon — relatively weakly bound.\n- Step 2: When it splits into two medium-mass nuclei (e.g., barium and krypton, $$A \\sim 90\\text{–}140$$), these sit closer to the *peak* at $$\\sim 8.5\\,\\text{MeV}$$/nucleon — more tightly bound.\n- Step 3: Each nucleon is now more deeply bound by roughly $$1\\,\\text{MeV}$$. With $$\\sim 235$$ nucleons, that's $$\\sim 200\\,\\text{MeV}$$ released per fission. The energy comes from the *increase* in binding energy: nucleons fall into a deeper well, and the energy difference is released as kinetic energy of the fragments and neutrons, plus gamma rays.\n\nKey picture: fission moves nuclei *up* the right slope of the curve toward iron.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Using the binding-energy-per-nucleon curve, explain why fusion of light nuclei releases energy. (3 steps)", "answer": "- Step 1: Very light nuclei like deuterium ($$^2$$H) and tritium ($$^3$$H) sit on the *far left* of the curve at only $$\\sim 1\\text{–}3\\,\\text{MeV}$$/nucleon — weakly bound.\n- Step 2: When they fuse into helium-4 ($$^4$$He), the product sits much higher up the steep left slope at $$\\sim 7\\,\\text{MeV}$$/nucleon — far more tightly bound.\n- Step 3: The jump in binding per nucleon on fusion is *huge* (much larger than fission's modest jump). Per kg of fuel, fusion releases vastly more energy than fission — this is why stars run on fusion and why fusion is the holy grail of energy production.\n\nKey picture: fusion moves nuclei *up* the steep left slope of the curve toward iron.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why is the left slope of the BE/nucleon curve steeper than the right slope, and what does this imply about energy yields of fusion vs. fission per kg of fuel? (2 steps)", "answer": "- Step 1: The left slope is steep because going from $$A = 2$$ to $$A = 4$$ doubles the number of nucleons each one is bound to — a huge fractional change in average binding. The right slope is gentle because adding one more nucleon to a $$A = 235$$ nucleus is just a small fractional change.\n- Step 2: Steeper slope means a larger jump per nucleon. So:\n+ Fusion of hydrogen → helium releases $$\\sim 6\\,\\text{MeV}$$/nucleon.\n+ Fission of uranium → barium + krypton releases $$\\sim 1\\,\\text{MeV}$$/nucleon.\n+ Per kg of fuel, fusion gives roughly $$3\\text{–}4\\times$$ more energy than fission. This is why stars (and hopefully future fusion reactors) are vastly more efficient than fission reactors.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why can't iron-56 release energy through either fission or fusion? (2 steps)", "answer": "- Step 1: Iron-56 sits at the *peak* of the binding-energy-per-nucleon curve. Any move — splitting into smaller pieces *or* combining with another nucleus to form something heavier — takes you *down* from the peak.\n- Step 2: Moving down means decreasing binding per nucleon, which means the products are *less* tightly bound than the reactants. By conservation of energy, this would *require* an input of energy, not release any. So iron is the energy-extraction dead-end: it's the most stable nucleus and the natural end-point of stellar nucleosynthesis in massive stars.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "What happens in induced fission of U-235? Walk through the sequence of events. (4 steps)", "answer": "- Step 1: A *slow-moving* neutron approaches a U-235 nucleus. (It must be slow so it can be captured rather than scatter off.)\n- Step 2: The neutron is absorbed, producing a highly excited, unstable U-236 nucleus.\n- Step 3: U-236 deforms (like a wobbling water droplet) and splits into two roughly medium-mass daughter nuclei (e.g., barium-141 and krypton-92), simultaneously ejecting 2–3 fast neutrons and emitting gamma rays.\n- Step 4: The total mass of products is less than the mass of (U-235 + n). The mass deficit $$\\times\\, c^2 \\approx 200\\,\\text{MeV}$$ appears as kinetic energy of the fragments and neutrons, plus gamma radiation. The released neutrons can trigger further fissions in nearby U-235 nuclei — the basis of a chain reaction.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why must the incoming neutron in induced fission be *slow* (\"thermal\"), not fast? (2 steps)", "answer": "- Step 1: A fast neutron tends to bounce off the nucleus without being absorbed — its de Broglie wavelength is short and its interaction time is brief. A slow neutron lingers longer near the nucleus, with a wavelength comparable to nuclear dimensions, giving it a much higher probability of capture.\n- Step 2: This is why nuclear reactors use *moderators* (water, graphite) — to slow the fast neutrons emitted by previous fissions down to thermal speeds so they can induce further fissions. Without a moderator, the chain reaction fizzles out.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What is a chain reaction, and what determines whether it grows, stays steady, or dies out? (3 steps)", "answer": "- Step 1: Each fission releases 2–3 neutrons. If even *one* of these triggers another fission on average, the reaction sustains itself.\n- Step 2: The key parameter is the multiplication factor $$k$$ (average new fissions per old fission):\n+ $$k < 1$$: subcritical — reaction dies out.\n+ $$k = 1$$: critical — steady output (nuclear reactor operation).\n+ $$k > 1$$: supercritical — exponential growth (bomb).\n- Step 3: $$k$$ depends on sample size (critical mass), shape (compact sphere maximizes neutron retention), purity (U-235 enrichment), and presence of neutron-absorbing control rods in a reactor. Lowering control rods absorbs neutrons, reducing $$k$$ to $$\\leq 1$$. Withdrawing them increases $$k$$ — which is what went wrong at Chernobyl.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why does fusion require extremely high temperatures and pressures, while fission can occur at room temperature? (3 steps)", "answer": "- Step 1: Fission is *induced* by a slow neutron, which is electrically neutral — there's no electrostatic barrier to overcome to enter the nucleus. A thermal neutron walks right in.\n- Step 2: Fusion requires two *positively charged* nuclei to get close enough that the short-range strong nuclear force can grab them. They must overcome the Coulomb repulsion barrier — and at low energies, they simply bounce off long before getting close enough.\n- Step 3: To overcome this barrier, nuclei need very high kinetic energy, i.e., very high temperature ($$\\sim 10^7$$ K in the Sun's core; even higher needed in lab fusion). High pressure/density also helps by increasing collision frequency. This is why fusion only happens naturally in stellar cores or hydrogen bombs (where a fission bomb provides the trigger temperature), and why making controlled terrestrial fusion is so difficult.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Write the typical deuterium-tritium fusion reaction and explain what makes it the most accessible fusion reaction for terrestrial reactors. (3 steps)", "answer": "- Step 1: $$^2_1\\text{H} + ^3_1\\text{H} \\rightarrow ^4_2\\text{He} + ^1_0\\text{n}$$. A deuteron and triton fuse to form helium-4 plus a free neutron, releasing $$\\sim 17.6$$ MeV.\n- Step 2: It's the most accessible because the Coulomb barrier between two singly-charged hydrogen isotopes is the lowest of any fusion pair — both have just one proton. Adding more protons (e.g., He-He fusion) raises the barrier massively.\n- Step 3: Additionally, deuterium is abundant in seawater, the reaction has a high cross-section at achievable temperatures ($$\\sim 10^8$$ K with magnetic confinement), and the product helium is inert and harmless. The free neutron carries most of the energy and can be used to heat water for electricity generation.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "In the proton-proton chain that powers the Sun, how do hydrogen nuclei (just protons) end up forming helium-4 when there are no neutrons to start with? (3 steps)", "answer": "- Step 1: First, two protons fuse: $$^1_1\\text{H} + ^1_1\\text{H} \\rightarrow ^2_1\\text{H} + e^+ + \\nu_e$$. One proton converts into a neutron via beta-plus decay (weak interaction), emitting a positron and an electron neutrino, producing deuterium.\n- Step 2: The deuterium then fuses with another proton to form helium-3: $$^2_1\\text{H} + ^1_1\\text{H} \\rightarrow ^3_2\\text{He} + \\gamma$$.\n- Step 3: Two helium-3 nuclei finally combine: $$^3_2\\text{He} + ^3_2\\text{He} \\rightarrow ^4_2\\text{He} + 2\\,^1_1\\text{H}$$, producing helium-4 and returning two protons to the cycle.\n\nNet result: four protons → one helium-4 + 2 positrons + 2 neutrinos + energy ($$\\sim 26$$ MeV per cycle). The weak-force step (proton → neutron) is *extremely slow*, which is why the Sun burns over billions of years rather than exploding.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Compare fission and fusion in terms of: starting material, products, energy per nucleon released, conditions required, and waste. (5 steps)", "answer": "- Step 1: **Starting material:** Fission needs heavy nuclei (U-235, Pu-239). Fusion needs light nuclei (H, He isotopes).\n- Step 2: **Products:** Fission gives two medium-mass nuclei + neutrons + gamma. Fusion gives one heavier nucleus + light particles (neutron, positron, neutrino) + gamma.\n- Step 3: **Energy per nucleon:** Fission $$\\sim 1$$ MeV/nucleon, fusion $$\\sim 3\\text{–}6$$ MeV/nucleon. So fusion is several times more energy-dense per kg.\n- Step 4: **Conditions:** Fission needs only a slow neutron in a sample above critical mass. Fusion needs extreme temperature ($$10^7\\text{–}10^8$$ K) to overcome Coulomb repulsion.\n- Step 5: **Waste:** Fission produces highly radioactive long-lived daughter products (waste storage problem). Fusion's main product is helium (inert), though neutron irradiation can activate
