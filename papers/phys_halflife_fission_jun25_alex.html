<script>
const DATA={"selected": [{"question": "Why is radioactive decay described as a \"random\" process, and what implications does this have for predicting decay? (2 steps)", "answer": "- Step 1: Explain the nature of randomness in nuclear decay.\n- For any individual unstable nucleus, it is impossible to predict exactly when it will decay or which decay mode (alpha, beta, or gamma) it will undergo. Each nucleus has a constant probability of decay per unit time, but the exact timing is genuinely random.\n- Step 2: Explain how statistical predictions become possible.\n- However, with a large sample containing billions of nuclei, the collective behavior becomes highly predictable due to statistical averaging. This is why we can define half-life and activity as reliable measurable quantities for macroscopic samples, even though individual nuclei are unpredictable.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "Why is helium-4 an anomaly on the binding energy per nucleon graph — it has a much higher BE/nucleon than its neighbours like lithium and beryllium? (2 steps)", "answer": "- Step 1: Helium-4 has a particularly stable nuclear structure: 2 protons and 2 neutrons, which completely fill the first nuclear \"shell\" (similar to how 2 electrons fill the first electron shell in atomic physics). This closed-shell configuration is energetically very favourable.\n- Step 2: Carbon-12 and oxygen-16 can be thought of as clusters of 3 and 4 helium-4 nuclei respectively, which also gives them higher BE/nucleon than their immediate neighbours. This clustering effect means the curve has small bumps at A = 4, 12, and 16, rather than being perfectly smooth. Exam questions may ask you to mark the helium-4 anomaly with a cross on the graph.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Helium-4 has an unusually high binding energy per nucleon compared to its neighbours on the BE/nucleon graph. Why is He-4 so anomalously stable? (2 steps)", "answer": "- Step 1: He-4 consists of exactly 2 protons and 2 neutrons. This fills the first nuclear shell completely (analogous to how filling electron shells gives noble gas stability in chemistry). Both the proton and neutron shells are \"closed\" simultaneously.\n- Step 2: This \"double magic\" configuration (2 protons, 2 neutrons — both magic numbers) makes He-4 exceptionally tightly bound. It appears as a noticeable spike on the BE/nucleon graph, sitting well above the general trend for light nuclei.\n\nThis is why alpha particles (He-4 nuclei) are so commonly emitted in alpha decay — the extreme stability of He-4 makes it a favourable decay product.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Common misconception probe: \"Half-life is the time for *all* the nuclei to decay.\" Why is this wrong?", "answer": "- Step 1: Half-life is the time for *half* the nuclei to decay — not all. The remaining half then takes another half-life to halve again, and so on.\n- Step 2: In principle, the number of nuclei never reaches exactly zero — the exponential decay only asymptotically approaches zero. After 10 half-lives, only $$(1/2)^{10} \\approx 0.1\\%$$ remains, but not zero.\n- Step 3: In practice, after enough half-lives the activity drops below background, so we can't distinguish it. But the formal statement is: decay continues indefinitely, with halving at fixed intervals.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "A student claims: \"Fusion is just the reverse of fission, so they should release the same amount of energy.\" Evaluate this claim. (3 steps)", "answer": "- Step 1: Fusion and fission are \"reverse\" in the sense that fusion joins nuclei and fission splits them. But they operate on **different regions** of the BE/nucleon graph, so the energy released per nucleon is different.\n- Step 2: Fusion operates on the **left side** of the graph, where the slope is very steep. Moving up this steep slope means a large change in BE/nucleon for a small change in $$A$$ — so fusion releases a large amount of energy per unit mass.\n- Step 3: Fission operates on the **right side**, where the slope is gentle. Moving up this gentle slope means a smaller change in BE/nucleon — so fission releases less energy per unit mass than fusion. Per kilogram of fuel, fusion releases roughly 3–4 times more energy than fission.\n\nThey are not simply \"reverses\" — they are different processes on different parts of the same graph, with different energy yields.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "A student says: \"Fission releases energy because the nucleus splits into smaller pieces, and smaller things always have less energy.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The student's logic is vague and incorrect. \"Smaller things having less energy\" is not a valid physics principle. A single proton and a single neutron each have *more* mass-energy per particle than they do when bound inside a nucleus.\n- Step 2: Fission releases energy because the **binding energy per nucleon increases** when the heavy nucleus splits into medium-mass nuclei. The products are more tightly bound (higher BE/nucleon), which means they have *less mass per nucleon*. The mass difference is released as energy. It is the change in binding energy that matters, not the size of the fragments.\n\nThe correct explanation always traces back to the BE/nucleon graph: fission moves nuclei up the right slope toward the peak.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Why does the radius of curvature of a charged particle track in a magnetic field tell you about its momentum, and how does this relate to interpreting nuclear-decay particle tracks? (3 steps)", "answer": "- Step 1: For a charged particle moving perpendicular to a magnetic field, the magnetic force provides centripetal force: $$qvB = mv^2/r$$, giving $$r = p/(qB)$$.\n- Step 2: So radius is proportional to momentum (for given $$q$$, $$B$$). A larger radius track means a higher-momentum particle.\n- Step 3: This is widely used in cloud chambers and bubble chambers to identify decay products. A beta particle's track tightening into a spiral as it loses energy through ionization shows momentum decreasing along its path. Tracks curving in opposite directions indicate opposite charges (e.g., electron-positron pair from gamma-ray pair production). The slow spiral of a low-momentum particle vs. the gentle curve of a fast one lets physicists \"see\" particle properties directly from a photograph.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Imagine you're shown a decay curve that *doesn't* reach zero but levels out at, say, 25 counts/min. What does this tell you, and how does it affect half-life calculation? (3 steps)", "answer": "- Step 1: The curve leveling off at a non-zero value tells you background radiation has not been subtracted. The 25 counts/min is the background floor.\n- Step 2: To find the true half-life, you subtract 25 from every reading first, then look at how the *corrected* count rate halves.\n- Step 3: If you naively use the uncorrected curve, you'd overestimate the half-life: the curve appears to decay more slowly because it's tailing into the background floor rather than to zero. This is one of the most common exam traps.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why can you express mass in units like MeV/$$c^2$$, and what's the practical advantage in nuclear physics?", "answer": "- Step 1: Since $$E = mc^2$$, dividing an energy by $$c^2$$ gives a mass: $$m = E/c^2$$. So \"MeV/$$c^2$$\" is just a mass unit derived from an energy unit.\n- Step 2: In nuclear physics, masses and binding energies are almost always tightly linked. Using MeV/$$c^2$$ (or just MeV via implicit $$c^2$$) lets you skip annoying SI unit conversions: $$E$$ in MeV, mass in MeV/$$c^2$$, and energy = mass × $$c^2$$ becomes trivial.\n- Step 3: Example: an electron mass is 0.511 MeV/$$c^2$$. To compute its rest energy, just write 0.511 MeV — no calculator needed.\n\nTakeaway: MeV/$$c^2$$ is the natural mass unit for nuclear physics, baking in the conversion factor.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Describe the key features of the binding energy per nucleon vs nucleon number graph. Where does it peak, and what happens at the two extremes? (3 steps)", "answer": "- Step 1: **At low $$A$$ (light nuclei, left side):** Binding energy per nucleon is low and rises steeply. Very light nuclei like hydrogen and deuterium are loosely bound. There are notable spikes at He-4, C-12, and O-16 (especially He-4, which is anomalously stable due to its tightly-bound double-magic structure).\n- Step 2: **At the peak (around $$A \\approx 56$$, iron-56):** Binding energy per nucleon reaches its maximum of approximately 8.8 MeV/nucleon. This is the most stable configuration — nucleons are most tightly bound here.\n- Step 3: **At high $$A$$ (heavy nuclei, right side):** Binding energy per nucleon gradually decreases. Heavy nuclei like uranium are less stable per nucleon because the increasing Coulomb repulsion among many protons partially overcomes the strong nuclear force.\n\nThe graph does NOT start at $$A = 0$$ (there is no nucleus with zero nucleons), and you should mark the He-4 anomaly and the Fe-56 peak when sketching it.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "What is pair production, and why must it occur near a nucleus rather than in empty space? (2 steps)", "answer": "- Step 1: Define pair production.\n- Pair production is the creation of a particle-antiparticle pair (e.g., electron and positron) from a high-energy photon.\n- Step 2: Explain the conservation requirement.\n- A single photon cannot spontaneously create a particle-antiparticle pair because both energy and momentum must be conserved. A photon has momentum (p = E/c), but a created pair at rest would have zero total momentum. By interacting with a heavy nucleus (which can absorb some momentum), the photon can convert its energy into mass while satisfying conservation laws. The minimum photon energy required is 2mₑc² = 1.022 MeV.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "Convert 1 u into MeV/c² step by step, starting from 1 u = 1.661 × 10⁻²⁷ kg. (3 steps)", "answer": "- Step 1: Use Einstein's equation $$E = mc^2$$. The energy equivalent of 1 u is: $$E = (1.661 \\times 10^{-27}) \\times (3.0 \\times 10^8)^2 = 1.661 \\times 10^{-27} \\times 9.0 \\times 10^{16} = 1.495 \\times 10^{-10}$$ J.\n- Step 2: Convert joules to eV by dividing by the electron charge: $$\\frac{1.495 \\times 10^{-10}}{1.6 \\times 10^{-19}} = 9.34 \\times 10^8$$ eV = 934 MeV. (The more precise value is 931.5 MeV using more accurate constants.)\n- Step 3: Since this energy came from a mass of 1 u, we write 1 u = 931.5 MeV/c². The \"c²\" reminds us this is a mass unit expressed in energy terms. When you multiply by c² in $$E = mc^2$$, the c² cancels and you get energy in MeV directly. This is why the shortcut \"mass in u × 931.5 = energy in MeV\" works.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Why can't a single gamma-ray photon undergo pair production in empty space, even if it has enough energy? What must be present? (2 steps)", "answer": "- Step 1: A single photon in empty space cannot produce a particle-antiparticle pair because while energy could be conserved (if the photon has at least $$2mc^2$$), **momentum cannot be conserved**. A photon always has momentum $$p = E/c$$, but the produced pair can have zero total momentum in their centre-of-mass frame.\n- Step 2: A **nearby nucleus** (or other massive particle) must be present to absorb the recoil momentum. The nucleus takes up the excess momentum with negligible kinetic energy change (due to its large mass), allowing both energy and momentum to be conserved simultaneously.\n\nThis is why pair production always occurs near a nucleus — the nucleus acts as a \"momentum sink.\"", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "Why doesn't the half-life of an isotope depend on temperature, pressure, or chemical state?", "answer": "- Step 1: Radioactive decay is a *nuclear* process, governed by the strong and weak forces inside the nucleus. The energy scales involved are millions of electronvolts (MeV).\n- Step 2: Temperature, pressure, and chemistry only affect the *electrons* and the atomic-scale environment, with energy scales of eV — about a million times weaker than nuclear binding energies.\n- Step 3: So the nucleus is essentially \"shielded\" from outside conditions; its decay probability $$\\lambda$$ is fixed by nuclear physics, not by environment.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why is \"binding energy\" a confusing name, and what is the correct way to think about it?", "answer": "- Step 1: The name suggests energy \"stored inside\" the nucleus, but it's actually the *opposite* — it's the energy you'd have to *put in* to pull the nucleus apart into separated nucleons.\n- Step 2: Equivalently, it's the energy *released* when free nucleons come together to form the nucleus. So a higher binding energy means the nucleus is *more* tightly bound and *more* stable, not that it's storing more usable energy.\n- Step 3: A common exam mistake is to describe binding energy as the energy \"in\" the nucleus — this is wrong. It's a *deficit* relative to the free state.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why does fission release energy for heavy nuclei but fusion releases energy for light nuclei, despite both processes potentially involving similar mass changes? (2 steps)", "answer": "- Step 1: Energy release in nuclear reactions comes from the increase in binding energy per nucleon. The binding energy per nucleon curve peaks at iron-56 (A ≈ 56).\n- Step 2: For heavy nuclei (A > 56), like uranium, BE/nucleon decreases as A increases. Fission splits them into two medium nuclei with higher BE/nucleon — energy is released because the products are more tightly bound. For light nuclei (A < 56), BE/nucleon increases sharply with A. Fusion combines them into a heavier nucleus with higher BE/nucleon — energy is released. Both processes move toward the peak of the curve, which is why both release energy.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "Explain why nuclear fusion requires extremely high temperatures and pressures, whereas fission can occur at room temperature. (2 steps)", "answer": "- Step 1: Fusion requires two positively charged light nuclei (like hydrogen isotopes) to overcome electrostatic repulsion and get close enough (~10⁻¹⁵ m) for the strong nuclear force to bind them together. This Coulomb barrier is enormous — nuclei must have very high kinetic energy to overcome it.\n- Step 2: High temperature (millions of degrees) gives particles the kinetic energy needed to overcome repulsion. High pressure (in stars) ensures high density so collisions are frequent. In contrast, fission is induced by neutron absorption — neutrons have no charge, so they can approach nuclei without electrical repulsion. A slow neutron hitting U-235 causes fission at any temperature.\n\nThis is why fusion is so difficult to achieve on Earth — we need to recreate stellar conditions.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "The formula for mass defect is Δm = Zmₚ + (A−Z)mₙ − m_total. Explain what each term represents and why the result is always positive for a bound nucleus. (3 steps)", "answer": "- Step 1: $$Zm_p$$ is the total mass of Z individual protons. $$(A-Z)m_n$$ is the total mass of the neutrons. $$m_{total}$$ is the measured mass of the *bound* nucleus. The first two terms together represent the mass of all the nucleons if they were completely separated.\n- Step 2: The subtraction gives the difference between \"what you'd expect the nucleus to weigh\" (sum of parts) and \"what it actually weighs\" (measured mass). For a bound nucleus, the actual mass is always *less* than the sum of the parts.\n- Step 3: The result is always positive because energy was released when the nucleus formed — the \"missing mass\" corresponds to this released binding energy. If Δm were negative (nucleus heavier than its parts), it would mean energy was absorbed during formation, which would make the nucleus unstable and it would spontaneously disintegrate. Only bound (stable) nuclei have positive mass defects.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "Why does fusion require extremely high temperatures and pressures, while fission can occur at room temperature? (3 steps)", "answer": "- Step 1: Fission is *induced* by a slow neutron, which is electrically neutral — there's no electrostatic barrier to overcome to enter the nucleus. A thermal neutron walks right in.\n- Step 2: Fusion requires two *positively charged* nuclei to get close enough that the short-range strong nuclear force can grab them. They must overcome the Coulomb repulsion barrier — and at low energies, they simply bounce off long before getting close enough.\n- Step 3: To overcome this barrier, nuclei need very high kinetic energy, i.e., very high temperature ($$\\sim 10^7$$ K in the Sun's core; even higher needed in lab fusion). High pressure/density also helps by increasing collision frequency. This is why fusion only happens naturally in stellar cores or hydrogen bombs (where a fission bomb provides the trigger temperature), and why making controlled terrestrial fusion is so difficult.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Using the binding-energy-per-nucleon curve, explain why fusion of light nuclei releases energy. (3 steps)", "answer": "- Step 1: Very light nuclei like deuterium ($$^2$$H) and tritium ($$^3$$H) sit on the *far left* of the curve at only $$\\sim 1\\text{–}3\\,\\text{MeV}$$/nucleon — weakly bound.\n- Step 2: When they fuse into helium-4 ($$^4$$He), the product sits much higher up the steep left slope at $$\\sim 7\\,\\text{MeV}$$/nucleon — far more tightly bound.\n- Step 3: The jump in binding per nucleon on fusion is *huge* (much larger than fission's modest jump). Per kg of fuel, fusion releases vastly more energy than fission — this is why stars run on fusion and why fusion is the holy grail of energy production.\n\nKey picture: fusion moves nuclei *up* the steep left slope of the curve toward iron.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "On the binding energy per nucleon graph, the curve rises steeply for light nuclei, peaks near iron-56, and gradually falls for heavy nuclei. Explain the physical reason the curve *rises* for light nuclei. (2 steps)", "answer": "- Step 1: For very light nuclei (like hydrogen-1, deuterium, tritium), each nucleon has few neighbours. The strong nuclear force — which binds nucleons together — is short-range. With few neighbours, each nucleon doesn't experience many attractive strong-force interactions, so the binding energy per nucleon is low.\n- Step 2: As nuclei get slightly heavier (lithium, beryllium, boron, carbon…), each nucleon has more neighbours and therefore more strong-force bonds. The attractive forces grow faster than the disruptive Coulomb repulsion between protons (which is long-range but weak at small A). So binding energy per nucleon increases. Note: helium-4 is anomalously high because it has a particularly stable configuration (2 protons + 2 neutrons filling the first shell).", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "A student tries to find the half-life from a decay graph and draws a horizontal line from N = N₀/2 to the curve, then down to the time axis. Another student draws a horizontal line from N = N₀/4 to the curve, then down, and subtracts the time at N₀/2. Do both methods give the same half-life? Why? (2 steps)", "answer": "- Step 1: Yes, both methods give the same half-life because the time between N₀ and N₀/2 is the same as the time between N₀/2 and N₀/4. In exponential decay, the half-life is constant — it doesn't depend on when you start measuring.\n- Step 2: The second student is measuring the time for the activity to halve *from any starting point*, not just from N₀. This is actually a more robust method because it doesn't rely on knowing the exact initial value. You could measure the time for the count rate to drop from any value to half that value, and it will always equal one half-life. This is a defining property of exponential decay.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "Would fusing two iron-56 nuclei release energy? Why or why not? (2 steps)", "answer": "- Step 1: No, fusing two iron-56 nuclei would *not* release energy. Iron-56 sits at the peak of the binding energy per nucleon curve. Any nucleus formed by fusing two iron nuclei would be much heavier (around A = 112), placing it on the descending right side of the curve.\n- Step 2: The product nucleus would have a *lower* binding energy per nucleon than iron-56. This means the total binding energy of the product is less than the sum of the binding energies of the two iron nuclei. The mass of the product would be *greater* than the total mass of the reactants (mass has been added, not lost), so energy must be *supplied* rather than released. This is why iron is the endpoint of stellar fusion — stars cannot extract energy by fusing iron.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "Why do fission and fusion both *conserve* total mass-energy but *not* total rest mass separately? (3 steps)", "answer": "- Step 1: In Newtonian/classical thinking, mass is conserved and energy is conserved separately. In relativistic physics, only *total* mass-energy ($$E$$ including $$mc^2$$ contributions) is conserved.\n- Step 2: In nuclear reactions, some rest mass converts into kinetic energy (of fragments, neutrons) and electromagnetic radiation (gamma photons). The products have *less* rest mass than the reactants, but the missing rest mass appears as energy of motion and radiation.\n- Step 3: If you add up all the rest masses *plus* all the kinetic energies (in mass-equivalent units) *plus* radiated photon energies, the total is unchanged. So mass-energy conservation is exact; rest-mass-only conservation is a low-energy approximation that breaks down in nuclear processes.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "When measuring the count rate from a radioactive source, why must you subtract the background count rate before performing half-life calculations? (2 steps)", "answer": "- Step 1: The Geiger counter detects *all* radiation hitting it, including background radiation from cosmic rays, radon gas, and other natural/man-made sources. This background count is always present and does not change over time — it is not related to your source.\n- Step 2: Half-life calculations assume the count rate is entirely from the radioactive source, which decays exponentially. If you don't subtract the background, the count rate never approaches zero — it plateaus at the background level. This distorts the exponential curve and leads to an incorrect half-life. The corrected count rate = measured count rate − background count rate.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Starting from $$A = \\lambda N$$ and the idea that activity is the rate of change of undecayed nuclei, derive the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: Activity is the rate of decay, so $$A = -\\frac{dN}{dt}$$ (negative because $$N$$ is decreasing). Combining with $$A = \\lambda N$$: $$-\\frac{dN}{dt} = \\lambda N$$, or $$\\frac{dN}{dt} = -\\lambda N$$.\n- Step 2: Rearrange to separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$.\n- Step 3: Integrate both sides. The left side integrates from $$N_0$$ to $$N$$, and the right side from $$0$$ to $$t$$: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_0^t dt$$, giving $$\\ln N - \\ln N_0 = -\\lambda t$$, so $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$.\n- Step 4: Exponentiate both sides: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, therefore $$N = N_0 e^{-\\lambda t}$$.\n\nSince $$A = \\lambda N$$, the same exponential form applies to activity: $$A = A_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Why is it that per kilogram of fuel, fusion releases more energy than fission? Refer to the BE/nucleon graph in your answer. (2 steps)", "answer": "- Step 1: On the BE/nucleon graph, the **left slope** (where fusion occurs) is very **steep** — binding energy per nucleon increases rapidly with nucleon number. The **right slope** (where fission occurs) is **gentle** — binding energy per nucleon decreases slowly with nucleon number.\n- Step 2: Because the left slope is steeper, a given change in nucleon number during fusion produces a larger change in BE/nucleon than the same-sized change during fission. This means more energy is released per nucleon in fusion than in fission, and therefore more energy per kilogram of fuel.\n\nThis is why hydrogen bombs (which use fusion) are vastly more powerful than fission bombs of the same mass.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "Per kilogram of fuel, why does fusion release more energy than fission, even though each fission event releases more energy than each fusion event?", "answer": "- Step 1: A single fission event (e.g., U-235) releases ~200 MeV; a single D-T fusion releases ~17 MeV. So per *event*, fission wins.\n- Step 2: But per *nucleon*, the picture flips. Fission's 200 MeV is spread across 235 nucleons → ~0.85 MeV/nucleon. Fusion's 17 MeV is spread across 5 nucleons → ~3.5 MeV/nucleon.\n- Step 3: Since \"per kg\" measures energy per unit *mass* (≈ per nucleon), fusion delivers roughly 4× the energy density of fission. This is why stars (powered by fusion) outshine anything we can build with fission.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "In the binding energy per nucleon graph, the curve for light nuclei (A < 20) rises steeply, while for heavy nuclei (A > 60) it falls gradually. If you had to estimate the energy released by fusing two nuclei vs. fissioning one nucleus of comparable mass, which would release more energy and why? (2 steps)", "answer": "- Step 1: Fusion of light nuclei releases more energy *per nucleon* because the left side of the curve is steeper than the right side. Moving from A ≈ 2 to A ≈ 4 (fusion) involves a huge jump in BE/nucleon (from ~1.1 to ~7.1 MeV), while moving from A ≈ 235 to A ≈ 117 (fission) involves a much smaller change in BE/nucleon (from ~7.6 to ~8.5 MeV).\n- Step 2: Per individual reaction, fission releases more total energy (200 MeV vs. 17.6 MeV) because many more nucleons are involved. But per unit mass, fusion is more energy-dense because the fractional change in BE/nucleon is larger. This is why the Sun, powered by fusion, is so phenomenally energetic despite using the lightest elements as fuel.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "In a graph of $$\\ln N$$ vs. $$t$$, what shape do you get for radioactive decay, and how do you extract $$\\lambda$$ from it? (3 steps)", "answer": "- Step 1: Starting from $$N = N_0 e^{-\\lambda t}$$, take natural log: $$\\ln N = \\ln N_0 - \\lambda t$$.\n- Step 2: This is a straight line: $$y = c + m x$$ with $$y = \\ln N$$, $$x = t$$, intercept $$\\ln N_0$$, and slope $$-\\lambda$$.\n- Step 3: So a log-plot turns exponential decay into a straight line whose negative gradient is the decay constant. This is the standard experimental technique for extracting $$\\lambda$$ (and hence $$t_{1/2}$$) without curve-fitting an exponential.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Carbon-14 has a half-life of 5730 years. Calculate its decay constant in s⁻¹, and explain why the number is so small. (3 steps)", "answer": "- Step 1: Use $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. First convert t½ to seconds: $$5730 \\times 365 \\times 24 \\times 60 \\times 60 \\approx 1.81 \\times 10^{11}$$ s.\n- Step 2: $$\\lambda = \\frac{0.693}{1.81 \\times 10^{11}} \\approx 3.83 \\times 10^{-12}$$ s⁻¹.\n- Step 3: The number is extremely small because each carbon-14 nucleus has only a tiny probability of decaying in any given second. On average, a carbon-14 nucleus will survive for thousands of years before decaying. This is why carbon-14 dating works for archaeological timescales — the isotope is still present in measurable quantities in organic material that is thousands of years old.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "A common misconception is that \"alpha decay is the most ionizing because alpha particles strip lots of electrons from atoms due to weak electron binding.\" What's actually correct? (3 steps)", "answer": "- Step 1: The reason isn't about the alpha particle's own electrons (it has none — it's just two protons and two neutrons).\n- Step 2: Alpha is the most ionizing because (a) it has the largest *charge* ($$+2e$$), exerting strong electrostatic pull on nearby electrons in matter, and (b) it has the largest *mass* and slowest speed, so it spends more time near each atom it passes and is far more likely to interact.\n- Step 3: As a result, alpha rapidly transfers its energy in ionization events over a short distance ($$\\sim$$ few cm in air), making it intensely ionizing but easily stopped. The high ionization is *cause and effect* of its short range: lots of interactions per unit distance.\n\nMisconception probe: it's about the alpha's charge/mass/speed, not about its own electron structure.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "In the proton-proton chain inside stars, two protons fuse to form deuterium plus a positron and neutrino: ¹H + ¹H → ²H + e⁺ + νₑ. Why is a positron produced? (2 steps)", "answer": "- Step 1: Two protons (each with charge +1) cannot simply stick together to form a stable 2-proton nucleus — the Coulomb repulsion would be too strong. For the fusion product to be stable, one of the protons must convert into a neutron, creating deuterium (1 proton + 1 neutron).\n- Step 2: The conversion of a proton into a neutron is beta-plus decay: p → n + e⁺ + νₑ. This conserves charge (the proton's +1 charge becomes the neutron's 0 + the positron's +1) and lepton number (the positron and electron neutrino are created as a particle-antiparticle pair). The positron and neutrino are not \"extra\" — they are necessary byproducts of the proton-to-neutron conversion that makes deuterium stable.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "A student says: \"Fission releases energy because heavy nuclei are unstable, and fusion releases energy because light nuclei are unstable.\" This is partially correct but misses the deeper unifying principle. What is it? (2 steps)", "answer": "- Step 1: The deeper principle is that both processes release energy because they move nuclei *toward higher binding energy per nucleon* — i.e., toward greater stability. The binding energy per nucleon curve is the unifying picture: fission climbs the curve from the right, fusion climbs it from the left.\n- Step 2: Saying \"heavy nuclei are unstable\" or \"light nuclei are unstable\" is directionally correct but incomplete. What matters is not just that the starting nuclei have low BE/nucleon, but that the *products* have higher BE/nucleon. The energy released equals the *increase* in total binding energy. If you tried to split a medium-mass nucleus (near the peak) or fuse two medium-mass nuclei, you'd move *away* from the peak and energy would be *absorbed*, not released. The direction of motion on the curve is what determines whether energy is released.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" These are two distinct properties. What does each one mean, and what is the key difference between them? (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay cannot be influenced by external environmental factors. Temperature, pressure, chemical bonds, or magnetic fields cannot speed up or slow down the decay. The nucleus decays on its own, without an external trigger.\n- Step 2: **Random** means the exact time at which any particular nucleus decays cannot be predicted. Each nucleus has the same constant probability of decaying per unit time, but you cannot say \"nucleus #47 will decay at t = 3.2 s.\"\n- Step 3: The key difference: \"spontaneous\" is about *external influence* (none can affect it), while \"random\" is about *predictability* (you can't predict the moment of decay for an individual). A process can be one without the other in principle, but nuclear decay is both.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Uranium-238 has a half-life of about 4.5 billion years — roughly the age of the Earth. What does this tell us about the origin of uranium on Earth? (2 steps)", "answer": "- Step 1: Since the half-life is comparable to the age of the Earth, roughly half of the uranium-238 that was present when the Earth formed has now decayed into lead. This means uranium was created *before* the Earth formed — it was produced in supernovae (exploding stars) that seeded the interstellar gas cloud from which the solar system formed.\n- Step 2: Uranium cannot be produced by normal stellar fusion (fusion stops at iron). It requires the extreme conditions of a supernova or neutron star merger. By measuring the ratio of uranium to lead in rocks, scientists can determine the age of geological samples (radiometric dating). This is the same principle as carbon-14 dating, but on a much longer timescale.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "A student claims: \"A bound nucleus has less mass than its parts, so energy must be *added* to form a nucleus.\" Is this reasoning correct? Explain the error. (2 steps)", "answer": "- Step 1: The reasoning is incorrect. The student is confusing the direction of energy flow. A bound nucleus has less mass than its separated parts precisely because energy was *released* (not added) when the nucleus formed. The lost mass is equivalent to the energy that left the system.\n- Step 2: The correct logic: when nucleons combine to form a nucleus, binding energy is *released* (the process is exothermic). By $$E = mc^2$$, releasing energy means losing mass. To *break apart* the nucleus (reverse the process), you must *add* energy equal to the binding energy — this is endothermic. The student has the direction backwards: energy comes *out* when the nucleus forms, energy goes *in* when it breaks.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "In nuclear fission of U-235, a slow-moving neutron is absorbed by the uranium nucleus. Why must the neutron be *slow*, and what happens to the nucleus after absorption? (3 steps)", "answer": "- Step 1: A **slow-moving (thermal) neutron** is more likely to be captured by the U-235 nucleus. If the neutron is too fast, it passes through the nucleus without being absorbed — similar to a marble rolling too quickly over a bowl to be caught. The nucleus needs time for the strong nuclear force to \"grab\" the neutron.\n- Step 2: Once absorbed, the U-235 becomes U-236, which is highly **unstable** due to the extra neutron disrupting the balance of nuclear forces. The nucleus distorts and oscillates.\n- Step 3: The Coulomb repulsion between the protons then overcomes the strong nuclear force trying to hold the nucleus together, and the nucleus **splits** into two daughter nuclei (e.g., Ba-141 and Kr-92), plus 2–3 fast neutrons and gamma radiation.\n\nThis is **induced fission** — triggered by neutron absorption. Spontaneous fission (without a neutron) also occurs but is much rarer.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Why can't we use the simple \"halving\" method (divide by 2 repeatedly) when the elapsed time is not a whole number of half-lives? What equation must we use instead? (2 steps)", "answer": "- Step 1: The halving method only works for integer numbers of half-lives because it relies on the formula $$N = N_0 \\times (1/2)^n$$ where n is a whole number. If the elapsed time is, say, 2.7 half-lives, you can't simply halve 2.7 times using a table.\n- Step 2: For non-integer numbers of half-lives, use the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ (or equivalently $$N = N_0 \\times (1/2)^{t/t_{1/2}}$$, where the exponent can be any real number). This works for any time value. You can also use logarithms: if you know N and N₀, solve for t using $$t = \\frac{-\\ln(N/N_0)}{\\lambda}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Binding energy is sometimes described as \"the energy stored in the nucleus.\" Why is this description incorrect, and what is the correct definition? (2 steps)", "answer": "- Step 1: The incorrect description suggests the nucleus *contains* this energy, as if it's sitting inside waiting to be released. This is wrong — a bound nucleus has *less* energy than its separated nucleons, not more.\n- Step 2: The correct definition: binding energy is the energy *required* to completely separate a nucleus into its individual protons and neutrons. It is the energy you must *put in* to break the nucleus apart. Equivalently, it is the energy *released* when the nucleons combine to form the nucleus. A higher binding energy means a more tightly bound (more stable) nucleus — it takes more energy to pull it apart.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Isotope X has a half-life of 10 seconds and isotope Y has a half-life of 1000 years. Which has the larger decay constant, and what does this tell you about their relative instability? (2 steps)", "answer": "- Step 1: Since $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$, the isotope with the shorter half-life has the larger decay constant. Isotope X (t½ = 10 s) has a much larger λ than isotope Y (t½ = 1000 years).\n- Step 2: A larger λ means each nucleus has a higher probability of decaying per second — isotope X is far more unstable. It decays rapidly, losing its radioactivity quickly. Isotope Y is relatively stable; it remains radioactive for a very long time but with much lower activity per nucleus. This is why medical tracers use short-half-life isotopes (they don't linger in the body) while nuclear waste from uranium fission is dangerous for millennia.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "When drawing the binding energy per nucleon graph in an exam, what are the key features you must include, and what common mistakes should you avoid? (3 steps)", "answer": "- Step 1: **Must include:** Both axes labelled (y-axis: binding energy per nucleon in MeV, x-axis: nucleon number A). A smooth curve that rises steeply from low A, peaks near A = 56 (iron, ~8.8 MeV/nucleon), and gradually falls for high A. A cross or point marking the anomaly of helium-4 (high for its size). Numerical values on both axes, especially at the peak.\n- Step 2: **Common mistakes to avoid:** Do NOT start the curve at A = 0 — there is no nucleus with zero nucleons. Do NOT draw a straight line — the curve is distinctly asymmetric (steep rise, gradual fall). Do NOT forget to label units. Do NOT draw the curve as a closed loop or have it return to zero at high A — it asymptotically approaches ~7.5 MeV/nucleon.\n- Step 3: **Special features to mark:** The peak at iron-56 (most stable nucleus). The anomaly at helium-4 (and carbon-12, oxygen-16 if space allows). The fission region (heavy nuclei splitting → moving toward peak) and fusion region (light nuclei combining → moving toward peak). These labels show the examiner you understand the physical significance of the graph.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "Why does the binding energy per nucleon curve peak near iron-56? Relate this to the balance of forces in the nucleus. (3 steps)", "answer": "- Step 1: **Strong nuclear force vs. electrostatic repulsion**  \nThe strong force binds nucleons but has a short range. At small sizes, it dominates. At larger sizes (heavy nuclei), electrostatic repulsion between protons reduces net binding.  \n- Step 2: **Optimal nucleon spacing**  \nIron-56 represents the equilibrium where the strong nuclear force is maximized per nucleon. Heavier nuclei have more protons, increasing Coulomb repulsion and lowering binding energy.  \n- Step 3: **Energy release mechanisms**  \nFission (heavy → medium nuclei) and fusion (light → heavier) both move toward iron-56 on the curve, releasing energy.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Why can $$A = \\lambda N$$ only be used when $$N$$ means *number of nuclei*, not *mass* or *moles*? (2 steps)", "answer": "- Step 1: $$\\lambda$$ is defined as probability per nucleus per unit time. So multiplying by mass or moles wouldn't give a sensible \"decays per second\" — you'd be multiplying probability-per-nucleus by something that isn't a nucleus count.\n- Step 2: If you're given mass, you must first convert to number of nuclei using $$N = (\\text{mass}/M) \\times N_A$$, where $$M$$ is molar mass and $$N_A$$ is Avogadro's number. Common exam trap: students plug mass in grams directly into $$A = \\lambda N$$ and get nonsensical activity values.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Sketch the qualitative shape of the binding-energy-per-nucleon vs. nucleon-number curve, identify key features, and explain why iron-56 sits at the peak. (4 steps)", "answer": "- Step 1: The curve starts low at $$A = 1$$ (hydrogen, zero binding), rises *steeply* through light elements (with He-4, C-12, O-16 anomalously high — these \"double-magic\" nuclei are extra stable).\n- Step 2: It reaches a broad peak around $$A \\approx 56$$ (iron-56), at about $$8.8\\,\\text{MeV}$$/nucleon.\n- Step 3: It then gradually *decreases* for heavier nuclei, falling to about $$7.5\\,\\text{MeV}$$/nucleon at uranium.\n- Step 4: Why iron is the peak: it's a balance of two forces.\n+ Strong nuclear force is short-range — it binds only nearest-neighbor nucleons. Adding more nucleons increases binding linearly only up to a point.\n+ Electrostatic (Coulomb) repulsion between protons is long-range — every proton repels every other proton. As $$Z$$ grows, this destabilizes heavier nuclei.\n+ Around iron, these two effects balance optimally, giving maximum binding per nucleon.\n\nThis curve is the single most important diagram in nuclear physics — it explains *everything* about why fusion and fission release energy.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ from the exponential decay equation. (3 steps)", "answer": "- Step 1: Start with $$N = N_0 e^{-\\lambda t}$$. By definition, when one half-life has passed ($$t = t_{1/2}$$), the number of nuclei has halved: $$N = \\frac{N_0}{2}$$.\n- Step 2: Substitute: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$. Cancel $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take natural logs of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n\nThis shows half-life and decay constant are **inversely proportional**: a large $$\\lambda$$ (high probability of decay) means a short half-life, and vice versa.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why is $$1\\,\\text{u} \\approx 931.5\\,\\text{MeV}/c^2$$?", "answer": "- Step 1: This conversion comes from $$E = mc^2$$. Take $$1\\,\\text{u} \\approx 1.661 \\times 10^{-27}$$ kg, multiply by $$c^2 \\approx 9 \\times 10^{16}$$ m²/s² to get energy in joules.\n- Step 2: Convert from joules to electronvolts by dividing by $$1.6 \\times 10^{-19}$$ J/eV. The result is about $$1.49 \\times 10^{-10}$$ J $$\\approx 931.5$$ MeV.\n- Step 3: So 1 u of mass is equivalent to 931.5 MeV of energy. This conversion is the bridge between mass deficit (measured in u) and binding energy (expressed in MeV).\n\nTakeaway: Memorise this number — it's the universal converter between nuclear-scale mass and energy.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "What is a chain reaction, and what determines whether it grows, stays steady, or dies out? (3 steps)", "answer": "- Step 1: Each fission releases 2–3 neutrons. If even *one* of these triggers another fission on average, the reaction sustains itself.\n- Step 2: The key parameter is the multiplication factor $$k$$ (average new fissions per old fission):\n+ $$k < 1$$: subcritical — reaction dies out.\n+ $$k = 1$$: critical — steady output (nuclear reactor operation).\n+ $$k > 1$$: supercritical — exponential growth (bomb).\n- Step 3: $$k$$ depends on sample size (critical mass), shape (compact sphere maximizes neutron retention), purity (U-235 enrichment), and presence of neutron-absorbing control rods in a reactor. Lowering control rods absorbs neutrons, reducing $$k$$ to $$\\leq 1$$. Withdrawing them increases $$k$$ — which is what went wrong at Chernobyl.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Common trap probe: a student says \"energy is released because mass *increases* during fusion.\" Why is this wrong?", "answer": "- Step 1: It's the opposite. In fusion (and fission), the total mass of *products* is *less* than the mass of reactants. The \"missing\" mass is what gets converted into energy via $$E = mc^2$$.\n- Step 2: The bound product nucleus is more tightly bound (higher BE/A), and binding energy corresponds to *lower* mass. So products are lighter than reactants by an amount equal to the energy released divided by $$c^2$$.\n- Step 3: The rule: energy is released ⟺ products are lighter than reactants ⟺ products are more tightly bound. Mass decrease, not increase, signals an exothermic nuclear reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "In the proton-proton chain that powers the Sun, four protons ultimately become one helium-4 nucleus. But two of the protons must become neutrons. What nuclear process enables this conversion? (2 steps)", "answer": "- Step 1: The conversion of a proton to a neutron is **beta-plus decay** (β⁺ decay), also called positron emission. In this process: $$p \\rightarrow n + e^+ + \\nu_e$$ — a proton converts into a neutron, emitting a positron and an electron neutrino.\n- Step 2: In the full pp-chain, two separate instances of beta-plus decay occur (one at each deuterium-forming step), converting two of the four protons into neutrons. This gives helium-4 its composition of 2 protons and 2 neutrons.\n\nThe overall reaction is: $$4 \\times ^1_1\\text{H} \\rightarrow ^4_2\\text{He} + 2e^+ + 2\\nu_e + \\text{energy}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "A radioactive isotope has half-life 10 minutes and you start with 1600 nuclei. Without using a calculator, how many remain after 40 minutes, and what is the conceptual approach? (3 steps)", "answer": "- Step 1: Count the number of half-lives elapsed: $$40 / 10 = 4$$ half-lives.\n- Step 2: Each half-life halves the population. So multiply by $$(1/2)^4 = 1/16$$.\n- Step 3: $$1600 \\times \\frac{1}{16} = 100$$ nuclei remain.\n\nGeneral principle: $$N = N_0 \\times (1/2)^n$$ where $$n$$ is the number of half-lives. This avoids the exponential formula entirely when $$n$$ is a whole number.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Synthesis question: in a nuclear reactor, why is the energy production essentially continuous and controllable, while a nuclear bomb releases its energy in microseconds?", "answer": "- Step 1: In a reactor, the neutron multiplication factor is kept at exactly 1 by control rods absorbing excess neutrons. Each fission generates 1 next-generation fission on average — a steady state.\n- Step 2: In a bomb, the multiplication factor is well above 1 (e.g., 1.5 or 2). Each fission generates multiple next-generation fissions, doubling every ~$$10^{-8}$$ seconds (the time between fission events). In 80 generations, you have $$2^{80} \\approx 10^{24}$$ fissions — essentially all atoms in a kg-scale critical mass.\n- Step 3: This is why a bomb's energy output is concentrated in microseconds: the exponential explosion of fission events. Reactors avoid this by tuning the multiplication factor.\n\nTakeaway: Reactor = stable feedback (factor = 1). Bomb = runaway exponential (factor > 1). Same physics, vastly different outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why does writing mass in units of MeV/$$c^2$$ make life easier in nuclear physics, and how do you use $$E = mc^2$$ with these units? (2 steps)", "answer": "- Step 1: In MeV/$$c^2$$, the $$c^2$$ is \"baked into the unit.\" So when you compute $$E = mc^2$$, the $$c^2$$ cancels with the $$c^2$$ in the unit, leaving you with energy directly in MeV. Example: a particle of mass $$5\\,\\text{MeV}/c^2$$ has rest energy $$E = 5\\,\\text{MeV}/c^2 \\cdot c^2 = 5\\,\\text{MeV}$$. No conversion, no powers of ten, no $$3\\times 10^8$$.\n- Step 2: This is enormously convenient because all nuclear physics quantities are naturally on the MeV scale, and you avoid juggling factors of $$10^{-27}$$ kg, $$9\\times 10^{16}$$ m²/s², and $$1.6\\times 10^{-19}$$ J/eV every time. It's the same idea as using light-years for galactic distances instead of meters.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why does a short-half-life isotope make a better medical tracer than a long-half-life one? (3 steps)", "answer": "- Step 1: A medical tracer is injected/ingested so its location in the body can be detected from outside via emitted radiation. You want a strong signal *briefly*, then it should disappear.\n- Step 2: A short half-life means high activity per nucleus ($$A = \\lambda N$$, large $$\\lambda$$), so a tiny dose produces a strong detectable signal — minimizing radiation burden to the patient.\n- Step 3: Crucially, after diagnosis the radioactivity decays away quickly (hours), so the patient isn't carrying a radioactive source around for years. A long-half-life isotope would expose the patient for decades. Compare technetium-99m ($$t_{1/2} \\approx 6$$ hours, ideal) vs. uranium-238 ($$t_{1/2} \\approx 4.5$$ billion years, useless and harmful).", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why is lead used as shielding against gamma radiation, while paper is sufficient to stop alpha particles? (2 steps)", "answer": "- Step 1: Explain alpha particle interactions.\n- Alpha particles (²He nuclei) are relatively large, doubly charged (+2e), and massive. They interact strongly with matter and quickly lose their energy through ionisation and excitation of atoms. Even a few centimeters of air or a sheet of paper provides enough material to stop them. They cannot penetrate far into any material.\n- Step 2: Explain gamma ray interactions.\n- Gamma rays are high-energy electromagnetic radiation (photons) with no charge and no rest mass. They interact with matter through different mechanisms (photoelectric effect, Compton scattering, pair production) that have much lower probabilities. Therefore, they can penetrate deeply into materials. Lead is dense and has high atomic number, providing many electrons per unit volume for gamma rays to interact with, making it an effective (though not perfect) shield. Thicker lead is needed for higher-energy gamma rays.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "In the proton-proton chain that powers the Sun, how do hydrogen nuclei (just protons) end up forming helium-4 when there are no neutrons to start with? (3 steps)", "answer": "- Step 1: First, two protons fuse: $$^1_1\\text{H} + ^1_1\\text{H} \\rightarrow ^2_1\\text{H} + e^+ + \\nu_e$$. One proton converts into a neutron via beta-plus decay (weak interaction), emitting a positron and an electron neutrino, producing deuterium.\n- Step 2: The deuterium then fuses with another proton to form helium-3: $$^2_1\\text{H} + ^1_1\\text{H} \\rightarrow ^3_2\\text{He} + \\gamma$$.\n- Step 3: Two helium-3 nuclei finally combine: $$^3_2\\text{He} + ^3_2\\text{He} \\rightarrow ^4_2\\text{He} + 2\\,^1_1\\text{H}$$, producing helium-4 and returning two protons to the cycle.\n\nNet result: four protons → one helium-4 + 2 positrons + 2 neutrinos + energy ($$\\sim 26$$ MeV per cycle). The weak-force step (proton → neutron) is *extremely slow*, which is why the Sun burns over billions of years rather than exploding.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "If a muon has a proper lifetime of 2.2 μs but is detected at sea level after traveling 10 km, does this contradict physics? Explain using relativistic effects. (2 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is indeed 2.2 μs. At relativistic speeds (e.g., 0.99c), two effects occur:\n+ Time dilation: The muon's \"clock\" runs slower from our perspective. The dilated lifetime t = γt₀ where γ = 1/√(1-v²/c²) ≈ 7 at v = 0.99c.\n+ Length contraction: The distance the muon travels is contracted in its frame.\n- Step 2: In the lab frame, the muon's lifetime appears extended to ~15 μs. At 0.99c, it can travel about 4.5 km — still less than 10 km. But more precisely, accounting for the full relativistic transformation, muons created in the upper atmosphere do reach sea level. This is direct experimental evidence for time dilation and length contraction — without relativity, they couldn't survive the journey.", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "A student argues: \"If I wait long enough, all the radioactive nuclei in a sample will eventually decay, so the number remaining reaches exactly zero.\" Is this strictly correct? Explain. (2 steps)", "answer": "- Step 1: Mathematically, the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ never actually reaches zero — as $$t \\to \\infty$$, $$N$$ approaches zero asymptotically but never equals it. The equation predicts an ever-diminishing but always positive number of nuclei.\n- Step 2: Physically, however, $$N$$ must be an integer. In practice, once the number of remaining nuclei becomes very small (e.g., 1 or 2), the statistical description breaks down and the last few nuclei will eventually decay. So in reality, the sample does reach zero — but the exponential model, which is a continuous approximation for large numbers, doesn't capture this final stage.\n\nThe exponential model is an excellent approximation for large $$N$$ but is not exact for the very last nuclei.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Both nuclear fission and nuclear fusion release energy. Using the binding energy per nucleon graph, explain why this is possible for two seemingly opposite processes. (3 steps)", "answer": "- Step 1: The binding energy per nucleon graph peaks near iron-56. Nuclei near this peak are the most stable (highest BE/nucleon). Moving *toward* the peak from either side increases the total binding energy, which means energy is released.\n- Step 2: **Fission** takes a heavy nucleus (right side of the curve, low BE/nucleon) and splits it into two medium-mass nuclei (closer to the peak, higher BE/nucleon). The products have more binding energy per nucleon, so the total binding energy increases. The difference is released as kinetic energy and gamma radiation.\n- Step 3: **Fusion** takes two light nuclei (left side of the curve, very low BE/nucleon) and combines them into a slightly heavier nucleus (higher BE/nucleon, climbing the steep left slope). Again, the product has more binding energy per nucleon, so energy is released. Both processes move toward the peak — they just start from opposite sides.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "Why must background radiation be subtracted from count-rate measurements before analyzing half-life from a decay graph? (3 steps)", "answer": "- Step 1: A Geiger counter detects *all* incoming radiation — from your sample plus from cosmic rays, radon, building materials, etc. (typically $$\\sim 20\\text{–}30$$ counts/min).\n- Step 2: If you don't subtract this floor, your \"decay curve\" tails off to the background level instead of to zero. The graph appears to flatten out, distorting the apparent half-life — you'd overestimate how long the source remains active.\n- Step 3: The fix: measure background separately (no source present), then subtract from every reading. The corrected count rate then decays exponentially toward zero, allowing accurate determination of $$t_{1/2}$$.\n\nExam trap: a curve that levels off at a non-zero value is a giveaway that background hasn't been subtracted.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A student says: \"If I watch a single radioactive nucleus carefully, I can predict exactly when it will decay.\" Is this correct, and what fundamental property of nuclear decay makes it so? (2 steps)", "answer": "- Step 1: The statement is incorrect. It is impossible to predict when any individual nucleus will decay. This is because radioactive decay is a **random** process — each nucleus has a constant probability of decaying in any given time interval, but the exact moment is fundamentally unpredictable.\n- Step 2: However, while individual decays are random, with a **large sample** of nuclei (billions or more), the *statistical average* behaviour becomes highly predictable. This is why we can define quantities like half-life and activity — they describe the collective, probabilistic behaviour, not the fate of any one nucleus.\n\nThe randomness is irreducible at the single-nucleus level; predictability only emerges statistically.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "In a nuclear decay equation, what must be conserved? List the conservation laws and explain why each is required. (4 steps)", "answer": "- Step 1: **Nucleon number** ($$A$$): the total number of nucleons on the left equals the total on the right. Nucleons aren't created or destroyed in alpha/beta/gamma decay (though a neutron can convert to a proton in beta decay, the total nucleon count stays the same).\n- Step 2: **Charge** (proton number $$Z$$, including charge of beta particles): total charge before $$=$$ total charge after. Charge conservation is universal.\n- Step 3: **Lepton number**: in beta decay, the electron emitted ($$L = +1$$) must be accompanied by an antineutrino ($$L = -1$$); in beta-plus, the positron ($$L = -1$$) is accompanied by a neutrino ($$L = +1$$). This is why neutrinos must exist.\n- Step 4: **Mass-energy and momentum**: the rest-mass plus kinetic energy of products equals that of reactants. Energy conservation is what makes the mass defect = binding energy connection meaningful.\n\nIf a proposed decay violates any of these, it doesn't happen.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "On the binding energy per nucleon graph, why does the curve *gradually decrease* for heavy nuclei beyond iron-56? (2 steps)", "answer": "- Step 1: As nuclei get larger, more protons are packed together. The Coulomb (electrostatic) repulsion between protons is long-range — every proton repels every other proton. This repulsive force grows with the number of proton pairs, which increases roughly as Z².\n- Step 2: The strong nuclear force is short-range — each nucleon only attracts its nearest neighbours. Adding more nucleons doesn't increase the strong-force bonds per nucleon much (they saturate). So as A increases, the disruptive Coulomb repulsion per nucleon grows while the stabilising strong force per nucleon stays roughly constant. The net effect: binding energy per nucleon slowly decreases. This is why very heavy nuclei like uranium are less stable than medium-mass nuclei.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Compare fission and fusion in terms of: starting material, products, energy per nucleon released, conditions required, and waste. (5 steps)", "answer": "- Step 1: **Starting material:** Fission needs heavy nuclei (U-235, Pu-239). Fusion needs light nuclei (H, He isotopes).\n- Step 2: **Products:** Fission gives two medium-mass nuclei + neutrons + gamma. Fusion gives one heavier nucleus + light particles (neutron, positron, neutrino) + gamma.\n- Step 3: **Energy per nucleon:** Fission $$\\sim 1$$ MeV/nucleon, fusion $$\\sim 3\\text{–}6$$ MeV/nucleon. So fusion is several times more energy-dense per kg.\n- Step 4: **Conditions:** Fission needs only a slow neutron in a sample above critical mass. Fusion needs extreme temperature ($$10^7\\text{–}10^8$$ K) to overcome Coulomb repulsion.\n- Step 5: **Waste:** Fission produces highly radioactive long-lived daughter products (waste storage problem). Fusion's main product is helium (inert), though neutron irradiation can activate reactor materials — much less severe.\n\nBoth rely on the same underlying principle: move toward iron-56 on the binding energy curve.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Why does a nucleus have *less* mass than the sum of the masses of its individual protons and neutrons? (3 steps)", "answer": "- Step 1: When separated nucleons come together to form a bound nucleus, energy is *released* (it's an exothermic process — they fall into a deep potential well of the strong nuclear force).\n- Step 2: By Einstein's $$\\Delta E = \\Delta m\\, c^2$$, energy and mass are equivalent. The energy released carries away mass. So the bound system ends up with less total mass than the unbound components.\n- Step 3: This \"missing\" mass is the mass defect $$\\Delta m$$. It's not really missing — it was converted into the energy radiated away during nucleus formation. To pull the nucleus apart again, you'd need to *put back* that same amount of energy (the binding energy).\n\nA bound system *always* has less mass than its separated parts — this is a universal feature of mass-energy equivalence.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "A sample of 8 grams of polonium decays to 0.25 grams. How many half-lives have passed, and what is the key pattern to recognise? (2 steps)", "answer": "- Step 1: Work through successive halvings: 8 → 4 → 2 → 1 → 0.5 → 0.25 grams. That required 5 halvings, so 5 half-lives have passed.\n- Step 2: The key pattern is that each half-life divides the quantity by 2, not subtracts a fixed amount. After n half-lives, the remaining quantity is $$N_0 \\times \\left(\\frac{1}{2}\\right)^n$$. A common mistake is to think the decrease is linear (subtracting the same amount each time). It is multiplicative — the *fraction* remaining is always ½ per half-life, but the *amount* lost gets smaller each time.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why is the Sun's lifetime ($$\\sim 10^{10}$$ years) so long despite fusing $$\\sim 600$$ million tons of hydrogen per second? (3 steps)", "answer": "- Step 1: The Sun has enormous mass ($$\\sim 2\\times 10^{30}$$ kg), so the fraction consumed per second is tiny.\n- Step 2: The *rate-limiting step* is the proton → neutron conversion in the first p-p chain reaction, which proceeds via the weak interaction — an extraordinarily slow process. The typical proton in the Sun's core waits *billions of years* before fusing.\n- Step 3: This slow weak-interaction step is what gives stars their long lifetimes. If proton fusion were faster, the Sun would burn out in millions of years and life couldn't have evolved. So star longevity is a direct consequence of the weakness of the weak force — a fortunate coincidence for biology.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A nucleus has Z = 26 protons and A = 56 nucleons. If the mass of the nucleus is 9.288 × 10⁻²⁶ kg, outline the conceptual steps to find the binding energy per nucleon (no heavy calculation required). (4 steps)", "answer": "- Step 1: Calculate the mass defect: $$\\Delta m = Zm_p + (A-Z)m_n - m_{total}$$. With Z = 26 protons and 30 neutrons, sum the individual masses of 26 protons and 30 neutrons, then subtract the measured nuclear mass. This gives a small positive Δm.\n- Step 2: Convert the mass defect to binding energy using $$\\Delta E = \\Delta m \\times c^2$$. This gives the total binding energy in joules.\n- Step 3: Divide the total binding energy by the nucleon number A = 56 to get the binding energy *per nucleon* in joules.\n- Step 4: Convert to MeV by dividing by $$1.6 \\times 10^{-13}$$ J/MeV. For iron-56, this gives approximately 8.8 MeV/nucleon — the highest of any nucleus, confirming iron as the most stable. Alternatively, convert Δm from kg to u first, then multiply by 931.5 MeV per u to skip the c² calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Why is the helium-4 nucleus anomalously stable, sitting noticeably *above* the smooth BE/nucleon curve at $$A = 4$$? (2 steps)", "answer": "- Step 1: Helium-4 has 2 protons and 2 neutrons — both filled shells in the simple nuclear shell model. It's \"doubly magic\" (magic numbers 2 and 2 for both protons and neutrons), giving extra binding from quantum-mechanical shell closure effects.\n- Step 2: This is also why alpha decay (emission of a He-4 nucleus) is so common in heavy-nucleus decay: the alpha particle is *unusually* stable, so its formation and emission is energetically favorable. Heavier nuclei effectively shed mass and charge in the most-stable possible package. Carbon-12 and oxygen-16 also lie slightly above the trend for the same shell-closure reason — they can be thought of as 3 and 4 alpha-particle clusters.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why is the left slope of the BE/nucleon curve steeper than the right slope, and what does this imply about energy yields of fusion vs. fission per kg of fuel? (2 steps)", "answer": "- Step 1: The left slope is steep because going from $$A = 2$$ to $$A = 4$$ doubles the number of nucleons each one is bound to — a huge fractional change in average binding. The right slope is gentle because adding one more nucleon to a $$A = 235$$ nucleus is just a small fractional change.\n- Step 2: Steeper slope means a larger jump per nucleon. So:\n+ Fusion of hydrogen → helium releases $$\\sim 6\\,\\text{MeV}$$/nucleon.\n+ Fission of uranium → barium + krypton releases $$\\sim 1\\,\\text{MeV}$$/nucleon.\n+ Per kg of fuel, fusion gives roughly $$3\\text{–}4\\times$$ more energy than fission. This is why stars (and hopefully future fusion reactors) are vastly more efficient than fission reactors.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Synthesis: trace conceptually why nuclear fusion of hydrogen powers the Sun for billions of years rather than exploding in seconds.", "answer": "- Step 1: Fusion requires extreme density and temperature, which only exist in the core of the Sun. Outside the core, conditions are too cool. So only a tiny fraction of the Sun's hydrogen is fusing at any moment.\n- Step 2: The fusion rate is also limited by a *weak interaction* step (proton-proton → deuterium + positron + neutrino), which has a tiny cross-section. This makes the per-proton fusion rate extremely slow.\n- Step 3: Gravity holds the Sun together against the outward radiation pressure of fusion. If fusion sped up, the core would expand and cool, reducing the rate — a negative feedback loop. This self-regulation keeps the Sun stable for ~10 billion years total.\n\nTakeaway: The Sun is a slow, regulated furnace — fast enough to outshine billions of stars, slow enough to last billions of years.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "Why is fusion harder to achieve on Earth than fission, even though fusion releases more energy per kilogram?", "answer": "- Step 1: Fission only requires a neutron to approach a heavy nucleus. Neutrons are uncharged, so they feel no Coulomb barrier and can be absorbed at low energies (even at room temperature with slow neutrons).\n- Step 2: Fusion requires two *charged* nuclei to overcome their mutual Coulomb repulsion. This needs temperatures of tens of millions of kelvin to give nuclei enough kinetic energy to get close.\n- Step 3: Containing plasma at millions of degrees is enormously difficult — no material can touch it. We must use magnetic fields (tokamaks) or laser implosion. Achieving net energy gain has remained elusive for decades.\n\nTakeaway: Fission is easy because neutrons are free passes through the Coulomb barrier; fusion is hard because charged nuclei must climb it.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Explain why nuclear fusion requires extreme temperatures and pressures, and how stars overcome these challenges. (3 steps)", "answer": "- Step 1: Light nuclei repel (Coulomb barrier). Extreme temperatures provide kinetic energy to overcome this.  \n- Step 2: High pressure (e.g., in stellar cores) increases collision frequency.  \n- Step 3: Stars use gravity to compress hydrogen into a dense, hot plasma where quantum tunneling enables fusion.  \n\n[Takeaway: Fusion requires overcoming electrostatic repulsion; stars achieve this via gravitational compression and high temperatures.]", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "A nucleus has $$Z = 6$$ protons (mass $$1.007\\,\\text{u}$$ each) and $$N = 6$$ neutrons (mass $$1.009\\,\\text{u}$$ each), but the measured nuclear mass is $$11.99\\,\\text{u}$$. Conceptually, what's the binding energy in MeV? (3 steps)", "answer": "- Step 1: Sum of free nucleon masses: $$6(1.007) + 6(1.009) = 6.042 + 6.054 = 12.096\\,\\text{u}$$.\n- Step 2: Mass defect: $$\\Delta m = 12.096 - 11.99 = 0.106\\,\\text{u}$$. (Positive, as expected — bound nucleus is lighter.)\n- Step 3: Convert: $$0.106 \\times 931.5 \\approx 99\\,\\text{MeV}$$ total binding energy. Per nucleon: $$\\sim 8.2$$ MeV/nucleon — characteristic of a stable light nucleus like carbon-12, sitting near the top of the BE/nucleon curve.\n\nThe conceptual flow: sum free masses → subtract bound mass → multiply by 931.5 → divide by $$A$$ for per-nucleon.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why is radioactive decay also called \"spontaneous,\" and what does this mean for the influence of temperature, pressure, or chemical state on half-life?", "answer": "\"Spontaneous\" means the decay is driven entirely by the internal physics of the nucleus and cannot be sped up or slowed down by external environmental conditions. Heating uranium, putting it under pressure, dissolving it in acid, or combining it in a compound has essentially no effect on its half-life. This is because nuclear binding energies are on the scale of $$\\text{MeV}$$ per nucleon, whereas chemical/thermal energies are only $$\\sim \\text{eV}$$ per atom — six orders of magnitude too small to perturb nuclear processes. Therefore, half-life is a fixed property of the isotope itself.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Why do fission products (the \"daughter nuclei\") fly apart at high speed after splitting?", "answer": "- Step 1: Both daughter nuclei are positively charged. Immediately after the parent splits, they are very close together — the Coulomb repulsion between them is enormous.\n- Step 2: This electrostatic potential energy is rapidly converted into kinetic energy as they accelerate apart. Most of the ~200 MeV released in fission appears as kinetic energy of the two daughters.\n- Step 3: The kinetic energy of the daughters becomes heat in the surrounding material, which is what reactors harness to boil water and drive turbines.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What is the physical meaning of the equation $$\\Delta E = \\Delta m c^2$$ in the context of nuclear physics?", "answer": "- Step 1: Mass and energy are two forms of the same physical quantity. The constant $$c^2$$ is the conversion factor — and it's huge ($$9 \\times 10^{16}$$ in SI), meaning a tiny amount of mass corresponds to an enormous amount of energy.\n- Step 2: In nuclear reactions, *some mass disappears* from the reactants. That mass is converted into kinetic energy of products and photons. This is why nuclear processes release millions of times more energy than chemical ones (which only rearrange electrons, not nucleons).\n- Step 3: A nuclear power plant running on 1 kg of fuel converts perhaps 1 gram of mass into energy — equivalent to $$10^{-3} \\times (3 \\times 10^8)^2 = 9 \\times 10^{13}$$ J, enough to power a city for hours.\n\nTakeaway: $$c^2$$ is the universal \"exchange rate\" between matter and energy; nuclear physics exploits it.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "If you need to convert 2.5 MeV into joules, what operation do you perform? If you need to convert $$3.0 \\times 10^{-12}$$ J into MeV, what operation do you perform? (2 steps)", "answer": "- Step 1: To convert MeV to joules, *multiply* by $$1.6 \\times 10^{-13}$$: $$2.5 \\text{ MeV} = 2.5 \\times 1.6 \\times 10^{-13} = 4.0 \\times 10^{-13}$$ J. (Since 1 MeV = $$1.6 \\times 10^{-13}$$ J.)\n- Step 2: To convert joules to MeV, *divide* by $$1.6 \\times 10^{-13}$$: $$\\frac{3.0 \\times 10^{-12}}{1.6 \\times 10^{-13}} = \\frac{30}{1.6} \\times 10^{1} \\approx 18.75$$ MeV. A quick sanity check: 1 MeV is a very small amount of energy in everyday terms, but significant at the nuclear scale. Nuclear energies are typically in the MeV range, while atomic/electron energies are in the eV to keV range.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "A student says: \"A sample with a longer half-life is more dangerous because it stays radioactive for longer.\" A second student says: \"A shorter half-life is more dangerous because it decays faster.\" Can both be partly right? Explain. (3 steps)", "answer": "- Step 1: The first student is partly right: a long half-life means the source remains radioactive for a very long time (e.g., uranium-238 with $$t_{1/2} \\approx 4.5$$ billion years). This is a concern for long-term storage of nuclear waste.\n- Step 2: The second student is also partly right: a short half-life means a high decay constant, so for the same number of nuclei, the activity is much higher (since $$A = \\lambda N$$). High activity means more radiation emitted per second, which is more immediately dangerous.\n- Step 3: Danger depends on *both* the activity (how much radiation per second) and the duration (how long it remains radioactive). A very short half-life isotope is intensely radioactive but quickly becomes harmless. A very long half-life isotope is weakly radioactive per gram but persists essentially forever. The most dangerous isotopes for biological exposure are often those with intermediate half-lives (e.g., strontium-90, $$t_{1/2} \\approx 29$$ years) — active enough to cause harm, long-lived enough to persist in the body.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Why does nuclear fusion require extremely high temperatures (millions of kelvin) and high pressures, while fission does not? (3 steps)", "answer": "- Step 1: Fusion requires two **positively charged** nuclei to come close enough for the **strong nuclear force** to bind them. But before they get that close, they experience **Coulomb (electrostatic) repulsion** — like charges repel. This is the Coulomb barrier.\n- Step 2: To overcome this repulsion, the nuclei must have extremely high **kinetic energy** — which means extremely high temperature (temperature is a measure of average kinetic energy). In the Sun's core, temperatures reach ~15 million K, giving nuclei enough speed to approach despite the repulsion.\n- Step 3: High **pressure/density** is also needed so that nuclei are close enough together to collide frequently. Fission, by contrast, is triggered by absorbing a *neutral* neutron — there is no Coulomb barrier to overcome, so it can occur at room temperature.\n\nThis is why controlled fusion on Earth is so difficult to achieve: we must create and contain plasma at temperatures hotter than the centre of the Sun.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "A nuclear reactor uses control rods to keep the multiplication factor $$k$$ close to 1. Why is \"close to 1\" the right target, rather than \"as high as possible\"? (3 steps)", "answer": "- Step 1: $$k > 1$$ means the number of fissions grows exponentially each generation — runaway power increase, leading to overheating, meltdown, or explosion (Chernobyl-style).\n- Step 2: $$k < 1$$ means fissions die out — power output falls and the reactor shuts down.\n- Step 3: $$k = 1$$ (criticality) means the reaction sustains itself at a steady rate — exactly one new fission per old fission on average. Steady fission rate $$\\Rightarrow$$ steady heat output $$\\Rightarrow$$ steady electricity. Control rods absorb excess neutrons to fine-tune $$k$$ around 1 in real time. Steady operation, not maximum operation, is the goal.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Why does the activity of a sample decay exponentially rather than linearly? Give the intuitive (not algebraic) reason. (2 steps)", "answer": "- Step 1: Linear decay would happen if the same *absolute number* of nuclei decayed each second regardless of how many were left. But this isn't physically reasonable: when there are fewer nuclei, there are fewer \"candidates\" for decay.\n- Step 2: Instead, each nucleus independently has the same per-second decay probability. So the *fraction* lost each second is constant — but the absolute number lost falls as $$N$$ falls. This is exactly the condition that produces exponential decay: rate proportional to amount remaining. The same math governs cooling, capacitor discharge, and population dynamics with constant per-capita death rate.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "A sample’s activity is measured as 800 Bq. Af
