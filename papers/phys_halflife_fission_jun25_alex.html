Multiply the mass defect by this conversion factor: $$\\Delta E = 0.03 \\times 931.5 = 27.945$$ MeV.\n- Step 3: The binding energy is approximately 28 MeV. Note: if you were working in SI units, you'd convert 0.03 u to kg ($$0.03 \\times 1.661 \\times 10^{-27}$$ kg), then use $$\\Delta E = \\Delta m c^2$$, then convert from joules to MeV ($$\\div 1.6 \\times 10^{-13}$$). The u → MeV shortcut is far faster and avoids errors.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the atomic mass unit (u), and why is it defined as 1/12 the mass of a carbon-12 atom rather than the mass of one proton? (2 steps)", "answer": "- Step 1: The atomic mass unit is defined as 1/12 of the mass of a neutral carbon-12 atom, so 1 u ≈ 1.661 × 10⁻²⁷ kg. This makes the mass of carbon-12 exactly 12 u by definition, providing a convenient reference standard.\n- Step 2: It is not defined as the mass of a proton because the proton mass (≈ 1.0073 u) doesn't give nice round numbers for any nucleus. Using carbon-12 as the reference means most nuclei have masses close to their nucleon number in u (e.g., uranium-235 has a mass of approximately 235 u). The slight difference from integer values is due to mass defect — the actual mass is always slightly less than A u.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Convert 1 u into MeV/c² step by step, starting from 1 u = 1.661 × 10⁻²⁷ kg. (3 steps)", "answer": "- Step 1: Use Einstein's equation $$E = mc^2$$. The energy equivalent of 1 u is: $$E = (1.661 \\times 10^{-27}) \\times (3.0 \\times 10^8)^2 = 1.661 \\times 10^{-27} \\times 9.0 \\times 10^{16} = 1.495 \\times 10^{-10}$$ J.\n- Step 2: Convert joules to eV by dividing by the electron charge: $$\\frac{1.495 \\times 10^{-10}}{1.6 \\times 10^{-19}} = 9.34 \\times 10^8$$ eV = 934 MeV. (The more precise value is 931.5 MeV using more accurate constants.)\n- Step 3: Since this energy came from a mass of 1 u, we write 1 u = 931.5 MeV/c². The \"c²\" reminds us this is a mass unit expressed in energy terms. When you multiply by c² in $$E = mc^2$$, the c² cancels and you get energy in MeV directly. This is why the shortcut \"mass in u × 931.5 = energy in MeV\" works.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Binding energy per nucleon is defined as total binding energy divided by nucleon number A. Why is this a better measure of nuclear stability than total binding energy alone? (2 steps)", "answer": "- Step 1: Total binding energy increases with nucleus size — a large nucleus like uranium has a huge total binding energy simply because it has many nucleons. But this doesn't tell you how tightly *each* nucleon is bound.\n- Step 2: Binding energy per nucleon tells you the energy needed to remove one nucleon on average. A higher value means each nucleon is more tightly bound and the nucleus is more stable. Iron-56 has the highest binding energy per nucleon (~8.8 MeV/nucleon), making it the most stable nucleus. Uranium has a large total binding energy but a lower binding energy *per nucleon* (~7.6 MeV/nucleon), meaning each nucleon is less tightly bound than in iron.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "On the binding energy per nucleon graph, the curve rises steeply for light nuclei, peaks near iron-56, and gradually falls for heavy nuclei. Explain the physical reason the curve *rises* for light nuclei. (2 steps)", "answer": "- Step 1: For very light nuclei (like hydrogen-1, deuterium, tritium), each nucleon has few neighbours. The strong nuclear force — which binds nucleons together — is short-range. With few neighbours, each nucleon doesn't experience many attractive strong-force interactions, so the binding energy per nucleon is low.\n- Step 2: As nuclei get slightly heavier (lithium, beryllium, boron, carbon…), each nucleon has more neighbours and therefore more strong-force bonds. The attractive forces grow faster than the disruptive Coulomb repulsion between protons (which is long-range but weak at small A). So binding energy per nucleon increases. Note: helium-4 is anomalously high because it has a particularly stable configuration (2 protons + 2 neutrons filling the first shell).", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "On the binding energy per nucleon graph, why does the curve *gradually decrease* for heavy nuclei beyond iron-56? (2 steps)", "answer": "- Step 1: As nuclei get larger, more protons are packed together. The Coulomb (electrostatic) repulsion between protons is long-range — every proton repels every other proton. This repulsive force grows with the number of proton pairs, which increases roughly as Z².\n- Step 2: The strong nuclear force is short-range — each nucleon only attracts its nearest neighbours. Adding more nucleons doesn't increase the strong-force bonds per nucleon much (they saturate). So as A increases, the disruptive Coulomb repulsion per nucleon grows while the stabilising strong force per nucleon stays roughly constant. The net effect: binding energy per nucleon slowly decreases. This is why very heavy nuclei like uranium are less stable than medium-mass nuclei.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Both nuclear fission and nuclear fusion release energy. Using the binding energy per nucleon graph, explain why this is possible for two seemingly opposite processes. (3 steps)", "answer": "- Step 1: The binding energy per nucleon graph peaks near iron-56. Nuclei near this peak are the most stable (highest BE/nucleon). Moving *toward* the peak from either side increases the total binding energy, which means energy is released.\n- Step 2: **Fission** takes a heavy nucleus (right side of the curve, low BE/nucleon) and splits it into two medium-mass nuclei (closer to the peak, higher BE/nucleon). The products have more binding energy per nucleon, so the total binding energy increases. The difference is released as kinetic energy and gamma radiation.\n- Step 3: **Fusion** takes two light nuclei (left side of the curve, very low BE/nucleon) and combines them into a slightly heavier nucleus (higher BE/nucleon, climbing the steep left slope). Again, the product has more binding energy per nucleon, so energy is released. Both processes move toward the peak — they just start from opposite sides.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Would fusing two iron-56 nuclei release energy? Why or why not? (2 steps)", "answer": "- Step 1: No, fusing two iron-56 nuclei would *not* release energy. Iron-56 sits at the peak of the binding energy per nucleon curve. Any nucleus formed by fusing two iron nuclei would be much heavier (around A = 112), placing it on the descending right side of the curve.\n- Step 2: The product nucleus would have a *lower* binding energy per nucleon than iron-56. This means the total binding energy of the product is less than the sum of the binding energies of the two iron nuclei. The mass of the product would be *greater* than the total mass of the reactants (mass has been added, not lost), so energy must be *supplied* rather than released. This is why iron is the endpoint of stellar fusion — stars cannot extract energy by fusing iron.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "In nuclear fission of U-235, a slow-moving neutron is absorbed and the nucleus splits. Why must the neutron be *slow* (thermal), and what happens after absorption? (3 steps)", "answer": "- Step 1: The neutron must be slow because it needs to be *captured* by the uranium nucleus, not just pass through. A slow neutron spends more time near the nucleus, giving the strong nuclear force time to pull it in. Fast neutrons are more likely to zip past without being absorbed.\n- Step 2: Once absorbed, the U-235 nucleus becomes U-236, which is highly unstable. The extra neutron disrupts the balance of forces in the nucleus. The nucleus distorts (like a wobbling drop of liquid) — the Coulomb repulsion between the two halves begins to exceed the strong force holding them together.\n- Step 3: The nucleus splits into two daughter nuclei (e.g., barium-141 and krypton-92), plus 2-3 fast neutrons and gamma radiation. The total mass of the products is less than the mass of the reactants. The missing mass (mass defect) is converted to energy via $$\\Delta E = \\Delta m c^2$$, approximately 200 MeV per fission event.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What is a nuclear chain reaction, and why is the presence of a \"critical mass\" important for sustaining one? (2 steps)", "answer": "- Step 1: A chain reaction occurs when the neutrons released from one fission event go on to cause further fission events in neighbouring nuclei. Each fission releases 2-3 neutrons, so if each of those causes another fission, the reaction grows exponentially: 1 → 2-3 → 4-9 → 8-27… This is what happens in a nuclear bomb (uncontrolled) or reactor (controlled).\n- Step 2: Critical mass is the minimum amount of fissile material needed to sustain a chain reaction. If the sample is too small, too many neutrons escape through the surface without hitting another nucleus. A larger sample (supercritical mass) means more nuclei for neutrons to encounter, so the chain reaction sustains and grows. In a reactor, control rods absorb excess neutrons to keep the reaction at a steady rate.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "In a nuclear reactor, control rods are used to regulate the chain reaction. How do they work, and what happens if they are fully removed (as at Chernobyl)? (2 steps)", "answer": "- Step 1: Control rods are made of neutron-absorbing materials (like boron or cadmium). When inserted between the fuel rods, they absorb neutrons that would otherwise cause further fission events. By adjusting how far the rods are inserted, operators control the rate of the chain reaction — more rods inserted means fewer neutrons available, slowing the reaction.\n- Step 2: If the control rods are fully removed (as happened at Chernobyl), there is nothing to absorb the excess neutrons. The chain reaction accelerates uncontrollably, producing heat far faster than the cooling system can handle. This leads to overheating, steam explosions, and meltdown. The control rods are the \"brakes\" of a nuclear reactor — without them, the reaction runs away.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Nuclear fusion in stars fuses hydrogen into helium. Why does fusion require extremely high temperatures and pressures, while fission does not? (3 steps)", "answer": "- Step 1: Fusion requires two positively charged nuclei to come extremely close together so the short-range strong nuclear force can bind them. But both nuclei are positive, so they electrostatically *repel* each other (Coulomb repulsion). This is the \"Coulomb barrier.\"\n- Step 2: To overcome this repulsion, the nuclei must have enormous kinetic energy (extremely high temperature — millions of kelvin) so they can approach close enough for the strong force to take over. High pressure (density) ensures enough collisions occur. This is why fusion only happens in stellar cores.\n- Step 3: Fission, by contrast, is triggered by a *neutral* neutron being absorbed. The neutron has no charge, so there is no Coulomb barrier to overcome — it can approach the nucleus easily. That's why fission can be induced at room temperature with a neutron source, while fusion requires conditions found in the centre of stars.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "In the deuterium-tritium fusion reaction ²H + ³H → ⁴He + ¹n, energy is released. Where does this energy come from, quantitatively? (3 steps)", "answer": "- Step 1: Calculate the total mass of the reactants: mass of deuterium (²H) + mass of tritium (³H). Then calculate the total mass of the products: mass of helium-4 + mass of a neutron.\n- Step 2: The mass of the products is *less* than the mass of the reactants. This mass difference (mass defect) exists because helium-4 has a much higher binding energy per nucleon (~7.07 MeV) than deuterium (~1.11 MeV) or tritium (~2.83 MeV). The nucleons in helium are more tightly bound, so more energy was released during formation (equivalently, more mass was lost).\n- Step 3: The energy released is $$\\Delta E = \\Delta m \\times c^2$$, where Δm is the mass defect. Numerically, this is about 17.6 MeV per reaction. This energy appears as kinetic energy of the helium nucleus and the neutron. Because fusion climbs the steep left side of the BE/nucleon curve, the energy release per unit mass is actually larger than for fission.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A medical tracer is injected into a patient's bloodstream to help locate a tumour. Should the tracer isotope have a short or long half-life, and why? (2 steps)", "answer": "- Step 1: The tracer should have a *short* half-life (minutes to hours). It needs to be radioactive long enough to produce a detectable signal during the scan, but not so long that it continues emitting radiation inside the patient's body for days or years after the procedure.\n- Step 2: A short half-life means the tracer quickly decays to negligible levels, minimising the radiation dose to the patient. For example, technetium-99m (t½ ≈ 6 hours) is commonly used — it provides a strong signal during the scan but is essentially gone within a day or two. A long half-life isotope like carbon-14 (t½ ≈ 5730 years) would be completely unsuitable because it would remain radioactive in the body indefinitely.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Uranium-238 has a half-life of about 4.5 billion years — roughly the age of the Earth. What does this tell us about the origin of uranium on Earth? (2 steps)", "answer": "- Step 1: Since the half-life is comparable to the age of the Earth, roughly half of the uranium-238 that was present when the Earth formed has now decayed into lead. This means uranium was created *before* the Earth formed — it was produced in supernovae (exploding stars) that seeded the interstellar gas cloud from which the solar system formed.\n- Step 2: Uranium cannot be produced by normal stellar fusion (fusion stops at iron). It requires the extreme conditions of a supernova or neutron star merger. By measuring the ratio of uranium to lead in rocks, scientists can determine the age of geological samples (radiometric dating). This is the same principle as carbon-14 dating, but on a much longer timescale.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "When drawing the binding energy per nucleon graph in an exam, what are the key features you must include, and what common mistakes should you avoid? (3 steps)", "answer": "- Step 1: **Must include:** Both axes labelled (y-axis: binding energy per nucleon in MeV, x-axis: nucleon number A). A smooth curve that rises steeply from low A, peaks near A = 56 (iron, ~8.8 MeV/nucleon), and gradually falls for high A. A cross or point marking the anomaly of helium-4 (high for its size). Numerical values on both axes, especially at the peak.\n- Step 2: **Common mistakes to avoid:** Do NOT start the curve at A = 0 — there is no nucleus with zero nucleons. Do NOT draw a straight line — the curve is distinctly asymmetric (steep rise, gradual fall). Do NOT forget to label units. Do NOT draw the curve as a closed loop or have it return to zero at high A — it asymptotically approaches ~7.5 MeV/nucleon.\n- Step 3: **Special features to mark:** The peak at iron-56 (most stable nucleus). The anomaly at helium-4 (and carbon-12, oxygen-16 if space allows). The fission region (heavy nuclei splitting → moving toward peak) and fusion region (light nuclei combining → moving toward peak). These labels show the examiner you understand the physical significance of the graph.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "Why is helium-4 an anomaly on the binding energy per nucleon graph — it has a much higher BE/nucleon than its neighbours like lithium and beryllium? (2 steps)", "answer": "- Step 1: Helium-4 has a particularly stable nuclear structure: 2 protons and 2 neutrons, which completely fill the first nuclear \"shell\" (similar to how 2 electrons fill the first electron shell in atomic physics). This closed-shell configuration is energetically very favourable.\n- Step 2: Carbon-12 and oxygen-16 can be thought of as clusters of 3 and 4 helium-4 nuclei respectively, which also gives them higher BE/nucleon than their immediate neighbours. This clustering effect means the curve has small bumps at A = 4, 12, and 16, rather than being perfectly smooth. Exam questions may ask you to mark the helium-4 anomaly with a cross on the graph.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "A sample has a half-life of 5.1 minutes. After 51 minutes, by what factor has the mass decreased? Do this with mental math. (2 steps)", "answer": "- Step 1: Number of half-lives = 51 ÷ 5.1 = 10 half-lives.\n- Step 2: After 10 half-lives, the remaining fraction is $$(1/2)^{10} = 1/1024$$. So the mass has decreased by a factor of approximately 1000 (more precisely 1024). This shows how powerful exponential decay is — after just 10 half-lives, less than 0.1% of the original sample remains.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Isotope A has t½ = 6 hours and isotope B has t½ = 6000 years. A medical physicist needs a tracer and a geologist needs a dating tool. Which isotope suits each purpose, and why? (2 steps)", "answer": "- Step 1: The medical physicist should choose isotope A (t½ = 6 hours). Medical tracers must emit detectable radiation during the procedure but decay quickly afterward to minimise patient exposure. A 6-hour half-life means the tracer is effectively gone within a day or two.\n- Step 2: The geologist should choose isotope B (t½ = 6000 years). Radiometric dating requires an isotope that decays slowly enough to still be present in measurable quantities after thousands or millions of years. Carbon-14 (t½ ≈ 5730 years) is used for dating organic material up to ~50,000 years old — a short-half-life isotope would have fully decayed long ago and be useless for dating.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Explain the difference between spontaneous fission and induced fission, and give the practical relevance of each. (2 steps)", "answer": "- Step 1: **Spontaneous fission** occurs when a heavy nucleus splits on its own, without any external trigger — similar to radioactive decay but instead of emitting a small particle (α, β, γ), the entire nucleus splits into two large fragments. This is rare and occurs naturally in very heavy isotopes like uranium-238.\n- Step 2: **Induced fission** occurs when a neutron is absorbed by a fissile nucleus (like U-235), making it unstable and causing it to split. This is the process used in nuclear reactors and weapons — by firing neutrons at uranium, we can control (or unleash) the chain reaction. The practical relevance is that induced fission is the basis of all nuclear power generation, while spontaneous fission is too rare and uncontrollable to be useful as an energy source.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In a fission reaction, U-235 absorbs a neutron and splits into Ba-141 and Kr-92 plus 3 neutrons. Check that nucleon number and proton number are both conserved. (U has Z=92, A=235; Ba has Z=56, A=141; Kr has Z=36, A=92) (2 steps)", "answer": "- Step 1: **Nucleon number (A):** Reactants: 235 + 1 = 236. Products: 141 + 92 + 3(1) = 236. ✓ Conserved. The 3 neutrons carry away 3 nucleons, which is why the daughter nuclei don't add up to 235 on their own.\n- Step 2: **Proton number (Z):** Reactants: 92 + 0 = 92. Products: 56 + 36 + 3(0) = 92. ✓ Conserved. Neutrons have zero charge, so they don't affect the proton count. The two daughter elements (barium and krypton) are entirely different elements from uranium — this transmutation is what makes fission fundamentally different from chemical reactions.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "In the proton-proton chain inside stars, two protons fuse to form deuterium plus a positron and neutrino: ¹H + ¹H → ²H + e⁺ + νₑ. Why is a positron produced? (2 steps)", "answer": "- Step 1: Two protons (each with charge +1) cannot simply stick together to form a stable 2-proton nucleus — the Coulomb repulsion would be too strong. For the fusion product to be stable, one of the protons must convert into a neutron, creating deuterium (1 proton + 1 neutron).\n- Step 2: The conversion of a proton into a neutron is beta-plus decay: p → n + e⁺ + νₑ. This conserves charge (the proton's +1 charge becomes the neutron's 0 + the positron's +1) and lepton number (the positron and electron neutrino are created as a particle-antiparticle pair). The positron and neutrino are not \"extra\" — they are necessary byproducts of the proton-to-neutron conversion that makes deuterium stable.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "A common misconception is that \"binding energy is energy stored in the nucleus, waiting to be released.\" Explain why this is wrong using the mass defect concept. (2 steps)", "answer": "- Step 1: If binding energy were \"stored\" in the nucleus, a bound nucleus would have *more* mass than its separated nucleons (because more energy = more mass via E = mc²). But the opposite is true — a bound nucleus always has *less* mass than its separated nucleons. The mass defect is positive, meaning mass was *lost* when the nucleus formed.\n- Step 2: The correct picture: binding energy is the energy that was *already released* when the nucleus formed (or equivalently, the energy you must *put back in* to break it apart). The nucleus is in a *lower* energy state than the separated nucleons — that's why it's stable. You don't get energy out by pulling it apart; you have to put energy in. Energy is released when nucleons *come together*, not when the nucleus is broken.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Why is nuclear fusion considered a potentially better energy source than fission, even though both release energy? (3 steps)", "answer": "- Step 1: **Fuel abundance:** Fusion uses deuterium and tritium (isotopes of hydrogen), which are abundant in seawater. Fission uses uranium and plutonium, which are finite and must be mined.\n- Step 2: **Waste products:** Fusion produces helium (harmless) and neutrons. Fission produces highly radioactive daughter nuclei that remain dangerous for thousands of years and require long-term storage.\n- Step 3: **Safety:** A fusion reaction requires extreme temperature and pressure to sustain. If conditions fail, the reaction simply stops — no meltdown risk. A fission reactor can undergo runaway chain reactions (as at Chernobyl). However, fusion is extremely difficult to achieve on Earth because of the enormous temperatures needed to overcome Coulomb repulsion — this is why we don't yet have practical fusion power plants.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "A student says: \"Fission releases energy because heavy nuclei are unstable, and fusion releases energy because light nuclei are unstable.\" This is partially correct but misses the deeper unifying principle. What is it? (2 steps)", "answer": "- Step 1: The deeper principle is that both processes release energy because they move nuclei *toward higher binding energy per nucleon* — i.e., toward greater stability. The binding energy per nucleon curve is the unifying picture: fission climbs the curve from the right, fusion climbs it from the left.\n- Step 2: Saying \"heavy nuclei are unstable\" or \"light nuclei are unstable\" is directionally correct but incomplete. What matters is not just that the starting nuclei have low BE/nucleon, but that the *products* have higher BE/nucleon. The energy released equals the *increase* in total binding energy. If you tried to split a medium-mass nucleus (near the peak) or fuse two medium-mass nuclei, you'd move *away* from the peak and energy would be *absorbed*, not released. The direction of motion on the curve is what determines whether energy is released.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A sample of strontium-90 has a decay constant of 0.025 year⁻¹. After 5 years, by roughly what fraction has the activity decreased? (2 steps)", "answer": "- Step 1: Use the exponential decay equation for activity: $$A = A_0 e^{-\\lambda t} = A_0 e^{-0.025 \\times 5} = A_0 e^{-0.125}$$.\n- Step 2: $$e^{-0.125} \\approx 0.882$$, so the remaining activity is about 88% of the original. The activity has decreased by roughly 12%. This is a small decrease because 5 years is much less than the half-life (t½ = ln2/0.025 ≈ 27.7 years). The exponential equation is essential here because the number of half-lives is not a whole number.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Carbon-14 has a half-life of 5730 years. Calculate its decay constant in s⁻¹, and explain why the number is so small. (3 steps)", "answer": "- Step 1: Use $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. First convert t½ to seconds: $$5730 \\times 365 \\times 24 \\times 60 \\times 60 \\approx 1.81 \\times 10^{11}$$ s.\n- Step 2: $$\\lambda = \\frac{0.693}{1.81 \\times 10^{11}} \\approx 3.83 \\times 10^{-12}$$ s⁻¹.\n- Step 3: The number is extremely small because each carbon-14 nucleus has only a tiny probability of decaying in any given second. On average, a carbon-14 nucleus will survive for thousands of years before decaying. This is why carbon-14 dating works for archaeological timescales — the isotope is still present in measurable quantities in organic material that is thousands of years old.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "A nucleus has Z = 26 protons and A = 56 nucleons. If the mass of the nucleus is 9.288 × 10⁻²⁶ kg, outline the conceptual steps to find the binding energy per nucleon (no heavy calculation required). (4 steps)", "answer": "- Step 1: Calculate the mass defect: $$\\Delta m = Zm_p + (A-Z)m_n - m_{total}$$. With Z = 26 protons and 30 neutrons, sum the individual masses of 26 protons and 30 neutrons, then subtract the measured nuclear mass. This gives a small positive Δm.\n- Step 2: Convert the mass defect to binding energy using $$\\Delta E = \\Delta m \\times c^2$$. This gives the total binding energy in joules.\n- Step 3: Divide the total binding energy by the nucleon number A = 56 to get the binding energy *per nucleon* in joules.\n- Step 4: Convert to MeV by dividing by $$1.6 \\times 10^{-13}$$ J/MeV. For iron-56, this gives approximately 8.8 MeV/nucleon — the highest of any nucleus, confirming iron as the most stable. Alternatively, convert Δm from kg to u first, then multiply by 931.5 MeV per u to skip the c² calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "You measure a radioactive sample's activity at 320 Bq. After one half-life passes, the activity is 160 Bq. After *another* half-life, is the activity 0 Bq? Why or why not? (2 steps)", "answer": "- Step 1: No, the activity is not 0 Bq after two half-lives. After the second half-life, the activity halves again: 160 → 80 Bq. The activity never reaches zero — exponential decay is asymptotic.\n- Step 2: This is a fundamental property of exponential decay: after each half-life, the quantity halves but never reaches zero. After n half-lives, the remaining fraction is $$(1/2)^n$$, which gets extremely small but is never exactly zero. Mathematically, $$e^{-\\lambda t}$$ only equals zero when t = ∞. In practice, after many half-lives the activity becomes indistinguishable from background radiation, but it never truly vanishes.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Why can't we use the simple \"halving\" method (divide by 2 repeatedly) when the elapsed time is not a whole number of half-lives? What equation must we use instead? (2 steps)", "answer": "- Step 1: The halving method only works for integer numbers of half-lives because it relies on the formula $$N = N_0 \\times (1/2)^n$$ where n is a whole number. If the elapsed time is, say, 2.7 half-lives, you can't simply halve 2.7 times using a table.\n- Step 2: For non-integer numbers of half-lives, use the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ (or equivalently $$N = N_0 \\times (1/2)^{t/t_{1/2}}$$, where the exponent can be any real number). This works for any time value. You can also use logarithms: if you know N and N₀, solve for t using $$t = \\frac{-\\ln(N/N_0)}{\\lambda}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A student claims: \"A bound nucleus has less mass than its parts, so energy must be *added* to form a nucleus.\" Is this reasoning correct? Explain the error. (2 steps)", "answer": "- Step 1: The reasoning is incorrect. The student is confusing the direction of energy flow. A bound nucleus has less mass than its separated parts precisely because energy was *released* (not added) when the nucleus formed. The lost mass is equivalent to the energy that left the system.\n- Step 2: The correct logic: when nucleons combine to form a nucleus, binding energy is *released* (the process is exothermic). By $$E = mc^2$$, releasing energy means losing mass. To *break apart* the nucleus (reverse the process), you must *add* energy equal to the binding energy — this is endothermic. The student has the direction backwards: energy comes *out* when the nucleus forms, energy goes *in* when it breaks.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "A fission reaction releases about 200 MeV per event. A fusion reaction (D-T) releases about 17.6 MeV per event. Yet fusion releases *more energy per kilogram of fuel* than fission. Explain this apparent contradiction. (2 steps)", "answer": "- Step 1: The key is *per event* vs. *per kilogram*. A single fission event involves a uranium-235 nucleus (mass ≈ 235 u), releasing 200 MeV. A single fusion event involves a deuterium and tritium nucleus (combined mass ≈ 5 u), releasing 17.6 MeV.\n- Step 2: Energy per unit mass: fission gives roughly 200/235 ≈ 0.85 MeV/u. Fusion gives roughly 17.6/5 ≈ 3.5 MeV/u. Fusion releases about 4 times more energy per unit mass because light nuclei are on the steep part of the BE/nucleon curve — a small change in nucleon number produces a large change in binding energy per nucleon. This is why fusion is such a powerful energy source in stars.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "If you need to convert 2.5 MeV into joules, what operation do you perform? If you need to convert $$3.0 \\times 10^{-12}$$ J into MeV, what operation do you perform? (2 steps)", "answer": "- Step 1: To convert MeV to joules, *multiply* by $$1.6 \\times 10^{-13}$$: $$2.5 \\text{ MeV} = 2.5 \\times 1.6 \\times 10^{-13} = 4.0 \\times 10^{-13}$$ J. (Since 1 MeV = $$1.6 \\times 10^{-13}$$ J.)\n- Step 2: To convert joules to MeV, *divide* by $$1.6 \\times 10^{-13}$$: $$\\frac{3.0 \\times 10^{-12}}{1.6 \\times 10^{-13}} = \\frac{30}{1.6} \\times 10^{1} \\approx 18.75$$ MeV. A quick sanity check: 1 MeV is a very small amount of energy in everyday terms, but significant at the nuclear scale. Nuclear energies are typically in the MeV range, while atomic/electron energies are in the eV to keV range.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "The formula for mass defect is Δm = Zmₚ + (A−Z)mₙ − m_total. Explain what each term represents and why the result is always positive for a bound nucleus. (3 steps)", "answer": "- Step 1: $$Zm_p$$ is the total mass of Z individual protons. $$(A-Z)m_n$$ is the total mass of the neutrons. $$m_{total}$$ is the measured mass of the *bound* nucleus. The first two terms together represent the mass of all the nucleons if they were completely separated.\n- Step 2: The subtraction gives the difference between \"what you'd expect the nucleus to weigh\" (sum of parts) and \"what it actually weighs\" (measured mass). For a bound nucleus, the actual mass is always *less* than the sum of the parts.\n- Step 3: The result is always positive because energy was released when the nucleus formed — the \"missing mass\" corresponds to this released binding energy. If Δm were negative (nucleus heavier than its parts), it would mean energy was absorbed during formation, which would make the nucleus unstable and it would spontaneously disintegrate. Only bound (stable) nuclei have positive mass defects.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "A student tries to find the half-life from a decay graph and draws a horizontal line from N = N₀/2 to the curve, then down to the time axis. Another student draws a horizontal line from N = N₀/4 to the curve, then down, and subtracts the time at N₀/2. Do both methods give the same half-life? Why? (2 steps)", "answer": "- Step 1: Yes, both methods give the same half-life because the time between N₀ and N₀/2 is the same as the time between N₀/2 and N₀/4. In exponential decay, the half-life is constant — it doesn't depend on when you start measuring.\n- Step 2: The second student is measuring the time for the activity to halve *from any starting point*, not just from N₀. This is actually a more robust method because it doesn't rely on knowing the exact initial value. You could measure the time for the count rate to drop from any value to half that value, and it will always equal one half-life. This is a defining property of exponential decay.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "In the binding energy per nucleon graph, the curve for light nuclei (A < 20) rises steeply, while for heavy nuclei (A > 60) it falls gradually. If you had to estimate the energy released by fusing two nuclei vs. fissioning one nucleus of comparable mass, which would release more energy and why? (2 steps)", "answer": "- Step 1: Fusion of light nuclei releases more energy *per nucleon* because the left side of the curve is steeper than the right side. Moving from A ≈ 2 to A ≈ 4 (fusion) involves a huge jump in BE/nucleon (from ~1.1 to ~7.1 MeV), while moving from A ≈ 235 to A ≈ 117 (fission) involves a much smaller change in BE/nucleon (from ~7.6 to ~8.5 MeV).\n- Step 2: Per individual reaction, fission releases more total energy (200 MeV vs. 17.6 MeV) because many more nucleons are involved. But per unit mass, fusion is more energy-dense because the fractional change in BE/nucleon is larger. This is why the Sun, powered by fusion, is so phenomenally energetic despite using the lightest elements as fuel.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A sample of fermium-253 (t½ = 3 days) starts with 5672 nuclei. After 6 days, roughly how many remain? Do this using the \"magic table\" approach. (2 steps)", "answer": "- Step 1: Build the table:\n| Half-lives | Time (days) | Nuclei remaining |\n|---|---|---|\n| 0 | 0 | 5672 |\n| 1 | 3 | 2836 |\n| 2 | 6 | 1418 |\n- Step 2: After 2 half-lives (6 days), approximately 1418 nuclei remain. The table method works by starting at 0 half-lives and 0 time, then adding one half-life to the time and halving the nuclei count for each row. This avoids formula errors and makes it easy to see the pattern. For whole numbers of half-lives, this is the most reliable method.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Explain why alpha particles are the most ionising type of radiation, using the concepts of charge and mass. (2 steps)", "answer": "- Step 1: Ionisation occurs when radiation removes electrons from atoms. An alpha particle has a charge of +2e (twice that of a beta particle at −1e) and a relatively large mass (4 u, compared to ~0.00055 u for a beta particle). The large positive charge creates a strong electric field that exerts a large force on nearby electrons, pulling them away from their atoms.\n- Step 2: The large mass means the alpha particle moves more slowly (at typical energies) and spends more time near each atom it passes, giving it more opportunity to interact with and remove electrons. This combination of strong charge and slow, heavy passage makes alpha particles excellent at ionising — but also means they lose energy quickly and can be stopped by just a sheet of paper or skin.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Background radiation is always present. Name two natural sources and one man-made source, and explain why background radiation must be accounted for in half-life experiments. (2 steps)", "answer": "- Step 1: **Natural sources:** Radon gas released from rocks (an alpha emitter, dangerous if inhaled) and cosmic rays from space (high-energy protons from the sun that produce gamma radiation in the atmosphere). **Man-made source:** Medical procedures (X-rays, radioactive tracers) or nuclear fallout from weapons testing.\n- Step 2: Background radiation must be subtracted because it adds a constant count rate that is unrelated to the radioactive source being studied. Without correction, the measured count rate never drops to zero — it plateaus at the background level. This distorts the exponential decay curve and leads to an incorrect half-life. Always measure the background rate (with no source) first, then subtract it from all subsequent readings.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A student sees that a half-life graph of count rate vs. time levels off at about 20 counts per minute instead of approaching zero. What should the student conclude, and how should they correct their data? (2 steps)", "answer": "- Step 1: The student should conclude that the levelling-off at 20 counts per minute is due to background radiation. The source's radiation has decayed to negligible levels, and only background radiation remains detectable.\n- Step 2: To correct the data, the student should subtract 20 from all measured count rates (the corrected count rate). For example, if the initial measured rate was 120 counts/min, the corrected initial rate is 100 counts/min. The half-life should then be found from the corrected data: the time for the corrected rate to drop from 100 to 50 counts/min, not from 120 to 60.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}], "count": 56}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is the concept of half-life defined as the time taken for half the nuclei in a sample to decay, rather than a different fraction like one-third or one-fourth? (2 steps)", "answer": "- Step 1: **Statistical predictability**  \nThe half-life concept emerges from the exponential decay law. For a large sample, the time taken for *exactly half* the nuclei to decay is consistent across successive intervals, creating a stable measure.  \n- Step 2: **Mathematical foundation**  \nThe decay equation $ N = N_0 e^{-\\lambda t} $ leads to $ t_{1/2} = \\ln 2 / \\lambda $. The factor of $ \\ln 2 $ arises naturally from solving when $ N = N_0/2 $, making half-life a mathematically elegant choice.\n\n[Optional: The consistency of half-life, unlike other fractions, makes it a reliable metric for characterizing radioactive sources.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "The decay constant λ represents the probability per unit time that a nucleus will decay. Explain why λ is unaffected by external conditions (temperature, pressure, etc.) despite influencing the rate of decay. (3 steps)", "answer": "- Step 1: **Quantum tunneling mechanism**  \nNuclear decay relies on quantum tunneling through the nuclear binding potential, governed by fundamental forces (strong/weak) that are independent of classical environmental factors.  \n- Step 2: **No activation energy**  \nUnlike chemical reactions, decay doesn't require thermal energy to overcome an activation barrier. The nucleus is inherently unstable, decaying based on internal quantum probabilities.  \n- Step 3: **Empirical evidence**  \nExperiments confirm that decay constants remain unchanged under extreme conditions (e.g., deep Earth, high-altitude cosmic rays), validating their independence from external factors.  \n+ Example: Uranium-238 in a nuclear reactor vs. in a lab decays at the same rate.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "Derive the formula $ t_{1/2} = \\ln 2 / \\lambda $ starting from the exponential decay law $ N = N_0 e^{-\\lambda t} $. (3 steps)", "answer": "- Step 1: **Set up the equation for half-life**  \nAt $ t = t_{1/2} $, $ N = N_0/2 $. Substitute into the decay equation:  \n$$ \\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}} $$  \n- Step 2: **Simplify the equation**  \nCancel $ N_0 $:  \n$$ \\frac{1}{2} = e^{-\\lambda t_{1/2}} $$  \nTake natural logarithm of both sides:  \n$$ \\ln(1/2) = -\\lambda t_{1/2} $$  \n- Step 3: **Solve for half-life**  \n$$ \\ln(1/2) = -\\ln 2 \\Rightarrow -\\ln 2 = -\\lambda t_{1/2} \\Rightarrow t_{1/2} = \\frac{\\ln 2}{\\lambda} $$  \n+ Note: This derivation shows the inverse relationship between half-life and decay constant.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A sample’s activity is 800 Bq with a half-life of 20 minutes. What is the activity after 1 hour? Explain using the concept of half-lives rather than formulas. (2 steps)", "answer": "- Step 1: **Determine the number of half-lives**  \n1 hour = 60 minutes. $ 60 / 20 = 3 $ half-lives.  \n- Step 2: **Calculate the activity**  \nEach half-life reduces activity by 50%. After 3 half-lives:  \n$$ 800 \\rightarrow 400 \\rightarrow 200 \\rightarrow 100 \\, \\text{Bq} $$  \n+ Key intuition: Activity halves repeatedly; this is why exponential decay is called \"half-life.\"", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is gamma radiation the most penetrating, while alpha is the least? Explain using the properties of the particles. (2 steps)", "answer": "- Step 1: **Charge and mass**  \nAlpha particles have a large charge (+2) and mass (4u), leading to strong ionization but short range (easily stopped by skin/paper). Gamma photons have no charge and no rest mass, interacting weakly.  \n- Step 2: **Interaction mechanisms**  \nAlpha and beta particles lose energy via Coulomb interactions with electrons. Gamma radiation requires high-Z materials (like lead) to interact via the photoelectric effect or Compton scattering.  \n+ Example: A gamma photon can traverse meters of air, while alpha stops in centimeters.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "In nuclear fission, why is energy released when a heavy nucleus like U-235 splits into smaller nuclei? Use the binding energy per nucleon curve. (2 steps)", "answer": "- Step 1: **Binding energy per nucleon**  \nThe curve peaks near iron-56. Heavy nuclei (right side) have lower binding energy per nucleon than medium-mass nuclei.  \n- Step 2: **Energy difference**  \nSplitting U-235 into Kr-92 and Ba-141 moves to a higher binding energy per nucleon. The higher binding energy corresponds to lower mass per nucleon, with the mass difference converted to energy via $ \\Delta E = \\Delta m c^2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures and pressures? Address both Coulomb repulsion and quantum tunneling. (3 steps)", "answer": "- Step 1: **Coulomb repulsion**  \nProtons repel due to their positive charges. High temperatures provide kinetic energy to overcome this repulsion.  \n- Step 2: **Quantum tunneling**  \nEven with sufficient kinetic energy, fusion relies on quantum tunneling to allow nuclei to approach within the 1-10 femtometer range of the strong nuclear force.  \n- Step 3: **Pressure for collision frequency**  \nHigh pressure increases collision frequency, ensuring enough nuclei reach the required proximity for tunneling.  \n+ Example: Stellar cores (e.g., the Sun’s 15 million K) provide these conditions.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "The mass defect of a helium-4 nucleus is 0.03 u. Calculate its binding energy in MeV and explain why this mass difference corresponds to energy. (2 steps)", "answer": "- Step 1: **Convert mass defect to energy**  \n$$ 0.03 \\, \\text{u} \\times 931.5 \\, \\text{MeV/c}^2 \\text{ per u} = 27.9 \\, \\text{MeV} $$  \n- Step 2: **Mass-energy equivalence**  \nBinding energy arises from Einstein’s $ E = \\Delta m c^2 $. The mass defect represents the mass converted into binding energy when nucleons combine.  \n+ Note: The bound nucleus has *less* mass than its constituents, not more.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does the binding energy per nucleon curve peak near iron-56? Relate this to the balance of forces in the nucleus. (3 steps)", "answer": "- Step 1: **Strong nuclear force vs. electrostatic repulsion**  \nThe strong force binds nucleons but has a short range. At small sizes, it dominates. At larger sizes (heavy nuclei), electrostatic repulsion between protons reduces net binding.  \n- Step 2: **Optimal nucleon spacing**  \nIron-56 represents the equilibrium where the strong nuclear force is maximized per nucleon. Heavier nuclei have more protons, increasing Coulomb repulsion and lowering binding energy.  \n- Step 3: **Energy release mechanisms**  \nFission (heavy → medium nuclei) and fusion (light → heavier) both move toward iron-56 on the curve, releasing energy.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "A student claims that nuclear fission and fusion both create energy from nucleus splitting. Identify and correct this misconception. (2 steps)", "answer": "- Step 1: **Fission vs. fusion definitions**  \nFission splits heavy nuclei (e.g., U-235 → Kr + Ba + neutrons). Fusion combines light nuclei (e.g., H-2 + H-3 → He-4 + neutron).  \n- Step 2: **Energy source**  \nBoth release energy due to higher binding energy per nucleon in products. Fission releases energy by moving from the *right* of the binding energy curve toward the peak. Fusion releases energy by moving from the *left* toward the peak.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Explain why the binding energy of a nucleus is equivalent to the energy that must be *added* to break it apart, not the energy stored within it. (2 steps)", "answer": "- Step 1: **Energy and mass equivalence**  \nA bound nucleus has less mass than its separate nucleons. This mass deficit corresponds to the energy *removed* during formation.  \n- Step 2: **Energy conservation**  \nTo break the nucleus, you must *replace* the binding energy. Binding energy is the minimum energy required to disassemble the nucleus, not energy stored in it.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why is background radiation subtracted in half-life experiments? (1 step)", "answer": "- Step 1: **Signal from the source**  \nBackground radiation (cosmic rays, environmental isotopes) contributes to the measured count rate. Subtracting this isolates the source’s activity, ensuring accurate half-life determination.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Calculate the decay constant λ for carbon-14 (t½ = 5730 years) in s⁻¹. Show why the calculation requires converting years to seconds. (3 steps)", "answer": "- Step 1: **Use the half-life formula**  \n$$ \\lambda = \\ln 2 / t_{1/2} $$  \n- Step 2: **Convert half-life to seconds**  \n$$ 5730 \\, \\text{years} \\times 3.156 \\times 10^7 \\, \\text{s/year} = 1.807 \\times 10^{11} \\, \\text{s} $$  \n- Step 3: **Compute λ**  \n$$ \\lambda = 0.693 / (1.807 \\times 10^{11}) \\approx 3.83 \\times 10^{-12} \\, \\text{s}^{-1} $$  \n+ Unit conversion is critical for λ to align with SI units (seconds).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "A nuclear reaction releases 200 MeV per fission. Explain why this energy is orders of magnitude higher than chemical reactions (e.g., combustion). (2 steps)", "answer": "- Step 1: **Energy scales**  \nNuclear binding energy per nucleon (~MeV) dwarfs chemical bond energies (~eV). 200 MeV ≈ 3.2 × 10⁻¹¹ J per fission.  \n- Step 2: **Mass defect comparison**  \nNuclear reactions convert ~0.1% of mass to energy via $ E = \\Delta m c^2 $. Chemical reactions involve electron rearrangements, which have negligible mass changes.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does the binding energy per nucleon curve have a peak near iron-56, and what does this imply for stellar nucleosynthesis? (2 steps)", "answer": "- Step 1: **Force balance**  \nThe peak represents the optimal balance between the attractive strong nuclear force (dominant at short distances) and repulsive Coulomb force (dominant in heavy nuclei).  \n- Step 2: **Stellar implications**  \nStars can only *produce* energy via fusion (light nuclei to iron) or fission (heavy nuclei to iron). Beyond iron, energy input is required (endothermic), halting fusion and leading to supernovae for heavier elements.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Define mass defect and explain why a helium-4 nucleus has a larger mass defect per nucleon than a uranium-235 nucleus. (3 steps)", "answer": "- Step 1: **Mass defect definition**  \nDifference between the sum of individual nucleons’ masses and the actual nucleus mass:  \n$$ \\Delta m = Z m_p + (A-Z) m_n - m_{\\text{nucleus}} $$  \n- Step 2: **He-4 vs. U-235**  \nHe-4 has a high binding energy per nucleon (7 MeV) compared to U-235 (7.6 MeV). Wait—this contradicts?  \n+ Correction: U-235 has lower binding energy per nucleon (≈7.6 MeV) than Fe-56 (≈8.8 MeV). He-4 (≈7 MeV) is less stable than Fe-56.  \n- Step 3: **Nuclear stability**  \nThe mass defect per nucleon scales with binding energy. He-4 is stable but less so than Fe-56. U-235 has a lower defect per nucleon, explaining why fission releases energy.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "A student argues that a shorter half-life means a nucleus is more stable. Is this correct? Explain using the decay constant. (2 steps)", "answer": "- Step 1: **Half-life vs. decay constant**  \nShorter half-life corresponds to a larger decay constant (λ ∝ 1/t½). A larger λ means higher probability of decay → *less* stability.  \n- Step 2: **Physical intuition**  \nStable nuclei have small λ (long t½). Unstable isotopes (e.g., tritium) decay rapidly. Stability is inversely related to decay probability.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "In a nuclear reactor, why are control rods and moderators necessary? Contrast their roles in sustaining a chain reaction. (2 steps)", "answer": "- Step 1: **Moderator function**  \nSlows fast neutrons released in fission to thermal speeds, increasing the likelihood of sustained chain reactions (e.g., water or graphite moderators).  \n- Step 2: **Control rods**  \nAbsorb excess neutrons to regulate the reaction rate. Without them, a supercritical chain reaction (uncontrolled release) would occur, as in a nuclear bomb.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Explain why the binding energy per nucleon curve peaks near A=56 (iron) using the liquid drop model. (3 steps)", "answer": "- Step 1: **Volume and surface terms**  \nThe liquid drop model accounts for binding energy via volume (proportional to A) and surface (proportional to A²⁄³) effects.  \n- Step 2: **Coulomb repulsion**  \nFor large A, the repulsive Coulomb energy $ \\propto Z^2 / A^{1/3} $ dominates, reducing binding energy per nucleon.  \n- Step 3: **Optimization**  \nIron-56 balances volume, surface, and Coulomb terms, maximizing binding energy per nucleon. Heavier nuclei have lower values due to Coulomb dominance.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "A sample of radioactive xenon-133 has a half-life of 5.2 days. After 20.8 days, what fraction of the sample remains? Use the concept of half-lives. (2 steps)", "answer": "- Step 1: **Number of half-lives**  \n$$ 20.8 \\, \\text{days} / 5.2 \\, \\text{days} = 4 \\, \\text{half-lives} $$  \n- Step 2: **Fraction remaining**  \n$$ (1/2)^4 = 1/16 \\, \\text{or} \\, 0.0625 \\, (6.25\\%) $$  \n+ Visual intuition: Each half-life reduces the sample by 50%.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "What is the significance of the binding energy per nucleon curve for nuclear energy applications? Contrast fission and fusion in this context. (2 steps)", "answer": "- Step 1: **Fission**  \nHeavy nuclei (e.g., U-235) fission into products closer to the curve’s peak (Fe-56), releasing energy.  \n- Step 2: **Fusion**  \nLight nuclei (e.g., H-2 and H-3) fuse to form He-4, moving toward the peak from the left and releasing energy.  \n+ Both processes exploit the curve’s shape to yield energy.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "Why is the mass defect of a nucleus a positive value, and how does this relate to the stability of the nucleus? (2 steps)", "answer": "- Step 1: **Mass conservation**  \nThe mass of a nucleus is *less* than its constituent nucleons. The defect is the difference, representing energy released during formation.  \n- Step 2: **Stability**  \nLarger mass defect = higher binding energy (via $ E = \\Delta m c^2 $) = greater stability. Iron-56 has the highest binding energy per nucleon and thus the largest mass defect per nucleon.", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "A student measures count rates from a radioactive sample over time and observes fluctuations even after subtracting background. Explain this using the random nature of decay. (2 steps)", "answer": "- Step 1: **Statistical uncertainty**  \nRadioactive decay is a Poisson process. Fluctuations in count rates reflect the inherent randomness of decay events in any finite time interval.  \n- Step 2: **Large sample vs. individual nuclei**  \nWhile the half-life describes the average behavior of a large sample, individual decays are unpredictable. The fluctuations decrease as $ \\sqrt{N} / N $, so larger samples have smoother decay curves.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "Calculate the energy released in a fusion reaction where the mass defect is 0.028 u. Why is this energy orders of magnitude larger than chemical reactions? (2 steps)", "answer": "- Step 1: **Energy conversion**  \n$$ 0.028 \\, \\text{u} \\times 931.5 \\, \\text{MeV/u} ≈ 26.1 \\, \\text{MeV} $$  \n- Step 2: **Nuclear vs. chemical energy**  \nNuclear processes involve mass conversions at ~0.1% of the mass, while chemical reactions (eV-scale) involve negligible mass changes. Nuclear energy density is ~10⁶ times greater.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "In the binding energy per nucleon graph, why do light nuclei (A < 20) have lower binding energy per nucleon compared to medium-mass nuclei? (2 steps)", "answer": "- Step 1: **Surface effects**  \nIn small nuclei, a higher fraction of nucleons are on the surface, experiencing fewer nuclear bonds. This reduces the binding energy per nucleon.  \n- Step 2: **Volume term dominance**  \nThe binding energy scales with the number of nucleons (volume term) but surface effects (proportional to A²⁄³) are more significant for smaller A.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "Why is the binding energy per nucleon of helium-4 (alpha particle) higher than adjacent light nuclei, creating a local maximum (e.g., at A=4, 8, 12)? (2 steps)", "answer": "- Step 1: **Nuclear shell structure**  \nHelium-4 has a filled shell configuration (2 protons, 2 neutrons), akin to noble gas electron shells, enhancing stability.  \n- Step 2: **Alpha clustering in heavier nuclei**  \nCarbon-12 and oxygen-16 can be viewed as combinations of alpha particles, explaining their higher stability compared to neighboring isotopes.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "A sample’s activity is measured as 800 Bq. After 3 half-lives, it decays to 100 Bq. Confirm this using the equation $ A = A_0 e^{-\\lambda t} $ and the relation $ \\lambda t_{1/2} = \\ln 2 $. (3 steps)", "answer": "- Step 1: **Relate time to half-lives**  \nFor 3 half-lives, $ t = 3 t_{1/2} $.  \n- Step 2: **Substitute into activity equation**  \n$$ A = 800 e^{-\\lambda (3 t_{1/2})} $$  \nUse $ \\lambda = \\ln 2 / t_{1/2} $:  \n$$ A = 800 e^{-(\\ln 2 / t_{1/2}) \\times 3 t_{1/2}}} = 800 e^{-3 \\ln 2} = 800 \\times (1/2)^3 = 100 \\, \\text{Bq} $$  \n- Step 3: **Conclusion**  \nThe formula confirms that each half-life reduces activity by 50%, so 3 half-lives → 1/8th activity.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": true}, {"question": "Why is nuclear fusion considered a potential energy source with higher energy density than fission, despite releasing less energy per reaction? Use the binding energy per nucleon curve. (2 steps)", "answer": "- Step 1: **Energy per unit mass**  \nFusion (e.g., H-2 + H-3 → He-4 + n) involves lighter nuclei. For equal mass, fusion releases ~3-4× more energy than fission.  \n- Step 2: **Fuel abundance**  \nHydrogen isotopes are vastly more abundant than heavy nuclei like U-235, making fusion’s fuel supply more sustainable.", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "Define critical mass in the context of nuclear fission. Why is it necessary for a sustained chain reaction? (2 steps)", "answer": "- Step 1: **Neutron absorption vs. escape**  \nCritical mass minimizes the loss of neutrons to escape, ensuring at least one neutron per fission triggers another.  \n- Step 2: **Geometry and neutron moderation**  \nSpherical geometry and moderators (water/slows neutrons) increase the likelihood of sustaining the chain reaction. Subcritical masses lose neutrons too quickly for a chain reaction.", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "A student claims that gamma rays are more ionizing than alpha particles because they have higher energy. Refute this using the interaction mechanisms of radiation with matter. (2 steps)", "answer": "- Step 1: **Ionization vs. penetration**  \nAlpha particles (heavy, +2 charge) ionize many atoms per unit distance (10⁴ ionizations/mm in air). Gamma photons interact weakly (photoelectric effect, Compton scattering), ionizing fewer atoms.  \n- Step 2: **Energy distribution**  \nGamma photons may carry high energy, but they transfer it gradually over a long path, while alpha deposits energy densely in a short range.", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}], "count": 30}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define half-life (t½) and explain why it is constant for a given isotope. (3 steps)", "answer": "- Step 1: Half-life is the time taken for half the radioactive nuclei in a sample to decay (or for the activity to halve).  \n- Step 2: It reflects the inherent decay probability of nuclei, quantified by the decay constant (λ), which is fixed for a given isotope.  \n- Step 3: Since λ is unaffected by external factors (temperature, pressure, chemical state), the half-life remains constant. This is because the decay is a probabilistic process governed by quantum mechanics.  \n\n[Takeaway: Half-life is a statistical measure of decay probability, not influenced by external conditions.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How does the random nature of nuclear decay manifest, and what is its implication for predicting decay events? (3 steps)", "answer": "- Step 1: Nuclear decay is inherently probabilistic—no way to predict when an individual nucleus will decay.  \n- Step 2: For large samples, decay follows exponential statistics, allowing prediction of average behavior (e.g., half-life).  \n- Step 3: Small samples show stochastic fluctuations (e.g., uneven Geiger counter clicks), but large samples smooth these, enabling deterministic models.  \n\n[Takeaway: Decay is random for individual nuclei but predictable statistically.]", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does the binding-energy-per-nucleon curve peak near iron-56, and how does this relate to energy release in fission and fusion? (4 steps)", "answer": "- Step 1: Nuclei near iron-56 are most stable per nucleon, balancing strong nuclear force and Coulomb repulsion.  \n- Step 2: Heavy nuclei (e.g., U-235) have lower BE/nucleon due to Coulomb repulsion overpowering nuclear attraction. Fission splits them into more stable fragments, releasing energy.  \n- Step 3: Light nuclei (e.g., H-2 and H-3) have low BE/nucleon due to insufficient nuclear force. Fusion combines them into heavier, more stable nuclei, releasing energy.  \n- Step 4: Energy released = (mass of reactants - mass of products) × c². Fission moves right→left on the curve; fusion moves left→right, both reaching higher BE/nucleon.  \n\n[Takeaway: The peak at iron-56 explains why fission (heavy nuclei) and fusion (light nuclei) release energy.]", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Derive the relationship between half-life (t½) and decay constant (λ): t½ = ln2 / λ. (3 steps)", "answer": "- Step 1: Start with the exponential decay formula: N(t) = N₀e^(-λt).  \n- Step 2: At t = t½, N(t) = ½N₀. Substitute into the formula: ½N₀ = N₀e^(-λt½).  \n- Step 3: Simplify: ½ = e^(-λt½) → ln(½) = -λt½ → ln2 = λt½ → t½ = 0.693 / λ.  \n\n[Takeaway: The inverse proportionality between t½ and λ reflects that higher decay constants correspond to faster decay rates.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the binding energy per nucleon (BE/nucleon) used to compare nuclear stability instead of total binding energy? (2 steps)", "answer": "- Step 1: Total binding energy increases with nucleon number, but BE/nucleon shows *stability per nucleon*.  \n- Step 2: Peaks near iron-56 indicate maximum stability. For energy release:  \n  + Fission: Heavy nuclei (BE/nucleon < Fe-56) split into fragments with higher BE/nucleon.  \n  + Fusion: Light nuclei (BE/nucleon < Fe-56) combine to form nuclei with higher BE/nucleon.  \n\n[Takeaway: Normalizing by nucleon count reveals the \"stability cliff\" that drives fission and fusion.]", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does the atomic mass unit (u) relate to energy via E = Δmc²? Calculate the energy equivalent of 1 u in MeV. (3 steps)", "answer": "- Step 1: 1 u = 1.661 × 10⁻²⁷ kg. Use E = mc² to convert mass to energy.  \n- Step 2: E = (1.661 × 10⁻²⁷ kg) × (3 × 10⁸ m/s)² = 1.4949 × 10⁻¹⁰ J.  \n- Step 3: Convert J to MeV: 1 eV = 1.6 × 10⁻¹⁹ J → 1 u ≈ 931.5 MeV/c².  \n\n[Takeaway: 1 u ≈ 931.5 MeV/c² bridges atomic mass units and nuclear energy scales.]", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why do nuclear fission and fusion both release energy despite being opposite processes? (3 steps)", "answer": "- Step 1: Both processes move nuclei toward the peak of the BE/nucleon curve (iron-56).  \n- Step 2: Fission: Heavy nuclei (e.g., U-235) → two medium-mass nuclei (higher BE/nucleon).  \n- Step 3: Fusion: Light nuclei (e.g., H-2 and H-3) → heavier nucleus (e.g., He-4, higher BE/nucleon). In both, mass defect increases, releasing energy.  \n\n[Takeaway: Energy release stems from climbing the BE/nucleon curve toward iron-56.]", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the role of the mass defect in nuclear binding energy calculations? (2 steps)", "answer": "- Step 1: Mass defect (Δm) = (Z·m_p + (A−Z)·m_n) − m_total.  \n- Step 2: Binding energy: ΔE = Δm·c². This energy is required to disassemble the nucleus or released when it forms.  \n\n[Takeaway: Mass defect quantifies the energy locked in the nucleus via mass-energy equivalence.]", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does a critical mass of fissile material (e.g., U-235) trigger a chain reaction in nuclear fission? (3 steps)", "answer": "- Step 1: Fission releases 2–3 neutrons per event. Critical mass ensures neutrons are absorbed by other nuclei (≠ escape/absorption in non-fuel materials).  \n- Step 2: Neutron moderation slows neutrons to increase absorption probability. Control rods absorb excess neutrons to regulate the reaction.  \n- Step 3: Supercritical mass leads to exponential neutron growth (e.g., nuclear bombs), while subcritical mass dies out (e.g., reactor fuel).  \n\n[Takeaway: Critical mass balances neutron production and loss to sustain a chain reaction.]", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why nuclear fusion requires extreme temperatures and pressures, and how stars overcome these challenges. (3 steps)", "answer": "- Step 1: Light nuclei repel (Coulomb barrier). Extreme temperatures provide kinetic energy to overcome this.  \n- Step 2: High pressure (e.g., in stellar cores) increases collision frequency.  \n- Step 3: Stars use gravity to compress hydrogen into a dense, hot plasma where quantum tunneling enables fusion.  \n\n[Takeaway: Fusion requires overcoming electrostatic repulsion; stars achieve this via gravitational compression and high temperatures.]", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "In a half-life simulation, how does the number of remaining nuclei change after 3 half-lives? (1 step)", "answer": "- Step 1: Remaining nuclei = N₀ × (½)³ = N₀/8.  \n\n[Takeaway: Each half-life reduces nuclei by 50%, so after 3 half-lives, 1/8 of the original population remains.]", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is background radiation subtracted before analyzing radioactive decay data? (2 steps)", "answer": "- Step 1: Background radiation (from environment/Sun) adds a constant count rate to measurements.  \n- Step 2: Subtracting background isolates the decay signal, ensuring half-life calculations reflect only the sample’s activity.  \n\n[Takeaway: Background radiation inflates count rates; subtraction reveals the true exponential decay curve.]", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Calculate the binding energy of a nucleus with a mass defect of 0.03 u. (1 step)", "answer": "- Step 1: Energy = 0.03 u × 931.5 MeV/c² ≈ 27.9 MeV.  \n\n[Takeaway: Multiply mass defect in u by 931.5 MeV/c² to get binding energy.]", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why does a nucleus have less mass than the sum of its individual protons and neutrons? (2 steps)", "answer": "- Step 1: Mass defect arises because binding energy (energy released when nucleons bind) reduces the total mass (E = Δmc²).  \n- Step 2: A bound nucleus is more stable than free nucleons because the mass deficit (converted to binding energy) lowers the system’s energy.  \n\n[Takeaway: Mass defect is the \"price\" of stability—binding energy is stored as mass deficit.]", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "If a sample’s initial activity is 800 Bq and half-life is 20 min, what is the activity after 1 hour? (1 step)", "answer": "- Step 1: 1 hour = 3 half-lives → 800 Bq × (½)³ = 100 Bq.  \n\n[Takeaway: Activity halves every half-life period.]", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why is iron-56 the most stable nucleus? (2 steps)", "answer": "- Step 1: Iron-56 has the highest binding energy per nucleon (~8.8 MeV), meaning each nucleon is most strongly bound.  \n- Step 2: Beyond iron, the Coulomb force dominates, reducing stability; below iron, fusion increases stability.  \n\n[Takeaway: Iron-56 sits at the peak of the BE/nucleon curve, making it the endpoint of both fission and fusion energy release.]", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Derive the formula for activity: A = λN. (3 steps)", "answer": "- Step 1: Activity (A) is the number of decays per second.  \n- Step 2: Probability of decay per nucleus per second is λ, so average A = λ × N (number of nuclei).  \n- Step 3: Units: A (Bq) = λ (s⁻¹) × N (unitless), ensuring dimensional consistency.  \n\n[Takeaway: Activity depends linearly on decay constant (λ) and nucleus count (N).]", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why do beta-minus and beta-plus decays obey conservation of charge but not proton number? (3 steps)", "answer": "- Step 1: Beta⁻ decay: n → p+ + e⁻ + ν̄ₑ. Charge conserved (n-neutral → p+ + e⁻ (-1) + antineutrino (0) = 0).  \n- Step 2: Beta⁺ decay: p+ → n + e⁺ + νₑ. Charge conserved (p+ → n + e+ (0 +1) + neutrino (0) = +1).  \n- Step 3: Proton number changes in both decays (n ↔ p+ conversion), but total charge remains conserved.  \n\n[Takeaway: Charge is conserved, but proton number (Z) changes in beta decay.]", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why does a nucleus with high mass defect have high binding energy? (2 steps)", "answer": "- Step 1: Mass defect (Δm) = (sum of nucleon masses) − (nucleus mass).  \n- Step 2: Binding energy ΔE = Δm·c². A larger Δm means more energy was released (stability) when the nucleus formed.  \n\n[Takeaway: Mass defect is the \"missing\" mass converted to binding energy.]", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "What is the significance of the unified atomic mass unit (u) in nuclear physics? (2 steps)", "answer": "- Step 1: u provides a convenient scale for atomic masses (1 u ≈ mass of a proton/neutron).  \n- Step 2: 1 u = 931.5 MeV/c² links mass defect to energy via E = mc², avoiding SI unit conversions.  \n\n[Takeaway: u simplifies nuclear calculations by aligning with nucleon mass and energy equivalence.]", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "How does the Geiger-Müller tube detect radiation, and why does it require high voltage? (3 steps)", "answer": "- Step 1: Ionizing radiation (α/β/γ) enters the tube and ionizes argon gas.  \n- Step 2: High voltage (→1000 V) accelerates ions, causing an electron avalanche (detectable pulse).  \n- Step 3: The tube resets after each particle, allowing individual decays to be counted.  \n\n[Takeaway: High voltage amplifies ionization events into measurable pulses.]", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "Why is uranium enrichment necessary for nuclear reactors? (3 steps)", "answer": "- Step 1: Natural uranium is 99.3% U-238 (non-fissile) and 0.7% U-235 (fissile).  \n- Step 2: U-238 captures neutrons without fission, reducing reaction efficiency.  \n- Step 3: Enrichment increases U-235 concentration to sustain a chain reaction.  \n\n[Takeaway: Enrichment ensures a sufficient fraction of fissile isotopes to maintain criticality.]", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}], "count": 22}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the decay constant λ, and how does it relate to the activity of a radioactive sample? (2 steps)", "answer": "- Step 1: The decay constant λ is defined as the probability, per second, that a given nucleus will decay. It is a characteristic property of each radioactive isotope and has units of s⁻¹.\n- Step 2: The activity A of a sample is related to the decay constant by the equation A = λN, where N is the number of undecayed nuclei remaining. This means activity is directly proportional to both the decay constant and the number of nuclei present — a larger decay constant means more decays per second, and more nuclei means more potential decays.\n\nThe minus sign in dN/dt = -λN indicates the number of nuclei decreases with time.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A radioactive sample has an initial activity of 1600 Bq. After 3 half-lives, what is the activity? Explain your reasoning. (2 steps)", "answer": "- Step 1: After each half-life, the activity halves. Starting at 1600 Bq:\n- After 1 half-life: 1600 ÷ 2 = 800 Bq\n- After 2 half-lives: 800 ÷ 2 = 400 Bq\n- After 3 half-lives: 400 ÷ 2 = 200 Bq\n- Step 2: Alternatively, use the formula A = A₀ × (½)^n where n = number of half-lives: A = 1600 × (½)³ = 1600 × 1/8 = 200 Bq.\n\nThe key insight is that half-life is a constant for a given isotope — it doesn't matter how much sample you have; the time to halve is always the same.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Derive the relationship between half-life t½ and the decay constant λ, and explain why they are inversely proportional. (3 steps)", "answer": "- Step 1: Start with the exponential decay equation N = N₀e^(-λt). By definition of half-life, when t = t½, the number of nuclei remaining is N = ½N₀.\n- Step 2: Substitute into the equation: ½N₀ = N₀e^(-λt½). Cancel N₀: ½ = e^(-λt½). Take natural logs: ln(½) = -λt½, so -0.693 = -λt½.\n- Step 3: Therefore, t½ = 0.693/λ or equivalently λ = 0.693/t½. This shows inverse proportionality — a larger decay constant means nuclei decay faster, so the time for half to decay (half-life) must be shorter.\n\nThis relationship is fundamental: isotopes with high decay constants have short half-lives, and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain what \"mass defect\" means and why a bound nucleus always has less mass than the sum of its separate nucleons. (2 steps)", "answer": "- Step 1: Mass defect (or mass deficit) Δm is defined as the difference between the measured mass of a nucleus and the sum of the masses of its constituent protons and neutrons: Δm = [Z×m_p + (A-Z)×m_n] - m_nucleus. This value is always positive.\n- Step 2: When nucleons bind together to form a nucleus, they release energy (the binding energy). According to Einstein's mass-energy equivalence E = Δmc², this released energy corresponds to a loss of mass. The more tightly bound the nucleus, the greater the mass defect. This is why bound systems are always less massive than their separated constituents — the \"missing\" mass has been converted to binding energy.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "The atomic mass unit is defined as 1/12 of the mass of a carbon-12 atom. What is the value of 1 u in both kg and MeV/c²? (2 steps)", "answer": "- Step 1: In kilograms, 1 u = 1.66 × 10⁻²⁷ kg. This is approximately the mass of a single proton or neutron.\n- Step 2: Using E = Δmc², we convert to energy: 1.66 × 10⁻²⁷ kg × (3.00 × 10⁸ m/s)² = 1.49 × 10⁻¹⁰ J. Converting to electronvolts: (1.49 × 10⁻¹⁰ J) ÷ (1.60 × 10⁻¹⁹ J/eV) = 9.31 × 10⁸ eV = 931.5 MeV. So 1 u ≈ 931.5 MeV/c².\n\nThis conversion factor (931.5 MeV/c² per u) is essential for calculating binding energies in nuclear physics.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A nucleus has a mass defect of 0.05 u. Calculate its binding energy in MeV. (2 steps)", "answer": "- Step 1: The mass defect is given as Δm = 0.05 u.\n- Step 2: Using the conversion factor 1 u = 931.5 MeV/c², the binding energy is ΔE = Δm × 931.5 MeV = 0.05 × 931.5 = 46.6 MeV (to 3 s.f.).\n\nAlternatively, you could convert to kg first: 0.05 u = 0.05 × 1.66 × 10⁻²⁷ kg = 8.3 × 10⁻²⁹ kg, then ΔE = Δmc² = 8.3 × 10⁻²⁹ × (3 × 10⁸)² = 7.5 × 10⁻¹² J, then convert to MeV. The u→MeV shortcut is much faster for exam questions.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is meant by \"binding energy per nucleon,\" and why is this quantity more useful than total binding energy when comparing nuclear stability? (2 steps)", "answer": "- Step 1: Binding energy per nucleon is defined as the total binding energy of a nucleus divided by its nucleon number A: BE/A. It represents the average energy required to remove one nucleon from the nucleus.\n- Step 2: Total binding energy increases with nucleon number, so heavier nuclei have larger total binding energies. However, binding energy per nucleon accounts for this — it shows how tightly each nucleon is bound on average. A higher value means the nucleus is more stable, since more energy is needed to remove each nucleon. This allows fair comparison between light and heavy nuclei.\n\nIron-56 has the highest binding energy per nucleon (~8.8 MeV/nucleon), making it the most stable nucleus.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Sketch the binding energy per nucleon curve and label the key features. Why do both fission and fusion release energy? (3 steps)", "answer": "- Step 1: The curve plots binding energy per nucleon (vertical axis, typically 0-9 MeV/nucleon) against nucleon number A (horizontal axis, 1 to ~250). Key features:\n+ Low A region (left): Steep increase — light nuclei have very low BE/nucleon\n+ Peak at A ≈ 56 (iron-56): Maximum ~8.8 MeV/nucleon\n+ High A region (right): Gradual decline — heavy nuclei have decreasing BE/nucleon\n+ Anomaly at helium-4 (A=4): Sits above the smooth curve due to extra stability\n- Step 2: For fission: Heavy nuclei (like U-235) have low BE/nucleon (~7.6 MeV). When split into two medium nuclei (like Ba-141 + Kr-92), these have higher BE/nucleon (~8.3 MeV). The increase in BE/nucleon means energy is released.\n- Step 3: For fusion: Two very light nuclei (like deuterium + tritium) have very low BE/nucleon (~1-2 MeV). When fused into a heavier nucleus (helium-4), it has much higher BE/nucleon (~7 MeV). The increase in BE/nucleon releases energy.\n\nBoth processes move nuclei toward the peak of the curve — that's why both release energy.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "In nuclear fission, what is a chain reaction, and why is a \"critical mass\" required for a nuclear bomb? (3 steps)", "answer": "- Step 1: In fission, when a heavy nucleus like U-235 absorbs a neutron and splits, it releases 2-3 fast neutrons. These neutrons can be absorbed by other U-235 nuclei, causing further fission events — this is a chain reaction.\n- Step 2: Each fission releases more neutrons, which trigger more fissions, creating exponential growth. In a bomb, this happens extremely rapidly (supercritical), releasing enormous energy in microseconds.\n- Step 3: Critical mass is the minimum amount of fissile material needed to sustain a chain reaction. Below critical mass, too many neutrons escape the sample without causing fission — the reaction dies out. Above critical mass, enough neutrons are retained to sustain and amplify the chain reaction. This is why uranium must be enriched and shaped to achieve supercriticality in weapons.", "sou
