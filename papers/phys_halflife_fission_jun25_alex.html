ter 3 half-lives, it decays to 100 Bq. Confirm this using the equation $ A = A_0 e^{-\\lambda t} $ and the relation $ \\lambda t_{1/2} = \\ln 2 $. (3 steps)", "answer": "- Step 1: **Relate time to half-lives**  \nFor 3 half-lives, $ t = 3 t_{1/2} $.  \n- Step 2: **Substitute into activity equation**  \n$$ A = 800 e^{-\\lambda (3 t_{1/2})} $$  \nUse $ \\lambda = \\ln 2 / t_{1/2} $:  \n$$ A = 800 e^{-(\\ln 2 / t_{1/2}) \\times 3 t_{1/2}}} = 800 e^{-3 \\ln 2} = 800 \\times (1/2)^3 = 100 \\, \\text{Bq} $$  \n- Step 3: **Conclusion**  \nThe formula confirms that each half-life reduces activity by 50%, so 3 half-lives → 1/8th activity.", "source": "Qwen 3 ①", "_id": "qwen_1_26"}, {"question": "What is critical mass, and why does fission require a minimum amount of fissile material?", "answer": "- Step 1: When a neutron is emitted from a fission event, it might either (a) be absorbed by another nucleus inside the sample, or (b) escape through the surface of the sample without causing further fission.\n- Step 2: For a small sample, the surface area is large relative to the volume — most neutrons escape, so the chain reaction dies. As the sample grows, the volume (where absorption happens) grows faster than the surface (where escape happens).\n- Step 3: At the *critical mass*, exactly enough neutrons stay inside to sustain the chain reaction. Below this mass, fission can't be sustained; above it, the reaction can run away.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Quickly: if isotope A has a half-life of 10 years and isotope B has a half-life of 100 years, which has the larger decay constant, and which has the higher activity per nucleus?", "answer": "- Step 1: Use $$\\lambda = \\ln 2 / t_{1/2}$$. Shorter half-life means larger $$\\lambda$$. So isotope A has a larger decay constant.\n- Step 2: Activity per nucleus is exactly $$\\lambda$$ (the probability of decay per second). So isotope A also has higher activity per nucleus.\n- Step 3: Intuition: a shorter half-life means each nucleus is \"more eager\" to decay — so per unit time, more of them go.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why does nuclear fusion require extremely high temperatures and pressures? Address both Coulomb repulsion and quantum tunneling. (3 steps)", "answer": "- Step 1: **Coulomb repulsion**  \nProtons repel due to their positive charges. High temperatures provide kinetic energy to overcome this repulsion.  \n- Step 2: **Quantum tunneling**  \nEven with sufficient kinetic energy, fusion relies on quantum tunneling to allow nuclei to approach within the 1-10 femtometer range of the strong nuclear force.  \n- Step 3: **Pressure for collision frequency**  \nHigh pressure increases collision frequency, ensuring enough nuclei reach the required proximity for tunneling.  \n+ Example: Stellar cores (e.g., the Sun’s 15 million K) provide these conditions.", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "A friend says \"fission and fusion both 'destroy mass to make energy'.\" How would you correct this informally but accurately? (3 steps)", "answer": "- Step 1: Mass isn't really \"destroyed\" — total mass-energy is conserved. What happens is that some of the *rest mass* of the reactants converts into kinetic energy of products and radiated photons.\n- Step 2: A better phrasing: \"Some rest mass is *converted* into other forms of energy.\" The total $$E$$ (including kinetic energy and photon energy) is the same before and after; only the partition between rest-mass and motion/radiation changes.\n- Step 3: The deeper insight: rest mass *is* a form of energy ($$E = mc^2$$). So \"mass converts to energy\" is a colloquial way of saying \"rest-mass energy converts to kinetic and radiative energy.\" Nothing magical disappears.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why does a nuclear bomb need a \"critical mass\" of fissile material? (3 steps)", "answer": "- Step 1: When a fission emits 2-3 neutrons, those neutrons can either (a) hit another fissile nucleus and cause more fission, or (b) escape from the surface of the lump without interacting.\n- Step 2: In a small lump, the surface-to-volume ratio is high, so most neutrons escape — $$k < 1$$ and no chain reaction. In a large lump, the ratio is lower and most neutrons stay inside, hitting other nuclei — $$k > 1$$.\n- Step 3: The critical mass is the threshold size at which neutron production exactly balances neutron loss ($$k = 1$$). Above this, the reaction grows exponentially. A bomb assembles a supercritical mass *very rapidly* (using conventional explosives) to release energy before the configuration blows itself apart. Below critical mass, you can store fissile material safely.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "In the binding energy per nucleon graph, helium-4 sits above the smooth curve. What does this tell us about its stability, and why is this relevant to fusion energy production in stars? (2 steps)", "answer": "- Step 1: Helium-4 has abnormally high binding energy per nucleon compared to its neighbors, indicating it is particularly stable — more stable than the general trend would suggest. This \"neck\" in the curve reflects that alpha particles (helium nuclei) are especially tightly bound.\n- Step 2: This is crucial for stellar fusion. The proton-proton chain and CNO cycle both produce helium-4 as the end product. Because helium-4 is so stable, the fusion pathway is energetically favorable — moving from hydrogen (low BE/nucleon) to helium (high BE/nucleon) releases significant energy, which is what powers the Sun and other stars.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "A nucleus has mass defect such that 0.1% of its rest mass is \"missing.\" Roughly what is its binding energy per nucleon in MeV, and what does this say about its position on the BE/A curve?", "answer": "- Step 1: The rest mass of a nucleon is about 939 MeV/c². If 0.1% of the mass is converted to binding energy, that's about $$0.001 \\times 939 \\approx 0.94$$ MeV per nucleon.\n- Step 2: This is much lower than the peak value of ~8.8 MeV/nucleon. So this nucleus would sit far down on either the light or heavy side of the BE/A curve — not very tightly bound.\n- Step 3: For comparison, iron-56 has ~1% of its mass as binding energy. So the mass-defect fraction is roughly $$BE/A$$ divided by the nucleon rest energy.\n\nTakeaway: The fractional mass deficit (~0.01) is a quick measure of \"how close to iron\" a nucleus is.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Edge case: what happens if you try to split iron-56 by fission, or fuse iron-56 with another iron-56?", "answer": "- Step 1: Iron-56 sits at the peak of the BE/A curve — it's the most tightly bound nucleus per nucleon. Any move away from it (either splitting or combining) decreases BE/A.\n- Step 2: Splitting iron would produce lighter nuclei with lower BE/A → energy must be *supplied*, not released. The reaction is endothermic.\n- Step 3: Fusing iron with iron would produce a heavier nucleus past the peak, also with lower BE/A → again endothermic. This is why stars die at iron: neither fusion nor fission of iron releases energy, so no more nuclear fuel.\n\nTakeaway: Iron-56 is the universe's nuclear \"ground state\" in the sense of BE/A — energy flows toward it from both directions.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Suppose you measure the activity of a sample at two different times: $$A_1 = 400$$ Bq at $$t_1$$, and $$A_2 = 100$$ Bq at $$t_2 = t_1 + 30$$ min. What is the half-life, conceptually?", "answer": "- Step 1: The activity dropped by a factor of 4 = $$2^2$$. So 2 half-lives elapsed in 30 minutes.\n- Step 2: Therefore, one half-life = 30/2 = 15 minutes.\n- Step 3: The general method: count how many factors of 2 the activity dropped by, divide the time by that count, and you get the half-life. No exponential math needed for nice ratios.\n\nTakeaway: For exam efficiency, recognise factors of 2, 4, 8, 16 as 1, 2, 3, 4 half-lives.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why does the binding energy per nucleon curve peak around iron-56? (4 steps)", "answer": "- Step 1: For light nuclei, adding nucleons rapidly increases $$BE/A$$ because the strong nuclear force is short-range — more nearest neighbours means more binding bonds per nucleon. Surface effects dominate.\n- Step 2: As nuclei grow, each nucleon eventually has a \"saturated\" number of nearest neighbours (strong force only reaches ~1 fm), so adding more nucleons doesn't increase $$BE/A$$ much.\n- Step 3: Simultaneously, the long-range *electrostatic repulsion* between protons grows with $$Z^2$$ — every proton repels every other proton, not just neighbours. This destabilising force grows faster than nucleon count.\n- Step 4: The two effects balance near iron-56: beyond it, Coulomb repulsion wins and $$BE/A$$ falls; below it, surface effects make nuclei loosely bound. Iron-56 is the most stable nucleus.\n\nTakeaway: The peak is the tug-of-war between short-range nuclear attraction and long-range electric repulsion.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why is fusion in the Sun's core a \"self-regulating\" reaction, while a fission chain reaction can run away into a bomb?", "answer": "- Step 1: In fusion, the reaction rate depends sensitively on temperature and density. If fusion speeds up, the core heats and expands; expansion lowers density, reducing the fusion rate. Gravity pulls it back in — a stable feedback loop.\n- Step 2: In fission, the chain reaction depends on neutron multiplication. If the multiplication factor exceeds 1, each generation produces more neutrons than the last, doubling exponentially in microseconds. There's no built-in damping.\n- Step 3: This is why fission needs active control (control rods); fusion is inherently stable on stellar scales. On Earth, magnetic-confinement fusion is also stable in this sense — the challenge is achieving the conditions, not preventing runaway.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "A fission reaction releases about 200 MeV per event. A fusion reaction (D-T) releases about 17.6 MeV per event. Yet fusion releases *more energy per kilogram of fuel* than fission. Explain this apparent contradiction. (2 steps)", "answer": "- Step 1: The key is *per event* vs. *per kilogram*. A single fission event involves a uranium-235 nucleus (mass ≈ 235 u), releasing 200 MeV. A single fusion event involves a deuterium and tritium nucleus (combined mass ≈ 5 u), releasing 17.6 MeV.\n- Step 2: Energy per unit mass: fission gives roughly 200/235 ≈ 0.85 MeV/u. Fusion gives roughly 17.6/5 ≈ 3.5 MeV/u. Fusion releases about 4 times more energy per unit mass because light nuclei are on the steep part of the BE/nucleon curve — a small change in nucleon number produces a large change in binding energy per nucleon. This is why fusion is such a powerful energy source in stars.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "Why must the incoming neutron in induced fission be *slow* (\"thermal\"), not fast? (2 steps)", "answer": "- Step 1: A fast neutron tends to bounce off the nucleus without being absorbed — its de Broglie wavelength is short and its interaction time is brief. A slow neutron lingers longer near the nucleus, with a wavelength comparable to nuclear dimensions, giving it a much higher probability of capture.\n- Step 2: This is why nuclear reactors use *moderators* (water, graphite) — to slow the fast neutrons emitted by previous fissions down to thermal speeds so they can induce further fissions. Without a moderator, the chain reaction fizzles out.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "The decay constant λ represents the probability per unit time that a nucleus will decay. Explain why λ is unaffected by external conditions (temperature, pressure, etc.) despite influencing the rate of decay. (3 steps)", "answer": "- Step 1: **Quantum tunneling mechanism**  \nNuclear decay relies on quantum tunneling through the nuclear binding potential, governed by fundamental forces (strong/weak) that are independent of classical environmental factors.  \n- Step 2: **No activation energy**  \nUnlike chemical reactions, decay doesn't require thermal energy to overcome an activation barrier. The nucleus is inherently unstable, decaying based on internal quantum probabilities.  \n- Step 3: **Empirical evidence**  \nExperiments confirm that decay constants remain unchanged under extreme conditions (e.g., deep Earth, high-altitude cosmic rays), validating their independence from external factors.  \n+ Example: Uranium-238 in a nuclear reactor vs. in a lab decays at the same rate.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "Why is it impossible to use nuclear fusion as a sustained energy source on Earth with current technology, even though it works naturally in the Sun? (3 steps)", "answer": "- Step 1: Fusion requires nuclei to overcome **Coulomb repulsion** to get close enough for the strong nuclear force to bind them. This requires temperatures of ~100 million K (for the D-T reaction) or higher.\n- Step 2: At these temperatures, matter exists as **plasma** — a hot, ionised gas. No solid container can hold plasma at these temperatures; the container would melt or vaporise instantly. Instead, magnetic confinement (tokamaks) or inertial confinement (laser compression) must be used, both of which are extremely challenging to sustain.\n- Step 3: In the Sun, the enormous **gravitational pressure** of the star's mass confines the plasma naturally. On Earth, we lack this gravitational confinement, so we must achieve even higher temperatures to compensate. So far, we have not been able to sustain fusion for long enough or efficiently enough to produce net energy gain consistently.\n\nThe ITER project in southern France is the current leading effort to achieve sustained fusion.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "Why do stars eventually die when they accumulate too much iron in their core? (3 steps)", "answer": "- Step 1: Stars fuse lighter elements (H → He → C → O → ... → Si → Fe) to release energy and sustain outward pressure against gravitational collapse.\n- Step 2: Once the core reaches iron-56, no more energy can be extracted by fusion — iron is at the peak of the binding-energy-per-nucleon curve. Fusing iron *consumes* energy rather than releasing it.\n- Step 3: Without fusion energy to support it, the iron core cannot resist gravity. It collapses catastrophically, triggering a supernova. So the BE/nucleon curve doesn't just explain energy release — it dictates the very life cycle and death of massive stars. Everything heavier than iron in the universe was forged in supernovae and neutron-star mergers, not in routine stellar fusion.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why is helium-4 the preferred end-product in stellar fusion rather than, say, helium-3 or lithium?", "answer": "- Step 1: Helium-4 is doubly magic (2 protons, 2 neutrons in closed shells), giving it exceptionally high BE/A compared to its neighbours. So fusing toward He-4 releases the most energy per nucleon in the early periodic table.\n- Step 2: Helium-3 is less bound; lithium-5 is actually unstable. So thermodynamics and stability favour the proton-proton chain ending at He-4.\n- Step 3: Once He-4 builds up, further fusion (3 He-4 → C-12, the \"triple-alpha\" process) requires much higher temperatures, occurring only in older, hotter stars.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A student says: \"If I watch a single radioactive nucleus carefully, I can predict exactly when it will decay.\" Is this correct, and what fundamental property of nuclear decay makes it so? (2 steps)", "answer": "- Step 1: The statement is incorrect. It is impossible to predict when any individual nucleus will decay. This is because radioactive decay is a **random** process — each nucleus has a constant probability of decaying in any given time interval, but the exact moment is fundamentally unpredictable.\n- Step 2: However, while individual decays are random, with a **large sample** of nuclei (billions or more), the *statistical average* behaviour becomes highly predictable. This is why we can define quantities like half-life and activity — they describe the collective, probabilistic behaviour, not the fate of any one nucleus.\n\nThe randomness is irreducible at the single-nucleus level; predictability only emerges statistically.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A student claims: \"Radioactive decay is random, so it can be affected by temperature and pressure.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The student is confusing two distinct properties. Radioactive decay is both **random** and **spontaneous**. \"Random\" means the exact time of decay of a single nucleus cannot be predicted. \"Spontaneous\" means the decay cannot be influenced by external environmental factors such as temperature, pressure, or chemical state.\n- Step 2: These are independent concepts. The randomness refers to *which* nucleus decays *when*; the spontaneity refers to the fact that *nothing external triggers or alters* the decay. So even though decay is random, it is not environmentally sensitive — you cannot speed it up by heating the sample or compressing it.\n\nThis is why half-life is a constant for a given isotope, regardless of conditions.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the definition of activity in radioactive decay, and what is its SI unit? Why is the unit named the way it is? (2 steps)", "answer": "- Step 1: Activity ($$A$$) is defined as the number of decays per unit time — i.e., the rate at which nuclei in a sample decay. Mathematically, $$A = \\lambda N$$, where $$\\lambda$$ is the decay constant and $$N$$ is the number of undecayed nuclei.\n- Step 2: The SI unit of activity is the **Becquerel (Bq)**, where 1 Bq = 1 decay per second ($$1 \\text{ Bq} = 1 \\text{ s}^{-1}$$). It is named after Henri Becquerel, who discovered radioactivity in 1896.\n\nNote: Activity measures *decays*, not the type or energy of radiation emitted. A sample with 800 Bq activity undergoes 800 nuclear decays every second.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "The decay constant $$\\lambda$$ has units of $$\\text{s}^{-1}$$. Explain what $$\\lambda = 0.05 \\text{ s}^{-1}$$ physically means — does it mean 5% of nuclei decay per second? (3 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is defined as the **probability per unit time** that a given nucleus will decay. So $$\\lambda = 0.05 \\text{ s}^{-1}$$ means each individual nucleus has a 0.05 (5%) probability of decaying in any one-second interval.\n- Step 2: However, this does **not** mean exactly 5% of the sample decays each second in a simple linear way. Because the number of undecayed nuclei is constantly decreasing, the *number* of decays per second also decreases over time — this is what gives exponential decay.\n- Step 3: In the limit of a very short time interval $$\\delta t$$ (where $$\\lambda \\delta t \\ll 1$$), the fraction of nuclei that decay is approximately $$\\lambda \\delta t$$. So for $$\\delta t = 1 \\text{ s}$$ and $$\\lambda = 0.05 \\text{ s}^{-1}$$, approximately 5% decay in that first second — but only as an approximation. The exact treatment requires the exponential formula.\n\nThe decay constant is a probability *rate*, not a fixed fraction per second.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A sample contains $$N$$ undecayed nuclei and has decay constant $$\\lambda$$. Write the equation linking activity $$A$$ to these quantities, and explain why activity decreases over time even though $$\\lambda$$ is constant. (2 steps)", "answer": "- Step 1: The equation is $$A = \\lambda N$$. Since $$\\lambda$$ is constant for a given isotope, the activity is directly proportional to the number of undecayed nuclei remaining.\n- Step 2: As time passes, nuclei decay and $$N$$ decreases. Since $$A \\propto N$$, the activity also decreases. The decay constant $$\\lambda$$ never changes — it is a fixed property of the isotope. What changes is $$N$$, and therefore $$A$$ falls exponentially just like $$N$$.\n\nThis is why both $$N$$ and $$A$$ follow the same exponential decay pattern: $$N = N_0 e^{-\\lambda t}$$ and $$A = A_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Starting from $$A = \\lambda N$$ and the idea that activity is the rate of change of undecayed nuclei, derive the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: Activity is the rate of decay, so $$A = -\\frac{dN}{dt}$$ (negative because $$N$$ is decreasing). Combining with $$A = \\lambda N$$: $$-\\frac{dN}{dt} = \\lambda N$$, or $$\\frac{dN}{dt} = -\\lambda N$$.\n- Step 2: Rearrange to separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$.\n- Step 3: Integrate both sides. The left side integrates from $$N_0$$ to $$N$$, and the right side from $$0$$ to $$t$$: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_0^t dt$$, giving $$\\ln N - \\ln N_0 = -\\lambda t$$, so $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$.\n- Step 4: Exponentiate both sides: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, therefore $$N = N_0 e^{-\\lambda t}$$.\n\nSince $$A = \\lambda N$$, the same exponential form applies to activity: $$A = A_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Give the two equivalent definitions of half-life. Why are they equivalent? (2 steps)", "answer": "- Step 1: Definition 1: Half-life is the time taken for **half the radioactive nuclei** in a sample to decay. Definition 2: Half-life is the time taken for the **activity** of a sample to fall to half its original value.\n- Step 2: These are equivalent because $$A = \\lambda N$$ — activity is directly proportional to the number of undecayed nuclei. If $$N$$ halves, then $$A$$ must also halve (since $$\\lambda$$ is constant). So the time for $$N$$ to halve is the same as the time for $$A$$ to halve.\n\nThis also means half-life can be read from a graph of either $$N$$ vs $$t$$ or $$A$$ vs $$t$$ — find the time at which the quantity has dropped to half its starting value.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ from the exponential decay equation. (3 steps)", "answer": "- Step 1: Start with $$N = N_0 e^{-\\lambda t}$$. By definition, when one half-life has passed ($$t = t_{1/2}$$), the number of nuclei has halved: $$N = \\frac{N_0}{2}$$.\n- Step 2: Substitute: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$. Cancel $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take natural logs of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n\nThis shows half-life and decay constant are **inversely proportional**: a large $$\\lambda$$ (high probability of decay) means a short half-life, and vice versa.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "A student says: \"A sample with a longer half-life is more dangerous because it stays radioactive for longer.\" A second student says: \"A shorter half-life is more dangerous because it decays faster.\" Can both be partly right? Explain. (3 steps)", "answer": "- Step 1: The first student is partly right: a long half-life means the source remains radioactive for a very long time (e.g., uranium-238 with $$t_{1/2} \\approx 4.5$$ billion years). This is a concern for long-term storage of nuclear waste.\n- Step 2: The second student is also partly right: a short half-life means a high decay constant, so for the same number of nuclei, the activity is much higher (since $$A = \\lambda N$$). High activity means more radiation emitted per second, which is more immediately dangerous.\n- Step 3: Danger depends on *both* the activity (how much radiation per second) and the duration (how long it remains radioactive). A very short half-life isotope is intensely radioactive but quickly becomes harmless. A very long half-life isotope is weakly radioactive per gram but persists essentially forever. The most dangerous isotopes for biological exposure are often those with intermediate half-lives (e.g., strontium-90, $$t_{1/2} \\approx 29$$ years) — active enough to cause harm, long-lived enough to persist in the body.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "When measuring the half-life of a source using a Geiger counter, why must you first measure the count rate with no source present? (2 steps)", "answer": "- Step 1: The Geiger counter detects radiation from all sources, not just the sample. There is always **background radiation** present from natural sources (radon gas, cosmic rays, rocks) and man-made sources. This adds a constant count on top of the source's radiation.\n- Step 2: To find the true activity of the source alone, you must subtract the background count rate from the measured count rate. This gives the **corrected count rate**. If you don't do this, the decay curve will approach the background level rather than zero, and your half-life measurement will be inaccurate — the curve will appear to flatten out prematurely.\n\nOn a graph, the decay curve will asymptote toward the background level, not toward zero.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A radioactive isotope has a half-life of 10 minutes. If a sample starts with 1600 nuclei, how many remain after 30 minutes? Use the step-by-step \"magic table\" method. (2 steps)", "answer": "- Step 1: Count the number of half-lives: $$30 \\text{ min} / 10 \\text{ min} = 3$$ half-lives. Build the table:\n\n| Half-lives | Time (min) | Nuclei |\n|---|---|---|\n| 0 | 0 | 1600 |\n| 1 | 10 | 800 |\n| 2 | 20 | 400 |\n| 3 | 30 | 200 |\n\n- Step 2: After 3 half-lives, **200 nuclei** remain. Alternatively, using the formula: $$N = 1600 \\times \\left(\\frac{1}{2}\\right)^3 = 1600 \\times \\frac{1}{8} = 200$$.\n\nThe table method and the formula $$N = N_0 \\times (1/2)^x$$ (where $$x$$ = number of half-lives) always give the same result.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A sample of polonium has its mass decrease from 8 g to 0.25 g. How many half-lives have passed? (2 steps)", "answer": "- Step 1: Use the table method, starting at 8 g and halving each time: 8 → 4 → 2 → 1 → 0.5 → 0.25. Count the steps: that's 5 halvings.\n- Step 2: Therefore, **5 half-lives** have passed. Using the formula: $$0.25 = 8 \\times (1/2)^x$$, so $$(1/2)^x = 0.25/8 = 1/32 = (1/2)^5$$, giving $$x = 5$$.\n\nIf the half-life were 164 seconds (as for Po-214), the total time elapsed would be $$5 \\times 164 = 820$$ seconds.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A sample's activity drops from 640 Bq to 40 Bq. How many half-lives have elapsed? (1 step)", "answer": "- Step 1: Halve repeatedly: 640 → 320 → 160 → 80 → 40. That's 4 halvings, so **4 half-lives** have elapsed. Using the formula: $$40 = 640 \\times (1/2)^x$$, so $$(1/2)^x = 1/16 = (1/2)^4$$, confirming $$x = 4$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is the mass defect (mass deficit) of a nucleus, and why must it always be positive for any bound nucleus? (3 steps)", "answer": "- Step 1: The mass defect $$\\Delta m$$ is the difference between the sum of the masses of the individual, separated nucleons and the actual measured mass of the bound nucleus: $$\\Delta m = Zm_p + (A-Z)m_n - m_{\\text{total}}$$.\n- Step 2: The mass defect is always **positive** for any bound nucleus, because a bound nucleus always has **less mass** than its separated constituents. The \"missing\" mass has been converted into energy that was *released* when the nucleus formed.\n- Step 3: This is a direct consequence of mass-energy equivalence ($$\\Delta E = \\Delta m c^2$$). Energy must be *supplied* (binding energy) to break the nucleus apart again — the nucleus sits in an energy well, and the depth of that well corresponds to the mass defect.\n\nA common trap: thinking the bound nucleus has *more* mass. It always has *less*.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Define binding energy in two equivalent ways. Why is it misleading to call it \"energy stored in the nucleus\"? (3 steps)", "answer": "- Step 1: Definition 1: Binding energy is the energy **required to break** a nucleus completely into its constituent protons and neutrons. Definition 2: It is the energy **released when** nucleons combine to form a nucleus.\n- Step 2: These are equivalent by conservation of energy — the energy you must put in to dismantle the nucleus equals the energy that came out when it was assembled.\n- Step 3: It is misleading to call it \"energy stored in the nucleus\" because that implies the nucleus *contains* extra energy. In fact, the bound nucleus has **less** energy (and less mass) than its separated parts. The binding energy is the energy *missing* from the system — it was already released. You must *supply* it to pull the nucleus apart.\n\nThink of it like a deep hole: the binding energy is how deep the hole is, not something sitting at the bottom.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A nucleus has a mass defect of $$\\Delta m = 0.05 \\text{ u}$$. Calculate its binding energy in MeV. (3 steps)", "answer": "- Step 1: Use the conversion $$1 \\text{ u} = 931.5 \\text{ MeV}/c^2$$. So the mass defect in energy terms is: $$\\Delta E = \\Delta m \\times c^2 = 0.05 \\times 931.5 \\text{ MeV}$$.\n- Step 2: $$\\Delta E = 0.05 \\times 931.5 = 46.575 \\text{ MeV}$$.\n- Step 3: The binding energy is approximately **46.6 MeV**. Note: we didn't need to convert to kg and use $$c = 3 \\times 10^8 \\text{ m/s}$$ — the direct conversion $$1 \\text{ u} \\leftrightarrow 931.5 \\text{ MeV}$$ already incorporates the $$c^2$$ factor.\n\nThis shortcut (u → MeV directly) is the standard exam technique and avoids error-prone SI unit conversions.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is the atomic mass unit (u), and why is it defined using carbon-12 rather than, say, a single proton? (3 steps)", "answer": "- Step 1: The atomic mass unit is defined as exactly **1/12 of the mass of a carbon-12 atom**. Numerically: $$1 \\text{ u} = 1.661 \\times 10^{-27} \\text{ kg}$$.\n- Step 2: It is also equivalent to $$931.5 \\text{ MeV}/c^2$$ via mass-energy equivalence. This means mass can be expressed directly in energy units, which is extremely convenient in nuclear physics.\n- Step 3: Carbon-12 is used as the reference because it is abundant, stable, and has exactly 6 protons and 6 neutrons — making it a clean, reproducible standard. Using a single proton would be problematic because the proton mass is not a neat fraction, and binding energy effects would complicate the definition for composite nuclei.\n\nThe mass of any nucleus in u is approximately equal to its nucleon number $$A$$, but always slightly less due to the mass defect.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Convert 1 u to kg, then show that 1 u corresponds to approximately 931.5 MeV of energy. (3 steps)", "answer": "- Step 1: By definition, $$1 \\text{ u} = 1.661 \\times 10^{-27} \\text{ kg}$$.\n- Step 2: Apply $$\\Delta E = \\Delta m c^2$$: $$\\Delta E = (1.661 \\times 10^{-27}) \\times (3.00 \\times 10^8)^2 = 1.661 \\times 10^{-27} \\times 9.00 \\times 10^{16} = 1.495 \\times 10^{-10} \\text{ J}$$.\n- Step 3: Convert joules to MeV: divide by $$1.6 \\times 10^{-19}$$ to get eV, then by $$10^6$$ to get MeV. $$\\frac{1.495 \\times 10^{-10}}{1.6 \\times 10^{-19}} = 9.34 \\times 10^8 \\text{ eV} = 934 \\text{ MeV}$$. The precise value using exact constants gives **931.5 MeV**.\n\nThis is the fundamental conversion that lets you go directly from mass in u to energy in MeV without intermediate steps.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "On the binding energy per nucleon graph, why do we plot binding energy *per nucleon* rather than total binding energy? (2 steps)", "answer": "- Step 1: Total binding energy increases with nucleon number $$A$$ simply because there are more nucleons to bind — a heavy nucleus naturally has a larger total binding energy than a light one. This makes direct comparison of stability misleading.\n- Step 2: Binding energy **per nucleon** ($$E_b/A$$) tells you how tightly *each individual nucleon* is bound on average. A higher value means each nucleon is more tightly held, indicating greater stability *per particle*. This allows fair comparison between nuclei of very different sizes.\n\nIron-56 has the highest binding energy per nucleon (~8.8 MeV/nucleon), making it the most stable nucleus per particle.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Describe the key features of the binding energy per nucleon vs nucleon number graph. Where does it peak, and what happens at the two extremes? (3 steps)", "answer": "- Step 1: **At low $$A$$ (light nuclei, left side):** Binding energy per nucleon is low and rises steeply. Very light nuclei like hydrogen and deuterium are loosely bound. There are notable spikes at He-4, C-12, and O-16 (especially He-4, which is anomalously stable due to its tightly-bound double-magic structure).\n- Step 2: **At the peak (around $$A \\approx 56$$, iron-56):** Binding energy per nucleon reaches its maximum of approximately 8.8 MeV/nucleon. This is the most stable configuration — nucleons are most tightly bound here.\n- Step 3: **At high $$A$$ (heavy nuclei, right side):** Binding energy per nucleon gradually decreases. Heavy nuclei like uranium are less stable per nucleon because the increasing Coulomb repulsion among many protons partially overcomes the strong nuclear force.\n\nThe graph does NOT start at $$A = 0$$ (there is no nucleus with zero nucleons), and you should mark the He-4 anomaly and the Fe-56 peak when sketching it.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "Using the binding energy per nucleon graph, explain why nuclear fission of a heavy nucleus like uranium releases energy. (3 steps)", "answer": "- Step 1: Uranium-235 sits on the **right side** of the BE/nucleon graph, where binding energy per nucleon is relatively low (about 7.6 MeV/nucleon).\n- Step 2: When U-235 fissions, it splits into two medium-mass nuclei (e.g., Ba-141 and Kr-92), which sit **closer to the peak** of the graph. These daughter nuclei have a **higher** binding energy per nucleon (around 8.5 MeV/nucleon).\n- Step 3: Since each nucleon is now more tightly bound in the daughters than in the parent, the **total binding energy has increased**. The increase in binding energy corresponds to energy **released** — the mass of the products is less than the mass of the reactants, and the mass difference is liberated as kinetic energy and gamma radiation (~200 MeV per fission event).\n\nFission climbs *up* the right slope of the BE/nucleon graph toward the peak.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Using the binding energy per nucleon graph, explain why nuclear fusion of light nuclei releases energy. (3 steps)", "answer": "- Step 1: Very light nuclei (e.g., hydrogen, deuterium, tritium) sit on the **left side** of the BE/nucleon graph, where binding energy per nucleon is very low (1–3 MeV/nucleon).\n- Step 2: When two light nuclei fuse into a heavier one (e.g., $$^2\\text{H} + ^3\\text{H} \\rightarrow ^4\\text{He} + n$$), the product nucleus sits **further right and higher** on the graph, with a higher binding energy per nucleon.\n- Step 3: The increase in binding energy per nucleon means the total binding energy increases, and the difference is released as energy. The mass of the product nucleus plus neutron is less than the mass of the two reactant nuclei — the missing mass becomes energy.\n\nFusion climbs *up* the steep left slope of the BE/nucleon graph. Per unit mass, fusion releases more energy than fission because the left slope is steeper than the right slope is gentle.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Both fission and fusion release energy, yet they are opposite processes (splitting vs joining). What single principle unifies them? (2 steps)", "answer": "- Step 1: Both processes move nuclei **toward the peak** of the binding energy per nucleon graph (near Fe-56). Fission moves heavy nuclei from the right *toward* the peak by splitting them. Fusion moves light nuclei from the left *toward* the peak by joining them.\n- Step 2: In both cases, the products have a **higher binding energy per nucleon** than the reactants. This means the products are more tightly bound, which requires less mass per nucleon. The mass difference is converted to energy via $$\\Delta E = \\Delta m c^2$$.\n\nThe unifying principle: any nuclear process that increases the total binding energy of the system releases energy. The BE/nucleon graph is the master diagram that explains both.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A student asks: \"If iron-56 is the most stable nucleus, can we get energy by both fissioning and fusing iron?\" What is wrong with this idea? (2 steps)", "answer": "- Step 1: Iron-56 sits at the **peak** of the binding energy per nucleon graph. Fissioning iron would produce lighter nuclei on the *left* of the peak — these have *lower* BE/nucleon, meaning the products are *less* tightly bound, so energy must be *supplied* (absorbed), not released.\n- Step 2: Similarly, fusing iron with another nucleus would produce a heavier nucleus on the *right* of the peak, also with *lower* BE/nucleon. Again, energy would be absorbed rather than released.\n\nIron is the \"dead end\" of nuclear energy release. Energy is only released when you move *toward* the peak, never away from it. Both fission of iron and fusion of iron are endothermic (energy-absorbing).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "In nuclear fission of U-235, a slow-moving neutron is absorbed by the uranium nucleus. Why must the neutron be *slow*, and what happens to the nucleus after absorption? (3 steps)", "answer": "- Step 1: A **slow-moving (thermal) neutron** is more likely to be captured by the U-235 nucleus. If the neutron is too fast, it passes through the nucleus without being absorbed — similar to a marble rolling too quickly over a bowl to be caught. The nucleus needs time for the strong nuclear force to \"grab\" the neutron.\n- Step 2: Once absorbed, the U-235 becomes U-236, which is highly **unstable** due to the extra neutron disrupting the balance of nuclear forces. The nucleus distorts and oscillates.\n- Step 3: The Coulomb repulsion between the protons then overcomes the strong nuclear force trying to hold the nucleus together, and the nucleus **splits** into two daughter nuclei (e.g., Ba-141 and Kr-92), plus 2–3 fast neutrons and gamma radiation.\n\nThis is **induced fission** — triggered by neutron absorption. Spontaneous fission (without a neutron) also occurs but is much rarer.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "In the fission reaction $$^{235}_{92}\\text{U} + ^1_0\\text{n} \\rightarrow ^{141}_{56}\\text{Ba} + ^{92}_{36}\\text{Kr} + 3^1_0\\text{n}$$, verify that both nucleon number and proton number are conserved. (2 steps)", "answer": "- Step 1: **Nucleon number (top):** Left side: $$235 + 1 = 236$$. Right side: $$141 + 92 + 3 \\times 1 = 236$$. ✓ Conserved.\n- Step 2: **Proton number (bottom):** Left side: $$92 + 0 = 92$$. Right side: $$56 + 36 + 3 \\times 0 = 92$$. ✓ Conserved.\n\nThese conservation laws must always be checked in nuclear equations. If they don't balance, the equation is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "What is a nuclear chain reaction, and why is a critical mass of fissile material necessary for it to be sustained? (3 steps)", "answer": "- Step 1: A chain reaction occurs when the neutrons released by one fission event go on to cause further fission events in neighbouring nuclei, which release more neutrons, causing still more fissions — a self-sustaining cascade.\n- Step 2: However, not every released neutron causes a fission. Some neutrons escape the material without hitting a nucleus, or are absorbed without causing fission. If too many neutrons are \"lost,\" the chain reaction dies out.\n- Step 3: A **critical mass** is the minimum amount of fissile material needed so that enough neutrons find targets to sustain the chain reaction. Below this mass, too high a fraction of neutrons escape through the surface, and the reaction fizzles out. Above critical mass, the reaction grows exponentially — this is the principle behind both nuclear reactors (controlled) and nuclear weapons (uncontrolled/supercritical).\n\nIn a reactor, **control rods** (made of neutron-absorbing material like boron or cadmium) are inserted to absorb excess neutrons and keep the reaction at a steady, controlled rate.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What happened at Chernobyl in terms of the physics of chain reactions? (2 steps)", "answer": "- Step 1: At Chernobyl, the **control rods** were withdrawn too far from the reactor core. This meant too few neutrons were being absorbed, and the chain reaction accelerated beyond the designed rate — the reactor went **supercritical**.\n- Step 2: The uncontrolled chain reaction produced an enormous power surge, causing a steam explosion and the release of large amounts of radioactive material. The control rods should have been re-inserted to absorb neutrons and slow the reaction, but they were not re-inserted in time.\n\nThis illustrates why control rods are essential: they regulate the neutron population to maintain a steady, controlled fission rate rather than an exponential runaway.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures (millions of kelvin) and high pressures, while fission does not? (3 steps)", "answer": "- Step 1: Fusion requires two **positively charged** nuclei to come close enough for the **strong nuclear force** to bind them. But before they get that close, they experience **Coulomb (electrostatic) repulsion** — like charges repel. This is the Coulomb barrier.\n- Step 2: To overcome this repulsion, the nuclei must have extremely high **kinetic energy** — which means extremely high temperature (temperature is a measure of average kinetic energy). In the Sun's core, temperatures reach ~15 million K, giving nuclei enough speed to approach despite the repulsion.\n- Step 3: High **pressure/density** is also needed so that nuclei are close enough together to collide frequently. Fission, by contrast, is triggered by absorbing a *neutral* neutron — there is no Coulomb barrier to overcome, so it can occur at room temperature.\n\nThis is why controlled fusion on Earth is so difficult to achieve: we must create and contain plasma at temperatures hotter than the centre of the Sun.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Write the nuclear equation for the deuterium-tritium (D-T) fusion reaction, and verify conservation of nucleon and proton numbers. (2 steps)", "answer": "- Step 1: The D-T reaction is: $$^2_1\\text{H} + ^3_1\\text{H} \\rightarrow ^4_2\\text{He} + ^1_0\\text{n}$$. Deuterium (1 proton, 1 neutron) fuses with tritium (1 proton, 2 neutrons) to form helium-4 (2 protons, 2 neutrons) plus a free neutron.\n- Step 2: Check conservation — Nucleon number: $$2 + 3 = 4 + 1 = 5$$. ✓ Proton number: $$1 + 1 = 2 + 0 = 2$$. ✓ Both conserved.\n\nThis is the reaction most fusion research on Earth focuses on, because it has the lowest temperature threshold of any fusion reaction (~100 million K) and releases 17.6 MeV per event.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "In the proton-proton chain that powers the Sun, four protons ultimately become one helium-4 nucleus. But two of the protons must become neutrons. What nuclear process enables this conversion? (2 steps)", "answer": "- Step 1: The conversion of a proton to a neutron is **beta-plus decay** (β⁺ decay), also called positron emission. In this process: $$p \\rightarrow n + e^+ + \\nu_e$$ — a proton converts into a neutron, emitting a positron and an electron neutrino.\n- Step 2: In the full pp-chain, two separate instances of beta-plus decay occur (one at each deuterium-forming step), converting two of the four protons into neutrons. This gives helium-4 its composition of 2 protons and 2 neutrons.\n\nThe overall reaction is: $$4 \\times ^1_1\\text{H} \\rightarrow ^4_2\\text{He} + 2e^+ + 2\\nu_e + \\text{energy}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "A medical tracer is injected into a patient's bloodstream to locate a tumour. Should the tracer isotope have a short or long half-life? Explain your reasoning. (2 steps)", "answer": "- Step 1: The tracer should have a **short half-life** (minutes to hours). It needs to be radioactive long enough to be detected during the scan, but not so long that it continues irradiating the patient after the procedure is complete.\n- Step 2: A long half-life isotope would remain radioactive in the body for days, months, or years, causing unnecessary radiation exposure. A short half-life isotope decays quickly after the scan is done, minimising the radiation dose to the patient.\n\nFor example, technetium-99m ($$t_{1/2} \\approx 6$$ hours) is commonly used — active enough for imaging, but decays away within a day or two.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Uranium-238 has a half-life of 4.5 billion years — roughly the age of the Earth. Explain how this fact is used in uranium-lead dating. (2 steps)", "answer": "- Step 1: Uranium-238 decays through a long chain of intermediate isotopes, ultimately ending as lead-206 (a stable isotope). By measuring the **ratio** of U-238 to Pb-206 in a rock sample, we can determine how many half-lives have passed since the rock solidified (which \"locked in\" the uranium).\n- Step 2: If roughly half the original uranium has decayed to lead, the rock is about one half-life old (~4.5 billion years). A higher proportion of lead means the rock is older. This method is one of the primary tools for dating the oldest rocks on Earth and meteorites.\n\nSince uranium is only created in supernovae (exploding stars), all uranium on Earth was formed before the Earth itself — making this dating method possible.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Helium-4 has an unusually high binding energy per nucleon compared to its neighbours on the BE/nucleon graph. Why is He-4 so anomalously stable? (2 steps)", "answer": "- Step 1: He-4 consists of exactly 2 protons and 2 neutrons. This fills the first nuclear shell completely (analogous to how filling electron shells gives noble gas stability in chemistry). Both the proton and neutron shells are \"closed\" simultaneously.\n- Step 2: This \"double magic\" configuration (2 protons, 2 neutrons — both magic numbers) makes He-4 exceptionally tightly bound. It appears as a noticeable spike on the BE/nucleon graph, sitting well above the general trend for light nuclei.\n\nThis is why alpha particles (He-4 nuclei) are so commonly emitted in alpha decay — the extreme stability of He-4 makes it a favourable decay product.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "A sample has an initial activity of 320 Bq and a half-life of 15 minutes. What is its activity after 1 hour? (2 steps)", "answer": "- Step 1: Number of half-lives = $$60 \\text{ min} / 15 \\text{ min} = 4$$ half-lives.\n- Step 2: $$A = 320 \\times (1/2)^4 = 320 \\times (1/16) = 20 \\text{ Bq}$$.\n\nAfter 4 half-lives, the activity has dropped to 1/16th of its original value — a factor of $$2^4 = 16$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A nucleus has a mass defect of $$\\Delta m = 0.1 \\text{ u}$$. What is its binding energy in MeV? (1 step)", "answer": "- Step 1: $$\\Delta E = 0.1 \\times 931.5 = 93.15 \\text{ MeV}$$. Using the direct conversion $$1 \\text{ u} \\leftrightarrow 931.5 \\text{ MeV}/c^2$$, we simply multiply.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Oxygen-16 has a binding energy per nucleon of approximately 8.0 MeV. What is the total binding energy of an oxygen-16 nucleus? (2 steps)", "answer": "- Step 1: Oxygen-16 has 16 nucleons (8 protons + 8 neutrons). The binding energy per nucleon is 8.0 MeV.\n- Step 2: Total binding energy = binding energy per nucleon × number of nucleons = $$8.0 \\times 16 = 128 \\text{ MeV}$$. This is the energy needed to completely separate the nucleus into individual protons and neutrons.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A student says: \"Fission releases energy because the nucleus splits into smaller pieces, and smaller things always have less energy.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The student's logic is vague and incorrect. \"Smaller things having less energy\" is not a valid physics principle. A single proton and a single neutron each have *more* mass-energy per particle than they do when bound inside a nucleus.\n- Step 2: Fission releases energy because the **binding energy per nucleon increases** when the heavy nucleus splits into medium-mass nuclei. The products are more tightly bound (higher BE/nucleon), which means they have *less mass per nucleon*. The mass difference is released as energy. It is the change in binding energy that matters, not the size of the fragments.\n\nThe correct explanation always traces back to the BE/nucleon graph: fission moves nuclei up the right slope toward the peak.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "A student claims: \"Fusion is just the reverse of fission, so they should release the same amount of energy.\" Evaluate this claim. (3 steps)", "answer": "- Step 1: Fusion and fission are \"reverse\" in the sense that fusion joins nuclei and fission splits them. But they operate on **different regions** of the BE/nucleon graph, so the energy released per nucleon is different.\n- Step 2: Fusion operates on the **left side** of the graph, where the slope is very steep. Moving up this steep slope means a large change in BE/nucleon for a small change in $$A$$ — so fusion releases a large amount of energy per unit mass.\n- Step 3: Fission operates on the **right side**, where the slope is gentle. Moving up this gentle slope means a smaller change in BE/nucleon — so fission releases less energy per unit mass than fusion. Per kilogram of fuel, fusion releases roughly 3–4 times more energy than fission.\n\nThey are not simply \"reverses\" — they are different processes on different parts of the same graph, with different energy yields.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "When using $$A = \\lambda N$$, a student substitutes the *mass* of the sample in grams for $$N$$. Why is this wrong, and what must you do instead? (2 steps)", "answer": "- Step 1: $$N$$ in the equation $$A = \\lambda N$$ represents the **number of nuclei** (a pure count), not the mass. Mass in grams and number of nuclei are related but not the same thing — each nucleus has a tiny mass, so there are enormous numbers of nuclei in even a small mass.\n- Step 2: To find $$N$$ from a given mass, use: $$N = \\frac{\\text{mass} \\times N_A}{\\text{molar mass}}$$, where $$N_A = 6.02 \\times 10^{23} \\text{ mol}^{-1}$$ is Avogadro's number. For example, 1 μg of americium-241 contains about $$1.27 \\times 10^{16}$$ nuclei — a vastly different number from the mass in grams.\n\nAlways check: $$N$$ must be dimensionless (a count of nuclei), not in grams or kilograms.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Strontium-90 has a decay constant of $$0.025 \\text{ year}^{-1}$$. Without doing a full calculation, estimate what fraction of the original activity remains after 5 years. Is it closer to 50%, 88%, or 95%? (2 steps)", "answer": "- Step 1: Use $$A = A_0 e^{-\\lambda t}$$. The exponent is $$-\\lambda t = -0.025 \\times 5 = -0.125$$. This is a relatively small number, so the activity won't have dropped much.\n- Step 2: $$e^{-0.125} \\approx 1 - 0.125 = 0.875$$ (using the small-angle approximation). So approximately **88%** of the original activity remains. The exact value is $$e^{-0.125} \\approx 0.882$$, confirming the estimate.\n\nFor small $$\\lambda t$$, the fraction remaining is approximately $$1 - \\lambda t$$.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "A sample's half-life is 6 hours. After how many hours will the activity drop to approximately 1/8th of the initial value? (1 step)", "answer": "- Step 1: $$1/8 = (1/2)^3$$, so 3 half-lives are needed. Time = $$3 \\times 6 = 18 \\text{ hours}$$. After 3 half-lives, the activity is always 1/8th of the original.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "Explain why a Geiger counter placed near a radioactive source shows fluctuating (irregular) count rates even when the source's half-life is much longer than the observation time. (2 steps)", "answer": "- Step 1: Each individual decay is a **random** event. The Geiger counter detects discrete counts — each count represents one nucleus decaying at an unpredictable moment. This inherent randomness causes the count rate to fluctuate from one second to the next.\n- Step 2: Over a long averaging period, these fluctuations average out and the count rate follows the smooth exponential decay. But over short intervals, the statistical variation (Poisson statistics) is noticeable. The larger the count rate, the smaller the *relative* fluctuations — this is why a large sample gives more predictable measurements.\n\nThese fluctuations are themselves evidence for the random nature of nuclear decay.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "A fission reaction releases 2–3 neutrons per event. In a nuclear weapon, these neutrons cause a supercritical chain reaction. In a nuclear power reactor, the chain reaction is controlled. What physical mechanism allows this control? (2 steps)", "answer": "- Step 1: **Control rods** made of materials that strongly absorb neutrons (such as boron or cadmium) are inserted among the fuel rods. By absorbing some of the neutrons, they reduce the number available to cause further fission events.\n- Step 2: By adjusting how far the control rods are inserted, operators can control the **neutron multiplication factor** — the average number of fissions caused by neutrons from each previous fission. When this factor equals exactly 1, the reaction is steady (critical). When less than 1, it dies down (subcritical). When greater than 1, it grows (supercritical — as in a bomb).\n\nThe control rods effectively \"throttle\" the chain reaction by competing with the fuel for neutrons.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Why is it impossible to use nuclear fusion as a sustained energy source on Earth with current technology, even though it works naturally in the Sun? (3 steps)", "answer": "- Step 1: Fusion requires nuclei to overcome **Coulomb repulsion** to get close enough for the strong nuclear force to bind them. This requires temperatures of ~100 million K (for the D-T reaction) or higher.\n- Step 2: At these temperatures, matter exists as **plasma** — a hot, ionised gas. No solid container can hold plasma at these temperatures; the container would melt or vaporise instantly. Instead, magnetic confinement (tokamaks) or inertial confinement (laser compression) must be used, both of which are extremely challenging to sustain.\n- Step 3: In the Sun, the enormous **gravitational pressure** of the star's mass confines the plasma naturally. On Earth, we lack this gravitational confinement, so we must achieve even higher temperatures to compensate. So far, we have not been able to sustain fusion for long enough or efficiently enough to produce net energy gain consistently.\n\nThe ITER project in southern France is the current leading effort to achieve sustained fusion.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "A student calculates the mass defect of a nucleus as $$\\Delta m = 8.68 \\times 10^{-28} \\text{ kg}$$. Calculate the binding energy in joules, then convert to MeV. Use $$c = 3.0 \\times 10^8 \\text{ m/s}$$. (3 steps)", "answer": "- Step 1: Apply $$\\Delta E = \\Delta m c^2$$: $$\\Delta E = 8.68 \\times 10^{-28} \\times (3.0 \\times 10^8)^2 = 8.68 \\times 10^{-28} \\times 9.0 \\times 10^{16} = 7.81 \\times 10^{-11} \\text{ J}$$.\n- Step 2: Convert to eV by dividing by $$1.6 \\times 10^{-19}$$: $$\\frac{7.81 \\times 10^{-11}}{1.6 \\times 10^{-19}} = 4.88 \\times 10^8 \\text{ eV}$$.\n- Step 3: Convert to MeV by dividing by $$10^6$$: $$488 \\text{ MeV}$$. For Fe-56 (56 nucleons), this gives a binding energy per nucleon of approximately $$488/56 \\approx 8.7 \\text{ MeV/nucleon}$$, consistent with the peak of the BE/nucleon graph.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "Why can't a single gamma-ray photon undergo pair production in empty space, even if it has enough energy? What must be present? (2 steps)", "answer": "- Step 1: A single photon in empty space cannot produce a particle-antiparticle pair because while energy could be conserved (if the photon has at least $$2mc^2$$), **momentum cannot be conserved**. A photon always has momentum $$p = E/c$$, but the produced pair can have zero total momentum in their centre-of-mass frame.\n- Step 2: A **nearby nucleus** (or other massive particle) must be present to absorb the recoil momentum. The nucleus takes up the excess momentum with negligible kinetic energy change (due to its large mass), allowing both energy and momentum to be conserved simultaneously.\n\nThis is why pair production always occurs near a nucleus — the nucleus acts as a \"momentum sink.\"", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "When sketching the binding energy per nucleon graph in an exam, list three common mistakes to avoid. (3 steps)", "answer": "- Step 1: **Do not start the curve at $$A = 0$$.** There is no nucleus with zero nucleons. The graph should begin at the first data point (around $$A = 1$$ or 2).\n- Step 2: **Do not forget to mark the He-4 anomaly.** Helium-4 sits noticeably above the general trend on the left side and should be marked with a cross or dot above the curve.\n- Step 3: **Do label both axes with units** (binding energy per nucleon in MeV, nucleon number with no units) and **mark the peak at Fe-56** with approximate values (~8.8 MeV/nucleon at $$A \\approx 56$$). Include numbers on the axes, especially near the peak.\n\nThese are the specific features examiners look for when marking this graph.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A radioactive source has a measured count rate of 120 counts per minute. The background radiation is 20 counts per minute. What is the corrected count rate, and why does this matter for half-life calculations? (2 steps)", "answer": "- Step 1: Corrected count rate = measured count rate − background = $$120 - 20 = 100 \\text{ counts per minute}$$. This represents the radiation from the source alone.\n- Step 2: This matters because half-life is defined in terms of the source's activity, not the total detected radiation. If you use the uncorrected count rate, the decay curve will approach 20 (not zero), and the apparent half-life will be wrong — the curve appears to flatten out at the background level rather than continuing to decay.\n\nThe corrected count rate follows the true exponential decay: $$A_{\\text{corrected}} = A_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Carbon-14 has a half-life of 5730 years. Estimate its decay constant in $$\\text{s}^{-1}$$, stating your approach. (2 steps)", "answer": "- Step 1: Use $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. First convert the half-life to seconds: $$t_{1/2} = 5730 \\times 365 \\times 24 \\times 3600 \\approx 5730 \\times 3.156 \\times 10^7 \\approx 1.81 \\times 10^{11} \\text{ s}$$.\n- Step 2: $$\\lambda = \\frac{0.693}{1.81 \\times 10^{11}} \\approx 3.83 \\times 10^{-12} \\text{ s}^{-1}$$. This very small decay constant reflects the very long half-life — each nucleus has only a tiny probability of decaying in any given second.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "A student argues: \"If I wait long enough, all the radioactive nuclei in a sample will eventually decay, so the number remaining reaches exactly zero.\" Is this strictly correct? Explain. (2 steps)", "answer": "- Step 1: Mathematically, the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ never actually reaches zero — as $$t \\to \\infty$$, $$N$$ approaches zero asymptotically but never equals it. The equation predicts an ever-diminishing but always positive number of nuclei.\n- Step 2: Physically, however, $$N$$ must be an integer. In practice, once the number of remaining nuclei becomes very small (e.g., 1 or 2), the statistical description breaks down and the last few nuclei will eventually decay. So in reality, the sample does reach zero — but the exponential model, which is a continuous approximation for large numbers, doesn't capture this final stage.\n\nThe exponential model is an excellent approximation for large $$N$$ but is not exact for the very last nuclei.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "In a nuclear reactor, why are the fuel rods made of uranium encased in metal cladding rather than being a single large block of uranium? (2 steps)", "answer": "- Step 1: A single large block would allow neutrons to travel freely throughout, potentially leading to an uncontrolled chain reaction (supercriticality). The cladding and the spacing between rods allow **moderation** and **control** of the neutron population.\n- Step 2: Additionally, the cladding prevents the radioactive fission products from escaping into the coolant. The rods are spaced to allow a **moderator** (like water or graphite) to slow down the fast neutrons to thermal energies, making them more likely to be absorbed by U-235 and sustain the chain reaction efficiently.\n\nThe geometry of fuel rods, moderator, and control rods working together is what makes a controlled, steady fission reaction possible.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A sample of a radioactive isotope with half-life 2 hours has an initial activity of 480 Bq. After 6 hours, what is its activity? Then, if you started with 4800 nuclei, how many remain after 6 hours? (2 steps)", "answer": "- Step 1: Number of half-lives = $$6/2 = 3$$. Activity after 3 half-lives: $$A = 480 \\times (1/2)^3 = 480/8 = 60 \\text{ Bq}$$.\n- Step 2: Similarly, nuclei remaining: $$N = 4800 \\times (1/2)^3 = 4800/8 = 600 \\text{ nuclei}$$. Notice that activity and number of nuclei both halve with each half-life, as expected from $$A = \\lambda N$$.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "Why is it that per kilogram of fuel, fusion releases more energy than fission? Refer to the BE/nucleon graph in your answer. (2 steps)", "answer": "- Step 1: On the BE/nucleon graph, the **left slope** (where fusion occurs) is very **steep** — binding energy per nucleon increases rapidly with nucleon number. The **right slope** (where fission occurs) is **gentle** — binding energy per nucleon decreases slowly with nucleon number.\n- Step 2: Because the left slope is steeper, a given change in nucleon number during fusion produces a larger change in BE/nucleon than the same-sized change during fission. This means more energy is released per nucleon in fusion than in fission, and therefore more energy per kilogram of fuel.\n\nThis is why hydrogen bombs (which use fusion) are vastly more powerful than fission bombs of the same mass.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}], "count": 54}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A radioactive sample contains billions of nuclei. If you could watch a single nucleus, could you predict exactly when it will decay? Why or why not? (2 steps)", "answer": "- Step 1: No, you cannot predict when a specific nucleus will decay. Radioactive decay is a random process — each nucleus has a constant probability of decaying in any given time interval, but there is no way to know which nucleus will decay at which moment.\n- Step 2: However, with a very large sample (billions of nuclei), statistical laws take over. While individual decays are unpredictable, the overall behaviour of the sample follows a predictable exponential pattern. This is why we can define quantities like half-life and activity — they describe the statistical average, not individual events.\n\nThink of it like flipping coins: you can't predict one flip, but with a million flips you can confidently say ~50% will be heads.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" These are two distinct properties. What does each one mean, and what is the key difference between them? (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay cannot be influenced by external environmental factors. Temperature, pressure, chemical bonds, or magnetic fields cannot speed up or slow down the decay. The nucleus decays on its own, without an external trigger.\n- Step 2: **Random** means the exact time at which any particular nucleus decays cannot be predicted. Each nucleus has the same constant probability of decaying per unit time, but you cannot say \"nucleus #47 will decay at t = 3.2 s.\"\n- Step 3: The key difference: \"spontaneous\" is about *external influence* (none can affect it), while \"random\" is about *predictability* (you can't predict the moment of decay for an individual). A process can be one without the other in principle, but nuclear decay is both.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "The decay constant λ is defined as \"the probability per unit time that a given nucleus will decay.\" If λ = 0.01 s⁻¹, does this mean a nucleus is guaranteed to decay within 100 seconds? Why or why not? (2 steps)", "answer": "- Step 1: No, it does not guarantee decay within 100 seconds. The decay constant gives a probability *per unit time*, not a certainty. In any one-second interval, there is a 1% chance the nucleus decays — but this probability does not accumulate to 100% over 100 seconds.\n- Step 2: The correct interpretation is that for a large sample, λ tells us the *fraction* of nuclei that will decay per second on average. For an individual nucleus, even after 100 seconds there is a probability of $$e^{-\\lambda t} = e^{-0.01 \\times 100} = e^{-1} \\approx 0.37$$ (about 37%) that it still has not decayed. The nucleus never becomes \"due\" to decay — the probability in each second remains the same.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Activity is measured in Becquerels (Bq). What does 1 Bq represent physically, and how is activity related to the number of undecayed nuclei and the decay constant? (2 steps)", "answer": "- Step 1: 1 Bq equals one decay per second. It measures the rate at which nuclei in a sample are decaying. If a source has an activity of 100 Bq, then on average 100 nuclei decay every second.\n- Step 2: The relationship is $$A = \\lambda N$$, where A is activity (Bq), λ is the decay constant (s⁻¹), and N is the number of undecayed nuclei remaining. This makes intuitive sense: if each nucleus has a probability λ of decaying per second, and there are N nuclei, then the expected number of decays per second is λ × N. A larger sample (more nuclei) or a more unstable isotope (larger λ) both lead to higher activity.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A sample has 10,000 nuclei and a decay constant of 0.05 s⁻¹. Roughly how many decays occur in the first second, and why is this only an approximation? (2 steps)", "answer": "- Step 1: Using $$A = \\lambda N = 0.05 \\times 10{,}000 = 500$$ decays per second. So approximately 500 nuclei decay in the first second.\n- Step 2: This is an approximation because during that one second, N is continuously decreasing as nuclei decay. The activity of 500 Bq is the *initial* rate — by the end of the second, N has already dropped (to roughly 9,500), so the true average rate is slightly less than 500. For small λ × Δt, the approximation is good; for large λ × Δt, you must use the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ instead.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Starting from the differential equation $$\\frac{dN}{dt} = -\\lambda N$$, derive the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. (3 steps)", "answer": "- Step 1: Rearrange the differential equation to separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$\n- Step 2: Integrate both sides. The left side from $$N_0$$ to N, the right side from 0 to t: $$\\int_{N_0}^{N} \\frac{dN}{N} = -\\lambda \\int_{0}^{t} dt$$, giving $$\\ln N - \\ln N_0 = -\\lambda t$$, or $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$\n- Step 3: Exponentiate both sides: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, therefore $$N = N_0 e^{-\\lambda t}$$. This shows the number of undecayed nuclei decreases exponentially — it never reaches zero but keeps getting closer to it asymptotically.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Since activity A = λN and N = N₀e^(−λt), what is the exponential decay equation for activity? Does activity decay with the same half-life as the number of nuclei? (2 steps)", "answer": "- Step 1: Substituting N = N₀e^(−λt) into A = λN gives $$A = \\lambda N_0 e^{-\\lambda t}$$. Since $$A_0 = \\lambda N_0$$ (the initial activity), we can write $$A = A_0 e^{-\\lambda t}$$. Activity follows the same exponential form.\n- Step 2: Yes, activity decays with exactly the same half-life as the number of nuclei. This is because A is directly proportional to N (A = λN, and λ is constant). When N halves, A also halves. So the half-life for activity and for nuclei count are identical — they are two ways of describing the same underlying decay process.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Derive the half-life formula $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ starting from the exponential decay equation. (3 steps)", "answer": "- Step 1: Start with $$N = N_0 e^{-\\lambda t}$$. By definition, after one half-life ($$t = t_{1/2}$$), the number of nuclei has halved: $$N = \\frac{N_0}{2}$$.\n- Step 2: Substitute: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$. Divide both sides by N₀: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take the natural logarithm: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, which gives $$-\\ln 2 = -\\lambda t_{1/2}$$.\n- Step 3: Simplify: $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$. This shows half-life and decay constant are inversely proportional — a large λ (high probability of decay per second) means a short half-life, and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Isotope X has a half-life of 10 seconds and isotope Y has a half-life of 1000 years. Which has the larger decay constant, and what does this tell you about their relative instability? (2 steps)", "answer": "- Step 1: Since $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$, the isotope with the shorter half-life has the larger decay constant. Isotope X (t½ = 10 s) has a much larger λ than isotope Y (t½ = 1000 years).\n- Step 2: A larger λ means each nucleus has a higher probability of decaying per second — isotope X is far more unstable. It decays rapidly, losing its radioactivity quickly. Isotope Y is relatively stable; it remains radioactive for a very long time but with much lower activity per nucleus. This is why medical tracers use short-half-life isotopes (they don't linger in the body) while nuclear waste from uranium fission is dangerous for millennia.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A sample starts with activity 800 Bq and has a half-life of 20 minutes. After 1 hour, what is the activity? Walk through the reasoning without just plugging into a formula. (3 steps)", "answer": "- Step 1: Determine how many half-lives have passed. One half-life = 20 minutes. One hour = 60 minutes = 3 × 20 minutes. So 3 half-lives have elapsed.\n- Step 2: After each half-life, the activity halves. After 1 half-life: 800 → 400 Bq. After 2 half-lives: 400 → 200 Bq. After 3 half-lives: 200 → 100 Bq.\n- Step 3: The activity after 1 hour is 100 Bq. Equivalently, using the formula: $$A = 800 \\times \\left(\\frac{1}{2}\\right)^3 = 800 \\times \\frac{1}{8} = 100$$ Bq. The \"magic table\" method (listing half-lives, time, and activity in rows) is a reliable way to avoid mistakes.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A sample of 8 grams of polonium decays to 0.25 grams. How many half-lives have passed, and what is the key pattern to recognise? (2 steps)", "answer": "- Step 1: Work through successive halvings: 8 → 4 → 2 → 1 → 0.5 → 0.25 grams. That required 5 halvings, so 5 half-lives have passed.\n- Step 2: The key pattern is that each half-life divides the quantity by 2, not subtracts a fixed amount. After n half-lives, the remaining quantity is $$N_0 \\times \\left(\\frac{1}{2}\\right)^n$$. A common mistake is to think the decrease is linear (subtracting the same amount each time). It is multiplicative — the *fraction* remaining is always ½ per half-life, but the *amount* lost gets smaller each time.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "A sample's half-life is 164 seconds. After 820 seconds, by what factor has the mass decreased? (2 steps)", "answer": "- Step 1: Calculate the number of half-lives: $$n = \\frac{820}{164} = 5$$ half-lives.\n- Step 2: After 5 half-lives, the remaining mass is $$m_0 \\times \\left(\\frac{1}{2}\\right)^5 = \\frac{m_0}{32}$$. So the mass has decreased by a factor of 32. The original mass is 32 times the remaining mass. This exponential shrinking means that even modest numbers of half-lives produce dramatic reductions — after 10 half-lives the factor would be 1024.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When measuring the count rate from a radioactive source, why must you subtract the background count rate before performing half-life calculations? (2 steps)", "answer": "- Step 1: The Geiger counter detects *all* radiation hitting it, including background radiation from cosmic rays, radon gas, and other natural/man-made sources. This background count is always present and does not change over time — it is not related to your source.\n- Step 2: Half-life calculations assume the count rate is entirely from the radioactive source, which decays exponentially. If you don't subtract the background, the count rate never approaches zero — it plateaus at the background level. This distorts the exponential curve and leads to an incorrect half-life. The corrected count rate = measured count rate − background count rate.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "A student measures a count rate of 115 counts per minute from a source, and the background rate (measured with no source) is 15 counts per minute. What is the corrected count rate, and why does this matter for half-life graphs? (2 steps)", "answer": "- Step 1: Corrected count rate = 115 − 15 = 100 counts per minute. This is the count rate due to the source alone.\n- Step 2: This matters because a half-life graph of uncorrected data would level off at 15 counts per minute rather than approaching zero. If you tried to find the half-life by looking for when the count rate halves (from 115 to 57.5), you'd get the wrong answer because the background adds a constant offset. You must subtract background first, then find when the corrected rate halves (from 100 to 50).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "What is mass defect (mass deficit), and why is a bound nucleus lighter than the sum of its separated protons and neutrons? (3 steps)", "answer": "- Step 1: Mass defect Δm is the difference between the measured mass of a nucleus and the sum of the masses of its individual constituent nucleons: $$\\Delta m = Zm_p + (A-Z)m_n - m_{total}$$. It is always positive for a bound nucleus.\n- Step 2: The reason is mass-energy equivalence ($$\\Delta E = \\Delta m c^2$$). When nucleons come together to form a nucleus, energy is released (the binding energy). Since mass and energy are interchangeable, releasing energy means losing mass.\n- Step 3: Think of it this way: it costs energy to pull the nucleus apart (binding energy). That energy was released when the nucleus formed, and the mass that \"disappeared\" is exactly equivalent to that energy. A bound system always has less mass than its separated components — the missing mass is the \"price\" of being bound.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Binding energy is sometimes described as \"the energy stored in the nucleus.\" Why is this description incorrect, and what is the correct definition? (2 steps)", "answer": "- Step 1: The incorrect description suggests the nucleus *contains* this energy, as if it's sitting inside waiting to be released. This is wrong — a bound nucleus has *less* energy than its separated nucleons, not more.\n- Step 2: The correct definition: binding energy is the energy *required* to completely separate a nucleus into its individual protons and neutrons. It is the energy you must *put in* to break the nucleus apart. Equivalently, it is the energy *released* when the nucleons combine to form the nucleus. A higher binding energy means a more tightly bound (more stable) nucleus — it takes more energy to pull it apart.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "A nucleus has a mass defect of 0.03 u. Calculate its binding energy in MeV. Walk through the unit conversion. (3 steps)", "answer": "- Step 1: The key conversion is 1 u = 931.5 MeV/c². This means a mass of 1 u is equivalent to 931.5 MeV of energy (via $$E = mc^2$$).\n- Step 2:
