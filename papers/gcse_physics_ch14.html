*Graphical Method (More Accurate):** Plot a graph of total energy supplied ($$\\Delta Q$$ on the y-axis) against $$m\\Delta\\theta$$ (on the x-axis). The relationship is $$\\Delta Q = c(m\\Delta\\theta)$$, which is in the form $$y = \\text{gradient} \\times x$$. Therefore, the **gradient of the straight-line portion of this graph will give the specific heat capacity ($$c$$)**. This method helps to average out random errors and identify regions where heat loss might be significant (deviations from linearity).", "source": "Gemini Flash ②", "_id": "gflash_2_29", "judge_pick": false}, {"question": "In the Core Practical 6 for determining the specific heat capacity of water, what are common sources of error, and how would these errors typically affect the calculated value of $$c$$? (2 steps)", "answer": "- Step 1: **Common Sources of Error**\n    +   **Heat Loss to Surroundings:** This is the most significant error. Heat energy from the heater (and water) is not entirely absorbed by the water; some is lost to the air, the beaker, the thermometer, and the heater itself (heating the heater coil).\n    +   **Incomplete Mixing:** If the water is not stirred, there can be temperature gradients, meaning the thermometer might not be reading the average temperature of the entire mass of water.\n    +   **Measurement Inaccuracies:** Errors in reading the thermometer, ammeter, voltmeter, or stopwatch, or in measuring the mass of water.\n    +   **Initial Heating of Apparatus:** Some energy initially heats the beaker and immersion heater components themselves before effectively heating the water.\n- Step 2: **Effect on Calculated Value of $$c$$**\n    +   **Due to Heat Loss to Surroundings:** If heat is lost to the surroundings, the measured $$\\Delta Q$$ (from $$VIt$$) will be *higher* than the actual energy absorbed by the water for a given temperature rise. Since $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$, a larger $$\\Delta Q$$ (numerator) will lead to an **overestimated (too high)** value for the calculated specific heat capacity. This is why the instruction is to use the straight-line region of the graph, as initial heat losses and final cooling effects can make it non-linear.\n    +   **Due to Incomplete Mixing:** If the thermometer reads a lower-than-average temperature, the measured $$\\Delta\\theta$$ would be *underestimated*. This would also lead to an **overestimated** $$c$$ value.\n    +   **Due to Initial Heating of Apparatus:** Similar to heat loss, some of the measured electrical energy ($$VIt$$) is used to heat the apparatus itself, not just the water. This also means the calculated $$\\Delta Q$$ for the water is effectively too high, leading to an **overestimated** $$c$$ value.\n    Overall, the specific heat capacity of water determined experimentally often comes out higher than the accepted value ($$4200 \\text{ J/kg}^\\circ\\text{C}$$) due to these energy losses.", "source": "Gemini Flash ②", "_id": "gflash_2_30", "judge_pick": false}, {"question": "Describe the experimental procedure for Core Practical 6 to obtain a temperature-time graph for melting ice. What key feature would this graph show, and what does it demonstrate about energy transfer during a state change? (3 steps)", "answer": "- Step 1: **Experimental Procedure**\n    +   **Setup:** Half-fill a beaker with crushed ice. Insert a thermometer into the ice, ensuring the bulb is fully submerged and touching the ice (not just in air pockets). The beaker is placed on a tripod and gauze, ready for gentle heating (e.g., with a Bunsen burner or immersion heater). A stopwatch is needed to record time.\n    +   **Measurements:**\n        +   Start the stopwatch.\n        +   Record the temperature of the ice every minute (or 30 seconds) as it is gently heated.\n        +   Continue recording temperature until all the ice has melted and the water begins to warm up significantly (e.g., up to $$20-30^\\circ\\text{C}$$).\n        +   Stir the ice-water mixture regularly to ensure an even temperature distribution throughout.\n- Step 2: **Key Feature of the Graph**\n    When plotting temperature (y-axis) against time (x-axis), the graph will show a distinctive shape:\n    +   Initially, the temperature of the ice will rise from its starting point (e.g., $$-10^\\circ\\text{C}$$) up to $$0^\\circ\\text{C}$$. This is an upward-sloping line.\n    +   At $$0^\\circ\\text{C}$$, the graph will show a **flat, horizontal plateau**. During this plateau, the temperature remains constant at $$0^\\circ\\text{C}$$ even though heat is continuously being supplied.\n    +   After all the ice has melted, the temperature of the water will start to rise again (from $$0^\\circ\\text{C}$$ upwards). This will be another upward-sloping line.\n- Step 3: **Demonstration of Energy Transfer**\n    The flat plateau at $$0^\\circ\\text{C}$$ is the key feature. It demonstrates that during a change of state (in this case, melting), the energy being supplied to the substance is *not* used to increase its temperature. Instead, this energy (the specific latent heat of fusion) is used to:\n    +   Increase the **potential energy** of the water molecules.\n    +   Break the intermolecular bonds holding the water molecules in the rigid lattice structure of ice.\n    +   Allow the molecules to move more freely and slide past each other, transitioning from a solid to a liquid state.\n    The average kinetic energy of the particles, which determines temperature, remains constant until the entire mass of ice has changed into liquid water.", "source": "Gemini Flash ②", "_id": "gflash_2_31", "judge_pick": false}, {"question": "A small, insulated container holds $$0.1 \\text{ kg}$$ of ice at $$-10^\\circ\\text{C}$$. If you supply $$40,000 \\text{ J}$$ of thermal energy to this ice, conceptually describe what will happen to the ice and water, without doing exact calculations. Use the following values:\n*   $$c_{\\text{ice}} = 2100 \\text{ J/kg}^\\circ\\text{C}$$\n*   $$L_f = 330,000 \\text{ J/kg}$$\n*   $$c_{\\text{water}} = 4200 \\text{ J/kg}^\\circ\\text{C}$$ (4 steps)", "answer": "- Step 1: **Energy to Warm the Ice to its Melting Point**\n    First, the supplied energy will be used to raise the temperature of the ice from $$-10^\\circ\\text{C}$$ to its melting point, $$0^\\circ\\text{C}$$.\n    +   The temperature change needed is $$\\Delta\\theta = 0^\\circ\\text{C} - (-10^\\circ\\text{C}) = 10^\\circ\\text{C}$$.\n    +   Energy required for this phase: $$Q_{\\text{ice_warm}} = m c_{\\text{ice}} \\Delta\\theta = (0.1 \\text{ kg}) \\times (2100 \\text{ J/kg}^\\circ\\text{C}) \\times (10^\\circ\\text{C}) = 2100 \\text{ J}$$.\n    +   After this, the ice is at $$0^\\circ\\text{C}$$, and we have $$40,000 \\text{ J} - 2100 \\text{ J} = 37,900 \\text{ J}$$ remaining.\n- Step 2: **Energy to Melt the Ice at $$0^\\circ\\text{C}$$**\n    Next, the remaining energy will be used to melt the ice at $$0^\\circ\\text{C}$$ into water at $$0^\\circ\\text{C}$$.\n    +   The total energy required to melt all $$0.1 \\text{ kg}$$ of ice is $$Q_{\\text{melt_total}} = m L_f = (0.1 \\text{ kg}) \\times (330,000 \\text{ J/kg}) = 33,000 \\text{ J}$$.\n    +   Since we have $$37,900 \\text{ J}$$ remaining, which is more than $$33,000 \\text{ J}$$, all the ice will melt.\n    +   After melting, we have $$37,900 \\text{ J} - 33,000 \\text{ J} = 4900 \\text{ J}$$ remaining. All the substance is now $$0.1 \\text{ kg}$$ of water at $$0^\\circ\\text{C}$$.\n- Step 3: **Energy to Warm the Water**\n    The final remaining energy will be used to raise the temperature of the now-liquid water from $$0^\\circ\\text{C}$$.\n    +   We have $$4900 \\text{ J}$$ to warm $$0.1 \\text{ kg}$$ of water (with $$c_{\\text{water}} = 4200 \\text{ J/kg}^\\circ\\text{C}$$).\n    +   The temperature rise will be $$\\Delta\\theta_{\\text{water_warm}} = \\frac{Q_{\\text{remaining}}}{m c_{\\text{water}}} = \\frac{4900 \\text{ J}}{(0.1 \\text{ kg}) \\times (4200 \\text{ J/kg}^\\circ\\text{C})} = \\frac{4900}{420} \\approx 11.67^\\circ\\text{C}$$.\n- Step 4: **Conclusion**\n    Initially, the $$40,000 \\text{ J}$$ of energy will first warm the ice from $$-10^\\circ\\text{C}$$ to $$0^\\circ\\text{C}$$. Then, it will completely melt all the ice into water at $$0^\\circ\\text{C}$$. Finally, the remaining energy will warm the resulting $$0.1 \\text{ kg}$$ of liquid water from $$0^\\circ\\text{C}$$ to approximately $$11.7^\\circ\\text{C}$$.\n    The final state of the substance will be $$0.1 \\text{ kg}$$ of water at roughly $$11.7^\\circ\\text{C}$$.", "source": "Gemini Flash ②", "_id": "gflash_2_32", "judge_pick": true}, {"question": "Explain Brownian motion, what is observed, and how it serves as direct evidence for the existence and random motion of particles in a fluid. Include a common misconception. (3 steps)", "answer": "- Step 1: **Observation of Brownian Motion**\n    Brownian motion is the random, zig-zag movement of microscopic particles (like smoke particles or pollen grains) suspended in a fluid (a liquid or a gas). When observed under a microscope, these visible particles are seen to move erratically, changing direction suddenly and unpredictably.\n- Step 2: **Explanation at the Particle Level**\n    This seemingly spontaneous motion is not due to the visible particles themselves being alive or having internal propulsion. Instead, it is caused by the invisible, much smaller, and constantly moving molecules of the fluid (air or water) **colliding randomly and unevenly** with the larger suspended particles.\n    +   The fluid molecules are in continuous, rapid, and random motion (as predicted by the kinetic theory of gases/liquids).\n    +   When many fluid molecules strike a suspended particle from one side, they impart a net force that pushes it in that direction.\n    +   Because the collisions are random and occurring from all sides, the net force on the particle changes continuously in magnitude and direction, leading to its characteristic zig-zag path.\n- Step 3: **Evidence for Particles and Misconception**\n    +   **Evidence:** Brownian motion provides compelling, direct visual evidence that:\n        1.  Matter is made of tiny, discrete particles (molecules).\n        2.  These particles are in constant, random motion, even when the fluid appears still.\n        3.  These particles have kinetic energy and exert forces.\n    +   **Misconception Probe:** A common misconception is that Brownian motion is the *motion of the fluid molecules themselves*. This is incorrect. Brownian motion is the *visible effect* of the much smaller, invisible fluid molecules colliding with the larger, visible suspended particles. The fluid molecules are moving too fast and are too small to be seen directly.", "source": "Gemini Flash ②", "_id": "gflash_2_33", "judge_pick": true}, {"question": "At the particle level, explain how gas pressure arises in a sealed container. How does this provide a visual intuition for why pressure is defined as force per unit area? (3 steps)", "answer": "- Step 1: **Gas Particles in Random Motion**\n    Inside a sealed container, gas consists of a vast number of tiny particles (atoms or molecules) that are in constant, rapid, and random motion. They move in straight lines until they collide with each other or with the walls of the container. The forces between these particles are negligible except during collisions.\n- Step 2: **Collisions with Container Walls and Force Exertion**\n    As these high-speed gas particles collide with the inner walls of the container, they exert a force on the walls. Each individual collision is an elastic interaction where the particle's momentum changes direction, imparting a tiny impulse (and thus a force) to the wall.\n    +   Because there are an enormous number of particles and they collide with the walls extremely frequently (billions of collisions per second per square centimeter), these individual, tiny forces add up to produce a continuous, macroscopic force on the container walls.\n    +   This force is exerted at right angles (normal) to the wall's surface.\n- Step 3: **Pressure as Force per Unit Area**\n    The continuous, combined force exerted by countless particle collisions on the container walls is distributed over the entire inner surface area of the container.\n    +   **Visual Intuition:** Imagine many tiny billiard balls rapidly and randomly hitting the four walls of a small room. Each hit is a tiny \"tap.\" If you put your hand on a wall, you wouldn't feel individual taps, but a constant \"push\" spread across your hand.\n    +   Therefore, **pressure** is defined as this total force divided by the area over which it acts: $$p = F/A$$. This definition naturally arises from the microscopic reality of gas particles exerting force through collisions on the container's surface. A larger force over the same area or the same force over a smaller area will result in higher pressure.", "source": "Gemini Flash ②", "_id": "gflash_2_34", "judge_pick": false}, {"question": "What is \"absolute zero\"? Express its value in both Celsius and Kelvin. Explain, based on particle theory, why it is considered the lowest possible temperature. (3 steps)", "answer": "- Step 1: **Definition and Numerical Value**\n    **Absolute zero** is the theoretical lowest possible temperature that can be reached. At this temperature, the particles (atoms or molecules) in a substance would have the minimum possible kinetic energy.\n    +   In the Celsius scale, absolute zero is approximately **$$-273^\\circ\\text{C}$$**. More precisely, it's $$-273.15^\\circ\\text{C}$$.\n    +   In the Kelvin scale, which is an absolute temperature scale, absolute zero is defined as **$$0\\text{ K}$$**.\n- Step 2: **Particle Theory Explanation**\n    Temperature is a measure of the average kinetic energy of the particles in a substance.\n    +   As a substance is cooled, its particles lose kinetic energy and move or vibrate less vigorously.\n    +   At absolute zero, the particles are theorized to have ceased all random translational and rotational motion; they would only retain zero-point energy associated with quantum mechanics (which is the lowest possible vibrational energy state, not a complete absence of motion, but effectively no *thermal* kinetic energy).\n    +   Since temperature is directly proportional to the average kinetic energy of particles, if the particles have the minimum possible kinetic energy, then the substance is at the lowest possible temperature. No further energy can be removed from the particles to make them \"colder.\"\n- Step 3: **Why \"Lowest Possible\"**\n    You cannot have negative kinetic energy in the classical sense (energy of motion is always positive or zero). Therefore, the point where particles have the absolute minimum amount of thermal motion (zero average kinetic energy) represents the floor of the temperature scale. Any theoretical temperature below absolute zero would imply that particles have less than zero kinetic energy, which is physically impossible.", "source": "Gemini Flash ②", "_id": "gflash_2_35", "judge_pick": false}, {"question": "Describe the Kelvin temperature scale. How does it differ from the Celsius scale, and what is the formula for converting between Celsius and Kelvin? (3 steps)", "answer": "- Step 1: **Description of the Kelvin Scale**\n    The **Kelvin scale** is an absolute thermodynamic temperature scale. Its zero point, $$0\\text{ K}$$, is defined as absolute zero, the theoretical temperature at which all thermal motion of particles ceases (or rather, reaches its quantum mechanical minimum). Unlike Celsius or Fahrenheit, the Kelvin scale does not use the degree symbol ($$^\\circ$$); temperatures are simply expressed as \"Kelvin\" (e.g., $$273\\text{ K}$$).\n- Step 2: **Difference from the Celsius Scale**\n    +   **Zero Point:** The most significant difference is their zero points. The Celsius scale defines $$0^\\circ\\text{C}$$ as the freezing point of water, while the Kelvin scale defines $$0\\text{ K}$$ as absolute zero (approximately $$-273^\\circ\\text{C}$$). This means Kelvin temperatures are always positive (for any physically realizable temperature).\n    +   **Size of Degrees:** A change of 1 Kelvin is exactly equal to a change of 1 degree Celsius. This means the size of a \"step\" on the Kelvin scale is the same as on the Celsius scale. So, while their starting points differ, their intervals are identical.\n- Step 3: **Conversion Formula**\n    To convert a temperature from Celsius ($$\\theta/^\\circ\\text{C}$$) to Kelvin ($$T/\\text{K}$$), you simply add 273 (more precisely, 273.15, but 273 is often sufficient for GCSE):\n    $$ T/\\text{K} = \\theta/^\\circ\\text{C} + 273 $$\n    Conversely, to convert from Kelvin to Celsius, you subtract 273:\n    $$ \\theta/^\\circ\\text{C} = T/\\text{K} - 273 $$\n    For example, $$27^\\circ\\text{C}$$ is $$27 + 273 = 300\\text{ K}$$. Water freezes at $$0^\\circ\\text{C}$$ or $$273\\text{ K}$$, and boils at $$100^\\circ\\text{C}$$ or $$373\\text{ K}$$.", "source": "Gemini Flash ②", "_id": "gflash_2_36", "judge_pick": false}, {"question": "For a fixed mass of gas at a constant temperature, describe the qualitative relationship between its pressure and volume. Provide a visual intuition using the particle model. (3 steps)", "answer": "- Step 1: **Qualitative Relationship (Inverse Proportionality)**\n    For a fixed mass of gas held at a constant temperature, its pressure is **inversely proportional** to its volume.\n    +   This means if you decrease the volume of the gas, its pressure will increase.\n    +   Conversely, if you increase the volume of the gas, its pressure will decrease.\n- Step 2: **Visual Intuition: Decreasing Volume (Compression)**\n    Imagine a fixed number of gas particles in a sealed container with a movable piston.\n    +   If you push the piston in, you **decrease the volume** of the container.\n    +   The gas particles now have less space to move around in. Since their speed (average kinetic energy) remains constant (because temperature is constant), they will collide with the container walls **more frequently** because the walls are closer together.\n    +   More frequent collisions over the same wall area mean a greater total force per unit area, resulting in an **increase in pressure**.\n- Step 3: **Visual Intuition: Increasing Volume (Expansion)**\n    Now, imagine pulling the piston out, thereby **increasing the volume** of the container.\n    +   The gas particles now have more space to move around in, and the container walls are further apart.\n    +   With the same constant speed, the particles will take longer to travel between collisions with the walls, so they will collide with the container walls **less frequently**.\n    +   Less frequent collisions over the same wall area mean a smaller total force per unit area, resulting in a **decrease in pressure**.\n    This inverse relationship is known as Boyle's Law.", "source": "Gemini Flash ②", "_id": "gflash_2_37", "judge_pick": false}, {"question": "State Boyle's Law in terms of an equation and in words. What are the crucial conditions under which this law is valid? (2 steps)", "answer": "- Step 1: **Boyle's Law Statement**\n    **Boyle's Law** states that for a fixed mass of gas at constant temperature, the pressure of the gas is inversely proportional to its volume.\n    Mathematically, this can be expressed as:\n    $$ p \\propto \\frac{1}{V} $$\n    Or, more commonly, for comparing two states of the same gas:\n    $$ p_1 V_1 = p_2 V_2 $$\n    where:\n    +   $$p_1$$ and $$V_1$$ are the initial pressure and volume of the gas.\n    +   $$p_2$$ and $$V_2$$ are the final pressure and volume after a change.\n    The product of pressure and volume ($$pV$$) remains constant.\n- Step 2: **Crucial Conditions for Validity**\n    Boyle's Law is only valid under two critical conditions:\n    1.  **Constant Temperature ($$T$$):** The temperature of the gas must remain constant throughout the process. If the temperature changes, the average kinetic energy of the particles changes, which would affect the collision frequency and force, thus altering the pressure-volume relationship.\n    2.  **Fixed Mass of Gas:** The amount of gas (its mass or number of particles) must remain constant. If gas is added or removed, the number of collisions with the walls would change independently of volume or temperature, invalidating the law.\n    If either of these conditions is not met, Boyle's Law cannot be applied directly.", "source": "Gemini Flash ②", "_id": "gflash_2_38", "judge_pick": false}, {"question": "Intuitively derive Boyle's Law ($$pV = \\text{constant}$$) from the particle model of a gas, focusing on how pressure changes with volume at constant temperature. (3 steps)", "answer": "- Step 1: **Pressure from Particle Collisions**\n    Recall from the particle model that gas pressure arises from the continuous collisions of countless gas particles with the walls of their container. Each collision exerts a tiny force, and the sum of these forces over the container's area gives the macroscopic pressure ($$p = F/A$$). The magnitude of this force depends on two main factors:\n    +   The **frequency** of collisions (how often particles hit the walls).\n    +   The **force/momentum change** per collision (how hard particles hit the walls).\n- Step 2: **Effect of Constant Temperature**\n    Boyle's Law is valid only at **constant temperature**. This is a crucial condition because temperature is a measure of the average kinetic energy of the gas particles. If the temperature is constant, it means:\n    +   The **average speed** of the gas particles remains constant.\n    +   Therefore, the **force/momentum change per collision** (how hard particles hit the walls) remains constant.\n    So, any change in pressure must be primarily due to a change in the *frequency* of collisions.\n- Step 3: **Deriving Inverse Proportionality with Volume**\n    Now, consider what happens if we change the volume ($$V$$) of the container while keeping temperature and mass constant:\n    +   **If Volume Decreases:** When the volume of the container is reduced (e.g., by pushing a piston), the same number of particles are now confined to a smaller space. With their speeds unchanged, the particles will encounter the container walls much more frequently. This **increased collision frequency** directly leads to a greater total force on the walls over the same area, hence an **increase in pressure**.\n    +   **If Volume Increases:** When the volume of the container is increased, the same particles have more space to travel. They will take longer to reach the walls, so the **collision frequency will decrease**. This reduced collision frequency results in a smaller total force on the walls, hence a **decrease in pressure**.\n    This intuitive explanation shows that if volume goes down, pressure goes up, and vice-versa, in an inversely proportional manner. Since the 'collision force' (due to particle speed) is constant, and collision frequency is inversely related to the space available (volume), the product of pressure and volume ($$pV$$) must remain constant.", "source": "Gemini Flash ②", "_id": "gflash_2_39", "judge_pick": true}, {"question": "A fixed mass of gas in a syringe at constant temperature has an initial volume of $$20 \\text{ cm}^3$$ and a pressure of $$100 \\text{ kPa}$$. If you compress the gas to a volume of $$5 \\text{ cm}^3$$ while keeping the temperature constant, what will be the new pressure of the gas? (2 steps)", "answer": "- Step 1: **Identify the Knowns and Unknowns**\n    +   Initial volume ($$V_1$$) = $$20 \\text{ cm}^3$$\n    +   Initial pressure ($$p_1$$) = $$100 \\text{ kPa}$$\n    +   Final volume ($$V_2$$) = $$5 \\text{ cm}^3$$\n    +   Unknown: Final pressure ($$p_2$$)\n    The conditions for Boyle's Law are met: fixed mass of gas and constant temperature.\n- Step 2: **Apply Boyle's Law**\n    Use the formula $$p_1 V_1 = p_2 V_2$$:\n    $$ (100 \\text{ kPa}) \\times (20 \\text{ cm}^3) = p_2 \\times (5 \\text{ cm}^3) $$\n    To solve for $$p_2$$:\n    $$ p_2 = \\frac{(100 \\text{ kPa}) \\times (20 \\text{ cm}^3)}{(5 \\text{ cm}^3)} $$\n    $$ p_2 = \\frac{2000 \\text{ kPa} \\cdot \\text{cm}^3}{5 \\text{ cm}^3} $$\n    $$ p_2 = 400 \\text{ kPa} $$\n    The new pressure of the gas will be $$400 \\text{ kPa}$$. This makes sense conceptually: the volume decreased by a factor of $$20/5 = 4$$, so the pressure should increase by the same factor ($$100 \\times 4 = 400 \\text{ kPa}$$).", "source": "Gemini Flash ②", "_id": "gflash_2_40", "judge_pick": false}, {"question": "For a fixed mass of gas held at a constant volume, describe the qualitative relationship between its temperature and pressure. Provide a visual intuition based on the particle model. (3 steps)", "answer": "- Step 1: **Qualitative Relationship (Direct Proportionality)**\n    For a fixed mass of gas held at a constant volume, its pressure is **directly proportional** to its absolute temperature (in Kelvin).\n    +   This means if you increase the temperature of the gas, its pressure will increase.\n    +   Conversely, if you decrease the temperature of the gas, its pressure will decrease.\n- Step 2: **Visual Intuition: Increasing Temperature**\n    Imagine a fixed number of gas particles in a sealed, rigid container (constant volume).\n    +   If you **increase the temperature** of the gas, you are supplying energy to it. This energy is absorbed by the particles, causing their **average kinetic energy to increase**.\n    +   Consequently, the particles will move **faster** and vibrate more vigorously.\n    +   Faster-moving particles will collide with the container walls **more frequently** and with **greater force** (each collision imparts more momentum).\n    +   Both increased frequency and increased force per collision contribute to a greater total force per unit area on the walls, resulting in an **increase in pressure**.\n- Step 3: **Visual Intuition: Decreasing Temperature**\n    If you **decrease the temperature** of the gas:\n    +   The particles lose kinetic energy and move **slower**.\n    +   They will collide with the container walls **less frequently** and with **less force** per collision.\n    +   This leads to a smaller total force per unit area, resulting in a **decrease in pressure**.\n    This explains why a sealed aerosol can explodes if heated, or why car tire pressure drops in cold weather.", "source": "Gemini Flash ②", "_id": "gflash_2_41", "judge_pick": false}, {"question": "For a fixed mass of gas held at a constant pressure, describe the qualitative relationship between its temperature and volume. (2 steps)", "answer": "- Step 1: **Qualitative Relationship (Direct Proportionality)**\n    For a fixed mass of gas held at a constant pressure, its volume is **directly proportional** to its absolute temperature (in Kelvin).\n    +   This means if you increase the temperature of the gas, its volume will increase.\n    +   Conversely, if you decrease the temperature of the gas, its volume will decrease.\n- Step 2: **Particle Model Explanation**\n    Imagine a gas in a cylinder with a movable piston, where the external pressure on the piston is kept constant (e.g., by atmospheric pressure).\n    +   If you **increase the temperature** of the gas, the particles gain kinetic energy and move faster. They would naturally want to hit the walls (and the piston) more frequently and forcefully, which would tend to increase the pressure.\n    +   However, since the pressure is being kept constant, the only way for the gas to maintain the same internal pressure while its particles are moving faster is for the **volume of the container to increase**. This larger volume means the particles have to travel further between collisions, reducing the collision frequency just enough to compensate for the increased force per collision, thus keeping the overall pressure constant.\n    +   Conversely, if you **decrease the temperature**, particles move slower, reducing collision frequency and force. To maintain constant pressure, the **volume must decrease** so that particles hit the walls more often in the smaller space.\n    This explains why hot air balloons rise (hot air expands, becomes less dense), or why a deflated balloon expands if brought into a warm room.", "source": "Gemini Flash ②", "_id": "gflash_2_42", "judge_pick": true}, {"question": "Explain what it means to \"do work on a gas\" through compression, and describe the effect this has on the gas's internal energy and temperature. Provide a real-world example. (3 steps)", "answer": "- Step 1: **Doing Work on a Gas through Compression**\n    When you \"do work on a gas,\" you are transferring mechanical energy to it. In the context of compression, this typically involves applying a force over a distance to reduce the gas's volume, for example, by pushing a piston into a cylinder containing the gas.\n    +   As you push the piston, the force you apply moves the piston inwards. Work is done *on* the gas.\n    +   At the particle level, the moving piston effectively \"pushes\" into the gas particles. When gas particles collide with the moving piston, they rebound with increased speed, gaining kinetic energy from the piston.\n- Step 2: **Effect on Internal Energy and Temperature**\n    +   **Internal Energy:** Since the gas particles gain kinetic energy from the moving piston, the **total internal energy** of the gas increases. Remember, internal energy is the sum of the kinetic and potential energies of the particles. In this case, the kinetic energy component is directly increasing.\n    +   **Temperature:** Because the average kinetic energy of the gas particles increases, the macroscopic **temperature of the gas rises**. Even if the compression happens very quickly (adiabatically, meaning no heat is exchanged with surroundings), this temperature increase is observed.\n- Step 3: **Real-World Example**\n    A classic example is using a **bicycle pump** to inflate a tire.\n    +   As you rapidly push down the handle, you are compressing the air inside the pump. You are doing work on the air.\n    +   If you feel the barrel of the pump, especially near the nozzle, it becomes noticeably warm or even hot. This is because the work done on the air has increased its internal energy, which manifests as a rise in its temperature. The compressed, heated air then enters the tire.", "source": "Gemini Flash ②", "_id": "gflash_2_43", "judge_pick": false}, {"question": "Explain what happens when a gas expands and does work on its surroundings. How does this affect its internal energy and temperature? Provide a real-world example. (3 steps)", "answer": "- Step 1: **Gas Expanding and Doing Work**\n    When a gas expands, it pushes against its surroundings (e.g., pushing a piston outwards, or expanding into a larger volume). In doing so, the gas exerts a force over a distance, meaning the **gas itself does work on the surroundings**. This is the opposite of work being done *on* the gas.\n    +   At the particle level, when gas particles collide with a receding boundary (like a piston moving outwards), they rebound with reduced speed, losing some of their kinetic energy.\n- Step 2: **Effect on Internal Energy and Temperature**\n    +   **Internal Energy:** Because the gas particles lose kinetic energy as they do work on the surroundings, the **total internal energy** of the gas decreases.\n    +   **Temperature:** Since the average kinetic energy of the gas particles decreases, the macroscopic **temperature of the gas falls**. This is known as adiabatic expansion (if no heat is exchanged with the surroundings during the process).\n- Step 3: **Real-World Example**\n    A common example is seen with **aerosol cans** or **compressed gas cylinders** (e.g., for CO$_2$ or propane).\n    +   When you spray an aerosol can or release gas from a CO$_2$ fire extinguisher, the highly compressed gas rapidly expands as it leaves the nozzle.\n    +   As the gas expands, it does work on the surrounding air and pushes it aside. In doing this work, the gas loses internal energy.\n    +   Consequently, the gas (and often the nozzle or cylinder itself) becomes noticeably cold, sometimes even forming frost or dry ice (solid CO$_2$) due to the significant drop in temperature.", "source": "Gemini Flash ②", "_id": "gflash_2_44", "judge_pick": true}, {"question": "Define thermal insulation. How does a material act as a good thermal insulator, specifically by reducing heat transfer via conduction and convection at a particle level? (3 steps)", "answer": "- Step 1: **Definition of Thermal Insulation**\n    **Thermal insulation** is the process of reducing the rate of heat transfer (heat loss or gain) between an object and its surroundings. An insulating material, or insulator, is one that conducts heat poorly.\n- Step 2: **Reducing Conduction at a Particle Level**\n    +   **Conduction** is the transfer of thermal energy through direct contact of particles. In materials, faster-moving, higher-energy particles collide with adjacent slower-moving particles, transferring energy.\n    +   Good thermal insulators (like foam, fibreglass, or trapped air) typically have structures with **widely spaced particles** or **many trapped air pockets**. Gases, like air, are inherently poor conductors because their particles are far apart, leading to infrequent collisions and inefficient energy transfer between them.\n    +   By trapping air or having a material structure that limits direct particle-to-particle contact, insulators prevent rapid vibrational energy transfer.\n- Step 3: **Reducing Convection at a Particle Level**\n    +   **Convection** is the transfer of thermal energy through the movement of fluids (liquids or gases). When a fluid is heated, it expands, becomes less dense, and rises, carrying thermal energy with it. Colder, denser fluid sinks, creating convection currents.\n    +   Good thermal insulators work by **trapping pockets of air or gas**. When air is trapped within a material (e.g., in double-glazing, loft insulation, or a winter jacket), it cannot circulate freely.\n    +   By preventing the bulk movement of the air particles, the formation of convection currents is largely inhibited. This stops the effective transfer of thermal energy by the mass movement of the heated fluid, significantly reducing heat loss or gain.", "source": "Gemini Flash ②", "_id": "gflash_2_45", "judge_pick": false}, {"question": "Why is trapped air considered an excellent thermal insulator, and what role does it play in many common insulating materials? (2 steps)", "answer": "- Step 1: **Air as a Poor Conductor**\n    Air, being a gas, is inherently a poor conductor of heat. At the particle level, gas particles are widely spaced, meaning there are relatively few collisions between them. For heat to transfer by conduction, particles need to collide and transfer kinetic energy. With fewer collisions, this energy transfer is inefficient and slow. So, stagnant air itself is a poor conductor.\n- Step 2: **Trapping Air to Prevent Convection**\n    While stagnant air is a poor conductor, free-moving air can transfer heat very effectively through convection (where warm air rises and cool air sinks, creating currents that carry heat).\n    +   **Trapped air** becomes an excellent insulator because it effectively prevents the formation of these convection currents. When air is confined in small pockets within a material (like in foam, fibreglass, down feathers, or the gap in double-glazing), the air particles cannot move freely to set up a convection cycle.\n    +   By preventing both efficient conduction (due to widely spaced particles) and convection (due to restricted movement), trapped air significantly reduces the rate of heat transfer. This is why many insulating materials are designed with porous or layered structures to maximize the amount of trapped air.", "source": "Gemini Flash ②", "_id": "gflash_2_46", "judge_pick": false}, {"question": "Besides reducing conduction and convection, how can thermal insulation also reduce heat transfer via radiation? (2 steps)", "answer": "- Step 1: **Understanding Thermal Radiation**\n    Thermal radiation is the transfer of energy by electromagnetic waves (primarily infrared radiation). Unlike conduction and convection, it does not require a medium and can occur through a vacuum. All objects emit and absorb thermal radiation, with hotter objects emitting more intensely.\n- Step 2: **Role of Shiny Surfaces in Reducing Radiation**\n    Thermal insulation can reduce heat transfer by radiation through the use of **shiny, reflective surfaces**.\n    +   **Emission Reduction:** Shiny surfaces are poor emitters of thermal radiation. If an object is hot and insulated with a shiny outer layer (e.g., a shiny foil inside a thermos flask or emergency blanket), it will radiate less heat outwards, keeping the object warm.\n    +   **Absorption/Reflection Reduction:** Conversely, shiny surfaces are also poor absorbers and excellent reflectors of thermal radiation. If an object needs to be kept cool, a shiny outer surface will reflect incoming radiant heat away, preventing it from being absorbed.\n    Therefore, integrating shiny surfaces into an insulating design helps to minimize heat transfer by radiation, either preventing heat from escaping (by being a poor emitter) or preventing heat from entering (by being a good reflector).", "source": "Gemini Flash ②", "_id": "gflash_2_47", "judge_pick": false}], "count": 48}}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 7423, "out_tokens": 5920, "reasoning_chars": 0, "cost_eur": 0.063, "elapsed_s": 56, "content_chars": 23923}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 7423, "out_tokens": 5866, "reasoning_chars": 0, "cost_eur": 0.0625, "elapsed_s": 51, "content_chars": 24314}, "gflash_1": {"run": 1, "provider": "gflash", "model": "gemini-2.5-flash", "display": "Gemini 2.5 Flash", "temperature": 0.7, "in_tokens": 7423, "out_tokens": 12117, "reasoning_chars": 0, "cost_eur": 0.0299, "elapsed_s": 65, "content_chars": 54392}, "gflash_2": {"run": 2, "provider": "gflash", "model": "gemini-2.5-flash", "display": "Gemini 2.5 Flash", "temperature": 0.85, "in_tokens": 7423, "out_tokens": 23925, "reasoning_chars": 0, "cost_eur": 0.0571, "elapsed_s": 117, "content_chars": 99941}, "glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 7351, "out_tokens": 20720, "reasoning_chars": 9241, "cost_eur": 0.0738, "elapsed_s": 301, "content_chars": 70309}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 7262, "out_tokens": 14506, "reasoning_chars": 5515, "cost_eur": 0.0537, "elapsed_s": 146, "content_chars": 53583}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 7262, "out_tokens": 20118, "reasoning_chars": 5008, "cost_eur": 0.0718, "elapsed_s": 123, "content_chars": 77949}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 7025, "out_tokens": 10569, "reasoning_chars": 2817, "cost_eur": 0.012, "elapsed_s": 190, "content_chars": 41310}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 7025, "out_tokens": 17815, "reasoning_chars": 2557, "cost_eur": 0.0193, "elapsed_s": 320, "content_chars": 76780}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 7395, "out_tokens": 2760, "reasoning_chars": 4057, "cost_eur": 0.0044, "elapsed_s": 40, "content_chars": 7726}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 7395, "out_tokens": 4092, "reasoning_chars": 4645, "cost_eur": 0.0059, "elapsed_s": 57, "content_chars": 11571}}};
const SK='ch14_particle_model';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
