ublimes at atmospheric pressure, turning directly from solid to gas without ever becoming liquid CO₂. This happens because, at certain pressures, the liquid phase is not stable — the substance's phase diagram doesn't include a liquid region at that pressure.\n\nTakeaway: Sublimation is unique because it bypasses the liquid state entirely; all other transitions move between adjacent states.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When ice melts into water, the total mass stays the same. Why must mass be conserved during any change of state, and what common observation might trick you into thinking mass has been lost? (3 steps)", "answer": "- Step 1: Mass conservation during state changes follows from the fact that the **number of molecules doesn't change**. Melting doesn't destroy or create molecules — it only changes how they move and arrange themselves. The same molecules, with the same total mass, are present before and after. $$m_{\\text{before}} = m_{\\text{after}}$$.\n- Step 2: A common trick: if you leave a beaker of water on a balance for 24 hours, the mass decreases by a few grams. This looks like mass was lost during a state change, but actually **evaporation** occurred — some water molecules escaped from the liquid into the air as gas and left the beaker entirely. The mass wasn't destroyed; it moved to the atmosphere.\n- Step 3: The key distinction: in a closed system (sealed container), mass is strictly conserved during state changes. In an open system, molecules can escape (evaporation) or enter (condensation from air), changing the measured mass. The conservation law applies to the total system, not just what remains in your beaker. If you could collect every molecule that evaporated, the total mass would be unchanged.\n\nTakeaway: Mass is conserved because no molecules are created or destroyed — but in open systems, molecules can leave, making it *appear* as if mass was lost.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "When a substance changes from liquid to gas, its density drops dramatically. But its mass stays the same. How can both statements be true simultaneously? (2 steps)", "answer": "- Step 1: Density is $$\\rho = \\frac{m}{V}$$. If mass stays the same ($$m$$ unchanged) but density drops dramatically, then **volume must increase dramatically**. The same mass of molecules now occupies a much larger volume because the particles spread far apart.\n- Step 2: This is exactly what happens during vaporisation. The molecules break free from their close-packed arrangement in the liquid and fly apart with large gaps between them. The number of molecules (and thus total mass) is unchanged, but they now occupy perhaps 1000× more volume. Same $$m$$, much larger $$V$$ → much smaller $$\\rho$$. This is the particle-model explanation for why steam is far less dense than liquid water despite containing the same molecules per unit of total mass.\n\nTakeaway: Density drops because volume increases enormously while mass is conserved — the same molecules spread out.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "Internal energy is the sum of two types of energy stored in particles. Name both types, explain what each depends on, and state which one determines temperature. (3 steps)", "answer": "- Step 1: Internal energy = **kinetic energy** + **potential energy** of all the particles in the substance. Kinetic energy is energy of motion — particles vibrating, sliding, or flying around. Potential energy is energy of position — how far particles are from each other, related to intermolecular bonds and spacing.\n- Step 2: **Temperature is determined by average kinetic energy only**. The hotter a substance, the faster its particles move on average, and the higher their average kinetic energy. Potential energy (spacing/bonds) does not affect temperature — this is a crucial distinction.\n- Step 3: This explains why temperature stays constant during a state change: the energy going in increases **potential energy** (breaking bonds, increasing spacing) but not kinetic energy (particle speed stays the same on average). The particles move apart, but their average speed doesn't increase, so the thermometer reading doesn't change. Only when the state change is complete does further heating increase kinetic energy again, raising temperature.\n\nTakeaway: KE determines temperature; PE determines state. Internal energy is their sum, so it can increase even when temperature doesn't.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "On a heating curve (temperature vs time), there are sloped sections and flat plateau sections. What is happening to kinetic energy and potential energy in each type of section? (3 steps)", "answer": "- Step 1: **Sloped sections** (temperature is rising): The energy supplied increases the **kinetic energy** of particles — they move faster on average. Potential energy stays roughly constant because the state isn't changing (particles stay in the same arrangement). Temperature rises because temperature depends on average KE.\n- Step 2: **Flat plateau sections** (temperature constant): The energy supplied increases the **potential energy** of particles — bonds are being broken, particles are moving further apart. Kinetic energy stays constant on average (particles don't speed up), so the thermometer reads the same temperature. This is where the state change occurs (melting or boiling).\n- Step 3: The flat section exists because you cannot change state without breaking intermolecular bonds, which requires energy. That energy goes into potential energy, not kinetic energy. Until all the bonds for that state change are broken, the temperature cannot rise — it's \"stuck\" at the melting or boiling point. Only after every molecule has completed the transition does further energy go back into KE and temperature rises again.\n\nTakeaway: Slopes = KE increasing (temperature rises); plateaus = PE increasing (state changes, temperature constant).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "A student says: \"During melting, the internal energy stays constant because the temperature doesn't change.\" Is this correct? Explain why or why not. (2 steps)", "answer": "- Step 1: This is **incorrect**. Internal energy is the sum of kinetic energy AND potential energy. During melting, kinetic energy stays constant (temperature doesn't change), but potential energy **increases** — bonds are being broken and particles move further apart. Since one component is rising while the other is constant, the total (internal energy) must be increasing.\n- Step 2: The student's confusion comes from equating \"internal energy\" with \"temperature.\" Temperature only tracks the kinetic component. The flat plateau on a heating curve shows constant temperature, but energy is still flowing in and being stored as potential energy. Internal energy is always increasing when you heat a substance — it's just that during a state change, the increase goes entirely into PE rather than KE.\n\nTakeaway: Temperature constant ≠ internal energy constant. Internal energy always increases during heating; during state change, the increase is all in PE.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "Specific heat capacity ($$c$$) tells us how much energy is needed to raise 1 kg of a substance by 1°C. Water has $$c = 4200 \\text{ J/kg°C}$$; copper has $$c \\approx 390 \\text{ J/kg°C}$$. Practically, what does this ~10× difference mean for how these substances behave when heated? (2 steps)", "answer": "- Step 1: Water requires about 10× more energy than copper to achieve the same temperature rise for the same mass. This means water **heats up slowly** and **cools down slowly** — it takes a lot of energy to change its temperature. Copper heats up quickly and cools quickly — little energy is needed for a temperature change.\n- Step 2: This has practical consequences: + Water is used in central heating systems and car radiators because it can absorb large amounts of heat without its temperature skyrocketing — it's a good thermal buffer. + Copper pots heat up fast on a stove — efficient for cooking. + Coastal regions have milder climates than inland areas because the ocean (water) acts as a massive thermal reservoir, absorbing and releasing heat slowly. High $$c$$ = thermal stability; low $$c$$ = thermal responsiveness.\n\nTakeaway: High specific heat capacity means the substance is thermally stable (slow to heat/cool); low $$c$$ means it responds quickly to energy changes.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "The equation $$\\Delta Q = mc\\Delta\\theta$$ relates energy, mass, specific heat capacity, and temperature change. If you supply the same amount of energy to 1 kg of water and 1 kg of copper, which one has the larger temperature rise, and roughly by what factor? (2 steps)", "answer": "- Step 1: Rearranging the equation: $$\\Delta\\theta = \\frac{\\Delta Q}{mc}$$. For the same $$\\Delta Q$$ and same $$m$$, the temperature rise is inversely proportional to $$c$$. The substance with the smaller $$c$$ will have the larger temperature rise.\n- Step 2: Copper has $$c \\approx 390$$ J/kg°C and water has $$c = 4200$$ J/kg°C. The ratio is roughly $$\\frac{4200}{390} \\approx 10.8$$. So copper's temperature rise is about **11× larger** than water's for the same energy input to the same mass. For example, if 4200 J heats 1 kg of water by 1°C, the same 4200 J heats 1 kg of copper by about 11°C. This dramatic difference is why a copper pan gets hot quickly on a stove while a pot of water takes much longer.\n\nTakeaway: Temperature rise is inversely proportional to $$c$$ — low $$c$$ substances heat up much faster for the same energy per kg.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "A student is asked whether to use $$\\Delta Q = mc\\Delta\\theta$$ or $$Q = mL$$ for a particular scenario. How do you decide which equation to use? What is the critical difference in what each equation describes? (2 steps)", "answer": "- Step 1: The critical distinction: $$\\Delta Q = mc\\Delta\\theta$$ is for a **temperature change within the same state** (e.g., heating water from 20°C to 80°C — it stays liquid throughout). The symbol $$\\Delta\\theta$$ explicitly indicates that temperature is changing. $$Q = mL$$ is for a **change of state at constant temperature** (e.g., melting ice at 0°C — temperature stays at 0°C throughout the melting process). There is no $$\\Delta\\theta$$ in this equation because temperature doesn't change.\n- Step 2: Decision rule: + If the substance is getting hotter or cooler but staying in the same state → use $$\\Delta Q = mc\\Delta\\theta$$. + If the substance is melting, freezing, boiling, or condensing → use $$Q = mL$$ (with $$L_f$$ for solid↔liquid, $$L_v$$ for liquid↔gas). + If both happen sequentially (e.g., heating ice from -10°C to steam at 100°C), you use **both** equations for different stages: $$mc\\Delta\\theta$$ for each temperature-change stage and $$mL$$ for each state-change stage.\n\nTakeaway: $$c$$ is for temperature change (same state); $$L$$ is for state change (constant temperature). Ask: \"Is temperature changing or is state changing?\"", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "You have 2 kg of ice at 0°C and 2 kg of water at 0°C. You supply 10,000 J of energy to each. Which one will show a measurable temperature rise, and why? What happens to the other one? (2 steps)", "answer": "- Step 1: The **water** will show a measurable temperature rise. It is already in the liquid state, so the energy goes into increasing kinetic energy (raising temperature). Using $$\\Delta Q = mc\\Delta\\theta$$: $$\\Delta\\theta = \\frac{10000}{2 \\times 4200} = \\frac{10000}{8400} \\approx 1.2°C$$. The water warms from 0°C to about 1.2°C.\n- Step 2: The **ice** will NOT show a temperature rise — it stays at 0°C. The ice is at its melting point, so the energy goes into breaking intermolecular bonds (increasing potential energy), not into kinetic energy. Using $$Q = mL_f$$: the mass of ice that melts is $$m = \\frac{Q}{L_f} = \\frac{10000}{330000} \\approx 0.03 \\text{ kg}$$ (about 30 g of the 2 kg melts). The temperature remains 0°C until all 2 kg has melted. This is the fundamental difference: same energy, same mass, same starting temperature — but one changes temperature and the other changes state.\n\nTakeaway: At a state-change boundary, energy goes into breaking bonds (PE), not speeding particles (KE), so temperature stays flat.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "For the same substance, the specific latent heat of vaporisation ($$L_v$$) is always larger than the specific latent heat of fusion ($$L_f$$). For water, $$L_v = 2.26 \\text{ MJ/kg}$$ and $$L_f = 330 \\text{ kJ/kg}$$ — roughly 7× larger. Why does turning liquid into gas require so much more energy than turning solid into liquid? (3 steps)", "answer": "- Step 1: **Fusion (melting)**: In a solid, particles are in fixed positions but already very close together, essentially touching. Melting only needs to break the rigid arrangement — allow particles to slide past each other. The intermolecular bonds loosen but don't fully break; particles stay close together in the liquid. This requires moderate energy.\n- Step 2: **Vaporisation (boiling)**: In a liquid, particles are close together with significant intermolecular attractions holding them near each other. Boiling requires **completely overcoming** these attractive forces so particles can fly far apart and move independently as a gas. You're not just loosening bonds — you're ripping particles away from their neighbours entirely. This requires much more energy per molecule.\n- Step 3: The ratio $$\\frac{L_v}{L_f} \\approx 7$$ for water reflects this: partially freeing particles from a rigid grid (fusion) takes about 1 unit of energy per kg; fully separating them from all neighbours (vaporisation) takes about 7 units. The energy goes into increasing potential energy — and the potential energy increase from liquid→gas (particles moving from close together to far apart) is much larger than from solid→liquid (particles moving from fixed positions to sliding, but still close).\n\nTakeaway: $$L_v > L_f$$ because fully separating particles (liquid→gas) requires overcoming all intermolecular forces, while loosening the arrangement (solid→liquid) only partially overcomes them.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "You need to calculate the total energy required to turn 0.5 kg of ice at -10°C into steam at 100°C. How many separate calculation steps are needed, and what equation do you use for each step? (3 steps)", "answer": "- Step 1: There are **three distinct stages** requiring three separate calculations: + Stage 1: Heating ice from -10°C to 0°C (temperature change within solid state) → use $$\\Delta Q_1 = mc\\Delta\\theta$$ with $$c_{\\text{ice}}$$ and $$\\Delta\\theta = 10°C$$.\n- Step 2: + Stage 2: Melting ice at 0°C into water at 0°C (state change at constant temperature) → use $$Q_2 = mL_f$$ with $$L_f = 330 \\text{ kJ/kg}$$.\n- Step 3: + Stage 3: Heating water from 0°C to 100°C (temperature change within liquid state) → use $$\\Delta Q_3 = mc\\Delta\\theta$$ with $$c_{\\text{water}} = 4200$$ and $$\\Delta\\theta = 100°C$$.\n+ (If going all the way to steam, there would also be Stage 4: boiling at 100°C → $$Q_4 = mL_v$$.) The total energy is the **sum** of all stages: $$Q_{\\text{total}} = \\Delta Q_1 + Q_2 + \\Delta Q_3 + Q_4$$. You cannot use a single equation — each stage has different physics (temperature change vs state change).\n\nTakeaway: Multi-stage problems require identifying each stage separately and using $$mc\\Delta\\theta$$ for temperature-change stages and $$mL$$ for state-change stages, then summing.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "In Core Practical 6 (investigating SHC of water), you use an immersion heater connected to an electrical circuit. The energy supplied to the water is calculated from electrical measurements, not from a thermometer. What equation gives this electrical energy, and why can't you just use the temperature rise to find the energy? (2 steps)", "answer": "- Step 1: The electrical energy supplied by the immersion heater is calculated using $$E = VIt$$, where $$V$$ is voltage (volts), $$I$$ is current (amps), and $$t$$ is time (seconds). You measure $$V$$ with a voltmeter across the heater, $$I$$ with an ammeter in series, and $$t$$ with a stopwatch. Each minute, $$E = V \\times I \\times 60$$ joules.\n- Step 2: You can't use the temperature rise alone to find energy input because some energy **escapes to the surroundings** (heating the air, the beaker, the heater itself). The thermometer only measures what stayed in the water. The electrical measurement tells you the **total energy the heater produced**, which is the independent variable. You then compare this with the temperature rise (dependent variable) to find $$c$$. If you just used the temperature rise, you'd have no way to know how much energy was actually supplied vs how much was lost.\n\nTakeaway: $$E = VIt$$ gives the total energy input from the heater; the temperature rise only shows what the water actually absorbed.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "In the SHC practical, you plot a graph of energy supplied ($$E = VIt$$, y-axis) against $$m\\Delta\\theta$$ (x-axis). The gradient of the straight-line section equals the specific heat capacity $$c$$. Why use the gradient rather than a single calculation $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$? (2 steps)", "answer": "- Step 1: A single calculation uses one data point, which could be affected by random errors (reading uncertainties, timing errors, temperature fluctuations). It gives no way to assess reliability — you'd have no idea if that one value of $$c$$ is trustworthy or if it happened to be distorted by an error in that particular measurement.\n- Step 2: Using the gradient of a graph over multiple data points: + Averages out random errors — the best-fit line considers all points, not just one. + Allows you to identify and ignore anomalous points that don't fit the pattern. + The straight-line region specifically excludes the initial \"warm-up\" period where the heater itself is heating up (not just the water). Only the reliable linear section is used, giving a more accurate value of $$c$$. The gradient equals $$c$$ because rearranging $$\\Delta Q = mc\\Delta\\theta$$ gives $$\\Delta Q = c \\times (m\\Delta\\theta)$$, which is the equation of a straight line with gradient $$c$$.\n\nTakeaway: The gradient method uses all reliable data points to average out errors, whereas a single calculation relies on just one potentially flawed measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "In the SHC practical, the experimentally determined value of $$c$$ for water often turns out higher than the true value (4200 J/kg°C). What is the main reason for this, and how does it affect the calculation? (2 steps)", "answer": "- Step 1: The main reason is **thermal energy loss to the surroundings**. The heater produces energy $$E = VIt$$, but not all of it goes into the water. Some heats the beaker, some heats the air, some radiates away. The water receives less energy than the heater produces.\n- Step 2: In the calculation $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$, you use $$\\Delta Q = E = VIt$$ (the total energy the heater supplied) as the numerator, but the denominator $$m\\Delta\\theta$$ reflects only the energy the water actually absorbed. Since $$\\Delta Q$$ in the numerator is **larger** than what really went into the water (some was lost), the calculated $$c$$ is **too high**. The water achieved a smaller temperature rise than it \"should have\" for the energy recorded, making $$c$$ appear larger. To reduce this error: use insulation around the beaker, use a lid, and work quickly.\n\nTakeaway: Energy lost to surroundings means the recorded energy input exceeds what the water received, inflating the calculated $$c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "When you heat ice and plot a temperature-time graph, you see a flat plateau at 0°C. What is happening during this plateau, and why must the temperature stay flat rather than gradually rising? (3 steps)", "answer": "- Step 1: During the plateau, the ice is **melting** — changing from solid to liquid. The energy supplied is going into breaking the intermolecular bonds that hold ice molecules in their rigid lattice. This energy increases the **potential energy** of the molecules (they move from fixed positions to being able to slide around).\n- Step 2: The temperature stays flat because the **kinetic energy** (average particle speed) does not increase during this process. All the incoming energy is \"spent\" on breaking bonds (PE), not on making particles move faster (KE). Since temperature depends only on average KE, and KE isn't changing, the thermometer reading stays at 0°C.\n- Step 3: The plateau can't be a gradual rise because melting happens at a **specific temperature** (the melting point). At 0°C, ice and water can coexist. Every molecule that finishes melting joins the liquid phase at 0°C. The temperature cannot exceed 0°C until every single molecule has completed the transition — any excess energy that arrives goes to the next molecule that still needs to melt, not to raising the average speed of already-melted molecules.\n\nTakeaway: The plateau exists because melting requires bond-breaking energy (PE increase) at a fixed temperature; temperature can only rise after all molecules have melted.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "What are the three mechanisms of thermal energy transfer (conduction, convection, radiation)? Briefly explain how each works and which ones require a medium (material) to travel through. (3 steps)", "answer": "- Step 1: **Conduction**: Energy transfers through a material **without the material itself moving**. In solids, vibrating particles pass energy to neighbours — hotter particles vibrate more vigorously and \"jostle\" adjacent cooler particles. In metals, free electrons carry energy rapidly between atoms. Conduction requires a material medium — it cannot occur through a vacuum.\n- Step 2: **Convection**: Energy transfers by the **bulk movement of a fluid** (liquid or gas). Hot fluid expands, becomes less dense, and rises; cooler fluid is denser and sinks, creating a circulation (convection current). This carries energy from hot regions to cool regions via the fluid itself moving. Convection requires a fluid medium — it cannot occur in solids (which can't flow) or in a vacuum.\n- Step 3: **Radiation**: Energy transfers via **electromagnetic waves** (infrared radiation). All objects emit radiation; hotter objects emit more. Radiation does **not** require any medium — it travels through a vacuum (this is how the Sun's energy reaches Earth through empty space). Shiny/light surfaces reflect radiation (poor absorbers and emitters); dark/dull surfaces absorb and emit radiation well.\n\nTakeaway: Conduction and convection need matter; radiation doesn't. Conduction = neighbour-to-neighbour vibration; convection = fluid circulation; radiation = electromagnetic waves.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Why is trapped air (e.g., in foam or fibreglass insulation) such an effective thermal insulator? What two heat-transfer mechanisms does it reduce? (2 steps)", "answer": "- Step 1: Air is a **poor conductor** of thermal energy. In a solid, particles are close together and can easily pass vibrational energy to neighbours. In air, molecules are far apart — they collide infrequently, so energy transfer by neighbour-to-neighbour jostling (conduction) is very slow. Trapping air in small pockets inside foam or fibreglass means heat must slowly conduct through the air, which is inherently inefficient.\n- Step 2: Trapped air also **prevents convection**. Convection requires bulk fluid movement — hot air rising and cool air sinking in a large space. But when air is trapped in tiny pockets within foam or fibreglass, the air cannot circulate. The pockets are too small for convection currents to form. So both conduction (slow because air is a poor conductor) and convection (blocked because air can't circulate) are reduced. Only radiation remains, which shiny surfaces can further reflect.\n\nTakeaway: Trapped air exploits air's poor conductivity AND prevents convection currents — blocking two of the three heat-transfer mechanisms.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A student wraps a hot object in insulation and says \"the insulation stops heat from escaping.\" Is this statement accurate? What does insulation actually do? (2 steps)", "answer": "- Step 1: The statement is **not accurate**. Insulation does not **stop** heat transfer — it **slows** it down. Heat still escapes through the insulation, just at a reduced rate. No practical insulation is a perfect barrier. Even the best-insulated house still loses heat over time; it just loses it much more slowly than an uninsulated one.\n- Step 2: What insulation actually does: it increases the **thermal resistance** between the hot object and its cooler surroundings. The rate of heat transfer depends on the temperature difference, the surface area, and the thermal resistance of the material between them. Insulation increases that resistance (by using poor conductors and trapped air), so the same temperature difference drives a **slower** heat flow. Over a long enough time, the object still reaches thermal equilibrium with its surroundings — insulation just delays this.\n\nTakeaway: Insulation slows heat loss, not stops it. It increases thermal resistance, reducing the rate of transfer.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "What is thermal equilibrium, and why does reaching it NOT mean the object has \"no energy left\"? (2 steps)", "answer": "- Step 1: Thermal equilibrium is the state where an object and its surroundings have reached the **same temperature**, so there is **no net heat transfer** between them. Heat flows from hot to cold; once temperatures are equal, there's no temperature difference to drive heat flow in either direction. The net transfer is zero.\n- Step 2: Reaching thermal equilibrium does NOT mean the object has no energy. The particles still have kinetic energy (they're still moving/vibrating — they haven't stopped). They still have potential energy (bonds and spacing still exist). The object simply has the **same temperature** as its surroundings, so energy flows equally in both directions (some molecules give energy to surroundings, some receive it — net effect is zero). \"No net flow\" ≠ \"no energy.\" Even at room temperature, particles are moving.\n\nTakeaway: Thermal equilibrium means equal temperatures and zero net heat flow, not zero energy — particles still have KE and PE.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "You observe tiny smoke particles in air through a microscope. They jiggle randomly in zig-zag paths. What is this phenomenon called, and what does it prove about the air? Why can't you see the cause directly? (3 steps)", "answer": "- Step 1: This phenomenon is called **Brownian motion** — the random, zig-zag motion of small particles (like smoke or pollen) suspended in a fluid (air or water). It was first observed by Robert Brown in 1827 with pollen grains in water.\n- Step 2: Brownian motion proves that **air molecules exist and are moving randomly**. The smoke particle is being bombarded from all sides by invisible, fast-moving air molecules. Each collision gives the smoke particle a tiny push. Because the bombardment is random — sometimes more molecules hit from one side, sometimes from another — the smoke particle's path is an erratic zig-zag. The visible random motion of the smoke particle is direct evidence of the invisible random motion of the air molecules causing it.\n- Step 3: You can't see the air molecules directly because they are **far too small** — roughly 10,000× smaller than the smoke particle. The smoke particle is large enough to see under a microscope, but the individual air molecules that collide with it are below the resolution limit. You see the **effect** (smoke jiggling) but not the **cause** (air molecule collisions). This is like watching a large buoy bobbing randomly in the ocean — you can't see each individual wave hitting it, but the buoy's motion proves the waves exist.\n\nTakeaway: Brownian motion is the visible zig-zag of a large particle caused by invisible molecular bombardment — it proves molecules exist and move randomly.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "A student says: \"Brownian motion is the random movement of the air molecules themselves.\" Why is this statement incorrect? What is Brownian motion actually the movement of? (2 steps)", "answer": "- Step 1: Brownian motion is NOT the movement of the air/gas molecules. It is the movement of the **larger, visible particle** (like a smoke particle or pollen grain) that is suspended in the fluid. The air molecules are far too small to see under a standard microscope, and their individual paths are not what we call \"Brownian motion.\"\n- Step 2: The air molecules are the **cause** of Brownian motion (they bombard the visible particle from all sides), but Brownian motion itself refers to the **effect** — the observable zig-zag path of the larger suspended particle. The distinction matters: we observe the smoke particle's random walk, and from that observation we **infer** that invisible molecules must be colliding with it. Brownian motion is evidence for molecular motion; it is not molecular motion itself.\n\nTakeaway: Brownian motion = visible particle's zig-zag (the effect); molecular bombardment = invisible collisions (the cause). Don't confuse cause and effect.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Gas molecules inside a sealed container exert pressure on the walls. Explain how moving molecules create a force on the wall, and why this force is always perpendicular (at right angles) to the wall surface. (3 steps)", "answer": "- Step 1: Gas molecules move randomly at high speeds. When a molecule hits a wall, it bounces off. During the collision, the molecule's velocity component perpendicular to the wall reverses direction (e.g., from moving toward the wall to moving away). This change in momentum requires a force from the wall on the molecule (Newton's second law: force causes momentum change). By Newton's third law, the molecule exerts an equal and opposite force **on the wall**.\n- Step 2: Each individual collision produces a tiny, brief force. But there are enormous numbers of molecules hitting the wall every second — billions of billions. The **average** of all these tiny forces over time is what we measure as a steady, macroscopic pressure. Pressure is the total force per unit area: $$p = \\frac{F}{A}$$.\n- Step 3: The force is always perpendicular to the wall because only the component of velocity **perpendicular** to the wall changes during the collision. The parallel component is unchanged (the molecule slides along the wall in the parallel direction — in idealised elastic collision). The momentum change, and therefore the force, is purely in the direction normal (perpendicular) to the surface. This is why pressure is defined as force **at right angles** to the surface divided by area.\n\nTakeaway: Pressure arises from billions of molecular collisions per second; each collision's force is perpendicular because only the normal velocity component reverses.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "If you heat a sealed, rigid container of gas (constant volume), the pressure increases. Explain this using the particle model — what changes about the molecular collisions? (2 steps)", "answer": "- Step 1: Heating increases the **average kinetic energy** of the gas molecules — they move faster. At constant volume, the molecules have the same space to move in (same container, same distance to walls), but they are travelling faster between collisions with the walls.\n- Step 2: Faster molecules mean two effects on collisions: + Each collision produces a **larger force** on the wall, because the molecule has more momentum (higher speed = more momentum) and the momentum change upon bouncing is larger. + Collisions happen **more frequently**, because molecules traverse the container faster and hit the walls more often per second. Both effects increase the total force on the walls per second, and since the wall area hasn't changed, $$p = F/A$$ increases. More force from each collision AND more collisions per second → higher pressure.\n\nTakeaway: Heating gas at constant volume → faster molecules → harder and more frequent collisions → higher pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "What is absolute zero, and why is it described as the \"lowest possible temperature\" rather than just \"a very cold temperature\"? What happens to particle motion at absolute zero? (2 steps)", "answer": "- Step 1: Absolute zero is $$-273°C$$ (or $$0 \\text{ K}$$). It is the temperature at which particles have **zero kinetic energy** — their random motion/vibration stops completely. Since temperature is defined by average kinetic energy, zero KE means zero temperature. There is no lower temperature because you cannot have \"negative kinetic energy\" — molecules cannot move slower than \"not moving at all.\"\n- Step 2: At absolute zero: + Particles don't move, vibrate, or collide — they have no kinetic energy. + They exert **no pressure** on container walls (no collisions = no force). + It is a theoretical limit, not just \"very cold.\" You cannot remove more energy from the particles because there is no kinetic energy left to remove. This is why absolute zero is the minimum of the Kelvin scale — the scale is constructed so that zero corresponds to zero KE, and every Kelvin step above that represents more KE.\n\nTakeaway: Absolute zero = zero KE = no particle motion = no pressure = lowest possible temperature; you can't go lower because KE can't be negative.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "The Kelvin temperature scale starts at absolute zero ($$0 \\text{ K} = -273°C$$). Why is this scale more physically meaningful than Celsius for gas-law calculations? What is the conversion formula? (2 steps)", "answer": "- Step 1: The Kelvin scale is more physically meaningful because it starts at the true zero of temperature — absolute zero, where particle KE is actually zero. In Celsius, 0°C is just water's freezing point — an arbitrary choice with no fundamental physical significance. Negative Celsius temperatures exist (e.g., -10°C), but they don't mean \"negative energy\" — they're just below water's freezing point. Kelvin temperatures are **never negative**, which makes proportional relationships (like $$p \\propto T$$) work correctly: doubling the Kelvin temperature truly doubles the average KE.\n- Step 2: Conversion: $$T/\\text{K} = \\theta/°\\text{C} + 273$$. The \"+273\" shifts the zero point from water's freezing point (0°C) to absolute zero (-273°C). A change of 1 K = a change of 1°C — the step size is identical; only the starting point differs. Examples: + 0°C = 273 K (water freezes) + 100°C = 373 K (water boils) + -273°C = 0 K (absolute zero)\n\nTakeaway: Kelvin starts at the physical zero of temperature (absolute zero); conversion adds 273; step size is the same as Celsius.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A gas is at $$20°C$$. If you double its Celsius temperature to $$40°C$$, does the pressure double (at constant volume)? Does it double if you double its Kelvin temperature instead? Explain the critical difference. (2 steps)", "answer": "- Step 1: Doubling Celsius from 20°C to 40°C does **NOT** double the pressure. In Kelvin: 20°C = 293 K and 40°C = 313 K. The ratio is $$\\frac{313}{293} \\approx 1.07$$ — only a 7% increase, not a doubling. Celsius has an arbitrary zero point, so doubling the Celsius number doesn't double the actual kinetic energy or pressure.\n- Step 2: Doubling the **Kelvin** temperature from 293 K to 586 K (which is 313°C) **does** double the pressure, because Kelvin starts at the true zero of kinetic energy. At 586 K, molecules have twice the average KE compared to 293 K, so they hit walls twice as hard and twice as often → pressure doubles. This is why gas-law relationships (like $$p \\propto T$$) require **Kelvin** — only in Kelvin does \"doubling the number\" mean \"doubling the physical quantity\" (KE, pressure).\n\nTakeaway: Doubling Celsius doesn't double pressure because Celsius zero is arbitrary; doubling Kelvin does because Kelvin zero is the true physical zero of KE.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "You compress a fixed mass of gas at constant temperature by pushing its volume down from $$V_1$$ to a smaller $$V_2$$. Why does the pressure increase? Explain using the particle model (collisions), not just the equation. (3 steps)", "answer": "- Step 1: At constant temperature, the molecules' average speed stays the same — they don't move faster or slower. So each individual collision with the wall produces the same force as before (same momentum change per collision).\n- Step 2: However, the container is now smaller. The molecules have **less distance to travel** between wall collisions. They traverse the shorter distance to the wall more quickly (same speed, shorter path), so each molecule hits the walls **more frequently** per second. More collisions per second = more total force per second on the walls.\n- Step 3: Additionally, the wall area may be the same, but the same number of molecules is now confined in a smaller volume. The **concentration** of molecules (number per unit volume) has increased — more molecules per m³ means more collisions per m² of wall per second. Combining: same force per collision but more collisions per second per unit area → $$p = F/A$$ increases. This is the physical basis of Boyle's Law: at constant $$T$$, $$p \\propto \\frac{1}{V}$$.\n\nTakeaway: Compressing gas at constant T → same collision force but more frequent collisions (shorter path + higher molecule density) → pressure rises.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "Boyle's Law states $$p_1 V_1 = p_2 V_2$$ for a fixed mass of gas at constant temperature. If you halve the volume, what happens to the pressure, and why must temperature and mass both be constant for this law to hold? (3 steps)", "answer": "- Step 1: If volume is halved ($$V_2 = \\frac{V_1}{2}$$), then: $$p_1 V_1 = p_2 V_2 = p_2 \\times \\frac{V_1}{2}$$, so $$p_2 = 2p_1$$. Pressure **doubles**. This is inverse proportionality: $$p \\propto \\frac{1}{V}$$ — whatever factor you decrease volume by, pressure increases by the same factor.\n- Step 2: **Constant temperature** is required because temperature affects molecular speed (KE). If temperature changed during compression, molecules would move faster or slower, changing the force per collision. Boyle's Law assumes each collision has the same force (constant speed), so only the collision frequency changes with volume. If temperature also changed, you'd have two effects (frequency AND force per collision) and the simple $$pV = \\text{constant}$$ relationship would break down.\n- Step 3: **Constant mass** is required because more molecules mean more collisions. If you added gas while compressing, pressure would increase even more than Boyle's Law predicts (more molecules + smaller volume = double effect). Boyle's Law assumes the same number of molecules throughout — only their spacing changes.\n\nTakeaway: Boyle's Law requires constant T (same collision force) and constant mass (same number of molecules); only volume changes, so only collision frequency changes.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A sealed balloon has volume $$0.5 \\text{ m}^3$$ at pressure $$100 \\text{ kPa}$$ (constant temperature). You squeeze it to $$0.25 \\text{ m}^3$$. What is the new pressure, qualitatively and roughly numerically? (2 steps)", "answer": "- Step 1: Using Boyle's Law: $$p_1 V_1 = p_2 V_2$$. The volume is halved ($$V_2 = 0.25 \\text{ m}^3 = \\frac{0.5}{2}$$). Since $$pV$$ is constant, halving $$V$$ must double $$p$$.\n- Step 2: $$p_2 = \\frac{p_1 V_1}{V_2} = \\frac{100 \\times 0.5}{0.25} = \\frac{50}{0.25} = 200 \\text{ kPa}$$. The pressure doubles from 100 kPa to 200 kPa. This makes intuitive sense: the same number of molecules, moving at the same speed, are now crammed into half the space — they hit the walls twice as often per second, so pressure is twice as high.\n\nTakeaway: Halving volume at constant T doubles pressure — simple inverse proportionality from Boyle's Law.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "When you pump a bicycle tyre with a hand pump, the pump gets warm. This is NOT because the pump is transferring heat to the gas — it's because you are doing **work** on the gas. Explain how compressing a gas by doing work on it raises the gas's temperature. (3 steps)", "answer": "- Step 1: When you push the pump handle, you apply a force to the piston, which moves through a distance (the piston travels inward). Force × distance = **work done**. This mechanical work is energy transferred to the gas by physical pushing, not by thermal conduction. The energy goes from your muscles → to the piston → to the gas molecules.\n- Step 2: As the piston moves inward, it compresses the gas. Gas molecules bouncing off the **moving piston** gain extra kinetic energy — like a ball bouncing off a moving bat gains speed (the piston is moving toward the molecules, so they rebound faster). Each collision with the advancing piston gives the molecule a \"kick\" that increases its speed.\n- Step 3: The molecules now move faster on average → higher average kinetic energy → higher temperature. This is why the pump and the gas inside get warm. The temperature rise comes from **mechanical energy transfer** (work), not from heating. This is distinct from heating a gas with a flame (thermal energy transfer). Both increase internal energy, but the mechanism is different: work = mechanical push; heat = thermal conduction/radiation.\n\nTakeaway: Compressing a gas does work on it — molecules gain KE from collisions with the moving piston → temperature rises. This is mechanical energy transfer, not heat transfer.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "When a gas **expands** (does work on its surroundings), it cools down. A CO₂ fire extinguisher forms dry ice (solid CO₂) at the nozzle. Explain why expansion causes cooling, using the energy-transfer perspective. (2 steps)", "answer": "- Step 1: When a gas expands against an external pressure (e.g., pushing out into the atmosphere), the gas molecules are doing **work on their surroundings**. Just as compressing a gas transfers energy TO the gas (work done ON the gas), expanding a gas transfers energy AWAY from the gas (work done BY the gas). The gas loses internal energy.\n- Step 2: The lost internal energy comes from the kinetic energy of the molecules — they slow down on average. When a molecule bounces off a piston that is moving **away** from it, the molecule rebounds with **less speed** (like a ball bouncing off a retreating bat). Each collision with a receding surface steals a little KE from the molecule. Average KE drops → temperature drops → the gas cools. In the CO₂ extinguisher, the rapid expansion cools the gas so dramatically that it drops below CO₂'s sublimation point, forming solid dry ice at the nozzle.\n\nTakeaway: Gas expanding does work on surroundings → loses KE → molecules slow down → temperature drops. This is the reverse of compression heating.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "Both \"doing work on a gas\" and \"heating a gas\" increase the gas's internal energy. What is the fundamental difference between these two processes in terms of how energy is transferred? (2 steps)", "answer": "- Step 1: **Doing work** is **mechanical** energy transfer. You physically push the gas (move a piston, compress with a pump). Energy is transferred by a force moving through a distance. The mechanism is macroscopic and mechanical — you can see the piston moving. The gas molecules gain energy from collisions with the moving boundary surface.\n- Step 2: **Heating** is **thermal** energy transfer. Energy flows from a hotter object to a cooler one via conduction, convection, or radiation — no macroscopic mechanical motion is involved. You place the gas container on a hot plate, or hold a flame near it. Energy transfers through molecular vibrations (conduction), fluid movement (convection), or electromagnetic waves (radiation). Both processes increase internal energy, but work involves organised mechanical transfer while heating involves disordered thermal transfer.\n\nTakeaway: Work = mechanical energy transfer (force × distance, piston motion); heating = thermal energy transfer (conduction/convection/radiation, no mechanical motion).", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A sealed syringe contains air at room temperature. You push the plunger in slowly, keeping the temperature roughly constant. Then you push it in very rapidly. In which case does the gas temperature rise more, and why? (2 steps)", "answer": "- Step 1: Pushing **rapidly** causes a greater temperature rise. When you compress quickly, the gas molecules collide with the moving piston many times before they have any chance to transfer their gained kinetic energy to the surroundings (the syringe walls, the air outside). The energy from each collision with the advancing piston accumulates in the gas — molecules keep getting \"kicked\" faster and faster.\n- Step 2: Pushing **slowly** allows time for the gas to lose energy to the surroundings through the syringe walls (conduction) between collisions. Each small energy gain from a piston collision is partially dissipated before the next collision. The gas stays closer to room temperature because heat escapes almost as fast as it's added by work. This is why slow compression approximates constant temperature (isothermal) and obeys Boyle's Law, while fast compression raises temperature (adiabatic) and violates Boyle's Law's constant-temperature requirement.\n\nTakeaway: Fast compression → gas can't dissipate heat → temperature rises significantly. Slow compression → heat escapes to surroundings → temperature stays roughly constant (Boyle's Law applies).", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "The density of a gas is about 1/1000 of its liquid form. If you had 1 kg of liquid water (volume ~1 litre) and vaporised it completely into steam at atmospheric pressure, roughly what volume would the steam occupy, and why? (2 steps)", "answer": "- Step 1: Density drops by ~1000× when liquid becomes gas. Since $$\\rho = \\frac{m}{V}$$ and mass is conserved ($$m = 1 \\text{ kg}$$ unchanged), a 1000× drop in density means a 1000× increase in volume. The liquid occupies ~1 litre (0.001 m³), so the steam occupies roughly 1000 litres (1 m³).\n- Step 2: This enormous expansion happens because the molecules spread from being close together (touching, in the liquid) to being far apart (with large gaps, in the gas). The same 1 kg of molecules now needs 1000× more space. This is why steam engines can produce large mechanical forces — the expansion from water to steam is massive, and that expansion can push pistons and do work.\n\nTakeaway: Density dropping 1000× with constant mass means volume increases 1000× — 1 litre of water becomes ~1000 litres of steam.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "You measure the density of an irregular stone using a Eureka can. The stone's mass is 60 g and the displaced water volume is 20 cm³. Calculate the density in g/cm³, then convert to kg/m³. (2 steps)", "answer": "- Step 1: $$\\rho = \\frac{m}{V} = \\frac{60 \\text{ g}}{20 \\text{ cm}^3} = 3 \\text{ g/cm}^3$$. This is straightforward — mass divided by volume in matching units.\n- Step 2: To convert to kg/m³: multiply by 1000 (as established: 1 g/cm³ = 1000 kg/m³). $$3 \\text{ g/cm}^3 = 3 \\times 1000 = 3000 \\text{ kg/m}^3$$. This stone would sink in water (3000 > 1000 kg/m³). The conversion factor is always 1000 because of the volume unit cube relationship.\n\nTakeaway: Density in g/cm³ × 1000 = density in kg/m³. A stone at 3 g/cm³ = 3000 kg/m³, well above water's density.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "In Core Practical 5 (determining density of a regular object), what instruments would you use for each measurement, and why might you choose a Vernier caliper over a ruler for a small object? (2 steps)", "answer": "- Step 1: Mass is measured with a **digital balance** (resolution typically ±0.01 g). Dimensions are measured with a **ruler** (±1 mm), **Vernier calipers** (±0.01 mm), or **micrometer** (±0.001 mm), depending on the object's size and the precision needed.\n- Step 2: For a small object (e.g., a small metal cube with sides ~2 cm), a ruler's ±1 mm uncertainty is a large fraction of the measurement (~1 mm out of 20 mm = 5% uncertainty per dimension, and volume involves three dimensions multiplied, so the volume uncertainty compounds). Vernier calipers give ±0.01 mm (~0.05% per dimension), vastly reducing the uncertainty in the calculated volume and therefore in the final density. For larger objects (a paving slab), a ruler is sufficient because ±1 mm is a tiny fraction of the measurement.\n\nTakeaway: Choose the measuring instrument based on object size — smaller objects need higher-precision instruments (calipers, micrometer) to keep uncertainty low relative to the measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "You're measuring the density of an irregular object using a Eureka can. List two practical errors that could make your volume measurement inaccurate, and explain how each affects the final density calculation. (3 steps)", "answer": "- Step 1: **Error 1 — Dropping the object**: If you drop the stone into the can rather than lowering it gently, water splashes out beyond what goes through the spout. Some displaced water escapes as splash droplets that aren't collected in the measuring cylinder. This means $$V_{\\text{collected}} < V_{\\text{actual displaced}}$$, so you record a volume that is **too small**. Since $$\\rho = \\frac{m}{V}$$, a too-small $$V$$ makes the calculated density **too high**.\n- Step 2: **Error 2 — Not filling the can to the spout level before starting**: If the water level is below the spout when you lower the object, some displaced water fills the gap between the initial water level and the spout level first, and only the excess beyond the spout level overflows. The measuring cylinder collects less than the true displaced volume. Again, $$V_{\\text{collected}} < V_{\\text{actual}}$$ → density calculated is **too high**.\n- Step 3: Both errors have the same directional effect: they make the measured volume too small, which makes the calculated density too high (density is inversely proportional to volume). To avoid these: lower the object gently (no splash), and ensure the can is filled exactly to the spout before starting. Repeating and averaging multiple measurements also helps reduce random error effects.\n\nTakeaway: Splashing and underfilling both reduce measured volume → calculated density becomes too high. Gentle lowering and proper filling are essential.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "In the SHC practical (Core Practical 6), you're instructed to only use the \"straight-line region\" of the energy-vs-$$m\\Delta\\theta$$ graph, ignoring the initial curved section. Why does the initial section not give a reliable value for $$c$$? (2 steps)", "answer": "- Step 1: When the immersion heater is first turned on, it must **heat itself up** before it efficiently transfers energy to the water. During this warm-up period, a significant fraction of the electrical energy goes into raising the heater's temperature (heating the metal element), not into the water. The energy recorded ($$E = VIt$$) includes this \"wasted\" energy that didn't reach the water.\n- Step 2: During this warm-up phase, $$E$$ (total energy from heater) is larger than the energy the water actually absorbed, so the data points don't follow the true relationship $$\\Delta Q = mc\\Delta\\theta$$ properly. The points curve because the ratio $$\\frac{E}{m\\Delta\\theta}$$ is artificially high (extra energy in the numerator that didn't go into the water). Once the heater reaches its operating temperature, nearly all new energy goes directly to the water, and the data follows a straight line with gradient = true $$c$$. Using the curved section would give a falsely high value of $$c$$.\n\nTakeaway: The initial curved section includes energy heating the heater itself, not just the water — only the straight-line region (where the heater is at steady state) gives reliable $$c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "A substance has a specific heat capacity of $$2000 \\text{ J/kg°C}$$ and a specific latent heat of fusion of $$400 \\text{ kJ/kg}$$. You have 2 kg of this substance as a solid at its melting point. How much energy is needed to completely melt it, and will the temperature change during this process? (2 steps)", "answer": "- Step 1: Since the substance is already at its melting point, we only need the energy for the state change (no temperature-change stage needed). Using $$Q = mL_f$$: $$Q = 2 \\text{ kg} \\times 400,000 \\text{ J/kg} = 800,000 \\text{ J} = 800 \\text{ kJ}$$.\n- Step 2: The temperature **does not change** during melting. The substance stays at its melting point throughout the entire process. All 800 kJ goes into breaking intermolecular bonds (increasing potential energy), not into increasing kinetic energy. The specific heat capacity value ($$2000 \\text{ J/kg°C}$$) is irrelevant for this stage — $$c$$ only matters for temperature changes within a single state, not for state changes.\n\nTakeaway: For melting at the melting point, only $$Q = mL_f$$ applies; temperature stays constant; $$c$$ is not used for state changes.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "You have 1 kg of a substance with $$c = 1000 \\text{ J/kg°C}$$, starting at $$20°C$$. You supply 50,000 J of energy while it remains in the same state. What is the final temperature? (2 steps)", "answer": "- Step 1: Using $$\\Delta Q = mc\\Delta\\theta$$, rearrange for temperature change: $$\\Delta\\theta = \\frac{\\Delta Q}{mc} = \\frac{50,000}{1 \\times 1000} = 50°C$$. This is the temperature **change**, not the final temperature.\n- Step 2: Final temperature = starting temperature + change: $$\\theta_{\\text{final}} = 20°C + 50°C = 70°C$$. A common mistake is to treat $$\\Delta\\theta$$ as the final temperature — it's only the change. The substance warmed by 50°C from its starting point of 20°C, ending at 70°C. This calculation only works if no state change occurs between 20°C and 70°C (i.e., the substance stays in the same state throughout).\n\nTakeaway: $$\\Delta\\theta$$ is the temperature **change** — add it to the starting temperature to get the final temperature, and verify no state change occurs in that range.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "Why does the Kelvin scale ensure that gas-law relationships work correctly, while Celsius can give absurd results? Give an example of what goes wrong if you use Celsius in a pressure-temperature proportionality. (3 steps)", "answer": "- Step 1: Gas pressure is proportional to the **true** temperature (average KE). The Kelvin scale's zero point (0 K = absolute zero) corresponds to zero KE and zero pressure. This makes the proportionality $$p \\propto T$$ work perfectly: at 0 K, pressure is 0; at 200 K, pressure is some value; at 400 K, pressure is exactly double that value.\n- Step 2: Celsius zero (0°C = 273 K) is an arbitrary point where water freezes — molecules still have substantial KE (273 K worth). If you tried $$p \\propto \\theta_{\\text{Celsius}}$$, at 0°C you'd predict zero pressure, but real gas pressure at 0°C is significant (molecules are still moving fast). At -273°C, you'd predict negative pressure, which is physically impossible.\n- Step 3: Example: a gas at 20°C (293 K) has pressure $$p_1$$. If you cool it to -20°C (253 K), pressure should decrease to $$\\frac{253}{293} p_1 \\approx 0.86 p_1$$ (14% drop). Using Celsius incorrectly: $$\\frac{-20}{20} = -1$$, predicting **negative** pressure — absurd. The Kelvin ratio $$\\frac{253}{293}$$ gives the correct answer because both temperatures are measured from the true physical zero.\n\nTakeaway: Celsius gives absurd results (zero or negative pressure) because its zero is arbitrary; Kelvin works because its zero is the true physical zero of KE.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "At constant pressure, if you heat a gas, its volume increases. Explain this using the particle model — why must the volume expand rather than just the pressure increasing? (3 steps)", "answer": "- Step 1: Heating the gas increases molecular speed (higher KE). Faster molecules hit the walls harder and more often, which would increase pressure if the volume stayed the same. But the condition here is **constant pressure** — the external pressure on the gas (e.g., atmospheric pressure pushing on a flexible container) is fixed.\n- Step 2: If the internal pressure from molecular collisions exceeds the external pressure, the container expands (the walls move outward, like a balloon inflating). As the volume increases, molecules have more space — they travel further between collisions, and the molecule density (number per unit volume) decreases. Both effects reduce the collision rate", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}], "count": 54}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A block of lead and a block of feather are both 1 m³ in volume. Lead feels \"heavy\" and feathers feel \"light.\" What physical property distinguishes them, and why is this NOT the same thing as weight? (2 steps)", "answer": "- Step 1: The distinguishing property is **density** ($$\\rho$$), defined as mass per unit volume: $$\\rho = \\frac{m}{V}$$. Lead has a high density (~11 300 kg/m³) meaning a large mass is packed into each cubic metre; feathers have a very low density because the same volume contains mostly air gaps with very little actual solid material.\n- Step 2: Weight is the gravitational force on an object ($$W = mg$$) and depends on both mass and local gravity. Density is purely a ratio of mass to volume — it is independent of gravity. A 1 kg block of lead on the Moon has the same density as on Earth, but its weight is different. Confusing the two leads to errors like thinking \"dense\" means \"heavy,\" when a small dense object can weigh less than a large low-density one.\n\nTakeaway: Density is an intrinsic property of the material; weight is an extrinsic property of the object in a gravitational field.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Air has a density of about 1.3 kg/m³ and water about 1000 kg/m³. Explain, using the particle model, why gas density is roughly 1/1000 of liquid density for the same substance. (3 steps)", "answer": "- Step 1: Density is $$\\rho = \\frac{m}{V}$$. For the same substance, each molecule has the same mass, so the only way density changes is if the number of molecules per unit volume changes.\n- Step 2: In a liquid, molecules are tightly packed and touching — there is almost no empty space between them. In a gas, the same molecules are widely separated, with gaps roughly 10 times the molecular diameter in each direction. A 10× spacing in each of 3 dimensions means the volume per molecule increases by roughly $$10^3 = 1000$$.\n- Step 3: If each molecule occupies ~1000× more volume in the gas phase, then the number of molecules per m³ drops by the same factor, and so does the density. This is why $$\\rho_{\\text{gas}} \\approx \\frac{1}{1000} \\rho_{\\text{liquid}}$$.\n\nTakeaway: The ~1000× density difference comes from the ~10× particle separation in each spatial direction, cubed.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "A substance has a density of 2.5 g/cm³. Without doing any long calculation, explain how to convert this to kg/m³ and state the result. (2 steps)", "answer": "- Step 1: The key conversion is $$1 \\text{ g/cm}^3 = 1000 \\text{ kg/m}^3$$. This is because 1 g = 0.001 kg and 1 cm³ = 0.000001 m³, so $$\\frac{0.001 \\text{ kg}}{0.000001 \\text{ m}^3} = 1000 \\text{ kg/m}^3$$.\n- Step 2: Therefore, multiply the g/cm³ value by 1000: $$2.5 \\text{ g/cm}^3 = 2.5 \\times 1000 = 2500 \\text{ kg/m}^3$$.\n\nTakeaway: To convert g/cm³ → kg/m³, just multiply by 1000. Water is 1 g/cm³ = 1000 kg/m³.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why can you compress a gas significantly but not a solid or liquid, even though all three are made of the same type of molecules? (2 steps)", "answer": "- Step 1: In solids and liquids, the molecules are already in contact or very close together — there is essentially no empty space between them. To compress them, you would need to force the molecules to overlap or interpenetrate, which requires enormous forces (electron shell repulsion). This is why they are described as \"incompressible.\"\n- Step 2: In a gas, the molecules are far apart with large empty spaces between them. Compression simply pushes the molecules closer together into that empty space — no overlap is needed. The gas can be squeezed into a much smaller volume until the molecules start to approach contact distances.\n\nTakeaway: Compressibility depends on how much empty space exists between particles, not on the particles themselves.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A solid has a definite shape, but a liquid takes the shape of its container — yet both have similar densities. Using the particle model, explain why this difference in shape behaviour occurs despite similar particle spacing. (3 steps)", "answer": "- Step 1: In both solids and liquids, particles are close together and touching, which is why densities are similar — the mass per volume is comparable.\n- Step 2: In a **solid**, particles are locked in a regular, fixed arrangement and can only vibrate about fixed positions. Strong intermolecular bonds hold each particle in place, so the overall shape is rigid and definite.\n- Step 3: In a **liquid**, particles still touch each other, but they are NOT in fixed positions — they can slide and roll past one another. The bonds between molecules are weaker and temporary, allowing the liquid to flow and conform to the container's shape while still maintaining a fixed volume (particles remain in contact).\n\nTakeaway: Similar density ≠ similar rigidity. Density depends on spacing; shape behaviour depends on whether particles can move relative to each other.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "You need to find the density of a rectangular metal block. What two quantities must you measure, and what is a common unit-conversion pitfall when calculating volume? (2 steps)", "answer": "- Step 1: You must measure **mass** (using a digital balance) and **volume** (using dimensions: $$V = l \\times w \\times h$$). Then apply $$\\rho = \\frac{m}{V}$$.\n- Step 2: The common pitfall is mixing units — measuring dimensions in cm but needing volume in m³. You must convert each dimension from cm to m (divide by 100) before multiplying, or convert the resulting cm³ to m³ (divide by 1 000 000). Likewise, mass must be in kg (divide g by 1000) to get density in kg/m³.\n\nTakeaway: Always convert all quantities to base SI units (kg, m) before calculating density, or accept the result in mixed units (g/cm³) and convert at the end.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "To find the density of an irregular stone, you use a Eureka (displacement) can. Why must you measure the mass of the stone BEFORE lowering it into the water, not after? (2 steps)", "answer": "- Step 1: When you lower the stone into the Eureka can, water overflows through the spout. The stone emerges wet — water clings to its surface.\n- Step 2: If you weigh the stone after removing it, the mass reading includes the water adhering to it, making $$m$$ too large and $$\\rho$$ too high. Measuring mass first, while the stone is dry, gives the true mass of the stone alone.\n\nTakeaway: Always measure mass of an irregular solid before immersion to avoid water adding to the mass.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Describe the procedure for measuring the density of a liquid using a measuring cylinder and a balance. What is the purpose of \"zeroing\" (taring) the balance? (3 steps)", "answer": "- Step 1: Place the empty measuring cylinder on the balance and press the \"tare\" or \"zero\" button. This sets the reading to zero, effectively subtracting the mass of the cylinder so that subsequent readings show only the mass of whatever you add.\n- Step 2: Pour the liquid into the cylinder. Record the volume from the scale on the cylinder (read the bottom of the meniscus at eye level). Record the mass shown on the balance — this is $$m_{\\text{liquid}}$$ alone, since the cylinder's mass was tared.\n- Step 3: Calculate density using $$\\rho = \\frac{m_{\\text{liquid}}}{V_{\\text{liquid}}}$$. If you didn't tare, you would need to subtract the empty cylinder mass manually: $$m_{\\text{liquid}} = m_{\\text{total}} - m_{\\text{cylinder}}$$.\n\nTakeaway: Taring eliminates the cylinder mass in one step, reducing calculation errors.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "List all six changes of state. Which two involve a gas turning into something else, and which one skips the liquid phase entirely? (2 steps)", "answer": "- Step 1: The six changes of state are:\n  + Melting: solid → liquid\n  + Freezing: liquid → solid\n  + Boiling/Evaporating: liquid → gas\n  + Condensing: gas → liquid\n  + Subliming: solid → gas\n  + Deposition: gas → solid\n- Step 2: The two processes involving a gas turning into something else are **condensing** (gas → liquid) and **deposition** (gas → solid). The one that skips the liquid phase entirely is **subliming** (solid → gas directly) — and its reverse, deposition, also skips the liquid phase.\n\nTakeaway: Sublimation and deposition are the \"shortcut\" transitions that bypass the liquid state.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A sealed beaker of water is heated until it all evaporates. Has the total mass of the system changed? Explain what \"mass is conserved\" means in the context of changes of state. (2 steps)", "answer": "- Step 1: No, the total mass has not changed. \"Mass is conserved\" means that during any change of state (melting, boiling, freezing, etc.), the total number and type of molecules remains the same — they simply rearrange or move differently. The water molecules in the gas phase have exactly the same total mass as they did in the liquid phase.\n- Step 2: A common confusion is thinking mass is \"lost\" during evaporation. If the beaker is sealed, the evaporated water vapour is still inside — mass is conserved. If the beaker is open, water vapour escapes to the surroundings, so the beaker loses mass, but the total mass of the system (beaker + surrounding air) is still conserved. The molecules haven't vanished; they've just moved elsewhere.\n\nTakeaway: Mass conservation means no molecules are created or destroyed — they just change arrangement or location.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Internal energy is the sum of two components. Name them, and explain which one determines temperature and which one changes during a state change. (3 steps)", "answer": "- Step 1: Internal energy = **kinetic energy** of the particles + **potential energy** of the particles.\n  + Kinetic energy: energy due to the random motion/vibration of particles.\n  + Potential energy: energy due to the spacing/position of particles relative to each other (related to intermolecular bonds).\n- Step 2: **Temperature is determined solely by average kinetic energy.** The hotter a substance, the faster its particles move on average. This is why a thermometer measures temperature — it responds to how energetic the particle collisions are.\n- Step 3: During a **change of state**, energy goes into breaking or weakening bonds between particles, which increases their **potential energy** (they move further apart). Since kinetic energy doesn't change, the temperature stays constant. This is why a heating curve has flat plateaus during state changes.\n\nTakeaway: KE ↔ temperature; PE ↔ particle spacing/bonds. Heating during a state change raises PE, not KE.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "On a heating curve (temperature vs. energy supplied), there are sloped sections and flat plateau sections. What is happening to the particles during each type of section? (3 steps)", "answer": "- Step 1: On the **sloped sections**, temperature is rising. The energy supplied increases the average kinetic energy of the particles — they vibrate/move faster. The substance remains in the same state (solid warming up, liquid warming up, or gas warming up).\n- Step 2: On the **flat plateau sections**, temperature is constant even though energy is still being supplied. This energy goes into increasing the potential energy — breaking intermolecular bonds so particles can move further apart. The substance is changing state (solid→liquid at the melting point, or liquid→gas at the boiling point).\n- Step 3: Once all the substance has completed the state change, the plateau ends and the slope resumes — now all particles are in the new state, and added energy once again increases kinetic energy (and temperature).\n\nTakeaway: Slopes = KE increasing (temperature rising, same state); plateaus = PE increasing (state changing, constant temperature).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student sees a flat section on a heating curve and says, \"No energy is being added during this part.\" Why is this statement wrong? (2 steps)", "answer": "- Step 1: The flat section means **temperature is constant**, not that energy input has stopped. Energy is still being supplied (the heater is still on, the Bunsen burner is still lit), but none of it is going into kinetic energy — it is all going into potential energy to break intermolecular bonds.\n- Step 2: If no energy were being added, the state change would pause or stop. The fact that the substance continues to change state (more solid melts, more liquid boils) proves that energy is continuously being transferred into the system — it's just invisible on the temperature axis because it goes into PE, not KE.\n\nTakeaway: A flat plateau means \"energy → PE, not KE,\" not \"no energy is being supplied.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "What is specific heat capacity, and why does a puddle of water take much longer to warm up in the sun than a metal railing of similar mass? (3 steps)", "answer": "- Step 1: Specific heat capacity ($$c$$) is the amount of energy required to raise the temperature of 1 kg of a substance by 1 °C. It is measured in J/(kg·°C).\n- Step 2: Water has a very high SHC (~4200 J/(kg·°C)), meaning each kilogram needs 4200 J just to warm by 1 °C. Metals like iron (~450 J/(kg·°C)) or copper (~385 J/(kg·°C)) have much lower SHC.\n- Step 3: For the same mass and same energy input, a substance with a higher $$c$$ undergoes a smaller temperature rise ($$\\Delta\\theta = \\frac{Q}{mc}$$). So the puddle warms slowly (large $$c$$) while the metal railing warms quickly (small $$c$$).\n\nTakeaway: High SHC = \"thermally sluggish\" (resists temperature change); low SHC = \"thermally responsive\" (heats/cools quickly).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Derive the rearrangement $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$ from $$\\Delta Q = mc\\Delta\\theta$$, and explain what each symbol represents and its SI unit. (3 steps)", "answer": "- Step 1: Start with $$\\Delta Q = mc\\Delta\\theta$$, where:\n  + $$\\Delta Q$$ = energy transferred (J)\n  + $$m$$ = mass of substance (kg)\n  + $$c$$ = specific heat capacity (J/(kg·°C))\n  + $$\\Delta\\theta$$ = change in temperature (°C) — note this is the *change*, not the final temperature.\n- Step 2: Divide both sides by $$m\\Delta\\theta$$: $$\\frac{\\Delta Q}{m\\Delta\\theta} = \\frac{mc\\Delta\\theta}{m\\Delta\\theta} = c$$.\n- Step 3: So $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$. This form is used in Core Practical 6 to find the SHC of a material from experimental measurements of energy, mass, and temperature change. The units check: $$\\frac{\\text{J}}{\\text{kg} \\times °\\text{C}} = \\text{J/(kg·°C)}$$.\n\nTakeaway: The rearranged form lets you determine $$c$$ experimentally by measuring energy input, mass, and temperature rise.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A 0.5 kg block of aluminium ($$c \\approx 900$$ J/(kg·°C)) is heated so its temperature rises by 2 °C. Roughly how much energy was supplied, and how would this compare to heating 0.5 kg of water by 2 °C? (2 steps)", "answer": "- Step 1: Using $$\\Delta Q = mc\\Delta\\theta$$: $$\\Delta Q = 0.5 \\times 900 \\times 2 = 900$$ J. This is a quick mental calculation: half of 900 is 450, times 2 is 900.\n- Step 2: For water ($$c = 4200$$ J/(kg·°C)): $$\\Delta Q = 0.5 \\times 4200 \\times 2 = 4200$$ J. Water needs roughly 4.7 times more energy for the same temperature rise because its SHC is ~4.7× larger. This is why water is used as a coolant — it absorbs a lot of energy with only a modest temperature increase.\n\nTakeaway: Same mass, same temperature rise → the substance with higher $$c$$ requires proportionally more energy.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "What is specific latent heat, and what is the crucial difference between it and specific heat capacity? (3 steps)", "answer": "- Step 1: Specific latent heat ($$L$$) is the thermal energy required to change the state of 1 kg of a substance with **no change in temperature**. It is measured in J/kg.\n- Step 2: The crucial distinction:\n  + **SHC ($$c$$)**: energy for a **temperature change** within the **same state**. Formula: $$\\Delta Q = mc\\Delta\\theta$$.\n  + **SLH ($$L$$)**: energy for a **state change** with **no temperature change**. Formula: $$Q = mL$$.\n- Step 3: Note that the SLH formula has no $$\\Delta\\theta$$ term — temperature is constant during the state change, so there is no temperature difference to include. All the energy goes into changing the potential energy (breaking/weakening bonds), not the kinetic energy.\n\nTakeaway: $$c$$ is for \"same state, changing temperature\"; $$L$$ is for \"changing state, constant temperature.\" They never apply simultaneously to the same process.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Water has a specific latent heat of fusion (~330 kJ/kg) and a specific latent heat of vaporisation (~2260 kJ/kg). Explain why vaporisation requires roughly 7× more energy per kilogram than fusion. (3 steps)", "answer": "- Step 1: Fusion (melting) involves partially breaking the intermolecular bonds so particles can slide past each other — molecules move from a fixed arrangement to a mobile one, but they remain close together and still attracted to neighbours.\n- Step 2: Vaporisation (boiling) involves completely overcoming intermolecular attractions so molecules break free from each other entirely and fly apart into the gas phase. This requires separating molecules to large distances (~10× further apart in each direction), which demands far more energy than just loosening them.\n- Step 3: The ratio $$\\frac{L_v}{L_f} \\approx \\frac{2260}{330} \\approx 7$$ reflects this: fully separating particles (vaporisation) is much harder than just loosening their arrangement (fusion). This is true for all substances — $$L_v$$ is always greater than $$L_f$$.\n\nTakeaway: Fusion loosens bonds; vaporisation breaks them entirely. Complete separation always needs more energy than partial loosening.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A student applies $$Q = mL$$ to calculate the energy needed to heat 2 kg of ice at −10 °C to water at +10 °C. What is wrong with this approach? (3 steps)", "answer": "- Step 1: The student is treating the entire process as a single state change, but the process actually involves **three stages**: (1) heating ice from −10 °C to 0 °C, (2) melting ice at 0 °C, and (3) heating water from 0 °C to +10 °C.\n- Step 2: Stages 1 and 3 are **temperature changes within one state**, so they require $$\\Delta Q = mc\\Delta\\theta$$ (using $$c_{\\text{ice}}$$ and $$c_{\\text{water}}$$ respectively). Stage 2 is a **state change at constant temperature**, so it requires $$Q = mL_f$$.\n- Step 3: The total energy is the sum of all three: $$Q_{\\text{total}} = mc_{\\text{ice}}\\Delta\\theta_1 + mL_f + mc_{\\text{water}}\\Delta\\theta_3$$. Using only $$Q = mL$$ misses the energy needed for the temperature changes before and after the melting.\n\nTakeaway: Multi-stage thermal problems require identifying each stage and applying the correct formula (SHC for temperature change, SLH for state change).", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "A 0.2 kg ice cube at 0 °C is completely melted. If $$L_f$$ for water is 330 000 J/kg, how much energy is needed? Show the reasoning. (2 steps)", "answer": "- Step 1: Use $$Q = mL_f$$: $$Q = 0.2 \\times 330\\,000 = 66\\,000$$ J. This is straightforward: one-fifth of 330 000 is 66 000.\n- Step 2: Notice there is no $$\\Delta\\theta$$ term — the temperature stays at 0 °C throughout the melting. All 66 000 J goes into breaking bonds (increasing potential energy), not into making particles move faster.\n\nTakeaway: For a pure state change, just multiply mass by the relevant latent heat. No temperature change appears.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Describe three ways thermal energy can be transferred, and give a one-sentence
