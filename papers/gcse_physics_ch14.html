e same temperature doesn't? (2 steps)", "answer": "- Step 1: When a molecule collides with a *stationary* wall, it bounces back at the same speed (elastic collision with a massive wall). The wall does no net work on the molecule — it simply reverses the molecule's direction. Average molecular speed is unchanged.\n- Step 2: When a molecule collides with a *moving* piston (moving into the gas), the piston is advancing toward the molecule. The collision is like a bat hitting a ball — the piston's motion adds extra momentum to the molecule on the rebound. The molecule leaves the collision with *more* kinetic energy than it arrived with. This extra energy came from the work done by whoever is pushing the piston.\n\nA stationary wall reflects; a moving wall *boosts*. That's why compression heats a gas — the piston literally hits the molecules harder, like a moving bat hitting a ball versus a stationary wall.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "A student says \"Boyle's Law means that if you double the pressure, you halve the temperature.\" Identify the error and correct it. (2 steps)", "answer": "- Step 1: Boyle's Law relates pressure and *volume*, not pressure and temperature. The law states that at constant temperature, $$pV = \\text{constant}$$ — so doubling the pressure halves the *volume*, not the temperature. The student has confused volume with temperature.\n- Step 2: The relationship between pressure and temperature (at constant volume) is that they are *directly* proportional: higher temperature → higher pressure. Doubling pressure would correspond to doubling the Kelvin temperature (not halving it). But this is a different law from Boyle's Law.\n\nBoyle's Law: $$p \\propto 1/V$$ (constant T). Temperature-pressure relationship: $$p \\propto T$$ (constant V). These are two different relationships for two different conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "You want to heat 0.5 kg of ice at 0°C into water at 50°C. You need *two* equations. Which ones, and in what order do you apply them? (2 steps)", "answer": "- Step 1: First, melt the ice at 0°C into water at 0°C using the latent heat equation: $$Q_1 = mL_f$$. This covers the state change (solid → liquid) at constant temperature. Energy goes into breaking bonds (potential energy).\n- Step 2: Then, heat the water from 0°C to 50°C using the specific heat capacity equation: $$Q_2 = mc\\Delta\\theta$$. This covers the temperature change within the liquid state. Energy goes into increasing kinetic energy. The total energy is $$Q_{\\text{total}} = Q_1 + Q_2$$.\n\nState change first (latent heat), then temperature change (specific heat). The order matters because the substance must fully change state before its temperature can rise — the heating curve enforces this sequence.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "Why can't you compress a liquid or solid as easily as a gas? Answer using the particle model. (2 steps)", "answer": "- Step 1: In a liquid or solid, the particles are already touching or very close together. There is virtually no empty space between them. When you try to push them closer, you're pushing already-touching particles into each other — you'd need to deform the particles themselves or compress the electron clouds, which requires enormous forces.\n- Step 2: In a gas, the particles are widely separated with large empty spaces between them. Compressing a gas simply reduces these gaps — the particles can be pushed closer together without colliding with each other immediately. Only when the gas becomes very dense (approaching liquid density) does it become hard to compress further.\n\nGases are compressible because there's room to squeeze into. Liquids and solids are incompressible because the room is already full.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A cube of side 2 cm has mass 32 g. Is its density greater than or less than water's density ($$1000\\text{ kg/m}^3$$)? Estimate without a calculator. (2 steps)", "answer": "- Step 1: Volume = $$2 \\times 2 \\times 2 = 8\\text{ cm}^3$$. Density = $$\\frac{32\\text{ g}}{8\\text{ cm}^3} = 4\\text{ g/cm}^3$$.\n- Step 2: Water's density is $$1\\text{ g/cm}^3$$. Since $$4\\text{ g/cm}^3 > 1\\text{ g/cm}^3$$, this material is denser than water and would sink. In SI units: $$4\\text{ g/cm}^3 = 4000\\text{ kg/m}^3$$, which is 4× greater than water's $$1000\\text{ kg/m}^3$$.\n\nQuick check: if $$\\rho > 1\\text{ g/cm}^3$$ (or $$1000\\text{ kg/m}^3$$), the object sinks in water. This material at 4 g/cm³ is quite dense — similar to some metals or minerals.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Explain why a hot air balloon rises, using the particle model to connect temperature, density, and buoyancy. (3 steps)", "answer": "- Step 1: Heating the air inside the balloon increases the kinetic energy of the air molecules — they move faster. The faster molecules collide with the balloon fabric harder and more frequently, increasing the pressure. But the balloon is open at the bottom, so the extra pressure pushes some air molecules *out* of the balloon.\n- Step 2: With fewer molecules inside the same volume, the mass of air in the balloon decreases while the volume stays roughly the same. By $$\\rho = m/V$$, lower mass in the same volume means lower density. The hot air inside is less dense than the cooler surrounding air.\n- Step 3: The less-dense hot air experiences an upward buoyant force (the denser surrounding air pushes it up, like a cork in water). When this buoyant force exceeds the total weight of the balloon + passengers + hot air, the balloon rises.\n\nHeat → molecules leave (open bottom) → fewer molecules, same volume → lower density → buoyancy. The particle model explains every step of this chain.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "In the SHC practical, you use an immersion heater inside a beaker of water. One safety precaution is \"don't pour water near an electric balance.\" Why is this specifically dangerous? (2 steps)", "answer": "- Step 1: Water is a conductor of electricity (especially tap water, which contains dissolved ions). If water spills onto or near the electric balance, it can create a conductive path between live electrical components and the user, causing an electric shock.\n- Step 2: The balance is electronic and plugged into the mains. Water bridging the gap between internal circuits and the outer casing, or between the balance and the bench surface, can result in a short circuit or the user receiving a shock when touching the wet balance. This is why you should set up the balance away from water sources, use a heatproof mat, and handle all liquids carefully.\n\nElectricity + water = shock risk. Keep electrical equipment dry, and if the balance must be near the experiment, shield it from any possible splashes.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "A student measures the density of a liquid by pouring it into a measuring cylinder on a balance. They forget to zero the balance with the empty cylinder first, and just subtract the cylinder's mass manually. They accidentally use the cylinder mass in grams instead of kg when subtracting. Will their calculated density be too high or too low? (3 steps)", "answer": "- Step 1: Suppose the total mass (cylinder + liquid) is 170 g and the cylinder mass is 120 g. The correct liquid mass is $$170 - 120 = 50\\text{ g} = 0.050\\text{ kg}$$. If the volume is $$50\\text{ cm}^3 = 5 \\times 10^{-5}\\text{ m}^3$$, the correct density is $$\\frac{0.050}{5 \\times 10^{-5}} = 1000\\text{ kg/m}^3$$.\n- Step 2: If the student mistakenly subtracts 120 g as if it were 120 kg, they'd get a nonsensical negative mass. More realistically, if they use the cylinder mass in grams but the total mass in kg, or mix up units in the subtraction, the error could go either way depending on the exact mistake.\n- Step 3: The most likely realistic scenario: the student records total mass and cylinder mass both in grams, subtracts correctly (170 − 120 = 50 g), but then forgets to convert grams to kilograms before dividing by volume in m³. Using $$m = 50\\text{ g}$$ (not 0.050 kg) with $$V = 5 \\times 10^{-5}\\text{ m}^3$$ gives $$\\rho = \\frac{50}{5 \\times 10^{-5}} = 1{,}000{,}000\\text{ kg/m}^3$$ — a factor of 1000 too high, because they divided by 1000 too few in the mass.\n\nConsistent units: if volume is in m³, mass must be in kg. If volume is in cm³, mass must be in g. Mixing them without conversion gives errors of 1000× or worse.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "You have a sealed syringe containing air at room temperature. You push the plunger in halfway and hold it there. Explain what happens to (a) the volume, (b) the pressure, (c) the temperature initially, and (d) the temperature after waiting a few minutes. (4 steps)", "answer": "- Step 1: (a) The volume is halved — the plunger has reduced the available space by a factor of 2.\n- Step 2: (b) By Boyle's Law ($$p_1 V_1 = p_2 V_2$$ at constant T), halving the volume doubles the pressure. The gas molecules are in half the space, hitting the walls twice as often.\n- Step 3: (c) Initially, the temperature *increases*. Pushing the plunger does work on the gas (mechanical energy transfer), increasing the internal energy and kinetic energy of the molecules. The gas heats up momentarily. Boyle's Law strictly applies only if T is constant — here, T changes during the compression.\n- Step 4: (d) After waiting a few minutes, the gas cools back to room temperature by transferring heat to the surroundings (thermal equilibrium). *Now* Boyle's Law applies: at the new room temperature, the pressure settles to exactly double the original (since V is halved). The final state obeys $$p_1 V_1 = p_2 V_2$$, but the *intermediate* state did not because T was changing.\n\nBoyle's Law describes the equilibrium state at constant T. During rapid compression, T rises temporarily — the law applies only once the gas has cooled back to room temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "Why is it important to stir the ice-water mixture in the melting ice practical (CP6)? What happens to the temperature reading if you don't stir? (2 steps)", "answer": "- Step 1: Without stirring, the water near the heater becomes much warmer than the water near the ice. This creates a temperature gradient — hot water rises (convection), cold water sinks — and the thermometer may be sitting in a region that doesn't represent the average temperature.\n- Step 2: The temperature reading becomes unreliable: it may show a higher or lower value depending on the thermometer's position relative to the heater and ice. This introduces a systematic error in the heating curve, making the plateau appear at the wrong temperature or causing artificial slopes during what should be a flat section. Stirring ensures uniform temperature so the thermometer reads a value representative of the whole mixture.\n\nStirring ensures the measured temperature represents the *whole* system, not just the pocket of water near the thermometer.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "A student claims \"gases have no density because they're weightless.\" Identify two errors in this statement. (2 steps)", "answer": "- Step 1: First error: gases are not weightless. Gas molecules have mass, and since weight = mass × g, gas has weight. The reason we don't \"feel\" the weight of air is that atmospheric pressure pushes from all directions, and our bodies are adapted to it. A large volume of air (e.g., the air in a room) has considerable total weight.\n- Step 2: Second error: gases *do* have density. Air has a density of about $$1.3\\text{ kg/m}^3$$. This is much less than water ($$1000\\text{ kg/m}^3$$), but it is not zero. Density is mass per unit volume — since gas molecules have mass and occupy volume, density is small but definitely nonzero.\n\nAir's density of 1.3 kg/m³ means a typical classroom contains ~100 kg of air. Not weightless — just sparse.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "The particle model is described as a \"scientific model,\" not a literal photograph of reality. What does this distinction mean, and why is the model still useful? (2 steps)", "answer": "- Step 1: A scientific model is a simplified representation that captures the key features needed to explain and predict behaviour, without being a literal picture of reality. Particles are drawn as small spheres, but real atoms/molecules have complex structures (electron clouds, quantum behaviour) that the simple model ignores.\n- Step 2: The model is useful because it correctly predicts macroscopic behaviour: why solids are rigid, why liquids flow, why gases expand, why heating raises temperature, why compression increases pressure, etc. It doesn't need to be literally true in every detail — it just needs to give correct predictions for the phenomena we study. A good model trades exact realism for predictive power.\n\nThe particle model is like a map: it doesn't show every blade of grass, but it gets you where you need to go.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "You are told that a gas is at 2 atm pressure in a 3 L container at constant temperature. The gas is transferred to a 6 L container. What happens to the pressure, and what assumption must hold? (2 steps)", "answer": "- Step 1: By Boyle's Law ($$p_1 V_1 = p_2 V_2$$ at constant T): $$2 \\times 3 = p_2 \\times 6$$, so $$p_2 = \\frac{6}{6} = 1\\text{ atm}$$. Doubling the volume halves the pressure — they are inversely proportional.\n- Step 2: The assumption is that the temperature remains constant and no gas escapes or is added during the transfer. If the gas cools during expansion (e.g., doing work on the surroundings), the pressure would be lower than 1 atm. If the transfer is slow enough for thermal equilibrium with the room to be maintained, the assumption holds.\n\nBoyle's Law: double the volume → half the pressure. But only if T stays constant — a fast expansion cools the gas, and then $$p$$ would be even lower.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "Water is unusual: ice is *less* dense than liquid water. Explain how this is possible using the particle model, and state the practical consequence for life on Earth. (2 steps)", "answer": "- Step 1: When water freezes, the molecules form a regular crystalline structure (hexagonal arrangement) held by hydrogen bonds. This structure is *open* — it holds molecules further apart than in the liquid, where molecules can pack more closely. This open crystal occupies more volume for the same mass, making ice less dense ($$\\rho_{\\text{ice}} \\approx 917\\text{ kg/m}^3 < 1000\\text{ kg/m}^3$$).\n- Step 2: The practical consequence: ice floats on water. This insulates the water below from the cold air, preventing lakes and oceans from freezing solid. Aquatic life can survive beneath the ice. If ice were denser than water (like most substances), it would sink, and bodies of water would freeze from the bottom up — devastating for ecosystems.\n\nMost substances are denser as solids. Water is the exception because its crystal structure is open. This anomaly is essential for life.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "Synthesis question: You need to fully vaporise 1 kg of ice initially at −20°C into steam at 100°C. List the three distinct stages, state which equation applies at each stage, and identify whether energy goes into kinetic or potential energy. (3 steps)", "answer": "- Step 1: **Stage 1 — Heating ice from −20°C to 0°C**: Use $$\\Delta Q = mc_{\\text{ice}}\\Delta\\theta$$. Energy increases the *kinetic energy* of vibrating ice molecules. Temperature rises. The ice is still solid throughout.\n- Step 2: **Stage 2 — Melting ice at 0°C into water at 0°C**: Use $$Q = mL_f$$. Energy increases the *potential energy* — breaking hydrogen bonds so molecules can slide past each other. Temperature is constant. The state changes from solid to liquid.\n+ Then, **Stage 2b — Heating water from 0°C to 100°C**: Use $$\\Delta Q = mc_{\\text{water}}\\Delta\\theta$$. Energy increases *kinetic energy* of the liquid water molecules. Temperature rises from 0°C to 100°C.\n- Step 3: **Stage 3 — Boiling water at 100°C into steam at 100°C**: Use $$Q = mL_v$$. Energy increases *potential energy* — completely breaking intermolecular bonds so molecules escape as gas. Temperature is constant. State changes from liquid to gas.\n\nThe full process requires five energy calculations (if you include Stage 2b): three temperature-change stages using $$mc\\Delta\\theta$$ and two state-change stages using $$mL$$. Each stage alternates between kinetic and potential energy — exactly as the heating curve shows with its slopes and plateaus.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "A student says \"if you heat a gas in a rigid container, the volume stays the same so the pressure can't change either.\" Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: The student assumes that pressure depends only on volume. But pressure depends on *both* the number/frequency of collisions *and* the force per collision. In a rigid container, the volume is fixed, but heating increases the speed of the molecules.\n- Step 2: Faster molecules hit the walls harder (more momentum per collision) and more often (less time between collisions). Same volume, but more and harder impacts → higher pressure. Volume being constant does not prevent pressure from changing — it just means the pressure change is driven entirely by temperature change, not volume change.\n\nIn a rigid container, V is constant but T changes → p changes. The student forgot that temperature affects molecular speed and thus collision force and frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}, {"question": "A metal block has mass 200 g and volume 25 cm³. A student calculates density as $$\\rho = \\frac{200}{25} = 8\\text{ g/cm}^3$$ and says \"this is 8 kg/m³.\" Identify the unit error and correct it. (2 steps)", "answer": "- Step 1: The density calculation of $$8\\text{ g/cm}^3$$ is correct. However, the conversion to kg/m³ is wrong. The student seems to have just changed the label from g/cm³ to kg/m³ without converting.\n- Step 2: To convert: $$1\\text{ g/cm}^3 = 1000\\text{ kg/m}^3$$, so $$8\\text{ g/cm}^3 = 8000\\text{ kg/m}^3$$. The student's answer of 8 kg/m³ is off by a factor of 1000 — they treated the number 8 as if it were already in kg/m³. In reality, 8 kg/m³ would be less dense than air (1.3 kg/m³), which is clearly impossible for a metal block.\n\n8 g/cm³ = 8000 kg/m³. A density of 8 kg/m³ would be thinner than air — an immediate sanity check reveals the error.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": true}, {"question": "Two objects have the same mass but different densities. Object A has twice the density of Object B. How do their volumes compare, and what does this tell you about how the particles are arranged? (2 steps)", "answer": "- Step 1: From $$\\rho = m/V$$, if both have the same mass $$m$$, then $$V = m/\\rho$$. Object A has twice the density, so $$V_A = m/(2\\rho_B) = \\frac{1}{2}V_B$$. Object A has half the volume of Object B.\n- Step 2: Same mass in half the volume means Object A's particles are packed twice as tightly. Either Object A has more particles per unit volume, or (if they're the same material) Object A has been compressed. For different materials, it means Object A's atoms are heavier or packed more efficiently. Either way, density is a measure of how tightly matter is packed.\n\nSame mass, double the density → half the volume. The particles in Object A are squeezed into a tighter space.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "In the SHC practical, why is it important to use a *lid* on the beaker of water? How does this affect the measured value of $$c$$ if you forget the lid? (2 steps)", "answer": "- Step 1: A lid reduces heat loss by convection (hot water vapour can't escape) and evaporation (water molecules can't leave the surface). Without a lid, significant energy is lost to the surroundings through these mechanisms.\n- Step 2: Without a lid, more energy escapes, so the water receives less of the electrical energy supplied. The temperature rise is *smaller* than it should be for the energy input. Since $$c = \\frac{E}{m\\Delta\\theta}$$, a smaller $$\\Delta\\theta$$ with the same $$E$$ gives a *larger* calculated $$c$$. The lid reduces this systematic error by keeping more energy in the water.\n\nNo lid → more heat loss → smaller $$\\Delta\\theta$$ → calculated $$c$$ is too high. The lid is a crucial part of reducing systematic error.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "A student measures the specific heat capacity of water and gets 5000 J/kg°C instead of the accepted 4200 J/kg°C. Is their value too high or too low, and what is the most likely experimental reason? (2 steps)", "answer": "- Step 1: The measured value (5000) is higher than the accepted value (4200). This means the calculation says more energy is needed per kg per °C than is actually the case — equivalently, for the energy supplied, the temperature rose *less* than expected.\n- Step 2: The most likely reason is heat loss to the surroundings. If some of the electrical energy ($$VIt$$) escapes to the air/beaker instead of heating the water, the water's $$\\Delta\\theta$$ is smaller than it should be for the recorded energy input. Using the full $$VIt$$ in the numerator but a reduced $$\\Delta\\theta$$ in the denominator gives an inflated $$c$$. The result is a systematic overestimate.\n\nMeasured $$c$$ too high → heat loss is the culprit. This is the signature error of the SHC practical — it almost always overestimates because energy loss is almost impossible to eliminate entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "Why does a vacuum flask (Thermos) have double walls with a vacuum between them? Explain using all three heat transfer mechanisms. (3 steps)", "answer": "- Step 1: **Conduction** requires particles to transfer energy by collision. A vacuum has no particles at all, so conduction through the vacuum gap is impossible. This eliminates the main conduction path between inner and outer walls.\n- Step 2: **Convection** requires a fluid that can circulate (hot rises, cold sinks). A vacuum has no fluid, so convection cannot occur in the gap. This eliminates convective heat transfer entirely.\n- Step 3: **Radiation** can travel through a vacuum (it's electromagnetic waves, e.g., infrared). The vacuum doesn't stop radiation. To address this, the flask's inner walls are silvered (shiny) — reflective surfaces reduce radiation by reflecting infrared back toward the liquid rather than letting it escape.\n\nThe vacuum eliminates conduction and convection completely; the silvering reduces radiation. Together, they make the flask an excellent insulator. No single mechanism is \"stopped\" — but two are eliminated and one is significantly reduced.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "A sealed balloon contains helium gas at room temperature. It is placed in a freezer. Describe what happens to (a) the average speed of the helium molecules, (b) the frequency of wall collisions, and (c) the pressure inside the balloon. (3 steps)", "answer": "- Step 1: (a) Cooling the gas reduces the average kinetic energy of the molecules, so their average speed *decreases*. The molecules move more slowly at the lower temperature.\n- Step 2: (b) Slower molecules travel shorter distances between collisions but also take longer to cross the container. The dominant effect is that slower molecules hit the walls *less frequently* (fewer collisions per second). Additionally, the balloon may shrink slightly, but the main effect at fixed volume would be fewer collisions.\n- Step 3: (c) Both effects — slower molecules (less force per collision) and less frequent collisions — reduce the pressure. The balloon in the freezer has *lower* pressure than at room temperature. If the balloon is elastic, it will shrink as the internal pressure drops below atmospheric pressure, until the elastic tension balances the pressure difference.\n\nCooler gas → slower molecules → fewer and weaker collisions → lower pressure. The balloon shrinks visibly — this is the macroscopic evidence of microscopic slowing.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "The eureka can method works for finding the volume of irregular *solids*. Why can't you use the same method to find the volume of an *irregularly shaped cavity* inside a solid block? (2 steps)", "answer": "- Step 1: The eureka can measures the volume of water displaced by a submerged object. An irregular cavity *inside* a solid block is enclosed — water cannot enter it (unless the block is porous or has openings). The water is displaced by the *outer* shape of the block, not by the internal cavity.\n- Step 2: The volume measured by displacement is the *total external volume* of the block, including the cavity space. To find the cavity volume, you'd need to know the volume of solid material separately (e.g., from mass and known material density) and subtract: $$V_{\\text{cavity}} = V_{\\text{external}} - V_{\\text{solid material}}$$.\n\nThe eureka can measures what the object *pushes aside* (external volume), not what's *missing inside* (internal cavities). For that, you need additional information.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}, {"question": "A student asks \"why can't we just use the density formula $$\\rho = m/V$$ to find the mass of a gas? We know the volume of the container.\" What practical difficulty makes this harder than for a solid or liquid? (2 steps)", "answer": "- Step 1: You *can* use $$m = \\rho V$$ for a gas, but the mass of gas in a typical container is extremely small. For example, 1 m³ of air has a mass of only ~1.3 kg. A 1-litre container (0.001 m³) holds only ~1.3 grams of air. Measuring such tiny masses requires a very precise balance.\n- Step 2: Additionally, you can't simply put a container of gas on a balance and get the gas mass — the balance would measure the container + gas together, and the gas mass is such a tiny fraction of the total that it's almost impossible to resolve. For solids and liquids, the mass is large enough to measure easily; for gases, the mass is often negligible compared to the container.\n\nGas masses are tiny because gas densities are ~1000× smaller than liquids. The formula works in principle, but the practical measurement is very difficult without specialised equipment.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": true}, {"question": "You compress a gas quickly in a syringe and notice the syringe barrel gets warm. Your friend says \"that's friction from your hand.\" How could you design a simple test to show that the warmth is mainly from gas compression, not hand friction? (2 steps)", "answer": "- Step 1: Perform the *same* pushing motion with the syringe *empty* (or sealed with no gas inside, just the plunger). If the warmth were from hand friction on the barrel, the syringe should get just as warm. If it doesn't get warm (or gets much less warm), the heat must come from compressing the gas, not from friction.\n- Step 2: Alternatively, compress the gas *slowly* versus *quickly*. If the warmth is from friction (which depends on total distance moved, not speed), both speeds should give similar warming. But if it's from gas compression (doing work on the gas), the total energy transferred is the same regardless of speed, but the *rate* of heating differs — slow compression allows heat to dissipate to the surroundings, so the barrel feels less warm. Quick compression traps the energy as heat.\n\nThe control experiment: empty syringe, same motion. No warmth = gas compression is the cause. This is how you isolate variables in experimental physics.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": true}], "count": 70}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why do solids and liquids have similar densities, while gases are much less dense? Explain using the particle model. (3 steps)", "answer": "- Step 1: **Particle spacing**. In solids and liquids, particles are closely packed with minimal gaps (touching), leading to high mass per unit volume. In gases, particles are far apart (~10× separation in each direction), resulting in low mass per unit volume.  \n- Step 2: **Compressibility**. Gases are highly compressible due to large gaps between particles, but solids/liquids are incompressible because particles are already in contact. This spacing difference directly affects density.  \n+ Example: Air (gas) has a density of ~1.3 kg/m³, while water (liquid) is 1000 kg/m³—a 1000× difference.  \n- Step 3: **State transitions**. Melting or freezing (solid ⇌ liquid) doesn’t change particle spacing significantly, so density remains similar. Evaporation (liquid → gas) drastically increases spacing, lowering density.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "During a phase change (e.g., melting), why does temperature remain constant even though energy is added? Link this to internal energy and particle behavior. (3 steps)", "answer": "- Step 1: **Energy allocation**. The added energy (Q = mL) breaks intermolecular bonds rather than increasing kinetic energy (KE). Temperature depends only on average KE, so it stays constant.  \n- Step 2: **Potential energy (PE) increase**. As bonds break, particles move farther apart, increasing PE. Internal energy (KE + PE) rises, but KE (temperature) doesn’t.  \n+ Contrast: Heating a solid (ΔQ = mcΔθ) increases KE, so temperature rises.  \n- Step 3: **Heating curve plateau**. The flat section on a temperature-time graph shows energy going into overcoming forces, not raising KE.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "How does Boyle’s Law explain why a bicycle pump gets warm when compressing air? (3 steps)", "answer": "- Step 1: **Work done on gas**. Compressing air reduces its volume (V ↓), increasing pressure (p ↑) via p₁V₁ = p₂V₂.  \n- Step 2: **Energy transfer**. Work (force × distance) done on the gas transfers energy to its particles, raising their kinetic energy (KE).  \n+ Link to temperature: KE ∝ temperature, so the gas (and pump) warms.  \n- Step 3: **Real-world example**. A rapid compression (e.g., inflating a tire) generates heat; slow compression allows thermal equilibrium with surroundings.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is the specific latent heat of vaporization (Lᵥ) always greater than the specific latent heat of fusion (Lₖ) for the same substance? (3 steps)", "answer": "- Step 1: **Bond-breaking requirements**. Fusion (melting) only requires partial bond breaking to allow particle slippage (solid → liquid). Vaporization requires complete bond breaking (liquid → gas).  \n- Step 2: **Energy demand**. Separating particles into a gas phase requires far more energy than the partial separation in melting.  \n+ Example: For water, Lᵥ = 2.26 MJ/kg vs. Lₖ = 330 kJ/kg (7× higher).  \n- Step 3: **Distance between particles**. Gas particles are much farther apart than liquid particles, so overcoming intermolecular forces demands more energy.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "How does a eureka can measure the volume of an irregular solid? Why is this method reliable? (3 steps)", "answer": "- Step 1: **Principle of displacement**. The solid displaces a volume of water equal to its own volume when fully submerged.  \n- Step 2: **Setup**: Fill the can to the spout, submerge the object gently, and collect the overflow in a measuring cylinder.  \n+ Caution: Splashing or incomplete submersion leads to errors.  \n- Step 3: **Reliability**: Water’s incompressibility ensures that displaced volume = object volume. Repeating measurements and averaging improves accuracy.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is thermal insulation effective when using materials with trapped air (e.g., wool, foam)? Explain for conduction, convection, and radiation. (3 steps)", "answer": "- Step 1: **Conduction**: Air is a poor conductor (few particles to transfer energy). Trapped air pockets in insulation materials reduce heat flow.  \n- Step 2: **Convection**: Trapped air cannot circulate freely, suppressing convection currents.  \n+ Example: Fiberglass traps air, preventing both conduction and convection.  \n- Step 3: **Radiation**: Shiny surfaces (e.g., in vacuum flasks) reflect infrared radiation, reducing energy loss via electromagnetic waves.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "How does the Kelvin scale differ from the Celsius scale, and why is absolute zero significant in the particle model? (3 steps)", "answer": "- Step 1: **Scale offset**: 0 K = -273°C (absolute zero). 1 K = 1°C in size, but Kelvin starts at the lowest possible particle energy.  \n- Step 2: **Kinetic theory**: At absolute zero, particles have minimal KE (no motion). Negative Kelvin temperatures are impossible.  \n+ Conversion: T(K) = θ(°C) + 273.  \n- Step 3: **Gas behavior**: At 0 K, gas particles exert zero pressure, aligning with p ∝ T (qualitative pressure-temperature link).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does a gas exert pressure on the walls of its container according to the kinetic theory? (2 steps)", "answer": "- Step 1: **Particle collisions**: Gas particles move randomly at high speeds and collide with the container walls.  \n- Step 2: **Force per unit area**: Each collision exerts a force perpendicular to the wall. Pressure = force/area (p = F/A).  \n+ Example: Doubling particle speed increases both collision frequency and force, raising pressure.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "In Core Practical 6 (SHC of water), why might the measured specific heat capacity (c) be higher than the expected value (4200 J/kg°C)? (2 steps)", "answer": "- Step 1: **Energy losses**: Some electrical energy (E = VIt) heats the immersion heater or escapes to the surroundings instead of the water.  \n- Step 2: **Graph interpretation**: Using the entire graph (including the initial curve where heater warms up) overestimates c. Only the straight-line region (steady heating) should be used.  \n+ Mitigation: Insulate the beaker and use a lid to reduce heat loss.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does Brownian motion provide evidence for the particle model of matter? (2 steps)", "answer": "- Step 1: **Observation**: Smoke or pollen particles move in random, zig-zag paths under a microscope.  \n- Step 2: **Explanation**: Invisible air molecules collide with the visible particles from all sides, causing erratic motion. This confirms particles exist and are in constant motion.  \n+ Misconception: Students often confuse Brownian motion with molecular motion itself.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is density, and how is it calculated using the basic formula? (2 steps)", "answer": "- Step 1: Density ($ \\rho $) is the mass ($ m $) of a substance per unit volume ($ V $), reflecting how tightly packed its particles are.  \n- Step 2: It is calculated using $ \\rho = \\frac{m}{V} $, where mass is in kg or g, and volume in m³ or cm³. For example, water has $ \\rho = 1000 \\, \\text{kg/m}^3 $ because 1 kg of water occupies 0.001 m³.  \n\nOne-sentence takeaway: Density quantifies how much mass is contained in a given volume.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is density *not* the same as weight, even though both relate to \"heaviness\"? (2 steps)", "answer": "- Step 1: Density ($ \\rho = m/V $) depends on mass and volume, not gravity. A substance’s density remains the same whether on Earth or the Moon.  \n- Step 2: Weight ($ W = mg $) depends on gravity. A 1 kg object weighs 9.8 N on Earth but 1.6 N on the Moon, though its density stays constant.  \n\nMisconception probe: High-density materials feel heavier *for the same volume*, but weight also depends on total mass and gravity.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do the particle arrangements in solids, liquids, and gases explain their relative densities? (3 steps)", "answer": "- Step 1: In solids, particles are tightly packed in fixed positions, giving high density (e.g., iron’s $ 8000 \\, \\text{kg/m}^3 $).  \n- Step 2: In liquids, particles are still close but mobile, leading to similar densities as solids (e.g., water’s $ 1000 \\, \\text{kg/m}^3 $).  \n- Step 3: Gases have particles far apart, making their densities ~1000× lower (e.g., air’s $ 1.3 \\, \\text{kg/m}^3 $).  \n\nVisual intuition: Imagine marbles (solid) vs. rolling balls (liquid) vs. scattered confetti (gas).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Describe the method to measure the volume of an irregular solid using a eureka can. What mistake might lead to an incorrect volume? (2 steps)", "answer": "- Step 1: Fill the eureka can to the spout. Submerge the object gently, collecting displaced water in a measuring cylinder. The displaced volume equals the object’s volume.  \n- Step 2: Splashing or dropping the object can displace extra water, overestimating the volume. Ensure the can is initially full to the spout.  \n\nPractical tip: Repeat the experiment and average results to minimize errors.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does mass remain conserved during changes of state (e.g., melting, boiling)?", "answer": "During physical changes like melting or boiling, the number of molecules stays the same; only their arrangement and energy change. For example, 1 kg of ice becomes 1 kg of water when melted.  \n\nException: Evaporation can reduce mass in an open container, but this is due to molecules leaving the system, not the state change itself.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Define internal energy. How does it differ from temperature during a phase change? (2 steps)", "answer": "- Step 1: Internal energy is the total kinetic + potential energy of particles. Kinetic energy determines temperature, while potential energy relates to bonds between particles.  \n- Step 2: During melting or boiling, internal energy increases (potential energy rises as bonds break), but temperature stays constant.  \n\nContrast: Temperature reflects kinetic energy alone, while internal energy accounts for both forms.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does the heating curve of a substance have flat plateaus? What do they represent? (2 steps)", "answer": "- Step 1: Plateaus occur during phase changes (melting/freezing, boiling/condensing). Energy added is used to break bonds (potential energy), not raise temperature.  \n- Step 2: For example, ice at 0°C remains there until fully melted, even though heat is supplied.  \n\nKey distinction: Slopes represent temperature change ($ \\Delta Q = mc\\Delta\\theta $), plateaus represent state changes ($ Q = mL $).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Explain the difference between specific heat capacity ($ c $) and specific latent heat ($ L $). How do their units reflect their purposes? (2 steps)", "answer": "- Step 1: $ c $ (J/kg°C) measures energy needed to raise 1 kg of a substance’s temperature by 1°C. Water’s high $ c $ (4200 J/kg°C) makes it a good cooler.  \n- Step 2: $ L $ (J/kg) measures energy to change 1 kg of state without temperature change. Vaporisation requires more energy ($ L_v = 2.26 \\, \\text{MJ/kg} $) than fusion ($ L_f = 330 \\, \\text{kJ/kg} $).  \n\nUnits: $ c $ includes °C (temperature change), $ L $ does not.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does it take more energy to boil water than to melt ice?", "answer": "Boiling requires overcoming all intermolecular forces to separate particles completely, while melting only partially breaks bonds. For water:  \n- $ L_f = 330 \\, \\text{kJ/kg} $ (melting)  \n- $ L_v = 2.26 \\, \\text{MJ/kg} $ (boiling)  \n\nOrder of magnitude: Vaporisation ≈ 7× more energy than fusion.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does thermal insulation in a vacuum flask reduce heat loss? (3 steps)", "answer": "- Step 1: A vacuum layer prevents conduction and convection (no particles to transfer heat).  \n- Step 2: Shiny surfaces reduce radiation (reflecting infrared waves).  \n- Step 3: Tight lids stop evaporation and convection currents escaping.  \n\nPractical application: Trapped air in materials (e.g., foam) also insulates, as air is a poor conductor.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is Brownian motion, and what does it demonstrate about molecules?", "answer": "Brownian motion is the random zig-zag movement of particles (e.g., smoke) in a fluid, caused by collisions with unseen gas/liquid molecules.  \n\nKey insight: It provides indirect evidence for the existence and random motion of molecules in matter.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is absolute zero the lowest possible temperature? How is it related to the Kelvin scale? (2 steps)", "answer": "- Step 1: At absolute zero (−273°C or 0 K), particles have minimal kinetic energy, so no further cooling is possible.  \n- Step 2: The Kelvin scale starts at 0 K, with 1 K = 1°C increment. To convert: $ T(K) = \\theta(°C) + 273 $.  \n\nLimiting case: Negative Kelvin temperatures are impossible; 0 K is the theoretical minimum.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "In Boyle’s Law, why must temperature remain constant? (2 steps)", "answer": "- Step 1: Boyle’s Law ($ p_1 V_1 = p_2 V_2 $) assumes particles move at constant speed (fixed kinetic energy).  \n- Step 2: If temperature rises, particles move faster, increasing pressure independently of volume, violating the inverse relationship.  \n\nPractical example: Pumping air into a tire quickly raises both pressure and temperature temporarily, invalidating Boyle’s Law.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "Why does compressing a gas increase its temperature? (2 steps)", "answer": "- Step 1: Compressing a gas (e.g., bicycle pump) does work on it, transferring energy to the particles.  \n- Step 2: This increases internal energy, raising particle kinetic energy (temperature).  \n\nReal-world example: Air in a bicycle pump feels warm after compressing it rapidly.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Using $ \\Delta Q = mc\\Delta\\theta $, how much energy is needed to heat 0.5 kg of water from 20°C to 30°C? Why is water’s high $ c $ important? (2 steps)", "answer": "- Step 1: $ \\Delta Q = 0.5 \\, \\text{kg} \\times 4200 \\, \\text{J/kg°C} \\times 10°C = 21,000 \\, \\text{J} $.  \n- Step 2: Water’s high $ c $ makes it effective for storing/transporting thermal energy (e.g., radiator systems).  \n\nIntuition: Substances with high $ c $ resist temperature changes, requiring more energy to heat or cool.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "How does the particle model explain gas pressure? Why does pressure increase with temperature (at constant volume)? (3 steps)", "answer": "- Step 1: Gas particles collide with container walls, exerting force per unit area (pressure).  \n- Step 2: Higher temperature increases particle speed, leading to more frequent and forceful collisions.  \n- Step 3: At constant volume, $ p \\propto T $, so pressure rises with temperature.  \n\nAnalogy: Faster, more frequent punches from particles = higher pressure.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "What happens to a gas’s pressure if its volume is halved, assuming constant temperature? Use Boyle’s Law to explain. (2 steps)", "answer": "- Step 1: Boyle’s Law states $ p_1 V_1 = p_2 V_2 $. Halving volume ($ V_2 = V_1/2 $) doubles pressure ($ p_2 = 2p_1 $).  \n- Step 2: Particles collide with walls twice as often in a smaller space, increasing pressure.  \n\nVisual intuition: Squeezing a balloon reduces volume, making air molecules hit the walls harder.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why is the Kelvin scale necessary in gas law calculations? (2 steps)", "answer": "- Step 1: The Kelvin scale has no negative values, directly proportional to particle kinetic energy (unlike Celsius).  \n- Step 2: At 0 K, particles stop moving, making it a true \"zero\" for gas laws (e.g., Charles’s Law $ V \\propto T $ requires Kelvin).  \n\nMathematical necessity: Ratios like $ V_1/T_1 = V_2/T_2 $ only work with absolute temperatures.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "A gas at 100 kPa and 0.3 m³ is compressed to 0.1 m³. What is the new pressure? (3 steps)", "answer": "- Step 1: Apply Boyle’s Law: $ p_1 V_1 = p_2 V_2 $.  \n- Step 2: $ p_2 = \\frac{p_1 V_1}{V_2} = \\frac{100 \\, \\text{kPa} \\times 0.3 \\, \\text{m}^3}{0.1 \\, \\text{m}^3} = 300 \\, \\text{kPa} $.  \n- Step 3: Volume decreased 3×, so pressure increased 3× (inverse relationship).  \n\nEdge case: If temperature changes, Boyle’s Law no longer applies.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Why does evaporation cause cooling in the remaining liquid? (2 steps)", "answer": "- Step 1: Faster-moving particles escape during evaporation, leaving slower (cooler) particles behind.  \n- Step 2: This reduces the average kinetic energy (temperature) of the remaining liquid.  \n\nEveryday example: Sweat evaporating cools skin.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": true}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Explain why gases have much lower density than solids or liquids, using the particle model. (3 steps)", "answer": "- Step 1: Recall particle spacing in each state\nIn solids and liquids, particles are very close together (touching), separated only by interatomic bonds. In gases, particles are widely separated—about 10 times farther apart in each direction.\n- Step 2: Consider what density measures\nDensity = mass per unit volume. Since gases have the same mass (same number of particles) spread over a vastly larger volume, their density is much lower.\n- Step 3: Quantitative example\nAir has density ~1.3 kg/m³ while water has ~1000 kg/m³—a ratio of about 1:770. This is because gas particles are far apart, not because they are lighter.\n\n[Gases are highly compressible because of the large gaps; solids/liquids are nearly incompressible.]", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the difference between \"density\" and \"weight\"? Why is this a common misconception? (2 steps)", "answer": "- Step 1: Define each term\nDensity (ρ) = mass ÷ volume, measured in kg/m³. It is an intrinsic property of a material, independent of gravity. Weight = force due to gravity, measured in newtons (N = mg).\n- Step 2: Why the confusion\nOn Earth, we observe heavy objects (like lead) are also dense, and light objects (like feathers) are less dense—this correlation creates the misconception. But in space or underwater, weight changes while density stays the same. A lead block weighs less on the Moon but has identical density.\n\n[Density is \"how tightly packed the matter is\"; weight is \"how strongly gravity pulls on it.\"]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Describe the particle arrangement and motion in a solid, liquid, and gas. How does this explain their different shapes and volumes? (3 steps)", "answer": "- Step 1: Solid\nParticles are arranged in a regular, fixed pattern and vibrate about their positions. Strong bonds hold them together → definite shape and volume, cannot flow.\n- Step 2: Liquid\nParticles are close together but with no regular pattern—they slide past each other. This allows flow but keeps volume definite → takes the shape of the container but fills to a specific volume.\n- Step 3: Gas\nParticles move randomly at high speeds, far apart with no bonds. They bounce off container walls → no definite shape or volume; gas expands to fill the entire container.\n\n[The key: solids have fixed positions; liquids can slide; gases move freely.]", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is Brownian motion, and what does it provide evidence for? (2 steps)", "answer": "- Step 1: Define Brownian motion\nThe random, zig-zag motion of tiny particles (e.g., smoke or pollen) suspended in a fluid, visible under a microscope.\n- Step 2: The explanation and evidence\nThese visible particles are being bombarded from all sides by countless unseen fast-moving molecules of the fluid. This random bombardment causes the visible particles to jitter about. It provides direct evidence that molecules exist and are in constant random motion—even though we cannot see the molecules themselves.\n\n[Important misconception: Brownian motion is NOT the motion of gas molecules themselves; it's the visible effect of molecular collisions on larger particles.]", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Define internal energy, and explain how it differs from temperature. (2 steps)", "answer": "- Step 1: Define internal energy\nThe total energy stored in a system by its particles = sum of kinetic energy (from motion/vibration) + potential energy (from particle spacing/bonds).\n- Step 2: Distinguish from temperature\nTemperature measures the average kinetic energy only—the \"hotness\" of a substance. During a change of state (e.g., melting ice at 0°C), temperature stays constant but internal energy still increases because energy goes into breaking bonds (increasing potential energy), not into increasing kinetic energy.\n\n[Key insight: Two objects at the same temperature can have different internal energies if they have different masses or types of particles.]", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "A heating curve shows a flat plateau at 0°C while ice melts to water. What is happening to the energy supplied during this plateau? Why does the temperature not change? (3 steps)", "answer": "- Step 1: What the plateau represents\nThe flat section at 0°C indicates the change of state from solid (ice) to liquid (water). Energy continues to be supplied, but temperature remains constant.\n- Step 2: Where the energy goes\nDuring melting, energy is used to break the bonds between molecules (not to increase speed). This increases the potential energy of the particles while their kinetic energy stays constant.\n- Step 3: Why temperature doesn't change\nTemperature measures average kinetic energy. Since kinetic energy isn't changing during the phase change, the temperature reading stays the same—despite the system gaining internal energy.\n\n[This is the key distinction: temperature → kinetic energy; phase change → potential energy.]", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Define specific heat capacity. Why does water have a much higher specific heat capacity than metals like copper? (2 steps)", "answer": "- Step 1: Definition\nSpecific heat capacity (c) = the amount of thermal energy required to raise the temperature of 1 kg of a substance by 1°C. Measured in J/kg°C.\n- Step 2: Why water's value is high\nWater has strong hydrogen bonds between molecules. To raise its temperature, you must overcome these bonds and increase the kinetic energy of the water molecules. Metals like copper have weaker metallic bonds, so less energy is needed to increase particle motion. Water's high c (4200 J/kg°C) vs copper's (~385 J/kg°C) means water heats and cools much more slowly—a crucial factor in climate regulation and cooking.\n\n[High c = \"hard to heat, hard to cool\"; Low c = \"easy to heat, easy to cool.\"]", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "What is the difference between specific heat capacity and specific latent heat? (2 steps)", "answer": "- Step 1: Specific heat capacity (c)\nUsed when temperature changes within the SAME state. Formula: ΔQ = mcΔθ. Energy causes particle speed to change → temperature rises/falls.\n- Step 2: Specific latent heat (L)\nUsed when state changes at CONSTANT temperature. Formula: Q = mL. Energy breaks or forms bonds between particles → potential energy changes, but kinetic energy (temperature) stays the same. Two types: L_f (fusion, solid↔liquid) and L_v (vaporisation, liquid↔gas).\n\n[SHC: \"heating stuff up\"; Latent heat: \"changing stuff into another form\"]", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Calculate the energy required to melt 0.5 kg of ice at 0°C. The specific latent heat of fusion for ice is 330 kJ/kg. (2 steps)", "answer": "- Step 1: Identify the formula\nSince ice is melting at constant temperature, we use the latent heat equation:\n$$Q = mL$$\n- Step 2: Substitute values\n$$Q = 0.5 \\text{ kg} \\times 330,000 \\text{ J/kg} = 165,000 \\text{ J} = 165 \\text{ kJ}$$\n\n[Note: No Δθ term because temperature doesn't change during melting—the energy goes into breaking bonds, not increasing kinetic energy.]", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why does boiling water require much more energy than melting the same mass of ice? (2 steps)", "answer": "- Step 1: Consider what's happening in each change\nMelting (fusion): Solid → liquid. Particles gain enough energy to break some bonds and move past each other, but remain relatively close.\nBoiling (vaporisation): Liquid → gas. Particles must completely break free from their neighbors and overcome the entire attractive force—this requires far more energy per kilogram.\n- Step 2: Compare the latent heat values for water\n$$L_f = 330 \\text{ kJ/kg} \\quad \\text{vs.} \\quad L_v = 2260 \\text{ kJ/kg}$$\nThe vaporisation latent heat is about 7 times larger than the fusion latent heat. That's why steam at 100°C causes severe burns—releasing latent heat during condensation transfers enormous energy.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A heater supplies 2000 J of energy to 0.2 kg of water, raising its temperature by 2.4°C. Calculate the specific heat capacity of water from this data. (2 steps)", "answer": "- Step 1: Rearrange the formula\nFrom ΔQ = mcΔθ, we get:\n$$c = \\frac{\\Delta Q}{m \\Delta \\theta}$$\n- Step 2: Substitute and calculate\n$$c = \\frac{2000}{0.2 \\times 2.4} = \\frac{2000}{0.48} = 4166.7 \\approx 4200\\text{ J/kg°C}$$\n\n[This is close to the accepted value of 4200 J/kg°C—the small difference is due to experimental errors like heat loss to surroundings.]", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Describe how to determine the density of an irregular solid (e.g., a stone) using a eureka can. What measurements are needed, and how is the volume obtained? (3 steps)", "answer": "- Step 1: Measure the mass\nUsing a digital balance, measure the mass of the irregular object (in grams). Convert to kg if needed.\n- Step 2: Set up the eureka can\nFill the eureka (displacement) can with water until it just overflows from the spout. Place a measuring cylinder under the spout to collect the displaced water.\n- Step 3: Measure displaced volume\nGently lower the object into the water. Water equal to the object's volume will overflow into the measuring cylinder. Read this volume (in cm³)—this equals the object's volume. Then ρ = m/V.\n\n[Common errors: dropping the object too fast causes splashing; not filling to the spout gives wrong volume; air bubbles trapped on object reduce measured volume.]", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Explain how to find the density of a liquid using a measuring cylinder and a balance. What is the key procedural step to ensure accuracy? (2 steps)", "answer": "- Step 1: Measure mass and volume\nPlace an empty measuring cylinder on the balance and zero (tare) it. Add the liquid to a known volume (e.g., 50 cm³). The balance now reads the mass of just the liquid.\n- Step 2: Calculate density\nConvert mass to kg and volume to m³, then use ρ = m/V. Example: 50 cm³ of liquid with mass 45 g → ρ = 0.045 kg / (50 × 10⁻⁶ m³) = 900 kg/m³.\n- Key step: Zeroing the balance\nAlways zero (tare) the balance with the empty container first. This eliminates the container's mass from measurements and is the most common source of error if forgotten.\n\n[Without taring, you'd need to weigh the empty cylinder, weigh it full, then subtract—the tare function does this automatically.]", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is absolute zero? Why can nothing be colder than absolute zero? (2 steps)", "answer": "- Step 1: Define absolute zero\nThe temperature at which particles have zero kinetic energy—they would stop moving entirely. This occurs at -273°C or 0 K. It is the lowest possible temperature.\n- Step 2: Why nothing can be colder\nTemperature is a measure of average kinetic energy. If kinetic energy is zero, you cannot have negative kinetic energy—you cannot have \"less than zero\" motion. Therefore, -273°C represents an absolute lower bound. Kelvin temperatures are never negative because the scale starts at this fundamental minimum.\n\n[Absolute zero is a theoretical limit—real substances never quite reach it, but get arbitrarily close.]", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Convert 27°C to Kelvin, and convert 250 K to Celsius. (2 steps)", "answer": "- Step 1: Celsius to Kelvin\n$$T_K = \\theta_{°C} + 273$$\n$$27 + 273 = 300\\text{ K}$$\n- Step 2: Kelvin to Celsius\n$$\\theta_{°C} = T_K - 273$$\n$$250 - 273 = -23°C$$\n\n[Remember: a change of 1 K equals a change of 1°C—they have the same size degree. Only the zero points differ.]", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "State Boyle's Law. If a gas occupies 0.5 m³ at a pressure of 100 Pa, what will be its pressure if the volume is compressed to 0.2 m³ at constant temperature? (2 steps)", "answer": "- Step 1: State Boyle's Law\nFor a fixed mass of gas at constant temperature, pressure is inversely proportional to volume:\n$$p_1 V_1 = p_2 V_2$$\n- Step 2: Calculate the new pressure\n$$p_2 = \\frac{p_1 V_1}{V_2} = \\frac{100 \\times 0.5}{0.2} = \\frac{50}{0.2} = 250\\text{ Pa}$$\n\n[Notice: halving the volume doubles the pressure (inverse relationship). This happens because the same number of particles now collide with the walls more frequently in a smaller space.]", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Explain qualitatively why pressure increases when a gas is compressed at constant temperature, using the particle model. (2 steps)", "answer": "- Step 1: What compression does\nWhen volume decreases, the gas particles are crowded into a smaller space. They don't speed up (temperature is constant), but they collide with the walls more frequently.\n- Step 2: Effect on pressure\nPressure = force per unit area. More collisions per second means more momentum transferred to the walls per second → greater average force on the walls → higher pressure.\n\n[Boyle's Law is inverse: Volume ↓ → pressure ↑; Volume ↑ → pressure ↓. Both temperature and mass must remain constant.]", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Explain what happens to the temperature when you rapidly compress a gas (e.g., by pushing a bicycle pump plunger in). Why does this happen? (2 steps)", "answer": "- Step 1: What work means here\nDoing work on a gas means a force is applied through a distance—compression. Energy is transferred from you to the gas molecules.\n- Step 2: Resulting temperature rise\nThis mechanical energy transfer increases the internal energy of the gas. Since the particles now have more kinetic energy on average, the temperature rises. The gas isn't \"heated\" by thermal transfer—its energy increased through work.\n\n[This is why a bicycle pump gets warm when you compress air quickly. The reverse also applies: expanding gas does work on surroundings and cools (like a CO₂ fire extinguisher forming dry ice).]", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Describe how a pressure cooker uses the particle model to cook food faster. (2 steps)", "answer": "- Step 1: The mechanism\nA sealed pressure cooker traps water vapor above the water liquid. This prevents escape of gas molecules, so volume is fixed.\n- Step 2: Why temperature rises\nWith fixed volume, heating the water increases the kinetic energy of the molecules. They collide more frequently and with greater force on the container walls → pressure rises. At higher pressure, the boiling point increases above 100°C (often ~120°C). Food cooks faster at this higher temperature because chemical reactions (cooking) proceed faster at higher temperatures.\n\n[The same principle: constant volume + heat → pressure ↑ → (in a closed system) boiling point ↑]", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A car tyre has a pressure of 2.0 × 10⁵ Pa at 15°C. After driving, the temperature rises to 35°C. Assuming the volume doesn't change appreciably, does the pressure increase, decrease, or stay the same? Explain qualitatively. (2 steps)", "answer": "- Step 1: Identify what changes\nVolume is roughly constant (the tyre doesn't expand much). Temperature increases from 15°C to 35°C.\n- Step 2: Apply kinetic theory\nAt higher temperatures, gas molecules move faster and collide with the tyre walls more frequently and with greater momentum. This increases the force per unit area → pressure rises.\n\n[This is why tyre pressure should be checked when tyres are cold—the pressure increases with temperature. The relationship is p ∝ T (at constant volume).]", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What are the six changes of state? For each, state whether the substance gains or loses energy, and whether it absorbs or releases thermal energy. (3 steps)", "answer": "- Step 1: Solid ↔ Liquid\n+ Melting (solid → liquid): gains energy, absorbs heat\n+ Freezing (liquid → solid): loses energy, releases heat\n- Step 2: Liquid ↔ Gas\n+ Boiling/evaporating (liquid → gas): gains energy, absorbs heat\n+ Condensing (gas → liquid): loses energy, releases heat\n- Step 3: Solid ↔ Gas\n+ Subliming (solid → gas directly): gains energy, absorbs heat\n+ Deposition (gas → solid directly): loses energy, releases heat\n\n[Mass is conserved in all changes—the number of particles remains the same. Only their arrangement and energy change.]", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A 2 kg block of copper is heated from 20°C to 80°C. The specific heat capacity of copper is 385 J/kg°C. Calculate the energy transferred. (2 steps)", "answer": "- Step 1: Identify the formula\nSince we're heating within the same state (solid copper), we use:\n$$\\Delta Q = mc\\Delta\\theta$$\n- Step 2: Calculate\n$$\\Delta \\theta = 80 - 20 = 60°C$$\n$$\\Delta Q = 2 \\times 385 \\times 60 = 46,200\\text{ J} \\approx 46\\text{ kJ}$$\n\n[Compare to water: the same mass of water would need 2 × 4200 × 60 = 504 kJ—over 10 times more energy!]", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Why is it incorrect to say \"heat rises\"? Explain the actual mechanism of heat transfer in fluids. (2 steps)", "answer": "- Step 1: The misconception\n\"Heat\" is not a substance that rises—it's energy transfer. What actually rises is the material itself (the fluid).\n- Step 2: The correct explanation—convection\nWhen a fluid (liquid or gas) is heated from below, the lower portion warms up, expands, and becomes less dense. This warmer, less dense fluid then rises upward (because it's buoyant in the surrounding cooler, denser fluid). Cooler fluid sinks to take its place, creating a convection current. The moving fluid carries thermal energy with it.\n\n[Conduction: vibration passes through material. Convection: hot material moves. Radiation: electromagnetic waves.]", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "Explain how a vacuum flask keeps hot drinks hot (and cold drinks cold). Name the three heat transfer mechanisms the flask minimises. (3 steps)", "answer": "- Step 1: Conduction\nThe flask has a double wall with a vacuum between them. A vacuum contains no particles, so conduction (energy transfer through vibrating particles) is minimal.\n- Step 2: Convection\nWith a vacuum, there are no particles to convect—no fluid to carry energy away. The vacuum layer prevents convective heat loss.\n- Step 3: Radiation\nThe inner surfaces are shiny (silvered). This reflects thermal radiation back into the drink, reducing losses by radiation. The cap also reduces conduction and convection.\n\n[The vacuum flask addresses all three mechanisms of heat transfer.]", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "In Core Practical 6 (investigating specific heat capacity of water), why might the experimentally calculated value of c be higher than the accepted value of 4200 J/kg°C? (2 steps)", "answer": "- Step 1: Identify the main source of error\nHeat is lost to the surroundings (beaker, thermometer, heater, air) throughout the experiment. The recorded temperature rise is smaller than it would be in a perfectly insulated system.\n- Step 2: How this affects the calculation\nSince ΔQ = m × c × Δθ, if some of the supplied electrical energy (VIt) goes to heating the surroundings rather than just the water, then using the smaller Δθ in the calculation produces a larger apparent c value. The energy \"accounting\" is wrong because we assume all energy went to the water.\n\n[To minimise this: use a polystyrene cup (insulator), heater with low heat capacity, minimise exposure to air, and use only the straight-line portion of the graph.]", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A heating curve is plotted for a substance over time. The temperature rises from 20°C to 80°C, then stays constant at 80°C for several minutes while boiling, then rises again to 100°C. Sketch this curve and label the sections. (2 steps)", "answer": "- Step 1: Sketch description\nThe x-axis is time (energy supplied), y-axis is temperature.\n- Step 2: Label the key features\n+ Upward sloping line from 20°C to 80°C: liquid heating (kinetic energy increasing)\n+ Flat horizontal line at 80°C: boiling (liquid → gas) at constant temperature—energy going into potential energy, not kinetic\n+ Upward sloping line from 80°C to 100°C: gas heating (kinetic energy increasing again)\n\n[The flat plateau is the signature of a change of state—the temperature \"plateaus\" because energy is used to break bonds rather than increase speed.]", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Why does the temperature stay constant during melting even though energy is still being supplied? (2 steps)", "answer": "- Step 1: What temperature measures\nTemperature is proportional to the average kinetic energy of particles—their speed of motion.\n- Step 2: What happens during melting\nWhen a solid melts, the supplied energy is used to break the bonds holding particles in their fixed positions. This increases the potential energy (particle spacing) but does NOT increase the kinetic energy. Since kinetic energy isn't changing, the temperature doesn't change.\n\n[This is a key conceptual point: \"latent\" means \"hidden\"—the energy is \"hidden\" as potential energy rather than showing up as temperature.]", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Compare the density of a substance in its solid and liquid states. Does the density usually increase or decrease upon melting? Why? (2 steps)", "answer": "- Step 1: General pattern\nMost substances are denser as solids than as liquids. Water is the famous exception.\n- Step 2: The particle explanation\nWhen a solid melts, particles gain enough energy to break free from their fixed positions and slide past each other. They need slightly more space to move—so the substance expands slightly, making it less dense. For water, the open hexagonal structure of ice collapses into a denser packed liquid arrangement, so water is denser than ice.\n\n[Ice floats because ρ_ice < ρ_water—this is unusual but crucial for aquatic life in cold climates.]", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "A sealed syringe contains 60 cm³ of air at atmospheric pressure (101,000 Pa). If the plunger is pulled back to 120 cm³ at constant temperature, what is the new pressure? (2 steps)", "answer": "- Step 1: Apply Boyle's Law\n$$p_1 V_1 = p_2 V_2$$\n- Step 2: Calculate\n$$p_2 = \\frac{p_1 V_1}{V_2} = \\frac{101000 \\times 60}{120} = \\frac{6060000}{120} = 50500\\text{ Pa}$$\n\n[Volume doubled → pressure halves. Note: keep units consistent (cm³ is fine here since we're comparing).]", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the kinetic theory model of gases, pressure is caused by collisions of particles with the container walls. What two factors determine the magnitude of this pressure? (2 steps)", "answer": "- Step 1: Frequency of collisions\nHow often particles hit the walls per second. More frequent collisions (from higher density or higher temperature) → higher pressure.\n- Step 2: Force of each collision\nThe momentum change (force) of each collision. Faster particles (higher temperature) or heavier particles (higher molecular mass) transfer more momentum → higher pressure.\n\n[Combined: p ∝ (number of particles) × (temperature). This is why p/T = constant at constant volume.]", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A block of wood with mass 120 g measures 5 cm × 4 cm × 3 cm. Calculate its density in kg/m³. Will it float or sink in water? (3 steps)", "answer": "- Step 1: Calculate volume\n$$V = 5 \\times 4 \\times 3 = 60\\text{ cm}^3 = 60 \\times 10^{-6}\\text{ m}^3 = 6 \\times 10^{-5}\\text{ m}^3$$\n- Step 2: Convert mass and calculate density\n$$m = 120\\text{ g} = 0.12\\text{ kg}$$\n$$\\rho = \\frac{0.12}{6 \\times 10^{-5}} = 2000\\text{ kg/m}^3$$\n- Step 3: Compare to water\nWater = 1000 kg/m³. Since 2000 > 1000, the wood is denser than water and will sink.\n\n[Less dense materials float; denser materials sink. For wood, many types (like balsa) have ρ < 1000 and float; this wood is unusually dense.]", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Define specific latent heat of vaporisation. Why is the latent heat of vaporisation always larger than the latent heat of fusion for the same substance? (2 steps)", "answer": "- Step 1: Definition\nSpecific latent heat of vaporisation (L_v) = the thermal energy required to change 1 kg of liquid into gas (or released when gas condenses to liquid) at the boiling point, with no temperature change.\n- Step 2: Why it's larger than L_f\nTo vaporise, particles must completely overcome all attractive forces between them and separate to the large distances characteristic of a gas. This requires much more energy than just loosening particles enough to slide past each other in a liquid (fusion). For water: L_v = 2.26 MJ/kg vs L_f = 0.33 MJ/kg—about 7× larger.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Explain why doubling the mass of water requires twice the energy to heat it by the same temperature rise, according to the equation ΔQ = mcΔθ. (2 steps)", "answer": "- Step 1: What the equation tells us\nΔQ is directly proportional to mass (m). All else being equal (same substance, same Δθ), doubling the mass doubles the number of particles that need their kinetic energy increased.\n- Step 2: The particle picture\nEach kilogram of water contains the same number of molecules (~3.3 × 10²⁵). To raise the temperature of 2 kg, you need to increase the kinetic energy of twice as many molecules—and that requires twice the energy input.\n\n[The c value stays constant (property of the material); only m or Δθ changes the energy needed.]", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "When a gas is compressed in a bicycle pump, the temperature rises. Is this due to heating or due to work being done? Explain. (2 steps)", "answer": "- Step 1: Identify the mechanism\nThe pump is insulated (or we consider the compression to be fast enough that little heat exchanges with surroundings). The temperature rise comes from work done on the gas, not from heat transfer.\n- Step 2: Energy transfer\nYou apply a force through a distance—you do work on the gas. This mechanical energy transfer increases the internal energy of the gas (specifically, the kinetic energy of the molecules), raising its temperature. This is work, not heat.\n\n[Work and heat are both energy transfer mechanisms—in this case, work is the cause, not \"heat rising\" or any thermal process.]", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "A 2 kW heater is switched on for 3 minutes to heat a 0.5 kg sample of liquid. How much thermal energy does it supply? (2 steps)", "answer": "- Step 1: Convert time to seconds\n$$3\\text{ minutes} = 3 \\times 60 = 180\\text{ s}$$\n- Step 2: Calculate energy\n$$E = \\text{Power} \\times \\text{time} = 2000\\text{ W} \\times 180\\text{ s} = 360,000\\text{ J} = 360\\text{ kJ}$$\n\n[Power is energy per unit time: 1 W = 1 J/s. This electrical energy would then be used in ΔQ = mcΔθ or Q = mL equations.]", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Core Practical 5 (density), what are three common sources of error and how would you minimise each? (3 steps)", "answer": "- Step 1: For regular solids\n+ Error: Incorrect dimension measurements\n+ Minimisation: Use precise instruments (Vernier calipers), measure multiple times and average\n- Step 2: For irregular solids (eureka can)\n+ Error: Water splashing or not filling to spout\n+ Minimisation: Fill exactly to spout, lower object gently, dry object before measuring\n- Step 3: For liquids\n+ Error: Not zeroing balance with cylinder\n+ Minimisation: Use tare function, pour carefully to avoid spills, keep liquids away from balance electronics", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A sample of gas is heated from 27°C to 127°C at constant volume. Does the pressure increase, decrease, or stay the same? Explain using the particle model. (2 steps)", "answer": "- Step 1: What changes\nTemperature increases from 27°C (300 K) to 127°C (400 K). Volume stays constant.\n- Step 2: Effect on pressure\nAt higher temperature, gas particles move faster. They collide with the container walls more frequently and with greater momentum (force per collision). Since volume is fixed, the walls are hit more energetically more often → pressure increases.\n\n[At constant volume, p ∝ T (in Kelvin). The pressure ratio equals the temperature ratio: p₂/p₁ = T₂/T₁ = 400/300 = 4/3.]", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Why does ice at 0°C cool a drink more effectively than water at 0°C? (2 steps)", "answer": "- Step 1: Consider the energy transfer\nBoth ice and water at 0°C are at the same temperature. But to melt the ice, energy must be absorbed from the drink—this is the latent heat of fusion (330 kJ/kg).\n- Step 2: The cooling mechanism\nAs ice melts to water at 0°C, it absorbs 330 kJ per kilogram from the drink. Additionally, the resulting cold water then continues to absorb heat as it warms up. Water at 0°C can only absorb heat through temperature rise (specific heat capacity), but melting ice absorbs much more energy without any temperature change.\n\n[This is why iced drinks are colder than just cold water—the phase change provides extra cooling.]", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "Two containers hold the same mass of gas. Container A has twice the volume of container B, but both are at the same temperature. Compare the pressure in the two containers. (2 steps)", "answer": "- Step 1: Apply Boyle's Law reasoning\nBoth containers have the same mass (same number of particles) at the same temperature. Pressure depends on how often particles hit the walls.\n- Step 2: Compare pressures\nContainer A has twice the volume, so particles have further to travel between collisions with walls on average. They hit the walls half as frequently. Therefore, pressure in A is half that in B: p_A = ½ p_B.\n\n[Same T, same particles → pV = constant. Double V → half p.]", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Explain why a helium balloon rises in air, using the concept of density. (2 steps)", "answer": "- Step 1: Compare densities\nHelium has density ~0.18 kg/m³; air has density ~1.3 kg/m³. The balloon contains helium (or hydrogen), which is much less dense than air.\n- Step 2: Buoyancy\nThe balloon displaces a volume of air equal to its own volume. This displaced air has mass. Since helium is less dense, the helium in the balloon has less mass than the displaced air. The upward buoyant force (weight of displaced air) exceeds the downward gravitational force (weight of helium + balloon material), so the balloon rises.\n\n[This isArchimedes' principle: upward force = weight of fluid displaced. Less dense object → floats upward in denser fluid.]", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What is the relationship between the Kelvin and Celsius temperature scales? Why is Kelvin preferred in gas law calculations? (2 steps)", "answer": "- Step 1: The relationship\n$$T(\\text{K}) = \\theta(°\\text{C}) + 273$$\nA change of 1 K = a change of 1°C—the degree sizes are identical. Only the zero points differ.\n- Step 2: Why Kelvin is preferred\nGas laws (like p ∝ T) require absolute temperatures because they relate to particle kinetic energy, which cannot be negative. Celsius can go negative (below freezing), but Kelvin starts at absolute zero (0 K = -273°C), ensuring all temperatures are positive. Using Celsius in gas law calculations gives wrong proportionalities; using Kelvin gives c
