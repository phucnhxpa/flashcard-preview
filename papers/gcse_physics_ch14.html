<script>
const DATA={"selected": [{"question": "An iron block and a feather pillow can have the same mass. Why does the iron feel \"heavy for its size\" while the pillow feels \"light for its size\" — what physical property captures this difference, and why is it NOT the same as weight? (3 steps)", "answer": "- Step 1: The property that captures \"heavy-for-its-size\" vs \"light-for-its-size\" is **density** ($$\\rho$$), defined as mass per unit volume: $$\\rho = \\frac{m}{V}$$. Iron has a high density (~7800 kg/m³) because many iron atoms are packed into a small volume; the pillow has low density because it is mostly empty space (air gaps between feathers).\n- Step 2: Density is fundamentally different from **weight**. Weight is the gravitational force on an object ($$W = mg$$) — it depends on gravity. Density is a ratio of mass to volume — it is an intrinsic property of the material, independent of how much of it you have or what gravitational field it sits in. A 1 kg iron block on Earth and on the Moon has the same density but different weights.\n- Step 3: This is why density is measured in kg/m³ (mass divided by volume), not in newtons (force). Two objects with the same volume but different densities will have different masses — and therefore different weights in the same gravitational field — but density itself doesn't change with gravity.\n\nTakeaway: Density is an intrinsic material property (mass/volume); weight is a force that depends on gravity.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "You cut a uniform wooden block exactly in half. Does the density of each half change? Explain why or why not using the definition of density. (2 steps)", "answer": "- Step 1: Density is $$\\rho = \\frac{m}{V}$$. When you cut the block in half, both the mass and the volume are halved. The mass of each half is $$\\frac{m}{2}$$, and the volume of each half is $$\\frac{V}{2}$$.\n- Step 2: Substituting into the density formula: $$\\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho_{\\text{original}}$$. The factors of 2 cancel, so the density is unchanged. Density is a property of the **material**, not the object's size. This is a key insight — density doesn't depend on how much material you have; it depends on what material it is.\n\nTakeaway: Halving an object halves both mass and volume equally, so density (their ratio) stays the same.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Water has a density of $$1 \\text{ g/cm}^3$$. Why does this equal exactly $$1000 \\text{ kg/m}^3$$? Walk through the unit conversion logic. (3 steps)", "answer": "- Step 1: Start with $$1 \\text{ g/cm}^3$$, meaning 1 gram of mass occupies 1 cubic centimetre of volume. We need to convert both the mass unit (g → kg) and the volume unit (cm³ → m³).\n- Step 2: Mass conversion: $$1 \\text{ g} = 0.001 \\text{ kg}$$ (divide by 1000). Volume conversion: $$1 \\text{ cm} = 0.01 \\text{ m}$$, so $$1 \\text{ cm}^3 = (0.01)^3 \\text{ m}^3 = 0.000001 \\text{ m}^3$$ (one millionth of a cubic metre). This is because each dimension shrinks by 100, and volume involves three dimensions multiplied.\n- Step 3: Now compute: $$\\rho = \\frac{0.001 \\text{ kg}}{0.000001 \\text{ m}^3} = \\frac{0.001}{0.000001} \\text{ kg/m}^3 = 1000 \\text{ kg/m}^3$$. The key insight is that the volume conversion factor (1,000,000) is much larger than the mass conversion factor (1,000), so the ratio increases by $$\\frac{1,000,000}{1,000} = 1000$$.\n\nTakeaway: Converting g/cm³ to kg/m³ always multiplies by 1000 because volume scales by the cube of the length conversion.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "An object is placed in water (density $$1000 \\text{ kg/m}^3$$). If the object's density is greater than $$1000 \\text{ kg/m}^3$$, what happens, and why does density determine this rather than mass alone? (2 steps)", "answer": "- Step 1: If the object's density exceeds water's density, the object **sinks**. This is because, for the volume of water the object displaces, that volume of water has less mass than the same volume of the object. The object is \"heavier per unit volume\" than the water it tries to push aside, so gravity wins over the buoyant force and it sinks.\n- Step 2: Mass alone doesn't determine sinking — a 10,000 kg steel ship floats because its **overall** density (including the hollow air-filled interior) is less than water. A 1 g steel nail sinks because its density (~7800 kg/m³) exceeds water's. It's the ratio $$\\rho = m/V$$ that matters, not the raw mass. A large, heavy object with low average density can float; a small, light object with high density sinks.\n\nTakeaway: Sinking vs floating depends on density comparison with the fluid, not on total mass.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "A solid and a liquid made of the same substance (e.g., ice and liquid water) have very similar densities — ice is about $$917 \\text{ kg/m}^3$$ and liquid water is $$1000 \\text{ kg/m}^3$$. But when that substance becomes a gas (steam), the density drops to about $$0.6 \\text{ kg/m}^3$$ — roughly 1000× less. What explains this enormous drop? (3 steps)", "answer": "- Step 1: In both solids and liquids, the particles (molecules) are **very close together**, essentially touching. The spacing between molecules is minimal — there are no large gaps. This means a given volume contains a huge number of molecules, giving high mass per volume = high density.\n- Step 2: In a gas, the particles are **widely separated** — typically about 10× further apart in each direction compared to the liquid. Since volume scales as the cube of separation distance, being 10× further apart in each direction means the molecules occupy roughly $$10^3 = 1000$$× more volume per molecule. Same mass, 1000× more volume → density drops by 1000×.\n- Step 3: This is why gases like air have densities around 1–2 kg/m³ while their liquid forms have densities around 1000 kg/m³. The molecules themselves haven't changed — they have the same mass. It's purely the **spacing** that changes. The large gaps between gas molecules also explain why gases are compressible (you can squeeze those gaps smaller) while solids and liquids are not (no gaps to squeeze).\n\nTakeaway: The ~1000× density drop from liquid to gas comes from particles being ~10× further apart in each direction, and volume scales as distance cubed.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Why can you compress a gas significantly but not a solid or liquid? Explain using the particle model. (2 steps)", "answer": "- Step 1: In a gas, particles are widely separated with large empty spaces between them. When you apply pressure, you are forcing those particles closer together — squeezing the empty gaps. The particles themselves don't shrink; the spaces between them do. Since those spaces are large, there's a lot of room to compress.\n- Step 2: In a solid or liquid, particles are already essentially touching — they're packed tightly with minimal gaps between them. There is no significant empty space to squeeze out. Compressing them would require squashing the particles themselves, which requires enormous forces (this is why solids/liquids are called \"incompressible\" at ordinary pressures). The resistance comes from electrostatic repulsion between electron clouds of adjacent atoms.\n\nTakeaway: Compressibility depends on how much empty space exists between particles — gases have lots, solids/liquids have almost none.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "A common misconception is that liquid particles are \"far apart\" because liquids can flow. Why is this wrong, and what actually allows a liquid to flow? (2 steps)", "answer": "- Step 1: Liquid particles are **not far apart** — they are very close together, essentially touching, just like in a solid. This is why liquids have densities similar to their solid forms (e.g., liquid water: 1000 kg/m³, ice: 917 kg/m³). If liquid particles were far apart, liquid density would be much lower, like a gas.\n- Step 2: What allows a liquid to flow is not spacing, but **freedom of arrangement**. In a solid, particles are locked in a fixed, regular pattern and can only vibrate in place. In a liquid, particles are close together but have no fixed positions — they can slide past each other and rearrange. This mobility of close-packed particles lets the liquid deform and flow, taking the shape of its container, while still maintaining a definite volume (because particles stay close together).\n\nTakeaway: Liquids flow because particles can slide past each other, not because they are far apart — they're still tightly packed.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "A solid has a definite shape and a definite volume. A liquid has no definite shape but a definite volume. A gas has neither. Explain each using the particle model — what particle behaviour causes these macroscopic properties? (3 steps)", "answer": "- Step 1: **Solid**: Particles vibrate about fixed positions in a regular arrangement. They cannot slide past each other or move to new positions. This rigidity at the particle level gives the macroscopic solid its definite shape (it doesn't deform easily) and definite volume (particles are close together, can't spread out).\n- Step 2: **Liquid**: Particles are close together (definite volume — they can't expand because intermolecular attractions hold them near each other) but can slide past one another with no fixed arrangement. This sliding ability means the liquid deforms to match the container's shape — no definite shape, but the close packing maintains definite volume.\n- Step 3: **Gas**: Particles move randomly at high speeds with very weak intermolecular forces and large gaps. They have no arrangement and no constraints holding them together. They spread out to fill whatever container they're in — no definite shape, and no definite volume (compress or expand the container, and the gas adjusts). The weak forces and large spacing mean gas particles essentially fly freely until they hit a wall.\n\nTakeaway: Definite shape comes from fixed particle positions; definite volume comes from close particle spacing; neither property exists when particles are free and widely separated.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "To find the density of a liquid (e.g., cooking oil), you use a measuring cylinder on a balance. Why is it important to \"tare\" (zero) the balance with the empty cylinder first, rather than just subtracting the cylinder mass later? (2 steps)", "answer": "- Step 1: Taring the balance means placing the empty measuring cylinder on the balance and pressing the zero/tare button. The balance now reads 0.00 g with the cylinder on it. When you add the liquid, the balance reads only the liquid's mass directly — no subtraction needed. This gives you $$m_{\\text{liquid}}$$ immediately.\n- Step 2: While you could instead record $$m_{\\text{cylinder}}$$ and $$m_{\\text{cylinder+liquid}}$$ and subtract, taring is preferred because: + It eliminates a subtraction step, reducing calculation errors. + It removes the uncertainty from two separate mass readings (each has its own ± uncertainty; subtracting combines both uncertainties). + It's faster and more direct. The volume is read from the measuring cylinder scale, and then $$\\rho = \\frac{m_{\\text{liquid}}}{V_{\\text{liquid}}}$$.\n\nTakeaway: Taring gives the liquid mass directly with one reading instead of two, reducing error and simplifying calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "When ice melts into water, the total mass stays the same. Why must mass be conserved during any change of state, and what common observation might trick you into thinking mass has been lost? (3 steps)", "answer": "- Step 1: Mass conservation during state changes follows from the fact that the **number of molecules doesn't change**. Melting doesn't destroy or create molecules — it only changes how they move and arrange themselves. The same molecules, with the same total mass, are present before and after. $$m_{\\text{before}} = m_{\\text{after}}$$.\n- Step 2: A common trick: if you leave a beaker of water on a balance for 24 hours, the mass decreases by a few grams. This looks like mass was lost during a state change, but actually **evaporation** occurred — some water molecules escaped from the liquid into the air as gas and left the beaker entirely. The mass wasn't destroyed; it moved to the atmosphere.\n- Step 3: The key distinction: in a closed system (sealed container), mass is strictly conserved during state changes. In an open system, molecules can escape (evaporation) or enter (condensation from air), changing the measured mass. The conservation law applies to the total system, not just what remains in your beaker. If you could collect every molecule that evaporated, the total mass would be unchanged.\n\nTakeaway: Mass is conserved because no molecules are created or destroyed — but in open systems, molecules can leave, making it *appear* as if mass was lost.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "When a substance changes from liquid to gas, its density drops dramatically. But its mass stays the same. How can both statements be true simultaneously? (2 steps)", "answer": "- Step 1: Density is $$\\rho = \\frac{m}{V}$$. If mass stays the same ($$m$$ unchanged) but density drops dramatically, then **volume must increase dramatically**. The same mass of molecules now occupies a much larger volume because the particles spread far apart.\n- Step 2: This is exactly what happens during vaporisation. The molecules break free from their close-packed arrangement in the liquid and fly apart with large gaps between them. The number of molecules (and thus total mass) is unchanged, but they now occupy perhaps 1000× more volume. Same $$m$$, much larger $$V$$ → much smaller $$\\rho$$. This is the particle-model explanation for why steam is far less dense than liquid water despite containing the same molecules per unit of total mass.\n\nTakeaway: Density drops because volume increases enormously while mass is conserved — the same molecules spread out.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "Internal energy is the sum of two types of energy stored in particles. Name both types, explain what each depends on, and state which one determines temperature. (3 steps)", "answer": "- Step 1: Internal energy = **kinetic energy** + **potential energy** of all the particles in the substance. Kinetic energy is energy of motion — particles vibrating, sliding, or flying around. Potential energy is energy of position — how far particles are from each other, related to intermolecular bonds and spacing.\n- Step 2: **Temperature is determined by average kinetic energy only**. The hotter a substance, the faster its particles move on average, and the higher their average kinetic energy. Potential energy (spacing/bonds) does not affect temperature — this is a crucial distinction.\n- Step 3: This explains why temperature stays constant during a state change: the energy going in increases **potential energy** (breaking bonds, increasing spacing) but not kinetic energy (particle speed stays the same on average). The particles move apart, but their average speed doesn't increase, so the thermometer reading doesn't change. Only when the state change is complete does further heating increase kinetic energy again, raising temperature.\n\nTakeaway: KE determines temperature; PE determines state. Internal energy is their sum, so it can increase even when temperature doesn't.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "On a heating curve (temperature vs time), there are sloped sections and flat plateau sections. What is happening to kinetic energy and potential energy in each type of section? (3 steps)", "answer": "- Step 1: **Sloped sections** (temperature is rising): The energy supplied increases the **kinetic energy** of particles — they move faster on average. Potential energy stays roughly constant because the state isn't changing (particles stay in the same arrangement). Temperature rises because temperature depends on average KE.\n- Step 2: **Flat plateau sections** (temperature constant): The energy supplied increases the **potential energy** of particles — bonds are being broken, particles are moving further apart. Kinetic energy stays constant on average (particles don't speed up), so the thermometer reads the same temperature. This is where the state change occurs (melting or boiling).\n- Step 3: The flat section exists because you cannot change state without breaking intermolecular bonds, which requires energy. That energy goes into potential energy, not kinetic energy. Until all the bonds for that state change are broken, the temperature cannot rise — it's \"stuck\" at the melting or boiling point. Only after every molecule has completed the transition does further energy go back into KE and temperature rises again.\n\nTakeaway: Slopes = KE increasing (temperature rises); plateaus = PE increasing (state changes, temperature constant).", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "A student says: \"During melting, the internal energy stays constant because the temperature doesn't change.\" Is this correct? Explain why or why not. (2 steps)", "answer": "- Step 1: This is **incorrect**. Internal energy is the sum of kinetic energy AND potential energy. During melting, kinetic energy stays constant (temperature doesn't change), but potential energy **increases** — bonds are being broken and particles move further apart. Since one component is rising while the other is constant, the total (internal energy) must be increasing.\n- Step 2: The student's confusion comes from equating \"internal energy\" with \"temperature.\" Temperature only tracks the kinetic component. The flat plateau on a heating curve shows constant temperature, but energy is still flowing in and being stored as potential energy. Internal energy is always increasing when you heat a substance — it's just that during a state change, the increase goes entirely into PE rather than KE.\n\nTakeaway: Temperature constant ≠ internal energy constant. Internal energy always increases during heating; during state change, the increase is all in PE.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "Specific heat capacity ($$c$$) tells us how much energy is needed to raise 1 kg of a substance by 1°C. Water has $$c = 4200 \\text{ J/kg°C}$$; copper has $$c \\approx 390 \\text{ J/kg°C}$$. Practically, what does this ~10× difference mean for how these substances behave when heated? (2 steps)", "answer": "- Step 1: Water requires about 10× more energy than copper to achieve the same temperature rise for the same mass. This means water **heats up slowly** and **cools down slowly** — it takes a lot of energy to change its temperature. Copper heats up quickly and cools quickly — little energy is needed for a temperature change.\n- Step 2: This has practical consequences: + Water is used in central heating systems and car radiators because it can absorb large amounts of heat without its temperature skyrocketing — it's a good thermal buffer. + Copper pots heat up fast on a stove — efficient for cooking. + Coastal regions have milder climates than inland areas because the ocean (water) acts as a massive thermal reservoir, absorbing and releasing heat slowly. High $$c$$ = thermal stability; low $$c$$ = thermal responsiveness.\n\nTakeaway: High specific heat capacity means the substance is thermally stable (slow to heat/cool); low $$c$$ means it responds quickly to energy changes.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "The equation $$\\Delta Q = mc\\Delta\\theta$$ relates energy, mass, specific heat capacity, and temperature change. If you supply the same amount of energy to 1 kg of water and 1 kg of copper, which one has the larger temperature rise, and roughly by what factor? (2 steps)", "answer": "- Step 1: Rearranging the equation: $$\\Delta\\theta = \\frac{\\Delta Q}{mc}$$. For the same $$\\Delta Q$$ and same $$m$$, the temperature rise is inversely proportional to $$c$$. The substance with the smaller $$c$$ will have the larger temperature rise.\n- Step 2: Copper has $$c \\approx 390$$ J/kg°C and water has $$c = 4200$$ J/kg°C. The ratio is roughly $$\\frac{4200}{390} \\approx 10.8$$. So copper's temperature rise is about **11× larger** than water's for the same energy input to the same mass. For example, if 4200 J heats 1 kg of water by 1°C, the same 4200 J heats 1 kg of copper by about 11°C. This dramatic difference is why a copper pan gets hot quickly on a stove while a pot of water takes much longer.\n\nTakeaway: Temperature rise is inversely proportional to $$c$$ — low $$c$$ substances heat up much faster for the same energy per kg.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "A student is asked whether to use $$\\Delta Q = mc\\Delta\\theta$$ or $$Q = mL$$ for a particular scenario. How do you decide which equation to use? What is the critical difference in what each equation describes? (2 steps)", "answer": "- Step 1: The critical distinction: $$\\Delta Q = mc\\Delta\\theta$$ is for a **temperature change within the same state** (e.g., heating water from 20°C to 80°C — it stays liquid throughout). The symbol $$\\Delta\\theta$$ explicitly indicates that temperature is changing. $$Q = mL$$ is for a **change of state at constant temperature** (e.g., melting ice at 0°C — temperature stays at 0°C throughout the melting process). There is no $$\\Delta\\theta$$ in this equation because temperature doesn't change.\n- Step 2: Decision rule: + If the substance is getting hotter or cooler but staying in the same state → use $$\\Delta Q = mc\\Delta\\theta$$. + If the substance is melting, freezing, boiling, or condensing → use $$Q = mL$$ (with $$L_f$$ for solid↔liquid, $$L_v$$ for liquid↔gas). + If both happen sequentially (e.g., heating ice from -10°C to steam at 100°C), you use **both** equations for different stages: $$mc\\Delta\\theta$$ for each temperature-change stage and $$mL$$ for each state-change stage.\n\nTakeaway: $$c$$ is for temperature change (same state); $$L$$ is for state change (constant temperature). Ask: \"Is temperature changing or is state changing?\"", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "You have 2 kg of ice at 0°C and 2 kg of water at 0°C. You supply 10,000 J of energy to each. Which one will show a measurable temperature rise, and why? What happens to the other one? (2 steps)", "answer": "- Step 1: The **water** will show a measurable temperature rise. It is already in the liquid state, so the energy goes into increasing kinetic energy (raising temperature). Using $$\\Delta Q = mc\\Delta\\theta$$: $$\\Delta\\theta = \\frac{10000}{2 \\times 4200} = \\frac{10000}{8400} \\approx 1.2°C$$. The water warms from 0°C to about 1.2°C.\n- Step 2: The **ice** will NOT show a temperature rise — it stays at 0°C. The ice is at its melting point, so the energy goes into breaking intermolecular bonds (increasing potential energy), not into kinetic energy. Using $$Q = mL_f$$: the mass of ice that melts is $$m = \\frac{Q}{L_f} = \\frac{10000}{330000} \\approx 0.03 \\text{ kg}$$ (about 30 g of the 2 kg melts). The temperature remains 0°C until all 2 kg has melted. This is the fundamental difference: same energy, same mass, same starting temperature — but one changes temperature and the other changes state.\n\nTakeaway: At a state-change boundary, energy goes into breaking bonds (PE), not speeding particles (KE), so temperature stays flat.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "For the same substance, the specific latent heat of vaporisation ($$L_v$$) is always larger than the specific latent heat of fusion ($$L_f$$). For water, $$L_v = 2.26 \\text{ MJ/kg}$$ and $$L_f = 330 \\text{ kJ/kg}$$ — roughly 7× larger. Why does turning liquid into gas require so much more energy than turning solid into liquid? (3 steps)", "answer": "- Step 1: **Fusion (melting)**: In a solid, particles are in fixed positions but already very close together, essentially touching. Melting only needs to break the rigid arrangement — allow particles to slide past each other. The intermolecular bonds loosen but don't fully break; particles stay close together in the liquid. This requires moderate energy.\n- Step 2: **Vaporisation (boiling)**: In a liquid, particles are close together with significant intermolecular attractions holding them near each other. Boiling requires **completely overcoming** these attractive forces so particles can fly far apart and move independently as a gas. You're not just loosening bonds — you're ripping particles away from their neighbours entirely. This requires much more energy per molecule.\n- Step 3: The ratio $$\\frac{L_v}{L_f} \\approx 7$$ for water reflects this: partially freeing particles from a rigid grid (fusion) takes about 1 unit of energy per kg; fully separating them from all neighbours (vaporisation) takes about 7 units. The energy goes into increasing potential energy — and the potential energy increase from liquid→gas (particles moving from close together to far apart) is much larger than from solid→liquid (particles moving from fixed positions to sliding, but still close).\n\nTakeaway: $$L_v > L_f$$ because fully separating particles (liquid→gas) requires overcoming all intermolecular forces, while loosening the arrangement (solid→liquid) only partially overcomes them.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "You need to calculate the total energy required to turn 0.5 kg of ice at -10°C into steam at 100°C. How many separate calculation steps are needed, and what equation do you use for each step? (3 steps)", "answer": "- Step 1: There are **three distinct stages** requiring three separate calculations: + Stage 1: Heating ice from -10°C to 0°C (temperature change within solid state) → use $$\\Delta Q_1 = mc\\Delta\\theta$$ with $$c_{\\text{ice}}$$ and $$\\Delta\\theta = 10°C$$.\n- Step 2: + Stage 2: Melting ice at 0°C into water at 0°C (state change at constant temperature) → use $$Q_2 = mL_f$$ with $$L_f = 330 \\text{ kJ/kg}$$.\n- Step 3: + Stage 3: Heating water from 0°C to 100°C (temperature change within liquid state) → use $$\\Delta Q_3 = mc\\Delta\\theta$$ with $$c_{\\text{water}} = 4200$$ and $$\\Delta\\theta = 100°C$$.\n+ (If going all the way to steam, there would also be Stage 4: boiling at 100°C → $$Q_4 = mL_v$$.) The total energy is the **sum** of all stages: $$Q_{\\text{total}} = \\Delta Q_1 + Q_2 + \\Delta Q_3 + Q_4$$. You cannot use a single equation — each stage has different physics (temperature change vs state change).\n\nTakeaway: Multi-stage problems require identifying each stage separately and using $$mc\\Delta\\theta$$ for temperature-change stages and $$mL$$ for state-change stages, then summing.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "In the SHC practical, you plot a graph of energy supplied ($$E = VIt$$, y-axis) against $$m\\Delta\\theta$$ (x-axis). The gradient of the straight-line section equals the specific heat capacity $$c$$. Why use the gradient rather than a single calculation $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$? (2 steps)", "answer": "- Step 1: A single calculation uses one data point, which could be affected by random errors (reading uncertainties, timing errors, temperature fluctuations). It gives no way to assess reliability — you'd have no idea if that one value of $$c$$ is trustworthy or if it happened to be distorted by an error in that particular measurement.\n- Step 2: Using the gradient of a graph over multiple data points: + Averages out random errors — the best-fit line considers all points, not just one. + Allows you to identify and ignore anomalous points that don't fit the pattern. + The straight-line region specifically excludes the initial \"warm-up\" period where the heater itself is heating up (not just the water). Only the reliable linear section is used, giving a more accurate value of $$c$$. The gradient equals $$c$$ because rearranging $$\\Delta Q = mc\\Delta\\theta$$ gives $$\\Delta Q = c \\times (m\\Delta\\theta)$$, which is the equation of a straight line with gradient $$c$$.\n\nTakeaway: The gradient method uses all reliable data points to average out errors, whereas a single calculation relies on just one potentially flawed measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "When you heat ice and plot a temperature-time graph, you see a flat plateau at 0°C. What is happening during this plateau, and why must the temperature stay flat rather than gradually rising? (3 steps)", "answer": "- Step 1: During the plateau, the ice is **melting** — changing from solid to liquid. The energy supplied is going into breaking the intermolecular bonds that hold ice molecules in their rigid lattice. This energy increases the **potential energy** of the molecules (they move from fixed positions to being able to slide around).\n- Step 2: The temperature stays flat because the **kinetic energy** (average particle speed) does not increase during this process. All the incoming energy is \"spent\" on breaking bonds (PE), not on making particles move faster (KE). Since temperature depends only on average KE, and KE isn't changing, the thermometer reading stays at 0°C.\n- Step 3: The plateau can't be a gradual rise because melting happens at a **specific temperature** (the melting point). At 0°C, ice and water can coexist. Every molecule that finishes melting joins the liquid phase at 0°C. The temperature cannot exceed 0°C until every single molecule has completed the transition — any excess energy that arrives goes to the next molecule that still needs to melt, not to raising the average speed of already-melted molecules.\n\nTakeaway: The plateau exists because melting requires bond-breaking energy (PE increase) at a fixed temperature; temperature can only rise after all molecules have melted.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A student wraps a hot object in insulation and says \"the insulation stops heat from escaping.\" Is this statement accurate? What does insulation actually do? (2 steps)", "answer": "- Step 1: The statement is **not accurate**. Insulation does not **stop** heat transfer — it **slows** it down. Heat still escapes through the insulation, just at a reduced rate. No practical insulation is a perfect barrier. Even the best-insulated house still loses heat over time; it just loses it much more slowly than an uninsulated one.\n- Step 2: What insulation actually does: it increases the **thermal resistance** between the hot object and its cooler surroundings. The rate of heat transfer depends on the temperature difference, the surface area, and the thermal resistance of the material between them. Insulation increases that resistance (by using poor conductors and trapped air), so the same temperature difference drives a **slower** heat flow. Over a long enough time, the object still reaches thermal equilibrium with its surroundings — insulation just delays this.\n\nTakeaway: Insulation slows heat loss, not stops it. It increases thermal resistance, reducing the rate of transfer.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "You observe tiny smoke particles in air through a microscope. They jiggle randomly in zig-zag paths. What is this phenomenon called, and what does it prove about the air? Why can't you see the cause directly? (3 steps)", "answer": "- Step 1: This phenomenon is called **Brownian motion** — the random, zig-zag motion of small particles (like smoke or pollen) suspended in a fluid (air or water). It was first observed by Robert Brown in 1827 with pollen grains in water.\n- Step 2: Brownian motion proves that **air molecules exist and are moving randomly**. The smoke particle is being bombarded from all sides by invisible, fast-moving air molecules. Each collision gives the smoke particle a tiny push. Because the bombardment is random — sometimes more molecules hit from one side, sometimes from another — the smoke particle's path is an erratic zig-zag. The visible random motion of the smoke particle is direct evidence of the invisible random motion of the air molecules causing it.\n- Step 3: You can't see the air molecules directly because they are **far too small** — roughly 10,000× smaller than the smoke particle. The smoke particle is large enough to see under a microscope, but the individual air molecules that collide with it are below the resolution limit. You see the **effect** (smoke jiggling) but not the **cause** (air molecule collisions). This is like watching a large buoy bobbing randomly in the ocean — you can't see each individual wave hitting it, but the buoy's motion proves the waves exist.\n\nTakeaway: Brownian motion is the visible zig-zag of a large particle caused by invisible molecular bombardment — it proves molecules exist and move randomly.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "A gas is at $$20°C$$. If you double its Celsius temperature to $$40°C$$, does the pressure double (at constant volume)? Does it double if you double its Kelvin temperature instead? Explain the critical difference. (2 steps)", "answer": "- Step 1: Doubling Celsius from 20°C to 40°C does **NOT** double the pressure. In Kelvin: 20°C = 293 K and 40°C = 313 K. The ratio is $$\\frac{313}{293} \\approx 1.07$$ — only a 7% increase, not a doubling. Celsius has an arbitrary zero point, so doubling the Celsius number doesn't double the actual kinetic energy or pressure.\n- Step 2: Doubling the **Kelvin** temperature from 293 K to 586 K (which is 313°C) **does** double the pressure, because Kelvin starts at the true zero of kinetic energy. At 586 K, molecules have twice the average KE compared to 293 K, so they hit walls twice as hard and twice as often → pressure doubles. This is why gas-law relationships (like $$p \\propto T$$) require **Kelvin** — only in Kelvin does \"doubling the number\" mean \"doubling the physical quantity\" (KE, pressure).\n\nTakeaway: Doubling Celsius doesn't double pressure because Celsius zero is arbitrary; doubling Kelvin does because Kelvin zero is the true physical zero of KE.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "You compress a fixed mass of gas at constant temperature by pushing its volume down from $$V_1$$ to a smaller $$V_2$$. Why does the pressure increase? Explain using the particle model (collisions), not just the equation. (3 steps)", "answer": "- Step 1: At constant temperature, the molecules' average speed stays the same — they don't move faster or slower. So each individual collision with the wall produces the same force as before (same momentum change per collision).\n- Step 2: However, the container is now smaller. The molecules have **less distance to travel** between wall collisions. They traverse the shorter distance to the wall more quickly (same speed, shorter path), so each molecule hits the walls **more frequently** per second. More collisions per second = more total force per second on the walls.\n- Step 3: Additionally, the wall area may be the same, but the same number of molecules is now confined in a smaller volume. The **concentration** of molecules (number per unit volume) has increased — more molecules per m³ means more collisions per m² of wall per second. Combining: same force per collision but more collisions per second per unit area → $$p = F/A$$ increases. This is the physical basis of Boyle's Law: at constant $$T$$, $$p \\propto \\frac{1}{V}$$.\n\nTakeaway: Compressing gas at constant T → same collision force but more frequent collisions (shorter path + higher molecule density) → pressure rises.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Boyle's Law states $$p_1 V_1 = p_2 V_2$$ for a fixed mass of gas at constant temperature. If you halve the volume, what happens to the pressure, and why must temperature and mass both be constant for this law to hold? (3 steps)", "answer": "- Step 1: If volume is halved ($$V_2 = \\frac{V_1}{2}$$), then: $$p_1 V_1 = p_2 V_2 = p_2 \\times \\frac{V_1}{2}$$, so $$p_2 = 2p_1$$. Pressure **doubles**. This is inverse proportionality: $$p \\propto \\frac{1}{V}$$ — whatever factor you decrease volume by, pressure increases by the same factor.\n- Step 2: **Constant temperature** is required because temperature affects molecular speed (KE). If temperature changed during compression, molecules would move faster or slower, changing the force per collision. Boyle's Law assumes each collision has the same force (constant speed), so only the collision frequency changes with volume. If temperature also changed, you'd have two effects (frequency AND force per collision) and the simple $$pV = \\text{constant}$$ relationship would break down.\n- Step 3: **Constant mass** is required because more molecules mean more collisions. If you added gas while compressing, pressure would increase even more than Boyle's Law predicts (more molecules + smaller volume = double effect). Boyle's Law assumes the same number of molecules throughout — only their spacing changes.\n\nTakeaway: Boyle's Law requires constant T (same collision force) and constant mass (same number of molecules); only volume changes, so only collision frequency changes.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "When you pump a bicycle tyre with a hand pump, the pump gets warm. This is NOT because the pump is transferring heat to the gas — it's because you are doing **work** on the gas. Explain how compressing a gas by doing work on it raises the gas's temperature. (3 steps)", "answer": "- Step 1: When you push the pump handle, you apply a force to the piston, which moves through a distance (the piston travels inward). Force × distance = **work done**. This mechanical work is energy transferred to the gas by physical pushing, not by thermal conduction. The energy goes from your muscles → to the piston → to the gas molecules.\n- Step 2: As the piston moves inward, it compresses the gas. Gas molecules bouncing off the **moving piston** gain extra kinetic energy — like a ball bouncing off a moving bat gains speed (the piston is moving toward the molecules, so they rebound faster). Each collision with the advancing piston gives the molecule a \"kick\" that increases its speed.\n- Step 3: The molecules now move faster on average → higher average kinetic energy → higher temperature. This is why the pump and the gas inside get warm. The temperature rise comes from **mechanical energy transfer** (work), not from heating. This is distinct from heating a gas with a flame (thermal energy transfer). Both increase internal energy, but the mechanism is different: work = mechanical push; heat = thermal conduction/radiation.\n\nTakeaway: Compressing a gas does work on it — molecules gain KE from collisions with the moving piston → temperature rises. This is mechanical energy transfer, not heat transfer.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "When a gas **expands** (does work on its surroundings), it cools down. A CO₂ fire extinguisher forms dry ice (solid CO₂) at the nozzle. Explain why expansion causes cooling, using the energy-transfer perspective. (2 steps)", "answer": "- Step 1: When a gas expands against an external pressure (e.g., pushing out into the atmosphere), the gas molecules are doing **work on their surroundings**. Just as compressing a gas transfers energy TO the gas (work done ON the gas), expanding a gas transfers energy AWAY from the gas (work done BY the gas). The gas loses internal energy.\n- Step 2: The lost internal energy comes from the kinetic energy of the molecules — they slow down on average. When a molecule bounces off a piston that is moving **away** from it, the molecule rebounds with **less speed** (like a ball bouncing off a retreating bat). Each collision with a receding surface steals a little KE from the molecule. Average KE drops → temperature drops → the gas cools. In the CO₂ extinguisher, the rapid expansion cools the gas so dramatically that it drops below CO₂'s sublimation point, forming solid dry ice at the nozzle.\n\nTakeaway: Gas expanding does work on surroundings → loses KE → molecules slow down → temperature drops. This is the reverse of compression heating.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Both \"doing work on a gas\" and \"heating a gas\" increase the gas's internal energy. What is the fundamental difference between these two processes in terms of how energy is transferred? (2 steps)", "answer": "- Step 1: **Doing work** is **mechanical** energy transfer. You physically push the gas (move a piston, compress with a pump). Energy is transferred by a force moving through a distance. The mechanism is macroscopic and mechanical — you can see the piston moving. The gas molecules gain energy from collisions with the moving boundary surface.\n- Step 2: **Heating** is **thermal** energy transfer. Energy flows from a hotter object to a cooler one via conduction, convection, or radiation — no macroscopic mechanical motion is involved. You place the gas container on a hot plate, or hold a flame near it. Energy transfers through molecular vibrations (conduction), fluid movement (convection), or electromagnetic waves (radiation). Both processes increase internal energy, but work involves organised mechanical transfer while heating involves disordered thermal transfer.\n\nTakeaway: Work = mechanical energy transfer (force × distance, piston motion); heating = thermal energy transfer (conduction/convection/radiation, no mechanical motion).", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "A sealed syringe contains air at room temperature. You push the plunger in slowly, keeping the temperature roughly constant. Then you push it in very rapidly. In which case does the gas temperature rise more, and why? (2 steps)", "answer": "- Step 1: Pushing **rapidly** causes a greater temperature rise. When you compress quickly, the gas molecules collide with the moving piston many times before they have any chance to transfer their gained kinetic energy to the surroundings (the syringe walls, the air outside). The energy from each collision with the advancing piston accumulates in the gas — molecules keep getting \"kicked\" faster and faster.\n- Step 2: Pushing **slowly** allows time for the gas to lose energy to the surroundings through the syringe walls (conduction) between collisions. Each small energy gain from a piston collision is partially dissipated before the next collision. The gas stays closer to room temperature because heat escapes almost as fast as it's added by work. This is why slow compression approximates constant temperature (isothermal) and obeys Boyle's Law, while fast compression raises temperature (adiabatic) and violates Boyle's Law's constant-temperature requirement.\n\nTakeaway: Fast compression → gas can't dissipate heat → temperature rises significantly. Slow compression → heat escapes to surroundings → temperature stays roughly constant (Boyle's Law applies).", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "The density of a gas is about 1/1000 of its liquid form. If you had 1 kg of liquid water (volume ~1 litre) and vaporised it completely into steam at atmospheric pressure, roughly what volume would the steam occupy, and why? (2 steps)", "answer": "- Step 1: Density drops by ~1000× when liquid becomes gas. Since $$\\rho = \\frac{m}{V}$$ and mass is conserved ($$m = 1 \\text{ kg}$$ unchanged), a 1000× drop in density means a 1000× increase in volume. The liquid occupies ~1 litre (0.001 m³), so the steam occupies roughly 1000 litres (1 m³).\n- Step 2: This enormous expansion happens because the molecules spread from being close together (touching, in the liquid) to being far apart (with large gaps, in the gas). The same 1 kg of molecules now needs 1000× more space. This is why steam engines can produce large mechanical forces — the expansion from water to steam is massive, and that expansion can push pistons and do work.\n\nTakeaway: Density dropping 1000× with constant mass means volume increases 1000× — 1 litre of water becomes ~1000 litres of steam.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "In Core Practical 5 (determining density of a regular object), what instruments would you use for each measurement, and why might you choose a Vernier caliper over a ruler for a small object? (2 steps)", "answer": "- Step 1: Mass is measured with a **digital balance** (resolution typically ±0.01 g). Dimensions are measured with a **ruler** (±1 mm), **Vernier calipers** (±0.01 mm), or **micrometer** (±0.001 mm), depending on the object's size and the precision needed.\n- Step 2: For a small object (e.g., a small metal cube with sides ~2 cm), a ruler's ±1 mm uncertainty is a large fraction of the measurement (~1 mm out of 20 mm = 5% uncertainty per dimension, and volume involves three dimensions multiplied, so the volume uncertainty compounds). Vernier calipers give ±0.01 mm (~0.05% per dimension), vastly reducing the uncertainty in the calculated volume and therefore in the final density. For larger objects (a paving slab), a ruler is sufficient because ±1 mm is a tiny fraction of the measurement.\n\nTakeaway: Choose the measuring instrument based on object size — smaller objects need higher-precision instruments (calipers, micrometer) to keep uncertainty low relative to the measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "You're measuring the density of an irregular object using a Eureka can. List two practical errors that could make your volume measurement inaccurate, and explain how each affects the final density calculation. (3 steps)", "answer": "- Step 1: **Error 1 — Dropping the object**: If you drop the stone into the can rather than lowering it gently, water splashes out beyond what goes through the spout. Some displaced water escapes as splash droplets that aren't collected in the measuring cylinder. This means $$V_{\\text{collected}} < V_{\\text{actual displaced}}$$, so you record a volume that is **too small**. Since $$\\rho = \\frac{m}{V}$$, a too-small $$V$$ makes the calculated density **too high**.\n- Step 2: **Error 2 — Not filling the can to the spout level before starting**: If the water level is below the spout when you lower the object, some displaced water fills the gap between the initial water level and the spout level first, and only the excess beyond the spout level overflows. The measuring cylinder collects less than the true displaced volume. Again, $$V_{\\text{collected}} < V_{\\text{actual}}$$ → density calculated is **too high**.\n- Step 3: Both errors have the same directional effect: they make the measured volume too small, which makes the calculated density too high (density is inversely proportional to volume). To avoid these: lower the object gently (no splash), and ensure the can is filled exactly to the spout before starting. Repeating and averaging multiple measurements also helps reduce random error effects.\n\nTakeaway: Splashing and underfilling both reduce measured volume → calculated density becomes too high. Gentle lowering and proper filling are essential.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "A substance has a specific heat capacity of $$2000 \\text{ J/kg°C}$$ and a specific latent heat of fusion of $$400 \\text{ kJ/kg}$$. You have 2 kg of this substance as a solid at its melting point. How much energy is needed to completely melt it, and will the temperature change during this process? (2 steps)", "answer": "- Step 1: Since the substance is already at its melting point, we only need the energy for the state change (no temperature-change stage needed). Using $$Q = mL_f$$: $$Q = 2 \\text{ kg} \\times 400,000 \\text{ J/kg} = 800,000 \\text{ J} = 800 \\text{ kJ}$$.\n- Step 2: The temperature **does not change** during melting. The substance stays at its melting point throughout the entire process. All 800 kJ goes into breaking intermolecular bonds (increasing potential energy), not into increasing kinetic energy. The specific heat capacity value ($$2000 \\text{ J/kg°C}$$) is irrelevant for this stage — $$c$$ only matters for temperature changes within a single state, not for state changes.\n\nTakeaway: For melting at the melting point, only $$Q = mL_f$$ applies; temperature stays constant; $$c$$ is not used for state changes.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Why does the Kelvin scale ensure that gas-law relationships work correctly, while Celsius can give absurd results? Give an example of what goes wrong if you use Celsius in a pressure-temperature proportionality. (3 steps)", "answer": "- Step 1: Gas pressure is proportional to the **true** temperature (average KE). The Kelvin scale's zero point (0 K = absolute zero) corresponds to zero KE and zero pressure. This makes the proportionality $$p \\propto T$$ work perfectly: at 0 K, pressure is 0; at 200 K, pressure is some value; at 400 K, pressure is exactly double that value.\n- Step 2: Celsius zero (0°C = 273 K) is an arbitrary point where water freezes — molecules still have substantial KE (273 K worth). If you tried $$p \\propto \\theta_{\\text{Celsius}}$$, at 0°C you'd predict zero pressure, but real gas pressure at 0°C is significant (molecules are still moving fast). At -273°C, you'd predict negative pressure, which is physically impossible.\n- Step 3: Example: a gas at 20°C (293 K) has pressure $$p_1$$. If you cool it to -20°C (253 K), pressure should decrease to $$\\frac{253}{293} p_1 \\approx 0.86 p_1$$ (14% drop). Using Celsius incorrectly: $$\\frac{-20}{20} = -1$$, predicting **negative** pressure — absurd. The Kelvin ratio $$\\frac{253}{293}$$ gives the correct answer because both temperatures are measured from the true physical zero.\n\nTakeaway: Celsius gives absurd results (zero or negative pressure) because its zero is arbitrary; Kelvin works because its zero is the true physical zero of KE.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "At constant pressure, if you heat a gas, its volume increases. Explain this using the particle model — why must the volume expand rather than just the pressure increasing? (3 steps)", "answer": "- Step 1: Heating the gas increases molecular speed (higher KE). Faster molecules hit the walls harder and more often, which would increase pressure if the volume stayed the same. But the condition here is **constant pressure** — the external pressure on the gas (e.g., atmospheric pressure pushing on a flexible container) is fixed.\n- Step 2: If the internal pressure from molecular collisions exceeds the external pressure, the container expands (the walls move outward, like a balloon inflating). As the volume increases, molecules have more space — they travel further between collisions, and the molecule density (number per unit volume) decreases. Both effects reduce the collision rate", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "Why are solids and liquids considered virtually incompressible, while gases are highly compressible?", "answer": "The key is the spacing between particles. In solids and liquids, the particles are already touching. There are no significant gaps to close. Trying to push them closer together results in strong repulsive forces between the particles. In contrast, gas particles are very far apart. Applying pressure can easily push the particles closer together, filling the empty space and reducing the volume.", "source": "Gemini Pro ①", "_id": "gemini_1_1"}, {"question": "A common phrase is \"lead is heavier than feathers.\" From a physics perspective, why is this statement imprecise, and what is the correct concept to use? (2 steps)", "answer": "- Step 1: The statement is imprecise because it doesn't specify the *amount* of lead or feathers. A large bag of feathers is clearly heavier than a single small lead ball. It confuses the concepts of mass/weight and density.\n- Step 2: The correct concept is **density**. The precise statement is \"lead is *denser* than feathers.\" This means that for the same volume (e.g., 1 cubic metre), the mass of lead is much greater than the mass of the feathers. Density ($$\\rho = m/V$$) is an intrinsic property of a material, independent of the object's size.", "source": "Gemini Pro ①", "_id": "gemini_1_2"}, {"question": "When measuring the density of an irregular object like a stone, why is a Eureka (displacement) can superior to using a ruler?", "answer": "A ruler is only useful for measuring the dimensions of regularly shaped objects (like cubes or cylinders) from which volume can be calculated with a formula (e.g., $$V = l \\times w \\times h$$). An irregular object like a stone has no simple dimensions to measure. A Eureka can solves this by measuring volume directly through water displacement: the volume of water that overflows when the object is submerged is exactly equal to the volume of the object itself.", "source": "Gemini Pro ①", "_id": "gemini_1_5"}, {"question": "When you heat a beaker of water, what happens to the internal energy? Contrast what happens to the kinetic and potential energy of the particles *before* it boils versus *while* it is boiling. (2 steps)", "answer": "- Step 1: **Before boiling (e.g., heating from 20°C to 99°C):** The supplied thermal energy increases the **kinetic energy** of the water molecules, causing them to move faster. This is observed as a rise in temperature. The potential energy of the particles remains largely unchanged because they are still in the liquid state and relatively close together. The internal energy increases primarily due to the increase in kinetic energy.\n- Step 2: **While boiling (at 100°C):** The supplied thermal energy now increases the **potential energy** of the molecules. This energy is used to break the intermolecular bonds and allow particles to escape into the gaseous phase (steam). The average kinetic energy of the particles does *not* change, which is why the temperature remains constant at 100°C. The internal energy continues to increase, but this time it's due to the increase in potential energy.", "source": "Gemini Pro ①", "_id": "gemini_1_10"}, {"question": "What is the physical meaning of a substance having a *high* specific heat capacity, like water ($$c = 4200$$ J/kg°C)? Give a real-world example.", "answer": "A high specific heat capacity means that a large amount of energy is required to raise the temperature of 1 kg of the substance by 1°C. In other words, the substance is very good at storing thermal energy without its temperature changing dramatically.\n+ **Real-world example:** Water is used in car cooling systems and central heating systems precisely because of this property. It can absorb a lot of heat from the engine (or boiler) and transport it away without boiling easily, and it can release that heat slowly to warm a house. The large bodies of water on Earth also moderate the climate for the same reason.", "source": "Gemini Pro ①", "_id": "gemini_1_11"}, {"question": "**Misconception Probe:** A student says, \"Specific heat capacity is the energy needed to heat up a substance.\" Why is this definition incomplete and potentially misleading? What are the two crucial conditions missing?", "answer": "This definition is incomplete because it's not specific enough.\n- Step 1: It misses the condition of **mass**. The energy required depends on how much of the substance you have. The correct definition specifies a standard mass, which is **1 kilogram (kg)**.\n- Step 2: It misses the condition of **temperature change**. \"Heat up\" is vague. The correct definition specifies a standard temperature change, which is **1 degree Celsius (°C)** or 1 Kelvin (K).\n\nThe full, precise definition is: Specific heat capacity is the energy required to raise the temperature of **1 kg** of a substance by **1°C**.", "source": "Gemini Pro ①", "_id": "gemini_1_12"}, {"question": "You have two metal blocks of the same mass, one made of copper ($$c \\approx 400$$ J/kg°C) and one of aluminum ($$c \\approx 900$$ J/kg°C). If you supply the exact same amount of thermal energy to both, which block will experience a larger temperature increase, and why?", "answer": "The **copper block** will experience a larger temperature increase.\n- **Reasoning:** Specific heat capacity ($$c$$) is a measure of a substance's thermal \"inertia\"—its resistance to temperature change. Since copper has a much lower specific heat capacity, it requires less energy to raise its temperature by 1°C. Therefore, for the same amount of energy supplied ($$\\Delta Q$$), the copper's temperature ($$\\Delta \\theta$$) must increase more to satisfy the equation $$\\Delta Q = mc\\Delta\\theta$$. The aluminum, with its higher $$c$$, will \"soak up\" the energy with a smaller temperature rise.", "source": "Gemini Pro ①", "_id": "gemini_1_13"}, {"question": "What is the fundamental difference between **specific heat capacity** and **specific latent heat**? When would you use the equation $$\\Delta Q = mc\\Delta\\theta$$ versus $$Q = mL$$? (2 steps)", "answer": "- Step 1: **Specific Heat Capacity ($$c$$)** relates to the energy required to change a substance's **temperature** while it remains in the **same state**. If the temperature of a solid, liquid, or gas is changing, you use the specific heat capacity formula: $$\\Delta Q = mc\\Delta\\theta$$.\n- Step 2: **Specific Latent Heat ($$L$$)** relates to the energy required to change a substance's **state** (e.g., melt or boil) at a **constant temperature**. If a substance is melting, freezing, boiling, or condensing, you use the specific latent heat formula: $$Q = mL$$. The key is that there is *no temperature change* ($$\\Delta\\theta=0$$) during the process.", "source": "Gemini Pro ①", "_id": "gemini_1_14"}, {"question": "In the core practical to measure the specific heat capacity of water, an immersion heater is used. Why does the calculated value of $$c$$ often come out higher than the true value of 4200 J/kg°C? (2 steps)", "answer": "- Step 1: The experiment assumes that all the electrical energy supplied by the heater ($$E=VIt$$) is transferred as thermal energy to the water ($$\\Delta Q$$).\n- Step 2: In reality, some of this thermal energy is lost to the surroundings (the beaker, the air) instead of heating the water. This means the actual energy $$ \\Delta Q $$ absorbed by the water is *less* than the calculated electrical energy $$E$$. When we calculate $$c = \\frac{E}{m\\Delta\\theta}$$, we are using a value for energy ($$E$$) that is too large, which results in a calculated value for $$c$$ that is also too high.\n\nInsulating the beaker helps to reduce this error.", "source": "Gemini Pro ①", "_id": "gemini_1_16"}, {"question": "What is meant by \"absolute zero\" in terms of particle motion and temperature? Why is it impossible to have a temperature below absolute zero?", "answer": "**Absolute zero** (0 Kelvin or -273°C) is the lowest possible temperature. At this temperature, particles have the minimum possible internal energy. Their kinetic energy is zero, meaning they stop moving or vibrating entirely. Since temperature is a measure of the average kinetic energy of particles, you cannot have less than zero kinetic energy, and therefore it's impossible to have a temperature below absolute zero.", "source": "Gemini Pro ①", "_id": "gemini_1_19"}, {"question": "Boyle's Law states that for a fixed mass of gas at constant temperature, $$p_1V_1 = p_2V_2$$. Explain the inverse relationship between pressure and volume from a particle perspective. (3 steps)", "answer": "- Step 1: Imagine a gas in a container of volume $$V_1$$. The pressure $$p_1$$ is caused by particles colliding with the walls. The temperature is constant, so the speed of the particles does not change.\n- Step 2: Now, decrease the volume to $$V_2$$ (where $$V_2 < V_1$$) by pushing in a piston. The same number of particles are now confined to a smaller space.\n- Step 3: Because the container is smaller, the particles will collide with the walls much more **frequently**, even though they are moving at the same speed. More collisions per second means a greater average force on the walls, and therefore a higher pressure $$p_2$$. This demonstrates that as volume decreases, pressure increases.", "source": "Gemini Pro ①", "_id": "gemini_1_22"}, {"question": "Why does a bicycle pump get warm when you use it to inflate a tyre? Explain this in terms of \"doing work\" on a gas. (3 steps)", "answer": "- Step 1: To compress the air inside the pump, you have to apply a force to the handle and move it through a distance. This action is the definition of **doing mechanical work** ($$W = F \\times d$$).\n- Step 2: This work transfers energy *to* the gas particles inside the pump. This energy increases the **internal energy** of the gas.\n- Step 3: The increase in internal energy primarily manifests as an increase in the kinetic energy of the gas particles. An increase in the average kinetic energy of the particles means the **temperature** of the gas increases. This is why the pump feels warm.", "source": "Gemini Pro ①", "_id": "gemini_1_24"}, {"question": "What is the difference between \"density\" and \"weight\"? Why is this a common misconception? (2 steps)", "answer": "- Step 1: Define each term\nDensity (ρ) = mass ÷ volume, measured in kg/m³. It is an intrinsic property of a material, independent of gravity. Weight = force due to gravity, measured in newtons (N = mg).\n- Step 2: Why the confusion\nOn Earth, we observe heavy objects (like lead) are also dense, and light objects (like feathers) are less dense—this correlation creates the misconception. But in space or underwater, weight changes while density stays the same. A lead block weighs less on the Moon but has identical density.\n\n[Density is \"how tightly packed the matter is\"; weight is \"how strongly gravity pulls on it.\"]", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "Define internal energy, and explain how it differs from temperature. (2 steps)", "answer": "- Step 1: Define internal energy\nThe total energy stored in a system by its particles = sum of kinetic energy (from motion/vibration) + potential energy (from particle spacing/bonds).\n- Step 2: Distinguish from temperature\nTemperature measures the average kinetic energy only—the \"hotness\" of a substance. During a change of state (e.g., melting ice at 0°C), temperature stays constant but internal energy still increases because energy goes into breaking bonds (increasing potential energy), not into increasing kinetic energy.\n\n[Key insight: Two objects at the same temperature can have different internal energies if they have different masses or types of particles.]", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "Define specific heat capacity. Why does water have a much higher specific heat capacity than metals like copper? (2 steps)", "answer": "- Step 1: Definition\nSpecific heat capacity (c) = the amount of thermal energy required to raise the temperature of 1 kg of a substance by 1°C. Measured in J/kg°C.\n- Step 2: Why water's value is high\nWater has strong hydrogen bonds between molecules. To raise its temperature, you must overcome these bonds and increase the kinetic energy of the water molecules. Metals like copper have weaker metallic bonds, so less energy is needed to increase particle motion. Water's high c (4200 J/kg°C) vs copper's (~385 J/kg°C) means water heats and cools much more slowly—a crucial factor in climate regulation and cooking.\n\n[High c = \"hard to heat, hard to cool\"; Low c = \"easy to heat, easy to cool.\"]", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "Why is it incorrect to say \"heat rises\"? Explain the actual mechanism of heat transfer in fluids. (2 steps)", "answer": "- Step 1: The misconception\n\"Heat\" is not a substance that rises—it's energy transfer. What actually rises is the material itself (the fluid).\n- Step 2: The correct explanation—convection\nWhen a fluid (liquid or gas) is heated from below, the lower portion warms up, expands, and becomes less dense. This warmer, less dense fluid then rises upward (because it's buoyant in the surrounding cooler, denser fluid). Cooler fluid sinks to take its place, creating a convection current. The moving fluid carries thermal energy with it.\n\n[Conduction: vibration passes through material. Convection: hot material moves. Radiation: electromagnetic waves.]", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "Explain how a vacuum flask keeps hot drinks hot (and cold drinks cold). Name the three heat transfer mechanisms the flask minimises. (3 steps)", "answer": "- Step 1: Conduction\nThe flask has a double wall with a vacuum between them. A vacuum contains no particles, so conduction (energy transfer through vibrating particles) is minimal.\n- Step 2: Convection\nWith a vacuum, there are no particles to convect—no fluid to carry energy away. The vacuum layer prevents convective heat loss.\n- Step 3: Radiation\nThe inner surfaces are shiny (silvered). This reflects thermal radiation back into the drink, reducing losses by radiation. The cap also reduces conduction and convection.\n\n[The vacuum flask addresses all three mechanisms of heat transfer.]", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "Compare the density of a substance in its solid and liquid states. Does the density usually increase or decrease upon melting? Why? (2 steps)", "answer": "- Step 1: General pattern\nMost substances are denser as solids than as liquids. Water is the famous exception.\n- Step 2: The particle explanation\nWhen a solid melts, particles gain enough energy to break free from their fixed positions and slide past each other. They need slightly more space to move—so the substance expands slightly, making it less dense. For water, the open hexagonal structure of ice collapses into a denser packed liquid arrangement, so water is denser than ice.\n\n[Ice floats because ρ_ice < ρ_water—this is unusual but crucial for aquatic life in cold climates.]", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "When a gas is compressed in a bicycle pump, the temperature rises. Is this due to heating or due to work being done? Explain. (2 steps)", "answer": "- Step 1: Identify the mechanism\nThe pump is insulated (or we consider the compression to be fast enough that little heat exchanges with surroundings). The temperature rise comes from work done on the gas, not from heat transfer.\n- Step 2: Energy transfer\nYou apply a force through a distance—you do work on the gas. This mechanical energy transfer increases the internal energy of the gas (specifically, the kinetic energy of the molecules), raising its temperature. This is work, not heat.\n\n[Work and heat are both energy transfer mechanisms—in this case, work is the cause, not \"heat rising\" or any thermal process.]", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "Why does ice at 0°C cool a drink more effectively than water at 0°C? (2 steps)", "answer": "- Step 1: Consider the energy transfer\nBoth ice and water at 0°C are at the same temperature. But to melt the ice, energy must be absorbed from the drink—this is the latent heat of fusion (330 kJ/kg).\n- Step 2: The cooling mechanism\nAs ice melts to water at 0°C, it absorbs 330 kJ per kilogram from the drink. Additionally, the resulting cold water then continues to absorb heat as it warms up. Water at 0°C can only absorb heat through temperature rise (specific heat capacity), but melting ice absorbs much more energy without any temperature change.\n\n[This is why iced drinks are colder than just cold water—the phase change provides extra cooling.]", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "What is the difference between evaporation and boiling? (2 steps)", "answer": "- Step 1: Boiling\nOccurs at the boiling point throughout the liquid—bubbles of gas form throughout the volume and rise to the surface. Requires continuous heat input.\n- Step 2: Evaporation\nOccurs at any temperature, but only at the surface of the liquid. Faster-moving molecules at the surface escape into the air, even though the average temperature is below boiling. Evaporation cools the remaining liquid (energy leaves with the escaping molecules).\n\n[Evaporation happens at room temperature—that's why puddles dry up. Boiling requires reaching 100°C (at atmospheric pressure).]", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Why is it important that radiator coolant (antifreeze) has a high specific heat capacity? (2 steps)", "answer": "- Step 1: The function of coolant\nEngine coolant absorbs heat from the engine block (where fuel combustion produces heat) and carries it to the radiator to be dissipated.\n- Step 2: Why high c matters\nA fluid with high specific heat capacity can absorb a large amount of thermal energy for only a small temperature rise. Water (c = 4200 J/kg°C) is ideal—it can carry away lots of engine heat without getting dangerously hot. If a low-c fluid were used, it would heat up too quickly, requiring constant circulation and risking overheating. Antifreeze also lowers the freezing point but is chosen to retain reasonably high c.\n\n[Water is used as the baseline coolant precisely because of its exceptionally high specific heat capacity compared to most liquids.]", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "During a phase change (e.g., melting), why does temperature remain constant even though energy is added? Link this to internal energy and particle behavior. (3 steps)", "answer": "- Step 1: **Energy allocation**. The added energy (Q = mL) breaks intermolecular bonds rather than increasing kinetic energy (KE). Temperature depends only on average KE, so it stays constant.  \n- Step 2: **Potential energy (PE) increase**. As bonds break, particles move farther apart, increasing PE. Internal energy (KE + PE) rises, but KE (temperature) doesn’t.  \n+ Contrast: Heating a solid (ΔQ = mcΔθ) increases KE, so temperature rises.  \n- Step 3: **Heating curve plateau**. The flat section on a temperature-time graph shows energy going into overcoming forces, not raising KE.", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "Why is the specific latent heat of vaporization (Lᵥ) always greater than the specific latent heat of fusion (Lₖ) for the same substance? (3 steps)", "answer": "- Step 1: **Bond-breaking requirements**. Fusion (melting) only requires partial bond breaking to allow particle slippage (solid → liquid). Vaporization requires complete bond breaking (liquid → gas).  \n- Step 2: **Energy demand**. Separating particles into a gas phase requires far more energy than the partial separation in melting.  \n+ Example: For water, Lᵥ = 2.26 MJ/kg vs. Lₖ = 330 kJ/kg (7× higher).  \n- Step 3: **Distance between particles**. Gas particles are much farther apart than liquid particles, so overcoming intermolecular forces demands more energy.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why is thermal insulation effective when using materials with trapped air (e.g., wool, foam)? Explain for conduction, convection, and radiation. (3 steps)", "answer": "- Step 1: **Conduction**: Air is a poor conductor (few particles to transfer energy). Trapped air pockets in insulation materials reduce heat flow.  \n- Step 2: **Convection**: Trapped air cannot circulate freely, suppressing convection currents.  \n+ Example: Fiberglass traps air, preventing both conduction and convection.  \n- Step 3: **Radiation**: Shiny surfaces (e.g., in vacuum flasks) reflect infrared radiation, reducing energy loss via electromagnetic waves.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "Define density and explain its physical meaning in terms of the particle model. What are its standard units, and why is it distinct from 'weight'? (3 steps)", "answer": "- Step 1: **Definition of Density**\n    Density ($$\\rho$$) is defined as the mass per unit volume of a substance. Mathematically, it's expressed as the ratio of an object's mass ($$m$$) to its volume ($$V$$): $$\\rho = \\frac{m}{V}$$.\n    + For example, if you have a 1 kg block of wood and a 1 kg block of lead, the lead block will be much smaller because its particles are packed more densely, meaning more mass is contained in a smaller volume.\n\n- Step 2: **Physical Meaning via Particle Model & Units**\n    In the particle model, density reflects how closely packed the particles (atoms or molecules) of a substance are, and also the mass of those individual particles. A high-density material has its particles tightly packed together and/or consists of heavier individual particles, resulting in a large mass concentrated in a small volume. Conversely, a low-density material has particles that are more spread out or are individually lighter, leading to less mass in a given volume.\n    + The standard SI unit for density is kilograms per cubic meter ($$\\text{kg/m}^3$$). Another common unit, especially for smaller volumes, is grams per cubic centimeter ($$\\text{g/cm}^3$$). It's important to remember that $$1 \\text{ g/cm}^3 = 1000 \\text{ kg/m}^3$$.\n\n- Step 3: **Distinction from Weight**\n    Density is fundamentally different from 'weight'. Weight is the gravitational force exerted on an object's mass, which depends on both the object's mass and the strength of the gravitational field it is in. For instance, an object's weight would be different on the Moon compared to Earth, even though its mass remains the same. Density, however, is an intrinsic property of the material itself (mass per unit volume) and does not depend on gravity. It describes how much 'stuff' is crammed into a certain space, irrespective of the gravitational pull.\n    + A common misconception is to use \"heavy\" or \"light\" to describe density. While a dense object is often heavy, it's more precise to say it has a high mass-to-volume ratio. A feather is light, but its density is low because its mass is spread over a large volume. Lead is heavy, and its density is high because a lot of mass is packed into a small volume.\n\nDensity is a fundamental property that helps us understand how materials behave, such as whether they will float or sink in a fluid.", "source": "Gemini Flash ①", "_id": "gflash_1_0"}, {"question": "Compare and contrast the particle arrangement, motion, and spacing in solids, liquids, and gases. Explain how these differences lead to their distinct properties regarding shape, volume, and compressibility. (4 steps)", "answer": "- Step 1: **Particle Arrangement and Spacing**\n    + **Solids:** Particles are arranged in a fixed, regular pattern (a lattice structure). They are very close together, often touching. There are strong forces of attraction holding them in these fixed positions.\n    + **Liquids:** Particles are also very close together, often touching, similar to solids. However, they do not have a fixed, regular arrangement. The forces of attraction are strong enough to keep them close but weak enough to allow them to slide past each other.\n    + **Gases:** Particles are widely separated, with large distances between them (typically about 10 times further apart in each direction than in solids or liquids). There are very weak or negligible forces of attraction between gas particles, except during collisions.\n\n- Step 2: **Particle Motion**\n    + **Solids:** Particles do not move from their fixed positions but vibrate vigorously about these fixed points. The amplitude of vibration increases with temperature.\n    + **Liquids:** Particles move randomly and continuously, sliding past one another. This allows liquids to flow.\n    + **Gases:** Particles move randomly and rapidly in straight lines until they collide with other particles or the walls of the container. They have high kinetic energy.\n\n- Step 3: **Consequences for Shape and Volume**\n    + **Solids:** Due to their fixed arrangement and strong forces holding particles in place, solids have a **definite shape** and a **definite volume**. They resist changes in shape.\n    + **Liquids:** Because particles can slide past each other but remain close, liquids have a **definite volume** but **no definite shape**. They take the shape of their container.\n    + **Gases:** With particles widely separated and moving freely, gases have **no definite shape** and **no definite volume**. They expand to fill and take the shape of any container they are placed in.\n\n- Step 4: **Consequences for Compressibility**\n    + **Solids:** Particles are already very close and touching, leaving almost no empty space between them. This makes solids virtually **incompressible**.\n    + **Liquids:** Similar to solids, liquid particles are very close and touching, with minimal empty space. Therefore, liquids are also virtually **incompressible**.\n    + **Gases:** The large distances and empty spaces between gas particles mean they can be forced closer together relatively easily. This makes gases **highly compressible**.\n\nThe particle model provides an intuitive framework for understanding the macroscopic properties of matter based on the microscopic behavior of its constituent particles.", "source": "Gemini Flash ①", "_id": "gflash_1_1"}, {"question": "Explain the concept of Brownian motion and why it serves as compelling evidence for the existence and random movement of particles in fluids. (3 steps)", "answer": "- Step 1: **Description of Brownian Motion**\n    Brownian motion is the seemingly random, erratic, zig-zag movement observed when tiny particles (such as sm
