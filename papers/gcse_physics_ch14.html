orrect ones.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Explain why a woollen blanket keeps you warm, even though wool itself is not a \"hot\" material. (2 steps)", "answer": "- Step 1: How heat loss occurs\nHeat is transferred from your warm body to the cooler surroundings through conduction (through materials), convection (air movement), and radiation.\n- Step 2: What the blanket does\nWool is a poor conductor, trapping air within its fibres. Air is an excellent insulator (poor conductor). The blanket reduces conductive heat loss. It also prevents convection currents from carrying warm air away from your body. The blanket doesn't add heat—it slows the rate at which your body loses heat, so you stay warmer longer.\n\n[Insulation doesn't create warmth; it reduces heat loss. That's why you can be equally warm with a thin down jacket in very cold air if it traps enough air.]", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "During the temperature-time graph for melting ice (Core Practical 6), the temperature stays at 0°C for several minutes even though the heater is continuously supplying energy. Explain this observation. (2 steps)", "answer": "- Step 1: What the plateau means\nThe horizontal section at 0°C indicates the ice is melting—all the supplied energy goes into breaking bonds between water molecules, not into increasing kinetic energy.\n- Step 2: Why temperature is constant\nTemperature measures average kinetic energy. During melting, kinetic energy doesn't increase—all particles have the same average speed (corresponding to 0°C) as they transition from the rigid solid arrangement to the freely moving liquid arrangement. The energy is \"hidden\" as increased potential energy.\n\n[This produces the characteristic heating curve shape: sloping sections (temperature changing) connected by flat plateaus (state changing).]", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A 500 g block of aluminium (c = 900 J/kg°C) cools from 100°C to 20°C. How much thermal energy does it release? (2 steps)", "answer": "- Step 1: Identify the formula\nSince temperature is changing within the same state (solid), use:\n$$\\Delta Q = mc\\Delta\\theta$$\n- Step 2: Calculate\n$$m = 0.5\\text{ kg}, \\quad \\Delta \\theta = 100 - 20 = 80°C$$\n$$\\Delta Q = 0.5 \\times 900 \\times 80 = 36,000\\text{ J} = 36\\text{ kJ}$$\n\n[Since the block is cooling, this energy is released to the surroundings.]", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In the particle model, what is the difference between the kinetic energy and the potential energy of particles? (2 steps)", "answer": "- Step 1: Kinetic energy (KE)\nEnergy due to motion. Particles in all states have kinetic energy: vibrating (solids), moving/sliding (liquids), or moving freely at high speed (gases). Temperature is directly related to average kinetic energy.\n- Step 2: Potential energy (PE)\nEnergy due to position/spacing relative to other particles. It's stored in the bonds/forces between particles. When bonds stretch or break (melting, boiling), potential energy increases. During freezing/condensing, potential energy decreases as bonds form.\n\n[Total internal energy = KE + PE. Only KE relates to temperature; PE relates to state.]", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Why does putting a lid on a boiling pot of water reduce the energy wasted through evaporation? (2 steps)", "answer": "- Step 1: What evaporation does\nWhen water evaporates, it changes from liquid to gas at the boiling point. This requires the latent heat of vaporisation (2.26 MJ/kg)—energy is carried away by the escaping water vapour.\n- Step 2: How the lid helps\nThe lid traps the water vapour above the liquid. This vapour can condense back into liquid on the underside of the lid, returning latent heat to the pot. Without a lid, the vapour escapes, carrying away significant energy. The lid therefore reduces both mass loss and energy waste.\n\n[This is also why covering a pan of boiling water makes it boil over faster—less energy is lost, so more goes into heating the water.]", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Describe the energy changes when steam at 100°C condenses to water at 100°C, and then cools to room temperature. (3 steps)", "answer": "- Step 1: Condensation (100°C liquid)\nSteam → water at constant 100°C. Energy is released (not absorbed) as latent heat of vaporisation is given out. The gas particles lose potential energy as bonds form.\n- Step 2: Cooling (100°C → room temperature)\nWater cools from 100°C down to room temperature (~20°C). Kinetic energy decreases → temperature falls. Energy is released to the surroundings.\n- Step 3: Energy summary\nTotal energy released = Q_condensation + Q_cooling = mL_v + mcΔθ. This is why steam burns are severe—condensation releases latent heat IN ADDITION to the high temperature.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A gas is in a sealed container of fixed volume. If the gas is heated, what happens to the pressure? Explain this using both the particle model and the concept of internal energy. (2 steps)", "answer": "- Step 1: Particle model explanation\nAt higher temperature, gas particles move faster (higher kinetic energy). They collide with the container walls more frequently and with greater force. Since volume is fixed, this means greater pressure.\n- Step 2: Internal energy perspective\nHeating adds thermal energy to the gas, increasing its internal energy. At constant volume, this increase manifests as increased kinetic energy (not potential energy in gases with negligible intermolecular forces). Higher kinetic energy → higher pressure.\n\n[p ∝ T (in Kelvin) for fixed volume and mass—the pressure-temperature relationship.]", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "What is the difference between evaporation and boiling? (2 steps)", "answer": "- Step 1: Boiling\nOccurs at the boiling point throughout the liquid—bubbles of gas form throughout the volume and rise to the surface. Requires continuous heat input.\n- Step 2: Evaporation\nOccurs at any temperature, but only at the surface of the liquid. Faster-moving molecules at the surface escape into the air, even though the average temperature is below boiling. Evaporation cools the remaining liquid (energy leaves with the escaping molecules).\n\n[Evaporation happens at room temperature—that's why puddles dry up. Boiling requires reaching 100°C (at atmospheric pressure).]", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}, {"question": "Why is it important that radiator coolant (antifreeze) has a high specific heat capacity? (2 steps)", "answer": "- Step 1: The function of coolant\nEngine coolant absorbs heat from the engine block (where fuel combustion produces heat) and carries it to the radiator to be dissipated.\n- Step 2: Why high c matters\nA fluid with high specific heat capacity can absorb a large amount of thermal energy for only a small temperature rise. Water (c = 4200 J/kg°C) is ideal—it can carry away lots of engine heat without getting dangerously hot. If a low-c fluid were used, it would heat up too quickly, requiring constant circulation and risking overheating. Antifreeze also lowers the freezing point but is chosen to retain reasonably high c.\n\n[Water is used as the baseline coolant precisely because of its exceptionally high specific heat capacity compared to most liquids.]", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": true}], "count": 50}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Why are gases so much easier to compress than solids or liquids? Explain using the particle model. (3 steps)", "answer": "- Step 1: In solids and liquids, particles are already very close together — essentially touching. The spaces between particles are extremely small, so there's almost no room to push them closer together.\n- Step 2: In gases, particles are typically about 10 times further apart in each direction compared to liquids/solids. This means there's huge empty space between particles where they can be pushed together.\n- Step 3: When you compress a gas, you're reducing the volume, which forces more particles into the same space. This increases collision frequency with container walls, raising pressure. Solids/liquids are nearly incompressible because their particles already occupy nearly all available space.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A heating curve shows a substance being heated from solid to gas. Describe what is happening to the particles during the flat plateau sections versus the sloped sections. (3 steps)", "answer": "- Step 1: During sloped sections (temperature rising), the particles are gaining kinetic energy — they're vibrating, moving, or rotating faster. Temperature is a measure of average kinetic energy, so as kinetic energy increases, temperature rises.\n- Step 2: During flat plateau sections (constant temperature), the substance is changing state. All the energy supplied is being used to overcome intermolecular bonds — the particles are gaining potential energy as they move further apart.\n+ For melting: energy breaks some bonds between particles, allowing them to slide past each other (solid → liquid)\n+ For boiling: energy completely breaks remaining bonds, letting particles escape as gas\n- Step 3: The plateau is flat because temperature doesn't change — kinetic energy isn't increasing. Instead, potential energy increases as particles separate further. The plateau length indicates how much energy is needed for the change of state (specific latent heat).", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A block of metal and a block of wood have the same volume. If you drop both into water, the metal sinks but the wood floats. Explain why, using the concept of density. (2 steps)", "answer": "- Step 1: An object sinks if its density is greater than the fluid it's placed in (ρ_object > ρ_fluid). Water has density 1000 kg/m³. Metal (like iron at ~7800 kg/m³) is much denser than water, so it sinks.\n- Step 2: Wood (typically 400-600 kg/m³) is less dense than water, so when placed in water, the buoyant force equals the weight of water displaced, which is greater than the wood's weight. The wood experiences a net upward force and floats. Part of it remains above water because equilibrium is reached when weight = buoyant force.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "Explain the difference between specific heat capacity and specific latent heat. Under what circumstances does each apply? (2 steps)", "answer": "- Step 1: Specific heat capacity (c) applies when a substance is being heated or cooled within the SAME state (solid, liquid, or gas). The formula is ΔQ = mcΔθ — energy causes a temperature change. Water has high c (4200 J/kg°C), meaning it takes lots of energy to change its temperature.\n- Step 2: Specific latent heat (L) applies when a substance is changing STATE at constant temperature — melting/freezing or boiling/condensing. The formula is Q = mL — energy causes a phase change, not a temperature change. During melting or boiling, temperature stays constant even though energy is being supplied because all energy goes into breaking intermolecular bonds (increasing potential energy).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Why does a bicycle pump become warm when you pump up a tyre? Explain using the particle model and the concept of doing work on a gas. (3 steps)", "answer": "- Step 1: When you push down on the pump handle, you're applying a force through a distance — this is mechanical work being done ON the gas inside the pump.\n- Step 2: This work transfers energy to the gas molecules. According to the particle model, when gas molecules are compressed into a smaller volume, they collide more frequently with each other and the walls. These collisions convert the work energy into increased kinetic energy of the particles.\n- Step 3: Increased kinetic energy means higher temperature — that's why the pump feels warm. This is NOT the same as heating the gas (thermal energy transfer); it's energy transfer by doing work. The gas's internal energy increases due to work done on it.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "A sealed syringe containing air is slowly pushed inward at constant temperature. Describe what happens to the pressure inside and explain why, using particle theory. (3 steps)", "answer": "- Step 1: According to Boyle's Law (p₁V₁ = p₂V₂), when volume decreases at constant temperature, pressure must increase. The product of pressure and volume stays constant.\n- Step 2: Using particle theory: when you push the plunger in, the same number of gas molecules are now crowded into a smaller space. They collide with the walls more frequently because they don't have to travel as far between collisions.\n- Step 3: Each collision exerts a force on the wall. More collisions per second means greater total force on the same area → higher pressure. Temperature stays constant because the process is slow enough for heat to escape to the surroundings (isothermal).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A student measures the density of an irregular stone using a eureka can. The student gets 2.5 g/cm³, but the accepted value is 3.0 g/cm³. Suggest three possible sources of error in this experiment. (3 steps)", "answer": "- Step 1: Water may have splashed out when the stone was lowered in, meaning less water was collected than actually displaced. This gives an overestimate of volume → lower calculated density.\n- Step 2: The eureka can may not have been filled exactly to the spout initially — if not filled to the brim, some displaced water doesn't overflow, again overestimating volume.\n- Step 3: Air bubbles may have been trapped on the stone when it was lowered in. These bubbles take up space but aren't stone, so the measured \"displaced water\" includes both the stone's volume AND the bubbles → overestimated volume → lower density. Not drying the stone before weighing would give the opposite error (higher calculated density).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "Explain what absolute zero is and why it represents the lowest possible temperature. What is absolute zero in Celsius and Kelvin scales? (2 steps)", "answer": "- Step 1: Absolute zero (0 K or -273°C) is the temperature at which particles would have zero kinetic energy — they would stop moving completely. Since temperature is a measure of average kinetic energy, there cannot be negative kinetic energy, so there cannot be a temperature below absolute zero. It's the theoretical lower limit.\n- Step 2: Absolute zero equals -273°C on the Celsius scale and 0 K on the Kelvin scale. The Kelvin scale starts at absolute zero, so converting is: T(K) = θ(°C) + 273. For example, room temperature (20°C) = 293 K. A change of 1 K equals a change of 1°C — the scales have the same sized degree, just different starting points.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Brownian motion is cited as evidence for the existence of molecules. Describe what Brownian motion is and what it demonstrates about the particle model. (2 steps)", "answer": "- Step 1: Brownian motion is the random, jittery, zig-zag movement of tiny visible particles (like smoke or pollen grains) suspended in a fluid. When observed under a microscope, these particles constantly change direction in unpredictable ways.\n- Step 2: This motion is caused by the invisible fluid molecules (air or water molecules) colliding with the suspended particles from all sides. These collisions are random — sometimes more hits from one direction, sometimes another. The visible particle gets knocked about because it's being bombarded by countless unseen molecules. This provides direct evidence that: (1) molecules exist, (2) molecules are in constant random motion, and (3) they have kinetic energy (they're moving). Note: Brownian motion is NOT the motion of the molecules themselves — it's the visible effect of molecular collisions on larger particles.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Two beakers contain equal masses of water at the same initial temperature. Beaker A is heated by a flame; Beaker B is heated by placing it on a hot plate. After the same time, Beaker A is hotter. Does this violate the first law of thermodynamics? Explain. (3 steps)", "answer": "- Step 1: No, this does NOT violate energy conservation. The first law states energy is conserved — it cannot be created or destroyed, only transferred.\n- Step 2: The key is that the two methods transfer energy differently: heating by flame involves thermal radiation and convection (high rate of heat transfer), while the hot plate may conduct heat more slowly to the beaker. Different power inputs mean different rates of energy transfer.\n- Step 3: If both received the SAME amount of thermal energy (same energy input, not same time), they would reach the same temperature (assuming identical masses and no heat loss). The temperature difference arose because different amounts of energy were actually transferred in the same time, not because energy was created or destroyed.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "A block of copper (c = 385 J/kg°C) heats up much faster than an equal mass of water (c = 4200 J/kg°C) when the same heat source is applied. Explain why, referencing the specific heat capacity equation. (2 steps)", "answer": "- Step 1: Using the equation ΔQ = mcΔθ, for the same energy input (ΔQ) and same mass (m), the temperature change (Δθ) is inversely proportional to specific heat capacity (c). Copper's c = 385 J/kg°C is about 11 times smaller than water's c = 4200 J/kg°C.\n- Step 2: This means for every 1 kg of copper, only 385 J is needed to raise its temperature by 1°C, compared to 4200 J for water. With the same heating rate, copper's temperature rises roughly 11 times faster. Water's high specific heat capacity is why it's excellent for cooling systems — it absorbs lots of energy with only small temperature rises.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Explain why insulators like wool or foam often have many tiny air pockets trapped within them. How does this reduce heat transfer? (3 steps)", "answer": "- Step 1: Heat can transfer by three methods: conduction (through materials), convection (in fluids), and radiation (as electromagnetic waves).\n- Step 2: Air is a very poor conductor — its molecules are far apart, so it's difficult for kinetic energy to pass from molecule to molecule by collisions. Trapped air pockets inside insulation material block conduction paths.\n- Step 3: These air pockets also prevent convection currents from forming. Convection requires fluid (liquid or gas) to circulate; in small, trapped pockets of air, there's insufficient space for convection currents to develop. Additionally, fluffy/foamy materials often have shiny surfaces that reflect radiation. The combination makes good insulation.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In Core Practical 6 (investigating specific heat capacity of water), why might the experimentally calculated value of c for water be LARGER than the accepted value of 4200 J/kg°C? (2 steps)", "answer": "- Step 1: The immersion heater doesn't just heat the water — it also heats the beaker, the thermometer, the heater itself, and some heat is lost to the surroundings. The electrical energy supplied (E = VIt) includes energy that doesn't go into raising the water's temperature.\n- Step 2: Since the calculation c = ΔQ/(mΔθ) assumes ALL supplied energy goes into the water, but some energy is lost to the environment, the calculated c appears larger than reality. The actual temperature rise for a given energy input is smaller than expected, making c appear inflated.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why does steam at 100°C cause more severe burns than water at 100°C? (2 steps)", "answer": "- Step 1: Both are at the same temperature (100°C), but steam contains MORE energy per kilogram due to the latent heat of vaporisation. Water at 100°C must release 2.26 MJ/kg to condense to liquid at 100°C.\n- Step 2: When steam contacts your skin, it first condenses to water (releasing 2.26 MJ/kg of latent heat), then cools from 100°C to your skin temperature. This releases much more total energy than water at 100°C, which only cools slightly. The extra energy release from condensation causes more severe burns.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "A weather balloon rises high into the atmosphere. As it rises, the pressure surrounding it decreases. What happens to the volume of the balloon, and explain why using kinetic theory. (2 steps)", "answer": "- Step 1: As the balloon rises, external pressure decreases (atmospheric pressure drops with altitude). Since the balloon is partially flexible (not rigid), the gas inside expands.\n- Step 2: With lower external pressure, the gas molecules inside collide with the balloon walls with less force per impact. The higher-pressure gas outside that was compressing the balloon is now pushing less. The balloon expands until internal pressure equals external pressure again. This is qualitatively consistent with pV = constant for isothermal expansion (Boyle's Law), though temperature also drops with altitude so the relationship isn't perfectly maintained.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A substance undergoes a heating curve experiment. The temperature stays constant at 0°C for 5 minutes, then rises. What does this tell you about the substance? (2 steps)", "answer": "- Step 1: The flat plateau at constant temperature indicates a change of state is occurring. Energy is being supplied but temperature isn't rising — all the energy is going into breaking intermolecular bonds (increasing potential energy) rather than increasing kinetic energy.\n- Step 2: Since the plateau is at 0°C, the substance is melting (changing from solid to liquid). This is the melting point/freezing point of the substance. The length of the plateau relates to the specific latent heat of fusion — longer plateau means higher L_f (more energy needed to melt the substance).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A car's tyres heat up during a long journey. Using particle theory, explain why the pressure in tyres should be checked when the tyres are COLD, not immediately after driving. (2 steps)", "answer": "- Step 1: When a car is driven, friction between the road and tyres, plus the flexing of the tyre rubber as they roll, does work on the air inside the tyres. This transfers energy to the gas, increasing its temperature.\n- Step 2: From the ideal gas relationship (and qualitatively from p ∝ T at constant volume), when temperature increases, pressure increases. So hot tyres have higher pressure than cold tyres. Checking pressure when hot would give a falsely high reading, and when the tyres cool down, the pressure would drop below the recommended level. Checking when cold gives an accurate baseline.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "Explain the difference between conduction, convection, and radiation as methods of heat transfer. Give an example of each. (3 steps)", "answer": "- Step 1: Conduction is heat transfer through a material without the material itself moving — happens when fast-vibrating particles collide with neighbors, passing on kinetic energy. Best in solids (especially metals, which have free electrons). Example: a metal spoon heating up in hot soup.\n- Step 2: Convection is heat transfer through fluid (liquid or gas) movement — when a fluid is heated, it expands, becomes less dense, and rises (or sinks if cooled). Creates循环 currents. Example: hot air rising from a heater, or water circulating in a kettle.\n- Step 3: Radiation is heat transfer as electromagnetic waves (infrared) that don't need a medium — can travel through vacuum. All objects emit and absorb radiation. Example: heat from the Sun reaching Earth, or feeling warmth from a bonfire.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Two identical rooms have the same temperature, but one feels much colder. What could explain this difference? (2 steps)", "answer": "- Step 1: The \"feels-like\" temperature depends on heat loss from your body, which depends on several factors beyond just air temperature.\n- Step 2: Key factors include: (1) Air movement — windy conditions (wind chill) increase heat loss by convection; (2) Humidity — in very humid conditions, sweat doesn't evaporate easily, making you feel warmer; in dry conditions, you may feel cooler; (3) Radiative heat loss — if walls/windows are cold, your body radiates heat to them; (4) Contact with cold surfaces — sitting on a cold chair conducts heat away from your body. The room with cold surfaces or drafts will feel colder even at the same air temperature.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A block of ice at 0°C is heated until it becomes water at 20°C. Sketch a heating curve (temperature vs. energy supplied) for this process. Label the flat sections and explain their physical significance. (3 steps)", "answer": "- Step 1: The heating curve starts at 0°C (ice), then temperature rises as energy is added (slope upward) — this is heating ice from 0°C to its melting point (though they're the same for ice/water, so actually the first flat section is at 0°C).\n- Step 2: First flat plateau at 0°C: ice melting to water. Energy goes into breaking bonds (potential energy increase), not increasing kinetic energy — temperature constant. This is the latent heat of fusion (L_f).\n- Step 3: After all ice melts, temperature rises again (sloped section) — heating water from 0°C to 20°C using specific heat capacity (ΔQ = mcΔθ). Second flat plateau (if we continued) would be at 100°C for boiling — water changing to steam at constant temperature (latent heat of vaporisation, L_v).", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A sealed rigid container is filled with gas. If you heat the container, what happens to the pressure? Explain using kinetic theory. (2 steps)", "answer": "- Step 1: Pressure will increase. The container is rigid (constant volume), so heating the gas increases the temperature.\n- Step 2: At higher temperature, gas molecules have greater kinetic energy — they move faster. This means: (1) they collide with the walls more often (more frequent collisions), AND (2) each collision is harder (greater force per impact because molecules have more momentum). Both effects increase the total force on the walls per unit area → higher pressure. This is why aerosol cans warn against heating — pressure can build dangerously.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Why does water have such a high specific latent heat of vaporisation (2.26 MJ/kg) compared to its specific latent heat of fusion (330 kJ/kg)? (2 steps)", "answer": "- Step 1: Vaporisation (liquid → gas) requires breaking ALL intermolecular bonds, while fusion (solid → liquid) only partially breaks them.\n- Step 2: In liquid water, molecules are already relatively free to move — they have some bonds but not the rigid structure of ice. To become gas, they must overcome virtually all attractive forces and separate completely (about 10× further apart than in liquid). This requires much more energy than simply loosening the arrangement in ice to allow sliding (melting). Water's L_v is about 7× larger than L_f for this reason.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A student claims that during boiling, the water temperature stays at 100°C because the heat source isn't strong enough to raise the temperature higher. Explain why this is a misconception. (2 steps)", "answer": "- Step 1: This is incorrect. At standard atmospheric pressure, water boils at 100°C (373 K) because that's the temperature at which the vapor pressure of water equals atmospheric pressure. It's a property of water, not a limitation of the heat source.\n- Step 2: During boiling, any energy added doesn't increase temperature because it's entirely used to break intermolecular bonds (latent heat of vaporisation). The temperature stays constant at the boiling point as long as liquid remains, regardless of how intense the heat source is. Increase the heat source, the water boils faster, but temperature stays at 100°C until all water has vaporised. To get water hotter than 100°C, you'd need a pressure cooker to increase the boiling point.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "Explain what is meant by \"thermal equilibrium.\" If two objects at different temperatures are placed in contact, what determines the final equilibrium temperature? (2 steps)", "answer": "- Step 1: Thermal equilibrium is the state reached when two objects in thermal contact have the same temperature, so there is no net flow of heat between them. Energy transfer continues but balances in both directions.\n- Step 2: The final equilibrium temperature depends on the masses and specific heat capacities of the objects. Using conservation of energy: energy lost by hot object = energy gained by cold object. If both objects are the same material with equal masses, equilibrium is halfway between initial temperatures. A large mass or high c object changes temperature less, so equilibrium ends up closer to its initial temperature.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A solid cube has side length 5 cm and mass 500 g. Calculate its density in kg/m³. Show your reasoning. (3 steps)", "answer": "- Step 1: Convert all quantities to SI units (kg and m). Mass: 500 g = 0.5 kg. Side length: 5 cm = 0.05 m.\n- Step 2: Calculate volume: V = l³ = (0.05 m)³ = 0.05 × 0.05 × 0.05 = 0.000125 m³ (or 1.25 × 10⁻⁴ m³).\n- Step 3: Calculate density: ρ = m/V = 0.5 kg / 0.000125 m³ = 4000 kg/m³. This is less than lead (11,300 kg/m³) but more than aluminum (~2700 kg/m³) — could be a dense ceramic or composite material.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A 2 kg block of aluminum (c = 900 J/kg°C) is heated from 20°C to 60°C. How much thermal energy is required? (2 steps)", "answer": "- Step 1: Identify the known values: mass m = 2 kg, specific heat capacity c = 900 J/kg°C, temperature change Δθ = 60°C - 20°C = 40°C.\n- Step 2: Use the formula ΔQ = mcΔθ = 2 × 900 × 40 = 72,000 J = 72 kJ. This is the energy needed to raise the temperature within the solid state — no change of state is involved.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "If 50,000 J of energy is supplied to 0.5 kg of a liquid at its boiling point, and all of it changes to gas, what is the specific latent heat of vaporisation for this liquid? (2 steps)", "answer": "- Step 1: Use the formula Q = mL, rearranged to L = Q/m. Known: Q = 50,000 J, m = 0.5 kg.\n- Step 2: L = 50,000 J / 0.5 kg = 100,000 J/kg = 100 kJ/kg. This is much lower than water's L_v (2.26 MJ/kg), indicating a liquid with relatively weak intermolecular forces.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A gas occupies 0.3 m³ at a pressure of 100 Pa. If the temperature remains constant, what will be the pressure when the volume is reduced to 0.1 m³? (2 steps)", "answer": "- Step 1: Use Boyle's Law: p₁V₁ = p₂V₂. Known: p₁ = 100 Pa, V₁ = 0.3 m³, V₂ = 0.1 m³.\n- Step 2: Rearranging: p₂ = p₁V₁ / V₂ = (100 × 0.3) / 0.1 = 30 / 0.1 = 300 Pa. Pressure triples when volume is reduced to one-third, confirming the inverse relationship (p ∝ 1/V at constant T).", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Convert 27°C to Kelvin, and convert 250 K to Celsius. (2 steps)", "answer": "- Step 1: Celsius to Kelvin: T(K) = θ(°C) + 273. So 27°C = 27 + 273 = 300 K.\n- Step 2: Kelvin to Celsius: θ(°C) = T(K) - 273. So 250 K = 250 - 273 = -23°C. This is well below freezing — a very cold winter day in Celsius terms, but above absolute zero.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Why do emergency blankets (space blankets) have a shiny metallic surface? Explain how this reduces heat loss by radiation. (2 steps)", "answer": "- Step 1: All objects emit thermal radiation (infrared). Good emitters are also good absorbers; poor emitters are also poor absorbers.\n- Step 2: A shiny metallic surface is a poor emitter of radiation — it reflects most radiation back rather than emitting it. This reduces heat loss from the body by radiation. The shiny surface also reflects incoming radiation (like sunlight), providing additional protection. However, it doesn't significantly reduce convective or conductive losses, which is why survival blankets also need to block air movement.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Explain why the particles in a gas move faster at higher temperatures, and why this leads to higher pressure if volume is constant. (2 steps)", "answer": "- Step 1: Temperature is a measure of average kinetic energy. At higher temperatures, particles have more kinetic energy, meaning they move faster on average.\n- Step 2: When these faster particles collide with container walls, they bounce off with greater momentum change (higher velocity in, higher velocity out). Faster particles also collide more frequently. Both effects — more frequent collisions AND harder collisions — increase the total force exerted on the walls per unit area, raising the pressure. This is why a sealed gas container's pressure increases when heated.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A substance sublimes — it changes directly from solid to gas. What does this tell you about the particles of this substance? (2 steps)", "answer": "- Step 1: Sublimation occurs when the vapor pressure of the solid equals atmospheric pressure at a temperature below the melting point. This happens for substances with relatively weak intermolecular forces and high vapor pressure.\n- Step 2: This tells us the solid's particles can gain enough energy at relatively low temperatures to break free from the solid structure entirely, skipping the liquid phase. Dry ice (solid CO₂) is a classic example — at atmospheric pressure, CO₂ transitions directly to gas because liquid CO₂ can't exist at 1 atmosphere pressure. The particles must overcome the remaining intermolecular bonds to escape into the gas phase.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the density practical (Core Practical 5), why is it important to zero (tare) the balance when measuring the mass of a liquid? (2 steps)", "answer": "- Step 1: Taring the balance removes the mass of the container from the reading, so you directly measure only the mass of the liquid.\n- Step 2: Without taring, you'd need to subtract the container's mass separately, which introduces additional measurement uncertainty. If the container mass isn't measured accurately or precisely, your calculated liquid mass will be wrong, and this error propagates into your density calculation. Taring gives a direct, more accurate measurement of the liquid's mass.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A solid object has a density of 800 kg/m³. Will it sink or float in water (density 1000 kg/m³)? Explain your reasoning. (2 steps)", "answer": "- Step 1: The object has lower density (800 kg/m³) than water (1000 kg/m³).\n- Step 2: An object floats when ρ_object < ρ_fluid. Since 800 < 1000, the object will float. Specifically, it will float with 80% of its volume submerged (because 800/1000 = 0.8), meaning 20% of it remains above the water surface. This is because the weight of water displaced (buoyant force) equals the object's weight when floating.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Why is it more energy-efficient to use water rather than oil for central heating systems? (2 steps)", "answer": "- Step 1: Water has a much higher specific heat capacity (4200 J/kg°C) than most heating oils (~2000 J/kg°C).\n- Step 2: This means for the same mass of fluid and the same temperature rise, water carries almost twice as much thermal energy. Alternatively, to carry the same amount of energy, you need less water mass (and thus a smaller pump, smaller pipes). Water also has advantages of being non-flammable, non-toxic, and cheap. The higher capacity means the system can store and release more heat per unit mass, making heating more efficient.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Explain why the Kelvin scale is preferred in scientific calculations involving gases, rather than the Celsius scale. (2 steps)", "answer": "- Step 1: The Kelvin scale starts at absolute zero (0 K), which is a physically meaningful zero point — particles have zero kinetic energy. The Celsius scale's zero (0°C) is arbitrary (water's freezing point), not a true absence of thermal energy.\n- Step 2: In gas law calculations (like pV = nRT), temperature must be in Kelvin because the equations are derived from kinetic theory where T is proportional to average kinetic energy. Using Celsius would give incorrect proportionalities because you'd be including an offset of 273. For example, doubling the Celsius temperature from 27°C (300 K) to 54°C (327 K) does NOT double the kinetic energy — but going from 300 K to 600 K DOES.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "A student says \"heat and temperature are the same thing.\" Explain why this is incorrect and provide an example that demonstrates the difference. (2 steps)", "answer": "- Step 1: Heat is energy transfer due to temperature difference — it's a quantity of energy (measured in joules). Temperature is a measure of average kinetic energy per particle — it's an intensive property (doesn't depend on how much stuff you have).\n- Step 2: Example: A cup of boiling water (100°C) and a bathtub of warm water (40°C). The cup has higher temperature but less thermal energy (less heat content). The bathtub has lower temperature but contains MUCH more total energy because there's so much more mass, even though c is the same (Q = mcΔθ from some reference). Similarly, during phase changes, heat is added but temperature stays constant — heat and temperature clearly aren't the same thing.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why does stirring help ice melt faster in a drink? (2 steps)", "answer": "- Step 1: Ice melts when it absorbs heat from the surrounding liquid. Heat transfer occurs at the interface between the ice and the liquid.\n- Step 2: Stirring circulates warmer liquid from the bulk of the drink toward the ice surface, while bringing cooler liquid away from the ice. This continuously exposes fresh liquid at the ice surface, maintaining a high rate of heat transfer. Without stirring, the liquid immediately next to the ice cools down and insulates the ice from the warmer liquid, slowing heat transfer. Stirring also breaks up any cold boundary layer.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In the SHC practical (Core Practical 6), why is it important to plot energy supplied (on y-axis) against mΔθ (on x-axis) rather than just using individual measurements? (2 steps)", "answer": "- Step 1: Individual measurements have random errors — one reading might be high, another low. Using a graph and taking the gradient averages out these errors across all data points.\n- Step 2: The gradient of the energy-vs-(mΔθ) graph equals the specific heat capacity c. By using the gradient (best-fit line through the data), you get a more reliable value than from any single calculation. Additionally, plotting the graph lets you identify the linear region (after the heater warms up) and ignore initial non-linear data, improving accuracy.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A pressure cooker allows food to cook at temperatures above 100°C. Explain how this works and why it cooks food faster. (2 steps)", "answer": "- Step 1: A pressure cooker is a sealed container. As the water inside heats, it produces steam that cannot escape, increasing the pressure inside. Higher pressure raises the boiling point of water — at 2 atmospheres, water boils at around 120°C instead of 100°C.\n- Step 2: Cooking is a chemical process that speeds up at higher temperatures (roughly doubling speed for every 10°C rise). Food cooks faster at 120°C than at 100°C because the higher temperature provides more energy to break down proteins and starches in the food. The sealed environment also prevents evaporation, keeping the food moist.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "Explain why metals are generally good conductors of both heat and electricity, using the particle model. (2 steps)", "answer": "- Step 1: In metals, some electrons are not bound to specific atoms — they're \"free electrons\" that can move through the material. These free electrons can carry both thermal energy and electrical charge.\n- Step 2: For heat conduction, when one part of the metal is heated, the fast-vibrating atoms transfer energy to free electrons, which then move rapidly and collide with other atoms, spreading the energy throughout the metal quickly. For electrical conduction, the same free electrons carry charge when a voltage is applied. Non-metals lack these free electrons, so they can't transfer energy as efficiently.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Why does blowing across a hot cup of tea cool it down? (2 steps)", "answer": "- Step 1: The tea loses heat primarily through evaporation from its surface and through convection/conduction to the air above it.\n- Step 2: Blowing across the surface removes the layer of warm, moist air that normally sits above the tea (replacing it with cooler, drier air). This: (1) increases evaporation rate (more temperature drop from latent heat), and (2) increases convective heat loss. The moving air carries away both thermal energy and water vapor, accelerating cooling.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A sealed syringe containing gas is placed in hot water. If the syringe is free to move (piston can slide), what will happen to the volume of the gas? Explain using kinetic theory. (2 steps)", "answer": "- Step 1: The gas inside heats up, causing the molecules to move faster with greater kinetic energy.\n- Step 2: These faster molecules collide more frequently and with greater force against the piston. The piston will be pushed outward until the pressure inside again equals atmospheric pressure (external pressure). The volume increases because the gas needs more space at higher temperature to maintain the same pressure (at constant pressure, V ∝ T — Charles's Law, qualitatively). This is why hot air rises and why balloons expand in the sun.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "Why does the temperature of melting ice stay at 0°C even though I'm still heating it? (2 steps)", "answer": "- Step 1: During melting, the energy you supply doesn't increase the kinetic energy of the particles — it increases their potential energy as they break free from the rigid solid structure.\n- Step 2: Temperature measures average kinetic energy, not potential energy. As long as the ice is melting, all the energy goes into breaking intermolecular bonds (increasing separation), not into making particles move faster. Only after all ice has melted does the temperature of the water start to rise again. The rate of melting stays constant only if energy is supplied at a constant rate.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In a heating curve, the plateau for boiling is usually longer than the plateau for melting (for the same mass). Explain why. (2 steps)", "answer": "- Step 1: The length of the plateau is proportional to the specific latent heat — longer plateau means higher L.\n- Step 2: For most substances (including water), L_v (latent heat of vaporisation) is much larger than L_f (latent heat of fusion). This is because vaporisation requires breaking nearly ALL intermolecular bonds to separate particles into the gas phase, while melting only partially breaks bonds to allow particles to slide past each other. Water's L_v (2.26 MJ/kg) is about 7× larger than L_f (330 kJ/kg), so the boiling plateau is roughly 7× longer than the melting plateau for the same mass.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "A student measures the mass of a liquid using a balance and the volume using a measuring cylinder. The mass is 85 g and volume is 100 cm³. Calculate the density in kg/m³. (3 steps)", "answer": "- Step 1: Convert to SI units: mass 85 g = 0.085 kg; volume 100 cm³ = 100 × 10⁻⁶ m³ = 1 × 10⁻⁴ m³ (since 1 cm³ = 1 × 10⁻⁶ m³).\n- Step 2: Calculate density: ρ = m/V = 0.085 kg / 1 × 10⁻⁴ m³ = 850 kg/m³.\n- Step 3: This is less dense than water (1000 kg/m³), suggesting an oil or alcohol-based liquid. The calculation shows the importance of unit conversion — forgetting to convert cm³ to m³ would give 0.85 g/cm³, which equals 850 kg/m³ (same answer), but units must be consistent.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Explain why a vacuum flask (Thermos) keeps hot liquids hot and cold liquids cold. (3 steps)", "answer": "- Step 1: A vacuum flask has a double-walled glass (or steel) container with a vacuum between the walls. The vacuum eliminates conduction and convection because there's no medium (no particles) to carry heat.\n- Step 2: The walls are often silvered (shiny) on both surfaces. This reflects thermal radiation back into the liquid (if hot) or reflects external radiation away (if cold), minimizing radiative heat loss or gain.\n- Step 3: The components are further insulated with foam or plastic, which has low thermal conductivity and traps air pockets. Together, these features address all three methods of heat transfer: conduction (reduced by vacuum and foam), convection (eliminated by vacuum), and radiation (reduced by reflective surfaces).", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "Why does a filled balloon crackle when you pull it stretch it near your ear? (2 steps)", "answer": "- Step 1: When you stretch a balloon, you're pulling the rubber material, which creates areas of different thickness and static charge.\n- Step 2: The different charge regions create tiny electric sparks (like tiny lightning) between parts of the balloon material. These rapid discharges cause the crackling sound and can even produce faint light. This is related to static electricity buildup in the stretched polymer material of the balloon.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A block of wood has density 600 kg/m³ and mass 1.2 kg. Calculate its volume. (2 steps)", "answer": "- Step 1: Use rearranged density formula: V = m/ρ. Known: m = 1.2 kg, ρ = 600 kg/m³.\n- Step 2: V = 1.2 / 600 = 0.002 m³ = 2 × 10⁻³ m³. Converting to liters (1 m³ = 1000 L), this is 2 liters — about the size of a large milk carton.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "Why does opening a window on a cold day feel colder than the actual air temperature? (2 steps)", "answer": "- Step 1: The \"feels like\" temperature depends on heat loss from your body, which depends on wind speed.\n- Step 2: Wind (or moving air) removes the thin layer of warm air that sits next to your skin (the boundary layer) and replaces it with colder air. This increases convective heat loss dramatically. The moving air also accelerates evaporation of moisture from your skin, which has a cooling effect (latent heat). This \"wind chill\" effect makes the air feel colder than its actual temperature, even though the air temperature hasn't changed.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "A gas in a cylinder is compressed quickly (adiabatically) — no heat enters or leaves. What happens to the temperature of the gas? Explain. (2 steps)", "answer": "- Step 1: The temperature increases.\n- Step 2: When you compress the gas quickly, you do work on it (force through distance). This mechanical energy is transferred to the gas molecules as kinetic energy. Unlike slow compression where heat can escape, in adiabatic compression all the work energy stays in the gas, increasing particle speeds and thus temperature. This is why a bicycle pump gets warm even without external heating — the compression is fast enough that there's little time for heat to transfer out.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": true}, {"question": "Explain why sweat cools you down, even though sweat is at body temperature. (2 steps)", "answer": "- Step 1: Sweat cools you through evaporation, not because sweat is cold.\n- Step 2: To evaporate, water molecules must gain enough energy to break free from the liquid surface. This energy comes from your skin — as sweat molecules gain latent heat of vaporisation, they take thermal energy from your body. Even though the sweat is at your body temperature, the phase change requires energy that comes from your body's internal energy, creating a cooling effect. This is why fans help you feel cooler — they speed up evaporation by moving moist air away.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": true}, {"question": "Two substances have the same mass and are heated by the same heater for the same time. Substance A rises to 50°C, substance B rises to 80°C. Which has the higher specific heat capacity? Explain. (2 steps)", "answer": "- Step 1: Substance A has the higher specific heat capacity.\n- Step 2: Using ΔQ = mcΔθ, for the same energy input (ΔQ) and same mass (m), the temperature change (Δθ) is inversely proportional to c. A smaller temperature rise means more energy went into increasing particle motion without raising temperature — this is characteristic of a high c material. Substance B's temperature rose more because it has a lower c, so less energy is needed to raise its temperature.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": true}, {"question": "A thermometer placed in melting ice reads 0°C. If you place the same thermometer in melting iron (melting point 1538°C), it reads 1538°C. Explain why the energy input per second is very different in these two cases even though temperature is constant. (2 steps)", "answer": "- Step 1: The temperature readings are different, but the power (energy per second) required to maintain the temperature depends on the specific latent heat and the rate of heat loss to surroundings, not the temperature itself.\n- Step 2: Even though both are at constant temperature during melting, the specific latent heat of fusion is different for each substance. Additionally, at 1538°C there's a much larger temperature difference between the iron and surroundings, so heat loss is MUCH faster. Maintaining the iron's temperature requires much more energy input just to compensate for these greater heat losses, even though the temperature is constant.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": true}, {"question": "If you freeze water to ice, does the mass change? Explain using the particle model. (2 steps)", "answer": "- Step 1: The mass stays exactly the same.\n- Step 2: When water freezes, the molecules simply rearrange themselves into the crystalline structure of ice. The same molecules are present — none are created or destroyed, and none escape. Mass is always conserved in physical changes (and chemical reactions). What changes is the volume — ice is less dense than water, so it occupies more volume, but mass remains constant. This is why you can weigh ice and water and get identical masses.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "Why are clouds white? (2 steps)", "answer": "- Step 1: Clouds consist of water droplets or ice crystals that scatter all wavelengths of visible light approximately equally.\n- Step 2: This equal scattering of all colors produces white light. In contrast, blue sky comes from Rayleigh scattering, which scatters short wavelengths (blue) more than long wavelengths. Cloud droplets are larger than the wavelength of light, so they scatter by a different mechanism (Mie scattering) that doesn't favor any particular color. Thick clouds appear darker gray because less light transmits through — more scattering and absorption occurs.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "In the SHC practical, why should you use a python and not the first few minutes of data when calculating the gradient? (2 steps)", "answer": "- Step 1: At the start of the experiment, the immersion heater is heating itself before heat transfers efficiently to the water. The temperature rise doesn't follow the linear relationship yet.\n- Step 2: Also, there's initial thermal equilibrium being established between heater, thermometer, beaker, and water. Only after a minute or two does the system reach a steady state where all electrical energy goes consistently into heating the water. The first few points deviate from the straight line — using them would give an incorrect (usually higher) value for c. The gradient should be taken from the linear region of the graph.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "Why is it more accurate to measure the dimensions of a regular solid multiple times and take an average, rather than just measuring once? (2 steps)", "answer": "- Step 1: Every measurement has uncertainty. By taking multiple readings and averaging, random errors tend to cancel out.\n- Step 2: Systematic errors (like a ruler with wrong markings) won't be corrected by averaging, but random errors from parallax, slight angle misreadings, or imperfect placement are reduced. For example, measuring a cube's side five times and averaging gives a better estimate of the true dimension than a single measurement, especially for small objects where small absolute errors represent larger percentage errors.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "A student claims that ice at 0°C has no internal energy. Explain why this is wrong. (2 steps)", "answer": "- Step 1: Internal energy is the TOTAL energy of all particles in a substance — the sum of kinetic energy (from particle motion) AND potential energy (from particle positions/intermolecular bonds).\n- Step 2: At 0°C, ice particles are still vibrating about fixed positions in the crystal lattice. They have kinetic energy (temperature is a measure of this) and potential energy (from bonds in the crystal structure). Only at absolute zero (0 K = -273°C) would particles have zero kinetic energy. Even then, they'd still have potential energy from intermolecular forces. The student confuses internal energy with temperature — temperature measures average kinetic energy, not total internal energy.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": true}, {"question": "A weather balloon is filled with helium at ground level. As it rises, the balloon expands. Explain why, using gas laws and particle theory. (2 steps)", "answer": "- Step 1: As altitude increases, atmospheric pressure decreases. The balloon (which is flexible, not rigid) experiences lower external pressure.\n- Step 2: Inside the balloon, the helium pressure is initially higher than the surrounding air, pushing outward. As external pressure drops, the net outward force causes the balloon to expand. According to kinetic theory, the same number of helium molecules now occupy a larger volume — they collide with the walls less frequently, reducing internal pressure until it equals the (now lower) external pressure. This is qualitatively consistent with Boyle's Law (pV = constant at constant T), though temperature also drops with altitude.", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "Why does placing a lid on a hot pot of soup help keep it hot? (2 steps)", "answer": "- Step 1: The lid reduces heat loss by convection and evaporation.\n- Step 2: Without a lid, warm air rises from the soup surface, carrying thermal energy away (convection). The lid traps this warm air above the soup, reducing convective currents. Additionally, without a lid, water molecules evaporate from the surface, carrying away latent heat — the lid reduces this evaporative cooling. Some radiation still occurs through the lid, but convection and evaporation are significantly reduced.", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "A solid metal bar is heated at one end. Using particle theory, explain how the heat reaches the other end. (2 steps)", "answer": "- Step 1: In metals, heat is conducted primarily by free electrons, with some contribution from lattice vibration.\n- Step 2: At the hot end, atoms vibrate more intensely. These vibrating atoms collide with free electrons, transferring kinetic energy to them. The free electrons then move rapidly toward the cooler end, colliding with other atoms and transferring energy. This process happens very quickly, which is why metals are good thermal conductors. In non-metals, heat must travel by lattice vibrations (phonons) alone, which is much slower.", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "Why does water have unusually high specific heat capacity compared to most substances? (2 steps)", "answer": "- Step 1: Water molecules are polar and form hydrogen bonds with each other.\n- Step 2: These hydrogen bonds are relatively strong intermolecular forces. To raise water's temperature, energy must not only increase molecular kinetic energy (as in most substances) but also partially overcome these hydrogen bonds. The extensive hydrogen bonding network means more energy is required per degree of temperature increase, resulting in water's high c value of 4200 J/kg°C — about 5-10× higher than most common liquids.", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": true}, {"question": "A gas is compressed to half its original volume, but its temperature stays the same. What happens to the pressure? Explain using both Boyle's Law and particle theory. (2 steps)", "answer": "- Step 1: Using Boyle's Law (p₁V₁ = p₂V₂), if volume halves (V₂ = 0.5V₁) and temperature is constant, then p₂ = p₁V₁/V₂ = p₁V₁/(0.5V₁) = 2p₁. The pressure doubles.\n- Step 2: Using particle theory: when volume halves, the same number of molecules occupy half the space. They don't have to travel as far between collisions with the walls. This means they collide with the walls twice as often. Each collision exerts a force — more frequent collisions means greater total force per unit area → double the pressure. This confirms Boyle's Law.", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "Why is it important that the immersion heater used in Core Practical 6 is fully submerged in the water? (2 steps)", "answer": "- Step 1: If the heater isn't fully submerged, the part above the water surface heats the air instead of the water. The electrical energy goes into heating air rather than the water being measured.\n- Step 2: This means less energy reaches the water, so the calculated c would be lower than the true value (since you'd be attributing less energy to producing a given temperature rise). Additionally, the exposed heating element could overheat and burn out. The heater must be fully submerged to ensure all electrical energy transfers to the water.", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "Explain why a desert often has a very large daily temperature range (hot days, cold nights), while coastal areas have smaller daily ranges. (2 steps)", "answer": "- Step 1: The difference is due to specific heat capacity and proximity to water.\n- Step 2: Land (sand/rock) has very low specific heat capacity — it heats up quickly when the sun shines and cools rapidly at night. Water has high c (4200 J/kg°C), so it heats and cools much more slowly. Coastal areas have access to this large thermal reservoir, moderating temperature. Additionally, dry air in deserts allows more radiative cooling at night, while humidity in coastal areas traps some heat. The lack of water and low c in deserts creates extreme temperature swings.", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": true}, {"question": "A student says that an object with high specific heat capacity \"holds more cold.\" Explain what's wrong with this phrasing and what a correct statement would be. (2 steps)", "answer": "- Step 1: \"Holding cold\" isn't scientifically accurate — cold is the absence of thermal energy, not a substance that can be held.\n- Step 2: The correct idea is: a substance with high specific heat capacity requires a LOT of energy to change its temperature. To cool it down (remove energy) also requires removing a lot of energy. So water \"holds\" (stores/ releases) more thermal energy per degree of temperature change than most substances. A high-c substance doesn't \"hold cold\" — it just changes temperature slowly when energy is added or removed.", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": true}, {"question": "Why does the temperature of a substance stay constant during a change of state, even though energy is being supplied? (2 steps)", "answer": "- Step 1: During a change of state, the energy supplied is used to change the arrangement of particles, not their speed of motion.\n- Step 2: Temperature measures average kinetic energy (motion). When melting or boiling, particles are gaining potential energy as they move further apart and break intermolecular bonds — but their average speed doesn't change, so temperature stays constant. The energy goes into overcoming attractive forces between particles, not into making them move faster. Once all particles have changed state, energy input again increases kinetic energy and temperature rises.", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "If you leave a fridge door open in a sealed room, will the room get colder or warmer overall? Explain. (2 steps)", "answer": "- Step 1: The room will get warmer overall.\n- Step 2: A fridge doesn't create cold — it pumps heat from inside to outside. The refrigerator's compressor does work, which transfers energy to the room. Even though the inside gets colder, the back of the fridge releases more heat to the room than the cold air escaping from the open door removes. The work done by the compressor adds energy to the room. With the door open, the fridge runs constantly, pumping more heat out than it removes from the room, so net energy increases → room warms up.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": true}, {"question": "In the temperature-time graph for melting ice (Core Practical 6), why is it important to stir the ice-water mixture continuously? (2 steps)", "answer": "- Step 1: Without stirring, the water near the heat source becomes warmer and rises, while cooler water sinks. This creates temperature gradients in the beaker.\n- Step 2: The thermometer might read a region that's not representative of the entire mixture — it could read warmer than the bulk ice-water. Stirring ensures uniform temperature throughout, so the thermometer accurately represents the true temperature of the phase change. Without stirring, you'd get incorrect temperature readings during the melting plateau.", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}, {"question": "Why do ice cubes float on water? (2 steps)", "answer": "- Step 1: Ice is less dense than liquid water (about 920 kg/m³ vs 1000 kg/m³).\n- Step 2: This is unusual — most substances are denser in solid form. Water's lower solid density results from the open crystalline structure of ice, where hydrogen bonds hold water molecules in a tetrahedral arrangement with more empty space than in liquid water. Since ice is less dense, when it floats, about 92% of its volume is submerged, displacing a mass of water equal to its own weight. This allows aquatic life to survive under frozen surfaces.", "source": "MiniMax ②", "_id": "minimax_2_70", "judge_pick": false}, {"question": "A student calculates density as mass divided by volume. They get 500 kg/m³ for a metal block. The accepted value is 500 kg/m³. The student says \"my method is perfect because I got exactly the right answer.\" Explain why this conclusion may be unjustified. (2 steps)", "answer": "- Step 1: Getting the right answer doesn't prove the method is perfect — there could be compensating errors.\n- Step 2: For example, if the student incorrectly read the mass (too high) but also incorrectly read the volume (too high by the same factor), the errors would cancel, giving the correct density. Additionally, experimental measurements always have uncertainty. A \"perfect\" result suggests the student may have rounded numbers, misinterpreted readings, or has undetected systematic errors. Scientific method requires attention to uncertainty, repeatability, and potential sources of error, not just matching an accepted value.", "source": "MiniMax ②", "_id": "minimax_2_71", "judge_pick": true}, {"question": "Why do double-glazed windows reduce heat loss better than single-glazed windows? (2 steps)", "answer": "- Step 1: Double glazing has two panes of glass with a layer of air (or inert gas) trapped between them.\n- Step 2: Air is a poor conductor, and the vacuum (or gas) between panes eliminates convection currents. Heat loss through conduction and convection across the gap is greatly reduced compared to a single pane. Additionally, the two surfaces can be treated with low-emissivity coatings to reduce radiative heat loss. The overall heat transfer coefficient (U-value) is much lower for double glazing.", "source": "MiniMax ②", "_id": "minimax_2_72", "judge_pick": false}, {"question": "A car radiator uses water as coolant. Explain why antifreeze (which has different thermal properties) is added in winter, and what property is important for the mixture. (2 steps)", "answer": "- Step 1: Pure water freezes at 0°C, which would cause the engine block to crack if the water froze and expanded. Antifreeze lowers the freezing point of the mixture.\n- Step 2: The key property is the freezing point depression — adding a solute (antifreeze) lowers the freezing point below 0°C. This is a colligative property. The mixture also needs good specific heat capacity to carry away engine heat, and low viscosity for good flow. Modern antifreezes are designed to have similar c to water and operate over a wide temperature range without boiling over in summer.", "source": "MiniMax ②", "_id": "minimax_2_73", "judge_pick": false}, {"question": "A solid cube has mass 270 g and density 2.7 g/cm³. What is the length of each side? (2 steps)", "answer": "- Step 1: First find volume: V = m/ρ = 270 g / 2.7 g/cm³ = 100 cm³.\n- Step 2: For a cube, V = s³, so s = ∛100 cm³ ≈ 4.64 cm. Checking: 4.64³ ≈ 100 cm³. This density (2.7 g/cm³ = 2700 kg/m³) is the density of aluminum.", "source": "MiniMax ②", "_id": "minimax_2_74", "judge_pick": false}, {"question": "Why does a cloud form when warm moist air rises and cools? (2 steps)", "answer": "- Step 1: As air rises, it expands due to lower atmospheric pressure. This expansion causes cooling (adiabatic cooling).\n- Step 2: Cooler air has lower capacity to hold water vapor. When the air temperature drops below the dew point, water vapor condenses into tiny liquid droplets (or ice crystals) around condensation nuclei (dust, pollution). Billions of these tiny droplets form the visible cloud. The phase change releases latent heat, which slightly slows the cooling but doesn't prevent cloud formation.", "source": "MiniMax ②", "_id": "minimax_2_75", "judge_pick": false}, {"question": "A thermometer works because liquids expand when heated. Explain why this expansion is proportional to temperature change, using particle theory. (2 steps)", "answer": "- Step 1: When temperature increases, the liquid's particles gain kinetic energy and vibrate more intensely, pushing slightly further apart on average.\n- Step 2: This tiny increase in average particle spacing throughout the liquid volume results in measurable expansion. Over a small temperature range, this expansion is directly proportional to temperature change (linear). The liquid in the thermometer's narrow capillary then rises by an amount proportional to the volume expansion, which is proportional to the temperature change. This is why mercury or alcohol thermometers have nearly linear scales over their operating ranges.", "source": "MiniMax ②", "_id": "minimax_2_76", "judge_pick": false}, {"question": "Why can you sometimes see your breath on a cold day? (2 steps)", "answer": "- Step 1: Your breath is warm and moist, containing water vapor at接近 body temperature and 100% relative humidity.\n- Step 2: When you exhale into cold air, the air cools rapidly. Cold air can hold less water vapor than warm air. Once the air temperature drops below the dew point, the excess water vapor condenses into tiny droplets — this is the visible \"breath.\" The droplets are small enough to remain suspended, forming a cloud. On warmer days, the exhaled air mixes with enough warm air that condensation doesn't occur.", "source": "MiniMax ②", "_id": "minimax_2_77", "judge_pick": false}, {"question": "A teacher says that when ice melts to form water, the mass decreases because the ice shrinks. Explain what's wrong with this statement. (2 steps)", "answer": "- Step 1: The mass does NOT decrease. The number of water molecules is exactly the same before and after melting.\n- Step 2: The volume DOES decrease (ice is less dense than water), which might confuse the student. When ice melts, the crystalline structure collapses — molecules pack closer together, so volume decreases. But mass is always conserved in physical changes. The student is confusing volume change with mass change. 1 kg of ice becomes exactly 1 kg of water — same molecules, same mass, less volume.", "source": "MiniMax ②", "_id": "minimax_2_78", "judge_pick": true}, {"question": "Two objects at the same temperature are placed in contact. Will there be any net heat transfer between them? Explain. (2 steps)", "answer": "- Step 1: No, there will be no net heat transfer.\n- Step 2: Heat transfer occurs only when there's a temperature difference. At equal temperatures, particles in both objects have the same average kinetic energy. Energy transfers in both directions at equal rates during collisions at the interface, so there's no net flow. This is the condition of thermal equilibrium — no net heat transfer despite ongoing molecular interactions.", "source": "MiniMax ②", "_id": "minimax_2_79", "judge_pick": false}, {"question": "Why are thermometers usually made of glass with a narrow capillary tube? (2 steps)", "answer": "- Step 1: The narrow capillary (the stem) provides magnification — a small change in liquid volume produces a large change in the height of the liquid column.\n- Step 2: Glass is a poor conductor, so the thermometer doesn't rapidly equilibrate with the object being measured (minimizing heat loss from the sample). Glass is also transparent, allowing the liquid (alcohol or mercury) to be seen clearly. The narrow bore makes the thermometer sensitive to small temperature changes while the bulb provides enough liquid for measurable expansion.", "source": "MiniMax ②", "_id": "minimax_2_80", "judge_pick": false}, {"question": "Explain why the pressure of a gas in a sealed container increases when the container is shaken. (2 steps)", "answer": "- Step 1: Shaking causes the gas molecules to move faster on average.\n- Step 2: The shaking adds mechanical energy to the gas — you're doing work on the gas by moving the container. This energy transfers to the molecules, increasing their kinetic energy. According to kinetic theory, higher molecular speeds mean more frequent and harder collisions with the container walls, increasing pressure. This is why a sealed container of gas that's been shaken can have slightly higher pressure than one that's been sitting still.", "source": "MiniMax ②", "_id": "minimax_2_81", "judge_pick": false}, {"question": "Why does placing a pot cover on a stove before turning it off help keep food warm? (2 steps)", "answer": "- Step 1: The cover reduces heat loss from the hot food to the surroundings.\n- Step 2: Without a cover, heat is lost primarily by: (1) convection as warm air rises from the surface, (2) evaporation of water from the food's surface (carrying latent heat), and (3) some radiation from the hot surface. The cover traps warm, moist air above the food, reducing convective and evaporative losses. The food's own stored energy keeps it warm longer. The cover also prevents cooler air from circulating over the hot surface.", "source": "MiniMax ②", "_id": "minimax_2_82", "judge_pick": false}, {"question": "A solid sphere has radius 2 cm and density 8 g/cm³. Calculate its mass in kg. (3 steps)", "answer": "- Step 1: Calculate volume: V = (4/3)πr³ = (4/3) × π × (2 cm)³ = (4/3) × π × 8 = (32/3)π ≈ 33.5 cm³.\n- Step 2: Calculate mass: m = ρV = 8 g/cm³ × 33.5 cm³ = 268 g.\n- Step 3: Convert to kg: 268 g = 0.268 kg. This sphere has the density of copper (8.96 g/cm³), so it's likely a copper ball.", "source": "MiniMax ②", "_id": "minimax_2_83", "judge_pick": false}, {"question": "In a vacuum flask, why is the silvered surface on the inside rather than the outside? (2 steps)", "answer": "- Step 1: The silvered surface works by reflecting thermal radiation either direction.\n- Step 2: Whether inside or outside, the shiny surface reflects radiation. The key is that there are TWO silvered surfaces (double-walled). The vacuum between them provides insulation, and both surfaces reflect radiation passing through the vacuum. The actual placement matters less than having the vacuum and reflective surfaces together. Most designs silver both the inner and outer surfaces of the double wall to maximize reflection from either direction.", "source": "MiniMax ②", "_id": "minimax_2_84", "judge_pick": false}, {"question": "Why does a river freeze from the top down, not the bottom up? (2 steps)", "answer": "- Step 1: Ice is less dense than water (about 920 kg/m³ vs 1000 kg/m³).\n- Step 2: As the water cools toward 4°C, it becomes denser and sinks. Below 4°C, water expands as it cools further toward 0°C. At 0°C, the surface water freezes first because it's in contact with cold air. The ice floats because it's less dense than the water below. If ice were denser than water, it would sink, and rivers would freeze from the bottom up, making survival of aquatic life much harder in winter.", "source": "MiniMax ②", "_id": "minimax_2_85", "judge_pick": false}, {"question": "When you take a hot shower, mirrors fog up. Explain why. (2 steps)", "answer": "- Step 1: The hot shower heats the bathroom air and adds water vapor to it.\n- Step 2: This warm, moist air comes into contact with the cool mirror surface. The mirror temperature is below the air's dew point, so water vapor condenses onto the mirror as tiny droplets, creating fog. The fog is most visible on smooth, non-porous surfaces where droplets can form uniformly. The warm, moist air has high relative humidity, and the cold surface triggers condensation.", "source": "MiniMax ②", "_id": "minimax_2_86", "judge_pick": false}, {"question": "Explain why the specific heat capacity of a substance can be measured more accurately using the gradient of an energy-vs-(mΔθ) graph rather than from a single measurement. (2 steps)", "answer": "- Step 1: A single measurement has random errors from every reading (mass, temperature, voltage, current, time).\n- Step 2: By plotting multiple data points and finding the best-fit line, random errors average out. The gradient is calculated from all points collectively, making it more reliable. Additionally, the graph reveals the linear region (after initial warm-up) and lets you exclude non-linear data points. Systematic errors still affect the result, but random error reduction makes the gradient method more precise than any single calculation.", "source": "MiniMax ②", "_id": "minimax_2_87", "judge_pick": true}, {"question": "Why does a helium balloon slowly deflate over time, even if there's no obvious hole? (2 steps)", "answer": "- Step 1: Helium atoms are very small — smaller than the spaces between molecules in the rubber balloon material.\n- Step 2: Over time, helium atoms slowly diffuse through the rubber/wall of the balloon, escaping to the outside air. This is called effusion. The balloon material isn't perfectly impermeable — small atoms like helium can pass through. Larger molecules (like nitrogen or oxygen in air) diffuse much more slowly in the opposite direction, so the balloon gradually loses volume. This is why helium balloons eventually shrink even without visible punctures.", "source": "MiniMax ②", "_id": "minimax_2_88", "judge_pick": true}, {"question": "Why does a microwave oven heat food more quickly than a conventional oven? (2 steps)", "answer": "- Step 1: Microwaves are electromagnetic radiation that penetrates food and excites water molecules directly.\n- Step 2: Microwaves cause water molecules (which are polar) to rotate rapidly, aligning with the alternating electric field. This molecular \"friction\" generates thermal energy throughout the food's interior, not just from the surface. In a conventional oven, heat must first conduct from the hot air to the food surface, then conduct inward — a much slower process. Microwaves heat the entire volume simultaneously, making heating faster.", "source": "MiniMax ②", "_id": "minimax_2_89", "judge_pick": false}, {"question": "A sealed plastic bag of air is placed in a freezer. What happens to the pressure inside the bag? Explain. (2 steps)", "answer": "- Step 1: The pressure decreases.\n- Step 2: When the air cools, the molecules lose kinetic energy, move more slowly, and collide less frequently and less forcefully with the bag walls. Since the bag is flexible (sealed but not rigid), it contracts slightly as the internal pressure drops, but the pressure definitely decreases. This is consistent with p ∝ T at approximately constant volu
