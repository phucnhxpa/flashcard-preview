ggests the student may have rounded numbers, misinterpreted readings, or has undetected systematic errors. Scientific method requires attention to uncertainty, repeatability, and potential sources of error, not just matching an accepted value.", "source": "MiniMax ②", "_id": "minimax_2_71"}, {"question": "A teacher says that when ice melts to form water, the mass decreases because the ice shrinks. Explain what's wrong with this statement. (2 steps)", "answer": "- Step 1: The mass does NOT decrease. The number of water molecules is exactly the same before and after melting.\n- Step 2: The volume DOES decrease (ice is less dense than water), which might confuse the student. When ice melts, the crystalline structure collapses — molecules pack closer together, so volume decreases. But mass is always conserved in physical changes. The student is confusing volume change with mass change. 1 kg of ice becomes exactly 1 kg of water — same molecules, same mass, less volume.", "source": "MiniMax ②", "_id": "minimax_2_78"}, {"question": "Explain why the specific heat capacity of a substance can be measured more accurately using the gradient of an energy-vs-(mΔθ) graph rather than from a single measurement. (2 steps)", "answer": "- Step 1: A single measurement has random errors from every reading (mass, temperature, voltage, current, time).\n- Step 2: By plotting multiple data points and finding the best-fit line, random errors average out. The gradient is calculated from all points collectively, making it more reliable. Additionally, the graph reveals the linear region (after initial warm-up) and lets you exclude non-linear data points. Systematic errors still affect the result, but random error reduction makes the gradient method more precise than any single calculation.", "source": "MiniMax ②", "_id": "minimax_2_87"}, {"question": "Why does a helium balloon slowly deflate over time, even if there's no obvious hole? (2 steps)", "answer": "- Step 1: Helium atoms are very small — smaller than the spaces between molecules in the rubber balloon material.\n- Step 2: Over time, helium atoms slowly diffuse through the rubber/wall of the balloon, escaping to the outside air. This is called effusion. The balloon material isn't perfectly impermeable — small atoms like helium can pass through. Larger molecules (like nitrogen or oxygen in air) diffuse much more slowly in the opposite direction, so the balloon gradually loses volume. This is why helium balloons eventually shrink even without visible punctures.", "source": "MiniMax ②", "_id": "minimax_2_88"}, {"question": "Two objects have the same mass and are made of the same material. One is a solid cube, one is a thin sheet. Will they have the same cooling rate? Explain. (2 steps)", "answer": "- Step 1: No — the sheet will cool faster.\n- Step 2: Cooling rate depends on surface area to volume ratio. The thin sheet has a much larger surface area relative to its mass than the cube. Heat is lost from the surface by radiation, convection, and conduction. More surface area means more area for heat to escape from. The sheet's high surface area-to-volume ratio means it loses heat more quickly per unit mass than the cube, even though they're the same material with the same total mass.", "source": "MiniMax ②", "_id": "minimax_2_95"}, {"question": "A student says that \"coldness\" is transferred from a cold object to a hot object. Explain what's wrong with this idea. (2 steps)", "answer": "- Step 1: Coldness isn't a substance that transfers — it's simply the absence of thermal energy.\n- Step 2: Energy always flows from hot (high kinetic energy) to cold (low kinetic energy). The hot object loses energy, the cold object gains energy. We sometimes say \"cold is transferred\" as shorthand, but technically thermal energy flows from hot to cold. The \"cold feeling\" is our perception of energy leaving our body. Nothing \"cold\" is moving — thermal energy is moving.", "source": "MiniMax ②", "_id": "minimax_2_98"}, {"question": "In Boyle’s Law, why must temperature remain constant? (2 steps)", "answer": "- Step 1: Boyle’s Law ($ p_1 V_1 = p_2 V_2 $) assumes particles move at constant speed (fixed kinetic energy).  \n- Step 2: If temperature rises, particles move faster, increasing pressure independently of volume, violating the inverse relationship.  \n\nPractical example: Pumping air into a tire quickly raises both pressure and temperature temporarily, invalidating Boyle’s Law.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "Why does evaporation cause cooling in the remaining liquid? (2 steps)", "answer": "- Step 1: Faster-moving particles escape during evaporation, leaving slower (cooler) particles behind.  \n- Step 2: This reduces the average kinetic energy (temperature) of the remaining liquid.  \n\nEveryday example: Sweat evaporating cools skin.", "source": "Qwen 3 ②", "_id": "qwen_2_19"}, {"question": "Explain the crucial distinction between density and weight or mass, and why conflating them can lead to misconceptions.", "answer": "The crucial distinction lies in how these properties are defined:\n-   **Mass** is a fundamental property of matter, representing the amount of 'stuff' in an object. It's an intrinsic property and doesn't change with location (e.g., on Earth or the Moon).\n-   **Weight** is the force of gravity acting on an object's mass. It depends on both the object's mass and the gravitational field strength of its location. An object's weight would be different on the Moon compared to Earth, even though its mass remains the same.\n-   **Density**, as discussed, is mass *per unit volume* ($$\\rho = m/V$$). It's a measure of concentration of mass.\n\n**Why conflating them is a misconception:**\nImagine a small lead pellet and a large wooden log.\n+   The lead pellet has a very high density because a lot of mass is packed into a tiny volume.\n+   The wooden log, despite being much larger in volume, has a relatively low density because its mass is spread out over that large volume.\nIf we only consider \"weight\" or \"mass\" in isolation:\n+   A large log might have a greater *total mass* and *total weight* than a small lead pellet. If you just asked, \"Which is heavier?\", the log would likely win.\n+   However, the lead pellet is *denser* than the log. This means if you took equal volumes of lead and wood, the lead would be significantly more massive (and therefore heavier).\nThe misconception arises when people say something is \"heavy\" when they actually mean \"dense,\" or vice-versa. For instance, saying \"lead is heavier than wood\" is ambiguous; it's more accurate to say \"lead is denser than wood,\" because a small piece of lead might be lighter than a large piece of wood. Density helps us understand why a small pebble sinks while a huge ship floats (due to its average density, including air, being less than water).", "source": "Gemini Flash ②", "_id": "gflash_2_1"}, {"question": "Explain the principle of mass conservation during changes of state. Why might a beaker of water left open appear to \"lose mass\" over time, and how does this relate to mass conservation? (2 steps)", "answer": "- Step 1: **Mass Conservation During State Changes**\n    The principle of mass conservation states that **mass is neither created nor destroyed** during a physical or chemical change within a closed system. During a change of state (like melting, boiling, freezing, or condensing), the substance merely changes its physical form; the number of particles (atoms or molecules) that make up the substance remains constant.\n    +   For example, when ice melts into water, the water molecules are still the same molecules; they have just rearranged their spacing and motion. No molecules are lost or gained, so the total mass of the water substance remains unchanged.\n    +   This applies to all changes of state: the total mass of the substance before the change is equal to the total mass of the substance after the change.\n- Step 2: **Apparent Mass Loss and its Relation to Conservation**\n    If a beaker of water is left open to the air, it will appear to \"lose mass\" over time. This is due to **evaporation**.\n    +   During evaporation, some water molecules at the surface gain enough kinetic energy to overcome the intermolecular forces holding them in the liquid and escape into the surrounding air as water vapor (a gas).\n    +   This \"loss of mass\" from the beaker is not a violation of the law of mass conservation. Instead, it indicates that the water molecules have physically left the system (the beaker) and dispersed into the larger system (the room's atmosphere). The total mass of water molecules in the *entire room* (liquid in beaker + vapor in air) would remain conserved.\n    +   If the beaker were sealed, preventing the vapor from escaping, the total mass of the sealed system would remain constant, even as water evaporates and condenses within it.", "source": "Gemini Flash ②", "_id": "gflash_2_13"}, {"question": "Define \"internal energy\" of a system in terms of its constituent particles. What are the two main forms of energy that contribute to internal energy, and how do they differ? Provide a misconception probe regarding internal energy and temperature. (3 steps)", "answer": "- Step 1: **Definition of Internal Energy**\n    The **internal energy** of a system is the total energy stored by the particles (atoms or molecules) that make up the system. It encompasses all the energy associated with the microscopic components of a substance.\n- Step 2: **Components of Internal Energy**\n    Internal energy is the sum of two main forms of energy at the particle level:\n    +   **Kinetic Energy (KE) of Particles:** This is the energy associated with the random motion or vibration of the particles. In solids, particles vibrate; in liquids and gases, they move and translate. The average kinetic energy of the particles is directly proportional to the absolute temperature of the substance.\n    +   **Potential Energy (PE) of Particles:** This is the energy associated with the positions of the particles relative to each other, due to the intermolecular forces between them. When particles are far apart (like in a gas) or when bonds are stretched/broken (like during melting or boiling), their potential energy is higher. It reflects the energy stored in the bonds and spacing between particles.\n- Step 3: **Misconception Probe: Internal Energy vs. Temperature**\n    **Misconception:** Internal energy is often confused with temperature, but they are not the same.\n    +   **Temperature** is a measure of the *average kinetic energy* of the particles. When a substance's temperature rises, its particles move or vibrate faster, increasing their average kinetic energy.\n    +   **Internal energy** is the *total* energy (KE + PE). During a **change of state** (e.g., melting ice into water), energy is supplied to the substance, increasing its internal energy. However, the temperature remains constant during this phase change. This is because the supplied energy is primarily used to increase the *potential energy* of the particles (by breaking bonds and increasing their spacing) rather than increasing their average kinetic energy (which would raise the temperature). So, internal energy can increase while temperature stays constant.", "source": "Gemini Flash ②", "_id": "gflash_2_14"}, {"question": "Explain, at the particle level, how the kinetic energy of particles relates to the macroscopic property of temperature. (2 steps)", "answer": "- Step 1: **Definition of Kinetic Energy at Particle Level**\n    At the particle level, kinetic energy refers to the energy possessed by individual atoms or molecules due to their motion. In solids, this motion is primarily vibration about fixed positions. In liquids and gases, particles also undergo translational (moving from one place to another) and rotational motion, in addition to vibration. This motion is random and continuous.\n- Step 2: **Connection to Macroscopic Temperature**\n    The **temperature** of a substance is a direct macroscopic measure of the *average kinetic energy* of its constituent particles.\n    +   When a substance is heated, the energy supplied is absorbed by the particles, causing them to move or vibrate more vigorously and at higher speeds. This increases their average kinetic energy.\n    +   Consequently, an increase in the average kinetic energy of the particles is observed as a rise in the substance's temperature.\n    +   Conversely, when a substance cools, its particles lose kinetic energy, their motion becomes less vigorous, and the average kinetic energy decreases, leading to a drop in temperature.\n    Therefore, temperature is essentially a quantitative indicator of how much the particles in a substance are moving or vibrating.", "source": "Gemini Flash ②", "_id": "gflash_2_15"}, {"question": "Explain how the potential energy of particles changes during a change of state, such as melting or boiling. Why doesn't this change in potential energy directly affect the substance's temperature? (3 steps)", "answer": "- Step 1: **Potential Energy and Intermolecular Forces**\n    Potential energy at the particle level is associated with the relative positions of particles and the intermolecular forces (bonds) between them. When particles are close together and strongly attracted (like in a solid), their potential energy is relatively low (or more negative, depending on the reference point). To move particles further apart or break these bonds, energy must be supplied, which increases their potential energy.\n- Step 2: **Change in Potential Energy During State Changes**\n    +   **Melting (Solid $$\\rightarrow$$ Liquid):** When a solid melts, energy is supplied to it. This energy is used to weaken or partially break the strong, fixed bonds holding particles in their lattice positions. The particles move slightly further apart and gain the ability to slide past each other. This process increases the **potential energy** of the particles without significantly increasing their average kinetic energy.\n    +   **Boiling/Vaporisation (Liquid $$\\rightarrow$$ Gas):** When a liquid boils or vaporises, even more energy is supplied. This energy is used to completely overcome the remaining intermolecular forces, allowing the particles to separate widely and move independently in the gaseous state. This significantly increases the **potential energy** of the particles as they move much further apart from each other.\n- Step 3: **Why Temperature Remains Constant**\n    During a change of state, the **temperature remains constant** even though energy is being continuously supplied (and thus internal energy is increasing). This is because the supplied energy is *not* increasing the average kinetic energy of the particles. Instead, the energy is primarily being converted into **potential energy**.\n    +   The added energy is dedicated to rearranging the particles, breaking or weakening intermolecular bonds, and increasing the average spacing between them. This structural change requires energy, but it doesn't make the particles vibrate or move faster on average, which is what temperature measures. Once the state change is complete, any further supplied energy will then go into increasing the kinetic energy of the particles, causing the temperature to rise again.", "source": "Gemini Flash ②", "_id": "gflash_2_16"}, {"question": "Imagine you have a substance of mass $$m$$. If you supply a small amount of energy $$\\Delta Q$$ to it, its temperature increases by a tiny amount $$\\Delta\\theta$$. Using the concept of specific heat capacity, intuitively derive the relationship $$\\Delta Q = mc\\Delta\\theta$$. (3 steps)", "answer": "- Step 1: **Relating Energy to Temperature Change (for a fixed mass)**\n    Let's consider a fixed mass $$m$$ of a substance. If we add thermal energy to it, its temperature will rise. Intuitively, the more energy we add, the greater the temperature change will be. So, we can say:\n    $$ \\Delta Q \\propto \\Delta\\theta $$\n    This means if you double the energy, you'd expect to double the temperature rise (assuming nothing else changes).\n- Step 2: **Relating Energy to Mass (for a fixed temperature change)**\n    Now, let's consider changing the mass of the substance while keeping the desired temperature change $$\\Delta\\theta$$ constant. If you have twice the mass of the same substance, you would intuitively need twice the amount of energy to achieve the same temperature rise. For example, boiling a large pot of water takes more energy than boiling a small cup. So:\n    $$ \\Delta Q \\propto m $$\n- Step 3: **Introducing Specific Heat Capacity ($$c$$) as the Proportionality Constant**\n    Combining the two proportionalities, we get:\n    $$ \\Delta Q \\propto m \\Delta\\theta $$\n    This proportionality holds for any substance. However, different substances require different amounts of energy to change their temperature. For example, heating water takes more energy than heating the same mass of iron for the same temperature rise.\n    To turn this proportionality into an equality, we introduce a constant that is specific to the material itself. This constant is the **specific heat capacity ($$c$$)**. It represents the \"energy-per-unit-mass-per-unit-temperature-change\" characteristic of the substance.\n    So, the relationship becomes:\n    $$ \\Delta Q = mc\\Delta\\theta $$\n    Here, $$c$$ acts as the constant of proportionality, quantifying how \"stubborn\" a material is to temperature changes.", "source": "Gemini Flash ②", "_id": "gflash_2_22"}, {"question": "A small, insulated container holds $$0.1 \\text{ kg}$$ of ice at $$-10^\\circ\\text{C}$$. If you supply $$40,000 \\text{ J}$$ of thermal energy to this ice, conceptually describe what will happen to the ice and water, without doing exact calculations. Use the following values:\n*   $$c_{\\text{ice}} = 2100 \\text{ J/kg}^\\circ\\text{C}$$\n*   $$L_f = 330,000 \\text{ J/kg}$$\n*   $$c_{\\text{water}} = 4200 \\text{ J/kg}^\\circ\\text{C}$$ (4 steps)", "answer": "- Step 1: **Energy to Warm the Ice to its Melting Point**\n    First, the supplied energy will be used to raise the temperature of the ice from $$-10^\\circ\\text{C}$$ to its melting point, $$0^\\circ\\text{C}$$.\n    +   The temperature change needed is $$\\Delta\\theta = 0^\\circ\\text{C} - (-10^\\circ\\text{C}) = 10^\\circ\\text{C}$$.\n    +   Energy required for this phase: $$Q_{\\text{ice_warm}} = m c_{\\text{ice}} \\Delta\\theta = (0.1 \\text{ kg}) \\times (2100 \\text{ J/kg}^\\circ\\text{C}) \\times (10^\\circ\\text{C}) = 2100 \\text{ J}$$.\n    +   After this, the ice is at $$0^\\circ\\text{C}$$, and we have $$40,000 \\text{ J} - 2100 \\text{ J} = 37,900 \\text{ J}$$ remaining.\n- Step 2: **Energy to Melt the Ice at $$0^\\circ\\text{C}$$**\n    Next, the remaining energy will be used to melt the ice at $$0^\\circ\\text{C}$$ into water at $$0^\\circ\\text{C}$$.\n    +   The total energy required to melt all $$0.1 \\text{ kg}$$ of ice is $$Q_{\\text{melt_total}} = m L_f = (0.1 \\text{ kg}) \\times (330,000 \\text{ J/kg}) = 33,000 \\text{ J}$$.\n    +   Since we have $$37,900 \\text{ J}$$ remaining, which is more than $$33,000 \\text{ J}$$, all the ice will melt.\n    +   After melting, we have $$37,900 \\text{ J} - 33,000 \\text{ J} = 4900 \\text{ J}$$ remaining. All the substance is now $$0.1 \\text{ kg}$$ of water at $$0^\\circ\\text{C}$$.\n- Step 3: **Energy to Warm the Water**\n    The final remaining energy will be used to raise the temperature of the now-liquid water from $$0^\\circ\\text{C}$$.\n    +   We have $$4900 \\text{ J}$$ to warm $$0.1 \\text{ kg}$$ of water (with $$c_{\\text{water}} = 4200 \\text{ J/kg}^\\circ\\text{C}$$).\n    +   The temperature rise will be $$\\Delta\\theta_{\\text{water_warm}} = \\frac{Q_{\\text{remaining}}}{m c_{\\text{water}}} = \\frac{4900 \\text{ J}}{(0.1 \\text{ kg}) \\times (4200 \\text{ J/kg}^\\circ\\text{C})} = \\frac{4900}{420} \\approx 11.67^\\circ\\text{C}$$.\n- Step 4: **Conclusion**\n    Initially, the $$40,000 \\text{ J}$$ of energy will first warm the ice from $$-10^\\circ\\text{C}$$ to $$0^\\circ\\text{C}$$. Then, it will completely melt all the ice into water at $$0^\\circ\\text{C}$$. Finally, the remaining energy will warm the resulting $$0.1 \\text{ kg}$$ of liquid water from $$0^\\circ\\text{C}$$ to approximately $$11.7^\\circ\\text{C}$$.\n    The final state of the substance will be $$0.1 \\text{ kg}$$ of water at roughly $$11.7^\\circ\\text{C}$$.", "source": "Gemini Flash ②", "_id": "gflash_2_32"}, {"question": "Explain Brownian motion, what is observed, and how it serves as direct evidence for the existence and random motion of particles in a fluid. Include a common misconception. (3 steps)", "answer": "- Step 1: **Observation of Brownian Motion**\n    Brownian motion is the random, zig-zag movement of microscopic particles (like smoke particles or pollen grains) suspended in a fluid (a liquid or a gas). When observed under a microscope, these visible particles are seen to move erratically, changing direction suddenly and unpredictably.\n- Step 2: **Explanation at the Particle Level**\n    This seemingly spontaneous motion is not due to the visible particles themselves being alive or having internal propulsion. Instead, it is caused by the invisible, much smaller, and constantly moving molecules of the fluid (air or water) **colliding randomly and unevenly** with the larger suspended particles.\n    +   The fluid molecules are in continuous, rapid, and random motion (as predicted by the kinetic theory of gases/liquids).\n    +   When many fluid molecules strike a suspended particle from one side, they impart a net force that pushes it in that direction.\n    +   Because the collisions are random and occurring from all sides, the net force on the particle changes continuously in magnitude and direction, leading to its characteristic zig-zag path.\n- Step 3: **Evidence for Particles and Misconception**\n    +   **Evidence:** Brownian motion provides compelling, direct visual evidence that:\n        1.  Matter is made of tiny, discrete particles (molecules).\n        2.  These particles are in constant, random motion, even when the fluid appears still.\n        3.  These particles have kinetic energy and exert forces.\n    +   **Misconception Probe:** A common misconception is that Brownian motion is the *motion of the fluid molecules themselves*. This is incorrect. Brownian motion is the *visible effect* of the much smaller, invisible fluid molecules colliding with the larger, visible suspended particles. The fluid molecules are moving too fast and are too small to be seen directly.", "source": "Gemini Flash ②", "_id": "gflash_2_33"}, {"question": "Intuitively derive Boyle's Law ($$pV = \\text{constant}$$) from the particle model of a gas, focusing on how pressure changes with volume at constant temperature. (3 steps)", "answer": "- Step 1: **Pressure from Particle Collisions**\n    Recall from the particle model that gas pressure arises from the continuous collisions of countless gas particles with the walls of their container. Each collision exerts a tiny force, and the sum of these forces over the container's area gives the macroscopic pressure ($$p = F/A$$). The magnitude of this force depends on two main factors:\n    +   The **frequency** of collisions (how often particles hit the walls).\n    +   The **force/momentum change** per collision (how hard particles hit the walls).\n- Step 2: **Effect of Constant Temperature**\n    Boyle's Law is valid only at **constant temperature**. This is a crucial condition because temperature is a measure of the average kinetic energy of the gas particles. If the temperature is constant, it means:\n    +   The **average speed** of the gas particles remains constant.\n    +   Therefore, the **force/momentum change per collision** (how hard particles hit the walls) remains constant.\n    So, any change in pressure must be primarily due to a change in the *frequency* of collisions.\n- Step 3: **Deriving Inverse Proportionality with Volume**\n    Now, consider what happens if we change the volume ($$V$$) of the container while keeping temperature and mass constant:\n    +   **If Volume Decreases:** When the volume of the container is reduced (e.g., by pushing a piston), the same number of particles are now confined to a smaller space. With their speeds unchanged, the particles will encounter the container walls much more frequently. This **increased collision frequency** directly leads to a greater total force on the walls over the same area, hence an **increase in pressure**.\n    +   **If Volume Increases:** When the volume of the container is increased, the same particles have more space to travel. They will take longer to reach the walls, so the **collision frequency will decrease**. This reduced collision frequency results in a smaller total force on the walls, hence a **decrease in pressure**.\n    This intuitive explanation shows that if volume goes down, pressure goes up, and vice-versa, in an inversely proportional manner. Since the 'collision force' (due to particle speed) is constant, and collision frequency is inversely related to the space available (volume), the product of pressure and volume ($$pV$$) must remain constant.", "source": "Gemini Flash ②", "_id": "gflash_2_39"}, {"question": "For a fixed mass of gas held at a constant pressure, describe the qualitative relationship between its temperature and volume. (2 steps)", "answer": "- Step 1: **Qualitative Relationship (Direct Proportionality)**\n    For a fixed mass of gas held at a constant pressure, its volume is **directly proportional** to its absolute temperature (in Kelvin).\n    +   This means if you increase the temperature of the gas, its volume will increase.\n    +   Conversely, if you decrease the temperature of the gas, its volume will decrease.\n- Step 2: **Particle Model Explanation**\n    Imagine a gas in a cylinder with a movable piston, where the external pressure on the piston is kept constant (e.g., by atmospheric pressure).\n    +   If you **increase the temperature** of the gas, the particles gain kinetic energy and move faster. They would naturally want to hit the walls (and the piston) more frequently and forcefully, which would tend to increase the pressure.\n    +   However, since the pressure is being kept constant, the only way for the gas to maintain the same internal pressure while its particles are moving faster is for the **volume of the container to increase**. This larger volume means the particles have to travel further between collisions, reducing the collision frequency just enough to compensate for the increased force per collision, thus keeping the overall pressure constant.\n    +   Conversely, if you **decrease the temperature**, particles move slower, reducing collision frequency and force. To maintain constant pressure, the **volume must decrease** so that particles hit the walls more often in the smaller space.\n    This explains why hot air balloons rise (hot air expands, becomes less dense), or why a deflated balloon expands if brought into a warm room.", "source": "Gemini Flash ②", "_id": "gflash_2_42"}, {"question": "Explain what happens when a gas expands and does work on its surroundings. How does this affect its internal energy and temperature? Provide a real-world example. (3 steps)", "answer": "- Step 1: **Gas Expanding and Doing Work**\n    When a gas expands, it pushes against its surroundings (e.g., pushing a piston outwards, or expanding into a larger volume). In doing so, the gas exerts a force over a distance, meaning the **gas itself does work on the surroundings**. This is the opposite of work being done *on* the gas.\n    +   At the particle level, when gas particles collide with a receding boundary (like a piston moving outwards), they rebound with reduced speed, losing some of their kinetic energy.\n- Step 2: **Effect on Internal Energy and Temperature**\n    +   **Internal Energy:** Because the gas particles lose kinetic energy as they do work on the surroundings, the **total internal energy** of the gas decreases.\n    +   **Temperature:** Since the average kinetic energy of the gas particles decreases, the macroscopic **temperature of the gas falls**. This is known as adiabatic expansion (if no heat is exchanged with the surroundings during the process).\n- Step 3: **Real-World Example**\n    A common example is seen with **aerosol cans** or **compressed gas cylinders** (e.g., for CO$_2$ or propane).\n    +   When you spray an aerosol can or release gas from a CO$_2$ fire extinguisher, the highly compressed gas rapidly expands as it leaves the nozzle.\n    +   As the gas expands, it does work on the surrounding air and pushes it aside. In doing this work, the gas loses internal energy.\n    +   Consequently, the gas (and often the nozzle or cylinder itself) becomes noticeably cold, sometimes even forming frost or dry ice (solid CO$_2$) due to the significant drop in temperature.", "source": "Gemini Flash ②", "_id": "gflash_2_44"}, {"question": "Density is defined as mass per unit volume, not weight per unit volume. Why does this distinction matter — what would go wrong if we defined density using weight instead of mass? (2 steps)", "answer": "- Step 1: Weight is the gravitational force on an object, $$W = mg$$, which depends on the local gravitational field strength $$g$$. If density were defined as weight per unit volume, the same lump of iron would have a different \"density\" on the Moon versus on Earth, even though the material itself hasn't changed at all.\n- Step 2: Mass is an intrinsic property of the material — the amount of matter present — and does not change with location. Defining density as $$\\rho = m/V$$ ensures that density is a property of the *substance*, not of where you happen to measure it. This makes density values universally comparable and useful for identifying materials.\n\nDensity tells you how tightly packed the matter is — that should not depend on which planet you're standing on.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A student says \"gold is heavier than wood, so gold is denser.\" What is the conceptual flaw in this reasoning, and how would you correct it? (2 steps)", "answer": "- Step 1: \"Heavier\" compares weight (or mass) alone, without accounting for volume. A 1-tonne log of wood is heavier than a 1-gram gold ring, yet gold is far denser. The flaw is conflating mass with density — density requires *both* mass *and* volume in the ratio $$\\rho = m/V$$.\n- Step 2: The correct statement is: for any given volume, gold has more mass packed into it than wood. Equivalently, gold has more mass per unit volume. A $$1\\text{ cm}^3$$ block of gold (~19.3 g) has far more mass than a $$1\\text{ cm}^3$$ block of wood (~0.5 g). Density is the ratio, not the raw mass.\n\nHeaviness depends on how much stuff you have; density depends on how tightly that stuff is packed.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Solids and liquids have very similar, high densities. Gases have densities roughly 1000 times lower. Explain this using the particle model — what exactly about particle spacing causes this factor of ~1000? (3 steps)", "answer": "- Step 1: In solids and liquids, particles are essentially touching — packed tightly with almost no empty space between them. Adding a tiny bit of extra space (liquid particles can slide) doesn't significantly change the average spacing, so densities remain similar.\n- Step 2: In a gas, particles are widely separated. The typical spacing between gas molecules is about 10 times the particle diameter in *each* direction. Volume goes as the cube of spacing: if particles are 10× further apart linearly, the volume per particle is roughly $$10^3 = 1000$$ times larger.\n- Step 3: Since density is mass per volume and each particle's mass is the same regardless of state, a volume that is ~1000× larger per particle means the density is ~1/1000 as large. For example, water: $$\\rho_{\\text{liquid}} \\approx 1000\\text{ kg/m}^3$$, steam: $$\\rho_{\\text{gas}} \\approx 0.6\\text{ kg/m}^3$$ — roughly three orders of magnitude less.\n\nThe ~1000× factor is a consequence of cubic scaling: linear spacing increases by ~10×, so volume (and thus the inverse of density) increases by ~10³.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A student claims \"liquids are less dense than solids because there are gaps between the liquid particles.\" Why is this wrong? (2 steps)", "answer": "- Step 1: In the particle model, there are *no* empty gaps between particles in a liquid. The particles in a liquid are touching, just as in a solid. The difference is that liquid particles have no fixed arrangement — they can slide past each other — but they are still closely packed.\n- Step 2: This is why liquids and solids have very similar densities. Water is a notable *exception* (ice is slightly less dense than liquid water) — but this is due to the open crystalline structure of ice forming hydrogen bonds that hold molecules further apart, not due to \"gaps\" in the liquid. For most substances, the solid is slightly denser, but the difference is small.\n\nLiquids flow not because there's empty space between particles, but because particles can move *past* each other while remaining in contact.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "To find the density of an irregular stone, you use a eureka (displacement) can. Explain the principle: why does the volume of water that overflows equal the volume of the stone? (2 steps)", "answer": "- Step 1: The eureka can is filled with water exactly to the level of the spout. When the stone is fully submerged, it displaces water — it pushes aside a volume of water equal to the volume it occupies. This displaced water has nowhere to go but out through the spout.\n- Step 2: By conservation of volume, the stone takes up space that was previously occupied by water, so the water that overflows must have the same volume as the submerged portion of the stone. If the stone is fully submerged, $$V_{\\text{water displaced}} = V_{\\text{stone}}$$. You collect and measure this overflow in a measuring cylinder.\n\nThis works because water is incompressible and the can was initially full — any added volume forces an equal volume out.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "When using the eureka can to measure an irregular object's volume, two common errors are (a) dropping the object in and (b) not filling the can exactly to the spout. Explain how each error affects the measured volume. (2 steps)", "answer": "- Step 1: Dropping the object causes splashing — some water flies out of the can or spout that is *not* due to displacement. This means you collect more water than the true volume, so your measured volume is *too large*, and your calculated density ($$\\rho = m/V$$) is *too low*.\n- Step 2: Not filling the can exactly to the spout means some water must first fill the gap before any overflow begins. The object displaces water, but some of that water stays inside the can rather than flowing out. You collect *less* water than the true volume, so your measured volume is *too small*, and your calculated density is *too high*.\n\nLower the object gently; fill the can until water just begins to drip from the spout, then wait for dripping to stop before inserting the object.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "A beaker of ice is heated until it melts completely into water. A student notices the mass reading on the balance doesn't change during melting. Why is mass conserved during a change of state, and when *would* the mass reading change? (2 steps)", "answer": "- Step 1: During melting, the particles change their arrangement (from fixed positions to sliding past each other) and gain potential energy — but no particles are created or destroyed. The total number of molecules is identical before and after, so the total mass is the same. This is conservation of mass.\n- Step 2: The mass reading *would* change if molecules physically leave the beaker. For example, if water evaporates over time, water molecules escape as gas into the air, reducing the mass in the beaker. The key distinction: melting/boiling *within a closed container* conserves mass perfectly; evaporation into open air involves mass *leaving* the system, not mass being destroyed.\n\nMass is conserved during state changes because the particles themselves don't appear or vanish — they just rearrange.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "A student says \"during boiling, the temperature doesn't change because no energy is being supplied.\" Why is this incorrect, and what is the correct explanation? (2 steps)", "answer": "- Step 1: Energy *is* being supplied continuously during boiling — the heater is still on. If no energy were supplied, boiling would stop. The error is assuming \"no temperature change = no energy input.\"\n- Step 2: The correct explanation: all the energy supplied during boiling goes into overcoming intermolecular forces (increasing potential energy) so that particles can escape from the liquid surface as gas. None of the energy goes into increasing kinetic energy, so the temperature remains constant. The energy is there — it's just being used for bond-breaking rather than speeding up particles.\n\nThe plateau on a heating curve doesn't mean the heater is off — it means the energy has a different job to do.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "Specific heat capacity ($$c$$) and specific latent heat ($$L$$) are both about energy and substances, but they apply in different situations. What is the key distinction between when you use each one? (2 steps)", "answer": "- Step 1: Specific heat capacity ($$c$$) applies when a substance changes *temperature* while staying in the *same state*. The formula is $$\\Delta Q = mc\\Delta\\theta$$ — you need a temperature change $$\\Delta\\theta$$. Example: heating water from 20°C to 80°C.\n- Step 2: Specific latent heat ($$L$$) applies when a substance changes *state* with *no* temperature change. The formula is $$Q = mL$$ — there is no $$\\Delta\\theta$$ term. Example: melting ice at 0°C into water at 0°C. The energy goes entirely into breaking or forming bonds, not into changing particle speeds.\n\nIf the temperature is changing → use $$c$$. If the state is changing (at constant temperature) → use $$L$$. A full heating problem may require *both* equations at different stages.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "You have 2 kg of water at 20°C and want to heat it to 80°C. The specific heat capacity of water is 4200 J/kg°C. Without doing the full calculation, estimate the order of magnitude of energy required. (2 steps)", "answer": "- Step 1: The formula is $$\\Delta Q = mc\\Delta\\theta$$. Identify the values: $$m = 2\\text{ kg}$$, $$c = 4200\\text{ J/kg°C}$$, $$\\Delta\\theta = 80 - 20 = 60\\text{°C}$$. For a quick estimate, round: $$c \\approx 4000$$, $$\\Delta\\theta \\approx 60$$.\n- Step 2: $$\\Delta Q \\approx 2 \\times 4000 \\times 60 = 2 \\times 240000 = 480000\\text{ J} \\approx 5 \\times 10^5\\text{ J}$$, which is roughly 500 kJ. The exact answer is $$2 \\times 4200 \\times 60 = 504000\\text{ J}$$. The order of magnitude is $$10^5\\text{ J}$$ — hundreds of kilojoules.\n\nFor mental estimation: mass × ~4000 × temperature change. A 2 kg kettle boiling from room temperature needs hundreds of kJ — which is why kettles are high-power devices (~2–3 kW running for a couple of minutes).", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "You have 0.5 kg of ice at 0°C and want to melt it completely (no temperature change). The specific latent heat of fusion of water is 330 kJ/kg. Estimate the energy required. (2 steps)", "answer": "- Step 1: The formula is $$Q = mL_f$$. Here $$m = 0.5\\text{ kg}$$ and $$L_f = 330\\text{ kJ/kg} = 330000\\text{ J/kg}$$.\n- Step 2: $$Q = 0.5 \\times 330000 = 165000\\text{ J} = 165\\text{ kJ}$$. Roughly 170 kJ to melt half a kilogram of ice at 0°C into water at 0°C — with no temperature change at all.\n\nNote: melting 0.5 kg of ice takes ~165 kJ. Compare with heating 0.5 kg of water by 80°C: $$0.5 \\times 4200 \\times 80 = 168\\text{ kJ}$$. Roughly the same energy — but one changes state, the other changes temperature. This shows how large latent heat values really are.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Thermal insulation slows heat transfer but does not stop it. Explain why, using the three mechanisms of heat transfer (conduction, convection, radiation) and how insulation addresses each. (3 steps)", "answer": "- Step 1: Conduction — heat transfers through a material when vibrating particles pass energy to neighbours. Insulators are poor conductors because they lack free electrons and have particles that are far apart. Trapped air in insulation is particularly effective because air molecules are widely spaced, making energy transfer by collision very slow.\n- Step 2: Convection — hot fluid expands, becomes less dense, and rises; cool fluid sinks, creating a circulation that transfers heat rapidly. Trapped air in insulation *cannot* convect because the air pockets are too small and enclosed — the air can't circulate, so convection is blocked.\n- Step 3: Radiation — infrared radiation transfers heat through empty space (no medium needed). Shiny/reflective surfaces reduce radiation by reflecting infrared back rather than absorbing/emitting it. Insulation with foil layers addresses this mechanism.\n\nInsulation is a multi-layered defence: trapped air stops conduction and convection; reflective surfaces reduce radiation. But none of these mechanisms is perfectly eliminated — heat still transfers, just more slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "A student wraps a beaker of hot water in cotton wool and says \"the cotton wool stops the heat escaping.\" Why is the word \"stops\" wrong? (2 steps)", "answer": "- Step 1: Cotton wool is a good insulator because it contains a lot of trapped air, which is a poor conductor and can't convect in small pockets. This *slows down* the rate of heat loss significantly compared to an uninsulated beaker.\n- Step 2: However, heat still transfers through the insulation — just more slowly. There is no perfect insulator. Over time, the water will still cool to room temperature (thermal equilibrium). The cotton wool increases the *time* this takes, but doesn't prevent it. \"Stops\" implies zero heat transfer, which is impossible for any real material.\n\nInsulation reduces the *rate* of heat transfer, not the *existence* of heat transfer. Think of it as a brake, not a wall.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "A student observes Brownian motion in smoke cells and says \"the smoke particles are the molecules of air moving randomly.\" What is the misconception, and how would you correct it? (2 steps)", "answer": "- Step 1: The smoke particles are *not* the air molecules. Smoke particles are much larger — they are visible under a microscope. Air molecules (N₂, O₂) are far too small to see even with a microscope. The student is confusing the visible particle with the invisible molecules.\n- Step 2: The correct explanation: the *air molecules* are the invisible, fast-moving particles that bombard the visible *smoke particles* from all sides. The random imbalance of these collisions causes the smoke particle to jitter. We see the smoke's zig-zag path; we infer the air molecules' existence and random motion from it.\n\nBrownian motion is evidence *of* molecular motion, not a direct observation *of* it. The smoke is the victim of the bombardment, not the bombarder.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Absolute zero is defined as −273°C or 0 K. Explain what absolute zero means at the particle level, and why it is impossible to reach a temperature below it. (2 steps)", "answer": "- Step 1: At absolute zero, particles have *zero kinetic energy* — they are completely motionless. No vibration, no translation, no rotation. Since temperature is defined by average kinetic energy, zero kinetic energy means zero temperature. This is the theoretical minimum.\n- Step 2: You cannot go below absolute zero because you cannot have *negative* kinetic energy. Kinetic energy is $$\\frac{1}{2}mv^2$$, which is always ≥ 0. If particles are already stationary (zero KE), there is no way to \"remove more energy\" — there's nothing left to remove. It's the floor, not just a very low value.\n\nAbsolute zero is not \"very cold\" — it is the fundamental lower bound imposed by the definition of kinetic energy as a squared quantity.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "A sealed container of gas is heated. Explain what happens to the pressure, and why you cannot use Boyle's Law to analyse this situation. (2 steps)", "answer": "- Step 1: Heating a sealed container increases the gas temperature. The molecules move faster, hitting the walls harder and more frequently, so the pressure increases. The volume is constant (rigid container), so this is a constant-volume process, not a constant-temperature process.\n- Step 2: Boyle's Law requires *constant temperature*, but here temperature is changing. Boyle's Law says $$pV = \\text{constant}$$ only when $$T$$ is fixed. In this situation, both $$p$$ and $$T$$ are changing while $$V$$ is fixed — the relationship is $$p \\propto T$$ (at constant volume), not $$p \\propto 1/V$$.\n\nBoyle's Law is the wrong tool here because the condition (constant T) is violated. Instead, use the qualitative relationship: constant volume + higher temperature → higher pressure.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "In the density practical for an irregular object, why must you measure the mass *before* placing the object in water, rather than after? (2 steps)", "answer": "- Step 1: You must measure the dry mass first because after submerging the object in water, it may retain water on its surface or absorb water into pores/cracks. This adds extra mass that is not part of the object itself.\n- Step 2: If you measure mass after the water displacement, the wet object will have a higher mass reading. Using this inflated mass in $$\\rho = m/V$$ would give a density that is *too high* — you'd be dividing the mass of \"object + water\" by the volume of just the object.\n\nAlways: mass first (dry), then volume (wet). The order matters because water sticks.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "The electrical energy equation $$E = VIt$$ is used in the SHC practical to determine energy supplied by the heater. If you record time in minutes instead of seconds, what happens to your calculated value of $$c$$? (3 steps)", "answer": "- Step 1: The formula requires time in seconds. If you accidentally use time in minutes (e.g., 5 minutes as \"5\" instead of 300 seconds), the calculated energy $$E = VIt$$ will be 60 times too small.\n- Step 2: A smaller energy value means you think less energy was needed to achieve the same temperature rise. When you calculate $$c = \\frac{E}{m\\Delta\\theta}$$, using an energy that is 60× too small gives a specific heat capacity that is 60× too small.\n- Step 3: For example, if the true $$c$$ of water is 4200 J/kg°C, your incorrect calculation might give ~70 J/kg°C — a wildly wrong answer that should immediately signal an error. Always convert minutes to seconds (multiply by 60).\n\nTime in seconds, always. Minutes × 60 = seconds. This is the single most common unit error in this practical.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "On a heating curve, the plateaus for melting and boiling have different lengths (the boiling plateau is longer for the same mass). What does the relative length of each plateau tell you, and why is the boiling plateau longer? (2 steps)", "answer": "- Step 1: The length of a plateau on a temperature-time graph (with constant power input) corresponds to the amount of energy required for that state change. A longer plateau means more energy is needed. Since power is constant, energy is proportional to time.\n- Step 2: The boiling plateau is longer because the specific latent heat of vaporisation ($$L_v$$) is much larger than the specific latent heat of fusion ($$L_f$$). For water, $$L_v = 2.26\\text{ MJ/kg}$$ vs $$L_f = 330\\text{ kJ/kg}$$ — about 7× more energy per kg. With the same heating power, it takes ~7× longer to boil off a given mass than to melt it, so the boiling plateau is ~7× longer.\n\nPlateau length ∝ latent heat. The boiling plateau's greater length is the graphical fingerprint of $$L_v > L_f$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "When a piston compresses a gas, the molecules bounce off the *moving* piston and gain speed. Explain this microscopically — why does a moving piston make molecules faster, but a stationary piston at the same temperature doesn't? (2 steps)", "answer": "- Step 1: When a molecule collides with a *stationary* wall, it bounces back at the same speed (elastic collision with a massive wall). The wall does no net work on the molecule — it simply reverses the molecule's direction. Average molecular speed is unchanged.\n- Step 2: When a molecule collides with a *moving* piston (moving into the gas), the piston is advancing toward the molecule. The collision is like a bat hitting a ball — the piston's motion adds extra momentum to the molecule on the rebound. The molecule leaves the collision with *more* kinetic energy than it arrived with. This extra energy came from the work done by whoever is pushing the piston.\n\nA stationary wall reflects; a moving wall *boosts*. That's why compression heats a gas — the piston literally hits the molecules harder, like a moving bat hitting a ball versus a stationary wall.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "A student says \"Boyle's Law means that if you double the pressure, you halve the temperature.\" Identify the error and correct it. (2 steps)", "answer": "- Step 1: Boyle's Law relates pressure and *volume*, not pressure and temperature. The law states that at constant temperature, $$pV = \\text{constant}$$ — so doubling the pressure halves the *volume*, not the temperature. The student has confused volume with temperature.\n- Step 2: The relationship between pressure and temperature (at constant volume) is that they are *directly* proportional: higher temperature → higher pressure. Doubling pressure would correspond to doubling the Kelvin temperature (not halving it). But this is a different law from Boyle's Law.\n\nBoyle's Law: $$p \\propto 1/V$$ (constant T). Temperature-pressure relationship: $$p \\propto T$$ (constant V). These are two different relationships for two different conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "You want to heat 0.5 kg of ice at 0°C into water at 50°C. You need *two* equations. Which ones, and in what order do you apply them? (2 steps)", "answer": "- Step 1: First, melt the ice at 0°C into water at 0°C using the latent heat equation: $$Q_1 = mL_f$$. This covers the state change (solid → liquid) at constant temperature. Energy goes into breaking bonds (potential energy).\n- Step 2: Then, heat the water from 0°C to 50°C using the specific heat capacity equation: $$Q_2 = mc\\Delta\\theta$$. This covers the temperature change within the liquid state. Energy goes into increasing kinetic energy. The total energy is $$Q_{\\text{total}} = Q_1 + Q_2$$.\n\nState change first (latent heat), then temperature change (specific heat). The order matters because the substance must fully change state before its temperature can rise — the heating curve enforces this sequence.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "You have a sealed syringe containing air at room temperature. You push the plunger in halfway and hold it there. Explain what happens to (a) the volume, (b) the pressure, (c) the temperature initially, and (d) the temperature after waiting a few minutes. (4 steps)", "answer": "- Step 1: (a) The volume is halved — the plunger has reduced the available space by a factor of 2.\n- Step 2: (b) By Boyle's Law ($$p_1 V_1 = p_2 V_2$$ at constant T), halving the volume doubles the pressure. The gas molecules are in half the space, hitting the walls twice as often.\n- Step 3: (c) Initially, the temperature *increases*. Pushing the plunger does work on the gas (mechanical energy transfer), increasing the internal energy and kinetic energy of the molecules. The gas heats up momentarily. Boyle's Law strictly applies only if T is constant — here, T changes during the compression.\n- Step 4: (d) After waiting a few minutes, the gas cools back to room temperature by transferring heat to the surroundings (thermal equilibrium). *Now* Boyle's Law applies: at the new room temperature, the pressure settles to exactly double the original (since V is halved). The final state obeys $$p_1 V_1 = p_2 V_2$$, but the *intermediate* state did not because T was changing.\n\nBoyle's Law describes the equilibrium state at constant T. During rapid compression, T rises temporarily — the law applies only once the gas has cooled back to room temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "The particle model is described as a \"scientific model,\" not a literal photograph of reality. What does this distinction mean, and why is the model still useful? (2 steps)", "answer": "- Step 1: A scientific model is a simplified representation that captures the key features needed to explain and predict behaviour, without being a literal picture of reality. Particles are drawn as small spheres, but real atoms/molecules have complex structures (electron clouds, quantum behaviour) that the simple model ignores.\n- Step 2: The model is useful because it correctly predicts macroscopic behaviour: why solids are rigid, why liquids flow, why gases expand, why heating raises temperature, why compression increases pressure, etc. It doesn't need to be literally true in every detail — it just needs to give correct predictions for the phenomena we study. A good model trades exact realism for predictive power.\n\nThe particle model is like a map: it doesn't show every blade of grass, but it gets you where you need to go.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "Water is unusual: ice is *less* dense than liquid water. Explain how this is possible using the particle model, and state the practical consequence for life on Earth. (2 steps)", "answer": "- Step 1: When water freezes, the molecules form a regular crystalline structure (hexagonal arrangement) held by hydrogen bonds. This structure is *open* — it holds molecules further apart than in the liquid, where molecules can pack more closely. This open crystal occupies more volume for the same mass, making ice less dense ($$\\rho_{\\text{ice}} \\approx 917\\text{ kg/m}^3 < 1000\\text{ kg/m}^3$$).\n- Step 2: The practical consequence: ice floats on water. This insulates the water below from the cold air, preventing lakes and oceans from freezing solid. Aquatic life can survive beneath the ice. If ice were denser than water (like most substances), it would sink, and bodies of water would freeze from the bottom up — devastating for ecosystems.\n\nMost substances are denser as solids. Water is the exception because its crystal structure is open. This anomaly is essential for life.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "Synthesis question: You need to fully vaporise 1 kg of ice initially at −20°C into steam at 100°C. List the three distinct stages, state which equation applies at each stage, and identify whether energy goes into kinetic or potential energy. (3 steps)", "answer": "- Step 1: **Stage 1 — Heating ice from −20°C to 0°C**: Use $$\\Delta Q = mc_{\\text{ice}}\\Delta\\theta$$. Energy increases the *kinetic energy* of vibrating ice molecules. Temperature rises. The ice is still solid throughout.\n- Step 2: **Stage 2 — Melting ice at 0°C into water at 0°C**: Use $$Q = mL_f$$. Energy increases the *potential energy* — breaking hydrogen bonds so molecules can slide past each other. Temperature is constant. The state changes from solid to liquid.\n+ Then, **Stage 2b — Heating water from 0°C to 100°C**: Use $$\\Delta Q = mc_{\\text{water}}\\Delta\\theta$$. Energy increases *kinetic energy* of the liquid water molecules. Temperature rises from 0°C to 100°C.\n- Step 3: **Stage 3 — Boiling water at 100°C into steam at 100°C**: Use $$Q = mL_v$$. Energy increases *potential energy* — completely breaking intermolecular bonds so molecules escape as gas. Temperature is constant. State changes from liquid to gas.\n\nThe full process requires five energy calculations (if you include Stage 2b): three temperature-change stages using $$mc\\Delta\\theta$$ and two state-change stages using $$mL$$. Each stage alternates between kinetic and potential energy — exactly as the heating curve shows with its slopes and plateaus.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "A student says \"if you heat a gas in a rigid container, the volume stays the same so the pressure can't change either.\" Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: The student assumes that pressure depends only on volume. But pressure depends on *both* the number/frequency of collisions *and* the force per collision. In a rigid container, the volume is fixed, but heating increases the speed of the molecules.\n- Step 2: Faster molecules hit the walls harder (more momentum per collision) and more often (less time between collisions). Same volume, but more and harder impacts → higher pressure. Volume being constant does not prevent pressure from changing — it just means the pressure change is driven entirely by temperature change, not volume change.\n\nIn a rigid container, V is constant but T changes → p changes. The student forgot that temperature affects molecular speed and thus collision force and frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "A metal block has mass 200 g and volume 25 cm³. A student calculates density as $$\\rho = \\frac{200}{25} = 8\\text{ g/cm}^3$$ and says \"this is 8 kg/m³.\" Identify the unit error and correct it. (2 steps)", "answer": "- Step 1: The density calculation of $$8\\text{ g/cm}^3$$ is correct. However, the conversion to kg/m³ is wrong. The student seems to have just changed the label from g/cm³ to kg/m³ without converting.\n- Step 2: To convert: $$1\\text{ g/cm}^3 = 1000\\text{ kg/m}^3$$, so $$8\\text{ g/cm}^3 = 8000\\text{ kg/m}^3$$. The student's answer of 8 kg/m³ is off by a factor of 1000 — they treated the number 8 as if it were already in kg/m³. In reality, 8 kg/m³ would be less dense than air (1.3 kg/m³), which is clearly impossible for a metal block.\n\n8 g/cm³ = 8000 kg/m³. A density of 8 kg/m³ would be thinner than air — an immediate sanity check reveals the error.", "source": "GLM 5.1 ③", "_id": "glm_3_61"}, {"question": "Two objects have the same mass but different densities. Object A has twice the density of Object B. How do their volumes compare, and what does this tell you about how the particles are arranged? (2 steps)", "answer": "- Step 1: From $$\\rho = m/V$$, if both have the same mass $$m$$, then $$V = m/\\rho$$. Object A has twice the density, so $$V_A = m/(2\\rho_B) = \\frac{1}{2}V_B$$. Object A has half the volume of Object B.\n- Step 2: Same mass in half the volume means Object A's particles are packed twice as tightly. Either Object A has more particles per unit volume, or (if they're the same material) Object A has been compressed. For different materials, it means Object A's atoms are heavier or packed more efficiently. Either way, density is a measure of how tightly matter is packed.\n\nSame mass, double the density → half the volume. The particles in Object A are squeezed into a tighter space.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "In the SHC practical, why is it important to use a *lid* on the beaker of water? How does this affect the measured value of $$c$$ if you forget the lid? (2 steps)", "answer": "- Step 1: A lid reduces heat loss by convection (hot water vapour can't escape) and evaporation (water molecules can't leave the surface). Without a lid, significant energy is lost to the surroundings through these mechanisms.\n- Step 2: Without a lid, more energy escapes, so the water receives less of the electrical energy supplied. The temperature rise is *smaller* than it should be for the energy input. Since $$c = \\frac{E}{m\\Delta\\theta}$$, a smaller $$\\Delta\\theta$$ with the same $$E$$ gives a *larger* calculated $$c$$. The lid reduces this systematic error by keeping more energy in the water.\n\nNo lid → more heat loss → smaller $$\\Delta\\theta$$ → calculated $$c$$ is too high. The lid is a crucial part of reducing systematic error.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "The eureka can method works for finding the volume of irregular *solids*. Why can't you use the same method to find the volume of an *irregularly shaped cavity* inside a solid block? (2 steps)", "answer": "- Step 1: The eureka can measures the volume of water displaced by a submerged object. An irregular cavity *inside* a solid block is enclosed — water cannot enter it (unless the block is porous or has openings). The water is displaced by the *outer* shape of the block, not by the internal cavity.\n- Step 2: The volume measured by displacement is the *total external volume* of the block, including the cavity space. To find the cavity volume, you'd need to know the volume of solid material separately (e.g., from mass and known material density) and subtract: $$V_{\\text{cavity}} = V_{\\text{external}} - V_{\\text{solid material}}$$.\n\nThe eureka can measures what the object *pushes aside* (external volume), not what's *missing inside* (internal cavities). For that, you need additional information.", "source": "GLM 5.1 ③", "_id": "glm_3_67"}, {"question": "A student asks \"why can't we just use the density formula $$\\rho = m/V$$ to find the mass of a gas? We know the volume of the container.\" What practical difficulty makes this harder than for a solid or liquid? (2 steps)", "answer": "- Step 1: You *can* use $$m = \\rho V$$ for a gas, but the mass of gas in a typical container is extremely small. For example, 1 m³ of air has a mass of only ~1.3 kg. A 1-litre container (0.001 m³) holds only ~1.3 grams of air. Measuring such tiny masses requires a very precise balance.\n- Step 2: Additionally, you can't simply put a container of gas on a balance and get the gas mass — the balance would measure the container + gas together, and the gas mass is such a tiny fraction of the total that it's almost impossible to resolve. For solids and liquids, the mass is large enough to measure easily; for gases, the mass is often negligible compared to the container.\n\nGas masses are tiny because gas densities are ~1000× smaller than liquids. The formula works in principle, but the practical measurement is very difficult without specialised equipment.", "source": "GLM 5.1 ③", "_id": "glm_3_68"}, {"question": "You compress a gas quickly in a syringe and notice the syringe barrel gets warm. Your friend says \"that's friction from your hand.\" How could you design a simple test to show that the warmth is mainly from gas compression, not hand friction? (2 steps)", "answer": "- Step 1: Perform the *same* pushing motion with the syringe *empty* (or sealed with no gas inside, just the plunger). If the warmth were from hand friction on the barrel, the syringe should get just as warm. If it doesn't get warm (or gets much less warm), the heat must come from compressing the gas, not from friction.\n- Step 2: Alternatively, compress the gas *slowly* versus *quickly*. If the warmth is from friction (which depends on total distance moved, not speed), both speeds should give similar warming. But if it's from gas compression (doing work on the gas), the total energy transferred is the same regardless of speed, but the *rate* of heating differs — slow compression allows heat to dissipate to the surroundings, so the barrel feels less warm. Quick compression traps the energy as heat.\n\nThe control experiment: empty syringe, same motion. No warmth = gas compression is the cause. This is how you isolate variables in experimental physics.", "source": "GLM 5.1 ③", "_id": "glm_3_69"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "An iron block and a feather pillow can have the same mass. Why does the iron feel \"heavy for its size\" while the pillow feels \"light for its size\" — what physical property captures this difference, and why is it NOT the same as weight? (3 steps)", "answer": "- Step 1: The property that captures \"heavy-for-its-size\" vs \"light-for-its-size\" is **density** ($$\\rho$$), defined as mass per unit volume: $$\\rho = \\frac{m}{V}$$. Iron has a high density (~7800 kg/m³) because many iron atoms are packed into a small volume; the pillow has low density because it is mostly empty space (air gaps between feathers).\n- Step 2: Density is fundamentally different from **weight**. Weight is the gravitational force on an object ($$W = mg$$) — it depends on gravity. Density is a ratio of mass to volume — it is an intrinsic property of the material, independent of how much of it you have or what gravitational field it sits in. A 1 kg iron block on Earth and on the Moon has the same density but different weights.\n- Step 3: This is why density is measured in kg/m³ (mass divided by volume), not in newtons (force). Two objects with the same volume but different densities will have different masses — and therefore different weights in the same gravitational field — but density itself doesn't change with gravity.\n\nTakeaway: Density is an intrinsic material property (mass/volume); weight is a force that depends on gravity.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "You cut a uniform wooden block exactly in half. Does the density of each half change? Explain why or why not using the definition of density. (2 steps)", "answer": "- Step 1: Density is $$\\rho = \\frac{m}{V}$$. When you cut the block in half, both the mass and the volume are halved. The mass of each half is $$\\frac{m}{2}$$, and the volume of each half is $$\\frac{V}{2}$$.\n- Step 2: Substituting into the density formula: $$\\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho_{\\text{original}}$$. The factors of 2 cancel, so the density is unchanged. Density is a property of the **material**, not the object's size. This is a key insight — density doesn't depend on how much material you have; it depends on what material it is.\n\nTakeaway: Halving an object halves both mass and volume equally, so density (their ratio) stays the same.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Water has a density of $$1 \\text{ g/cm}^3$$. Why does this equal exactly $$1000 \\text{ kg/m}^3$$? Walk through the unit conversion logic. (3 steps)", "answer": "- Step 1: Start with $$1 \\text{ g/cm}^3$$, meaning 1 gram of mass occupies 1 cubic centimetre of volume. We need to convert both the mass unit (g → kg) and the volume unit (cm³ → m³).\n- Step 2: Mass conversion: $$1 \\text{ g} = 0.001 \\text{ kg}$$ (divide by 1000). Volume conversion: $$1 \\text{ cm} = 0.01 \\text{ m}$$, so $$1 \\text{ cm}^3 = (0.01)^3 \\text{ m}^3 = 0.000001 \\text{ m}^3$$ (one millionth of a cubic metre). This is because each dimension shrinks by 100, and volume involves three dimensions multiplied.\n- Step 3: Now compute: $$\\rho = \\frac{0.001 \\text{ kg}}{0.000001 \\text{ m}^3} = \\frac{0.001}{0.000001} \\text{ kg/m}^3 = 1000 \\text{ kg/m}^3$$. The key insight is that the volume conversion factor (1,000,000) is much larger than the mass conversion factor (1,000), so the ratio increases by $$\\frac{1,000,000}{1,000} = 1000$$.\n\nTakeaway: Converting g/cm³ to kg/m³ always multiplies by 1000 because volume scales by the cube of the length conversion.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "An object is placed in water (density $$1000 \\text{ kg/m}^3$$). If the object's density is greater than $$1000 \\text{ kg/m}^3$$, what happens, and why does density determine this rather than mass alone? (2 steps)", "answer": "- Step 1: If the object's density exceeds water's density, the object **sinks**. This is because, for the volume of water the object displaces, that volume of water has less mass than the same volume of the object. The object is \"heavier per unit volume\" than the water it tries to push aside, so gravity wins over the buoyant force and it sinks.\n- Step 2: Mass alone doesn't determine sinking — a 10,000 kg steel ship floats because its **overall** density (including the hollow air-filled interior) is less than water. A 1 g steel nail sinks because its density (~7800 kg/m³) exceeds water's. It's the ratio $$\\rho = m/V$$ that matters, not the raw mass. A large, heavy object with low average density can float; a small, light object with high density sinks.\n\nTakeaway: Sinking vs floating depends on density comparison with the fluid, not on total mass.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "A solid and a liquid made of the same substance (e.g., ice and liquid water) have very similar densities — ice is about $$917 \\text{ kg/m}^3$$ and liquid water is $$1000 \\text{ kg/m}^3$$. But when that substance becomes a gas (steam), the density drops to about $$0.6 \\text{ kg/m}^3$$ — roughly 1000× less. What explains this enormous drop? (3 steps)", "answer": "- Step 1: In both solids and liquids, the particles (molecules) are **very close together**, essentially touching. The spacing between molecules is minimal — there are no large gaps. This means a given volume contains a huge number of molecules, giving high mass per volume = high density.\n- Step 2: In a gas, the particles are **widely separated** — typically about 10× further apart in each direction compared to the liquid. Since volume scales as the cube of separation distance, being 10× further apart in each direction means the molecules occupy roughly $$10^3 = 1000$$× more volume per molecule. Same mass, 1000× more volume → density drops by 1000×.\n- Step 3: This is why gases like air have densities around 1–2 kg/m³ while their liquid forms have densities around 1000 kg/m³. The molecules themselves haven't changed — they have the same mass. It's purely the **spacing** that changes. The large gaps between gas molecules also explain why gases are compressible (you can squeeze those gaps smaller) while solids and liquids are not (no gaps to squeeze).\n\nTakeaway: The ~1000× density drop from liquid to gas comes from particles being ~10× further apart in each direction, and volume scales as distance cubed.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "Why can you compress a gas significantly but not a solid or liquid? Explain using the particle model. (2 steps)", "answer": "- Step 1: In a gas, particles are widely separated with large empty spaces between them. When you apply pressure, you are forcing those particles closer together — squeezing the empty gaps. The particles themselves don't shrink; the spaces between them do. Since those spaces are large, there's a lot of room to compress.\n- Step 2: In a solid or liquid, particles are already essentially touching — they're packed tightly with minimal gaps between them. There is no significant empty space to squeeze out. Compressing them would require squashing the particles themselves, which requires enormous forces (this is why solids/liquids are called \"incompressible\" at ordinary pressures). The resistance comes from electrostatic repulsion between electron clouds of adjacent atoms.\n\nTakeaway: Compressibility depends on how much empty space exists between particles — gases have lots, solids/liquids have almost none.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A common misconception is that liquid particles are \"far apart\" because liquids can flow. Why is this wrong, and what actually allows a liquid to flow? (2 steps)", "answer": "- Step 1: Liquid particles are **not far apart** — they are very close together, essentially touching, just like in a solid. This is why liquids have densities similar to their solid forms (e.g., liquid water: 1000 kg/m³, ice: 917 kg/m³). If liquid particles were far apart, liquid density would be much lower, like a gas.\n- Step 2: What allows a liquid to flow is not spacing, but **freedom of arrangement**. In a solid, particles are locked in a fixed, regular pattern and can only vibrate in place. In a liquid, particles are close together but have no fixed positions — they can slide past each other and rearrange. This mobility of close-packed particles lets the liquid deform and flow, taking the shape of its container, while still maintaining a definite volume (because particles stay close together).\n\nTakeaway: Liquids flow because particles can slide past each other, not because they are far apart — they're still tightly packed.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "A solid has a definite shape and a definite volume. A liquid has no definite shape but a definite volume. A gas has neither. Explain each using the particle model — what particle behaviour causes these macroscopic properties? (3 steps)", "answer": "- Step 1: **Solid**: Particles vibrate about fixed positions in a regular arrangement. They cannot slide past each other or move to new positions. This rigidity at the particle level gives the macroscopic solid its definite shape (it doesn't deform easily) and definite volume (particles are close together, can't spread out).\n- Step 2: **Liquid**: Particles are close together (definite volume — they can't expand because intermolecular attractions hold them near each other) but can slide past one another with no fixed arrangement. This sliding ability means the liquid deforms to match the container's shape — no definite shape, but the close packing maintains definite volume.\n- Step 3: **Gas**: Particles move randomly at high speeds with very weak intermolecular forces and large gaps. They have no arrangement and no constraints holding them together. They spread out to fill whatever container they're in — no definite shape, and no definite volume (compress or expand the container, and the gas adjusts). The weak forces and large spacing mean gas particles essentially fly freely until they hit a wall.\n\nTakeaway: Definite shape comes from fixed particle positions; definite volume comes from close particle spacing; neither property exists when particles are free and widely separated.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "To find the density of a regular-shaped solid (like a rectangular block), what two quantities must you measure, and how do you combine them? Why is measuring dimensions with a ruler more appropriate here than using water displacement? (2 steps)", "answer": "- Step 1: You must measure **mass** (using a digital balance) and **volume** (using dimensions). For a rectangular block, volume is $$V = l \\times w \\times h$$, where you measure each dimension with a ruler, Vernier calipers, or micrometer. Then density is $$\\rho = \\frac{m}{V}$$.\n- Step 2: For regular shapes, using dimensions is more appropriate than water displacement because: + Dimensions give a direct, precise calculation of volume without the mess and error of water displacement (splashing, incomplete drainage, reading the measuring cylinder). + For a simple cuboid, measuring three lengths and multiplying is straightforward and typically more accurate than trying to catch overflow water in a measuring cylinder. Water displacement is reserved for **irregular** objects where you cannot easily calculate volume from dimensions.\n\nTakeaway: Regular objects → measure dimensions for volume; irregular objects → water displacement.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "How does a Eureka (displacement) can work to find the volume of an irregular solid like a stone? What principle is it based on? (3 steps)", "answer": "- Step 1: A Eureka can is a container with a spout near the top. You fill it with water exactly up to the level of the spout — any additional water would overflow through the spout. This establishes a reference level.\n- Step 2: You gently lower the irregular solid into the can. The solid displaces a volume of water equal to its own volume (because the solid occupies space that was previously filled with water). This displaced water flows out through the spout and is collected in a measuring cylinder.\n- Step 3: The volume of water collected in the measuring cylinder equals the volume of the solid: $$V_{\\text{object}} = V_{\\text{water displaced}}$$. This works because of the **displacement principle** — an object submerged in a fluid pushes aside a volume of fluid exactly equal to its own volume. The key word is \"gently\" — dropping the object causes splashing, which means some displaced water doesn't enter the measuring cylinder, giving an inaccurate volume.\n\nTakeaway: The Eureka can exploits displacement: the water overflow equals the object's volume, but the object must be lowered gently to avoid splashing errors.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "To find the density of a liquid (e.g., cooking oil), you use a measuring cylinder on a balance. Why is it important to \"tare\" (zero) the balance with the empty cylinder first, rather than just subtracting the cylinder mass later? (2 steps)", "answer": "- Step 1: Taring the balance means placing the empty measuring cylinder on the balance and pressing the zero/tare button. The balance now reads 0.00 g with the cylinder on it. When you add the liquid, the balance reads only the liquid's mass directly — no subtraction needed. This gives you $$m_{\\text{liquid}}$$ immediately.\n- Step 2: While you could instead record $$m_{\\text{cylinder}}$$ and $$m_{\\text{cylinder+liquid}}$$ and subtract, taring is preferred because: + It eliminates a subtraction step, reducing calculation errors. + It removes the uncertainty from two separate mass readings (each has its own ± uncertainty; subtracting combines both uncertainties). + It's faster and more direct. The volume is read from the measuring cylinder scale, and then $$\\rho = \\frac{m_{\\text{liquid}}}{V_{\\text{liquid}}}$$.\n\nTakeaway: Taring gives the liquid mass directly with one reading instead of two, reducing error and simplifying calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Name all six changes of state, specifying the direction (which state → which state) for each. Which one skips an entire state? (2 steps)", "answer": "- Step 1: The six changes of state are: + Melting: solid → liquid + Freezing: liquid → solid (the reverse of melting) + Boiling/Evaporating: liquid → gas + Condensing: gas → liquid (the reverse of boiling) + Subliming: solid → gas directly + Deposition: gas → solid directly (the reverse of subliming)\n- Step 2: **Sublimation** (and its reverse, deposition) is the one that skips an entire state — it goes directly from solid to gas (or gas to solid) without passing through the liquid phase. Dry ice (solid CO₂) is a classic example: it s
