mechanism for each. (2 steps)", "answer": "- Step 1: The three mechanisms are:\n  + **Conduction**: Energy transfers through a material by particle vibrations passing from neighbour to neighbour (dominant in solids, especially metals with free electrons).\n  + **Convection**: Heated fluid (liquid or gas) expands, becomes less dense, and rises; cooler, denser fluid sinks — setting up a circulation (convection current) that transfers energy through the bulk movement of the fluid.\n  + **Radiation**: Energy is emitted as infrared electromagnetic waves that can travel through a vacuum — no particles are needed. All objects radiate; hotter objects radiate more.\n- Step 2: Key contrasts: conduction requires a material with particles in contact; convection requires a fluid that can flow; radiation requires no medium at all (it works through empty space). Insulation works by slowing conduction (using poor conductors with trapped air) and convection (trapped air can't circulate), and reducing radiation (shiny surfaces reflect infrared).\n\nTakeaway: Conduction = particle-to-particle vibration; convection = bulk fluid movement; radiation = electromagnetic waves through any medium or vacuum.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Why does trapped air inside foam or wool make it a good thermal insulator, rather than just being empty space? (3 steps)", "answer": "- Step 1: Air is a very poor conductor of thermal energy — its molecules are far apart, so collisions (which transfer energy in conduction) are infrequent. This means heat transfers slowly through air.\n- Step 2: If air is **trapped** in small pockets within foam or wool, it cannot flow. This prevents convection currents from forming, which would otherwise carry heat away efficiently by bulk movement of warm air.\n- Step 3: So trapped air gives you a double benefit: poor conduction (air is a bad conductor) AND suppressed convection (air can't circulate). This is why insulation materials are low-density and full of tiny air pockets — they maximise the amount of trapped still air.\n\nTakeaway: Trapped air insulates because air is a poor conductor AND because trapping it prevents convection currents.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "In Core Practical 6, you investigate the SHC of water using an immersion heater. The energy supplied is calculated as $$E = VIt$$. If you supply 10 V at 2 A for 3 minutes, how much energy is delivered? (2 steps)", "answer": "- Step 1: First convert time to seconds: $$t = 3 \\times 60 = 180$$ s. This is the most common slip — using minutes instead of seconds.\n- Step 2: $$E = VIt = 10 \\times 2 \\times 180 = 3600$$ J. Quick mental check: 10 × 2 = 20 W of power, and 20 W × 180 s = 3600 J.\n\nTakeaway: Always convert time to seconds before using $$E = VIt$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In Core Practical 6, the experimentally determined value of $$c$$ for water often comes out too high. Explain why, linking the answer to energy losses. (3 steps)", "answer": "- Step 1: The method assumes all electrical energy ($$E = VIt$$) goes into heating the water: $$VIt = mc\\Delta\\theta$$. Rearranging gives $$c = \\frac{VIt}{m\\Delta\\theta}$$.\n- Step 2: In reality, some energy is lost to the surroundings (heating the beaker, the air, the heater itself). This means the actual energy going into the water is **less** than $$VIt$$.\n- Step 3: Since $$c = \\frac{VIt}{m\\Delta\\theta}$$, and $$VIt$$ in the numerator is **larger** than the energy that actually heated the water, the calculated $$c$$ is **too high**. The temperature rise $$\\Delta\\theta$$ is smaller than it \"should\" be for the energy input, making the ratio larger.\n\nTakeaway: Energy losses → measured $$\\Delta\\theta$$ is too small → calculated $$c$$ is too high. Better insulation reduces this error.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "In the melting ice part of Core Practical 6, you plot a heating curve. What feature of the graph tells you the melting point, and why must you stir the ice-water mixture? (2 steps)", "answer": "- Step 1: The **flat plateau** on the temperature-time graph indicates the melting point. While ice is melting, the temperature stays constant (all energy goes into potential energy), so the plateau's y-value is the melting point.\n- Step 2: Stirring ensures the temperature is uniform throughout the mixture. Without stirring, the thermometer might sit in a pocket of warmer or cooler water, giving a misleading reading — the ice and water may not be in thermal equilibrium with each other locally. Stirring distributes heat evenly so the thermometer reads a representative temperature.\n\nTakeaway: The plateau gives the melting point; stirring ensures the temperature reading is meaningful.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What is Brownian motion, and what does it prove about the particles in a gas? Why is it NOT the motion of the gas molecules themselves? (3 steps)", "answer": "- Step 1: Brownian motion is the random, zig-zag motion of tiny visible particles (like smoke or pollen grains) suspended in a fluid. It was first observed by Robert Brown looking at pollen grains in water.\n- Step 2: The zig-zag path is caused by **unseen fast-moving gas (or liquid) molecules bombarding the visible particle from all sides**. Because the collisions are random and uneven, at any instant more molecules may hit from one side than the other, causing the visible particle to jolt in an unpredictable direction.\n- Step 3: It is NOT the motion of the gas molecules themselves — those molecules are far too small to see. Brownian motion is the **visible effect** of invisible molecular collisions on a larger particle. It proves that gas/liquid molecules exist, move randomly, and have kinetic energy.\n\nTakeaway: Brownian motion = visible zig-zag of large particles caused by invisible molecular bombardment. It's evidence FOR the particle model, not a direct observation of molecules.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "How does a gas exert pressure on the walls of its container, at the microscopic level? (3 steps)", "answer": "- Step 1: Gas molecules are in constant random motion. They travel in straight lines between collisions and bounce off the container walls.\n- Step 2: Each collision exerts a tiny **force** on the wall (the molecule changes momentum, and by Newton's second law, a force acts). The collisions happen at right angles to the wall surface.\n- Step 3: Billions of molecules collide with the wall every second. The **total force per unit area** from all these collisions is what we call pressure: $$p = \\frac{F}{A}$$. More frequent or harder collisions → higher pressure.\n\nTakeaway: Gas pressure = the cumulative effect of countless molecular collisions with the container walls per unit area.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "If you heat a sealed, rigid container of gas, the pressure increases. Explain this using the particle model. (3 steps)", "answer": "- Step 1: Heating increases the average kinetic energy of the gas molecules — they move faster.\n- Step 2: Faster molecules collide with the walls more frequently (they cross the container faster) AND each collision is harder (more momentum change, since $$F = \\frac{\\Delta p}{\\Delta t}$$).\n- Step 3: Both effects increase the total force per unit area on the walls. Since the container is rigid (volume is fixed), the area doesn't change, so pressure increases: $$p = \\frac{F}{A}$$ with $$F$$ increasing and $$A$$ constant.\n\nTakeaway: Constant volume + higher temperature → faster molecules → more frequent and harder collisions → higher pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is absolute zero, and why is it impossible to reach a temperature below it? (3 steps)", "answer": "- Step 1: Absolute zero is the temperature at which particles have **zero kinetic energy** — they are completely motionless. Its value is −273 °C or 0 K.\n- Step 2: Temperature is a measure of average particle kinetic energy. If particles have zero KE, they cannot move or vibrate at all. Since there is no such thing as \"negative kinetic energy\" (you can't move less than zero), there is no lower energy state to cool to.\n- Step 3: Therefore absolute zero is the theoretical minimum temperature. In practice, it can be approached but never perfectly reached (quantum effects also prevent complete stillness). At absolute zero, a gas would exert no pressure (no collisions with walls).\n\nTakeaway: Absolute zero = zero KE = no molecular motion = lowest possible temperature = −273 °C = 0 K.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Convert 27 °C to Kelvin, and explain why the Kelvin scale starts at −273 °C rather than at 0 °C like Celsius. (2 steps)", "answer": "- Step 1: Using $$T \\text{ (K)} = \\theta \\text{ (°C)} + 273$$: $$T = 27 + 273 = 300$$ K. A change of 1 K = a change of 1 °C (the step size is identical), but the zero point is different.\n- Step 2: The Kelvin scale starts at absolute zero (the point of zero kinetic energy) because this is the most physically meaningful zero point — a temperature of 0 K means \"no thermal energy at all.\" The Celsius scale starts at the freezing point of water (0 °C), which is convenient for everyday use but has no deep physical significance. Kelvin temperatures are never negative, making them essential for gas law calculations.\n\nTakeaway: Kelvin shifts the zero point to absolute zero. Same step size as Celsius, but physically meaningful zero.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A gas is at 300 K. What is its temperature in Celsius? If it is cooled to 150 K, has it halved its temperature on both scales? (3 steps)", "answer": "- Step 1: $$\\theta = T - 273 = 300 - 273 = 27$$ °C.\n- Step 2: At 150 K: $$\\theta = 150 - 273 = -123$$ °C.\n- Step 3: On the Kelvin scale, 300 K → 150 K is indeed a halving (from 300 to 150). On the Celsius scale, 27 °C → −123 °C is NOT a halving — it's not meaningful to take ratios of Celsius values because the zero point is arbitrary. Only Kelvin values can be used for proportional relationships like \"pressure is proportional to temperature.\"\n\nTakeaway: Proportional relationships in physics always use Kelvin, never Celsius, because only Kelvin has a true absolute zero.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "If you slowly push a piston into a cylinder of gas at constant temperature, the pressure increases. Explain this using Boyle's Law AND using the particle model. (3 steps)", "answer": "- Step 1: **Boyle's Law**: $$p_1 V_1 = p_2 V_2$$ at constant temperature and constant mass. As volume decreases ($$V_2 < V_1$$), pressure must increase ($$p_2 > p_1$$) to keep the product constant.\n- Step 2: **Particle model explanation**: The same number of molecules are now crammed into a smaller space. The walls are closer, so molecules travel shorter distances between collisions — they hit the walls more frequently. More collisions per second per unit area means higher pressure.\n- Step 3: Importantly, the average kinetic energy (and therefore temperature) stays the same — each collision is no harder than before, there are just more of them per second because the distance to the wall is shorter. If temperature were also changing, Boyle's Law would not apply.\n\nTakeaway: Boyle's Law (constant T): smaller volume → same-speed molecules → more frequent wall collisions → higher pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A fixed mass of gas at constant temperature occupies 0.4 m³ at 500 Pa. If the volume is reduced to 0.1 m³, what is the new pressure? (2 steps)", "answer": "- Step 1: Apply Boyle's Law: $$p_1 V_1 = p_2 V_2$$. Substitute: $$500 \\times 0.4 = p_2 \\times 0.1$$, so $$200 = 0.1 \\times p_2$$.\n- Step 2: $$p_2 = \\frac{200}{0.1} = 2000$$ Pa. Quick sanity check: volume was quartered (0.4 → 0.1), so pressure should quadruple (500 → 2000). This confirms the inverse relationship.\n\nTakeaway: When volume changes by a factor, pressure changes by the reciprocal factor (at constant T and mass).", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A bicycle pump gets warm when you use it. A student says, \"It's because of friction between the pump and the tyre valve.\" Why is this explanation mostly wrong, and what is the real cause? (3 steps)", "answer": "- Step 1: While there is some friction in the pump mechanism, the primary cause of warming is **doing work on the gas**. When you push the pump handle, you compress the air rapidly.\n- Step 2: Compressing the gas means applying a force through a distance — you are **doing mechanical work** on the gas. This work transfers energy to the gas molecules, increasing their internal energy (both KE and PE). The increase in KE means the temperature rises.\n- Step 3: This is not the same as heat transfer (thermal conduction from a hot object). Work is **mechanical** energy transfer — force × distance. The gas gets hotter because you've added energy to it by compression, not because something hot touched it. If the gas were allowed to expand back, it would do work on the surroundings and cool down.\n\nTakeaway: Compression does work on a gas → internal energy increases → temperature rises. This is mechanical energy transfer, not heat transfer.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "A CO₂ fire extinguisher nozzle gets very cold (even forming dry ice) when the gas is released. Explain this using the concept of a gas doing work on its surroundings. (3 steps)", "answer": "- Step 1: When the nozzle is opened, the compressed CO₂ gas expands rapidly as it rushes out of the cylinder into the lower-pressure atmosphere.\n- Step 2: To expand, the gas must **push against** the surrounding air — it does work on the surroundings. This requires energy, which comes from the gas's own internal energy.\n- Step 3: As internal energy decreases, the average kinetic energy drops, and the temperature falls dramatically. The CO₂ can cool so much that it solidifies directly into dry ice (sublimation in reverse — deposition). This is the opposite of compressing a gas: expansion → gas does work → loses internal energy → cools.\n\nTakeaway: Gas expanding does work on surroundings → loses internal energy → temperature drops. This is the reverse of compression heating.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "Why must Boyle's Law ($$p_1 V_1 = p_2 V_2$$) only be applied when both temperature AND mass of gas are constant? What goes wrong if either changes? (3 steps)", "answer": "- Step 1: Boyle's Law states that pressure and volume are inversely proportional **only** when temperature is constant. If temperature increases, molecules move faster and hit the walls harder and more often, so pressure increases **beyond** what Boyle's Law predicts for the new volume. The product $$pV$$ is no longer constant — it increases with temperature.\n- Step 2: If mass changes (e.g., gas leaks out), there are fewer molecules to collide with the walls. Fewer molecules means lower pressure at the same volume, again breaking the $$pV = \\text{constant}$$ relationship. The \"constant\" in Boyle's Law depends on both the amount of gas and its temperature.\n- Step 3: Therefore, $$p_1 V_1 = p_2 V_2$$ is only valid for a **closed system** (no mass in or out) at **fixed temperature**. If either condition is violated, you must use a more general gas law.\n\nTakeaway: Boyle's Law requires constant T AND constant m. Changing either breaks the simple $$pV = \\text{const}$$ relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "You have a sealed syringe containing air at room temperature. You push the plunger in slowly and hold it. Then you wait a few minutes. Does the pressure stay the same, increase, or decrease while you wait? Explain. (3 steps)", "answer": "- Step 1: When you first push the plunger in, you compress the gas (volume decreases), so by Boyle's Law, pressure increases. But compression also does work on the gas, temporarily raising its temperature above room temperature.\n- Step 2: While you hold the plunger at the new volume, the gas is now warmer than the room. Over a few minutes, it transfers thermal energy to the surroundings and cools back to room temperature.\n- Step 3: As the gas cools at constant volume, pressure **decreases** (fewer/weaker collisions at lower temperature). So the final pressure is lower than right after compression, though still higher than the original (since volume is still smaller). If you had compressed it infinitely slowly (isothermally), there would be no temperature rise and no subsequent pressure drop.\n\nTakeaway: Rapid compression heats the gas temporarily; waiting allows cooling at constant volume, which reduces pressure slightly from its peak.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "A substance is heated from −20 °C to 120 °C, passing through both melting and boiling points. Order the following energy inputs from largest to smallest: (a) heating the solid to its melting point, (b) melting the solid, (c) heating the liquid to its boiling point, (d) boiling the liquid, (e) heating the gas. For water, which requires the most energy and why? (3 steps)", "answer": "- Step 1: For water, the latent heat of vaporisation (~2260 kJ/kg) is much larger than the latent heat of fusion (~330 kJ/kg), and both are typically larger than the energy for moderate temperature changes within one state (e.g., heating 1 kg of water by 80 °C takes $$1 \\times 4200 \\times 80 = 336$$ kJ).\n- Step 2: The ordering from largest to smallest for water is typically: (d) boiling the liquid > (c) heating the liquid to its boiling point > (b) melting the solid > (e) heating the gas > (a) heating the solid. The exact order of the smaller ones depends on the temperature ranges and specific heat capacities, but boiling always dominates.\n- Step 3: Boiling requires the most energy because it involves completely separating molecules from each other against all intermolecular forces. The energy to fully pull molecules apart is far greater than just loosening them (fusion) or speeding them up (temperature change within one state).\n\nTakeaway: For water, vaporisation energy >> fusion energy >> sensible heating energy for modest temperature ranges.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Why is water's high specific heat capacity (4200 J/(kg·°C)) important for life on Earth? Give two practical consequences. (2 steps)", "answer": "- Step 1: Water's high SHC means it absorbs and releases large amounts of energy with only small temperature changes. This makes the oceans powerful **thermal buffers** — they moderate Earth's climate, keeping coastal regions cooler in summer and warmer in winter than inland areas.\n- Step 2: Two practical consequences:\n  + **Climate regulation**: Large bodies of water stabilise global temperatures, preventing extreme swings that would make many habitats uninhabitable.\n  + **Biological regulation**: The human body is ~60% water, so our internal temperature is stabilised against rapid fluctuations — we can absorb or release significant heat without dangerous temperature changes.\n\nTakeaway: High SHC = thermal inertia. Water resists temperature change, making it an excellent climate and biological stabiliser.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "A student measures the density of a regular solid by finding its mass and measuring its dimensions. They then repeat the experiment using the Eureka can method. Which method is likely more accurate for a perfectly regular object, and why? (2 steps)", "answer": "- Step 1: For a **perfectly regular** object (e.g., a perfect cuboid), measuring dimensions and calculating volume ($$V = lwh$$) is more accurate. The Eureka can introduces additional error sources: water may cling to the object, the spout may not drain completely, and splashing can give incorrect volume readings.\n- Step 2: However, the Eureka can is essential for **irregular** objects where no simple formula for volume exists. For regular objects, direct measurement of dimensions is preferred because it avoids the water-related errors of displacement.\n\nTakeaway: Regular shapes → measure dimensions. Irregular shapes → displacement method. Each method matches the geometry.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "A sealed container of gas is heated. Explain what happens to the pressure using both the macroscopic relationship and the microscopic particle model. Why must the container be sealed? (3 steps)", "answer": "- Step 1: **Macroscopic**: At constant volume, pressure is proportional to temperature (in Kelvin): $$p \\propto T$$. Heating increases $$T$$, so $$p$$ increases.\n- Step 2: **Microscopic**: Heating increases the average kinetic energy of the molecules. They move faster, so they collide with the walls more frequently AND each collision transfers more momentum (harder impact). More frequent + harder collisions = higher total force per unit area = higher pressure.\n- Step 3: The container must be **sealed** (constant mass) so that the number of molecules is fixed. If gas could escape, fewer molecules would remain to collide with the walls, and the pressure relationship would change unpredictably. Boyle's Law and the pressure-temperature relationship both require a fixed mass of gas.\n\nTakeaway: Sealed + heated → same molecules, faster → more/harder collisions → higher pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A student claims that at absolute zero, all molecular motion stops completely. A physicist says this isn't quite true. Explain the nuance. (3 steps)", "answer": "- Step 1: At the GCSE level, absolute zero is described as the temperature where particles have zero kinetic energy and stop moving. This is a useful approximation for understanding the concept.\n- Step 2: In reality, quantum mechanics tells us that particles can never be completely still — there is always a minimum \"zero-point energy\" due to the Heisenberg uncertainty principle. If a particle had exactly zero momentum (and therefore zero KE), its position would be completely uncertain, which is impossible for a particle confined in a substance.\n- Step 3: However, at GCSE, the model treats absolute zero as the point where classical kinetic energy reaches zero. This is acceptable for the exam — the key idea is that it's the theoretical minimum temperature where particles have the minimum possible energy and exert effectively no pressure.\n\nTakeaway: At GCSE: absolute zero = zero KE = no motion. In reality: quantum zero-point energy means some residual motion, but it's negligible for the level of understanding required.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "You want to determine the density of an irregularly shaped rock. You measure its mass as 54 g and displace 20 cm³ of water using a Eureka can. What is its density in both g/cm³ and kg/m³? (2 steps)", "answer": "- Step 1: $$\\rho = \\frac{m}{V} = \\frac{54}{20} = 2.7$$ g/cm³. This is a simple division: 54 ÷ 20 = 2.7.\n- Step 2: Convert to kg/m³: $$2.7 \\times 1000 = 2700$$ kg/m³. This is the density of aluminium — a useful reference value to remember.\n\nTakeaway: Density in g/cm³ × 1000 = density in kg/m³. Always check which units the question asks for.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Why does a hot air balloon rise? Explain using density and the particle model. (3 steps)", "answer": "- Step 1: Heating the air inside the balloon causes the air molecules to move faster (higher KE). The faster molecules push outward more strongly, and since the balloon is open at the bottom, some air escapes — the number of molecules inside decreases.\n- Step 2: With fewer molecules in roughly the same volume (the balloon is flexible but its shape is maintained), the density of the air inside decreases: $$\\rho = \\frac{m}{V}$$ with $$m$$ reduced.\n- Step 3: The surrounding cooler air is denser (more molecules per volume). The buoyant force (upthrust) on the balloon equals the weight of the displaced cool air, which is greater than the weight of the hot air inside. The net upward force causes the balloon to rise — just like a piece of wood rises in water because it is less dense.\n\nTakeaway: Hot air → molecules escape → lower density → buoyancy exceeds weight → balloon rises.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "On a heating curve for a pure substance, the first plateau is shorter than the second plateau. Which state change requires more energy, and what does this tell you about the relative sizes of the two latent heats? (2 steps)", "answer": "- Step 1: The first plateau corresponds to melting (fusion), and the second corresponds to boiling (vaporisation). A longer plateau means more energy is needed for that state change (since energy is being supplied at a constant rate).\n- Step 2: The second plateau being longer tells you that the specific latent heat of vaporisation ($$L_v$$) is greater than the specific latent heat of fusion ($$L_f$$) for this substance. This makes physical sense: completely separating molecules (vaporisation) always requires more energy than just loosening them (fusion).\n\nTakeaway: Longer plateau = more energy = larger latent heat. Vaporisation always has a longer plateau than fusion.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "In Core Practical 6 (SHC of water), why should you only use the straight-line region of the energy-vs-$$m\\Delta\\theta$$ graph to find $$c$$? (3 steps)", "answer": "- Step 1: The theory predicts a linear relationship: $$E = mc\\Delta\\theta$$, or rearranged, $$E = c \\times (m\\Delta\\theta)$$. On a graph of $$E$$ (y-axis) vs $$m\\Delta\\theta$$ (x-axis), the gradient should be $$c$$.\n- Step 2: In practice, the initial data points may not lie on a straight line because the immersion heater itself must warm up first (energy goes into the heater, not the water). Also, the system takes time to reach thermal equilibrium.\n- Step 3: Only the straight-line region (after the initial transient) represents the period where energy is being consistently transferred to the water with minimal losses to the heater or surroundings. Using this region gives the most reliable estimate of $$c$$ as the gradient.\n\nTakeaway: Ignore the initial curved region; use only the linear part for the gradient = $$c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Explain why a shiny teapot keeps tea hotter for longer than a matte black teapot, even though both have the same wall thickness and material. (2 steps)", "answer": "- Step 1: All objects emit infrared radiation, and the rate of emission depends on the surface. **Shiny/silver surfaces are poor emitters** of infrared radiation — they radiate heat away slowly. **Matte black surfaces are good emitters** — they radiate heat away quickly.\n- Step 2: The shiny teapot loses less energy by radiation per second, so the tea cools more slowly. The matte black teapot radiates energy efficiently, so the tea cools faster. This effect is purely about radiation; conduction and convection are the same for both (same material and thickness).\n\nTakeaway: Shiny surfaces reduce radiation heat loss; matte black surfaces increase it. For keeping things hot, go shiny.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A fixed mass of gas is in a cylinder with a movable piston. The gas is heated while the piston is free to move so that pressure stays constant. What happens to the volume, and why? Explain using the particle model. (3 steps)", "answer": "- Step 1: At constant pressure, heating the gas increases its temperature (molecules move faster). The faster molecules would increase pressure if the volume were fixed.\n- Step 2: But the piston is free to move, so the gas **expands** — the piston moves outward. The volume increases until the pressure returns to its original value. More volume means fewer collisions per unit area per second, compensating for the harder collisions from faster molecules.\n- Step 3: The result: constant pressure, higher temperature, larger volume. This is the qualitative statement that at constant $$p$$: $$V \\propto T$$ (in Kelvin). Hotter gas at constant pressure takes up more space.\n\nTakeaway: Constant pressure + heating → gas expands → volume increases to maintain constant pressure despite faster molecules.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "Why is it incorrect to say \"heat\" and \"temperature\" are the same thing? Give an example where they differ. (3 steps)", "answer": "- Step 1: **Heat** (thermal energy) is energy transferred due to a temperature difference, measured in joules. **Temperature** is a measure of the average kinetic energy per particle, measured in °C or K.\n- Step 2: They differ because heat depends on both temperature AND mass (and SHC). A boiling kettle and a spark from a fire can both be at ~1000 °C, but the kettle contains far more thermal energy (more mass of hot water) than the tiny spark.\n- Step 3: Example: A red-hot nail might be at 800 °C, but it contains very little total thermal energy (small mass, moderate SHC). A swimming pool at 25 °C has a much lower temperature but contains enormous thermal energy (large mass, high SHC of water). You could heat a room with the pool's energy but not with the nail's.\n\nTakeaway: Temperature = average KE per particle (intensive). Heat = total thermal energy transferred (extensive, depends on mass and $$c$$).", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "A sealed gas cylinder is left in the sun and its temperature rises from 300 K to 330 K. If the initial pressure was 200 kPa, what is the new pressure, assuming constant volume? (2 steps)", "answer": "- Step 1: At constant volume and mass, pressure is proportional to temperature in Kelvin: $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$. Substitute: $$\\frac{200}{300} = \\frac{p_2}{330}$$.\n- Step 2: $$p_2 = 200 \\times \\frac{330}{300} = 200 \\times 1.1 = 220$$ kPa. A 10% increase in Kelvin temperature gives a 10% increase in pressure — this is why leaving pressurised containers in the sun is dangerous.\n\nTakeaway: At constant volume, pressure scales linearly with Kelvin temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Density is defined as mass per unit volume, not weight per unit volume. Why does this distinction matter — what would go wrong if we defined density using weight instead of mass? (2 steps)", "answer": "- Step 1: Weight is the gravitational force on an object, $$W = mg$$, which depends on the local gravitational field strength $$g$$. If density were defined as weight per unit volume, the same lump of iron would have a different \"density\" on the Moon versus on Earth, even though the material itself hasn't changed at all.\n- Step 2: Mass is an intrinsic property of the material — the amount of matter present — and does not change with location. Defining density as $$\\rho = m/V$$ ensures that density is a property of the *substance*, not of where you happen to measure it. This makes density values universally comparable and useful for identifying materials.\n\nDensity tells you how tightly packed the matter is — that should not depend on which planet you're standing on.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A student says \"gold is heavier than wood, so gold is denser.\" What is the conceptual flaw in this reasoning, and how would you correct it? (2 steps)", "answer": "- Step 1: \"Heavier\" compares weight (or mass) alone, without accounting for volume. A 1-tonne log of wood is heavier than a 1-gram gold ring, yet gold is far denser. The flaw is conflating mass with density — density requires *both* mass *and* volume in the ratio $$\\rho = m/V$$.\n- Step 2: The correct statement is: for any given volume, gold has more mass packed into it than wood. Equivalently, gold has more mass per unit volume. A $$1\\text{ cm}^3$$ block of gold (~19.3 g) has far more mass than a $$1\\text{ cm}^3$$ block of wood (~0.5 g). Density is the ratio, not the raw mass.\n\nHeaviness depends on how much stuff you have; density depends on how tightly that stuff is packed.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Convert $$1\\text{ g/cm}^3$$ to $$\\text{kg/m}^3$$. Walk through the unit conversion logic rather than memorising a factor. (3 steps)", "answer": "- Step 1: Convert grams to kilograms. $$1\\text{ g} = 0.001\\text{ kg} = 10^{-3}\\text{ kg}$$.\n- Step 2: Convert $$\\text{cm}^3$$ to $$\\text{m}^3$$. One centimetre is $$0.01\\text{ m}$$, so $$1\\text{ cm}^3 = (0.01)^3\\text{ m}^3 = 10^{-6}\\text{ m}^3$$.\n- Step 3: Form the ratio: $$\\frac{1\\text{ g}}{1\\text{ cm}^3} = \\frac{10^{-3}\\text{ kg}}{10^{-6}\\text{ m}^3} = 10^{3}\\text{ kg/m}^3 = 1000\\text{ kg/m}^3$$.\n\nSo $$1\\text{ g/cm}^3 = 1000\\text{ kg/m}^3$$. Water's density of $$1\\text{ g/cm}^3$$ equals $$1000\\text{ kg/m}^3$$. The factor of 1000 comes from the mismatch: grams are 1000× smaller than kg, but cm³ are a *million* times smaller than m³ — the volume shrinks by a larger factor, so the ratio gets bigger.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Solids and liquids have very similar, high densities. Gases have densities roughly 1000 times lower. Explain this using the particle model — what exactly about particle spacing causes this factor of ~1000? (3 steps)", "answer": "- Step 1: In solids and liquids, particles are essentially touching — packed tightly with almost no empty space between them. Adding a tiny bit of extra space (liquid particles can slide) doesn't significantly change the average spacing, so densities remain similar.\n- Step 2: In a gas, particles are widely separated. The typical spacing between gas molecules is about 10 times the particle diameter in *each* direction. Volume goes as the cube of spacing: if particles are 10× further apart linearly, the volume per particle is roughly $$10^3 = 1000$$ times larger.\n- Step 3: Since density is mass per volume and each particle's mass is the same regardless of state, a volume that is ~1000× larger per particle means the density is ~1/1000 as large. For example, water: $$\\rho_{\\text{liquid}} \\approx 1000\\text{ kg/m}^3$$, steam: $$\\rho_{\\text{gas}} \\approx 0.6\\text{ kg/m}^3$$ — roughly three orders of magnitude less.\n\nThe ~1000× factor is a consequence of cubic scaling: linear spacing increases by ~10×, so volume (and thus the inverse of density) increases by ~10³.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A student claims \"liquids are less dense than solids because there are gaps between the liquid particles.\" Why is this wrong? (2 steps)", "answer": "- Step 1: In the particle model, there are *no* empty gaps between particles in a liquid. The particles in a liquid are touching, just as in a solid. The difference is that liquid particles have no fixed arrangement — they can slide past each other — but they are still closely packed.\n- Step 2: This is why liquids and solids have very similar densities. Water is a notable *exception* (ice is slightly less dense than liquid water) — but this is due to the open crystalline structure of ice forming hydrogen bonds that hold molecules further apart, not due to \"gaps\" in the liquid. For most substances, the solid is slightly denser, but the difference is small.\n\nLiquids flow not because there's empty space between particles, but because particles can move *past* each other while remaining in contact.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "You need to find the density of a regular rectangular metal block. You measure its mass on a balance and its dimensions with a ruler. What is the formula for density, and what must you be careful about with units before substituting? (2 steps)", "answer": "- Step 1: The density formula is $$\\rho = \\frac{m}{V}$$, where the volume of a rectangular block is $$V = l \\times w \\times h$$. So the full calculation is $$\\rho = \\frac{m}{l \\times w \\times h}$$.\n- Step 2: You must ensure consistent units. If mass is in kg, all dimensions must be in metres (so volume is in m³) to get density in kg/m³. A common error is measuring dimensions in cm but using mass in kg — this gives a wrong answer off by a factor of a million. Convert cm → m by dividing by 100 before calculating volume.\n\nAlways convert *before* multiplying dimensions, not after. $$5\\text{ cm} = 0.05\\text{ m}$$, and $$(0.05)^3 = 1.25 \\times 10^{-4}\\text{ m}^3$$, not $$5^3 = 125\\text{ cm}^3$$ carelessly divided.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "To find the density of an irregular stone, you use a eureka (displacement) can. Explain the principle: why does the volume of water that overflows equal the volume of the stone? (2 steps)", "answer": "- Step 1: The eureka can is filled with water exactly to the level of the spout. When the stone is fully submerged, it displaces water — it pushes aside a volume of water equal to the volume it occupies. This displaced water has nowhere to go but out through the spout.\n- Step 2: By conservation of volume, the stone takes up space that was previously occupied by water, so the water that overflows must have the same volume as the submerged portion of the stone. If the stone is fully submerged, $$V_{\\text{water displaced}} = V_{\\text{stone}}$$. You collect and measure this overflow in a measuring cylinder.\n\nThis works because water is incompressible and the can was initially full — any added volume forces an equal volume out.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "When using the eureka can to measure an irregular object's volume, two common errors are (a) dropping the object in and (b) not filling the can exactly to the spout. Explain how each error affects the measured volume. (2 steps)", "answer": "- Step 1: Dropping the object causes splashing — some water flies out of the can or spout that is *not* due to displacement. This means you collect more water than the true volume, so your measured volume is *too large*, and your calculated density ($$\\rho = m/V$$) is *too low*.\n- Step 2: Not filling the can exactly to the spout means some water must first fill the gap before any overflow begins. The object displaces water, but some of that water stays inside the can rather than flowing out. You collect *less* water than the true volume, so your measured volume is *too small*, and your calculated density is *too high*.\n\nLower the object gently; fill the can until water just begins to drip from the spout, then wait for dripping to stop before inserting the object.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "To find the density of a liquid, you first place an empty measuring cylinder on a balance and zero (tare) it, then add liquid and record the volume and mass. Why is taring the balance important, and what goes wrong if you skip it? (2 steps)", "answer": "- Step 1: Taring (zeroing) the balance with the empty cylinder on it means the balance reads zero with just the cylinder. When you add liquid, the balance reading gives you the mass of the liquid *alone* — no subtraction needed. This eliminates the chance of arithmetic errors in subtracting the cylinder mass.\n- Step 2: If you don't tare, you must manually subtract the cylinder's mass from the total reading. A common mistake is forgetting this step and using the total mass (cylinder + liquid) in the density formula, which makes the calculated density *too high* because you're dividing an inflated mass by the same volume.\n\nTaring is not just convenient — it prevents a systematic error that would overestimate the liquid's density.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Name all six changes of state and identify the direction (which state to which state) for each. (1 step for the list, then 1 step for a key pattern)", "answer": "- Step 1: The six changes of state are:\n+ Melting: solid → liquid\n+ Freezing: liquid → solid\n+ Boiling/Evaporating: liquid → gas\n+ Condensing: gas → liquid\n+ Subliming: solid → gas (directly)\n+ Deposition: gas → solid (directly)\n- Step 2: Notice the pattern — each forward change (melting, boiling, subliming) *absorbs* energy to break intermolecular bonds. Each reverse change (freezing, condensing, deposition) *releases* the same amount of energy as bonds form. The energy required for a forward change equals the energy released by the reverse change.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A beaker of ice is heated until it melts completely into water. A student notices the mass reading on the balance doesn't change during melting. Why is mass conserved during a change of state, and when *would* the mass reading change? (2 steps)", "answer": "- Step 1: During melting, the particles change their arrangement (from fixed positions to sliding past each other) and gain potential energy — but no particles are created or destroyed. The total number of molecules is identical before and after, so the total mass is the same. This is conservation of mass.\n- Step 2: The mass reading *would* change if molecules physically leave the beaker. For example, if water evaporates over time, water molecules escape as gas into the air, reducing the mass in the beaker. The key distinction: melting/boiling *within a closed container* conserves mass perfectly; evaporation into open air involves mass *leaving* the system, not mass being destroyed.\n\nMass is conserved during state changes because the particles themselves don't appear or vanish — they just rearrange.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Sublimation is solid → gas directly, with no liquid phase in between. Give a common example and explain why this happens at the particle level. (2 steps)", "answer": "- Step 1: Dry ice (solid CO₂) sublimates at room temperature — it turns directly from solid to gas without passing through a liquid phase. Another example is iodine crystals.\n- Step 2: At the particle level, sublimation occurs when the intermolecular forces in the solid are weak enough that surface particles can escape directly into the gas phase once they have enough kinetic energy. The external pressure also matters: at normal atmospheric pressure, CO₂'s liquid phase doesn't exist — the solid particles gain enough energy to break free entirely, skipping the intermediate liquid arrangement.\n\nSublimation is not a \"two-step\" process happening fast — it's a genuine direct transition because, at that pressure, no stable liquid phase exists for the substance.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Internal energy is the sum of two types of energy stored by particles. Name both, and state which one determines temperature. (2 steps)", "answer": "- Step 1: Internal energy = kinetic energy of particles + potential energy of particles. Kinetic energy is due to the random motion/vibration of particles. Potential energy is due to the positions of particles relative to each other — their spacing and the bonds between them.\n- Step 2: Temperature depends *only* on the average kinetic energy of the particles. Potential energy does not affect temperature. This is why, during melting, the temperature stays constant even though internal energy is increasing — the added energy goes into potential energy (breaking bonds / increasing particle spacing), not kinetic energy.\n\nHeating that raises temperature → increases kinetic energy. Heating that changes state → increases potential energy. Same energy input, different effect.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "On a heating curve (temperature vs time), there are sloped sections and flat plateau sections. Explain what is happening to energy at each type of section, and why the plateaus are horizontal. (3 steps)", "answer": "- Step 1: On the sloped (rising) sections, the substance is in a single state (solid, liquid, or gas). The energy supplied increases the kinetic energy of the particles, raising the temperature. All the energy goes into making particles move/vibrate faster.\n- Step 2: On the flat plateau sections, the substance is changing state (e.g., melting or boiling). The energy supplied goes into increasing the *potential* energy — breaking intermolecular bonds and increasing particle spacing. Since kinetic energy (and therefore temperature) does not change, the temperature stays constant, creating the horizontal plateau.\n- Step 3: The plateaus are horizontal because temperature is determined solely by average kinetic energy, which is not changing during the state change. Energy is still being absorbed, but it is \"hidden\" in potential energy — this is the origin of the word \"latent\" (hidden) in \"latent heat.\"\n\nThe flat sections are the visual signature that energy is going into breaking bonds, not speeding up particles.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A student says \"during boiling, the temperature doesn't change because no energy is being supplied.\" Why is this incorrect, and what is the correct explanation? (2 steps)", "answer": "- Step 1: Energy *is* being supplied continuously during boiling — the heater is still on. If no energy were supplied, boiling would stop. The error is assuming \"no temperature change = no energy input.\"\n- Step 2: The correct explanation: all the energy supplied during boiling goes into overcoming intermolecular forces (increasing potential energy) so that particles can escape from the liquid surface as gas. None of the energy goes into increasing kinetic energy, so the temperature remains constant. The energy is there — it's just being used for bond-breaking rather than speeding up particles.\n\nThe plateau on a heating curve doesn't mean the heater is off — it means the energy has a different job to do.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "Specific heat capacity ($$c$$) and specific latent heat ($$L$$) are both about energy and substances, but they apply in different situations. What is the key distinction between when you use each one? (2 steps)", "answer": "- Step 1: Specific heat capacity ($$c$$) applies when a substance changes *temperature* while staying in the *same state*. The formula is $$\\Delta Q = mc\\Delta\\theta$$ — you need a temperature change $$\\Delta\\theta$$. Example: heating water from 20°C to 80°C.\n- Step 2: Specific latent heat ($$L$$) applies when a substance changes *state* with *no* temperature change. The formula is $$Q = mL$$ — there is no $$\\Delta\\theta$$ term. Example: melting ice at 0°C into water at 0°C. The energy goes entirely into breaking or forming bonds, not into changing particle speeds.\n\nIf the temperature is changing → use $$c$$. If the state is changing (at constant temperature) → use $$L$$. A full heating problem may require *both* equations at different stages.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "Water has a specific heat capacity of 4200 J/kg°C, while copper has about 385 J/kg°C. Explain what this means in practical terms: which heats up faster and why? (2 steps)", "answer": "- Step 1: Copper's $$c$$ is roughly 11 times smaller than water's. This means it takes only ~1/11 as much energy to raise 1 kg of copper by 1°C compared to 1 kg of water. Less energy needed per degree → copper heats up much faster for the same power input.\n- Step 2: Conversely, water can absorb a lot of energy with only a small temperature rise. This is why water is used in central heating systems and cooling systems — it stores a lot of thermal energy without getting dangerously hot. Copper, with its low $$c$$, responds quickly to heating and cooling.\n\nHigh $$c$$ = thermal \"sponge\" (absorbs lots of energy, temperature barely moves). Low $$c$$ = thermal \"sprinter\" (temperature changes rapidly with small energy).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "The specific latent heat of vaporisation of water ($$L_v = 2.26\\text{ MJ/kg}$$) is about 7 times larger than the specific latent heat of fusion ($$L_f = 330\\text{ kJ/kg}$$). Explain why, in terms of what happens to particles in each transition. (3 steps)", "answer": "- Step 1: Fusion (melting) means solid → liquid. Particles go from vibrating in fixed positions to being able to slide past each other, but they remain essentially in contact. Only *some* intermolecular bonds are broken — enough for particles to move, but they're still close together.\n- Step 2: Vaporisation (boiling) means liquid → gas. Particles must break free from *all* their neighbours and move far apart. Virtually all intermolecular bonds must be completely overcome, and particles need enough energy to escape the liquid entirely and exist independently in the gas phase.\n- Step 3: Breaking all bonds and separating particles completely (vaporisation) requires far more energy per kg than just loosening the structure enough for flow (fusion). The ratio $$L_v / L_f \\approx 7$$ for water reflects how much more energy-intensive it is to fully separate particles compared to just partially freeing them.\n\nFusion loosens the structure; vaporisation destroys it completely. That's why boiling off water takes far more energy than melting the same mass of ice.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "You have 2 kg of water at 20°C and want to heat it to 80°C. The specific heat capacity of water is 4200 J/kg°C. Without doing the full calculation, estimate the order of magnitude of energy required. (2 steps)", "answer": "- Step 1: The formula is $$\\Delta Q = mc\\Delta\\theta$$. Identify the values: $$m = 2\\text{ kg}$$, $$c = 4200\\text{ J/kg°C}$$, $$\\Delta\\theta = 80 - 20 = 60\\text{°C}$$. For a quick estimate, round: $$c \\approx 4000$$, $$\\Delta\\theta \\approx 60$$.\n- Step 2: $$\\Delta Q \\approx 2 \\times 4000 \\times 60 = 2 \\times 240000 = 480000\\text{ J} \\approx 5 \\times 10^5\\text{ J}$$, which is roughly 500 kJ. The exact answer is $$2 \\times 4200 \\times 60 = 504000\\text{ J}$$. The order of magnitude is $$10^5\\text{ J}$$ — hundreds of kilojoules.\n\nFor mental estimation: mass × ~4000 × temperature change. A 2 kg kettle boiling from room temperature needs hundreds of kJ — which is why kettles are high-power devices (~2–3 kW running for a couple of minutes).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "You have 0.5 kg of ice at 0°C and want to melt it completely (no temperature change). The specific latent heat of fusion of water is 330 kJ/kg. Estimate the energy required. (2 steps)", "answer": "- Step 1: The formula is $$Q = mL_f$$. Here $$m = 0.5\\text{ kg}$$ and $$L_f = 330\\text{ kJ/kg} = 330000\\text{ J/kg}$$.\n- Step 2: $$Q = 0.5 \\times 330000 = 165000\\text{ J} = 165\\text{ kJ}$$. Roughly 170 kJ to melt half a kilogram of ice at 0°C into water at 0°C — with no temperature change at all.\n\nNote: melting 0.5 kg of ice takes ~165 kJ. Compare with heating 0.5 kg of water by 80°C: $$0.5 \\times 4200 \\times 80 = 168\\text{ kJ}$$. Roughly the same energy — but one changes state, the other changes temperature. This shows how large latent heat values really are.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "In Core Practical 6, you investigate the specific heat capacity of water using an immersion heater. The electrical energy supplied is calculated as $$E = VIt$$. Why can't you simply assume all this energy goes into heating the water? (2 steps)", "answer": "- Step 1: Some of the electrical energy heats the immersion heater itself before the water gets warm. During the initial moments, energy goes into raising the heater's temperature, not the water's. This is why you should only use data from the *straight-line region* of the graph — after the heater has reached a steady state.\n- Step 2: More importantly, thermal energy is lost to the surroundings (air, beaker, bench) throughout the experiment. Because some energy escapes, the water receives *less* energy than $$VIt$$ calculates. To reach the same $$\\Delta\\theta$$, you need more energy input, which means when you calculate $$c = \\frac{\\Delta Q}{m\\Delta\\theta}$$, using $$VIt$$ as $$\\Delta Q$$ gives a value of $$c$$ that is *too high* (the denominator $$m\\Delta\\theta$$ is correct, but the energy is inflated by losses).\n\nEnergy loss to surroundings → measured $$c$$ is an overestimate. This is a systematic error, not random.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "In the SHC practical, you plot a graph of energy supplied (y-axis) against $$m\\Delta\\theta$$ (x-axis). How does the gradient give you the specific heat capacity, and why is this method better than a single calculation? (2 steps)", "answer": "- Step 1: From $$\\Delta Q = mc\\Delta\\theta$$, rearranging gives $$\\Delta Q = c \\cdot (m\\Delta\\theta)$$. This is in the form $$y = (\\text{gradient}) \\cdot x$$, so the gradient of the graph equals $$c$$, the specific heat capacity.\n- Step 2: Using the gradient is more reliable than a single calculation because it uses *all* the data points together, effectively averaging over many measurements. A single calculation from one data point could be distorted by a reading error. The gradient also makes it easy to identify and ignore anomalous points that don't lie on the straight line.\n\nThe straight-line method is a powerful experimental technique: it turns a noisy repeated measurement into a single, robust value.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In the melting ice practical (Core Practical 6), you plot a heating curve of temperature vs time for ice being heated. What does the graph look like and what does each section represent? (3 steps)", "answer": "- Step 1: Initially, the temperature of the ice rises steadily from below 0°C toward 0°C. This is a sloped line — energy is increasing the kinetic energy of the vibrating ice particles (still in solid state).\n- Step 2: At 0°C, the graph flattens into a horizontal plateau. The ice is melting — energy goes into breaking bonds (potential energy), not kinetic energy. Temperature stays at 0°C until all ice has melted.\n- Step 3: After all ice has melted, the temperature of the water rises again — another sloped section. Energy now increases the kinetic energy of the liquid water molecules. If heating continued to 100°C, another plateau would appear for boiling.\n\nThe heating curve is a visual map of where energy is going: slopes = kinetic energy (temperature rises), plateaus = potential energy (state changes).", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Thermal insulation slows heat transfer but does not stop it. Explain why, using the three mechanisms of heat transfer (conduction, convection, radiation) and how insulation addresses each. (3 steps)", "answer": "- Step 1: Conduction — heat transfers through a material when vibrating particles pass energy to neighbours. Insulators are poor conductors because they lack free electrons and have particles that are far apart. Trapped air in insulation is particularly effective because air molecules are widely spaced, making energy transfer by collision very slow.\n- Step 2: Convection — hot fluid expands, becomes less dense, and rises; cool fluid sinks, creating a circulation that transfers heat rapidly. Trapped air in insulation *cannot* convect because the air pockets are too small and enclosed — the air can't circulate, so convection is blocked.\n- Step 3: Radiation — infrared radiation transfers heat through empty space (no medium needed). Shiny/reflective surfaces reduce radiation by reflecting infrared back rather than absorbing/emitting it. Insulation with foil layers addresses this mechanism.\n\nInsulation is a multi-layered defence: trapped air stops conduction and convection; reflective surfaces reduce radiation. But none of these mechanisms is perfectly eliminated — heat still transfers, just more slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "A student wraps a beaker of hot water in cotton wool and says \"the cotton wool stops the heat escaping.\" Why is the word \"stops\" wrong? (2 steps)", "answer": "- Step 1: Cotton wool is a good insulator because it contains a lot of trapped air, which is a poor conductor and can't convect in small pockets. This *slows down* the rate of heat loss significantly compared to an uninsulated beaker.\n- Step 2: However, heat still transfers through the insulation — just more slowly. There is no perfect insulator. Over time, the water will still cool to room temperature (thermal equilibrium). The cotton wool increases the *time* this takes, but doesn't prevent it. \"Stops\" implies zero heat transfer, which is impossible for any real material.\n\nInsulation reduces the *rate* of heat transfer, not the *existence* of heat transfer. Think of it as a brake, not a wall.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Thermal equilibrium is reached when an object and its surroundings are at the same temperature. A student says \"at thermal equilibrium, the object has no energy.\" Why is this wrong? (2 steps)", "answer": "- Step 1: At thermal equilibrium, there is no *net* heat transfer between the object and its surroundings. This means the rate of heat flow out equals the rate of heat flow in — they balance. But the particles inside the object still have kinetic energy (they're still vibrating/moving), just at a level consistent with the equilibrium temperature.\n- Step 2: The only way an object would have truly \"no energy\" is at absolute zero (0 K), where all particle motion stops. At room temperature equilibrium, particles have substantial kinetic energy — typically moving at hundreds of metres per second. \"No net heat flow\" is not the same as \"no energy.\"\n\nThermal equilibrium means balanced energy exchange, not zero energy. The particles are still busy — they just aren't getting hotter or colder.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "What is Brownian motion, and why is it significant — what does it prove about the nature of matter? (3 steps)", "answer": "- Step 1: Brownian motion is the random, zig-zag motion observed in small particles (like smoke or pollen grains) suspended in a fluid (air or water). Under a microscope, these visible particles jitter unpredictably in all directions.\n- Step 2: This zig-zag motion is caused by the bombardment of the visible particle by many much smaller, invisible molecules of the surrounding fluid. Because the bombardment is random, at any instant more molecules may hit one side than another, giving the visible particle a net push in a random direction.\n- Step 3: Brownian motion is direct evidence that: (1) matter is made of particles (molecules exist), and (2) these particles are in continuous, random motion. It is NOT the motion of the molecules themselves (they're too small to see) — it is the *visible effect* of invisible molecular collisions on a larger particle.\n\nBrownian motion converts the invisible (molecular motion) into the visible (jittering smoke) — it's the bridge between the particle model and observable reality.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A student observes Brownian motion in smoke cells and says \"the smoke particles are the molecules of air moving randomly.\" What is the misconception, and how would you correct it? (2 steps)", "answer": "- Step 1: The smoke particles are *not* the air molecules. Smoke particles are much larger — they are visible under a microscope. Air molecules (N₂, O₂) are far too small to see even with a microscope. The student is confusing the visible particle with the invisible molecules.\n- Step 2: The correct explanation: the *air molecules* are the invisible, fast-moving particles that bombard the visible *smoke particles* from all sides. The random imbalance of these collisions causes the smoke particle to jitter. We see the smoke's zig-zag path; we infer the air molecules' existence and random motion from it.\n\nBrownian motion is evidence *of* molecular motion, not a direct observation *of* it. The smoke is the victim of the bombardment, not the bombarder.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "Gas pressure arises from molecular collisions with container walls. Explain the mechanism: how do tiny molecular impacts create a measurable, steady force on the wall? (3 steps)", "answer": "- Step 1: Each gas molecule that strikes the wall exerts a tiny force on it for a brief instant during the collision (it bounces off, changing momentum, and by Newton's second/third laws, this requires a force on the wall).\n- Step 2: A single molecule's impact is negligible, but there are an enormous number of molecules — on the order of $$10^{25}$$ per m³ in air at room conditions. Each molecule collides with the wall millions of times per second. The vast number of collisions happening continuously smooths out into a steady, measurable average force.\n- Step 3: Pressure is force per unit area: $$p = F/A$$. The total force on the wall (sum of all molecular impacts) divided by the wall area gives the pressure. The force is always perpendicular to the wall because the component of molecular velocity parallel to the wall doesn't contribute to the normal force.\n\nPressure is the statistical average of countless microscopic collisions — it's steady because the sheer number of impacts smooths out the randomness.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Absolute zero is defined as −273°C or 0 K. Explain what absolute zero means at the particle level, and why it is impossible to reach a temperature below it. (2 steps)", "answer": "- Step 1: At absolute zero, particles have *zero kinetic energy* — they are completely motionless. No vibration, no translation, no rotation. Since temperature is defined by average kinetic energy, zero kinetic energy means zero temperature. This is the theoretical minimum.\n- Step 2: You cannot go below absolute zero because you cannot have *negative* kinetic energy. Kinetic energy is $$\\frac{1}{2}mv^2$$, which is always ≥ 0. If particles are already stationary (zero KE), there is no way to \"remove more energy\" — there's nothing left to remove. It's the floor, not just a very low value.\n\nAbsolute zero is not \"very cold\" — it is the fundamental lower bound imposed by the definition of kinetic energy as a squared quantity.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Convert 27°C to Kelvin, and explain why the Kelvin scale starts at absolute zero rather than at the freezing point of water. (2 steps)", "answer": "- Step 1: Using $$T/\\text{K} = \\theta/°\\text{C} + 273$$: $$T = 27 + 273 = 300\\text{ K}$$. A change of 1 K equals a change of 1°C — the scale steps are the same size, just shifted.\n- Step 2: The Kelvin scale starts at absolute zero because absolute zero is the true physical zero of temperature — the point where particle motion stops. The Celsius scale's zero (freezing point of water) is an arbitrary, human-chosen reference point. Starting at absolute zero means Kelvin temperatures are directly proportional to average kinetic energy: double the Kelvin temperature → double the average KE. This makes Kelvin the physically meaningful scale; Celsius is just a convenient offset.\n\nKelvin tells you about the physics of particles; Celsius tells you about the weather.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A temperature of −300°C does not exist. Explain why, using the relationship between temperature and particle kinetic energy. (2 steps)", "answer": "- Step 1: Temperature is a measure of the average kinetic energy of particles. Kinetic energy is $$\\frac{1}{2}mv^2$$, which is always zero or positive — it cannot be negative. Since temperature is proportional to kinetic energy, temperature cannot be negative on the Kelvin scale.\n- Step 2: Absolute zero is 0 K = −273°C. This is the lowest possible temperature. A value of −300°C would correspond to $$T = -300 + 273 = -27\\text{ K}$$, which is impossible — it would require negative kinetic energy. No such temperature can exist.\n\nThe Kelvin scale has a hard floor at 0 K. The Celsius scale can show negative numbers (because its zero is arbitrary), but nothing below −273°C is physically real.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "For a fixed mass of gas at constant temperature, compressing the gas (reducing volume) increases the pressure. Explain this using the molecular collision model — what physically changes at the wall? (3 steps)", "answer": "- Step 1: When you compress the gas into a smaller volume, the same number of molecules are now confined to a smaller space. The molecules are closer together and travel shorter distances between wall collisions.\n- Step 2: Each molecule hits the wall more frequently (shorter distance to travel before reaching a wall) and the total wall area is smaller. More collisions per second on a smaller area means the force per unit area (pressure) increases.\n- Step 3: Importantly, the *average speed* of molecules has not changed (temperature is constant, so kinetic energy is constant). The pressure increase is purely due to geometry — same-speed molecules, but hitting a smaller wall more often. This is Boyle's Law: at constant $$T$$, $$pV = \\text{constant}$$.\n\nSame molecules, same speeds, smaller box → more frequent wall hits → higher pressure. It's a crowd-in-a-room effect.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "For a fixed mass of gas at constant *volume*, heating the gas increases the pressure. Explain why using the particle model — what changes about the collisions? (2 steps)", "answer": "- Step 1: Heating increases the temperature, which increases the average kinetic energy and therefore the average speed of the molecules. Faster molecules have more momentum, so each collision with the wall delivers a larger impulse (force × time), creating a larger force on the wall per collision.\n- Step 2: Faster molecules also travel between collisions more quickly, so they hit the walls *more frequently*. Both effects — harder hits and more frequent hits — contribute to increased pressure. The volume hasn't changed, so the wall area is the same, but the force on it has increased.\n\nAt constant volume: higher temperature → faster molecules → harder and more frequent collisions → higher pressure. Both factors reinforce each other.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "State Boyle's Law in both its equation forms and specify the conditions under which it is valid. What happens if those conditions are violated? (2 steps)", "answer": "- Step 1: Boyle's Law states that for a fixed mass of gas at constant temperature, pressure and volume are inversely proportional. The two forms are: $$pV = \\text{constant}$$ and $$p_1 V_1 = p_2 V_2$$. If volume halves, pressure doubles (and vice versa), provided $$T$$ and mass don't change.\n- Step 2: The law is *only* valid when both temperature and mass of gas are constant. If temperature changes, the molecules' speeds change (affecting collision force and frequency), so $$pV$$ is no longer constant. If mass changes (e.g., gas leaks), the number of molecules changes, directly affecting the number of collisions and thus pressure.\n\nBoyle's Law assumes: same gas, same amount, same temperature. Violate any of these and $$p_1 V_1 \\neq p_2 V_2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A gas has initial pressure 200 Pa and volume 0.70 m³. The volume is compressed to 0.15 m³ at constant temperature. Without a calculator, determine whether the final pressure is above or below 1000 Pa, and explain your reasoning. (2 steps)", "answer": "- Step 1: By Boyle's Law: $$p_2 = \\frac{p_1 V_1}{V_2} = \\frac{200 \\times 0.70}{0.15}$$. First compute the numerator: $$200 \\times 0.70 = 140$$.\n- Step 2: Now divide: $$\\frac{140}{0.15} = \\frac{140}{0.15}$$. Note that $$\\frac{140}{0.1} = 1400$$ and $$\\frac{140}{0.2} = 700$$. Since 0.15 is between 0.1 and 0.2, the answer is between 700 and 1400. More precisely, $$\\frac{140}{0.15} = \\frac{14000}{15} \\approx 933\\text{ Pa}$$. So the final pressure is below 1000 Pa but close to it.\n\nThe key check: volume decreased by a factor of roughly 5 (0.70 → 0.15), so pressure should increase by roughly 5× (200 → ~1000 Pa). This quick ratio check confirms the answer is in the right ballpark.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When you pump a bicycle tyre with a hand pump, the pump gets warm. A student says \"this is because the air inside gets hot from the room.\" What is the real explanation? (3 steps)", "answer": "- Step 1: The warmth is not from the room temperature — it's from *doing work on the gas*. When you push the pump handle, you apply a force through a distance, compressing the air. This mechanical work transfers energy to the gas molecules.\n- Step 2: The work done increases the internal energy of the gas. The molecules gain kinetic energy (they move faster), which means the temperature of the gas rises. This is a direct conversion: mechanical energy → thermal energy.\n- Step 3: The warm pump transfers some of this thermal energy to the pump body, which you feel as warmth. This is distinct from heat transfer — no thermal contact with a hot object caused the warming; it was mechanical compression. If the gas were allowed to expand again (doing work on the surroundings), it would cool down.\n\nCompressing a gas does work *on* it → internal energy ↑ → temperature ↑. The warmth is earned, not borrowed.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "When a CO₂ fire extinguisher is discharged, dry ice (solid CO₂) can form at the nozzle. Explain this using the concept of a gas doing work on its surroundings. (3 steps)", "answer": "- Step 1: Inside the extinguisher, CO₂ gas is at high pressure. When the valve opens, the gas expands rapidly out of the nozzle into the atmosphere — the gas does work *on* the surrounding air by pushing it aside.\n- Step 2: Doing work requires energy. The gas loses internal energy to pay for this work — its molecules slow down, so the average kinetic energy drops, and the temperature falls dramatically.\n- Step 3: The temperature drops so much (well below −78°C) that the CO₂ undergoes deposition (gas → solid directly), forming dry ice at the nozzle. This is the reverse of the bicycle pump effect: instead of work being done *on* the gas (compression → heating), the gas does work *on* its surroundings (expansion → cooling).\n\nCompression → work on gas → heats up. Expansion → gas does work → cools down. Same physics, opposite direction.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A sealed container of gas is heated. Explain what happens to the pressure, and why you cannot use Boyle's Law to analyse this situation. (2 steps)", "answer": "- Step 1: Heating a sealed container increases the gas temperature. The molecules move faster, hitting the walls harder and more frequently, so the pressure increases. The volume is constant (rigid container), so this is a constant-volume process, not a constant-temperature process.\n- Step 2: Boyle's Law requires *constant temperature*, but here temperature is changing. Boyle's Law says $$pV = \\text{constant}$$ only when $$T$$ is fixed. In this situation, both $$p$$ and $$T$$ are changing while $$V$$ is fixed — the relationship is $$p \\propto T$$ (at constant volume), not $$p \\propto 1/V$$.\n\nBoyle's Law is the wrong tool here because the condition (constant T) is violated. Instead, use the qualitative relationship: constant volume + higher temperature → higher pressure.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "You need to calculate the density of a cylindrical metal rod. What formula do you use for volume, and what is a common mistake when measuring the dimensions? (2 steps)", "answer": "- Step 1: The volume of a cylinder is $$V = \\pi r^2 h$$, where $$r$$ is the radius and $$h$$ is the height (or length) of the cylinder. The density is then $$\\rho = \\frac{m}{\\pi r^2 h}$$.\n- Step 2: The most common mistake is using the *diameter* instead of the *radius* in the formula. If you measure the diameter $$d$$ with calipers, you must use $$r = d/2$$. Using $$d$$ directly in $$\\pi r^2$$ would give a volume that is 4× too large (since $$(d/2)^2 = d^2/4$$, and substituting $$d$$ instead gives $$d^2$$, which is 4 times $$d^2/4$$).\n\nRadius, not diameter, goes into the cylinder volume formula. A Vernier caliper measures diameter — halve it first.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "In the density practical for an irregular object, why must you measure the mass *before* placing the object in water, rather than after? (2 steps)", "answer": "- Step 1: You must measure the dry mass first because after submerging the object in water, it may retain water on its surface or absorb water into pores/cracks. This adds extra mass that is not part of the object itself.\n- Step 2: If you measure mass after the water displacement, the wet object will have a higher mass reading. Using this inflated mass in $$\\rho = m/V$$ would give a density that is *too high* — you'd be dividing the mass of \"object + water\" by the volume of just the object.\n\nAlways: mass first (dry), then volume (wet). The order matters because water sticks.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "The electrical energy equation $$E = VIt$$ is used in the SHC practical to determine energy supplied by the heater. If you record time in minutes instead of seconds, what happens to your calculated value of $$c$$? (3 steps)", "answer": "- Step 1: The formula requires time in seconds. If you accidentally use time in minutes (e.g., 5 minutes as \"5\" instead of 300 seconds), the calculated energy $$E = VIt$$ will be 60 times too small.\n- Step 2: A smaller energy value means you think less energy was needed to achieve the same temperature rise. When you calculate $$c = \\frac{E}{m\\Delta\\theta}$$, using an energy that is 60× too small gives a specific heat capacity that is 60× too small.\n- Step 3: For example, if the true $$c$$ of water is 4200 J/kg°C, your incorrect calculation might give ~70 J/kg°C — a wildly wrong answer that should immediately signal an error. Always convert minutes to seconds (multiply by 60).\n\nTime in seconds, always. Minutes × 60 = seconds. This is the single most common unit error in this practical.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "On a heating curve, the plateaus for melting and boiling have different lengths (the boiling plateau is longer for the same mass). What does the relative length of each plateau tell you, and why is the boiling plateau longer? (2 steps)", "answer": "- Step 1: The length of a plateau on a temperature-time graph (with constant power input) corresponds to the amount of energy required for that state change. A longer plateau means more energy is needed. Since power is constant, energy is proportional to time.\n- Step 2: The boiling plateau is longer because the specific latent heat of vaporisation ($$L_v$$) is much larger than the specific latent heat of fusion ($$L_f$$). For water, $$L_v = 2.26\\text{ MJ/kg}$$ vs $$L_f = 330\\text{ kJ/kg}$$ — about 7× more energy per kg. With the same heating power, it takes ~7× longer to boil off a given mass than to melt it, so the boiling plateau is ~7× longer.\n\nPlateau length ∝ latent heat. The boiling plateau's greater length is the graphical fingerprint of $$L_v > L_f$$.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "A substance is heated at a constant rate. Sketch the sequence of a heating curve starting from a solid well below its melting point. Identify each section and the state of the substance. (3 steps)", "answer": "- Step 1: **First slope (rising):** Solid is being heated. Temperature increases as kinetic energy of vibrating particles rises. The substance is entirely solid.\n- Step 2: **First plateau (flat):** Melting occurs at the melting point. Temperature is constant; energy breaks intermolecular bonds (potential energy increases). The substance is a *mixture* of solid and liquid during this section.\n- Step 3: **Second slope (rising):** Liquid is being heated above the melting point. Temperature increases as kinetic energy of moving liquid particles rises. The substance is entirely liquid. (If heating continues to the boiling point, a second plateau would appear for vaporisation, followed by a third slope for the gas.)\n\nThe curve reads: slope → plateau → slope → plateau → slope, corresponding to: solid heating → melting → liquid heating → boiling → gas heating.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "\"Doing work on a gas\" and \"heating a gas\" both increase internal energy. What is the fundamental difference between these two processes? (2 steps)", "answer": "- Step 1: \"Doing work on a gas\" is a *mechanical* energy transfer. You apply a force through a distance (e.g., pushing a piston) to compress the gas. No temperature difference is required — the energy comes from your mechanical effort. The gas gains kinetic energy because the moving piston \"bounces\" molecules back faster, like a bat hitting a ball.\n- Step 2: \"Heating a gas\" is a *thermal* energy transfer driven by a temperature difference. Energy flows from the hotter surroundings to the cooler gas. No mechanical force or displacement is involved — the energy transfer is due to the temperature gradient.\n\nBoth increase internal energy, but work is mechanical (force × distance) and heat is thermal (driven by temperature difference). The first law of thermodynamics unifies them: $$\\Delta U = Q + W$$ (change in internal energy = heat added + work done on the system).", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "When a piston compresses a gas, the molecules bounce off the *moving* piston and gain speed. Explain this microscopically — why does a moving piston make molecules faster, but a stationary piston at th
