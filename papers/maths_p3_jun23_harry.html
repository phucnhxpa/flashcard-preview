= x are equal). These intersection points are called fixed points.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Write down the three forms of the cosine double angle identity. (1 step)", "answer": "$$\\cos(2A) = \\cos^2(A) - \\sin^2(A) = 2\\cos^2(A) - 1 = 1 - 2\\sin^2(A)$$\nAll three forms are equivalent due to the Pythagorean identity sin²(A) + cos²(A) = 1. Choose the form that best suits the given information in a problem.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Prove that sin(3x) = 3sin(x) - 4sin³(x). (3 steps)", "answer": "- Step 1: Write sin(3x) = sin(2x + x) and use the angle addition formula: sin(2x + x) = sin(2x)cos(x) + cos(2x)sin(x)\n- Step 2: Substitute the double angle formulas: sin(2x) = 2sin(x)cos(x), cos(2x) = cos²(x) - sin²(x)\nSo: = [2sin(x)cos(x)]cos(x) + [cos²(x) - sin²(x)]sin(x) = 2sin(x)cos²(x) + sin(x)cos²(x) - sin³(x)\n- Step 3: Simplify: = 3sin(x)cos²(x) - sin³(x). Using cos²(x) = 1 - sin²(x): = 3sin(x)(1 - sin²(x)) - sin³(x) = 3sin(x) - 3sin³(x) - sin³(x) = 3sin(x) - 4sin³(x)", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A student writes sin(2A) = sin(A)cos(A). What is missing, and why is this a common error? (1 step)", "answer": "The coefficient 2 is missing. The correct identity is sin(2A) = 2sin(A)cos(A). Students often forget the factor of 2 because they see the \"2\" in cos(2A) and assume it's only in the cosine identity. This is a memorization error — the 2 appears in both sin(2A) and cos(2A).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Given that tan(A) = 2, find tan(2A) using the double angle formula. (2 steps)", "answer": "- Step 1: Use the formula $$\\tan(2A) = \\frac{2\\tan(A)}{1 - \\tan^2(A)} = \\frac{2(2)}{1 - 2^2} = \\frac{4}{1 - 4} = \\frac{4}{-3} = -\\frac{4}{3}$$\n- Step 2: Note that if 1 - tan²(A) = 0 (i.e., tan(A) = ±1), then tan(2A) would be undefined (vertical asymptote), because tan(2A) = tan(90°) at those points.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the derivative of ∫cos(ax+b) dx, and how does the reverse chain rule work for trigonometric integrals? (1 step)", "answer": "$$\\int \\cos(ax+b) \\, dx = \\frac{1}{a}\\sin(ax+b) + c$$\nThe reverse chain rule works by \"dividing by the coefficient of x\" inside the trig function. More generally, for ∫f(ax+b) dx, the result is (1/a)F(ax+b) + c, where F is an antiderivative of f.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Evaluate ∫sin(3x) dx and ∫sec²(5x) dx. (2 steps)", "answer": "- Step 1: ∫sin(3x) dx = -cos(3x)/3 + c. (Divide by the coefficient 3)\n- Step 2: ∫sec²(5x) dx = tan(5x)/5 + c. (Since ∫sec²(u) du = tan(u), divide by 5)", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Evaluate ∫(2cos(x) + 3sin(x)) dx. (1 step)", "answer": "$$\\int (2\\cos(x) + 3\\sin(x)) \\, dx = 2\\sin(x) - 3\\cos(x) + c$$\nRemember: ∫cos(x) dx = sin(x), ∫sin(x) dx = -cos(x). Just integrate each term separately with its coefficient.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "For f(x) = e^x, what are the domain, range, and what is f⁻¹(x)? Explain using the concept of inverse functions. (2 steps)", "answer": "- Step 1: Domain of f: all real numbers (ℝ) because e^x is defined for all x. Range: y > 0 (positive real numbers).\n- Step 2: To find f⁻¹: swap x and y → x = e^y → take ln of both sides → y = ln(x). So f⁻¹(x) = ln(x). The domain of f⁻¹ is x > 0 (the range of f), and the range of f⁻¹ is ℝ (the domain of f).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "The function f(x) = x² - 4 has domain x ≤ 0. Find f⁻¹(x) and its domain. (3 steps)", "answer": "- Step 1: y = x² - 4\n- Step 2: Swap x and y: x = y² - 4\n- Step 3: Solve: y² = x + 4 ⇒ y = ±√(x + 4). Since the original domain is x ≤ 0 (we take non-positive x), the range of f will be y ≤ -4 (when x = 0, y = -4; as x becomes more negative, y increases). Taking the negative square root gives y ≤ -4. So f⁻¹(x) = -√(x + 4), with domain x ≥ -4.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Why does the sign change method only guarantee at least one root, not exactly one? Give an example where f(a) and f(b) have opposite signs but there are two roots in (a, b). (1 step)", "answer": "Consider a cubic that dips below the x-axis and then comes back up, crossing twice in one interval. For example, f(x) = x³ - x on the interval [-2, 2]: f(-2) = -8 + 2 = -6 (negative), f(2) = 8 - 2 = 6 (positive), but f(x) = 0 at x = -1, 0, and 1 — three roots in the interval. The sign change only guarantees an odd number of roots (at least one).", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "For the iteration x_{n+1} = g(x_n), the graph of y = g(x) and y = x are shown. How can you tell if the iteration will converge to the intersection point? (1 step)", "answer": "If the graph of y = g(x) crosses y = x with a slope steeper than 1 (|g'(x)| > 1), the iteration diverges (oscillates or runs away). If the slope is shallower than 1 (|g'(x)| < 1) at the intersection, the iteration converges. Visualize: if g(x) is \"flatter\" than the line y = x near the intersection, the iterations approach the fixed point like a staircase or cobweb.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "Using the identity cos(2A) = 2cos²(A) - 1, derive an expression for cos²(A) in terms of cos(2A). (1 step)", "answer": "From cos(2A) = 2cos²(A) - 1:\n$$2\\cos^2(A) = \\cos(2A) + 1$$\n$$\\cos^2(A) = \\frac{\\cos(2A) + 1}{2}$$\nThis is very useful for integrating powers of cosine: ∫cos²(x) dx = ∫(1 + cos(2x))/2 dx.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A function is defined as f(x) = ln(x - 2) + 1. What is its domain? What transformation has been applied to the basic ln(x) graph? (2 steps)", "answer": "- Step 1: Domain: x - 2 > 0 ⇒ x > 2. This is a horizontal shift to the right by 2 units.\n- Step 2: The +1 outside the ln is a vertical shift upward by 1 unit. So the graph passes through (3, 1) (since ln(1) = 0, then +1 = 1), and has a vertical asymptote at x = 2.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Solve the simultaneous equations y = x² and y = 2x + 3 graphically or algebraically. How many intersection points are there? (2 steps)", "answer": "- Step 1: Set x² = 2x + 3 ⇒ x² - 2x - 3 = 0 ⇒ (x - 3)(x + 1) = 0 ⇒ x = 3 or x = -1\n- Step 2: Find y-values: when x = 3, y = 9 (from both equations); when x = -1, y = 1 (from y = x² = 1, and y = 2(-1) + 3 = 1). Two intersection points: (3, 9) and (-1, 1).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why can't we simply say \"the inverse of f(x) = x² is f⁻¹(x) = √x\"? What restriction is needed? (1 step)", "answer": "Because f(x) = x² is not one-to-one over its entire domain (ℝ) — it fails the horizontal line test. We need to restrict the domain to x ≥ 0 (or x ≤ 0) to make it invertible. Without this restriction, √x would only give the positive root, but x² produces both positive and negative outputs for the same y-value.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Evaluate ∫(sin(x) + cos(x))² dx. Hint: expand first, then use identities. (2 steps)", "answer": "- Step 1: Expand: (sin x + cos x)² = sin²x + 2sin x cos x + cos²x = (sin²x + cos²x) + 2sin x cos x = 1 + sin(2x)\n- Step 2: Integrate: ∫(1 + sin(2x)) dx = ∫1 dx + ∫sin(2x) dx = x - (1/2)cos(2x) + c", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Find all solutions to sin(2x) = cos(2x) in the interval [0, 2π]. (2 steps)", "answer": "- Step 1: sin(2x) = cos(2x) ⇒ tan(2x) = 1 (provided cos(2x) ≠ 0). So 2x = π/4 + nπ, where n is an integer.\n- Step 2: Divide by 2: x = π/8 + nπ/2. In [0, 2π]: x = π/8, 5π/8, 9π/8, 13π/8. These are the four solutions. (Check: when cos(2x) = 0, tan is undefined, so those aren't solutions.)", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "The function h(x) = f(g(x)) is defined. If g(2) = 5 and f(5) = 3, what is h(2)? Explain the process. (1 step)", "answer": "h(2) = f(g(2)) = f(5) = 3. For composite functions, you evaluate the inner function first (g), then apply the outer function (f) to that result. The notation fg means \"f of g\" — apply g first, then f.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A student applies the iteration x_{n+1} = (x_n)² + 1 starting with x_0 = 0.5. Describe what happens to the sequence. (1 step)", "answer": "Starting with x_0 = 0.5: x_1 = 0.5² + 1 = 1.25; x_2 = 1.25² + 1 ≈ 2.56; x_3 ≈ 7.55; x_4 ≈ 58; the values quickly blow up to infinity. This iteration diverges for this initial guess. The fixed point (solving x = x² + 1) would require x² - x + 1 = 0, which has no real solutions — there are no roots to converge to.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Using the double angle formulas, simplify sin(x)cos(x) in terms of a single trigonometric function. (1 step)", "answer": "Using sin(2A) = 2sin(A)cos(A), we get sin(x)cos(x) = (1/2)sin(2x). This is useful for integration: ∫sin(x)cos(x) dx = ∫(1/2)sin(2x) dx = -(1/4)cos(2x) + c.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When two curves intersect, what is the geometric condition that lets us find their intersection points algebraically, and what type of equation typically results? (3 steps)", "answer": "- Step 1: At any intersection point, both curves pass through the same $$(x, y)$$, so the $$y$$-values must be equal. This is the geometric anchor: \"same height at same horizontal position.\"\n- Step 2: Setting $$y_1 = y_2$$ eliminates $$y$$ and leaves a single equation in $$x$$. We then rearrange everything to one side to get $$\\text{polynomial}(x) = 0$$.\n- Step 3: Solving this polynomial (by factorising, quadratic formula, or otherwise) gives the $$x$$-coordinates; we then substitute back into either original equation to get the matching $$y$$-coordinates.\n\nTakeaway: intersection = simultaneous solution; algebra just enforces the geometric equality.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is it disproportionately costly to miscopy a coefficient (e.g. write $$2x^2$$ instead of $$x^2$$) when solving for curve intersections?", "answer": "A single miscopied coefficient changes the entire polynomial you're solving. The roots of $$x^2 + bx + c = 0$$ and $$2x^2 + bx + c = 0$$ are generally completely different — not just shifted. Since intersection points are found from these roots, every downstream answer (coordinates, distances, areas) is wrong, even though the method was correct. The lesson: always pause and re-read the transcribed equation before solving, because algebraic effort cannot rescue a wrong starting equation.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "State the domain and range of $$f(x) = \\ln(x)$$, and explain conceptually why each is what it is. (3 steps)", "answer": "- Step 1: Domain is $$x > 0$$. Reason: $$\\ln$$ is the inverse of $$e^x$$, and $$e^x$$ only ever outputs positive values. So $$\\ln$$ can only accept positive inputs — there is no real number whose exponential is zero or negative.\n- Step 2: Range is all of $$\\mathbb{R}$$. Reason: $$e^x$$ takes every real input to a positive output, so its inverse must take every positive input back to every real output. Equivalently, $$\\ln(x) \\to -\\infty$$ as $$x \\to 0^+$$ and $$\\ln(x) \\to +\\infty$$ as $$x \\to \\infty$$.\n- Step 3: Key feature: $$\\ln(1) = 0$$ (since $$e^0 = 1$$), and there is a vertical asymptote at $$x = 0$$ — the curve hugs the $$y$$-axis but never touches it.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Sketch (describe) the graph of $$y = \\ln(x)$$, and contrast its three key features with those of $$y = e^x$$. (3 steps)", "answer": "- Step 1: $$y = \\ln(x)$$ lives entirely to the right of the $$y$$-axis, crosses the $$x$$-axis at $$(1, 0)$$, and has a vertical asymptote $$x = 0$$. It grows but slows down — concave down.\n- Step 2: $$y = e^x$$ lives entirely above the $$x$$-axis, crosses the $$y$$-axis at $$(0, 1)$$, and has a horizontal asymptote $$y = 0$$. It grows ever faster — concave up.\n- Step 3: They are mirror images across $$y = x$$. The key visual swap: $$\\ln$$'s asymptote is vertical, $$e^x$$'s is horizontal; $$\\ln$$ passes through $$(1,0)$$, $$e^x$$ through $$(0,1)$$.\n\nCommon confusion: drawing $$e^x$$ when asked for $$\\ln(x)$$ — check which axis the asymptote is along.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Walk through the algebraic procedure for finding $$f^{-1}(x)$$, and explain why each step makes geometric sense. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$. This names the output, which we are about to relabel.\n- Step 2: Swap $$x$$ and $$y$$ to get $$x = f(y)$$. Geometrically this reflects in the line $$y = x$$: inputs and outputs trade roles.\n- Step 3: Solve for $$y$$ in terms of $$x$$. This rearranged expression is $$y = f^{-1}(x)$$ — the rule that \"undoes\" $$f$$.\n- Step 4: State the domain of $$f^{-1}$$, which equals the range of $$f$$. Without this, the inverse function is not fully defined.\n\nWhy the swap works: $$f$$ sends $$a \\to b$$; $$f^{-1}$$ must send $$b \\to a$$. Swapping the variable names enacts that role-reversal symbolically.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why is stating the domain considered a non-negotiable part of *defining* an inverse function, rather than an optional extra?", "answer": "A function is not just a formula — it is a formula **plus** the set of inputs it acts on. Two functions with the same formula but different domains are different functions. For an inverse, the natural domain is the range of the original function: outside that set there is no original input to \"undo,\" so the inverse is undefined. Omitting the domain leaves the inverse ambiguous (it might accidentally include values $$f$$ never produced). Therefore \"define $$f^{-1}$$\" means: give the rule **and** give the domain.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Given $$f(x) = 2x + 3$$ with domain $$x \\in \\mathbb{R}$$, find $$f^{-1}(x)$$ and state its domain. (4 steps)", "answer": "- Step 1: Write $$y = 2x + 3$$.\n- Step 2: Swap: $$x = 2y + 3$$.\n- Step 3: Solve for $$y$$: $$y = \\dfrac{x - 3}{2}$$, so $$f^{-1}(x) = \\dfrac{x - 3}{2}$$.\n- Step 4: Range of $$f$$ is all of $$\\mathbb{R}$$ (a non-constant line hits every $$y$$), so domain of $$f^{-1}$$ is $$x \\in \\mathbb{R}$$.\n\nSanity check: $$f(f^{-1}(x)) = 2 \\cdot \\frac{x-3}{2} + 3 = x$$. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Explain the difference between $$fg(x)$$ and $$gf(x)$$, and why composition is generally not commutative. (3 steps)", "answer": "- Step 1: $$fg(x)$$ means \"do $$g$$ first, then feed the result into $$f$$\" — i.e. $$f(g(x))$$. Read right-to-left: the function closest to $$x$$ acts first.\n- Step 2: $$gf(x)$$ reverses the order: do $$f$$ first, then $$g$$, i.e. $$g(f(x))$$.\n- Step 3: Order matters because each function transforms its input differently. Example: let $$f(x) = x + 1$$, $$g(x) = x^2$$. Then $$fg(2) = f(4) = 5$$, but $$gf(2) = g(3) = 9$$. Different operations applied in different sequences land on different answers.\n\nTakeaway: composition is like getting dressed — socks-then-shoes ≠ shoes-then-socks.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "If $$f(x) = \\sqrt{x}$$ and $$g(x) = x - 4$$, why must we be careful when forming $$fg(x)$$? (3 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = \\sqrt{x - 4}$$. The formula looks fine, but $$f$$ requires non-negative inputs.\n- Step 2: So we need $$g(x) \\geq 0$$, i.e. $$x \\geq 4$$. The domain of the composite is restricted by what $$g$$ can legally hand to $$f$$.\n- Step 3: General principle: the domain of $$fg$$ is the set of $$x$$ in $$g$$'s domain such that $$g(x)$$ lies in $$f$$'s domain. You cannot just take \"all $$x$$\" blindly.\n\nLesson: composites inherit restrictions from both functions; always check that the inner function's output lies in the outer function's domain.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "State the sign-change root-locating theorem precisely, and identify the condition most commonly forgotten. (3 steps)", "answer": "- Step 1: If a function $$f$$ is **continuous** on the closed interval $$[a, b]$$, and $$f(a)$$ and $$f(b)$$ have opposite signs, then there exists at least one root of $$f(x) = 0$$ in the open interval $$(a, b)$$.\n- Step 2: The continuity requirement is the part most students drop. Without it, the graph can \"jump\" across zero without ever equalling zero — e.g. $$f(x) = 1/x$$ has $$f(-1) = -1$$ and $$f(1) = 1$$ (opposite signs) but no root: the asymptote breaks continuity.\n- Step 3: To earn full marks: explicitly write \"since $$f$$ is continuous on $$[a, b]$$ and there is a sign change, there is a root in $$(a, b)$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does a sign change *guarantee* a root only when continuity holds — what is the intuitive picture? (3 steps)", "answer": "- Step 1: Visualise the graph as a continuous pen-stroke from $$(a, f(a))$$ below the $$x$$-axis to $$(b, f(b))$$ above it (or vice versa).\n- Step 2: To get from below to above without lifting the pen, the curve must cross the $$x$$-axis at least once — that crossing point is a root. This is the Intermediate Value Theorem in action.\n- Step 3: If continuity fails, the pen *can* lift. A function with a vertical asymptote, jump discontinuity, or removable hole can switch sign by \"teleporting\" across zero, never actually equalling it. So continuity is what forces the curve to physically cross the axis.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Sign change is checked at $$f(1.2)$$ and $$f(1.3)$$ and both give opposite signs. Does this tell us there is exactly one root in $$(1.2, 1.3)$$? (3 steps)", "answer": "- Step 1: No — it guarantees **at least one** root, not exactly one. The function could wiggle: down, up, down, crossing the axis three times, all within the interval.\n- Step 2: To strengthen the claim to \"exactly one root,\" we'd additionally need to show $$f$$ is monotonic on the interval (e.g. $$f'(x) > 0$$ throughout), so it can cross zero only once.\n- Step 3: For a small narrow interval and a smooth function, one root is overwhelmingly the likely case, but it isn't proven by the sign change alone.\n\nTakeaway: sign change is an **existence** statement, not a **uniqueness** statement.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Describe the structure of a fixed-point iteration for solving $$f(x) = 0$$ numerically. (4 steps)", "answer": "- Step 1: Rearrange $$f(x) = 0$$ into the form $$x = g(x)$$. Any value of $$x$$ satisfying this is a root of $$f$$, because $$x = g(x)$$ is just $$f(x) = 0$$ in disguise.\n- Step 2: Pick a starting value $$x_0$$ close to the suspected root (using a sign-change argument, for instance).\n- Step 3: Iterate: $$x_{n+1} = g(x_n)$$. Each iterate feeds back into $$g$$ to produce the next.\n- Step 4: If the sequence converges, the limit $$L$$ satisfies $$L = g(L)$$ — a fixed point — which is the root we wanted.\n\nCalculator trick: store $$x_0$$ as Ans, type the formula using Ans, then press $$=$$ repeatedly; each press performs one iteration.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Conceptually, what does it mean for a fixed-point iteration $$x_{n+1} = g(x_n)$$ to converge, and why isn't convergence automatic? (3 steps)", "answer": "- Step 1: Convergence means the sequence $$x_0, x_1, x_2, \\ldots$$ settles down toward a single number — the fixed point — rather than oscillating wildly or running off to infinity.\n- Step 2: Whether it converges depends on the *slope* of $$g$$ near the fixed point. Roughly, if $$|g'(\\text{root})| < 1$$, errors shrink each step and we converge; if $$|g'(\\text{root})| > 1$$, errors grow and we diverge.\n- Step 3: This is why the same equation $$f(x) = 0$$ can be rearranged into several different $$g$$'s, some of which converge nicely and others which blow up. Choice of rearrangement matters.\n\nIntuition: $$g$$ should be \"flat enough\" near the root to act as a contraction, pulling nearby points toward the root.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Given $$f(x) = f^{-1}(x)$$'s graphical relationship, sketch (describe) where $$y = f^{-1}(x)$$ sits relative to $$y = f(x)$$. (3 steps)", "answer": "- Step 1: $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. Every point $$(a, b)$$ on $$f$$ becomes $$(b, a)$$ on $$f^{-1}$$.\n- Step 2: Consequently: domain and range swap. Domain of $$f^{-1}$$ = range of $$f$$; range of $$f^{-1}$$ = domain of $$f$$.\n- Step 3: Any point where the curves meet must lie on $$y = x$$ (because that's the mirror line), so solving $$f(x) = f^{-1}(x)$$ often reduces to solving $$f(x) = x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why do graphs of $$f$$ and $$f^{-1}$$ typically intersect on the line $$y = x$$, and is this always the case?", "answer": "If a point $$(a, b)$$ lies on $$f$$, its mirror $$(b, a)$$ lies on $$f^{-1}$$. For these to be the *same* point — a genuine intersection — we need $$a = b$$, i.e. the point lies on $$y = x$$. So intersection points where $$f$$ and its reflection coincide naturally sit on this mirror line, which is why solving $$f(x) = x$$ is the standard trick. However, for *non-monotonic* functions or with restricted domains, $$f$$ and $$f^{-1}$$ can occasionally intersect off the line $$y = x$$ in mirror-image pairs, but this is an exception; at A-Level you almost always exploit the $$f(x) = x$$ shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "State the three forms of $$\\cos(2A)$$ and explain why having three forms is useful. (3 steps)", "answer": "- Step 1: $$\\cos(2A) = \\cos^2 A - \\sin^2 A$$ — the symmetric \"raw\" form, derived directly from $$\\cos(A+A)$$.\n- Step 2: $$\\cos(2A) = 2\\cos^2 A - 1$$ — obtained by replacing $$\\sin^2 A$$ with $$1 - \\cos^2 A$$. Useful when an integral or equation only involves $$\\cos$$.\n- Step 3: $$\\cos(2A) = 1 - 2\\sin^2 A$$ — obtained by replacing $$\\cos^2 A$$ with $$1 - \\sin^2 A$$. Useful when the problem only involves $$\\sin$$.\n\nHaving three forms means you can rewrite $$\\cos^2 A$$ or $$\\sin^2 A$$ in terms of $$\\cos(2A)$$ — vital for integrating $$\\cos^2$$ or $$\\sin^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "State $$\\sin(2A)$$ and $$\\tan(2A)$$ and identify the easy-to-forget coefficient or structure in each.", "answer": "$$\\sin(2A) = 2\\sin A \\cos A$$ — the coefficient $$2$$ at the front is the most commonly dropped piece. Without it the identity is wrong by a factor of 2. $$\\tan(2A) = \\dfrac{2\\tan A}{1 - \\tan^2 A}$$ — note the numerator has $$2\\tan A$$ (not $$\\tan^2 A$$) and the denominator has the *minus* sign (not plus). Mixing these up is the classic error: think \"$$2$$ on top, minus underneath.\"", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Derive $$\\sin(2A) = 2\\sin A \\cos A$$ from the angle-sum formula, to see *why* the 2 appears. (3 steps)", "answer": "- Step 1: Start with $$\\sin(A + B) = \\sin A \\cos B + \\cos A \\sin B$$.\n- Step 2: Set $$B = A$$: $$\\sin(2A) = \\sin A \\cos A + \\cos A \\sin A$$.\n- Step 3: Both terms are identical, so they combine: $$\\sin(2A) = 2\\sin A \\cos A$$.\n\nThe \"2\" is just two equal terms adding — not a coefficient pulled out of thin air. Remembering the derivation cements the coefficient.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Derive the identity $$\\sin(3x) = 3\\sin x - 4\\sin^3 x$$ from scratch using angle-sum and double-angle formulas. (5 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x) = \\sin(2x)\\cos(x) + \\cos(2x)\\sin(x)$$ (angle-sum).\n- Step 2: Substitute double-angle formulas — use $$\\sin(2x) = 2\\sin x \\cos x$$ and $$\\cos(2x) = \\cos^2 x - \\sin^2 x$$ (the symmetric form):\n$$\\sin(3x) = 2\\sin x \\cos x \\cdot \\cos x + (\\cos^2 x - \\sin^2 x)\\sin x$$\n- Step 3: Simplify: $$= 2\\sin x \\cos^2 x + \\sin x \\cos^2 x - \\sin^3 x = 3\\sin x \\cos^2 x - \\sin^3 x$$.\n- Step 4: To express purely in $$\\sin x$$, use $$\\cos^2 x = 1 - \\sin^2 x$$: $$= 3\\sin x(1 - \\sin^2 x) - \\sin^3 x$$.\n- Step 5: Expand: $$= 3\\sin x - 3\\sin^3 x - \\sin^3 x = 3\\sin x - 4\\sin^3 x$$. ✓\n\nKey insight: chaining angle-sum + double-angle + Pythagorean identity lets us collapse any $$\\sin(nx)$$ into a polynomial in $$\\sin x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "State the four basic trigonometric antiderivatives a P3 student must know, and explain the sign convention for $$\\sin$$.", "answer": "$$\\int \\cos x \\, dx = \\sin x + c$$, $$\\int \\sin x \\, dx = -\\cos x + c$$, $$\\int \\sec^2 x \\, dx = \\tan x + c$$, and $$\\int \\sec x \\tan x \\, dx = \\sec x + c$$. The minus sign in $$\\int \\sin x \\, dx = -\\cos x + c$$ comes from the fact that $$\\frac{d}{dx}[\\cos x] = -\\sin x$$, so to undo a $$\\sin$$ we need a $$-\\cos$$ — the negative cancels the negative from differentiation. Forgetting this sign is the most common slip in trig integration.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why does $$\\int \\cos(ax + b)\\, dx = \\dfrac{1}{a}\\sin(ax + b) + c$$, and where does the factor of $$1/a$$ come from? (3 steps)", "answer": "- Step 1: If we *differentiate* $$\\sin(ax + b)$$, the chain rule produces $$a \\cos(ax + b)$$. So $$\\sin(ax+b)$$ is \"too big\" by a factor of $$a$$ when we try to use it as an antiderivative.\n- Step 2: To compensate, we divide by $$a$$ in the antiderivative. Then $$\\frac{d}{dx}\\left[\\frac{1}{a}\\sin(ax+b)\\right] = \\frac{1}{a} \\cdot a\\cos(ax+b) = \\cos(ax+b)$$ ✓.\n- Step 3: General reverse-chain principle: when integrating $$f(\\text{linear in } x)$$, divide by the coefficient of $$x$$. This *only* works for **linear** inner functions; for nonlinear inner functions, you need substitution.\n\nQuick test: $$\\int \\cos(5x)\\, dx = \\tfrac{1}{5}\\sin(5x) + c$$. Differentiate to check: $$\\tfrac{1}{5} \\cdot 5\\cos(5x) = \\cos(5x)$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "To integrate $$\\int \\sin^2 x \\, dx$$, why can't we just apply the basic $$\\int \\sin x \\, dx$$ rule, and what is the conceptual trick? (3 steps)", "answer": "- Step 1: $$\\sin^2 x$$ is not a basic trig function — it's a *product* $$\\sin x \\cdot \\sin x$$. The basic rule doesn't apply to powers.\n- Step 2: The trick: use the double-angle identity $$\\cos(2x) = 1 - 2\\sin^2 x$$, rearranged to $$\\sin^2 x = \\dfrac{1 - \\cos(2x)}{2}$$.\n- Step 3: Now the integrand is a sum of constants and $$\\cos(2x)$$, both of which we can integrate directly: $$\\int \\sin^2 x \\, dx = \\tfrac{1}{2}x - \\tfrac{1}{4}\\sin(2x) + c$$.\n\nBig idea: double-angle identities are not just for trig equations — they convert powers of trig functions into linear combinations that are integrable. This is the standard \"power-reduction\" technique.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Suppose iteration $$x_{n+1} = g(x_n)$$ gives $$x_0 = 2$$, $$x_1 = 1.8$$, $$x_2 = 1.85$$, $$x_3 = 1.843$$, $$x_4 = 1.844$$. What can you conclude, and what does this tell you about a root of $$f(x) = 0$$? (3 steps)", "answer": "- Step 1: The iterates are getting closer together — successive differences shrink from $$0.2$$ to $$0.05$$ to $$0.007$$ to $$0.001$$. This is the signature of convergence.\n- Step 2: The limit appears to be approximately $$1.844$$ (to 3 d.p.), which is the fixed point of $$g$$.\n- Step 3: Since $$x = g(x)$$ is equivalent to $$f(x) = 0$$, this fixed point is a root of the original equation. To confirm to a given accuracy, check a sign change of $$f$$ on an interval like $$[1.8435, 1.8445]$$.\n\nTakeaway: convergence in successive iterates ⇒ fixed point ⇒ root of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "A student claims that since $$\\cos(2A)$$ can be written three ways, they're free to pick any one for any problem. When is this true, and when does the choice actually matter? (3 steps)", "answer": "- Step 1: For *solving trig equations*, all three forms are equivalent — they describe the same number, so substitution gives the same solutions either way.\n- Step 2: For *integration*, the choice matters hugely. To integrate $$\\cos^2 x$$, you need the form $$\\cos(2x) = 2\\cos^2 x - 1 \\Rightarrow \\cos^2 x = \\tfrac{1 + \\cos(2x)}{2}$$. The other forms don't isolate $$\\cos^2 x$$ cleanly.\n- Step 3: Likewise, integrating $$\\sin^2 x$$ requires $$\\cos(2x) = 1 - 2\\sin^2 x$$. The \"wrong\" choice doesn't make the problem unsolvable, but it forces extra algebra.\n\nLesson: pick the form whose squared term matches the expression you're trying to simplify.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "When sketching $$y = f^{-1}(x)$$ from a given sketch of $$y = f(x)$$, what mechanical procedure should you follow, and what features must transfer correctly? (3 steps)", "answer": "- Step 1: Draw the line $$y = x$$ as a dashed reference. Then reflect each key feature of $$f$$ across this line — points, intercepts, and asymptotes all swap their coordinates.\n- Step 2: $$x$$-intercepts of $$f$$ become $$y$$-intercepts of $$f^{-1}$$ (and vice versa). A horizontal asymptote $$y = c$$ of $$f$$ becomes a vertical asymptote $$x = c$$ of $$f^{-1}$$.\n- Step 3: The domain/range swap: where $$f$$ was defined (its $$x$$-extent) becomes the $$y$$-extent of $$f^{-1}$$, and the $$y$$-extent of $$f$$ becomes the $$x$$-extent of $$f^{-1}$$.\n\nSanity check: if you pick a point on your $$f^{-1}$$ sketch and swap its coordinates, you should land back on $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "For $$f(x) = e^x$$ with domain $$\\mathbb{R}$$, find $$f^{-1}$$ and confirm the domain/range swap visually. (3 steps)", "answer": "- Step 1: Algebraically: $$y = e^x \\Rightarrow x = e^y \\Rightarrow y = \\ln x$$. So $$f^{-1}(x) = \\ln x$$.\n- Step 2: Range of $$f$$ is $$(0, \\infty)$$ (exponentials are always positive). Therefore domain of $$f^{-1}$$ is $$x > 0$$ — matches the domain of $$\\ln$$. ✓\n- Step 3: Domain of $$f$$ is $$\\mathbb{R}$$, so range of $$f^{-1}$$ is $$\\mathbb{R}$$ — matches the range of $$\\ln$$. ✓\n\nGeometrically: $$e^x$$ has a horizontal asymptote $$y = 0$$; reflecting in $$y = x$$ turns this into the vertical asymptote $$x = 0$$ of $$\\ln x$$. Perfect mirror.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Given $$f(x) = x^2 + 1$$ and $$g(x) = 2x - 3$$, what is $$fg(1)$$, and why does the order of operations matter here? (3 steps)", "answer": "- Step 1: $$fg(1)$$ means $$f(g(1))$$ — apply $$g$$ first. $$g(1) = 2(1) - 3 = -1$$.\n- Step 2: Now apply $$f$$: $$f(-1) = (-1)^2 + 1 = 2$$. So $$fg(1) = 2$$.\n- Step 3: Compare $$gf(1)$$: $$f(1) = 2$$, then $$g(2) = 1$$. So $$gf(1) = 1 \\neq fg(1) = 2$$. Different sequences of operations produce different results — the right-hand function always acts first.\n\nMental model: read composite notation right-to-left, like nested boxes — peel them in that order.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is it not enough to find sign-change brackets to \"prove\" you've found *all* roots of $$f(x) = 0$$? (3 steps)", "answer": "- Step 1: Each sign change reveals at least one root in that bracket — but it tells you nothing about roots elsewhere on the real line.\n- Step 2: A root where the function only *touches* the axis (a double root, like $$f(x) = (x-1)^2$$) doesn't change sign at all. Sign-change methods miss these entirely.\n- Step 3: To claim \"all roots,\" you typically need additional information: degree of the polynomial (a degree-$$n$$ polynomial has at most $$n$$ roots), monotonicity arguments, or a full graph sketch.\n\nLesson: sign change is a **finder** of roots, not a **counter** of roots.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Find $$\\int (3\\sin x + 2\\cos(4x))\\, dx$$ conceptually, identifying each piece. (3 steps)", "answer": "- Step 1: Split by linearity: $$\\int 3\\sin x \\, dx + \\int 2\\cos(4x)\\, dx$$.\n- Step 2: First piece: $$\\int \\sin x \\, dx = -\\cos x$$, so $$\\int 3\\sin x \\, dx = -3\\cos x$$. (The 3 just rides along.)\n- Step 3: Second piece: $$\\int \\cos(4x)\\, dx = \\tfrac{1}{4}\\sin(4x)$$ by the reverse-chain rule for linear arguments; multiplying by 2 gives $$\\tfrac{1}{2}\\sin(4x)$$.\n\nCombined: $$-3\\cos x + \\tfrac{1}{2}\\sin(4x) + c$$. The two \"gotchas\": the minus sign on $$\\cos$$, and the $$\\tfrac{1}{4}$$ from chain-rule compensation.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "What's the relationship between solving $$f(x) = x$$ and finding fixed points of an iteration? (3 steps)", "answer": "- Step 1: A fixed point of $$g$$ is a value $$L$$ where $$g(L) = L$$ — the iteration \"stays put.\"\n- Step 2: If your iteration is $$x_{n+1} = g(x_n)$$, convergence lands on a fixed point of $$g$$. So fixed points are exactly the solutions of $$x = g(x)$$.\n- Step 3: Geometrically, fixed points are where the curve $$y = g(x)$$ crosses the line $$y = x$$. This same picture explains why solving $$f(x) = x$$ graphically means finding intersections with the diagonal.\n\nSo \"fixed point\", \"$$x = g(x)$$\", and \"intersection with $$y = x$$\" are three names for the same thing.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A common slip: a student writes $$\\int \\cos(2x)\\, dx = \\sin(2x) + c$$. Diagnose the error and correct it. (3 steps)", "answer": "- Step 1: Differentiate the proposed answer to check: $$\\frac{d}{dx}[\\sin(2x)] = 2\\cos(2x)$$, not $$\\cos(2x)$$. So the answer is too big by a factor of 2.\n- Step 2: The student forgot the reverse-chain-rule correction: when integrating $$\\cos(ax)$$, you must divide by $$a$$ to compensate for the chain-rule factor that would otherwise appear on differentiation.\n- Step 3: Correct answer: $$\\int \\cos(2x)\\, dx = \\tfrac{1}{2}\\sin(2x) + c$$. Always verify by differentiating — it instantly reveals missing chain-rule factors.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}], "count": 32}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "When two curves $$y = f(x)$$ and $$y = g(x)$$ intersect, what algebraic condition defines their intersection points, and what type of equation typically results? (3 steps)", "answer": "- Step 1: Intersection means the two curves share both an $$x$$ and a $$y$$ value at the same point. Since $$y$$ is the same, we can equate the expressions: $$f(x) = g(x)$$.\n- Step 2: Rearrange so one side is zero: $$f(x) - g(x) = 0$$. This converts the geometric problem (where do they cross?) into an algebraic root-finding problem.\n- Step 3: If both curves are polynomial (e.g. line + parabola), the result is a polynomial equation, usually quadratic, solvable by factoring or the quadratic formula. Each real root corresponds to one intersection point's $$x$$-coordinate.\n\nGeometric crossing ↔ algebraic root: this duality underpins much of A-level coordinate geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why does miscopying a coefficient (e.g. writing $$2x^2$$ instead of $$x^2$$) often produce intersection points that look \"almost right\" but are actually wrong? (2 steps)", "answer": "- Step 1: A wrong coefficient changes the parabola's width/steepness but not its general shape, so when set equal to the other curve, the resulting quadratic still has real roots — the algebra \"works\" without flagging an error.\n- Step 2: The roots, however, are numerically different. Since you don't get a contradiction or undefined operation, the only safeguard is to **re-read the original equation before solving**. The lesson: copy-checking is part of the math, not a separate task.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "State the domain and range of $$f(x) = \\ln(x)$$, and explain why each is what it is. (3 steps)", "answer": "- Step 1: Domain is $$x > 0$$. This is because $$\\ln$$ is the inverse of $$e^x$$, and $$e^x$$ only ever outputs positive numbers — so $$\\ln$$ can only accept positive inputs. There is no real number you can raise $$e$$ to in order to get $$0$$ or a negative number.\n- Step 2: Range is all real numbers, $$y \\in \\mathbb{R}$$. As $$x \\to 0^+$$, $$\\ln(x) \\to -\\infty$$; as $$x \\to \\infty$$, $$\\ln(x) \\to +\\infty$$, and the function is continuous, so it takes every real value exactly once.\n- Step 3: The domain/range of $$\\ln$$ are precisely the **swap** of those of $$e^x$$ (domain $$\\mathbb{R}$$, range $$> 0$$) — this is the defining property of inverse functions reflected in the line $$y = x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Describe the shape of $$y = \\ln(x)$$: where it crosses the axes, asymptotic behavior, and how it differs visually from $$y = e^x$$. (3 steps)", "answer": "- Step 1: Crosses the $$x$$-axis at $$(1, 0)$$ because $$\\ln(1) = 0$$. There is no $$y$$-intercept since $$x = 0$$ is not in the domain.\n- Step 2: Vertical asymptote at $$x = 0$$ (the $$y$$-axis): as $$x \\to 0^+$$, $$\\ln(x) \\to -\\infty$$. The curve increases monotonically but slowly — it eventually passes any horizontal line but takes a very long $$x$$-range to do so.\n- Step 3: Contrast with $$e^x$$: $$e^x$$ has a **horizontal** asymptote at $$y = 0$$, crosses the $$y$$-axis at $$(0, 1)$$, and grows rapidly. The two graphs are mirror images in the line $$y = x$$. A common mistake is to sketch $$e^x$$ when asked for $$\\ln(x)$$ — check: does your curve cross at $$(1, 0)$$ with a vertical asymptote? If yes, it's $$\\ln$$.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Outline the four-step algebraic procedure for finding $$f^{-1}(x)$$, and explain why each step does what it does. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$. This just names the output so we can manipulate it.\n- Step 2: Swap $$x$$ and $$y$$: $$x = f(y)$$. This encodes the inverse relationship — the inverse \"reads the function backwards,\" so the old output becomes the new input.\n- Step 3: Solve for $$y$$ in terms of $$x$$. The resulting expression is $$f^{-1}(x)$$.\n- Step 4: **State the domain of $$f^{-1}$$**, which equals the range of the original $$f$$. Without this, the function is incompletely defined.\n\nA function is not fully specified by a formula alone — it requires both a rule and a domain.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Why must we always state the domain of an inverse function, even if the formula \"looks fine\" on all real numbers? (3 steps)", "answer": "- Step 1: A function is a triple: rule + domain + codomain. Two functions with the same formula but different domains are different functions (e.g. $$x^2$$ on $$\\mathbb{R}$$ vs $$x^2$$ on $$[0, \\infty)$$).\n- Step 2: The domain of $$f^{-1}$$ is forced to be the range of $$f$$ — because $$f^{-1}$$ only \"knows how to undo\" outputs that $$f$$ actually produced. Feeding $$f^{-1}$$ a value outside that set is meaningless.\n- Step 3: Example: $$f(x) = e^x$$ has range $$(0, \\infty)$$, so $$f^{-1}(x) = \\ln(x)$$ must have domain $$x > 0$$ — even though the formula $$\\ln(x)$$ \"is what it is,\" omitting the domain leaves the function undefined where it matters most.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "If $$f(x) = 2x + 1$$ on domain $$x \\geq 0$$, find $$f^{-1}(x)$$ including its domain. (4 steps)", "answer": "- Step 1: Set $$y = 2x + 1$$.\n- Step 2: Swap: $$x = 2y + 1$$.\n- Step 3: Solve: $$y = \\dfrac{x - 1}{2}$$, so $$f^{-1}(x) = \\dfrac{x - 1}{2}$$.\n- Step 4: Domain of $$f^{-1}$$ = range of $$f$$. Since $$f$$ is linear increasing with $$f(0) = 1$$, the range is $$y \\geq 1$$. Therefore $$f^{-1}$$ has domain $$x \\geq 1$$.\n\nThe formula alone would happily accept any real $$x$$, but the inverse is only defined on the original range.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Define $$fg(x)$$ vs $$gf(x)$$ and explain why composition is generally not commutative. (3 steps)", "answer": "- Step 1: $$fg(x) = f(g(x))$$: apply $$g$$ first, then feed that output into $$f$$. Reading right-to-left.\n- Step 2: $$gf(x) = g(f(x))$$: apply $$f$$ first, then $$g$$.\n- Step 3: They differ because the operations $$f$$ and $$g$$ act on inputs differently. Example: $$f(x) = x + 1$$, $$g(x) = x^2$$. Then $$fg(x) = x^2 + 1$$ but $$gf(x) = (x+1)^2 = x^2 + 2x + 1$$. The order of operations matters — squaring then adding is different from adding then squaring.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "For $$f(x) = 2x$$ and $$g(x) = x + 3$$, find $$fg(2)$$ and $$gf(2)$$ to demonstrate non-commutativity. (3 steps)", "answer": "- Step 1: $$fg(2) = f(g(2)) = f(5) = 10$$. Apply $$g$$ first: $$2 + 3 = 5$$, then $$f$$: $$2 \\cdot 5 = 10$$.\n- Step 2: $$gf(2) = g(f(2)) = g(4) = 7$$. Apply $$f$$ first: $$2 \\cdot 2 = 4$$, then $$g$$: $$4 + 3 = 7$$.\n- Step 3: $$10 \\neq 7$$, confirming order matters. Intuitively: \"double then add 3\" lands somewhere different from \"add 3 then double.\"", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "State the sign-change method for locating a root, and identify the condition that students most commonly forget. (3 steps)", "answer": "- Step 1: If $$f(a)$$ and $$f(b)$$ have opposite signs (one positive, one negative), then there is at least one root in the open interval $$(a, b)$$.\n- Step 2: **Crucial missing condition**: $$f$$ must be **continuous** on $$[a, b]$$. Without continuity, the function could \"jump\" across zero without ever equaling zero.\n- Step 3: Example of why continuity matters: $$f(x) = 1/x$$ has $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$, but there is no root in $$(-1, 1)$$ — the function has a discontinuity at $$0$$ where it leaps from $$-\\infty$$ to $$+\\infty$$.\n\nAlways write: \"Since $$f$$ is continuous on $$[a,b]$$ and $$f(a)f(b) < 0$$, there is a root in $$(a,b)$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why does the sign-change method guarantee a root only inside the open interval, not at the endpoints? (2 steps)", "answer": "- Step 1: At the endpoints, $$f(a)$$ and $$f(b)$$ are non-zero (they have definite signs). So the root cannot be at $$a$$ or $$b$$.\n- Step 2: The Intermediate Value Theorem (the underlying principle) says a continuous function taking values of opposite sign must pass through every intermediate value, including zero, somewhere strictly between $$a$$ and $$b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Could sign change ever miss a root, or claim there isn't one when there actually is? (3 steps)", "answer": "- Step 1: Yes — if $$f(a)$$ and $$f(b)$$ have the **same sign**, there can still be roots in between (e.g. an even number of roots that cancel out sign-wise, like a parabola dipping down and coming back up).\n- Step 2: A function tangent to the $$x$$-axis (e.g. $$f(x) = (x-1)^2$$) has a root but never changes sign — sign-change fails entirely here.\n- Step 3: So sign-change is **sufficient** for existence (when it works) but **not necessary**. Absence of a sign change ≠ absence of a root.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Explain the idea behind iterative methods: how do we go from $$f(x) = 0$$ to $$x_{n+1} = g(x_n)$$? (3 steps)", "answer": "- Step 1: Rearrange the equation $$f(x) = 0$$ algebraically into the form $$x = g(x)$$. Any root of $$f$$ is then a **fixed point** of $$g$$ — a point where the input equals the output.\n- Step 2: Define the iteration $$x_{n+1} = g(x_n)$$: pick a starting guess $$x_0$$, plug in, get $$x_1$$, plug that in, get $$x_2$$, and so on.\n- Step 3: If the sequence converges to some value $$L$$, then by continuity $$L = g(L)$$, so $$L$$ is a fixed point of $$g$$ and hence a root of $$f$$. Convergence is not guaranteed for every rearrangement — some choices of $$g$$ diverge.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why does the same equation $$f(x) = 0$$ have multiple possible iteration formulas, and does it matter which one you choose? (3 steps)", "answer": "- Step 1: There's no unique way to rearrange $$f(x) = 0$$ into $$x = g(x)$$. E.g. $$x^2 - x - 1 = 0$$ can become $$x = x^2 - 1$$, or $$x = 1 + 1/x$$, or $$x = \\sqrt{x+1}$$, etc.\n- Step 2: It matters enormously: some rearrangements give iterations that converge to the desired root, others diverge or converge to a different root. The condition for local convergence is roughly $$|g'(L)| < 1$$ near the fixed point $$L$$.\n- Step 3: Practical insight: if your iteration shoots off to infinity or oscillates wildly, try a different rearrangement of the same equation.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Describe the calculator technique for performing iteration efficiently with the Ans key. (3 steps)", "answer": "- Step 1: Type $$x_0$$ and press $$=$$. This stores $$x_0$$ in the calculator's Ans memory.\n- Step 2: Type the formula $$g(\\text{Ans})$$ — wherever $$x$$ appears in $$g$$, write Ans instead. Press $$=$$: this computes $$x_1$$ and stores it in Ans.\n- Step 3: Just press $$=$$ repeatedly. Each press applies $$g$$ to the previous answer, generating $$x_2, x_3, \\ldots$$ until the digits stop changing — convergence achieved.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "How is the graph of $$y = f^{-1}(x)$$ related geometrically to $$y = f(x)$$, and why? (3 steps)", "answer": "- Step 1: $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$.\n- Step 2: Why: a point $$(a, b)$$ lies on $$y = f(x)$$ iff $$b = f(a)$$, iff $$a = f^{-1}(b)$$, iff $$(b, a)$$ lies on $$y = f^{-1}(x)$$. Swapping coordinates $$(a,b) \\leftrightarrow (b,a)$$ is exactly reflection in $$y = x$$.\n- Step 3: Consequences: domain and range swap, $$x$$-intercepts of $$f$$ become $$y$$-intercepts of $$f^{-1}$$, asymptotes swap orientation (vertical $$\\leftrightarrow$$ horizontal). Example: $$e^x$$ (horizontal asymptote $$y=0$$) reflects to $$\\ln x$$ (vertical asymptote $$x=0$$).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Why does solving $$f(x) = f^{-1}(x)$$ often reduce to solving $$f(x) = x$$? (3 steps)", "answer": "- Step 1: $$f$$ and $$f^{-1}$$ are reflections of each other in $$y = x$$. Any intersection between them must therefore lie on (or be symmetric about) this line of symmetry.\n- Step 2: For increasing functions, the intersections **lie on** $$y = x$$, so $$f(x) = f^{-1}(x) \\iff f(x) = x$$.\n- Step 3: Practical use: instead of computing $$f^{-1}$$ (which can be messy), just solve the simpler $$f(x) = x$$. Caveat: for non-monotonic functions, extra intersections off the line $$y = x$$ may exist.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Without computing, state $$\\sin(2A)$$, all three forms of $$\\cos(2A)$$, and $$\\tan(2A)$$. (3 steps)", "answer": "- Step 1: $$\\sin(2A) = 2\\sin A \\cos A$$. The factor of $$2$$ is essential — forgetting it is the most common error.\n- Step 2: $$\\cos(2A) = \\cos^2 A - \\sin^2 A = 2\\cos^2 A - 1 = 1 - 2\\sin^2 A$$. Three forms because we can substitute $$\\sin^2 A + \\cos^2 A = 1$$ in different ways.\n- Step 3: $$\\tan(2A) = \\dfrac{2\\tan A}{1 - \\tan^2 A}$$.\n\nThe three forms of $$\\cos(2A)$$ aren't redundant — each is useful in different contexts (integration, solving equations, etc.).", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why are there three different forms of $$\\cos(2A)$$, and when would you use each? (3 steps)", "answer": "- Step 1: They all come from $$\\cos^2 A - \\sin^2 A$$ using the Pythagorean identity $$\\cos^2 A + \\sin^2 A = 1$$ to eliminate one of the squared terms.\n+ $$\\cos^2 A = 1 - \\sin^2 A$$ gives $$\\cos(2A) = 1 - 2\\sin^2 A$$.\n+ $$\\sin^2 A = 1 - \\cos^2 A$$ gives $$\\cos(2A) = 2\\cos^2 A - 1$$.\n- Step 2: Use $$2\\cos^2 A - 1$$ when integrating $$\\cos^2 A$$: rearrange to $$\\cos^2 A = \\frac{1 + \\cos(2A)}{2}$$.\n- Step 3: Use $$1 - 2\\sin^2 A$$ for $$\\sin^2 A = \\frac{1 - \\cos(2A)}{2}$$. Use $$\\cos^2 A - \\sin^2 A$$ when you need to factor differences of squares like $$(\\cos A - \\sin A)(\\cos A + \\sin A)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Derive $$\\sin(3x)$$ in terms of $$\\sin x$$ only, using double-angle identities and the addition formula. (4 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x)$$ and apply the addition formula: $$\\sin(2x)\\cos x + \\cos(2x)\\sin x$$.\n- Step 2: Substitute double angles: $$\\sin(2x) = 2\\sin x \\cos x$$ and $$\\cos(2x) = \\cos^2 x - \\sin^2 x$$. So we get $$2\\sin x \\cos^2 x + (\\cos^2 x - \\sin^2 x)\\sin x$$.\n- Step 3: Combine: $$2\\sin x \\cos^2 x + \\sin x \\cos^2 x - \\sin^3 x = 3\\sin x \\cos^2 x - \\sin^3 x$$.\n- Step 4: Eliminate $$\\cos^2 x$$ using $$\\cos^2 x = 1 - \\sin^2 x$$: $$3\\sin x (1 - \\sin^2 x) - \\sin^3 x = 3\\sin x - 3\\sin^3 x - \\sin^3 x = 3\\sin x - 4\\sin^3 x$$.\n\nThis derivation pattern — addition formula + double angle + Pythagorean — generates all multiple-angle identities.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why does memorizing double-angle identities matter so much — can't you re-derive them from addition formulas each time? (3 steps)", "answer": "- Step 1: Technically yes — $$\\sin(2A) = \\sin(A+A) = \\sin A \\cos A + \\cos A \\sin A = 2\\sin A \\cos A$$. But under exam time pressure, re-deriving every step bleeds away minutes.\n- Step 2: More importantly, double angles are building blocks for integration ($$\\sin^2 x$$, $$\\cos^2 x$$), R-formulas, and solving trig equations. If they're not at instant recall, you can't even *see* the strategy you need.\n- Step 3: Spaced repetition is the right tool: derive once for understanding, then drill for automaticity.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "State the four basic trig integrals and explain the sign on $$\\int \\sin x \\, dx$$. (2 steps)", "answer": "- Step 1: The integrals:\n+ $$\\int \\cos x \\, dx = \\sin x + c$$\n+ $$\\int \\sin x \\, dx = -\\cos x + c$$\n+ $$\\int \\sec^2 x \\, dx = \\tan x + c$$\n- Step 2: Why the minus sign for $$\\int \\sin x$$: because $$\\frac{d}{dx}(\\cos x) = -\\sin x$$, so to undo this we need $$\\frac{d}{dx}(-\\cos x) = \\sin x$$. The minus flips the derivative sign back. A useful check: differentiate your answer to confirm you recover the integrand.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Without explicit substitution, explain how to integrate $$\\cos(ax + b)$$ and justify the factor of $$1/a$$. (3 steps)", "answer": "- Step 1: $$\\int \\cos(ax + b) \\, dx = \\dfrac{1}{a}\\sin(ax + b) + c$$.\n- Step 2: Justification by differentiation: if we differentiate $$\\sin(ax + b)$$, chain rule gives $$a\\cos(ax + b)$$. There's an extra factor of $$a$$ that we don't want.\n- Step 3: To cancel that extra $$a$$, we divide the antiderivative by $$a$$ upfront — hence $$\\frac{1}{a}\\sin(ax+b)$$. This is the **reverse chain rule**: when the inner function is linear, just divide by the coefficient of $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Compute $$\\int \\sin(3x + 1) \\, dx$$ using the reverse chain rule, and verify by differentiation. (3 steps)", "answer": "- Step 1: The antiderivative of $$\\sin u$$ is $$-\\cos u$$. With $$u = 3x + 1$$, write $$-\\cos(3x+1)$$.\n- Step 2: The inner derivative is $$3$$, so divide by $$3$$: $$-\\dfrac{1}{3}\\cos(3x + 1) + c$$.\n- Step 3: Verify: $$\\frac{d}{dx}\\left[-\\frac{1}{3}\\cos(3x+1)\\right] = -\\frac{1}{3} \\cdot (-\\sin(3x+1)) \\cdot 3 = \\sin(3x+1)$$. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Why does the reverse chain rule (dividing by $$a$$) only work when the inner function is linear in $$x$$? (3 steps)", "answer": "- Step 1: For inner function $$ax + b$$, chain rule gives a constant factor $$a$$ when differentiating — a constant can be pulled out and cancelled by a constant divisor.\n- Step 2: For a non-linear inner function like $$x^2$$, chain rule gives $$2x$$ — a function of $$x$$, not a constant. You can't \"divide by $$2x$$\" outside the integral.\n- Step 3: For non-linear cases, you need full substitution $$u = g(x)$$, $$du = g'(x)\\,dx$$, and the $$g'(x)$$ must already appear (up to a constant) in the integrand. The \"$$1/a$$ trick\" is a shortcut for the special linear case.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Use a double-angle identity to integrate $$\\sin^2 x$$. (3 steps)", "answer": "- Step 1: Direct integration of $$\\sin^2 x$$ is impossible by inspection. Instead, rewrite using $$\\cos(2x) = 1 - 2\\sin^2 x$$, so $$\\sin^2 x = \\dfrac{1 - \\cos(2x)}{2}$$.\n- Step 2: Integrate term by term: $$\\int \\dfrac{1 - \\cos(2x)}{2} \\, dx = \\dfrac{x}{2} - \\dfrac{1}{2} \\cdot \\dfrac{\\sin(2x)}{2} + c$$.\n- Step 3: Simplify: $$\\dfrac{x}{2} - \\dfrac{\\sin(2x)}{4} + c$$.\n\nThis pattern — using $$\\cos(2A)$$ to drop powers — is essential for any $$\\sin^2$$ or $$\\cos^2$$ integral.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "A student claims that $$f(x) = x^2$$ on all of $$\\mathbb{R}$$ has an inverse $$f^{-1}(x) = \\sqrt{x}$$. What's wrong with this claim? (3 steps)", "answer": "- Step 1: $$f(x) = x^2$$ on $$\\mathbb{R}$$ is **not one-to-one**: both $$f(2) = 4$$ and $$f(-2) = 4$$. A function with two inputs mapping to one output cannot be inverted as a function.\n- Step 2: To invert, you must restrict the domain so that $$f$$ is one-to-one. Conventional choice: restrict to $$x \\geq 0$$, giving $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$.\n- Step 3: Lesson: an inverse exists **only when the original is one-to-one (injective) on its stated domain**. The shape of the graph (does any horizontal line cross more than once?) tells you instantly whether an inverse exists.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "If $$f(x)$$ has domain $$[2, 5]$$ and range $$[3, 10]$$, what are the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: For inverse functions, domain and range swap. So domain of $$f^{-1}$$ = range of $$f$$ = $$[3, 10]$$, and range of $$f^{-1}$$ = domain of $$f$$ = $$[2, 5]$$.\n- Step 2: Intuition: the inverse takes outputs back to inputs. Whatever $$f$$ produced (range) is now what $$f^{-1}$$ accepts (domain), and vice versa.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Given a sign change of $$f$$ on $$[1, 2]$$ and a single root there, sketch in your head how iteration could potentially fail to find it, even with sign change confirming existence. (3 steps)", "answer": "- Step 1: Sign change only **proves** a root exists — it doesn't construct one. Iteration $$x_{n+1} = g(x_n)$$ is a separate process whose convergence depends on $$g$$, not on $$f$$'s sign behavior.\n- Step 2: If $$|g'(\\text{root})| > 1$$, the iteration is **repelling**: starting near the root, successive iterates move away. The root exists, sign change confirms it, but iteration diverges.\n- Step 3: These are two independent tools: sign change for **existence**, iteration for **approximation**. You need a well-chosen $$g$$ for the latter to succeed.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "For $$f(x) = e^x$$ and $$g(x) = 2x$$, compare $$fg(0)$$ and $$gf(0)$$. (3 steps)", "answer": "- Step 1: $$fg(0) = f(g(0)) = f(0) = e^0 = 1$$.\n- Step 2: $$gf(0) = g(f(0)) = g(e^0) = g(1) = 2$$.\n- Step 3: $$1 \\neq 2$$: same input, two different outputs depending on the order — once again showing composition isn't commutative. The order in which operations stack changes the final result fundamentally.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}], "count": 30}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3202, "out_tokens": 24539, "reasoning_chars": 38161, "cost_eur": 0.0821, "elapsed_s": 419, "content_chars": 39306}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 3202, "out_tokens": 31940, "reasoning_chars": const SK='maths_p3_jun23_harry';

  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}

  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}

function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
