<script>
const DATA={"selected": [{"question": "Explain the idea behind iterative methods: how do we go from $$f(x) = 0$$ to $$x_{n+1} = g(x_n)$$? (3 steps)", "answer": "- Step 1: Rearrange the equation $$f(x) = 0$$ algebraically into the form $$x = g(x)$$. Any root of $$f$$ is then a **fixed point** of $$g$$ — a point where the input equals the output.\n- Step 2: Define the iteration $$x_{n+1} = g(x_n)$$: pick a starting guess $$x_0$$, plug in, get $$x_1$$, plug that in, get $$x_2$$, and so on.\n- Step 3: If the sequence converges to some value $$L$$, then by continuity $$L = g(L)$$, so $$L$$ is a fixed point of $$g$$ and hence a root of $$f$$. Convergence is not guaranteed for every rearrangement — some choices of $$g$$ diverge.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "If $$f(x) = x^2$$ with domain $$x \\geq 3$$, the inverse is $$f^{-1}(x) = \\sqrt{x}$$. Why is the domain of $$f^{-1}$$ NOT simply $$x \\geq 0$$? (3 steps)", "answer": "- Step 1: The domain of $$f^{-1}$$ equals the range of $$f$$. We must find the range of $$f(x) = x^2$$ where $$x \\geq 3$$.\n- Step 2: When $$x = 3$$, $$f(3) = 9$$. As $$x$$ increases beyond 3, $$x^2$$ increases without bound. So the range of $$f$$ is $$y \\geq 9$$.\n- Step 3: Therefore the domain of $$f^{-1}$$ is $$x \\geq 9$$, not $$x \\geq 0$$. The common mistake is to think \"$$\\sqrt{x}$$ is defined for $$x \\geq 0$$, so the domain is $$x \\geq 0$$\" — but the domain of the inverse is determined by the range of the original function, not by where the formula happens to be mathematically valid.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Why does memorizing double-angle identities matter so much — can't you re-derive them from addition formulas each time? (3 steps)", "answer": "- Step 1: Technically yes — $$\\sin(2A) = \\sin(A+A) = \\sin A \\cos A + \\cos A \\sin A = 2\\sin A \\cos A$$. But under exam time pressure, re-deriving every step bleeds away minutes.\n- Step 2: More importantly, double angles are building blocks for integration ($$\\sin^2 x$$, $$\\cos^2 x$$), R-formulas, and solving trig equations. If they're not at instant recall, you can't even *see* the strategy you need.\n- Step 3: Spaced repetition is the right tool: derive once for understanding, then drill for automaticity.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "A function $$f(x) = \\frac{1}{x-2}$$ is evaluated at $$f(1) = -1$$ and $$f(3) = 1$$, showing a sign change on $$[1, 3]$$. Does a root of $$f(x) = 0$$ exist in this interval? Explain why or why not. (2 steps)", "answer": "- Step 1: No root exists. The equation $$\\frac{1}{x-2} = 0$$ has no solution — a fraction equals zero only when its numerator is zero, but the numerator is the constant 1, never zero. The sign change from $$-1$$ to $$1$$ is real, but it doesn't indicate a root.\n- Step 2: The reason: $$f(x) = \\frac{1}{x-2}$$ is *not continuous* on $$[1, 3]$$ — it has a vertical asymptote at $$x = 2$$ where the function jumps from $$-\\infty$$ to $$+\\infty$$, passing through every value but never actually reaching zero. This is the classic counterexample showing why the continuity condition cannot be omitted from the sign change argument.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Outline the four-step algebraic procedure for finding $$f^{-1}(x)$$, and explain why each step does what it does. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$. This just names the output so we can manipulate it.\n- Step 2: Swap $$x$$ and $$y$$: $$x = f(y)$$. This encodes the inverse relationship — the inverse \"reads the function backwards,\" so the old output becomes the new input.\n- Step 3: Solve for $$y$$ in terms of $$x$$. The resulting expression is $$f^{-1}(x)$$.\n- Step 4: **State the domain of $$f^{-1}$$**, which equals the range of the original $$f$$. Without this, the function is incompletely defined.\n\nA function is not fully specified by a formula alone — it requires both a rule and a domain.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Why is stating the domain considered a non-negotiable part of *defining* an inverse function, rather than an optional extra?", "answer": "A function is not just a formula — it is a formula **plus** the set of inputs it acts on. Two functions with the same formula but different domains are different functions. For an inverse, the natural domain is the range of the original function: outside that set there is no original input to \"undo,\" so the inverse is undefined. Omitting the domain leaves the inverse ambiguous (it might accidentally include values $$f$$ never produced). Therefore \"define $$f^{-1}$$\" means: give the rule **and** give the domain.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Why does the sign change method only guarantee at least one root, not exactly one? Give an example where f(a) and f(b) have opposite signs but there are two roots in (a, b). (1 step)", "answer": "Consider a cubic that dips below the x-axis and then comes back up, crossing twice in one interval. For example, f(x) = x³ - x on the interval [-2, 2]: f(-2) = -8 + 2 = -6 (negative), f(2) = 8 - 2 = 6 (positive), but f(x) = 0 at x = -1, 0, and 1 — three roots in the interval. The sign change only guarantees an odd number of roots (at least one).", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "A student integrating $$\\int \\cos^2(x)\\,dx$$ writes the answer as just $$\\frac{\\sin(2x)}{4} + c$$, forgetting the $$\\frac{x}{2}$$ term. Where does the $$\\frac{x}{2}$$ come from, and why can't you drop it? (2 steps)", "answer": "- Step 1: After substituting $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$, the integral splits into $$\\int \\frac{1}{2}\\,dx + \\int \\frac{\\cos(2x)}{2}\\,dx$$. The first part $$\\int \\frac{1}{2}\\,dx = \\frac{x}{2}$$ — this is the integral of a constant, producing a linear term. The student only computed the second part.\n- Step 2: The $$\\frac{x}{2}$$ term cannot be dropped because $$\\cos^2(x)$$ is not purely oscillatory — it has a constant \"average value\" of $$\\frac{1}{2}$$ (since $$\\cos^2$$ oscillates between 0 and 1). This constant component accumulates over time, producing the linear growth term $$\\frac{x}{2}$. Without it, the antiderivative wouldn't grow on average, contradicting the fact that $$\\cos^2(x) > 0$$ most of the time.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "Why is fg(x) generally not equal to gf(x)? Give a conceptual reason, then illustrate with $$f(x) = x^2$$ and $$g(x) = x + 1$$. (2 steps)", "answer": "- Step 1: **Conceptual reason**: $$fg(x) = f(g(x))$$ means \"apply g, then f,\" while $$gf(x) = g(f(x))$$ means \"apply f, then g.\" These are different operations in a different order. Function composition is not commutative, just as \"put on socks then shoes\" gives a different result from \"put on shoes then socks.\"\n- Step 2: **Counterexample**: With $$f(x) = x^2$$ and $$g(x) = x + 1$$:\n+ $$fg(x) = f(g(x)) = f(x+1) = (x+1)^2 = x^2 + 2x + 1$$\n+ $$gf(x) = g(f(x)) = g(x^2) = x^2 + 1$$\nThese are clearly different: $$x^2 + 2x + 1 \\neq x^2 + 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "For an iteration $$x_{n+1} = g(x_n)$$ to converge to a root $$\\alpha$$, what condition on $$g'(x)$$ near the root is needed, and what happens if this condition is violated? (2 steps)", "answer": "- Step 1: The iteration converges if $$|g'(\\alpha)| < 1$$. The smaller $$|g'(\\alpha)|$$, the faster the convergence. Intuitively, $$g$$ must be a \"contraction\" — it shrinks distances rather than expanding them.\n- Step 2: If $$|g'(\\alpha)| > 1$$, the iteration diverges — each step takes you further from the root rather than closer. If $$|g'(\\alpha)| = 1$$, the behavior is borderline. This is why different rearrangements of the same equation $$f(x) = 0$$ can lead to convergence or divergence — the choice of rearrangement determines $$g'(\\alpha)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "A student claims that since $$\\cos(2A)$$ can be written three ways, they're free to pick any one for any problem. When is this true, and when does the choice actually matter? (3 steps)", "answer": "- Step 1: For *solving trig equations*, all three forms are equivalent — they describe the same number, so substitution gives the same solutions either way.\n- Step 2: For *integration*, the choice matters hugely. To integrate $$\\cos^2 x$$, you need the form $$\\cos(2x) = 2\\cos^2 x - 1 \\Rightarrow \\cos^2 x = \\tfrac{1 + \\cos(2x)}{2}$$. The other forms don't isolate $$\\cos^2 x$$ cleanly.\n- Step 3: Likewise, integrating $$\\sin^2 x$$ requires $$\\cos(2x) = 1 - 2\\sin^2 x$$. The \"wrong\" choice doesn't make the problem unsolvable, but it forces extra algebra.\n\nLesson: pick the form whose squared term matches the expression you're trying to simplify.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "To integrate $$\\int \\sin^2 x \\, dx$$, why can't we just apply the basic $$\\int \\sin x \\, dx$$ rule, and what is the conceptual trick? (3 steps)", "answer": "- Step 1: $$\\sin^2 x$$ is not a basic trig function — it's a *product* $$\\sin x \\cdot \\sin x$$. The basic rule doesn't apply to powers.\n- Step 2: The trick: use the double-angle identity $$\\cos(2x) = 1 - 2\\sin^2 x$$, rearranged to $$\\sin^2 x = \\dfrac{1 - \\cos(2x)}{2}$$.\n- Step 3: Now the integrand is a sum of constants and $$\\cos(2x)$$, both of which we can integrate directly: $$\\int \\sin^2 x \\, dx = \\tfrac{1}{2}x - \\tfrac{1}{4}\\sin(2x) + c$$.\n\nBig idea: double-angle identities are not just for trig equations — they convert powers of trig functions into linear combinations that are integrable. This is the standard \"power-reduction\" technique.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Prove that sin(3x) = 3sin(x) - 4sin³(x). (3 steps)", "answer": "- Step 1: Write sin(3x) = sin(2x + x) and use the angle addition formula: sin(2x + x) = sin(2x)cos(x) + cos(2x)sin(x)\n- Step 2: Substitute the double angle formulas: sin(2x) = 2sin(x)cos(x), cos(2x) = cos²(x) - sin²(x)\nSo: = [2sin(x)cos(x)]cos(x) + [cos²(x) - sin²(x)]sin(x) = 2sin(x)cos²(x) + sin(x)cos²(x) - sin³(x)\n- Step 3: Simplify: = 3sin(x)cos²(x) - sin³(x). Using cos²(x) = 1 - sin²(x): = 3sin(x)(1 - sin²(x)) - sin³(x) = 3sin(x) - 3sin³(x) - sin³(x) = 3sin(x) - 4sin³(x)", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "Derive the double angle formula for $$\\tan(2A)$$ from the angle addition formula for $$\\tan(A+B)$$, and explain why the denominator has a minus sign rather than a plus. (3 steps)", "answer": "- Step 1: The addition formula is $$\\tan(A+B) = \\frac{\\tan(A) + \\tan(B)}{1 - \\tan(A)\\tan(B)}$$. Setting $$B = A$$ gives $$\\tan(2A) = \\frac{\\tan(A) + \\tan(A)}{1 - \\tan(A)\\tan(A)} = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$.\n- Step 2: The minus sign in the denominator comes from the original derivation of $$\\tan(A+B)$$ from $$\\sin(A+B)/\\cos(A+B)$$: $$\\cos(A+B) = \\cos(A)\\cos(B) - \\sin(A)\\sin(B)$$, and dividing numerator and denominator by $$\\cos(A)\\cos(B)$$ produces $$1 - \\tan(A)\\tan(B)$$ in the denominator. The minus arises from the minus in the cosine addition formula.\n- Step 3: A common mistake is writing $$1 + \\tan^2(A)$$ in the denominator. Sanity check: for $$A = 45°$$, $$\\tan(90°)$$ is undefined (infinite), and the formula gives $$\\frac{2 \\cdot 1}{1 - 1} = \\frac{2}{0}$$, correctly undefined. But $$\\frac{2}{1+1} = 1$$, which is wrong. The minus sign is essential for correctness.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "When two curves $$y_1 = f(x)$$ and $$y_2 = g(x)$$ intersect, we set $$f(x) = g(x)$$ and rearrange to get a polynomial equal to zero. Why does setting them equal find the intersection points, and what does the resulting polynomial = 0 represent geometrically? (2 steps)", "answer": "- Step 1: At an intersection point, both curves share the same $$y$$-value for the same $$x$$-value. So the condition for intersection is $$f(x) = g(x)$$ — this equation captures exactly those $$x$$-values where the two curves are at the same height. Rearranging to $$f(x) - g(x) = 0$$ gives us a single expression whose roots are the intersection $$x$$-coordinates.\n- Step 2: Geometrically, the function $$h(x) = f(x) - g(x)$$ represents the *vertical gap* between the two curves. Where this gap is zero ($$h(x) = 0$$), the curves meet. The roots of the polynomial are precisely the $$x$$-coordinates where that vertical gap closes to nothing — the intersection points.\n\nSetting equations equal is really asking: \"where is the difference between these curves exactly zero?\"", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A function $$f(x) = e^x + 3$$ has domain all real numbers and range $$y > 3$$ (since $$e^x > 0$$ always). Find $$f^{-1}(x)$$ algebraically and state its domain. (3 steps)", "answer": "- Step 1: Write $$y = e^x + 3$$, swap $$x$$ and $$y$$: $$x = e^y + 3$$, then solve for $$y$$: $$e^y = x - 3$$, so $$y = \\ln(x - 3)$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, which is $$y > 3$$, so the domain of $$f^{-1}$$ is $$x > 3$$.\n- Step 3: Check: $$f^{-1}(x) = \\ln(x-3)$$, domain $$x > 3$$. For $$x = 4$$: $$f^{-1}(4) = \\ln(1) = 0$$, and indeed $$f(0) = e^0 + 3 = 4$$. The inverse correctly maps $$4 \\to 0$$, reversing $$f$$'s mapping of $$0 \\to 4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "A continuous function has a sign change between $$x = 1$$ and $$x = 4$$. Does this guarantee exactly one root in $$(1, 4)$$? Why or why not?", "answer": "No, it does not guarantee exactly one root. The sign change (combined with continuity) guarantees **at least one** root, but there could be three, five, or any odd number of roots in the interval. The function could cross the x-axis multiple times, as long as it starts on one side and ends on the other. For example, a function could be positive at $$x = 1$$, cross to negative, cross back to positive, then cross to negative again by $$x = 4$$ — giving three roots. The sign change only constrains the net crossing, not the total number of crossings.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "The function $$f(x) = e^x$$ has no inverse over all real numbers if we don't restrict the domain. Why is this the case, and what does \"failing the horizontal line test\" mean in this context?", "answer": "- Step 1: $$f(x) = e^x$$ actually DOES have an inverse ($$\\ln(x)$$) because it passes the horizontal line test — it's one-to-one. Each y-value is produced by exactly one x-value. The confusion is with functions like $$f(x) = x^2$$ (all reals), which FAIL the horizontal line test: both $$x = 2$$ and $$x = -2$$ give $$f(x) = 4$$, so the inverse wouldn't be a function (it would need to map 4 to both 2 and −2).\n- Step 2: For a function to have an inverse, it must be one-to-one (injective): each output comes from exactly one input. If a horizontal line crosses the graph more than once, the function is not one-to-one, and we must restrict the domain to make it so. For $$x^2$$, restricting to $$x \\geq 0$$ makes it one-to-one and hence invertible.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "Why does solving $$f(x) = f^{-1}(x)$$ often reduce to solving $$f(x) = x$$? (3 steps)", "answer": "- Step 1: $$f$$ and $$f^{-1}$$ are reflections of each other in $$y = x$$. Any intersection between them must therefore lie on (or be symmetric about) this line of symmetry.\n- Step 2: For increasing functions, the intersections **lie on** $$y = x$$, so $$f(x) = f^{-1}(x) \\iff f(x) = x$$.\n- Step 3: Practical use: instead of computing $$f^{-1}$$ (which can be messy), just solve the simpler $$f(x) = x$$. Caveat: for non-monotonic functions, extra intersections off the line $$y = x$$ may exist.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "To find an inverse function $$f^{-1}(x)$$ algebraically, we use the \"swap method\": write $$y = f(x)$$, swap $$x$$ and $$y$$, then solve for $$y$$. Why does swapping $$x$$ and $$y$$ produce the inverse, and what does this swap represent conceptually? (2 steps)", "answer": "- Step 1: The original function $$f$$ maps inputs $$x$$ to outputs $$y$$: $$y = f(x)$$ means \"given $$x$$, the function tells you $$y$$.\" The inverse does the reverse job: \"given $$y$$, tell me which $$x$$ produced it.\" So we want to express $$x$$ in terms of $$y$$ — that is, solve $$y = f(x)$$ for $$x$$.\n- Step 2: Swapping $$x$$ and $$y$$ before solving is just a notational convention so that our final answer is expressed as $$y = f^{-1}(x)$$ (with $$y$$ as the output and $$x$$ as the input, matching standard function notation). Conceptually, the swap says: \"treat the old output as the new input, and find what the old input must have been.\" The solving step then computes that reverse mapping.\n\nThe swap itself doesn't change the mathematical relationship — it just re-labels the variables so the result looks like a standard function definition.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why does a sign change *guarantee* a root only when continuity holds — what is the intuitive picture? (3 steps)", "answer": "- Step 1: Visualise the graph as a continuous pen-stroke from $$(a, f(a))$$ below the $$x$$-axis to $$(b, f(b))$$ above it (or vice versa).\n- Step 2: To get from below to above without lifting the pen, the curve must cross the $$x$$-axis at least once — that crossing point is a root. This is the Intermediate Value Theorem in action.\n- Step 3: If continuity fails, the pen *can* lift. A function with a vertical asymptote, jump discontinuity, or removable hole can switch sign by \"teleporting\" across zero, never actually equalling it. So continuity is what forces the curve to physically cross the axis.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does miscopying a coefficient (e.g. writing $$2x^2$$ instead of $$x^2$$) often produce intersection points that look \"almost right\" but are actually wrong? (2 steps)", "answer": "- Step 1: A wrong coefficient changes the parabola's width/steepness but not its general shape, so when set equal to the other curve, the resulting quadratic still has real roots — the algebra \"works\" without flagging an error.\n- Step 2: The roots, however, are numerically different. Since you don't get a contradiction or undefined operation, the only safeguard is to **re-read the original equation before solving**. The lesson: copy-checking is part of the math, not a separate task.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "When two curves $$y = f(x)$$ and $$y = g(x)$$ intersect, what algebraic condition defines their intersection points, and what type of equation typically results? (3 steps)", "answer": "- Step 1: Intersection means the two curves share both an $$x$$ and a $$y$$ value at the same point. Since $$y$$ is the same, we can equate the expressions: $$f(x) = g(x)$$.\n- Step 2: Rearrange so one side is zero: $$f(x) - g(x) = 0$$. This converts the geometric problem (where do they cross?) into an algebraic root-finding problem.\n- Step 3: If both curves are polynomial (e.g. line + parabola), the result is a polynomial equation, usually quadratic, solvable by factoring or the quadratic formula. Each real root corresponds to one intersection point's $$x$$-coordinate.\n\nGeometric crossing ↔ algebraic root: this duality underpins much of A-level coordinate geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "A student solving simultaneous equations writes $$x^2 + 3x - 4 = 0$$ but the correct equation is $$x^2 - 3x - 4 = 0$$. How would substituting their solutions back into the original equations reveal the error? (2 steps)", "answer": "- Step 1: The student's equation factors as $$(x + 4)(x - 1) = 0$$, giving $$x = -4$$ or $$x = 1$$. The correct equation factors as $$(x - 4)(x + 1) = 0$$, giving $$x = 4$$ or $$x = -1$$. Different solutions entirely.\n- Step 2: When the student substitutes $$x = -4$$ into both original curves, the y-values won't match (the curves don't actually intersect there). This failed substitution check immediately signals an error in the setup, not just in the solving.\n\nThis is why back-substitution is an essential sanity check — it catches transcription errors that pure algebra cannot.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "For f(x) = 1/x (domain x ≠ 0), find f⁻¹(x) and state its domain and range. What happens graphically? (2 steps)", "answer": "- Step 1: y = 1/x → swap x and y: x = 1/y → solve: y = 1/x. So f⁻¹(x) = 1/x (self-inverse!).\n- Step 2: Domain of f⁻¹ = Range of f = x ≠ 0. Range of f⁻¹ = Domain of f = x ≠ 0. Graphically, y = 1/x is its own reflection across y = x — it lies symmetrically about this line. This is a special case where f = f⁻¹.", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "How do the three forms of $$\\cos(2A)$$ arise from a single identity? Walk through the derivation from the original form to the other two. (3 steps)", "answer": "- Step 1: Starting from the angle addition formula $$\\cos(A+B) = \\cos(A)\\cos(B) - \\sin(A)\\sin(B)$$, set $$B = A$$ to get $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ — this is the first (difference) form.\n- Step 2: To get the cos-only form, use the Pythagorean identity $$\\sin^2(A) = 1 - \\cos^2(A)$$ to substitute: $$\\cos(2A) = \\cos^2(A) - (1 - \\cos^2(A)) = 2\\cos^2(A) - 1$$.\n- Step 3: To get the sin-only form, use $$\\cos^2(A) = 1 - \\sin^2(A)$$ instead: $$\\cos(2A) = (1 - \\sin^2(A)) - \\sin^2(A) = 1 - 2\\sin^2(A)$$.\n\nAll three are the same identity — just with one squared term replaced using $$\\sin^2 + \\cos^2 = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Why does the sign-change method guarantee a root only inside the open interval, not at the endpoints? (2 steps)", "answer": "- Step 1: At the endpoints, $$f(a)$$ and $$f(b)$$ are non-zero (they have definite signs). So the root cannot be at $$a$$ or $$b$$.\n- Step 2: The Intermediate Value Theorem (the underlying principle) says a continuous function taking values of opposite sign must pass through every intermediate value, including zero, somewhere strictly between $$a$$ and $$b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Evaluate $$\\int \\cos(5x - 2)\\,dx$$ using the reverse chain rule. Walk through the reasoning for both the coefficient and the inner function. (3 steps)", "answer": "- Step 1: The integrand is $$\\cos$$ of a linear inner function $$u = 5x - 2$$, whose derivative is $$\\frac{du}{dx} = 5$$. The reverse chain rule says: $$\\int \\cos(u)\\,dx = \\frac{1}{u'}\\sin(u) + c$$ when $$u$$ is linear.\n- Step 2: Dividing by the derivative of the inner function: $$\\frac{1}{5}\\sin(5x - 2) + c$$. The factor $$\\frac{1}{5}$$ cancels the 5 that the chain rule would bring down upon differentiation.\n- Step 3: Verify: $$\\frac{d}{dx}\\left[\\frac{1}{5}\\sin(5x-2)\\right] = \\frac{1}{5} \\cdot 5 \\cdot \\cos(5x-2) = \\cos(5x-2)$$ — correct. The constant $$-2$$ inside doesn't affect the coefficient; only the multiplier of $$x$$ (the 5) matters.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "Evaluate $$\\int \\sin(2x + 1)\\,dx$$, carefully accounting for both the reverse chain rule coefficient and the sign rule. (3 steps)", "answer": "- Step 1: The inner function is $$u = 2x + 1$$, derivative $$u' = 2$$, so the reverse chain rule gives a factor of $$\\frac{1}{2}$$.\n- Step 2: The base integral $$\\int \\sin(u)\\,du = -\\cos(u)$$, so applying the coefficient: $$\\int \\sin(2x+1)\\,dx = -\\frac{1}{2}\\cos(2x+1) + c$$.\n- Step 3: Verify: $$\\frac{d}{dx}\\left[-\\frac{1}{2}\\cos(2x+1)\\right] = -\\frac{1}{2} \\cdot 2 \\cdot (-\\sin(2x+1)) = \\sin(2x+1)$$ — the two negatives cancel, and the 2 cancels the $$\\frac{1}{2}$$, giving exactly the integrand. Both the sign and coefficient are essential.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "Describe the structure of a fixed-point iteration for solving $$f(x) = 0$$ numerically. (4 steps)", "answer": "- Step 1: Rearrange $$f(x) = 0$$ into the form $$x = g(x)$$. Any value of $$x$$ satisfying this is a root of $$f$$, because $$x = g(x)$$ is just $$f(x) = 0$$ in disguise.\n- Step 2: Pick a starting value $$x_0$$ close to the suspected root (using a sign-change argument, for instance).\n- Step 3: Iterate: $$x_{n+1} = g(x_n)$$. Each iterate feeds back into $$g$$ to produce the next.\n- Step 4: If the sequence converges, the limit $$L$$ satisfies $$L = g(L)$$ — a fixed point — which is the root we wanted.\n\nCalculator trick: store $$x_0$$ as Ans, type the formula using Ans, then press $$=$$ repeatedly; each press performs one iteration.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "When sketching $$y = f^{-1}(x)$$ from a given sketch of $$y = f(x)$$, what mechanical procedure should you follow, and what features must transfer correctly? (3 steps)", "answer": "- Step 1: Draw the line $$y = x$$ as a dashed reference. Then reflect each key feature of $$f$$ across this line — points, intercepts, and asymptotes all swap their coordinates.\n- Step 2: $$x$$-intercepts of $$f$$ become $$y$$-intercepts of $$f^{-1}$$ (and vice versa). A horizontal asymptote $$y = c$$ of $$f$$ becomes a vertical asymptote $$x = c$$ of $$f^{-1}$$.\n- Step 3: The domain/range swap: where $$f$$ was defined (its $$x$$-extent) becomes the $$y$$-extent of $$f^{-1}$$, and the $$y$$-extent of $$f$$ becomes the $$x$$-extent of $$f^{-1}$$.\n\nSanity check: if you pick a point on your $$f^{-1}$$ sketch and swap its coordinates, you should land back on $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A student claims that if $$f(a) = 3$$ and $$f(b) = -3$$, there must be exactly one root between $$a$$ and $$b$$. Is this claim correct? Explain the difference between \"at least one\" and \"exactly one.\" (2 steps)", "answer": "- Step 1: The claim is incorrect. The sign change rule guarantees *at least one* root, not *exactly one*. The function could wiggle up and down multiple times between $$a$$ and $$b$$, crossing the $$x$$-axis at several points. Each crossing is a root.\n- Step 2: For example, $$f(x) = (x-1)(x-2)(x-3) = x^3 - 6x^2 + 11x - 6$$ on $$[0, 4]$$: $$f(0) = -6 < 0$$ and $$f(4) = 64 - 96 + 44 - 6 = 6 > 0$$, sign change confirmed. But there are three roots at $$x = 1, 2, 3$$, not one. Sign change proves existence, not uniqueness — to claim exactly one root, you'd need additional information (like the function being strictly monotonic on the interval).", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "A student claims that $$\\ln(0) = 1$$ and $$\\ln(1) = 0$$. Which statement is correct, which is wrong, and why? (2 steps)", "answer": "- Step 1: $$\\ln(1) = 0$$ is **correct**. This asks: \"what power of e equals 1?\" Since $$e^0 = 1$$, the answer is 0.\n- Step 2: $$\\ln(0) = 1$$ is **wrong**. $$\\ln(0)$$ is undefined — there is no real number y such that $$e^y = 0$$, because the exponential function is always positive. The value $$\\ln(0)$$ does not exist; it's not 1, not 0, not any number.\n\nCommon confusion: mixing up $$\\ln(1) = 0$$ with $$e^0 = 1$$. The inverse relationship means these are \"mirror\" facts — they say the same thing from opposite directions.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A student writes $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$ with a plus sign instead of minus. How can you immediately detect this error using a known identity? (2 steps)", "answer": "- Step 1: The Pythagorean identity $$\\cos^2(A) + \\sin^2(A) = 1$$ is always true. If $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$, then $$\\cos(2A) = 1$$ for all $$A$$, which is clearly false — cosine of double angle is not always 1.\n- Step 2: The correct identity $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ gives variable values: at $$A = 0$$, $$\\cos(0) = 1$$; at $$A = 90°$$, $$\\cos(180°) = -1$$. The minus sign is what allows $$\\cos(2A)$$ to vary. The plus sign version collapses to the constant 1, immediately revealing the error. Always sanity-check identities against special angles or known facts.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "A student asked to sketch $$y = \\ln(x)$$ draws a curve through $$(0, 1)$$ that increases rapidly. What did they actually draw, and what are the two key visual differences from $$\\ln(x)$$? (3 steps)", "answer": "- Step 1: They drew $$y = e^x$$ instead of $$y = \\ln(x)$$. The curve through $$(0, 1)$$ increasing rapidly is the exponential function.\n- Step 2: The two key visual differences: (1) $$e^x$$ has a horizontal asymptote at $$y = 0$$ and grows fast; $$\\ln(x)$$ has a vertical asymptote at $$x = 0$$ and grows slowly. (2) $$e^x$$ passes through $$(0, 1)$$; $$\\ln(x)$$ passes through $$(1, 0)$$.\n- Step 3: The two graphs are reflections of each other in the line $$y = x$$ — they are inverse functions. If you're unsure which is which, check: does the curve cross the x-axis (ln) or the y-axis ($$e^x$$)?", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why does the iteration $$x_{n+1} = g(x_n)$$ converge to a root of $$f(x) = 0$$ when the rearrangement $$x = g(x)$$ is valid? What is the fixed point connection? (2 steps)", "answer": "- Step 1: The rearrangement $$f(x) = 0 \\Rightarrow x = g(x)$$ means that any root of $$f$$ is a \"fixed point\" of $$g$$ — a value where applying $$g$$ returns the same value: $$g(\\alpha) = \\alpha$$. The iteration hunts for this fixed point by repeatedly applying $$g$$.\n- Step 2: If the iteration converges ($$x_n \\to \\alpha$$ as $$n \\to \\infty$$), then taking limits on both sides of $$x_{n+1} = g(x_n)$$ gives $$\\alpha = g(\\alpha)$$ — the limit is a fixed point of $$g$$, hence a root of $$f(x) = 0$$ (since $$x = g(x)$$ was rearranged from $$f(x) = 0$$). Convergence means the sequence stabilizes at exactly the value we're seeking.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "Why can't you find an inverse for $$f(x) = \\cos(x)$$ with domain all real numbers, but you *can* find one if the domain is restricted to $$0 \\leq x \\leq \\pi$$? What is the inverse in that case? (3 steps)", "answer": "- Step 1: With domain all reals, $$\\cos(x)$$ is not one-to-one: $$\\cos(0) = 1$$, $$\\cos(2\\pi) = 1$$, $$\\cos(-2\\pi) = 1$$, etc. Multiple inputs give the same output, so no unique inverse exists.\n- Step 2: Restricting to $$0 \\leq x \\leq \\pi$$ makes $$\\cos(x)$$ one-to-one: on this interval, cosine decreases steadily from 1 to $$-1$$ without repeating any value. Each output has exactly one input.\n- Step 3: The inverse is $$f^{-1}(x) = \\cos^{-1}(x)$$ (arccosine) with domain $$-1 \\leq x \\leq 1$$ (the range of $$\\cos$$ on the restricted domain) and range $$0 \\leq y \\leq \\pi$$ (the original restricted domain, now swapped to become the range). This is why inverse trig functions are defined with specific principal ranges.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "If $$f(a)$$ is negative and $$f(b)$$ is positive, and $$f$$ is continuous on $$[a, b]$$, what conclusion can you draw? Why is the continuity condition essential — give a counterexample where sign change occurs but no root exists. (3 steps)", "answer": "- Step 1: By the sign change rule (a consequence of the Intermediate Value Theorem), if $$f(a) < 0$$ and $$f(b) > 0$$ (or vice versa), and $$f$$ is continuous on $$[a, b]$$, then there exists at least one $$c$$ in the interval $$(a, b)$$ such that $$f(c) = 0$$ — a root must exist. The function must cross the $$x$$-axis somewhere between $$a$$ and $$b$$.\n- Step 2: Continuity is essential because a discontinuous function can \"jump\" over zero without ever touching it. Consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$: $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$ — there's a sign change. But $$f$$ has a discontinuity at $$x = 0$$ (it jumps from $$-\\infty$$ to $$+\\infty$$), and $$f(x) = 0$$ has no solution anywhere. The sign change gave a false signal.\n- Step 3: In exam answers, always state both conditions explicitly: \"f(a) and f(b) have opposite signs AND f is continuous on [a, b], therefore a root exists in (a, b).\" Omitting continuity is a common mistake that makes your argument incomplete.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Given a sign change of $$f$$ on $$[1, 2]$$ and a single root there, sketch in your head how iteration could potentially fail to find it, even with sign change confirming existence. (3 steps)", "answer": "- Step 1: Sign change only **proves** a root exists — it doesn't construct one. Iteration $$x_{n+1} = g(x_n)$$ is a separate process whose convergence depends on $$g$$, not on $$f$$'s sign behavior.\n- Step 2: If $$|g'(\\text{root})| > 1$$, the iteration is **repelling**: starting near the root, successive iterates move away. The root exists, sign change confirms it, but iteration diverges.\n- Step 3: These are two independent tools: sign change for **existence**, iteration for **approximation**. You need a well-chosen $$g$$ for the latter to succeed.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why is it not enough to find sign-change brackets to \"prove\" you've found *all* roots of $$f(x) = 0$$? (3 steps)", "answer": "- Step 1: Each sign change reveals at least one root in that bracket — but it tells you nothing about roots elsewhere on the real line.\n- Step 2: A root where the function only *touches* the axis (a double root, like $$f(x) = (x-1)^2$$) doesn't change sign at all. Sign-change methods miss these entirely.\n- Step 3: To claim \"all roots,\" you typically need additional information: degree of the polynomial (a degree-$$n$$ polynomial has at most $$n$$ roots), monotonicity arguments, or a full graph sketch.\n\nLesson: sign change is a **finder** of roots, not a **counter** of roots.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Explain why $$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ does not have an inverse, but $$f(x) = x^2$$ with domain $$x \\geq 0$$ does. (3 steps)", "answer": "- Step 1: For a function to have an inverse, it must be one-to-one (each output comes from exactly one input).\n- Step 2: With domain $$\\mathbb{R}$$, $$f(x) = x^2$$ maps both $$x = 2$$ and $$x = -2$$ to $$f = 4$$. So $$f$$ is not one-to-one, and $$f^{-1}(4)$$ would need to be both 2 and −2, violating the function definition.\n- Step 3: With domain $$x \\geq 0$$, each positive output comes from exactly one non-negative input (e.g., only $$x = 2$$ gives $$f = 4$$). The function is now one-to-one, so the inverse $$f^{-1}(x) = \\sqrt{x}$$ exists. Restricting the domain is the standard technique to make a function invertible.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "A student claims that $$f(x) = x^2$$ on all of $$\\mathbb{R}$$ has an inverse $$f^{-1}(x) = \\sqrt{x}$$. What's wrong with this claim? (3 steps)", "answer": "- Step 1: $$f(x) = x^2$$ on $$\\mathbb{R}$$ is **not one-to-one**: both $$f(2) = 4$$ and $$f(-2) = 4$$. A function with two inputs mapping to one output cannot be inverted as a function.\n- Step 2: To invert, you must restrict the domain so that $$f$$ is one-to-one. Conventional choice: restrict to $$x \\geq 0$$, giving $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$.\n- Step 3: Lesson: an inverse exists **only when the original is one-to-one (injective) on its stated domain**. The shape of the graph (does any horizontal line cross more than once?) tells you instantly whether an inverse exists.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "On a graph where $$y = f(x)$$ and $$y = f^{-1}(x)$$ are both plotted along with $$y = x$$, if the two curves intersect at a point that is *not* on the line $$y = x$$, what must be true about that intersection? (2 steps)", "answer": "- Step 1: If $$f$$ and $$f^{-1}$$ intersect at a point $$a, b$$ not on $$y = x$$ (so $$a \\neq b$$), then since $$f^{-1}$$ is the reflection of $$f$$ in $$y = x$$, the reflected point $$b, a$$ must also lie on both curves. So there's a *pair* of intersection points: $$a, b$$ and $$b, a$$, symmetric about the line $$y = x$$.\n- Step 2: This means: if $$f(a) = b$$ and $$f^{-1}(a) = b$$, then since $$f^{-1}(a) = b$$ implies $$f(b) = a$$, we get $$f(b) = a$$ and $$f^{-1}(b) = a$$ — the point $$b, a$$ is also an intersection. Every off-diagonal intersection comes with its mirror partner. Only intersections on $$y = x$$ (where $$f(a) = a$$) can appear alone.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Why is the continuity condition essential for the sign change method? Describe a counterexample where a sign change occurs but no root exists. (3 steps)", "answer": "- Step 1: Continuity ensures the function can't \"jump\" across the x-axis without touching it. A continuous function must pass through zero if it goes from positive to negative (or vice versa) — it cannot teleport.\n- Step 2: Counterexample: consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$. We have $$f(-1) = -1$$ (negative) and $$f(1) = 1$$ (positive) — a sign change exists.\n- Step 3: But $$f(x) = \\frac{1}{x}$$ has a vertical asymptote at $$x = 0$$ and is not continuous on $$[-1, 1]$$. The function never equals zero; it jumps from $$-\\infty$$ to $$+\\infty$$ at $$x = 0$$. The sign change does NOT indicate a root — continuity was the missing condition.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "For $$f(x) = e^x$$ with domain $$\\mathbb{R}$$, find $$f^{-1}$$ and confirm the domain/range swap visually. (3 steps)", "answer": "- Step 1: Algebraically: $$y = e^x \\Rightarrow x = e^y \\Rightarrow y = \\ln x$$. So $$f^{-1}(x) = \\ln x$$.\n- Step 2: Range of $$f$$ is $$(0, \\infty)$$ (exponentials are always positive). Therefore domain of $$f^{-1}$$ is $$x > 0$$ — matches the domain of $$\\ln$$. ✓\n- Step 3: Domain of $$f$$ is $$\\mathbb{R}$$, so range of $$f^{-1}$$ is $$\\mathbb{R}$$ — matches the range of $$\\ln$$. ✓\n\nGeometrically: $$e^x$$ has a horizontal asymptote $$y = 0$$; reflecting in $$y = x$$ turns this into the vertical asymptote $$x = 0$$ of $$\\ln x$$. Perfect mirror.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "For the iteration x_{n+1} = g(x_n), the graph of y = g(x) and y = x are shown. How can you tell if the iteration will converge to the intersection point? (1 step)", "answer": "If the graph of y = g(x) crosses y = x with a slope steeper than 1 (|g'(x)| > 1), the iteration diverges (oscillates or runs away). If the slope is shallower than 1 (|g'(x)| < 1) at the intersection, the iteration converges. Visualize: if g(x) is \"flatter\" than the line y = x near the intersection, the iterations approach the fixed point like a staircase or cobweb.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "If instead we consider $$gf(x) = g(f(x)) = \\ln(x-5)$$ with the same $$f$$ and $$g$$, what is the domain of this composite? Compare with the domain of $$fg(x)$$ from the previous question. (2 steps)", "answer": "- Step 1: $$gf(x) = \\ln(x - 5)$$ requires $$x - 5 > 0$$ (for $$\\ln$$ to accept the input), so the domain is $$x > 5$$. We also need $$f(x) = x - 5$$ to exist first, which it does for all real $$x$$, but the key restriction comes from $$g$$ needing a positive input.\n- Step 2: Compare: $$fg$$ has domain $$x > 0$$, but $$gf$$ has domain $$x > 5$$. The domains are different, confirming once again that composition order matters — not just for the output values, but even for which inputs are valid. Reversing the order can shrink or shift the domain.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "To show that $$x^3 - x - 4 = 0$$ has a root between $$x = 1$$ and $$x = 2$$, what calculation and what essential statement do you need? (3 steps)", "answer": "- Step 1: Evaluate $$f(1) = 1 - 1 - 4 = -4$$ (negative) and $$f(2) = 8 - 2 - 4 = 2$$ (positive).\n- Step 2: Since $$f(1) < 0$$ and $$f(2) > 0$$, there is a sign change over the interval.\n- Step 3: State that $$f(x) = x^3 - x - 4$$ is continuous on $$[1, 2]$$ (it's a polynomial, so continuous everywhere). Therefore, by the sign change criterion, there is a root in $$(1, 2)$$. The continuity statement is essential and must not be omitted — without it, the argument is incomplete.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "How does the reverse chain rule apply to ∫cos(2x + 3)dx, and why is the coefficient adjusted? (3 steps)", "answer": "- Step 1: **Standard integral**: ∫cos(ax + b)dx = (1/a)sin(ax + b) + c.  \n- Step 2: **Derivative check**: d/dx [(1/a)sin(ax + b)] = cos(ax + b) * (a/a) = cos(ax + b).  \n- Step 3: **Coefficient intuition**: The 1/a compensates for the chain rule’s inner derivative (d/dx (ax + b) = a).  \n+ Example: ∫cos(2x + 3)dx = (1/2)sin(2x + 3) + c.  \n\n[Optional takeaway: The reverse chain rule adjusts for the inner function’s slope in integrals.]", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. Why does reflecting in $$y = x$$ produce the inverse, and what does this reveal about the relationship between the domain and range of $$f$$ and $$f^{-1}$$? (3 steps)", "answer": "- Step 1: Reflection in the line $$y = x$$ swaps every point's coordinates: the point $$a, b$$ maps to $$b, a$$. Since $$f$$ maps $$a \\to b$$ (the point $$a, b$$ is on the graph of $$f$$), the reflected point $$b, a$$ represents mapping $$b \\to a$$ — which is exactly what the inverse does. The reflection geometrically encodes the \"reverse mapping.\"\n- Step 2: This reflection swaps the roles of $$x$$ and $$y$$-axes. The domain of $$f$$ (values along the $$x$$-axis) becomes the range of $$f^{-1}$$ (values along the $$y$$-axis after reflection). Similarly, the range of $$f$$ becomes the domain of $$f^{-1}$$. Domain and range are swapped, just like the coordinates of each point.\n- Step 3: On a sketch, if the original function lives in a certain region (say, $$x \\geq 2$$ and $$y \\geq 0$$), then the inverse's graph lives in the reflected region ($$x \\geq 0$$ and $$y \\geq 2$$). The domain/range swap is visible geometrically — the inverse's horizontal extent matches the original's vertical extent, and vice versa.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "State the complete condition that guarantees a root of $$f(x) = 0$$ exists in the interval $$(a, b)$$. (2 steps)", "answer": "- Step 1: If $$f(a)$$ and $$f(b)$$ have opposite signs (i.e., $$f(a) \\cdot f(b) < 0$$), AND the function $$f(x)$$ is continuous on the interval $$[a, b]$$, then there exists at least one root in the interval $$(a, b)$$.\n- Step 2: The continuity condition is essential and must always be explicitly stated. Without it, a sign change could be caused by a discontinuity (like a vertical asymptote) rather than a root crossing the x-axis.\n\nBoth conditions — sign change AND continuity — must be mentioned for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "State the sign-change method for locating a root, and identify the condition that students most commonly forget. (3 steps)", "answer": "- Step 1: If $$f(a)$$ and $$f(b)$$ have opposite signs (one positive, one negative), then there is at least one root in the open interval $$(a, b)$$.\n- Step 2: **Crucial missing condition**: $$f$$ must be **continuous** on $$[a, b]$$. Without continuity, the function could \"jump\" across zero without ever equaling zero.\n- Step 3: Example of why continuity matters: $$f(x) = 1/x$$ has $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$, but there is no root in $$(-1, 1)$$ — the function has a discontinuity at $$0$$ where it leaps from $$-\\infty$$ to $$+\\infty$$.\n\nAlways write: \"Since $$f$$ is continuous on $$[a,b]$$ and $$f(a)f(b) < 0$$, there is a root in $$(a,b)$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "What is $$\\int\\sin(2x - 1)\\,dx$$? Walk through the reverse chain rule logic. (2 steps)", "answer": "- Step 1: The general pattern is $$\\int \\sin(ax + b)\\, dx = -\\frac{1}{a}\\cos(ax + b) + c$$. Here, $$a = 2$$ and $$b = -1$$.\n- Step 2: So $$\\int \\sin(2x - 1)\\, dx = -\\frac{1}{2}\\cos(2x - 1) + c$$. To verify: differentiate $$-\\frac{1}{2}\\cos(2x - 1)$$. We get $$-\\frac{1}{2} \\cdot (-\\sin(2x-1)) \\cdot 2 = \\sin(2x - 1)$$. ✓ The $$-\\frac{1}{2}$$ from the integral, the $$-\\sin$$ from differentiating cosine, and the 2 from the chain rule all cancel to give back the integrand.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "Walk through the algebraic procedure for finding $$f^{-1}(x)$$, and explain why each step makes geometric sense. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$. This names the output, which we are about to relabel.\n- Step 2: Swap $$x$$ and $$y$$ to get $$x = f(y)$$. Geometrically this reflects in the line $$y = x$$: inputs and outputs trade roles.\n- Step 3: Solve for $$y$$ in terms of $$x$$. This rearranged expression is $$y = f^{-1}(x)$$ — the rule that \"undoes\" $$f$$.\n- Step 4: State the domain of $$f^{-1}$$, which equals the range of $$f$$. Without this, the inverse function is not fully defined.\n\nWhy the swap works: $$f$$ sends $$a \\to b$$; $$f^{-1}$$ must send $$b \\to a$$. Swapping the variable names enacts that role-reversal symbolically.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "State the double angle formula for $$\\sin(2A)$$ and explain why the coefficient 2 is essential — what would go wrong if you wrote $$\\sin(A)\\cos(A)$$ instead? (2 steps)", "answer": "- Step 1: $$\\sin(2A) = 2\\sin(A)\\cos(A)$$ — this is derived from the angle addition formula $$\\sin(A+B) = \\sin(A)\\cos(B) + \\cos(A)\\sin(B)$$ by setting $$B = A$$, giving $$\\sin(2A) = \\sin(A)\\cos(A) + \\cos(A)\\sin(A) = 2\\sin(A)\\cos(A)$$.\n- Step 2: If you mistakenly write $$\\sin(2A) = \\sin(A)\\cos(A)$$ (missing the 2), a quick sanity check reveals the error: set $$A = 45°$$. Then $$\\sin(90°) = 1$$, but $$\\sin(45°)\\cos(45°) = \\frac{1}{\\sqrt{2}} \\cdot \\frac{1}{\\sqrt{2}} = \\frac{1}{2}$$, which is only half the correct answer. The factor of 2 is not optional — it accounts for the two identical terms that arise when both angles are $$A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Two curves $$y = x^2 + 2$$ and $$y = 6 - x$$ intersect. Set up the equation to find the $$x$$-coordinates of intersection by rearranging to a polynomial = 0. What would the factored form look like (simple integer roots)? (2 steps)", "answer": "- Step 1: Set $$x^2 + 2 = 6 - x$$, rearrange: $$x^2 + x - 4 = 0$$... Wait, let me redo: $$x^2 + 2 = 6 - x$$ gives $$x^2 + x + 2 - 6 = 0$$, so $$x^2 + x - 4 = 0$$. This doesn't factorise nicely over integers — the roots are $$x = \\frac{-1 \\pm \\sqrt{17}}{2}$$.\n+ Actually, let me pick a cleaner example: $$y = x^2$$ and $$y = 6 - x$$ gives $$x^2 + x - 6 = 0 = (x+3)(x-2)$$, roots $$x = -3, 2$$.\n- Step 2: The factored form $$(x+3)(x-2) = 0$$ immediately gives intersection $$x$$-coordinates of $$-3$$ and $$2$$, with corresponding $$y$$-values $$9$$ and $$4$$ (using either curve). This illustrates why setting equations equal and factorising is efficient when the polynomial has integer roots — you avoid the quadratic formula entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "Why do graphs of $$f$$ and $$f^{-1}$$ typically intersect on the line $$y = x$$, and is this always the case?", "answer": "If a point $$(a, b)$$ lies on $$f$$, its mirror $$(b, a)$$ lies on $$f^{-1}$$. For these to be the *same* point — a genuine intersection — we need $$a = b$$, i.e. the point lies on $$y = x$$. So intersection points where $$f$$ and its reflection coincide naturally sit on this mirror line, which is why solving $$f(x) = x$$ is the standard trick. However, for *non-monotonic* functions or with restricted domains, $$f$$ and $$f^{-1}$$ can occasionally intersect off the line $$y = x$$ in mirror-image pairs, but this is an exception; at A-Level you almost always exploit the $$f(x) = x$$ shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "When finding an inverse function, we swap x and y rather than just \"solving for x.\" Why is the swap necessary conceptually, and what does it accomplish? (2 steps)", "answer": "- Step 1: The swap of x and y reflects the fact that the inverse function reverses the roles of input and output. In f, you put in x and get out y. In $$f^{-1}$$, you put in y (now called x) and get out x (now called y). The swap encodes this role reversal algebraically.\n- Step 2: If you simply solved $$y = f(x)$$ for x without swapping, you'd get $$x = f^{-1}(y)$$, which is correct but uses y as the input variable. By convention, we want the inverse expressed as a function of x (i.e., $$y = f^{-1}(x)$$), so we swap to get the standard form.\n\nThe swap is not a \"trick\" — it's the algebraic expression of what \"inverse\" means: undo the mapping by reversing inputs and outputs.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Why does $$\\int \\cos(ax + b)\\, dx = \\dfrac{1}{a}\\sin(ax + b) + c$$, and where does the factor of $$1/a$$ come from? (3 steps)", "answer": "- Step 1: If we *differentiate* $$\\sin(ax + b)$$, the chain rule produces $$a \\cos(ax + b)$$. So $$\\sin(ax+b)$$ is \"too big\" by a factor of $$a$$ when we try to use it as an antiderivative.\n- Step 2: To compensate, we divide by $$a$$ in the antiderivative. Then $$\\frac{d}{dx}\\left[\\frac{1}{a}\\sin(ax+b)\\right] = \\frac{1}{a} \\cdot a\\cos(ax+b) = \\cos(ax+b)$$ ✓.\n- Step 3: General reverse-chain principle: when integrating $$f(\\text{linear in } x)$$, divide by the coefficient of $$x$$. This *only* works for **linear** inner functions; for nonlinear inner functions, you need substitution.\n\nQuick test: $$\\int \\cos(5x)\\, dx = \\tfrac{1}{5}\\sin(5x) + c$$. Differentiate to check: $$\\tfrac{1}{5} \\cdot 5\\cos(5x) = \\cos(5x)$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "A student says: \"Since f(2) = 3 and f(4) = 3, the function has a root between 2 and 4 because there's a sign change.\" Evaluate this statement. (2 steps)", "answer": "- Step 1: This is INCORRECT. A sign change requires f(a) and f(b) to have opposite signs (one positive, one negative). Here, both f(2) = 3 and f(4) = 3 are positive, so there is no sign change.\n- Step 2: Even if there were a sign change (say f(2) = -3 and f(4) = 3), you would also need to state that f is continuous on [2, 4] to guarantee a root. Without continuity, no conclusion can be drawn.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "When solving simultaneous equations from intersecting graphs under exam conditions, a common error is miscopying coefficients (e.g., writing $$2x^2$$ instead of $$x^2$$). Why is this particularly dangerous, and what's a quick sanity check? (2 steps)", "answer": "- Step 1: Miscopying a coefficient changes the polynomial entirely, so you solve a completely different equation and get wrong intersection points. The error propagates through all subsequent work — there's no partial credit for a correct method applied to the wrong equation.\n- Step 2: A quick sanity check: after finding intersection points, substitute them back into **both** original equations. The y-values should match. If they don't, you've made an error in setting up or solving.\n\nAlways double-check your transcription before solving — 10 seconds of verification can save an entire question.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Could sign change ever miss a root, or claim there isn't one when there actually is? (3 steps)", "answer": "- Step 1: Yes — if $$f(a)$$ and $$f(b)$$ have the **same sign**, there can still be roots in between (e.g. an even number of roots that cancel out sign-wise, like a parabola dipping down and coming back up).\n- Step 2: A function tangent to the $$x$$-axis (e.g. $$f(x) = (x-1)^2$$) has a root but never changes sign — sign-change fails entirely here.\n- Step 3: So sign-change is **sufficient** for existence (when it works) but **not necessary**. Absence of a sign change ≠ absence of a root.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why is it disproportionately costly to miscopy a coefficient (e.g. write $$2x^2$$ instead of $$x^2$$) when solving for curve intersections?", "answer": "A single miscopied coefficient changes the entire polynomial you're solving. The roots of $$x^2 + bx + c = 0$$ and $$2x^2 + bx + c = 0$$ are generally completely different — not just shifted. Since intersection points are found from these roots, every downstream answer (coordinates, distances, areas) is wrong, even though the method was correct. The lesson: always pause and re-read the transcribed equation before solving, because algebraic effort cannot rescue a wrong starting equation.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Use a double-angle identity to integrate $$\\sin^2 x$$. (3 steps)", "answer": "- Step 1: Direct integration of $$\\sin^2 x$$ is impossible by inspection. Instead, rewrite using $$\\cos(2x) = 1 - 2\\sin^2 x$$, so $$\\sin^2 x = \\dfrac{1 - \\cos(2x)}{2}$$.\n- Step 2: Integrate term by term: $$\\int \\dfrac{1 - \\cos(2x)}{2} \\, dx = \\dfrac{x}{2} - \\dfrac{1}{2} \\cdot \\dfrac{\\sin(2x)}{2} + c$$.\n- Step 3: Simplify: $$\\dfrac{x}{2} - \\dfrac{\\sin(2x)}{4} + c$$.\n\nThis pattern — using $$\\cos(2A)$$ to drop powers — is essential for any $$\\sin^2$$ or $$\\cos^2$$ integral.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "What is $$\\int \\sec^2(x)\\,dx$$, and how is this result connected to the derivative of $$\\tan(x)$$? Why is this integral particularly clean compared to other trig integrals? (2 steps)", "answer": "- Step 1: $$\\int \\sec^2(x)\\,dx = \\tan(x) + c$$. This follows directly from the fact that $$\\frac{d}{dx}\\tan(x) = \\sec^2(x)$$ — the derivative of $$\\tan$$ is exactly $$\\sec^2$$, so the antiderivative simply reverses this with no extra coefficients or sign changes.\n- Step 2: This integral is \"clean\" because the derivative of $$\\tan(x)$$ produces $$\\sec^2(x)$$ with coefficient exactly 1 and no sign flip. Compare with $$\\int \\sin(x)\\,dx = -\\cos(x)$$ (needs a sign change) or $$\\int \\cos(5x)\\,dx = \\frac{1}{5}\\sin(5x)$$ (needs a coefficient adjustment). $$\\sec^2 \\to \\tan$$ is the simplest possible reverse: no fudge factors needed.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "A student uses the sign change method and finds $$f(2) = -3$$ and $$f(5) = 7$$. They write: \"There is a root between 2 and 5.\" What is missing from their statement, and why would an examiner deduct marks? (2 steps)", "answer": "- Step 1: The student has not stated that $$f(x)$$ is continuous on the interval $$[2, 5]$$. Without continuity, the sign change does not guarantee a root — it could be caused by a discontinuity (like a vertical asymptote).\n- Step 2: The correct full statement is: \"Since $$f(2) = -3$$ and $$f(5) = 7$$ have opposite signs, and $$f(x)$$ is continuous on $$[2, 5]$$, there is a root in the interval $$(2, 5)$$.\" Examiners specifically look for the continuity condition — omitting it is a common way to lose marks.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "Suppose iteration $$x_{n+1} = g(x_n)$$ gives $$x_0 = 2$$, $$x_1 = 1.8$$, $$x_2 = 1.85$$, $$x_3 = 1.843$$, $$x_4 = 1.844$$. What can you conclude, and what does this tell you about a root of $$f(x) = 0$$? (3 steps)", "answer": "- Step 1: The iterates are getting closer together — successive differences shrink from $$0.2$$ to $$0.05$$ to $$0.007$$ to $$0.001$$. This is the signature of convergence.\n- Step 2: The limit appears to be approximately $$1.844$$ (to 3 d.p.), which is the fixed point of $$g$$.\n- Step 3: Since $$x = g(x)$$ is equivalent to $$f(x) = 0$$, this fixed point is a root of the original equation. To confirm to a given accuracy, check a sign change of $$f$$ on an interval like $$[1.8435, 1.8445]$$.\n\nTakeaway: convergence in successive iterates ⇒ fixed point ⇒ root of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Why does the same equation $$f(x) = 0$$ have multiple possible iteration formulas, and does it matter which one you choose? (3 steps)", "answer": "- Step 1: There's no unique way to rearrange $$f(x) = 0$$ into $$x = g(x)$$. E.g. $$x^2 - x - 1 = 0$$ can become $$x = x^2 - 1$$, or $$x = 1 + 1/x$$, or $$x = \\sqrt{x+1}$$, etc.\n- Step 2: It matters enormously: some rearrangements give iterations that converge to the desired root, others diverge or converge to a different root. The condition for local convergence is roughly $$|g'(L)| < 1$$ near the fixed point $$L$$.\n- Step 3: Practical insight: if your iteration shoots off to infinity or oscillates wildly, try a different rearrangement of the same equation.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Conceptually, what does it mean for a fixed-point iteration $$x_{n+1} = g(x_n)$$ to converge, and why isn't convergence automatic? (3 steps)", "answer": "- Step 1: Convergence means the sequence $$x_0, x_1, x_2, \\ldots$$ settles down toward a single number — the fixed point — rather than oscillating wildly or running off to infinity.\n- Step 2: Whether it converges depends on the *slope* of $$g$$ near the fixed point. Roughly, if $$|g'(\\text{root})| < 1$$, errors shrink each step and we converge; if $$|g'(\\text{root})| > 1$$, errors grow and we diverge.\n- Step 3: This is why the same equation $$f(x) = 0$$ can be rearranged into several different $$g$$'s, some of which converge nicely and others which blow up. Choice of rearrangement matters.\n\nIntuition: $$g$$ should be \"flat enough\" near the root to act as a contraction, pulling nearby points toward the root.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Sign change is checked at $$f(1.2)$$ and $$f(1.3)$$ and both give opposite signs. Does this tell us there is exactly one root in $$(1.2, 1.3)$$? (3 steps)", "answer": "- Step 1: No — it guarantees **at least one** root, not exactly one. The function could wiggle: down, up, down, crossing the axis three times, all within the interval.\n- Step 2: To strengthen the claim to \"exactly one root,\" we'd additionally need to show $$f$$ is monotonic on the interval (e.g. $$f'(x) > 0$$ throughout), so it can cross zero only once.\n- Step 3: For a small narrow interval and a smooth function, one root is overwhelmingly the likely case, but it isn't proven by the sign change alone.\n\nTakeaway: sign change is an **existence** statement, not a **uniqueness** statement.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why is $$\\int \\sin(x)\\,dx = -\\cos(x) + c$$ rather than $$\\cos(x) + c$$? How can you verify this, and what's the intuition for the negative sign? (2 steps)", "answer": "- Step 1: Verification by differentiation: if the antiderivative were $$\\cos(x)$$, then differentiating gives $$-\\sin(x)$$, not $$\\sin(x)$$. But differentiating $$-\\cos(x)$$ gives $$-(-\\sin(x)) = \\sin(x)$$ — correct. The negative sign is necessary because the derivative of $$\\cos(x)$$ is $$-\\sin(x)$$; to \"undo\" that, we need to flip the sign.\n- Step 2: Intuition: $$\\cos(x)$$ decreases when $$\\sin(x)$$ is positive (think of the graphs — cosine is heading downward where sine is positive, near $$x = 0$$). So the antiderivative of a positive function $$\\sin(x)$$ must be a function that's *decreasing* at that point... but wait, antiderivatives of positive functions should be *increasing*. The resolution: $$-\\cos(x)$$ is indeed increasing where $$\\sin(x) > 0$$, because $$-\\cos(x)$$ decreases when $$\\cos(x)$$ increases, and vice versa. The negative sign makes the accumulation direction correct.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why is it essential to state the domain when defining an inverse function? What common mistake do students make? (2 steps)", "answer": "- Step 1: Whenever we define any function — including its inverse — we need both the equation AND the domain. The domain of f⁻¹ must equal the range of f, and if the original function is restricted (e.g., only positive outputs), the inverse's domain will be restricted accordingly.\n- Step 2: Students often forget to state the domain of the inverse, which can lead to incorrect answers. For example, for f(x) = x² with domain x ≥ 0, the inverse is f⁻¹(x) = √x with domain x ≥ 0 — not all real numbers.\n\nHarry emphasized: \"Whenever we define a function we need two things... the equation... But two, we need to give the domain as well.\"", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "How is the graph of $$y = f^{-1}(x)$$ related geometrically to $$y = f(x)$$, and why? (3 steps)", "answer": "- Step 1: $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$.\n- Step 2: Why: a point $$(a, b)$$ lies on $$y = f(x)$$ iff $$b = f(a)$$, iff $$a = f^{-1}(b)$$, iff $$(b, a)$$ lies on $$y = f^{-1}(x)$$. Swapping coordinates $$(a,b) \\leftrightarrow (b,a)$$ is exactly reflection in $$y = x$$.\n- Step 3: Consequences: domain and range swap, $$x$$-intercepts of $$f$$ become $$y$$-intercepts of $$f^{-1}$$, asymptotes swap orientation (vertical $$\\leftrightarrow$$ horizontal). Example: $$e^x$$ (horizontal asymptote $$y=0$$) reflects to $$\\ln x$$ (vertical asymptote $$x=0$$).", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why can't you find the inverse of $$f(x) = x^2$$ if the domain is all real numbers? What domain restriction makes it invertible, and what is the inverse then? (3 steps)", "answer": "- Step 1: With domain all reals, $$f(x) = x^2$$ fails the horizontal line test: both $$x = 2$$ and $$x = -2$$ map to 4. An inverse would need to map 4 back to both 2 and −2, which violates the definition of a function (one input → one output).\n- Step 2: Restricting the domain to $$x \\geq 0$$ makes f one-to-one (each y-value comes from exactly one x-value), so the inverse exists.\n- Step 3: To find the inverse: $$y = x^2$$, swap: $$x = y^2$$, solve: $$y = \\sqrt{x}$$ (positive root only, since $$y \\geq 0$$). So $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$ (which equals the range of f).", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Why are there three different forms of $$\\cos(2A)$$, and when would you use each? (3 steps)", "answer": "- Step 1: They all come from $$\\cos^2 A - \\sin^2 A$$ using the Pythagorean identity $$\\cos^2 A + \\sin^2 A = 1$$ to eliminate one of the squared terms.\n+ $$\\cos^2 A = 1 - \\sin^2 A$$ gives $$\\cos(2A) = 1 - 2\\sin^2 A$$.\n+ $$\\sin^2 A = 1 - \\cos^2 A$$ gives $$\\cos(2A) = 2\\cos^2 A - 1$$.\n- Step 2: Use $$2\\cos^2 A - 1$$ when integrating $$\\cos^2 A$$: rearrange to $$\\cos^2 A = \\frac{1 + \\cos(2A)}{2}$$.\n- Step 3: Use $$1 - 2\\sin^2 A$$ for $$\\sin^2 A = \\frac{1 - \\cos(2A)}{2}$$. Use $$\\cos^2 A - \\sin^2 A$$ when you need to factor differences of squares like $$(\\cos A - \\sin A)(\\cos A + \\sin A)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "What's the relationship between solving $$f(x) = x$$ and finding fixed points of an iteration? (3 steps)", "answer": "- Step 1: A fixed point of $$g$$ is a value $$L$$ where $$g(L) = L$$ — the iteration \"stays put.\"\n- Step 2: If your iteration is $$x_{n+1} = g(x_n)$$, convergence lands on a fixed point of $$g$$. So fixed points are exactly the solutions of $$x = g(x)$$.\n- Step 3: Geometrically, fixed points are where the curve $$y = g(x)$$ crosses the line $$y = x$$. This same picture explains why solving $$f(x) = x$$ graphically means finding intersections with the diagonal.\n\nSo \"fixed point\", \"$$x = g(x)$$\", and \"intersection with $$y = x$$\" are three names for the same thing.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "To integrate $$\\cos^2(x)$$, you would first use a double angle identity to rewrite it. Which form of the $$\\cos(2A)$$ identity would you use, and what does $$\\cos^2(x)$$ become? (2 steps)", "answer": "- Step 1: Use the form $$\\cos(2A) = 2\\cos^2(A) - 1$$, rearranged to solve for $$\\cos^2(A)$$: $$\\cos^2(A) = \\frac{1 + \\cos(2A)}{2}$$.\n- Step 2: So $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$, and $$\\int \\cos^2(x)\\, dx = \\int \\frac{1 + \\cos(2x)}{2}\\, dx = \\frac{1}{2}x + \\frac{1}{4}\\sin(2x) + c$$.\n\nThis technique — using double angle identities to reduce powers before integrating — is essential for integrating $$\\sin^2(x)$$, $$\\cos^2(x)$$, and higher even powers of trig functions.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Why must we always state the domain of an inverse function, even if the formula \"looks fine\" on all real numbers? (3 steps)", "answer": "- Step 1: A function is a triple: rule + domain + codomain. Two functions with the same formula but different domains are different functions (e.g. $$x^2$$ on $$\\mathbb{R}$$ vs $$x^2$$ on $$[0, \\infty)$$).\n- Step 2: The domain of $$f^{-1}$$ is forced to be the range of $$f$$ — because $$f^{-1}$$ only \"knows how to undo\" outputs that $$f$$ actually produced. Feeding $$f^{-1}$$ a value outside that set is meaningless.\n- Step 3: Example: $$f(x) = e^x$$ has range $$(0, \\infty)$$, so $$f^{-1}(x) = \\ln(x)$$ must have domain $$x > 0$$ — even though the formula $$\\ln(x)$$ \"is what it is,\" omitting the domain leaves the function undefined where it matters most.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "What is $$\\int \\sin^2(x)\\,dx$$? Use a double angle identity to rewrite before integrating. (3 steps)", "answer": "- Step 1: Use the form $$\\cos(2A) = 1 - 2\\sin^2(A)$$, rearranged to solve for $$\\sin^2(A)$$: $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$.\n- Step 2: So $$\\sin^2(x) = \\frac{1 - \\cos(2x)}{2}$$, and $$\\int \\sin^2(x)\\, dx = \\int \\frac{1 - \\cos(2x)}{2}\\, dx$$.\n- Step 3: Integrate term by term: $$= \\frac{1}{2}x - \\frac{1}{2} \\cdot \\frac{1}{2}\\sin(2x) + c = \\frac{1}{2}x - \\frac{1}{4}\\sin(2x) + c$$.\n\nNote the minus sign: $$\\int -\\cos(2x)\\,dx = -\\frac{1}{2}\\sin(2x)$$, and then the outer $$\\frac{1}{2}$$ gives $$-\\frac{1}{4}\\sin(2x)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "A common slip: a student writes $$\\int \\cos(2x)\\, dx = \\sin(2x) + c$$. Diagnose the error and correct it. (3 steps)", "answer": "- Step 1: Differentiate the proposed answer to check: $$\\frac{d}{dx}[\\sin(2x)] = 2\\cos(2x)$$, not $$\\cos(2x)$$. So the answer is too big by a factor of 2.\n- Step 2: The student forgot the reverse-chain-rule correction: when integrating $$\\cos(ax)$$, you must divide by $$a$$ to compensate for the chain-rule factor that would otherwise appear on differentiation.\n- Step 3: Correct answer: $$\\int \\cos(2x)\\, dx = \\tfrac{1}{2}\\sin(2x) + c$$. Always verify by differentiating — it instantly reveals missing chain-rule factors.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "To solve $$f(x) = 0$$ by iteration, you rearrange the equation into the form $$x = g(x)$$ and then iterate $$x_{n+1} = g(x_n)$$ starting from some $$x_0$$. Why can the same equation $$f(x) = 0$$ lead to multiple different iterative formulas, and what practical difference does this make? (2 steps)", "answer": "- Step 1: Rearranging $$f(x) = 0$$ to $$x = g(x)$$ is not unique — there are many ways to isolate an $$x$$. For example, if $$x^2 - x - 1 = 0$$, you could write $$x = x^2 - 1$$ (adding $$x+1$$ to both sides), or $$x = \\frac{1}{x} + 1$$ (dividing by $$x$$ and rearranging), or $$x = \\sqrt{x+1}$$ (taking the square root). Each gives a different $$g(x)$$ and a different iteration formula.\n- Step 2: Different rearrangements can converge or diverge, and can converge to different roots, or converge at different speeds. A good rearrangement produces a $$g(x)$$ whose graph crosses the $$y = x$$ line at a shallow angle (slope between $$-1$$ and $$1$$ near the root), leading to stable convergence. A bad rearrangement might spiral outward and never settle. You must choose (or be given) the right rearrangement.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "If $$f(x) = x^2$$ with domain $$x \\geq 0$$, explain why $$f$$ has an inverse, but if the domain is all real numbers, it does not. What property must a function have for an inverse to exist? (3 steps)", "answer": "- Step 1: A function has an inverse if and only if it is *one-to-one* (injective): each output comes from exactly one input. If two different inputs produce the same output, the inverse can't uniquely determine which input to return.\n- Step 2: With domain $$x \\geq 0$$, $$f(x) = x^2$$ is one-to-one because squaring a non-negative number gives a unique result — no two different non-negative numbers have the same square. The inverse is $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$.\n- Step 3: With domain all reals, $$f(-2) = 4$$ and $$f(2) = 4$$ — two inputs map to the same output. If you ask $$f^{-1}(4)$$, should it return $$-2$$ or $$2$$? There's no unique answer, so no inverse function exists. Restricting the domain to eliminate this ambiguity is the standard fix.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Why does the reverse chain rule (dividing by $$a$$) only work when the inner function is linear in $$x$$? (3 steps)", "answer": "- Step 1: For inner function $$ax + b$$, chain rule gives a constant factor $$a$$ when differentiating — a constant can be pulled out and cancelled by a constant divisor.\n- Step 2: For a non-linear inner function like $$x^2$$, chain rule gives $$2x$$ — a function of $$x$$, not a constant. You can't \"divide by $$2x$$\" outside the integral.\n- Step 3: For non-linear cases, you need full substitution $$u = g(x)$$, $$du = g'(x)\\,dx$$, and the $$g'(x)$$ must already appear (up to a constant) in the integrand. The \"$$1/a$$ trick\" is a shortcut for the special linear case.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Two curves y₁ and y₂ intersect at a point. Why does setting y₁ = y₂ allow us to find the intersection x-coordinate? (2 steps)", "answer": "- Step 1: At an intersection point, both curves pass through the same (x, y) coordinate — they share the same y-value for the same x-value.\n- Step 2: Setting y₁ = y₂ captures this equality condition mathematically. It produces one equation in one unknown (x), which we can then solve to find the x-coordinates of all intersection points.\n\nThe equation y₁ = y₂ is the algebraic translation of \"these two curves are at the same height.\"", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "After setting two curve equations equal, what form must you rearrange into before solving, and why? (2 steps)", "answer": "- Step 1: Rearrange to get a polynomial = 0, i.e., move everything to one side so you have something like $$ax^2 + bx + c = 0$$ (or higher degree).\n- Step 2: This \"standard form\" is necessary because it enables factorisation (finding common factors or using the factor theorem) or the quadratic formula. You cannot easily solve an equation that isn't set equal to zero — the zero on one side is what makes factorisation work (if a product equals zero, at least one factor must be zero).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student sets $$y = x^2 + 3x$$ and $$y = 5x + 1$$ equal, but writes $$2x^2 - 2x + 1 = 0$$ instead of the correct equation. What type of error is this, and what strategy prevents it? (2 steps)", "answer": "- Step 1: This is a transcription/copying error — the student introduced an extra $$x^2$$ term (wrote $$2x^2$$ instead of $$x^2$$). The correct rearrangement is $$x^2 + 3x - 5x - 1 = 0$$, giving $$x^2 - 2x - 1 = 0$$.\n- Step 2: To prevent this, verify each algebraic step immediately after writing it. Under exam pressure, copying errors are the most common mistake — always double-check each line of working against the previous one before proceeding.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Two curves $$y = x^2 + 1$$ and $$y = 5 - x^2$$ intersect. Without fully solving, how many intersection points do you expect and why? (2 steps)", "answer": "- Step 1: Setting them equal gives $$x^2 + 1 = 5 - x^2$$, which rearranges to $$2x^2 = 4$$, so $$x^2 = 2$$.\n- Step 2: This yields $$x = \\sqrt{2}$$ or $$x = -\\sqrt{2}$$ — two solutions, so two intersection points. Geometrically: one parabola opens upward ($$y = x^2 + 1$$) and the other opens downward ($$y = 5 - x^2$$), so they must cross twice, forming an \"X\" shape intersection region.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "What is the domain of $$f(x) = \\ln(x)$$, and what is the fundamental reason for this restriction? (2 steps)", "answer": "- Step 1: The domain is $$x > 0$$ (strictly positive real numbers). Zero and negative numbers are excluded.\n- Step 2: The natural logarithm $$\\ln(x)$$ answers the question \"e raised to what power gives x?\" Since $$e^y > 0$$ for all real $$y$$, you can never take the logarithm of zero or a negative number — no real power of e produces those values. Graphically, this manifests as a vertical asymptote at $$x = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What is the range of $$f(x) = \\ln(x)$$, and how can you see this from the graph? (2 steps)", "answer": "- Step 1: The range is all real numbers: $$y \\in \\mathbb{R}$$.\n- Step 2: As $$x \\to 0^+$$, $$\\ln(x) \\to -\\infty$$ (the graph plunges downward near the asymptote). As $$x \\to \\infty$$, $$\\ln(x) \\to \\infty$$ (the graph rises without bound, though extremely slowly). Since $$\\ln(x)$$ is continuous and unbounded in both directions, it attains every real y-value — hence the range is $$\\mathbb{R}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What key point must the graph of $$y = \\ln(x)$$ pass through, and why? (2 steps)", "answer": "- Step 1: The graph passes through $$(1, 0)$$, because $$\\ln(1) = 0$$.\n- Step 2: This follows from the definition: $$\\ln(1)$$ means \"e raised to what power gives 1?\" Since $$e^0 = 1$$, we get $$\\ln(1) = 0$$. This point is the logarithmic counterpart to how $$y = e^x$$ passes through $$(0, 1)$$ — the coordinates swap, consistent with the inverse relationship.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A student asked to sketch $$y = \\ln(x)$$ draws a curve through $$(0, 1)$$ that increases rapidly. What did they actually draw, and what are the two key visual differences from $$\\ln(x)$$? (3 steps)", "answer": "- Step 1: They drew $$y = e^x$$ instead of $$y = \\ln(x)$$. The curve through $$(0, 1)$$ increasing rapidly is the exponential function.\n- Step 2: The two key visual differences: (1) $$e^x$$ has a horizontal asymptote at $$y = 0$$ and grows fast; $$\\ln(x)$$ has a vertical asymptote at $$x = 0$$ and grows slowly. (2) $$e^x$$ passes through $$(0, 1)$$; $$\\ln(x)$$ passes through $$(1, 0)$$.\n- Step 3: The two graphs are reflections of each other in the line $$y = x$$ — they are inverse functions. If you're unsure which is which, check: does the curve cross the x-axis (ln) or the y-axis ($$e^x$$)?", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "What are the four steps to find the inverse function $$f^{-1}(x)$$ algebraically? (4 steps)", "answer": "- Step 1: Replace $$f(x)$$ with $$y$$: write $$y = f(x)$$. This frees up the notation for manipulation.\n- Step 2: Swap $$x$$ and $$y$$: write $$x = f(y)$$. This is the core algebraic move — you're asking \"given the output, what was the input?\"\n- Step 3: Solve for $$y$$: rearrange to make $$y$$ the subject. This $$y$$ is your $$f^{-1}(x)$$.\n- Step 4: State the domain of $$f^{-1}(x)$$. This equals the range of the original function $$f(x)$$. Without this, the function definition is incomplete.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When defining a function, two things are always required. What are they, and why is the second one commonly forgotten? (2 steps)", "answer": "- Step 1: A function requires both (1) the rule/equation (e.g., $$f^{-1}(x) = \\frac{x-1}{3}$$) and (2) the domain (e.g., $$x > 5$$). Both together fully specify the function.\n- Step 2: The domain is commonly forgotten because students focus on the algebraic manipulation (finding the equation) and treat the domain as an afterthought. But two different domains on the same equation define two different functions. For inverse functions specifically, the domain of $$f^{-1}$$ equals the range of $$f$$, which requires separate reasoning — it doesn't come automatically from the algebra.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "If $$f(x) = 2x + 3$$ with domain $$x \\in \\mathbb{R}$$, find $$f^{-1}(x)$$ including its domain. (3 steps)", "answer": "- Step 1: Let $$y = 2x + 3$$. Swap $$x$$ and $$y$$: $$x = 2y + 3$$.\n- Step 2: Solve for $$y$$: $$2y = x - 3$$, so $$y = \\frac{x-3}{2}$$. Therefore $$f^{-1}(x) = \\frac{x-3}{2}$$.\n- Step 3: The domain of $$f^{-1}$$ equals the range of $$f$$. Since $$f(x) = 2x + 3$$ with domain $$\\mathbb{R}$$ can produce any real output, the range of $$f$$ is $$\\mathbb{R}$$. So the domain of $$f^{-1}$$ is $$x \\in \\mathbb{R}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "If $$f(x) = x^2$$ with domain $$x \\geq 3$$, the inverse is $$f^{-1}(x) = \\sqrt{x}$$. Why is the domain of $$f^{-1}$$ NOT simply $$x \\geq 0$$? (3 steps)", "answer": "- Step 1: The domain of $$f^{-1}$$ equals the range of $$f$$. We must find the range of $$f(x) = x^2$$ where $$x \\geq 3$$.\n- Step 2: When $$x = 3$$, $$f(3) = 9$$. As $$x$$ increases beyond 3, $$x^2$$ increases without bound. So the range of $$f$$ is $$y \\geq 9$$.\n- Step 3: Therefore the domain of $$f^{-1
