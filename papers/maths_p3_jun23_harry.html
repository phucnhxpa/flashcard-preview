}$$ is $$x \\geq 9$$, not $$x \\geq 0$$. The common mistake is to think \"$$\\sqrt{x}$$ is defined for $$x \\geq 0$$, so the domain is $$x \\geq 0$$\" — but the domain of the inverse is determined by the range of the original function, not by where the formula happens to be mathematically valid.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "In the composite function $$fg(x)$$, which function is applied first, and what is the reasoning? (2 steps)", "answer": "- Step 1: $$g$$ is applied first, then $$f$$. The notation $$fg(x)$$ means $$f(g(x))$$ — you work from the inside out, just like nested brackets.\n- Step 2: Think of it as a pipeline: the input $$x$$ enters $$g$$, producing $$g(x)$$; this output then becomes the input to $$f$$, producing $$f(g(x))$$. The innermost/rightmost function always acts first on the raw input.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "In general, is $$fg(x) = gf(x)$$? Give a conceptual explanation for why or why not. (2 steps)", "answer": "- Step 1: No, in general $$fg(x) \\neq gf(x)$$. Function composition is not commutative — the order of operations matters.\n- Step 2: If $$f$$ is \"add 1\" and $$g$$ is \"square,\" then $$fg(x) = f(x^2) = x^2 + 1$$ (square first, then add 1), but $$gf(x) = g(x+1) = (x+1)^2 = x^2 + 2x + 1$$ (add 1 first, then square). Different operations transform inputs differently, so swapping the order changes the overall transformation.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "If $$f(x) = 3x$$ and $$g(x) = \\frac{x}{3}$$, what is $$fg(x)$$? Is this a special situation? (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = f\\!\\left(\\frac{x}{3}\\right) = 3 \\cdot \\frac{x}{3} = x$$. Similarly, $$gf(x) = g(f(x)) = g(3x) = \\frac{3x}{3} = x$$.\n- Step 2: This is a special case where $$fg(x) = gf(x) = x$$, meaning $$f$$ and $$g$$ are inverses of each other. One function undoes the other. This is the exception, not the rule — composition is generally non-commutative, but inverse functions always satisfy this property.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "If $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$, and $$g(x) = x - 4$$ with domain $$x \\in \\mathbb{R}$$, what is the domain of the composite function $$fg(x)$$? (3 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = \\sqrt{g(x)} = \\sqrt{x - 4}$$. But we need to check which values of $$x$$ are valid.\n- Step 2: The input to $$f$$ must lie in $$f$$'s domain, i.e., $$g(x) \\geq 0$$. So $$x - 4 \\geq 0$$, meaning $$x \\geq 4$$.\n- Step 3: The domain of $$fg$$ is $$x \\geq 4$$. This is more restrictive than either individual domain — it's the set of $$x$$ values where $$g(x)$$ produces a valid input for $$f$$. Always check that the inner function's output falls within the outer function's domain.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What two conditions must both hold to guarantee a root exists in the interval $$(a, b)$$ using the sign change method? (2 steps)", "answer": "- Step 1: $$f(a)$$ and $$f(b)$$ must have opposite signs (one positive, one negative).\n- Step 2: $$f(x)$$ must be continuous on the interval $$[a, b]$$. Both conditions together guarantee at least one root in $$(a, b)$$ by the Intermediate Value Theorem. Omitting the continuity statement loses marks in exams.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Why is the continuity condition essential for the sign change method? Describe a counterexample where a sign change occurs but no root exists. (3 steps)", "answer": "- Step 1: Continuity ensures the function can't \"jump\" across the x-axis without touching it. A continuous function must pass through zero if it goes from positive to negative (or vice versa) — it cannot teleport.\n- Step 2: Counterexample: consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$. We have $$f(-1) = -1$$ (negative) and $$f(1) = 1$$ (positive) — a sign change exists.\n- Step 3: But $$f(x) = \\frac{1}{x}$$ has a vertical asymptote at $$x = 0$$ and is not continuous on $$[-1, 1]$$. The function never equals zero; it jumps from $$-\\infty$$ to $$+\\infty$$ at $$x = 0$$. The sign change does NOT indicate a root — continuity was the missing condition.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "If $$f(1.2) = -0.3$$ and $$f(1.4) = 0.8$$, and $$f$$ is continuous on $$[1.2, 1.4]$$, what can you conclude? (2 steps)", "answer": "- Step 1: Since $$f(1.2) < 0$$ and $$f(1.4) > 0$$, there is a sign change, and $$f$$ is continuous on the interval.\n- Step 2: By the Intermediate Value Theorem, there exists at least one root in the interval $$(1.2, 1.4)$$. Note: we cannot say there is exactly one root — the function could cross back and forth multiple times.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A sign change test shows $$f(2) = 3$$ and $$f(4) = -1$$, with $$f$$ continuous. Does this guarantee exactly one root in $$(2, 4)$$? (2 steps)", "answer": "- Step 1: No — it guarantees at least one root, not exactly one.\n- Step 2: The function could wiggle and cross the x-axis multiple times between $$x = 2$$ and $$x = 4$$. The sign change only tells you there's an odd number of roots (counting multiplicity), not that there's exactly one. For example, a function could cross three times: positive → negative → positive → negative.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "How do you convert the equation $$f(x) = 0$$ into an iterative formula? (2 steps)", "answer": "- Step 1: Rearrange $$f(x) = 0$$ into the form $$x = g(x)$$, isolating one copy of $$x$$ on one side. This rearrangement is not unique — there may be multiple valid ways to do it.\n- Step 2: The iterative formula is then $$x_{n+1} = g(x_n)$$. Starting from an initial value $$x_0$$, you substitute into $$g$$ repeatedly to generate a sequence that (hopefully) converges to a root.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Describe the calculator technique for performing iteration efficiently. (3 steps)", "answer": "- Step 1: Store the starting value $$x_0$$ in the calculator's \"Ans\" memory (type the value and press =).\n- Step 2: Type the iteration formula $$g(x)$$ but replace every $$x$$ with \"Ans\" — e.g., if $$g(x) = \\cos(x)$$, type $$\\cos(\\text{Ans})$$.\n- Step 3: Press = repeatedly. Each press computes the next iteration: $$x_1, x_2, x_3, \\ldots$$ The calculator automatically uses the previous answer as the new input. Watch the values stabilise to identify convergence.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "An iteration $$x_{n+1} = \\frac{x_n^2 + 3}{5}$$ is started with $$x_0 = 1$$. After several iterations, the values settle near 0.802. What does this value represent? (2 steps)", "answer": "- Step 1: The value 0.802 is a fixed point of the iteration — a value where $$g(x) = x$$, i.e., $$x = \\frac{x^2 + 3}{5}$$.\n- Step 2: This fixed point is a root of the original equation $$f(x) = 0$$ from which the iteration was derived. At the fixed point, substituting $$x$$ into $$g$$ gives back $$x$$, meaning the rearranged equation is satisfied, which means $$f(x) = 0$$. The iteration has converged to a root.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Can an iterative formula always find all roots of $$f(x) = 0$$? Why or why not? (2 steps)", "answer": "- Step 1: No. Different rearrangements of $$f(x) = 0$$ into $$x = g(x)$$ may converge to different roots, and some rearrangements may not converge at all.\n- Step 2: Convergence depends on the gradient $$|g'(x)|$$ near the root — if $$|g'(x)| < 1$$, the iteration converges; if $$|g'(x)| > 1$$, it diverges. Also, different starting values $$x_0$$ may lead to different roots or may not converge. Iteration is a local method, not a global one.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "What is the graphical relationship between $$y = f(x)$$ and $$y = f^{-1}(x)$$, and why does this make sense? (2 steps)", "answer": "- Step 1: The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$.\n- Step 2: This makes sense because the inverse function swaps inputs and outputs: if $$f$$ takes $$a$$ to $$b$$ (point $$(a,b)$$ on $$f$$), then $$f^{-1}$$ takes $$b$$ to $$a$$ (point $$(b,a)$$ on $$f^{-1}$$). The point $$(b,a)$$ is the reflection of $$(a,b)$$ in the line $$y = x$$ (swap coordinates = reflect in $$y = x$$).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "How do the domain and range of $$f^{-1}$$ relate to those of $$f$$? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of $$f$$. The inputs to $$f^{-1}$$ are the outputs of $$f$$ — you can only invert what the original function actually produces.\n- Step 2: Range of $$f^{-1}$$ = Domain of $$f$$. The outputs of $$f^{-1}$$ are the inputs of $$f$$ — the inverse recovers the original domain values. This swap is the algebraic counterpart of the graphical reflection in $$y = x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "How can you solve the equation $$f(x) = x$$ graphically? (2 steps)", "answer": "- Step 1: $$f(x) = x$$ means the y-coordinate equals the x-coordinate, which is exactly the condition for a point on the line $$y = x$$.\n- Step 2: So the solutions are the x-coordinates where the graph of $$y = f(x)$$ intersects the line $$y = x$$. These intersection points are also where $$f$$ and $$f^{-1}$$ can meet, since any point on the line $$y = x$$ is equidistant from a function and its reflection.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "If $$f(x) = e^x$$, then $$f^{-1}(x) = \\ln(x)$$. Verify the reflection relationship using one specific point. (2 steps)", "answer": "- Step 1: On $$y = e^x$$, the point $$(1, e)$$ lies on the curve since $$e^1 = e$$.\n- Step 2: On $$y = \\ln(x)$$, the point $$(e, 1)$$ lies on the curve since $$\\ln(e) = 1$$. The point $$(e, 1)$$ is the reflection of $$(1, e)$$ in the line $$y = x$$ (swap the coordinates), confirming the reflection relationship.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "What is the double angle formula for $$\\sin(2A)$$, and what is a common mistake students make with the coefficient? (2 steps)", "answer": "- Step 1: $$\\sin(2A) = 2\\sin(A)\\cos(A)$$. The coefficient 2 is essential.\n- Step 2: A common mistake is writing $$\\sin(2A) = \\sin(A)\\cos(A)$$, missing the factor of 2. This likely comes from the addition formula $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$: when $$B = A$$, the two terms $$\\sin A \\cos A + \\cos A \\sin A$$ are identical and add to $$2\\sin A \\cos A$$. Forgetting they combine to double the single term is the error.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "State the three equivalent forms of $$\\cos(2A)$$, and explain when each form is most useful. (3 steps)", "answer": "- Step 1: $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$. This is the most symmetric form, directly from the addition formula $$\\cos(A+B)$$ with $$B = A$$. Useful when both $$\\sin^2$$ and $$\\cos^2$$ appear.\n- Step 2: $$\\cos(2A) = 2\\cos^2(A) - 1$$. Most useful when your problem involves $$\\cos^2(A)$$, as it lets you replace $$\\cos^2(A)$$ with $$\\frac{1 + \\cos(2A)}{2}$$.\n- Step 3: $$\\cos(2A) = 1 - 2\\sin^2(A)$$. Most useful when your problem involves $$\\sin^2(A)$$, as it lets you replace $$\\sin^2(A)$$ with $$\\frac{1 - \\cos(2A)}{2}$$. Choosing the right form saves significant work.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "What is the double angle formula for $$\\tan(2A)$$, and how does it follow from the addition formula? (2 steps)", "answer": "- Step 1: $$\\tan(2A) = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$.\n- Step 2: This follows from $$\\tan(A+B) = \\frac{\\tan A + \\tan B}{1 - \\tan A \\tan B}$$ with $$B = A$$, giving $$\\frac{\\tan A + \\tan A}{1 - \\tan A \\cdot \\tan A} = \\frac{2\\tan A}{1 - \\tan^2 A}$$. Note the denominator is $$1 - \\tan^2(A)$$, not $$1 + \\tan^2(A)$$ — the minus sign comes from the addition formula structure.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Derive $$\\sin(3x)$$ in terms of $$\\sin(x)$$ using double angle and addition formulas. Walk through each step. (5 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x)$$. Apply the addition formula $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$ with $$A = 2x$$, $$B = x$$: $$\\sin(3x) = \\sin(2x)\\cos(x) + \\cos(2x)\\sin(x)$$.\n- Step 2: Apply double angle formulas: $$\\sin(2x) = 2\\sin(x)\\cos(x)$$ and $$\\cos(2x) = \\cos^2(x) - \\sin^2(x)$$. Substituting: $$2\\sin(x)\\cos(x) \\cdot \\cos(x) + (\\cos^2(x) - \\sin^2(x)) \\cdot \\sin(x)$$.\n- Step 3: Simplify each term: $$2\\sin(x)\\cos^2(x) + \\sin(x)\\cos^2(x) - \\sin^3(x) = 3\\sin(x)\\cos^2(x) - \\sin^3(x)$$.\n- Step 4: Replace $$\\cos^2(x)$$ with $$1 - \\sin^2(x)$$: $$3\\sin(x)(1 - \\sin^2(x)) - \\sin^3(x) = 3\\sin(x) - 3\\sin^3(x) - \\sin^3(x) = 3\\sin(x) - 4\\sin^3(x)$$.\n- Step 5: Therefore $$\\sin(3x) = 3\\sin(x) - 4\\sin^3(x)$$. This identity expresses $$\\sin(3x)$$ purely in terms of powers of $$\\sin(x)$$ — useful for solving equations like $$\\sin(3x) = \\frac{1}{2}$$ by converting to a polynomial in $$\\sin(x)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A student writes $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$. Why is this wrong, and what identity are they confusing it with? (2 steps)", "answer": "- Step 1: The correct formula is $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ (minus, not plus). The student wrote a plus sign instead of a minus.\n- Step 2: They are confusing it with the Pythagorean
