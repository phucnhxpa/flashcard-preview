 - 2\\sin^2(A)$$ (the \"sin-only\" form).\n- Step 2: The cos-only form is useful when your problem involves $$\\cos^2(A)$$ — you can rearrange $$2\\cos^2(A) = 1 + \\cos(2A)$$ to express $$\\cos^2(A)$$ in terms of $$\\cos(2A)$$, eliminating the squared term. Similarly, the sin-only form lets you write $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$, converting $$\\sin^2$$ into a linear expression in $$\\cos(2A)$$.\n- Step 3: Use the difference form when both $$\\sin^2$$ and $$\\cos^2$$ appear and you want to keep both. Use the single-function forms when you want to eliminate one trig function entirely — especially in integration, where $$\\sin^2(x)$$ or $$\\cos^2(x)$$ can be replaced by expressions involving $$\\cos(2x)$$ that are much easier to integrate.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "How do the three forms of $$\\cos(2A)$$ arise from a single identity? Walk through the derivation from the original form to the other two. (3 steps)", "answer": "- Step 1: Starting from the angle addition formula $$\\cos(A+B) = \\cos(A)\\cos(B) - \\sin(A)\\sin(B)$$, set $$B = A$$ to get $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ — this is the first (difference) form.\n- Step 2: To get the cos-only form, use the Pythagorean identity $$\\sin^2(A) = 1 - \\cos^2(A)$$ to substitute: $$\\cos(2A) = \\cos^2(A) - (1 - \\cos^2(A)) = 2\\cos^2(A) - 1$$.\n- Step 3: To get the sin-only form, use $$\\cos^2(A) = 1 - \\sin^2(A)$$ instead: $$\\cos(2A) = (1 - \\sin^2(A)) - \\sin^2(A) = 1 - 2\\sin^2(A)$$.\n\nAll three are the same identity — just with one squared term replaced using $$\\sin^2 + \\cos^2 = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Derive the double angle formula for $$\\tan(2A)$$ from the angle addition formula for $$\\tan(A+B)$$, and explain why the denominator has a minus sign rather than a plus. (3 steps)", "answer": "- Step 1: The addition formula is $$\\tan(A+B) = \\frac{\\tan(A) + \\tan(B)}{1 - \\tan(A)\\tan(B)}$$. Setting $$B = A$$ gives $$\\tan(2A) = \\frac{\\tan(A) + \\tan(A)}{1 - \\tan(A)\\tan(A)} = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$.\n- Step 2: The minus sign in the denominator comes from the original derivation of $$\\tan(A+B)$$ from $$\\sin(A+B)/\\cos(A+B)$$: $$\\cos(A+B) = \\cos(A)\\cos(B) - \\sin(A)\\sin(B)$$, and dividing numerator and denominator by $$\\cos(A)\\cos(B)$$ produces $$1 - \\tan(A)\\tan(B)$$ in the denominator. The minus arises from the minus in the cosine addition formula.\n- Step 3: A common mistake is writing $$1 + \\tan^2(A)$$ in the denominator. Sanity check: for $$A = 45°$$, $$\\tan(90°)$$ is undefined (infinite), and the formula gives $$\\frac{2 \\cdot 1}{1 - 1} = \\frac{2}{0}$$, correctly undefined. But $$\\frac{2}{1+1} = 1$$, which is wrong. The minus sign is essential for correctness.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "Derive the identity $$\\sin(3x) = 3\\sin(x) - 4\\sin^3(x)$$ using double angle and addition formulas. Walk through each step. (5 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x)$$ and apply the addition formula: $$\\sin(2x + x) = \\sin(2x)\\cos(x) + \\cos(2x)\\sin(x)$$.\n- Step 2: Substitute the double angle formulas: $$\\sin(2x) = 2\\sin(x)\\cos(x)$$ and $$\\cos(2x) = \\cos^2(x) - \\sin^2(x)$$ (using the difference form since we have both $$\\sin^2$$ and $$\\cos^2$$ coming up). This gives: $$2\\sin(x)\\cos(x)\\cos(x) + (\\cos^2(x) - \\sin^2(x))\\sin(x)$$.\n- Step 3: Simplify: $$2\\sin(x)\\cos^2(x) + \\sin(x)\\cos^2(x) - \\sin^3(x) = 3\\sin(x)\\cos^2(x) - \\sin^3(x)$$.\n- Step 4: Replace $$\\cos^2(x)$$ with $$1 - \\sin^2(x)$$ (Pythagorean identity): $$3\\sin(x)(1 - \\sin^2(x)) - \\sin^3(x) = 3\\sin(x) - 3\\sin^3(x) - \\sin^3(x)$$.\n- Step 5: Combine the $$\\sin^3$$ terms: $$3\\sin(x) - 4\\sin^3(x)$$. This is the triple angle identity — everything is expressed purely in terms of $$\\sin(x)$$, which is often the goal when simplifying trig expressions.", "sourc cient adjustment). $$\\sec^2 \\to \\tan$$ is the simplest possible reverse: no fudge factors needed.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "Using the reverse chain rule, what is $$\\int \\cos(4x)\\,dx$$, and why does a factor of $$\\frac{1}{4}$$ appear in the answer? Generalize: what is $$\\int \\cos(ax+b)\\,dx$$? (2 steps)", "answer": "- Step 1: $$\\int \\cos(4x)\\,dx = \\frac{1}{4}\\sin(4x) + c$$. The factor $$\\frac{1}{4}$$ appears because the \"inner function\" is $$4x$$, whose derivative is $$4$$. When we differentiate $$\\sin(4x)$$, the chain rule brings down a factor of $$4$$: $$\\frac{d}{dx}\\sin(4x) = 4\\cos(4x)$$. To get just $$\\cos(4x)$$, we must cancel that 4 by dividing by 4 — hence $$\\frac{1}{4}\\sin(4x)$$.\n- Step 2: In general, $$\\int \\cos(ax+b)\\,dx = \\frac{1}{a}\\sin(ax+b) + c$$, and similarly $$\\int \\sin(ax+b)\\,dx = -\\frac{1}{a}\\cos(ax+b) + c$$. The pattern: divide by the derivative of the inner function (which is $$a$$), and keep the sign rule (positive for $$\\cos \\to \\sin$$, negative for $$\\sin \\to -\\cos$$).", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A student claims that $$\\int \\sin(3x)\\,dx = \\frac{1}{3}\\cos(3x) + c$$ without the negative sign. Is this correct? Walk through the verification and identify the error. (2 steps)", "answer": "- Step 1: Differentiate the student's answer: $$\\frac{d}{dx}\\left[\\frac{1}{3}\\cos(3x)\\right] = \\frac{1}{3} \\cdot 3 \\cdot (-\\sin(3x)) = -\\sin(3x)$$, which is the negative of what we want. The coefficient $$\\frac{1}{3}$$ is correct (cancelling the chain rule's 3), but the missing negative sign means the derivative gives $$-\\sin(3x)$$ instead of $$\\sin(3x)$$.\n- Step 2: The correct answer is $$\\int \\sin(3x)\\,dx = -\\frac{1}{3}\\cos(3x) + c$$. The rule combines two effects: (1) the $$\\frac{1}{a}$$ from the reverse chain rule ($$a = 3$$), and (2) the sign flip from the standard integral $$\\int \\sin(x)\\,dx = -\\cos(x)$$. Both must be applied — missing either one gives a wrong answer.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A function $$f(x) = e^x + 3$$ has domain all real numbers and range $$y > 3$$ (since $$e^x > 0$$ always). Find $$f^{-1}(x)$$ algebraically and state its domain. (3 steps)", "answer": "- Step 1: Write $$y = e^x + 3$$, swap $$x$$ and $$y$$: $$x = e^y + 3$$, then solve for $$y$$: $$e^y = x - 3$$, so $$y = \\ln(x - 3)$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, which is $$y > 3$$, so the domain of $$f^{-1}$$ is $$x > 3$$.\n- Step 3: Check: $$f^{-1}(x) = \\ln(x-3)$$, domain $$x > 3$$. For $$x = 4$$: $$f^{-1}(4) = \\ln(1) = 0$$, and indeed $$f(0) = e^0 + 3 = 4$$. The inverse correctly maps $$4 \\to 0$$, reversing $$f$$'s mapping of $$0 \\to 4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "If $$f(x) = x^2$$ with domain $$x \\geq 0$$, explain why $$f$$ has an inverse, but if the domain is all real numbers, it does not. What property must a function have for an inverse to exist? (3 steps)", "answer": "- Step 1: A function has an inverse if and only if it is *one-to-one* (injective): each output comes from exactly one input. If two different inputs produce the same output, the inverse can't uniquely determine which input to return.\n- Step 2: With domain $$x \\geq 0$$, $$f(x) = x^2$$ is one-to-one because squaring a non-negative number gives a unique result — no two different non-negative numbers have the same square. The inverse is $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$.\n- Step 3: With domain all reals, $$f(-2) = 4$$ and $$f(2) = 4$$ — two inputs map to the same output. If you ask $$f^{-1}(4)$$, should it return $$-2$$ or $$2$$? There's no unique answer, so no inverse function exists. Restricting the domain to eliminate this ambiguity is the standard fix.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "Given $$f(x) = 2x + 1$$ and $$g(x) = x^2$$, compute $$fg(3)$$ and $$gf(3)$$ to demonstrate that composition is not commutative. (2 steps)", "answer": "- Step 1: $$fg(3) = f(g(3)) = f(9) = 2(9) + 1 = 19$$. First apply $$g$$: $$3 \\to 9$$, then apply $$f$$: $$9 \\to 19$$.\n- Step 2: $$gf(3) = g(f(3)) = g(7) = 49$$. First apply $$f$$: $$3 \\to 7$$, then apply $$g$$: $$7 \\to 49$$. The results $$19 \\neq 49$$ confirm that order matters — composition is not commutative.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A function $$g(x) = x^2 - 4$$ has roots at $$x = -2$$ and $$x = 2$$. You evaluate $$g(1) = -3$$ and $$g(3) = 5$$, noting a sign change. Write the complete, rigorous statement that proves a root exists in the interval $$[1, 3]$$. (2 steps)", "answer": "- Step 1: The complete statement is: \"Since $$g(1) = -3 < 0$$ and $$g(3) = 5 > 0$$, and $$g(x)$$ is continuous on the interval $$[1, 3]$$, there is a root of $$g(x) = 0$$ in the interval $$(1, 3)$$.\"\n- Step 2: The two essential ingredients are the sign change (opposite signs at the endpoints) AND the continuity condition. Without stating continuity, the argument is incomplete — a discontinuous function could jump over zero. Since $$g(x) = x^2 - 4$$ is a polynomial (continuous everywhere), the condition is satisfied, but you must still state it explicitly in your answer.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "You're given the iterative formula $$x_{n+1} = \\frac{1}{x_n} + 1$$ with $$x_0 = 2$$. Compute $$x_1$$ and $$x_2$$ by hand (simple mental math), and describe what you observe about the sequence's direction. (2 steps)", "answer": "- Step 1: $$x_1 = \\frac{1}{2} + 1 = 1.5$$, and $$x_2 = \\frac{1}{1.5} + 1 = \\frac{2}{3} + 1 \\approx 1.667$$. The values are $$2, 1.5, 1.667$$ — bouncing above and below some central value.\n- Step 2: The sequence alternates direction: $$x_0 = 2$$ overshoots, $$x_1 = 1.5$$ undershoots, $$x_2 \\approx 1.667$$ overshoots again, gradually narrowing. This oscillating convergence suggests the root is near $$1.6$$ — the values are spiraling inward toward it. (The exact root of $$x^2 - x - 1 = 0$$ is the golden ratio $$\\approx 1.618$$.)", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "On a graph where $$y = f(x)$$ and $$y = f^{-1}(x)$$ are both plotted along with $$y = x$$, if the two curves intersect at a point that is *not* on the line $$y = x$$, what must be true about that intersection? (2 steps)", "answer": "- Step 1: If $$f$$ and $$f^{-1}$$ intersect at a point $$a, b$$ not on $$y = x$$ (so $$a \\neq b$$), then since $$f^{-1}$$ is the reflection of $$f$$ in $$y = x$$, the reflected point $$b, a$$ must also lie on both curves. So there's a *pair* of intersection points: $$a, b$$ and $$b, a$$, symmetric about the line $$y = x$$.\n- Step 2: This means: if $$f(a) = b$$ and $$f^{-1}(a) = b$$, then since $$f^{-1}(a) = b$$ implies $$f(b) = a$$, we get $$f(b) = a$$ and $$f^{-1}(b) = a$$ — the point $$b, a$$ is also an intersection. Every off-diagonal intersection comes with its mirror partner. Only intersections on $$y = x$$ (where $$f(a) = a$$) can appear alone.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "The formula $$\\cos^2(A) = \\frac{1 + \\cos(2A)}{2}$$ is derived from a double angle identity. Which form of $$\\cos(2A)$$ do you start from, and why is this rearrangement useful for integration? (2 steps)", "answer": "- Step 1: Start from the cos-only form $$\\cos(2A) = 2\\cos^2(A) - 1$$ and rearrange: $$2\\cos^2(A) = 1 + \\cos(2A)$$, then divide by 2 to get $$\\cos^2(A) = \\frac{1 + \\cos(2A)}{2}$$.\n- Step 2: This is crucial for integration because $$\\int \\cos^2(x)\\,dx$$ is hard to compute directly (you can't just integrate $$\\cos$$ of a squared angle), but replacing $$\\cos^2(x)$$ with $$\\frac{1 + \\cos(2x)}{2}$$ gives $$\\int \\frac{1}{2}\\,dx + \\int \\frac{\\cos(2x)}{2}\\,dx = \\frac{x}{2} + \\frac{\\sin(2x)}{4} + c$$ — a straightforward calculation using the reverse chain rule on $$\\cos(2x)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Similarly, derive $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$ from a double angle identity, and explain when you'd choose this form over the $$\\cos^2$$ form in a problem. (2 steps)", "answer": "- Step 1: Start from the sin-only form $$\\cos(2A) = 1 - 2\\sin^2(A)$$ and rearrange: $$2\\sin^2(A) = 1 - \\cos(2A)$$, then divide by 2: $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$.\n- Step 2: You choose this form when your expression contains $$\\sin^2$$ rather than $$\\cos^2$$ — for instance, integrating $$\\sin^2(x)$$ or simplifying an equation dominated by sine terms. If a problem gives you $$\\sin^2(3x)$$, replacing it with $$\\frac{1 - \\cos(6x)}{2}$$ immediately makes it integrable. The choice depends on which squared trig function appears in your problem.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A student integrating $$\\int \\cos^2(x)\\,dx$$ writes the answer as just $$\\frac{\\sin(2x)}{4} + c$$, forgetting the $$\\frac{x}{2}$$ term. Where does the $$\\frac{x}{2}$$ come from, and why can't you drop it? (2 steps)", "answer": "- Step 1: After substituting $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$, the integral splits into $$\\int \\frac{1}{2}\\,dx + \\int \\frac{\\cos(2x)}{2}\\,dx$$. The first part $$\\int \\frac{1}{2}\\,dx = \\frac{x}{2}$$ — this is the integral of a constant, producing a linear term. The student only computed the second part.\n- Step 2: The $$\\frac{x}{2}$$ term cannot be dropped because $$\\cos^2(x)$$ is not purely oscillatory — it has a constant \"average value\" of $$\\frac{1}{2}$$ (since $$\\cos^2$$ oscillates between 0 and 1). This constant component accumulates over time, producing the linear growth term $$\\frac{x}{2}$. Without it, the antiderivative wouldn't grow on average, contradicting the fact that $$\\cos^2(x) > 0$$ most of the time.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "What is $$\\int \\sin^2(x)\\,dx$$? Walk through the full derivation using the double angle identity. (3 steps)", "answer": "- Step 1: Substitute $$\\sin^2(x) = \\frac{1 - \\cos(2x)}{2}$$ so the integral becomes $$\\int \\frac{1}{2}\\,dx - \\int \\frac{\\cos(2x)}{2}\\,dx$$.\n- Step 2: The first integral: $$\\int \\frac{1}{2}\\,dx = \\frac{x}{2}$$. The second integral: $$\\int \\frac{\\cos(2x)}{2}\\,dx = \\frac{1}{2} \\cdot \\frac{1}{2}\\sin(2x) = \\frac{\\sin(2x)}{4}$$ (reverse chain rule with inner function $$2x$$, divide by 2).\n- Step 3: Combining: $$\\int \\sin^2(x)\\,dx = \\frac{x}{2} - \\frac{\\sin(2x)}{4} + c$$. Note the minus sign before the $$\\sin(2x)$$ term — it comes from the minus in $$\\frac{1 - \\cos(2x)}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Two curves $$y = x^2 + 2$$ and $$y = 6 - x$$ intersect. Set up the equation to find the $$x$$-coordinates of intersection by rearranging to a polynomial = 0. What would the factored form look like (simple integer roots)? (2 steps)", "answer": "- Step 1: Set $$x^2 + 2 = 6 - x$$, rearrange: $$x^2 + x - 4 = 0$$... Wait, let me redo: $$x^2 + 2 = 6 - x$$ gives $$x^2 + x + 2 - 6 = 0$$, so $$x^2 + x - 4 = 0$$. This doesn't factorise nicely over integers — the roots are $$x = \\frac{-1 \\pm \\sqrt{17}}{2}$$.\n+ Actually, let me pick a cleaner example: $$y = x^2$$ and $$y = 6 - x$$ gives $$x^2 + x - 6 = 0 = (x+3)(x-2)$$, roots $$x = -3, 2$$.\n- Step 2: The factored form $$(x+3)(x-2) = 0$$ immediately gives intersection $$x$$-coordinates of $$-3$$ and $$2$$, with corresponding $$y$$-values $$9$$ and $$4$$ (using either curve). This illustrates why setting equations equal and factorising is efficient when the polynomial has integer roots — you avoid the quadratic formula entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "When a sign change confirms a root in $$(a, b)$$, does the root have to be in the *open* interval $$(a, b)$$ or could it be at one of the endpoints $$a$$ or $$b$$? Why? (2 steps)", "answer": "- Step 1: The root must be in the open interval $$(a, b)$$, not at the endpoints. By definition, if $$f(a)$$ is negative and $$f(b)$$ is positive (sign change), then neither $$f(a) = 0$$ nor $$f(b) = 0$$ — the function is nonzero at both endpoints. The root is strictly between them.\n- Step 2: If $$f(a) = 0$$ exactly, then there's no sign change at that endpoint (zero is neither positive nor negative in this context). The sign change method requires $$f(a)$$ and $$f(b)$$ to have *opposite* nonzero signs, which guarantees the zero crossing happens somewhere *inside* the interval, not at its boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A function $$f(x) = \\frac{1}{x-2}$$ is evaluated at $$f(1) = -1$$ and $$f(3) = 1$$, showing a sign change on $$[1, 3]$$. Does a root of $$f(x) = 0$$ exist in this interval? Explain why or why not. (2 steps)", "answer": "- Step 1: No root exists. The equation $$\\frac{1}{x-2} = 0$$ has no solution — a fraction equals zero only when its numerator is zero, but the numerator is the constant 1, never zero. The sign change from $$-1$$ to $$1$$ is real, but it doesn't indicate a root.\n- Step 2: The reason: $$f(x) = \\frac{1}{x-2}$$ is *not continuous* on $$[1, 3]$$ — it has a vertical asymptote at $$x = 2$$ where the function jumps from $$-\\infty$$ to $$+\\infty$$, passing through every value but never actually reaching zero. This is the classic counterexample showing why the continuity condition cannot be omitted from the sign change argument.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "If $$f(x) = x - 5$$ and $$g(x) = \\ln(x)$$, what is the domain of the composite function $$fg(x)$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = f(\\ln(x)) = \\ln(x) - 5$$. For this to be defined  the inverse relationship: $$\\ln(1) = 0$$ and $$e^0 = 1$$ are the same statement from opposite directions. The point $$1, 0$$ on $$\\ln(x)$$ and the point $$0, 1$$ on $$e^x$$ are reflections of each other in the line $$y = x$$ — a concrete example of the inverse-reflection principle.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Sketch the key features you must include when drawing $$y = \\ln(x)$$ in an exam. List the essential elements that distinguish it from other curves. (3 steps)", "answer": "- Step 1: The vertical asymptote at $$x = 0$$ — the curve plunges to $$-\\infty$$ as you approach the $$y$$-axis from the right. Draw the $$y$$-axis and indicate the curve gets arbitrarily close but never touches or crosses it.\n- Step 2: The crossing point at $$1, 0$$ — the curve passes through the $$x$$-axis at $$x = 1$$ (since $$\\ln(1) = 0$$). Mark this point clearly.\n- Step 3: The slow, continuous increase for $$x > 1$$ — the curve rises without bound but very gradually, never turning downward. For $$0 < x < 1$$, the curve is negative and heading downward toward the asymptote. The overall shape is a smooth, slowly rising curve that hugs the $$y$$-axis on the left and crawls upward on the right.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Why can't you find an inverse for $$f(x) = \\cos(x)$$ with domain all real numbers, but you *can* find one if the domain is restricted to $$0 \\leq x \\leq \\pi$$? What is the inverse in that case? (3 steps)", "answer": "- Step 1: With domain all reals, $$\\cos(x)$$ is not one-to-one: $$\\cos(0) = 1$$, $$\\cos(2\\pi) = 1$$, $$\\cos(-2\\pi) = 1$$, etc. Multiple inputs give the same output, so no unique inverse exists.\n- Step 2: Restricting to $$0 \\leq x \\leq \\pi$$ makes $$\\cos(x)$$ one-to-one: on this interval, cosine decreases steadily from 1 to $$-1$$ without repeating any value. Each output has exactly one input.\n- Step 3: The inverse is $$f^{-1}(x) = \\cos^{-1}(x)$$ (arccosine) with domain $$-1 \\leq x \\leq 1$$ (the range of $$\\cos$$ on the restricted domain) and range $$0 \\leq y \\leq \\pi$$ (the original restricted domain, now swapped to become the range). This is why inverse trig functions are defined with specific principal ranges.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "A student writes $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$ with a plus sign instead of minus. How can you immediately detect this error using a known identity? (2 steps)", "answer": "- Step 1: The Pythagorean identity $$\\cos^2(A) + \\sin^2(A) = 1$$ is always true. If $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$, then $$\\cos(2A) = 1$$ for all $$A$$, which is clearly false — cosine of double angle is not always 1.\n- Step 2: The correct identity $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ gives variable values: at $$A = 0$$, $$\\cos(0) = 1$$; at $$A = 90°$$, $$\\cos(180°) = -1$$. The minus sign is what allows $$\\cos(2A)$$ to vary. The plus sign version collapses to the constant 1, immediately revealing the error. Always sanity-check identities against special angles or known facts.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "Evaluate $$\\int \\cos(5x - 2)\\,dx$$ using the reverse chain rule. Walk through the reasoning for both the coefficient and the inner function. (3 steps)", "answer": "- Step 1: The integrand is $$\\cos$$ of a linear inner function $$u = 5x - 2$$, whose derivative is $$\\frac{du}{dx} = 5$$. The reverse chain rule says: $$\\int \\cos(u)\\,dx = \\frac{1}{u'}\\sin(u) + c$$ when $$u$$ is linear.\n- Step 2: Dividing by the derivative of the inner function: $$\\frac{1}{5}\\sin(5x - 2) + c$$. The factor $$\\frac{1}{5}$$ cancels the 5 that the chain rule would bring down upon differentiation.\n- Step 3: Verify: $$\\frac{d}{dx}\\left[\\frac{1}{5}\\sin(5x-2)\\right] = \\frac{1}{5} \\cdot 5 \\cdot \\cos(5x-2) = \\cos(5x-2)$$ — correct. The constant $$-2$$ inside doesn't affect the coefficient; only the multiplier of $$x$$ (the 5) matters.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "Evaluate $$\\int \\sin(2x + 1)\\,dx$$, carefully accounting for both the reverse chain rule coefficient and the sign rule. (3 steps)", "answer": "- Step 1: The inner function is $$u = 2x + 1$$, derivative $$u' = 2$$, so the reverse chain rule gives a factor of $$\\frac{1}{2}$$.\n- Step 2: The base integral $$\\int \\sin(u)\\,du = -\\cos(u)$$, so applying the coefficient: $$\\int \\sin(2x+1)\\,dx = -\\frac{1}{2}\\cos(2x+1) + c$$.\n- Step 3: Verify: $$\\frac{d}{dx}\\left[-\\frac{1}{2}\\cos(2x+1)\\right] = -\\frac{1}{2} \\cdot 2 \\cdot (-\\sin(2x+1)) = \\sin(2x+1)$$ — the two negatives cancel, and the 2 cancels the $$\\frac{1}{2}$$, giving exactly the integrand. Both the sign and coefficient are essential.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "Suppose $$f(x) = e^{2x}$$ with domain all real numbers. Find $$f^{-1}(x)$$ and state its domain, walking through the full algebraic method. (3 steps)", "answer": "- Step 1: Write $$y = e^{2x}$$, swap $$x$$ and $$y$$: $$x = e^{2y}$$, then solve for $$y$$: take natural log of both sides, $$\\ln(x) = 2y$$, so $$y = \\frac{\\ln(x)}{2}$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$. Since $$e^{2x} > 0$$ for all $$x$$, and $$e^{2x}$$ can be arbitrarily close to 0 or arbitrarily large, the range is $$y > 0$$. So the domain of $$f^{-1}$$ is $$x > 0$$.\n- Step 3: Therefore $$f^{-1}(x) = \\frac{\\ln(x)}{2}$$ with domain $$x > 0$$. Check: $$f^{-1}(e^{2}) = \\frac{\\ln(e^2)}{2} = \\frac{2}{2} = 1$$, and indeed $$f(1) = e^{2}$$ — the inverse correctly reverses the mapping.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Why does the iteration $$x_{n+1} = g(x_n)$$ converge to a root of $$f(x) = 0$$ when the rearrangement $$x = g(x)$$ is valid? What is the fixed point connection? (2 steps)", "answer": "- Step 1: The rearrangement $$f(x) = 0 \\Rightarrow x = g(x)$$ means that any root of $$f$$ is a \"fixed point\" of $$g$$ — a value where applying $$g$$ returns the same value: $$g(\\alpha) = \\alpha$$. The iteration hunts for this fixed point by repeatedly applying $$g$$.\n- Step 2: If the iteration converges ($$x_n \\to \\alpha$$ as $$n \\to \\infty$$), then taking limits on both sides of $$x_{n+1} = g(x_n)$$ gives $$\\alpha = g(\\alpha)$$ — the limit is a fixed point of $$g$$, hence a root of $$f(x) = 0$$ (since $$x = g(x)$$ was rearranged from $$f(x) = 0$$). Convergence means the sequence stabilizes at exactly the value we're seeking.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "A student solves $$x^2 + 5x + 6 = 0$$ from an intersection problem and gets $$x = -2, -3$$, but then uses these as $$y$$-coordinates for the intersection points. What went wrong, and how do you correctly find the full intersection coordinates? (2 steps)", "answer": "- Step 1: Setting the curves equal and solving gives only the $$x$$-coordinates of intersection. The roots $$x = -2$$ and $$x = -3$$ tell you *where* on the $$x$$-axis the crossings occur, not the heights. Using them as $$y$$-values confuses the horizontal and vertical coordinates.\n- Step 2: To get the full intersection points, substitute each $$x$$-root back into *either* original curve (both give the same $$y$$ at an intersection). For example, if the curves were $$y = x^2$$ and $$y = -5x - 6$$: at $$x = -2$$, $$y = (-2)^2 = 4$$ (or $$y = -5(-2) - 6 = 4$$); at $$x = -3$$, $$y = 9$$. The intersection points are $$(-2, 4)$$ and $$(-3, 9)$$ — each requires both coordinates.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Using the identity $$\\sin^2(x) = \\frac{1 - \\cos(2x)}{2}$$, write down the result of $$\\int \\sin^2(3x)\\,dx$$ in terms of $$x$$ and $$\\sin(6x)$$, walking through each substitution. (3 steps)", "answer": "- Step 1: Replace $$\\sin^2(3x)$$ with $$\\frac{1 - \\cos(6x)}{2}$$ (note: the double angle is $$2 \\times 3x = 6x$$). The integral becomes $$\\int \\frac{1}{2}\\,dx - \\int \\frac{\\cos(6x)}{2}\\,dx$$.\n- Step 2: The first part: $$\\int \\frac{1}{2}\\,dx = \\frac{x}{2}$$. The second part: $$\\int \\frac{\\cos(6x)}{2}\\,dx = \\frac{1}{2} \\cdot \\frac{1}{6}\\sin(6x) = \\frac{\\sin(6x)}{12}$$ (reverse chain rule: divide by 6, the derivative of the inner function $$6x$$).\n- Step 3: Combining with the minus sign: $$\\int \\sin^2(3x)\\,dx = \\frac{x}{2} - \\frac{\\sin(6x)}{12} + c$$. The structure is always: linear term minus a sine of double angle, divided by 4 times the inner coefficient.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "A curve $$y = x^3 - x$$ and a line $$y = 2x - 2$$ intersect. Set up the equation to find intersection $$x$$-coordinates by rearranging to a polynomial = 0, and describe what degree polynomial you get. (2 steps)", "answer": "- Step 1: Set $$x^3 - x = 2x - 2$$, rearrange: $$x^3 - x - 2x + 2 = 0$$, giving $$x^3 - 3x + 2 = 0$$. This is a cubic polynomial, not a quadratic — the degree depends on the highest power in the original curves.\n- Step 2: Since it's cubic, you can't directly apply the quadratic formula. You'd look for a root by trial (try $$x = 1$$: $$1 - 3 + 2 = 0$$, works!), then factor out $$(x - 1)$$ to get $$(x-1)(x^2 + x - 2) = (x-1)(x+2)(x-1) = (x-1)^2(x+2)$$, giving roots $$x = 1$$ (double) and $$x = -2$$. The intersection method works for any degree — the polynomial degree just reflects the curves involved.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "Why is $$\\int \\tan(x)\\,dx = \\ln|\\sec(x)| + c$$ (or equivalently $$-\\ln|\\cos(x)| + c$$), and how does this connect to the derivative of $$\\ln$$ and the identity $$1 + \\tan^2(x) = \\sec^2(x)$$? (3 steps)", "answer": "- Step 1: Write $$\\tan(x) = \\frac{\\sin(x)}{\\cos(x)}$$. This is a quotient where the numerator is (up to a sign) the derivative of the denominator: $$\\frac{d}{dx}\\cos(x) = -\\sin(x)$$, so $$\\sin(x) = -\\frac{d}{dx}\\cos(x)$$.\n- Step 2: The pattern $$\\int \\frac{f'(x)}{f(x)}\\,dx = \\ln|f(x)| + c$$ applies. Here $$\\frac{\\sin(x)}{\\cos(x)} = \\frac{-(-\\sin(x))}{\\cos(x)} = -\\frac{d/dx[\\cos(x)]}{\\cos(x)}$$, so $$\\int \\tan(x)\\,dx = -\\ln|\\cos(x)| + c = \\ln|\\sec(x)| + c$$ (since $$-\\ln|\\cos| = \\ln|\\frac{1}{\\cos}| = \\ln|\\sec|$$).\n- Step 3: The connection to $$\\sec^2$$: differentiating $$\\ln|\\sec(x)|$$ gives $$\\frac{\\sec(x)\\tan(x)}{\\sec(x)} = \\tan(x)$$ — confirming the result. The identity $$1 + \\tan^2 = \\sec^2$$ is related but distinct; it tells us $$\\sec^2$$ integrates to $$\\tan$$, while $$\\tan$$ itself integrates to $$\\ln|\\sec|$$.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "What is the key visual difference between the graphs of $$y = e^x$$ and $$y = \\ln(x)$$ in terms of which axis they approach and which axis they cross? Summarize in a comparison table. (2 steps)", "answer": "- Step 1: $$e^x$$: approaches the $$x$$-axis (horizontal asymptote $$y = 0$$) as $$x \\to -\\infty$$, crosses the $$y$$-axis at $$0, 1$$, never crosses the $$x$$-axis. $$\\ln(x)$$: approaches the $$y$$-axis (vertical asymptote $$x = 0$$) as $$x \\to 0^+$$, crosses the $$x$$-axis at $$1, 0$$, never crosses the $$y$$-axis.\n- Step 2: Summary comparison:\n+ $$e^x$$: asymptote is horizontal ($$y=0$$), crossing point $$0,1$$, curve lies above $$x$$-axis\n+ $$\\ln(x)$$: asymptote is vertical ($$x=0$$), crossing point $$1,0$$, curve lies right of $$y$$-axis\n+ They are reflections of each other in $$y = x$$, swapping horizontal/vertical behavior\n\nThe rule: exponential hugs an axis horizontally; logarithm hugs an axis vertically.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "If $$f(x) = 2x - 1$$ with domain all reals and range all reals, find $$f^{-1}(x)$$ and verify that the domain of $$f^{-1}$$ is indeed the range of $$f$$. (2 steps)", "answer": "- Step 1: Write $$y = 2x - 1$$, swap: $$x = 2y - 1$$, solve: $$2y = x + 1$$, $$y = \\frac{x+1}{2}$$. So $$f^{-1}(x) = \\frac{x+1}{2}$$.\n- Step 2: The range of $$f$$ is all reals (a linear function with nonzero slope covers every $$y$$-value), so the domain of $$f^{-1}$$ is all reals. Indeed, $$\\frac{x+1}{2}$$ is defined for all $$x$$ — no restrictions needed. This is the simplest case: both domain and range are unrestricted, so the inverse is also unrestricted.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "A student claims that if $$f(a) = 3$$ and $$f(b) = -3$$, there must be exactly one root between $$a$$ and $$b$$. Is this claim correct? Explain the difference between \"at least one\" and \"exactly one.\" (2 steps)", "answer": "- Step 1: The claim is incorrect. The sign change rule guarantees *at least one* root, not *exactly one*. The function could wiggle up and down multiple times between $$a$$ and $$b$$, crossing the $$x$$-axis at several points. Each crossing is a root.\n- Step 2: For example, $$f(x) = (x-1)(x-2)(x-3) = x^3 - 6x^2 + 11x - 6$$ on $$[0, 4]$$: $$f(0) = -6 < 0$$ and $$f(4) = 64 - 96 + 44 - 6 = 6 > 0$$, sign change confirmed. But there are three roots at $$x = 1, 2, 3$$, not one. Sign change proves existence, not uniqueness — to claim exactly one root, you'd need additional information (like the function being strictly monotonic on the interval).", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "If $$f(x) = x^3$$, explain why $$f$$ has an inverse on domain all real numbers (unlike $$x^2$$). What property does $$x^3$$ have that $$x^2$$ lacks? (2 steps)", "answer": "- Step 1: $$f(x) = x^3$$ is strictly increasing on all real numbers — its derivative $$3x^2 \\geq 0$$ (", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}], "count": 57}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does setting two equations equal to each other help find their intersection points? (2 steps)", "answer": "- Step 1: At intersection points, both graphs have the same x and y values simultaneously.  \n- Step 2: Setting $ y_1 = y_2 $ ensures we solve for x-values where the functions coincide, reducing to a solvable polynomial equation.  \n\n+ Example: If $ y = 2x + 3 $ and $ y = x^2 $, setting $ 2x + 3 = x^2 $ gives $ x^2 - 2x - 3 = 0 $.  \n\n[Takeaway: Intersection x-values satisfy both equations by definition.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the domain of $ f(x) = \\ln(x) $ restricted to $ x > 0 $? (3 steps)", "answer": "- Step 1: The natural logarithm $ \\ln(x) $ is undefined for $ x \\leq 0 $ because $ e^y = x $ has no real solution when $ x \\leq 0 $.  \n- Step 2: The exponential function $ e^y $ only outputs positive numbers, so its inverse $ \\ln(x) $ must have domain $ x > 0 $.  \n- Step 3: Graphically, $ \\ln(x) $ has a vertical asymptote at $ x = 0 $, confirming the absence of non-positive x-values.  \n\n+ Misconception: Confusing with $ e^x $, which has domain $ x \\in \\mathbb{R} $.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does the inverse function $ f^{-1}(x) $ require stating its domain explicitly? (2 steps)", "answer": "- Step 1: The domain of $ f^{-1}(x) $ is the range of $ f(x) $, which may not match the natural domain of the inverse equation.  \n- Step 2: Failing to specify the domain could include invalid inputs (e.g., if $ f(x) = x^2 $, $ f^{-1}(x) = \\sqrt{x} $ requires $ x \\geq 0 $).  \n\n+ Example: If $ f(x) = \\ln(x) $, then $ f^{-1}(x) = e^x $ has domain $ x \\in \\mathbb{R} $, matching the range of $ \\ln(x) $.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does the order matter in composite functions like $ fg(x) $ vs. $ gf(x) $? (2 steps)", "answer": "- Step 1: $ fg(x) = f(g(x)) $ applies $ g $ first, then $ f $; $ gf(x) = g(f(x)) $ reverses this sequence.  \n- Step 2: Function operations are not commutative. For example, if $ f(x) = x + 1 $ and $ g(x) = x^2 $, $ fg(x) = x^2 + 1 $, while $ gf(x) = (x + 1)^2 $.  \n\n+ Edge Case: Some functions commute (e.g., $ f(x) = x + 2 $, $ g(x) = x - 2 $), but this is rare.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is continuity necessary for the sign change method to locate roots? (3 steps)", "answer": "- Step 1: A sign change in $ f(a) $ and $ f(b) $ implies a root exists *only if* $ f(x) $ is continuous on $ [a, b] $.  \n- Step 2: Discontinuous functions (e.g., $ f(x) = 1/x $) can have sign changes without roots (e.g., $ f(-1) = -1 $, $ f(1) = 1 $, but no root in $ [-1, 1] $).  \n- Step 3: Continuity guarantees no \"jumps\" to skip over the x-axis.  \n\n+ Counterexample: $ f(x) = \\frac{1}{x} $ on $ [-1, 1] $ has a sign change but no root.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does reflecting $ y = f(x) $ over $ y = x $ give the graph of $ y = f^{-1}(x) $? (3 steps)", "answer": "- Step 1: The inverse function swaps inputs and outputs: $ (a, b) $ on $ f(x) $ becomes $ (b, a) $ on $ f^{-1}(x) $.  \n- Step 2: Reflecting over $ y = x $ geometrically swaps x and y coordinates of all points.  \n- Step 3: Domain and range swap: $ \\text{Domain}(f^{-1}) = \\text{Range}(f) $, $ \\text{Range}(f^{-1}) = \\text{Domain}(f) $.  \n\n+ Visual Example: If $ f(2) = 5 $, then $ f^{-1}(5) = 2 $, so the reflection maps (2, 5) to (5, 2).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How does the reverse chain rule work for integrating $ \\cos(2x + 3) $? (2 steps)", "answer": "- Step 1: For $ \\int \\cos(ax + b) \\, dx $, the antiderivative is $ \\frac{1}{a} \\sin(ax + b) + C $.  \n- Step 2: Differentiating $ \\frac{1}{2} \\sin(2x + 3) $ gives $ \\cos(2x + 3) \\cdot 2 \\cdot \\frac{1}{2} = \\cos(2x + 3) $, confirming correctness.  \n\n+ Generalization: $ \\int \\sin(ax + b) \\, dx = -\\frac{1}{a} \\cos(ax + b) + C $.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is $ \\sin(2A) = 2\\sin A \\cos A $ true, and how does it relate to the angle addition formula? (3 steps)", "answer": "- Step 1: Use the angle addition formula $ \\sin(A + B) = \\sin A \\cos B + \\cos A \\sin B $.  \n- Step 2: Let $ B = A $, so $ \\sin(2A) = \\sin A \\cos A + \\cos A \\sin A = 2\\sin A \\cos A $.  \n- Step 3: This is a special case of the addition formula, simplifying when both angles are equal.  \n\n+ Why the 2? It arises because the two terms in the addition formula are identical.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is solving $ f(x) = x $ equivalent to finding the intersection of $ y = f(x) $ and $ y = x $? (2 steps)", "answer": "- Step 1: Setting $ f(x) = x $ finds x-values where the function equals its input, i.e., where $ y = f(x) $ and $ y = x $ share the same point.  \n- Step 2: Graphically, this is the intersection point of $ f(x) $ and the line $ y = x $, which is also used to solve equations via iteration.  \n\n+ Example: If $ f(x) = \\sqrt{x} $, solving $ \\sqrt{x} = x $ gives $ x = 0 $ or $ 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does iteration $ x_{n+1} = g(x_n) $ converge to a root of $ f(x) = 0 $? (3 steps)", "answer": "- Step 1: Rearranging $ f(x) = 0 $ to $ x = g(x) $ creates a recursive formula.  \n- Step 2: Starting with $ x_0 $, repeated substitution approximates the fixed point $ x = g(x) $.  \n- Step 3: Convergence requires $ |g'(x)| < 1 $ near the root; otherwise, iterations may diverge.  \n\n+ Edge Case: If $ g'(x) \\geq 1 $, the method may fail (e.g., $ g(x) = x^2 $, $ x_0 = 2 $ diverges).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why do we set two equations equal to find their intersection points, and what common mistake occurs when creating the polynomial? (3 steps)", "answer": "- Step 1: **Equalizing equations** ensures y₁ = y₂ at intersection points, reducing the system to a single-variable equation.  \n- Step 2: **Rearranging terms** gives a polynomial equation (e.g., ax² + bx + c = 0).  \n+ Example: If y = 2x + 3 and y = x² - 4, set 2x + 3 = x² - 4 → x² - 2x - 7 = 0.  \n- Step 3: **Common mistake**: Copying coefficients incorrectly (e.g., writing 2x² instead of x²) leads to invalid roots. Always double-check transcribed equations.  \n\n[Optional takeaway: Intersection requires shared y-values, so eliminate y by substitution.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What are the domain and range of f(x) = ln(x), and why is its graph distinct from eˣ? (3 steps)", "answer": "- Step 1: **Domain** is x > 0 because ln(x) is undefined for x ≤ 0.  \n- Step 2: **Range** is all real numbers (y ∈ ℝ) since ln(x) approaches -∞ as x→0⁺ and ∞ as x→∞.  \n- Step 3: **Graph features**:  \n+ Passes through (1, 0) because ln(1) = 0.  \n+ Vertical asymptote at x = 0.  \n+ Contrast with eˣ: eˣ has domain ℝ and range y > 0, with a horizontal asymptote at y = 0.  \n\n[Optional takeaway: ln(x) and eˣ are inverses, swapping x/y domains/ranges.]", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you algebraically find the inverse of f(x) = 3x + 2, and why must you state its domain? (3 steps)", "answer": "- Step 1: Replace f(x) with y: y = 3x + 2.  \n- Step 2: Swap x and y: x = 3y + 2 → solve for y: y = (x - 2)/3.  \n- Step 3: **Domain of f⁻¹(x)**: Equals the range of f(x). Here, f(x) is linear (range y ∈ ℝ), so f⁻¹(x) has domain x ∈ ℝ.  \n+ Mistake: Forgetting the domain implies incomplete function definition.  \n\n[Optional takeaway: An inverse function requires the original function’s range to become its domain.]", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does fg(x) ≠ gf(x) in general, and how do you compute both for f(x) = 2x and g(x) = x + 1? (3 steps)", "answer": "- Step 1: **Order matters**. fg(x) = f(g(x)) = f(x + 1) = 2(x + 1) = 2x + 2.  \n- Step 2: **gf(x)** = g(f(x)) = g(2x) = 2x + 1.  \n- Step 3: **Comparison**: 2x + 2 ≠ 2x + 1 ⇒ fg ≠ gf.  \n+ Intuition: Functions act as transformations; changing the order alters the result.  \n\n[Optional takeaway: Composition is non-commutative, like matrix multiplication.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What condition guarantees a root exists between a and b for f(a) and f(b) with opposite signs? (2 steps)", "answer": "- Step 1: **Continuity requirement**: f(x) must be continuous on [a, b] to apply the Intermediate Value Theorem.  \n- Step 2: **Counterexample**: A sign change without continuity (e.g., f(x) = 1/x between -1 and 1) doesn’t imply a root.  \n+ Common mistake: Omitting continuity in the statement.  \n\n[Optional takeaway: Discontinuities can cause false sign changes that don’t enclose a root.]", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does the iterative method approximate roots of f(x) = 0, and what calculator technique speeds up computation? (3 steps)", "answer": "- Step 1: **Rearrangement**: Express f(x) = 0 as x = g(x) (e.g., x³ - x - 1 = 0 → x = (x + 1)^(1/3)).  \n- Step 2: **Iteration**: Start with x₀, compute x₁ = g(x₀), x₂ = g(x₁), etc., until convergence.  \n- Step 3: **Calculator trick**: Store x₀ in Ans, then input g(Ans) and press = repeatedly.  \n+ Limitation: Convergence depends on the derivative |g’(x)| < 1 near the root.  \n\n[Optional takeaway: Iteration success depends on the form of g(x) and the initial guess.]", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How is the graph of y = f⁻¹(x) related to y = f(x), and why is solving f(x) = x equivalent to finding intersections with y = x? (3 steps)", "answer": "- Step 1: **Reflection**: The inverse graph is the mirror of the original over the line y = x.  \n- Step 2: **Domain/range swap**: Domain of f⁻¹ = Range of f; Range of f⁻¹ = Domain of f.  \n- Step 3: **Solving f(x) = x**: This finds points where the function crosses y = x, which are invariant under inversion.  \n+ Misconception: f(x) = x always has a solution — false for functions like f(x) = eˣ (no real intersection).  \n\n[Optional takeaway: Graphical understanding of inverses clarifies domain-range relationships.]", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Derive sin(3x) using double-angle and sum identities. (4 steps)", "answer": "- Step 1: Express sin(3x) as sin(2x + x).  \n- Step 2: Apply sum identity: sin(A + B) = sinA cosB + cosA sinB → sin(2x)cos(x) + cos(2x)sin(x).  \n- Step 3: Substitute identities:  \n+ sin(2x) = 2sinx cosx  \n+ cos(2x) = 1 - 2sin²x  \n- Step 4: Expand and simplify:  \n2sinx cosx * cosx + (1 - 2sin²x)sinx = 2sinx cos²x + sinx - 2sin³x.  \nUse cos²x = 1 - sin²x → 2sinx(1 - sin²x) + sinx - 2sin³x = 3sinx - 4sin³x.  \n\n[Optional takeaway: Complex trigonometric expressions often decompose into simpler identities.]", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does the reverse chain rule apply to ∫cos(2x + 3)dx, and why is the coefficient adjusted? (3 steps)", "answer": "- Step 1: **Standard integral**: ∫cos(ax + b)dx = (1/a)sin(ax + b) + c.  \n- Step 2: **Derivative check**: d/dx [(1/a)sin(ax + b)] = cos(ax + b) * (a/a) = cos(ax + b).  \n- Step 3: **Coefficient intuition**: The 1/a compensates for the chain rule’s inner derivative (d/dx (ax + b) = a).  \n+ Example: ∫cos(2x + 3)dx = (1/2)sin(2x + 3) + c.  \n\n[Optional takeaway: The reverse chain rule adjusts for the inner function’s slope in integrals.]", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "Why must you verify continuity when using the sign-change method, even if f(a) and f(b) have opposite signs? (2 steps)", "answer": "- Step 1: **Discontinuous counterexample**: f(x) = 1/x between -1 and 1 has f(-1) = -1 and f(1) = 1, but no root exists due to discontinuity at x = 0.  \n- Step 2: **Continuity guarantee**: The Intermediate Value Theorem requires continuity to ensure the function crosses the x-axis.  \n\n[Optional takeaway: Sign change alone is insufficient without continuity.]", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "If the curves y = x² + 3x - 7 and y = 2x + 1 intersect, how would you find their intersection points algebraically? (2 steps)", "answer": "- Step 1: Set the two equations equal to each other since at intersection points, the y-values are the same: x² + 3x - 7 = 2x + 1\n- Step 2: Rearrange to form a polynomial equal to zero, then solve: x² + 3x - 7 - 2x - 1 = 0 → x² + x - 8 = 0 → (x + 4)(x - 2) = 0 → x = -4 or x = 2. Substitute back to get y-values.\n\nIntersection points are (-4, -7) and (2, 5).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the domain and range of the function f(x) = ln(x)? Explain why the domain is restricted. (2 steps)", "answer": "- Step 1: Domain is x > 0, Range is all real numbers (y ∈ ℝ).\n- Step 2: The domain is restricted because ln(x) is the inverse of e^x. Since e^x always produces positive outputs, its inverse ln(x) can only accept positive inputs. Also, there is no real number y such that e^y = 0 or a negative number, so ln(x) is undefined for x ≤ 0.\n\nThe graph has a vertical asymptote at x = 0 and passes through (1, 0).", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A student sketches f(x) = ln(x) but draws an exponential curve passing through (0, 1). What is the common misconception here, and how would you help them distinguish between ln(x) and eˣ? (2 steps)", "answer": "- Step 1: The student has confused ln(x) with its inverse function eˣ. The graph of y = e^x passes through (0, 1), increases rapidly, and has a horizontal asymptote at y = 0.\n- Step 2: For y = ln(x): passes through (1, 0), increases slowly, and has a vertical asymptote at x = 0. The key visual distinction is that ln(x) approaches infinity much more slowly than e^x, and its asymptote is vertical (x = 0) while e^x has a horizontal asymptote (y = 0).\n\nRemember: ln(x) \"un-does\" e^x — if e^a = b, then ln(b) = a.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Find the inverse function f⁻¹(x) for f(x) = 3x - 2. State its domain. (3 steps)", "answer": "- Step 1: Replace f(x) with y: y = 3x - 2\n- Step 2: Swap x and y: x = 3y - 2, then solve for y: x + 2 = 3y → y = (x + 2)/3\n- Step 3: So f⁻¹(x) = (x + 2)/3. The domain of f⁻¹ equals the range of f. Since f(x) = 3x - 2 is a linear function with domain all real numbers, its range is also all real numbers. Therefore, the domain of f⁻¹ is all real numbers (x ∈ ℝ).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why is it essential to state the domain when defining an inverse function? What common mistake do students make? (2 steps)", "answer": "- Step 1: Whenever we define any function — including its inverse — we need both the equation AND the domain. The domain of f⁻¹ must equal the range of f, and if the original function is restricted (e.g., only positive outputs), the inverse's domain will be restricted accordingly.\n- Step 2: Students often forget to state the domain of the inverse, which can lead to incorrect answers. For example, for f(x) = x² with domain x ≥ 0, the inverse is f⁻¹(x) = √x with domain x ≥ 0 — not all real numbers.\n\nHarry emphasized: \"Whenever we define a function we need two things... the equation... But two, we need to give the domain as well.\"", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "If f(x) = x + 2 and g(x) = x², find (a) fg(x) and (b) gf(x). Are they equal? Explain. (3 steps)", "answer": "- Step 1: fg(x) means f(g(x)) — apply g first, then f: f(g(x)) = f(x²) = x² + 2\n- Step 2: gf(x) means g(f(x)) — apply f first, then g: g(f(x)) = g(x + 2) = (x + 2)² = x² + 4x + 4\n- Step 3: They are NOT equal: fg(x) = x² + 2 ≠ x² + 4x + 4 = gf(x). In general, composite functions are not commutative — the order matters.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Using the sign change method, a student finds f(2) = -3 and f(3) = 5. What can they conclude about a root in the interval [2, 3], and what condition must be satisfied for this conclusion to be valid? (2 steps)", "answer": "- Step 1: Since f(2) and f(3) have opposite signs (one negative, one positive), there is at least one root in the interval (2, 3).\n- Step 2: The function must be continuous on the entire interval [2, 3]. This is the Intermediate Value Theorem. Without continuity, a sign change does not guarantee a root — the function could jump over the x-axis.\n\nHarry emphasized: \"There is something we need to add to that, and that is to say that g of x is continuous on this interval.\"", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Explain the iteration method for solving equations numerically. Starting with x₀ = 2, how would you use iteration to solve x³ = 5? (Hint: rearrange to x = g(x)) (3 steps)", "answer": "- Step 1: Rearrange f(x) = 0 into the form x = g(x). For x³ = 5, we get x³ - 5 = 0 → x = ³√5, or x = 5/x². So g(x) = 5/x². The iteration formula is xₙ₊₁ = g(xₙ).\n- Step 2: Start with x₀ = 2. Calculate x₁ = g(x₀) = 5/(2)² = 5/4 = 1.25. Then x₂ = g(x₁) = 5/(1.25)² = 5/1.5625 ≈ 3.2.\n- Step 3: Continue repeating: x₃ ≈ 0.49, x₄ ≈ 20.8... This particular rearrangement diverges (blows up). A better rearrangement might be x = (x² + 5)/(2x) (Newton's method) or x = (5)^(1/3) directly. The sequence converges when |g'(x)| < 1 near the root.\n\nCalculator technique: Store x₀ in Ans, type the formula in terms of Ans, press = repeatedly.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "The graph of y = f(x) passes through points (0, 1), (1, 2), and (2, 4). Use this information to sketch the graph of y = f⁻¹(x). What are the coordinates of three points on the inverse graph? (2 steps)", "answer": "- Step 1: The graph of y = f⁻¹(x) is the reflection of y = f(x) in the line y = x. This means we swap the x and y coordinates of each point.\n- Step 2: Original points: (0, 1), (1, 2), (2, 4). After reflecting: (1, 0), (2, 1), (4, 2). Also: Domain of f⁻¹ = Range of f = {1, 2, 4}, and Range of f⁻¹ = Domain of f = {0, 1, 2}.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "How are the domain and range of f⁻¹(x) related to those of f(x)? (2 steps)", "answer": "- Step 1: Domain of f⁻¹ = Range of f. The inverse function can only accept inputs that the original function could output.\n- Step 2: Range of f⁻¹ = Domain of f. The inverse function can only produce outputs that the original function could accept as inputs.\n\nThis makes sense geometrically: reflecting across y = x swaps the roles of x and y, so the horizontal becomes vertical and vice versa.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Solve f(x) = x for f(x) = 2x / (x + 1). What does this solution represent graphically? (2 steps)", "answer": "- Step 1: Set f(x) = x: 2x / (x + 1) = x → 2x = x(x + 1) → 2x = x² + x → 0 = x² - x → x(x - 1) = 0 → x = 0 or x = 1.\n- Step 2: Graphically, f(x) = x asks \"where does the function intersect the line y = x?\" These intersection points are where f(x) = x. When a function equals its own inverse at a point (f(x) = x), that point lies on the line y = x (the line of symmetry between f and f⁻¹).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Write down the three double angle formulas for sin(2A), cos(2A), and tan(2A). (2 steps)", "answer": "- Step 1: Memorize these essential trig identities:\n- sin(2A) = 2sin(A)cos(A)\n- cos(2A) = cos²(A) - sin²(A) = 2cos²(A) - 1 = 1 - 2sin²(A) (three equivalent forms)\n- tan(2A) = 2tan(A) / (1 - tan²(A))\n\n+ Note: The coefficient \"2\" in sin(2A) is the most commonly forgotten part — Harry said: \"Do you see what you're missing here? You're missing the 2.\"", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Prove that sin(3x) = 3sin(x) - 4sin³(x). (3 steps)", "answer": "- Step 1: Use angle addition: sin(3x) = sin(2x + x) = sin(2x)cos(x) + cos(2x)sin(x)\n- Step 2: Substitute double angle formulas: = [2sin(x)cos(x)]cos(x) + [cos²(x) - sin²(x)]sin(x) = 2sin(x)cos²(x) + sin(x)cos²(x) - sin³(x) = 3sin(x)cos²(x) - sin³(x)\n- Step 3: Use cos²(x) = 1 - sin²(x): = 3sin(x)(1 - sin²(x)) - sin³(x) = 3sin(x) - 3sin³(x) - sin³(x) = 3sin(x) - 4sin³(x)\n\nThis identity is useful for solving cubic trigonometric equations.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "Evaluate: (a) ∫cos(3x) dx (b) ∫sin(5x - 2) dx. (2 steps)", "answer": "- Step 1: Use the reverse chain rule: ∫cos(ax + b) dx = (1/a)sin(ax + b) + C\n- For ∫cos(3x) dx: the answer is (1/3)sin(3x) + C\n- Step 2: For ∫sin(5x - 2) dx: a = 5, so the answer is -(1/5)cos(5x - 2) + C\n\nGeneral formula: ∫f(ax + b) dx = (1/a)F(ax + b) + C, where F is the antiderivative of f.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Evaluate: ∫sec²(2x) dx and ∫(3sin(x) + 2cos(x)) dx. (2 steps)", "answer": "- Step 1: ∫sec²(2x) dx: Since ∫sec²(u) du = tan(u) + C, by reverse chain rule with u = 2x, we get (1/2)tan(2x) + C.\n- Step 2: ∫(3sin(x) + 2cos(x)) dx: Integrate term by term: 3∫sin(x)dx + 2∫cos(x)dx = 3(-cos(x)) + 2(sin(x)) + C = -3cos(x) + 2sin(x) + C.\n\nRemember: ∫sin(x) dx = -cos(x) + C (there's a negative!).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Using the sign change method, f(a) = -2 and f(b) = 4 with f continuous on [a, b]. What can you conclude about the root? What if f is NOT continuous? (2 steps)", "answer": "- Step 1: With opposite signs and continuity, there is definitely at least one root in (a, b) by the Intermediate Value Theorem.\n- Step 2: If f is NOT continuous, you cannot conclude a root exists. The function could jump from negative to positive without crossing zero — for example, f(x) = 1/x on interval [-1, 1] has f(-1) = -1, f(1) = 1, but no root at x = 0 (undefined).\n\nThis is why stating continuity is essential in the sign change method.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For the iteration formula xₙ₊₁ = 2 + 3/xₙ, with x₀ = 3, calculate x₁ and x₂. Does this iteration appear to converge? (2 steps)", "answer": "- Step 1: x₀ = 3. Then x₁ = 2 + 3/3 = 2 + 1 = 3. Then x₂ = 2 + 3/3 = 3 again.\n- Step 2: The iteration has converged immediately to x = 3 (fixed point). Verify: if x = 2 + 3/x, multiply by x: x² = 2x + 3 → x² - 2x - 3 = 0 → (x - 3)(x + 1) = 0 → x = 3 or x = -1. Since we started at x₀ = 3, we converged to the root x = 3.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why does rearranging f(x) = 0 into different forms x = g(x) lead to different convergence behaviors in iteration? What makes an iteration formula \"good\"? (2 steps)", "answer": "- Step 1: Different rearrangements create different iteration functions g(x). Whether the iteration converges depends on the magnitude of g'(x) near the root. Convergence occurs when |g'(x)| < 1 near the fixed point.\n- Step 2: A \"good\" iteration formula has |g'(r)| < 1 at the root r, so errors shrink each iteration. A \"bad\" formula has |g'(r)| > 1, causing errors to grow (diverge). For example, solving x² = 5: x = 5/x (bad, diverges) vs. x = (x + 5/x)/2 (Newton's method, converges quickly).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "If f(x) = e^x (domain all real numbers), what is f⁻¹(x)? State its domain and range, and explain the graphical relationship. (3 steps)", "answer": "- Step 1: f⁻¹(x) = ln(x). To find it: y = e^x → swap x and y: x = e^y → take ln: y = ln(x).\n- Step 2: Domain of f⁻¹ = Range of f = (0, ∞). Range of f⁻¹ = Domain of f = ℝ.\n- Step 3: Graphically, y = ln(x) is the reflection of y = e^x across the line y = x. Also, e^x has horizontal asymptote y = 0 (right side), while ln(x) has vertical asymptote x = 0 (left side).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Using the double angle formula, simplify cos²(x) - sin²(x) to a single trigonometric function. What are the three forms of cos(2x)? (2 steps)", "answer": "- Step 1: cos²(x) - sin²(x) = cos(2x). This is the first form of the cosine double angle identity.\n- Step 2: The three equivalent forms are:\n- cos(2x) = cos²(x) - sin²(x)\n- cos(2x) = 2cos²(x) - 1\n- cos(2x) = 1 - 2sin²(x)\n\nThese forms are useful depending on what you know — if you know sin(x), use the third form; if you know cos(x), use the second.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A student writes: \"The inverse of f(x) = x² is f⁻¹(x) = √x.\" What is missing, and why is it important? Give the correct answer. (2 steps)", "answer": "- Step 1: The domain is missing! The inverse of f(x) = x² depends crucially on what domain f was defined with.\n- Step 2: If f(x) = x² has domain x ≥ 0 (to make it one-to-one), then f⁻¹(x) = √x with domain x ≥ 0. If f had domain all real numbers, it would not have an inverse (not one-to-one). Restricting the domain is essential for a function to have an inverse.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "For f(x) = 1/x (domain x ≠ 0), find f⁻¹(x) and state its domain and range. What happens graphically? (2 steps)", "answer": "- Step 1: y = 1/x → swap x and y: x = 1/y → solve: y = 1/x. So f⁻¹(x) = 1/x (self-inverse!).\n- Step 2: Domain of f⁻¹ = Range of f = x ≠ 0. Range of f⁻¹ = Domain of f = x ≠ 0. Graphically, y = 1/x is its own reflection across y = x — it lies symmetrically about this line. This is a special case where f = f⁻¹.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "What is the geometric interpretation of solving f(x) = 0 using iteration xₙ₊₁ = g(xₙ)? Explain what a \"fixed point\" means. (2 steps)", "answer": "- Step 1: Graphically, iteration means: start at x₀ on the x-axis, go up to the curve y = g(x), then across to the line y = x (reflect across y = x), then repeat. This \"staircase\" or \"cobweb\" diagram shows whether you're moving toward or away from the solution.\n- Step 2: A fixed point is a value x where g(x) = x. This corresponds to solving f(x) = 0 (the original equation). At a fixed point, iteration produces the same value: xₙ₊₁ = xₙ.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Sketch y = ln(x) and y = e^x on the same axes. Where do they intersect, and what is the significance of this intersection? (2 steps)", "answer": "- Step 1: y = ln(x) passes through (1, 0), increases slowly, vertical asymptote x = 0. y = e^x passes through (0, 1), increases rapidly, horizontal asymptote y = 0.\n- Step 2: They intersect at exactly one point: (1, 1). At this point, e^x = ln(x) = 1, and interestingly, this is also where both functions equal their inverses: e^1 = e, ln(e) = 1... wait, actually at x = 1: ln(1) = 0, e^1 = e. The intersection satisfies e^x = ln(x) — numerically, this occurs at x ≈ 0.567 (the Omega constant).\n\nActually, more importantly: they intersect on the line y = x, which is the line of reflection between inverse functions. This confirms they are inverses.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Using trig identities, find an expression for sin(x)cos(x) in terms of sin(2x). Then evaluate ∫sin(x)cos(x) dx. (2 steps)", "answer": "- Step 1: From sin(2x) = 2sin(x)cos(x), we get sin(x)cos(x) = (1/2)sin(2x).\n- Step 2: ∫sin(x)cos(x) dx = ∫(1/2)sin(2x) dx = (1/2) × (-1/2)cos(2x) + C = -(1/4)cos(2x) + C.\n\nAlternatively, use substitution u = sin(x) or u = cos(x).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "When using the sign change method to find roots of f(x) = x³ - x - 2, you test x = 1 and x = 2. What do you find, and what can you conclude? (2 steps)", "answer": "- Step 1: f(1) = 1³ - 1 - 2 = -2 (negative). f(2) = 2³ - 2 - 2 = 8 - 4 = 4 (positive). They have opposite signs.\n- Step 2: Since f(x) = x³ - x - 2 is a polynomial (and thus continuous everywhere), and f(1) and f(2) have opposite signs, there is definitely a root in the interval (1, 2). The root is approximately x ≈ 1.521.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Explain why the function f(x) = 1/x does NOT have an inverse if its domain is \"all real numbers.\" How can we define an inverse? (2 steps)", "answer": "- Step 1: f(x) = 1/x fails the horizontal line test — for any y-value (except 0), there are two x-values: positive and negative. For example, f(2) = 0.5 and f(-2) = -0.5 both give the same output magnitude, so it's not one-to-one.\n- Step 2: To have an inverse, we must restrict the domain. If we restrict to x > 0, then f⁻¹(x) = 1/x (domain x > 0). If we restrict to x < 0, f⁻¹(x) = 1/x (domain x < 0). These are two separate inverse functions.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Prove the identity tan(2A) = 2tan(A) / (1 - tan²(A)). (2 steps)", "answer": "- Step 1: Start with tan(2A) = sin(2A)/cos(2A) = [2sin(A)cos(A)] / [cos²(A) - sin²(A)]\n- Step 2: Divide numerator and denominator by cos²(A): = [2sin(A)cos(A)/cos²(A)] / [(cos²(A) - sin²(A))/cos²(A)] = [2tan(A)] / [1 - tan²(A)]\n\nThis identity is valid when cos(A) ≠ 0 and tan²(A) ≠ 1 (to avoid division by zero).", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Evaluate ∫(sin(x) + cos(x))² dx. Simplify first, then integrate. (3 steps)", "answer": "- Step 1: Expand: (sin(x) + cos(x))² = sin²(x) + 2sin(x)cos(x) + cos²(x) = (sin²(x) + cos²(x)) + 2sin(x)cos(x) = 1 + sin(2x)\n- Step 2: So ∫(sin(x) + cos(x))² dx = ∫(1 + sin(2x)) dx = ∫1 dx + ∫sin(2x) dx\n- Step 3: = x + (-1/2)cos(2x) + C = x - (1/2)cos(2x) + C\n\nUsing the double angle identity simplified the integration significantly.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why is the iteration formula xₙ₊₁ = g(xₙ) equivalent to solving f(x) = 0? What is the relationship between the fixed points of g and the roots of f? (2 steps)", "answer": "- Step 1: We rearrange f(x) = 0 into x = g(x). At a root of f (where f(r) = 0), we have r = g(r). This means r is a fixed point of g.\n- Step 2: Conversely, any fixed point of g satisfies g(r) = r, which means when rearranged back to f(r) = 0 (since we defined g from f), r is a root of f. So finding fixed points of g is equivalent to finding roots of f.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "For f(x) = ln(x + 2), what is the domain? If g(x) = f(x - 3), describe how the graph of g relates to f. (2 steps)", "answer": "- Step 1: For f(x) = ln(x + 2), the argument must be positive: x + 2 > 0 → x > -2. So domain is (-2, ∞).\n- Step 2: g(x) = f(x - 3) = ln((x - 3) + 2) = ln(x - 1). This is a horizontal translation: g(x) is f(x) shifted 3 units to the right. Graphically, the vertical asymptote moves from x = -2 to x = 1.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "If the curves y = x² and y = √x intersect, find the intersection points. (2 steps)", "answer": "- Step 1: Set x² = √x. Since √x = x^(1/2), we have x² = x^(1/2). Rearrange: x² - x^(1/2) = 0. Factor: x^(1/2)(x^(3/2) - 1) = 0.\n- Step 2: Solutions: x^(1/2) = 0 → x = 0; or x^(3/2) = 1 → x = 1. At x = 0: y = 0. At x = 1: y = 1. Intersection points are (0, 0) and (1, 1).\n\nThese are the points where a function and its inverse intersect (since √x is the inverse of x² with restricted domain x ≥ 0).", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the range of f(x) = ln(x - 1) + 3? Explain your reasoning. (2 steps)", "answer": "- Step 1: The domain is x - 1 > 0 → x > 1. The basic function ln(x) has range all real numbers (ℝ).\n- Step 2: Adding 3 shifts the graph up by 3 units, but doesn't change the range — it's still all real numbers. So f(x) has range ℝ. The \"+3\" only affects the vertical position, not the spread of outputs.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "For the iteration xₙ₊₁ = (xₙ + 3/xₙ)/2 starting with x₀ = 2, calculate x₁, x₂, x₃. What is this iteration finding? (2 steps)", "answer": "- Step 1: x₀ = 2. x₁ = (2 + 3/2)/2 = (2 + 1.5)/2 = 3.5/2 = 1.75. x₂ = (1.75 + 3/1.75)/2 = (1.75 + 1.714)/2 ≈ 3.464/2 = 1.732. x₃ ≈ (1.732 + 3/1.732)/2 ≈ (1.732 + 1.732)/2 = 3.464/2 = 1.732.\n- Step 2: The iteration converges to approximately 1.732, which is √3. This is actually Newton's method applied to x² = 3, which converges quadratically (very fast!).", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A student says: \"Since f(2) = 3 and f(4) = 3, the function has a root between 2 and 4 because there's a sign change.\" Evaluate this statement. (2 steps)", "answer": "- Step 1: This is INCORRECT. A sign change requires f(a) and f(b) to have opposite signs (one positive, one negative). Here, both f(2) = 3 and f(4) = 3 are positive, so there is no sign change.\n- Step 2: Even if there were a sign change (say f(2) = -3 and f(4) = 3), you would also need to state that f is continuous on [2, 4] to guarantee a root. Without continuity, no conclusion can be drawn.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "If f(x) = x² + 1 (domain x ≥ 0) and g(x) = √(x - 1), find (a) f(g(x)) (b) gf(x). What are their domains? (3 steps)", "answer": "- Step 1: f(g(x)) = f(√(x - 1)) = (√(x - 1))² + 1 = (x - 1) + 1 = x. The domain requires g's output to be in f's domain: √(x - 1) ≥ 0 always true when defined, and g needs x - 1 ≥ 0 → x ≥ 1. So domain is x ≥ 1.\n- Step 2: g(f(x)) = g(x² + 1) = √((x² + 1) - 1) = √(x²) = |x|. The domain: f(x) = x² + 1 must be ≥ 1 (always true for real x), so domain is all real x. However, g outputs ≥ 0, so g(f(x)) ≥ 0.\n- Step 3: Notice fg(x) = x (for x ≥ 1), but gf(x) = |x| (not equal to x for negative x).", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Evaluate ∫(cos(x) - sin(x))² dx from 0 to π/2. (3 steps)", "answer": "- Step 1: Expand: (cos x - sin x)² = cos²x - 2sin x cos x + sin²x = 1 - sin(2x)\n- Step 2: Integrate: ∫(1 - sin(2x)) dx = x - (-1/2)cos(2x) + C = x + (1/2)cos(2x) + C\n- Step 3: Evaluate from 0 to π/2: [π/2 + (1/2)cos(π)] - [0 + (1/2)cos(0)] = π/2 + (1/2)(-1) - (1/2)(1) = π/2 - 1/2 - 1/2 = π/2 - 1", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the graphical relationship between y = f(x) and y = f⁻¹(x)? If f(x) passes through (2, 5), what point does f⁻¹(x) pass through? (2 steps)", "answer": "- Step 1: The graph of y = f⁻¹(x) is the reflection of y = f(x) in the line y = x. This means every point (a, b) on f becomes (b, a) on f⁻¹.\n- Step 2: Since f passes through (2, 5), f⁻¹ passes through (5, 2). This swapping of coordinates reflects the algebraic fact that if f(a) = b, then f⁻¹(b) = a.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Use the double angle formula to find all solutions to 2cos(2x) + 1 = 0 in the interval [0, 2π]. (3 steps)", "answer": "- Step 1: Rearrange: 2cos(2x) = -1 → cos(2x) = -1/2\n- Step 2: Solve 2x = arccos(-1/2). Cos is -1/2 at angles 2π/3 and 4π/3 (in [0, 2π]).\n- Step 3: So 2x = 2π/3 or 4π/3 → x = π/3 or 2π/3. But also consider that cos(θ) = cos(-θ), so also 2x = 2π - 2π/3 = 4π/3 and 2π - 4π/3 = 2π/3 (already found). The general solutions in [0, 2π] give x = π/3, 2π/3, 4π/3, 5π/3 (adding π to each because cos(θ) = cos(-θ) gives period π for 2x).\n\nFinal answer: x = π/3, 2π/3, 4π/3, 5π/3 in [0, 2π].", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A function is defined as f(x) = ln(x) for x > 1. What is the range of f? If we define the inverse on this restricted domain, what is f⁻¹(x)? (2 steps)", "answer": "- Step 1: When x > 1, ln(x) > 0 (since ln(1) = 0 and ln is increasing). As x → 1⁺, ln(x) → 0⁺. As x → ∞, ln(x) → ∞. So the range is (0, ∞).\n- Step 2: The inverse function f⁻¹(x) = e^x, but its domain is now (0, ∞) (the range of f), and its range is (1, ∞) (the restricted domain of f). The restriction matters!", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Explain why the iteration xₙ₊₁ = xₙ² (starting from any x₀ ≠ 0, ±1) diverges. What does this tell us about choosing iteration formulas? (2 steps)", "answer": "- Step 1: If |x₀| > 1, squaring makes it even larger: it diverges to infinity. If |x₀| < 1 (but not 0), squaring makes it smaller (closer to 0): it converges to 0. If |x₀| = 1 or 0, it stays fixed.\n- Step 2: This shows iteration formulas can behave very differently depending on the starting value. For convergence, we need the derivative |g'(x)| < 1 near the root. For xₙ₊₁ = xₙ², g'(x) = 2x, and |2x| < 1 only when |x| < 1/2. Otherwise it diverges.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "How do you find the intersection points of y = sin(x) and y = cos(x)? Solve algebraically. (2 steps)", "answer": "- Step 1: Set sin(x) = cos(x) → tan(x) = 1 (when cos(x) ≠ 0). So x = π/4 + nπ, where n is an integer.\n- Step 2: At x = π/4 + nπ, sin and cos have the same value: at π/4, both = √2/2; at 5π/4, both = -√2/2. The intersection points are (π/4 + nπ, √2/2 or -√2/2 depending on n).", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}], "count": 42}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "To find the intersection points of y = x² + 3x - 5 and y = 2x + 1, what equation do you need to solve? Explain the reasoning. (2 steps)", "answer": "- Step 1: Set the two y-expressions equal since at intersection points, both curves have the same y-value: $$x^2 + 3x - 5 = 2x + 1$$\n- Step 2: Rearrange to bring all terms to one side: $$x^2 + 3x - 5 - 2x - 1 = 0$$ $$\\Rightarrow x^2 + x - 6 = 0$$\nThis quadratic can then be solved to find the x-coordinates of intersection.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A student solves x² + x - 6 = 0 and gets x = 3 and x = -2. They substitute x = 3 into y = 2x + 1 and get y = 7. What is the second intersection point's y-coordinate, and how would you verify it's correct? (2 steps)", "answer": "- Step 1: Substitute x = -2 into y = 2x + 1: y = 2(-2) + 1 = -4 + 1 = -3\n- Step 2: Verify by substituting into the other equation: y = (-2)² + 3(-2) - 5 = 4 - 6 - 5 = -7 + (-5?) Wait, 4 - 6 = -2, then -2 - 5 = -7. There's an inconsistency — let me recalculate: 4 - 6 = -2, minus 5 = -7. But we got y = -3 from the linear equation. This indicates an error in the setup. The student should re-check their algebra when setting up the intersection equation.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A function is defined as f(x) = ln(x). What is its domain and range? Explain why these restrictions exist. (2 steps)", "answer": "- Step 1: Domain = x > 0. The natural logarithm is only defined for positive x because ln(x) asks \"what power must e be raised to to give x?\" Since e^y is always positive for any real y, x must be positive.\n- Step 2: Range = all real numbers (y ∈ ℝ). As x approaches 0⁺, ln(x) → -∞, and as x → ∞, ln(x) → ∞. The output can be any real number.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Sketch the graph of y = ln(x). What are its key features? (2 steps)", "answer": "- Step 1: The graph passes through (1, 0) because ln(1) = 0. It has a vertical asymptote at x = 0 (the y-axis), approaching negative infinity as x → 0⁺.\n- Step 2: The graph increases slowly for x > 1, but the rate of increase decreases as x gets larger. It is the reflection of y = e^x in the line y = x.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A student sketches y = ln(x) but draws an exponential curve passing through (0, 1). What have they actually drawn, and why is this a common mistake? (1 step)", "answer": "They have drawn y = e^x instead of y = ln(x). This is a common mistake because the graphs of e^x and ln(x) are related by reflection in y = x, and students sometimes confuse the two. The key difference: e^x passes through (0, 1) and grows rapidly; ln(x) passes through (1, 0) and grows slowly.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Find the inverse function of f(x) = 3x + 2. Show your working and state the domain of the inverse. (3 steps)", "answer": "- Step 1: Replace f(x) with y: y = 3x + 2\n- Step 2: Swap x and y (this is the key step that gives us the inverse): x = 3y + 2\n- Step 3: Solve for y: x - 2 = 3y ⇒ y = (x - 2)/3. So f⁻¹(x) = (x - 2)/3\nThe domain of f⁻¹ equals the range of f. Since f(x) = 3x + 2 is a linear function with domain all real numbers, its range is also all real numbers. Therefore, the domain of f⁻¹ is x ∈ ℝ.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Find the inverse function of f(x) = x² + 1, where x ≥ 0. Show your working and state the domain of f⁻¹. (3 steps)", "answer": "- Step 1: Replace f(x) with y: y = x² + 1\n- Step 2: Swap x and y: x = y² + 1\n- Step 3: Solve for y: x - 1 = y² ⇒ y = √(x - 1). So f⁻¹(x) = √(x - 1)\nThe domain of f⁻¹ equals the range of f. Since x ≥ 0 in the original function, f(x) = x² + 1 has minimum value 1 (when x = 0). So the range is y ≥ 1, meaning the domain of f⁻¹ is x ≥ 1.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Why must we always state the domain when defining a function and its inverse? (1 step)", "answer": "A function is fully defined by its rule AND its domain. Without specifying the domain, the inverse may not be a proper function (it could fail the vertical line test). For example, f(x) = x² doesn't have an inverse as a function unless we restrict its domain (like x ≥ 0), because it fails the horizontal line test.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "If f(x) = 2x + 1 and g(x) = x², find fg(3) and gf(3). What does this illustrate about composite functions? (2 steps)", "answer": "- Step 1: fg(3) means f(g(3)) = f(3²) = f(9) = 2(9) + 1 = 19\n- Step 2: gf(3) means g(f(3)) = g(2(3) + 1) = g(7) = 7² = 49\nThis illustrates that fg(x) ≠ gf(x) in general — the order of composition matters. 19 ≠ 49.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For composite function fg(x) to exist, what condition must be satisfied regarding the range of g and the domain of f? (1 step)", "answer": "The range of g must be a subset of the domain of f (or at least overlap with it). This is because the output of g becomes the input of f. If g produces values outside f's domain, fg is undefined for those inputs.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "State the Intermediate Value Theorem (Theorem of Sign Change). What condition must be met for it to guarantee a root? (1 step)", "answer": "If a function f(x) is continuous on the closed interval [a, b] and f(a) and f(b) have opposite signs (one positive, one negative), then there is at least one root c in the interval (a, b) where f(c) = 0. The continuity condition is essential — without it, the theorem does not hold (think of a graph with a jump or asymptote).", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Why can't the sign change method guarantee a root if the function has a vertical asymptote within the interval, even if f(a) and f(b) have opposite signs? (1 step)", "answer": "If there's a vertical asymptote (or discontinuity) within [a, b], the function is not continuous on the interval. The function could jump from positive to negative without crossing zero — it might go to ±∞ at the asymptote. The Intermediate Value Theorem requires continuity to guarantee the function takes every value between f(a) and f(b), including zero.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Using the sign change method, f(2) = -3 and f(3) = 5. What can you conclude about a root in the interval [2, 3]? (1 step)", "answer": "Since f(2) and f(3) have opposite signs (one negative, one positive) and assuming f(x) is continuous on [2, 3], there must be at least one root c in the interval (2, 3) where f(c) = 0. Note: there could be more than one root if the function crosses the x-axis multiple times within the interval.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "To solve f(x) = 0 using iteration, what rearrangement is required and what is the general iteration formula? (2 steps)", "answer": "- Step 1: Rearrange f(x) = 0 into the form x = g(x). This is called fixed-point iteration. The function g(x) is called the iteration function.\n- Step 2: The iteration formula is x_{n+1} = g(x_n). Starting with an initial guess x_0, we substitute into g to get x_1, then substitute x_1 to get x_2, and repeat until the values converge to a root.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Describe the calculator technique for iteration. How do you efficiently compute successive approximations? (1 step)", "answer": "Store the initial guess x_0 in the calculator's memory (or as Ans). Then type the iteration formula using \"Ans\" in place of x_n, for example: Ans + 0.5 = or similar. Press equals repeatedly — each press uses the previous answer as the new input, generating successive iterations quickly.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What does it mean for an iteration to converge, and why is this important for finding roots? (1 step)", "answer": "An iteration converges when the successive approximations x_0, x_1, x_2, ... get closer and closer to a specific value (the root). If it converges, pressing \"equals\" repeatedly will eventually give values that stop changing (to the display's precision). If it diverges (oscillates or grows without bound), it won't find the root — you'll need a different rearrangement x = g(x).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "How are the graphs of y = f(x) and y = f⁻¹(x) related? What is the geometric interpretation? (1 step)", "answer": "The graph of y = f⁻¹(x) is the reflection of y = f(x) in the line y = x. This is because swapping x and y (to find the inverse) is geometrically equivalent to reflecting across the line y = x. Points (a, b) on f become (b, a) on f⁻¹.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "If f(x) has domain [a, b] and range [c, d], what are the domain and range of f⁻¹(x)? (1 step)", "answer": "The domain of f⁻¹ is [c, d] (the range of f), and the range of f⁻¹ is [a, b] (the domain of f). This互换 happens because the inverse literally swaps the roles of input and output — what was an output becomes an input, and vice versa.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "To solve f(x) = x graphically, what should you look for on a sketch? Explain why this works. (1 step)", "answer": "Look for where the graph of y = f(x) intersects the line y = x. At any intersection point, the x-coordinate satisfies f(x) = x by definition (since y = f(x) and y
