on, and $$-\\cos(x)$$ differentiates to $$\\sin(x)$$, the integral of $$\\sin(x)$$ is $$-\\cos(x) + c$$. Forgetting this negative sign is one of the most common integration errors.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What is $$\\int \\sec^2(x)\\,dx$$, and what derivative is this reversing? (2 steps)", "answer": "- Step 1: $$\\int \\sec^2(x)\\,dx = \\tan(x) + c$$.\n- Step 2: This reverses the standard derivative $$\\frac{d}{dx}[\\tan(x)] = \\sec^2(x)$$. Since $$\\tan(x)$$ differentiates to $$\\sec^2(x)$$, the integral goes the other way. This is the trigonometric counterpart to how $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1}$$ reverses the power rule.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Using the reverse chain rule, what is $$\\int \\cos(3x + 1)\\,dx$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: We know $$\\int \\cos(x)\\,dx = \\sin(x) + c$$. For a composite argument $$(3x + 1)$$, we apply the reverse chain rule: divide by the derivative of the inner function.\n- Step 2: The inner function is $$3x + 1$$, and its derivative is 3. So $$\\int \\cos(3x + 1)\\,dx = \\frac{1}{3}\\sin(3x + 1) + c$$.\n- Step 3: Verify by differentiating: $$\\frac{d}{dx}\\!\\left[\\frac{1}{3}\\sin(3x+1)\\right] = \\frac{1}{3} \\cdot \\cos(3x+1) \\cdot 3 = \\cos(3x+1)$$. ✓ The factor of $$\\frac{1}{3}$$ cancels with the factor of 3 from the chain rule.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "What is $$\\int \\sin(2x)\\,dx$$? (2 steps)", "answer": "- Step 1: Apply the reverse chain rule. The inner function is $$2x$$, with derivative 2. So divide by 2 and integrate: $$\\int \\sin(2x)\\,dx = -\\frac{1}{2}\\cos(2x) + c$$.\n- Step 2: Note the negative sign comes from $$\\int \\sin(u)\\,du = -\\cos(u)$$, and the $$\\frac{1}{2}$$ comes from dividing by the derivative of the inner function. Verify: $$\\frac{d}{dx}\\!\\left[-\\frac{1}{2}\\cos(2x)\\right] = -\\frac{1}{2} \\cdot (-\\sin(2x)) \\cdot 2 = \\sin(2x)$$. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "If $$f(x) = e^x - 2$$ with domain $$x \\in \\mathbb{R}$$, find $$f^{-1}(x)$$ including its domain. This requires combining multiple skills. (4 steps)", "answer": "- Step 1: Let $$y = e^x - 2$$. Swap $$x$$ and $$y$$: $$x = e^y - 2$$.\n- Step 2: Solve for $$y$$: $$e^y = x + 2$$, so $$y = \\ln(x + 2)$$. Therefore $$f^{-1}(x) = \\ln(x + 2)$$.\n- Step 3: Find the range of $$f$$: since $$e^x > 0$$ for all $$x$$, we have $$e^x - 2 > -2$$, so the range of $$f$$ is $$y > -2$$.\n- Step 4: The domain of $$f^{-1}$$ equals the range of $$f$$, so the domain is $$x > -2$$. This is consistent with $$\\ln(x + 2)$$ requiring $$x + 2 > 0$$, i.e., $$x > -2$$, but the reasoning must come from \"domain of inverse = range of original.\"", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "A function $$f$$ has domain $$x > 1$$ and range $$f(x) > 3$$. What are the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of $$f = x > 3$$. The inputs to $$f^{-1}$$ are the outputs of $$f$$, so $$f^{-1}$$ only accepts values that $$f$$ actually produces.\n- Step 2: Range of $$f^{-1}$$ = Domain of $$f = f^{-1}(x) > 1$$. The outputs of $$f^{-1}$$ recover the original inputs to $$f$$, so they must satisfy the original domain restriction.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "To show that $$x^3 - x - 4 = 0$$ has a root between $$x = 1$$ and $$x = 2$$, what calculation and what essential statement do you need? (3 steps)", "answer": "- Step 1: Evaluate $$f(1) = 1 - 1 - 4 = -4$$ (negative) and $$f(2) = 8 - 2 - 4 = 2$$ (positive).\n- Step 2: Since $$f(1) < 0$$ and $$f(2) > 0$$, there is a sign change over the interval.\n- Step 3: State that $$f(x) = x^3 - x - 4$$ is continuous on $$[1, 2]$$ (it's a polynomial, so continuous everywhere). Therefore, by the sign change criterion, there is a root in $$(1, 2)$$. The continuity statement is essential and must not be omitted — without it, the argument is incomplete.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Explain why $$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ does not have an inverse, but $$f(x) = x^2$$ with domain $$x \\geq 0$$ does. (3 steps)", "answer": "- Step 1: For a function to have an inverse, it must be one-to-one (each output comes from exactly one input).\n- Step 2: With domain $$\\mathbb{R}$$, $$f(x) = x^2$$ maps both $$x = 2$$ and $$x = -2$$ to $$f = 4$$. So $$f$$ is not one-to-one, and $$f^{-1}(4)$$ would need to be both 2 and −2, violating the function definition.\n- Step 3: With domain $$x \\geq 0$$, each positive output comes from exactly one non-negative input (e.g., only $$x = 2$$ gives $$f = 4$$). The function is now one-to-one, so the inverse $$f^{-1}(x) = \\sqrt{x}$$ exists. Restricting the domain is the standard technique to make a function invertible.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "Express $$\\cos^2(x)$$ in terms of $$\\cos(2x)$$ using a double angle formula. (2 steps)", "answer": "- Step 1: From $$\\cos(2x) = 2\\cos^2(x) - 1$$, rearrange to solve for $$\\cos^2(x)$$.\n- Step 2: $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$. This is a direct consequence of the double angle formula and is extremely useful for integration — it converts a squared trig function into something integrable.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A student computes $$\\int \\cos(5x)\\,dx$$ and writes $$\\sin(5x) + c$$. What is wrong, and what is the correct answer? (2 steps)", "answer": "- Step 1: They forgot the reverse chain rule factor. The inner function is $$5x$$, with derivative 5, so they must divide by 5.\n- Step 2: The correct answer is $$\\frac{1}{5}\\sin(5x) + c$$. Verify: $$\\frac{d}{dx}\\!\\left[\\frac{1}{5}\\sin(5x)\\right] = \\frac{1}{5} \\cdot \\cos(5x) \\cdot 5 = \\cos(5x)$$. ✓ The $$\\frac{1}{5}$$ is essential — without it, differentiation would give 5 times too much.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "If $$f(0.5) = 0.001$$ and $$f(0.6) = -0.002$$, and $$f$$ is continuous, does a root exist in $$(0.5, 0.6)$$? What if you then discover $$f(0.55) = 0$$? (2 steps)", "answer": "- Step 1: Yes, a root exists in $$(0.5, 0.6)$$ because there is a sign change (positive to negative) and $$f$$ is continuous. The Intermediate Value Theorem guarantees it.\n- Step 2: If $$f(0.55) = 0$$, then 0.55 IS the root. The sign change method still worked — it correctly identified that a root exists in the interval. Finding $$f(0.55) = 0$$ just tells us the exact location rather than just the interval.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "For an iteration $$x_{n+1} = g(x_n)$$ to converge to a root $$\\alpha$$, what condition on $$g'(x)$$ near the root is needed, and what happens if this condition is violated? (2 steps)", "answer": "- Step 1: The iteration converges if $$|g'(\\alpha)| < 1$$. The smaller $$|g'(\\alpha)|$$, the faster the convergence. Intuitively, $$g$$ must be a \"contraction\" — it shrinks distances rather than expanding them.\n- Step 2: If $$|g'(\\alpha)| > 1$$, the iteration diverges — each step takes you further from the root rather than closer. If $$|g'(\\alpha)| = 1$$, the behavior is borderline. This is why different rearrangements of the same equation $$f(x) = 0$$ can lead to convergence or divergence — the choice of rearrangement determines $$g'(\\alpha)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "Given $$f(x) = 2x - 1$$ and $$g(x) = x^2$$, find $$fg(3)$$ and $$gf(3)$$ and explain why they differ. (3 steps)", "answer": "- Step 1: $$fg(3) = f(g(3)) = f(9) = 2(9) - 1 = 17$$. (Square first: $$3^2 = 9$$, then apply $$f$$: $$2(9) - 1 = 17$$.)\n- Step 2: $$gf(3) = g(f(3)) = g(5) = 25$$. (Apply $$f$$ first: $$2(3) - 1 = 5$$, then square: $$5^2 = 25$$.)\n- Step 3: They differ ($$17 \\neq 25$$) because the operations are applied in different orders. Squaring then doubling-and-subtracting gives a different result than doubling-and-subtracting then squaring. This demonstrates that function composition is generally non-commutative.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "If $$f(x) = \\ln(x)$$, describe the full relationship between the graphs of $$f$$ and $$f^{-1}$$, including key points and asymptotes. (3 steps)", "answer": "- Step 1: $$f(x) = \\ln(x)$$ has domain $$x > 0$$, range $$y \\in \\mathbb{R}$$, passes through $$(1, 0)$$, and has a vertical asymptote at $$x = 0$$. Its inverse is $$f^{-1}(x) = e^x$$.\n- Step 2: $$f^{-1}(x) = e^x$$ has domain $$x \\in \\mathbb{R}$$, range $$y > 0$$, passes through $$(0, 1)$$, and has a horizontal asymptote at $$y = 0$$. The domain/range swap is evident: what was the domain becomes the range and vice versa.\n- Step 3: The two graphs are reflections in $$y = x$$. The point $$(1, 0)$$ on $$\\ln(x)$$ reflects to $$(0, 1)$$ on $$e^x$$. The vertical asymptote $$x = 0$$ reflects to the horizontal asymptote $$y = 0$$. The slow growth of $$\\ln(x)$$ reflects to the rapid growth of $$e^x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "To find where $$f(x) = 2x - 3$$ intersects the line $$y = x$$, you solve $$f(x) = x$$. What is the solution, and what does this mean graphically for the function and its inverse? (2 steps)", "answer": "- Step 1: Solve $$2x - 3 = x$$, giving $$x = 3$$. The intersection point is $$(3, 3)$$, which lies on the line $$y = x$$.\n- Step 2: Graphically, this is where $$y = 2x - 3$$ crosses $$y = x$$. Points where a function meets $$y = x$$ are significant because they are potential meeting points between $$f$$ and $$f^{-1}$$ — since $$f^{-1}$$ is the reflection of $$f$$ in $$y = x$$, any intersection between them must occur on the line of reflection itself.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Express $$\\sin^2(x)$$ in terms of $$\\cos(2x)$$. Which double angle form do you start from? (2 steps)", "answer": "- Step 1: Start from $$\\cos(2x) = 1 - 2\\sin^2(x)$$. This is the form that contains $$\\sin^2(x)$$.\n- Step 2: Rearrange: $$2\\sin^2(x) = 1 - \\cos(2x)$$, so $$\\sin^2(x) = \\frac{1 - \\cos(2x)}{2}$$. This is the companion to $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$ — note the sign difference in the numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "A student solving simultaneous equations from two curves gets the equation $$x^2 - 5x + 6 = 0$$ and writes the solutions as $$x = 2, 3$$. They then substitute back into only the first curve to find y-values. Is this correct procedure? (2 steps)", "answer": "- Step 1: Yes, this is correct. The x-values come from solving the combined equation (which already enforces $$y_1 = y_2$$), so substituting back into either curve gives the same y-value at each intersection point.\n- Step 2: You only need to substitute into one of the original equations — not both. Since the x-values were found by enforcing $$y_1 = y_2$$, both curves give the same y at each intersection. Substituting into the simpler curve is the efficient choice.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "$$\\int \\sec^2(4x)\\,dx = ?$$ (2 steps)", "answer": "- Step 1: We know $$\\int \\sec^2(x)\\,dx = \\tan(x) + c$$. Apply the reverse chain rule: the inner function is $$4x$$, with derivative 4, so divide by 4.\n- Step 2: $$\\int \\sec^2(4x)\\,dx = \\frac{1}{4}\\tan(4x) + c$$. Verify: $$\\frac{d}{dx}\\!\\left[\\frac{1}{4}\\tan(4x)\\right] = \\frac{1}{4} \\cdot \\sec^2(4x) \\cdot 4 = \\sec^2(4x)$$. ✓", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "If you need to express $$\\cos(2A)$$ entirely in terms of $$\\cos(A)$$ (no $$\\sin$$ terms), which form do you use and why? (2 steps)", "answer": "- Step 1: Use $$\\cos(2A) = 2\\cos^2(A) - 1$$. This form contains only $$\\cos^2(A)$$ and a constant — no $$\\sin$$ terms at all.\n- Step 2: The other two forms are $$\\cos^2(A) - \\sin^2(A)$$ (contains $$\\sin^2$$) and $$1 - 2\\sin^2(A)$$ (contains $$\\sin^2$$). Only the $$2\\cos^2(A) - 1$$ form eliminates $$\\sin$$ entirely. Choose the form that matches the variables already present in your problem.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "A function $$f$$ has domain $$-2 \\leq x \\leq 5$$ and range $$1 \\leq f(x) \\leq 9$$. What are the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of $$f = 1 \\leq x \\leq 9$$. The inverse accepts as inputs exactly the values that $$f$$ produces as outputs.\n- Step 2: Range of $$f^{-1}$$ = Domain of $$f = -2 \\leq f^{-1}(x) \\leq 5$$. The inverse produces as outputs exactly the values that $$f$$ accepts as inputs. The domain and range simply swap.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}], "count": 55}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When two curves are given as y = f(x) and y = g(x), what equation must hold at any intersection point, and why is this the starting point for finding intersections? (3 steps)", "answer": "- Step 1: At an intersection point, both curves pass through the same point $$(x, y)$$. This means the y-value from the first curve equals the y-value from the second curve, so $$f(x) = g(x)$$.\n- Step 2: This equation gives us a single equation in one unknown (x), which we can solve. Setting the y-values equal transforms a problem about two curves into a solvable algebraic equation.\n- Step 3: Once we find the x-values satisfying $$f(x) = g(x)$$, we substitute back into either original equation to find the corresponding y-coordinates, giving complete intersection points.\n\nIntersection means \"same point, same coordinates\" — so the y-values must match.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "After setting $$y_1 = y_2$$ and rearranging to get a polynomial equation equal to zero, what does each real root of this polynomial represent in terms of the original graphs?", "answer": "Each real root of the rearranged polynomial represents the x-coordinate of an intersection point between the two curves. If the polynomial has n real roots, the curves intersect at n distinct x-coordinates. Each root is a location where both curves produce the same y-value, meaning they cross or touch at that point. Non-real roots have no geometric meaning for intersections on the real coordinate plane.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "If you set $$y_1 = y_2$$ and rearrange to find a polynomial = 0, but the polynomial has no real roots, what does this tell you about the two curves?", "answer": "This means the two curves never intersect — there is no point where both curves share the same $$(x, y)$$ coordinates. Geometrically, one curve lies entirely above or entirely below the other for all x-values. For example, $$y = x^2 + 1$$ and $$y = x^2 + 5$$ never intersect because $$x^2 + 1 = x^2 + 5$$ simplifies to $$1 = 5$$, which has no solution. The vertical gap between them is always 4 units.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "When solving simultaneous equations from intersecting graphs under exam conditions, a common error is miscopying coefficients (e.g., writing $$2x^2$$ instead of $$x^2$$). Why is this particularly dangerous, and what's a quick sanity check? (2 steps)", "answer": "- Step 1: Miscopying a coefficient changes the polynomial entirely, so you solve a completely different equation and get wrong intersection points. The error propagates through all subsequent work — there's no partial credit for a correct method applied to the wrong equation.\n- Step 2: A quick sanity check: after finding intersection points, substitute them back into **both** original equations. The y-values should match. If they don't, you've made an error in setting up or solving.\n\nAlways double-check your transcription before solving — 10 seconds of verification can save an entire question.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "Two curves $$y = x^2$$ and $$y = x + 2$$ intersect. Set up the equation and find the x-coordinates of the intersection points. (3 steps)", "answer": "- Step 1: Set the y-values equal: $$x^2 = x + 2$$, then rearrange to standard form: $$x^2 - x - 2 = 0$$.\n- Step 2: Factorise: $$(x - 2)(x + 1) = 0$$, giving $$x = 2$$ or $$x = -1$$.\n- Step 3: These are the x-coordinates of the two intersection points. Substituting back: when $$x = 2$$, $$y = 4$$; when $$x = -1$$, $$y = 1$$. The curves intersect at $$(2, 4)$$ and $$(-1, 1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What is the domain of $$f(x) = \\ln(x)$$, and what goes wrong mathematically if we attempt to evaluate ln(x) for $$x \\leq 0$$? (3 steps)", "answer": "- Step 1: The domain of $$f(x) = \\ln(x)$$ is $$x > 0$$. Only positive real numbers can be input.\n- Step 2: The reason: $$\\ln(x)$$ is defined as the number y such that $$e^y = x$$. Since $$e^y > 0$$ for all real y (the exponential function never produces zero or negative values), there is no y for which $$e^y = 0$$ or $$e^y < 0$$.\n- Step 3: Therefore, $$\\ln(0)$$ is undefined (no power of e gives zero), and $$\\ln(\\text{negative})$$ is undefined (no real power of e gives a negative number).\n\nThe domain restriction is a direct consequence of the range of $$e^x$$ being strictly positive.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "What is the range of $$f(x) = \\ln(x)$$, and how does the graph's behaviour at its extremes explain this? (4 steps)", "answer": "- Step 1: The range of $$f(x) = \\ln(x)$$ is all real numbers: $$y \\in \\mathbb{R}$$, or $$(-\\infty, +\\infty)$$.\n- Step 2: As $$x \\to 0^+$$ (approaching zero from the right), $$\\ln(x) \\to -\\infty$$. The graph plunges downward along the vertical asymptote.\n- Step 3: As $$x \\to +\\infty$$, $$\\ln(x) \\to +\\infty$$. The graph rises without bound, though extremely slowly — it never levels off at a finite ceiling.\n- Step 4: Since the output can be arbitrarily negative (near $$x = 0$$) and arbitrarily positive (for large x), and the function is continuous throughout its domain, every real number is achieved as an output somewhere.\n\nThe range being all of $$\\mathbb{R}$$ contrasts with functions like $$e^x$$ whose range is only positive reals.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "The graph of $$y = \\ln(x)$$ passes through one particularly important point on the x-axis. What are the coordinates of this point, and why does it occur there?", "answer": "The graph passes through $$(1, 0)$$, because $$\\ln(1) = 0$$. This follows directly from the definition: $$\\ln(1)$$ asks \"what power of e gives 1?\" The answer is 0, since $$e^0 = 1$$. This is the x-intercept of the natural logarithm, and it's the mirror image of the fact that $$e^x$$ passes through $$(0, 1)$$ — both are expressions of the same inverse relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A student sketches the natural logarithm but accidentally draws the exponential function instead. What are two key visual differences between $$y = \\ln(x)$$ and $$y = e^x$$ that would immediately reveal this mistake? (2 steps)", "answer": "- Step 1: **Orientation relative to the axes**: $$y = e^x$$ is defined for all x (domain is all reals) and has a horizontal asymptote at $$y = 0$$ as $$x \\to -\\infty$$. Meanwhile, $$y = \\ln(x)$$ is only defined for $$x > 0$$ and has a vertical asymptote at $$x = 0$$. The ln curve exists only to the right of the y-axis.\n- Step 2: **Growth behaviour**: $$y = e^x$$ rises steeply as x increases (exponential growth), while $$y = \\ln(x)$$ rises very slowly (logarithmic growth, flattening out). If your curve shoots upward dramatically, it's $$e^x$$; if it gradually levels off while still rising, it's $$\\ln(x)$$.\n\nThe two graphs are reflections of each other in the line $$y = x$$ — they are inverse functions.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Why does $$y = \\ln(x)$$ have a vertical asymptote at $$x = 0$$ rather than a horizontal asymptote? (3 steps)", "answer": "- Step 1: A vertical asymptote at $$x = 0$$ means that as x approaches 0 from the right, the function value heads toward $$-\\infty$$. This happens because $$\\ln(x) \\to -\\infty$$ as $$x \\to 0^+$$.\n- Step 2: The reason: as x gets very small (close to 0), we need an increasingly negative power of e to produce that small number. For example, $$e^{-1} \\approx 0.37$$, $$e^{-10} \\approx 0.0000454$$, $$e^{-100} \\approx 3.7 \\times 10^{-44}$$. So $$\\ln(0.0000454) = -10$$, and $$\\ln(3.7 \\times 10^{-44}) = -100$$. The smaller x gets, the more negative ln(x) becomes.\n- Step 3: There is no horizontal asymptote because $$\\ln(x)$$ continues increasing (without bound) as x grows — it never levels off at a finite value. It just increases very slowly.\n\nThe asymptote is vertical because the \"problem\" is in the input ($$x = 0$$ is forbidden), not the output.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A student claims that $$\\ln(0) = 1$$ and $$\\ln(1) = 0$$. Which statement is correct, which is wrong, and why? (2 steps)", "answer": "- Step 1: $$\\ln(1) = 0$$ is **correct**. This asks: \"what power of e equals 1?\" Since $$e^0 = 1$$, the answer is 0.\n- Step 2: $$\\ln(0) = 1$$ is **wrong**. $$\\ln(0)$$ is undefined — there is no real number y such that $$e^y = 0$$, because the exponential function is always positive. The value $$\\ln(0)$$ does not exist; it's not 1, not 0, not any number.\n\nCommon confusion: mixing up $$\\ln(1) = 0$$ with $$e^0 = 1$$. The inverse relationship means these are \"mirror\" facts — they say the same thing from opposite directions.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "What are the four steps to find $$f^{-1}(x)$$ algebraically? (4 steps)", "answer": "- Step 1: **Replace f(x) with y**: Write $$y = f(x)$$. This gives a simple equation relating the input and output.\n- Step 2: **Swap x and y**: Replace every y with x and every x with y, giving $$x = f(y)$$. This reverses the roles of input and output, which is exactly what an inverse does.\n- Step 3: **Solve for y**: Rearrange the equation to make y the subject. This gives $$y = f^{-1}(x)$$, the inverse function expressed in standard notation.\n- Step 4: **State the domain of $$f^{-1}(x)$$**: The domain of the inverse equals the range of the original function f. This must always be stated — a function is incomplete without its domain.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When finding an inverse function, we swap x and y rather than just \"solving for x.\" Why is the swap necessary conceptually, and what does it accomplish? (2 steps)", "answer": "- Step 1: The swap of x and y reflects the fact that the inverse function reverses the roles of input and output. In f, you put in x and get out y. In $$f^{-1}$$, you put in y (now called x) and get out x (now called y). The swap encodes this role reversal algebraically.\n- Step 2: If you simply solved $$y = f(x)$$ for x without swapping, you'd get $$x = f^{-1}(y)$$, which is correct but uses y as the input variable. By convention, we want the inverse expressed as a function of x (i.e., $$y = f^{-1}(x)$$), so we swap to get the standard form.\n\nThe swap is not a \"trick\" — it's the algebraic expression of what \"inverse\" means: undo the mapping by reversing inputs and outputs.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "When stating an inverse function $$f^{-1}(x)$$, the domain must always be given. What is the domain of $$f^{-1}(x)$$ equal to, and why is this relationship logically necessary? (2 steps)", "answer": "- Step 1: The domain of $$f^{-1}(x)$$ equals the range of $$f(x)$$. Whatever values f can output, those are the valid inputs to $$f^{-1}$$ (since $$f^{-1}$$ reverses f).\n- Step 2: This is logically necessary because $$f^{-1}$$ is defined by \"undoing\" f. If f maps a to b (so b is in the range of f), then $$f^{-1}$$ maps b back to a — so b must be a valid input to $$f^{-1}$$. But if some value c is NOT in the range of f, then no input to f produces c, so $$f^{-1}(c)$$ has no meaning — there's nothing to \"undo.\"\n\nWithout stating the domain, the function is incomplete — you don't know what inputs are valid.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A function is completely defined by two things. What are they, and why is neither sufficient alone? (2 steps)", "answer": "- Step 1: A function is defined by: (1) the **rule** (equation or formula mapping inputs to outputs), and (2) the **domain** (the set of valid inputs).\n- Step 2: Neither alone is sufficient because the same rule with different domains gives different functions with different properties. For example, $$f(x) = x^2$$ with domain \"all reals\" is not invertible (fails the horizontal line test — both 2 and −2 map to 4), while $$f(x) = x^2$$ with domain $$x \\geq 0$$ IS invertible. The domain determines what counts as a valid input and affects critical properties like invertibility.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "If $$f(x) = 2x + 3$$ with domain $$x \\geq 1$$, find $$f^{-1}(x)$$ including its domain. (3 steps)", "answer": "- Step 1: Find the inverse rule. Write $$y = 2x + 3$$, swap to get $$x = 2y + 3$$, solve: $$2y = x - 3$$, so $$y = \\frac{x - 3}{2}$$. Therefore $$f^{-1}(x) = \\frac{x - 3}{2}$$.\n- Step 2: Find the range of f to determine the domain of $$f^{-1}$$. Since $$x \\geq 1$$, we have $$f(x) = 2x + 3 \\geq 2(1) + 3 = 5$$. So the range of f is $$y \\geq 5$$.\n- Step 3: Therefore, $$f^{-1}(x) = \\frac{x - 3}{2}$$ with domain $$x \\geq 5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What does the notation fg(x) mean, and in what order do you apply the functions? (2 steps)", "answer": "- Step 1: $$fg(x)$$ means $$f(g(x))$$ — you apply g first to the input x, then apply f to the result.\n- Step 2: The order is \"work from inside out\": the innermost function (g) acts first on x, and the outermost function (f) acts last. Think of it like nested brackets — you evaluate what's in the innermost brackets first.\n\nA common mistake is reading left-to-right and applying f first. The notation is deceptive: fg looks like \"f then g,\" but it actually means \"g then f.\"", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Why is fg(x) generally not equal to gf(x)? Give a conceptual reason, then illustrate with $$f(x) = x^2$$ and $$g(x) = x + 1$$. (2 steps)", "answer": "- Step 1: **Conceptual reason**: $$fg(x) = f(g(x))$$ means \"apply g, then f,\" while $$gf(x) = g(f(x))$$ means \"apply f, then g.\" These are different operations in a different order. Function composition is not commutative, just as \"put on socks then shoes\" gives a different result from \"put on shoes then socks.\"\n- Step 2: **Counterexample**: With $$f(x) = x^2$$ and $$g(x) = x + 1$$:\n+ $$fg(x) = f(g(x)) = f(x+1) = (x+1)^2 = x^2 + 2x + 1$$\n+ $$gf(x) = g(f(x)) = g(x^2) = x^2 + 1$$\nThese are clearly different: $$x^2 + 2x + 1 \\neq x^2 + 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "For $$fg(x) = f(g(x))$$ to be defined, what condition must the output of g satisfy, and why?", "answer": "For $$fg(x) = f(g(x))$$ to be defined, the output of $$g(x)$$ must lie within the domain of f. The reason: $$g(x)$$ produces a value that becomes the input to f. If $$g(x)$$ produces a value that f cannot accept, the composition breaks down at that point. For example, if $$f(x) = \\sqrt{x}$$ (domain $$x \\geq 0$$) and $$g(x) = x - 5$$, then $$fg(x) = \\sqrt{x - 5}$$ is only defined when $$g(x) = x - 5 \\geq 0$$, i.e., $$x \\geq 5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "If $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$, and $$g(x) = x - 3$$, what is the largest domain on which fg(x) is defined? (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = f(x - 3) = \\sqrt{x - 3}$$. For this to be defined, the input to f must be in f's domain, meaning $$g(x) = x - 3 \\geq 0$$.\n- Step 2: Solving $$x - 3 \\geq 0$$ gives $$x \\geq 3$$. So the largest domain for fg(x) is $$x \\geq 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "State the complete condition that guarantees a root of $$f(x) = 0$$ exists in the interval $$(a, b)$$. (2 steps)", "answer": "- Step 1: If $$f(a)$$ and $$f(b)$$ have opposite signs (i.e., $$f(a) \\cdot f(b) < 0$$), AND the function $$f(x)$$ is continuous on the interval $$[a, b]$$, then there exists at least one root in the interval $$(a, b)$$.\n- Step 2: The continuity condition is essential and must always be explicitly stated. Without it, a sign change could be caused by a discontinuity (like a vertical asymptote) rather than a root crossing the x-axis.\n\nBoth conditions — sign change AND continuity — must be mentioned for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "Why is the continuity condition essential for the sign change method? What can happen if the function is not continuous? (3 steps)", "answer": "- Step 1: A continuous function cannot \"jump\" from positive to negative without crossing zero somewhere in between — this is guaranteed by the Intermediate Value Theorem. The sign change, combined with continuity, forces the function to pass through zero.\n- Step 2: A discontinuous function can jump from positive to negative without ever equalling zero. For example, $$f(x) = \\frac{1}{x}$$ has $$f(-1) = -1$$ and $$f(1) = 1$$ (opposite signs), but there is no root — the function has a vertical asymptote at $$x = 0$$ instead of a zero crossing.\n- Step 3: Without continuity, a sign change only tells you something \"interesting\" happens in the interval, but it might be a discontinuity rather than a root.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A continuous function has a sign change between $$x = 1$$ and $$x = 4$$. Does this guarantee exactly one root in $$(1, 4)$$? Why or why not?", "answer": "No, it does not guarantee exactly one root. The sign change (combined with continuity) guarantees **at least one** root, but there could be three, five, or any odd number of roots in the interval. The function could cross the x-axis multiple times, as long as it starts on one side and ends on the other. For example, a function could be positive at $$x = 1$$, cross to negative, cross back to positive, then cross to negative again by $$x = 4$$ — giving three roots. The sign change only constrains the net crossing, not the total number of crossings.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Give a specific example of a function that changes sign on an interval but has no root there, and explain why. (3 steps)", "answer": "- Step 1: Consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$. We have $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$, so there is a sign change.\n- Step 2: However, $$f(x) = \\frac{1}{x}$$ has no root anywhere — it is never equal to zero. The sign change is caused by the vertical asymptote at $$x = 0$$, where the function jumps from $$-\\infty$$ to $$+\\infty$$ without passing through zero.\n- Step 3: The function is not continuous on $$[-1, 1]$$ (it's undefined at $$x = 0$$), so the sign change method's guarantee does not apply.\n\nThis is exactly why the continuity condition must always be stated in your answer.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "How do you set up an iterative formula $$x_{n+1} = g(x_n)$$ from the equation $$f(x) = 0$$? (2 steps)", "answer": "- Step 1: Start with the equation $$f(x) = 0$$ and rearrange it to isolate x on one side. This gives you an equation of the form $$x = g(x)$$, where g is some expression involving x.\n- Step 2: The iterative formula is then $$x_{n+1} = g(x_n)$$. You start with an initial value $$x_0$$ (often given or estimated from a sign change test), substitute it into g to get $$x_1$$, then substitute $$x_1$$ into g to get $$x_2$$, and so on.\n\nThe key idea: any root of $$f(x) = 0$$ is also a **fixed point** of $$x = g(x)$$ (a value where $$g(x) = x$$). Iteration attempts to find this fixed point by repeatedly applying g.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "In numerical iteration, what does \"convergence\" mean, and how do you recognise it on your calculator? (2 steps)", "answer": "- Step 1: Convergence means that the sequence of values $$x_0, x_1, x_2, \\ldots$$ gets closer and closer to a fixed value (the root). Mathematically, the difference $$|x_{n+1} - x_n|$$ becomes smaller with each step.\n- Step 2: On your calculator, you recognise convergence when pressing = repeatedly produces values that stabilise — the digits stop changing (or change only in very late decimal places). When the displayed value doesn't change to the precision shown, the iteration has converged to that level of accuracy.\n\nIf the values oscillate wildly or grow without bound, the iteration is **diverging** and will not find the root.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Why might an iteration $$x_{n+1} = g(x_n)$$ fail to converge to a root? Give two reasons. (2 steps)", "answer": "- Step 1: **The rearrangement may not converge**: Different rearrangements of $$f(x) = 0$$ into $$x = g(x)$$ lead to different iterative formulas. Some rearrangements converge (the iteration homes in on the root), while others diverge (the iteration moves away from the root). Convergence depends on the magnitude of $$|g'(x)|$$ near the root — if it's less than 1, convergence is likely; if greater than 1, divergence is likely.\n- Step 2: **The starting value may be too far from the root**: Even for a convergent rearrangement, if $$x_0$$ is too far from the actual root, the iteration may diverge or converge to a different root. Each root has a \"basin of attraction\" — starting values within it converge to that root; starting values outside it may not.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Starting with $$x_0 = 2$$ and the formula $$x_{n+1} = \\frac{6 + x_n}{3}$$, find $$x_1$$ and $$x_2$$. What value is the sequence approaching? (3 steps)", "answer": "- Step 1: $$x_1 = \\frac{6 + x_0}{3} = \\frac{6 + 2}{3} = \\frac{8}{3} \\approx 2.667$$\n- Step 2: $$x_2 = \\frac{6 + x_1}{3} = \\frac{6 + 8/3}{3} = \\frac{26/3}{3} = \\frac{26}{9} \\approx 2.889$$\n- Step 3: The sequence is approaching 3. We can verify: if $$x = \\frac{6 + x}{3}$$, then $$3x = 6 + x$$, so $$2x = 6$$, giving $$x = 3$$. The iteration converges to the fixed point $$x = 3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is the graphical relationship between $$y = f(x)$$ and $$y = f^{-1}(x)$$, and why does this relationship hold? (2 steps)", "answer": "- Step 1: The graph of $$y = f^{-1}(x)$$ is the reflection of the graph of $$y = f(x)$$ in the line $$y = x$$.\n- Step 2: This holds because the inverse function swaps inputs and outputs. If f maps a to b (so point $$(a, b)$$ is on the graph of f), then $$f^{-1}$$ maps b to a (so point $$(b, a)$$ is on the graph of $$f^{-1}$$). The point $$(b, a)$$ is the reflection of $$(a, b)$$ in the line $$y = x$$, since reflecting across $$y = x$$ swaps the coordinates.\n\nEvery point on f has a mirror point on $$f^{-1}$$, and the mirror is the line $$y = x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "How does the domain and range of $$f^{-1}$$ relate to the domain and range of f, and how can you see this on the graph? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of f, and Range of $$f^{-1}$$ = Domain of f. The inputs and outputs swap roles.\n- Step 2: Graphically, since $$f^{-1}$$ is the reflection of f in $$y = x$$, the horizontal extent of f (its domain) becomes the vertical extent of $$f^{-1}$$ (its range), and vice versa. For example, if f has domain $$x \\geq 0$$ and range $$y \\geq 3$$, then $$f^{-1}$$ has domain $$x \\geq 3$$ and range $$y \\geq 0$$. The reflection swaps \"how far left-right\" with \"how far up-down.\"", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "To solve the equation $$f(x) = x$$ graphically, what do you look for on the graph of $$y = f(x)$$, and why? (2 steps)", "answer": "- Step 1: You look for the points where the graph of $$y = f(x)$$ intersects the line $$y = x$$.\n- Step 2: At any intersection point of $$y = f(x)$$ and $$y = x$$, the y-coordinate equals $$f(x)$$ (from the curve) and also equals x (from the line). So at that point, $$f(x) = x$$. These are called **fixed points** of f — values where the function outputs its own input.\n\nThis is directly relevant to iteration: fixed points of $$g(x)$$ are exactly the roots found by the iterative process $$x_{n+1} = g(x_n)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "If $$f(x) = x^2 + 1$$ for $$x \\geq 0$$, find $$f^{-1}(x)$$ and state its domain. How would the graphs of f and $$f^{-1}$$ relate? (3 steps)", "answer": "- Step 1: Find the inverse. Write $$y = x^2 + 1$$, swap: $$x = y^2 + 1$$, solve: $$y^2 = x - 1$$, so $$y = \\sqrt{x - 1}$$ (taking the positive root since the domain of f requires $$y \\geq 0$$). So $$f^{-1}(x) = \\sqrt{x - 1}$$.\n- Step 2: Find the domain of $$f^{-1}$$. The range of f: since $$x \\geq 0$$, $$f(x) = x^2 + 1 \\geq 0 + 1 = 1$$. So range of f is $$y \\geq 1$$, meaning domain of $$f^{-1}$$ is $$x \\geq 1$$.\n- Step 3: The graph of $$y = \\sqrt{x - 1}$$ is the reflection of $$y = x^2 + 1$$ (for $$x \\geq 0$$) in the line $$y = x$$. The curve f starts at $$(0, 1)$$ and rises; $$f^{-1}$$ starts at $$(1, 0)$$ and rises slowly — mirror images across $$y = x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "State the double angle formula for $$\\sin(2A)$$. Why must there be a coefficient of 2, and what would go wrong conceptually if the formula were just $$\\sin(A)\\cos(A)$$? (2 steps)", "answer": "- Step 1: The formula is $$\\sin(2A) = 2\\sin(A)\\cos(A)$$. The coefficient 2 is essential and cannot be dropped.\n- Step 2: To see why, test with $$A = 45°$$: $$\\sin(90°) = 1$$, and $$2\\sin(45°)\\cos(45°) = 2 \\cdot \\frac{\\sqrt{2}}{2} \\cdot \\frac{\\sqrt{2}}{2} = 2 \\cdot \\frac{2}{4} = 1$$. ✓ But without the 2: $$\\sin(45°)\\cos(45°) = \\frac{2}{4} = 0.5 \\neq 1$$. The product $$\\sin(A)\\cos(A)$$ only gives half the correct value.\n\nThe 2 comes from the angle addition formula: $$\\sin(A + B) = \\sin A \\cos B + \\cos A \\sin B$$. When $$B = A$$, both terms are identical, so they add to give $$2\\sin A \\cos A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "State all three forms of the $$\\cos(2A)$$ identity. How do you decide which form to use? (3 steps)", "answer": "- Step 1: The three forms are:\n+ $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$\n+ $$\\cos(2A) = 2\\cos^2(A) - 1$$\n+ $$\\cos(2A) = 1 - 2\\sin^2(A)$$\n- Step 2: The second form ($$2\\cos^2(A) - 1$$) is used when you know $$\\cos(A)$$ and want $$\\cos(2A)$$, or when you want to express $$\\cos^2(A)$$ in terms of $$\\cos(2A)$$.\n- Step 3: The third form ($$1 - 2\\sin^2(A)$$) is used when you know $$\\sin(A)$$ and want $$\\cos(2A)$$, or when you want to express $$\\sin^2(A)$$ in terms of $$\\cos(2A)$$. The first form is the \"raw\" version from the angle addition formula; the other two come from substituting $$\\cos^2(A) = 1 - \\sin^2(A)$$ or $$\\sin^2(A) = 1 - \\cos^2(A)$$.\n\nRule of thumb: match the form to what you already know — if the problem gives you $$\\sin(A)$$, use the form with $$\\sin^2(A)$$; if it gives you $$\\cos(A)$$, use the form with $$\\cos^2(A)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "State the double angle formula for $$\\tan(2A)$$. Where does the denominator $$1 - \\tan^2(A)$$ come from conceptually? (3 steps)", "answer": "- Step 1: The formula is $$\\tan(2A) = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$.\n- Step 2: The denominator comes from the angle addition formula for tangent. Starting with $$\\tan(A + B) = \\frac{\\tan A + \\tan B}{1 - \\tan A \\tan B}$$ and setting $$B = A$$: $$\\tan(2A) = \\frac{\\tan A + \\tan A}{1 - \\tan A \\cdot \\tan A} = \\frac{2\\tan A}{1 - \\tan^2 A}$$.\n- Step 3: Note: this formula is undefined when $$\\tan^2(A) = 1$$, i.e., when $$A = 45°$$. This corresponds to $$\\tan(90°)$$ being undefined — which is consistent, since the formula correctly breaks down where it should.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Derive an expression for $$\\sin(3x)$$ in terms of $$\\sin(x)$$ only, using double angle formulas. (4 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x)$$ and apply the angle addition formula: $$\\sin(2x + x) = \\sin(2x)\\cos(x) + \\cos(2x)\\sin(x)$$.\n- Step 2: Substitute the double angle formulas: $$\\sin(2x) = 2\\sin(x)\\cos(x)$$ and $$\\cos(2x) = \\cos^2(x) - \\sin^2(x)$$:\n$$\\sin(3x) = 2\\sin(x)\\cos(x)\\cos(x) + (\\cos^2(x) - \\sin^2(x))\\sin(x)$$\n$$= 2\\sin(x)\\cos^2(x) + \\sin(x)\\cos^2(x) - \\sin^3(x)$$\n- Step 3: Combine like terms: $$= 3\\sin(x)\\cos^2(x) - \\sin^3(x)$$.\n- Step 4: Replace $$\\cos^2(x)$$ with $$1 - \\sin^2(x)$$ to express everything in terms of sin:\n$$= 3\\sin(x)(1 - \\sin^2(x)) - \\sin^3(x) = 3\\sin(x) - 3\\sin^3(x) - \\sin^3(x) = 3\\sin(x) - 4\\sin^3(x)$$\n\nFinal result: $$\\sin(3x) = 3\\sin(x) - 4\\sin^3(x)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "If a problem involves $$\\cos(2A)$$ and you know $$\\cos(A) = \\frac{3}{5}$$ (but don't know $$\\sin(A)$$), which form of the $$\\cos(2A)$$ identity should you use and why? (2 steps)", "answer": "- Step 1: Use the form $$\\cos(2A) = 2\\cos^2(A) - 1$$, since you already know $$\\cos(A) = \\frac{3}{5}$$ and this form only involves $$\\cos(A)$$.\n- Step 2: Substituting: $$\\cos(2A) = 2\\left(\\frac{3}{5}\\right)^2 - 1 = 2 \\cdot \\frac{9}{25} - 1 = \\frac{18}{25} - \\frac{25}{25} = -\\frac{7}{25}$$. Using the form with $$\\sin^2(A)$$ would require first finding $$\\sin(A) = \\frac{4}{5}$$ (extra work with potential for sign errors), while the $$\\cos^2$$ form goes directly from what you already know.\n\nAlways choose the form that uses the information you already have, avoiding unnecessary extra calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A student writes $$\\cos(2A) = \\cos^2(A) + \\sin^2(A)$$. What's wrong with this, and what should the correct identity be? (2 steps)", "answer": "- Step 1: The student has written $$\\cos^2(A) + \\sin^2(A)$$, which by the Pythagorean identity equals 1, not $$\\cos(2A)$$. So they're claiming $$\\cos(2A) = 1$$ for all A, which is clearly false (e.g., $$\\cos(60°) = 0.5 \\neq 1$$).\n- Step 2: The correct identity is $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$. The sign between the terms is **minus**, not plus. The plus sign gives the Pythagorean identity ($$\\cos^2 A + \\sin^2 A = 1$$), which is a completely different result.\n\nThis is a common sign error — the minus sign in the double angle formula is crucial and must be memorised correctly.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "If $$\\sin(A) = \\frac{3}{5}$$ and A is acute, use the double angle formula to find $$\\sin(2A)$$. (2 steps)", "answer": "- Step 1: We need $$\\sin(2A) = 2\\sin(A)\\cos(A)$$. We know $$\\sin(A) = \\frac{3}{5}$$. Since A is acute, $$\\cos(A) = \\sqrt{1 - \\sin^2(A)} = \\sqrt{1 - 9/25} = \\sqrt{16/25} = \\frac{4}{5}$$.\n- Step 2: Therefore $$\\sin(2A) = 2 \\cdot \\frac{3}{5} \\cdot \\frac{4}{5} = \\frac{24}{25}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "State the three basic trigonometric integrals: $$\\int\\cos(x)\\,dx$$, $$\\int\\sin(x)\\,dx$$, and $$\\int\\sec^2(x)\\,dx$$. Why does $$\\int\\sin(x)\\,dx$$ have a negative sign? (2 steps)", "answer": "- Step 1: The three basic integrals are:\n+ $$\\int \\cos(x)\\, dx = \\sin(x) + c$$\n+ $$\\int \\sin(x)\\, dx = -\\cos(x) + c$$\n+ $$\\int \\sec^2(x)\\, dx = \\tan(x) + c$$\n- Step 2: The negative sign in $$\\int \\sin(x)\\, dx = -\\cos(x) + c$$ arises because differentiation of $$\\cos(x)$$ gives $$-\\sin(x)$$, not $$\\sin(x)$$. So to \"undo\" this and get $$\\sin(x)$$ as the integrand, we need $$-\\cos(x)$$, since $$\\frac{d}{dx}[-\\cos(x)] = -(-\\sin(x)) = \\sin(x)$$. ✓\n\nAlways verify integrals by differentiating the answer — if you get back the integrand, you're correct.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Using the reverse chain rule, what is $$\\int\\cos(3x)\\,dx$$? Where does the factor of $$\\frac{1}{3}$$ come from? (2 steps)", "answer": "- Step 1: $$\\int \\cos(3x)\\, dx = \\frac{1}{3}\\sin(3x) + c$$. The general rule is $$\\int \\cos(ax+b)\\, dx = \\frac{1}{a}\\sin(ax+b) + c$$.\n- Step 2: The factor of $$\\frac{1}{3}$$ comes from \"undoing\" the chain rule. If we differentiate $$\\sin(3x)$$, we get $$\\cos(3x) \\cdot 3$$ (the chain rule brings down the 3 from the inner function's derivative). So $$\\frac{d}{dx}[\\sin(3x)] = 3\\cos(3x)$$. To get just $$\\cos(3x)$$, we need to divide by 3: $$\\frac{d}{dx}\\left[\\frac{1}{3}\\sin(3x)\\right] = \\cos(3x)$$. ✓\n\nThe $$\\frac{1}{a}$$ factor compensates for the chain rule's extra factor of a.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "Why is $$\\int\\sec^2(x)\\,dx = \\tan(x) + c$$? What would you differentiate to verify this? (2 steps)", "answer": "- Step 1: We know that $$\\frac{d}{dx}[\\tan(x)] = \\sec^2(x)$$. This is a standard derivative that comes from differentiating $$\\tan(x) = \\frac{\\sin(x)}{\\cos(x)}$$ using the quotient rule (or equivalently, writing $$\\tan(x) = \\sin(x)(\\cos(x))^{-1}$$).\n- Step 2: Since differentiation of $$\\tan(x)$$ gives $$\\sec^2(x)$$, the reverse operation (integration) gives $$\\int \\sec^2(x)\\, dx = \\tan(x) + c$$. To verify: $$\\frac{d}{dx}[\\tan(x) + c] = \\sec^2(x) + 0 = \\sec^2(x)$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "What is $$\\int\\sin(2x - 1)\\,dx$$? Walk through the reverse chain rule logic. (2 steps)", "answer": "- Step 1: The general pattern is $$\\int \\sin(ax + b)\\, dx = -\\frac{1}{a}\\cos(ax + b) + c$$. Here, $$a = 2$$ and $$b = -1$$.\n- Step 2: So $$\\int \\sin(2x - 1)\\, dx = -\\frac{1}{2}\\cos(2x - 1) + c$$. To verify: differentiate $$-\\frac{1}{2}\\cos(2x - 1)$$. We get $$-\\frac{1}{2} \\cdot (-\\sin(2x-1)) \\cdot 2 = \\sin(2x - 1)$$. ✓ The $$-\\frac{1}{2}$$ from the integral, the $$-\\sin$$ from differentiating cosine, and the 2 from the chain rule all cancel to give back the integrand.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "A student writes $$\\int\\cos(5x)\\,dx = \\sin(5x) + c$$. What's missing, and why? (2 steps)", "answer": "- Step 1: The correct answer is $$\\int \\cos(5x)\\, dx = \\frac{1}{5}\\sin(5x) + c$$. The student is missing the factor of $$\\frac{1}{5}$$.\n- Step 2: The reason: differentiating $$\\sin(5x)$$ gives $$5\\cos(5x)$$ (the chain rule brings down the 5). To get just $$\\cos(5x)$$, we need to compensate by dividing by 5. Without the $$\\frac{1}{5}$$, differentiating the student's answer gives $$5\\cos(5x)$$, not $$\\cos(5x)$$.\n\nThe general rule: whenever the \"inner function\" has a coefficient other than 1, the integral picks up a factor of 1/(that coefficient). This is the reverse chain rule.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A function f has domain $$x > 0$$ and range $$y > 3$$. What are the domain and range of $$f^{-1}$$, and what line are the two graphs symmetric about? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of f = $$x > 3$$. Range of $$f^{-1}$$ = Domain of f = $$y > 0$$.\n- Step 2: The graphs of f and $$f^{-1}$$ are symmetric about the line $$y = x$$. The reflection swaps horizontal and vertical extents: the domain of f ($$x > 0$$, horizontal) becomes the range of $$f^{-1}$$ ($$y > 0$$, vertical), and the range of f ($$y > 3$$, vertical) becomes the domain of $$f^{-1}$$ ($$x > 3$$, horizontal).", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "You want to find a root of $$f(x) = 0$$ in the interval $$(1, 2)$$. First, you use the sign change method to confirm a root exists — what two things must you check? Then, you set up an iteration — what form must you rearrange $$f(x) = 0$$ into? (2 steps)", "answer": "- Step 1: For the sign change method, you must check: (a) that $$f(1)$$ and $$f(2)$$ have opposite signs, AND (b) that $$f(x)$$ is continuous on $$[1, 2]$$. Both conditions are needed to guarantee a root exists.\n- Step 2: For iteration, you must rearrange $$f(x) = 0$$ into the form $$x = g(x)$$, giving the iterative formula $$x_{n+1} = g(x_n)$$. The root you confirmed exists is a fixed point of g — a value where $$g(x) = x$$.\n\nThe sign change method locates the root's interval; iteration refines the approximation.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "To integrate $$\\cos^2(x)$$, you would first use a double angle identity to rewrite it. Which form of the $$\\cos(2A)$$ identity would you use, and what does $$\\cos^2(x)$$ become? (2 steps)", "answer": "- Step 1: Use the form $$\\cos(2A) = 2\\cos^2(A) - 1$$, rearranged to solve for $$\\cos^2(A)$$: $$\\cos^2(A) = \\frac{1 + \\cos(2A)}{2}$$.\n- Step 2: So $$\\cos^2(x) = \\frac{1 + \\cos(2x)}{2}$$, and $$\\int \\cos^2(x)\\, dx = \\int \\frac{1 + \\cos(2x)}{2}\\, dx = \\frac{1}{2}x + \\frac{1}{4}\\sin(2x) + c$$.\n\nThis technique — using double angle identities to reduce powers before integrating — is essential for integrating $$\\sin^2(x)$$, $$\\cos^2(x)$$, and higher even powers of trig functions.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "If f is an invertible function, what is $$ff^{-1}(x)$$, and why? What about $$f^{-1}f(x)$$? (2 steps)", "answer": "- Step 1: $$ff^{-1}(x) = f(f^{-1}(x)) = x$$ for all x in the domain of $$f^{-1}$$. The reasoning: $$f^{-1}(x)$$ gives you the input that produces x through f, so applying f to that input gives you back x. It's like unlocking a lock and then locking it again — you end up where you started.\n- Step 2: Similarly, $$f^{-1}f(x) = f^{-1}(f(x)) = x$$ for all x in the domain of f. Here, $$f(x)$$ produces an output, and $$f^{-1}$$ undoes it to recover the original input. Both compositions give the identity function x, but their domains may differ.\n\nThis is the defining property of inverse functions: they undo each other.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "The functions $$f(x) = e^x$$ and $$g(x) = \\ln(x)$$ are inverses of each other. What does this tell you about: (a) the domain and range of each, and (b) the composite functions fg(x) and gf(x)? (2 steps)", "answer": "- Step 1: **Domain and range**: Since they are inverses, the domain of one is the range of the other. $$e^x$$ has domain all reals and range $$y > 0$$; $$\\ln(x)$$ has domain $$x > 0$$ and range all reals. The domain of ln equals the range of $$e^x$$, and vice versa.\n- Step 2: **Composites**: $$fg(x) = e^{\\ln(x)} = x$$ for $$x > 0$$, and $$gf(x) = \\ln(e^x) = x$$ for all real x. Both give the identity function, but note the different domains: $$e^{\\ln(x)}$$ requires $$x > 0$$ (domain of ln), while $$\\ln(e^x)$$ works for all x (domain of $$e^x$$).", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "In the iteration $$x_{n+1} = g(x_n)$$, what happens if you choose $$x_0$$ to be exactly a root of $$f(x) = 0$$? (2 steps)", "answer": "- Step 1: If $$x_0$$ is exactly a root of $$f(x) = 0$$, then since the root is a fixed point of g (i.e., $$g(x_0) = x_0$$), we get $$x_1 = g(x_0) = x_0$$.\n- Step 2: The iteration immediately stabilises: every subsequent value equals $$x_0$$. The sequence is constant. In practice, this almost never happens because you wouldn't know the exact root (that's why you're iterating), but it confirms that fixed points of g are indeed the roots you're seeking.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "A student solving simultaneous equations writes $$x^2 + 3x - 4 = 0$$ but the correct equation is $$x^2 - 3x - 4 = 0$$. How would substituting their solutions back into the original equations reveal the error? (2 steps)", "answer": "- Step 1: The student's equation factors as $$(x + 4)(x - 1) = 0$$, giving $$x = -4$$ or $$x = 1$$. The correct equation factors as $$(x - 4)(x + 1) = 0$$, giving $$x = 4$$ or $$x = -1$$. Different solutions entirely.\n- Step 2: When the student substitutes $$x = -4$$ into both original curves, the y-values won't match (the curves don't actually intersect there). This failed substitution check immediately signals an error in the setup, not just in the solving.\n\nThis is why back-substitution is an essential sanity check — it catches transcription errors that pure algebra cannot.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "The function $$f(x) = e^x$$ has no inverse over all real numbers if we don't restrict the domain. Why is this the case, and what does \"failing the horizontal line test\" mean in this context?", "answer": "- Step 1: $$f(x) = e^x$$ actually DOES have an inverse ($$\\ln(x)$$) because it passes the horizontal line test — it's one-to-one. Each y-value is produced by exactly one x-value. The confusion is with functions like $$f(x) = x^2$$ (all reals), which FAIL the horizontal line test: both $$x = 2$$ and $$x = -2$$ give $$f(x) = 4$$, so the inverse wouldn't be a function (it would need to map 4 to both 2 and −2).\n- Step 2: For a function to have an inverse, it must be one-to-one (injective): each output comes from exactly one input. If a horizontal line crosses the graph more than once, the function is not one-to-one, and we must restrict the domain to make it so. For $$x^2$$, restricting to $$x \\geq 0$$ makes it one-to-one and hence invertible.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A student uses the sign change method and finds $$f(2) = -3$$ and $$f(5) = 7$$. They write: \"There is a root between 2 and 5.\" What is missing from their statement, and why would an examiner deduct marks? (2 steps)", "answer": "- Step 1: The student has not stated that $$f(x)$$ is continuous on the interval $$[2, 5]$$. Without continuity, the sign change does not guarantee a root — it could be caused by a discontinuity (like a vertical asymptote).\n- Step 2: The correct full statement is: \"Since $$f(2) = -3$$ and $$f(5) = 7$$ have opposite signs, and $$f(x)$$ is continuous on $$[2, 5]$$, there is a root in the interval $$(2, 5)$$.\" Examiners specifically look for the continuity condition — omitting it is a common way to lose marks.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "When using the calculator technique for iteration (storing $$x_0$$ in Ans, then typing the formula in terms of Ans and pressing = repeatedly), what should you do before starting to make sure your iteration is set up correctly? (2 steps)", "answer": "- Step 1: First, store the initial value $$x_0$$ in the calculator's Ans memory by typing the value and pressing =. This ensures the first iteration uses the correct starting value.\n- Step 2: Then type the iterative formula using Ans in place of $$x_n$$. Pressing = repeatedly will then compute $$x_1, x_2, x_3, \\ldots$$ in sequence. Before pressing = many times, press it once or twice and verify the first few values match your manual calculation — this catches formula entry errors early.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "If $$f(x) = 2x + 1$$ and $$g(x) = x^2$$, find ff(3) and explain what this notation means. (2 steps)", "answer": "- Step 1: $$ff(3) = f(f(3))$$. First, find $$f(3) = 2(3) + 1 = 7$$. Then find $$f(7) = 2(7) + 1 = 15$$. So $$ff(3) = 15$$.\n- Step 2: The notation ff means \"f composed with f\" — apply f to the input, then apply f again to the result. It's the same as $$f \\circ f$$, applying the same function twice in succession. This is NOT the same as $$[f(x)]^2$$ (squaring the output), which would give $$[f(3)]^2 = 49$$.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Why can't you find the inverse of $$f(x) = x^2$$ if the domain is all real numbers? What domain restriction makes it invertible, and what is the inverse then? (3 steps)", "answer": "- Step 1: With domain all reals, $$f(x) = x^2$$ fails the horizontal line test: both $$x = 2$$ and $$x = -2$$ map to 4. An inverse would need to map 4 back to both 2 and −2, which violates the definition of a function (one input → one output).\n- Step 2: Restricting the domain to $$x \\geq 0$$ makes f one-to-one (each y-value comes from exactly one x-value), so the inverse exists.\n- Step 3: To find the inverse: $$y = x^2$$, swap: $$x = y^2$$, solve: $$y = \\sqrt{x}$$ (positive root only, since $$y \\geq 0$$). So $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$ (which equals the range of f).", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "What is $$\\int \\sin^2(x)\\,dx$$? Use a double angle identity to rewrite before integrating. (3 steps)", "answer": "- Step 1: Use the form $$\\cos(2A) = 1 - 2\\sin^2(A)$$, rearranged to solve for $$\\sin^2(A)$$: $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$.\n- Step 2: So $$\\sin^2(x) = \\frac{1 - \\cos(2x)}{2}$$, and $$\\int \\sin^2(x)\\, dx = \\int \\frac{1 - \\cos(2x)}{2}\\, dx$$.\n- Step 3: Integrate term by term: $$= \\frac{1}{2}x - \\frac{1}{2} \\cdot \\frac{1}{2}\\sin(2x) + c = \\frac{1}{2}x - \\frac{1}{4}\\sin(2x) + c$$.\n\nNote the minus sign: $$\\int -\\cos(2x)\\,dx = -\\frac{1}{2}\\sin(2x)$$, and then the outer $$\\frac{1}{2}$$ gives $$-\\frac{1}{4}\\sin(2x)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "A function f has the property that $$f(f(x)) = x$$ for all x in its domain. What does this tell you about the relationship between f and its inverse? (2 steps)", "answer": "- Step 1: Since $$ff(x) = f(f(x)) = x$$, applying f twice returns the original input. This means f is its own inverse: $$f = f^{-1}$$.\n- Step 2: Such functions are called **self-inverse** or **involutions**. Their graphs are symmetric about the line $$y = x$$ (since f and $$f^{-1}$$ are the same function). A classic example is $$f(x) = \\frac{1}{x}$$: applying it twice gives $$f(f(x)) = \\frac{1}{1/x} = x$$. Another is $$f(x) = -x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}], "count": 58}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When two curves $$y_1 = f(x)$$ and $$y_2 = g(x)$$ intersect, we set $$f(x) = g(x)$$ and rearrange to get a polynomial equal to zero. Why does setting them equal find the intersection points, and what does the resulting polynomial = 0 represent geometrically? (2 steps)", "answer": "- Step 1: At an intersection point, both curves share the same $$y$$-value for the same $$x$$-value. So the condition for intersection is $$f(x) = g(x)$$ — this equation captures exactly those $$x$$-values where the two curves are at the same height. Rearranging to $$f(x) - g(x) = 0$$ gives us a single expression whose roots are the intersection $$x$$-coordinates.\n- Step 2: Geometrically, the function $$h(x) = f(x) - g(x)$$ represents the *vertical gap* between the two curves. Where this gap is zero ($$h(x) = 0$$), the curves meet. The roots of the polynomial are precisely the $$x$$-coordinates where that vertical gap closes to nothing — the intersection points.\n\nSetting equations equal is really asking: \"where is the difference between these curves exactly zero?\"", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A student sets $$y_1 = y_2$$ to find intersections and correctly rearranges to $$x^2 + 3x - 4 = 0$$, but then miscopies it as $$2x^2 + 3x - 4 = 0$$ when applying the quadratic formula. What type of error is this, and how does the extra coefficient $$2$$ change the nature of the solutions compared to the original? (2 steps)", "answer": "- Step 1: This is a transcription error — copying the equation incorrectly from one line to the next. Under exam time pressure, this is a common and costly mistake because it silently changes the problem you're solving.\n- Step 2: The original $$x^2 + 3x - 4 = 0$$ factorises as $$(x+4)(x-1) = 0$$ giving integer roots $$x = -4, 1$$. But $$2x^2 + 3x - 4 = 0$$ requires the quadratic formula and yields irrational roots $$x = \\frac{-3 \\pm \\sqrt{41}}{4}$$, which are completely different intersection points. A single coefficient error can transform a clean factorisation into an ugly irrational answer — always double-check transcribed equations before proceeding.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Why is the domain of $$f(x) = \\ln(x)$$ restricted to $$x > 0$$, and not simply $$x \\geq 0$$? What happens to the function as $$x$$ approaches 0 from the right? (2 steps)", "answer": "- Step 1: The natural logarithm $$\\ln(x)$$ is defined as the inverse of $$e^x$$, which only produces *positive* outputs. Since $$e^y$$ can never equal zero or a negative number, there is no real $$y$$ such that $$e^y = 0$$ or $$e^y = -5$$. Therefore $$\\ln(0)$$ and $$\\ln(\\text{negative})$$ don't exist in the real numbers — the domain must exclude them entirely, giving $$x > 0$$ (strict inequality, not $$\\geq$$).\n- Step 2: As $$x \\to 0^+$$ (approaching zero from the right), $$\\ln(x) \\to -\\infty$$. This means the graph plunges downward without bound as you move left toward zero, creating a vertical asymptote at $$x = 0$$. The function never actually reaches $$x = 0$$ — it just gets arbitrarily large in the negative direction as you get arbitrarily close.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "The range of $$\\ln(x)$$ is all real numbers ($$y \\in \\mathbb{R}$$). How can a function whose domain is only $$x > 0$$ produce every possible real $$y$$-value, including arbitrarily large negative and positive values? (2 steps)", "answer": "- Step 1: For any target value $$y_0$$, we can always find an $$x > 0$$ such that $$\\ln(x) = y_0$$, because $$\\ln(x) = y_0$$ means $$x = e^{y_0}$$, and $$e^{y_0}$$ is always positive. Whether $$y_0$$ is $$-100$$, $$0$$, or $$1000$$, the corresponding $$x = e^{y_0}$$ exists and is in the domain.\n- Step 2: As $$x \\to 0^+$$, $$\\ln(x) \\to -\\infty$$ (arbitrarily negative). As $$x \\to +\\infty$$, $$\\ln(x) \\to +\\infty$$ (arbitrarily positive, though very slowly). And at $$x = 1$$, $$\\ln(1) = 0$$. Since the function continuously sweeps through every value from $$-\\infty$$ to $$+\\infty$$ without any gaps, every real number is attained — hence the range is $$\\mathbb{R}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A student asked to sketch $$\\ln(x)$$ instead draws the graph of $$e^x$$. What are the key visual differences between these two graphs, and how can you quickly distinguish them on a sketch? (3 steps)", "answer": "- Step 1: $$e^x$$ starts near the $$x$$-axis for negative $$x$$ (horizontal asymptote at $$y = 0$$ as $$x \\to -\\infty$$), passes through $$(-1, e^{-1})$$ and $$0, 1$$, then shoots upward rapidly. It looks like a curve lying flat on the left and exploding upward on the right.\n- Step 2: $$\\ln(x)$$ has a vertical asymptote at $$x = 0$$ (the curve plunges down as you approach the $$y$$-axis from the right), passes through $$1, 0$$, then rises very slowly to the right. It looks like a curve hugging the $$y$$-axis on the left and crawling upward on the right.\n- Step 3: The quickest visual check: where does the curve cross the axes? $$e^x$$ crosses the $$y$$-axis at $$0, 1$$ and never crosses the $$x$$-axis. $$\\ln(x)$$ crosses the $$x$$-axis at $$1, 0$$ and never crosses the $$y$$-axis. Also, $$\\ln(x)$$ is the *reflection* of $$e^x$$ in the line $$y = x$$ — if your sketch could be either, flip it diagonally and see which interpretation makes sense.\n\nRemember: $$e^x$$ lives mostly above the $$x$$-axis; $$\\ln(x)$$ lives mostly to the right of the $$y$$-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "To find an inverse function $$f^{-1}(x)$$ algebraically, we use the \"swap method\": write $$y = f(x)$$, swap $$x$$ and $$y$$, then solve for $$y$$. Why does swapping $$x$$ and $$y$$ produce the inverse, and what does this swap represent conceptually? (2 steps)", "answer": "- Step 1: The original function $$f$$ maps inputs $$x$$ to outputs $$y$$: $$y = f(x)$$ means \"given $$x$$, the function tells you $$y$$.\" The inverse does the reverse job: \"given $$y$$, tell me which $$x$$ produced it.\" So we want to express $$x$$ in terms of $$y$$ — that is, solve $$y = f(x)$$ for $$x$$.\n- Step 2: Swapping $$x$$ and $$y$$ before solving is just a notational convention so that our final answer is expressed as $$y = f^{-1}(x)$$ (with $$y$$ as the output and $$x$$ as the input, matching standard function notation). Conceptually, the swap says: \"treat the old output as the new input, and find what the old input must have been.\" The solving step then computes that reverse mapping.\n\nThe swap itself doesn't change the mathematical relationship — it just re-labels the variables so the result looks like a standard function definition.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "After finding the equation of an inverse function, you must state its domain. What is the domain of $$f^{-1}(x)$$, and why must it always be stated when defining a function? (2 steps)", "answer": "- Step 1: The domain of $$f^{-1}(x)$$ equals the range of $$f(x)$$. This makes sense: the inverse accepts values that the original function could have produced (its outputs), and maps them back to the inputs that created them. If $$f$$ can output values in $$[2, \\infty)$$, then $$f^{-1}$$ can only accept inputs from $$[2, \\infty)$$.\n- Step 2: A function definition is incomplete without both its rule (equation) and its domain. The same equation on different domains defines different functions. For example, $$f^{-1}(x) = \\sqrt{x}$$ on domain $$[0, \\infty)$$ is a valid inverse, but without specifying that domain, a reader might incorrectly assume all real numbers — and $$\\sqrt{x}$$ isn't even defined for negative $$x$$. Always state the domain.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A student finds $$f^{-1}(x) = \\sqrt{x+3}$$ but forgets to state its domain. If $$f(x) = x^2 - 3$$ with domain $$x \\geq 0$$, what is the correct domain of the inverse, and what goes wrong if you use it outside that domain? (2 steps)", "answer": "- Step 1: Since the domain of $$f$$ is $$x \\geq 0$$ and $$f(x) = x^2 - 3$$, the range of $$f$$ is $$y \\geq -3$$ (because $$x^2 \\geq 0$$ so $$x^2 - 3 \\geq -3$$). The domain of $$f^{-1}$$ is therefore $$x \\geq -3$$.\n- Step 2: If you use $$f^{-1}(x) = \\sqrt{x+3}$$ for $$x < -3$$, then $$x + 3 < 0$$ and $$\\sqrt{x+3}$$ is undefined in the reals — the inverse simply doesn't exist for those inputs because the original function never produced those output values. Even for $$x \\geq -3$$, the square root gives a unique non-negative value, which correctly maps back to the original domain $$x \\geq 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "For composite functions, what does $$fg(x)$$ mean, and in what order do you apply the functions? Why is this order important? (2 steps)", "answer": "- Step 1: $$fg(x)$$ means $$f(g(x))$$ — you apply $$g$$ first to the input $$x$$, then apply $$f$$ to the result of $$g(x)$$. Think of it as a pipeline: $$x \\to g \\to f \\to \\text{output}$$. The function written on the right ($$g$$) is applied first; the function written on the left ($$f$$) is applied second.\n- Step 2: Order matters because in general $$fg(x) \\neq gf(x)$$ — applying $$f$$ then $$g$$ gives a different result than applying $$g$$ then $$f$$. For example, if $$f(x) = 2x$$ and $$g(x) = x + 3$$: $$fg(x) = f(x+3) = 2(x+3) = 2x+6$$, but $$gf(x) = g(2x) = 2x+3$$. These are clearly different functions. Composition is not commutative, unlike multiplication.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "When evaluating a composite function $$fg(x)$$, what must you check about the domain of $$g$$ and the range of $$g$$ relative to the domain of $$f$$? Give a concrete example where $$fg(x)$$ is undefined for some inputs even though both functions individually exist. (3 steps)", "answer": "- Step 1: For $$fg(x) = f(g(x))$$ to be defined, two conditions must hold: first, $$x$$ must be in the domain of $$g$$ (so $$g(x)$$ exists); second, $$g(x)$$ must be in the domain of $$f$$ (so $$f$$ can accept $$g$$'s output). If $$g$$ produces values that $$f$$ can't handle, the composition breaks.\n- Step 2: Example: let $$f(x) = \\ln(x)$$ with domain $$x > 0$$, and $$g(x) = x - 5$$ with domain all reals. Then $$fg(x) = \\ln(x - 5)$$, which requires $$x - 5 > 0$$, i.e., $$x > 5$$. Even though $$g(x)$$ exists for all $$x$$, the composition only works when $$g(x) > 0$$ because $$\\ln$$ can't accept negative or zero inputs.\n- Step 3: The effective domain of $$fg$$ is the set of all $$x$$ in the domain of $$g$$ such that $$g(x)$$ falls within the domain of $$f$$. Always check this compatibility — it's not just \"apply one then the other\"; the functions must connect properly.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "If $$f(a)$$ is negative and $$f(b)$$ is positive, and $$f$$ is continuous on $$[a, b]$$, what conclusion can you draw? Why is the continuity condition essential — give a counterexample where sign change occurs but no root exists. (3 steps)", "answer": "- Step 1: By the sign change rule (a consequence of the Intermediate Value Theorem), if $$f(a) < 0$$ and $$f(b) > 0$$ (or vice versa), and $$f$$ is continuous on $$[a, b]$$, then there exists at least one $$c$$ in the interval $$(a, b)$$ such that $$f(c) = 0$$ — a root must exist. The function must cross the $$x$$-axis somewhere between $$a$$ and $$b$$.\n- Step 2: Continuity is essential because a discontinuous function can \"jump\" over zero without ever touching it. Consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$: $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$ — there's a sign change. But $$f$$ has a discontinuity at $$x = 0$$ (it jumps from $$-\\infty$$ to $$+\\infty$$), and $$f(x) = 0$$ has no solution anywhere. The sign change gave a false signal.\n- Step 3: In exam answers, always state both conditions explicitly: \"f(a) and f(b) have opposite signs AND f is continuous on [a, b], therefore a root exists in (a, b).\" Omitting continuity is a common mistake that makes your argument incomplete.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "The sign change method guarantees *at least one* root in the interval. Can there be more than one root even with a sign change, and how could you detect this possibility from the function's behaviour? (2 steps)", "answer": "- Step 1: Yes — a sign change only guarantees existence, not uniqueness. A continuous function could cross the $$x$$-axis multiple times within $$[a, b]$$, producing several roots. For instance, $$f(x) = \\sin(x)$$ on $$[-4, 4]$$ has $$f(-4) < 0$$ and $$f(4) > 0$$, but there are three roots in that interval (at approximately $$-3.14$$, $$0$$, and $$3.14$$).\n- Step 2: To detect multiple roots, you'd need to examine the function more carefully — sketch it, look at its derivative to find turning points, or subdivide the interval into smaller sub-intervals and check for separate sign changes within each. A single sign change over a large interval is a clue that the root exists, but not a guarantee that it's the only one.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "To solve $$f(x) = 0$$ by iteration, you rearrange the equation into the form $$x = g(x)$$ and then iterate $$x_{n+1} = g(x_n)$$ starting from some $$x_0$$. Why can the same equation $$f(x) = 0$$ lead to multiple different iterative formulas, and what practical difference does this make? (2 steps)", "answer": "- Step 1: Rearranging $$f(x) = 0$$ to $$x = g(x)$$ is not unique — there are many ways to isolate an $$x$$. For example, if $$x^2 - x - 1 = 0$$, you could write $$x = x^2 - 1$$ (adding $$x+1$$ to both sides), or $$x = \\frac{1}{x} + 1$$ (dividing by $$x$$ and rearranging), or $$x = \\sqrt{x+1}$$ (taking the square root). Each gives a different $$g(x)$$ and a different iteration formula.\n- Step 2: Different rearrangements can converge or diverge, and can converge to different roots, or converge at different speeds. A good rearrangement produces a $$g(x)$$ whose graph crosses the $$y = x$$ line at a shallow angle (slope between $$-1$$ and $$1$$ near the root), leading to stable convergence. A bad rearrangement might spiral outward and never settle. You must choose (or be given) the right rearrangement.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "During iteration with $$x_{n+1} = g(x_n)$$, the sequence of values $$x_0, x_1, x_2, \\ldots$$ converges to a root. What does \"convergence\" mean visually on a graph with the curves $$y = g(x)$$ and $$y = x$$? (3 steps)", "answer": "- Step 1: The root we seek is where $$g(x) = x$$ — the intersection point of the curve $$y = g(x)$$ and the line $$y = x$$. Starting from $$x_0$$ on the $$x$$-axis, you go up to the curve $$y = g(x)$$ to read off $$g(x_0) = x_1$$, then horizontally across to the line $$y = x$$ to set up the next input, then up to the curve again for $$g(x_1) = x_2$$, and so on.\n- Step 2: This creates a \"staircase\" or \"cobweb\" pattern on the graph. If the curve $$y = g(x)$$ crosses $$y = x$$ with a gentle slope (between $$0$$ and $$1$$), the staircase spirals inward toward the intersection — this is convergence. The values get closer and closer to the root with each step.\n- Step 3: If the slope of $$g(x)$$ near the root is too steep (greater than 1 or less than $$-1$$), the cobweb spirals outward — values move away from the root instead of toward it. This is divergence. The iteration only works when $$g$$ is \"flat enough\" near the crossing point.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is the efficient calculator technique for performing iteration $$x_{n+1} = g(x_n)$$, and why is it faster than manually typing each substitution? (2 steps)", "answer": "- Step 1: Store the initial value $$x_0$$ in the calculator's \"Ans\" (answer) memory. Then type the iterative formula in terms of Ans — for example, if $$g(x) = \\sqrt{x+1}$$, type $$\\sqrt{\\text{Ans}+1}$$ and press $$=$$. The calculator computes $$g(x_0)$$ and displays $$x_1$$, which automatically becomes the new Ans.\n- Step 2: Each subsequent press of $$=$$ uses the latest Ans as the new input, computing $$x_2, x_3, x_4, \\ldots$$ in sequence. You just press $$=$$ repeatedly and watch the values converge. This avoids retyping numbers and eliminates transcription errors — the calculator handles the substitution chain automatically.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. Why does reflecting in $$y = x$$ produce the inverse, and what does this reveal about the relationship between the domain and range of $$f$$ and $$f^{-1}$$? (3 steps)", "answer": "- Step 1: Reflection in the line $$y = x$$ swaps every point's coordinates: the point $$a, b$$ maps to $$b, a$$. Since $$f$$ maps $$a \\to b$$ (the point $$a, b$$ is on the graph of $$f$$), the reflected point $$b, a$$ represents mapping $$b \\to a$$ — which is exactly what the inverse does. The reflection geometrically encodes the \"reverse mapping.\"\n- Step 2: This reflection swaps the roles of $$x$$ and $$y$$-axes. The domain of $$f$$ (values along the $$x$$-axis) becomes the range of $$f^{-1}$$ (values along the $$y$$-axis after reflection). Similarly, the range of $$f$$ becomes the domain of $$f^{-1}$$. Domain and range are swapped, just like the coordinates of each point.\n- Step 3: On a sketch, if the original function lives in a certain region (say, $$x \\geq 2$$ and $$y \\geq 0$$), then the inverse's graph lives in the reflected region ($$x \\geq 0$$ and $$y \\geq 2$$). The domain/range swap is visible geometrically — the inverse's horizontal extent matches the original's vertical extent, and vice versa.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "If you need to solve the equation $$f(x) = x$$, how can you do this graphically, and what is the connection to inverse functions? (2 steps)", "answer": "- Step 1: The equation $$f(x) = x$$ asks: \"for which $$x$$-values does the function output the same value as its
