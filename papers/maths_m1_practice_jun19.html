t as: the distance from 10 to 15 spans 5 intervals (10→11→12→13→14→15), but there are 6 numbers.\n\n**Takeaway:** When counting integers in a range, always add 1 to the difference — it's the most common off-by-one error in inequalities.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "On a velocity-time graph, what does the area under the graph represent, and what does the gradient represent? Explain why this matters for solving motion problems. (2 steps)", "answer": "- Step 1: The area under a $v$-$t$ graph represents displacement (distance traveled). The gradient represents acceleration. This is because velocity × time has units of meters, and the formal proof involves the limit definition of integration — area under $v(t)$ gives displacement.\n- Step 2: This matters practically because problems often give you distance and ask you to find time or acceleration. Instead of using SUVAT equations, you can set up the geometric shape (often a trapezium) and use area formulas directly. The trapezium area formula $\\frac{1}{2}(a+b)h$ is much faster than breaking shapes into triangles and rectangles.\n\n**Takeaway:** Memorize that area = displacement, gradient = acceleration — this is the foundation of all $v$-$t$ graph problems.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In a velocity-time graph shaped as a trapezium, identify what each of the three quantities $a$, $b$, and $h$ represent, and explain why the $\\frac{1}{2}$ factor is essential and often forgotten. (2 steps)", "answer": "- Step 1: In the trapezium area formula $\\text{Area} = \\frac{1}{2}(a + b)h$: the two parallel sides $a$ and $b$ are velocity values (or time durations depending on orientation), and $h$ is the perpendicular distance between them (the other dimension). On a typical $v$-$t$ graph where $v$ is vertical and $t$ is horizontal, $a$ and $b$ are speeds at two different times, and $h$ is the time interval between them.\n- Step 2: The $\\frac{1}{2}$ comes from integrating the linear velocity change — it's mathematically essential, not optional. Students forget it because they try to remember \"average speed × time\" but average speed = $\\frac{v_1 + v_2}{2}$, and they drop the division by 2 when writing the area formula. The full formula is $\\frac{1}{2}(v_1 + v_2) \\times t$, where the $\\frac{1}{2}$ is the average speed factor.\n\n**Takeaway:** The $\\frac{1}{2}$ is non-negotiable — it's part of the average speed calculation. Write the full formula $\\frac{1}{2}(a+b)h$ every time.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In the train problem, the constant-speed phase is 3 minutes (180 seconds). Why must the time marker for this phase be placed at $T + 180$, not simply at 180? (2 steps)", "answer": "- Step 1: The 180 seconds of constant speed occur AFTER the acceleration phase of duration $T$. The graph builds sequentially: acceleration from time 0 to $T$, then constant speed from time $T$ to $T + 180$.\n- Step 2: If you incorrectly place the constant-speed segment starting at 180, your entire time axis is wrong, throwing off the deceleration phase placement (which should end at $3T + 180$). This cascades into the wrong \"bottom parallel side\" of the trapezium, making the distance calculation incorrect. Harry's warning was that \"the whole thing snowballs\" from this error.\n\n**Takeaway:** Always identify the starting point of each phase on the time axis — phases don't necessarily start at zero.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When solving a direct collision problem using conservation of momentum, why must you choose a positive direction and stick with it for every term in the equation? What goes wrong if you don't? (2 steps)", "answer": "- Step 1: Momentum is a vector quantity — it has direction. The conservation equation $m_A u_A + m_B u_B = m_A v_A + m_B v_B$ only works if all velocities use the same sign convention. Choosing $A$'s initial direction as positive means $B$'s initial velocity (moving opposite) must be negative.\n- Step 2: If you mix signs or change direction mid-problem, you're adding quantities that should subtract, or vice versa. The equation becomes physically meaningless. For example, if $u_A = +1.5$ and $u_B = +1.5$ (both positive), you incorrectly assume they move in the same direction before collision, giving momentum $4.5m$ instead of the correct $3m - 1.5m = 1.5m$. This leads to completely wrong final speeds.\n\n**Takeaway:** Pick a positive direction once at the start, then assign positive or negative signs to every velocity based on that choice.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "In collision problems, what does the phrase \"magnitude of the impulse\" tell you about the answer, and why do students sometimes lose marks by including a negative sign? (2 steps)", "answer": "- Step 1: \"Magnitude\" means the size of the quantity, ignoring direction. Impulse is a vector (it has direction), but the magnitude is always a positive number. The question is explicitly asking for the positive value.\n- Step 2: If you calculate $I = mv - mu = -3m$ and write that as your answer, you've given the signed value (negative because the impulse acted opposite to the original direction). But magnitude must be positive, so the answer should be $3m$, not $-3m$. Some students calculate correctly but then incorrectly preserve the negative sign because they don't understand that \"magnitude\" overrides the direction. Conversely, if you already got a positive answer from using the correct sign convention, you don't need to add modulus bars.\n\n**Takeaway:** If a question asks for \"magnitude,\" the answer must be positive — no exceptions, no minus signs.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In Q2, why can we assume the speed of B after collision is $v + 1$ (where $v$ is A's speed), rather than having to consider $v - 1$? (2 steps)", "answer": "- Step 1: The problem states that \"the direction of motion of A is unchanged\" — so A continues moving in its original positive direction. It also states that \"the difference between the speed of A and the speed of B is 1 m/s.\"\n- Step 2: Since A is moving in the positive direction after collision and B must rebound (otherwise they would stick together or pass through), B also moves in the positive direction after collision. The difference of 1 m/s between their speeds means $|v_B - v_A| = 1$. Given that A is unchanged and moving positively, and B rebounds in the same direction, we have $v_B > v_A$, so $v_B = v_A + 1$. If B had reversed direction (negative), the difference would be $v_A - (-v_B)$ which would be larger, contradicting the given difference of 1.\n\n**Takeaway:** Analyze what \"unchanged direction\" and \"difference of speeds\" mean physically before setting up your variables.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "In moments problems, what does \"on the point of tilting about C\" physically mean about the reaction force at the other support D? (2 steps)", "answer": "- Step 1: \"On the point of tilting about C\" means the rod is just about to rotate around point C — it's in static equilibrium but any slight additional force would cause it to start rotating. This is the limiting case where the rod is about to lose contact with the other support.\n- Step 2: At that exact moment, the normal reaction at the other support D is zero ($R_D = 0$). The rod is just barely in contact with D, so there's no upward force from D. This is the key insight: \"on the point of tilting about X\" gives you $R_{\\text{other support}} = 0$. Without this, you have two unknowns ($W$ and $x$) but also two reaction forces; with this condition, you can solve for $W$ and $x$.\n\n**Takeaway:** \"On the point of tilting about X\" → the other support's reaction = 0. This eliminates an unknown and makes the problem solvable.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "When taking moments about a point, why is it advantageous to choose a pivot point where an unknown force acts through? Give an example from the moments question. (2 steps)", "answer": "- Step 1: The moment of a force about a point is $F \\times d$, where $d$ is the perpendicular distance. If a force's line of action passes through the pivot point, then $d = 0$, so that force's moment is zero — it drops out of the equation entirely.\n- Step 2: In Q4, when taking moments about C in scenario 1, both $R_C$ (the reaction at C) and the weight $W$ act through points with non-zero distances. But by choosing C as the pivot, $R_C$ has zero moment about C (distance = 0), eliminating it from the equation. Similarly, taking moments about D eliminates $R_D$. This lets you write equations with only $W$ and $x$, solvable with the second scenario.\n\n**Takeaway:** Choose your pivot strategically to eliminate unknown forces — pick a point where an unknown force passes through.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In the moments question, we had two equations: $189 = Wx$ and $81 = (0.9 - x)W$. Harry suggested dividing these equations rather than solving by substitution. Why is division faster, and what does it eliminate? (2 steps)", "answer": "- Step 1: Dividing equation (A) by (B): $\\frac{189}{81} = \\frac{Wx}{(0.9 - x)W} = \\frac{x}{0.9 - x}$. The $W$ cancels immediately, leaving an equation in $x$ alone.\n- Step 2: Substitution would require solving one equation for $W$ (e.g., $W = 189/x$) and substituting into the second, creating a rational equation. Division eliminates $W$ in one step. This is faster and avoids algebra mistakes. Harry specifically noted this as \"a really good habit\" that helps in M2 and pure maths too.\n\n**Takeaway:** When two equations share a common factor (like $W$), divide to eliminate it — it's quicker and cleaner than substitution.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "When resolving forces on an inclined plane, why must you resolve perpendicular to the plane rather than vertically? What's wrong with resolving vertically? (2 steps)", "answer": "- Step 1: The key constraint on an inclined plane is that there is no acceleration perpendicular to the plane — the object doesn't lift off or sink into the surface. Therefore, forces perpendicular to the plane must balance exactly: $\\sum F_{\\perp} = 0$.\n- Step 2: If you resolve vertically, you're mixing directions. The normal reaction $R$ acts perpendicular to the plane, not vertical. You'd have to express $R$ in terms of its vertical component, complicating the algebra. By resolving perpendicular to the plane, $R$ appears directly (as $R$ itself, not $R\\cos\\theta$), making the equation simple: $R + F_{\\text{away}} = W\\cos\\theta$ (or variations). Harry specifically corrected Phuc: say \"perpendicular to the plane,\" not \"vertically.\"\n\n**Takeaway:** Always resolve perpendicular to the surface first — that's where there's no acceleration and where the normal reaction lives.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "In the inclined plane problem, the parcel is being pulled up the slope, so friction acts DOWN the slope. Why does friction always oppose the direction of motion (or the tendency to move), and what determines which way it acts? (2 steps)", "answer": "- Step 1: Friction always opposes relative motion or the tendency to move. It's a passive force that resists sliding. When you pull up the slope, the parcel's tendency (without friction) would be to slide up faster — friction resists this, so it acts down the slope.\n- Step 2: The direction of friction depends on what would happen without it. If you're pulling up, the object would accelerate up faster without friction, so friction opposes this and acts down. If you were pushing down the slope, friction would act up. When the object is on the point of moving, friction is at its maximum value $F = \\mu R$ and acts in the direction that would oppose the impending motion.\n\n**Takeaway:** Ask yourself: \"Which way would the object move if there were no friction?\" Friction acts opposite to that direction.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In Q8, we calculated the normal reaction as $R = 2g\\cos 30^\\circ - 18\\sin 40^\\circ$. Why is the $18\\sin 40^\\circ$ term subtracted, and what does this tell us about the direction of that force component? (2 steps)", "answer": "- Step 1: The 18 N force acts at $40^\\circ$ to the plane. Perpendicular to the plane, this force has a component $18\\sin 40^\\circ$ pushing away from the plane (reducing the normal reaction).\n- Step 2: We set up the perpendicular equation as $R + F_{\\text{away from plane}} = W\\cos\\theta$ (forces pressing into the plane = forces pressing away). Since $18\\sin 40^\\circ$ acts away from the plane (trying to lift the parcel), it reduces $R$. So $R = W\\cos 30^\\circ - 18\\sin 40^\\circ$. If the force were angled into the plane (like pushing down), its perpendicular component would add to $R$.\n\n**Takeaway:** Identify whether each force component points into or away from the surface — that determines whether it adds to or subtracts from $R$.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Harry emphasized that \"marks come from the equations, not the forces on the diagram.\" What does this mean practically, and why can a beautiful diagram still score zero? (2 steps)", "answer": "- Step 1: In mechanics, the diagram helps you visualize and set up the problem correctly, but the marks are awarded for the mathematical relationships you write down — the resolved equations, the $F = \\mu R$ statement, the conservation of momentum equation.\n- Step 2: A student could draw perfect force arrows but never write the governing equations, so the examiner has nothing to mark. Conversely, someone with a messy diagram who writes the correct perpendicular and parallel equations will get the marks. Harry told Phuc: \"In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\"\n\n**Takeaway:** Always write the equations first (or alongside the diagram) — that's where the credit is.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the train problem, we found $T = 40$ seconds and acceleration $a = 0.5$ m/s². If the magnitude of acceleration is twice the magnitude of deceleration, what would the deceleration time and deceleration value be? (2 steps)", "answer": "- Step 1: Since acceleration magnitude is twice deceleration magnitude, and acceleration took $T = 40$ seconds, the deceleration phase must take twice as long: $2T = 80$ seconds.\n- Step 2: The acceleration was $a = \\frac{20}{40} = 0.5$ m/s². Since deceleration is half the acceleration magnitude, deceleration $= 0.25$ m/s² (in the opposite direction, so negative if we take acceleration as positive). You can verify: the deceleration time (80 s) × deceleration (0.25 m/s²) = change in velocity of 20 m/s, matching the speed drop from 20 to 0.\n\n**Takeaway:** \"Magnitude of acceleration is twice magnitude of deceleration\" → deceleration time is twice acceleration time, deceleration value is half.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In the collision problem, we assumed B moves in the positive direction after collision. What would happen physically if B continued moving in the negative direction after collision? Would conservation of momentum still hold? (2 steps)", "answer": "- Step 1: If B continued in the negative direction after collision, both particles would be moving in the same direction (A positive, B negative) — they would be moving apart, not colliding. This is physically impossible for a direct collision unless B somehow passed through A or there was a sticking/impulse anomaly.\n- Step 2: Conservation of momentum would still hold mathematically, but the solution would be non-physical. The problem statement implies B rebounds (its direction reverses), and the given speed difference of 1 m/s only makes sense if both move in the same direction after impact. If you got $v_B$ negative, you'd know something was wrong with your setup.\n\n**Takeaway:** Always check that your answers make physical sense — if both particles end up moving apart after a collision, something's wrong with your assumptions.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In the moments problem, the distances from the supports to the ends were 0.24 m and 0.36 m, with total length 1.5 m. Draw a number line and verify that the distance from D to the center of mass is $0.9 - x$ meters. (2 steps)", "answer": "- Step 1: Place points on a line: A at 0, C at 0.24, D at $1.5 - 0.36 = 1.14$, B at 1.5. The center of mass is at distance $x$ from C, so at position $0.24 + x$ from A.\n- Step 2: Distance from D (at 1.14) to the center of mass (at $0.24 + x$) is $1.14 - (0.24 + x) = 0.9 - x$ meters. This confirms the expression in scenario 2. Many students incorrectly use $x$ (the distance from C), forgetting to account for the offset from C to D.\n\n**Takeaway:** Measure distances from the correct reference point — don't assume a distance measured from one pivot applies to another.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In the inclined plane problem, the friction force was calculated as $F = \\mu R \\approx 1.62$ N. Why is it important to write $F = \\mu R$ as its own line, and what mark does this typically earn? (2 steps)", "answer": "- Step 1: Examiners mark specific learning outcomes, and stating the friction formula is often a standalone mark. Even if you calculate $R$ incorrectly, stating $F = \\mu R$ shows you understand the relationship between friction, coefficient of friction, and normal reaction.\n- Step 2: Harry specifically noted: \"There is usually a mark just for stating the friction relation.\" Writing it as a separate equation (not embedded in the parallel resolution) makes it visible to the examiner. This is part of his exam technique advice: write $F$ (or $F_R$) first, then state $F = \\mu R$ on its own line.\n\n**Takeaway:** Make key formulas visible and explicit — don't bury them inside larger equations where they might be missed.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "If the coefficient of friction on the inclined plane were increased to the point where the parcel was on the point of sliding DOWN (instead of being pulled up), how would the friction direction and the parallel equation change? (2 steps)", "answer": "- Step 1: If the parcel is on the point of sliding down, the tendency is to slide down, so friction acts UP the slope (opposing the tendency to move down). This is the opposite direction from when being pulled up.\n- Step 2: The parallel equation would become: $P\\cos\\theta - F - W\\sin\\theta = ma$ (where $P$ is now pushing down or the parcel is just held). If $P = 0$ and the parcel is held by friction alone, you'd have $F = W\\sin\\theta$ at the limiting case, with $F = \\mu R$ acting up the slope.\n\n**Takeaway:** Friction direction always opposes the actual or impending motion — when switching from \"about to slide up\" to \"about to slide down,\" friction flips direction.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In the inequality warm-up, after finding $3 < \\sqrt{n} < 4$, we squared to get $9 < n < 16$. Why is it valid to square all parts of this inequality when the terms are positive? What would go wrong if we squared when terms could be negative? (2 steps)", "answer": "- Step 1: Since $\\sqrt{n}$ is always positive (principal square root), and we have $3 < \\sqrt{n} < 4$, all parts are strictly positive. For positive numbers, the squaring function is strictly increasing: if $a < b$ with $a, b > 0$, then $a^2 < b^2$.\n- Step 2: If we had $-4 < \\sqrt{n} < 3$, we couldn't square directly because squaring loses sign information. For example, $-4 < x < 3$ doesn't imply $16 < x^2 < 9$. The inequality would flip or give incorrect results because squaring is not monotonic over negative numbers. Always check that your inequality bounds are all positive before squaring.\n\n**Takeaway:** Only square inequalities when all parts are known to be positive — otherwise you lose information about the signs.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In the moments problem, we used $g = 9.8$ implicitly when calculating $W = 300$ N. Why does $g$ cancel out of the moment equations, and what does this tell us about the weight calculation? (2 steps)", "answer": "- Step 1: In moment equations, we have terms like $150 \\times 1.26$ (force × distance). The weight $W$ appears as $W \\times x$ (weight = mass × $g$, so $W = mg$, making the moment $mg \\times x$). When we set up equations, $g$ appears in every $W$ term.\n- Step 2: When we divided the two equations to eliminate $W$, the $g$ factor cancelled because $W$ had the same $g$ in both scenarios. This is why we got $W = 300$ N directly without using $g$. If you kept $g$ explicitly, you'd have $W \\cdot x = 150 \\times 1.26$ giving $W = \\frac{189}{x}$, and $x$ doesn't depend on $g$ either. The result works for any $g$ because the moment equilibrium depends on force ratios, not absolute $g$ values (as long as $g$ is the same in both scenarios).\n\n**Takeaway:** In moments problems with the same object in both scenarios, $g$ often cancels — but keep it in your working until you're sure.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the collision impulse calculation, we computed $I = m(v_B - u_B) = m(1.5 - (-1.5)) = 3m$. Explain why we use $u_B = -1.5$ rather than $u_B = 1.5$, and what would happen to the impulse magnitude if we got the sign wrong. (2 steps)", "answer": "- Step 1: We set A's initial direction as positive. Since B moves toward A (opposite direction), B's initial velocity $u_B$ must be negative: $u_B = -1.5$ m/s. The sign convention we established at the start must be applied consistently.\n- Step 2: If we incorrectly used $u_B = +1.5$, we'd get $I = m(1.5 - 1.5) = 0$, which is clearly wrong (there was a collision, so there must be an impulse). Or if we used $u_B = +1.5$ but kept $v_B = -1.5$, we'd get $I = m(-1.5 - 1.5) = -3m$, magnitude 3m — but this would imply B continued in the same direction, contradicting the rebound scenario. Consistent sign convention is essential.\n\n**Takeaway:** Sign errors in initial velocity propagate through the entire momentum and impulse calculations — always apply your chosen convention uniformly.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "The train problem states that stations A and B are 4.8 km apart. What is a common error students make with this number, and why does it matter for the calculation? (2 steps)", "answer": "- Step 1: The common error is forgetting to convert 4.8 km to meters: 4.8 km = 4800 m. Some students use 4.8 directly in the area formula, treating it as if it were in meters.\n- Step 2: If you use 4.8 in the equation $4800 = \\frac{1}{2}(3T + 360) \\times 20$, you'd get $3T + 360 = 0.48$, giving a negative time. The units must match: the area formula gives distance in meters (speed in m/s × time in s), so the total distance must also be in meters. Harry specifically called this out as a \"very common mistake.\"\n\n**Takeaway:** Always check unit consistency — convert km to m, minutes to seconds, before substituting into formulas.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the trapezium area calculation, the \"bottom\" parallel side was $3T + 180$, not $T + 180 + 2T$. These are the same expression. Why might writing it in different forms lead to different (possibly wrong) calculations? (2 steps)", "answer": "- Step 1: Both expressions simplify to $3T + 180$, so mathematically they're identical. However, writing $T + 180 + 2T$ explicitly shows the three phases: acceleration $T$, constant speed 180, deceleration $2T$.\n- Step 2: The error comes from misplacing the phases. If you think constant speed is 180 and deceleration is $T$, you'd write $T + 180 + T = 2T + 180$, which is wrong. Writing the expanded form helps you verify each phase is in the right place. Harry's advice was to be careful where you measure time from — writing out each phase explicitly helps catch these placement errors.\n\n**Takeaway:** Write time intervals explicitly (acceleration phase + constant speed phase + deceleration phase) to verify your structure before simplifying.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In the moments question, we drew reaction arrows \"coming out of the rod.\" Why is this convention clearer than drawing them pressing into the rod? (2 steps)", "answer": "- Step 1: The normal reaction is an upward force on the rod from the support (and downward on the support from the rod, by Newton's third law). Drawing arrows coming out of the rod (pointing upward) makes it clear this is the force the rod experiences.\n- Step 2: When taking moments, you care about the force on the rod, not the force on the support. Drawing arrows coming out keeps your moment calculations consistent — you're always taking moments of forces acting ON the rod. Pressing arrows into the rod can cause confusion about which object you're analyzing, leading to sign errors in moment equations.\n\n**Takeaway:** Draw forces acting ON the body you're analyzing — for the rod, draw arrows outward from the rod surface.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In Q8 part (c), the parcel does not remain at rest when the 18 N force is removed because maximum friction (5.09 N) is less than the weight component down the slope (9.8 N). Explain how we know the parcel slides DOWN, not up, and what determines the direction of motion when a body is released on an incline. (2 steps)", "answer": "- Step 1: With the pulling force removed, the only forces along the slope are: weight component down the slope ($2g\\sin 30^\\circ = 9.8$ N) pulling down, and friction up the slope (maximum $0.3 \\times 2g\\cos 30^\\circ \\approx 5.09$ N). Since $9.8 > 5.09$, the net force is down the slope, so the parcel accelerates down.\n- Step 2: The direction of motion (or impending motion) is determined by which component is larger: weight down the slope versus friction up the slope. If weight component > max friction, it slides down. If friction > weight component, it would stay at rest or slide up (if pushed). Friction can only oppose, not reverse, the direction things would naturally go.\n\n**Takeaway:** Compare weight component ($mg\\sin\\theta$) with maximum friction ($\\mu mg\\cos\\theta$) — the larger wins, determining direction.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Harry mentioned that the acceleration was \"twice the magnitude of the deceleration\" in the train problem. If instead the problem stated the acceleration time equals the deceleration time, how would the trapezium shape change? (2 steps)", "answer": "- Step 1: If acceleration time = deceleration time (both $T$), the trapezium would become an isosceles triangle on top of a rectangle. The \"top\" would still be the constant-speed phase (180 s), but the descending slope would be the same steepness as the ascending slope.\n- Step 2: The time markers would be: $T$ (end of acceleration), $T + 180$ (end of constant speed), and $2T + 180$ (end of deceleration). The bottom parallel side would be $2T + 180$. This is different from the original where deceleration was $2T$, giving bottom side $3T + 180$. The trapezium would be more symmetric.\n\n**Takeaway:** \"Acceleration time equals deceleration time\" gives symmetric rising and falling slopes — \"acceleration is twice deceleration\" gives asymmetric slopes.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "When solving collision problems, what information does the phrase \"direction of motion of A is unchanged\" give you that allows you to set up the problem? Why is this crucial? (2 steps)", "answer": "- Step 1: \"Unchanged\" means A continues moving in the same direction after collision as before. Combined with our sign convention (A's direction = positive), this tells us $v_A > 0$ after collision.\n- Step 2: Without this information, we wouldn't know whether A rebounded (negative $v_A$) or continued forward. It lets us set up the relationship between A's and B's post-collision speeds. In Q2, this allowed us to say $v_B = v_A + 1$ (since B must be faster to have a difference of 1, and both move in A's direction). Without this constraint, we'd have ambiguity in our variable setup.\n\n**Takeaway:** Keywords like \"unchanged,\" \"reverses,\" \"rebound\" give critical information about post-collision velocity signs — always extract these constraints before setting up equations.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In the inequality warm-up, we solved $|2\\sqrt{n} - 7| < 1$ to get $9 < n < 16$. If the problem asked for integer values of $n$, why is it incorrect to include $n = 9$ or $n = 16$ in the solution set? (2 steps)", "answer": "- Step 1: The original inequality is strict: $|2\\sqrt{n} - 7| < 1$. At $n = 9$, $\\sqrt{n} = 3$, so $2\\sqrt{n} - 7 = 6 - 7 = -1$, giving $|-1| = 1$, which equals 1, not less than 1. Similarly at $n = 16$, $\\sqrt{n} = 4$, so $2\\sqrt{n} - 7 = 8 - 7 = 1$, giving $|1| = 1$.\n- Step 2: Since the inequality is $<$ (not $\\leq$), the endpoints where the expression equals exactly 1 are excluded. The solution set is strictly $9 < n < 16$, meaning $n$ must be strictly between 9 and 16. This is why we count integers 10, 11, 12, 13, 14, 15 (six integers), not including 9 or 16.\n\n**Takeaway:** Match your inequality type: $<$ excludes endpoints, $\\leq$ includes them. Always test boundary values to confirm.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In the moments problem, the distances were given as $AC = 0.24$ m and $DB = 0.36$ m. Why did we need to calculate $1.5 - 0.36 = 1.14$ for the position of D, and how does this affect the distance calculation in scenario 2? (2 steps)", "answer": "- Step 1: The distance $DB = 0.36$ m is measured from D to the end B. Since total length is 1.5 m, D is $1.5 - 0.36 = 1.14$ m from A (the start). We need exact positions to calculate distances from each support to the center of mass.\n- Step 2: In scenario 2 (tilting about D), we needed the distance from D to the center of mass. With the center at $0.24 + x$ from A, and D at 1.14 m from A, the distance is $1.14 - (0.24 + x) = 0.9 - x$. This is why the second equation has $(0.9 - x)W$, not just $xW$. Using the wrong distance (like $x$ instead of $0.9 - x$) would give a completely wrong answer.\n\n**Takeaway:** Convert all given distances to positions from a common reference (like point A) before calculating inter-point distances.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "When resolving forces on an inclined plane, the weight $mg$ is resolved into components $mg\\sin\\theta$ (parallel to plane) and $mg\\cos\\theta$ (perpendicular to plane). Why is it that $\\sin$ goes with the parallel component and $\\cos$ with the perpendicular? (2 steps)", "answer": "- Step 1: Consider a right triangle formed by the vertical weight, the perpendicular to the plane, and the line parallel to the plane. The angle between the weight (vertical) and the perpendicular to the plane equals the plane's angle $\\theta$ (since the perpendicular is at $90^\\circ$ to the plane, and the plane is at $\\theta$ to horizontal).\n- Step 2: In this triangle, the component of weight perpendicular to the plane is the adjacent side to angle $\\theta$, so it's $mg\\cos\\theta$. The component parallel to the plane is the opposite side to angle $\\theta$, so it's $mg\\sin\\theta$. The mnemonic is: for a small angle $\\theta$, $\\sin\\theta$ is small, so the \"down slope\" push is small (easier to hold) — this matches intuition.\n\n**Takeaway:** Weight component parallel = $mg\\sin\\theta$, perpendicular = $mg\\cos\\theta$ — think of small angles: less steep → less \"down slope\" push.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the collision problem, we used the equation $m_A u_A + m_B u_B = m_A v_A + m_B v_B$. What physical principle does this express, and under what conditions is it valid? (2 steps)", "answer": "- Step 1: This is the Principle of Conservation of Linear Momentum (PCLM). It states that in a closed system with no external forces, the total momentum before an event equals the total momentum after.\n- Step 2: For collisions, this applies when there's no external impulse — in textbook problems, this means a \"smooth\" surface (no friction) and no other external forces acting during the collision. The collision itself is an internal force between the two particles, so momentum is conserved. This principle fails if external impulses occur (e.g., if a third object hit during the collision, or friction acted during impact).\n\n**Takeaway:** PCLM applies when no external impulses act during the interaction — \"smooth\" surfaces and isolated systems are the assumptions.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Harry emphasized labeling your answers — \"speed of A\" and \"speed of B\" next to numerical values. Why do examiners penalize unlabeled answers, and what's the worst-case scenario? (2 steps)", "answer": "- Step 1: Examiners need to verify that you've found what was asked. If a question asks for two speeds and you write \"$1.5$ and $3$\" without specifying which is which, the examiner can't tell if you mixed them up. Since both might be plausible, they can't award the mark.\n- Step 2: The worst case is when one answer is negative and one positive (or one is the impulse on A and one on B). Without labels, the examiner can't know which you intended as which. Harry noted this explicitly: \"Two values without labels can cost the mark.\" It's a simple fix: write \"speed of A = 1.5 m/s\" and \"speed of B = 3 m/s.\"\n\n**Takeaway:** Always label your final answers — it's a cheap way to ensure you get marks you've earned.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In the trapezium calculation, we found $T = 40$ seconds and acceleration $a = 0.5$ m/s². If the distance between stations had been 9.6 km (double), but all other information stayed the same, what would change? (2 steps)", "answer": "- Step 1: Doubling the distance to 9600 m would change the equation: $9600 = \\frac{1}{2}(3T + 360) \\times 20 = 10(3T + 360)$. So $960 = 3T + 360$, giving $3T = 600$, so $T = 200$ seconds.\n- Step 2: The acceleration would then be $a = \\frac{20}{200} = 0.1$ m/s². Doubling the distance doesn't double $T$ linearly because the shape of the trapezium changes (the constant-speed phase stays at 180 s, but the acceleration/deceleration phases grow much longer). The relationship isn't simply proportional.\n\n**Takeaway:** Distance affects the trapezium area — the equation must be re-solved. Don't assume linear scaling.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the moments problem, we took moments about C in scenario 1 and about D in scenario 2. Could we have taken moments about the same point in both scenarios? What would be the disadvantage? (2 steps)", "answer": "- Step 1: Yes, you could take moments about C in both scenarios. In scenario 2, taking moments about C would include both $R_C$ and $W$ terms, giving a more complex equation.\n- Step 2: The disadvantage is that you'd have both unknown reactions in scenario 2 (since $R_C \\neq 0$ when tilting about D). You'd have to solve for both $W$ and $R_C$, then use equilibrium to find $x$. By choosing the pivot at the point where the reaction is zero in each scenario, you eliminate that unknown immediately. That's why we take moments about C when $R_D = 0$, and about D when $R_C = 0$.\n\n**Takeaway:** Choose different pivots in different scenarios to eliminate different unknowns — this is the strategic advantage of multi-scenario moments problems.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In the inclined plane problem, the normal reaction was calculated as $R \\approx 5.40$ N. If the pulling force were applied at an angle BELOW the plane (instead of above), how would this change the perpendicular equation? (2 steps)", "answer": "- Step 1: If the force is below the plane (angled downward into the surface), its perpendicular component would push INTO the plane, ADDING to the normal reaction rather than reducing it.\n- Step 2: The perpendicular equation would become: $R = W\\cos 30^\\circ + 18\\sin 40^\\circ$ (the $+$ sign because the force component adds to $R$). This would give a larger $R$, hence larger maximum friction $F = \\mu R$, which would affect the parallel equation and likely reduce the acceleration up the slope.\n\n**Takeaway:** The sign of the perpendicular force component depends on whether it points away from or into the plane — this determines whether it adds to or subtracts from $R$.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "If the train in Q1 had zero constant-speed phase (it accelerated straight to maximum speed and then decelerated to rest), what would the velocity-time graph look like and how would you calculate the total time? (2 steps)", "answer": "- Step 1: The graph would be a triangle with base spanning the total time and height at the maximum speed. The area would be $\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times t_{\\text{total}} \\times 20 = 4800$ m.\n- Step 2: Solving: $t_{\\text{total}} = \\frac{4800 \\times 2}{20} = 480$ seconds. Since acceleration is twice deceleration and they sum to the total time, we have $T + 2T = 480$, so $3T = 480$, giving $T = 160$ seconds (acceleration time), $2T = 320$ seconds (deceleration time).\n\n**Takeaway:** No constant-speed phase → triangular graph. Use triangle area formula $\\frac{1}{2}bh$ and the acceleration-deceleration ratio to solve.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In the collision problem, we found speeds $\\frac{1}{2}$ and $\\frac{3}{2}$ m/s. If the masses were equal (both $m$), rather than in a 3:1 ratio, what would happen to the collision outcome assuming the same initial speeds? (2 steps)", "answer": "- Step 1: With equal masses and initial speeds $u_A = 1.5$, $u_B = -1.5$, conservation of momentum gives: $m(1.5) + m(-1.5) = m(v_A) + m(v_B)$, so $0 = v_A + v_B$. If A's direction is unchanged, $v_A = 1.5$, so $v_B = -1.5$.\n- Step 2: In this case, they would simply exchange velocities — A continues at 1.5, B rebounds at 1.5 in the opposite direction. The speed difference would be 3 m/s, not 1 m/s. With equal masses in a direct elastic collision, they exchange velocities. The 3:1 mass ratio in the actual question created the specific 1:3 final speed ratio.\n\n**Takeaway:** Equal masses → velocity exchange in direct collisions. Mass ratio determines how velocities redistribute.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "In the inclined plane problem, we computed acceleration as approximately 1.2 m/s². If the coefficient of friction were doubled from 0.3 to 0.6, what would happen to the acceleration? Would it halve, more than halve, or less than halve? (2 steps)", "answer": "- Step 1: Doubling $\\mu$ from 0.3 to 0.6 doubles the friction force (since $F = \\mu R$ and $R$ stays roughly the same — actually $R$ changes slightly because the perpendicular component changes slightly with different friction).\n- Step 2: More friction means less net force up the slope, so acceleration decreases. It would more than halve because friction is a larger portion of the driving force. With $\\mu = 0.3$, friction was about 1.62 N out of driving force around 18 cos 40° ≈ 13.8 N. Doubling friction to ~3.24 N significantly reduces the net force. Exact calculation needed, but qualitatively: more than halve.\n\n**Takeaway:** Doubling $\\mu$ doesn't simply halve acceleration — the relationship is through the net force, and friction's share matters.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Harry said to \"box and label your key equations (A), (B)\" as a good habit. What practical benefits does this provide when solving multi-equation problems? (2 steps)", "answer": "- Step 1: Boxing equations makes them stand out for the examiner to mark — they can quickly see your setup. Labeling them (A), (B) lets you reference them in your working: \"dividing (A) by (B)...\"\n- Step 2: When you make mistakes, the examiner can see exactly where and potentially award method marks even if the final answer is wrong. It also helps you track which equation is which when doing algebraic manipulation — \"substituting (A) into (B)\" is clearer than \"substituting the first equation into the second.\" Harry called this \"a really good habit.\"\n\n**Takeaway:** Box and label equations for examiner clarity and to track your algebraic steps systematically.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In the train problem, the deceleration was calculated as 0.25 m/s². If the train decelerated twice as fast (0.5 m/s²), what would happen to the total journey time? (2 steps)", "answer": "- Step 1: With deceleration doubling to 0.5 m/s², the deceleration time would halve: from 80 seconds to 40 seconds (since time = change in velocity / deceleration = 20 / 0.5 = 40 s).\n- Step 2: The total time becomes: acceleration $T = 40$ s + constant speed 180 s + deceleration 40 s = 260 s (was 40 + 180 + 80 = 300 s). So the total time decreases by 40 seconds. The distance stays the same, but the journey is faster because less time is spent decelerating.\n\n**Takeaway:** Faster deceleration reduces total time by reducing the deceleration phase duration, for the same speed change.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In the moments problem, we found $W = 300$ N. If the branch were uniform (center of mass at the midpoint), what would $x$ equal, and what moment equation would result? (2 steps)", "answer": "- Step 1: For a uniform rod, the center of mass is at the midpoint, 0.75 m from A. Since C is at 0.24 m from A, the distance $x$ from C to the center would be $0.75 - 0.24 = 0.51$ m.\n- Step 2: Plugging into equation (A): $W \\times 0.51 = 150 \\times 1.26 = 189$, so $W = \\frac{189}{0.51} \\approx 371$ N. In scenario 2: $225 \\times 0.36 = (0.9 - 0.51)W = 0.39W$, giving $W = \\frac{81}{0.39} \\approx 208$ N. These don't match, confirming the rod is NOT uniform — that's why we had to solve for both $W$ and $x$.\n\n**Takeaway:** If the rod were uniform, $x$ would be the distance from C to the midpoint. The mismatch between calculated $W$ values confirms non-uniformity.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In the collision problem, the impulse was found to be $3m$ Ns. If the question asked for the impulse on A instead of B, what would be different in the calculation? (2 steps)", "answer": "- Step 1: For A, impulse = change in momentum = $m_A v_A - m_A u_A = 3m(\\frac{1}{2}) - 3m(1.5) = \\frac{3m}{2} - \\frac{9m}{2} = -\\frac{6m}{2} = -3m$ Ns.\n- Step 2: The magnitude would still be $3m$ Ns (same as B by Newton's third law — impulses between the two particles are equal and opposite). The sign would be negative because A's momentum decreased (it slowed down). If asked for impulse \"on A,\" you could give $-3m$ (indicating direction) or $3m$ (magnitude), depending on whether the question asked for magnitude or the vector impulse.\n\n**Takeaway:** Impulses on the two particles in a collision are equal in magnitude and opposite in direction — Newton's third law at work.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the inclined plane problem, the pulling force of 18 N at $40^\\circ$ was resolved into components $18\\cos 40^\\circ$ (parallel) and $18\\sin 40^\\circ$ (perpendicular). Why does the parallel component use cos and the perpendicular use sin? (2 steps)", "answer": "- Step 1: The force makes a $40^\\circ$ angle with the plane. In the right triangle formed by the force and its components, the component PARALLEL to the plane is the ADJACENT side to angle $40^\\circ$, so it's $18\\cos 40^\\circ$. The component PERPENDICULAR to the plane is the OPPOSITE side, so it's $18\\sin 40^\\circ$.\n- Step 2: This is the reverse of how weight is resolved (where $\\sin$ gives parallel). The key is: what angle does the force make with the plane? Use cos for the component along the plane (adjacent), sin for the component perpendicular to the plane (opposite). For weight, the angle between weight (vertical) and the perpendicular is the plane angle $\\theta$, so weight's parallel component is $mg\\sin\\theta$. But for a force at angle $\\alpha$ to the plane, use $\\cos\\alpha$ for parallel (adjacent to $\\alpha$).\n\n**Takeaway:** For a force at angle $\\alpha$ to the plane: parallel component = $F\\cos\\alpha$, perpendicular = $F\\sin\\alpha$.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In the train problem, if the acceleration and deceleration were equal in magnitude, how would you find T from the distance equation? (2 steps)", "answer": "- Step 1: With equal acceleration and deceleration magnitudes, the time for acceleration = time for deceleration = $T$. The constant speed phase is 180 s. Total time = $T + 180 + T = 2T + 180$.\n- Step 2: The trapezium has parallel sides: top = 180, bottom = $2T + 180$, height = 20. Area: $\\frac{1}{2}(180 + 2T + 180)(20) = \\frac{1}{2}(2T + 360)(20) = 10(2T + 360) = 20T + 3600$. Set equal to 4800: $20T + 3600 = 4800$, so $20T = 1200$, giving $T = 60$ seconds. (In the actual problem with $a = 2d$, we got $T = 40$.)\n\n**Takeaway:** Equal acceleration and deceleration → both take time T, total time = 2T + constant phase. Solve the area equation as usual.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the collision problem, we solved $3m = 4mv + m$ to get $v = \\frac{1}{2}$. Walk through the algebra step by step, explaining each simplification. (2 steps)", "answer": "- Step 1: Starting with $3m = 4mv + m$: subtract $m$ from both sides: $3m - m = 4mv$, so $2m = 4mv$. Divide both sides by $m$ (assuming $m \\neq 0$): $2 = 4v$.\n- Step 2: Divide by 4: $v = \\frac{2}{4} = \\frac{1}{2}$. The $m$ cancelled because it appeared in every term — it's a common factor. We can divide by $m$ (non-zero mass) and divide by 4 to isolate $v$. Final answer: $v = \\frac{1}{2}$ m/s. Note: in the actual question with initial speed 1.5, the result was $v = \\frac{1}{2}$ (which is 0.5 m/s), not $\\frac{1}{2}$ of 1.5.\n\n**Takeaway:** Cancel common factors early to simplify algebra. The mass $m$ cancels because it's in every term of the momentum equation.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In the inclined plane problem, the normal reaction was calculated as $R = 2g\\cos 30^\\circ - 18\\sin 40^\\circ \\approx 5.40$ N. What would happen if the $18\\sin 40^\\circ$ term were larger than $2g\\cos 30^\\circ$? What would this mean physically? (2 steps)", "answer": "- Step 1: If $18\\sin 40^\\circ > 2g\\cos 30^\\circ$, then $R$ would be negative. Since normal reaction is a pushing force that can only act away from the surface (it can't pull), we would get $R = 0$ physically — the parcel would lose contact with the plane.\n- Step 2: This would mean the pulling force is so strong it lifts the parcel off the surface entirely. In that case, you'd set $R = 0$ and friction would be zero (no contact). The parcel would be in free flight along the direction of the pull, not on the plane at all. This is why checking that $R > 0$ is important — negative $R$ indicates you've exceeded the lifting condition.\n\n**Takeaway:** Normal reaction cannot be negative — if your calculation gives $R < 0$, it means the object loses contact with the surface.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "Harry mentioned that Phuc's initial approach to the inequality involved writing two separate inequalities. Why is the single chain $-1 < 2\\sqrt{n} - 7 < 1$ faster and less error-prone than splitting into two cases? (2 steps)", "answer": "- Step 1: Splitting into two cases means solving $2\\sqrt{n} - 7 < 1$ AND $-(2\\sqrt{n} - 7) < 1$, giving two separate inequalities to solve, then combining their solutions. That's more work.\n- Step 2: The single chain $-1 < 2\\sqrt{n} - 7 < 1$ treats it as one compound inequality. You add 7 to all three parts and divide all three parts by 2 in one go. Same result, fewer steps, fewer places to make sign errors. Harry steered Phuc toward the single chain \"via the number-line picture\" — visualizing $|x| < k$ as the region between $-k$ and $k$ makes this natural.\n\n**Takeaway:** For $|X| < k$, use the compound inequality $-k < X < k$ rather than splitting into cases — it's more efficient.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "In the moments problem, we divided equation (A) by equation (B) to eliminate W. What would happen if we subtracted one equation from the other instead? Would it be easier or harder? (2 steps)", "answer": "- Step 1: Subtracting: $189 - 81 = Wx - (0.9 - x)W$, giving $108 = Wx - 0.9W + xW = 2xW - 0.9W$. This still has both $W$ and $x$, so we haven't eliminated anything.\n- Step 2: We'd still need another relationship to solve. Division specifically targeted eliminating $W$ because it appeared as a factor in both numerators. Subtraction gives an equation that still has both unknowns — it's less powerful here. Division (or multiplication to clear denominators) is the strategic choice when you want to eliminate a common factor.\n\n**Takeaway:** Choose algebraic operations strategically — division eliminates common factors; subtraction doesn't.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "In the train velocity-time graph, the acceleration was 0.5 m/s². If the maximum speed were doubled to 40 m/s but all other information stayed the same, what would T become? (2 steps)", "answer": "- Step 1: With $v_{\\text{max}} = 40$ m/s, the equation becomes $4800 = \\frac{1}{2}(3T + 360) \\times 40 = 20(3T + 360)$. So $4800 = 60T + 7200$, giving $60T = -2400$, which is impossible (negative time).\n- Step 2: This tells us that with a faster maximum speed, we could cover the 4.8 km distance faster — but the current time structure (acceleration phase + 180s constant + deceleration) can't accommodate this. To make it possible, either the distance must increase, the constant speed phase must decrease, or the acceleration/deceleration ratio must change. The current problem setup doesn't allow $v_{\\text{max}} = 40$ with the same distance.\n\n**Takeaway:** Not all values are possible within a given problem structure — negative time indicates an impossible scenario.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "In the collision problem, after finding $v_A = \\frac{1}{2}$ and $v_B = \\frac{3}{2}$, we could check our answer using the impulse on each particle. How would this check work? (2 steps)", "answer": "- Step 1: Impulse on A = change in momentum = $3m(\\frac{1}{2}) - 3m(1.5) = \\frac{3m}{2} - \\frac{9m}{2} = -\\frac{6m}{2} = -3m$. Impulse on B = $m(\\frac{3}{2}) - m(-1.5) = \\frac{3m}{2} + \\frac{3m}{2} = 3m$.\n- Step 2: The impulses are equal in magnitude (3m) and opposite in sign/direction. This is required by Newton's third law — the mutual impulse during collision is equal and opposite for the two particles. If your impulses don't match in magnitude (with opposite signs), something is wrong with your momentum conservation or velocity setup.\n\n**Takeaway:** Use Newton's third law to check: impulse on A + impulse on B = 0. Equal magnitude, opposite direction.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "In the inclined plane problem, we assumed the parcel accelerates up the slope. If instead the parcel were accelerating DOWN the slope, what would be different in our approach? (2 steps)", "answer": "- Step 1: If accelerating down, the pulling force (18 N) would either be smaller than the weight component plus friction, or would be pushing down the slope. The friction direction would flip (now acting up the slope, opposing the motion).\n- Step 2: In the parallel equation, we'd have: $W\\sin\\theta - F - P\\cos\\theta = ma$ (if $P$ is still pulling up but not hard enough), with $a$ now positive in the down-slope direction. Or if $P$ is removed entirely and it's just gravity vs friction: $W\\sin\\theta - F = ma$ down the slope. The key changes: friction direction reverses, and the sign of $ma$ term changes based on which direction we define as positive.\n\n**Takeaway:** Always define a positive direction explicitly (e.g., \"up the slope\") and ensure all force terms and the acceleration $a$ follow that convention consistently.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "The trapezium area formula is $\\frac{1}{2}(a+b)h$. If you mistakenly used just $\\frac{1}{2}bh$ (ignoring $a$), what would be the result? How does this connect to the \"off-by-one\" error in counting? (2 steps)", "answer": "- Step 1: Using $\\frac{1}{2}bh$ instead of $\\frac{1}{2}(a+b)h$ is like using only one parallel side — you'd get the area of a triangle, not a trapezium. This would underestimate the area (unless one side were zero, which it isn't).\n- Step 2: The connection to \"off-by-one\" is conceptual: forgetting the $\\frac{1}{2}$ is analogous to forgetting to add 1 when counting integers — both are common slip-ups where a factor gets dropped. The trapezium has two parallel sides because there are two distinct velocity/time segments to account for; ignoring one gives an incomplete picture.\n\n**Takeaway:** The full trapezium formula with both $(a+b)$ accounts for the entire shape — dropping either part is a systematic error, not just a slip.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "In the collision problem, the final speed of A was 0.5 m/s. If A had been much heavier (say 30m instead of 3m), what would happen to the final speeds? (2 step)", "answer": "- Step 1: With $m_A = 30m$, the momentum equation becomes: $30m(1.5) + m(-1.5) = 30m(v_A) + m(v_B)$, so $45m - 1.5m = 30m v_A + m v_B$, giving $43.5m = 30m v_A + m v_B$. With $v_B = v_A + 1$: $43.5m = 30m v_A + m(v_A + 1) = 31m v_A + m$.\n- Step 2: Solving: $42.5m = 31m v_A$, so $v_A = \\frac{42.5}{31} \\approx 1.37$ m/s, and $v_B \\approx 2.37$ m/s. A barely slows down (stays positive direction), B gets pushed forward faster. The heavy mass dominates the post-collision behavior — it barely loses speed while the light mass gets thrown forward.\n\n**Takeaway:** In collisions, heavier objects are less affected (smaller velocity change), lighter objects experience larger velocity changes.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "In the train problem, the distance was 4.8 km. If we kept the same T = 40 seconds and same constant-speed time, but increased the distance slightly, what would be the first thing to change in our solution? (2 steps)", "answer": "- Step 1: With distance increasing but same time structure, the constant speed phase would have to be longer — the trapezium would get \"stretched\" horizontally in the constant-speed region.\n- Step 2: The equation $4800 = \\frac{1}{2}(3T + 360) \\times 20$ would have a larger left side, and the solution for $T$ would change, or more likely, the constant 180 would change. Since $T$ is determined by the acceleration/deceleration ratio (given in the problem), the extra distance must be absorbed by extending the constant-speed phase.\n\n**Takeaway:** Distance changes affect the area, which changes the time dimensions — the constant phase usually absorbs distance changes in this problem type.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "In the inclined plane problem, the acceleration was approximately 1.2 m/s². If $g$ were 10 m/s² instead of 9.8, how much would the acceleration change? Would it be exactly proportional? (2 steps)", "answer": "- Step 1: Using $g = 10$: perpendicular: $R = 2(10)\\cos 30^\\circ - 18\\sin 40^\\circ = 20(0.866) - 18(0.643) = 17.32 - 11.57 = 5.75$ N. Friction: $F = 0.3 \\times 5.75 = 1.725$ N.\n- Step 2: Parallel: $18\\cos 40^\\circ - 1.725 - 2(10)\\sin 30^\\circ = 13.79 - 1.725 - 10 = 2.065$ N. Then $a = 2.065/2 = 1.0325$ m/s². With $g = 9.8$, we got ~1.18 m/s². The change is not exactly proportional because $g$ appears in both $R$ and in the weight component, and friction (which depends on $R$) also changes. It's approximately proportional but not exact.\n\n**Takeaway:** Changing $g$ affects multiple terms (weight components, normal reaction, friction) — the effect on acceleration is not simply proportional.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In the momentum equation, we had terms like $m_A u_A$ and $m_B u_B$. Why is it valid to use mass times velocity, and what does this product physically represent? (A: 2 steps)", "answer": "- Step 1: $p = mv$ is the definition of linear momentum. It's a vector quantity (direction matters), with units kg·m/s (or N·s). The momentum of a particle is its \"quantity of motion\" — both mass and velocity contribute.\n- Step 2: In collisions, total momentum is conserved because the collision forces are internal (Newton's third law: equal and opposite, acting for equal time, so net impulse is zero). This is why $m_A u_A + m_B u_B = m_A v_A + m_B v_B$ holds — the total \"quantity of motion\" before equals after, provided no external impulses act during the collision.\n\n**Takeaway:** Momentum = mass × velocity. Conservation follows from internal forces being equal and opposite (action-reaction).", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}], "count": 58}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When a question says \"the difference between $$A$$ and $$B$$ is less than $$k$$,\" why is the modulus the right translation, and what does it look like? (3 steps)", "answer": "- Step 1: \"Difference\" is a size — it doesn't tell you which of $$A$$ or $$B$$ is bigger. So you cannot write $$A - B < k$$ alone, because if $$B > A$$ that gives a negative number which is trivially less than $$k$$ but doesn't capture the \"gap.\"\n- Step 2: The size of the gap regardless of sign is $$|A - B|$$. So \"difference less than $$k$$\" becomes $$|A - B| < k$$.\n- Step 3: This unpacks (via the number-line picture of $$|X| < k$$) into the single chain $$-k < A - B < k$$, which is cleaner than splitting into two separate inequalities.\n\nTakeaway: \"difference\" + \"less than\" is a modulus signal; immediately reach for $$|\\cdot| < k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is $$|X| < k$$ equivalent to the chained inequality $$-k < X < k$$, and why is the number-line picture preferable to splitting into two cases? (3 steps)", "answer": "- Step 1: $$|X|$$ is the distance of $$X$$ from $$0$$ on the number line. Saying that distance is less than $$k$$ means $$X$$ lies strictly within $$k$$ units of $$0$$.\n- Step 2: Strictly within $$k$$ of $$0$$ is exactly the open interval $$(-k, k)$$, i.e. $$-k < X < k$$.\n- Step 3: Splitting into \"$$X < k$$ and $$-X < k$$\" gives the same result but doubles the writing and the chance of sign slips; the single chain lets you add/divide/square through all three parts simultaneously.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Count the integers strictly between $$9$$ and $$16$$. Why is the answer $$6$$ and not $$7$$ or $$5$$? (3 steps)", "answer": "- Step 1: \"Strictly between\" excludes the endpoints. So $$9$$ and $$16$$ themselves are not counted.\n- Step 2: The included integers are $$10, 11, 12, 13, 14, 15$$.\n- Step 3: The count is $$15 - 10 + 1 = 6$$. The classic mistake is doing $$15 - 10 = 5$$ (off-by-one) or $$16 - 9 = 7$$ (forgetting strict inequality).\n\nTakeaway: when counting integers in an interval, sketch a number line and remember \"$$+1$$\" for inclusive endpoints.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "When manipulating $$-1 < 2\\sqrt{n} - 7 < 1$$ to isolate $$n$$, which operations are safe to apply to all three parts and which would need care? (3 steps)", "answer": "- Step 1: Adding/subtracting the same number to all three parts is always safe and preserves the inequality.\n- Step 2: Multiplying/dividing by a positive number is safe; by a negative number you must flip both inequality signs.\n- Step 3: Squaring is safe here only because all three parts are positive after the earlier steps (once you reach $$3 < \\sqrt{n} < 4$$, all are $$\\geq 0$$). Squaring across $$0$$ would break monotonicity.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "In a direct collision on a smooth horizontal surface, what is conserved and why does this give a usable equation? (3 steps)", "answer": "- Step 1: Total linear momentum $$\\sum m\\mathbf{v}$$ is conserved when there is no external impulse along the line of motion. \"Smooth\" rules out friction; \"direct\" means the collision force acts only along the line of motion, so internal impulses cancel as a Newton-third-law pair.\n- Step 2: This gives $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$ — one scalar equation linking four velocities.\n- Step 3: It's usable because mass is known, two velocities are usually given, and any further given (e.g. a speed difference, an \"unchanged direction\") closes the system.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why must you fix a positive direction *before* writing the momentum equation, and what would go wrong otherwise? (3 steps)", "answer": "- Step 1: Velocity is a signed quantity — a vector along the line of motion. The momentum equation only makes sense if every velocity is referred to the same axis.\n- Step 2: If you sign each term independently using \"speed in the direction it moves,\" you'll quietly write all positives and lose the cancellation that conservation depends on.\n+ Example: two particles approaching with speeds $$1.5$$ and $$1.5$$ have total momentum $$\\approx 0$$ for equal masses, not $$3m$$.\n- Step 3: Pick one direction $$+$$, write $$u_B = -1.5$$ if $$B$$ moves the other way, and *keep that convention* for after-the-collision velocities too.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "What is the impulse-momentum relation, and why does it apply equally to brief collisions and prolonged forces? (3 steps)", "answer": "- Step 1: $$I = \\int F\\,dt = \\Delta(mv) = mv - mu$$. Impulse is the time-integral of force.\n- Step 2: For a brief collision $$F$$ is huge and $$\\Delta t$$ tiny, but the integral still equals the change in momentum — you don't need to know $$F$$ or $$\\Delta t$$ separately.\n- Step 3: For a steady force over known time, $$I = F\\Delta t$$ directly. Either way the *output* is the same: change in momentum.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "When a question asks for the \"magnitude of the impulse,\" what sign convention should the final answer use? Why? (2 steps)", "answer": "- Step 1: Magnitude means the size of the vector — always non-negative. So even if your signed calculation gives $$-3m$$, the answer to report is $$3m$$.\n- Step 2: Don't decorate the answer with modulus bars in the final line; just state the positive number with units (N s).", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Two particles approach each other with the same speed on a smooth surface. After the collision, $$A$$'s direction is unchanged. What does \"unchanged direction\" tell you about the sign of $$v_A$$ relative to $$u_A$$? (2 steps)", "answer": "- Step 1: It means $$v_A$$ has the same sign as $$u_A$$. If you chose $$A$$'s initial direction as $$+$$, then $$v_A > 0$$.\n- Step 2: It does *not* tell you the magnitude — $$A$$ could be faster or slower, just still travelling forward. The \"difference of speeds = $$1$$\" condition then fixes the magnitude relation.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In a direct collision where $$A$$ is unchanged in direction and $$B$$ rebounds, why is the speed of $$B$$ after written as $$v + 1$$ (where $$v$$ is the speed of $$A$$ after) and not $$v - 1$$? (3 steps)", "answer": "- Step 1: $$B$$ rebounds, so it now moves *with* $$A$$. Both speeds are measured as positive magnitudes in the chosen direction.\n- Step 2: \"Difference between the speeds is $$1$$\" means $$|v_A - v_B| = 1$$. Physically, for $$B$$ to rebound off heavier $$A$$, $$B$$ ends up *faster* than $$A$$.\n+ If you wrote $$v - 1$$, that would put $$A$$ faster, which is inconsistent with the elastic-like rebound geometry.\n- Step 3: Hence speed of $$B$$ after $$= v + 1$$. (You can verify by plugging into PCLM and checking the signs come out consistent.)", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why does the trapezium area on a speed–time graph give *distance*, dimensionally? (3 steps)", "answer": "- Step 1: The vertical axis is speed (m/s) and the horizontal axis is time (s).\n- Step 2: Any area on the graph has units (m/s) × (s) = m.\n- Step 3: So area under the curve = distance travelled. The trapezium formula $$\\tfrac{1}{2}(a+b)h$$ just exploits the geometry of three linear phases (accelerate, cruise, decelerate).", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Why does Harry insist on the trapezium formula $$\\tfrac{1}{2}(a+b)h$$ instead of splitting the v-t graph into two triangles and a rectangle? (2 steps)", "answer": "- Step 1: Triangles + rectangle works mathematically but involves three separate area computations and three opportunities to slip on which times go where.\n- Step 2: The trapezium formula collapses all three into one expression. The parallel sides are *the two horizontal lengths* (top duration and bottom duration), and the height is the common speed. Faster and lower-error.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "On a v-t graph where a train accelerates for $$T$$, cruises for $$180$$ s, and decelerates with magnitude *half* the acceleration, why is the deceleration phase $$2T$$ long, not $$T$$ or $$T/2$$? (3 steps)", "answer": "- Step 1: Acceleration is the *gradient* of the v-t graph. Both phases start/end at the same speeds ($$0$$ to $$20$$, or $$20$$ to $$0$$).\n- Step 2: If acceleration magnitude is double the deceleration magnitude, the up-slope is twice as steep as the down-slope.\n- Step 3: Same change in speed, half the gradient $$\\Rightarrow$$ twice the time. So if the up-phase took $$T$$, the down-phase takes $$2T$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why is the *bottom* parallel side of the trapezium $$3T + 180$$ and not just $$180$$? (3 steps)", "answer": "- Step 1: The trapezium has a horizontal top (the cruise phase, duration $$180$$) and a horizontal bottom (the total time on the time axis).\n- Step 2: The total time is acceleration phase + cruise phase + deceleration phase = $$T + 180 + 2T = 3T + 180$$.\n- Step 3: The bottom of the trapezium runs the full duration of the journey, so its length is the *total* time, not just the cruise time.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why is the \"$$180$$ s constant phase\" marker on the time axis at $$T + 180$$ rather than $$180$$? (2 steps)", "answer": "- Step 1: The cruise begins *after* the acceleration phase ends — at time $$T$$, not time $$0$$.\n- Step 2: So the cruise *ends* at $$T + 180$$. Measuring the $$180$$ from $$0$$ would misplace the entire trapezium and snowball into wrong distance.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A train decelerates uniformly from $$20$$ m/s to rest in $$2T$$ seconds. What's the deceleration in terms of $$T$$, and why does the formula not depend on the direction we measure? (2 steps)", "answer": "- Step 1: Deceleration magnitude = (change in speed) / (time) = $$20 / (2T) = 10/T$$ m/s².\n- Step 2: It's a *magnitude*, so direction doesn't matter; we report the size. The corresponding acceleration on the up-phase is $$20/T$$ — exactly twice, consistent with the problem.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why must you convert $$4.8$$ km to $$4800$$ m *before* using it in an area-of-trapezium equation that contains speeds in m/s? (2 steps)", "answer": "- Step 1: The trapezium formula gives area in units of (m/s)·(s) = m. If you plug in km on one side, the units don't balance and you'll be off by a factor of $$1000$$.\n- Step 2: Always normalise to SI before equating. Harry calls this \"a very common mistake.\"", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A rigid body is in equilibrium. What two conditions must hold, and which one does \"moments\" address? (2 steps)", "answer": "- Step 1: Net force is zero (translational equilibrium) AND net moment about every point is zero (rotational equilibrium).\n- Step 2: \"Taking moments\" addresses the rotational condition. Forces alone don't guarantee equilibrium of an extended body — a couple has zero net force but causes rotation.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why does a force whose line of action passes through your chosen pivot contribute zero moment? (3 steps)", "answer": "- Step 1: Moment $$=$$ force $$\\times$$ perpendicular distance from the pivot to the line of action of the force.\n- Step 2: If the line of action passes *through* the pivot, that perpendicular distance is zero.\n- Step 3: So the moment is $$F \\times 0 = 0$$. This is the trick that lets you kill an unknown reaction by taking moments about its point of application.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A rod rests on two supports at $$C$$ and $$D$$. Why does \"on the point of tilting about $$C$$\" force $$R_D = 0$$? (3 steps)", "answer": "- Step 1: \"On the point of tilting about $$C$$\" means $$C$$ is becoming the pivot and the rod is just about to rotate, with the other end lifting off.\n- Step 2: For the rod to lift off support $$D$$, the contact at $$D$$ is being released. A support can push (positive reaction) but not pull.\n- Step 3: At the critical moment, the contact force at $$D$$ has just dropped to zero — i.e. $$R_D = 0$$. This converts a vague \"about to tilt\" sentence into a hard equation.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why is it cleaner to write moment equations as \"clockwise = anticlockwise\" rather than \"sum to zero\"? (2 steps)", "answer": "- Step 1: \"Sum to zero\" requires you to attach signs to each moment, and a sign error propagates silently.\n- Step 2: \"Clockwise = anticlockwise\" makes you explicitly list each force on the correct side. There are no negative numbers to mishandle, so sign errors essentially vanish.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "A non-uniform rod rests on two supports. You have two scenarios (each \"on the point of tilting\" about a different support) giving two equations $$Wx = 189$$ and $$(0.9 - x)W = 81$$. Why is *dividing* one by the other better than substituting? (3 steps)", "answer": "- Step 1: Both equations contain the product/relationship with $$W$$. Dividing eliminates $$W$$ in one move: $$\\dfrac{Wx}{(0.9-x)W} = \\dfrac{189}{81}$$.\n- Step 2: This collapses to a single equation in $$x$$ alone: $$\\dfrac{x}{0.9 - x} = \\dfrac{189}{81}$$, immediately solvable.\n- Step 3: Substitution would require expressing $$W$$ from one equation and plugging into the other — more algebra, more chances to slip a fraction or a sign.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When taking moments about a pivot $$D$$, why is the distance from $$D$$ to the centre of mass written as $$0.9 - x$$ (not $$x$$) when $$x$$ is defined as the distance from $$C$$ to the centre? (3 steps)", "answer": "- Step 1: $$x$$ is defined *from $$C$$*, not from $$D$$. The distance you need in a moment is from the *pivot*, which is $$D$$.\n- Step 2: $$C$$ and $$D$$ are $$1.5 - 0.24 - 0.36 = 0.9$$ m apart. If the centre is $$x$$ to the right of $$C$$, it's $$0.9 - x$$ to the left of $$D$$ (assuming the centre lies between them).\n- Step 3: Always re-express distances relative to whichever point you've chosen as pivot. Mixing reference points is one of the most common slip sources.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why is choosing a pivot at the location of an *unknown* reaction force a strategic move when taking moments? (2 steps)", "answer": "- Step 1: That reaction passes through your pivot, so its moment is zero and it drops out of the equation.\n- Step 2: You're left with an equation that doesn't involve the unknown reaction, often immediately solvable for another unknown (e.g. weight or centre of mass). Free elimination.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "On a free-body diagram of a rod on two supports, why does Harry insist the reaction arrows be drawn *coming out of* the rod (not into it)? (2 steps)", "answer": "- Step 1: A support can only push the rod, never pull it. The contact force on the rod points away from the support surface — i.e. upward, out of the rod.\n- Step 2: Drawing arrows consistently outward avoids sign confusion and makes the \"clockwise vs anticlockwise\" classification immediate.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why does \"perpendicular to the plane\" mean balanced forces in inclined-plane problems, but \"parallel to the plane\" generally does not? (3 steps)", "answer": "- Step 1: A particle on the surface of the plane cannot accelerate *into* or *out of* the surface — it would either lift off or sink in. So $$a_\\perp = 0$$, forcing perpendicular forces to balance.\n- Step 2: Along the slope, the particle is free to accelerate, so Newton's second law $$F = ma$$ applies with a (possibly nonzero) acceleration.\n- Step 3: This is why you write an *equation* perpendicular but $$F = ma$$ parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why is it wrong to say forces are \"balanced vertically\" on an inclined-plane problem, even if it sounds equivalent? (2 steps)", "answer": "- Step 1: \"Vertical\" means straight up/down with respect to gravity. On a slope, the normal reaction is *not* vertical — it's perpendicular to the plane.\n- Step 2: Forces are balanced perpendicular to the plane (because the motion is along the plane), not vertically. A vertical resolution would mix axes and miss the constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A weight $$mg$$ acts vertically down on a slope of angle $$\\theta$$. How does it split into components along/perpendicular to the slope, and why does the cosine attach to the perpendicular direction? (3 steps)", "answer": "- Step 1: Set up axes along the slope (call it $$x$$) and perpendicular to the slope ($$y$$). The weight points vertically down — at angle $$\\theta$$ from the perpendicular direction (because the slope itself is tilted by $$\\theta$$).\n- Step 2: Projecting onto $$y$$: the weight makes angle $$\\theta$$ with the normal-to-plane direction, so component into the plane $$= mg\\cos\\theta$$.\n- Step 3: Projecting onto $$x$$ (down the slope): the weight makes angle $$(90° - \\theta)$$ with the slope direction, so component along slope $$= mg\\sin\\theta$$. Check limits: $$\\theta \\to 0$$ gives all $$mg$$ into the plane (flat ground); $$\\theta \\to 90°$$ gives all $$mg$$ along the slope (vertical cliff).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "A pulling force of $$18$$ N acts at $$40°$$ *to the slope* (not to the horizontal). How does it split into components, and why does the angle being measured to the slope make $$\\cos 40°$$ go along the slope? (2 steps)", "answer": "- Step 1: The angle is measured from the slope direction. By definition of cosine, the projection onto the slope is $$18\\cos 40°$$ and the projection perpendicular to the slope is $$18\\sin 40°$$.\n- Step 2: The perpendicular component points *away* from the plane (lifting the parcel slightly), so it reduces the normal reaction. This is why $$R = mg\\cos\\theta - 18\\sin 40°$$, not $$+$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Why does pulling a parcel up a slope at an angle to the slope *reduce* the normal reaction, and what does that do to friction? (3 steps)", "answer": "- Step 1: The pulling force has a perpendicular component lifting the parcel slightly off the plane. This decreases the net \"into-plane\" force the plane must support.\n- Step 2: Since $$R + F_\\perp^{\\text{pull}} = mg\\cos\\theta$$, increasing the pull's perpendicular component decreases $$R$$.\n- Step 3: Friction $$F = \\mu R$$ depends linearly on $$R$$. So lifting-direction pulls reduce friction — sometimes substantially. This is why angled pulls are mechanically efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Friction is given by $$F = \\mu R$$. Under what condition is this an *equality* rather than an *inequality*? (3 steps)", "answer": "- Step 1: In general, static friction obeys $$F \\leq \\mu_s R$$ — it provides whatever force is needed up to the limit.\n- Step 2: $$F = \\mu R$$ is the *limiting* value: it holds when the body is actually slipping, or is \"on the point of slipping\" (about to slip).\n- Step 3: If the body is stationary and not on the verge of slipping, $$F$$ takes whatever value balances the other forces, possibly well below $$\\mu R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "A parcel is pulled up a rough incline. Which direction does friction act, and what would change if the parcel were instead sliding down without the pull? (2 steps)", "answer": "- Step 1: Friction always opposes the *motion* (or tendency to move). If the parcel is moving up, friction acts down the slope.\n- Step 2: If the parcel is sliding down (no pull), friction acts up the slope. Same magnitude rule $$F = \\mu
