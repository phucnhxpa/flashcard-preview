al time) = $$5 + T + 10 = T + 15$$. The height (peak speed) = 10 m/s.\n- Step 2: Area = $$\\frac{1}{2}(a + b)h = \\frac{1}{2}(T + (T + 15)) \\times 10 = \\frac{1}{2}(2T + 15) \\times 10 = 5(2T + 15) = 10T + 75$$. Set equal to distance: $$10T + 75 = 250$$, so $$10T = 175$$, giving $$T = 17.5$$ s.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Exercise — A uniform rod of length 2 m and weight 40 N rests on supports at P (0.5 m from left end A) and Q (0.5 m from right end B). A child stands at A. The rod is on the point of tilting about P. Find the child's weight. (2 steps)", "answer": "- Step 1: \"On the point of tilting about P\" means $$R_Q = 0$$. Take moments about P (so $$R_P$$ also has zero moment). The child's weight $$C$$ acts downward at A, which is 0.5 m to the left of P → anticlockwise moment = $$C \\times 0.5$$. The rod's weight 40 N acts at the midpoint (1 m from A), which is 0.5 m to the right of P → clockwise moment = $$40 \\times 0.5 = 20$$ Nm.\n- Step 2: Equilibrium: anticlockwise = clockwise. $$C \\times 0.5 = 20$$, so $$C = 40$$ N. The child must weigh 40 N to make the rod just about to tilt about P (Q losing contact). Note: the child pushes down on A (left of pivot), creating an anticlockwise moment that balances the rod's weight trying to push the right side down.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Exercise — A block of mass 2 kg rests on a rough plane inclined at 30° to the horizontal. The coefficient of friction is 0.25. No external force acts. Does the block stay at rest or slide? (Use $$g = 10$$ m/s² for simplicity.) (3 steps)", "answer": "- Step 1: Find the weight component down the slope: $$mg\\sin\\theta = 2 \\times 10 \\times \\sin 30° = 2 \\times 10 \\times 0.5 = 10$$ N. This is the force trying to make the block slide.\n- Step 2: Find the normal reaction and maximum friction: $$R = mg\\cos\\theta = 2 \\times 10 \\times \\cos 30° = 2 \\times 10 \\times 0.866 \\approx 17.3$$ N. Maximum friction = $$\\mu R = 0.25 \\times 17.3 \\approx 4.3$$ N.\n- Step 3: Compare: $$mg\\sin\\theta = 10$$ N > $$\\mu R \\approx 4.3$$ N. Friction cannot hold the block, so it slides down the slope. The key insight: even with friction present, the weight component down the slope can exceed what friction can resist — friction has a maximum ($$\\mu R$$), and it's not always enough.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}], "count": 48}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "The phrase \"the difference between $$2\\sqrt{n}$$ and $$7$$ is less than $$1$$\" translates to a specific mathematical structure. Why is a modulus (absolute value) the correct way to represent \"difference\" here, rather than just writing $$2\\sqrt{n} - 7 < 1$$? (2 steps)", "answer": "- Step 1: The word \"difference\" refers to the size of the gap between two values, regardless of which one is larger. Mathematically, the distance between $$a$$ and $$b$$ on a number line is $$|a - b|$$.\n- Step 2: If we only wrote $$2\\sqrt{n} - 7 < 1$$, we would be assuming $$2\\sqrt{n}$$ is strictly larger than 7. However, if $$2\\sqrt{n}$$ were smaller than 7, the difference would be $$7 - 2\\sqrt{n}$$. The modulus $$|2\\sqrt{n} - 7| < 1$$ captures both scenarios automatically.\n\nTakeaway: \"Difference\" in mechanics or maths word problems almost always signals a modulus inequality.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "Given the modulus inequality $$|X| < k$$ where $$k > 0$$, how do you convert this into a standard compound inequality, and what visual tool makes this conversion intuitive? (2 steps)", "answer": "- Step 1: The expression $$|X| < k$$ means that the distance of $$X$$ from 0 is less than $$k$$. On a number line, this is the region strictly between $$-k$$ and $$k$$.\n- Step 2: This translates directly to the compound inequality $$-k < X < k$$. Harry's tip: visualizing the number line is much cleaner and less error-prone than splitting the modulus into two separate cases like $$X < k$$ and $$-X < k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When counting the number of integers that satisfy a strict inequality like $$9 < n < 16$$, a common mistake is to simply subtract the bounds ($$16 - 9 = 7$$). Explain the \"off-by-one\" error here and how to correctly count the integers. (2 steps)", "answer": "- Step 1: Subtracting the bounds ($$16 - 9$$) calculates the *gaps* between the numbers, not the numbers themselves. To count the items within an inclusive range, you must add 1 to account for the starting item.\n- Step 2: However, the inequality $$9 < n < 16$$ is *strict* (endpoints excluded), so the integers are $$10, 11, 12, 13, 14, 15$$. The correct count is $$(15 - 10) + 1 = 6$$. Sketching the number line makes the endpoints obvious and prevents this classic slip.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "When solving a compound inequality like $$3 < \\sqrt{n} < 4$$, you can square all three parts to get $$9 < n < 16$$. Why is it mathematically invalid to square an inequality if one or more parts could be negative? (2 steps)", "answer": "- Step 1: Squaring a negative number makes it positive, which can reverse the order of the inequality. For example, $$-5 < -2$$, but squaring gives $$25 < 4$$, which is false.\n- Step 2: In $$3 < \\sqrt{n} < 4$$, all three parts are guaranteed to be positive (since square roots are non-negative). Therefore, squaring preserves the inequality direction. If the inequality was $$-1 < \\sqrt{n} < 4$$, squaring the $$-1$$ would be invalid without splitting the cases.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "In the Principle of Conservation of Linear Momentum (PCLM), what crucial assumption must hold about the system for momentum to be conserved, and how must velocity be treated differently from speed in the equation? (2 steps)", "answer": "- Step 1: The crucial assumption is that there is no external impulse acting on the system in the direction of motion. The system must be isolated in that dimension.\n- Step 2: Velocity is a signed quantity (direction matters), whereas speed is just magnitude. You must fix one direction as positive and apply it consistently to all terms. A particle moving in the opposite direction must have a negative velocity in your PCLM equation.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In a 1D collision, particle A moves right and B moves left. We define \"right\" as positive. If after the collision \"the direction of motion of A is unchanged\" and \"B rebounds,\" what are the signs of their velocities $$v_A$$ and $$v_B$$ after the collision? (2 steps)", "answer": "- Step 1: Since A's direction is unchanged and it was moving right (positive), its velocity after the collision $$v_A$$ must remain positive.\n- Step 2: Since B rebounds, it reverses its initial direction. It was moving left (negative), so rebounding means it now moves right. Therefore, $$v_B$$ must be positive.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Impulse is defined as $$I = mv - mu$$. If a question asks for the \"magnitude of the impulse exerted on B,\" what two things must you ensure about your final answer? (2 steps)", "answer": "- Step 1: You must calculate the impulse specifically for particle B, using B's mass and B's change in velocity ($$I = m_B v_B - m_B u_B$$). Do not mix up the particles.\n- Step 2: \"Magnitude\" means the final answer must be a positive number. Even if your calculation yields a negative sign due to your chosen positive direction, the magnitude is the absolute value. Harry's rule: never leave a minus sign or modulus bars on a final magnitude answer.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Why is it strongly advised to label your final numerical answers with phrases like \"speed of A\" and \"speed of B\" in collision questions?", "answer": "In collision problems, you typically solve for multiple unknowns simultaneously. If you write two bare numbers at the bottom of the page without labels, the examiner cannot know which belongs to which particle, and you will lose the mark even if the numbers are correct.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "In collision problems, why is it highly recommended to keep velocities as exact fractions (like $$1/2$$ and $$3/2$$) during your working, rather than converting to decimals (like 0.5 and 1.5)? (2 steps)", "answer": "- Step 1: Decimals can introduce rounding errors early in the calculation, which compound as you proceed. For instance, $$1/3$$ becomes 0.33, and multiplying it later loses precision.\n- Step 2: Fractions are exact. In the exam, intermediate decimal rounding can cost accuracy marks on the final answer. Only round to the required significant figures at the very final step.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "On a speed-time graph, the area under the graph represents distance. Harry strongly recommends using the trapezium area formula $$\\frac{1}{2}(a+b)h$$ instead of splitting the shape into triangles and a rectangle. Why? (2 steps)", "answer": "- Step 1: Splitting the shape introduces extra steps (finding the area of two triangles and one rectangle) and extra opportunities for algebraic or arithmetic errors.\n- Step 2: Using the trapezium formula directly is faster and safer. The most-forgotten part is the $$\\frac{1}{2}$$, so memorize the formula as a single unit: $$\\text{Area} = \\frac{1}{2}(a+b)h$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "When applying the trapezium area formula to a speed-time graph, you can choose different pairs of parallel sides. In the train problem, Harry used the horizontal top (constant speed duration) and the horizontal bottom (total time) as the parallel sides $$a$$ and $$b$$, with the speed as the height $$h$$. Why does this work, and what is the conventional alternative? (2 steps)", "answer": "- Step 1: The formula works for any pair of parallel sides. If the top is the constant-speed duration (say 180 s) and the bottom is the total time (say $$3T+180$$), and the height is the speed (20 m/s), the area is $$\\frac{1}{2}(180 + 3T+180)(20)$$.\n- Step 2: The conventional alternative is to use the two vertical parallel sides (the initial speed 0 and the peak speed 20) as $$a$$ and $$b$$, with the total time as the height $$h$$. Both give the exact same result, but Harry's way directly uses the time segments given in the problem.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In the train problem, the train travels at constant speed for 3 minutes (180 seconds) *after* accelerating for $$T$$ seconds. Why is the time marker at the end of the constant speed phase $$T + 180$$, rather than just $$180$$? (2 steps)", "answer": "- Step 1: Time markers on the x-axis represent the total time elapsed from the start ($$t=0$$). They are cumulative.\n- Step 2: The constant speed phase starts at $$t=T$$. It lasts for 180 seconds, so it ends at $$T + 180$$. If you wrote 180, you would be implying the acceleration phase took 0 seconds. Harry warned: \"Be careful where you measure that three minutes from… otherwise the whole thing snowballs.\"", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "In kinematics problems, distances are often given in kilometers and speeds in m/s. What must you do before using the trapezium area formula, and why? (2 steps)", "answer": "- Step 1: You must ensure all units are consistent. If speed is in m/s and time is in seconds, the distance calculated from $$\\text{Area} = \\frac{1}{2}(a+b)h$$ will be in meters.\n- Step 2: You must convert the given distance (e.g., 4.8 km) into meters (4800 m) before equating it to the area. Failing to convert is a \"very common mistake\" that makes the rest of the algebra meaningless.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "The moment of a force about a point is defined as $$\\text{force} \\times \\text{perpendicular distance}$$. For a rigid body in equilibrium, Harry recommends writing $$\\sum \\text{clockwise} = \\sum \\text{anticlockwise}$$ rather than $$\\sum \\text{moments} = 0$$. Why is the former method less error-prone? (2 steps)", "answer": "- Step 1: When using $$\\sum \\text{moments} = 0$$, you must assign positive and negative signs to every moment based on an arbitrary convention (e.g., clockwise is positive). This introduces a high risk of sign errors, especially with multiple forces.\n- Step 2: Equating clockwise and anticlockwise directly groups all forces of one rotation together. You simply calculate the sum of magnitudes on each side and set them equal, eliminating the need to track arbitrary signs for individual forces.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When taking moments to solve for an unknown force, why is it strategically advantageous to choose your pivot point at the location of another unknown force? (2 steps)", "answer": "- Step 1: The moment of a force is $$F \\times d$$. If the pivot is at the point where the force acts, the perpendicular distance $$d$$ is zero.\n- Step 2: Therefore, the unknown force has zero moment about that pivot and drops out of the equation entirely. This eliminates an unknown for free, allowing you to solve the equation directly without needing a second equation.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "The phrase \"on the point of tilting about C\" is a key trigger in moments problems. What physical condition does this imply about the reaction force at the other support (D)? (2 steps)", "answer": "- Step 1: \"On the point of tilting\" means the rod is just about to lift off the other support. It is transitioning from equilibrium to rotation.\n- Step 2: For the rod to lift off support D, the contact force at D must drop to zero. Therefore, \"on the point of tilting about C\" implies the reaction at D is $$R_D = 0$$. You must set this reaction to zero in your equations.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "When drawing a free body diagram for a moments question, Harry advises drawing the reaction arrows \"coming out of the rod\" rather than pushing into it from below. What is the practical benefit of this convention? (2 steps)", "answer": "- Step 1: If you draw reactions pushing into the rod from below, they can visually blend in with the support structures or other vertical forces.\n- Step 2: Drawing them coming out of the rod makes them distinct and ensures you correctly identify their line of action when calculating perpendicular distances to the pivot. It prevents you from accidentally omitting them from your moments equation.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "In the moments problem with two scenarios, we obtained two equations: $$(A) \\quad 189 = Wx$$ and $$(B) \\quad 81 = (0.9 - x)W$$. Instead of substituting $$(A)$$ into $$(B)$$, Harry divides $$(A)$$ by $$(B)$$. Why is this algebraically superior? (2 steps)", "answer": "- Step 1: Dividing the equations directly eliminates the common variable $$W$$ from the start: $$\\frac{Wx}{(0.9-x)W} = \\frac{189}{81}$$, which simplifies cleanly to $$\\frac{x}{0.9-x} = \\frac{7}{3}$$.\n- Step 2: Substitution would require expressing $$W = \\frac{189}{x}$$ and substituting it into the second equation, leading to a more complex fraction $$81 = (0.9 - x)\\frac{189}{x}$$ that requires more steps to simplify. Dividing is quicker and reduces arithmetic errors.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In a moments problem, $$x$$ is defined as the distance from support C to the centre of mass. When taking moments about support D, a common mistake is to use $$x$$ as the distance from D to the centre of mass. How do you correctly find the distance from D to the centre of mass? (2 steps)", "answer": "- Step 1: You must subtract the position of the centre of mass from the position of D. First, find the total distance between C and D (which is the length of the rod minus the overhangs on both sides).\n- Step 2: The distance from D to the centre of mass is the distance from C to D minus $$x$$. In the problem, C to D is $$1.5 - 0.24 - 0.36 = 0.9$$ m, so the distance from D is $$0.9 - x$$. Using just $$x$$ here is a critical error.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "When resolving forces on an inclined plane, why is it standard practice to resolve *perpendicular* to the plane and *parallel* to the plane, rather than horizontally and vertically? (2 steps)", "answer": "- Step 1: The acceleration of the particle is along the plane (parallel). This means there is no acceleration perpendicular to the plane, so the forces in that direction are balanced (net force = 0).\n- Step 2: If you resolved horizontally and vertically, you would have acceleration components in both directions, making the equations coupled and much harder to solve. Resolving parallel/perpendicular decouples the equations. Harry's tip: Say \"perpendicular to the plane,\" not \"vertical.\"", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A particle of mass $$m$$ is on a plane inclined at angle $$\\theta$$ to the horizontal. The weight $$mg$$ acts vertically down. Intuitively, why is the component down the slope $$mg \\sin \\theta$$ and the component into the plane $$mg \\cos \\theta$$? (2 steps)", "answer": "- Step 1: Consider the limits. If the slope is flat ($$\\theta = 0^\\circ$$), there is no force down the slope and the full weight pushes into the plane. This matches $$\\sin 0^\\circ = 0$$ and $$\\cos 0^\\circ = 1$$.\n- Step 2: If the slope is vertical ($$\\theta = 90^\\circ$$), the full weight acts down the slope and there is no force into the plane. This matches $$\\sin 90^\\circ = 1$$ and $$\\cos 90^\\circ = 0$$. Therefore, down the slope is always $$mg \\sin \\theta$$ and into the plane is always $$mg \\cos \\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A parcel is pulled up a rough inclined plane by a force at an angle $$\\alpha$$ to the plane. When resolving the pulling force, what are its components parallel and perpendicular to the plane? (2 steps)", "answer": "- Step 1: The force acts at angle $$\\alpha$$ to the plane. The component *along* the plane (parallel) is the \"adjacent\" side of the right-angled triangle formed by the force and the plane. Thus, it is $$F \\cos \\alpha$$.\n- Step 2: The component *away* from the plane (perpendicular) is the \"opposite\" side. Thus, it is $$F \\sin \\alpha$$. Note that this perpendicular component lifts the parcel slightly, reducing the normal reaction $$R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "For a particle moving on a rough surface, the friction force is given by $$F = \\mu R$$. Under what specific condition is this formula valid, and why must you write it as a separate line in your working? (2 steps)", "answer": "- Step 1: The formula $$F = \\mu R$$ is only valid when the particle is *moving* or *on the point of moving* (limiting equilibrium). If the particle is stationary and not at the point of slipping, friction is less than or equal to $$\\mu R$$.\n- Step 2: You must write $$F = \\mu R$$ as a separate line because there is usually a dedicated method mark for stating the friction relationship. If you just substitute $$\\mu R$$ into your equations without showing it, you lose this mark.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "How do you determine the direction of the friction force on a parcel being pulled up a rough slope? (2 steps)", "answer": "- Step 1: Friction always opposes motion (or the tendency of motion). You must first identify which way the parcel is moving or trying to move.\n- Step 2: If the parcel is being pulled *up* the slope, friction acts *down* the slope to resist that motion. If the pulling force were removed, and the parcel slides *down*, friction would act *up* the slope.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Harry emphasizes that \"marks come from the equations, not the diagram.\" What does this mean for how you should present your working on an inclined plane question? (2 steps)", "answer": "- Step 1: A beautifully drawn free body diagram with perfectly angled arrows will not earn method marks on its own. It is a visual aid for you, not the answer.\n- Step 2: You must explicitly write down the resolved force equations (e.g., $$R = mg \\cos \\theta$$ and $$F = \\mu R$$) and Newton's second law ($$ma = \\text{driving force} - \\text{friction} - mg \\sin \\theta$$). The equations are what the mark scheme rewards.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Synthesis: When a pulling force is removed from a parcel on a rough slope, how do you determine if the parcel remains at rest or slides back down? (3 steps)", "answer": "- Step 1: Calculate the new normal reaction (now just $$mg \\cos \\theta$$, since the pulling force's perpendicular component is gone) and the new maximum friction force $$F_{max} = \\mu R$$.\n- Step 2: Calculate the component of weight pulling the parcel down the slope, which is $$mg \\sin \\theta$$.\n- Step 3: Compare the two. If $$F_{max} \\ge mg \\sin \\theta$$, friction can hold the parcel and it remains at rest. If $$F_{max} < mg \\sin \\theta$$, friction is insufficient and the parcel slides down.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Exercise (Inequalities): How many integers $$n$$ satisfy the inequality $$1 < |n - 5| < 3$$? (3 steps)", "answer": "- Step 1: The inequality $$|n - 5| < 3$$ means the distance from 5 is less than 3, so $$2 < n < 8$$.\n- Step 2: The inequality $$|n - 5| > 1$$ means the distance from 5 is greater than 1, so $$n - 5 > 1$$ or $$n - 5 < -1$$, giving $$n > 6$$ or $$n < 4$$.\n- Step 3: Combining these on a number line, the valid ranges are $$2 < n < 4$$ and $$6 < n < 8$$. The integers are 3 and 7. There are 2 integers.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Exercise (Collision): Two particles of equal mass $$m$$ collide. Before the collision, A moves right at 4 m/s and B is at rest. After the collision, A is at rest. Find the speed of B after. (2 steps)", "answer": "- Step 1: Apply PCLM. Let right be positive. $$m(4) + m(0) = m(0) + m(v_B)$$.\n- Step 2: Simplifying gives $$4m = m v_B$$, so $$v_B = 4$$ m/s. The speed is 4 m/s.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Exercise (V-T Graph): A car accelerates from rest for 10 seconds to reach 20 m/s, then decelerates to rest in 5 seconds. Using the trapezium formula, what is the total distance? (2 steps)", "answer": "- Step 1: The shape is a triangle, which is a trapezium with one parallel side of length 0. The parallel sides (speeds) are 0 and 20. The height (time) is $$10 + 5 = 15$$.\n- Step 2: Area = $$\\frac{1}{2}(0 + 20)(15) = \\frac{1}{2}(20)(15) = 150$$ m.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Exercise (Moments): A uniform rod of length 2m and weight 40N rests horizontally on a support at its left end. A weight $$W$$ is hung at the right end. The rod is on the point of tilting. Find $$W$$. (2 steps)", "answer": "- Step 1: \"On the point of tilting\" about the left end means the rod is about to lift off. The centre of mass is at 1m. Take moments about the left end.\n- Step 2: Clockwise (W at 2m) = Anticlockwise (40N at 1m). $$W \\times 2 = 40 \\times 1$$, so $$W = 20$$ N.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Exercise (Incline): A block of mass 10 kg rests on a smooth slope inclined at 30 degrees. What is the component of its weight down the slope? (Use $$g=10$$ m/s$$^2$$ for mental math). (2 steps)", "answer": "- Step 1: The weight is $$mg = 10 \\times 10 = 100$$ N.\n- Step 2: The component down the slope is $$mg \\sin \\theta = 100 \\sin 30^\\circ = 100 \\times 0.5 = 50$$ N.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}], "count": 31}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How to translate \"difference between 2√n and 7 is less than 1\" into a modulus inequality? (3 steps)", "answer": "- Step 1: Recognize that \"difference\" implies absolute value.  \n  + Example: |2√n - 7| < 1  \n- Step 2: Remove modulus by writing -1 < 2√n - 7 < 1 (number line method).  \n- Step 3: Solve inequalities stepwise: 6 < 2√n < 8 → 3 < √n < 4 → 9 < n < 16.  \n\nOne-sentence takeaway: Modulus inequalities require considering both positive and negative intervals.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is squaring 3 < √n < 4 valid to solve 9 < n < 16?", "answer": "- Squaring preserves inequality for positive numbers.  \n  + Since 3, √n, and 4 are all positive, squaring maintains the direction.  \n- Common misconception: You cannot square inequalities with negative ranges (e.g., -2 < x < 1).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How to count integers strictly between 9 and 16?", "answer": "- List: {10, 11, 12, 13, 14, 15}  \n- Formula: (Last - First + 1) → 15 - 10 + 1 = 6.  \n- Edge case: Exclude endpoints (9 and 16).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "For a train's velocity-time graph, why is the total distance the area of a trapezium?", "answer": "- The graph has three phases: acceleration (triangle), constant speed (rectangle), deceleration (triangle).  \n- Combined, these form a trapezium with bases = total time (3T + 180 s) and constant phase (180 s), height = speed (20 m/s).  \n- Formula: Area = ½(a + b)h.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the deceleration phase 2T if acceleration magnitude is twice deceleration?", "answer": "- Acceleration (a) = (20 - 0)/T; Deceleration (d) = (0 - 20)/(t).  \n- Given |a| = 2|d| → 20/T = 2*(20/t) → t = 2T.  \n- Intuition: Lower deceleration magnitude → longer time to stop.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How to avoid errors in measuring time intervals for trapezium graphs?", "answer": "- Acceleration ends at T, constant phase ends at T + 180, deceleration ends at 3T + 180.  \n- Total time = 3T + 180, not T + 180 + 2T (miscounting).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why use conservation of momentum (PCLM) for collisions?", "answer": "- PCLM applies when no external forces.  \n- Steps:  \n  1. Define positive direction (e.g., A's initial motion).  \n  2. Calculate total momentum before = after.  \n  3. Solve for unknowns (e.g., v_A and v_B).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How to handle \"difference between speeds is 1 m/s\" in collision problems?", "answer": "- Let v_A = speed of A after collision (direction unchanged).  \n- Since B rebounds, v_B = v_A + 1 (relative speed difference).  \n- Substitute into PCLM equation.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is impulse on B calculated as m(v_B - u_B) instead of |m(v_B - u_B)|?", "answer": "- Impulse magnitude is positive, but direction matters in derivation.  \n- Steps:  \n  1. Use same positive direction as PCLM.  \n  2. Compute change in momentum (final - initial).  \n  3. Take absolute value for magnitude.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "For moments, why set reaction force to zero when \"on the point of tilting\"?", "answer": "- Tilting implies one support loses contact.  \n- Reaction force at the other support (pivot) is zero → eliminates variable from equations.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How to choose pivot for moments to eliminate unknowns?", "answer": "- Take moments about the pivot point where a force acts (e.g., C or D).  \n- Forces through pivot contribute zero moment.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why divide equations (A)/(B) to solve for x and W in moments problems?", "answer": "- (A): 189 = Wx; (B): 81 = (0.9 - x)W  \n- Divide (A)/(B): 189/81 = x/(0.9 - x) → eliminates W.  \n- Efficient method vs. substitution.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "For inclined planes, why resolve perpendicular and parallel components separately?", "answer": "- Perpendicular: ΣF = 0 (no acceleration).  \n- Parallel: ΣF = ma (motion direction).  \n- Example: Weight splits into mg sinθ (parallel) and mg cosθ (perpendicular).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How to determine friction's direction on an inclined plane?", "answer": "- Friction opposes relative motion.  \n- If pulled up, friction acts down; if slipping down, friction acts up.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why calculate normal reaction R before friction in inclined plane problems?", "answer": "- Friction F = μR depends on R.  \n- Resolve perpendicular to plane first to find R, then compute F.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How to avoid mixing vertical/horizontal with perpendicular/parallel components?", "answer": "- Use \"perpendicular to plane\" and \"parallel to plane\" as reference directions.  \n- Vertical ≠ perpendicular (unless θ = 0).", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}], "count": 16}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "How do you translate the phrase \"the difference between 2√n and 7 is less than 1\" into a mathematical inequality? (3 steps)", "answer": "- Step 1: Recognize \"difference\" implies an absolute value to represent the magnitude of the gap: |2√n - 7| < 1.\n- Step 2: Remove the modulus by setting up a compound inequality: -1 < 2√n - 7 < 1.\n- Step 3: Solve algebraically: add 7, divide by 2, then square all parts to find 9 < n < 16.\n\n**Key takeaway:** Absolute value captures magnitude, requiring a three-part inequality to solve.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How many integers satisfy 9 < n < 16? Explain the common mistake here.", "answer": "The integers are 10, 11, 12, 13, 14, 15 (6 integers). A common mistake is miscalculating 15 - 10 = 5, forgetting to add 1 since both endpoints are exclusive.\n\n**Visual intuition:** Number line shows closed circles at 10-15 (excluded 9 and 16).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "In solving |2√n - 7| < 1, how does the number line help avoid sign errors?", "answer": "The number line visually confirms that 2√n must lie strictly between 6 and 8 (after adding 7). This prevents misinterpreting the inequality direction or mishandling the modulus.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does squaring both sides of √n > 3 preserve the inequality?", "answer": "Since √n is always non-negative, squaring preserves order for positive numbers. Thus, √n > 3 ⇒ n > 9.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What would happen if you tried to solve |2√n - 7| < 1 without using a modulus?", "answer": "You'd risk missing half the solution. Forgetting to account for both cases (2√n - 7 < 1 AND -(2√n - 7) < 1) would lead to incomplete results.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "A train accelerates uniformly for T seconds, reaches 20 m/s, maintains it for 180s, then decelerates for 2T seconds. Why is the deceleration phase twice as long as acceleration?", "answer": "The deceleration magnitude is half the acceleration, so to achieve the same speed change (20 m/s), the time must double (since a = Δv/Δt).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How does the trapezium area formula ½(a + b)h apply to a velocity-time graph? (2 steps)", "answer": "- Step 1: The two parallel sides (a, b) are time intervals: a = total time (3T + 180s), b = constant-speed duration (180s).\n- Step 2: The height h is the peak velocity (20 m/s). Area = total displacement.\n\n**Contrast:** Splitting into shapes risks calculation errors; trapezium formula is more efficient.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is unit conversion critical in the train problem?", "answer": "Station distance is given in kilometers (4.8 km), but velocity is in m/s. Converting to meters (4800 m) ensures consistent units for the trapezium area calculation.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In a velocity-time graph, why can't you measure time intervals from arbitrary points?", "answer": "The timeline is absolute. For example, the 3-minute constant phase starts at T seconds, not at zero. Misaligning reference points leads to incorrect total time.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the gradient of the acceleration phase relate to the train's acceleration?", "answer": "Acceleration is velocity change over time: (20 - 0)/T = 20/T m/s². Steeper slope = higher acceleration.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "A collision problem states \"the direction of motion of A is unchanged\" and \"difference between speeds is 1 m/s\". How do you set up variables for post-collision velocities?", "answer": "Let v_A = speed of A after. Since A's direction is unchanged, and B rebounds, set v_B = v_A + 1 (ensuring B's direction is opposite to its initial motion).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is the impulse on B calculated as m(v_final - v_initial) rather than negative?", "answer": "Impulse magnitude is always positive. Even if the change in momentum is negative (e.g., B reversing direction), the question asks for magnitude, so take absolute value.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "In a two-body collision, how does defining the positive direction affect the sign of velocities?", "answer": "Consistent sign convention is critical. If you define A's initial direction as positive, B's initial velocity must be negative, and vice versa. Mixing signs leads to incorrect momentum equations.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why does dividing the two moments equations (A/B) eliminate W?", "answer": "Both equations have W multiplied by a distance. Dividing (A): 189 = Wx by (B): 81 = W(0.9 - x) cancels W, leaving x/(0.9 - x) = 2.333.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "What is the physical meaning of \"on the point of tilting\" in a moments problem?", "answer": "It implies the reaction force at the opposite support becomes zero. For example, tilting about C means R_D = 0, simplifying the moments equation by removing an unknown.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why is taking moments about a pivot (like D) useful in equilibrium problems?", "answer": "Forces acting through the pivot have zero moment arm, eliminating their terms from the equation. This simplifies solving for unknown reactions or weights.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How do you resolve forces perpendicular to an inclined plane?", "answer": "The normal reaction R balances components perpendicular to the plane: R = mg cosθ - F sinα (if F is applied at angle α to the plane).", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why does friction act downward on a parcel being pulled up an incline?", "answer": "Friction opposes relative motion. Since the parcel moves upward, friction acts in the opposite direction (down the slope).", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "In the inclined plane problem, why is the parallel component of weight mg sinθ?", "answer": "The angle θ is between the slope and horizontal. Weight acts vertically, so its component down the slope is mg sinθ, and perpendicular into the plane is mg cosθ.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "What happens to the frictional force F_friction if the applied force pulling the parcel up is reduced below the threshold for motion?", "answer": "Friction becomes static and reduces to match the driving force (F_friction ≤ μR). The parcel remains stationary when F_driving + F_friction = mg sinθ.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "After solving $3 < \\sqrt{n} < 4$, we get $9 < n < 16$. How many integer values satisfy this, and why must we use \"15 - 10 + 1 = 6\" rather than \"16 - 9 = 7\"? (2 steps)", "answer": "- Step 1: Since the inequality is strict ($9 < n < 16$), the endpoints $n = 9$ and $n = 16$ are excluded. The integers that satisfy are $n \\in \\{10, 11, 12, 13, 14, 15\\}$.\n- Step 2: The number of integers from $a$ to $b$ inclusive is $b - a + 1$. Here $15 - 10 + 1 = 6$. The common mistake $16 - 9 = 7$ counts from 9 to 16 inclusive (seven numbers), but 9 and 16 are not allowed.\n\n**Takeaway:** For strict inequalities, always sketch a number line to identify which endpoints to exclude before counting.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "In a velocity-time graph, explain why the area under the graph represents displacement, and why we use the trapezium formula $\\frac{1}{2}(a+b)h$ rather than splitting into triangles. (2 steps)", "answer": "- Step 1: On a velocity-time graph, velocity ($y$-axis, in m/s) × time ($x$-axis, in s) has units of metres — the same as displacement. Geometrically, the area under any curve gives the accumulated quantity, and a trapezium captures the area of a velocity segment that rises linearly from one speed to another.\n- Step 2: The trapezium formula $\\frac{1}{2}(a+b)h$ is a single expression that gives the area directly. Splitting into triangles and rectangles is slower and creates more opportunities for arithmetic errors. Memorising $\\frac{1}{2}(a+b)h$ is faster and safer.\n\n**Takeaway:** The $\\frac{1}{2}$ factor is the most commonly forgotten part — drill it until automatic.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "In the train question, the constant-speed phase lasts 3 minutes (180 s). If the acceleration phase lasts $T$ seconds and deceleration lasts $2T$ seconds, what are the time markers on the horizontal axis? Why is it wrong to mark the constant-speed phase at 180 s? (2 steps)", "answer": "- Step 1: The acceleration lasts from $t = 0$ to $t = T$. The constant-speed phase begins immediately after, at $t = T$, and runs for 180 s, so it ends at $t = T + 180$. The deceleration then begins and lasts $2T$, ending at $t = T + 180 + 2T = 3T + 180$.\n- Step 2: Marking the constant-speed phase at \"180 s\" ignores that it starts after the acceleration phase. This error propagates through the entire calculation, giving the wrong trapezium dimensions.\n\n**Takeaway:** Always identify the reference point for each time measurement — the whole graph \"snowballs\" if this is wrong.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Two particles A and B collide directly. A has mass $3m$ and B has mass $m$. Both move at 1.5 m/s towards each other before collision. After collision, A continues in its original direction, and the difference between their speeds is 1 m/s. Why do we set $v_A = v$ and $v_B = v + 1$ (not $v_B = v - 1$)? (2 steps)", "answer": "- Step 1: The problem states A's direction is unchanged, and the difference between speeds is 1 m/s. Since B must rebound (its direction reverses), B's speed after collision must be greater than A's for the difference to be 1 m/s in the positive direction.\n- Step 2: If we assumed $v_B = v - 1$, then $v_B < v_A$, meaning B would be slower than A in the same direction — but B has reversed direction, so this cannot satisfy \"difference = 1 m/s\" with B moving the same way as A. The algebra would give an inconsistent or negative solution.\n\n**Takeaway:** Pay attention to directional keywords (\"towards each other,\" \"unchanged,\" \"difference\") to determine relative ordering of unknown speeds.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When applying conservation of momentum $m_A u_A + m_B u_B = m_A v_A + m_B v_B$, why must we use a consistent sign convention for velocities, and what happens if we mix conventions? (2 steps)", "answer": "- Step 1: Momentum is a vector quantity — direction matters. We fix one direction as positive (say, A's initial direction) and keep this throughout the entire equation. A velocity in the opposite direction gets a negative sign.\n- Step 2: Mixing conventions (using positive for A both before and after, but sometimes positive for B) destroys the vector nature of momentum. The equation would no longer represent physical reality, leading to wrong answers — often the wrong sign or magnitude.\n\n**Takeaway:** Choose a positive direction once at the start and apply it to every velocity term without exception.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "The impulse on particle B is defined as $I = m_B v_B - m_B u_B$. In Q2, $u_B = -1.5$ m/s and $v_B = \\frac{3}{2}$ m/s. Why is the impulse $I = m(\\frac{3}{2}) - m(-1.5) = 3m$, and why don't we need absolute value signs in the final answer? (3 steps)", "answer": "- Step 1: The formula $I = \\Delta p = m v - m u$ gives the impulse as a vector (or signed scalar in 1D). Substituting: $I = m(\\frac{3}{2}) - m(-1.5) = \\frac{3}{2}m + 1.5m = 3m$ N s.\n- Step 2: The question asks for \"the magnitude of the impulse\" — magnitude means the size, ignoring direction. Since $m > 0$, the result $3m$ is already positive, so no absolute value bars are needed.\n- Step 3: If the question asked simply for \"the impulse\" without \"magnitude,\" we would keep the sign to indicate direction relative to our chosen positive axis.\n\n**Takeaway:** \"Magnitude\" always means a positive answer. The word itself tells you to drop any minus sign.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In the moments question, the branch is \"on the point of tilting about C.\" Why does this imply $R_D = 0$, and what does this tell us about the forces at the supports? (2 steps)", "answer": "- Step 1: If the branch is about to tilt (rotate) about point C, it is just about to lift off support D. At that precise instant, the normal reaction at D must be zero — there is no contact force.\n- Step 2: This is a critical modelling step: \"on the point of tilting about X\" converts a physical situation into the mathematical condition that the reaction at the other support equals zero. This eliminates that unknown from our moment equation.\n\n**Takeaway:** The phrase \"on the point of tilting about...\" is a trigger to set the opposite reaction to zero.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In scenario 1 of the moments question, we take moments about point C. Why does the reaction $R_C$ drop out of the equation, and why is this useful? (2 steps)", "answer": "- Step 1: The reaction $R_C$ acts at point C itself. When taking moments about C, the perpendicular distance from C to the line of action of $R_C$ is zero.\n- Step 2: A force passing through the pivot point has zero moment about that pivot. This lets us eliminate an unknown force from our equation without solving for it. Choosing where to take moments is strategic — pick a point where unknown forces act, and they vanish.\n\n**Takeaway:** Forces through the pivot contribute zero moment — use this to eliminate unknowns.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "In the moments question, we have two equations: $Wx = 189$ and $W(0.9 - x) = 81$. Harry suggests dividing these equations rather than substituting. Explain why dividing eliminates $W$ and simplifies the solving. (2 steps)", "answer": "- Step 1: Both equations have the form $W \\times (\\text{something}) = (\\text{known})$. Dividing equation (A) by equation (B) cancels the $W$ terms: $\\fracWx{W(0.9-x)} = \\frac{189}{81}$, giving $\\frac{x}{0.9-x} = \\frac{189}{81}$.\n- Step 2: This creates a single equation in $x$ directly, without needing to rearrange one equation to isolate $W$ and substitute. It's faster and avoids algebra errors from messy fraction manipulation.\n\n**Takeaway:** When two equations share a common factor (like $W$), dividing eliminates it in one clean step.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In the inclined plane problem, we resolve forces perpendicular to the plane and obtain $R + 18\\sin40^\\circ = 2g\\cos30^\\circ$. Why is the $18\\sin40^\\circ$ term added to $R$, and why do we use $\\cos30^\\circ$ for the weight component into the plane? (2 steps)", "answer": "- Step 1: The 18 N force acts at $40^\\circ$ to the plane. Its component perpendicular to the plane is $18\\sin40^\\circ$, pointing away from the plane (opposite to $R$). To balance, $R$ must counteract both this component and the weight component into the plane.\n- Step 2: The weight $2g$ acts vertically downward. The component perpendicular to the plane (into it) is $2g\\cos30^\\circ$ — think of a right triangle with angle $30^\\circ$ at the base; the adjacent side to the angle is the component into the plane.\n\n**Takeaway:** Resolve relative to the plane's angle, not the vertical. The force at angle $\\alpha$ to the plane gives $\\sin\\alpha$ perpendicular, $\\cos\\alpha$ parallel.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "The parcel is being pulled up the slope, so friction acts down the slope. Why does friction point down the slope rather than up, and what determines its maximum value? (2 steps)", "answer": "- Step 1: Friction always opposes the actual motion (or the tendency to move). Since the parcel is being pulled upward, the relative motion between parcel and plane would be upward — friction opposes this, acting down the slope.\n- Step 2: The maximum friction available is given by $F_{\\text{max}} = \\mu R$, where $R$ is the normal reaction. This is the limiting value; actual friction can be less if the parcel is in equilibrium.\n\n**Takeaway:** Never decide friction's direction by guessing — ask: \"in which direction would the body move if there were no friction?\"", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In the inclined plane, after finding $R \\approx 5.40$ N, we compute friction as $F = \\mu R = 0.3 \\times 5.40 \\approx 1.62$ N. Why do we calculate $R$ first rather than jumping straight to the parallel equation? (2 steps)", "answer": "- Step 1: The friction force $F = \\mu R$ requires $R$ to be known. We cannot determine the maximum friction without the normal reaction, which depends on the perpendicular force balance.\n- Step 2: In this problem, $R$ is not simply $2g\\cos30^\\circ$ because the pulling force has a perpendicular component. We must solve the perpendicular equation first to get $R$, then use $F = \\mu R$ in the parallel equation.\n\n**Takeaway:** In inclined plane problems with an external force, always resolve perpendicular first — the normal reaction depends on it.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Harry emphasizes writing the equations rather than just drawing a force diagram. Why do the marks come from the equations, not the diagram? (2 steps)", "answer": "- Step 1: A correct force diagram shows understanding, but the examiner cannot award marks for a picture alone. The equations (perpendicular balance, parallel $F = ma$, friction relation $F = \\mu R$) are the mathematical translation of the diagram.\n- Step 2: Each equation typically carries independent marks. Even if your diagram is messy, clear equations with correct terms will earn full credit. The diagram is a tool for you; the equations are what get marked.\n\n**Takeaway:** Always write the governing equations explicitly — that is where the credit is awarded.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A common error is saying the forces are \"balanced vertically\" on an inclined plane. Why is this phrasing incorrect, and what is the precise terminology? (1 step)", "answer": "- The correct statement is that forces are balanced perpendicular to the plane (not vertical). \"Vertical\" means straight up/down relative to the ground; on an inclined plane, the perpendicular direction is tilted relative to vertical. Using the wrong word can confuse your thinking about components.\n\n**Takeaway:** Say \"perpendicular to the plane\" — this is the correct direction for resolving when there is no acceleration in that direction.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the collision problem, the initial momentum calculation uses $(3m)(1.5) + (m)(-1.5)$. Explain why B's initial velocity is negative even though both particles have speed 1.5 m/s. (2 steps)", "answer": "- Step 1: We defined A's initial direction as positive (the + direction). Since A and B move towards each other, they move in opposite directions.\n- Step 2: If A's velocity is $+1.5$ m/s, then B's velocity must be $-1.5$ m/s (negative because it's opposite to our chosen positive direction). Speed is magnitude only; velocity includes direction.\n\n**Takeaway:** Speed is scalar (always positive); velocity is vector (sign indicates direction). In momentum calculations, use velocity with consistent signs.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In the train question, the magnitude of acceleration is twice the magnitude of deceleration. If acceleration is $a$, why does the deceleration phase last $2T$ seconds rather than $T$ seconds? (2 steps)", "answer": "- Step 1: Acceleration is the rate of change of velocity. To go from 0 to 20 m/s in time $T$, the acceleration is $a = \\frac{20}{T}$ m/s².\n- Step 2: Deceleration must be half as steep (magnitude $\\frac{a}{2}$), so to reduce speed by the same amount (20 m/s), it takes twice as long: time = $\\frac{20}{a/2} = \\frac{20 \\times 2}{a} = 2 \\times \\frac{20}{a} = 2T$ seconds.\n\n**Takeaway:** For the same change in velocity, time is inversely proportional to acceleration/deceleration magnitude.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "When taking moments in scenario 2 of the moments question, the distance from D to the weight is written as $0.9 - x$. How is this distance determined, and why is it not simply $x$? (2 steps)", "answer": "- Step 1: $x$ is measured from C to the centre of mass. C is 0.24 m from A, and D is 0.36 m from B. The total length is 1.5 m, so the distance from A to D is $1.5 - 0.36 = 1.14$ m.\n- Step 2: The centre of mass is at distance $0.24 + x$ from A. The distance from D to the centre of mass is $(0.24 + x) - (1.5 - 0.36) = 0.24 + x - 1.14 = x - 0.9$. Taking the positive version (since D is to the right of the centre), the distance is $0.9 - x$ metres.\n\n**Takeaway:** When measuring distances from a pivot, always calculate from the pivot to the force's line of action — don't assume it's just $x$.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In the incline problem, after finding the acceleration $a \\approx 1.18$ m/s², we can check our answer by considering limiting cases. What would happen if $\\mu = 0$? What if the pulling force were removed entirely? (2 steps)", "answer": "- Step 1: With $\\mu = 0$ (frictionless), the perpendicular equation gives $R = 2g\\cos30^\\circ \\approx 17.0$ N (the pulling force still has a perpendicular component). The parallel equation becomes $18\\cos40^\\circ - 2g\\sin30^\\circ = 2a$, giving $a \\approx 2.18$ m/s² — faster than with friction, as expected.\n- Step 2: With the pulling force removed, $R = 2g\\cos30^\\circ$ and $F_{\\text{max}} = \\mu R \\approx 5.09$ N. The weight component down the slope is $2g\\sin30^\\circ = 9.8$ N. Since $9.8 > 5.09$, the parcel cannot remain at rest and slides down — consistent with part (c).\n\n**Takeaway:** Use limiting cases (no friction, no pulling force) to sanity-check your answers qualitatively.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A student solves the inequality $|x - 5| \\leq 3$ and writes $2 \\leq x \\leq 8$. Another student writes $x \\in [2, 8]$. Are these equivalent, and does the inequality include the endpoints? (2 steps)", "answer": "- Step 1: The $\\leq$ symbol means \"less than or equal to,\" so the endpoints are included. Both $x = 2$ and $x = 8$ satisfy $|x - 5| \\leq 3$.\n- Step 2: Both notations are equivalent: \"$2 \\leq x \\leq 8$\" and \"$x \\in [2, 8]$\" both include the endpoints. The square brackets in interval notation indicate inclusion; round parentheses would indicate exclusion.\n\n**Takeaway:** Pay attention to $<$ vs $\\leq$ — it determines whether endpoints are counted in integer counting problems.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In the collision question, after finding $v_A = \\frac{1}{2}$ m/s and $v_B = \\frac{3}{2}$ m/s, a student remarks that A's speed decreased from 1.5 to 0.5 m/s, while B's speed changed from 1.5 to 1.5 m/s (magnitude-wise). Is this interpretation correct? Explain. (2 steps)", "answer": "- Step 1: Partially correct. A's speed dropped from 1.5 to 0.5 m/s — it slowed down but kept moving in the same direction. B reversed direction: from $-1.5$ to $+1.5$ m/s, so its speed changed by 3 m/s in magnitude terms.\n- Step 2: The key insight is that B reversed direction completely. This is why the impulse on B is large ($3m$ N s) — it involves both the magnitude change and the direction reversal.\n\n**Takeaway:** Watch for direction changes in collisions. \"Speed\" ignores direction; \"velocity\" captures both speed and direction.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In the trapezium area calculation, a student uses $a = T + 180$ and $b = 3T + 180$ as the parallel sides, but forgets the $\\frac{1}{2}$ factor. What numerical error results, and how would you diagnose this mistake? (2 steps)", "answer": "- Step 1: The correct area is $A = \\frac{1}{2}(a+b)h$. Forgetting the $\\frac{1}{2}$ gives $A = (a+b)h$, double the correct area. With $T = 40$, $a = 220$, $b = 300$, $h = 20$, the correct area is $\\frac{1}{2}(520)(20) = 5200$ m; the mistake gives 10400 m.\n- Step 2: The actual distance is 4800 m. A student getting ~9600 m or 10400 m has likely forgotten the $\\frac{1}{2}$. Check by estimating: if average speed is about 10-15 m/s over ~250 s, distance should be a few thousand metres — not ten thousand.\n\n**Takeaway:** The $\\frac{1}{2}$ is the most frequently dropped factor in trapezium calculations — double-check it every time.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "When the parcel is pulled up the incline, we assume friction acts down the slope. If the parcel were instead being pulled down the slope, in which direction would friction act? What if the parcel were at rest? (2 steps)", "answer": "- Step 1: If pulled down the slope, the tendency is to move down, so friction acts up the slope (opposing the tendency). The direction always opposes motion or the tendency to move.\n- Step 2: If the parcel is at rest and being pulled, we must compare the component of the pulling force down the slope against the maximum friction. If the pulling component is less than $\\mu R$, friction adjusts to exactly balance it (static friction), acting up the slope.\n\n**Takeaway:** Friction's direction depends on the tendency to move, not on arbitrary assignment. Always ask: \"which way would it go without friction?\"", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In the moments question, why is it better to equate clockwise moments = anticlockwise moments directly rather than taking sum of moments = 0? (2 steps)", "answer": "- Step 1: When you write $\\sum F \\times d = 0$, you must assign signs (+ for one direction, - for the other). This is prone to sign errors, especially when forces act on opposite sides of the pivot.\n- Step 2: By writing \"clockwise moments = anticlockwise moments,\" you avoid signs entirely. Just list all moments causing clockwise rotation on one side, anticlockwise on the other, and equate. Much less algebra, fewer sign mistakes.\n\n**Takeaway:** Harry's golden rule: equate clockwise = anticlockwise directly — no signs, no zero-sum.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A block of mass $m$ rests on a rough horizontal surface with coefficient $\\mu$. A horizontal force $P$ is applied. What is the maximum value of $P$ before the block begins to move, and how does this compare to the case where $P$ acts parallel to an incline? (2 steps)", "answer": "- Step 1: On a horizontal surface, $R = mg$ (no vertical components). Maximum friction is $\\mu R = \\mu mg$. For the block to move, $P > \\mu mg$. So $P_{\\text{max}} = \\mu mg$.\n- Step 2: On an incline at angle $\\theta$, $R = mg\\cos\\theta$, so $P_{\\text{max}} = \\mu(mg\\cos\\theta)$. Additionally, if $P$ is not parallel to the slope, we must resolve it into components perpendicular to the plane first to find $R$, making the algebra more complex.\n\n**Takeaway:** On a horizontal surface, $R = mg$ simplifies things. On an incline, always resolve for $R$ first.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the train problem, if the acceleration phase lasted $T = 40$ s and deceleration lasted $2T = 80$ s, what fraction of the total journey time is spent at constant speed? Does this ratio depend on $T$? (2 steps)", "answer": "- Step 1: Total time = $T + 180 + 2T = 3T + 180 = 3(40) + 180 = 300$ seconds. Constant speed time = 180 s. Fraction = $180/300 = 3/5 = 60\\%$.\n- Step 2: In general, constant speed fraction = $180/(3T + 180)$. As $T$ increases, the denominator grows, so the fraction decreases. The ratio does depend on $T$.\n\n**Takeaway:** For a fixed constant-speed duration, increasing acceleration/deceleration time reduces the proportion of time at constant speed.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A student calculates the impulse on B as $I = m(v_B - u_B) = m(1.5 - (-1.5)) = 3m$ but forgets to state the units. What are the correct units, and why do we use N s rather than kg m/s? (1 step)", "answer": "- Impulse has units of N s (newton-seconds). Since $1 \\text{ N} = 1 \\text{ kg m/s}^2$, we have $1 \\text{ N s} = 1 \\text{ kg m/s}$. Both are equivalent, but by convention we use N s for impulse and momentum problems.\n\n**Takeaway:** N s and kg m/s are dimensionally identical; choose based on context (impulse → N s, momentum → kg m/s).", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In the inequality problem, we squared both sides of $3 < \\sqrt{n} < 4$ to get $9 < n < 16$. Why is this operation valid here, and when would squaring introduce extraneous solutions? (2 steps)", "answer": "- Step 1: Since all three parts of the inequality $3 < \\sqrt{n} < 4$ are positive, squaring preserves the inequality direction: $3^2 < (\\sqrt{n})^2 < 4^2$ gives $9 < n < 16$.\n- Step 2: Squaring is NOT safe if any part is negative. For example, $-3 < x < 2$ cannot be squared directly because the negative bound would flip when squared. Always check that the entire inequality chain involves positive quantities before squaring.\n\n**Takeaway:** Only square inequalities when all terms are known to be non-negative.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In the moments problem, after solving for $x = 0.63$ m and $W = 300$ N, a quick sanity check is to verify that $x < 0.9$ (since $0.9 - x$ must be positive in the second equation). What does this tell us about the location of the centre of mass? (1 step)", "answer": "- The centre of mass is 0.63 m from C. Since the distance from C to D is 0.9 m (1.5 - 0.36 - 0.24 = 0.9), the centre of mass lies between C and D, which is physically sensible — the rod is not tilted impossibly.\n\n**Takeaway:** Always check that computed distances are physically plausible within the geometry.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the incline problem, after finding $R \\approx 5.40$ N, we notice this is much smaller than the weight component into the plane ($2g\\cos30^\\circ \\approx 17.0$ N). Why is $R$ so small, and what does this imply about the pulling force? (2 steps)", "answer": "- Step 1: The pulling force has a component $18\\sin40^\\circ \\approx 11.6$ N perpendicular to the plane, pointing away from it. This partially counteracts the weight component into the plane ($17.0$ N), leaving only $R \\approx 5.4$ N.\n- Step 2: The pulling force is quite steep ($40^\\circ$ to the plane), so a significant portion of its 18 N acts perpendicular to the plane, reducing the normal reaction substantially. This is why resolving perpendicular first is essential — $R$ is not simply $mg\\cos\\theta$.\n\n**Takeaway:** When an external force acts at an angle to the plane, always resolve it perpendicularly to find the correct $R$.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A car travels 900 m in total. Its speed-time graph consists of three phases: acceleration from rest to $v$, constant speed for time $T$, and deceleration to rest. The acceleration and deceleration magnitudes are $a$ and $a/2$ respectively. Write an expression for the total distance in terms of $v$, $a$, and $T$. (3 steps)", "answer": "- Step 1: Let acceleration time = $t_1$, deceleration time = $t_2$. Since $v = a t_1$, we have $t_1 = v/a$. Similarly, deceleration $v = (a/2)t_2$ gives $t_2 = 2v/a = 2t_1$.\n- Step 2: Distance during acceleration = area of triangle = $\\frac{1}{2} v t_1 = \\frac{1}{2} v (v/a) = \\frac{v^2}{2a}$. Distance during deceleration = same area (same $v$, same time) = $\\frac{v^2}{2a}$.\n- Step 3: Constant speed distance = $v \\times T$. Total: $D = \\frac{v^2}{2a} + vT + \\frac{v^2}{2a} = \\frac{v^2}{a} + vT$.\n\n**Takeaway:** In symmetric acceleration-deceleration problems, the distance covered in accel and decel phases are equal.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "In the collision problem, suppose after collision both particles move in the same direction (no reversal). What would change in our approach to setting up the equations? (2 steps)", "answer": "- Step 1: If B also continued in A's direction after collision, then both velocities would be positive in our convention. The \"difference between speeds = 1 m/s\" would still mean $|v_A - v_B| = 1$, but we'd need to determine which is larger.\n- Step 2: We'd set $v_B = v_A \\pm 1$, choosing the plus or minus based on physical reasoning (conservation of momentum would force one ordering). The key is that the relative direction is determined by the physics, not arbitrary assignment.\n\n**Takeaway:** Always use the physical constraints (direction unchanged, difference in speeds) to determine the sign relationships between unknowns.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In the moments question, if the branch were uniform (centre of mass at the midpoint), what would $x$ equal, and how would this simplify the solution? (2 steps)", "answer": "- Step 1: If uniform, the centre of mass is at the midpoint of AB. Since AB = 1.5 m, AC = 0.24 m, the midpoint is at $0.75$ m from A, so $x = 0.75 - 0.24 = 0.51$ m from C.\n- Step 2: Substituting $x = 0.51$ into $Wx = 150 \\times 1.26 = 189$ gives $W = 189/0.51 \\approx 371$ N. We'd only need one scenario to find $W$. But the problem gives us two scenarios to find both $W$ and $x$, indicating the rod is non-uniform.\n\n**Takeaway:** Two unknowns require two independent equations — that's why the problem gives two scenarios.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "When finding the acceleration on the incline, we use $F = ma$ parallel to the plane: $18\\cos40^\\circ - F - 2g\\sin30^\\circ = 2a$. Explain why the weight component $2g\\sin30^\\circ$ is subtracted (not added). (2 steps)", "answer": "- Step 1: The weight $2g$ acts vertically downward. Its component parallel to the plane, pointing down the slope, is $2g\\sin30^\\circ$. This component opposes the pulling force (which acts up the slope).\n- Step 2: In the equation $F_{\\text{net}} = ma$, we sum forces in the chosen direction (up the slope). Forces up = $18\\cos40^\\circ$; forces down = $F + 2g\\sin30^\\circ$. So $18\\cos40^\\circ - F - 2g\\sin30^\\circ = 2a$.\n\n**Takeaway:** Always decide on a positive direction first, then add forces in that direction and subtract those opposing.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": true}, {"question": "In the train question, if the total distance were 4.8 km but we mistakenly used 4.8 (forgetting to convert to metres), what would be the computed value of $T$? Would this be obviously wrong? (2 steps)", "answer": "- Step 1: Using $4.8$ instead of $4800$: $4.8 = \\frac{1}{2}(3T + 360) \\times 20$ gives $3T + 360 = 0.48$, so $T \\approx -120$ s — impossible.\n- Step 2: More likely, a student might use $48$ or $480$ instead of $4800$, giving $T \\approx 37.3$ or $39.3$ s — close to the correct $40$ s but wrong. The error wouldn't be obvious without checking units. This is why Harry stresses watching units.\n\n**Takeaway:** Always convert distances to metres, time to seconds — consistent SI units prevent subtle errors.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A particle collides with a stationary target. Using conservation of momentum, we find the target's velocity after collision is negative (it moves backwards). Is this physically possible? What does it imply about the collision? (2 steps)", "answer": "- Step 1: Yes, it's physically possible. In a collision where the incoming particle is much lighter than the target, the target can recoil backwards — think of a ping pong ball hitting a bowling ball.\n- Step 2: This is consistent with momentum conservation (total momentum is shared) and energy considerations (kinetic energy may not be conserved in inelastic collisions). The negative sign simply indicates the target moves opposite to our chosen positive direction.\n\n**Takeaway:** A negative velocity after collision just means \"reversed direction\" — not a mathematical error.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In the moments problem, explain why drawing the reaction arrows \"coming out of the rod\" (rather than pushing in) helps prevent mistakes when taking moments. (1 step)", "answer": "- When arrows point away from the rod (outward), their rotational effect (clockwise or anticlockwise) is visually clear. If arrows pointed inward, you'd have to mentally flip their rotation direction, increasing cognitive load and error risk.\n\n**Takeaway:** Make your diagrams match your mental model — arrows out makes rotation direction obvious.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In the inclined plane question, part (c) asks whether the parcel remains at rest when the pulling force is removed. We compare the maximum friction ($\\mu R$) with the weight component down the slope ($mg\\sin\\theta$). Why is this comparison sufficient to answer the question? (2 steps)", "answer": "- Step 1: With no pulling force, the only forces parallel to the slope are friction (up, max $\\mu R$) and the weight component (down, $mg\\sin\\theta$).\n- Step 2: If $mg\\sin\\theta \\leq \\mu R$, the maximum static friction can balance the weight component, and the parcel would remain at rest. If $mg\\sin\\theta > \\mu R$, static friction cannot hold it, and it accelerates down. The comparison directly answers \"does it slide?\"\n\n**Takeaway:** The threshold for motion is when the driving force exceeds the maximum available friction.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the collision problem, the answer for impulse on B is $3m$ N s. If $m$ were doubled, how would the impulse change? What does this tell us about the relationship between impulse and mass? (1 step)", "answer": "- Since impulse = change in momentum = $m(v - u)$, and both the mass and the velocity change scale with $m$, the impulse is directly proportional to $m$. Doubling $m$ doubles the impulse to $6m$ N s.\n\n**Takeaway:** Impulse scales linearly with mass — more mass means more momentum change for the same velocity change.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student says $|x| > 5$ means $x > 5$ or $x < -5$. Another student says it means $x > 5$ or $x < 5$. Which is correct, and why? (1 step)", "answer": "- The first student is correct. $|x| > 5$ means the distance of $x$ from 0 is greater than 5, so $x$ must be more than 5 units away in either direction: $x > 5$ or $x < -5$. The second student has the inequality direction wrong on the negative side.\n\n**Takeaway:** For $|x| > k$ (strict), the solution is $x > k$ OR $x < -k$ — two separate intervals, not one continuous range.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In the velocity-time graph, the trapezium has parallel sides $a$ and $b$ and height $h$. If the graph shows constant speed (horizontal line), what type of geometric shape does that portion create, and what is its area? (1 step)", "answer": "- A horizontal segment at height $h$ for duration $t$ creates a rectangle with width $t$ and height $h$. The area is $h \\times t$ (length × time = distance), which is the standard \"distance = speed × time\" formula.\n\n**Takeaway:** The rectangle is a special case of the trapezium where $a = b = h$.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "When resolving forces on an inclined plane, we treat the weight as two components: $mg\\sin\\theta$ parallel and $mg\\cos\\theta$ perpendicular. Explain geometrically why these are the opposite and adjacent sides relative to the angle $\\theta$. (2 steps)", "answer": "- Step 1: Draw a right triangle with the incline as the hypotenuse. The angle at the base is $\\theta$. The weight acts vertically down (perpendicular to the horizontal).\n- Step 2: The component parallel to the slope ($mg\\sin\\theta$) is opposite to $\\theta$ in the triangle formed by dropping a perpendicular from the weight to the plane. The component perpendicular to the slope ($mg\\cos\\theta$) is adjacent to $\\theta$.\n\n**Takeaway:** Visualise the weight vector being \"projected\" onto the plane directions — sine for the opposite side, cosine for the adjacent.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In the moments question, we solved two equations by dividing: $\\frac{189}{81} = \\frac{x}{0.9-x}$. Explain why this division is valid and doesn't introduce division by zero. (2 steps)", "answer": "- Step 1: We divided because both sides had the form $W \\times (\\text{nonzero quantity})$. The $W$ cancels, leaving a ratio of the distance terms.\n- Step 2: Division by zero would occur if $0.9 - x = 0$ (i.e., $x = 0.9$) or if the denominator were zero. Since $x$ represents a physical distance less than 0.9 (the centre of mass lies between C and D), this cannot happen. The division is safe.\n\n**Takeaway:** Before dividing equations, check that denominators are non-zero in the physical context.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A student completes the perpendicular resolution on the incline as $R = 2g\\cos30^\\circ - 18\\sin40^\\circ$, then substitutes this into $F = \\mu R$ to get friction. Another student writes $F = \\mu(2g\\cos30^\\circ - 18\\sin40^\\circ)$ directly. Are these equivalent, and which approach is cleaner? (2 steps)", "answer": "- Step 1: They are mathematically equivalent. The first student computes $R$ explicitly as $5.40$ N, then multiplies by $\\mu$. The second student keeps $R$ as an expression.\n- Step 2: The second approach is often cleaner for exam workings because it shows the structure: $F = \\mu R$ where $R$ comes from the perpendicular balance. It also makes it easier to spot algebra errors if terms are carried forward.\n\n**Takeaway:** Write $F = \\mu R$ as a separate line, then substitute the expression for $R$ — this shows clear reasoning and earns method marks.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In the train question, the distance is given as 4.8 km. If the answer for $T$ were 40 s, verify quickly that this gives the correct distance by estimation. (2 steps)", "answer": "- Step 1: With $T = 40$ s, acceleration time = 40 s, constant speed = 180 s, deceleration = 80 s. Total time = 300 s = 5 minutes.\n- Step 2: Average speed ≈ (0 + 20 + 0)/3 ≈ 6.67 m/s (more precisely, area/time). Distance ≈ 6.67 × 300 ≈ 2000 m? Wait — the trapezium: average of parallel sides = (220 + 300)/2 = 260 m/s? No: average speed = (area)/time = 5200/300 ≈ 17.3 m/s. Distance ≈ 17.3 × 300 ≈ 5200 m = 5.2 km. The exact is 4.8 km. Slight estimation error — but we're in the right ballpark (within 10%). The exact calculation gives 4.8 km.\n\n**Takeaway:** Quick estimation checks whether your answer is plausible before committing to it.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In collision problems, we sometimes need to find the impulse on each particle. If the impulse on A is $I$, what is the impulse on B, and why? (1 step)", "answer": "- By Newton's third law, forces between particles are equal and opposite, and act for the same duration. Therefore, impulses are equal in magnitude and opposite in direction. If impulse on A is $I$ (in one direction), impulse on B is $-I$.\n\n**Takeaway:** Impulse on B = -impulse on A. Total impulse on the system is zero (no external impulse).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In the moments problem, the distance $x = 0.63$ m is measured from C. If we had measured $x$ from D instead, what equation would change, and how would the solution differ? (2 steps)", "answer": "- Step 1: If $x$ were measured from D, in scenario 1 the distance from C to the weight would become $0.9 - x$ (instead of $x$), and in scenario 2 it would become $x$ (instead of $0.9 - x$). The equations swap.\n- Step 2: Solving the swapped system would give the same physical answer (centre of mass position relative to the rod), just expressed from a different reference point. The algebra would interchange $x$ and $0.9 - x$ in the equations.\n\n**Takeaway:** The physical location of the centre of mass is unique; different reference points just shift the coordinate system.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "When finding the acceleration on the incline, we assumed $g = 9.8$ m/s². If we used $g = 10$ m/s² instead, would the answer change significantly? Estimate the effect. (2 steps)", "answer": "- Step 1: Using $g = 10$ instead of $9.8$ changes each $g$ term by about 2%. The weight components ($2g\\sin30^\\circ$, $2g\\cos30^\\circ$) and the perpendicular equation would all shift slightly.\n- Step 2: The acceleration would change from ~1.18 m/s² to approximately 1.2-1.25 m/s² — a small change, but in an exam you'd lose precision marks. Use $g = 9.8$ unless told otherwise.\n\n**Takeaway:** Using $g = 10$ gives a quick estimate, but $g = 9.8$ is standard for A-level calculations.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In the velocity-time graph, what does a horizontal line at zero velocity represent physically? What about a vertical line? (1 step)", "answer": "- A horizontal line at zero velocity represents the body being at rest (stationary). A vertical line would represent infinite acceleration (instantaneous velocity change), which is physically impossible — it indicates a discontinuity, not a valid motion.\n\n**Takeaway:** Velocity-time graphs must show continuous motion; vertical lines are unphysical.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "In the inequality $|2\\sqrt{n} - 7| < 1$, we solved to get $9 < n < 16$. Could $n = 9.5$ be a solution? What type of number must $n$ be? (1 step)", "answer": "- The original problem asks for integer $n$. While $9.5$ satisfies $9 < n < 16$, it is not an integer, so it does not count toward the six integer solutions. The inequality allows non-integers, but the question restricts to integers.\n\n**Takeaway:** Always check what type of number the question asks for — integers, real numbers, natural numbers, etc.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "When translating the phrase \"the difference between $2\\sqrt{n}$ and 7 is less than 1\" into mathematics, why is modulus notation the correct approach rather than just writing $2\\sqrt{n} - 7 < 1$? (2 steps)", "answer": "- Step 1: The word \"difference\" in everyday language means the size of the gap between two numbers, regardless of which one is larger. We don't know whether $2\\sqrt{n}$ is greater than or less than 7, so we need a way to express \"how far apart\" they are.\n- Step 2: The modulus function $|x|$ gives the absolute (positive) value of $x$, exactly representing distance on a number line. Writing $|2\\sqrt{n} - 7| < 1$ correctly captures \"the difference is less than 1\" regardless of whether $2\\sqrt{n}$ is bigger or smaller than 7. The single inequality $-1 < 2\\sqrt{n} - 7 < 1$ is equivalent to the two separate cases but is much cleaner.\n\n**Takeaway:** \"Difference\" in word problems almost always implies modulus, not a one-sided inequality.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "If you have integers satisfying $9 < n < 16$, how many integer values does $n$ take? Explain why $16 - 9 = 7$ would be wrong. (2 steps)", "answer": "- Step 1: The integers strictly between 9 and 16 are: 10, 11, 12, 13, 14, 15. That's 6 integers.\n- Step 2: The formula \"largest - smallest\" gives the gap between the endpoints, not the count. To count inclusive integers from $a$ to $b$, you need $(b - a) + 1$. Here $16 - 9 = 7$ gives the difference, but adding 1 accounts for including both endpoint values in your count. Think of i
