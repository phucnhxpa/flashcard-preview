<script>
const cards = [{"q": "When a question says \"the difference between two quantities is less than 1,\" why does this translate to a modulus inequality rather than a simple inequality? What does \"difference\" imply about the relationship between the two quantities? (2 steps)", "a": "- Step 1: The word \"difference\" means we care about the *size of the gap* between two quantities, not which one is bigger. If we wrote $$2\\sqrt{n} - 7 < 1$$, that only covers the case where $$2\\sqrt{n}$$ is bigger than 7. But \"difference\" doesn't tell us which is larger \u2014 it could be that 7 is bigger than $$2\\sqrt{n}$$, and the gap is still less than 1. The modulus captures both possibilities: $$|2\\sqrt{n} - 7| < 1$$ means \"the absolute gap between these two numbers is under 1,\" regardless of ordering.\n- Step 2: This is why modulus is the natural mathematical translation of \"difference\" \u2014 it strips away sign information and measures pure distance. A common misconception is to write just $$2\\sqrt{n} - 7 < 1$$, which silently assumes $$2\\sqrt{n} > 7$$ and misses the entire range where $$2\\sqrt{n} < 7$$ but still close to it.\n\nThe modulus is the mathematical embodiment of \"how far apart are these things, regardless of direction.\"", "source": "GLM 5.1"}, {"q": "How do you remove the modulus from $$|X| < k$$ (where $$k > 0$$) to get a chain inequality? What visual tool makes this intuitive and why? (2 steps)", "a": "- Step 1: $$|X| < k$$ means \"X lies within a distance k of zero.\" On a number line, this is the interval from $$-k$$ to $$k$$ \u2014 everything strictly between those two endpoints. That gives us the chain: $$-k < X < k$$. The number line is the visual tool because it directly shows distance from zero as horizontal displacement.\n- Step 2: Why the number line is superior to splitting into two cases ($$X < k$$ and $$-X < k$$): the chain inequality treats both bounds simultaneously in one expression, reducing algebraic steps and the chance of mistakes. Harry explicitly steered Phuc away from the two-case split toward the single chain because it's cleaner and faster. The number line picture also makes the endpoints obvious, which is critical when you later need to count integers within the range.\n\nDrawing the number line isn't just decoration \u2014 it's the reasoning tool that prevents off-by-one errors.", "source": "GLM 5.1"}, {"q": "When solving $$9 < n < 16$$ for integer $$n$$, why is the count **not** $$16 - 9 = 7$$? What is the correct count formula, and what visual reasoning prevents this mistake? (2 steps)", "a": "- Step 1: The integers satisfying $$9 < n < 16$$ are {10, 11, 12, 13, 14, 15} \u2014 six numbers. The naive subtraction $$16 - 9 = 7$$ is wrong because it counts the \"gap size\" between 9 and 16, not the number of integer points sitting inside that gap. The boundaries 9 and 16 are *excluded* (strict inequality), so you're counting from 10 to 15 inclusive.\n- Step 2: The correct formula for counting integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. Here: $$15 - 10 + 1 = 6$$. The \"+1\" accounts for the fact that both endpoints are included \u2014 think of it as: you need to count the starting point itself, which subtraction alone doesn't do. A number line sketch with dots on each integer makes this visually obvious: you can literally see and count the six dots between 9 and 16.\n\nHarry's quote: \"Lots of students would do 15 \u2212 10 to get five and make a mistake\u2026 you always have to remember to add one.\"", "source": "GLM 5.1"}, {"q": "In the chain inequality $$-1 < 2\\sqrt{n} - 7 < 1$$, why must you add 7 to *all three parts* simultaneously rather than just to the middle? What goes wrong if you only add to one side? (2 steps)", "a": "- Step 1: A chain inequality $$A < B < C$$ is actually two inequalities bundled together: $$A < B$$ AND $$B < C$$. When you add 7, you must add it to every part because adding a constant shifts the entire number line. If you only added 7 to the middle, you'd get $$-1 < 2\\sqrt{n} < 8$$, which is wrong \u2014 the left bound didn't shift, so the interval is incorrectly widened on one side.\n- Step 2: The correct operation: $$-1 + 7 < 2\\sqrt{n} - 7 + 7 < 1 + 7$$ gives $$6 < 2\\sqrt{n} < 8$$, which preserves the same width of the interval (still width 2) but shifts it to center on 7 instead of 0. This is equivalent to saying \"$$2\\sqrt{n}$$ must be within distance 1 of 7,\" which is exactly what the original modulus statement meant.\n\nOperations on chain inequalities must be applied uniformly \u2014 they're simultaneous constraints, not independent ones.", "source": "GLM 5.1"}, {"q": "When squaring all three parts of $$3 < \\sqrt{n} < 4$$ to get $$9 < n < 16$$, why is this operation valid without flipping any inequality signs? What condition makes squaring safe? (2 steps)", "a": "- Step 1: Squaring preserves the order of inequalities *only when all three parts are positive*. Here, 3, $$\\sqrt{n}$$, and 4 are all positive (since $$\\sqrt{n} \\geq 0$$ for real $$n$$, and 3 > 0), so squaring is safe: $$3^2 < (\\sqrt{n})^2 < 4^2$$ gives $$9 < n < 16$$ correctly.\n- Step 2: If any part were negative, squaring would reverse the relationship. For example, $$-3 < -2$$ but $$(-3)^2 = 9 > (-2)^2 = 4$$ \u2014 the inequality flips because squaring maps negative numbers to positive ones, destroying the original ordering. This is why you must verify all parts are positive before squaring a chain. In this problem, the lower bound 3 guarantees positivity throughout.\n\nSquaring inequalities is a one-way street that only goes smoothly when everything is on the positive side of the number line.", "source": "GLM 5.1"}, {"q": "In conservation of linear momentum (PCLM), why must you fix a *positive direction* before writing the equation? What happens if velocities are plugged in as unsigned speeds? (2 steps)", "a": "- Step 1: Momentum is a vector quantity \u2014 it has direction. The equation $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$ uses *signed* velocities, where the sign encodes direction. If particle B moves opposite to particle A, its velocity must be entered as negative. Using unsigned speeds (e.g., both +1.5) would mean you're claiming both particles move the same way, which contradicts \"opposite directions\" and produces a wrong momentum balance.\n- Step 2: In Q2, taking A's initial direction as positive means $$u_A = +1.5$$ and $$u_B = -1.5$$ (B moves the opposite way). The total initial momentum is $$3m(1.5) + m(-1.5) = 3m$$, not $$3m(1.5) + m(1.5) = 6m$$. The sign convention must be consistent across every term in the equation \u2014 before and after collision. Switching conventions mid-equation is a common source of sign errors.\n\nThe positive direction is your coordinate axis for the problem \u2014 choose it once, commit to it, and every velocity gets a sign relative to that axis.", "source": "GLM 5.1"}, {"q": "Why does \"A's direction of motion is unchanged\" after a collision give you information about the *sign* of A's final velocity? How does this constrain the algebra? (2 steps)", "a": "- Step 1: If A was moving in the positive direction before the collision (velocity +1.5), and its direction is *unchanged* after, then A's final velocity $$v_A$$ must also be positive. This isn't just a physical observation \u2014 it's an algebraic constraint that tells you $$v_A > 0$$, ruling out any solution where $$v_A$$ comes out negative.\n- Step 2: This constraint also helps you set up the relationship between the two final velocities. In Q2, since A continues positive and B must rebound (it was moving toward A, so after collision it bounces back in A's direction), both final velocities are positive. The \"difference of speeds is 1\" then becomes $$v_B - v_A = 1$$ (since B is faster after rebounding), giving $$v_B = v_A + 1$$, not $$v_A - v_B = 1$$.\n\n\"Direction unchanged\" is a sign constraint disguised as a physical description \u2014 it tells you which branch of the algebra to follow.", "source": "GLM 5.1"}, {"q": "Why is impulse defined as $$I = mv - mu$$ (change in momentum) rather than just $$mv$$ (final momentum)? What physical idea does the \"change\" capture? (2 steps)", "a": "- Step 1: Impulse measures the *effect of the collision on the particle* \u2014 how much the collision changed the particle's state. A particle sitting still after a collision ($$v = 0$$) still experienced an impulse if it was moving before ($$u \\neq 0$$): the collision brought it to rest, which is a real physical effect. If impulse were just $$mv$$, a particle ending at rest would have zero impulse, which contradicts the fact that the collision definitely acted on it.\n- Step 2: The \"change\" formulation $$I = mv - mu$$ captures the kick or shove the particle received. Before the collision, the particle had momentum $$mu$$; after, it has $$mv$$. The difference is exactly what the collision added (or removed). This also makes impulse a vector \u2014 it inherits the sign from the velocity change, so a collision that reverses a particle's direction gives a large impulse (big change), while one that barely affects it gives a small one.\n\nImpulse is the \"before vs. after\" story of a single particle \u2014 it's not about the total system, it's about what happened to *this* particle specifically.", "source": "GLM 5.1"}, {"q": "When a question asks for the \"magnitude of the impulse,\" why must the final answer be a positive number with no modulus bars? What does \"magnitude\" mean in this context? (2 steps)", "a": "- Step 1: \"Magnitude\" means the size of the impulse, stripped of direction information. Just as the magnitude of a velocity vector is the speed (always positive), the magnitude of an impulse vector is its absolute value. The calculation $$I = mv - mu$$ may produce a negative number depending on your sign convention, but the magnitude is $$|I|$$, which is always positive.\n- Step 2: In the final answer, you write the positive value without modulus bars because the question has already told you it wants the magnitude. Writing $$|3m|$$ or $$3m$$ N s both convey the same positive quantity, but $$3m$$ is cleaner and directly answers \"what is the magnitude?\" Adding modulus bars to a final magnitude answer is redundant \u2014 you've already taken the absolute value. Harry emphasized: \"Can it be negative if it's asking for the magnitude? No.\"\n\n\"Magnitude\" is the examiner's way of saying: \"I want the size, not the direction \u2014 give me a positive number.\"", "source": "GLM 5.1"}, {"q": "Why should you label your final numerical answers (e.g., write \"speed of A = 0.5\" rather than just \"0.5\")? What marking risk does unlabeled numbers create? (2 steps)", "a": "- Step 1: When a question asks for two quantities (like \"find the speed of A and the speed of B\"), the examiner needs to know which number corresponds to which particle. If you write just \"0.5 and 1.5\" without labels, the examiner can't tell if you mean A = 0.5, B = 1.5 or A = 1.5, B = 0.5. One ordering might be correct and the other wrong, but without labels, the mark scheme may not award the mark.\n- Step 2: Harry stressed this twice: \"write 'speed of A' and 'speed of B' next to your values so the examiner knows.\" This is especially critical in momentum problems where two final velocities are found simultaneously from one equation \u2014 there's inherent ambiguity about which is which unless you explicitly state it. Labels are free marks that protect you from ambiguity.\n\nLabels are your communication to the examiner \u2014 they turn ambiguous numbers into clear, credited answers.", "source": "GLM 5.1"}, {"q": "On a speed\u2013time graph, why does the area under the curve represent distance? What is the geometric intuition behind this? (2 steps)", "a": "- Step 1: At any instant, speed \u00d7 a tiny time interval $$\\delta t$$ gives the tiny distance $$\\delta s$$ traveled in that interval (from the definition $$speed = distance/time$$, rearranged). The area under the graph between two times is the sum of all these tiny rectangles: $$\\sum (speed \\times \\delta t) = \\sum \\delta s = total\\ distance$$. This is exactly the integral $$\\int v\\, dt = s$$.\n- Step 2: For simple shapes like trapeziums, the area formula gives the distance directly without needing calculus. The trapezium's two parallel sides are speeds (the start and end speeds, or the constant speed and the peak speed), the height is the time duration, and the area is the total distance covered during that time phase. This is why memorizing the trapezium area formula is a direct shortcut to finding distance on speed\u2013time graphs.\n\nArea = distance is not a coincidence \u2014 it's the graphical manifestation of \"speed times time equals distance,\" summed over the whole journey.", "source": "GLM 5.1"}, {"q": "Why is the trapezium area formula $$\\frac{1}{2}(a+b)h$$ preferable to splitting a speed\u2013time graph shape into \"two triangles and a rectangle\"? What specific risks does the split approach introduce? (2 steps)", "a": "- Step 1: The trapezium formula handles the entire shape in one expression, requiring you to identify only three quantities: the two parallel sides (speeds) and the height (time). Splitting into triangles and a rectangle requires identifying five or more quantities (two heights, two bases, one rectangle width), each introducing a potential labeling or arithmetic error.\n- Step 2: Harry's warning: \"Lots of students break it into two triangles and a rectangle. That's okay, but it's slow and you make little mistakes.\" The specific risks include: misidentifying which segment is the rectangle vs. the triangles, getting the base lengths of the triangles wrong (they depend on time markers that are easy to misplace), and arithmetic errors from computing three separate areas and adding them. One trapezium formula, one calculation, one answer \u2014 fewer steps, fewer mistakes.\n\nThe trapezium formula is the compressed version of the split approach \u2014 it's the same mathematics but with fewer opportunities to go wrong.", "source": "GLM 5.1"}, {"q": "In the train problem, the constant-speed phase lasts 180 s. Why is the time marker at the *end* of this phase $$T + 180$$, not just 180? What does \"where you measure time from\" mean? (2 steps)", "a": "- Step 1: Time markers on the horizontal axis of a speed\u2013time graph are measured from the *start* (time = 0, when the train begins moving). The acceleration phase lasts $$T$$ seconds, so the first marker is at $$T$$. The constant-speed phase lasts 180 seconds *after that*, so the next marker is at $$T + 180$$, not 180. Writing \"180\" would mean the constant-speed phase starts at time 0, which contradicts the acceleration phase existing first.\n- Step 2: The deceleration phase lasts $$2T$$ seconds (because deceleration is half the acceleration magnitude, so it takes twice as long to reduce speed by the same amount). The final marker is $$T + 180 + 2T = 3T + 180$$. If you misplace any marker, every subsequent calculation (trapezium base lengths, area, distance) uses wrong values. Harry: \"Be careful where you measure that three minutes from\u2026 otherwise the whole thing snowballs from there.\"\n\nTime markers are cumulative from the origin \u2014 each phase adds its duration to the previous end time, not to zero.", "source": "GLM 5.1"}, {"q": "Why does \"the magnitude of the acceleration is twice the magnitude of the deceleration\" imply the deceleration phase lasts $$2T$$ seconds? What's the geometric reasoning on the speed\u2013time graph? (2 steps)", "a": "- Step 1: On a speed\u2013time graph, acceleration magnitude = gradient (slope) of the line. The acceleration phase goes from speed 0 to speed 20 in time $$T$$, so its gradient is $$\\frac{20}{T}$$ (steep). The deceleration phase goes from speed 20 back to 0, with gradient magnitude half of that: $$\\frac{10}{T}$$ (less steep, shallower slope).\n- Step 2: A shallower slope means it takes longer to cover the same speed change. Going from 20 to 0 at gradient $$\\frac{10}{T}$$ means the time needed is $$\\frac{20}{10/T} = \\frac{20T}{10} = 2T$$. Geometrically: the down-slope is half as steep, so it's twice as wide. The trapezium's right-hand triangle is a stretched version of the left-hand one \u2014 same height (speed change of 20), but twice the base (time).\n\nGradient = acceleration; shallower gradient = smaller acceleration magnitude = longer time for the same speed change. This is pure graph geometry.", "source": "GLM 5.1"}, {"q": "In the trapezium area calculation for the train problem, the two parallel sides are the *bottom* (total time $$3T + 180$$) and the *top* (constant-speed duration 180). Why is the top side 180 and not 20? What do the parallel sides actually represent? (2 steps)", "a": "- Step 1: On a speed\u2013time graph, the trapezium's parallel sides are horizontal segments \u2014 they lie along lines of constant speed. The bottom parallel side is the full time span from start to end ($$3T + 180$$), running along the time axis (speed = 0). The top parallel side is the constant-speed segment at speed 20, which has length 180 on the time axis because the train maintains 20 m/s for 180 seconds.\n- Step 2: The parallel sides are *time durations*, not speeds. The height of the trapezium is the speed (20), measured vertically. A common mistake is to use the speeds (0 and 20) as the parallel sides \u2014 but 0 and 20 aren't parallel sides of this trapezium; they're the bottom edge and the top edge's vertical position. The actual parallel sides are the horizontal lengths: the full base and the flat top portion. The formula $$\\frac{1}{2}(a+b)h$$ uses $$a = 3T+180$$ (total time), $$b = 180$$ (constant-speed time), $$h = 20$$ (peak speed).\n\nThe parallel sides of a speed\u2013time trapezium are time intervals, not speed values. The speed is the height.", "source": "GLM 5.1"}, {"q": "Why must you convert 4.8 km to 4800 m before using it in the trapezium area equation? What would go wrong if you left it as 4.8? (2 steps)", "a": "- Step 1: The trapezium area formula produces distance in metres when the height (speed) is in m/s and the parallel sides (times) are in seconds: $$\\frac{1}{2}(a+b)h$$ has units of (seconds)(m/s) = metres. If you set this equal to 4.8 (interpreted as kilometres), you're equating a metre-valued expression to a kilometre-valued number \u2014 a factor-of-1000 mismatch.\n- Step 2: Setting $$\\frac{1}{2}(3T+180+180)(20) = 4.8$$ would give $$10(3T+360) = 4.8$$, leading to $$3T + 360 = 0.48$$, which makes $$T$$ negative \u2014 physically impossible. The correct equation $$10(3T+360) = 4800$$ gives $$3T + 360 = 480$$, yielding $$T = 40$$. Harry flagged this as a \"very common mistake.\"\n\nUnit consistency is not optional \u2014 speed in m/s and time in s demand distance in m. Always convert km to m (multiply by 1000) before entering the equation.", "source": "GLM 5.1"}, {"q": "What does \"on the point of tilting about C\" physically mean for the support at D? Why does this let you set $$R_D = 0$$? (2 steps)", "a": "- Step 1: \"On the point of tilting about C\" means the rod is *just about* to rotate around C \u2014 it's at the threshold where D's support becomes irrelevant. Physically, the rod is lifting off the support at D. At the exact tipping point, D is no longer pushing up on the rod, so the reaction force at D is zero: $$R_D = 0$$.\n- Step 2: This is the key that makes moments problems solvable. Without the tilting condition, you'd have two unknown reactions ($$R_C$$ and $$R_D$$) plus the weight and position \u2014 too many unknowns. The tilting condition eliminates one reaction entirely, reducing the unknowns and allowing a single moments equation to solve the problem. Similarly, \"tilting about D\" gives $$R_C = 0$$.\n\n\"Tilting about X\" = \"the support not at X is about to lose contact\" = \"that reaction is zero.\" This is the moments equivalent of a boundary condition.", "source": "GLM 5.1"}, {"q": "When taking moments about a pivot point, why do forces whose line of action passes *through* the pivot have zero moment? What is the geometric reason? (2 steps)", "a": "- Step 1: Moment = force \u00d7 perpendicular distance from the pivot. If a force's line of action passes through the pivot point, the perpendicular distance from the pivot to that line is zero \u2014 the force acts right at the pivot. Zero distance means zero moment, regardless of how large the force is.\n- Step 2: This is strategically useful: when you choose your pivot at the location of an unknown reaction force (like $$R_C$$), that reaction has zero moment about C and disappears from the equation. You eliminate an unknown \"for free\" without needing a separate equation. Harry: \"If they're zero, you don't have to write them.\" Choosing the pivot wisely is the first tactical decision in any moments problem.\n\nThe pivot choice is a variable-elimination tool \u2014 place it on an unknown force to make that force vanish from the equation.", "source": "GLM 5.1"}, {"q": "Why does the \"clockwise = anticlockwise\" approach to writing moments equations produce fewer sign errors than the \"sum of all moments = 0\" approach? What's the practical difference? (2 steps)", "a": "- Step 1: In the \"clockwise = anticlockwise\" method, you physically identify which forces create clockwise rotation and which create anticlockwise rotation, then set the totals equal. Each side is a sum of positive quantities (force \u00d7 distance), so there are no minus signs to manage. In the \"sum = 0\" method, you must assign signs to every moment (positive for one direction, negative for the other), then sum them all \u2014 every sign assignment is a potential error.\n- Step 2: In Q4, Phuc initially tried a \"sum to zero\" approach and picked up sign errors (stray minus signs, wrong distances). When Harry redirected him to \"clockwise = anticlockwise,\" the equation became clean: $$Wx = 150 \\times 1.26$$ \u2014 no minus signs, no confusion about which terms are negative. The LHS is all anticlockwise contributions, the RHS is all clockwise, and equality is the balance condition.\n\n\"Clockwise = anticlockwise\" is the physical statement of equilibrium translated directly into algebra \u2014 it bypasses the sign-assignment step that causes errors.", "source": "GLM 5.1"}, {"q": "In the moments problem, why was dividing equation (A) by equation (B) a better strategy than substituting one into the other? What algebraic advantage does division provide? (2 steps)", "a": "- Step 1: Both equations contained the unknown $$W$$ as a factor: (A) was $$189 = Wx$$ and (B) was $$81 = (0.9-x)W$$. Dividing (A) by (B): $$\\frac{189}{81} = \\frac{Wx}{(0.9-x)W} = \\frac{x}{0.9-x}$$ \u2014 the $$W$$ cancels immediately, leaving one equation in one unknown ($$x$$). Substitution would require expressing $$W = 189/x$$ from (A), plugging into (B) to get $$81 = (0.9-x)\\frac{189}{x}$$, then expanding and rearranging \u2014 more steps, more algebra, more risk.\n- Step 2: Division is the shortcut whenever two equations share a common multiplicative factor. It's the same principle as solving $$3y = 12$$ and $$5y = 20$$ \u2014 dividing gives $$3/5 = 12/20$$, confirming consistency, or in non-trivial cases, eliminating $$y$$ to relate other variables. Harry: \"A really good habit \u2014 it helps in Mechanics 2 and in pure maths too.\" Box and label your equations (A) and (B) so you can refer to them cleanly when dividing.\n\nWhen two equations share a factor, division eliminates it in one step \u2014 substitution takes three. Choose the faster road.", "source": "GLM 5.1"}, {"q": "In Scenario 2 of the moments problem, the distance from pivot D to the weight W was $$0.9 - x$$, not $$x$$. Why? What does $$x$$ actually measure, and why must you recompute the distance when you change the pivot? (2 steps)", "a": "- Step 1: The variable $$x$$ was defined as the distance from C to the centre of mass. When you take moments about C, the weight's perpendicular distance from C is simply $$x$$ \u2014 that's what $$x$$ means. But when you switch the pivot to D, the distance from D to the centre of mass is no longer $$x$$; it's a different quantity that depends on the geometry of the rod.\n- Step 2: D is at distance 0.36 from B (i.e., at position $$1.5 - 0.36 = 1.14$$ from A). C is at 0.24 from A. The centre of mass is at $$0.24 + x$$ from A. So the distance from D to the centre of mass is $$1.14 - (0.24 + x) = 0.9 - x$$. Phuc's initial error was using $$x$$ as the distance from D, which is wrong \u2014 $$x$$ is measured from C, not from D. Changing the pivot changes the reference point, and every distance must be recalculated relative to the new pivot.\n\n$$x$$ is anchored to C. When the pivot moves to D, you must re-derive the distance \u2014 you can't reuse $$x$$ as-is because it's measured from a different origin.", "source": "GLM 5.1"}, {"q": "On an inclined plane at angle $$\\theta$$, why does the weight $$mg$$ split into components $$mg\\sin\\theta$$ (down the slope) and $$mg\\cos\\theta$$ (into the plane)? What is the geometric reasoning? (2 steps)", "a": "- Step 1: The weight $$mg$$ acts vertically downward. To resolve it into components aligned with and perpendicular to the slope, you project the vertical vector onto two axes: one running along the slope (the \"parallel\" axis) and one running perpendicular to the slope (the \"normal\" axis). The angle between the vertical direction and the normal-to-plane direction is $$\\theta$$ (the inclination angle), so the component perpendicular to the plane is $$mg\\cos\\theta$$ (adjacent side of the right triangle formed by the resolution).\n- Step 2: The component along the slope is the \"opposite\" side of that same triangle: $$mg\\sin\\theta$$. A common misconception is to swap these \u2014 putting $$mg\\cos\\theta$$ along the slope and $$mg\\sin\\theta$$ into the plane. This comes from confusing the angle: the angle between the weight vector and the slope direction is $$90\u00b0 - \\theta$$, not $$\\theta$$. The correct picture: draw the weight arrow pointing down, then draw the slope. The angle between the weight and the *perpendicular to the slope* is $$\\theta$$ \u2014 that's where the cosine goes.\n\nThe cosine always goes with the direction that makes the *smaller* angle with the weight vector. Since the plane is tilted, the perpendicular to the plane is closer to vertical than the slope direction is \u2014 so $$\\cos\\theta$$ pairs with the perpendicular component.", "source": "GLM 5.1"}, {"q": "When resolving forces on an inclined plane, why must you resolve *perpendicular to the plane* (not \"vertically\")? What's the difference, and what goes wrong if you resolve vertically? (2 steps)", "a": "- Step 1: \"Perpendicular to the plane\" and \"vertical\" are different directions unless the plane is horizontal. The perpendicular-to-plane direction is tilted at angle $$\\theta$$ from the vertical. Resolving perpendicular to the plane gives you the normal reaction $$R$$ directly \u2014 it's the force the surface exerts perpendicular to itself. Resolving vertically would mix the normal reaction with the friction force (which has a vertical component on a slope), creating a coupled equation that's harder to solve.\n- Step 2: The key advantage: in the perpendicular-to-plane direction, there is no acceleration (the parcel doesn't fly off the surface or sink into it), so forces balance: $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$. This gives $$R$$ immediately. If you resolved vertically, you'd have to account for both $$R$$ (which has a vertical component $$R\\cos\\theta$$) and friction (which has a vertical component $$F\\sin\\theta$$), creating an equation involving two unknowns. Harry: \"Say 'perpendicular to the plane,' not 'vertical.'\"\n\nResolve in the direction where forces naturally separate \u2014 perpendicular to the plane isolates the normal reaction; parallel isolates friction and the driving force.", "source": "GLM 5.1"}, {"q": "Why must you state $$F = \\mu R$$ as its own separate line in your working, rather than just substituting $$\\mu R$$ directly into the parallel equation? What mark does this line earn? (2 steps)", "a": "- Step 1: The friction relation $$F = \\mu R$$ is a distinct physical law (the definition of limiting/kinetic friction). Exam mark schemes typically allocate a dedicated mark for stating this relationship explicitly \u2014 it demonstrates you know the friction model, separate from your ability to resolve forces or apply Newton's second law. Burying it inside a longer equation means the examiner can't easily identify and credit this knowledge.\n- Step 2: Harry: \"Write F (or $$F_R$$) first and then state $$F = \\mu R$$ as its own line \u2014 there is usually a mark for it.\" The workflow should be: (1) resolve perpendicular \u2192 find $$R$$, (2) write $$F = \\mu R$$ as a standalone equation, (3) compute $$F$$, (4) resolve parallel \u2192 substitute $$F$$ into $$F = ma$$. Each step is a separate mark opportunity. Skipping step (2) by going straight from $$R$$ to $$\\mu R$$ inside the parallel equation merges two mark-worthy actions into one visible line.\n\n$$F = \\mu R$$ is a checkpoint the examiner expects to see \u2014 write it on its own line to claim the mark that's sitting there for it.", "source": "GLM 5.1"}, {"q": "Why do marks come from the *equations* you write, not from the diagram you draw? What does this imply about how you should allocate time in an inclined-plane question? (2 steps)", "a": "- Step 1: Diagrams are worth at most 1\u20132 marks (usually for the sketch in part (a) of a graph question). The substantial marks \u2014 for resolving forces, applying $$F = \\mu R$$, using $$F = ma$$, solving for acceleration \u2014 all come from the algebraic equations you write down. A beautiful diagram with perfectly drawn force arrows but no equations earns almost nothing, because the examiner can't see your reasoning process or your application of the physics.\n- Step 2: Harry's direct warning: \"In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\" The implication: spend your time writing clear, labeled equations (perpendicular balance, $$F = \\mu R$$, parallel $$F = ma$$) rather than perfecting the diagram. The diagram is a planning tool \u2014 it tells you what forces exist so you can write the equations. The equations are the deliverable.\n\nDraw the diagram to plan, write the equations to score. The diagram is the map; the equations are the journey that gets marks.", "source": "GLM 5.1"}, {"q": "When an external force (like the 18 N at 40\u00b0 to the plane) acts on a parcel on an inclined plane, how do you resolve this force into components? What angle do you use, and why? (2 steps)", "a": "- Step 1: The 18 N force acts at 40\u00b0 *to the plane* (i.e., to the line of greatest slope). To resolve it, you project onto the same two axes you used for the weight: parallel to the plane and perpendicular to the plane. The component along the slope is $$18\\cos 40\u00b0$$ (cosine pairs with the direction the angle is measured from \u2014 the slope), and the component perpendicular to the slope (lifting away from the surface) is $$18\\sin 40\u00b0$$.\n- Step 2: A critical detail: the 18 N force pulls *away from* the plane (upward at 40\u00b0 to the slope), so its perpendicular component $$18\\sin 40\u00b0$$ acts in the same direction as the normal reaction \u2014 it *reduces* the net force pressing the parcel into the plane. This is why the perpendicular balance becomes $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$, giving $$R = 2g\\cos 30\u00b0 - 18\\sin 40\u00b0$$, which is *smaller* than the normal reaction would be without the 18 N force. Less normal reaction means less friction \u2014 the pulling force literally reduces the grip of the surface.\n\nThe angle in the question (40\u00b0 to the plane) is already measured from the slope direction \u2014 no need to convert. Cosine along the slope, sine perpendicular.", "source": "GLM 5.1"}, {"q": "Why does the 18 N force's perpendicular component ($$18\\sin 40\u00b0$$) *reduce* the normal reaction $$R$$ rather than increase it? What physical picture explains this? (2 steps)", "a": "- Step 1: The normal reaction $$R$$ is the surface's response to forces pushing the parcel into the surface. Without the 18 N force, the only force pressing the parcel into the plane is the weight's perpendicular component $$2g\\cos 30\u00b0$$, and $$R$$ matches it exactly. The 18 N force pulls the parcel *away from* the surface (its perpendicular component points outward from the plane), so the surface doesn't need to push back as hard.\n- Step 2: The perpendicular balance: forces into the plane = forces out of the plane. Into the plane: $$2g\\cos 30\u00b0$$ (weight component). Out of the plane: $$R + 18\\sin 40\u00b0$$ (reaction + pull's perpendicular component). Setting them equal: $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$, so $$R = 2g\\cos 30\u00b0 - 18\\sin 40\u00b0 \\approx 5.40$$ N. Without the 18 N force, $$R$$ would be $$2g\\cos 30\u00b0 \\approx 17.0$$ N \u2014 the pull reduces the normal reaction by about 11.6 N.\n\nThink of it like pulling a book off a table at an angle \u2014 the upward component of your pull reduces how hard the table has to push up. Less contact force = less normal reaction = less friction available.", "source": "GLM 5.1"}, {"q": "In Q8, friction acts *down the slope* (opposing the upward motion). Could friction ever act *up the slope* on this parcel? Under what condition would the direction flip? (2 steps)", "a": "- Step 1: Friction always opposes the *motion or tendency of motion*. When the parcel is being pulled up the slope, friction resists that motion and acts down the slope. If the parcel were sliding down the slope (or about to slide down), friction would oppose that downward motion and act up the slope. The direction of friction is not fixed \u2014 it depends on what the parcel is trying to do.\n- Step 2: In part (c) of Q8, when the 18 N force is removed, the weight component down the slope ($$2g\\sin 30\u00b0 = 9.8$$ N) exceeds the maximum available friction ($$\\mu R \\approx 5.09$$ N). The parcel tries to slide down, so friction acts up the slope trying to hold it \u2014 but it can't provide enough force. If the weight component had been smaller than $$\\mu R$$, friction would have held the parcel at rest, acting up the slope at exactly the weight component's magnitude (not at $$\\mu R$$ \u2014 only the *maximum* friction is $$\\mu R$$; static friction adjusts to match the driving force up to that limit).\n\nFriction is a reactive force \u2014 it doesn't have a fixed direction or magnitude. It opposes whatever the object is trying to do, and its magnitude adjusts up to the limit $$\\mu R$$.", "source": "GLM 5.1"}, {"q": "Why can friction *never exceed* the driving force that creates it? What happens when the weight component down the slope is greater than $$\\mu R$$? (2 steps)", "a": "- Step 1: Friction is a reaction force \u2014 it exists in response to a driving force trying to cause motion. Static friction adjusts its magnitude to exactly cancel the driving force (up to its maximum $$\\mu R$$), keeping the object at rest. It never \"over-cancelles\" \u2014 if friction were larger than the driving force, it would accelerate the object in the opposite direction, which violates the principle that friction opposes the tendency of motion.\n- Step 2: When the driving force exceeds $$\\mu R$$ (the maximum friction), friction can no longer hold the object still. It provides its maximum value $$\\mu R$$ in the opposing direction, and the net force (driving force minus $$\\mu R$$) causes acceleration. In Q8(c), the driving force down the slope is $$2g\\sin 30\u00b0 = 9.8$$ N, but $$\\mu R \\approx 5.09$$ N. Since $$9.8 > 5.09$$, friction can't hold the parcel \u2014 it slides down. Harry: \"Friction here exists only because we pull the parcel; it can at most match the driving component.\"\n\nFriction fights back, but it has a budget cap of $$\\mu R$. If the driving force exceeds that cap, friction spends its full budget and the excess force causes acceleration.", "source": "GLM 5.1"}, {"q": "What is the distinction between \"static friction\" (adjustable up to $$\\mu R$$) and \"kinetic/limiting friction\" (fixed at $$\\mu R$$)? When does each apply? (2 steps)", "a": "- Step 1: Static friction applies when the object is at rest and not sliding. Its magnitude is *whatever is needed* to prevent motion, up to a maximum of $$\\mu R$$. If a small force pushes the parcel gently, static friction matches it exactly (e.g., a 2 N push \u2192 2 N friction). As the push increases, static friction increases too \u2014 until it hits the ceiling $$\\mu R$$.\n- Step 2: Kinetic (or limiting) friction applies when the object is sliding, or when it's \"on the point of moving\" (limiting equilibrium). At this point, friction is at its maximum: $$F = \\mu R$$ exactly. In M1 exam questions, phrases like \"on the point of slipping\" or \"the coefficient of friction is 0.3 and the parcel is moving\" tell you to use $$F = \\mu R$$ as a fixed value. If the object is at rest and *not* on the point of slipping, friction is an unknown $$F \\leq \\mu R$$ that you determine from the equilibrium conditions.\n\n+ \"Moving\" or \"on the point of slipping\" \u2192 $$F = \\mu R$$ (known value)\n+ \"At rest, not about to slip\" \u2192 $$F < \\mu R$$ (unknown, found from equilibrium)\n\nThe phrase \"on the point of\" is the trigger that tells you friction has reached its maximum.", "source": "GLM 5.1"}, {"q": "In Q2, the initial setup had Phuc briefly using 4.5 instead of 1.5 as the initial speed. What conceptual error does this represent, and how does it distort the momentum equation? (2 steps)", "a": "- Step 1: The error was entering the initial speed as 4.5 (which is $$3 \\times 1.5$$, the *momentum* of particle A) rather than 1.5 (the *velocity* of A). The PCLM equation uses velocities, not momenta, as the terms \u2014 each term is $$m \\times u$$, so the velocity must be the actual speed with its sign, not the pre-multiplied momentum value. Writing $$3m \\times 4.5$$ double-counts the mass: it's $$3m \\times (3 \\times 1.5) = 9m \\times 1.5$$, which is three times the correct momentum of A.\n- Step 2: This produced answers of 2.75 and 3.75 for the final speeds \u2014 wrong values that differ from the correct 0.5 and 1.5. The lesson: in PCLM, each term is $$mass \\times velocity$$. The velocity is the signed speed of the individual particle, not the product of mass and speed. Write the velocity first, then multiply by mass \u2014 don't pre-multiply and then multiply again.\n\nThe PCLM equation is $$m_A u_A + m_B u_B = ...$$ \u2014 plug in the *velocity* (1.5, with sign), then multiply by mass. Don't plug in the momentum (4.5) and then multiply by mass again.", "source": "GLM 5.1"}, {"q": "In the moments problem, Harry corrected Phuc's instinct to draw reaction arrows pointing *into* the rod. Why does drawing them *out of* the rod reduce mistakes? (2 steps)", "a": "- Step 1: Reaction forces from supports push *upward* on the rod \u2014 they're the surface pushing the rod away from itself. Drawing them as arrows coming out of the rod (pointing upward, away from the surface) correctly represents their physical direction. Drawing them pointing into the rod (downward) would mean the support is pushing the rod *into* the surface, which is the opposite of what a support does.\n- Step 2: The practical advantage: when you write \"clockwise = anticlockwise,\" the direction of each arrow tells you immediately which side of the equation it belongs on. An upward arrow on the right side of the pivot creates an anticlockwise moment; a downward weight arrow on the right side creates a clockwise moment. If you drew reactions pointing down (wrong direction), you'd misclassify them in the moments equation. Harry: \"Draw the reaction arrows coming out of the rod \u2014 clearer, fewer mistakes when you take moments.\"\n\nArrows out of the rod = correct physics + correct classification in the moments equation. Direction matters for both the diagram and the algebra.", "source": "GLM 5.1"}, {"q": "Why should you \"box and label\" key equations as (A) and (B) in moments problems? What practical benefit does this provide for the algebra that follows? (2 steps)", "a": "- Step 1: Boxing and labeling equations like (A) $$189 = Wx$$ and (B) $$81 = (0.9-x)W$$ makes them easy to reference in subsequent steps. When you divide (A) by (B), you can write \"$$\\frac{(A)}{(B)}$$: $$\\frac{189}{81} = \\frac{x}{0.9-x}$$\" \u2014 clear, traceable, and no need to re-write the full equations. Without labels, you'd have to copy out both equations again, introducing transcription errors.\n- Step 2: Harry: \"A really good habit \u2014 it helps in Mechanics 2 and in pure maths too.\" The habit extends beyond M1: in any problem where you derive two equations from two scenarios and then combine them, labels let you manipulate them symbolically. It also helps the examiner follow your working \u2014 they can see exactly which equation you're dividing and verify the step. Labels are both a computational tool and a communication tool.\n\nLabeling equations is the mathematical equivalent of naming your variables \u2014 it turns anonymous expressions into referenced objects you can operate on cleanly.", "source": "GLM 5.1"}, {"q": "Why is it important to write $$2g$$ (rather than a numerical value) for the weight in the early stages of an inclined-plane problem? When should you substitute $$g = 9.8$$? (2 steps)", "a": "- Step 1: Writing $$2g$$ keeps the weight symbolic, which makes the algebra cleaner and the structure of the equations more visible. The perpendicular balance $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$ clearly shows where the weight component appears. If you immediately computed $$2 \\times 9.8 = 19.6$$ and wrote $$R + 18\\sin 40\u00b0 = 19.6\\cos 30\u00b0$$, the connection to the mass and gravity is obscured, and any arithmetic error in the initial multiplication propagates through all subsequent steps.\n- Step 2: Substitute $$g = 9.8$$ only when you need a numerical answer \u2014 typically at the final calculation stage. Harry's tip: \"Write the weight as $$2g$$ straight away.\" This also makes it easier to check your work: if the final answer seems wrong, you can trace back through the symbolic equations to find where the error occurred, rather than debugging a chain of decimal multiplications.\n\nKeep symbols symbolic until the last possible moment \u2014 it preserves clarity, reduces error propagation, and makes verification easier.", "source": "GLM 5.1"}, {"q": "When the 18 N force is removed in Q8(c), why must you recalculate the normal reaction $$R$$? Why can't you reuse the $$R \\approx 5.40$$ N from part (a)? (2 steps)", "a": "- Step 1: The normal reaction depends on *all* forces with perpendicular components. In part (a), the 18 N force's perpendicular component ($$18\\sin 40\u00b0$$) was pulling the parcel away from the plane, reducing $$R$$ to $$2g\\cos 30\u00b0 - 18\\sin 40\u00b0 \\approx 5.40$$ N. When the 18 N force is removed, that upward pull vanishes, and the only force pressing the parcel into the plane is the weight's perpendicular component.\n- Step 2: The new normal reaction is simply $$R = 2g\\cos 30\u00b0 \\approx 17.0$$ N \u2014 much larger than before. This changes the maximum friction from $$\\mu R \\approx 0.3 \\times 5.40 \\approx 1.62$$ N (part a) to $$\\mu R \\approx 0.3 \\times 17.0 \\approx 5.09$$ N (part c). Any calculation that reuses the old $$R$$ would get the wrong friction and the wrong conclusion about whether the parcel slides. Forces determine $$R$$; when forces change, $$R$$ changes.\n\n$$R$$ is not a property of the parcel \u2014 it's a property of the *current force configuration*. Change the forces, recompute $$R$$.", "source": "GLM 5.1"}, {"q": "In Q8(c), why does comparing the weight component down the slope ($$2g\\sin 30\u00b0$$) to the maximum friction ($$\\mu R$$) tell you whether the parcel remains at rest? What is the decision rule? (2 steps)", "a": "- Step 1: When the 18 N force is removed, the only force trying to move the parcel down the slope is the weight component $$2g\\sin 30\u00b0 = 9.8$$ N. The only force opposing this is friction, which can provide at most $$\\mu R = 0.3 \\times 2g\\cos 30\u00b0 \\approx 5.09$$ N. If maximum friction \u2265 driving force, the parcel stays at rest (friction adjusts to match the driving force exactly). If maximum friction < driving force, friction can't hold it and the parcel accelerates down.\n- Step 2: Here, $$9.8 > 5.09$$, so the parcel does *not* remain at rest \u2014 it slides down. The decision rule is: compare $$mg\\sin\\theta$$ (gravity's pull down the slope) with $$\\mu mg\\cos\\theta$$ (maximum friction). Simplifying: the parcel stays at rest if $$\\tan\\theta \\leq \\mu$$, and slides if $$\\tan\\theta > \\mu$$. Here $$\\tan 30\u00b0 \\approx 0.577 > 0.3 = \\mu$$, confirming the parcel slides. This inequality test is a quick check that bypasses full equation setup.\n\n+ If $$\\tan\\theta \\leq \\mu$$: parcel can rest (friction is strong enough)\n+ If $$\\tan\\theta > \\mu$$: parcel slides (friction is insufficient)\n\nThe $$\\tan\\theta$$ vs $$\\mu$$ comparison is the distilled version of the full force comparison \u2014 it strips out mass and gravity, leaving only the slope angle and friction coefficient.", "source": "GLM 5.1"}, {"q": "Synthesis question: A particle of mass $$m$$ slides down a rough inclined plane at angle $$\\theta$$, with coefficient of friction $$\\mu$$. Without doing any calculation, explain the qualitative relationship between the acceleration down the slope and the values of $$\\theta$$ and $$\\mu$$. What happens in the limiting cases $$\\mu = 0$$ and $$\\mu = \\tan\\theta$$? (3 steps)", "a": "- Step 1: The net force down the slope is the driving component minus friction: $$mg\\sin\\theta - \\mu mg\\cos\\theta = mg(\\sin\\theta - \\mu\\cos\\theta)$$, giving acceleration $$a = g(\\sin\\theta - \\mu\\cos\\theta)$$. As $$\\theta$$ increases, $$\\sin\\theta$$ grows and $$\\cos\\theta$$ shrinks, so the driving force increases and friction decreases \u2014 acceleration increases. As $$\\mu$$ increases, friction ($$\\mu\\cos\\theta$$) grows, reducing the net force \u2014 acceleration decreases.\n- Step 2: Limiting case $$\\mu = 0$$ (no friction): $$a = g\\sin\\theta$$ \u2014 the full weight component drives the motion, nothing opposes it. This is the smooth-plane result, the fastest possible acceleration for this angle. Limiting case $$\\mu = \\tan\\theta$$: $$a = g(\\sin\\theta - \\tan\\theta\\cos\\theta) = g(\\sin\\theta - \\sin\\theta) = 0$$ \u2014 friction exactly balances the weight component, and the particle is in limiting equilibrium (on the point of slipping but not accelerating).\n- Step 3: For $$\\mu > \\tan\\theta$$, the expression $$\\sin\\theta - \\mu\\cos\\theta$$ becomes negative, which would mean acceleration *up* the slope \u2014 but this is impossible because there's no upward driving force. In this regime, static friction holds the particle at rest with $$a = 0$$, and the actual friction force is less than $$\\mu R$$ (it only uses what it needs). The formula $$a = g(\\sin\\theta - \\mu\\cos\\theta)$$ only applies when the particle is actually sliding.\n\nAcceleration is a tug-of-war between gravity's slope component and friction. Steeper slope or less friction \u2192 gravity wins more \u2192 faster sliding. The balance point is $$\\mu = \\tan\\theta$$.", "source": "GLM 5.1"}, {"q": "Synthesis question: In a moments problem with two supports, you have two scenarios producing equations (A) and (B). One scenario has an upward force at one end; the other has a downward force at the same end. Why do these two scenarios give you *two independent equations* rather than just one? What makes them independent? (2 steps)", "a": "- Step 1: Each scenario has a different tilting condition (tilting about C vs. tilting about D), which eliminates a *different* reaction force each time. Scenario 1 eliminates $$R_D$$ (tilting about C); Scenario 2 eliminates $$R_C$$ (tilting about D). Since each equation is taken about a different pivot with a different set of forces having zero moment, the two equations involve the unknowns $$W$$ and $$x$$ in different combinations \u2014 they are not multiples of each other.\n- Step 2: Equation (A): $$Wx = 189$$ relates $$W$$ and $$x$$ with $$x$$ as the distance from C. Equation (B): $$81 = (0.9-x)W$$ relates $$W$$ and $$x$$ with $$0.9-x$$ as the distance from D. These are genuinely different constraints \u2014 one says \"the moment of W about C equals 189,\" the other says \"the moment of W about D equals 81.\" Two different pivots, two different moment arms, two independent equations \u2192 two unknowns can be solved.\n\nIndependence comes from different pivots and different force configurations \u2014 each scenario gives the rod a different balance condition, producing a different algebraic relationship between the unknowns.", "source": "GLM 5.1"}, {"q": "Simple exercise: A particle of mass 3 kg has velocity 4 m/s in the positive direction. It receives an impulse that reverses its direction, and it now moves at 2 m/s in the negative direction. Without heavy calculation, what is the sign and rough magnitude of the impulse? (2 steps)", "a": "- Step 1: Impulse = change in momentum = $$mv - mu = 3(-2) - 3(4) = -6 - 12 = -18$$ N s. The impulse is *negative*, meaning it acts in the negative direction \u2014 it pushed the particle backward, which is consistent with reversing the motion.\n- Step 2: If the question asks for *magnitude*, the answer is 18 N s (positive, no sign). The key insight: reversing direction always produces a large impulse because you're changing momentum by nearly twice the original momentum (from +12 to \u22126, a swing of 18). A collision that merely slows a particle without reversing it would give a smaller impulse.\n\nReversing direction \u2248 double the original momentum change \u2014 the impulse must kill the forward momentum and then create backward momentum, so it's roughly $$2 \\times |mu|$$ in magnitude.", "source": "GLM 5.1"}, {"q": "Simple exercise: A speed\u2013time graph forms a triangle: speed goes from 0 to 10 m/s in 5 s, then back to 0 in 5 s. What is the total distance, and why can you find it without the trapezium formula? (2 steps)", "a": "- Step 1: The shape is a triangle with base 10 s (total time) and height 10 m/s (peak speed). Area = $$\\frac{1}{2} \\times 10 \\times 10 = 50$$ m. This is the total distance. You don't need the trapezium formula because there's no flat top \u2014 the shape is purely triangular, so the triangle area formula applies directly.\n- Step 2: If there *were* a flat top (constant speed phase), the shape would be a trapezium and you'd need $$\\frac{1}{2}(a+b)h$$ where $$a$$ and $$b$$ are the parallel sides (time durations at speed 0 and at the peak speed). The triangle is the special case where the top parallel side has length 0, making $$\\frac{1}{2}(0+b)h = \\frac{1}{2}bh$$ \u2014 exactly the triangle formula. The trapezium formula generalizes the triangle formula.\n\nThe triangle is a trapezium with one parallel side of length zero. The trapezium formula reduces to the triangle formula in this limiting case.", "source": "GLM 5.1"}, {"q": "Simple exercise: A uniform rod of length 2 m and weight 100 N rests on a support at its midpoint. A 50 N weight hangs from the right end. Where should a second support be placed (distance from left end) so the rod doesn't tilt? Use qualitative reasoning about moments balance. (2 steps)", "a": "- Step 1: The rod is uniform, so its weight acts at the midpoint (1 m from either end). The 50 N weight at the right end (2 m from left) creates a clockwise moment about the midpoint of $$50 \\times 1 = 50$$ N\u00b7m (distance from midpoint to right end is 1 m). The rod's own weight has zero moment about the midpoint (it acts through the midpoint).\n- Step 2: To prevent tilting to the right, the second support must provide an anticlockwise moment about the midpoint, or equivalently, the support must be on the left side so its upward reaction creates an anticlockwise moment. If the support is at distance $$d$$ from the left end (so distance $$1-d$$ from the midpoint on the left side), its reaction $$R$$ creates anticlockwise moment $$R(1-d)$$ about the midpoint. For balance: $$R(1-d) = 50$$, and vertical balance: $$R + 100 = 50 + R_{mid}$$... The simplest placement: put the second support at the left end ($$d = 0$$), giving maximum anticlockwise leverage (1 m from midpoint), requiring the smallest reaction force.\n\nSupports closer to the side that's trying to tilt provide more leverage with less force \u2014 moments are force \u00d7 distance, so more distance means less force needed.", "source": "GLM 5.1"}, {"q": "Simple exercise: A block on a slope at 45\u00b0 with $$\\mu = 0.5$$ has no external forces besides gravity and contact. Does it slide? Use the $$\\tan\\theta$$ vs $$\\mu$$ test. (2 steps)", "a": "- Step 1: The decision rule: the block stays at rest if $$\\tan\\theta \\leq \\mu$$, and slides if $$\\tan\\theta > \\mu$$. Here $$\\theta = 45\u00b0$$, so $$\\tan 45\u00b0 = 1$$, and $$\\mu = 0.5$$.\n- Step 2: Since $$1 > 0.5$$, i.e., $$\\tan\\theta > \\mu$$, the block slides. The weight component down the slope ($$mg\\sin 45\u00b0$$) exceeds the maximum friction ($$\\mu mg\\cos 45\u00b0 = 0.5 mg\\cos 45\u00b0$$). Since $$\\sin 45\u00b0 = \\cos 45\u00b0$$, the comparison reduces to $$mg\\cos 45\u00b0 > 0.5 mg\\cos 45\u00b0$$ \u2014 clearly the driving force wins.\n\nAt 45\u00b0, gravity's slope component equals gravity's normal component. Friction can only resist with half the normal component (since $$\\mu = 0.5$$), so it's overpowered. The block slides.", "source": "GLM 5.1"}, {"q": "Why does Harry recommend underlining key words in every mechanics question? What are examples of words that \"make a big difference,\" and what goes wrong if you miss them? (2 steps)", "a": "- Step 1: Mechanics questions are wordy, and single words encode critical physical or mathematical constraints. \"Difference\" \u2192 modulus inequality (not simple inequality). \"Magnitude\" \u2192 positive answer (no negative sign). \"Unchanged\" \u2192 sign constraint on velocity. \"On the point of tilting\" \u2192 reaction force is zero. Missing any of these words means you set up the wrong mathematical model from the start.\n- Step 2: The consequence of missing a key word cascades through the entire solution. If you miss \"magnitude\" and give a negative impulse, you lose the final mark. If you miss \"on the point of tilting\" and keep both reactions as unknowns, you can't solve the moments equation at all. If you miss \"difference\" and write a simple inequality, you get half the solution range. Harry: \"Mechanics is very wordy, and often a single word makes a big difference.\"\n\nUnderlining is the decoding step \u2014 it translates English physics language into mathematical constraints before you start any algebra.", "source": "GLM 5.1"}, {"q": "Why should you use a calculator for intermediate steps (like $$150 \\times 1.26 = 189$$) rather than trying to keep everything symbolic until the end? What balance does Harry recommend? (2 steps)", "a": "- Step 1: Intermediate calculations like $$150 \\times 1.26$$ are straightforward arithmetic that's easy to do wrong by hand (misplace a decimal, forget a digit). The calculator gives you the exact value (189) instantly and reliably, which you then use in the next step. Keeping it symbolic ($$150(1.5 - 0.24)$$) throughout the solution means you carry increasingly complex expressions, making the algebra harder to manage and verify.\n- Step 2: The balance: keep key *structural* quantities symbolic (like $$2g$$ for weight, $$W$$ and $$x$$ for unknowns in moments), but compute *numerical* intermediates (distances, products of known numbers) with the calculator. Harry's approach in Q4: the distances $$1.5 - 0.24 = 1.26$$ and $$150 \\times 1.26 = 189$$ were computed immediately, but $$W$$ and $$x$$ stayed symbolic until the final solve. This keeps equations clean while avoiding arithmetic slips.\n\nSymbolic for unknowns and structural quantities; calculator for known-number arithmetic. The equations stay readable, and the numbers stay accurate.", "source": "GLM 5.1"}, {"q": "In the inequalities warm-up, why did Phuc initially count \"16 \u2212 9 = 7 numbers\" and how did the number line sketch self-correct this? What does this illustrate about the role of visual verification? (2 steps)", "a": "- Step 1: Phuc computed $$16 - 9 = 7$$ as the count of integers between 9 and 16. This is the \"gap size\" reasoning \u2014 subtracting the boundaries gives the length of the interval, not the number of integer points inside it. The interval from 9 to 16 has length 7, but the integers *strictly between* 9 and 16 are {10, 11, 12, 13, 14, 15} \u2014 only 6. The subtraction counts the \"space\" between endpoints, not the \"dots\" on the number line.\n- Step 2: When Phuc drew the number line with dots on each integer from 10 to 15, he could literally count the dots: six. The visual representation made the error immediately obvious \u2014 you can see that 9 and 16 are boundary marks (not dots to count) and the dots between them are exactly six. This is why Harry asked for the number line: it's a self-checking tool that turns abstract interval reasoning into concrete, verifiable counting.\n\nThe number line converts \"how many integers in this range?\" from an algebraic calculation (prone to off-by-one) into a visual counting exercise (prone to... just counting correctly).", "source": "GLM 5.1"}, {"q": "Edge case: What if the inequalities warm-up had asked for $$n$$ such that the difference between $$2\\sqrt{n}$$ and 7 is *at most* 1 (i.e., $$\\leq$$ instead of $$<$$)? How would the solution change? (2 steps)", "a": "- Step 1: \"At most 1\" means $$|2\\sqrt{n} - 7| \\leq 1$$, which translates to $$-1 \\leq 2\\sqrt{n} - 7 \\leq 1$$. The chain inequality now includes the endpoints. Following the same steps: add 7 \u2192 $$6 \\leq 2\\sqrt{n} \\leq 8$$, divide by 2 \u2192 $$3 \\leq \\sqrt{n} \\leq 4$$, square \u2192 $$9 \\leq n \\leq 16$$.\n- Step 2: The integer count changes because the boundaries are now *included*: $$n \\in \\{9, 10, 11, 12, 13, 14, 15, 16\\}$$, which is $$16 - 9 + 1 = 8$$ integers. The original problem (strict inequality) gave 6 integers; the non-strict version gives 8. The two extra integers (9 and 16) come from including the boundary points. This shows why the distinction between $$<$$ and $$\\leq$$ matters for integer counting \u2014 each boundary adds exactly one integer to the count.\n\nStrict inequalities exclude boundaries (2 fewer integers); non-strict include them. The difference is always exactly 2 for a bounded integer range with both endpoints affected.", "source": "GLM 5.1"}, {"q": "Counterexample probe: In a collision problem, could both particles reverse direction after collision? What physical constraint might prevent this, and how would you detect it algebraically? (2 steps)", "a": "- Step 1: Yes, both particles can reverse direction. Consider a light particle moving fast toward a heavy stationary particle \u2014 the light particle bounces back (reverses), and the heavy particle moves forward (doesn't reverse). But if both are moving toward each other with comparable momenta, it's possible for both to reverse: the collision is so violent that each particle rebounds from the other.\n- Step 2: The algebraic detection: if you set up PCLM and solve for final velocities, a negative $$v_A$$ means A reversed, and a negative $$v_B$$ means B reversed. The constraint that prevents certain combinations is energy (kinetic energy can't increase in a simple collision), but M1 doesn't use energy \u2014 it only uses momentum. So PCLM alone can produce solutions where both reverse, and you must check whether the speeds are physically reasonable (e.g., no particle ends up faster than the total initial momentum divided by its mass would allow). The question statement \"A's direction is unchanged\" is an explicit constraint that rules out A reversing.\n\nBoth-reversal is algebraically possible from PCLM alone \u2014 the question's physical constraints (like \"direction unchanged\") are what rule out specific solution branches.", "source": "GLM 5.1"}, {"q": "Misconception probe: Why can't you write the impulse on particle B as $$I = m_B v_B - m_A u_A$$ (mixing particles A and B)? What does impulse actually measure? (2 steps)", "a": "- Step 1: Impulse measures the change in momentum of a *single specific particle*. The formula is $$I = mv - mu$$ for one particle \u2014 its mass, its initial velocity, its final velocity. Mixing A's initial momentum with B's final momentum ($$m_B v_B - m_A u_A$$) is meaningless \u2014 it's the difference between two different particles' momenta at two different times, not the change in any one particle's state.\n- Step 2: The impulse on B is $$m_B v_B - m_B u_B$$ \u2014 B's momentum after minus B's momentum before. The impulse on A is $$m_A v_A - m_A u_A$$ \u2014 A's change. These are generally different values (different masses, different velocity changes). By Newton's third law, the impulse on A from B is equal and opposite to the impulse on B from A, but each impulse is computed using *that particle's own* mass and velocity change. Never cross particles in an impulse calculation.\n\nImpulse is a personal quantity \u2014 it belongs to one particle. \"Impulse on B\" uses only B's data; \"impulse on A\" uses only A's data. Mixing them is like computing your height change using someone else's initial height.", "source": "GLM 5.1"}, {"q": "Misconception probe: On an inclined plane, a student writes \"vertical equilibrium: $$R = mg$$.\" Why is this wrong, and what is the correct equilibrium statement? (2 steps)", "a": "- Step 1: $$R = mg$$ would be correct only on a *horizontal* plane, where the normal reaction directly balances the full weight. On an inclined plane, the weight is split into two components: $$mg\\cos\\theta$$ into the plane and $$mg\\sin\\theta$$ along the plane. The normal reaction only needs to balance the component *perpendicular to the plane* (the one pressing into the surface), not the full weight.\n- Step 2: The correct equilibrium statement is *perpendicular to the plane*: $$R = mg\\cos\\theta$$ (for a particle with no other forces having perpendicular components). The component $$mg\\sin\\theta$$ along the slope is not balanced by $$R$$ \u2014 it's either balanced by friction (if the particle is at rest) or causes acceleration (if the particle slides). Writing $$R = mg$$ on a slope overestimates the normal reaction by a factor of roughly $$1/\\cos\\theta$$, which cascades into an overestimated friction force.\n\nOn a slope, $$R < mg$$ \u2014 the surface only needs to resist the component of weight pressing into it, not the full weight. The slope component is gravity's \"free ride\" downhill.", "source": "GLM 5.1"}, {"q": "Why does the trapezium formula $$\\frac{1}{2}(a+b)h$$ give the *average of the parallel sides times the height*? What is the intuitive derivation? (2 steps)", "a": "- Step 1: Think of the trapezium as a rectangle that's been \"stretched\" from width $$a$$ to width $$b$$ along its length. At any horizontal position, the width varies linearly from $$a$$ to $$b$$, so the average width across the whole shape is $$\\frac{a+b}{2}$$ \u2014 the midpoint of the linear variation. A shape with constant width equal to this average would have the same area as the trapezium.\n- Step 2: Area = average width \u00d7 height = $$\\frac{a+b}{2} \\times h = \\frac{1}{2}(a+b)h$$. This is why the formula has the $$\\frac{1}{2}$$ \u2014 it's the averaging factor. On a speed\u2013time graph, the \"widths\" are speeds at the start and end of a phase, and the \"height\" is time. The average speed across a phase with linear speed change is $$\\frac{v_{start} + v_{end}}{2}$$, and distance = average speed \u00d7 time \u2014 exactly the trapezium formula.\n\nThe $$\\frac{1}{2}$$ isn't mysterious \u2014 it's the average. The trapezium area is \"average parallel side \u00d7 height,\" and averaging two numbers requires dividing by 2.", "source": "GLM 5.1"}, {"q": "What does the $$\\frac{1}{2}$$ in the trapezium formula $$\\frac{1}{2}(a+b)h$$ represent, and why is it described as \"the single most-forgotten part\"? What goes wrong if you omit it? (2 steps)", "a": "- Step 1: The $$\\frac{1}{2}$$ is the averaging factor \u2014 it converts the sum $$a + b$$ into the average $$\\frac{a+b}{2}$$, which is the effective width of the trapezium. Without it, you'd compute $$a \\times b \\times h$$ or $$a + b \\times h$$, which is not the average and overestimates the area by a factor of 2. The area would be twice the correct value.\n- Step 2: In the train problem, omitting $$\\frac{1}{2}$$ would give $$20(3T + 360) = 4800$$ instead of $$10(3T+360) = 4800$$, leading to $$3T + 360 = 240$$ and $$T = -40$$ \u2014 a nonsensical negative time. Phuc's own reflection: \"I need to make sure I memorise the formula of a trapezium.\" The $$\\frac{1}{2}$$ is easy to drop because it's a small factor that doesn't \"look important\" in the middle of a calculation with larger numbers, but it fundamentally changes the result.\n\nThe $$\\frac{1}{2}$$ halves your answer. Without it, every distance from a speed\u2013time trapezium is double the true value \u2014 and the resulting time or speed calculations become physically impossible.", "source": "GLM 5.1"}, {"q": "In Q8, the perpendicular equation on Phuc's photo showed $$2g\\sin 30\u00b0$$ where it should have been $$2g\\cos 30\u00b0$$. What conceptual confusion does this swap reveal, and how can you systematically prevent it? (2 steps)", "a": "- Step 1: The swap of $$\\sin$$ and $$\\cos$$ in the perpendicular equation reveals confusion about which component goes with which direction. The perpendicular-to-plane direction makes angle $$\\theta$$ with the vertical, so the weight's perpendicular component is $$mg\\cos\\theta$$ (cosine pairs with the direction closer to the weight vector). Writing $$mg\\sin\\theta$$ in the perpendicular equation means you've assigned the *slope component* to the *perpendicular direction* \u2014 a role reversal.\n- Step 2: Prevention strategy: always draw the resolution triangle. The weight arrow points down. Split it: the component *into the plane* is the one that's closer to the weight direction (makes angle $$\\theta$$ with it) \u2192 cosine. The component *along the slope* is the one that's further from the weight direction (makes angle $$90\u00b0 - \\theta$$ with it) \u2192 sine. Alternatively, remember: $$\\cos\\theta$$ is always the *larger* component (for $$\\theta < 45\u00b0$$), and the perpendicular component is larger than the slope component for shallow angles \u2014 so $$\\cos\\theta$$ pairs with perpendicular.\n\n+ Perpendicular to plane (into the surface): $$mg\\cos\\theta$$\n+ Parallel to plane (down the slope): $$mg\\sin\\theta$$\n\nThe cosine component is the one \"closer\" to the original weight direction. Since the perpendicular-to-plane direction is closer to vertical than the slope direction, cosine goes with perpendicular.", "source": "GLM 5.1"}, {"q": "Synthesis: In the train problem (Q1), if the acceleration magnitude equaled the deceleration magnitude (instead of being twice), how would the trapezium shape change and what would happen to $$T$$? Reason qualitatively. (2 steps)", "a": "- Step 1: If acceleration magnitude = deceleration magnitude, both slopes on the speed\u2013time graph have the same steepness. The acceleration phase goes from 0 to 20 in time $$T$$, and the deceleration phase goes from 20 to 0 in the same time $$T$$ (same gradient magnitude, same speed change). The trapezium becomes symmetric \u2014 the left and right triangles are mirror images.\n- Step 2: The total time becomes $$T + 180 + T = 2T + 180$$ (instead of $$3T + 180$$). The trapezium area: $$\\frac{1}{2}((2T+180) + 180)(20) = 10(2T + 360) = 4800$$, giving $$2T + 360 = 480$$, so $$T = 60$$ s. Compared to the original $$T = 40$$ s: equal acceleration/deceleration means each phase takes longer (60 vs 40 for acceleration, 60 vs 80 for deceleration), because the acceleration is gentler. The total journey time is $$2(60) + 180 = 300$$ s vs the original $$3(40) + 180 = 300$$ s \u2014 same total time, but distributed differently.\n\nEqual slopes \u2192 symmetric trapezium \u2192 longer acceleration phase but shorter deceleration phase. The total time can stay the same if the distance constraint adjusts the phase durations accordingly.", "source": "GLM 5.1"}, {"q": "In a collision where both particles move in the same direction before collision (one faster, catching up), why is the setup different from \"opposite directions toward each other\"? How do the signs differ? (2 steps)", "a": "- Step 1: When both move in the same direction, both initial velocities are *positive* (with the same sign convention). If A moves at 4 m/s and B at 1 m/s in the same direction, then $$u_A = +4$$ and $$u_B = +1$$ \u2014 no negative signs. The total initial momentum is $$m_A(4) + m_B(1)$$, a straightforward sum. When they move in opposite directions, one velocity must be negative: $$u_A = +1.5$$, $$u_B = -1.5$$.\n- Step 2: The \"catching up\" scenario means A is behind B but faster, so A approaches B from behind. After collision, A typically slows down and B speeds up (both still moving forward). The key difference: in the \"opposite directions\" case, B *rebounds* (reverses direction), giving a large velocity change and large impulse. In the \"same direction\" case, B just speeds up \u2014 a smaller velocity change, smaller impulse. The sign conventions are simpler (all positive) but the physics is gentler.\n\nSame-direction collisions: all velocities positive, smaller impulses. Opposite-direction collisions: mixed signs, larger impulses (reversals). The sign pattern encodes the physical intensity of the collision.", "source": "GLM 5.1"}, {"q": "Why is the impulse on B in Q2 equal to $$3m$$ N s, and what does the factor of 3 mean physically? Could the impulse on A also be $$3m$$? (2 steps)", "a": "- Step 1: Impulse on B = $$m(v_B - u_B) = m(1.5 - (-1.5)) = m(3) = 3m$$. The factor 3 comes from the velocity *swing*: B went from \u22121.5 (moving toward A) to +1.5 (moving away from A), a change of 3 m/s. The mass is $$m$$, so impulse = $$3m$$. The \"3\" is the total velocity reversal magnitude \u2014 B's speed didn", "source": "GLM 5.1"}, {"q": "A question says \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1.\" Why does the word \"difference\" force us to use a modulus inequality rather than a simple inequality, and what is the resulting expression? (2 steps)", "a": "- Step 1: \"Difference\" means the size of the gap between two quantities, regardless of which is larger. We don't know whether $$2\\sqrt{n} > 7$$ or $$2\\sqrt{n} < 7$$, so we cannot simply write $$2\\sqrt{n} - 7 < 1$$ (that would assume $$2\\sqrt{n}$$ is bigger). The modulus captures \"gap size\" automatically: $$|2\\sqrt{n} - 7| < 1$$.\n- Step 2: This modulus inequality translates to the chain $$-1 < 2\\sqrt{n} - 7 < 1$$, meaning $$2\\sqrt{n}$$ must lie strictly between 6 and 8. The modulus is the mathematically honest way to say \"the distance between these two things is small.\"\n\nThe key insight: whenever a problem says \"difference between A and B is less than C,\" write $$|A - B| < C$$ \u2014 the modulus protects you from assuming which is bigger.", "source": "GLM 5.1"}, {"q": "When solving $$|X| < k$$ (where $$k > 0$$), explain why the number-line picture leads to the chain inequality $$-k < X < k$$, and why this is more efficient than splitting into two separate cases. (2 steps)", "a": "- Step 1: On a number line, $$|X| < k$$ means \"the distance from $$X$$ to 0 is less than $$k$$.\" That means $$X$$ lives in the open interval between $$-k$$ and $$k$$, giving $$-k < X < k$$ in one clean statement.\n- Step 2: The alternative \u2014 splitting into $$X < k$$ and $$-X < k$$ (i.e., $$X > -k$$) \u2014 is logically equivalent but slower and more error-prone, because you must correctly negate the inequality in the second case and then recombine. The chain $$-k < X < k$$ captures both bounds simultaneously.\n\nHarry's advice: \"Think number line first.\" The visual makes the double bound obvious without case-splitting.", "source": "GLM 5.1"}, {"q": "You need to count the integers strictly between 9 and 16 (i.e., $$9 < n < 16$$). A student writes $$16 - 9 = 7$$ integers. What is the correct count, and what is the general formula for counting integers from $$a$$ to $$b$$ inclusive? (2 steps)", "a": "- Step 1: The integers strictly between 9 and 16 are $$\\{10, 11, 12, 13, 14, 15\\}$$. Listing them out gives 6 integers, not 7. The student's subtraction $$16 - 9 = 7$$ is wrong because it counts the \"gaps\" between numbers, not the numbers themselves.\n- Step 2: The general formula for the number of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. Here, $$15 - 10 + 1 = 6$$. The \"$$+1$$\" compensates for the fact that subtraction counts intervals, not endpoints. Sketching a number line makes the endpoints visible and prevents this off-by-one error.\n\nHarry: \"Lots of students would do $$15 - 10$$ to get five and make a mistake\u2026 you always have to remember to add one.\"", "source": "GLM 5.1"}, {"q": "After establishing $$3 < \\sqrt{n} < 4$$, you square all three parts to get $$9 < n < 16$$. Why is it valid to square an inequality chain without flipping any inequality signs here, and when would squaring require more care? (2 steps)", "a": "- Step 1: Squaring is a monotonically increasing function on positive numbers. Since all three parts of $$3 < \\sqrt{n} < 4$$ are strictly positive, squaring preserves the order: $$3^2 < (\\sqrt{n})^2 < 4^2$$ gives $$9 < n < 16$$ with no sign flips needed.\n- Step 2: Squaring would require care if any part of the chain were negative. For example, $$-3 < x < 2$$ does NOT square to $$9 < x^2 < 4$$ \u2014 that's nonsense. When negative values are involved, you must split into cases or use the number-line picture instead. The safe rule: squaring a chain is valid only when you can guarantee all parts are non-negative.", "source": "GLM 5.1"}, {"q": "State the Conservation of Linear Momentum (PCLM) equation for two particles $$A$$ and $$B$$ colliding directly. What physical condition must hold for momentum to be conserved, and why must velocity be treated as a signed quantity? (3 steps)", "a": "- Step 1: The PCLM equation is $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$, where $$m$$ = mass, $$u$$ = velocity before collision, $$v$$ = velocity after collision.\n- Step 2: The physical condition: there must be no external impulse acting on the system. In practice, \"a smooth horizontal surface\" or \"no external forces\" in the question tells you PCLM applies. If an external force acts during the collision time, momentum is not conserved.\n- Step 3: Velocity is signed because direction matters. Two particles moving in opposite directions at the same speed have opposite momenta \u2014 they don't simply add. You must fix one direction as positive and apply that convention consistently to every velocity term. A common error is entering both speeds as positive when one particle moves in the negative direction.", "source": "GLM 5.1"}, {"q": "In a collision problem, particle $$A$$ moves right at $$1.5 \\text{ m s}^{-1}$$ and particle $$B$$ moves left at $$1.5 \\text{ m s}^{-1}$$. If right is positive, what are $$u_A$$ and $$u_B$$? Why is it wrong to write both as $$+1.5$$? (2 steps)", "a": "- Step 1: Taking right as positive: $$u_A = +1.5$$ (moving right, same as positive direction) and $$u_B = -1.5$$ (moving left, opposite to positive direction). The signs encode direction.\n- Step 2: Writing both as $$+1.5$$ would mean both particles move in the same direction \u2014 they would never collide! The minus sign on $$u_B$$ is not optional decoration; it is the mathematical expression of \"moving the other way.\" Omitting it changes the physics entirely and produces a wrong momentum equation.", "source": "GLM 5.1"}, {"q": "Define impulse in terms of momentum. If a question asks for the \"magnitude of the impulse exerted on $$B$$,\" what two things must you do to ensure a correct answer? (2 steps)", "a": "- Step 1: Impulse equals the change in momentum: $$I = mv - mu$$, where $$v$$ is the final velocity and $$u$$ is the initial velocity of the same particle. Use the same positive-direction convention as in the momentum equation.\n- Step 2: Two requirements: (a) Calculate impulse for the specific particle named \u2014 \"impulse on $$B$$\" means use $$B$$'s mass and velocities, not $$A$$'s. (b) \"Magnitude\" means the final answer must be a positive number. If your calculation yields a negative, the impulse acts in the opposite direction; the magnitude is the absolute value. Never leave a minus sign in a magnitude answer.", "source": "GLM 5.1"}, {"q": "A student computes impulse on $$B$$ as $$I = m(v_B - u_B)$$ and gets a negative value. The question asks for the \"magnitude of the impulse.\" What should they report, and what does the negative sign actually tell them? (2 steps)", "a": "- Step 1: Report the absolute value \u2014 a positive number. \"Magnitude\" always means a non-negative quantity. If $$I = -3m$$, the magnitude is $$3m$$ N s.\n- Step 2: The negative sign tells you the
