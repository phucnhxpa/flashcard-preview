id": "glm_1_8", "judge_pick": false}, {"question": "A particle B of mass $$m$$ moves at 1.5 m/s to the left before a collision and 1.5 m/s to the right after. A student says \"the speed is the same, so the impulse on B must be zero.\" Why is this wrong? (3 steps)", "answer": "- Step 1: Impulse depends on velocity (a vector), not speed (a scalar). Taking right as positive: before the collision, B's velocity is $$u_B = -1.5$$; after, $$v_B = +1.5$$.\n- Step 2: The change in momentum is $$m(v_B - u_B) = m(1.5 - (-1.5)) = m \\times 3 = 3m$$. This is the impulse on B, and it is clearly not zero.\n- Step 3: The intuition: B was moving left and is now moving right at the same speed. Something must have pushed it — hard — to reverse its direction. That push is the impulse. Even though the speed is unchanged, the direction reversed, which requires a substantial impulse.\n\nTakeaway: Speed is a scalar; velocity is a vector. Impulse depends on the change in velocity (including direction), not just speed.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "A student calculates the impulse on a particle as $$-3m$$ N s and writes \"magnitude of impulse = $$-3m$$ N s.\" What is wrong? (2 steps)", "answer": "- Step 1: \"Magnitude\" means the size or absolute value of a quantity — it is always a positive number. If the impulse vector is $$-3m$$ N s (pointing in the negative direction), its magnitude is $$|-3m| = 3m$$ N s.\n- Step 2: The negative sign indicates direction, not size. When a question asks for \"the magnitude of the impulse,\" it is asking for the size only — drop the sign. The student should write \"magnitude = $$3m$$ N s\" with no minus sign and no modulus bars in the final answer.\n\nTakeaway: \"Magnitude\" = positive value. No minus signs, no modulus bars in the final answer.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "In a direct collision, particles A and B approach each other with equal speed. After the collision, A's direction is unchanged. Explain why B must reverse direction (rebound). (3 steps)", "answer": "- Step 1: Before the collision, A and B move toward each other. If A continues in the same direction after the collision, it has \"pushed through\" B — it is still moving the way it was.\n- Step 2: For A to continue forward while conserving momentum, B must gain momentum in A's direction. Since B was moving opposite to A before the collision, gaining momentum in A's direction means B must now move in A's direction — i.e., B has reversed.\n- Step 3: Physically: if B did not reverse, both particles would move in the same direction after the collision with B still moving against A. But A has passed through the collision point, meaning B must have been pushed back. Momentum conservation in A's direction requires that the total momentum in that direction is unchanged, and since A is still moving forward (possibly slower), B must be moving forward too to account for the momentum transfer.\n\nTakeaway: If A's direction is unchanged after a head-on collision, B must have reversed — momentum conservation demands it.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "After a head-on collision, A's direction is unchanged and B rebounds (both now move in A's original direction). The question states \"the difference between the speed of A and the speed of B is 1 m/s.\" If A's speed after is $$v$$, why should you write B's speed as $$v + 1$$ and not $$v - 1$$? (3 steps)", "answer": "- Step 1: \"Difference between the speeds\" means $$|\\text{speed}_A - \\text{speed}_B| = 1$$, so either $$\\text{speed}_B = v + 1$$ or $$\\text{speed}_B = v - 1$$. Both are mathematically possible from the wording alone.\n- Step 2: Since B (lighter) was hit head-on by A (heavier) and rebounded, B must be moving faster than A after the collision — the lighter particle gains more speed from the collision. So $$\\text{speed}_B > \\text{speed}_A$$, meaning $$\\text{speed}_B = v + 1$$.\n- Step 3: You can verify: if you tried $$\\text{speed}_B = v - 1$$ in the PCLM equation, it would typically give either a negative speed (impossible) or B stationary (contradicting \"rebounded\"). In the exam problem, PCLM with $$v + 1$$ gives $$v = 0.5$$ and $$\\text{speed}_B = 1.5$$ — both valid, confirming the choice.\n\nTakeaway: \"Difference of speeds\" gives two options; use physical reasoning (which particle should be faster?) to pick the right one, then verify with PCLM.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "Particle A (mass 2 kg) moves right at 5 m/s. Particle B (mass 3 kg) moves left at 5 m/s. They collide directly. After the collision, A moves left at 1 m/s. Find the velocity of B after the collision. (2 steps)", "answer": "- Step 1: Take right as positive. Before: $$u_A = +5$$, $$u_B = -5$$. After: $$v_A = -1$$, $$v_B = ?$$. Apply PCLM: $$(2)(5) + (3)(-5) = (2)(-1) + (3)(v_B)$$. So $$10 - 15 = -2 + 3v_B$$, giving $$-5 = -2 + 3v_B$$, so $$3v_B = -3$$.\n- Step 2: $$v_B = -1$$ m/s. Since this is negative, B moves left at 1 m/s after the collision.\n\nTakeaway: PCLM with consistent sign convention gives B's velocity directly — the sign tells you the direction.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A ball of mass 0.5 kg hits a wall at 4 m/s and rebounds at 2 m/s in the opposite direction. Find the magnitude of the impulse exerted on the ball. (2 steps)", "answer": "- Step 1: Take the initial direction as positive. Before: $$u = +4$$ m/s. After: $$v = -2$$ m/s (rebound = opposite direction). Impulse = change in momentum: $$I = m(v - u) = 0.5(-2 - 4) = 0.5 \\times (-6) = -3$$ N s.\n- Step 2: Magnitude = $$|-3| = 3$$ N s. The negative sign indicated direction; magnitude is always positive.\n\nTakeaway: Impulse = $$m(v - u)$$ with consistent signs; magnitude = absolute value.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "On a speed–time graph, the area under the curve represents distance travelled. Explain why this is the case, connecting it to the definition of speed. (3 steps)", "answer": "- Step 1: Speed is defined as rate of change of distance: $$v = \\frac{ds}{dt}$$. Rearranging: $$ds = v\\, dt$$. The total distance over a time interval is $$s = \\int v\\, dt$$.\n- Step 2: The integral $$\\int v\\, dt$$ is exactly the area under the speed–time curve between the relevant time limits. This is the fundamental theorem of calculus applied to kinematics.\n- Step 3: For a graph made of straight-line segments (as in M1), the area can be computed using simple geometry — triangles, rectangles, and trapezia. Each piece of area = speed × time = (m/s)(s) = metres, confirming the units work out to distance.\n\nTakeaway: Area under speed–time graph = $$\\int v\\, dt$$ = distance. The geometry is just a way to evaluate this integral.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A speed–time graph forms a trapezium. A student splits it into two triangles and a rectangle to find the area. Another student uses $$\\frac{1}{2}(a+b)h$$. Why is the second approach preferred in exams? (3 steps)", "answer": "- Step 1: The trapezium formula $$\\text{Area} = \\frac{1}{2}(a+b)h$$ uses the two parallel sides and the perpendicular height — three numbers, one formula, one calculation.\n- Step 2: Splitting into two triangles and a rectangle requires identifying three separate areas, computing each, and adding them. That is three calculations instead of one, and each calculation is a chance to misidentify a base or height.\n- Step 3: Harry's advice: \"Lots of students break it into two triangles and a rectangle. That's okay, but it's slow and you make little mistakes.\" The single trapezium formula is faster and safer — and the $$\\frac{1}{2}$$ in front is the single most-forgotten part, so memorising the formula as a whole is more reliable.\n\nTakeaway: One trapezium formula beats three sub-areas. Memorise $$\\frac{1}{2}(a+b)h$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A train accelerates for $$T$$ seconds, then travels at constant speed for 3 minutes, then decelerates. A student labels the time markers on the horizontal axis as $$T$$, 180, and $$2T + 180$$. What is wrong? (3 steps)", "answer": "- Step 1: The first marker $$T$$ is correct — it is the end of the acceleration phase, measured from time 0.\n- Step 2: The second marker should be $$T + 180$$, not 180. The constant-speed phase starts at time $$T$$ and lasts 180 seconds, so it ends at $$T + 180$$. Writing just \"180\" means you are measuring from time 0, but the constant phase does not start at time 0.\n- Step 3: The third marker should be $$T + 180 + 2T = 3T + 180$$, not $$2T + 180$$. The deceleration phase starts at $$T + 180$$ and lasts $$2T$$ seconds. The student's version $$2T + 180$$ would only be correct if the deceleration started at time 0.\n+ As Harry warned: \"Be careful where you measure that three minutes from… otherwise the whole thing snowballs from there.\" Getting one marker wrong cascades through all subsequent markers.\n\nTakeaway: Each time marker is measured from time 0, not from the previous phase. Always add durations cumulatively.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "On a speed–time graph, what does the gradient of a line segment represent physically, and what does a negative gradient mean? (2 steps)", "answer": "- Step 1: Acceleration is defined as rate of change of velocity: $$a = \\frac{dv}{dt}$$. On a speed–time graph, the gradient of the curve at any point is exactly $$\\frac{dv}{dt}$$, which is the acceleration. For a straight-line segment, the gradient is constant, so the acceleration is uniform.\n- Step 2: A negative gradient means velocity is decreasing over time — this is deceleration. For example, if speed drops from 20 m/s to 0 over 80 seconds, the gradient is $$\\frac{0 - 20}{80} = -0.25$$ m/s². The negative sign indicates deceleration (acceleration opposing the direction of motion).\n\nTakeaway: Gradient of speed–time graph = acceleration. Negative gradient = deceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A train accelerates from rest to 20 m/s and later decelerates from 20 m/s to rest. The magnitude of acceleration is twice the magnitude of deceleration. Why does the deceleration phase last twice as long as the acceleration phase? (2 steps)", "answer": "- Step 1: Both phases involve the same change in speed: $$\\Delta v = 20$$ m/s. The relationship is $$\\Delta v = a \\times t$$, so $$t = \\frac{\\Delta v}{|a|}$$.\n- Step 2: Since $$\\Delta v$$ is the same for both phases, the time is inversely proportional to the acceleration magnitude. If $$|a_{\\text{accel}}| = 2 \\times |a_{\\text{decel}}|$$, then $$t_{\\text{decel}} = 2 \\times t_{\\text{accel}}$$. The gentler the deceleration, the longer it takes to shed the same speed.\n\nTakeaway: Same speed change, different acceleration magnitudes → time is inversely proportional to acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "A car accelerates uniformly from rest to 30 m/s in 10 s, travels at constant speed for $$T$$ seconds, then decelerates uniformly to rest in 15 s. The total distance is 1050 m. Find $$T$$. (2 steps)", "answer": "- Step 1: The speed–time graph is a trapezium. The parallel sides are: the top (constant-speed phase) = $$T$$ seconds, and the bottom (total time) = $$10 + T + 15 = T + 25$$ seconds. The height is 30 m/s. Area = $$\\frac{1}{2}(T + (T + 25))(30) = 15(2T + 25)$$.\n- Step 2: Set equal to total distance: $$15(2T + 25) = 1050$$, so $$2T + 25 = 70$$, giving $$2T = 45$$, so $$T = 22.5$$ seconds.\n\nTakeaway: Identify the trapezium's parallel sides and height, set area = distance, solve.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Define the moment of a force about a point. Why is it \"perpendicular distance\" and not just \"distance\" from the point? (3 steps)", "answer": "- Step 1: The moment of a force $$F$$ about a point $$P$$ is $$\\text{moment} = F \\times d$$, where $$d$$ is the perpendicular distance from $$P$$ to the line of action of the force. Units: N m.\n- Step 2: The perpendicular distance matters because moment measures the turning effect of the force. A force applied directly through the pivot point (perpendicular distance = 0) produces no turning effect at all, no matter how large the force. A force applied at a distance but at a shallow angle has a smaller turning effect than the same force applied at right angles.\n- Step 3: Mathematically, if a force $$F$$ acts at angle $$\\alpha$$ to the line connecting the point of application to the pivot, the effective turning component is $$F \\sin\\alpha$$ (the component perpendicular to that line), and the moment is $$F \\sin\\alpha \\times r = F \\times (r\\sin\\alpha) = F \\times d$$, where $$d = r\\sin\\alpha$$ is the perpendicular distance. This is why it is always the perpendicular distance that matters.\n\nTakeaway: Moment = Force × perpendicular distance. The \"perpendicular\" captures the turning effectiveness of the force.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When taking moments about a point $$C$$, the reaction force $$R_C$$ at $$C$$ is excluded from the equation. Why? (2 steps)", "answer": "- Step 1: The moment of any force about a point is force × perpendicular distance from that point to the force's line of action. For the reaction $$R_C$$ at $$C$$, the force acts at $$C$$ itself, so the perpendicular distance from $$C$$ to the line of action of $$R_C$$ is zero.\n- Step 2: Therefore the moment of $$R_C$$ about $$C$$ is $$R_C \\times 0 = 0$$, regardless of how large $$R_C$$ is. This is why choosing the pivot at an unknown force eliminates that force from the equation — it is a strategic choice that simplifies the algebra.\n\nTakeaway: A force through the pivot has zero moment about that pivot. Choose your pivot to eliminate unknowns.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A rod rests on two supports C and D. It is \"on the point of tilting about C.\" Explain why the reaction at D is zero at this instant. (3 steps)", "answer": "- Step 1: \"On the point of tilting about C\" means the rod is just about to rotate around C — it is in a critical state where the slightest additional force would cause rotation.\n- Step 2: For the rod to tilt about C, it must lift off support D. At the exact moment of \"about to lift off,\" the rod is still in contact with D but the contact force has dropped to zero — support D is no longer pushing up on the rod.\n- Step 3: Therefore $$R_D = 0$$ at this instant. This is the key insight that turns a \"tilting\" scenario into a solvable moments equation: with $$R_D = 0$$, the only unknowns in the moments equation about C are the weight and any applied forces.\n\nTakeaway: \"On the point of tilting about X\" = the reaction at the other support is zero. This is what makes the problem solvable.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A rod is on the point of tilting about support C (so $$R_D = 0$$). A student takes moments about D instead of C. Will this work? What are the trade-offs? (3 steps)", "answer": "- Step 1: Yes, taking moments about D will work in principle — equilibrium holds about any point. But when you take moments about D, the reaction $$R_C$$ appears in the equation (it has a non-zero perpendicular distance from D), so you have an extra unknown.\n- Step 2: Taking moments about C eliminates both $$R_C$$ (force through pivot) and $$R_D$$ (already zero), giving an equation with only the weight and applied forces. This is simpler — fewer unknowns, one equation.\n- Step 3: If you take moments about D, you would need a second equation (e.g., resolving vertically) to find $$R_C$$ first, then use it. This works but involves more steps and more chances for errors.\n\nTakeaway: Always take moments about the tilting pivot — it eliminates both reactions in one move.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A student writes the moments equation as \"sum of all moments about C = 0\" and gets sign errors. Harry recommends \"clockwise moments = anticlockwise moments\" instead. Why does this reduce errors? (3 steps)", "answer": "- Step 1: The \"sum to zero\" approach requires assigning a sign convention to every moment (e.g., clockwise = positive, anticlockwise = negative, or vice versa). Each force's moment must be correctly classified and signed. With multiple forces, it is easy to assign the wrong sign to one of them.\n- Step 2: The \"clockwise = anticlockwise\" approach separates the forces into two groups based on their physical turning effect. You list all clockwise moments on one side and all anticlockwise moments on the other. There is no need for a sign convention — you just identify which way each force turns the rod.\n- Step 3: In the lesson, Phuc's sign error (a stray minus sign when measuring distance from the wrong pivot) vanished once he switched to clockwise = anticlockwise. The physical classification is more intuitive and less error-prone than a purely algebraic sign convention.\n\nTakeaway: Clockwise = anticlockwise is a physical statement, not just algebra. It forces you to think about what each force does, reducing sign errors.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "In a moments problem, you derive two equations: (A) $$189 = Wx$$ and (B) $$81 = (0.9 - x)W$$. A student substitutes (A) into (B) to eliminate $$W$$. Harry recommends dividing instead. Why is division cleaner? (3 steps)", "answer": "- Step 1: Substitution approach: from (A), $$W = \\frac{189}{x}$$. Substitute into (B): $$81 = (0.9 - x) \\cdot \\frac{189}{x}$$. This creates a fraction with $$x$$ in the denominator, requiring multiplication by $$x$$ and then solving a more complex equation. More algebra, more steps, more potential errors.\n- Step 2: Division approach: divide (A) by (B): $$\\frac{189}{81} = \\frac{Wx}{(0.9 - x)W} = \\frac{x}{0.9 - x}$$. The $$W$$ cancels immediately, leaving a simple equation in $$x$$ only.\n- Step 3: Cross-multiply: $$189(0.9 - x) = 81x$$, which is linear and straightforward. The division approach works whenever both equations share a common factor (here, $$W$$) — it is a general technique that Harry notes \"helps in Mechanics 2 and in pure maths too.\"\n\nTakeaway: When two equations share a common factor, divide to cancel it — faster and less error-prone than substitution.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "In a moments equation, a student writes: \"clockwise moments = $$50 \\times 0.5 + 2 \\times 1.2$$\" where 50 N is a force and 2 kg is a mass. What is wrong? (2 steps)", "answer": "- Step 1: The moment of a force is force × distance (units: N × m = N m). If you write a mass × distance term (units: kg × m = kg m), the units do not match — you are adding quantities with different dimensions.\n- Step 2: The fix: convert mass to weight first. A mass of 2 kg has weight $$2g$$ N (about 19.6 N). The correct moment is $$2g \\times 1.2$$ N m, not $$2 \\times 1.2$$. Alternatively, if you write every term as mass × distance and cancel $$g$$ throughout the entire equation, that works too — but you must be consistent. Never mix the two conventions in the same equation.\n\nTakeaway: Every term in a moments equation must have the same units. Use force × distance consistently, or mass × distance consistently (cancelling $$g$$ throughout), but never mix.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A uniform rod of length $$L$$ and weight $$W$$ rests on two supports at its ends A and B. An additional weight $$w$$ is placed directly above support A. Does the reaction at B change? Explain using moments. (3 steps)", "answer": "- Step 1: Take moments about A. The additional weight $$w$$ is at distance 0 from A (directly above it), so its moment about A is zero. The rod's weight $$W$$ acts at $$L/2$$ from A. The reaction at B acts at $$L$$ from A. Clockwise = anticlockwise: $$R_B \\times L = W \\times \\frac{L}{2} + w \\times 0$$, giving $$R_B = \\frac{W}{2}$$.\n- Step 2: Without the additional weight, the same equation gives $$R_B = \\frac{W}{2}$$. The reaction at B is unchanged!\n- Step 3: The intuition: the added weight sits directly on support A, so support A bears all of it. Support B does not \"feel\" the extra weight because it creates no additional turning effect about A. Resolving vertically confirms: $$R_A = W + w - R_B = W + w - \\frac{W}{2} = \\frac{W}{2} + w$$, so A's reaction increases by exactly $$w$$.\n\nTakeaway: A force directly above a support has zero moment about that support. The other support's reaction may not change at all.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "In a moments problem, the centre of mass is at distance $$x$$ from support C. A student takes moments about support D and writes the weight's moment as $$Wx$$. What is wrong? (3 steps)", "answer": "- Step 1: The distance $$x$$ is measured from C, not from D. When taking moments about D, you need the perpendicular distance from D to the weight's line of action, which is NOT $$x$$.\n- Step 2: If the rod has length 1.5 m, $$AC = 0.24$$ m, and $$DB = 0.36$$ m, then the centre of mass is at distance $$(0.24 + x)$$ from A. D is at distance $$(1.5 - 0.36) = 1.14$$ m from A. So the distance from D to the centre of mass is $$1.14 - (0.24 + x) = 0.9 - x$$.\n- Step 3: Writing $$Wx$$ uses the distance from C, which is irrelevant when the pivot is D. The correct moment is $$W(0.9 - x)$$. This was exactly Phuc's error — Harry corrected it by having him measure from D explicitly. Always measure distances from the pivot you are taking moments about.\n\nTakeaway: In moments, always measure perpendicular distance from the pivot you are using — not from some other reference point.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A uniform rod of length 4 m and weight 100 N rests horizontally on supports at its ends A and B. A 60 N weight is placed 1 m from A. Find the reaction at each support. (2 steps)", "answer": "- Step 1: Take moments about A (eliminates $$R_A$$). The rod's weight acts at the centre (2 m from A), and the 60 N weight acts at 1 m from A. Clockwise = anticlockwise: $$R_B \\times 4 = 100 \\times 2 + 60 \\times 1 = 260$$. So $$R_B = 65$$ N.\n- Step 2: Resolve vertically: $$R_A + R_B = 100 + 60 = 160$$. So $$R_A = 160 - 65 = 95$$ N.\n\nTakeaway: Choose pivot to eliminate one unknown, then resolve vertically for the other.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A uniform rod of length 2 m and weight 40 N rests horizontally on supports at A (left end) and C (1.5 m from A). A downward force is applied at B (right end). As the force increases, the rod is on the point of tilting about C. Find the force at B at that instant. (2 steps)", "answer": "- Step 1: On the point of tilting about C, so $$R_A = 0$$. Take moments about C (eliminates $$R_C$$). The weight acts at the midpoint, 1 m from A, which is $$1.5 - 1 = 0.5$$ m from C (anticlockwise about C). The force $$F$$ at B is at 2 m from A, which is $$2 - 1.5 = 0.5$$ m from C (clockwise about C).\n- Step 2: Clockwise = anticlockwise: $$F \\times 0.5 = 40 \\times 0.5$$, so $$F = 40$$ N.\n\nTakeaway: \"On the point of tilting\" → set the other reaction to zero, take moments about the tilting pivot.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "When analysing forces on an inclined plane, why is it better to resolve perpendicular and parallel to the plane rather than horizontally and vertically? (3 steps)", "answer": "- Step 1: The key principle is to resolve in the direction of acceleration (use $$F = ma$$) and in the perpendicular direction (forces balance, since there is no acceleration perpendicular to the plane). This gives two clean equations.\n- Step 2: If you resolved horizontally and vertically instead, both directions would have multiple force components, and neither direction would be \"balanced\" — you would have two simultaneous equations with more unknowns. The normal reaction $$R$$ and friction $$F$$ both have horizontal and vertical components, making the algebra messier.\n- Step 3: Resolving perpendicular and parallel to the plane means: (1) the perpendicular equation involves only $$R$$, the weight component, and any applied force's perpendicular component — and it equals zero (balanced). (2) The parallel equation involves friction, the weight component along the slope, and any driving force — and it equals $$ma$$. Each equation is simpler and more directly useful.\n\nTakeaway: Resolve ⊥ to the plane (balanced) and ∥ to the plane ($$F = ma$$). This aligns your equations with the physics.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A particle of mass $$m$$ sits on a plane inclined at angle $$\\theta$$ to the horizontal. Derive why the weight component down the slope is $$mg\\sin\\theta$$ and the component into the plane is $$mg\\cos\\theta$$, not the other way around. (3 steps)", "answer": "- Step 1: The weight $$mg$$ acts vertically downward. Draw the inclined plane, and note that the angle between the weight vector and the perpendicular-to-the-plane direction is $$\\theta$$ (the same angle as the incline, because the normal to the plane is tilted by $$\\theta$$ from the vertical).\n- Step 2: The component of the weight perpendicular to the plane (into the plane) is $$mg\\cos\\theta$$ — this is the \"adjacent\" side in the right triangle formed by the weight, its perpendicular component, and its parallel component, where $$\\theta$$ is the angle between the weight and the perpendicular direction.\n- Step 3: The component parallel to the plane (down the slope) is $$mg\\sin\\theta$$ — the \"opposite\" side. A common mistake is to swap these. The way to check: when $$\\theta = 0$$ (flat plane), the weight should be entirely into the plane ($$mg\\cos 0 = mg$$) and nothing along the slope ($$mg\\sin 0 = 0$$). This confirms the correct assignment.\n\nTakeaway: Weight component into plane = $$mg\\cos\\theta$$, down slope = $$mg\\sin\\theta$$. Check with $$\\theta = 0$$ to verify.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A student writes \"the forces are balanced vertically\" for a particle in equilibrium on an inclined plane. Harry says this is wrong. What should the student have said, and why? (3 steps)", "answer": "- Step 1: \"Vertically\" means straight up and down (in the direction of gravity). For a particle on an inclined plane in equilibrium, the forces are NOT balanced vertically — the normal reaction is perpendicular to the plane (tilted from vertical), and friction is along the plane (also tilted from horizontal).\n- Step 2: The correct statement is \"the forces are balanced perpendicular to the plane.\" In the direction perpendicular to the plane, there is no acceleration (the particle does not fly off or sink into the plane), so the forces in that direction sum to zero.\n- Step 3: The distinction matters because \"balanced vertically\" would give the wrong equation. The vertical equation would involve components of $$R$$ and $$F$$ in the vertical direction, which is unnecessarily complicated. \"Balanced perpendicular to the plane\" gives the clean equation $$R = mg\\cos\\theta$$ (plus any other perpendicular components), which is directly useful for finding $$R$$ and hence friction.\n\nTakeaway: Say \"perpendicular to the plane,\" never \"vertically.\" The plane's orientation determines the natural coordinate system.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A parcel on a rough inclined plane is pulled by a force of 18 N at 40° to the plane. Why does this force change the normal reaction $$R$$ compared to when no force is applied? (3 steps)", "answer": "- Step 1: The 18 N force acts at 40° to the plane, so it has a component perpendicular to the plane: $$18\\sin 40°$$, directed away from the plane (lifting the parcel slightly off the surface).\n- Step 2: In the perpendicular direction, the balance equation becomes: $$R + 18\\sin 40° = mg\\cos 30°$$. The $$18\\sin 40°$$ term reduces $$R$$ compared to the no-force case (where $$R = mg\\cos 30°$$ alone).\n- Step 3: This matters because friction depends on $$R$$: $$F = \\mu R$$. If $$R$$ decreases (because the applied force lifts the parcel slightly), friction decreases too. This is why you must always resolve perpendicular to the plane first — to find $$R$$ correctly before computing friction.\n\nTakeaway: Any applied force with a component perpendicular to the plane changes $$R$$, which in turn changes friction. Always resolve ⊥ first.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Harry insists on writing $$F = \\mu R$$ as its own separate line of working, rather than substituting $$\\mu R$$ directly into the parallel equation. Why? (2 steps)", "answer": "- Step 1: There is typically a mark allocated specifically for stating the friction relation $$F = \\mu R$$. If you substitute directly (e.g., writing $$18\\cos 40° - \\mu R - 2g\\sin 30° = 2a$$ without ever writing $$F = \\mu R$$), the examiner may not see that you have used the correct friction model, and you could lose that mark.\n- Step 2: Writing it separately also makes your working clearer and easier to follow. It shows the logical chain: (1) find $$R$$ from the perpendicular equation, (2) compute $$F = \\mu R$$, (3) use $$F$$ in the parallel equation. Each step is explicit and mark-worthy.\n\nTakeaway: Always write $$F = \\mu R$$ on its own line — it is worth a mark and makes your logic clear.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A parcel is being pulled up a rough inclined plane. In which direction does friction act, and why? What if the parcel were sliding down the plane instead? (3 steps)", "answer": "- Step 1: Friction always opposes the motion (or the tendency to move). If the parcel is being pulled up the slope, it moves (or tends to move) upward, so friction acts down the slope — opposing the upward motion.\n- Step 2: If the parcel were sliding down the slope (no pulling force, or the pulling force is insufficient), friction would act up the slope — opposing the downward motion.\n- Step 3: In the limiting case where the parcel is \"on the point of sliding up\" (held in equilibrium by a force, with friction at its maximum), friction still acts down the slope because the tendency is to slide up. The key principle: friction opposes the tendency of motion, not any particular force.\n\nTakeaway: Friction opposes motion (or tendency of motion). Moving up → friction down. Moving down → friction up.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "When a pulling force is removed from a parcel on a rough inclined plane, the parcel might remain at rest or slide down. What comparison of two quantities determines which happens? (3 steps)", "answer": "- Step 1: Without the pulling force, the only force down the slope is the weight component: $$mg\\sin\\theta$$. The maximum friction force available to resist sliding is $$\\mu R = \\mu mg\\cos\\theta$$ (using the new $$R = mg\\cos\\theta$$ with no applied force).\n- Step 2: Compare: if $$mg\\sin\\theta > \\mu mg\\cos\\theta$$, the weight component exceeds the maximum friction, so friction cannot hold the parcel — it slides down. If $$mg\\sin\\theta \\leq \\mu mg\\cos\\theta$$, friction can match or exceed the weight component, and the parcel remains at rest.\n- Step 3: Dividing both sides by $$mg\\cos\\theta$$ (positive): the condition becomes $$\\tan\\theta > \\mu$$ → slides; $$\\tan\\theta \\leq \\mu$$ → stays. In the Q8 example, $$\\tan 30° \\approx 0.577 > 0.3 = \\mu$$, so the parcel slides.\n\nTakeaway: Compare weight component down slope ($$mg\\sin\\theta$$) with maximum friction ($$\\mu mg\\cos\\theta$$). If weight wins, it slides.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A block is in limiting equilibrium on a rough inclined plane with no other forces applied. Derive the relationship between the angle of inclination $$\\theta$$ and the coefficient of friction $$\\mu$$. (3 steps)", "answer": "- Step 1: \"Limiting equilibrium\" means the block is on the point of sliding but has not yet. Forces are balanced in both directions. Perpendicular: $$R = mg\\cos\\theta$$. Parallel: friction (up the slope, opposing the tendency to slide down) balances the weight component: $$F = mg\\sin\\theta$$.\n- Step 2: In limiting equilibrium, friction is at its maximum: $$F = \\mu R$$. Substituting: $$\\mu R = mg\\sin\\theta$$ and $$R = mg\\cos\\theta$$.\n- Step 3: Dividing: $$\\frac{\\mu R}{R} = \\frac{mg\\sin\\theta}{mg\\cos\\theta}$$, giving $$\\mu = \\tan\\theta$$. This is a fundamental result: the angle at which a block just begins to slide satisfies $$\\mu = \\tan\\theta$$. This angle is sometimes called the \"angle of friction.\"\n\nTakeaway: Limiting equilibrium on an incline with no other forces → $$\\mu = \\tan\\theta$$. Quick check: if $$\\theta > \\arctan\\mu$$, the block slides.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A block of mass 5 kg is on a rough plane at 30° to the horizontal ($$\\mu = 0.4$$). A force $$P$$ pushes the block up along the line of greatest slope, and the block accelerates at 2 m/s². Find $$P$$. (Take $$g = 10$$ m/s².) (3 steps)", "answer": "- Step 1: Perpendicular to plane (balanced): $$R = 5g\\cos 30° = 50 \\times \\frac{\\sqrt{3}}{2} = 25\\sqrt{3} \\approx 43.3$$ N. Friction: $$F = \\mu R = 0.4 \\times 25\\sqrt{3} = 10\\sqrt{3} \\approx 17.3$$ N.\n- Step 2: Parallel to plane (up = positive): $$P - F - 5g\\sin 30° = 5 \\times 2$$. So $$P - 10\\sqrt{3} - 25 = 10$$.\n- Step 3: $$P = 10 + 10\\sqrt{3} + 25 = 35 + 10\\sqrt{3} \\approx 35 + 17.3 = 52.3$$ N.\n\nTakeaway: Resolve ⊥ (find $$R$$, then $$F$$), then resolve ∥ (apply $$F = ma$$).", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "A block of mass 10 kg is in limiting equilibrium on a rough plane inclined at angle $$\\theta$$ where $$\\tan\\theta = 0.4$$. Find the coefficient of friction $$\\mu$$.", "answer": "For limiting equilibrium on an incline with no other forces, the relationship is $$\\mu = \\tan\\theta$$. So $$\\mu = 0.4$$. No calculation needed — this is the angle-of-friction result: the coefficient of friction equals the tangent of the angle at which limiting equilibrium occurs.\n\nTakeaway: $$\\mu = \\tan\\theta$$ for limiting equilibrium — a direct read-off.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "In a collision question, you find two values: 0.5 and 1.5. The question asks for \"the speed of A and the speed of B.\" Why is it essential to write \"speed of A = 0.5 m/s, speed of B = 1.5 m/s\" rather than just \"0.5, 1.5\"? (2 steps)", "answer": "- Step 1: The examiner needs to know which value corresponds to which quantity. If you write two bare numbers, the examiner cannot tell which is A's speed and which is B's. If they are swapped, you lose the mark — even if both numbers are correct.\n- Step 2: Harry's advice: \"Write 'speed of A' and 'speed of B' next to your values so the examiner knows.\" This takes two seconds and guarantees you get credit for each correct value. Unlabelled numbers are ambiguous and can cost marks.\n\nTakeaway: Always label final answers with the quantity they represent. Two numbers without labels = ambiguous = potential lost marks.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "A velocity–time graph problem states the distance between two stations is 4.8 km and the speed is in m/s. A student uses 4.8 directly in their area equation. What goes wrong? (2 steps)", "answer": "- Step 1: The speed–time graph has speed in m/s and time in seconds, so the area (speed × time) comes out in metres. But 4.8 is in kilometres — the student is equating an area in metres to 4.8 km, which is dimensionally inconsistent.\n- Step 2: The fix: convert 4.8 km = 4800 m before using it in the equation. Harry: \"4.8 km is 4800 m — a very common mistake.\" This is one of the most frequent errors in M1 exams — always check whether distances are in km or m, and whether times are in seconds or minutes.\n\nTakeaway: Before using any number in an equation, check its units match the other quantities. km ≠ m; minutes ≠ seconds.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "Harry says \"you get the marks from the equations, not the forces on the diagram.\" What does this mean for how you should allocate your time in an inclined-plane question? (2 steps)", "answer": "- Step 1: In M1 exams, marks are awarded for the equations you write (the perpendicular balance, the parallel $$F = ma$$, the friction relation $$F = \\mu R$$), not for how pretty or complete your force diagram is. A beautiful diagram with no equations scores zero; a scrappy diagram with correct equations scores full marks.\n- Step 2: This means: spend your time writing the equations clearly and correctly, not perfecting the diagram. The diagram is a thinking tool to help you set up the equations — it is the equations that earn marks. As Harry noted: \"In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\"\n\nTakeaway: Diagrams help you think; equations earn marks. Always write the equations.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Both momentum conservation and moment equilibrium involve \"balancing\" quantities. What is the key difference in what is being conserved or balanced, and what external condition must hold in each case? (3 steps)", "answer": "- Step 1: Momentum conservation ($$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$) balances linear momentum — the total \"amount of motion\" in a given direction. It holds when there is no net external impulse in that direction (e.g., a collision on a smooth surface).\n- Step 2: Moment equilibrium ($$\\sum\\text{clockwise} = \\sum\\text{anticlockwise}$$) balances turning effects — the total \"amount of rotation\" about a point. It holds when the body is in static equilibrium (not rotating), which means no net moment about any point.\n- Step 3: The key difference: momentum conservation is about translation (movement in a line) and holds even during dynamic events like collisions (the system is not in equilibrium — particles accelerate during impact). Moment equilibrium is about rotation and only holds when the body is stationary or in rotational equilibrium — it is a static condition, not a dynamic one.\n\nTakeaway: PCLM = translation balance (dynamic, during collisions). Moments = rotation balance (static, in equilibrium).", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}], "count": 46}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In a word problem about quantities being \"close to\" each other, what mathematical object captures the idea of \"the size of the gap between two numbers\" regardless of which is larger?", "answer": "The modulus (absolute value). $$|a - b|$$ gives the size of the gap between $$a$$ and $$b$$, without caring about sign. If we just wrote $$a - b < k$$, we'd be assuming $$a > b$$, which we might not know. The modulus handles both possibilities: $$a$$ could be bigger, or $$b$$ could be bigger. This is exactly why \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" translates to $$|2\\sqrt{n} - 7| < 1$$, not $$2\\sqrt{n} - 7 < 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why can't you translate \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" as just $$2\\sqrt{n} - 7 < 1$$?", "answer": "Because \"difference\" means the size of the gap, not the signed gap. $$2\\sqrt{n}$$ might be bigger than 7 (gap = $$2\\sqrt{n} - 7$$) or smaller than 7 (gap = $$7 - 2\\sqrt{n}$$). The modulus $$|2\\sqrt{n} - 7|$$ captures both cases in one expression. If you only wrote $$2\\sqrt{n} - 7 < 1$$, you'd miss all values where $$2\\sqrt{n} < 7$$ but still within 1 unit of it (e.g., $$2\\sqrt{n} = 6.5$$, difference = 0.5 < 1, but $$6.5 - 7 = -0.5 < 1$$ is satisfied trivially while the real condition is about the gap being small).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "How do you remove the modulus from $$|X| < k$$ (where $$k > 0$$) using a number-line picture, and why is this cleaner than splitting into two separate inequalities? (2 steps)", "answer": "- Step 1: On a number line, $$|X| < k$$ means $$X$$ lies strictly between $$-k$$ and $$+k$$ — it's within $$k$$ units of zero, regardless of direction. This translates directly to the single chain $$-k < X < k$$.\n- Step 2: Splitting into two cases ($$X < k$$ and $$-X < k$$) is logically correct but slower and more error-prone in exams. The chain $$-k < X < k$$ lets you add/multiply all three parts simultaneously in one flow, which is faster and reduces algebra mistakes. Harry steered Phuc away from the two-case split toward the chain method for exactly this reason.\n\nThe number-line picture is your visual sanity check — sketch it whenever you see a modulus inequality.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "When counting how many integers satisfy $$a < n < b$$ (strict inequality, both $$a$$ and $$b$$ integers), why is the answer NOT simply $$b - a$$, and what is the correct formula? (2 steps)", "answer": "- Step 1: $$b - a$$ counts the \"gaps\" between integers, not the integers themselves. For example, between 10 and 15 there are 5 gaps, but 6 integers: {10, 11, 12, 13, 14, 15}. The count is $$15 - 10 + 1 = 6$$, not $$15 - 10 = 5$$.\n- Step 2: The correct count for a strict inequality $$a < n < b$$ (endpoints excluded) is $$b - a - 1$$. For an inclusive range $$a \\leq n \\leq b$$, it's $$b - a + 1$$. Drawing a quick number line with dots at each integer makes this visually obvious and prevents the classic \"off-by-one\" error. Harry: \"Lots of students would do 15 − 10 to get five and make a mistake… you always have to remember to add one.\"", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "If the inequality were $$|2\\sqrt{n} - 7| \\leq 1$$ (with \"less than or equal to\" instead of strict \"less than\"), how would the count of integer solutions change compared to the strict version $$|2\\sqrt{n} - 7| < 1$$?", "answer": "The endpoints would now be included. The range becomes $$9 \\leq n \\leq 16$$ instead of $$9 < n < 16$$, so $$n = 9$$ and $$n = 16$$ are now valid. The count increases by 2: from 6 integers to 8. This shows why reading \"less than\" vs \"less than or equal to\" carefully matters — underlining key words in the question catches this distinction before it costs you a mark.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "In the conservation of linear momentum equation $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$, why must velocities be treated as signed quantities rather than just speeds? (2 steps)", "answer": "- Step 1: Momentum is a vector — it has direction. If two particles move toward each other, one has positive momentum and the other negative. Using unsigned speeds would incorrectly add both contributions as positive, violating the physics of the collision.\n- Step 2: You must fix one direction as positive and stick with it for every term. If A moves right (positive) at 1.5 m/s and B moves left toward A, B's velocity is $$-1.5$$ m/s. The total momentum before is $$3m(1.5) + m(-1.5) = 3m$$, not $$3m(1.5) + m(1.5) = 6m$$ — the sign on B's velocity halves the total momentum.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "When a question says \"the direction of motion of A is unchanged after the collision,\" what does this tell you about the sign of A's post-collision velocity, and how does it constrain your unknowns? (2 steps)", "answer": "- Step 1: It confirms that A's post-collision velocity has the same sign as its pre-collision velocity. If A was moving in the positive direction before, it's still positive after — so $$v_A$$ is positive. A didn't rebound.\n- Step 2: This constrains your unknowns. If you let A's speed after be $$v$$, then A's velocity is $$+v$$ (same direction). Meanwhile, B must have rebounded (changed direction), so B now moves in A's direction too — B's velocity is also positive. In Q2, since B is faster after rebounding, B's speed is $$v + 1$$, not $$v - 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "The impulse equation is $$I = mv - mu$$. If a question asks for the \"magnitude of the impulse exerted on B,\" why must your final answer be a positive number with no modulus signs? (2 steps)", "answer": "- Step 1: \"Magnitude\" means the size of the impulse, regardless of direction. By definition, a magnitude is always positive. If your calculation gives $$I = -3m$$ (meaning the impulse acts in the negative direction), the magnitude is $$3m$$.\n- Step 2: You don't write $$|3m|$$ on the final answer line — that looks like you're uncertain about the sign. Just write $$3m$$ N s. The examiner expects a clean positive value when \"magnitude\" is specified. Harry: \"Can it be negative if it's asking for the magnitude? No.\"", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A student computes impulse on B as $$m(v_B - u_B)$$ and gets a negative number. They write the answer as $$|-3m| = 3m$$. Is there a conceptual issue with their approach, even though the final number is correct?", "answer": "Yes — the issue is that they likely used the wrong sign convention or misidentified the velocities. If $$I = mv - mu$$ gives a negative value for impulse on B, either the positive direction was inconsistent between the before and after terms, or the velocities were plugged in with wrong signs. The magnitude being positive doesn't fix the underlying setup error. Always verify that your signed velocities are correct before computing impulse; the sign of $$I$$ tells you which direction the impulse acts, which is physically meaningful even if the question only asks for magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In a collision problem where you find two speeds, why is it important to label your final answers as \"speed of A\" and \"speed of B\" rather than just writing two bare numbers? (2 steps)", "answer": "- Step 1: When a question asks for two speeds, the examiner needs to know which number corresponds to which particle. Two unlabeled numbers like 0.5 and 1.5 are ambiguous — which is A and which is B?\n- Step 2: Without labels, you can lose the mark even if both numbers are correct, because the examiner can't determine which answer goes with which part of the question. Harry stressed: write \"speed of A = 0.5 m/s\" and \"speed of B = 1.5 m/s\" explicitly next to your values. \"So the examiner knows.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "On a speed–time graph, what physical quantity does the area under the graph represent, and why?", "answer": "Distance (or displacement magnitude if there's no direction change). Speed × time = distance. The area of each infinitesimal strip is speed × $$\\Delta t$$, which is a small distance. Summing all strips (integration = area) gives total distance travelled. This is why converting \"stations A and B are 4.8 km apart\" into an area equation works — the area of the v-t trapezium must equal the total distance between the stations.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "For a speed–time graph that forms a trapezium, why is it safer to use the single trapezium area formula $$\\frac{1}{2}(a+b)h$$ rather than splitting into two triangles and a rectangle? (2 steps)", "answer": "- Step 1: The trapezium formula requires identifying only three quantities: the two parallel sides and the height. It's one formula, one computation, and fewer places to make errors.\n- Step 2: Splitting into triangles and a rectangle requires identifying more pieces (two triangle bases, one rectangle width, the height), computing three separate areas, and adding them. Each extra step is a potential arithmetic slip. Harry: \"Lots of students break it into two triangles and a rectangle. That's okay, but it's slow and you make little mistakes.\" Memorise the trapezium formula and use it directly.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In the trapezium area formula $$\\frac{1}{2}(a+b)h$$ applied to a speed–time graph, what do $$a$$, $$b$$, and $$h$$ represent physically, and what is the single most-forgotten part of the formula?", "answer": "$$a$$ and $$b$$ are the two parallel sides — on a v-t trapezium, these are time intervals (the top is the constant-speed duration, the bottom is the total time). $$h$$ is the perpendicular distance between them — the peak speed. The most-forgotten part is the $$\\frac{1}{2}$$ — students write $$({a+b})h$$ and miss the halving, which doubles the area and ruins the answer. Phuc's own reflection: \"I need to make sure I memorise the formula of a trapezium.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A train accelerates for $$T$$ seconds, travels at constant speed for 180 seconds, then decelerates for $$2T$$ seconds. Why are the three time markers on the horizontal axis $$T$$, $$T+180$$, and $$3T+180$$, and why does getting the first marker wrong \"snowball\" through the entire solution? (3 steps)", "answer": "- Step 1: The acceleration phase ends at time $$T$$. The constant-speed phase lasts 180 seconds after that, so it ends at $$T + 180$$. The deceleration phase lasts $$2T$$ seconds after that, so it ends at $$T + 180 + 2T = 3T + 180$$.\n- Step 2: These markers determine the parallel sides of the trapezium: the top (constant-speed duration) is 180, and the bottom (total time) is $$3T + 180$$. If you mistakenly wrote the constant phase as ending at 180 (forgetting to add $$T$$), the bottom becomes $$180 + 2T$$ instead of $$3T + 180$$, and the entire area equation is wrong.\n- Step 3: The \"snowball\" effect: every subsequent calculation (area, solving for $$T$$, finding acceleration) depends on these markers. One early error propagates through everything. Harry: \"Be careful where you measure that three minutes from… otherwise the whole thing snowballs from there.\"", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "A student solves a v-t trapezium problem and gets $$T = 40$$ s, but their distance equation used 4.8 instead of 4800. What went wrong conceptually?", "answer": "The distance was 4.8 km, which is 4800 m. Speed is in m/s and time in seconds, so distance must be in metres for the units to be consistent. Using 4.8 (km) with speeds in m/s creates a unit mismatch — the area would be in km·m/s, which is meaningless. This is common because the question gives distance in km (a real-world unit) while everything else is in m and s. Harry flagged this as a \"very common mistake.\" Always convert before setting up the equation.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "What is the definition of the moment of a force about a point, and why does a force whose line of action passes through that point have zero moment? (2 steps)", "answer": "- Step 1: Moment = force × perpendicular distance from the point to the line of action of the force. The perpendicular distance is the shortest distance from the pivot to the force's line — if the force acts directly through the pivot, this distance is zero.\n- Step 2: Zero distance × any force = zero moment. This is why choosing your pivot at an unknown force (like a reaction $$R_C$$ or $$R_D$$) eliminates that force from the moments equation entirely — it's a free elimination. Harry: \"If they're zero, you don't have to write them.\"", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "When a rod is \"on the point of tilting about C,\" what physical event is about to happen, and what does this imply about the reaction at the other support D? (2 steps)", "answer": "- Step 1: The rod is about to rotate around C — it's on the verge of lifting off support D. The rod hasn't actually tilted yet (it's still in equilibrium), but D is about to lose contact with the rod.\n- Step 2: Since D is about to leave, the reaction force $$R_D$$ is effectively zero. This is the key insight that makes \"tilting\" problems solvable: you set $$R_D = 0$$, which removes one unknown. Without this condition, you'd have too many unknowns ($$W$$, $$x$$, $$R_C$$, $$R_D$$) and not enough equations.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Why is it recommended to equate clockwise moments = anticlockwise moments directly, rather than writing $$\\Sigma(\\text{moments}) = 0$$ with positive and negative signs? (2 steps)", "answer": "- Step 1: The $$\\Sigma(\\text{moments}) = 0$$ approach requires you to assign +/− signs to every moment based on whether it's clockwise or anticlockwise, then sum them. This introduces a sign convention that's easy to mess up — one wrong sign cascades through the equation.\n- Step 2: Equating clockwise = anticlockwise bypasses the sign convention entirely. You list all clockwise moments on one side and all anticlockwise moments on the other, then set them equal. Each term is positive (force × distance, both positive quantities), so there are no sign decisions to make. Harry's correction of Phuc's sign error came from switching to this approach.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When you have two moments equations (A) and (B) that both contain the unknown $$W$$, why is dividing equation (A) by equation (B) often better than substituting? (2 steps)", "answer": "- Step 1: If (A) is $$Wx = 189$$ and (B) is $$W(0.9 - x) = 81$$, both contain $$W$$. Substitution would require solving one equation for $$W$$, then plugging into the other — two steps with more algebra and more risk of error.\n- Step 2: Dividing (A)/(B): the $$W$$ cancels immediately, giving $$\\frac{x}{0.9 - x} = \\frac{189}{81}$$. This is one step, fewer terms, and directly produces an equation in $$x$$ alone. It's faster and cleaner. Harry: \"A really good habit — it helps in Mechanics 2 and in pure maths too.\" Box and label your equations (A), (B) so you can reference them clearly when dividing.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "In a moments problem with two scenarios (different forces applied at B), why must you draw two separate diagrams rather than trying to put all forces on one diagram?", "answer": "Each scenario has different forces and different reactions (in scenario 1, $$R_D = 0$$; in scenario 2, $$R_C = 0$$). Combining them on one diagram creates confusion about which forces are present in which case. Drawing two separate diagrams keeps the information clean and prevents you from accidentally including a force from scenario 1 in scenario 2's equation. Each diagram produces its own moments equation, which you then solve simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Why must you never mix \"force × distance\" terms with \"mass × distance\" terms in a moments equation? (2 steps)", "answer": "- Step 1: Moments are force × distance, with units of N·m. If you write mass × distance (kg·m), you're missing the factor of $$g$$ that converts mass to weight. A 3 kg mass at 2 m from the pivot contributes a moment of $$3g \\times 2 = 6g$$ N·m, not $$3 \\times 2 = 6$$ kg·m.\n- Step 2: Mixing the two types creates inconsistent units — some terms in N·m and others in kg·m — and the equation becomes physically meaningless. You can cancel $$g$$ throughout if every term contains it, but you can't have some terms with $$g$$ and others without.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "For a particle of mass $$m$$ on a plane inclined at angle $$\\theta$$ to the horizontal, how does the weight $$mg$$ resolve into components, and why are they $$mg\\sin\\theta$$ (down the slope) and $$mg\\cos\\theta$$ (into the plane) rather than the other way round? (3 steps)", "answer": "- Step 1: Draw the weight vector $$mg$$ pointing vertically downward from the particle. The angle between this vector and the normal to the plane (the perpendicular direction) is $$\\theta$$, because the plane is tilted $$\\theta$$ from horizontal and the weight is vertical — so the gap between \"vertical\" and \"perpendicular to the plane\" is exactly $$\\theta$$.\n- Step 2: The component along the normal (perpendicular to the plane) is $$mg\\cos\\theta$$ — it's the \"adjacent\" side in the right triangle formed by resolving. This component pushes the particle into the surface. The component along the slope (parallel) is $$mg\\sin\\theta$$ — it's the \"opposite\" side, pulling the particle down the slope.\n+ Sanity check at $$\\theta = 0°$$ (flat plane): $$mg\\sin 0 = 0$$ (no force down a flat slope — correct) and $$mg\\cos 0 = mg$$ (full weight into the surface — correct).\n+ Sanity check at $$\\theta = 90°$$ (vertical wall): $$mg\\sin 90 = mg$$ (full weight pulling down — correct) and $$mg\\cos 90 = 0$$ (no force into the wall — correct).\n- Step 3: Common confusion: students swap sin and cos because they think \"the steep angle should have cos.\" But the resolution angle is $$\\theta$$ from the normal, not from the slope. Always verify with the $$\\theta = 0°$$ and $$\\theta = 90°$$ limits.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Why must you say the forces are \"balanced perpendicular to the plane\" rather than \"balanced vertically\" when resolving forces on an incline? (2 steps)", "answer": "- Step 1: \"Vertically\" means the straight up/down direction. On an incline, there IS acceleration vertically (the particle accelerates along the slope, which has a vertical component). The forces are NOT balanced vertically.\n- Step 2: The direction where forces are balanced is perpendicular to the plane — the particle doesn't accelerate into or away from the surface. The normal reaction $$R$$ and the perpendicular component of weight ($$mg\\cos\\theta$$) and any other perpendicular forces sum to zero in that specific direction only. Harry: \"Say 'perpendicular to the plane,' not 'vertical.'\"", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "A parcel is being pulled up a rough inclined plane. In which direction does friction act, and why can friction never exceed the driving force along the slope if the parcel is accelerating? (2 steps)", "answer": "- Step 1: Friction always opposes motion (or the tendency to move). Since the parcel is being pulled up the slope, friction acts down the slope, opposing the upward pull.\n- Step 2: If the parcel is accelerating up the slope, the net force up the slope must be positive: driving force − friction − weight component > 0. This means driving force > friction + weight component > friction. So friction must be less than the driving force. If friction exceeded the driving force, the net force would be down the slope and the parcel would decelerate or not move up at all. Harry: \"Friction can at most match the driving component, never exceed it.\"", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why should you write $$F = \\mu R$$ as its own separate line in your working, rather than substituting $$\\mu R$$ directly into the $$F = ma$$ equation? (2 steps)", "answer": "- Step 1: The relation $$F = \\mu R$$ is a fundamental friction law that examiners expect to see stated explicitly. There is usually a dedicated mark just for writing this equation, separate from any substitution marks.\n- Step 2: Writing it as its own line also makes your working clearer and easier to follow. You first find $$R$$ from the perpendicular equation, then compute $$F = \\mu R$$, then substitute $$F$$ into the parallel equation. If you skip the separate line and go straight to $$\\mu R$$ in $$F = ma$$, you might lose the friction-method mark and make it harder for the examiner to award partial credit if you make an error later. Harry: \"There is usually a mark just for stating the friction relation.\"", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A pulling force of 18 N acts at 40° to the inclined plane (in the vertical plane containing the line of greatest slope). How does this force resolve, and why is the along-slope component $$18\\cos 40°$$ rather than $$18\\sin 40°$$? (2 steps)", "answer": "- Step 1: The 40° angle is measured from the plane itself (the along-slope direction). When resolving a force at angle $$\\alpha$$ to a reference direction, the component along that direction is $$F\\cos\\alpha$$ and the component perpendicular to it is $$F\\sin\\alpha$$.\n- Step 2: Since 40° is the angle to the plane (the along-slope direction), the along-slope component is $$18\\cos 40°$$ and the perpendicular-to-plane component is $$18\\sin 40°$$.\n+ Sanity check: if the force were directed along the plane ($$\\alpha = 0°$$), the full 18 N would be along the slope ($$18\\cos 0 = 18$$) and nothing perpendicular ($$18\\sin 0 = 0$$) — correct. If it were perpendicular to the plane ($$\\alpha = 90°$$), nothing along the slope ($$18\\cos 90 = 0$$) and full force perpendicular ($$18\\sin 90 = 18$$) — also correct.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "When a pulling force is removed and a parcel is at rest on a rough incline, how do you determine whether the parcel remains at rest or starts sliding down? (3 steps)", "answer": "- Step 1: Compute the weight component down the slope: $$mg\\sin\\theta$$. This is the force trying to make the parcel slide.\n- Step 2: Compute the maximum available friction: $$\\mu R$$, where $$R = mg\\cos\\theta$$ (no pulling force now, so $$R$$ is just the normal component of weight). This is the maximum force friction can provide to resist sliding.\n- Step 3: Compare: if $$mg\\sin\\theta > \\mu R$$, friction cannot hold the parcel and it slides. If $$mg\\sin\\theta \\leq \\mu R$$, friction is sufficient and the parcel stays at rest. In Q8(c): $$mg\\sin 30° = 9.8$$ N while $$\\mu R \\approx 5.09$$ N, so $$9.8 > 5.09$$ and the parcel slides down.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "Harry says \"marks come from the equations, not the diagram.\" What does this mean practically, and what is the risk of spending too long on a perfect force diagram? (2 steps)", "answer": "- Step 1: Examiners award marks for correct equations (resolved force equations, $$F = ma$$, $$F = \\mu R$$, moments equations), not for the artistic quality of your diagram. A beautiful diagram with all forces drawn perfectly but no equations written earns zero method marks.\n- Step 2: The risk is wasting time drawing an elaborate diagram instead of writing the governing equations. The diagram is a tool to help you set up the equations — once the equations are written, the diagram's job is done. Harry: \"In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\"", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Why should you underline key words like \"difference,\" \"magnitude,\" \"unchanged,\" and \"on the point of tilting\" before starting any mechanics question? (2 steps)", "answer": "- Step 1: Mechanics questions are wordy and single words can fundamentally change the mathematical setup. \"Difference\" means modulus; \"magnitude\" means positive answer; \"unchanged\" means same sign for velocity; \"on the point of tilting\" means the other reaction is zero.\n- Step 2: Missing or misreading one of these words leads to a completely wrong approach. Underlining forces you to slow down and identify the critical constraints before diving into algebra. Harry: \"Mechanics is very wordy, and often a single word makes a big difference.\"", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "When solving a moments problem with two scenarios producing equations (A) and (B), what is the strategic advantage of \"boxing and labelling\" these equations before solving? (2 steps)", "answer": "- Step 1: Boxing and labelling (e.g., writing \"$$189 = Wx$$ (A)\" and \"$$81 = W(0.9 - x)$$ (B)\") makes the equations visually distinct and easy to reference. When you later divide (A) by (B), you can clearly state \"dividing (A)/(B)\" and the examiner sees your method.\n- Step 2: It also prevents you from accidentally mixing terms from the two scenarios. Each scenario produces its own equation — if they're labelled, you won't combine a term from (A) with a term from (B) erroneously. This habit scales to M2 and pure maths where simultaneous equations are common.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "In a collision, A's direction is unchanged after and B has rebounded. The difference in their post-collision speeds is 1 m/s. Why should you set B's speed = $$v_A + 1$$ rather than $$v_A - 1$$? (2 steps)", "answer": "- Step 1: B rebounded means it received a large impulse that reversed its direction. A's direction is unchanged, meaning it only slowed down. The impulse on B is much larger than on A (B's momentum flipped sign; A's just decreased). Physically, B should be faster than A after.\n- Step 2: Verify with PCLM. Setting $$v_B = v + 1$$: $$3m(1.5) + m(-1.5) = 3m(v) + m(v+1)$$ gives $$3m = 4mv + m$$, so $$v = 0.5$$, $$v_B = 1.5$$ (both positive, B faster — consistent). Setting $$v_B = v - 1$$: $$3m = 4mv - m$$ gives $$v = 1$$, $$v_B = 0$$ (B stationary, contradicting \"rebounded\" implying motion). Always check if your assumption produces physically sensible velocities.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In Q4, Phuc initially took moments about B and wrote a \"$$-Wx$$\" term. Why was this incorrect, and what does it illustrate about measuring distances? (2 steps)", "answer": "- Step 1: $$x$$ was defined as the distance from C to the centre of mass, not from D or B. When taking moments about D, the distance from D to the weight is not $$x$$ — it must be recalculated based on the positions of D and C relative to the rod.\n- Step 2: In Q4, C is at 0.24 m from A and D is at 1.14 m from A. The centre of mass is at $$0.24 + x$$ from A. The distance from D to the centre of mass is $$(0.24 + x) - 1.14 = x - 0.9$$, or equivalently the weight is $$0.9 - x$$ from D (measuring toward A). Using \"$$x$$\" directly as the distance from D is wrong because $$x$$ was defined from C. Always recalculate distances from your chosen pivot.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "A student resolving a force at angle $$\\alpha$$ to the plane writes the perpendicular component as $$F\\cos\\alpha$$ and the parallel component as $$F\\sin\\alpha$$. How do you immediately spot that they've swapped the components? (2 steps)", "answer": "- Step 1: The angle $$\\alpha$$ is measured from the plane (the along-slope direction). The component along that reference direction is $$F\\cos\\alpha$$ and perpendicular to it is $$F\\sin\\alpha$$. The student has these backwards.\n- Step 2: Sanity check at $$\\alpha = 0°$$ (force along the plane): the student's version gives along-slope = $$F\\sin 0 = 0$$ and perpendicular = $$F\\cos 0 = F$$ — the full force is perpendicular when it should be entirely along the slope. Clearly wrong. The correct version: along-slope = $$F\\cos 0 = F$$ and perpendicular = $$F\\sin 0 = 0$$ — the full force is along the slope, which is correct.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "In Q8, the perpendicular equation is $$R + 18\\sin 40° = 2g\\cos 30°$$. Why is the 18 N force's perpendicular component added to $$R$$ rather than subtracted, and what does this tell you about how the pull affects the normal reaction? (2 steps)", "answer": "- Step 1: The 18 N force acts at 40° to the plane, pulling the parcel up and away from the surface. Its perpendicular component ($$18\\sin 40°$$) lifts the parcel off the surface. Both $$R$$ and this component act away from the plane (outward), while the weight component $$2g\\cos 30°$$ acts into the plane (inward). Balancing: outward forces = inward forces, so $$R + 18\\sin 40° = 2g\\cos 30°$$.\n- Step 2: This means $$R = 2g\\cos 30° - 18\\sin 40° \\approx 5.4$$ N, which is much smaller than the no-pull value of $$2g\\cos 30° \\approx 17$$ N. The pulling force's perpendicular component effectively \"helps\" the reaction resist the weight, so less reaction is needed. This reduced $$R$$ also reduces the maximum friction $$\\mu R$$, which is physically important.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Why is it important to write the weight as \"$$mg$$\" (with $$g$$ as a symbol) in early working rather than immediately substituting $$g = 9.8$$? (2 steps)", "answer": "- Step 1: Keeping $$g$$ symbolic makes the algebra cleaner and reduces numerical errors. Writing $$2g\\sin 30°$$ and $$2g\\cos 30°$$ is simpler than writing $$19.6\\sin 30°$$ and $$19.6\\cos 30°$$, and you can simplify trig values first ($$\\sin 30° = 0.5$$, so $$2g\\sin 30° = g$$).\n- Step 2: It also makes it easier to spot cancellations and relationships. If $$g$$ appears in every term, you might be able to cancel it. If you substitute early, you get decimal numbers that are harder to simplify and easier to mis-calculate. Harry's tip: \"Write the weight as $$2g$$ straight away\" — substitute $$g = 9.8$$ only at the final stage or when you need a numerical answer.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Why should you draw reaction arrows \"coming out of the rod\" in moments problems, and how does this convention prevent errors? (2 steps)", "answer": "- Step 1: Supports push upward on the rod (the rod rests on them, so they exert upward reactions). Drawing the arrows pointing upward, coming out of the rod, correctly represents the direction of reaction forces. This prevents you from accidentally drawing them as downward forces.\n- Step 2: When you later take moments, having the correct direction for each force ensures your clockwise/anticlockwise classification is right. A downward arrow at the wrong location would be classified as the wrong type of moment. Clear, directionally correct arrows reduce sign errors when setting up the moments equation.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A train accelerates from rest to 20 m/s in $$T$$ seconds. The acceleration magnitude is twice the deceleration magnitude. Why does the deceleration phase last $$2T$$ seconds? (2 steps)", "answer": "- Step 1: Acceleration magnitude = $$\\frac{20}{T}$$ (change in speed over time). Deceleration magnitude = $$\\frac{20}{\\text{deceleration time}}$$ (same speed change, different time). The condition \"acceleration = 2 × deceleration\" gives $$\\frac{20}{T} = 2 \\times \\frac{20}{\\text{deceleration time}}$$.\n- Step 2: Simplify: $$\\frac{20}{T} = \\frac{40}{\\text{deceleration time}}$$, so deceleration time = $$\\frac{40T}{20} = 2T$$. The deceleration is half as strong, so it takes twice as long to reduce the speed from 20 to 0. On the v-t graph, the down-slope is half as steep (gradient = −10 vs +20) and twice as wide (duration $$2T$$ vs $$T$$).", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "When identifying the parallel sides of a trapezium on a v-t graph, what are the two parallel sides in terms of time intervals, and why is the \"bottom\" side the total time? (2 steps)", "answer": "- Step 1: The two parallel sides are the horizontal segments (constant speed). The \"top\" side is the constant-speed phase duration (e.g., 180 s in Q1). The \"bottom\" side is the total time from start to finish, because the v-t graph starts and ends on the time axis ($$v = 0$$), and the distance between these two zero-speed points on the time axis is the full journey duration.\n- Step 2: In Q1: top = 180 s (the horizontal part at peak speed), bottom = $$T + 180 + 2T = 3T + 180$$ s (total journey time), height = peak speed 20 m/s. Area = $$\\frac{1}{2}(180 + 3T + 180) \\times 20 = 10(3T + 360)$$, set equal to 4800 m to solve for $$T$$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "When the 18 N pulling force is removed from the parcel on the incline in Q8(c), the normal reaction changes. Why does $$R$$ increase, and how does this affect the maximum friction? (2 steps)", "answer": "- Step 1: Without the 18 N pull, the perpendicular equation becomes simply $$R = 2g\\cos 30°$$ (no $$18\\sin 40°$$ term helping to balance the weight component). Previously $$R = 2g\\cos 30° - 18\\sin 40° \\approx 5.4$$ N; now $$R = 2g\\cos 30° \\approx 17$$ N. The reaction increases because the pulling force's perpendicular component (which was lifting the parcel off the surface) is gone, so the surface must provide more reaction to balance the full weight component.\n- Step 2: Maximum friction $$\\mu R$$ also increases: from $$0.3 \\times 5.4 \\approx 1.6$$ N to $$0.3 \\times 17 \\approx 5.1$$ N. However, the weight component down the slope is $$2g\\sin 30° = 9.8$$ N, which still exceeds the new maximum friction. So even with more friction available, it's still not enough to hold the parcel, and it slides down.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A student sets up PCLM and writes: $$(3m)(1.5) + (m)(1.5) = \\ldots$$ (using $$+1.5$$ for B's initial velocity instead of $$-1.5$$). What conceptual error did they make, and how would it affect the result? (2 steps)", "answer": "- Step 1: The error is treating B's velocity as a speed rather than a signed quantity. B moves in the opposite direction to A, so if A's direction is positive, B's velocity is $$-1.5$$ m/s, not $$+1.5$$ m/s. Using $$+1.5$$ adds B's momentum instead of subtracting it.\n- Step 2: Effect: the total momentum before becomes $$4.5m + 1.5m = 6m$$ (both positive) instead of the correct $$4.5m - 1.5m = 3m$$. This doubles the perceived total momentum, leading to completely wrong post-collision velocities. The fix: always assign signs to velocities based on your chosen positive direction before plugging into PCLM.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "On a speed–time graph, how do you find the acceleration during a particular phase, and what does the gradient represent physically? (2 steps)", "answer": "- Step 1: The acceleration during any phase is the gradient (slope) of the v-t graph during that phase. For a line segment from $$(t_1, v_1)$$ to $$(t_2, v_2)$$, the gradient is $$\\frac{v_2 - v_1}{t_2 - t_1}$$.\n- Step 2: A positive gradient means acceleration (speed increasing); a negative gradient means deceleration (speed decreasing); a zero gradient means constant speed. In Q1(c), the first segment goes from $$(0, 0)$$ to $$(T, 20)$$, so $$a = \\frac{20 - 0}{T - 0} = \\frac{20}{T} = \\frac{20}{40} = 0.5$$ m/s². The gradient is the acceleration — this is a direct geometric interpretation, no extra formulas needed.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "After finding acceleration $$a = 1.2$$ m/s² up a slope, a parcel passes point A at 2 m/s and travels 5 m to B. How do you find the speed at B most efficiently? (2 steps)", "answer": "- Step 1: Use the SUVAT equation $$v^2 = u^2 + 2as$$, where $$u = 2$$ m/s (speed at A), $$a = 1.2$$ m/s² (acceleration up the slope), and $$s = 5$$ m (distance along the slope). This avoids finding time first.\n- Step 2: $$v^2 = 4 + 2(1.2)(5) = 4 + 12 = 16$$, so $$v = 4$$ m/s at B. The key insight: $$v^2 = u^2 + 2as$$ is the most direct route when you know $$a$$ and $$s$$ but not $$t$$. No need to find $$t$$ first and then use $$v = u + at$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "When solving $$|2\\sqrt{n} - 7| < 1$$, you arrive at $$3 < \\sqrt{n} < 4$$ and then square to get $$9 < n < 16$. Why is it safe to square all three parts simultaneously, and when would squaring an inequality chain be unsafe? (2 steps)", "answer": "- Step 1: Squaring preserves the inequality direction only when all parts are positive. Since 3, $$\\sqrt{n}$$, and 4 are all positive, squaring gives $$9 < n < 16$$ with the same inequality signs. This is safe.\n- Step 2: Squaring would be unsafe if any part of the chain were negative. For example, $$-2 < x < 1$$ cannot be squared to $$4 < x^2 < 1$$ (that's nonsense — $$x^2$$ can't be both > 4 and < 1). The rule: only square an inequality chain when you can guarantee all parts are non-negative. In this problem, $$\\sqrt{n} \\geq 0$$ always, and the bounds 3 and 4 are positive, so it's safe.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "Harry recommends using the calculator for intermediate steps like $$150 \\times 1.26 = 189$$. Why is this safer than doing the multiplication by hand, and how does it help the subsequent algebra? (2 steps)", "answer": "- Step 1: Intermediate products appear in moments equations and can be computed instantly on a calculator. Doing them by hand takes longer and risks arithmetic slips (e.g., misplacing a decimal point in $$150 \\times 1.26$$).\n- Step 2: Writing the intermediate result ($$189 = Wx$$) as a clean equation makes subsequent algebra much simpler. You work with 189 and 81 instead of $$150 \\times 1.26$$ and $$225 \\times 0.36$$, which are harder to divide. Clean intermediates = cleaner algebra = fewer errors. Harry: \"Use the calculator for intermediates.\"", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Exercise — A particle A of mass $$2m$$ moving at 4 m/s collides directly with particle B of mass $$m$$ moving at 2 m/s in the opposite direction. After the collision, A moves at 1 m/s in its original direction. Find the velocity of B after the collision. (Take A's initial direction as positive.) (2 steps)", "answer": "- Step 1: Set up PCLM. A's initial direction is positive, so $$u_A = 4$$, $$u_B = -2$$. After: $$v_A = 1$$, $$v_B = ?$$ PCLM: $$(2m)(4) + (m)(-2) = (2m)(1) + (m)(v_B)$$, giving $$8m - 2m = 2m + mv_B$$, so $$6m = 2m + mv_B$$.\n- Step 2: Simplify: $$6m - 2m = mv_B$$, so $$4m = mv_B$$, giving $$v_B = 4$$ m/s. Since $$v_B$$ is positive, B moves in A's direction after the collision (it rebounded). The key: always use signed velocities in PCLM, and check that the result makes physical sense.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Exercise — A car accelerates from rest to 10 m/s in 5 s, holds 10 m/s for $$T$$ seconds, then decelerates to rest in 10 s. Total distance is 250 m. Find $$T$$ using the trapezium area formula. (2 steps)", "answer": "- Step 1: The v-t graph is a trapezium. The two parallel sides in time are: the top (constant-speed phase) = $$T$$, and the bottom (tot
