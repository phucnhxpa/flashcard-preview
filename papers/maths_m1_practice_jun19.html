<script>
const DATA={"selected": [{"question": "A student writes \"the forces are balanced vertically\" for a particle in equilibrium on an inclined plane. Harry says this is wrong. What should the student have said, and why? (3 steps)", "answer": "- Step 1: \"Vertically\" means straight up and down (in the direction of gravity). For a particle on an inclined plane in equilibrium, the forces are NOT balanced vertically — the normal reaction is perpendicular to the plane (tilted from vertical), and friction is along the plane (also tilted from horizontal).\n- Step 2: The correct statement is \"the forces are balanced perpendicular to the plane.\" In the direction perpendicular to the plane, there is no acceleration (the particle does not fly off or sink into the plane), so the forces in that direction sum to zero.\n- Step 3: The distinction matters because \"balanced vertically\" would give the wrong equation. The vertical equation would involve components of $$R$$ and $$F$$ in the vertical direction, which is unnecessarily complicated. \"Balanced perpendicular to the plane\" gives the clean equation $$R = mg\\cos\\theta$$ (plus any other perpendicular components), which is directly useful for finding $$R$$ and hence friction.\n\nTakeaway: Say \"perpendicular to the plane,\" never \"vertically.\" The plane's orientation determines the natural coordinate system.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "If you have integers satisfying $9 < n < 16$, how many integer values does $n$ take? Explain why $16 - 9 = 7$ would be wrong. (2 steps)", "answer": "- Step 1: The integers strictly between 9 and 16 are: 10, 11, 12, 13, 14, 15. That's 6 integers.\n- Step 2: The formula \"largest - smallest\" gives the gap between the endpoints, not the count. To count inclusive integers from $a$ to $b$, you need $(b - a) + 1$. Here $16 - 9 = 7$ gives the difference, but adding 1 accounts for including both endpoint values in your count. Think of it as: the distance from 10 to 15 spans 5 intervals (10→11→12→13→14→15), but there are 6 numbers.\n\n**Takeaway:** When counting integers in a range, always add 1 to the difference — it's the most common off-by-one error in inequalities.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "In the inclined plane problem, the normal reaction was calculated as $R = 2g\\cos 30^\\circ - 18\\sin 40^\\circ \\approx 5.40$ N. What would happen if the $18\\sin 40^\\circ$ term were larger than $2g\\cos 30^\\circ$? What would this mean physically? (2 steps)", "answer": "- Step 1: If $18\\sin 40^\\circ > 2g\\cos 30^\\circ$, then $R$ would be negative. Since normal reaction is a pushing force that can only act away from the surface (it can't pull), we would get $R = 0$ physically — the parcel would lose contact with the plane.\n- Step 2: This would mean the pulling force is so strong it lifts the parcel off the surface entirely. In that case, you'd set $R = 0$ and friction would be zero (no contact). The parcel would be in free flight along the direction of the pull, not on the plane at all. This is why checking that $R > 0$ is important — negative $R$ indicates you've exceeded the lifting condition.\n\n**Takeaway:** Normal reaction cannot be negative — if your calculation gives $R < 0$, it means the object loses contact with the surface.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "In the collision problem, we used the equation $m_A u_A + m_B u_B = m_A v_A + m_B v_B$. What physical principle does this express, and under what conditions is it valid? (2 steps)", "answer": "- Step 1: This is the Principle of Conservation of Linear Momentum (PCLM). It states that in a closed system with no external forces, the total momentum before an event equals the total momentum after.\n- Step 2: For collisions, this applies when there's no external impulse — in textbook problems, this means a \"smooth\" surface (no friction) and no other external forces acting during the collision. The collision itself is an internal force between the two particles, so momentum is conserved. This principle fails if external impulses occur (e.g., if a third object hit during the collision, or friction acted during impact).\n\n**Takeaway:** PCLM applies when no external impulses act during the interaction — \"smooth\" surfaces and isolated systems are the assumptions.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "When a particle on a rough incline is being pulled up the slope, which direction does friction act, and why? (3 steps)", "answer": "- Step 1: Friction always opposes relative motion (or the tendency to move).\n- Step 2: If the particle moves (or is being pulled) up the slope, the friction force acts *down* the slope.\n- Step 3: A consequence: in the parallel equation, friction adds to gravity's down-slope component as a *resisting* force against the applied force. If the particle were sliding *down* instead, friction would act *up* the slope — same opposing rule, opposite direction.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "When resolving forces on an inclined plane, why must you resolve perpendicular to the plane rather than vertically? What's wrong with resolving vertically? (2 steps)", "answer": "- Step 1: The key constraint on an inclined plane is that there is no acceleration perpendicular to the plane — the object doesn't lift off or sink into the surface. Therefore, forces perpendicular to the plane must balance exactly: $\\sum F_{\\perp} = 0$.\n- Step 2: If you resolve vertically, you're mixing directions. The normal reaction $R$ acts perpendicular to the plane, not vertical. You'd have to express $R$ in terms of its vertical component, complicating the algebra. By resolving perpendicular to the plane, $R$ appears directly (as $R$ itself, not $R\\cos\\theta$), making the equation simple: $R + F_{\\text{away}} = W\\cos\\theta$ (or variations). Harry specifically corrected Phuc: say \"perpendicular to the plane,\" not \"vertically.\"\n\n**Takeaway:** Always resolve perpendicular to the surface first — that's where there's no acceleration and where the normal reaction lives.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "Define the moment of a force about a point, and explain why the perpendicular distance — not just any distance — is what matters. (3 steps)", "answer": "- Step 1: The moment of a force $$F$$ about a point $$P$$ is $$F \\times d$$, where $$d$$ is the *perpendicular* distance from $$P$$ to the line of action of $$F$$.\n- Step 2: Only the component of the force perpendicular to the position arm contributes to rotation. The parallel component pulls along the arm and produces no twisting effect.\n- Step 3: Equivalently: extend the force's line of action; drop a perpendicular from the pivot onto that line; the length of that perpendicular is $$d$$. Using a slanted distance overcounts because it includes a non-rotating component.\n\nUnits: $$\\text{N m}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "The phrase \"the difference between $$2\\sqrt{n}$$ and $$7$$ is less than $$1$$\" translates to a specific mathematical structure. Why is a modulus (absolute value) the correct way to represent \"difference\" here, rather than just writing $$2\\sqrt{n} - 7 < 1$$? (2 steps)", "answer": "- Step 1: The word \"difference\" refers to the size of the gap between two values, regardless of which one is larger. Mathematically, the distance between $$a$$ and $$b$$ on a number line is $$|a - b|$$.\n- Step 2: If we only wrote $$2\\sqrt{n} - 7 < 1$$, we would be assuming $$2\\sqrt{n}$$ is strictly larger than 7. However, if $$2\\sqrt{n}$$ were smaller than 7, the difference would be $$7 - 2\\sqrt{n}$$. The modulus $$|2\\sqrt{n} - 7| < 1$$ captures both scenarios automatically.\n\nTakeaway: \"Difference\" in mechanics or maths word problems almost always signals a modulus inequality.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Why, in the inclined plane drill above, does friction *add* to $$5g\\sin 20°$$ rather than subtract from $$P$$? Compare to the \"on the point of sliding *down*\" case. (3 steps)", "answer": "- Step 1: Friction opposes the impending motion. Sliding *up* $$\\Rightarrow$$ friction acts *down* the slope $$\\Rightarrow$$ friction joins gravity in opposing $$P$$.\n- Step 2: For sliding down: friction acts *up* the slope, helping $$P$$ (or replacing the need for $$P$$ entirely if $$\\mu \\geq \\tan\\theta$$).\n- Step 3: This sign-flip is why \"on the point of moving up\" vs \"on the point of moving down\" can give very different required forces for the same slope.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "A force of magnitude $$P$$ acts on a particle at an inclined plane, at angle $$\\alpha$$ to the plane itself (not to the horizontal). How does $$P$$ split into components, and why is this often confused? (3 steps)", "answer": "- Step 1: Since $$\\alpha$$ is measured *from the plane*, the component along the plane is $$P\\cos\\alpha$$ and the component perpendicular to the plane is $$P\\sin\\alpha$$.\n- Step 2: Confusion arises because students automatically use $$\\cos$$ for the \"horizontal-ish\" direction. But what matters is the angle's reference: $$\\cos$$ goes with the direction the angle is measured *from*.\n- Step 3: Mental check: at $$\\alpha = 0$$ (force lies in the plane), all of $$P$$ should be parallel — $$P\\cos 0 = P$$ ✓. At $$\\alpha = 90°$$ (force perpendicular to plane), all of $$P$$ should be perpendicular — $$P\\sin 90° = P$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Two moments equations from a tilting problem are $$Wx = 189$$ and $$W(0.9 - x) = 81$$. Why is *dividing* the equations smarter than *substituting*? (3 steps)", "answer": "- Step 1: Both equations contain $$W$$ as a factor. Dividing equation (A) by equation (B) cancels $$W$$ in one step: $$\\frac{Wx}{W(0.9-x)} = \\frac{189}{81}$$.\n- Step 2: This reduces the system to a single equation in $$x$$ alone: $$\\frac{x}{0.9 - x} = \\frac{189}{81}$$, which solves directly.\n- Step 3: Substitution would require solving (A) for $$W$$ as a function of $$x$$, plugging into (B), and simplifying — more steps, more algebra, more error opportunities. Whenever two equations share a multiplicative factor, divide.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why does \"magnitude of the impulse\" mean your final answer must be a positive number, with no minus sign or modulus bars? (3 steps)", "answer": "- Step 1: Magnitude is the size of a vector — always non-negative by definition.\n- Step 2: Your raw calculation $$I = mv - mu$$ may yield a negative value, simply meaning the impulse points opposite to your chosen positive direction.\n- Step 3: To report the magnitude:\n+ Drop the sign and write a positive value.\n+ Don't leave modulus bars around it — the bars indicate the operation; the answer is the result of the operation.\n\nA negative final magnitude loses marks because it contradicts the definition.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "In Q2, why can we assume the speed of B after collision is $v + 1$ (where $v$ is A's speed), rather than having to consider $v - 1$? (2 steps)", "answer": "- Step 1: The problem states that \"the direction of motion of A is unchanged\" — so A continues moving in its original positive direction. It also states that \"the difference between the speed of A and the speed of B is 1 m/s.\"\n- Step 2: Since A is moving in the positive direction after collision and B must rebound (otherwise they would stick together or pass through), B also moves in the positive direction after collision. The difference of 1 m/s between their speeds means $|v_B - v_A| = 1$. Given that A is unchanged and moving positively, and B rebounds in the same direction, we have $v_B > v_A$, so $v_B = v_A + 1$. If B had reversed direction (negative), the difference would be $v_A - (-v_B)$ which would be larger, contradicting the given difference of 1.\n\n**Takeaway:** Analyze what \"unchanged direction\" and \"difference of speeds\" mean physically before setting up your variables.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "In a collision question, why is drawing a \"before\" and \"after\" diagram with arrows for velocities so heavily emphasised? (3 steps)", "answer": "- Step 1: Mechanics is full of sign conventions. The diagram forces you to commit to which direction is positive and to label each velocity (before/after) clearly.\n- Step 2: It prevents the common error of writing $$u_B = +1.5$$ when $$B$$ actually moves in the negative direction.\n- Step 3: It also makes the \"unchanged direction\" or \"rebound\" clause visually obvious — you can see if your post-collision arrow points the right way.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "When a pulling force is removed and a parcel is at rest on a rough incline, how do you determine whether the parcel remains at rest or starts sliding down? (3 steps)", "answer": "- Step 1: Compute the weight component down the slope: $$mg\\sin\\theta$$. This is the force trying to make the parcel slide.\n- Step 2: Compute the maximum available friction: $$\\mu R$$, where $$R = mg\\cos\\theta$$ (no pulling force now, so $$R$$ is just the normal component of weight). This is the maximum force friction can provide to resist sliding.\n- Step 3: Compare: if $$mg\\sin\\theta > \\mu R$$, friction cannot hold the parcel and it slides. If $$mg\\sin\\theta \\leq \\mu R$$, friction is sufficient and the parcel stays at rest. In Q8(c): $$mg\\sin 30° = 9.8$$ N while $$\\mu R \\approx 5.09$$ N, so $$9.8 > 5.09$$ and the parcel slides down.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "In Q4, Phuc initially took moments about B and wrote a \"$$-Wx$$\" term. Why was this incorrect, and what does it illustrate about measuring distances? (2 steps)", "answer": "- Step 1: $$x$$ was defined as the distance from C to the centre of mass, not from D or B. When taking moments about D, the distance from D to the weight is not $$x$$ — it must be recalculated based on the positions of D and C relative to the rod.\n- Step 2: In Q4, C is at 0.24 m from A and D is at 1.14 m from A. The centre of mass is at $$0.24 + x$$ from A. The distance from D to the centre of mass is $$(0.24 + x) - 1.14 = x - 0.9$$, or equivalently the weight is $$0.9 - x$$ from D (measuring toward A). Using \"$$x$$\" directly as the distance from D is wrong because $$x$$ was defined from C. Always recalculate distances from your chosen pivot.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "In a moments problem, you derive two equations: (A) $$189 = Wx$$ and (B) $$81 = (0.9 - x)W$$. A student substitutes (A) into (B) to eliminate $$W$$. Harry recommends dividing instead. Why is division cleaner? (3 steps)", "answer": "- Step 1: Substitution approach: from (A), $$W = \\frac{189}{x}$$. Substitute into (B): $$81 = (0.9 - x) \\cdot \\frac{189}{x}$$. This creates a fraction with $$x$$ in the denominator, requiring multiplication by $$x$$ and then solving a more complex equation. More algebra, more steps, more potential errors.\n- Step 2: Division approach: divide (A) by (B): $$\\frac{189}{81} = \\frac{Wx}{(0.9 - x)W} = \\frac{x}{0.9 - x}$$. The $$W$$ cancels immediately, leaving a simple equation in $$x$$ only.\n- Step 3: Cross-multiply: $$189(0.9 - x) = 81x$$, which is linear and straightforward. The division approach works whenever both equations share a common factor (here, $$W$$) — it is a general technique that Harry notes \"helps in Mechanics 2 and in pure maths too.\"\n\nTakeaway: When two equations share a common factor, divide to cancel it — faster and less error-prone than substitution.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "You solve an inequality and find $$9 < n < 16$$ where $$n$$ must be an integer. A student writes \"there are $$16 - 9 = 7$$ integers.\" What is wrong, and what is the correct count? (3 steps)", "answer": "- Step 1: The integers strictly between 9 and 16 are: 10, 11, 12, 13, 14, 15. Listing them, there are 6 — not 7.\n- Step 2: The error is that $$16 - 9 = 7$$ counts the \"gaps\" between consecutive integers from 9 to 16, but the integers at the endpoints (9 and 16) are excluded by the strict inequality. You are actually counting from 10 to 15 inclusive.\n- Step 3: The correct formula for the number of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. Here, from 10 to 15: $$15 - 10 + 1 = 6$$. The \"$$+1$$\" is what the student forgot — it accounts for both endpoints being included in the count.\n+ Drawing a number line and marking the integer dots makes this visually obvious: you can physically count them.\n\nTakeaway: Number of integers from $$a$$ to $$b$$ inclusive = $$b - a + 1$$, never just $$b - a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "When solving $$|2\\sqrt{n} - 7| < 1$$, you arrive at $$3 < \\sqrt{n} < 4$$ and then square to get $$9 < n < 16$. Why is it safe to square all three parts simultaneously, and when would squaring an inequality chain be unsafe? (2 steps)", "answer": "- Step 1: Squaring preserves the inequality direction only when all parts are positive. Since 3, $$\\sqrt{n}$$, and 4 are all positive, squaring gives $$9 < n < 16$$ with the same inequality signs. This is safe.\n- Step 2: Squaring would be unsafe if any part of the chain were negative. For example, $$-2 < x < 1$$ cannot be squared to $$4 < x^2 < 1$$ (that's nonsense — $$x^2$$ can't be both > 4 and < 1). The rule: only square an inequality chain when you can guarantee all parts are non-negative. In this problem, $$\\sqrt{n} \\geq 0$$ always, and the bounds 3 and 4 are positive, so it's safe.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "A velocity–time graph problem states the distance between two stations is 4.8 km and the speed is in m/s. A student uses 4.8 directly in their area equation. What goes wrong? (2 steps)", "answer": "- Step 1: The speed–time graph has speed in m/s and time in seconds, so the area (speed × time) comes out in metres. But 4.8 is in kilometres — the student is equating an area in metres to 4.8 km, which is dimensionally inconsistent.\n- Step 2: The fix: convert 4.8 km = 4800 m before using it in the equation. Harry: \"4.8 km is 4800 m — a very common mistake.\" This is one of the most frequent errors in M1 exams — always check whether distances are in km or m, and whether times are in seconds or minutes.\n\nTakeaway: Before using any number in an equation, check its units match the other quantities. km ≠ m; minutes ≠ seconds.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "Why is it cleaner to write moment equations as \"clockwise = anticlockwise\" rather than \"sum to zero\"? (2 steps)", "answer": "- Step 1: \"Sum to zero\" requires you to attach signs to each moment, and a sign error propagates silently.\n- Step 2: \"Clockwise = anticlockwise\" makes you explicitly list each force on the correct side. There are no negative numbers to mishandle, so sign errors essentially vanish.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "When you have two moments equations (A) and (B) that both contain the unknown $$W$$, why is dividing equation (A) by equation (B) often better than substituting? (2 steps)", "answer": "- Step 1: If (A) is $$Wx = 189$$ and (B) is $$W(0.9 - x) = 81$$, both contain $$W$$. Substitution would require solving one equation for $$W$$, then plugging into the other — two steps with more algebra and more risk of error.\n- Step 2: Dividing (A)/(B): the $$W$$ cancels immediately, giving $$\\frac{x}{0.9 - x} = \\frac{189}{81}$$. This is one step, fewer terms, and directly produces an equation in $$x$$ alone. It's faster and cleaner. Harry: \"A really good habit — it helps in Mechanics 2 and in pure maths too.\" Box and label your equations (A), (B) so you can reference them clearly when dividing.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Limit case: what happens to the required pulling force $$P$$ on a rough incline as $$\\theta \\to 0$$? As $$\\theta \\to 90°$$? (3 steps)", "answer": "- Step 1: As $$\\theta \\to 0$$ (flat surface): $$mg\\sin\\theta \\to 0$$ (no gravity component along surface), $$R \\to mg$$ (full weight on surface), so $$P \\to \\mu mg$$ — just overcome friction.\n- Step 2: As $$\\theta \\to 90°$$ (vertical wall): $$mg\\sin\\theta \\to mg$$, but $$R \\to 0$$ (no normal force from a wall under just gravity), so friction $$\\to 0$$. $$P \\to mg$$ — must support full weight directly.\n- Step 3: In between, both gravity-along-slope and friction contribute, with a maximum total force at intermediate angles depending on $$\\mu$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "When solving a compound inequality like $$3 < \\sqrt{n} < 4$$, you can square all three parts to get $$9 < n < 16$$. Why is it mathematically invalid to square an inequality if one or more parts could be negative? (2 steps)", "answer": "- Step 1: Squaring a negative number makes it positive, which can reverse the order of the inequality. For example, $$-5 < -2$$, but squaring gives $$25 < 4$$, which is false.\n- Step 2: In $$3 < \\sqrt{n} < 4$$, all three parts are guaranteed to be positive (since square roots are non-negative). Therefore, squaring preserves the inequality direction. If the inequality was $$-1 < \\sqrt{n} < 4$$, squaring the $$-1$$ would be invalid without splitting the cases.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A train accelerates from rest to 20 m/s and later decelerates from 20 m/s to rest. The magnitude of acceleration is twice the magnitude of deceleration. Why does the deceleration phase last twice as long as the acceleration phase? (2 steps)", "answer": "- Step 1: Both phases involve the same change in speed: $$\\Delta v = 20$$ m/s. The relationship is $$\\Delta v = a \\times t$$, so $$t = \\frac{\\Delta v}{|a|}$$.\n- Step 2: Since $$\\Delta v$$ is the same for both phases, the time is inversely proportional to the acceleration magnitude. If $$|a_{\\text{accel}}| = 2 \\times |a_{\\text{decel}}|$$, then $$t_{\\text{decel}} = 2 \\times t_{\\text{accel}}$$. The gentler the deceleration, the longer it takes to shed the same speed.\n\nTakeaway: Same speed change, different acceleration magnitudes → time is inversely proportional to acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "In a velocity-time graph, explain why the area under the graph represents displacement, and why we use the trapezium formula $\\frac{1}{2}(a+b)h$ rather than splitting into triangles. (2 steps)", "answer": "- Step 1: On a velocity-time graph, velocity ($y$-axis, in m/s) × time ($x$-axis, in s) has units of metres — the same as displacement. Geometrically, the area under any curve gives the accumulated quantity, and a trapezium captures the area of a velocity segment that rises linearly from one speed to another.\n- Step 2: The trapezium formula $\\frac{1}{2}(a+b)h$ is a single expression that gives the area directly. Splitting into triangles and rectangles is slower and creates more opportunities for arithmetic errors. Memorising $\\frac{1}{2}(a+b)h$ is faster and safer.\n\n**Takeaway:** The $\\frac{1}{2}$ factor is the most commonly forgotten part — drill it until automatic.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "On a $$v$$–$$t$$ graph with an acceleration phase of duration $$T$$, a constant phase of $$180$$ s, and a deceleration phase of $$2T$$, why is the time at the end of the constant phase $$T + 180$$, not just $$180$$? (2 steps)", "answer": "- Step 1: The constant phase *starts* at time $$T$$ (when acceleration ends), not at time 0. The 180 s is its *duration*, not its end-point.\n- Step 2: So end of constant phase = start + duration = $$T + 180$$. Treating \"180\" as the end coordinate is a reference-point error — the clock didn't start at zero for that phase.\n\nIf you misplace this marker, every subsequent area calculation is wrong — \"the whole thing snowballs.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "State the friction relation $$F = \\mu R$$ and explain precisely when this equation holds (not when it merely approximates). (3 steps)", "answer": "- Step 1: $$F = \\mu R$$ where $$F$$ is the friction force, $$\\mu$$ is the coefficient of friction, and $$R$$ is the normal reaction.\n- Step 2: This is an *equality* only when the body is moving, or on the point of moving (limiting equilibrium). Below this threshold, $$F < \\mu R$$ — friction is whatever it needs to be to prevent motion, up to the maximum $$\\mu R$$.\n- Step 3: So in M1 problems:\n+ \"Moving up/down the slope\" ⇒ use $$F = \\mu R$$.\n+ \"On the point of slipping\" ⇒ use $$F = \\mu R$$.\n+ \"At rest, not on the point of moving\" ⇒ $$F$$ is unknown and $$\\leq \\mu R$$; you can't assume equality.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "When counting the number of integers that satisfy a strict inequality like $$9 < n < 16$$, a common mistake is to simply subtract the bounds ($$16 - 9 = 7$$). Explain the \"off-by-one\" error here and how to correctly count the integers. (2 steps)", "answer": "- Step 1: Subtracting the bounds ($$16 - 9$$) calculates the *gaps* between the numbers, not the numbers themselves. To count the items within an inclusive range, you must add 1 to account for the starting item.\n- Step 2: However, the inequality $$9 < n < 16$$ is *strict* (endpoints excluded), so the integers are $$10, 11, 12, 13, 14, 15$$. The correct count is $$(15 - 10) + 1 = 6$$. Sketching the number line makes the endpoints obvious and prevents this classic slip.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A 5 kg block sits on a $$20°$$ rough plane with $$\\mu = 0.25$$, held by force $$P$$ along the slope. It's on the point of sliding *up*. Conceptually, why is $$P$$ larger than just $$5g\\sin 20°$$? (3 steps)", "answer": "- Step 1: To hold the block stationary against gravity alone, you'd need only $$P = 5g\\sin 20°$$ (matching gravity's down-slope pull).\n- Step 2: But \"on the point of sliding *up*\" means $$P$$ is large enough to be just about to overcome friction *plus* gravity. Since the block is about to move up, friction acts *down* the slope at its maximum value $$\\mu R$$.\n- Step 3: So $$P = 5g\\sin 20° + \\mu \\cdot 5g\\cos 20°$$. The friction term adds an extra $$\\mu R \\approx 11.5$$ N on top of the gravity-balancing $$16.8$$ N, giving $$P \\approx 28.3$$ N. Friction at its maximum is what makes \"on the point of sliding up\" require *more* force than mere equilibrium.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A particle B of mass $$m$$ moves at 1.5 m/s to the left before a collision and 1.5 m/s to the right after. A student says \"the speed is the same, so the impulse on B must be zero.\" Why is this wrong? (3 steps)", "answer": "- Step 1: Impulse depends on velocity (a vector), not speed (a scalar). Taking right as positive: before the collision, B's velocity is $$u_B = -1.5$$; after, $$v_B = +1.5$$.\n- Step 2: The change in momentum is $$m(v_B - u_B) = m(1.5 - (-1.5)) = m \\times 3 = 3m$$. This is the impulse on B, and it is clearly not zero.\n- Step 3: The intuition: B was moving left and is now moving right at the same speed. Something must have pushed it — hard — to reverse its direction. That push is the impulse. Even though the speed is unchanged, the direction reversed, which requires a substantial impulse.\n\nTakeaway: Speed is a scalar; velocity is a vector. Impulse depends on the change in velocity (including direction), not just speed.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "A train accelerates for $$T$$ seconds, travels at constant speed for 180 seconds, then decelerates for $$2T$$ seconds. Why are the three time markers on the horizontal axis $$T$$, $$T+180$$, and $$3T+180$$, and why does getting the first marker wrong \"snowball\" through the entire solution? (3 steps)", "answer": "- Step 1: The acceleration phase ends at time $$T$$. The constant-speed phase lasts 180 seconds after that, so it ends at $$T + 180$$. The deceleration phase lasts $$2T$$ seconds after that, so it ends at $$T + 180 + 2T = 3T + 180$$.\n- Step 2: These markers determine the parallel sides of the trapezium: the top (constant-speed duration) is 180, and the bottom (total time) is $$3T + 180$$. If you mistakenly wrote the constant phase as ending at 180 (forgetting to add $$T$$), the bottom becomes $$180 + 2T$$ instead of $$3T + 180$$, and the entire area equation is wrong.\n- Step 3: The \"snowball\" effect: every subsequent calculation (area, solving for $$T$$, finding acceleration) depends on these markers. One early error propagates through everything. Harry: \"Be careful where you measure that three minutes from… otherwise the whole thing snowballs from there.\"", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A uniform plank of length 4 m and weight 200 N rests on supports at $$R$$ (0.5 m from $$P$$) and $$S$$ (0.5 m from $$Q$$). A child stands at end $$Q$$. As the child's weight grows, the plank is on the point of tilting about $$S$$. Conceptually, why does taking moments about $$S$$ give the child's weight directly? (3 steps)", "answer": "- Step 1: \"On the point of tilting about $$S$$\" means $$R_R = 0$$ (support at $$R$$ is about to lift). Taking moments about $$S$$ also kills $$R_S$$ — eliminating both reactions.\n- Step 2: Remaining forces: the plank's weight at the centre (1.5 m from $$S$$, on one side) and the child's weight at $$Q$$ (0.5 m from $$S$$, on the other side). These produce opposite-direction moments.\n- Step 3: Balance: $$C \\times 0.5 = 200 \\times 1.5 \\implies C = 600$$ N. The child has to be heavy because the plank's weight has a long lever arm — a small child-arm needs a big child-force to match.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Synthesis: in an \"on the point of tilting\" moments problem with two scenarios (one tilt about each support), why are you guaranteed *two* independent equations in the two unknowns ($$W$$ and $$x$$)? (3 steps)", "answer": "- Step 1: Each \"on the point of tilting\" scenario kills one reaction (the lifting one). Taking moments about the *remaining* support kills the other reaction.\n- Step 2: What's left in each equation is just the external loads and the weight $$W$$ at distance involving $$x$$ — two unknowns.\n- Step 3: Two scenarios $$\\Rightarrow$$ two equations $$\\Rightarrow$$ a system solvable for $$W$$ and $$x$$. The \"divide one by the other\" trick works because both equations are linear in $$W$$.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "In a 1D collision, particle A (mass $$3m$$) moves at $$+1.5$$ and B (mass $$m$$) moves at $$-1.5$$. After collision, A's direction is unchanged and the speed difference between A and B is 1 m/s. Why must B's post-collision speed be $$v_A + 1$$ and not $$v_A - 1$$? (3 steps)", "answer": "- Step 1: Since A's direction is unchanged (still positive), and momentum must be conserved with B originally going the other way, B must rebound — so B's post-collision velocity is also positive.\n- Step 2: Physically, the lighter particle B (struck by the heavier A) rebounds *faster* than A continues — A loses speed while B reverses with a larger magnitude.\n- Step 3: So $$\\text{speed of }B > \\text{speed of }A$$, meaning the difference $$v_B - v_A = +1$$, giving $$v_B = v_A + 1$$. Choosing $$v_A - 1$$ would give B a smaller speed than A, which is inconsistent with the physics of a lighter particle bouncing off a heavier one.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "How do you remove the modulus from $$|X| < k$$ (where $$k > 0$$) using a number-line picture, and why is this cleaner than splitting into two separate inequalities? (2 steps)", "answer": "- Step 1: On a number line, $$|X| < k$$ means $$X$$ lies strictly between $$-k$$ and $$+k$$ — it's within $$k$$ units of zero, regardless of direction. This translates directly to the single chain $$-k < X < k$$.\n- Step 2: Splitting into two cases ($$X < k$$ and $$-X < k$$) is logically correct but slower and more error-prone in exams. The chain $$-k < X < k$$ lets you add/multiply all three parts simultaneously in one flow, which is faster and reduces algebra mistakes. Harry steered Phuc away from the two-case split toward the chain method for exactly this reason.\n\nThe number-line picture is your visual sanity check — sketch it whenever you see a modulus inequality.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "A car travels 900 m in total. Its speed-time graph consists of three phases: acceleration from rest to $v$, constant speed for time $T$, and deceleration to rest. The acceleration and deceleration magnitudes are $a$ and $a/2$ respectively. Write an expression for the total distance in terms of $v$, $a$, and $T$. (3 steps)", "answer": "- Step 1: Let acceleration time = $t_1$, deceleration time = $t_2$. Since $v = a t_1$, we have $t_1 = v/a$. Similarly, deceleration $v = (a/2)t_2$ gives $t_2 = 2v/a = 2t_1$.\n- Step 2: Distance during acceleration = area of triangle = $\\frac{1}{2} v t_1 = \\frac{1}{2} v (v/a) = \\frac{v^2}{2a}$. Distance during deceleration = same area (same $v$, same time) = $\\frac{v^2}{2a}$.\n- Step 3: Constant speed distance = $v \\times T$. Total: $D = \\frac{v^2}{2a} + vT + \\frac{v^2}{2a} = \\frac{v^2}{a} + vT$.\n\n**Takeaway:** In symmetric acceleration-deceleration problems, the distance covered in accel and decel phases are equal.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "A train accelerates from rest for $$T$$ seconds to $$20$$ m/s, holds that speed for $$180$$ s, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, why does the deceleration phase last $$2T$$? (3 steps)", "answer": "- Step 1: On a $$v$$–$$t$$ graph, acceleration is the *gradient* of the line. Both phases start/end at speeds 0 and 20, so the speed change has the same magnitude.\n- Step 2: Gradient = (change in speed) / (time). If acceleration's gradient is twice the deceleration's gradient (in magnitude), then for the same speed change, the deceleration's time must be twice as long.\n- Step 3: Formally: $$\\frac{20}{T_{\\text{acc}}} = 2 \\cdot \\frac{20}{T_{\\text{dec}}} \\implies T_{\\text{dec}} = 2 T_{\\text{acc}} = 2T$$. Geometrically, halving the steepness doubles the run for the same rise.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "In a direct collision where $$A$$ is unchanged in direction and $$B$$ rebounds, why is the speed of $$B$$ after written as $$v + 1$$ (where $$v$$ is the speed of $$A$$ after) and not $$v - 1$$? (3 steps)", "answer": "- Step 1: $$B$$ rebounds, so it now moves *with* $$A$$. Both speeds are measured as positive magnitudes in the chosen direction.\n- Step 2: \"Difference between the speeds is $$1$$\" means $$|v_A - v_B| = 1$$. Physically, for $$B$$ to rebound off heavier $$A$$, $$B$$ ends up *faster* than $$A$$.\n+ If you wrote $$v - 1$$, that would put $$A$$ faster, which is inconsistent with the elastic-like rebound geometry.\n- Step 3: Hence speed of $$B$$ after $$= v + 1$$. (You can verify by plugging into PCLM and checking the signs come out consistent.)", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Why does counting integers strictly between $$9$$ and $$16$$ give $$6$$, not $$7$$ or $$5$$? (3 steps)", "answer": "- Step 1: \"Strictly between\" excludes the endpoints 9 and 16, so the integers are $$\\{10, 11, 12, 13, 14, 15\\}$$.\n- Step 2: The general count of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. So from 10 to 15 inclusive: $$15 - 10 + 1 = 6$$.\n- Step 3: Common slips:\n+ $$15 - 10 = 5$$ forgets the \"+1\" — classic off-by-one.\n+ $$16 - 9 = 7$$ uses the original excluded endpoints — wrong because they're excluded.\n\nAlways draw the number line to make endpoint inclusion/exclusion visible.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "State the principle of conservation of linear momentum for a direct collision between two particles, and explain why the choice of positive direction matters. (3 steps)", "answer": "- Step 1: For two particles colliding on a smooth surface with no external impulse, total momentum before equals total momentum after: $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$.\n- Step 2: Velocity is a *signed* quantity — it carries direction. So if you fix \"to the right\" as positive, any particle moving left enters the equation with a negative velocity.\n- Step 3: Why this matters:\n+ Using the wrong sign on a pre-collision velocity changes the total momentum, and your answer collapses.\n+ You must keep the *same* positive convention for every term in the equation and for the impulse calculation that follows.\n\nThe physics is direction-aware; the equation is just bookkeeping that respects that.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Define impulse and explain why its formula $$I = mv - mu$$ is just Newton's second law in disguise. (3 steps)", "answer": "- Step 1: Impulse is the change in momentum of a particle: $$I = mv - mu$$, measured in $$\\text{N s}$$.\n- Step 2: Newton's second law in the form $$F = \\frac{d(mv)}{dt}$$ rearranges to $$F\\,dt = d(mv)$$. Integrating over the collision interval: $$\\int F\\,dt = mv - mu$$, and the left side is the definition of impulse.\n- Step 3: So impulse measures \"how much momentum a force delivered\" during the (short, possibly violent) interaction — without needing to know the force or duration separately.\n\nIt's the bridge between instantaneous forces and net momentum change.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "A rod weighing $$W$$ rests on two supports. When you take moments about a pivot, why does the reaction at that pivot contribute zero — and what does this strategically allow you to do? (3 steps)", "answer": "- Step 1: The reaction at the pivot has its line of action passing through the pivot, so its perpendicular distance is zero and its moment is zero.\n- Step 2: This eliminates one unknown without needing extra equations. You can solve a moments equation containing only the remaining forces.\n- Step 3: Strategy: if you have two unknown reactions, taking moments about one pivot eliminates that reaction. If \"on the point of tilting\" makes the other reaction zero, then taking moments about *that* pivot eliminates the only remaining reaction — leaving an equation purely in $$W$$ and geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Synthesis: Consider a single problem where a particle slides up an incline, decelerates due to friction and gravity, then collides directly with a stationary particle at the top. What three M1 toolkits are involved and in what order? (3 steps)", "answer": "- Step 1: *Inclined plane resolving* — set up perpendicular ($$R = mg\\cos\\theta$$) and parallel ($$ma = -(mg\\sin\\theta + \\mu R)$$) equations to find deceleration along the slope.\n- Step 2: *SUVAT* — use the deceleration plus initial speed to find the speed just before collision (e.g. $$v^2 = u^2 + 2as$$).\n- Step 3: *Collision (PCLM)* — apply conservation of momentum at the collision instant using that pre-collision speed. The combination tests whether you can hand off variables cleanly between subsystems.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "When a question says \"the difference between $$A$$ and $$B$$ is less than $$k$$,\" why is the modulus the right translation, and what does it look like? (3 steps)", "answer": "- Step 1: \"Difference\" is a size — it doesn't tell you which of $$A$$ or $$B$$ is bigger. So you cannot write $$A - B < k$$ alone, because if $$B > A$$ that gives a negative number which is trivially less than $$k$$ but doesn't capture the \"gap.\"\n- Step 2: The size of the gap regardless of sign is $$|A - B|$$. So \"difference less than $$k$$\" becomes $$|A - B| < k$$.\n- Step 3: This unpacks (via the number-line picture of $$|X| < k$$) into the single chain $$-k < A - B < k$$, which is cleaner than splitting into two separate inequalities.\n\nTakeaway: \"difference\" + \"less than\" is a modulus signal; immediately reach for $$|\\cdot| < k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Two particles approach each other on a smooth surface. After they collide, can you tell whether their post-collision speeds satisfy any inequality without knowing the masses precisely? (3 steps)", "answer": "- Step 1: Energy considerations: kinetic energy can be conserved (elastic) or lost (inelastic). It is never gained in a passive collision.\n- Step 2: So $$\\tfrac{1}{2}m_A v_A^2 + \\tfrac{1}{2}m_B v_B^2 \\leq \\tfrac{1}{2}m_A u_A^2 + \\tfrac{1}{2}m_B u_B^2$$.\n- Step 3: But you cannot easily bound individual speeds without more info — only the *combined* kinetic energy. This is why M1 collisions need an extra given (like \"speed difference is $$1$$\") to close the system.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "A train accelerates for $$T$$ seconds, then travels at constant speed for 3 minutes, then decelerates. A student labels the time markers on the horizontal axis as $$T$$, 180, and $$2T + 180$$. What is wrong? (3 steps)", "answer": "- Step 1: The first marker $$T$$ is correct — it is the end of the acceleration phase, measured from time 0.\n- Step 2: The second marker should be $$T + 180$$, not 180. The constant-speed phase starts at time $$T$$ and lasts 180 seconds, so it ends at $$T + 180$$. Writing just \"180\" means you are measuring from time 0, but the constant phase does not start at time 0.\n- Step 3: The third marker should be $$T + 180 + 2T = 3T + 180$$, not $$2T + 180$$. The deceleration phase starts at $$T + 180$$ and lasts $$2T$$ seconds. The student's version $$2T + 180$$ would only be correct if the deceleration started at time 0.\n+ As Harry warned: \"Be careful where you measure that three minutes from… otherwise the whole thing snowballs from there.\" Getting one marker wrong cascades through all subsequent markers.\n\nTakeaway: Each time marker is measured from time 0, not from the previous phase. Always add durations cumulatively.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "In a direct collision on a smooth horizontal surface, what is conserved and why does this give a usable equation? (3 steps)", "answer": "- Step 1: Total linear momentum $$\\sum m\\mathbf{v}$$ is conserved when there is no external impulse along the line of motion. \"Smooth\" rules out friction; \"direct\" means the collision force acts only along the line of motion, so internal impulses cancel as a Newton-third-law pair.\n- Step 2: This gives $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$ — one scalar equation linking four velocities.\n- Step 3: It's usable because mass is known, two velocities are usually given, and any further given (e.g. a speed difference, an \"unchanged direction\") closes the system.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "In the inequality warm-up, the condition was $$|2\\sqrt{n} - 7| < 1$$, leading to $$9 < n < 16$$ (strict). If the inequality had been $$|2\\sqrt{n} - 7| \\leq 1$$ instead, how would the integer count change? (3 steps)", "answer": "- Step 1: Replacing $$<$$ with $$\\leq$$ throughout the chain: $$-1 \\leq 2\\sqrt{n} - 7 \\leq 1$$, then $$6 \\leq 2\\sqrt{n} \\leq 8$$, then $$3 \\leq \\sqrt{n} \\leq 4$$, then $$9 \\leq n \\leq 16$$.\n- Step 2: Now the endpoints 9 and 16 are included. The integers satisfying this are: 9, 10, 11, 12, 13, 14, 15, 16.\n- Step 3: The count is $$16 - 9 + 1 = 8$$, compared to the original 6. The two extra integers (9 and 16) come from the endpoints now being included.\n+ This is why the word \"less than\" (strict) vs \"less than or equal to\" matters — Harry's advice to underline key words applies here. A single symbol changes the answer.\n\nTakeaway: Strict inequality excludes endpoints; non-strict includes them. Always check which one the question uses.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Given the modulus inequality $$|X| < k$$ where $$k > 0$$, how do you convert this into a standard compound inequality, and what visual tool makes this conversion intuitive? (2 steps)", "answer": "- Step 1: The expression $$|X| < k$$ means that the distance of $$X$$ from 0 is less than $$k$$. On a number line, this is the region strictly between $$-k$$ and $$k$$.\n- Step 2: This translates directly to the compound inequality $$-k < X < k$$. Harry's tip: visualizing the number line is much cleaner and less error-prone than splitting the modulus into two separate cases like $$X < k$$ and $$-X < k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A block is in limiting equilibrium on a rough inclined plane with no other forces applied. Derive the relationship between the angle of inclination $$\\theta$$ and the coefficient of friction $$\\mu$$. (3 steps)", "answer": "- Step 1: \"Limiting equilibrium\" means the block is on the point of sliding but has not yet. Forces are balanced in both directions. Perpendicular: $$R = mg\\cos\\theta$$. Parallel: friction (up the slope, opposing the tendency to slide down) balances the weight component: $$F = mg\\sin\\theta$$.\n- Step 2: In limiting equilibrium, friction is at its maximum: $$F = \\mu R$$. Substituting: $$\\mu R = mg\\sin\\theta$$ and $$R = mg\\cos\\theta$$.\n- Step 3: Dividing: $$\\frac{\\mu R}{R} = \\frac{mg\\sin\\theta}{mg\\cos\\theta}$$, giving $$\\mu = \\tan\\theta$$. This is a fundamental result: the angle at which a block just begins to slide satisfies $$\\mu = \\tan\\theta$$. This angle is sometimes called the \"angle of friction.\"\n\nTakeaway: Limiting equilibrium on an incline with no other forces → $$\\mu = \\tan\\theta$$. Quick check: if $$\\theta > \\arctan\\mu$$, the block slides.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "If the inequality were $$|2\\sqrt{n} - 7| \\leq 1$$ (with \"less than or equal to\" instead of strict \"less than\"), how would the count of integer solutions change compared to the strict version $$|2\\sqrt{n} - 7| < 1$$?", "answer": "The endpoints would now be included. The range becomes $$9 \\leq n \\leq 16$$ instead of $$9 < n < 16$$, so $$n = 9$$ and $$n = 16$$ are now valid. The count increases by 2: from 6 integers to 8. This shows why reading \"less than\" vs \"less than or equal to\" carefully matters — underlining key words in the question catches this distinction before it costs you a mark.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "When solving a direct collision problem using conservation of momentum, why must you choose a positive direction and stick with it for every term in the equation? What goes wrong if you don't? (2 steps)", "answer": "- Step 1: Momentum is a vector quantity — it has direction. The conservation equation $m_A u_A + m_B u_B = m_A v_A + m_B v_B$ only works if all velocities use the same sign convention. Choosing $A$'s initial direction as positive means $B$'s initial velocity (moving opposite) must be negative.\n- Step 2: If you mix signs or change direction mid-problem, you're adding quantities that should subtract, or vice versa. The equation becomes physically meaningless. For example, if $u_A = +1.5$ and $u_B = +1.5$ (both positive), you incorrectly assume they move in the same direction before collision, giving momentum $4.5m$ instead of the correct $3m - 1.5m = 1.5m$. This leads to completely wrong final speeds.\n\n**Takeaway:** Pick a positive direction once at the start, then assign positive or negative signs to every velocity based on that choice.", "source": "MiniMax ②", "_id": "minimax_2_5"}, {"question": "For a particle of mass $$m$$ on a plane inclined at angle $$\\theta$$ to the horizontal, how does the weight $$mg$$ resolve into components, and why are they $$mg\\sin\\theta$$ (down the slope) and $$mg\\cos\\theta$$ (into the plane) rather than the other way round? (3 steps)", "answer": "- Step 1: Draw the weight vector $$mg$$ pointing vertically downward from the particle. The angle between this vector and the normal to the plane (the perpendicular direction) is $$\\theta$$, because the plane is tilted $$\\theta$$ from horizontal and the weight is vertical — so the gap between \"vertical\" and \"perpendicular to the plane\" is exactly $$\\theta$$.\n- Step 2: The component along the normal (perpendicular to the plane) is $$mg\\cos\\theta$$ — it's the \"adjacent\" side in the right triangle formed by resolving. This component pushes the particle into the surface. The component along the slope (parallel) is $$mg\\sin\\theta$$ — it's the \"opposite\" side, pulling the particle down the slope.\n+ Sanity check at $$\\theta = 0°$$ (flat plane): $$mg\\sin 0 = 0$$ (no force down a flat slope — correct) and $$mg\\cos 0 = mg$$ (full weight into the surface — correct).\n+ Sanity check at $$\\theta = 90°$$ (vertical wall): $$mg\\sin 90 = mg$$ (full weight pulling down — correct) and $$mg\\cos 90 = 0$$ (no force into the wall — correct).\n- Step 3: Common confusion: students swap sin and cos because they think \"the steep angle should have cos.\" But the resolution angle is $$\\theta$$ from the normal, not from the slope. Always verify with the $$\\theta = 0°$$ and $$\\theta = 90°$$ limits.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "The inequality $$|X| < k$$ (where $$k > 0$$) can be rewritten as a single chain inequality. What is it, and what is the number-line intuition behind it? (2 steps)", "answer": "- Step 1: The modulus $$|X|$$ measures the distance of $$X$$ from zero on the number line. Saying $$|X| < k$$ means \"$$X$$ is within a distance $$k$$ of zero\" — so $$X$$ lies strictly between $$-k$$ and $$k$$.\n- Step 2: As a chain: $$-k < X < k$$. This is cleaner than splitting into two cases ($$X < k$$ AND $$X > -k$$), because the chain keeps both bounds visible at once and reduces the chance of forgetting one side. The number-line picture is the key: draw the line, mark $$-k$$ and $$k$$, and shade the region between them.\n\nTakeaway: $$|X| < k \\Leftrightarrow -k < X < k$$ — think \"number-line strip,\" not \"two separate cases.\"", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "After the 18 N pulling force is removed, a 2 kg parcel sits on a $$30°$$ incline with $$\\mu = 0.3$$. Conceptually, why does the parcel *not* stay at rest, without doing the full numerical comparison? (3 steps)", "answer": "- Step 1: Gravity's down-slope pull is $$2g\\sin 30° = g$$ (a force of about $$9.8$$ N).\n- Step 2: Maximum static friction is at most $$\\mu \\cdot 2g\\cos 30° = 0.3 \\cdot 2g \\cdot \\frac{\\sqrt{3}}{2} \\approx 0.26 \\cdot g$$ (about $$5.1$$ N).\n- Step 3: Since $$\\tan 30° \\approx 0.577 > \\mu = 0.3$$, gravity overpowers friction — the parcel slides down. The compact criterion: a particle stays at rest on an incline iff $$\\tan\\theta \\leq \\mu$$. Here $$\\tan 30° > 0.3$$, so motion is inevitable.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Why must you say the forces are \"balanced perpendicular to the plane\" rather than \"balanced vertically\" when resolving forces on an incline? (2 steps)", "answer": "- Step 1: \"Vertically\" means the straight up/down direction. On an incline, there IS acceleration vertically (the particle accelerates along the slope, which has a vertical component). The forces are NOT balanced vertically.\n- Step 2: The direction where forces are balanced is perpendicular to the plane — the particle doesn't accelerate into or away from the surface. The normal reaction $$R$$ and the perpendicular component of weight ($$mg\\cos\\theta$$) and any other perpendicular forces sum to zero in that specific direction only. Harry: \"Say 'perpendicular to the plane,' not 'vertical.'\"", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "On a $$v$$–$$t$$ graph, why does the area under a straight line from $$(0,0)$$ to $$(T, V)$$ equal $$\\tfrac{1}{2}VT$$ — and what does this represent physically? (3 steps)", "answer": "- Step 1: The region is a right triangle with base $$T$$ (time) and height $$V$$ (final speed). Area of a triangle = $$\\tfrac{1}{2} \\cdot \\text{base} \\cdot \\text{height} = \\tfrac{1}{2}VT$$.\n- Step 2: Physically, this area represents the distance covered during uniform acceleration from rest to speed $$V$$ over time $$T$$.\n- Step 3: This is consistent with the SUVAT result $$s = \\tfrac{1}{2}(u+v)t$$ with $$u=0$$: $$s = \\tfrac{1}{2}Vt = \\tfrac{1}{2}VT$$. Graph and formula agree because both encode the same averaging idea.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is the area under a speed–time graph equal to distance travelled? (3 steps)", "answer": "- Step 1: For constant speed $$v$$ over time $$\\Delta t$$, distance is $$v \\cdot \\Delta t$$ — geometrically a rectangle on the $$v$$–$$t$$ graph.\n- Step 2: For varying speed, slice the motion into infinitesimal strips of width $$dt$$ and height $$v(t)$$. Each strip contributes $$v(t)\\,dt$$ to the distance.\n- Step 3: Summing (integrating) all strips gives total distance $$= \\int v(t)\\,dt =$$ area under the curve. So area always carries units of (speed × time) = distance, regardless of shape.\n\nThis is why trapezia, triangles, and rectangles on $$v$$–$$t$$ graphs *all* directly give distances.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "A non-uniform rod rests on two supports. You have two scenarios (each \"on the point of tilting\" about a different support) giving two equations $$Wx = 189$$ and $$(0.9 - x)W = 81$$. Why is *dividing* one by the other better than substituting? (3 steps)", "answer": "- Step 1: Both equations contain the product/relationship with $$W$$. Dividing eliminates $$W$$ in one move: $$\\dfrac{Wx}{(0.9-x)W} = \\dfrac{189}{81}$$.\n- Step 2: This collapses to a single equation in $$x$$ alone: $$\\dfrac{x}{0.9 - x} = \\dfrac{189}{81}$$, immediately solvable.\n- Step 3: Substitution would require expressing $$W$$ from one equation and plugging into the other — more algebra, more chances to slip a fraction or a sign.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "In M1, why do marks come \"from the equations, not the diagram\"? (3 steps)", "answer": "- Step 1: A free-body diagram shows your understanding of the forces, but examiners cannot award method marks for a diagram alone — there's no equation to mark.\n- Step 2: The mark scheme assigns marks to specific lines: a momentum equation, a moments equation, a friction relation $$F = \\mu R$$, a resolved equation, etc.\n- Step 3: Strategy:\n+ Draw the diagram quickly for *your* clarity.\n+ Then immediately translate each labelled force into an equation, even if you don't finish solving.\n+ Write $$F = \\mu R$$ on its own line — there is typically a mark just for stating it.\n\nEquations are the currency of M1 marks.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Why must you resolve forces *perpendicular* and *parallel* to an inclined plane, rather than horizontally and vertically? (3 steps)", "answer": "- Step 1: The constraint of motion is along the slope: the particle accelerates *along* the slope, and is constrained *perpendicular* to it (no motion into or out of the plane).\n- Step 2: Choosing axes aligned with the slope means acceleration appears in only one component (parallel), and the normal reaction acts purely along the perpendicular axis — equations decouple cleanly.\n- Step 3: Using horizontal/vertical axes mixes acceleration across both components and forces $$R$$ to appear in both equations, doubling the algebra and obscuring the physics. Aligning axes with the motion is the standard mechanics trick.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A particle on an incline is being pulled up by a force whose component along the slope is $$X$$. Why can the friction force on the particle never exceed $$X$$ in this scenario? (3 steps)", "answer": "- Step 1: For the particle to actually move up the slope, the net force along the slope must be non-negative in the up direction. Forces involved: applied component $$+X$$ (up), gravity component (down), friction (down, opposing motion).\n- Step 2: If friction $$F > X$$, then even ignoring gravity, the net force would be downward — the particle couldn't be moving up.\n- Step 3: So $$F \\leq X$$ is a sanity check. If your computed $$F$$ from $$\\mu R$$ exceeds $$X$$, either the particle isn't actually moving up (re-examine assumptions) or there's an algebraic error.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why must you fix a positive direction *before* writing the momentum equation, and what would go wrong otherwise? (3 steps)", "answer": "- Step 1: Velocity is a signed quantity — a vector along the line of motion. The momentum equation only makes sense if every velocity is referred to the same axis.\n- Step 2: If you sign each term independently using \"speed in the direction it moves,\" you'll quietly write all positives and lose the cancellation that conservation depends on.\n+ Example: two particles approaching with speeds $$1.5$$ and $$1.5$$ have total momentum $$\\approx 0$$ for equal masses, not $$3m$$.\n- Step 3: Pick one direction $$+$$, write $$u_B = -1.5$$ if $$B$$ moves the other way, and *keep that convention* for after-the-collision velocities too.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the conservation of linear momentum equation $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$, why must velocities be treated as signed quantities rather than just speeds? (2 steps)", "answer": "- Step 1: Momentum is a vector — it has direction. If two particles move toward each other, one has positive momentum and the other negative. Using unsigned speeds would incorrectly add both contributions as positive, violating the physics of the collision.\n- Step 2: You must fix one direction as positive and stick with it for every term. If A moves right (positive) at 1.5 m/s and B moves left toward A, B's velocity is $$-1.5$$ m/s. The total momentum before is $$3m(1.5) + m(-1.5) = 3m$$, not $$3m(1.5) + m(1.5) = 6m$$ — the sign on B's velocity halves the total momentum.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "For a particle pulled up an incline by a force at angle $$\\alpha$$ to the plane, why does the perpendicular component of the pulling force *reduce* the normal reaction? (3 steps)", "answer": "- Step 1: The pulling force has a component $$P\\sin\\alpha$$ perpendicular to the plane, pointing *away* from the surface (lifting the particle slightly).\n- Step 2: Gravity presses the particle into the surface with component $$mg\\cos\\theta$$. The normal reaction $$R$$ acts perpendicular away from the surface to balance.\n- Step 3: Force balance perpendicular: $$R + P\\sin\\alpha = mg\\cos\\theta$$, so $$R = mg\\cos\\theta - P\\sin\\alpha$$. The lift partially cancels gravity's press, reducing $$R$$ — and therefore reducing the maximum friction.\n\nA pulling-at-an-angle force makes friction smaller; a pushing-from-above force would make it larger.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Misconception probe: a student writes \"$$F = \\mu R$$\" automatically for a stationary block. When is this wrong? (3 steps)", "answer": "- Step 1: $$F = \\mu R$$ is the *maximum* (limiting) friction, used when the body is moving or on the verge of moving.\n- Step 2: For a truly stationary block not on the verge of slipping, the actual friction is whatever value balances the other forces — it might be much less than $$\\mu R$$.\n- Step 3: Writing $$F = \\mu R$$ in such cases overestimates friction and can give wrong forces (e.g. claiming a block needs a bigger push than it actually does).", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "When finding the acceleration on the incline, we use $F = ma$ parallel to the plane: $18\\cos40^\\circ - F - 2g\\sin30^\\circ = 2a$. Explain why the weight component $2g\\sin30^\\circ$ is subtracted (not added). (2 steps)", "answer": "- Step 1: The weight $2g$ acts vertically downward. Its component parallel to the plane, pointing down the slope, is $2g\\sin30^\\circ$. This component opposes the pulling force (which acts up the slope).\n- Step 2: In the equation $F_{\\text{net}} = ma$, we sum forces in the chosen direction (up the slope). Forces up = $18\\cos40^\\circ$; forces down = $F + 2g\\sin30^\\circ$. So $18\\cos40^\\circ - F - 2g\\sin30^\\circ = 2a$.\n\n**Takeaway:** Always decide on a positive direction first, then add forces in that direction and subtract those opposing.", "source": "MiniMax ①", "_id": "minimax_1_32"}, {"question": "Explain the principle: \"a particle on a rough incline at angle $$\\theta$$ stays at rest iff $$\\tan\\theta \\leq \\mu$$.\" Why does this neat result hold? (3 steps)", "answer": "- Step 1: The driving force along the slope is $$mg\\sin\\theta$$; the maximum friction available is $$\\mu mg\\cos\\theta$$.\n- Step 2: Rest requires friction $$\\geq$$ driving force: $$\\mu mg\\cos\\theta \\geq mg\\sin\\theta$$.\n- Step 3: Dividing both sides by $$mg\\cos\\theta$$ (positive): $$\\mu \\geq \\tan\\theta$$, i.e. $$\\tan\\theta \\leq \\mu$$. Notice $$m$$ and $$g$$ drop out — the criterion depends only on geometry and friction, not on how heavy the particle is.\n\nThis is the \"angle of friction\" idea: the steepest slope a particle can rest on is $$\\arctan\\mu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "A particle $$A$$ of mass $$4m$$ moving at $$+2$$ m/s collides with a particle $$B$$ of mass $$m$$ moving at $$-3$$ m/s. After: $$A$$ unchanged direction, $$B$$ moves at $$+1$$ m/s. Conceptually outline how to find $$A$$'s post-collision speed and the impulse on $$B$$. (3 steps)", "answer": "- Step 1: Apply conservation of momentum, keeping $$A$$'s direction as positive: $$(4m)(2) + (m)(-3) = (4m)v_A + (m)(1)$$. The LHS is the *net* initial momentum.\n- Step 2: Simplify: $$8m - 3m = 4m v_A + m$$, so $$5m - m = 4m v_A$$, giving $$v_A = 1$$ m/s. The lighter particle B rebounded (negative to positive), so $$A$$ must have slowed considerably.\n- Step 3: Impulse on $$B$$ = change in $$B$$'s momentum: $$m(1) - m(-3) = 4m$$ N s. Magnitude is $$4m$$ (positive). Conceptual check: $$B$$ went from $$-3$$ to $$+1$$ — a velocity change of $$+4$$, multiplied by mass $$m$$, gives impulse $$4m$$. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "You have the chain inequality $$3 < \\sqrt{n} < 4$$ and want to square all three parts to get $$9 < n < 16$$. Under what condition is squaring a chain inequality valid, and why? (3 steps)", "answer": "- Step 1: Squaring is a strictly increasing function on positive numbers — meaning if $$0 < a < b$$, then $$a^2 < b^2$$. This holds because the derivative of $$x^2$$ is $$2x > 0$$ for $$x > 0$$.\n- Step 2: In the chain $$3 < \\sqrt{n} < 4$$, all three parts are positive — $$\\sqrt{n}$$ is always non-negative, and it is strictly greater than 3 here. So the increasing-function property applies, and we can safely square: $$9 < n < 16$$.\n- Step 3: If any part were negative, squaring could reverse or distort the inequality. For example, $$-3 < -2$$ but $$(-3)^2 = 9 > 4 = (-2)^2$$ — the inequality reverses. This is why you must verify all parts are non-negative before squaring.\n+ A common trap: if the chain were $$-2 < x < 3$$, you cannot square to get $$4 < x^2 < 9$$, because the left part involves a negative number.\n\nTakeaway: You can square a chain inequality only when all parts are non-negative (preferably strictly positive).", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "Why does the \"stay at rest after pull removed\" criterion reduce to $$\\tan\\theta \\leq \\mu$$, and what's the intuition? (3 steps)", "answer": "- Step 1: Setting weight-down-slope $$=$$ max friction: $$mg\\sin\\theta = \\mu mg\\cos\\theta$$, divide both sides by $$mg\\cos\\theta$$ to get $$\\tan\\theta = \\mu$$.\n- Step 2: The angle $$\\theta = \\arctan\\mu$$ is called the angle of friction — it's the steepest slope on which the surface alone can support the body.\n- Step 3: Intuition: at steeper $$\\theta$$, gravity's pull along the slope grows ($$\\sin$$ increases) while the press into the surface shrinks ($$\\cos$$ decreases), so friction loses the contest.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Why is it essential to *label* numerical answers (\"speed of A = ...\", \"speed of B = ...\") in an M1 collision question? (2 steps)", "answer": "- Step 1: An examiner sees two bare numbers like \"$$\\tfrac{1}{2}$$\" and \"$$\\tfrac{3}{2}$$\" and cannot tell which belongs to A and which to B. Without labels, the mark may not be awarded even if both are correct.\n- Step 2: Labels also force *you* to check which value corresponds to which particle — a self-correcting habit that catches mix-ups before they cost marks.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Harry mentioned that Phuc's initial approach to the inequality involved writing two separate inequalities. Why is the single chain $-1 < 2\\sqrt{n} - 7 < 1$ faster and less error-prone than splitting into two cases? (2 steps)", "answer": "- Step 1: Splitting into two cases means solving $2\\sqrt{n} - 7 < 1$ AND $-(2\\sqrt{n} - 7) < 1$, giving two separate inequalities to solve, then combining their solutions. That's more work.\n- Step 2: The single chain $-1 < 2\\sqrt{n} - 7 < 1$ treats it as one compound inequality. You add 7 to all three parts and divide all three parts by 2 in one go. Same result, fewer steps, fewer places to make sign errors. Harry steered Phuc toward the single chain \"via the number-line picture\" — visualizing $|x| < k$ as the region between $-k$ and $k$ makes this natural.\n\n**Takeaway:** For $|X| < k$, use the compound inequality $-k < X < k$ rather than splitting into cases — it's more efficient.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "A pulling force of 18 N acts at 40° to the inclined plane (in the vertical plane containing the line of greatest slope). How does this force resolve, and why is the along-slope component $$18\\cos 40°$$ rather than $$18\\sin 40°$$? (2 steps)", "answer": "- Step 1: The 40° angle is measured from the plane itself (the along-slope direction). When resolving a force at angle $$\\alpha$$ to a reference direction, the component along that direction is $$F\\cos\\alpha$$ and the component perpendicular to it is $$F\\sin\\alpha$$.\n- Step 2: Since 40° is the angle to the plane (the along-slope direction), the along-slope component is $$18\\cos 40°$$ and the perpendicular-to-plane component is $$18\\sin 40°$$.\n+ Sanity check: if the force were directed along the plane ($$\\alpha = 0°$$), the full 18 N would be along the slope ($$18\\cos 0 = 18$$) and nothing perpendicular ($$18\\sin 0 = 0$$) — correct. If it were perpendicular to the plane ($$\\alpha = 90°$$), nothing along the slope ($$18\\cos 90 = 0$$) and full force perpendicular ($$18\\sin 90 = 18$$) — also correct.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "After a head-on collision, A's direction is unchanged and B rebounds (both now move in A's original direction). The question states \"the difference between the speed of A and the speed of B is 1 m/s.\" If A's speed after is $$v$$, why should you write B's speed as $$v + 1$$ and not $$v - 1$$? (3 steps)", "answer": "- Step 1: \"Difference between the speeds\" means $$|\\text{speed}_A - \\text{speed}_B| = 1$$, so either $$\\text{speed}_B = v + 1$$ or $$\\text{speed}_B = v - 1$$. Both are mathematically possible from the wording alone.\n- Step 2: Since B (lighter) was hit head-on by A (heavier) and rebounded, B must be moving faster than A after the collision — the lighter particle gains more speed from the collision. So $$\\text{speed}_B > \\text{speed}_A$$, meaning $$\\text{speed}_B = v + 1$$.\n- Step 3: You can verify: if you tried $$\\text{speed}_B = v - 1$$ in the PCLM equation, it would typically give either a negative speed (impossible) or B stationary (contradicting \"rebounded\"). In the exam problem, PCLM with $$v + 1$$ gives $$v = 0.5$$ and $$\\text{speed}_B = 1.5$$ — both valid, confirming the choice.\n\nTakeaway: \"Difference of speeds\" gives two options; use physical reasoning (which particle should be faster?) to pick the right one, then verify with PCLM.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "The inequality $$|X| < k$$ (where $$k > 0$$) can be rewritten as a single chain inequality. What is it, and what is the number-line intuition behind it? (2 steps)", "answer": "- Step 1: The modulus $$|X|$$ measures the distance of $$X$$ from zero on the number line. Saying $$|X| < k$$ means \"$$X$$ is within a distance $$k$$ of zero\" — so $$X$$ lies strictly between $$-k$$ and $$k$$.\n- Step 2: As a chain: $$-k < X < k$$. This is cleaner than splitting into two cases ($$X < k$$ AND $$X > -k$$), because the chain keeps both bounds visible at once and reduces the chance of forgetting one side. The number-line picture is the key: draw the line, mark $$-k$$ and $$k$$, and shade the region between them.\n\nTakeaway: $$|X| < k \\Leftrightarrow -k < X < k$$ — think \"number-line strip,\" not \"two separate cases.\"", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A problem says \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1.\" Why does this translate to $$|2\\sqrt{n} - 7| < 1$$ rather than $$2\\sqrt{n} - 7 < 1$$? (3 steps)", "answer": "- Step 1: The word \"difference\" means the size of the gap between two quantities, regardless of which is bigger. If $$2\\sqrt{n} = 10$$, the difference from 7 is 3; if $$2\\sqrt{n} = 5$$, the difference from 7 is 2 — not $$-2$$.\n- Step 2: The expression $$2\\sqrt{n} - 7$$ can be positive or negative depending on whether $$2\\sqrt{n}$$ exceeds 7. But \"difference\" is always non-negative — it is the absolute value of the gap.\n- Step 3: Writing just $$2\\sqrt{n} - 7 < 1$$ would only capture the case where $$2\\sqrt{n} > 7$$ and would miss the case where $$2\\sqrt{n} < 7$$. The modulus captures both possibilities in one expression.\n\nTakeaway: \"Difference between A and B\" = $$|A - B|$$, because difference doesn't care about order.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "You solve an inequality and find $$9 < n < 16$$ where $$n$$ must be an integer. A student writes \"there are $$16 - 9 = 7$$ integers.\" What is wrong, and what is the correct count? (3 steps)", "answer": "- Step 1: The integers strictly between 9 and 16 are: 10, 11, 12, 13, 14, 15. Listing them, there are 6 — not 7.\n- Step 2: The error is that $$16 - 9 = 7$$ counts the \"gaps\" between consecutive integers from 9 to 16, but the integers at the endpoints (9 and 16) are excluded by the strict inequality. You are actually counting from 10 to 15 inclusive.\n- Step 3: The correct formula for the number of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. Here, from 10 to 15: $$15 - 10 + 1 = 6$$. The \"$$+1$$\" is what the student forgot — it accounts for both endpoints being included in the count.\n+ Drawing a number line and marking the integer dots makes this visually obvious: you can physically count them.\n\nTakeaway: Number of integers from $$a$$ to $$b$$ inclusive = $$b - a + 1$$, never just $$b - a$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "You have the chain inequality $$3 < \\sqrt{n} < 4$$ and want to square all three parts to get $$9 < n < 16$$. Under what condition is squaring a chain inequality valid, and why? (3 steps)", "answer": "- Step 1: Squaring is a strictly increasing function on positive numbers — meaning if $$0 < a < b$$, then $$a^2 < b^2$$. This holds because the derivative of $$x^2$$ is $$2x > 0$$ for $$x > 0$$.\n- Step 2: In the chain $$3 < \\sqrt{n} < 4$$, all three parts are positive — $$\\sqrt{n}$$ is always non-negative, and it is strictly greater than 3 here. So the increasing-function property applies, and we can safely square: $$9 < n < 16$$.\n- Step 3: If any part were negative, squaring could reverse or distort the inequality. For example, $$-3 < -2$$ but $$(-3)^2 = 9 > 4 = (-2)^2$$ — the inequality reverses. This is why you must verify all parts are non-negative before squaring.\n+ A common trap: if the chain were $$-2 < x < 3$$, you cannot square to get $$4 < x^2 < 9$$, because the left part involves a negative number.\n\nTakeaway: You can square a chain inequality only when all parts are non-negative (preferably strictly positive).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "In the inequality warm-up, the condition was $$|2\\sqrt{n} - 7| < 1$$, leading to $$9 < n < 16$$ (strict). If the inequality had been $$|2\\sqrt{n} - 7| \\leq 1$$ instead, how would the integer count change? (3 steps)", "answer": "- Step 1: Replacing $$<$$ with $$\\leq$$ throughout the chain: $$-1 \\leq 2\\sqrt{n} - 7 \\leq 1$$, then $$6 \\leq 2\\sqrt{n} \\leq 8$$, then $$3 \\leq \\sqrt{n} \\leq 4$$, then $$9 \\leq n \\leq 16$$.\n- Step 2: Now the endpoints 9 and 16 are included. The integers satisfying this are: 9, 10, 11, 12, 13, 14, 15, 16.\n- Step 3: The count is $$16 - 9 + 1 = 8$$, compared to the original 6. The two extra integers (9 and 16) come from the endpoints now being included.\n+ This is why the word \"less than\" (strict) vs \"less than or equal to\" matters — Harry's advice to underline key words applies here. A single symbol changes the answer.\n\nTakeaway: Strict inequality excludes endpoints; non-strict includes them. Always check which one the question uses.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "How many integers $$n$$ satisfy $$|3n - 10| < 5$$? (2 steps)", "answer": "- Step 1: Remove the modulus: $$-5 < 3n - 10 < 5$$. Add 10: $$5 < 3n < 15$$. Divide by 3: $$\\frac{5}{3} < n < 5$$. Since $$\\frac{5}{3} \\approx 1.67$$, the integers are 2, 3, 4.\n- Step 2: Count: $$4 - 2 + 1 = 3$$ integers.\n\nTakeaway: Modulus → chain → isolate $$n$$ → list integers → count with $$+1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Two particles collide directly on a smooth horizontal surface. State the principle of conservation of linear momentum (PCLM), and explain the physical reason it holds under these conditions. (3 steps)", "answer": "- Step 1: PCLM states: $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$ — the total momentum before the collision equals the total momentum after.\n- Step 2: Physically, this follows from Newton's Third Law: when A and B collide, the force A exerts on B is equal and opposite to the force B exerts on A, and they act for the same time. So the impulse on A is equal and opposite to the impulse on B, meaning the momentum gained by one equals the momentum lost by the other — the total is unchanged.\n- Step 3: The condition \"smooth horizontal surface\" means no friction, and \"direct collision\" means no external forces act along the line of motion during the brief collision. If there were an external impulse (like friction during the collision, or the collision on a slope with gravity), total momentum would not be conserved along that line.\n\nTakeaway: PCLM holds because internal collision forces are equal and opposite — no net external impulse along the line of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "In a collision problem, particle A moves right and particle B moves left. A student writes the momentum equation as $$(3m)(1.5) + (m)(1.5) = \\ldots$$ without specifying a positive direction. What has gone wrong? (3 steps)", "answer": "- Step 1: Velocity is a signed quantity — it has direction. If A moves right at 1.5 m/s and B moves left at 1.5 m/s, their velocities have opposite signs. Writing both as $$+1.5$$ treats them as moving in the same direction, which is wrong.\n- Step 2: The fix: choose one direction as positive (say, A's initial direction = right = positive). Then $$u_A = +1.5$$ and $$u_B = -1.5$$ (B moves the other way). The correct momentum equation starts $$(3m)(+1.5) + (m)(-1.5) = \\ldots$$\n- Step 3: Without fixing a convention, you cannot assign signs consistently, and the entire equation is unreliable. The same convention must be kept for all terms — before and after the collision. If a particle reverses direction, its velocity changes sign automatically under your chosen convention.\n\nTakeaway: Always declare a positive direction at the start and keep it for every term in the momentum equation.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "State the impulse–momentum relation and explain why impulse on B equals B's own change in momentum, not the total change in momentum of the system. (2 steps)", "answer": "- Step 1: The impulse on a single particle equals the change in that particle's momentum: $$I = mv - mu$$, where $$u$$ and $$v$$ are that particle's velocities before and after, using the same sign convention as the momentum equation.\n- Step 2: Impulse is defined as force × time, and by Newton's Second Law applied to one particle, the net force on that particle equals its rate of change of momentum. Integrating over the collision time gives impulse = change in momentum of that particle alone. The total system momentum doesn't change (by PCLM), so the \"total impulse on the system\" from internal forces is zero — but the impulse on each individual particle is non-zero and generally different.\n\nTakeaway: Impulse is a per-particle quantity: $$I = mv - mu$$ for that particle only.", "source": "GLM 5.1 ①", "_
