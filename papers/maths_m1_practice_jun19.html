R$$, opposite direction.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "After a pulling force is removed from a parcel on a rough incline, how do you check whether the parcel stays at rest or slides down? (3 steps)", "answer": "- Step 1: Compute the weight component down the slope: $$mg\\sin\\theta$$. This is what's trying to slide it.\n- Step 2: Compute the maximum static friction available: $$\\mu R = \\mu mg\\cos\\theta$$ (with no pull, $$R = mg\\cos\\theta$$).\n- Step 3: If $$mg\\sin\\theta \\leq \\mu mg\\cos\\theta$$ (i.e. $$\\tan\\theta \\leq \\mu$$), friction can hold it — stays at rest. Otherwise, it slides.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why does the \"stay at rest after pull removed\" criterion reduce to $$\\tan\\theta \\leq \\mu$$, and what's the intuition? (3 steps)", "answer": "- Step 1: Setting weight-down-slope $$=$$ max friction: $$mg\\sin\\theta = \\mu mg\\cos\\theta$$, divide both sides by $$mg\\cos\\theta$$ to get $$\\tan\\theta = \\mu$$.\n- Step 2: The angle $$\\theta = \\arctan\\mu$$ is called the angle of friction — it's the steepest slope on which the surface alone can support the body.\n- Step 3: Intuition: at steeper $$\\theta$$, gravity's pull along the slope grows ($$\\sin$$ increases) while the press into the surface shrinks ($$\\cos$$ decreases), so friction loses the contest.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "Why does Harry insist you *write the equation* on an inclined-plane question, even if your free-body diagram is beautiful? (2 steps)", "answer": "- Step 1: Examiner mark schemes award points for *equations* — that's where the physical reasoning is encoded as algebra. A diagram alone shows you understand geometry but not the dynamics.\n- Step 2: Harry: \"In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\" Always commit the resolution to an equation.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why is it good practice to write $$F = \\mu R$$ on its own line in an inclined-plane working, even though you could substitute directly? (2 steps)", "answer": "- Step 1: There is typically a *separate mark* in the scheme for stating the friction relation explicitly.\n- Step 2: Substituting directly may still get the final answer right, but you risk losing the \"stated friction\" mark and obscure your reasoning. Cheap insurance for one mark.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Two particles approach each other on a smooth surface. After they collide, can you tell whether their post-collision speeds satisfy any inequality without knowing the masses precisely? (3 steps)", "answer": "- Step 1: Energy considerations: kinetic energy can be conserved (elastic) or lost (inelastic). It is never gained in a passive collision.\n- Step 2: So $$\\tfrac{1}{2}m_A v_A^2 + \\tfrac{1}{2}m_B v_B^2 \\leq \\tfrac{1}{2}m_A u_A^2 + \\tfrac{1}{2}m_B u_B^2$$.\n- Step 3: But you cannot easily bound individual speeds without more info — only the *combined* kinetic energy. This is why M1 collisions need an extra given (like \"speed difference is $$1$$\") to close the system.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "In a collision question, why is drawing a \"before\" and \"after\" diagram with arrows for velocities so heavily emphasised? (3 steps)", "answer": "- Step 1: Mechanics is full of sign conventions. The diagram forces you to commit to which direction is positive and to label each velocity (before/after) clearly.\n- Step 2: It prevents the common error of writing $$u_B = +1.5$$ when $$B$$ actually moves in the negative direction.\n- Step 3: It also makes the \"unchanged direction\" or \"rebound\" clause visually obvious — you can see if your post-collision arrow points the right way.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Drill: Particle $$A$$ of mass $$4m$$ moves at $$2$$ m/s, collides directly with $$B$$ of mass $$m$$ moving at $$3$$ m/s in the opposite direction. After collision $$A$$'s direction is unchanged and $$B$$ moves at $$1$$ m/s in $$A$$'s direction. Conceptually outline how to find $$v_A$$ after. (3 steps)", "answer": "- Step 1: Pick $$A$$'s direction as $$+$$. Then $$u_A = +2$$, $$u_B = -3$$, and after-collision $$v_B = +1$$.\n- Step 2: Apply PCLM: $$4m(2) + m(-3) = 4m\\,v_A + m(1)$$, i.e. $$5m = 4m\\,v_A + m$$.\n- Step 3: Solve: $$4m\\,v_A = 4m \\Rightarrow v_A = 1$$ m/s. The answer is small because $$B$$ took some momentum forward, leaving $$A$$ slower than before.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Drill: Same setup as Q39. Conceptually outline how to find the magnitude of the impulse on $$B$$. (2 steps)", "answer": "- Step 1: Impulse on $$B$$ = change in $$B$$'s momentum = $$m v_B - m u_B = m(1) - m(-3) = 4m$$ (signed, but already positive).\n- Step 2: Magnitude is $$4m$$ N·s. The impulse is *positive* in the chosen direction, consistent with $$B$$ having been pushed forward by the collision.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Drill: A car accelerates from rest to $$24$$ m/s in $$10$$ s, cruises for $$T$$ s, then decelerates to rest in $$6$$ s, covering $$900$$ m total. Conceptually outline how to find $$T$$ using the trapezium. (3 steps)", "answer": "- Step 1: The v-t graph is a trapezium with top length $$T$$ (cruise duration) and bottom length $$T + 16$$ (total time, $$10 + T + 6$$). Height $$= 24$$.\n- Step 2: Area = distance: $$\\tfrac{1}{2}(T + (T + 16))(24) = 900$$, so $$12(2T + 16) = 900$$.\n- Step 3: $$2T + 16 = 75 \\Rightarrow T = 29.5$$ s. Sanity check: cruise dominates the distance, which makes sense at $$24$$ m/s for $$\\sim 30$$ s.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Drill: A uniform plank of length $$4$$ m, weight $$200$$ N, rests on supports at $$0.5$$ m from each end. A child stands at the right end. As the child's weight increases, the plank is about to tilt about the right support. Conceptually outline how to find the critical weight $$C$$. (3 steps)", "answer": "- Step 1: \"About to tilt about $$S$$ (right support)\" means the left support's reaction $$R_R = 0$$. Take moments about $$S$$ to eliminate $$R_S$$ as well.\n- Step 2: The plank is uniform, so its weight $$200$$ N acts at the midpoint, $$2$$ m from either end, which is $$1.5$$ m from $$S$$ (since $$S$$ is $$0.5$$ m from the right end). The child at the right end is $$0.5$$ m from $$S$$.\n- Step 3: Clockwise (child) = anticlockwise (plank weight): $$C \\times 0.5 = 200 \\times 1.5 \\Rightarrow C = 600$$ N. The child must outweigh the plank by 3:1 to start tipping — sensible because the child has a shorter lever arm.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Drill: A $$5$$ kg block on a slope at $$20°$$, $$\\mu = 0.25$$, held by force $$P$$ along the slope, on the point of sliding *up*. Conceptually outline the force-balance argument for $$P$$. (3 steps)", "answer": "- Step 1: Perpendicular balance: $$R = 5g\\cos 20°$$. (No perpendicular component from $$P$$ since $$P$$ acts along the slope.)\n- Step 2: On the point of sliding *up* $$\\Rightarrow$$ friction is at maximum and points *down* the slope: $$F = \\mu R = 0.25 \\times 5g\\cos 20°$$.\n- Step 3: Parallel equilibrium (no acceleration yet — \"on the point of\"): $$P = 5g\\sin 20° + F$$. Both gravity's slope component AND friction oppose the upward motion, so $$P$$ must exceed both summed.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Why, in the inclined plane drill above, does friction *add* to $$5g\\sin 20°$$ rather than subtract from $$P$$? Compare to the \"on the point of sliding *down*\" case. (3 steps)", "answer": "- Step 1: Friction opposes the impending motion. Sliding *up* $$\\Rightarrow$$ friction acts *down* the slope $$\\Rightarrow$$ friction joins gravity in opposing $$P$$.\n- Step 2: For sliding down: friction acts *up* the slope, helping $$P$$ (or replacing the need for $$P$$ entirely if $$\\mu \\geq \\tan\\theta$$).\n- Step 3: This sign-flip is why \"on the point of moving up\" vs \"on the point of moving down\" can give very different required forces for the same slope.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why is \"labelling your answers\" (e.g. \"speed of $$A$$\", \"speed of $$B$$\") more than a cosmetic step in M1? (2 steps)", "answer": "- Step 1: Examiners follow your working in order. Two numbers at the bottom of the page (say $$\\tfrac{1}{2}$$ and $$\\tfrac{3}{2}$$) without labels could mean either assignment to $$A$$ and $$B$$ — you've left them to guess.\n- Step 2: A wrong (or ambiguous) labelling can cost the final mark even if both numbers are correct. Always write \"speed of $$A = \\tfrac{1}{2}$$ m/s\" explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Synthesis: Consider a single problem where a particle slides up an incline, decelerates due to friction and gravity, then collides directly with a stationary particle at the top. What three M1 toolkits are involved and in what order? (3 steps)", "answer": "- Step 1: *Inclined plane resolving* — set up perpendicular ($$R = mg\\cos\\theta$$) and parallel ($$ma = -(mg\\sin\\theta + \\mu R)$$) equations to find deceleration along the slope.\n- Step 2: *SUVAT* — use the deceleration plus initial speed to find the speed just before collision (e.g. $$v^2 = u^2 + 2as$$).\n- Step 3: *Collision (PCLM)* — apply conservation of momentum at the collision instant using that pre-collision speed. The combination tests whether you can hand off variables cleanly between subsystems.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Synthesis: in an \"on the point of tilting\" moments problem with two scenarios (one tilt about each support), why are you guaranteed *two* independent equations in the two unknowns ($$W$$ and $$x$$)? (3 steps)", "answer": "- Step 1: Each \"on the point of tilting\" scenario kills one reaction (the lifting one). Taking moments about the *remaining* support kills the other reaction.\n- Step 2: What's left in each equation is just the external loads and the weight $$W$$ at distance involving $$x$$ — two unknowns.\n- Step 3: Two scenarios $$\\Rightarrow$$ two equations $$\\Rightarrow$$ a system solvable for $$W$$ and $$x$$. The \"divide one by the other\" trick works because both equations are linear in $$W$$.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Counterexample/edge case: if a v-t graph trapezium degenerates to a triangle (no cruise phase), does $$\\tfrac{1}{2}(a+b)h$$ still work? (2 steps)", "answer": "- Step 1: A triangle is a trapezium with one parallel side of length $$0$$ (the \"top\"). The formula gives $$\\tfrac{1}{2}(0 + b)h = \\tfrac{1}{2}bh$$ — exactly the triangle area formula.\n- Step 2: So yes, the trapezium formula is the general one; the triangle is a special case. No need to memorise a separate formula.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Misconception probe: a student writes \"$$F = \\mu R$$\" automatically for a stationary block. When is this wrong? (3 steps)", "answer": "- Step 1: $$F = \\mu R$$ is the *maximum* (limiting) friction, used when the body is moving or on the verge of moving.\n- Step 2: For a truly stationary block not on the verge of slipping, the actual friction is whatever value balances the other forces — it might be much less than $$\\mu R$$.\n- Step 3: Writing $$F = \\mu R$$ in such cases overestimates friction and can give wrong forces (e.g. claiming a block needs a bigger push than it actually does).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Misconception probe: a student forgets to label the positive direction in a momentum problem and writes $$u_A = 1.5$$, $$u_B = 1.5$$ (both positive because both have speed $$1.5$$). What goes wrong? (3 steps)", "answer": "- Step 1: PCLM is a vector statement applied along a chosen axis. Both speeds being \"positive\" in the sense of being magnitudes is fine, but the *signed* velocities must reflect direction.\n- Step 2: With both $$u$$'s positive, you'd compute total initial momentum as $$(3m)(1.5) + (m)(1.5) = 6m$$, but the true value is $$(3m)(1.5) + (m)(-1.5) = 3m$$ (because they approach).\n- Step 3: This corruption propagates: you'd compute $$v_A \\approx 1.4$$ or similar instead of $$\\tfrac{1}{2}$$, and the impulse magnitude would be wildly off.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Misconception probe: a student takes moments and writes \"anticlockwise moments = $$0$$\" then sets clockwise = anticlockwise. What's the algebraic redundancy/error risk? (2 steps)", "answer": "- Step 1: Equilibrium says *net* moment is zero, i.e. clockwise sum = anticlockwise sum. Writing \"anticlockwise = 0\" alone is only true if there are no anticlockwise moments.\n- Step 2: If you mean \"sum of all signed moments = 0\" but use loose wording, you may end up subtracting when you meant to equate. Stick to \"clockwise sum = anticlockwise sum\" as two positive sums equal to each other.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Why, on a moments equation involving weights, can you \"cancel $$g$$\" through both sides — and when can you not? (3 steps)", "answer": "- Step 1: If every term on both sides is a force of the form $$(\\text{mass}) \\cdot g \\cdot (\\text{distance})$$, then $$g$$ appears as a common factor and divides out cleanly.\n- Step 2: You *cannot* cancel $$g$$ if some terms are forces directly in newtons (not derived from a mass × $$g$$). For instance, a $$150$$ N applied force doesn't have $$g$$ to cancel.\n- Step 3: Mixing \"$$Wx$$\" (a force-times-distance) with \"$$mg \\cdot x$$\" (also force-times-distance, with $$g$$ explicit) requires consistency. Better to keep all quantities as forces (in N) throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Limit case: what happens to the required pulling force $$P$$ on a rough incline as $$\\theta \\to 0$$? As $$\\theta \\to 90°$$? (3 steps)", "answer": "- Step 1: As $$\\theta \\to 0$$ (flat surface): $$mg\\sin\\theta \\to 0$$ (no gravity component along surface), $$R \\to mg$$ (full weight on surface), so $$P \\to \\mu mg$$ — just overcome friction.\n- Step 2: As $$\\theta \\to 90°$$ (vertical wall): $$mg\\sin\\theta \\to mg$$, but $$R \\to 0$$ (no normal force from a wall under just gravity), so friction $$\\to 0$$. $$P \\to mg$$ — must support full weight directly.\n- Step 3: In between, both gravity-along-slope and friction contribute, with a maximum total force at intermediate angles depending on $$\\mu$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Synthesis: in the train v-t problem, suppose the deceleration were equal to the acceleration (not half). How would the trapezium and the distance equation change? (3 steps)", "answer": "- Step 1: If decel = accel in magnitude, the down-phase has the same gradient steepness as the up-phase. Same speed change ($$20$$ to $$0$$) at same gradient $$\\Rightarrow$$ same time $$T$$.\n- Step 2: Total time = $$T + 180 + T = 2T + 180$$. The trapezium would be *symmetric*.\n- Step 3: Distance equation becomes $$\\tfrac{1}{2}(180 + (2T + 180))(20) = 4800$$, giving $$10(2T + 360) = 4800$$, so $$T = 60$$. Larger $$T$$ because the deceleration phase is shorter, leaving less total distance covered passively.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}], "count": 54}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why does \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" translate to a modulus inequality rather than a one-sided inequality? (3 steps)", "answer": "- Step 1: The word \"difference\" describes the *size of the gap* between two quantities, not which is larger. We are not told whether $$2\\sqrt{n} > 7$$ or $$2\\sqrt{n} < 7$$, so the gap could go in either direction.\n- Step 2: \"Size of a gap\" is exactly what modulus captures: $$|A - B|$$ gives a non-negative measure of how far apart $$A$$ and $$B$$ are, regardless of sign.\n- Step 3: So \"difference $$< 1$$\" becomes $$|2\\sqrt{n} - 7| < 1$$, which is a single statement encoding both possibilities at once.\n\nThe clue word for a modulus is always \"difference\" or \"distance\" — language that ignores direction.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is rewriting $$|X| < k$$ as the chain $$-k < X < k$$ generally cleaner than splitting into two separate inequalities? (3 steps)", "answer": "- Step 1: Splitting gives two inequalities $$X < k$$ and $$-(X) < k$$, which you then have to solve separately and intersect — easy to mishandle signs when negating.\n- Step 2: The chain $$-k < X < k$$ keeps everything in one line, and any algebraic operation (add, subtract, multiply by a positive) is applied to all three parts simultaneously.\n- Step 3: Visually, $$-k < X < k$$ matches the number line picture — $$X$$ sits between two endpoints — which is the geometric meaning of $$|X| < k$$.\n\nOne operation, one line, fewer sign errors.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "When solving an inequality chain like $$3 < \\sqrt{n} < 4$$ by squaring, why is it safe here but not always? (2 steps)", "answer": "- Step 1: Squaring preserves an inequality only when both sides have the same sign. Here all three parts are positive (since $$\\sqrt{n} \\geq 0$$), so squaring preserves order: $$9 < n < 16$$.\n- Step 2: If a chain involved negatives — e.g. $$-3 < x < 2$$ — squaring would flip relationships because squaring is not monotonic across zero. Always check the sign of each side before squaring.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why does counting integers strictly between $$9$$ and $$16$$ give $$6$$, not $$7$$ or $$5$$? (3 steps)", "answer": "- Step 1: \"Strictly between\" excludes the endpoints 9 and 16, so the integers are $$\\{10, 11, 12, 13, 14, 15\\}$$.\n- Step 2: The general count of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$. So from 10 to 15 inclusive: $$15 - 10 + 1 = 6$$.\n- Step 3: Common slips:\n+ $$15 - 10 = 5$$ forgets the \"+1\" — classic off-by-one.\n+ $$16 - 9 = 7$$ uses the original excluded endpoints — wrong because they're excluded.\n\nAlways draw the number line to make endpoint inclusion/exclusion visible.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "State the principle of conservation of linear momentum for a direct collision between two particles, and explain why the choice of positive direction matters. (3 steps)", "answer": "- Step 1: For two particles colliding on a smooth surface with no external impulse, total momentum before equals total momentum after: $$m_A u_A + m_B u_B = m_A v_A + m_B v_B$$.\n- Step 2: Velocity is a *signed* quantity — it carries direction. So if you fix \"to the right\" as positive, any particle moving left enters the equation with a negative velocity.\n- Step 3: Why this matters:\n+ Using the wrong sign on a pre-collision velocity changes the total momentum, and your answer collapses.\n+ You must keep the *same* positive convention for every term in the equation and for the impulse calculation that follows.\n\nThe physics is direction-aware; the equation is just bookkeeping that respects that.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "In a head-on collision where two particles approach each other, why must one initial velocity be entered as negative in the momentum equation? (2 steps)", "answer": "- Step 1: \"Head-on\" means they move in opposite directions. Momentum is a vector, so opposite directions get opposite signs in a 1D treatment.\n- Step 2: If you take particle $$A$$'s initial direction as positive, then particle $$B$$ — moving the opposite way — must have its initial velocity entered as $$-u_B$$. Otherwise you'd be modelling them moving the *same* way, which is geometrically wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "What does \"the direction of motion of A is unchanged after the collision\" tell you about the sign of A's post-collision velocity? (2 steps)", "answer": "- Step 1: If you took A's initial direction as positive, \"unchanged direction\" means A still moves in the positive direction after, so $$v_A > 0$$.\n- Step 2: This is a constraint, not a calculation. It rules out solutions where A would bounce back; if your algebra gives a negative $$v_A$$, something is wrong with your setup or B *must* be the one that rebounds.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Define impulse and explain why its formula $$I = mv - mu$$ is just Newton's second law in disguise. (3 steps)", "answer": "- Step 1: Impulse is the change in momentum of a particle: $$I = mv - mu$$, measured in $$\\text{N s}$$.\n- Step 2: Newton's second law in the form $$F = \\frac{d(mv)}{dt}$$ rearranges to $$F\\,dt = d(mv)$$. Integrating over the collision interval: $$\\int F\\,dt = mv - mu$$, and the left side is the definition of impulse.\n- Step 3: So impulse measures \"how much momentum a force delivered\" during the (short, possibly violent) interaction — without needing to know the force or duration separately.\n\nIt's the bridge between instantaneous forces and net momentum change.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Why does \"magnitude of the impulse\" mean your final answer must be a positive number, with no minus sign or modulus bars? (3 steps)", "answer": "- Step 1: Magnitude is the size of a vector — always non-negative by definition.\n- Step 2: Your raw calculation $$I = mv - mu$$ may yield a negative value, simply meaning the impulse points opposite to your chosen positive direction.\n- Step 3: To report the magnitude:\n+ Drop the sign and write a positive value.\n+ Don't leave modulus bars around it — the bars indicate the operation; the answer is the result of the operation.\n\nA negative final magnitude loses marks because it contradicts the definition.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "In a 1D collision, particle A (mass $$3m$$) moves at $$+1.5$$ and B (mass $$m$$) moves at $$-1.5$$. After collision, A's direction is unchanged and the speed difference between A and B is 1 m/s. Why must B's post-collision speed be $$v_A + 1$$ and not $$v_A - 1$$? (3 steps)", "answer": "- Step 1: Since A's direction is unchanged (still positive), and momentum must be conserved with B originally going the other way, B must rebound — so B's post-collision velocity is also positive.\n- Step 2: Physically, the lighter particle B (struck by the heavier A) rebounds *faster* than A continues — A loses speed while B reverses with a larger magnitude.\n- Step 3: So $$\\text{speed of }B > \\text{speed of }A$$, meaning the difference $$v_B - v_A = +1$$, giving $$v_B = v_A + 1$$. Choosing $$v_A - 1$$ would give B a smaller speed than A, which is inconsistent with the physics of a lighter particle bouncing off a heavier one.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why is it essential to *label* numerical answers (\"speed of A = ...\", \"speed of B = ...\") in an M1 collision question? (2 steps)", "answer": "- Step 1: An examiner sees two bare numbers like \"$$\\tfrac{1}{2}$$\" and \"$$\\tfrac{3}{2}$$\" and cannot tell which belongs to A and which to B. Without labels, the mark may not be awarded even if both are correct.\n- Step 2: Labels also force *you* to check which value corresponds to which particle — a self-correcting habit that catches mix-ups before they cost marks.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why is the area under a speed–time graph equal to distance travelled? (3 steps)", "answer": "- Step 1: For constant speed $$v$$ over time $$\\Delta t$$, distance is $$v \\cdot \\Delta t$$ — geometrically a rectangle on the $$v$$–$$t$$ graph.\n- Step 2: For varying speed, slice the motion into infinitesimal strips of width $$dt$$ and height $$v(t)$$. Each strip contributes $$v(t)\\,dt$$ to the distance.\n- Step 3: Summing (integrating) all strips gives total distance $$= \\int v(t)\\,dt =$$ area under the curve. So area always carries units of (speed × time) = distance, regardless of shape.\n\nThis is why trapezia, triangles, and rectangles on $$v$$–$$t$$ graphs *all* directly give distances.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "State the trapezium area formula and explain why $$\\tfrac{1}{2}$$ is the most-forgotten part. (3 steps)", "answer": "- Step 1: $$\\text{Area} = \\tfrac{1}{2}(a + b)h$$, where $$a, b$$ are the parallel sides and $$h$$ is the perpendicular distance between them.\n- Step 2: The intuition: a trapezium's area equals a rectangle whose height is the *average* of the two parallel sides, $$\\tfrac{a+b}{2}$$, times the width $$h$$.\n- Step 3: Students who forget the $$\\tfrac{1}{2}$$ compute $$(a+b)h$$, which double-counts and gives roughly twice the true area. Memorising the formula as \"average of parallels, times height\" makes the half automatic.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why is using the trapezium formula faster and safer than decomposing a $$v$$–$$t$$ graph into a triangle + rectangle + triangle? (3 steps)", "answer": "- Step 1: Decomposition requires three separate area calculations, each with its own base and height — three opportunities for arithmetic or labelling slips.\n- Step 2: It also requires you to read off intermediate $$t$$-coordinates (the corners of each shape), which is where the \"where do I measure from?\" mistake creeps in.\n- Step 3: One trapezium formula needs only three numbers — top, bottom, height — and one calculator entry. Fewer steps, fewer errors, less time.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A train accelerates from rest for $$T$$ seconds to $$20$$ m/s, holds that speed for $$180$$ s, then decelerates to rest. If the magnitude of acceleration is twice the magnitude of deceleration, why does the deceleration phase last $$2T$$? (3 steps)", "answer": "- Step 1: On a $$v$$–$$t$$ graph, acceleration is the *gradient* of the line. Both phases start/end at speeds 0 and 20, so the speed change has the same magnitude.\n- Step 2: Gradient = (change in speed) / (time). If acceleration's gradient is twice the deceleration's gradient (in magnitude), then for the same speed change, the deceleration's time must be twice as long.\n- Step 3: Formally: $$\\frac{20}{T_{\\text{acc}}} = 2 \\cdot \\frac{20}{T_{\\text{dec}}} \\implies T_{\\text{dec}} = 2 T_{\\text{acc}} = 2T$$. Geometrically, halving the steepness doubles the run for the same rise.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "On a $$v$$–$$t$$ graph with an acceleration phase of duration $$T$$, a constant phase of $$180$$ s, and a deceleration phase of $$2T$$, why is the time at the end of the constant phase $$T + 180$$, not just $$180$$? (2 steps)", "answer": "- Step 1: The constant phase *starts* at time $$T$$ (when acceleration ends), not at time 0. The 180 s is its *duration*, not its end-point.\n- Step 2: So end of constant phase = start + duration = $$T + 180$$. Treating \"180\" as the end coordinate is a reference-point error — the clock didn't start at zero for that phase.\n\nIf you misplace this marker, every subsequent area calculation is wrong — \"the whole thing snowballs.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Why is converting $$4.8$$ km to $$4800$$ m a critical step in a $$v$$–$$t$$ graph distance equation? (2 steps)", "answer": "- Step 1: Speeds in M1 are typically in m/s, and times in seconds. So the area (= distance) comes out in metres. If the problem gives distance in km, the units don't match what your formula produces.\n- Step 2: Solving $$4.8 = \\tfrac{1}{2}(\\ldots)(20)$$ instead of $$4800 = \\tfrac{1}{2}(\\ldots)(20)$$ gives an answer 1000× too small. Always check units match *before* substituting.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "On a $$v$$–$$t$$ graph, why does the gradient of the line equal the acceleration? (2 steps)", "answer": "- Step 1: Acceleration is defined as rate of change of velocity: $$a = \\frac{\\Delta v}{\\Delta t}$$.\n- Step 2: On a $$v$$–$$t$$ graph, \"rise\" is $$\\Delta v$$ and \"run\" is $$\\Delta t$$, so the gradient $$\\frac{\\text{rise}}{\\text{run}}$$ *is* $$\\frac{\\Delta v}{\\Delta t} = a$$. A straight line means constant gradient, hence constant (uniform) acceleration.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A car accelerates from rest to $$24$$ m/s in $$10$$ s, holds for $$T$$ seconds, decelerates to rest in $$6$$ s, covering $$900$$ m total. Conceptually outline how to find $$T$$ without doing heavy arithmetic. (3 steps)", "answer": "- Step 1: The graph is a trapezium with parallel sides: top = $$T$$ (constant phase), bottom = total time = $$10 + T + 6 = T + 16$$. Height = peak speed = 24.\n- Step 2: Area equation: $$\\tfrac{1}{2}(T + (T+16))(24) = 900$$, i.e. distance equals trapezium area.\n- Step 3: Simplifying: the average of the parallels is $$(T + 8)$$, times $$24$$, equals $$900$$. So $$T + 8 \\approx 37.5$$, giving $$T \\approx 29.5$$ s. The mental model: distance / peak-speed = average duration; average duration minus mid-offset gives $$T$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Define the moment of a force about a point, and explain why the perpendicular distance — not just any distance — is what matters. (3 steps)", "answer": "- Step 1: The moment of a force $$F$$ about a point $$P$$ is $$F \\times d$$, where $$d$$ is the *perpendicular* distance from $$P$$ to the line of action of $$F$$.\n- Step 2: Only the component of the force perpendicular to the position arm contributes to rotation. The parallel component pulls along the arm and produces no twisting effect.\n- Step 3: Equivalently: extend the force's line of action; drop a perpendicular from the pivot onto that line; the length of that perpendicular is $$d$$. Using a slanted distance overcounts because it includes a non-rotating component.\n\nUnits: $$\\text{N m}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "State the rotational equilibrium condition for a rigid body and explain why it must hold about *any* chosen point. (3 steps)", "answer": "- Step 1: For a rigid body in equilibrium: $$\\sum(\\text{clockwise moments}) = \\sum(\\text{anticlockwise moments})$$ about any chosen point.\n- Step 2: If the body isn't rotating about one point, it isn't rotating about any point — equilibrium is a property of the whole body, not of a pivot choice.\n- Step 3: This freedom is *strategic*: choose the pivot at an unknown force's line of action so that force contributes zero moment and drops out of the equation. The clever pivot choice is what turns a hard system into a one-line solve.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does a force whose line of action passes through your chosen pivot point have zero moment about that pivot? (2 steps)", "answer": "- Step 1: Moment = force × perpendicular distance from pivot to line of action. If the line of action passes *through* the pivot, that perpendicular distance is zero.\n- Step 2: $$F \\times 0 = 0$$, so the force contributes nothing to the moments equation. This is why choosing the pivot at an unknown reaction (e.g. $$R_C$$) eliminates that unknown for free.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What does \"the rod is on the point of tilting about $$C$$\" physically mean, and what does it imply about the reaction at the other support? (3 steps)", "answer": "- Step 1: \"On the point of tilting about $$C$$\" means the rod is *just about* to rotate about $$C$$, with the rest of the rod lifting off any other support.\n- Step 2: If support $$D$$ is on the side that's lifting, then $$D$$ is just losing contact with the rod — so the reaction $$R_D = 0$$ at that critical moment.\n- Step 3: This converts an ambiguous statics problem (two unknown reactions) into a solvable moments equation: with $$R_D = 0$$, only $$R_C$$ and the known forces remain, and choosing $$C$$ as pivot eliminates $$R_C$$ as well.\n\nThe key phrase always sets the *lifting* support's reaction to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why is it cleaner to write \"clockwise moments = anticlockwise moments\" rather than \"sum of all moments = 0\"? (3 steps)", "answer": "- Step 1: The \"sum = 0\" approach requires assigning a sign to each moment (clockwise negative, anticlockwise positive, say). Sign-tracking with multiple forces invites errors.\n- Step 2: The \"CW = ACW\" approach groups all rotation-direction terms on their respective sides as positive quantities — you only need to identify *which way* each force tries to rotate the body.\n- Step 3: Result: no negative numbers floating around, no risk of sign flips when rearranging. Phuc's live sign error in Q4 vanished the moment he switched to this style.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "When taking moments on a rod supported at two points with weight $$W$$ acting at a distance $$x$$ from support $$C$$, why must you take moments about a specific pivot rather than a \"convenient\" point? (3 steps)", "answer": "- Step 1: Every term in the moments equation is \"force × distance *from the pivot*.\" Distances change depending on which point you pick.\n- Step 2: If you take moments about $$D$$ but mistakenly use distances measured from $$C$$ (or from $$A$$), every term is wrong — even forces with correct magnitudes get the wrong moment.\n- Step 3: Strategy: pick the pivot first, then for *every* force compute its perpendicular distance *from that specific pivot*. This is also why labelling distances on your diagram next to the chosen pivot prevents mix-ups.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A rod of length 1.5 m has supports at $$C$$ (0.24 m from end $$A$$) and $$D$$ (0.36 m from end $$B$$). The centre of mass is at distance $$x$$ from $$C$$. When taking moments about $$D$$, what is the distance from $$D$$ to the centre of mass, and why? (3 steps)", "answer": "- Step 1: Measure positions from $$A$$: $$C$$ is at 0.24, centre of mass is at $$0.24 + x$$, $$D$$ is at $$1.5 - 0.36 = 1.14$$.\n- Step 2: Distance from $$D$$ to centre of mass = $$1.14 - (0.24 + x) = 0.9 - x$$ (taking the centre of mass as being between $$C$$ and $$D$$).\n- Step 3: A common slip is writing the distance as $$x$$ (the centre-of-mass-to-$$C$$ distance) when the pivot is $$D$$. Each pivot has its own distance — recompute, don't reuse.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Two moments equations from a tilting problem are $$Wx = 189$$ and $$W(0.9 - x) = 81$$. Why is *dividing* the equations smarter than *substituting*? (3 steps)", "answer": "- Step 1: Both equations contain $$W$$ as a factor. Dividing equation (A) by equation (B) cancels $$W$$ in one step: $$\\frac{Wx}{W(0.9-x)} = \\frac{189}{81}$$.\n- Step 2: This reduces the system to a single equation in $$x$$ alone: $$\\frac{x}{0.9 - x} = \\frac{189}{81}$$, which solves directly.\n- Step 3: Substitution would require solving (A) for $$W$$ as a function of $$x$$, plugging into (B), and simplifying — more steps, more algebra, more error opportunities. Whenever two equations share a multiplicative factor, divide.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "On a moments diagram, why is it good practice to draw reaction arrows pointing *out of* the rod (away from it) rather than into it? (2 steps)", "answer": "- Step 1: A support pushes the rod upward (or outward), so the physical reaction force on the rod points away from the support and into the rod's body — visually represented as an arrow emerging from the rod.\n- Step 2: Drawing arrows out of the rod makes it visually obvious that these are forces *on the rod*, not forces *on the support*. This avoids the common confusion of double-counting directions or treating reactions as downward forces.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A rod weighing $$W$$ rests on two supports. When you take moments about a pivot, why does the reaction at that pivot contribute zero — and what does this strategically allow you to do? (3 steps)", "answer": "- Step 1: The reaction at the pivot has its line of action passing through the pivot, so its perpendicular distance is zero and its moment is zero.\n- Step 2: This eliminates one unknown without needing extra equations. You can solve a moments equation containing only the remaining forces.\n- Step 3: Strategy: if you have two unknown reactions, taking moments about one pivot eliminates that reaction. If \"on the point of tilting\" makes the other reaction zero, then taking moments about *that* pivot eliminates the only remaining reaction — leaving an equation purely in $$W$$ and geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "A uniform plank of length 4 m and weight 200 N rests on supports at $$R$$ (0.5 m from $$P$$) and $$S$$ (0.5 m from $$Q$$). A child stands at end $$Q$$. As the child's weight grows, the plank is on the point of tilting about $$S$$. Conceptually, why does taking moments about $$S$$ give the child's weight directly? (3 steps)", "answer": "- Step 1: \"On the point of tilting about $$S$$\" means $$R_R = 0$$ (support at $$R$$ is about to lift). Taking moments about $$S$$ also kills $$R_S$$ — eliminating both reactions.\n- Step 2: Remaining forces: the plank's weight at the centre (1.5 m from $$S$$, on one side) and the child's weight at $$Q$$ (0.5 m from $$S$$, on the other side). These produce opposite-direction moments.\n- Step 3: Balance: $$C \\times 0.5 = 200 \\times 1.5 \\implies C = 600$$ N. The child has to be heavy because the plank's weight has a long lever arm — a small child-arm needs a big child-force to match.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why must you resolve forces *perpendicular* and *parallel* to an inclined plane, rather than horizontally and vertically? (3 steps)", "answer": "- Step 1: The constraint of motion is along the slope: the particle accelerates *along* the slope, and is constrained *perpendicular* to it (no motion into or out of the plane).\n- Step 2: Choosing axes aligned with the slope means acceleration appears in only one component (parallel), and the normal reaction acts purely along the perpendicular axis — equations decouple cleanly.\n- Step 3: Using horizontal/vertical axes mixes acceleration across both components and forces $$R$$ to appear in both equations, doubling the algebra and obscuring the physics. Aligning axes with the motion is the standard mechanics trick.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "On an inclined plane at angle $$\\theta$$ to the horizontal, the weight $$mg$$ acts vertically downward. Why does it split into $$mg\\sin\\theta$$ along the slope and $$mg\\cos\\theta$$ perpendicular to the slope (rather than the other way round)? (3 steps)", "answer": "- Step 1: Imagine $$\\theta = 0$$ (flat ground): the weight should be entirely perpendicular (pressing into the ground) with zero component along the surface. Check: $$\\cos 0 = 1$$ (perpendicular gets all the weight); $$\\sin 0 = 0$$ (no slope component). ✓\n- Step 2: Imagine $$\\theta = 90°$$ (vertical wall): the weight should be entirely along the surface (down the wall), with zero pressing into the wall. Check: $$\\sin 90° = 1$$ (slope component takes all); $$\\cos 90° = 0$$ (no perpendicular). ✓\n- Step 3: The pairing is: perpendicular gets $$\\cos\\theta$$, parallel-down-slope gets $$\\sin\\theta$$. These limiting cases lock the formula in memory better than rote.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "A force of magnitude $$P$$ acts on a particle at an inclined plane, at angle $$\\alpha$$ to the plane itself (not to the horizontal). How does $$P$$ split into components, and why is this often confused? (3 steps)", "answer": "- Step 1: Since $$\\alpha$$ is measured *from the plane*, the component along the plane is $$P\\cos\\alpha$$ and the component perpendicular to the plane is $$P\\sin\\alpha$$.\n- Step 2: Confusion arises because students automatically use $$\\cos$$ for the \"horizontal-ish\" direction. But what matters is the angle's reference: $$\\cos$$ goes with the direction the angle is measured *from*.\n- Step 3: Mental check: at $$\\alpha = 0$$ (force lies in the plane), all of $$P$$ should be parallel — $$P\\cos 0 = P$$ ✓. At $$\\alpha = 90°$$ (force perpendicular to plane), all of $$P$$ should be perpendicular — $$P\\sin 90° = P$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "When a particle on a rough incline is being pulled up the slope, which direction does friction act, and why? (3 steps)", "answer": "- Step 1: Friction always opposes relative motion (or the tendency to move).\n- Step 2: If the particle moves (or is being pulled) up the slope, the friction force acts *down* the slope.\n- Step 3: A consequence: in the parallel equation, friction adds to gravity's down-slope component as a *resisting* force against the applied force. If the particle were sliding *down* instead, friction would act *up* the slope — same opposing rule, opposite direction.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "State the friction relation $$F = \\mu R$$ and explain precisely when this equation holds (not when it merely approximates). (3 steps)", "answer": "- Step 1: $$F = \\mu R$$ where $$F$$ is the friction force, $$\\mu$$ is the coefficient of friction, and $$R$$ is the normal reaction.\n- Step 2: This is an *equality* only when the body is moving, or on the point of moving (limiting equilibrium). Below this threshold, $$F < \\mu R$$ — friction is whatever it needs to be to prevent motion, up to the maximum $$\\mu R$$.\n- Step 3: So in M1 problems:\n+ \"Moving up/down the slope\" ⇒ use $$F = \\mu R$$.\n+ \"On the point of slipping\" ⇒ use $$F = \\mu R$$.\n+ \"At rest, not on the point of moving\" ⇒ $$F$$ is unknown and $$\\leq \\mu R$$; you can't assume equality.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why is the friction coefficient $$\\mu$$ dimensionless? (2 steps)", "answer": "- Step 1: $$\\mu = F / R$$ is a ratio of two forces; both numerator and denominator have units of newtons.\n- Step 2: Newtons cancel, leaving a pure number. Physically, $$\\mu$$ tells you \"what fraction of the pressing force converts to opposing friction\" — a ratio with no inherent unit.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "When resolving on an incline, why is saying \"the forces are balanced *vertically*\" wrong, even if it's loosely true? (3 steps)", "answer": "- Step 1: \"Vertically\" means in the direction of true vertical (along gravity). On an incline, the particle does *not* sit vertically — and the forces resolved vertically would not all be zero, because there is a horizontal component of normal reaction.\n- Step 2: \"Perpendicular to the plane\" means normal to the slope's surface. In this direction, the particle has no acceleration (it doesn't sink into or fly off the surface), so the perpendicular components *do* balance.\n- Step 3: Using the wrong word leads to the wrong equation (mixing $$\\sin\\theta$$ and $$\\cos\\theta$$ incorrectly). Precision in language tracks precision in physics.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "A particle on an incline is being pulled up by a force whose component along the slope is $$X$$. Why can the friction force on the particle never exceed $$X$$ in this scenario? (3 steps)", "answer": "- Step 1: For the particle to actually move up the slope, the net force along the slope must be non-negative in the up direction. Forces involved: applied component $$+X$$ (up), gravity component (down), friction (down, opposing motion).\n- Step 2: If friction $$F > X$$, then even ignoring gravity, the net force would be downward — the particle couldn't be moving up.\n- Step 3: So $$F \\leq X$$ is a sanity check. If your computed $$F$$ from $$\\mu R$$ exceeds $$X$$, either the particle isn't actually moving up (re-examine assumptions) or there's an algebraic error.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A parcel of mass 2 kg is on a rough incline at $$30°$$, with $$\\mu = 0.3$$, pulled up by an 18 N force at $$40°$$ to the plane. To find acceleration, why do you first write the perpendicular equation, even though acceleration is along the slope? (3 steps)", "answer": "- Step 1: The parallel equation contains the friction force $$F$$. To use $$F = \\mu R$$, you need to know $$R$$.\n- Step 2: $$R$$ is determined by the perpendicular balance: $$R + 18\\sin 40° = 2g\\cos 30°$$, so $$R = 2g\\cos 30° - 18\\sin 40°$$.\n- Step 3: Logical order:\n+ Perpendicular equation → gives $$R$$.\n+ $$F = \\mu R$$ → gives friction.\n+ Parallel equation → gives acceleration.\n\nSkipping straight to the parallel equation leaves friction as an unknown.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "For a particle pulled up an incline by a force at angle $$\\alpha$$ to the plane, why does the perpendicular component of the pulling force *reduce* the normal reaction? (3 steps)", "answer": "- Step 1: The pulling force has a component $$P\\sin\\alpha$$ perpendicular to the plane, pointing *away* from the surface (lifting the particle slightly).\n- Step 2: Gravity presses the particle into the surface with component $$mg\\cos\\theta$$. The normal reaction $$R$$ acts perpendicular away from the surface to balance.\n- Step 3: Force balance perpendicular: $$R + P\\sin\\alpha = mg\\cos\\theta$$, so $$R = mg\\cos\\theta - P\\sin\\alpha$$. The lift partially cancels gravity's press, reducing $$R$$ — and therefore reducing the maximum friction.\n\nA pulling-at-an-angle force makes friction smaller; a pushing-from-above force would make it larger.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "After the 18 N pulling force is removed, a 2 kg parcel sits on a $$30°$$ incline with $$\\mu = 0.3$$. Conceptually, why does the parcel *not* stay at rest, without doing the full numerical comparison? (3 steps)", "answer": "- Step 1: Gravity's down-slope pull is $$2g\\sin 30° = g$$ (a force of about $$9.8$$ N).\n- Step 2: Maximum static friction is at most $$\\mu \\cdot 2g\\cos 30° = 0.3 \\cdot 2g \\cdot \\frac{\\sqrt{3}}{2} \\approx 0.26 \\cdot g$$ (about $$5.1$$ N).\n- Step 3: Since $$\\tan 30° \\approx 0.577 > \\mu = 0.3$$, gravity overpowers friction — the parcel slides down. The compact criterion: a particle stays at rest on an incline iff $$\\tan\\theta \\leq \\mu$$. Here $$\\tan 30° > 0.3$$, so motion is inevitable.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Explain the principle: \"a particle on a rough incline at angle $$\\theta$$ stays at rest iff $$\\tan\\theta \\leq \\mu$$.\" Why does this neat result hold? (3 steps)", "answer": "- Step 1: The driving force along the slope is $$mg\\sin\\theta$$; the maximum friction available is $$\\mu mg\\cos\\theta$$.\n- Step 2: Rest requires friction $$\\geq$$ driving force: $$\\mu mg\\cos\\theta \\geq mg\\sin\\theta$$.\n- Step 3: Dividing both sides by $$mg\\cos\\theta$$ (positive): $$\\mu \\geq \\tan\\theta$$, i.e. $$\\tan\\theta \\leq \\mu$$. Notice $$m$$ and $$g$$ drop out — the criterion depends only on geometry and friction, not on how heavy the particle is.\n\nThis is the \"angle of friction\" idea: the steepest slope a particle can rest on is $$\\arctan\\mu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why does writing weight as \"$$2g$$\" rather than computing $$2 \\times 9.8 = 19.6$$ early on save you time and grief? (3 steps)", "answer": "- Step 1: Keeping $$g$$ as a symbol lets you spot cancellations (e.g. if both sides of a moments equation have $$g$$, it cancels and you never had to multiply).\n- Step 2: Numerical substitutions made too early propagate rounding errors through every subsequent line.\n- Step 3: At the very end, substitute $$g = 9.8$$ once into the final expression. One calculator entry, one rounding step, fewer mistakes.\n\nThis is Harry's \"symbolic until the last step\" principle.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "In M1, why do marks come \"from the equations, not the diagram\"? (3 steps)", "answer": "- Step 1: A free-body diagram shows your understanding of the forces, but examiners cannot award method marks for a diagram alone — there's no equation to mark.\n- Step 2: The mark scheme assigns marks to specific lines: a momentum equation, a moments equation, a friction relation $$F = \\mu R$$, a resolved equation, etc.\n- Step 3: Strategy:\n+ Draw the diagram quickly for *your* clarity.\n+ Then immediately translate each labelled force into an equation, even if you don't finish solving.\n+ Write $$F = \\mu R$$ on its own line — there is typically a mark just for stating it.\n\nEquations are the currency of M1 marks.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "A particle $$A$$ of mass $$4m$$ moving at $$+2$$ m/s collides with a particle $$B$$ of mass $$m$$ moving at $$-3$$ m/s. After: $$A$$ unchanged direction, $$B$$ moves at $$+1$$ m/s. Conceptually outline how to find $$A$$'s post-collision speed and the impulse on $$B$$. (3 steps)", "answer": "- Step 1: Apply conservation of momentum, keeping $$A$$'s direction as positive: $$(4m)(2) + (m)(-3) = (4m)v_A + (m)(1)$$. The LHS is the *net* initial momentum.\n- Step 2: Simplify: $$8m - 3m = 4m v_A + m$$, so $$5m - m = 4m v_A$$, giving $$v_A = 1$$ m/s. The lighter particle B rebounded (negative to positive), so $$A$$ must have slowed considerably.\n- Step 3: Impulse on $$B$$ = change in $$B$$'s momentum: $$m(1) - m(-3) = 4m$$ N s. Magnitude is $$4m$$ (positive). Conceptual check: $$B$$ went from $$-3$$ to $$+1$$ — a velocity change of $$+4$$, multiplied by mass $$m$$, gives impulse $$4m$$. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A uniform rod and a non-uniform rod both rest on two supports. Why does the non-uniform case introduce an *additional* unknown that the uniform case doesn't have? (3 steps)", "answer": "- Step 1: For a uniform rod, the centre of mass is at the geometric midpoint — its position is determined by the length alone.\n- Step 2: For a non-uniform rod, the centre of mass could be anywhere — its position $$x$$ is an unknown to be found.\n- Step 3: So a non-uniform problem typically has two unknowns ($$W$$ and $$x$$) and needs two equations (two scenarios, e.g. two different tilting conditions). A uniform problem has only one unknown ($$W$$) and needs only one equation.\n\nThis is why Q4 needed two tilting scenarios.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Why is it strategically clever to label moments equations explicitly as (A) and (B), boxed? (3 steps)", "answer": "- Step 1: When two equations need to be combined (by division, substitution, or elimination), having clear labels lets you refer to them without rewriting: \"Divide (A) by (B)\" is fast and unambiguous.\n- Step 2: Labelling prevents you from confusing which equation came from which scenario or pivot — a common source of error in multi-part problems.\n- Step 3: This habit scales: in M2, M3, and beyond, you'll routinely manage 3-4 simultaneous equations. Labelling them is a basic engineering hygiene that pays dividends across all of mechanics.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "What is the conceptual difference between *speed* and *velocity* in a 1D collision, and why does the momentum equation use velocity rather than speed? (3 steps)", "answer": "- Step 1: Speed is the magnitude of velocity — always non-negative. Velocity carries direction (positive or negative in 1D).\n- Step 2: Momentum is a vector quantity: $$p = mv$$, where $$v$$ is velocity (signed). Two particles moving towards each other with equal speeds have equal momenta in magnitude but opposite signs, so the total momentum can be small or zero.\n- Step 3: If you mistakenly use speeds (always positive) in $$mu_A + mu_B$$, you'd compute a total that ignores cancellation — and your equation predicts impossible post-collision velocities. Velocity, with signs, is the only way momentum bookkeeping works.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "On a $$v$$–$$t$$ graph, why does the area under a straight line from $$(0,0)$$ to $$(T, V)$$ equal $$\\tfrac{1}{2}VT$$ — and what does this represent physically? (3 steps)", "answer": "- Step 1: The region is a right triangle with base $$T$$ (time) and height $$V$$ (final speed). Area of a triangle = $$\\tfrac{1}{2} \\cdot \\text{base} \\cdot \\text{height} = \\tfrac{1}{2}VT$$.\n- Step 2: Physically, this area represents the distance covered during uniform acceleration from rest to speed $$V$$ over time $$T$$.\n- Step 3: This is consistent with the SUVAT result $$s = \\tfrac{1}{2}(u+v)t$$ with $$u=0$$: $$s = \\tfrac{1}{2}Vt = \\tfrac{1}{2}VT$$. Graph and formula agree because both encode the same averaging idea.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "On a moments problem, why might \"taking moments about $$B$$\" (the end of the rod) be a poor choice compared to taking moments about a support point? (3 steps)", "answer": "- Step 1: Pivot choice should ideally kill an unknown. End-of-rod points usually have no forces acting through them (no support, no pivot), so no unknown is eliminated.\n- Step 2: Taking moments about a support kills that support's reaction (a free unknown elimination), simplifying the equation.\n- Step 3: Worse, pivoting at the wrong end can confuse distance calculations (Phuc's Q4 error: he started with moments about $$B$$ and computed the weight's distance incorrectly as $$1.5 - 0.36 - 0.24 - x$$ with wrong signs). Pivot at a support, not at a corner.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "When a particle moves at constant speed on a $$v$$–$$t$$ graph, why is the area under that segment a *rectangle* and what does this rectangle's area represent? (2 steps)", "answer": "- Step 1: Constant speed means $$v$$ is independent of $$t$$ — the line is horizontal at height $$v$$, forming a rectangle of width $$\\Delta t$$ and height $$v$$.\n- Step 2: Area = $$v \\cdot \\Delta t$$ = (speed) × (time) = distance travelled at that speed. This is the most basic form of \"area under $$v$$-$$t$$ = distance\" and underpins the trapezium method.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Why does the answer \"speed of $$A$$ after collision $$= 2.75$$\" indicate a likely arithmetic slip, and how can you spot the error pattern? (3 steps)", "answer": "- Step 1: In Q2, both particles approach at $$1.5$$ m/s and the post-collision speeds satisfy $$\\text{difference} = 1$$ with $$A$$ unchanged direction. A speed of $$2.75$$ for $$A$$ exceeds its initial $$1.5$$ — but $$A$$ must *lose* speed in the collision (it transferred momentum to $$B$$, which rebounded).\n- Step 2: This violates a physical sanity check: a particle in a perfectly elastic-or-inelastic collision with one moving the opposite way cannot gain speed.\n- Step 3: Trace the error: $$2.75$$ comes from using $$u_A = 4.5$$ (= $$1.5 \\times 3$$, accidentally absorbing the mass into the speed) rather than keeping $$u_A = 1.5$$. Sanity-checking magnitudes catches this before submitting.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Conceptually, why must one carefully separate \"before-collision\" and \"after-collision\" diagrams when applying conservation of momentum? (3 steps)", "answer": "- Step 1: Momentum conservation equates *initial* total momentum to *final* total momentum — two distinct states.\n- Step 2: Mixing them on a single diagram causes velocity-arrow confusion: which arrows are inputs, which are outputs?\n- Step 3: Two clear diagrams force you to:\n+ List masses and initial velocities (with signs) on the \"before\" diagram.\n+ List masses and final velocities (often unknowns labelled $$v_A$$, $$v_B$$) on the \"after\" diagram.\n+ Translate each into one side of the equation, with consistent positive direction.\n\nVisual separation prevents algebraic mixing.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "For a block in *equilibrium* on a rough incline (held by an additional force, not sliding), how does the friction force differ from the moving case, and what constraint replaces $$F = \\mu R$$? (3 steps)", "answer": "- Step 1: In equilibrium (not moving, not on the point of moving), friction takes *whatever value* is needed to prevent motion, up to a maximum. So $$F$$ is unknown — not necessarily $$\\mu R$$.\n- Step 2: The constraint is the inequality $$F \\leq \\mu R$$, not an equality. To find $$F$$, use the parallel-to-slope force balance (zero net force).\n- Step 3: If the problem says \"on the point of sliding\" — *then* $$F = \\mu R$$ exactly. Reading whether the problem says \"moving,\" \"on the point of moving,\" or just \"at rest\" determines whether you use equality or inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "A 5 kg block sits on a $$20°$$ rough plane with $$\\mu = 0.25$$, held by force $$P$$ along the slope. It's on the point of sliding *up*. Conceptually, why is $$P$$ larger than just $$5g\\sin 20°$$? (3 steps)", "answer": "- Step 1: To hold the block stationary against gravity alone, you'd need only $$P = 5g\\sin 20°$$ (matching gravity's down-slope pull).\n- Step 2: But \"on the point of sliding *up*\" means $$P$$ is large enough to be just about to overcome friction *plus* gravity. Since the block is about to move up, friction acts *down* the slope at its maximum value $$\\mu R$$.\n- Step 3: So $$P = 5g\\sin 20° + \\mu \\cdot 5g\\cos 20°$$. The friction term adds an extra $$\\mu R \\approx 11.5$$ N on top of the gravity-balancing $$16.8$$ N, giving $$P \\approx 28.3$$ N. Friction at its maximum is what makes \"on the point of sliding up\" require *more* force than mere equilibrium.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why does the equation $$v^2 = u^2 + 2as$$ work to find the speed at point $$B$$, given speed at $$A$$, acceleration, and distance $$AB$$? (3 steps)", "answer": "- Step 1: $$v^2 = u^2 + 2as$$ is a SUVAT equation valid for constant acceleration along a straight line.\n- Step 2: It avoids time entirely — useful when you know initial speed, acceleration, and distance, but not duration.\n- Step 3: Conceptually, it comes from $$\\tfrac{1}{2}v^2 - \\tfrac{1}{2}u^2 = as$$ (work-energy: change in $$\\tfrac{1}{2}v^2$$ equals acceleration times distance). For uniform acceleration on an incline, this gives the final speed directly from kinematics.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Why is \"underlining key words\" the single most useful first step in any M1 problem? (3 steps)", "answer": "- Step 1: M1 is wordy, and a single word often determines the entire setup: \"magnitude\" (positive only), \"difference\" (modulus), \"unchanged\" (sign constraint), \"on the point of tilting\" (one reaction = 0), \"perpendicular\" (which direction to resolve).\n- Step 2: Underlining forces you to *read* slowly and notice these triggers, rather than skimming and assuming a standard problem type.\n- Step 3: Each underlined word maps to a specific equation, sign convention, or constraint — making translation from English to mathematics systematic rather than guessed.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}], "count": 57}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 11842, "out_tokens": 37118, "reasoning_chars": 88210, "cost_eur": 0.131, "elapsed_s": 594, "content_chars": 50391}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11842, "out_tokens": 30149, "reasoning_chars": 64394, "cost_eur": 0.1085, "elapsed_s": 444, "content_chars": 45814}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 11843, "out_tokens": 14668, "reasoning_chars": 31655, "cost_eur": 0.0587, "elapsed_s": 107, "content_chars": 23896}, "minimax_1": const SK='maths_m1_practice_jun19';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
