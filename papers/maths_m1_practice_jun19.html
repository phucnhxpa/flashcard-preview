impulse on $$B$$ acts in the negative direction (opposite to your chosen positive direction). This is physically meaningful \u2014 it tells you which way the force acted during the collision \u2014 but the question only asks for the size, so you drop the sign.", "source": "GLM 5.1"}, {"q": "State the trapezium area formula. On a speed\u2013time graph, what do the two parallel sides and the height represent physically, and what does the resulting area represent? (2 steps)", "a": "- Step 1: The formula is $$\\text{Area} = \\frac{1}{2}(a + b)h$$, where $$a$$ and $$b$$ are the lengths of the two parallel sides and $$h$$ is the perpendicular distance between them.\n- Step 2: On a speed\u2013time graph, $$a$$ and $$b$$ are the two speeds (the parallel horizontal edges), and $$h$$ is the time interval (the perpendicular distance between them on the time axis). The area has units of $$\\text{m s}^{-1} \\times \\text{s} = \\text{m}$$, so it represents distance travelled. The $$\\frac{1}{2}$$ is the single most-forgotten part \u2014 without it, you overestimate the area.", "source": "GLM 5.1"}, {"q": "A student splits a trapezium on a speed\u2013time graph into two triangles and a rectangle to find the area. Why does Harry recommend against this approach, even though it is mathematically valid? (2 steps)", "a": "- Step 1: The method is valid but slow and error-prone. You must correctly identify the base and height of each triangle and the rectangle, then add three areas. Each piece is a potential arithmetic slip \u2014 wrong base length, wrong height, sign error in addition.\n- Step 2: One trapezium formula $$\\frac{1}{2}(a+b)h$$ replaces all three calculations. It is faster and has fewer places to go wrong. Harry: \"Lots of students break it into two triangles and a rectangle. That's okay, but it's slow and you make little mistakes.\" Memorize the single formula.", "source": "GLM 5.1"}, {"q": "A train accelerates for $$T$$ seconds, travels at constant speed for 3 minutes, then decelerates for $$2T$$ seconds. A student labels the time markers on the horizontal axis as $$T$$, $$180$$, and $$2T$$. What is wrong, and what are the correct markers? (2 steps)", "a": "- Step 1: The student measured the 3-minute phase and the deceleration phase both from time zero, as if they start simultaneously. But the phases are sequential \u2014 each begins where the previous one ends.\n- Step 2: The correct markers are: end of acceleration = $$T$$, end of constant speed = $$T + 180$$, end of deceleration = $$T + 180 + 2T = 3T + 180$$. Each marker is cumulative from the start. Getting the first marker wrong causes the entire trapezium's base length to be wrong \u2014 \"the whole thing snowballs from there.\"", "source": "GLM 5.1"}, {"q": "A distance is given as 4.8 km in a question where speeds are in $$\\text{m s}^{-1}$$ and times in seconds. What conversion must you perform before using the trapezium area formula, and why is forgetting it so costly? (2 steps)", "a": "- Step 1: Convert 4.8 km to 4800 m. The formula $$\\text{Area} = \\frac{1}{2}(a+b)h$$ multiplies speeds (in $$\\text{m s}^{-1}$$) by times (in s), giving metres. If you leave the distance in km, the equation $$4800 = \\ldots$$ becomes $$4.8 = \\ldots$$ and every subsequent value is off by a factor of 1000.\n- Step 2: This is a \"very common mistake\" because the number 4.8 looks reasonable and the student doesn't notice the unit mismatch. The error propagates through the entire calculation \u2014 the value of $$T$$ would be off by a factor of 1000. Always check: if speeds are in $$\\text{m s}^{-1}$$, distances must be in metres.", "source": "GLM 5.1"}, {"q": "Define the moment of a force about a point. What two quantities multiply together, and what is the key geometric condition on the distance? (2 steps)", "a": "- Step 1: The moment of a force about a point is $$\\text{moment} = \\text{force} \\times \\text{perpendicular distance from the point to the line of action of the force}$$.\n- Step 2: The distance must be perpendicular. If the force acts at an angle, you cannot simply use the straight-line distance from the point to where the force is applied \u2014 you must use the perpendicular distance (or equivalently, resolve the force into a component perpendicular to the lever arm). A force whose line of action passes directly through the point has perpendicular distance zero, and therefore zero moment.", "source": "GLM 5.1"}, {"q": "A rigid body is in equilibrium. State the moments equation that must hold. If you take moments about a point where an unknown reaction force acts, what advantage do you gain? (2 steps)", "a": "- Step 1: For equilibrium, about any point: $$\\sum(\\text{clockwise moments}) = \\sum(\\text{anticlockwise moments})$$. This must hold regardless of which point you choose as the pivot.\n- Step 2: If an unknown force (e.g., a reaction $$R_C$$) acts through your chosen pivot point, its perpendicular distance from that pivot is zero, so its moment is zero and it drops out of the equation entirely. This eliminates the unknown for free, without needing a second equation. Choosing the pivot at an unknown force is a deliberate strategy to simplify the algebra.", "source": "GLM 5.1"}, {"q": "A branch rests on two supports $$C$$ and $$D$$. The question says \"the branch is on the point of tilting about $$C$$.\" What does this physically mean, and what does it imply about one of the reaction forces? (2 steps)", "a": "- Step 1: \"On the point of tilting about $$C$$\" means the branch is just about to rotate around $$C$$ \u2014 it is on the verge of lifting off support $$D$$. The branch hasn't lost contact yet, but it's infinitesimally close.\n- Step 2: This implies $$R_D = 0$$. The reaction at $$D$$ is the force that prevents the branch from lifting off. At the exact tipping point, that force has reduced to zero \u2014 any further disturbance and contact is lost. Setting the \"lifting\" reaction to zero is what converts the vague phrase \"on the point of tilting\" into a solvable equation.", "source": "GLM 5.1"}, {"q": "A student takes moments about a point and writes $$\\sum M = 0$$ (summing all moments to zero). Harry recommends instead equating clockwise = anticlockwise directly. Why does this reduce sign errors? (2 steps)", "a": "- Step 1: When summing to zero, you must assign a sign convention (e.g., clockwise positive) and correctly attach a $$+$$ or $$-$$ to every term. It's easy to flip a sign \u2014 especially when a force acts on the \"other side\" of the pivot from where you expect.\n- Step 2: Equating clockwise = anticlockwise eliminates the sign convention entirely. You simply list all forces that create clockwise moments on one side, all forces that create anticlockwise moments on the other, and set the totals equal. Each side is a sum of positive quantities. There are no minus signs to get wrong. Phuc's live sign error vanished once he switched to this approach.", "source": "GLM 5.1"}, {"q": "In a moments problem with two scenarios, you derive equations $$(A): Wx = 189$$ and $$(B): 81 = (0.9 - x)W$$. Both contain the unknown $$W$$. Why is dividing equation $$(A)$$ by equation $$(B)$$ more efficient than substituting for $$W$$? (2 steps)", "a": "- Step 1: Dividing $$(A)/(B)$$: $$\\frac{Wx}{(0.9-x)W} = \\frac{189}{81}$$. The $$W$$ cancels immediately on the left, leaving $$\\frac{x}{0.9-x} = \\frac{189}{81}$$, a single equation in $$x$$ alone. One step, one elimination.\n- Step 2: Substitution would require solving one equation for $$W$$ first (e.g., $$W = 189/x$$ from equation $$(A)$$), then substituting into $$(B)$$: $$81 = (0.9 - x)(189/x)$$. This works but introduces a fraction and more algebra before simplification. Division is cleaner because it exploits the common factor directly. Harry: \"When two equations share a factor, divide them to eliminate that variable \u2014 quicker than substitution.\"", "source": "GLM 5.1"}, {"q": "When drawing reaction forces on a rod resting on supports, Harry says to draw the arrows coming out of the rod (upward). Why is this convention helpful, compared to drawing them pointing downward into the support? (2 steps)", "a": "- Step 1: The reaction force from a support pushes upward on the rod \u2014 it prevents the rod from falling through. Drawing the arrow upward, coming out of the rod at the support point, correctly represents the direction of the force acting on the rod.\n- Step 2: This matters when taking moments. If you draw the arrow in the wrong direction, you may incorrectly classify its moment as clockwise or anticlockwise. An upward force to the right of the pivot creates an anticlockwise moment; a downward force to the right of the pivot creates a clockwise moment. Getting the arrow direction wrong flips the moment direction, which produces the wrong equation.", "source": "GLM 5.1"}, {"q": "A student writes a moments equation mixing \"force \u00d7 distance\" terms with \"mass \u00d7 distance\" terms (e.g., $$W \\times 1.26 + m \\times 0.5 = 0$$). Why is this invalid? (2 steps)", "a": "- Step 1: A moment has units of N m (force \u00d7 distance). If you write $$W \\times 1.26$$, that's force \u00d7 distance = N m (correct, since $$W$$ is already a force in newtons). But if you write $$m \\times 0.5$$, that's mass \u00d7 distance = kg m, which is not a moment \u2014 it's missing the factor of $$g$$.\n- Step 2: The fix: either work entirely in forces (use $$W$$ and $$mg$$) or entirely in masses (cancel $$g$$ throughout the entire equation). You may cancel a common $$g$$ from every term, but you cannot have some terms with $$g$$ and some without. Mixing units gives a dimensionally inconsistent equation that will yield a wrong numerical answer.", "source": "GLM 5.1"}, {"q": "A parcel of mass $$m$$ sits on a plane inclined at angle $$\\theta$$ to the horizontal. Its weight $$mg$$ acts vertically downward. Explain how this single force splits into two components, and state what each component is. (3 steps)", "a": "- Step 1: The weight $$mg$$ is a single vector pointing straight down. We resolve it into two perpendicular directions: parallel to the slope (down the line of greatest slope) and perpendicular to the slope (into the plane).\n- Step 2: The component parallel to the slope (pulling the parcel downhill) is $$mg\\sin\\theta$$. Visualize: as $$\\theta$$ increases toward $$90\u00b0$$, the slope becomes a vertical wall and the full weight pulls straight down \u2014 $$\\sin 90\u00b0 = 1$$ confirms this.\n- Step 3: The component perpendicular to the slope (pressing the parcel into the surface) is $$mg\\cos\\theta$$. Visualize: as $$\\theta$$ approaches $$0\u00b0$$ (flat ground), the full weight presses into the surface \u2014 $$\\cos 0\u00b0 = 1$$ confirms this. These two components are independent; they replace the single weight vector entirely.", "source": "GLM 5.1"}, {"q": "On an inclined plane problem, why must you resolve perpendicular to the plane and parallel to the plane, rather than horizontally and vertically? What goes wrong with the horizontal/vertical approach? (2 steps)", "a": "- Step 1: The constraint is that the parcel cannot accelerate through the plane \u2014 it can only move along the surface. This means acceleration is zero perpendicular to the plane (balanced) and potentially non-zero along the plane ($$F = ma$$). Resolving in these two directions gives one trivially solvable equation (perpendicular, balanced) and one dynamics equation (parallel, $$F = ma$$).\n- Step 2: If you resolve horizontally and vertically instead, the normal reaction $$R$$ and friction $$F$$ both have horizontal and vertical components. You'd need two coupled equations with both $$R$$ and $$F$$ appearing in each \u2014 much more algebra. Resolving along and perpendicular to the plane decouples the problem: $$R$$ appears only in the perpendicular equation, and the parallel equation is ready for $$F = ma$$.", "source": "GLM 5.1"}, {"q": "A student says \"the forces are balanced vertically\" when resolving on an inclined plane. Harry corrects this to \"balanced perpendicular to the plane.\" Why does this distinction matter? (2 steps)", "a": "- Step 1: \"Vertical\" means straight up and down (the direction of gravity). On an inclined plane, the normal reaction $$R$$ is NOT vertical \u2014 it is perpendicular to the slope. If you claim vertical balance, you'd write $$R = mg$$, which is wrong (that's only true on flat ground).\n- Step 2: \"Perpendicular to the plane\" means at right angles to the slope surface. The correct balance is $$R = mg\\cos\\theta$$ (for a particle with no other perpendicular forces). This equals $$mg$$ only when $$\\theta = 0$$. Using the wrong word signals the wrong equation. Harry: \"Say perpendicular to the plane, not vertically.\"", "source": "GLM 5.1"}, {"q": "A parcel is being pulled up a rough inclined plane. State the friction law $$F = \\mu R$$ and explain the two conditions under which it applies. Why should you always write it as a separate line in your working? (2 steps)", "a": "- Step 1: $$F = \\mu R$$, where $$F$$ is the friction force, $$\\mu$$ is the coefficient of friction, and $$R$$ is the normal reaction. It applies when the body is (a) moving (sliding), or (b) on the point of moving (limiting friction). If the body is stationary and not on the point of moving, friction is less than $$\\mu R$$ and you cannot use this formula \u2014 you must find $$F$$ from equilibrium instead.\n- Step 2: Writing $$F = \\mu R$$ as a separate line ensures you get the mark specifically allocated for stating the friction relationship. It also makes your logic clear: you are asserting the body is in the limiting/moving state. Burying it inside another equation risks losing this mark and makes it harder for the examiner (and you) to verify the assumption.", "source": "GLM 5.1"}, {"q": "A parcel is pulled up a rough slope. How do you determine the direction of friction, and why can friction never exceed the driving force along the slope? (2 steps)", "a": "- Step 1: Friction always opposes motion (or the tendency to move). If the parcel is being pulled up the slope, friction acts down the slope. If the parcel slides down, friction acts up the slope. Determine the direction of motion or tendency first, then draw friction opposing it.\n- Step 2: Friction cannot exceed the driving force along the slope because if it did, the net force would be in the direction opposite to the driving force \u2014 meaning the object would accelerate backwards, contradicting the fact that it's being driven forward. In practice, if you calculate $$\\mu R$$ and find it exceeds the component of the driving force along the slope, the object doesn't move (friction matches the driving force exactly, which is less than $$\\mu R$$). Harry: \"Friction can at most match the driving component \u2014 never exceed it.\"", "source": "GLM 5.1"}, {"q": "On an inclined plane, a student draws a beautiful free-body diagram with all forces labelled but writes no equations. How many marks would they likely receive, and why? (2 steps)", "a": "- Step 1: Likely zero marks (or near-zero). Harry: \"You get the marks from the equations, not the forces on the diagram. In your homework you had lovely forces drawn but no equations, so I couldn't give you any marks at all.\" Examiners award marks for the mathematical statements \u2014 the resolved-force equations, $$F = \\mu R$$, $$F = ma$$ \u2014 not for the diagram.\n- Step 2: The diagram is a planning tool: it helps you identify which forces exist and their directions. But marks come from writing the perpendicular equation ($$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$), the friction relation ($$F = \\mu R$$), and the parallel equation ($$18\\cos 40\u00b0 - F - 2g\\sin 30\u00b0 = 2a$$). Always write the equations down, even if the diagram is perfect.", "source": "GLM 5.1"}, {"q": "A force of magnitude $$P$$ acts at angle $$\\alpha$$ to the surface of an inclined plane (in the vertical plane containing the line of greatest slope). How does this force split into components parallel and perpendicular to the plane? (2 steps)", "a": "- Step 1: The component along the plane (parallel) is $$P\\cos\\alpha$$. The angle $$\\alpha$$ is measured from the plane surface, so the \"adjacent\" direction is along the plane.\n- Step 2: The component perpendicular to the plane (away from the surface) is $$P\\sin\\alpha$$. The \"opposite\" direction is away from the plane. This perpendicular component affects the normal reaction: if the force pulls the parcel away from the plane, $$R$$ decreases; if it pushes into the plane, $$R$$ increases. In Q8, the 18 N force at $$40\u00b0$$ to the plane contributes $$18\\sin 40\u00b0$$ away from the plane, reducing $$R$$.", "source": "GLM 5.1"}, {"q": "When the 18 N pulling force is removed from the parcel on the inclined plane in Q8 part (c), how can you determine whether the parcel remains at rest or slides back down \u2014 without doing a full $$F = ma$$ calculation? (2 steps)", "a": "- Step 1: Compare the weight component down the slope ($$mg\\sin\\theta$$) with the maximum possible friction ($$\\mu R$$). If the weight component exceeds maximum friction, the parcel cannot be held at rest \u2014 it must slide. If maximum friction is at least as large, the parcel can remain stationary.\n- Step 2: Without the 18 N force, $$R = mg\\cos\\theta$$ (no perpendicular component from the pulling force), so maximum friction = $$\\mu mg\\cos\\theta$$. The weight component is $$mg\\sin\\theta$$. The parcel slides if $$mg\\sin\\theta > \\mu mg\\cos\\theta$$, i.e., $$\\tan\\theta > \\mu$$. In Q8, $$\\tan 30\u00b0 \\approx 0.577 > 0.3 = \\mu$$, so it slides. This inequality test is a quick conceptual check.", "source": "GLM 5.1"}, {"q": "Harry says to \"underline key words\" in every mechanics question before writing anything. Give three examples of single words from this lesson that changed the entire mathematical setup of a problem. (2 steps)", "a": "- Step 1: (a) \"Difference\" \u2014 in the inequalities warm-up, this forced the use of a modulus rather than a simple inequality. (b) \"Magnitude\" \u2014 in Q2, this meant the impulse answer must be positive, not signed. (c) \"Unchanged\" \u2014 in Q2, \"the direction of motion of $$A$$ is unchanged\" told us $$A$$ continues in the same direction after the collision, constraining the sign of $$v_A$$.\n- Step 2: Other key words from the lesson: \"on the point of tilting\" (implies a reaction is zero), \"smooth\" (no friction), \"rough\" (friction present, use $$F = \\mu R$$), \"horizontal\" (weight has no component along the surface). Harry: \"Mechanics is very wordy, and often a single word makes a big difference.\" Underline first, solve second.", "source": "GLM 5.1"}, {"q": "In Q2, after finding that the speed of $$A$$ is $$\\frac{1}{2}$$ and the speed of $$B$$ is $$\\frac{3}{2}$$, Harry stresses writing \"speed of $$A$$ = $$\\frac{1}{2}$$\" and \"speed of $$B$$ = $$\\frac{3}{2}$$\" rather than just \"$$\\frac{1}{2}, \\frac{3}{2}$$.\" Why? (2 steps)", "a": "- Step 1: Two bare numbers without labels are ambiguous \u2014 the examiner cannot tell which is $$A$$'s speed and which is $$B$$'s. Since the question asks for both, and they are different values, the examiner needs to know which is which to award the marks.\n- Step 2: Labelling also helps you. If you write \"$$v = \\frac{1}{2}$$\" and later need the speed of $$B$$, you might accidentally use $$\\frac{1}{2}$$ instead of $$\\frac{3}{2}$$. Writing \"speed of $$A$$\" and \"speed of $$B$$\" next to the values prevents confusion in later parts of the question. Harry: \"So the examiner knows.\"", "source": "GLM 5.1"}, {"q": "In Q4, Harry recommends boxing and labelling your key moments equations as (A) and (B). What are two benefits of this habit? (2 steps)", "a": "- Step 1: It organizes your work. When you later need to solve simultaneously, you can refer to \"equation (A)\" and \"equation (B)\" rather than hunting through a page of working to find which line was the moments equation for scenario 1 vs scenario 2. This is especially valuable under exam time pressure.\n- Step 2: It signals to the examiner that these are your key equations \u2014 the ones that carry the method marks. Even if you make an arithmetic error later, the labelled equations show your approach is correct. Harry: \"A really good habit \u2014 it helps in Mechanics 2 and in pure maths too.\"", "source": "GLM 5.1"}, {"q": "In the Q4 moments problem, the distance $$x$$ is defined as \"the distance from $$C$$ to the centre of mass.\" A student taking moments about $$D$$ writes the weight's distance from $$D$$ as simply $$x$$. Why is this wrong, and what is the correct distance? (2 steps)", "a": "- Step 1: $$x$$ is measured from $$C$$, not from $$D$$. The distance from $$D$$ to the centre of mass depends on the total length and the positions of both supports. You cannot reuse $$x$$ directly when the pivot is at $$D$$.\n- Step 2: The correct distance from $$D$$ to the centre of mass is $$(0.9 - x)$$, derived from: total length from $$A$$ to $$B$$ is 1.5 m, $$D$$ is 0.36 m from $$B$$ (so 1.14 m from $$A$$), $$C$$ is 0.24 m from $$A$$, and the centre of mass is $$(0.24 + x)$$ from $$A$$. So the distance from $$D$$ to the centre is $$1.14 - (0.24 + x) = 0.9 - x$$. Measuring distances from the pivot, not from an arbitrary point, is essential.", "source": "GLM 5.1"}, {"q": "A student solves the inequalities warm-up and gets $$9 < n < 16$$. They write the answer as \"7 integers.\" Identify the two distinct errors and correct them. (3 steps)", "a": "- Step 1: Error 1 \u2014 the inequality is strict ($$<$$, not $$\\leq$$), so $$n = 9$$ and $$n = 16$$ are excluded. The integers are $$\\{10, 11, 12, 13, 14, 15\\}$$, not $$\\{9, 10, \\ldots, 16\\}$$.\n- Step 2: Error 2 \u2014 even if the endpoints were included, $$16 - 9 = 7$$ is wrong. The number of integers from $$a$$ to $$b$$ inclusive is $$b - a + 1$$, not $$b - a$$. The correct inclusive count would be $$16 - 9 + 1 = 8$$.\n- Step 3: The correct answer: 6 integers (from 10 to 15 inclusive, using $$15 - 10 + 1 = 6$$). Both errors \u2014 including strict endpoints and off-by-one counting \u2014 compound to give 7 instead of 6.", "source": "GLM 5.1"}, {"q": "In a collision problem, the question states \"the direction of motion of $$A$$ is unchanged after the collision.\" How does this constrain the sign of $$v_A$$, and why is this information essential for setting up the equation? (2 steps)", "a": "- Step 1: If $$A$$ was moving in the positive direction before the collision (so $$u_A > 0$$), \"direction unchanged\" means $$v_A > 0$$ too. This confirms $$A$$ continues in the positive direction \u2014 it doesn't rebound.\n- Step 2: This is essential because it tells you how to express $$B$$'s velocity. Since $$A$$ and $$B$$ were moving towards each other and $$A$$ doesn't rebound, $$B$$ must rebound (move in $$A$$'s direction after the collision). Without \"direction unchanged,\" you'd have to consider multiple sign possibilities for $$v_A$$ and $$v_B$$, making the problem ambiguous. This phrase pins down the direction convention.", "source": "GLM 5.1"}, {"q": "In Q2, after the collision, \"the difference between the speed of $$A$$ and the speed of $$B$$ is 1 m/s.\" Since $$A$$ continues in its original direction and $$B$$ rebounds (both moving the same way after), how do you express the speeds of $$A$$ and $$B$$ in terms of a single variable? (2 steps)", "a": "- Step 1: Let the speed of $$A$$ after collision be $$v$$ (positive, since direction unchanged). $$B$$ rebounds in the same direction as $$A$$, so $$B$$'s speed after is in the positive direction too. Since $$B$$ must be faster (it was hit and rebounded), let $$B$$'s speed be $$v + 1$$ (the difference is 1).\n- Step 2: This gives two unknowns ($$v$$ and $$v+1$$) expressed in terms of one variable, which is solvable from a single PCLM equation. The key reasoning: \"difference of speeds is 1\" combined with \"both moving same direction after\" means the faster one exceeds the slower by exactly 1. You need the physical context (both same direction) to know whether to write $$v_B = v + 1$$ or $$v_B = v - 1$$.", "source": "GLM 5.1"}, {"q": "Harry says to use the calculator for intermediate steps like $$150 \\times 1.26 = 189$$. Why is this faster and safer than trying to do it mentally or leaving it as $$150(1.5 - 0.24)$$ throughout the solution? (2 steps)", "a": "- Step 1: Leaving intermediate products uncalculated (e.g., writing $$150(1.5 - 0.24)$$ and $$225 \\times 0.36$$ throughout) makes the algebra messier. When you later divide equation (A) by (B), you're dividing compound expressions instead of simple numbers \u2014 more room for error.\n- Step 2: Computing $$150 \\times 1.26 = 189$$ and $$225 \\times 0.36 = 81$$ gives clean numbers that are easy to divide: $$189/81 = 7/3$$. Mental arithmetic on compound products risks mistakes (e.g., $$150 \\times 1.26$$ might be miscomputed as 176 or 198). The calculator gives you reliable intermediates to work with.", "source": "GLM 5.1"}, {"q": "A particle of mass $$2m$$ moving at $$3 \\text{ m s}^{-1}$$ collides with a stationary particle of mass $$m$$. After the collision, the first particle moves at $$1 \\text{ m s}^{-1}$$ in the same direction. Using only PCLM (no formula memorization needed beyond $$m_1 u_1 + m_2 u_2 = m_1 v_1 + m_2 v_2$$), find the velocity of the second particle. (2 steps)", "a": "- Step 1: Set up PCLM taking the initial direction as positive. Before: $$(2m)(3) + (m)(0) = 6m$$. After: $$(2m)(1) + (m)(v_2) = 2m + mv_2$$.\n- Step 2: Equate: $$6m = 2m + mv_2 \\Rightarrow 4m = mv_2 \\Rightarrow v_2 = 4 \\text{ m s}^{-1}$$. The lighter particle moves off faster than the heavier one \u2014 this makes physical sense (it was hit and is lighter). The momentum is conserved: $$6m$$ before = $$2m + 4m = 6m$$ after.", "source": "GLM 5.1"}, {"q": "A car accelerates from rest to $$10 \\text{ m s}^{-1}$$, holds that speed, then decelerates to rest. The total journey time is 20 s and the total distance is 150 m. Use the trapezium area formula to find how long the constant-speed phase lasts. (2 steps)", "a": "- Step 1: The speed\u2013time graph is a trapezium with parallel sides: the top (constant-speed duration, call it $$T$$) and the bottom (total time = 20 s). The height is 10 m/s. Area = distance = 150 m.\n- Step 2: Apply $$\\frac{1}{2}(a+b)h$$: $$\\frac{1}{2}(T + 20)(10) = 150 \\Rightarrow 5(T + 20) = 150 \\Rightarrow T + 20 = 30 \\Rightarrow T = 10$$ s. The constant-speed phase lasts 10 seconds. Note: we didn't need to know the individual acceleration and deceleration times \u2014 the trapezium formula handles everything in one step.", "source": "GLM 5.1"}, {"q": "A uniform rod of length 2 m and weight 100 N rests horizontally on a support at its left end. A second support is placed at the right end. A weight hangs 0.5 m from the left end. If the rod is on the point of tilting about the left support, what can you say about the reaction at the right support, and how would you find the hanging weight? (2 steps)", "a": "- Step 1: \"On the point of tilting about the left support\" means the rod is about to lift off the right support, so $$R_{\\text{right}} = 0$$. This eliminates one unknown.\n- Step 2: Take moments about the left support (so $$R_{\\text{left}}$$ has zero moment too). Clockwise: the weight of the rod acts at the midpoint (1 m from left), creating moment $$100 \\times 1 = 100$$ N m. Anticlockwise: the hanging weight $$W$$ at 0.5 m creates moment $$W \\times 0.5$$. Set equal: $$W \\times 0.5 = 100 \\Rightarrow W = 200$$ N. The tilting condition + choice of pivot made this a one-line solve.", "source": "GLM 5.1"}, {"q": "A block of mass 4 kg sits on a rough slope at $$30\u00b0$$ to the horizontal, held in equilibrium by a force $$P$$ up the slope. The coefficient of friction is 0.2. The block is on the point of sliding up. Write down (don't solve) the three equations you would need. (3 steps)", "a": "- Step 1: Perpendicular to the plane (balanced): $$R = 4g\\cos 30\u00b0$$. The only forces with perpendicular components are the weight ($$4g\\cos 30\u00b0$$ into the plane) and the normal reaction ($$R$$ out of the plane). Since $$P$$ acts along the slope, it has no perpendicular component.\n- Step 2: Friction relation: $$F = \\mu R = 0.2R$$. \"On the point of sliding up\" means friction is at its maximum value, acting down the slope (opposing the tendency to slide up).\n- Step 3: Parallel to the plane (equilibrium, so $$a = 0$$): $$P - F - 4g\\sin 30\u00b0 = 0$$. The driving force $$P$$ is up the slope; friction $$F$$ and the weight component $$4g\\sin 30\u00b0$$ act down the slope. These three equations together determine $$R$$, $$F$$, and $$P$$.", "source": "GLM 5.1"}, {"q": "Why does the formula for the area of a trapezium have a $$\\frac{1}{2}$$ in it? Give a geometric explanation. (2 steps)", "a": "- Step 1: A trapezium with parallel sides $$a$$ and $$b$$ and height $$h$$ can be thought of as the average of two rectangles: one of width $$a$$ and one of width $$b$$, both of height $$h$$. The average area is $$\\frac{ah + bh}{2} = \\frac{1}{2}(a+b)h$$.\n- Step 2: Equivalently, a trapezium is a rectangle of width $$a$$ and height $$h$$ plus a triangle of base $$(b-a)$$ and height $$h$$. Total area = $$ah + \\frac{1}{2}(b-a)h = \\frac{2ah + bh - ah}{2} = \\frac{1}{2}(a+b)h$$. The $$\\frac{1}{2}$$ arises from the triangular \"extra\" area above the narrower parallel side. Forgetting it means you're computing the area of a rectangle with width $$(a+b)$$ \u2014 always too large.", "source": "GLM 5.1"}, {"q": "In the Q2 collision problem, a student initially used $$u_A = 4.5$$ instead of $$1.5$$ (mixing up the mass-weighted momentum with the velocity). Explain why $$u_A = 1.5$$, not $$4.5$$. (2 steps)", "a": "- Step 1: The question states \"Immediately before the collision both have speed $$1.5 \\text{ m s}^{-1}$$.\" Speed is the magnitude of velocity. The mass of $$A$$ is $$3m$$, but mass does not change the speed \u2014 speed is a property of the particle's motion, not its mass.\n- Step 2: The value 4.5 comes from $$(3m)(1.5) = 4.5m$$, which is $$A$$'s momentum, not its velocity. In the PCLM equation, the left side already multiplies mass by velocity: $$(3m)(u_A) + (m)(u_B)$$. If you substitute $$u_A = 4.5$$, you'd be writing $$(3m)(4.5) = 13.5m$$, which double-counts the mass. The velocity is always the speed (with a sign for direction), never the momentum.", "source": "GLM 5.1"}, {"q": "A question says a surface is \"smooth.\" What physical assumption does this encode, and what does it allow you to omit from your equations? (2 steps)", "a": "- Step 1: \"Smooth\" means the coefficient of friction $$\\mu = 0$$. There is no friction force between the object and the surface, regardless of the normal reaction.\n- Step 2: This allows you to omit the friction equation $$F = \\mu R$$ and any friction term from your resolved-force equations. In a collision on a smooth surface, PCLM applies cleanly because there is no frictional impulse. On a smooth inclined plane, the only forces along the slope are the weight component and any applied force \u2014 no friction to include.", "source": "GLM 5.1"}, {"q": "In Q8, the normal reaction is found to be $$R = 2g\\cos 30\u00b0 - 18\\sin 40\u00b0$$. Explain why the $$18\\sin 40\u00b0$$ term is subtracted rather than added. (2 steps)", "a": "- Step 1: The 18 N force acts at $$40\u00b0$$ to the plane, pulling the parcel up and away from the surface. Its perpendicular component is $$18\\sin 40\u00b0$$ directed away from the plane (lifting the parcel off the surface).\n- Step 2: The perpendicular balance is: forces into the plane = forces out of the plane. Into the plane: the weight component $$2g\\cos 30\u00b0$$ and the reaction $$R$$. Out of the plane: $$18\\sin 40\u00b0$$. So $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$, giving $$R = 2g\\cos 30\u00b0 - 18\\sin 40\u00b0$$. The subtraction occurs because the pulling force partially lifts the parcel, reducing the contact force. If the force pushed into the plane instead, the term would be added.", "source": "GLM 5.1"}, {"q": "Harry says: \"If they're zero, you don't have to write them\" about reaction forces at the pivot when taking moments. Explain why a force at the pivot contributes zero moment, and why it's still worth knowing it exists. (2 steps)", "a": "- Step 1: The moment of a force is force \u00d7 perpendicular distance from the pivot. A force acting through the pivot has perpendicular distance zero, so its moment is zero regardless of magnitude. It mathematically vanishes from the moments equation.\n- Step 2: It's worth knowing the force exists because (a) it may appear in other equations (e.g., resolving vertically), and (b) understanding why it vanishes from one equation but not others prevents confusion. Also, in the \"tilting\" scenario, the reaction at the non-pivot support is zero for a physical reason (the support is about to lose contact), not a geometric one \u2014 these are different kinds of \"zero\" that you should distinguish.", "source": "GLM 5.1"}, {"q": "A student is asked to find the acceleration of a parcel on a rough inclined plane. They write only $$F = ma$$ with no resolved-force equations. What is missing, and in what order should the working proceed? (3 steps)", "a": "- Step 1: Missing: the perpendicular equation (to find $$R$$), and the friction relation $$F = \\mu R$$ (to express $$F$$ in terms of known quantities). Without these, $$F = ma$$ has two unknowns ($$F$$ and $$a$$) and cannot be solved.\n- Step 2: The correct order: (1) Resolve perpendicular to the plane to find $$R$$. This equation is always balanced ($$a = 0$$ perpendicular to the plane), so it gives $$R$$ directly. (2) Write $$F = \\mu R$$ as a separate line to find the friction force. (3) Resolve parallel to the plane using $$F = ma$$, substituting the known $$F$$ and solving for $$a$$.\n- Step 3: This order works because each step produces a value needed for the next. Skipping step 1 means you can't do step 2; skipping step 2 means $$F$$ in step 3 is unknown. The hierarchy is: perpendicular balance \u2192 friction \u2192 parallel dynamics.", "source": "GLM 5.1"}, {"q": "In the Q1 train problem, the acceleration is twice the deceleration in magnitude. If the acceleration phase lasts $$T$$ seconds, explain why the deceleration phase lasts $$2T$$ seconds, using the relationship between gradient and time. (2 steps)", "a": "- Step 1: On the speed\u2013time graph, acceleration = gradient = $$\\frac{\\Delta v}{\\Delta t}$$. The acceleration phase raises the speed from 0 to 20 in time $$T$$, so acceleration = $$20/T$$. The deceleration phase lowers the speed from 20 to 0 in some time $$t_d$$, so deceleration = $$20/t_d$$.\n- Step 2: Since acceleration is twice the deceleration: $$20/T = 2 \\times (20/t_d) \\Rightarrow 1/T = 2/t_d \\Rightarrow t_d = 2T$$. A steeper gradient (higher acceleration) means less time to change speed by the same amount. Since the acceleration is twice as large, it takes half the time \u2014 so the deceleration takes twice as long.", "source": "GLM 5.1"}, {"q": "On a speed\u2013time graph, the acceleration of the train is the gradient of the sloping section. After finding $$T = 40$$ seconds and the top speed is $$20 \\text{ m s}^{-1}$$, compute the acceleration and explain what the value means physically. (2 steps)", "a": "- Step 1: Acceleration = gradient = $$\\frac{20 - 0}{40 - 0} = \\frac{20}{40} = 0.5 \\text{ m s}^{-2}$$.\n- Step 2: This means the train's speed increases by $$0.5 \\text{ m s}^{-1}$$ every second. Starting from rest, after 1 second it moves at 0.5 m/s, after 10 seconds at 5 m/s, and after 40 seconds at 20 m/s. The gradient interpretation is what connects the graphical picture to the kinematic quantity \u2014 it's not just a number on a graph, it's the physical rate of speed change.", "source": "GLM 5.1"}, {"q": "A student asks: \"Why can't I just use SUVAT equations for the train problem instead of the trapezium area?\" Explain why the trapezium approach is more efficient for this particular problem structure. (2 steps)", "a": "- Step 1: You could use SUVAT for each phase separately (three phases: accelerate, constant, decelerate) and sum the three distances. This requires three separate distance calculations plus an addition step \u2014 four calculations total.\n- Step 2: The trapezium area formula gives the total distance in a single calculation: $$\\frac{1}{2}(a+b)h$$. Since the question asks for total distance (not per-phase distances), the trapezium bypasses the intermediate steps entirely. It's the same mathematics (area under the graph = distance), but recognizing the trapezium shape collapses three SUVAT equations into one geometric formula.", "source": "GLM 5.1"}, {"q": "A parcel of mass $$m$$ is on a rough plane inclined at angle $$\\theta$$. The coefficient of friction is $$\\mu$$. Derive the condition $$\\tan\\theta > \\mu$$ for the parcel to slide when no other forces act, and explain the intuition. (3 steps)", "a": "- Step 1: Without other forces, perpendicular balance gives $$R = mg\\cos\\theta$$. Maximum friction = $$\\mu R = \\mu mg\\cos\\theta$$. The weight component down the slope is $$mg\\sin\\theta$$.\n- Step 2: The parcel slides if the driving force (weight component) exceeds maximum friction: $$mg\\sin\\theta > \\mu mg\\cos\\theta$$. Cancel $$mg$$ (positive): $$\\sin\\theta > \\mu\\cos\\theta$$. Divide by $$\\cos\\theta$$ (positive for $$0 < \\theta < 90\u00b0$$): $$\\tan\\theta > \\mu$$.\n- Step 3: Intuition: $$\\tan\\theta$$ measures how steep the slope is, and $$\\mu$$ measures how \"grippy\" the surface is. If the slope is steeper than the grippiness can handle, the parcel slides. For $$\\mu = 0.3$$, the critical angle is $$\\theta = \\arctan(0.3) \\approx 16.7\u00b0$$ \u2014 any slope steeper than about 17\u00b0 and the parcel slides.", "source": "GLM 5.1"}, {"q": "In the Q4 moments problem, why is it important that the rod is described as \"non-uniform\"? How would the problem change if it were uniform? (2 steps)", "a": "- Step 1: \"Non-uniform\" means the centre of mass is not at the midpoint of the rod. The distance $$x$$ from $$C$$ to the centre of mass is unknown and must be found. If the rod were uniform, the centre of mass would be at the midpoint (0.75 m from $$A$$), and $$x$$ would be determined purely by geometry \u2014 no need to solve for it.\n- Step 2: The non-uniformity is what makes the problem have two unknowns ($$W$$ and $$x$$) and requires two scenarios (two equations) to solve. With a uniform rod, the centre of mass position is known, so one scenario would suffice to find $$W$$ alone. The phrase \"non-uniform\" is a signal that you need more information \u2014 and the second scenario provides it.", "source": "GLM 5.1"}, {"q": "Synthesis: A student reads a mechanics problem and immediately starts writing equations without underlining key words or drawing a diagram. Describe two specific things that are likely to go wrong, using examples from this lesson. (2 steps)", "a": "- Step 1: Missing key words leads to wrong mathematical setup. Example: not noticing \"difference\" in the warm-up means writing $$2\\sqrt{n} - 7 < 1$$ instead of $$|2\\sqrt{n} - 7| < 1$$. Not noticing \"magnitude\" in Q2 means leaving a negative sign in the impulse answer. Not noticing \"on the point of tilting\" in Q4 means failing to set a reaction to zero.\n- Step 2: No diagram leads to sign and distance errors. Example: in Q2, without a before/after diagram, it's easy to get the signs of $$u_B$$ wrong or misidentify which direction each particle moves after collision. In Q4, without separate diagrams for the two scenarios, it's easy to measure distances from the wrong reference point or confuse which reaction is zero. Harry's process: underline \u2192 diagram \u2192 equations.", "source": "GLM 5.1"}, {"q": "Synthesis: In Q8, the parcel is pulled up a rough incline by a force at an angle to the plane. List all the forces acting on the parcel, state which direction each acts, and explain how each one appears in the final equations. (3 steps)", "a": "- Step 1: The forces are: (1) Weight $$2g$$ \u2014 vertically downward. Splits into $$2g\\sin 30\u00b0$$ (down the slope) and $$2g\\cos 30\u00b0$$ (into the plane). (2) Normal reaction $$R$$ \u2014 perpendicular to the plane, away from the surface. (3) Pulling force 18 N \u2014 at $$40\u00b0$$ to the plane, splitting into $$18\\cos 40\u00b0$$ (up the slope) and $$18\\sin 40\u00b0$$ (away from the plane). (4) Friction $$F$$ \u2014 along the plane, down the slope (opposing upward motion).\n- Step 2: Perpendicular equation: forces into plane = forces out of plane. $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$. This gives $$R$$. Then $$F = \\mu R$$ gives friction.\n- Step 3: Parallel equation (up the slope positive): $$18\\cos 40\u00b0 - F - 2g\\sin 30\u00b0 = 2a$$. The driving force (up) minus the resisting forces (down) equals mass times acceleration. Every force appears exactly once in exactly one of the two resolved directions \u2014 this is the power of resolving along and perpendicular to the plane.", "source": "GLM 5.1"}, {"q": "A student resolves forces on an inclined plane and writes the perpendicular equation as $$R - 2g\\sin 30\u00b0 + 18\\sin 40\u00b0 = 0$$. The correct equation is $$R + 18\\sin 40\u00b0 = 2g\\cos 30\u00b0$$. What conceptual error did the student make? (2 steps)", "a": "- Step 1: The student used $$2g\\sin 30\u00b0$$ (the component of weight parallel to the slope) instead of $$2g\\cos 30\u00b0$$ (the component perpendicular to the slope) in the perpendicular equation. They confused which trig function goes with which direction.\n- Step 2: The mnemonic: the angle $$\\theta$$ is between the slope and the horizontal. The component perpendicular to the plane always uses $$\\cos\\theta$$ (think: flat plane, $$\\theta = 0$$, full weight presses in, $$\\cos 0 = 1$$). The component along the plane always uses $$\\sin\\theta$$ (think: flat plane, no sliding force, $$\\sin 0 = 0$$). This is the same slip visible in Phuc's photo \u2014 it's a common one, so double-check which component goes where.", "source": "GLM 5.1"}, {"q": "Edge case: A block sits on a rough horizontal surface (not an incline). The coefficient of friction is $$\\mu$$ and a horizontal force $$P$$ is applied. If $$P < \\mu R$$, what is the friction force, and why is it wrong to write $$F = \\mu R$$ here? (2 steps)", "a": "- Step 1: The friction force equals $$P$$ (not $$\\mu R$$). The block is in equilibrium \u2014 it doesn't move \u2014 so friction exactly balances the applied force: $$F = P$$. The block has no tendency to move beyond what $$P$$ provides.\n- Step 2: Writing $$F = \\mu R$$ is wrong because this formula only applies when the body is moving or on the point of moving (limiting friction). When $$P < \\mu R$$, the friction has not reached its maximum value. The actual friction is whatever is needed to maintain equilibrium, which is $$P$$. Only when $$P = \\mu R$$ is the block on the point of sliding; for $$P > \\mu R$$, it accelerates and $$F = \\mu R$$ applies.", "source": "GLM 5.1"}, {"q": "In the Q2 collision, after finding $$v_A = \\frac{1}{2}$$ and $$v_B = \\frac{3}{2}$$, verify that kinetic energy is NOT conserved. Why is this expected, and what does it tell you about the collision? (2 steps)", "a": "- Step 1: KE before = $$\\frac{1}{2}(3m)(1.5)^2 + \\frac{1}{2}(m)(1.5)^2 = \\frac{1}{2}m(6.75 + 2.25) = 4.5m$$ J. KE after = $$\\frac{1}{2}(3m)(0.5)^2 + \\frac{1}{2}(m)(1.5)^2 = \\frac{1}{2}m(0.75 + 2.25) = 1.5m$$ J. KE has decreased \u2014 it is not conserved.\n- Step 2: This is expected because the collision is inelastic. Momentum is always conserved (no external impulse), but kinetic energy is only conserved in perfectly elastic collisions. The \"lost\" KE is converted to other forms \u2014 heat, sound, deformation. In M1, you should never assume energy conservation in a collision unless the question explicitly states the collision is elastic.", "source": "GLM 5.1"}, {"q": "Harry emphasizes that when a question asks for the \"speed\" of a particle, you give a positive number, but when it asks for \"velocity,\" you may need to include a sign. Explain the difference and give an example from Q2. (2 steps)", "a": "- Step 1: Speed is the magnitude of velocity \u2014 always non-negative. Velocity includes direction, encoded by the sign relative to your chosen positive direction. A particle moving left at 3 m/s has speed 3 but velocity $$-3$$ (if right is positive).\n- Step 2: In Q2, the speed of $$A$$ after collision is $$\\frac{1}{2}$$ m/s (positive, just the magnitude). The velocity of $$A$$ is $$+\\frac{1}{2}$$ m/s (positive, confirming it continues in the initial direction). If the question had said \"find the velocity of $$B$$,\" the answer would be $$+\\frac{3}{2}$$ m/s (with the sign confirming direction), whereas \"speed of $$B$$\" is just $$\\frac{3}{2}$$ m/s. The distinction matters for labelling and for subsequent parts of the question.", "source": "GLM 5.1"}, {"q": "In the Q4 moments problem, a student takes moments about $$B$$ instead of about $$C$$ or $$D$$. Why is this less efficient, even though it's mathematically valid? (2 steps)", "a": "- Step 1: Taking moments about $$B$$ means both reaction forces $$R_C$$ and $$R_D$$ appear in the equation (neither acts through $$B$$). You now have two unknowns in one equation, which cannot be solved alone \u2014 you'd need a second equation (e.g., resolving vertically) to proceed.\n- Step 2: Taking moments about $$C$$ (when tilting about $$C$$) eliminates both $$R_C$$ (acts through the pivot) and $$R_D$$ (zero because of tilting). One equation, one unknown ($$W$$ or $$x$$). The choice of pivot is a strategic decision: pick the point that eliminates the most unknowns. Harry: \"Choose the pivot to kill an unknown.\"", "source": "GLM 5.1"}, {"q": "A student is working through a moments problem and has two equations: $$(A): Wx = 189$$ and $$(B): 81 = (0.9 - x)W$$. They try to solve by substitution and get $$x = 0.63$$. They then find $$W = 189/0.63 = 300$$. Why should they check their answer in the other equation? (2 steps)", "a": "- Step 1: Checking in equation (B): $$(0.9 - 0.63) \\times 300 = 0.27 \\times 300 = 81$$. This matches the right side of (B), confirming the solution is consistent. If there had been an arithmetic error in solving for $$x$$ or $$W$$, the check would reveal it.\n- Step 2: In exam conditions, a quick verification in the unused equation catches mistakes that would otherwise cost multiple marks. If the check fails, you know to re-examine your algebra. It takes seconds but can save several marks. This is especially valuable in moments problems where sign errors and distance errors are common.", "source": "GLM 5.1"}, {"q": "A particle of mass $$m$$ moving at $$4 \\text{ m s}^{-1}$$ receives an impulse of $$3m$$ N s in the opposite direction. Find its new velocity. What role does the sign of the impulse play? (2 steps)", "a": "- Step 1: Take the initial direction as positive, so $$u = +4$$. The impulse acts in the opposite (negative) direction, so $$I = -3m$$. Using $$I = mv - mu$$: $$-3m = mv - m(4) \\Rightarrow -3m = mv - 4m \\Rightarrow mv = m \\Rightarrow v = 1 \\text{ m s}^{-1}$$.\n- Step 2: The impulse slowed the particle from 4 m/s to 1 m/s but didn't reverse it (since the impulse magnitude $$3m$$ was less than the initial momentum $$4m$$). If the impulse had been larger (say $$5m$$), the particle would reverse direction ($$v = -1$$). The sign of the impulse encodes its direction \u2014 ignoring it would give the wrong velocity.", "source": "GLM 5.1"}, {"q": "A uniform plank of length 3 m and weight 60 N rests on a support at its midpoint. A second support is at the right end. The plank is on the point of tilting about the midpoint. Find the missing information this gives you, and determine what additional force must be acting. (2 steps)", "a": "- Step 1: \"On the point of tilting about the midpoint\" means the reaction at the right-end support is zero ($$R_{\\text{right}} = 0$$). The only support providing a reaction is the midpoint.\n- Step 2: For a uniform plank on a single support at its midpoint, the weight acts through the midpoint and the plank balances naturally. But \"on the point of tilting\" implies something is almost causing it to tip \u2014 there must be an additional force (e.g., a weight on one side) creating an unbalanced moment. Taking moments about the midpoint: if a weight $$W$$ sits at the right end (1.5 m away), it creates a clockwise moment of $$1.5W$$. The weight of the plank acts through the pivot (zero moment). For the plank to be on the point of tilting (clockwise), $$R_{\\text{right}} = 0$$ and the clockwise moment from $$W$$ is just barely not overcome by any anticlockwise moment.", "source": "GLM 5.1"}, {"q": "Harry says the priority homework is to work through Pure 2 and Pure 3 papers. The M1 paper will be revisited in mid-July. What does this sequencing suggest about the role of M1 practice relative to the overall maths course? (2 steps)", "a": "- Step 1: M1 is one component of the A-level maths qualification, alongside Pure and Statistics. Harry is prioritizing diagnostic coverage of the entire course (Pure 2, Pure 3) before deep-diving back into M1. This suggests the student's M1 fundamentals are at a point where they benefit from spaced practice (revisiting in July) rather than immediate intensive drilling.\n- Step 2: The M1 techniques (resolving, moments, momentum) are largely self-contained \u2014 they don't depend heavily on Pure 2/3 content. So they can be practised later without prerequisite issues. But Pure 2/3 topics (e.g., integration techniques, series) may have more sequential dependencies. Harry's scheduling reflects this: secure the sequential content first, then return to the self-contained applied modules.", "source": "GLM 5.1"}, {"q": "A student draws a before/after diagram for a collision but forgets to label which direction is positive. They then write the momentum equation with all velocities as positive numbers. What type of error will this produce, and how can it be prevented? (2 steps)", "a": "- Step 1: This will produce a momentum equation where opposing velocities are treated as having the same sign. For example, if $$A$$ moves right at 2 and $$B$$ moves left at 3, the correct PCLM (right positive) is $$m_A(2) + m_B(-3) = \\ldots$$. Without the sign convention, the student writes $$m_A(2) + m_B(3) = \\ldots$$, which is wrong \u2014 it treats both as moving the same way.\n- Step 2: Prevention: at the top of the diagram, draw an arrow labelled \"positive\" in one direction. Then, for every velocity, ask \"is it in the positive or negative direction?\" and assign the sign accordingly. This takes 5 seconds but prevents the most common error in momentum problems. Harry had Phuc draw before/after diagrams specifically to make the directions visible.", "source": "GLM 5.1"}, {"q": "Why does the condition \"on the point of tilting about $$C$$\" in Q4 tell you to take moments about $$C$$ specifically, rather than about some other point? What would happen if you took moments about $$A$$ instead? (2 steps)", "a": "- Step 1: Tilting about $$C$$ means $$R_D = 0$$ and $$R_C$$ is the only unknown reaction. Taking moments about $$C$$ eliminates $$R_C$$ (it acts through the pivot), leaving an equation with only $$W$$ and $$x$$ \u2014 exactly the unknowns you want. It's the optimal pivot choice.\n- Step 2: Taking moments about $$A$$ would include both $$R_C$$ (at distance 0.24 from $$A$$) and the weight $$W$$ (at distance $$0.24 + x$$ from $$A$$), plus the 150 N force at $$B$$. You'd have two unknowns ($$R_C$$ and $$Wx$$, or equivalently $$W$$ and $$x$$) in one equation \u2014 not solvable alone. You'd need to also use the fact that $$R_D = 0$$ and resolve vertically to get a second equation. More work, more room for error.", "source": "GLM 5.1"}, {"q": "In Q8 part (c), when the 18 N force is removed, the normal reaction changes. Explain why $$R$$ increases and what effect this has on the maximum friction force. (2 steps)", "a": "- Step 1: With the 18 N force, $$R = 2g\\cos 30\u00b0 - 18\\sin 40\u00b0 \\approx 5.40$$ N. The $$18\\sin 40\u00b0$$ term was reducing $$R$$ by pulling the parcel away from the surface. When the force is removed, $$R = 2g\\cos 30\u00b0 \\approx 16.97$$ N \u2014 a significant increase.\n- Step 2: Maximum friction = $$\\mu R$$. Since $$R$$ increases from 5.40 to 16.97, maximum friction increases from about 1.62 N to about 5.09 N. However, the weight component down the slope is $$2g\\sin 30\u00b0 = 9.8$$ N, which exceeds even the new maximum friction (5.09 N). So despite friction being stronger, it's still not strong enough \u2014 the parcel slides. Removing the pulling force both increases friction and removes the upward drive, and the latter effect dominates.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
</html>
