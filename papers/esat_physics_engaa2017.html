<script>
const DATA={"selected": [{"question": "Q2 (ENGAA 2017). A car's v–t graph: 0–25 s accelerates 0→30 m/s; 25–50 s constant 30 m/s; 50–110 s decelerates uniformly 30→10 m/s; 110–150 s constant 10 m/s. What is the distance travelled WHILE DECELERATING? (g = 10; options A 400, B 500, C 550, D 600, E 700, F 1100, G 1400, H 1800 m)", "answer": "Answer: F (1200 m).\n- Step 1: The question asks ONLY for the deceleration section (50–110 s), NOT the whole journey. Read the wording first.\n- Step 2: Velocity falls 30→10 m/s (both non-zero), so the area is a TRAPEZIUM, not a rectangle.\n- Step 3: Trapezium area = average velocity × time = (u+v)/2 × t.\n+ u = 30, v = 10, t = 110−50 = 60 s\n+ (30+10)/2 × 60 = 20 × 60 = 1200 m\n- Step 4: Trap — using v×t with just one velocity (e.g. 10×60=600 or 30×60=1800) is the classic error. Average the two velocities first.", "source": "lesson", "_id": 0}, {"question": "Q4 (ENGAA 2017). A saucepan of water is heated from below. Three statements about the heated water: (1) mass of a fixed volume increases; (2) density of a fixed mass decreases; (3) volume of a fixed mass increases. Which help explain convection currents? (Options: A none, B 1 only, C 2 only, D 3 only, E 1&2, F 1&3, G 2&3, H 1,2&3)", "answer": "Answer: G (statements 2 and 3 only).\n- Step 1: Identify the physics — convection = bulk fluid movement driven by DENSITY differences.\n- Step 2: Heat the bottom water → it expands → volume of a fixed mass INCREASES (statement 3 ✓).\n- Step 3: For fixed mass, ρ = m/V. V↑ with m constant → density DECREASES (statement 2 ✓).\n- Step 4: Less-dense hot water rises; cooler denser water sinks → circulation = convection current.\n- Step 5: Statement 1 is WRONG — heating does not add mass. Mass of a fixed volume does not increase (if anything, expanding fluid leaves that fixed volume, so it falls).\n+ Trap: 'density of a fixed mass' and 'mass of a fixed volume' sound similar but behave OPPOSITELY. Underline the held-fixed quantity.", "source": "lesson", "_id": 1}, {"question": "Q4 concept. Why does the 'mass of a fixed volume of water' NOT increase when the water is heated? Doesn't heating 'add' mass?", "answer": "No — mass is conserved.\n- Step 1: Heating transfers kinetic energy to particles; it does NOT add particles. You have the same atoms/molecules before and after.\n- Step 2: When heated, particles spread out → the fluid EXPANDS (volume increases for a fixed mass).\n- Step 3: For a FIXED volume region, as the fluid expands some of it leaves that region. So the mass INSIDE that fixed volume actually goes DOWN, not up.\n- Step 4: Density of a fixed mass decreases (correct); mass of a fixed volume does not increase (also correct, it decreases). These are consistent because 'fixed mass' ≠ 'fixed volume'.\n+ Key principle: mass conservation. Energy in ≠ mass in.", "source": "lesson", "_id": 2}, {"question": "Q4 concept. Tom corrected the causal chain. Which is the correct direction of causation — does the volume increase CAUSE the density decrease, or does the density decrease CAUSE the volume increase? Why does the order matter?", "answer": "Volume increase CAUSES the density decrease — NOT the reverse.\n- Step 1: Heating → particles gain KE → spread apart → V increases (this is the physical mechanism, the cause).\n- Step 2: THEN, because ρ = m/V with m fixed, the larger V forces ρ down (this is the mathematical consequence, the effect).\n- Step 3: The reverse is nonsensical — density is defined AS m/V, so it cannot independently 'cause' the volume to change. Density is the derived quantity.\n- Step 4: Correct chain: heat → expansion → V↑ → ρ↓ → hot fluid rises → convection.\n+ Why it matters: getting the chain in this order makes statement 1 (mass of fixed volume increases) obviously the odd one out — heating drives volume, never mass.", "source": "lesson", "_id": 3}, {"question": "Q6 (ENGAA 2017). Motor pulls a 1200 kg car up a ramp, vertical height h = 1.0 m. Total input energy = 28 kJ, motor 75% efficient. What is the TOTAL energy lost to surroundings? (g = 10; options A 7, B 9, C 12, D 16, E 21, F 28, G 33 kJ)", "answer": "Answer: D (16 kJ) — fast method, skip the 75% entirely.\n- Step 1: Identify the useful output = GPE gained by the car = mgh.\n+ mgh = 1200 × 10 × 1.0 = 12000 J = 12 kJ\n- Step 2: Energy conservation: E_wasted = E_input − E_useful.\n+ 28 − 12 = 16 kJ → answer D\n- Step 3: The 75% efficiency is a DISTRACTOR for this question. You never need it — the only two numbers that matter are useful (mgh) and total input.\n+ Trap: routing through 0.75×28=21 kJ (motor output) then 21−12=9 kJ gives a different wrong branch. That longer route is the 'unnecessary detail about the motor' Tom told you to skip.", "source": "lesson", "_id": 4}, {"question": "Q6 concept. The 75% efficiency IS real — show the full two-stage energy flow that confirms the total wasted = 16 kJ, and explain why the fast method still wins.", "answer": "Full flow (self-consistent, but slower):\n- Stage 1 (motor): 28 kJ input × 75% efficient → 21 kJ mechanical output, 7 kJ lost in motor.\n- Stage 2 (after motor): 21 kJ output → 12 kJ useful GPE (mgh) + 9 kJ lost to friction/other.\n- Total wasted = motor loss + friction loss = 7 + 9 = 16 kJ ✓ (matches the fast method).\n- Why fast method wins: energy conservation gives E_wasted = E_input − E_useful directly. The intermediate 21 kJ (motor output) cancels out — 28 − 12 = (28 − 21) + (21 − 12) = 7 + 9 = 16.\n+ Tom's rule: 'All that matters is useful vs total.' Spot the useful energy, subtract, done.", "source": "lesson", "_id": 5}, {"question": "Q8 (ENGAA 2017). PET scanner: source emits two gamma-rays simultaneously in opposite directions toward two detectors 3.0 m apart. At midpoint Q they arrive together. In a scan they arrive with Δt = 4.0×10⁻¹⁰ s. Gamma speed = 3.0×10⁸ m/s. How far from Q is the source? (Options: A 6.0 mm, B 12 mm, C 24 mm, D 6.0 cm, E 12 cm, F 24 cm)", "answer": "Answer: D (6.0 cm).\n- Step 1: Both rays travel at the same speed, so the time delay = difference in path length. Path difference Δx = v × Δt.\n+ Δx = (3.0×10⁸) × (4.0×10⁻¹⁰) = 12×10⁻² m = 12 cm\n- Step 2: KEY GEOMETRY — the path difference is TWICE the source displacement. If source is distance x from Q, one path is x longer and the other is x shorter, so Δx = 2x.\n+ 2x = 12 cm → x = 6.0 cm → answer D\n- Step 3: The 3.0 m detector separation is a DISTRACTOR — never enters the calculation.\n+ Trap: 12 cm is the PATH DIFFERENCE, not the displacement. Halve it.", "source": "lesson", "_id": 6}, {"question": "Q8 concept. Why is the source's displacement from the midpoint exactly HALF the path difference? Derive the '2x' relationship.", "answer": "Symmetry: moving the source by x changes BOTH paths.\n- Step 1: Let the source sit distance x from midpoint Q. Let each half-distance to a detector be d.\n- Step 2: One path becomes (d + x) — LONGER by x.\n- Step 3: The other path becomes (d − x) — SHORTER by x.\n- Step 4: Path difference = (longer) − (shorter) = (d+x) − (d−x) = 2x.\n+ So Δx = 2x → x = Δx / 2. The shift x appears twice: once adding to one path, once subtracting from the other.\n+ General rule: shift source by x → change path difference by 2x. Displacement = ½ × path difference.", "source": "lesson", "_id": 7}, {"question": "Q8 concept. Tom's 'two cars' analogy for the PET scanner. Two cars both drive at 20 m/s; one arrives 20 s before the other. What does this tell you, and how does it map to the gamma rays?", "answer": "Same speed + different arrival time ⇒ difference in distance travelled = v × Δt.\n- Step 1: Both cars at 20 m/s. Arrival difference Δt = 20 s.\n- Step 2: The earlier car covered less distance; the gap in distance = 20 × 20 = 400 m.\n- Step 3: This is EXACTLY the gamma-ray logic: both rays at c = 3×10⁸ m/s, arrival difference Δt = 4×10⁻¹⁰ s → path difference = c × Δt = 12 cm.\n+ Mapping: cars = gamma rays; speed = c; arrival-time difference → path-length difference via d = v × t.\n+ Tom's point: don't overthink the physics label. It's just 'distance = speed × time' applied to a difference.", "source": "lesson", "_id": 8}, {"question": "Q10 (ENGAA 2017). Fission: ¹n + ²³⁹₉₄Pu → ʷ₅₄Xe + ʸₓZr + z·¹n. Which option is correct? (A w+y=240; B z=240−(w+y); C x=40−z; D 94=54+x+1; E 240=54+x; F 94=w+y+1)", "answer": "Answer: B (z = 240 − (w+y)).\n- Step 1: Apply the two conservation laws — mass number (top) and atomic number (bottom).\n- Step 2: MASS balance (tops): 1 + 239 = w + y + z → w + y + z = 240.\n+ Rearranged: z = 240 − (w + y) → this is option B ✓\n- Step 3: ATOMIC balance (bottoms): 0 + 94 = 54 + x + 0 → 94 = 54 + x → x = 40.\n+ Note: free neutrons (z of them) carry atomic number 0, so z does NOT appear in the Z-balance.\n- Step 4: Eliminate wrong options:\n+ C (x = 40−z): wrong — x = 40 outright; z is unrelated (misses that z has Z=0).\n+ D (94 = 54+x+1) and E (240 = 54+x): both force x ≠ 40, contradicting the Z-balance.\n+ F (94 = w+y+1): wrong — mixes mass numbers (w, y) into an atomic-number statement and drops z.\n+ A (w+y=240): incomplete — ignores the z neutrons.", "source": "lesson", "_id": 9}, {"question": "Q12 (ENGAA 2017). Motor on 12 V supply lifts 20 kg mass through 6.0 m in 5.0 s. System (motor+rope+pulley) is 80% efficient. (g = 10.) What is the current in the motor? (Options: A 1.6, B 2.0, C 2.5, D 16, E 20, F 25 A)", "answer": "Answer: F (25 A).\n- Step 1: Useful output = GPE gained = mgh.\n+ mgh = 20 × 10 × 6.0 = 1200 J\n- Step 2: If 100% efficient, supply delivers 1200 J and I = E/(Vt).\n+ I_ideal = 1200 / (12 × 5) = 1200 / 60 = 20 A\n- Step 3: But system is only 80% efficient, so the INPUT energy (and current) must be LARGER. Input = useful / η = 1200 / 0.8 = 1500 J.\n+ I = 1500 / (12 × 5) = 1500 / 60 = 25 A → answer F\n- Step 4: Sanity check — efficiency makes input BIGGER, so 25 A > 20 A (ideal). Correct direction.\n+ Shortcut: I_input = I_ideal / η = 20 / 0.8 = 25 A.", "source": "lesson", "_id": 10}, {"question": "Q12 concept. Phuc's mistake on the motor question. He got mgh = 1200 J and I = 20 A and stopped, answering E. What did he forget, and why does the correct answer (F, 25 A) have to be LARGER than 20 A?", "answer": "He forgot the 80% efficiency factor.\n- Step 1: Phuc's working was correct up to I_ideal = mgh/(Vt) = 1200/(12×5) = 20 A — but that is the current IF the system were 100% efficient.\n- Step 2: The system is only 80% efficient. The electrical input must exceed the useful output because 20% is lost.\n- Step 3: Convert useful → required input by DIVIDING by η (not multiplying): input = useful / 0.8 = 1500 J.\n+ I = 20 / 0.8 = 25 A → answer F, not E\n- Step 4: Why 25 > 20 (sanity): an 80%-efficient machine must be fed MORE energy than it usefully delivers. If your efficiency step made the number go DOWN, you divided the wrong way.\n+ Tom: 'Everything you did was right, you just missed the last bit.'", "source": "lesson", "_id": 11}, {"question": "Q14 (ENGAA 2017). Nuclide ᴾ_QX decays to stable Y, emitting ONE α and THREE β⁻. Which nuclide could NOT be formed at any stage? (Options: A (P, Q−1); B (P, Q+1); C (P, Q+2); D (P, Q+3); E (P−4, Q−2); F (P−4, Q−1); G (P−4, Q); H (P−4, Q+1))", "answer": "Answer: A (P, Q−1) — impossible.\n- Step 1: FAST METHOD — read the mass number FIRST. Only α decay changes mass (ΔA = −4); β⁻ leaves A unchanged (ΔA = 0).\n- Step 2: So at any stage A is either P (α not yet happened) or P−4 (α has happened). No other mass number is possible.\n- Step 3: If A = P (no alpha yet): only betas have occurred (0–3 of them), each raises Z by 1. Reachable Z = Q, Q+1, Q+2, Q+3. It can NEVER be below Q.\n+ Options B, C, D (P with Q+1, Q+2, Q+3) are all reachable BEFORE the alpha ✓\n- Step 4: If A = P−4 (alpha done, Z dropped by 2): plus 0–3 betas → Z = Q−2, Q−1, Q, Q+1.\n+ Options E, F, G, H (P−4 with Q−2, Q−1, Q, Q+1) are all reachable AFTER the alpha ✓\n- Step 5: Option A is (P, Q−1): mass still P but Z BELOW Q. To drop Z you need an alpha — but an alpha would also drop the mass to P−4. You cannot have lower Z AND original mass.\n+ Tom's one-liner: 'Atomic number is down, so you need an alpha — but you can't have an alpha and still have the same mass.'", "source": "lesson", "_id": 12}, {"question": "Q14 concept. Tom's fast method for 'which nuclide is impossible?' decay-chain questions. What is the two-line reasoning, and what order do you check?", "answer": "Check mass number FIRST, then atomic consistency.\n- Step 1: Only α decay changes the mass number (ΔA = −4). β⁻ leaves A untouched (ΔA = 0). So the mass number can only be its starting value or drop in steps of 4.\n- Step 2: Fix the mass number first — it can only be P (no alpha yet) or P−4 (alpha done). Any other mass number is instantly impossible.\n- Step 3: For each allowed mass number, list the range of atomic numbers the betas can produce:\n+ A = P (no alpha, 0–3 betas): Z = Q, Q+1, Q+2, Q+3 (never below Q)\n+ A = P−4 (alpha done, Z dropped 2, then 0–3 betas): Z = Q−2, Q−1, Q, Q+1\n- Step 4: The impossible option is the one whose (A, Z) pair falls OUTSIDE both reachable sets — typically 'original mass + lowered atomic number', because the only thing that lowers Z (alpha) also lowers A.\n+ The one-liner: 'lower Z needs an alpha, but an alpha also lowers A — so original mass + lower Z is impossible.'", "source": "lesson", "_id": 13}, {"question": "ESAT strategy. The ESAT paper explicitly gives g = 10 N kg⁻¹. Why should you use g = 10 and round aggressively, and what does 'approximate everything' mean in practice?", "answer": "Use g = 10, round aggressively, chase precision only if two options are close.\n- Step 1: The ESAT gives g = 10 (not 9.81) — the arithmetic is DESIGNED to be clean. Using 9.81 wastes time and breaks the clean numbers.\n- Step 2: 'Approximate everything' means round to nice numbers mid-calculation: 1200×10×1 = 12000, 12000/0.8 = 15000, 3×10⁸×4×10⁻¹⁰ = 12×10⁻².\n- Step 3: Read the MAGNITUDE of the answer options first — they tell you the scale, so you can sanity-check instantly (e.g. answer in cm not mm → rules out A/B/C in Q8).\n- Step 4: Only chase precision if two options are close. If options differ by a factor of 2 or more, a rough estimate is enough to pick.\n+ No calculator is provided — the exam tests whether you can ORGANISE a calculation, not whether you own one.", "source": "lesson", "_id": 14}, {"question": "ESAT strategy. Tom's 'skip steps' rule. When a question asks for 'total energy wasted', why should you go directly input → useful and skip the intermediate efficiency calculation? Apply it to Q6 (28 kJ in, 75% efficient, mgh = 12 kJ).", "answer": "Energy conservation makes intermediate steps cancel — go input → useful directly.\n- Step 1: The fundamental law is E_input = E_useful + E_wasted, so E_wasted = E_input − E_useful. One line.\n- Step 2: In Q6: useful = mgh = 12 kJ, input = 28 kJ → wasted = 28 − 12 = 16 kJ. Done.\n- Step 3: The 75% efficiency produces an intermediate 'motor output' of 21 kJ, but it cancels: (28−21) + (21−12) = 7 + 9 = 16. Computing it is unnecessary detail about the motor.\n- Step 4: General rule — if you can see the useful energy directly (usually mgh for lifting), subtract it from the input and STOP. Don't get drawn into intermediate stages.\n+ Tom: 'All that matters is useful vs total.'", "source": "lesson", "_id": 15}, {"question": "ESAT strategy. Tom's single most repeated instruction: 'Identify the physics first, then compute.' What does this mean, and why does it save the most time?", "answer": "Name the topic and the one key idea BEFORE touching any numbers.\n- Step 1: Before any arithmetic, ask 'What is this question actually about?' — convection? energy conservation? path difference? nuclear balance?\n- Step 2: Write down the ONE key idea (e.g. 'area under v–t = distance', 'ρ = m/V', 'Δx = 2x').\n- Step 3: ONLY THEN decide the quickest route to the number. Most ENGAA physics questions have a short route once the context is understood — the difficulty is in the wording, not the maths.\n- Step 4: This filters out distractors (e.g. the 3.0 m detector gap in Q8 is irrelevant once you've identified it as a path-difference problem).\n+ Priority order: (1) spot the topic, (2) decide which info matters, (3) avoid long methods when a physical argument or proportional shortcut works.", "source": "lesson", "_id": 16}, {"question": "ESAT strategy. Tom's headline principle: 'Bad habits for A-level are good habits for ESAT.' List the four instincts you must RETRAIN, and why the ESAT rewards the opposite of A-level rigour.", "answer": "Retrain four A-level instincts — the ESAT rewards their opposites.\n- Step 1: SKIP STEPS. At A-level you show every line of algebra; on the ESAT, if you can jump from the physics idea to the number, do it. Don't write the middle algebra.\n- Step 2: APPROXIMATE EVERYTHING. At A-level you keep exact values; on the ESAT, round aggressively, use nice numbers, and only chase precision if two options are close.\n- Step 3: USE g = 10, never 9.81. The paper itself gives g = 10 N kg⁻¹ — the arithmetic is meant to be clean.\n- Step 4: READ THE MAGNITUDE of the answer options first. They tell you the scale and let you sanity-check instantly.\n+ Why: ~27 questions in 40 minutes (~89 s each), no calculator, no formula sheet. The rigour that earns A-level marks COSTS you time here. Recognise → shortcut → answer.", "source": "lesson", "_id": 17}], "models": {}, "meta": {"lesson": {"run": "lesson", "provider": "direct", "model": "opus-4.8-revision-guide", "display": "Opus Revision Guide", "temperature": 0, "in_tokens": 0, "out_tokens": 0, "reasoning_chars": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 12432}}};

let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
