k": true}, {"question": "A motor on a constant voltage $$V$$ supply draws current $$I$$ for time $$t$$. Write the formula for the electrical energy delivered by the supply. If the system is not 100% efficient, which energy does this formula actually calculate? (2 steps)", "answer": "- Step 1: The electrical energy is $$E = Pt = IVt$$.\n- Step 2: If the system is not perfectly efficient, this formula calculates the **input** energy delivered by the supply, not the useful output energy (like $$mgh$$). The useful output will be some fraction $$\\eta$$ of this input.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A nuclide is written as $${}^{A}_{Z}X$$. State the changes in $$A$$ and $$Z$$ for alpha decay and beta-minus decay, and explain the physical reasoning. (3 steps)", "answer": "- Step 1: Alpha decay emits a helium nucleus $${}^{4}_{2}He$$, so $$\\Delta A = -4$$ and $$\\Delta Z = -2$$.\n- Step 2: Beta-minus decay occurs when a neutron turns into a proton, emitting an electron $${}^{\\;\\;0}_{-1}e$$. Since a nucleon is conserved and charge increases by 1, $$\\Delta A = 0$$ and $$\\Delta Z = +1$$.\n- Step 3: Gamma emission is just electromagnetic radiation from the nucleus and changes neither $$A$$ nor $$Z$$ ($$\\Delta A = 0, \\Delta Z = 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "In a nuclear decay chain involving both alpha and beta-minus decays, what is the \"one fact\" that allows you to quickly crack the sequence, and why? (2 steps)", "answer": "- Step 1: **Only alpha decay changes the mass number.** Beta-minus leaves $$A$$ untouched.\n- Step 2: Therefore, the mass number can only ever sit at its starting value or drop in steps of 4. The number of alphas completely fixes the mass number at any stage. You should always read the mass number first, then worry about the atomic number.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "In any nuclear reaction, what two quantities are conserved, and how do you treat a free neutron $${}^{1}_{0}n$$ algebraically? (2 steps)", "answer": "- Step 1: The mass number $$A$$ (top numbers) and atomic number $$Z$$ (bottom numbers) are conserved. The sum on the left must equal the sum on the right for both.\n- Step 2: A free neutron carries mass number 1 but atomic number 0. It counts in the $$A$$ balance but contributes nothing to the $$Z$$ balance. Treat unknowns as algebra and write down the two balance equations.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "On a velocity-time graph, what does the area between the line and the time axis physically represent? List the three simple shapes and their area formulas. (3 steps)", "answer": "- Step 1: The area represents the **distance travelled**.\n- Step 2: Rectangle (constant velocity): area $$= v \\times t$$.\n- Step 3: Triangle (starting or ending at zero): area $$= \\frac{1}{2} b h$$. Trapezium (velocity changes linearly between two non-zero values): area $$= \\frac{u+v}{2} \\times t$$, which is average velocity times time.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A car decelerates uniformly from $$30 \\text{ m/s}$$ to $$10 \\text{ m/s}$$ over 60 seconds. To find the distance, why is it wrong to use $$d = v \\times t$$ with just one velocity? (2 steps)", "answer": "- Step 1: Using $$v \\times t$$ with just one velocity assumes constant speed, which would give a rectangle under the graph. But the car is decelerating, so the speed is continuously changing.\n- Step 2: Because the velocity drops from a non-zero value to another non-zero value, the region under the graph is a **trapezium**, not a rectangle. You must use the average velocity $$\\frac{u+v}{2}$$, not just one endpoint.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A gamma-ray source emits two rays simultaneously in opposite directions toward two detectors. If the rays arrive with a time difference $$\\Delta t$$, what is the formula for the path difference, and what is the physical logic? (2 steps)", "answer": "- Step 1: Both rays travel at the same speed $$v$$. The extra distance one covers is the path difference: $$\\Delta x = v \\times \\Delta t$$.\n- Step 2: The logic is identical to two cars driving at the same speed; if one arrives earlier, it must have travelled a shorter distance, and the difference in their distances is simply speed times the time gap.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A source sits a distance $$x$$ from the midpoint between two detectors (which are $$d$$ apart). Explain why the path difference between the two rays is $$2x$$, not $$x$$. (3 steps)", "answer": "- Step 1: If the source is at the midpoint, both paths are equal (length $$d/2$$), so the path difference is 0.\n- Step 2: Shifting the source by $$x$$ towards one detector makes that path $$x$$ shorter (length $$d/2 - x$$) and the opposite path $$x$$ longer (length $$d/2 + x$$).\n- Step 3: The path difference is the difference between these: $$(d/2 + x) - (d/2 - x) = 2x$$. Moving the source by $$x$$ changes the path difference by $$2x$$, so the displacement is half the path difference.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "In the PET scanner problem, the detectors are $$3.0 \\text{ m}$$ apart. Why does this number never enter the calculation for the source's displacement? (2 steps)", "answer": "- Step 1: The displacement $$x$$ only depends on the path difference ($$2x = v \\Delta t$$), which is derived entirely from the speed of light and the time delay.\n- Step 2: The total separation $$d$$ cancels out when you subtract the two path lengths. It is a distractor; recognizing which information actually matters is a key ESAT skill.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "To solve a quadratic inequality like $$2x^2 + x \\geq 15$$, what are the three essential steps? (3 steps)", "answer": "- Step 1: Make it equal to zero: $$2x^2 + x - 15 \\geq 0$$.\n- Step 2: Find the roots by factorising: $$(2x - 5)(x + 3) = 0 \\Rightarrow x = 2.5$$ or $$x = -3$$.\n- Step 3: Sketch the upward parabola cutting the axis at the roots. The curve is greater than or equal to zero *outside* the roots, so $$x \\leq -3$$ or $$x \\geq 2.5$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "In a nuclear equation $${}^{1}_{0}n + {}^{239}_{94}Pu \\rightarrow {}^{w}_{54}Xe + {}^{y}_{x}Zr + z {}^{1}_{0}n$$, a student writes the atomic number balance as $$94 = 54 + x + z$$. Why is this incorrect? (2 steps)", "answer": "- Step 1: The term $$z$$ represents the number of free neutrons emitted. A free neutron has an atomic number of 0.\n- Step 2: Therefore, $$z$$ contributes nothing to the $$Z$$ (atomic number) balance. The correct equation is simply $$94 = 54 + x$$, giving $$x = 40$$. The $$z$$ term only appears in the mass number ($$A$$) balance.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A nuclide $${}^{P}_{Q}X$$ decays to stable $$Y$$, emitting 1 alpha and 3 beta-minus particles. How do you quickly identify an impossible intermediate nuclide? (3 steps)", "answer": "- Step 1: Fix the mass number first. It can only be $$P$$ (no alpha yet) or $$P-4$$ (alpha done). Any other mass number is instantly impossible.\n- Step 2: For each allowed mass number, list the range of atomic numbers. Before the alpha (mass $$P$$), only 0-3 betas occur, so $$Z$$ can only be $$Q, Q+1, Q+2, Q+3$$ (never below $$Q$$). After the alpha (mass $$P-4$$), $$Z$$ is $$Q-2$$ plus 0-3 betas, giving $$Q-2, Q-1, Q, Q+1$$.\n- Step 3: The impossible option will be one that requires a lowered atomic number without a lowered mass number (e.g., $$P$$ with $$Q-1$$). To drop $$Z$$ you need an alpha, but an alpha also drops $$A$$, so you can't have the original mass number.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "A completely sealed, rigid steel container is full of water at $$10^\\circ\\text{C}$$. If you heat it to $$90^\\circ\\text{C}$$, what happens to the mass, volume, and density of the water *inside the container*? (2 steps)", "answer": "- Step 1: The mass remains unchanged because the container is sealed—no particles can enter or escape.\n- Step 2: Because the container is rigid, the volume of the water cannot increase (it is constrained by the steel walls). Since $$\\rho = m/V$$ and both $$m$$ and $$V$$ are fixed, the density remains the same. (Note: The pressure inside would increase dramatically, but not the density in this idealized constraint).", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A $$10\\text{ V}$$ motor lifts a $$5\\text{ kg}$$ mass by $$2\\text{ m}$$ in $$1\\text{ s}$$ (use $$g=10 \\text{ N/kg}$$). If the system is $$50\\%$$ efficient, what is the current drawn from the supply, and what would the current be if it were $$100\\%$$ efficient? (3 steps)", "answer": "- Step 1: Calculate useful output energy: $$E_{useful} = mgh = 5 \\times 10 \\times 2 = 100 \\text{ J}$$.\n- Step 2: For 100% efficiency, input energy is 100 J. Current would be $$I = \\frac{E}{Vt} = \\frac{100}{10 \\times 1} = 10 \\text{ A}$$.\n- Step 3: For 50% efficiency, the input energy must be larger: $$E_{input} = \\frac{100}{0.5} = 200 \\text{ J}$$. The current scales up proportionally: $$I = \\frac{200}{10 \\times 1} = 20 \\text{ A}$$. Efficiency always makes the input bigger.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A nuclide $${}^{200}_{80}X$$ decays by emitting 2 alpha particles and 1 beta-minus particle. What are the mass number $$A$$ and atomic number $$Z$$ of the final daughter nuclide? (3 steps)", "answer": "- Step 1: Two alpha decays reduce the mass number by $$2 \\times 4 = 8$$. The beta decay leaves the mass number unchanged. Final $$A = 200 - 8 = 192$$.\n- Step 2: Two alpha decays reduce the atomic number by $$2 \\times 2 = 4$$. The one beta decay increases it by 1. Net change in $$Z$$ is $$-4 + 1 = -3$$.\n- Step 3: Final $$Z = 80 - 3 = 77$$. The daughter nuclide is $${}^{192}_{77}Y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "On a velocity-time graph, a car decelerates uniformly from $$20 \\text{ m/s}$$ to rest in $$10 \\text{ s}$$. What shape is the area, and what is the distance? (2 steps)", "answer": "- Step 1: Because the final velocity is zero (rest), the shape under the graph is a **triangle**, not a trapezium.\n- Step 2: The area is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times 10 \\times 20 = 100 \\text{ m}$$. This is equivalent to using the trapezium formula with $$v=0$$: $$\\frac{20+0}{2} \\times 10$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "An electric motor pulls a car up a ramp, gaining $$10 \\text{ kJ}$$ of GPE. The motor is $$40\\%$$ efficient and the total electrical input energy is $$25 \\text{ kJ}$$. What is the total energy lost to the surroundings? (2 steps)", "answer": "- Step 1: Use the conservation of energy shortcut: $$E_{wasted} = E_{input} - E_{useful}$$.\n- Step 2: $$E_{wasted} = 25 \\text{ kJ} - 10 \\text{ kJ} = 15 \\text{ kJ}$$. The $$40\\%$$ efficiency is a distractor for this specific question. You don't need to calculate intermediate motor losses; just subtract the useful output from the total input.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}], "count": 30}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Solve the quadratic inequality $ 2x^2 + x \\geq 15 $. Describe the steps and explain why the solution is $ x \\leq -3 $ or $ x \\geq 2.5 $. (3 steps)", "answer": "- Step 1: Rearrange the inequality to standard form:  \n  $ 2x^2 + x - 15 \\geq 0 $.  \n- Step 2: Factorize the quadratic:  \n  $ (2x - 5)(x + 3) \\geq 0 $.  \n  Roots are $ x = 2.5 $ and $ x = -3 $.  \n- Step 3: Analyze the parabola’s direction and intervals:  \n  Since the coefficient of $ x^2 $ is positive, the parabola opens upward. The inequality $ \\geq 0 $ includes regions **outside** the roots (where the parabola is above the x-axis).  \n  + **Misconception probe:** Why not $ -3 \\leq x \\leq 2.5 $?  \n    The parabola is negative between the roots, so $ \\geq 0 $ excludes this interval.  \n\n**Takeaway:** Rearranging, factoring, and parabola direction determine the solution intervals.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "A car decelerates from $ 30 \\, \\text{m/s} $ to $ 10 \\, \\text{m/s} $ over $ 60 \\, \\text{s} $. Why is the distance traveled during deceleration calculated using a trapezium area, not a rectangle? (3 steps)", "answer": "- Step 1: Identify the shape under the $ v $-$ t $ graph:  \n  The velocity decreases linearly from $ 30 \\, \\text{m/s} $ to $ 10 \\, \\text{m/s} $, forming a **trapezium**, not a rectangle.  \n- Step 2: Apply the trapezium area formula:  \n  $ \\text{Area} = \\frac{u + v}{2} \\times t = \\frac{30 + 10}{2} \\times 60 = 20 \\times 60 = 1200 \\, \\text{m} $.  \n- Step 3: Contrast with a rectangle:  \n  Using $ v \\times t $ with a single velocity (e.g., $ 30 \\times 60 $) would overestimate the distance. The trapezium averages the velocities.  \n  + **Edge case:** If deceleration ends at $ 0 \\, \\text{m/s} $, the shape becomes a triangle (area $ \\frac{1}{2} \\times \\text{base} \\times \\text{height} $).  \n\n**Takeaway:** Trapezium area accounts for non-zero initial and final velocities.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When water is heated, why does its density decrease? How does this explain convection currents? (3 steps)", "answer": "- Step 1: Thermal expansion:  \n  Heating increases kinetic energy, particles spread out, and volume $ V $ increases.  \n- Step 2: Density relationship:  \n  For fixed mass $ m $, $ \\rho = m/V $. Increased $ V $ reduces $ \\rho $.  \n- Step 3: Convection mechanism:  \n  Less dense hot water rises, cooler denser water sinks, creating a circulating current.  \n  + **Contrast:** Fixed volume vs. fixed mass:  \n    - Fixed mass: $ \\rho $ decreases.  \n    - Fixed volume: Mass inside decreases as fluid expands and escapes.  \n\n**Takeaway:** Density changes drive convection via thermal expansion.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A motor lifts a car with $ 28 \\, \\text{kJ} $ input energy. The useful energy is $ mgh = 12 \\, \\text{kJ} $. Why is the wasted energy $ 16 \\, \\text{kJ} $, and why is efficiency irrelevant here? (2 steps)", "answer": "- Step 1: Conservation of energy:  \n  $ E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}} = 28 - 12 = 16 \\, \\text{kJ} $.  \n- Step 2: Efficiency is a distractor:  \n  Efficiency ($ \\eta = 75\\% $) would only be needed if $ E_{\\text{useful}} $ was unknown. Here, $ E_{\\text{useful}} $ is directly calculated via $ mgh $.  \n  + **Misconception:** Why not use $ \\eta $?  \n    Efficiency relates $ E_{\\text{useful}} = \\eta \\times E_{\\text{input}} $, but since $ E_{\\text{useful}} $ is already known, efficiency adds no value.  \n\n**Takeaway:** Wasted energy is the difference between total input and useful output.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In a PET scanner, two gamma rays arrive with a time difference of $ 4.0 \\times 10^{-10} \\, \\text{s} $. Why is the source displacement $ 6.0 \\, \\text{cm} $, not $ 12 \\, \\text{cm} $? (3 steps)", "answer": "- Step 1: Path difference from time delay:  \n  $ \\Delta x = v \\times t = (3.0 \\times 10^8) \\times (4.0 \\times 10^{-10}) = 0.12 \\, \\text{m} = 12 \\, \\text{cm} $.  \n- Step 2: Geometric factor $ 2x $:  \n  Shifting the source by $ x $ makes one path $ x $ longer and the other $ x $ shorter, so total path difference $ \\Delta x = 2x $.  \n- Step 3: Solve for displacement:  \n  $ 2x = 12 \\, \\text{cm} \\Rightarrow x = 6.0 \\, \\text{cm} $.  \n  + **Analogy:** Two cars moving at same speed: If one arrives $ \\Delta t $ later, their path difference is $ v \\Delta t $.  \n\n**Takeaway:** Path difference is twice the displacement from the midpoint.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Balance the nuclear equation $ ^1_0n + ^{239}_{94}\\text{Pu} \\rightarrow ^w_{54}\\text{Xe} + ^y_x\\text{Zr} + z^1_0n $. Why is option B ($ z = 240 - (w + y) $) correct? (3 steps)", "answer": "- Step 1: Conservation of mass number:  \n  $ 1 + 239 = w + y + z \\Rightarrow w + y + z = 240 $.  \n- Step 2: Conservation of atomic number:  \n  $ 0 + 94 = 54 + x \\Rightarrow x = 40 $.  \n- Step 3: Rearranging the mass balance:  \n  $ z = 240 - (w + y) $, which matches option B.  \n  + **Contrast:** Why not option F ($ 94 = w + y + 1 $)?  \n    It mixes atomic number (bottom) and mass number (top) terms.  \n\n**Takeaway:** Separate conservation laws for mass and atomic numbers.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "A motor lifts a $ 20 \\, \\text{kg} $ mass $ 6.0 \\, \\text{m} $ in $ 5.0 \\, \\text{s} $ with $ 80\\% $ efficiency. Why is the current $ 25 \\, \\text{A} $? (3 steps)", "answer": "- Step 1: Calculate useful energy:  \n  $ E_{\\text{useful}} = mgh = 20 \\times 10 \\times 6 = 1200 \\, \\text{J} $.  \n- Step 2: Ideal current (100% efficiency):  \n  $ I = E/(Vt) = 1200/(12 \\times 5) = 20 \\, \\text{A} $.  \n- Step 3: Adjust for efficiency:  \n  Input energy must be higher: $ I = 20 / 0.8 = 25 \\, \\text{A} $.  \n  + **Edge case:** What if efficiency were $ 50\\% $?  \n    $ I = 20 / 0.5 = 40 \\, \\text{A} $. Lower efficiency requires higher current.  \n\n**Takeaway:** Efficiency scales the input energy (and current) inversely.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "A decay chain emits one $ \\alpha $ and three $ \\beta^- $ particles. Why is $ (P, Q-1) $ an impossible nuclide? (3 steps)", "answer": "- Step 1: Mass number constraints:  \n  Only $ \\alpha $ changes mass number ($ A = P-4 $ after decay). $ \\beta^- $ leaves $ A $ unchanged.  \n- Step 2: Atomic number after $ \\alpha $:  \n  $ \\alpha $ decay reduces $ Z $ by 2, $ \\beta^- $ increases $ Z $ by 1 per decay.  \n  Final $ Z = Q-2 + 3 = Q+1 $.  \n- Step 3: Why $ (P, Q-1) $ is impossible:  \n  $ A = P $ implies no $ \\alpha $ decay yet, but $ Z = Q-1 $ requires $ \\alpha $ (which lowers $ A $). Contradiction.  \n  + **General rule:** Any $ Z < Q $ with $ A = P $ is invalid.  \n\n**Takeaway:** $ \\alpha $ decay always lowers mass number; $ Z $ cannot decrease without $ A $ decreasing.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}], "count": 8}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why does heating a fixed mass of water cause its density to decrease? (3 steps)", "answer": "- Step 1: Density is defined as $ \\rho = \\frac{m}{V} $. For a fixed mass $ m $, **volume $ V $ increases** when heated due to thermal expansion.  \n- Step 2: As $ V $ increases and $ m $ remains constant, the ratio $ \\frac{m}{V} $ decreases.  \n- Step 3: Example: If $ V $ doubles, density becomes $ \\frac{m}{2V} = \\frac{1}{2}\\rho $.  \n**Key takeaway:** Heating → expansion → lower density for fixed mass.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is the area under the deceleration phase of a velocity-time graph a trapezium and not a rectangle? (3 steps)", "answer": "- Step 1: A trapezium occurs when velocity **changes linearly between two non-zero values** (e.g., 30 m/s to 10 m/s).  \n- Step 2: Area = average velocity $ \\frac{u+v}{2} \\times t $, which accounts for both initial and final velocities.  \n- Step 3: Using only one velocity (e.g., $ v \\times t $) would ignore the changing speed.  \n**Example:** If $ u = 30 \\, \\text{m/s} $, $ v = 10 \\, \\text{m/s} $, time = 60 s:  \n$ \\text{Area} = \\frac{30+10}{2} \\times 60 = 20 \\times 60 = 1200 \\, \\text{m} $.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does the efficiency of a system affect the relationship between input energy and useful output energy? (2 steps)", "answer": "- Step 1: Efficiency $ \\eta = \\frac{E_{\\text{useful}}}{E_{\\text{input}}} $. For $ \\eta < 100\\% $, $ E_{\\text{input}} > E_{\\text{useful}} $.  \n- Step 2: To find $ E_{\\text{input}} $, rearrange: $ E_{\\text{input}} = \\frac{E_{\\text{useful}}}{\\eta} $.  \n**Key insight:** Lower efficiency requires **more input energy** to achieve the same useful output.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "In a nuclear decay chain starting with mass number $ A $, what mass numbers are possible at any stage? (2 steps)", "answer": "- Step 1: Only alpha decay changes $ A $ (reduces by 4). Beta decay leaves $ A $ unchanged.  \n- Step 2: Possible mass numbers are $ A $ (before any alpha) and $ A-4k $ (after $ k $ alphas).  \n**Example:** If $ A = 236 $, possible values: $ 236, 232, 228, \\dots $.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the path difference between two gamma rays in a PET scanner equal to $ 2x $ when the source is displaced by $ x $ from the midpoint? (3 steps)", "answer": "- Step 1: Let the source move $ x $ toward one detector. The closer path shortens by $ x $, and the farther path lengthens by $ x $.  \n- Step 2: Path difference = $ (d+x) - (d-x) = 2x $.  \n- Step 3: Example: If $ x = 6 \\, \\text{cm} $, difference = $ 12 \\, \\text{cm} $.  \n**Key takeaway:** Movement of $ x $ creates a **proportional 2x path difference**.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does the volume of a fixed mass of water affect its density during thermal expansion? (2 steps)", "answer": "- Step 1: Heating causes particles to spread out, increasing volume $ V $.  \n- Step 2: Since $ \\rho = \\frac{m}{V} $, increased $ V $ reduces density.  \n**Common misconception:** Fixed volume would retain mass, but fixed mass means **volume increases**, lowering density.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What is the gravitational potential energy (GPE) gained by lifting a 20 kg mass 6.0 m vertically? (1 step)", "answer": "- Step 1: $ E_{\\text{GPE}} = mgh = 20 \\times 10 \\times 6 = 1200 \\, \\text{J} $.  \n**Why this works:** GPE depends only on vertical height $ h $, not on the path or efficiency.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the mass number of a nuclide unchanged during beta-minus decay? (2 steps)", "answer": "- Step 1: Beta decay converts a neutron ($ ^1_0n $) to a proton ($ ^1_1p $), emitting an electron ($ ^0_{-1}e $).  \n- Step 2: Total nucleons (mass number $ A $) stay the same; only atomic number $ Z $ increases by 1.  \n**Example:** $ ^{40}_{19}X \\rightarrow ^{40}_{20}Y + ^0_{-1}e $.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does the efficiency of an electric motor affect the current drawn from a 12 V supply when lifting a 20 kg mass? (3 steps)", "answer": "- Step 1: Useful output energy: $ E_{\\text{useful}} = mgh = 20 \\times 10 \\times 6 = 1200 \\, \\text{J} $.  \n- Step 2: For 80% efficiency, input energy $ E_{\\text{input}} = \\frac{1200}{0.8} = 1500 \\, \\text{J} $.  \n- Step 3: Current $ I = \\frac{E}{Vt} = \\frac{1500}{12 \\times 5} = 25 \\, \\text{A} $.  \n**Key insight:** Lower efficiency requires **higher current** for the same work.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is a nuclide with $ A = P $ and $ Z = Q-1 $ impossible in a decay chain with one alpha and three beta decays? (3 steps)", "answer": "- Step 1: Alpha decay reduces $ A $ by 4 and $ Z $ by 2. Beta decay increases $ Z $ by 1.  \n- Step 2: After 1 alpha and 3 betas:  \n  $ Z = Q - 2 + 3 = Q + 1 $.  \n- Step 3: If $ A = P $, no alpha decay has occurred, so $ Z $ cannot decrease.  \n**Conclusion:** A lower $ Z $ with original $ A $ is **impossible**.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A car decelerates from 30 m/s to 10 m/s over 60 seconds. What is the distance travelled during this deceleration? (2 steps)", "answer": "- Step 1: Identify the shape — since both initial and final velocities are non-zero, the region is a trapezium, not a rectangle\n- Step 2: Use average velocity × time: distance $= \\frac{u+v}{2} \\times t = \\frac{30+10}{2} \\times 60 = \\frac{40}{2} \\times 60 = 20 \\times 60 = 1200$ m\n\nThe trap is using just one velocity (like $30 \\times 60$) — that gives a rectangle area, which is wrong when velocity changes linearly between two non-zero values.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why is the area under a velocity-time graph equal to the distance travelled, not the displacement?", "answer": "Velocity is speed with direction; when you multiply velocity by time ($v \\times t$), you get a displacement vector. However, when the velocity is always positive (moving in one direction), the displacement equals the distance travelled. If the object reverses direction, the area below the axis subtracts, giving net displacement while the total area (ignoring sign) gives total distance. The ESAT assumes unidirectional motion unless stated otherwise.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "When water in a saucepan is heated from below, two of these statements are true: (1) The mass of a fixed volume of water increases, (2) The density of a fixed mass of water decreases, (3) The volume of a fixed mass of water increases. Which statements explain convection currents? (3 steps)", "answer": "- Step 1: Heating causes water molecules to gain kinetic energy and spread apart — this is thermal expansion, so statement 3 is true (volume increases)\n- Step 2: For a fixed mass, density $= m/V$. If $V$ increases and $m$ stays the same, density decreases — statement 2 is true\n- Step 3: Statement 1 is false — heating does not create new matter; the mass of any sample stays the same. If you constrain the volume, some water may exit, decreasing the mass inside\n\nThe convection mechanism: heated water expands → density decreases → less dense water rises → cooler denser water sinks → this循环 is the convection current. Statements 2 and 3 only (answer G).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain why \"density of a fixed mass\" decreases on heating, but \"mass of a fixed volume\" does not increase.", "answer": "These sound similar but are fundamentally different scenarios:\n- \"Fixed mass\": You have the same number of water molecules. When heated, they spread further apart → volume increases → density $= m/V$ decreases because $V$ is in the denominator\n- \"Fixed volume\": You mark a region of space. When heated, water expands but some flows out of that region. The mass inside actually decreases (or stays the same at best), not increases. Mass is conserved; it doesn't appear from nowhere.\n\nThis distinction is tested explicitly — always identify which quantity is held fixed before reasoning.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A motor lifts a 1200 kg car vertically 1.0 m. The total input energy is 28 kJ. What is the energy lost to the surroundings? (2 steps)", "answer": "- Step 1: Identify the useful energy — the gain in gravitational potential energy: $E_{useful} = mgh = 1200 \\times 10 \\times 1.0 = 12,000$ J = 12 kJ\n- Step 2: Energy conservation: $E_{wasted} = E_{input} - E_{useful} = 28 - 12 = 16$ kJ\n\nThe 75% efficiency mentioned in the question is a distractor — you don't need it at all. The total energy lost is simply input minus useful output. Answer D (16 kJ).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In the previous question, what is the purpose of the efficiency value (75%) if not needed for finding wasted energy?", "answer": "The efficiency would be needed if you were asked something like \"what is the motor's internal loss?\" or \"what is the useful output energy from the motor before the ramp?\" In that case: motor output $= 0.75 \\times 28$ kJ = 21 kJ, and motor loss $= 0.25 \\times 28$ kJ = 7 kJ. Then you'd subtract the 12 kJ of actual useful work to find additional losses. But for \"total energy lost to surroundings,\" the direct route is always: wasted = input - useful. Always ask what the question actually wants before reaching for every piece of data.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "In a PET scanner, two gamma-rays are emitted simultaneously from a source and travel at $3.0 \\times 10^8$ m/s. They arrive at detectors with a time difference of $4.0 \\times 10^{-10}$ s. What is the path difference between the two gamma-rays? (2 steps)", "answer": "- Step 1: Both gamma-rays travel at the same speed. The extra distance the slower-arriving one covers equals speed × time difference\n- Step 2: $d = v \\times t = (3.0 \\times 10^8) \\times (4.0 \\times 10^{-10}) = 12 \\times 10^{-2}$ m = 12 cm\n\nThink of it like two cars driving at the same speed — if one arrives 20 seconds later, it traveled $v \\times 20$ metres further. Same logic applies to the gamma-rays.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "The path difference between the two gamma-rays in the PET scanner is found to be 12 cm. If the source is moved from the midpoint towards one detector, how far from the midpoint is the source? (2 steps)", "answer": "- Step 1: When the source moves a distance $x$ from the midpoint toward one detector, one path becomes longer by $x$ while the other becomes shorter by $x$\n- Step 2: The path difference $= (d+x) - (d-x) = 2x$. So $2x = 12$ cm, giving $x = 6.0$ cm\n\nThe key insight: shifting the source by $x$ changes the path difference by $2x$, not by $x$. This is because one path gets longer AND the other gets shorter simultaneously. The answer is 6.0 cm, not 12 cm.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "In a nuclear fission reaction, a plutonium-239 nucleus absorbs a neutron and splits: $$^1_0n + ^{239}_{94}Pu \\rightarrow ^w_{54}Xe + ^y_xZr + z^1_0n$$ What must be true about the unknowns? (3 steps)", "answer": "- Step 1: Balance mass numbers (top numbers): $1 + 239 = w + y + z$, so $w + y + z = 240$\n- Step 2: Balance atomic numbers (bottom numbers): $0 + 94 = 54 + x + 0$, so $x = 40$ (neutrons have $Z = 0$, so $z$ doesn't appear in this equation)\n- Step 3: Rearranging the mass balance: $z = 240 - (w + y)$, which is option B\n\nCommon mistakes: including neutrons in the atomic number balance (wrong — neutrons have $Z = 0$), or confusing which variables go in which balance equation. Always write both balance equations before checking options.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In Q10, why is $z$ (the number of neutrons produced) not included in the atomic number balance equation?", "answer": "A neutron has mass number $A = 1$ (it contributes to the nucleon count) but atomic number $Z = 0$ (it has no protons). In nuclear equations, you balance $A$ separately from $Z$. Neutrons contribute to mass conservation but not to charge conservation. This is why the atomic number equation is simply $94 = 54 + x$, giving $x = 40$.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "An electric motor lifts a 20 kg mass through 6.0 m in 5.0 s using a 12 V supply. The system is 80% efficient. What current flows from the supply? (3 steps)", "answer": "- Step 1: Useful output energy = gain in GPE: $E_{useful} = mgh = 20 \\times 10 \\times 6.0 = 1200$ J\n- Step 2: If 100% efficient, the supply would need to deliver 1200 J. The current would be $I = E/Vt = 1200/(12 \\times 5) = 20$ A\n- Step 3: But the system is only 80% efficient, so input must be larger: $I_{actual} = 20/0.8 = 25$ A\n\nThe efficiency always increases the input when converting from useful to input — divide by efficiency, not multiply. The answer is 25 A.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Q12, if you divided by efficiency and got a smaller number (e.g., 20 × 0.8 = 16 A), why would that be physically wrong?", "answer": "An 80% efficient motor must draw MORE electrical energy than it usefully delivers because 20% is wasted. If you calculate the ideal current (20 A) and then multiply by 0.8, you'd get 16 A — but that would imply the motor needs less current to do the same useful work when it's inefficient, which contradicts physics. Always divide by efficiency (or multiply by 1/efficiency) when converting useful → input.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A nuclide $^{P}_{Q}X$ decays to a stable nuclide by emitting one alpha particle and three beta-minus particles. Which of these could NOT be formed at any stage: (P, Q-1), (P, Q+1), (P-4, Q), or (P-4, Q+1)? (3 steps)", "answer": "- Step 1: Alpha decay changes mass number by -4 and atomic number by -2. Beta-minus decay changes mass number by 0 and atomic number by +1\n- Step 2: The mass number can only be $P$ (no alpha yet) or $P-4$ (after the alpha). It can NEVER be anything else\n- Step 3: If mass = $P$ (alpha not yet happened), only betas have occurred, so atomic number can only be $Q, Q+1, Q+2, Q+3$ — it can NEVER be below $Q$. The option (P, Q-1) is impossible because lowering atomic number requires alpha, but alpha also lowers mass number to P-4. You can't have reduced Z with original mass P\n\nAnswer: (P, Q-1) is the impossible nuclide (option A).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "In the decay chain question, why is mass number P with atomic number Q-1 impossible, but P-4 with atomic number Q-2, Q-1, Q, or Q+1 all possible?", "answer": "The key is understanding what each decay type does:\n- Beta-minus only changes atomic number (+1), never mass number. So if you haven't emitted an alpha yet, mass stays at P, and Z can only increase (Q, Q+1, Q+2, Q+3 for 0-3 betas)\n- Alpha changes BOTH mass (-4) and atomic number (-2). So after the alpha, mass is P-4 and Z becomes Q-2 plus whatever betas afterward (0 to 3 more)\n\nTo have reduced atomic number (below Q), you must have had an alpha — but alpha automatically reduces mass to P-4. You cannot have Q-1 with mass P: that would require lowering Z without lowering A, which no decay can do.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "For the ESAT exam, why should you use g = 10 N/kg instead of 9.81 N/kg?", "answer": "The ESAT provides g = 10 N/kg in the question stem, and all answer choices are calculated with this value. Using 9.81 would give you a number that doesn't match any option. The exam is designed so that all arithmetic is clean and doable mentally — 10 makes calculations like $1200 \\times 10 \\times 1 = 12000$ trivial. Never use 9.81 in ESAT.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In ESAT multiple-choice, why is it dangerous to work through every question in numerical order?", "answer": "The ESAT has ~27 questions in 40 minutes (≈89 seconds each). Some questions are quick once you spot the physics; others require more time. The strategy is: scan the paper, identify questions you can do fast, bank those marks first, then return to harder ones. Working sequentially wastes time on questions you could do quickly while you're stuck on ones that need more thought. This is \"banking easy marks\" — it's strategic, not lazy.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "A question gives you many numbers, but some are distractors. How do you identify which information actually matters in ESAT?", "answer": "Before computing, ask: \"What is this question actually about?\" Identify the physics topic (convection, energy conservation, path difference, nuclear balance). Then ask: \"What is the one key relationship I need?\" For example, in the PET scanner question (Q8), the 3.0 m detector separation never enters the calculation — you only need the speed and time difference. Tom calls this \"decide which information matters.\" The exam deliberately includes irrelevant numbers to test whether you can filter them out.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why does heating a fixed mass of water cause its density to decrease, rather than its mass to increase?", "answer": "Density is mass per unit volume: $\\rho = m/V$. When you heat the water, you add thermal energy but not matter — the number of H₂O molecules stays exactly the same. The heat makes molecules vibrate more vigorously and push further apart on average, increasing the volume V. Since m is fixed and V increases, $\\rho$ must decrease. Mass is conserved in heating; only volume changes. This is why statement 1 (\"mass of fixed volume increases\") is wrong in the convection question.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A car travels at constant velocity for some time, then decelerates to a lower constant velocity. On a v-t graph, what shape represents the distance travelled during each phase? (2 steps)", "answer": "- Step 1: Constant velocity section: rectangle (height = velocity, width = time). Area = v × t\n- Step 2: Deceleration section (from velocity u to v over time t): trapezium. Area = average velocity × time = (u + v)/2 × t. The classic error is treating this as a rectangle using just one velocity\n\nAlways identify which section of the graph the question asks about first, then decide the shape.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In energy conservation problems, when would you actually need to use the efficiency value, and when can you ignore it?", "answer": "You need efficiency when the question asks about:\n- Input power/energy required to achieve a given useful output\n- Internal losses within a machine\n- The actual current drawn by a motor (like Q12)\n\nYou can IGNORE efficiency when the question asks:\n- Total energy lost/wasted = input - useful (like Q6)\n- When given both input AND useful directly\n\nThe pattern: if you have input and useful, you don't need efficiency to find wasted. Only use efficiency when you have one and need the other.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In nuclear balancing, what is a \"free neutron\" represented as, and what numbers does it contribute to each balance?", "answer": "A free neutron is written as $^1_0n$:\n- Mass number (top): 1 — it contributes to the A balance\n- Atomic number (bottom): 0 — it contributes NOTHING to the Z balance\n\nThis is crucial in Q10 and similar problems. When balancing atomic numbers, ignore neutrons entirely since they add zero charge. When balancing mass numbers, they add 1 each.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In the PET scanner, the source was at the midpoint initially and both gamma-rays arrived simultaneously. When there's a time delay, why does the source move closer to the detector that receives the gamma-ray first?", "answer": "If the source moves toward detector A, the path to A becomes shorter (the gamma-ray arrives sooner), while the path to B becomes longer (the gamma-ray arrives later). So the detector that registers first is the one the source moved toward. The time delay tells you which detector is closer to the source — the one with the shorter path gets the gamma-ray earlier.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A motor system is 80% efficient. If you calculate the ideal current needed as 20 A, what mathematical operation gives the actual current, and why?", "answer": "You DIVIDE by the efficiency: $I_{actual} = I_{ideal} / \\eta = 20 / 0.8 = 25$ A.\n\nWhy division? Efficiency = useful output / total input. Rearranging: input = useful / efficiency. Since efficiency is less than 1, dividing by it makes the input larger than the useful. This is always true: a real (inefficient) system requires MORE input energy than the useful energy it produces.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In a decay chain with one alpha and three betas, what are all the possible mass numbers and atomic numbers that can appear at any stage?", "answer": "Mass numbers:\n- Before alpha: P (only betas have occurred, betas don't change A)\n- After alpha: P-4 (alpha reduces A by 4)\n\nAtomic numbers (before alpha, with 0-3 betas): Q, Q+1, Q+2, Q+3\nAtomic numbers (after alpha, with 0-3 subsequent betas): Q-2, Q-1, Q, Q+1\n\nAny (A, Z) pair outside these two sets is impossible. For mass P, Z can only be Q or above. For mass P-4, Z can be Q-2 through Q+1.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why might two answer choices in ESAT look plausible, and how should you decide between them?", "answer": "Often the exam includes one answer that's the \"obvious\" number you get by forgetting a key step (like forgetting to halve the path difference, or forgetting efficiency). The correct answer typically requires one more step or one correction. For example:\n- In Q8: 12 cm (path diff) vs 6 cm (actual displacement)\n- In Q12: 20 A (without efficiency) vs 25 A (with efficiency)\n\nWhen torn between two answers, ask: \"What extra step am I missing?\" The harder answer is often the right one.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For a velocity-time graph question asking specifically about deceleration, what two things must you check before calculating?", "answer": "- Check WHAT section: Is it the whole journey or just the decelerating part? Read the wording carefully — \"while decelerating\" means only the relevant time interval\n- Check the SHAPE: Is it a trapezium (velocity drops from non-zero to non-zero) or a triangle (drops to zero)? Using the wrong geometric shape is the most common error", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In convection, why does the water at the bottom of a heated saucepan rise, while cooler water sinks?", "answer": "The heat source warms the water at the bottom first. This water expands (volume increases). For a fixed mass, increased volume means decreased density ($\\rho = m/V$). The less-dense hot water experiences an upward buoyant force from the surrounding cooler, denser water — it rises. Cooler water, being denser, sinks to take its place. This density-driven circulation is the convection current. The key causal chain: heat → expansion → lower density → rises.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "A quadratic inequality $ax^2 + bx + c \\geq 0$ has roots at $x = r_1$ and $x = r_2$ (where $r_1 < r_2$). How do you determine which regions satisfy the inequality?", "answer": "For an upward-opening parabola ($a > 0$):\n- The expression is POSITIVE (≥ 0) OUTSIDE the roots: $x \\leq r_1$ or $x \\geq r_2$\n- The expression is NEGATIVE between the roots: $r_1 \\leq x \\leq r_2$\n\nFor a downward-opening parabola ($a < 0$), it's the opposite. Always sketch the parabola first — the visual makes clear which region lies above the x-axis.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Why is it useful to round numbers aggressively in ESAT mental math, and what are the limits of approximation?", "answer": "ESAT has no calculator — aggressive rounding makes calculations doable: $1200 \\times 10 \\times 1 = 12000$ is easy; $1200 \\times 9.81 \\times 1.02$ is not. Approximate when:\n- The answer options are widely spaced (no precision needed)\n- You're doing a sanity check\n\nHowever, if answer options are close together (e.g., 6.0 cm vs 6.2 cm), you need more precision. The key: check the magnitude of answer options first — they tell you the scale and help you spot massive errors immediately.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the nuclear fission equation, if you misremember that neutrons have atomic number 1 instead of 0, what would go wrong?", "answer": "If you thought $^1_1n$ (which doesn't exist — that's a proton), you'd incorrectly include neutrons in the atomic number balance. You'd write something like $0 + 94 = 54 + x + z$, then get confused about what $z$ is. This would lead to wrong values for $x$ and wrong conclusions. Remember: free neutron = $^1_0n$ — mass 1, charge 0. Only protons have $Z = 1$.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A student solves Q6 (energy lost) by first computing motor output = 0.75 × 28 = 21 kJ, then motor loss = 0.25 × 28 = 7 kJ, then subtracting 12 kJ to get 9 kJ. What's wrong with this approach, and why does the direct method work?", "answer": "This approach is not wrong in principle — 21 kJ (motor output) - 12 kJ (useful) = 9 kJ lost after the motor, plus 7 kJ motor loss = 16 kJ total. But it's unnecessary complication. The direct method recognizes that \"total energy lost to surroundings\" simply means \"what wasn't used for the useful output.\" Input - useful = wasted. The extra steps (computing motor efficiency breakdown) are irrelevant to the question asked — they add time without changing the answer. Always ask what the question actually wants before computing intermediate values.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}], "count": 31}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A car's velocity-time graph shows: 0-25s: accelerates 0→30 m/s; 25-50s: constant 30 m/s; 50-110s: decelerates uniformly 30→10 m/s; 110-150s: constant 10 m/s. What is the distance travelled during the deceleration phase (50-110s)? (2 steps)", "answer": "- Step 1: Identify the shape. Since velocity drops from 30 to 10 m/s (both non-zero), the area under this section is a trapezium, not a rectangle.\n- Step 2: Calculate using average velocity × time: distance = (30 + 10)/2 × (110 - 50) = 20 × 60 = 1200 m\n\nThe trap: using just one velocity (e.g., 30 × 60 = 1800 m) gives the wrong answer. The average of the two velocities must be used.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "On a velocity-time graph, what does the area between the graph line and the time axis represent, and why is it important to identify the correct section of the graph before calculating? (2 steps)", "answer": "- Step 1: The area represents the distance travelled (displacement if considering direction). This follows from the definition: distance = velocity × time, and integrating velocity over time gives total distance.\n- Step 2: Different sections of the same graph may represent different motions (acceleration, constant velocity, deceleration). Each section has its own geometric shape (triangle, rectangle, trapezium). Always read what the question asks for — it may want only one specific section, not the total journey.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "When water in a saucepan is heated from below, three statements are considered: (1) The mass of a fixed volume of water increases. (2) The density of a fixed mass of water decreases. (3) The volume of a fixed mass of water increases. Which statements explain how convection currents form? (2 steps)", "answer": "- Step 1: Heating causes water particles to gain kinetic energy and spread apart. The mass remains constant (no particles added or removed), but volume increases. This is statement 3: volume of a fixed mass increases.\n- Step 2: Since density ρ = m/V, if mass m is fixed and volume V increases, density decreases. This is statement 2. The less dense hot water rises, cooler denser water sinks — this circulating flow is the convection current. Statement 1 is wrong because mass is conserved; heating does not create new matter.\n\nAnswer: statements 2 and 3 (option G).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Explain why \"density of a fixed mass\" and \"mass of a fixed volume\" behave differently when a substance is heated. Why is this distinction crucial in convection problems? (2 steps)", "answer": "- Step 1: \"Density of a fixed mass\" means we take a sample of material and heat it. Mass stays the same, volume increases → density decreases. This is what happens to the heated water at the bottom of the pan.\n- Step 2: \"Mass of a fixed volume\" means we mark out a fixed region of space (like a box) and see how much mass is inside it. As the fluid expands, some of it flows out of that region, so the mass inside the fixed volume actually decreases, not increases. ENGAA questions exploit this wording difference — always identify which quantity is being held fixed.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A motor pulls a 1200 kg car up a ramp to a vertical height of 1.0 m. The total input energy is 28 kJ and the motor is 75% efficient. What is the total energy lost to the surroundings? (2 steps)", "answer": "- Step 1: The useful energy is the gravitational potential energy gained: E_useful = mgh = 1200 × 10 × 1.0 = 12,000 J = 12 kJ\n- Step 2: Total energy lost = input - useful = 28 kJ - 12 kJ = 16 kJ\n\nThe efficiency (75%) is a distractor for this question. You don't need it because the wasted energy is simply the difference between total input and useful output.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In an energy conservation problem, when given the efficiency percentage of a machine, should you always use it in your calculation? Explain with an example from the study material. (2 steps)", "answer": "- Step 1: No — efficiency is only needed when the question asks for something relating to the internal workings of the machine (like motor losses). If asked for total wasted energy and you know both input and useful output, you can find waste directly.\n- Step 2: In Q6, the 75% efficiency was irrelevant because the question asked for \"total energy lost to surroundings\" — which is simply E_input - E_useful. Using efficiency would give the same answer but via unnecessary extra steps. The skill is recognizing which information actually matters.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In a PET scanner, two gamma-ray detectors are 3.0 m apart. A source at the midpoint emits two gamma rays simultaneously in opposite directions; they arrive at the same time. When the source shifts from the midpoint, the gamma rays arrive with a time difference of 4.0 × 10⁻¹⁰ s. The gamma rays travel at 3.0 × 10⁸ m/s. How far is the source from the midpoint? (3 steps)", "answer": "- Step 1: Convert time difference to path difference: Δx = v × Δt = (3.0 × 10⁸) × (4.0 × 10⁻¹⁰) = 12 × 10⁻² m = 12 cm. This is the difference in distance traveled by the two gamma rays.\n- Step 2: Understand the geometry. If the source moves a distance x from the midpoint toward one detector, one path becomes longer by x, the other shorter by x. The path difference = (d+x) - (d-x) = 2x.\n- Step 3: Therefore, 2x = 12 cm, so x = 6.0 cm. The 3.0 m detector separation is irrelevant — it's a distractor.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Why does moving a source by a distance x from the midpoint create a path difference of 2x, not x? Use a mental model to explain. (2 steps)", "answer": "- Step 1: When the source is exactly at the midpoint, both paths are equal (say, distance d each). The path difference is zero.\n- Step 2: Move the source distance x toward detector A. Now the path to A is d - x (shorter), and the path to B is d + x (longer). The difference = (d + x) - (d - x) = 2x. The source moving closer to one detector makes one path shorter AND the other path longer simultaneously — that's why the effect doubles.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A plutonium-239 nucleus absorbs a neutron and undergoes fission: ^1₀n + ²³⁹₉₄Pu → ^w₅₄Xe + ^yₓZr + z^1₀n. Which option correctly represents the relationship between the unknowns? (2 steps)", "answer": "- Step 1: Apply conservation laws. Mass number: 1 + 239 = w + y + z → w + y + z = 240. Atomic number: 0 + 94 = 54 + x + 0 → x = 40.\n- Step 2: Rearranging the mass equation: z = 240 - (w + y). This is option B. Other options fail: C wrongly involves z with x; D and E incorrectly solve for x; F mixes mass numbers into atomic number balance.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In a nuclear equation, why does the atomic number balance ignore free neutrons (^1₀n) but the mass number balance includes them? (2 steps)", "answer": "- Step 1: A neutron has mass number A = 1 (it's a nucleon) but atomic number Z = 0 (no protons).\n- Step 2: When balancing, atomic number (proton count) must be conserved. Since neutrons contribute zero to the proton total, they drop out of the Z-balance equation entirely. But they DO count toward mass number (total nucleons), so they must be included in the A-balance.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "An electric motor on a 12 V supply lifts a 20 kg mass through 6.0 m in 5.0 s. The system is 80% efficient. What current does the motor draw? (3 steps)", "answer": "- Step 1: Useful output energy = mgh = 20 × 10 × 6.0 = 1200 J\n- Step 2: If 100% efficient, current would be I = E/Vt = 1200/(12 × 5) = 20 A\n- Step 3: But efficiency is 80%, so input energy must be larger: input = useful/η = 1200/0.8 = 1500 J. Therefore I_actual = 1500/(12 × 5) = 25 A\n\nThe key: efficiency always makes the input BIGGER, so divide by efficiency to get the actual current.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In an efficiency problem, if you convert useful output to required input and your answer is SMALLER than the useful output number, what direction error have you likely made? (1 step)", "answer": "You've divided by efficiency when you should have divided (or multiplied in a different way). Remember: input = useful/η. Since η < 1, dividing makes the result LARGER. If your input is smaller than useful output, you've got the direction wrong — efficiency always means you need MORE input than the useful output gives.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "The nuclide ^P_QX decays to a stable nuclide Y, emitting one α-particle and three β⁻ particles. Which of the following is NOT possible at any stage: (P, Q-1), (P, Q+1), (P, Q+2), (P, Q+3), (P-4, Q-2), (P-4, Q-1), (P-4, Q), (P-4, Q+1)? (3 steps)", "answer": "- Step 1: α-decay changes mass number by -4 and atomic number by -2. β⁻-decay changes mass number by 0 and atomic number by +1.\n- Step 2: The mass number can only be P (no α yet) or P-4 (α has occurred). Before the α: only β⁻ decays have happened, so Z can be Q, Q+1, Q+2, Q+3. After the α: Z can be Q-2, Q-1, Q, Q+1.\n- Step 3: Option (P, Q-1) has mass P but atomic number Q-1. To reduce atomic number you need α, but α also reduces mass to P-4. You cannot have reduced Z with original mass. This is impossible.\n\nAnswer: A (P, Q-1)", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "In a nuclear decay chain, if you see an option with the ORIGINAL mass number but a LOWERED atomic number, why is it immediately identified as impossible? (2 steps)", "answer": "- Step 1: The only decay that reduces atomic number (Z) is α-decay, which also reduces mass number (A) by 4.\n- Step 2: If mass number is still the original value but atomic number has decreased, there's no combination of α and β decays that can produce this. β⁻ increases Z but leaves A unchanged; α decreases both. You cannot decrease Z without also decreasing A. Therefore such a nuclide cannot exist in the chain.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "For ESAT Physics, why should you use g = 10 m/s² rather than 9.81 m/s², and how does this help with mental calculations? (1 step)", "answer": "The exam explicitly states g = 10 N/kg, making all arithmetic \"nice.\" Calculations like 1200 × 10 × 1 = 12000 are straightforward. Using 9.81 introduces unnecessary decimal complexity when the test is designed for quick mental math. Approximation and clean numbers are the ESAT strategy.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What does it mean to \"identify the physics first\" in an ESAT question, and why is this more important than jumping straight to calculations? (2 steps)", "answer": "- Step 1: Before touching numbers, ask \"what is this question actually about?\" Name the topic (convection, energy conservation, path difference, nuclear balance). This reveals the one key idea needed.\n- Step 2: Most ENGAA questions have a short route once the physics is identified. The difficulty is often dressed up in the wording, not in the maths. Writing down the key concept first prevents getting lost in irrelevant details (like the 3.0 m detector separation in Q8).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In ESAT, why is it strategic to NOT answer questions in order, and how should you approach the exam paper? (2 steps)", "answer": "- Step 1: Scan the paper first and pick off questions you can do quickly. Bank those marks, then return to harder questions on a second pass.\n- Step 2: A question you can definitely answer is worth more than a difficult one you might answer. The easy questions often come from the opening maths warm-up and straightforward physics concepts. Don't grind through in sequence — manage your time like a resource.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A student calculates the current in Q12 as 20 A instead of 25 A, forgetting the efficiency. Explain the conceptual error and why the correct answer must be larger than 20 A. (2 steps)", "answer": "- Step 1: The student calculated I = E_useful/(Vt) = 20 A, which would be correct if the motor were 100% efficient.\n- Step 2: Since the system is only 80% efficient, not all electrical energy becomes useful mechanical energy. The motor must draw MORE electrical energy (and therefore more current) than the useful output would suggest. Input = useful/η = 1200/0.8 = 1500 J, giving 25 A. 25 A > 20 A, which makes physical sense: an imperfect machine requires more input than its useful output.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In the velocity-time graph question (Q2), a student calculates distance during deceleration as 30 × 60 = 1800 m, using just the initial velocity. Why is this wrong, and what does this reveal about graph reading? (2 steps)", "answer": "- Step 1: The student treated the deceleration section as a rectangle, using only one velocity (30 m/s). But the velocity is changing from 30 to 10 m/s, so the region is a trapezium.\n- Step 2: The correct approach uses average velocity: (30 + 10)/2 × 60 = 20 × 60 = 1200 m. The trap is identifying the shape of the area under the specific section being asked about — not assuming any section is a rectangle.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In the convection currents question (Q4), statement 1 (\"mass of a fixed volume increases\") is false. Why does heating not increase the mass contained in a fixed volume? (2 steps)", "answer": "- Step 1: Mass is conserved. Heating a substance does not create or destroy particles — it only changes their spacing.\n- Step 2: When a substance expands, some of it flows OUT of any fixed volume region. The mass inside a fixed volume actually decreases (or stays the same if no expansion occurs), not increases. The confusion comes from conflating \"heating increases mass\" (false) with \"heating increases volume\" (true).", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In Q8 (PET scanner), the detector separation of 3.0 m is never used in the calculation. How do you recognize when given information is a distractor in ESAT questions? (2 steps)", "answer": "- Step 1: After identifying the physics (path difference = v × Δt), check what quantities you actually need. The time difference and speed directly give path difference. The detector separation doesn't enter.\n- Step 2: Practice filtering: ask \"do I need this number to find the answer?\" If it's not in your key formula, it's likely a distractor. ENGAA deliberately includes irrelevant numbers to test whether you can identify the relevant physics.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A nuclide undergoes β⁻ decay three times followed by α decay. What are the changes in mass number (A) and atomic number (Z) after each decay? (2 steps)", "answer": "- Step 1: Each β⁻ decay: ΔA = 0, ΔZ = +1. After three β⁻ decays: A is unchanged, Z has increased by 3.\n- Step 2: The subsequent α decay: ΔA = -4, ΔZ = -2. Starting from original (A, Z), final nuclide has mass number A - 4 and atomic number Z + 3 - 2 = Z + 1.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In Q10 (nuclear fission), if you mistakenly included the neutrons in the atomic number balance, what would be wrong with your equation and answer? (1 step)", "answer": "You would incorrectly write 0 + 94 = 54 + x + z, trying to solve for x using the neutron count z. But neutrons have atomic number 0, so they contribute nothing to the Z-balance. The correct equation is simply 94 = 54 + x, giving x = 40. Including z in the atomic number balance is a conceptual error — neutrons don't carry charge.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For ESAT Physics, what mental math skills should you practice, and why are standard form calculations particularly important? (2 steps)", "answer": "- Step 1: Practice multiplying standard form: (3 × 10⁸) × (4 × 10⁻¹⁰) = 12 × 10⁻² = 0.12 = 12 cm. Also practice dividing by \"nice\" fractions: dividing by 0.8 = multiplying by 1.25.\n- Step 2: ESAT has no calculator. Every number is chosen so arithmetic is doable in your head. The exam tests whether you can ORGANIZE a calculation, not whether you can punch buttons. Powers of ten and quick fraction work are essential.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the energy question (Q6), a student computes motor loss as 0.25 × 28 = 7 kJ, then tries to reconcile this with the 12 kJ useful energy. Why is this approach unnecessary for finding total wasted energy? (2 steps)", "answer": "- Step 1: The student is working through the motor's internal losses (7 kJ) plus additional losses after the motor. While mathematically valid (7 + 9 = 16 kJ), it adds extra steps.\n- Step 2: Total wasted = input - useful is a direct one-line calculation. The efficiency figure describes how the loss is distributed, but the total loss doesn't require knowing the breakdown. Spot the useful energy, subtract from input, done.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "If a velocity-time graph shows an object accelerating from rest to velocity u in time t, what is the distance travelled? How does this change if it decelerates from u to v (both non-zero) in the same time? (2 steps)", "answer": "- Step 1: From rest to u: area is a triangle = ½ × u × t\n- Step 2: From u to v (both non-zero): area is a trapezium = (u + v)/2 × t. The key difference: when one velocity is zero, it's a triangle; when both are non-zero, it's a trapezium requiring the average.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why is it impossible for a nuclide to have atomic number decreased but mass number unchanged after radioactive decay? (1 step)", "answer": "The only decay that decreases atomic number is α-decay, which emits a helium nucleus (2 protons, 2 neutrons). This always decreases mass number by 4. There is no decay that reduces Z while leaving A unchanged — beta decay increases Z, gamma doesn't change either. To lower Z, you must also lower A.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Q12, if you incorrectly divided by (1 - 0.8) = 0.2 instead of 0.8, what answer would you get and why is it clearly wrong? (2 steps)", "answer": "- Step 1: Dividing by 0.2 instead of 0.8: I = 1200/(12 × 5 × 0.2) = 1200/12 = 100 A. This is far larger than any option.\n- Step 2: A quick sanity check: the 100% efficient current was 20 A. An 80% efficient motor must draw MORE than 20 A, but not 5 times more. 100 A is unreasonable and the options (1.6 to 25 A) confirm 25 A is the only plausible answer.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Summarize the three-step ESAT strategy: identify, filter, shortcut. How does each step help manage time pressure? (3 steps)", "answer": "- Step 1 (Identify): Name the physics topic first. This reveals which concept equation to use.\n- Step 2 (Filter): Decide which information actually matters. Ignore distractors like the 3.0 m detector separation.\n- Step 3 (Shortcut): Find the quickest route. For energy questions, is it directly input - useful? For graphs, which section and shape? This prevents wasting time on unnecessary algebra.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A car traveling at 30 m/s decelerates to 10 m/s over 60 seconds. Using the trapezium area method, what is the distance traveled? Show that using only the initial velocity (30 × 60 = 1800 m) gives a 50% overestimate. (2 steps)", "answer": "- Step 1: Correct: average velocity = (30 + 10)/2 = 20 m/s. Distance = 20 × 60 = 1200 m\n- Step 2: Overestimate: 30 × 60 = 1800 m. The error = 1800 - 1200 = 600 m, which is exactly 50% too high. This happens because using only the initial velocity assumes the car maintained 30 m/s the whole time, ignoring the deceleration.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In nuclear decay notation, what do the top number (mass number) and bottom number (atomic number) represent, and which is conserved in β⁻ decay but not α decay? (2 steps)", "answer": "- Step 1: Mass number A = total nucleons (protons + neutrons). Atomic number Z = number of protons (defines the element).\n- Step 2: In β⁻ decay, A is conserved (0 change) but Z increases by 1. In α decay, both A and Z change (A decreases by 4, Z decreases by 2). Mass number is conserved in β⁻ but not α.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why does the path difference in the PET scanner equal twice the source displacement from the midpoint, and not the displacement itself? Use a numerical example. (2 steps)", "answer": "- Step 1: Let midpoint distance to each detector be d = 1.5 m. Source moves 0.06 m toward detector A. Path A = 1.44 m, Path B = 1.56 m.\n- Step 2: Path difference = 1.56 - 1.44 = 0.12 m = 12 cm. Displacement was only 6 cm. The difference is 2 × displacement because one path gets shorter AND the other gets longer by the same amount.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "A student says \"the mass of the water increases when heated because it expands.\" How would you correct this misconception? (1 step)", "answer": "No — mass is conserved. When water expands on heating, its volume increases but the number of water molecules stays the same. Density decreases because ρ = m/V with V increasing. The confusion is between \"expands\" (volume change) and \"adds mass\" (totally different physical quantity).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In Q6, if the efficiency was 100% instead of 75%, what would the wasted energy be? How does efficiency affect the calculation? (2 steps)", "answer": "- Step 1: With 100% efficiency, useful energy = mgh = 12 kJ, input = 28 kJ. Wasted = 28 - 12 = 16 kJ (same!).\n- Step 2: Wait — that's interesting. For THIS specific question, the efficiency doesn't change the answer because we're asked for total energy lost (input - useful). The efficiency only matters if we were asked about internal motor losses or output after the motor. The lesson: always check what the question is actually asking for.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "If you were presented with answer options of 6 mm, 12 mm, 24 mm, 6 cm, 12 cm, 24 cm for the PET scanner source distance, and you calculated path difference as 12 cm, how would you quickly eliminate wrong answers using magnitude reasoning? (2 steps)", "answer": "- Step 1: The path difference is 12 cm, but the source displacement is half of this: 6 cm. Eliminate anything larger than 12 cm (24 cm) and anything too small (mm scale).\n- Step 2: Options 6 mm, 12 mm, 24 mm are wrong order of magnitude. 24 cm is twice the path difference. This leaves 6 cm and 12 cm. Since displacement = path difference/2, the answer is 6 cm. Reading the magnitude of options first guides your reasoning.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}], "count": 35}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In ESAT, why is rigor from A-level (full working, exact values, every step shown) considered a *bad habit*? (3 steps)", "answer": "- Step 1: ESAT has roughly $$27$$ questions in $$40$$ minutes, giving about $$89$$ seconds per question, with no calculator and no formula sheet. Time, not depth, is the binding constraint.\n- Step 2: Full working consumes seconds you don't have. Every line of algebra you write is a line that could have been skipped by jumping straight from the physical idea to the number.\n- Step 3: Because answer options are usually well-spaced in magnitude, an approximate answer lands in the right band; rigor only helps when two options are close. So the rewarded instinct becomes: skip steps, approximate aggressively, use $$g=10$$, and read option magnitudes first as a sanity anchor.\n\n*Takeaway:* rigor is a cost, not a virtue, when the exam is fundamentally a time-pressure test.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does the ESAT paper explicitly give $$g = 10\\ \\text{N/kg}$$ instead of $$9.81$$, and what does this signal about the arithmetic?", "answer": "The value $$g=10$$ is chosen so every calculation on the paper resolves into clean mental arithmetic. It's a deliberate signal from the examiners: the numbers are meant to combine into nice, round intermediate values (like $$1200 \\times 10 \\times 1 = 12000$$). If you find yourself needing $$9.81$$-level precision, you have almost certainly taken a longer route than intended. The takeaway is that whenever the arithmetic looks ugly, the *method* is wrong, not the numbers.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What is the strategic argument for *not* attempting ESAT questions in numerical order? (3 steps)", "answer": "- Step 1: Every question is worth the same mark, but questions differ enormously in how much time they consume. A hard question at position 5 that eats 4 minutes costs you the ability to bank three easy questions later.\n- Step 2: By scanning the paper and picking off recognisable, short-route questions first, you convert your fixed time into the maximum number of secured marks.\n- Step 3: You then return to the time-sinks with whatever time remains — but crucially, your ``easy marks'' are already locked in. A confirmed easy mark beats a probabilistic hard mark.\n\n*Takeaway:* order the paper by *your speed*, not the examiner's numbering.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What are the three priority skills, in order, that ESAT physics rewards? (3 steps)", "answer": "- Step 1: **Spot the topic quickly.** Before touching numbers, name what branch of physics is being tested (kinematics, energy, nuclear, waves, …). This alone often halves the search space.\n- Step 2: **Decide which information matters.** ENGAA questions deliberately include irrelevant numbers (e.g. detector separation in the PET question). Filter them before computing.\n- Step 3: **Avoid long methods when a shortcut exists.** If a proportional argument, symmetry, or direct subtraction gets you there, use it — do not route through efficiency, algebra, or intermediate stages just because you *could*.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "For the inequality $$2x^2 + x \\geq 15$$, walk through the general recipe for solving any quadratic inequality. (3 steps)", "answer": "- Step 1: **Rearrange to compare against zero.** Rewrite as $$2x^2 + x - 15 \\geq 0$$. You cannot read off sign behaviour until one side is $$0$$.\n- Step 2: **Find the roots by factorising.** $$(2x-5)(x+3) = 0 \\Rightarrow x = 2.5$$ or $$x = -3$$. These are the points where the parabola crosses the axis.\n- Step 3: **Sketch and read the sign.** Since the coefficient of $$x^2$$ is positive, the parabola opens upward — it is $$\\geq 0$$ *outside* the roots. So the solution is $$x \\leq -3$$ or $$x \\geq 2.5$$.\n\n*Takeaway:* for an upward parabola, ``$$\\geq 0$$'' means outside the roots; ``$$\\leq 0$$'' means between them.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "If a quadratic inequality on the ESAT does not factorise into clean integer roots, what should your first suspicion be?", "answer": "You have mis-copied it. ENGAA numbers are always tidy — that's part of what makes no-calculator feasible. If the discriminant looks messy or the roots are ugly, re-read the question before grinding through the quadratic formula. This is a general heuristic: ugly arithmetic on ESAT is almost always a signal of a mistake in setup, not a genuinely hard calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why is the area under a velocity–time graph equal to distance travelled, from first principles?", "answer": "Distance is speed multiplied by time. On a $$v$$-$$t$$ graph, a thin vertical strip of width $$dt$$ at height $$v$$ represents the distance $$v \\cdot dt$$ travelled during that instant. Summing all these strips — which is literally what ``area under the curve'' means — gives the total distance. This is why the *shape* of the region matters: a rectangle is constant speed, a triangle is starting/ending at rest, and a trapezium is a linear change between two non-zero speeds.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "A car decelerates uniformly from $$30\\ \\text{m/s}$$ to $$10\\ \\text{m/s}$$ over a time interval $$\\Delta t$$. What is the shape of the region under this segment of the $$v$$-$$t$$ graph, and what is its area? (3 steps)", "answer": "- Step 1: The velocity changes *linearly* between two *non-zero* values. That's neither a rectangle (which needs constant $$v$$) nor a triangle (which needs one endpoint at $$v=0$$). It is a **trapezium**.\n- Step 2: A trapezium's area is the average of its parallel sides times its width: $$\\text{area} = \\frac{u+v}{2} \\times \\Delta t$$.\n- Step 3: Physically, $$\\frac{u+v}{2}$$ is the average velocity during uniform deceleration, so this is just $$\\bar{v} \\cdot t$$ — the intuitive ``distance = average speed × time'' in disguise.\n\n*Takeaway:* trapezium area = average velocity × time interval.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "In a $$v$$-$$t$$ graph problem asking for distance during a *specific* segment, what is the most common ESAT trap?", "answer": "Computing the *total* journey distance instead of just the requested segment. The wording is deliberately dressed to make you feel you should use all the data. The correct discipline is: (i) read what the question asks, (ii) identify the specific segment on the graph, (iii) determine the shape of that region alone, (iv) compute only that area. A second trap layered on top is treating a trapezium region as a rectangle by multiplying by only one of the two velocities.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Explain conceptually why heating a fixed mass of water lowers its density, tracing the causal chain from particles upward. (4 steps)", "answer": "- Step 1: Heat adds energy to the water's particles, increasing their kinetic energy — they vibrate and move about more vigorously.\n- Step 2: More vigorous motion means the particles push each other slightly farther apart on average. The substance *expands*.\n- Step 3: Mass is unchanged (no particles are created or removed by heating). But volume has increased, so by $$\\rho = m/V$$, density falls.\n- Step 4: The causal direction is essential: **heat → expansion → volume up → density down**. Density doesn't cause volume to change; volume changing causes density to change.\n\n*Takeaway:* heating → $$V \\uparrow$$ → $$\\rho \\downarrow$$, with $$m$$ fixed throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why is the statement ``the mass of a fixed volume of water increases when heated'' wrong, and what actually happens to the mass inside a fixed spatial region as the fluid warms? (3 steps)", "answer": "- Step 1: Heating does not create mass — it only rearranges the particles already present. So mass cannot spontaneously increase anywhere.\n- Step 2: Consider a fixed spatial region (e.g. a fixed $$1\\ \\text{cm}^3$$ box). As the fluid inside expands, some of it is pushed out of that region.\n- Step 3: Therefore the mass *inside a fixed volume* actually *decreases* on heating (fewer particles occupy the same box). The statement gets not just the magnitude wrong but the *direction* wrong.\n\n*Takeaway:* ``density of a fixed mass'' and ``mass of a fixed volume'' behave oppositely under heating — always underline which one is fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Walk through the mechanism of a convection current in a saucepan of water heated from below. (5 steps)", "answer": "- Step 1: The heat source at the bottom raises the temperature of the water *just above it* first.\n- Step 2: That water expands; its volume increases, so its density falls below that of the cooler water above.\n- Step 3: Being less dense, the warmed water rises through the surrounding cooler, denser water — buoyancy lifts it.\n- Step 4: Cooler, denser water from higher up flows downward to fill the gap, taking the place of the risen water.\n- Step 5: The newly-arrived cool water is now over the heat source, warms, expands, rises — and the loop repeats. This closed circulation *is* the convection current, and it transports heat through the whole body of fluid without any net mass transfer.\n\n*Takeaway:* convection = bulk motion driven by density gradient from thermal expansion.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How does the same underlying physics explain both room-w
