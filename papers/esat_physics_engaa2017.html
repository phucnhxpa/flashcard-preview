arming radiators and expansion joints in bridges?", "answer": "In both cases the mechanism is: heating raises particle kinetic energy → particles move farther apart on average → the material expands. For the radiator, hot air rises and cold air sinks, setting up a room-sized convection loop that circulates warmth far from the radiator itself. For the bridge, the deck expands linearly on a hot day, so engineers leave gaps (expansion joints) to accommodate the growth without buckling. The general principle — ``hot ⇒ bigger'' — is the same whether the material is gas, liquid, or solid.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Why does only *vertical* height count in gravitational potential energy, even when an object travels along a sloped ramp? (3 steps)", "answer": "- Step 1: GPE is the work done against gravity, and gravity acts purely vertically (downward).\n- Step 2: Work is force times *displacement in the direction of the force*. So only the component of motion parallel to gravity — i.e. the vertical rise — contributes.\n- Step 3: A car pushed $$5\\ \\text{m}$$ along a ramp that rises only $$1\\ \\text{m}$$ vertically gains GPE of $$mg \\times 1$$, not $$mg \\times 5$$. The ramp length is a red herring for GPE (it only matters for the *force* needed along the ramp).\n\n*Takeaway:* GPE cares about the height gained, not the path length.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "State the energy conservation identity for any real machine and explain each term. (3 steps)", "answer": "- Step 1: Energy in = energy out. Nothing is lost from the universe — only relocated. For a machine: $$E_{\\text{input}} = E_{\\text{useful}} + E_{\\text{wasted}}$$.\n- Step 2: $$E_{\\text{useful}}$$ is the energy that does the intended job (e.g. lifting the load, giving it GPE). $$E_{\\text{wasted}}$$ is the energy transferred to the surroundings in unwanted forms (heat, sound, friction).\n- Step 3: Rearranging: $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}}$$. This is the shortcut for ``how much energy is lost'' questions — you never need efficiency if you know both the input and the useful outputs directly.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "For a ``how much energy is wasted?'' question with efficiency given, why is the efficiency often a *distractor*? (3 steps)", "answer": "- Step 1: The efficiency tells you the ratio $$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$, which is only needed if you must compute *one* of them from the *other*.\n- Step 2: But if the question gives you the total input directly and you can compute the useful output directly (e.g. as $$mgh$$), then $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}}$$ is a one-step subtraction.\n- Step 3: Routing through efficiency (e.g. computing motor stage 1 losses, then stage 2 losses) is a longer, error-prone method that gives the same answer. The exam rewards spotting that you can bypass efficiency entirely.\n\n*Takeaway:* if you can see useful and input directly, subtract — ignore the efficiency.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A $$1200\\ \\text{kg}$$ car is pulled up a ramp gaining $$1.0\\ \\text{m}$$ of vertical height by a motor fed $$28\\ \\text{kJ}$$ total. Without using the efficiency figure, find the total energy lost to the surroundings. (3 steps)", "answer": "- Step 1: Useful energy = GPE gained = $$mgh = 1200 \\times 10 \\times 1 = 12000\\ \\text{J} = 12\\ \\text{kJ}$$.\n- Step 2: Total input given = $$28\\ \\text{kJ}$$.\n- Step 3: By conservation, $$E_{\\text{wasted}} = 28 - 12 = 16\\ \\text{kJ}$$.\n\n*Takeaway:* the $$75\\%$$ efficiency you were also given is irrelevant here — a classic ESAT distractor.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "How does the electrical energy delivered by a supply relate to current, voltage, and time, and how do you rearrange for current? (3 steps)", "answer": "- Step 1: Electrical power is $$P = IV$$ (watts = amps × volts). This is the *rate* at which the supply delivers energy.\n- Step 2: Multiplying by time gives the total energy delivered: $$E = Pt = IVt$$.\n- Step 3: Rearranging for current: $$I = \\frac{E}{Vt}$$. Crucially, the $$E$$ here is the **input** electrical energy from the supply, *not* the useful output — so if efficiency $$<1$$, you must inflate $$E_{\\text{useful}}$$ by dividing by $$\\eta$$ first.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "A motor lifts $$20\\ \\text{kg}$$ through $$6\\ \\text{m}$$ in $$5\\ \\text{s}$$ on a $$12\\ \\text{V}$$ supply, with $$80\\%$$ efficiency. Explain conceptually how to find the current, and why forgetting efficiency undershoots the answer. (4 steps)", "answer": "- Step 1: Useful energy delivered = $$mgh = 20 \\times 10 \\times 6 = 1200\\ \\text{J}$$. This is what the load actually receives.\n- Step 2: If the machine were perfect, the supply would deliver exactly $$1200\\ \\text{J}$$ in $$5\\ \\text{s}$$, so $$I = \\frac{1200}{12 \\times 5} = 20\\ \\text{A}$$.\n- Step 3: But the machine is only $$80\\%$$ efficient, meaning only $$80\\%$$ of what the supply delivers ends up as useful energy. So the supply must deliver *more* than $$1200\\ \\text{J}$$: specifically, $$1200/0.8 = 1500\\ \\text{J}$$.\n- Step 4: Scaling the current by the same factor: $$I = 20/0.8 = 25\\ \\text{A}$$. Forgetting efficiency treats the input as equal to the useful output, which under-estimates the current every time.\n\n*Takeaway:* efficiency $$<1$$ always makes the *input* (and hence current) *bigger*, never smaller.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why does converting useful output to required input always mean *dividing* by efficiency, not multiplying, and how do you sanity-check this?", "answer": "Because efficiency is defined as $$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$, rearranging gives $$E_{\\text{input}} = E_{\\text{useful}}/\\eta$$. Since $$\\eta < 1$$, dividing by it makes the input *larger* than the useful output — which makes physical sense: an imperfect machine must be fed more energy than it usefully delivers because some leaks away. Sanity check: if the input came out *smaller* than the useful output, you've violated conservation of energy — you divided the wrong way.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "How do alpha and beta-minus decay each change the mass number $$A$$ and atomic number $$Z$$ of a nuclide, and what does gamma emission do?", "answer": "- Step 1: **Alpha decay** ejects a helium nucleus $$^{4}_{2}\\text{He}$$, so it removes 4 nucleons (2 protons + 2 neutrons): $$\\Delta A = -4$$, $$\\Delta Z = -2$$.\n- Step 2: **Beta-minus decay** converts a neutron into a proton, emitting an electron $$^{\\,0}_{-1}\\text{e}$$. The nucleon count is unchanged (neutron becomes proton, still one nucleon), but proton count rises: $$\\Delta A = 0$$, $$\\Delta Z = +1$$.\n- Step 3: **Gamma emission** is a photon released from the nucleus rearranging its energy state — no nucleons or charge are ejected: $$\\Delta A = 0$$, $$\\Delta Z = 0$$.\n\n*Takeaway:* only alpha changes $$A$$; only beta$$^-$$ raises $$Z$$ without touching $$A$$; gamma changes neither.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "In a mixed alpha/beta-minus decay chain, why is the mass number the *first* quantity to read, and what constrains its possible values? (3 steps)", "answer": "- Step 1: Beta decay leaves the mass number completely untouched — only alpha can change it, and always by exactly $$-4$$.\n- Step 2: So if there are $$n$$ alphas in the chain, the mass number is fixed at $$A_{\\text{start}} - 4n$$. The number of betas is irrelevant for $$A$$.\n- Step 3: This means in a chain with (say) at most one alpha, the mass number is either $$A_{\\text{start}}$$ or $$A_{\\text{start}} - 4$$ — nothing else is possible. Reading $$A$$ first immediately eliminates half the option list.\n\n*Takeaway:* $$A$$ is the ``clock'' that ticks only when alpha fires; use it to lock down possibilities before worrying about $$Z$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "A nuclide $$^P_Q X$$ decays via one alpha and three beta-minus particles. Explain which combinations of $$(A, Z)$$ are reachable at any intermediate stage. (3 steps)", "answer": "- Step 1: **Before the alpha fires** ($$0$$–$$3$$ betas already occurred, $$0$$ alphas): mass number is still $$P$$; atomic number has risen by $$0$$ to $$3$$, so $$Z \\in \\{Q, Q+1, Q+2, Q+3\\}$$.\n- Step 2: **After the alpha fires** ($$0$$–$$3$$ betas already, $$1$$ alpha): mass number is $$P-4$$; atomic number is down by $$2$$ from alpha and up by $$0$$–$$3$$ from betas, so $$Z \\in \\{Q-2, Q-1, Q, Q+1\\}$$.\n- Step 3: The complete set of reachable states is these two rows combined. Any pair *outside* these lists — for example $$(P, Q-1)$$ — is impossible because it would need $$Z$$ to have decreased *without* $$A$$ decreasing, which no single decay can do.\n\n*Takeaway:* mass number pins the row; atomic number range depends on how many betas have fired.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why is the option $$(P, Q-1)$$ impossible in the ``one alpha, three beta-minus'' decay chain? (3 steps)", "answer": "- Step 1: To *lower* the atomic number, you need an alpha (betas can only *raise* $$Z$$). So an alpha must have already fired.\n- Step 2: But every alpha also lowers the mass number by 4. So if $$Z$$ has dropped below $$Q$$, then $$A$$ must have dropped to $$P-4$$, not remained at $$P$$.\n- Step 3: The combination ``$$A = P$$ AND $$Z < Q$$'' is self-contradictory — you can't have $$Z$$ reduced without the alpha, and you can't have the alpha without also reducing $$A$$. Hence $$(P, Q-1)$$ can never appear.\n\n*Takeaway:* whenever you see original $$A$$ paired with reduced $$Z$$, the option is impossible.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "State the two conservation laws for balancing any nuclear equation, and how a free neutron contributes to each. (3 steps)", "answer": "- Step 1: **Mass number conservation:** the sum of the top numbers on the left equals the sum on the right. Nucleons are neither created nor destroyed.\n- Step 2: **Atomic number conservation:** the sum of the bottom numbers on the left equals the sum on the right. Charge is conserved.\n- Step 3: A free neutron is $$^{1}_{0}n$$: it carries mass number 1 (so contributes to the $$A$$ balance) but atomic number 0 (so contributes *nothing* to the $$Z$$ balance). This asymmetry is a common trap when balancing equations with free neutrons on one side.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "In the fission equation $$^{1}_{0}n + ^{239}_{\\;94}\\text{Pu} \\to ^{\\,w}_{54}\\text{Xe} + ^{\\,y}_{x}\\text{Zr} + z\\,^{1}_{0}n$$, derive the two balance equations and explain why $$z$$ does not appear in the atomic number balance. (3 steps)", "answer": "- Step 1: **Mass balance:** left side is $$1 + 239 = 240$$. Right side is $$w + y + z \\cdot 1 = w + y + z$$. So $$w + y + z = 240$$.\n- Step 2: **Atomic balance:** left side is $$0 + 94 = 94$$. Right side is $$54 + x + z \\cdot 0 = 54 + x$$. So $$x = 40$$.\n- Step 3: The free neutrons on the right, of which there are $$z$$, each contribute atomic number $$0$$. So no matter how many neutrons fly off, they carry no charge and drop out of the $$Z$$ balance entirely — this is why the atomic number equation is clean and gives $$x$$ immediately.\n\n*Takeaway:* free neutrons matter for $$A$$ balance but are invisible in $$Z$$ balance.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why is the answer $$z = 240 - (w+y)$$ (rather than the more obvious $$w + y + z = 240$$) the correct form to pick from a multiple-choice list?", "answer": "They are algebraically identical — the correct form is just a rearrangement of the conservation law. The lesson is that ESAT multiple-choice questions often disguise a familiar physical law by presenting it solved for a different variable. Your job is not to look for the *most familiar* form but to check whether any option is *equivalent* to the balance law. Options that mix variables from different balances (e.g. putting $$z$$ in the atomic-number equation) or drop needed variables are the wrong ones; the correct one is always a valid rearrangement.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Two objects travel at the same speed but arrive at their destinations at different times. How is the difference in the distances they covered related to the time delay? (3 steps)", "answer": "- Step 1: For each object, distance = speed × time. Since speeds are identical, the ratio of distances equals the ratio of travel times.\n- Step 2: The *difference* in distances is speed × (difference in travel times): $$\\Delta x = v \\cdot \\Delta t$$.\n- Step 3: Example: two cars at $$20\\ \\text{m/s}$$, one arriving $$20\\ \\text{s}$$ before the other, differ in distance by $$20 \\times 20 = 400\\ \\text{m}$$. This is the general principle behind converting a time delay into a *path difference* whenever the wave (or object) speed is fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "In a PET scanner, why does moving the emitting source by a distance $$x$$ from the midpoint change the *path difference* to the two detectors by $$2x$$, not $$x$$? (4 steps)", "answer": "- Step 1: When the source is at the midpoint $$Q$$, each detector is a distance $$d$$ away, and the path difference is $$0$$.\n- Step 2: Shift the source by $$x$$ *toward* detector A. Now detector A is at distance $$d - x$$ (closer by $$x$$), and detector B is at distance $$d + x$$ (farther by $$x$$).\n- Step 3: The path difference is $$(d+x) - (d-x) = 2x$$. The $$d$$'s cancel, and the two $$x$$ contributions *add* — one from the closer path being closer, one from the farther path being farther.\n- Step 4: This ``$$\\times 2$$'' amplification is what makes PET spatially sensitive: a tiny displacement of the source produces double the path difference, so double the measurable time delay.\n\n*Takeaway:* source displacement $$= \\tfrac{1}{2} \\times$$ path difference.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "A PET scanner detects two gamma-rays with time difference $$4 \\times 10^{-10}\\ \\text{s}$$, gamma speed $$3 \\times 10^{8}\\ \\text{m/s}$$. Detectors are $$3.0\\ \\text{m}$$ apart. How far is the source from the midpoint, and why is the detector spacing irrelevant? (4 steps)", "answer": "- Step 1: The path difference between the two gamma-rays is $$\\Delta x = v \\cdot \\Delta t = (3 \\times 10^{8})(4 \\times 10^{-10}) = 12 \\times 10^{-2}\\ \\text{m} = 12\\ \\text{cm}$$.\n- Step 2: Because moving the source by $$x$$ changes the path difference by $$2x$$, we have $$2x = 12\\ \\text{cm}$$, so $$x = 6\\ \\text{cm}$$.\n- Step 3: The detector separation of $$3\\ \\text{m}$$ never enters the calculation — the ``$$d$$'' cancels in the path-difference expression $$(d+x)-(d-x) = 2x$$.\n- Step 4: This is a deliberate distractor: recognising the detector gap is irrelevant is exactly the ``decide what information matters'' skill the ESAT trains.\n\n*Takeaway:* halve the path difference to get the displacement; ignore the detector spacing.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A student computes $$\\Delta x = v \\cdot \\Delta t = 12\\ \\text{cm}$$ for the PET scanner and writes $$12\\ \\text{cm}$$ as the source displacement. What is the misconception? (3 steps)", "answer": "- Step 1: $$\\Delta x = 12\\ \\text{cm}$$ is the *path difference* — the difference between the two total distances travelled by the two gamma rays.\n- Step 2: But the source's displacement from the midpoint contributes to *both* paths simultaneously: it lengthens one and shortens the other by the same amount.\n- Step 3: So the path difference is *twice* the source displacement, meaning the actual source displacement is $$12/2 = 6\\ \\text{cm}$$. The student has conflated ``how far apart the two path lengths are'' with ``how far the source moved.''\n\n*Takeaway:* the geometry factor of 2 between path difference and displacement is the single most testable point in this style of question.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Consider the grid-paper demo: source at midpoint, each path is 15 squares. Now shift the source 2 squares toward one detector. What are the new path lengths and path difference, and what general rule does this illustrate? (3 steps)", "answer": "- Step 1: One path decreases from 15 to 13 (source moved 2 closer). The other increases from 15 to 17 (source moved 2 farther).\n- Step 2: Path difference is $$17 - 13 = 4$$ squares — exactly twice the 2-square source shift.\n- Step 3: **General rule:** shift the source by $$x$$, and the path difference changes by $$2x$$. Equivalently, source displacement $$= \\tfrac{1}{2} \\times$$ path difference. This is the concrete geometric picture behind the algebraic identity $$(d+x)-(d-x)=2x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why is $$g = 10\\ \\text{N/kg}$$ (instead of $$9.81$$) not just a convenience but an *exam-strategy signal*?", "answer": "The paper's use of $$g = 10$$ tells you that every numeric value in the problem has been chosen so that when you use $$g = 10$$, the arithmetic collapses into clean integers or simple fractions. For example: $$1200 \\times 10 \\times 1 = 12000$$, or $$20 \\times 10 \\times 6 = 1200$$. If you find yourself needing decimal precision, you're either using $$9.81$$ (against instructions) or you've taken a longer route than intended. The strategy: whenever numbers look ugly mid-calculation, recheck whether you used $$g = 10$$ and whether you took the shortest physical route.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Give an intuitive test for whether ESAT arithmetic requires standard-form multiplication, and outline the technique. (3 steps)", "answer": "- Step 1: Any question involving speed of light, radiation, or nuclear scales will produce numbers like $$3 \\times 10^{8}$$ or $$4 \\times 10^{-10}$$. Standard form is unavoidable.\n- Step 2: **Digits and exponents separately.** Multiply the leading digits ($$3 \\times 4 = 12$$) and *add* the exponents ($$10^{8} \\times 10^{-10} = 10^{-2}$$).\n- Step 3: Result: $$12 \\times 10^{-2}$$. Then convert to natural units by inspection: $$12 \\times 10^{-2}\\ \\text{m} = 0.12\\ \\text{m} = 12\\ \\text{cm}$$. Sanity-check by reading the answer options — they tell you what magnitude to land in (cm vs mm vs m).\n\n*Takeaway:* multiply digits, add exponents, then match magnitude to the option list.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "For efficiencies expressed as ``nice'' decimals, what mental multiplication shortcut converts dividing by efficiency into a quick multiplication? (2 steps)", "answer": "- Step 1: Dividing by $$0.8$$ is the same as multiplying by $$1/0.8 = 5/4 = 1.25$$. So if useful energy is $$1200\\ \\text{J}$$, input is $$1200 \\times 1.25 = 1500\\ \\text{J}$$.\n- Step 2: Similarly, dividing by $$0.75$$ = multiplying by $$4/3$$. Dividing by $$0.5$$ = doubling. Learning these keeps efficiency conversions in your head, no long division needed.\n\n*Takeaway:* memorise $$0.8 \\to \\times 1.25$$ and $$0.75 \\to \\times 4/3$$ — they cover most ESAT efficiency problems.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A car travels at $$30\\ \\text{m/s}$$ for $$10\\ \\text{s}$$, then decelerates uniformly to $$20\\ \\text{m/s}$$ over the next $$10\\ \\text{s}$$. Without a calculator, what total distance did it cover? (3 steps)", "answer": "- Step 1: First segment (constant $$30\\ \\text{m/s}$$ for $$10\\ \\text{s}$$) is a rectangle: $$30 \\times 10 = 300\\ \\text{m}$$.\n- Step 2: Second segment (decelerating from $$30$$ to $$20$$ over $$10\\ \\text{s}$$) is a trapezium: average velocity $$= (30+20)/2 = 25\\ \\text{m/s}$$, times $$10\\ \\text{s}$$ = $$250\\ \\text{m}$$.\n- Step 3: Total: $$300 + 250 = 550\\ \\text{m}$$. The key skill is identifying each segment's shape before computing — treating segment 2 as a rectangle with $$v=30$$ would overshoot; with $$v=20$$ would undershoot.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A hot air balloon rises because the air inside is heated. Explain conceptually why heating causes lift, in terms of density and buoyancy. (4 steps)", "answer": "- Step 1: Heating the air inside the balloon expands it: the volume increases, but since some hot air is pushed *out* of the open bottom, the mass inside the balloon actually decreases.\n- Step 2: The balloon's volume is roughly fixed by the envelope, but it now contains less air, so the mean density inside is lower than the surrounding cool air outside.\n- Step 3: Buoyancy pushes any less-dense object upward through a denser fluid — same principle as wood floating on water.\n- Step 4: So the balloon rises. Note: this uses ``mass of a fixed volume decreases'' (the envelope's volume is fixed while gas leaks out on heating) — the opposite scenario from ``fixed mass expands.''\n\n*Takeaway:* thermal expansion + buoyancy = lift, and the direction of density change depends on which quantity is fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "A machine claims $$120\\%$$ efficiency. Why is this impossible, and what would it violate? (2 steps)", "answer": "- Step 1: Efficiency is $$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$. If $$\\eta > 1$$, then $$E_{\\text{useful}} > E_{\\text{input}}$$, meaning the machine outputs more useful energy than it received.\n- Step 2: This directly violates conservation of energy — the machine would be creating energy from nothing. All real machines have $$\\eta \\leq 1$$ with equality only in idealised (no friction, no heat loss) limits. Any ESAT option showing $$\\eta > 1$$ is a trap you can rule out immediately.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "A nuclear equation shows $$^{235}_{92}\\text{U} + ^{1}_{0}n \\to ^{144}_{56}\\text{Ba} + ^{a}_{b}\\text{Kr} + 3\\,^{1}_{0}n$$. What are $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: **Mass balance:** $$235 + 1 = 144 + a + 3(1)$$, so $$236 = 147 + a$$, giving $$a = 89$$.\n- Step 2: **Atomic balance:** $$92 + 0 = 56 + b + 3(0)$$, so $$b = 36$$.\n- Step 3: The free neutrons contribute to the mass balance ($$3 \\times 1 = 3$$) but not to the atomic balance ($$3 \\times 0 = 0$$). The result is $$^{89}_{36}\\text{Kr}$$.\n\n*Takeaway:* write both balances explicitly, and remember neutrons vanish from the atomic-number equation.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why does the ESAT reward reading the *magnitude* of the answer options first, before doing any calculation?", "answer": "The answer options fix the expected scale of the result (mm vs cm vs m; A vs mA; kJ vs J). This does two things: (i) it tells you what units to work in, avoiding unit-conversion errors; (ii) it lets you sanity-check the exponent immediately — if your calculation gives $$10^{-2}\\ \\text{m}$$ and the options are all in mm, you know to convert to $$10\\ \\text{mm}$$ and pick from the mm list. Reading options first is essentially free calibration before you invest computation time.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A nuclide $$^{238}_{92}\\text{U}$$ undergoes 2 alpha decays and 2 beta-minus decays. What is the resulting nuclide's mass number and atomic number, without tracking the order of decays? (3 steps)", "answer": "- Step 1: Each alpha changes $$A$$ by $$-4$$ and $$Z$$ by $$-2$$. Two alphas: $$\\Delta A = -8$$, $$\\Delta Z = -4$$.\n- Step 2: Each beta$$^-$$ changes $$A$$ by $$0$$ and $$Z$$ by $$+1$$. Two betas: $$\\Delta A = 0$$, $$\\Delta Z = +2$$.\n- Step 3: Total change: $$\\Delta A = -8$$, $$\\Delta Z = -4 + 2 = -2$$. Final nuclide: $$^{230}_{90}\\text{X}$$.\n\n*Takeaway:* order of decays doesn't matter for the final $$(A, Z)$$ — only the counts of each decay type. This makes decay-chain arithmetic commutative.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Suppose a $$v$$-$$t$$ graph shows a car accelerating from $$0$$ to $$20\\ \\text{m/s}$$ in $$10\\ \\text{s}$$. What shape describes this segment, and what is its area?", "answer": "- Step 1: Velocity starts at $$0$$ and rises linearly to $$20$$ — one endpoint at zero, one non-zero, straight line between. This is a **triangle**.\n- Step 2: Area of triangle = $$\\tfrac{1}{2} \\times \\text{base} \\times \\text{height} = \\tfrac{1}{2} \\times 10 \\times 20 = 100\\ \\text{m}$$.\n- Step 3: Equivalently, average velocity is $$(0+20)/2 = 10$$, times time $$10\\ \\text{s}$$ = $$100\\ \\text{m}$$. Both routes agree — the ``$$\\tfrac{1}{2}$$'' in triangle area is literally the ``average of $$0$$ and $$v$$'' factor.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why does the ``spot the useful energy directly'' shortcut for energy-loss questions require you to *not* over-decompose the system?", "answer": "If a question describes a system in stages (motor → rope → pulley → load) with intermediate efficiencies, it is *tempting* to compute the loss at each stage. But the total loss is just $$E_{\\text{input}} - E_{\\text{useful, final}}$$ — you don't need to track intermediate stages. Over-decomposing wastes time and multiplies opportunities for arithmetic slip. The habit to build: as soon as you identify the *final* useful output (usually GPE or KE of the load) and the *initial* input, subtract. Ignore what happens in between.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "A mass is lifted by a motor. The useful energy is $$1200\\ \\text{J}$$, and the motor takes $$5\\ \\text{s}$$ to do this. What is the useful power delivered to the load, and how does this differ from the electrical power drawn from the supply?", "answer": "- Step 1: Useful power = useful energy / time = $$1200 / 5 = 240\\ \\text{W}$$. This is what the load ``feels'' — the rate at which its GPE grows.\n- Step 2: The electrical power drawn from the supply is *larger* if efficiency $$< 1$$, because the supply must deliver enough to cover both useful output and wasted energy.\n- Step 3: With $$80\\%$$ efficiency: electrical input power = $$240/0.8 = 300\\ \\text{W}$$. On a $$12\\ \\text{V}$$ supply, this gives $$I = 300/12 = 25\\ \\text{A}$$, matching the direct $$E$$-based calculation.\n\n*Takeaway:* useful power and input power differ by a factor of $$1/\\eta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Two ESAT options for the same question read ``$$20\\ \\text{A}$$'' and ``$$25\\ \\text{A}$$''. Which likely reflects forgetting the efficiency step, and why should this pattern make you suspicious?", "answer": "The $$20\\ \\text{A}$$ option is the value you get by treating the electrical input as equal to the useful output (ignoring $$\\eta$$). The $$25\\ \\text{A}$$ option correctly divides by $$\\eta = 0.8$$. Whenever an answer list contains a pair differing by the exact efficiency factor (here $$25/20 = 1.25 = 1/0.8$$), the examiner is *specifically* testing whether you remembered to apply efficiency. This ratio pattern is a strong hint to double-check whether efficiency belongs in your calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does gamma emission alone never form part of a $$(A, Z)$$-changing decay chain, and what physically distinguishes it from alpha and beta?", "answer": "- Step 1: Gamma emission is an electromagnetic photon released when the nucleus transitions between excited states — no nucleons or charged particles are ejected.\n- Step 2: Because photons have zero rest mass and zero charge, they carry away neither mass number nor atomic number. So $$\\Delta A = 0$$ and $$\\Delta Z = 0$$.\n- Step 3: Alpha and beta$$^-$$ both eject matter (a helium nucleus, or an electron), which is why they change the nuclide's identity. Gamma just changes the *energy state* of the same nuclide — the atom before and after gamma emission is chemically identical.\n\n*Takeaway:* alpha/beta change *identity*; gamma changes only *energy*.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A student is asked ``how much energy is lost as heat by the motor?'' vs ``how much energy is lost to the surroundings in total?'' Why are these potentially different questions, and how would you tell? (3 steps)", "answer": "- Step 1: ``Lost by the motor'' refers to inefficiency in the *motor stage only* — e.g. $$(1 - \\eta_{\\text{motor}}) \\times E_{\\text{input}}$$.\n- Step 2: ``Lost to the surroundings in total'' refers to *all* wasted energy, including losses in downstream stages (rope, pulley, friction, air resistance). It's the difference between total input and final useful output.\n- Step 3: If the question says ``in total'' or gives you both the input and the final useful energy, use $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful, final}}$$. If it specifies a stage, use that stage's efficiency alone. Read the wording precisely.\n\n*Takeaway:* ``total loss'' means end-to-end; ``motor loss'' means stage-only.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "The ESAT gives an inequality question where you must select ``$$x \\leq -3$$ or $$x \\geq 2.5$$'' versus ``$$-3 \\leq x \\leq 2.5$$''. What determines which style of solution set you pick? (2 steps)", "answer": "- Step 1: For a quadratic $$ax^2 + bx + c$$ with $$a > 0$$ (upward parabola), the expression is $$\\geq 0$$ *outside* the roots (where the parabola sits above the axis) and $$\\leq 0$$ *between* the roots.\n- Step 2: So ``$$\\geq 0$$'' inequalities give ``or'' solutions (outside); ``$$\\leq 0$$'' inequalities give ``and'' solutions (between). If $$a < 0$$, everything flips. Sketch the parabola whenever in doubt — the visual removes all sign confusion.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "In a decay chain problem, why is it useful to list the *reachable* states rather than the *forbidden* ones? (3 steps)", "answer": "- Step 1: The reachable states form a small, enumerable set (e.g. 4 values of $$Z$$ for each of 2 possible values of $$A$$, giving 8 total states).\n- Step 2: The forbidden states are the entire infinite complement — you can't enumerate them.\n- Step 3: So checking if an option is reachable (by seeing if it appears in your short enumerated list) is fast. Checking if it's forbidden by reasoning ``from scratch'' is slow. The technique generalises: whenever a small allowed set exists, list it explicitly and scan for absences.\n\n*Takeaway:* build the ``possible'' list; the impossible option is the one *not* in it.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "An ESAT question gives detector separation, gamma speed, time delay, and asks for source displacement. Rank these four pieces of information by importance. (3 steps)", "answer": "- Step 1: **Essential:** gamma speed and time delay — these give the path difference $$v \\cdot \\Delta t$$, which is the whole physical content of the answer.\n- Step 2: **Also essential (conceptually):** knowing the source is on the line between two detectors, so the ``$$\\times 2$$'' geometry applies. This is qualitative, not numeric.\n- Step 3: **Irrelevant:** the detector separation itself. It cancels in $$(d+x)-(d-x)=2x$$ and never appears in the answer. Recognising this filters your attention to the two numbers that matter, saving time and preventing you from trying to force $$3\\ \\text{m}$$ into the calculation somewhere.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why does the ESAT reward habits that are considered \"bad\" at A-level, and what specifically changes about your working style? (3 steps)", "answer": "- Step 1: The ESAT gives you roughly 27 questions in 40 minutes ($$\\approx 89$$ seconds each), with no calculator and no formula sheet — so the constraint is time and interpretation, not rigour.\n- Step 2: A-level rewards showing every algebraic step, using $$g = 9.81$$, and exact values. On ESAT, all of that costs you time you don't have.\n- Step 3: You should instead:\n+ Skip intermediate algebra and jump from physics idea straight to a number.\n+ Approximate aggressively and use $$g = 10\\ \\text{N/kg}$$ (the paper gives it).\n+ Read the magnitude of the answer options first to fix the scale.\n\nThe core retraining: rigour buys marks on A-level, speed buys marks on ESAT.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What is the \"identify the physics first\" habit, and why is it more important than doing the calculation?", "answer": "Before touching any numbers on an ESAT physics question, you should name the topic (e.g. \"this is convection\", \"this is path difference\", \"this is energy conservation\"), then write down the single key idea that governs it, and only then decide the quickest computational route. The reason is that most ENGAA physics questions have a very short route once the context is clear — the difficulty is dressed up in the wording, not in the maths. If you dive into numbers before naming the topic, you tend to grind through irrelevant algebra (e.g. computing $$0.75 \\times 28$$ in Q6 when you never needed the efficiency at all).", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why is it a good strategy to skip around the paper rather than work through it in order? (2 steps)", "answer": "- Step 1: You are not penalised for the order of your answers, and every question is worth the same. A marked question you can definitely do is worth more than a hard one you might do.\n- Step 2: So you scan, pick off the fast recognisable ones first, bank those marks, and return to time-sinks in a second pass. This preserves your time budget and prevents a single tricky question from eating the whole exam.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For a fixed mass of fluid being heated, describe qualitatively what happens to volume and density, and why. (3 steps)", "answer": "- Step 1: Heating gives the particles more kinetic energy, so they vibrate/move more and on average sit slightly further apart.\n- Step 2: The mass is unchanged (no particles added or removed), but the average spacing increases, so the volume $$V$$ increases.\n- Step 3: Since $$\\rho = m/V$$ with $$m$$ fixed and $$V$$ larger, the density $$\\rho$$ decreases.\n\nCausal chain to memorise: heat → expansion → $$V\\uparrow$$ → $$\\rho\\downarrow$$.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is the statement \"the mass of a fixed volume of water increases on heating\" wrong, and how does it differ from \"the density of a fixed mass decreases\"? (3 steps)", "answer": "- Step 1: Mass is conserved on heating — you cannot create matter by warming something up.\n- Step 2: If anything, when a fluid expands, some of it leaves the fixed region you were watching, so the mass inside a fixed volume actually goes *down*, not up.\n- Step 3: The two phrasings hold different things fixed:\n+ \"Density of a fixed mass\" → correct that density decreases (same $$m$$, larger $$V$$).\n+ \"Mass of a fixed volume\" → mass falls (fluid escapes the region as it expands).\n\nAlways underline which quantity is held fixed before judging a statement.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Describe step by step the mechanism by which a convection current forms in a saucepan of water heated from below. (5 steps)", "answer": "- Step 1: The heat source warms the water at the bottom of the pan first.\n- Step 2: That warmed water expands, so its volume increases and its density drops below that of the cooler water above.\n- Step 3: Being less dense than the water above, the hot water rises (buoyancy).\n- Step 4: Cooler, denser water sinks from above to fill the space left behind.\n- Step 5: The sunk water is now over the heat source, warms, and repeats the cycle — this circulating loop *is* the convection current.\n\nThe essential driver is density difference, which itself comes from thermal expansion of a fixed mass.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why does a radiator heat a whole room even though it only touches a small amount of air near it? (2 steps)", "answer": "- Step 1: The radiator warms the air directly beside it; that air expands, becomes less dense, and rises to the ceiling.\n- Step 2: Cooler denser air is drawn along the floor to replace it, sets up a room-sized convection loop, and this circulation eventually transports heat throughout the room. The radiator doesn't need to touch all the air — the fluid moves the heat for it.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why do bridges have expansion joints, and how does this connect to convection physics?", "answer": "Bridges have gaps built into them because their materials expand when heated — a hot summer day literally makes the deck grow slightly larger, and without the gap it would buckle. The connection to convection is the same underlying principle: heating causes expansion. In a solid this shows as a change in length that engineers must accommodate; in a fluid the same expansion (with fixed mass) reduces density and drives buoyancy-driven flow. Same physics — \"hot ⇒ bigger\" — dressed differently by the state of matter.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "On a velocity–time graph, what does the area between the line and the time axis represent, and what shapes should you know how to handle? (3 steps)", "answer": "- Step 1: The area under a $$v$$–$$t$$ graph equals the distance travelled. This is because $$v \\times t$$ has units of distance, and integrating $$v$$ over $$t$$ gives displacement.\n- Step 2: You break the region into simple shapes:\n+ Rectangle (constant velocity): area $$= v \\times t$$.\n+ Triangle (velocity starts or ends at zero): area $$= \\tfrac{1}{2} b h$$.\n+ Trapezium (velocity changes linearly between two non-zero values): area $$= \\tfrac{u+v}{2} \\times t$$, i.e. average velocity times time.\n- Step 3: Always identify which region of the graph the question actually asks about *before* deciding the shape.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "A car decelerates uniformly from $$30\\ \\text{m/s}$$ to $$10\\ \\text{m/s}$$ over $$60\\ \\text{s}$$. Why is the distance a trapezium area rather than a rectangle, and what is it? (3 steps)", "answer": "- Step 1: The velocity is not constant — it falls linearly from a non-zero start value to a non-zero end value. If you drew this on a $$v$$–$$t$$ graph, the region under it has a sloped top, not a flat one.\n- Step 2: The correct shape is a trapezium with parallel sides $$u = 30$$ and $$v = 10$$, separated by a horizontal distance $$t = 60$$: area $$= \\tfrac{u+v}{2} t = \\tfrac{40}{2} \\times 60$$.\n- Step 3: That gives $$20 \\times 60 = 1200\\ \\text{m}$$. Using a rectangle of $$30 \\times 60$$ overcounts, and using $$10 \\times 60$$ undercounts — the average of the two velocities is what matters.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Why is \"the average velocity times the time interval\" the correct distance formula for uniform deceleration, and what does it fail for? (3 steps)", "answer": "- Step 1: When acceleration is constant (velocity changes linearly), the mean velocity over the interval equals the arithmetic mean of the start and end values: $$\\bar{v} = \\tfrac{u+v}{2}$$.\n- Step 2: Since distance = average velocity × time, this gives the trapezium formula $$s = \\tfrac{u+v}{2} t$$.\n- Step 3: It fails when acceleration is not uniform — e.g. a curved $$v$$–$$t$$ graph — because the arithmetic mean of endpoints is no longer the true average velocity. There you'd need proper integration.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "If a question asks for the distance travelled during a specific phase of a motion described by a $$v$$–$$t$$ graph, what is the biggest trap to avoid? (2 steps)", "answer": "- Step 1: Not realising the question is asking about only *part* of the journey. Students often compute the total area under the entire graph when only one section (e.g. the decelerating region) is wanted.\n- Step 2: The correct workflow is:\n+ Read the question carefully — which time interval is being asked about?\n+ Identify the shape of the region under that interval (rectangle, triangle, trapezium).\n+ Compute only that area.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why is the useful energy in any \"lifting something to a height\" problem exactly $$mgh$$, regardless of how the object got there? (3 steps)", "answer": "- Step 1: The useful outcome of any lifting task is that the object ends up higher — it has gained gravitational potential energy.\n- Step 2: Gravitational PE gained is $$E_{\\text{GPE}} = mgh$$, where $$h$$ is the *vertical* rise, not the distance along a ramp. Only the vertical component of motion does work against gravity.\n- Step 3: Whatever path or machine you used (ramp, pulley, elevator), the energy stored in the raised object is fixed by initial and final heights. Path-independence is the defining property of a conservative force like gravity.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "State the conservation-of-energy statement for a real machine, and rearrange it to isolate wasted energy. (2 steps)", "answer": "- Step 1: Energy is not lost, only transferred. For any real machine, total input energy equals the useful output plus everything wasted to the surroundings: $$E_{\\text{input}} = E_{\\text{useful}} + E_{\\text{wasted}}$$.\n- Step 2: Rearranging, $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}}$$. So if you can compute the useful energy directly (often $$mgh$$) and you know the input, you get wasted energy in one subtraction — no efficiency figure needed.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "In a question asking \"how much energy is wasted to the surroundings\", why is the given efficiency often a distractor? (3 steps)", "answer": "- Step 1: The efficiency links input and useful output ($$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$), so if the question already gives you the input directly, you have one of those two.\n- Step 2: Wasted energy is just input minus useful. If you can obtain useful energy from a physical formula (like $$mgh$$ for a lift), you never need efficiency at all — the question hands you both quantities.\n- Step 3: The efficiency figure is thrown in to tempt you into a longer route (splitting motor losses from post-motor losses), but the answer comes out the same. Recognising the redundant information is the ESAT skill being tested.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Define efficiency and explain why \"input = useful ÷ efficiency\" always produces a larger number than the useful energy. (3 steps)", "answer": "- Step 1: Efficiency is the ratio $$\\eta = \\dfrac{E_{\\text{useful}}}{E_{\\text{input}}}$$, with $$0 < \\eta \\le 1$$ for any real machine.\n- Step 2: Rearranging for input gives $$E_{\\text{input}} = E_{\\text{useful}}/\\eta$$.\n- Step 3: Since $$\\eta < 1$$, dividing by it *inflates* the number. Physically: a machine that is only, say, 80% efficient must be fed more energy than it usefully delivers — the extra covers the waste. A quick sanity check: input current in an 80%-efficient motor must be *bigger* than the \"ideal\" (100%-efficient) current, never smaller.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "State the two key electrical equations linking power, current, voltage, and energy delivered over time. (2 steps)", "answer": "- Step 1: Electrical power dissipated or delivered is $$P = IV$$ — watts equal amps times volts.\n- Step 2: Multiplying by time gives energy: $$E = Pt = IVt$$. Rearranged for current, $$I = \\dfrac{E}{Vt}$$. When the system has efficiency $$\\eta < 1$$, this $$E$$ is the *input* energy (from the supply), not the useful energy at the output.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "In a decay chain question, why should you look at the mass number *first* before worrying about the atomic number? (3 steps)", "answer": "- Step 1: Only alpha decay changes the mass number ($$\\Delta A = -4$$). Beta-minus decay leaves it untouched ($$\\Delta A = 0$$), and gamma also leaves it unchanged.\n- Step 2: So the mass number can only sit at its starting value $$A$$ (before any alpha has occurred) or drop in steps of 4 ($$A-4$$, $$A-8$$, …). The number of alphas *completely fixes* the mass number.\n- Step 3: Once you've filtered which mass numbers are even possible, you then work out the range of allowed atomic numbers from the beta count (each beta raises $$Z$$ by 1). This two-stage filter is much faster than trying to track both quantities simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "State what alpha, beta-minus, and gamma decay do to mass number $$A$$ and atomic number $$Z$$. (3 steps)", "answer": "- Step 1: Alpha ($$\\alpha$$) decay: emits a helium nucleus $$^{4}_{2}\\text{He}$$. So $$\\Delta A = -4$$, $$\\Delta Z = -2$$.\n- Step 2: Beta-minus ($$\\beta^-$$) decay: a neutron becomes a proton, emitting an electron $$^{\\ 0}_{-1}e$$. So $$\\Delta A = 0$$, $$\\Delta Z = +1$$.\n- Step 3: Gamma ($$\\gamma$$) decay: emits electromagnetic radiation from the nucleus. So $$\\Delta A = 0$$, $$\\Delta Z = 0$$ — neither changes.\n\nOnly alpha touches the mass number; only alpha and beta change the atomic number.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "In a nuclear equation, what two quantities must be conserved, and how does a free neutron $$^{1}_{0}n$$ behave in each balance? (2 steps)", "answer": "- Step 1: Mass number $$A$$ (top numbers) and atomic number $$Z$$ (bottom numbers) must each balance: sum on left = sum on right, for both quantities.\n- Step 2: A free neutron has $$A = 1$$ but $$Z = 0$$, so:\n+ It contributes to the mass-number balance (each free neutron adds 1 to the total $$A$$).\n+ It contributes *nothing* to the atomic-number balance (each free neutron adds 0 to the total $$Z$$).\n\nThis is why in fission equations, the number of emitted neutrons appears in the mass equation but drops out of the charge equation entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "For a saucepan-of-water convection question, which of the three statements below are correct explanations? (3 steps)", "answer": "- Step 1: Statement 3 is correct — heating a fixed mass of water expands it, so its volume goes up. This is thermal expansion.\n- Step 2: Statement 2 is correct as a consequence of 3 — with $$m$$ fixed and $$V$$ up, $$\\rho = m/V$$ decreases.\n- Step 3: Statement 1 is wrong. Mass is conserved on heating; no matter appears. In fact, as the fluid expands, some leaves the fixed region, so mass inside a fixed volume goes *down* if anything.\n\nCorrect combination: statements 2 and 3 only.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "A motor is fed 28 kJ of electrical energy and lifts a 1200 kg car 1.0 m vertically. Explain the fastest route to compute total energy wasted, and why efficiency is irrelevant here. (3 steps)", "answer": "- Step 1: Identify the useful energy: it's the GPE gained by the car, $$mgh = 1200 \\times 10 \\times 1.0 = 12{,}000\\ \\text{J} = 12\\ \\text{kJ}$$.\n- Step 2: Apply energy conservation: $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}} = 28 - 12 = 16\\ \\text{kJ}$$.\n- Step 3: Efficiency (whether motor or system) never enters. You have the input directly and the useful output directly, so their difference is the total waste. Any given efficiency figure is a distractor tempting you into a longer route.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "A source emits gamma rays in opposite directions towards two detectors and one arrives $$\\Delta t$$ later than the other. Explain how to convert the time delay into a physical displacement of the source. (3 steps)", "answer": "- Step 1: Both rays travel at the speed of light $$c$$. The difference in path length is simply $$\\Delta x = c \\Delta t$$ — same-speed particles with different arrival times must have covered different distances.\n- Step 2: Geometry: if the source is displaced by $$x$$ from the midpoint, then *one* path becomes longer by $$x$$ and the *other* becomes shorter by $$x$$. So the path difference is $$(d+x) - (d-x) = 2x$$.\n- Step 3: Combining, $$2x = c \\Delta t$$, giving $$x = \\dfrac{c \\Delta t}{2}$$. The source displacement is *half* the path difference — this factor of two is the classic trap.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why is the path difference in a PET-scanner-style setup equal to $$2x$$ (twice the source displacement) rather than $$x$$? Give a concrete way to visualise it. (2 steps)", "answer": "- Step 1: When you slide the source by $$x$$ towards detector A, path to A shortens by $$x$$ *and* path to B lengthens by $$x$$ (they change in opposite directions).\n- Step 2: Concrete grid demo: put the source at midpoint of a 30-square grid (each path 15). Then shift 2 squares toward A: path A = 13, path B = 17. Difference is $$17 - 13 = 4$$, which is $$2 \\times 2$$. So displacement × 2 = path difference. Rearranged, displacement = path difference / 2.\n\nThe key insight is that changing one path automatically changes the other in the opposite sense — that's what doubles the effect.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "In the PET-scanner question, why is the detector separation (3.0 m) irrelevant to the answer? (2 steps)", "answer": "- Step 1: The physics needed is: (a) same speed × different times → path difference; (b) shift by $$x$$ → path difference is $$2x$$. Neither step uses the detector spacing.\n- Step 2: The 3.0 m only sets the *scale* of the setup — it tells you the detectors are 1.5 m either side of the midpoint. Since the source shift is much smaller than that (a few cm), the detectors are effectively \"far away\" and only the small displacement matters. This is exactly the \"decide which information matters\" ESAT skill: the detector spacing is a distractor.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A plutonium-239 nucleus absorbs a neutron and fissions into xenon-$$w$$ (Z=54), zirconium-$$y$$ (Z=$$x$$), and $$z$$ free neutrons. Write down the two conservation equations. (2 steps)", "answer": "- Step 1: Mass-number balance (top numbers): $$1 + 239 = w + y + z$$, so $$w + y + z = 240$$. Rearranged: $$z = 240 - (w + y)$$.\n- Step 2: Atomic-number balance (bottom numbers): $$0 + 94 = 54 + x + 0$$ (free neutrons contribute 0 to $$Z$$), so $$x = 40$$. Note $$z$$ doesn't appear here — neutrons are chargeless.\n\nTwo independent equations, two independent conclusions.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why must the number of free neutrons ($$z$$) appear in the mass-number balance but *not* in the atomic-number balance of a fission equation? (2 steps)", "answer": "- Step 1: A free neutron $$^{1}_{0}n$$ carries mass number 1 (it has one nucleon), so each emitted neutron adds 1 to the total $$A$$ on the right — $$z$$ neutrons add $$z$$ to the mass sum.\n- Step 2: But its atomic number is 0 (a neutron carries no charge), so $$z$$ neutrons contribute $$0$$ to the total $$Z$$ on the right. The proton count is entirely determined by the daughter nuclei; $$z$$ is invisible to the charge balance.\n\nThis asymmetry is why students often wrongly try to include $$z$$ in the atomic-number equation.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A 20 kg mass is lifted 6.0 m vertically in 5.0 s by an 80%-efficient motor–pulley system on a 12 V supply. Explain how to find the current, and identify the step students most often forget. (4 steps)", "answer": "- Step 1: Find useful energy: $$E_{\\text{useful}} = mgh = 20 \\times 10 \\times 6.0 = 1200\\ \\text{J}$$.\n- Step 2: If the system were 100% efficient, this useful energy would equal the electrical energy delivered by the supply, so $$I_{\\text{ideal}} = \\dfrac{E_{\\text{useful}}}{Vt} = \\dfrac{1200}{12 \\times 5} = 20\\ \\text{A}$$.\n- Step 3: But the system is only 80% efficient, so the supply must deliver *more* than 1200 J to achieve 1200 J of useful lift. Input energy $$= 1200 / 0.8 = 1500$$ J, and correspondingly $$I_{\\text{actual}} = 20/0.8 = 25\\ \\text{A}$$.\n- Step 4: The commonly missed step is dividing by efficiency at the end — students stop at 20 A, treating the useful energy as the supply energy.\n\nSanity check: the actual current must be *larger* than the ideal-case current, never smaller.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "In an efficiency problem, if dividing by the efficiency figure makes your numerical answer *smaller*, why do you know you've done it the wrong way round? (2 steps)", "answer": "- Step 1: Efficiency $$\\eta$$ lies between 0 and 1, so dividing by it always *inflates* the numerator, and multiplying by it always *shrinks* it.\n- Step 2: The physical logic: an imperfect machine must be fed more energy than it usefully outputs. So converting useful output to required input should give a bigger number. If you got a smaller number, you multiplied by $$\\eta$$ when you should have divided (or vice versa). Always sanity-check the direction of the change against the physical picture.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "A nuclide $$^P_Q X$$ decays to a stable $$Y$$, emitting one alpha and three betas along the way. What set of (mass, atomic number) pairs is reachable at any stage? (3 steps)", "answer": "- Step 1: The mass number can only take two values throughout: $$P$$ (before the alpha, when only betas have occurred) or $$P-4$$ (after the alpha).\n- Step 2: For mass $$P$$ (0 to 3 betas so far, no alpha): $$Z \\in \\{Q, Q+1, Q+2, Q+3\\}$$. Betas raise $$Z$$, so $$Z$$ can never fall below $$Q$$ here.\n- Step 3: For mass $$P-4$$ (alpha done, 0 to 3 betas): the alpha dropped $$Z$$ by 2, then 0–3 betas raised it back by 0–3, giving $$Z \\in \\{Q-2, Q-1, Q, Q+1\\}$$.\n\nAny $$(A, Z)$$ pair outside these two sets is unreachable.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "In a decay-chain question, why is $$(P, Q-1)$$ impossible even though it looks like a small change from the parent? (3 steps)", "answer": "- Step 1: The atomic number is $$Q-1$$, which is *below* the parent's $$Q$$. Only alpha decay can lower $$Z$$ (betas raise it), so at least one alpha must have happened.\n- Step 2: But alpha also lowers the mass number by 4. So if any alpha has occurred, the mass number must be $$P-4$$, not $$P$$.\n- Step 3: The nuclide is claimed to have mass number $$P$$ (unchanged) *and* atomic number below $$Q$$ — these are incompatible. You cannot have a lowered $$Z$$ while keeping the original $$A$$.\n\nThe one-line summary Tom wrote: \"atomic number is down, so you need an alpha — but you can't have an alpha and still have the same mass.\"", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why is the systematic technique for \"which nuclide is impossible?\" to fix the mass number first, then work out atomic number bounds? (3 steps)", "answer": "- Step 1: Mass number is only altered by alphas, and the total number of alphas is fixed by the problem. So the allowed mass numbers form a very short list (typically two or three values).\n- Step 2: Any option with a mass number outside that list is instantly impossible — you eliminate it in one glance without needing to check charge at all.\n- Step 3: For each allowed mass number, you know exactly how many alphas have happened, so you know how much $$Z$$ has dropped from alphas. The remaining variation comes from betas, and each beta raises $$Z$$ by 1. This defines the exact range of allowed $$Z$$ values, and any option outside it is impossible.\n\nFiltering on $$A$$ first is fast because there are fewer options; then filtering on $$Z$$ within each $$A$$ is straightforward arithmetic.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Solve $$2x^2 + x \\ge 15$$ conceptually — describe the three-step method for any quadratic inequality with an upward parabola. (3 steps)", "answer": "- Step 1: Rearrange to compare against zero: $$2x^2 + x - 15 \\ge 0$$.\n- Step 2: Find the roots by factorising: $$(2x-5)(x+3) = 0$$ gives $$x = 2.5$$ or $$x = -3$$. These are where the parabola crosses the axis.\n- Step 3: Sketch mentally: the parabola opens upward (positive $$x^2$$ coefficient). It's above zero *outside* the roots and below zero *between* them.\n\nSo the solution is $$x \\le -3$$ or $$x \\ge 2.5$$.\n\nIf the quadratic doesn't factorise cleanly, you've probably mis-copied — ENGAA numbers are always tidy.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For a quadratic inequality of the form $$ax^2 + bx + c \\ge 0$$ with $$a > 0$$, how do you decide from the sketch which region satisfies the inequality? (2 steps)", "answer": "- Step 1: If $$a > 0$$, the parabola opens upwards — like a smile. It goes to $$+\\infty$$ far from the origin in either direction, and dips below zero (if it does) between its two real roots.\n- Step 2: So \"$$\\ge 0$$\" is satisfied *outside* the roots (both arms of the smile), and \"$$\\le 0$$\" is satisfied *between* the roots (the dip). Reverse this for a downward parabola ($$a < 0$$).\n\nMnemonic: for a \"smiley\" quadratic, the inequality \"$$\\ge 0$$\" splits into two rays (outside), while \"$$\\le 0$$\" is a single interval (between).", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "In the car-up-a-ramp question, why does the ramp itself (its length or angle) never appear in the useful-energy calculation? (2 steps)", "answer": "- Step 1: Gravitational PE gained is $$mgh$$, where $$h$$ is strictly the *vertical* height gained. The path length along the ramp doesn't matter — only the vertical rise counts.\n- Step 2: Physically: gravity is a conservative force, so work done against it depends only on start and end heights, not the path. Whether you slide the car up a long shallow ramp or lift it straight up, the stored PE is identical.\n\nThis is why ramp problems that give you the ramp length instead of the height are testing whether you realise you may need trigonometry to extract the vertical component.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "For a car decelerating linearly from $$40\\ \\text{m/s}$$ to $$20\\ \\text{m/s}$$ over $$10\\ \\text{s}$$, what is the distance? Do this mentally. (2 steps)", "answer": "- Step 1: Since deceleration is uniform, use the trapezium formula: distance = average velocity × time = $$\\dfrac{40+20}{2} \\times 10$$.\n- Step 2: That's $$30 \\times 10 = 300\\ \\text{m}$$. No calculator needed — average the endpoints and multiply.\n\nCommon trap to avoid: don't multiply the initial velocity (40) by time (would give 400, an overestimate) or the final velocity (20) by time (would give 200, an underestimate).", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "A 500 kg lift is raised 4 m by a motor supplied with 25 kJ. Estimate the energy wasted. (2 steps)", "answer": "- Step 1: Useful energy = $$mgh = 500 \\times 10 \\times 4 = 20{,}000\\ \\text{J} = 20\\ \\text{kJ}$$.\n- Step 2: Wasted = input − useful = $$25 - 20 = 5\\ \\text{kJ}$$. No efficiency figure needed — the two given quantities are enough.\n\nThe efficiency here is implicitly $$20/25 = 80\\%$$, but you never had to compute it to get the waste.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "In a PET-style question, if the gamma rays arrive with $$\\Delta t = 2 \\times 10^{-10}\\ \\text{s}$$ difference, roughly how far from the midpoint is the source? Use $$c = 3 \\times 10^8\\ \\text{m/s}$$. (3 steps)", "answer": "- Step 1: Path difference: $$\\Delta x = c\\Delta t = 3 \\times 10^8 \\times 2 \\times 10^{-10} = 6 \\times 10^{-2}\\ \\text{m} = 6\\ \\text{cm}$$.\n- Step 2: Displacement = path difference / 2, because moving the source by $$x$$ changes each path by $$\\pm x$$ in opposite directions.\n- Step 3: So the source is $$3\\ \\text{cm}$$ from the midpoint.\n\nMental-arithmetic check: multiply the mantissas ($$3 \\times 2 = 6$$), add the exponents ($$8 + (-10) = -2$$), giving $$6 \\times 10^{-2}$$ m — trivial in your head.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A 300 kg load is lifted 5 m in 10 s by a 75%-efficient motor on a 20 V supply. Estimate the current. (4 steps)", "answer": "- Step 1: Useful energy: $$mgh = 300 \\times 10 \\times 5 = 15{,}000\\ \\text{J}$$.\n- Step 2: Ideal current (if 100% efficient): $$I_{\\text{ideal}} = \\dfrac{E}{Vt} = \\dfrac{15{,}000}{20 \\times 10} = 75\\ \\text{A}$$.\n- Step 3: Adjust for 75% efficiency: $$I_{\\text{actual}} = 75 / 0.75 = 100\\ \\text{A}$$. Dividing by 0.75 is the same as multiplying by 4/3.\n- Step 4: Sanity: 100 A > 75 A — good, actual current must exceed the ideal. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "A nuclide decays via 2 alphas and 4 betas. If the starting nuclide is $$^P_Q X$$, what is the final $$(A, Z)$$? (2 steps)", "answer": "- Step 1: Alphas change $$A$$ by $$-4$$ each, so 2 alphas give $$\\Delta A = -8$$. Betas leave $$A$$ unchanged. Final mass number: $$P - 8$$.\n- Step 2: Alphas change $$Z$$ by $$-2$$ each, giving $$\\Delta Z = -4$$. Betas change $$Z$$ by $$+1$$ each, giving $$\\Delta Z = +4$$. Net: $$-4 + 4 = 0$$. Final atomic number: $$Q$$.\n\nFinal nuclide: $$(P-8, Q)$$. Notice how 2 alphas and 4 betas conspire to leave $$Z$$ unchanged — a common feature of natural decay chains that terminate at stable isotopes.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why is it worth doing ESAT preparation even if your ESAT sitting is months away? (2 steps)", "answer": "- Step 1: The topic overlap with A-level Physics Unit 1 is very large — kinematics, energy, nuclear decay, electricity. Practising ENGAA questions sharpens the same underlying physics you need for A-level.\n- Step 2: The specific ESAT skills — recognising a topic quickly, filtering distractor information, taking proportional shortcuts, doing mental arithmetic — are transferable and rarely wasted. Whether you sit ESAT in October or January, the practice pays back in your school exams too.\n\nTom's framing: \"If you're ready in October, great. If not, it's still good practice for January.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Compare \"mass of a fixed volume\" vs \"density of a fixed mass\" under heating — which increases, decreases, or stays the same, and why? (3 steps)", "answer": "- Step 1: Density of a fixed mass: as the mass expands into a larger volume, $$\\rho = m/V$$ *decreases* (numerator fixed, denominator grows).\n- Step 2: Mass of a fixed volume: as fluid expands, some of it exits the fixed region, so mass inside actually *decreases*. Mass is conserved globally — heating cannot create matter — so what's inside a bounded region can only fall as the fluid expands outward.\n- Step 3: Both scenarios reflect the same underlying expansion, but the \"fixed\" quantity determines the direction of change of the other variables. Underline the fixed quantity in each statement before evaluating.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why does a beta-minus decay increase the atomic number by 1 without changing the mass number? (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron inside the nucleus transforms into a proton and emits an electron (plus an antineutrino).\n- Step 2: The proton count $$Z$$ goes up by 1 (one new proton), so the atomic number increases by 1.\n- Step 3: The total nucleon count $$A$$ is unchanged — a neutron became a proton, but a nucleon is still a nucleon. The electron emitted has essentially zero mass on the nuclear scale and does not count as a nucleon. So $$\\Delta A = 0$$, $$\\Delta Z = +1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why is the alpha decay's \"loss of 2 protons and 2 neutrons\" cleanly expressible as $$\\Delta A = -4, \\Delta Z = -2$$? (2 steps)", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, $$^4_2\\text{He}$$: 2 protons and 2 neutrons, so 4 nucleons total with atomic number 2. When emitted, the parent nucleus loses exactly those 4 nucleons and those 2 protons.\n- Step 2: So the daughter has 4 fewer nucleons ($$\\Delta A = -4$$) and 2 fewer protons ($$\\Delta Z = -2$$). This is why alpha decay always shifts the nuclide \"diagonally\" down-and-left on the chart of nuclides.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "You compute an ESAT physics answer and it doesn't match any option. What's the sensible next step? (3 steps)", "answer": "- Step 1: Check the order of magnitude first — look at the exponent (power of ten) and the mantissa separately. Errors often come from miscounting powers of ten in $$\\times 10^n$$ multiplication.\n- Step 2: Check for common traps: a factor of 2 (as in path difference vs displacement), an efficiency factor forgotten (as in Q12), a wrong shape for area (rectangle vs trapezium in Q2), or confusing $$mgh$$ input vs useful.\n- Step 3: If two options look close in magnitude, the question is probably testing which factor you missed — reread it and see if you skipped a step (× 2, ÷ 0.8, etc.).\n\nSkipping to a second-pass and returning later is legitimate — don't burn 5 minutes on one question.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Why is it faster to read the *magnitude* of the answer options *before* doing any calculation? (2 steps)", "answer": "- Step 1: The options tell you what scale the answer should be — kJ vs J, cm vs mm, amps vs milliamps. This lets you skip unnecessary unit conversions and know when you've gone wrong.\n- Step 2: For example, in Q8 the options run from 6 mm to 24 cm — a factor of 40 spread. If your working gives an answer in metres or micrometres, you've made a mistake in a power of 10 somewhere. Reading the options first anchors your expectation.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "In converting the \"$$\\times 2$$\" path-difference relationship, why is displacement = path-difference $$/ 2$$ *not* obvious from a single-detector picture? (3 steps)", "answer": "- Step 1: With only one detector, moving the source by $$x$$ closer changes that path by $$x$$ — a one-to-one relationship. Nothing doubles.\n- Step 2: With *two* detectors symmetrically placed, shifting the source in the direction of one detector simultaneously moves it *away from* the other. So one path shortens by $$x$$ while the other lengthens by $$x$$.\n- Step 3: The *difference* between the two paths is what the time delay measures: $$(d+x) - (d-x) = 2x$$. The doubling comes from adding the two opposite changes with a subtraction — a plus $$x$$ and a minus $$(-x)$$ give $$+2x$$.\n\nPath difference is inherently doubled because two paths move in opposite senses when the source moves.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "State the general principle of \"which piece of information is a distractor?\" for ENGAA-style multiple-choice questions. (3 steps)", "answer": "- Step 1: ENGAA questions often include *more* numerical data than the physics actually requires. This is deliberate — testing whether you can identify what matters.\n- Step 2: Before computing, write down the physics idea (one line) and the formulas it needs. Then match the given numbers to those formulas.\n- Step 3: Any given number that doesn't slot into your minimal set of formulas is probably a distractor. Examples:\n+ Q8: the 3.0 m detector separation — never appears in the calculation.\n+ Q6: the 75% efficiency — never needed for total wasted energy.\n\nThe habit is: identify the physics first, decide what you need, then locate the relevant numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "For the ESAT arithmetic style, how do you handle standard-form multiplication like $$3 \\times 10^8 \\times 4 \\times 10^{-10}$$ in your head? (2 steps)", "answer": "- Step 1: Multiply the digits (mantissas) separately: $$3 \\times 4 = 12$$.\n- Step 2: Add the exponents: $$8 + (-10) = -2$$. Combine: $$12 \\times 10^{-2}$$, which you can rewrite as $$1.2 \\times 10^{-1}$$ or $$0.12$$ if needed.\n\nThe trick: never let the exponents and mantissas mix — do each stream in parallel and combine at the end. This makes standard-form arithmetic essentially trivial.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Why does the ESAT paper give $$g = 10\\ \\text{N/kg}$$ rather than the physically accurate $$9.81$$? (2 steps)", "answer": "- Step 1: Using $$g = 10$$ makes every multiplication involving $$mg$$ or $$mgh$$ trivial by mental arithmetic. Numbers stay round, which lets you get to the answer quickly.\n- Step 2: Since the exam is testing your physical reasoning and organisation of a calculation, not decimal accuracy, the paper deliberately uses the round value. The answer options are always spaced widely enough that the $$\\sim 2\\%$$ discrepancy from real $$g$$ is irrelevant.\n\nHabit: whenever you see a mechanics or gravity problem on ESAT, mentally set $$g = 10$$ from the start.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "When Tom said \"everything you did was right, you just missed the last bit\" about Q12, what was the diagnostic lesson? (3 steps)", "answer": "- Step 1: The physics chain was executed correctly: identify useful energy $$mgh$$, relate it to electrical energy $$IVt$$, and rearrange for current. All the arithmetic was right.\n- Step 2: The mistake was stopping *one step early* — computing the current for an ideal (100%-efficient) system and forgetting that the actual system loses 20% of its input. So the electrical supply must deliver more, and the actual current is $$1/\\eta$$ times larger.\n- Step 3: The diagnostic lesson: efficiency should be applied at the very end, converting your \"ideal\" answer into the \"actual\" answer. If you forget it, your working looks perfect but you're off by exactly a factor of $$\\eta$$ or $$1/\\eta$$. Always ask: \"Is this the useful side or the input side of the machine?\" before committing to an answer.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "How would you verify that \"20 A\" corresponds to a 100%-efficient system in Q12, and why is this a useful sanity check? (2 steps)", "answer": "- Step 1: If we assumed 100% efficiency, then all input electrical energy $$= IVt$$ equals the useful output $$mgh$$. So $$I = \\dfrac{mgh}{Vt} = \\dfrac{1200}{60} = 20\\ \\text{A}$$. This matches option E, the \"trap\" answer.\n- Step 2: Since the real system is only 80% efficient, the required current must be larger — you can immediately see that E is the \"efficiency-forgotten\" answer, and the correct one is F (25 A). Recognising a \"trap\" answer as the ideal-case answer is a useful cross-check.\n\nThe exam-writer often includes exactly this option to catch students who forget the efficiency step.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}], "count": 52}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13746, "out_tokens": 14360, "reasoning_chars": 29115, "cost_eur": 0.0595, "elapsed_s": 213, "content_chars": 26636}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13746, "out_tokens": 26673, "reasoning_chars": 50249, "cost_eur": 0.0992, "elapsed_s": 768, "content_chars": 48793}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 13746, "out_tokens": 12787, "reasoning_chars": 24885, "cost_eur": 0.0545, "elapsed_s": 203, "content_chars": 22874}, "kimi_1": {"run": 1
