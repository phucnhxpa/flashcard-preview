<script>
const DATA={"selected": [{"question": "How does the same underlying physics explain both room-warming radiators and expansion joints in bridges?", "answer": "In both cases the mechanism is: heating raises particle kinetic energy → particles move farther apart on average → the material expands. For the radiator, hot air rises and cold air sinks, setting up a room-sized convection loop that circulates warmth far from the radiator itself. For the bridge, the deck expands linearly on a hot day, so engineers leave gaps (expansion joints) to accommodate the growth without buckling. The general principle — ``hot ⇒ bigger'' — is the same whether the material is gas, liquid, or solid.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why is the option $$(P, Q-1)$$ impossible in the ``one alpha, three beta-minus'' decay chain? (3 steps)", "answer": "- Step 1: To *lower* the atomic number, you need an alpha (betas can only *raise* $$Z$$). So an alpha must have already fired.\n- Step 2: But every alpha also lowers the mass number by 4. So if $$Z$$ has dropped below $$Q$$, then $$A$$ must have dropped to $$P-4$$, not remained at $$P$$.\n- Step 3: The combination ``$$A = P$$ AND $$Z < Q$$'' is self-contradictory — you can't have $$Z$$ reduced without the alpha, and you can't have the alpha without also reducing $$A$$. Hence $$(P, Q-1)$$ can never appear.\n\n*Takeaway:* whenever you see original $$A$$ paired with reduced $$Z$$, the option is impossible.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "On a velocity–time graph, what does the area between the line and the time axis represent, and what shapes should you know how to handle? (3 steps)", "answer": "- Step 1: The area under a $$v$$–$$t$$ graph equals the distance travelled. This is because $$v \\times t$$ has units of distance, and integrating $$v$$ over $$t$$ gives displacement.\n- Step 2: You break the region into simple shapes:\n+ Rectangle (constant velocity): area $$= v \\times t$$.\n+ Triangle (velocity starts or ends at zero): area $$= \\tfrac{1}{2} b h$$.\n+ Trapezium (velocity changes linearly between two non-zero values): area $$= \\tfrac{u+v}{2} \\times t$$, i.e. average velocity times time.\n- Step 3: Always identify which region of the graph the question actually asks about *before* deciding the shape.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "A motor is fed 28 kJ of electrical energy and lifts a 1200 kg car 1.0 m vertically. Explain the fastest route to compute total energy wasted, and why efficiency is irrelevant here. (3 steps)", "answer": "- Step 1: Identify the useful energy: it's the GPE gained by the car, $$mgh = 1200 \\times 10 \\times 1.0 = 12{,}000\\ \\text{J} = 12\\ \\text{kJ}$$.\n- Step 2: Apply energy conservation: $$E_{\\text{wasted}} = E_{\\text{input}} - E_{\\text{useful}} = 28 - 12 = 16\\ \\text{kJ}$$.\n- Step 3: Efficiency (whether motor or system) never enters. You have the input directly and the useful output directly, so their difference is the total waste. Any given efficiency figure is a distractor tempting you into a longer route.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "If a question asks for the *total* energy wasted by a system, and you are given the total energy input and enough information to calculate the useful output directly, why can you safely ignore the stated efficiency percentage? (3 steps)", "answer": "- Step 1: By conservation of energy, the total input energy must equal the useful output plus the total wasted energy: $$E_{\\text{in}} = E_{\\text{useful}} + E_{\\text{wasted}}$$. Rearranging immediately gives $$E_{\\text{wasted}} = E_{\\text{in}} - E_{\\text{useful}}$$.\n- Step 2: The efficiency $$\\eta = E_{\\text{useful}} / E_{\\text{in}}$$ is redundant if you already know both the numerator and denominator from other data. Using it would force you to compute intermediate losses (e.g., motor losses, frictional losses separately) and then sum them, which is a longer route.\n- Step 3: The efficiency is a distractor precisely because it invites you to calculate “lost in the motor” and “lost afterwards” in stages. For total waste, the one-line subtraction is both faster and conceptually cleaner.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "A fixed mass of water expands when heated so that its volume increases by $$50\\%$$. What happens to its density, and why does this cause the water to rise? (2 steps)", "answer": "- Step 1: Density is $$\\rho = m/V$$. If $$V$$ increases by a factor of $$1.5$$ while $$m$$ stays constant, $$\\rho$$ decreases by the same factor. The new density is $$2/3$$ of the original.\n- Step 2: Because the surrounding cooler water has a higher density, the buoyant force on the less-dense hot water exceeds its weight. Archimedes’ principle therefore pushes the hot water upward, initiating the convection current.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "A radiator heats a room. Explain why it can heat the entire room even though it only touches a small volume of air at any instant. (3 steps)", "answer": "- Step 1: The radiator warms the air immediately beside it. That air expands (volume increases), its density decreases, and it **rises** to the ceiling.\n- Step 2: Cooler, denser air is drawn along the floor toward the radiator to replace the rising warm air. This cooler air is then heated, expands, rises, and the cycle continues — forming a room-sized convection loop.\n- Step 3: Over time, the entire body of air in the room circulates through the convection loop and passes near the radiator. The radiator doesn't need to touch all the air simultaneously; it just needs to keep heating the air that flows past it, and the convection current distributes that heat throughout the room.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "In beta-minus ($$\\beta^-$$) decay, what are the changes to mass number $$A$$ and atomic number $$Z$$? What happens inside the nucleus to produce this? (2 steps)", "answer": "- Step 1: Beta-minus decay: $$\\Delta A = 0$$, $$\\Delta Z = +1$$. The mass number doesn't change because a neutron is converting to a proton (total nucleon count stays the same), but the atomic number increases by 1 because there is now one more proton.\n- Step 2: Inside the nucleus, a neutron transforms into a proton, emitting an electron $$^{\\;\\;0}_{-1}e$$ (the beta particle) and an antineutrino. The electron carries away charge but essentially no mass, which is why $$A$$ is unchanged while $$Z$$ goes up by 1.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "A machine claims $$120\\%$$ efficiency. Why is this impossible, and what would it violate? (2 steps)", "answer": "- Step 1: Efficiency is $$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$. If $$\\eta > 1$$, then $$E_{\\text{useful}} > E_{\\text{input}}$$, meaning the machine outputs more useful energy than it received.\n- Step 2: This directly violates conservation of energy — the machine would be creating energy from nothing. All real machines have $$\\eta \\leq 1$$ with equality only in idealised (no friction, no heat loss) limits. Any ESAT option showing $$\\eta > 1$$ is a trap you can rule out immediately.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "A nuclide $$^{232}_{90}\\text{Th}$$ undergoes a decay chain emitting two alpha particles and three beta-minus particles (in any order). What are the only possible mass numbers for intermediate nuclides? (2 steps)", "answer": "- Step 1: Each alpha reduces the mass number by 4, and each beta leaves it unchanged. With two alphas, the mass number can only take three values: 232 (0 alphas done), 228 (1 alpha done), or 224 (2 alphas done).\n- Step 2: No other mass numbers are possible at any stage. The betas can occur at any point but never alter the mass number. So any intermediate nuclide must have $$A \\in \\{232, 228, 224\\}$$. If an option shows mass number 230 or 226, it's instantly impossible — it doesn't correspond to any number of alpha decays from 232.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "In the PET scanner question, the detectors are 3.0 m apart. Why does this number never enter the calculation for the source's displacement from the midpoint? (2 steps)", "answer": "- Step 1: The path difference depends only on the speed and the time delay ($$\\Delta x = v \\times \\Delta t$$), not on the total distance. The time delay tells you how much *extra* distance one ray covered, regardless of the total distance each ray traveled.\n- Step 2: The displacement from the midpoint is half the path difference ($$x = \\Delta x / 2$$). The detector separation $$d$$ cancels out because shifting the source by $$x$$ changes one path by $$+x$$ and the other by $$-x$$, and the $$d/2$$ terms subtract away. Recognising that the 3.0 m gap is irrelevant is exactly the \"decide which information matters\" skill Tom is training.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "When solving a quadratic inequality such as $$2x^2 + x \\geq 15$$ under ESAT time pressure, what is the purpose of the sketch, and why must the parabola direction be checked before reading off the solution set? (2 steps)", "answer": "- Step 1: Rearranging to $$2x^2 + x - 15 = 0$$ and factorising gives the roots $$x = -3$$ and $$x = 2.5$$. The sketch converts these boundary points into regions. Without a sketch, it is easy to confuse \"between the roots\" with \"outside the roots.\"\n- Step 2: Because the coefficient of $$x^2$$ is positive, the parabola opens upward. A positive quadratic is above the axis (i.e., $$\\geq 0$$) outside the interval between its roots. If the quadratic were negative, the valid region would be flipped. Checking the sign of the leading coefficient therefore fixes whether you take $$x \\leq -3$$ or $$x \\geq 2.5$$ versus the intervals between them.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "In the fission equation $$^{1}_{0}n + ^{239}_{\\;94}\\text{Pu} \\to ^{\\,w}_{54}\\text{Xe} + ^{\\,y}_{x}\\text{Zr} + z\\,^{1}_{0}n$$, derive the two balance equations and explain why $$z$$ does not appear in the atomic number balance. (3 steps)", "answer": "- Step 1: **Mass balance:** left side is $$1 + 239 = 240$$. Right side is $$w + y + z \\cdot 1 = w + y + z$$. So $$w + y + z = 240$$.\n- Step 2: **Atomic balance:** left side is $$0 + 94 = 94$$. Right side is $$54 + x + z \\cdot 0 = 54 + x$$. So $$x = 40$$.\n- Step 3: The free neutrons on the right, of which there are $$z$$, each contribute atomic number $$0$$. So no matter how many neutrons fly off, they carry no charge and drop out of the $$Z$$ balance entirely — this is why the atomic number equation is clean and gives $$x$$ immediately.\n\n*Takeaway:* free neutrons matter for $$A$$ balance but are invisible in $$Z$$ balance.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why is the fact \"only alpha decay changes the mass number\" the single most useful fact for solving decay-chain questions? (2 steps)", "answer": "- Step 1: Beta-minus decay leaves the mass number unchanged ($$\\Delta A = 0$$), and gamma decay changes nothing. Only alpha decay reduces the mass number (by 4). This means the mass number can only ever be at its starting value or drop in steps of 4.\n- Step 2: In a decay chain, the **number of alpha decays completely fixes the mass number**. If one alpha occurs, the mass number drops by exactly 4 — no more, no less. So you can read the mass number first to determine how many alphas have happened, then worry about the atomic number (which betas can modify). This is exactly the method that solves Q14 in seconds.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "How are electrical power $$P$$, current $$I$$, voltage $$V$$, and energy $$E$$ related in a DC circuit, and what does the product $$IV$$ represent physically? (3 steps)", "answer": "- Step 1: Electrical power is the rate of energy transfer: $$P = IV$$. Here, $$I$$ is the charge flowing per second, and $$V$$ is the energy transferred per unit charge. Their product gives energy per second, i.e., watts.\n- Step 2: Over a time $$t$$, the total energy delivered is $$E = Pt = IVt$$. This is the *input* energy drawn from the supply. If the system is not perfectly efficient, this input energy is larger than the useful work (e.g., $$mgh$$) performed by the machine.\n- Step 3: Rearranging for current gives $$I = E / (Vt)$$. In motor problems, you must decide whether the $$E$$ in this formula is the useful output (which would give the “ideal” current) or the actual input (which is larger by a factor of $$1/\\eta$$). The physical interpretation of $$IV$$ is the rate at which the electrical supply does work on the system.", "source": "Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "Explain conceptually why heating a fixed mass of water lowers its density, tracing the causal chain from particles upward. (4 steps)", "answer": "- Step 1: Heat adds energy to the water's particles, increasing their kinetic energy — they vibrate and move about more vigorously.\n- Step 2: More vigorous motion means the particles push each other slightly farther apart on average. The substance *expands*.\n- Step 3: Mass is unchanged (no particles are created or removed by heating). But volume has increased, so by $$\\rho = m/V$$, density falls.\n- Step 4: The causal direction is essential: **heat → expansion → volume up → density down**. Density doesn't cause volume to change; volume changing causes density to change.\n\n*Takeaway:* heating → $$V \\uparrow$$ → $$\\rho \\downarrow$$, with $$m$$ fixed throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Describe step by step the mechanism by which a convection current forms in a saucepan of water heated from below. (5 steps)", "answer": "- Step 1: The heat source warms the water at the bottom of the pan first.\n- Step 2: That warmed water expands, so its volume increases and its density drops below that of the cooler water above.\n- Step 3: Being less dense than the water above, the hot water rises (buoyancy).\n- Step 4: Cooler, denser water sinks from above to fill the space left behind.\n- Step 5: The sunk water is now over the heat source, warms, and repeats the cycle — this circulating loop *is* the convection current.\n\nThe essential driver is density difference, which itself comes from thermal expansion of a fixed mass.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why does the path difference in the PET scanner equal twice the source displacement from the midpoint, and not the displacement itself? Use a numerical example. (2 steps)", "answer": "- Step 1: Let midpoint distance to each detector be d = 1.5 m. Source moves 0.06 m toward detector A. Path A = 1.44 m, Path B = 1.56 m.\n- Step 2: Path difference = 1.56 - 1.44 = 0.12 m = 12 cm. Displacement was only 6 cm. The difference is 2 × displacement because one path gets shorter AND the other gets longer by the same amount.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "In a multiple-choice convection question, three statements are offered: (1) the mass of a fixed volume increases; (2) the density of a fixed mass decreases; (3) the volume of a fixed mass increases. Which combination actually explains why convection currents form, and why is statement 1 excluded? (2 steps)", "answer": "- Step 1: Convection requires a density difference that drives bulk flow. Statements 2 and 3 establish that chain directly: heating $$\\to$$ volume increases $$\\to$$ density decreases $$\\to$$ warmer fluid rises. Both are necessary to explain the mechanism.\n- Step 2: Statement 1 is excluded because it violates mass conservation. Heating does not create mass, so the mass inside any fixed region cannot increase. In fact, as the fluid expands, mass leaves that region, making statement 1 factually wrong as well as irrelevant to the convection mechanism.", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "The path difference between the two gamma-rays in the PET scanner is found to be 12 cm. If the source is moved from the midpoint towards one detector, how far from the midpoint is the source? (2 steps)", "answer": "- Step 1: When the source moves a distance $x$ from the midpoint toward one detector, one path becomes longer by $x$ while the other becomes shorter by $x$\n- Step 2: The path difference $= (d+x) - (d-x) = 2x$. So $2x = 12$ cm, giving $x = 6.0$ cm\n\nThe key insight: shifting the source by $x$ changes the path difference by $2x$, not by $x$. This is because one path gets longer AND the other gets shorter simultaneously. The answer is 6.0 cm, not 12 cm.", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "In any nuclear reaction equation, which two quantities are strictly conserved, and how does a free neutron contribute to each balance? (2 steps)", "answer": "- Step 1: The **mass number** $$A$$ (total nucleons: protons + neutrons) and the **atomic number** $$Z$$ (total protons, equivalently total positive charge) are conserved. The sum of top numbers on the left equals the sum on the right; the sum of bottom numbers on the left equals the sum on the right.\n- Step 2: A free neutron is written as $$^{1}_{0}n$$. It carries mass number $$1$$, so it contributes to the $$A$$ balance, but its atomic number is $$0$$, so it contributes **nothing** to the $$Z$$ balance. This is why a swarm of emitted neutrons changes the mass bookkeeping without altering the charge bookkeeping.", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "What is the general technique for answering \"which nuclide is impossible\" in a decay-chain question? (3 steps)", "answer": "- Step 1: **Fix the mass number first**: it can only be $$P$$ (no alpha yet) or $$P - 4$$ (one alpha done) or $$P - 8$$ (two alphas done), etc. Any other mass number is instantly impossible.\n- Step 2: **For each allowed mass number, list the range of atomic numbers** the betas can produce. Before any alpha: $$Z \\geq Q$$ (betas only increase $$Z$$). After one alpha: $$Z$$ ranges from $$Q - 2$$ (alpha lowered it by 2, no betas yet) up to $$Q - 2 + 3 = Q + 1$$ (alpha plus all three betas).\n- Step 3: **The impossible option is the one whose $$(A, Z)$$ pair falls outside both reachable sets.** Specifically, any option showing the original mass number $$P$$ with an atomic number **below** $$Q$$ is impossible, because betas can't lower $$Z$$ and the only thing that can (alpha) would also lower $$A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "In the PET scanner, if the source were sitting right at one detector, what would the time difference be? Verify this is consistent with the $$\\Delta x = 2x$$ formula. (2 steps)", "answer": "- Step 1: If the source is at one detector, one ray travels 0 distance (arrives instantly) and the other travels the full separation $$d$$ (takes time $$d/v$$). The path difference is $$d$$ and the time difference is $$d/v$$.\n- Step 2: Using $$\\Delta x = 2x$$: when the source is at the detector, its displacement from the midpoint is $$x = d/2$$. So $$\\Delta x = 2 \\times d/2 = d$$, giving time delay $$d/v$$. The formula is consistent — it works as long as the source is on the line between the detectors, even at the extreme endpoint.", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "Compare Q6 (car on ramp) and Q12 (motor and pulley). Both questions provide an efficiency percentage, yet in Q6 Tom advises ignoring it while in Q12 it is essential. What structural difference between the two questions determines whether efficiency is a distractor or a required step? (3 steps)", "answer": "- Step 1: In Q6, the question asks for *total* energy lost to the surroundings, and the *total input energy* ($$28\\ \\text{kJ}$$) is given explicitly. The useful output ($$mgh = 12\\ \\text{kJ}$$) is independently calculable. By conservation of energy, total waste is simply input minus useful, so the intermediate motor efficiency is irrelevant to the grand total.\n- Step 2: In Q12, only the useful mechanical output is known, and the question asks for the *electrical current drawn from the supply*. The supply delivers the *input* electrical energy, not the useful mechanical energy, so we must scale up from the known useful output to the required input.\n- Step 3: Efficiency is required when you need to convert known useful output into required input. It is a distractor when the total input is already known and you only need the global difference between input and useful output.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "A nuclide $^{P}_{Q}X$ decays to a stable nuclide by emitting one alpha particle and three beta-minus particles. Which of these could NOT be formed at any stage: (P, Q-1), (P, Q+1), (P-4, Q), or (P-4, Q+1)? (3 steps)", "answer": "- Step 1: Alpha decay changes mass number by -4 and atomic number by -2. Beta-minus decay changes mass number by 0 and atomic number by +1\n- Step 2: The mass number can only be $P$ (no alpha yet) or $P-4$ (after the alpha). It can NEVER be anything else\n- Step 3: If mass = $P$ (alpha not yet happened), only betas have occurred, so atomic number can only be $Q, Q+1, Q+2, Q+3$ — it can NEVER be below $Q$. The option (P, Q-1) is impossible because lowering atomic number requires alpha, but alpha also lowers mass number to P-4. You can't have reduced Z with original mass P\n\nAnswer: (P, Q-1) is the impossible nuclide (option A).", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "A decay chain emits one $ \\alpha $ and three $ \\beta^- $ particles. Why is $ (P, Q-1) $ an impossible nuclide? (3 steps)", "answer": "- Step 1: Mass number constraints:  \n  Only $ \\alpha $ changes mass number ($ A = P-4 $ after decay). $ \\beta^- $ leaves $ A $ unchanged.  \n- Step 2: Atomic number after $ \\alpha $:  \n  $ \\alpha $ decay reduces $ Z $ by 2, $ \\beta^- $ increases $ Z $ by 1 per decay.  \n  Final $ Z = Q-2 + 3 = Q+1 $.  \n- Step 3: Why $ (P, Q-1) $ is impossible:  \n  $ A = P $ implies no $ \\alpha $ decay yet, but $ Z = Q-1 $ requires $ \\alpha $ (which lowers $ A $). Contradiction.  \n  + **General rule:** Any $ Z < Q $ with $ A = P $ is invalid.  \n\n**Takeaway:** $ \\alpha $ decay always lowers mass number; $ Z $ cannot decrease without $ A $ decreasing.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "When Tom said \"everything you did was right, you just missed the last bit\" about Q12, what was the diagnostic lesson? (3 steps)", "answer": "- Step 1: The physics chain was executed correctly: identify useful energy $$mgh$$, relate it to electrical energy $$IVt$$, and rearrange for current. All the arithmetic was right.\n- Step 2: The mistake was stopping *one step early* — computing the current for an ideal (100%-efficient) system and forgetting that the actual system loses 20% of its input. So the electrical supply must deliver more, and the actual current is $$1/\\eta$$ times larger.\n- Step 3: The diagnostic lesson: efficiency should be applied at the very end, converting your \"ideal\" answer into the \"actual\" answer. If you forget it, your working looks perfect but you're off by exactly a factor of $$\\eta$$ or $$1/\\eta$$. Always ask: \"Is this the useful side or the input side of the machine?\" before committing to an answer.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "A car travelling at constant speed covers $$600\\ \\text{m}$$ in $$30\\ \\text{s}$$. It then brakes uniformly, coming to rest in another $$10\\ \\text{s}$$. Sketch the two geometric shapes that give the total distance, and explain why the second shape is a triangle rather than a trapezium. (2 steps)", "answer": "- Step 1: The constant-speed section is a rectangle of height $$v$$ and width $$30\\ \\text{s}$$. Its area is $$v \\times t = 20 \\times 30 = 600\\ \\text{m}$$, confirming the speed is $$20\\ \\text{m/s}$$.\n- Step 2: The braking section starts at $$20\\ \\text{m/s}$$ and ends at $$0\\ \\text{m/s}$$. Because one velocity boundary is zero, the region under the graph is a triangle with base $$10\\ \\text{s}$$ and height $$20\\ \\text{m/s}$$. Its area is $$\\frac{1}{2} \\times 10 \\times 20 = 100\\ \\text{m}$$. A trapezium is only needed when both boundary velocities are non-zero.", "source": "Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "If a source inside a patient is displaced by a distance $$x$$ from the midpoint between two detectors, why is the path difference between the two detected gamma rays equal to $$2x$$ rather than $$x$$? (4 steps)", "answer": "- Step 1: Let the detectors be separated by some distance, with the midpoint $$Q$$ exactly halfway. When the source is at $$Q$$, each ray travels the same distance, say $$d/2$$, so the path difference is zero.\n- Step 2: Move the source a distance $$x$$ toward detector A and away from detector B. The path to detector A becomes shorter by $$x$$ (it is now $$d/2 - x$$), while the path to detector B becomes longer by $$x$$ (it is now $$d/2 + x$$).\n- Step 3: The path difference is $$(d/2 + x) - (d/2 - x)$$. The $$d/2$$ terms cancel, leaving $$x - (-x) = 2x$$. This is the crucial “grid-paper” insight: moving the source by one unit changes one path by $$-1$$ and the other by $$+1$$, so the gap between them widens by two units.\n- Step 4: Therefore, the displacement of the source from the midpoint is always **half** the calculated path difference: $$x = \\Delta x / 2$$. A common error is to equate the path difference directly with the source displacement, forgetting that the shift simultaneously lengthens one path and shortens the other.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "State the general principle of \"which piece of information is a distractor?\" for ENGAA-style multiple-choice questions. (3 steps)", "answer": "- Step 1: ENGAA questions often include *more* numerical data than the physics actually requires. This is deliberate — testing whether you can identify what matters.\n- Step 2: Before computing, write down the physics idea (one line) and the formulas it needs. Then match the given numbers to those formulas.\n- Step 3: Any given number that doesn't slot into your minimal set of formulas is probably a distractor. Examples:\n+ Q8: the 3.0 m detector separation — never appears in the calculation.\n+ Q6: the 75% efficiency — never needed for total wasted energy.\n\nThe habit is: identify the physics first, decide what you need, then locate the relevant numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "The nuclide ^P_QX decays to a stable nuclide Y, emitting one α-particle and three β⁻ particles. Which of the following is NOT possible at any stage: (P, Q-1), (P, Q+1), (P, Q+2), (P, Q+3), (P-4, Q-2), (P-4, Q-1), (P-4, Q), (P-4, Q+1)? (3 steps)", "answer": "- Step 1: α-decay changes mass number by -4 and atomic number by -2. β⁻-decay changes mass number by 0 and atomic number by +1.\n- Step 2: The mass number can only be P (no α yet) or P-4 (α has occurred). Before the α: only β⁻ decays have happened, so Z can be Q, Q+1, Q+2, Q+3. After the α: Z can be Q-2, Q-1, Q, Q+1.\n- Step 3: Option (P, Q-1) has mass P but atomic number Q-1. To reduce atomic number you need α, but α also reduces mass to P-4. You cannot have reduced Z with original mass. This is impossible.\n\nAnswer: A (P, Q-1)", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "How does balancing nuclear equations enforce conservation laws? (3 steps)", "answer": "- Step 1: Mass number ($A$) conservation: $1 + 239 = w + y + z$ ⇒ $w + y + z = 240$.  \n- Step 2: Atomic number ($Z$) conservation: $0 + 94 = 54 + x$ ⇒ $x = 40$.  \n+ Neutron ($^1_0n$) contributes to $A$ but not $Z$.  \n- Step 3: Test options: $z = 240 - (w + y)$ (Option B) is correct. Other options mix $A$ and $Z$ or omit terms.  \n\n[Optional: Treat unknowns algebraically; verify each equation against conservation laws.]", "source": "Qwen 3 ④", "_id": "qwen_4_9"}, {"question": "A nuclide starts at $$(A, Z)$$. It undergoes exactly one alpha decay and exactly one beta-minus decay, but the order is unknown. Which of the following reachable states is impossible: $$(A, Z+1)$$, $$(A-4, Z-2)$$, $$(A-4, Z-1)$$, or $$(A, Z-1)$$? Explain. (3 steps)", "answer": "- Step 1: List the two possible sequences. If alpha happens first: $$(A, Z) \\to (A-4, Z-2) \\to (A-4, Z-1)$$ after beta. If beta happens first: $$(A, Z) \\to (A, Z+1) \\to (A-4, Z-1)$$ after alpha.\n- Step 2: Collect the reachable states: $$(A, Z+1)$$ (beta only, before alpha), $$(A-4, Z-2)$$ (alpha only, before beta), and $$(A-4, Z-1)$$ (both decays complete, regardless of order).\n- Step 3: The state $$(A, Z-1)$$ never appears. To drop the atomic number by 1 you would need an alpha ($$-2$$) followed by a beta ($$+1$$), but that also drops $$A$$ by 4. You cannot have a lower $$Z$$ and the original $$A$$. Hence $$(A, Z-1)$$ is impossible.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "Why is the trapezium area formula (u+v)/2×t needed for deceleration distance calculation?", "answer": "When an object decelerates from initial velocity u to final velocity v (both non-zero), the velocity-time graph forms a trapezium, not a triangle or rectangle. The formula (u+v)/2×t calculates average velocity over the interval multiplied by time, giving total displacement during deceleration. This differs from constant velocity scenarios where v×t applies.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "In nuclear decay, why does an alpha particle change both the mass number and the atomic number, whereas a beta-minus particle changes only the atomic number? (3 steps)", "answer": "- Step 1: An alpha particle is a helium nucleus, $$^{4}_{2}\\text{He}$$, composed of two protons and two neutrons. When a nucleus emits it, it loses exactly those four nucleons and two positive charges. Hence $$\\Delta A = -4$$ and $$\\Delta Z = -2$$.\n- Step 2: A beta-minus particle is an electron, $$^{0}_{-1}e$$, created when a neutron inside the nucleus converts into a proton. The total number of nucleons does not change—one neutron becomes one proton—so $$\\Delta A = 0$$. However, the number of protons increases by one, so $$\\Delta Z = +1$$.\n- Step 3: The key distinction is that alpha emission ejects a massive particle from the nucleus, while beta emission is an internal transmutation with only a light electron leaving. This is why alpha decay is the *only* common decay mode that changes the mass number.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "An ESAT question gives detector separation, gamma speed, time delay, and asks for source displacement. Rank these four pieces of information by importance. (3 steps)", "answer": "- Step 1: **Essential:** gamma speed and time delay — these give the path difference $$v \\cdot \\Delta t$$, which is the whole physical content of the answer.\n- Step 2: **Also essential (conceptually):** knowing the source is on the line between two detectors, so the ``$$\\times 2$$'' geometry applies. This is qualitative, not numeric.\n- Step 3: **Irrelevant:** the detector separation itself. It cancels in $$(d+x)-(d-x)=2x$$ and never appears in the answer. Recognising this filters your attention to the two numbers that matter, saving time and preventing you from trying to force $$3\\ \\text{m}$$ into the calculation somewhere.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Under heating, does the \"density of a fixed mass\" or the \"mass of a fixed volume\" increase? Explain the difference. (3 steps)", "answer": "- Step 1: The \"density of a fixed mass\" *decreases*, not increases. The same mass now occupies a larger volume, so $$\\rho = m/V$$ drops.\n- Step 2: The \"mass of a fixed volume\" does *not* increase. In fact, it goes down.\n+ Sub-case A: Imagine a rigid, open box of fixed volume $$V$$ submerged in the fluid. As the fluid expands, some of it spills out or moves away, so less mass remains inside that fixed region.\n- Step 3: Mass is conserved overall; it does not appear from nowhere on heating. Confusing these two phrasings is a classic ESAT trap.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A velocity-time graph shows acceleration, constant speed, deceleration, and more constant speed. If asked for the distance travelled \"while decelerating\", what is the most critical first action, and what is the common trap? (2 steps)", "answer": "- Step 1: Identify and isolate *only* the section of the graph corresponding to deceleration. Do not compute the whole journey.\n- Step 2: The trap is treating the decelerating region as a rectangle. Because the velocity changes between two non-zero values, it is a trapezium, requiring the average velocity formula.\n\nIdentify the section first, then decide the shape.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Why does only *vertical* height count in gravitational potential energy, even when an object travels along a sloped ramp? (3 steps)", "answer": "- Step 1: GPE is the work done against gravity, and gravity acts purely vertically (downward).\n- Step 2: Work is force times *displacement in the direction of the force*. So only the component of motion parallel to gravity — i.e. the vertical rise — contributes.\n- Step 3: A car pushed $$5\\ \\text{m}$$ along a ramp that rises only $$1\\ \\text{m}$$ vertically gains GPE of $$mg \\times 1$$, not $$mg \\times 5$$. The ramp length is a red herring for GPE (it only matters for the *force* needed along the ramp).\n\n*Takeaway:* GPE cares about the height gained, not the path length.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "In the motor efficiency question, explain in terms of energy flow why dividing the useful output power by $$0.8$$ gives the electrical input power, and state what happens to the difference between these two powers. (2 steps)", "answer": "- Step 1: Efficiency $$\\eta = P_{\\text{useful}} / P_{\\text{input}}$$. Rearranging yields $$P_{\\text{input}} = P_{\\text{useful}} / \\eta$$. With $$\\eta = 0.8$$, this is $$P_{\\text{useful}} / 0.8 = 1.25\\, P_{\\text{useful}}$$. The factor of $$1.25$$ represents the extra energy the supply must provide to compensate for losses.\n- Step 2: The difference $$P_{\\text{input}} - P_{\\text{useful}} = 0.25\\, P_{\\text{input}}$$ is the wasted power, dissipated as thermal energy in the motor coils, friction in the pulley, and sound. It leaves the system as non-useful energy.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "In a nuclear decay chain involving both alpha and beta-minus decays, what is the \"one fact\" that allows you to quickly crack the sequence, and why? (2 steps)", "answer": "- Step 1: **Only alpha decay changes the mass number.** Beta-minus leaves $$A$$ untouched.\n- Step 2: Therefore, the mass number can only ever sit at its starting value or drop in steps of 4. The number of alphas completely fixes the mass number at any stage. You should always read the mass number first, then worry about the atomic number.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "A mass is lifted by a motor. The useful energy is $$1200\\ \\text{J}$$, and the motor takes $$5\\ \\text{s}$$ to do this. What is the useful power delivered to the load, and how does this differ from the electrical power drawn from the supply?", "answer": "- Step 1: Useful power = useful energy / time = $$1200 / 5 = 240\\ \\text{W}$$. This is what the load ``feels'' — the rate at which its GPE grows.\n- Step 2: The electrical power drawn from the supply is *larger* if efficiency $$< 1$$, because the supply must deliver enough to cover both useful output and wasted energy.\n- Step 3: With $$80\\%$$ efficiency: electrical input power = $$240/0.8 = 300\\ \\text{W}$$. On a $$12\\ \\text{V}$$ supply, this gives $$I = 300/12 = 25\\ \\text{A}$$, matching the direct $$E$$-based calculation.\n\n*Takeaway:* useful power and input power differ by a factor of $$1/\\eta$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "In a question asking \"how much energy is wasted to the surroundings\", why is the given efficiency often a distractor? (3 steps)", "answer": "- Step 1: The efficiency links input and useful output ($$\\eta = E_{\\text{useful}}/E_{\\text{input}}$$), so if the question already gives you the input directly, you have one of those two.\n- Step 2: Wasted energy is just input minus useful. If you can obtain useful energy from a physical formula (like $$mgh$$ for a lift), you never need efficiency at all — the question hands you both quantities.\n- Step 3: The efficiency figure is thrown in to tempt you into a longer route (splitting motor losses from post-motor losses), but the answer comes out the same. Recognising the redundant information is the ESAT skill being tested.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "In the previous question, what is the purpose of the efficiency value (75%) if not needed for finding wasted energy?", "answer": "The efficiency would be needed if you were asked something like \"what is the motor's internal loss?\" or \"what is the useful output energy from the motor before the ramp?\" In that case: motor output $= 0.75 \\times 28$ kJ = 21 kJ, and motor loss $= 0.25 \\times 28$ kJ = 7 kJ. Then you'd subtract the 12 kJ of actual useful work to find additional losses. But for \"total energy lost to surroundings,\" the direct route is always: wasted = input - useful. Always ask what the question actually wants before reaching for every piece of data.", "source": "MiniMax ①", "_id": "minimax_1_5"}, {"question": "Why does the ``spot the useful energy directly'' shortcut for energy-loss questions require you to *not* over-decompose the system?", "answer": "If a question describes a system in stages (motor → rope → pulley → load) with intermediate efficiencies, it is *tempting* to compute the loss at each stage. But the total loss is just $$E_{\\text{input}} - E_{\\text{useful, final}}$$ — you don't need to track intermediate stages. Over-decomposing wastes time and multiplies opportunities for arithmetic slip. The habit to build: as soon as you identify the *final* useful output (usually GPE or KE of the load) and the *initial* input, subtract. Ignore what happens in between.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "In a PET scanner, why does moving the emitting source by a distance $$x$$ from the midpoint change the *path difference* to the two detectors by $$2x$$, not $$x$$? (4 steps)", "answer": "- Step 1: When the source is at the midpoint $$Q$$, each detector is a distance $$d$$ away, and the path difference is $$0$$.\n- Step 2: Shift the source by $$x$$ *toward* detector A. Now detector A is at distance $$d - x$$ (closer by $$x$$), and detector B is at distance $$d + x$$ (farther by $$x$$).\n- Step 3: The path difference is $$(d+x) - (d-x) = 2x$$. The $$d$$'s cancel, and the two $$x$$ contributions *add* — one from the closer path being closer, one from the farther path being farther.\n- Step 4: This ``$$\\times 2$$'' amplification is what makes PET spatially sensitive: a tiny displacement of the source produces double the path difference, so double the measurable time delay.\n\n*Takeaway:* source displacement $$= \\tfrac{1}{2} \\times$$ path difference.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "A PET scanner detects two gamma-rays with time difference $$4 \\times 10^{-10}\\ \\text{s}$$, gamma speed $$3 \\times 10^{8}\\ \\text{m/s}$$. Detectors are $$3.0\\ \\text{m}$$ apart. How far is the source from the midpoint, and why is the detector spacing irrelevant? (4 steps)", "answer": "- Step 1: The path difference between the two gamma-rays is $$\\Delta x = v \\cdot \\Delta t = (3 \\times 10^{8})(4 \\times 10^{-10}) = 12 \\times 10^{-2}\\ \\text{m} = 12\\ \\text{cm}$$.\n- Step 2: Because moving the source by $$x$$ changes the path difference by $$2x$$, we have $$2x = 12\\ \\text{cm}$$, so $$x = 6\\ \\text{cm}$$.\n- Step 3: The detector separation of $$3\\ \\text{m}$$ never enters the calculation — the ``$$d$$'' cancels in the path-difference expression $$(d+x)-(d-x) = 2x$$.\n- Step 4: This is a deliberate distractor: recognising the detector gap is irrelevant is exactly the ``decide what information matters'' skill the ESAT trains.\n\n*Takeaway:* halve the path difference to get the displacement; ignore the detector spacing.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "How do the phrases “density of a fixed mass” and “mass of a fixed volume” behave oppositely when a fluid is heated, and why is this distinction critical for understanding convection? (3 steps)", "answer": "- Step 1: For a **fixed mass**, heating increases volume $$V$$. Since $$\\rho = m/V$$ with constant $$m$$ and larger $$V$$, the density $$\\rho$$ **decreases**. This is the driver of convection: the fluid becomes buoyant and rises.\n- Step 2: For a **fixed volume** (imagine a rigid box of water), heating causes some fluid to expand and flow *out* of that box. The mass inside the box therefore **decreases**, not increases. The claim that the mass of a fixed volume increases is false; mass cannot appear from nowhere.\n- Step 3: The distinction is critical because convection is explained by the *fixed-mass* argument: a parcel of fluid that stays together becomes less dense and rises. Confusing the two framings leads to the incorrect conclusion that a heated region gains mass, which would wrongly predict it sinks.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "During uniform deceleration from an initial velocity $$u$$ to a final velocity $$v$$ over a time $$t$$, why is the distance travelled exactly equal to the area of a trapezium, and how does this area formula emerge from averaging the two velocities? (4 steps)", "answer": "- Step 1: On a $$v$$–$$t$$ graph, uniform deceleration is a straight line sloping downward from $$(0, u)$$ to $$(t, v)$$. The region under this line is bounded by the vertical velocity axis at $$t=0$$ (height $$u$$), the vertical line at $$t$$ (height $$v$$), and the time axis. This quadrilateral has one pair of parallel sides (the two vertical heights $$u$$ and $$v$$) separated by the horizontal distance $$t$$; geometrically, this is a trapezium.\n- Step 2: You can decompose this trapezium into a rectangle of height $$v$$ and width $$t$$, plus a right-angled triangle of base $$t$$ and height $$(u - v)$$. The area is $$v \\cdot t + \\frac{1}{2}(u - v)t$$.\n- Step 3: Simplifying algebraically: $$vt + \\frac{1}{2}ut - \\frac{1}{2}vt = \\frac{1}{2}ut + \\frac{1}{2}vt = \\frac{u+v}{2} \\cdot t$$. This shows the area is exactly the **average velocity** multiplied by the total time.\n- Step 4: Intuitively, uniform deceleration means the velocity decreases linearly, so every instantaneous value between $$u$$ and $$v$$ is equally weighted. The “typical” velocity over the interval is therefore the mean of the start and end values. Multiplying this mean by the duration gives the total distance, which is precisely why the trapezium formula works.", "source": "Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "Efficiency is defined as $$\\eta = \\frac{E_{useful}}{E_{input}}$$. When converting a known useful output energy into the required input energy, does the input value get larger or smaller, and why? (2 steps)", "answer": "- Step 1: The input value gets **larger**. You rearrange to $$E_{input} = \\frac{E_{useful}}{\\eta}$$, and since $$\\eta < 1$$, dividing by a fraction increases the number.\n- Step 2: Physical intuition: an inefficient machine must be fed *more* energy than it usefully delivers because some energy is always lost to the surroundings. If your calculation makes the input smaller than the output, you divided the wrong way.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "A fluid is heated. Compare what happens to (i) the density of a fixed mass of the fluid, and (ii) the mass contained within a fixed volume of the fluid. Explain which of these descriptions is physically consistent with mass conservation. (3 steps)", "answer": "- Step 1: For a fixed mass, heating causes thermal expansion ($$V$$ increases). Since $$\\rho = m/V$$ with constant $$m$$, the density decreases. This is correct and consistent with conservation of mass.\n- Step 2: For a fixed volume, consider a defined boundary like a $$1\\ \\text{m}^3$$ cube inside the fluid. When heated, the fluid expands and some of it pushes outside that cube. No new mass enters, so the mass remaining inside the fixed volume actually decreases.\n+ Claiming the mass of a fixed volume increases would violate mass conservation, because heat is energy, not matter, and cannot create particles.\n- Step 3: Therefore, the valid descriptions are \"density of a fixed mass decreases\" and \"volume of a fixed mass increases.\" The statement \"mass of a fixed volume increases\" is impossible because mass cannot appear from nowhere.", "source": "Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "Why is the detector separation (e.g., $$3.0\\ \\text{m}$$) irrelevant when calculating the source displacement from the time delay in the PET scanner setup? (2 steps)", "answer": "- Step 1: The path difference depends only on how much *further* one ray travels compared with the other. This extra distance is determined entirely by the speed of the rays and the arrival time delay ($$\\Delta x = c \\cdot \\Delta t$$).\n- Step 2: The absolute separation of the detectors cancels out in the geometry (see the $$(d/2 + x) - (d/2 - x) = 2x$$ derivation). Whether the detectors are 3 m or 30 m apart, a shift of $$x$$ from the midpoint always creates a path difference of $$2x$$. Including the detector separation in the calculation is a classic example of using irrelevant information.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "When a fixed mass of fluid is heated, why does its volume increase at the microscopic level, and why does this not violate the conservation of mass? (3 steps)", "answer": "- Step 1: Heating increases the kinetic energy of the particles. They vibrate or move more vigorously, and the average separation between neighbouring particles increases slightly because the interparticle forces are not perfectly rigid.\n- Step 2: Because the particles push farther apart on average, the substance occupies a larger macroscopic volume. However, **no new particles are created** and none are destroyed; the mass $$m$$ remains exactly the same.\n- Step 3: Therefore, mass conservation is intact. The expansion is a rearrangement of the existing particles over a larger region of space, not an increase in the amount of matter. This is why density, defined as $$\\rho = m/V$$, must decrease: the same mass is now spread over a larger volume.", "source": "Kimi K2.6 ①", "_id": "kimi_1_8"}, {"question": "In convection, which is the correct causal chain: \"heating causes density to decrease which causes volume to increase,\" or \"heating causes volume to increase which causes density to decrease\"? Why does the order matter? (2 steps)", "answer": "- Step 1: The correct causal chain is: **heating → volume increases → density decreases**. Heating gives particles more kinetic energy, which makes them spread apart (volume increases first). Because mass is conserved, the density then decreases as a *consequence*.\n- Step 2: The order matters because it tells you which quantity is the \"driver\" and which is the \"consequence.\" Reversing the causality would suggest density magically decreases first (with no physical mechanism), then volume increases to compensate. In Q4, this is why statements 2 and 3 are both correct — they describe the same chain from different angles. Statement 3 (volume increases) is the direct effect of heating; statement 2 (density decreases) is the consequence.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "In a convection current inside a saucepan, why does the cooler water sink to the bottom rather than simply staying where it is? Relate your answer to the pressure gradient and density differences in the fluid. (2 steps)", "answer": "- Step 1: Fluid pressure increases with depth because the weight of overlying fluid grows. A fluid element at a given depth must have enough density to withstand the surrounding pressure; otherwise it is compressed or displaced.\n- Step 2: Cooler water is denser than the warmer water above it. At any given depth, the denser cooler packet experiences a greater downward gravitational force per unit volume than the upward pressure force from below. This net downward force makes it sink, displacing the less-dense warm water upward and closing the convection loop.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "Consider the grid-paper demo: source at midpoint, each path is 15 squares. Now shift the source 2 squares toward one detector. What are the new path lengths and path difference, and what general rule does this illustrate? (3 steps)", "answer": "- Step 1: One path decreases from 15 to 13 (source moved 2 closer). The other increases from 15 to 17 (source moved 2 farther).\n- Step 2: Path difference is $$17 - 13 = 4$$ squares — exactly twice the 2-square source shift.\n- Step 3: **General rule:** shift the source by $$x$$, and the path difference changes by $$2x$$. Equivalently, source displacement $$= \\tfrac{1}{2} \\times$$ path difference. This is the concrete geometric picture behind the algebraic identity $$(d+x)-(d-x)=2x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A hot-air balloon rises because the air inside is heated. Explain this using the same physics as the convection current in a saucepan, but explain why the balloon rises as a unit rather than circulating. (2 steps)", "answer": "- Step 1: The same physics applies: heating the air inside the balloon causes it to expand (volume increases) and its density to decrease ($$\\rho = m/V$$, with $$m$$ roughly constant since the balloon is open at the bottom). The hot air is less dense than the surrounding cooler air, so it experiences a buoyant force upward.\n- Step 2: The difference from convection in a saucepan is that the hot air is **trapped inside the balloon envelope** — it can't circulate out and be replaced. Instead, the entire balloon (as a sealed unit of low-density air) rises as one object. In a saucepan, the hot water is free to move and be replaced, creating a circulating current. The balloon is more like a single \"parcel\" of low-density fluid rising through a denser medium.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "In the ESAT exam, the approach to problem-solving differs fundamentally from A-level written exams. What instinct must you retrain, and why? (2 steps)", "answer": "- Step 1: At A-level, rigour (full working, exact values, every step shown) is rewarded with marks. In ESAT, you have roughly 89 seconds per question, no calculator, and no formula sheet.\n- Step 2: Therefore, you must retrain the instinct to show every step. Rigour costs time in ESAT. You must skip steps, approximate freely, and only chase precision if two answer options are very close.\n\nBad habits for A-level are good habits for ESAT.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "A hot air balloon rises because the air inside is heated. Explain conceptually why heating causes lift, in terms of density and buoyancy. (4 steps)", "answer": "- Step 1: Heating the air inside the balloon expands it: the volume increases, but since some hot air is pushed *out* of the open bottom, the mass inside the balloon actually decreases.\n- Step 2: The balloon's volume is roughly fixed by the envelope, but it now contains less air, so the mean density inside is lower than the surrounding cool air outside.\n- Step 3: Buoyancy pushes any less-dense object upward through a denser fluid — same principle as wood floating on water.\n- Step 4: So the balloon rises. Note: this uses ``mass of a fixed volume decreases'' (the envelope's volume is fixed while gas leaks out on heating) — the opposite scenario from ``fixed mass expands.''\n\n*Takeaway:* thermal expansion + buoyancy = lift, and the direction of density change depends on which quantity is fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "How do alpha and beta decays determine the possible mass and atomic numbers in a decay chain? (3 steps)", "answer": "- Step 1: Alpha decay reduces $A$ by 4 and $Z$ by 2. Beta decay leaves $A$ unchanged but increases $Z$ by 1.  \n- Step 2: Mass number $A$ can only be $P$ (no alpha) or $P-4$ (after one alpha). Beta decays adjust $Z$ within these $A$ values.  \n+ Example: After one alpha ($A = P-4$) and three betas ($Z = Q-2 + 3 = Q+1$), the nuclide is $P-4, Q+1$.  \n- Step 3: A nuclide with $A = P$ and $Z < Q$ is impossible because lowering $Z$ requires an alpha, which also lowers $A$.  \n\n[Optional: Only alpha decays change the mass number; beta decays alter atomic numbers within fixed mass numbers.]", "source": "Qwen 3 ④", "_id": "qwen_4_5"}, {"question": "A nuclide $$^P_Q X$$ decays via one alpha and three beta-minus particles. Explain which combinations of $$(A, Z)$$ are reachable at any intermediate stage. (3 steps)", "answer": "- Step 1: **Before the alpha fires** ($$0$$–$$3$$ betas already occurred, $$0$$ alphas): mass number is still $$P$$; atomic number has risen by $$0$$ to $$3$$, so $$Z \\in \\{Q, Q+1, Q+2, Q+3\\}$$.\n- Step 2: **After the alpha fires** ($$0$$–$$3$$ betas already, $$1$$ alpha): mass number is $$P-4$$; atomic number is down by $$2$$ from alpha and up by $$0$$–$$3$$ from betas, so $$Z \\in \\{Q-2, Q-1, Q, Q+1\\}$$.\n- Step 3: The complete set of reachable states is these two rows combined. Any pair *outside* these lists — for example $$(P, Q-1)$$ — is impossible because it would need $$Z$$ to have decreased *without* $$A$$ decreasing, which no single decay can do.\n\n*Takeaway:* mass number pins the row; atomic number range depends on how many betas have fired.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "If a motor system is $$50\\%$$ efficient, by what simple factor does the required input power exceed the useful output power? If the efficiency were $$25\\%$$, what would that factor become? Use these limiting cases to explain why efficiency approaching zero implies dramatically higher input demand. (2 steps)", "answer": "- Step 1: The scaling factor is $$1/\\eta$$. At $$50\\%$$ efficiency, $$1/0.5 = 2$$, so the input power must be twice the useful power. At $$25\\%$$ efficiency, $$1/0.25 = 4$$, so the input must be four times the useful power.\n- Step 2: As $$\\eta$$ shrinks toward zero, $$1/\\eta$$ grows without bound. This means a very inefficient machine needs a huge electrical input to deliver even a modest amount of useful mechanical work; almost all the supplied energy is wasted, so the current drawn from the supply becomes disproportionately large.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "A motor with a total energy input of $$28\\ \\text{kJ}$$ lifts a $$1200\\ \\text{kg}$$ car vertically by $$1.0\\ \\text{m}$$ ($$g = 10\\ \\text{N/kg}$$). Without using the efficiency figure, what is the total energy wasted to the surroundings? (2 steps)", "answer": "- Step 1: The useful energy stored as gravitational potential energy is $$E_{\\text{useful}} = mgh = 1200 \\times 10 \\times 1.0 = 12\\,000\\ \\text{J} = 12\\ \\text{kJ}$$. This is the only energy that achieved the intended purpose.\n- Step 2: By conservation of energy, the total waste is the input minus the useful output: $$E_{\\text{wasted}} = 28\\ \\text{kJ} - 12\\ \\text{kJ} = 16\\ \\text{kJ}$$. Notice that the arithmetic is deliberately chosen to be a simple subtraction.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "A heater is immersed in water and connected to a 20 V supply drawing 5 A for 100 s. The water gains 8000 J of thermal energy. Is the system lossless? If not, how much energy is wasted and what is the efficiency? (3 steps)", "answer": "- Step 1: Total electrical energy input = $$IVt = 5 \\times 20 \\times 100 = 10{,}000$$ J. The useful energy absorbed by the water is 8000 J.\n- Step 2: Since $$E_{\\text{in}} \\neq E_{\\text{useful}}$$, the system is not lossless. The wasted energy is $$E_{\\text{wasted}} = 10{,}000 - 8000 = 2000$$ J.\n- Step 3: The efficiency is $$\\eta = E_{\\text{useful}} / E_{\\text{in}} = 8000/10000 = 0.8 = 80\\%$$. Notice we found the wasted energy without needing the efficiency — the same shortcut as Q6: all that matters is useful vs. total.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "A source is exactly halfway between two detectors. If the source shifts a distance $$x$$ towards one detector, explain why the path difference between the two rays becomes $$2x$$, not $$x$$. (2 steps)", "answer": "- Step 1: Shifting by $$x$$ towards detector A makes path A shorter by $$x$$ (new length $$d-x$$) and path B longer by $$x$$ (new length $$d+x$$).\n- Step 2: The difference is $$(d+x) - (d-x) = 2x$$. Moving the source changes both paths in opposite directions, doubling the effect on the difference.\n\nDisplacement of source is half the path difference.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Using the fact that only alpha decay changes the mass number, outline the complete set of reachable $$(A,Z)$$ states for a decay chain with one alpha and up to three betas, starting from $$(P,Q)$$. Then identify which single option among the choices is impossible. (3 steps)", "answer": "- Step 1: Before the alpha occurs, only betas may have been emitted. Betas increase $$Z$$ by $$1$$ each without changing $$A$$. The reachable states are $$(P, Q)$$, $$(P, Q+1)$$, $$(P, Q+2)$$, and $$(P, Q+3)$$.\n- Step 2: After the alpha occurs, $$A$$ becomes $$P-4$$ and $$Z$$ becomes $$Q-2$$. Adding $$0$$ to $$3$$ betas raises $$Z$$ by $$0$$ to $$3$$, giving reachable states $$(P-4, Q-2)$$, $$(P-4, Q-1)$$, $$(P-4, Q)$$, and $$(P-4, Q+1)$$.\n- Step 3: The impossible state is $$(P, Q-1)$$: it retains the original mass number, which means no alpha has occurred, but its atomic number is below $$Q$$. Beta decay cannot reduce $$Z$$, and alpha decay would have forced $$A$$ down to $$P-4$$. This coupling makes $$(P, Q-1)$$ unreachable.", "source": "Kimi K2.6 ②", "_id": "kimi_2_18"}, {"question": "You compute an ESAT physics answer and it doesn't match any option. What's the sensible next step? (3 steps)", "answer": "- Step 1: Check the order of magnitude first — look at the exponent (power of ten) and the mantissa separately. Errors often come from miscounting powers of ten in $$\\times 10^n$$ multiplication.\n- Step 2: Check for common traps: a factor of 2 (as in path difference vs displacement), an efficiency factor forgotten (as in Q12), a wrong shape for area (rectangle vs trapezium in Q2), or confusing $$mgh$$ input vs useful.\n- Step 3: If two options look close in magnitude, the question is probably testing which factor you missed — reread it and see if you skipped a step (× 2, ÷ 0.8, etc.).\n\nSkipping to a second-pass and returning later is legitimate — don't burn 5 minutes on one question.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What is the strategic argument for *not* attempting ESAT questions in numerical order? (3 steps)", "answer": "- Step 1: Every question is worth the same mark, but questions differ enormously in how much time they consume. A hard question at position 5 that eats 4 minutes costs you the ability to bank three easy questions later.\n- Step 2: By scanning the paper and picking off recognisable, short-route questions first, you convert your fixed time into the maximum number of secured marks.\n- Step 3: You then return to the time-sinks with whatever time remains — but crucially, your ``easy marks'' are already locked in. A confirmed easy mark beats a probabilistic hard mark.\n\n*Takeaway:* order the paper by *your speed*, not the examiner's numbering.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A 20 kg mass is lifted 6.0 m vertically in 5.0 s by an 80%-efficient motor–pulley system on a 12 V supply. Explain how to find the current, and identify the step students most often forget. (4 steps)", "answer": "- Step 1: Find useful energy: $$E_{\\text{useful}} = mgh = 20 \\times 10 \\times 6.0 = 1200\\ \\text{J}$$.\n- Step 2: If the system were 100% efficient, this useful energy would equal the electrical energy delivered by the supply, so $$I_{\\text{ideal}} = \\dfrac{E_{\\text{useful}}}{Vt} = \\dfrac{1200}{12 \\times 5} = 20\\ \\text{A}$$.\n- Step 3: But the system is only 80% efficient, so the supply must deliver *more* than 1200 J to achieve 1200 J of useful lift. Input energy $$= 1200 / 0.8 = 1500$$ J, and correspondingly $$I_{\\text{actual}} = 20/0.8 = 25\\ \\text{A}$$.\n- Step 4: The commonly missed step is dividing by efficiency at the end — students stop at 20 A, treating the useful energy as the supply energy.\n\nSanity check: the actual current must be *larger* than the ideal-case current, never smaller.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "In the decay chain question, why is mass number P with atomic number Q-1 impossible, but P-4 with atomic number Q-2, Q-1, Q, or Q+1 all possible?", "answer": "The key is understanding what each decay type does:\n- Beta-minus only changes atomic number (+1), never mass number. So if you haven't emitted an alpha yet, mass stays at P, and Z can only increase (Q, Q+1, Q+2, Q+3 for 0-3 betas)\n- Alpha changes BOTH mass (-4) and atomic number (-2). So after the alpha, mass is P-4 and Z becomes Q-2 plus whatever betas afterward (0 to 3 more)\n\nTo have reduced atomic number (below Q), you must have had an alpha — but alpha automatically reduces mass to P-4. You cannot have Q-1 with mass P: that would require lowering Z without lowering A, which no decay can do.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "A student says: \"When you heat water, its particles gain energy, so they weigh more, which is why hot water rises.\" What is wrong with this explanation? (2 steps)", "answer": "- Step 1: Heating adds **kinetic energy** to particles, not mass. Mass is conserved — you haven't added or removed any particles, so the total mass is unchanged. Individual particles don't \"weigh more\" after gaining kinetic energy.\n- Step 2: Hot water rises because its **density decreases** (same mass, larger volume), not because its mass increases. The correct explanation is: heating → particles spread apart → volume increases → density decreases → less-dense fluid rises. The student has confused \"has more energy\" with \"has more mass\" — these are fundamentally different quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "If a machine is $$80\\%$$ efficient, why must the electrical input power be *larger* than the useful mechanical output power, and does this mean you multiply or divide by $$0.8$$ when converting from useful to input? (3 steps)", "answer": "- Step 1: Efficiency is defined as $$\\eta = P_{\\text{useful}} / P_{\\text{input}}$$. Because real machines dissipate energy as heat, sound, and friction, the useful output is always a *fraction* of the input. Therefore $$P_{\\text{input}}$$ must be greater than $$P_{\\text{useful}}$$.\n- Step 2: Rearranging gives $$P_{\\text{input}} = P_{\\text{useful}} / \\eta$$. With $$\\eta = 0.8 = 4/5$$, dividing by $$4/5$$ is the same as multiplying by $$5/4 = 1.25$$. The input is therefore $$25\\%$$ larger than the useful output.\n- Step 3: A dangerous misconception is to multiply by $$0.8$$, which would make the input *smaller* than the useful output—physically impossible. The sanity check is: if your efficiency step reduces the required current or power, you have divided the wrong way.", "source": "Kimi K2.6 ①", "_id": "kimi_1_18"}, {"question": "Given ¹₀n + ²³⁹₉₄Pu → ʷ₅₄Xe + ʸₓZr + z¹₀n, what does mass number conservation imply?", "answer": "Total mass numbers must balance on both sides: 1 (from neutron) + 239 (from Pu) = w (Xe) + y (Zr) + z (neutrons). This gives 240 = w + y + z. This implies z = 240 - (w + y), meaning the number of free neutrons depends on the mass numbers of the daughter nuclides.", "source": "Qwen 3 ③", "_id": "qwen_3_10"}, {"question": "How would the current calculation change if efficiency improved to 100%?", "answer": "With 100% efficiency, Input power = Useful output power. Using P = IV: I = P/V = (mgh)/Vt = (20 kg × 10 N/kg × 6 m) / (12 V × 5 s) = 1200 J / 60 Vs = 20 A. This shows why 25 A (actual) > 20 A (ideal) - energy losses require higher input current.", "source": "Qwen 3 ③", "_id": "qwen_3_12"}, {"question": "In a decay chain problem, why is it useful to list the *reachable* states rather than the *forbidden* ones? (3 steps)", "answer": "- Step 1: The reachable states form a small, enumerable set (e.g. 4 values of $$Z$$ for each of 2 possible values of $$A$$, giving 8 total states).\n- Step 2: The forbidden states are the entire infinite complement — you can't enumerate them.\n- Step 3: So checking if an option is reachable (by seeing if it appears in your short enumerated list) is fast. Checking if it's forbidden by reasoning ``from scratch'' is slow. The technique generalises: whenever a small allowed set exists, list it explicitly and scan for absences.\n\n*Takeaway:* build the ``possible'' list; the impossible option is the one *not* in it.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "In ESAT multiple-choice, why is it dangerous to work through every question in numerical order?", "answer": "The ESAT has ~27 questions in 40 minutes (≈89 seconds each). Some questions are quick once you spot the physics; others require more time. The strategy is: scan the paper, identify questions you can do fast, bank those marks first, then return to harder ones. Working sequentially wastes time on questions you could do quickly while you're stuck on ones that need more thought. This is \"banking easy marks\" — it's strategic, not lazy.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "In Q6, the motor is 75% efficient, but Tom says you \"never need the efficiency at all\" to find the total energy wasted. How is this possible? (2 steps)", "answer": "- Step 1: The question gives you both the **total input energy** (28 kJ) and enough information to compute the **useful output energy** directly ($$mgh = 1200 \\times 10 \\times 1.0 = 12$$ kJ). Since $$E_{\\text{wasted}} = E_{\\text{in}} - E_{\\text{useful}} = 28 - 12 = 16$$ kJ, you have the answer in one subtraction.\n- Step 2: The 75% efficiency is a **distractor** for this particular question. It would let you calculate motor-internal losses ($$0.25 \\times 28 = 7$$ kJ) and motor output ($$0.75 \\times 28 = 21$$ kJ), but then you'd need to reconcile 21 kJ of motor output against 12 kJ of useful GPE — an unnecessary detour. The fast route is: spot the useful energy, subtract from the input, done.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "In convection, why does the water at the bottom of a heated saucepan rise, while cooler water sinks?", "answer": "The heat source warms the water at the bottom first. This water expands (volume increases). For a fixed mass, increased volume means decreased density ($\\rho = m/V$). The less-dense hot water experiences an upward buoyant force from the surrounding cooler, denser water — it rises. Cooler water, being denser, sinks to take its place. This density-driven circulation is the convection current. The key causal chain: heat → expansion → lower density → rises.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "In the PET scanner problem, the path difference is $$12\\ \\text{cm}$$. A student immediately selects the $$12\\ \\text{cm}$$ answer option. Explain the conceptual reason this is wrong, and why the source displacement must be smaller than the path difference. (2 steps)", "answer": "- Step 1: The $$12\\ \\text{cm}$$ path difference is the *extra distance one photon travels relative to the other*. It is not the distance the source has moved from the centre.\n- Step 2: When the source shifts by $$x$$ toward one detector, that ray's path shortens by $$x$$ while the opposite ray's path lengthens by $$x$$. The net difference between the two paths grows by $$2x$$. Therefore the displacement $$x$$ is only half the path difference, giving $$6\\ \\text{cm}$$ rather than $$12\\ \\text{cm}$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "An electric motor pulls a car up a ramp. The total electrical energy supplied is $$28\\ \\text{kJ}$$, and the useful gravitational potential energy gained by the car is $$12\\ \\text{kJ}$$. A student tries to find the total energy wasted by first calculating $$25\\%$$ of $$28\\ \\text{kJ}$$ from the motor's $$75\\%$$ efficiency. Why does this give the wrong total waste, and what is the correct conceptual shortcut? (3 steps)", "answer": "- Step 1: The $$75\\%$$ efficiency refers specifically to the motor, but the question states that energy is lost to the surroundings \"from the motor and other causes.\" The $$25\\%$$ motor loss ($$7\\ \\text{kJ}$$) ignores additional waste (friction, sound, ramp losses) that occurs after the motor.\n- Step 2: The fundamental principle is conservation of energy for the entire system: $$E_{\\text{input}} = E_{\\text{useful}} + E_{\\text{wasted}}$$. If you can identify the useful output directly ($$mgh = 12\\ \\text{kJ}$$) and you are given the total input ($$28\\ \\text{kJ}$$), the total waste is simply their difference.\n- Step 3: Therefore, $$E_{\\text{wasted}} = 28 - 12 = 16\\ \\text{kJ}$$ in one step. The efficiency percentage is a distractor for this particular question because it only quantifies one stage of loss, not the total loss asked for.", "source": "Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "When analysing a decay chain that includes both alpha and beta decays, why should you examine the mass number first, and what does this immediately tell you about the sequence? (2 steps)", "answer": "- Step 1: Because beta decay leaves the mass number $$A$$ completely unchanged, the only way the mass number can drop is through alpha decay, which subtracts 4. Therefore, the mass number can only ever be the original value or that value minus multiples of 4.\n- Step 2: This partitions the timeline cleanly. If an intermediate nuclide has the original mass number $$P$$, the alpha has not yet occurred (only betas have). If it has mass number $$P-4$$, the alpha has already occurred, and some number of betas may have followed. Reading $$A$$ first therefore tells you whether you are in the “before-alpha” or “after-alpha” phase, collapsing the possibilities dramatically.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "When heating a fixed mass of gas in a sealed flexible balloon versus heating the same mass in a rigid metal can, in which container does the density decrease, and why does the other container behave differently? (3 steps)", "answer": "- Step 1: In the flexible balloon, the volume is free to expand as particles push the walls outward. Since $$m$$ is fixed and $$V$$ increases, $$\\rho = m/V$$ decreases.\n- Step 2: In the rigid metal can, the volume is fixed by the container walls. The particles speed up but cannot push the walls apart, so $$V$$ stays constant. With both $$m$$ and $$V$$ unchanged, the density remains the same.\n+ Pressure increases instead, because faster particles collide with the walls more frequently and with greater momentum transfer.\n- Step 3: This contrast highlights why the phrase \"fixed mass\" versus \"fixed volume\" is decisive. Convection requires the flexible scenario: expansion must be permitted so that density can drop and buoyancy can drive flow.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "Where does gamma decay fit into the alpha/beta decay chain analysis, and why does it never help resolve an “impossible nuclide” puzzle? (2 steps)", "answer": "- Step 1: Gamma decay is the emission of a high-energy photon from an excited nucleus. It carries no mass ($$\\Delta A = 0$$) and no charge ($$\\Delta Z = 0$$).\n- Step 2: Because it changes neither the mass number nor the atomic number, it does not move a nuclide to a different cell on the $$A$$–$$Z$$ grid. It only releases excess energy. Therefore, when deciding whether a nuclide is reachable in a decay chain, gamma decay can be completely ignored; it cannot create or eliminate any mass-number/atomic-number combinations.", "source": "Kimi K2.6 ①", "_id": "kimi_1_23"}, {"question": "A decay chain consists of one alpha decay and three beta-minus decays. Explain why the mass number of any intermediate nuclide can only be one of two possible values. (2 steps)", "answer": "- Step 1: Beta-minus decay leaves the mass number unchanged ($$\\Delta A = 0$$). Only the alpha decay changes the mass number ($$\\Delta A = -4$$).\n- Step 2: Therefore, the mass number is either the original value (if the alpha hasn't happened yet) or the original value minus 4 (if the alpha has happened). It can never be anything else.\n\nThe number of alphas fixes the mass number completely.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "When a nucleus undergoes exactly one alpha decay followed immediately by one beta-minus decay, what is the net change in mass number and atomic number? Explain why the beta decay \"partially undoes\" the alpha's effect on charge but cannot undo its effect on mass. (2 steps)", "answer": "- Step 1: Alpha decay: $$\\Delta A = -4$$, $$\\Delta Z = -2$$. Subsequent beta-minus decay: $$\\Delta A = 0$$, $$\\Delta Z = +1$$. The net change is $$\\Delta A = -4$$ and $$\\Delta Z = -1$$.\n- Step 2: The beta decay converts a neutron to a proton, restoring one unit of positive charge and raising $$Z$$ back by $$1$$. However, the alpha particle carried away four nucleons permanently; the beta process does not create new nucleons in the nucleus, it only reclassifies an existing one. Thus the mass-number loss of $$4$$ is irreversible in this chain.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "Two detectors are placed on opposite sides of a patient. A gamma source at the midpoint $$Q$$ is equidistant from both. If the source shifts by a distance $$x$$ toward one detector, prove that the path difference between the two gamma-ray paths becomes exactly $$2x$$, not $$x$$. (3 steps)", "answer": "- Step 1: Let the detector separation be $$D$$. At midpoint $$Q$$, each path length is $$D/2$$, so the difference is zero. Shift the source by $$x$$ toward detector 1.\n- Step 2: The new path to detector 1 is $$(D/2 - x)$$, and the new path to detector 2 is $$(D/2 + x)$$. The source moving closer to one detector shortens that path by $$x$$.\n+ Crucially, moving away from the other detector lengthens that second path by the same amount $$x$$. The changes are opposite and equal.\n- Step 3: The path difference is $$(D/2 + x) - (D/2 - x) = 2x$$. Therefore a source displacement of $$x$$ creates a path difference twice as large. The displacement is always half the path difference.", "source": "Kimi K2.6 ②", "_id": "kimi_2_11"}, {"question": "In Q10, the mass-number balance gives $$w + y + z = 240$$. The correct answer is option B: $$z = 240 - (w + y)$$. Why do the other options fail? (3 steps)", "answer": "- Step 1: Option B is simply a rearrangement of $$w + y + z = 240$$: move $$(w + y)$$ to the right side. The correct answer is often a rearrangement of a conservation law rather than the law in its most obvious form.\n- Step 2: The other options fail because:\n+ **Option C** ($$x = 40 - z$$): wrong — $$x = 40$$ outright from atomic-number balance; $$z$$ has nothing to do with $$x$$.\n+ **Options D and E**: both force $$x \\neq 40$$, contradicting the atomic-number balance.\n+ **Option F** ($$94 = w + y + 1$$): mixes mass numbers ($$w, y$$) into an atomic-number equation and drops $$z$$.\n- Step 3: Strategy: write both balance equations first, then run down the options eliminating any that use a variable in the wrong row or drop a term. Always check every option — don't stop at the first one that looks plausible.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "A nuclide $${}^{P}_{Q}X$$ decays to stable $$Y$$, emitting 1 alpha and 3 beta-minus particles. How do you quickly identify an impossible intermediate nuclide? (3 steps)", "answer": "- Step 1: Fix the mass number first. It can only be $$P$$ (no alpha yet) or $$P-4$$ (alpha done). Any other mass number is instantly impossible.\n- Step 2: For each allowed mass number, list the range of atomic numbers. Before the alpha (mass $$P$$), only 0-3 betas occur, so $$Z$$ can only be $$Q, Q+1, Q+2, Q+3$$ (never below $$Q$$). After the alpha (mass $$P-4$$), $$Z$$ is $$Q-2$$ plus 0-3 betas, giving $$Q-2, Q-1, Q, Q+1$$.\n- Step 3: The impossible option will be one that requires a lowered atomic number without a lowered mass number (e.g., $$P$$ with $$Q-1$$). To drop $$Z$$ you need an alpha, but an alpha also drops $$A$$, so you can't have the original mass number.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "Why is the alpha decay's \"loss of 2 protons and 2 neutrons\" cleanly expressible as $$\\Delta A = -4, \\Delta Z = -2$$? (2 steps)", "answer": "- Step 1: An alpha particle is a helium-4 nucleus, $$^4_2\\text{He}$$: 2 protons and 2 neutrons, so 4 nucleons total with atomic number 2. When emitted, the parent nucleus loses exactly those 4 nucleons and those 2 protons.\n- Step 2: So the daughter has 4 fewer nucleons ($$\\Delta A = -4$$) and 2 fewer protons ($$\\Delta Z = -2$$). This is why alpha decay always shifts the nuclide \"diagonally\" down-and-left on the chart of nuclides.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}], "models": {"glm_1": {"label": "GLM 5.1 ①
