", "cards": [{"question": "In the ESAT exam, the approach to problem-solving differs fundamentally from A-level written exams. What instinct must you retrain, and why? (2 steps)", "answer": "- Step 1: At A-level, rigour (full working, exact values, every step shown) is rewarded with marks. In ESAT, you have roughly 89 seconds per question, no calculator, and no formula sheet.\n- Step 2: Therefore, you must retrain the instinct to show every step. Rigour costs time in ESAT. You must skip steps, approximate freely, and only chase precision if two answer options are very close.\n\nBad habits for A-level are good habits for ESAT.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "Before touching any numbers in an ESAT physics question, what is the single most important action to take, and what does it achieve? (2 steps)", "answer": "- Step 1: Name the branch of physics the question is actually about (e.g., convection, energy conservation, nuclear balance).\n- Step 2: Write down the one key idea or relationship. This strips away the wording disguise, revealing the short route to the answer. Most ESAT difficulty is in the dressing of the question, not the underlying maths.\n\nIdentify the physics first, then compute.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "When calculating input power from useful power and efficiency without a calculator, what is the directional rule for the magnitude of the input, and how do you handle \"nice\" efficiency fractions like $$0.8$$? (2 steps)", "answer": "- Step 1: Input must always be *larger* than useful output (since energy is lost to surroundings). Directionally, you divide useful by efficiency, which *increases* the number.\n- Step 2: For nice fractions, use the inverse multiplier: dividing by $$0.8$$ is exactly the same as multiplying by $$1.25$$. Similarly, dividing by $$0.75$$ is multiplying by $$4/3$$.\n\nEfficiency makes the input bigger; use inverse multipliers for speed.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "When a substance is heated, its particles gain kinetic energy. Explain the causal chain of how this leads to a change in density, assuming the mass is fixed. (3 steps)", "answer": "- Step 1: Heating increases particle kinetic energy, causing them to vibrate/move more and push further apart on average.\n- Step 2: This increases the volume $$V$$ of the substance, while the mass $$m$$ remains unchanged (no particles are added or removed).\n- Step 3: Since density $$\\rho = m/V$$, an increase in $$V$$ with constant $$m$$ means the density $$\\rho$$ must decrease.\n\nHeat $$\\rightarrow$$ $$V \\uparrow$$ $$\\rightarrow$$ $$\\rho \\downarrow$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A student claims: \"When a fluid is heated, the mass inside a fixed volume increases, which explains convection.\" Explain why this statement is physically false. (2 steps)", "answer": "- Step 1: Heating does not create mass from nowhere; mass is conserved. As the fluid expands, its total mass stays the same, but it now occupies a larger total volume.\n- Step 2: Inside any arbitrarily drawn \"fixed volume\", the expanding fluid spreads out, meaning some fluid leaves that region. Therefore, the mass inside that fixed volume actually *decreases*, not increases.\n\nDensity of a fixed mass decreases on heating; mass of a fixed volume decreases on heating.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Describe the step-by-step mechanism of a convection current forming in a saucepan of water heated from below. (4 steps)", "answer": "- Step 1: The heat source warms the water at the bottom, increasing its kinetic energy.\n- Step 2: The heated water expands, increasing its volume and decreasing its density.\n- Step 3: Being less dense than the cooler water above, the hot water becomes buoyant and rises.\n- Step 4: Cooler, denser water sinks to fill the gap, gets heated, and the cycle repeats, forming a circulating loop.\n\nConvection is bulk fluid movement driven by density differences from thermal expansion.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A bridge is built with expansion joints. How does this practical engineering feature demonstrate the same underlying physics as a convection current? (2 steps)", "answer": "- Step 1: Both phenomena rely on the fact that heating causes particles to gain kinetic energy, push apart, and increase the volume of the material (thermal expansion).\n- Step 2: In a bridge, the solid deck expands and needs room to grow (hence the joints). In a convection current, the fluid expands, which decreases its density and causes it to rise. The expansion is the shared root cause.\n\nHot $$\\rightarrow$$ bigger applies to both solid bridges and fluid convection.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "The formula for gravitational potential energy is $$E_{GPE} = mgh$$. In a lifting problem, what does the $$h$$ strictly represent, and what is a common trap when a ramp is involved?", "answer": "The variable $$h$$ represents strictly the *vertical* height gained against gravity. A common trap is using the distance along the ramp; only the vertical component of the displacement stores energy against gravity. Distance along the slope is irrelevant for GPE calculation unless used to find the vertical component.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "For any real machine, state the fundamental energy conservation equation relating input, useful, and wasted energy. How does this simplify the calculation of wasted energy if you already know the input and useful energy? (2 steps)", "answer": "- Step 1: The equation is $$E_{input} = E_{useful} + E_{wasted}$$.\n- Step 2: Rearranging gives $$E_{wasted} = E_{input} - E_{useful}$$. If you can identify the useful energy directly (e.g., $$mgh$$) and the total input, you can find the wasted energy in one line, completely bypassing intermediate losses or efficiency figures.\n\nAll that matters is useful vs total.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "In an ESAT question asking for \"total energy lost to the surroundings\", why might the given efficiency percentage be a distractor, and when is it actually necessary? (2 steps)", "answer": "- Step 1: It is a distractor if you can calculate the useful output energy directly (like $$mgh$$) and you know the total input. You just subtract useful from input to get total wasted, ignoring the efficiency entirely.\n- Step 2: The efficiency is only necessary if you are forced to work backwards from the useful output to find the input, or if the question asks for losses at a *specific intermediate stage* rather than total losses.\n\nDon't compute intermediate losses if total loss is asked for.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Starting from the definitions of power ($$P = IV$$) and energy ($$E = Pt$$), derive the formula for current $$I$$ in terms of energy, voltage, and time. What crucial distinction must be made about the energy term if the system is inefficient? (2 steps)", "answer": "- Step 1: Substitute power into the energy equation: $$E = (IV)t$$. Rearranging to make current the subject gives $$I = \\frac{E}{Vt}$$.\n- Step 2: If the system is not 100% efficient, the $$E$$ in this formula must be the *input* electrical energy delivered by the supply, not the useful mechanical energy. You must scale the useful energy up by efficiency before plugging it in.\n\nUse input energy for $$I = E/(Vt)$$; useful energy must be divided by $$\\eta$$ first.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "In alpha decay, the parent nucleus emits an alpha particle ($$^4_2\\text{He}$$). What are the changes to the mass number $$A$$ and atomic number $$Z$$ of the parent nucleus? (2 steps)", "answer": "- Step 1: The mass number decreases by 4: $$\\Delta A = -4$$.\n- Step 2: The atomic number decreases by 2: $$\\Delta Z = -2$$.\n\nAlpha decay sheds 4 nucleons (2 protons, 2 neutrons).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In beta-minus decay, a neutron transforms into a proton, emitting an electron ($$^{\\;\\;0}_{-1}e$$). What are the changes to the mass number $$A$$ and atomic number $$Z$$ of the parent nucleus? (2 steps)", "answer": "- Step 1: The mass number remains unchanged: $$\\Delta A = 0$$ (a neutron and proton both count as 1 nucleon).\n- Step 2: The atomic number increases by 1: $$\\Delta Z = +1$$ (gain of a proton).\n\nBeta-minus decay swaps a neutron for a proton; mass number is conserved.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A decay chain consists of one alpha decay and three beta-minus decays. Explain why the mass number of any intermediate nuclide can only be one of two possible values. (2 steps)", "answer": "- Step 1: Beta-minus decay leaves the mass number unchanged ($$\\Delta A = 0$$). Only the alpha decay changes the mass number ($$\\Delta A = -4$$).\n- Step 2: Therefore, the mass number is either the original value (if the alpha hasn't happened yet) or the original value minus 4 (if the alpha has happened). It can never be anything else.\n\nThe number of alphas fixes the mass number completely.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "When balancing a nuclear equation, what two conservation laws must be satisfied? How does a free neutron ($$^1_0n$$) factor into these balances? (2 steps)", "answer": "- Step 1: The sum of mass numbers (top) must be equal on both sides, and the sum of atomic numbers (bottom) must be equal on both sides.\n- Step 2: A free neutron has a mass number of 1 and an atomic number of 0. Thus, it contributes to the top (mass) balance but contributes absolutely nothing to the bottom (atomic/charge) balance.\n\nNeutrons carry mass but no charge.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "On a velocity-time graph, what physical quantity does the area between the line and the time axis represent? Identify the three simple geometric shapes this area is typically broken into, and their formulas. (3 steps)", "answer": "- Step 1: The area represents the distance travelled.\n- Step 2: The shapes are a rectangle (constant velocity, area $$= v \\times t$$), a triangle (starting/ending at zero, area $$= \\frac{1}{2} b h$$), and a trapezium (velocity changes linearly between two non-zero values).\n- Step 3: The trapezium area is $$\\frac{u+v}{2} \\times t$$, which represents average velocity multiplied by time.\n\nDistance = area; identify the shape first.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "An object decelerates uniformly from $$30 \\text{ m/s}$$ to $$10 \\text{ m/s}$$. Conceptually, why is it an error to calculate the distance as $$10 \\times t$$ or $$30 \\times t$$? (2 steps)", "answer": "- Step 1: Using $$v \\times t$$ with a single velocity assumes a rectangle, which implies constant velocity. But the velocity is continuously changing.\n- Step 2: Because the velocity drops from 30 to 10, the region under the graph is a trapezium. $$10 \\times t$$ grossly underestimates the distance, and $$30 \\times t$$ grossly overestimates it. You must use the average velocity: $$\\frac{30+10}{2} \\times t$$.\n\nDeceleration between non-zero velocities forms a trapezium, not a rectangle.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "When solving a quadratic inequality like $$2x^2 + x \\geq 15$$, what are the three essential steps after rearranging it to have zero on one side? (3 steps)", "answer": "- Step 1: Find the roots by factorising the quadratic (e.g., $$(2x-5)(x+3) \\geq 0$$ gives roots $$x=2.5$$ and $$x=-3$$).\n- Step 2: Sketch the upward-opening parabola crossing the x-axis at these roots.\n- Step 3: Read the regions where the curve is above the axis (greater than zero). For an upward parabola, this is *outside* the roots: $$x \\leq -3$$ or $$x \\geq 2.5$$.\n\nSketch the parabola; \"greater than zero\" means outside the roots for upward curves.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "When solving a quadratic inequality, what difference does the coefficient of $$x^2$$ make to your final answer, and what happens if it is negative? (2 steps)", "answer": "- Step 1: The sign of the $$x^2$$ coefficient determines whether the parabola opens upwards (positive) or downwards (negative).\n- Step 2: If it opens upwards, the curve is above the x-axis *outside* the roots. If it opens downwards, the curve is above the x-axis *between* the roots. Always sketch the parabola to avoid reversing the inequality.\n\nNegative $$x^2$$ flips the regions; always sketch.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A velocity-time graph shows acceleration, constant speed, deceleration, and more constant speed. If asked for the distance travelled \"while decelerating\", what is the most critical first action, and what is the common trap? (2 steps)", "answer": "- Step 1: Identify and isolate *only* the section of the graph corresponding to deceleration. Do not compute the whole journey.\n- Step 2: The trap is treating the decelerating region as a rectangle. Because the velocity changes between two non-zero values, it is a trapezium, requiring the average velocity formula.\n\nIdentify the section first, then decide the shape.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "In a convection current question, explain the causal chain linking \"heating from below\" to \"fluid rising\". Why is it incorrect to say \"density decreases, causing volume to increase\"? (3 steps)", "answer": "- Step 1: Heating adds kinetic energy, causing particles to push apart. This directly *causes* the volume to increase (expansion).\n- Step 2: Because mass is conserved, the volume increase *causes* the density to decrease ($$\\rho = m/V$$).\n- Step 3: The decreased density *causes* the fluid to be buoyant and rise. Saying \"density decrease causes volume increase\" reverses the causal chain; expansion is the direct result of heating, density decrease is the mathematical consequence.\n\nHeat $$\\rightarrow$$ expansion $$\\rightarrow$$ lower density $$\\rightarrow$$ rising.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A motor with $$75\\%$$ efficiency uses $$28 \\text{ kJ}$$ of input energy to lift a car, gaining $$12 \\text{ kJ}$$ of GPE. If asked for the *total* energy wasted, explain why the $$75\\%$$ is irrelevant. (2 steps)", "answer": "- Step 1: Total wasted energy is simply the difference between total input and useful output: $$E_{wasted} = E_{input} - E_{useful}$$.\n- Step 2: You already have both numbers ($$28 \\text{ kJ}$$ and $$12 \\text{ kJ}$$), so you can subtract directly to get $$16 \\text{ kJ}$$. The $$75\\%$$ efficiency only breaks down the losses into \"motor losses\" vs \"other losses\", which is unnecessary detail for the total.\n\nSpot the useful energy, subtract from input, stop.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Two cars travel at the same constant speed. Car A arrives at the destination 20 seconds before Car B. What physical quantity can you immediately calculate from this time difference, and how does this map to gamma rays in a PET scanner? (2 steps)", "answer": "- Step 1: You can calculate the *difference in distance* travelled: $$\\Delta x = v \\times \\Delta t$$. You cannot calculate the total distance either car travelled, only the difference.\n- Step 2: In a PET scanner, the two gamma rays are like the two cars (same speed $$c$$). The time delay in their arrival directly gives the difference in their path lengths ($$\\Delta x = c \\Delta t$$), not the absolute distance to the source.\n\nSame speed + different arrival times = path difference.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a PET scanner, a source emits two gamma rays simultaneously in opposite directions towards two detectors. If they arrive with a time difference $$\\Delta t$$, how do you calculate the path difference, and why is the detector separation distance often a distractor? (2 steps)", "answer": "- Step 1: Since both rays travel at the same speed $$c$$, the path difference is simply $$\\Delta x = c \\times \\Delta t$$.\n- Step 2: The detector separation is irrelevant because you only need the *difference* in path lengths, not the absolute path lengths. The time delay directly gives the difference via $$d = vt$$, regardless of the total distance to the detectors.\n\nTime delay + speed = path difference; ignore total distances.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A source is exactly halfway between two detectors. If the source shifts a distance $$x$$ towards one detector, explain why the path difference between the two rays becomes $$2x$$, not $$x$$. (2 steps)", "answer": "- Step 1: Shifting by $$x$$ towards detector A makes path A shorter by $$x$$ (new length $$d-x$$) and path B longer by $$x$$ (new length $$d+x$$).\n- Step 2: The difference is $$(d+x) - (d-x) = 2x$$. Moving the source changes both paths in opposite directions, doubling the effect on the difference.\n\nDisplacement of source is half the path difference.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "In a nuclear fission equation with unknowns $$w, x, y, z$$, how do you systematically eliminate incorrect multiple-choice options? (2 steps)", "answer": "- Step 1: Write down the two strict balance equations: sum of mass numbers (top) must balance, and sum of atomic numbers (bottom) must balance.\n- Step 2: Check each option to see if it is a valid algebraic rearrangement of either balance equation. Eliminate any option that uses a variable in the wrong row (e.g., mass number variable in an atomic number equation) or drops necessary terms (like free neutrons).\n\nTreat unknowns as algebra; check for dropped terms or mixed rows.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "In a nuclear fission equation, an option suggests that the number of released neutrons ($$z$$) is related to the atomic number ($$x$$) of a daughter nucleus. Why is this structurally impossible in a balance equation? (2 steps)", "answer": "- Step 1: Neutrons have a mass number of 1 and an atomic number of 0. They only appear in the mass number (top) balance.\n- Step 2: The atomic number ($$x$$) is determined solely by balancing the bottom row (protons), where neutrons contribute zero. Therefore, $$z$$ and $$x$$ belong to entirely separate conservation laws and cannot appear in the same algebraic equation.\n\nDon't mix top-row and bottom-row variables.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "An $$80\\%$$ efficient motor on a $$12 \\text{ V}$$ supply lifts a mass, requiring a useful power corresponding to $$20 \\text{ A}$$. Explain conceptually why the actual current drawn from the supply is $$25 \\text{ A}$$, not $$20 \\text{ A}$$. (2 steps)", "answer": "- Step 1: The $$20 \\text{ A}$$ represents the current needed if the motor were $$100\\%$$ efficient (all electrical power becomes lifting power).\n- Step 2: Since the motor is only $$80\\%$$ efficient, it wastes $$20\\%$$ of its input energy. To still deliver the required useful power, the motor must draw *more* total power from the supply. You divide the ideal current by efficiency: $$20 / 0.8 = 25 \\text{ A}$$.\n\nEfficiency always makes the required input BIGGER; divide by $$\\eta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A nuclide $$^P_QX$$ decays via one alpha and three beta-minus particles. An option presents an intermediate nuclide with mass number $$P$$ and atomic number $$Q-1$$. Prove why this is impossible. (3 steps)", "answer": "- Step 1: To have a mass number of $$P$$, the alpha decay cannot have occurred yet (since alpha reduces mass by 4). Therefore, only beta decays have happened.\n- Step 2: Beta-minus decay *increases* the atomic number by 1. With 0 to 3 betas, the atomic number can only be $$Q, Q+1, Q+2$$, or $$Q+3$$.\n- Step 3: An atomic number of $$Q-1$$ requires the atomic number to *decrease*, which only alpha decay can do. But alpha decay would also decrease the mass number to $$P-4$$, contradicting the mass number $$P$$. Thus, this state is impossible.\n\nLower $$Z$$ requires alpha, but alpha lowers $$A$$; you can't have lower $$Z$$ with the original $$A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "What happens to the density of a fixed mass of water when it is heated from $$0^\\circ\\text{C}$$ to $$4^\\circ\\text{C}$$? How does this contrast with the general rule for heating substances? (2 steps)", "answer": "- Step 1: Unlike almost all other substances, water between $$0^\\circ\\text{C}$$ and $$4^\\circ\\text{C}$$ *contracts* when heated, meaning its volume decreases.\n- Step 2: Because volume decreases while mass remains fixed, the density of water actually *increases* in this specific range, violating the general rule that heating decreases density. This anomalous expansion is why ice floats and lakes freeze from the top down.\n\nWater is anomalous between 0-4°C; heating increases density.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A $$5 \\text{ kg}$$ mass is lifted vertically by $$4 \\text{ m}$$ in $$2 \\text{ s}$$ on Earth ($$g=10 \\text{ N/kg}$$). What is the useful power required? (2 steps)", "answer": "- Step 1: Calculate useful energy (GPE): $$E = mgh = 5 \\times 10 \\times 4 = 200 \\text{ J}$$.\n- Step 2: Calculate useful power: $$P = E/t = 200 / 2 = 100 \\text{ W}$$.\n\nUseful power = useful energy / time.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A $$100\\%$$ efficient motor on a $$10 \\text{ V}$$ supply draws $$3 \\text{ A}$$. If the motor becomes $$60\\%$$ efficient but must deliver the same useful power, what is the new current? (2 steps)", "answer": "- Step 1: To deliver the same useful power with lower efficiency, the input power must increase. Directionally, input power = useful power / efficiency.\n- Step 2: New current = old current / efficiency = $$3 / 0.6 = 5 \\text{ A}$$. (Dividing by 0.6 is the same as multiplying by $$5/3$$, so $$3 \\times 5/3 = 5$$).\n\nLower efficiency means higher input current.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Two signals travel at $$2 \\text{ m/s}$$. One arrives $$4 \\text{ s}$$ before the other. What is the path difference, and if the source shifted to cause this, what was the shift? (2 steps)", "answer": "- Step 1: Path difference $$\\Delta x = v \\times \\Delta t = 2 \\times 4 = 8 \\text{ m}$$.\n- Step 2: The shift of the source is half the path difference: $$x = \\Delta x / 2 = 8 / 2 = 4 \\text{ m}$$.\n\nPath diff = speed $$\\times$$ time diff; shift = path diff / 2.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A nuclide $$^{20}_{10}X$$ decays by emitting one alpha and one beta. What are the mass and atomic numbers of the final stable nuclide? (2 steps)", "answer": "- Step 1: Alpha decay: mass decreases by 4 ($$20-4=16$$), atomic decreases by 2 ($$10-2=8$$). Intermediate is $$^{16}_8Y$$.\n- Step 2: Beta decay: mass unchanged ($$16$$), atomic increases by 1 ($$8+1=9$$). Final nuclide is $$^{16}_9Z$$.\n\nApply alpha first, then beta (order of beta/alpha between steps doesn't change final state).", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}], "count": 34}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In the ESAT exam, you are told to use $$g = 10 \\ \\text{N/kg}$$ instead of $$9.81$$. What is the exam-design reason for this, and what does it tell you about the arithmetic you should expect?", "answer": "The ESAT has no calculator and no formula sheet. The value $$g = 10$$ is chosen so that every calculation involving gravity produces clean, round numbers — e.g., $$mgh = 1200 \\times 10 \\times 1 = 12000$$, not $$11772$$. This tells you that if your arithmetic is getting ugly or producing non-terminating decimals, you have likely made a mistake or taken a wrong route. The paper is designed so that the correct path always leads to tidy numbers.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Tom's single most repeated instruction was \"identify the physics first, then compute.\" What does this mean in practice, and why does it save time on ESAT questions? (2 steps)", "answer": "- Step 1: Before touching any numbers, you should name the branch of physics (convection, energy conservation, nuclear balance, etc.) and write down the one key relationship the question is testing.\n- Step 2: Most ESAT questions have a short route once you recognize the topic — the difficulty is in the wording, not the maths. If you jump into calculations without identifying the physics, you risk using the wrong relationship or getting drawn into irrelevant details (like the 3.0 m detector separation in Q8 or the 75% efficiency in Q6).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Why is approximating aggressively a *good* strategy in ESAT but a *bad* strategy in A-level written exams? (2 steps)", "answer": "- Step 1: At A-level, you are rewarded for rigour: exact values, full working, every step shown. The ESAT is multiple-choice with roughly 89 seconds per question — rigour costs time you don't have.\n- Step 2: Approximation works because: (1) you only need to distinguish between answer options that often differ by orders of magnitude, (2) the numbers are designed to be clean so rounding rarely changes the answer, and (3) time spent on unnecessary precision is time stolen from other questions. Only chase precision if two options are very close.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why should you read the magnitude of the answer options before starting your calculation on an ESAT question?", "answer": "The options tell you what scale the answer should be on (e.g., millimetres vs centimetres vs metres), which lets you sanity-check your answer instantly. If your calculation gives 12 cm and one option says 12 mm while another says 12 cm, you immediately narrow it down. This also helps you catch unit errors or factor-of-10 mistakes before you waste time on a wrong path.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why is working through the ESAT paper strictly from Q1 to Q27 in order a suboptimal strategy? (2 steps)", "answer": "- Step 1: You have roughly 89 seconds per question. A hard question you *might* solve is worth the same marks as an easy question you *definitely* solve.\n- Step 2: The optimal strategy is: scan the paper, pick off the questions you can do fast, bank those marks, and leave time-sinks for a second pass. The opening maths questions are often speed questions meant to be banked quickly so your time budget survives for harder physics later.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A fixed mass of substance is heated and its volume increases. What happens to its density, and why? (2 steps)", "answer": "- Step 1: Density is defined as $$\\rho = m/V$$, where $$\\rho$$ is density, $$m$$ is mass, and $$V$$ is volume. When mass is held constant, density and volume are inversely proportional.\n- Step 2: If $$V$$ increases (due to thermal expansion) and $$m$$ is unchanged (no particles added or removed), then $$\\rho$$ must decrease. The same mass is now spread over a larger volume, so the packing is less dense. The causal chain is: heating → particles spread out → $$V \\uparrow$$ → $$\\rho \\downarrow$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "\"The density of a fixed mass decreases on heating\" and \"the mass of a fixed volume increases on heating\" — both sound plausible. Which one is correct, and why is the other wrong? (2 steps)", "answer": "- Step 1: \"Density of a fixed mass decreases on heating\" is **correct**. Heating expands the material ($$V$$ increases), and since $$m$$ is fixed, $$\\rho = m/V$$ decreases.\n- Step 2: \"Mass of a fixed volume increases on heating\" is **wrong**. Mass is conserved — heating doesn't create particles. As the fluid expands, some of it flows *out* of any fixed region you might be watching. So the mass within a fixed volume actually goes *down*, not up. The total mass of the whole fluid is unchanged, but the mass within any particular fixed volume decreases because the expanding fluid redistributes itself.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A saucepan of water is heated from below. Describe the step-by-step mechanism that creates a convection current. (4 steps)", "answer": "- Step 1: The heat source warms the water at the **bottom** of the pan first. Those particles gain kinetic energy and vibrate/move more, pushing slightly further apart.\n- Step 2: The warmed water **expands** — its volume increases. For a fixed mass, this means its density **decreases** ($$\\rho = m/V$$, $$V \\uparrow$$ so $$\\rho \\downarrow$$).\n- Step 3: The less-dense hot water is now lighter than the cooler water above it, so it **rises**. Cooler, denser water **sinks** to fill the gap at the bottom.\n- Step 4: The sunk water is now directly over the heat source, warms up, expands, becomes less dense, and rises again. This circulating loop — hot fluid rising, cool fluid sinking — is the **convection current**.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "In convection, which is the correct causal chain: \"heating causes density to decrease which causes volume to increase,\" or \"heating causes volume to increase which causes density to decrease\"? Why does the order matter? (2 steps)", "answer": "- Step 1: The correct causal chain is: **heating → volume increases → density decreases**. Heating gives particles more kinetic energy, which makes them spread apart (volume increases first). Because mass is conserved, the density then decreases as a *consequence*.\n- Step 2: The order matters because it tells you which quantity is the \"driver\" and which is the \"consequence.\" Reversing the causality would suggest density magically decreases first (with no physical mechanism), then volume increases to compensate. In Q4, this is why statements 2 and 3 are both correct — they describe the same chain from different angles. Statement 3 (volume increases) is the direct effect of heating; statement 2 (density decreases) is the consequence.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A radiator heats a room. Explain why it can heat the entire room even though it only touches a small volume of air at any instant. (3 steps)", "answer": "- Step 1: The radiator warms the air immediately beside it. That air expands (volume increases), its density decreases, and it **rises** to the ceiling.\n- Step 2: Cooler, denser air is drawn along the floor toward the radiator to replace the rising warm air. This cooler air is then heated, expands, rises, and the cycle continues — forming a room-sized convection loop.\n- Step 3: Over time, the entire body of air in the room circulates through the convection loop and passes near the radiator. The radiator doesn't need to touch all the air simultaneously; it just needs to keep heating the air that flows past it, and the convection current distributes that heat throughout the room.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Bridges are built with expansion joints. How does this relate to the convection physics in Q4? (2 steps)", "answer": "- Step 1: Both phenomena involve the same underlying physics: heating → particles gain kinetic energy → they push further apart → the material expands. In the saucepan, expansion causes density decrease and drives convection. In the bridge, the solid expands but cannot circulate, so it pushes against its restraints.\n- Step 2: Expansion joints are gaps left in the bridge deck to give the material room to expand on hot days. Without them, the expanding steel/concrete would buckle or crack. This confirms that \"hot ⇒ bigger\" applies to solids too, not just fluids. The difference is that in a fluid, expansion leads to circulation (convection); in a solid, expansion leads to mechanical stress.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "The formula for gravitational potential energy is $$E_{GPE} = mgh$$. Why does only the **vertical** height $$h$$ matter, not the distance along a ramp? (2 steps)", "answer": "- Step 1: GPE measures the energy stored by an object's position in a gravitational field. Gravity acts **vertically downward**, so only the component of displacement that opposes gravity (i.e., vertical height) stores energy.\n- Step 2: If you push a car up a ramp that is 10 m long but only 1 m high, the GPE gained is $$mg \\times 1$$, not $$mg \\times 10$$. The ramp makes the *force needed* smaller (by spreading the work over a longer distance), but the total GPE gained depends only on how high the object ends up. In both Q6 and Q12, the \"useful\" energy is exactly $$mgh$$ with $$h$$ being the vertical rise.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A machine has a total energy input of $$E_{\\text{in}}$$. Write down the energy conservation equation and explain the fastest way to find wasted energy. (2 steps)", "answer": "- Step 1: The conservation equation is $$E_{\\text{in}} = E_{\\text{useful}} + E_{\\text{wasted}}$$. The total energy going in must equal the useful energy coming out plus the energy lost to the surroundings.\n- Step 2: Rearranging gives $$E_{\\text{wasted}} = E_{\\text{in}} - E_{\\text{useful}}$$. This is often the fastest route: compute the useful output directly (e.g., $$mgh$$), find the total input from the question, and subtract. You do **not** need to trace through intermediate losses in the motor unless the question specifically asks for them.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Efficiency is $$\\eta = E_{\\text{useful}} / E_{\\text{in}}$$. When converting from useful output to required input, do you multiply or divide by efficiency? What's the sanity check? (2 steps)", "answer": "- Step 1: Rearranging $$\\eta = E_{\\text{useful}} / E_{\\text{in}}$$ gives $$E_{\\text{in}} = E_{\\text{useful}} / \\eta$$. You **divide** by efficiency to go from useful output to required input.\n- Step 2: Sanity check: because $$\\eta < 1$$, dividing by it makes the number **larger**. This makes physical sense — an 80%-efficient machine must be fed **more** energy than it usefully delivers. If your efficiency step made the number go down, you divided the wrong way. In Q12, the ideal current is 20 A and dividing by 0.8 gives 25 A (larger), confirming the correct direction.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student computes the useful GPE as 1200 J and then says \"with 80% efficiency, the actual useful output is $$1200 \\times 0.8 = 960$$ J.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The GPE ($$mgh$$) is the **actual useful output** — it's what really happened. The car really did gain 1200 J of GPE. You don't reduce it by efficiency.\n- Step 2: Efficiency relates useful output to required input: $$\\eta = E_{\\text{useful}} / E_{\\text{in}}$$. To find the input, you divide: $$E_{\\text{in}} = 1200 / 0.8 = 1500$$ J. The student has the direction backwards — efficiency tells you how much extra you must put in, not how much the useful output is reduced. The useful output is what it is; the input must be larger.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In Q6, the motor is 75% efficient, but Tom says you \"never need the efficiency at all\" to find the total energy wasted. How is this possible? (2 steps)", "answer": "- Step 1: The question gives you both the **total input energy** (28 kJ) and enough information to compute the **useful output energy** directly ($$mgh = 1200 \\times 10 \\times 1.0 = 12$$ kJ). Since $$E_{\\text{wasted}} = E_{\\text{in}} - E_{\\text{useful}} = 28 - 12 = 16$$ kJ, you have the answer in one subtraction.\n- Step 2: The 75% efficiency is a **distractor** for this particular question. It would let you calculate motor-internal losses ($$0.25 \\times 28 = 7$$ kJ) and motor output ($$0.75 \\times 28 = 21$$ kJ), but then you'd need to reconcile 21 kJ of motor output against 12 kJ of useful GPE — an unnecessary detour. The fast route is: spot the useful energy, subtract from the input, done.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Dividing by 0.8 is the same as multiplying by what number? Why is this useful to know for ESAT? (2 steps)", "answer": "- Step 1: Dividing by 0.8 is the same as multiplying by $$1/0.8 = 1.25$$. So $$x / 0.8 = 1.25x$$. Similarly, dividing by 0.75 is multiplying by $$4/3 \\approx 1.33$$.\n- Step 2: In ESAT, efficiencies are often given as \"nice\" fractions (0.8, 0.75, 0.5). Knowing the reciprocal multiplier lets you quickly convert from useful output to required input without long division. For example, if the ideal current is 20 A and efficiency is 80%, just multiply by 1.25 to get 25 A — faster than setting up $$20/0.8$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Write down the relationships between electrical power, current, voltage, energy, and time. When the system is less than 100% efficient, which energy value goes into $$E = IVt$$? (2 steps)", "answer": "- Step 1: $$P = IV$$ (power = current × voltage) and $$E = Pt = IVt$$ (energy = power × time = current × voltage × time). Rearranging for current: $$I = E/(Vt)$$.\n- Step 2: The $$E$$ in $$E = IVt$$ represents the **electrical energy delivered by the supply** — this is the **input** energy, not the useful output. When the system is less than 100% efficient, the input energy is larger than the useful energy ($$E_{\\text{in}} = E_{\\text{useful}} / \\eta$$), so you must use the scaled-up input value, not the raw $$mgh$$, when computing the current drawn from the supply.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "In alpha decay, what are the changes to mass number $$A$$ and atomic number $$Z$$? What particle is emitted, and why does it carry those specific numbers? (2 steps)", "answer": "- Step 1: Alpha decay emits a helium nucleus $$^4_2\\text{He}$$, so the parent nucleus loses 4 nucleons and 2 protons: $$\\Delta A = -4$$, $$\\Delta Z = -2$$.\n- Step 2: The helium nucleus (alpha particle) has mass number 4 (2 protons + 2 neutrons) and atomic number 2 (2 protons). These values come directly from the structure of the emitted particle — the parent must lose exactly these nucleons to produce it. This is why alpha decay always changes the mass number by exactly 4 and the atomic number by exactly 2.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In beta-minus ($$\\beta^-$$) decay, what are the changes to mass number $$A$$ and atomic number $$Z$$? What happens inside the nucleus to produce this? (2 steps)", "answer": "- Step 1: Beta-minus decay: $$\\Delta A = 0$$, $$\\Delta Z = +1$$. The mass number doesn't change because a neutron is converting to a proton (total nucleon count stays the same), but the atomic number increases by 1 because there is now one more proton.\n- Step 2: Inside the nucleus, a neutron transforms into a proton, emitting an electron $$^{\\;\\;0}_{-1}e$$ (the beta particle) and an antineutrino. The electron carries away charge but essentially no mass, which is why $$A$$ is unchanged while $$Z$$ goes up by 1.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "A student thinks beta-minus decay reduces the mass number by 1 because \"a neutron disappears.\" Why is this wrong? (2 steps)", "answer": "- Step 1: In beta-minus decay, a neutron **transforms** into a proton — it doesn't disappear. The neutron becomes a proton, so the total number of nucleons (protons + neutrons) is unchanged: $$\\Delta A = 0$$.\n- Step 2: The mass number counts all nucleons, not just neutrons. Since one neutron becomes one proton, the total count stays the same. What changes is the **composition**: one fewer neutron and one more proton. The atomic number increases ($$\\Delta Z = +1$$) because there's now an extra proton, but the mass number is unaffected.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Why is the fact \"only alpha decay changes the mass number\" the single most useful fact for solving decay-chain questions? (2 steps)", "answer": "- Step 1: Beta-minus decay leaves the mass number unchanged ($$\\Delta A = 0$$), and gamma decay changes nothing. Only alpha decay reduces the mass number (by 4). This means the mass number can only ever be at its starting value or drop in steps of 4.\n- Step 2: In a decay chain, the **number of alpha decays completely fixes the mass number**. If one alpha occurs, the mass number drops by exactly 4 — no more, no less. So you can read the mass number first to determine how many alphas have happened, then worry about the atomic number (which betas can modify). This is exactly the method that solves Q14 in seconds.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Gamma ($$\\gamma$$) radiation is emitted from the nucleus. Why does it change neither the mass number nor the atomic number? (2 steps)", "answer": "- Step 1: Gamma radiation is **electromagnetic radiation** (a high-energy photon), not a particle with mass or charge. It carries energy away from the nucleus but no nucleons and no protons.\n- Step 2: Since $$\\gamma$$ has no mass number and no atomic number (it's a photon, not a nucleon), emitting it doesn't change either quantity: $$\\Delta A = 0$$, $$\\Delta Z = 0$$. The nucleus drops to a lower energy state, but its composition remains the same. This is why gamma emission never appears in decay-chain mass-number or atomic-number calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In any nuclear reaction, what two quantities are conserved? Why does a free neutron $$^1_0\\text{n}$$ appear in one balance but not the other? (2 steps)", "answer": "- Step 1: Two quantities are conserved: **mass number** (top numbers): $$\\sum A_{\\text{left}} = \\sum A_{\\text{right}}$$, and **atomic number** (bottom numbers): $$\\sum Z_{\\text{left}} = \\sum Z_{\\text{right}}$$.\n- Step 2: A free neutron $$^1_0\\text{n}$$ has mass number 1 but atomic number 0. So it contributes 1 to the mass-number balance (top row) but contributes **nothing** to the atomic-number balance (bottom row). This is why $$z$$ (the number of free neutrons) appears in the $$A$$ balance but not the $$Z$$ balance in Q10 — a common source of errors.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "On a velocity-time graph, what does the area between the line and the time axis represent? Name the three shapes you might encounter and their area formulas. (3 steps)", "answer": "- Step 1: The area under a velocity-time graph represents **distance travelled**. This works because distance = velocity × time for constant velocity, which is exactly the area of a rectangle under the line.\n- Step 2: The three common shapes are:\n+ **Rectangle** (constant velocity): area = $$v \\times t$$\n+ **Triangle** (starting or ending at zero velocity): area = $$\\frac{1}{2} b h$$\n+ **Trapezium** (velocity changes linearly between two non-zero values): area = $$\\frac{u+v}{2} \\times t$$, i.e., average velocity × time\n- Step 3: The trapezium formula is the most general — a rectangle is a trapezium with $$u = v$$, and a triangle is a trapezium with one velocity = 0. But always identify the section of the graph first, then decide which shape applies.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A car decelerates uniformly from 30 m/s to 10 m/s over 60 seconds. A student calculates the distance as $$30 \\times 60 = 1800$$ m. What is wrong with this, and what is the correct approach? (2 steps)", "answer": "- Step 1: The student used the formula for a **rectangle** ($$v \\times t$$), taking only the initial velocity. But the velocity is not constant — it decreases from 30 to 10 m/s. Using the initial velocity alone overcounts.\n- Step 2: The correct shape is a **trapezium** because both endpoints are non-zero. The area is $$\\frac{u+v}{2} \\times t = \\frac{30+10}{2} \\times 60 = 20 \\times 60 = 1200$$ m. This is the average velocity (20 m/s) times the time (60 s), which naturally accounts for the deceleration.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "On a velocity-time graph, a car decelerates from 30 m/s. Under what condition does the area under the deceleration section become a triangle rather than a trapezium? (2 steps)", "answer": "- Step 1: The area is a trapezium when the velocity changes linearly between two **non-zero** values. It becomes a triangle when one of the velocities is **zero** — i.e., the car comes to a complete stop.\n- Step 2: If the car decelerates from 30 m/s to 0 m/s (instead of to 10 m/s), the shape is a triangle with area $$\\frac{1}{2} \\times 30 \\times t$$. The trapezium formula still works ($$\\frac{30+0}{2} \\times t = \\frac{1}{2} \\times 30 \\times t$$), confirming that a triangle is a special case of a trapezium with one parallel side of length zero.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "To solve a quadratic inequality like $$2x^2 + x \\geq 15$$, what three steps should you follow? (3 steps)", "answer": "- Step 1: **Make it equal to zero**: rearrange to $$2x^2 + x - 15 \\geq 0$$. This puts the inequality in standard form, allowing you to find the roots and determine where the expression is positive or negative.\n- Step 2: **Find the roots** by factorising: $$(2x - 5)(x + 3) = 0$$ gives $$x = 2.5$$ or $$x = -3$$. These are the points where the expression equals zero.\n- Step 3: **Sketch** the upward-opening parabola (coefficient of $$x^2$$ is positive) cutting the x-axis at $$-3$$ and $$2.5$$. The parabola is above the axis ($$\\geq 0$$) **outside** the roots, so the solution is $$x \\leq -3$$ or $$x \\geq 2.5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "When solving a quadratic inequality, why is it essential to sketch the parabola rather than just finding the roots? (2 steps)", "answer": "- Step 1: The roots tell you *where* the expression equals zero, but the inequality asks *where* it is positive or negative. You need to know which regions (inside or outside the roots) satisfy the inequality.\n- Step 2: The sign of the leading coefficient tells you the parabola's direction. If $$a > 0$$, the parabola opens upward and is positive **outside** the roots. If $$a < 0$$, it opens downward and is positive **between** the roots. Without sketching, it's easy to pick the wrong region — especially under exam pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A velocity-time graph shows a car's entire journey with four phases. The question asks for the distance travelled *while decelerating*. What are the two most common traps, and how do you avoid them? (2 steps)", "answer": "- Step 1: **Trap 1**: Computing the **whole** journey's distance instead of only the decelerating section. The question deliberately describes all four phases to tempt you into calculating the total area.\n- Step 2: **Trap 2**: Treating the decelerating region as a rectangle. Because the velocity goes from 30 to 10 m/s (both non-zero), the shape is a **trapezium**, not a rectangle. To avoid both traps: always **identify the section the question asks about first**, find its time interval only, then decide what shape the area forms.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Three statements about heated water: (1) \"mass of a fixed volume increases,\" (2) \"density of a fixed mass decreases,\" (3) \"volume of a fixed mass increases.\" Which explain convection, and why is statement 1 wrong? (3 steps)", "answer": "- Step 1: Statement 3 is correct: heating causes a fixed mass of water to expand, so its volume increases. This is the direct effect of adding thermal energy — particles vibrate more and push apart.\n- Step 2: Statement 2 is correct: for a fixed mass, if volume increases then density decreases ($$\\rho = m/V$$). The less-dense hot water rises, cooler denser water sinks — this density difference drives the convection current.\n- Step 3: Statement 1 is **wrong**: heating does not add mass. Mass is conserved. If anything, as the fluid expands, some of it flows out of any fixed volume you're watching, so the mass within a fixed volume actually **decreases**. The statements that explain convection are 2 and 3 only.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In the PET scanner question, two gamma rays are emitted simultaneously in opposite directions and arrive at two detectors with a time difference of $$4.0 \\times 10^{-10}$$ s. The gamma rays travel at $$3.0 \\times 10^8$$ m/s. How do you calculate the path difference? (2 steps)", "answer": "- Step 1: Both rays travel at the same speed. If they arrive at different times, one must have travelled a greater distance. The path difference is: $$\\Delta x = v \\times \\Delta t = (3.0 \\times 10^8) \\times (4.0 \\times 10^{-10})$$.\n- Step 2: Multiply the digits and add the powers of ten: $$3 \\times 4 = 12$$ and $$10^8 \\times 10^{-10} = 10^{-2}$$. So $$\\Delta x = 12 \\times 10^{-2}$$ m = 0.12 m = 12 cm. The logic is identical to the \"two cars\" analogy: same speed, different arrival times ⇒ difference in distance = speed × time difference.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A source is a distance $$x$$ from the midpoint between two detectors. Why is the path difference between the two gamma-ray paths equal to $$2x$$, not $$x$$? (2 steps)", "answer": "- Step 1: If the source is at the midpoint, both paths have equal length, so the path difference is 0. Now shift the source a distance $$x$$ toward one detector. The path to that detector becomes shorter by $$x$$, and the path to the other detector becomes longer by $$x$$.\n- Step 2: The path difference is (longer path) − (shorter path) = $$(d/2 + x) - (d/2 - x) = 2x$$. Moving the source by $$x$$ changes the path difference by **twice** that amount, because one path gets longer AND the other gets shorter. This is why the source displacement is **half** the path difference: $$x = \\Delta x / 2 = 12/2 = 6.0$$ cm.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "On a number line, two detectors are at positions 0 and 30. A source at the midpoint (position 15) has equal paths to both. If you move the source to position 13, what are the two path lengths, and what is the path difference? (2 steps)", "answer": "- Step 1: Path to detector at 0: $$|13 - 0| = 13$$. Path to detector at 30: $$|30 - 13| = 17$$. The path difference is $$17 - 13 = 4$$.\n- Step 2: The source moved 2 units from the midpoint (from 15 to 13), but the path difference is 4 — exactly **twice** the displacement. This is the $$\\Delta x = 2x$$ relationship made concrete: shifting the source by $$x$$ toward one detector shortens that path by $$x$$ AND lengthens the other by $$x$$, so the difference changes by $$2x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "In the PET scanner question, the detectors are 3.0 m apart. Why does this number never enter the calculation for the source's displacement from the midpoint? (2 steps)", "answer": "- Step 1: The path difference depends only on the speed and the time delay ($$\\Delta x = v \\times \\Delta t$$), not on the total distance. The time delay tells you how much *extra* distance one ray covered, regardless of the total distance each ray traveled.\n- Step 2: The displacement from the midpoint is half the path difference ($$x = \\Delta x / 2$$). The detector separation $$d$$ cancels out because shifting the source by $$x$$ changes one path by $$+x$$ and the other by $$-x$$, and the $$d/2$$ terms subtract away. Recognising that the 3.0 m gap is irrelevant is exactly the \"decide which information matters\" skill Tom is training.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "In the PET scanner, if the two gamma rays arrive at the detectors with **zero** time difference, where must the source be? Why? (2 steps)", "answer": "- Step 1: Zero time difference means the path difference is zero ($$\\Delta x = v \\times 0 = 0$$). Both rays travelled the same distance.\n- Step 2: The only position where both paths are equal is the **midpoint** between the two detectors. The path difference formula $$\\Delta x = 2x$$ confirms this: if $$\\Delta x = 0$$, then $$x = 0$$, meaning zero displacement from the midpoint. This is the $$Q$$ position mentioned in the question setup.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In the fission reaction $$^1_0\\text{n} + ^{239}_{94}\\text{Pu} \\rightarrow ^{w}_{54}\\text{Xe} + ^{y}_{x}\\text{Zr} + z\\,^1_0\\text{n}$$, write down the two conservation equations. (2 steps)", "answer": "- Step 1: **Mass number balance** (tops): $$1 + 239 = w + y + z$$, so $$w + y + z = 240$$.\n- Step 2: **Atomic number balance** (bottoms): $$0 + 94 = 54 + x + 0$$, so $$x = 40$$. The $$z$$ free neutrons each have atomic number 0, so they contribute nothing to the bottom-row balance — this is why $$z$$ appears in the mass-number equation but not the atomic-number equation.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "In Q10, the mass-number balance gives $$w + y + z = 240$$. The correct answer is option B: $$z = 240 - (w + y)$$. Why do the other options fail? (3 steps)", "answer": "- Step 1: Option B is simply a rearrangement of $$w + y + z = 240$$: move $$(w + y)$$ to the right side. The correct answer is often a rearrangement of a conservation law rather than the law in its most obvious form.\n- Step 2: The other options fail because:\n+ **Option C** ($$x = 40 - z$$): wrong — $$x = 40$$ outright from atomic-number balance; $$z$$ has nothing to do with $$x$$.\n+ **Options D and E**: both force $$x \\neq 40$$, contradicting the atomic-number balance.\n+ **Option F** ($$94 = w + y + 1$$): mixes mass numbers ($$w, y$$) into an atomic-number equation and drops $$z$$.\n- Step 3: Strategy: write both balance equations first, then run down the options eliminating any that use a variable in the wrong row or drop a term. Always check every option — don't stop at the first one that looks plausible.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "A 12 V motor lifts a 20 kg mass through 6.0 m vertically in 5.0 s. The system is 80% efficient. What is the current drawn, and why must the answer be larger than the \"ideal\" current? (3 steps)", "answer": "- Step 1: Useful output = GPE = $$mgh = 20 \\times 10 \\times 6 = 1200$$ J. If the system were 100% efficient, the current would be $$I = E/(Vt) = 1200/(12 \\times 5) = 20$$ A.\n- Step 2: But the system is only 80% efficient, meaning the electrical input must be **larger** than the useful output. The input energy is $$E_{\\text{in}} = 1200 / 0.8 = 1500$$ J, and the current is $$I = 1500/(12 \\times 5) = 25$$ A.\n- Step 3: The answer (25 A) is larger than the ideal current (20 A) because an imperfect machine needs more input than it delivers as useful output. You **divide** by efficiency (not multiply) because $$\\eta = E_{\\text{useful}}/E_{\\text{in}}$$, so $$E_{\\text{in}} = E_{\\text{useful}}/\\eta$$. Dividing by a number less than 1 makes the result larger — never smaller.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "In a decay chain with one alpha and three beta-minus decays starting from nuclide $$(P, Q)$$, why should you read the mass number of each option before the atomic number? (2 steps)", "answer": "- Step 1: Only alpha decay changes the mass number (by −4); beta decay leaves it unchanged. So the mass number at any stage can only be either $$P$$ (the alpha hasn't happened yet) or $$P - 4$$ (the alpha has happened). Any other mass number is instantly impossible.\n- Step 2: Once you've fixed the mass number, you can determine the range of atomic numbers. Before the alpha: only betas have occurred, so $$Z$$ can only increase ($$Q, Q+1, Q+2, Q+3$$). After the alpha: $$Z$$ dropped by 2, then betas raise it by 0–3, giving $$Q-2, Q-1, Q, Q+1$$. This two-step approach (fix $$A$$ first, then list possible $$Z$$ values) is fast and systematic.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "In a decay chain with one alpha and three beta-minus decays starting from $$(P, Q)$$, why is the nuclide $$(P, Q-1)$$ impossible? (2 steps)", "answer": "- Step 1: The mass number is still $$P$$, meaning the alpha decay has **not** happened yet (only beta decays have occurred). But beta decays only **increase** the atomic number ($$\\Delta Z = +1$$ each), so $$Z$$ can only be $$Q, Q+1, Q+2,$$ or $$Q+3$$ — it can **never be below $$Q$$**.\n- Step 2: To get $$Z = Q - 1$$ (below the starting value), you would need an alpha decay (which lowers $$Z$$ by 2). But an alpha decay would also lower the mass number to $$P - 4$$, contradicting the mass number being $$P$$. You cannot have a reduced atomic number **and** the original mass number — the only process that lowers $$Z$$ also lowers $$A$$. Tom's summary: \"Atomic number is down, so you need an alpha — but you can't have an alpha and still have the same mass.\"", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "What is the general technique for answering \"which nuclide is impossible\" in a decay-chain question? (3 steps)", "answer": "- Step 1: **Fix the mass number first**: it can only be $$P$$ (no alpha yet) or $$P - 4$$ (one alpha done) or $$P - 8$$ (two alphas done), etc. Any other mass number is instantly impossible.\n- Step 2: **For each allowed mass number, list the range of atomic numbers** the betas can produce. Before any alpha: $$Z \\geq Q$$ (betas only increase $$Z$$). After one alpha: $$Z$$ ranges from $$Q - 2$$ (alpha lowered it by 2, no betas yet) up to $$Q - 2 + 3 = Q + 1$$ (alpha plus all three betas).\n- Step 3: **The impossible option is the one whose $$(A, Z)$$ pair falls outside both reachable sets.** Specifically, any option showing the original mass number $$P$$ with an atomic number **below** $$Q$$ is impossible, because betas can't lower $$Z$$ and the only thing that can (alpha) would also lower $$A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "A student calculates that an 80%-efficient motor draws 16 A of current from a 12 V supply while doing 960 J of useful work in 5 seconds. Without redoing the full calculation, how can you tell this answer is wrong? (2 steps)", "answer": "- Step 1: If the motor were 100% efficient, the current would be $$I = E_{\\text{useful}}/(Vt) = 960/(12 \\times 5) = 16$$ A. But the motor is only 80% efficient, so it must draw **more** current than this ideal value.\n- Step 2: The student's answer of 16 A equals the 100%-efficient current, which means they forgot the efficiency entirely. With 80% efficiency, the actual current must be $$16/0.8 = 20$$ A (larger). The sanity check is: efficiency < 1 means input > output, so the real current must exceed the ideal current.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A nuclide $$^{232}_{90}\\text{Th}$$ undergoes a decay chain emitting two alpha particles and three beta-minus particles (in any order). What are the only possible mass numbers for intermediate nuclides? (2 steps)", "answer": "- Step 1: Each alpha reduces the mass number by 4, and each beta leaves it unchanged. With two alphas, the mass number can only take three values: 232 (0 alphas done), 228 (1 alpha done), or 224 (2 alphas done).\n- Step 2: No other mass numbers are possible at any stage. The betas can occur at any point but never alter the mass number. So any intermediate nuclide must have $$A \\in \\{232, 228, 224\\}$$. If an option shows mass number 230 or 226, it's instantly impossible — it doesn't correspond to any number of alpha decays from 232.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "A heater is immersed in water and connected to a 20 V supply drawing 5 A for 100 s. The water gains 8000 J of thermal energy. Is the system lossless? If not, how much energy is wasted and what is the efficiency? (3 steps)", "answer": "- Step 1: Total electrical energy input = $$IVt = 5 \\times 20 \\times 100 = 10{,}000$$ J. The useful energy absorbed by the water is 8000 J.\n- Step 2: Since $$E_{\\text{in}} \\neq E_{\\text{useful}}$$, the system is not lossless. The wasted energy is $$E_{\\text{wasted}} = 10{,}000 - 8000 = 2000$$ J.\n- Step 3: The efficiency is $$\\eta = E_{\\text{useful}} / E_{\\text{in}} = 8000/10000 = 0.8 = 80\\%$$. Notice we found the wasted energy without needing the efficiency — the same shortcut as Q6: all that matters is useful vs. total.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "A 2 kg block of material has a volume of $$1.0 \\times 10^{-3}$$ m³ at room temperature. After heating, its volume increases by 10% while its mass stays the same. By what percentage does its density decrease? (2 steps)", "answer": "- Step 1: Initial density: $$\\rho_1 = m/V_1 = 2/(1.0 \\times 10^{-3}) = 2000$$ kg/m³. After heating, the new volume is $$V_2 = 1.1 \\times 10^{-3}$$ m³ (10% increase).\n- Step 2: New density: $$\\rho_2 = 2/(1.1 \\times 10^{-3}) = 2000/1.1 \\approx 1818$$ kg/m³. The percentage decrease is $$(2000 - 1818)/2000 \\times 100 \\approx 9.1\\%$$. Notice that a 10% increase in volume produces approximately a 9.1% decrease in density — they are not the same percentage because density and volume are inversely proportional, not linearly related.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A 10 V motor lifts a 50 kg mass by 2 m in 4 seconds. The system is 50% efficient. What current does the motor draw? ($$g = 10$$ N/kg) (3 steps)", "answer": "- Step 1: Useful energy = $$mgh = 50 \\times 10 \\times 2 = 1000$$ J. The 100%-efficient current would be $$I = E/(Vt) = 1000/(10 \\times 4) = 25$$ A.\n- Step 2: At 50% efficiency, the input energy must be twice the useful energy: $$E_{\\text{in}} = 1000/0.5 = 2000$$ J.\n- Step 3: The actual current is $$I = 2000/(10 \\times 4) = 50$$ A. Alternatively, just divide the ideal current by efficiency: $$25/0.5 = 50$$ A. Notice that 50% efficiency exactly doubles the required current — a useful intuition to build.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A nuclide with mass number 212 undergoes a decay chain of 3 alpha decays and some beta decays. What are the only possible mass numbers for intermediate nuclides? (2 steps)", "answer": "- Step 1: Each alpha decay reduces the mass number by 4; beta decays don't change it. After 0, 1, 2, and 3 alphas, the mass numbers are: 212, 208, 204, and 200.\n- Step 2: No other mass numbers are possible at any stage. The betas can occur at any point but never alter the mass number. So any intermediate nuclide must have $$A \\in \\{212, 208, 204, 200\\}$$. If an option shows mass number 210 or 206, it's instantly impossible — it doesn't correspond to any number of alpha decays from 212.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A hot-air balloon rises because the air inside is heated. Explain this using the same physics as the convection current in a saucepan, but explain why the balloon rises as a unit rather than circulating. (2 steps)", "answer": "- Step 1: The same physics applies: heating the air inside the balloon causes it to expand (volume increases) and its density to decrease ($$\\rho = m/V$$, with $$m$$ roughly constant since the balloon is open at the bottom). The hot air is less dense than the surrounding cooler air, so it experiences a buoyant force upward.\n- Step 2: The difference from convection in a saucepan is that the hot air is **trapped inside the balloon envelope** — it can't circulate out and be replaced. Instead, the entire balloon (as a sealed unit of low-density air) rises as one object. In a saucepan, the hot water is free to move and be replaced, creating a circulating current. The balloon is more like a single \"parcel\" of low-density fluid rising through a denser medium.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "A student says: \"When you heat water, its particles gain energy, so they weigh more, which is why hot water rises.\" What is wrong with this explanation? (2 steps)", "answer": "- Step 1: Heating adds **kinetic energy** to particles, not mass. Mass is conserved — you haven't added or removed any particles, so the total mass is unchanged. Individual particles don't \"weigh more\" after gaining kinetic energy.\n- Step 2: Hot water rises because its **density decreases** (same mass, larger volume), not because its mass increases. The correct explanation is: heating → particles spread apart → volume increases → density decreases → less-dense fluid rises. The student has confused \"has more energy\" with \"has more mass\" — these are fundamentally different quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "In nuclear balance questions, why is the correct answer often a rearrangement of a conservation equation rather than the equation in its most obvious form? (2 steps)", "answer": "- Step 1: The question asks \"which equation is correct?\" — not \"what is the balance equation?\" The options include rearrangements, partial expressions, and deliberately wrong equations. The exam tests whether you can recognize a valid algebraic manipulation of the conservation law.\n- Step 2: For example, $$w + y + z = 240$$ and $$z = 240 - (w + y)$$ are the same equation, just rearranged. The exam puts the rearranged form as an option to test if you can recognize it. Strategy: write both balance equations first, then check each option against them — including rearrangements.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A velocity-time graph shows: accelerate from 0 to 20 m/s in 10 s, then constant 20 m/s for 20 s, then decelerate to 0 in 10 s. Without calculating exact numbers, which section covers the most distance and why? (2 steps)", "answer": "- Step 1: Distance is the area under each section. The first section is a triangle (area = $$\\frac{1}{2} \\times 10 \\times 20 = 100$$ m). The middle section is a rectangle (area = $$20 \\times 20 = 400$$ m). The last section is a triangle (area = $$\\frac{1}{2} \\times 10 \\times 20 = 100$$ m).\n- Step 2: The middle section (constant velocity) covers by far the most distance (400 m vs 100 m each for the other phases). This makes intuitive sense: the car spends the most time at its top speed. In general, the longest constant-velocity section on a v-t graph usually dominates the total distance.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "How do you mentally compute $$(3 \\times 10^8) \\times (4 \\times 10^{-10})$$? What is the result? (2 steps)", "answer": "- Step 1: Multiply the digits and add the powers of ten separately: $$3 \\times 4 = 12$$ and $$10^8 \\times 10^{-10} = 10^{8+(-10)} = 10^{-2}$$.\n- Step 2: Combine: $$12 \\times 10^{-2} = 0.12$$ m = 12 cm. This is exactly the path difference calculation from Q8. The key skill is: multiply the front numbers, add the exponents. If the front product is 10 or more, you can also adjust the exponent (e.g., $$12 \\times 10^{-2} = 1.2 \\times 10^{-1}$$).", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "If a motor were 100% efficient, what would be the relationship between the useful output energy and the electrical input energy? For the motor in Q12 (12 V, 20 kg, 6 m, 5 s), what current would it draw? (2 steps)", "answer": "- Step 1: At 100% efficiency, $$E_{\\text{useful}} = E_{\\text{in}}$$ — no energy is wasted. All the electrical energy supplied becomes useful work (GPE in Q12).\n- Step 2: The current would be $$I = E_{\\text{useful}}/(Vt) = mgh/(Vt) = 1200/(12 \\times 5) = 20$$ A. This is the \"ideal\" current — the minimum the motor could possibly draw to do the required work. Any real motor ($$\\eta < 1$$) must draw more current than this.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "In the PET scanner, if the source were sitting right at one detector, what would the time difference be? Verify this is consistent with the $$\\Delta x = 2x$$ formula. (2 steps)", "answer": "- Step 1: If the source is at one detector, one ray travels 0 distance (arrives instantly) and the other travels the full separation $$d$$ (takes time $$d/v$$). The path difference is $$d$$ and the time difference is $$d/v$$.\n- Step 2: Using $$\\Delta x = 2x$$: when the source is at the detector, its displacement from the midpoint is $$x = d/2$$. So $$\\Delta x = 2 \\times d/2 = d$$, giving time delay $$d/v$$. The formula is consistent — it works as long as the source is on the line between the detectors, even at the extreme endpoint.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "ENGAA numbers are always tidy. If you're solving a quadratic inequality on the ESAT and it doesn't factorise cleanly, what should you conclude? (2 steps)", "answer": "- Step 1: If a quadratic doesn't factorise into nice integer (or simple decimal) roots, you have almost certainly **mis-copied** the question or made an algebra error. ENGAA questions are designed so that the arithmetic is always doable in your head.\n- Step 2: This is a useful diagnostic: stop and re-check rather than spending precious seconds trying to factorise something messy. In Q1, $$2x^2 + x - 15 = (2x-5)(x+3)$$ factorises cleanly into roots of 2.5 and −3 — exactly the kind of tidy result the exam intends. If you got roots like 2.37 and −3.14, something went wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}], "count": 56}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In A-level exams, rigour and showing every algebraic step is rewarded. How does the ESAT exam differ in its optimal test-taking strategy, and why? (2 steps)", "answer": "- Step 1: The ESAT is fundamentally a **time-pressure and interpretation** test (roughly 89 seconds per question, no calculator, no formula sheet). Therefore, the optimal strategy is the opposite of A-level rigour: skip steps, approximate aggressively, and round to nice numbers.\n- Step 2: You must retrain the instinct to write out middle algebra. Jump straight from the physics idea to the number, only chasing precision if two answer options are very close. The rigour that earns marks in A-level *costs* you time here.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "When you first read an ESAT physics question, what is the single most important thing to do before touching any numbers, and why? (2 steps)", "answer": "- Step 1: **Identify the physics first.** Ask yourself: \"What is this question actually about?\" Name the branch of physics (convection, energy conservation, nuclear balance, etc.).\n- Step 2: Once the context is understood, write down the one key idea and then decide the quickest route to the number. Most ESAT questions have a short route once the context is understood; the difficulty is dressed up in the wording, not the math.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Why should you read the magnitude of the answer options first when tackling an ESAT question? (2 steps)", "answer": "- Step 1: The options tell you what scale the answer should be, allowing you to sanity-check your result instantly.\n- Step 2: They also help fix the power of ten in standard-form calculations. If your mental math gives an order of magnitude that doesn't match any option, you know immediately to recheck your exponent arithmetic.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "What is the recommended priority order for becoming confident at ESAT questions? (3 steps)", "answer": "- Step 1: **Spot the topic quickly** — what branch of physics is this?\n- Step 2: **Decide which information actually matters** — ESAT questions deliberately include numbers you don't need (distractors). Filter them out.\n- Step 3: **Avoid long methods** when a simple physical argument or proportional shortcut will do the job.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "The formula for density is $$\\rho = \\frac{m}{V}$$. For a *fixed mass* of a substance, how do density and volume relate, and what is the physical intuition behind this? (2 steps)", "answer": "- Step 1: Density and volume are inversely related. If volume $$V$$ goes up and mass $$m$$ is unchanged, density $$\\rho$$ must go down.\n- Step 2: The physical intuition is that density measures how tightly packed the mass is. If you spread the same mass over a larger space (higher $$V$$), the particles are further apart, so the packing is looser (lower $$\\rho$$).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "When a substance is heated, it typically expands. Explain the microscopic mechanism that causes this expansion, and state what happens to the mass. (2 steps)", "answer": "- Step 1: Heating transfers kinetic energy to the particles. They vibrate or move more vigorously and push each other slightly further apart on average, increasing the overall volume.\n- Step 2: The mass remains unchanged because heating does not add or remove any particles. Mass is conserved.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Under heating, does the \"density of a fixed mass\" or the \"mass of a fixed volume\" increase? Explain the difference. (3 steps)", "answer": "- Step 1: The \"density of a fixed mass\" *decreases*, not increases. The same mass now occupies a larger volume, so $$\\rho = m/V$$ drops.\n- Step 2: The \"mass of a fixed volume\" does *not* increase. In fact, it goes down.\n+ Sub-case A: Imagine a rigid, open box of fixed volume $$V$$ submerged in the fluid. As the fluid expands, some of it spills out or moves away, so less mass remains inside that fixed region.\n- Step 3: Mass is conserved overall; it does not appear from nowhere on heating. Confusing these two phrasings is a classic ESAT trap.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "A saucepan of water is heated from below. Describe the step-by-step causal chain that forms a convection current. (4 steps)", "answer": "- Step 1: The heat source warms the water at the bottom, increasing the particles' kinetic energy.\n- Step 2: The heated water expands, so its volume increases and its density decreases.\n- Step 3: Because it is now less dense than the cooler water above, the hot water becomes buoyant and rises.\n- Step 4: Cooler, denser water sinks to fill the gap, gets heated in turn, and the cycle repeats, forming a bulk movement of fluid—a convection current.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A convection current in a fluid forms most effectively when heated from below. Why is heating from above much less effective at creating a convection current? (2 steps)", "answer": "- Step 1: If heated from above, the top layer of fluid expands and becomes less dense. This less-dense fluid is already sitting on top of the denser, cooler fluid below.\n- Step 2: Because the less-dense fluid is already at the top, it is gravitationally stable. There is no buoyancy force driving it upwards, and the denser cool fluid below has no reason to rise, so no bulk circulation occurs.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "How does a room radiator heat the entire room even though it only touches a small amount of air, and what solid-engineering analogy relates to the underlying physics? (2 steps)", "answer": "- Step 1: The radiator warms the air beside it, which expands, becomes less dense, and rises to the ceiling. Cooler air is drawn along the floor to replace it, forming a room-sized convection loop.\n- Step 2: A solid analogy is bridge expansion joints. Bridges are built with gaps because materials expand when heated (hot $$\\Rightarrow$$ bigger). While bridges don't convect, it's the same underlying physics of thermal expansion that engineers must accommodate.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "The formula for gravitational potential energy is $$E_{GPE} = mgh$$. In this formula, what exactly does the variable $$h$$ represent, and what is the common pitfall when applying it? (2 steps)", "answer": "- Step 1: The variable $$h$$ represents the **vertical** height gained. It is strictly the upward displacement against gravity, not the distance along a ramp or slope.\n- Step 2: The common pitfall is using the length of a ramp for $$h$$. If a car is pulled up a ramp, only the vertical rise (the opposite side of the triangle) counts as the useful energy stored in the raised object.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A machine lifts an object, requiring $$E_{useful}$$ of energy. The total input energy is $$E_{input}$$. What is the wasted energy, and why might the efficiency percentage be completely unnecessary to solve the problem? (2 steps)", "answer": "- Step 1: The wasted energy is simply $$E_{wasted} = E_{input} - E_{useful}$$. Energy is never lost, only transferred into useful and wasted forms.\n- Step 2: If you can find the useful energy directly (e.g., $$mgh$$) and are given the total input, you can subtract to find the loss in one step. You do not need to compute intermediate motor losses or use the efficiency formula; \"all that matters is useful vs total.\"", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Efficiency is defined as $$\\eta = \\frac{E_{useful}}{E_{input}}$$. When converting a known useful output energy into the required input energy, does the input value get larger or smaller, and why? (2 steps)", "answer": "- Step 1: The input value gets **larger**. You rearrange to $$E_{input} = \\frac{E_{useful}}{\\eta}$$, and since $$\\eta < 1$$, dividing by a fraction increases the number.\n- Step 2: Physical intuition: an inefficient machine must be fed *more* energy than it usefully delivers because some energy is always lost to the surroundings. If your calculation makes the input smaller than the output, you divided the wrong way.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pic
