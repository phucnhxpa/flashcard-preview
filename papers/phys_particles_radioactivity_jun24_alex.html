 and incorrect absorption measurements. The **corrected count rate** = measured count rate − background count rate.\n\nAlways measure background first (no source), then subtract. It's like zeroing a scale before weighing — without it, your readings are systematically wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "Name two natural sources and two man-made sources of background radiation. For each natural source, state the type of radiation it primarily emits. (3 steps)", "answer": "- Step 1: **Natural sources**:\n  + **Radon gas** from rocks and soil — primarily alpha radiation (radon is an alpha emitter; dangerous when inhaled).\n  + **Cosmic rays** from space — high-energy protons from the Sun and supernovae that produce gamma radiation when they collide with atmospheric molecules.\n- Step 2: **Man-made sources**:\n  + **Medical sources** — X-rays, CT scans, radioactive tracers, and radiotherapy.\n  + **Nuclear fallout / accidents** — residue from nuclear weapons testing or accidents like Chernobyl.\n- Step 3: Other natural sources include carbon-14 in biological material (beta emitter) and potassium-40 in food (beta/gamma emitter). The key distinction: natural sources have existed since the Earth formed; man-made sources are products of human technology.\n\nNatural: radon (α), cosmic rays (γ). Man-made: medical, nuclear. The exam often asks for one of each category.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "In the uranium-238 decay series, uranium decays to thorium, then to protactinium, then back to a different isotope of uranium. Explain how an element can appear again after decaying away. (3 steps)", "answer": "- Step 1: Uranium-238 ($$Z = 92$$, $$A = 238$$) decays by **alpha** to thorium-234 ($$Z = 90$$, $$A = 234$$). This changes the element because alpha decay removes protons.\n- Step 2: Thorium-234 then decays by **beta-minus** to protactinium-234 ($$Z = 91$$, $$A = 234$$), which decays by **beta-minus** again to uranium-234 ($$Z = 92$$, $$A = 234$$). Two beta decays each increase $$Z$$ by 1, bringing it back to 92 — uranium again!\n- Step 3: But this is **uranium-234**, not uranium-238. Same element (same $$Z$$), different isotope (different $$A$$, hence different neutron count). The series continues until it reaches a stable isotope (lead-206).\n\nAlpha changes the element by removing protons. Beta-minus can bring Z back up by converting neutrons to protons. The element \"returns,\" but lighter — it's a different isotope.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "In a decay chain, a nucleus undergoes two alpha decays followed by one beta-minus decay. If you start with $$^{230}_{90}\\text{Th}$$, what is the final daughter nucleus? (3 steps)", "answer": "- Step 1: Two alpha decays remove a total of 8 nucleons and 4 protons: $$A = 230 - 8 = 222$$, $$Z = 90 - 4 = 86$$. After two alphas: $$^{222}_{86}\\text{Rn}$$ (radon).\n- Step 2: One beta-minus decay keeps $$A$$ the same but increases $$Z$$ by 1: $$A = 222$$, $$Z = 86 + 1 = 87$$. After beta: $$^{222}_{87}\\text{Fr}$$ (francium).\n- Step 3: The final daughter is $$^{222}_{87}\\text{Fr}$$. Check: total change in $$A$$ is $$-8$$ (two alphas, beta contributes 0), total change in $$Z$$ is $$-4 + 1 = -3$$. $$230 - 8 = 222$$ ✓, $$90 - 3 = 87$$ ✓.\n\nQuick shortcut: each alpha → $$\\Delta A = -4$$, $$\\Delta Z = -2$$. Each beta-minus → $$\\Delta A = 0$$, $$\\Delta Z = +1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A sample's Geiger counter reading is 80 counts/min. When the source is removed, the reading is 15 counts/min. What is the corrected count rate, and what does the 15 counts/min represent? (2 steps)", "answer": "- Step 1: The 15 counts/min is the **background radiation** — the counts detected from environmental sources even with no sample present. This is always present and must be accounted for.\n- Step 2: The **corrected count rate** = measured rate − background rate = $$80 - 15 = 65$$ counts/min. This 65 counts/min is the activity attributable solely to the radioactive sample.\n\nNever forget to subtract background. An exam favourite: giving you a half-life graph that approaches a non-zero value and asking you to identify the background count.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" Distinguish these two terms precisely. (2 steps)", "answer": "- Step 1: **Spontaneous** means the decay is not influenced by external environmental factors — temperature, pressure, chemical bonding, or electromagnetic fields cannot speed it up, slow it down, or trigger it. The nucleus decays on its own internal clock.\n- Step 2: **Random** means the *exact moment* at which any individual nucleus will decay cannot be predicted. Each nucleus has a constant probability of decaying per unit time, but you cannot say *which* nucleus will decay next or *when*. With large numbers, statistical predictions (like half-life) become reliable, but individual events remain unpredictable.\n\nSpontaneous = \"nothing external controls it.\" Random = \"nothing predicts the exact timing.\" Both are necessary for the observed behaviour of radioactive samples.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "Why can't we speed up radioactive decay by heating the sample or applying pressure? What property of decay does this demonstrate? (2 steps)", "answer": "- Step 1: Radioactive decay is governed by the **strong and weak nuclear forces** operating within the nucleus, at energy scales vastly different from thermal or mechanical energies. Heating a sample to even thousands of kelvin adds only ~0.1 eV per particle, while nuclear energy levels are on the order of MeV — a factor of $$10^7$$ difference. The thermal energy is utterly negligible compared to nuclear binding energies.\n- Step 2: This demonstrates the **spontaneous** nature of radioactive decay — it cannot be influenced by environmental factors. The decay probability depends only on the internal nuclear structure, not on external conditions.\n\nNuclear processes are insulated from everyday energies by ~7 orders of magnitude. You'd need conditions like those inside a star to affect nuclear decay rates.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Define the activity of a radioactive sample and state its unit. How is activity related to the number of undecayed nuclei and the decay constant? (2 steps)", "answer": "- Step 1: **Activity** ($$A$$) is the rate at which nuclei in a radioactive sample decay. Its SI unit is the **Becquerel (Bq)**, where 1 Bq = 1 decay per second.\n- Step 2: Activity is given by $$A = \\lambda N$$, where $$\\lambda$$ is the **decay constant** (the probability per second that any given nucleus will decay) and $$N$$ is the number of undecayed nuclei currently in the sample. The more nuclei you have and the larger the decay constant, the higher the activity.\n\nActivity is proportional to both \"how many are left\" ($$N$$) and \"how likely each is to decay\" ($$\\lambda$$). As $$N$$ decreases over time, so does $$A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$ in words, and explain why it has units of s$$^{-1}$$. (2 steps)", "answer": "- Step 1: The **decay constant** $$\\lambda$$ is the probability per unit time that a given nucleus will decay. If $$\\lambda = 0.01$$ s$$^{-1}$$, each nucleus has a 1% chance of decaying each second.\n- Step 2: Since $$\\lambda$$ is a probability *per second*, its units are s$$^{-1}$$. It is not a pure probability (which would be dimensionless) but a *rate* — the probability density of decay per unit time. The equation $$A = \\lambda N$$ confirms the units: Bq = s$$^{-1}$$ × (dimensionless count) = s$$^{-1}$$.\n\nThink of $$\\lambda$$ as the \"hazard rate\" — the constant risk each nucleus faces every second. Higher $$\\lambda$$ means faster decay, shorter half-life.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Derive the relationship between half-life $$t_{1/2}$$ and the decay constant $$\\lambda$$, starting from the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: By definition, after one half-life, the number of undecayed nuclei has halved: $$N = \\frac{N_0}{2}$$. Substitute this into the decay equation: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Cancel $$N_0$$ from both sides: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take the natural logarithm of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$. Since $$\\ln\\left(\\frac{1}{2}\\right) = \\ln(1) - \\ln(2) = 0 - \\ln(2) = -\\ln(2)$$, we get $$-\\ln(2) = -\\lambda t_{1/2}$$.\n- Step 4: Cancel the minus signs and rearrange: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. This shows half-life and decay constant are **inversely proportional**: a large $$\\lambda$$ (high decay probability) gives a short half-life, and vice versa.\n\n$$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$. This is the bridge between the microscopic (per-nucleus probability) and the macroscopic (observed half-life).", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "Isotope X has a half-life of 10 seconds. Isotope Y has a half-life of 1000 years. Which has the larger decay constant, and by roughly what factor? (2 steps)", "answer": "- Step 1: Since $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$, the decay constant is inversely proportional to the half-life: $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. A shorter half-life means a larger decay constant.\n- Step 2: Isotope X ($$t_{1/2} = 10$$ s) has $$\\lambda_X = \\frac{0.693}{10} \\approx 0.07$$ s$$^{-1}$$. Isotope Y ($$t_{1/2} \\approx 3.15 \\times 10^{10}$$ s) has $$\\lambda_Y \\approx \\frac{0.693}{3.15 \\times 10^{10}} \\approx 2.2 \\times 10^{-11}$$ s$$^{-1}$$. X's decay constant is roughly $$10^{9}$$ times larger than Y's.\n\nShort half-life → high $$\\lambda$$ → very active (decays fast). Long half-life → low $$\\lambda$$ → barely active. This is why short-lived isotopes are intense but brief, while long-lived ones are weak but persistent.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "A radioactive sample has an initial activity of 800 Bq and a half-life of 6 hours. What is its activity after 18 hours? (No calculator needed — use qualitative reasoning.) (3 steps)", "answer": "- Step 1: 18 hours = 3 half-lives (since $$18/6 = 3$$). After each half-life, the activity halves.\n- Step 2: After 1 half-life: $$800/2 = 400$$ Bq. After 2 half-lives: $$400/2 = 200$$ Bq. After 3 half-lives: $$200/2 = 100$$ Bq.\n- Step 3: The activity after 18 hours is **100 Bq**. In general, after $$n$$ half-lives, $$A = A_0 \\times \\left(\\frac{1}{2}\\right)^n$$. Here, $$800 \\times (1/2)^3 = 800/8 = 100$$.\n\nThree half-lives → activity drops to 1/8 of initial. Each half-life is a factor of 2; three of them is a factor of $$2^3 = 8$$.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "In the Core Practical investigating gamma radiation absorption by lead, why must you measure background radiation *before* taking readings with the source? (2 steps)", "answer": "- Step 1: The Geiger counter records counts from *all* sources — both the gamma source and background radiation. To isolate the effect of the lead absorber on the gamma source alone, you need to know the background count and subtract it from every measurement.\n- Step 2: If you didn't measure background first, you wouldn't know how much of your count rate is due to the source vs. the environment. When the lead gets very thick and the source radiation is nearly absorbed, the count rate approaches the background level — without knowing this level, you can't determine when the gamma radiation has been fully absorbed.\n\nBackground measurement is the \"zero reading\" of the experiment. Without it, all subsequent data is contaminated.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "In the gamma absorption practical, you place lead absorbers of increasing thickness between the source and detector. Sketch the expected shape of the graph of corrected count rate vs. lead thickness, and explain why it never reaches zero. (2 steps)", "answer": "- Step 1: The graph shows an **exponential decrease** — the count rate drops steeply at first (thin lead absorbs some gammas), then the rate of decrease slows (thicker lead absorbs more, but fewer gammas remain). The curve is convex, asymptotically approaching the horizontal axis.\n- Step 2: The corrected count rate never reaches exactly zero because gamma absorption is a *probabilistic* process. Each photon has a probability of passing through the lead without interacting. As thickness increases, this probability decreases exponentially but never becomes exactly zero. There's always a tiny chance a photon gets through.\n\nExponential absorption: each layer of lead removes a *fraction* of the remaining photons, not a fixed number. Like compound interest in reverse — you can never reduce the balance to exactly zero by removing a fraction each time.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Muons created in the upper atmosphere have a mean lifetime of about 2.2 μs. Without relativity, they could travel only about 660 m before decaying. Yet they are detected at sea level, ~10 km below. Explain which relativistic effect resolves this paradox, from the muon's frame of reference. (3 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is still 2.2 μs. But the **distance** from the upper atmosphere to sea level is **length-contracted**. The 10 km distance in the Earth's frame appears much shorter in the muon's frame.\n- Step 2: At speeds like 0.99c, the Lorentz contraction factor is significant. The distance the muon \"sees\" itself needing to traverse might be only a few hundred metres — well within its 660 m range.\n- Step 3: From the muon's perspective, it doesn't need to live longer; the journey is simply shorter. From Earth's perspective, the muon *does* live longer (time dilation). Both frames agree the muon reaches the ground — they just explain it differently.\n\nSame physics, two perspectives: Earth frame says \"muon lives longer\" (time dilation). Muon frame says \"distance is shorter\" (length contraction). Both are correct and consistent.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "Why is it useful that unstable particles travelling at relativistic speeds have dilated lifetimes in particle accelerator experiments? (2 steps)", "answer": "- Step 1: Many exotic particles produced in collisions have extremely short rest-frame lifetimes (nanoseconds or less). Without time dilation, they would decay within millimetres of the collision point, leaving tracks too short to detect or measure.\n- Step 2: At relativistic speeds, time dilation stretches the particle's lifetime in the lab frame. The particle travels much further before decaying, leaving a **longer track** in the detector. This gives physicists more data to measure momentum, charge, and energy — making identification possible.\n\nTime dilation isn't just a curiosity — it's a practical necessity for particle physics. Without it, most of the particles we study would vanish before we could see them.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "A student claims: \"In beta-minus decay, the nucleus emits an electron, so there must be electrons inside the nucleus.\" Explain why this claim is wrong. (3 steps)", "answer": "- Step 1: There are **no electrons in the nucleus**. The nucleus contains only protons and neutrons. This is confirmed by Rutherford scattering and the nuclear model.\n- Step 2: The beta-minus electron is **created at the moment of decay** when a neutron converts into a proton via the weak interaction: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. The electron didn't \"sit\" inside the nucleus waiting to escape; it is *produced* by the decay process.\n- Step 3: At a deeper level, the neutron is made of quarks (udd). In beta-minus decay, a down quark transforms into an up quark (changing udd → uud, i.e., neutron → proton), and the W$$^-$$ boson mediates this, decaying into an electron and antineutrino. The electron is a *product* of the interaction, not a pre-existing resident.\n\nThe electron is manufactured on-site by the weak force, not stored in the nucleus. It's like saying a candle \"contains\" light — no, it *produces* light when burned.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A student writes the beta-minus decay equation without the antineutrino. Why is this equation incomplete, and what conservation law would appear to be violated without the antineutrino? (3 steps)", "answer": "- Step 1: Without the antineutrino, the equation would be: $$^{A}_{Z}X \\rightarrow ^{A}_{Z+1}Y + ^{0}_{-1}\\beta^-$$. This balances charge and nucleon number, so those are fine.\n- Step 2: However, **lepton number** would not be conserved. The left side has $$L = 0$$ (no leptons). The right side has the electron with $$L = +1$$, giving total $$L = +1 \\neq 0$$. The antineutrino ($$L = -1$$) is needed to balance this.\n- Step 3: Historically, the antineutrino was proposed by Pauli precisely because beta decay spectra showed a continuous energy distribution — the electron didn't always carry the full expected energy. Some energy was \"missing,\" carried away by an unseen particle. The neutrino solved both the energy and lepton-number problems.\n\nThe antineutrino is the invisible accountant balancing both energy and lepton number. Forgetting it is the most common exam mistake in beta decay.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "A student says: \"Alpha, beta, and gamma radiation are all the same thing — just radiation from the nucleus.\" Critique this statement. (3 steps)", "answer": "- Step 1: They are **not** the same thing. They are fundamentally different in composition. Alpha is a helium nucleus (hadron, matter), beta is an electron (lepton, matter), and gamma is a photon (boson, pure energy).\n- Step 2: Their physical properties differ drastically: alpha has mass 4u and charge +2; beta has mass ~0 and charge −1; gamma has mass 0 and charge 0. This leads to very different ionising powers, penetrating powers, and behaviours in magnetic fields.\n- Step 3: In a magnetic field, alpha and beta deflect in opposite directions (opposite charges) with very different radii (different masses). Gamma is undeflected (no charge). If they were \"the same thing,\" they'd behave identically.\n\n\"Radiation\" just means \"something emitted.\" These three are as different from each other as a bowling ball, a bullet, and a laser beam.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "A student claims: \"A photon with energy exactly equal to $$mc^2$$ can create an electron-positron pair.\" Explain why this is incorrect. (2 steps)", "answer": "- Step 1: The photon needs energy **at least** $$2mc^2$$, not $$mc^2$$. Pair production creates *two* particles — the electron and the positron — each with rest-mass energy $$mc^2$$. The total rest-mass energy required is $$2mc^2$$.\n- Step 2: If the photon had only $$mc^2$$, it could supply the mass for only one particle. But charge conservation and lepton number conservation forbid creating a single charged particle alone — you must create a particle–antiparticle pair. So the minimum energy is twice the single-particle rest-mass energy.\n\n$$E_{\\min} = 2mc^2$$: you're buying two tickets, not one. Any excess energy above $$2mc^2$$ becomes kinetic energy of the pair.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": true}, {"question": "A student says: \"Background radiation is negligible and can be ignored in experiments.\" When might this be a reasonable approximation, and when would it lead to significant error? (2 steps)", "answer": "- Step 1: Background radiation (~15–30 counts/min typically) is negligible when the source activity is **much larger** — say, thousands of counts/min. In this case, the background is a tiny fraction and ignoring it introduces only a small percentage error.\n- Step 2: Background becomes significant when the source activity is **low** — comparable to the background level. This happens with weak sources, or at large distances from a source, or after many half-lives when the sample has nearly decayed away. In these cases, failing to subtract background can lead to large percentage errors in calculated activity or half-life.\n\nRule of thumb: if background is less than ~5% of your measured count rate, it's approximately negligible. Otherwise, always subtract.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "A student observes that a Geiger counter near a radioactive source gives fluctuating counts even when nothing changes. Explain why this happens and what it tells us about the nature of radioactive decay. (2 steps)", "answer": "- Step 1: The fluctuations occur because radioactive decay is a **random process**. Each nucleus has a constant probability of decaying per unit time, but the exact timing of individual decays is unpredictable. Sometimes more nuclei decay in a given interval, sometimes fewer.\n- Step 2: These statistical fluctuations are **evidence for the random nature of nuclear decay**. If decay were deterministic (predictable), the count rate would be perfectly smooth. The observed \"noise\" in the Geiger counter reading is the signature of random, independent decay events.\n\nThe jagged Geiger counter trace is the macroscopic fingerprint of microscopic randomness. With enough nuclei, the average rate is predictable, but the moment-to-moment count always fluctuates.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "An alpha particle and a gamma ray are emitted from the same source. Which will be deflected by a magnetic field, and why? What does this tell you about their charges? (2 steps)", "answer": "- Step 1: The **alpha particle** (charge +2e) will be deflected by the magnetic field. The Lorentz force $$F = Bqv$$ acts perpendicular to its velocity, curving its path. The direction of curvature follows Fleming's Left Hand Rule.\n- Step 2: The **gamma ray** (charge 0) will **not** be deflected. Since $$F = Bqv$$ and $$q = 0$$, the force is zero regardless of the field strength or the photon's energy. Gamma rays travel in straight lines through magnetic fields.\n\nA magnetic field is a simple way to distinguish charged from uncharged radiation: alpha and beta curve (in opposite directions due to opposite charges), gamma goes straight.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "Simple exercise: A nucleus with $$A = 220$$ and $$Z = 86$$ undergoes alpha decay. What are the $$A$$ and $$Z$$ values of the daughter nucleus? (2 steps)", "answer": "- Step 1: Alpha decay removes 4 nucleons and 2 protons: $$A_{\\text{daughter}} = 220 - 4 = 216$$, $$Z_{\\text{daughter}} = 86 - 2 = 84$$.\n- Step 2: The daughter nucleus has $$A = 216$$, $$Z = 84$$. (This is polonium-216, but you don't need to know the element name — just the numbers.)\n\nAlpha decay: subtract 4 from top, subtract 2 from bottom. Always.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Simple exercise: A nucleus with $$A = 214$$ and $$Z = 82$$ undergoes beta-minus decay. What are the $$A$$ and $$Z$$ values of the daughter nucleus? (2 steps)", "answer": "- Step 1: Beta-minus decay keeps $$A$$ the same (a neutron becomes a proton — same number of nucleons) but increases $$Z$$ by 1: $$A_{\\text{daughter}} = 214$$, $$Z_{\\text{daughter}} = 82 + 1 = 83$$.\n- Step 2: The daughter nucleus has $$A = 214$$, $$Z = 83$$. (This is bismuth-214.)\n\nBeta-minus: top number unchanged, bottom number increases by 1. The classic trap is decreasing Z because you see a \"−1\" in the beta notation.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "Simple exercise: A sample has 1600 undecayed nuclei and a half-life of 2 minutes. How many undecayed nuclei remain after 6 minutes? (2 steps)", "answer": "- Step 1: 6 minutes = 3 half-lives ($$6/2 = 3$$). After each half-life, the number of undecayed nuclei halves.\n- Step 2: After 3 half-lives: $$N = 1600 \\times (1/2)^3 = 1600/8 = 200$$ nuclei.\n\nThree halvings: 1600 → 800 → 400 → 200. Quick mental math: $$2^3 = 8$$, so divide by 8.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "Simple exercise: An isotope has a half-life of 8 hours. How many half-lives pass in 40 hours, and what fraction of the original sample remains? (2 steps)", "answer": "- Step 1: Number of half-lives: $$n = 40/8 = 5$$ half-lives.\n- Step 2: Fraction remaining after 5 half-lives: $$(1/2)^5 = 1/32$$. So only $$1/32$$ of the original sample remains after 40 hours.\n\n5 half-lives → factor of $$2^5 = 32$$ reduction. The fraction remaining is always $$(1/2)^n$$ where $$n$$ is the number of half-lives.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "The Δ$$^{++}$$ baryon has charge +2e and is made of three quarks, all of the same flavour. Which quark flavour must it be, and why? (3 steps)", "answer": "- Step 1: The only quarks available at this level are up ($$q = +2/3$$) and down ($$q = -1/3$$). Since all three quarks are the same flavour, we test both options.\n- Step 2: Three down quarks: charge = $$(-1/3) + (-1/3) + (-1/3) = -1e$$. This gives charge −1, not +2. ✗\n- Step 3: Three up quarks: charge = $$(+2/3) + (+2/3) + (+2/3) = +6/3 = +2e$$. This matches the required charge +2e. ✓ The Δ$$^{++}$$ is composed of **uuu**.\n\nThe quark model predicts this particle: if uud gives +1 (proton) and udd gives 0 (neutron), then uuu must give +2. This is the Δ$$^{++}$$, discovered experimentally and confirming the model.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "A meson is made of a quark and an antiquark. If a pion $$\\pi^+$$ has charge +1e and is made of an up quark and an antidown quark, verify the charge. (2 steps)", "answer": "- Step 1: The up quark has charge $$+2/3e$$. The antidown antiquark has the opposite charge to the down quark: down is $$-1/3e$$, so antidown is $$+1/3e$$.\n- Step 2: Total charge: $$+2/3 + 1/3 = +3/3 = +1e$$. ✓ This matches the pion's charge of +1e.\n\nAntiquarks have *opposite* charge to their quark counterparts. The antidown is not negative — it's *positive* $$1/3e$$, because it's the *anti* of a negative-charge particle.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "A student claims: \"Neutrons are stable because they are in the nucleus.\" Critique this. Where are neutrons stable, and where are they unstable? (2 steps)", "answer": "- Step 1: **Inside a stable nucleus**, neutrons are stable — they do not decay. The nuclear binding energy and the Pauli exclusion principle prevent the neutron from finding an available lower-energy state to decay into.\n- Step 2: **A free neutron** (outside any nucleus) is **unstable** with a half-life of about 10 minutes. It undergoes beta-minus decay: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. This is because outside the nucleus, the proton has lower mass, so the decay is energetically favourable.\n\nNeutrons in nuclei are \"trapped\" by nuclear forces and energy constraints. Free neutrons decay because the proton is slightly lighter — the decay releases energy.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "Why does a cyclotron have an alternating (AC) potential difference across the dees rather than a constant (DC) one? (2 steps)", "answer": "- Step 1: The particle crosses the gap between the dees twice per revolution. Each time it crosses, it must be **accelerated** (gain energy). With a DC field, the particle would be accelerated on one crossing but **decelerated** on the next (the field direction hasn't changed, but the particle is now moving the opposite way through the gap).\n- Step 2: With an **AC supply**, the polarity switches every half-revolution, timed so that the field always accelerates the particle as it crosses the gap. The particle spirals outward, gaining energy with each crossing, until it exits.\n\nDC gives one acceleration and one deceleration per revolution → net zero. AC gives two accelerations per revolution → continuous energy gain.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "In a cyclotron, the particle's orbital radius increases as it gains speed, but the time for each semicircular orbit stays constant. Why? (3 steps)", "answer": "- Step 1: The radius of the orbit is $$r = \\frac{mv}{Bq}$$. As the particle gains speed $$v$$, the radius $$r$$ increases proportionally, so the particle spirals outward.\n- Step 2: The time for one semicircular orbit is $$t = \\frac{\\pi r}{v} = \\frac{\\pi m}{Bq}$$. Notice that both $$r$$ and $$v$$ cancel: the time depends only on $$m$$, $$B$$, and $$q$$, which are all constant.\n- Step 3: This means the **period is independent of speed and radius** — a remarkable result. The particle always takes the same time to complete a half-circle, regardless of how fast it's going. This is why a fixed-frequency AC supply works: the switching frequency can be constant.\n\nThis independence of period from radius is the elegant physics that makes cyclotrons work. It only holds for non-relativistic speeds; at relativistic speeds, the effective mass increases and the period changes — requiring a synchrocyclotron.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": true}, {"question": "A student asks: \"If gamma rays have no mass and no charge, how can they be dangerous?\" Explain. (2 steps)", "answer": "- Step 1: Gamma rays carry **energy** — each photon has energy $$E = hf$$. For gamma rays, the frequency is extremely high, so each photon carries a large amount of energy (MeV range).\n- Step 2: When a gamma photon interacts with matter (via the photoelectric effect, Compton scattering, or pair production), it transfers its energy to electrons in the material. These high-energy electrons then ionise other atoms, causing chemical damage to DNA and cells. The danger comes not from the gamma ray's mass or charge, but from its **energy** and its ability to **liberate energetic electrons** inside tissue.\n\nGamma is dangerous not because of what it *is* (massless, chargeless) but because of what it *does* (deposits energy that ionises atoms).", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "Why is radon gas considered particularly dangerous among natural background radiation sources, even though it emits alpha particles which have very low penetrating power? (2 steps)", "answer": "- Step 1: Radon gas is **inhaled** into the lungs. Once inside the body, there is no skin or external barrier to protect the delicate lung tissue from the alpha particles. Alpha's high ionising power means it deposits all its energy in a very small volume of tissue.\n- Step 2: Outside the body, alpha particles are stopped by dead skin cells and pose little threat. But inside the lungs, alpha radiation directly ionises living cells, significantly increasing the risk of lung cancer. The danger is the *combination* of inhalation exposure and alpha's high ionising power in unprotected tissue.\n\nAlpha is \"safe outside, dangerous inside.\" This is the same principle behind alpha-emitting radiopharmaceuticals — they must never be ingested or inhaled.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "In the Rutherford scattering experiment, why was gold foil used rather than, say, aluminium foil? (2 steps)", "answer": "- Step 1: Gold has a **very high atomic number** ($$Z = 79$$), meaning its nucleus has a large positive charge. This produces stronger Coulomb repulsion with the alpha particles, leading to more large-angle deflections and making the scattering pattern easier to observe.\n- Step 2: Gold is also extremely **malleable** — it can be hammered into very thin foils (only a few hundred atoms thick). A thin foil ensures that alpha particles undergo essentially a *single* scattering event as they pass through, rather than multiple scatterings that would blur the results. Aluminium has lower $$Z$$ (weaker deflections) and is harder to make as thin.\n\nHigh $$Z$$ → stronger scattering signal. Extreme thinness → clean single-scattering data. Gold is uniquely suited on both counts.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": true}, {"question": "A student writes: $$^{238}_{92}\\text{U} \\rightarrow ^{234}_{91}\\text{Pa} + ^{4}_{2}\\alpha$$. Identify and correct the error. (2 steps)", "answer": "- Step 1: Check the proton number balance: left side $$Z = 92$$, right side $$91 + 2 = 93 \\neq 92$$. The proton number doesn't balance — there's one too many protons on the right.\n- Step 2: The correct daughter proton number is $$Z = 92 - 2 = 90$$, not 91. The correct equation is: $$^{238}_{92}\\text{U} \\rightarrow ^{234}_{90}\\text{Th} + ^{4}_{2}\\alpha$$. The student likely confused alpha decay with beta-minus decay (which *increases* Z by 1).\n\nAlpha decay always decreases Z by 2. If Z increased, it would look like beta decay, not alpha. Always check both top and bottom numbers balance.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "A student writes: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^-$$. This balances numerically. What is still missing, and why does it matter? (2 steps)", "answer": "- Step 1: The **antineutrino** $$\\bar{\\nu}_e$$ is missing. The complete equation should be: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$.\n- Step 2: Without the antineutrino, lepton number is not conserved ($$L_{\\text{left}} = 0$$ but $$L_{\\text{right}} = +1$$). Also, the continuous beta energy spectrum (the electron doesn't always have the same energy) can only be explained if another particle carries away the \"missing\" energy. The antineutrino solves both problems.\n\nNumerical balance of A and Z is necessary but not sufficient. Lepton number and energy conservation require the antineutrino. Always include it in beta decay equations.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": true}, {"question": "What is the key difference between how a LINAC and a cyclotron use electric fields to accelerate particles? (2 steps)", "answer": "- Step 1: In a **LINAC**, the electric field exists only in the **gaps between tubes**. Inside each tube (a Faraday cage), there is no electric field, so the particle drifts at constant speed. The AC supply switches polarity so the particle is always accelerated when it crosses a gap.\n- Step 2: In a **cyclotron**, the electric field exists only in the **gap between the two dees**. Inside each dee (a hollow conductor), the magnetic field bends the particle in a semicircle, but there's no electric field. The AC supply switches polarity each time the particle arrives at the gap, so it's always accelerated.\n\nBoth use the same trick: accelerate in gaps, drift inside conductors, switch polarity to maintain acceleration direction. The cyclotron adds a magnetic field to bend the path into a spiral instead of a straight line.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": false}, {"question": "A proton and an antiproton each have mass $$\\approx 938$$ MeV/$$c^2$$. When they annihilate, what is the minimum total energy released, and how many photons are produced? (2 steps)", "answer": "- Step 1: The minimum energy released is the total rest-mass energy of both particles: $$E = 2mc^2 = 2 \\times 938 = 1876$$ MeV. This is the minimum because it assumes the particles are at rest (no kinetic energy to add).\n- Step 2: **Two photons** are produced, emitted in opposite directions to conserve momentum. Each photon carries at least $$938$$ MeV (half the total). If the particles had kinetic energy, the photons would carry more.\n\n$$2mc^2$$ is the energy budget: two particles worth of mass → two photons worth of energy. Momentum conservation demands two photons, not one.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": true}, {"question": "A photon with energy 3 MeV interacts with a nucleus. Can it produce an electron-positron pair? (The rest-mass energy of each is 0.511 MeV.) (2 steps)", "answer": "- Step 1: The minimum energy for pair production is $$2mc^2 = 2 \\times 0.511 = 1.022$$ MeV. The photon has 3 MeV, which is well above this threshold.\n- Step 2: Yes, pair production **can** occur. The photon's energy (3 MeV) covers the rest-mass energy (1.022 MeV), and the surplus $$3 - 1.022 = 1.978$$ MeV becomes kinetic energy shared between the electron and positron. The nucleus absorbs the necessary recoil momentum.\n\n$$E_{\\text{photon}} \\geq 2mc^2$$ is the condition. 3 MeV > 1.022 MeV, so the process is allowed. The excess doesn't vanish — it becomes kinetic energy of the pair.", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": false}, {"question": "Explain why the electron-volt is a more convenient unit than the joule for particle physics, using the scale of typical energies involved. (2 steps)", "answer": "- Step 1: Particle physics energies are extremely small in joules. For example, a proton's rest-mass energy is about $$1.5 \\times 10^{-10}$$ J — an unwieldy number with many zeros. In eV, this is about 938 MeV — a manageable number.\n- Step 2: The electron-volt is defined as the energy gained by an electron crossing 1 V: $$1\\text{ eV} = 1.6 \\times 10^{-19}$$ J. Since particle accelerators use potential differences (kV, MV), the energy naturally comes out in keV, MeV, or GeV. The unit is tailored to the scale of the physics.\n\n1 eV is to particle physics what 1 kg is to everyday life — a unit sized to the phenomena. Using joules for particle physics is like measuring your height in light-years.", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": true}, {"question": "A student claims: \"An isotope and an ion are the same thing — both have different numbers of particles than the standard atom.\" Distinguish these two concepts clearly. (2 steps)", "answer": "- Step 1: An **isotope** has a different number of **neutrons** in the nucleus compared to the most common form of the element. The proton number is the same. This is a *nuclear* property — it affects stability and mass but not chemistry.\n- Step 2: An **ion** has a different number of **electrons** orbiting the nucleus compared to the neutral atom. The nucleus (protons and neutrons) is unchanged. This is an *electronic* property — it affects chemical behaviour and charge, but not nuclear stability.\n\nIsotope = same element, different neutrons (nuclear difference). Ion = same element, different electrons (chemical difference). They are completely distinct concepts that sometimes overlap (you can have a radioactive ion, for example).", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": true}, {"question": "In a cloud chamber, you observe a track that curves to the *right* in a magnetic field pointing into the page. The track has a large radius. Is the particle positively or negatively charged, and does it have high or low momentum? Use Fleming's Left Hand Rule. (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule: First finger = field direction (into page), thumb = force direction (toward centre of curvature = to the right for a right-curving track). The second finger then points *upward*, which represents the direction of *conventional current* (positive charge motion).\n- Step 2: Since the second finger (conventional current) points upward and the particle is moving upward (or at least has a component matching this), the particle must be **positively charged**. A negative charge would curve in the opposite direction.\n- Step 3: The **large radius** indicates **high momentum**, since $$r = p/(Bq)$$ and $$B$$ and $$q$$ are fixed. The particle is heavy or fast (or both).\n\nLarge radius → high momentum. Curvature direction → charge sign. Together, you can read both properties from a single photograph.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": true}, {"question": "Why can't we use visible light (wavelength ~500 nm) to resolve the structure of a nucleus (diameter ~$$10^{-14}$$ m)? (2 steps)", "answer": "- Step 1: The resolving power of any probe is limited by its wavelength — you cannot resolve features smaller than roughly one wavelength. Visible light has $$\\lambda \\approx 500 \\times 10^{-9}$$ m = $$5 \\times 10^{-7}$$ m.\n- Step 2: The nucleus is $$\\sim 10^{-14}$$ m across, which is about $$10^7$$ times smaller than the wavelength of visible light. It's like trying to read a newspaper with a telescope — the wrong scale entirely. You need a probe with $$\\lambda \\lesssim 10^{-14}$$ m, which requires very high momentum particles (de Broglie wavelength).\n\n$$\\lambda_{\\text{light}} \\gg d_{\\text{nucleus}}$$: the light \"averages over\" the nucleus, seeing nothing inside. You need wavelengths comparable to or smaller than the feature size.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": false}, {"question": "A radioactive source emits both alpha and beta radiation. You place a sheet of paper between the source and detector, and the count rate drops significantly but not to background level. Explain what this tells you. (2 steps)", "answer": "- Step 1: The significant drop tells you that **alpha radiation** was present and has been completely absorbed by the paper (alpha is stopped by paper). The reduction in count rate equals the alpha contribution.\n- Step 2: The remaining count (above background) is due to **beta and/or gamma radiation**, which passes through paper. To distinguish between beta and gamma, you would next add aluminium: if the count drops further, beta was present; if it doesn't, only gamma remains.\n\nPaper filters out alpha. Aluminium filters out beta. Lead reduces gamma. This sequential absorption is exactly how the three types were originally identified.", "source": "GLM 5.1 ①", "_id": "glm_1_79", "judge_pick": false}, {"question": "In the uranium-238 decay series, the final stable product is lead-206 ($$^{206}_{82}\\text{Pb}$$). Starting from $$^{238}_{92}\\text{U}$$, how many alpha decays must have occurred? (2 steps)", "answer": "- Step 1: Each alpha decay reduces the nucleon number by 4. The total reduction in A is $$238 - 206 = 32$$. The number of alpha decays is $$32/4 = 8$$.\n- Step 2: Check with Z: 8 alpha decays reduce Z by $$8 \\times 2 = 16$$, giving $$92 - 16 = 76$$. But the final Z is 82, not 76. The difference of $$82 - 76 = 6$$ is accounted for by **6 beta-minus decays** (each increases Z by 1 without changing A).\n\n8 alpha decays account for the mass change. 6 beta-minus decays account for the proton-number discrepancy. Both types are needed to reach lead-206 from uranium-238.", "source": "GLM 5.1 ①", "_id": "glm_1_80", "judge_pick": false}, {"question": "The quark model explains beta-minus decay as a down quark turning into an up quark. Walk through this at the quark level for neutron decay: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. (3 steps)", "answer": "- Step 1: The neutron has quark composition **udd** (one up, two down). The proton has composition **uud** (two up, one down). The difference is that one down quark has become an up quark.\n- Step 2: At the quark level: $$d \\rightarrow u + e^- + \\bar{\\nu}_e$$. The down quark (charge $$-1/3$$) transforms into an up quark (charge $$+2/3$$), and the charge difference of $$+1$$ is balanced by the electron (charge $$-1$$). The antineutrino balances lepton number.\n- Step 3: The overall process: $$udd \\rightarrow uud + e^- + \\bar{\\nu}_e$$, i.e., neutron → proton + electron + antineutrino. The weak nuclear force (mediated by the W$$^-$$ boson) drives the quark flavour change.\n\nBeta decay isn't a neutron \"splitting\" — it's a single quark changing flavour, with the rest of the nucleon staying intact. The W boson is the agent of transformation.", "source": "GLM 5.1 ①", "_id": "glm_1_81", "judge_pick": false}, {"question": "What is the key reason that quarks are never observed in isolation, and what is this phenomenon called? (2 steps)", "answer": "- Step 1: As you try to separate two quarks, the **strong force** (mediated by gluons) between them does not decrease with distance — unlike electromagnetic forces. Instead, the energy stored in the field increases with separation.\n- Step 2: When the energy becomes large enough, it converts into a new quark–antiquark pair (via $$E = mc^2$$). Instead of isolating a quark, you've created new hadrons. This phenomenon is called **confinement** — quarks are always confined within hadrons and can never be isolated.\n\nThe strong force acts like a rubber band that never breaks — it just snaps and creates new rubber bands. This is why we study quarks indirectly, through the hadrons they compose.", "source": "GLM 5.1 ①", "_id": "glm_1_82", "judge_pick": true}, {"question": "A student asks: \"If every particle has an antiparticle with opposite charge, what is the antiparticle of a photon?\" (2 steps)", "answer": "- Step 1: The photon has **zero charge**. Its antiparticle would need the same mass (0) and opposite charge (0, since the opposite of 0 is 0). The antiparticle of a photon has exactly the same properties as a photon.\n- Step 2: Therefore, **the photon is its own antiparticle**. This is also true for other neutral bosons like the Z$$^0$$. When two photons \"annihilate,\" they simply scatter or produce other particles — there's no special \"anti-photon\" distinct from the photon.\n\nFor neutral particles with no distinct quantum numbers, particle = antiparticle. The photon is the simplest case: nothing to negate, so nothing to distinguish.", "source": "GLM 5.1 ①", "_id": "glm_1_83", "judge_pick": false}, {"question": "In the Core Practical on gamma absorption, why should the radioactive source be stored in a lead-lined container when not in use? (2 steps)", "answer": "- Step 1: Lead is a dense, high-Z material that is very effective at absorbing gamma radiation. Storing the source in a lead-lined container **minimises the radiation exposure** to anyone in the lab when the source is not being used for measurements.\n- Step 2: This is a **safety precaution**. Even when not actively measuring, an unshielded source continuously emits radiation. The ALARA principle (As Low As Reasonably Achievable) requires minimising unnecessary exposure. The lead container ensures the source's radiation is absorbed before reaching anyone.\n\nAlways: store in lead, handle with tongs, point away from yourself, keep your distance. Safety in radioactivity is about minimising unnecessary exposure.", "source": "GLM 5.1 ①", "_id": "glm_1_84", "judge_pick": false}, {"question": "Why is it important to take multiple readings at each lead thickness in the gamma absorption practical, rather than a single reading? (2 steps)", "answer": "- Step 1: Radioactive decay is **random**, so individual count rates fluctuate statistically. A single reading might be anomalously high or low due to random variation, giving an unreliable data point.\n- Step 2: Taking **multiple readings** (e.g., three readings per thickness) and averaging reduces the impact of random fluctuations, improving the **reliability** and **precision** of each data point. The mean of several readings is a better estimate of the true count rate than any single measurement.\n\nRandom decay → random fluctuations → need repeated measurements. This is a general principle in any experiment involving radioactive counting.", "source": "GLM 5.1 ①", "_id": "glm_1_85", "judge_pick": false}, {"question": "A student observes that a half-life graph of count rate vs. time approaches a value above zero, not zero itself. What does this non-zero asymptote represent, and how should the data be corrected? (2 steps)", "answer": "- Step 1: The non-zero asymptote represents the **background radiation** count rate. The sample's own radiation decays exponentially toward zero, but the Geiger counter always registers background counts from the environment.\n- Step 2: To correct: subtract the background count rate (the asymptotic value) from every data point. The corrected data will then decay exponentially toward zero, allowing accurate determination of the half-life.\n\nAn uncorrected half-life graph curves toward the background level, not zero. This is a common exam scenario: \"The graph approaches 15 counts/min. What is the background count?\" Answer: 15 counts/min.", "source": "GLM 5.1 ①", "_id": "glm_1_86", "judge_pick": false}, {"question": "Explain why the activity of a radioactive sample decreases over time, even though each nucleus has a constant probability of decaying per second. (2 steps)", "answer": "- Step 1: Each nucleus has a constant probability $$\\lambda$$ of decaying per second (the decay constant). This probability doesn't change. However, as time passes, more and more nuclei have already decayed and are no longer part of the undecayed population.\n- Step 2: Activity $$A = \\lambda N$$, where $$N$$ is the number of *remaining* undecayed nuclei. Since $$N$$ decreases over time (nuclei are removed by decay but not replaced), $$A$$ must also decrease. The probability per nucleus is constant, but there are fewer nuclei left to \"try.\"\n\nConstant per-nucleus probability + shrinking population = decreasing activity. It's like a lottery where the odds per ticket don't change, but there are fewer tickets remaining each round.", "source": "GLM 5.1 ①", "_id": "glm_1_87", "judge_pick": false}, {"question": "A sample has a decay constant of $$\\lambda = 0.1$$ s$$^{-1}$$. What fraction of the original nuclei remain after 10 seconds? (Use the exponential decay equation conceptually — no calculator needed for the exact answer, but estimate.) (3 steps)", "answer": "- Step 1: The exponential decay equation is $$N = N_0 e^{-\\lambda t}$$. With $$\\lambda = 0.1$$ s$$^{-1}$$ and $$t = 10$$ s: $$N = N_0 e^{-0.1 \\times 10} = N_0 e^{-1}$$.\n- Step 2: $$e^{-1} \\approx 0.37$$ (or about 37%). So roughly 37% of the original nuclei remain after 10 seconds.\n- Step 3: As a check, the half-life is $$t_{1/2} = \\ln 2 / \\lambda \\approx 0.693/0.1 \\approx 6.93$$ s. After ~7 s, half remain. After ~14 s, a quarter remain. 10 s is between one and two half-lives, so 37% is consistent (between 50% and 25%).\n\n$$e^{-1} \\approx 0.37$$ is a useful number to remember. It's the fraction remaining after one \"time constant\" ($$t = 1/\\lambda$$).", "source": "GLM 5.1 ①", "_id": "glm_1_88", "judge_pick": false}, {"question": "Compare the risks of an alpha-emitting source that is (a) held in your hand vs. (b) inhaled into your lungs. Why is the risk dramatically different? (2 steps)", "answer": "- Step 1: **(a) Held in hand**: Alpha particles are stopped by the dead outer layer of skin (a few cm of air or paper equivalent). They cannot reach living tissue, so the external hazard from alpha is essentially **zero**.\n- Step 2: **(b) Inhaled into lungs**: Inside the lungs, there is no protective dead skin layer. Alpha particles directly ionise living lung tissue over their short range, depositing intense, concentrated damage. This dramatically increases lung cancer risk. Radon gas is the classic example — it's the second leading cause of lung cancer after smoking.\n\nAlpha outside = harmless. Alpha inside = devastating. The same radiation can be trivial or lethal depending on whether it reaches living tissue.", "source": "GLM 5.1 ①", "_id": "glm_1_89", "judge_pick": true}, {"question": "A nucleus undergoes gamma decay. Does it become a different element? Does it become a different isotope? Explain. (2 steps)", "answer": "- Step 1: Gamma decay changes **neither** the proton number $$Z$$ nor the nucleon number $$A$$. Since the element is defined by $$Z$$, the nucleus remains the **same element** and the **same isotope**.\n- Step 2: What changes is the **energy state** of the nucleus. The excited nucleus (denoted with an asterisk, $$X^*$$) drops to a lower energy level by emitting a gamma photon. It's the same isotope, just less energetic — like an atom de-exciting by emitting visible light, but at the nuclear scale.\n\nGamma decay = \"nuclear relaxation.\" Same element, same isotope, less energy. No transmutation occurs.", "source": "GLM 5.1 ①", "_id": "glm_1_90", "judge_pick": false}, {"question": "If you observe a nuclear equation and the total nucleon number on the right doesn't equal the total on the left, what must be wrong? Can you fix it by adding a gamma ray? (2 steps)", "answer": "- Step 1: If the nucleon numbers don't balance, the equation violates **conservation of nucleon number** (baryon number at the nuclear level). This is a fundamental conservation law — it cannot be violated.\n- Step 2: Adding a gamma ray **cannot** fix this, because gamma rays have $$A = 0$$. They contribute nothing to the nucleon number balance. The imbalance must be corrected by adjusting the daughter nucleus or the emitted particles to ensure the total $$A$$ is equal on both sides.\n\nGamma has zero mass and zero charge — it's \"invisible\" to both the top and bottom numbers. Nucleon number imbalances require adding or adjusting particles that actually carry nucleons.", "source": "GLM 5.1 ①", "_id": "glm_1_91", "judge_pick": false}, {"question": "A student says: \"Half-life is the time for all the radioactive atoms to decay.\" Correct this misconception precisely. (2 steps)", "answer": "- Step 1: Half-life is the time for **half** (not all) of the radioactive nuclei in a sample to decay. After one half-life, 50% remain; after two, 25%; after three, 12.5%, and so on.\n- Step 2: Mathematically, the number of undecayed nuclei follows $$N = N_0 e^{-\\lambda t}$$, which **never reaches zero**. Theoretically, there is always a fraction remaining (though for practical purposes, after ~10 half-lives, less than 0.1% remains and the activity is negligible). The sample never fully \"finishes\" decaying.\n\nHalf-life halves the population, not eliminates it. It's like folding a piece of paper in half repeatedly — you can always fold again (in theory), getting thinner but never reaching zero thickness.", "source": "GLM 5.1 ①", "_id": "glm_1_92", "judge_pick": true}, {"question": "You have a sample with activity 1000 Bq and half-life 5 minutes. After 20 minutes, approximately what is the activity? (2 steps)", "answer": "- Step 1: 20 minutes = 4 half-lives ($$20/5 = 4$$). After each half-life, the activity halves.\n- Step 2: After 4 half-lives: $$A = 1000 \\times (1/2)^4 = 1000/16 \\approx 62.5$$ Bq. The activity is approximately 63 Bq.\n\n$$2^4 = 16$$, so divide by 16. Quick mental math: 1000/16 = 62.5. After 4 half-lives, less than 7% of the original activity remains.", "source": "GLM 5.1 ①", "_id": "glm_1_93", "judge_pick": false}, {"question": "Why must the distance between the radioactive source and the Geiger-Muller tube be kept constant throughout the gamma absorption practical? (2 steps)", "answer": "- Step 1: The intensity of radiation decreases with distance from the source (approximately following an inverse-square law for a point source). If the distance changes between measurements, the count rate changes for a reason unrelated to the lead thickness.\n- Step 2: Keeping the distance constant ensures it is a **control variable** — the only variable affecting the count rate (besides background) is the lead thickness. This allows valid conclusions about the relationship between lead thickness and gamma absorption.\n\nChange one thing at a time. If distance varies, you're measuring the combined effect of distance and lead thickness, and you can't separate them. Control variables are essential for valid experiments.", "source": "GLM 5.1 ①", "_id": "glm_1_94", "judge_pick": true}, {"question": "What are the three generations of quarks in the Standard Model, and why do we say the first generation makes up \"ordinary matter\"? (2 steps)", "answer": "- Step 1: The three generations are: **1st** (up, down), **2nd** (charm, strange), **3rd** (top, bottom). Each quark has charge either $$+2/3e$$ or $$-1/3e$$, and each has a corresponding antiquark with opposite charge.\n- Step 2: The **first generation** (up and down) makes up ordinary matter because protons (uud) and neutrons (udd) — the building blocks of atoms — are composed exclusively of up and down quarks. Second and third generation quarks are heavier and unstable; they decay rapidly into first-generation quarks and are only produced in high-energy environments (particle accelerators, cosmic rays).\n\nStable matter = first generation only. Higher generations exist but are fleeting — they're \"excited states\" of quark matter that quickly decay back to the ground state (up/down).", "source": "GLM 5.1 ①", "_id": "glm_1_95", "judge_pick": false}, {"question": "A muon has mass approximately 200 times that of an electron. If both travel at the same speed in the same magnetic field, which has the larger orbital radius, and by roughly what factor? (2 steps)", "answer": "- Step 1: The radius is $$r = mv/(Bq)$$. Both have charge $$-1e$$ and are in the same field. The only difference is mass: $$m_\\mu \\approx 200 m_e$$.\n- Step 2: Since $$r \\propto m$$ (with $$v$$, $$B$$, $$q$$ equal), the muon's radius is approximately **200 times larger** than the electron's. The muon sweeps a much wider arc.\n\nSame charge and speed, but 200× the mass → 200× the momentum → 200× the radius. This is how particle physicists identify particles from their tracks: radius reveals mass (if charge and speed are known).", "source": "GLM 5.1 ①", "_id": "glm_1_96", "judge_pick": false}, {"question": "Explain why a banana is slightly radioactive. What element is responsible, and what type of decay does it undergo? (2 steps)", "answer": "- Step 1: Bananas contain **potassium**, including the radioactive isotope **potassium-40** ($$^{40}_{19}\\text{K}$$). Potassium is an essential nutrient, and bananas are particularly rich in it.\n- Step 2: Potassium-40 undergoes both **beta-minus decay** (89% probability, turning into calcium-40) and **electron capture / beta-plus decay** (11% probability, turning into argon-40). The radiation dose from a single banana is negligible — about 0.1 μSv, or roughly 1% of daily background exposure.\n\nBananas are radioactive, but the dose is trivial. The \"banana equivalent dose\" (BED) is sometimes used to put radiation levels in perspective — a nuclear plant's permitted leakage is about 100 BEDs per year.", "source": "GLM 5.1 ①", "_id": "glm_1_97", "judge_pick": true}, {"question": "A student claims: \"Nuclear radiation and electromagnetic radiation (like from a phone) are the same thing.\" Distinguish them. (2 steps)", "answer": "- Step 1: **Nuclear radiation** originates from the **nucleus** of unstable atoms and includes alpha particles (helium nuclei), beta particles (electrons/positrons), and gamma rays (high-energy photons). It is ionising and can damage DNA.\n- Step 2: **Electromagnetic radiation from phones** consists of **radio waves and microwaves** — low-frequency, low-energy photons that are **non-ionising**. They cannot break chemical bonds or damage DNA directly. The word \"radiation\" simply means \"something that radiates outward\" — it applies to both, but the physics and the biological effects are entirely different.\n\n\"Radiation\" is a general word meaning \"stuff that spreads out.\" Nuclear radiation is ionising and dangerous; phone radiation is non-ionising and not DNA-damaging. The shared word causes unnecessary fear.", "source": "GLM 5.1 ①", "_id": "glm_1_98", "judge_pick": false}, {"question": "In the historical development of atomic models, Thomson's plum pudding model was replaced by Rutherford's nuclear model. What key observation made this replacement necessary, and what feature of the plum pudding model did it contradict? (2 steps)", "answer": "- Step 1: The key observation was **large-angle backscattering** of alpha particles in Rutherford's gold foil experiment. Some alpha particles were deflected through angles greater than 90°, meaning they bounced back toward the source.\n- Step 2: The plum pudding model predicted that positive charge was spread uniformly throughout the atom. A diffuse positive charge could only produce small deflections — there was no concentrated mass or charge to reverse an alpha particle's direction. The observation of backscattering contradicted this, requiring a model with a **small, dense, concentrated nucleus**.\n\nThe plum pudding model predicted gentle nudges; nature delivered violent rebounds. Only a concentrated nucleus explains the data.", "source": "GLM 5.1 ①", "_id": "glm_1_99", "judge_pick": false}], "count": 100}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In nuclear notation $$^{A}_{Z}X$$, what do the letters A and Z represent, and why is it a common mistake to think A is the number of neutrons? (2 steps)", "answer": "- Step 1: A is the **nucleon number** (also called mass number) — the total count of protons + neutrons in the nucleus. Z is the **proton number** (also called atomic number) — the count of protons only.\n- Step 2: The number of neutrons must be *calculated* as $$A - Z$$, not read directly from the notation. The confusion arises because A sits on top and students assume it must correspond to \"the other particle\" (neutrons), but A is a *sum*, not a neutron count.\n\nKey takeaway: You always derive neutrons; the notation never states them directly.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Two atoms have the same Z but different A. What is the relationship between these atoms, and what physical property is necessarily different about their nuclei? (2 steps)", "answer": "- Step 1: They are **isotopes** — atoms of the *same element* (same number of protons, same Z) but with a *different number of neutrons*, hence different A.\n- Step 2: The necessarily different physical property is the **mass of the nucleus**. Because protons are identical across isotopes and the electron configuration is the same (same Z → same chemistry), the only thing that changes is the neutron count, which directly changes nuclear mass.\n\n+ For example, hydrogen-1 (0 neutrons), deuterium (1 neutron), tritium (2 neutrons) — all Z = 1, but A = 1, 2, 3 respectively.\n\nKey takeaway: Isotopes share chemistry but differ in nuclear mass and nuclear stability.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "In Rutherford's gold foil experiment, most alpha particles passed straight through. But a tiny fraction bounced back at angles > 90°. What two conclusions about atomic structure did this specific observation support? (3 steps)", "answer": "- Step 1: The fact that *most* alpha particles went straight through tells us the atom is **mostly empty space** — the vast majority of the atom's volume contains nothing solid.\n- Step 2: The fact that a *tiny fraction* were deflected at large angles (> 90°, even straight back) tells us there is a **tiny, dense, positively charged centre** — the nucleus. Only a concentrated positive charge could repel a positive alpha particle hard enough to reverse its direction.\n- Step 3: Because so *few* particles were deflected this way, the nucleus must be **extremely small** compared to the size of the atom — roughly 1/100,000th the atom's diameter.\n\n+ Misconception probe: Some students think the large-angle deflections come from hitting electrons. This is wrong — electrons are ~8000× lighter than alpha particles and cannot cause significant deflection. Only a massive, positive nucleus can do this.\n\nKey takeaway: The nuclear model — tiny dense positive nucleus, mostly empty space, electrons orbiting — was born from the *pattern* of deflections, not just one observation.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Before Rutherford, the \"plum pudding\" model was accepted. In that model, what was the distribution of positive charge, and what specific experimental result from Rutherford's experiment directly contradicted it? (2 steps)", "answer": "- Step 1: In Thomson's plum pudding model, positive charge was **spread uniformly throughout the entire atom** like a sphere, with electrons embedded like currants in a pudding. The positive charge was diffuse, not concentrated.\n- Step 2: The direct contradiction: the plum pudding model predicted that alpha particles should pass through with **only small deflections** at most (the diffuse positive charge couldn't create a strong repulsive force). Rutherford observed **large-angle deflections and backscattering**, which is impossible if positive charge is spread out — you need a concentrated nucleus to produce such strong repulsion.\n\nKey takeaway: Backscattering of even a single alpha particle was enough to falsify the plum pudding model entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "In the Rutherford scattering experiment, which graph best represents the number of alpha particles detected (n) vs. deflection angle (θ) from 0° to 90°, and why? (2 steps)", "answer": "- Step 1: The correct graph shows **n very large at small angles (θ ≈ 0°) and dropping rapidly to near-zero at large angles**. Most alpha particles barely deflect because they pass through empty space far from the nucleus.\n- Step 2: Only a tiny fraction pass close enough to the nucleus to experience strong Coulomb repulsion, so large-angle counts are extremely small. This gives an exponentially decaying curve — Graph A (as referenced in the SME material).\n\n+ Counter-example: A flat graph would imply equal probability of all deflection angles — this would mean charge is uniformly distributed (plum pudding). An upward-sloping graph would imply more particles deflect at large angles, which contradicts the empty-space conclusion.\n\nKey takeaway: The shape of the n-vs-θ graph is direct experimental evidence for a concentrated nuclear charge.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What is thermionic emission, and how does it differ fundamentally from the photoelectric effect in terms of the energy source that liberates electrons? (2 steps)", "answer": "- Step 1: **Thermionic emission** is the process where conduction electrons in a metal gain enough **thermal energy** (from heating) to escape the metal's surface. The energy source is heat.\n- Step 2: In the **photoelectric effect**, electrons escape because they absorb energy from **incident photons** (electromagnetic radiation). The energy source is light, not heat.\n+ Both produce free electrons that can then be accelerated by electric or magnetic fields, but the *mechanism* of liberation is different: thermal vibration vs. photon absorption.\n\nKey takeaway: Same outcome (free electrons), different trigger — heat vs. photons.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "An electron is accelerated from rest through a potential difference V. Derive the expression for the final speed of the electron in terms of V, its charge e, and its mass $$m_e$$. (3 steps)", "answer": "- Step 1: The kinetic energy gained by the electron equals the work done by the electric field: $$KE = eV$$, so $$\\frac{1}{2}m_e v^2 = eV$$.\n- Step 2: Rearrange for $$v^2$$: $$v^2 = \\frac{2eV}{m_e}$$.\n- Step 3: Take the square root: $$v = \\sqrt{\\frac{2eV}{m_e}}$$. This shows speed increases with the square root of the accelerating voltage — doubling V does not double the speed.\n\n+ Quick check: For V = 5.0 kV, e = 1.6 × 10⁻¹⁹ C, $$m_e$$ = 9.11 × 10⁻³¹ kg, v ≈ 4.2 × 10⁷ m/s — about 14% the speed of light, fast but not yet relativistic.\n\nKey takeaway: $$v = \\sqrt{2eV/m_e}$$ is the bridge between electrical potential and particle speed.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "In a linear accelerator (LINAC), each successive tube is longer than the previous one. Why must the tubes increase in length, given that the AC frequency is fixed? (3 steps)", "answer": "- Step 1: The AC power supply switches polarity at a **fixed frequency**, meaning the time window for acceleration across each gap is the same for every tube.\n- Step 2: As the particle accelerates, it travels **faster** through each tube. If the tubes were all the same length, the particle would traverse them in less and less time and would arrive at the gap when the field has the wrong polarity — it would be *decelerated*.\n- Step 3: Making each tube progressively longer ensures the particle spends the **same amount of time** in each tube, so it always arrives at the gap when the electric field is in the correct direction to accelerate it.\n\n+ Edge case: If the frequency were not fixed but could be increased to match the particle's speed, equal-length tubes could theoretically work — but this is impractical for high energies.\n\nKey takeaway: Longer tubes compensate for faster particles so that timing stays synchronised with a fixed-frequency AC supply.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A cyclotron uses both electric and magnetic fields, while a LINAC uses only electric fields. What specific role does each field play in a cyclotron, and why can't a cyclotron work with only one type of field? (3 steps)", "answer": "- Step 1: The **electric field** (in the gap between the dees) accelerates the particle — it gives the particle a \"kick\" of kinetic energy each time it crosses the gap.\n- Step 2: The **magnetic field** (perpendicular to the dees) bends the particle into a **circular path** inside each dee. Without it, the particle would fly in a straight line and exit the cyclotron after one gap crossing.\n- Step 3: Without the electric field, the particle would move in circles forever at constant speed (never gaining energy). Without the magnetic field, the particle couldn't be confined and steered back for repeated accelerations. Both are essential: one steers, one speeds up.\n\n+ The AC potential reverses each half-cycle so the gap always accelerates the particle (not decelerates it), regardless of direction of crossing.\n\nKey takeaway: Magnetic field = steering (circular motion); Electric field = speeding up (energy gain). Together they produce an outward spiral of increasing speed.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "In a cyclotron, why does the radius of the particle's path increase with each revolution, even though the magnetic field strength B is constant? (2 steps)", "answer": "- Step 1: Each time the particle crosses the gap between the dees, the electric field gives it additional kinetic energy, so its **speed v increases**.\n- Step 2: The radius of circular motion in a magnetic field is $$r = \\frac{mv}{BQ}$$. Since m, B, and Q are constant but v increases, r must increase — the particle spirals outward to larger radii.\n\n+ The particle doesn't spiral because B is changing; it spirals because v is changing. If B were also increased in proportion to v, the radius could stay constant — this is the principle behind a *synchrotron*, not a cyclotron.\n\nKey takeaway: Constant B + increasing v → increasing r → outward spiral.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Derive the equation for the radius of a charged particle moving perpendicularly in a uniform magnetic field, starting from the forces involved. (3 steps)", "answer": "- Step 1: A charged particle moving perpendicular to a magnetic field experiences a magnetic (Lorentz) force: $$F = BQv$$, directed perpendicular to velocity (towards the centre of the circular path).\n- Step 2: This magnetic force provides the centripetal force for circular motion: $$F = \\frac{mv^2}{r}$$. Equate the two: $$BQv = \\frac{mv^2}{r}$$.\n- Step 3: Rearrange for r: $$r = \\frac{mv}{BQ} = \\frac{p}{BQ}$$, where p = mv is the momentum. This shows r is proportional to momentum and inversely proportional to B and Q.\n\n+ Quick directional check: double the momentum → double the radius. Double the charge → half the radius. Double B → half the radius.\n\nKey takeaway: $$r = \\frac{p}{BQ}$$ links orbital radius directly to momentum, charge, and field strength.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A proton and an electron move at the same speed in the same magnetic field. Which has the larger orbital radius, and why? (2 steps)", "answer": "- Step 1: The radius equation is $$r = \\frac{mv}{BQ}$$. Both particles have the same magnitude of charge (|Q| = e) and the same speed v in the same field B.\n- Step 2: The proton has a mass ~1836× larger than the electron. Since r ∝ m (with v, B, Q constant in magnitude), the **proton's radius is about 1836 times larger**.\n\n+ Note: They curve in *opposite directions* because their charges have opposite signs, but the *magnitude* of the radius is what differs by the mass ratio.\n\nKey takeaway: Same speed, same |Q|, same B → radius is purely determined by mass. Heavier = wider orbit.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "In a bubble chamber photograph, a charged particle's track spirals inward (decreasing radius). What does this tell you about the particle's momentum, and what physical process causes this change? (2 steps)", "answer": "- Step 1: Since $$r = \\frac{p}{BQ}$$ and B, Q are constant, a **decreasing radius means decreasing momentum** p. The particle is slowing down.\n- Step 2: The physical cause is **ionisation** — as the charged particle passes through the detector medium, it ionises atoms along its path, transferring energy to them. This energy loss reduces the particle's kinetic energy and hence its momentum.\n\n+ Misconception probe: You might think the magnetic field is doing work on the particle and slowing it. Wrong — magnetic force is always perpendicular to velocity, so it does *no work*. The energy loss is entirely due to interactions with the medium.\n\nKey takeaway: Spiralling inward = losing energy to ionisation = slowing down. The radius is a live readout of the particle's momentum.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "In a cloud chamber, two tracks suddenly appear from a single point, curving in opposite directions with the same radius. What does this observation indicate, and what conservation law explains why the tracks curve in opposite directions? (3 steps)", "answer": "- Step 1: Tracks appearing from \"nothing\" indicate **pair production** — a neutral (uncharged) particle or photon has converted its energy into a **particle–antiparticle pair**.\n- Step 2: The **same radius** means the two particles have the same momentum (and therefore the same mass), confirming they are a matter–antimatter pair.\n- Step 3: The **opposite curvature** means they have **opposite charges** — the particle is negative and the antiparticle is positive (or vice versa). In a magnetic field, opposite charges experience forces in opposite directions, so they curve in opposite directions.\n\n+ Fleming's Left Hand Rule: point first finger along B, thumb toward centre of curvature (centripetal force). The second finger gives the direction a *positive* charge would move. If actual motion is opposite, the particle is negatively charged.\n\nKey takeaway: Same radius + opposite curvature = particle–antiparticle pair creation.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "To resolve the internal structure of a nucleon (e.g., a proton), why must the de Broglie wavelength of the probing electron be comparable to the size of the nucleon (~10⁻¹⁵ m), and what does this requirement imply about the electron's energy? (3 steps)", "answer": "- Step 1: The de Broglie wavelength sets the **resolution limit** — you cannot resolve detail smaller than approximately one wavelength. Just as optical microscopes can't resolve objects much smaller than the wavelength of visible light, electron probes can't resolve structure much smaller than their de Broglie wavelength.\n- Step 2: Since $$\\lambda = \\frac{h}{mv} = \\frac{h}{p}$$, a small wavelength requires **large momentum** (and therefore large velocity and energy).\n- Step 3: To achieve $$\\lambda \\approx 10^{-15}$$ m, the electron must be accelerated to **very high energies** — this is why particle accelerators are needed. The faster the electron, the finer the detail it can resolve.\n\n+ Why use electrons instead of alpha particles? Electrons don't experience the strong nuclear force, so they can approach nucleons without being deflected by it, giving cleaner scattering data.\n\nKey takeaway: Small wavelength ↔ high momentum ↔ high energy. Resolution is fundamentally limited by the probe's wavelength.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "When an electron and a positron annihilate, two gamma-ray photons are produced (not one). Why must there be *two* photons rather than one, in terms of conservation laws? (2 steps)", "answer": "- Step 1: A single photon has non-zero momentum (p = E/c). If only one photon were produced, **momentum could not be conserved** — before annihilation, the electron–positron pair (in the centre-of-mass frame) has zero total momentum, but a single photon would carry momentum away.\n- Step 2: Two photons emitted in **opposite directions** have equal and opposite momenta, so the total momentum of the photon pair can be zero, matching the initial total momentum. Both energy and momentum are conserved.\n\n+ Misconception: \"One photon should be enough because E = 2mc² can be carried by one photon.\" True for energy, but not for momentum. Both energy AND momentum must be conserved simultaneously.\n\nKey takeaway: Two photons, not one, because a single photon can't conserve both energy and momentum when the initial total momentum is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "What is the minimum photon energy required for pair production of an electron–positron pair, and why is it *twice* the rest-mass energy of a single electron? (3 steps)", "answer": "- Step 1: Pair production creates *both* a particle and its antiparticle. Each has rest-mass energy $$mc^2$$. For an electron (and positron), each has mass $$m_e = 9.11 \\times 10^{-31}$$ kg.\n- Step 2: The total rest-mass energy that must be supplied is $$mc^2 + mc^2 = 2mc^2$$. The photon's energy must provide the mass for *both* particles.\n- Step 3: Therefore, the minimum photon energy is $$E_{min} = 2m_e c^2 \\approx 1.022$$ MeV. Any excess energy above this threshold becomes kinetic energy of the produced pair.\n\n+ If the photon energy is *less* than $$2mc^2$$, pair production cannot happen — there isn't enough energy to create both masses. This is a hard threshold, not a probability.\n\nKey takeaway: Pair production needs $$E_{photon} \\geq 2mc^2$$ because you're creating *two* massive particles, not one.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why must a nearby nucleus be present for pair production to occur? What would violate if a single
