photon produced a particle–antiparticle pair in empty space? (2 steps)", "answer": "- Step 1: In the centre-of-mass frame of the produced pair, the total momentum is zero (they can be produced back-to-back with equal and opposite momenta). But a single photon always has momentum $$p = E/c$$. A photon cannot have zero momentum.\n- Step 2: Therefore, in empty space, **momentum cannot be conserved** — the photon carries momentum, but the pair can have zero total momentum in their rest frame. A nearby nucleus absorbs the \"excess\" momentum, allowing both energy and momentum to be conserved simultaneously.\n\n+ The nucleus is so massive compared to the electron–positron pair that it absorbs momentum with negligible kinetic energy change — it acts as a \"momentum sink.\"\n\nKey takeaway: The nucleus is the third body that makes momentum conservation possible in pair production.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Convert 1 atomic mass unit (u) into MeV/c². Given: 1 u ≈ 1.661 × 10⁻²⁷ kg, c = 3 × 10⁸ m/s. Walk through the logic conceptually without doing heavy arithmetic. (3 steps)", "answer": "- Step 1: Use Einstein's mass-energy relation: $$E = mc^2$$. Substitute m = 1 u and c = 3 × 10⁸ m/s. This gives energy in joules: $$E = (1.661 \\times 10^{-27}) \\times (9 \\times 10^{16}) \\approx 1.495 \\times 10^{-10}$$ J.\n- Step 2: Convert joules to eV by dividing by 1.6 × 10⁻¹⁹ J/eV: $$\\frac{1.495 \\times 10^{-10}}{1.6 \\times 10^{-19}} \\approx 9.35 \\times 10^{8}$$ eV ≈ 931.5 MeV.\n- Step 3: This energy corresponds to a mass expressed as $$931.5 \\text{ MeV}/c^2$$. So 1 u ≈ 931.5 MeV/c². The c² in the denominator is a *unit of mass*, not something you calculate further — it's the convention for expressing mass in energy-equivalent terms.\n\n+ Quick rule of thumb: 1 u ≈ 931.5 MeV/c², and 1 GeV/c² ≈ 1.78 × 10⁻²⁷ kg (close to a proton mass).\n\nKey takeaway: MeV/c² is a unit of mass. The conversion 1 u ≈ 931.5 MeV/c² is one of the most-used numbers in nuclear physics.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A proton has a rest mass of ~1.67 × 10⁻²⁷ kg. Roughly what is this in GeV/c²? Walk through the estimation logic without heavy arithmetic. (3 steps)", "answer": "- Step 1: From the conversion table, 1 GeV/c² = 1.78 × 10⁻²⁷ kg. This means each GeV/c² of mass corresponds to roughly 1.78 × 10⁻²⁷ kg.\n- Step 2: Divide the proton mass by this conversion: $$\\frac{1.67 \\times 10^{-27}}{1.78 \\times 10^{-27}} \\approx 0.94$$. The ratio is close to 1.\n- Step 3: So the proton mass is approximately **0.94 GeV/c²**, often rounded to **~1 GeV/c²** in order-of-magnitude estimates.\n\n+ Alternatively, using E = mc² directly: E = (1.67 × 10⁻²⁷)(9 × 10¹⁶) ≈ 1.5 × 10⁻¹⁰ J ≈ 0.94 GeV. Same result, different route.\n\nKey takeaway: A proton is roughly 1 GeV/c² — a useful benchmark for estimating nuclear mass-energy scales.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Muons created in the upper atmosphere have a lifetime of ~2.2 μs and travel at ~0.99c. Without relativistic effects, they'd only travel ~660 m — far less than the ~10 km to sea level. Explain how time dilation allows them to reach the ground. (3 steps)", "answer": "- Step 1: In the muon's *rest frame*, its lifetime is 2.2 μs. At 0.99c, the classical distance is d = vt ≈ (0.99)(3 × 10⁸)(2.2 × 10⁻⁶) ≈ 653 m — nowhere near 10 km.\n- Step 2: From the **Earth (laboratory) frame**, the muon is moving at 0.99c, so time dilation applies: the muon's lifetime is *stretched* by the factor $$\\gamma = \\frac{1}{\\sqrt{1 - v^2/c^2}}$$. At 0.99c, γ ≈ 7. So the muon lives ~7 × 2.2 μs ≈ 15.4 μs in our frame.\n- Step 3: In 15.4 μs at 0.99c, the muon travels ~4.6 km — much farther. From the muon's frame, length contraction means the atmosphere is *shorter* than 10 km, so it traverses it in less time. Both perspectives agree: muons reach the ground.\n\n+ Misconception: \"The muon's lifetime *increases*.\" Careful — the proper lifetime stays 2.2 μs. It's the *observed* lifetime that increases due to time dilation.\n\nKey takeaway: Without relativistic time dilation (and length contraction from the muon's frame), we couldn't detect muons at sea level. Their detection is direct experimental evidence for special relativity.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "What are the three categories of particles in the Standard Model, and what distinguishes a hadron from a lepton at the most fundamental level? (2 steps)", "answer": "- Step 1: The three categories are **quarks**, **leptons**, and **bosons** (exchange particles/force carriers). Quarks and leptons are fermions (matter particles); bosons mediate forces.\n- Step 2: A **hadron** is made of quarks and interacts via the **strong nuclear force**. A **lepton** is a fundamental (indivisible) particle that does *not* interact via the strong force. The key distinction: hadrons have internal quark structure; leptons do not.\n\n+ Hadrons split further: baryons (3 quarks, e.g. proton uud) and mesons (quark–antiquark pair, e.g. pion). Leptons include electrons, muons, and their neutrinos.\n\nKey takeaway: Hadrons = quark composites + strong force. Leptons = fundamental + no strong force.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A baryon consists of 3 quarks. A meson consists of a quark–antiquark pair. Why can't a baryon contain a mixture of quarks and antiquarks (e.g., u, d̄, d)? (2 steps)", "answer": "- Step 1: Each quark has baryon number B = +1/3, and each antiquark has baryon number B = −1/3. A combination like u, d̄, d would give total B = 1/3 + (−1/3) + 1/3 = 1/3, which is **not an integer**.\n- Step 2: Baryon number must be a **whole number** (integer) for any observable particle. A baryon must have B = +1 (three quarks) or B = −1 (three antiquarks, an anti-baryon). A mixed quark–antiquark triplet would produce a fractional baryon number, which is not physically allowed for a free particle.\n\n+ A u-d̄-d combination would actually be classified as a meson-like state, not a baryon. Nature forbids fractional-baryon-number free particles.\n\nKey takeaway: 3 quarks (B = +1) or 3 antiquarks (B = −1) only — no mixing, because baryon number must be an integer.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "A proton is uud and a neutron is udd. Verify the charge of each by summing quark charges, given that u = +2/3 e and d = −1/3 e. (2 steps)", "answer": "- Step 1: Proton (uud): $$+\\frac{2}{3} + \\frac{2}{3} + \\left(-\\frac{1}{3}\\right) = +\\frac{3}{3} = +1e$$. ✓\n- Step 2: Neutron (udd): $$+\\frac{2}{3} + \\left(-\\frac{1}{3}\\right) + \\left(-\\frac{1}{3}\\right) = +\\frac{2}{3} - \\frac{2}{3} = 0$$. ✓\n\n+ Quick check: the Δ⁺⁺ baryon (uuu) has charge = 2/3 + 2/3 + 2/3 = +2e. This is how the worked example in the textbook identifies the answer.\n\nKey takeaway: Quark charge addition is straightforward arithmetic — just sum the fractions and confirm the result matches the known particle charge.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "What are the charges of the up, down, strange, charm, top, and bottom quarks in units of e? Group them by generation. (2 steps)", "answer": "- Step 1: The six quark flavours in three generations:\n+ Generation 1: up (u) = +2/3 e, down (d) = −1/3 e\n+ Generation 2: charm (c) = +2/3 e, strange (s) = −1/3 e\n+ Generation 3: top (t) = +2/3 e, bottom (b) = −1/3 e\n- Step 2: Pattern: in every generation, the \"upper\" quark has charge +2/3 e and the \"lower\" quark has charge −1/3 e. The corresponding antiquarks have the opposite charges: ū = −2/3, d̄ = +1/3, etc.\n\nKey takeaway: The charge pattern +2/3, −1/3 repeats across all three generations. This symmetry of the Standard Model predicted the existence of charm, top, and bottom quarks before they were discovered.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A neutrino has zero charge and nearly zero mass. How can we experimentally verify that neutrinos exist at all, given they barely interact with matter? (2 steps)", "answer": "- Step 1: Neutrinos interact only via the **weak nuclear force** (and gravity, negligibly). This means they can pass through entire planets without interacting — they are nearly impossible to detect directly.\n- Step 2: They are detected indirectly through **missing energy and momentum** in beta decay. When a neutron decays into a proton and electron, the electron doesn't carry all the expected energy. The \"missing\" energy and momentum must be carried away by an unseen particle — the (anti)neutrino. Massive underground detectors (using huge volumes of water or other media) occasionally catch the rare neutrino interactions that do occur.\n\n+ Historically, this \"missing energy\" problem in beta decay led Pauli to propose the neutrino in 1930, and it was experimentally confirmed by Cowan and Reines in 1956.\n\nKey takeaway: Neutrinos are inferred from conservation laws (missing energy/momentum) and confirmed by extremely rare direct detection events.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Every matter particle has an antimatter counterpart. State two properties that are the *same* and one property that is *different* between a particle and its antiparticle. (2 steps)", "answer": "- Step 1: **Same**: mass and rest-mass energy. A positron has exactly the same mass as an electron; an antiproton has exactly the same mass as a proton.\n- Step 2: **Different**: electric charge (and all other quantum numbers like baryon number, lepton number). A positron has charge +1e (vs. −1e for the electron); an antiproton has charge −1e (vs. +1e for the proton).\n\n+ Special case: the photon is its own antiparticle (charge = 0, all quantum numbers = 0). Same for neutral pion (π⁰).\n\nKey takeaway: Same mass, opposite charge (and opposite all other quantum numbers).", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "In beta-minus decay, a student writes: $$^{14}_{6}C \\rightarrow ^{14}_{7}N + ^{0}_{-1}\\beta$$ with no neutrino. What conservation law is violated, and what particle must be added to fix it? (3 steps)", "answer": "- Step 1: Check **lepton number**. Before decay: no leptons → total L = 0. After decay: the beta particle (electron) has L = +1. So total L = +1 on the right side. Lepton number is **not conserved**.\n- Step 2: Check **energy/momentum**. The electron in beta decay doesn't carry a fixed energy — it has a *continuous spectrum*. If no other particle carries away the remaining energy, energy conservation appears violated.\n- Step 3: Adding an **electron antineutrino** ($$\\bar{\\nu}_e$$, with L = −1) fixes both: total lepton number becomes 0 (conserved), and the antineutrino carries away the variable \"missing\" energy and momentum.\n\n+ The correct equation: $$^{14}_{6}C \\rightarrow ^{14}_{7}N + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$.\n\nKey takeaway: Forgetting the neutrino/antineutrino in beta decay is the #1 exam trap. It's required for lepton number conservation and explains the continuous beta energy spectrum.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "In beta-plus decay, the emitted particle is a positron ($$^0_{+1}\\beta^+$$). What particle must also be emitted to conserve lepton number, and what is its lepton number? (2 steps)", "answer": "- Step 1: The positron is an antilepton with lepton number L = −1. Before decay, total L = 0. After emitting the positron, the total L = −1 on the right side.\n- Step 2: To conserve lepton number (L = 0 total), an **electron neutrino** ($$\\nu_e$$) with L = +1 must also be emitted. The complete equation: $$^{A}_{Z}X \\rightarrow ^{A}_{Z-1}Y + ^{0}_{+1}\\beta^+ + \\nu_e$$.\n\n+ Pattern: β⁻ decay → emits antineutrino ($$\\bar{\\nu}_e$$, L = −1). β⁺ decay → emits neutrino ($$\\nu_e$$, L = +1). The lepton number of the emitted neutrino type always *cancels* the lepton number of the emitted beta particle.\n\nKey takeaway: β⁻ → antineutrino. β⁺ → neutrino. Always. This ensures lepton number conservation.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "State the three quantum numbers that are *always* conserved in particle interactions, and give their values for a proton, a neutron, and an electron. (3 steps)", "answer": "- Step 1: The three always-conserved quantum numbers are **charge Q**, **baryon number B**, and **lepton number L**.\n- Step 2: Values for each particle:\n+ Proton: Q = +1, B = +1, L = 0\n+ Neutron: Q = 0, B = +1, L = 0\n+ Electron: Q = −1, B = 0, L = +1\n- Step 3: Note the pattern: baryons have B = +1 (or −1 for antibaryons), leptons have L = +1 (or −1 for antileptons), and particles that are neither have B = 0, L = 0.\n\n+ Misconception: students often think the electron has L = −1 because its charge is negative. Wrong — the electron is a lepton with L = +1. The positron (positive charge) has L = −1 because it's an *anti*-lepton.\n\nKey takeaway: Charge, baryon number, lepton number — always conserved. Memorise Q, B, L for protons, neutrons, and electrons as your baseline.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "A reaction is proposed: $$p + p \\rightarrow p + p + \\pi^+ + \\bar{p}$$. Determine whether this reaction is permitted by checking conservation of charge and baryon number. (3 steps)", "answer": "- Step 1: Check **charge Q**. Left side: 1 + 1 = +2. Right side: 1 + 1 + 1 + (−1) = +2. Charge is conserved. ✓\n- Step 2: Check **baryon number B**. Left side: protons are baryons, so 1 + 1 = +2. Right side: two protons (B = 1 each) + one pion (B = 0, it's a meson) + one antiproton (B = −1). Total = 1 + 1 + 0 + (−1) = +1. Baryon number is **not conserved**. ✗\n- Step 3: Since baryon number is not conserved, **this reaction is not permitted**, even though charge is conserved. All three conservation laws must hold simultaneously.\n\n+ The reaction would need an additional baryon on the right side (or one fewer on the left) to balance B.\n\nKey takeaway: One conservation law failing is enough to forbid the reaction — all must be satisfied.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "Using the quark model, show that charge is conserved in beta-minus decay: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. (3 steps)", "answer": "- Step 1: Write the quark compositions. Neutron = udd, proton = uud. The beta-minus decay at the quark level involves one d quark converting to a u quark: d → u + e⁻ + $$\\bar{\\nu}_e$$.\n- Step 2: Calculate charge on each side. Left (neutron udd): $$+\\frac{2}{3} + (-\\frac{1}{3}) + (-\\frac{1}{3}) = 0$$. Right (proton uud + e⁻ + $$\\bar{\\nu}_e$$): $$[\\frac{2}{3} + \\frac{2}{3} + (-\\frac{1}{3})] + (-1) + 0 = +1 + (-1) + 0 = 0$$.\n- Step 3: Both sides have total charge = 0. Charge is conserved. ✓\n\n+ The key quark-level event: a down quark (charge −1/3) turns into an up quark (charge +2/3), and the charge difference of +1 is balanced by the electron (charge −1). This is mediated by the weak force (W⁻ boson).\n\nKey takeaway: Beta decay is fundamentally a quark flavour change: d → u, with the charge difference carried away by the electron.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "An alpha particle has the same composition as a helium-4 nucleus. Write its nuclear notation, and explain what each number represents physically. (2 steps)", "answer": "- Step 1: An alpha particle is written as $$^{4}_{2}\\alpha$$ (or equivalently $$^{4}_{2}He$$).\n- Step 2: The top number 4 = nucleon number = total protons + neutrons (2 + 2 = 4). The bottom number 2 = proton number = number of protons (which is also the charge in units of +e, since it has 2 protons and 0 electrons).\n\n+ Alpha particles are *not* helium atoms — they have no electrons. They are bare helium nuclei. If they pick up two electrons from the environment, they become neutral helium atoms.\n\nKey takeaway: $$^{4}_{2}\\alpha$$ = 2 protons + 2 neutrons, charge +2e, mass 4u.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A beta-minus particle is written as $$^{0}_{-1}\\beta^-$$. The top number is 0 and the bottom is −1. What does each number mean, and why is the bottom number −1 rather than +1? (2 steps)", "answer": "- Step 1: The top number (0) is the **nucleon/mass number** — the electron has negligible mass compared to a nucleon, so its mass is effectively 0 in nuclear notation.\n- Step 2: The bottom number (−1) represents the **charge** in units of e. The beta-minus particle is an electron with charge −1e. In nuclear equations, the bottom number tracks charge, so −1 correctly accounts for the electron's negative charge.\n\n+ This is not saying \"there are minus one protons\" — it's a bookkeeping convention for charge balance in the equation.\n\nKey takeaway: The −1 in $$^{0}_{-1}\\beta$$ is the charge, not a negative count of protons.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "In gamma decay, the notation is $$^{0}_{0}\\gamma$$. Both numbers are zero. What does this tell you about gamma rays, and why does gamma emission not change the identity of the nucleus? (2 steps)", "answer": "- Step 1: Both numbers being zero means gamma rays carry **zero mass and zero charge** — they are pure electromagnetic energy (photons), not matter particles.\n- Step 2: Since gamma emission changes neither the nucleon number A nor the proton number Z of the nucleus, the element's identity is **unchanged**. The nucleus simply transitions from a higher-energy excited state to a lower-energy state, releasing the excess energy as a photon.\n\n+ The excited nucleus is often written with an asterisk: $$^{A}_{Z}X^* \\rightarrow ^{A}_{Z}X + \\gamma$$. The asterisk denotes an excited state.\n\nKey takeaway: Gamma decay = nucleus loses energy, not particles. A and Z stay the same; the element doesn't change.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Uranium-238 undergoes alpha decay. Write the balanced nuclear equation, and explain how each number on the daughter nucleus is determined. (3 steps)", "answer": "- Step 1: Start with the parent: $$^{238}_{92}U$$. Alpha particle: $$^{4}_{2}\\alpha$$. The general form: $$^{238}_{92}U \\rightarrow ^{?}_{?}Y + ^{4}_{2}\\alpha$$.\n- Step 2: Conserve nucleon number (top): $$238 = ? + 4$$, so the daughter has A = 234.\n- Step 3: Conserve proton number (bottom): $$92 = ? + 2$$, so the daughter has Z = 90. The daughter is thorium-234: $$^{234}_{90}Th$$.\n\n+ Full equation: $$^{238}_{92}U \\rightarrow ^{234}_{90}Th + ^{4}_{2}\\alpha$$. Thorium-234 is itself unstable and will undergo further decay.\n\nKey takeaway: Alpha decay: A decreases by 4, Z decreases by 2. The daughter is a different element (2 places left on the periodic table).", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Carbon-14 undergoes beta-minus decay. Write the balanced nuclear equation including the antineutrino, and explain why Z increases by 1. (3 steps)", "answer": "- Step 1: Start with carbon-14: $$^{14}_{6}C$$. Beta-minus: $$^{0}_{-1}\\beta^-$$. Antineutrino: $$\\bar{\\nu}_e$$. General form: $$^{14}_{6}C \\rightarrow ^{?}_{?}N + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$.\n- Step 2: Conserve nucleon number: $$14 = ? + 0 + 0$$, so A = 14 (unchanged).\n- Step 3: Conserve charge: $$6 = ? + (-1) + 0$$, so Z = 7. The daughter is nitrogen-14: $$^{14}_{7}N$$.\n\n+ Z increases by 1 because a neutron in the nucleus has converted to a proton: n → p + e⁻ + $$\\bar{\\nu}_e$$. The new proton raises Z by 1, while the emitted electron and antineutrino carry away charge and lepton number.\n\nKey takeaway: β⁻ decay: A unchanged, Z increases by 1. The nucleus gains a proton; the element changes to the next one on the periodic table.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A nucleus undergoes beta-plus decay. Write the general equation including the neutrino, and explain why Z *decreases* by 1, unlike beta-minus decay where Z increases. (3 steps)", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow ^{A}_{Z-1}Y + ^{0}_{+1}\\beta^+ + \\nu_e$$.\n- Step 2: Conserve nucleon number: A = A + 0 + 0. ✓ Conserve charge: Z = (Z − 1) + 1 + 0. ✓\n- Step 3: Z decreases by 1 because a **proton converts to a neutron**: p → n + e⁺ + $$\\nu_e$$. The nucleus *loses* a proton, so the atomic number drops by 1. The emitted positron carries away the +1 charge difference.\n\n+ This is the opposite of beta-minus: in β⁻, n → p (Z goes up). In β⁺, p → n (Z goes down). The classic exam trap is confusing which direction Z moves.\n\nKey takeaway: β⁻ → Z increases by 1. β⁺ → Z decreases by 1. The direction depends on whether a neutron becomes a proton or vice versa.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "In the uranium-238 decay chain, uranium decays by alpha to thorium-234, then thorium-234 decays by beta-minus to protactinium-234, then protactinium-234 decays by beta-minus back to uranium-234. Why is this uranium-234 different from the original uranium-238? (2 steps)", "answer": "- Step 1: Both have Z = 92 (same number of protons, same element), but different A values: uranium-238 has A = 238, while uranium-234 has A = 234.\n- Step 2: These are **different isotopes** of uranium. Uranium-234 has 4 fewer neutrons than uranium-238 (234 − 92 = 142 neutrons vs. 238 − 92 = 146 neutrons). Same element, different nuclear mass and stability properties.\n\n+ This is why decay chains can revisit the same element at a different isotope — the alpha decay removed 4 nucleons (2p + 2n), and then two beta-minus decays converted 2 neutrons to 2 protons, restoring Z = 92 but leaving A reduced by 4.\n\nKey takeaway: A decay chain can cycle through the same element at different isotopes. Alpha changes A and Z; beta changes Z back but not A.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "In the uranium-238 decay chain, the final stable product is lead-206. What does \"stable\" mean in this context, and how can you tell from the notation that lead-206 is not uranium? (2 steps)", "answer": "- Step 1: \"Stable\" means the nucleus **does not undergo any further radioactive decay** — it has reached a nuclear configuration where it is energetically favourable to remain as it is, with no tendency to emit alpha, beta, or gamma radiation.\n- Step 2: Lead-206 has Z = 82, while uranium has Z = 92. Different Z means different element. The chain has progressively reduced Z (through alpha decays) and shifted it (through beta decays) until it reached the stable configuration of lead.\n\n+ Lead-206 is one of several stable lead isotopes. Not all lead isotopes are stable (e.g., lead-210 is radioactive), but lead-206 is.\n\nKey takeaway: \"Stable\" = no more decay. The decay chain ends when the nucleus reaches a stable isotope.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "What is background radiation, and why must it be subtracted from any measured count rate before analysis? Give one natural and one man-made source. (3 steps)", "answer": "- Step 1: Background radiation is the **low-level radiation always present in the environment** from natural and artificial sources. A Geiger counter always registers some counts even with no radioactive source nearby.\n- Step 2: It must be subtracted because it is **not caused by the source being studied**. If you don't subtract it, you'll overestimate the source's activity, and calculations like half-life or absorption will be inaccurate. The corrected count rate = measured count rate − background count rate.\n- Step 3: One natural source: **radon gas** from rocks/soil (alpha emitter) or **cosmic rays** from space. One man-made source: **medical X-rays** or **nuclear fallout** from weapons testing.\n\n+ In experiments, you measure background with no source present (e.g., over 5 minutes), calculate the average background count rate, then subtract it from all subsequent readings.\n\nKey takeaway: Always measure and subtract background radiation. Without this correction, all your data is systematically too high.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation in order of: (a) ionising power (highest first), and (b) penetrating power (highest first). Explain the inverse relationship between these two properties. (3 steps)", "answer": "- Step 1: Ionising power (highest first): **alpha > beta > gamma**. Alpha is large, heavy, and +2 charge — it rips electrons off atoms very effectively. Beta is smaller and less charged. Gamma is uncharged and rarely interacts.\n- Step 2: Penetrating power (highest first): **gamma > beta > alpha**. Gamma passes through thick lead and concrete. Beta is stopped by a few mm of aluminium. Alpha is stopped by paper or a few cm of air.\n- Step 3: The inverse relationship: a particle that interacts strongly with matter (high ionisation) **loses energy quickly** and therefore doesn't travel far (low penetration). Conversely, a particle that rarely interacts (low ionisation) keeps its energy and travels far (high penetration). High ionisation ↔ low penetration; low ionisation ↔ high penetration.\n\n+ Alpha: ionises everything it hits but stops quickly. Gamma: passes through almost everything but rarely ionises. Beta is in the middle for both.\n\nKey takeaway: Ionising power and penetrating power are inversely related. You can't have both high — it's a trade-off governed by how strongly the radiation interacts with matter.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Alpha radiation is stopped by paper, beta by aluminium, and gamma is reduced (but not fully stopped) by thick lead. Why can't gamma radiation ever be *completely* stopped by any thickness of material? (2 steps)", "answer": "- Step 1: Gamma rays are uncharged, massless electromagnetic radiation. They interact with matter via probabilistic processes (photoelectric effect, Compton scattering, pair production). Each interaction has a certain probability per unit distance, but there is always a non-zero chance of passing through without interacting.\n- Step 2: The intensity of gamma radiation follows an **exponential absorption law**: $$I = I_0 e^{-\\mu x}$$. As thickness x increases, intensity decreases exponentially but **never reaches zero**. There's always some probability of transmission, unlike alpha and beta particles which have a definite maximum range.\n\n+ In practice, a sufficiently thick layer reduces intensity to negligible (background) levels, but mathematically it never reaches exactly zero.\n\nKey takeaway: Alpha and beta have a finite range (they run out of energy). Gamma has an exponential attenuation — it can always be reduced further but never truly reaches zero intensity.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A beta particle is \"an electron emitted from the nucleus.\" But there are no electrons in the nucleus. Explain the process by which a beta-minus particle is created and emitted, and why this doesn't violate the principle that electrons don't exist in the nucleus. (3 steps)", "answer": "- Step 1: The electron in beta-minus decay is **not pre-existing** inside the nucleus. It is *created* at the moment of decay when a **neutron converts into a proton**.\n- Step 2: At the quark level, a down quark (charge −1/3) in the neutron changes into an up quark (charge +2/3): d → u. This changes the neutron (udd) into a proton (uud). The charge difference of +1 is carried away by the newly created electron (charge −1), and an antineutrino balances lepton number.\n- Step 3: The electron is created from the energy released by the nuclear transformation (via the weak force, mediated by the W⁻ boson). It exists only at the moment of creation and immediately leaves the nucleus. There are no electrons \"sitting\" in the nucleus before decay.\n\n+ Analogy: A light bulb doesn't \"store\" light inside it. The light is created when electrical energy flows and is emitted immediately. Similarly, the beta electron is created by the decay energy and emitted immediately.\n\nKey takeaway: Beta particles are created during decay, not stored in the nucleus. The neutron→proton conversion (d→u quark change) produces the electron via the weak force.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "In the Core Practical on gamma radiation absorption, you measure count rate for different thicknesses of lead. Why do you measure background radiation first (with no source), and why do you repeat each measurement multiple times? (2 steps)", "answer": "- Step 1: Measuring **background radiation first** (without the source) gives you the baseline count rate to subtract from all subsequent readings. Without this correction, your count rates are systematically too high, and you'd overestimate the transmission of gamma through each lead thickness.\n- Step 2: Repeating each measurement **multiple times** (and averaging) reduces the impact of **random fluctuations** in radioactive decay. Because decay is a random process, individual count rates vary from one reading to the next. Averaging smooths out these statistical fluctuations and gives a more reliable value.\n\n+ Systematic error to watch for: moving the source or detector between readings would change the geometry and introduce systematic error. Keep all positions fixed.\n\nKey takeaway: Subtract background (systematic correction) and repeat readings (random error reduction) — both are essential for reliable results.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" Define each term in the context of nuclear decay, and state one environmental factor that does NOT affect the decay rate. (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay cannot be influenced by environmental factors — it happens on its own without external triggers. Temperature, pressure, chemical bonding, and magnetic fields do not change the decay rate.\n- Step 2: **Random** means the exact time at which any individual nucleus will decay **cannot be predicted**. Each nucleus has a constant probability of decaying per unit time, but which one decays next is purely chance.\n- Step 3: An environmental factor that does NOT affect decay rate: **temperature**. You cannot speed up or slow down radioactive decay by heating or cooling the sample.\n\n+ However, with a *large number* of nuclei, statistical predictions become very reliable — we can predict what fraction will decay in a given time, even though we can't predict which individual nuclei.\n\nKey takeaway: Spontaneous = unaffected by environment. Random = unpredictable for individual nuclei, but statistically predictable for large samples.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "Define activity (A) and the decay constant (λ), and state the equation linking them to the number of undecayed nuclei N. Why is there a minus sign in the equation? (3 steps)", "answer": "- Step 1: **Activity** A is the rate at which nuclei in a sample decay, measured in Becquerels (Bq), where 1 Bq = 1 decay per second.\n- Step 2: The **decay constant** λ is the probability per second that a given nucleus will decay. It has units of s⁻¹.\n- Step 3: The equation is $$A = -\\frac{\\Delta N}{\\Delta t} = \\lambda N$$. The minus sign indicates that the number of undecayed nuclei **decreases** with time — N is going down. For calculations of the *magnitude* of activity, the minus sign can be dropped, but it's important conceptually to show that the change in N is negative.\n\n+ A larger λ means each nucleus has a higher probability of decaying per second → higher activity for the same N. A larger N means more nuclei available to decay → higher activity for the same λ.\n\nKey takeaway: $$A = \\lambda N$$ — activity depends on both the decay probability (λ) and how many nuclei remain (N).", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "The exponential decay equation is $$N = N_0 e^{-\\lambda t}$$. Explain what each symbol means, and describe the shape of the N-vs-t graph. Why does N never reach zero? (3 steps)", "answer": "- Step 1: $$N_0$$ = initial number of undecayed nuclei at t = 0. N = number remaining at time t. λ = decay constant (s⁻¹). t = time elapsed. e = exponential constant ≈ 2.718.\n- Step 2: The graph is an **exponential decay curve** — it starts at N₀ and decreases steeply at first, then flattens out, always approaching but never reaching zero.\n- Step 3: N never reaches zero because the exponential function $$e^{-\\lambda t}$$ is **always positive** for any finite t. No matter how large t gets, $$e^{-\\lambda t}$$ gets very small but never equals zero. In practice, N eventually becomes so small that statistical fluctuations dominate, but mathematically the curve asymptotically approaches zero.\n\n+ The same exponential form applies to activity: $$A = A_0 e^{-\\lambda t}$$, since A ∝ N.\n\nKey takeaway: Exponential decay: rapid initial decrease, gradual flattening, never quite reaching zero. The \"half-life\" concept gives a practical way to describe the rate.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Define half-life ($$t_{1/2}$$) in words, and derive the relationship between half-life and the decay constant λ. (3 steps)", "answer": "- Step 1: **Half-life** is the time taken for half the nuclei in a sample to decay (equivalently, the time for the activity to halve).\n- Step 2: Start with the exponential decay equation. When t = $$t_{1/2}$$, N = $$\\frac{N_0}{2}$$: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$. Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take the natural logarithm of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n\n+ Since ln 2 ≈ 0.693, the relationship is $$t_{1/2} \\approx \\frac{0.693}{\\lambda}$$. This shows half-life and decay constant are **inversely proportional**: shorter half-life ↔ larger λ ↔ faster decay.\n\nKey takeaway: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ — the fundamental link between the statistical description (λ) and the practical measure (half-life).", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "Isotope X has a half-life of 8 years. Isotope Y has a half-life of 8000 years. Which has the larger decay constant, and which sample would show a faster decrease in activity over the first year of observation? (2 steps)", "answer": "- Step 1: Since $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$, the decay constant is **inversely proportional** to half-life. Isotope X (shorter half-life) has the **larger decay constant**.\n- Step 2: Isotope X also shows the **faster decrease in activity** over the first year, because it decays more rapidly (larger λ means a higher probability of decay per second). In one year, a larger fraction of X's nuclei will have decayed compared to Y's.\n\n+ Quick mental check: after one half-life, activity halves. X loses ~50% in 8 years. Y loses ~50% in 8000 years. After 1 year, X has lost a significant fraction; Y has lost almost nothing.\n\nKey takeaway: Short half-life = large λ = fast decay. Long half-life = small λ = slow decay.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Strontium-90 has a decay constant of 0.025 year⁻¹. After 5 years, what fraction of the initial activity remains? Walk through the exponential decay calculation conceptually. (3 steps)", "answer": "- Step 1: Use the exponential decay equation for activity: $$A = A_0 e^{-\\lambda t}$$. We need the ratio $$\\frac{A}{A_0} = e^{-\\lambda t}$$.\n- Step 2: Substitute λ = 0.025 yr⁻¹ and t = 5 years: $$\\frac{A}{A_0} = e^{-(0.025)(5)} = e^{-0.125}$$.\n- Step 3: $$e^{-0.125} \\approx 0.88$$. So about **88% of the initial activity remains** after 5 years. Equivalently, ~12% of the activity has decayed away.\n\n+ Note: the units of λ (yr⁻¹) and t (years) match, so no unit conversion needed. If λ were in s⁻¹, you'd need t in seconds.\n\nKey takeaway: The ratio $$A/A_0 = e^{-\\lambda t}$$ directly gives the fraction of activity remaining — no need to know absolute numbers.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "A student measures a Geiger counter reading of 60 counts per minute near a radioactive source. The background radiation (measured with no source) is 15 counts per minute. What is the corrected count rate due to the source alone? (2 steps)", "answer": "- Step 1: The measured count rate includes both the source's radiation and background radiation. Corrected count rate = measured count rate − background count rate.\n- Step 2: Corrected count rate = 60 − 15 = **45 counts per minute**. This is the count rate attributable solely to the radioactive source.\n\n+ If the student moved the detector far from the source and the count rate dropped to ~15 cpm (matching background), this confirms the source's radiation doesn't reach that far, and 15 cpm is indeed the background level.\n\nKey takeaway: Always subtract background. The source's true activity is the measured rate minus the background rate.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "A Geiger counter is placed at increasing distances from a beta source. The count rate decreases and eventually levels off at a constant value, even as distance increases further. What does this constant value represent, and why doesn't it drop to zero? (2 steps)", "answer": "- Step 1: The constant value represents the **background radiation count rate** — the radiation always present from environmental sources regardless of the experimental source.\n- Step 2: It doesn't drop to zero because background radiation is **always present** — from cosmic rays, radon gas, radioactive materials in the surroundings, etc. Even with no experimental source at all, the Geiger counter would register this background level.\n\n+ This is actually a practical method for estimating background radiation: move the detector far enough from the source that the source's radiation is fully absorbed by the air, and whatever count rate remains is background.\n\nKey takeaway: A count rate that \"plateaus\" at large distances = background radiation. It's the baseline that's always there.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "In a cloud chamber with a magnetic field, you observe a track that spirals inward with a very tight radius. A second track spirals inward with a much wider radius. Which particle had the higher initial momentum, and which lost energy faster? (2 steps)", "answer": "- Step 1: Since $$r = \\frac{p}{BQ}$$ (with B and Q constant for same-type particles), a **larger radius means higher momentum**. The wider-spiral particle had higher initial momentum.\n- Step 2: Both tracks spiral inward because both are losing energy through ionisation. The tight-radius particle has lower momentum throughout and is losing a **larger fraction** of its energy per unit distance, but we can't determine which loses energy *faster in absolute terms* without more information. However, the tight-radius particle will stop (reach r ≈ 0) sooner.\n\n+ The rate of energy loss depends on the particle's charge, speed, and the medium. A highly charged, slow particle in a dense medium loses energy fastest (high ionisation rate).\n\nKey takeaway: Track radius = live momentum indicator. Wider spiral = more momentum. Spiralling inward = losing energy.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "A LINAC accelerates protons through a series of tubes connected to an AC supply. If the frequency of the AC supply is 50 MHz and a proton has been accelerated to a speed of 3 × 10⁷ m/s, approximately how long should the current tube be so the proton spends exactly half a cycle inside it? (2 steps)", "answer": "- Step 1: Half a cycle at 50 MHz means the time in the tube is $$t = \\frac{1}{2f} = \\frac{1}{2 \\times 50 \\times 10^6} = 1 \\times 10^{-8}$$ s = 10 ns.\n- Step 2: The tube length must equal the distance the proton travels in this time: $$L = v \\times t = (3 \\times 10^7) \\times (1 \\times 10^{-8}) = 0.3$$ m = **30 cm**.\n\n+ As the proton accelerates further (higher v), the next tube must be longer to maintain the same transit time. This is why tubes get progressively longer.\n\nKey takeaway: Tube length = v × (time for half an AC cycle). Faster particles need longer tubes.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "Explain the historical progression of atomic models: Dalton → Thomson → Rutherford → Bohr → Quantum mechanical. For each model, state one key feature that was new compared to the previous model. (5 steps)", "answer": "- Step 1: **Dalton (1803)**: Atoms are tiny, solid, indivisible spheres — the smallest constituents of matter. No internal structure.\n- Step 2: **Thomson (1897)**: Discovered the electron. Atoms contain negative charges embedded in a sphere of positive charge (\"plum pudding\"). First model with sub-atomic particles.\n- Step 3: **Rutherford (1909–11)**: Gold foil experiment showed a tiny, dense, positive nucleus with electrons orbiting it. Replaced the diffuse positive sphere with a concentrated nucleus. First nuclear model.\n- Step 4: **Bohr (1913)**: Electrons orbit in fixed energy levels (shells) at specific distances. Explained atomic spectra — electrons jump between levels, emitting/absorbing specific photon energies.\n- Step 5: **Quantum mechanical (1926)**: Schrödinger's equations describe electrons as probability clouds, not fixed orbits. Where the cloud is densest, the electron is most likely found. Chadwick added the neutron (1932) to complete the modern picture.\n\n+ Each model was an improvement driven by new experimental evidence: electrons → scattering → spectral lines → wave mechanics → neutron discovery.\n\nKey takeaway: Models evolve with evidence. No model is \"final\" — each captures more detail as experiments improve.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "In a cyclotron, the time for one complete revolution of a particle is independent of its speed (as long as it's non-relativistic). Why is this crucial for the cyclotron's operation? (3 steps)", "answer": "- Step 1: The time for a half-revolution (one dee) is $$T/2 = \\frac{\\pi r}{v} = \\frac{\\pi m}{BQ}$$ (substituting $$r = mv/BQ$$). Notice v cancels out — the period depends only on m, B, and Q.\n- Step 2: This means the particle always takes the **same time** to traverse each dee, regardless of how fast it's going. The AC frequency can be set to match this constant period.\n- Step 3: This is crucial because the AC supply must switch polarity exactly when the particle reaches the gap. If the revolution time changed with speed, the frequency would need to change too — requiring a more complex (synchrotron) design.\n\n+ This only works for non-relativistic speeds. At speeds approaching c, the relativistic mass increase makes the period longer, and the fixed-frequency cyclotron breaks down. This is why high-energy accelerators need synchrotrons.\n\nKey takeaway: Constant revolution time = constant AC frequency = simple design. This is the cyclotron's elegant trick, valid only for non-relativistic particles.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "A photon with energy 1.5 MeV interacts with a nucleus. Can it produce an electron–positron pair? The rest-mass energy of an electron is 0.511 MeV. Justify your answer. (2 steps)", "answer": "- Step 1: The minimum photon energy for electron–positron pair production is $$E_{min} = 2m_e c^2 = 2 \\times 0.511 = 1.022$$ MeV.\n- Step 2: The photon has 1.5 MeV, which is **greater than** 1.022 MeV. Therefore, pair production **is possible**. The excess energy (1.5 − 1.022 = 0.478 MeV) becomes kinetic energy shared between the electron and positron.\n\n+ If the photon had only 0.8 MeV, pair production would be impossible — below threshold. This is a hard cutoff, not a probability.\n\nKey takeaway: Pair production requires $$E_{photon} \\geq 2mc^2$$. Above threshold, the excess becomes kinetic energy of the pair.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "When a proton and antiproton annihilate, the energy released is $$2mc^2$$ (where m is the proton mass). Why is the energy twice the proton's rest-mass energy, and how many photons are typically produced? (2 steps)", "answer": "- Step 1: Both the proton (mass m) and the antiproton (mass m) are destroyed. Their *combined* mass is 2m, so the total energy released is $$2mc^2$$. Each particle contributes its own rest-mass energy to the annihilation.\n- Step 2: Typically **two photons** are produced (travelling in opposite directions), for the same reason as electron–positron annihilation: momentum conservation requires at least two photons in the centre-of-mass frame.\n\n+ Each photon carries energy $$mc^2$$ (in the centre-of-mass frame where total initial momentum is zero). The proton–antiproton annihilation releases ~1.876 GeV — vastly more than electron–positron annihilation (~1.022 MeV).\n\nKey takeaway: Annihilation of any particle–antiparticle pair releases $$E = 2mc^2$$, shared between (typically) two photons. The heavier the particle, the more energy released.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": true}, {"question": "In the Rutherford scattering experiment, alpha particles were used rather than, say, electrons. Give two reasons why alpha particles were the better choice for discovering the nucleus. (2 steps)", "answer": "- Step 1: Alpha particles have a **positive charge (+2e)**, so they experience Coulomb repulsion from the positive nucleus. This repulsion causes measurable deflections. Electrons (negative) would be *attracted* to the nucleus and wouldn't show the same large-angle scattering pattern.\n- Step 2: Alpha particles have a **large mass** (~4u), so they are not easily deflected by the lightweight electrons in the atom. This means any significant deflection must come from something massive — the nucleus. Electrons as probes would be easily scattered by other electrons, creating noise.\n\n+ Additionally, alpha particles were readily available from naturally radioactive sources (like radium), making them practical to use before particle accelerators existed.\n\nKey takeaway: Alpha particles' positive charge (repelled by nucleus) and large mass (not deflected by electrons) made them the ideal probe for discovering the nucleus.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "A sample has 1000 nuclei and a decay constant of 0.1 s⁻¹. What is its initial activity? After a very long time, why doesn't the activity reach exactly zero? (2 steps)", "answer": "- Step 1: Initial activity: $$A = \\lambda N = 0.1 \\times 1000 = 100$$ Bq (100 decays per second).\n- Step 2: Mathematically, the exponential decay equation $$N = N_0 e^{-\\lambda t}$$ means N never reaches exactly zero — it asymptotically approaches zero. In practice, when N becomes very small (like 1 or 2 nuclei), the activity is negligible but not strictly zero until the last nucleus decays. For large samples, \"effectively zero\" is reached long before the last nucleus decays.\n\n+ For a sample of 1000 nuclei with λ = 0.1 s⁻¹, the half-life is ~6.9 seconds. After ~70 seconds (~10 half-lives), less than 1 nucleus remains on average.\n\nKey takeaway: Activity = λN initially. Exponential decay means N (and A) approach zero asymptotically — they get very small but mathematically never reach zero.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "Why does an electron probe give better resolution of nucleon structure than an alpha particle probe, even if both have the same de Broglie wavelength? (2 steps)", "answer": "- Step 1: Alpha particles are hadrons (made of quarks) and experience the **strong nuclear force** when they approach nucleons. This additional interaction complicates the scattering pattern and makes it harder to isolate the structure information.\n- Step 2: Electrons are leptons — they do **not** experience the strong nuclear force. They interact with nucleons only via the electromagnetic force (and weakly via gravity). This means the scattering pattern is \"cleaner\" and directly reflects the electromagnetic structure of the nucleon, giving better resolution.\n\n+ For the same de Broglie wavelength, both have the same theoretical resolution limit. But the cleaner interaction of electrons makes the *practical* resolution better.\n\nKey takeaway: Same wavelength = same theoretical resolution. But electrons avoid the messy strong-force interactions, giving clearer results.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "A student claims: \"In beta-minus decay, the nucleus emits an electron that was orbiting the atom.\" Explain why this is wrong, and describe where the electron actually comes from. (2 steps)", "answer": "- Step 1: The electron in beta-minus decay is **not** an orbital electron of the atom. Orbital electrons exist outside the nucleus and are not involved in nuclear decay processes.\n- Step 2: The beta-minus electron is **created inside the nucleus** when a neutron converts to a proton (n → p + e⁻ + $$\\bar{\\nu}_e$$). The electron is a product of the weak nuclear interaction — it didn't exist before the decay happened. It is emitted from the nucleus with high kinetic energy.\n\n+ Evidence: beta-minus particles have much higher energies than orbital electrons (MeV vs eV scale), confirming they originate from nuclear processes, not atomic ones.\n\nKey takeaway: Beta electrons are born in the nucleus during neutron decay — they are not pre-existing atomic electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "In a magnetic field, two particles leave a point in opposite directions with equal radii. One curves left and the other curves right. What can you conclude about their charges, and how would you use Fleming's Left Hand Rule to determine which is positive? (3 steps)", "answer": "- Step 1: Equal radii means equal momentum magnitude (and equal mass, since it's a particle–antiparticle pair). Opposite curvature means **opposite charges** — one positive, one negative.\n- Step 2: Apply Fleming's Left Hand Rule: First finger = direction of B field (into or out of page). Thumb = direction of centripetal force (toward centre of curvature). Second finger = direction a **positive** charge would move.\n- Step 3: For each track, point your first finger along B and thumb toward the centre of curvature. If the second finger aligns with the particle's actual direction of motion, that particle is **positive**. If the second finger points opposite to the particle's motion, that particle is **negative**.\n\n+ Remember: Fleming's Left Hand Rule gives the force on a *positive* charge. For a negative charge, the force is in the opposite direction (or equivalently, reverse the second finger).\n\nKey takeaway: Opposite curvature = opposite charges. Fleming's Left Hand Rule determines which is positive and which is negative.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "In the Core Practical on gamma absorption, the independent variable is lead thickness and the dependent variable is count rate. State two control variables and explain why each must be kept constant. (2 steps)", "answer": "- Step 1: **Distance between source and detector** must be constant — changing the distance would change the intensity of radiation reaching the detector (inverse square law), confounding the effect of lead thickness.\n- Step 2: **Background radiation level** must be constant (or measured and subtracted). If you move to a different location between readings, background levels might change, introducing systematic error. Also, the **radioactive source itself** must be the same (same isotope, same activity) — you can't swap sources mid-experiment.\n\n+ Other control variables: orientation of the source, same Geiger counter, same counting time interval.\n\nKey takeaway: Control variables ensure that only the independent variable (thickness) causes changes in the dependent variable (count rate).", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "A radioactive source emits only gamma radiation. You place increasing thicknesses of aluminium in front of it. Will the count rate ever drop to zero? Why or why not? (2 steps)", "answer": "- Step 1: Gamma radiation follows exponential absorption: $$I = I_0 e^{-\\mu x}$$. Aluminium does attenuate gamma, but aluminium is much less effective than lead at absorbing gamma rays (lower density, lower atomic number).\n- Step 2: The count rate will **decrease** with increasing aluminium thickness but **never reach zero** (exponential decay). However, for very thick aluminium, the count rate may drop so close to background that it appears to plateau at the background level — but this is background radiation, not zero.\n\n+ In practice, aluminium is the wrong material for effectively absorbing gamma — you'd need lead or concrete. The experiment would show a very gradual decrease.\n\nKey takeaway: Gamma intensity decreases exponentially but never reaches zero. Aluminium is ineffective — use lead for meaningful absorption.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": true}, {"question": "Why is the annihilation energy formula $$E = 2mc^2$$ the same for both annihilation and pair production threshold? Explain the symmetry between these two processes. (2 steps)", "answer": "- Step 1: **Annihilation**: particle + antiparticle (total mass 2m) → 2 photons. The total rest-mass energy that must be converted to photon energy is $$2mc^2$$. **Pair production**: photon → particle + antiparticle (total mass 2m). The photon must supply at least $$2mc^2$$ to create both masses.\n- Step 2: They are **inverse processes**: annihilation converts matter to energy; pair production converts energy to matter. In both cases, the critical quantity is the **total rest-mass energy of the particle–antiparticle pair**, which is $$2mc^2$$. The symmetry of the conservation laws means the same energy threshold appears in both directions.\n\n+ Any excess energy above $$2mc^2$$ becomes kinetic energy: in annihilation, the particles may have kinetic energy before collision (adding to photon energy); in pair production, the excess photon energy becomes kinetic energy of the created pair.\n\nKey takeaway: $$2mc^2$$ is the energy of the *pair*, not the individual particle. Annihilation releases it; pair production requires it. Same physics, opposite direction.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "A student says: \"Neutrons have no charge, so they don't interact with anything.\" Explain why this is wrong by naming two forces a neutron *does* experience, and give a practical consequence. (3 steps)", "answer": "- Step 1: Neutrons have no *electric* charge, so they don't interact via the electromagnetic force. But they **do** interact via the **strong nuclear force** (they are hadrons made of quarks) and the **gravitational force** (they have mass).\n- Step 2: The strong nuclear force is what binds neutrons to protons in the nucleus. Without it, neutrons would not stay in nuclei. Neutrons also interact with other nucleons via the weak force (as evidenced by beta decay, where a neutron transforms).\n- Step 3: Practical consequence: free neutrons can penetrate deeply into materials (no electromagnetic repulsion) until they encounter a nucleus and interact via the strong force. This makes neutron radiation highly penetrating and dangerous — it can pass through thick shielding that would stop alpha or beta, and only dense hydrogen-rich materials (like water or concrete) effectively slow and capture neutrons.\n\n+ Neutron detection also relies on the strong force — detectors use materials where neutrons induce nuclear reactions, producing detectable charged particles.\n\nKey takeaway: No charge ≠ no interaction. Neutrons interact via the strong force (and weak force in decays). Their neutrality makes them deeply penetrating.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "Convert 10 MeV into joules, and explain the direction of conversion: do you multiply or divide by 1.6 × 10⁻¹⁹? (2 steps)", "answer": "- Step 1: 1 eV = 1.6 × 10⁻¹⁹ J. To go from eV to joules, you **multiply** by 1.6 × 10⁻¹⁹ (going from a larger unit to a smaller unit — like converting km to m).\n- Step 2: 10 MeV = 10 × 10⁶ eV = 10⁷ eV. In joules: $$10^7 \\times 1.6 \\times 10^{-19} = 1.6 \\times 10^{-12}$$ J.\n\n+ Reverse: to go from joules to eV, **divide** by 1.6 × 10⁻¹⁹ (smaller unit → larger unit, like m → km).\n\nKey takeaway: eV → J: multiply by 1.6 × 10⁻¹⁹. J → eV: divide by 1.6 × 10⁻¹⁹.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "A particle has a mass of 0.5 GeV/c². Is this a lepton, a meson, or a baryon? Justify your answer based on mass scale alone. (2 steps)", "answer": "- Step 1: 0.5 GeV/c² ≈ 0.5 × 1.78 × 10⁻²⁷ kg ≈ 8.9 × 10⁻²⁸ kg. This is close to the electron mass (~0.511 MeV/c² = 0.000511 GeV/c²), but 0.5 GeV/c² is about 1000× heavier than an electron.\n- Step 2: The mass scale of 0.5 GeV/c² is consistent with a **meson** (pion mass ~0.14 GeV/c², kaon mass ~0.49 GeV/c²). Baryons (protons, neutrons) are ~1 GeV/c². Leptons are much lighter (electron ~0.0005 GeV/c², muon ~0.106 GeV/c²). So 0.5 GeV/c² is in the meson range — most likely a **kaon**.\n\n+ This is a rough mass-based identification. Definitive identification requires knowing other quantum numbers (charge, strangeness, etc.), but mass alone gives a strong hint.\n\nKey takeaway: Mass ranges are distinctive: leptons < ~0.1 GeV/c², mesons ~0.1–1 GeV/c², baryons ~1 GeV/c² and above.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "In the equation $$^{210}_{84}Po \\rightarrow ^{206}_{82}Pb + ^{4}_{2}\\alpha$$, verify that both nucleon number and proton number are conserved. Then state how many neutrons the parent and daughter nuclei each contain. (3 steps)", "answer": "- Step 1: Check nucleon number (top): $$210 = 206 + 4$$. ✓ Conserved.\n- Step 2: Check proton number (bottom): $$84 = 82 + 2$$. ✓ Conserved.\n- Step 3: Neutrons = A − Z. Parent (Po): 210 − 84 = **126 neutrons**. Daughter (Pb): 206 − 82 = **124 neutrons**. The alpha particle carries away 2 neutrons (126 − 124 = 2), consistent with the alpha particle's composition of 2 protons + 2 neutrons.\n\n+ This is the final step in the uranium-238 decay chain — polonium-210 alpha decays to stable lead-206.\n\nKey takeaway: Always verify both A and Z conservation. Then neutrons = A − Z for each nucleus.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "A student writes the beta-plus decay equation as $$^{A}_{Z}X \\rightarrow ^{A}_{Z+1}Y + ^{0}_{+1}\\beta^+$$. Identify and correct the error in the daughter nucleus notation. (2 steps)", "answer": "- Step 1: In beta-plus decay, a proton converts to a neutron, so the **proton number Z decreases by 1**, not increases. The daughter should have Z − 1, not Z + 1.\n- Step 2: The correct equation is $$^{A}_{Z}X \\rightarrow ^{A}_{Z-1}Y + ^{0}_{+1}\\beta^+ + \\nu_e$$. Check: Z = (Z − 1) + 1 + 0. ✓ Conserved.\n\n+ The classic exam trap: confusing β⁻ (Z increases) with β⁺ (Z decreases). β⁻: n → p, Z goes up. β⁺: p → n, Z goes down.\n\nKey takeaway: β⁻ → Z + 1. β⁺ → Z − 1. The sign in the beta notation (−1 or +1) tells you the charge of the emitted particle, not the direction Z changes.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "In the Rutherford experiment, what would happen to the number of backscattered alpha particles if the gold foil were replaced with aluminium foil (lower Z)? Explain qualitatively. (2 steps)", "answer": "- Step 1: Aluminium has a lower proton number (Z = 13) than gold (Z = 79). The Coulomb repulsive force between the alpha particle and the nucleus is proportional to the product of charges: F ∝ Zα × Znucleus. A lower Z means a **weaker repulsive force**.\n- Step 2: With a weaker repulsive force, fewer alpha particles would be deflected through large angles, and **even fewer would be backscattered**. The scattering pattern would shift toward smaller deflection angles overall.\n\n+ Additionally, aluminium nuclei are less massive than gold nuclei, so even when hit, they recoil more — slightly reducing the energy of scattered alpha particles. But the dominant effect is the reduced Coulomb repulsion.\n\nKey takeaway: Higher Z nucleus → stronger Coulomb repulsion → more large-angle scattering. Gold (Z = 79) was chosen precisely because its high Z maximises the observable scattering effect.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "Explain why a photon is its own antiparticle, but an electron is not. What property determines whether a particle can be its own antiparticle? (2 steps)", "answer": "- Step 1: A particle and its antiparticle have the **same mass but opposite charge** (and opposite all other quantum numbers). If a particle has all quantum numbers equal to zero, then \"opposite\" of zero is still zero — the particle and antiparticle are identical.\n- Step 2: The photon has zero charge, zero baryon number, zero lepton number, and zero all other quantum numbers. Its \"antiparticle\" has the same properties — it **is itself**. The electron has charge −1e and lepton number +1; its antiparticle (positron) has charge +1e and lepton number −1 — clearly different.\n\n+ The neutron (charge 0, but baryon number +1) is NOT its own antiparticle — the antineutron has baryon number −1. It's not just about electric charge; ALL quantum numbers must be zero.\n\nKey takeaway: A particle is its own antiparticle only if ALL its quantum numbers are zero. Photon qualifies; electron and neutron do not.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "An electron is accelerated through 100 V. Is its speed relativistic? Estimate using the fact that an electron accelerated through 5 kV reaches ~0.14c. (2 steps)", "answer": "- Step 1: From the worked example, 5 kV gives v ≈ 4.2 × 10⁷ m/s ≈ 0.14c. Speed scales as $$v \\propto \\sqrt{V}$$ (since $$v = \\sqrt{2eV/m_e}$$).\n- Step 2: 100 V is 50× less than 5 kV, so $$v_{100} \\approx \\frac{v_{5000}}{\\sqrt{50}} \\approx \\frac{0.14c}{7.07} \\approx 0.02c$$. This is only **2% of the speed of light** — definitely non-relativistic.\n\n+ As a rough guide: accelerations below ~100 kV for electrons are non-relativistic. Above ~1 MV, relativistic effects become significant (v > 0.9c).\n\nKey takeaway: $$v \\propto \\sqrt{V}$$. Low voltages → non-relativistic speeds. High voltages → approach c and relativistic effects matter.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "A muon created at 10 km altitude has a proper lifetime of 2.2 μs. From the muon's reference frame, explain how length contraction allows it to reach the ground, even though its proper lifetime seems too short. (2 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is only 2.2 μs. But due to **length contraction**, the 10 km distance to the ground (as measured in the Earth frame) appears **shorter** in the muon's frame. At 0.99c, the Lorentz factor γ ≈ 7, so the distance contracts to ~10 km / 7 ≈ 1.4 km.\n- Step 2: In 2.2 μs at 0.99c, the muon travels ~650 m. But it only needs to cover ~1.4 km in its own frame, not 10 km. Multiple half-lives later (but still within its dilated lifetime from Earth's perspective), it reaches the ground.\n\n+ From Earth's frame: time dilation stretches the muon's lifetime. From the muon's frame: length contraction shrinks the distance. Both descriptions are consistent — this is the beauty (and weirdness) of special relativity.\n\nKey takeaway: Earth frame → time dilation (muon lives longer). Muon frame → length contraction (distance is shorter). Both explain why muons reach the ground.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "In a particle detector, ionisation is the key detection mechanism. Briefly explain how a Geiger-Muller tube uses ionisation to detect radiation. (2 steps)", "answer": "- Step 1: When radiation enters the GM tube, it **ionises the gas inside**, producing electron–ion pairs. Each radiation particle/ion creates many ion pairs along its path.\n- Step 2: A high voltage between the tube's electrodes accelerates these free electrons and ions, causing a **cascade (avalanche) ionisation** that produces a detectable pulse of current. Each pulse corresponds to one radiation event and is counted by the electronic counter.\n\n+ The GM tube doesn't distinguish between types of radiation — it just counts events. To identify the type, you'd need additional shielding experiments (paper stops α, aluminium stops β, etc.).\n\nKey takeaway: Radiation ionises gas → cascade → electrical pulse → count. Ionisation is the bridge between nuclear physics and electronic detection.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "Strontium-90 has a half-life of 28 years. A sample has an activity of 6.4 × 10⁹ Bq. Conceptually walk through how you would find the decay constant λ in s⁻¹. (3 steps)", "answer": "- Step 1: Use the half-life to decay constant relationship: $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. First convert half-life to seconds: 28 years × 365 × 24 × 3600 ≈ 8.83 × 10⁸ s.\n- Step 2: Calculate λ: $$\\lambda = \\frac{0.693}{8.83 \\times 10^8} \\approx 7.85 \\times 10^{-10}$$ s⁻¹. This is a very small decay constant, consistent with a long half-life.\n- Step 3: If you needed the number of nuclei N, use $$A = \\lambda N$$: $$N = \\frac{A}{\\lambda} = \\frac{6.4 \\times 10^9}{7.85 \\times 10^{-10}} \\approx 8.15 \\times 10^{18}$$ nuclei — a huge number, as expected for a macroscopic sample.\n\n+ The key insight: long half-life = small λ = slow decay = many nuclei needed for a given activity level.\n\nKey takeaway: Convert half-life to seconds, then use $$\\lambda = \\ln 2 / t_{1/2}$$. The activity data (6.4 × 10⁹ Bq) isn't needed for λ — it's only needed if you want N.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": true}, {"question": "A radioactive sample's activity is measured as 800 Bq. After one half-life, it's 400 Bq. After two half-lives, it's 200 Bq. After three half-lives, it's 100 Bq. Express the fraction of original nuclei remaining after n half-lives as a simple formula. (2 steps)", "answer": "- Step 1: After each half-life, the number of remaining nuclei halves. After 1 half-life: 1/2. After 2: 1/4. After 3: 1/8. The pattern is $$\\frac{1}{2^n}$$.\n- Step 2: After n half-lives, the fraction remaining is $$\\frac{N}{N_0} = \\left(\\frac{1}{2}\\right)^n$$. Equivalently, the activity fraction is $$\\frac{A}{A_0} = \\left(\\frac{1}{2}\\right)^n$$.\n\n+ Quick mental check: after 10 half-lives, the fraction is $$(1/2)^{10} = 1/1024 \\approx 0.1\\%$$. After 20 half-lives, ~0.0001%. The sample is effectively \"dead\" long before all nuclei have decayed.\n\nKey takeaway: $$N/N_0 = (1/2)^n$$ where n = number of half-lives elapsed. Simple, powerful, no need for exponential calculations.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": false}, {"question": "In the safety considerations for the gamma absorption core practical, why should you handle the radioactive source with tongs, point it away from yourself, and store it in a lead-lined container when not in use? (2 steps)", "answer": "- Step 1: **Tongs and pointing away** minimise your exposure to radiation. The inverse square law means doubling your distance from the source reduces intensity by 4×. Tongs increase the distance between your body and the source, and pointing it away ensures you're not in the direct beam of radiation.\n- Step 2: **Lead-lined container** absorbs radiation when the source is not in use, preventing unnecessary exposure. Lead is dense and high-Z, making it effective at absorbing gamma rays (and completely stopping alpha and beta). Storing the source properly means no accidental exposure to yourself or others.\n\n+ Additional precautions: wash hands after handling (in case of contamination), remove outer clothing, and keep a metre of distance during the experiment.\n\nKey takeaway: Time (minimise exposure duration), distance (inverse square law), and shielding (lead) — the three principles of radiation safety.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}, {"question": "A student measures count rates at different distances from a gamma source and plots a graph. The graph shows count rate decreasing with distance but levelling off at ~15 cpm at large distances. What is the background count rate, and what is the corrected count rate at a distance where the measured rate is 95 cpm? (2 steps)", "answer": "- Step 1: The count rate levels off at **15 cpm** at large distances — this is the background radiation level (the source's radiation is fully absorbed by the air at that distance).\n- Step 2: At the distance where the measured count rate is 95 cpm, the corrected count rate = 95 − 15 = **80 cpm**. This 80 cpm is the true count rate from the gamma source alone.\n\n+ If you didn't subtract background, you'd think the source produces 95 cpm, overestimating by ~19%. This error would propagate into any calculations based on the count rate.\n\nKey takeaway: The plateau at large distances = background. Subtract it from all readings.", "source": "GLM 5.1 ③", "_id": "glm_3_80", "judge_pick": true}, {"question": "Why can't a single photon in free space undergo pair production without a nearby nucleus, even if its energy exceeds 2mc²? (2 steps)", "answer": "- Step 1: In the centre-of-mass frame of the produced electron–positron pair, the total momentum is zero. But a photon always travels at speed c and always has non-zero momentum $$p = E/c$$. A single photon cannot have zero momentum in any reference frame.\n- Step 2: Therefore, **momentum cannot be conserved** if a single photon in free space creates a pair. A nearby nucleus provides the necessary momentum transfer — it recoils slightly, absorbing the excess momentum while contributing negligible kinetic energy (due to its large mass).\n\n+ This is different from annihilation, where two photons can have zero total momentum (travelling in opposite directions). Pair production needs a \"third body\" for momentum balance.\n\nKey takeaway: Energy conservation alone isn't sufficient — momentum must also be conserved. The nucleus is the essential third body that makes pair production possible.", "source": "GLM 5.1 ③", "_id": "glm_3_81", "judge_pick": false}, {"question": "The quark composition of a proton is uud and a neutron is udd. In beta-minus decay (n → p + e⁻ + $$\\bar{\\nu}_e$$), describe the change at the quark level and identify which quark \"flavour\" changes. (2 steps)", "answer": "- Step 1: Neutron = udd → proton = uud. Comparing the two, one **down quark (d)** has changed into an **up quark (u)**. The other two quarks (u and d) remain unchanged.\n- Step 2: At the quark level: d → u + W⁻ (virtual), and W⁻ → e⁻ + $$\\bar{\\nu}_e$$. The weak force mediates this quark flavour change. The charge changes from −1/3 (d) to +2/3 (u), a net increase of +1, balanced by the electron's −1 charge.\n\n+ This is why beta decay is a **weak interaction** — only the weak force can change quark flavour (i.e., change one type of quark into another).\n\nKey takeaway: Beta-minus decay at the quark level: d → u. One down quark becomes one up quark, mediated by the weak force (W⁻ boson).", "source": "GLM 5.1 ③", "_id": "glm_3_82", "judge_pick": true}, {"question": "A meson is made of a quark–antiquark pair. If a pion (π⁺) is made of u and d̄, what is its total charge? What would the antiparticle (π⁻) be made of, and what would its charge be? (2 steps)", "answer": "- Step 1: π⁺ = u + d̄. Charge = (+2/3) + (+1/3) = +1e. ✓ (The anti-down quark d̄ has charge +1/3, opposite of d's −1/3.)\n- Step 2: The antiparticle π⁻ = ū + d. Charge = (−2/3) + (−1/3) = −1e. The quark and antiquark have swapped: u → ū and d̄ → d.\n\n+ The anti-meson is still a quark–antiquark pair, but the quark becomes the antiquark and vice versa. This is the general rule for all mesons.\n\nKey takeaway: π⁺ (ud̄) has charge +1. π⁻ (ūd) has charge −1. Antimatter meson = swap quark ↔ antiquark.", "source": "GLM 5.1 ③", "_id": "glm_3_83", "judge_pick": false}, {"question": "Baryon number for quarks is ±1/3. Explain why this fractional value makes sense given that baryons are made of exactly 3 quarks. (2 steps)", "answer": "- Step 1: A baryon consists of **3 quarks**. Its baryon number is B = +1. If each quark contributes equally to the baryon number, then each quark must have B = +1/3 (since 3 × 1/3 = 1).\n- Step 2: Antiquarks have B = −1/3 (opposite of quarks). An antibaryon (3 antiquarks) has B = 3 × (−1/3) = −1. Mesons (quark + antiquark) have B = +1/3 + (−1/3) = 0, confirming mesons are not baryons.\n\n+ This fractional baryon number is why free quarks have never been observed — you can't isolate a particle with fractional baryon number from a system that must have integer baryon number. This is related to the concept of **colour confinement** in QCD.\n\nKey takeaway: Quark B = ±1/3 because 3 quarks make a baryon with B = ±1. The fraction ensures consistency across all hadron types.", "source": "GLM 5.1 ③", "_id": "glm_3_84", "judge_pick": false}, {"question": "A student argues: \"If I heat a radioactive sample to 1000°C, it will decay faster because the nuclei have more energy.\" Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: Radioactive decay is a **spontaneous** process — it is not affected by environmental conditions such as temperature, pressure, or chemical state. The nuclear forces governing decay are vastly stronger than any thermal energy you can add.\n- Step 2: The thermal energy at 1000°C (~0.1 eV per particle) is **negligibly small** compared to nuclear energy scales (MeV per nucleon). Heating a sample adds energy to the *electrons* (atomic scale, ~eV), not to the nucleus. The nucleus is completely unaffected.\n\n+ The only way to significantly affect nuclear decay rates is through extreme conditions found in stellar cores or particle accelerators — not a laboratory furnace.\n\nKey takeaway: Temperature, pressure, and chemical bonding do not affect radioactive decay. It is spontaneous and independent of the environment.", "source": "GLM 5.1 ③", "_id": "glm_3_85", "judge_pick": true}, {"question": "When interpreting particle tracks, a track that suddenly ends might indicate the particle stopped. But a track that splits into two new tracks indicates a different event. What is that event, and how does it differ from pair production? (2 steps)", "answer": "- Step 1: A track splitting into two new tracks indicates a **particle interaction or decay** — the original particle collided with another particle or spontaneously decayed into two (or more) daughter particles.\n- Step 2: This differs from pair production in that pair production creates a particle–antiparticle pair from a *photon* (neutral → two oppositely-charged tracks appearing from a point). A particle decay starts with a *charged* particle (already visible as a track) that then splits. In pair production, there is no incoming charged track — the tracks appear from \"nothing.\"\n\n+ Key visual distinction: pair production = two tracks starting from a point with no incoming track. Particle decay = one incoming track that forks into two or more outgoing tracks.\n\nKey takeaway: No incoming track + two new tracks from a point = pair production. Incoming track that forks = particle decay or interaction.", "source": "GLM 5.1 ③", "_id": "glm_3_86", "judge_pick": false}, {"question": "The Standard Model predicts three generations of quarks and leptons. Ordinary matter is made almost entirely of first-generation particles (u, d, e, $$\\nu_e$$). Why don't we find second- and third-generation particles in ordinary matter? (2 steps)", "answer": "- Step 1: Second-generation particles (charm, strange, muon) and third-generation particles (top, bottom, tau) are all **unstable** — they decay into first-generation particles on very short timescales (typically microseconds or less).\n- Step 2: First-generation particles are the only **stable** building blocks (proton = uud is stable; electron is stable; neutrinos are stable). Any higher-generation particles created in cosmic rays or accelerators quickly decay down to the first generation. This is why ordinary matter contains only up quarks, down quarks, electrons, and electron neutrinos.\n\n+ The top quark is so unstable it decays in ~10⁻²⁵ seconds — it barely exists long enough to be considered a \"particle\" in the conventional sense.\n\nKey takeaway: Higher-generation particles are unstable and decay to first-generation particles. Only first-generation particles are stable enough to form ordinary matter.", "source": "GLM 5.1 ③", "_id": "glm_3_87", "judge_pick": false}, {"question": "In the uranium-238 decay chain, the chain goes through multiple alpha and beta decays. If you know the starting nucleus is uranium-238 (A=238, Z=92) and the final product is lead-206 (A=206, Z=82), how many alpha and beta-minus decays must have occurred? (3 steps)", "answer": "- Step 1: Each alpha decay reduces A by 4 and Z by 2. Each beta-minus decay leaves A unchanged and increases Z by 1. Let the number of alpha decays = nα and beta-minus decays = nβ.\n- Step 2: From the nucleon number: 238 − 4nα = 206, so 4nα = 32, giving **nα = 8** alpha decays.\n- Step 3: From the proton number: 92 − 2nα + nβ = 82. Substituting nα = 8: 92 − 16 + nβ = 82, so nβ = 6. There are **6 beta-minus decays**.\n\n+ Check: 8 alpha decays remove 32 nucleons (238 → 206 ✓) and 16 protons (92 → 76). Then 6 beta-minus decays add 6 protons (76 → 82 ✓). Total A change: −32 ✓. Total Z change: −16 + 6 = −10 ✓ (92 → 82).\n\nKey takeaway: Use simultaneous equations: A gives the number of alpha decays; then Z gives the number of beta decays. This works for any decay chain where you know the start and end points.", "source": "GLM 5.1 ③", "_id": "glm_3_88", "judge_pick": false}, {"question": "A student is asked to calculate the minimum wavelength of a photon that can produce a proton–antiproton pair. Conceptually, what equation links photon energy to wavelength, and what energy threshold must the photon meet? (2 steps)", "answer": "- Step 1: The photon must meet the threshold: $$E_{photon} \\geq 2m_p c^2$$, where $$m_p$$ is the proton mass. The photon energy is related to wavelength by $$E = \\frac{hc}{\\lambda}$$.\n- Step 2: For the *minimum* energy (exactly $$2m_p c^2$$), the *maximum* wavelength is $$\\lambda_{max} = \\frac{hc}{2m_p c^2} = \\frac{h}{2m_p c}$$. Any shorter wavelength (higher energy) can also produce the pair, with excess energy becoming kinetic energy.\n\n+ For a proton–antiproton pair, $$2m_p c^2 \\approx 2 \\times 938 \\approx 1876$$ Me
