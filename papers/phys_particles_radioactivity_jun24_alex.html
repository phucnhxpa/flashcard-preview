slightly unstable and rarely decay (long half-life). Some nuclei are much less stable and decay quickly (short half-life). There's no simple formula, but quantum tunneling probability determines whether decay happens fast or slow.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "In the uranium-238 decay chain, the final stable product is lead-206 (²⁰⁶₈₂Pb). How many alpha and beta decays occurred in total from ²³⁸₉₂U to ²⁰⁶₈₂Pb? (2 steps)", "answer": "- Step 1: Alpha decay reduces A by 4 and Z by 2. From A = 238 to A = 206: 238 − 206 = 32, so 32/4 = **8 alpha decays**.\n- Step 2: Beta decay doesn't change A but increases Z by 1. Starting Z = 92, ending Z = 82: 92 − 82 = 10. But 8 alpha decays would reduce Z by 8 × 2 = 16, so net change: 92 → 76 from alpha, then +10 from beta = 86... Actually: After 8 alphas, Z would be 92 − 16 = 76. To reach 82, need +6 more: **6 beta decays**. Check: 8 alpha + 6 beta total = 14 decays.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "What is the photoelectric effect's connection to particle physics, and why is the photon considered a particle in quantum mechanics? (2 steps)", "answer": "- Step 1: The **photoelectric effect** (Einstein's Nobel Prize work) showed light transfers energy in discrete \"packets\" called **photons**. Each photon carries energy E = hf (Planck's constant × frequency).\n- Step 2: In quantum mechanics, light behaves as both wave and particle. The photon is the **quantum** of electromagnetic radiation — a particle with energy and momentum but zero rest mass. This dual nature is fundamental to particle physics, where particles and waves are two aspects of the same entity.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "A Geiger counter reads 45 counts per minute near a radioactive source. The background reading (with source removed) is 15 counts per minute. What is the corrected count rate? Why is this important for accurate measurements? (2 steps)", "answer": "- Step 1: **Corrected count rate** = 45 − 15 = **30 counts per minute**.\n- Step 2: Without this correction, your data would be systematically too high. Background radiation varies with location, altitude, and time (cosmic ray flux isn't constant). Always measure background under identical conditions to your experiment and subtract it for accurate results.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}], "count": 60}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is an isotope, and how does it differ from different elements? (2 steps)", "answer": "- Step 1: An isotope is an atom of the same element (same proton number Z) that has a different number of neutrons, and therefore a different nucleon number A.\n- Step 2: Different elements have different proton numbers (Z), meaning they are different atoms entirely. Isotopes are variants of the same element — they behave chemically identically but have different nuclear properties (e.g., stability, radioactivity).", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Describe the key observations from Rutherford's alpha particle scattering experiment and what they revealed about atomic structure. (4 steps)", "answer": "- Step 1: Most alpha particles passed straight through the gold foil with little or no deflection → the atom is mostly empty space.\n- Step 2: Some alpha particles deflected through small angles (< 10°) → there is a positively charged region (nucleus) that repels the positively charged alpha particles.\n- Step 3: A small number deflected straight back at angles > 90° → the nucleus is extremely small and dense, containing nearly all the atom's mass and positive charge.\n- Step 4: This led to the nuclear model: a small, dense, positively charged nucleus surrounded by orbiting electrons, with the atom being ~100,000 times larger than the nucleus.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is thermionic emission, and why is it important for particle accelerators? (2 steps)", "answer": "- Step 1: Thermionic emission is the process where heating a metal gives its conduction electrons enough thermal energy to escape the metal surface. These emitted electrons can then be accelerated by electric fields.\n- Step 2: In particle accelerators like electron guns, this provides a source of charged particles (electrons) that can be accelerated to high speeds by electric potential differences, enabling experiments to probe atomic and nuclear structure.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Distinguish between a linear accelerator (LINAC) and a cyclotron in terms of their operating principles and particle paths. (3 steps)", "answer": "- Step 1: A LINAC accelerates ions in a straight line through a series of hollow cylindrical tubes. Each tube is connected to an alternating power supply, with tubes becoming progressively longer as particles speed up, ensuring they always accelerate across gaps.\n- Step 2: A cyclotron accelerates ions from a central point in a spiral path using both electric and magnetic fields. The magnetic field keeps particles moving in circular orbits, while an alternating electric field accelerates them each time they cross the gap between the \"dees.\"\n- Step 3: LINACs use only electric fields in straight lines; cyclotrons use both electric and magnetic fields to create spiral paths.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A charged particle moves perpendicularly through a uniform magnetic field. Derive the expression for the radius of its circular path. (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge provides the centripetal force: $$F_B = Bqv$$ and $$F_c = \\frac{mv^2}{r}$$\n- Step 2: Equating these: $$Bqv = \\frac{mv^2}{r}$$\n- Step 3: Rearranging gives $$r = \\frac{mv}{Bq} = \\frac{p}{Bq}$$ where p = mv is the momentum. This shows that larger momentum gives larger radius, stronger fields give tighter curves, and larger charge gives smaller radius.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "How can you determine the properties of an unknown particle from its track in a cloud chamber? (3 steps)", "answer": "- Step 1: The radius of curvature indicates momentum — larger radius means larger momentum (since r ∝ p).\n- Step 2: The direction of curvature (whether it curves left or right) indicates the sign of the charge, found using Fleming's Left-Hand Rule with the magnetic field direction.\n- Step 3: If two tracks emerge from nothing and curve in opposite directions with equal radii, this indicates particle-antiparticle pair creation — the particles have opposite charges but identical masses (and hence momentum).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "State the quark composition and charge of a proton and a neutron. Verify the charges add correctly. (3 steps)", "answer": "- Step 1: Proton = uud (two up quarks + one down quark)\n- Step 2: Neutron = udd (one up quark + two down quarks)\n+ Charge calculation for proton: (+2/3) + (+2/3) + (−1/3) = +1 e ✓\n+ Charge calculation for neutron: (+2/3) + (−1/3) + (−1/3) = 0 e ✓", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the difference between a baryon and a meson in terms of their quark composition? (2 steps)", "answer": "- Step 1: Baryons are hadrons consisting of three quarks (e.g., proton uud, neutron udd). Their baryon number is +1.\n- Step 2: Mesons are hadrons consisting of a quark-antiquark pair (e.g., pion π⁺ = uđ, kaon K⁺ = us). Their baryon number is 0.\n\nBoth interact via the strong nuclear force.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "List the three generations of quarks and their charges. Why does this matter for the Standard Model? (2 steps)", "answer": "- Step 1: First generation: up (+2/3e), down (−1/3e); Second generation: charm (+2/3e), strange (−1/3e); Third generation: top (+2/3e), bottom (−1/3e). Each has a corresponding anti-quark with opposite charge.\n- Step 2: This three-generation structure is fundamental to the Standard Model — it explains the pattern of observed particles and was theoretically predicted before experimental discovery, demonstrating the predictive power of the model.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What are the common leptons, and how do they differ from hadrons? (2 steps)", "answer": "- Step 1: Common leptons are the electron (e⁻), muon (μ⁻), and their associated neutrinos (νₑ, ν_μ). They are fundamental particles not made of quarks.\n- Step 2: Unlike hadrons, leptons do not interact via the strong nuclear force — they interact only through weak, electromagnetic, or gravitational interactions. The electron has charge −1e and mass ~0.0005 u; the muon is similar but 200 times more massive.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is antimatter, and how does it differ from ordinary matter? (2 steps)", "answer": "- Step 1: Every particle has a corresponding antiparticle with the same mass but opposite charge. For example, the antiproton has charge −1e (opposite to proton's +1e), and the positron (antielectron) has charge +1e (opposite to electron's −1e).\n- Step 2: Neutral particles like photons and neutrinos are their own antiparticles. When a particle meets its antiparticle, they annihilate, converting their combined rest mass into energy as photons.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Explain what happens during annihilation and pair production, including the energy requirements. (3 steps)", "answer": "- Step 1: Annihilation occurs when a particle and its antiparticle meet — they destroy each other and release energy as two gamma-ray photons moving in opposite directions.\n- Step 2: Pair production is the reverse: a high-energy photon (with energy ≥ 2mc²) converts into a particle-antiparticle pair near a nucleus (required to conserve momentum).\n- Step 3: The minimum photon energy for pair production is E_min = 2mc². For electron-positron creation, this is ~1.022 MeV. This is because the photon's energy must supply the rest-mass energy of both particles.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "State the three fundamental conservation laws in particle physics and how each applies. (3 steps)", "answer": "- Step 1: Charge (Q) conservation: total charge before = total charge after. Protons have Q = +1, electrons Q = −1, quarks have fractional charges.\n- Step 2: Baryon number (B) conservation: baryons have B = +1, antibaryons B = −1, mesons/leptons have B = 0. Quarks each have B = 1/3.\n- Step 3: Lepton number (L) conservation: leptons have L = +1, antileptons have L = −1, non-leptons have L = 0. This must be conserved separately for electron-type and muon-type leptons in many interactions.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In beta-minus decay, a neutron converts to a proton. Write the decay equation and explain why an antineutrino is also emitted. (3 steps)", "answer": "- Step 1: The decay is: n → p + e⁻ + v̄ₑ (neutron → proton + electron + electron antineutrino)\n- Step 2: Without the antineutrino, charge would be conserved (0 → +1 −1 = 0), but lepton number would not be (0 → 1 + (−1) = 0, but the electron has lepton number +1, so we need an antineutrino with lepton number −1 to conserve total lepton number).\n- Step 3: This is why the \"missing energy\" in early beta decay experiments was eventually explained — the neutrino carries away some energy and momentum that wasn't initially accounted for.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Compare the properties of alpha, beta, and gamma radiation in terms of composition, charge, mass, penetrating power, and ionising ability. (4 steps)", "answer": "- Step 1: Alpha (⁴₂α): helium nucleus — 2 protons + 2 neutrons. Charge +2, mass ~4. Stopped by paper/skin, range ~3–10 cm in air. Very high ionising power (strongly attracts electrons).\n- Step 2: Beta (⁰₋₁β): fast electron. Charge −1, mass ~0 (1/2000 proton). Stopped by aluminium, range ~1 m in air. Medium ionising power.\n- Step 3: Gamma (⁰₀γ): electromagnetic radiation, no mass, no charge. Stopped only by thick lead (several cm) or concrete. Very weakly ionising but highly penetrating (hundreds of km in air).\n- Step 4: These differences arise from their charges and masses — alpha's large charge and mass make it highly ionising but easily stopped; gamma's zero charge and mass make it weakly ionising but very penetrating.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Write the general nuclear decay equations for alpha, beta-minus, beta-plus, and gamma decay, indicating how A and Z change in each case. (3 steps)", "answer": "- Step 1: Alpha decay: ᴬᶻX → ᴬ⁻⁴ᶻ⁻²Y + ⁴₂α (A decreases by 4, Z decreases by 2)\n- Step 2: Beta-minus decay: ᴬᶻX → ᴬᶻ⁺¹Y + ⁰₋₁β + v̄ₑ (A unchanged, Z increases by 1); Beta-plus decay: ᴬᶻX → ᴬᶻ⁻¹Y + ⁰₊₁β + νₑ (A unchanged, Z decreases by 1)\n- Step 3: Gamma decay: ᴬᶻX* → ᴬᶻX + γ (A unchanged, Z unchanged — just energy release from excited nucleus)", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A radioactive sample has an initial count rate of 400 counts/min. After 10 minutes, the count rate is 100 counts/min. What is the half-life of this sample? (3 steps)", "answer": "- Step 1: The count rate dropped from 400 → 100, which is a factor of 4. Since (1/2)² = 1/4, two half-lives have passed.\n- Step 2: Two half-lives in 10 minutes means one half-life = 10 ÷ 2 = 5 minutes.\n- Step 3: Therefore, the half-life is 5 minutes. (This assumes background radiation has been subtracted and decay is the only source.)", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why must background radiation be accounted for in radioactive measurements, and how is the corrected count rate calculated? (2 steps)", "answer": "- Step 1: Background radiation comes from natural sources (cosmic rays, radon gas, radioactive isotopes in rocks/soil, food like bananas, medical sources) and creates a constant \"noise\" reading on detectors even without a radioactive sample present.\n- Step 2: The corrected count rate = measured count rate − background count rate. This gives the net radiation attributable to the source being studied. Background is typically measured separately with no source present and averaged over time.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Why is radioactive decay considered both spontaneous and random? (2 steps)", "answer": "- Step 1: Spontaneous means the decay cannot be influenced by external factors like temperature, pressure, or chemical conditions — each nucleus decays independently regardless of environment.\n- Step 2: Random means the exact time of decay for any individual nucleus cannot be predicted — each unstable nucleus has a constant probability of decaying per unit time, but which specific nucleus decays when is entirely unpredictable. With large numbers, statistical patterns (like half-life) emerge.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Define activity, the becquerel, and the decay constant. How are they related mathematically? (3 steps)", "answer": "- Step 1: Activity (A) is the rate at which nuclei decay in a sample — number of decays per second. The becquerel (Bq) is the unit of activity, where 1 Bq = 1 decay per second.\n- Step 2: The decay constant (λ) is the probability per second that a given nucleus will decay.\n- Step 3: They are related by: A = λN, where N is the number of undecayed nuclei. The minus sign in dN/dt = −λN indicates the number decreases with time.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Derive the relationship between half-life (t½) and the decay constant (λ). (3 steps)", "answer": "- Step 1: Starting with N = N₀e^(-λt), at t = t½, N = N₀/2\n- Step 2: So: N₀/2 = N₀e^(-λt½) → 1/2 = e^(-λt½)\n- Step 3: Taking natural logs: ln(1/2) = -λt½ → -0.693 = -λt½ → t½ = 0.693/λ\n\nThis shows half-life and decay constant are inversely proportional — shorter half-life means larger decay constant and faster decay.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is the purpose of having a nucleus nearby during pair production, and why can't a single photon produce a particle-antiparticle pair in empty space? (2 steps)", "answer": "- Step 1: A single photon has zero rest mass and zero charge. To produce a particle-antiparticle pair (e.g., e⁺e⁻), both energy and momentum must be conserved. A lone photon cannot satisfy both conservation laws simultaneously.\n- Step 2: A nearby nucleus (or atom) absorbs some momentum, allowing the process to conserve both energy and momentum. The nucleus remains essentially unchanged but facilitates the conversion of the photon's energy into mass (the particle-antiparticle pair).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the quark model, explain how beta-minus decay occurs at the quark level. (2 steps)", "answer": "- Step 1: In beta-minus decay, a down quark within a neutron changes into an up quark: d → u + e⁻ + v̄ₑ\n- Step 2: This changes the neutron (udd, charge 0) into a proton (uud, charge +1), while the electron and antineutrino are emitted. The reverse happens in beta-plus decay: a proton's up quark changes to down, emitting a positron and neutrino.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "Explain why electrons must be accelerated to very high energies to probe the internal structure of nucleons. (2 steps)", "answer": "- Step 1: To resolve fine detail (like individual quarks inside a proton), the de Broglie wavelength of the probing particle must be comparable to or smaller than the size being probed. The nucleon diameter is ~10⁻¹⁵ m.\n- Step 2: Since λ = h/mv, higher velocity (and thus higher energy) gives shorter wavelength. At sufficient energies, electrons can resolve the three-quark structure inside protons and neutrons. This is why particle accelerators reach such extreme energies.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What evidence do we have for time dilation and length contraction in particle physics? (2 steps)", "answer": "- Step 1: Muons created in the upper atmosphere have a proper lifetime of ~2 μs. At nearly light-speed, classical physics predicts they'd only travel ~600 m — far less than the 10 km to sea level. Yet they are detected at sea level in large numbers.\n- Step 2: This is explained by time dilation: moving muons experience slower subjective time, extending their lifetime. Additionally, length contraction shortens the distance from their reference frame. Both effects allow them to reach the ground. Similar relativistic effects are essential for particles in accelerators to survive long enough to be detected.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Convert 1 atomic mass unit (u) to both kg and MeV/c², and explain why both units are useful. (3 steps)", "answer": "- Step 1: 1 u = 1.661 × 10⁻²⁷ kg (mass equivalent)\n- Step 2: Using E = mc²: E = (1.661 × 10⁻²⁷) × (3 × 10⁸)² = 1.494 × 10⁻¹⁰ J = 931.5 MeV, so 1 u ≈ 931.5 MeV/c²\n- Step 3: Kilograms are useful for SI calculations; MeV/c² is convenient for particle physics because it directly relates mass to energy scales common in accelerators and nuclear reactions, avoiding large powers of ten.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Calculate the minimum photon energy required for pair production of (a) an electron-positron pair and (b) a proton-antiproton pair. (2 steps)", "answer": "- Step 1: For electron-positron: E_min = 2mₑc² = 2 × 0.511 MeV = 1.022 MeV. This corresponds to a photon with wavelength λ = hc/E = 1.24 × 10⁻¹² m.\n- Step 2: For proton-antiproton: E_min = 2mₚc² ≈ 2 × 938 MeV ≈ 1876 MeV (or ~1.88 GeV). The much larger mass requires far more photon energy.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Rutherford scattering, if alpha particles are fired at gold foil, what would you expect to see if the \"plum pudding\" model were correct? How did actual results differ? (2 steps)", "answer": "- Step 1: The plum pudding model predicted uniform positive charge spread throughout the atom. Alpha particles should pass through with minimal deflection, as there's no concentrated positive charge to repel them strongly.\n- Step 2: Actual results showed most particles passed through (consistent), but a small fraction deflected at large angles, and some even bounced straight back. This was impossible under plum pudding — it revealed a tiny, dense, positively charged nucleus, leading to the nuclear model of the atom.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What are the health hazards of each type of nuclear radiation, and what safety precautions are necessary when handling radioactive sources? (3 steps)", "answer": "- Step 1: Alpha is highly ionising but easily stopped — external exposure is low risk (blocked by skin), but alpha-emitting materials are dangerous if inhaled/injected (direct DNA damage). Beta can penetrate skin and cause burns; gamma is highly penetrating causing whole-body exposure and increased cancer risk.\n- Step 2: Safety precautions include: keeping sources in lead-lined containers when not in use; maintaining distance (inverse square law applies); minimizing exposure time; never pointing sources at oneself; using tongs to handle; washing hands after handling.\n- Step 3: For laboratory work, background radiation must be measured and subtracted, and appropriate detectors (GM tubes, scintillation counters) should be used with proper calibration.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A sample of radioactive material has a half-life of 8 hours. If you start with 8000 nuclei, how many remain after 24 hours? (3 steps)", "answer": "- Step 1: 24 hours ÷ 8 hours/half-life = 3 half-lives\n- Step 2: After 1 half-life: 8000 → 4000; After 2 half-lives: 4000 → 2000; After 3 half-lives: 2000 → 1000\n- Step 3: After 24 hours, 1000 nuclei remain (or use N = N₀e^(-λt) with λ = 0.693/8 hr⁻¹)", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why do some radioactive decay chains (like Uranium-238) involve multiple steps before reaching a stable nucleus? (2 steps)", "answer": "- Step 1: The daughter nucleus after alpha or beta decay is often still unstable — it has the wrong neutron-to-proton ratio for its mass number. It therefore undergoes further decay until reaching a stable configuration.\n- Step 2: The U-238 chain involves 8 alpha decays and 6 beta decays over billions of years, passing through various intermediate isotopes (Th, Pa, Ra, Rn, Po, Bi, etc.) before reaching stable Pb-206. Each step has its own half-life, ranging from microseconds to thousands of years.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In particle physics, how would you determine whether a proposed reaction is physically possible? (2 steps)", "answer": "- Step 1: Check all conservation laws: total charge Q must be equal on both sides; total baryon number B must be equal; total lepton number L must be equal (for each lepton family separately); energy and momentum must also be conserved.\n- Step 2: If even one of these is violated, the reaction cannot occur in nature. For example, a proposed reaction p → e⁺ + γ would violate baryon number (1 → 0) and lepton number (0 → −1 for positron), so it's impossible.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Why is the penetrating power of gamma radiation much greater than alpha or beta, even though it has no charge? (2 steps)", "answer": "- Step 1: Alpha and beta are charged particles that lose energy by ionising atoms they pass — each collision removes an electron, gradually slowing them. This makes them stop relatively quickly.\n- Step 2: Gamma rays are uncharged electromagnetic radiation. They interact weakly with matter primarily through photoelectric effect, Compton scattering, and pair production — rare events. Most gamma photons pass through material without interacting at all, requiring thick dense material (lead) and still not being completely stopped.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why can't quarks exist independently in nature? (2 steps)", "answer": "- Step 1: The strong force between quarks increases with distance (unlike electromagnetism which decreases). Trying to separate quarks requires enormous energy.\n- Step 2: When enough energy is applied to pull quarks apart, new quark-antiquark pairs materialise from the energy (E = mc²), forming new hadrons. This is called \"confinement\" — quarks are always found in groups of two (mesons) or three (baryons).", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "An electron is accelerated from rest through a potential difference of 5 kV. Calculate its final speed and explain the relativistic considerations. (3 steps)", "answer": "- Step 1: Classical calculation: KE = eV = (1.6 × 10⁻¹⁹ C)(5000 V) = 8 × 10⁻¹⁶ J. Using KE = ½mv² gives v = √(2KE/m) ≈ 4.2 × 10⁷ m/s.\n- Step 2: This is 14% the speed of light — relativistic effects are significant but not extreme. The electron's kinetic energy is ~0.01 MeV, much less than its rest energy of 0.511 MeV.\n- Step 3: For particles accelerated to GeV energies (like in particle accelerators), relativistic formulas must be used. Time dilation and length contraction become critical, and the simple KE = ½mv² formula no longer applies.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Explain how a cloud chamber or bubble chamber detects and identifies particles. (2 steps)", "answer": "- Step 1: These detectors contain supersaturated vapour or superheated liquid. When charged particles pass through, they ionise the medium, creating condensation bubbles or trails that are visible and photographable.\n- Step 2: By applying a magnetic field, particles curve according to their momentum and charge (r = p/Bq). By measuring curvature radius and direction, physicists determine the particle's momentum magnitude and sign of charge. Different particles (muons, pions, protons) produce characteristic track patterns.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the physical significance of the fact that the radius of a particle's path in a magnetic field is proportional to its momentum? (2 steps)", "answer": "- Step 1: This relationship r = p/Bq means that for a given magnetic field strength and particle charge, measuring the radius directly gives the momentum. Heavier particles or faster particles sweep wider arcs.\n- Step 2: This principle is used in particle physics detectors to identify particles — by measuring track curvature in known magnetic fields, we can determine each particle's momentum. Combined with other information (like energy loss rate), this helps identify what type of particle created each track.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why does the activity of a radioactive sample decrease over time, and what mathematical relationship describes this? (2 steps)", "answer": "- Step 1: Activity A = λN, where N is the number of undecayed nuclei. As nuclei decay, N decreases, so A decreases proportionally. Since dN/dt = -λN, this gives exponential decay.\n- Step 2: The activity follows A = A₀e^(-λt), where A₀ is initial activity and λ is decay constant. Since A ∝ N, both activity and number of nuclei decrease exponentially with the same characteristic half-life t½ = 0.693/λ.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "How do we know that neutrinos exist if they hardly interact with matter? (2 steps)", "answer": "- Step 1: In beta decay, energy and momentum appeared to be missing — the electron didn't carry away all the energy predicted by conservation laws. Wolfgang Pauli proposed an invisible neutral particle (neutrino) to resolve this.\n- Step 2: Neutrinos were eventually directly detected in the 1950s using large underground detectors (to shield from other radiation). They interact via the weak force extremely weakly — billions pass through Earth every second without interacting, but with massive detectors, occasional interactions can be observed.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Explain what is meant by \"isotope\" and give an example of a radioactive isotope used in medicine, with its application. (2 steps)", "answer": "- Step 1: Isotopes are atoms with the same proton number (same element) but different neutron number (different mass). They have identical chemical behaviour but different nuclear properties — one may be stable while another is radioactive.\n- Step 2: Cobalt-60 (⁶⁰Co) is used in radiotherapy — it undergoes beta decay to Nickel-60, releasing gamma rays that can target tumours. Technetium-99m is used in diagnostic imaging. These medical isotopes are produced in cyclotrons or nuclear reactors.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Why is it important to use thick lead shielding for gamma radiation but not for alpha radiation? (2 steps)", "answer": "- Step 1: Alpha particles are highly charged and massive — they interact strongly with matter and lose energy quickly, stopped by paper or skin. No amount of lead makes them safer than paper.\n- Step 2: Gamma rays have no charge and interact only rarely. They require dense, thick material like lead (or concrete) to have reasonable probability of interaction. Even then, gamma radiation is attenuated exponentially, not completely stopped — background levels still require accounting for.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "What happens to atomic number and mass number in each type of radioactive decay? (3 steps)", "answer": "- Step 1: Alpha decay: Atomic number decreases by 2 (element changes two places left on periodic table); Mass number decreases by 4.\n- Step 2: Beta-minus decay: Atomic number increases by 1 (element moves one place right); Mass number unchanged. Beta-plus decay: Atomic number decreases by 1 (element moves one place left); Mass number unchanged.\n- Step 3: Gamma decay: Both atomic number and mass number unchanged — just energy release from excited nucleus to a lower state.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Why can radiation damage living cells, and what are the biological effects of different radiation types? (2 steps)", "answer": "- Step 1: Radiation ionises atoms and molecules, breaking chemical bonds and damaging DNA. This can kill cells, cause mutations (potentially leading to cancer), or interfere with cell division.\n- Step 2: Alpha causes severe local damage but is easily blocked — ingestion/inhalation is most dangerous. Beta causes skin burns and eye damage but penetrates slightly deeper. Gamma penetrates deeply, causing whole-body exposure and increasing cancer risk throughout tissues.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "A gamma photon has energy 1.0 MeV. Can it undergo pair production to create an electron-positron pair? Explain. (2 steps)", "answer": "- Step 1: Pair production requires photon energy ≥ 2mₑc² = 2 × 0.511 MeV = 1.022 MeV.\n- Step 2: Since 1.0 MeV < 1.022 MeV, this photon cannot undergo pair production — there's insufficient energy to create the rest mass of both the electron and positron. The photon would need at least 1.022 MeV.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In the standard model, what are the fundamental forces and their exchange particles? (2 steps)", "answer": "- Step 1: Electromagnetic force is mediated by photons (γ); weak nuclear force by W⁺, W⁻, and Z⁰ bosons; strong nuclear force by gluons (between quarks). Gravity (not in Standard Model) would be mediated by gravitons.\n- Step 2: These exchange particles (gauge bosons) carry the force between particles. For example, electrostatic repulsion between two electrons is described as exchanging virtual photons.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "How would you determine whether a track in a bubble chamber shows a particle or its antiparticle? (2 steps)", "answer": "- Step 1: In a known magnetic field, the direction of curvature indicates the sign of the charge. Using Fleming's Left-Hand Rule (or right-hand for conventional current), positive particles curve one way, negatives the opposite.\n- Step 2: Particle and antiparticle pairs created together will have tracks curving in opposite directions with equal radii (since they have equal mass and momentum but opposite charge). This is a distinctive signature of pair production.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Why is carbon-14 dating useful for determining the age of archaeological samples, and what are its limitations? (2 steps)", "answer": "- Step 1: Living organisms maintain a constant ratio of Carbon-14 to Carbon-12 through metabolism. When they die, Carbon-14 decays with a half-life of ~5730 years, while Carbon-12 remains stable.\n- Step 2: By measuring the remaining C-14 activity and comparing to living standards, we can estimate how long ago the organism died. Limitations: only works for organic material (not metal or stone); accuracy decreases beyond ~50,000 years (too little C-14 remains); contamination can affect results.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "Explain why the mass of a proton is approximately 938 MeV/c² while its constituent quarks only total about 9 MeV/c². (2 steps)", "answer": "- Step 1: The three valence quarks (uud) have very small masses — up quark ~2.2 MeV/c², down ~4.7 MeV/c², totaling only ~9 MeV/c².\n- Step 2: Most of the proton's mass comes from the binding energy of the strong nuclear force (E = mc²) and the kinetic energy of the quarks confined within the proton. This is an example of mass-energy equivalence — the confinement energy contributes significantly to the observed mass.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "A particle track in a magnetic field shows decreasing radius as it progresses. What does this tell you about the particle? (2 steps)", "answer": "- Step 1: Since r = p/Bq and radius is decreasing, the momentum p must be decreasing.\n- Step 2: The particle is losing energy as it travels — this is characteristic of a charged particle ionising atoms in the surrounding medium, gradually slowing down. The direction of travel can also be determined: the particle came from where the track has larger radius (more momentum) and is heading toward where the track has smaller radius.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why is the alpha particle assigned a relative mass of 4 and a relative charge of +2, and what is it physically identical to?", "answer": "An alpha particle consists of $$2$$ protons and $$2$$ neutrons bound together. Since protons and neutrons are each assigned a relative mass of $$1$$, the total relative mass is $$2 + 2 = 4$$. For charge, neutrons contribute $$0$$ and each proton contributes $$+1$$, giving a total relative charge of $$+2$$. Physically, this combination of two protons and two neutrons is exactly the nucleus of a helium-4 atom ($$^{4}_{2}\\text{He}$$), so an alpha particle is just a \"bare\" helium nucleus with no electrons attached. The lack of electrons is critical — alpha radiation comes from the nucleus, where no electrons exist.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does beta-minus radiation appear to come from the nucleus even though nuclei contain no electrons? (3 steps)", "answer": "- Step 1: Recognize the apparent paradox — a $$\\beta^-$$ particle *is* a fast-moving electron, yet the nucleus is made of only protons and neutrons. So the electron cannot have been \"stored\" there waiting to escape.\n- Step 2: The actual mechanism is internal conversion: a neutron inside the nucleus transforms into a proton. Since a neutron is neutral and a proton is $$+1$$, charge conservation demands a $$-1$$ particle be emitted — that's the electron (the $$\\beta^-$$).\n- Step 3: This means the electron is *created* at the moment of decay, not pre-existing in the nucleus. Deeper down (A-level/QFT), this is because neutrons and protons are made of quarks, and a down quark converts to an up quark, emitting the electron (and an antineutrino).\n\nThe takeaway: beta decay is not \"ejection of a stored electron\" but \"creation of an electron from neutron-to-proton conversion.\"", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why is a gamma ray assigned both zero mass and zero charge, and what does that say about its physical nature?", "answer": "Gamma radiation is not a particle of matter at all — it is high-frequency electromagnetic radiation (a photon), so it has no rest mass and no electric charge. It is pure energy released by a nucleus that was in an excited (higher-energy) state and is \"relaxing\" to a lower-energy state. Because nothing material leaves the nucleus, the proton number and nucleon number are unchanged by gamma emission — only energy is carried away.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "In the notation $$^{A}_{Z}X$$, what do $$A$$ and $$Z$$ represent, and how do you find the number of neutrons from them?", "answer": "$$Z$$ is the **proton number** (also called the atomic number) — the count of protons in the nucleus, which determines what element it is. $$A$$ is the **nucleon number** (also called the mass number) — the total number of protons *and* neutrons. To find the number of neutrons, subtract: $$N = A - Z$$. A very common exam trap is to think $$A$$ alone is the neutron count — it's not, it's protons + neutrons combined.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why is the proton number — not the nucleon number — what defines which element an atom is?", "answer": "The proton number sets the nuclear charge, which determines how many electrons a neutral atom holds and how those electrons arrange into shells. Chemistry (bonding, reactivity, spectra) is governed almost entirely by electron configuration, which in turn is governed by proton count. Two atoms with the same $$Z$$ but different neutron counts (isotopes) behave essentially identically chemically — they're the same element. Change $$Z$$, however, and the element itself changes.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "What is an isotope, and why do isotopes of the same element behave chemically alike but can differ dramatically in nuclear stability?", "answer": "- Step 1: An isotope of an element has the same proton number $$Z$$ but a different neutron number $$N$$ (hence a different nucleon number $$A$$).\n- Step 2: Chemically, behaviour is determined by electrons, and electrons are determined by $$Z$$. Since $$Z$$ is unchanged, isotopes share chemistry — they bond the same way, react the same way.\n- Step 3: Nuclear stability, however, depends on the *balance* of protons and neutrons. Too many or too few neutrons relative to protons makes the nucleus unstable and prone to radioactive decay.\n+ Example: carbon-12 is stable; carbon-14 has two extra neutrons and is radioactive (beta emitter), but both behave as \"carbon\" in biological molecules.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "In Rutherford's gold foil experiment, what three observations were made, and what did each reveal about the structure of the atom? (3 steps)", "answer": "- Step 1: **Most alpha particles passed straight through with no deflection.** This means the atom is mostly empty space — alphas mostly encountered nothing.\n- Step 2: **A small number deflected through small angles (<10°).** This means there's *something* positive in the atom that mildly repels the positive alphas as they pass nearby.\n- Step 3: **A very tiny fraction bounced almost straight back (>90°).** This means there must be a small, dense, highly concentrated region of positive charge — the nucleus — capable of stopping and reversing a fast alpha. Mass and positive charge are thus concentrated in a tiny volume, while electrons orbit in the surrounding empty space.\n\nThe atom is roughly $$10^5$$ times larger than its nucleus.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why did the \"plum pudding\" model of the atom fail to explain Rutherford's scattering results?", "answer": "The plum pudding model proposed a diffuse, uniformly spread positive charge with embedded electrons. If that were true, the positive charge would be too spread out to ever repel a fast alpha particle strongly — *all* alphas would pass through with only tiny deflections. The observed large-angle backscattering required the positive charge to be concentrated in a tiny, dense region — a nucleus — not smeared across the whole atom. The plum pudding could not produce the rare but dramatic bounces seen.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Rank alpha, beta, and gamma radiation by penetrating power and by ionising power, and explain why these two rankings are inversely related. (3 steps)", "answer": "- Step 1: **Penetrating power (low → high):** alpha < beta < gamma. Alpha is stopped by paper or skin; beta by a few mm of aluminium; gamma needs several cm of lead (and is only reduced, not stopped).\n- Step 2: **Ionising power (high → low):** alpha > beta > gamma. Alpha rips electrons off atoms aggressively; beta moderately; gamma weakly.\n- Step 3: **Why they're inverse:** ionising power means depositing energy by knocking electrons off atoms. A highly ionising particle loses its energy quickly — over a short distance — because it interacts strongly with matter. A weakly ionising one interacts rarely, so it travels far. Alpha is big and doubly charged (huge interaction cross-section) → ionises hard, dies fast. Gamma has no charge or mass (just an EM wave) → rarely interacts → goes far but does little ionisation per encounter.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Even though alpha radiation is the *least penetrating*, why is it the *most biologically dangerous* if ingested or inhaled?", "answer": "Penetrating power and biological damage are not the same thing. Externally, alpha is harmless because skin stops it. But inside the body — say from inhaled radon gas or contaminated food — there is no skin barrier. The alpha's enormous ionising power then dumps all its energy into a very small region of tissue, ripping electrons from many atoms in cells (DNA, proteins). Beta and gamma spread their (weaker) damage over much longer paths, so any single cell receives less concentrated damage. So: alpha = short range, huge local damage; gamma = long range, diluted damage.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Approximately how far does each type of radiation travel in air, and why are the ranges so different? (3 steps)", "answer": "- Step 1: Alpha travels only about $$3$$–$$10$$ cm in air. Beta travels roughly $$1$$ m (a bit less to a few metres depending on energy). Gamma travels hundreds of metres to kilometres.\n- Step 2: The range depends on how often the radiation collides with and ionises air molecules. Each ionisation costs energy; once the radiation's kinetic energy runs out, it stops.\n- Step 3: Alpha is large and doubly charged, so it ionises air atoms at virtually every encounter — drains energy fast. Beta is much smaller and singly charged, so it ionises less often. Gamma has no charge at all, so it only interacts via rare photon-matter events.\n\nThe pattern: stronger charge + larger size → more frequent ionisation → shorter range.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What does \"ionising\" mean in the context of radiation, and how does an alpha particle ionise an atom it passes through?", "answer": "To ionise a neutral atom is to strip one or more of its electrons off, leaving behind a positively charged ion (and a free electron). An alpha particle, being $$+2$$ charged and relatively slow-moving (compared to beta), exerts a strong electric attraction/repulsion on the orbital electrons of atoms it passes near. It tears electrons away, the atom becomes a positive ion, and the alpha loses a small chunk of kinetic energy in the process. Over a path of a few cm in air it does this thousands of times until it has no kinetic energy left.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "In an alpha decay equation $$^{A}_{Z}X \\to {}^{A'}_{Z'}Y + {}^{4}_{2}\\alpha$$, how do $$A'$$ and $$Z'$$ relate to $$A$$ and $$Z$$, and why? (2 steps)", "answer": "- Step 1: The alpha particle carries away $$2$$ protons and $$2$$ neutrons (total $$4$$ nucleons, $$2$$ units of charge). By conservation of nucleon number and charge: $$A' = A - 4$$ and $$Z' = Z - 2$$.\n- Step 2: The daughter $$Y$$ is therefore two places to the left of $$X$$ in the periodic table (two fewer protons → different element) and is four mass units lighter.\n\nExample: $$^{238}_{92}\\text{U} \\to {}^{234}_{90}\\text{Th} + {}^{4}_{2}\\alpha$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "In beta-minus decay, the proton number *increases* by one yet the nucleon number stays the same. Explain conceptually why this happens. (3 steps)", "answer": "- Step 1: A neutron inside the nucleus transforms into a proton. So one neutron is \"lost\" but one proton is \"gained\" — the *total* number of nucleons is unchanged. Hence $$A$$ stays the same.\n- Step 2: But the proton count went up by $$1$$, so $$Z$$ increases by $$1$$. The daughter element is one place to the *right* of the parent in the periodic table.\n- Step 3: To conserve charge, the newly-needed negative charge is carried away as an emitted electron (the $$\\beta^-$$) with charge $$-1$$. Balance: original $$Z$$ = (new $$Z+1$$) + ($$-1$$). ✓\n\nA common trap: students often think $$Z$$ *decreases* in $$\\beta^-$$ — it does the opposite.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "How does beta-plus decay differ from beta-minus decay in terms of what happens inside the nucleus and how $$Z$$ changes?", "answer": "In beta-plus ($$\\beta^+$$) decay, a *proton* converts into a *neutron* inside the nucleus, emitting a positron (a positive electron, charge $$+1$$) and a neutrino. Because a proton is lost, $$Z$$ decreases by $$1$$ (daughter is one place to the *left* in the periodic table). The nucleon number $$A$$ is unchanged because proton + neutron count stays equal. Contrast: $$\\beta^-$$ raises $$Z$$, $$\\beta^+$$ lowers $$Z$$ — a classic exam trap.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why must a neutrino (or antineutrino) be emitted in beta decay, and what was the historical clue that it existed? (3 steps)", "answer": "- Step 1: If beta decay only emitted an electron, energy and momentum conservation would force the electron to have a single, fixed kinetic energy each time (like alpha particles do).\n- Step 2: Experimentally, beta particles emerge with a *continuous spectrum* of energies — sometimes the maximum, sometimes much less. Something was carrying away the \"missing\" energy and momentum.\n- Step 3: Pauli proposed an invisible, nearly massless, neutral particle — the (anti)neutrino — that takes the missing energy and momentum. In $$\\beta^-$$ an *antineutrino* ($$\\bar{\\nu}_e$$) is emitted; in $$\\beta^+$$ a *neutrino* ($$\\nu_e$$).\n\nForgetting the (anti)neutrino is the single most common mistake in writing beta decay equations.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "Why does gamma decay leave both the nucleon number and proton number unchanged?", "answer": "Gamma emission is just the release of excess energy from an excited nucleus, carried away by a high-energy photon. No protons or neutrons leave the nucleus — only energy. So $$A$$ and $$Z$$ are unchanged. The nuclide is the same isotope before and after; it has simply dropped from an excited state to a lower-energy state. This is exactly analogous to an atom emitting a visible photon when an electron drops between energy levels, just at a much higher energy scale (nuclear, not electronic).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Complete the alpha decay equation $$^{251}_{98}\\text{Cf} \\to {}^{?}_{?}? + {}^{4}_{2}\\alpha$$ and explain the reasoning. (2 steps)", "answer": "- Step 1: Conserve nucleon number: $$251 - 4 = 247$$. Conserve proton number: $$98 - 2 = 96$$.\n- Step 2: So the daughter has $$Z = 96$$ (which is Curium, Cm) and $$A = 247$$: $$^{247}_{96}\\text{Cm}$$.\n\nYou don't need to memorise the element name; you only need to balance the numbers correctly — the periodic table tells you the name.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Complete the beta-minus decay $$^{14}_{6}\\text{C} \\to {}^{?}_{?}? + {}^{0}_{-1}\\beta + \\bar{\\nu}_e$$ and justify each number. (2 steps)", "answer": "- Step 1: Nucleon number: the beta has $$A=0$$, so $$14 = ? + 0 \\Rightarrow A = 14$$. Proton number: $$6 = ? + (-1) \\Rightarrow ? = 7$$.\n- Step 2: Element with $$Z=7$$ is nitrogen, so the product is $$^{14}_{7}\\text{N}$$.\n\nThis is exactly the carbon-14 decay used in radiocarbon dating. Notice $$Z$$ went *up* by one — characteristic of $$\\beta^-$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "In a decay chain, why does an unstable nucleus often need *many* successive decays before reaching stability rather than just one? (3 steps)", "answer": "- Step 1: A single alpha or beta emission only nudges $$A$$ and/or $$Z$$ by small amounts ($$\\Delta A = 4$$ or $$\\Delta Z = \\pm 1$$). Heavy unstable nuclei like uranium-238 are far from any stable nuclide on the chart of nuclides.\n- Step 2: After one decay, the daughter is usually still off the \"stability line\" — it has the wrong neutron-to-proton ratio — and so it too decays.\n- Step 3: This continues, with each step bringing the nuclide closer to stability, until a stable isotope is reached (for U-238, the chain ends at $$^{206}_{82}\\text{Pb}$$).\n\nThe chain is \"naturally selected\" by which decay each unstable nuclide prefers — alpha typically for very heavy nuclei (to shed mass quickly), beta for nuclides with the wrong neutron/proton balance.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "A nuclide undergoes a decay where $$A$$ drops by $$4$$ and $$Z$$ drops by $$2$$. Without seeing the equation, what kind of decay is it, and why?", "answer": "It must be alpha decay. Only alpha removes $$4$$ nucleons and $$2$$ protons in one step. Beta-minus changes $$Z$$ by $$+1$$ with no change in $$A$$; beta-plus changes $$Z$$ by $$-1$$ with no change in $$A$$; gamma changes neither. So $$\\Delta A = -4, \\Delta Z = -2$$ is the unmistakable signature of an alpha emission.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "A nucleus changes from $$^{210}_{82}\\text{Pb}$$ to $$^{210}_{83}\\text{Bi}$$. What decay happened, and what was emitted alongside? (2 steps)", "answer": "- Step 1: $$A$$ is unchanged at $$210$$, but $$Z$$ increased from $$82$$ to $$83$$. That's the signature of $$\\beta^-$$ decay: a neutron became a proton.\n- Step 2: The emitted particles are a beta-minus particle ($$^{0}_{-1}\\beta$$, i.e., an electron) and an electron antineutrino ($$\\bar{\\nu}_e$$). Often a gamma ray follows if the daughter is left in an excited state.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What is \"stability\" for a nucleus, and what does it mean for the U-238 decay chain to end at $$^{206}_{82}\\text{Pb}$$?", "answer": "A stable nucleus is one that does not spontaneously decay — its proton-to-neutron balance is favourable enough that no rearrangement releases energy. Lead-206 sits at a \"valley of stability\" in the chart of nuclides — it has just the right neutron/proton ratio for that mass region. Once U-238 has shed enough alphas and betas to reach Pb-206, the chain stops; there is no energetically favourable decay available. So a lump of pure uranium-238, given enough time (billions of years), eventually becomes lead.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why is radioactive decay described as both *random* and *spontaneous*? Define each. (2 steps)", "answer": "- Step 1: **Random** means the exact moment any particular nucleus decays cannot be predicted — only a probability per unit time exists. You cannot say \"this atom will decay in 3 seconds\" — only \"it has a fixed chance per second.\"\n- Step 2: **Spontaneous** means external conditions (temperature, pressure, chemical state, magnetic field) do *not* influence the decay rate. You can't speed it up by heating it or slow it down by cooling. The decay is governed purely by the internal nuclear physics.\n\nTogether these mean: unpredictable per-atom, but statistically predictable for large numbers.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "If individual decays are truly random, how can we make precise statements like \"half the sample will decay in 5730 years\"? (3 steps)", "answer": "- Step 1: For one atom, the decay time is unknowable — anywhere from immediately to billions of years from now. But each atom has a fixed probability per second of decaying ($$\\lambda$$, the decay constant).\n- Step 2: With $$10^{20}$$ atoms, the *average* behaviour becomes extraordinarily sharp by the law of large numbers — the fraction decayed in any time interval is predictable to many decimal places, even though we can't say *which* atoms decay.\n- Step 3: This statistical regularity is what gives a sharp \"half-life\" — the time for half the (huge) population to decay. Randomness at the atomic scale produces deterministic-looking behaviour at the bulk scale.\n\nThis is the same logic as: any single coin flip is random, but flipping a million coins gives ~50% heads to high precision.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "What is background radiation, and why does a Geiger counter give a non-zero reading even when no radioactive source is nearby?", "answer": "Background radiation is the low-level radiation always present in our environment from both natural and man-made sources. The Geiger counter always picks up a few counts per second because radioactive nuclei in the surrounding rocks, soil, air (radon), food, our own bodies (potassium-40, carbon-14), and cosmic rays from space are all continually decaying around (and through) the detector. There is no shielding from this in everyday life — it's the floor of any radiation measurement.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Name the main natural and man-made sources of background radiation, and which is generally the largest contributor for most people?", "answer": "**Natural sources:** radon gas seeping from rocks/soil (usually the *largest* single contributor for most people), cosmic rays from the Sun and supernovae, gamma rays from rocks (granite, uranium-bearing minerals), radioactive isotopes in food (potassium-40 in bananas, carbon-14 in all organic matter), and isotopes in the human body itself. **Man-made sources:** medical X-rays and CT scans, radiotherapy, nuclear power waste, weapons-test fallout, and rare nuclear accidents (e.g., Chernobyl). For an average person, radon usually dominates, with medical exposure typically second.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Why must background radiation be subtracted from measurements in a radioactivity experiment, and what's the term for the result? (2 steps)", "answer": "- Step 1: Any Geiger counter reading near a source includes both the source's emission *and* the ever-present background. If you compare raw counts before/after shielding without subtraction, you'll think the radiation never fully stops — you'll always see the background floor.\n- Step 2: The **corrected count rate** = (measured count rate) − (background count rate, measured separately with the source removed). Only this corrected value reflects the actual source activity. A common mistake on exam graphs is to forget that a count rate \"levelling off\" near a non-zero value usually means you've reached background, not that radiation persists indefinitely.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "How does a Geiger-Müller tube actually detect radiation? (3 steps)", "answer": "- Step 1: A radiation particle (alpha, beta, or gamma) enters the tube, which is filled with a low-pressure gas and has a high voltage applied across two electrodes.\n- Step 2: The particle ionises a gas atom — knocks an electron off — producing a free electron and a positive ion. The strong electric field then accelerates the free electron, which collides with and ionises more atoms in a chain reaction (an \"avalanche\").\n- Step 3: This avalanche briefly creates a measurable current pulse between the electrodes. Each pulse is counted as one \"detection event.\" Hence the tube counts ionisation events — and so it works best for radiation that ionises efficiently (alpha, beta) and less well for weakly ionising gamma.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "When investigating gamma absorption by lead, why is using a long half-life source and one with activity well above background important?", "answer": "A **long half-life** ensures the source's activity doesn't noticeably decrease over the duration of the experiment, so any drop in count rate is due to the absorber, not the source decaying. **Activity well above background** ensures that signal-to-noise is high — small absorption changes can be distinguished from random background fluctuations. If activity is comparable to background, statistical noise (which scales as $$\\sqrt{N}$$ for $$N$$ counts) can hide the real absorption effect.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why is gamma radiation \"reduced\" by lead but not fully \"stopped,\" whereas alpha is fully stopped by paper? (3 steps)", "answer": "- Step 1: Alpha interacts with virtually *every* atom it passes (huge ionising cross-section due to charge $$+2$$ and slow speed). Even thin paper contains enough atoms to fully drain its kinetic energy.\n- Step 2: Gamma is a neutral, uncharged photon — it only interacts with matter through rare photon-atom events (photoelectric absorption, Compton scattering, pair production). Most photons pass through unimpeded.\n- Step 3: Therefore lead reduces gamma intensity *exponentially* with thickness — each layer absorbs some fraction, but you can never fully reach zero, only progressively smaller fractions. There is no finite thickness that \"completely\" stops gamma — only thicknesses that reduce it to negligible levels.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why are alpha emitters typically very heavy nuclei (large $$Z$$) like uranium and radium, rather than light nuclei? (3 steps)", "answer": "- Step 1: As nuclei get heavier, the electrostatic repulsion between the many protons grows roughly as $$Z^2$$, while the strong nuclear force (which holds the nucleus together) only acts between immediate neighbours.\n- Step 2: For very heavy nuclei, the long-range repulsion starts to overwhelm the short-range glue, making them unstable. They want to lose mass and charge fast.\n- Step 3: Emitting an alpha particle ($$4$$ nucleons, $$2$$ protons in one go) is a very efficient way to dump both mass and positive charge — far more effective than emitting one nucleon at a time. Plus, the alpha is itself very tightly bound, so its formation releases energy. That's why heavy nuclei \"love\" alpha emission.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "A student observes a particle track curving in a magnetic field with decreasing radius over time. What is happening physically? (3 steps)", "answer": "- Step 1: The radius of a charged particle in a magnetic field is $$r = \\dfrac{p}{BQ}$$, so $$r \\propto p$$ (momentum). If $$r$$ shrinks, momentum is shrinking too.\n- Step 2: Falling momentum means falling kinetic energy. The particle is losing energy as it travels.\n- Step 3: That energy is being deposited in the surrounding medium by ionisation — the particle is knocking electrons off atoms in its path, paying for it with kinetic energy. The spiralling-inward shape is the visual signature of an ionising particle slowing down.\n\nSo track curvature direction tells you sign of charge; track radius and its trend tell you momentum and energy loss.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "In a cloud chamber, two tracks suddenly appear out of nothing, curving in opposite directions with equal radius. What does this indicate? (3 steps)", "answer": "- Step 1: Tracks appearing from \"nothing\" mean an uncharged, invisible particle (like a gamma photon) created visible charged particles — i.e., **pair production**.\n- Step 2: Equal radius means equal momentum (and equal mass, since both feel the same $$B$$ and same $$|Q|$$). This is consistent with a particle–antiparticle pair, which always have identical masses.\n- Step 3: Opposite curvature direction means opposite charge — confirming one is a particle and the other its antiparticle (e.g., electron and positron).\n\nConservation laws are obeyed: the photon's energy ($$\\geq 2mc^2$$) became the rest-mass energy of the pair, and the photon's momentum is shared between them.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What is the minimum energy a photon needs to create an electron–positron pair, and why exactly that amount? (3 steps)", "answer": "- Step 1: The photon's energy must be converted entirely into the rest-mass energy of the two created particles (in the limiting case where they emerge at rest).\n- Step 2: An electron and positron each have rest-mass energy $$m_e c^2 \\approx 0.511 \\text{ MeV}$$. Together they need $$2 m_e c^2 \\approx 1.022 \\text{ MeV}$$.\n- Step 3: So the **threshold** photon energy is $$E_{\\min} = 2 m_e c^2 \\approx 1.022 \\text{ MeV}$$. Below this, no pair can be made; above this, the excess goes into kinetic energy of the pair.\n\nTrap: don't write $$mc^2$$ — pair production needs *twice* that, because two particles are made.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Why can't pair production happen in completely empty space (with just a photon and nothing else)? (3 steps)", "answer": "- Step 1: Energy conservation alone is fine — a high-energy photon has enough energy to make a pair.\n- Step 2: But momentum conservation is the problem. A photon has momentum $$p = E/c$$, and you need somewhere for that momentum to go.\n- Step 3: If only the electron and positron are produced, then in the centre-of-mass frame, they have zero net momentum — but the photon's momentum can't vanish. So a third body (a nearby nucleus, typically) must be present to absorb the recoil momentum. Hence pair production is always observed near matter, never in pure vacuum.\n\nThis is the symmetric mirror of why annihilation always produces (at least) *two* photons — one alone could not conserve both energy and momentum.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "When an electron and positron annihilate at rest, why are *two* photons produced rather than one, and in what directions do they fly?", "answer": "Before annihilation, the two particles (at rest) have zero total momentum but a combined rest-energy of $$2 m_e c^2$$. If only *one* photon emerged, it would have to carry away energy $$2m_e c^2$$ but also zero momentum — impossible, because a photon's momentum is $$E/c \\neq 0$$. Two photons solve this: they fly off in *exactly opposite directions* with equal energies of $$m_e c^2$$ each, so their momenta cancel to zero (matching the initial zero momentum) while their energies sum to $$2 m_e c^2$$ (matching the initial energy). Both conservation laws satisfied.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "What are the three quantum numbers that must be conserved in every particle interaction, and what do they each count? (3 steps)", "answer": "- Step 1: **Charge ($$Q$$):** total electric charge, in units of $$e$$. Protons $$+1$$, electrons $$-1$$, neutrons/neutrinos/photons $$0$$, etc. Sum before = sum after.\n- Step 2: **Baryon number ($$B$$):** counts baryons. Baryons (proton, neutron) have $$B = +1$$; antibaryons $$B = -1$$; everything else (leptons, mesons, photons) $$B = 0$$. Total $$B$$ is invariant.\n- Step 3: **Lepton number ($$L$$):** counts leptons. Leptons (electron, neutrino) have $$L = +1$$; antileptons (positron, antineutrino) $$L = -1$$; everything else $$L = 0$$. Total $$L$$ is invariant.\n\nIf *any one* of $$Q$$, $$B$$, $$L$$ fails to balance, the proposed interaction is forbidden.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Use baryon and lepton conservation to verify that $$^{14}_{6}\\text{C} \\to {}^{14}_{7}\\text{N} + e^- + \\bar{\\nu}_e$$ is allowed. (3 steps)", "answer": "- Step 1: **Charge:** LHS $$= +6$$. RHS $$= +7 + (-1) + 0 = +6$$. ✓\n- Step 2: **Baryon number:** $$^{14}\\text{C}$$ has $$14$$ nucleons, so $$B = 14$$. $$^{14}\\text{N}$$ also has $$B = 14$$. The electron and antineutrino are leptons, $$B = 0$$. So $$14 = 14 + 0 + 0$$. ✓\n- Step 3: **Lepton number:** LHS has no leptons, $$L = 0$$. RHS: electron has $$L = +1$$, antineutrino has $$L = -1$$, sum $$= 0$$. ✓\n\nAll three conservation laws are satisfied — the decay is allowed. This is *why* the antineutrino must appear: without it, $$L$$ would not balance.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is it always an *anti*neutrino (not a neutrino) emitted in $$\\beta^-$$ decay? (3 steps)", "answer": "- Step 1: In $$\\beta^-$$ decay an electron ($$L = +1$$) is emitted. Before the decay, the nucleus has $$L = 0$$.\n- Step 2: To conserve lepton number, the other emitted particle must have $$L = -1$$. That's an *anti*lepton.\n- Step 3: Since the partner must also be neutral (charge already balanced by electron) and very light, it must be the antineutrino ($$\\bar{\\nu}_e$$).\n\nSymmetrically, in $$\\beta^+$$ decay a positron ($$L = -1$$) is emitted, so the partner must be a *neutrino* ($$L = +1$$) to balance lepton number.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "What is a hadron, and what distinguishes a baryon from a meson? (3 steps)", "answer": "- Step 1: A **hadron** is any composite particle made of quarks held together by the strong nuclear force. So hadrons feel the strong force; leptons do not.\n- Step 2: A **baryon** is a hadron made of three quarks (or three antiquarks for an antibaryon). Examples: proton ($$uud$$), neutron ($$udd$$). Baryons always have integer charge.\n- Step 3: A **meson** is a hadron made of one quark and one antiquark. Examples: pions ($$\\pi^+, \\pi^0, \\pi^-$$), kaons. Mesons always have integer charge and are intermediate in mass between leptons and baryons.\n\nSo: hadron = \"made of quarks\"; baryon = \"3 quarks\"; meson = \"quark-antiquark pair.\"", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Verify that the quark content of a proton ($$uud$$) gives the correct charge. (2 steps)", "answer": "- Step 1: Up quark has charge $$+\\tfrac{2}{3}e$$; down quark has charge $$-\\tfrac{1}{3}e$$.\n- Step 2: Total for $$uud$$: $$\\tfrac{2}{3} + \\tfrac{2}{3} + (-\\tfrac{1}{3}) = +1 \\, e$$. ✓ Matches the proton's known charge.\n\nSimilarly, neutron $$udd$$: $$\\tfrac{2}{3} + (-\\tfrac{1}{3}) + (-\\tfrac{1}{3}) = 0$$. ✓\n\nThis is why the quark fractional charges (which never appear alone) combine into the integer charges we see in nature.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "At the quark level, what physically happens during $$\\beta^-$$ decay? (2 steps)", "answer": "- Step 1: Inside a neutron ($$udd$$), one of the down quarks transforms into an up quark, turning the neutron into a proton ($$uud$$).\n- Step 2: Conservation of charge demands a $$-1$$ particle be emitted, which is the electron; conservation of lepton number demands an antineutrino. So at quark level: $$d \\to u + e^- + \\bar{\\nu}_e$$.\n\nThis is mediated by the weak nuclear force (via a $$W^-$$ boson, at A-level). The macroscopic neutron→proton conversion you see in textbooks is really one quark flipping flavour.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "What is a lepton, what are the four most common leptons, and what fundamental force do leptons *not* feel?", "answer": "A lepton is a fundamental (point-like, not made of quarks) particle that does **not** feel the strong nuclear force. The four most common are: the **electron** ($$e^-$$, charge $$-1$$, mass $$\\approx 0.0005\\,u$$), the **electron neutrino** ($$\\nu_e$$, charge $$0$$, nearly massless), the **muon** ($$\\mu^-$$, charge $$-1$$, $$\\approx 200$$ times heavier than the electron), and the **muon neutrino** ($$\\nu_\\mu$$). Leptons interact via electromagnetism (if charged), the weak force, and gravity — but not the strong force, which is reserved for quarks/hadrons.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why is the photon called the \"exchange particle\" or \"mediator\" of the electromagnetic force?", "answer": "In quantum field theory, fundamental forces are described as the exchange of mediator particles between interacting matter particles. For electromagnetism, that mediator is the photon. When two electrons repel each other, the picture is: one emits a photon that the other absorbs, transferring momentum and producing the apparent repulsive push. The photon has zero charge and zero mass — appropriate for a mediator that travels at $$c$$ and connects all electrically charged particles. (You don't need full QFT for ESAT — just remember: photon mediates EM force, no mass, no charge.)", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why does antimatter have the same mass as its matter counterpart but opposite charge?", "answer": "Antimatter arises from the mathematical symmetry of quantum field equations — for every solution describing a particle of mass $$m$$ and charge $$+q$$, there's a mirror solution describing a particle of mass $$m$$ (identical) and charge $$-q$$ (flipped). Mass is tied to the field's intrinsic \"vibration energy\" which is identical for both, but charge is an internal symmetry property that has opposite sign for the antiparticle. So an antiproton has the same mass as a proton ($$1.67 \\times 10^{-27}$$ kg) but charge $$-1$$ instead of $$+1$$. A neutral particle (like a photon or $$\\pi^0$$) can sometimes be its own antiparticle.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why must a linear accelerator (LINAC) use *alternating* voltage and have *progressively longer* drift tubes? (3 steps)", "answer": "- Step 1: Each drift tube is connected to AC. When an ion is between tubes (in the gap), the voltage polarity is set so the ion is pushed forward into the next tube — accelerated. Inside the tube, the ion drifts at constant speed (no field inside a conductor).\n- Step 2: While the ion drifts inside a tube, the AC reverses polarity, so by the time the ion emerges into the next gap, the field again accelerates it forward — never decelerates it.\n- Step 3: The AC frequency is *fixed*. But after each gap, the ion is faster. To make sure it spends the same *time* inside each tube (so it emerges in phase with the AC), each successive tube must be *longer*. Longer tube + faster ion = same drift time = synchronised with AC.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "How does a cyclotron differ from a LINAC, and what role do the magnetic and electric fields each play? (3 steps)", "answer": "- Step 1: A LINAC accelerates ions in a straight line using only electric fields. A **cyclotron** bends ions into a spiral path using a perpendicular magnetic field, while electric fields in the gap between two \"dees\" accelerate them.\n- Step 2: **Magnetic field role:** provides the centripetal force ($$r = \\dfrac{mv}{BQ}$$) that curves the ion's path inside each dee. Crucially, the magnetic force does no work — it only changes direction, not speed.\n- Step 3: **Electric field role:** sits in the gap between the dees and accelerates ions each time they cross. As speed increases, $$r$$ increases, so the spiral expands outward. The ion eventually exits at the rim with high energy.\n\nThe compactness — fitting a long acceleration path into a small spiral — is the cyclotron's advantage over a LINAC.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why does a charged particle in a uniform magnetic field move in a circle, and what determines the radius? (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is $$F = Bqv$$, always perpendicular to the velocity. A force perpendicular to motion changes direction but not speed — exactly what's needed for circular motion.\n- Step 2: Equating the magnetic force to the centripetal force needed: $$Bqv = \\dfrac{mv^2}{r}$$. Cancelling one $$v$$ and rearranging: $$r = \\dfrac{mv}{Bq} = \\dfrac{p}{Bq}$$.\n- Step 3: So the radius is proportional to momentum and inversely proportional to both the field strength and the charge. Heavier or faster particles → wider arcs. Stronger field or more charge → tighter arcs.\n\nThis single relation is the basis for identifying particles by their tracks: charge from curvature direction, momentum from radius.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Qualitatively, how would the track of a high-momentum electron differ from a low-momentum electron in the same magnetic field?", "answer": "Both feel the same $$B$$ and have the same charge $$|q| = e$$, so the only difference is momentum. From $$r = p/(Bq)$$, higher momentum → larger radius (gentler curve), lower momentum → smaller radius (tighter curve). So the high-momentum electron sweeps a wide, nearly-straight arc; the low-momentum electron spirals tightly. As either electron ionises and loses energy, its radius progressively shrinks — you'd see the track spiralling inward over time.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Why must electrons be accelerated to very high energy (and hence very short de Broglie wavelength) to probe the *internal structure* of a proton? (3 steps)", "answer": "- Step 1: To \"see\" any structure of size $$d$$, the probe's wavelength must be $$\\lesssim d$$ — otherwise the wave diffracts around the structure without resolving it. (This is the same rule as: you can't see bacteria with visible light because they're smaller than the wavelength of visible light.)\n- Step 2: A proton's diameter is about $$10^{-15}$$ m. Internal structure (quarks) is much smaller. So we need electron de Broglie wavelengths well below $$10^{-15}$$ m.\n- Step 3: From $$\\lambda = h/p$$, short wavelength requires *very large momentum* — hence very high energy. Modern accelerators give electrons GeV-scale energies precisely to \"see\" inside protons and reveal quarks.\n\nThe faster the electron, the smaller its wavelength, the finer the structure you can resolve.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Why are electrons better than alpha particles for probing the structure of nucleons?", "answer": "Electrons are leptons — they do not feel the strong nuclear force. So they interact with protons/neutrons purely via the electromagnetic force, in a clean, well-understood way. They can approach extremely close without being deflected or absorbed by the strong force. Alpha particles, by contrast, are themselves made of protons and neutrons; they feel the strong force, so they get \"smeared\" by complex strong interactions before they can resolve fine structure. Electrons give a much cleaner snapshot of the charge distribution inside a nucleon.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Why do unstable particles like muons created high in the atmosphere reach the ground in large numbers, despite having a \"lifetime\" of only $$2.2\\,\\mu$$s? (3 steps)", "answer": "- Step 1: At rest, a muon's lifetime is $$2.2 \\times 10^{-6}$$ s. Even travelling at the speed of light, it could only cover $$\\sim 660$$ m in that time — far less than the $$\\sim 10$$ km from the upper atmosphere to sea level.\n- Step 2: But muons created by cosmic rays are moving at relativistic speeds ($$v \\approx 0.99c$$). At such speeds, **time dilation** stretches their lifetime in our (lab) frame to many times longer than $$2.2\\,\\mu$$s.\n- Step 3: With dilated lifetime, they live long enough to reach the ground. Equivalently in the muon's frame, **length contraction** shortens the 10 km journey to a much smaller distance they *can* cover in $$2.2\\,\\mu$$s. Either way, special relativity explains their detection at sea level — and historically this was a key experimental confirmation of relativity.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "What does the energy unit \"electronvolt\" represent physically, and how does it relate to joules?", "answer": "One electronvolt is the kinetic energy gained by an electron (charge $$1.6 \\times 10^{-19}$$ C) when it is accelerated through a potential difference of $$1$$ volt. Since energy = charge × voltage, $$1\\,\\text{eV} = (1.6 \\times 10^{-19}\\,\\text{C}) \\times (1\\,\\text{V}) = 1.6 \\times 10^{-19}\\,\\text{J}$$. It's a convenient unit at the atomic/particle scale because joules are absurdly large there. To convert eV to J: multiply by $$1.6 \\times 10^{-19}$$. To convert J to eV: divide by it. Variants: $$1\\,\\text{MeV} = 10^6$$ eV, $$1\\,\\text{GeV} = 10^9$$ eV.", "source": "O
