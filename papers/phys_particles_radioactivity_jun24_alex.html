V ≈ 3 × 10⁻¹⁰ J. The corresponding wavelength is extremely short — in the gamma-ray range.\n\nKey takeaway: $$\\lambda_{max} = \\frac{hc}{2mc^2} = \\frac{h}{2mc}$$ for pair production. Higher mass → shorter wavelength threshold → higher energy required.", "source": "GLM 5.1 ③", "_id": "glm_3_89", "judge_pick": false}], "count": 90}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain how Rutherford's alpha scattering experiment proved the existence of a dense nucleus. Include what was observed and the reasoning behind the conclusions (4 steps)", "answer": "- Step 1: Most alpha particles passed straight through the gold foil ⇒ most of the atom is empty space\n- Step 2: Some alpha particles deflected at small angles ⇒ positive nucleus repelling them\n- Step 3: A small number deflected at large angles (>90°) ⇒ nucleus extremely small but contains most mass and positive charge\n- Step 4: The dense positive nucleus (10⁻¹⁵ m size) is surrounded by orbiting electrons (10⁻¹⁰ m atom size) ⇒ nuclear model\n\n[Optional: 100,000 times larger atom vs nucleus size]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What defines an isotope, and how do isotopes of the same element differ? (3 steps)", "answer": "- Step 1: Isotopes have same proton number (Z) but different neutron numbers\n- Step 2: This means same element (chemical properties unchanged) but different mass numbers (A)\n- Step 3: Example: Hydrogen (¹₁H), Deuterium (²₁H), Tritium (³₁H) all have 1 proton but 0, 1, 2 neutrons respectively\n\n[Visual: Proton number = element identity | Neutron number = isotope variation]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Sketch the nuclear model of the atom including scale comparison between nucleus and atom. (3 steps)", "answer": "- Step 1: Draw a small dense nucleus (positive charge) at center\n- Step 2: Add electron orbits around nucleus (mostly empty space)\n- Step 3: Add scale comparison: If atom = football stadium, nucleus = marble at center (≈10⁻¹⁵ m vs 10⁻¹⁰ m)\n\n[Takeaway: 100,000 times larger atom vs nucleus]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does beta decay seem to violate charge conservation? How was this resolved? (4 steps)", "answer": "- Step 1: In beta⁻ decay, neutron → proton + electron\n- Step 2: Neutron (uncharged) becomes positively charged proton + negatively charged electron\n- Step 3: Total charge conserved: 0 → +1 + (-1)\n- Step 4: Neutrino/antineutrino carries away energy/momentum to conserve all quantities\n\n[Contrast: Beta⁺ decay follows proton → neutron + positron + neutrino]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What are the properties of alpha particles? Explain why they have high ionizing power but low penetration. (3 steps)", "answer": "- Step 1: Alpha = helium nucleus (2 protons + 2 neutrons, +2 charge, mass 4)\n- Step 2: High ionizing power due to large charge (+2) and mass ⇒ strong interactions with matter\n- Step 3: Low penetration because heavy and strongly charged ⇒ quickly stopped by paper/skin (3-8 cm in air)\n\n[Comparison: Beta particles smaller/less charge ⇒ moderate ionization, better penetration]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What are the properties of beta particles? Why are their penetrating abilities different from alphas? (4 steps)", "answer": "- Step 1: Beta⁻ = fast electron, Beta⁺ = positron\n- Step 2: Mass ~1/2000 proton, charge -1/+1\n- Step 3: Moderate ionizing power (smaller charge than alpha)\n- Step 4: Better penetration than alpha (meters in air, stopped by mm of aluminum) due to smaller size and lower charge\n\n[Counterintuitive: Beta particles are electrons from nucleus despite nucleus having no electrons normally]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are the properties of gamma rays? Why are they difficult to block? (3 steps)", "answer": "- Step 1: Gamma rays are high-energy electromagnetic radiation (no mass, no charge)\n- Step 2: Lowest ionizing power (doesn't interact directly with electrons)\n- Step 3: Highest penetration (hundreds of km in air) requires thick lead/concrete to significantly reduce ⇒ why they're dangerous for whole-body exposure\n\n[Contrast: Alpha easily stopped but dangerous if ingested; gamma hard to block but less ionizing]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What conservation laws apply to all particle interactions? Why are they important? (4 steps)", "answer": "- Step 1: Conservation of charge (Q) must hold across interaction\n- Step 2: Conservation of baryon number (B): baryons +1, antibaryons -1, others 0\n- Step 3: Conservation of lepton number (L): leptons +1, antileptons -1, others 0\n- Step 4: These conservation laws help determine if a proposed interaction is possible\n\n[Edge case: Strangeness isn't conserved in weak interactions, but other quantities are]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Explain the notation for nuclear decay equations: ᴬᶻX → ᴬ⁻⁴ᶻ⁻²Y + ⁴₂α. What do the numbers represent? (4 steps)", "answer": "- Step 1: Top number (A) = nucleon number (protons + neutrons)\n- Step 2: Bottom number (Z) = proton number (defines element)\n- Step 3: Alpha particle has A=4 (2 protons + 2 neutrons) and Z=2 (positive charge)\n- Step 4: Parent nucleus (X) loses 4 nucleons and 2 protons to become daughter nucleus (Y)\n\n[Misconception: Alpha decay doesn't change neutron number directly, just total nucleons]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you determine the decay type from a nuclear equation? Given: ᴬᶻX → ᴬᶻ⁺¹Y + ⁰₋₁β (4 steps)", "answer": "- Step 1: Check mass number (A): same before and after ⇒ not alpha decay\n- Step 2: Check proton number (Z): increased by 1 ⇒ neutron converted to proton\n- Step 3: Beta particle has Z=-1 ⇒ compensates for +1 increase in Y\n- Step 4: Type identified as beta⁻ decay (electron emission from nucleus)\n\n[Contrast: Beta⁺ decay would have ⁰₊₁β in products]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why do nuclear decay equations sometimes include neutrinos or antineutrinos? (3 steps)", "answer": "- Step 1: Neutrinos carry away energy and momentum\n- Step 2: They're needed to conserve lepton number (L)\n- Step 3: In beta⁻ decay: ⁰₋₁β + ν̄ₑ; in beta⁺: ⁰₊₁β + νₑ\n\n[Misconception: Students often forget to include neutrinos in decay equations]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is background radiation and what are its main sources? (4 steps)", "answer": "- Step 1: Background radiation = low level radiation always present\n- Step 2: Natural sources: cosmic rays, radon gas, rocks/minerals, food (e.g., bananas)\n- Step 3: Man-made sources: medical X-rays, nuclear fallout, nuclear power plant waste\n- Step 4: Must be subtracted from experimental measurements\n\n[Counterexample: Radiation from nuclear power plants contributes less than natural sources]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the full decay chain for ²³⁸₉₂U → ²⁰⁶₈₂Pb? Identify the 14 steps with alternating decay types. (6 steps)", "answer": "- Step 1: ²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂α\n- Step 2: ²³⁴₉₀Th → ²³⁴₉₁Pa + ⁰₋₁β\n- Step 3: ²³⁴₉₁Pa → ²³⁴₉₂U + ⁰₋₁β\n- Step 4: ²³⁴₉₂U → ²³⁰₉₀Th + ⁴₂α\n- Step 5: ²³⁰₉₀Th → ²²⁶₈₈Ra + ⁴₂α\n- Step 6: ²²⁶₈₈Ra → ²²²₈₆Rn + ⁴₂α\n\n[Continues with alternating alpha and beta decays until reaching stable lead isotope]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How does a Geiger-Müller tube detect radiation? What types does it measure? (4 steps)", "answer": "- Step 1: Radiation ionizes gas in tube ⇒ creating electron-ion pairs\n- Step 2: Electric field accelerates electrons ⇒ create more ionization ⇒ avalanche effect\n- Step 3: Counts electric pulses to measure radiation intensity\n- Step 4: Detects alpha, beta, gamma (not neutrons as they don't ionize directly)\n\n[Limitation: Cannot distinguish radiation type, only count particles]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What determines the penetrating power of different radiations? Compare alpha, beta, gamma. (4 steps)", "answer": "- Step 1: Alpha most massive and most charged ⇒ strongly ionizing but poor penetration\n- Step 2: Beta less massive and less charged ⇒ moderate ionization and penetration\n- Step 3: Gamma no mass or charge ⇒ weakly ionizing but highly penetrating\n- Step 4: Penetration order: alpha < beta < gamma\n\n[Boundary case: Neutrons penetrate better than gamma but aren't charged]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What happens to nucleon number (A) and proton number (Z) in: (a) alpha decay, (b) beta⁻ decay, (c) gamma decay? (4 steps)", "answer": "- Step 1: Alpha decay: A decreases by 4, Z decreases by 2\n- Step 2: Beta⁻ decay: A unchanged, Z increases by 1\n- Step 3: Beta⁺ decay: A unchanged, Z decreases by 1\n- Step 4: Gamma decay: Neither A nor Z changes\n\n[Counterexample: Neutron decay (n → p + e⁻ + ν̄ₑ) isn't included in standard decay equations]", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What experimental observations demonstrate the random nature of nuclear decay? (3 steps)", "answer": "- Step 1: Unpredictable timing of individual decays (even in large samples)\n- Step 2: Fluctuations in count rate on GM tube despite steady average\n- Step 3: Cannot be influenced by external factors (temperature, pressure, chemical environment)\n\n[Visual: Count rate vs time graph shows irregular peaks but follows exponential decay trend]", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is activity and how is it related to half-life and decay constant? (4 steps)", "answer": "- Step 1: Activity (A) = decay rate, measured in Bq (decays/second)\n- Step 2: A = -λN (λ = decay constant, N = remaining nuclei)\n- Step 3: Half-life t½ = ln(2)/λ ⇒ directly related to decay constant\n- Step 4: Activity decreases exponentially like N(t) = N₀e⁻λt\n\n[Takeaway: Higher decay constant ⇒ shorter half-life ⇒ more radioactive]", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why do some materials emit radiation even when undisturbed? (3 steps)", "answer": "- Step 1: Unstable nuclei have excess energy and seek more stable configuration\n- Step 2: Neutron-to-proton ratio too high or low ⇒ beta decay to reach stability\n- Step 3: Too many nucleons ⇒ alpha decay to reduce size\n\n[Limiting case: Stable nuclei have balanced neutron-to-proton ratio]", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "What's the difference between nuclear decay and annihilation? (3 steps)", "answer": "- Step 1: Nuclear decay changes nucleus (alpha, beta) or releases energy (gamma)\n- Step 2: Annihilation converts particle-antiparticle into energy (photons)\n- Step 3: Decay preserves baryon/lepton numbers; annihilation changes them completely\n\n[Contrast: Decay maintains same element type (with changes), annihilation removes matter completely]", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Why is the nuclear model of the atom fundamentally different from earlier models (plum pudding and Bohr models)? (3 steps)", "answer": "- Step 1: Plum pudding model: positive charge spread throughout atom with electrons embedded\n- Step 2: Nuclear model: positive charge and most mass concentrated in small nucleus\n- Step 3: Bohr model improved by placing electrons in discrete orbits around nucleus\n\n[Visual: Rutherford (nuclear) model → Bohr model → quantum model with electron cloud]", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "How does the Standard Model classify particles? What are the three key categories? (4 steps)", "answer": "- Step 1: Leptons (electron, neutrino) - fundamental particles not interacting via strong force\n- Step 2: Quarks (up, down, strange, charm, top, bottom) - combine to form hadrons\n- Step 3: Baryons (3 quarks) and mesons (quark-antiquark pair) - interact via strong force\n- Step 4: Bosons (gluons, photons, W/Z bosons, Higgs) - mediate fundamental forces\n\n[Takeaway: All matter made from quarks and leptons; bosons mediate forces]", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "What is pair production and what energy requirement must be met for it to occur? (3 steps)", "answer": "- Step 1: High-energy photon converts into particle-antiparticle pair (e.g., e⁺ + e⁻)\n- Step 2: Requires energy ≥ 2mc² (twice rest mass energy of each particle)\n- Step 3: 2mc² for electron-positron pair ≈ 1.022 MeV\n\n[Contrast: Annihilation turns matter-antimatter into energy (photons)]", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "What conservation laws apply in the decay: ¹⁴₆C → ¹⁴₇N + ⁰₋₁β + ν̄ₑ? (4 steps)", "answer": "- Step 1: Charge: 6 → 7 + (-1) + 0 ✓\n- Step 2: Baryon number: 6 → 7 (but 6 nucleons in both) ✓\n- Step 3: Lepton number: 0 → 0 + (-1) + 1 ✓ (antineutrino has -1 lepton number)\n- Step 4: Energy: Carbon-14 has excess energy that becomes beta particle and antineutrino kinetic energy ✓\n\n[Critical thinking: Why must antineutrino carry away some energy?]", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "Explain how to balance the decay equation: ²²⁶₈₈Ra → ??? + ⁴₂He (3 steps)", "answer": "- Step 1: Subtract 4 from mass number: 226 - 4 = 222\n- Step 2: Subtract 2 from atomic number: 88 - 2 = 86\n- Step 3: Use periodic table: Z=86 is Radon (Rn) ⇒ ²²²₈₆Rn\n\n[Shortcut: Alpha decay reduces A by 4, Z by 2 ⇒ new element 2 places back]", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "What is the difference between baryon number and lepton number? Why do we need both in decay equations? (4 steps)", "answer": "- Step 1: Baryon number = +1 for baryons (-1 for antibaryons), 0 for others\n- Step 2: Lepton number = +1 for leptons (-1 for anti-leptons), 0 for others\n- Step 3: Both conserved in all interactions ⇒ constrain possible decay pathways\n- Step 4: Differentiates quark matter (baryons) from fundamental leptons\n\n[Takeaway: Baryon number tracks quark content; lepton number tracks lepton content]", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "What experimental evidence confirms that beta decay involves neutrinos? (3 steps)", "answer": "- Step 1: Observed beta particle energy spectrum (not discrete)\n- Step 2: Missing energy/momentum implied another particle\n- Step 3: Neutrino detection in other reactions confirmed their existence\n\n[Misconception: Neutrinos aren't just \"missing energy\" - they're real particles]", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "What happens to neutron-to-proton ratio in beta⁻ and beta⁺ decay? (4 steps)", "answer": "- Step 1: Beta⁻: neutron → proton + electron ⇒ decreases n/p ratio\n- Step 2: Beta⁺: proton → neutron + positron ⇒ increases n/p ratio\n- Step 3: Stable nuclei have n/p ratio ≈ A/2Z (varies with element)\n- Step 4: Unstable isotopes decay to reach stable n/p ratio\n\n[Takeaway: Beta⁻ for high n/p, Beta⁺ for low n/p]", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "What conservation laws apply in: ⁴₂He + ²⁷₁₃Al → ³⁰₁₅P + ¹₀n? (4 steps)", "answer": "- Step 1: Charge: 2 + 13 = 15 ⇒ 0 ✓\n- Step 2: Baryon number: 4 protons + 27 nucleons = (30 nucleons + 1 neutron) ⇒ 0 ✓\n- Step 3: Lepton number: 0 = 0 ⇒ ✓\n- Step 4: Mass energy: 4He + 27Al = 30P + 1n ⇒ energy balance through Q-value\n\n[Note: This is a nuclear reaction not just decay]", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "What is the quark composition of a proton and a neutron? How does this explain their charges? (5 steps)", "answer": "- Step 1: Proton = uud (up-up-down)\n- Step 2: up quark = +2/3, down = -1/3 ⇒ +2/3 + 2/3 -1/3 = +1 ✓\n- Step 3: Neutron = udd (up-down-down)\n- Step 4: +2/3 -1/3 -1/3 = 0 ✓\n- Step 5: Both have 3 quarks ⇒ baryons\n\n[Contrast: Mesons = quark-antiquark pairs]", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}, {"question": "How does the particle track in a magnetic field reveal a particle's properties? (4 steps)", "answer": "- Step 1: Radius r = mv/BQ shows higher momentum particles have larger radius\n- Step 2: Direction of curvature from FLHR reveals charge sign\n- Step 3: Decreasing radius ⇒ energy loss ⇒ spiraling inward\n- Step 4: Track length ⇒ particle lifetime (short-lived particles leave short tracks)\n\n[Visual: Charged particles curve, neutral ones don't; opposite charges curve in opposite directions]", "source": "Qwen 3 ①", "_id": "qwen_1_30", "judge_pick": false}, {"question": "What is the decay chain of ²³⁸₉₂U to ²⁰⁶₈₂Pb in terms of the numbers of each decay type? (4 steps)", "answer": "- Step 1: Total A change: 238 - 206 = 32\n- Step 2: Each alpha decays removes 4 from A ⇒ 8 alphas\n- Step 3: Total Z change: 92 - 82 = 10\n- Step 4: Alphas remove 2 × 8 = 16 from Z ⇒ need 6 beta⁻ decays to restore 6 units ⇒ net Z change: 16 - 6 = 10\n\n[Misconception: Beta decays don't change A but do change Z]", "source": "Qwen 3 ①", "_id": "qwen_1_31", "judge_pick": false}, {"question": "What experimental evidence supports the existence of quarks inside protons and neutrons? (4 steps)", "answer": "- Step 1: High-energy electron beams used to probe proton/neutron structure\n- Step 2: De Broglie wavelength comparable to quark spacing ⇒ resolve internal structure\n- Step 3: Scattering patterns indicated 3 small interaction sites inside nucleons\n- Step 4: Quarks have fractional charges (+2/3 and -1/3) matching proton (uud) and neutron (udd)\n\n[Takeaway: Electrons don't interact with strong force ⇒ can probe nucleus]", "source": "Qwen 3 ①", "_id": "qwen_1_32", "judge_pick": false}, {"question": "How does the Standard Model explain the strong nuclear force? (4 steps)", "answer": "- Step 1: Gluons mediate strong force between quarks\n- Step 2: Quarks have color charge (red, blue, green)\n- Step 3: Gluons carry color charge ⇒ bind quarks together\n- Step 4: Residual strong force between nucleons explained through meson exchange\n\n[Contrast: Electromagnetic force → photons; weak force → W/Z bosons]", "source": "Qwen 3 ①", "_id": "qwen_1_33", "judge_pick": false}, {"question": "How does the nuclear decay series of uranium-238 eventually reach stable lead-206? (5 steps)", "answer": "- Step 1: Uranium-238 undergoes series of decays to reach stability\n- Step 2: 8 alpha decays (each removes 4 from A, 2 from Z)\n- Step 3: 6 beta⁻ decays (each increases Z by 1 without changing A)\n- Step 4: Total change: A=32 (8×4), Z=10 (8×2 - 6×1)\n- Step 5: 238-32=206, 92-10=82 ⇒ lead-206\n\n[Takeaway: Decay series continues until stable isotope formed]", "source": "Qwen 3 ①", "_id": "qwen_1_34", "judge_pick": false}, {"question": "What is meant by \"mass-energy equivalence\" and how is it used in nuclear physics? (4 steps)", "answer": "- Step 1: E = Δmc² relates mass and energy (Δm = mass defect)\n- Step 2: 1 atomic mass unit ≈ 931.5 MeV/c²\n- Step 3: Used to calculate binding energy (energy released when nucleus formed)\n- Step 4: Used for decay energy (Q-value) and particle production requirements\n\n[Takeaway: Mass can convert to energy and vice versa]", "source": "Qwen 3 ①", "_id": "qwen_1_35", "judge_pick": false}, {"question": "What is meant by the \"random nature of nuclear decay\"? (3 steps)", "answer": "- Step 1: Cannot predict when a particular nucleus will decay\n- Step 2: Constant probability of decay per unit time (statistical regularity)\n- Step 3: Large samples follow exponential decay pattern (half-life concept)\n\n[Contrast: Radioactive decay not affected by external factors]", "source": "Qwen 3 ①", "_id": "qwen_1_36", "judge_pick": false}, {"question": "How do particle accelerators like linacs and cyclotrons work? (5 steps)", "answer": "- Step 1: Linacs accelerate particles in straight line through progressively longer tubes\n- Step 2: Cyclotrons use magnetic field for circular path + alternating electric field for acceleration\n- Step 3: r = mv/BQ shows heavier or faster particles sweep wider arcs\n- Step 4: Radius proportional to momentum (p = mv) for given B and Q\n- Step 5: Cyclotrons use magnetic field to constrain path while electric field accelerates\n\n[Note: Both use electric field for acceleration, but magnetic field for path control]", "source": "Qwen 3 ①", "_id": "qwen_1_37", "judge_pick": false}, {"question": "Why is mass number (A) not the same as actual mass of a nucleus? (4 steps)", "answer": "- Step 1: A = protons + neutrons\n- Step 2: Actual mass (from mass spectrometer) less than sum of individual nucleons\n- Step 3: Missing mass = mass defect ⇒ converted to binding energy through E = Δmc²\n- Step 4: Binding energy holds nucleus together ⇒ mass-energy equivalence\n\n[Takeaway: Mass number ≠ actual mass due to binding energy]", "source": "Qwen 3 ①", "_id": "qwen_1_38", "judge_pick": false}, {"question": "What safety measures are used to protect from ionizing radiation? (4 steps)", "answer": "- Step 1: Shielding (paper for alpha, aluminum for beta, lead/concrete for gamma)\n- Step 2: Time (minimize exposure)\n- Step 3: Distance (inverse-square law reduces intensity)\n- Step 4: Containment (prevent ingestion/inhalation of radioactive material)\n\n[Visual: Alpha stopped by paper, beta by aluminum, gamma by thick lead]", "source": "Qwen 3 ①", "_id": "qwen_1_39", "judge_pick": false}, {"question": "What conservation laws apply in: ⁴₂He + ²⁷₁₃Al → ³⁰₁₅P + ¹₀n? (4 steps)", "answer": "- Step 1: Charge: 2 + 13 = 15 ⇒ 0 ✓\n- Step 2: Baryon number: 4 + 27 = 30 + 1 ⇒ 0 ✓\n- Step 3: Lepton number: 0 = 0 ⇒ ✓\n- Step 4: Energy: 4He + 27Al = 30P + 1n ⇒ energy balance through Q-value\n\n[Note: This is a nuclear reaction, not just decay, so energy balance matters]", "source": "Qwen 3 ①", "_id": "qwen_1_40", "judge_pick": false}, {"question": "How do we know the universe is mostly matter and not antimatter? (4 steps)", "answer": "- Step 1: No large-scale annihilation signatures observed in universe\n- Step 2: If significant antimatter existed, annihilation with matter would create detectable gamma rays\n- Step 3: Cosmic rays contain mostly matter (protons, nuclei)\n- Step 4: Baryon asymmetry in early universe explains matter dominance\n\n[Takeaway: Annihilation would produce 1.022 MeV photons (electron-positron)", "source": "Qwen 3 ①", "_id": "qwen_1_41", "judge_pick": false}, {"question": "Why do some unstable nuclei emit alpha particles rather than other radiation types? (4 steps)", "answer": "- Step 1: Alpha particles have high binding energy (2 protons + 2 neutrons)\n- Step 2: Easier to emit a stable cluster than individual nucleons\n- Step 3: Heavy nuclei have large Coulomb barrier ⇒ favored decay path\n- Step 4: Alpha emitters tend to be heavy elements (A > 200)\n\n[Counterexample: Lighter nuclei usually undergo beta decay]", "source": "Qwen 3 ①", "_id": "qwen_1_42", "judge_pick": false}, {"question": "What experimental observations support the existence of the neutrino? (3 steps)", "answer": "- Step 1: Beta decay energy spectrum showed missing energy\n- Step 2: Neutrino postulated to conserve energy and momentum\n- Step 3: Direct neutrino detection in inverse beta decay (antineutrino + proton → neutron + positron)\n\n[Takeaway: Neutrinos are difficult to detect due to minimal interaction with matter]", "source": "Qwen 3 ①", "_id": "qwen_1_43", "judge_pick": false}, {"question": "Describe the properties of hadrons and how they differ from leptons. (5 steps)", "answer": "- Step 1: Hadrons interact via strong nuclear force\n- Step 2: Baryons = 3 quarks (proton, neutron)\n- Step 3: Mesons = quark-antiquark (pions, kaons)\n- Step 4: Leptons don't interact via strong force (electron, muon, neutrino)\n- Step 5: Leptons are fundamental; hadrons have quark substructure\n\n[Takeaway: Hadrons have quark composition, leptons don't]", "source": "Qwen 3 ①", "_id": "qwen_1_44", "judge_pick": false}, {"question": "What is the quark composition of a proton and neutron? How does this explain their properties? (5 steps)", "answer": "- Step 1: Proton = uud (up-up-down quarks)\n- Step 2: up quark = +2/3, down = -1/3 ⇒ +2/3 + 2/3 -1/3 = +1 ✓\n- Step 3: Neutron = udd (up-down-down quarks)\n- Step 4: +2/3 -1/3 -1/3 = 0 ✓\n- Step 5: All have 3 quarks ⇒ baryons with baryon number +1\n\n[Contrast: Mesons = 2 quarks (quark-antiquark) with baryon number 0]", "source": "Qwen 3 ①", "_id": "qwen_1_45", "judge_pick": false}, {"question": "How does the decay equation for beta⁺ decay differ from beta⁻ decay? Give examples. (5 steps)", "answer": "- Step 1: Beta⁻: neutron → proton + electron + antineutrino + energy\n- Step 2: ¹⁴₆C → ¹⁴₇N + ⁰₋₁β + ν̄ₑ\n- Step 3: Beta⁺: proton → neutron + positron + neutrino + energy\n- Step 4: ²²¹¹Na → ²²¹⁰Ne + ⁰₊₁β + νₑ\n- Step 5: Beta⁺ requires energy input (neutron heavier than proton)\n\n[Contrast: Beta⁺ only in unstable nuclei with low neutron-to-proton ratio]", "source": "Qwen 3 ①", "_id": "qwen_1_46", "judge_pick": false}, {"question": "What is the significance of the nuclear decay series in terms of radiation exposure? (4 steps)", "answer": "- Step 1: Uranium-238 decays through multiple intermediate radionuclides\n- Step 2: Intermediate products (like radon gas) contribute to background radiation\n- Step 3: Each decay type (alpha, beta, gamma) has different biological effects\n- Step 4: Radon exposure is major contributor to background radiation\n\n[Takeaway: Decay series extends radiation exposure beyond parent isotope]", "source": "Qwen 3 ①", "_id": "qwen_1_47", "judge_pick": false}, {"question": "What conservation laws apply in: ⁴₂He + ⁹₄Be → ¹²₆C + ¹₀n? (4 steps)", "answer": "- Step 1: Charge: 2 + 4 = 6 ⇒ 0 ✓\n- Step 2: Baryon number: 4 + 9 = 12 + 1 ⇒ 0 ✓\n- Step 3: Lepton number: 0 = 0 ⇒ ✓\n- Step 4: Mass energy: 4He + 9Be = 12C + 1n ⇒ energy balance through Q-value\n\n[Note: This is a nuclear reaction, not just decay]", "source": "Qwen 3 ①", "_id": "qwen_1_48", "judge_pick": false}, {"question": "How does the nuclear model of the atom explain the results of Rutherford scattering? (4 steps)", "answer": "- Step 1: Most alpha particles pass straight through ⇒ atom mostly empty space\n- Step 2: Some deflections at small angles ⇒ positive nucleus\n- Step 3: Rare backscattering ⇒ tiny, dense, positive nucleus\n- Step 4: Explains why atom is electrically neutral (positive nucleus surrounded by negative electrons)\n\n[Takeaway: Explains atomic neutrality and structure]", "source": "Qwen 3 ①", "_id": "qwen_1_49", "judge_pick": false}, {"question": "What happens to the decay energy in a nuclear decay? (4 steps)", "answer": "- Step 1: Disappears mass ⇒ appears as kinetic energy in products\n- Step 2: For alpha decay: E = Δmc² = (M_parent - M_daughter - M_alpha)c²\n- Step 3: Energy shared between decay products\n- Step 4: Beta decay has continuous spectrum due to energy shared with neutrino\n\n[Takeaway: Energy not all carried by beta particle ⇒ neutrino accounts for \"missing\" energy]", "source": "Qwen 3 ①", "_id": "qwen_1_50", "judge_pick": false}, {"question": "How do alpha, beta and gamma radiation compare in terms of ionization and biological effects? (4 steps)", "answer": "- Step 1: Alpha most ionizing (large charge and mass) ⇒ most damage if ingested\n- Step 2: Beta moderately ionizing ⇒ skin and tissue damage\n- Step 3: Gamma weakly ionizing ⇒ whole-body exposure most dangerous\n- Step 4: Biological effects depend on radiation type and exposure route\n\n[Takeaway: Alpha is most damaging but least penetrating ⇒ only dangerous if ingested]", "source": "Qwen 3 ①", "_id": "qwen_1_51", "judge_pick": false}, {"question": "Why are cyclotrons more compact than linacs for the same final beam energy? (4 steps)", "answer": "- Step 1: Linacs accelerate particles in straight line through progressively longer tubes\n- Step 2: Cyclotrons use magnetic field to constrain path in spiral\n- Step 3: Electric field accelerates between \"dees\"\n- Step 4: Cyclotrons reuse acceleration region ⇒ smaller footprint for same energy\n\n[Takeaway: Magnetic field (r = mv/BQ) and electric field work together in cyclotrons]", "source": "Qwen 3 ①", "_id": "qwen_1_52", "judge_pick": false}, {"question": "How does the nuclear model explain the stability of atoms? (4 steps)", "answer": "- Step 1: Nucleus contains protons and neutrons ⇒ stable arrangement\n- Step 2: Electromagnetic force between protons would cause repulsion\n- Step 3: Strong nuclear force overcomes electromagnetic repulsion\n- Step 4: Electrons in orbitals around nucleus ⇒ neutral overall\n\n[Note: Strong nuclear force acts only between adjacent nucleons]", "source": "Qwen 3 ①", "_id": "qwen_1_53", "judge_pick": false}, {"question": "What is pair production and what conservation laws apply? (5 steps)", "answer": "- Step 1: High-energy photon → particle-antiparticle pair\n- Step 2: Conservation of energy: E_photon = E_particle + E_antineutrino + K.E.\n- Step 3: Conservation of charge: 0 → +1 + -1 ⇒ 0 ✓\n- Step 4: Conservation of baryon/lepton numbers ⇒ particle-antiparticle cancel\n- Step 5: Must occur near nucleus (to conserve momentum)\n\n[Takeaway: Requires E ≥ 2mc² for particle-antiparticle pair]", "source": "Qwen 3 ①", "_id": "qwen_1_54", "judge_pick": false}, {"question": "How does the decay chain of ²³⁸₉₂U → ²⁰⁶₈₂Pb demonstrate conservation of baryon and lepton numbers? (5 steps)", "answer": "- Step 1: 8 alpha decays remove 16 protons and 16 neutrons\n- Step 2: 6 beta⁻ decays convert 6 neutrons to protons\n- Step 3: Total proton change: -16 + 6 = -10 (92 → 82) ✓\n- Step 4: Baryon number conserved at each step\n- Step 5: Lepton number conserved with neutrino emission\n\n[Takeaway: Both numbers conserved throughout entire decay chain]", "source": "Qwen 3 ①", "_id": "qwen_1_55", "judge_pick": false}, {"question": "What determines whether a nucleus undergoes alpha decay, beta decay, or gamma decay? (4 steps)", "answer": "- Step 1: Alpha decay for heavy nuclei (Z ≥ 83)\n- Step 2: Beta⁻ decay for high neutron-to-proton ratio\n- Step 3: Beta⁺ decay for low neutron-to-proton ratio\n- Step 4: Gamma decay for excited nucleus releasing excess energy\n\n[Note: Neutron-rich isotopes undergo beta⁻, neutron-poor beta⁺, heavy nuclei alpha]", "source": "Qwen 3 ①", "_id": "qwen_1_56", "judge_pick": false}, {"question": "How does the mass-energy equivalence principle relate to nuclear binding energy? (4 steps)", "answer": "- Step 1: Mass defect = sum of individual nucleon masses - actual nucleus mass\n- Step 2: Binding energy = mass defect × c²\n- Step 3: Energy released when nucleus forms\n- Step 4: Greater binding energy per nucleon means more stable nucleus\n\n[Takeaway: Binding energy explains where mass goes in nucleus]", "source": "Qwen 3 ①", "_id": "qwen_1_57", "judge_pick": false}, {"question": "What is the difference between ionization and excitation in radiation detection? (3 steps)", "answer": "- Step 1: Ionization removes electrons from atoms ⇒ creates ions\n- Step 2: Excitation raises electrons to higher energy levels ⇒ no ionization\n- Step 3: Radiation detectors use ionization to create pulses for counting\n\n[Takeaway: Ionization more detectable than excitation]", "source": "Qwen 3 ①", "_id": "qwen_1_58", "judge_pick": false}, {"question": "How does the nuclear model explain why atoms don't collapse? (4 steps)", "answer": "- Step 1: Nucleus contains positive charge and most mass\n- Step 2: Electrons orbit nucleus, not embedded in positive charge\n- Step 3: Electromagnetic attraction keeps electrons in orbit\n- Step 4: Quantum model explains why electrons don't spiral in (energy quantization)\n\n[Contrast: Plum pudding model couldn't explain stability]", "source": "Qwen 3 ①", "_id": "qwen_1_59", "judge_pick": false}, {"question": "What experimental evidence supports the nuclear model of the atom? (4 steps)", "answer": "- Step 1: Rutherford scattering showed some large deflections\n- Step 2: Large deflections implied small, dense, positive nucleus\n- Step 3: Most particles passed straight through ⇒ atom mostly empty space\n- Step 4: Backscattering only from high-Z materials ⇒ nucleus charge related to atomic number Z\n\n[Takeaway: Disproves plum pudding model]", "source": "Qwen 3 ①", "_id": "qwen_1_60", "judge_pick": false}], "count": 61}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the nuclear model of the atom described as \"mostly empty space with a dense, positively charged nucleus\"? (3 steps)", "answer": "- Step 1: The Rutherford scattering experiment showed most alpha particles passed straight through gold foil ⇒ atom is mostly empty space.  \n- Step 2: Some alpha particles deflected at large angles ⇒ small, dense, positively charged nucleus.  \n- Step 3: Electrons orbit the nucleus due to electrostatic attraction, but their mass is negligible compared to the nucleus.  \n\n**Takeaway:** The nucleus contains nearly all mass and positive charge; electrons occupy the remaining space.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Explain why a neutron has no charge but contributes to the nucleon number.", "answer": "Neutrons are quark-based particles (udd), with charges (+2/3 -1/3 -1/3) = 0. They bind the nucleus via the strong force. Nucleon number (A) counts protons + neutrons; neutrons stabilize heavy nuclei by spacing protons.  \n\n**Edge case:** Hydrogen-1 (no neutrons) is the only stable isotope with A = Z.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does beta-minus decay increase the proton number? (3 steps)", "answer": "- Step 1: A neutron (udd) converts to a proton (uud) via the weak nuclear force.  \n- Step 2: This emits a beta-minus particle (electron) and an antineutrino:  \nn → p + e⁻ + ν̄ₑ  \n- Step 3: The proton number (Z) increases by 1; nucleon number (A) stays the same.  \n\n**Misconception probe:** Why isn’t the emitted electron part of the nucleus? It’s created during the decay, not pre-existing.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does gamma radiation not change the element?", "answer": "Gamma decay releases excess energy from an excited nucleus (e.g., after alpha/beta decay). Since no particles are emitted, the proton and neutron count remains unchanged. The nucleus transitions to a lower energy state.  \n\n**Visual analogy:** Like a ball rolling down steps in a staircase (energy levels), releasing energy as it moves to a lower state.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Calculate the minimum photon energy (MeV) required for electron-positron pair production. (3 steps)", "answer": "- Step 1: Apply Einstein’s mass-energy equivalence: E_min = 2mc².  \n- Step 2: Use electron mass (9.11 × 10⁻³¹ kg):  \nE_min = 2 × (9.11 × 10⁻³¹) × (3 × 10⁸)² = 1.64 × 10⁻¹³ J.  \n- Step 3: Convert to MeV: 1.64 × 10⁻¹³ J ÷ 1.6 × 10⁻¹³ J/MeV ≈ 1.022 MeV.  \n\n**Why this matters:** This threshold explains why pair production doesn’t occur for photons below ~1.022 MeV.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Compare the ionizing power and penetration depth of alpha, beta, and gamma radiation. (3 steps)", "answer": "- Step 1: **Alpha** has high ionizing power (large charge +2, mass 4u) but low penetration (stopped by paper).  \n- Step 2: **Beta** has moderate ionizing power (charge -1, mass 0.0005u) and penetrates skin (stopped by aluminum).  \n- Step 3: **Gamma** has low ionizing power (no charge) but high penetration (requires thick lead/concrete to absorb).  \n\n**Visual intuition:** Alpha is like a cannonball (massive, easily blocked), gamma is like a laser beam (high penetration, subtle damage).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why must background radiation be subtracted from measured count rates?", "answer": "Background radiation includes environmental sources (cosmic rays, radon gas), which are always present. Subtracting it isolates the radiation from the source under study. For example, a Geiger counter reading 15 counts/minute at 1m distance is purely background.  \n\n**Real-world application:** In carbon dating, background radiation is calibrated to avoid overestimating sample age.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Balance this decay equation: ²¹⁰₈₄Po → ? + ⁴₂He", "answer": "- Step 1: Subtract 4 from mass number (A): 210 - 4 = 206.  \n- Step 2: Subtract 2 from proton number (Z): 84 - 2 = 82 ⇒ lead (Pb).  \n- Step 3: Final equation: ²¹⁰₈₄Po → ²⁰⁶₈₂Pb + ⁴₂He.  \n\n**Derivation check:** Z must balance (84 = 82 + 2) and A must balance (210 = 206 + 4).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does annihilation require two photons?", "answer": "- Step 1: Conservation of energy and momentum must hold.  \n- Step 2: A single photon would violate momentum conservation (zero net momentum before → non-zero after).  \n- Step 3: Two photons emitted in opposite directions conserve momentum.  \n\n**Equation:** e⁺ + e⁻ → 2γ.  \n\n**Why not 1 photon?** Momentum vectors must cancel; one photon would leave a net direction.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "How does a magnetic field separate alpha, beta, and gamma radiation? (3 steps)", "answer": "- Step 1: Radius of curvature r = mv/BQ.  \n- Step 2: **Alpha** (Q=+2, large m) → large r (deflected slightly).  \n- Step 3: **Beta** (Q=-1, m≈0) → small r (strong deflection). **Gamma** (Q=0) → no deflection.  \n\n**Practical use:** Cloud chambers use magnetic fields to identify particles by track curvature.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why does a proton have a baryon number of +1?", "answer": "Baryons are 3-quark particles (uud for proton, udd for neutron). Each quark has baryon number +1/3 ⇒ 3 × (+1/3) = +1. Antiprotons (anti-quarks) have baryon number -1.  \n\n**Contrast:** Mesons (quark-antiquark pairs) have baryon number 0.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": true}, {"question": "A radioactive sample has 1.2 × 10¹⁶ nuclei and activity 5.9 × 10⁵ Bq. Calculate the decay constant. (3 steps)", "answer": "- Step 1: Use A = λN ⇒ λ = A/N.  \n- Step 2: λ = (5.9 × 10⁵) / (1.2 × 10¹⁶) ≈ 4.9 × 10⁻¹¹ s⁻¹.  \n- Step 3: Convert to half-life: t½ ≈ ln(2)/λ ≈ 1.4 × 10¹⁰ s.  \n\n**Orders of magnitude:** Decay constants are often ~10⁻¹⁰ to 10⁻²⁰ s⁻¹ for naturally occurring isotopes.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why is the beta particle’s energy spectrum continuous?", "answer": "- Step 1: Beta decay releases variable energy between the electron and antineutrino.  \n- Step 2: Neutrinos carry away \"missing\" energy → beta particle energy varies.  \n- Step 3: This explained the historical confusion about energy non-conservation in beta decay.  \n\n**Historical context:** The neutrino hypothesis resolved the missing energy problem (Wolfgang Pauli).", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "Explain why lead-206 is stable in the uranium-238 decay series.", "answer": "- Step 1: Lead-206 has a magic number of protons (Z=82) and neutrons (124), giving a stable doubly magic nucleus.  \n- Step 2: Binding energy per nucleon peaks here, making further decay energetically unfavorable.  \n- Step 3: No more alpha/beta decays needed to reach stability.  \n\n**Limiting case:** Bismuth-209 was once thought stable but now known to decay via alpha (t½ ~1.9 × 10¹⁹ years).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Derive the half-life formula t½ = ln(2)/λ from N = N₀e⁻λt.", "answer": "- Step 1: At t½, N = N₀/2.  \n- Step 2: N₀/2 = N₀e⁻λt½ ⇒ ½ = e⁻λt½.  \n- Step 3: Take natural logs: ln(½) = -λt½ ⇒ -ln(2) = -λt½ ⇒ t½ = ln(2)/λ.  \n\n**Intuition:** A larger decay constant λ means faster decay → shorter half-life.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "A 5g sample of uranium-238 emits alpha particles. Why is its half-life unaffected by extreme temperatures?", "answer": "Radioactive decay is governed by the strong nuclear and weak nuclear forces, which are not influenced by thermal energy (kT ~ 0.025 eV vs nuclear binding ~MeV). Even at 1000°C, nuclear decay probabilities remain unchanged.  \n\n**Contrast:** Chemical reaction rates depend on temperature; radioactive decay does not.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "What distinguishes a neutrino from an antineutrino?", "answer": "Neutrinos have lepton number +1 (e.g., in beta-minus decay: ν̄ₑ emitted; in beta-plus decay: νₑ emitted). They are distinguishable by their interaction (e.g., νₑ vs ν̄ₑ in inverse beta decay).  \n\n**Why it matters:** Lepton number conservation requires matching neutrino type to decay process.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How does a Geiger-Muller tube detect radiation?", "answer": "- Step 1: Radiation ionizes gas molecules between the tube’s electrodes.  \n- Step 2: Released electrons accelerate toward the anode, causing an avalanche of secondary ions.  \n- Step 3: The resulting pulse is counted as a \"click.\"  \n\n**Limitation:** Cannot distinguish radiation types (e.g., alpha vs beta).", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why does alpha radiation require heavy nuclei to occur?", "answer": "- Step 1: Alpha decay needs a Coulomb barrier low enough for quantum tunneling.  \n- Step 2: Heavier nuclei (Z > 82) have larger Coulomb repulsion → lower binding energy per nucleon.  \n- Step 3: Helium-4 (high binding energy) is the most stable light nucleus to emit.  \n\n**Counterexample:** Helium-4 doesn’t alpha-decay; stability is already maximal.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "A proton (uud) and antiproton (ūūđ) annihilate. What conservation laws apply?", "answer": "- Step 1: Charge: +1 (proton) + (-1) (antiproton) → 0 (photons).  \n- Step 2: Baryon number: +1 + (-1) = 0.  \n- Step 3: Energy: mc² → photon energy (E = 2mc²).  \n\n**Why not mesons?** Meson production requires specific conditions (e.g., pair production in nuclei).", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In the notation ᴬᶻX, what do the top number (A) and bottom number (Z) represent? (2 steps)", "answer": "- Step 1: The top number A is the **nucleon number** (or mass number), representing the total number of protons AND neutrons in the nucleus.\n- Step 2: The bottom number Z is the **proton number** (or atomic number), representing the total number of protons in the nucleus. This defines which element the atom is.\n\nThis notation is essential for balancing nuclear decay equations.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is an isotope, and how do isotopes of the same element differ? (2 steps)", "answer": "- Step 1: An isotope is an atom of the same element (same proton number Z) that has a different number of neutrons.\n- Step 2: Since the number of protons determines the element, isotopes have identical chemical properties but different mass. For example, carbon-12 and carbon-14 both have Z = 6 (6 protons), but carbon-12 has 6 neutrons while carbon-14 has 8 neutrons.\n\nIsotopes are written as: element name-mass number, e.g., uranium-238, carbon-14.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Describe the key observations from Rutherford's alpha particle scattering experiment and what they revealed about atomic structure. (3 steps)", "answer": "- Step 1: Most alpha particles passed straight through the gold foil without deflection → the atom is **mostly empty space**.\n- Step 2: Some alpha particles deflected through small angles (< 10°) → there's a **positive nucleus** at the center that repels the positive alpha particles.\n- Step 3: A small number bounced straight back at angles > 90° → the nucleus is **extremely small and dense**, containing most of the atom's mass and all its positive charge.\n\nThis established the **nuclear model of the atom**: a small dense positive nucleus surrounded by orbiting electrons.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "An alpha particle is emitted from a radioactive nucleus. Describe its composition, charge, and mass. (2 steps)", "answer": "- Step 1: An alpha particle (⁴₂α) consists of **2 protons and 2 neutrons** — exactly the nucleus of a helium-4 atom. It has no electrons.\n- Step 2: The charge is **+2** (since 2 protons), and the relative mass is **4** (2 + 2 nucleons).\n\nAlpha particles are the most massive type of nuclear radiation.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A beta-minus particle (β⁻) is emitted during radioactive decay. What is it physically, and why does it come from the nucleus even though electrons aren't normally in the nucleus? (2 steps)", "answer": "- Step 1: A beta-minus particle is a **fast-moving electron** (⁰₋₁β), with charge -1 and essentially zero mass (relative mass ~0, actual mass ≈ 1/2000 of a proton).\n- Step 2: It originates when a neutron inside the nucleus converts into a proton, releasing an electron in the process: n → p + e⁻. This is due to the quark structure of nucleons (down quark → up quark + electron).\n\nThis is why beta decay increases the proton number by 1 while leaving the mass number unchanged.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is a gamma ray (γ), and what are its key properties compared to alpha and beta particles? (2 steps)", "answer": "- Step 1: A gamma ray (⁰₀γ) is **high-energy electromagnetic radiation** — a photon with no mass and no charge.\n- Step 2: Unlike alpha and beta, gamma rays:\n  - Have **zero mass** and **zero charge**\n  - Travel at the speed of light\n  - Have **very low ionizing power** (poor at removing electrons)\n  - Have **extremely high penetrating power** (reduced by lead, not fully stopped)\n\nGamma decay releases excess nuclear energy without changing A or Z.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation in order of: (a) penetrating power, (b) ionizing power. Explain why they differ. (3 steps)", "answer": "- Step 1: **Penetrating power (highest to lowest):** Gamma > Beta > Alpha\n  - Alpha: stopped by paper/skin (3-10 cm in air)\n  - Beta: stopped by aluminum (~1 m in air)\n  - Gamma: reduced by lead (hundreds of km in air)\n- Step 2: **Ionizing power (highest to lowest):** Alpha > Beta > Gamma\n  - Alpha: large (+2) charge, massive → strongly ionizes, loses energy quickly\n  - Beta: smaller (-1) charge, less mass → moderate ionization\n  - Gamma: no charge, no mass → weakly ionizes, loses energy slowly\n- Step 3: The key difference is charge and mass. Alpha has the most charge and mass → strongest interaction with atoms but can't go far. Gamma has none → weakly interacts but penetrates far.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Write the general nuclear decay equation for alpha decay. If a uranium-238 nucleus (²³⁸₉₂U) undergoes alpha decay, what is the resulting nucleus? (2 steps)", "answer": "- Step 1: General alpha decay: ᴬᶻX → ᴬ⁻⁴ᶻ⁻²Y + ⁴₂α\n  - The parent nucleus loses 2 protons (Z decreases by 2) and 4 nucleons (A decreases by 4).\n- Step 2: For ²³⁸₉₂U:\n  - New Z = 92 - 2 = 90\n  - New A = 238 - 4 = 234\n  - The daughter nucleus is ²³⁴₉₀Th (Thorium-234)\n\nAlways balance both the top numbers (A) and bottom numbers (Z)!", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Write the general nuclear decay equation for beta-minus (β⁻) decay. If carbon-14 (¹⁴₆C) undergoes beta-minus decay, what is the resulting nucleus? (2 steps)", "answer": "- Step 1: General beta-minus decay: ᴬᶻX → ᴬᶻ⁺¹Y + ⁰₋₁β + ν̄ₑ\n  - A neutron converts to a proton, so Z **increases by 1**, but A stays the same.\n  - An electron (β⁻) and antineutrino are emitted.\n- Step 2: For ¹⁴₆C:\n  - New Z = 6 + 1 = 7\n  - New A = 14 (unchanged)\n  - The daughter nucleus is ¹⁴₇N (Nitrogen-14)\n\n**Common trap:** Remember Z increases in β⁻ decay (neutron → proton), unlike alpha where Z decreases!", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is the difference between beta-minus (β⁻) and beta-plus (β⁺) decay? (2 steps)", "answer": "- Step 1: **Beta-minus (β⁻)**: A neutron converts to a proton, emitting an electron (⁰₋₁β) and antineutrino (ν̄ₑ). Proton number **increases** by 1.\n  - Example: n → p + e⁻ + ν̄ₑ\n- Step 2: **Beta-plus (β⁺)**: A proton converts to a neutron, emitting a positron (⁰₊₁β) and neutrino (νₑ). Proton number **decreases** by 1.\n  - Example: p → n + e⁺ + νₑ\n\nBeta-plus decay requires energy (like electron capture) since proton mass < neutron mass.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Does gamma decay change the nucleon number (A) or proton number (Z) of the nucleus? Explain why gamma radiation is emitted. (2 steps)", "answer": "- Step 1: **Neither A nor Z changes** in gamma decay. The equation is ᴬᶻX* → ᴬᶻX + ⁰₀γ, where X* represents an excited nucleus.\n- Step 2: Gamma rays are emitted when a nucleus has excess energy (is \"excited\") after alpha or beta decay. The nucleus releases this energy as a high-frequency photon (gamma ray) to become more stable, but the number of protons and neutrons remains the same.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is background radiation, and what are the main natural sources? (2 steps)", "answer": "- Step 1: Background radiation is the **low-level radiation from environmental sources** always present around us. A Geiger counter will always show some counts (~15-30 counts per minute) even with no radioactive source present.\n- Step 2: Main natural sources include:\n  - **Radon gas** from rocks and soil (from uranium/thorium decay)\n  - **Cosmic rays** from space (high-energy protons colliding with atmosphere)\n  - **Carbon-14** in organic material\n  - **Potassium-40** in foods (bananas contain trace amounts)\n\nMan-made sources include medical X-rays, nuclear waste, and fallout.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Why must background radiation be subtracted when measuring radioactivity in a lab experiment? How would you calculate the corrected count rate? (2 steps)", "answer": "- Step 1: Background radiation comes from natural sources and is always present, so it adds to your measurement even when there's no radioactive sample. If you don't account for it, your readings will be artificially high.\n- Step 2: The **corrected count rate** = measured count rate − background count rate.\n  - Example: If your source measurement is 500 counts/min and background is 20 counts/min, the corrected rate is 500 − 20 = 480 counts/min.\n\nAlways measure background first, with no radioactive source present!", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What does it mean that radioactive decay is \"random\" and \"spontaneous\"? Can environmental factors like temperature affect decay rates? (2 steps)", "answer": "- Step 1: **Random**: We cannot predict when any specific nucleus will decay — each decay is an independent random event. However, with large numbers of nuclei, we can statistically predict the overall behavior.\n- Step 2: **Spontaneous**: Decay cannot be influenced by external factors. Temperature, pressure, chemical state, or electromagnetic fields have **no effect** on decay rates. A radioactive atom will decay regardless of its environment.\n\nThis is fundamentally different from chemical reactions, which depend on environmental conditions.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Define the activity of a radioactive sample and its unit. If a sample has an activity of 1000 Bq, what does this mean physically? (2 steps)", "answer": "- Step 1: Activity (A) is the **rate at which nuclei decay** in a radioactive sample. The SI unit is the **becquerel (Bq)**, where 1 Bq = 1 decay per second.\n- Step 2: An activity of 1000 Bq means **1000 nuclei are decaying each second**, on average. Note that this is an average — the actual number fluctuates randomly around this value.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Define half-life. If a radioactive isotope has a half-life of 30 minutes, what happens to the activity after 90 minutes? (2 steps)", "answer": "- Step 1: **Half-life (t½)** is the time taken for half the nuclei in a sample to decay (or for the activity to halve).\n- Step 2: After 90 minutes (which is 3 half-lives):\n  - After 1 half-life (30 min): activity = ½ A₀\n  - After 2 half-lives (60 min): activity = ¼ A₀\n  - After 3 half-lives (90 min): activity = ⅛ A₀\n\nSo after 90 minutes, the activity is **one-eighth of the original**.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "The decay constant λ is defined as the probability per second that a given nucleus will decay. How is activity related to the decay constant and the number of undecayed nuclei N? (2 steps)", "answer": "- Step 1: The relationship is: **A = λN**\n  - A = activity (Bq)\n  - λ = decay constant (s⁻¹)\n  - N = number of undecayed nuclei\n- Step 2: This shows that activity is directly proportional to both the decay constant (higher λ = faster decay) and the number of remaining nuclei. As N decreases over time, A decreases exponentially.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Show how half-life t½ is related to the decay constant λ. If λ = 0.05 s⁻¹, what is the half-life? (2 steps)", "answer": "- Step 1: The relationship is: **t½ = ln(2) / λ ≈ 0.693 / λ**\n- Step 2: For λ = 0.05 s⁻¹:\n  - t½ = 0.693 / 0.05 = **13.86 seconds**\n\nThis shows that a larger decay constant means a shorter half-life (they are inversely proportional).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In the Standard Model of particle physics, what is the fundamental difference between hadrons and leptons? (2 steps)", "answer": "- Step 1: **Hadrons** are particles made of **quarks** that interact via the **strong nuclear force**. They include baryons (3 quarks, e.g., proton, neutron) and mesons (quark-antiquark pair, e.g., pion).\n- Step 2: **Leptons** are **fundamental particles** (not made of quarks) that do **not** interact via the strong force. Examples: electron (e⁻), muon (μ⁻), neutrino (ν). Leptons interact via the weak, electromagnetic, and gravitational forces.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What are the charges of the up quark and down quark? Show how protons and neutrons are composed of these quarks. (2 steps)", "answer": "- Step 1: **Up quark (u)**: charge = +⅔e; **Down quark (d)**: charge = −⅓e\n- Step 2: \n  - **Proton (p⁺)**: uud → (+⅔) + (+⅔) + (−⅓) = +1e ✓\n  - **Neutron (n⁰)**: udd → (+⅔) + (−⅓) + (−⅓) = 0e ✓\n\nThis explains why changing a down quark to an up quark (or vice versa) changes a neutron to a proton or proton to neutron.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What is antimatter? How does the positron differ from the electron, and what is the antiproton? (2 steps)", "answer": "- Step 1: Every particle has a corresponding **antiparticle** with the **same mass** but **opposite charge**. Antimatter is not science fiction — it's real physics!\n- Step 2: Examples:\n  - **Electron (e⁻)**: charge −1, mass 9.11 × 10⁻³¹ kg\n  - **Positron (e⁺)**: charge +1, same mass\n  - **Proton (p⁺)**: charge +1\n  - **Antiproton (p̄)**: charge −1, same mass\n\nNeutral particles like photons are their own antiparticles.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What happens when a particle meets its antiparticle? Explain why this is called \"annihilation\" and what is produced. (2 steps)", "answer": "- Step 1: When a particle and its antiparticle meet, they **destroy each other** completely. This is called **annihilation**.\n- Step 2: Their combined mass is converted into energy, typically producing **two gamma-ray photons** emitted in opposite directions to conserve momentum. For an electron-positron pair: E = 2mc² ≈ 1.022 MeV (the threshold energy for pair production).\n\nThis is why matter and antimatter cannot coexist!", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is pair production? Why must a photon have a minimum energy to produce a particle-antiparticle pair? (2 steps)", "answer": "- Step 1: **Pair production** is the reverse of annihilation: a high-energy photon converts into a particle-antiparticle pair (e.g., electron + positron).\n- Step 2: Energy must be conserved. The photon must provide at least the **rest-mass energy** of both particles: **E ≥ 2mc²**. For electron-positron: 2 × 0.511 MeV = **1.022 MeV**. Below this threshold, pair production cannot occur.\n\nPair production requires a nearby nucleus to absorb excess momentum.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In particle physics, what quantum numbers are always conserved in interactions? List at least three. (2 steps)", "answer": "- Step 1: The following are **always conserved** in particle interactions:\n  - **Charge (Q)**: Total charge before = total charge after\n  - **Baryon number (B)**: Baryons = +1, antibaryons = −1, mesons/leptons = 0\n  - **Lepton number (L)**: Leptons = +1, antileptons = −1, non-leptons = 0\n- Step 2: Also conserved: energy, momentum, and sometimes other quantum numbers (like strangeness in certain weak interactions).\n\nIf any of these aren't conserved, the interaction is **forbidden** by the laws of physics.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In beta-minus decay (n → p + e⁻ + ν̄ₑ), how is charge conserved? How is lepton number conserved? (2 steps)", "answer": "- Step 1: **Charge conservation**: neutron (0) → proton (+1) + electron (−1) + antineutrino (0). Total: 0 = +1 + (−1) + 0. ✓\n- Step 2: **Lepton number conservation**: neutron (L=0) → proton (L=0) + electron (L=+1) + antineutrino (L=−1). Total: 0 = 0 + 1 + (−1). ✓\n\nThe antineutrino is essential to conserve lepton number in β⁻ decay!", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A charged particle moves in a circular path when entering a uniform magnetic field perpendicular to its velocity. Why does this happen, and what determines the radius of the path? (2 steps)", "answer": "- Step 1: The magnetic force on a moving charge is always **perpendicular** to its velocity, providing the **centripetal force** that makes it move in a circle (no work done, speed constant).\n- Step 2: The radius is given by: **r = mv / (Bq) = p / (Bq)**\n  - Larger momentum (mv) → larger radius\n  - Stronger magnetic field (B) → smaller radius\n  - Larger charge (q) → smaller radius\n\nThis principle is used in particle detectors and cyclotrons.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In a cloud chamber photograph, two charged particle tracks spiral away from each other with the same radius. What does this tell you about the particles? (2 steps)", "answer": "- Step 1: The tracks starting from the same point indicate **pair production** — a photon (uncharged) has created a particle-antiparticle pair.\n- Step 2: Since they have the **same radius**, they must have the **same mass and momentum**. Since they spiral in **opposite directions**, they must have **opposite charges**. This is the signature of matter-antimatter pair creation.\n\nThe direction of curvature also reveals which is positive and which is negative (using Fleming's left-hand rule).", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What is thermionic emission, and how is it used to produce electron beams in particle accelerators? (2 steps)", "answer": "- Step 1: **Thermionic emission** is when heating a metal gives electrons enough thermal energy to escape the metal surface. This produces a beam of electrons.\n- Step 2: These electrons can then be **accelerated** by electric fields (across a potential difference V) to gain kinetic energy: **KE = eV**. In electron guns, electrons accelerated across 5 kV reach speeds ~4.2 × 10⁷ m/s.\n\nThis is the principle behind linear accelerators (linacs) and cathode ray tubes.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the difference between a linear accelerator (linac) and a cyclotron? (2 steps)", "answer": "- Step 1: A **linear accelerator (linac)** accelerates charged particles in a **straight line** using electric fields between successive cylindrical tubes. Each tube is longer than the previous one because particles speed up.\n- Step 2: A **cyclotron** accelerates particles in a **spiral path** using both electric fields (to accelerate across a gap) and magnetic fields (to keep particles moving in circles). The particles spiral outward as they gain energy.\n\nCyclotrons are more compact for the same energy; linacs can reach higher energies.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the uranium-238 decay series, the nucleus undergoes alpha decay, then two successive beta-minus decays, returning to uranium-238 (but as a different isotope). Explain what an isotope is in this context. (2 steps)", "answer": "- Step 1: After the sequence U-238 (²³⁸₉₂U) → α → ²³⁴₉₀Th → β⁻ → ²³⁴₉₁Pa → β⁻ → ²³⁴₉₂U, we return to uranium with the **same proton number (Z = 92)** but a **different nucleon number (A = 234)**.\n- Step 2: This is an **isotope** of uranium — the same element (same Z) but with a different number of neutrons. Isotopes have identical chemical properties but different atomic masses.\n\nThe decay chain shows how radioactive elements transform through different isotopes until reaching a stable nucleus (lead-206).", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A radioactive source has a half-life of 5 minutes. You measure its activity as 800 Bq at 10:00 AM. What will be the activity at 10:15 AM? Explain your reasoning. (3 steps)", "answer": "- Step 1: From 10:00 to 10:15 is 15 minutes, which is **3 half-lives** (3 × 5 = 15 min).\n- Step 2: After each half-life, the activity halves:\n  - After 1 half-life: 800 × ½ = 400 Bq\n  - After 2 half-lives: 400 × ½ = 200 Bq\n  - After 3 half-lives: 200 × ½ = **100 Bq**\n- Step 3: Alternatively, use A = A₀ × (½)^(n) where n = number of half-lives: 800 × (½)³ = 800 × ⅛ = **100 Bq**", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Why can muons created in the upper atmosphere (at ~10 km altitude) be detected at sea level, even though their lifetime is only about 2 μs? (2 steps)", "answer": "- Step 1: At rest, muons would travel only d = c × t ≈ (3 × 10⁸) × (2 × 10⁻⁶) ≈ 600 m — far less than 10 km.\n- Step 2: However, muons are created with speeds ~0.99c (relativistic). Due to **time dilation**, their lifetime is dilated: t' = t / √(1 − v²/c²). At 0.99c, the dilated lifetime is ~14 μs, allowing them to travel ~4 km. **Length contraction** of the atmosphere also helps.\n\nThis is direct experimental evidence for special relativity!", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why is lead used as shielding against gamma radiation, while paper is sufficient for alpha radiation? (2 steps)", "answer": "- Step 1: **Alpha particles** are heavy (+2 charge), strongly ionize, and lose energy quickly. They can't penetrate more than a few centimeters of air or a sheet of paper. The dense electron clouds in paper easily stop them.\n- Step 2: **Gamma rays** have no charge and interact weakly with matter. They lose energy gradually through photoelectric effect, Compton scattering, and pair production. Lead is dense with many electrons per unit volume, increasing the probability of these interactions. Even so, gamma rays aren't fully stopped — just attenuated.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Rutherford's scattering experiment, why did the gold foil need to be extremely thin? (1 step)", "answer": "The gold foil had to be only a few hundred atoms thick because alpha particles lose energy and scatter multiple times in thicker materials. If the foil were thick, the scattering pattern would be blurred and wouldn't clearly show the small-angle deflections that revealed the nucleus. Thin foil ensures most alpha particles pass through with minimal interference.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the \"plum pudding\" model of the atom, and why was it disproven by Rutherford's experiment? (2 steps)", "answer": "- Step 1: The **plum pudding model** (J.J. Thomson) proposed that negative electrons were embedded in a uniform sphere of positive charge, like \"currants in a pudding.\"\n- Step 2: If this were true, alpha particles fired at the foil should pass through with only slight deflection (the positive charge was spread out). However, Rutherford observed some alpha particles bouncing straight back (> 90°), proving the positive charge was concentrated in a tiny, massive nucleus. The plum pudding model was disproven.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Convert 1 atomic mass unit (u) to energy in MeV. Given 1 u ≈ 1.661 × 10⁻²⁷ kg, show why 1 u ≈ 931.5 MeV/c². (2 steps)", "answer": "- Step 1: Using E = mc²: E = (1.661 × 10⁻²⁷ kg) × (3 × 10⁸ m/s)² = 1.4949 × 10⁻¹⁰ J\n- Step 2: Convert to MeV: 1 eV = 1.6 × 10⁻¹⁹ J, so 1 J = 6.25 × 10¹⁸ eV\n  - E = 1.4949 × 10⁻¹⁰ J = 1.4949 × 10⁻¹⁰ × 6.25 × 10¹⁸ eV = 9.34 × 10⁸ eV = **934 MeV**\n- Using more precise values gives **931.5 MeV/c²**.\n\nThis is why particle physicists use MeV/c² as a convenient mass unit.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A gamma ray photon with energy 2.0 MeV passes near a nucleus and produces an electron-positron pair. Is this possible? Explain. (2 steps)", "answer": "- Step 1: The minimum energy required to create an electron-positron pair is **2mc² = 2 × 0.511 MeV = 1.022 MeV**.\n- Step 2: Since 2.0 MeV > 1.022 MeV, this process **is possible**. The excess energy (2.0 − 1.022 = 0.978 MeV) becomes kinetic energy of the electron and positron. If the photon had energy < 1.022 MeV, pair production would be impossible.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In beta-plus decay, a proton effectively converts to a neutron. Why can't a free proton at rest undergo beta-plus decay? (2 steps)", "answer": "- Step 1: A free proton is lighter than a neutron (proton mass ≈ 938.3 MeV/c², neutron mass ≈ 939.6 MeV/c²).\n- Step 2: Beta-plus decay would require: p → n + e⁺ + νₑ. This requires extra energy (≈ 1.8 MeV) to create the heavier neutron and positron. Since a free proton has no external energy source, it cannot spontaneously undergo beta-plus decay. However, inside a nucleus where proton-to-neutron conversion can be energetically favorable (due to nuclear binding energy), beta-plus decay occurs.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Why are neutrinos so difficult to detect, yet they're essential in particle physics? (2 steps)", "answer": "- Step 1: Neutrinos have **no charge, almost zero mass**, and interact via only the weak force (not electromagnetic or strong). This means they rarely interact with matter — billions pass through your body every second without any interaction.\n- Step 2: Despite being hard to detect, neutrinos are essential for **conserving lepton number** in beta decay (they carry away \"missing\" energy and momentum). Their existence was hypothesized to explain the continuous beta energy spectrum, and they were later experimentally detected.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Explain why cosmic rays (from the sun and deep space) contribute to background radiation. What happens when high-energy cosmic protons hit the Earth's atmosphere? (2 steps)", "answer": "- Step 1: The sun and supernovae emit high-energy protons and other particles (cosmic rays) that travel through space. When these hit the Earth's atmosphere, they collide with atmospheric molecules.\n- Step 2: These collisions produce **secondary radiation**, including gamma rays, muons, and other particles. This adds to natural background radiation. At high altitudes (e.g., airplane cruising height), cosmic ray exposure is significantly higher.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "In a particle track detector, a track spirals inward with decreasing radius. What does this tell you about the particle? (2 steps)", "answer": "- Step 1: A **decreasing radius** means the particle is **losing momentum** as it travels.\n- Step 2: This happens because the particle is **ionizing** atoms in the detector medium, losing kinetic energy with each ionization. The decreasing kinetic energy means decreasing momentum, hence smaller radius (r = p/Bq). The direction of curvature also reveals the charge sign.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What is the quark composition of a pion (π⁺) and a kaon (K⁺)? What type of hadron are they? (2 steps)", "answer": "- Step 1: Both are **mesons** (quark-antiquark pairs):\n  - **Pion (π⁺)**: up quark + anti-down quark (u(d̄))\n  - **Kaon (K⁺)**: up quark + anti-strange quark (u(s̄))\n- Step 2: Mesons have **baryon number 0** (quark + antiquark cancel). They mediate the strong force between nucleons and are typically short-lived.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Why can't individual quarks exist in isolation (never found alone)? (1 step)", "answer": "The **strong nuclear force** between quarks doesn't decrease with distance (unlike electromagnetism). As you try to pull quarks apart, the energy in the field increases and eventually converts into new quark-antiquark pairs (creating new hadrons). This is called **confinement** — you can never isolate a single quark.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In the Standard Model, what are the three generations of fundamental fermions? Why do we rarely encounter second and third generation particles in everyday life? (2 steps)", "answer": "- Step 1: The three generations are:\n  - **Generation 1**: up/down quark, electron, electron neutrino\n  - **Generation 2**: charm/strange quark, muon, muon neutrino\n  - **Generation 3**: top/bottom quark, tau, tau neutrino\n- Step 2: Higher-generation particles are **unstable** and decay rapidly into first-generation particles (e.g., muon → electron + neutrinos). They only exist briefly in cosmic rays or particle accelerators. Everyday matter (atoms) contains only first-generation particles.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A student measures the count rate from a radioactive source at different distances. The readings don't drop to zero even at large distances. Why? How would they find the background radiation level? (2 steps)", "answer": "- Step 1: The count rate never drops to zero because of **background radiation** — natural radiation from the environment (cosmic rays, radon, trace radioactive materials in walls, etc.).\n- Step 2: To find the background level, measure the count rate **without any source** present, at a distance far enough that the source's radiation doesn't reach the detector. The reading at large distances (where source radiation is fully absorbed) represents the background. Subtract this from all source measurements.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Why is radon gas a particular health concern for indoor air? (1 step)", "answer": "Radon is a **naturally occurring radioactive gas** produced by the decay of uranium in rocks and soil. It can seep into buildings through foundations. Being a gas, it can be **inhaled**, and its decay products (alpha emitters) can lodge in lung tissue, causing radiation damage and increasing cancer risk. It's the largest natural source of background radiation exposure for most people.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What is the difference between a hadron, a baryon, and a meson? Give one example of each. (2 steps)", "answer": "- Step 1: \n  - **Hadrons** are particles made of quarks that feel the strong force\n  - **Baryons** are hadrons made of **3 quarks** (e.g., proton = uud, neutron = udd)\n  - **Mesons** are hadrons made of a **quark-antiquark pair** (e.g., pion)\n- Step 2: Baryons have baryon number +1; antibaryons have −1. Mesons have baryon number 0.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In particle physics, what is meant by \"conservation of baryon number\"? How does this explain why a proton cannot decay into a positron and a photon? (2 steps)", "answer": "- Step 1: **Baryon number** must be the same before and after any interaction. Protons have B = +1; positrons, photons, and neutrinos all have B = 0.\n- Step 2: If p → e⁺ + γ, the left side has B = +1, but the right side has B = 0. This **violates baryon number conservation**, so this decay is forbidden. The proton is (so far) observed to be absolutely stable.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Explain why alpha particles have exactly 4 as their mass number and +2 as their charge, while beta particles have 0 mass and −1 charge, in nuclear notation. (2 steps)", "answer": "- Step 1: The **mass number (top)** is protons + neutrons:\n  - Alpha: 2p + 2n = 4 ✓\n  - Beta: electron mass ≈ 1/2000 proton mass → treated as 0\n- Step 2: The **atomic number (bottom)** is the **charge**:\n  - Alpha: 2 protons → +2\n  - Beta: electron charge → −1\n  - Gamma: photon has no charge → 0\n\nThis notation allows us to balance nuclear equations systematically.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "In a cloud chamber, you observe tracks from two particles with opposite charge but identical curvature radius. What can you conclude? (2 steps)", "answer": "- Step 1: **Opposite charge** (opposite curvature direction in magnetic field) but **identical radius** implies they have the **same mass and momentum** (since r = p/Bq).\n- Step 2: This is the signature of a **particle-antiparticle pair** created from an uncharged initial state (like pair production). The equal mass is a consequence of CPT symmetry — matter and antimatter have identical masses.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Why do particle physicists use electronvolts (eV) as a convenient unit of energy, and what does 1 GeV/c² represent? (2 steps)", "answer": "- Step 1: In particle physics, energies and masses are tiny. 1 eV = 1.6 × 10⁻¹⁹ J is convenient because it's the energy gained by an electron accelerated through 1 volt.\n- Step 2: Since E = mc², mass can be expressed in energy units divided by c². **1 GeV/c²** = (1 × 10⁹ eV)/(c²) ≈ 1.78 × 10⁻²⁷ kg. This is convenient: a proton (~938 MeV) is ~1 GeV/c². This avoids constantly converting between kg and MeV/c².", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "If you start with 16,000 radioactive atoms with a half-life of 2 hours, how many atoms remain after 6 hours? After how many half-lives does a sample become essentially non-radioactive? (2 steps)", "answer": "- Step 1: 6 hours = 3 half-lives (3 × 2 hr).\n  - After 1 half-life: 16,000 → 8,000\n  - After 2 half-lives: 8,000 → 4,000\n  - After 3 half-lives: 4,000 → **2,000 atoms**\n- Step 2: Radioactivity never truly reaches zero (exponential decay approaches zero asymptotically). After **7-10 half-lives**, activity drops to < 1% of original — effectively \"non-radioactive\" for practical purposes, though technically never zero.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "Why is it dangerous to handle radioactive sources with bare hands, but safe to hold a sealed alpha-emitting source? (2 steps)", "answer": "- Step 1: **Alpha particles** can't penetrate skin (stopped by ~0.1 mm of tissue). A sealed source (like Am-241 in smoke detectors) is safe because the alpha particles never escape the container.\n- Step 2: However, **ingesting or inhaling** alpha-emitting material is extremely dangerous because the source is directly in contact with living tissue. Additionally, some decays produce beta or gamma that can penetrate. Always use tongs and follow safety procedures!", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "What is the relationship between activity A, number of nuclei N, and time t in radioactive decay? Write the exponential decay equation. (2 steps)", "answer": "- Step 1: The number of undecayed nuclei follows: **N = N₀e^(−λt)**, where N₀ is initial number, λ is decay constant, t is time.\n- Step 2: Since activity A = λN, we also have **A = A₀e^(−λt)**. The activity (and number of nuclei) decreases exponentially with time, never reaching zero but getting arbitrarily close.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "In a particle detector, the radius of a charged particle's track is measured. How can you use this to estimate the particle's momentum? (1 step)", "answer": "From r = p/(Bq), the **momentum p = Bqr**. In a known magnetic field B, measuring the radius r of curvature directly gives the momentum. Larger radius → higher momentum. This is how particle physicists identify particles — momentum + charge + energy measurements combine to identify what the particle is.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "What evidence shows that the neutron has no net electric charge? (1 step)", "answer": "A neutron isn't deflected by electric fields. In a uniform electric field between charged plates, neutrons travel in a straight line while charged particles (electrons, protons, alpha particles) deflect. Additionally, neutral atoms with equal numbers of protons and electrons are electrically neutral — if neutrons had significant charge, atoms wouldn't be neutral.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "Why do some radioactive materials have half-lives of billions of years while others have half-lives of fractions of a second? (1 step)", "answer": "The half-life depends on how \"unstable\" the nucleus is — essentially how likely it is to decay. Very heavy nuclei (like uranium) are
