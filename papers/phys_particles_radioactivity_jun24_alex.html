pus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "Why is mass sometimes expressed in units of $$\\text{MeV}/c^2$$ or $$\\text{GeV}/c^2$$ in particle physics?", "answer": "From Einstein's $$E = mc^2$$, we get $$m = E/c^2$$. If we express energy in MeV and divide by $$c^2$$, we get a unit of mass: $$\\text{MeV}/c^2$$. This unit is convenient because particle physicists routinely create mass from energy (pair production) and convert mass to energy (annihilation), so working in the same family of units saves conversions. For instance, a proton's mass is approximately $$1\\,\\text{GeV}/c^2$$ — far easier to remember than $$1.67 \\times 10^{-27}$$ kg. To convert: $$1\\,\\text{GeV}/c^2 \\approx 1.78 \\times 10^{-27}$$ kg.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "When an electron is accelerated from rest through a potential difference $$V$$, how do you relate its final kinetic energy to $$V$$, and why? (2 steps)", "answer": "- Step 1: The work done by the electric field on the electron is $$W = QV$$, where $$Q$$ is the charge. For an electron, $$Q = e$$.\n- Step 2: All this work becomes kinetic energy (assuming no losses), so $$\\tfrac{1}{2}m v^2 = eV$$. Rearranging gives the speed $$v = \\sqrt{2eV/m}$$.\n\nConceptually: voltage is \"energy per charge\"; accelerating one electron through $$V$$ volts gives it $$eV$$ joules of kinetic energy. This is why eV is such a natural unit — it directly matches the experimental setup.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "A photon and a neutron have the same momentum. Do they have the same de Broglie wavelength? Explain.", "answer": "Yes. The de Broglie relation $$\\lambda = h/p$$ depends only on momentum, not on mass or particle type. Whether the particle is a massless photon or a massive neutron, equal momenta give equal wavelengths. The interesting twist: for the photon, momentum and energy are related by $$E = pc$$; for the neutron at non-relativistic speeds, $$E = p^2/(2m)$$. So equal momentum means very different energies — but the wavelength is the same.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Quick sanity check: in the decay $$^{226}_{88}\\text{Ra} \\to {}^{?}_{?}? + {}^{4}_{2}\\alpha$$, what is the daughter, and what would the count rate of *alphas* from a sealed Ra-226 sample do if you wrapped it in a single sheet of paper? (2 steps)", "answer": "- Step 1: Conserving nucleon and proton number: $$A = 226-4 = 222$$, $$Z = 88-2 = 86$$. The daughter is $$^{222}_{86}\\text{Rn}$$ (radon).\n- Step 2: Paper would stop *all* of the alphas, because alphas are stopped by even a few centimetres of air or a thin sheet of paper. The detected count rate would drop essentially to background levels — there'd be essentially no alpha signal getting through.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "In the U-238 decay chain, you see two consecutive beta-minus decays followed by an alpha. What happens to $$Z$$ and $$A$$ overall? (3 steps)", "answer": "- Step 1: $$\\beta^-$$: $$A$$ unchanged, $$Z$$ up by $$1$$. Twice: $$A$$ unchanged, $$Z$$ up by $$2$$ total.\n- Step 2: Then alpha: $$A$$ down by $$4$$, $$Z$$ down by $$2$$.\n- Step 3: Net: $$\\Delta A = -4$$, $$\\Delta Z = +2 - 2 = 0$$. The element returns to the same $$Z$$ as before the two betas, but $$4$$ mass units lighter — i.e., a *different isotope of the original element*.\n\nThis is exactly why U-238 momentarily becomes U-234 (a lighter isotope of uranium) partway through the chain.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "A proposed reaction is $$p + p \\to p + p + \\pi^+$$. Check whether it's allowed using charge and baryon number. (3 steps)", "answer": "- Step 1: **Charge:** LHS $$= 1 + 1 = 2$$. RHS $$= 1 + 1 + 1 = 3$$. Not balanced — charge not conserved!\n- Step 2: **Baryon number:** LHS $$= 1 + 1 = 2$$. RHS $$= 1 + 1 + 0 = 2$$ (the pion is a meson, $$B=0$$). Balanced.\n- Step 3: Even though baryon number balances, **charge does not** — the reaction is forbidden. A valid version would be $$p + p \\to p + n + \\pi^+$$, where charge is $$1+1 = 1+0+1 = 2$$. ✓\n\nThe lesson: an interaction must satisfy *every* conservation law to be allowed; failing even one kills it.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "In a typical decay chain, the very first decay of U-238 takes about $$4.5$$ billion years, while some intermediate decays take fractions of a second. Conceptually, why such an enormous range of timescales?", "answer": "The decay timescale (half-life) depends exponentially on how easily a nucleus can rearrange to a lower-energy state — specifically, on a \"quantum tunnelling\" probability through an energy barrier (for alpha decay) or on weak-interaction couplings (for beta decay). Small differences in nuclear structure produce vast differences in this probability, hence in half-life. U-238 sits in a deep, very stable configuration with a narrow tunneling probability → tiny decay rate → 4.5 billion year half-life. Some intermediate nuclei in the chain are wildly unbalanced and decay almost instantly. So decay rates can span $$\\sim 10^{25}$$ orders of magnitude across different nuclides — a stunning sensitivity to nuclear structure.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Conceptually, why does the corrected count rate drop *exponentially* (not linearly) with absorber thickness for gamma rays? (3 steps)", "answer": "- Step 1: Each thin slab of absorber has some fixed *probability per unit thickness* of absorbing any given photon. So if a slab absorbs $$10\\%$$ of incident photons, a second identical slab absorbs $$10\\%$$ of what made it through — leaving $$0.9 \\times 0.9 = 81\\%$$.\n- Step 2: Adding identical layers means repeated multiplication by the same fraction, which by definition produces an exponential — each step removes the same *fraction*, not the same *number*.\n- Step 3: Mathematically: $$I(x) = I_0 e^{-\\mu x}$$, where $$\\mu$$ is the linear absorption coefficient. The intensity never reaches zero — it just keeps halving every \"half-thickness.\"\n\nThis is exactly analogous to radioactive decay over *time*: same logic, just spatial instead of temporal.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "When walking through a hospital and getting a chest X-ray, you receive a measurable dose. Why is this *not* an example of background radiation, even though it's \"all around us\"?", "answer": "Background radiation refers to the ambient, ever-present, uncontrolled radiation we all receive constantly from natural sources (radon, cosmic rays, food, body) plus diffuse man-made sources from past nuclear activity. A medical X-ray is a *deliberate, targeted* exposure for a specific purpose, and it is normally accounted for separately as \"medical exposure.\" Background and medical doses are both summed when calculating someone's total annual radiation exposure, but they're tracked as distinct categories because background is involuntary and unavoidable, whereas medical doses are intentional and recorded per procedure.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "Why is a neutrino effectively undetectable in most experiments, despite being produced abundantly in beta decay?", "answer": "Neutrinos are leptons with no electric charge, negligible mass, and they don't feel the strong force — they only interact via the weak nuclear force, which has an extremely short range and tiny interaction probability. Most neutrinos pass through entire planets without interacting once. So in a typical detector (paper, aluminium, Geiger counter), neutrinos sail straight through unnoticed. This is why their existence was hypothesised long before they were detected (Pauli, 1930) — only the \"missing energy\" in beta spectra hinted at them. Dedicated giant detectors (e.g., Super-Kamiokande) are needed to catch the few that do interact.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "If you doubled the magnetic field strength in a cyclotron, qualitatively what would happen to the radius of a proton's orbit at a given speed, and to the maximum energy achievable in a fixed-radius machine? (2 steps)", "answer": "- Step 1: From $$r = \\dfrac{mv}{Bq}$$, doubling $$B$$ at fixed $$v$$ halves the radius. So at any given speed, the proton spirals more tightly.\n- Step 2: In a fixed-radius cyclotron (fixed maximum $$r$$), this means the proton can be accelerated to *higher* speed (and energy) before its orbit exceeds the machine's size — since $$v_{\\max} = B q r_{\\max} / m$$. So stronger magnets → higher achievable energy. This is why building higher-energy accelerators motivates the development of stronger superconducting magnets.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}], "count": 65}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In the nuclear notation $$^{A}_{Z}X$$, what do the subscript and superscript represent, and how do you find the number of neutrons?", "answer": "- Step 1: The subscript $$Z$$ is the **proton number** (atomic number) — it tells you which element it is, because the identity of an element is fixed by how many protons sit in its nucleus.\n- Step 2: The superscript $$A$$ is the **nucleon number** (mass number) — it counts protons + neutrons combined, i.e. the total particles in the nucleus.\n- Step 3: To get neutrons, subtract: $$N = A - Z$$. A common trap is thinking $$A$$ counts neutrons alone — it does not.\n\nTakeaway: $$Z$$ = identity, $$A$$ = total nucleons, $$A - Z$$ = neutrons.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What defines two atoms as isotopes of each other, and why do they behave identically chemically but differently in nuclear reactions?", "answer": "- Step 1: Isotopes share the same **proton number** $$Z$$ (so they're the same element) but differ in **neutron number**, giving different nucleon numbers $$A$$.\n- Step 2: Chemistry depends on the electron cloud, which is determined by $$Z$$ (number of protons = number of electrons in a neutral atom). So isotopes have identical chemistry.\n- Step 3: Nuclear stability depends on the proton-to-neutron ratio. Different neutron counts mean different stabilities, so one isotope might be stable while another decays radioactively.\n\n+ Example: Hydrogen-1 (just a proton), deuterium (1p+1n), tritium (1p+2n) — all hydrogen chemically, but tritium is radioactive.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "In Rutherford's gold foil experiment, what three observations were made, and what did each reveal about atomic structure? (3 steps)", "answer": "- Step 1: **Most alpha particles passed straight through** with no deflection → the atom is mostly **empty space**. If atoms were solid spheres (Thomson's plum pudding), this wouldn't happen.\n- Step 2: **A small fraction were deflected at small angles** → there's a concentrated **positive charge** somewhere in the atom (positive alphas repel from positive nucleus).\n- Step 3: **A very small fraction bounced almost straight back** (>90°) → that positive charge must be in a **tiny, extremely dense nucleus** that contains most of the atom's mass; otherwise an alpha wouldn't reverse direction.\n\nTakeaway: Three observations → empty space + positive concentration + tiny dense nucleus.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why did the plum pudding model predict that ALL alpha particles should pass nearly straight through gold foil, and why was Rutherford's result so shocking?", "answer": "- Step 1: In the plum pudding model, positive charge was spread uniformly through the whole atom like jelly with embedded electron \"raisins\". The charge density at any point is therefore very low.\n- Step 2: A fast alpha particle passing through this diffuse positive jelly would feel only tiny electrostatic forces from any one region, so it should barely deflect.\n- Step 3: Rutherford observed that ~1 in 8000 alphas bounced back at angles >90°. This required a force strong enough to reverse a fast, massive particle — only possible if positive charge is concentrated in a tiny region (the nucleus).\n\nTakeaway: Diffuse charge → tiny deflections only. Concentrated charge → occasional huge deflections. The data forced the nuclear model.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Roughly how many times larger is the atom than its nucleus, and what does this tell us about the atom's structure?", "answer": "The atom is about $$100{,}000$$ times larger than the nucleus in linear dimension. This means the vast majority of the atom's volume is empty space — the electrons orbit at huge distances (relative to the nucleus) from a very tiny, dense center. If the nucleus were a marble in the middle of a football stadium, the electrons would be at the stands. This is why most alpha particles in Rutherford's experiment sailed straight through without \"hitting\" anything.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "What is an alpha particle made of, and what are its relative charge and mass?", "answer": "- Step 1: An alpha particle consists of **2 protons + 2 neutrons** — identical to a **helium-4 nucleus** (no electrons attached).\n- Step 2: Charge: each proton contributes +1, each neutron 0, so total relative charge = **+2**.\n- Step 3: Mass: taking proton and neutron as relative mass ≈ 1 each, total = **4** (in atomic mass units).\n\nWritten as $$^{4}_{2}\\alpha$$ or $$^{4}_{2}\\text{He}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Beta-minus particles are fast electrons — but there are no electrons in the nucleus to start with. So where does a $$\\beta^{-}$$ come from?", "answer": "- Step 1: Inside the nucleus, a **neutron converts into a proton**. This happens in nuclei that are \"neutron-rich\" (too many neutrons for stability).\n- Step 2: To conserve charge: neutron (0) → proton (+1) + electron (−1). The electron must be created and ejected to balance the books.\n- Step 3: That ejected high-speed electron *is* the beta-minus particle. It didn't exist as a constituent of the nucleus beforehand — it was **created in the moment of decay**.\n\n+ A neutrino's antiparticle (the **electron antineutrino**, $$\\bar{\\nu}_e$$) is also emitted to conserve lepton number and carry away momentum/energy.\n\nTakeaway: $$\\beta^{-}$$ is born from the conversion $$n \\to p + e^{-} + \\bar{\\nu}_e$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "What is a beta-plus particle, where does it come from, and what particle accompanies it?", "answer": "- Step 1: A beta-plus $$\\beta^{+}$$ is a **positron** — a positively charged electron (antimatter partner of the electron). Charge $$+1$$, mass equal to an electron's mass.\n- Step 2: It's emitted when a **proton inside a proton-rich nucleus turns into a neutron**: $$p \\to n + e^{+} + \\nu_e$$.\n- Step 3: It's always accompanied by an **electron neutrino** $$\\nu_e$$ (not antineutrino) — this conserves lepton number.\n\nTrap: students often forget the (anti)neutrino. In $$\\beta^{-}$$ → antineutrino; in $$\\beta^{+}$$ → neutrino.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What is gamma radiation physically, and why does it carry no charge or mass?", "answer": "Gamma radiation is a **high-energy electromagnetic wave** (photon) emitted from an excited nucleus. It's not a matter particle — it's pure energy in the form of EM radiation, with the shortest wavelength and highest frequency in the EM spectrum. A photon has no rest mass and no charge by definition (it is the gauge boson of the electromagnetic field). So its relative mass = 0 and relative charge = 0. It's written as $$^{0}_{0}\\gamma$$.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Compare the ionising power and penetrating power of alpha, beta, and gamma radiation, and explain why these two properties are inversely related. (3 steps)", "answer": "- Step 1: **Alpha**: very high ionising power, very low penetrating power. Stopped by paper or skin; range ~3–10 cm in air.\n- Step 2: **Beta**: medium ionising power, medium penetrating power. Stopped by a few mm of aluminium; range ~1 m in air.\n- Step 3: **Gamma**: low ionising power, very high penetrating power. Reduced (not fully stopped) by several cm of lead or ~1 m of concrete; range ~hundreds of metres in air.\n\nWhy inversely related: an alpha is big, slow, and doubly charged → it interacts strongly with electrons in matter, ripping them off (ionising) and losing energy quickly, so it can't go far. Gamma has no charge and no mass → it interacts weakly, rarely ionises, so it travels a long way before being absorbed. Beta is in between.\n\nTakeaway: Strong interaction → lots of ionisation but short range. Weak interaction → little ionisation but long range.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Why is an alpha particle far more dangerous when inhaled or ingested than when held in your hand, even though it can't even penetrate skin?", "answer": "- Step 1: From outside the body, alpha radiation is stopped by the dead outer layer of skin or even a sheet of paper. It deposits all its energy externally where there are no living cells.\n- Step 2: But alphas are intensely ionising — they dump huge energy into a very short path, ripping electrons from atoms wherever they go.\n- Step 3: If you inhale or ingest an alpha emitter (e.g. radon gas, radium), the alphas are released *inside* living tissue (lungs, gut), with no skin barrier. They cause concentrated damage to sensitive cells like lung lining, which is why radon is a leading cause of lung cancer.\n\nTakeaway: Penetrating power matters externally; ionising power matters internally. Alpha = harmless outside, devastating inside.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "What does it mean to \"ionise\" an atom, and why does a charged radiation particle have more ionising power than an uncharged one?", "answer": "- Step 1: To ionise an atom is to remove (or add) electrons, leaving it electrically charged rather than neutral.\n- Step 2: A charged radiation particle (alpha +2, beta −1) exerts **electrostatic forces** on the electrons it passes near, doing work on them and ripping them away from their parent atoms.\n- Step 3: An uncharged particle like a gamma photon can ionise only via specific interactions (photoelectric effect, Compton scattering, pair production) — these happen only occasionally, so gammas ionise rarely.\n\nTakeaway: Charge enables continuous, strong electromagnetic interaction with electrons → strong ionisation. No charge → only rare interactions.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Write the general form of an alpha decay equation, and explain how it conserves nucleon and proton number. (3 steps)", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow {}^{A-4}_{Z-2}Y + {}^{4}_{2}\\alpha$$\n- Step 2: Nucleon balance: parent has $$A$$ nucleons; daughter has $$A-4$$; alpha carries off 4. Total: $$(A-4) + 4 = A$$. ✓\n- Step 3: Proton balance: parent has $$Z$$; daughter has $$Z-2$$; alpha has 2. Total: $$(Z-2) + 2 = Z$$. ✓\n\nThe element changes (because $$Z$$ changed by 2) — it moves two places left in the periodic table.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Write the general form of beta-minus decay (including the neutrino), and explain why $$Z$$ increases while $$A$$ stays the same.", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow {}^{A}_{Z+1}Y + {}^{0}_{-1}\\beta + \\bar{\\nu}_e$$\n- Step 2: Inside the nucleus, a neutron becomes a proton. So the total nucleon count (protons + neutrons) is unchanged → $$A$$ stays the same.\n- Step 3: One neutron has been replaced by a proton → proton count goes up by 1 → $$Z \\to Z+1$$. The element shifts one place right in the periodic table.\n\nCommon trap: forgetting the antineutrino $$\\bar{\\nu}_e$$. It carries away energy and angular momentum, and conserves lepton number.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Write the general form of beta-plus decay, and contrast how $$Z$$ changes compared to beta-minus.", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow {}^{A}_{Z-1}Y + {}^{0}_{+1}\\beta + \\nu_e$$\n- Step 2: A proton becomes a neutron, so $$Z$$ **decreases** by 1 (opposite to $$\\beta^{-}$$, where $$Z$$ increases). Nucleon number $$A$$ still unchanged.\n- Step 3: The accompanying particle is an electron **neutrino** $$\\nu_e$$ (not antineutrino, unlike $$\\beta^{-}$$).\n\nMemory trap: $$\\beta^{-}$$ → element moves **right** in periodic table; $$\\beta^{+}$$ → element moves **left**. The sign of beta matches the direction the proton number moves.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Write the form of a gamma decay equation, and explain why neither $$A$$ nor $$Z$$ changes.", "answer": "- Step 1: Form: $$^{A}_{Z}X^{*} \\rightarrow {}^{A}_{Z}X + \\gamma$$, where $$X^{*}$$ denotes an excited (high-energy) nucleus.\n- Step 2: A gamma photon has no mass and no charge → it doesn't take away any nucleons or protons. So $$A$$ and $$Z$$ on both sides are identical.\n- Step 3: What changes is the **energy** of the nucleus: the nucleus drops from a higher to a lower energy state, releasing the difference as an EM photon. It's analogous to an atomic electron dropping a level and emitting light, but the energy scale is millions of times greater.\n\nTakeaway: Gamma = nuclear de-excitation. Same element, same isotope, just lower energy.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "In the alpha decay $$^{238}_{92}\\text{U} \\rightarrow \\, ?\\, + {}^{4}_{2}\\alpha$$, identify the daughter nucleus's $$A$$ and $$Z$$.", "answer": "- Step 1: Conserve nucleon number: $$238 = A_{\\text{daughter}} + 4$$, so $$A_{\\text{daughter}} = 234$$.\n- Step 2: Conserve proton number: $$92 = Z_{\\text{daughter}} + 2$$, so $$Z_{\\text{daughter}} = 90$$.\n- Step 3: $$Z = 90$$ is thorium, so the daughter is $$^{234}_{90}\\text{Th}$$.\n\nTakeaway: To balance any decay equation, just enforce that the sums of top numbers and bottom numbers match on both sides.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "In the beta decay $$^{14}_{6}\\text{C} \\rightarrow \\,?\\, + {}^{0}_{-1}\\beta + \\bar{\\nu}_e$$, what is the daughter nucleus?", "answer": "- Step 1: Nucleon number: $$14 = A + 0 + 0$$, so $$A = 14$$.\n- Step 2: Proton number: $$6 = Z + (-1) + 0$$, so $$Z = 7$$.\n- Step 3: $$Z = 7$$ is nitrogen → daughter is $$^{14}_{7}\\text{N}$$. This is the famous carbon-14 → nitrogen-14 decay used in radiocarbon dating.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "In a decay chain, what does it mean for a nucleus to be \"stable\", and why don't all decays produce a stable product in one step?", "answer": "- Step 1: A stable nucleus is one with a proton-to-neutron ratio (and total mass) that places it in a region of nuclear stability — it does not spontaneously emit radiation.\n- Step 2: Heavy unstable nuclei like $$^{238}\\text{U}$$ are very far from the stable region. A single alpha or beta decay only nudges $$(A,Z)$$ by a small amount, so the daughter is usually *still* unstable.\n- Step 3: Hence successive decays form a **decay chain**: $$^{238}\\text{U}$$ undergoes a sequence of α and β emissions through ~14 intermediate isotopes before finally ending at $$^{206}\\text{Pb}$$, which is stable.\n\nTakeaway: Stability is a destination; the chain is the journey. Each step pushes the nucleus closer to the \"valley of stability\".", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Within one decay chain, why might one step take fractions of a second while another takes thousands of years?", "answer": "- Step 1: The half-life of a decay depends on the energy barrier and quantum tunneling probability for that specific transition — different daughter nuclei have wildly different stability characteristics.\n- Step 2: Some intermediate isotopes are very close to stable (so decay is slow, half-life of millennia); others are highly unstable (decay almost instantly).\n- Step 3: This is why a $$^{238}\\text{U}$$ chain takes ~4.5 billion years overall (set by the very slow first step), but many intermediate decays happen in microseconds once they get going.\n\nTakeaway: The overall timescale is set by the slowest (longest half-life) link in the chain.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why is radioactive decay described as \"random and spontaneous\", and what does this mean operationally for a single nucleus vs. a large sample? (3 steps)", "answer": "- Step 1: **Spontaneous**: not influenced by external conditions — temperature, pressure, chemical state don't change decay rates. The nucleus decays purely due to internal quantum mechanics.\n- Step 2: **Random**: for any single nucleus, we cannot predict *when* it will decay. There's only a fixed probability per unit time that it will.\n- Step 3: For a large sample (e.g. $$10^{20}$$ atoms), random fluctuations average out and we get statistically predictable behaviour, characterised by a half-life. So individual = unpredictable; bulk = deterministic.\n\nTakeaway: Like flipping coins — each flip random, but in 1 million flips you predict ~500,000 heads accurately.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "What is background radiation, and name the main natural and man-made sources.", "answer": "- Step 1: Background radiation is the **low-level ionising radiation always present in the environment**, from sources outside any deliberate experiment or exposure.\n- Step 2: **Natural sources**:\n+ Radon gas seeping from uranium-containing rocks (often the biggest single contributor)\n+ Cosmic rays from the Sun and outer space\n+ Carbon-14 and potassium-40 in food, water, and our own bodies (bananas contain $$^{40}\\text{K}$$)\n+ Gamma rays from rocks and soil\n- Step 3: **Man-made sources**:\n+ Medical X-rays, CT scans, radiotherapy\n+ Nuclear waste and fallout from past weapons testing\n+ Nuclear accidents (e.g. Chernobyl)\n\nBackground levels vary by location — granite-rich areas (like Cornwall) have higher natural backgrounds.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why must background radiation be subtracted from a measured count rate when studying a radioactive source, and what is the result called?", "answer": "- Step 1: Any Geiger counter, even with no source nearby, registers some counts due to ubiquitous background radiation. These counts have nothing to do with the source you're studying.\n- Step 2: If you don't subtract it, your measured rate is artificially inflated — you'd think the source is more active than it really is, especially at long distances or with thick shielding.\n- Step 3: The result after subtraction, $$R_{\\text{corrected}} = R_{\\text{measured}} - R_{\\text{background}}$$, is the **corrected count rate**, which truly reflects the source's activity.\n\nTakeaway: Always measure background separately first, then subtract — it's a systematic correction, not an error.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "When a Geiger counter near a gamma source still reads a non-zero count rate even with thick lead shielding, what does this tell us about gamma radiation?", "answer": "- Step 1: Gamma rays have very high penetrating power because they're chargeless, massless EM waves that interact only weakly with matter.\n- Step 2: Even several cm of lead don't fully stop them — the intensity is **reduced** (attenuated), not eliminated. Each layer absorbs a fraction.\n- Step 3: This is fundamentally different from alpha (cleanly stopped by paper) and beta (cleanly stopped by aluminium). Gamma shielding is about reducing dose to acceptable levels, not blocking entirely.\n\nTakeaway: For gamma, \"stopping\" is statistical — you need more shielding (or distance) to reduce intensity, never zero it.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A student measures background counts of $$\\approx 20$$ per minute. They then place a source 5 cm from the detector and read $$\\approx 320$$ per minute. They move the source far away and read $$\\approx 22$$ per minute. What can they conclude?", "answer": "- Step 1: At 5 cm, the corrected count rate from the source is $$320 - 20 = 300$$ per minute — that's the actual signal.\n- Step 2: At a large distance, the reading $$\\approx 22$$ is statistically indistinguishable from background — meaning the source's radiation has all been absorbed by intervening air (or is diluted by distance to below noise).\n- Step 3: Conclusion: the source emits short-range radiation (consistent with alpha) — if it were gamma, we'd still see a clear excess above background even far away.\n\nTakeaway: The \"floor\" you can't read below is set by background — the source signal must rise above it to be detectable.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why do we model protons and neutrons as having approximately the same mass at A-level GCSE-style, even though they're not exactly equal?", "answer": "- Step 1: A proton has mass $$\\approx 1.673 \\times 10^{-27}$$ kg and a neutron $$\\approx 1.675 \\times 10^{-27}$$ kg. They differ by only ~0.14%.\n- Step 2: For computing nucleon numbers and balancing decay equations, treating them as equal (relative mass = 1) loses negligible accuracy and simplifies everything.\n- Step 3: At A-level when you study **mass defect** and **binding energy**, the tiny mass differences matter enormously — that's where $$E = \\Delta m c^2$$ generates nuclear energy.\n\nTakeaway: Same mass = good enough for counting nucleons; precise mass matters for energy calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "What does Einstein's mass–energy equivalence $$\\Delta E = \\Delta m c^2$$ mean physically, and why does it apply in nuclear (not chemical) reactions?", "answer": "- Step 1: Mass and energy are interchangeable: a mass change $$\\Delta m$$ corresponds to an energy change $$\\Delta E = \\Delta m c^2$$. Because $$c^2 \\approx 9 \\times 10^{16}$$ m²/s², even tiny masses release huge energies.\n- Step 2: In **chemical reactions**, energy changes are eV-scale → mass changes are ~$$10^{-36}$$ kg, undetectable. So mass appears conserved.\n- Step 3: In **nuclear reactions**, energy changes are MeV-scale (a million times bigger) → mass changes are detectable. A nucleus's binding energy literally shows up as missing mass (mass defect).\n\nTakeaway: Same physics in both cases — but only nuclear reactions are energetic enough to make the mass change measurable.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Explain why pair production requires a minimum photon energy of $$2mc^2$$, and why it can't happen with a photon alone in free space. (3 steps)", "answer": "- Step 1: To create a particle of rest mass $$m$$ plus its antiparticle of rest mass $$m$$ from a photon, you need at least the rest-mass energy of both: $$E_{\\min} = 2mc^2$$. For electron–positron pairs, this gives $$\\approx 1.022$$ MeV.\n- Step 2: But a single photon in **empty space** can't produce a pair — it would violate conservation of momentum. A photon has momentum $$p = E/c$$ that can't be cancelled by two massive particles created at rest.\n- Step 3: A nearby nucleus (or another particle) is needed to absorb the recoil momentum. So the process is really: photon + nucleus → e⁻ + e⁺ + nucleus (slightly recoiling).\n\nTakeaway: Energy conservation gives the threshold $$2mc^2$$; momentum conservation requires a third body.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "When an electron meets a positron and annihilates, why are two photons emitted (not one), and in what directions?", "answer": "- Step 1: Before collision (say at rest in the lab frame), the total momentum is approximately zero.\n- Step 2: A single photon has momentum $$p = E/c \\neq 0$$. So emitting one photon would violate momentum conservation.\n- Step 3: Two photons emitted in **opposite directions** with equal and opposite momenta give net zero momentum, satisfying conservation. Each photon carries energy $$mc^2 \\approx 0.511$$ MeV for an electron–positron pair.\n\nTakeaway: Two photons back-to-back is the only way to conserve both energy AND momentum from an at-rest annihilation.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "What is the Standard Model, and how does it categorise the building blocks of matter? (3 steps)", "answer": "- Step 1: The Standard Model is the framework that classifies all known fundamental particles and three of the four fundamental forces (excluding gravity).\n- Step 2: Matter particles (fermions) split into two families:\n+ **Quarks**: feel the strong force; come in 6 flavours (up, down, charm, strange, top, bottom)\n+ **Leptons**: do not feel the strong force; include the electron, muon, tau, and their three neutrinos\n- Step 3: Force-carrier particles (bosons): photon (EM), W and Z bosons (weak), gluons (strong), Higgs (gives mass).\n\nTakeaway: Quarks + leptons = matter. Bosons = force carriers. Together they explain (almost) everything we see.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "What is a hadron, and how are baryons and mesons distinguished within it?", "answer": "- Step 1: A **hadron** is any particle made of quarks that interacts via the strong nuclear force.\n- Step 2: A **baryon** is a hadron made of **3 quarks** (e.g. proton = uud, neutron = udd). Baryons have half-integer spin.\n- Step 3: A **meson** is a hadron made of **a quark + antiquark pair** (e.g. pion, kaon). Mesons have integer spin.\n\nTakeaway: All hadrons feel the strong force. Baryons = 3 quarks (massive, like protons). Mesons = quark-antiquark (lighter, often unstable).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is a lepton, and how does it differ fundamentally from a hadron?", "answer": "- Step 1: A lepton is a **fundamental** particle — not made of quarks or anything smaller (as far as we know). Examples: electron, muon, tau, and three corresponding neutrinos.\n- Step 2: Crucially, leptons **do not feel the strong nuclear force**. They interact via weak, electromagnetic, and gravitational forces only.\n- Step 3: Hadrons (baryons, mesons) are composite — made of quarks — and DO feel the strong force.\n\nTakeaway: Hadrons = composite, strong-interacting. Leptons = fundamental, not strong-interacting.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "What are the charges of the up and down quarks, and how do they combine to give the correct charges of the proton and neutron? (3 steps)", "answer": "- Step 1: Quark charges (in units of $$e$$): up = $$+\\tfrac{2}{3}$$, down = $$-\\tfrac{1}{3}$$.\n- Step 2: **Proton (uud)**: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3} = +1$$. ✓\n- Step 3: **Neutron (udd)**: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. ✓\n\nTakeaway: The fractional quark charges always sum to integer hadron charges. This is a deep symmetry of the Standard Model.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "At the quark level, what actually happens during beta-minus decay?", "answer": "- Step 1: A neutron (udd) converts into a proton (uud) — meaning one **down quark turns into an up quark**: $$d \\to u + e^{-} + \\bar{\\nu}_e$$.\n- Step 2: This change is mediated by the **weak nuclear force** (specifically a virtual $$W^{-}$$ boson that immediately decays into the electron and antineutrino).\n- Step 3: Charge check: down ($$-\\tfrac{1}{3}$$) → up ($$+\\tfrac{2}{3}$$) + electron ($$-1$$) + antineutrino (0). Sum: $$\\tfrac{2}{3} - 1 = -\\tfrac{1}{3}$$. ✓\n\nTakeaway: Beta decay is fundamentally a quark flavour change driven by the weak force.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "What is antimatter, and how does an antiparticle differ from its matter counterpart?", "answer": "- Step 1: For every matter particle, there exists a corresponding **antimatter** particle with **the same mass** but **opposite charge** (and opposite values of other quantum numbers like baryon/lepton number).\n- Step 2: Examples: electron ↔ positron (both mass $$m_e$$, charges $$\\mp 1$$). Proton ↔ antiproton. Up quark ↔ anti-up quark.\n- Step 3: Neutral particles like the photon and (almost) the neutron can be their own antiparticles or have distinct antiparticles, depending on internal quantum numbers.\n\nTakeaway: Antiparticles are physical mirror images — same mass, flipped charges. They aren't science fiction; they're created routinely in accelerators.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "State the three \"always conserved\" quantum numbers in particle interactions, and what each means. (3 steps)", "answer": "- Step 1: **Charge $$Q$$**: total electric charge is the same before and after any interaction. Universal conservation law.\n- Step 2: **Baryon number $$B$$**: baryons have $$B = +1$$, antibaryons $$B = -1$$, everything else $$B = 0$$. Total $$B$$ unchanged in any interaction.\n- Step 3: **Lepton number $$L$$**: leptons have $$L = +1$$, antileptons $$L = -1$$, non-leptons $$L = 0$$. Total $$L$$ unchanged.\n\n(Plus always: energy and momentum.)\n\nTakeaway: A reaction is forbidden if it violates any of $$Q$$, $$B$$, $$L$$, energy, or momentum.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "In beta-minus decay $$n \\to p + e^{-} + \\bar{\\nu}_e$$, verify that all three of charge, baryon number, and lepton number are conserved. (3 steps)", "answer": "- Step 1: **Charge**: LHS = 0 (neutron); RHS = $$+1 + (-1) + 0 = 0$$. ✓\n- Step 2: **Baryon number**: LHS = +1 (neutron is a baryon); RHS = $$+1 + 0 + 0 = +1$$ (proton is a baryon; electron and antineutrino are not). ✓\n- Step 3: **Lepton number**: LHS = 0 (neutron is not a lepton); RHS = $$0 + (+1) + (-1) = 0$$ (electron is lepton +1, antineutrino is antilepton −1). ✓\n\nTakeaway: This conservation check is *why* the antineutrino must appear — without it, lepton number would be violated.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does a charged particle moving perpendicular to a magnetic field trace out a circular path, and how does the radius depend on momentum, charge, and field?", "answer": "- Step 1: The magnetic force on a moving charge is $$F = Qvb$$, always perpendicular to velocity. A force constantly perpendicular to motion doesn't change speed — it just changes direction → circular motion.\n- Step 2: Equating magnetic force to centripetal force: $$QvB = \\frac{mv^2}{r}$$, giving $$r = \\frac{mv}{BQ} = \\frac{p}{BQ}$$.\n- Step 3: Reading the formula:\n+ Larger momentum $$p$$ → larger radius (faster/heavier particles curve more gently)\n+ Stronger field $$B$$ → smaller radius (tighter curves)\n+ Larger charge $$Q$$ → smaller radius (more force per unit speed)\n\nTakeaway: The radius is a direct probe of momentum once you know $$B$$ and $$Q$$. This is how detectors measure particle momentum.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "In a cloud chamber image, two tracks emerge from a single point and curve in opposite directions with the same radius. What does this tell you?", "answer": "- Step 1: Tracks appearing from \"nowhere\" suggest an uncharged particle (like a photon, which leaves no track) interacted there — consistent with **pair production**.\n- Step 2: Equal radii imply equal momenta → equal masses (since both came from the same photon with split energy). So they're particle and antiparticle of the same type.\n- Step 3: Opposite curvatures imply opposite charges (the magnetic force flips direction for opposite charges in the same field). Confirms particle–antiparticle pair.\n\nTakeaway: Same radius + opposite curl + appearing from nothing = classic pair production signature.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Particle tracks in a detector often spiral inward (radius decreasing) — why does this happen, and what does the direction of the spiral reveal? (3 steps)", "answer": "- Step 1: As a charged particle moves through the gas/liquid in a detector, it ionises atoms along its path, losing kinetic energy with each ionisation.\n- Step 2: Less KE → less momentum → smaller radius $$r = p/(BQ)$$. So the track curves more tightly as the particle slows.\n- Step 3: This means the **outer end of the spiral is where the particle started** (high momentum, large radius), and the **inner end is where it slowed**. Reading direction: outside → inside = time direction of motion.\n\nTakeaway: Spirals tell you both the particle's energy loss and its direction of travel — a tiny picture full of information.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Why must you use very high-energy electrons (rather than alpha particles) to probe the internal structure of a proton?", "answer": "- Step 1: To resolve a structure of size $$d$$, your probe must have a de Broglie wavelength $$\\lambda \\leq d$$. For a proton, $$d \\sim 10^{-15}$$ m.\n- Step 2: Since $$\\lambda = h/p$$, smaller wavelength means larger momentum (and energy). So electrons must be accelerated to very high energies (GeV scale) to get wavelengths small enough.\n- Step 3: Electrons are also chosen because they're leptons — they don't feel the strong nuclear force, so they probe the proton's structure cleanly via the electromagnetic interaction, without the complications that alpha particles (which are made of quarks) would introduce.\n\nTakeaway: Resolution ↔ wavelength ↔ momentum ↔ energy. To see small, you need to be fast.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "What does it mean to convert mass to units of MeV/c², and why is this convenient in particle physics?", "answer": "- Step 1: Einstein's relation $$E = mc^2$$ means mass has natural energy units. Solving for mass: $$m = E/c^2$$. So if energy is in MeV, mass is in MeV/c².\n- Step 2: Conversion: $$1 \\text{ MeV}/c^2 \\approx 1.78 \\times 10^{-30}$$ kg. Useful approximate values:\n+ Electron: $$\\approx 0.511$$ MeV/c²\n+ Proton: $$\\approx 938$$ MeV/c² (so $$\\approx 1$$ GeV/c²)\n+ Atomic mass unit (u): $$\\approx 931.5$$ MeV/c²\n- Step 3: It's convenient because particle physics deals with both masses and energies constantly — using consistent units avoids carrying $$c^2$$ around in every calculation.\n\nTakeaway: MeV/c² puts mass on the same footing as energy. It's the natural currency of particle physics.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why do unstable particles created in cosmic rays (like muons) survive long enough to reach the ground, even though their lifetime in the lab is too short to allow it?", "answer": "- Step 1: Muons have a lab-frame lifetime of $$\\approx 2.2 \\mu$$s. At speed $$c$$, they'd cover at most ~660 m — but they originate ~10 km up in the atmosphere.\n- Step 2: Special relativity: at speeds approaching $$c$$, **time dilates** in the lab frame — the muon's \"internal clock\" runs slow as seen from Earth. So its observed lifetime is stretched by the Lorentz factor.\n- Step 3: At ~0.99$$c$$, the dilated lifetime is large enough that a meaningful fraction of muons reach the ground. (Equivalently, from the muon's frame, length contraction makes the 10 km look much shorter.)\n\nTakeaway: Their survival is direct evidence for relativity — a \"natural experiment\" running constantly in our atmosphere.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "What is the becquerel (Bq), and what does \"activity\" of a radioactive sample physically mean?", "answer": "**Activity** $$A$$ is the number of nuclear decays per unit time in a radioactive sample. It tells you how \"hot\" the source is — i.e., how many radiations it emits per second.\n\nThe unit is the **becquerel**: $$1 \\text{ Bq} = 1 \\text{ decay per second}$$.\n\nA sample with activity 1000 Bq has roughly 1000 nuclei undergoing radioactive transformation each second. Activity depends on (a) how many unstable nuclei are present and (b) how unstable they are (the decay constant). It decreases over time as nuclei decay away — the higher the initial activity, the more quickly it drops.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why are pair production and annihilation considered \"inverses\" of each other? (3 steps)", "answer": "- Step 1: **Pair production**: a high-energy photon (with help from a nucleus to conserve momentum) converts into a particle–antiparticle pair, e.g. $$\\gamma \\to e^{-} + e^{+}$$. Energy becomes mass.\n- Step 2: **Annihilation**: a particle meets its antiparticle and converts back into photons, e.g. $$e^{-} + e^{+} \\to 2\\gamma$$. Mass becomes energy.\n- Step 3: Both obey $$E = mc^2$$ symmetrically. The pair-production threshold ($$2mc^2$$) equals the annihilation output (two photons each of energy $$mc^2$$).\n\nTakeaway: They're the same physics running in opposite directions. Both express the deep interconvertibility of mass and energy.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Consider a proton, an alpha particle, and an electron all entering the same magnetic field at the same speed perpendicular to the field. Without calculating, rank the radii of their circular paths and explain.", "answer": "- Step 1: From $$r = mv/(BQ)$$, at fixed $$v$$ and $$B$$, $$r \\propto m/Q$$.\n- Step 2: Compute $$m/Q$$ ratios qualitatively:\n+ Electron: tiny mass, charge 1 → $$m/Q$$ very small → very small radius\n+ Proton: mass $$\\approx 1836 m_e$$, charge 1 → moderate radius\n+ Alpha: mass $$\\approx 4 \\times$$ proton mass, charge 2 → $$m/Q$$ = 2× proton's → roughly twice proton's radius\n- Step 3: Ranking: $$r_{e^-} \\ll r_p < r_{\\alpha}$$. Electron's path is tightest by far; alpha's is the largest.\n\nTakeaway: At equal speed, heavier particles with comparable charge curve more gently — they have more \"inertia per unit force\".", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A radioactive source emits some radiation that passes through aluminium foil but is stopped by a few cm of lead. Could it be alpha? Could it be beta? Could it be gamma? Justify.", "answer": "- Step 1: **Alpha?** No — alphas are stopped by *paper or skin*, let alone aluminium foil. The radiation observed gets through aluminium, so it isn't alpha.\n- Step 2: **Beta?** No — betas are stopped by a *few mm of aluminium*. Aluminium foil here doesn't stop them — but if you used thicker aluminium, betas would be stopped. Lead is overkill for beta. So it's possible but not the cleanest answer.\n- Step 3: **Gamma?** Yes — gamma passes through both paper and aluminium and is significantly attenuated only by lead/concrete. This matches the observation perfectly.\n\nMost likely: gamma (or possibly a mix of beta + gamma — gamma often accompanies other decays).\n\nTakeaway: The shielding hierarchy paper → aluminium → lead corresponds to alpha → beta → gamma.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why does the proposed reaction $$p + p \\to p + p + \\pi^{+} + \\bar{p}$$ violate baryon conservation, and what does that tell us about whether it can occur? (3 steps)", "answer": "- Step 1: Count baryon numbers. LHS: two protons → $$B = +1 + 1 = +2$$.\n- Step 2: RHS: two protons ($$B = +1$$ each), one pion ($$B = 0$$, mesons aren't baryons), one antiproton ($$B = -1$$). Total: $$1 + 1 + 0 + (-1) = +1$$.\n- Step 3: $$B_{\\text{before}} = 2 \\neq B_{\\text{after}} = 1$$. Baryon number is not conserved → the reaction is **forbidden** by the laws of physics, no matter how much energy you supply.\n\nCompare: $$p + p \\to p + p + p + \\bar{p}$$ would give $$B = 2$$ on both sides, and *is* observed (this is how antiprotons are made at accelerators).\n\nTakeaway: Conservation laws are absolute filters — they rule out reactions completely, not just energetically.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Suppose a radioactive isotope decays by alpha emission to a daughter that's still unstable, which then decays by beta-minus to a third nucleus. Compare the final nucleus's $$A$$ and $$Z$$ to the original. (3 steps)", "answer": "- Step 1: Alpha decay: $$A \\to A - 4$$, $$Z \\to Z - 2$$. After this step: $$(A-4, Z-2)$$.\n- Step 2: Beta-minus decay: $$A$$ unchanged, $$Z \\to Z + 1$$. After this step: $$(A-4, Z-1)$$.\n- Step 3: Net result from original: $$A$$ decreased by 4, $$Z$$ decreased by 1.\n\nTakeaway: You can stack decays by just summing the individual changes. Each α subtracts (4, 2); each β⁻ adds (0, +1); each β⁺ adds (0, −1); γ adds (0, 0).", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "From the radioactive decay equation $$N = N_0 e^{-\\lambda t}$$, qualitatively explain (without computing) why a substance with larger $$\\lambda$$ has a shorter half-life.", "answer": "- Step 1: $$\\lambda$$ is the probability per second that any given nucleus decays. Larger $$\\lambda$$ = each nucleus is more likely to decay quickly.\n- Step 2: Half-life is the time for $$N$$ to fall to $$N_0/2$$. If nuclei are highly likely to decay each second, half of them will be gone quickly.\n- Step 3: Explicitly: $$t_{1/2} = \\ln(2)/\\lambda$$. So $$t_{1/2}$$ and $$\\lambda$$ are **inversely proportional** — double $$\\lambda$$ halves the half-life.\n\nTakeaway: $$\\lambda$$ measures \"decay urgency\". High $$\\lambda$$ = impatient nuclei = short half-life.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why is the activity $$A$$ of a sample related to the number of remaining nuclei $$N$$ by $$A = \\lambda N$$, and how does activity change with time?", "answer": "- Step 1: Each nucleus has independent probability $$\\lambda$$ per second of decaying. With $$N$$ nuclei present, the expected number of decays per second is $$\\lambda N$$ — by simple linearity of expectation.\n- Step 2: That expected decays-per-second IS the activity $$A$$. So $$A = \\lambda N$$.\n- Step 3: As nuclei decay, $$N$$ falls exponentially: $$N(t) = N_0 e^{-\\lambda t}$$. So $$A(t) = \\lambda N(t) = A_0 e^{-\\lambda t}$$ — activity also decays exponentially with the same half-life as the number of nuclei.\n\nTakeaway: Activity and number of nuclei are proportional, so both decline exponentially together.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "What's the physical reason a nucleus emits a gamma ray AFTER an alpha or beta decay, and what's it tied to mechanically?", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus is often left in an **excited state** — its protons and neutrons aren't yet in the lowest-energy configuration.\n- Step 2: To reach the ground state, the nucleus rearranges, releasing the excess energy as a high-energy electromagnetic photon — a gamma ray.\n- Step 3: This is exactly analogous to an atomic electron dropping from a higher to lower orbit and emitting visible light — but the energy scale is MeV (nuclear) instead of eV (atomic), so the emitted photon is a gamma ray rather than visible light.\n\nTakeaway: γ emission is nuclear de-excitation. Same mechanism as electronic emission, just deeper inside the atom and with much higher energy.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "When designing radiation shielding for a gamma source, why is lead preferred over aluminium, and why is it never \"complete\" no matter the thickness?", "answer": "- Step 1: Gamma rays attenuate by interacting with electrons in the shielding material. **Lead has high electron density** (high atomic number, dense atoms packed tightly), so it absorbs more gammas per cm than aluminium.\n- Step 2: But gamma attenuation is **exponential**, not abrupt — intensity falls as $$I = I_0 e^{-\\mu x}$$ where $$\\mu$$ depends on material. So there's always *some* intensity remaining, no matter how thick.\n- Step 3: Practical shielding reduces intensity to acceptably low levels (e.g. background-level), not to zero. Trade-off: lead is heavy and expensive, so you use the minimum that gives an acceptable dose.\n\nTakeaway: Lead = high-Z, dense, good electron stopper. But gamma can only be *reduced* exponentially, never blocked completely.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Why does a single uncharged photon, by itself in empty space, fail to produce an electron–positron pair even if it has plenty of energy?", "answer": "- Step 1: The energy threshold is just $$2 m_e c^2 \\approx 1.022$$ MeV, which many photons easily exceed (in cosmic rays, accelerators, etc.).\n- Step 2: But conservation of **momentum** in the centre-of-mass frame: imagine the frame where the produced $$e^-$$ and $$e^+$$ are at rest after creation. In that frame, total momentum after = 0. But a photon (massless) has $$p = E/c > 0$$ in *every* frame — there's no frame where a photon has zero momentum.\n- Step 3: Contradiction → impossible without a third body (nucleus) absorbing recoil. So you need: photon + nucleus → e⁻ + e⁺ + (recoiling nucleus).\n\nTakeaway: Energy conservation is satisfied, but momentum conservation forbids one-photon pair production. Nature requires a \"witness\" particle to balance the books.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Many students forget that a β⁻ decay also emits an antineutrino, and a β⁺ decay emits a neutrino. Why is this not just a \"bookkeeping\" detail — what physical evidence demanded the (anti)neutrino's existence? (3 steps)", "answer": "- Step 1: When physicists measured the energy spectrum of electrons emitted in beta decay, they expected a sharp peak at one specific energy (set by the mass difference of parent and daughter). Instead, they saw a **continuous spectrum** — electrons came out with any energy from zero up to a maximum.\n- Step 2: This was alarming: it appeared to violate conservation of energy. Where was the \"missing\" energy?\n- Step 3: Pauli proposed that an undetected neutral particle (the neutrino) was carrying away the rest of the energy and momentum in each decay. Sometimes the electron got most of the energy; sometimes the neutrino did. This restored energy conservation and was eventually confirmed experimentally.\n\nTakeaway: The neutrino isn't an afterthought — it was inferred from missing energy, then later detected directly. Conservation laws never lie.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "If you wanted to deliberately reduce your background radiation exposure, list three practical actions (covering different sources) and the source they target.", "answer": "- Step 1: **Ventilate basements and ground floors** → reduces radon gas accumulation from underlying rocks. Radon is often the single largest natural exposure for people indoors.\n- Step 2: **Limit medical imaging to what's truly needed** → reduces exposure from X-rays and CT scans, the dominant man-made source for most people.\n- Step 3: **Avoid living at very high altitudes or flying frequently** → reduces cosmic ray exposure. At altitude, less atmospheric shielding means more cosmic radiation reaches you. Pilots and frequent flyers accumulate measurable extra dose.\n\nTakeaway: Different sources need different mitigations — there's no single fix. Knowing the source guides the action.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "In a decay chain, what is an isotope, and why does $$^{238}\\text{U}$$'s chain transiently pass through *another* uranium isotope, $$^{234}\\text{U}$$?", "answer": "- Step 1: Isotopes have the same proton number $$Z$$ but different nucleon numbers $$A$$ — same element, different neutron count.\n- Step 2: In the $$^{238}\\text{U}$$ chain: alpha decay reduces $$(A, Z)$$ by $$(4, 2)$$ to give $$^{234}\\text{Th}$$. Then two beta-minus decays in succession each increase $$Z$$ by 1 (with $$A$$ unchanged), giving $$^{234}\\text{Pa}$$, then $$^{234}\\text{U}$$.\n- Step 3: So we're back to uranium ($$Z = 92$$), but with $$A = 234$$ instead of 238 — a *different isotope* of the same element. It's still uranium chemically, but a different nucleus that decays further by another alpha.\n\nTakeaway: Decay chains can revisit elements with different $$A$$ — same chemistry, different nuclear future.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "Without computing, explain why if you double the kinetic energy of an electron in a magnetic field, the radius of its circular path does NOT double.", "answer": "- Step 1: Radius depends on momentum: $$r = p/(BQ)$$, not on energy directly.\n- Step 2: Kinetic energy is $$KE = p^2/(2m)$$ (non-relativistically). So $$p = \\sqrt{2m \\cdot KE}$$.\n- Step 3: Doubling KE multiplies $$p$$ by $$\\sqrt{2}$$, not by 2. So $$r$$ also goes up by $$\\sqrt{2}$$, not by 2.\n\n(Relativistically, the relationship is even more nonlinear — but the key point stands.)\n\nTakeaway: $$r \\propto p$$, and $$p \\propto \\sqrt{KE}$$ non-relativistically. Doubling energy → $$\\sqrt{2}$$× radius increase.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why might two different radioactive samples both have an activity of 1000 Bq, even though one contains far more atoms than the other?", "answer": "- Step 1: Activity $$A = \\lambda N$$ depends on **both** the decay constant $$\\lambda$$ (how unstable each nucleus is) **and** the total nuclei $$N$$.\n- Step 2: For the same $$A$$, if Sample 1 has small $$\\lambda$$ (long half-life), it needs many nuclei to produce 1000 decays/s. If Sample 2 has large $$\\lambda$$ (short half-life), it needs few nuclei to produce the same activity.\n- Step 3: Real example: a tiny speck of polonium-210 (half-life 138 days, large $$\\lambda$$) and a large lump of uranium-238 (half-life 4.5 billion years, tiny $$\\lambda$$) can have comparable activities.\n\nTakeaway: Activity is a product of \"how many\" and \"how unstable\" — they can trade off. A small unstable sample can match a huge stable one.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "When examining particle tracks in a magnetic field, why can two oppositely curving tracks with equal radii immediately tell you they came from particle–antiparticle creation, but two oppositely curving tracks with different radii might not?", "answer": "- Step 1: Particle–antiparticle pair: same mass (by definition), same speed (created together with shared energy), opposite charge. So $$r = p/(BQ)$$ — same $$p$$ and same $$|Q|$$ → same radius. Opposite charges → opposite curvatures.\n- Step 2: Equal radii + opposite curvatures + originating from one vertex = pair creation. Diagnostic.\n- Step 3: If radii differ: same momenta but different charges (e.g., $$p$$ vs. $$e^+$$, both positive in opposite directions wouldn't even curve oppositely), or different particles altogether. So *unequal* radii suggest a more complex interaction, not simple pair production.\n\nTakeaway: The symmetry of equal radii + opposite curvature is a fingerprint of pair creation — it directly reflects equal masses and opposite charges.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}], "count": 60}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 39558, "out_tokens": 25880, "reasoning_chars": 1276, "cost_eur": 0.1215, "elapsed_s": 205, "content_chars": 98009}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 39558, "out_tokens": 26428, "reasoning_chars": 1519, "cost_eur": 0.1233, "elapsed_s": 208, "content_chars": 99397}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 38334, "out_tokens": 11243, "reasoning_chars": 2470, "cost_eur": 0.0184, "elapsed_s": 102, "content_chars": 39908}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 38334, "out_tokens": 9236, "reasoning_chars": 2366, "cost_eur": 0.0164, "elapsed_s": 87, "content_chars": 34780}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 57794, "out_tokens": 22892, "reasoning_chars": 0, "cost_eur": 2.3771, "elapsed_s": 308, "content_chars": 56136}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 57794, "out_tokens": 22536, "reasoning_chars": 0, "cost_eur": 2.3525 const SK='phys_particles_radioactivity_jun24_alex';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
