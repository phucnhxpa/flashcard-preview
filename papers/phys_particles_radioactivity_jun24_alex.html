<script>
const DATA={"selected": [{"question": "Within one decay chain, why might one step take fractions of a second while another takes thousands of years?", "answer": "- Step 1: The half-life of a decay depends on the energy barrier and quantum tunneling probability for that specific transition — different daughter nuclei have wildly different stability characteristics.\n- Step 2: Some intermediate isotopes are very close to stable (so decay is slow, half-life of millennia); others are highly unstable (decay almost instantly).\n- Step 3: This is why a $$^{238}\\text{U}$$ chain takes ~4.5 billion years overall (set by the very slow first step), but many intermediate decays happen in microseconds once they get going.\n\nTakeaway: The overall timescale is set by the slowest (longest half-life) link in the chain.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why does gamma decay leave both the nucleon number and proton number unchanged?", "answer": "Gamma emission is just the release of excess energy from an excited nucleus, carried away by a high-energy photon. No protons or neutrons leave the nucleus — only energy. So $$A$$ and $$Z$$ are unchanged. The nuclide is the same isotope before and after; it has simply dropped from an excited state to a lower-energy state. This is exactly analogous to an atom emitting a visible photon when an electron drops between energy levels, just at a much higher energy scale (nuclear, not electronic).", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "In a cyclotron, the time for one complete revolution of a particle is independent of its speed (as long as it's non-relativistic). Why is this crucial for the cyclotron's operation? (3 steps)", "answer": "- Step 1: The time for a half-revolution (one dee) is $$T/2 = \\frac{\\pi r}{v} = \\frac{\\pi m}{BQ}$$ (substituting $$r = mv/BQ$$). Notice v cancels out — the period depends only on m, B, and Q.\n- Step 2: This means the particle always takes the **same time** to traverse each dee, regardless of how fast it's going. The AC frequency can be set to match this constant period.\n- Step 3: This is crucial because the AC supply must switch polarity exactly when the particle reaches the gap. If the revolution time changed with speed, the frequency would need to change too — requiring a more complex (synchrotron) design.\n\n+ This only works for non-relativistic speeds. At speeds approaching c, the relativistic mass increase makes the period longer, and the fixed-frequency cyclotron breaks down. This is why high-energy accelerators need synchrotrons.\n\nKey takeaway: Constant revolution time = constant AC frequency = simple design. This is the cyclotron's elegant trick, valid only for non-relativistic particles.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "What does Einstein's mass–energy equivalence $$\\Delta E = \\Delta m c^2$$ mean physically, and why does it apply in nuclear (not chemical) reactions?", "answer": "- Step 1: Mass and energy are interchangeable: a mass change $$\\Delta m$$ corresponds to an energy change $$\\Delta E = \\Delta m c^2$$. Because $$c^2 \\approx 9 \\times 10^{16}$$ m²/s², even tiny masses release huge energies.\n- Step 2: In **chemical reactions**, energy changes are eV-scale → mass changes are ~$$10^{-36}$$ kg, undetectable. So mass appears conserved.\n- Step 3: In **nuclear reactions**, energy changes are MeV-scale (a million times bigger) → mass changes are detectable. A nucleus's binding energy literally shows up as missing mass (mass defect).\n\nTakeaway: Same physics in both cases — but only nuclear reactions are energetic enough to make the mass change measurable.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "A beta particle is \"an electron emitted from the nucleus.\" But there are no electrons in the nucleus. Explain the process by which a beta-minus particle is created and emitted, and why this doesn't violate the principle that electrons don't exist in the nucleus. (3 steps)", "answer": "- Step 1: The electron in beta-minus decay is **not pre-existing** inside the nucleus. It is *created* at the moment of decay when a **neutron converts into a proton**.\n- Step 2: At the quark level, a down quark (charge −1/3) in the neutron changes into an up quark (charge +2/3): d → u. This changes the neutron (udd) into a proton (uud). The charge difference of +1 is carried away by the newly created electron (charge −1), and an antineutrino balances lepton number.\n- Step 3: The electron is created from the energy released by the nuclear transformation (via the weak force, mediated by the W⁻ boson). It exists only at the moment of creation and immediately leaves the nucleus. There are no electrons \"sitting\" in the nucleus before decay.\n\n+ Analogy: A light bulb doesn't \"store\" light inside it. The light is created when electrical energy flows and is emitted immediately. Similarly, the beta electron is created by the decay energy and emitted immediately.\n\nKey takeaway: Beta particles are created during decay, not stored in the nucleus. The neutron→proton conversion (d→u quark change) produces the electron via the weak force.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "Why is radioactive decay described as \"random and spontaneous\", and what does this mean operationally for a single nucleus vs. a large sample? (3 steps)", "answer": "- Step 1: **Spontaneous**: not influenced by external conditions — temperature, pressure, chemical state don't change decay rates. The nucleus decays purely due to internal quantum mechanics.\n- Step 2: **Random**: for any single nucleus, we cannot predict *when* it will decay. There's only a fixed probability per unit time that it will.\n- Step 3: For a large sample (e.g. $$10^{20}$$ atoms), random fluctuations average out and we get statistically predictable behaviour, characterised by a half-life. So individual = unpredictable; bulk = deterministic.\n\nTakeaway: Like flipping coins — each flip random, but in 1 million flips you predict ~500,000 heads accurately.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "When a proton and antiproton annihilate, the energy released is $$2mc^2$$ (where m is the proton mass). Why is the energy twice the proton's rest-mass energy, and how many photons are typically produced? (2 steps)", "answer": "- Step 1: Both the proton (mass m) and the antiproton (mass m) are destroyed. Their *combined* mass is 2m, so the total energy released is $$2mc^2$$. Each particle contributes its own rest-mass energy to the annihilation.\n- Step 2: Typically **two photons** are produced (travelling in opposite directions), for the same reason as electron–positron annihilation: momentum conservation requires at least two photons in the centre-of-mass frame.\n\n+ Each photon carries energy $$mc^2$$ (in the centre-of-mass frame where total initial momentum is zero). The proton–antiproton annihilation releases ~1.876 GeV — vastly more than electron–positron annihilation (~1.022 MeV).\n\nKey takeaway: Annihilation of any particle–antiparticle pair releases $$E = 2mc^2$$, shared between (typically) two photons. The heavier the particle, the more energy released.", "source": "GLM 5.1 ③", "_id": "glm_3_58"}, {"question": "Why must the distance between the radioactive source and the Geiger-Muller tube be kept constant throughout the gamma absorption practical? (2 steps)", "answer": "- Step 1: The intensity of radiation decreases with distance from the source (approximately following an inverse-square law for a point source). If the distance changes between measurements, the count rate changes for a reason unrelated to the lead thickness.\n- Step 2: Keeping the distance constant ensures it is a **control variable** — the only variable affecting the count rate (besides background) is the lead thickness. This allows valid conclusions about the relationship between lead thickness and gamma absorption.\n\nChange one thing at a time. If distance varies, you're measuring the combined effect of distance and lead thickness, and you can't separate them. Control variables are essential for valid experiments.", "source": "GLM 5.1 ①", "_id": "glm_1_94"}, {"question": "In the uranium-238 decay series, uranium decays to thorium, then to protactinium, then back to a different isotope of uranium. Explain how an element can appear again after decaying away. (3 steps)", "answer": "- Step 1: Uranium-238 ($$Z = 92$$, $$A = 238$$) decays by **alpha** to thorium-234 ($$Z = 90$$, $$A = 234$$). This changes the element because alpha decay removes protons.\n- Step 2: Thorium-234 then decays by **beta-minus** to protactinium-234 ($$Z = 91$$, $$A = 234$$), which decays by **beta-minus** again to uranium-234 ($$Z = 92$$, $$A = 234$$). Two beta decays each increase $$Z$$ by 1, bringing it back to 92 — uranium again!\n- Step 3: But this is **uranium-234**, not uranium-238. Same element (same $$Z$$), different isotope (different $$A$$, hence different neutron count). The series continues until it reaches a stable isotope (lead-206).\n\nAlpha changes the element by removing protons. Beta-minus can bring Z back up by converting neutrons to protons. The element \"returns,\" but lighter — it's a different isotope.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Why are pair production and annihilation considered \"inverses\" of each other? (3 steps)", "answer": "- Step 1: **Pair production**: a high-energy photon (with help from a nucleus to conserve momentum) converts into a particle–antiparticle pair, e.g. $$\\gamma \\to e^{-} + e^{+}$$. Energy becomes mass.\n- Step 2: **Annihilation**: a particle meets its antiparticle and converts back into photons, e.g. $$e^{-} + e^{+} \\to 2\\gamma$$. Mass becomes energy.\n- Step 3: Both obey $$E = mc^2$$ symmetrically. The pair-production threshold ($$2mc^2$$) equals the annihilation output (two photons each of energy $$mc^2$$).\n\nTakeaway: They're the same physics running in opposite directions. Both express the deep interconvertibility of mass and energy.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why does a charged particle moving perpendicular to a magnetic field trace out a circular path, and how does the radius depend on momentum, charge, and field?", "answer": "- Step 1: The magnetic force on a moving charge is $$F = Qvb$$, always perpendicular to velocity. A force constantly perpendicular to motion doesn't change speed — it just changes direction → circular motion.\n- Step 2: Equating magnetic force to centripetal force: $$QvB = \\frac{mv^2}{r}$$, giving $$r = \\frac{mv}{BQ} = \\frac{p}{BQ}$$.\n- Step 3: Reading the formula:\n+ Larger momentum $$p$$ → larger radius (faster/heavier particles curve more gently)\n+ Stronger field $$B$$ → smaller radius (tighter curves)\n+ Larger charge $$Q$$ → smaller radius (more force per unit speed)\n\nTakeaway: The radius is a direct probe of momentum once you know $$B$$ and $$Q$$. This is how detectors measure particle momentum.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "The quark composition of a proton is uud and a neutron is udd. In beta-minus decay (n → p + e⁻ + $$\\bar{\\nu}_e$$), describe the change at the quark level and identify which quark \"flavour\" changes. (2 steps)", "answer": "- Step 1: Neutron = udd → proton = uud. Comparing the two, one **down quark (d)** has changed into an **up quark (u)**. The other two quarks (u and d) remain unchanged.\n- Step 2: At the quark level: d → u + W⁻ (virtual), and W⁻ → e⁻ + $$\\bar{\\nu}_e$$. The weak force mediates this quark flavour change. The charge changes from −1/3 (d) to +2/3 (u), a net increase of +1, balanced by the electron's −1 charge.\n\n+ This is why beta decay is a **weak interaction** — only the weak force can change quark flavour (i.e., change one type of quark into another).\n\nKey takeaway: Beta-minus decay at the quark level: d → u. One down quark becomes one up quark, mediated by the weak force (W⁻ boson).", "source": "GLM 5.1 ③", "_id": "glm_3_82"}, {"question": "Why can't we speed up radioactive decay by heating the sample or applying pressure? What property of decay does this demonstrate? (2 steps)", "answer": "- Step 1: Radioactive decay is governed by the **strong and weak nuclear forces** operating within the nucleus, at energy scales vastly different from thermal or mechanical energies. Heating a sample to even thousands of kelvin adds only ~0.1 eV per particle, while nuclear energy levels are on the order of MeV — a factor of $$10^7$$ difference. The thermal energy is utterly negligible compared to nuclear binding energies.\n- Step 2: This demonstrates the **spontaneous** nature of radioactive decay — it cannot be influenced by environmental factors. The decay probability depends only on the internal nuclear structure, not on external conditions.\n\nNuclear processes are insulated from everyday energies by ~7 orders of magnitude. You'd need conditions like those inside a star to affect nuclear decay rates.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "Consider a proton, an alpha particle, and an electron all entering the same magnetic field at the same speed perpendicular to the field. Without calculating, rank the radii of their circular paths and explain.", "answer": "- Step 1: From $$r = mv/(BQ)$$, at fixed $$v$$ and $$B$$, $$r \\propto m/Q$$.\n- Step 2: Compute $$m/Q$$ ratios qualitatively:\n+ Electron: tiny mass, charge 1 → $$m/Q$$ very small → very small radius\n+ Proton: mass $$\\approx 1836 m_e$$, charge 1 → moderate radius\n+ Alpha: mass $$\\approx 4 \\times$$ proton mass, charge 2 → $$m/Q$$ = 2× proton's → roughly twice proton's radius\n- Step 3: Ranking: $$r_{e^-} \\ll r_p < r_{\\alpha}$$. Electron's path is tightest by far; alpha's is the largest.\n\nTakeaway: At equal speed, heavier particles with comparable charge curve more gently — they have more \"inertia per unit force\".", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "In a cloud chamber with a magnetic field, you observe a track that spirals inward with a very tight radius. A second track spirals inward with a much wider radius. Which particle had the higher initial momentum, and which lost energy faster? (2 steps)", "answer": "- Step 1: Since $$r = \\frac{p}{BQ}$$ (with B and Q constant for same-type particles), a **larger radius means higher momentum**. The wider-spiral particle had higher initial momentum.\n- Step 2: Both tracks spiral inward because both are losing energy through ionisation. The tight-radius particle has lower momentum throughout and is losing a **larger fraction** of its energy per unit distance, but we can't determine which loses energy *faster in absolute terms* without more information. However, the tight-radius particle will stop (reach r ≈ 0) sooner.\n\n+ The rate of energy loss depends on the particle's charge, speed, and the medium. A highly charged, slow particle in a dense medium loses energy fastest (high ionisation rate).\n\nKey takeaway: Track radius = live momentum indicator. Wider spiral = more momentum. Spiralling inward = losing energy.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "Particle tracks in a detector often spiral inward (radius decreasing) — why does this happen, and what does the direction of the spiral reveal? (3 steps)", "answer": "- Step 1: As a charged particle moves through the gas/liquid in a detector, it ionises atoms along its path, losing kinetic energy with each ionisation.\n- Step 2: Less KE → less momentum → smaller radius $$r = p/(BQ)$$. So the track curves more tightly as the particle slows.\n- Step 3: This means the **outer end of the spiral is where the particle started** (high momentum, large radius), and the **inner end is where it slowed**. Reading direction: outside → inside = time direction of motion.\n\nTakeaway: Spirals tell you both the particle's energy loss and its direction of travel — a tiny picture full of information.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why is gamma radiation \"reduced\" by lead but not fully \"stopped,\" whereas alpha is fully stopped by paper? (3 steps)", "answer": "- Step 1: Alpha interacts with virtually *every* atom it passes (huge ionising cross-section due to charge $$+2$$ and slow speed). Even thin paper contains enough atoms to fully drain its kinetic energy.\n- Step 2: Gamma is a neutral, uncharged photon — it only interacts with matter through rare photon-atom events (photoelectric absorption, Compton scattering, pair production). Most photons pass through unimpeded.\n- Step 3: Therefore lead reduces gamma intensity *exponentially* with thickness — each layer absorbs some fraction, but you can never fully reach zero, only progressively smaller fractions. There is no finite thickness that \"completely\" stops gamma — only thicknesses that reduce it to negligible levels.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "When an electron meets a positron and annihilates, why are two photons emitted (not one), and in what directions?", "answer": "- Step 1: Before collision (say at rest in the lab frame), the total momentum is approximately zero.\n- Step 2: A single photon has momentum $$p = E/c \\neq 0$$. So emitting one photon would violate momentum conservation.\n- Step 3: Two photons emitted in **opposite directions** with equal and opposite momenta give net zero momentum, satisfying conservation. Each photon carries energy $$mc^2 \\approx 0.511$$ MeV for an electron–positron pair.\n\nTakeaway: Two photons back-to-back is the only way to conserve both energy AND momentum from an at-rest annihilation.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Write the general form of beta-minus decay (including the neutrino), and explain why $$Z$$ increases while $$A$$ stays the same.", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow {}^{A}_{Z+1}Y + {}^{0}_{-1}\\beta + \\bar{\\nu}_e$$\n- Step 2: Inside the nucleus, a neutron becomes a proton. So the total nucleon count (protons + neutrons) is unchanged → $$A$$ stays the same.\n- Step 3: One neutron has been replaced by a proton → proton count goes up by 1 → $$Z \\to Z+1$$. The element shifts one place right in the periodic table.\n\nCommon trap: forgetting the antineutrino $$\\bar{\\nu}_e$$. It carries away energy and angular momentum, and conserves lepton number.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why did the plum pudding model predict that ALL alpha particles should pass nearly straight through gold foil, and why was Rutherford's result so shocking?", "answer": "- Step 1: In the plum pudding model, positive charge was spread uniformly through the whole atom like jelly with embedded electron \"raisins\". The charge density at any point is therefore very low.\n- Step 2: A fast alpha particle passing through this diffuse positive jelly would feel only tiny electrostatic forces from any one region, so it should barely deflect.\n- Step 3: Rutherford observed that ~1 in 8000 alphas bounced back at angles >90°. This required a force strong enough to reverse a fast, massive particle — only possible if positive charge is concentrated in a tiny region (the nucleus).\n\nTakeaway: Diffuse charge → tiny deflections only. Concentrated charge → occasional huge deflections. The data forced the nuclear model.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "A student says: \"Half-life is the time for all the radioactive atoms to decay.\" Correct this misconception precisely. (2 steps)", "answer": "- Step 1: Half-life is the time for **half** (not all) of the radioactive nuclei in a sample to decay. After one half-life, 50% remain; after two, 25%; after three, 12.5%, and so on.\n- Step 2: Mathematically, the number of undecayed nuclei follows $$N = N_0 e^{-\\lambda t}$$, which **never reaches zero**. Theoretically, there is always a fraction remaining (though for practical purposes, after ~10 half-lives, less than 0.1% remains and the activity is negligible). The sample never fully \"finishes\" decaying.\n\nHalf-life halves the population, not eliminates it. It's like folding a piece of paper in half repeatedly — you can always fold again (in theory), getting thinner but never reaching zero thickness.", "source": "GLM 5.1 ①", "_id": "glm_1_92"}, {"question": "If you doubled the magnetic field strength in a cyclotron, qualitatively what would happen to the radius of a proton's orbit at a given speed, and to the maximum energy achievable in a fixed-radius machine? (2 steps)", "answer": "- Step 1: From $$r = \\dfrac{mv}{Bq}$$, doubling $$B$$ at fixed $$v$$ halves the radius. So at any given speed, the proton spirals more tightly.\n- Step 2: In a fixed-radius cyclotron (fixed maximum $$r$$), this means the proton can be accelerated to *higher* speed (and energy) before its orbit exceeds the machine's size — since $$v_{\\max} = B q r_{\\max} / m$$. So stronger magnets → higher achievable energy. This is why building higher-energy accelerators motivates the development of stronger superconducting magnets.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "A student measures count rates at different distances from a gamma source and plots a graph. The graph shows count rate decreasing with distance but levelling off at ~15 cpm at large distances. What is the background count rate, and what is the corrected count rate at a distance where the measured rate is 95 cpm? (2 steps)", "answer": "- Step 1: The count rate levels off at **15 cpm** at large distances — this is the background radiation level (the source's radiation is fully absorbed by the air at that distance).\n- Step 2: At the distance where the measured count rate is 95 cpm, the corrected count rate = 95 − 15 = **80 cpm**. This 80 cpm is the true count rate from the gamma source alone.\n\n+ If you didn't subtract background, you'd think the source produces 95 cpm, overestimating by ~19%. This error would propagate into any calculations based on the count rate.\n\nKey takeaway: The plateau at large distances = background. Subtract it from all readings.", "source": "GLM 5.1 ③", "_id": "glm_3_80"}, {"question": "Why is it useful that unstable particles travelling at relativistic speeds have dilated lifetimes in particle accelerator experiments? (2 steps)", "answer": "- Step 1: Many exotic particles produced in collisions have extremely short rest-frame lifetimes (nanoseconds or less). Without time dilation, they would decay within millimetres of the collision point, leaving tracks too short to detect or measure.\n- Step 2: At relativistic speeds, time dilation stretches the particle's lifetime in the lab frame. The particle travels much further before decaying, leaving a **longer track** in the detector. This gives physicists more data to measure momentum, charge, and energy — making identification possible.\n\nTime dilation isn't just a curiosity — it's a practical necessity for particle physics. Without it, most of the particles we study would vanish before we could see them.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "In a decay chain, why does an unstable nucleus often need *many* successive decays before reaching stability rather than just one? (3 steps)", "answer": "- Step 1: A single alpha or beta emission only nudges $$A$$ and/or $$Z$$ by small amounts ($$\\Delta A = 4$$ or $$\\Delta Z = \\pm 1$$). Heavy unstable nuclei like uranium-238 are far from any stable nuclide on the chart of nuclides.\n- Step 2: After one decay, the daughter is usually still off the \"stability line\" — it has the wrong neutron-to-proton ratio — and so it too decays.\n- Step 3: This continues, with each step bringing the nuclide closer to stability, until a stable isotope is reached (for U-238, the chain ends at $$^{206}_{82}\\text{Pb}$$).\n\nThe chain is \"naturally selected\" by which decay each unstable nuclide prefers — alpha typically for very heavy nuclei (to shed mass quickly), beta for nuclides with the wrong neutron/proton balance.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Why must electrons be accelerated to very high energy (and hence very short de Broglie wavelength) to probe the *internal structure* of a proton? (3 steps)", "answer": "- Step 1: To \"see\" any structure of size $$d$$, the probe's wavelength must be $$\\lesssim d$$ — otherwise the wave diffracts around the structure without resolving it. (This is the same rule as: you can't see bacteria with visible light because they're smaller than the wavelength of visible light.)\n- Step 2: A proton's diameter is about $$10^{-15}$$ m. Internal structure (quarks) is much smaller. So we need electron de Broglie wavelengths well below $$10^{-15}$$ m.\n- Step 3: From $$\\lambda = h/p$$, short wavelength requires *very large momentum* — hence very high energy. Modern accelerators give electrons GeV-scale energies precisely to \"see\" inside protons and reveal quarks.\n\nThe faster the electron, the smaller its wavelength, the finer the structure you can resolve.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Muons created in the upper atmosphere have a lifetime of ~2.2 μs and travel at ~0.99c. Without relativistic effects, they'd only travel ~660 m — far less than the ~10 km to sea level. Explain how time dilation allows them to reach the ground. (3 steps)", "answer": "- Step 1: In the muon's *rest frame*, its lifetime is 2.2 μs. At 0.99c, the classical distance is d = vt ≈ (0.99)(3 × 10⁸)(2.2 × 10⁻⁶) ≈ 653 m — nowhere near 10 km.\n- Step 2: From the **Earth (laboratory) frame**, the muon is moving at 0.99c, so time dilation applies: the muon's lifetime is *stretched* by the factor $$\\gamma = \\frac{1}{\\sqrt{1 - v^2/c^2}}$$. At 0.99c, γ ≈ 7. So the muon lives ~7 × 2.2 μs ≈ 15.4 μs in our frame.\n- Step 3: In 15.4 μs at 0.99c, the muon travels ~4.6 km — much farther. From the muon's frame, length contraction means the atmosphere is *shorter* than 10 km, so it traverses it in less time. Both perspectives agree: muons reach the ground.\n\n+ Misconception: \"The muon's lifetime *increases*.\" Careful — the proper lifetime stays 2.2 μs. It's the *observed* lifetime that increases due to time dilation.\n\nKey takeaway: Without relativistic time dilation (and length contraction from the muon's frame), we couldn't detect muons at sea level. Their detection is direct experimental evidence for special relativity.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "In beta-minus decay, a student writes: $$^{14}_{6}C \\rightarrow ^{14}_{7}N + ^{0}_{-1}\\beta$$ with no neutrino. What conservation law is violated, and what particle must be added to fix it? (3 steps)", "answer": "- Step 1: Check **lepton number**. Before decay: no leptons → total L = 0. After decay: the beta particle (electron) has L = +1. So total L = +1 on the right side. Lepton number is **not conserved**.\n- Step 2: Check **energy/momentum**. The electron in beta decay doesn't carry a fixed energy — it has a *continuous spectrum*. If no other particle carries away the remaining energy, energy conservation appears violated.\n- Step 3: Adding an **electron antineutrino** ($$\\bar{\\nu}_e$$, with L = −1) fixes both: total lepton number becomes 0 (conserved), and the antineutrino carries away the variable \"missing\" energy and momentum.\n\n+ The correct equation: $$^{14}_{6}C \\rightarrow ^{14}_{7}N + ^{0}_{-1}\\beta + \\bar{\\nu}_e$$.\n\nKey takeaway: Forgetting the neutrino/antineutrino in beta decay is the #1 exam trap. It's required for lepton number conservation and explains the continuous beta energy spectrum.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Why must a linear accelerator (LINAC) use *alternating* voltage and have *progressively longer* drift tubes? (3 steps)", "answer": "- Step 1: Each drift tube is connected to AC. When an ion is between tubes (in the gap), the voltage polarity is set so the ion is pushed forward into the next tube — accelerated. Inside the tube, the ion drifts at constant speed (no field inside a conductor).\n- Step 2: While the ion drifts inside a tube, the AC reverses polarity, so by the time the ion emerges into the next gap, the field again accelerates it forward — never decelerates it.\n- Step 3: The AC frequency is *fixed*. But after each gap, the ion is faster. To make sure it spends the same *time* inside each tube (so it emerges in phase with the AC), each successive tube must be *longer*. Longer tube + faster ion = same drift time = synchronised with AC.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Using the quark model, show that charge is conserved in beta-minus decay: $$n \\rightarrow p + e^- + \\bar{\\nu}_e$$. (3 steps)", "answer": "- Step 1: Write the quark compositions. Neutron = udd, proton = uud. The beta-minus decay at the quark level involves one d quark converting to a u quark: d → u + e⁻ + $$\\bar{\\nu}_e$$.\n- Step 2: Calculate charge on each side. Left (neutron udd): $$+\\frac{2}{3} + (-\\frac{1}{3}) + (-\\frac{1}{3}) = 0$$. Right (proton uud + e⁻ + $$\\bar{\\nu}_e$$): $$[\\frac{2}{3} + \\frac{2}{3} + (-\\frac{1}{3})] + (-1) + 0 = +1 + (-1) + 0 = 0$$.\n- Step 3: Both sides have total charge = 0. Charge is conserved. ✓\n\n+ The key quark-level event: a down quark (charge −1/3) turns into an up quark (charge +2/3), and the charge difference of +1 is balanced by the electron (charge −1). This is mediated by the weak force (W⁻ boson).\n\nKey takeaway: Beta decay is fundamentally a quark flavour change: d → u, with the charge difference carried away by the electron.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Two tracks appear suddenly from the same point in a bubble chamber, curving in opposite directions with the same radius. What does this pattern indicate, and why must the tracks curve in opposite directions? (3 steps)", "answer": "- Step 1: Tracks appearing from \"nothing\" (no incoming track) indicate **pair production**: a neutral particle (typically a photon) has converted its energy into a particle–antiparticle pair. The photon leaves no track because it has no charge.\n- Step 2: The particle and antiparticle have the **same mass** (and therefore similar momentum for similar initial energy), so they curve with the same radius: $$r = \\frac{p}{Bq}$$ gives equal $$r$$ for equal $$p$$ and equal $$|q|$$.\n- Step 3: They curve in **opposite directions** because they have **opposite charges**. The magnetic force $$F = Bqv$$ reverses sign when $$q$$ reverses sign, so the centripetal force points inward for one and outward for the other relative to the same centre, producing mirror-image curvature.\n\nSame radius → same mass. Opposite curvature → opposite charge. Together, this is the fingerprint of pair production.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "In a linear accelerator (LINAC), the tubes get progressively longer. Why can't all tubes be the same length if the AC frequency is fixed? (3 steps)", "answer": "- Step 1: In a LINAC, ions are accelerated *only in the gaps between tubes*. Inside each tube, the ion drifts at constant speed (no electric field inside a conductor). The AC supply switches polarity at a fixed frequency, so the time between switches is constant.\n- Step 2: As the ion accelerates, it travels faster. If the tubes were all the same length, a faster ion would traverse a tube in *less time* than a slower one. It would arrive at the next gap too early, when the field has the wrong polarity — and would be *decelerated* instead of accelerated.\n- Step 3: To keep the ion arriving at each gap exactly when the field is in the accelerating direction, each tube must be built longer so that the ion spends the *same time* in each tube despite going faster. Since $$t = d/v$$ and $$t$$ must stay constant, $$d$$ must increase proportionally with $$v$$.\n\nFixed frequency → fixed timing window → longer tubes compensate for higher speed.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "The Δ$$^{++}$$ baryon has charge +2e and is made of three quarks, all of the same flavour. Which quark flavour must it be, and why? (3 steps)", "answer": "- Step 1: The only quarks available at this level are up ($$q = +2/3$$) and down ($$q = -1/3$$). Since all three quarks are the same flavour, we test both options.\n- Step 2: Three down quarks: charge = $$(-1/3) + (-1/3) + (-1/3) = -1e$$. This gives charge −1, not +2. ✗\n- Step 3: Three up quarks: charge = $$(+2/3) + (+2/3) + (+2/3) = +6/3 = +2e$$. This matches the required charge +2e. ✓ The Δ$$^{++}$$ is composed of **uuu**.\n\nThe quark model predicts this particle: if uud gives +1 (proton) and udd gives 0 (neutron), then uuu must give +2. This is the Δ$$^{++}$$, discovered experimentally and confirming the model.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "Why does the proposed reaction $$p + p \\to p + p + \\pi^{+} + \\bar{p}$$ violate baryon conservation, and what does that tell us about whether it can occur? (3 steps)", "answer": "- Step 1: Count baryon numbers. LHS: two protons → $$B = +1 + 1 = +2$$.\n- Step 2: RHS: two protons ($$B = +1$$ each), one pion ($$B = 0$$, mesons aren't baryons), one antiproton ($$B = -1$$). Total: $$1 + 1 + 0 + (-1) = +1$$.\n- Step 3: $$B_{\\text{before}} = 2 \\neq B_{\\text{after}} = 1$$. Baryon number is not conserved → the reaction is **forbidden** by the laws of physics, no matter how much energy you supply.\n\nCompare: $$p + p \\to p + p + p + \\bar{p}$$ would give $$B = 2$$ on both sides, and *is* observed (this is how antiprotons are made at accelerators).\n\nTakeaway: Conservation laws are absolute filters — they rule out reactions completely, not just energetically.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "What is \"stability\" for a nucleus, and what does it mean for the U-238 decay chain to end at $$^{206}_{82}\\text{Pb}$$?", "answer": "A stable nucleus is one that does not spontaneously decay — its proton-to-neutron balance is favourable enough that no rearrangement releases energy. Lead-206 sits at a \"valley of stability\" in the chart of nuclides — it has just the right neutron/proton ratio for that mass region. Once U-238 has shed enough alphas and betas to reach Pb-206, the chain stops; there is no energetically favourable decay available. So a lump of pure uranium-238, given enough time (billions of years), eventually becomes lead.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "In a cloud chamber, you observe a track that curves to the *right* in a magnetic field pointing into the page. The track has a large radius. Is the particle positively or negatively charged, and does it have high or low momentum? Use Fleming's Left Hand Rule. (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule: First finger = field direction (into page), thumb = force direction (toward centre of curvature = to the right for a right-curving track). The second finger then points *upward*, which represents the direction of *conventional current* (positive charge motion).\n- Step 2: Since the second finger (conventional current) points upward and the particle is moving upward (or at least has a component matching this), the particle must be **positively charged**. A negative charge would curve in the opposite direction.\n- Step 3: The **large radius** indicates **high momentum**, since $$r = p/(Bq)$$ and $$B$$ and $$q$$ are fixed. The particle is heavy or fast (or both).\n\nLarge radius → high momentum. Curvature direction → charge sign. Together, you can read both properties from a single photograph.", "source": "GLM 5.1 ①", "_id": "glm_1_77"}, {"question": "Explain why the mass of a proton is approximately 938 MeV/c² while its constituent quarks only total about 9 MeV/c². (2 steps)", "answer": "- Step 1: The three valence quarks (uud) have very small masses — up quark ~2.2 MeV/c², down ~4.7 MeV/c², totaling only ~9 MeV/c².\n- Step 2: Most of the proton's mass comes from the binding energy of the strong nuclear force (E = mc²) and the kinetic energy of the quarks confined within the proton. This is an example of mass-energy equivalence — the confinement energy contributes significantly to the observed mass.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "What are the charges of the up and down quarks, and how do they combine to give the correct charges of the proton and neutron? (3 steps)", "answer": "- Step 1: Quark charges (in units of $$e$$): up = $$+\\tfrac{2}{3}$$, down = $$-\\tfrac{1}{3}$$.\n- Step 2: **Proton (uud)**: $$+\\tfrac{2}{3} + \\tfrac{2}{3} - \\tfrac{1}{3} = +1$$. ✓\n- Step 3: **Neutron (udd)**: $$+\\tfrac{2}{3} - \\tfrac{1}{3} - \\tfrac{1}{3} = 0$$. ✓\n\nTakeaway: The fractional quark charges always sum to integer hadron charges. This is a deep symmetry of the Standard Model.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Roughly how many times larger is the atom than its nucleus, and what does this tell us about the atom's structure?", "answer": "The atom is about $$100{,}000$$ times larger than the nucleus in linear dimension. This means the vast majority of the atom's volume is empty space — the electrons orbit at huge distances (relative to the nucleus) from a very tiny, dense center. If the nucleus were a marble in the middle of a football stadium, the electrons would be at the stands. This is why most alpha particles in Rutherford's experiment sailed straight through without \"hitting\" anything.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "In a decay chain, a nucleus undergoes two alpha decays followed by one beta-minus decay. If you start with $$^{230}_{90}\\text{Th}$$, what is the final daughter nucleus? (3 steps)", "answer": "- Step 1: Two alpha decays remove a total of 8 nucleons and 4 protons: $$A = 230 - 8 = 222$$, $$Z = 90 - 4 = 86$$. After two alphas: $$^{222}_{86}\\text{Rn}$$ (radon).\n- Step 2: One beta-minus decay keeps $$A$$ the same but increases $$Z$$ by 1: $$A = 222$$, $$Z = 86 + 1 = 87$$. After beta: $$^{222}_{87}\\text{Fr}$$ (francium).\n- Step 3: The final daughter is $$^{222}_{87}\\text{Fr}$$. Check: total change in $$A$$ is $$-8$$ (two alphas, beta contributes 0), total change in $$Z$$ is $$-4 + 1 = -3$$. $$230 - 8 = 222$$ ✓, $$90 - 3 = 87$$ ✓.\n\nQuick shortcut: each alpha → $$\\Delta A = -4$$, $$\\Delta Z = -2$$. Each beta-minus → $$\\Delta A = 0$$, $$\\Delta Z = +1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "In the Rutherford scattering experiment, why was gold foil used rather than, say, aluminium foil? (2 steps)", "answer": "- Step 1: Gold has a **very high atomic number** ($$Z = 79$$), meaning its nucleus has a large positive charge. This produces stronger Coulomb repulsion with the alpha particles, leading to more large-angle deflections and making the scattering pattern easier to observe.\n- Step 2: Gold is also extremely **malleable** — it can be hammered into very thin foils (only a few hundred atoms thick). A thin foil ensures that alpha particles undergo essentially a *single* scattering event as they pass through, rather than multiple scatterings that would blur the results. Aluminium has lower $$Z$$ (weaker deflections) and is harder to make as thin.\n\nHigh $$Z$$ → stronger scattering signal. Extreme thinness → clean single-scattering data. Gold is uniquely suited on both counts.", "source": "GLM 5.1 ①", "_id": "glm_1_69"}, {"question": "In the quark model, explain how beta-minus decay occurs at the quark level. (2 steps)", "answer": "- Step 1: In beta-minus decay, a down quark within a neutron changes into an up quark: d → u + e⁻ + v̄ₑ\n- Step 2: This changes the neutron (udd, charge 0) into a proton (uud, charge +1), while the electron and antineutrino are emitted. The reverse happens in beta-plus decay: a proton's up quark changes to down, emitting a positron and neutrino.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "Compare the risks of an alpha-emitting source that is (a) held in your hand vs. (b) inhaled into your lungs. Why is the risk dramatically different? (2 steps)", "answer": "- Step 1: **(a) Held in hand**: Alpha particles are stopped by the dead outer layer of skin (a few cm of air or paper equivalent). They cannot reach living tissue, so the external hazard from alpha is essentially **zero**.\n- Step 2: **(b) Inhaled into lungs**: Inside the lungs, there is no protective dead skin layer. Alpha particles directly ionise living lung tissue over their short range, depositing intense, concentrated damage. This dramatically increases lung cancer risk. Radon gas is the classic example — it's the second leading cause of lung cancer after smoking.\n\nAlpha outside = harmless. Alpha inside = devastating. The same radiation can be trivial or lethal depending on whether it reaches living tissue.", "source": "GLM 5.1 ①", "_id": "glm_1_89"}, {"question": "Strontium-90 has a half-life of 28 years. A sample has an activity of 6.4 × 10⁹ Bq. Conceptually walk through how you would find the decay constant λ in s⁻¹. (3 steps)", "answer": "- Step 1: Use the half-life to decay constant relationship: $$\\lambda = \\frac{\\ln 2}{t_{1/2}}$$. First convert half-life to seconds: 28 years × 365 × 24 × 3600 ≈ 8.83 × 10⁸ s.\n- Step 2: Calculate λ: $$\\lambda = \\frac{0.693}{8.83 \\times 10^8} \\approx 7.85 \\times 10^{-10}$$ s⁻¹. This is a very small decay constant, consistent with a long half-life.\n- Step 3: If you needed the number of nuclei N, use $$A = \\lambda N$$: $$N = \\frac{A}{\\lambda} = \\frac{6.4 \\times 10^9}{7.85 \\times 10^{-10}} \\approx 8.15 \\times 10^{18}$$ nuclei — a huge number, as expected for a macroscopic sample.\n\n+ The key insight: long half-life = small λ = slow decay = many nuclei needed for a given activity level.\n\nKey takeaway: Convert half-life to seconds, then use $$\\lambda = \\ln 2 / t_{1/2}$$. The activity data (6.4 × 10⁹ Bq) isn't needed for λ — it's only needed if you want N.", "source": "GLM 5.1 ③", "_id": "glm_3_77"}, {"question": "A hadron is made of quarks. What distinguishes a baryon from a meson in terms of quark content, and why can't a baryon contain a mix of quarks and antiquarks? (3 steps)", "answer": "- Step 1: A **baryon** consists of **3 quarks** (e.g., proton = uud, neutron = udd). A **meson** consists of a **quark–antiquark pair** (e.g., pion = u$$\\bar{d}$$). Both are hadrons (both interact via the strong force), but their quark architecture is fundamentally different.\n- Step 2: Each quark has baryon number $$B = +\\frac{1}{3}$$, and each antiquark has $$B = -\\frac{1}{3}$$. A baryon must have total baryon number $$B = +1$$ (a whole number). Three quarks give $$\\frac{1}{3} + \\frac{1}{3} + \\frac{1}{3} = 1$$. ✓\n- Step 3: If a baryon contained, say, two quarks and one antiquark, the baryon number would be $$\\frac{1}{3} + \\frac{1}{3} - \\frac{1}{3} = \\frac{1}{3}$$, which is not an integer. But baryon number is a quantum number that must be an integer for any observed particle. Such a combination would be a meson-like object, not a baryon. Nature simply doesn't allow fractional baryon numbers for free particles.\n\nBaryon = 3 quarks (integer $$B$$). Meson = quark + antiquark ($$B = 0$$). Mixed quark-antiquark triples give fractional $$B$$ → forbidden.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "A student claims: \"An isotope and an ion are the same thing — both have different numbers of particles than the standard atom.\" Distinguish these two concepts clearly. (2 steps)", "answer": "- Step 1: An **isotope** has a different number of **neutrons** in the nucleus compared to the most common form of the element. The proton number is the same. This is a *nuclear* property — it affects stability and mass but not chemistry.\n- Step 2: An **ion** has a different number of **electrons** orbiting the nucleus compared to the neutral atom. The nucleus (protons and neutrons) is unchanged. This is an *electronic* property — it affects chemical behaviour and charge, but not nuclear stability.\n\nIsotope = same element, different neutrons (nuclear difference). Ion = same element, different electrons (chemical difference). They are completely distinct concepts that sometimes overlap (you can have a radioactive ion, for example).", "source": "GLM 5.1 ①", "_id": "glm_1_76"}, {"question": "Why is a gamma ray assigned both zero mass and zero charge, and what does that say about its physical nature?", "answer": "Gamma radiation is not a particle of matter at all — it is high-frequency electromagnetic radiation (a photon), so it has no rest mass and no electric charge. It is pure energy released by a nucleus that was in an excited (higher-energy) state and is \"relaxing\" to a lower-energy state. Because nothing material leaves the nucleus, the proton number and nucleon number are unchanged by gamma emission — only energy is carried away.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A proposed reaction is $$p + p \\to p + p + \\pi^+$$. Check whether it's allowed using charge and baryon number. (3 steps)", "answer": "- Step 1: **Charge:** LHS $$= 1 + 1 = 2$$. RHS $$= 1 + 1 + 1 = 3$$. Not balanced — charge not conserved!\n- Step 2: **Baryon number:** LHS $$= 1 + 1 = 2$$. RHS $$= 1 + 1 + 0 = 2$$ (the pion is a meson, $$B=0$$). Balanced.\n- Step 3: Even though baryon number balances, **charge does not** — the reaction is forbidden. A valid version would be $$p + p \\to p + n + \\pi^+$$, where charge is $$1+1 = 1+0+1 = 2$$. ✓\n\nThe lesson: an interaction must satisfy *every* conservation law to be allowed; failing even one kills it.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "In a cyclotron, the particle's orbital radius increases as it gains speed, but the time for each semicircular orbit stays constant. Why? (3 steps)", "answer": "- Step 1: The radius of the orbit is $$r = \\frac{mv}{Bq}$$. As the particle gains speed $$v$$, the radius $$r$$ increases proportionally, so the particle spirals outward.\n- Step 2: The time for one semicircular orbit is $$t = \\frac{\\pi r}{v} = \\frac{\\pi m}{Bq}$$. Notice that both $$r$$ and $$v$$ cancel: the time depends only on $$m$$, $$B$$, and $$q$$, which are all constant.\n- Step 3: This means the **period is independent of speed and radius** — a remarkable result. The particle always takes the same time to complete a half-circle, regardless of how fast it's going. This is why a fixed-frequency AC supply works: the switching frequency can be constant.\n\nThis independence of period from radius is the elegant physics that makes cyclotrons work. It only holds for non-relativistic speeds; at relativistic speeds, the effective mass increases and the period changes — requiring a synchrocyclotron.", "source": "GLM 5.1 ①", "_id": "glm_1_66"}, {"question": "A muon created at 10 km altitude has a proper lifetime of 2.2 μs. From the muon's reference frame, explain how length contraction allows it to reach the ground, even though its proper lifetime seems too short. (2 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is only 2.2 μs. But due to **length contraction**, the 10 km distance to the ground (as measured in the Earth frame) appears **shorter** in the muon's frame. At 0.99c, the Lorentz factor γ ≈ 7, so the distance contracts to ~10 km / 7 ≈ 1.4 km.\n- Step 2: In 2.2 μs at 0.99c, the muon travels ~650 m. But it only needs to cover ~1.4 km in its own frame, not 10 km. Multiple half-lives later (but still within its dilated lifetime from Earth's perspective), it reaches the ground.\n\n+ From Earth's frame: time dilation stretches the muon's lifetime. From the muon's frame: length contraction shrinks the distance. Both descriptions are consistent — this is the beauty (and weirdness) of special relativity.\n\nKey takeaway: Earth frame → time dilation (muon lives longer). Muon frame → length contraction (distance is shorter). Both explain why muons reach the ground.", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "Why are electrons better than alpha particles for probing the structure of nucleons?", "answer": "Electrons are leptons — they do not feel the strong nuclear force. So they interact with protons/neutrons purely via the electromagnetic force, in a clean, well-understood way. They can approach extremely close without being deflected or absorbed by the strong force. Alpha particles, by contrast, are themselves made of protons and neutrons; they feel the strong force, so they get \"smeared\" by complex strong interactions before they can resolve fine structure. Electrons give a much cleaner snapshot of the charge distribution inside a nucleon.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Why is the proton number — not the nucleon number — what defines which element an atom is?", "answer": "The proton number sets the nuclear charge, which determines how many electrons a neutral atom holds and how those electrons arrange into shells. Chemistry (bonding, reactivity, spectra) is governed almost entirely by electron configuration, which in turn is governed by proton count. Two atoms with the same $$Z$$ but different neutron counts (isotopes) behave essentially identically chemically — they're the same element. Change $$Z$$, however, and the element itself changes.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "A reaction is proposed: $$p + p \\rightarrow p + p + \\pi^+ + \\bar{p}$$. Determine whether this reaction is permitted by checking conservation of charge and baryon number. (3 steps)", "answer": "- Step 1: Check **charge Q**. Left side: 1 + 1 = +2. Right side: 1 + 1 + 1 + (−1) = +2. Charge is conserved. ✓\n- Step 2: Check **baryon number B**. Left side: protons are baryons, so 1 + 1 = +2. Right side: two protons (B = 1 each) + one pion (B = 0, it's a meson) + one antiproton (B = −1). Total = 1 + 1 + 0 + (−1) = +1. Baryon number is **not conserved**. ✗\n- Step 3: Since baryon number is not conserved, **this reaction is not permitted**, even though charge is conserved. All three conservation laws must hold simultaneously.\n\n+ The reaction would need an additional baryon on the right side (or one fewer on the left) to balance B.\n\nKey takeaway: One conservation law failing is enough to forbid the reaction — all must be satisfied.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Why can't quarks exist independently in nature? (2 steps)", "answer": "- Step 1: The strong force between quarks increases with distance (unlike electromagnetism which decreases). Trying to separate quarks requires enormous energy.\n- Step 2: When enough energy is applied to pull quarks apart, new quark-antiquark pairs materialise from the energy (E = mc²), forming new hadrons. This is called \"confinement\" — quarks are always found in groups of two (mesons) or three (baryons).", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "A nuclide undergoes a decay where $$A$$ drops by $$4$$ and $$Z$$ drops by $$2$$. Without seeing the equation, what kind of decay is it, and why?", "answer": "It must be alpha decay. Only alpha removes $$4$$ nucleons and $$2$$ protons in one step. Beta-minus changes $$Z$$ by $$+1$$ with no change in $$A$$; beta-plus changes $$Z$$ by $$-1$$ with no change in $$A$$; gamma changes neither. So $$\\Delta A = -4, \\Delta Z = -2$$ is the unmistakable signature of an alpha emission.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "When a particle meets its antiparticle, they annihilate and produce two photons. Why *two* photons rather than one? (3 steps)", "answer": "- Step 1: Consider the **conservation of momentum**. Before annihilation, in the centre-of-mass frame, the total momentum is zero (particle and antiparticle have equal and opposite momenta). A single photon always carries momentum $$p = \\frac{E}{c}$$, so it cannot have zero total momentum.\n- Step 2: With **two photons**, they can be emitted in opposite directions with equal energy, so their momenta cancel: $$\\vec{p}_1 + \\vec{p}_2 = 0$$. This satisfies conservation of momentum in the centre-of-mass frame.\n- Step 3: Additionally, conservation of energy requires the total photon energy to equal the total rest-mass energy plus any kinetic energy: $$E_{\\text{total}} = 2mc^2 + KE_{\\text{pair}}$$. Two photons can share this energy while satisfying both energy and momentum conservation simultaneously.\n\nOne photon → momentum can't be conserved. Two photons back-to-back → both energy and momentum conserved.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "Explain why the electron-volt is a more convenient unit than the joule for particle physics, using the scale of typical energies involved. (2 steps)", "answer": "- Step 1: Particle physics energies are extremely small in joules. For example, a proton's rest-mass energy is about $$1.5 \\times 10^{-10}$$ J — an unwieldy number with many zeros. In eV, this is about 938 MeV — a manageable number.\n- Step 2: The electron-volt is defined as the energy gained by an electron crossing 1 V: $$1\\text{ eV} = 1.6 \\times 10^{-19}$$ J. Since particle accelerators use potential differences (kV, MV), the energy naturally comes out in keV, MeV, or GeV. The unit is tailored to the scale of the physics.\n\n1 eV is to particle physics what 1 kg is to everyday life — a unit sized to the phenomena. Using joules for particle physics is like measuring your height in light-years.", "source": "GLM 5.1 ①", "_id": "glm_1_75"}, {"question": "Why is the beta particle’s energy spectrum continuous?", "answer": "- Step 1: Beta decay releases variable energy between the electron and antineutrino.  \n- Step 2: Neutrinos carry away \"missing\" energy → beta particle energy varies.  \n- Step 3: This explained the historical confusion about energy non-conservation in beta decay.  \n\n**Historical context:** The neutrino hypothesis resolved the missing energy problem (Wolfgang Pauli).", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "Explain why a banana is slightly radioactive. What element is responsible, and what type of decay does it undergo? (2 steps)", "answer": "- Step 1: Bananas contain **potassium**, including the radioactive isotope **potassium-40** ($$^{40}_{19}\\text{K}$$). Potassium is an essential nutrient, and bananas are particularly rich in it.\n- Step 2: Potassium-40 undergoes both **beta-minus decay** (89% probability, turning into calcium-40) and **electron capture / beta-plus decay** (11% probability, turning into argon-40). The radiation dose from a single banana is negligible — about 0.1 μSv, or roughly 1% of daily background exposure.\n\nBananas are radioactive, but the dose is trivial. The \"banana equivalent dose\" (BED) is sometimes used to put radiation levels in perspective — a nuclear plant's permitted leakage is about 100 BEDs per year.", "source": "GLM 5.1 ①", "_id": "glm_1_97"}, {"question": "When an electron is accelerated from rest through a potential difference $$V$$, how do you relate its final kinetic energy to $$V$$, and why? (2 steps)", "answer": "- Step 1: The work done by the electric field on the electron is $$W = QV$$, where $$Q$$ is the charge. For an electron, $$Q = e$$.\n- Step 2: All this work becomes kinetic energy (assuming no losses), so $$\\tfrac{1}{2}m v^2 = eV$$. Rearranging gives the speed $$v = \\sqrt{2eV/m}$$.\n\nConceptually: voltage is \"energy per charge\"; accelerating one electron through $$V$$ volts gives it $$eV$$ joules of kinetic energy. This is why eV is such a natural unit — it directly matches the experimental setup.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "Even though alpha radiation is the *least penetrating*, why is it the *most biologically dangerous* if ingested or inhaled?", "answer": "Penetrating power and biological damage are not the same thing. Externally, alpha is harmless because skin stops it. But inside the body — say from inhaled radon gas or contaminated food — there is no skin barrier. The alpha's enormous ionising power then dumps all its energy into a very small region of tissue, ripping electrons from many atoms in cells (DNA, proteins). Beta and gamma spread their (weaker) damage over much longer paths, so any single cell receives less concentrated damage. So: alpha = short range, huge local damage; gamma = long range, diluted damage.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "If you wanted to deliberately reduce your background radiation exposure, list three practical actions (covering different sources) and the source they target.", "answer": "- Step 1: **Ventilate basements and ground floors** → reduces radon gas accumulation from underlying rocks. Radon is often the single largest natural exposure for people indoors.\n- Step 2: **Limit medical imaging to what's truly needed** → reduces exposure from X-rays and CT scans, the dominant man-made source for most people.\n- Step 3: **Avoid living at very high altitudes or flying frequently** → reduces cosmic ray exposure. At altitude, less atmospheric shielding means more cosmic radiation reaches you. Pilots and frequent flyers accumulate measurable extra dose.\n\nTakeaway: Different sources need different mitigations — there's no single fix. Knowing the source guides the action.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Why does a single uncharged photon, by itself in empty space, fail to produce an electron–positron pair even if it has plenty of energy?", "answer": "- Step 1: The energy threshold is just $$2 m_e c^2 \\approx 1.022$$ MeV, which many photons easily exceed (in cosmic rays, accelerators, etc.).\n- Step 2: But conservation of **momentum** in the centre-of-mass frame: imagine the frame where the produced $$e^-$$ and $$e^+$$ are at rest after creation. In that frame, total momentum after = 0. But a photon (massless) has $$p = E/c > 0$$ in *every* frame — there's no frame where a photon has zero momentum.\n- Step 3: Contradiction → impossible without a third body (nucleus) absorbing recoil. So you need: photon + nucleus → e⁻ + e⁺ + (recoiling nucleus).\n\nTakeaway: Energy conservation is satisfied, but momentum conservation forbids one-photon pair production. Nature requires a \"witness\" particle to balance the books.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Beta-minus particles are fast electrons — but there are no electrons in the nucleus to start with. So where does a $$\\beta^{-}$$ come from?", "answer": "- Step 1: Inside the nucleus, a **neutron converts into a proton**. This happens in nuclei that are \"neutron-rich\" (too many neutrons for stability).\n- Step 2: To conserve charge: neutron (0) → proton (+1) + electron (−1). The electron must be created and ejected to balance the books.\n- Step 3: That ejected high-speed electron *is* the beta-minus particle. It didn't exist as a constituent of the nucleus beforehand — it was **created in the moment of decay**.\n\n+ A neutrino's antiparticle (the **electron antineutrino**, $$\\bar{\\nu}_e$$) is also emitted to conserve lepton number and carry away momentum/energy.\n\nTakeaway: $$\\beta^{-}$$ is born from the conversion $$n \\to p + e^{-} + \\bar{\\nu}_e$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "In a typical decay chain, the very first decay of U-238 takes about $$4.5$$ billion years, while some intermediate decays take fractions of a second. Conceptually, why such an enormous range of timescales?", "answer": "The decay timescale (half-life) depends exponentially on how easily a nucleus can rearrange to a lower-energy state — specifically, on a \"quantum tunnelling\" probability through an energy barrier (for alpha decay) or on weak-interaction couplings (for beta decay). Small differences in nuclear structure produce vast differences in this probability, hence in half-life. U-238 sits in a deep, very stable configuration with a narrow tunneling probability → tiny decay rate → 4.5 billion year half-life. Some intermediate nuclei in the chain are wildly unbalanced and decay almost instantly. So decay rates can span $$\\sim 10^{25}$$ orders of magnitude across different nuclides — a stunning sensitivity to nuclear structure.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "An interaction is proposed: proton + proton → proton + proton + pion + antiproton. Check whether baryon number is conserved, and determine if the interaction is permitted. (3 steps)", "answer": "- Step 1: Left side: two protons, $$B = +1$$ each. $$B_{\\text{left}} = +2$$.\n- Step 2: Right side: two protons ($$B = +1$$ each), one pion ($$B = 0$$), one antiproton ($$B = -1$$). $$B_{\\text{right}} = +1 + 1 + 0 + (-1) = +1$$.\n- Step 3: $$B_{\\text{left}} = +2 \\neq +1 = B_{\\text{right}}$$. Baryon number is **not conserved**, so this interaction is **not permitted** by the laws of physics, regardless of whether charge and lepton number are conserved.\n\nCreating an antiproton costs baryon number $$-1$$, which the two protons alone can't cover. You'd need extra energy and particles to balance the baryon books.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Why is an alpha particle far more dangerous when inhaled or ingested than when held in your hand, even though it can't even penetrate skin?", "answer": "- Step 1: From outside the body, alpha radiation is stopped by the dead outer layer of skin or even a sheet of paper. It deposits all its energy externally where there are no living cells.\n- Step 2: But alphas are intensely ionising — they dump huge energy into a very short path, ripping electrons from atoms wherever they go.\n- Step 3: If you inhale or ingest an alpha emitter (e.g. radon gas, radium), the alphas are released *inside* living tissue (lungs, gut), with no skin barrier. They cause concentrated damage to sensitive cells like lung lining, which is why radon is a leading cause of lung cancer.\n\nTakeaway: Penetrating power matters externally; ionising power matters internally. Alpha = harmless outside, devastating inside.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Why can't pair production happen in completely empty space (with just a photon and nothing else)? (3 steps)", "answer": "- Step 1: Energy conservation alone is fine — a high-energy photon has enough energy to make a pair.\n- Step 2: But momentum conservation is the problem. A photon has momentum $$p = E/c$$, and you need somewhere for that momentum to go.\n- Step 3: If only the electron and positron are produced, then in the centre-of-mass frame, they have zero net momentum — but the photon's momentum can't vanish. So a third body (a nearby nucleus, typically) must be present to absorb the recoil momentum. Hence pair production is always observed near matter, never in pure vacuum.\n\nThis is the symmetric mirror of why annihilation always produces (at least) *two* photons — one alone could not conserve both energy and momentum.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Why does a proton have a baryon number of +1?", "answer": "Baryons are 3-quark particles (uud for proton, udd for neutron). Each quark has baryon number +1/3 ⇒ 3 × (+1/3) = +1. Antiprotons (anti-quarks) have baryon number -1.  \n\n**Contrast:** Mesons (quark-antiquark pairs) have baryon number 0.", "source": "Qwen 3 ②", "_id": "qwen_2_10"}, {"question": "Carbon-14 undergoes beta-minus decay. Write the balanced equation including the antineutrino, and identify the daughter element. (3 steps)", "answer": "- Step 1: Start with $$^{14}_{6}\\text{C}$$. Beta-minus decay keeps $$A$$ the same but increases $$Z$$ by 1: daughter has $$A = 14$$, $$Z = 6 + 1 = 7$$.\n- Step 2: The element with $$Z = 7$$ is **nitrogen** (N). The beta particle is $$^{0}_{-1}\\beta^-$$ and the antineutrino is $$\\bar{\\nu}_e$$.\n- Step 3: Balanced equation: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$. Check: left side $$A = 14$$, $$Z = 6$$; right side $$14 + 0 + 0 = 14$$ ✓ and $$7 + (-1) + 0 = 6$$ ✓.\n\nCarbon-14 dating works because this beta decay transforms C into N at a predictable rate — the basis of archaeological dating.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why did the \"plum pudding\" model of the atom fail to explain Rutherford's scattering results?", "answer": "The plum pudding model proposed a diffuse, uniformly spread positive charge with embedded electrons. If that were true, the positive charge would be too spread out to ever repel a fast alpha particle strongly — *all* alphas would pass through with only tiny deflections. The observed large-angle backscattering required the positive charge to be concentrated in a tiny, dense region — a nucleus — not smeared across the whole atom. The plum pudding could not produce the rare but dramatic bounces seen.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "From the radioactive decay equation $$N = N_0 e^{-\\lambda t}$$, qualitatively explain (without computing) why a substance with larger $$\\lambda$$ has a shorter half-life.", "answer": "- Step 1: $$\\lambda$$ is the probability per second that any given nucleus decays. Larger $$\\lambda$$ = each nucleus is more likely to decay quickly.\n- Step 2: Half-life is the time for $$N$$ to fall to $$N_0/2$$. If nuclei are highly likely to decay each second, half of them will be gone quickly.\n- Step 3: Explicitly: $$t_{1/2} = \\ln(2)/\\lambda$$. So $$t_{1/2}$$ and $$\\lambda$$ are **inversely proportional** — double $$\\lambda$$ halves the half-life.\n\nTakeaway: $$\\lambda$$ measures \"decay urgency\". High $$\\lambda$$ = impatient nuclei = short half-life.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "When an electron and a positron annihilate, two gamma-ray photons are produced (not one). Why must there be *two* photons rather than one, in terms of conservation laws? (2 steps)", "answer": "- Step 1: A single photon has non-zero momentum (p = E/c). If only one photon were produced, **momentum could not be conserved** — before annihilation, the electron–positron pair (in the centre-of-mass frame) has zero total momentum, but a single photon would carry momentum away.\n- Step 2: Two photons emitted in **opposite directions** have equal and opposite momenta, so the total momentum of the photon pair can be zero, matching the initial total momentum. Both energy and momentum are conserved.\n\n+ Misconception: \"One photon should be enough because E = 2mc² can be carried by one photon.\" True for energy, but not for momentum. Both energy AND momentum must be conserved simultaneously.\n\nKey takeaway: Two photons, not one, because a single photon can't conserve both energy and momentum when the initial total momentum is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "In the Rutherford scattering experiment, alpha particles were used rather than, say, electrons. Give two reasons why alpha particles were the better choice for discovering the nucleus. (2 steps)", "answer": "- Step 1: Alpha particles have a **positive charge (+2e)**, so they experience Coulomb repulsion from the positive nucleus. This repulsion causes measurable deflections. Electrons (negative) would be *attracted* to the nucleus and wouldn't show the same large-angle scattering pattern.\n- Step 2: Alpha particles have a **large mass** (~4u), so they are not easily deflected by the lightweight electrons in the atom. This means any significant deflection must come from something massive — the nucleus. Electrons as probes would be easily scattered by other electrons, creating noise.\n\n+ Additionally, alpha particles were readily available from naturally radioactive sources (like radium), making them practical to use before particle accelerators existed.\n\nKey takeaway: Alpha particles' positive charge (repelled by nucleus) and large mass (not deflected by electrons) made them the ideal probe for discovering the nucleus.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "What's the physical reason a nucleus emits a gamma ray AFTER an alpha or beta decay, and what's it tied to mechanically?", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus is often left in an **excited state** — its protons and neutrons aren't yet in the lowest-energy configuration.\n- Step 2: To reach the ground state, the nucleus rearranges, releasing the excess energy as a high-energy electromagnetic photon — a gamma ray.\n- Step 3: This is exactly analogous to an atomic electron dropping from a higher to lower orbit and emitting visible light — but the energy scale is MeV (nuclear) instead of eV (atomic), so the emitted photon is a gamma ray rather than visible light.\n\nTakeaway: γ emission is nuclear de-excitation. Same mechanism as electronic emission, just deeper inside the atom and with much higher energy.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why must background radiation be subtracted from measurements in a radioactivity experiment, and what's the term for the result? (2 steps)", "answer": "- Step 1: Any Geiger counter reading near a source includes both the source's emission *and* the ever-present background. If you compare raw counts before/after shielding without subtraction, you'll think the radiation never fully stops — you'll always see the background floor.\n- Step 2: The **corrected count rate** = (measured count rate) − (background count rate, measured separately with the source removed). Only this corrected value reflects the actual source activity. A common mistake on exam graphs is to forget that a count rate \"levelling off\" near a non-zero value usually means you've reached background, not that radiation persists indefinitely.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why does a charged particle in a uniform magnetic field move in a circle, and what determines the radius? (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is $$F = Bqv$$, always perpendicular to the velocity. A force perpendicular to motion changes direction but not speed — exactly what's needed for circular motion.\n- Step 2: Equating the magnetic force to the centripetal force needed: $$Bqv = \\dfrac{mv^2}{r}$$. Cancelling one $$v$$ and rearranging: $$r = \\dfrac{mv}{Bq} = \\dfrac{p}{Bq}$$.\n- Step 3: So the radius is proportional to momentum and inversely proportional to both the field strength and the charge. Heavier or faster particles → wider arcs. Stronger field or more charge → tighter arcs.\n\nThis single relation is the basis for identifying particles by their tracks: charge from curvature direction, momentum from radius.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "At the quark level, what physically happens during $$\\beta^-$$ decay? (2 steps)", "answer": "- Step 1: Inside a neutron ($$udd$$), one of the down quarks transforms into an up quark, turning the neutron into a proton ($$uud$$).\n- Step 2: Conservation of charge demands a $$-1$$ particle be emitted, which is the electron; conservation of lepton number demands an antineutrino. So at quark level: $$d \\to u + e^- + \\bar{\\nu}_e$$.\n\nThis is mediated by the weak nuclear force (via a $$W^-$$ boson, at A-level). The macroscopic neutron→proton conversion you see in textbooks is really one quark flipping flavour.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Alpha radiation is described as \"highly ionising but weakly penetrating,\" while gamma is \"weakly ionising but highly penetrating.\" Explain why these two properties are inversely related. (2 steps)", "answer": "- Step 1: Ionisation requires the radiation to **transfer energy** to atoms it passes. A highly ionising particle (alpha) transfers energy very efficiently, which means it *loses* its energy rapidly and can't travel far — weak penetration.\n- Step 2: A weakly ionising particle (gamma) transfers energy very inefficiently, so it retains its energy over long distances — high penetration. You can't have both: efficient energy transfer means fast energy loss; slow energy loss means inefficient transfer.\n\nIonising power and penetrating power are two sides of the same coin: how quickly the radiation dumps its energy into the medium.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "A baryon consists of 3 quarks. A meson consists of a quark–antiquark pair. Why can't a baryon contain a mixture of quarks and antiquarks (e.g., u, d̄, d)? (2 steps)", "answer": "- Step 1: Each quark has baryon number B = +1/3, and each antiquark has baryon number B = −1/3. A combination like u, d̄, d would give total B = 1/3 + (−1/3) + 1/3 = 1/3, which is **not an integer**.\n- Step 2: Baryon number must be a **whole number** (integer) for any observable particle. A baryon must have B = +1 (three quarks) or B = −1 (three antiquarks, an anti-baryon). A mixed quark–antiquark triplet would produce a fractional baryon number, which is not physically allowed for a free particle.\n\n+ A u-d̄-d combination would actually be classified as a meson-like state, not a baryon. Nature forbids fractional-baryon-number free particles.\n\nKey takeaway: 3 quarks (B = +1) or 3 antiquarks (B = −1) only — no mixing, because baryon number must be an integer.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "A radioactive source emits only gamma radiation. You place increasing thicknesses of aluminium in front of it. Will the count rate ever drop to zero? Why or why not? (2 steps)", "answer": "- Step 1: Gamma radiation follows exponential absorption: $$I = I_0 e^{-\\mu x}$$. Aluminium does attenuate gamma, but aluminium is much less effective than lead at absorbing gamma rays (lower density, lower atomic number).\n- Step 2: The count rate will **decrease** with increasing aluminium thickness but **never reach zero** (exponential decay). However, for very thick aluminium, the count rate may drop so close to background that it appears to plateau at the background level — but this is background radiation, not zero.\n\n+ In practice, aluminium is the wrong material for effectively absorbing gamma — you'd need lead or concrete. The experiment would show a very gradual decrease.\n\nKey takeaway: Gamma intensity decreases exponentially but never reaches zero. Aluminium is ineffective — use lead for meaningful absorption.", "source": "GLM 5.1 ③", "_id": "glm_3_65"}, {"question": "What is the key reason that quarks are never observed in isolation, and what is this phenomenon called? (2 steps)", "answer": "- Step 1: As you try to separate two quarks, the **strong force** (mediated by gluons) between them does not decrease with distance — unlike electromagnetic forces. Instead, the energy stored in the field increases with separation.\n- Step 2: When the energy becomes large enough, it converts into a new quark–antiquark pair (via $$E = mc^2$$). Instead of isolating a quark, you've created new hadrons. This phenomenon is called **confinement** — quarks are always confined within hadrons and can never be isolated.\n\nThe strong force acts like a rubber band that never breaks — it just snaps and creates new rubber bands. This is why we study quarks indirectly, through the hadrons they compose.", "source": "GLM 5.1 ①", "_id": "glm_1_82"}, {"question": "At the quark level, what actually happens during beta-minus decay?", "answer": "- Step 1: A neutron (udd) converts into a proton (uud) — meaning one **down quark turns into an up quark**: $$d \\to u + e^{-} + \\bar{\\nu}_e$$.\n- Step 2: This change is mediated by the **weak nuclear force** (specifically a virtual $$W^{-}$$ boson that immediately decays into the electron and antineutrino).\n- Step 3: Charge check: down ($$-\\tfrac{1}{3}$$) → up ($$+\\tfrac{2}{3}$$) + electron ($$-1$$) + antineutrino (0). Sum: $$\\tfrac{2}{3} - 1 = -\\tfrac{1}{3}$$. ✓\n\nTakeaway: Beta decay is fundamentally a quark flavour change driven by the weak force.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "If individual decays are truly random, how can we make precise statements like \"half the sample will decay in 5730 years\"? (3 steps)", "answer": "- Step 1: For one atom, the decay time is unknowable — anywhere from immediately to billions of years from now. But each atom has a fixed probability per second of decaying ($$\\lambda$$, the decay constant).\n- Step 2: With $$10^{20}$$ atoms, the *average* behaviour becomes extraordinarily sharp by the law of large numbers — the fraction decayed in any time interval is predictable to many decimal places, even though we can't say *which* atoms decay.\n- Step 3: This statistical regularity is what gives a sharp \"half-life\" — the time for half the (huge) population to decay. Randomness at the atomic scale produces deterministic-looking behaviour at the bulk scale.\n\nThis is the same logic as: any single coin flip is random, but flipping a million coins gives ~50% heads to high precision.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A student claims: \"A photon with energy exactly equal to $$mc^2$$ can create an electron-positron pair.\" Explain why this is incorrect. (2 steps)", "answer": "- Step 1: The photon needs energy **at least** $$2mc^2$$, not $$mc^2$$. Pair production creates *two* particles — the electron and the positron — each with rest-mass energy $$mc^2$$. The total rest-mass energy required is $$2mc^2$$.\n- Step 2: If the photon had only $$mc^2$$, it could supply the mass for only one particle. But charge conservation and lepton number conservation forbid creating a single charged particle alone — you must create a particle–antiparticle pair. So the minimum energy is twice the single-particle rest-mass energy.\n\n$$E_{\\min} = 2mc^2$$: you're buying two tickets, not one. Any excess energy above $$2mc^2$$ becomes kinetic energy of the pair.", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "Why does annihilation req
