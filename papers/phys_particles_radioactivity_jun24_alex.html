uire two photons?", "answer": "- Step 1: Conservation of energy and momentum must hold.  \n- Step 2: A single photon would violate momentum conservation (zero net momentum before → non-zero after).  \n- Step 3: Two photons emitted in opposite directions conserve momentum.  \n\n**Equation:** e⁺ + e⁻ → 2γ.  \n\n**Why not 1 photon?** Momentum vectors must cancel; one photon would leave a net direction.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "A photon and a neutron have the same momentum. Do they have the same de Broglie wavelength? Explain.", "answer": "Yes. The de Broglie relation $$\\lambda = h/p$$ depends only on momentum, not on mass or particle type. Whether the particle is a massless photon or a massive neutron, equal momenta give equal wavelengths. The interesting twist: for the photon, momentum and energy are related by $$E = pc$$; for the neutron at non-relativistic speeds, $$E = p^2/(2m)$$. So equal momentum means very different energies — but the wavelength is the same.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "Why might two different radioactive samples both have an activity of 1000 Bq, even though one contains far more atoms than the other?", "answer": "- Step 1: Activity $$A = \\lambda N$$ depends on **both** the decay constant $$\\lambda$$ (how unstable each nucleus is) **and** the total nuclei $$N$$.\n- Step 2: For the same $$A$$, if Sample 1 has small $$\\lambda$$ (long half-life), it needs many nuclei to produce 1000 decays/s. If Sample 2 has large $$\\lambda$$ (short half-life), it needs few nuclei to produce the same activity.\n- Step 3: Real example: a tiny speck of polonium-210 (half-life 138 days, large $$\\lambda$$) and a large lump of uranium-238 (half-life 4.5 billion years, tiny $$\\lambda$$) can have comparable activities.\n\nTakeaway: Activity is a product of \"how many\" and \"how unstable\" — they can trade off. A small unstable sample can match a huge stable one.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Conceptually, why does the corrected count rate drop *exponentially* (not linearly) with absorber thickness for gamma rays? (3 steps)", "answer": "- Step 1: Each thin slab of absorber has some fixed *probability per unit thickness* of absorbing any given photon. So if a slab absorbs $$10\\%$$ of incident photons, a second identical slab absorbs $$10\\%$$ of what made it through — leaving $$0.9 \\times 0.9 = 81\\%$$.\n- Step 2: Adding identical layers means repeated multiplication by the same fraction, which by definition produces an exponential — each step removes the same *fraction*, not the same *number*.\n- Step 3: Mathematically: $$I(x) = I_0 e^{-\\mu x}$$, where $$\\mu$$ is the linear absorption coefficient. The intensity never reaches zero — it just keeps halving every \"half-thickness.\"\n\nThis is exactly analogous to radioactive decay over *time*: same logic, just spatial instead of temporal.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "What is thermionic emission, and how does it differ from the photoelectric effect in the way energy is delivered to electrons? (2 steps)", "answer": "- Step 1: **Thermionic emission** is the process where conduction electrons in a metal gain enough thermal energy (from heating the metal) to escape the surface. The metal is heated, electrons absorb thermal energy, and if their kinetic energy exceeds the work function of the metal, they leave.\n- Step 2: In the **photoelectric effect**, the energy comes from *incident photons* — each photon delivers a quantised packet $$E = hf$$ to a single electron. In thermionic emission, the energy comes from *thermal vibrations of the lattice* — a continuous, statistical distribution of kinetic energy among electrons. The escape mechanism is the same (overcome the work function), but the energy source differs: photons vs. thermal agitation.\n\nBoth free electrons from a surface, but one is triggered by light quanta and the other by heat.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "In gamma decay, $$^{A}_{Z}X^* \\rightarrow ^{A}_{Z}X + \\gamma$$, neither A nor Z changes. What does the asterisk (*) on the parent nucleus signify, and why does gamma emission not change the element? (2 steps)", "answer": "- Step 1: The asterisk indicates the nucleus is in an **excited state** — it has excess energy above its ground state, typically after a previous alpha or beta decay left it in a high-energy configuration. The nucleons are in a higher energy arrangement.\n- Step 2: Gamma emission releases this excess energy as a photon. Since no protons or neutrons are emitted or converted, both $$A$$ and $$Z$$ stay the same. The element doesn't change — only its internal energy state changes.\n\nGamma decay is the nucleus \"calming down\" after a dramatic event, like a building settling after an earthquake. The structure is the same; the vibrations stop.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "In a decay chain, what does it mean for a nucleus to be \"stable\", and why don't all decays produce a stable product in one step?", "answer": "- Step 1: A stable nucleus is one with a proton-to-neutron ratio (and total mass) that places it in a region of nuclear stability — it does not spontaneously emit radiation.\n- Step 2: Heavy unstable nuclei like $$^{238}\\text{U}$$ are very far from the stable region. A single alpha or beta decay only nudges $$(A,Z)$$ by a small amount, so the daughter is usually *still* unstable.\n- Step 3: Hence successive decays form a **decay chain**: $$^{238}\\text{U}$$ undergoes a sequence of α and β emissions through ~14 intermediate isotopes before finally ending at $$^{206}\\text{Pb}$$, which is stable.\n\nTakeaway: Stability is a destination; the chain is the journey. Each step pushes the nucleus closer to the \"valley of stability\".", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Why do unstable particles like muons created high in the atmosphere reach the ground in large numbers, despite having a \"lifetime\" of only $$2.2\\,\\mu$$s? (3 steps)", "answer": "- Step 1: At rest, a muon's lifetime is $$2.2 \\times 10^{-6}$$ s. Even travelling at the speed of light, it could only cover $$\\sim 660$$ m in that time — far less than the $$\\sim 10$$ km from the upper atmosphere to sea level.\n- Step 2: But muons created by cosmic rays are moving at relativistic speeds ($$v \\approx 0.99c$$). At such speeds, **time dilation** stretches their lifetime in our (lab) frame to many times longer than $$2.2\\,\\mu$$s.\n- Step 3: With dilated lifetime, they live long enough to reach the ground. Equivalently in the muon's frame, **length contraction** shortens the 10 km journey to a much smaller distance they *can* cover in $$2.2\\,\\mu$$s. Either way, special relativity explains their detection at sea level — and historically this was a key experimental confirmation of relativity.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "A proton and an antiproton each have mass $$\\approx 938$$ MeV/$$c^2$$. When they annihilate, what is the minimum total energy released, and how many photons are produced? (2 steps)", "answer": "- Step 1: The minimum energy released is the total rest-mass energy of both particles: $$E = 2mc^2 = 2 \\times 938 = 1876$$ MeV. This is the minimum because it assumes the particles are at rest (no kinetic energy to add).\n- Step 2: **Two photons** are produced, emitted in opposite directions to conserve momentum. Each photon carries at least $$938$$ MeV (half the total). If the particles had kinetic energy, the photons would carry more.\n\n$$2mc^2$$ is the energy budget: two particles worth of mass → two photons worth of energy. Momentum conservation demands two photons, not one.", "source": "GLM 5.1 ①", "_id": "glm_1_73"}, {"question": "Why does beta-minus radiation appear to come from the nucleus even though nuclei contain no electrons? (3 steps)", "answer": "- Step 1: Recognize the apparent paradox — a $$\\beta^-$$ particle *is* a fast-moving electron, yet the nucleus is made of only protons and neutrons. So the electron cannot have been \"stored\" there waiting to escape.\n- Step 2: The actual mechanism is internal conversion: a neutron inside the nucleus transforms into a proton. Since a neutron is neutral and a proton is $$+1$$, charge conservation demands a $$-1$$ particle be emitted — that's the electron (the $$\\beta^-$$).\n- Step 3: This means the electron is *created* at the moment of decay, not pre-existing in the nucleus. Deeper down (A-level/QFT), this is because neutrons and protons are made of quarks, and a down quark converts to an up quark, emitting the electron (and an antineutrino).\n\nThe takeaway: beta decay is not \"ejection of a stored electron\" but \"creation of an electron from neutron-to-proton conversion.\"", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Why do unstable particles created in cosmic rays (like muons) survive long enough to reach the ground, even though their lifetime in the lab is too short to allow it?", "answer": "- Step 1: Muons have a lab-frame lifetime of $$\\approx 2.2 \\mu$$s. At speed $$c$$, they'd cover at most ~660 m — but they originate ~10 km up in the atmosphere.\n- Step 2: Special relativity: at speeds approaching $$c$$, **time dilates** in the lab frame — the muon's \"internal clock\" runs slow as seen from Earth. So its observed lifetime is stretched by the Lorentz factor.\n- Step 3: At ~0.99$$c$$, the dilated lifetime is large enough that a meaningful fraction of muons reach the ground. (Equivalently, from the muon's frame, length contraction makes the 10 km look much shorter.)\n\nTakeaway: Their survival is direct evidence for relativity — a \"natural experiment\" running constantly in our atmosphere.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Alpha particles are stopped by paper, beta by aluminium, and gamma requires thick lead. Explain this ordering using the particles' masses and charges. (3 steps)", "answer": "- Step 1: **Alpha** has large mass (4u) and high charge (+2e). Its strong charge means it strongly ionises atoms it passes, losing energy rapidly with each interaction. Its large size also means it collides frequently. Result: deposits all energy in a very short distance → stopped by paper or a few cm of air.\n- Step 2: **Beta** has tiny mass and moderate charge (−1e). It ionises less strongly than alpha (lower charge, smaller cross-section) and loses energy more slowly. It can penetrate paper but is stopped by a few mm of aluminium, which has many more electrons per unit thickness for the beta to interact with.\n- Step 3: **Gamma** has no mass and no charge. It doesn't ionise atoms directly — it interacts only via the photoelectric effect, Compton scattering, or pair production, which are rare events per unit distance. It takes a very dense, high-Z material (like lead) to provide enough interaction probability to absorb it significantly.\n\nHigh charge + large mass → high ionisation → short range. No charge + no mass → low ionisation → long range. The ordering is a direct consequence of the interaction probability per unit distance.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Why is the annihilation energy formula $$E = 2mc^2$$ the same for both annihilation and pair production threshold? Explain the symmetry between these two processes. (2 steps)", "answer": "- Step 1: **Annihilation**: particle + antiparticle (total mass 2m) → 2 photons. The total rest-mass energy that must be converted to photon energy is $$2mc^2$$. **Pair production**: photon → particle + antiparticle (total mass 2m). The photon must supply at least $$2mc^2$$ to create both masses.\n- Step 2: They are **inverse processes**: annihilation converts matter to energy; pair production converts energy to matter. In both cases, the critical quantity is the **total rest-mass energy of the particle–antiparticle pair**, which is $$2mc^2$$. The symmetry of the conservation laws means the same energy threshold appears in both directions.\n\n+ Any excess energy above $$2mc^2$$ becomes kinetic energy: in annihilation, the particles may have kinetic energy before collision (adding to photon energy); in pair production, the excess photon energy becomes kinetic energy of the created pair.\n\nKey takeaway: $$2mc^2$$ is the energy of the *pair*, not the individual particle. Annihilation releases it; pair production requires it. Same physics, opposite direction.", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "When examining particle tracks in a magnetic field, why can two oppositely curving tracks with equal radii immediately tell you they came from particle–antiparticle creation, but two oppositely curving tracks with different radii might not?", "answer": "- Step 1: Particle–antiparticle pair: same mass (by definition), same speed (created together with shared energy), opposite charge. So $$r = p/(BQ)$$ — same $$p$$ and same $$|Q|$$ → same radius. Opposite charges → opposite curvatures.\n- Step 2: Equal radii + opposite curvatures + originating from one vertex = pair creation. Diagnostic.\n- Step 3: If radii differ: same momenta but different charges (e.g., $$p$$ vs. $$e^+$$, both positive in opposite directions wouldn't even curve oppositely), or different particles altogether. So *unequal* radii suggest a more complex interaction, not simple pair production.\n\nTakeaway: The symmetry of equal radii + opposite curvature is a fingerprint of pair creation — it directly reflects equal masses and opposite charges.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why is it always an *anti*neutrino (not a neutrino) emitted in $$\\beta^-$$ decay? (3 steps)", "answer": "- Step 1: In $$\\beta^-$$ decay an electron ($$L = +1$$) is emitted. Before the decay, the nucleus has $$L = 0$$.\n- Step 2: To conserve lepton number, the other emitted particle must have $$L = -1$$. That's an *anti*lepton.\n- Step 3: Since the partner must also be neutral (charge already balanced by electron) and very light, it must be the antineutrino ($$\\bar{\\nu}_e$$).\n\nSymmetrically, in $$\\beta^+$$ decay a positron ($$L = -1$$) is emitted, so the partner must be a *neutrino* ($$L = +1$$) to balance lepton number.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Many students forget that a β⁻ decay also emits an antineutrino, and a β⁺ decay emits a neutrino. Why is this not just a \"bookkeeping\" detail — what physical evidence demanded the (anti)neutrino's existence? (3 steps)", "answer": "- Step 1: When physicists measured the energy spectrum of electrons emitted in beta decay, they expected a sharp peak at one specific energy (set by the mass difference of parent and daughter). Instead, they saw a **continuous spectrum** — electrons came out with any energy from zero up to a maximum.\n- Step 2: This was alarming: it appeared to violate conservation of energy. Where was the \"missing\" energy?\n- Step 3: Pauli proposed that an undetected neutral particle (the neutrino) was carrying away the rest of the energy and momentum in each decay. Sometimes the electron got most of the energy; sometimes the neutrino did. This restored energy conservation and was eventually confirmed experimentally.\n\nTakeaway: The neutrino isn't an afterthought — it was inferred from missing energy, then later detected directly. Conservation laws never lie.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Why is a neutrino effectively undetectable in most experiments, despite being produced abundantly in beta decay?", "answer": "Neutrinos are leptons with no electric charge, negligible mass, and they don't feel the strong force — they only interact via the weak nuclear force, which has an extremely short range and tiny interaction probability. Most neutrinos pass through entire planets without interacting once. So in a typical detector (paper, aluminium, Geiger counter), neutrinos sail straight through unnoticed. This is why their existence was hypothesised long before they were detected (Pauli, 1930) — only the \"missing energy\" in beta spectra hinted at them. Dedicated giant detectors (e.g., Super-Kamiokande) are needed to catch the few that do interact.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "When an electron and positron annihilate at rest, why are *two* photons produced rather than one, and in what directions do they fly?", "answer": "Before annihilation, the two particles (at rest) have zero total momentum but a combined rest-energy of $$2 m_e c^2$$. If only *one* photon emerged, it would have to carry away energy $$2m_e c^2$$ but also zero momentum — impossible, because a photon's momentum is $$E/c \\neq 0$$. Two photons solve this: they fly off in *exactly opposite directions* with equal energies of $$m_e c^2$$ each, so their momenta cancel to zero (matching the initial zero momentum) while their energies sum to $$2 m_e c^2$$ (matching the initial energy). Both conservation laws satisfied.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "In a linear accelerator (LINAC), each successive tube is longer than the previous one. Why must the tubes increase in length, given that the AC frequency is fixed? (3 steps)", "answer": "- Step 1: The AC power supply switches polarity at a **fixed frequency**, meaning the time window for acceleration across each gap is the same for every tube.\n- Step 2: As the particle accelerates, it travels **faster** through each tube. If the tubes were all the same length, the particle would traverse them in less and less time and would arrive at the gap when the field has the wrong polarity — it would be *decelerated*.\n- Step 3: Making each tube progressively longer ensures the particle spends the **same amount of time** in each tube, so it always arrives at the gap when the electric field is in the correct direction to accelerate it.\n\n+ Edge case: If the frequency were not fixed but could be increased to match the particle's speed, equal-length tubes could theoretically work — but this is impractical for high energies.\n\nKey takeaway: Longer tubes compensate for faster particles so that timing stays synchronised with a fixed-frequency AC supply.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "What is a beta-plus particle, where does it come from, and what particle accompanies it?", "answer": "- Step 1: A beta-plus $$\\beta^{+}$$ is a **positron** — a positively charged electron (antimatter partner of the electron). Charge $$+1$$, mass equal to an electron's mass.\n- Step 2: It's emitted when a **proton inside a proton-rich nucleus turns into a neutron**: $$p \\to n + e^{+} + \\nu_e$$.\n- Step 3: It's always accompanied by an **electron neutrino** $$\\nu_e$$ (not antineutrino) — this conserves lepton number.\n\nTrap: students often forget the (anti)neutrino. In $$\\beta^{-}$$ → antineutrino; in $$\\beta^{+}$$ → neutrino.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "In the U-238 decay chain, you see two consecutive beta-minus decays followed by an alpha. What happens to $$Z$$ and $$A$$ overall? (3 steps)", "answer": "- Step 1: $$\\beta^-$$: $$A$$ unchanged, $$Z$$ up by $$1$$. Twice: $$A$$ unchanged, $$Z$$ up by $$2$$ total.\n- Step 2: Then alpha: $$A$$ down by $$4$$, $$Z$$ down by $$2$$.\n- Step 3: Net: $$\\Delta A = -4$$, $$\\Delta Z = +2 - 2 = 0$$. The element returns to the same $$Z$$ as before the two betas, but $$4$$ mass units lighter — i.e., a *different isotope of the original element*.\n\nThis is exactly why U-238 momentarily becomes U-234 (a lighter isotope of uranium) partway through the chain.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Define half-life ($$t_{1/2}$$) in words, and derive the relationship between half-life and the decay constant λ. (3 steps)", "answer": "- Step 1: **Half-life** is the time taken for half the nuclei in a sample to decay (equivalently, the time for the activity to halve).\n- Step 2: Start with the exponential decay equation. When t = $$t_{1/2}$$, N = $$\\frac{N_0}{2}$$: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$. Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take the natural logarithm of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, so $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n\n+ Since ln 2 ≈ 0.693, the relationship is $$t_{1/2} \\approx \\frac{0.693}{\\lambda}$$. This shows half-life and decay constant are **inversely proportional**: shorter half-life ↔ larger λ ↔ faster decay.\n\nKey takeaway: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ — the fundamental link between the statistical description (λ) and the practical measure (half-life).", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "Why must a neutrino (or antineutrino) be emitted in beta decay, and what was the historical clue that it existed? (3 steps)", "answer": "- Step 1: If beta decay only emitted an electron, energy and momentum conservation would force the electron to have a single, fixed kinetic energy each time (like alpha particles do).\n- Step 2: Experimentally, beta particles emerge with a *continuous spectrum* of energies — sometimes the maximum, sometimes much less. Something was carrying away the \"missing\" energy and momentum.\n- Step 3: Pauli proposed an invisible, nearly massless, neutral particle — the (anti)neutrino — that takes the missing energy and momentum. In $$\\beta^-$$ an *antineutrino* ($$\\bar{\\nu}_e$$) is emitted; in $$\\beta^+$$ a *neutrino* ($$\\nu_e$$).\n\nForgetting the (anti)neutrino is the single most common mistake in writing beta decay equations.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "A student argues: \"If I heat a radioactive sample to 1000°C, it will decay faster because the nuclei have more energy.\" Explain why this reasoning is flawed. (2 steps)", "answer": "- Step 1: Radioactive decay is a **spontaneous** process — it is not affected by environmental conditions such as temperature, pressure, or chemical state. The nuclear forces governing decay are vastly stronger than any thermal energy you can add.\n- Step 2: The thermal energy at 1000°C (~0.1 eV per particle) is **negligibly small** compared to nuclear energy scales (MeV per nucleon). Heating a sample adds energy to the *electrons* (atomic scale, ~eV), not to the nucleus. The nucleus is completely unaffected.\n\n+ The only way to significantly affect nuclear decay rates is through extreme conditions found in stellar cores or particle accelerators — not a laboratory furnace.\n\nKey takeaway: Temperature, pressure, and chemical bonding do not affect radioactive decay. It is spontaneous and independent of the environment.", "source": "GLM 5.1 ③", "_id": "glm_3_85"}, {"question": "Why is the photon called the \"exchange particle\" or \"mediator\" of the electromagnetic force?", "answer": "In quantum field theory, fundamental forces are described as the exchange of mediator particles between interacting matter particles. For electromagnetism, that mediator is the photon. When two electrons repel each other, the picture is: one emits a photon that the other absorbs, transferring momentum and producing the apparent repulsive push. The photon has zero charge and zero mass — appropriate for a mediator that travels at $$c$$ and connects all electrically charged particles. (You don't need full QFT for ESAT — just remember: photon mediates EM force, no mass, no charge.)", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" Distinguish these two terms precisely. (2 steps)", "answer": "- Step 1: **Spontaneous** means the decay is not influenced by external environmental factors — temperature, pressure, chemical bonding, or electromagnetic fields cannot speed it up, slow it down, or trigger it. The nucleus decays on its own internal clock.\n- Step 2: **Random** means the *exact moment* at which any individual nucleus will decay cannot be predicted. Each nucleus has a constant probability of decaying per unit time, but you cannot say *which* nucleus will decay next or *when*. With large numbers, statistical predictions (like half-life) become reliable, but individual events remain unpredictable.\n\nSpontaneous = \"nothing external controls it.\" Random = \"nothing predicts the exact timing.\" Both are necessary for the observed behaviour of radioactive samples.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "In beta-minus decay, a neutron turns into a proton, an electron, and an antineutrino. Why must an *antineutrino* be emitted rather than a neutrino? Use conservation of lepton number to explain. (3 steps)", "answer": "- Step 1: Before the decay, the neutron is a baryon with lepton number $$L = 0$$. The proton also has $$L = 0$$. Total lepton number on the left side = 0.\n- Step 2: The electron is a lepton with $$L = +1$$. If only the electron were produced, total lepton number on the right would be +1, violating conservation. We need something with $$L = -1$$ to balance.\n- Step 3: The **antineutrino** has lepton number $$L = -1$$ (it's an anti-lepton). So: $$L_{\\text{left}} = 0$$, and $$L_{\\text{right}} = +1 + (-1) = 0$$. ✓ A neutrino ($$L = +1$$) would give $$L_{\\text{right}} = +1 + 1 = +2 \\neq 0$$, violating the law.\n\nThe antineutrino is nature's way of balancing the lepton-number books in beta-minus decay. Forgetting it (or using the wrong sign) is a classic exam trap.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "Muons created in the upper atmosphere have a mean lifetime of about 2.2 μs. Without relativity, they could travel only about 660 m before decaying. Yet they are detected at sea level, ~10 km below. Explain which relativistic effect resolves this paradox, from the muon's frame of reference. (3 steps)", "answer": "- Step 1: In the muon's rest frame, its lifetime is still 2.2 μs. But the **distance** from the upper atmosphere to sea level is **length-contracted**. The 10 km distance in the Earth's frame appears much shorter in the muon's frame.\n- Step 2: At speeds like 0.99c, the Lorentz contraction factor is significant. The distance the muon \"sees\" itself needing to traverse might be only a few hundred metres — well within its 660 m range.\n- Step 3: From the muon's perspective, it doesn't need to live longer; the journey is simply shorter. From Earth's perspective, the muon *does* live longer (time dilation). Both frames agree the muon reaches the ground — they just explain it differently.\n\nSame physics, two perspectives: Earth frame says \"muon lives longer\" (time dilation). Muon frame says \"distance is shorter\" (length contraction). Both are correct and consistent.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "Why is the activity $$A$$ of a sample related to the number of remaining nuclei $$N$$ by $$A = \\lambda N$$, and how does activity change with time?", "answer": "- Step 1: Each nucleus has independent probability $$\\lambda$$ per second of decaying. With $$N$$ nuclei present, the expected number of decays per second is $$\\lambda N$$ — by simple linearity of expectation.\n- Step 2: That expected decays-per-second IS the activity $$A$$. So $$A = \\lambda N$$.\n- Step 3: As nuclei decay, $$N$$ falls exponentially: $$N(t) = N_0 e^{-\\lambda t}$$. So $$A(t) = \\lambda N(t) = A_0 e^{-\\lambda t}$$ — activity also decays exponentially with the same half-life as the number of nuclei.\n\nTakeaway: Activity and number of nuclei are proportional, so both decline exponentially together.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Approximately how far does each type of radiation travel in air, and why are the ranges so different? (3 steps)", "answer": "- Step 1: Alpha travels only about $$3$$–$$10$$ cm in air. Beta travels roughly $$1$$ m (a bit less to a few metres depending on energy). Gamma travels hundreds of metres to kilometres.\n- Step 2: The range depends on how often the radiation collides with and ionises air molecules. Each ionisation costs energy; once the radiation's kinetic energy runs out, it stops.\n- Step 3: Alpha is large and doubly charged, so it ionises air atoms at virtually every encounter — drains energy fast. Beta is much smaller and singly charged, so it ionises less often. Gamma has no charge at all, so it only interacts via rare photon-matter events.\n\nThe pattern: stronger charge + larger size → more frequent ionisation → shorter range.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A student measures background counts of $$\\approx 20$$ per minute. They then place a source 5 cm from the detector and read $$\\approx 320$$ per minute. They move the source far away and read $$\\approx 22$$ per minute. What can they conclude?", "answer": "- Step 1: At 5 cm, the corrected count rate from the source is $$320 - 20 = 300$$ per minute — that's the actual signal.\n- Step 2: At a large distance, the reading $$\\approx 22$$ is statistically indistinguishable from background — meaning the source's radiation has all been absorbed by intervening air (or is diluted by distance to below noise).\n- Step 3: Conclusion: the source emits short-range radiation (consistent with alpha) — if it were gamma, we'd still see a clear excess above background even far away.\n\nTakeaway: The \"floor\" you can't read below is set by background — the source signal must rise above it to be detectable.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "A student observes a particle track curving in a magnetic field with decreasing radius over time. What is happening physically? (3 steps)", "answer": "- Step 1: The radius of a charged particle in a magnetic field is $$r = \\dfrac{p}{BQ}$$, so $$r \\propto p$$ (momentum). If $$r$$ shrinks, momentum is shrinking too.\n- Step 2: Falling momentum means falling kinetic energy. The particle is losing energy as it travels.\n- Step 3: That energy is being deposited in the surrounding medium by ionisation — the particle is knocking electrons off atoms in its path, paying for it with kinetic energy. The spiralling-inward shape is the visual signature of an ionising particle slowing down.\n\nSo track curvature direction tells you sign of charge; track radius and its trend tell you momentum and energy loss.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Rank alpha, beta, and gamma radiation by penetrating power and by ionising power, and explain why these two rankings are inversely related. (3 steps)", "answer": "- Step 1: **Penetrating power (low → high):** alpha < beta < gamma. Alpha is stopped by paper or skin; beta by a few mm of aluminium; gamma needs several cm of lead (and is only reduced, not stopped).\n- Step 2: **Ionising power (high → low):** alpha > beta > gamma. Alpha rips electrons off atoms aggressively; beta moderately; gamma weakly.\n- Step 3: **Why they're inverse:** ionising power means depositing energy by knocking electrons off atoms. A highly ionising particle loses its energy quickly — over a short distance — because it interacts strongly with matter. A weakly ionising one interacts rarely, so it travels far. Alpha is big and doubly charged (huge interaction cross-section) → ionises hard, dies fast. Gamma has no charge or mass (just an EM wave) → rarely interacts → goes far but does little ionisation per encounter.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "A small fraction of alpha particles in Rutherford's experiment were deflected at angles greater than 90°. What does this tell us about the nucleus that small-angle deflections alone cannot? (2 steps)", "answer": "- Step 1: Small-angle deflections ($$< 10°$$) tell you there is a positive charge somewhere in the atom (since like charges repel), but they could be explained by many small positive charges spread out — consistent with the old plum-pudding model.\n- Step 2: Large-angle backscattering ($$> 90°$$) can *only* happen if the alpha particle encounters a **concentrated, massive positive charge**. To reverse the direction of a fast, heavy alpha particle requires an enormous repulsive force, which demands that both the charge and the mass be packed into a tiny volume. This observation *alone* kills the plum-pudding model and demands a small, dense nucleus.\n\nBackscattering is the smoking gun: spread-out charge can nudge particles sideways, but only concentrated charge and mass can fling them backward.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "What is the minimum energy a photon needs to create an electron–positron pair, and why exactly that amount? (3 steps)", "answer": "- Step 1: The photon's energy must be converted entirely into the rest-mass energy of the two created particles (in the limiting case where they emerge at rest).\n- Step 2: An electron and positron each have rest-mass energy $$m_e c^2 \\approx 0.511 \\text{ MeV}$$. Together they need $$2 m_e c^2 \\approx 1.022 \\text{ MeV}$$.\n- Step 3: So the **threshold** photon energy is $$E_{\\min} = 2 m_e c^2 \\approx 1.022 \\text{ MeV}$$. Below this, no pair can be made; above this, the excess goes into kinetic energy of the pair.\n\nTrap: don't write $$mc^2$$ — pair production needs *twice* that, because two particles are made.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Two atoms have the same Z but different A. What is the relationship between these atoms, and what physical property is necessarily different about their nuclei? (2 steps)", "answer": "- Step 1: They are **isotopes** — atoms of the *same element* (same number of protons, same Z) but with a *different number of neutrons*, hence different A.\n- Step 2: The necessarily different physical property is the **mass of the nucleus**. Because protons are identical across isotopes and the electron configuration is the same (same Z → same chemistry), the only thing that changes is the neutron count, which directly changes nuclear mass.\n\n+ For example, hydrogen-1 (0 neutrons), deuterium (1 neutron), tritium (2 neutrons) — all Z = 1, but A = 1, 2, 3 respectively.\n\nKey takeaway: Isotopes share chemistry but differ in nuclear mass and nuclear stability.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A single photon cannot spontaneously produce a particle–antiparticle pair in free space. Why not, and what must be present for pair production to occur? (3 steps)", "answer": "- Step 1: In the centre-of-mass frame of the produced pair, the total momentum is zero (the two particles move in opposite directions with equal speed). But a single photon always travels at speed $$c$$ and has momentum $$p = E/c$$ — it can never be at rest.\n- Step 2: There is no reference frame in which the photon's momentum is zero (photons travel at $$c$$ in all frames). Therefore, a single photon cannot conserve both energy and momentum when converting into a pair — the pair can have zero total momentum, but the photon never can.\n- Step 3: A **nearby nucleus** must be present to absorb the \"excess\" momentum. The nucleus recoils, taking up the momentum difference, while the photon's energy goes into creating the pair. The nucleus is so massive that its recoil kinetic energy is negligible, so the photon still needs at least $$E = 2mc^2$$.\n\nFree-space pair production is forbidden by momentum conservation. A nucleus acts as a momentum \"sink.\"", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "What is the minimum photon energy required for pair production of an electron–positron pair, and why is it twice the rest-mass energy of an electron, not just equal to it? (2 steps)", "answer": "- Step 1: The photon must create **both** the electron and the positron. Each has rest-mass energy $$m_e c^2 \\approx 0.511$$ MeV. The total rest-mass energy needed is $$2m_e c^2 \\approx 1.022$$ MeV.\n- Step 2: If the photon had only $$m_e c^2$$, it could only create *one* particle — but conservation laws (charge, lepton number) forbid creating a single particle alone. You always need a particle–antiparticle pair, so the energy threshold is $$E_{\\min} = 2mc^2$$, not $$mc^2$$. Any excess energy above this threshold becomes kinetic energy of the produced pair.\n\n$$2mc^2$$ because you're buying *two* tickets (particle + antiparticle), not one.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "Derive the relationship between half-life $$t_{1/2}$$ and the decay constant $$\\lambda$$, starting from the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: By definition, after one half-life, the number of undecayed nuclei has halved: $$N = \\frac{N_0}{2}$$. Substitute this into the decay equation: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Cancel $$N_0$$ from both sides: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 3: Take the natural logarithm of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$. Since $$\\ln\\left(\\frac{1}{2}\\right) = \\ln(1) - \\ln(2) = 0 - \\ln(2) = -\\ln(2)$$, we get $$-\\ln(2) = -\\lambda t_{1/2}$$.\n- Step 4: Cancel the minus signs and rearrange: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. This shows half-life and decay constant are **inversely proportional**: a large $$\\lambda$$ (high decay probability) gives a short half-life, and vice versa.\n\n$$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$. This is the bridge between the microscopic (per-nucleus probability) and the macroscopic (observed half-life).", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "What does it mean to \"ionise\" an atom, and why does a charged radiation particle have more ionising power than an uncharged one?", "answer": "- Step 1: To ionise an atom is to remove (or add) electrons, leaving it electrically charged rather than neutral.\n- Step 2: A charged radiation particle (alpha +2, beta −1) exerts **electrostatic forces** on the electrons it passes near, doing work on them and ripping them away from their parent atoms.\n- Step 3: An uncharged particle like a gamma photon can ionise only via specific interactions (photoelectric effect, Compton scattering, pair production) — these happen only occasionally, so gammas ionise rarely.\n\nTakeaway: Charge enables continuous, strong electromagnetic interaction with electrons → strong ionisation. No charge → only rare interactions.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "In a decay chain, what is an isotope, and why does $$^{238}\\text{U}$$'s chain transiently pass through *another* uranium isotope, $$^{234}\\text{U}$$?", "answer": "- Step 1: Isotopes have the same proton number $$Z$$ but different nucleon numbers $$A$$ — same element, different neutron count.\n- Step 2: In the $$^{238}\\text{U}$$ chain: alpha decay reduces $$(A, Z)$$ by $$(4, 2)$$ to give $$^{234}\\text{Th}$$. Then two beta-minus decays in succession each increase $$Z$$ by 1 (with $$A$$ unchanged), giving $$^{234}\\text{Pa}$$, then $$^{234}\\text{U}$$.\n- Step 3: So we're back to uranium ($$Z = 92$$), but with $$A = 234$$ instead of 238 — a *different isotope* of the same element. It's still uranium chemically, but a different nucleus that decays further by another alpha.\n\nTakeaway: Decay chains can revisit elements with different $$A$$ — same chemistry, different nuclear future.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "A student writes: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^-$$. This balances numerically. What is still missing, and why does it matter? (2 steps)", "answer": "- Step 1: The **antineutrino** $$\\bar{\\nu}_e$$ is missing. The complete equation should be: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$.\n- Step 2: Without the antineutrino, lepton number is not conserved ($$L_{\\text{left}} = 0$$ but $$L_{\\text{right}} = +1$$). Also, the continuous beta energy spectrum (the electron doesn't always have the same energy) can only be explained if another particle carries away the \"missing\" energy. The antineutrino solves both problems.\n\nNumerical balance of A and Z is necessary but not sufficient. Lepton number and energy conservation require the antineutrino. Always include it in beta decay equations.", "source": "GLM 5.1 ①", "_id": "glm_1_71"}, {"question": "To resolve the internal structure of a nucleon (e.g., a proton), why must the de Broglie wavelength of the probing electron be comparable to the size of the nucleon (~10⁻¹⁵ m), and what does this requirement imply about the electron's energy? (3 steps)", "answer": "- Step 1: The de Broglie wavelength sets the **resolution limit** — you cannot resolve detail smaller than approximately one wavelength. Just as optical microscopes can't resolve objects much smaller than the wavelength of visible light, electron probes can't resolve structure much smaller than their de Broglie wavelength.\n- Step 2: Since $$\\lambda = \\frac{h}{mv} = \\frac{h}{p}$$, a small wavelength requires **large momentum** (and therefore large velocity and energy).\n- Step 3: To achieve $$\\lambda \\approx 10^{-15}$$ m, the electron must be accelerated to **very high energies** — this is why particle accelerators are needed. The faster the electron, the finer the detail it can resolve.\n\n+ Why use electrons instead of alpha particles? Electrons don't experience the strong nuclear force, so they can approach nucleons without being deflected by it, giving cleaner scattering data.\n\nKey takeaway: Small wavelength ↔ high momentum ↔ high energy. Resolution is fundamentally limited by the probe's wavelength.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "To resolve the internal structure of a proton using an electron beam, the electron's de Broglie wavelength must be comparable to the proton's diameter (~$$10^{-15}$$ m). Explain why high energy is needed, using the relationship between wavelength and momentum. (3 steps)", "answer": "- Step 1: The de Broglie wavelength is $$\\lambda = \\frac{h}{p} = \\frac{h}{mv}$$. To resolve detail of size $$d$$, you need $$\\lambda \\lesssim d$$, analogous to how a microscope needs light with wavelength smaller than the feature you want to see.\n- Step 2: To achieve $$\\lambda \\approx 10^{-15}$$ m, the momentum must be $$p = \\frac{h}{\\lambda} \\approx \\frac{6.63 \\times 10^{-34}}{10^{-15}} \\approx 6.63 \\times 10^{-19}$$ kg m/s. This is an enormous momentum for an electron.\n- Step 3: Since the electron is very light ($$m_e \\approx 9.11 \\times 10^{-31}$$ kg), achieving this momentum requires a velocity extremely close to $$c$$. The kinetic energy required is therefore very large — on the order of GeV. Low-energy electrons have long wavelengths and would \"see\" the proton as a blur, just as visible light can't resolve individual cells.\n\nShort wavelength → high momentum → high energy. This is why particle accelerators are enormous: they must push electrons to GeV energies to probe femtometre-scale structure.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In the nuclear notation $$^{A}_{Z}X$$, what do the letters A and Z represent, and why is it a common mistake to think A tells you the number of neutrons? (2 steps)", "answer": "- Step 1: $$A$$ is the **nucleon number** (also called mass number) — the total count of protons plus neutrons in the nucleus. $$Z$$ is the **proton number** (also called atomic number) — the total number of protons in the nucleus. The element symbol $$X$$ is determined entirely by $$Z$$; change $$Z$$ and you change the element.\n- Step 2: The common mistake is thinking $$A$$ directly gives the neutron count. It does not. You must *subtract*: number of neutrons $$= A - Z$$. For example, $$^{238}_{92}\\text{U}$$ has 238 nucleons total, 92 protons, so $$238 - 92 = 146$$ neutrons — not 238 neutrons.\n\nThe key insight: $$A$$ is a *sum*, not a single count. Always compute neutrons by subtraction.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Two atoms have the same proton number but different nucleon numbers. What is the name for this relationship, and what physical difference does it cause? (2 steps)", "answer": "- Step 1: These atoms are **isotopes** of the same element. Because they share the same $$Z$$, they have the same number of protons and (in a neutral atom) the same number of electrons, so their chemistry is essentially identical.\n- Step 2: The physical difference is the number of neutrons: $$A_1 - Z \\neq A_2 - Z$$. Different neutron counts change the nuclear stability — one isotope may be stable while another is radioactive. For example, hydrogen-1 (0 neutrons) is stable, hydrogen-3 / tritium (2 neutrons) is radioactive.\n\nChemistry cares about electrons (same → same chemistry). Nuclear physics cares about neutrons (different → different stability).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "In Rutherford's alpha-scattering experiment, most alpha particles passed straight through the gold foil. What two conclusions about atomic structure follow from this single observation? (2 steps)", "answer": "- Step 1: The first conclusion is that **the atom is mostly empty space**. If most fast, heavy alpha particles encounter nothing that deflects them, then the vast majority of the atom's volume contains no significant mass or charge.\n- Step 2: The second conclusion, less obvious but equally important, is that **the nucleus must be extremely small**. If the nucleus were large (comparable to the atom's size), many more particles would hit it and scatter. The fact that *most* pass through means the cross-sectional area of anything massive is tiny compared to the atom's total area — the nucleus is roughly 100,000 times smaller than the atom.\n\n\"Most go straight through\" simultaneously tells you about the vast emptiness *and* the extreme smallness of the nucleus.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A small fraction of alpha particles in Rutherford's experiment were deflected at angles greater than 90°. What does this tell us about the nucleus that small-angle deflections alone cannot? (2 steps)", "answer": "- Step 1: Small-angle deflections ($$< 10°$$) tell you there is a positive charge somewhere in the atom (since like charges repel), but they could be explained by many small positive charges spread out — consistent with the old plum-pudding model.\n- Step 2: Large-angle backscattering ($$> 90°$$) can *only* happen if the alpha particle encounters a **concentrated, massive positive charge**. To reverse the direction of a fast, heavy alpha particle requires an enormous repulsive force, which demands that both the charge and the mass be packed into a tiny volume. This observation *alone* kills the plum-pudding model and demands a small, dense nucleus.\n\nBackscattering is the smoking gun: spread-out charge can nudge particles sideways, but only concentrated charge and mass can fling them backward.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "Before Rutherford, Thomson proposed the \"plum pudding\" model of the atom. If this model were correct, what would the Rutherford scattering results have looked like? (2 steps)", "answer": "- Step 1: In the plum pudding model, positive charge is uniformly spread throughout the atom with electrons embedded like currants. An alpha particle entering this uniform positive sphere would experience a gradually increasing repulsive force as it penetrates deeper, but never a sudden, intense one.\n- Step 2: The predicted result: alpha particles would experience *only small deflections*. There would be no large-angle scattering and certainly no backscattering, because no region of concentrated charge/mass exists to deliver a strong impulse. The fact that the real experiment *did* show large-angle scattering is what falsified the model.\n\nThe plum pudding model predicts a smooth distribution of deflection angles; the real data shows a dramatic excess of both zero-angle and large-angle events — a bimodal pattern that only a concentrated nucleus explains.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What is thermionic emission, and how does it differ from the photoelectric effect in the way energy is delivered to electrons? (2 steps)", "answer": "- Step 1: **Thermionic emission** is the process where conduction electrons in a metal gain enough thermal energy (from heating the metal) to escape the surface. The metal is heated, electrons absorb thermal energy, and if their kinetic energy exceeds the work function of the metal, they leave.\n- Step 2: In the **photoelectric effect**, the energy comes from *incident photons* — each photon delivers a quantised packet $$E = hf$$ to a single electron. In thermionic emission, the energy comes from *thermal vibrations of the lattice* — a continuous, statistical distribution of kinetic energy among electrons. The escape mechanism is the same (overcome the work function), but the energy source differs: photons vs. thermal agitation.\n\nBoth free electrons from a surface, but one is triggered by light quanta and the other by heat.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "In a linear accelerator (LINAC), the tubes get progressively longer. Why can't all tubes be the same length if the AC frequency is fixed? (3 steps)", "answer": "- Step 1: In a LINAC, ions are accelerated *only in the gaps between tubes*. Inside each tube, the ion drifts at constant speed (no electric field inside a conductor). The AC supply switches polarity at a fixed frequency, so the time between switches is constant.\n- Step 2: As the ion accelerates, it travels faster. If the tubes were all the same length, a faster ion would traverse a tube in *less time* than a slower one. It would arrive at the next gap too early, when the field has the wrong polarity — and would be *decelerated* instead of accelerated.\n- Step 3: To keep the ion arriving at each gap exactly when the field is in the accelerating direction, each tube must be built longer so that the ion spends the *same time* in each tube despite going faster. Since $$t = d/v$$ and $$t$$ must stay constant, $$d$$ must increase proportionally with $$v$$.\n\nFixed frequency → fixed timing window → longer tubes compensate for higher speed.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "A cyclotron uses both electric and magnetic fields, while a LINAC uses only electric fields. What role does the magnetic field play in a cyclotron, and why doesn't a LINAC need it? (3 steps)", "answer": "- Step 1: In a **cyclotron**, the magnetic field (perpendicular to the plane of the dees) forces charged particles into circular paths via the Lorentz force. This bends the particle around a semicircle inside each dee, bringing it back to the gap for another acceleration kick.\n- Step 2: The electric field in the gap between the dees provides the actual speed increase. The AC supply switches polarity each time the particle arrives at the gap, so it is always accelerated (never decelerated). The particle spirals outward as it gains speed because $$r = mv/(Bq)$$ increases with $$v$$.\n- Step 3: A **LINAC** doesn't need a magnetic field because it accelerates particles in a *straight line*. The tubes are arranged linearly, and the particle simply travels from one tube to the next. No bending is required, so no magnetic field is needed.\n\nCyclotron: magnetic field bends, electric field accelerates. LINAC: electric field alone accelerates in a straight line.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Derive the equation for the radius of a charged particle moving perpendicular to a uniform magnetic field, starting from the centripetal force and the magnetic force. (3 steps)", "answer": "- Step 1: A charged particle of mass $$m$$, charge $$q$$, and speed $$v$$ moving perpendicular to a magnetic field $$B$$ experiences a magnetic (Lorentz) force of magnitude $$F = Bqv$$. This force is always perpendicular to the velocity, so it acts as the centripetal force keeping the particle in a circle.\n- Step 2: Set the magnetic force equal to the centripetal force: $$Bqv = \\frac{mv^2}{r}$$. Both sides represent the same inward force — one from electromagnetism, one from circular motion kinematics.\n- Step 3: Rearrange for $$r$$: cancel one factor of $$v$$ from both sides to get $$Bq = \\frac{mv}{r}$$, then $$r = \\frac{mv}{Bq}$$. Since momentum $$p = mv$$, this can also be written as $$r = \\frac{p}{Bq}$$.\n\nThe radius grows with momentum (faster or heavier → wider circle) and shrinks with stronger field or larger charge.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A proton and an electron move at the same speed through the same magnetic field. Which has the larger orbital radius, and why? (2 steps)", "answer": "- Step 1: The radius is $$r = \\frac{mv}{Bq}$$. Both particles have the same speed $$v$$ and the same magnitude of charge $$|q| = e$$, and they're in the same field $$B$$. The only difference is mass: the proton is roughly 1836 times heavier than the electron.\n- Step 2: Since $$r \\propto m$$ (with $$v$$, $$B$$, and $$q$$ equal), the proton's radius is about 1836 times larger than the electron's. The proton sweeps a huge arc; the electron spirals tightly.\n\nSame speed and charge, but the proton's enormous mass advantage means much more momentum per unit charge → much wider circle.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "In a bubble chamber photograph, a particle track spirals inward with decreasing radius. What does this tell you about the particle's energy, and why? (2 steps)", "answer": "- Step 1: A decreasing radius means decreasing momentum, since $$r = \\frac{p}{Bq}$$ and $$B$$ and $$q$$ don't change. The particle is slowing down.\n- Step 2: The particle loses energy by **ionising** atoms in the detector medium. Each ionisation event removes a small amount of kinetic energy from the particle. Over many collisions, the particle's speed and momentum decrease, so the radius shrinks and the track spirals inward toward a point.\n\nA spiralling track is the signature of a charged particle losing energy to the medium — it's the particle physics equivalent of a marble rolling to a stop on a rough surface.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Two tracks appear suddenly from the same point in a bubble chamber, curving in opposite directions with the same radius. What does this pattern indicate, and why must the tracks curve in opposite directions? (3 steps)", "answer": "- Step 1: Tracks appearing from \"nothing\" (no incoming track) indicate **pair production**: a neutral particle (typically a photon) has converted its energy into a particle–antiparticle pair. The photon leaves no track because it has no charge.\n- Step 2: The particle and antiparticle have the **same mass** (and therefore similar momentum for similar initial energy), so they curve with the same radius: $$r = \\frac{p}{Bq}$$ gives equal $$r$$ for equal $$p$$ and equal $$|q|$$.\n- Step 3: They curve in **opposite directions** because they have **opposite charges**. The magnetic force $$F = Bqv$$ reverses sign when $$q$$ reverses sign, so the centripetal force points inward for one and outward for the other relative to the same centre, producing mirror-image curvature.\n\nSame radius → same mass. Opposite curvature → opposite charge. Together, this is the fingerprint of pair production.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "To resolve the internal structure of a proton using an electron beam, the electron's de Broglie wavelength must be comparable to the proton's diameter (~$$10^{-15}$$ m). Explain why high energy is needed, using the relationship between wavelength and momentum. (3 steps)", "answer": "- Step 1: The de Broglie wavelength is $$\\lambda = \\frac{h}{p} = \\frac{h}{mv}$$. To resolve detail of size $$d$$, you need $$\\lambda \\lesssim d$$, analogous to how a microscope needs light with wavelength smaller than the feature you want to see.\n- Step 2: To achieve $$\\lambda \\approx 10^{-15}$$ m, the momentum must be $$p = \\frac{h}{\\lambda} \\approx \\frac{6.63 \\times 10^{-34}}{10^{-15}} \\approx 6.63 \\times 10^{-19}$$ kg m/s. This is an enormous momentum for an electron.\n- Step 3: Since the electron is very light ($$m_e \\approx 9.11 \\times 10^{-31}$$ kg), achieving this momentum requires a velocity extremely close to $$c$$. The kinetic energy required is therefore very large — on the order of GeV. Low-energy electrons have long wavelengths and would \"see\" the proton as a blur, just as visible light can't resolve individual cells.\n\nShort wavelength → high momentum → high energy. This is why particle accelerators are enormous: they must push electrons to GeV energies to probe femtometre-scale structure.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "Why are electrons used to probe nucleon structure rather than alpha particles, even though alpha particles have more momentum for the same speed? (2 steps)", "answer": "- Step 1: Alpha particles are made of protons and neutrons, so they interact via the **strong nuclear force** with the nucleon target. This strong interaction complicates the scattering pattern — you can't easily separate the effects of the probe's own internal structure from the target's structure.\n- Step 2: Electrons are **leptons** — they do not experience the strong nuclear force. They interact with nucleons only via the electromagnetic force. This makes the scattering much \"cleaner\": the electron is a point-like probe that simply couples to the charge distribution inside the nucleon, giving a clearer picture of its structure.\n\nElectrons are \"clean\" probes (EM interaction only); alpha particles are \"dirty\" probes (strong + EM interactions mixed in).", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When a particle meets its antiparticle, they annihilate and produce two photons. Why *two* photons rather than one? (3 steps)", "answer": "- Step 1: Consider the **conservation of momentum**. Before annihilation, in the centre-of-mass frame, the total momentum is zero (particle and antiparticle have equal and opposite momenta). A single photon always carries momentum $$p = \\frac{E}{c}$$, so it cannot have zero total momentum.\n- Step 2: With **two photons**, they can be emitted in opposite directions with equal energy, so their momenta cancel: $$\\vec{p}_1 + \\vec{p}_2 = 0$$. This satisfies conservation of momentum in the centre-of-mass frame.\n- Step 3: Additionally, conservation of energy requires the total photon energy to equal the total rest-mass energy plus any kinetic energy: $$E_{\\text{total}} = 2mc^2 + KE_{\\text{pair}}$$. Two photons can share this energy while satisfying both energy and momentum conservation simultaneously.\n\nOne photon → momentum can't be conserved. Two photons back-to-back → both energy and momentum conserved.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "A single photon cannot spontaneously produce a particle–antiparticle pair in free space. Why not, and what must be present for pair production to occur? (3 steps)", "answer": "- Step 1: In the centre-of-mass frame of the produced pair, the total momentum is zero (the two particles move in opposite directions with equal speed). But a single photon always travels at speed $$c$$ and has momentum $$p = E/c$$ — it can never be at rest.\n- Step 2: There is no reference frame in which the photon's momentum is zero (photons travel at $$c$$ in all frames). Therefore, a single photon cannot conserve both energy and momentum when converting into a pair — the pair can have zero total momentum, but the photon never can.\n- Step 3: A **nearby nucleus** must be present to absorb the \"excess\" momentum. The nucleus recoils, taking up the momentum difference, while the photon's energy goes into creating the pair. The nucleus is so massive that its recoil kinetic energy is negligible, so the photon still needs at least $$E = 2mc^2$$.\n\nFree-space pair production is forbidden by momentum conservation. A nucleus acts as a momentum \"sink.\"", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "What is the minimum photon energy required for pair production of an electron–positron pair, and why is it twice the rest-mass energy of an electron, not just equal to it? (2 steps)", "answer": "- Step 1: The photon must create **both** the electron and the positron. Each has rest-mass energy $$m_e c^2 \\approx 0.511$$ MeV. The total rest-mass energy needed is $$2m_e c^2 \\approx 1.022$$ MeV.\n- Step 2: If the photon had only $$m_e c^2$$, it could only create *one* particle — but conservation laws (charge, lepton number) forbid creating a single particle alone. You always need a particle–antiparticle pair, so the energy threshold is $$E_{\\min} = 2mc^2$$, not $$mc^2$$. Any excess energy above this threshold becomes kinetic energy of the produced pair.\n\n$$2mc^2$$ because you're buying *two* tickets (particle + antiparticle), not one.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "Convert 1 atomic mass unit (u) to MeV/$$c^2$$. Walk through the logic using Einstein's mass-energy relation, given $$1\\text{ u} \\approx 1.661 \\times 10^{-27}$$ kg. (4 steps)", "answer": "- Step 1: Start with Einstein's relation: $$E = mc^2$$. Plug in the mass of 1 u: $$E = (1.661 \\times 10^{-27}) \\times (3 \\times 10^8)^2$$.\n- Step 2: Calculate: $$E = 1.661 \\times 10^{-27} \\times 9 \\times 10^{16} = 1.495 \\times 10^{-10}$$ J.\n- Step 3: Convert joules to eV by dividing by $$1.6 \\times 10^{-19}$$: $$E = \\frac{1.495 \\times 10^{-10}}{1.6 \\times 10^{-19}} \\approx 934 \\times 10^6$$ eV $$\\approx 931.5$$ MeV.\n- Step 4: Since this energy corresponds to the mass of 1 u, we write the mass as $$1\\text{ u} \\approx 931.5$$ MeV/$$c^2$$. The $$c^2$$ in the denominator reminds us this is a mass unit derived from the energy via $$m = E/c^2$$.\n\nThe conversion chain: kg → J (via $$c^2$$) → eV (via $$1.6 \\times 10^{-19}$$) → MeV. The factor 931.5 is worth remembering.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A hadron is made of quarks. What distinguishes a baryon from a meson in terms of quark content, and why can't a baryon contain a mix of quarks and antiquarks? (3 steps)", "answer": "- Step 1: A **baryon** consists of **3 quarks** (e.g., proton = uud, neutron = udd). A **meson** consists of a **quark–antiquark pair** (e.g., pion = u$$\\bar{d}$$). Both are hadrons (both interact via the strong force), but their quark architecture is fundamentally different.\n- Step 2: Each quark has baryon number $$B = +\\frac{1}{3}$$, and each antiquark has $$B = -\\frac{1}{3}$$. A baryon must have total baryon number $$B = +1$$ (a whole number). Three quarks give $$\\frac{1}{3} + \\frac{1}{3} + \\frac{1}{3} = 1$$. ✓\n- Step 3: If a baryon contained, say, two quarks and one antiquark, the baryon number would be $$\\frac{1}{3} + \\frac{1}{3} - \\frac{1}{3} = \\frac{1}{3}$$, which is not an integer. But baryon number is a quantum number that must be an integer for any observed particle. Such a combination would be a meson-like object, not a baryon. Nature simply doesn't allow fractional baryon numbers for free particles.\n\nBaryon = 3 quarks (integer $$B$$). Meson = quark + antiquark ($$B = 0$$). Mixed quark-antiquark triples give fractional $$B$$ → forbidden.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "A proton has quark composition uud and a neutron has udd. Verify the charges add up correctly, using the quark charges $$u = +\\frac{2}{3}e$$ and $$d = -\\frac{1}{3}e$$. (2 steps)", "answer": "- Step 1: For the **proton** (uud): charge $$= +\\frac{2}{3} + \\frac{2}{3} + (-\\frac{1}{3}) = +\\frac{3}{3} = +1e$$. ✓ This matches the proton's known charge of $$+1e$$.\n- Step 2: For the **neutron** (udd): charge $$= +\\frac{2}{3} + (-\\frac{1}{3}) + (-\\frac{1}{3}) = +\\frac{2}{3} - \\frac{2}{3} = 0$$. ✓ This matches the neutron's known charge of $$0$$.\n\nThe fractional quark charges seem bizarre, but they combine to give the integer charges we observe. This is one of the key predictions of the quark model.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What is a lepton, and what key property distinguishes leptons from hadrons in terms of fundamental forces? (2 steps)", "answer": "- Step 1: A **lepton** is a fundamental (indivisible) particle that does not interact via the **strong nuclear force**. Common leptons include the electron ($$e^-$$), muon ($$\\mu^-$$), and their respective neutrinos ($$\\nu_e$$, $$\\nu_\\mu$$).\n- Step 2: **Hadrons** (baryons and mesons) are made of quarks and *do* interact via the strong force. Leptons are not made of quarks and interact only via the **weak**, **electromagnetic**, and **gravitational** forces. This is why neutrinos, despite being incredibly numerous, barely interact with matter — they have no charge (no EM) and no colour charge (no strong), leaving only the weak force.\n\nLeptons are \"weak-only\" (plus EM if charged). Hadrons are \"strong-capable\" because they contain quarks.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "What is antimatter, and how does an antiparticle compare to its corresponding particle in terms of mass and charge? (2 steps)", "answer": "- Step 1: **Antimatter** refers to the set of antiparticles that correspond to every matter particle. Every particle has an antiparticle — for the electron it's the positron, for the proton it's the antiproton, for the neutrino it's the antineutrino.\n- Step 2: An antiparticle has the **same mass** as its particle counterpart but **opposite charge**. For example, the positron has mass $$m_e$$ but charge $$+1e$$ (opposite of the electron's $$-1e$$). Neutral particles (like the photon) are their own antiparticle. Same mass means same rest-mass energy; opposite charge means opposite electromagnetic behaviour.\n\nSame mass → same energy budget in annihilation. Opposite charge → opposite curvature in magnetic fields, and the reason they annihilate (they can \"cancel\" each other's charge).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "In beta-minus decay, a neutron turns into a proton, an electron, and an antineutrino. Why must an *antineutrino* be emitted rather than a neutrino? Use conservation of lepton number to explain. (3 steps)", "answer": "- Step 1: Before the decay, the neutron is a baryon with lepton number $$L = 0$$. The proton also has $$L = 0$$. Total lepton number on the left side = 0.\n- Step 2: The electron is a lepton with $$L = +1$$. If only the electron were produced, total lepton number on the right would be +1, violating conservation. We need something with $$L = -1$$ to balance.\n- Step 3: The **antineutrino** has lepton number $$L = -1$$ (it's an anti-lepton). So: $$L_{\\text{left}} = 0$$, and $$L_{\\text{right}} = +1 + (-1) = 0$$. ✓ A neutrino ($$L = +1$$) would give $$L_{\\text{right}} = +1 + 1 = +2 \\neq 0$$, violating the law.\n\nThe antineutrino is nature's way of balancing the lepton-number books in beta-minus decay. Forgetting it (or using the wrong sign) is a classic exam trap.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "In beta-plus decay, a proton turns into a neutron, a positron, and a neutrino. Why is a *neutrino* (not an antineutrino) emitted? (2 steps)", "answer": "- Step 1: Before decay, the proton has lepton number $$L = 0$$. The neutron also has $$L = 0$$. Total lepton number on the left = 0.\n- Step 2: The positron is an anti-lepton with $$L = -1$$. To balance, we need a particle with $$L = +1$$, which is the **neutrino**. Check: $$L_{\\text{right}} = -1 + 1 = 0 = L_{\\text{left}}$$. ✓ An antineutrino ($$L = -1$$) would give $$L_{\\text{right}} = -1 + (-1) = -2$$, violating conservation.\n\nBeta-minus → antineutrino (to cancel electron's $$L = +1$$). Beta-plus → neutrino (to cancel positron's $$L = -1$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "An interaction is proposed: proton + proton → proton + proton + pion. Check whether baryon number is conserved. (3 steps)", "answer": "- Step 1: Calculate baryon number on the **left**: two protons, each with $$B = +1$$. Total $$B_{\\text{left}} = +1 + 1 = +2$$.\n- Step 2: Calculate baryon number on the **right**: two protons ($$B = +1$$ each) and one pion (a meson, $$B = 0$$). Total $$B_{\\text{right}} = +1 + 1 + 0 = +2$$.\n- Step 3: Since $$B_{\\text{left}} = B_{\\text{right}} = +2$$, baryon number **is conserved**. This interaction is allowed by baryon number conservation (though you'd still need to check charge, lepton number, and energy-momentum conservation).\n\nThe pion is a meson — it carries baryon number 0, so adding one doesn't disturb the baryon count.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "An interaction is proposed: proton + proton → proton + proton + pion + antiproton. Check whether baryon number is conserved, and determine if the interaction is permitted. (3 steps)", "answer": "- Step 1: Left side: two protons, $$B = +1$$ each. $$B_{\\text{left}} = +2$$.\n- Step 2: Right side: two protons ($$B = +1$$ each), one pion ($$B = 0$$), one antiproton ($$B = -1$$). $$B_{\\text{right}} = +1 + 1 + 0 + (-1) = +1$$.\n- Step 3: $$B_{\\text{left}} = +2 \\neq +1 = B_{\\text{right}}$$. Baryon number is **not conserved**, so this interaction is **not permitted** by the laws of physics, regardless of whether charge and lepton number are conserved.\n\nCreating an antiproton costs baryon number $$-1$$, which the two protons alone can't cover. You'd need extra energy and particles to balance the baryon books.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "State the three quantum numbers that must be conserved in all particle interactions, and give the values for a proton, an electron, and a neutrino. (3 steps)", "answer": "- Step 1: The three always-conserved quantum numbers are **charge** ($$Q$$), **baryon number** ($$B$$), and **lepton number** ($$L$$).\n- Step 2: Values for each particle:\n  + Proton: $$Q = +1$$, $$B = +1$$, $$L = 0$$ (it's a baryon, not a lepton)\n  + Electron: $$Q = -1$$, $$B = 0$$ (not a baryon), $$L = +1$$ (it's a lepton)\n  + Neutrino: $$Q = 0$$, $$B = 0$$, $$L = +1$$ (it's a lepton)\n- Step 3: For any interaction, sum each quantum number on the left side and verify it equals the sum on the right. If even one doesn't match, the interaction is forbidden.\n\nThese are the \"accounting rules\" of particle physics. Violate any one, and the universe says \"no.\"", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What are the three types of nuclear radiation, and for each, state its composition, relative charge, and relative mass? (3 steps)", "answer": "- Step 1: **Alpha ($$\\alpha$$)**: composed of 2 protons + 2 neutrons (helium nucleus), charge = +2, relative mass = 4.\n- Step 2: **Beta-minus ($$\\beta^-$$)**: a fast-moving electron, charge = −1, relative mass ≈ 0 (actually $$\\sim 1/1836$$ of a proton, but treated as 0 at this level).\n- Step 3: **Gamma ($$\\gamma$$)**: a high-frequency electromagnetic wave (photon), charge = 0, mass = 0. It is pure energy, not matter.\n\nAlpha is \"heavy and charged,\" beta is \"light and charged,\" gamma is \"massless and uncharged\" — these differences drive their very different behaviours.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Alpha particles are stopped by paper, beta by aluminium, and gamma requires thick lead. Explain this ordering using the particles' masses and charges. (3 steps)", "answer": "- Step 1: **Alpha** has large mass (4u) and high charge (+2e). Its strong charge means it strongly ionises atoms it passes, losing energy rapidly with each interaction. Its large size also means it collides frequently. Result: deposits all energy in a very short distance → stopped by paper or a few cm of air.\n- Step 2: **Beta** has tiny mass and moderate charge (−1e). It ionises less strongly than alpha (lower charge, smaller cross-section) and loses energy more slowly. It can penetrate paper but is stopped by a few mm of aluminium, which has many more electrons per unit thickness for the beta to interact with.\n- Step 3: **Gamma** has no mass and no charge. It doesn't ionise atoms directly — it interacts only via the photoelectric effect, Compton scattering, or pair production, which are rare events per unit distance. It takes a very dense, high-Z material (like lead) to provide enough interaction probability to absorb it significantly.\n\nHigh charge + large mass → high ionisation → short range. No charge + no mass → low ionisation → long range. The ordering is a direct consequence of the interaction probability per unit distance.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Alpha radiation is described as \"highly ionising but weakly penetrating,\" while gamma is \"weakly ionising but highly penetrating.\" Explain why these two properties are inversely related. (2 steps)", "answer": "- Step 1: Ionisation requires the radiation to **transfer energy** to atoms it passes. A highly ionising particle (alpha) transfers energy very efficiently, which means it *loses* its energy rapidly and can't travel far — weak penetration.\n- Step 2: A weakly ionising particle (gamma) transfers energy very inefficiently, so it retains its energy over long distances — high penetration. You can't have both: efficient energy transfer means fast energy loss; slow energy loss means inefficient transfer.\n\nIonising power and penetrating power are two sides of the same coin: how quickly the radiation dumps its energy into the medium.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "In the nuclear notation for alpha decay, $$^{A}_{Z}X \\rightarrow ^{A-4}_{Z-2}Y + ^{4}_{2}\\alpha$$, explain why both A and Z must decrease on the daughter nucleus side. (2 steps)", "answer": "- Step 1: The alpha particle carries away 2 protons and 2 neutrons. Since $$A$$ counts all nucleons, losing 4 nucleons means $$A$$ decreases by 4: $$A_{\\text{daughter}} = A - 4$$.\n- Step 2: Since $$Z$$ counts only protons, losing 2 protons means $$Z$$ decreases by 2: $$Z_{\\text{daughter}} = Z - 2$$. The daughter is a *different element* from the parent because its proton number has changed.\n\nAlpha decay always transmutes the element (Z drops by 2) and lightens it (A drops by 4). The daughter sits two places to the left on the periodic table.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "In beta-minus decay, $$^{A}_{Z}X \\rightarrow ^{A}_{Z+1}Y + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$, the proton number *increases* by 1. A common trap is to think it decreases because a negative particle is emitted. Explain why Z increases. (3 steps)", "answer": "- Step 1: Beta-minus decay occurs when a **neutron converts to a proton** inside the nucleus. The neutron has $$Z = 0$$ contribution; the new proton has $$Z = +1$$ contribution. So the nucleus gains one unit of positive charge.\n- Step 2: The emitted beta particle (electron, $$Z = -1$$ in charge terms) and antineutrino leave the nucleus. The electron's negative charge leaves the nucleus, but the *net* effect on the nucleus is that it has one more proton than before.\n- Step 3: Conservation check: $$Z_{\\text{left}} = Z$$. $$Z_{\\text{right}} = (Z+1) + (-1) + 0 = Z$$. ✓ The $$-1$$ from the beta particle's charge exactly cancels the $$+1$$ added to the daughter nucleus, so the *total* charge is conserved. But the daughter nucleus itself has $$Z+1$$.\n\nThe trap: seeing the \"−1\" on the beta and thinking the nucleus loses charge. In fact, the nucleus *gains* a proton; the electron carries away the balancing negative charge.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "In gamma decay, $$^{A}_{Z}X^* \\rightarrow ^{A}_{Z}X + \\gamma$$, neither A nor Z changes. What does the asterisk (*) on the parent nucleus signify, and why does gamma emission not change the element? (2 steps)", "answer": "- Step 1: The asterisk indicates the nucleus is in an **excited state** — it has excess energy above its ground state, typically after a previous alpha or beta decay left it in a high-energy configuration. The nucleons are in a higher energy arrangement.\n- Step 2: Gamma emission releases this excess energy as a photon. Since no protons or neutrons are emitted or converted, both $$A$$ and $$Z$$ stay the same. The element doesn't change — only its internal energy state changes.\n\nGamma decay is the nucleus \"calming down\" after a dramatic event, like a building settling after an earthquake. The structure is the same; the vibrations stop.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "Uranium-238 decays by alpha emission. Write the balanced nuclear equation, identifying the daughter element by its proton number. (3 steps)", "answer": "- Step 1: Start with the parent: $$^{238}_{92}\\text{U}$$. Alpha decay reduces $$A$$ by 4 and $$Z$$ by 2, so the daughter has $$A = 238 - 4 = 234$$ and $$Z = 92 - 2 = 90$$.\n- Step 2: The element with $$Z = 90$$ is **thorium** (Th). The alpha particle is written as $$^{4}_{2}\\alpha$$ (or $$^{4}_{2}\\text{He}$$).\n- Step 3: The balanced equation is: $$^{238}_{92}\\text{U} \\rightarrow ^{234}_{90}\\text{Th} + ^{4}_{2}\\alpha$$. Check: left side $$A = 238$$, $$Z = 92$$; right side $$234 + 4 = 238$$ ✓ and $$90 + 2 = 92$$ ✓.\n\nUranium (Z=92) → Thorium (Z=90) + alpha. The element changes because Z changes.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Carbon-14 undergoes beta-minus decay. Write the balanced equation including the antineutrino, and identify the daughter element. (3 steps)", "answer": "- Step 1: Start with $$^{14}_{6}\\text{C}$$. Beta-minus decay keeps $$A$$ the same but increases $$Z$$ by 1: daughter has $$A = 14$$, $$Z = 6 + 1 = 7$$.\n- Step 2: The element with $$Z = 7$$ is **nitrogen** (N). The beta particle is $$^{0}_{-1}\\beta^-$$ and the antineutrino is $$\\bar{\\nu}_e$$.\n- Step 3: Balanced equation: $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^{0}_{-1}\\beta^- + \\bar{\\nu}_e$$. Check: left side $$A = 14$$, $$Z = 6$$; right side $$14 + 0 + 0 = 14$$ ✓ and $$7 + (-1) + 0 = 6$$ ✓.\n\nCarbon-14 dating works because this beta decay transforms C into N at a predictable rate — the basis of archaeological dating.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "What is background radiation, and why must it be subtracted from any Geiger counter reading before analysing radioactive decay data? (2 steps)", "answer": "- Step 1: **Background radiation** is the low-level radiation constantly present in the environment from both natural sources (radon gas, cosmic rays, carbon-14 in food, radioactive rocks) and man-made sources (medical X-rays, nuclear fallout, nuclear accidents). A Geiger counter will always register some counts even with no sample present.\n- Step 2: If you don't subtract the background count, your measured activity is **inflated** — you'd be attributing environmental radiation to your sample. This would give incorrect half-life calculations, incorrect activity values,
