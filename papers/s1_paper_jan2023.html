merator is $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$, giving $$0.1021/0.993 \\approx 0.103$$.\n\nThe single most common conditional-normal mistake: forgetting that the conditioning event restricts the range.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "In Q4(ii), the proof that $$C$$ and $$D$$ cannot be mutually exclusive works by showing $$P(C) + P(D) > 1$$ for all positive $$x$$. What if $$P(C) + P(D)$$ were exactly 1 for some $$x$$ — would that prove mutual exclusivity? (2 steps)", "answer": "- Step 1: No. $$P(C) + P(D) = 1$$ is a *necessary* condition for mutual exclusivity (combined with $$P(C \\cup D) \\leq 1$$), but it is not *sufficient*. It only tells us that $$P(C \\cap D) = P(C) + P(D) - P(C \\cup D) = 1 - P(C \\cup D)$$.\n- Step 2: For mutual exclusivity, we need $$P(C \\cap D) = 0$$. From the above, this requires $$P(C \\cup D) = 1$$ as well. So $$P(C) + P(D) = 1$$ and $$P(C \\cup D) = 1$$ together would imply mutual exclusivity, but $$P(C) + P(D) = 1$$ alone does not. The conditions $$P(C) + P(D) > 1$$ is sufficient to *disprove* mutual exclusivity, but $$P(C) + P(D) \\leq 1$$ is not sufficient to *prove* it.\n\nTakeaway: $$P(C) + P(D) > 1$$ disproves mutual exclusivity. But $$P(C) + P(D) \\leq 1$$ does not prove it — it's necessary, not sufficient.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "Using linear interpolation, how do you estimate the number of people in a sub-range that cuts a class in half (e.g. people with $$t < 16$$ when the class is 14–18 with frequency 24)? (3 steps)", "answer": "- Step 1: Assume the 24 observations are uniformly spread across the class 14–18.\n- Step 2: The proportion of the class falling below 16 is $$\\frac{16-14}{18-14} = \\frac{1}{2}$$.\n- Step 3: Frequency in $$14 \\le t < 16$$ is $$\\frac{1}{2}\\times 24 = 12$$. Add cumulative frequencies of all earlier classes to get the total below 16.\n\nTakeaway: interpolation = ratio of the sub-interval to the class width, multiplied by the class frequency.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "For a normal RV $$L \\sim N(4.5, 0.4^2)$$, what is the structure of any computation of $$P(L < c)$$ via standardisation? (3 steps)", "answer": "- Step 1: Compute the $$z$$-score: $$z = \\frac{c - \\mu}{\\sigma}$$. This converts the original variable into the standard normal.\n- Step 2: Look up $$\\Phi(z) = P(Z < z)$$ in the table, using symmetry if $$z < 0$$: $$P(Z < -z_0) = 1 - \\Phi(z_0)$$.\n- Step 3: Read off the probability. The whole process is just a coordinate change — you're not changing the probability, just expressing the threshold in std-dev units.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "A class spans 14–18 minutes with frequency 24. Without doing the full calculation, sketch the logic for estimating how many people took less than 16 minutes, and what assumption underlies it. (3 steps)", "answer": "- Step 1: 16 sits exactly halfway through the interval $$[14, 18]$$ since $$\\frac{16-14}{18-14} = \\tfrac{1}{2}$$.\n- Step 2: We **assume uniform spread** of observations within the class (the linear-interpolation assumption).\n- Step 3: So half of the 24 — i.e. 12 — fall below 16. Add to the cumulative count up to 14 (which is 10 + 16 = 26) ⇒ 38 people below 16.\n\nInsight: estimating \"below a value\" inside a class is the same arithmetic as interpolating a quartile — it's just the linear-uniform assumption applied to a chosen position.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "You are asked to find the interquartile range from grouped data and are handed $$Q_3$$ directly. Before interpolating for $$Q_1$$, what two prerequisite checks must be completed using the histogram or frequency table, and why does the exam often hand you $$Q_3$$ in this type of question? (3 steps)", "answer": "- Step 1: Reconstruct all missing class frequencies by reading bar areas (frequency density $$\\times$$ class width) and confirm that they sum to the total sample size $$n$$. Without the correct frequencies you cannot build an accurate cumulative frequency table.\n- Step 2: Build the cumulative frequency table and identify the class interval in which the $$\\frac{n}{4}$$ position falls, noting the lower boundary $$L$$, class width $$w$$, frequency $$f_{\\text{class}}$$, and cumulative frequency before it $$F_{\\text{before}}$$.\n- Step 3: Examiners often supply $$Q_3$$ to avoid forcing you to interpolate inside an awkward class (such as one with uneven width or messy numbers), allowing the focus to remain on correctly locating $$Q_1$$ and subtracting.", "source": "Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "Using $$y = 151.2 + 2.72x$$, the estimate at $$90^\\circ\\text{C}$$ is 396 g. Why is this number itself not evidence of correctness, and what two facts together make the estimate unreliable? (2 steps)", "answer": "- Step 1: The arithmetic of substitution is correct: $$151.2 + 2.72(90) = 396$$. The unreliability stems from the model's domain, not the calculation.\n- Step 2: The two facts are: (i) $$90^\\circ\\text{C}$$ lies outside the observed range $$[10,80]$$, and (ii) the regression relationship is empirical, not theoretical; outside the data range the true solubility curve might plateau or change, so linear extrapolation is scientifically unjustified.", "source": "Kimi K2.6 ①", "_id": "kimi_1_40"}, {"question": "In the marble-transfer problem, the common denominator across all branches of the full tree is 936. Why is it advantageous to keep a common denominator throughout, especially for the conditional probability in part (d)? (2 steps)", "answer": "- Step 1: With a common denominator, the probability of any event is just the sum of its numerators over 936. For example, $$P(\\text{all G}) = \\frac{160}{936}$$ and $$P(\\text{same}) = \\frac{244}{936}$$.\n- Step 2: For the conditional $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936} = \\frac{160}{244}$$. The denominators cancel cleanly — no need for decimal approximations or complex fraction arithmetic. If you converted each probability to a decimal independently, rounding errors would accumulate and the conditional would be less precise.\n\nTakeaway: Keep a common denominator throughout the tree — it makes the conditional probability a clean fraction cancellation.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "Explain why $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar t^2}$$ uses class midpoints in $$\\sum ft^2$$, and what error this introduces.", "answer": "- Step 1: We don't know individual observation values — only that they lie in each class. The midpoint is the best representative for a uniform-spread assumption.\n- Step 2: $$\\sum ft^2 \\approx \\sum (\\text{sum of squared values in class})$$ — an approximation, not exact.\n- Step 3: The error comes from collapsing within-class variation. If a class has high spread internally, the true $$\\sigma$$ is higher than the grouped estimate — this is **Sheppard's correction** territory, but for IAL we accept the midpoint approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "In a histogram, why must you read frequencies as bar *area* rather than bar *height*, and what does this mean for reconstructing missing class frequencies? (3 steps)", "answer": "- Step 1: Histogram bars represent **frequency density**, not frequency directly. The vertical axis is $$\\text{f.d.} = \\frac{f}{\\text{class width}}$$, so a tall narrow bar can have the same frequency as a short wide one.\n- Step 2: To get the frequency of any class you must compute $$f = \\text{f.d.} \\times \\text{class width}$$ — i.e. the **area** of the bar.\n+ For unequal class widths (like 5–10 width 5, 18–25 width 7, 25–40 width 15) reading \"height = frequency\" gives wildly wrong answers.\n- Step 3: To reconstruct, use a class whose frequency you already know to calibrate the f.d. scale, then multiply each unknown bar's height by its width.\n\nTakeaway: histograms encode frequency in area, never height — this is the whole reason f.d. exists.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "After two marbles are transferred from X to Y, why must the third draw from bag Y use a denominator of 13, not 11? (2 steps)", "answer": "- Step 1: Bag Y originally contains 11 marbles (6G, 5B). The experiment explicitly places two additional marbles into Y before the third draw occurs.\n- Step 2: The total population of Y has grown to $$11 + 2 = 13$$, so any probability on the third draw must divide by 13. Using 11 ignores the transferred marbles entirely and treats the third draw as if the transfers never happened.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "In the regression context, the summary statistic $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ is called the corrected sum of cross-products. Why is it conceptually linked to both the gradient $$b$$ and the PMCC $$r$$? (2 steps)", "answer": "- Step 1: $$S_{xy}$$ captures how $$x$$ and $$y$$ vary together around their respective means. If large $$x$$ tend to pair with large $$y$$, $$S_{xy}$$ is positive; if they oppose, it is negative.\n- Step 2: The gradient $$b = \\frac{S_{xy}}{S_{xx}}$$ scales this co-movement by the spread in $$x$$, turning it into a rate of change. The PMCC $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$ standardises the same quantity by the total spread in both variables, producing a dimensionless measure between $$-1$$ and $$1$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_38"}, {"question": "What is the conceptual meaning of the corrected sum of squares $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ in regression, and why must it be positive for any non-constant data set? (2 steps)", "answer": "- Step 1: $$S_{xx}$$ measures the total squared variation of the $$x$$-values around their mean. It is the sum of $$(x_i - \\bar{x})^2$$ written in a computationally convenient form.\n- Step 2: It must be positive because any real data set with at least two distinct $$x$$-values has spread; the algebraic identity guarantees $$\\sum x^2 \\ge \\frac{(\\sum x)^2}{n}$$ by the Cauchy-Schwarz inequality (or simply by the fact that variance is non-negative), with equality only if every $$x_i$$ is identical.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "When asked \"given all three marbles are the same colour, find P(all green)\", what conditional probability identity simplifies this, and why does the intersection collapse? (3 steps)", "answer": "- Step 1: Write $$P(\\text{all G} \\mid \\text{all same}) = \\frac{P(\\text{all G} \\cap \\text{all same})}{P(\\text{all same})}$$.\n- Step 2: \"All green\" is a strict subset of \"all same colour\" (all green ⊂ all same). So $$\\text{all G} \\cap \\text{all same} = \\text{all G}$$.\n- Step 3: The expression collapses to $$\\frac{P(\\text{all green})}{P(\\text{all same})}$$ — two numbers you already computed. The conditioning rescales the GG-branch probability against the total \"same-colour\" probability.\n\nInsight: whenever event $$A \\subset B$$, the conditional $$P(A\\mid B) = P(A)/P(B)$$ — no separate intersection calculation needed.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Given $$L \\sim N(4.5, 0.4^2)$$ and $$z_{Q_3} = 0.6745$$, show how to find $$Q_3$$ by reversing the standardisation. What is the general formula? (2 steps)", "answer": "- Step 1: From $$Z = \\frac{L - \\mu}{\\sigma}$$, rearrange: $$L = \\mu + Z\\sigma$$. For the upper quartile, substitute $$Z = 0.6745$$: $$Q_3 = 4.5 + 0.6745 \\times 0.4 = 4.5 + 0.2698 = 4.77$$ (2 d.p.).\n- Step 2: The general pattern: any quantile of $$X \\sim N(\\mu, \\sigma^2)$$ is found by $$\\text{quantile} = \\mu + z_{\\text{quantile}} \\times \\sigma$$. You look up (or memorise) the $$z$$-value for the desired probability, then un-standardise. For $$Q_1$$, use $$z = -0.6745$$: $$Q_1 = 4.5 - 0.2698 = 4.23$$.\n\nTakeaway: Quantile = $$\\mu + z \\cdot \\sigma$$. The $$z$$-value encodes the probability; the un-standardisation restores the original scale.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "In the conditional probability $$P(\\text{all G} \\mid \\text{all same})$$, explain why $$P(\\text{all G} \\cap \\text{all same}) = P(\\text{all G})$$ rather than requiring a separate calculation. (2 steps)", "answer": "- Step 1: \"All green\" is a *subset* of \"all same colour\" — if all three are green, then automatically all three are the same colour. So the event {all G} is entirely contained within the event {all same}.\n- Step 2: When $$A \\subseteq B$$, we have $$P(A \\cap B) = P(A)$$ (because $$A \\cap B = A$$). Therefore: $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})} = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$.\n\nThe 936 denominators cancel cleanly — this is why keeping a common denominator throughout the tree is good practice. The conditional reduces to a simple ratio of the two path probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "A student computes $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936}$$ and gets $$\\frac{40}{61} \\approx 0.656$$. Another student forgets the conditioning and just reports $$P(\\text{all G}) = \\frac{160}{936} \\approx 0.171$$. Conceptually, why must the conditional answer always be larger than the unconditional one in this type of problem? (2 steps)", "answer": "- Step 1: Conditioning on \"all same\" restricts the sample space to only those outcomes where all three marbles share a colour. Within this smaller world, the only possibilities are GGG or BBB. The probability of GGG *within this restricted world* must account for the full probability of the restricted world.\n- Step 2: Since $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$ and $$P(B) < 1$$ (here $$P(\\text{same}) \\approx 0.261$$), dividing by a number less than 1 always increases the result: $$\\frac{0.171}{0.261} \\approx 0.656 > 0.171$$. The conditional probability is always at least as large as the unconditional when $$A \\subseteq B$$.\n\nIntuitively: knowing \"they're all the same colour\" makes \"they're all green\" much more likely, because you've eliminated all the mixed-colour outcomes.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "A student computes $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = 851093 - \\frac{3119^2}{12}$$ and gets a negative number. What went wrong, and why is $$S_{yy}$$ always non-negative? (2 steps)", "answer": "- Step 1: $$S_{yy}$$ is proportional to the sum of squared deviations from the mean: $$S_{yy} = \\sum(y_i - \\bar{y})^2$$. Since it's a sum of squares, it must be non-negative. A negative result means an arithmetic error — most likely computing $$\\frac{3119^2}{12}$$ incorrectly, or subtracting in the wrong order.\n- Step 2: Correctly: $$\\frac{3119^2}{12} = \\frac{9728161}{12} = 810680.083...$$, so $$S_{yy} = 851093 - 810680.083 = 40412.917$$. If you got $$810680 - 851093 = -40413$$, you subtracted the wrong way around. Always verify: the raw sum of squares must be *larger* than the correction factor.\n\nSanity check: $$S_{yy} \\ge 0$$ always. If you get a negative value, recheck your arithmetic before proceeding.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "The study notes highlight \"reconstruct missing data first\" as an exam strategy. How does this principle apply across the histogram question, the tree diagram question, and the regression question, and what common failure mode does it prevent? (3 steps)", "answer": "- Step 1: In Q1, missing frequencies must be reconstructed from histogram areas before any cumulative-frequency or mean work; without them, the cumulative table is broken.\n- Step 2: In Q2, the tree diagram itself is the reconstruction: you must label every branch probability explicitly to see that Bag Y ends with 13 marbles and that $$P(G_3)$$ is path-dependent.\n- Step 3: In Q6, if $$\\sum x$$ or $$\\sum xy$$ seems missing, you reconstruct it from the regression line via $$(\\bar{x},\\bar{y})$$ or $$S_{xy} = b S_{xx}$$. The common failure mode is \"blind calculation\" — applying formulas to incomplete data and producing nonsense values.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "After two green marbles are transferred from X to Y, what is $$P(G_3)$$ — the probability the third draw (from Y) is green? After two blue marbles? After one of each? (3 steps)", "answer": "- Step 1: After GG transferred: Y has $$6 + 2 = 8$$ green and 5 blue, total 13. So $$P(G_3 \\mid \\text{GG in}) = \\frac{8}{13}$$.\n- Step 2: After BB transferred: Y has 6 green and $$5 + 2 = 7$$ blue, total 13. So $$P(G_3 \\mid \\text{BB in}) = \\frac{6}{13}$$.\n- Step 3: After GB or BG transferred: Y has 7 green and 6 blue, total 13. So $$P(G_3 \\mid \\text{mixed in}) = \\frac{7}{13}$$. The crucial insight: $$P(G_3)$$ is **path-dependent** — you cannot use a single value across all branches of the tree.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "After two green marbles (GG) are transferred from bag X to bag Y, bag Y has 8G and 5B. After one green and one blue (GB or BG) are transferred, bag Y has 7G and 6B. Why must you track the composition of Y separately for each branch of the tree? (2 steps)", "answer": "- Step 1: The third marble is drawn from bag Y, whose composition depends on *what was transferred*. After GG: Y has 6+2=8 green, 5+0=5 blue → $$P(G_3) = \\frac{8}{13}$$. After GB or BG: Y has 6+1=7 green, 5+1=6 blue → $$P(G_3) = \\frac{7}{13}$$. After BB: Y has 6+0=6 green, 5+2=7 blue → $$P(G_3) = \\frac{6}{13}$$.\n- Step 2: There is no single value of $$P(G_3)$$ — it is *path-dependent*. Using $$\\frac{6}{13}$$ (the BB-branch value) on the GG branch would give a wrong answer for paths starting with two greens. Each branch of the tree carries its own version of bag Y, and you must use the correct composition for each.\n\nThis is the most common error in transfer problems: assuming one fixed probability for the final draw regardless of branch.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "On a histogram, the vertical axis is labelled \"frequency density\" and the horizontal axis shows class intervals. What two quantities must you multiply together to recover the frequency for any given class, and why? (2 steps)", "answer": "- Step 1: On a histogram, the **area** of each bar represents frequency — not the height. The bar for a class spanning from lower bound $$L$$ to upper bound $$U$$ has width $$w = U - L$$ (the class width) and height equal to the frequency density $$d$$.\n- Step 2: Therefore, $$\\text{Frequency} = d \\times w = \\text{frequency density} \\times \\text{class width}$$. This is why two classes with the same frequency but different widths will have bars of different heights — the taller bar is the narrower class, because the same frequency is packed into less horizontal space.\n\nThe key visual insight: a histogram is *not* a bar chart. Bar height alone doesn't tell you frequency; bar *area* does.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A histogram has five classes. Three classes have known frequencies (10, 16, 24) and two are unknown. The total sample size is 100. Why must you reconstruct the two missing frequencies *before* attempting any calculation involving cumulative frequency or interpolation? (2 steps)", "answer": "- Step 1: Every subsequent question — cumulative frequency at a boundary, mean, standard deviation, quartile interpolation — requires knowing how many observations lie in each class. Without the complete frequency table, the cumulative frequency column has gaps, and you cannot determine which class contains the quartile position.\n- Step 2: The histogram itself provides the frequency densities (bar heights), and the class widths are read from the horizontal axis. Multiplying density × width for the two unknown bars gives the missing frequencies. The sum-of-all-frequencies-equals-100 check then confirms correctness. Skipping this step means every later calculation is built on incomplete data.\n\nWithout reconstructed frequencies, you literally cannot write down the cumulative-frequency table — the backbone of all grouped-data questions.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "To estimate the number of observations below a value that falls *inside* a class interval (e.g., below 16 in the class 14–18 with frequency 24), what assumption does linear interpolation make, and what is the general formula? (3 steps)", "answer": "- Step 1: Linear interpolation assumes observations are **uniformly distributed** within each class — i.e., the 24 people in 14–18 are spread evenly across the 4-minute interval.\n- Step 2: The fraction of the class that lies below the cutoff value 16 is $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$. So the estimated frequency below 16 *within this class* is $$\\frac{1}{2} \\times 24 = 12$$.\n- Step 3: The total estimate below 16 is the cumulative frequency up to the class below (10 + 16 = 26) plus the interpolated portion (12), giving 38.\n\nGeneral formula for the interpolated frequency below a value $$c$$ inside class $$[L, U)$$ with class frequency $$f$$:\n$$\\text{Interpolated frequency} = \\frac{c - L}{U - L} \\times f$$", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "When estimating the mean from grouped data, why do you use class midpoints rather than class boundaries, and how is a midpoint computed for a class like 18–25? (2 steps)", "answer": "- Step 1: Grouped data loses individual values — we only know each observation falls somewhere in its class interval. The midpoint $$\\frac{L + U}{2}$$ is the best single representative value because it minimises the maximum possible error (the true value can be at most half a class width away from the midpoint).\n- Step 2: For the class 18–25, the midpoint is $$\\frac{18 + 25}{2} = 21.5$$. Note this is *not* 21 or 22 — it is exactly the arithmetic mean of the lower and upper boundaries. The estimated mean is then $$\\bar{x} = \\frac{\\sum f_i \\cdot m_i}{n}$$ where $$m_i$$ are the midpoints and $$f_i$$ the class frequencies.\n\nCommon pitfall: using the class width (e.g., 7) or an integer guess instead of the exact midpoint.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Given $$\\sum ft^2 = 41{,}033$$ and $$\\bar{t} = 19.68$$ for $$n = 100$$, explain conceptually why the standard deviation formula $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$ involves subtracting the square of the mean. (3 steps)", "answer": "- Step 1: $$\\frac{\\sum ft^2}{n}$$ is $$E(X^2)$$ — the mean of the *squared* values. But variance is the mean of the squared *deviations from the mean*, i.e., $$\\text{Var}(X) = E[(X - \\mu)^2]$$.\n- Step 2: Expand the square: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$, since $$E(X) = \\mu$$. This is the computational shortcut — instead of subtracting the mean from every data point, square, and average, you just compute $$E(X^2) - \\mu^2$$.\n- Step 3: The standard deviation is the square root of variance: $$\\sigma = \\sqrt{E(X^2) - \\mu^2} = \\sqrt{\\frac{41033}{100} - 19.68^2} = \\sqrt{23.13} \\approx 4.81$$ minutes.\n\nThe subtraction $$E(X^2) - \\mu^2$$ is *not* optional — it converts \"mean of squares\" into \"mean squared deviation,\" which is what spread actually measures.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "For grouped data with $$n = 100$$, the first quartile position is $$\\frac{n}{4} = 25$$. A student argues it should be $$\\frac{n+1}{4} = 25.25$$ because \"that's what you do for quartiles.\" Why is the student wrong for grouped data? (2 steps)", "answer": "- Step 1: The $$\\frac{n+1}{4}$$ rule applies to **discrete, listed data** where each observation occupies a single position in an ordered list. Adding 1 accounts for the fact that with $$n$$ data points, there are $$n-1$$ gaps, and the \"fair\" position for the median is at $$\\frac{n+1}{2}$$.\n- Step 2: For **grouped (continuous) data**, observations are assumed uniformly spread within each class. The cumulative frequency curve is treated as a continuous function, so the quartile is at the exact position $$\\frac{n}{4}$$ with no +1 correction. Using 25.25 would shift you slightly deeper into the 10–14 class and produce a wrong answer.\n\nThis is a mark-losing error in IAL S1: grouped data always uses $$\\frac{n}{4}$$, $$\\frac{n}{2}$$, $$\\frac{3n}{4}$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In the linear interpolation formula $$Q = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, explain what each symbol represents and identify the single most common mistake in the denominator. (3 steps)", "answer": "- Step 1: The symbols: $$L$$ = lower boundary of the class containing the quartile; $$k$$ = 1 for $$Q_1$$, 3 for $$Q_3$$; $$F_{\\text{before}}$$ = cumulative frequency of all classes *before* the quartile class; $$f_{\\text{class}}$$ = frequency *of* the quartile class itself; $$w$$ = class width.\n- Step 2: The fraction $$\\frac{kn/4 - F_{\\text{before}}}{f_{\\text{class}}}$$ answers: \"how far through the quartile class must we go to reach the desired position?\" The numerator is the number of observations still needed after exhausting all previous classes; the denominator is the total observations available in this class.\n- Step 3: The most common mistake is using the **cumulative frequency** (i.e., $$F_{\\text{before}} + f_{\\text{class}}$$) instead of just $$f_{\\text{class}}$$ in the denominator. The denominator must be the class frequency only — it represents the total observations *in this class*, not up to and including this class.\n\nFor example, with $$F_{\\text{before}} = 10$$, $$f_{\\text{class}} = 16$$, the denominator is 16, not 26.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "The cumulative frequency table shows values jumping from 10 to 26 across the class 10–14. You need to find $$Q_1$$ (position 25). Walk through the logic of identifying the correct class and computing $$Q_1$$. (4 steps)", "answer": "- Step 1: Build the cumulative frequency table: after class 5–10, $$F = 10$$. After class 10–14, $$F = 10 + 16 = 26$$. After class 14–18, $$F = 50$$.\n- Step 2: Locate the quartile position: $$\\frac{n}{4} = \\frac{100}{4} = 25$$. Scan the cumulative frequencies: 10 < 25 ≤ 26, so the 25th value falls in the class 10–14.\n- Step 3: Apply interpolation: $$Q_1 = 10 + \\frac{25 - 10}{16} \\times 4 = 10 + \\frac{15}{16} \\times 4 = 10 + \\frac{60}{16} = 10 + 3.75 = 13.75$$.\n- Step 4: Sanity check: 13.75 is inside [10, 14] ✓. It is close to the upper end, which makes sense because position 25 is near the top of the 16 observations in this class (only 1 more observation needed after position 25 to exhaust the class).\n\nGiven $$Q_3 = 23$$, the IQR = 23 − 13.75 = 9.25 minutes.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A student reads a histogram and sees that the tallest bar corresponds to the class 18–25. They conclude this class must have the highest frequency. Is this reasoning always correct? Explain with a counterexample. (2 steps)", "answer": "- Step 1: The reasoning is **not always correct**. The height of a histogram bar is the frequency density, not the frequency. Frequency = density × width. A tall, narrow bar could have a *lower* frequency than a shorter, wider bar.\n- Step 2: Counterexample: Class A has density 5 and width 2 → frequency 10. Class B has density 3 and width 10 → frequency 30. Class B has a shorter bar but triple the frequency. In the actual paper, the class 25–40 (width 15) may have a lower bar height than 18–25 (width 7) but could have comparable or higher frequency depending on the densities.\n\nOnly when all class widths are equal does bar height directly indicate frequency — which is exactly when a histogram looks like a bar chart.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When computing standard deviation, a student writes $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n}} - \\bar{t}$$ (square-rooting first, then subtracting the mean). Explain why this is fundamentally wrong using the order of operations. (2 steps)", "answer": "- Step 1: The correct formula is $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$. The subtraction happens *inside* the square root. The student's version takes the square root first and then subtracts, which is a completely different expression because $$\\sqrt{a - b} \\neq \\sqrt{a} - \\sqrt{b}$$ in general.\n- Step 2: Numerically, $$\\sqrt{410.33 - 387.20} = \\sqrt{23.13} \\approx 4.81$$, but $$\\sqrt{410.33} - 19.68 \\approx 20.26 - 19.68 = 0.58$$ — completely wrong. The student's version would always underestimate the standard deviation because $$\\sqrt{a} - \\sqrt{b} < \\sqrt{a - b}$$ when $$a > b > 0$$.\n\nThe square root is the *last* operation — it converts variance (in squared units) back to the original units.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Two marbles are drawn from bag X (which starts with 5G, 4B) *without replacement*, then a third marble is drawn from bag Y (which starts with 6G, 5B and receives the two transferred marbles). Explain why the denominator changes from 9 to 8 for bag X draws, and why bag Y's denominator is 13 (not 11) for the third draw. (3 steps)", "answer": "- Step 1: Bag X starts with 5 + 4 = 9 marbles. The first draw selects from all 9, so $$P(G_1) = \\frac{5}{9}$$. After removing one marble, only 8 remain, so the second draw uses denominator 8. This is standard \"without replacement\" logic.\n- Step 2: Bag Y starts with 6 + 5 = 11 marbles. But *two* marbles have been transferred from X into Y before the third draw. So Y now contains 11 + 2 = 13 marbles.\n- Step 3: The common error is to use 11 (Y's original count) as the denominator for the third draw. This ignores that the problem explicitly states the two marbles from X are *placed in* Y. The transfer changes Y's composition — both the numerator (green/blue count) and denominator (total) must be updated.\n\nAlways recompute the composition of any container that receives items from another.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "After drawing a green marble first from bag X (5G, 4B), what is the composition of bag X for the second draw? After drawing a blue marble first, what changes? Why does this matter for the tree diagram? (2 steps)", "answer": "- Step 1: If the first marble is green, bag X now has 4G and 4B (8 total). So $$P(G_2 \\mid G_1) = \\frac{4}{8} = \\frac{1}{2}$$ and $$P(B_2 \\mid G_1) = \\frac{4}{8} = \\frac{1}{2}$$. If the first marble is blue, bag X now has 5G and 3B (8 total). So $$P(G_2 \\mid B_1) = \\frac{5}{8}$$ and $$P(B_2 \\mid B_1) = \\frac{3}{8}$$.\n- Step 2: This matters because the conditional probabilities on the second branch of the tree diagram *depend on the first outcome*. You cannot label the second branch with a single probability — it splits into two sub-branches with different values depending on whether $$G_1$$ or $$B_1$$ occurred. This is the defining feature of sampling without replacement: the denominator drops to 8, and the numerator depends on what was removed.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "After two green marbles (GG) are transferred from bag X to bag Y, bag Y has 8G and 5B. After one green and one blue (GB or BG) are transferred, bag Y has 7G and 6B. Why must you track the composition of Y separately for each branch of the tree? (2 steps)", "answer": "- Step 1: The third marble is drawn from bag Y, whose composition depends on *what was transferred*. After GG: Y has 6+2=8 green, 5+0=5 blue → $$P(G_3) = \\frac{8}{13}$$. After GB or BG: Y has 6+1=7 green, 5+1=6 blue → $$P(G_3) = \\frac{7}{13}$$. After BB: Y has 6+0=6 green, 5+2=7 blue → $$P(G_3) = \\frac{6}{13}$$.\n- Step 2: There is no single value of $$P(G_3)$$ — it is *path-dependent*. Using $$\\frac{6}{13}$$ (the BB-branch value) on the GG branch would give a wrong answer for paths starting with two greens. Each branch of the tree carries its own version of bag Y, and you must use the correct composition for each.\n\nThis is the most common error in transfer problems: assuming one fixed probability for the final draw regardless of branch.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "Find $$P(\\text{two marbles from X are different colours})$$. Conceptually, why does this equal $$P(G_1)P(B_2 \\mid G_1) + P(B_1)P(G_2 \\mid B_1)$$ rather than just $$2 \\times P(G_1) \\times P(B_2 \\mid G_1)$$? (2 steps)", "answer": "- Step 1: \"Different colours\" means either (G then B) or (B then G). These are two mutually exclusive paths: $$P(\\text{diff}) = P(G_1 \\cap B_2) + P(B_1 \\cap G_2) = P(G_1)P(B_2 \\mid G_1) + P(B_1)P(G_2 \\mid B_1)$$.\n- Step 2: The two terms are *not* equal in general, so you cannot just double one of them. Here: $$P(G_1)P(B_2 \\mid G_1) = \\frac{5}{9} \\times \\frac{4}{8} = \\frac{20}{72}$$, while $$P(B_1)P(G_2 \\mid B_1) = \\frac{4}{9} \\times \\frac{5}{8} = \\frac{20}{72}$$. They happen to be equal here (both $$\\frac{20}{72}$$) because 5×4 = 4×5, but this is a coincidence of the specific numbers, not a general rule. You must always compute both paths separately and add.\n\nResult: $$\\frac{40}{72} = \\frac{5}{9}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "To find $$P(\\text{all three marbles are the same colour})$$, why do you only need the GG→G₃ and BB→B₃ paths, and not the GB or BG paths? (2 steps)", "answer": "- Step 1: \"All three same colour\" means either all green (GGG) or all blue (BBB). For all green, the first two draws from X must both be green (GG path), and then the third draw from Y must also be green. The GB or BG paths already produce mixed colours from X, making \"all same\" impossible.\n- Step 2: Similarly, for all blue, the first two draws must both be blue (BB path). The GB and BG paths are irrelevant because they already contain one green and one blue — no matter what Y produces, the three marbles cannot all be the same colour.\n\nSo: $$P(\\text{same}) = P(GGG) + P(BBB) = \\frac{5}{9} \\cdot \\frac{4}{8} \\cdot \\frac{8}{13} + \\frac{4}{9} \\cdot \\frac{3}{8} \\cdot \\frac{7}{13} = \\frac{160}{936} + \\frac{84}{936} = \\frac{244}{936} = \\frac{61}{234}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In the conditional probability $$P(\\text{all G} \\mid \\text{all same})$$, explain why $$P(\\text{all G} \\cap \\text{all same}) = P(\\text{all G})$$ rather than requiring a separate calculation. (2 steps)", "answer": "- Step 1: \"All green\" is a *subset* of \"all same colour\" — if all three are green, then automatically all three are the same colour. So the event {all G} is entirely contained within the event {all same}.\n- Step 2: When $$A \\subseteq B$$, we have $$P(A \\cap B) = P(A)$$ (because $$A \\cap B = A$$). Therefore: $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})} = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$.\n\nThe 936 denominators cancel cleanly — this is why keeping a common denominator throughout the tree is good practice. The conditional reduces to a simple ratio of the two path probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "A student computes $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936}$$ and gets $$\\frac{40}{61} \\approx 0.656$$. Another student forgets the conditioning and just reports $$P(\\text{all G}) = \\frac{160}{936} \\approx 0.171$$. Conceptually, why must the conditional answer always be larger than the unconditional one in this type of problem? (2 steps)", "answer": "- Step 1: Conditioning on \"all same\" restricts the sample space to only those outcomes where all three marbles share a colour. Within this smaller world, the only possibilities are GGG or BBB. The probability of GGG *within this restricted world* must account for the full probability of the restricted world.\n- Step 2: Since $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$ and $$P(B) < 1$$ (here $$P(\\text{same}) \\approx 0.261$$), dividing by a number less than 1 always increases the result: $$\\frac{0.171}{0.261} \\approx 0.656 > 0.171$$. The conditional probability is always at least as large as the unconditional when $$A \\subseteq B$$.\n\nIntuitively: knowing \"they're all the same colour\" makes \"they're all green\" much more likely, because you've eliminated all the mixed-colour outcomes.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "For a discrete random variable $$X$$ with $$P(X=2) = a$$, $$P(X=3) = 0.4$$, $$P(X=4) = 0.6-a$$, explain why the constraint $$0 \\le a \\le 0.6$$ arises, and why the probabilities automatically sum to 1 without imposing any extra condition. (2 steps)", "answer": "- Step 1: The sum is $$a + 0.4 + (0.6 - a) = 1.0$$, which simplifies to 1 regardless of the value of $$a$$. The parameter $$a$$ cancels — the table is constructed so that the probabilities always sum to 1. This is by design: the question uses complementary probabilities.\n- Step 2: However, each individual probability must lie in [0, 1]. We need $$a \\ge 0$$ (obviously) and $$0.6 - a \\ge 0$$, giving $$a \\le 0.6$$. Together: $$0 \\le a \\le 0.6$$. This constraint is *not* automatic — it is an additional requirement that restricts the allowable values of $$a$$.\n\nThis constraint is examined explicitly: stating $$0 \\le a \\le 0.6$$ earns a mark, and both roots of any quadratic must be checked against it.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Given $$E(X) = 3.6 - 2a$$ and the constraint $$0 \\le a \\le 0.6$$, explain why the range of $$E(X)$$ is found by evaluating at the endpoints of the constraint, rather than by differentiation or any other method. (2 steps)", "answer": "- Step 1: $$E(X) = 3.6 - 2a$$ is a *linear* function of $$a$$. A linear function on a closed interval achieves its maximum and minimum at the endpoints — there is no interior critical point (the derivative is the constant −2, never zero).\n- Step 2: Since the coefficient of $$a$$ is negative (−2), $$E(X)$$ is decreasing in $$a$$. So the maximum occurs at the smallest $$a$$ (i.e., $$a = 0$$): $$E(X) = 3.6$$. The minimum occurs at the largest $$a$$ (i.e., $$a = 0.6$$): $$E(X) = 3.6 - 1.2 = 2.4$$. Range: $$2.4 \\le E(X) \\le 3.6$$.\n\nIf the function were nonlinear (e.g., quadratic), you would need to check interior critical points as well. But for linear functions, endpoint evaluation is sufficient and complete.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "In computing $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, a student writes $$E(X^2) = [E(X)]^2 = (3.6-2a)^2$$. Explain the conceptual difference between $$E(X^2)$$ and $$[E(X)]^2$$ and why they are almost never equal. (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — you square the outcomes first, then take the probability-weighted average. For this distribution: $$E(X^2) = 4a + 9(0.4) + 16(0.6-a) = 13.2 - 12a$$.\n- Step 2: $$[E(X)]^2 = (3.6 - 2a)^2$$ — you take the mean first, then square it. These are fundamentally different operations. By Jensen's inequality, for any non-constant random variable, $$E(X^2) > [E(X)]^2$$ (the square function is convex, so the mean of the squares exceeds the square of the mean). The difference *is* the variance: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n\nConfusing these two is one of the most common errors: always compute $$E(X^2)$$ separately using $$x^2$$ values, never by squaring $$E(X)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "When substituting into the variance equation $$0.56 = (13.2 - 12a) - (3.6 - 2a)^2$$, a student writes $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$ in one step. Why is this error-prone, and what is the safer procedure? (3 steps)", "answer": "- Step 1: The dangerous step is distributing the minus sign through $$(3.6 - 2a)^2$$ *before* expanding the square. The student must first compute $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$ as a separate, clean expansion.\n- Step 2: Only *then* substitute back with the minus sign: $$0.56 = (13.2 - 12a) - (12.96 - 14.4a + 4a^2)$$. Now distribute the minus: $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$.\n- Step 3: Simplify: $$0.56 = 0.24 + 2.4a - 4a^2$$. Rearrange to standard form: $$4a^2 - 2.4a + 0.32 = 0$$, then $$a^2 - 0.6a + 0.08 = 0$$.\n\nThe key discipline: **expand the squared bracket separately on its own line, then substitute**. Never try to expand and distribute the minus in one go — the sign error on the $$+14.4a$$ term (which comes from $$-(-14.4a)$$) is where marks are lost.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "After solving $$a^2 - 0.6a + 0.08 = 0$$ and obtaining $$a = 0.2$$ or $$a = 0.4$$, why must you still explicitly check both values against $$0 \\le a \\le 0.6$$, even though both happen to be valid here? (2 steps)", "answer": "- Step 1: Exam questions are frequently rigged so that one root of the quadratic falls *outside* the valid probability range. For example, if the quadratic gave $$a = -0.1$$ and $$a = 0.7$$, both would be invalid (negative probability and exceeding 0.6 respectively), and the problem would have no solution. The constraint check is a separate marking point.\n- Step 2: Here, both 0.2 and 0.4 satisfy $$0 \\le a \\le 0.6$$, so both are valid. But the examiner expects to see the check written out: \"$$0.2 \\in [0, 0.6]$$ ✓ and $$0.4 \\in [0, 0.6]$$ ✓\". Omitting this loses a mark even when both roots survive.\n\nMake the constraint check a reflex: every time you solve for a probability parameter, verify the root(s) lie in [0, 1] (or whatever subset the problem imposes).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "A simple discrete RV has $$P(X=1) = a$$ and $$P(X=2) = 1-a$$ with $$\\text{Var}(X) = 0.21$$. Set up (but do not fully solve) the variance equation. What is the valid range for $$a$$? (3 steps)", "answer": "- Step 1: Valid range: $$0 \\le a \\le 1$$ (each probability must be in [0,1]).\n- Step 2: $$E(X) = 1 \\cdot a + 2 \\cdot (1-a) = a + 2 - 2a = 2 - a$$. And $$E(X^2) = 1 \\cdot a + 4 \\cdot (1-a) = a + 4 - 4a = 4 - 3a$$.\n- Step 3: Variance equation: $$0.21 = E(X^2) - [E(X)]^2 = (4 - 3a) - (2-a)^2$$. Expand separately: $$(2-a)^2 = 4 - 4a + a^2$$. So $$0.21 = 4 - 3a - 4 + 4a - a^2 = a - a^2$$. This gives $$a^2 - a + 0.21 = 0$$.\n\nBoth roots would need checking against $$0 \\le a \\le 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a Venn diagram with two events $$A$$ and $$B$$, the four regions are labelled $$p = P(A \\cap B')$$, $$q = P(A \\cap B)$$, $$r = P(A' \\cap B)$$, $$s = P(A' \\cap B')$$. If you are given $$P(A)$$, $$P(B)$$, and $$P((A \\cap B') \\cup (A' \\cap B))$$, which regions correspond to each given quantity? (2 steps)", "answer": "- Step 1: $$P(A) = p + q$$ (the entire A circle, which is \"A only\" plus \"A and B\"). $$P(B) = q + r$$ (the entire B circle, which is \"B only\" plus \"A and B\"). These are straightforward.\n- Step 2: $$(A \\cap B') \\cup (A' \\cap B)$$ is the **symmetric difference** — the parts of A and B that don't overlap. This is $$p + r$$ (A only, union B only). It is *not* $$p + q + r$$ (that would be $$A \\cup B$$, which includes the intersection).\n\nMisreading the symmetric difference as $$A \\cup B$$ is a common error that would give $$p + q + r$$ instead of $$p + r$$, leading to wrong equations.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Given the three equations $$p + q = \\frac{7}{25}$$, $$q + r = \\frac{5}{25}$$, and $$p + r = \\frac{8}{25}$$, explain the algebraic trick of adding all three equations to find $$p + q + r$$, and why this is more efficient than substitution. (2 steps)", "answer": "- Step 1: Adding all three: $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r = \\frac{7+5+8}{25} = \\frac{20}{25} = \\frac{4}{5}$$. Dividing by 2: $$p + q + r = \\frac{2}{5}$$.\n- Step 2: This is efficient because once you know $$p + q + r = \\frac{2}{5}$$, you can recover each variable: $$q = (p+q+r) - (p+r) = \\frac{2}{5} - \\frac{8}{25} = \\frac{10-8}{25} = \\frac{2}{25}$$. Then $$p = \\frac{7}{25} - \\frac{2}{25} = \\frac{5}{25}$$ and $$r = \\frac{5}{25} - \\frac{2}{25} = \\frac{3}{25}$$. No simultaneous-equation solving needed — just subtraction.\n\nThe trick works because the three given equations pair up the unknowns in a cycle ($$p+q$$, $$q+r$$, $$p+r$$), and adding them doubles the sum of all three.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "After finding $$p = \\frac{5}{25}$$, $$q = \\frac{2}{25}$$, $$r = \\frac{3}{25}$$, how do you find $$s$$ (the outside region), and what single fact guarantees this always works? (2 steps)", "answer": "- Step 1: The four regions of a Venn diagram partition the entire sample space, so $$p + q + r + s = 1$$. Therefore $$s = 1 - (p + q + r) = 1 - \\frac{10}{25} = \\frac{15}{25} = \\frac{3}{5}$$.\n- Step 2: This always works because the four regions $$A \\cap B'$$, $$A \\cap B$$, $$A' \\cap B$$, and $$A' \\cap B'$$ are *mutually exclusive and exhaustive* — they cover every possible outcome with no overlap. Their probabilities must sum to 1 by the axioms of probability.\n\nCross-check: $$p + r = \\frac{5}{25} + \\frac{3}{25} = \\frac{8}{25}$$ ✓ (matches the given symmetric difference).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Two events $$C$$ and $$D$$ satisfy $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ where $$x > 0$$. To show they cannot be mutually exclusive, what single inequality must you derive, and what logical principle underpins the argument? (3 steps)", "answer": "- Step 1: If $$C$$ and $$D$$ were mutually exclusive, then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$. But any probability is at most 1, so mutual exclusivity *forces* $$P(C) + P(D) \\le 1$$.\n- Step 2: Compute $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 3: Rewrite as $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$. Since $$x > 0$$, we have $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2+5x} > 0$$, giving $$P(C) + P(D) > 1$$. This contradicts the necessary condition $$P(C) + P(D) \\le 1$$, so $$C$$ and $$D$$ cannot be mutually exclusive.\n\nThe logical structure is proof by contradiction: *assume* mutually exclusive → derive necessary bound → show bound is violated → conclude.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "In the mutual exclusivity proof, why is the algebraic restructuring $$\\frac{x^2+5x+25}{x^2+5x} = 1 + \\frac{25}{x^2+5x}$$ more powerful than trying to solve a quadratic inequality? (2 steps)", "answer": "- Step 1: A quadratic inequality approach would require showing $$\\frac{x^2+5x+25}{x^2+5x} > 1$$ by cross-multiplying and analysing signs — possible but messy and error-prone, especially with the denominator sign.\n- Step 2: The restructuring splits the fraction into 1 + (positive term). Since $$x > 0$$ guarantees $$x^2 + 5x > 0$$, the term $$\\frac{25}{x^2+5x}$$ is strictly positive for all valid $$x$$. The inequality $$1 + (\\text{something positive}) > 1$$ is then *immediate* — no cases, no sign analysis, no quadratic. This is the exam technique: restructure to make the inequality obvious.\n\nThe key insight: when the numerator exceeds the denominator by a clearly positive amount, split the fraction rather than cross-multiplying.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A student argues: \"Since $$P(C) + P(D) > 1$$, events $$C$$ and $$D$$ must overlap.\" Is this reasoning correct? Explain the link between the probability sum and mutual exclusivity. (2 steps)", "answer": "- Step 1: The reasoning is correct. By the addition rule: $$P(C \\cup D) = P(C) + P(D) - P(C \\cap D)$$. If $$P(C) + P(D) > 1$$, then $$P(C \\cup D) = P(C) + P(D) - P(C \\cap D) > 1 - P(C \\cap D)$$. Since $$P(C \\cup D) \\le 1$$, we need $$1 - P(C \\cap D) < 1$$, which means $$P(C \\cap D) > 0$$.\n- Step 2: Equivalently: if $$C$$ and $$D$$ were mutually exclusive ($$P(C \\cap D) = 0$$), then $$P(C \\cup D) = P(C) + P(D) > 1$$, which is impossible. Therefore $$P(C \\cap D) > 0$$ — the events *must* overlap.\n\nThe contrapositive: mutual exclusivity ⇒ $$P(C) + P(D) \\le 1$$. So $$P(C) + P(D) > 1$$ ⇒ not mutually exclusive.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "When standardising a normal variable $$L \\sim N(4.5, 0.4^2)$$ to find $$P(L < 3.86)$$, explain why the $$z$$-value is negative and what this tells you about the probability before looking up any table. (2 steps)", "answer": "- Step 1: $$Z = \\frac{3.86 - 4.5}{0.4} = \\frac{-0.64}{0.4} = -1.6$$. The $$z$$-value is negative because 3.86 is *below* the mean (4.5). Standardisation measures how many standard deviations away from the mean you are, with the sign indicating direction.\n- Step 2: A negative $$z$$-value means the probability is *less than 0.5*. Specifically, $$P(Z < -1.6) = 1 - P(Z < 1.6) = 1 - 0.9452 = 0.0548$$, which is indeed well below 0.5. This sanity check catches errors: if you got a probability above 0.5 for a value below the mean, something is wrong.\n\nAlways check: value below mean → probability < 0.5; value above mean → probability > 0.5.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "The upper quartile $$Q_3$$ of a normal distribution corresponds to $$P(Z < z) = 0.75$$. The required $$z$$-value is 0.6745. A student uses 0.67 instead. Estimate the error this introduces to $$Q_3$$ when $$\\sigma = 0.4$$. (2 steps)", "answer": "- Step 1: The correct $$Q_3 = \\mu + 0.6745\\sigma = 4.5 + 0.6745 \\times 0.4 = 4.5 + 0.2698 = 4.7698$$. Using 0.67: $$Q_3 = 4.5 + 0.67 \\times 0.4 = 4.5 + 0.268 = 4.768$$.\n- Step 2: The error is $$0.2698 - 0.268 = 0.0018$$ mm on $$Q_3$$. This seems small, but the error *compounds* through the IQR and outlier limits (multiplied by 1.5), and then the $$z$$-values for the outlier limits shift, potentially changing the final probability in part (d). In an exam, using 0.67 instead of 0.6745 can cascade into a wrong final answer.\n\nMemorise: $$z = 0.6745$$ for quartiles. It is not in the formula booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Explain why the upper and lower outlier limits in a normal distribution are symmetric about the mean, i.e., why the upper limit is $$\\mu + k$$ and the lower limit is $$\\mu - k$$ for the same value $$k$$. (2 steps)", "answer": "- Step 1: The normal distribution is symmetric about $$\\mu$$. Therefore $$Q_3 - \\mu = \\mu - Q_1$$, i.e., the quartiles are equidistant from the mean. The IQR = $$Q_3 - Q_1$$, and the outlier limits are $$Q_3 + 1.5 \\times \\text{IQR}$$ and $$Q_1 - 1.5 \\times \\text{IQR}$$.\n- Step 2: Upper limit = $$Q_3 + 1.5 \\times \\text{IQR} = (\\mu + d) + 1.5 \\times 2d = \\mu + d + 3d = \\mu + 4d$$, where $$d = Q_3 - \\mu$$. Lower limit = $$Q_1 - 1.5 \\times \\text{IQR} = (\\mu - d) - 3d = \\mu - 4d$$. So the limits are $$\\mu \\pm 4d$$, symmetric about the mean.\n\nIn the paper: $$d = 0.2698$$, so limits are at $$4.5 \\pm 4(0.2698) = 4.5 \\pm 1.079$$, giving 3.42 and 5.58.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "To show $$P(\\text{not outlier}) = 0.993$$, you standardise the outlier limits to get $$z = \\pm 2.698$$. Explain why the probability $$P(-2.698 < Z < 2.698)$$ can be computed as $$P(Z < 2.698) - P(Z < -2.698)$$, and why symmetry gives $$P(Z < -2.698) = 1 - P(Z < 2.698)$$. (2 steps)", "answer": "- Step 1: The probability of being between two values is the area under the curve from the lower value to the upper value. By the cumulative distribution function: $$P(a < Z < b) = P(Z < b) - P(Z < a)$$. This is the \"subtract the left tail\" principle.\n- Step 2: By the symmetry of the standard normal about 0: $$P(Z < -c) = P(Z > c) = 1 - P(Z < c)$$. So $$P(Z < -2.698) = 1 - P(Z < 2.698)$$. Combining: $$P(-2.698 < Z < 2.698) = P(Z < 2.698) - (1 - P(Z < 2.698)) = 2P(Z < 2.698) - 1 = 2(0.9965) - 1 = 0.993$$.\n\nThe question says \"using standardisation\" — you must *show* the $$z$$-values explicitly, not just state the answer.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In Q5(e), the conditional probability $$P(L > 5 \\mid \\text{not outlier})$$ requires computing $$P(L > 5 \\cap \\text{not outlier})$$. A student computes $$P(L > 5)$$ instead. Explain why these are different and what the intersection actually is. (3 steps)", "answer": "- Step 1: \"Not outlier\" means $$3.42 < L < 5.58$$. So the event \"not outlier\" *caps* $$L$$ at 5.58 on the upper end. The event $$L > 5$$ has no such cap — it extends to infinity.\n- Step 2: The intersection $$\\{L > 5\\} \\cap \\{3.42 < L < 5.58\\}$$ is the overlap: values that satisfy both conditions simultaneously. You need $$L > 5$$ AND $$L < 5.58$$, so the intersection is $$5 < L < 5.58$$.\n- Step 3: Therefore $$P(L > 5 \\cap \\text{not outlier}) = P(5 < L < 5.58)$$, NOT $$P(L > 5)$$. Using $$P(L > 5) = P(Z > 1.25) = 0.1056$$ in the numerator would give $$0.1056/0.993 \\approx 0.106$$ — wrong. The correct numerator is $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$, giving $$0.1021/0.993 \\approx 0.103$$.\n\nThe single most common conditional-normal mistake: forgetting that the conditioning event restricts the range.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "In a conditional probability $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, when the event $$B$$ restricts the sample space to a subset (like \"not outlier\" restricting to a band), explain visually what happens to the numerator on a number line. (2 steps)", "answer": "- Step 1: On the number line, event $$A$$ (e.g., \"$$L > 5$$\") is a ray extending from 5 to +∞. Event $$B$$ (e.g., \"not outlier\") is the interval (3.42, 5.58). The intersection $$A \\cap B$$ is the *overlap* of these two regions: the segment from 5 to 5.58.\n- Step 2: The conditional probability is the *proportion* of region $$B$$ that also lies in $$A$$. Visually, it's the area under the normal curve from 5 to 5.58, divided by the area from 3.42 to 5.58. The \"cap\" at 5.58 chops off the right tail of $$A$$ that extends beyond $$B$$.\n\nAlways draw the number line and shade the regions — the intersection is always the overlap, which may be a proper subset of both $$A$$ and $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A student tries to solve Q5(e) using the \"inverse normal\" method. Explain why inverse normal is the wrong tool here, and what type of problem inverse normal *is* appropriate for. (2 steps)", "answer": "- Step 1: Inverse normal solves: \"given a probability $$p$$, find the value $$x$$ such that $$P(X < x) = p$$.\" It goes from probability → value. Q5(e) goes the other direction: given values (5 and 5.58), find a probability. This is a *direct* normal calculation, not inverse.\n- Step 2: The confusion may arise because the problem involves quartiles (which *were* found by inverse normal in part (b)). But part (e) is a conditional probability — you standardise the boundaries, look up the cumulative probabilities, and compute. No inverse step is needed.\n\nInverse normal is for: \"find the 90th percentile,\" \"find $$c$$ such that $$P(X < c) = 0.95$$,\" etc. Direct normal is for: \"find $$P(a < X < b)$$.\"", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "The regression line of $$y$$ on $$x$$ is $$y = 151.2 + 2.72x$$. Give a complete interpretation of the gradient 2.72, including all required elements for full marks. (2 steps)", "answer": "- Step 1: The gradient means: for every 1 °C increase in temperature ($$x$$), the maximum weight of sugar that dissolves in 100 g of water ($$y$$) increases by approximately 2.72 grams, **on average**.\n- Step 2: The three required elements are: (1) the direction and magnitude of change (\"increases by 2.72\"), (2) the units on both variables (\"1 °C\" and \"grams\"), and (3) the qualifier \"on average\" (because the regression line is a model, not an exact law — individual data points scatter around it).\n\nMissing any of these three elements loses a mark. \"For every degree, the weight is 2.72\" scores 0 — no units, no \"on average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "The data range is $$10 \\le x \\le 80$$. A student uses the regression line to estimate $$y$$ at $$x = 90$$ and gets 396 grams. They claim this is reliable because $$r = 0.988$$ is very high. Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: The estimate at $$x = 90$$ is **extrapolation** — predicting outside the observed data range. The linear relationship has only been verified for temperatures 10–80 °C. Beyond 80 °C, the relationship could change (e.g., sugar solubility may plateau, or the solution could become saturated).\n- Step 2: A high PMCC ($$r = 0.988$$) tells you the linear model fits well *within the data range*. It says nothing about whether the relationship remains linear outside that range. Extrapolation is unreliable regardless of how strong the correlation is within the sample.\n\nThe correct answer: unreliable, because $$x = 90$$ is outside the range of the data (extrapolation).", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "To compute the PMCC $$r$$, you need $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$. Given $$\\sum x^2 = 24{,}500$$, $$\\sum x = 480$$, and $$n = 12$$, walk through the computation of $$S_{xx}$$. (2 steps)", "answer": "- Step 1: The formula is $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This measures the total squared deviation of the $$x$$-values from their mean (up to a factor of $$n$$).\n- Step 2: Substituting: $$S_{xx} = 24500 - \\frac{480^2}{12} = 24500 - \\frac{230400}{12} = 24500 - 19200 = 5300$$.\n\nThe structure is always: \"raw sum of squares\" minus \"correction factor\" $$(\\sum x)^2/n$$. The correction factor is what you'd get if all $$x$$-values were equal to $$\\bar{x}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "Given the regression line $$y = 151.2 + 2.72x$$ and $$S_{xx} = 5300$$, explain how to recover $$S_{xy}$$ without being given $$\\sum xy$$ directly. (2 steps)", "answer": "- Step 1: The gradient of the regression line of $$y$$ on $$x$$ is $$b = \\frac{S_{xy}}{S_{xx}}$$. This is the fundamental relationship between the regression gradient and the summary statistics.\n- Step 2: Rearranging: $$S_{xy} = b \\times S_{xx} = 2.72 \\times 5300 = 14416$$. This recovery technique works whenever you know the regression equation and $$S_{xx}$$ — even if $$\\sum xy$$ is not explicitly given.\n\nThis is the key insight for Q6(d): if summary stats appear incomplete, the regression line itself encodes the relationship $$b = S_{xy}/S_{xx}$$, allowing you to recover missing values.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "Given $$\\bar{y} = 259.917$$ and the regression line $$y = 151.2 + 2.72x$$, explain how to recover $$\\bar{x}$$ and hence $$\\sum x$$. (3 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ always passes through the point $$(\\bar{x}, \\bar{y})$$. This is a fundamental property: the mean point lies on the line of best fit.\n- Step 2: Substitute $$\\bar{y} = 259.917$$ into the line: $$259.917 = 151.2 + 2.72\\bar{x}$$, so $$\\bar{x} = \\frac{259.917 - 151.2}{2.72} = \\frac{108.717}{2.72} \\approx 40$$.\n- Step 3: Then $$\\sum x = n \\times \\bar{x} = 12 \\times 40 = 480$$. This recovery technique is essential when the paper's summary statistics appear cropped or incomplete — the regression line gives you the means, and the means give you the sums.\n\nThe property \"regression line passes through $$(\\bar{x}, \\bar{y})$$\" is always true and is a powerful recovery tool.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "When computing the PMCC, a student tries to do everything in one line: $$r = \\frac{\\sum xy - (\\sum x)(\\sum y)/n}{\\sqrt{(\\sum x^2 - (\\sum x)^2/n)(\\sum y^2 - (\\sum y)^2/n)}}$$. Why is this a bad exam strategy? (2 steps)", "answer": "- Step 1: A single-line computation has no intermediate marks. If you make one arithmetic error (a dropped digit, a wrong sign), the entire answer is wrong and you get 0 out of 7 marks. The mark scheme awards points for correct $$S_{xx}$$, correct $$S_{yy}$$, correct $$S_{xy}$$, and correct final assembly — each as a separate step.\n- Step 2: Instead, lay out three labelled lines: (1) $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n} = ...$$, (2) $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = ...$$, (3) $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n} = ...$$. Then compute $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Even if the final number is wrong, correct intermediate steps earn partial credit.\n\nExam discipline: separate, labelled computations for $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$ — always.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "When asked to \"discuss the suitability of a linear regression model,\" you must cite two pieces of evidence. What are they, and why is citing only one insufficient? (2 steps)", "answer": "- Step 1: The two pieces of evidence are: (1) the PMCC value — $$r = 0.988$$ is very close to 1, indicating strong positive linear correlation; (2) the scatter diagram — points lie close to a straight line with no obvious curve or fanning pattern.\n- Step 2: Citing only $$r$$ is insufficient because a high $$r$$ can occur with nonlinear patterns (e.g., a slight curve can still give $$r \\approx 0.99$$). Citing only the scatter is insufficient because visual assessment is subjective — the PMCC provides an objective, quantitative measure. The examiner requires both: the numerical evidence ($$r$$) and the visual evidence (scatter).\n\nConclusion: a linear model is suitable because both the high PMCC and the scatter diagram support a linear relationship within the observed range.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Can a high PMCC ($$r \\approx 0.99$$) coexist with a clearly nonlinear relationship? Give a conceptual example and explain why this matters for model suitability. (2 steps)", "answer": "- Step 1: Yes. Consider data that follows a gentle exponential curve over a narrow range. The points lie very close to the curve, and a straight line fit through them would also have a very high $$r$$ because the curve doesn't deviate much from linear over that range. But extrapolating the linear model would diverge from the true exponential behaviour.\n- Step 2: This matters because PMCC measures *linear* association only. A high $$r$$ says \"a straight line fits well\" but does not say \"the true relationship is linear.\" The scatter diagram can reveal curvature, clusters, or outliers that $$r$$ alone misses. This is why both pieces of evidence are required.\n\nA residual plot would be even more informative (checking for patterns in the residuals), but in S1 the scatter diagram is the visual tool available.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A student computes $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = 851093 - \\frac{3119^2}{12}$$ and gets a negative number. What went wrong, and why is $$S_{yy}$$ always non-negative? (2 steps)", "answer": "- Step 1: $$S_{yy}$$ is proportional to the sum of squared deviations from the mean: $$S_{yy} = \\sum(y_i - \\bar{y})^2$$. Since it's a sum of squares, it must be non-negative. A negative result means an arithmetic error — most likely computing $$\\frac{3119^2}{12}$$ incorrectly, or subtracting in the wrong order.\n- Step 2: Correctly: $$\\frac{3119^2}{12} = \\frac{9728161}{12} = 810680.083...$$, so $$S_{yy} = 851093 - 810680.083 = 40412.917$$. If you got $$810680 - 851093 = -40413$$, you subtracted the wrong way around. Always verify: the raw sum of squares must be *larger* than the correction factor.\n\nSanity check: $$S_{yy} \\ge 0$$ always. If you get a negative value, recheck your arithmetic before proceeding.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ can also be written as $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. Derive this from the addition rule. (3 steps)", "answer": "- Step 1: By the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The union consists of three disjoint parts: $$A \\cap B'$$ (A only), $$A \\cap B$$ (intersection), and $$A' \\cap B$$ (B only).\n- Step 2: The symmetric difference excludes the intersection: $$A \\triangle B = (A \\cup B) \\setminus (A \\cap B) = (A \\cap B') \\cup (A' \\cap B)$$. So $$P(A \\triangle B) = P(A \\cup B) - P(A \\cap B)$$.\n- Step 3: Substituting the addition rule: $$P(A \\triangle B) = [P(A) + P(B) - P(A \\cap B)] - P(A \\cap B) = P(A) + P(B) - 2P(A \\cap B)$$. The factor of 2 arises because the intersection is subtracted once in the addition rule and once more when we remove it from the union.\n\nThis formula is useful for checking: with $$P(A) = \\frac{7}{25}$$, $$P(B) = \\frac{5}{25}$$, $$P(A \\cap B) = \\frac{2}{25}$$: $$P(A \\triangle B) = \\frac{7+5-4}{25} = \\frac{8}{25}$$ ✓.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "A \"show that\" question worth 4 marks asks you to prove $$2p + 2q + 2r = \\frac{4}{5}$$. How many lines of working should you show, and what must each line demonstrate? (2 steps)", "answer": "- Step 1: For a 4-mark \"show that,\" the examiner expects to see: (1) translating the given probabilities into equations involving $$p, q, r$$ (1 mark), (2) correctly identifying the symmetric difference as $$p + r$$ (1 mark), (3) adding the three equations (1 mark), (4) simplifying to reach $$\\frac{4}{5}$$ (1 mark).\n- Step 2: Each line must be a clear, justified step. Writing just \"$$p+q = 7/25$$, $$q+r = 5/25$$, $$p+r = 8/25$$, therefore $$2p+2q+2r = 20/25 = 4/5$$\" with no explanation of where the equations come from risks losing the first two marks. State: \"From the Venn diagram: $$P(A) = p+q$$, $$P(B) = q+r$$, and the symmetric difference gives $$p+r$$.\"\n\n\"Show that\" questions reward the journey, not just the destination.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "In the marble transfer problem, the three draws produce four possible sequences for the first two draws: GG, GB, BG, BB. For the event \"all three same colour,\" explain why the GB and BG paths contribute probability **zero** to this event, without doing any calculation. (2 steps)", "answer": "- Step 1: The event \"all three same colour\" requires all three marbles to be green OR all three to be blue. If the first two draws are GB (one green, one blue), then regardless of what the third marble is, the three marbles cannot all be the same colour — they already include both colours.\n- Step 2: Similarly for BG. The only paths that can possibly lead to \"all same\" are GG (which can lead to GGG if the third is green) and BB (which can lead to BBB if the third is blue). So $$P(\\text{same}) = P(GGG) + P(BBB)$$ with zero contribution from GB and BG.\n\nThis observation massively simplifies the calculation — you only need to evaluate two of the four branches.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "In a normal distribution $$X \\sim N(\\mu, \\sigma^2)$$, the outlier limits are at $$\\mu \\pm 4d$$ where $$d = 0.6745\\sigma$$ (the quartile distance from the mean). Express the outlier limits in terms of $$\\mu$$ and $$\\sigma$$ alone, and verify this gives $$z = \\pm 2.698$$. (2 steps)", "answer": "- Step 1: The outlier limits are $$\\mu \\pm 4 \\times 0.6745\\sigma = \\mu \\pm 2.698\\sigma$$. So the upper limit is at $$\\mu + 2.698\\sigma$$ and the lower limit is at $$\\mu - 2.698\\sigma$$.\n- Step 2: Standardising: $$Z = \\frac{(\\mu + 2.698\\sigma) - \\mu}{\\sigma} = 2.698$$, and similarly $$Z = -2.698$$ for the lower limit. This confirms the $$z$$-values used in part (d). The number 2.698 comes from $$4 \\times 0.6745 = 2.698$$ — a fixed multiple for any normal distribution using the 1.5×IQR rule.\n\nThis is a universal result: for *any* normal distribution, the 1.5×IQR outlier boundaries sit at exactly $$\\mu \\pm 2.698\\sigma$$.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "A conditional probability problem gives $$P(A \\mid B)$$ where event $$B$$ restricts the sample space. You compute $$P(A \\cap B)$$ and $$P(B)$$ separately. If you forget to intersect $$A$$ with $$B$$ and just use $$P(A)$$ in the numerator, will your answer be too high or too low? Explain. (2 steps)", "answer": "- Step 1: Since $$A \\cap B \\subseteq A$$, we have $$P(A \\cap B) \\le P(A)$$. Using $$P(A)$$ instead of $$P(A \\cap B)$$ gives a numerator that is too large (or equal, if $$A \\subseteq B$$).\n- Step 2: The conditional probability $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ would be overestimated: you'd compute $$\\frac{P(A)}{P(B)} > \\frac{P(A \\cap B)}{P(B)} = P(A \\mid B)$$. In the paper's example, using $$P(L > 5) = 0.1056$$ instead of $$P(5 < L < 5.58) = 0.1021$$ gives $$0.106 > 0.103$$ — the wrong answer is too high.\n\nThe error is always in the same direction (overestimate) when $$A$$ extends beyond $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Why does the formula $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ always give a non-negative result? Connect this to the concept of variance. (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum(x_i - \\bar{x})^2$$, which is a sum of squared terms and therefore non-negative. The equivalent computational form $$\\sum x^2 - \\frac{(\\sum x)^2}{n}$$ must give the same non-negative value — it's just an algebraic rearrangement that avoids computing deviations individually.\n- Step 2: The connection to variance: $$\\sigma_x^2 = \\frac{S_{xx}}{n}$$, and variance is always non-negative. So $$S_{xx} = n\\sigma_x^2 \\ge 0$$. If your computation gives a negative $$S_{xx}$$, you've made an arithmetic error (most likely subtracting in the wrong order).\n\n$$S_{xx} = 0$$ only when all $$x$$-values are identical (zero variance).", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "The regression line passes through $$(\\bar{x}, \\bar{y})$$. Prove this by substituting $$x = \\bar{x}$$ into $$y = a + bx$$ and using the intercept formula $$a = \\bar{y} - b\\bar{x}$$. (2 steps)", "answer": "- Step 1: The regression line is $$y = a + bx$$ where $$a = \\bar{y} - b\\bar{x}$$. Substitute $$x = \\bar{x}$$: $$y = a + b\\bar{x} = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$.\n- Step 2: So when $$x = \\bar{x}$$, we get $$y = \\bar{y}$$. The point $$(\\bar{x}, \\bar{y})$$ lies on the regression line. This is true for any regression line of $$y$$ on $$x$$ — it's a mathematical identity, not an approximation.\n\nThis property is what allows you to recover $$\\bar{x}$$ from the regression line when $$\\bar{y}$$ is known (or vice versa).", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A student is asked to estimate the number of observations below a class boundary (e.g., below 18) from grouped data. They simply read off the cumulative frequency at 18. Is this an estimate or an exact value? Explain. (2 steps)", "answer": "- Step 1: This is an **estimate**, not an exact value. Grouped data loses the individual data points — we only know how many observations fall in each class, not their exact values. The cumulative frequency at a class boundary (like 18) is exact only because 18 is the boundary between two classes, so all observations in the 14–18 class are below 18 and all in the 18–25 class are at or above 18.\n- Step 2: However, for a value *inside* a class (like 16), we must interpolate — assuming uniform distribution within the class. This is an estimate because the true distribution within the class is unknown. The question always says \"estimate\" for this reason.\n\nEven the mean and standard deviation computed from midpoints are estimates, because the midpoints are assumed representative values.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "In Q5, the outlier definition uses $$Q_3 + 1.5 \\times \\text{IQR}$$ and $$Q_1 - 1.5 \\times \\text{IQR}$$. Why is the multiplier 1.5 specifically, and what would happen if you used 3.0 instead? (2 steps)", "answer": "- Step 1: The multiplier 1.5 is a convention (Tukey's rule) chosen so that, for a normal distribution, only about 0.7% of observations fall outside the limits (i.e., $$P(|Z| > 2.698) \\approx 0.007$$). It balances being sensitive enough to flag unusual values without flagging too many.\n- Step 2: Using 3.0 instead would give limits at $$\\mu \\pm 2 \\times 2.698\\sigma = \\mu \\pm 5.396\\sigma$$. For a normal distribution, virtually no observations would be flagged as outliers ($$P(|Z| > 5.4) \\approx 0.000007$$). The limits would be so wide that only extreme anomalies would be detected — making the rule nearly useless for moderate-sized samples.\n\nThe 1.5 multiplier is not derived from theory — it's an empirical convention that works well in practice.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "In the mutual exclusivity proof, a student writes: \"$$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} > 1$$, therefore not mutually exclusive.\" The examiner awards 0 marks. What's missing? (2 steps)", "answer": "- Step 1: The student has *asserted* the inequality without *proving* it. A \"show that\" question requires you to demonstrate the result from first principles, not just state it. You must combine the fractions, simplify, and show *algebraically* that the sum exceeds 1 for all $$x > 0$$.\n- Step 2: The missing working: common denominator $$x(x+5)$$, combine to get $$\\frac{x^2+5x+25}{x^2+5x} = 1 + \\frac{25}{x^2+5x}$$, and then argue that since $$x > 0$$, the fraction $$\\frac{25}{x^2+5x} > 0$$, so the sum strictly exceeds 1. *Then* conclude: this contradicts the requirement $$P(C) + P(D) \\le 1$$ for mutual exclusivity.\n\n\"Show that\" = demonstrate each logical step. Assertion without proof earns nothing.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "A bag has 3 red and 2 blue marbles. Two are drawn without replacement. Set up the tree diagram probabilities for the first and second draws. (2 steps)", "answer": "- Step 1: First draw (5 total, 3R/2B): $$P(R_1) = \\frac{3}{5}$$, $$P(B_1) = \\frac{2}{5}$$.\n- Step 2: Second draw (4 total): After $$R_1$$ (2R, 2B): $$P(R_2 \\mid R_1) = \\frac{2}{4}$$, $$P(B_2 \\mid R_1) = \\frac{2}{4}$$. After $$B_1$$ (3R, 1B): $$P(R_2 \\mid B_1) = \\frac{3}{4}$$, $$P(B_2 \\mid B_1) = \\frac{1}{4}$$.\n\nNotice: the second-draw probabilities *depend on the first outcome*. This is the hallmark of without-replacement sampling — the denominator drops by 1 and the numerators shift depending on what was removed.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "For the simple bag in Q56 (3R, 2B, two draws without replacement), find $$P(\\text{same colour})$$ and $$P(\\text{different colours})$$. Verify they sum to 1. (3 steps)", "answer": "- Step 1: $$P(\\text{same}) = P(RR) + P(BB) = \\frac{3}{5} \\times \\frac{2}{4} + \\frac{2}{5} \\times \\frac{1}{4} = \\frac{6}{20} + \\frac{2}{20} = \\frac{8}{20} = \\frac{2}{5}$$.\n- Step 2: $$P(\\text{different}) = P(RB) + P(BR) = \\frac{3}{5} \\times \\frac{2}{4} + \\frac{2}{5} \\times \\frac{3}{4} = \\frac{6}{20} + \\frac{6}{20} = \\frac{12}{20} = \\frac{3}{5}$$.\n- Step 3: $$\\frac{2}{5} + \\frac{3}{5} = 1$$ ✓. This must always hold: \"same colour\" and \"different colours\" are complementary events when drawing exactly two marbles.\n\nNote: $$P(\\text{different}) = \\frac{3}{5} > P(\\text{same}) = \\frac{2}{5}$$ here because the bag is unbalanced (more red than blue), making it more likely to draw one of each.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "When a question says \"using standardisation, show that $$P(\\text{not outlier}) = 0.993$$,\" what specific working must you show to earn full marks? (2 steps)", "answer": "- Step 1: You must explicitly show the standardisation of *both* outlier limits: $$Z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} = 2.698$$ and $$Z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} = -2.698$$. Just stating the $$z$$-values without showing the substitution earns no method marks.\n- Step 2: Then show the probability calculation: $$P(-2.698 < Z < 2.698) = P(Z < 2.698) - P(Z < -2.698) = 0.9965 - 0.0035 = 0.9930$$. Reading the values from the table and showing the subtraction is essential.\n\n\"Using standardisation\" is an instruction to show the $$z$$-value computation — it's not optional decoration, it's the method the marks are attached to.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "In Q5(e), why is it important that $$P(N) = 0.993$$ comes from part (d) rather than being recomputed? What could go wrong if you recompute? (2 steps)", "answer": "- Step 1: Part (d) established $$P(\\text{not outlier}) = 0.993$$ as a given result. In part (e), you use this directly as the denominator of the conditional probability. Recomputing it introduces rounding discrepancies — if you use slightly different intermediate values, you might get 0.992 or 0.9931, which changes the final answer.\n- Step 2: The mark scheme expects you to use the value from (d). If you recompute and get a different value due to rounding, your final answer may not match the expected 0.103, and you lose accuracy marks. The principle: use previously established results as given, don't re-derive them with fresh rounding errors.\n\nExam discipline: carry forward exact values from earlier parts, or use the stated \"show that\" result directly.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Summarise the three skill blocks that this paper's redo flags cluster around, and give a one-sentence description of each. (3 steps)", "answer": "- Step 1: **Recomputing the sample space when it changes** — whenever items are transferred between containers (Q2) or the conditioning event restricts the range (Q5e), you must update denominators and intersect events with the new restricted space before computing probabilities.\n- Step 2: **Handling proofs and constraint checks rigorously** — mutual exclusivity proofs (Q4ii) require showing a necessary condition is violated; variance equations (Q3c) require checking quadratic roots against the valid probability range; every step must be written out.\n- Step 3: **Executing standard formula sequences cleanly** — linear interpolation (Q1e), standardisation (Q5d), and PMCC computation (Q6d) all require laying out intermediate steps ($$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$; cumulative frequency table; $$z$$-values) in labelled, separate lines rather than mashing ever
