ything into one expression.\n\nMastering these three blocks converts the paper from \"scary\" to \"procedural.\"", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}], "count": 60}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "On a histogram, the vertical axis is labelled \"frequency density\" and the horizontal axis shows class intervals. What quantity does the *area* of each bar represent, and why? (2 steps)", "answer": "- Step 1: Each bar has height = frequency density and width = class width. Area = height × width = frequency density × class width. By definition, frequency density = frequency / class width, so area = (frequency / class width) × class width = frequency.\n- Step 2: Therefore the area of each bar equals the **frequency** of that class. This is why histograms with unequal class widths use frequency density (not frequency) on the vertical axis — it ensures the visual area correctly represents how many data points lie in each interval.\n\nThe bar *height* alone only equals frequency when all class widths are identical; the *area* is the universal measure.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "A histogram shows five class intervals. Three classes have known frequencies (10, 16, 24) and the remaining two are blank. The total sample size is 100. What is the systematic approach to recover the missing frequencies, and what must you verify at the end? (3 steps)", "answer": "- Step 1: From the three known classes, read their bar heights (frequency densities) off the histogram. Since frequency density = frequency / class width, you can verify the scale is consistent and determine the frequency-density units on the vertical axis.\n- Step 2: For each missing class, read its bar height from the histogram, multiply by its class width to get frequency. For example, if a bar of the 18–25 class (width 7) has the same height as a bar giving frequency density 4, then frequency = 4 × 7 = 28.\n- Step 3: Verify that all five frequencies sum to the stated total (here 100). If they don't, re-read the histogram or re-check the scale. This is a non-negotiable sanity check before attempting any further calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "In a grouped frequency table, the class 14–18 contains 24 people assumed uniformly distributed. You need the number of people with values below 16. How do you estimate this, and what assumption are you making? (2 steps)", "answer": "- Step 1: The fraction of the class interval below 16 is $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$. Under uniform distribution within the class, the same fraction of the frequency applies: $$\\frac{1}{2} \\times 24 = 12$$ people.\n- Step 2: The assumption is **uniform distribution within each class** — we assume the 24 values are evenly spread across the interval 14–18. This is the fundamental assumption behind all linear interpolation in grouped data; it is an approximation because we have lost the individual data points.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "To estimate the mean of grouped data with frequencies $$f_i$$ and class intervals, what values do you substitute for each class and why? (2 steps)", "answer": "- Step 1: You use the **class midpoint** $$\\bar{t}_i = \\frac{\\text{lower bound} + \\text{upper bound}}{2}$$ for each class. For example, the class 5–10 has midpoint $$\\frac{5+10}{2} = 7.5$$; the class 18–25 has midpoint $$\\frac{18+25}{2} = 21.5$$.\n- Step 2: The mean is then $$\\bar{t} = \\frac{\\sum f_i \\bar{t}_i}{\\sum f_i} = \\frac{\\sum f t}{n}$$. We use midpoints because, having lost the individual data, the midpoint is the best single representative of where the values in that class cluster — under the uniform-distribution assumption, the midpoint is exactly the class mean.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Given $$\\sum ft^2$$, $$n$$, and $$\\bar{t}$$, write the formula for the estimated standard deviation. What is the common mistake in the final step? (2 steps)", "answer": "- Step 1: The variance is estimated by $$\\sigma^2 = \\frac{\\sum f t^2}{n} - \\bar{t}^{\\,2}$$. The standard deviation is the square root: $$\\sigma = \\sqrt{\\frac{\\sum f t^2}{n} - \\bar{t}^{\\,2}}$$.\n- Step 2: The common mistake is giving the **variance** $$\\sigma^2$$ as the final answer instead of taking the square root to report the **standard deviation** $$\\sigma$$. The question asks for standard deviation — always check whether you need $$\\sigma$$ or $$\\sigma^2$$ before boxing.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "For grouped data with $$n = 100$$, the position of the lower quartile $$Q_1$$ is at the 25th value. Should you use $$\\frac{n}{4} = 25$$ or $$\\frac{n+1}{4} = 25.25$$, and why? (2 steps)", "answer": "- Step 1: For **grouped (continuous) data**, use $$\\frac{n}{4}$$. Here that gives position 25. The $$\\frac{n+1}{4}$$ rule applies to **discrete ranked data** where you are picking out an actual data point and need a convention for the \"in-between\" position.\n- Step 2: Grouped data has already been approximated into intervals with a uniform-distribution assumption. There is no individual 25th or 26th value to interpolate *between* — you simply find which class contains the cumulative count of 25 and use linear interpolation within that class. The extra $$+1$$ would introduce a spurious offset.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "State the linear interpolation formula for finding a quartile in grouped data, identifying each symbol. (3 steps)", "answer": "- Step 1: The formula is $$Q = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, where $$k = 1$$ for $$Q_1$$ and $$k = 3$$ for $$Q_3$$.\n- Step 2: The symbols are: $$L$$ = lower boundary of the class containing the quartile; $$F_{\\text{before}}$$ = cumulative frequency of all classes *before* this class; $$f_{\\text{class}}$$ = frequency of this class (not the cumulative!); $$w$$ = class width.\n- Step 3: The logic: $$\\frac{kn}{4} - F_{\\text{before}}$$ counts how many values into this class you must go; dividing by $$f_{\\text{class}}$$ gives the fraction of the class; multiplying by $$w$$ converts that fraction into a distance along the measurement scale; adding $$L$$ offsets from the class start.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "With cumulative frequencies 10, 26, 50, … and $$n = 100$$, the lower quartile position is 25. How do you identify which class contains $$Q_1$$, and what is the key pitfall? (2 steps)", "answer": "- Step 1: Scan the cumulative frequencies: after the class 5–10 we have 10 (too small); after 10–14 we have 26 (now ≥ 25). So the 25th value lies **inside** the class 10–14. Here $$L = 10$$, $$F_{\\text{before}} = 10$$, $$f_{\\text{class}} = 16$$, $$w = 4$$.\n- Step 2: The key pitfall is using the **cumulative frequency** (26) in the denominator instead of the **class frequency** (16). The interpolation asks \"how far through *this class's* 16 values do we go?\" — the 26 includes previous classes and would give the wrong fraction.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A question gives you $$Q_3 = 23$$ directly and asks you to find the IQR. You must compute $$Q_1$$ yourself. Why would an examiner hand you $$Q_3$$ instead of making you interpolate it? (2 steps)", "answer": "- Step 1: The class containing $$Q_3$$ (position 75) is 18–25, which has width 7 and a large frequency. Interpolating inside it would require carrying more decimal precision and the arithmetic is messier. The examiner is being kind — or focusing the mark on your ability to do $$Q_1$$ correctly.\n- Step 2: The lesson: always read the question carefully. If a value is given, use it directly — do not re-derive it. The marks are in the $$Q_1$$ interpolation and the subtraction $$\\text{IQR} = Q_3 - Q_1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Two bags: X has 5 green and 4 blue marbles; Y has 6 green and 5 blue. One marble is drawn from X and placed in Y. A second marble is drawn from X. How many marbles are in X for the second draw, and why? (2 steps)", "answer": "- Step 1: X started with 9 marbles. After the first draw, one marble is removed and transferred to Y. X now has 8 marbles.\n- Step 2: The composition of those 8 depends on what was removed. If a green was removed first, X now has 4G and 4B. If a blue was removed first, X now has 5G and 3B. The key principle: **sampling without replacement changes both the total count and the composition** for subsequent draws.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "In the marbles problem, after two marbles are transferred from X to Y, a third marble is drawn from Y. How many marbles does Y contain at this point, and what is the common mistake? (2 steps)", "answer": "- Step 1: Y starts with 11 marbles (6G + 5B). Two marbles are transferred *in* from X. Y now has **13** marbles for the third draw.\n- Step 2: The common mistake is treating Y as still having 11 marbles — forgetting that the two transferred marbles *enter* Y and increase its total. Both the numerator (count of the desired colour) and the denominator (total in Y) change depending on which two marbles were transferred.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "After two green marbles are transferred from X to Y, what is $$P(G_3)$$ — the probability the third draw (from Y) is green? After two blue marbles? After one of each? (3 steps)", "answer": "- Step 1: After GG transferred: Y has $$6 + 2 = 8$$ green and 5 blue, total 13. So $$P(G_3 \\mid \\text{GG in}) = \\frac{8}{13}$$.\n- Step 2: After BB transferred: Y has 6 green and $$5 + 2 = 7$$ blue, total 13. So $$P(G_3 \\mid \\text{BB in}) = \\frac{6}{13}$$.\n- Step 3: After GB or BG transferred: Y has 7 green and 6 blue, total 13. So $$P(G_3 \\mid \\text{mixed in}) = \\frac{7}{13}$$. The crucial insight: $$P(G_3)$$ is **path-dependent** — you cannot use a single value across all branches of the tree.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "To find the probability that the two marbles drawn from X are of different colours, which paths on the tree diagram contribute, and how do you combine them? (2 steps)", "answer": "- Step 1: The two paths are: (i) Green first, then Blue — $$P(G_1) \\times P(B_2 \\mid G_1) = \\frac{5}{9} \\times \\frac{4}{8}$$; (ii) Blue first, then Green — $$P(B_1) \\times P(G_2 \\mid B_1) = \\frac{4}{9} \\times \\frac{5}{8}$$.\n- Step 2: Since these are mutually exclusive paths (the first draw cannot be both G and B), add them: $$P(\\text{diff}) = \\frac{5}{9} \\cdot \\frac{4}{8} + \\frac{4}{9} \\cdot \\frac{5}{8} = \\frac{20}{72} + \\frac{20}{72} = \\frac{40}{72} = \\frac{5}{9}!181510934275671569Z2201l784063171/1.166958070899295496158069902116191,9533 Association1917509这个07991Clinical3519联Thus389\"812082)\n0bf083956193901318857015 @\"\";\n73811,6\n`121e0 |7937949607033 letters1.0871;623703469371c7169762 An1&0391l9),0.271,1396 of8453e0.56309410,565723 logistic2 2171213181Answer380330#2936973487696501711!031,312\n8639975Since90327Sheet301230371917691ehandlehandle29842Up52-Phandle0419 and1996", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}], "count": 13}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "On a histogram, the vertical axis is labelled \"frequency density\". If a class spans from 10 to 14 and the bar has height 4, what is the frequency for that class — and why is it the *area* and not the *height* that gives frequency? (2 steps)", "answer": "- Step 1: Frequency = frequency density × class width = $$4 \\times (14 - 10) = 4 \\times 4 = 16$$. The height alone (4) is not the frequency because classes have different widths — a tall narrow bar can represent fewer people than a short wide bar.\n- Step 2: The fundamental reason is that histograms encode total count as area. If every bar had the same width, height would suffice — but when widths vary, only area preserves the correct proportion. This is why you must never read the y-axis value directly as the count.\n\nTakeaway: Area = frequency; height = frequency density = frequency ÷ width.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A histogram has five classes. Three class frequencies are given (10, 16, 24) and the total sample size is 100. What must you do before attempting *any* calculation, and what is the conceptual reason you cannot skip this step? (2 steps)", "answer": "- Step 1: You must reconstruct the two missing frequencies first, using the frequency-density scale established by the three known bars. Read their heights off the histogram, compute frequency density, then use that same scale to find the areas (frequencies) of the remaining bars.\n- Step 2: The reason is that every subsequent question — cumulative frequency, mean, standard deviation, quartiles — depends on the complete frequency table. Without the missing values, the cumulative-frequency table is incomplete and you cannot locate quartile classes, compute $$\\sum ft$$, or do interpolation. The entire question chain breaks.\n\nTakeaway: Always verify frequencies sum to $$n$$ before touching any other part.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "To estimate how many observations fall below 16 in grouped data, where 16 is inside the class 14–18 (frequency 24), what assumption does linear interpolation make, and how do you compute the partial frequency? (2 steps)", "answer": "- Step 1: Linear interpolation assumes observations are *uniformly distributed* within each class — the 24 people are spread evenly across the 4-minute interval from 14 to 18.\n- Step 2: The fraction of the class below 16 is $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$. So the partial frequency is $$\\frac{1}{2} \\times 24 = 12$$. Add this to all frequencies from earlier classes to get the cumulative total below 16.\n\nTakeaway: Uniform spread within a class → partial frequency = (width fraction) × (class frequency).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "When estimating the mean from grouped data, why must you use class *midpoints* rather than class *boundaries*, and what is the midpoint of the class 18–25? (2 steps)", "answer": "- Step 1: The midpoint represents the \"typical\" value for every observation in that class — it is the best single estimate for each data point whose exact value is lost. Using a boundary (like 18 or 25) would systematically under- or over-estimate the contribution of that class.\n- Step 2: Midpoint of 18–25 is $$\\frac{18 + 25}{2} = 21.5$$. Then the mean is $$\\bar{t} = \\frac{\\sum f \\cdot t_{\\text{mid}}}{n}$$. Each class contribution is its frequency × its midpoint.\n\nTakeaway: Midpoint = (lower + upper) / 2; always use midpoints for grouped-data means.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "The formula for standard deviation from grouped data is $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$. If a question gives you $$\\sum ft^2$$ directly, what two numbers do you need to plug in, and what is a common mistake in the final step? (2 steps)", "answer": "- Step 1: You need $$\\frac{\\sum ft^2}{n}$$ (the mean of the squared midpoints) and $$\\bar{t}^{\\,2}$$ (the square of the mean). Subtract the latter from the former to get the variance, then square-root to get $$\\sigma$$.\n- Step 2: The common mistake is giving the *variance* $$\\sigma^2$$ as the final answer instead of the *standard deviation* $$\\sigma$$. The question asks for standard deviation, so you must take the square root. Another pitfall is using $$\\bar{t}$$ instead of $$\\bar{t}^{\\,2}$$ in the subtraction.\n\nTakeaway: Variance is the intermediate; standard deviation is the final answer — don't forget the square root.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "For grouped data with $$n = 100$$, the position of $$Q_1$$ uses $$\\frac{n}{4} = 25$$. Why is this different from the discrete-data rule $$\\frac{n+1}{4}$$, and what goes wrong if you use the wrong one? (3 steps)", "answer": "- Step 1: Grouped (continuous) data treats the variable as continuous — there are no \"gaps\" between values, so the 25th value (not the 25.25th position) is the correct target. The $$\\frac{n+1}{4}$$ rule adjusts for the fact that discrete data points occupy specific integer positions.\n- Step 2: If you use $$\\frac{n+1}{4} = 25.25$$, you would interpolate slightly further into the class, giving a $$Q_1$$ that is marginally too large. For $$n = 100$$ the error is small, but the mark scheme awards the mark only for $$\\frac{n}{4}$$.\n- Step 3: The practical consequence: using 25.25 instead of 25 shifts which cumulative-frequency boundary you cross, potentially placing you in the wrong class entirely for small samples.\n\nTakeaway: Grouped/continuous data → $$\\frac{n}{4}$$; discrete data → $$\\frac{n+1}{4}$$. Never mix them.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "State the linear interpolation formula for a quartile in grouped data, identifying each symbol. Then explain why the denominator is the *class frequency* and not the *cumulative frequency*. (3 steps)", "answer": "- Step 1: $$Q = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, where $$L$$ = lower class boundary, $$k$$ = 1 for $$Q_1$$ or 3 for $$Q_3$$, $$F_{\\text{before}}$$ = cumulative frequency below this class, $$f_{\\text{class}}$$ = frequency of this class, and $$w$$ = class width.\n- Step 2: The denominator is $$f_{\\text{class}}$$ because you are interpolating *within* this one class. The 24 people (say) in this class are spread uniformly across the width $$w$$. You need to know how far through these 24 people the target position lies.\n- Step 3: Using cumulative frequency in the denominator would incorrectly distribute the target position across *all* observations from the start, not just within the class. The fraction $$\\frac{\\frac{n}{4} - F_{\\text{before}}}{f_{\\text{class}}}$$ measures \"how far through *this class* the quartile falls\" — it must be a proportion of the class frequency.\n\nTakeaway: Numerator = how far into the class; denominator = class frequency (not cumulative); multiply by width to convert to the data scale.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A cumulative-frequency table shows class 5–10 has cumulative frequency 10 and class 10–14 has cumulative frequency 26. The target position for $$Q_1$$ is 25. Which class contains $$Q_1$$, and what is the key reasoning? (2 steps)", "answer": "- Step 1: The 25th observation falls in the class 10–14. Reason: the cumulative frequency reaches 10 at the end of the 5–10 class, then jumps to 26 at the end of the 10–14 class. Since $$10 < 25 \\le 26$$, the 25th value is inside 10–14.\n- Step 2: A common error is to see \"25 is close to 26\" and assume it's near the top of the class, or to mistakenly think 25 falls in 5–10 because 25 > 10. The correct logic: find the first class whose cumulative frequency *meets or exceeds* the target position.\n\nTakeaway: Locate the quartile class by finding where the cumulative frequency first reaches or exceeds the target position.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A question gives you $$Q_3 = 23$$ directly and asks you to find the IQR. What is the strategic reason examiners might hand you one quartile instead of making you compute both? (2 steps)", "answer": "- Step 1: The class containing $$Q_3$$ may have awkward boundaries or a large width (e.g., 18–25), making interpolation error-prone. By giving you $$Q_3$$, the examiner ensures you don't lose marks on a messy calculation and can focus on the $$Q_1$$ interpolation and the IQR subtraction.\n- Step 2: This is also a time-saving device — the examiner wants to test whether you can *use* the IQR formula $$Q_3 - Q_1$$ and apply outlier fences, not whether you can slog through a wide-class interpolation. Accept the gift and move on.\n\nTakeaway: If a quartile is given, use it directly — don't recompute it. The examiner is channelling you.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Two marbles are drawn without replacement from bag X (9 marbles: 5G, 4B). After the first draw, how do the probabilities for the second draw change, and why? (2 steps)", "answer": "- Step 1: After drawing one marble, bag X has 8 marbles left. The composition depends on what was removed. If a green was drawn first, the bag now has 4G and 4B, so $$P(G_2 \\mid G_1) = \\frac{4}{8}$$ and $$P(B_2 \\mid G_1) = \\frac{4}{8}$$. If a blue was drawn first, it has 5G and 3B, so $$P(G_2 \\mid B_1) = \\frac{5}{8}$$ and $$P(B_2 \\mid B_1) = \\frac{3}{8}$$.\n- Step 2: Both the numerator (count of the desired colour) and the denominator (total marbles) change. \"Without replacement\" means the sample space shrinks and the composition shifts — you cannot reuse the original $$\\frac{5}{9}$$ or $$\\frac{4}{9}$$.\n\nTakeaway: Without replacement → recompute both numerator and denominator for every subsequent draw.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Bag Y starts with 11 marbles (6G, 5B). Two marbles are transferred in from bag X. How many marbles does bag Y contain for the third draw, and why is this a common error point? (2 steps)", "answer": "- Step 1: Bag Y now has $$11 + 2 = 13$$ marbles. The two transferred marbles are *added to* the original contents; they do not replace anything.\n- Step 2: The common error is to use 11 — treating the third draw as if no marbles were added. This happens when you focus on the selection mechanism (drawing from Y) and forget the transfer step that precedes it. Every branch of the tree has denominator 13 for the third draw.\n\nTakeaway: After transfer, the receiving bag's total increases by the number transferred. Always write the new total next to each branch.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In the marble-transfer problem, the probability $$P(G_3)$$ — drawing green from bag Y on the third draw — takes different values depending on which branch of the tree you are on. Why can't you use a single value of $$P(G_3)$$? (2 steps)", "answer": "- Step 1: The composition of bag Y after the transfer depends on *which* two marbles were moved. If two greens were transferred, Y has 8G and 5B, so $$P(G_3) = \\frac{8}{13}$$. If one green and one blue were transferred, Y has 7G and 6B, so $$P(G_3) = \\frac{7}{13}$$. If two blues, Y has 6G and 7B, so $$P(G_3) = \\frac{6}{13}$$.\n- Step 2: A single \"average\" $$P(G_3)$$ doesn't exist because the third draw's probability is *path-dependent*. You must follow each branch of the tree separately and compute the product of probabilities along that path, then sum over all paths that lead to the desired outcome.\n\nTakeaway: When items move between containers, every branch changes the receiving container's composition — track each branch individually.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "To find the probability that two marbles drawn from bag X are of *different* colours, what two paths contribute, and what is the conceptual structure? (2 steps)", "answer": "- Step 1: The two paths are: (i) Green first then Blue ($$G_1 B_2$$), and (ii) Blue first then Green ($$B_1 G_2$$). These are the only ways to get one of each colour.\n- Step 2: $$P(\\text{different}) = P(G_1)P(B_2 \\mid G_1) + P(B_1)P(G_2 \\mid B_1)$$. Each term is a product along one branch of the tree, and the two branches are mutually exclusive, so you add. Conceptually: \"either GB or BG\" = union of disjoint events.\n\nTakeaway: P(different colours) = P(GB) + P(BG) — two complementary orderings, each a product of conditional probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "To find the probability that all three marbles selected (two from X, one from Y) are the same colour, which branches of the tree contribute, and why do the \"mixed\" branches (GB or BG transferred) not contribute? (2 steps)", "answer": "- Step 1: Only the pure branches contribute: $$GG \\to G_3$$ (all green) and $$BB \\to B_3$$ (all blue). The mixed branches ($$GB$$ or $$BG$$ transferred) produce a bag Y with both colours present, so the third draw could be either colour — it cannot guarantee \"all same.\"\n- Step 2: For all three to be the same colour, the first two must already be the same (both G or both B), and then the third must match. If the first two are mixed, it's impossible for all three to be the same. So: $$P(\\text{same}) = P(G_1)P(G_2 \\mid G_1)P(G_3 \\mid GG) + P(B_1)P(B_2 \\mid B_1)P(B_3 \\mid BB)$$.\n\nTakeaway: \"All same colour\" forces the first two draws to be identical — mixed branches are automatically excluded.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When computing a conditional probability $$P(\\text{all green} \\mid \\text{all same colour})$$, the event \"all green\" is a subset of \"all same colour.\" How does this simplify the conditional probability formula? (2 steps)", "answer": "- Step 1: By definition, $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. When $$A \\subseteq B$$, every outcome in $$A$$ is already in $$B$$, so $$A \\cap B = A$$. The formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n- Step 2: Here, \"all green\" ⊂ \"all same colour\" (if all three are green, they are certainly all the same colour). So $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})}$$. No need to compute a separate intersection — the numerator is just the all-green probability from the tree.\n\nTakeaway: When the conditioned event is a subset, $$P(A \\mid B) = P(A)/P(B)$$ — the intersection collapses to $$A$$ itself.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "In a discrete random variable table where one probability is $$a$$ and another is $$0.6 - a$$, what constraint must $$a$$ satisfy, and what two conditions generate it? (2 steps)", "answer": "- Step 1: Every probability must lie in $$[0, 1]$$. From $$a \\geq 0$$ and $$0.6 - a \\geq 0$$, we get $$a \\leq 0.6$$. Combining: $$0 \\leq a \\leq 0.6$$.\n- Step 2: Note that the sum $$a + 0.4 + (0.6 - a) = 1$$ is automatically satisfied for any $$a$$ — the constraint does *not* come from the sum. It comes purely from the non-negativity requirement. This is why you must check the bounds explicitly; the sum alone doesn't catch invalid values.\n\nTakeaway: Probabilities summing to 1 is necessary but not sufficient — each individual probability must also be in $$[0, 1]$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "If $$E(X) = 3.6 - 2a$$ and $$0 \\leq a \\leq 0.6$$, how do you find the range of possible values for $$E(X)$$ without trial and error? (2 steps)", "answer": "- Step 1: Recognise that $$E(X) = 3.6 - 2a$$ is a *linear, decreasing* function of $$a$$. The maximum of $$E(X)$$ occurs at the minimum of $$a$$, and the minimum of $$E(X)$$ occurs at the maximum of $$a$$.\n- Step 2: At $$a = 0$$: $$E(X) = 3.6$$. At $$a = 0.6$$: $$E(X) = 3.6 - 1.2 = 2.4$$. So $$2.4 \\leq E(X) \\leq 3.6$$. No need to test intermediate values — a linear function on a closed interval achieves its extremes at the endpoints.\n\nTakeaway: For a linear expression in a parameter with known bounds, evaluate at both endpoints to get the range.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "What is the difference between $$E(X^2)$$ and $$[E(X)]^2$$, and why does confusing them destroy a variance calculation? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 P(X = x)$$ — you square each outcome first, then take the probability-weighted average. $$[E(X)]^2$$ is the square of the mean — a single number squared. These are almost never equal (only when $$X$$ is constant).\n- Step 2: The variance formula is $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. If you accidentally compute $$[E(X)]^2 - [E(X)]^2 = 0$$, or $$E(X^2) - E(X^2) = 0$$, you get zero variance — wrong. The two terms are fundamentally different quantities, and both must be computed separately from the table.\n\nTakeaway: $$E(X^2) \\neq [E(X)]^2$$. Always compute $$E(X^2) = \\sum x^2 P(X=x)$$ directly from the table, then subtract the *square* of the already-computed mean.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "When substituting into the variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ with $$E(X) = 3.6 - 2a$$, what is the safest way to handle the squared term to avoid sign errors? (3 steps)", "answer": "- Step 1: Write $$[E(X)]^2 = (3.6 - 2a)^2$$. Do NOT distribute the minus sign before squaring. Keep the bracket intact.\n- Step 2: Expand the bracket separately: $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$. This is a clean, sign-error-free expansion.\n- Step 3: Now substitute into the variance equation: $$0.56 = (13.2 - 12a) - (12.96 - 14.4a + 4a^2)$$. Distribute the minus: $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$. Every term inside the second bracket flips sign. Collecting: $$0.56 = 0.24 + 2.4a - 4a^2$$.\n\nTakeaway: Bracket → expand separately → then distribute the minus. Never try to distribute the minus and square simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "After solving a quadratic arising from a variance equation, you get two roots. Why must you always check both roots against the validity constraint, and what happens if you skip this? (2 steps)", "answer": "- Step 1: The constraint $$0 \\leq a \\leq 0.6$$ (from probabilities being in $$[0,1]$$) may eliminate one or both roots. A root outside this range would imply a negative probability or a probability exceeding 1, which is meaningless.\n- Step 2: Examiners frequently rig these questions so that one root falls outside the valid range. If you state both roots without checking, you lose the constraint-check mark even if both happen to be valid. The check is its own mark — always write \"both values satisfy $$0 \\leq a \\leq 0.6$$\" (or reject the invalid one with a reason).\n\nTakeaway: Solving the quadratic is not the end — the constraint check is a separate, mark-bearing step.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "In a Venn diagram with two events $$A$$ and $$B$$, the four regions are labelled $$p = P(A \\cap B')$$, $$q = P(A \\cap B)$$, $$r = P(A' \\cap B)$$, $$s = P(A' \\cap B')$$. Express $$P(A)$$, $$P(B)$$, and the \"symmetric difference\" $$(A \\cap B') \\cup (A' \\cap B)$$ in terms of these. (2 steps)", "answer": "- Step 1: $$P(A) = p + q$$ (both the \"A only\" and \"A and B\" regions). $$P(B) = q + r$$ (both the \"B only\" and \"A and B\" regions). These follow directly from the partition of each event into its two disjoint components.\n- Step 2: The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ consists of the regions that are in exactly one of the two sets — the \"A only\" and \"B only\" parts. So $$P(A \\triangle B) = p + r$$. This is NOT the same as $$P(A \\cup B) = p + q + r$$, which also includes the intersection.\n\nTakeaway: Symmetric difference = \"in one but not both\" = $$p + r$$. Union = \"in at least one\" = $$p + q + r$$. Don't confuse them.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "Given $$P(A) = \\frac{7}{25}$$, $$P(B) = \\frac{1}{5}$$, and $$P(A \\triangle B) = \\frac{8}{25}$$, translate these into equations in $$p, q, r$$ and show how adding all three equations gives $$2p + 2q + 2r = \\frac{4}{5}$$. (3 steps)", "answer": "- Step 1: Translate: $$p + q = \\frac{7}{25}$$, $$q + r = \\frac{5}{25}$$, $$p + r = \\frac{8}{25}$$. Each equation captures one of the given probabilities in terms of the Venn regions.\n- Step 2: Add all three: $$(p + q) + (q + r) + (p + r) = 2p + 2q + 2r = \\frac{7 + 5 + 8}{25} = \\frac{20}{25} = \\frac{4}{5}$$.\n- Step 3: The key insight is that each variable appears exactly twice across the three equations (once in each of two equations). Adding them doubles everything, which is why you get $$2p + 2q + 2r$$, not $$p + q + r$$. Dividing by 2 gives $$p + q + r = \\frac{2}{5}$$, and then $$s = 1 - \\frac{2}{5} = \\frac{3}{5}$$.\n\nTakeaway: Add all three region equations → the sum of all interior regions appears doubled. This is the systematic route to finding each region.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "Once you know $$p + q + r = \\frac{2}{5}$$ and $$p + q = \\frac{7}{25}$$, how do you extract $$q$$ (the intersection probability)? (2 steps)", "answer": "- Step 1: Note that $$P(A) + P(B) = (p + q) + (q + r) = (p + q + r) + q$$. The sum of the two event probabilities equals the sum of all three interior regions plus the intersection (which gets counted twice).\n- Step 2: So $$q = P(A) + P(B) - (p + q + r) = \\frac{7}{25} + \\frac{5}{25} - \\frac{10}{25} = \\frac{2}{25}$$. Then $$p = \\frac{7}{25} - \\frac{2}{25} = \\frac{5}{25}$$ and $$r = \\frac{5}{25} - \\frac{2}{25} = \\frac{3}{25}$$. This is the inclusion-exclusion principle in disguise.\n\nTakeaway: $$P(A \\cap B) = P(A) + P(B) - P(A \\cup B)$$, and $$P(A \\cup B) = p + q + r$$ when the four regions are exhaustive.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Two events $$C$$ and $$D$$ satisfy $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ for positive constant $$x$$. What necessary condition does mutual exclusivity impose on $$P(C) + P(D)$$, and why? (2 steps)", "answer": "- Step 1: If $$C$$ and $$D$$ are mutually exclusive, then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$. But any probability satisfies $$P(C \\cup D) \\leq 1$$, so mutual exclusivity *forces* $$P(C) + P(D) \\leq 1$$.\n- Step 2: This is the contradiction lever. If you can show $$P(C) + P(D) > 1$$ for all valid $$x$$, then mutual exclusivity is impossible — the necessary condition is violated. You don't need to compute $$P(C \\cap D)$$ directly; just show the sum exceeds 1.\n\nTakeaway: Mutual exclusivity ⇒ $$P(C) + P(D) \\leq 1$$. Violating this inequality disproves mutual exclusivity by contradiction.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "When combining $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ into a single fraction, the result is $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$. How can you algebraically restructure this to make the inequality $$> 1$$ obvious without solving a quadratic inequality? (3 steps)", "answer": "- Step 1: Observe that the numerator $$x^2 + 5x + 25$$ equals the denominator $$x^2 + 5x$$ plus 25. So $$\\frac{x^2 + 5x + 25}{x^2 + 5x} = \\frac{(x^2 + 5x) + 25}{x^2 + 5x}$$.\n- Step 2: Split the fraction: $$= \\frac{x^2 + 5x}{x^2 + 5x} + \\frac{25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: both $$x^2 > 0$$ and $$5x > 0$$, so $$x^2 + 5x > 0$$, hence $$\\frac{25}{x^2 + 5x} > 0$$. Therefore $$P(C) + P(D) = 1 + \\text{(something positive)} > 1$$. This contradicts the mutual-exclusivity requirement, so $$C$$ and $$D$$ cannot be mutually exclusive. $$\\blacksquare$$\n\nTakeaway: Restructure $$\\frac{N+25}{N} = 1 + \\frac{25}{N}$$ — the excess over 1 becomes visually obvious. No quadratic inequality needed.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "Why can't you prove mutual exclusivity by simply computing $$P(C \\cap D)$$ from the given information in Q4(ii)? What information is missing? (2 steps)", "answer": "- Step 1: The question gives only $$P(C)$$ and $$P(D)$$ individually. To compute $$P(C \\cap D)$$, you would need either $$P(C \\cup D)$$ (for inclusion-exclusion) or an independence assumption (for $$P(C \\cap D) = P(C)P(D)$$). Neither is provided.\n- Step 2: This is exactly why the proof-by-contradiction approach is necessary. Instead of trying to find $$P(C \\cap D)$$ directly, you show that the *necessary condition* for mutual exclusivity ($$P(C) + P(D) \\leq 1$$) is violated. The proof works entirely from what is given.\n\nTakeaway: When you can't compute the intersection, use the necessary-condition route: mutual exclusivity ⇒ sum ≤ 1. Violate it ⇒ done.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "To standardise a normal variable $$L \\sim N(\\mu, \\sigma^2)$$, what transformation do you apply, and what does the resulting $$Z$$ represent? (2 steps)", "answer": "- Step 1: $$Z = \\frac{L - \\mu}{\\sigma}$$. Subtract the mean (centring) and divide by the standard deviation (scaling). The result is the number of standard deviations that $$L$$ sits above or below the mean.\n- Step 2: $$Z \\sim N(0, 1)$$ — the standard normal distribution with mean 0 and variance 1. You can then look up $$\\Phi(z) = P(Z < z)$$ in tables. A negative $$z$$ means the value is below the mean; use symmetry: $$P(Z < -z) = 1 - P(Z < z)$$.\n\nTakeaway: Standardisation converts any normal to $$N(0,1)$$; then use the table. $$Z$$ measures \"how many sigmas away from the mean.\"", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "What $$z$$-value corresponds to the upper quartile $$Q_3$$ of the standard normal, and why must you memorise it rather than look it up in a standard table? (2 steps)", "answer": "- Step 1: $$z = 0.6745$$. This is the value such that $$P(Z < 0.6745) = 0.75$$. By symmetry, $$Q_1$$ corresponds to $$z = -0.6745$$.\n- Step 2: Standard normal tables in exams typically list $$\\Phi(z)$$ for values like 0.67 and 0.68, but not the precise 0.6745. You are expected to know this value for quartile questions. Using 0.67 instead introduces a rounding error that propagates through subsequent calculations (outlier fences, conditional probabilities).\n\nTakeaway: Memorise $$z_{Q_3} = 0.6745$$. Using 0.67 is a common pitfall that costs accuracy marks.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Given $$L \\sim N(4.5, 0.4^2)$$ and $$z_{Q_3} = 0.6745$$, show how to find $$Q_3$$ by reversing the standardisation. What is the general formula? (2 steps)", "answer": "- Step 1: From $$Z = \\frac{L - \\mu}{\\sigma}$$, rearrange: $$L = \\mu + Z\\sigma$$. For the upper quartile, substitute $$Z = 0.6745$$: $$Q_3 = 4.5 + 0.6745 \\times 0.4 = 4.5 + 0.2698 = 4.77$$ (2 d.p.).\n- Step 2: The general pattern: any quantile of $$X \\sim N(\\mu, \\sigma^2)$$ is found by $$\\text{quantile} = \\mu + z_{\\text{quantile}} \\times \\sigma$$. You look up (or memorise) the $$z$$-value for the desired probability, then un-standardise. For $$Q_1$$, use $$z = -0.6745$$: $$Q_1 = 4.5 - 0.2698 = 4.23$$.\n\nTakeaway: Quantile = $$\\mu + z \\cdot \\sigma$$. The $$z$$-value encodes the probability; the un-standardisation restores the original scale.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "The outlier limits are defined as $$Q_3 + 1.5 \\times \\text{IQR}$$ (upper) and $$Q_1 - 1.5 \\times \\text{IQR}$$ (lower). What is the IQR, and why is the multiplier 1.5 significant? (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1$$. In this problem, $$\\text{IQR} = 4.77 - 4.23 = 0.54$$ (approximately). The upper fence is $$4.77 + 1.5 \\times 0.54 \\approx 5.58$$ and the lower fence is $$4.23 - 1.5 \\times 0.54 \\approx 3.42$$.\n- Step 2: The multiplier 1.5 is a convention (Tukey's fences) chosen so that, for a normal distribution, approximately 99.3% of data falls within the fences. Values beyond the fences are flagged as potential outliers — they are unusual enough to warrant investigation, though not automatically errors.\n\nTakeaway: Fences = $$Q_1 - 1.5 \\cdot \\text{IQR}$$ and $$Q_3 + 1.5 \\cdot \\text{IQR}$$. The 1.5 multiplier is a convention, not a theorem.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "To show that $$P(\\text{not outlier}) = 0.993$$ for $$L \\sim N(4.5, 0.4^2)$$, you standardise both fence values. What is the key symmetry observation that simplifies the calculation? (2 steps)", "answer": "- Step 1: The fence values are equidistant from the mean: upper fence = $$4.5 + 2.698\\sigma$$, lower fence = $$4.5 - 2.698\\sigma$$. Standardising gives $$z_{\\text{upper}} = +2.698$$ and $$z_{\\text{lower}} = -2.698$$.\n- Step 2: By symmetry of the normal, $$P(-2.698 < Z < 2.698) = P(Z < 2.698) - P(Z < -2.698) = \\Phi(2.698) - [1 - \\Phi(2.698)] = 2\\Phi(2.698) - 1$$. Looking up $$\\Phi(2.70) \\approx 0.9965$$: $$P = 2(0.9965) - 1 = 0.993$$. The symmetry halves the work — you only need one table lookup.\n\nTakeaway: Symmetric fences about the mean → $$P(\\text{inside}) = 2\\Phi(z) - 1$$. One lookup, not two.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "A question asks you to \"use standardisation\" to show a probability. What must you explicitly write to earn full marks on a \"show that\" question? (2 steps)", "answer": "- Step 1: You must write out the standardisation: $$Z = \\frac{\\text{value} - \\mu}{\\sigma}$$ with numbers substituted, producing an explicit $$z$$-value. Then state the table value $$\\Phi(z)$$ you look up.\n- Step 2: You must show the arithmetic connecting the $$z$$-value to the final probability. Simply writing the answer 0.993 without the intermediate $$z$$-values loses marks. \"Show that\" questions reward the *method*, not just the result.\n\nTakeaway: \"Show that\" = show every step. Write the $$z$$-values, state the table lookups, show the subtraction.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "For $$P(L > 5 \\mid \\text{not outlier})$$, the conditioning event \"not outlier\" means $$3.42 < L < 5.58$$. Why must the numerator be $$P(5 < L < 5.58)$$ and NOT just $$P(L > 5)$$? (3 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Here, $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$.\n- Step 2: The intersection $$A \\cap B = \\{L > 5\\} \\cap \\{3.42 < L < 5.58\\} = \\{5 < L < 5.58\\}$$. The upper bound of 5.58 comes from the conditioning event — values above 5.58 are outliers and are excluded from the restricted sample space.\n- Step 3: Using $$P(L > 5)$$ in the numerator would include values above 5.58 (outliers), which are impossible given that we know the fly is not an outlier. This overcounts the numerator and gives an answer that is too large (0.106 instead of 0.103). The single most common conditional-normal mistake.\n\nTakeaway: Always intersect the event with the conditioning band before standardising. The conditioning event *caps* the range.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "In Q5(e), you compute $$P(5 < L < 5.58)$$ by standardising both boundaries. Why is this a *direct* normal probability calculation and not an *inverse* normal problem? (2 steps)", "answer": "- Step 1: An inverse normal problem gives you a probability and asks for the corresponding value of the variable (e.g., \"find $$x$$ such that $$P(L < x) = 0.75$$\"). Here, you are given both boundaries (5 and 5.58) and asked for the probability between them — that's a *direct* (forward) calculation.\n- Step 2: The confusion arises because the boundaries came from earlier parts involving quartiles (which did use inverse normal). But once the boundaries are known, computing $$P(5 < L < 5.58)$$ is a straightforward standardise-and-lookup job: $$Z_{\\text{lower}} = \\frac{5 - 4.5}{0.4} = 1.25$$, $$Z_{\\text{upper}} = 2.70$$, then $$\\Phi(2.70) - \\Phi(1.25)$$.\n\nTakeaway: \"Given boundaries, find probability\" = direct normal. \"Given probability, find boundary\" = inverse normal. Don't mix the frameworks.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "The gradient of the regression line $$y = 151.2 + 2.72x$$ is 2.72. What three elements must a correct interpretation include? (2 steps)", "answer": "- Step 1: The interpretation is: \"For every 1 °C increase in temperature, the maximum weight of sugar that dissolves in 100 g of water increases by approximately 2.72 grams, on average.\"\n- Step 2: The three required elements are: (i) the **units** — \"grams\" per \"°C\", not just \"2.72\"; (ii) the phrase **\"on average\"** or \"approximately\" — the regression line predicts mean response, not individual outcomes; (iii) the **direction** — \"increases\" (positive gradient), stated explicitly. Omitting any of these loses the mark.\n\nTakeaway: Gradient interpretation = numerical value + units of y per unit of x + \"on average.\"", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "The regression line was calculated from data where $$10 \\leq x \\leq 80$$. You use it to estimate $$y$$ at $$x = 90$$. Why is this unreliable, even if $$r = 0.988$$? (2 steps)", "answer": "- Step 1: $$x = 90$$ is *outside the range of the data* — this is **extrapolation**. The linear relationship established within $$[10, 80]$$ may not hold beyond 80 °C. Sugar solubility could plateau, accelerate, or change behaviour entirely at higher temperatures.\n- Step 2: A high PMCC ($$r = 0.988$$) only confirms linearity *within the observed range*. It says nothing about what happens outside that range. Correlation does not license extrapolation — the model has no data to support it beyond $$x = 80$$.\n\nTakeaway: High $$r$$ ≠ reliable extrapolation. Extrapolation is unreliable because the model is untested outside the data range.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "Given the regression line $$y = a + bx$$, how can you recover $$\\bar{x}$$ and $$\\bar{y}$$ if you know $$n$$, $$\\sum y$$, and the regression coefficients? (2 steps)", "answer": "- Step 1: $$\\bar{y} = \\frac{\\sum y}{n}$$. This gives you the mean of $$y$$ directly from the summary statistics.\n- Step 2: The regression line of $$y$$ on $$x$$ always passes through the point $$(\\bar{x}, \\bar{y})$$. So $$\\bar{y} = a + b\\bar{x}$$, which rearranges to $$\\bar{x} = \\frac{\\bar{y} - a}{b}$$. Once you have $$\\bar{x}$$, you can find $$\\sum x = n\\bar{x}$$.\n\nTakeaway: The regression line always passes through $$(\\bar{x}, \\bar{y})$$. This is a recovery tool for missing summary statistics.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Define $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ in terms of summation notation. What is the conceptual meaning of each? (3 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$. This measures the total squared deviation of the $$x$$-values from their mean (it equals $$n \\cdot \\text{Var}(x)$$). Large $$S_{xx}$$ means the $$x$$-values are spread out.\n- Step 2: $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$. Same idea for $$y$$ — total squared deviation of $$y$$-values from their mean.\n- Step 3: $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$. This measures the *co-variation* of $$x$$ and $$y$$ — how much they vary together. Positive $$S_{xy}$$ means when $$x$$ is above its mean, $$y$$ tends to be above its mean too. It is the numerator of both the PMCC and the regression gradient.\n\nTakeaway: $$S_{xx}$$ and $$S_{yy}$$ are spread measures; $$S_{xy}$$ is a co-spread measure. Together they define correlation and regression.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "The regression gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$. If you know $$b$$ and $$S_{xx}$$, how can you recover $$S_{xy}$$, and why is this useful? (2 steps)", "answer": "- Step 1: Rearranging: $$S_{xy} = b \\times S_{xx}$$. If the gradient is 2.72 and $$S_{xx} = 5300$$, then $$S_{xy} = 2.72 \\times 5300 = 14416$$.\n- Step 2: This is useful when $$\\sum xy$$ is not directly given (e.g., cropped from a screenshot). You can compute $$S_{xx}$$ from $$\\sum x^2$$ and $$\\sum x$$, then multiply by $$b$$ to get $$S_{xy}$$, then use it in the PMCC formula. The regression line itself becomes a data-recovery tool.\n\nTakeaway: $$S_{xy} = b \\cdot S_{xx}$$ — the gradient is a bridge between regression and correlation.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "The PMCC formula is $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Why should you compute $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ as three separate, labelled lines rather than one combined expression? (2 steps)", "answer": "- Step 1: Computing them separately lets you (i) check each for reasonableness (all should be positive for positive correlation), (ii) catch arithmetic errors early, and (iii) earn method marks even if the final number is wrong. A single mashed expression hides mistakes.\n- Step 2: Precision matters. Rounding intermediate values in a single long expression compounds errors. By computing each $$S$$-value to full precision and then combining, you preserve accuracy. The difference between $$r = 0.985$$ and $$r = 0.988$$ can be entirely a rounding artefact from premature simplification.\n\nTakeaway: Three labelled lines → combine at the end. Never compute $$r$$ in one step from raw sums.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "When discussing the suitability of a linear regression model, what two pieces of evidence must you cite, and why is citing only one insufficient? (2 steps)", "answer": "- Step 1: You must cite (i) the PMCC value — e.g., \"$$r = 0.988$$ indicates a strong positive linear correlation\" — and (ii) the scatter diagram — e.g., \"points lie close to a straight line with no obvious curve or fanning.\"\n- Step 2: Each piece addresses a different aspect. The PMCC quantifies the strength of linear association but is sensitive to outliers and doesn't reveal non-linearity on its own. The scatter diagram shows the shape of the relationship but is subjective. Together, they provide both numerical and visual confirmation. The mark scheme requires both for full marks.\n\nTakeaway: Always cite BOTH $$r$$ and the scatter diagram. One without the other loses a mark.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "A question asks you to \"show that\" $$r = 0.988$$ using summary statistics. The mark scheme awards 7 marks. Roughly how many intermediate steps should you show, and what is the principle? (2 steps)", "answer": "- Step 1: For a 7-mark \"show that,\" expect to show roughly 5–7 distinct steps: computing $$\\bar{x}$$ and $$\\bar{y}$$, $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$, the PMCC fraction, and the final value. Each meaningful computation is worth a mark.\n- Step 2: The principle: \"show that\" questions reward the *method*, not the answer (which is given). Every algebraic manipulation, every substitution, every intermediate numerical result should appear on its own line. If an examiner can't see how you got from one line to the next, you lose method marks even if the final answer is correct.\n\nTakeaway: \"Show that\" = show everything. Write each $$S$$-value on its own labelled line. Never skip steps.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "For grouped data, why is the mean calculated from midpoints only an *estimate*, and in what situation would it equal the true mean? (2 steps)", "answer": "- Step 1: The midpoint assumes all observations in a class are concentrated at the centre. In reality, they are spread across the class interval. If the values within each class are symmetrically distributed about the midpoint, the estimate is good; if they are skewed within a class, the estimate deviates.\n- Step 2: The estimated mean equals the true mean only if the within-class distributions are symmetric about the midpoints *and* the deviations cancel across classes. Since we have no information about within-class shape, we can only estimate. This is why exam questions say \"estimate the mean\" rather than \"find the mean.\"\n\nTakeaway: Grouped-data mean is always an estimate because individual values are lost — only the uniform-spread assumption justifies using midpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "In the marble-transfer problem, the common denominator across all branches of the full tree is 936. Why is it advantageous to keep a common denominator throughout, especially for the conditional probability in part (d)? (2 steps)", "answer": "- Step 1: With a common denominator, the probability of any event is just the sum of its numerators over 936. For example, $$P(\\text{all G}) = \\frac{160}{936}$$ and $$P(\\text{same}) = \\frac{244}{936}$$.\n- Step 2: For the conditional $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936} = \\frac{160}{244}$$. The denominators cancel cleanly — no need for decimal approximations or complex fraction arithmetic. If you converted each probability to a decimal independently, rounding errors would accumulate and the conditional would be less precise.\n\nTakeaway: Keep a common denominator throughout the tree — it makes the conditional probability a clean fraction cancellation.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "In Q4(ii), the proof that $$C$$ and $$D$$ cannot be mutually exclusive works by showing $$P(C) + P(D) > 1$$ for all positive $$x$$. What if $$P(C) + P(D)$$ were exactly 1 for some $$x$$ — would that prove mutual exclusivity? (2 steps)", "answer": "- Step 1: No. $$P(C) + P(D) = 1$$ is a *necessary* condition for mutual exclusivity (combined with $$P(C \\cup D) \\leq 1$$), but it is not *sufficient*. It only tells us that $$P(C \\cap D) = P(C) + P(D) - P(C \\cup D) = 1 - P(C \\cup D)$$.\n- Step 2: For mutual exclusivity, we need $$P(C \\cap D) = 0$$. From the above, this requires $$P(C \\cup D) = 1$$ as well. So $$P(C) + P(D) = 1$$ and $$P(C \\cup D) = 1$$ together would imply mutual exclusivity, but $$P(C) + P(D) = 1$$ alone does not. The conditions $$P(C) + P(D) > 1$$ is sufficient to *disprove* mutual exclusivity, but $$P(C) + P(D) \\leq 1$$ is not sufficient to *prove* it.\n\nTakeaway: $$P(C) + P(D) > 1$$ disproves mutual exclusivity. But $$P(C) + P(D) \\leq 1$$ does not prove it — it's necessary, not sufficient.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ can also be written as $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. Derive this from the region variables $$p, q, r$$. (3 steps)", "answer": "- Step 1: In terms of regions: $$P(A) = p + q$$, $$P(B) = q + r$$, $$P(A \\cap B) = q$$, and $$P(A \\triangle B) = p + r$$.\n- Step 2: Compute $$P(A) + P(B) - 2P(A \\cap B) = (p + q) + (q + r) - 2q = p + 2q + r - 2q = p + r$$.\n- Step 3: This equals $$P(A \\triangle B)$$. The intuition: adding $$P(A)$$ and $$P(B)$$ counts the intersection twice, so you subtract it twice to remove it entirely. The symmetric difference excludes the intersection — it's \"in A or B but not both.\"\n\nTakeaway: $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. The factor of 2 arises because the intersection is counted in both $$P(A)$$ and $$P(B)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A simple exercise: A class 20–30 has frequency 10. Using linear interpolation, how many observations are below 25? (1 step)", "answer": "- Step 1: The fraction of the class below 25 is $$\\frac{25 - 20}{30 - 20} = \\frac{5}{10} = \\frac{1}{2}$$. So the partial frequency is $$\\frac{1}{2} \\times 10 = 5$$ observations. This assumes uniform distribution within the class.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A simple exercise: A discrete RV has $$P(X=1) = a$$, $$P(X=2) = 0.5$$, $$P(X=3) = 0.5 - a$$. State the valid range of $$a$$ and compute $$E(X)$$ in terms of $$a$$. (2 steps)", "answer": "- Step 1: Validity: $$a \\geq 0$$ and $$0.5 - a \\geq 0$$, so $$0 \\leq a \\leq 0.5$$. (The sum $$a + 0.5 + 0.5 - a = 1$$ is automatic.)\n- Step 2: $$E(X) = 1 \\cdot a + 2 \\cdot 0.5 + 3 \\cdot (0.5 - a) = a + 1 + 1.5 - 3a = 2.5 - 2a$$. The mean decreases as $$a$$ increases because more weight shifts from $$X=3$$ to $$X=1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A simple exercise: Two events have $$P(C) = 0.7$$ and $$P(D) = 0.6$$. Can they be mutually exclusive? Explain in one line. (1 step)", "answer": "- Step 1: No. $$P(C) + P(D) = 1.3 > 1$$, but mutual exclusivity requires $$P(C) + P(D) = P(C \\cup D) \\leq 1$$. Contradiction — they cannot be mutually exclusive. (They must overlap by at least 0.3, by inclusion-exclusion.)", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A simple exercise: $$L \\sim N(10, 2^2)$$. Standardise the value $$L = 14$$ and state what the resulting $$z$$-value means in words. (1 step)", "answer": "- Step 1: $$Z = \\frac{14 - 10}{2} = \\frac{4}{2} = 2$$. This means the value 14 is 2 standard deviations above the mean. Looking up $$\\Phi(2) = 0.9772$$, about 97.7% of observations fall below 14.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Why does the regression line of $$y$$ on $$x$$ always pass through $$(\\bar{x}, \\bar{y})$$? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: The regression line $$y = a + bx$$ minimises the sum of squared vertical residuals. The point $$(\\bar{x}, \\bar{y})$$ is the \"centre of gravity\" of the data. If the line didn't pass through this centre, you could shift it up or down to reduce all residuals simultaneously — contradicting the least-squares property.\n- Step 2: Algebraically, $$a = \\bar{y} - b\\bar{x}$$, so when $$x = \\bar{x}$$: $$y = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$. The line always predicts the mean of $$y$$ when $$x$$ equals its mean — a natural consistency requirement.\n\nTakeaway: The regression line must pass through the centroid $$(\\bar{x}, \\bar{y})$$ — it's both an algebraic identity and a logical necessity.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "In Q5, the outlier fences are at $$\\mu \\pm 2.698\\sigma$$, and $$P(\\text{not outlier}) \\approx 0.993$$. If the distribution were highly skewed instead of normal, would the same fence formula still capture ~99.3% of data? Why or why not? (2 steps)", "answer": "- Step 1: No. The 99.3% figure is specific to the normal distribution's symmetry and tail behaviour. The $$1.5 \\times \\text{IQR}$$ rule is a convention that happens to work well for normals but is not distribution-free.\n- Step 2: For a heavily right-skewed distribution, the upper fence might flag many genuine data points as outliers (because the right tail is long), while the lower fence might be too lenient (because the left tail is short). The rule is a heuristic, not a theorem — its effectiveness depends on the underlying distribution being roughly symmetric.\n\nTakeaway: The 1.5×IQR rule is a convention tied to normal-like distributions. For skewed data, it may over- or under-flag outliers.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "In the marble-transfer problem, after drawing two marbles from bag X and placing them in bag Y, the third draw is from bag Y. Why can't you compute $$P(G_3)$$ as a simple marginal without conditioning on the transfer path? (2 steps)", "answer": "- Step 1: $$P(G_3)$$ depends on the composition of bag Y, which depends on what was transferred. There is no single \"bag Y\" — there are three possible bag Ys (after GG, after GB/BG, after BB), each with different green counts (8, 7, or 6 out of 13).\n- Step 2: To get the marginal $$P(G_3)$$, you would need the law of total probability: $$P(G_3) = P(G_3 \\mid GG)P(GG) + P(G_3 \\mid GB)P(GB) + P(G_3 \\mid BG)P(BG) + P(G_3 \\mid BB)P(BB)$$. But for parts (c) and (d), you only need specific paths (GG→G₃ and BB→B₃), so computing the full marginal is unnecessary work.\n\nTakeaway: The third draw's probability is path-dependent. For \"all same colour\" questions, you only need the pure branches — don't waste time on the full marginal.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "When expanding $$(3.6 - 2a)^2$$, a student writes $$12.96 - 14.4a + 4a^2$$. Another student writes $$12.96 + 14.4a + 4a^2$$ (forgetting the middle sign). Explain exactly where the second student went wrong using the FOIL pattern. (2 steps)", "answer": "- Step 1: $$(3.6 - 2a)^2 = (3.6 - 2a)(3.6 - 2a)$$. By FOIL: First = $$3.6 \\times 3.6 = 12.96$$; Outer = $$3.6 \\times (-2a) = -7.2a$$; Inner = $$(-2a) \\times 3.6 = -7.2a$$; Last = $$(-2a) \\times (-2a) = 4a^2$$.\n- Step 2: The middle term is Outer + Inner = $$-7.2a + (-7.2a) = -14.4a$$. The error comes from treating $$(-2a)(3.6)$$ as $$+7.2a$$ instead of $$-7.2a$$ — forgetting that the *second* factor also has a negative sign on the $$2a$$ term. Both cross-terms are negative, so they add to $$-14.4a$$, not $$+14.4a$$.\n\nTakeaway: In $$(A - B)^2 = A^2 - 2AB + B^2$$, the middle term is always negative. Both cross-terms carry the minus.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "Conceptual synthesis: A student computes $$Q_1$$ for grouped data using $$\\frac{n+1}{4}$$, finds a conditional probability $$P(L > 5 \\mid \\text{not outlier})$$ using $$P(L > 5)$$ as the numerator, and interprets a regression gradient as \"the weight increases by 2.72.\" Identify the three distinct conceptual errors. (3 steps)", "answer": "- Step 1: **Error 1:** Using $$\\frac{n+1}{4}$$ for grouped data. Grouped (continuous) data uses $$\\frac{n}{4}$$ because the data is treated as continuous — there are no integer-position adjustments. The $$n+1$$ rule is for discrete data only.\n- Step 2: **Error 2:** Using $$P(L > 5)$$ as the numerator in the conditional. The conditioning event \"not outlier\" restricts $$L$$ to the interval $$(3.42, 5.58)$$, so the numerator must be $$P(5 < L < 5.58)$$ — the intersection of \"$$L > 5$$\" with the not-outlier band. Using $$P(L > 5)$$ includes outlier values above 5.58 that are excluded by the condition.\n- Step 3: **Error 3:** The gradient interpretation lacks units and the \"on average\" qualifier. It should be \"increases by 2.72 *grams* per degree Celsius, *on average*.\" Without units, \"2.72\" is meaningless; without \"on average,\" it implies an exact deterministic relationship rather than a statistical prediction.\n\nTakeaway: Three different topics, three distinct conceptual errors — all involving precision in what the framework requires.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "Edge case: Suppose in Q3, the quadratic for $$a$$ gave roots $$a = -0.1$$ and $$a = 0.5$$. What would you conclude, and why? (2 steps)", "answer": "- Step 1: Check against the constraint $$0 \\leq a \\leq 0.6$$. The root $$a = -0.1$$ violates $$a \\geq 0$$ (it would make $$P(X=2)$$ negative). The root $$a = 0.5$$ satisfies the constraint.\n- Step 2: Conclude $$a = 0.5$$ only. You must explicitly reject $$a = -0.1$$ with the reason \"since probabilities must be non-negative\" (or \"since $$a \\geq 0$$\"). Stating both roots without rejecting the invalid one loses the constraint-check mark.\n\nTakeaway: Always check roots against the valid range. Reject invalid ones *with a written reason*.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Why is it important to carry full precision (e.g., $$Q_3 = 4.7698$$, not 4.77) through intermediate steps in Q5, even though the final answer is rounded? (2 steps)", "answer": "- Step 1: The outlier fences and $$z$$-values in parts (d) and (e) depend on the quartile values. If you round $$Q_3$$ to 4.77 early, the fence becomes $$4.77 + 0.809 \\approx 5.579$$ instead of 5.5792. Standardising this gives $$z \\approx 2.697$$ instead of 2.698, and the table lookup yields a slightly different probability.\n- Step 2: These small differences compound. In part (e), using rounded fences could shift the answer from 0.103 to 0.106 — a difference that crosses a mark boundary. The rule: compute with full precision, round only the final answer.\n\nTakeaway: Full precision in intermediates; round only at the end. Early rounding propagates errors through subsequent calculations.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "A simple exercise: The regression line is $$y = 50 + 3x$$, calculated from data with $$5 \\leq x \\leq 20$$. (a) Interpret the gradient. (b) Is an estimate at $$x = 15$$ reliable? Why? (c) Is an estimate at $$x = 30$$ reliable? Why? (2 steps)", "answer": "- Step 1: (a) For every 1-unit increase in $$x$$, $$y$$ increases by approximately 3 units, on average. (Units depend on context — always state them in an exam.)\n- Step 2: (b) Yes — $$x = 15$$ is within the data range $$[5, 20]$$, so this is **interpolation**. The model is supported by data. (c) No — $$x = 30$$ is outside the data range, so this is **extrapolation**. The linear relationship may not hold beyond $$x = 20$$, making the estimate unreliable.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "In Q4(i), the problem gives $$P(A)$$, $$P(B)$$, and $$P(A \\triangle B)$$. Why is it crucial to recognise that $$A \\triangle B$$ corresponds to regions $$p + r$$ (not $$p + q + r$$) before setting up equations? (2 steps)", "answer": "- Step 1: The symmetric difference $$(A \\cap B') \\cup (A' \\cap B)$$ includes only the \"A only\" and \"B only\" regions — it deliberately *excludes* the intersection $$A \\cap B$$. So $$P(A \\triangle B) = p + r$$.\n- Step 2: If you misread it as $$P(A \\cup B) = p + q + r$$, your third equation would be $$p + q + r = \\frac{8}{25}$$ instead of $$p + r = \\frac{8}{25}$$. This would make the system inconsistent with the other two equations (since $$p + q = \\frac{7}{25}$$ and $$q + r = \\frac{5}{25}$$ already imply $$p + q + r = \\frac{10}{25}$$, not $$\\frac{8}{25}$$). The entire solution would collapse.\n\nTakeaway: Symmetric difference ≠ union. $$A \\triangle B$$ excludes the intersection; $$A \\cup B$$ includes it. Misidentifying the region makes the system unsolvable.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "When a probability problem involves items being transferred between containers, what is the systematic approach to avoid composition errors? Describe the step-by-step process. (3 steps)", "answer": "- Step 1: **Before any draw, write down the current composition** of the container you're drawing from — how many of each type, and the total. For the first draw from bag X: 5G, 4B, total 9.\n- Step 2: **After each draw, update both containers.** The source container loses the drawn item (both the specific colour count and the total decrease by 1). The destination container gains it (the specific colour count and total increase by 1). For bag X: 9 → 8. For bag Y: 11 → 13 after two transfers.\n- Step 3: **On the tree diagram, label the denominator (total) at each level.** This makes it impossible to use a stale total. The three levels in Q2 have denominators 9, 8, and 13 — write them next to the branching points.\n\nTakeaway: Write compositions before drawing → update after → label denominators on the tree. This systematic approach eliminates the most common transfer-problem error.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "Conceptual synthesis: Explain the parallel between Q2(d) and Q5(e). Both are conditional probabilities — what structural similarity do they share, and what is the common pitfall? (3 steps)", "answer": "- Step 1: Both questions use $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ where $$A \\subset B$$. In Q2(d), \"all green\" ⊂ \"all same colour.\" In Q5(e), \"$$L > 5$$ and not outlier\" ⊂ \"not outlier.\" In both cases, the conditioning event restricts the sample space.\n- Step 2: The common pitfall is using $$P(A)$$ instead of $$P(A \\cap B)$$ in the numerator. In Q2(d), this would mean using $$P(\\text{all G})$$ alone — which is actually correct because \"all G\" ⊂ \"same,\" so $$P(A \\cap B) = P(A)$$. But in Q5(e), \"$$L > 5$$\" is NOT a subset of \"not outlier\" (some values above 5 are outliers), so $$P(A \\cap B) \\neq P(A)$$. You must intersect.\n- Step 3: The key distinction: when $$A \\subset B$$, the numerator simplifies to $$P(A)$$; when $$A \\not\\subset B$$, you must compute the intersection explicitly. Always check the subset relationship before simplifying.\n\nTakeaway: Conditional probability always requires the intersection in the numerator. It simplifies to $$P(A)$$ only when $$A \\subseteq B$$ — verify this before assuming it.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}], "count": 61}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How do you estimate the mean from grouped data using a histogram? (3 steps)", "answer": "- Step 1: **Find class midpoints** ($\\bar{t}_i$) as averages of class boundaries. For 5–10, $\\frac{5+10}{2} = 7.5$; similarly for others.  \n- Step 2: **Multiply frequencies by midpoints** ($ft$) for each class. E.g., 10 (frequency) × 7.5 = 75.  \n- Step 3: **Sum all $ft$ and divide by total frequency** ($n=100$):  \n  $$\n  \\bar{t} = \\frac{\\sum ft}{n} = \\frac{1968}{100} = 19.68 \\text{ minutes}.\n  $$  \n**Misconception:** Forgetting to use midpoints or incorrectly calculating them (e.g., using class width instead of boundaries).", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the total number of marbles in bag Y 13 (not 11) for the third draw?", "answer": "When two marbles are transferred from bag X to Y:  \n- Bag X starts with 9 marbles (5G, 4B).  \n- After transferring two marbles (regardless of color), bag Y (originally 11 marbles) gains 2 more, totaling **13 marbles**.  \n**Key Insight:** Sampling without replacement alters the population size at each stage. Always recompute totals after transfers.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you derive the quadratic equation for $a$ given $Var(X) = 0.56$? (4 steps)", "answer": "- Step 1: Compute $E(X^2) = 4a + 9(0.4) + 16(0.6 - a) = 13.2 - 12a$.  \n- Step 2: Use $Var(X) = E(X^2) - [E(X)]^2$:  \n  $$\n  0.56 = (13.2 - 12a) - (3.6 - 2a)^2.\n  $$  \n- Step 3: Expand $(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$.  \n- Step 4: Substitute and simplify:  \n  $$\n  0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2 \\Rightarrow 4a^2 - 2.4a + 0.32 = 0.\n  $$  \n**Edge Case:** Forgetting to check $a \\in [0, 0.6]$ after solving the quadratic.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is $P(C) + P(D) > 1$ sufficient to prove $C$ and $D$ cannot be mutually exclusive?", "answer": "- Step 1: If $C$ and $D$ are mutually exclusive, $P(C \\cup D) = P(C) + P(D)$.  \n- Step 2: Since $P(C \\cup D) \\le 1$, this implies $P(C) + P(D) \\le 1$.  \n- Step 3: Here, $P(C) + P(D) = 1 + \\frac{25}{x(x+5)} > 1$ for all $x > 0$.  \n- Step 4: Contradiction ⇒ $C$ and $D$ cannot be mutually exclusive.  \n**Misconception:** Assuming $P(C) + P(D)$ can exceed 1 without contradiction.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you calculate outlier limits using quartiles and IQR? (3 steps)", "answer": "- Step 1: Find $Q_1 = 4.23$, $Q_3 = 4.77$ (using $z = 0.6745$).  \n- Step 2: Compute IQR = $Q_3 - Q_1 = 0.54$.  \n- Step 3: Calculate outlier bounds:  \n  $$\n  \\text{Lower} = Q_1 - 1.5 \\times \\text{IQR} = 4.23 - 0.81 = 3.42, \\\\\n  \\text{Upper} = Q_3 + 1.5 \\times \\text{IQR} = 4.77 + 0.81 = 5.58.\n  $$  \n**Edge Case:** Using $z = 0.67$ instead of $0.6745$ leads to incorrect quartiles.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you compute $r$ from $S_{xx}$, $S_{yy}$, and $S_{xy}$?", "answer": "- Step 1: Calculate $S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n} = 5300$.  \n- Step 2: Calculate $S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = 40412.92$.  \n- Step 3: Use regression gradient $b = \\frac{S_{xy}}{S_{xx}} \\Rightarrow S_{xy} = b \\times S_{xx} = 2.72 \\times 5300 = 14416$.  \n- Step 4: Compute $r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\times S_{yy}}} = \\frac{14416}{\\sqrt{5300 \\times 40412.92}} \\approx 0.988$.  \n**Misconception:** Forgetting to square $S_{xx}$ and $S_{yy}$ in the denominator.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why use $\\frac{n}{4}$ instead of $\\frac{n+1}{4}$ for grouped quartiles?", "answer": "- Step 1: Grouped data assumes continuous distributions, so quartiles are located at exact positions $\\frac{n}{4}$, $\\frac{n}{2}$, etc.  \n- Step 2: For $n=100$, $Q_1$ is at 25th value. Interpolation uses this rank.  \n- Step 3: Using $\\frac{n+1}{4} = 25.25$ introduces errors in class selection.  \n**Key Insight:** Discrete vs. continuous data rules differ; IAL S1 uses $\\frac{n}{4}$ for grouped data.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is $P(L > 5 \\mid \\text{not outlier})$ not $P(L > 5)$?", "answer": "- Step 1: The event $L > 5$ is restricted to the non-outlier range ($L < 5.58$).  \n- Step 2: Compute $P(5 < L < 5.58) = P(Z < 2.70) - P(Z < 1.25) = 0.9965 - 0.8944 = 0.1021$.  \n- Step 3: Divide by $P(\\text{not outlier}) = 0.993$:  \n  $$\n  \\frac{0.1021}{0.993} \\approx 0.103.\n  $$  \n**Misconception:** Ignoring the upper bound of the conditioning event.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}], "count": 8}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the key formula for linear interpolation to find quartiles in grouped data? Explain why the formula uses $ \\frac{n}{4} $ instead of $ \\frac{n+1}{4} $ for grouped data. (3 steps)", "answer": "- Step 1: The formula is $ Q = L + \\frac{\\frac{n}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w $, where $ L $ = lower class boundary, $ F_{\\text{before}} $ = cumulative frequency before the class, $ f_{\\text{class}} $ = class frequency, $ w $ = class width.  \n- Step 2: Grouped data treats the entire dataset as a continuous distribution, so quartiles are calculated proportionally within the class. Using $ \\frac{n}{4} $ directly matches the position in the continuous distribution, unlike discrete data which uses $ \\frac{n+1}{4} $ to account for indivisible ranks.  \n+ Example: For $ n = 100 $, the 25th value falls in the 10–14 class (cumulative jumps 10 → 26). Interpolation uses $ \\frac{100}{4} = 25 $, not $ \\frac{100+1}{4} = 25.25 $.  \n- Step 3: This avoids overestimating the quartile position in grouped data, ensuring consistency with the assumption of uniform distribution within classes.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is the standard deviation formula for grouped data $ \\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2} $? Derive it from the definition of variance. (4 steps)", "answer": "- Step 1: Variance $ \\sigma^2 $ is defined as $ E(t^2) - [E(t)]^2 $, where $ E(t) = \\bar{t} $.  \n- Step 2: For grouped data, $ \\sum ft^2 $ approximates $ \\sum t_i^2 $ by using class midpoints $ t_i $ as surrogates for all values in the class.  \n- Step 3: Divide $ \\sum ft^2 $ by $ n $ to get $ E(t^2) $, and subtract $ \\bar{t}^2 $ to compute $ \\sigma^2 $.  \n- Step 4: Take the square root to get $ \\sigma $.  \n+ Example: If $ \\sum ft^2 = 41,033 $, $ n = 100 $, and $ \\bar{t} = 19.68 $, then $ \\sigma = \\sqrt{\\frac{41,033}{100} - 19.68^2} \\approx 4.81 $.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "In Q2(d), why does $ P(\\text{all same}) $ only include the $ GGG $ and $ BBB $ paths? Explain the dependency of bag Y's composition on prior draws. (3 steps)", "answer": "- Step 1: The third draw from bag Y’s composition depends on the first two marbles transferred from bag X.  \n- Step 2: For all three marbles to be the same color, the first two must be the same (GG or BB) to alter bag Y’s count appropriately.  \n+ If $ G_1G_2 $: Y has 8G/5B → $ P(G_3) = \\frac{8}{13} $.  \n+ If $ B_1B_2 $: Y has 6G/7B → $ P(B_3) = \\frac{7}{13} $.  \n- Step 3: Mixed paths ($ GBG $, $ BGB $, etc.) result in Y having 7G/6B, making all same colors impossible. Only pure GG or BB paths contribute.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why must $ P(C) + P(D) \\le 1 $ for mutually exclusive events? Prove that $ C $ and $ D $ in Q4(ii) cannot be mutually exclusive by analyzing $ \\frac{x}{x+5} + \\frac{5}{x} $. (4 steps)", "answer": "- Step 1: If $ C $ and $ D $ are mutually exclusive, $ P(C \\cup D) = P(C) + P(D) $. Since $ P(C \\cup D) \\le 1 $, this implies $ P(C) + P(D) \\le 1 $.  \n- Step 2: Compute $ P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5x + 25}{x^2 + 5x} $.  \n- Step 3: Rewrite numerator as $ (x^2 + 5x) + 25 $, so $ P(C) + P(D) = 1 + \\frac{25}{x^2 + 5x} $.  \n- Step 4: Since $ x > 0 $, $ \\frac{25}{x^2 + 5x} > 0 $, making $ P(C) + P(D) > 1 $. Contradiction implies $ C $ and $ D $ cannot be mutually exclusive.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the conditional probability $ P(L > 5 \\mid \\text{not outlier}) $ in Q5(e) calculated as $ \\frac{P(5 < L < 5.58)}{0.993} $? Explain the role of outlier limits. (3 steps)", "answer": "- Step 1: The event \"not outlier\" restricts $ L $ to $ 3.42 < L < 5.58 $.  \n- Step 2: The intersection $ L > 5 \\cap \\text{not outlier} $ becomes $ 5 < L < 5.58 $, as outliers above 5.58 are excluded.  \n- Step 3: Standardize $ 5 $ and $ 5.58 $ to compute $ P(1.25 < Z < 2.70) $, then divide by $ P(\\text{not outlier}) = 0.993 $ to normalize the conditional probability.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Derive the formula $ r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}} $ from the definitions of covariance and standard deviation. Why does $ r $ range between -1 and 1? (4 steps)", "answer": "- Step 1: Pearson’s $ r $ is defined as $ \\frac{\\text{Cov}(X,Y)}{\\sigma_X \\sigma_Y} $.  \n- Step 2: Substitute $ \\text{Cov}(X,Y) = \\frac{S_{xy}}{n} $, $ \\sigma_X = \\sqrt{\\frac{S_{xx}}{n}} $, $ \\sigma_Y = \\sqrt{\\frac{S_{yy}}{n}} $.  \n- Step 3: Simplify: $ r = \\frac{S_{xy}/n}{\\sqrt{(S_{xx}/n)(S_{yy}/n)}} = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}} $.  \n- Step 4: By the Cauchy-Schwarz inequality, $ |S_{xy}| \\le \\sqrt{S_{xx}S_{yy}} $, hence $ -1 \\le r \\le 1 $.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "In Q1(b), why is the frequency in $ 14 \\le t < 16 $ calculated as $ \\frac{16-14}{18-14} \\times 24 $? Explain the assumption of uniform distribution in histograms. (3 steps)", "answer": "- Step 1: Histograms assume frequencies are uniformly distributed within classes, so the proportion of the class width determines the frequency in subranges.  \n- Step 2: The width of $ 14 \\le t < 16 $ is $ 2 $ minutes, and the full class width is $ 4 $ minutes. The fraction $ \\frac{2}{4} = 0.5 $ of the class is used.  \n- Step 3: Multiply the fraction by the total class frequency $ 24 $ to estimate $ 0.5 \\times 24 = 12 $ people in $ 14 \\le t < 16 $.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does the Venn diagram region $ p + r $ in Q4(i) represent $ P[(A \\cap B') \\cup (A' \\cap B)] $? Co
